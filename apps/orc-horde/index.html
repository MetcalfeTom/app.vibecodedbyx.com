<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Orc Horde — March to the Dark Tower</title>
<link rel="icon" href="https://emojicdn.elk.sh/⚔️">
<meta property="og:title" content="Orc Horde">
<meta property="og:description" content="Spawn pixel orc warriors and watch them march toward the Dark Tower.">
<meta property="og:url" content="https://sloppy.live/orc-horde">
<meta property="og:image" content="https://sloppy.live/orc-horde/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=MedievalSharp&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0808;overflow:hidden;width:100vw;height:100vh;user-select:none}
canvas{display:block;width:100%;height:100%;image-rendering:pixelated}
#hud{position:fixed;top:10px;left:14px;z-index:10;pointer-events:none}
#hud .title{font-family:'MedievalSharp',cursive;font-size:clamp(16px,3vw,28px);
  color:#c83030;text-shadow:0 0 15px rgba(200,48,48,0.4),2px 2px 0 #1a0808;letter-spacing:2px}
#hud .count{font-family:'Silkscreen',monospace;font-size:12px;color:#886040;margin-top:2px}
#controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
  display:flex;gap:6px;z-index:10;flex-wrap:wrap;justify-content:center}
#controls button{font-family:'Silkscreen',monospace;font-size:11px;
  padding:8px 14px;background:rgba(30,20,15,0.9);border:2px solid #443020;
  color:#aa7744;cursor:pointer;border-radius:3px;transition:all .15s;
  text-shadow:1px 1px 0 #000}
#controls button:hover{border-color:#cc6030;color:#eeb060;background:rgba(60,30,15,0.9)}
#controls button:active{transform:scale(0.95)}
#controls button.active{border-color:#c83030;color:#ff6040;box-shadow:0 0 8px rgba(200,48,48,0.3)}
</style>
</head>
<body>
<div id="hud">
  <div class="title">⚔️ ORC HORDE</div>
  <div class="count" id="stats">Army: 0 · Fallen: 0</div>
</div>
<div id="controls">
  <button id="btn-grunt">Grunt ×5</button>
  <button id="btn-brute">Brute ×3</button>
  <button id="btn-shaman">Shaman ×2</button>
  <button id="btn-warg">Warg Rider</button>
  <button id="btn-wave">WAAAGH! ×30</button>
  <button id="btn-siege">Siege Tower</button>
  <button id="btn-clear">Retreat</button>
</div>
<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, groundY, towerX;

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  groundY = H * 0.72;
  towerX = W * 0.88;
}
resize();
window.addEventListener('resize', resize);

// === PALETTE ===
const C = {
  skin: ['#4a6838','#3d5a2e','#567040','#2e4820','#5a7848'],
  armor: ['#554430','#443322','#665538','#3a2a18','#776644'],
  metal: ['#667','#556','#778','#889'],
  red: ['#aa2020','#882020','#cc3030','#993030'],
  banner: '#cc3030',
  fire: ['#ff8020','#ffaa30','#ff6010','#ffcc40','#ee4010'],
  bone: ['#ccbb99','#bbaa88','#ddccaa'],
};

const orcs = [];
const particles = [];
const arrows = [];
const banners = [];
let totalFallen = 0;
let shakeTimer = 0;

// === ORC TYPES ===
const ORC_TYPES = {
  grunt: {w:10,h:16,speed:[0.4,0.7],hp:3,color:0,weapon:'sword',yOff:0},
  brute: {w:14,h:20,speed:[0.25,0.45],hp:8,color:2,weapon:'axe',yOff:-2},
  shaman: {w:10,h:18,speed:[0.3,0.5],hp:2,color:3,weapon:'staff',yOff:-1},
  warg:  {w:22,h:16,speed:[0.7,1.1],hp:5,color:1,weapon:'spear',yOff:2},
  siege: {w:30,h:40,speed:[0.12,0.18],hp:30,color:4,weapon:'none',yOff:-20},
};

class Orc {
  constructor(type, x, y){
    const t = ORC_TYPES[type];
    this.type = type;
    this.x = x;
    this.y = y + t.yOff + (Math.random()-0.5)*8;
    this.w = t.w;
    this.h = t.h;
    this.speed = t.speed[0] + Math.random()*(t.speed[1]-t.speed[0]);
    this.hp = t.hp;
    this.maxHp = t.hp;
    this.weapon = t.weapon;
    this.skinIdx = Math.floor(Math.random()*C.skin.length);
    this.armorIdx = Math.floor(Math.random()*C.armor.length);
    this.frame = Math.random()*Math.PI*2;
    this.frameSpeed = 2 + Math.random()*2;
    this.dead = false;
    this.deathTimer = 0;
    this.atTower = false;
    this.attackTimer = 0;
    this.hasBanner = type === 'brute' && Math.random() < 0.3;
    this.yBase = this.y;
  }
  update(dt, t){
    if(this.dead){
      this.deathTimer += dt;
      return;
    }
    this.frame += this.frameSpeed * dt;

    if(!this.atTower){
      // March toward tower
      const dist = towerX - 30 - this.x;
      if(dist > 0){
        const march = this.speed * (1 + Math.sin(t*0.5)*0.1);
        this.x += march;
        // Bob
        this.y = this.yBase + Math.sin(this.frame)*1.5;
      } else {
        this.atTower = true;
      }
    } else {
      // Attack tower
      this.attackTimer += dt;
      if(this.attackTimer > 2){
        this.attackTimer = 0;
        shakeTimer = 0.15;
        // Spawn impact particle
        for(let i = 0; i < 3; i++){
          particles.push(new Particle(towerX - 25 + Math.random()*10, this.y - this.h/2, 'rock'));
        }
      }
      this.y = this.yBase + Math.sin(this.frame*3)*1;
    }

    // Random tower arrow damage
    if(Math.random() < 0.0008 * dt * 60){
      this.hp--;
      particles.push(new Particle(this.x, this.y - this.h, 'blood'));
      if(this.hp <= 0){
        this.dead = true;
        totalFallen++;
        for(let i = 0; i < 4; i++){
          particles.push(new Particle(this.x + (Math.random()-0.5)*8, this.y - this.h*0.5, 'blood'));
        }
      }
    }
  }
  draw(t){
    const x = Math.floor(this.x), y = Math.floor(this.y);
    const skin = C.skin[this.skinIdx];
    const armor = C.armor[this.armorIdx];

    if(this.dead){
      // Fallen orc
      ctx.globalAlpha = Math.max(0, 1 - this.deathTimer * 0.15);
      ctx.fillStyle = skin;
      ctx.fillRect(x-this.w/2, y-2, this.w, 4);
      ctx.fillStyle = armor;
      ctx.fillRect(x-this.w/2+2, y-1, this.w-4, 2);
      ctx.globalAlpha = 1;
      return;
    }

    const bob = Math.sin(this.frame);
    const marchLean = this.atTower ? 0 : 0.5;

    if(this.type === 'siege'){
      this.drawSiege(x, y, t); return;
    }
    if(this.type === 'warg'){
      this.drawWarg(x, y, t, bob, skin, armor); return;
    }

    // Body
    ctx.fillStyle = armor;
    ctx.fillRect(x-this.w/2, y-this.h+4, this.w, this.h-6);
    // Head
    ctx.fillStyle = skin;
    const headY = y - this.h + Math.floor(bob*0.5);
    ctx.fillRect(x-3, headY-5, 7, 7);
    // Eyes
    ctx.fillStyle = '#ff2020';
    ctx.fillRect(x-2, headY-3, 2, 2);
    ctx.fillRect(x+1, headY-3, 2, 2);
    // Legs (animated)
    ctx.fillStyle = skin;
    const legOff = Math.sin(this.frame)*3;
    ctx.fillRect(x-3, y-2, 3, 4+legOff);
    ctx.fillRect(x+1, y-2, 3, 4-legOff);
    // Feet
    ctx.fillStyle = '#332218';
    ctx.fillRect(x-4, y+2+legOff, 4, 2);
    ctx.fillRect(x+1, y+2-legOff, 4, 2);

    // Weapon
    if(this.weapon === 'sword'){
      ctx.fillStyle = C.metal[0];
      ctx.fillRect(x+this.w/2, y-this.h+6+Math.floor(bob), 2, 10);
      ctx.fillStyle = '#aaa';
      ctx.fillRect(x+this.w/2, y-this.h+2+Math.floor(bob), 2, 5);
    } else if(this.weapon === 'axe'){
      ctx.fillStyle = '#553322';
      ctx.fillRect(x+this.w/2+1, y-this.h+2, 2, 14);
      ctx.fillStyle = C.metal[1];
      ctx.fillRect(x+this.w/2, y-this.h, 5, 5);
    } else if(this.weapon === 'staff'){
      ctx.fillStyle = '#664422';
      ctx.fillRect(x+this.w/2+1, y-this.h-2, 2, 18);
      // Glow
      const glowA = 0.3 + Math.sin(t*4+this.frame)*0.2;
      ctx.fillStyle = `rgba(100,255,60,${glowA})`;
      ctx.beginPath();
      ctx.arc(x+this.w/2+2, y-this.h-3, 3, 0, Math.PI*2);
      ctx.fill();
    }
    // Shield (some grunts)
    if(this.type === 'grunt' && this.skinIdx < 2){
      ctx.fillStyle = '#443020';
      ctx.fillRect(x-this.w/2-3, y-this.h+5, 4, 8);
      ctx.fillStyle = C.red[0];
      ctx.fillRect(x-this.w/2-2, y-this.h+7, 2, 4);
    }
    // Banner
    if(this.hasBanner){
      ctx.fillStyle = '#553322';
      ctx.fillRect(x, y-this.h-12, 2, 14);
      ctx.fillStyle = C.banner;
      const bWave = Math.sin(t*3+this.frame)*2;
      ctx.fillRect(x+2, y-this.h-12, 8+bWave, 6);
      // Skull on banner
      ctx.fillStyle = '#ddd';
      ctx.fillRect(x+4, y-this.h-11, 3, 3);
    }
    // Helmet (brutes)
    if(this.type === 'brute'){
      ctx.fillStyle = C.metal[2];
      ctx.fillRect(x-4, headY-7, 9, 3);
      ctx.fillRect(x-1, headY-9, 3, 3);
    }
    // Shaman robe
    if(this.type === 'shaman'){
      ctx.fillStyle = '#442266';
      ctx.fillRect(x-this.w/2-1, y-this.h+2, this.w+2, this.h-4);
    }
    // HP bar if damaged
    if(this.hp < this.maxHp && !this.dead){
      const bw = this.w + 4;
      ctx.fillStyle = '#300';
      ctx.fillRect(x-bw/2, y-this.h-8, bw, 2);
      ctx.fillStyle = '#f00';
      ctx.fillRect(x-bw/2, y-this.h-8, bw*(this.hp/this.maxHp), 2);
    }
  }
  drawWarg(x, y, t, bob, skin, armor){
    // Warg body
    ctx.fillStyle = '#4a3828';
    ctx.fillRect(x-10, y-4, 20, 8);
    // Warg head
    ctx.fillStyle = '#3a2818';
    ctx.fillRect(x+8, y-7, 8, 8);
    // Warg teeth
    ctx.fillStyle = '#ddd';
    ctx.fillRect(x+14, y-2, 2, 3);
    // Warg eyes
    ctx.fillStyle = '#ff4400';
    ctx.fillRect(x+12, y-6, 2, 2);
    // Warg legs
    const lo = Math.sin(this.frame)*4;
    ctx.fillStyle = '#3a2818';
    ctx.fillRect(x-8, y+4, 3, 5+lo);
    ctx.fillRect(x-2, y+4, 3, 5-lo);
    ctx.fillRect(x+4, y+4, 3, 5+lo);
    ctx.fillRect(x+9, y+4, 3, 5-lo);
    // Warg tail
    ctx.fillRect(x-12, y-4+Math.sin(t*5)*2, 4, 3);
    // Rider
    ctx.fillStyle = skin;
    ctx.fillRect(x-2, y-12+Math.floor(bob), 5, 6);
    ctx.fillStyle = armor;
    ctx.fillRect(x-3, y-9+Math.floor(bob), 7, 5);
    // Rider eyes
    ctx.fillStyle = '#ff2020';
    ctx.fillRect(x-1, y-11+Math.floor(bob), 1, 1);
    ctx.fillRect(x+2, y-11+Math.floor(bob), 1, 1);
    // Spear
    ctx.fillStyle = '#664422';
    ctx.fillRect(x+4, y-20, 2, 18);
    ctx.fillStyle = '#999';
    ctx.fillRect(x+3, y-23, 4, 4);
  }
  drawSiege(x, y, t){
    // Wheels
    ctx.fillStyle = '#332218';
    const wheelR = 6;
    for(const wx of [-12, 12]){
      ctx.beginPath();
      ctx.arc(x+wx, y+2, wheelR, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#221108';
      ctx.beginPath();
      ctx.arc(x+wx, y+2, 2, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#332218';
    }
    // Tower frame
    ctx.fillStyle = '#443020';
    ctx.fillRect(x-14, y-38, 28, 40);
    // Beams
    ctx.fillStyle = '#332218';
    ctx.fillRect(x-15, y-38, 2, 42);
    ctx.fillRect(x+13, y-38, 2, 42);
    ctx.fillRect(x-15, y-20, 30, 2);
    // Cross
    ctx.lineWidth = 1.5;
    ctx.strokeStyle = '#332218';
    ctx.beginPath();ctx.moveTo(x-13,y-38);ctx.lineTo(x+13,y);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x+13,y-38);ctx.lineTo(x-13,y);ctx.stroke();
    // Skull
    ctx.fillStyle = '#bbaa88';
    ctx.fillRect(x-3, y-36, 7, 6);
    ctx.fillStyle = '#111';
    ctx.fillRect(x-1, y-34, 2, 2);
    ctx.fillRect(x+2, y-34, 2, 2);
    // Top banner
    ctx.fillStyle = C.banner;
    const wave = Math.sin(t*2)*3;
    ctx.fillRect(x-10, y-42, 20+wave, 5);
    // Fire at top
    const fIdx = Math.floor(t*8)%C.fire.length;
    ctx.fillStyle = C.fire[fIdx];
    ctx.fillRect(x-3+Math.sin(t*6)*2, y-48+Math.sin(t*8)*2, 6, 6);
    ctx.fillStyle = C.fire[(fIdx+2)%C.fire.length];
    ctx.fillRect(x-1+Math.sin(t*7)*1, y-52+Math.sin(t*10), 4, 5);
    // HP bar
    if(this.hp < this.maxHp){
      ctx.fillStyle = '#300';
      ctx.fillRect(x-16, y-55, 32, 3);
      ctx.fillStyle = '#f00';
      ctx.fillRect(x-16, y-55, 32*(this.hp/this.maxHp), 3);
    }
  }
}

class Particle {
  constructor(x, y, type){
    this.x = x; this.y = y; this.type = type;
    this.vx = (Math.random()-0.5)*3;
    this.vy = -1 - Math.random()*3;
    this.life = 1;
    this.decay = 0.02 + Math.random()*0.03;
    this.size = 1 + Math.random()*2;
  }
  update(dt){
    this.vy += 0.1;
    this.x += this.vx;
    this.y += this.vy;
    this.life -= this.decay;
  }
  draw(){
    if(this.life <= 0) return;
    if(this.type === 'blood'){
      ctx.fillStyle = `rgba(160,20,20,${this.life})`;
    } else if(this.type === 'rock'){
      ctx.fillStyle = `rgba(120,100,80,${this.life})`;
    } else if(this.type === 'fire'){
      ctx.fillStyle = `rgba(255,${100+Math.random()*100},20,${this.life})`;
    } else {
      ctx.fillStyle = `rgba(100,80,60,${this.life*0.5})`;
    }
    ctx.fillRect(this.x, this.y, this.size, this.size);
  }
}

// === TOWER ARROWS ===
class Arrow {
  constructor(){
    this.x = towerX - 20;
    this.y = groundY - 140 - Math.random()*60;
    // Target random orc
    const alive = orcs.filter(o => !o.dead);
    if(alive.length === 0){ this.dead = true; return; }
    const target = alive[Math.floor(Math.random()*alive.length)];
    const dx = target.x - this.x;
    const dy = target.y - this.y;
    const d = Math.sqrt(dx*dx+dy*dy);
    this.vx = (dx/d) * 5;
    this.vy = (dy/d) * 5;
    this.life = 80;
    this.dead = false;
  }
  update(){
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.03;
    this.life--;
    if(this.life <= 0 || this.y > groundY + 10) this.dead = true;
  }
  draw(){
    ctx.strokeStyle = '#888';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(this.x, this.y);
    ctx.lineTo(this.x - this.vx*2, this.y - this.vy*2);
    ctx.stroke();
  }
}

// === SCENE DRAWING ===
function drawSky(t){
  const grad = ctx.createLinearGradient(0, 0, 0, groundY);
  grad.addColorStop(0, '#0a0510');
  grad.addColorStop(0.4, '#1a0818');
  grad.addColorStop(0.7, '#2a1020');
  grad.addColorStop(1, '#1a1008');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, groundY);

  // Stars
  ctx.fillStyle = '#fff';
  for(let i = 0; i < 50; i++){
    const sx = (i*197.3+33)%W;
    const sy = (i*89.7+11)%(groundY*0.5);
    ctx.globalAlpha = 0.15 + Math.sin(t+i)*0.1;
    ctx.fillRect(sx, sy, 1, 1);
  }
  ctx.globalAlpha = 1;

  // Blood moon
  const moonX = W*0.2, moonY = H*0.15;
  const mg = ctx.createRadialGradient(moonX, moonY, 5, moonX, moonY, 40);
  mg.addColorStop(0, 'rgba(200,60,40,0.8)');
  mg.addColorStop(0.5, 'rgba(150,30,30,0.3)');
  mg.addColorStop(1, 'transparent');
  ctx.fillStyle = mg;
  ctx.beginPath(); ctx.arc(moonX, moonY, 40, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(moonX, moonY, 15, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(200,70,50,0.7)'; ctx.fill();

  // Distant mountains
  ctx.fillStyle = '#120810';
  ctx.beginPath();
  ctx.moveTo(0, groundY);
  for(let x = 0; x <= W; x += 30){
    const mh = 30 + Math.sin(x*0.008)*40 + Math.sin(x*0.02)*15;
    ctx.lineTo(x, groundY - mh);
  }
  ctx.lineTo(W, groundY);
  ctx.closePath();
  ctx.fill();

  // Smoke/haze
  ctx.fillStyle = 'rgba(40,20,15,0.15)';
  for(let i = 0; i < 5; i++){
    const cx = (i * W/4 + t*15*(i%2?1:-1)) % (W+200) - 100;
    ctx.beginPath();
    ctx.ellipse(cx, groundY - 20 - i*10, 120, 20, 0, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawGround(){
  const grad = ctx.createLinearGradient(0, groundY, 0, H);
  grad.addColorStop(0, '#2a1a10');
  grad.addColorStop(0.3, '#1a1008');
  grad.addColorStop(1, '#0a0804');
  ctx.fillStyle = grad;
  ctx.fillRect(0, groundY, W, H - groundY);

  // Path ruts
  ctx.strokeStyle = 'rgba(20,12,8,0.4)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(0, groundY + 15);
  for(let x = 0; x < W; x += 20) ctx.lineTo(x, groundY + 15 + Math.sin(x*0.02)*3);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(0, groundY + 30);
  for(let x = 0; x < W; x += 20) ctx.lineTo(x, groundY + 30 + Math.sin(x*0.025+1)*2);
  ctx.stroke();

  // Scattered bones/rocks
  ctx.fillStyle = '#1a1208';
  for(let i = 0; i < 15; i++){
    const bx = (i*173+50)%W;
    const by = groundY + 5 + (i*37)%40;
    ctx.fillRect(bx, by, 3+i%3, 2);
  }
}

function drawTower(t){
  const tx = towerX, ty = groundY;
  const tw = 50, th = 200;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.moveTo(tx-tw/2, ty);
  ctx.lineTo(tx-tw*2, ty+20);
  ctx.lineTo(tx-tw/2-30, ty+5);
  ctx.closePath();
  ctx.fill();

  // Tower body
  const tGrad = ctx.createLinearGradient(tx-tw/2, 0, tx+tw/2, 0);
  tGrad.addColorStop(0, '#1a1a22');
  tGrad.addColorStop(0.3, '#2a2a35');
  tGrad.addColorStop(0.7, '#222230');
  tGrad.addColorStop(1, '#111118');
  ctx.fillStyle = tGrad;
  ctx.fillRect(tx-tw/2, ty-th, tw, th);

  // Battlements
  for(let i = 0; i < 5; i++){
    ctx.fillRect(tx-tw/2-3+i*12, ty-th-12, 8, 12);
  }

  // Stone lines
  ctx.strokeStyle = 'rgba(40,40,55,0.5)';
  ctx.lineWidth = 0.8;
  for(let y = ty-th+10; y < ty; y += 12){
    ctx.beginPath();ctx.moveTo(tx-tw/2, y);ctx.lineTo(tx+tw/2, y);ctx.stroke();
  }
  for(let y = ty-th+16; y < ty; y += 24){
    ctx.beginPath();ctx.moveTo(tx, y);ctx.lineTo(tx, y+12);ctx.stroke();
  }

  // Window (evil eye)
  ctx.fillStyle = '#ff3020';
  const eyeGlow = 0.4 + Math.sin(t*2)*0.2;
  ctx.globalAlpha = eyeGlow;
  const eg = ctx.createRadialGradient(tx, ty-th+40, 2, tx, ty-th+40, 20);
  eg.addColorStop(0, '#ff4030');
  eg.addColorStop(1, 'transparent');
  ctx.fillStyle = eg;
  ctx.beginPath(); ctx.arc(tx, ty-th+40, 20, 0, Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
  // Eye slit
  ctx.fillStyle = '#ff2010';
  ctx.beginPath();
  ctx.ellipse(tx, ty-th+40, 8, 4, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#ff8040';
  ctx.fillRect(tx-1, ty-th+38, 3, 4);

  // Tower fire (top)
  for(let i = 0; i < 2; i++){
    const fx = tx - tw/2 + 5 + i*(tw-10);
    const fi = Math.floor(t*10+i*3)%C.fire.length;
    ctx.fillStyle = C.fire[fi];
    ctx.fillRect(fx-2+Math.sin(t*6+i)*1, ty-th-16+Math.sin(t*8+i)*2, 4, 5);
    ctx.fillStyle = C.fire[(fi+2)%C.fire.length];
    ctx.fillRect(fx-1, ty-th-20+Math.sin(t*10+i), 3, 4);
  }

  // Arrow firing
  if(orcs.filter(o=>!o.dead).length > 0 && Math.random() < 0.02){
    arrows.push(new Arrow());
  }
}

// === SPAWN ===
function spawnOrcs(type, count){
  for(let i = 0; i < count; i++){
    const x = -20 - Math.random()*200 - i*30;
    const row = Math.floor(Math.random()*4);
    const y = groundY + 4 + row * 10;
    orcs.push(new Orc(type, x, y));
  }
}

// Dust kicked up by marching
function spawnDust(){
  const alive = orcs.filter(o => !o.dead && !o.atTower);
  if(alive.length === 0) return;
  const o = alive[Math.floor(Math.random()*alive.length)];
  particles.push(new Particle(o.x + (Math.random()-0.5)*6, o.y + 4, 'dust'));
}

// === BUTTONS ===
document.getElementById('btn-grunt').onclick = () => spawnOrcs('grunt', 5);
document.getElementById('btn-brute').onclick = () => spawnOrcs('brute', 3);
document.getElementById('btn-shaman').onclick = () => spawnOrcs('shaman', 2);
document.getElementById('btn-warg').onclick = () => spawnOrcs('warg', 1);
document.getElementById('btn-siege').onclick = () => spawnOrcs('siege', 1);
document.getElementById('btn-wave').onclick = () => {
  spawnOrcs('grunt', 18);
  spawnOrcs('brute', 6);
  spawnOrcs('shaman', 3);
  spawnOrcs('warg', 2);
  spawnOrcs('siege', 1);
};
document.getElementById('btn-clear').onclick = () => {
  orcs.length = 0;
  particles.length = 0;
  arrows.length = 0;
};

// Click to spawn grunt
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  if(my > groundY - 30){
    const o = new Orc('grunt', mx, groundY + 4 + Math.random()*30);
    o.x = mx;
    orcs.push(o);
  }
});

// === MAIN LOOP ===
let lastTime = 0;
function frame(timestamp){
  const dt = Math.min(0.05, (timestamp - lastTime) / 1000);
  lastTime = timestamp;
  const t = timestamp * 0.001;

  // Screen shake
  ctx.save();
  if(shakeTimer > 0){
    shakeTimer -= dt;
    ctx.translate(Math.random()*4-2, Math.random()*4-2);
  }

  drawSky(t);
  drawGround();
  drawTower(t);

  // Update & draw orcs (sort by y for depth)
  orcs.sort((a,b) => a.y - b.y);
  for(const o of orcs) o.update(dt, t);
  for(const o of orcs) o.draw(t);

  // Remove long-dead orcs
  for(let i = orcs.length-1; i >= 0; i--){
    if(orcs[i].dead && orcs[i].deathTimer > 8) orcs.splice(i, 1);
  }

  // Arrows
  for(const a of arrows){ a.update(); a.draw(); }
  for(let i = arrows.length-1; i >= 0; i--){
    if(arrows[i].dead) arrows.splice(i, 1);
  }

  // Particles
  if(Math.random() < 0.15) spawnDust();
  for(const p of particles){ p.update(dt); p.draw(); }
  for(let i = particles.length-1; i >= 0; i--){
    if(particles[i].life <= 0) particles.splice(i, 1);
  }

  // Cap
  if(orcs.length > 500){
    const deadOnes = orcs.filter(o=>o.dead);
    deadOnes.slice(0, orcs.length-500).forEach(d => {
      orcs.splice(orcs.indexOf(d), 1);
    });
  }

  ctx.restore();

  // Stats
  const alive = orcs.filter(o=>!o.dead).length;
  document.getElementById('stats').textContent =
    `Army: ${alive} · Fallen: ${totalFallen} · Total: ${orcs.length}`;

  requestAnimationFrame(frame);
}

// Start with initial wave
spawnOrcs('grunt', 8);
spawnOrcs('brute', 2);
requestAnimationFrame(frame);
</script>
