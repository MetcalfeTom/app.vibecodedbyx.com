<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Neon Fit</title>
<link rel="icon" href="https://emojicdn.elk.sh/💪">
<meta property="og:title" content="Neon Fit">
<meta property="og:description" content="Neon fitness dashboard. Tap to walk, track steps, watch your heart rate.">
<meta property="og:url" content="https://sloppy.live/neon-fit">
<meta property="og:image" content="https://emojicdn.elk.sh/💪?style=apple&size=512">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0b12;--card:#0e1018;--border:#1a1c2a;--text:#d0d0d8;--dim:#555;--neon:#00ffc8;--neon2:#ff3c78;--pulse:#ff6644}
html,body{min-height:100dvh;background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace}
body{display:flex;flex-direction:column;align-items:center;padding:20px 12px 60px;gap:16px}
h1{font-family:'Orbitron',sans-serif;font-size:clamp(20px,5vw,32px);background:linear-gradient(90deg,var(--neon),var(--neon2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;letter-spacing:2px}
#ring-wrap{position:relative;width:220px;height:220px;flex-shrink:0}
#ring{display:block}
#center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px}
#steps-val{font-family:'Orbitron',sans-serif;font-size:36px;font-weight:900;color:var(--neon)}
#goal{font-size:12px;color:var(--dim)}
#bpm-row{display:flex;align-items:center;gap:6px;font-size:14px}
#heart{color:var(--neon2);font-size:22px;display:inline-block;transition:transform 0.1s}
#bpm{font-family:'Orbitron',sans-serif;font-size:20px;color:var(--neon2)}
#ecg{width:100%;max-width:400px;height:60px;background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
#stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;max-width:400px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 10px;text-align:center}
.stat-val{font-family:'Orbitron',sans-serif;font-size:18px;font-weight:700;color:var(--neon);display:block}
.stat-lbl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:1px}
#actions{display:flex;gap:10px}
.btn{font-family:'Orbitron',sans-serif;font-size:13px;padding:10px 22px;border:none;border-radius:8px;cursor:pointer;transition:all .2s;font-weight:700}
#walkBtn{background:var(--neon);color:var(--bg)}
#walkBtn:hover{filter:brightness(1.2)}
#walkBtn.active{background:var(--neon2);animation:glow 1s infinite}
#resetBtn{background:transparent;border:1px solid var(--border);color:var(--dim)}
#resetBtn:hover{border-color:var(--neon2);color:var(--neon2)}
@keyframes glow{0%,100%{box-shadow:0 0 8px var(--neon2)}50%{box-shadow:0 0 22px var(--neon2)}}
#log{width:100%;max-width:400px;max-height:180px;overflow-y:auto;display:flex;flex-direction:column;gap:4px}
.entry{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:12px;display:flex;justify-content:space-between;animation:fadeIn .25s}
.entry .time{color:var(--dim)}
.entry .val{color:var(--neon)}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<h1>NEON FIT</h1>
<div id="ring-wrap">
<canvas id="ring" width="220" height="220"></canvas>
<div id="center">
<div id="steps-val">0</div>
<div id="goal">/ 10,000</div>
<div id="bpm-row"><span id="heart">&#9829;</span> <span id="bpm">72</span> <span style="font-size:11px;color:var(--dim)">bpm</span></div>
</div>
</div>
<canvas id="ecg" width="400" height="60"></canvas>
<div id="stats">
<div class="stat"><span class="stat-val" id="dist">0.00</span><span class="stat-lbl">km</span></div>
<div class="stat"><span class="stat-val" id="cal">0</span><span class="stat-lbl">cal</span></div>
<div class="stat"><span class="stat-val" id="mins">0</span><span class="stat-lbl">min</span></div>
</div>
<div id="actions">
<button class="btn" id="walkBtn">START WALK</button>
<button class="btn" id="resetBtn">RESET</button>
</div>
<div id="log"></div>
<script>
(function(){
var RC=document.getElementById('ring'),RX=RC.getContext('2d');
var EC=document.getElementById('ecg'),EX=EC.getContext('2d');
var stepsEl=document.getElementById('steps-val'),bpmEl=document.getElementById('bpm');
var heartEl=document.getElementById('heart'),distEl=document.getElementById('dist');
var calEl=document.getElementById('cal'),minsEl=document.getElementById('mins');
var logEl=document.getElementById('log'),walkBtn=document.getElementById('walkBtn');
var resetBtn=document.getElementById('resetBtn');

var GOAL=10000,steps=0,bpm=72,walking=false,walkStart=0,totalWalkMs=0;
var ecgData=[];for(var i=0;i<200;i++)ecgData.push(0);
var ecgT=0;

// resize ecg canvas
function resizeEcg(){
  var w=EC.parentElement?Math.min(EC.clientWidth,400):400;
  EC.width=w*2;EC.height=120;
  EC.style.width=w+'px';EC.style.height='60px';
}
resizeEcg();window.addEventListener('resize',resizeEcg);

function drawRing(){
  RX.clearRect(0,0,220,220);
  var cx=110,cy=110,R=90,LW=14;
  RX.beginPath();RX.arc(cx,cy,R,0,Math.PI*2);
  RX.strokeStyle='#1a1c2a';RX.lineWidth=LW;RX.lineCap='round';RX.stroke();
  var prog=Math.min(steps/GOAL,1);
  if(prog>0){
    var sa=-Math.PI/2,ea=sa+prog*Math.PI*2;
    var g=RX.createLinearGradient(0,0,220,220);
    g.addColorStop(0,'#00ffc8');g.addColorStop(1,'#ff3c78');
    RX.beginPath();RX.arc(cx,cy,R,sa,ea);
    RX.strokeStyle=g;RX.lineWidth=LW;RX.lineCap='round';RX.stroke();
    var angle=sa+prog*Math.PI*2;
    var gx=cx+Math.cos(angle)*R,gy=cy+Math.sin(angle)*R;
    RX.save();RX.shadowColor='#00ffc8';RX.shadowBlur=18;
    RX.beginPath();RX.arc(gx,gy,LW/2,0,Math.PI*2);RX.fillStyle='#00ffc8';RX.fill();
    RX.restore();
  }
}

function ecgSample(t){
  // simulate ECG waveform
  var period=60/bpm;
  var phase=(t%period)/period;
  if(phase<0.05)return Math.sin(phase/0.05*Math.PI)*0.15;
  if(phase<0.15)return 0;
  if(phase<0.18)return -0.1;
  if(phase<0.22)return Math.sin((phase-0.18)/0.04*Math.PI)*1.0;
  if(phase<0.26)return -0.2;
  if(phase<0.35)return 0;
  if(phase<0.45)return Math.sin((phase-0.35)/0.1*Math.PI)*0.25;
  return 0;
}

function drawEcg(){
  var w=EC.width,h=EC.height;
  EX.fillStyle='#0e1018';EX.fillRect(0,0,w,h);
  // grid
  EX.strokeStyle='#1a1c2a';EX.lineWidth=1;
  for(var x=0;x<w;x+=20){EX.beginPath();EX.moveTo(x,0);EX.lineTo(x,h);EX.stroke();}
  for(var y=0;y<h;y+=20){EX.beginPath();EX.moveTo(0,y);EX.lineTo(w,y);EX.stroke();}
  // waveform
  EX.beginPath();
  var mid=h/2;
  for(var i=0;i<ecgData.length;i++){
    var x=i/(ecgData.length-1)*w;
    var y=mid-ecgData[i]*mid*0.8;
    if(i===0)EX.moveTo(x,y);else EX.lineTo(x,y);
  }
  EX.strokeStyle='#ff3c78';EX.lineWidth=2;EX.shadowColor='#ff3c78';EX.shadowBlur=8;
  EX.stroke();EX.shadowBlur=0;
}

function addSteps(n){
  steps+=n;
  stepsEl.textContent=steps.toLocaleString();
  distEl.textContent=(steps*0.000762).toFixed(2);
  calEl.textContent=Math.floor(steps*0.04);
  drawRing();
  if(steps%100<n)addLog(steps+' steps');
}

function addLog(msg){
  var d=new Date();
  var ts=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+':'+String(d.getSeconds()).padStart(2,'0');
  var el=document.createElement('div');el.className='entry';
  el.innerHTML='<span class="val">'+msg+'</span><span class="time">'+ts+'</span>';
  logEl.prepend(el);
  if(logEl.children.length>30)logEl.lastChild.remove();
}

function simBpm(){
  var base=walking?105+Math.random()*35:62+Math.random()*16;
  bpm+=(base-bpm)*0.05;
  bpmEl.textContent=Math.round(bpm);
  var scale=1+Math.sin(Date.now()*bpm/60*0.1047)*0.18;
  heartEl.style.transform='scale('+scale+')';
}

var walkIv=null;
walkBtn.addEventListener('click',function(){
  walking=!walking;
  walkBtn.textContent=walking?'STOP':'START WALK';
  walkBtn.classList.toggle('active',walking);
  if(walking){
    walkStart=Date.now();
    addLog('Walk started');
    walkIv=setInterval(function(){
      addSteps(Math.floor(8+Math.random()*6));
    },600);
  }else{
    clearInterval(walkIv);
    totalWalkMs+=Date.now()-walkStart;
    addLog('Walk paused');
  }
});

resetBtn.addEventListener('click',function(){
  if(walking){walking=false;clearInterval(walkIv);walkBtn.textContent='START WALK';walkBtn.classList.remove('active');}
  steps=0;bpm=72;totalWalkMs=0;
  stepsEl.textContent='0';distEl.textContent='0.00';calEl.textContent='0';minsEl.textContent='0';
  logEl.innerHTML='';drawRing();addLog('Reset');
});

var lastT=0;
function update(t){
  var dt=(t-lastT)/1000;lastT=t;
  simBpm();
  ecgT+=dt;
  ecgData.push(ecgSample(ecgT));
  if(ecgData.length>200)ecgData.shift();
  drawEcg();
  var ms=totalWalkMs+(walking?Date.now()-walkStart:0);
  minsEl.textContent=Math.floor(ms/60000);
  requestAnimationFrame(update);
}

drawRing();
requestAnimationFrame(function(t){lastT=t;update(t);});
})();
</script>
</body>
</html>
