<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kitten Cafe — Cozy Lo-fi Hangout</title>
<link rel="icon" href="https://emojicdn.elk.sh/🐱">
<meta property="og:title" content="Kitten Cafe">
<meta property="og:description" content="A cozy cafe with kittens, lo-fi music, and purring. Come relax.">
<meta property="og:url" content="https://app.sloppy.live/kitten-cafe/">
<meta property="og:image" content="https://emojicdn.elk.sh/🐱?style=google">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Nunito:wght@300;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#f5ebe0;color:#5c4033;font-family:'Nunito',sans-serif;min-height:100vh;overflow:hidden;cursor:default}
canvas{display:block;position:fixed;top:0;left:0;z-index:0}
.ui{position:fixed;z-index:10;pointer-events:none}
.title{position:fixed;top:16px;left:50%;transform:translateX(-50%);font-family:'Caveat',cursive;font-size:clamp(28px,6vw,44px);font-weight:700;color:#8b5e3c;text-shadow:0 2px 8px rgba(139,94,60,0.15);z-index:10;pointer-events:none;text-align:center}
.subtitle{font-size:clamp(12px,2vw,16px);font-weight:300;color:#a0826d;display:block;letter-spacing:2px}
.controls{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:8px;pointer-events:auto}
.btn{font-family:'Nunito',sans-serif;font-weight:600;font-size:12px;background:rgba(255,250,245,0.85);color:#8b5e3c;border:1px solid #d4b8a0;padding:8px 14px;border-radius:20px;cursor:pointer;backdrop-filter:blur(8px);transition:all 0.2s;letter-spacing:0.5px}
.btn:hover{background:#8b5e3c;color:#fff5ee;border-color:#8b5e3c}
.btn.active{background:#8b5e3c;color:#fff5ee}
.kitten-count{position:fixed;top:16px;right:20px;font-family:'Caveat',cursive;font-size:20px;color:#a0826d;z-index:10;pointer-events:none}
.hint{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);font-size:11px;color:#bfa48e;z-index:10;pointer-events:none;letter-spacing:1px;transition:opacity 1s}
.hint a{color:#bfa48e;text-decoration:none;pointer-events:auto}.hint a:hover{color:#8b5e3c}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="title">Kitten Cafe<span class="subtitle">sit down, relax, pet a kitten</span></div>
<div class="kitten-count" id="count"></div>
<div class="controls">
<button class="btn" id="btnMusic" onclick="toggleMusic()">Lo-fi</button>
<button class="btn" id="btnPurr" onclick="togglePurr()">Purr</button>
<button class="btn" onclick="addKitten()">+ Kitten</button>
<button class="btn" onclick="addTreat()">Treat</button>
</div>
<div class="hint" id="hint">click anywhere to pet — <a href="https://sloppy.live">sloppy.live</a></div>

<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
let W, H;
function resize() { W = C.width = window.innerWidth; H = C.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

let mouseX = W/2, mouseY = H/2;
let frame = 0;
let kittens = [];
let hearts = [];
let treats = [];
let steamParticles = [];
let dustMotes = [];
let petFlash = 0;

// Colors for kittens
const KITTEN_COLORS = [
  { body:'#f4a460', ear:'#d4874e', stripe:'#c47035', nose:'#e8967a', name:'Ginger' },
  { body:'#888888', ear:'#666666', stripe:'#555555', nose:'#bbaaaa', name:'Smokey' },
  { body:'#f5deb3', ear:'#e0c8a0', stripe:'#d4b48a', nose:'#f0c0b0', name:'Cream' },
  { body:'#2a2a2a', ear:'#1a1a1a', stripe:'#333333', nose:'#665555', name:'Shadow' },
  { body:'#ff9966', ear:'#e07744', stripe:'#cc6633', nose:'#ffaa88', name:'Peach' },
  { body:'#c0c0c0', ear:'#a0a0a0', stripe:'#b0b0b0', nose:'#ddcccc', name:'Silver' },
  { body:'#deb887', ear:'#c4a06c', stripe:'#b08850', nose:'#e8c0a0', name:'Biscuit' },
  { body:'#444444', ear:'#333333', stripe:'#3a3a3a', nose:'#887777', name:'Cinder' },
];

const KITTEN_NAMES = ['Mochi','Latte','Bean','Noodle','Tofu','Waffle','Pudding','Boba','Sesame','Maple','Cocoa','Chai','Dumpling','Pretzel','Cookie','Truffle'];

function rng(a,b){return a+Math.random()*(b-a)}

function createKitten(x, y) {
  const palette = KITTEN_COLORS[Math.floor(Math.random()*KITTEN_COLORS.length)];
  const name = KITTEN_NAMES[Math.floor(Math.random()*KITTEN_NAMES.length)];
  return {
    x: x || rng(80, W-80),
    y: y || rng(H*0.5, H-100),
    targetX: 0, targetY: 0,
    vx: 0, vy: 0,
    size: 18 + Math.random()*8,
    palette, name,
    state: 'idle', // idle, follow, sleep, play
    stateTimer: 0,
    facing: Math.random()<0.5?-1:1,
    tailPhase: Math.random()*Math.PI*2,
    blinkTimer: 60+Math.random()*120,
    blinking: false,
    purring: false,
    earWiggle: 0,
    pawPhase: 0,
    happiness: 50+Math.random()*30,
    sleepZ: 0
  };
}

function addKitten() {
  if (kittens.length < 12) {
    kittens.push(createKitten());
    playMew();
  }
}

function addTreat() {
  treats.push({ x: mouseX, y: mouseY, life: 300, size: 5 });
  kittens.forEach(k => {
    if (k.state !== 'sleep') {
      k.state = 'follow';
      k.targetX = mouseX + (Math.random()-0.5)*40;
      k.targetY = mouseY + (Math.random()-0.5)*30;
      k.stateTimer = 180;
    }
  });
}

// --- Audio ---
let audioCtx;
function ensureAudio(){ if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)(); return audioCtx; }

// Lo-fi music generator
let musicPlaying = false;
let musicNodes = [];
function toggleMusic() {
  const btn = document.getElementById('btnMusic');
  if (musicPlaying) {
    musicNodes.forEach(n => { try{n.stop()}catch(e){} });
    musicNodes = [];
    musicPlaying = false;
    btn.classList.remove('active');
  } else {
    startLofi();
    musicPlaying = true;
    btn.classList.add('active');
  }
}

function startLofi() {
  const ctx = ensureAudio();
  // Warm pad chord
  const chords = [[261.6,329.6,392],[293.7,349.2,440],[246.9,311.1,370],[261.6,329.6,415.3]];
  let chordIdx = 0;

  function playChord() {
    if (!musicPlaying) return;
    const chord = chords[chordIdx % chords.length];
    chordIdx++;
    chord.forEach(f => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      const filter = ctx.createBiquadFilter();
      o.type = 'sine';
      o.frequency.value = f;
      filter.type = 'lowpass';
      filter.frequency.value = 800;
      g.gain.setValueAtTime(0, ctx.currentTime);
      g.gain.linearRampToValueAtTime(0.018, ctx.currentTime + 0.5);
      g.gain.linearRampToValueAtTime(0.015, ctx.currentTime + 2.5);
      g.gain.linearRampToValueAtTime(0, ctx.currentTime + 4);
      o.connect(filter);
      filter.connect(g);
      g.connect(ctx.destination);
      o.start();
      o.stop(ctx.currentTime + 4);
      musicNodes.push(o);
    });
    setTimeout(playChord, 4000);
  }

  // Soft kick pattern
  function playKick() {
    if (!musicPlaying) return;
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type = 'sine';
    o.frequency.setValueAtTime(80, ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(30, ctx.currentTime + 0.15);
    g.gain.setValueAtTime(0.06, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
    o.connect(g); g.connect(ctx.destination);
    o.start(); o.stop(ctx.currentTime + 0.2);
    musicNodes.push(o);
    const next = Math.random() < 0.7 ? 500 : 750;
    setTimeout(playKick, next);
  }

  // Hi-hat crinkle
  function playHat() {
    if (!musicPlaying) return;
    const buf = ctx.createBuffer(1, ctx.sampleRate * 0.04, ctx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(ctx.sampleRate*0.008));
    const s = ctx.createBufferSource();
    const g = ctx.createGain();
    const f = ctx.createBiquadFilter();
    f.type='highpass'; f.frequency.value=6000;
    s.buffer=buf; g.gain.value=0.02;
    s.connect(f); f.connect(g); g.connect(ctx.destination);
    s.start();
    musicNodes.push(s);
    setTimeout(playHat, 250 + Math.random()*250);
  }

  playChord();
  setTimeout(playKick, 500);
  setTimeout(playHat, 250);
}

// Purr
let purrPlaying = false;
let purrOsc, purrGain;
function togglePurr() {
  const btn = document.getElementById('btnPurr');
  if (purrPlaying) {
    if(purrOsc){purrOsc.stop();purrOsc=null;}
    purrPlaying = false;
    btn.classList.remove('active');
  } else {
    startPurr();
    purrPlaying = true;
    btn.classList.add('active');
  }
}

function startPurr() {
  const ctx = ensureAudio();
  purrOsc = ctx.createOscillator();
  purrGain = ctx.createGain();
  const lfo = ctx.createOscillator();
  const lfoGain = ctx.createGain();
  const filter = ctx.createBiquadFilter();
  purrOsc.type = 'sawtooth';
  purrOsc.frequency.value = 26;
  filter.type = 'lowpass';
  filter.frequency.value = 200;
  lfo.type = 'sine';
  lfo.frequency.value = 26;
  lfoGain.gain.value = 10;
  lfo.connect(lfoGain);
  lfoGain.connect(purrOsc.frequency);
  purrOsc.connect(filter);
  filter.connect(purrGain);
  purrGain.gain.value = 0.04;
  purrGain.connect(ctx.destination);
  purrOsc.start();
  lfo.start();
}

function playMew() {
  const ctx = ensureAudio(); const now = ctx.currentTime;
  const o = ctx.createOscillator(); const g = ctx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(600+Math.random()*200, now);
  o.frequency.linearRampToValueAtTime(800+Math.random()*300, now+0.08);
  o.frequency.linearRampToValueAtTime(500+Math.random()*200, now+0.2);
  g.gain.setValueAtTime(0.05, now);
  g.gain.linearRampToValueAtTime(0, now+0.25);
  o.connect(g); g.connect(ctx.destination);
  o.start(now); o.stop(now+0.25);
}

function playPetSound() {
  const ctx = ensureAudio(); const now = ctx.currentTime;
  const o = ctx.createOscillator(); const g = ctx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(500, now);
  o.frequency.linearRampToValueAtTime(700, now+0.1);
  g.gain.setValueAtTime(0.03, now); g.gain.linearRampToValueAtTime(0, now+0.15);
  o.connect(g); g.connect(ctx.destination);
  o.start(now); o.stop(now+0.15);
}

// --- Input ---
C.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
C.addEventListener('touchmove', e => { e.preventDefault(); mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; }, {passive:false});

C.addEventListener('click', e => {
  // Pet nearest kitten
  let nearest = null, nearDist = 60;
  kittens.forEach(k => {
    const d = Math.hypot(k.x - e.clientX, k.y - e.clientY);
    if (d < nearDist) { nearest = k; nearDist = d; }
  });
  if (nearest) {
    nearest.happiness = Math.min(100, nearest.happiness + 15);
    nearest.purring = true;
    nearest.earWiggle = 10;
    petFlash = 10;
    playPetSound();
    // Hearts
    for (let i = 0; i < 3; i++) {
      hearts.push({
        x: nearest.x + (Math.random()-0.5)*20,
        y: nearest.y - nearest.size,
        vy: -0.8 - Math.random()*0.5,
        vx: (Math.random()-0.5)*0.5,
        life: 50+Math.random()*30,
        maxLife: 80,
        size: 6+Math.random()*4
      });
    }
    if (nearest.state === 'sleep') { nearest.state = 'idle'; nearest.stateTimer = 60; }
  }
  // Hide hint
  document.getElementById('hint').style.opacity = '0';
});

// --- Simulation ---
function simulate() {
  kittens.forEach(k => {
    k.tailPhase += 0.05;
    k.blinkTimer--;
    if (k.blinkTimer <= 0) { k.blinking = true; k.blinkTimer = 80+Math.random()*120; setTimeout(()=>k.blinking=false, 150); }
    if (k.earWiggle > 0) k.earWiggle--;
    k.stateTimer--;

    const distToMouse = Math.hypot(k.x - mouseX, k.y - mouseY);

    // State machine
    if (k.state === 'idle') {
      // Wander slowly
      if (k.stateTimer <= 0) {
        k.targetX = k.x + (Math.random()-0.5)*200;
        k.targetY = Math.max(H*0.45, Math.min(H-60, k.y + (Math.random()-0.5)*100));
        k.stateTimer = 120 + Math.random()*180;
        // Chance to follow mouse
        if (distToMouse < 200 && Math.random() < 0.4) {
          k.state = 'follow'; k.stateTimer = 120+Math.random()*120;
        }
        // Chance to sleep
        if (Math.random() < 0.08) {
          k.state = 'sleep'; k.stateTimer = 300+Math.random()*300;
        }
      }
    } else if (k.state === 'follow') {
      k.targetX = mouseX + (Math.random()-0.5)*60;
      k.targetY = mouseY + 20 + Math.random()*30;
      k.targetY = Math.max(H*0.45, Math.min(H-60, k.targetY));
      if (k.stateTimer <= 0) { k.state = 'idle'; k.stateTimer = 60+Math.random()*120; }
    } else if (k.state === 'sleep') {
      k.sleepZ += 0.02;
      if (k.stateTimer <= 0) { k.state = 'idle'; k.stateTimer = 60; k.sleepZ = 0; }
    }

    // Check for treats
    treats.forEach(t => {
      if (t.life > 0 && Math.hypot(k.x - t.x, k.y - t.y) < 25) {
        t.life = 0;
        k.happiness = Math.min(100, k.happiness + 20);
        k.earWiggle = 8;
        playMew();
      }
    });

    // Movement
    if (k.state !== 'sleep') {
      const dx = k.targetX - k.x;
      const dy = k.targetY - k.y;
      const dist = Math.hypot(dx, dy);
      if (dist > 3) {
        const speed = k.state === 'follow' ? 1.2 : 0.4;
        k.vx += (dx / dist) * speed * 0.08;
        k.vy += (dy / dist) * speed * 0.08;
        k.facing = dx > 0 ? 1 : -1;
        k.pawPhase += 0.08;
      }
      k.vx *= 0.92; k.vy *= 0.92;
      k.x += k.vx; k.y += k.vy;
      k.x = Math.max(40, Math.min(W-40, k.x));
      k.y = Math.max(H*0.4, Math.min(H-40, k.y));
    }

    k.happiness = Math.max(0, k.happiness - 0.005);
    if (distToMouse < 50) k.purring = true;
    else if (Math.random() < 0.01) k.purring = false;
  });

  // Particles
  hearts.forEach(h => { h.x += h.vx; h.y += h.vy; h.life--; });
  hearts = hearts.filter(h => h.life > 0);
  treats = treats.filter(t => t.life > 0);

  // Dust motes
  if (Math.random() < 0.03) {
    dustMotes.push({
      x: Math.random()*W, y: Math.random()*H*0.8,
      vx: (Math.random()-0.5)*0.2, vy: -0.1-Math.random()*0.15,
      life: 200+Math.random()*200, maxLife: 400,
      size: 1+Math.random()*2
    });
  }
  dustMotes.forEach(d => { d.x += d.vx + Math.sin(frame*0.01+d.x*0.01)*0.1; d.y += d.vy; d.life--; });
  dustMotes = dustMotes.filter(d => d.life > 0);

  // Steam from coffee mug
  if (Math.random() < 0.08) {
    steamParticles.push({
      x: 60 + (Math.random()-0.5)*8,
      y: H - 80,
      vx: (Math.random()-0.5)*0.3,
      vy: -0.4-Math.random()*0.3,
      life: 40+Math.random()*40,
      maxLife: 80,
      size: 3+Math.random()*4
    });
  }
  steamParticles.forEach(s => { s.x += s.vx; s.y += s.vy; s.size += 0.02; s.life--; });
  steamParticles = steamParticles.filter(s => s.life > 0);

  if (petFlash > 0) petFlash--;
  document.getElementById('count').textContent = kittens.map(k=>k.name).join(', ');
}

// --- Render ---
function drawKitten(k) {
  ctx.save();
  ctx.translate(k.x, k.y);
  const s = k.size;
  const f = k.facing;
  const p = k.palette;
  const bobY = k.state === 'sleep' ? 0 : Math.sin(k.pawPhase) * 1.5;
  const earWig = Math.sin(frame * 0.3) * k.earWiggle * 0.5;

  // Shadow
  ctx.beginPath();
  ctx.ellipse(0, s*0.4, s*0.8, s*0.15, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,0.08)';
  ctx.fill();

  if (k.state === 'sleep') {
    // Sleeping — curled up
    ctx.beginPath();
    ctx.ellipse(0, 0, s*0.9, s*0.5, 0, 0, Math.PI*2);
    ctx.fillStyle = p.body;
    ctx.fill();
    // Tail curl
    ctx.beginPath();
    ctx.arc(s*0.5, 0, s*0.6, -0.5, 1.5);
    ctx.strokeStyle = p.body;
    ctx.lineWidth = s*0.2;
    ctx.lineCap = 'round';
    ctx.stroke();
    // Head
    ctx.beginPath();
    ctx.arc(-s*0.3, -s*0.15, s*0.35, 0, Math.PI*2);
    ctx.fillStyle = p.body;
    ctx.fill();
    // Ears
    ctx.beginPath();
    ctx.moveTo(-s*0.5, -s*0.35); ctx.lineTo(-s*0.6, -s*0.65); ctx.lineTo(-s*0.35, -s*0.4);
    ctx.fillStyle = p.ear; ctx.fill();
    ctx.beginPath();
    ctx.moveTo(-s*0.15, -s*0.35); ctx.lineTo(-s*0.05, -s*0.65); ctx.lineTo(-s*0.25, -s*0.4);
    ctx.fill();
    // Closed eyes
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.arc(-s*0.4, -s*0.15, 2.5, 0.2, Math.PI-0.2); ctx.stroke();
    ctx.beginPath(); ctx.arc(-s*0.2, -s*0.15, 2.5, 0.2, Math.PI-0.2); ctx.stroke();
    // Zzz
    const za = Math.sin(k.sleepZ);
    ctx.font = `${10+za*2}px Caveat`;
    ctx.fillStyle = `rgba(160,130,110,${0.3+za*0.2})`;
    ctx.fillText('z', -s*0.1-za*5, -s*0.6-za*8);
    ctx.font = `${13+za*3}px Caveat`;
    ctx.fillText('Z', s*0.1-za*3, -s*0.8-za*12);
  } else {
    // Tail
    const tailWag = Math.sin(k.tailPhase) * 15;
    ctx.beginPath();
    ctx.moveTo(-f*s*0.5, 0);
    ctx.quadraticCurveTo(-f*s*0.8, -s*0.3+tailWag*0.02, -f*s*1.0, -s*0.4+Math.sin(k.tailPhase)*s*0.25);
    ctx.strokeStyle = p.body;
    ctx.lineWidth = s*0.15;
    ctx.lineCap = 'round';
    ctx.stroke();

    // Body
    ctx.beginPath();
    ctx.ellipse(0, bobY, s*0.6, s*0.4, 0, 0, Math.PI*2);
    ctx.fillStyle = p.body;
    ctx.fill();

    // Stripes
    for (let i = -1; i <= 1; i++) {
      ctx.beginPath();
      ctx.ellipse(i*s*0.2, bobY - s*0.1, s*0.05, s*0.2, 0.2*i, 0, Math.PI*2);
      ctx.fillStyle = p.stripe + '40';
      ctx.fill();
    }

    // Paws
    const pawBob = Math.sin(k.pawPhase) * 2;
    ctx.fillStyle = p.body;
    ctx.beginPath(); ctx.ellipse(-s*0.3, s*0.35+pawBob, s*0.12, s*0.08, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(s*0.3, s*0.35-pawBob, s*0.12, s*0.08, 0, 0, Math.PI*2); ctx.fill();

    // Head
    ctx.beginPath();
    ctx.arc(f*s*0.35, bobY-s*0.25, s*0.38, 0, Math.PI*2);
    ctx.fillStyle = p.body;
    ctx.fill();

    // Ears
    const hx = f*s*0.35, hy = bobY-s*0.25;
    ctx.beginPath();
    ctx.moveTo(hx-s*0.25, hy-s*0.15+earWig); ctx.lineTo(hx-s*0.3, hy-s*0.55+earWig); ctx.lineTo(hx-s*0.05, hy-s*0.25);
    ctx.fillStyle = p.ear; ctx.fill();
    ctx.beginPath();
    ctx.moveTo(hx+s*0.25, hy-s*0.15-earWig); ctx.lineTo(hx+s*0.3, hy-s*0.55-earWig); ctx.lineTo(hx+s*0.05, hy-s*0.25);
    ctx.fill();
    // Inner ear
    ctx.beginPath();
    ctx.moveTo(hx-s*0.2, hy-s*0.2+earWig); ctx.lineTo(hx-s*0.25, hy-s*0.45+earWig); ctx.lineTo(hx-s*0.08, hy-s*0.25);
    ctx.fillStyle = p.nose+'80'; ctx.fill();
    ctx.beginPath();
    ctx.moveTo(hx+s*0.2, hy-s*0.2-earWig); ctx.lineTo(hx+s*0.25, hy-s*0.45-earWig); ctx.lineTo(hx+s*0.08, hy-s*0.25);
    ctx.fill();

    // Eyes
    if (k.blinking) {
      ctx.strokeStyle = '#333'; ctx.lineWidth = 1;
      ctx.beginPath(); ctx.arc(hx-f*s*0.02-s*0.1, hy-s*0.02, 2.5, 0.2, Math.PI-0.2); ctx.stroke();
      ctx.beginPath(); ctx.arc(hx-f*s*0.02+s*0.1, hy-s*0.02, 2.5, 0.2, Math.PI-0.2); ctx.stroke();
    } else {
      // Eye whites
      ctx.fillStyle = '#ffe8d0';
      ctx.beginPath(); ctx.ellipse(hx-s*0.12, hy-s*0.02, s*0.09, s*0.08, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(hx+s*0.12, hy-s*0.02, s*0.09, s*0.08, 0, 0, Math.PI*2); ctx.fill();
      // Pupils (look toward mouse)
      const lookX = (mouseX - k.x) * 0.01;
      const lookY = (mouseY - k.y) * 0.01;
      ctx.fillStyle = '#2a2a2a';
      ctx.beginPath(); ctx.arc(hx-s*0.12+lookX, hy-s*0.02+lookY, s*0.05, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(hx+s*0.12+lookX, hy-s*0.02+lookY, s*0.05, 0, Math.PI*2); ctx.fill();
      // Eye shine
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(hx-s*0.1, hy-s*0.05, 1.2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(hx+s*0.14, hy-s*0.05, 1.2, 0, Math.PI*2); ctx.fill();
    }

    // Nose
    ctx.fillStyle = p.nose;
    ctx.beginPath();
    ctx.moveTo(hx+f*s*0.18, hy+s*0.08);
    ctx.lineTo(hx+f*s*0.14, hy+s*0.12);
    ctx.lineTo(hx+f*s*0.22, hy+s*0.12);
    ctx.fill();

    // Whiskers
    ctx.strokeStyle = '#ccc';
    ctx.lineWidth = 0.5;
    const wx = hx+f*s*0.18, wy = hy+s*0.1;
    for (let i = -1; i <= 1; i++) {
      ctx.beginPath();
      ctx.moveTo(wx, wy + i*3);
      ctx.lineTo(wx + f*s*0.5, wy + i*5);
      ctx.stroke();
    }

    // Purr indicator
    if (k.purring) {
      ctx.font = '10px Caveat';
      ctx.fillStyle = `rgba(200,160,140,${0.4+Math.sin(frame*0.1)*0.2})`;
      ctx.fillText('~purr~', hx - 15, hy - s*0.5);
    }
  }

  // Name
  ctx.font = '12px Caveat';
  ctx.fillStyle = 'rgba(139,94,60,0.5)';
  ctx.textAlign = 'center';
  ctx.fillText(k.name, 0, s*0.7);

  ctx.restore();
}

function render() {
  // Warm cafe background
  const bgGrad = ctx.createLinearGradient(0, 0, 0, H);
  bgGrad.addColorStop(0, '#f5ebe0');
  bgGrad.addColorStop(0.6, '#eddcd2');
  bgGrad.addColorStop(1, '#e3c9b8');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  // Warm sunlight beam
  ctx.save();
  ctx.globalAlpha = 0.04 + Math.sin(frame*0.005)*0.01;
  ctx.fillStyle = '#ffd080';
  ctx.beginPath();
  ctx.moveTo(W*0.6, 0); ctx.lineTo(W*0.3, H); ctx.lineTo(W*0.7, H); ctx.lineTo(W*0.8, 0);
  ctx.fill();
  ctx.restore();

  // Floor line
  ctx.strokeStyle = '#d4b8a0';
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, H*0.85); ctx.lineTo(W, H*0.85); ctx.stroke();

  // Window (background)
  const winX = W - 120, winY = 80;
  ctx.fillStyle = '#c8e6f0';
  ctx.fillRect(winX, winY, 80, 100);
  ctx.strokeStyle = '#b8a090';
  ctx.lineWidth = 3;
  ctx.strokeRect(winX, winY, 80, 100);
  ctx.beginPath(); ctx.moveTo(winX+40, winY); ctx.lineTo(winX+40, winY+100); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(winX, winY+50); ctx.lineTo(winX+80, winY+50); ctx.stroke();

  // Coffee mug
  ctx.fillStyle = '#c89070';
  ctx.beginPath();
  ctx.moveTo(40, H-60); ctx.lineTo(44, H-30); ctx.lineTo(76, H-30); ctx.lineTo(80, H-60);
  ctx.closePath(); ctx.fill();
  ctx.strokeStyle = '#a07050'; ctx.lineWidth = 1.5; ctx.stroke();
  // Handle
  ctx.beginPath(); ctx.arc(82, H-48, 10, -1.2, 1.2); ctx.strokeStyle = '#c89070'; ctx.lineWidth = 3; ctx.stroke();
  // Coffee
  ctx.fillStyle = '#5c3a20';
  ctx.fillRect(44, H-58, 32, 8);

  // Steam
  steamParticles.forEach(s => {
    const a = s.life / s.maxLife;
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
    ctx.fillStyle = `rgba(220,210,200,${a*0.2})`;
    ctx.fill();
  });

  // Dust motes
  dustMotes.forEach(d => {
    const a = d.life / d.maxLife;
    ctx.beginPath();
    ctx.arc(d.x, d.y, d.size, 0, Math.PI*2);
    ctx.fillStyle = `rgba(220,200,170,${a*0.3})`;
    ctx.fill();
  });

  // Treats
  treats.forEach(t => {
    if (t.life <= 0) return;
    ctx.fillStyle = '#d4956a';
    ctx.beginPath();
    ctx.arc(t.x, t.y, t.size, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#a07050';
    ctx.beginPath(); ctx.arc(t.x-1, t.y-1, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(t.x+2, t.y+1, 1, 0, Math.PI*2); ctx.fill();
  });

  // Sort kittens by Y for depth
  const sorted = [...kittens].sort((a,b) => a.y - b.y);
  sorted.forEach(drawKitten);

  // Hearts
  hearts.forEach(h => {
    const a = h.life / h.maxLife;
    const s = h.size * a;
    ctx.fillStyle = `rgba(220,100,120,${a*0.7})`;
    ctx.font = `${s*2}px serif`;
    ctx.textAlign = 'center';
    ctx.fillText('\u2665', h.x, h.y);
  });

  // Pet flash
  if (petFlash > 0) {
    ctx.fillStyle = `rgba(255,240,220,${petFlash * 0.01})`;
    ctx.fillRect(0, 0, W, H);
  }
}

// --- Loop ---
function loop() {
  frame++;
  simulate();
  render();
  requestAnimationFrame(loop);
}

// Init kittens
for (let i = 0; i < 4; i++) addKitten();
loop();
</script>
</body>
