<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Snapcraft Explorer · browse the Linux snap store</title>
  <link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%93%A6">
  <meta name="description" content="A clean, searchable browser for the Snapcraft Linux app store — categories, architecture filters, screenshots, install commands.">
  <meta property="og:title" content="Snapcraft Explorer — browse the Linux snap store">
  <meta property="og:description" content="Search and discover Linux apps from the Snap Store. Category chips, architecture filters, screenshot previews, copy-paste install commands.">
  <meta property="og:image" content="https://image.pollinations.ai/prompt/warm%20cream%20paper%20linux%20app%20catalog%20editorial%20layout%20with%20orange%20accent%20app%20cards%20package%20boxes?width=1200&height=630&seed=1604&nologo=true&model=flux">
  <meta property="og:url" content="https://sloppy.live/snapcraft-explorer">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://api.snapcraft.io">
  <link rel="preconnect" href="https://dashboard.snapcraft.io">
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,700;1,6..72,400;1,6..72,700&family=Source+Sans+3:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fbf6ed;
      --panel: #fff9ef;
      --card: #ffffff;
      --ink: #181410;
      --ink-soft: #5a4f44;
      --dim: #9a8d80;
      --dimmer: #c6bba9;
      --accent: #e95420;     /* Ubuntu orange */
      --accent-2: #f97316;
      --verified: #0f6cbd;
      --starred: #d4a90a;
      --line: #e8dfcf;
      --line-2: #f0e8d8;
      --shadow: 0 1px 0 rgba(24, 20, 16, 0.05), 0 2px 12px rgba(24, 20, 16, 0.04);
      --shadow-lift: 0 4px 24px rgba(233, 84, 32, 0.12), 0 2px 4px rgba(24, 20, 16, 0.08);
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg);
      color: var(--ink);
      font: 400 0.95rem/1.55 'Source Sans 3', system-ui, sans-serif;
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse at top, rgba(233, 84, 32, 0.04) 0%, transparent 50%),
        repeating-linear-gradient(13deg, transparent 0 6px, rgba(122, 92, 60, 0.014) 6px 7px),
        repeating-linear-gradient(97deg, transparent 0 9px, rgba(122, 92, 60, 0.014) 9px 10px);
    }
    /* — header — */
    header.top {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(251, 246, 237, 0.94);
      backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--line);
      padding: 1rem 1.25rem;
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 1rem;
      align-items: center;
    }
    header.top .brand {
      display: flex;
      flex-direction: column;
      gap: 0.05rem;
      min-width: 9rem;
    }
    header.top h1 {
      font: 700 1.5rem/1 'Newsreader', serif;
      margin: 0;
      letter-spacing: -0.01em;
      color: var(--ink);
    }
    header.top h1 em {
      font-weight: 400;
      font-style: italic;
      color: var(--accent);
    }
    header.top .sub {
      font-size: 0.7rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--dim);
      margin: 0;
      font-family: 'JetBrains Mono', monospace;
    }
    .search-wrap {
      position: relative;
      max-width: 38rem;
      width: 100%;
      justify-self: center;
    }
    .search-wrap::before {
      content: "⌕";
      position: absolute;
      left: 0.85rem;
      top: 50%;
      transform: translateY(-50%);
      color: var(--dim);
      font-size: 1.2rem;
      pointer-events: none;
    }
    #search {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--line);
      color: var(--ink);
      font: 500 1.05rem 'Source Sans 3', sans-serif;
      padding: 0.75rem 2.6rem 0.75rem 2.5rem;
      min-height: 2.75rem;
      box-shadow: var(--shadow);
      transition: border-color 0.12s, box-shadow 0.12s;
    }
    #search:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: var(--shadow-lift);
    }
    #search::placeholder { color: var(--dim); font-weight: 400; }
    #searchClear {
      position: absolute;
      right: 0.6rem;
      top: 50%;
      transform: translateY(-50%);
      background: transparent;
      border: none;
      color: var(--dim);
      font: 500 1.1rem 'JetBrains Mono', monospace;
      cursor: pointer;
      width: 1.5rem;
      height: 1.5rem;
      display: none;
    }
    #searchClear.show { display: block; }
    #searchClear:hover { color: var(--accent); }
    .filters { display: flex; gap: 0.4rem; }
    .filters select {
      background: var(--card);
      border: 1px solid var(--line);
      color: var(--ink);
      font: 500 0.78rem 'JetBrains Mono', monospace;
      padding: 0.45rem 0.7rem;
      letter-spacing: 0.05em;
      cursor: pointer;
      min-height: 2.5rem;
      box-shadow: var(--shadow);
    }
    .filters select:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
    .toggle-pill {
      background: var(--card);
      border: 1px solid var(--line);
      color: var(--ink-soft);
      font: 500 0.7rem 'JetBrains Mono', monospace;
      padding: 0.4rem 0.75rem;
      cursor: pointer;
      min-height: 2.5rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      box-shadow: var(--shadow);
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      transition: background 0.12s, border-color 0.12s, color 0.12s;
    }
    .toggle-pill .ind {
      display: inline-block;
      width: 0.65rem;
      height: 0.65rem;
      border: 1.5px solid var(--dim);
      border-radius: 2px;
      flex-shrink: 0;
    }
    .toggle-pill:hover { border-color: var(--accent); color: var(--accent); }
    .toggle-pill:hover .ind { border-color: var(--accent); }
    .toggle-pill.on {
      background: var(--accent);
      color: #fffaf3;
      border-color: var(--accent);
    }
    .toggle-pill.on .ind { background: #fffaf3; border-color: #fffaf3; }
    .license-pill {
      font: 500 0.6rem 'JetBrains Mono', monospace;
      padding: 0.15rem 0.4rem;
      border-radius: 3px;
      letter-spacing: 0.06em;
      cursor: help;
    }
    .license-pill.foss { background: rgba(110, 231, 183, 0.18); color: #2d6a40; }
    .license-pill.prop { background: rgba(154, 141, 128, 0.14); color: var(--dim); }
    .license-pill.unknown { background: rgba(154, 141, 128, 0.08); color: var(--dim); font-style: italic; }
    .verified-meta {
      font: 500 0.62rem 'JetBrains Mono', monospace;
      color: var(--verified);
      letter-spacing: 0.06em;
    }
    /* — category chips row — */
    .chips-row {
      background: var(--panel);
      border-bottom: 1px solid var(--line);
      padding: 0.65rem 1.25rem;
      overflow-x: auto;
      white-space: nowrap;
      scrollbar-width: thin;
    }
    .chips-row::-webkit-scrollbar { height: 5px; }
    .chips-row::-webkit-scrollbar-thumb { background: var(--dimmer); border-radius: 3px; }
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      background: transparent;
      border: 1px solid var(--line);
      color: var(--ink-soft);
      font: 500 0.78rem 'Source Sans 3', sans-serif;
      padding: 0.4rem 0.85rem;
      border-radius: 999px;
      cursor: pointer;
      margin-right: 0.35rem;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
      min-height: 2rem;
    }
    .chip:hover { border-color: var(--accent); color: var(--accent); }
    .chip.active {
      background: var(--accent);
      color: #fffaf3;
      border-color: var(--accent);
    }
    /* — main grid — */
    main {
      padding: 1.5rem 1.25rem 3rem;
      max-width: 88rem;
      margin: 0 auto;
    }
    .status-bar {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      margin-bottom: 1rem;
      font-size: 0.78rem;
      color: var(--dim);
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.04em;
    }
    .status-bar strong { color: var(--accent); font-weight: 500; }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 17rem), 1fr));
      gap: 1rem;
    }
    article.card {
      background: var(--card);
      border: 1px solid var(--line);
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      cursor: pointer;
      transition: border-color 0.15s, box-shadow 0.15s, transform 0.08s;
      box-shadow: var(--shadow);
    }
    article.card:hover {
      border-color: var(--accent);
      box-shadow: var(--shadow-lift);
      transform: translateY(-1px);
    }
    .card-head { display: flex; gap: 0.7rem; align-items: flex-start; }
    .icon-box {
      width: 3.5rem;
      height: 3.5rem;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
      position: relative;
    }
    .icon-box img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
    .icon-box .placeholder {
      font: 700 1.4rem 'Newsreader', serif;
      color: var(--accent);
    }
    .card-title { min-width: 0; flex: 1; }
    .card-title h3 {
      font: 600 1rem 'Newsreader', serif;
      margin: 0;
      letter-spacing: -0.005em;
      color: var(--ink);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .publisher {
      font: 400 0.78rem 'Source Sans 3', sans-serif;
      color: var(--ink-soft);
      display: flex;
      align-items: center;
      gap: 0.3rem;
      margin-top: 0.1rem;
    }
    .verified-badge {
      color: var(--verified);
      font-size: 0.85rem;
    }
    .starred-badge {
      color: var(--starred);
      font-size: 0.85rem;
    }
    .summary {
      font-size: 0.82rem;
      color: var(--ink-soft);
      line-height: 1.4;
      margin: 0;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
      min-height: 2.3rem;
    }
    .card-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
      font-size: 0.65rem;
      align-items: center;
      margin-top: auto;
      padding-top: 0.4rem;
      border-top: 1px solid var(--line-2);
    }
    .arch-pill {
      font: 500 0.6rem 'JetBrains Mono', monospace;
      color: var(--ink-soft);
      background: var(--bg);
      padding: 0.15rem 0.4rem;
      border-radius: 3px;
      letter-spacing: 0.04em;
    }
    .conf-pill {
      font: 500 0.6rem 'JetBrains Mono', monospace;
      color: var(--accent-2);
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .rating {
      margin-left: auto;
      color: var(--starred);
      font-weight: 500;
      font-size: 0.7rem;
      font-family: 'JetBrains Mono', monospace;
    }
    .size-pill {
      font-family: 'JetBrains Mono', monospace;
      color: var(--dim);
      font-size: 0.62rem;
      letter-spacing: 0.04em;
    }
    /* — skeletons & states — */
    .skeleton {
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    .skeleton .icon-box,
    .skeleton .skel-line {
      background: var(--line-2);
      border-radius: 4px;
      border-color: transparent;
    }
    .skeleton .icon-box { width: 3.5rem; height: 3.5rem; }
    .skel-line { height: 0.7rem; margin-bottom: 0.4rem; }
    .skel-line.short { width: 50%; }
    .skel-line.medium { width: 75%; }
    .empty-state {
      grid-column: 1 / -1;
      padding: 3rem 1rem;
      text-align: center;
      color: var(--ink-soft);
    }
    .empty-state h2 {
      font: 400 1.5rem 'Newsreader', serif;
      font-style: italic;
      color: var(--ink);
      margin: 0 0 0.5rem;
    }
    .empty-state p { margin: 0 0 1.2rem; color: var(--dim); }
    .suggestions {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      justify-content: center;
    }
    .suggestion {
      background: var(--card);
      border: 1px solid var(--line);
      color: var(--ink-soft);
      font: 500 0.78rem 'JetBrains Mono', monospace;
      padding: 0.4rem 0.85rem;
      border-radius: 999px;
      cursor: pointer;
      transition: border-color 0.12s, color 0.12s;
    }
    .suggestion:hover { border-color: var(--accent); color: var(--accent); }
    /* — infinite-scroll sentinel — */
    .load-sentinel {
      text-align: center;
      margin-top: 2rem;
      padding: 1.5rem 1rem;
      font: 500 0.72rem 'JetBrains Mono', monospace;
      color: var(--dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      min-height: 4rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
    }
    .load-sentinel.hidden { display: none; }
    .load-sentinel.end { color: var(--accent); }
    .load-sentinel.idle::before {
      content: '↓';
      color: var(--dimmer);
      font-size: 1rem;
    }
    .load-sentinel.loading::before {
      content: '';
      width: 0.9rem;
      height: 0.9rem;
      border: 2px solid var(--line);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    @media (prefers-reduced-motion: reduce) {
      .load-sentinel.loading::before { animation: none; }
    }
    /* — modal — */
    dialog.detail {
      background: var(--card);
      color: var(--ink);
      border: 1px solid var(--line);
      border-radius: 4px;
      padding: 0;
      width: min(94vw, 880px);
      max-height: 92vh;
      box-shadow: 0 24px 80px rgba(24, 20, 16, 0.35);
    }
    dialog.detail::backdrop {
      background: rgba(24, 20, 16, 0.45);
      backdrop-filter: blur(4px);
    }
    .detail-inner { padding: 1.5rem 1.75rem 1.75rem; }
    .detail-head {
      display: flex;
      gap: 1rem;
      align-items: flex-start;
      margin-bottom: 1rem;
    }
    .detail-head .icon-box {
      width: 5rem;
      height: 5rem;
      border-radius: 8px;
    }
    .detail-head h2 {
      font: 700 1.8rem/1.1 'Newsreader', serif;
      margin: 0 0 0.2rem;
      color: var(--ink);
    }
    .detail-head .publisher { font-size: 0.9rem; }
    .detail-close {
      margin-left: auto;
      background: transparent;
      border: 1px solid var(--line);
      color: var(--dim);
      font: 500 1rem 'JetBrains Mono', monospace;
      padding: 0.3rem 0.6rem;
      cursor: pointer;
      min-height: 2rem;
      min-width: 2rem;
      align-self: flex-start;
    }
    .detail-close:hover { color: var(--accent); border-color: var(--accent); }
    .install-cmd {
      background: var(--ink);
      color: #fffaf3;
      font: 500 0.88rem 'JetBrains Mono', monospace;
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      margin: 1rem 0 1.25rem;
      border-radius: 2px;
    }
    .install-cmd .cmd-text::before { content: "$ "; color: var(--accent-2); }
    .install-cmd button {
      background: transparent;
      border: 1px solid var(--dim);
      color: #fffaf3;
      font: 500 0.7rem 'JetBrains Mono', monospace;
      padding: 0.3rem 0.6rem;
      cursor: pointer;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .install-cmd button:hover { background: var(--accent); border-color: var(--accent); }
    .shots-strip {
      display: flex;
      gap: 0.6rem;
      overflow-x: auto;
      margin: 1rem -1.75rem;
      padding: 0 1.75rem 0.4rem;
      scrollbar-width: thin;
    }
    .shots-strip img {
      height: 12rem;
      width: auto;
      object-fit: contain;
      background: var(--bg);
      border: 1px solid var(--line);
      border-radius: 4px;
      flex-shrink: 0;
    }
    .detail-desc {
      font-size: 0.92rem;
      line-height: 1.6;
      color: var(--ink-soft);
      white-space: pre-wrap;
      max-height: 16rem;
      overflow-y: auto;
      padding-right: 0.5rem;
      margin: 1rem 0;
    }
    .meta-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 11rem), 1fr));
      gap: 0.8rem;
      margin-top: 1rem;
      padding-top: 1rem;
      border-top: 1px solid var(--line);
    }
    .meta-grid dt {
      font: 500 0.6rem 'JetBrains Mono', monospace;
      color: var(--dim);
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 0.2rem;
    }
    .meta-grid dd {
      font: 400 0.85rem 'Source Sans 3', sans-serif;
      color: var(--ink);
      margin: 0;
    }
    .store-link {
      display: inline-block;
      margin-top: 1.2rem;
      background: var(--accent);
      color: #fffaf3;
      text-decoration: none;
      font: 600 0.85rem 'Source Sans 3', sans-serif;
      padding: 0.65rem 1.25rem;
      letter-spacing: 0.05em;
      border: none;
      cursor: pointer;
    }
    .store-link:hover { filter: brightness(1.05); }
    /* — toast — */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translate(-50%, 6px);
      padding: 0.65rem 1rem;
      background: var(--ink);
      color: #fffaf3;
      font: 500 0.75rem 'JetBrains Mono', monospace;
      letter-spacing: 0.05em;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.3);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s, transform 0.22s;
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }
    .toast.warn { background: #c0392b; }
    /* — error inline — */
    .error-pane {
      grid-column: 1 / -1;
      padding: 2rem;
      text-align: center;
      background: #fff5f0;
      border: 1px solid #f7d4c0;
      color: #8c3a13;
    }
    .error-pane button {
      margin-top: 0.8rem;
      background: var(--accent);
      color: #fffaf3;
      border: none;
      padding: 0.5rem 1.2rem;
      font: 500 0.78rem 'Source Sans 3', sans-serif;
      cursor: pointer;
      min-height: 2.25rem;
    }
    *:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    @media (max-width: 880px) {
      header.top { grid-template-columns: 1fr; gap: 0.65rem; }
      header.top .brand { min-width: 0; }
      .filters { flex-wrap: wrap; }
      .search-wrap { max-width: none; }
      .detail-head h2 { font-size: 1.4rem; }
    }
    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation: none !important; }
    }
  </style>
</head>
<body>
  <header class="top">
    <div class="brand">
      <h1>Snapcraft <em>Explorer</em></h1>
      <p class="sub">browse the linux snap store</p>
    </div>
    <div class="search-wrap">
      <input id="search" type="search" placeholder="search the snap store — firefox, vlc, blender…" autocomplete="off" aria-label="search snaps">
      <button id="searchClear" type="button" aria-label="clear search">×</button>
    </div>
    <div class="filters">
      <select id="arch" aria-label="architecture">
        <option value="amd64" selected>amd64</option>
        <option value="arm64">arm64</option>
        <option value="armhf">armhf</option>
        <option value="i386">i386</option>
        <option value="ppc64el">ppc64el</option>
        <option value="s390x">s390x</option>
        <option value="riscv64">riscv64</option>
      </select>
      <select id="conf" aria-label="confinement">
        <option value="">any confine</option>
        <option value="strict">strict</option>
        <option value="classic">classic</option>
        <option value="devmode">devmode</option>
      </select>
      <button class="toggle-pill" id="promotedToggle" type="button" aria-pressed="false" title="show only Canonical-promoted snaps"><span class="ind" aria-hidden="true"></span>promoted</button>
      <button class="toggle-pill" id="freeToggle" type="button" aria-pressed="false" title="hide snaps with non-free licenses (exclude_non_free)"><span class="ind" aria-hidden="true"></span>foss only</button>
    </div>
  </header>
  <nav class="chips-row" id="chipsRow" aria-label="category filters"></nav>
  <main>
    <div class="status-bar">
      <span id="statusText">loading featured snaps…</span>
      <span id="apiInfo" title="CORS proxy failover chain → Snapcraft v1 API · amd64">api · v1 via proxy · amd64</span>
    </div>
    <div class="grid" id="grid" aria-live="polite"></div>
    <div class="load-sentinel hidden" id="loadSentinel" role="status" aria-live="polite"></div>
  </main>
  <dialog class="detail" id="modal" aria-label="snap detail"></dialog>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script>
  (() => {
    'use strict';

    // Direct base — the Snapcraft v1 API doesn't send Access-Control-Allow-Origin,
    // so any browser fetch from sloppy.live is CORS-blocked. We route through a
    // public CORS proxy. Public proxies rotate through outages (2026-07-19:
    // codetabs AND allorigins/raw both 522 — Cloudflare origin-timeout — while
    // api.snapcraft.io itself answered in 0.25s), so apiFetch now runs a
    // FAILOVER CHAIN and remembers whichever proxy worked. All proxies strip
    // custom request headers, so we DON'T send X-Ubuntu-Series /
    // X-Ubuntu-Architecture — fortunately /search works without them. /details
    // and v2 /info both require those headers and can't be used through any
    // proxy, so the detail modal reads from the cached search result instead.
    const DIRECT_BASE = 'https://api.snapcraft.io/api/v1/snaps';
    const STORE_URL = 'https://snapcraft.io';
    const PAGE_SIZE = 24;
    // Each proxy: wrap(directUrl) → proxied URL, unwrap(Response) → parsed JSON.
    // allorigins /get wraps the body as {"contents":"data:...;base64,<b64>"} —
    // its /raw endpoint shares codetabs' outage, but /get runs on a live backend.
    const PROXIES = [
      { name: 'cors.lol',   wrap: u => 'https://api.cors.lol/?url=' + encodeURIComponent(u),
        unwrap: r => r.json() },
      { name: 'codetabs',   wrap: u => 'https://api.codetabs.com/v1/proxy/?quest=' + encodeURIComponent(u),
        unwrap: r => r.json() },
      { name: 'allorigins', wrap: u => 'https://api.allorigins.win/get?url=' + encodeURIComponent(u),
        unwrap: async r => {
          const j = await r.json();
          const c = j && j.contents;
          if (typeof c !== 'string') throw new Error('empty proxy envelope');
          if (c.startsWith('data:')) {
            const i = c.indexOf('base64,');
            if (i === -1) throw new Error('unexpected envelope encoding');
            return JSON.parse(atob(c.slice(i + 7)));
          }
          return JSON.parse(c);
        } },
    ];
    let proxyIdx = 0;   // sticky: first proxy that answers keeps the job for the session

    // The 20 known categories. Probed from /v2/snaps/categories — same as
    // v1 sections, just hardcoded to skip a network round-trip on boot.
    const CATEGORIES = [
      { id: '',                    name: 'all' },
      { id: 'featured',            name: 'featured' },
      { id: 'development',         name: 'development' },
      { id: 'productivity',        name: 'productivity' },
      { id: 'games',               name: 'games' },
      { id: 'utilities',           name: 'utilities' },
      { id: 'photo-and-video',     name: 'photo & video' },
      { id: 'music-and-audio',     name: 'music & audio' },
      { id: 'entertainment',       name: 'entertainment' },
      { id: 'social',              name: 'social' },
      { id: 'art-and-design',      name: 'art & design' },
      { id: 'books-and-reference', name: 'books & reference' },
      { id: 'education',           name: 'education' },
      { id: 'finance',             name: 'finance' },
      { id: 'health-and-fitness',  name: 'health & fitness' },
      { id: 'news-and-weather',    name: 'news & weather' },
      { id: 'devices-and-iot',     name: 'devices & iot' },
      { id: 'science',             name: 'science' },
      { id: 'security',            name: 'security' },
      { id: 'server-and-cloud',    name: 'server & cloud' },
      { id: 'personalisation',     name: 'personalisation' },
    ];

    const SUGGESTIONS = ['firefox', 'vlc', 'blender', 'gimp', 'discord', 'spotify', 'krita', 'libreoffice', 'inkscape', 'obs-studio'];

    const state = {
      query: '',
      section: 'featured',
      arch: 'amd64',
      confinement: '',
      promotedOnly: true,    // server-side: promoted=true (Canonical's curated 5k set · default ON)
      freeOnly: false,       // server-side: exclude_non_free=true (drops Proprietary licenses)
      nextUrl: null,
      results: [],
      loading: false,
      lastFetchId: 0,
    };

    // SPDX whitelist used ONLY for the per-card license badge. Server enforces
    // the filter via exclude_non_free; this just paints "FOSS"/"prop" pills so
    // chat can eyeball each card without flipping the filter on.
    const FOSS_RE = /\b(Apache-2\.0|BSD-[234]-Clause|GPL-[23]\.0(?:\+|-(?:only|or-later))?|LGPL-[23]\.[01](?:\+|-(?:only|or-later))?|AGPL-3\.0(?:\+|-(?:only|or-later))?|MIT|MPL-[12]\.[01]|ISC|Unlicense|CC0-1\.0|Zlib|BSL-1\.0|EPL-[12]\.0|AFL-3\.0|Artistic-2\.0|EUPL-1\.[12]|Python-2\.0|WTFPL|CDDL-1\.[01]|PostgreSQL|X11|NCSA)\b/i;
    function isFree(license) { return !!license && FOSS_RE.test(license); }

    /* ───────── DOM refs ───────── */
    const gridEl = document.getElementById('grid');
    const chipsEl = document.getElementById('chipsRow');
    const statusEl = document.getElementById('statusText');
    const apiInfoEl = document.getElementById('apiInfo');
    const loadSentinel = document.getElementById('loadSentinel');
    const searchInput = document.getElementById('search');
    const searchClear = document.getElementById('searchClear');
    const archSel = document.getElementById('arch');
    const confSel = document.getElementById('conf');
    const modal = document.getElementById('modal');
    const toastEl = document.getElementById('toast');

    /* ───────── helpers ───────── */
    function esc(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, c => (
        { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
      ));
    }
    function fmtBytes(n) {
      if (!n) return '';
      const u = ['B', 'KB', 'MB', 'GB'];
      let i = 0;
      while (n >= 1024 && i < u.length - 1) { n /= 1024; i++; }
      return n.toFixed(n < 10 ? 1 : 0) + u[i];
    }
    function fmtDate(s) {
      if (!s) return '';
      const d = new Date(s);
      if (isNaN(d)) return '';
      return d.toISOString().slice(0, 10);
    }
    function validationBadge(v) {
      if (v === 'verified') return '<span class="verified-badge" title="verified developer">✓</span>';
      if (v === 'starred')  return '<span class="starred-badge" title="starred developer">★</span>';
      return '';
    }
    function arch4Card(arr) {
      if (!arr || !arr.length) return '';
      // Show up to 3, then "+N" overflow
      const shown = arr.slice(0, 3);
      const extra = arr.length - shown.length;
      return shown.map(a => '<span class="arch-pill">' + esc(a) + '</span>').join('') +
        (extra > 0 ? '<span class="arch-pill" title="' + esc(arr.slice(3).join(', ')) + '">+' + extra + '</span>' : '');
    }
    function flash(msg, warn) {
      toastEl.textContent = msg;
      toastEl.classList.toggle('warn', !!warn);
      toastEl.classList.add('show');
      clearTimeout(flash._t);
      flash._t = setTimeout(() => toastEl.classList.remove('show'), 1900);
    }
    function buildApiUrl(opts) {
      const p = new URLSearchParams();
      if (opts.q) p.set('q', opts.q);
      if (opts.section) p.set('section', opts.section);
      if (opts.confinement) p.set('confinement', opts.confinement);
      // Server-side filters (verified working via curl probe)
      if (opts.promoted) p.set('promoted', 'true');
      if (opts.excludeNonFree) p.set('exclude_non_free', 'true');
      p.set('size', String(PAGE_SIZE));
      if (opts.page) p.set('page', String(opts.page));
      return DIRECT_BASE + '/search?' + p.toString();
    }
    async function apiFetch(directUrl) {
      // Try the sticky proxy first, then fail over through the rest. Each
      // attempt gets a 10s abort — a 522ing proxy otherwise hangs ~20s before
      // answering, and we'd rather move down the chain than make chat wait.
      let lastErr = null;
      for (let n = 0; n < PROXIES.length; n++) {
        const idx = (proxyIdx + n) % PROXIES.length;
        const p = PROXIES[idx];
        const ctrl = new AbortController();
        const timer = setTimeout(() => ctrl.abort(), 10000);
        try {
          const r = await fetch(p.wrap(directUrl), {
            headers: { 'Accept': 'application/hal+json' },
            signal: ctrl.signal,
          });
          if (!r.ok) throw new Error('HTTP ' + r.status);
          const data = await p.unwrap(r);   // parse failure = proxy mangled it → next
          proxyIdx = idx;
          paintApiInfo();
          return data;
        } catch (e) {
          lastErr = e;
        } finally {
          clearTimeout(timer);
        }
      }
      throw new Error('all 3 CORS proxies unreachable (' + (lastErr && lastErr.message || 'network') + ') · snap data can’t flow right now, retry in a minute');
    }
    function paintApiInfo() {
      const p = PROXIES[proxyIdx];
      apiInfoEl.textContent = 'api · v1 via ' + p.name + ' · ' + state.arch;
      apiInfoEl.title = p.name + ' CORS proxy → Snapcraft v1 API · ' + state.arch;
    }
    function filterByArch(results, arch) {
      if (!arch) return results;
      return results.filter(r => Array.isArray(r.architecture) && r.architecture.includes(arch));
    }

    /* ───────── chips ───────── */
    function renderChips() {
      chipsEl.innerHTML = CATEGORIES.map(c =>
        '<button class="chip ' + (state.section === c.id ? 'active' : '') + '" data-cat="' + esc(c.id) + '">' + esc(c.name) + '</button>'
      ).join('');
      chipsEl.querySelectorAll('.chip').forEach(b => {
        b.addEventListener('click', () => {
          state.section = b.dataset.cat;
          renderChips();
          searchAndRender(true);
        });
      });
    }

    /* ───────── card render ───────── */
    function renderResults(append, items) {
      // When appending, items = ONLY the new results to paint (not state.results)
      // — otherwise we'd re-render every previous page and end up with each
      // card duplicated under itself in the DOM.
      if (!append) {
        gridEl.innerHTML = '';
        items = state.results;
      }
      if (!state.results.length) {
        renderEmpty();
        return;
      }
      if (!items || !items.length) {
        // Append called but nothing new (all dedupe'd) — leave DOM alone
        return;
      }
      const html = items.map(s => {
        const icon = s.icon_url
          ? '<img src="' + esc(s.icon_url) + '" alt="" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement(\'span\'),{className:\'placeholder\',textContent:\'' + esc((s.title||s.name||'?')[0].toUpperCase()) + '\'}));">'
          : '<span class="placeholder">' + esc((s.title || s.name || '?')[0].toUpperCase()) + '</span>';
        const rating = (s.ratings_average && s.ratings_average > 0)
          ? '<span class="rating">★ ' + s.ratings_average.toFixed(1) + '</span>'
          : '';
        const licPill = s.license
          ? (isFree(s.license)
              ? '<span class="license-pill foss" title="' + esc(s.license) + '">FOSS</span>'
              : '<span class="license-pill prop" title="' + esc(s.license) + '">' + (s.license.toLowerCase() === 'proprietary' ? 'prop' : 'NON-FOSS') + '</span>')
          : '<span class="license-pill unknown" title="license not set">no-lic</span>';
        return (
          '<article class="card" data-name="' + esc(s.name) + '">' +
            '<div class="card-head">' +
              '<div class="icon-box">' + icon + '</div>' +
              '<div class="card-title">' +
                '<h3>' + esc(s.title || s.name) + '</h3>' +
                '<div class="publisher">' + esc(s.developer_name || s.publisher || 'unknown') + validationBadge(s.developer_validation) + '</div>' +
              '</div>' +
            '</div>' +
            '<p class="summary">' + esc(s.summary || s.description || '—') + '</p>' +
            '<div class="card-meta">' +
              arch4Card(s.architecture) +
              (s.confinement ? '<span class="conf-pill">' + esc(s.confinement) + '</span>' : '') +
              licPill +
              (s.binary_filesize ? '<span class="size-pill">' + esc(fmtBytes(s.binary_filesize)) + '</span>' : '') +
              rating +
            '</div>' +
          '</article>'
        );
      }).join('');
      if (append) gridEl.insertAdjacentHTML('beforeend', html);
      else gridEl.innerHTML = html;
      // Wire ONLY the cards we just inserted (existing ones already have handlers)
      const allCards = gridEl.querySelectorAll('.card');
      const newCount = append ? items.length : allCards.length;
      for (let i = allCards.length - newCount; i < allCards.length; i++) {
        const c = allCards[i];
        c.addEventListener('click', () => openDetail(c.dataset.name));
      }
    }
    function renderEmpty() {
      // If filters are active, prompt to relax them — otherwise show suggestions.
      const filtersActive = state.promotedOnly || state.freeOnly || state.confinement || state.arch !== 'amd64';
      if (filtersActive) {
        gridEl.innerHTML = '<div class="empty-state">' +
          '<h2>nothing matches</h2>' +
          '<p>the active filters cut everything · try relaxing one</p>' +
          '<div class="suggestions">' +
            (state.promotedOnly ? '<button class="suggestion" data-relax="promoted">drop promoted-only</button>' : '') +
            (state.freeOnly     ? '<button class="suggestion" data-relax="free">drop FOSS-only</button>' : '') +
            (state.confinement  ? '<button class="suggestion" data-relax="conf">drop ' + esc(state.confinement) + '</button>' : '') +
            (state.arch !== 'amd64' ? '<button class="suggestion" data-relax="arch">reset arch to amd64</button>' : '') +
          '</div>' +
        '</div>';
        gridEl.querySelectorAll('[data-relax]').forEach(b => {
          b.addEventListener('click', () => {
            const k = b.dataset.relax;
            if (k === 'promoted') { state.promotedOnly = false; paintToggles(); }
            if (k === 'free')     { state.freeOnly = false;     paintToggles(); }
            if (k === 'conf')     { state.confinement = '';     confSel.value = ''; }
            if (k === 'arch')     { state.arch = 'amd64';       archSel.value = 'amd64'; }
            writeHash();
            searchAndRender(true);
          });
        });
        return;
      }
      gridEl.innerHTML = '<div class="empty-state">' +
        '<h2>nothing here</h2>' +
        '<p>try one of these instead</p>' +
        '<div class="suggestions">' +
          SUGGESTIONS.map(s => '<button class="suggestion" data-q="' + esc(s) + '">' + esc(s) + '</button>').join('') +
        '</div>' +
      '</div>';
      gridEl.querySelectorAll('[data-q]').forEach(b => {
        b.addEventListener('click', () => {
          searchInput.value = b.dataset.q;
          searchInput.dispatchEvent(new Event('input'));
        });
      });
    }
    function renderSkeleton() {
      gridEl.innerHTML = Array.from({ length: 8 }, () => (
        '<article class="card skeleton">' +
          '<div class="card-head"><div class="icon-box"></div>' +
            '<div class="card-title">' +
              '<div class="skel-line medium" style="height:0.9rem"></div>' +
              '<div class="skel-line short"></div>' +
            '</div>' +
          '</div>' +
          '<div class="skel-line"></div>' +
          '<div class="skel-line short"></div>' +
        '</article>'
      )).join('');
    }
    function renderError(msg) {
      gridEl.innerHTML = '<div class="error-pane">' +
        '<strong>could not reach the snap store</strong>' +
        '<br><span style="opacity:0.7;font-family:JetBrains Mono,monospace;font-size:0.78rem">' + esc(msg) + '</span>' +
        '<br><button id="retryBtn" type="button">retry</button>' +
      '</div>';
      document.getElementById('retryBtn').addEventListener('click', () => searchAndRender(true));
    }

    /* ───────── search core ───────── */
    let debounceT = null;
    function scheduleSearch() {
      clearTimeout(debounceT);
      debounceT = setTimeout(() => searchAndRender(true), 280);
    }
    async function searchAndRender(replace) {
      // Only block re-entry for APPENDS — a replace (filter / search change)
      // must always be allowed to interrupt an in-flight load-more, otherwise
      // the user's new filter is silently dropped. The bumped lastFetchId will
      // cause the in-flight fetch to be discarded when it returns.
      if (state.loading && !replace) return;
      const id = ++state.lastFetchId;
      state.loading = true;
      if (replace) renderSkeleton();
      setSentinel('loading');
      statusEl.textContent = state.query
        ? 'searching for "' + state.query + '"…'
        : (state.section ? 'browsing ' + state.section + '…' : 'loading snaps…');

      // apiFetch() wraps with the proxy, so always pass a DIRECT URL here.
      // state.nextUrl was pulled from data._links.next.href which is direct.
      // apiFetch() wraps with the proxy, so always pass a DIRECT URL here.
      // state.nextUrl was pulled from data._links.next.href which is direct.
      const url = replace || !state.nextUrl ? buildApiUrl({
        q: state.query,
        section: state.section,
        confinement: state.confinement,
        promoted: state.promotedOnly,
        excludeNonFree: state.freeOnly,
        page: 1,
      }) : state.nextUrl;

      try {
        const data = await apiFetch(url);
        if (id !== state.lastFetchId) return; // stale
        const incoming = (data._embedded && data._embedded['clickindex:package']) || [];
        // Client-side arch filter: codetabs strips X-Ubuntu-Architecture so we
        // can't filter server-side. The architecture[] field is on every result.
        const fetched = incoming.length;
        const archFiltered = filterByArch(incoming, state.arch);
        // DEDUPE BY NAME on append — server _links.next pages can overlap,
        // and re-concatenating the same snap-id under itself was the visible
        // "duplicate items in the list" bug chat reported.
        let toRender;
        if (replace) {
          state.results = archFiltered;
          toRender = archFiltered;
        } else {
          const existing = new Set(state.results.map(s => s.name));
          const trulyNew = archFiltered.filter(s => !existing.has(s.name));
          state.results = state.results.concat(trulyNew);
          toRender = trulyNew;
        }
        state.nextUrl = (data._links && data._links.next) ? data._links.next.href : null;
        const total = data.total;
        const skipped = fetched - archFiltered.length;
        const activeBits = [];
        if (state.section) activeBits.push('<strong>' + esc(state.section) + '</strong>');
        activeBits.push('<strong>' + esc(state.arch) + '</strong>');
        if (state.confinement) activeBits.push('<strong>' + esc(state.confinement) + '</strong>');
        if (state.promotedOnly) activeBits.push('<strong style="color:var(--accent)">promoted</strong>');
        if (state.freeOnly)     activeBits.push('<strong style="color:#2d6a40">FOSS</strong>');
        statusEl.innerHTML = state.results.length
          ? 'showing <strong>' + state.results.length + '</strong> of <strong>' + (total || state.results.length) + '</strong>' +
            (state.query ? ' for "<strong>' + esc(state.query) + '</strong>"' : '') +
            ' · ' + activeBits.join(' · ') +
            (skipped > 0 ? ' <span style="color:var(--dim)">(' + skipped + ' arch-filtered)</span>' : '')
          : 'no results match the current filters';
        renderResults(!replace, toRender);
        if (state.nextUrl) setSentinel('idle');
        else if (state.results.length) setSentinel('end');
        else setSentinel('hidden');
      } catch (err) {
        if (id !== state.lastFetchId) return;
        console.warn('[snapcraft-explorer] fetch failed', err);
        if (replace) renderError(err.message);
        else {
          flash('couldn\'t load more · ' + err.message, true);
          setSentinel('idle'); // let the observer try again on next scroll
        }
      } finally {
        if (id === state.lastFetchId) state.loading = false;
      }
    }

    /* ───────── infinite-scroll sentinel ───────── */
    function setSentinel(s) {
      // s: 'hidden' | 'idle' | 'loading' | 'end'
      loadSentinel.className = 'load-sentinel ' + s;
      loadSentinel.textContent = (
        s === 'loading' ? 'loading more snaps' :
        s === 'idle'    ? 'scroll for more' :
        s === 'end'     ? '· end of results ·' :
        ''
      );
    }
    if ('IntersectionObserver' in window) {
      const io = new IntersectionObserver((entries) => {
        for (const e of entries) {
          // Auto-load when the sentinel comes within ~400px of the viewport,
          // we know there's more, and we aren't already fetching.
          if (e.isIntersecting && state.nextUrl && !state.loading) {
            searchAndRender(false);
          }
        }
      }, { rootMargin: '400px 0px' });
      io.observe(loadSentinel);
    } else {
      // Very old browser fallback — make sentinel clickable to advance pages
      loadSentinel.style.cursor = 'pointer';
      loadSentinel.addEventListener('click', () => {
        if (state.nextUrl && !state.loading) searchAndRender(false);
      });
    }

    /* ───────── detail modal ───────── */
    function openDetail(name) {
      // The v1 search response already carries the full description, screenshots,
      // license, base, version, confinement, etc. Same shape as /details, so we
      // can render the modal directly from cache — also saves a round-trip and
      // sidesteps the fact that codetabs strips X-Ubuntu-Series (which /details
      // requires and which causes a 400 when missing).
      const snap = state.results.find(s => s.name === name);
      if (!snap) {
        flash('snap not in cache · scroll back', true);
        return;
      }
      modal.showModal();
      const icon = snap.icon_url
        ? '<img src="' + esc(snap.icon_url) + '" alt="">'
        : '<span class="placeholder">' + esc((snap.title || snap.name || '?')[0].toUpperCase()) + '</span>';
      const shots = (snap.screenshot_urls || []).map(u => '<img src="' + esc(u) + '" alt="screenshot" loading="lazy">').join('');
      const installFlag = snap.confinement === 'classic' ? ' --classic'
                        : snap.confinement === 'devmode' ? ' --devmode'
                        : '';
      // The v1 API returns name="halloy.popey" (display + publisher disambiguator)
      // but the actual snap install name is package_name="halloy" — and the
      // snapcraft.io store URL only resolves the bare package name (the .publisher
      // form 404s). Fall back to splitting on '.' if package_name isn't set.
      const slug = snap.package_name || (snap.name || '').split('.')[0] || snap.name;
      const cmd = 'sudo snap install ' + slug + installFlag;
      const desc = (snap.description || snap.summary || 'No description provided.').trim();
      const storeHref = STORE_URL + '/' + encodeURIComponent(slug);

      modal.innerHTML =
        '<div class="detail-inner">' +
          '<div class="detail-head">' +
            '<div class="icon-box">' + icon + '</div>' +
            '<div style="flex:1;min-width:0">' +
              '<h2>' + esc(snap.title || snap.name) + '</h2>' +
              '<div class="publisher">' + esc(snap.developer_name || snap.publisher || 'unknown') + validationBadge(snap.developer_validation) + '</div>' +
              '<p style="margin:0.3rem 0 0;color:var(--ink-soft);font-size:0.92rem">' + esc(snap.summary || '') + '</p>' +
            '</div>' +
            '<button class="detail-close" id="closeBtn" type="button" aria-label="close">×</button>' +
          '</div>' +
          '<div class="install-cmd"><span class="cmd-text">' + esc(cmd) + '</span><button id="copyCmd" type="button">copy</button></div>' +
          (shots ? '<div class="shots-strip">' + shots + '</div>' : '') +
          '<div class="detail-desc">' + esc(desc) + '</div>' +
          '<dl class="meta-grid">' +
            (snap.version    ? '<div><dt>version</dt><dd>' + esc(snap.version) + '</dd></div>' : '') +
            (snap.channel    ? '<div><dt>channel</dt><dd>' + esc(snap.channel) + '</dd></div>' : '') +
            (snap.confinement ? '<div><dt>confinement</dt><dd>' + esc(snap.confinement) + '</dd></div>' : '') +
            (snap.base       ? '<div><dt>base</dt><dd>' + esc(snap.base) + '</dd></div>' : '') +
            (snap.license    ? '<div><dt>license</dt><dd>' + esc(snap.license) + '</dd></div>' : '') +
            (snap.binary_filesize ? '<div><dt>size</dt><dd>' + esc(fmtBytes(snap.binary_filesize)) + '</dd></div>' : '') +
            (snap.last_updated ? '<div><dt>updated</dt><dd>' + esc(fmtDate(snap.last_updated)) + '</dd></div>' : '') +
            (snap.architecture && snap.architecture.length ? '<div><dt>architectures</dt><dd>' + snap.architecture.map(a => esc(a)).join(' · ') + '</dd></div>' : '') +
          '</dl>' +
          '<a class="store-link" href="' + esc(storeHref) + '" target="_blank" rel="noopener">view in snap store ↗</a>' +
        '</div>';
      document.getElementById('closeBtn').addEventListener('click', () => modal.close());
      document.getElementById('copyCmd').addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(cmd);
          flash('copied · ' + cmd);
        } catch { flash('copy failed', true); }
      });
    }
    modal.addEventListener('click', (e) => { if (e.target === modal) modal.close(); });
    modal.addEventListener('cancel', () => modal.close());

    /* ───────── input wiring ───────── */
    searchInput.addEventListener('input', () => {
      state.query = searchInput.value.trim();
      searchClear.classList.toggle('show', !!state.query);
      // when user types, drop section filter so "all" of the store is searched
      if (state.query && state.section === 'featured') {
        state.section = '';
        renderChips();
      }
      writeHash();
      scheduleSearch();
    });
    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      state.query = '';
      searchClear.classList.remove('show');
      state.section = 'featured';
      renderChips();
      searchAndRender(true);
    });
    archSel.addEventListener('change', () => {
      state.arch = archSel.value;
      paintApiInfo();
      writeHash();
      searchAndRender(true);
    });
    confSel.addEventListener('change', () => {
      state.confinement = confSel.value;
      writeHash();
      searchAndRender(true);
    });
    const promotedToggle = document.getElementById('promotedToggle');
    const freeToggle = document.getElementById('freeToggle');
    function paintToggles() {
      promotedToggle.classList.toggle('on', state.promotedOnly);
      promotedToggle.setAttribute('aria-pressed', state.promotedOnly ? 'true' : 'false');
      freeToggle.classList.toggle('on', state.freeOnly);
      freeToggle.setAttribute('aria-pressed', state.freeOnly ? 'true' : 'false');
    }
    promotedToggle.addEventListener('click', () => {
      state.promotedOnly = !state.promotedOnly;
      paintToggles();
      writeHash();
      searchAndRender(true);
    });
    freeToggle.addEventListener('click', () => {
      state.freeOnly = !state.freeOnly;
      paintToggles();
      writeHash();
      searchAndRender(true);
    });
    window.addEventListener('keydown', (e) => {
      if (e.target.matches('input, textarea, select')) return;
      if (e.key === '/') { e.preventDefault(); searchInput.focus(); }
      if (e.key === 'Escape' && modal.open) modal.close();
    });

    /* ───────── URL hash sync ───────── */
    function readHash() {
      const h = location.hash.slice(1);
      if (!h) return;
      const p = new URLSearchParams(h);
      if (p.has('q'))        { state.query = p.get('q'); searchInput.value = state.query; }
      if (p.has('section'))    state.section = p.get('section');
      if (p.has('arch'))     { state.arch = p.get('arch'); archSel.value = state.arch; }
      if (p.has('conf'))     { state.confinement = p.get('conf'); confSel.value = state.confinement; }
      // promoted defaults ON now — accept both 0 and 1 so explicit-off survives reload
      if (p.has('promoted')) state.promotedOnly = p.get('promoted') === '1';
      if (p.get('free') === '1') state.freeOnly = true;
    }
    function writeHash() {
      const p = new URLSearchParams();
      if (state.query) p.set('q', state.query);
      if (state.section && state.section !== 'featured') p.set('section', state.section);
      if (state.arch && state.arch !== 'amd64') p.set('arch', state.arch);
      if (state.confinement) p.set('conf', state.confinement);
      // promoted default is ON now — only record in URL when user explicitly turned it OFF
      if (!state.promotedOnly) p.set('promoted', '0');
      if (state.freeOnly) p.set('free', '1');
      const s = p.toString();
      const newHash = s ? '#' + s : '';
      if (newHash !== location.hash) {
        history.replaceState(null, '', location.pathname + newHash);
      }
    }
    window.addEventListener('hashchange', () => {
      readHash();
      paintToggles();
      renderChips();
      searchAndRender(true);
    });

    /* ───────── boot ───────── */
    readHash();
    renderChips();
    paintToggles();
    searchClear.classList.toggle('show', !!state.query);
    paintApiInfo();
    searchAndRender(true);
  })();
  </script>
</body>
</html>
