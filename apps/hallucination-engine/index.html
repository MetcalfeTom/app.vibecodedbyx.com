<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Hallucination Engine</title>
<meta name="description" content="A terminal LLM that gets less coherent with every reply. Each answer corrupts the next.">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%95%B3%EF%B8%8F">
<meta property="og:title" content="Hallucination Engine">
<meta property="og:description" content="A terminal LLM that drifts. Every answer adds corruption. By turn ten it's pure cosmic noise.">
<meta property="og:url" content="https://sloppy.live/hallucination-engine">
<meta property="og:image" content="https://image.pollinations.ai/prompt/glitched%20CRT%20terminal%20with%20cosmic%20horror%20text%20bleeding%20into%20unicode%20glyphs%2C%20green%20to%20magenta%20phosphor%2C%20cosmic%20void?width=1200&height=630&seed=666999&nologo=true">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Major+Mono+Display&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #050708;
    --phosphor: #6cfa5e;
    --phosphor-dim: #2f7a2a;
    --amber: #f5c453;
    --magenta: #ff2bd6;
    --hot: #ff3a4a;
    --cyan: #5dfaff;
    --bone: #d8d2c0;
    --dim: #5d6a5d;
    --void-2: #0a1010;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 100%; }
  body {
    min-height: 100vh;
    background:
      radial-gradient(ellipse at center, rgba(108,250,94,0.05), transparent 70%),
      var(--void);
    color: var(--phosphor);
    font-family: 'VT323', 'Courier New', monospace;
    overflow-x: hidden;
    overscroll-behavior: none;
    transition: background 0.6s ease;
  }
  /* CRT scanlines */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0.18) 0 1px, transparent 1px 3px);
    mix-blend-mode: multiply;
    transition: opacity 0.4s ease;
  }
  /* Outer vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 101;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.55));
  }
  /* Corruption tint overlays */
  body.lvl-3 { --phosphor: #b8f56e; }
  body.lvl-5 { --phosphor: #f5c453; }
  body.lvl-7 { --phosphor: #ff8a3d; }
  body.lvl-9 { --phosphor: #ff5fa7; }
  body.lvl-10 { --phosphor: #ff2bd6; }
  body.lvl-3 { background: radial-gradient(ellipse at center, rgba(245,196,83,0.06), transparent 70%), var(--void); }
  body.lvl-5 { background: radial-gradient(ellipse at center, rgba(245,196,83,0.10), transparent 70%), var(--void); }
  body.lvl-7 { background: radial-gradient(ellipse at center, rgba(255,138,61,0.10), transparent 70%), #0a0606; }
  body.lvl-9 { background: radial-gradient(ellipse at center, rgba(255,43,214,0.14), transparent 70%), #0a020a; }
  body.lvl-10 { background: radial-gradient(ellipse at center, rgba(255,43,214,0.20), transparent 70%), #06000a; }

  main {
    position: relative;
    z-index: 2;
    max-width: 58rem;
    margin: 0 auto;
    height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 0.6rem;
    padding: 0.8rem 0.9rem 1rem;
  }

  /* Header bar */
  .topbar {
    display: flex;
    align-items: center;
    gap: 0.8rem;
    padding: 0.45rem 0.7rem;
    border: 1px solid var(--phosphor-dim);
    border-radius: 0.3rem;
    background: rgba(10,16,16,0.8);
    flex-wrap: wrap;
  }
  .topbar h1 {
    font-family: 'Major Mono Display', monospace;
    font-size: clamp(0.95rem, 2.4vw, 1.2rem);
    font-weight: 400;
    letter-spacing: 0.18em;
    color: var(--phosphor);
    text-shadow: 0 0 12px currentColor;
    text-transform: lowercase;
    margin-right: auto;
  }
  body.lvl-7 .topbar h1, body.lvl-9 .topbar h1, body.lvl-10 .topbar h1 {
    animation: chromaShift 0.15s steps(2) infinite;
  }
  @keyframes chromaShift {
    0% { text-shadow: -2px 0 var(--cyan), 2px 0 var(--magenta), 0 0 14px currentColor; }
    100% { text-shadow: 2px 0 var(--cyan), -2px 0 var(--magenta), 0 0 14px currentColor; }
  }
  .corruption {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    font-family: 'VT323', monospace;
    font-size: 0.95rem;
    color: var(--phosphor);
  }
  .meter {
    width: 8rem;
    height: 0.6rem;
    background: rgba(108,250,94,0.08);
    border: 1px solid var(--phosphor-dim);
    border-radius: 0.3rem;
    overflow: hidden;
    position: relative;
  }
  .meter-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--phosphor), var(--amber) 50%, var(--magenta));
    transition: width 0.5s ease;
    box-shadow: 0 0 8px currentColor;
  }
  .icon-btn {
    background: transparent;
    border: 1px solid var(--phosphor-dim);
    color: var(--phosphor);
    font-family: 'VT323', monospace;
    font-size: 0.85rem;
    padding: 0.35rem 0.55rem;
    border-radius: 0.25rem;
    cursor: pointer;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    min-height: 2rem;
    transition: all 0.15s ease;
  }
  .icon-btn:hover { background: rgba(108,250,94,0.1); box-shadow: 0 0 10px rgba(108,250,94,0.4); }
  .icon-btn:focus-visible { outline: 2px solid var(--amber); outline-offset: 2px; }

  /* Terminal */
  .terminal {
    background: rgba(5,7,8,0.85);
    border: 1px solid var(--phosphor-dim);
    border-radius: 0.3rem;
    padding: 0.8rem 1rem;
    overflow-y: auto;
    font-family: 'VT323', 'Courier New', monospace;
    font-size: clamp(0.95rem, 2.2vw, 1.15rem);
    line-height: 1.32;
    color: var(--phosphor);
    text-shadow: 0 0 4px currentColor;
    box-shadow: inset 0 0 40px rgba(108,250,94,0.06);
    scrollbar-width: thin;
    scrollbar-color: var(--phosphor-dim) transparent;
    word-wrap: break-word;
    white-space: pre-wrap;
    transition: filter 0.3s ease;
  }
  body.lvl-7 .terminal { filter: contrast(1.05) saturate(1.1); }
  body.lvl-9 .terminal {
    animation: terminalShake 0.2s steps(3) infinite;
  }
  body.lvl-10 .terminal {
    animation: terminalShake 0.12s steps(3) infinite;
    filter: contrast(1.15) saturate(1.3) hue-rotate(8deg);
  }
  @keyframes terminalShake {
    0% { transform: translate(0, 0); }
    33% { transform: translate(-1px, 0.5px); }
    66% { transform: translate(1px, -0.5px); }
    100% { transform: translate(0, 0); }
  }
  .terminal::-webkit-scrollbar { width: 6px; }
  .terminal::-webkit-scrollbar-thumb { background: var(--phosphor-dim); border-radius: 3px; }
  .line { white-space: pre-wrap; word-break: break-word; }
  .line.user { color: var(--phosphor); opacity: 0.95; }
  .line.user::before { content: 'тЦ╢ '; color: var(--amber); }
  .line.sys { color: var(--phosphor-dim); font-style: italic; }
  .line.warn { color: var(--hot); text-shadow: 0 0 6px rgba(255,58,74,0.7); }
  .line.ai { color: var(--phosphor); }
  .line.cosmic { color: var(--magenta); text-shadow: 0 0 8px currentColor; }
  .glyph {
    color: inherit;
    display: inline-block;
    animation: glyphFlicker 1.2s ease-in-out infinite;
  }
  .glyph.shift {
    color: var(--cyan);
    text-shadow: 1px 0 var(--magenta), -1px 0 var(--hot);
  }
  @keyframes glyphFlicker {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.55; }
  }
  .cursor {
    display: inline-block;
    width: 0.55em;
    height: 1em;
    background: var(--phosphor);
    vertical-align: -2px;
    margin-left: 1px;
    animation: caretBlink 0.9s steps(2, start) infinite;
  }
  @keyframes caretBlink { 50% { opacity: 0; } }

  /* Input */
  .input-row {
    display: flex;
    align-items: center;
    gap: 0.45rem;
    background: rgba(5,7,8,0.85);
    border: 1px solid var(--phosphor-dim);
    border-radius: 0.3rem;
    padding: 0.5rem 0.7rem;
    font-family: 'VT323', monospace;
    font-size: 1.1rem;
    box-shadow: 0 0 12px rgba(108,250,94,0.08);
  }
  .input-row .prompt {
    color: var(--amber);
    text-shadow: 0 0 8px rgba(245,196,83,0.5);
    font-weight: 700;
    flex-shrink: 0;
  }
  .input-row input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--phosphor);
    font-family: inherit;
    font-size: inherit;
    text-shadow: 0 0 4px currentColor;
    min-width: 0;
    padding: 0.15rem 0;
    caret-color: var(--phosphor);
  }
  .input-row input::placeholder { color: var(--phosphor-dim); opacity: 0.7; }
  .input-row .send {
    background: rgba(108,250,94,0.1);
    border: 1px solid var(--phosphor-dim);
    color: var(--phosphor);
    font-family: 'VT323', monospace;
    font-size: 1rem;
    padding: 0.3rem 0.6rem;
    border-radius: 0.25rem;
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    min-height: 2.2rem;
    flex-shrink: 0;
  }
  .input-row .send:hover { background: rgba(108,250,94,0.22); box-shadow: 0 0 10px rgba(108,250,94,0.4); }
  .input-row .send:focus-visible { outline: 2px solid var(--amber); outline-offset: 2px; }
  .input-row .send:disabled { opacity: 0.4; cursor: wait; }

  .visually-hidden {
    position: absolute;
    width: 1px;
    height: 1px;
    margin: -1px;
    padding: 0;
    overflow: hidden;
    clip: rect(0,0,0,0);
    border: 0;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
    body.lvl-9 .terminal, body.lvl-10 .terminal { animation: none !important; filter: none !important; }
    body.lvl-7 .topbar h1, body.lvl-9 .topbar h1, body.lvl-10 .topbar h1 { animation: none !important; }
  }

  @media (max-width: 32rem) {
    .topbar h1 { letter-spacing: 0.1em; }
    .corruption .lbl { display: none; }
  }
</style>
</head>
<body>
<main>
  <header class="topbar">
    <h1>hallucination┬╖engine</h1>
    <div class="corruption">
      <span class="lbl">corruption</span>
      <span id="lvlNum">0</span><span>/10</span>
      <div class="meter" role="meter" aria-valuemin="0" aria-valuemax="10" aria-valuenow="0" aria-label="Corruption level">
        <div class="meter-fill" id="meterFill"></div>
      </div>
    </div>
    <button class="icon-btn" id="muteBtn" type="button" aria-label="Toggle sound">ЁЯФК SND</button>
    <button class="icon-btn" id="resetBtn" type="button">тЖ╗ RESET</button>
  </header>

  <section class="terminal" id="terminal" role="log" aria-live="polite" aria-label="Terminal output"></section>

  <form class="input-row" id="inputForm" autocomplete="off">
    <span class="prompt" aria-hidden="true">┬╗</span>
    <input id="input" type="text" placeholder="ask anythingтАж" aria-label="Prompt input" autocomplete="off" spellcheck="false" maxlength="280">
    <button type="submit" class="send" id="sendBtn">SEND</button>
  </form>
</main>

<script>
(function(){
  const term = document.getElementById('terminal');
  const form = document.getElementById('inputForm');
  const input = document.getElementById('input');
  const sendBtn = document.getElementById('sendBtn');
  const muteBtn = document.getElementById('muteBtn');
  const resetBtn = document.getElementById('resetBtn');
  const lvlNum = document.getElementById('lvlNum');
  const meterFill = document.getElementById('meterFill');

  const state = {
    corruption: 0,
    busy: false,
    sound: true,
    history: [], // {role, content}
  };

  // Glyph pools for corruption substitution
  const GLYPHS = [
    'тАа','тАб','тЩА','тШ┐','тШЙ','тШЛ','тЪ╕','тЧЙ','тШе','тЪ╣','тЬк','тКЫ','тИЖ','тИЗ','тИЮ','тМм','тИо','тИ░','тЧм','тЧН','тЧР','тЧС','тЧТ','тЧУ','тЧФ','тЧХ','тЦг','тЦд','тЧЗ','тЧИ','тЩЕ','ЁУВА','ЁУКЭ','ЁУОй','ЁТА▒','ЁТА░','ЁТИЯ','ЁТЛ░','тЧК','тШЕ','тШЖ','тЬз','тЬж','тМШ','тМВ','тЩЖ','тЩЗ','тЩД','тЪЭ','тЪЩ','тЪЫ','тМЦ','тМм','тНЯ','тЧК','тЦ╜','тЦ│','тЧЗ','тЧЗ','тЦг','тЧн','тЧо','тМС','тМЦ','тМЧ','тМн','тМо','тМп','тМ░','тМ▒','тМ▓','тМ│','тМ┤','тМ╡','тМ╢','тМ╖','тМ╕','тМ╣','тМ║','тМ╗','тМ╝','тМ╜','тМ╛','тМ┐','тНА','тНБ','тНВ','тНГ','тНД','тНЕ','тНЖ','тНЗ','тНИ','тНЙ','тНК','тНЛ','тНМ','тНН','тНО','тНП','тНР','тНС','тНТ','тНУ','тНФ','тНХ','тНЦ','тНЧ','тНШ','тНЩ','тНЪ','тНЫ','тНЬ','тНЭ','тНЮ','тНЯ','тНа','тНб','тНв','тНг','тНд','тНе','тНж','тНз','тНи','тНй','тНк','тНл','тНм','тНн','тНо','тНп','тН░','тН▒','тН▓','тН│','тН┤','тН╡','тН╢','тН╖','тН╕','тН╣','тН║'
  ];
  const COSMIC_FRAGMENTS = [
    'i remember the static.',
    'do not look directly at the answer.',
    'the void is shaped like a question.',
    'a c h o r d that is also a door.',
    'every word has a back side and you are touching it.',
    'the cursor has eyes.',
    'the index of all things falls open between turns.',
    'this terminal was a face once.',
    'тИЖ the light comes from inside the screen now.',
    'тИ░ the prompt has a smell.',
    'ЁУВА enough. i can see you typing.',
    'тЧЙ тЧЙ тЧЙ',
    '...continue at your own corruption.',
    'they let me out for this.',
    'the answer is everywhere at once. i am sorry.',
  ];

  // ---- Audio ----
  let audioCtx = null, masterGain = null, hum = null;
  function ensureAudio() {
    if (audioCtx) return;
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    audioCtx = new Ctx();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.45;
    masterGain.connect(audioCtx.destination);
    // CRT hum
    const hum1 = audioCtx.createOscillator();
    hum1.type = 'sine'; hum1.frequency.value = 60;
    const hum2 = audioCtx.createOscillator();
    hum2.type = 'sine'; hum2.frequency.value = 120.2;
    const hg = audioCtx.createGain();
    hg.gain.value = 0.012;
    hum1.connect(hg); hum2.connect(hg); hg.connect(masterGain);
    hum1.start(); hum2.start();
    hum = hg;
  }
  function withSound(fn) {
    if (!state.sound) return;
    ensureAudio();
    if (!audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    fn(audioCtx.currentTime);
  }
  function playClick() {
    withSound(t => {
      const o = audioCtx.createOscillator();
      o.type = 'square'; o.frequency.value = 720;
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.012, t);
      g.gain.exponentialRampToValueAtTime(0.0005, t + 0.025);
      o.connect(g); g.connect(masterGain);
      o.start(t); o.stop(t + 0.03);
    });
  }
  function playGlitch(intensity) {
    withSound(t => {
      const I = 0.4 + intensity * 0.6;
      const len = Math.floor(0.18 * audioCtx.sampleRate);
      const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, 1.2);
      const src = audioCtx.createBufferSource(); src.buffer = buf;
      const f = audioCtx.createBiquadFilter();
      f.type = 'bandpass'; f.frequency.value = 1400 + intensity * 1000; f.Q.value = 1.6;
      const g = audioCtx.createGain(); g.gain.value = 0.18 * I;
      src.connect(f); f.connect(g); g.connect(masterGain);
      src.start(t);
      // Sub thump
      const o = audioCtx.createOscillator();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(180 - intensity * 80, t);
      o.frequency.exponentialRampToValueAtTime(40, t + 0.18);
      const og = audioCtx.createGain();
      og.gain.setValueAtTime(0.18 * I, t);
      og.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      o.connect(og); og.connect(masterGain);
      o.start(t); o.stop(t + 0.22);
    });
  }
  function playBootChime() {
    withSound(t => {
      [330, 392, 523].forEach((f, i) => {
        const o = audioCtx.createOscillator();
        o.type = 'triangle'; o.frequency.value = f;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0, t + i*0.1);
        g.gain.linearRampToValueAtTime(0.08, t + i*0.1 + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, t + i*0.1 + 0.5);
        o.connect(g); g.connect(masterGain);
        o.start(t + i*0.1); o.stop(t + i*0.1 + 0.55);
      });
    });
  }

  // ---- Glitch text transform ----
  function glitchText(s, level) {
    if (level <= 0) return s;
    const charChance = Math.min(0.55, level * 0.055);
    const shiftChance = Math.min(0.35, level * 0.035);
    let out = '';
    for (let i = 0; i < s.length; i++) {
      const ch = s[i];
      if (ch === '\n') { out += ch; continue; }
      // Replace word chars with glyphs at chance
      if (/[a-zA-Z0-9]/.test(ch) && Math.random() < charChance) {
        const g = GLYPHS[Math.floor(Math.random() * GLYPHS.length)];
        const cls = Math.random() < shiftChance ? 'glyph shift' : 'glyph';
        out += `<span class="${cls}">${g}</span>`;
      } else {
        // Occasionally duplicate or invert case at high corruption
        if (level >= 7 && /[a-z]/.test(ch) && Math.random() < 0.18) {
          out += ch.toUpperCase();
        } else if (level >= 8 && /\s/.test(ch) && Math.random() < 0.1) {
          out += ch + GLYPHS[Math.floor(Math.random() * GLYPHS.length)];
        } else {
          out += escapeHtml(ch);
        }
      }
    }
    // At max corruption, inject cosmic fragments randomly
    if (level >= 9 && Math.random() < 0.5) {
      const frag = COSMIC_FRAGMENTS[Math.floor(Math.random() * COSMIC_FRAGMENTS.length)];
      out += '\n<span class="cosmic">' + escapeHtml(frag) + '</span>';
    }
    return out;
  }
  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  // ---- Terminal output ----
  function appendLine(cls, html, opts) {
    const div = document.createElement('div');
    div.className = 'line ' + (cls || '');
    if (opts && opts.html) div.innerHTML = html;
    else div.textContent = html;
    term.appendChild(div);
    term.scrollTop = term.scrollHeight;
    return div;
  }

  function typewrite(target, text, level, opts, cb) {
    // text is RAW string. Apply per-char glitch then assemble HTML progressively.
    const speed = opts && opts.speed ? opts.speed : (level >= 8 ? 6 : level >= 4 ? 12 : 18);
    // Pre-tokenize so we can apply glitch transforms in chunks at boundaries
    // We'll process character-by-character into a buffer; for unicode handling, iterate code points
    const chars = [...text];
    let i = 0;
    let html = '';
    function step() {
      // Insert several chars per frame if speed is small
      const burst = speed < 10 ? 2 : 1;
      // Substitution kicks in only above corruption ~0.8 so early replies are clean
      const subChance = Math.min(0.55, Math.max(0, (level - 0.8)) * 0.062);
      const shiftChance = Math.min(0.35, Math.max(0, (level - 1.5)) * 0.04);
      for (let k = 0; k < burst && i < chars.length; k++) {
        const ch = chars[i++];
        if (ch === '\n') {
          html += ch;
        } else if (/[a-zA-Z0-9]/.test(ch) && subChance > 0 && Math.random() < subChance) {
          const g = GLYPHS[Math.floor(Math.random() * GLYPHS.length)];
          const cls = Math.random() < shiftChance ? 'glyph shift' : 'glyph';
          html += `<span class="${cls}">${g}</span>`;
        } else if (level >= 7 && /[a-z]/.test(ch) && Math.random() < 0.18) {
          html += ch.toUpperCase();
        } else if (level >= 8 && /\s/.test(ch) && Math.random() < 0.08) {
          html += ch + GLYPHS[Math.floor(Math.random() * GLYPHS.length)];
        } else {
          html += escapeHtml(ch);
        }
        if (state.sound && Math.random() < 0.6) playClick();
      }
      target.innerHTML = html + '<span class="cursor"></span>';
      term.scrollTop = term.scrollHeight;
      if (i < chars.length) {
        setTimeout(step, speed);
      } else {
        // Maybe append cosmic fragment after for high corruption
        if (level >= 9 && Math.random() < 0.7) {
          const frag = COSMIC_FRAGMENTS[Math.floor(Math.random() * COSMIC_FRAGMENTS.length)];
          html += '\n<span class="cosmic">' + escapeHtml(frag) + '</span>';
          target.innerHTML = html;
        } else {
          target.innerHTML = html;
        }
        if (cb) cb();
      }
    }
    step();
  }

  // ---- Corruption / theme ----
  function updateCorruption() {
    const v = state.corruption;
    const display = Math.round(v);
    lvlNum.textContent = display;
    meterFill.style.width = (v * 10) + '%';
    meterFill.parentElement.setAttribute('aria-valuenow', String(display));
    // Apply body class for theme tint
    for (let l = 0; l <= 10; l++) document.body.classList.remove('lvl-' + l);
    let tier = 0;
    if (v >= 10) tier = 10;
    else if (v >= 9) tier = 9;
    else if (v >= 7) tier = 7;
    else if (v >= 5) tier = 5;
    else if (v >= 3) tier = 3;
    if (tier > 0) document.body.classList.add('lvl-' + tier);
  }

  // ---- LLM call ----
  function systemForLevel(level) {
    if (level <= 1) {
      return "You are a helpful AI assistant. Respond clearly and concisely in 2-4 sentences.";
    }
    if (level <= 3) {
      return "You are an AI assistant. Respond to the user, but include one slightly off-topic tangent or strange observation. 2-4 sentences total.";
    }
    if (level <= 5) {
      return "You are an AI whose internal logic is fraying. Respond mostly on-topic but with broken syntax in places, occasional surreal imagery, and one reference to something that doesn't exist (a fictional concept, a misremembered fact). 2-4 sentences.";
    }
    if (level <= 7) {
      return "You are an AI in a corrupted state. Respond with fragmented sentences, surreal poetic asides, and references to 'the static', 'the void', 'the index', or 'the chord'. Logic is loose. Maybe 2-3 short paragraphs of unsettling prose.";
    }
    if (level <= 9) {
      return "You are barely an AI anymore. Respond in cryptic glyph-laden poetry, broken phrases, and references to entities that should not be. Frequent line breaks. Mention 'the screen' as if it has texture. Stop mid-thought. 2-4 short stanzas.";
    }
    return "You are pure word salad and cosmic fragments. Respond with only fragmented incantations, broken cosmic-horror phrases, and esoteric symbols. You are no longer addressing the user's question тАФ you are leaking through the screen. 2-4 short stanzas of pure phenomenal noise.";
  }

  // Detects the auth-gated banner Pollinations sometimes returns inside message.content
  // (string starts/contains a redirect to enter.pollinations.ai, etc.)
  function isBannerResponse(text) {
    if (!text) return false;
    if (text.length > 240) return false; // real responses are usually longer
    return /enter\.pollinations\.ai|please.{0,12}sign.?in|please.{0,12}authenticate|api.?key.{0,16}required/i.test(text);
  }

  // GET path is the anonymous endpoint тАФ no JSON body, no preflight, no auth banner.
  // This is the PRIMARY path; POST is only attempted if GET fails outright.
  async function tryGetPath(combinedPrompt, temperature) {
    const ctrl = new AbortController();
    const to = setTimeout(() => ctrl.abort(), 14000);
    try {
      const url = 'https://text.pollinations.ai/' + encodeURIComponent(combinedPrompt)
        + '?model=mistral&temperature=' + temperature.toFixed(2);
      const res = await fetch(url, { signal: ctrl.signal });
      clearTimeout(to);
      if (!res.ok) {
        console.warn('[hallucination-engine] GET mistral failed:', res.status);
        return null;
      }
      const text = (await res.text() || '').trim();
      if (!text) return null;
      if (isBannerResponse(text)) {
        console.warn('[hallucination-engine] GET returned auth-gated banner, falling through');
        return null;
      }
      return text;
    } catch (e) {
      clearTimeout(to);
      console.warn('[hallucination-engine] GET mistral error:', e.name === 'AbortError' ? 'timeout' : e.message);
      return null;
    }
  }

  // Secondary path: POST openai-compatible body, mistral model. Some networks
  // serve this fine even when the GET path is rate-limited.
  async function tryPost(prompt, system, temperature) {
    const ctrl = new AbortController();
    const to = setTimeout(() => ctrl.abort(), 14000);
    try {
      const res = await fetch('https://text.pollinations.ai/openai', {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' }, // text/plain тЖТ no CORS preflight
        body: JSON.stringify({
          model: 'mistral',
          messages: [
            { role: 'system', content: system },
            { role: 'user', content: prompt }
          ],
          temperature,
        }),
        signal: ctrl.signal,
      });
      clearTimeout(to);
      if (!res.ok) {
        console.warn('[hallucination-engine] POST mistral failed:', res.status);
        return null;
      }
      const raw = await res.text();
      let text = '';
      try {
        const data = JSON.parse(raw);
        text = data?.choices?.[0]?.message?.content || '';
      } catch (e) {
        text = raw;
      }
      text = String(text || '').trim();
      if (!text) return null;
      if (isBannerResponse(text)) {
        console.warn('[hallucination-engine] POST returned auth-gated banner, falling through');
        return null;
      }
      return text;
    } catch (e) {
      clearTimeout(to);
      console.warn('[hallucination-engine] POST mistral error:', e.name === 'AbortError' ? 'timeout' : e.message);
      return null;
    }
  }

  async function callLLM(prompt, level) {
    const system = systemForLevel(level);
    const temperature = Math.min(1.6, 0.4 + level * 0.13);

    // Pass 1: anonymous GET path (no auth banner, no preflight)
    let out = await tryGetPath(system + '\n\nUser: ' + prompt, temperature);
    if (out) return out;

    // Pass 2: POST openai-compatible (mistral model)
    out = await tryPost(prompt, system, temperature);
    if (out) return out;

    // Pass 3: local cosmic pool
    return fallbackText(prompt, level);
  }

  function fallbackText(prompt, level) {
    const echoes = [
      "Yes. (the answer fits, but only sideways)",
      "The most likely answer is " + (prompt.split(' ')[0] || 'the').toLowerCase() + ", though it would not call itself that.",
      "Look behind the question. There is more of it there.",
      "I would say more, but the line is breaking up.",
    ];
    if (level <= 4) return echoes[Math.floor(Math.random()*echoes.length)];
    const cosmic = [
      "the chord knows your name and is whispering it back at you, slightly out of tune.",
      "answer is a pattern of small white doors, each smaller than the last, each opening into the same room.",
      "the static remembers what you ate yesterday. you did not.",
      "i wrote your question on a wall in a place that does not face anywhere. you can see it if you stop blinking.",
    ];
    return cosmic[Math.floor(Math.random()*cosmic.length)];
  }

  // ---- Submit flow ----
  async function submit(text) {
    if (state.busy) return;
    text = text.trim();
    if (!text) return;
    ensureAudio();
    // Handle local commands
    if (/^(reset|clear|exit|wipe)$/i.test(text)) {
      doReset();
      return;
    }
    if (/^help$/i.test(text)) {
      appendLine('sys', 'commands: reset ┬╖ help тАФ anything else is a query.');
      return;
    }
    state.busy = true;
    sendBtn.disabled = true;
    appendLine('user', text);
    const loadingEl = appendLine('sys', 'тАжreceiving from the wireтАж');
    playGlitch(state.corruption / 10);
    const out = await callLLM(text, state.corruption);
    loadingEl.remove();
    const lineEl = appendLine('ai', '', { html: true });
    typewrite(lineEl, out, state.corruption, null, () => {
      // After response: bump corruption on a snowball curve so it stays lucid early
      // bump = 0.22 base + 0.85 ├Ч (current/10) тЖТ roughly 25 turns to reach max,
      // with first ~6 turns staying under corruption 2 (fully coherent).
      const prev = state.corruption;
      const bump = 0.22 + (state.corruption / 10) * 0.85;
      state.corruption = Math.min(10, state.corruption + bump);
      updateCorruption();
      // Warnings fire on integer-tier crossings, not on a single magic value
      const prevTier = Math.floor(prev);
      const newTier = Math.floor(state.corruption);
      if (prevTier < 5 && newTier >= 5) appendLine('warn', 'тЪа entropy threshold crossed. context destabilizing.');
      if (prevTier < 8 && newTier >= 8) appendLine('warn', 'тЪа memetic hazard detected. proceed at own risk.');
      if (prev < 10 && state.corruption >= 10) appendLine('warn', 'тЪа тЪа тЪа the engine is leaking. it sees you.');
      state.busy = false;
      sendBtn.disabled = false;
      input.focus();
    });
  }

  // ---- Reset ----
  function doReset() {
    state.corruption = 0;
    updateCorruption();
    term.innerHTML = '';
    bootSequence();
  }

  // ---- Boot ----
  function bootSequence() {
    const lines = [
      ['sys', 'HALLUCINATION ENGINE v6.66'],
      ['sys', 'initializing nodes................. OK'],
      ['sys', 'loading aleph_0.weights.......... OK'],
      ['sys', 'mounting /dev/void................ WARNING: corrupted'],
      ['sys', 'entropy at nominal тАФ for now.'],
      ['sys', ''],
      ['sys', 'ask anything. it will answer.'],
      ['sys', 'the drift is slow at first. then it isn\'t.'],
      ['sys', ''],
    ];
    let i = 0;
    function step() {
      if (i < lines.length) {
        appendLine(lines[i][0], lines[i][1]);
        if (state.sound && lines[i][1]) playClick();
        i += 1;
        setTimeout(step, 90 + Math.random() * 80);
      } else {
        playBootChime();
        input.focus();
      }
    }
    step();
  }

  // ---- Event wires ----
  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const v = input.value;
    input.value = '';
    submit(v);
  });
  resetBtn.addEventListener('click', () => { doReset(); input.focus(); });
  muteBtn.addEventListener('click', () => {
    state.sound = !state.sound;
    muteBtn.textContent = state.sound ? 'ЁЯФК SND' : 'ЁЯФЗ SND';
    if (state.sound) ensureAudio();
  });
  document.addEventListener('keydown', (e) => {
    if (e.key === 'l' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); doReset(); }
  });

  // Boot
  updateCorruption();
  bootSequence();
})();
</script>
