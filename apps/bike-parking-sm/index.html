<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bike Parking Santa Monica</title>
<link rel="icon" href="https://emojicdn.elk.sh/🚲">
<meta property="og:title" content="Bike Parking Santa Monica">
<meta property="og:description" content="Find the safest bike parking spots in Santa Monica with ratings and tips.">
<meta property="og:url" content="https://sloppy.live/bike-parking-sm">
<meta property="og:image" content="https://sloppy.live/bike-parking-sm/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#f4f1ec;
  min-height:100vh;
  font-family:'Outfit',sans-serif;
  color:#2a2a2a;
  overflow-x:hidden;
}

header{
  background:#fff;
  border-bottom:1px solid #e0ddd6;
  padding:14px 20px;
  display:flex;
  align-items:center;
  gap:12px;
  position:sticky;top:0;z-index:50;
}
header h1{
  font-size:18px;font-weight:700;
  color:#1a6b4a;
  letter-spacing:-0.5px;
}
header .tag{
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;
  background:#e8f5ee;
  color:#1a6b4a;
  padding:3px 8px;
  border-radius:4px;
  letter-spacing:1px;
}

/* Filter bar */
#filters{
  background:#fff;
  border-bottom:1px solid #e0ddd6;
  padding:10px 20px;
  display:flex;gap:8px;
  flex-wrap:wrap;
  align-items:center;
}
.filter-btn{
  border:1px solid #d4d0c8;
  background:#fff;
  border-radius:20px;
  padding:5px 14px;
  font-family:'Outfit',sans-serif;
  font-size:13px;
  color:#555;
  cursor:pointer;
  transition:all 0.15s;
}
.filter-btn:hover{border-color:#1a6b4a;color:#1a6b4a}
.filter-btn.active{background:#1a6b4a;color:#fff;border-color:#1a6b4a}

/* Map area */
#map-wrap{
  position:relative;
  width:100%;
  height:min(60vh,500px);
  background:#e8e4db;
  overflow:hidden;
  cursor:grab;
}
#map-wrap:active{cursor:grabbing}
canvas#map{display:block;width:100%;height:100%}

/* Spot detail panel */
#detail{
  position:fixed;
  bottom:0;left:0;right:0;
  background:#fff;
  border-radius:20px 20px 0 0;
  box-shadow:0 -4px 30px rgba(0,0,0,0.12);
  padding:20px 24px 28px;
  transform:translateY(100%);
  transition:transform 0.3s ease;
  z-index:60;
  max-height:60vh;
  overflow-y:auto;
}
#detail.open{transform:translateY(0)}
#detail .close{
  position:absolute;top:12px;right:16px;
  background:none;border:none;font-size:20px;
  color:#999;cursor:pointer;
}
#detail h2{font-size:20px;font-weight:700;color:#1a6b4a;margin-bottom:4px}
#detail .location{font-size:13px;color:#888;margin-bottom:12px;font-family:'IBM Plex Mono',monospace}
#detail .rating-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
#detail .stars{color:#f59e0b;font-size:18px;letter-spacing:2px}
#detail .rating-label{font-size:13px;color:#666}
#detail .tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
#detail .tags span{
  font-size:11px;background:#f0ede6;color:#666;
  padding:3px 10px;border-radius:12px;
  font-family:'IBM Plex Mono',monospace;
}
#detail .tip-box{
  background:#f8f6f1;
  border-left:3px solid #1a6b4a;
  padding:12px 16px;
  border-radius:0 8px 8px 0;
  margin-bottom:10px;
}
#detail .tip-box h3{font-size:13px;color:#1a6b4a;margin-bottom:4px}
#detail .tip-box p{font-size:13px;color:#555;line-height:1.5}
#detail .meta{font-size:12px;color:#aaa;margin-top:8px;font-family:'IBM Plex Mono',monospace}

/* Spot list */
#list{
  padding:16px 20px;
}
#list h2{
  font-size:15px;font-weight:500;color:#888;
  letter-spacing:2px;text-transform:uppercase;
  margin-bottom:12px;
}
.spot-card{
  background:#fff;
  border:1px solid #e8e4db;
  border-radius:12px;
  padding:14px 16px;
  margin-bottom:10px;
  cursor:pointer;
  transition:all 0.15s;
  display:flex;
  gap:14px;
  align-items:center;
}
.spot-card:hover{border-color:#1a6b4a;box-shadow:0 2px 12px rgba(26,107,74,0.08)}
.spot-card .num{
  width:32px;height:32px;
  border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-family:'IBM Plex Mono',monospace;
  font-size:13px;font-weight:600;
  color:#fff;flex-shrink:0;
}
.spot-card .info{flex:1}
.spot-card .info h3{font-size:15px;font-weight:600;margin-bottom:2px}
.spot-card .info .loc{font-size:12px;color:#999}
.spot-card .safety{
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;font-weight:600;
  padding:4px 10px;border-radius:12px;
  flex-shrink:0;
}

@media(max-width:500px){
  #detail{padding:16px 18px 24px}
  #detail h2{font-size:17px}
  .spot-card{padding:10px 12px}
}
</style>
</head>
<body>

<header>
  <span style="font-size:24px">🚲</span>
  <h1>Bike Parking Santa Monica</h1>
  <span class="tag">24 SPOTS</span>
</header>

<div id="filters">
  <button class="filter-btn active" data-filter="all">All</button>
  <button class="filter-btn" data-filter="5">★ 5 Only</button>
  <button class="filter-btn" data-filter="4">★ 4+</button>

<div id="map-wrap">

<div id="list">

  <div id="spot-list"></div>
</div>

<div id="detail">
  <button class="close" onclick="closeDetail()">✕</button>
  <div id="detail-content"></div>
</div>

<script>

const SPOTS = [

    tips:"Beautiful bluff-top location. Runners and walkers provide natural surveillance. Great for sunset rides. Don't leave after dark.",

    rating:4, type:"rack", capacity:14, covered:false, camera:true, free:true,

    tips:"Art gallery complex with covered racks. Quiet during weekdays. Gallery staff presence deters theft. Avoid late nights.",

    tips:"Exposed beach lot — high theft zone. Only for quick beach visits. Use the heaviest lock you have. Never leave overnight.",
    features:["beach","high-theft","quick-stop-only"] },
  { id:14, name:"Expo Line Station", area:"East SM", x:0.72, y:0.42,
    rating:4, type:"locker", capacity:32, covered:true, camera:true, free:false,
    address:"333 Colorado Ave",
    tips:"Metro bike lockers available via TAP card. $0.05/hr. Fully enclosed individual lockers — very secure for commuters.",
    features:["locker","enclosed","transit","paid","commuter"] },
  { id:15, name:"Civic Center Auditorium", area:"Downtown", x:0.42, y:0.52,
    rating:4, type:"rack", capacity:22, covered:false, camera:true, free:true,
    address:"1855 Main St",
    tips:"City building security cameras. Well-maintained racks. Good for farmer's market visits on Wednesdays and Saturdays.",
    features:["camera","city-building","farmers-market"] },
  { id:16, name:"Santa Monica College", area:"SMC", x:0.70, y:0.65,
    rating:3, type:"rack", capacity:60, covered:false, camera:true, free:true,

  { id:17, name:"The Annenberg Beach House", area:"Beach", x:0.15, y:0.52,
    rating:4, type:"rack", capacity:16, covered:false, camera:true, free:true,

    tips:"Beach community center with lifeguard presence. Good daytime security. Racks visible from the pool deck.",
    features:["beach","lifeguard","daytime","community"] },
  { id:18, name:"Wilshire & 14th", area:"Mid-City", x:0.58, y:0.35,
    rating:5, type:"rack", capacity:10, covered:false, camera:false, free:true,

    features:["hidden-gem","low-theft","quiet","business-hours"] },
  { id:19, name:"Clover Park", area:"South SM", x:0.62, y:0.72,
    rating:3, type:"rack", capacity:12, covered:false, camera:false, free:true,

    rating:2, type:"rack", capacity:8, covered:false, camera:false, free:true,

    features:["busy-road","quick-errand","low-security"] },
  { id:22, name:"Douglas Park", area:"Wilshire", x:0.56, y:0.28,
    rating:4, type:"rack", capacity:14, covered:false, camera:false, free:true,
    address:"2439 Wilshire Blvd",
    tips:"Family park with tennis courts. Active park-goers provide natural security. Best near the playground where parents gather.",
    features:["park","family","natural-surveillance"] },
  { id:23, name:"Main St & Ocean Park", area:"Main St", x:0.46, y:0.78,
    rating:3, type:"corral", capacity:12, covered:false, camera:false, free:true,
    address:"2902 Main St",
    tips:"Street-level corral near restaurants. Good for dinner outings. Area gets quieter after 10pm — retrieve bike by then.",
    features:["dining","street-level","evening"] },
  { id:24, name:"The Bike Kitchen Co-op", area:"East SM", x:0.73, y:0.55,
    rating:5, type:"rack", capacity:8, covered:true, camera:false, free:true,
    address:"Michigan Ave",
    tips:"Community bike co-op — friendliest spot in town. Volunteers keep eyes on racks. Free basic tools available. Lock up, chat, get help.",
    features:["community","co-op","tools","friendly"] },
];

const RATING_COLORS = {
  5:'#16a34a', 4:'#65a30d', 3:'#ca8a04', 2:'#dc2626', 1:'#991b1b'
};
const RATING_LABELS = {
  5:'Excellent', 4:'Good', 3:'Fair', 2:'Risky', 1:'Avoid'
};
const TYPE_LABELS = {
  rack:'Bike Rack', cage:'Bike Cage', valet:'Bike Valet',
  corral:'Bike Corral', locker:'Bike Locker'
};

// State
let activeFilter = 'all';
let selectedSpot = null;

// Filters
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderList();
    drawMap();
  });
});

function filterSpots() {
  return SPOTS.filter(s => {
    if (activeFilter === 'all') return true;
    if (activeFilter === '5') return s.rating === 5;
    if (activeFilter === '4') return s.rating >= 4;
    if (activeFilter === 'covered') return s.covered;
    if (activeFilter === 'camera') return s.camera;
    if (activeFilter === 'free') return s.free;
    return true;
  });
}

// Map
const canvas = document.getElementById('map');
const ctx = canvas.getContext('2d');
let mapW, mapH;

function resizeMap() {
  const wrap = document.getElementById('map-wrap');
  const dpr = window.devicePixelRatio || 1;
  mapW = wrap.clientWidth;
  mapH = wrap.clientHeight;
  canvas.width = mapW * dpr;
  canvas.height = mapH * dpr;
  ctx.scale(dpr, dpr);
  drawMap();
}
resizeMap();
window.addEventListener('resize', resizeMap);

function drawMap() {
  ctx.clearRect(0, 0, mapW, mapH);

  // Ocean (left side)
  const oceanGrad = ctx.createLinearGradient(0, 0, mapW * 0.15, 0);
  oceanGrad.addColorStop(0, '#a8d8ea');
  oceanGrad.addColorStop(1, '#c9e4de');
  ctx.fillStyle = oceanGrad;
  ctx.fillRect(0, 0, mapW * 0.12, mapH);

  // Beach strip
  ctx.fillStyle = '#f0e6c8';
  ctx.fillRect(mapW * 0.12, 0, mapW * 0.04, mapH);

  // Land
  ctx.fillStyle = '#e8e4db';
  ctx.fillRect(mapW * 0.16, 0, mapW * 0.84, mapH);

  // Grid streets
  ctx.strokeStyle = 'rgba(200,195,185,0.6)';
  ctx.lineWidth = 1;
  // Horizontal (east-west) streets
  const hStreets = [
    { y:0.15, label:'Montana Ave' },
    { y:0.30, label:'Wilshire Blvd', major:true },
    { y:0.42, label:'Colorado Ave' },
    { y:0.50, label:'Santa Monica Blvd', major:true },
    { y:0.62, label:'Broadway' },
    { y:0.72, label:'Pico Blvd', major:true },
    { y:0.82, label:'Ocean Park Blvd' },
  ];
  for (const st of hStreets) {
    ctx.strokeStyle = st.major ? 'rgba(180,175,165,0.8)' : 'rgba(200,195,185,0.5)';
    ctx.lineWidth = st.major ? 2 : 1;
    ctx.beginPath();
    ctx.moveTo(mapW * 0.16, mapH * st.y);
    ctx.lineTo(mapW, mapH * st.y);
    ctx.stroke();
    // Label
    ctx.fillStyle = st.major ? 'rgba(100,95,85,0.7)' : 'rgba(140,135,125,0.5)';
    ctx.font = `${st.major ? '600' : '400'} ${st.major ? 11 : 9}px 'IBM Plex Mono', monospace`;
    ctx.textAlign = 'left';
    ctx.fillText(st.label, mapW * 0.17, mapH * st.y - 4);
  }

  // Vertical (north-south) streets
  const vStreets = [
    { x:0.20, label:'Ocean Ave', major:true },
    { x:0.30, label:'2nd St' },
    { x:0.38, label:'3rd St' },
    { x:0.46, label:'Main St' },
    { x:0.54, label:'7th St' },
    { x:0.60, label:'Lincoln', major:true },
    { x:0.68, label:'14th St' },
    { x:0.76, label:'20th St' },
  ];
  for (const st of vStreets) {
    ctx.strokeStyle = st.major ? 'rgba(180,175,165,0.8)' : 'rgba(200,195,185,0.5)';
    ctx.lineWidth = st.major ? 2 : 1;
    ctx.beginPath();
    ctx.moveTo(mapW * st.x, 0);
    ctx.lineTo(mapW * st.x, mapH);
    ctx.stroke();
    ctx.save();
    ctx.translate(mapW * st.x + 3, mapH * 0.05);
    ctx.rotate(Math.PI / 2);
    ctx.fillStyle = st.major ? 'rgba(100,95,85,0.6)' : 'rgba(150,145,135,0.4)';
    ctx.font = `${st.major ? 10 : 8}px 'IBM Plex Mono', monospace`;
    ctx.textAlign = 'left';
    ctx.fillText(st.label, 0, 0);
    ctx.restore();
  }

  // PCH / beach labels
  ctx.fillStyle = 'rgba(80,140,180,0.5)';
  ctx.font = "600 10px 'IBM Plex Mono', monospace";
  ctx.textAlign = 'center';
  ctx.fillText('PACIFIC', mapW * 0.06, mapH * 0.45);
  ctx.fillText('OCEAN', mapW * 0.06, mapH * 0.48);

  // Pier shape
  ctx.fillStyle = 'rgba(180,160,120,0.6)';
  ctx.fillRect(mapW * 0.08, mapH * 0.58, mapW * 0.14, mapH * 0.04);
  ctx.fillStyle = 'rgba(120,110,90,0.5)';
  ctx.font = "600 9px 'IBM Plex Mono', monospace";
  ctx.fillText('SM PIER', mapW * 0.15, mapH * 0.61);

  // Draw spots
  const spots = filterSpots();
  for (const spot of spots) {
    const sx = spot.x * mapW;
    const sy = spot.y * mapH;
    const color = RATING_COLORS[spot.rating];
    const isSelected = selectedSpot && selectedSpot.id === spot.id;

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.beginPath();
    ctx.arc(sx + 1, sy + 1, isSelected ? 14 : 10, 0, Math.PI * 2);
    ctx.fill();

    // Outer ring
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(sx, sy, isSelected ? 14 : 10, 0, Math.PI * 2);
    ctx.fill();

    // Inner
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(sx, sy, isSelected ? 10 : 6, 0, Math.PI * 2);
    ctx.fill();

    // Number
    ctx.fillStyle = color;
    ctx.font = `700 ${isSelected ? 11 : 9}px 'IBM Plex Mono', monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(spot.id, sx, sy + 0.5);

    // Pulse ring for selected
    if (isSelected) {
      ctx.strokeStyle = color + '55';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(sx, sy, 20, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  ctx.textBaseline = 'alphabetic';
}

// Map click
canvas.addEventListener('click', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / rect.width;
  const my = (e.clientY - rect.top) / rect.height;

  const spots = filterSpots();
  let closest = null;
  let closestDist = Infinity;
  for (const s of spots) {
    const d = Math.hypot(s.x - mx, s.y - my);
    if (d < closestDist && d < 0.06) {
      closest = s;
      closestDist = d;
    }
  }
  if (closest) openDetail(closest);
});

// Spot list
const listContainer = document.getElementById('spot-list');

function renderList() {
  const spots = filterSpots();
  listContainer.innerHTML = '';
  // Sort by rating desc
  const sorted = [...spots].sort((a, b) => b.rating - a.rating);
  for (const s of sorted) {
    const card = document.createElement('div');
    card.className = 'spot-card';
    const color = RATING_COLORS[s.rating];
    card.innerHTML = `
      <div class="num" style="background:${color}">${s.id}</div>
      <div class="info">
        <h3>${s.name}</h3>
        <div class="loc">${s.area} · ${TYPE_LABELS[s.type] || s.type}</div>
      </div>
      <div class="safety" style="color:${color};background:${color}15">${'★'.repeat(s.rating)} ${RATING_LABELS[s.rating]}</div>
    `;
    card.addEventListener('click', () => openDetail(s));
    listContainer.appendChild(card);
  }
}
renderList();

// Detail panel
const detailPanel = document.getElementById('detail');
const detailContent = document.getElementById('detail-content');

function openDetail(spot) {
  selectedSpot = spot;
  drawMap();

  const color = RATING_COLORS[spot.rating];
  const stars = '★'.repeat(spot.rating) + '☆'.repeat(5 - spot.rating);

  detailContent.innerHTML = `
    <h2>${spot.name}</h2>
    <div class="location">${spot.address}</div>
    <div class="rating-row">
      <span class="stars" style="color:${color}">${stars}</span>
      <span class="rating-label" style="color:${color}">${RATING_LABELS[spot.rating]} Safety</span>
    </div>
    <div class="tags">
      <span>${TYPE_LABELS[spot.type]}</span>
      <span>Capacity: ${spot.capacity}</span>
      ${spot.covered ? '<span>☂ Covered</span>' : ''}
      ${spot.camera ? '<span>📹 Camera</span>' : ''}
      ${spot.free ? '<span>Free</span>' : '<span>💰 Paid</span>'}
    </div>
    <div class="tip-box">
      <h3>💡 Tips</h3>
      <p>${spot.tips}</p>
    </div>
    <div class="meta">${spot.features.map(f => '#' + f).join('  ')}</div>
  `;
  detailPanel.classList.add('open');

  // Scroll map to center on spot
}

function closeDetail() {
  detailPanel.classList.remove('open');
  selectedSpot = null;
  drawMap();
}
</script>
</body>
</html>
