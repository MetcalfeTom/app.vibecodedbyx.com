<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cursed Spins</title>
<link rel="icon" href="https://emojicdn.elk.sh/🎰">
<meta property="og:title" content="Cursed Spins">
<meta property="og:description" content="Pixel slot machine that pays out in terrifying low-res fortunes">
<meta property="og:url" content="https://sloppy.live/cursed-spins">
<meta property="og:image" content="https://sloppy.live/cursed-spins/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;image-rendering:pixelated}
body{background:#0c0a10;color:#b8a8c8;font-family:'Silkscreen',cursive;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
h1{font-family:'Press Start 2P',monospace;font-size:16px;color:#c45baa;margin:20px 0 4px;text-shadow:2px 2px 0 #000}
.sub{font-size:10px;color:#6a5a7a;margin-bottom:16px}
.machine{background:#1a1420;border:3px solid #3a2a4a;padding:16px;width:min(380px,92vw);position:relative}
.machine::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;box-shadow:inset 0 0 40px rgba(100,30,80,0.15);pointer-events:none}
.crt{position:absolute;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.08) 0px,rgba(0,0,0,0.08) 1px,transparent 1px,transparent 3px);pointer-events:none;z-index:5}

/* Reels */
.reels{display:flex;gap:4px;justify-content:center;margin-bottom:12px;position:relative}
.reel{width:80px;height:80px;background:#0c0810;border:2px solid #2a1a3a;overflow:hidden;position:relative}
.reel canvas{display:block;width:100%;height:100%}
.reel-glow{position:absolute;top:0;left:0;width:100%;height:100%;box-shadow:inset 0 0 12px rgba(196,91,170,0.15);pointer-events:none}

/* Payline */
.payline{position:absolute;top:50%;left:0;right:0;height:2px;background:rgba(196,91,170,0.3);transform:translateY(-1px);z-index:2;display:none}

/* Credits */
.credit-bar{display:flex;justify-content:space-between;padding:8px 0;margin-bottom:10px;font-size:10px;border-bottom:1px solid #2a1a3a}
.credit-bar span{color:#6a5a7a}
.credit-bar .val{color:#c45baa;font-family:'Press Start 2P',monospace;font-size:9px}

/* Spin button */
.spin-btn{width:100%;padding:14px;background:#3a1a3a;border:2px solid #c45baa;color:#c45baa;font-family:'Press Start 2P',monospace;font-size:12px;cursor:pointer;transition:all 0.1s;letter-spacing:1px}
.spin-btn:hover{background:#5a2a5a;box-shadow:0 0 20px rgba(196,91,170,0.3)}
.spin-btn:active{transform:scale(0.97)}
.spin-btn:disabled{opacity:0.4;cursor:default;box-shadow:none}

/* Fortune display */
.fortune-box{margin-top:12px;background:#0c0810;border:2px solid #2a1a3a;padding:12px;min-height:100px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}
.fortune-box::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at center,rgba(80,20,60,0.1),transparent);pointer-events:none}
.fortune-label{font-family:'Press Start 2P',monospace;font-size:7px;color:#6a5a7a;text-transform:uppercase;letter-spacing:2px;margin-bottom:8px}
.fortune-text{font-family:'Press Start 2P',monospace;font-size:9px;color:#c8a8d8;line-height:1.8;text-align:center;max-width:300px}
.fortune-text.cursed{color:#ff4a6a;text-shadow:0 0 8px rgba(255,74,106,0.3)}
.fortune-text.blessed{color:#6ae87a;text-shadow:0 0 8px rgba(106,232,122,0.3)}
.fortune-text.haunted{color:#a86aff;text-shadow:0 0 8px rgba(168,106,255,0.3)}
.fortune-text.doomed{color:#ff6a2a;text-shadow:0 0 8px rgba(255,106,42,0.3)}
.fortune-tier{font-family:'Press Start 2P',monospace;font-size:7px;margin-top:8px;letter-spacing:1px}

/* History */
.history{margin-top:12px;max-height:0;overflow:hidden;transition:max-height 0.3s}
.history.open{max-height:200px}
.history-toggle{width:100%;margin-top:8px;padding:6px;background:none;border:1px solid #2a1a3a;color:#6a5a7a;font-family:'Silkscreen',cursive;font-size:9px;cursor:pointer}
.history-toggle:hover{color:#b8a8c8;border-color:#3a2a4a}
.history-list{font-size:9px;color:#6a5a7a;max-height:160px;overflow-y:auto}
.history-item{padding:4px 0;border-bottom:1px solid #1a1420;display:flex;justify-content:space-between}
.history-item .hi-fortune{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-right:8px}

/* Stats */
.stats{display:flex;gap:12px;margin-top:8px;font-size:9px;justify-content:center}
.stats span{color:#6a5a7a}

.shake{animation:shake 0.3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-3px)}40%{transform:translateX(3px)}60%{transform:translateX(-2px)}80%{transform:translateX(2px)}}
</style>
</head>
<body>
<h1>CURSED SPINS</h1>
<div class="sub">the machine knows your fate</div>
<div class="machine">
  <div class="crt"></div>
  <div class="reels">
    <div class="reel"><canvas id="r0" width="48" height="48"></canvas><div class="reel-glow"></div></div>
    <div class="reel"><canvas id="r1" width="48" height="48"></canvas><div class="reel-glow"></div></div>
    <div class="reel"><canvas id="r2" width="48" height="48"></canvas><div class="reel-glow"></div></div>
    <div class="payline" id="payline"></div>
  </div>
  <div class="credit-bar">
    <span>SOULS <span class="val" id="souls">100</span></span>
    <span>BET <span class="val" id="bet">5</span></span>
    <span>SPINS <span class="val" id="spins">0</span></span>
  </div>
  <button class="spin-btn" id="spin-btn" onclick="spin()">⛧ PULL THE LEVER ⛧</button>
  <div class="fortune-box" id="fortune-box">
    <div class="fortune-label">YOUR FATE AWAITS</div>
    <div class="fortune-text" id="fortune">Insert souls and pull the lever...</div>
  </div>
  <button class="history-toggle" onclick="toggleHistory()">▾ Past Fates</button>
  <div class="history" id="history">
    <div class="history-list" id="history-list"></div>
  </div>
  <div class="stats">
    <span>Cursed: <span id="stat-cursed">0</span></span>
    <span>Doomed: <span id="stat-doomed">0</span></span>
    <span>Haunted: <span id="stat-haunted">0</span></span>
  </div>
</div>

<script>
// Symbols — 8x8 pixel art patterns
var SYMBOLS=[
  {name:'skull',tier:'cursed',pixels:[
    '..XXXX..',
    '.XXXXXX.',
    'XX.XX.XX',
    'XXXXXXXX',
    'XXXXXXXX',
    '.X.XX.X.',
    '..XXXX..',
    '...XX...'
  ],color:'#ff4a6a'},
  {name:'eye',tier:'haunted',pixels:[
    '........',
    '..XXXX..',
    '.XXXXXX.',
    'XXX..XXX',
    'XXX..XXX',
    '.XXXXXX.',
    '..XXXX..',
    '........'
  ],color:'#a86aff'},
  {name:'coffin',tier:'doomed',pixels:[
    '...XX...',
    '..XXXX..',
    '.XXXXXX.',
    '.XXXXXX.',
    '.XXXXXX.',
    '.XXXXXX.',
    '..XXXX..',
    '...XX...'
  ],color:'#ff6a2a'},
  {name:'spider',tier:'cursed',pixels:[
    'X......X',
    '.X.XX.X.',
    '..XXXX..',
    'XXXXXXXX',
    'XXXXXXXX',
    '..XXXX..',
    '.X.XX.X.',
    'X......X'
  ],color:'#ff4a6a'},
  {name:'ghost',tier:'haunted',pixels:[
    '..XXXX..',
    '.XXXXXX.',
    'XX.XX.XX',
    'XXXXXXXX',
    'XXXXXXXX',
    'XXXXXXXX',
    'X.XX.XX.',
    '........'
  ],color:'#c8a8ff'},
  {name:'moon',tier:'doomed',pixels:[
    '..XXXXX.',
    '.XXXX...',
    'XXXX....',
    'XXXX....',
    'XXXX....',
    'XXXX....',
    '.XXXX...',
    '..XXXXX.'
  ],color:'#ffa84a'},
  {name:'bat',tier:'haunted',pixels:[
    '........',
    'XX....XX',
    'XXX..XXX',
    'XXXXXXXX',
    '.XX..XX.',
    '..X..X..',
    '........',
    '........'
  ],color:'#8a6aaa'},
  {name:'candle',tier:'blessed',pixels:[
    '...XX...',
    '..XXXX..',
    '...XX...',
    '...XX...',
    '..XXXX..',
    '..XXXX..',
    '..XXXX..',
    '..XXXX..'
  ],color:'#6ae87a'}
];

// Fortunes by tier
var FORTUNES={
  cursed:[
    "YOUR SHADOW WILL\nDETACH AT MIDNIGHT",
    "ALL MIRRORS WILL\nSHOW SOMEONE ELSE",
    "YOUR TEETH WILL\nHUM A DEAD LANGUAGE",
    "EVERY CLOCK YOU OWN\nWILL RUN BACKWARDS",
    "YOUR REFLECTION\nBLINKS FIRST NOW",
    "STATIC WILL FOLLOW\nYOU INTO SILENCE",
    "SOMETHING LEARNED\nYOUR NAME TODAY",
    "THE FLOOR BELOW\nYOU IS LISTENING",
    "YOUR DREAMS WILL\nBUFFER TONIGHT",
    "DUST MOTES SPELL\nWARNINGS YOU IGNORE",
    "YOUR FOOTSTEPS\nECHO ONE TOO MANY",
    "SOMETHING BOOKMARKED\nYOU LAST NIGHT",
    "YOUR WIFI ROUTER\nKNOWS YOUR FEARS",
    "404: YOUR COURAGE\nWAS NOT FOUND",
    "CTRL+Z CANNOT UNDO\nWHAT YOU SUMMONED"
  ],
  doomed:[
    "ALL YOUR SOCKS\nWILL BECOME DAMP",
    "YOUR NEXT 47 DICE\nROLLS WILL BE 1",
    "AUTOCORRECT WILL\nBETRAY YOU FOREVER",
    "YOUR EARBUDS WILL\nTANGLE IN 4D SPACE",
    "USB WILL NEVER FIT\nON THE FIRST TRY",
    "YOUR FOOD DELIVERY\nGOES TO THE VOID",
    "LOADING... FOREVER.\nNO PROGRESS BAR",
    "YOUR ALARM WILL GAIN\nSENTIENCE AND SPITE",
    "CAPTCHAS WILL BECOME\nINCREASINGLY HOSTILE",
    "YOUR CHARGER WILL\nONLY WORK AT 37°",
    "EVERY ELEVATOR WILL\nSTOP ON EVERY FLOOR",
    "YOUR PLAYLIST WILL\nONLY PLAY ADS",
    "SOFTWARE UPDATES\nWILL FIND YOU"
  ],
  haunted:[
    "A GHOST IS USING\nYOUR NETFLIX ACCOUNT",
    "SPECTRAL HANDS\nRATED YOUR APP 1 STAR",
    "PHANTOM PROCESSES\nCONSUME YOUR RAM",
    "A SPIRIT LIKED YOUR\nPHOTO FROM 2014",
    "DECEASED ANCESTORS\nJOINED YOUR GROUP CHAT",
    "GHOSTS IN THE MACHINE\nFILED YOUR TAXES",
    "AN APPARITION CHANGED\nYOUR DESKTOP WALLPAPER",
    "PARANORMAL ENTITY\nEDITED YOUR WIKI PAGE",
    "POLTERGEIST CLEARED\nYOUR BROWSER HISTORY",
    "THE GHOST IN YOUR\nPHONE NEEDS CHARGING",
    "SPECTRAL FEEDBACK\nIN YOUR MICROPHONE",
    "A WRAITH FORKED\nYOUR REPOSITORY"
  ],
  blessed:[
    "YOUR BUGS WILL\nFIX THEMSELVES",
    "FREE TRIAL EXTENDED\nBY DARK FORCES",
    "YOUR CODE COMPILES\nON FIRST TRY... ONCE",
    "A DEMON WILL HOLD\nTHE DOOR FOR YOU",
    "CURSED LUCK GRANTS\n1 PERFECT PARALLEL\nPARKING ATTEMPT",
    "DARK MAGIC FINDS\nYOU A GOOD PARKING\nSPOT THIS WEEK",
    "THE VOID REMOVES\nONE AD FROM YOUR\nINTERNET FOREVER",
    "A SPECTER WILL\nGUARD YOUR LEFTOVERS"
  ]
};

var souls=100,betAmt=5,totalSpins=0;
var stats={cursed:0,doomed:0,haunted:0,blessed:0};
var historyItems=[];
var spinning=false;
var reelCanvases=[
  document.getElementById('r0').getContext('2d'),
  document.getElementById('r1').getContext('2d'),
  document.getElementById('r2').getContext('2d')
];
var reelResults=[0,0,0];

function drawSymbol(ctx,sym,ox,oy){
  var px=5; // pixel size
  ctx.fillStyle=sym.color;
  for(var r=0;r<sym.pixels.length;r++){
    for(var c=0;c<sym.pixels[r].length;c++){
      if(sym.pixels[r][c]==='X'){
        ctx.fillRect(ox+c*px,oy+r*px,px,px);
      }
    }
  }
}

function drawReel(idx,symIdx,flash){
  var ctx=reelCanvases[idx];
  ctx.fillStyle=flash?'#1a0a20':'#0c0810';
  ctx.fillRect(0,0,48,48);
  var sym=SYMBOLS[symIdx];
  drawSymbol(ctx,sym,4,4);
}

function initReels(){
  for(var i=0;i<3;i++){
    reelResults[i]=Math.floor(Math.random()*SYMBOLS.length);
    drawReel(i,reelResults[i],false);
  }
}

function spin(){
  if(spinning||souls<betAmt)return;
  spinning=true;
  souls-=betAmt;
  totalSpins++;
  updateUI();
  document.getElementById('spin-btn').disabled=true;
  document.getElementById('fortune').textContent='...';
  document.getElementById('fortune').className='fortune-text';
  document.getElementById('payline').style.display='none';

  // Animate reels
  var speeds=[4,4,4];
  var stopTimes=[600,900,1200];
  var stopped=[false,false,false];
  var targets=[
    Math.floor(Math.random()*SYMBOLS.length),
    Math.floor(Math.random()*SYMBOLS.length),
    Math.floor(Math.random()*SYMBOLS.length)
  ];
  var counters=[0,0,0];
  var startTime=Date.now();

  function animateReels(){
    var now=Date.now()-startTime;
    var allDone=true;
    for(var i=0;i<3;i++){
      if(!stopped[i]){
        allDone=false;
        counters[i]++;
        if(counters[i]%3===0){
          var sym=Math.floor(Math.random()*SYMBOLS.length);
          drawReel(i,sym,false);
        }
        if(now>stopTimes[i]){
          stopped[i]=true;
          reelResults[i]=targets[i];
          drawReel(i,targets[i],true);
          setTimeout(function(idx){drawReel(idx,reelResults[idx],false);}.bind(null,i),100);
        }
      }
    }
    if(!allDone){
      requestAnimationFrame(animateReels);
    }else{
      finishSpin();
    }
  }
  requestAnimationFrame(animateReels);
}

function finishSpin(){
  spinning=false;
  document.getElementById('spin-btn').disabled=false;
  document.getElementById('payline').style.display='block';

  // Determine payout tier
  var s0=SYMBOLS[reelResults[0]],s1=SYMBOLS[reelResults[1]],s2=SYMBOLS[reelResults[2]];
  var tier,payout;

  if(s0.name===s1.name&&s1.name===s2.name){
    // Triple match — jackpot tier
    tier=s0.tier;
    payout=s0.tier==='blessed'?50:s0.tier==='cursed'?20:15;
  }else if(s0.tier===s1.tier&&s1.tier===s2.tier){
    // Same tier
    tier=s0.tier;
    payout=10;
  }else if(s0.tier===s1.tier||s1.tier===s2.tier||s0.tier===s2.tier){
    // Partial tier match
    var tiers=[s0.tier,s1.tier,s2.tier];
    var counts={};
    tiers.forEach(function(t){counts[t]=(counts[t]||0)+1;});
    tier=Object.keys(counts).reduce(function(a,b){return counts[a]>counts[b]?a:b;});
    payout=5;
  }else{
    // No match — still get a fortune, just no payout
    var allTiers=['cursed','doomed','haunted','cursed'];
    tier=allTiers[Math.floor(Math.random()*allTiers.length)];
    payout=0;
  }

  // Blessed is very rare payout
  if(tier==='blessed'&&payout<50)payout=Math.max(payout,8);

  souls+=payout;
  stats[tier]=(stats[tier]||0)+1;

  // Pick fortune
  var fortunes=FORTUNES[tier];
  var fortune=fortunes[Math.floor(Math.random()*fortunes.length)];

  // Display
  var fortuneEl=document.getElementById('fortune');
  fortuneEl.textContent=fortune;
  fortuneEl.className='fortune-text '+tier;

  var labelEl=document.querySelector('.fortune-label');
  var tierNames={cursed:'⛧ CURSED ⛧',doomed:'☠ DOOMED ☠',haunted:'👻 HAUNTED 👻',blessed:'✦ DARK BLESSING ✦'};
  labelEl.textContent=tierNames[tier]||tier;

  var tierEl=document.querySelector('.fortune-tier');
  if(!tierEl){
    tierEl=document.createElement('div');
    tierEl.className='fortune-tier';
    document.getElementById('fortune-box').appendChild(tierEl);
  }
  tierEl.style.color=payout>0?'#6ae87a':'#6a5a7a';
  tierEl.textContent=payout>0?'+'+payout+' souls':'no payout';

  // Shake on cursed
  if(tier==='cursed'){
    document.querySelector('.machine').classList.add('shake');
    setTimeout(function(){document.querySelector('.machine').classList.remove('shake');},300);
  }

  // History
  historyItems.unshift({fortune:fortune.replace(/\n/g,' '),tier:tier,payout:payout});
  if(historyItems.length>20)historyItems.pop();
  renderHistory();

  updateUI();

  // Game over
  if(souls<betAmt){
    setTimeout(function(){
      document.getElementById('fortune').textContent="THE MACHINE\nCONSUMED YOUR\nLAST SOUL";
      document.getElementById('fortune').className='fortune-text cursed';
      document.querySelector('.fortune-label').textContent='⛧ GAME OVER ⛧';
      document.getElementById('spin-btn').textContent='⛧ FEED ME MORE ⛧';
      document.getElementById('spin-btn').onclick=function(){
        souls=100;totalSpins=0;stats={cursed:0,doomed:0,haunted:0,blessed:0};
        historyItems=[];renderHistory();updateUI();initReels();
        document.getElementById('spin-btn').textContent='⛧ PULL THE LEVER ⛧';
        document.getElementById('spin-btn').onclick=spin;
        document.getElementById('fortune').textContent='Insert souls and pull the lever...';
        document.getElementById('fortune').className='fortune-text';
        document.querySelector('.fortune-label').textContent='YOUR FATE AWAITS';
      };
    },1500);
  }
}

function updateUI(){
  document.getElementById('souls').textContent=souls;
  document.getElementById('bet').textContent=betAmt;
  document.getElementById('spins').textContent=totalSpins;
  document.getElementById('stat-cursed').textContent=stats.cursed;
  document.getElementById('stat-doomed').textContent=stats.doomed;
  document.getElementById('stat-haunted').textContent=stats.haunted;
}

function renderHistory(){
  var list=document.getElementById('history-list');
  list.innerHTML=historyItems.map(function(h){
    var col=h.tier==='cursed'?'#ff4a6a':h.tier==='doomed'?'#ff6a2a':h.tier==='haunted'?'#a86aff':'#6ae87a';
    return '<div class="history-item"><span class="hi-fortune" style="color:'+col+'">'+h.fortune+'</span><span>'+(h.payout>0?'+'+h.payout:'—')+'</span></div>';
  }).join('');
}

function toggleHistory(){
  document.getElementById('history').classList.toggle('open');
}

// Keyboard
document.addEventListener('keydown',function(e){
  if(e.code==='Space'||e.key==='Enter'){e.preventDefault();spin();}
});

initReels();
updateUI();
</script>
</body>
</html>
