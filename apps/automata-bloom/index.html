<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Automata Bloom</title>
  <meta name="description" content="A glowing cellular-automata canvas. Paint life, pick a rule, watch colorful patterns bloom and decay.">
  <meta property="og:title" content="Automata Bloom">
  <meta property="og:description" content="Conway's Life and beyond — eight rule-sets, smooth heat-trail color, paint to seed life. A living, breathing canvas.">
  <meta property="og:url" content="https://sloppy.live/automata-bloom">
  <meta property="og:image" content="https://image.pollinations.ai/prompt/Glowing%20neon%20cellular%20automata%20patterns%20evolving%20on%20a%20dark%20canvas,%20cyan%20magenta%20gold%20gradients,%20bioluminescent,%20editorial%20render?model=flux&seed=6161&width=1200&height=630&nologo=true">
  <link rel="icon" href="https://emojicdn.elk.sh/%E2%9C%A8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Space+Grotesk:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --void:   #05060f;
      --void-2: #0b0e1e;
      --panel:  rgba(16,20,40,0.72);
      --glass-b:rgba(140,180,255,0.16);
      --ink:    #e8edff;
      --ink-dim:rgba(232,237,255,0.55);
      --cyan:   #4ff0ff;
      --magenta:#ff5ec8;
      --gold:   #ffd24a;
      --line:   rgba(140,180,255,0.12);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background:
        radial-gradient(ellipse at 15% 0%, rgba(79,240,255,0.10), transparent 55%),
        radial-gradient(ellipse at 100% 100%, rgba(255,94,200,0.10), transparent 55%),
        var(--void);
      color: var(--ink);
      font-family: 'Space Grotesk', sans-serif;
      position: relative;
    }

    canvas#ca {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      display: block;
      z-index: 0;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: crosshair;
      touch-action: none;
    }

    /* ============ TITLE ============ */
    header.mast {
      position: fixed;
      top: 1rem; left: 1.2rem;
      z-index: 4;
      pointer-events: none;
    }
    header.mast h1 {
      font-family: 'Major Mono Display', monospace;
      font-size: clamp(1.1rem, 2.6vw, 1.7rem);
      letter-spacing: 0.16em;
      color: var(--cyan);
      text-shadow: 0 0 18px rgba(79,240,255,0.55), 0 0 40px rgba(79,240,255,0.25);
      line-height: 1;
    }
    header.mast .sub {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.66rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-dim);
      margin-top: 0.35rem;
    }
    header.mast .gen {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.66rem;
      color: var(--magenta);
      margin-top: 0.15rem;
      letter-spacing: 0.16em;
    }

    /* ============ CONTROL DOCK ============ */
    .dock {
      position: fixed;
      bottom: 1rem; left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      width: min(52rem, calc(100% - 1.6rem));
      background: var(--panel);
      backdrop-filter: blur(20px) saturate(150%);
      -webkit-backdrop-filter: blur(20px) saturate(150%);
      border: 1px solid var(--glass-b);
      border-radius: 18px;
      box-shadow:
        0 0 0 1px rgba(79,240,255,0.06) inset,
        0 0 50px rgba(79,240,255,0.10),
        0 18px 50px rgba(0,0,0,0.5);
      padding: 0.7rem 0.9rem 0.8rem;
    }
    .dock-row {
      display: flex; align-items: center; gap: 0.5rem;
      flex-wrap: wrap;
    }
    .dock-row + .dock-row { margin-top: 0.6rem; }

    /* Rule pills */
    .rules {
      display: flex; gap: 0.4rem; flex-wrap: wrap; flex: 1;
    }
    .rule-pill {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.04em;
      padding: 0.38rem 0.7rem 0.42rem;
      border-radius: 999px;
      border: 1px solid rgba(140,180,255,0.25);
      background: rgba(140,180,255,0.05);
      color: var(--ink-dim);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
      min-height: 2.1rem;
    }
    .rule-pill:hover { filter: brightness(1.2); border-color: rgba(140,180,255,0.4); }
    .rule-pill.active {
      background: rgba(79,240,255,0.18);
      border-color: var(--cyan);
      color: var(--ink);
      box-shadow: 0 0 14px rgba(79,240,255,0.35);
    }
    .rule-pill:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

    /* Buttons */
    .btn {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 0.8rem;
      letter-spacing: 0.04em;
      padding: 0.45rem 0.9rem;
      border-radius: 10px;
      border: 1px solid rgba(140,180,255,0.25);
      background: rgba(140,180,255,0.07);
      color: var(--ink);
      cursor: pointer;
      transition: all 0.12s;
      min-height: 2.3rem;
      white-space: nowrap;
    }
    .btn:hover { filter: brightness(1.15); border-color: rgba(140,180,255,0.45); }
    .btn:active { transform: translateY(1px); }
    .btn:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
    .btn.primary {
      background: linear-gradient(135deg, var(--cyan), var(--magenta));
      color: var(--void);
      border: none;
      box-shadow: 0 0 16px rgba(79,240,255,0.4);
    }
    .btn.primary.paused {
      background: linear-gradient(135deg, var(--gold), #ff8a4a);
    }

    /* Sliders */
    .slider-wrap {
      display: flex; align-items: center; gap: 0.45rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--ink-dim);
    }
    .slider-wrap input[type=range] {
      -webkit-appearance: none; appearance: none;
      width: 6.5rem; background: transparent; cursor: pointer;
    }
    .slider-wrap input[type=range]::-webkit-slider-runnable-track {
      height: 4px; border-radius: 2px;
      background: linear-gradient(90deg, var(--cyan), var(--magenta));
    }
    .slider-wrap input[type=range]::-moz-range-track {
      height: 4px; border-radius: 2px;
      background: linear-gradient(90deg, var(--cyan), var(--magenta));
    }
    .slider-wrap input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 16px; height: 16px; margin-top: -6px;
      border-radius: 50%;
      background: var(--ink);
      border: 2px solid var(--void);
      box-shadow: 0 0 8px rgba(79,240,255,0.6);
      cursor: pointer;
    }
    .slider-wrap input[type=range]::-moz-range-thumb {
      width: 16px; height: 16px; border-radius: 50%;
      background: var(--ink);
      border: 2px solid var(--void);
      cursor: pointer;
    }
    .slider-wrap .v { color: var(--ink); min-width: 2.2rem; text-align: right; }

    .palette-swatch {
      display: inline-flex;
      align-items: center; gap: 0.3rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--ink-dim);
      cursor: pointer;
      border: 1px solid rgba(140,180,255,0.25);
      border-radius: 8px;
      padding: 0.35rem 0.6rem;
      background: rgba(140,180,255,0.05);
      min-height: 2.1rem;
    }
    .palette-swatch:hover { filter: brightness(1.2); }
    .palette-swatch .chip {
      width: 2.4rem; height: 0.7rem; border-radius: 3px;
    }

    .hint {
      position: fixed;
      top: 1rem; right: 1.2rem;
      z-index: 4;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      color: var(--ink-dim);
      text-align: right;
      pointer-events: none;
      line-height: 1.6;
    }
    .hint kbd {
      border: 1px solid var(--line);
      border-radius: 3px;
      padding: 0.05rem 0.3rem;
      background: rgba(140,180,255,0.06);
      color: var(--ink);
    }

    @media (max-width: 560px) {
      .hint { display: none; }
      .slider-wrap input[type=range] { width: 4.5rem; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition: none !important; }
    }
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
  </style>
</head>
<body>
  <canvas id="ca" aria-label="Cellular automata canvas. Paint with the mouse to seed living cells. Pick a rule and palette below. Patterns evolve and glow."></canvas>

  <header class="mast">
    <h1>automata bloom</h1>
    <div class="sub">paint life · pick a rule · watch it breathe</div>
    <div class="gen" id="gen-line">gen 0 · 0 alive</div>
  </header>

  <div class="hint">
    <kbd>drag</kbd> paint · <kbd>space</kbd> play/pause<br>
    <kbd>c</kbd> clear · <kbd>r</kbd> randomize · <kbd>n</kbd> next palette
  </div>

  <div class="dock">
    <div class="dock-row">
      <div class="rules" id="rules" role="radiogroup" aria-label="Automaton rule"></div>
    </div>
    <div class="dock-row">
      <button type="button" class="btn primary" id="btn-play">▶ play</button>
      <button type="button" class="btn" id="btn-step">step</button>
      <button type="button" class="btn" id="btn-random">✦ seed</button>
      <button type="button" class="btn" id="btn-clear">clear</button>
      <button type="button" class="palette-swatch" id="btn-palette" aria-label="Cycle color palette">
        <span class="chip" id="palette-chip"></span><span id="palette-name">aurora</span>
      </button>
      <div class="slider-wrap">
        speed <input type="range" id="speed" min="1" max="30" value="12" aria-label="Simulation speed"><span class="v" id="speed-v">12</span>
      </div>
      <div class="slider-wrap">
        brush <input type="range" id="brush" min="1" max="12" value="3" aria-label="Brush size"><span class="v" id="brush-v">3</span>
      </div>
    </div>
  </div>

  <script>
  (function(){
    'use strict';

    // ============================================================
    // CANVAS + GRID
    // ============================================================
    const canvas = document.getElementById('ca');
    const ctx = canvas.getContext('2d');
    const CELL = 6;                 // logical cell size in CSS px
    let W = 0, H = 0;               // canvas pixel size
    let cols = 0, rows = 0;
    let cur, next, heat;           // Uint8 grid (cur/next) + Float heat trail

    function resize() {
      const dpr = 1;               // we draw at logical px; keep 1:1 for crispness
      W = Math.floor(window.innerWidth);
      H = Math.floor(window.innerHeight);
      canvas.width = W;
      canvas.height = H;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      const newCols = Math.ceil(W / CELL);
      const newRows = Math.ceil(H / CELL);
      // Preserve existing cells on resize
      const oldCur = cur, oldCols = cols, oldRows = rows;
      cols = newCols; rows = newRows;
      cur  = new Uint8Array(cols * rows);
      next = new Uint8Array(cols * rows);
      heat = new Float32Array(cols * rows);
      if (oldCur) {
        for (let y = 0; y < Math.min(oldRows, rows); y++) {
          for (let x = 0; x < Math.min(oldCols, cols); x++) {
            cur[y * cols + x] = oldCur[y * oldCols + x];
          }
        }
      }
    }
    window.addEventListener('resize', resize, { passive: true });

    // ============================================================
    // RULE SETS — B/S notation (born / survive neighbor counts)
    // ============================================================
    const RULES = [
      { id: 'life',     name: "Conway's Life", born: [3],        survive: [2, 3] },
      { id: 'highlife', name: 'HighLife',      born: [3, 6],     survive: [2, 3] },
      { id: 'daynight', name: 'Day & Night',   born: [3, 6, 7, 8], survive: [3, 4, 6, 7, 8] },
      { id: 'seeds',    name: 'Seeds',         born: [2],        survive: [] },
      { id: 'maze',     name: 'Maze',          born: [3],        survive: [1, 2, 3, 4, 5] },
      { id: 'coral',    name: 'Coral',         born: [3],        survive: [4, 5, 6, 7, 8] },
      { id: 'gnarl',    name: 'Gnarl',         born: [1],        survive: [1] },
      { id: 'mazectric',name: 'Mazectric',     born: [3],        survive: [1, 2, 3, 4] }
    ];
    let ruleIdx = 0;
    function bornSet() { return RULES[ruleIdx].born; }
    function surviveSet() { return RULES[ruleIdx].survive; }

    // ============================================================
    // PALETTES — heat (0..1) → color. Smooth cosine gradients.
    // ============================================================
    const PALETTES = [
      { name: 'aurora',  stops: [[5,8,20],[20,60,120],[60,200,220],[180,255,200],[255,255,240]] },
      { name: 'ember',   stops: [[8,3,6],[80,12,20],[200,50,30],[255,150,40],[255,240,180]] },
      { name: 'orchid',  stops: [[10,4,22],[60,20,90],[160,40,200],[255,120,220],[255,230,255]] },
      { name: 'lagoon',  stops: [[2,10,16],[8,50,70],[20,140,150],[80,230,200],[220,255,235]] },
      { name: 'sunset',  stops: [[14,6,28],[90,30,90],[220,70,110],[255,160,90],[255,240,170]] },
      { name: 'mono',    stops: [[6,8,12],[40,48,64],[110,124,150],[190,205,230],[255,255,255]] }
    ];
    let paletteIdx = 0;
    // Precompute a 256-entry LUT per palette
    let LUT = null;
    function buildLUT() {
      const p = PALETTES[paletteIdx];
      const s = p.stops;
      LUT = new Uint8Array(256 * 3);
      for (let i = 0; i < 256; i++) {
        const t = i / 255;
        const seg = t * (s.length - 1);
        const si = Math.min(s.length - 2, Math.floor(seg));
        const f = seg - si;
        // Smoothstep between adjacent stops
        const sm = f * f * (3 - 2 * f);
        const a = s[si], b = s[si + 1];
        LUT[i * 3]     = Math.round(a[0] + (b[0] - a[0]) * sm);
        LUT[i * 3 + 1] = Math.round(a[1] + (b[1] - a[1]) * sm);
        LUT[i * 3 + 2] = Math.round(a[2] + (b[2] - a[2]) * sm);
      }
    }

    // ============================================================
    // SIMULATION
    // ============================================================
    let generation = 0;
    let aliveCount = 0;
    function stepSim() {
      const born = bornSet(), surv = surviveSet();
      let alive = 0;
      for (let y = 0; y < rows; y++) {
        for (let x = 0; x < cols; x++) {
          // Count 8 neighbors with wrap-around (toroidal)
          let n = 0;
          for (let dy = -1; dy <= 1; dy++) {
            for (let dx = -1; dx <= 1; dx++) {
              if (dx === 0 && dy === 0) continue;
              const nx = (x + dx + cols) % cols;
              const ny = (y + dy + rows) % rows;
              n += cur[ny * cols + nx];
            }
          }
          const idx = y * cols + x;
          const wasAlive = cur[idx];
          let now = 0;
          if (wasAlive) {
            now = surv.indexOf(n) !== -1 ? 1 : 0;
          } else {
            now = born.indexOf(n) !== -1 ? 1 : 0;
          }
          next[idx] = now;
          if (now) alive++;
        }
      }
      // Swap buffers
      const tmp = cur; cur = next; next = tmp;
      generation++;
      aliveCount = alive;
    }

    // ============================================================
    // RENDER — heat trail makes cells glow + fade smoothly
    // ============================================================
    let imgData = null;
    function ensureImg() {
      if (!imgData || imgData.width !== cols || imgData.height !== rows) {
        imgData = ctx.createImageData(cols, rows);
      }
    }
    // Offscreen small canvas (cols×rows) scaled up = cheap glow
    const off = document.createElement('canvas');
    const offCtx = off.getContext('2d');
    function render() {
      ensureImg();
      off.width = cols; off.height = rows;
      const data = imgData.data;
      for (let i = 0; i < cols * rows; i++) {
        // Heat: rises toward 1 when alive, decays when dead → smooth trails
        const target = cur[i] ? 1 : 0;
        let h = heat[i];
        h += (target - h) * (cur[i] ? 0.55 : 0.10);   // rise fast, fade slow
        heat[i] = h;
        const li = Math.min(255, Math.max(0, (h * 255) | 0));
        const o = i * 4;
        data[o]     = LUT[li * 3];
        data[o + 1] = LUT[li * 3 + 1];
        data[o + 2] = LUT[li * 3 + 2];
        data[o + 3] = 255;
      }
      offCtx.putImageData(imgData, 0, 0);
      // Scale up to full canvas with a soft bloom (draw twice: base + blurred)
      ctx.clearRect(0, 0, W, H);
      ctx.imageSmoothingEnabled = false;
      ctx.drawImage(off, 0, 0, cols, rows, 0, 0, W, H);
      // Glow pass — blurred, additive
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = 0.5;
      ctx.imageSmoothingEnabled = true;
      ctx.filter = 'blur(4px)';
      ctx.drawImage(off, 0, 0, cols, rows, 0, 0, W, H);
      ctx.filter = 'none';
      ctx.restore();
    }

    // ============================================================
    // LOOP — fixed-step sim driven by speed slider
    // ============================================================
    let playing = false;
    let speed = 12;               // sim steps per second
    let acc = 0;
    let lastT = performance.now();
    function loop(now) {
      const dt = Math.min(0.1, (now - lastT) / 1000);
      lastT = now;
      if (playing) {
        acc += dt;
        const stepInterval = 1 / speed;
        let steps = 0;
        while (acc >= stepInterval && steps < 4) {
          stepSim();
          acc -= stepInterval;
          steps++;
        }
      }
      render();
      updateGenLine();
      requestAnimationFrame(loop);
    }

    // ============================================================
    // PAINTING
    // ============================================================
    let painting = false;
    let eraseMode = false;
    let brush = 3;
    function paintAt(sx, sy, erase) {
      const cx = Math.floor(sx / CELL);
      const cy = Math.floor(sy / CELL);
      const r = brush;
      for (let dy = -r; dy <= r; dy++) {
        for (let dx = -r; dx <= r; dx++) {
          if (dx * dx + dy * dy > r * r) continue;
          const x = (cx + dx + cols) % cols;
          const y = (cy + dy + rows) % rows;
          cur[y * cols + x] = erase ? 0 : 1;
          if (!erase) heat[y * cols + x] = 1;
        }
      }
    }
    function evtPos(e) {
      const r = canvas.getBoundingClientRect();
      return { x: (e.clientX - r.left) * (W / r.width), y: (e.clientY - r.top) * (H / r.height) };
    }
    canvas.addEventListener('pointerdown', e => {
      painting = true;
      eraseMode = (e.button === 2 || e.shiftKey);
      canvas.setPointerCapture(e.pointerId);
      const p = evtPos(e);
      paintAt(p.x, p.y, eraseMode);
    });
    canvas.addEventListener('pointermove', e => {
      if (!painting) return;
      const p = evtPos(e);
      paintAt(p.x, p.y, eraseMode);
    });
    canvas.addEventListener('pointerup', () => { painting = false; });
    canvas.addEventListener('pointercancel', () => { painting = false; });
    canvas.addEventListener('contextmenu', e => e.preventDefault());

    // ============================================================
    // SEEDING
    // ============================================================
    function randomize(density) {
      density = density || 0.18;
      for (let i = 0; i < cols * rows; i++) {
        cur[i] = Math.random() < density ? 1 : 0;
        heat[i] = cur[i];
      }
      generation = 0;
    }
    function clearGrid() {
      cur.fill(0); heat.fill(0); generation = 0; aliveCount = 0;
    }

    // ============================================================
    // UI WIRING
    // ============================================================
    const rulesEl = document.getElementById('rules');
    RULES.forEach((r, i) => {
      const b = document.createElement('button');
      b.type = 'button';
      b.className = 'rule-pill' + (i === 0 ? ' active' : '');
      b.textContent = r.name;
      b.setAttribute('role', 'radio');
      b.setAttribute('aria-checked', i === 0 ? 'true' : 'false');
      b.addEventListener('click', () => {
        ruleIdx = i;
        document.querySelectorAll('.rule-pill').forEach((p, j) => {
          p.classList.toggle('active', j === i);
          p.setAttribute('aria-checked', j === i ? 'true' : 'false');
        });
      });
      rulesEl.appendChild(b);
    });

    const btnPlay = document.getElementById('btn-play');
    function setPlaying(v) {
      playing = v;
      btnPlay.textContent = v ? '❚❚ pause' : '▶ play';
      btnPlay.classList.toggle('paused', v);
    }
    btnPlay.addEventListener('click', () => setPlaying(!playing));
    document.getElementById('btn-step').addEventListener('click', () => { stepSim(); });
    document.getElementById('btn-random').addEventListener('click', () => { randomize(); });
    document.getElementById('btn-clear').addEventListener('click', () => { clearGrid(); });

    const paletteChip = document.getElementById('palette-chip');
    const paletteName = document.getElementById('palette-name');
    function applyPalette() {
      buildLUT();
      const p = PALETTES[paletteIdx];
      const s = p.stops;
      paletteChip.style.background = 'linear-gradient(90deg,' +
        s.map(c => 'rgb(' + c.join(',') + ')').join(',') + ')';
      paletteName.textContent = p.name;
    }
    document.getElementById('btn-palette').addEventListener('click', () => {
      paletteIdx = (paletteIdx + 1) % PALETTES.length;
      applyPalette();
    });

    const speedIn = document.getElementById('speed');
    const speedV  = document.getElementById('speed-v');
    speedIn.addEventListener('input', () => { speed = +speedIn.value; speedV.textContent = speedIn.value; });
    const brushIn = document.getElementById('brush');
    const brushV  = document.getElementById('brush-v');
    brushIn.addEventListener('input', () => { brush = +brushIn.value; brushV.textContent = brushIn.value; });

    // Keyboard
    window.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT') return;
      const k = e.key.toLowerCase();
      if (k === ' ') { e.preventDefault(); setPlaying(!playing); }
      else if (k === 'c') clearGrid();
      else if (k === 'r') randomize();
      else if (k === 'n') { paletteIdx = (paletteIdx + 1) % PALETTES.length; applyPalette(); }
      else if (k === 's') stepSim();
    });

    // Gen line
    const genLine = document.getElementById('gen-line');
    let genThrottle = 0;
    function updateGenLine() {
      genThrottle++;
      if (genThrottle % 6 !== 0) return;
      genLine.textContent = 'gen ' + generation + ' · ' + aliveCount.toLocaleString() + ' alive';
    }

    // ============================================================
    // BOOT
    // ============================================================
    resize();
    applyPalette();
    randomize(0.16);
    setPlaying(true);
    requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
