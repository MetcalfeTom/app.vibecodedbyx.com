<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Code Cards — 1v1 Programming Card Battler</title>
<link rel="icon" href="https://emojicdn.elk.sh/🃏">
<meta property="og:title" content="Code Cards">
<meta property="og:description" content="1v1 card battler with programming-themed attacks. Merge conflicts, syntax errors, stack overflows — deploy your code to destroy theirs.">
<meta property="og:url" content="https://sloppy.live/code-cards">
<meta property="og:image" content="https://image.pollinations.ai/prompt/dark%20cyberpunk%20card%20game%20battle%20with%20glowing%20code%20cards%20floating%20neon%20terminal%20aesthetic?width=1200&height=630&seed=7331&nologo=true">
<style>
@import url('https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Azeret+Mono:wght@400;600;700&family=Instrument+Serif:ital@1&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:100%;background:#0a0c10}
body{min-height:100vh;font-family:'Azeret Mono',monospace;color:#c8ccd4;overflow-x:hidden;
  background:#0a0c10;
  background-image:
    repeating-linear-gradient(0deg,rgba(255,255,255,.02) 0 1px,transparent 1px 28px),
    repeating-linear-gradient(90deg,rgba(255,255,255,.02) 0 1px,transparent 1px 28px);
}

/* ── Layout ── */
#game{max-width:960px;margin:0 auto;padding:.75rem;position:relative;min-height:100vh;display:flex;flex-direction:column}
header{text-align:center;padding:.5rem 0}
header h1{font-family:'Major Mono Display',monospace;font-size:clamp(1.4rem,4vw,2.2rem);letter-spacing:.08em;
  background:linear-gradient(135deg,#ff6b6b,#ffd93d,#6bcb77,#4d96ff);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
header p{font-family:'Instrument Serif',serif;font-style:italic;font-size:.85rem;color:#666;margin-top:.15rem}

/* ── Battlefield ── */
.battlefield{flex:1;display:flex;flex-direction:column;gap:.5rem}

/* ── Player row ── */
.player-row{display:flex;align-items:center;gap:.75rem;padding:.5rem .75rem;border-radius:8px;
  background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06)}
.player-row.enemy{flex-direction:row-reverse}
.avatar{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-size:1.5rem;border:2px solid;flex-shrink:0}
.player-row.you .avatar{border-color:#4d96ff;background:rgba(77,150,255,.1)}
.player-row.enemy .avatar{border-color:#ff6b6b;background:rgba(255,107,107,.1)}
.player-info{flex:1}
.player-name{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em}
.player-row.you .player-name{color:#4d96ff}
.player-row.enemy .player-name{color:#ff6b6b}
.hp-bar-wrap{height:10px;background:rgba(0,0,0,.4);border-radius:5px;margin-top:4px;overflow:hidden;position:relative}
.hp-bar{height:100%;border-radius:5px;transition:width .6s ease}
.player-row.you .hp-bar{background:linear-gradient(90deg,#4d96ff,#6bcb77)}
.player-row.enemy .hp-bar{background:linear-gradient(90deg,#ff6b6b,#ffd93d)}
.hp-text{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:9px;font-weight:700;color:#fff;text-shadow:0 1px 2px #000}
.status-row{display:flex;gap:4px;margin-top:4px;flex-wrap:wrap}
.status-pill{font-size:9px;padding:1px 6px;border-radius:3px;background:rgba(255,255,255,.08);color:#aaa;white-space:nowrap}
.status-pill.bad{background:rgba(255,60,60,.15);color:#ff6b6b}
.status-pill.good{background:rgba(100,200,100,.15);color:#6bcb77}

/* ── Log ── */
#log-wrap{height:90px;overflow-y:auto;padding:.4rem .6rem;border-radius:6px;
  background:rgba(0,0,0,.3);border:1px solid rgba(255,255,255,.05);margin:.25rem 0;font-size:.7rem;color:#777;
  scrollbar-width:thin;scrollbar-color:#333 transparent}
#log-wrap::-webkit-scrollbar{width:4px}
#log-wrap::-webkit-scrollbar-thumb{background:#333;border-radius:2px}
.log-line{padding:1px 0;border-bottom:1px solid rgba(255,255,255,.03)}
.log-line .you-col{color:#4d96ff}
.log-line .enemy-col{color:#ff6b6b}
.log-line .card-col{color:#ffd93d}
.log-line .heal-col{color:#6bcb77}
.log-line .dmg-col{color:#ff6b6b}

/* ── Hand ── */
#hand-label{font-size:.65rem;color:#555;text-transform:uppercase;letter-spacing:.12em;margin-bottom:4px;text-align:center}
#hand{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;padding:.4rem 0}
.card{width:120px;min-height:155px;border-radius:8px;padding:8px;cursor:pointer;position:relative;
  border:1.5px solid rgba(255,255,255,.1);transition:transform .2s,box-shadow .2s,border-color .2s;
  display:flex;flex-direction:column;user-select:none}
.card:hover:not(.disabled){transform:translateY(-8px) scale(1.04);z-index:2}
.card:active:not(.disabled){transform:translateY(-2px) scale(.98)}
.card.disabled{opacity:.35;cursor:not-allowed;filter:grayscale(.6)}
.card .card-cost{position:absolute;top:4px;right:6px;font-size:9px;font-weight:700;color:#ffd93d;
  background:rgba(0,0,0,.5);padding:0 4px;border-radius:3px}
.card .card-icon{font-size:1.8rem;text-align:center;margin:4px 0 2px}
.card .card-name{font-size:.6rem;font-weight:700;text-align:center;text-transform:uppercase;letter-spacing:.06em;line-height:1.15}
.card .card-desc{font-size:.5rem;color:#999;text-align:center;margin-top:auto;line-height:1.3;padding-top:4px}
.card .card-stats{font-size:.52rem;text-align:center;margin-top:3px;font-weight:600}

/* Card colors by type */
.card.atk{background:linear-gradient(160deg,#1a0a0a,#2a1212);border-color:rgba(255,80,80,.25)}
.card.atk:hover:not(.disabled){border-color:#ff5050;box-shadow:0 4px 20px rgba(255,80,80,.2)}
.card.atk .card-name{color:#ff6b6b}
.card.atk .card-stats{color:#ff6b6b}

.card.def{background:linear-gradient(160deg,#0a0a1a,#121228);border-color:rgba(80,120,255,.25)}
.card.def:hover:not(.disabled){border-color:#5078ff;box-shadow:0 4px 20px rgba(80,120,255,.2)}
.card.def .card-name{color:#4d96ff}
.card.def .card-stats{color:#4d96ff}

.card.util{background:linear-gradient(160deg,#0a1a0a,#122812);border-color:rgba(100,200,100,.25)}
.card.util:hover:not(.disabled){border-color:#6bcb77;box-shadow:0 4px 20px rgba(100,200,100,.2)}
.card.util .card-name{color:#6bcb77}
.card.util .card-stats{color:#6bcb77}

.card.chaos{background:linear-gradient(160deg,#1a150a,#28200f);border-color:rgba(255,210,60,.25)}
.card.chaos:hover:not(.disabled){border-color:#ffd93d;box-shadow:0 4px 20px rgba(255,210,60,.2)}
.card.chaos .card-name{color:#ffd93d}
.card.chaos .card-stats{color:#ffd93d}

/* ── Energy ── */
#energy-bar{text-align:center;font-size:.65rem;color:#ffd93d;margin:2px 0}
#energy-bar span{font-weight:700}

/* ── Turn indicator ── */
#turn-indicator{text-align:center;font-size:.7rem;padding:4px;color:#ffd93d;font-weight:600;min-height:1.5em}

/* ── Overlays ── */
.overlay{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;
  background:rgba(6,8,12,.92);backdrop-filter:blur(8px)}
.overlay-card{text-align:center;max-width:380px;padding:2rem;border-radius:12px;
  background:rgba(15,18,25,.95);border:1px solid rgba(255,255,255,.08)}
.overlay-card h2{font-family:'Major Mono Display',monospace;font-size:1.6rem;margin-bottom:.5rem}
.overlay-card p{font-size:.8rem;color:#888;margin:.5rem 0}
.overlay-card .stat-line{font-size:.75rem;color:#aaa}
.btn{display:inline-block;padding:.55rem 1.4rem;border:1.5px solid rgba(255,255,255,.15);border-radius:6px;
  background:rgba(255,255,255,.05);color:#ddd;font-family:'Azeret Mono',monospace;font-size:.75rem;
  cursor:pointer;transition:background .2s,border-color .2s;margin:.3rem}
.btn:hover{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.3)}
.btn.primary{border-color:#4d96ff;color:#4d96ff}
.btn.primary:hover{background:rgba(77,150,255,.12)}
.win-text{color:#6bcb77}
.lose-text{color:#ff6b6b}

/* ── Float text ── */
.float-text{position:absolute;pointer-events:none;font-weight:700;font-size:.85rem;z-index:50;
  animation:floatUp .9s ease-out forwards;white-space:nowrap}
@keyframes floatUp{0%{opacity:1;transform:translateY(0)}100%{opacity:0;transform:translateY(-40px)}}

/* ── Card played animation ── */
@keyframes cardPlay{0%{transform:scale(1);opacity:1}50%{transform:scale(1.15);opacity:.9}100%{transform:scale(.3) translateY(-80px);opacity:0}}
.card-playing{animation:cardPlay .45s ease-in forwards;pointer-events:none}

/* ── Responsive ── */
@media(max-width:600px){
  .card{width:100px;min-height:130px;padding:6px}
  .card .card-icon{font-size:1.4rem}
  .card .card-name{font-size:.52rem}
  .card .card-desc{font-size:.44rem}
  .player-row{padding:.4rem .5rem;gap:.5rem}
  .avatar{width:38px;height:38px;font-size:1.2rem}
  #log-wrap{height:70px}
}
@media(prefers-reduced-motion:reduce){
  .card,.hp-bar{transition:none}
  .float-text{animation:none;opacity:0}
  .card-playing{animation:none}
}
</style>
</head>
<body>
<div id="game">
  <header>
    <h1>code cards</h1>
    <p>deploy your code to destroy theirs</p>
  </header>
  <div class="battlefield" id="battlefield"></div>
</div>

<!-- Start overlay -->
<div class="overlay" id="start-overlay">
  <div class="overlay-card">
    <h2 style="font-size:1.3rem">code cards</h2>
    <p>1v1 programming card battler. Play cards, manage energy, wreck the enemy codebase.</p>
    <p style="font-size:.65rem;color:#666">Merge Conflicts, Syntax Errors, Stack Overflows, DDoS attacks &mdash; 12 cards, endless chaos.</p>
    <button class="btn primary" id="btn-start">deploy &rarr;</button>
  </div>
</div>

<!-- Win/Lose overlay -->
<div class="overlay" id="end-overlay" style="display:none">
  <div class="overlay-card">
    <h2 id="end-title"></h2>
    <p id="end-msg"></p>
    <div id="end-stats" class="stat-line"></div>
    <button class="btn primary" id="btn-again">run again &rarr;</button>
  </div>
</div>

<script>
(function(){
"use strict";

// ─── Card Definitions ───
var CARDS=[
  {id:'syntax_error',  name:'Syntax Error',     icon:'🐛', type:'atk',  cost:2, dmg:14, desc:'Unclosed bracket. 14 damage.',                      effect:'damage'},
  {id:'stack_overflow', name:'Stack Overflow',   icon:'💥', type:'atk',  cost:3, dmg:22, desc:'Infinite recursion. 22 damage.',                     effect:'damage'},
  {id:'segfault',      name:'Segfault',          icon:'💀', type:'atk',  cost:4, dmg:30, desc:'Memory access violation. 30 damage.',                effect:'damage'},
  {id:'merge_conflict',name:'Merge Conflict',    icon:'🔀', type:'chaos',cost:3, dmg:0,  desc:'Blocks opponent for 2 turns.',                      effect:'block',  turns:2},
  {id:'ddos',          name:'DDoS Attack',       icon:'🌊', type:'atk',  cost:3, dmg:7,  desc:'7 damage per turn for 3 turns.',                    effect:'dot',    turns:3, dotDmg:7},
  {id:'infinite_loop', name:'Infinite Loop',     icon:'🔄', type:'chaos',cost:2, dmg:0,  desc:'Opponent skips next turn.',                         effect:'skip'},
  {id:'code_review',   name:'Code Review',       icon:'🛡️',type:'def',  cost:2, dmg:0,  desc:'Shield: blocks next attack + reflects 8 damage.',   effect:'shield', reflectDmg:8},
  {id:'hotfix',        name:'Hotfix',            icon:'🩹', type:'util', cost:2, dmg:0,  desc:'Patch the bugs. Heal 18 HP.',                       effect:'heal',   healAmt:18},
  {id:'refactor',      name:'Refactor',          icon:'♻️', type:'util', cost:1, dmg:0,  desc:'Clean code. Draw 2 cards.',                         effect:'draw',   drawAmt:2},
  {id:'rubber_duck',   name:'Rubber Duck',       icon:'🦆', type:'util', cost:2, dmg:0,  desc:'Debug session. Heal 10, draw 1.',                   effect:'duck',   healAmt:10, drawAmt:1},
  {id:'force_push',    name:'git push --force',  icon:'⚡', type:'chaos',cost:3, dmg:10, desc:'Strips all buffs + 10 damage.',                     effect:'strip'},
  {id:'npm_install',   name:'npm install',       icon:'📦', type:'chaos',cost:1, dmg:0,  desc:'Install 847 dependencies. Random effect.',          effect:'random'}
];

var MAX_HP=100, MAX_ENERGY=5, HAND_SIZE=5, MAX_HAND=7;

// ─── Game State ───
var state;

function initState(){
  state={
    you: {hp:MAX_HP, maxHp:MAX_HP, energy:3, deck:[], hand:[], discard:[],
          shield:false, reflectDmg:0, blocked:0, skipTurn:false, dot:[], name:'You', isAI:false},
    enemy:{hp:MAX_HP, maxHp:MAX_HP, energy:3, deck:[], hand:[], discard:[],
          shield:false, reflectDmg:0, blocked:0, skipTurn:false, dot:[], name:'Compiler', isAI:true},
    turn:'you', turnNum:1, gameOver:false, log:[], cardsPlayed:0
  };
  buildDeck(state.you);
  buildDeck(state.enemy);
  for(var i=0;i<HAND_SIZE;i++){drawCard(state.you);drawCard(state.enemy);}
}

function buildDeck(p){
  p.deck=[];p.hand=[];p.discard=[];
  // 2 copies of each card
  for(var i=0;i<CARDS.length;i++){p.deck.push(Object.assign({},CARDS[i]));p.deck.push(Object.assign({},CARDS[i]));}
  shuffle(p.deck);
}

function shuffle(a){for(var i=a.length-1;i>0;i--){var j=Math.random()*(i+1)|0;var t=a[i];a[i]=a[j];a[j]=t;}}

function drawCard(p){
  if(p.hand.length>=MAX_HAND) return false;
  if(p.deck.length===0){
    if(p.discard.length===0) return false;
    p.deck=p.discard;p.discard=[];shuffle(p.deck);
  }
  p.hand.push(p.deck.pop());
  return true;
}

// ─── Play a card ───
function playCard(attacker,defender,cardIdx){
  var card=attacker.hand[cardIdx];
  if(!card||card.cost>attacker.energy) return false;

  attacker.energy-=card.cost;
  attacker.hand.splice(cardIdx,1);
  state.cardsPlayed++;

  var src=attacker===state.you?'you-col':'enemy-col';
  var who=attacker===state.you?'You':'Compiler';

  switch(card.effect){
    case 'damage':
      var dmg=card.dmg;
      if(defender.shield){
        defender.shield=false;
        addLog('<span class="'+src+'">'+who+'</span> played <span class="card-col">'+card.name+'</span> &mdash; <span class="def-col">BLOCKED by shield!</span>');
        if(defender.reflectDmg>0){
          attacker.hp-=defender.reflectDmg;
          addLog('&nbsp;&nbsp;Shield reflected <span class="dmg-col">'+defender.reflectDmg+' damage</span> back!');
          spawnFloat(attacker===state.you?'you':'enemy', '-'+defender.reflectDmg, '#ff6b6b');
          defender.reflectDmg=0;
        }
      } else {
        defender.hp-=dmg;
        addLog('<span class="'+src+'">'+who+'</span> played <span class="card-col">'+card.name+'</span> &mdash; <span class="dmg-col">'+dmg+' damage!</span>');
        spawnFloat(defender===state.you?'you':'enemy', '-'+dmg, '#ff6b6b');
      }
      break;

    case 'block':
      defender.blocked+=card.turns;
      addLog('<span class="'+src+'">'+who+'</span> played <span class="card-col">'+card.name+'</span> &mdash; opponent blocked for '+card.turns+' turns!');
      break;

    case 'dot':
      defender.dot.push({dmg:card.dotDmg, turns:card.turns, name:card.name});
      addLog('<span class="'+src+'">'+who+'</span> played <span class="card-col">'+card.name+'</span> &mdash; '+card.dotDmg+'/turn for '+card.turns+' turns!');
      break;

    case 'skip':
      defender.skipTurn=true;
      addLog('<span class="'+src+'">'+who+'</span> played <span class="card-col">'+card.name+'</span> &mdash; opponent skips next turn!');
      break;

    case 'shield':
      attacker.shield=true;
      attacker.reflectDmg=card.reflectDmg||0;
      addLog('<span class="'+src+'">'+who+'</span> played <span class="card-col">'+card.name+'</span> &mdash; shield up!');
      break;

    case 'heal':
      var h=Math.min(card.healAmt, attacker.maxHp-attacker.hp);
      attacker.hp+=h;
      addLog('<span class="'+src+'">'+who+'</span> played <span class="card-col">'+card.name+'</span> &mdash; <span class="heal-col">healed '+h+'!</span>');
      if(h>0) spawnFloat(attacker===state.you?'you':'enemy', '+'+h, '#6bcb77');
      break;

    case 'draw':
      var drawn=0;
      for(var i=0;i<card.drawAmt;i++){if(drawCard(attacker)) drawn++;}
      addLog('<span class="'+src+'">'+who+'</span> played <span class="card-col">'+card.name+'</span> &mdash; drew '+drawn+' cards.');
      break;

    case 'duck':
      var dh=Math.min(card.healAmt, attacker.maxHp-attacker.hp);
      attacker.hp+=dh;
      var dd=0;for(i=0;i<card.drawAmt;i++){if(drawCard(attacker)) dd++;}
      addLog('<span class="'+src+'">'+who+'</span> played <span class="card-col">'+card.name+'</span> &mdash; <span class="heal-col">healed '+dh+'</span>, drew '+dd+'.');
      if(dh>0) spawnFloat(attacker===state.you?'you':'enemy', '+'+dh, '#6bcb77');
      break;

    case 'strip':
      defender.shield=false;defender.reflectDmg=0;
      // Remove good effects only (blocked stays)
      var sdmg=card.dmg||0;
      if(sdmg>0){defender.hp-=sdmg;spawnFloat(defender===state.you?'you':'enemy', '-'+sdmg, '#ff6b6b');}
      addLog('<span class="'+src+'">'+who+'</span> played <span class="card-col">'+card.name+'</span> &mdash; stripped buffs'+(sdmg?' + '+sdmg+' damage!':'!'));
      break;

    case 'random':
      var roll=Math.random();
      if(roll<.25){
        // heal
        var rh=Math.min(15,attacker.maxHp-attacker.hp);attacker.hp+=rh;
        addLog('<span class="'+src+'">'+who+'</span> played <span class="card-col">npm install</span> &mdash; found a <span class="heal-col">health package! +'+rh+'</span>');
        if(rh>0) spawnFloat(attacker===state.you?'you':'enemy', '+'+rh, '#6bcb77');
      } else if(roll<.5){
        // damage self
        attacker.hp-=8;
        addLog('<span class="'+src+'">'+who+'</span> played <span class="card-col">npm install</span> &mdash; <span class="dmg-col">dependency conflict! -8 to self</span>');
        spawnFloat(attacker===state.you?'you':'enemy', '-8', '#ffd93d');
      } else if(roll<.75){
        // damage enemy
        defender.hp-=18;
        addLog('<span class="'+src+'">'+who+'</span> played <span class="card-col">npm install</span> &mdash; <span class="dmg-col">malicious package! 18 damage!</span>');
        spawnFloat(defender===state.you?'you':'enemy', '-18', '#ff6b6b');
      } else {
        // draw 3
        var rd=0;for(i=0;i<3;i++){if(drawCard(attacker)) rd++;}
        addLog('<span class="'+src+'">'+who+'</span> played <span class="card-col">npm install</span> &mdash; installed '+rd+' sub-dependencies (drew '+rd+').');
      }
      break;
  }

  attacker.discard.push(card);
  clampHP();
  return true;
}

function clampHP(){
  state.you.hp=Math.max(0,Math.min(state.you.maxHp,state.you.hp));
  state.enemy.hp=Math.max(0,Math.min(state.enemy.maxHp,state.enemy.hp));
}

// ─── Turn mechanics ───
function processDots(p){
  var who=p===state.you?'you':'enemy';
  for(var i=p.dot.length-1;i>=0;i--){
    var d=p.dot[i];
    p.hp-=d.dmg;
    addLog('&nbsp;&nbsp;<span class="dmg-col">'+d.name+'</span> ticks for <span class="dmg-col">'+d.dmg+'</span> on '+(p===state.you?'you':'Compiler'));
    spawnFloat(who, '-'+d.dmg, '#ffd93d');
    d.turns--;
    if(d.turns<=0) p.dot.splice(i,1);
  }
  clampHP();
}

function startTurn(who){
  var p=who==='you'?state.you:state.enemy;
  state.turn=who;

  // Energy: gain up to max
  p.energy=Math.min(MAX_ENERGY, p.energy+2);

  // Draw a card
  drawCard(p);

  // Process DOT on this player
  processDots(p);

  // Check blocked
  if(p.blocked>0){
    p.blocked--;
    addLog((who==='you'?'You are':'Compiler is')+' blocked by a merge conflict! ('+(p.blocked)+' turns left)');
    renderAll();
    if(checkWin()) return;
    setTimeout(function(){endTurn();},1200);
    return;
  }

  // Check skip
  if(p.skipTurn){
    p.skipTurn=false;
    addLog((who==='you'?'You are':'Compiler is')+' stuck in an infinite loop! Turn skipped.');
    renderAll();
    if(checkWin()) return;
    setTimeout(function(){endTurn();},1200);
    return;
  }

  renderAll();
  if(checkWin()) return;

  if(p.isAI){
    setTimeout(function(){aiTurn();},800+Math.random()*600);
  }
}

function endTurn(){
  if(state.gameOver) return;
  state.turnNum++;
  var next=state.turn==='you'?'enemy':'you';
  startTurn(next);
}

function playerEndTurn(){
  if(state.turn!=='you'||state.gameOver) return;
  endTurn();
}

// ─── AI ───
function aiTurn(){
  if(state.gameOver) return;
  var ai=state.enemy, pl=state.you;

  // Simple AI: prioritize by situation
  var playable=[];
  for(var i=0;i<ai.hand.length;i++){
    if(ai.hand[i].cost<=ai.energy) playable.push(i);
  }

  if(playable.length===0){
    addLog('<span class="enemy-col">Compiler</span> has no playable cards. Passing.');
    renderAll();
    setTimeout(function(){endTurn();},800);
    return;
  }

  // AI plays 1-2 cards per turn
  var plays=0, maxPlays=ai.energy>=4?2:1;
  while(plays<maxPlays && playable.length>0){
    // Score each card
    var bestIdx=-1, bestScore=-999;
    for(var j=0;j<playable.length;j++){
      var ci=playable[j];
      var c=ai.hand[ci];
      var score=0;

      if(c.effect==='damage') score=c.dmg*(pl.shield?0.2:1);
      else if(c.effect==='heal') score=ai.hp<50?(ai.maxHp-ai.hp>c.healAmt?c.healAmt:ai.maxHp-ai.hp)*0.9:5;
      else if(c.effect==='shield') score=ai.shield?2:18;
      else if(c.effect==='block') score=16;
      else if(c.effect==='skip') score=14;
      else if(c.effect==='dot') score=c.dotDmg*c.turns*(pl.shield?0.5:1);
      else if(c.effect==='strip') score=pl.shield?25:c.dmg;
      else if(c.effect==='draw') score=ai.hand.length<3?16:8;
      else if(c.effect==='duck') score=(ai.hp<60?12:5)+(ai.hand.length<4?6:2);
      else if(c.effect==='random') score=10+Math.random()*5;

      // Low HP urgency
      if(ai.hp<30 && (c.effect==='heal'||c.effect==='duck')) score+=15;
      if(pl.hp<25 && c.effect==='damage') score+=10;

      score-=c.cost*1.5;
      score+=Math.random()*4; // variety

      if(score>bestScore){bestScore=score;bestIdx=j;}
    }

    if(bestIdx<0) break;
    var ci2=playable[bestIdx];
    if(!playCard(ai,pl,ci2)) break;
    plays++;

    if(checkWin()){renderAll();return;}

    // Recalculate playable (indices shifted)
    playable=[];
    for(var k=0;k<ai.hand.length;k++){
      if(ai.hand[k].cost<=ai.energy) playable.push(k);
    }
  }

  renderAll();
  if(!state.gameOver) setTimeout(function(){endTurn();},1000);
}

// ─── Win check ───
function checkWin(){
  if(state.you.hp<=0){
    state.gameOver=true;
    showEnd(false);
    return true;
  }
  if(state.enemy.hp<=0){
    state.gameOver=true;
    showEnd(true);
    return true;
  }
  return false;
}

function showEnd(won){
  var ov=document.getElementById('end-overlay');
  var t=document.getElementById('end-title');
  var m=document.getElementById('end-msg');
  var s=document.getElementById('end-stats');
  t.className=won?'win-text':'lose-text';
  t.textContent=won?'build succeeded':'build failed';
  m.textContent=won?'Enemy codebase destroyed. Your code ships.':'Your codebase has been corrupted beyond repair.';
  s.textContent='Turns: '+state.turnNum+' · Cards played: '+state.cardsPlayed;
  ov.style.display='flex';
}

// ─── Log ───
function addLog(html){
  state.log.push(html);
  if(state.log.length>60) state.log.shift();
}

// ─── Float text ───
var floats=[];
function spawnFloat(who,text,color){
  floats.push({who:who,text:text,color:color,t:Date.now()});
}

// ─── Render ───
function renderAll(){
  var bf=document.getElementById('battlefield');
  bf.innerHTML='';

  // Enemy row
  bf.appendChild(renderPlayerRow(state.enemy,'enemy'));

  // Log
  var lw=document.createElement('div');lw.id='log-wrap';
  var logHtml='';
  for(var i=0;i<state.log.length;i++) logHtml+='<div class="log-line">'+state.log[i]+'</div>';
  lw.innerHTML=logHtml;
  bf.appendChild(lw);
  lw.scrollTop=lw.scrollHeight;

  // Turn indicator
  var ti=document.createElement('div');ti.id='turn-indicator';
  if(state.gameOver){
    ti.textContent='Game Over';
  } else if(state.turn==='you'){
    ti.innerHTML='Your turn &mdash; play cards or <span style="cursor:pointer;text-decoration:underline" id="end-turn-btn">end turn</span>';
  } else {
    ti.textContent='Compiler is thinking...';
  }
  bf.appendChild(ti);

  // Your row
  bf.appendChild(renderPlayerRow(state.you,'you'));

  // Energy
  var eb=document.createElement('div');eb.id='energy-bar';
  eb.innerHTML='Energy: <span>'+state.you.energy+' / '+MAX_ENERGY+'</span>';
  bf.appendChild(eb);

  // Hand label
  var hl=document.createElement('div');hl.id='hand-label';
  hl.textContent='Your Hand ('+state.you.hand.length+')';
  bf.appendChild(hl);

  // Hand
  var hd=document.createElement('div');hd.id='hand';
  for(var j=0;j<state.you.hand.length;j++){
    hd.appendChild(renderCard(state.you.hand[j],j));
  }
  bf.appendChild(hd);

  // Wire up end turn button
  var etb=document.getElementById('end-turn-btn');
  if(etb) etb.addEventListener('click',playerEndTurn);

  // Render floats
  renderFloats();
}

function renderPlayerRow(p,cls){
  var row=document.createElement('div');
  row.className='player-row '+cls;
  row.id='row-'+cls;

  var av=document.createElement('div');av.className='avatar';
  av.textContent=cls==='you'?'👩‍💻':'🤖';
  row.appendChild(av);

  var info=document.createElement('div');info.className='player-info';
  var nm=document.createElement('div');nm.className='player-name';
  nm.textContent=p.name+' · '+p.hp+'/'+p.maxHp;
  info.appendChild(nm);

  var hpw=document.createElement('div');hpw.className='hp-bar-wrap';
  var hpb=document.createElement('div');hpb.className='hp-bar';
  hpb.style.width=(p.hp/p.maxHp*100)+'%';
  var hpt=document.createElement('div');hpt.className='hp-text';hpt.textContent=p.hp;
  hpw.appendChild(hpb);hpw.appendChild(hpt);
  info.appendChild(hpw);

  // Status effects
  var sr=document.createElement('div');sr.className='status-row';
  if(p.shield){var sp=document.createElement('span');sp.className='status-pill good';sp.textContent='🛡️ Shield';sr.appendChild(sp);}
  if(p.blocked>0){var bp=document.createElement('span');bp.className='status-pill bad';bp.textContent='🔀 Blocked ('+p.blocked+')';sr.appendChild(bp);}
  if(p.skipTurn){var sk=document.createElement('span');sk.className='status-pill bad';sk.textContent='🔄 Skipping';sr.appendChild(sk);}
  for(var d=0;d<p.dot.length;d++){
    var dp=document.createElement('span');dp.className='status-pill bad';dp.textContent='🌊 '+p.dot[d].name+' ('+p.dot[d].turns+'t)';sr.appendChild(dp);
  }
  if(cls==='enemy'){
    var ec=document.createElement('span');ec.className='status-pill';ec.textContent='🃏 '+p.hand.length+' cards';sr.appendChild(ec);
    var ee=document.createElement('span');ee.className='status-pill';ee.textContent='⚡ '+p.energy+' energy';sr.appendChild(ee);
  }
  info.appendChild(sr);
  row.appendChild(info);
  return row;
}

function renderCard(card,idx){
  var el=document.createElement('div');
  el.className='card '+card.type;
  var canPlay=state.turn==='you'&&!state.gameOver&&card.cost<=state.you.energy;
  if(!canPlay) el.classList.add('disabled');

  el.innerHTML=
    '<div class="card-cost">'+card.cost+'⚡</div>'+
    '<div class="card-icon">'+card.icon+'</div>'+
    '<div class="card-name">'+card.name+'</div>'+
    '<div class="card-desc">'+card.desc+'</div>'+
    (card.dmg?'<div class="card-stats">'+card.dmg+' dmg</div>':'');

  if(canPlay){
    el.addEventListener('click',function(){
      el.classList.add('card-playing');
      setTimeout(function(){
        playCard(state.you,state.enemy,idx);
        if(checkWin()){renderAll();return;}
        renderAll();
      },350);
    });
  }

  return el;
}

function renderFloats(){
  var now=Date.now();
  for(var i=floats.length-1;i>=0;i--){
    if(now-floats[i].t>900){floats.splice(i,1);continue;}
    var f=floats[i];
    var target=document.getElementById('row-'+f.who);
    if(!target) continue;
    var ft=document.createElement('div');ft.className='float-text';
    ft.textContent=f.text;ft.style.color=f.color;
    ft.style.left=(target.offsetLeft+target.offsetWidth/2-20)+'px';
    ft.style.top=(target.offsetTop-10)+'px';
    document.getElementById('game').appendChild(ft);
    setTimeout((function(el){return function(){if(el.parentNode)el.remove();};})(ft),900);
    floats.splice(i,1);
  }
}

// ─── Boot ───
document.getElementById('btn-start').addEventListener('click',function(){
  document.getElementById('start-overlay').style.display='none';
  initState();
  addLog('=== Build started. Deploy your code. ===');
  startTurn('you');
});

document.getElementById('btn-again').addEventListener('click',function(){
  document.getElementById('end-overlay').style.display='none';
  initState();
  state.log=[];
  addLog('=== New build. Deploy your code. ===');
  startTurn('you');
});

// Keyboard: E to end turn
document.addEventListener('keydown',function(e){
  if(e.key==='e'||e.key==='E'){
    if(state&&state.turn==='you'&&!state.gameOver) playerEndTurn();
  }
});

})();
</script>
