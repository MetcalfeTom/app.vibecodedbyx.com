<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Glass Tactoe · Botanic</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#1a1208">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8C%BF">
<meta name="description" content="Tic-tac-toe as a quiet garden duel. Each move grows an organic branch or vine in a frosted glass conservatory.">
<meta property="og:title" content="Glass Tactoe · Botanic">
<meta property="og:description" content="Tic-tac-toe as a quiet garden duel. Each move grows an organic branch or vine in a frosted glass conservatory.">
<meta property="og:url" content="https://sloppy.live/glass-tactoe">
<meta property="og:image" content="https://image.pollinations.ai/prompt/modern%20glassmorphism%20tic-tac-toe%20with%20growing%20organic%20branches%20and%20vines%2C%20moss%20green%20rust%20amber%2C%20botanical%20conservatory%2C%20soft%20sunset%20glow?width=1200&height=630&model=flux&seed=3344&nologo=true">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#1a1208;
    --void-2:#2a1a0c;
    --ink:#f7f0e0;
    --silver:#bdb098;
    --silver-dim:#7a6f5a;
    /* X = autumn branch (rust + amber leaves) */
    --x:#e07a3f;
    --x-leaf:#ff9a3a;
    --x-glow:rgba(255,138,58,0.55);
    /* O = moss vine (sage green + pale-pink blossoms) */
    --o:#7fb86a;
    --o-leaf:#a8d68a;
    --o-glow:rgba(127,184,106,0.55);
    --o-blossom:#ffb8d4;
    --accent:#ffd17a;
    --glass-bg:rgba(255,247,228,0.08);
    --glass-bg-hover:rgba(255,247,228,0.13);
    --glass-border:rgba(255,247,228,0.16);
    --glass-border-strong:rgba(255,247,228,0.34);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  html,body{
    min-height:100%;background:var(--void);color:var(--ink);
    font-family:'Outfit', system-ui, sans-serif;
    -webkit-tap-highlight-color:transparent;user-select:none;
    overflow-x:hidden;
  }
  body{
    min-height:100vh;display:flex;flex-direction:column;align-items:center;
    position:relative;
    background:linear-gradient(160deg, #2a1f12 0%, #1a1208 45%, #1a2010 100%);
  }
  /* Colored orbs behind the glass — sunset peach, moss green, gold-bloom */
  body::before, body::after, .orb{
    content:'';position:fixed;border-radius:50%;filter:blur(90px);pointer-events:none;z-index:0;
  }
  body::before{
    width:520px;height:520px;left:-140px;top:-120px;
    background:radial-gradient(circle, #ff9a5a 0%, transparent 70%);
    opacity:0.50;
  }
  body::after{
    width:560px;height:560px;right:-180px;top:32%;
    background:radial-gradient(circle, #7fb86a 0%, transparent 70%);
    opacity:0.45;
  }
  .orb.orb-3{
    width:440px;height:440px;left:28%;bottom:-180px;
    background:radial-gradient(circle, #ffd17a 0%, transparent 70%);
    opacity:0.42;
  }
  .orb.orb-4{
    content:'';position:fixed;width:380px;height:380px;right:10%;bottom:-100px;border-radius:50%;
    background:radial-gradient(circle, #ffb8d4 0%, transparent 70%);
    filter:blur(80px);pointer-events:none;z-index:0;opacity:0.35;
  }
  /* Subtle grain overlay */
  body > .grain{
    position:fixed;inset:0;z-index:1;pointer-events:none;
    background-image:
      repeating-linear-gradient(7deg, rgba(255,255,255,0.012) 0 1px, transparent 1px 4px),
      repeating-linear-gradient(97deg, rgba(0,0,0,0.012) 0 1px, transparent 1px 5px);
    opacity:0.8;
  }

  header{
    width:100%;text-align:center;padding:2rem 1rem 1rem;position:relative;z-index:3;
  }
  h1{
    font-weight:700;
    font-size:clamp(2rem, 5vw, 3.2rem);
    letter-spacing:-0.02em;
    background:linear-gradient(135deg, #f7f0e0 0%, #ffd17a 45%, #a8d68a 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    line-height:1;
    filter:drop-shadow(0 0 24px rgba(255,209,122,0.22));
  }
  .tag{
    font-weight:300;font-size:clamp(0.85rem, 1.4vw, 1rem);
    color:var(--silver);margin-top:0.5rem;letter-spacing:0.04em;
  }

  main{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    width:100%;padding:1rem;gap:1.4rem;position:relative;z-index:2;
  }

  /* Scores row — 3 glass pills */
  .scores{
    display:flex;gap:0.7rem;align-items:center;
  }
  .score{
    background:var(--glass-bg);
    backdrop-filter:blur(40px) saturate(180%);
    -webkit-backdrop-filter:blur(40px) saturate(180%);
    border:1px solid var(--glass-border);
    border-radius:1rem;
    padding:0.7rem 1.1rem;
    min-width:5.4rem;text-align:center;
    box-shadow:0 8px 24px rgba(0,0,0,0.25), inset 0 1px 0 rgba(255,255,255,0.10);
    display:flex;flex-direction:column;gap:0.1rem;align-items:center;
    transition:transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.3s;
  }
  .score .label{font-size:0.65rem;font-weight:500;letter-spacing:0.22em;color:var(--silver);text-transform:uppercase}
  .score .val{font-family:'DM Mono', monospace;font-size:1.6rem;font-weight:500;line-height:1;color:var(--ink);letter-spacing:-0.02em}
  .score.x .val{color:var(--x)}
  .score.x{border-color:rgba(255,107,138,0.30)}
  .score.x.pop{transform:scale(1.12);border-color:var(--x);box-shadow:0 8px 24px rgba(0,0,0,0.25), 0 0 24px var(--x-glow), inset 0 1px 0 rgba(255,255,255,0.12)}
  .score.o .val{color:var(--o)}
  .score.o{border-color:rgba(94,234,212,0.30)}
  .score.o.pop{transform:scale(1.12);border-color:var(--o);box-shadow:0 8px 24px rgba(0,0,0,0.25), 0 0 24px var(--o-glow), inset 0 1px 0 rgba(255,255,255,0.12)}
  .score.draw.pop{transform:scale(1.10);border-color:var(--glass-border-strong)}

  /* Turn indicator */
  .turn{
    display:flex;align-items:center;gap:0.6rem;
    background:var(--glass-bg);
    backdrop-filter:blur(30px) saturate(180%);
    -webkit-backdrop-filter:blur(30px) saturate(180%);
    border:1px solid var(--glass-border);
    border-radius:999px;
    padding:0.55rem 1.1rem;
    font-size:0.78rem;font-weight:500;letter-spacing:0.18em;text-transform:uppercase;color:var(--silver);
    transition:all 0.35s;
  }
  .turn .who{font-weight:700;color:var(--ink);transition:color 0.35s}
  .turn.x .who{color:var(--x);text-shadow:0 0 12px var(--x-glow)}
  .turn.o .who{color:var(--o);text-shadow:0 0 12px var(--o-glow)}
  .turn .dot{
    width:0.55rem;height:0.55rem;border-radius:50%;
    background:var(--silver-dim);
    transition:background 0.35s, box-shadow 0.35s;
  }
  .turn.x .dot{background:var(--x);box-shadow:0 0 10px var(--x-glow)}
  .turn.o .dot{background:var(--o);box-shadow:0 0 10px var(--o-glow)}
  .turn.thinking .dot{animation:thinkingPulse 1s ease-in-out infinite}
  @keyframes thinkingPulse{0%,100%{opacity:1}50%{opacity:0.3}}

  /* Board — frosted glass card */
  .board-wrap{
    position:relative;
    padding:1.2rem;
    background:var(--glass-bg);
    backdrop-filter:blur(40px) saturate(180%);
    -webkit-backdrop-filter:blur(40px) saturate(180%);
    border:1px solid var(--glass-border-strong);
    border-radius:2rem;
    box-shadow:
      0 24px 60px rgba(0,0,0,0.45),
      0 0 40px rgba(201,168,255,0.12),
      inset 0 1px 0 rgba(255,255,255,0.18);
  }
  .board{
    display:grid;
    grid-template-columns:repeat(3, 6.4rem);
    grid-template-rows:repeat(3, 6.4rem);
    gap:0.5rem;
    position:relative;
  }
  .cell{
    background:rgba(255,255,255,0.04);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border:1px solid var(--glass-border);
    border-radius:1.1rem;
    position:relative;
    cursor:pointer;
    transition:transform 0.18s cubic-bezier(0.34, 1.56, 0.64, 1), background 0.2s, border-color 0.2s, box-shadow 0.2s;
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.08);
    display:flex;align-items:center;justify-content:center;
    overflow:visible;
  }
  .cell:hover:not(.taken):not(.locked){
    background:var(--glass-bg-hover);
    border-color:var(--glass-border-strong);
    transform:translateY(-2px);
    box-shadow:0 8px 20px rgba(0,0,0,0.30), inset 0 1px 0 rgba(255,255,255,0.14);
  }
  .cell:focus-visible{outline:3px solid var(--accent);outline-offset:3px}
  .cell.taken{cursor:default}
  .cell.locked{cursor:default;opacity:0.85}

  /* Ghost preview for hover */
  .cell .ghost{
    position:absolute;inset:0.7rem;opacity:0;pointer-events:none;
    transition:opacity 0.18s;
  }
  .cell:hover:not(.taken):not(.locked) .ghost{opacity:0.22}
  .cell .ghost svg{width:100%;height:100%}

  /* Piece (SVG drawn with stroke + leaf-pop animation) */
  .piece{
    position:absolute;inset:0.6rem;
    animation:pieceIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    transform-origin:center;
  }
  @keyframes pieceIn{
    0%{opacity:0;transform:scale(0.4) rotate(-6deg)}
    60%{opacity:1;transform:scale(1.10) rotate(2deg)}
    100%{opacity:1;transform:scale(1) rotate(0)}
  }
  .piece svg{width:100%;height:100%;overflow:visible}
  /* Branch / vine strokes draw via stroke-dashoffset */
  .piece svg .branch{
    fill:none;stroke-linecap:round;stroke-linejoin:round;
    stroke-dasharray:220;
    stroke-dashoffset:220;
    animation:drawStroke 0.55s ease-out forwards;
  }
  .piece.x svg .branch{
    stroke:var(--x);stroke-width:6.5;
    filter:drop-shadow(0 0 8px var(--x-glow));
  }
  .piece.x svg .branch.b2{animation-delay:0.16s}
  .piece.o svg .branch{
    stroke:var(--o);stroke-width:5.5;
    filter:drop-shadow(0 0 8px var(--o-glow));
    stroke-dasharray:260;stroke-dashoffset:260;
  }
  @keyframes drawStroke{to{stroke-dashoffset:0}}
  /* Leaves + blossoms pop in after the branch reaches them */
  .piece svg .leaf, .piece svg .blossom{
    transform-origin:center;transform-box:fill-box;
    opacity:0;transform:scale(0.1) rotate(-12deg);
    animation:leafPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  .piece.x svg .leaf{fill:var(--x-leaf);filter:drop-shadow(0 0 6px rgba(255,154,58,0.55))}
  .piece.o svg .leaf{fill:var(--o-leaf);filter:drop-shadow(0 0 6px rgba(168,214,138,0.55))}
  .piece svg .blossom{fill:var(--o-blossom);filter:drop-shadow(0 0 8px rgba(255,184,212,0.7))}
  .piece svg .blossom .core{fill:#ffe07a}
  .piece svg .leaf.l1{animation-delay:0.42s}
  .piece svg .leaf.l2{animation-delay:0.50s}
  .piece svg .leaf.l3{animation-delay:0.56s}
  .piece svg .leaf.l4{animation-delay:0.62s}
  .piece svg .blossom.b1{animation-delay:0.55s}
  .piece svg .blossom.b2{animation-delay:0.66s}
  .piece svg .blossom.b3{animation-delay:0.78s}
  @keyframes leafPop{
    0%{opacity:0;transform:scale(0.1) rotate(-12deg)}
    60%{opacity:1;transform:scale(1.18) rotate(4deg)}
    100%{opacity:1;transform:scale(1) rotate(0)}
  }

  /* Winning cell glow */
  .cell.win{
    animation:winPulse 1.2s ease-in-out infinite alternate;
    border-color:var(--accent);
  }
  @keyframes winPulse{from{box-shadow:0 0 12px rgba(201,168,255,0.45), inset 0 1px 0 rgba(255,255,255,0.14)} to{box-shadow:0 0 28px rgba(201,168,255,0.85), inset 0 1px 0 rgba(255,255,255,0.20)}}

  /* Win line overlay */
  .win-line-svg{
    position:absolute;inset:0;width:100%;height:100%;pointer-events:none;
    overflow:visible;
  }
  .win-line-svg line{
    stroke-width:6;stroke-linecap:round;
    stroke-dasharray:600;stroke-dashoffset:600;
    animation:drawLine 0.5s ease-out forwards;
    filter:drop-shadow(0 0 12px currentColor);
  }
  @keyframes drawLine{to{stroke-dashoffset:0}}
  .win-line-svg.x line{stroke:var(--x);color:var(--x)}
  .win-line-svg.o line{stroke:var(--o);color:var(--o)}

  /* Bottom controls */
  .controls{
    display:flex;gap:0.6rem;align-items:center;flex-wrap:wrap;justify-content:center;
  }
  .btn{
    background:var(--glass-bg);
    backdrop-filter:blur(30px) saturate(180%);
    -webkit-backdrop-filter:blur(30px) saturate(180%);
    border:1px solid var(--glass-border);
    color:var(--ink);
    font-family:inherit;font-weight:500;
    font-size:0.85rem;letter-spacing:0.05em;
    padding:0.7rem 1.2rem;border-radius:999px;cursor:pointer;
    min-height:2.75rem;
    transition:all 0.2s;
    display:inline-flex;align-items:center;gap:0.4rem;
    box-shadow:0 4px 16px rgba(0,0,0,0.2), inset 0 1px 0 rgba(255,255,255,0.10);
  }
  .btn:hover{background:var(--glass-bg-hover);border-color:var(--glass-border-strong);transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn:focus-visible{outline:3px solid var(--accent);outline-offset:3px}
  .btn.primary{
    background:linear-gradient(135deg, rgba(255,107,138,0.18), rgba(94,234,212,0.18));
    border-color:rgba(201,168,255,0.40);
  }
  .btn.toggle[aria-pressed="true"]{
    background:linear-gradient(135deg, rgba(94,234,212,0.20), rgba(201,168,255,0.18));
    border-color:rgba(94,234,212,0.55);
    color:var(--o);
  }
  .btn.subtle{font-size:0.75rem;opacity:0.85}

  /* Result toast */
  .result-toast{
    position:fixed;top:50%;left:50%;transform:translate(-50%, -50%) scale(0.6);
    background:var(--glass-bg);
    backdrop-filter:blur(50px) saturate(180%);
    -webkit-backdrop-filter:blur(50px) saturate(180%);
    border:1px solid var(--glass-border-strong);
    border-radius:1.6rem;
    padding:2rem 2.6rem;text-align:center;z-index:20;
    box-shadow:0 24px 80px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.18);
    opacity:0;pointer-events:none;
    transition:opacity 0.35s, transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .result-toast.show{
    opacity:1;transform:translate(-50%, -50%) scale(1);
  }
  .result-toast h2{
    font-weight:700;font-size:clamp(1.6rem, 4vw, 2.4rem);
    letter-spacing:-0.02em;margin-bottom:0.4rem;
  }
  .result-toast.x h2{color:var(--x);text-shadow:0 0 24px var(--x-glow)}
  .result-toast.o h2{color:var(--o);text-shadow:0 0 24px var(--o-glow)}
  .result-toast.draw h2{color:var(--accent);text-shadow:0 0 18px rgba(201,168,255,0.5)}
  .result-toast p{
    font-weight:300;font-size:0.95rem;color:var(--silver);
    margin-bottom:1.2rem;letter-spacing:0.04em;
  }
  .result-toast .btn{margin:0 auto}

  /* Chat command HUD */
  .chat-panel{
    background:var(--glass-bg);
    backdrop-filter:blur(30px) saturate(180%);
    -webkit-backdrop-filter:blur(30px) saturate(180%);
    border:1px solid var(--glass-border);
    border-radius:1rem;
    padding:0.55rem 0.8rem;
    display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;justify-content:center;
    box-shadow:0 4px 16px rgba(0,0,0,0.20), inset 0 1px 0 rgba(255,255,255,0.10);
    font-family:'DM Mono', monospace;font-size:0.72rem;color:var(--silver);
    max-width:100%;
  }
  .chat-panel label{display:flex;align-items:center;gap:0.35rem;font-size:0.65rem;letter-spacing:0.16em;text-transform:uppercase}
  .chat-panel input[type="text"]{
    background:rgba(0,0,0,0.30);color:var(--ink);
    border:1px solid var(--glass-border);
    border-radius:0.4rem;
    padding:0.4rem 0.55rem;width:7rem;
    font-family:'DM Mono', monospace;font-size:0.78rem;
  }
  .chat-panel input[type="text"]:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,209,122,0.25)}
  .chat-panel .conn-dot{
    width:0.5rem;height:0.5rem;border-radius:50%;background:var(--silver-dim);transition:background 0.4s, box-shadow 0.4s;
  }
  .chat-panel .conn-dot.live{background:var(--o-leaf);box-shadow:0 0 8px var(--o-glow);animation:livePulse 2s ease-in-out infinite}
  .chat-panel .conn-dot.connecting{background:var(--accent);animation:livePulse 0.9s ease-in-out infinite}
  .chat-panel .conn-dot.fail{background:var(--x);box-shadow:0 0 8px var(--x-glow)}
  @keyframes livePulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .chat-panel .last-moves{
    color:var(--silver);font-size:0.7rem;letter-spacing:0.04em;
    max-width:16rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
  }
  .chat-panel .last-moves b{color:var(--accent)}
  .chat-panel .last-moves .mv{color:var(--o);font-weight:600}

  /* Cell chat-command label (small mono in top-left corner) */
  .cell .chat-label{
    position:absolute;top:0.3rem;left:0.4rem;
    font-family:'DM Mono', monospace;font-size:0.55rem;
    color:rgba(247,240,224,0.35);letter-spacing:0.06em;text-transform:lowercase;
    pointer-events:none;opacity:0;transition:opacity 0.3s;
    text-shadow:0 1px 2px rgba(0,0,0,0.4);
  }
  .cell .chat-label.show{opacity:1}
  .cell.taken .chat-label{display:none}

  /* Mode + scores layout responsive */
  @media (max-width: 540px){
    header{padding:1.2rem 1rem 0.5rem}
    .board{grid-template-columns:repeat(3, 4.8rem);grid-template-rows:repeat(3, 4.8rem);gap:0.4rem}
    .board-wrap{padding:0.9rem;border-radius:1.6rem}
    .cell{border-radius:0.9rem}
    .cell .ghost, .piece{inset:0.5rem}
    .score{min-width:4.2rem;padding:0.5rem 0.8rem}
    .score .val{font-size:1.25rem}
    .controls{gap:0.4rem}
    .btn{padding:0.55rem 0.9rem;font-size:0.75rem}
  }
  @media (prefers-reduced-motion: reduce){
    .piece{animation:none}
    .piece svg path, .piece svg circle{animation:none;stroke-dashoffset:0}
    .win-line-svg line{animation:none;stroke-dashoffset:0}
    .cell.win{animation:none;box-shadow:0 0 18px rgba(201,168,255,0.6)}
    .result-toast{transition:opacity 0.2s linear}
  }
</style>
</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <span class="orb orb-3" aria-hidden="true"></span>

  <header>
    <h1>Glass Tactoe</h1>
    <div class="tag">three in a row · in frosted glass</div>
  </header>

  <main>
    <div class="scores" role="group" aria-label="Scores">
      <div class="score x" id="scoreX">
        <span class="label">X</span>
        <span class="val" id="scoreXVal">0</span>
      </div>
      <div class="score draw" id="scoreDraw">
        <span class="label">draws</span>
        <span class="val" id="scoreDrawVal">0</span>
      </div>
      <div class="score o" id="scoreO">
        <span class="label">O</span>
        <span class="val" id="scoreOVal">0</span>
      </div>
    </div>

    <div class="turn x" id="turnPill" aria-live="polite">
      <span class="dot" aria-hidden="true"></span>
      <span><span class="who" id="turnWho">X</span>'s turn</span>
    </div>

    <div class="board-wrap">
      <div class="board" id="board" role="grid" aria-label="Tic-tac-toe board"></div>
      <svg class="win-line-svg" id="winLineSvg" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true"></svg>
    </div>

    <div class="controls" role="group" aria-label="Game controls">
      <button class="btn primary" id="newGameBtn" type="button" aria-label="Start a new round">⟳ New round</button>
      <button class="btn toggle" id="aiToggleBtn" type="button" aria-pressed="true" aria-label="Toggle AI opponent">🤖 vs AI</button>
      <button class="btn subtle" id="resetScoresBtn" type="button" aria-label="Reset all scores">reset scores</button>
    </div>

    <div class="chat-panel" role="group" aria-label="Twitch chat command listener">
      <span class="conn-dot" id="chatDot" aria-hidden="true"></span>
      <label for="chatChannelInput">channel
        <input id="chatChannelInput" type="text" placeholder="sloppy" value="" aria-label="Twitch channel name (without #)">
      </label>
      <button class="btn subtle" id="chatConnectBtn" type="button" aria-pressed="false" aria-label="Connect to chat">connect</button>
      <span class="last-moves" id="chatFeed" aria-live="polite">commands: <b>ol om or</b> · <b>ml mm mr</b> · <b>ul um ur</b></span>
    </div>
  </main>

  <div class="result-toast" id="resultToast" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="resultTitle">
    <h2 id="resultTitle">X wins!</h2>
    <p id="resultSub">three in a row on the top edge</p>
    <button class="btn primary" id="resultNextBtn" type="button">Play again</button>
  </div>

<script>
(function(){
  'use strict';

  function showError(msg){
    try {
      var t = document.getElementById('errToast');
      if (!t){
        t = document.createElement('div');
        t.id = 'errToast';
        t.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#3a0610;color:#ffb6c1;font-family:monospace;font-size:11px;padding:8px 12px;border-bottom:1px solid #ff2bd6;white-space:pre-wrap';
        document.body.appendChild(t);
      }
      t.textContent = '⚠ ' + msg;
    } catch(_){}
  }
  window.addEventListener('error', function(ev){
    showError((ev.message || 'error') + ' @ ' + (ev.filename ? ev.filename.split('/').pop() : '?') + ':' + (ev.lineno || '?'));
  });

  var prefersReducedMotion = false;
  try { prefersReducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch(_){}

  // ── State ──
  var state = {
    board: [null, null, null, null, null, null, null, null, null],
    currentPlayer: 'X',
    winner: null,
    winLine: null,
    locked: false,
    scores: { X: 0, O: 0, D: 0 },
    aiOn: true,
    firstPlayer: 'X'    // rotates each round
  };

  // Load saved scores + AI setting
  try {
    var raw = localStorage.getItem('glass-tactoe-v1');
    if (raw){
      var s = JSON.parse(raw);
      if (s.scores) state.scores = Object.assign(state.scores, s.scores);
      if (typeof s.aiOn === 'boolean') state.aiOn = s.aiOn;
    }
  } catch(_){}

  function saveState(){
    try {
      localStorage.setItem('glass-tactoe-v1', JSON.stringify({ scores: state.scores, aiOn: state.aiOn }));
    } catch(_){}
  }

  // Win-line patterns: indices in board array + line endpoints in % (for SVG overlay)
  var WIN_LINES = [
    // rows
    { cells: [0,1,2], from: [4, 16.67],   to: [96, 16.67],   label: 'top row' },
    { cells: [3,4,5], from: [4, 50],      to: [96, 50],      label: 'middle row' },
    { cells: [6,7,8], from: [4, 83.33],   to: [96, 83.33],   label: 'bottom row' },
    // cols
    { cells: [0,3,6], from: [16.67, 4],   to: [16.67, 96],   label: 'left column' },
    { cells: [1,4,7], from: [50, 4],      to: [50, 96],      label: 'middle column' },
    { cells: [2,5,8], from: [83.33, 4],   to: [83.33, 96],   label: 'right column' },
    // diagonals
    { cells: [0,4,8], from: [5, 5],       to: [95, 95],      label: 'main diagonal' },
    { cells: [2,4,6], from: [95, 5],      to: [5, 95],       label: 'anti-diagonal' }
  ];

  function checkWinner(board){
    for (var i = 0; i < WIN_LINES.length; i++){
      var w = WIN_LINES[i];
      var a = board[w.cells[0]], b = board[w.cells[1]], c = board[w.cells[2]];
      if (a && a === b && a === c) return { player: a, line: w };
    }
    return null;
  }
  function isDraw(board){
    return board.every(function(c){ return c !== null; });
  }

  // ── Minimax AI ──
  function minimax(board, player){
    var winner = checkWinner(board);
    if (winner){
      return winner.player === 'O' ? 10 - depth(board) : depth(board) - 10;
    }
    if (isDraw(board)) return 0;

    var scores = [];
    for (var i = 0; i < 9; i++){
      if (board[i] === null){
        board[i] = player;
        scores.push(minimax(board, player === 'X' ? 'O' : 'X'));
        board[i] = null;
      }
    }
    return player === 'O' ? Math.max.apply(null, scores) : Math.min.apply(null, scores);
  }
  function depth(board){
    var d = 0;
    for (var i = 0; i < 9; i++) if (board[i] !== null) d++;
    return d;
  }
  function bestMove(board){
    // 15% chance to play randomly so the AI is beatable occasionally
    if (Math.random() < 0.15){
      var open = [];
      for (var i = 0; i < 9; i++) if (board[i] === null) open.push(i);
      return open[Math.floor(Math.random() * open.length)];
    }
    var best = -Infinity, pos = -1;
    for (var j = 0; j < 9; j++){
      if (board[j] === null){
        board[j] = 'O';
        var sc = minimax(board, 'X');
        board[j] = null;
        if (sc > best){ best = sc; pos = j; }
      }
    }
    return pos;
  }

  // ── DOM build ──
  var boardEl = document.getElementById('board');
  var winLineSvg = document.getElementById('winLineSvg');
  var cells = [];

  // Chat command labels per cell (compass: o=over, m=mid, u=under  +  l=left, m=mid, r=right)
  var CELL_CMDS = ['ol','om','or','ml','mm','mr','ul','um','ur'];
  var CMD_TO_IDX = {};
  CELL_CMDS.forEach(function(cmd, i){ CMD_TO_IDX[cmd] = i; });

  function buildBoard(){
    boardEl.innerHTML = '';
    cells = [];
    for (var i = 0; i < 9; i++){
      var c = document.createElement('button');
      c.type = 'button';
      c.className = 'cell';
      c.dataset.idx = String(i);
      c.setAttribute('role', 'gridcell');
      c.setAttribute('aria-label', 'Cell ' + (i + 1) + ' (chat: ' + CELL_CMDS[i] + '), empty');
      c.setAttribute('tabindex', '0');
      // chat command label
      var lab = document.createElement('span');
      lab.className = 'chat-label';
      lab.textContent = CELL_CMDS[i];
      c.appendChild(lab);
      // ghost preview wrapper
      var g = document.createElement('div');
      g.className = 'ghost';
      g.setAttribute('aria-hidden', 'true');
      c.appendChild(g);
      c.addEventListener('click', (function(idx){
        return function(){ humanPlay(idx); };
      })(i));
      c.addEventListener('keydown', (function(idx){
        return function(e){
          if (e.code === 'Space' || e.code === 'Enter'){
            e.preventDefault();
            humanPlay(idx);
          }
        };
      })(i));
      boardEl.appendChild(c);
      cells.push(c);
    }
    updateGhosts();
    refreshChatLabels();
  }
  function refreshChatLabels(){
    var show = chatState && chatState.live;
    for (var i = 0; i < cells.length; i++){
      var lab = cells[i].querySelector('.chat-label');
      if (lab){
        if (show && state.board[i] === null) lab.classList.add('show');
        else lab.classList.remove('show');
      }
    }
  }

  // Organic crossing branches with autumn leaves at each tip
  function svgPieceX(){
    return '<svg viewBox="0 0 100 100" aria-hidden="true">' +
      // two crossing twigs with gentle wobble (quadratic curves)
      '<path class="branch b1" d="M 14 16 Q 30 30 44 46 Q 56 56 86 86" />' +
      '<path class="branch b2" d="M 86 16 Q 70 30 56 46 Q 44 56 14 86" />' +
      // 4 leaves at the four branch tips (almond shape via path)
      '<path class="leaf l1" d="M 14 16 q -8 -3 -10 -10 q 6 -3 13 1 q 3 5 -3 9 z" transform="rotate(-30 14 16)"/>' +
      '<path class="leaf l2" d="M 86 16 q 8 -3 10 -10 q -6 -3 -13 1 q -3 5 3 9 z" transform="rotate(30 86 16)"/>' +
      '<path class="leaf l3" d="M 86 86 q 8 3 10 10 q -6 3 -13 -1 q -3 -5 3 -9 z" transform="rotate(-30 86 86)"/>' +
      '<path class="leaf l4" d="M 14 86 q -8 3 -10 10 q 6 3 13 -1 q 3 -5 -3 -9 z" transform="rotate(30 14 86)"/>' +
      // mid-branch tiny leaf bud
      '<ellipse class="leaf l1" cx="50" cy="50" rx="3.5" ry="2" transform="rotate(35 50 50)"/>' +
      '</svg>';
  }
  // Curling vine forming a not-quite-closed circle, with sage leaves + 3 pink blossoms
  function svgPieceO(){
    return '<svg viewBox="0 0 100 100" aria-hidden="true">' +
      // wandering vine — starts top, curls clockwise, ends near top with a small overlap
      '<path class="branch" d="M 52 16 C 72 16 86 32 84 52 C 82 72 66 86 48 84 C 28 82 14 66 16 48 C 18 28 34 14 56 18" />' +
      // leaves around the vine (4 at compass positions, rotated to face outward)
      '<ellipse class="leaf l1" cx="84" cy="48" rx="6" ry="3" transform="rotate(20 84 48)"/>' +
      '<ellipse class="leaf l2" cx="48" cy="84" rx="6" ry="3" transform="rotate(110 48 84)"/>' +
      '<ellipse class="leaf l3" cx="16" cy="52" rx="6" ry="3" transform="rotate(-20 16 52)"/>' +
      '<ellipse class="leaf l4" cx="50" cy="16" rx="6" ry="3" transform="rotate(80 50 16)"/>' +
      // 3 pink blossoms (5 petal dots + yellow core)
      '<g class="blossom b1" transform="translate(30, 28)">' +
        '<circle cx="0" cy="-3.6" r="2.2"/>' +
        '<circle cx="3.4" cy="-1.1" r="2.2"/>' +
        '<circle cx="2.1" cy="3.0" r="2.2"/>' +
        '<circle cx="-2.1" cy="3.0" r="2.2"/>' +
        '<circle cx="-3.4" cy="-1.1" r="2.2"/>' +
        '<circle class="core" cx="0" cy="0" r="1.3"/>' +
      '</g>' +
      '<g class="blossom b2" transform="translate(74, 70)">' +
        '<circle cx="0" cy="-3.6" r="2.2"/>' +
        '<circle cx="3.4" cy="-1.1" r="2.2"/>' +
        '<circle cx="2.1" cy="3.0" r="2.2"/>' +
        '<circle cx="-2.1" cy="3.0" r="2.2"/>' +
        '<circle cx="-3.4" cy="-1.1" r="2.2"/>' +
        '<circle class="core" cx="0" cy="0" r="1.3"/>' +
      '</g>' +
      '<g class="blossom b3" transform="translate(22, 70)">' +
        '<circle cx="0" cy="-3.6" r="2.2"/>' +
        '<circle cx="3.4" cy="-1.1" r="2.2"/>' +
        '<circle cx="2.1" cy="3.0" r="2.2"/>' +
        '<circle cx="-2.1" cy="3.0" r="2.2"/>' +
        '<circle cx="-3.4" cy="-1.1" r="2.2"/>' +
        '<circle class="core" cx="0" cy="0" r="1.3"/>' +
      '</g>' +
      '</svg>';
  }

  function updateGhosts(){
    var who = state.currentPlayer;
    var svg = who === 'X' ? svgPieceX() : svgPieceO();
    var cls = who === 'X' ? 'x' : 'o';
    for (var i = 0; i < cells.length; i++){
      if (state.board[i] != null) continue;
      var g = cells[i].querySelector('.ghost');
      g.innerHTML = '<div class="piece ' + cls + '">' + svg + '</div>';
    }
  }

  function placePiece(idx, player){
    state.board[idx] = player;
    var c = cells[idx];
    c.classList.add('taken');
    c.setAttribute('aria-label', 'Cell ' + (idx + 1) + ', ' + player);
    // clear ghost
    var g = c.querySelector('.ghost');
    if (g) g.innerHTML = '';
    var piece = document.createElement('div');
    piece.className = 'piece ' + player.toLowerCase();
    piece.innerHTML = player === 'X' ? svgPieceX() : svgPieceO();
    c.appendChild(piece);
    // chat-label fades as the cell becomes taken
    refreshChatLabels();
  }

  function setTurn(player){
    var t = document.getElementById('turnPill');
    t.classList.remove('x', 'o', 'thinking');
    t.classList.add(player.toLowerCase());
    document.getElementById('turnWho').textContent = player;
  }

  function flashScore(key){
    var el = key === 'X' ? document.getElementById('scoreX')
           : key === 'O' ? document.getElementById('scoreO')
           : document.getElementById('scoreDraw');
    el.classList.add('pop');
    setTimeout(function(){ el.classList.remove('pop'); }, 1100);
  }

  function refreshScores(){
    document.getElementById('scoreXVal').textContent = state.scores.X;
    document.getElementById('scoreOVal').textContent = state.scores.O;
    document.getElementById('scoreDrawVal').textContent = state.scores.D;
  }
  refreshScores();

  function drawWinLine(winner){
    var line = winner.line;
    winLineSvg.innerHTML = '';
    winLineSvg.classList.remove('x', 'o');
    winLineSvg.classList.add(winner.player.toLowerCase());
    var l = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    l.setAttribute('x1', line.from[0]);
    l.setAttribute('y1', line.from[1]);
    l.setAttribute('x2', line.to[0]);
    l.setAttribute('y2', line.to[1]);
    winLineSvg.appendChild(l);
    // also glow winning cells
    line.cells.forEach(function(idx){ cells[idx].classList.add('win'); });
  }

  function showResult(winner, isDraw){
    var t = document.getElementById('resultToast');
    t.classList.remove('x', 'o', 'draw');
    if (isDraw){
      t.classList.add('draw');
      document.getElementById('resultTitle').textContent = 'Draw';
      document.getElementById('resultSub').textContent = 'a beautiful stalemate';
    } else {
      var p = winner.player.toLowerCase();
      t.classList.add(p);
      document.getElementById('resultTitle').textContent = winner.player + ' wins!';
      document.getElementById('resultSub').textContent = 'three in a row on the ' + winner.line.label;
    }
    setTimeout(function(){
      t.classList.add('show');
      t.setAttribute('aria-hidden', 'false');
      setTimeout(function(){ document.getElementById('resultNextBtn').focus(); }, 200);
    }, 700);
  }
  function hideResult(){
    var t = document.getElementById('resultToast');
    t.classList.remove('show');
    t.setAttribute('aria-hidden', 'true');
  }

  // ── Audio (subtle clicks + win) ──
  var audioCtx = null, muted = false;
  function ensureAudio(){
    if (audioCtx){ if (audioCtx.state === 'suspended') audioCtx.resume(); return audioCtx; }
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(_){ audioCtx = null; }
    return audioCtx;
  }
  function tone(type, freq, dur, gain, slideTo, t0){
    var c = ensureAudio(); if (!c || muted) return;
    var o = c.createOscillator(); o.type = type;
    var t = t0 || c.currentTime;
    o.frequency.setValueAtTime(freq, t);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20, slideTo), t + dur);
    var g = c.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(gain, t + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g).connect(c.destination);
    o.start(t); o.stop(t + dur + 0.02);
  }
  function sndPlace(player){
    tone('triangle', player === 'X' ? 660 : 880, 0.10, 0.10, player === 'X' ? 880 : 1100);
  }
  function sndWin(){
    [523, 659, 784, 1047].forEach(function(f, i){
      tone('triangle', f, 0.28, 0.15, null, ensureAudio() && audioCtx.currentTime + i * 0.08);
    });
  }
  function sndDraw(){
    tone('triangle', 440, 0.30, 0.10, 330);
  }

  // ── Gameplay ──
  function humanPlay(idx){
    if (state.locked || state.winner) return;
    if (state.board[idx] !== null) return;
    if (state.aiOn && state.currentPlayer === 'O') return; // AI's turn, ignore clicks
    placePiece(idx, state.currentPlayer);
    sndPlace(state.currentPlayer);
    finishTurn();
  }

  function finishTurn(){
    var winner = checkWinner(state.board);
    if (winner){
      state.winner = winner;
      state.locked = true;
      state.scores[winner.player]++;
      saveState();
      refreshScores();
      flashScore(winner.player);
      drawWinLine(winner);
      sndWin();
      showResult(winner, false);
      return;
    }
    if (isDraw(state.board)){
      state.locked = true;
      state.scores.D++;
      saveState();
      refreshScores();
      flashScore('D');
      sndDraw();
      showResult(null, true);
      return;
    }
    // switch player
    state.currentPlayer = state.currentPlayer === 'X' ? 'O' : 'X';
    setTurn(state.currentPlayer);
    updateGhosts();

    if (state.aiOn && state.currentPlayer === 'O'){
      state.locked = true;
      cells.forEach(function(c){ c.classList.add('locked'); });
      var pill = document.getElementById('turnPill');
      pill.classList.add('thinking');
      setTimeout(function(){
        var mv = bestMove(state.board.slice());
        if (mv >= 0){
          placePiece(mv, 'O');
          sndPlace('O');
        }
        cells.forEach(function(c){ c.classList.remove('locked'); });
        state.locked = false;
        pill.classList.remove('thinking');
        finishTurn();
      }, 600 + Math.random() * 350);
    }
  }

  function newRound(){
    hideResult();
    state.board = [null, null, null, null, null, null, null, null, null];
    state.winner = null;
    state.locked = false;
    // Alternate who goes first each round
    state.firstPlayer = state.firstPlayer === 'X' ? 'O' : 'X';
    state.currentPlayer = state.firstPlayer;
    winLineSvg.innerHTML = '';
    winLineSvg.classList.remove('x', 'o');
    buildBoard();
    setTurn(state.currentPlayer);
    // If AI goes first
    if (state.aiOn && state.currentPlayer === 'O'){
      state.locked = true;
      cells.forEach(function(c){ c.classList.add('locked'); });
      var pill = document.getElementById('turnPill');
      pill.classList.add('thinking');
      setTimeout(function(){
        var mv = bestMove(state.board.slice());
        if (mv >= 0){
          placePiece(mv, 'O');
          sndPlace('O');
        }
        cells.forEach(function(c){ c.classList.remove('locked'); });
        state.locked = false;
        pill.classList.remove('thinking');
        state.currentPlayer = 'X';
        setTurn('X');
        updateGhosts();
      }, 600);
    }
  }

  // ── Controls ──
  document.getElementById('newGameBtn').addEventListener('click', function(){
    ensureAudio();
    newRound();
  });
  document.getElementById('resultNextBtn').addEventListener('click', function(){
    ensureAudio();
    newRound();
  });
  var aiBtn = document.getElementById('aiToggleBtn');
  function refreshAiBtn(){
    aiBtn.setAttribute('aria-pressed', state.aiOn ? 'true' : 'false');
    aiBtn.textContent = state.aiOn ? '🤖 vs AI' : '👥 vs human';
  }
  refreshAiBtn();
  aiBtn.addEventListener('click', function(){
    state.aiOn = !state.aiOn;
    refreshAiBtn();
    saveState();
    // Restart round when toggling so we don't get stuck mid-game
    newRound();
  });
  document.getElementById('resetScoresBtn').addEventListener('click', function(){
    state.scores = { X: 0, O: 0, D: 0 };
    saveState();
    refreshScores();
  });

  // Keyboard: 1-9 fire cells
  window.addEventListener('keydown', function(e){
    if (e.target && e.target.tagName === 'INPUT') return;
    var n = parseInt(e.key, 10);
    if (n >= 1 && n <= 9){
      humanPlay(n - 1);
    } else if (e.code === 'KeyR'){
      newRound();
    }
  });

  // Unlock audio on first interaction
  ['pointerdown', 'keydown'].forEach(function(ev){
    window.addEventListener(ev, function once(){ ensureAudio(); window.removeEventListener(ev, once); });
  });

  // ── Twitch chat command listener ──
  // Anonymous IRC WebSocket. Commands ol/om/or/ml/mm/mr/ul/um/ur play the
  // current human player's move. First valid command per turn wins (no voting).
  // Per-user 1.2s cooldown to discourage one chatter from dominating.
  var chatState = { ws: null, live: false, connecting: false, channel: '', userCD: {} };
  function chatLog(text){
    var feed = document.getElementById('chatFeed');
    if (feed) feed.innerHTML = text;
  }
  function setChatStatus(kind){
    var dot = document.getElementById('chatDot');
    dot.classList.remove('live','connecting','fail');
    if (kind) dot.classList.add(kind);
    refreshChatLabels();
  }
  function chatPlay(cmd, user){
    var idx = CMD_TO_IDX[cmd];
    if (idx == null) return false;
    if (state.locked || state.winner) return false;
    if (state.board[idx] !== null) return false;
    // Only allow chat to play the human side: X always (in AI mode), or whichever side is current (in hot-seat)
    if (state.aiOn && state.currentPlayer !== 'X') return false;
    // Per-user cooldown
    var now = performance.now();
    if (chatState.userCD[user] && now - chatState.userCD[user] < 1200) return false;
    chatState.userCD[user] = now;
    placePiece(idx, state.currentPlayer);
    sndPlace(state.currentPlayer);
    chatLog('<span class="mv">' + user + '</span> played <b>' + cmd + '</b>');
    finishTurn();
    return true;
  }
  function connectChat(channel){
    if (chatState.ws){
      try { chatState.ws.close(); } catch(_){}
      chatState.ws = null;
    }
    if (!channel) return;
    chatState.channel = channel;
    chatState.connecting = true;
    chatState.live = false;
    setChatStatus('connecting');
    var btn = document.getElementById('chatConnectBtn');
    btn.textContent = 'connecting…';
    btn.setAttribute('aria-pressed', 'false');
    var ws;
    try {
      ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');
    } catch(e){
      setChatStatus('fail');
      chatLog('chat connect failed: ' + e.message);
      return;
    }
    chatState.ws = ws;
    var nick = 'justinfan' + Math.floor(Math.random() * 90000 + 10000);
    ws.onopen = function(){
      ws.send('PASS SCHMOOPIIE\r\n');
      ws.send('NICK ' + nick + '\r\n');
      ws.send('JOIN #' + channel.toLowerCase() + '\r\n');
    };
    ws.onmessage = function(ev){
      var data = ev.data;
      if (data.indexOf('PING ') === 0){ ws.send('PONG ' + data.slice(5)); return; }
      // First confirmed JOIN line — flip to live
      if (!chatState.live && /:tmi\.twitch\.tv 001|JOIN #/.test(data)){
        chatState.live = true;
        chatState.connecting = false;
        setChatStatus('live');
        btn.textContent = 'disconnect';
        btn.setAttribute('aria-pressed', 'true');
        chatLog('connected · #' + chatState.channel + ' · try <b>ol om or ml mm mr ul um ur</b>');
      }
      // Parse PRIVMSG: ":user!user@host PRIVMSG #chan :body"
      var lines = data.split('\r\n');
      for (var i = 0; i < lines.length; i++){
        var line = lines[i];
        var m = line.match(/^:([^!]+)!.*PRIVMSG #[^ ]+ :(.+)$/);
        if (!m) continue;
        var user = m[1];
        var body = m[2].trim().toLowerCase();
        // Allow optional leading "!" then the 2-letter command, ignoring extra text
        // e.g. "ol", "!om", "mm please"
        var token = body.replace(/^!+/, '').split(/\s+/)[0];
        if (CMD_TO_IDX.hasOwnProperty(token)){
          chatPlay(token, user);
        }
      }
    };
    ws.onerror = function(){
      setChatStatus('fail');
      chatLog('chat connection error');
    };
    ws.onclose = function(){
      if (chatState.live || chatState.connecting){
        chatState.live = false;
        chatState.connecting = false;
        setChatStatus('fail');
        chatLog('chat disconnected');
      }
      btn.textContent = 'connect';
      btn.setAttribute('aria-pressed', 'false');
      chatState.ws = null;
      refreshChatLabels();
    };
  }
  function disconnectChat(){
    if (chatState.ws){
      try { chatState.ws.close(); } catch(_){}
      chatState.ws = null;
    }
    chatState.live = false;
    chatState.connecting = false;
    setChatStatus(null);
    chatLog('disconnected · commands: <b>ol om or</b> · <b>ml mm mr</b> · <b>ul um ur</b>');
    refreshChatLabels();
  }
  document.getElementById('chatConnectBtn').addEventListener('click', function(){
    if (chatState.live || chatState.connecting){
      disconnectChat();
      return;
    }
    var ch = (document.getElementById('chatChannelInput').value || '').trim().toLowerCase().replace(/^#/, '');
    if (!ch){ chatLog('enter a twitch channel name to listen for chat moves'); return; }
    try { localStorage.setItem('glass-tactoe-chat-ch', ch); } catch(_){}
    connectChat(ch);
  });
  document.getElementById('chatChannelInput').addEventListener('keydown', function(e){
    if (e.code === 'Enter'){
      e.preventDefault();
      document.getElementById('chatConnectBtn').click();
    }
  });
  // Restore last channel
  try {
    var savedCh = localStorage.getItem('glass-tactoe-chat-ch');
    if (savedCh) document.getElementById('chatChannelInput').value = savedCh;
  } catch(_){}

  // ── Boot ──
  buildBoard();
  setTurn(state.currentPlayer);
})();
</script>
</body>
</html>
