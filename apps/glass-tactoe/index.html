<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Glass Tactoe · Forest Path</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0e1809">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8C%BF">
<meta name="description" content="3D tic-tac-toe on a forest floor. Stone tiles laid in moss; X grows as crossed twigs, O as a vine ring. Twitch chat can play with two-letter compass commands.">
<meta property="og:title" content="Glass Tactoe · Forest Path">
<meta property="og:description" content="3D tic-tac-toe on a forest floor. Stone tiles laid in moss; X grows as crossed twigs, O as a vine ring. Twitch chat can play with two-letter compass commands.">
<meta property="og:url" content="https://sloppy.live/glass-tactoe">
<meta property="og:image" content="https://image.pollinations.ai/prompt/3D%20isometric%20tic-tac-toe%20board%20on%20a%20mossy%20forest%20floor%20with%20stone%20path%20tiles%2C%20organic%20twig%20pieces%2C%20soft%20sunbeams%2C%20painterly%20low-poly?width=1200&height=630&model=flux&seed=3344&nologo=true">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0e1809;
    --moss:#3a6a2a;
    --moss-2:#22451c;
    --ink:#f5ecd6;
    --silver:#bdb89c;
    --silver-dim:#7a7858;
    --x:#c9722f;
    --x-leaf:#ff9a3a;
    --x-glow:rgba(255,154,58,0.55);
    --o:#7fb86a;
    --o-leaf:#a8d68a;
    --o-glow:rgba(127,184,106,0.55);
    --o-blossom:#ffb8d4;
    --accent:#ffd17a;
    --glass-bg:rgba(20,30,15,0.55);
    --glass-bg-hover:rgba(40,55,25,0.62);
    --glass-border:rgba(255,236,200,0.20);
    --glass-border-strong:rgba(255,236,200,0.38);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  html,body{
    height:100%;background:var(--void);color:var(--ink);
    font-family:'Outfit', system-ui, sans-serif;
    -webkit-tap-highlight-color:transparent;user-select:none;overflow:hidden;
  }
  body{display:flex;flex-direction:column;align-items:center;position:relative}

  #forest{position:fixed;inset:0;display:block;width:100%;height:100%;cursor:pointer}

  header{
    position:fixed;top:0;left:0;right:0;text-align:center;padding:1rem 1rem 0.4rem;
    pointer-events:none;z-index:6;
  }
  h1{
    font-weight:700;font-size:clamp(1.4rem, 3.4vw, 2.2rem);letter-spacing:-0.01em;line-height:1;
    background:linear-gradient(135deg, #f7ecc0 0%, #ffd17a 45%, #a8d68a 100%);
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 2px 6px rgba(0,0,0,0.5)) drop-shadow(0 0 18px rgba(255,209,122,0.20));
  }
  .tag{
    font-weight:300;font-size:clamp(0.7rem, 1.2vw, 0.85rem);color:var(--silver);margin-top:0.25rem;letter-spacing:0.06em;
    text-shadow:0 1px 4px rgba(0,0,0,0.6);
  }

  /* Scores top-center */
  .scores{
    position:fixed;top:4.6rem;left:50%;transform:translateX(-50%);
    display:flex;gap:0.5rem;align-items:center;
    z-index:6;
  }
  .score{
    background:var(--glass-bg);backdrop-filter:blur(14px) saturate(160%);-webkit-backdrop-filter:blur(14px) saturate(160%);
    border:1px solid var(--glass-border);border-radius:0.85rem;
    padding:0.55rem 0.9rem;min-width:4.6rem;text-align:center;
    box-shadow:0 6px 18px rgba(0,0,0,0.30), inset 0 1px 0 rgba(255,255,255,0.08);
    display:flex;flex-direction:column;gap:0.1rem;align-items:center;
    transition:transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), border-color 0.3s;
  }
  .score .label{font-size:0.6rem;font-weight:500;letter-spacing:0.22em;color:var(--silver);text-transform:uppercase}
  .score .val{font-family:'DM Mono', monospace;font-size:1.35rem;font-weight:500;line-height:1;color:var(--ink);letter-spacing:-0.02em}
  .score.x .val{color:var(--x-leaf)}
  .score.x{border-color:rgba(255,154,58,0.30)}
  .score.x.pop{transform:scale(1.12);border-color:var(--x-leaf);box-shadow:0 6px 18px rgba(0,0,0,0.3), 0 0 24px var(--x-glow), inset 0 1px 0 rgba(255,255,255,0.10)}
  .score.o .val{color:var(--o-leaf)}
  .score.o{border-color:rgba(168,214,138,0.32)}
  .score.o.pop{transform:scale(1.12);border-color:var(--o-leaf);box-shadow:0 6px 18px rgba(0,0,0,0.3), 0 0 24px var(--o-glow), inset 0 1px 0 rgba(255,255,255,0.10)}
  .score.draw.pop{transform:scale(1.10);border-color:var(--glass-border-strong)}

  /* Turn pill — bottom-center-above-controls */
  .turn{
    position:fixed;bottom:9.5rem;left:50%;transform:translateX(-50%);
    display:flex;align-items:center;gap:0.6rem;
    background:var(--glass-bg);backdrop-filter:blur(14px) saturate(160%);-webkit-backdrop-filter:blur(14px) saturate(160%);
    border:1px solid var(--glass-border);border-radius:999px;
    padding:0.55rem 1.1rem;
    font-size:0.78rem;font-weight:500;letter-spacing:0.16em;text-transform:uppercase;color:var(--silver);
    transition:all 0.35s;z-index:6;
    box-shadow:0 4px 14px rgba(0,0,0,0.30);
  }
  .turn .who{font-weight:700;color:var(--ink);transition:color 0.35s}
  .turn.x .who{color:var(--x-leaf);text-shadow:0 0 12px var(--x-glow)}
  .turn.o .who{color:var(--o-leaf);text-shadow:0 0 12px var(--o-glow)}
  .turn .dot{
    width:0.55rem;height:0.55rem;border-radius:50%;
    background:var(--silver-dim);transition:background 0.35s, box-shadow 0.35s;
  }
  .turn.x .dot{background:var(--x-leaf);box-shadow:0 0 10px var(--x-glow)}
  .turn.o .dot{background:var(--o-leaf);box-shadow:0 0 10px var(--o-glow)}
  .turn.thinking .dot{animation:thinkingPulse 1s ease-in-out infinite}
  @keyframes thinkingPulse{0%,100%{opacity:1}50%{opacity:0.3}}

  /* Controls + chat at bottom */
  .controls{
    position:fixed;bottom:4.6rem;left:50%;transform:translateX(-50%);
    display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;justify-content:center;
    z-index:6;max-width:calc(100% - 1rem);
  }
  .btn{
    background:var(--glass-bg);backdrop-filter:blur(14px) saturate(160%);-webkit-backdrop-filter:blur(14px) saturate(160%);
    border:1px solid var(--glass-border);color:var(--ink);
    font-family:inherit;font-weight:500;font-size:0.82rem;letter-spacing:0.04em;
    padding:0.65rem 1.1rem;border-radius:999px;cursor:pointer;min-height:2.75rem;
    transition:all 0.2s;display:inline-flex;align-items:center;gap:0.4rem;
    box-shadow:0 4px 14px rgba(0,0,0,0.30), inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .btn:hover{background:var(--glass-bg-hover);border-color:var(--glass-border-strong);transform:translateY(-1px)}
  .btn:active{transform:translateY(0)}
  .btn:focus-visible{outline:3px solid var(--accent);outline-offset:3px}
  .btn.primary{background:linear-gradient(135deg, rgba(127,184,106,0.30), rgba(255,209,122,0.30));border-color:rgba(255,209,122,0.45)}
  .btn.toggle[aria-pressed="true"]{background:linear-gradient(135deg, rgba(127,184,106,0.30), rgba(168,214,138,0.22));border-color:rgba(168,214,138,0.55);color:var(--o-leaf)}
  .btn.subtle{font-size:0.74rem;opacity:0.85}

  .chat-panel{
    position:fixed;bottom:1.1rem;left:50%;transform:translateX(-50%);
    background:var(--glass-bg);backdrop-filter:blur(14px) saturate(160%);-webkit-backdrop-filter:blur(14px) saturate(160%);
    border:1px solid var(--glass-border);border-radius:0.9rem;
    padding:0.5rem 0.85rem;
    display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;justify-content:center;
    box-shadow:0 4px 14px rgba(0,0,0,0.30), inset 0 1px 0 rgba(255,255,255,0.08);
    font-family:'DM Mono', monospace;font-size:0.7rem;color:var(--silver);
    max-width:calc(100% - 1rem);z-index:6;
  }
  .chat-panel label{display:flex;align-items:center;gap:0.35rem;font-size:0.62rem;letter-spacing:0.16em;text-transform:uppercase}
  .chat-panel input[type="text"]{
    background:rgba(0,0,0,0.30);color:var(--ink);border:1px solid var(--glass-border);border-radius:0.4rem;
    padding:0.4rem 0.55rem;width:6.5rem;font-family:'DM Mono', monospace;font-size:0.76rem;
  }
  .chat-panel input[type="text"]:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(255,209,122,0.25)}
  .chat-panel .conn-dot{
    width:0.5rem;height:0.5rem;border-radius:50%;background:var(--silver-dim);transition:background 0.4s, box-shadow 0.4s;
  }
  .chat-panel .conn-dot.live{background:var(--o-leaf);box-shadow:0 0 8px var(--o-glow);animation:livePulse 2s ease-in-out infinite}
  .chat-panel .conn-dot.connecting{background:var(--accent);animation:livePulse 0.9s ease-in-out infinite}
  .chat-panel .conn-dot.fail{background:var(--x-leaf);box-shadow:0 0 8px var(--x-glow)}
  @keyframes livePulse{0%,100%{opacity:1}50%{opacity:0.4}}
  .chat-panel .last-moves{color:var(--silver);font-size:0.68rem;letter-spacing:0.04em;max-width:14rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .chat-panel .last-moves b{color:var(--accent)}
  .chat-panel .last-moves .mv{color:var(--o-leaf);font-weight:600}

  /* Floating cell command labels (positioned over 3D tiles via JS) */
  .cell-label{
    position:fixed;pointer-events:none;z-index:5;
    font-family:'DM Mono', monospace;font-size:0.68rem;letter-spacing:0.04em;
    color:rgba(247,236,214,0.65);
    background:rgba(20,30,15,0.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border:1px solid var(--glass-border);
    padding:0.18rem 0.42rem;border-radius:0.32rem;
    transform:translate(-50%, -50%);
    box-shadow:0 2px 6px rgba(0,0,0,0.4);
    opacity:0;transition:opacity 0.3s;
  }
  .cell-label.show{opacity:1}

  /* Result toast */
  .result-toast{
    position:fixed;top:50%;left:50%;transform:translate(-50%, -50%) scale(0.6);
    background:var(--glass-bg);backdrop-filter:blur(24px) saturate(180%);-webkit-backdrop-filter:blur(24px) saturate(180%);
    border:1px solid var(--glass-border-strong);border-radius:1.4rem;
    padding:1.6rem 2.2rem;text-align:center;z-index:20;
    box-shadow:0 24px 64px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,255,255,0.12);
    opacity:0;pointer-events:none;
    transition:opacity 0.35s, transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    min-width:14rem;
  }
  .result-toast.show{opacity:1;transform:translate(-50%, -50%) scale(1);pointer-events:auto}
  .result-toast h2{font-weight:700;font-size:clamp(1.5rem, 4vw, 2.2rem);letter-spacing:-0.02em;margin-bottom:0.3rem}
  .result-toast.x h2{color:var(--x-leaf);text-shadow:0 0 22px var(--x-glow)}
  .result-toast.o h2{color:var(--o-leaf);text-shadow:0 0 22px var(--o-glow)}
  .result-toast.draw h2{color:var(--accent);text-shadow:0 0 18px rgba(255,209,122,0.5)}
  .result-toast p{font-weight:300;font-size:0.9rem;color:var(--silver);margin-bottom:1.1rem;letter-spacing:0.04em}
  .result-toast .btn{margin:0 auto}

  @media (max-width: 540px){
    header{padding:0.7rem 1rem 0.2rem}
    .scores{top:3.8rem;gap:0.35rem}
    .score{padding:0.4rem 0.65rem;min-width:3.6rem}
    .score .val{font-size:1.08rem}
    .turn{bottom:8.5rem;font-size:0.65rem;padding:0.4rem 0.85rem}
    .controls{bottom:4.4rem;gap:0.35rem}
    .btn{padding:0.5rem 0.85rem;font-size:0.72rem}
    .chat-panel{bottom:0.9rem;font-size:0.6rem;padding:0.4rem 0.6rem}
    .chat-panel input[type="text"]{width:4.8rem}
    .chat-panel .last-moves{max-width:9rem}
  }
  @media (prefers-reduced-motion: reduce){
    .result-toast{transition:opacity 0.2s linear}
    .score, .turn, .btn{transition:none}
  }
</style>
</head>
<body>
  <canvas id="forest"></canvas>

  <header>
    <h1>Glass Tactoe · Forest Path</h1>
    <div class="tag">a stone path through the moss · grow your twig</div>
  </header>

  <div class="scores" role="group" aria-label="Scores">
    <div class="score x" id="scoreX"><span class="label">X</span><span class="val" id="scoreXVal">0</span></div>
    <div class="score draw" id="scoreDraw"><span class="label">draws</span><span class="val" id="scoreDrawVal">0</span></div>
    <div class="score o" id="scoreO"><span class="label">O</span><span class="val" id="scoreOVal">0</span></div>
  </div>

  <div class="turn x" id="turnPill" aria-live="polite">
    <span class="dot" aria-hidden="true"></span>
    <span><span class="who" id="turnWho">X</span>'s turn</span>
  </div>

  <div class="controls" role="group" aria-label="Game controls">
    <button class="btn primary" id="newGameBtn" type="button" aria-label="Start a new round">⟳ New round</button>
    <button class="btn toggle" id="aiToggleBtn" type="button" aria-pressed="true" aria-label="Toggle AI opponent">🤖 vs AI</button>
    <button class="btn subtle" id="resetScoresBtn" type="button" aria-label="Reset all scores">reset scores</button>
  </div>

  <div class="chat-panel" role="group" aria-label="Twitch chat command listener">
    <span class="conn-dot" id="chatDot" aria-hidden="true"></span>
    <label for="chatChannelInput">channel
      <input id="chatChannelInput" type="text" placeholder="sloppy" value="" aria-label="Twitch channel name (without #)">
    </label>
    <button class="btn subtle" id="chatConnectBtn" type="button" aria-pressed="false" aria-label="Connect to chat">connect</button>
    <span class="last-moves" id="chatFeed" aria-live="polite">commands: <b>ol om or · ml mm mr · ul um ur</b></span>
  </div>

  <div class="result-toast" id="resultToast" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="resultTitle">
    <h2 id="resultTitle">X wins!</h2>
    <p id="resultSub">three in a row on the top edge</p>
    <button class="btn primary" id="resultNextBtn" type="button">Play again</button>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  'use strict';

  function showError(msg){
    try {
      var t = document.getElementById('errToast');
      if (!t){
        t = document.createElement('div');
        t.id = 'errToast';
        t.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#3a0610;color:#ffb6c1;font-family:monospace;font-size:11px;padding:8px 12px;border-bottom:1px solid #ff2bd6;white-space:pre-wrap';
        document.body.appendChild(t);
      }
      t.textContent = '⚠ ' + msg;
    } catch(_){}
  }
  window.addEventListener('error', function(ev){
    showError((ev.message || 'error') + ' @ ' + (ev.filename ? ev.filename.split('/').pop() : '?') + ':' + (ev.lineno || '?'));
  });

  if (typeof THREE === 'undefined'){
    showError('three.js failed to load');
    return;
  }

  var prefersReducedMotion = false;
  try { prefersReducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch(_){}

  // ── three.js setup ──
  var canvas = document.getElementById('forest');
  var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(window.innerWidth, window.innerHeight, false);
  renderer.setClearColor(0x0e1809);
  // Photoreal upgrade: PBR-friendly output + soft shadow mapping + cinematic tonemap
  if (THREE.sRGBEncoding) renderer.outputEncoding = THREE.sRGBEncoding;
  renderer.toneMapping = THREE.ACESFilmicToneMapping;
  renderer.toneMappingExposure = 1.15;
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  renderer.physicallyCorrectLights = true;

  var scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x1d2a14, 10, 38);

  var camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 200);
  // Iso-ish 3/4 angle looking down at the board
  camera.position.set(0, 7.5, 8);
  camera.lookAt(0, 0, 0);

  function resize(){
    renderer.setSize(window.innerWidth, window.innerHeight, false);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  }
  window.addEventListener('resize', resize);

  // ── Lighting — physically based: hemi for sky/ground bounce, sun w/ soft shadow, cool rim ──
  // physicallyCorrectLights = true means light intensities are in lumens; scale up
  var hemi = new THREE.HemisphereLight(0x9fbfff, 0x3a5a24, 0.85);
  scene.add(hemi);
  var sun = new THREE.DirectionalLight(0xfff2c0, 2.4);
  sun.position.set(7, 14, 5);
  sun.castShadow = true;
  sun.shadow.mapSize.width = 1024;
  sun.shadow.mapSize.height = 1024;
  sun.shadow.camera.near = 1;
  sun.shadow.camera.far = 45;
  sun.shadow.camera.left = -14;
  sun.shadow.camera.right = 14;
  sun.shadow.camera.top = 14;
  sun.shadow.camera.bottom = -14;
  sun.shadow.bias = -0.0005;
  sun.shadow.radius = 4;
  scene.add(sun);
  var rim = new THREE.DirectionalLight(0x7fb8ff, 0.45);
  rim.position.set(-9, 5, -7);
  scene.add(rim);

  // ── Mossy ground — displaced PlaneGeometry with PBR moss material ──
  // High-resolution plane (180x180 segments over 80u² area) lets us add organic
  // height variation via per-vertex noise displacement. Center stays flat so
  // the stone tiles sit on level ground.
  var groundGeom = new THREE.PlaneGeometry(80, 80, 180, 180);
  groundGeom.rotateX(-Math.PI / 2);
  (function displaceGround(){
    var pos = groundGeom.attributes.position;
    for (var i = 0; i < pos.count; i++){
      var vx = pos.getX(i), vz = pos.getZ(i);
      var distFromCenter = Math.sqrt(vx*vx + vz*vz);
      // Soft falloff: no displacement within radius 3.5, gradually ramps up beyond
      var mask = Math.max(0, Math.min(1, (distFromCenter - 3.5) / 4));
      var n1 = Math.sin(vx * 0.34) * Math.cos(vz * 0.42) * 0.18;
      var n2 = Math.sin(vx * 0.95 + vz * 0.61) * 0.07;
      var n3 = Math.sin(vx * 2.1) * Math.cos(vz * 1.7) * 0.025;
      pos.setY(i, (n1 + n2 + n3) * mask);
    }
    pos.needsUpdate = true;
    groundGeom.computeVertexNormals();
  })();
  var groundMat = new THREE.MeshStandardMaterial({
    color: 0x2c4a1c,
    roughness: 0.92,
    metalness: 0.02,
    flatShading: false
  });
  var ground = new THREE.Mesh(groundGeom, groundMat);
  ground.position.y = -0.02;
  ground.receiveShadow = true;
  scene.add(ground);

  // Scatter moss tufts — denser, hue-varied IcosahedronGeometry blobs for organic clusters
  // Mix small "patches" + larger "tufts" so the floor doesn't read as uniform spheres
  for (var i = 0; i < 380; i++){
    var ang = Math.random() * Math.PI * 2;
    var r = 1.6 + Math.random() * 18;
    var hue = 95 + (Math.random() - 0.5) * 30;   // 80-110 = mossy green range
    var sat = 45 + Math.random() * 30;
    var light = 18 + Math.random() * 18;
    var tuftColor = new THREE.Color('hsl(' + Math.round(hue) + ',' + Math.round(sat) + '%,' + Math.round(light) + '%)');
    // Mostly icosahedrons for natural rocky-blob silhouette, some spheres for soft tufts
    var size = 0.13 + Math.random() * 0.24;
    var isPatch = Math.random() < 0.4;
    var tuftGeom = isPatch
      ? new THREE.IcosahedronGeometry(size, 0)
      : new THREE.SphereGeometry(size, 6, 4);
    var tuftMat = new THREE.MeshStandardMaterial({
      color: tuftColor,
      roughness: 0.95,
      metalness: 0
    });
    var tuft = new THREE.Mesh(tuftGeom, tuftMat);
    tuft.position.set(
      Math.cos(ang) * r,
      0.05 + Math.random() * 0.05,
      Math.sin(ang) * r
    );
    tuft.scale.set(
      0.8 + Math.random() * 0.4,
      isPatch ? 0.3 + Math.random() * 0.25 : 0.35 + Math.random() * 0.3,
      0.8 + Math.random() * 0.4
    );
    tuft.rotation.y = Math.random() * Math.PI * 2;
    tuft.castShadow = !isPatch;
    tuft.receiveShadow = true;
    scene.add(tuft);
  }

  // Scattered pebbles — irregular IcosahedronGeometry with rocky brown/grey hues
  for (var i = 0; i < 48; i++){
    var ang = Math.random() * Math.PI * 2;
    var r = 3 + Math.random() * 10;
    var pebbleHue = 28 + Math.random() * 16;
    var pebbleLight = 24 + Math.random() * 16;
    var pebbleColor = new THREE.Color('hsl(' + Math.round(pebbleHue) + ',12%,' + Math.round(pebbleLight) + '%)');
    var pebble = new THREE.Mesh(
      new THREE.IcosahedronGeometry(0.10 + Math.random() * 0.13, 0),
      new THREE.MeshStandardMaterial({ color: pebbleColor, roughness: 0.75, metalness: 0.05 })
    );
    pebble.position.set(Math.cos(ang) * r, 0.08, Math.sin(ang) * r);
    pebble.scale.set(1, 0.55 + Math.random() * 0.15, 1);
    pebble.rotation.y = Math.random() * Math.PI * 2;
    pebble.castShadow = true;
    pebble.receiveShadow = true;
    scene.add(pebble);
  }

  // Scattered toadstools (red cap + cream stem) — PBR materials with caps casting shadow
  for (var i = 0; i < 18; i++){
    var ang = Math.random() * Math.PI * 2;
    var r = 3.5 + Math.random() * 10;
    var stemMat = new THREE.MeshStandardMaterial({ color: 0xeadfba, roughness: 0.85, metalness: 0 });
    var capMat = new THREE.MeshStandardMaterial({ color: 0xc8442a, roughness: 0.55, metalness: 0.05 });
    var stem = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.10, 0.35, 8), stemMat);
    var cap = new THREE.Mesh(new THREE.SphereGeometry(0.18, 10, 8, 0, Math.PI*2, 0, Math.PI/2), capMat);
    cap.scale.y = 0.7;
    var sx = Math.cos(ang)*r, sz = Math.sin(ang)*r;
    stem.position.set(sx, 0.20, sz);
    cap.position.set(sx, 0.20 + 0.18, sz);
    stem.castShadow = true; stem.receiveShadow = true;
    cap.castShadow = true; cap.receiveShadow = true;
    scene.add(stem); scene.add(cap);
    // Tiny white spots on red caps (the classic Amanita look)
    if (Math.random() < 0.7){
      for (var sp = 0; sp < 3; sp++){
        var spotMat = new THREE.MeshStandardMaterial({ color: 0xfaf2dc, roughness: 0.7 });
        var spot = new THREE.Mesh(new THREE.SphereGeometry(0.025, 6, 4), spotMat);
        var spotAng = Math.random() * Math.PI * 2;
        var spotR = 0.08 + Math.random() * 0.06;
        spot.position.set(
          sx + Math.cos(spotAng) * spotR,
          0.20 + 0.18 + 0.08 + Math.random() * 0.04,
          sz + Math.sin(spotAng) * spotR
        );
        scene.add(spot);
      }
    }
  }

  // Background firs — PBR trunks + 3-tier crowns with hue variation, casting shadows
  for (var i = 0; i < 32; i++){
    var ang = (i / 32) * Math.PI * 2 + (Math.random() - 0.5) * 0.18;
    var r = 17 + Math.random() * 8;
    var trunkH = 3.6 + Math.random() * 3.6;
    var trunkColor = new THREE.Color('hsl(' + (20 + Math.random() * 12) + ',38%,' + (8 + Math.random() * 8) + '%)');
    var trunkMat = new THREE.MeshStandardMaterial({ color: trunkColor, roughness: 0.95, metalness: 0 });
    var trunk = new THREE.Mesh(
      new THREE.CylinderGeometry(0.22, 0.36, trunkH, 8),
      trunkMat
    );
    trunk.position.set(Math.cos(ang) * r, trunkH / 2 - 0.05, Math.sin(ang) * r);
    trunk.castShadow = true; trunk.receiveShadow = true;
    scene.add(trunk);
    var crownHueBase = 95 + (Math.random() - 0.5) * 14;
    for (var k = 0; k < 3; k++){
      var crownH = 1.7 - k * 0.30;
      var crownR = 1.25 - k * 0.30;
      var crownColor = new THREE.Color('hsl(' + Math.round(crownHueBase) + ',55%,' + Math.round(14 + k * 5) + '%)');
      var crownMat = new THREE.MeshStandardMaterial({ color: crownColor, roughness: 0.88, metalness: 0, flatShading: true });
      var crown = new THREE.Mesh(
        new THREE.ConeGeometry(crownR, crownH, 7),
        crownMat
      );
      crown.position.set(trunk.position.x, trunkH + k * (crownH * 0.58), trunk.position.z);
      crown.rotation.y = Math.random() * Math.PI * 2;
      crown.castShadow = true;
      scene.add(crown);
    }
  }

  // Drifting spore particles (small bright dots that slowly rise)
  var SPORE_COUNT = 80;
  var sporeGeom = new THREE.BufferGeometry();
  var sporePositions = new Float32Array(SPORE_COUNT * 3);
  var sporeVelocities = [];
  for (var i = 0; i < SPORE_COUNT; i++){
    var ang = Math.random() * Math.PI * 2;
    var r = 2 + Math.random() * 14;
    sporePositions[i*3]   = Math.cos(ang) * r;
    sporePositions[i*3+1] = 0.3 + Math.random() * 6;
    sporePositions[i*3+2] = Math.sin(ang) * r;
    sporeVelocities.push({
      vy: 0.08 + Math.random() * 0.12,
      vx: (Math.random() - 0.5) * 0.04,
      vz: (Math.random() - 0.5) * 0.04
    });
  }
  sporeGeom.setAttribute('position', new THREE.BufferAttribute(sporePositions, 3));
  var sporeMat = new THREE.PointsMaterial({
    color: 0xfff0b8, size: 0.06, transparent: true, opacity: 0.55, sizeAttenuation: true
  });
  var spores = new THREE.Points(sporeGeom, sporeMat);
  scene.add(spores);

  // ── Board: 9 stone tiles ──
  var TILE_SIZE = 1.55;
  var TILE_GAP = 0.18;
  var BOARD_H = 0.20;
  var tiles = [];
  var pieces = []; // index → THREE.Group (or null)
  function tileXZ(idx){
    var col = idx % 3;
    var row = Math.floor(idx / 3);
    return {
      x: (col - 1) * (TILE_SIZE + TILE_GAP),
      z: (row - 1) * (TILE_SIZE + TILE_GAP)
    };
  }
  for (var i = 0; i < 9; i++){
    var pos = tileXZ(i);
    // Slight per-tile color jitter for hand-laid character
    var stoneBase = new THREE.Color('hsl(' + Math.round(36 + (Math.random() - 0.5) * 14) + ',' + Math.round(10 + Math.random() * 8) + '%,' + Math.round(46 + Math.random() * 8) + '%)');
    var stoneMat = new THREE.MeshStandardMaterial({
      color: stoneBase,
      roughness: 0.78,
      metalness: 0.04,
      flatShading: true
    });
    var stone = new THREE.Mesh(
      new THREE.BoxGeometry(TILE_SIZE, BOARD_H, TILE_SIZE),
      stoneMat
    );
    stone.position.set(pos.x, BOARD_H/2, pos.z);
    // Subtle hand-laid wobble: tiny rotation + height offset
    stone.rotation.y = (Math.random() - 0.5) * 0.08;
    stone.rotation.x = (Math.random() - 0.5) * 0.025;
    stone.rotation.z = (Math.random() - 0.5) * 0.025;
    stone.position.y += (Math.random() - 0.5) * 0.018;
    stone.userData.idx = i;
    stone.userData.baseColor = stoneBase.clone();
    stone.userData.hoverColor = new THREE.Color(0xc9a872);
    stone.userData.winColor = new THREE.Color(0xffd17a);
    stone.castShadow = true;
    stone.receiveShadow = true;
    scene.add(stone);
    tiles.push(stone);
    pieces.push(null);

    // mossy edge crust around each tile — irregular green slab beneath the stone
    var crustMat = new THREE.MeshStandardMaterial({
      color: 0x3a5a24,
      roughness: 0.95,
      metalness: 0
    });
    var crust = new THREE.Mesh(
      new THREE.BoxGeometry(TILE_SIZE + 0.18, 0.06, TILE_SIZE + 0.18),
      crustMat
    );
    crust.position.set(pos.x, 0.03, pos.z);
    crust.receiveShadow = true;
    scene.add(crust);

    // tiny moss flecks on top of each stone (varied hues)
    for (var t = 0; t < 5; t++){
      var fleckHue = 95 + Math.random() * 18;
      var fleckColor = new THREE.Color('hsl(' + Math.round(fleckHue) + ',55%,' + Math.round(28 + Math.random() * 16) + '%)');
      var fleckMat = new THREE.MeshStandardMaterial({ color: fleckColor, roughness: 0.95 });
      var fleck = new THREE.Mesh(
        new THREE.IcosahedronGeometry(0.05 + Math.random() * 0.03, 0),
        fleckMat
      );
      var fx = (Math.random() - 0.5) * (TILE_SIZE * 0.85);
      var fz = (Math.random() - 0.5) * (TILE_SIZE * 0.85);
      fleck.position.set(pos.x + fx, BOARD_H + 0.025, pos.z + fz);
      fleck.scale.y = 0.4;
      fleck.receiveShadow = true;
      scene.add(fleck);
    }
  }

  // ── 3D piece builders ──
  // X = two crossed twigs (cylinders) lying flat over the stone, plus 4 small leaves
  function buildX(){
    var g = new THREE.Group();
    var twigMat = new THREE.MeshStandardMaterial({ color: 0x6a3a14, roughness: 0.88, metalness: 0 });
    var leafMat = new THREE.MeshStandardMaterial({ color: 0xff9a3a, roughness: 0.65, metalness: 0, side: THREE.DoubleSide });
    // twig 1
    var t1 = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 1.05, 6), twigMat);
    t1.rotation.z = Math.PI / 2;       // horizontal
    t1.rotation.y = Math.PI / 4;       // rotate around vertical to make diagonal
    t1.position.y = 0.07;
    g.add(t1);
    var t2 = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 1.05, 6), twigMat);
    t2.rotation.z = Math.PI / 2;
    t2.rotation.y = -Math.PI / 4;
    t2.position.y = 0.10;
    g.add(t2);
    // 4 leaves at the 4 twig tips (rotated planes tilted up slightly)
    var leafGeom = new THREE.PlaneGeometry(0.22, 0.38);
    var leafOffsets = [
      { x:  0.38, z:  0.38, ry:  Math.PI / 4 },
      { x: -0.38, z:  0.38, ry: -Math.PI / 4 },
      { x:  0.38, z: -0.38, ry: -Math.PI / 4 },
      { x: -0.38, z: -0.38, ry:  Math.PI / 4 }
    ];
    leafOffsets.forEach(function(o){
      var leaf = new THREE.Mesh(leafGeom, leafMat);
      leaf.position.set(o.x, 0.18, o.z);
      leaf.rotation.x = -Math.PI / 2 + 0.32;  // slight tilt up
      leaf.rotation.y = o.ry;
      g.add(leaf);
    });
    // mid bud
    var bud = new THREE.Mesh(new THREE.SphereGeometry(0.06, 6, 4), leafMat);
    bud.position.y = 0.16;
    g.add(bud);
    return g;
  }
  // O = a curling vine ring (torus geometry) with 4 sage leaves + 3 pink-blossom clusters
  function buildO(){
    var g = new THREE.Group();
    var vineMat = new THREE.MeshStandardMaterial({ color: 0x4a7a2a, roughness: 0.78, metalness: 0 });
    var ring = new THREE.Mesh(new THREE.TorusGeometry(0.46, 0.05, 10, 32), vineMat);
    ring.rotation.x = Math.PI / 2;
    ring.position.y = 0.09;
    g.add(ring);
    // 4 leaves around the ring
    var leafGeom = new THREE.PlaneGeometry(0.22, 0.34);
    var leafMat = new THREE.MeshStandardMaterial({ color: 0xa8d68a, roughness: 0.70, metalness: 0, side: THREE.DoubleSide });
    for (var i = 0; i < 4; i++){
      var ang = (i / 4) * Math.PI * 2 + Math.PI / 4;
      var leaf = new THREE.Mesh(leafGeom, leafMat);
      leaf.position.set(Math.cos(ang) * 0.5, 0.16, Math.sin(ang) * 0.5);
      leaf.rotation.x = -Math.PI / 2 + 0.28;
      leaf.rotation.y = -ang + Math.PI / 2;
      g.add(leaf);
    }
    // 3 pink blossom clusters along the ring
    var petalMat = new THREE.MeshStandardMaterial({ color: 0xffb8d4, roughness: 0.55, metalness: 0 });
    var coreMat = new THREE.MeshStandardMaterial({ color: 0xffe07a, roughness: 0.4, metalness: 0 });
    for (var b = 0; b < 3; b++){
      var ang2 = (b / 3) * Math.PI * 2 - Math.PI / 6;
      var bx = Math.cos(ang2) * 0.46;
      var bz = Math.sin(ang2) * 0.46;
      var blossom = new THREE.Group();
      blossom.position.set(bx, 0.14, bz);
      // 5 petals around a yellow core
      for (var p = 0; p < 5; p++){
        var pa = (p / 5) * Math.PI * 2;
        var petal = new THREE.Mesh(new THREE.SphereGeometry(0.06, 6, 4), petalMat);
        petal.position.set(Math.cos(pa) * 0.08, 0, Math.sin(pa) * 0.08);
        blossom.add(petal);
      }
      var core = new THREE.Mesh(new THREE.SphereGeometry(0.05, 6, 4), coreMat);
      blossom.add(core);
      g.add(blossom);
    }
    return g;
  }

  // Add a piece to a tile with a sprout-in animation
  function placePieceMesh(idx, player){
    var pos = tileXZ(idx);
    var piece = player === 'X' ? buildX() : buildO();
    piece.position.set(pos.x, BOARD_H, pos.z);
    piece.scale.set(0.01, 0.01, 0.01);
    piece.userData.spawnT = 0;
    piece.userData.spawnDur = 0.6;
    // Enable shadow casting on every mesh inside the piece group
    piece.traverse(function(o){ if (o.isMesh){ o.castShadow = true; o.receiveShadow = true; } });
    scene.add(piece);
    pieces[idx] = piece;
  }

  function clearAllPieces(){
    for (var i = 0; i < pieces.length; i++){
      if (pieces[i]){ scene.remove(pieces[i]); pieces[i] = null; }
    }
    // Reset tile colors + remove any winning-line glow markers
    tiles.forEach(function(t){
      t.material.color.copy(t.userData.baseColor);
      t.userData.isWin = false;
      t.userData.winPulse = 0;
    });
    winMarkers.forEach(function(m){ scene.remove(m); });
    winMarkers = [];
  }

  // ── Game state ──
  var state = {
    board: [null,null,null,null,null,null,null,null,null],
    currentPlayer: 'X',
    winner: null,
    locked: false,
    scores: { X: 0, O: 0, D: 0 },
    aiOn: true,
    firstPlayer: 'X'
  };

  try {
    var raw = localStorage.getItem('glass-tactoe-v2');
    if (raw){
      var s = JSON.parse(raw);
      if (s.scores) state.scores = Object.assign(state.scores, s.scores);
      if (typeof s.aiOn === 'boolean') state.aiOn = s.aiOn;
    }
  } catch(_){}
  function saveState(){
    try {
      localStorage.setItem('glass-tactoe-v2', JSON.stringify({ scores: state.scores, aiOn: state.aiOn }));
    } catch(_){}
  }

  var WIN_LINES = [
    { cells: [0,1,2], label: 'top edge of the path' },
    { cells: [3,4,5], label: 'middle of the path' },
    { cells: [6,7,8], label: 'far edge of the path' },
    { cells: [0,3,6], label: 'left column' },
    { cells: [1,4,7], label: 'middle column' },
    { cells: [2,5,8], label: 'right column' },
    { cells: [0,4,8], label: 'forward diagonal' },
    { cells: [2,4,6], label: 'back diagonal' }
  ];
  function checkWinner(board){
    for (var i = 0; i < WIN_LINES.length; i++){
      var w = WIN_LINES[i];
      var a = board[w.cells[0]], b = board[w.cells[1]], c = board[w.cells[2]];
      if (a && a === b && a === c) return { player: a, line: w };
    }
    return null;
  }
  function isDraw(board){ return board.every(function(c){ return c !== null; }); }

  // Minimax AI (15% randomness so it's beatable)
  function minimax(board, player){
    var winner = checkWinner(board);
    if (winner) return winner.player === 'O' ? 10 - countMoves(board) : countMoves(board) - 10;
    if (isDraw(board)) return 0;
    var scores = [];
    for (var i = 0; i < 9; i++){
      if (board[i] === null){
        board[i] = player;
        scores.push(minimax(board, player === 'X' ? 'O' : 'X'));
        board[i] = null;
      }
    }
    return player === 'O' ? Math.max.apply(null, scores) : Math.min.apply(null, scores);
  }
  function countMoves(board){ var d = 0; for (var i = 0; i < 9; i++) if (board[i] !== null) d++; return d; }
  function bestMove(board){
    if (Math.random() < 0.15){
      var open = [];
      for (var i = 0; i < 9; i++) if (board[i] === null) open.push(i);
      return open[Math.floor(Math.random() * open.length)];
    }
    var best = -Infinity, pos = -1;
    for (var j = 0; j < 9; j++){
      if (board[j] === null){
        board[j] = 'O';
        var sc = minimax(board, 'X');
        board[j] = null;
        if (sc > best){ best = sc; pos = j; }
      }
    }
    return pos;
  }

  // ── HUD ──
  function setTurn(player){
    var t = document.getElementById('turnPill');
    t.classList.remove('x', 'o', 'thinking');
    t.classList.add(player.toLowerCase());
    document.getElementById('turnWho').textContent = player;
  }
  function flashScore(key){
    var el = key === 'X' ? document.getElementById('scoreX')
           : key === 'O' ? document.getElementById('scoreO')
           : document.getElementById('scoreDraw');
    el.classList.add('pop');
    setTimeout(function(){ el.classList.remove('pop'); }, 1100);
  }
  function refreshScores(){
    document.getElementById('scoreXVal').textContent = state.scores.X;
    document.getElementById('scoreOVal').textContent = state.scores.O;
    document.getElementById('scoreDrawVal').textContent = state.scores.D;
  }
  refreshScores();
  function showResult(winner, isDr){
    var t = document.getElementById('resultToast');
    t.classList.remove('x', 'o', 'draw');
    if (isDr){
      t.classList.add('draw');
      document.getElementById('resultTitle').textContent = 'Draw';
      document.getElementById('resultSub').textContent = 'the moss reclaims both vines';
    } else {
      var p = winner.player.toLowerCase();
      t.classList.add(p);
      document.getElementById('resultTitle').textContent = winner.player + ' wins!';
      document.getElementById('resultSub').textContent = 'three in a row along the ' + winner.line.label;
    }
    setTimeout(function(){
      t.classList.add('show');
      t.setAttribute('aria-hidden', 'false');
      setTimeout(function(){ document.getElementById('resultNextBtn').focus(); }, 200);
    }, 700);
  }
  function hideResult(){
    var t = document.getElementById('resultToast');
    t.classList.remove('show');
    t.setAttribute('aria-hidden', 'true');
  }

  // ── Win line: a chain of bright firefly spheres connecting the 3 winning tiles ──
  var winMarkers = [];
  function drawWinLine(winner){
    var line = winner.line;
    var positions = line.cells.map(function(idx){ var p = tileXZ(idx); return new THREE.Vector3(p.x, BOARD_H + 0.18, p.z); });
    var color = winner.player === 'X' ? 0xff9a3a : 0xa8d68a;
    // chain of small glowing spheres between each pair of tiles
    for (var k = 0; k < 2; k++){
      var a = positions[k], b = positions[k+1];
      for (var s = 0; s <= 8; s++){
        var t = s / 8;
        var x = a.x + (b.x - a.x) * t;
        var z = a.z + (b.z - a.z) * t;
        var y = BOARD_H + 0.18 + Math.sin(t * Math.PI) * 0.25;  // arched
        var m = new THREE.Mesh(
          new THREE.SphereGeometry(0.06, 8, 6),
          new THREE.MeshBasicMaterial({ color: color, transparent: true, opacity: 0 })
        );
        m.position.set(x, y, z);
        m.userData.delay = (k * 9 + s) * 0.03;
        m.userData.appear = 0;
        scene.add(m);
        winMarkers.push(m);
      }
    }
    // Mark winning tiles to pulse
    line.cells.forEach(function(idx){
      tiles[idx].userData.isWin = true;
      tiles[idx].userData.winPulse = 0;
    });
  }

  // ── Audio ──
  var audioCtx = null, muted = false;
  function ensureAudio(){
    if (audioCtx){ if (audioCtx.state === 'suspended') audioCtx.resume(); return audioCtx; }
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(_){ audioCtx = null; }
    return audioCtx;
  }
  function tone(type, freq, dur, gain, slideTo, t0){
    var c = ensureAudio(); if (!c || muted) return;
    var o = c.createOscillator(); o.type = type;
    var t = t0 || c.currentTime;
    o.frequency.setValueAtTime(freq, t);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20, slideTo), t + dur);
    var g = c.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(gain, t + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g).connect(c.destination);
    o.start(t); o.stop(t + dur + 0.02);
  }
  function sndPlace(player){
    tone('triangle', player === 'X' ? 440 : 660, 0.16, 0.08, player === 'X' ? 660 : 880);
    // soft leaf-rustle noise
    var c = ensureAudio(); if (!c || muted) return;
    var n = Math.floor(c.sampleRate * 0.10);
    var buf = c.createBuffer(1, n, c.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < n; i++) d[i] = (Math.random()*2-1) * Math.pow(1-i/n, 2);
    var s = c.createBufferSource(); s.buffer = buf;
    var bp = c.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=2600; bp.Q.value=2;
    var g = c.createGain(); g.gain.value = 0.04;
    s.connect(bp).connect(g).connect(c.destination);
    s.start();
  }
  function sndWin(){
    [523, 659, 784, 1047].forEach(function(f, i){
      tone('triangle', f, 0.28, 0.14, null, ensureAudio() && audioCtx.currentTime + i * 0.08);
    });
  }
  function sndDraw(){ tone('triangle', 440, 0.30, 0.10, 330); }

  // ── Gameplay ──
  function humanPlay(idx){
    if (state.locked || state.winner) return;
    if (state.board[idx] !== null) return;
    if (state.aiOn && state.currentPlayer === 'O') return;
    placeMove(idx, state.currentPlayer);
  }
  function placeMove(idx, player){
    state.board[idx] = player;
    placePieceMesh(idx, player);
    sndPlace(player);
    finishTurn();
  }
  function finishTurn(){
    var winner = checkWinner(state.board);
    if (winner){
      state.winner = winner;
      state.locked = true;
      state.scores[winner.player]++;
      saveState();
      refreshScores();
      flashScore(winner.player);
      drawWinLine(winner);
      sndWin();
      showResult(winner, false);
      return;
    }
    if (isDraw(state.board)){
      state.locked = true;
      state.scores.D++;
      saveState();
      refreshScores();
      flashScore('D');
      sndDraw();
      showResult(null, true);
      return;
    }
    state.currentPlayer = state.currentPlayer === 'X' ? 'O' : 'X';
    setTurn(state.currentPlayer);
    refreshChatLabels();

    if (state.aiOn && state.currentPlayer === 'O'){
      state.locked = true;
      document.getElementById('turnPill').classList.add('thinking');
      setTimeout(function(){
        var mv = bestMove(state.board.slice());
        if (mv >= 0){ placeMove(mv, 'O'); }
        state.locked = false;
        document.getElementById('turnPill').classList.remove('thinking');
      }, 600 + Math.random() * 350);
    }
  }
  function newRound(){
    hideResult();
    state.board = [null,null,null,null,null,null,null,null,null];
    state.winner = null;
    state.locked = false;
    state.firstPlayer = state.firstPlayer === 'X' ? 'O' : 'X';
    state.currentPlayer = state.firstPlayer;
    clearAllPieces();
    setTurn(state.currentPlayer);
    refreshChatLabels();
    if (state.aiOn && state.currentPlayer === 'O'){
      state.locked = true;
      document.getElementById('turnPill').classList.add('thinking');
      setTimeout(function(){
        var mv = bestMove(state.board.slice());
        if (mv >= 0) placeMove(mv, 'O');
        state.locked = false;
        document.getElementById('turnPill').classList.remove('thinking');
      }, 600);
    }
  }

  // ── Click / raycast ──
  var raycaster = new THREE.Raycaster();
  var mouseV = new THREE.Vector2();
  var hoverIdx = -1;
  canvas.addEventListener('pointerdown', function(e){
    ensureAudio();
    var rect = canvas.getBoundingClientRect();
    mouseV.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouseV.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouseV, camera);
    var hits = raycaster.intersectObjects(tiles, false);
    if (hits.length){
      var idx = hits[0].object.userData.idx;
      if (idx != null) humanPlay(idx);
    }
  });
  canvas.addEventListener('pointermove', function(e){
    var rect = canvas.getBoundingClientRect();
    mouseV.x = ((e.clientX - rect.left) / rect.width) * 2 - 1;
    mouseV.y = -((e.clientY - rect.top) / rect.height) * 2 + 1;
    raycaster.setFromCamera(mouseV, camera);
    var hits = raycaster.intersectObjects(tiles, false);
    hoverIdx = (hits.length && state.board[hits[0].object.userData.idx] === null && !state.locked && !(state.aiOn && state.currentPlayer === 'O')) ? hits[0].object.userData.idx : -1;
    canvas.style.cursor = hoverIdx >= 0 ? 'pointer' : 'default';
  });

  // ── Cell command labels (positioned over 3D tiles by projecting their world position to screen each frame) ──
  var CELL_CMDS = ['ol','om','or','ml','mm','mr','ul','um','ur'];
  var CMD_TO_IDX = {};
  CELL_CMDS.forEach(function(cmd, i){ CMD_TO_IDX[cmd] = i; });
  var cellLabelEls = [];
  for (var i = 0; i < 9; i++){
    var lbl = document.createElement('div');
    lbl.className = 'cell-label';
    lbl.textContent = CELL_CMDS[i];
    document.body.appendChild(lbl);
    cellLabelEls.push(lbl);
  }
  function refreshChatLabels(){
    var show = chatState.live;
    for (var i = 0; i < cellLabelEls.length; i++){
      if (show && state.board[i] === null) cellLabelEls[i].classList.add('show');
      else cellLabelEls[i].classList.remove('show');
    }
  }
  function projectLabelToScreen(idx){
    var pos = tileXZ(idx);
    var v = new THREE.Vector3(pos.x, BOARD_H + 0.05, pos.z);
    v.project(camera);
    var sx = (v.x * 0.5 + 0.5) * window.innerWidth;
    var sy = (-v.y * 0.5 + 0.5) * window.innerHeight - 30; // offset above tile center
    var el = cellLabelEls[idx];
    el.style.left = sx + 'px';
    el.style.top = sy + 'px';
  }

  // ── Buttons ──
  document.getElementById('newGameBtn').addEventListener('click', function(){ ensureAudio(); newRound(); });
  document.getElementById('resultNextBtn').addEventListener('click', function(){ ensureAudio(); newRound(); });
  var aiBtn = document.getElementById('aiToggleBtn');
  function refreshAiBtn(){
    aiBtn.setAttribute('aria-pressed', state.aiOn ? 'true' : 'false');
    aiBtn.textContent = state.aiOn ? '🤖 vs AI' : '👥 vs human';
  }
  refreshAiBtn();
  aiBtn.addEventListener('click', function(){
    state.aiOn = !state.aiOn;
    refreshAiBtn();
    saveState();
    newRound();
  });
  document.getElementById('resetScoresBtn').addEventListener('click', function(){
    state.scores = { X: 0, O: 0, D: 0 };
    saveState();
    refreshScores();
  });
  window.addEventListener('keydown', function(e){
    if (e.target && e.target.tagName === 'INPUT') return;
    var n = parseInt(e.key, 10);
    if (n >= 1 && n <= 9) humanPlay(n - 1);
    else if (e.code === 'KeyR') newRound();
  });

  // ── Twitch chat command listener (preserved from previous version) ──
  var chatState = { ws: null, live: false, connecting: false, channel: '', userCD: {} };
  function chatLog(text){
    var feed = document.getElementById('chatFeed');
    if (feed) feed.innerHTML = text;
  }
  function setChatStatus(kind){
    var dot = document.getElementById('chatDot');
    dot.classList.remove('live','connecting','fail');
    if (kind) dot.classList.add(kind);
    refreshChatLabels();
  }
  function chatPlay(cmd, user){
    var idx = CMD_TO_IDX[cmd];
    if (idx == null) return false;
    if (state.locked || state.winner) return false;
    if (state.board[idx] !== null) return false;
    if (state.aiOn && state.currentPlayer !== 'X') return false;
    var now = performance.now();
    if (chatState.userCD[user] && now - chatState.userCD[user] < 1200) return false;
    chatState.userCD[user] = now;
    placeMove(idx, state.currentPlayer);
    chatLog('<span class="mv">' + user + '</span> grew <b>' + cmd + '</b>');
    return true;
  }
  function connectChat(channel){
    if (chatState.ws){ try { chatState.ws.close(); } catch(_){} chatState.ws = null; }
    if (!channel) return;
    chatState.channel = channel;
    chatState.connecting = true;
    chatState.live = false;
    setChatStatus('connecting');
    var btn = document.getElementById('chatConnectBtn');
    btn.textContent = 'connecting…';
    btn.setAttribute('aria-pressed', 'false');
    var ws;
    try { ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443'); }
    catch(e){ setChatStatus('fail'); chatLog('chat connect failed: ' + e.message); return; }
    chatState.ws = ws;
    var nick = 'justinfan' + Math.floor(Math.random() * 90000 + 10000);
    ws.onopen = function(){
      ws.send('PASS SCHMOOPIIE\r\n');
      ws.send('NICK ' + nick + '\r\n');
      ws.send('JOIN #' + channel.toLowerCase() + '\r\n');
    };
    ws.onmessage = function(ev){
      var data = ev.data;
      if (data.indexOf('PING ') === 0){ ws.send('PONG ' + data.slice(5)); return; }
      if (!chatState.live && /:tmi\.twitch\.tv 001|JOIN #/.test(data)){
        chatState.live = true; chatState.connecting = false;
        setChatStatus('live');
        btn.textContent = 'disconnect'; btn.setAttribute('aria-pressed', 'true');
        chatLog('connected · #' + chatState.channel + ' · try <b>ol om or ml mm mr ul um ur</b>');
        refreshChatLabels();
      }
      var lines = data.split('\r\n');
      for (var i = 0; i < lines.length; i++){
        var line = lines[i];
        var m = line.match(/^:([^!]+)!.*PRIVMSG #[^ ]+ :(.+)$/);
        if (!m) continue;
        var user = m[1];
        var body = m[2].trim().toLowerCase();
        var token = body.replace(/^!+/, '').split(/\s+/)[0];
        if (CMD_TO_IDX.hasOwnProperty(token)) chatPlay(token, user);
      }
    };
    ws.onerror = function(){ setChatStatus('fail'); chatLog('chat connection error'); };
    ws.onclose = function(){
      if (chatState.live || chatState.connecting){
        chatState.live = false; chatState.connecting = false;
        setChatStatus('fail'); chatLog('chat disconnected');
      }
      btn.textContent = 'connect'; btn.setAttribute('aria-pressed', 'false');
      chatState.ws = null;
      refreshChatLabels();
    };
  }
  function disconnectChat(){
    if (chatState.ws){ try { chatState.ws.close(); } catch(_){} chatState.ws = null; }
    chatState.live = false; chatState.connecting = false;
    setChatStatus(null);
    chatLog('disconnected · commands: <b>ol om or · ml mm mr · ul um ur</b>');
    refreshChatLabels();
  }
  document.getElementById('chatConnectBtn').addEventListener('click', function(){
    if (chatState.live || chatState.connecting){ disconnectChat(); return; }
    var ch = (document.getElementById('chatChannelInput').value || '').trim().toLowerCase().replace(/^#/, '');
    if (!ch){ chatLog('enter a twitch channel name to listen for chat moves'); return; }
    try { localStorage.setItem('glass-tactoe-chat-ch', ch); } catch(_){}
    connectChat(ch);
  });
  document.getElementById('chatChannelInput').addEventListener('keydown', function(e){
    if (e.code === 'Enter'){ e.preventDefault(); document.getElementById('chatConnectBtn').click(); }
  });
  try {
    var savedCh = localStorage.getItem('glass-tactoe-chat-ch');
    if (savedCh) document.getElementById('chatChannelInput').value = savedCh;
  } catch(_){}

  // ── Main loop ──
  var lastT = performance.now();
  var clock = 0;
  function frame(now){
    var dt = Math.min(0.05, (now - lastT) / 1000);
    lastT = now;
    if (prefersReducedMotion) dt *= 0.85;
    clock += dt;

    // Piece sprout-in animation: scale 0 → 1.1 → 1
    for (var i = 0; i < pieces.length; i++){
      var p = pieces[i];
      if (!p) continue;
      if (p.userData.spawnT < p.userData.spawnDur){
        p.userData.spawnT = Math.min(p.userData.spawnDur, p.userData.spawnT + dt);
        var t = p.userData.spawnT / p.userData.spawnDur;
        // overshoot easing (cubic-bezier(.34,1.56,.64,1) approximation)
        var ease = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
        var s = 0.4 + 0.7 * ease + Math.sin(t * Math.PI) * 0.10;
        p.scale.set(s, s, s);
        p.rotation.y = (1 - t) * 0.6;
      } else {
        // idle bob
        p.position.y = BOARD_H + Math.sin(clock * 1.5 + i) * 0.012;
      }
    }

    // Tile hover/win highlight tween
    for (var ti = 0; ti < tiles.length; ti++){
      var st = tiles[ti];
      var target;
      if (st.userData.isWin){
        st.userData.winPulse = (st.userData.winPulse || 0) + dt;
        var pulse = 0.5 + Math.sin(st.userData.winPulse * 4) * 0.5;
        target = st.userData.baseColor.clone().lerp(st.userData.winColor, 0.4 + pulse * 0.5);
      } else if (ti === hoverIdx){
        target = st.userData.baseColor.clone().lerp(st.userData.hoverColor, 0.55);
      } else {
        target = st.userData.baseColor;
      }
      st.material.color.lerp(target, Math.min(1, dt * 6));
    }

    // Win line markers appear in sequence
    for (var wi = 0; wi < winMarkers.length; wi++){
      var m = winMarkers[wi];
      if (clock - (m.userData.spawnedAt || (m.userData.spawnedAt = clock)) < m.userData.delay) continue;
      m.userData.appear = Math.min(1, (m.userData.appear || 0) + dt * 3);
      m.material.opacity = m.userData.appear * (0.7 + Math.sin(clock * 3) * 0.3);
      var sc = 0.6 + m.userData.appear * 0.4 + Math.sin(clock * 3 + wi) * 0.08;
      m.scale.set(sc, sc, sc);
    }

    // Spores rise + wrap
    var posAttr = sporeGeom.attributes.position;
    for (var si = 0; si < SPORE_COUNT; si++){
      var v = sporeVelocities[si];
      posAttr.array[si*3]   += v.vx * dt;
      posAttr.array[si*3+1] += v.vy * dt;
      posAttr.array[si*3+2] += v.vz * dt;
      if (posAttr.array[si*3+1] > 7){
        // respawn down low
        var ang = Math.random() * Math.PI * 2;
        var r = 2 + Math.random() * 14;
        posAttr.array[si*3]   = Math.cos(ang) * r;
        posAttr.array[si*3+1] = 0.3;
        posAttr.array[si*3+2] = Math.sin(ang) * r;
      }
    }
    posAttr.needsUpdate = true;

    // Gentle camera orbit for life
    var orbitAng = Math.sin(clock * 0.07) * 0.18;
    camera.position.x = Math.sin(orbitAng) * 8;
    camera.position.z = Math.cos(orbitAng) * 8;
    camera.position.y = 7.5 + Math.sin(clock * 0.1) * 0.25;
    camera.lookAt(0, 0, 0);

    // Project cell labels each frame so they track the tiles
    if (chatState.live){
      for (var ci = 0; ci < 9; ci++){
        if (state.board[ci] === null) projectLabelToScreen(ci);
      }
    }

    try { renderer.render(scene, camera); } catch(e){ showError('render: ' + e.message); }
    requestAnimationFrame(frame);
  }
  setTurn(state.currentPlayer);
  requestAnimationFrame(frame);

  // Audio unlock on first interaction
  ['pointerdown', 'keydown'].forEach(function(ev){
    window.addEventListener(ev, function once(){ ensureAudio(); window.removeEventListener(ev, once); });
  });

  // mute via M? not in the original — keep it minimal
})();
</script>
</body>
