<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Fire Pong</title>
<link rel="icon" href="https://emojicdn.elk.sh/🏓">
<meta property="og:title" content="Fire Pong">
<meta property="og:description" content="Neon pong with a blazing fireball trail. Solo vs CPU or 2-player.">
<meta property="og:url" content="https://app.sloppy.live/fire-pong/">
<meta property="og:image" content="https://emojicdn.elk.sh/🏓?style=google">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#06040a;color:#aaa;font-family:'Silkscreen',monospace;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  overflow:hidden;touch-action:none;
}
canvas{display:block;width:100%;max-width:700px;image-rendering:auto;background:#06040a;border:1px solid #1a1228}

.hud{
  display:flex;justify-content:center;gap:40px;padding:8px;
  max-width:700px;width:100%;
}
.hud-score{font-family:'Press Start 2P',monospace;font-size:clamp(1rem,3vw,1.6rem);min-width:40px;text-align:center}
.p1-score{color:#00e8ff}
.p2-score{color:#ff4422}

.screen{
  position:fixed;top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(6,4,10,0.92);z-index:10;text-align:center;padding:20px;
}
.screen.hidden{display:none}
.screen h2{font-family:'Press Start 2P',monospace;font-size:clamp(0.9rem,3vw,1.4rem);margin-bottom:14px;line-height:1.6}
.screen p{font-size:0.6rem;color:#556;margin-bottom:6px;line-height:2}
.play-btn{
  padding:10px 22px;border:2px solid #ff6a1a;border-radius:4px;
  background:transparent;color:#ff6a1a;font-family:'Press Start 2P',monospace;
  font-size:0.55rem;cursor:pointer;margin-top:6px;transition:all 0.2s;
}
.play-btn:hover{background:#ff6a1a;color:#06040a}
.play-btn.alt{border-color:#00e8ff;color:#00e8ff}
.play-btn.alt:hover{background:#00e8ff;color:#06040a}

.mobile-controls{
  display:none;max-width:700px;width:100%;padding:6px 10px;
  justify-content:space-between;
}
.m-side{display:flex;flex-direction:column;gap:4px}
.m-btn{
  width:56px;height:48px;border:2px solid #222;border-radius:6px;
  background:#0e0a16;color:#444;font-size:1.2rem;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;
}
.m-btn:active{border-color:#ff6a1a;color:#ff6a1a}
@media(max-width:600px){.mobile-controls{display:flex}}

</style>
</head>
<body>

<div class="hud">
  <div class="hud-score p1-score" id="s1">0</div>
  <div class="hud-score p2-score" id="s2">0</div>
</div>

<canvas id="game"></canvas>

<div class="screen" id="start-screen">
  <h2 style="color:#ff6a1a">FIRE PONG</h2>
  <p>W/S — Player 1 &nbsp; ↑/↓ — Player 2</p>
  <button class="play-btn" onclick="startGame(false)">VS CPU</button>
  <button class="play-btn alt" onclick="startGame(true)">2 PLAYER</button>
</div>

<div class="screen hidden" id="win-screen">
  <h2 id="winner-text" style="color:#ff6a1a">WINNER</h2>
  <button class="play-btn" onclick="document.getElementById('win-screen').classList.add('hidden');document.getElementById('start-screen').classList.remove('hidden')">MENU</button>
</div>

<div class="mobile-controls">
  <div class="m-side">
    <button class="m-btn" data-key="w">▲</button>
    <button class="m-btn" data-key="s">▼</button>
  </div>
  <div class="m-side">
    <button class="m-btn" data-key="ArrowUp">▲</button>
    <button class="m-btn" data-key="ArrowDown">▼</button>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const GW = 700, GH = 440;
canvas.width = GW; canvas.height = GH;

let state = 'menu', twoPlayer = false, frame = 0;
let p1 = {}, p2 = {}, ball = {}, trail = [], particles = [], shakes = [];
let score1 = 0, score2 = 0;
const WIN_SCORE = 7;
const PADDLE_H = 60, PADDLE_W = 10, PADDLE_SPEED = 5;
let keys = {};

function resetBall(dir) {
  const speed = 4;
  const angle = (Math.random() - 0.5) * 1.2;
  ball = {
    x: GW / 2, y: GH / 2,
    vx: Math.cos(angle) * speed * dir,
    vy: Math.sin(angle) * speed,
    speed,
    radius: 6,
    hitCount: 0
  };
  trail = [];
}

function initPaddles() {
  p1 = { x: 16, y: GH / 2 - PADDLE_H / 2, w: PADDLE_W, h: PADDLE_H };
  p2 = { x: GW - 16 - PADDLE_W, y: GH / 2 - PADDLE_H / 2, w: PADDLE_W, h: PADDLE_H };
}

window.startGame = function(tp) {
  twoPlayer = tp;
  score1 = 0; score2 = 0;
  initPaddles();
  resetBall(1);
  particles = [];
  shakes = [];
  state = 'playing';
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('win-screen').classList.add('hidden');
  updateScore();
};

function updateScore() {
  document.getElementById('s1').textContent = score1;
  document.getElementById('s2').textContent = score2;
}

function spawnHitParticles(x, y, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: (Math.random() - 0.5) * 6,
      life: 20 + Math.random() * 20,
      maxLife: 40,
      size: 2 + Math.random() * 4,
      type: Math.random() < 0.3 ? 'ember' : 'spark'
    });
  }
}

function spawnGoalExplosion(x) {
  for (let i = 0; i < 40; i++) {
    const angle = (Math.random() - 0.5) * Math.PI;
    const speed = 2 + Math.random() * 6;
    particles.push({
      x, y: GH / 2 + (Math.random() - 0.5) * GH * 0.6,
      vx: (x < GW / 2 ? -1 : 1) * speed * Math.cos(angle) * 0.5,
      vy: speed * Math.sin(angle),
      life: 30 + Math.random() * 30,
      maxLife: 60,
      size: 3 + Math.random() * 5,
      type: Math.random() < 0.4 ? 'ember' : 'spark'
    });
  }
}

// AI
function aiUpdate() {
  const targetY = ball.vx > 0 ? ball.y : GH / 2;
  const center = p2.y + p2.h / 2;
  const diff = targetY - center;
  const aiSpeed = PADDLE_SPEED * 0.85;
  if (Math.abs(diff) > 8) {
    p2.y += diff > 0 ? aiSpeed : -aiSpeed;
  }
  p2.y = Math.max(0, Math.min(GH - p2.h, p2.y));
}

function update() {
  if (state !== 'playing') return;
  frame++;

  // Paddle movement
  if (keys['w'] || keys['W']) p1.y -= PADDLE_SPEED;
  if (keys['s'] || keys['S']) p1.y += PADDLE_SPEED;
  p1.y = Math.max(0, Math.min(GH - p1.h, p1.y));

  if (twoPlayer) {
    if (keys['ArrowUp']) p2.y -= PADDLE_SPEED;
    if (keys['ArrowDown']) p2.y += PADDLE_SPEED;
    p2.y = Math.max(0, Math.min(GH - p2.h, p2.y));
  } else {
    aiUpdate();
  }

  // Ball trail
  trail.push({ x: ball.x, y: ball.y, life: 25 + ball.hitCount * 2, maxLife: 25 + ball.hitCount * 2 });
  if (trail.length > 80) trail.shift();
  trail.forEach(t => t.life--);
  trail = trail.filter(t => t.life > 0);

  // Ball movement
  ball.x += ball.vx;
  ball.y += ball.vy;

  // Top/bottom bounce
  if (ball.y - ball.radius <= 0) {
    ball.y = ball.radius;
    ball.vy = Math.abs(ball.vy);
    spawnHitParticles(ball.x, ball.y, 5);
  }
  if (ball.y + ball.radius >= GH) {
    ball.y = GH - ball.radius;
    ball.vy = -Math.abs(ball.vy);
    spawnHitParticles(ball.x, ball.y, 5);
  }

  // Paddle collision
  // P1
  if (ball.vx < 0 && ball.x - ball.radius <= p1.x + p1.w && ball.x + ball.radius >= p1.x &&
      ball.y >= p1.y && ball.y <= p1.y + p1.h) {
    ball.x = p1.x + p1.w + ball.radius;
    const relY = (ball.y - (p1.y + p1.h / 2)) / (p1.h / 2);
    const angle = relY * 0.8;
    ball.hitCount++;
    const spd = Math.min(ball.speed + ball.hitCount * 0.3, 12);
    ball.vx = Math.cos(angle) * spd;
    ball.vy = Math.sin(angle) * spd;
    spawnHitParticles(ball.x, ball.y, 8 + ball.hitCount);
    shakes.push(3 + ball.hitCount * 0.5);
  }
  // P2
  if (ball.vx > 0 && ball.x + ball.radius >= p2.x && ball.x - ball.radius <= p2.x + p2.w &&
      ball.y >= p2.y && ball.y <= p2.y + p2.h) {
    ball.x = p2.x - ball.radius;
    const relY = (ball.y - (p2.y + p2.h / 2)) / (p2.h / 2);
    const angle = Math.PI - relY * 0.8;
    ball.hitCount++;
    const spd = Math.min(ball.speed + ball.hitCount * 0.3, 12);
    ball.vx = Math.cos(angle) * spd;
    ball.vy = Math.sin(angle) * spd;
    spawnHitParticles(ball.x, ball.y, 8 + ball.hitCount);
    shakes.push(3 + ball.hitCount * 0.5);
  }

  // Score
  if (ball.x < -20) {
    score2++;
    spawnGoalExplosion(0);
    shakes.push(8);
    updateScore();
    if (score2 >= WIN_SCORE) { endGame('P2'); return; }
    resetBall(1);
  }
  if (ball.x > GW + 20) {
    score1++;
    spawnGoalExplosion(GW);
    shakes.push(8);
    updateScore();
    if (score1 >= WIN_SCORE) { endGame('P1'); return; }
    resetBall(-1);
  }

  // Particles
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.05;
    p.vx *= 0.98;
    p.life--;
  });
  particles = particles.filter(p => p.life > 0);
}

function endGame(winner) {
  state = 'win';
  const label = winner === 'P1' ? 'PLAYER 1 WINS!' : (twoPlayer ? 'PLAYER 2 WINS!' : 'CPU WINS!');
  document.getElementById('winner-text').textContent = label;
  document.getElementById('winner-text').style.color = winner === 'P1' ? '#00e8ff' : '#ff4422';
  document.getElementById('win-screen').classList.remove('hidden');
}

function draw() {
  let shakeX = 0, shakeY = 0;
  if (shakes.length) {
    shakeX = (Math.random() - 0.5) * shakes[0];
    shakeY = (Math.random() - 0.5) * shakes[0];
    shakes[0] -= 0.8;
    if (shakes[0] <= 0) shakes.shift();
  }

  ctx.save();
  ctx.translate(shakeX, shakeY);

  // Background
  ctx.fillStyle = '#06040a';
  ctx.fillRect(0, 0, GW, GH);

  // Center line
  ctx.setLineDash([6, 8]);
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(GW / 2, 0);
  ctx.lineTo(GW / 2, GH);
  ctx.stroke();
  ctx.setLineDash([]);

  if (state === 'menu') { ctx.restore(); return; }

  // Fire trail
  trail.forEach((t, i) => {
    const a = t.life / t.maxLife;
    const intensity = Math.min(1, ball.hitCount / 8);

    // Outer glow
    const r2 = ball.radius * 2.5 * a;
    const grad = ctx.createRadialGradient(t.x, t.y, 0, t.x, t.y, r2);
    grad.addColorStop(0, `rgba(255,${Math.floor(100 + 100 * a)},0,${a * 0.25 * (0.3 + intensity * 0.7)})`);
    grad.addColorStop(0.5, `rgba(255,${Math.floor(40 * a)},0,${a * 0.12 * (0.3 + intensity * 0.7)})`);
    grad.addColorStop(1, 'rgba(255,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(t.x, t.y, r2, 0, Math.PI * 2);
    ctx.fill();

    // Core
    ctx.fillStyle = `rgba(255,${Math.floor(180 * a)},${Math.floor(50 * a)},${a * 0.5})`;
    ctx.beginPath();
    ctx.arc(t.x, t.y, ball.radius * 0.6 * a, 0, Math.PI * 2);
    ctx.fill();
  });

  // Ball
  const bi = Math.min(1, ball.hitCount / 6);
  // Outer fire glow
  ctx.shadowColor = `rgb(255,${Math.floor(100 - bi * 60)},0)`;
  ctx.shadowBlur = 15 + bi * 20;
  ctx.fillStyle = `rgb(255,${Math.floor(200 - bi * 120)},${Math.floor(50 - bi * 50)})`;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius, 0, Math.PI * 2);
  ctx.fill();
  // White-hot core
  ctx.fillStyle = `rgba(255,255,${Math.floor(200 - bi * 150)},0.8)`;
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.radius * 0.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Paddles
  // P1 — cyan neon
  ctx.shadowColor = '#00e8ff';
  ctx.shadowBlur = 10;
  ctx.fillStyle = '#00e8ff';
  ctx.fillRect(p1.x, p1.y, p1.w, p1.h);
  ctx.fillStyle = 'rgba(0,232,255,0.3)';
  ctx.fillRect(p1.x - 2, p1.y - 1, p1.w + 4, p1.h + 2);
  // P2 — red neon
  ctx.shadowColor = '#ff4422';
  ctx.fillStyle = '#ff4422';
  ctx.fillRect(p2.x, p2.y, p2.w, p2.h);
  ctx.fillStyle = 'rgba(255,68,34,0.3)';
  ctx.fillRect(p2.x - 2, p2.y - 1, p2.w + 4, p2.h + 2);
  ctx.shadowBlur = 0;

  // Particles
  particles.forEach(p => {
    const a = p.life / p.maxLife;
    if (p.type === 'ember') {
      ctx.fillStyle = `rgba(255,${Math.floor(40 + a * 60)},0,${a * 0.8})`;
    } else {
      ctx.fillStyle = `rgba(255,${Math.floor(150 * a)},${Math.floor(30 * a)},${a * 0.6})`;
    }
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * a, 0, Math.PI * 2);
    ctx.fill();
  });

  // Hit count indicator
  if (ball.hitCount > 0) {
    const heatText = ball.hitCount >= 10 ? 'SUPERNOVA' : ball.hitCount >= 7 ? 'INFERNO' : ball.hitCount >= 4 ? 'BLAZING' : 'HEATING';
    ctx.fillStyle = `rgba(255,${Math.max(0, 150 - ball.hitCount * 15)},0,${0.15 + bi * 0.2})`;
    ctx.font = '8px "Press Start 2P"';
    ctx.textAlign = 'center';
    ctx.fillText(heatText + ' x' + ball.hitCount, GW / 2, 20);
  }

  ctx.restore();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Input
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowUp','ArrowDown'].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// Mobile
document.querySelectorAll('.m-btn').forEach(btn => {
  const k = btn.dataset.key;
  btn.addEventListener('touchstart', e => { e.preventDefault(); keys[k] = true; });
  btn.addEventListener('touchend', e => { e.preventDefault(); keys[k] = false; });
  btn.addEventListener('mousedown', () => { keys[k] = true; });
  btn.addEventListener('mouseup', () => { keys[k] = false; });
  btn.addEventListener('mouseleave', () => { keys[k] = false; });
});

loop();
</script>
</body>
</html>
