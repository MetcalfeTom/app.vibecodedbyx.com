<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Toast Master</title>
<link rel="icon" href="https://emojicdn.elk.sh/🍞">
<meta property="og:title" content="Toast Master">
<meta property="og:description" content="Competitive toaster simulator — time the perfect golden pop or burn it all">
<meta property="og:url" content="https://sloppy.live/toast-master">
<meta property="og:image" content="https://sloppy.live/toast-master/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Anybody:wght@100;400;800;900&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--bg:#1a1410;--fg:#e8dcc8;--dim:#7a6e5a;--gold:#d4a020;--brown:#8a5a20;--red:#c83020;--green:#40a848;--panel:#221c14;--border:#3a3020}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--fg);font-family:'DM Mono',monospace;font-weight:300;font-size:13px;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
h1{font-family:'Anybody',sans-serif;font-weight:900;font-size:clamp(24px,5vw,36px);color:var(--gold);margin:16px 0 2px;letter-spacing:-1px}
.sub{font-family:'Anybody',sans-serif;font-weight:100;font-size:12px;color:var(--dim);margin-bottom:16px}

/* Toaster */
.toaster-wrap{position:relative;width:min(360px,90vw);height:320px;margin-bottom:12px}
canvas{display:block;width:100%;height:100%}

/* Heat meter */
.heat-section{width:min(360px,90vw);margin-bottom:12px}
.heat-label{display:flex;justify-content:space-between;font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:3px}
.heat-bar{height:20px;background:var(--panel);border:1px solid var(--border);position:relative;overflow:hidden}
.heat-fill{height:100%;width:0%;transition:width 0.1s linear}
.heat-zones{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;pointer-events:none}
.heat-zone{height:100%;border-right:1px solid rgba(0,0,0,0.3)}
.hz-raw{flex:20;background:rgba(100,150,200,0.1)}
.hz-light{flex:15;background:rgba(200,180,100,0.1)}
.hz-golden{flex:15;background:rgba(212,160,32,0.15)}
.hz-perfect{flex:10;background:rgba(64,168,72,0.2)}
.hz-dark{flex:15;background:rgba(138,90,32,0.15)}
.hz-burnt{flex:15;background:rgba(200,48,32,0.1)}
.hz-charcoal{flex:10;background:rgba(40,20,10,0.2)}
.zone-labels{display:flex;font-size:7px;color:var(--dim);letter-spacing:0.5px;margin-top:2px}
.zone-labels span{text-align:center}
.zl-raw{flex:20}.zl-light{flex:15}.zl-golden{flex:15}.zl-perfect{flex:10}.zl-dark{flex:15}.zl-burnt{flex:15}.zl-charcoal{flex:10}

/* Controls */
.controls{width:min(360px,90vw);display:flex;gap:8px;margin-bottom:12px}
.btn{flex:1;padding:14px 8px;border:1px solid var(--border);background:var(--panel);color:var(--fg);font-family:'Anybody',sans-serif;font-weight:800;font-size:13px;cursor:pointer;text-transform:uppercase;letter-spacing:1px;transition:all 0.12s}
.btn:hover{border-color:var(--gold);color:var(--gold)}
.btn:active{transform:scale(0.97)}
.btn.pop{background:var(--gold);border-color:var(--gold);color:var(--bg)}
.btn.pop:hover{background:#e8b030}
.btn:disabled{opacity:0.3;cursor:default;transform:none}

/* Score display */
.score-card{width:min(360px,90vw);background:var(--panel);border:1px solid var(--border);padding:14px;margin-bottom:12px;text-align:center;min-height:80px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.score-grade{font-family:'Anybody',sans-serif;font-weight:900;font-size:48px;line-height:1}
.score-label{font-size:10px;color:var(--dim);margin-top:4px;text-transform:uppercase;letter-spacing:2px}
.score-detail{font-size:11px;margin-top:6px}

/* Stats */
.stats{width:min(360px,90vw);display:flex;gap:8px;margin-bottom:12px}
.stat{flex:1;background:var(--panel);border:1px solid var(--border);padding:8px;text-align:center}
.stat-val{font-family:'Anybody',sans-serif;font-weight:900;font-size:18px;color:var(--gold)}
.stat-lbl{font-size:7px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-top:2px}

/* History */
.history{width:min(360px,90vw);margin-bottom:16px}
.history-title{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px}
.toast-history{display:flex;gap:4px;flex-wrap:wrap}
.toast-chip{width:24px;height:24px;border-radius:2px;border:1px solid var(--border);position:relative}
.toast-chip::after{content:attr(data-grade);position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);font-size:6px;color:var(--dim);white-space:nowrap}
</style>
</head>
<body>
<h1>TOAST MASTER</h1>
<div class="sub">time the perfect pop</div>

<div class="toaster-wrap">
  <canvas id="cv" width="360" height="320"></canvas>
</div>

<div class="heat-section">
  <div class="heat-label"><span>Toasting Progress</span><span id="heat-pct">0%</span></div>
  <div class="heat-bar">
    <div class="heat-fill" id="heat-fill"></div>
    <div class="heat-zones">
      <div class="heat-zone hz-raw"></div>
      <div class="heat-zone hz-light"></div>
      <div class="heat-zone hz-golden"></div>
      <div class="heat-zone hz-perfect"></div>
      <div class="heat-zone hz-dark"></div>
      <div class="heat-zone hz-burnt"></div>
      <div class="heat-zone hz-charcoal"></div>
    </div>
  </div>
  <div class="zone-labels">
    <span class="zl-raw">Raw</span>
    <span class="zl-light">Light</span>
    <span class="zl-golden">Golden</span>
    <span class="zl-perfect">Perfect</span>
    <span class="zl-dark">Dark</span>
    <span class="zl-burnt">Burnt</span>
    <span class="zl-charcoal">Coal</span>
  </div>
</div>

<div class="controls">
  <button class="btn" id="btn-push" onclick="pushDown()">Push Down</button>
  <button class="btn pop" id="btn-pop" onclick="popUp()" disabled>POP!</button>
</div>

<div class="score-card" id="score-card">
  <div class="score-label">push down the lever to begin</div>
</div>

<div class="stats">
  <div class="stat"><div class="stat-val" id="st-best">—</div><div class="stat-lbl">Best Grade</div></div>
  <div class="stat"><div class="stat-val" id="st-perfect">0</div><div class="stat-lbl">Perfects</div></div>
  <div class="stat"><div class="stat-val" id="st-burnt">0</div><div class="stat-lbl">Burnt</div></div>
  <div class="stat"><div class="stat-val" id="st-total">0</div><div class="stat-lbl">Total</div></div>
</div>

<div class="history">
  <div class="history-title">Toast History</div>
  <div class="toast-history" id="toast-history"></div>
</div>

<script>
var CV=document.getElementById('cv'),X=CV.getContext('2d');
var CW=360,CH=320;

// Game state
var STATE='idle'; // idle, toasting, popped, smoke
var heat=0,heatSpeed=0,toastY=0;
var popVel=0,popRot=0;
var smokeParticles=[];
var steamParticles=[];
var toastColor='#e8d8b0';
var leverY=0; // 0=up, 1=down
var glowCoils=0;

// Stats
var totalToasts=0,perfectCount=0,burntCount=0,bestGrade='—';
var history=[];

// Grade thresholds (heat 0-100)
var GRADES=[
  {max:20,name:'RAW',grade:'F',color:'#8ab0d0',emoji:'🥶'},
  {max:35,name:'LIGHT',grade:'C',color:'#d8c878',emoji:'😐'},
  {max:50,name:'GOLDEN',grade:'B',color:'#d4a020',emoji:'😊'},
  {max:60,name:'PERFECT',grade:'S',color:'#40a848',emoji:'🤩'},
  {max:75,name:'DARK',grade:'B-',color:'#8a5a20',emoji:'😬'},
  {max:90,name:'BURNT',grade:'D',color:'#c83020',emoji:'😱'},
  {max:101,name:'CHARCOAL',grade:'F',color:'#2a1008',emoji:'💀'}
];

function getGrade(h){
  for(var i=0;i<GRADES.length;i++){
    if(h<GRADES[i].max)return GRADES[i];
  }
  return GRADES[GRADES.length-1];
}

function getToastColor(h){
  if(h<10)return'#f0e0c0';
  if(h<20)return'#e8d8b0';
  if(h<35)return'#d8c080';
  if(h<50)return'#c8a040';
  if(h<60)return'#b88820';
  if(h<75)return'#906020';
  if(h<90)return'#583010';
  return'#1a0a04';
}

function pushDown(){
  if(STATE!=='idle')return;
  STATE='toasting';
  heat=0;
  heatSpeed=0.15+Math.random()*0.1; // slight variation each toast
  leverY=1;
  glowCoils=0;
  smokeParticles=[];
  steamParticles=[];
  toastY=0;
  document.getElementById('btn-push').disabled=true;
  document.getElementById('btn-pop').disabled=false;
  document.getElementById('score-card').innerHTML='<div class="score-label">toasting... pop when ready!</div>';
}

function popUp(){
  if(STATE!=='toasting')return;
  STATE='popped';
  leverY=0;
  popVel=-8;
  popRot=0;
  toastY=-20;

  var g=getGrade(heat);
  toastColor=getToastColor(heat);
  totalToasts++;

  if(g.name==='PERFECT')perfectCount++;
  if(g.name==='BURNT'||g.name==='CHARCOAL')burntCount++;

  // Best grade logic
  var gradeOrder=['F','D','C','B-','B','S'];
  var bestIdx=gradeOrder.indexOf(bestGrade);
  var curIdx=gradeOrder.indexOf(g.grade);
  if(curIdx>bestIdx)bestGrade=g.grade;

  // Score card
  var sc=document.getElementById('score-card');
  sc.innerHTML='<div class="score-grade" style="color:'+g.color+'">'+g.grade+'</div>'+
    '<div class="score-label">'+g.emoji+' '+g.name+' '+g.emoji+'</div>'+
    '<div class="score-detail" style="color:'+g.color+'">Heat: '+Math.floor(heat)+'% — '+getFlavorText(g.name)+'</div>';

  // History
  history.unshift({color:getToastColor(heat),grade:g.grade,name:g.name});
  if(history.length>20)history.pop();
  renderHistory();

  // Update stats
  document.getElementById('st-best').textContent=bestGrade;
  document.getElementById('st-perfect').textContent=perfectCount;
  document.getElementById('st-burnt').textContent=burntCount;
  document.getElementById('st-total').textContent=totalToasts;

  document.getElementById('btn-pop').disabled=true;

  // Reset after animation
  setTimeout(function(){
    STATE='idle';
    document.getElementById('btn-push').disabled=false;
  },1500);
}

function getFlavorText(name){
  var texts={
    RAW:["It's basically bread","Still cold in the middle","The butter won't even melt"],
    LIGHT:["Barely kissed by heat","A timid tan","Needs more commitment"],
    GOLDEN:["A respectable toast","Nice and warm","Almost there..."],
    PERFECT:["DIVINE CRUNCH","The platonic ideal of toast","Chefs kiss","Absolute perfection"],
    DARK:["Bold choice","A little aggressive","The crust has character"],
    BURNT:["The smoke alarm approves","Carbon-forward flavor","RIP"],
    CHARCOAL:["This is just coal now","The fire department has been notified","You monster"]
  };
  var arr=texts[name]||["Toast"];
  return arr[Math.floor(Math.random()*arr.length)];
}

function renderHistory(){
  var el=document.getElementById('toast-history');
  el.innerHTML=history.map(function(h){
    return'<div class="toast-chip" style="background:'+h.color+'" data-grade="'+h.grade+'" title="'+h.name+'"></div>';
  }).join('');
}

// Canvas drawing
function update(){
  if(STATE==='toasting'){
    // Heat increases — accelerates slightly over time
    heat+=heatSpeed*(1+heat*0.008);
    if(heat>100)heat=100;
    toastColor=getToastColor(heat);
    glowCoils=Math.min(1,heat/30);

    // Steam/smoke at higher heats
    if(heat>40&&Math.random()<(heat-40)/200){
      steamParticles.push({
        x:CW/2+(Math.random()-0.5)*40,y:100,
        vx:(Math.random()-0.5)*0.5,vy:-0.5-Math.random()*1,
        life:40+Math.random()*30,size:2+Math.random()*4,
        alpha:0.15+Math.random()*0.15
      });
    }
    if(heat>70&&Math.random()<(heat-70)/80){
      smokeParticles.push({
        x:CW/2+(Math.random()-0.5)*50,y:90,
        vx:(Math.random()-0.5)*1,vy:-1-Math.random()*1.5,
        life:50+Math.random()*30,size:4+Math.random()*8,
        alpha:0.2+Math.random()*0.2
      });
    }

    // Update heat bar
    document.getElementById('heat-fill').style.width=heat+'%';
    document.getElementById('heat-fill').style.background=getToastColor(heat);
    document.getElementById('heat-pct').textContent=Math.floor(heat)+'%';

    // Auto-pop at 100 (charcoal)
    if(heat>=100)popUp();
  }

  if(STATE==='popped'){
    popVel+=0.4; // gravity
    toastY+=popVel;
    popRot+=(popVel>0?-0.03:0.05);
    if(toastY>0){toastY=0;popVel=0;}
  }

  // Update particles
  for(var i=steamParticles.length-1;i>=0;i--){
    var p=steamParticles[i];
    p.x+=p.vx;p.y+=p.vy;p.life--;
    if(p.life<=0)steamParticles.splice(i,1);
  }
  for(var i=smokeParticles.length-1;i>=0;i--){
    var p=smokeParticles[i];
    p.x+=p.vx;p.y+=p.vy;p.life--;
    if(p.life<=0)smokeParticles.splice(i,1);
  }
}

function draw(){
  X.fillStyle='#1a1410';
  X.fillRect(0,0,CW,CH);

  // Counter surface
  X.fillStyle='#2a2218';
  X.fillRect(0,250,CW,70);
  X.fillStyle='#322a1e';
  X.fillRect(0,248,CW,3);

  // Toaster body
  var tx=CW/2-60,ty=130;
  // Shadow
  X.fillStyle='rgba(0,0,0,0.3)';
  X.fillRect(tx+5,ty+5,120,120);
  // Main body — chrome gradient
  var tg=X.createLinearGradient(tx,ty,tx+120,ty);
  tg.addColorStop(0,'#c0b8a8');
  tg.addColorStop(0.3,'#e0d8c8');
  tg.addColorStop(0.5,'#f0e8d8');
  tg.addColorStop(0.7,'#e0d8c8');
  tg.addColorStop(1,'#b0a898');
  X.fillStyle=tg;
  X.fillRect(tx,ty,120,118);
  // Top rim
  X.fillStyle='#a09888';
  X.fillRect(tx,ty,120,4);
  // Bottom
  X.fillStyle='#908878';
  X.fillRect(tx,ty+114,120,6);
  // Slot
  X.fillStyle='#1a1008';
  X.fillRect(tx+20,ty+2,80,8);

  // Coil glow inside slot
  if(glowCoils>0){
    var cg=X.createLinearGradient(tx+20,ty,tx+100,ty+10);
    cg.addColorStop(0,'rgba(255,80,20,'+glowCoils*0.4+')');
    cg.addColorStop(0.5,'rgba(255,120,40,'+glowCoils*0.6+')');
    cg.addColorStop(1,'rgba(255,80,20,'+glowCoils*0.4+')');
    X.fillStyle=cg;
    X.fillRect(tx+20,ty+2,80,8);

    // Glow above toaster
    var gg=X.createRadialGradient(CW/2,ty,10,CW/2,ty,60);
    gg.addColorStop(0,'rgba(255,100,30,'+glowCoils*0.1+')');
    gg.addColorStop(1,'transparent');
    X.fillStyle=gg;
    X.fillRect(CW/2-60,ty-60,120,70);
  }

  // Lever
  var leverActualY=ty+40+leverY*50;
  X.fillStyle='#706858';
  X.fillRect(tx+108,leverActualY,14,6);
  X.fillStyle='#504840';
  X.fillRect(tx+110,leverActualY+1,10,4);

  // Brand plate
  X.fillStyle='rgba(0,0,0,0.08)';
  X.fillRect(tx+25,ty+60,70,20);
  X.fillStyle='#908068';
  X.font='bold 9px "Anybody"';
  X.textAlign='center';
  X.fillText('TOAST MASTER',tx+60,ty+74);

  // Dial (heat indicator on toaster)
  X.fillStyle='#a09080';
  X.beginPath();X.arc(tx+60,ty+100,8,0,Math.PI*2);X.fill();
  X.fillStyle='#1a1008';
  X.beginPath();X.arc(tx+60,ty+100,6,0,Math.PI*2);X.fill();
  // Dial needle
  var dialAngle=-Math.PI*0.7+heat/100*Math.PI*1.4;
  X.strokeStyle='#ff6030';X.lineWidth=1.5;
  X.beginPath();X.moveTo(tx+60,ty+100);
  X.lineTo(tx+60+Math.cos(dialAngle)*5,ty+100+Math.sin(dialAngle)*5);
  X.stroke();

  // Toast bread — sticking out of slot
  var breadTop=ty-30+toastY+(STATE==='toasting'?leverY*25:0);
  var breadW=50,breadH=50;
  var breadX=CW/2-breadW/2;

  X.save();
  if(STATE==='popped'&&popVel<0){
    X.translate(CW/2,breadTop+breadH/2);
    X.rotate(popRot);
    X.translate(-CW/2,-breadTop-breadH/2);
  }

  // Bread shadow
  X.fillStyle='rgba(0,0,0,0.1)';
  X.fillRect(breadX+2,breadTop+2,breadW,breadH);

  // Bread body
  X.fillStyle=toastColor;
  X.fillRect(breadX,breadTop,breadW,breadH);
  // Crust (slightly darker rim)
  var crustCol=heat<50?'#c8a870':'#806030';
  if(heat>80)crustCol='#301808';
  X.strokeStyle=crustCol;
  X.lineWidth=2;
  X.strokeRect(breadX+1,breadTop+1,breadW-2,breadH-2);
  // Top rounded crust
  X.fillStyle=toastColor;
  X.beginPath();
  X.ellipse(CW/2,breadTop,breadW/2,8,0,Math.PI,0);
  X.fill();
  X.strokeStyle=crustCol;X.lineWidth=2;
  X.beginPath();X.ellipse(CW/2,breadTop,breadW/2,8,0,Math.PI,0);X.stroke();

  // Bread texture — tiny dots
  X.fillStyle='rgba(0,0,0,0.04)';
  for(var i=0;i<12;i++){
    var dx=breadX+8+(i%4)*10+((i/4|0)*5)%10;
    var dy=breadTop+10+(i%3)*12;
    X.fillRect(dx,dy,2,2);
  }

  // Burnt spots at high heat
  if(heat>70){
    X.fillStyle='rgba(30,10,0,'+(heat-70)/100+')';
    for(var i=0;i<5;i++){
      var bsx=breadX+10+((i*17+7)%30);
      var bsy=breadTop+8+((i*23+3)%30);
      X.fillRect(bsx,bsy,4+i%3,3+i%2);
    }
  }

  X.restore();

  // Steam particles
  for(var i=0;i<steamParticles.length;i++){
    var sp=steamParticles[i];
    var sa=sp.alpha*(sp.life/70);
    X.fillStyle='rgba(200,190,170,'+sa+')';
    X.beginPath();X.arc(sp.x,sp.y,sp.size,0,Math.PI*2);X.fill();
  }

  // Smoke particles
  for(var i=0;i<smokeParticles.length;i++){
    var sp2=smokeParticles[i];
    var sa2=sp2.alpha*(sp2.life/80);
    X.fillStyle='rgba(60,50,40,'+sa2+')';
    X.beginPath();X.arc(sp2.x,sp2.y,sp2.size,0,Math.PI*2);X.fill();
  }

  // Pop flash
  if(STATE==='popped'&&popVel<-3){
    X.fillStyle='rgba(255,240,200,0.15)';
    X.fillRect(0,0,CW,CH);
  }
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

// Keyboard
document.addEventListener('keydown',function(e){
  if(e.code==='Space'||e.key==='Enter'){
    e.preventDefault();
    if(STATE==='idle')pushDown();
    else if(STATE==='toasting')popUp();
  }
});

loop();
</script>
</body>
</html>
