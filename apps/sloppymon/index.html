<!doctype html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sloppymon · Catch the Worst Creatures</title>

<style>
:root{
  --bg:#0a1408;
  --gb-dark:#0f380f;
  --gb-mid:#306230;
  --gb-light:#8bac0f;
  --gb-paper:#9bbc0f;
  --gb-bone:#cadc9f;
  --bone:#e6f5d2;
  --hot:#ff5a3d;
  --amber:#ffce4a;
  --pink:#ff5ea1;
  --dim:rgba(230,245,210,0.5);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;background:var(--bg);color:var(--bone);font-family:'VT323',monospace;overflow:hidden}
body{
  background:
    radial-gradient(ellipse at 50% 50%, rgba(139,172,15,0.10), transparent 55%),
    linear-gradient(180deg, #0a1408 0%, #050905 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;
}
#stage{
  image-rendering:pixelated;
  image-rendering:crisp-edges;
  display:block;
  background:var(--gb-paper);
  border:6px solid #1a1a1a;
  border-radius:6px;
  box-shadow:
    0 0 0 2px #2a2a2a,
    0 18px 38px rgba(0,0,0,0.7),
    0 6px 0 rgba(0,0,0,0.4),
    inset 0 0 30px rgba(0,0,0,0.25);
  cursor:crosshair;
}
.title{
  font-family:'Press Start 2P', monospace;
  font-size:clamp(14px, 2vw, 20px);letter-spacing:0.16em;
  color:var(--gb-bone);margin-bottom:14px;line-height:1.4;text-align:center;
  text-shadow:0 0 10px rgba(139,172,15,0.5), 2px 2px 0 #000;
}
.title .b{color:var(--gb-light)}
.title .r{color:var(--hot)}
.tagline{
  font-family:'VT323', monospace;font-size:14px;color:var(--dim);
  letter-spacing:0.12em;margin-bottom:6px;
}
.kbd{
  margin-top:14px;font-family:'VT323',monospace;font-size:14px;color:var(--dim);
  letter-spacing:0.06em;text-align:center;line-height:1.5;
}
.kbd b{color:var(--gb-light);font-weight:400}
.team{
  margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;
  font-family:'Press Start 2P', monospace;font-size:9px;letter-spacing:0.1em;color:var(--gb-bone);
  max-width:560px;
}
.team .slot{
  background:rgba(15,56,15,0.5);
  border:1px solid rgba(139,172,15,0.5);
  padding:6px 10px;border-radius:2px;
  display:flex;align-items:center;gap:6px;min-width:72px;
}
.team .slot.empty{opacity:0.4}
.team .slot .ico{font-size:12px}
.team .slot .hp{color:var(--hot);font-size:8px}
@media (max-width:600px){
  .title{font-size:12px}
  .kbd{font-size:11px}
}
</style>
</head>
<body>
<div class="title">⊿ <span class="b">SLOPPY</span><span class="r">MON</span> ⊿</div>
<div class="tagline">— catch the worst creatures · sloppy.live region —</div>
<canvas id="stage" width="320" height="288"></canvas>
<div class="team" id="team"></div>
<div class="kbd">
  <b>↑↓←→</b> / <b>WASD</b> walk &nbsp;&nbsp; <b>Z</b> / <b>SPACE</b> confirm &nbsp;&nbsp; <b>X</b> back<br>
  walk into tall grass · catch sloppymon · become legend
</div>

<script>
(() => {
  const canvas = document.getElementById('stage');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  const VW = 320, VH = 288;             // double-gameboy logical resolution
  // resize canvas to fit container while preserving integer scale
  function fit() {
    const maxW = Math.min(window.innerWidth - 40, 720);
    const maxH = Math.min(window.innerHeight - 240, 720);
    let scale = Math.floor(Math.min(maxW / VW, maxH / VH));
    scale = Math.max(1, scale);
    canvas.style.width  = (VW * scale) + 'px';
    canvas.style.height = (VH * scale) + 'px';
  }
  fit(); addEventListener('resize', fit);

  // === gameboy palette ===
  const C = {
    dark:   '#0f380f',
    mid:    '#306230',
    light:  '#8bac0f',
    paper:  '#9bbc0f',
    bone:   '#cadc9f',
    pure:   '#e6f5d2',
    ink:    '#0a1408',
    blood:  '#a02828',
  };

  // === TILES ===
  // tile codes
  const T_PATH = 0, T_GRASS = 1, T_TGRASS = 2, T_TREE = 3, T_WATER = 4, T_FLOWER = 5, T_SAND = 6, T_ROCK = 7, T_LEDGE = 8, T_SIGN = 9, T_BUILDING = 10;
  const T_DOOR_CENTER = 11, T_DOOR_MART = 12, T_PORTAL_TOWN = 13, T_PORTAL_ROUTE = 14, T_FLOOR = 15, T_COUNTER = 16, T_RUG = 17;
  const T_PORTAL_R2 = 18, T_PORTAL_R1 = 19;   // bidirectional route1 ↔ route2
  const SOLID = { 3:1, 4:1, 7:1, 10:1, 16:1 };  // tree, water, rock, building, counter

  // Legend: . path, , grass, ~ tallgrass, T tree, W water, F flower, R rock, L ledge, S sign,
  //         B building (decorative), C door→Center, M door→Mart, p portal-to-town, P portal-to-route,
  //         f floor, K counter, r rug
  function parseTile(c) {
    return ({
      'T':T_TREE, '#':T_TREE, ',':T_GRASS, '.':T_PATH, '~':T_TGRASS,
      'W':T_WATER, 'F':T_FLOWER, 'R':T_ROCK, 'L':T_LEDGE, 'S':T_SIGN, 'B':T_BUILDING,
      'C':T_DOOR_CENTER, 'M':T_DOOR_MART, 'p':T_PORTAL_TOWN, 'P':T_PORTAL_ROUTE,
      'f':T_FLOOR, 'K':T_COUNTER, 'r':T_RUG,
      'n':T_PORTAL_R2, 's':T_PORTAL_R1,
    })[c] ?? T_GRASS;
  }
  function buildMap(rows) {
    const w = rows[0].length, h = rows.length;
    const grid = [];
    for (let y = 0; y < h; y++) {
      const r = [];
      for (let x = 0; x < w; x++) r.push(parseTile(rows[y][x] || ','));
      grid.push(r);
    }
    return { w, h, grid };
  }

  // === MAP DEFINITIONS ===
  // ROUTE 1 — wild grass area with the town entrance at south-center (portal `p`)
  const RAW_ROUTE = [
    'TTTTTTTTTTTTnTTTTTTTTTTT',
    'T,,,,,,,,,,,,,,,,,,,,,,T',
    'T,~~~~,T,,FFF,,,,T,~~,,T',
    'T,~~~~,T,,FFF,,,,T,~~,,T',
    'T,~~~~,,,,,,,,,,,T,,,,,T',
    'T,,,,,,,,..........,,,,T',
    'T,,,T,,...,,,,,,,,..,,,T',
    'T,,,T,,.S.,,,T,,,,..,,,T',
    'T,,,,,,...,,,T,,,,..,,,T',
    'T,~,,T,...,,,,,,,,..,,,T',
    'T,~,,T,..............,,T',
    'T,~,,,,,,,,T,,,~~~~~,,,T',
    'T,,,,,,,,,,T,,,~~~~~,,,T',
    'T,,WWW,,,,,,,,,~~~~~,,,T',
    'T,,WWW,,,,,,,,,,,,,,,,,T',
    'T,,WWW,,,FFF,,,,T,,,,,,T',
    'T,,,,,,,,FFF,,,,,p,,,,,T',
    'TTTTTTTTTTTTTTTTTTTTTTTT',
  ];
  // SLOPPY TOWN — buildings with door tiles on the SOUTH face so the path can reach them.
  // Doors C (Center) at (4,5) and M (Mart) at (15,5). Player approaches from the path tiles below.
  const RAW_TOWN = [
    'TTTTTTTTTTTTTTTTTTTT',
    'T,,,,,,,,,P,,,,,,,,T',
    'T,,,,,,,,...,,,,,,,T',
    'T,BBBBB,,...,,BBBBBT',
    'T,BBBBB,,...,,BBBBBT',
    'T,BBCBB,,...,,BBMBBT',
    'T,,...,,,...,,,..,,T',
    'T,,...,,,...,,,..,,T',
    'T,,..........,..,,,T',
    'T,,..............,,T',
    'T,FF,,,,,,,,,,,,FF,T',
    'T,FF,,,,S,,,,,,,FF,T',
    'T,,,,,,,,,,,,,,,,,,T',
    'TTTTTTTTTTTTTTTTTTTT',
  ];
  // Interior maps — exit tile uses lowercase `p` (T_PORTAL_TOWN) which is rewired
  // to "return to wherever the player came from" via state.lastWorld.
  // All rows are padded to 12 cols so the grid is rectangular.
  const RAW_CENTER = [
    'BBBBBBBBBBBB',
    'BffffffffffB',
    'BfKKKKKKfffB',
    'BffffffffffB',
    'BfffrffffffB',
    'BfffrffffffB',
    'BBBBpBBBBBBB',
  ];
  const RAW_MART = [
    'BBBBBBBBBBBB',
    'BffffffffffB',
    'BfKKKKKKKffB',
    'BffffffffffB',
    'BfffrffffffB',
    'BBBBpBBBBBBB',
  ];
  // ROUTE 2 — open meadow with denser tall grass and a south-edge portal back to Route 1
  const RAW_ROUTE2 = [
    'TTTTTTTTTTTTTTTTTTTTTTTT',
    'T,,,,,,,,,,,,,,,,,,,,,,T',
    'T,~~~~~~,,,,,,,,,~~~~,,T',
    'T,~~~~~~,,FF,,,,,~~~~,,T',
    'T,~~~~~~,,FF,,,,,~~~~,,T',
    'T,,,,,,,,,,,,,,,,,,,,,,T',
    'T,,FF,,~~~~,,,,~~~~,,F,T',
    'T,,FF,,~~~~,,,,~~~~,,F,T',
    'T,,,,,,~~~~,,,,~~~~,,,,T',
    'T,,,,,,,,,,T,,,,,,,,,,,T',
    'T,~~,,,,,,,T,,,,,~~~~,,T',
    'T,~~,,,,,,,,,,,,,~~~~,,T',
    'T,,,,,,,,WWWW,,,,,,,,,,T',
    'T,,,,,,,,WWWW,,,,,,,,,,T',
    'T,,,,FF,,,,,,,,,,,,FF,,T',
    'T,,,,FF,,,,,,,,,,,,FF,,T',
    'TTTTTTTTTTTTsTTTTTTTTTTT',
  ];
  const MAPS = {
    route:  buildMap(RAW_ROUTE),
    route2: buildMap(RAW_ROUTE2),
    town:   buildMap(RAW_TOWN),
    center: buildMap(RAW_CENTER),
    mart:   buildMap(RAW_MART),
  };
  function curMap() { return MAPS[state.currentMap]; }
  function tileAt(x, y) {
    const m = curMap();
    if (x < 0 || y < 0 || x >= m.w || y >= m.h) return T_TREE;
    return m.grid[y][x];
  }
  function isSolid(x, y) { return !!SOLID[tileAt(x, y)]; }

  // === SLOPPYMON ROSTER ===
  // Each one is a hand-drawn 24×24 sprite (drawn procedurally with a per-mon function).
  // Stats: hp (max), atk (damage range), name, color, descriptor.
  const ROSTER = [
    { id:'mudslime',  name:'MUDSLIME',  hp:18, atk:[3,6], colorA:'#7a5e2e', colorB:'#c2a35a', face:'mud',  desc:'a glob with a face. damp. judgmental.' },
    { id:'sloppyduck',name:'SLOPDUCK',  hp:22, atk:[2,5], colorA:'#d4a36c', colorB:'#fff04b', face:'duck', desc:'a duck. but moister than usual.' },
    { id:'garbager',  name:'GARBAGER',  hp:28, atk:[4,8], colorA:'#3a3025', colorB:'#5a4d3f', face:'garb', desc:'sentient garbage. responds to its name.' },
    { id:'ratrash',   name:'RATRASH',   hp:14, atk:[2,7], colorA:'#5a4d3f', colorB:'#cadc9f', face:'rat',  desc:'lives in the bin. owns the bin.' },
    { id:'crowver',   name:'CROWVER',   hp:16, atk:[3,6], colorA:'#1a1a1a', colorB:'#7e5cb8', face:'crow', desc:'a crow that owes you money.' },
    { id:'glitchmite',name:'GLITCHMITE',hp:12, atk:[4,9], colorA:'#ff5ea1', colorB:'#7be4ff', face:'mite', desc:'corruption with legs. very fast.' },
  ];
  function pickWildMon() {
    const m = ROSTER[Math.floor(Math.random() * ROSTER.length)];
    return {
      id:m.id, name:m.name, maxHp:m.hp, hp:m.hp, atk:m.atk, color:m,
      level: 1 + Math.floor(Math.random() * 5),
      dna: Math.floor(Math.random() * 0xffffffff),  // procedural-limb seed
    };
  }
  // === PRNG seeded by dna for stable limb layout per creature ===
  function mulberry32(seed) {
    let s = seed >>> 0;
    return function() {
      s = (s + 0x6D2B79F5) >>> 0;
      let t = s;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  // === PLAYER ===
  const player = {
    tx: 12, ty: 8,                  // current tile
    px: 12 * 16, py: 8 * 16,        // pixel position (smooth interp)
    facing: 'down',
    walking: false,
    walkAnim: 0,
    walkFrames: 14,                 // frames per tile move
    walkProgress: 0,
    fromX: 0, fromY: 0,
    toX: 0, toY: 0,
    stepCount: 0,
    hp: 30, maxHp: 30,
  };
  function healTeam() {
    player.hp = player.maxHp;
    state.team.forEach(m => { m.hp = m.maxHp; });
    persist();
  }

  const state = {
    mode: 'walk',     // 'walk' | 'battle' | 'shop' | 'menu' | 'dialog'
    msgQueue: [],
    msgT: 0,
    battle: null,
    team: [],
    cameraX: 0, cameraY: 0,
    currentMap: 'route',
    bag: { ball: 5, greatBall: 1, cursedBall: 0, potion: 1 },
    coins: 80,
    dialog: null,        // { lines:[], cursor, onEnd }
    shop: null,          // { cursor, items:[{key,name,price,desc}] }
  };
  // restore from localStorage
  try {
    const raw = localStorage.getItem('sloppymon-save-v1');
    if (raw) {
      const s = JSON.parse(raw);
      if (s.team) state.team = s.team;
      if (s.bag) state.bag = Object.assign(state.bag, s.bag);
      if (typeof s.coins === 'number') state.coins = s.coins;
      if (s.trainersDefeated) state.trainersDefeated = s.trainersDefeated;
    }
  } catch {}
  state.trainersDefeated = state.trainersDefeated || {};

  // === TRAINERS — placed on the route, with line-of-sight detection ===
  // Each: id, x, y, dir (down/up/left/right), team, intro, defeat, defeated
  const TRAINERS = [
    { id:'t1', map:'route', x:14, y:7, dir:'down',
      team:[{ id:'ratrash',  name:'RATRASH',  maxHp:14, hp:14, atk:[2,7], level:3 }],
      intro:['BUG-CATCHER LEM:','my rats will','wreck your day!'],
      defeat:['lem mutters','about the rent.'],
    },
    { id:'t2', map:'route', x:18, y:10, dir:'left',
      team:[{ id:'crowver',  name:'CROWVER',  maxHp:16, hp:16, atk:[3,6], level:4 },
            { id:'ratrash',  name:'RATRASH',  maxHp:14, hp:14, atk:[2,7], level:3 }],
      intro:['HIKER PAUL:','i found these','behind the dumpster!'],
      defeat:['paul shrugs.','keeps the trash.'],
    },
    { id:'t3', map:'route', x:5, y:11, dir:'right',
      team:[{ id:'mudslime', name:'MUDSLIME', maxHp:18, hp:18, atk:[3,6], level:4 }],
      intro:['SWIMMER MIA:','straight from','the marsh!'],
      defeat:['mia returns','to the water.'],
    },
  ];
  function trainerOnMap() { return TRAINERS.filter(t => t.map === state.currentMap && !state.trainersDefeated[t.id]); }
  function trainerAt(x, y) { return trainerOnMap().find(t => t.x === x && t.y === y); }
  function isSolidWithEntities(x, y) {
    if (isSolid(x, y)) return true;
    if (trainerAt(x, y)) return true;
    return false;
  }

  function persist() {
    try {
      localStorage.setItem('sloppymon-save-v1', JSON.stringify({
        team: state.team, bag: state.bag, coins: state.coins,
        trainersDefeated: state.trainersDefeated,
      }));
    } catch {}
  }

  // === input ===
  const keys = {};
  let actionPressed = false, backPressed = false;
  addEventListener('keydown', (e) => {
    keys[e.code] = true;
    if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
    if (e.code === 'Space' || e.code === 'KeyZ' || e.code === 'Enter') actionPressed = true;
    if (e.code === 'KeyX' || e.code === 'Escape') backPressed = true;
  });
  addEventListener('keyup', (e) => { keys[e.code] = false; });

  // === movement ===
  function tryStartMove(dx, dy, dir) {
    if (player.walking) return;
    player.facing = dir;
    const nx = player.tx + dx, ny = player.ty + dy;
    if (isSolidWithEntities(nx, ny)) {
      player.walkProgress = 0;
      player.walking = false;
      bumpSfx();
      return;
    }
    player.fromX = player.tx * 16; player.fromY = player.ty * 16;
    player.toX = nx * 16; player.toY = ny * 16;
    player.tx = nx; player.ty = ny;
    player.walking = true;
    player.walkProgress = 0;
  }
  function checkTrainerLineOfSight() {
    // when player STOPS on a tile, check if any undefeated trainer can see them
    for (const t of trainerOnMap()) {
      const dx = t.dir === 'right' ? 1 : (t.dir === 'left' ? -1 : 0);
      const dy = t.dir === 'down' ? 1 : (t.dir === 'up' ? -1 : 0);
      // scan up to 5 tiles ahead, stopping at any solid tile
      for (let i = 1; i <= 5; i++) {
        const sx = t.x + dx * i, sy = t.y + dy * i;
        if (isSolid(sx, sy)) break;
        if (player.tx === sx && player.ty === sy) {
          startTrainerBattle(t);
          return true;
        }
      }
    }
    return false;
  }
  function rememberExit() {
    // record where we came from so the interior's exit tile returns us here
    state.lastWorld = { map: state.currentMap, x: player.tx, y: player.ty + 1 };
  }
  function returnFromInterior() {
    if (state.lastWorld) {
      const { map, x, y } = state.lastWorld;
      state.lastWorld = null;
      switchMap(map, x, y);
    } else {
      // fallback: default to town near the building doors
      switchMap('town', 9, 7);
    }
  }
  function tryEnterDoor() {
    const t = tileAt(player.tx, player.ty);
    if (t === T_DOOR_CENTER) { rememberExit(); switchMap('center', 4, 5); openDialog(['NURSE FAYE:','your sloppymon','feel sticky.','— ALL HEALED —'], () => healTeam()); }
    else if (t === T_DOOR_MART) { rememberExit(); switchMap('mart', 4, 4); openShop(); }
    else if (t === T_PORTAL_TOWN) {
      // route → town OR interior → town/wherever
      if (state.currentMap === 'route') switchMap('town', 9, 1);
      else returnFromInterior();
    }
    else if (t === T_PORTAL_ROUTE) {
      if (state.currentMap === 'town') switchMap('route', 17, 16);
      else returnFromInterior();
    }
    // route 1 ↔ route 2 (north transition)
    else if (t === T_PORTAL_R2) {
      // route1 → route2: land at the south portal one tile up so we don't immediately bounce
      switchMap('route2', 12, 16);
    }
    else if (t === T_PORTAL_R1) {
      // route2 → route1: land just inside route1 from the north
      switchMap('route', 12, 1);
    }
    else if (t === T_SIGN) { openDialog(['ROUTE 1','tall grass crawls','with sloppymon.','hold a direction','and walk in.']); }
  }
  function switchMap(id, tx, ty) {
    state.currentMap = id;
    player.tx = tx; player.ty = ty;
    player.px = tx * 16; player.py = ty * 16;
    player.walking = false;
    transitionFx();
  }
  function tickMovement() {
    if (state.mode !== 'walk') return;
    if (!player.walking) {
      if (keys['ArrowUp'] || keys['KeyW'])    tryStartMove(0, -1, 'up');
      else if (keys['ArrowDown'] || keys['KeyS']) tryStartMove(0, 1, 'down');
      else if (keys['ArrowLeft'] || keys['KeyA']) tryStartMove(-1, 0, 'left');
      else if (keys['ArrowRight'] || keys['KeyD']) tryStartMove(1, 0, 'right');
    } else {
      player.walkProgress++;
      const t = player.walkProgress / player.walkFrames;
      player.px = player.fromX + (player.toX - player.fromX) * t;
      player.py = player.fromY + (player.toY - player.fromY) * t;
      player.walkAnim = (player.walkAnim + 1) % 28;
      if (player.walkProgress >= player.walkFrames) {
        player.px = player.toX; player.py = player.toY;
        player.walking = false;
        player.stepCount++;
        const here = tileAt(player.tx, player.ty);
        // encounter check (only on outdoor maps with tall grass)
        if (here === T_TGRASS && (state.currentMap === 'route' || state.currentMap === 'route2')) {
          if (Math.random() < 0.18) { startBattle(pickWildMon()); return; }
        }
        // auto-step onto a portal triggers a contextual map transition
        if (here === T_PORTAL_TOWN) {
          if (state.currentMap === 'route') switchMap('town', 9, 2);
          else returnFromInterior();
          return;
        }
        if (here === T_PORTAL_ROUTE) {
          if (state.currentMap === 'town') switchMap('route', 17, 15);
          else returnFromInterior();
          return;
        }
        // route 1 ↔ route 2 north/south transitions
        if (here === T_PORTAL_R2) { switchMap('route2', 12, 16); return; }
        if (here === T_PORTAL_R1) { switchMap('route',  12, 1);  return; }
        // auto-step onto a door enters the building
        if (here === T_DOOR_CENTER) { rememberExit(); switchMap('center', 4, 5); openDialog(['NURSE FAYE:','your sloppymon','feel sticky.','— ALL HEALED —'], () => healTeam()); return; }
        if (here === T_DOOR_MART)   { rememberExit(); switchMap('mart',   4, 4); openShop(); return; }
        // trainer line-of-sight check
        if (checkTrainerLineOfSight()) return;
      }
    }
    // standing-still actions: SPACE/Z to interact with door / sign / npc
    if (!player.walking && actionPressed) {
      tryEnterDoor();
      actionPressed = false;
    }
  }

  // === camera ===
  function updateCamera() {
    const m = curMap();
    const tw = m.w * 16, th = m.h * 16;
    let cx = player.px - VW / 2 + 8;
    let cy = player.py - VH / 2 + 8;
    cx = Math.max(0, Math.min(Math.max(0, tw - VW), cx));
    cy = Math.max(0, Math.min(Math.max(0, th - VH), cy));
    state.cameraX = cx; state.cameraY = cy;
  }

      const d = state.dialog;

  // === draw ===
  function drawTile(x, y, t, time) {
    const sx = Math.round(x * 16 - state.cameraX);
    const sy = Math.round(y * 16 - state.cameraY);
    if (sx < -16 || sx > VW || sy < -16 || sy > VH) return;
    switch (t) {
      case T_PATH: {
        ctx.fillStyle = '#caa867';
        ctx.fillRect(sx, sy, 16, 16);
        ctx.fillStyle = '#9b7e3a';
        // pebble dots
        if ((x * 7 + y * 13) % 5 === 0) { ctx.fillRect(sx + 4, sy + 5, 2, 2); }
        if ((x * 11 + y * 5) % 6 === 0) { ctx.fillRect(sx + 10, sy + 9, 2, 2); }
        break;
      }
      case T_GRASS: {
        ctx.fillStyle = C.light;
        ctx.fillRect(sx, sy, 16, 16);
        ctx.fillStyle = C.mid;
        const k = (x * 3 + y * 7) % 4;
        ctx.fillRect(sx + 2 + k, sy + 2, 1, 2);
        ctx.fillRect(sx + 8 + ((x+y)%3), sy + 9, 1, 2);
        break;
      }
      case T_TGRASS: {
        ctx.fillStyle = C.light;
        ctx.fillRect(sx, sy, 16, 16);
        ctx.fillStyle = C.dark;
        // dense grass blade pattern, gently swaying with time
        const sway = Math.floor(Math.sin(time * 0.004 + (x + y) * 0.6) * 1) | 0;
        for (let i = 0; i < 4; i++) {
          for (let j = 0; j < 4; j++) {
            const px = sx + 1 + i * 4 + sway;
            const py = sy + 1 + j * 4 + ((i + j) & 1);
            ctx.fillRect(px, py, 2, 3);
          }
        }
        ctx.fillStyle = C.mid;
        for (let i = 0; i < 3; i++) {
          ctx.fillRect(sx + 3 + i * 5, sy + 6 + sway, 1, 2);
        }
        break;
      }
      case T_TREE: {
        ctx.fillStyle = C.dark;
        ctx.fillRect(sx, sy, 16, 16);
        ctx.fillStyle = C.mid;
        ctx.fillRect(sx + 2, sy + 2, 12, 12);
        ctx.fillStyle = C.light;
        ctx.fillRect(sx + 5, sy + 4, 2, 2);
        ctx.fillRect(sx + 9, sy + 8, 2, 2);
        ctx.fillRect(sx + 7, sy + 11, 2, 2);
        // trunk hint
        ctx.fillStyle = '#5a3018';
        ctx.fillRect(sx + 7, sy + 14, 2, 2);
        break;
      }
      case T_WATER: {
        ctx.fillStyle = '#3a89c9';
        ctx.fillRect(sx, sy, 16, 16);
        ctx.fillStyle = '#7be4ff';
        const w = ((time * 0.05 + x * 4 + y * 2) % 16) | 0;
        ctx.fillRect(sx + w, sy + 4, 4, 1);
        ctx.fillRect(sx + ((w + 8) % 16), sy + 11, 4, 1);
        break;
      }
      case T_FLOWER: {
        ctx.fillStyle = C.light;
        ctx.fillRect(sx, sy, 16, 16);
        ctx.fillStyle = '#ff5ea1';
        ctx.fillRect(sx + 6, sy + 6, 2, 2);
        ctx.fillRect(sx + 4, sy + 8, 2, 2);
        ctx.fillRect(sx + 8, sy + 8, 2, 2);
        ctx.fillRect(sx + 6, sy + 10, 2, 2);
        ctx.fillStyle = '#ffce4a';
        ctx.fillRect(sx + 6, sy + 8, 2, 2);
        break;
      }
      case T_ROCK: {
        ctx.fillStyle = C.bone;
        ctx.fillRect(sx, sy, 16, 16);
        ctx.fillStyle = '#5a4d3f';
        ctx.fillRect(sx + 2, sy + 5, 12, 8);
        ctx.fillStyle = '#7e6e5c';
        ctx.fillRect(sx + 3, sy + 4, 10, 4);
        break;
      }
      case T_SIGN: {
        // sign = grass under post
        ctx.fillStyle = C.light;
        ctx.fillRect(sx, sy, 16, 16);
        ctx.fillStyle = '#5a3018';
        ctx.fillRect(sx + 7, sy + 8, 2, 6);
        ctx.fillStyle = '#caa867';
        ctx.fillRect(sx + 3, sy + 3, 10, 6);
        ctx.fillStyle = '#1a0d05';
        ctx.fillRect(sx + 5, sy + 5, 2, 1);
        ctx.fillRect(sx + 9, sy + 5, 2, 1);
        break;
      }
      case T_BUILDING: {
        ctx.fillStyle = '#a02828';
        ctx.fillRect(sx, sy, 16, 16);
        ctx.fillStyle = '#cadc9f';
        ctx.fillRect(sx + 2, sy + 2, 4, 4);
        ctx.fillRect(sx + 10, sy + 2, 4, 4);
        ctx.fillStyle = '#1a0d05';
        ctx.fillRect(sx + 6, sy + 8, 4, 8);
        ctx.fillStyle = '#3a3025';
        ctx.fillRect(sx, sy, 16, 1);
        break;
      }
      case T_DOOR_CENTER: {
        ctx.fillStyle = '#a02828';
        ctx.fillRect(sx, sy, 16, 16);
        ctx.fillStyle = '#cadc9f';
        ctx.fillRect(sx + 4, sy + 4, 8, 10);
        ctx.fillStyle = '#3a89c9';
        ctx.fillRect(sx + 6, sy + 2, 4, 1);
        ctx.fillStyle = '#fff';
        ctx.fillRect(sx + 7, sy + 1, 2, 1);
        break;
      }
      case T_DOOR_MART: {
        ctx.fillStyle = '#3a89c9';
        ctx.fillRect(sx, sy, 16, 16);
        ctx.fillStyle = '#cadc9f';
        ctx.fillRect(sx + 4, sy + 4, 8, 10);
        ctx.fillStyle = '#ffce4a';
        ctx.fillRect(sx + 6, sy + 2, 4, 1);
        break;
      }
      case T_PORTAL_TOWN: case T_PORTAL_ROUTE: {
        ctx.fillStyle = '#caa867';
        ctx.fillRect(sx, sy, 16, 16);
        ctx.fillStyle = '#9b7e3a';
        ctx.fillRect(sx + 4, sy + 4, 8, 8);
        ctx.fillStyle = '#fff';
        ctx.fillRect(sx + 7, sy + 7, 2, 2);
        break;
      }
      case T_PORTAL_R2: {
        // grass with a north arrow indicator — route1 → route2
        ctx.fillStyle = C.light; ctx.fillRect(sx, sy, 16, 16);
        ctx.fillStyle = '#caa867'; ctx.fillRect(sx + 4, sy, 8, 16);
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.moveTo(sx + 8, sy + 3);
        ctx.lineTo(sx + 4, sy + 9);
        ctx.lineTo(sx + 7, sy + 9);
        ctx.lineTo(sx + 7, sy + 13);
        ctx.lineTo(sx + 9, sy + 13);
        ctx.lineTo(sx + 9, sy + 9);
        ctx.lineTo(sx + 12, sy + 9);
        ctx.closePath();
        ctx.fill();
        break;
      }
      case T_PORTAL_R1: {
        // grass with a south arrow indicator — route2 → route1
        ctx.fillStyle = C.light; ctx.fillRect(sx, sy, 16, 16);
        ctx.fillStyle = '#caa867'; ctx.fillRect(sx + 4, sy, 8, 16);
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.moveTo(sx + 8, sy + 13);
        ctx.lineTo(sx + 4, sy + 7);
        ctx.lineTo(sx + 7, sy + 7);
        ctx.lineTo(sx + 7, sy + 3);
        ctx.lineTo(sx + 9, sy + 3);
        ctx.lineTo(sx + 9, sy + 7);
        ctx.lineTo(sx + 12, sy + 7);
        ctx.closePath();
        ctx.fill();
        break;
      }
      case T_FLOOR: {
        ctx.fillStyle = '#9bbc0f';
        ctx.fillRect(sx, sy, 16, 16);
        ctx.fillStyle = '#8bac0f';
        if ((x + y) % 2 === 0) ctx.fillRect(sx + 1, sy + 1, 14, 14);
        break;
      }
      case T_COUNTER: {
        ctx.fillStyle = '#5a3018';
        ctx.fillRect(sx, sy, 16, 16);
        ctx.fillStyle = '#caa867';
        ctx.fillRect(sx + 1, sy + 2, 14, 12);
        ctx.fillStyle = '#5a3018';
        ctx.fillRect(sx + 2, sy + 4, 12, 1);
        break;
      }
      case T_RUG: {
        ctx.fillStyle = '#c44068';
        ctx.fillRect(sx, sy, 16, 16);
        ctx.fillStyle = '#ffce4a';
        ctx.fillRect(sx + 2, sy + 2, 12, 12);
        ctx.fillStyle = '#c44068';
        ctx.fillRect(sx + 5, sy + 5, 6, 6);
        break;
      }
      default: {
        ctx.fillStyle = C.light;
        ctx.fillRect(sx, sy, 16, 16);
      }
    }
  }
  function drawMap(time) {
    const m = curMap();
    const x0 = Math.max(0, Math.floor(state.cameraX / 16));
    const y0 = Math.max(0, Math.floor(state.cameraY / 16));
    const x1 = Math.min(m.w - 1, Math.floor((state.cameraX + VW) / 16));
    const y1 = Math.min(m.h - 1, Math.floor((state.cameraY + VH) / 16));
    for (let y = y0; y <= y1; y++) {
      for (let x = x0; x <= x1; x++) {
        drawTile(x, y, m.grid[y][x], time);
      }
    }
    // draw trainers on top
    for (const t of trainerOnMap()) drawTrainer(t);
  }
  function drawTrainer(t) {
    const sx = Math.round(t.x * 16 - state.cameraX);
    const sy = Math.round(t.y * 16 - state.cameraY);
    if (sx < -16 || sx > VW || sy < -16 || sy > VH) return;
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(sx + 3, sy + 13, 10, 2);
    // body — blue cap, brown shirt, dark pants
    ctx.fillStyle = '#caa867';
    ctx.fillRect(sx + 4, sy + 1, 8, 6);
    ctx.fillStyle = '#1d3a8c';
    ctx.fillRect(sx + 3, sy + 0, 10, 3);
    ctx.fillStyle = '#5a3018';
    ctx.fillRect(sx + 3, sy + 7, 10, 4);
    ctx.fillStyle = '#0a0a0a';
    if (t.dir === 'down') { ctx.fillRect(sx + 5, sy + 4, 1, 2); ctx.fillRect(sx + 10, sy + 4, 1, 2); }
    else if (t.dir === 'left')  ctx.fillRect(sx + 5, sy + 4, 1, 2);
    else if (t.dir === 'right') ctx.fillRect(sx + 10, sy + 4, 1, 2);
    ctx.fillStyle = '#3a3025';
    ctx.fillRect(sx + 4, sy + 11, 3, 4);
    ctx.fillRect(sx + 9, sy + 11, 3, 4);
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(sx + 4, sy + 14, 3, 1);
    ctx.fillRect(sx + 9, sy + 14, 3, 1);
    // line-of-sight stripe (subtle)
    const dx = t.dir === 'right' ? 1 : (t.dir === 'left' ? -1 : 0);
    const dy = t.dir === 'down'  ? 1 : (t.dir === 'up'   ? -1 : 0);
    ctx.fillStyle = 'rgba(255,90,61,0.18)';
    for (let i = 1; i <= 5; i++) {
      const lx = t.x + dx * i, ly = t.y + dy * i;
      if (isSolid(lx, ly)) break;
      const lsx = Math.round(lx * 16 - state.cameraX);
      const lsy = Math.round(ly * 16 - state.cameraY);
      ctx.fillRect(lsx, lsy, 16, 16);
    }
  }
  function drawPlayer(time) {
    const sx = Math.round(player.px - state.cameraX);
    const sy = Math.round(player.py - state.cameraY);
    const fr = (Math.floor(player.walkAnim / 7) % 2);  // alternate every 7 frames
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(sx + 3, sy + 13, 10, 2);
    // body (red shirt, blue jeans, fair skin) — Pokemon-Red style
    // head
    ctx.fillStyle = '#f5c891';
    ctx.fillRect(sx + 4, sy + 1, 8, 6);
    // hat
    ctx.fillStyle = '#e64545';
    ctx.fillRect(sx + 3, sy + 0, 10, 3);
    ctx.fillStyle = '#aa1818';
    ctx.fillRect(sx + 3, sy + 2, 10, 1);
    // eyes (depend on facing)
    ctx.fillStyle = '#0a0a0a';
    if (player.facing === 'down') {
      ctx.fillRect(sx + 5, sy + 4, 1, 2);
      ctx.fillRect(sx + 10, sy + 4, 1, 2);
    } else if (player.facing === 'up') {
      // back of head — just hat, no eyes
    } else if (player.facing === 'left') {
      ctx.fillRect(sx + 5, sy + 4, 1, 2);
    } else {
      ctx.fillRect(sx + 10, sy + 4, 1, 2);
    }
    // body (red shirt)
    ctx.fillStyle = '#e64545';
    ctx.fillRect(sx + 3, sy + 7, 10, 4);
    // arms
    ctx.fillStyle = '#f5c891';
    ctx.fillRect(sx + 2, sy + 8, 1, 2);
    ctx.fillRect(sx + 13, sy + 8, 1, 2);
    // legs (jeans)
    ctx.fillStyle = '#1d3a8c';
    if (fr === 0 || !player.walking) {
      ctx.fillRect(sx + 4, sy + 11, 3, 4);
      ctx.fillRect(sx + 9, sy + 11, 3, 4);
    } else {
      // walking pose: legs offset
      ctx.fillRect(sx + 3, sy + 11, 3, 4);
      ctx.fillRect(sx + 10, sy + 11, 3, 4);
    }
    // shoes
    ctx.fillStyle = '#0a0a0a';
    if (fr === 0 || !player.walking) {
      ctx.fillRect(sx + 4, sy + 14, 3, 1);
      ctx.fillRect(sx + 9, sy + 14, 3, 1);
    } else {
      ctx.fillRect(sx + 3, sy + 14, 3, 1);
      ctx.fillRect(sx + 10, sy + 14, 3, 1);
    }
  }

  // === BATTLE ===
  function startBattle(wild) {
    state.mode = 'battle';
    state.battle = {
      kind: 'wild',
      wild,
      menu: ['FIGHT', 'BAG', 'RUN'],
      cursor: 0,
      msg: ['A wild', wild.name + ' L' + wild.level, 'appeared!'],
      phase: 'intro',
      shake: 0,
      catchOutcome: null,
      bagMenu: null,
    };
    encounterSfx();
  }
  function startTrainerBattle(trainer) {
    state.mode = 'battle';
    // give the trainer a fresh team copy so battle damage doesn't persist into the trainer record
    // each member gets a stable per-trainer dna (derived from trainer id + slot) so layouts repeat
    const dnaSeed = trainer.id.split('').reduce((a, c) => a * 131 + c.charCodeAt(0), 1);
    const team = trainer.team.map((m, i) => ({ ...m, hp: m.maxHp, dna: m.dna != null ? m.dna : ((dnaSeed * 17 + i * 991) >>> 0) }));
    state.battle = {
      kind: 'trainer',
      trainer, trainerTeam: team, trainerIdx: 0,
      wild: team[0],
      menu: ['FIGHT', 'BAG', 'RUN'],
      cursor: 0,
      msg: trainer.intro.slice(),
      phase: 'intro',
      shake: 0,
      catchOutcome: null,
      bagMenu: null,
    };
    encounterSfx();
  }
  function endBattle(message) {
    state.battle.msg = message;
    state.battle.msgIdx = 0;
    state.battle.msgWaiting = true;
    state.battle.phase = 'end';
  }

  function tickBattle() {
    if (state.mode !== 'battle' || !state.battle) return;
    const b = state.battle;
    // Capture-and-clear input flags up front so early returns (trainer next-mon, KO bounce)
    // can't leak a still-true actionPressed into the next frame and double-advance dialogs.
    const action = actionPressed; const back = backPressed;
    actionPressed = false; backPressed = false;
    if (b.shake > 0) b.shake -= 0.6;
    if (b.phase === 'intro') {
      if (action) { b.phase = 'menu'; b.msg = ['What will you do?']; b.msgWaiting = false; }
    } else if (b.phase === 'menu') {
      if (keys['ArrowUp'] || keys['KeyW'])     { keys['ArrowUp']=keys['KeyW']=false; b.cursor = (b.cursor + b.menu.length - 1) % b.menu.length; menuMoveSfx(); }
      if (keys['ArrowDown'] || keys['KeyS']) { keys['ArrowDown']=keys['KeyS']=false; b.cursor = (b.cursor + 1) % b.menu.length; menuMoveSfx(); }
      if (action) {
        const choice = b.menu[b.cursor];
        if (choice === 'FIGHT') doFight();
        else if (choice === 'BAG') openBagMenu();
        else if (choice === 'RUN') doRun();
      }
    } else if (b.phase === 'bag') {
      const items = b.bagMenu;
      if (keys['ArrowUp'] || keys['KeyW'])     { keys['ArrowUp']=keys['KeyW']=false; items.cursor = (items.cursor + items.list.length - 1) % items.list.length; menuMoveSfx(); }
      if (keys['ArrowDown'] || keys['KeyS']) { keys['ArrowDown']=keys['KeyS']=false; items.cursor = (items.cursor + 1) % items.list.length; menuMoveSfx(); }
      if (back) { b.phase = 'menu'; b.bagMenu = null; }
      else if (action) {
        const it = items.list[items.cursor];
        if (it.qty <= 0) { menuMoveSfx(); }
        else useItem(it.key);
      }
    } else if (b.phase === 'result') {
      if (action) {
        // ORDER MATTERS: check explicit outcome flags BEFORE the HP-fainted branch.
        // Successful catches set b.wild.hp = 0, so without this guard the catch path
        // was being shadowed by "wild fled into the tall grass" — the team-push and
        // persist() calls never ran, which is why TEAM N/6 stayed at 0.
        if (b.catchOutcome === 'success') {
          state.team.push({ id: b.wild.id, name: b.wild.name, maxHp: b.wild.maxHp, hp: b.wild.maxHp, level: b.wild.level, dna: b.wild.dna });
          updateTeamUI();
          persist();
          endBattle(['Caught', b.wild.name + '!']);
        } else if (b.catchOutcome === 'flee') {
          endBattle(['You ran away.']);
        } else if (b.wild.hp <= 0 && b.kind === 'trainer') {
          if (trainerNextOrEnd()) return;
        } else if (b.wild.hp <= 0) {
          endBattle([b.wild.name, 'fled into the', 'tall grass.']);
        } else {
          // wild attack — now applies real damage to the player's trainer HP
          const dmg = b.wild.atk[0] + Math.floor(Math.random() * (b.wild.atk[1] - b.wild.atk[0] + 1));
          player.hp = Math.max(0, player.hp - dmg);
          b.msg = [b.wild.name, 'hits for', '— ' + dmg + ' dmg —'];
          b.phase = 'wild-hit';
          b.shake = 8;
          hitSfx();
          if (player.hp <= 0) {
            // KO'd — bounce back to a SAFE town tile (path under the buildings) and heal.
            // Town(9, 7) is in the central path — verified walkable, not a `B` wall tile.
            setTimeout(() => {
              state.mode = 'walk';
              state.battle = null;
              switchMap('town', 9, 7);
              healTeam();
              openDialog(['You blacked out!','— shuffled back','to SLOPPY TOWN —','everyone healed.']);
            }, 1200);
          }
        }
      }
    } else if (b.phase === 'wild-hit') {
      if (action) { b.phase = 'menu'; b.msg = ['What will you do?']; b.msgWaiting = false; }
    } else if (b.phase === 'end') {
      if (action) {
        state.mode = 'walk';
        state.battle = null;
      }
    }
    // (input flags already cleared at the top — early returns are safe)
  }

  function doFight() {
    const b = state.battle;
    const dmg = 4 + Math.floor(Math.random() * 6);
    b.wild.hp = Math.max(0, b.wild.hp - dmg);
    b.shake = 6;
    b.msg = ['You strike for', dmg + ' dmg!'];
    b.msgIdx = 0; b.msgWaiting = true;
    b.phase = 'result';
    b.catchOutcome = null;
    hitSfx();
  }
  function doCatch() {
    const b = state.battle;
    // catch chance scales inversely with HP %
    const hpPct = b.wild.hp / b.wild.maxHp;
    const chance = Math.max(0.12, 1 - hpPct * 0.85);
    const ok = Math.random() < chance;
    if (ok) {
      b.wild.hp = 0;
      b.catchOutcome = 'success';
      b.msg = ['Sloppy ball', 'shakes…', 'CLICK!'];
      catchSfx(true);
    } else {
      b.catchOutcome = null;
      b.msg = ['Sloppy ball', 'shakes…', b.wild.name + ' broke free!'];
      catchSfx(false);
    }
    b.msgIdx = 0; b.msgWaiting = true;
    b.phase = 'result';
  }
  function doRun() {
    const b = state.battle;
    if (b.kind === 'trainer') {
      b.msg = ['No running', 'from a trainer!'];
      b.phase = 'wild-hit';
      return;
    }
    b.catchOutcome = 'flee';
    b.msg = ['You bolt for', 'the path…'];
    b.phase = 'result';
  }

  // === BAG (in-battle item submenu) ===
  const ITEM_DEFS = {
    ball:       { name:'SLOPPY BALL', mult: 1.0, kind:'ball',  desc:'a basic catch device' },
    greatBall:  { name:'GREAT BALL',  mult: 1.6, kind:'ball',  desc:'1.6× catch chance' },
    cursedBall: { name:'CURSED BALL', mult: 2.5, kind:'ball',  desc:'2.5× — but only on the truly damned' },
    potion:     { name:'POTION',      kind:'potion', heal: 20, desc:'heal 20 HP from your trainer' },
  };
  function openBagMenu() {
    const b = state.battle;
    b.phase = 'bag';
    b.bagMenu = {
      cursor: 0,
      list: [
        { key:'ball',       name:ITEM_DEFS.ball.name,       qty: state.bag.ball },
        { key:'greatBall',  name:ITEM_DEFS.greatBall.name,  qty: state.bag.greatBall },
        { key:'cursedBall', name:ITEM_DEFS.cursedBall.name, qty: state.bag.cursedBall },
        { key:'potion',     name:ITEM_DEFS.potion.name,     qty: state.bag.potion },
      ],
    };
  }
  function useItem(key) {
    const b = state.battle;
    const def = ITEM_DEFS[key];
    if (!def || state.bag[key] <= 0) return;
    if (def.kind === 'ball') {
      if (b.kind === 'trainer') {
        b.msg = ["You can't catch", "another trainer's", "sloppymon!"];
        b.phase = 'wild-hit';
        return;
      }
      state.bag[key]--;
      const baseChance = Math.max(0.12, 1 - (b.wild.hp / b.wild.maxHp) * 0.85);
      const ok = Math.random() < Math.min(0.98, baseChance * def.mult);
      if (ok) {
        b.wild.hp = 0;
        b.catchOutcome = 'success';
        b.msg = [def.name + ' shakes…', 'CLICK!'];
        catchSfx(true);
      } else {
        b.msg = [def.name + ' shakes…', b.wild.name + ' broke free!'];
        catchSfx(false);
      }
      b.phase = 'result';
    } else if (key === 'potion') {
      state.bag.potion--;
      const before = player.hp;
      player.hp = Math.min(player.maxHp, player.hp + def.heal);
      b.msg = ['Used ' + def.name + '.', 'HP +' + (player.hp - before) + '!'];
      b.phase = 'wild-hit';
      persist();
    }
    persist();
  }

  // trainer faint flow — when current wild==trainer mon and hp <= 0, advance to next or end battle
  function trainerNextOrEnd() {
    const b = state.battle;
    if (b.kind !== 'trainer') return false;
    b.trainerIdx++;
    if (b.trainerIdx >= b.trainerTeam.length) {
      // trainer defeated
      state.trainersDefeated[b.trainer.id] = true;
      const reward = 60 + b.trainerTeam.length * 30;
      state.coins += reward;
      persist();
      b.msg = b.trainer.defeat.concat(['+ ' + reward + ' GIGA-COINS!']);
      b.phase = 'end';
      return true;
    }
    b.wild = b.trainerTeam[b.trainerIdx];
    b.msg = [b.trainer.intro[0] || 'TRAINER:', 'sends out', b.wild.name + '!'];
    b.phase = 'wild-hit';
    return true;
  }

  // === BATTLE RENDER ===
  function drawBattle(time) {
    const b = state.battle;
    if (!b) return;
    // shake
    const sh = b.shake > 0 ? Math.round((Math.random() - 0.5) * b.shake) : 0;
    ctx.save();
    ctx.translate(sh, 0);
    // bg
    ctx.fillStyle = C.paper;
    ctx.fillRect(0, 0, VW, VH);
    // top half: wild mon platform + wild mon
    ctx.fillStyle = C.bone;
    ctx.beginPath();
    ctx.ellipse(VW * 0.72, 100, 60, 18, 0, 0, Math.PI * 2);
    ctx.fill();
    // wild mon sprite
    drawMon(b.wild.id, VW * 0.72 - 16, 70, 1, time, b.wild.dna);
    // wild mon HP box
    drawHpBox(20, 30, b.wild.name, b.wild.level, b.wild.hp, b.wild.maxHp);
    // bottom half: player mon platform — placeholder silhouette of "you" the trainer
    ctx.fillStyle = C.bone;
    ctx.beginPath();
    ctx.ellipse(VW * 0.28, 200, 60, 18, 0, 0, Math.PI * 2);
    ctx.fill();
    // big silhouette
    ctx.fillStyle = C.dark;
    ctx.fillRect(VW * 0.28 - 18, 152, 36, 48);
    ctx.fillRect(VW * 0.28 - 12, 144, 24, 12);   // head
    ctx.fillStyle = '#e64545';
    ctx.fillRect(VW * 0.28 - 14, 142, 28, 5);    // hat
    // dialog/menu box
    ctx.fillStyle = C.pure;
    ctx.fillRect(0, VH - 80, VW, 80);
    ctx.fillStyle = C.dark;
    ctx.fillRect(0, VH - 80, VW, 2);
    // text
    if (b.phase === 'menu') {
      drawText('What will you do?', 14, VH - 60);
      ctx.fillStyle = C.pure;
      ctx.fillRect(VW - 140, VH - 70, 130, 60);
      ctx.fillStyle = C.dark;
      ctx.fillRect(VW - 140, VH - 70, 130, 1);
      for (let i = 0; i < b.menu.length; i++) {
        drawText(b.menu[i], VW - 110, VH - 56 + i * 16);
        if (b.cursor === i) drawText('▸', VW - 130, VH - 56 + i * 16);
      }
    } else if (b.phase === 'bag') {
      const bm = b.bagMenu;
      ctx.fillStyle = C.pure;
      ctx.fillRect(0, VH - 80, VW, 80);
      ctx.fillStyle = C.dark;
      ctx.fillRect(0, VH - 80, VW, 1);
      drawText('BAG · X to back', 14, VH - 64);
      for (let i = 0; i < bm.list.length; i++) {
        const it = bm.list[i];
        drawText(it.name, 30, VH - 46 + i * 12);
        ctx.font = 'bold 10px "Press Start 2P", monospace';
        ctx.fillText('×' + it.qty, VW - 60, VH - 46 + i * 12);
        if (bm.cursor === i) drawText('▸', 14, VH - 46 + i * 12);
      }
    } else {
      drawTextBlock(b.msg, 14, VH - 64);
      drawText('▼', VW - 24, VH - 18);
    }
    ctx.restore();
  }
  function drawText(str, x, y) {
    ctx.fillStyle = C.dark;
    ctx.font = 'bold 12px "Press Start 2P", monospace';
    ctx.fillText(str, x, y);
  }
  function drawTextBlock(lines, x, y) {
    for (let i = 0; i < lines.length; i++) drawText(lines[i], x, y + i * 14);
  }
  function drawHpBox(x, y, name, level, hp, maxHp) {
    ctx.fillStyle = C.pure;
    ctx.fillRect(x, y, 130, 32);
    ctx.fillStyle = C.dark;
    ctx.fillRect(x, y, 130, 2);
    ctx.font = 'bold 10px "Press Start 2P", monospace';
    ctx.fillText(name, x + 6, y + 12);
    ctx.fillText('L' + level, x + 105, y + 12);
    // hp bar
    ctx.fillStyle = C.dark;
    ctx.fillRect(x + 6, y + 18, 100, 4);
    const pct = Math.max(0, hp / maxHp);
    ctx.fillStyle = pct > 0.5 ? '#3eb98a' : (pct > 0.2 ? '#ffce4a' : '#e64545');
    ctx.fillRect(x + 7, y + 19, Math.floor(98 * pct), 2);
    ctx.fillStyle = C.dark;
    ctx.font = 'bold 8px "Press Start 2P", monospace';
    ctx.fillText(hp + '/' + maxHp, x + 80, y + 30);
  }

  // === PROCEDURAL LIMB GENERATION ===
  // Each creature has a `dna` integer that seeds a stable PRNG, so the same wild instance
  // shows the same mutant limbs across redraws.
  // Limb kinds: tentacle, antenna, eyestalk, tail, fang, spike, leg
  const LIMB_KINDS = ['tentacle','antenna','eyestalk','tail','fang','spike','leg'];
  function drawLimbs(dna, time, primary, accent) {
    if (dna == null) return;
    const rnd = mulberry32(dna);
    // 0-5 random limbs (skewed toward 1-3)
    const count = Math.floor(rnd() * 6);
    for (let i = 0; i < count; i++) {
      const kind = LIMB_KINDS[Math.floor(rnd() * LIMB_KINDS.length)];
      // attachment angle around the body (radians, 0=right, π/2=down)
      const ang = rnd() * Math.PI * 2;
      // body radius — limbs attach to a 10px ellipse around (16, 16) in 32×32 sprite space
      const ax = 16 + Math.cos(ang) * 10;
      const ay = 16 + Math.sin(ang) * 8;     // slightly squashed
      const len = 4 + Math.floor(rnd() * 9); // 4-12px
      const wob = Math.sin(time * 0.005 + i * 1.3 + dna * 0.001) * 1;
      ctx.save();
      ctx.translate(ax, ay);
      ctx.rotate(ang);
      switch (kind) {
        case 'tentacle': {
          ctx.strokeStyle = primary;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          for (let s = 1; s <= 5; s++) {
            const t = s / 5;
            const x = len * t;
            const y = Math.sin(t * 4 + time * 0.01 + i) * (3 + wob);
            ctx.lineTo(x, y);
          }
          ctx.stroke();
          // suckers
          ctx.fillStyle = accent;
          ctx.fillRect(len * 0.5, -1, 1, 1);
          ctx.fillRect(len * 0.8, 0, 1, 1);
          break;
        }
        case 'antenna': {
          ctx.strokeStyle = primary;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(len * 0.7 + wob, -len * 0.4);
          ctx.lineTo(len + wob, -len * 0.6);
          ctx.stroke();
          // ball tip
          ctx.fillStyle = accent;
          ctx.fillRect(len - 1 + wob, -len * 0.6 - 1, 2, 2);
          break;
        }
        case 'eyestalk': {
          ctx.strokeStyle = primary;
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.bezierCurveTo(len * 0.4, -len * 0.3, len * 0.6, -len * 0.5 + wob, len, -len * 0.5);
          ctx.stroke();
          // eye on the tip
          ctx.fillStyle = '#fff';
          ctx.fillRect(len - 1, -len * 0.5 - 1, 3, 3);
          ctx.fillStyle = '#000';
          ctx.fillRect(len, -len * 0.5, 1, 1);
          break;
        }
        case 'tail': {
          ctx.fillStyle = primary;
          for (let s = 0; s < 4; s++) {
            const w = 3 - s * 0.6;
            ctx.fillRect(s * (len/4), -w/2 + Math.sin(s + time * 0.01) * 0.5, len/4 + 1, w);
          }
          break;
        }
        case 'fang': {
          ctx.fillStyle = '#fff';
          ctx.beginPath();
          ctx.moveTo(0, -1);
          ctx.lineTo(len, 0);
          ctx.lineTo(0, 1);
          ctx.closePath(); ctx.fill();
          break;
        }
        case 'spike': {
          ctx.fillStyle = accent;
          ctx.beginPath();
          ctx.moveTo(0, -1);
          ctx.lineTo(len, 0);
          ctx.lineTo(0, 1);
          ctx.closePath(); ctx.fill();
          ctx.strokeStyle = primary;
          ctx.lineWidth = 0.8;
          ctx.stroke();
          break;
        }
        case 'leg': {
          ctx.strokeStyle = primary;
          ctx.lineWidth = 1.6;
          ctx.beginPath();
          ctx.moveTo(0, 0);
          ctx.lineTo(len * 0.5, len * 0.3);
          ctx.lineTo(len, len * 0.6 + wob);
          ctx.stroke();
          // foot
          ctx.fillStyle = '#1a1a1a';
          ctx.fillRect(len - 1, len * 0.6 + wob - 1, 2, 2);
          break;
        }
      }
      ctx.restore();
    }
  }

  // === SLOPPYMON SPRITES (24x24, drawn procedurally) ===
  function drawMon(id, x, y, scale, time, dna) {
    const mon = ROSTER.find(m => m.id === id);
    if (!mon) return;
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(scale, scale);
    ctx.imageSmoothingEnabled = false;
    // limbs render BEHIND the body so they look like they're attached
    drawLimbs(dna, time, mon.colorA, mon.colorB);
    const bob = Math.sin(time * 0.005) * 1;
    if (mon.face === 'mud') {
      ctx.fillStyle = mon.colorA;
      ctx.fillRect(2, 8 + bob, 28, 14);
      ctx.fillRect(4, 6 + bob, 24, 4);
      ctx.fillStyle = mon.colorB;
      ctx.fillRect(6, 10 + bob, 4, 4);
      ctx.fillRect(20, 10 + bob, 4, 4);
      ctx.fillStyle = '#000';
      ctx.fillRect(7, 11 + bob, 2, 2);
      ctx.fillRect(21, 11 + bob, 2, 2);
      ctx.fillStyle = '#5a3a14';
      ctx.fillRect(12, 17 + bob, 6, 1);
      // drips
      ctx.fillStyle = mon.colorA;
      ctx.fillRect(8, 22 + bob, 2, 2);
      ctx.fillRect(22, 22 + bob, 2, 2);
    } else if (mon.face === 'duck') {
      // body
      ctx.fillStyle = mon.colorA;
      ctx.fillRect(4, 10 + bob, 22, 12);
      // head
      ctx.fillRect(8, 4 + bob, 14, 8);
      // beak
      ctx.fillStyle = mon.colorB;
      ctx.fillRect(20, 8 + bob, 6, 3);
      // eye
      ctx.fillStyle = '#fff';
      ctx.fillRect(15, 6 + bob, 3, 3);
      ctx.fillStyle = '#000';
      ctx.fillRect(16, 7 + bob, 1, 1);
      // feet
      ctx.fillStyle = mon.colorB;
      ctx.fillRect(8, 22 + bob, 4, 2);
      ctx.fillRect(18, 22 + bob, 4, 2);
      // moisture drips
      ctx.fillStyle = '#7be4ff';
      ctx.fillRect(6, 22 + bob, 2, 2);
    } else if (mon.face === 'garb') {
      // garbage bag bulge
      ctx.fillStyle = mon.colorA;
      ctx.fillRect(4, 6 + bob, 24, 18);
      ctx.fillStyle = mon.colorB;
      ctx.fillRect(6, 4 + bob, 4, 6);
      ctx.fillRect(22, 4 + bob, 4, 6);
      // eyes
      ctx.fillStyle = '#ffce4a';
      ctx.fillRect(10, 12 + bob, 3, 4);
      ctx.fillRect(20, 12 + bob, 3, 4);
      ctx.fillStyle = '#000';
      ctx.fillRect(11, 13 + bob, 1, 2);
      ctx.fillRect(21, 13 + bob, 1, 2);
      // mouth (jagged)
      ctx.fillStyle = '#fff';
      ctx.fillRect(13, 18 + bob, 2, 2);
      ctx.fillRect(17, 18 + bob, 2, 2);
      // banana peel
      ctx.fillStyle = '#fff04b';
      ctx.fillRect(2, 4 + bob, 5, 1);
      ctx.fillRect(2, 5 + bob, 1, 4);
    } else if (mon.face === 'rat') {
      // body
      ctx.fillStyle = mon.colorA;
      ctx.fillRect(4, 14 + bob, 20, 8);
      // head
      ctx.fillRect(18, 10 + bob, 8, 8);
      // ears
      ctx.fillStyle = mon.colorB;
      ctx.fillRect(20, 8 + bob, 3, 3);
      ctx.fillRect(24, 8 + bob, 2, 2);
      // eye
      ctx.fillStyle = '#fff';
      ctx.fillRect(22, 12 + bob, 2, 2);
      ctx.fillStyle = '#000';
      ctx.fillRect(22, 12 + bob, 1, 1);
      // tail
      ctx.fillStyle = mon.colorA;
      ctx.fillRect(0, 18 + bob, 4, 2);
      ctx.fillRect(2, 16 + bob, 4, 2);
      // feet
      ctx.fillRect(6, 22 + bob, 3, 2);
      ctx.fillRect(16, 22 + bob, 3, 2);
    } else if (mon.face === 'crow') {
      // body
      ctx.fillStyle = mon.colorA;
      ctx.fillRect(8, 8 + bob, 14, 16);
      ctx.fillRect(6, 12 + bob, 18, 8);
      // wing
      ctx.fillStyle = mon.colorB;
      ctx.fillRect(10, 14 + bob, 8, 4);
      // beak
      ctx.fillStyle = '#ffce4a';
      ctx.fillRect(20, 12 + bob, 4, 2);
      // eye
      ctx.fillStyle = '#ffce4a';
      ctx.fillRect(16, 10 + bob, 2, 2);
      ctx.fillStyle = '#000';
      ctx.fillRect(16, 10 + bob, 1, 1);
      // feet
      ctx.fillStyle = '#ffce4a';
      ctx.fillRect(10, 22 + bob, 2, 2);
      ctx.fillRect(16, 22 + bob, 2, 2);
    } else if (mon.face === 'mite') {
      // glitchy 3-frame jitter
      const jit = (Math.random() < 0.4) ? 2 : 0;
      ctx.fillStyle = mon.colorA;
      ctx.fillRect(8 + jit, 8 + bob, 16, 14);
      ctx.fillStyle = mon.colorB;
      ctx.fillRect(6, 10 + bob, 20, 8);
      // eyes (chromatic split)
      ctx.fillStyle = '#fff';
      ctx.fillRect(11, 12 + bob, 2, 3);
      ctx.fillRect(20, 12 + bob, 2, 3);
      ctx.fillStyle = '#000';
      ctx.fillRect(11, 13 + bob, 1, 1);
      ctx.fillRect(20, 13 + bob, 1, 1);
      // legs
      ctx.fillStyle = mon.colorA;
      ctx.fillRect(7, 22 + bob, 2, 3);
      ctx.fillRect(11, 22 + bob, 2, 3);
      ctx.fillRect(19, 22 + bob, 2, 3);
      ctx.fillRect(23, 22 + bob, 2, 3);
      // glitch artifacts
      if (Math.random() < 0.3) {
        ctx.fillStyle = '#ff5ea1';
        ctx.fillRect(0, 6 + bob + jit, 32, 1);
      }
      if (Math.random() < 0.2) {
        ctx.fillStyle = '#7be4ff';
        ctx.fillRect(0, 19 + bob, 32, 1);
      }
    }
    ctx.restore();
  }

  // === team ui ===
  function updateTeamUI() {
    const root = document.getElementById('team');
    const slots = [];
    for (let i = 0; i < 6; i++) {
      const m = state.team[i];
      if (m) {
        slots.push(`<div class="slot"><span class="ico">${monIcon(m.id)}</span>${m.name}<span class="hp">L${m.level}</span></div>`);
      } else {
        slots.push('<div class="slot empty">—</div>');
      }
    }
    root.innerHTML = slots.join('');
  }
  function monIcon(id) { return ({mudslime:'🟫',sloppyduck:'🦆',garbager:'🗑',ratrash:'🐀',crowver:'🐦',glitchmite:'🪲'})[id] || '◇'; }

  // === audio ===
  let audioCtx = null, master = null;
  function audio() { if (!audioCtx) { audioCtx = new (window.AudioContext||window.webkitAudioContext)(); master = audioCtx.createGain(); master.gain.value = 0.25; master.connect(audioCtx.destination);} if (audioCtx.state==='suspended') audioCtx.resume(); return audioCtx; }
  function bumpSfx() { audio(); const t = audioCtx.currentTime; const o = audioCtx.createOscillator(); o.type='square'; o.frequency.setValueAtTime(120, t); o.frequency.exponentialRampToValueAtTime(60, t+0.06); const g = audioCtx.createGain(); g.gain.setValueAtTime(0.001, t); g.gain.exponentialRampToValueAtTime(0.08, t+0.005); g.gain.exponentialRampToValueAtTime(0.0001, t+0.07); o.connect(g); g.connect(master); o.start(t); o.stop(t+0.08);}
  function encounterSfx() { audio(); const t = audioCtx.currentTime;
    [220, 330, 440, 660, 880, 660, 440].forEach((f, i) => {
      const o = audioCtx.createOscillator(); o.type='square';
      o.frequency.setValueAtTime(f, t + i*0.06);
      const g = audioCtx.createGain(); g.gain.setValueAtTime(0.001, t+i*0.06); g.gain.exponentialRampToValueAtTime(0.1, t+0.005+i*0.06); g.gain.exponentialRampToValueAtTime(0.0001, t+0.08+i*0.06);
      o.connect(g); g.connect(master); o.start(t+i*0.06); o.stop(t+0.1+i*0.06);
    });
  }
  function menuMoveSfx() { audio(); const t = audioCtx.currentTime; const o=audioCtx.createOscillator(); o.type='square'; o.frequency.setValueAtTime(700, t); const g=audioCtx.createGain(); g.gain.setValueAtTime(0.001, t); g.gain.exponentialRampToValueAtTime(0.04, t+0.005); g.gain.exponentialRampToValueAtTime(0.0001, t+0.04); o.connect(g); g.connect(master); o.start(t); o.stop(t+0.05);}
  function hitSfx() { audio(); const t = audioCtx.currentTime; const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.15, audioCtx.sampleRate); const d=buf.getChannelData(0); for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1)*Math.pow(1 - i/d.length, 1.4); const src = audioCtx.createBufferSource(); src.buffer = buf; const lp = audioCtx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value = 1200; const ng = audioCtx.createGain(); ng.gain.setValueAtTime(0.4, t); ng.gain.exponentialRampToValueAtTime(0.0001, t+0.16); src.connect(lp); lp.connect(ng); ng.connect(master); src.start(t);}
  function catchSfx(success) { audio(); const t = audioCtx.currentTime;
    const seq = success ? [440, 550, 660, 880] : [600, 500, 400];
    seq.forEach((f, i) => {
      const o = audioCtx.createOscillator(); o.type='square';
      o.frequency.setValueAtTime(f, t + i*0.12);
      const g = audioCtx.createGain(); g.gain.setValueAtTime(0.001, t+i*0.12); g.gain.exponentialRampToValueAtTime(0.08, t+0.005+i*0.12); g.gain.exponentialRampToValueAtTime(0.0001, t+0.14+i*0.12);
      o.connect(g); g.connect(master); o.start(t+i*0.12); o.stop(t+0.16+i*0.12);
    });
  }

  // === main loop ===
  function loop(time) {
    // ALWAYS start with a fully-painted clean canvas. Without this, mode-transitions
    // (shop close, dialog dismiss, battle end) could leave ghost pixels at the edges
    // because drawMap only paints tiles within map bounds — interior maps are smaller
    // than the viewport and don't fully cover.
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, VW, VH);
    if (state.mode === 'walk') {
      tickMovement();
      updateCamera();
      drawMap(time);
      drawPlayer(time);
      drawHud();
    } else if (state.mode === 'battle') {
      tickBattle();
      drawBattle(time);
    } else if (state.mode === 'dialog') {
      tickDialog();
      // keep drawing world underneath
      updateCamera();
      drawMap(time);
      drawPlayer(time);
      drawDialog();
    } else if (state.mode === 'shop') {
      tickShop();
      // tickShop may have flipped state.mode to 'walk' (LEAVE/X). Keep updating the
      // camera so the post-close map paints at the right position without a glitch frame.
      updateCamera();
      drawMap(time);
      drawPlayer(time);
      drawShop();   // no-op if shop was just closed
    }
    if (transitionAlpha > 0) {
      ctx.fillStyle = `rgba(0,0,0,${transitionAlpha})`;
      ctx.fillRect(0, 0, VW, VH);
      transitionAlpha -= 0.08;
    }
    requestAnimationFrame(loop);
  }
  function drawHud() {
    // tiny corner HUD: HP + coins + map name
    const mapName = state.currentMap.toUpperCase();
    ctx.fillStyle = 'rgba(15,56,15,0.85)';
    ctx.fillRect(0, 0, VW, 18);
    ctx.fillStyle = C.bone;
    ctx.font = 'bold 8px "Press Start 2P", monospace';
    ctx.fillText(mapName, 6, 12);
    ctx.fillText('HP ' + player.hp + '/' + player.maxHp, 80, 12);
    ctx.fillText('◇ ' + state.coins, 180, 12);
    ctx.fillText('TEAM ' + state.team.length + '/6', 240, 12);
  }
  updateTeamUI();
  requestAnimationFrame(loop);
})();
</script>
</body>
