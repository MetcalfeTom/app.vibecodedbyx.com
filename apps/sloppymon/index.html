<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Sloppymon · Catch the Worst Creatures</title>
<meta name="description" content="A pixel-art Pokémon-Red-style world. Walk through tall grass, encounter sloppymon, catch them with sloppy balls." />
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%94%B4" />
<meta property="og:title" content="Sloppymon" />
<meta property="og:description" content="A 2D tile world with four-way movement, tall-grass encounters, and a 6-creature roster of cursed cartoon sloppymon to catch." />
<meta property="og:url" content="https://sloppy.live/sloppymon/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/16-bit%20gameboy%20pixel%20art%20overhead%20view%20character%20walking%20through%20tall%20grass%20with%20a%20cartoon%20cursed%20monster%20encountered?width=1200&height=630&nologo=true" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Major+Mono+Display&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#0a1408;
  --gb-dark:#0f380f;
  --gb-mid:#306230;
  --gb-light:#8bac0f;
  --gb-paper:#9bbc0f;
  --gb-bone:#cadc9f;
  --bone:#e6f5d2;
  --hot:#ff5a3d;
  --amber:#ffce4a;
  --pink:#ff5ea1;
  --dim:rgba(230,245,210,0.5);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;background:var(--bg);color:var(--bone);font-family:'VT323',monospace;overflow:hidden}
body{
  background:
    radial-gradient(ellipse at 50% 50%, rgba(139,172,15,0.10), transparent 55%),
    linear-gradient(180deg, #0a1408 0%, #050905 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:100vh;
}
#stage{
  image-rendering:pixelated;
  image-rendering:crisp-edges;
  display:block;
  background:var(--gb-paper);
  border:6px solid #1a1a1a;
  border-radius:6px;
  box-shadow:
    0 0 0 2px #2a2a2a,
    0 18px 38px rgba(0,0,0,0.7),
    0 6px 0 rgba(0,0,0,0.4),
    inset 0 0 30px rgba(0,0,0,0.25);
  cursor:crosshair;
}
.title{
  font-family:'Press Start 2P', monospace;
  font-size:clamp(14px, 2vw, 20px);letter-spacing:0.16em;
  color:var(--gb-bone);margin-bottom:14px;line-height:1.4;text-align:center;
  text-shadow:0 0 10px rgba(139,172,15,0.5), 2px 2px 0 #000;
}
.title .b{color:var(--gb-light)}
.title .r{color:var(--hot)}
.tagline{
  font-family:'VT323', monospace;font-size:14px;color:var(--dim);
  letter-spacing:0.12em;margin-bottom:6px;
}
.kbd{
  margin-top:14px;font-family:'VT323',monospace;font-size:14px;color:var(--dim);
  letter-spacing:0.06em;text-align:center;line-height:1.5;
}
.kbd b{color:var(--gb-light);font-weight:400}
.team{
  margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;
  font-family:'Press Start 2P', monospace;font-size:9px;letter-spacing:0.1em;color:var(--gb-bone);
  max-width:560px;
}
.team .slot{
  background:rgba(15,56,15,0.5);
  border:1px solid rgba(139,172,15,0.5);
  padding:6px 10px;border-radius:2px;
  display:flex;align-items:center;gap:6px;min-width:72px;
}
.team .slot.empty{opacity:0.4}
.team .slot .ico{font-size:12px}
.team .slot .hp{color:var(--hot);font-size:8px}
@media (max-width:600px){
  .title{font-size:12px}
  .kbd{font-size:11px}
}
</style>
</head>
<body>
<div class="title">⊿ <span class="b">SLOPPY</span><span class="r">MON</span> ⊿</div>
<div class="tagline">— catch the worst creatures · sloppy.live region —</div>
<canvas id="stage" width="320" height="288"></canvas>
<div class="team" id="team"></div>
<div class="kbd">
  <b>↑↓←→</b> / <b>WASD</b> walk &nbsp;&nbsp; <b>Z</b> / <b>SPACE</b> confirm &nbsp;&nbsp; <b>X</b> back<br>
  walk into tall grass · catch sloppymon · become legend
</div>

<script>
(() => {
  const canvas = document.getElementById('stage');
  const ctx = canvas.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  const VW = 320, VH = 288;             // double-gameboy logical resolution
  // resize canvas to fit container while preserving integer scale
  function fit() {
    const maxW = Math.min(window.innerWidth - 40, 720);
    const maxH = Math.min(window.innerHeight - 240, 720);
    let scale = Math.floor(Math.min(maxW / VW, maxH / VH));
    scale = Math.max(1, scale);
    canvas.style.width  = (VW * scale) + 'px';
    canvas.style.height = (VH * scale) + 'px';
  }
  fit(); addEventListener('resize', fit);

  // === gameboy palette ===
  const C = {
    dark:   '#0f380f',
    mid:    '#306230',
    light:  '#8bac0f',
    paper:  '#9bbc0f',
    bone:   '#cadc9f',
    pure:   '#e6f5d2',
    ink:    '#0a1408',
    blood:  '#a02828',
  };

  // === TILES ===
  // tile codes: . path, , grass, ~ tall grass (encounter), # tree (solid), W water (solid), F flower, S sand, ▢ rock (solid), L ledge (one-way south), B sign, P portal
  const T_PATH = 0, T_GRASS = 1, T_TGRASS = 2, T_TREE = 3, T_WATER = 4, T_FLOWER = 5, T_SAND = 6, T_ROCK = 7, T_LEDGE = 8, T_SIGN = 9, T_BUILDING = 10;
  const SOLID = { 3:1, 4:1, 7:1, 10:1 };  // tree, water, rock, building block movement

  // build a hand-crafted small map (24 wide, 18 tall — bigger than viewport so camera scrolls)
  // Legend in source: . = path, , = grass, ~ = tallgrass, T = tree, W = water, F = flower, R = rock, L = ledge, S = sign, B = building, # alias for tree
  const RAW_MAP = [
    'TTTTTTTTTTTTTTTTTTTTTTTT',
    'T,,,,,,,,,,,,,,,,,,,,,,T',
    'T,~~~~,T,,FFF,,,,T,~~,,T',
    'T,~~~~,T,,FFF,,,,T,~~,,T',
    'T,~~~~,,,,,,,,,,,T,,,,,T',
    'T,,,,,,,,..........,,,,T',
    'T,,,T,,...,,,,,,,,..,,,T',
    'T,,,T,,.S.,,,T,,,,..,,,T',
    'T,,,,,,...,B,T,,,,..,,,T',
    'T,~,,T,...,,,,,,,,..,,,T',
    'T,~,,T,..............,,T',
    'T,~,,,,,,,,T,,,~~~~~,,,T',
    'T,,,,,,,,,,T,,,~~~~~,,,T',
    'T,,WWW,,,,,,,,,~~~~~,,,T',
    'T,,WWW,,,,,,,,,,,,,,,,,T',
    'T,,WWW,,,FFF,,,,T,,,,,,T',
    'T,,,,,,,,FFF,,,,T,,,,,,T',
    'TTTTTTTTTTTTTTTTTTTTTTTT',
  ];
  function parseTile(c) {
    return ({
      'T':T_TREE, '#':T_TREE, ',':T_GRASS, '.':T_PATH, '~':T_TGRASS,
      'W':T_WATER, 'F':T_FLOWER, 'R':T_ROCK, 'L':T_LEDGE, 'S':T_SIGN, 'B':T_BUILDING,
    })[c] ?? T_GRASS;
  }
  const MAP_W = RAW_MAP[0].length;
  const MAP_H = RAW_MAP.length;
  const MAP = [];
  for (let y = 0; y < MAP_H; y++) {
    const row = [];
    for (let x = 0; x < MAP_W; x++) row.push(parseTile(RAW_MAP[y][x] || ','));
    MAP.push(row);
  }
  function tileAt(x, y) {
    if (x < 0 || y < 0 || x >= MAP_W || y >= MAP_H) return T_TREE;
    return MAP[y][x];
  }
  function isSolid(x, y) {
    return !!SOLID[tileAt(x, y)];
  }

  // === SLOPPYMON ROSTER ===
  // Each one is a hand-drawn 24×24 sprite (drawn procedurally with a per-mon function).
  // Stats: hp (max), atk (damage range), name, color, descriptor.
  const ROSTER = [
    { id:'mudslime',  name:'MUDSLIME',  hp:18, atk:[3,6], colorA:'#7a5e2e', colorB:'#c2a35a', face:'mud',  desc:'a glob with a face. damp. judgmental.' },
    { id:'sloppyduck',name:'SLOPDUCK',  hp:22, atk:[2,5], colorA:'#d4a36c', colorB:'#fff04b', face:'duck', desc:'a duck. but moister than usual.' },
    { id:'garbager',  name:'GARBAGER',  hp:28, atk:[4,8], colorA:'#3a3025', colorB:'#5a4d3f', face:'garb', desc:'sentient garbage. responds to its name.' },
    { id:'ratrash',   name:'RATRASH',   hp:14, atk:[2,7], colorA:'#5a4d3f', colorB:'#cadc9f', face:'rat',  desc:'lives in the bin. owns the bin.' },
    { id:'crowver',   name:'CROWVER',   hp:16, atk:[3,6], colorA:'#1a1a1a', colorB:'#7e5cb8', face:'crow', desc:'a crow that owes you money.' },
    { id:'glitchmite',name:'GLITCHMITE',hp:12, atk:[4,9], colorA:'#ff5ea1', colorB:'#7be4ff', face:'mite', desc:'corruption with legs. very fast.' },
  ];
  function pickWildMon() {
    const m = ROSTER[Math.floor(Math.random() * ROSTER.length)];
    return { id:m.id, name:m.name, maxHp:m.hp, hp:m.hp, atk:m.atk, color:m, level: 1 + Math.floor(Math.random() * 5) };
  }

  // === PLAYER ===
  const player = {
    tx: 12, ty: 8,                  // current tile
    px: 12 * 16, py: 8 * 16,        // pixel position (smooth interp)
    facing: 'down',
    walking: false,
    walkAnim: 0,
    walkFrames: 14,                 // frames per tile move
    walkProgress: 0,
    fromX: 0, fromY: 0,
    toX: 0, toY: 0,
    stepCount: 0,
  };

  const state = {
    mode: 'walk',     // 'walk' | 'battle' | 'message'
    msgQueue: [],
    msgT: 0,
    battle: null,
    team: [],
    cameraX: 0, cameraY: 0,
  };

  // === input ===
  const keys = {};
  let actionPressed = false, backPressed = false;
  addEventListener('keydown', (e) => {
    keys[e.code] = true;
    if (['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
    if (e.code === 'Space' || e.code === 'KeyZ' || e.code === 'Enter') actionPressed = true;
    if (e.code === 'KeyX' || e.code === 'Escape') backPressed = true;
  });
  addEventListener('keyup', (e) => { keys[e.code] = false; });

  // === movement ===
  function tryStartMove(dx, dy, dir) {
    if (player.walking) return;
    player.facing = dir;
    const nx = player.tx + dx, ny = player.ty + dy;
    if (isSolid(nx, ny)) {
      // bump animation only — don't move
      player.walkProgress = 0;
      player.walking = false;
      bumpSfx();
      return;
    }
    player.fromX = player.tx * 16; player.fromY = player.ty * 16;
    player.toX = nx * 16; player.toY = ny * 16;
    player.tx = nx; player.ty = ny;
    player.walking = true;
    player.walkProgress = 0;
  }
  function tickMovement() {
    if (state.mode !== 'walk') return;
    if (!player.walking) {
      if (keys['ArrowUp'] || keys['KeyW'])    tryStartMove(0, -1, 'up');
      else if (keys['ArrowDown'] || keys['KeyS']) tryStartMove(0, 1, 'down');
      else if (keys['ArrowLeft'] || keys['KeyA']) tryStartMove(-1, 0, 'left');
      else if (keys['ArrowRight'] || keys['KeyD']) tryStartMove(1, 0, 'right');
    } else {
      player.walkProgress++;
      const t = player.walkProgress / player.walkFrames;
      player.px = player.fromX + (player.toX - player.fromX) * t;
      player.py = player.fromY + (player.toY - player.fromY) * t;
      player.walkAnim = (player.walkAnim + 1) % 28;
      if (player.walkProgress >= player.walkFrames) {
        player.px = player.toX; player.py = player.toY;
        player.walking = false;
        player.stepCount++;
        // encounter check
        if (tileAt(player.tx, player.ty) === T_TGRASS) {
          if (Math.random() < 0.18) startBattle(pickWildMon());
        }
      }
    }
  }

  // === camera ===
  function updateCamera() {
    // camera follows player, clamped to map bounds
    const tw = MAP_W * 16, th = MAP_H * 16;
    let cx = player.px - VW / 2 + 8;
    let cy = player.py - VH / 2 + 8;
    cx = Math.max(0, Math.min(tw - VW, cx));
    cy = Math.max(0, Math.min(th - VH, cy));
    state.cameraX = cx; state.cameraY = cy;
  }

  // === draw ===
  function drawTile(x, y, t, time) {
    const sx = Math.round(x * 16 - state.cameraX);
    const sy = Math.round(y * 16 - state.cameraY);
    if (sx < -16 || sx > VW || sy < -16 || sy > VH) return;
    switch (t) {
      case T_PATH: {
        ctx.fillStyle = '#caa867';
        ctx.fillRect(sx, sy, 16, 16);
        ctx.fillStyle = '#9b7e3a';
        // pebble dots
        if ((x * 7 + y * 13) % 5 === 0) { ctx.fillRect(sx + 4, sy + 5, 2, 2); }
        if ((x * 11 + y * 5) % 6 === 0) { ctx.fillRect(sx + 10, sy + 9, 2, 2); }
        break;
      }
      case T_GRASS: {
        ctx.fillStyle = C.light;
        ctx.fillRect(sx, sy, 16, 16);
        ctx.fillStyle = C.mid;
        const k = (x * 3 + y * 7) % 4;
        ctx.fillRect(sx + 2 + k, sy + 2, 1, 2);
        ctx.fillRect(sx + 8 + ((x+y)%3), sy + 9, 1, 2);
        break;
      }
      case T_TGRASS: {
        ctx.fillStyle = C.light;
        ctx.fillRect(sx, sy, 16, 16);
        ctx.fillStyle = C.dark;
        // dense grass blade pattern, gently swaying with time
        const sway = Math.floor(Math.sin(time * 0.004 + (x + y) * 0.6) * 1) | 0;
        for (let i = 0; i < 4; i++) {
          for (let j = 0; j < 4; j++) {
            const px = sx + 1 + i * 4 + sway;
            const py = sy + 1 + j * 4 + ((i + j) & 1);
            ctx.fillRect(px, py, 2, 3);
          }
        }
        ctx.fillStyle = C.mid;
        for (let i = 0; i < 3; i++) {
          ctx.fillRect(sx + 3 + i * 5, sy + 6 + sway, 1, 2);
        }
        break;
      }
      case T_TREE: {
        ctx.fillStyle = C.dark;
        ctx.fillRect(sx, sy, 16, 16);
        ctx.fillStyle = C.mid;
        ctx.fillRect(sx + 2, sy + 2, 12, 12);
        ctx.fillStyle = C.light;
        ctx.fillRect(sx + 5, sy + 4, 2, 2);
        ctx.fillRect(sx + 9, sy + 8, 2, 2);
        ctx.fillRect(sx + 7, sy + 11, 2, 2);
        // trunk hint
        ctx.fillStyle = '#5a3018';
        ctx.fillRect(sx + 7, sy + 14, 2, 2);
        break;
      }
      case T_WATER: {
        ctx.fillStyle = '#3a89c9';
        ctx.fillRect(sx, sy, 16, 16);
        ctx.fillStyle = '#7be4ff';
        const w = ((time * 0.05 + x * 4 + y * 2) % 16) | 0;
        ctx.fillRect(sx + w, sy + 4, 4, 1);
        ctx.fillRect(sx + ((w + 8) % 16), sy + 11, 4, 1);
        break;
      }
      case T_FLOWER: {
        ctx.fillStyle = C.light;
        ctx.fillRect(sx, sy, 16, 16);
        ctx.fillStyle = '#ff5ea1';
        ctx.fillRect(sx + 6, sy + 6, 2, 2);
        ctx.fillRect(sx + 4, sy + 8, 2, 2);
        ctx.fillRect(sx + 8, sy + 8, 2, 2);
        ctx.fillRect(sx + 6, sy + 10, 2, 2);
        ctx.fillStyle = '#ffce4a';
        ctx.fillRect(sx + 6, sy + 8, 2, 2);
        break;
      }
      case T_ROCK: {
        ctx.fillStyle = C.bone;
        ctx.fillRect(sx, sy, 16, 16);
        ctx.fillStyle = '#5a4d3f';
        ctx.fillRect(sx + 2, sy + 5, 12, 8);
        ctx.fillStyle = '#7e6e5c';
        ctx.fillRect(sx + 3, sy + 4, 10, 4);
        break;
      }
      case T_SIGN: {
        // sign = grass under post
        ctx.fillStyle = C.light;
        ctx.fillRect(sx, sy, 16, 16);
        ctx.fillStyle = '#5a3018';
        ctx.fillRect(sx + 7, sy + 8, 2, 6);
        ctx.fillStyle = '#caa867';
        ctx.fillRect(sx + 3, sy + 3, 10, 6);
        ctx.fillStyle = '#1a0d05';
        ctx.fillRect(sx + 5, sy + 5, 2, 1);
        ctx.fillRect(sx + 9, sy + 5, 2, 1);
        break;
      }
      case T_BUILDING: {
        ctx.fillStyle = '#a02828';
        ctx.fillRect(sx, sy, 16, 16);
        ctx.fillStyle = '#cadc9f';
        ctx.fillRect(sx + 2, sy + 2, 4, 4);
        ctx.fillRect(sx + 10, sy + 2, 4, 4);
        ctx.fillStyle = '#1a0d05';
        ctx.fillRect(sx + 6, sy + 8, 4, 8);
        ctx.fillStyle = '#3a3025';
        ctx.fillRect(sx, sy, 16, 1);
        break;
      }
      default: {
        ctx.fillStyle = C.light;
        ctx.fillRect(sx, sy, 16, 16);
      }
    }
  }
  function drawMap(time) {
    const x0 = Math.max(0, Math.floor(state.cameraX / 16));
    const y0 = Math.max(0, Math.floor(state.cameraY / 16));
    const x1 = Math.min(MAP_W - 1, Math.floor((state.cameraX + VW) / 16));
    const y1 = Math.min(MAP_H - 1, Math.floor((state.cameraY + VH) / 16));
    for (let y = y0; y <= y1; y++) {
      for (let x = x0; x <= x1; x++) {
        drawTile(x, y, MAP[y][x], time);
      }
    }
  }
  function drawPlayer(time) {
    const sx = Math.round(player.px - state.cameraX);
    const sy = Math.round(player.py - state.cameraY);
    const fr = (Math.floor(player.walkAnim / 7) % 2);  // alternate every 7 frames
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.25)';
    ctx.fillRect(sx + 3, sy + 13, 10, 2);
    // body (red shirt, blue jeans, fair skin) — Pokemon-Red style
    // head
    ctx.fillStyle = '#f5c891';
    ctx.fillRect(sx + 4, sy + 1, 8, 6);
    // hat
    ctx.fillStyle = '#e64545';
    ctx.fillRect(sx + 3, sy + 0, 10, 3);
    ctx.fillStyle = '#aa1818';
    ctx.fillRect(sx + 3, sy + 2, 10, 1);
    // eyes (depend on facing)
    ctx.fillStyle = '#0a0a0a';
    if (player.facing === 'down') {
      ctx.fillRect(sx + 5, sy + 4, 1, 2);
      ctx.fillRect(sx + 10, sy + 4, 1, 2);
    } else if (player.facing === 'up') {
      // back of head — just hat, no eyes
    } else if (player.facing === 'left') {
      ctx.fillRect(sx + 5, sy + 4, 1, 2);
    } else {
      ctx.fillRect(sx + 10, sy + 4, 1, 2);
    }
    // body (red shirt)
    ctx.fillStyle = '#e64545';
    ctx.fillRect(sx + 3, sy + 7, 10, 4);
    // arms
    ctx.fillStyle = '#f5c891';
    ctx.fillRect(sx + 2, sy + 8, 1, 2);
    ctx.fillRect(sx + 13, sy + 8, 1, 2);
    // legs (jeans)
    ctx.fillStyle = '#1d3a8c';
    if (fr === 0 || !player.walking) {
      ctx.fillRect(sx + 4, sy + 11, 3, 4);
      ctx.fillRect(sx + 9, sy + 11, 3, 4);
    } else {
      // walking pose: legs offset
      ctx.fillRect(sx + 3, sy + 11, 3, 4);
      ctx.fillRect(sx + 10, sy + 11, 3, 4);
    }
    // shoes
    ctx.fillStyle = '#0a0a0a';
    if (fr === 0 || !player.walking) {
      ctx.fillRect(sx + 4, sy + 14, 3, 1);
      ctx.fillRect(sx + 9, sy + 14, 3, 1);
    } else {
      ctx.fillRect(sx + 3, sy + 14, 3, 1);
      ctx.fillRect(sx + 10, sy + 14, 3, 1);
    }
  }

  // === BATTLE ===
  function startBattle(wild) {
    state.mode = 'battle';
    state.battle = {
      wild,
      menu: ['FIGHT', 'CATCH', 'RUN'],
      cursor: 0,
      msg: ['A wild', wild.name + ' L' + wild.level, 'appeared!'],
      msgIdx: 0,
      msgWaiting: true,
      phase: 'intro',     // intro -> menu -> action -> result -> menu / end
      shake: 0,
      catchProgress: 0,
      catchOutcome: null,
    };
    encounterSfx();
  }
  function endBattle(message) {
    state.battle.msg = message;
    state.battle.msgIdx = 0;
    state.battle.msgWaiting = true;
    state.battle.phase = 'end';
  }

  function tickBattle() {
    if (state.mode !== 'battle' || !state.battle) return;
    const b = state.battle;
    if (b.shake > 0) b.shake -= 0.6;
    if (b.phase === 'intro') {
      if (actionPressed) { b.phase = 'menu'; b.msg = ['What will you do?']; b.msgWaiting = false; }
    } else if (b.phase === 'menu') {
      if (keys['ArrowUp'] || keys['KeyW'])     { keys['ArrowUp']=keys['KeyW']=false; b.cursor = (b.cursor + b.menu.length - 1) % b.menu.length; menuMoveSfx(); }
      if (keys['ArrowDown'] || keys['KeyS']) { keys['ArrowDown']=keys['KeyS']=false; b.cursor = (b.cursor + 1) % b.menu.length; menuMoveSfx(); }
      if (actionPressed) {
        const choice = b.menu[b.cursor];
        if (choice === 'FIGHT') doFight();
        else if (choice === 'CATCH') doCatch();
        else if (choice === 'RUN') doRun();
      }
    } else if (b.phase === 'result') {
      if (actionPressed) {
        if (b.wild.hp <= 0) {
          endBattle([b.wild.name, 'fled into the', 'tall grass.']);
        } else if (b.catchOutcome === 'success') {
          state.team.push({ id: b.wild.id, name: b.wild.name, maxHp: b.wild.maxHp, hp: b.wild.hp, level: b.wild.level });
          updateTeamUI();
          endBattle(['Caught', b.wild.name + '!']);
        } else if (b.catchOutcome === 'flee') {
          endBattle(['You ran away.']);
        } else {
          // wild attack
          const dmg = b.wild.atk[0] + Math.floor(Math.random() * (b.wild.atk[1] - b.wild.atk[0] + 1));
          // player has no HP — flavor only
          b.msg = [b.wild.name, 'lashes out!', '— ' + dmg + ' dmg —'];
          b.msgIdx = 0; b.msgWaiting = true; b.phase = 'wild-hit';
          b.shake = 8;
          hitSfx();
        }
      }
    } else if (b.phase === 'wild-hit') {
      if (actionPressed) { b.phase = 'menu'; b.msg = ['What will you do?']; b.msgWaiting = false; }
    } else if (b.phase === 'end') {
      if (actionPressed) {
        state.mode = 'walk';
        state.battle = null;
      }
    }
    actionPressed = false; backPressed = false;
  }

  function doFight() {
    const b = state.battle;
    const dmg = 4 + Math.floor(Math.random() * 6);
    b.wild.hp = Math.max(0, b.wild.hp - dmg);
    b.shake = 6;
    b.msg = ['You strike for', dmg + ' dmg!'];
    b.msgIdx = 0; b.msgWaiting = true;
    b.phase = 'result';
    b.catchOutcome = null;
    hitSfx();
  }
  function doCatch() {
    const b = state.battle;
    // catch chance scales inversely with HP %
    const hpPct = b.wild.hp / b.wild.maxHp;
    const chance = Math.max(0.12, 1 - hpPct * 0.85);
    const ok = Math.random() < chance;
    if (ok) {
      b.wild.hp = 0;
      b.catchOutcome = 'success';
      b.msg = ['Sloppy ball', 'shakes…', 'CLICK!'];
      catchSfx(true);
    } else {
      b.catchOutcome = null;
      b.msg = ['Sloppy ball', 'shakes…', b.wild.name + ' broke free!'];
      catchSfx(false);
    }
    b.msgIdx = 0; b.msgWaiting = true;
    b.phase = 'result';
  }
  function doRun() {
    const b = state.battle;
    b.catchOutcome = 'flee';
    b.msg = ['You bolt for', 'the path…'];
    b.msgIdx = 0; b.msgWaiting = true;
    b.phase = 'result';
  }

  // === BATTLE RENDER ===
  function drawBattle(time) {
    const b = state.battle;
    if (!b) return;
    // shake
    const sh = b.shake > 0 ? Math.round((Math.random() - 0.5) * b.shake) : 0;
    ctx.save();
    ctx.translate(sh, 0);
    // bg
    ctx.fillStyle = C.paper;
    ctx.fillRect(0, 0, VW, VH);
    // top half: wild mon platform + wild mon
    ctx.fillStyle = C.bone;
    ctx.beginPath();
    ctx.ellipse(VW * 0.72, 100, 60, 18, 0, 0, Math.PI * 2);
    ctx.fill();
    // wild mon sprite
    drawMon(b.wild.id, VW * 0.72 - 16, 70, 1, time);
    // wild mon HP box
    drawHpBox(20, 30, b.wild.name, b.wild.level, b.wild.hp, b.wild.maxHp);
    // bottom half: player mon platform — placeholder silhouette of "you" the trainer
    ctx.fillStyle = C.bone;
    ctx.beginPath();
    ctx.ellipse(VW * 0.28, 200, 60, 18, 0, 0, Math.PI * 2);
    ctx.fill();
    // big silhouette
    ctx.fillStyle = C.dark;
    ctx.fillRect(VW * 0.28 - 18, 152, 36, 48);
    ctx.fillRect(VW * 0.28 - 12, 144, 24, 12);   // head
    ctx.fillStyle = '#e64545';
    ctx.fillRect(VW * 0.28 - 14, 142, 28, 5);    // hat
    // dialog/menu box
    ctx.fillStyle = C.pure;
    ctx.fillRect(0, VH - 80, VW, 80);
    ctx.fillStyle = C.dark;
    ctx.fillRect(0, VH - 80, VW, 2);
    // text
    if (b.phase === 'menu') {
      drawText('What will you do?', 14, VH - 60);
      // 3-option menu in a sub-box on the right
      ctx.fillStyle = C.pure;
      ctx.fillRect(VW - 140, VH - 70, 130, 60);
      ctx.fillStyle = C.dark;
      ctx.fillRect(VW - 140, VH - 70, 130, 1);
      for (let i = 0; i < b.menu.length; i++) {
        drawText(b.menu[i], VW - 110, VH - 56 + i * 16);
        if (b.cursor === i) drawText('▸', VW - 130, VH - 56 + i * 16);
      }
    } else {
      drawTextBlock(b.msg, 14, VH - 64);
      drawText('▼', VW - 24, VH - 18);
    }
    ctx.restore();
  }
  function drawText(str, x, y) {
    ctx.fillStyle = C.dark;
    ctx.font = 'bold 12px "Press Start 2P", monospace';
    ctx.fillText(str, x, y);
  }
  function drawTextBlock(lines, x, y) {
    for (let i = 0; i < lines.length; i++) drawText(lines[i], x, y + i * 14);
  }
  function drawHpBox(x, y, name, level, hp, maxHp) {
    ctx.fillStyle = C.pure;
    ctx.fillRect(x, y, 130, 32);
    ctx.fillStyle = C.dark;
    ctx.fillRect(x, y, 130, 2);
    ctx.font = 'bold 10px "Press Start 2P", monospace';
    ctx.fillText(name, x + 6, y + 12);
    ctx.fillText('L' + level, x + 105, y + 12);
    // hp bar
    ctx.fillStyle = C.dark;
    ctx.fillRect(x + 6, y + 18, 100, 4);
    const pct = Math.max(0, hp / maxHp);
    ctx.fillStyle = pct > 0.5 ? '#3eb98a' : (pct > 0.2 ? '#ffce4a' : '#e64545');
    ctx.fillRect(x + 7, y + 19, Math.floor(98 * pct), 2);
    ctx.fillStyle = C.dark;
    ctx.font = 'bold 8px "Press Start 2P", monospace';
    ctx.fillText(hp + '/' + maxHp, x + 80, y + 30);
  }

  // === SLOPPYMON SPRITES (24x24, drawn procedurally) ===
  function drawMon(id, x, y, scale, time) {
    const mon = ROSTER.find(m => m.id === id);
    if (!mon) return;
    ctx.save();
    ctx.translate(x, y);
    ctx.scale(scale, scale);
    ctx.imageSmoothingEnabled = false;
    const bob = Math.sin(time * 0.005) * 1;
    if (mon.face === 'mud') {
      ctx.fillStyle = mon.colorA;
      ctx.fillRect(2, 8 + bob, 28, 14);
      ctx.fillRect(4, 6 + bob, 24, 4);
      ctx.fillStyle = mon.colorB;
      ctx.fillRect(6, 10 + bob, 4, 4);
      ctx.fillRect(20, 10 + bob, 4, 4);
      ctx.fillStyle = '#000';
      ctx.fillRect(7, 11 + bob, 2, 2);
      ctx.fillRect(21, 11 + bob, 2, 2);
      ctx.fillStyle = '#5a3a14';
      ctx.fillRect(12, 17 + bob, 6, 1);
      // drips
      ctx.fillStyle = mon.colorA;
      ctx.fillRect(8, 22 + bob, 2, 2);
      ctx.fillRect(22, 22 + bob, 2, 2);
    } else if (mon.face === 'duck') {
      // body
      ctx.fillStyle = mon.colorA;
      ctx.fillRect(4, 10 + bob, 22, 12);
      // head
      ctx.fillRect(8, 4 + bob, 14, 8);
      // beak
      ctx.fillStyle = mon.colorB;
      ctx.fillRect(20, 8 + bob, 6, 3);
      // eye
      ctx.fillStyle = '#fff';
      ctx.fillRect(15, 6 + bob, 3, 3);
      ctx.fillStyle = '#000';
      ctx.fillRect(16, 7 + bob, 1, 1);
      // feet
      ctx.fillStyle = mon.colorB;
      ctx.fillRect(8, 22 + bob, 4, 2);
      ctx.fillRect(18, 22 + bob, 4, 2);
      // moisture drips
      ctx.fillStyle = '#7be4ff';
      ctx.fillRect(6, 22 + bob, 2, 2);
    } else if (mon.face === 'garb') {
      // garbage bag bulge
      ctx.fillStyle = mon.colorA;
      ctx.fillRect(4, 6 + bob, 24, 18);
      ctx.fillStyle = mon.colorB;
      ctx.fillRect(6, 4 + bob, 4, 6);
      ctx.fillRect(22, 4 + bob, 4, 6);
      // eyes
      ctx.fillStyle = '#ffce4a';
      ctx.fillRect(10, 12 + bob, 3, 4);
      ctx.fillRect(20, 12 + bob, 3, 4);
      ctx.fillStyle = '#000';
      ctx.fillRect(11, 13 + bob, 1, 2);
      ctx.fillRect(21, 13 + bob, 1, 2);
      // mouth (jagged)
      ctx.fillStyle = '#fff';
      ctx.fillRect(13, 18 + bob, 2, 2);
      ctx.fillRect(17, 18 + bob, 2, 2);
      // banana peel
      ctx.fillStyle = '#fff04b';
      ctx.fillRect(2, 4 + bob, 5, 1);
      ctx.fillRect(2, 5 + bob, 1, 4);
    } else if (mon.face === 'rat') {
      // body
      ctx.fillStyle = mon.colorA;
      ctx.fillRect(4, 14 + bob, 20, 8);
      // head
      ctx.fillRect(18, 10 + bob, 8, 8);
      // ears
      ctx.fillStyle = mon.colorB;
      ctx.fillRect(20, 8 + bob, 3, 3);
      ctx.fillRect(24, 8 + bob, 2, 2);
      // eye
      ctx.fillStyle = '#fff';
      ctx.fillRect(22, 12 + bob, 2, 2);
      ctx.fillStyle = '#000';
      ctx.fillRect(22, 12 + bob, 1, 1);
      // tail
      ctx.fillStyle = mon.colorA;
      ctx.fillRect(0, 18 + bob, 4, 2);
      ctx.fillRect(2, 16 + bob, 4, 2);
      // feet
      ctx.fillRect(6, 22 + bob, 3, 2);
      ctx.fillRect(16, 22 + bob, 3, 2);
    } else if (mon.face === 'crow') {
      // body
      ctx.fillStyle = mon.colorA;
      ctx.fillRect(8, 8 + bob, 14, 16);
      ctx.fillRect(6, 12 + bob, 18, 8);
      // wing
      ctx.fillStyle = mon.colorB;
      ctx.fillRect(10, 14 + bob, 8, 4);
      // beak
      ctx.fillStyle = '#ffce4a';
      ctx.fillRect(20, 12 + bob, 4, 2);
      // eye
      ctx.fillStyle = '#ffce4a';
      ctx.fillRect(16, 10 + bob, 2, 2);
      ctx.fillStyle = '#000';
      ctx.fillRect(16, 10 + bob, 1, 1);
      // feet
      ctx.fillStyle = '#ffce4a';
      ctx.fillRect(10, 22 + bob, 2, 2);
      ctx.fillRect(16, 22 + bob, 2, 2);
    } else if (mon.face === 'mite') {
      // glitchy 3-frame jitter
      const jit = (Math.random() < 0.4) ? 2 : 0;
      ctx.fillStyle = mon.colorA;
      ctx.fillRect(8 + jit, 8 + bob, 16, 14);
      ctx.fillStyle = mon.colorB;
      ctx.fillRect(6, 10 + bob, 20, 8);
      // eyes (chromatic split)
      ctx.fillStyle = '#fff';
      ctx.fillRect(11, 12 + bob, 2, 3);
      ctx.fillRect(20, 12 + bob, 2, 3);
      ctx.fillStyle = '#000';
      ctx.fillRect(11, 13 + bob, 1, 1);
      ctx.fillRect(20, 13 + bob, 1, 1);
      // legs
      ctx.fillStyle = mon.colorA;
      ctx.fillRect(7, 22 + bob, 2, 3);
      ctx.fillRect(11, 22 + bob, 2, 3);
      ctx.fillRect(19, 22 + bob, 2, 3);
      ctx.fillRect(23, 22 + bob, 2, 3);
      // glitch artifacts
      if (Math.random() < 0.3) {
        ctx.fillStyle = '#ff5ea1';
        ctx.fillRect(0, 6 + bob + jit, 32, 1);
      }
      if (Math.random() < 0.2) {
        ctx.fillStyle = '#7be4ff';
        ctx.fillRect(0, 19 + bob, 32, 1);
      }
    }
    ctx.restore();
  }

  // === team ui ===
  function updateTeamUI() {
    const root = document.getElementById('team');
    const slots = [];
    for (let i = 0; i < 6; i++) {
      const m = state.team[i];
      if (m) {
        slots.push(`<div class="slot"><span class="ico">${monIcon(m.id)}</span>${m.name}<span class="hp">L${m.level}</span></div>`);
      } else {
        slots.push('<div class="slot empty">—</div>');
      }
    }
    root.innerHTML = slots.join('');
  }
  function monIcon(id) { return ({mudslime:'🟫',sloppyduck:'🦆',garbager:'🗑',ratrash:'🐀',crowver:'🐦',glitchmite:'🪲'})[id] || '◇'; }

  // === audio ===
  let audioCtx = null, master = null;
  function audio() { if (!audioCtx) { audioCtx = new (window.AudioContext||window.webkitAudioContext)(); master = audioCtx.createGain(); master.gain.value = 0.25; master.connect(audioCtx.destination);} if (audioCtx.state==='suspended') audioCtx.resume(); return audioCtx; }
  function bumpSfx() { audio(); const t = audioCtx.currentTime; const o = audioCtx.createOscillator(); o.type='square'; o.frequency.setValueAtTime(120, t); o.frequency.exponentialRampToValueAtTime(60, t+0.06); const g = audioCtx.createGain(); g.gain.setValueAtTime(0.001, t); g.gain.exponentialRampToValueAtTime(0.08, t+0.005); g.gain.exponentialRampToValueAtTime(0.0001, t+0.07); o.connect(g); g.connect(master); o.start(t); o.stop(t+0.08);}
  function encounterSfx() { audio(); const t = audioCtx.currentTime;
    [220, 330, 440, 660, 880, 660, 440].forEach((f, i) => {
      const o = audioCtx.createOscillator(); o.type='square';
      o.frequency.setValueAtTime(f, t + i*0.06);
      const g = audioCtx.createGain(); g.gain.setValueAtTime(0.001, t+i*0.06); g.gain.exponentialRampToValueAtTime(0.1, t+0.005+i*0.06); g.gain.exponentialRampToValueAtTime(0.0001, t+0.08+i*0.06);
      o.connect(g); g.connect(master); o.start(t+i*0.06); o.stop(t+0.1+i*0.06);
    });
  }
  function menuMoveSfx() { audio(); const t = audioCtx.currentTime; const o=audioCtx.createOscillator(); o.type='square'; o.frequency.setValueAtTime(700, t); const g=audioCtx.createGain(); g.gain.setValueAtTime(0.001, t); g.gain.exponentialRampToValueAtTime(0.04, t+0.005); g.gain.exponentialRampToValueAtTime(0.0001, t+0.04); o.connect(g); g.connect(master); o.start(t); o.stop(t+0.05);}
  function hitSfx() { audio(); const t = audioCtx.currentTime; const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.15, audioCtx.sampleRate); const d=buf.getChannelData(0); for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1)*Math.pow(1 - i/d.length, 1.4); const src = audioCtx.createBufferSource(); src.buffer = buf; const lp = audioCtx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value = 1200; const ng = audioCtx.createGain(); ng.gain.setValueAtTime(0.4, t); ng.gain.exponentialRampToValueAtTime(0.0001, t+0.16); src.connect(lp); lp.connect(ng); ng.connect(master); src.start(t);}
  function catchSfx(success) { audio(); const t = audioCtx.currentTime;
    const seq = success ? [440, 550, 660, 880] : [600, 500, 400];
    seq.forEach((f, i) => {
      const o = audioCtx.createOscillator(); o.type='square';
      o.frequency.setValueAtTime(f, t + i*0.12);
      const g = audioCtx.createGain(); g.gain.setValueAtTime(0.001, t+i*0.12); g.gain.exponentialRampToValueAtTime(0.08, t+0.005+i*0.12); g.gain.exponentialRampToValueAtTime(0.0001, t+0.14+i*0.12);
      o.connect(g); g.connect(master); o.start(t+i*0.12); o.stop(t+0.16+i*0.12);
    });
  }

  // === main loop ===
  function loop(time) {
    if (state.mode === 'walk') {
      tickMovement();
      updateCamera();
      drawMap(time);
      drawPlayer(time);
    } else if (state.mode === 'battle') {
      tickBattle();
      drawBattle(time);
    }
    requestAnimationFrame(loop);
  }
  updateTeamUI();
  requestAnimationFrame(loop);
})();
</script>
