<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pixel War</title>
<link rel="icon" href="https://emojicdn.elk.sh/⚔️">
<meta property="og:title" content="Pixel War">
<meta property="og:description" content="A persistent pixel battle arena. Place colored pixels. Defend your territory. Conquer the grid.">
<meta property="og:url" content="https://sloppy.live/pixel-war">
<meta property="og:image" content="https://sloppy.live/pixel-war/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a14;
  --panel:rgba(20,20,32,0.85);
  --border:rgba(255,255,255,0.08);
  --accent:#ff0066;
  --text:#e0e0e0;
  --muted:#666;
}
body{background:var(--bg);min-height:100vh;font-family:'Share Tech Mono',monospace;color:var(--text);overflow:hidden;touch-action:none}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(circle at 30% 20%,rgba(255,0,102,0.06),transparent 50%),radial-gradient(circle at 70% 80%,rgba(0,200,255,0.05),transparent 50%);pointer-events:none;z-index:0}

.title{position:fixed;top:10px;left:14px;z-index:10;font-family:'Press Start 2P',monospace;font-size:14px;color:var(--accent);text-shadow:0 0 10px rgba(255,0,102,0.5),2px 2px 0 #000;letter-spacing:1px;pointer-events:none}
.subtitle{position:fixed;top:32px;left:14px;z-index:10;font-size:10px;color:var(--muted);pointer-events:none}

.canvas-wrap{position:fixed;inset:60px 14px 130px 14px;display:flex;align-items:center;justify-content:center;z-index:1}
.grid-frame{position:relative;border:2px solid #2a2a44;background:#000;box-shadow:0 0 0 1px #000,0 0 30px rgba(255,0,102,0.15),inset 0 0 60px rgba(0,0,0,0.8);max-width:100%;max-height:100%}
canvas{display:block;image-rendering:pixelated;cursor:crosshair;touch-action:none}

.toolbar{position:fixed;bottom:14px;left:14px;right:14px;z-index:10;background:var(--panel);backdrop-filter:blur(8px);border:1px solid var(--border);border-radius:8px;padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.palette{display:flex;gap:5px;flex-wrap:wrap;justify-content:center}
.swatch{width:28px;height:28px;border:2px solid rgba(255,255,255,0.1);border-radius:4px;cursor:pointer;transition:all 0.12s;-webkit-tap-highlight-color:transparent}
.swatch:hover{transform:scale(1.1)}
.swatch.active{border-color:#fff;box-shadow:0 0 0 2px #000,0 0 12px currentColor;transform:scale(1.15)}

.bar{display:flex;justify-content:space-between;align-items:center;font-size:11px;gap:10px}
.bar .stats{display:flex;gap:14px;color:var(--muted)}
.bar .stats span b{color:var(--text)}
.cooldown{color:var(--accent);font-weight:bold;min-width:60px;text-align:right}
.cooldown.ready{color:#00ff66}

.coords{position:fixed;top:60px;right:14px;z-index:10;background:var(--panel);border:1px solid var(--border);border-radius:6px;padding:6px 10px;font-size:11px;color:var(--muted);font-family:'Share Tech Mono',monospace}
.coords b{color:var(--text)}

.status-msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:50;background:rgba(0,0,0,0.95);border:2px solid var(--accent);border-radius:8px;padding:24px 32px;text-align:center;font-family:'Press Start 2P',monospace;font-size:11px;color:var(--text);max-width:90vw;display:none;line-height:1.8}
.status-msg.show{display:block}
.status-msg .title-row{color:var(--accent);font-size:14px;margin-bottom:14px}
.status-msg .sub{font-family:'Share Tech Mono',monospace;font-size:13px;color:var(--muted);margin-top:10px;line-height:1.5}

.flash{position:fixed;pointer-events:none;width:8px;height:8px;border-radius:50%;z-index:5;animation:flash 0.6s ease-out forwards}
@keyframes flash{0%{transform:translate(-50%,-50%) scale(1);opacity:1;box-shadow:0 0 4px currentColor}100%{transform:translate(-50%,-50%) scale(8);opacity:0;box-shadow:0 0 30px currentColor}}

@media(max-width:480px){
  .title{font-size:11px}
  .swatch{width:24px;height:24px}
  .canvas-wrap{inset:54px 8px 150px 8px}
  .toolbar{left:8px;right:8px}
}
</style>
</head>
<body>
<div class="title">PIXEL WAR</div>
<div class="subtitle">place. defend. conquer.</div>

<div class="coords" id="coords">x:— y:—</div>

<div class="canvas-wrap">
<div class="grid-frame">
<canvas id="c"></canvas>
</div>
</div>

<div class="toolbar">
<div class="palette" id="palette"></div>
<div class="bar">
<div class="stats">
<span>pixels: <b id="pxCount">0</b></span>
<span>yours: <b id="myCount">0</b></span>
</div>
<div class="cooldown ready" id="cooldown">READY</div>
</div>
</div>

<div class="status-msg" id="statusMsg"></div>

<script type="module">
import { createBrowserClient } from "https://cdn.jsdelivr.net/npm/@supabase/ssr@0.7.0/+esm";

const SUPABASE_URL = 'https://yjyxteqzhhmtrgcaekgz.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlqeXh0ZXF6aGhtdHJnY2Fla2d6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTczNTg3NDIsImV4cCI6MjA3MjkzNDc0Mn0.G8SRde7IN2QFW1EnASM8IS32IUYR2eenCCjdDdioiBU';

const supabase = createBrowserClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  cookieOptions: { name: 'sb-auth-token', path: '/', sameSite: 'lax' }
});

// Grid config
const GRID_W = 64;
const GRID_H = 64;
const PIXEL_SIZE = 12; // display size per cell
const COOLDOWN_MS = 3000;

const PALETTE = [
  '#000000','#ffffff','#888888',
  '#ff0044','#ff6600','#ffcc00',
  '#00ff44','#00ffaa','#00ccff',
  '#0066ff','#aa00ff','#ff00aa',
  '#88ff00','#ff4488','#aa6633'
];

let selectedColor = PALETTE[3];
let pixels = new Map(); // "x,y" -> color
let myUserId = null;
let myCount = 0;
let lastPlaced = 0;
let dbAvailable = false;

const c = document.getElementById('c');
const ctx = c.getContext('2d');
const coordsEl = document.getElementById('coords');
const pxCountEl = document.getElementById('pxCount');
const myCountEl = document.getElementById('myCount');
const cooldownEl = document.getElementById('cooldown');
const statusEl = document.getElementById('statusMsg');

function fitCanvas(){
  const wrap = document.querySelector('.canvas-wrap');
  const maxW = wrap.clientWidth - 8;
  const maxH = wrap.clientHeight - 8;
  const cellW = Math.floor(maxW / GRID_W);
  const cellH = Math.floor(maxH / GRID_H);
  const cell = Math.max(4, Math.min(cellW, cellH, 14));
  c.width = GRID_W * cell;
  c.height = GRID_H * cell;
  c.dataset.cell = cell;
  draw();
}
window.addEventListener('resize', fitCanvas);

function draw(){
  const cell = parseInt(c.dataset.cell || PIXEL_SIZE);
  // Background grid
  ctx.fillStyle = '#0a0a14';
  ctx.fillRect(0,0,c.width,c.height);

  // Subtle grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for(let i=0;i<=GRID_W;i++){
    ctx.beginPath();ctx.moveTo(i*cell,0);ctx.lineTo(i*cell,c.height);ctx.stroke();
  }
  for(let i=0;i<=GRID_H;i++){
    ctx.beginPath();ctx.moveTo(0,i*cell);ctx.lineTo(c.width,i*cell);ctx.stroke();
  }

  // Pixels
  for(const [key,color] of pixels){
    const [x,y] = key.split(',').map(Number);
    ctx.fillStyle = color;
    ctx.fillRect(x*cell, y*cell, cell, cell);
  }
}

function buildPalette(){
  const el = document.getElementById('palette');
  PALETTE.forEach((col,i)=>{
    const sw = document.createElement('div');
    sw.className = 'swatch' + (col===selectedColor?' active':'');
    sw.style.background = col;
    sw.style.color = col;
    sw.addEventListener('click',()=>{
      selectedColor = col;
      document.querySelectorAll('.swatch').forEach(s=>s.classList.remove('active'));
      sw.classList.add('active');
    });
    el.appendChild(sw);
  });
}

function getCellFromEvent(e){
  const rect = c.getBoundingClientRect();
  const cell = parseInt(c.dataset.cell || PIXEL_SIZE);
  const px = (e.clientX || (e.touches && e.touches[0] && e.touches[0].clientX) || 0) - rect.left;
  const py = (e.clientY || (e.touches && e.touches[0] && e.touches[0].clientY) || 0) - rect.top;
  const x = Math.floor(px * c.width / rect.width / cell);
  const y = Math.floor(py * c.height / rect.height / cell);
  if(x<0||y<0||x>=GRID_W||y>=GRID_H) return null;
  return {x,y};
}

c.addEventListener('mousemove',e=>{
  const cell = getCellFromEvent(e);
  if(cell) coordsEl.innerHTML = `x:<b>${cell.x}</b> y:<b>${cell.y}</b>`;
});

async function placePixel(x,y){
  const now = Date.now();
  if(now - lastPlaced < COOLDOWN_MS){
    return;
  }
  if(!dbAvailable){
    showStatus('SETUP REQUIRED', 'The pixel_war_grid table needs to be created in Supabase. See schema.sql in this app folder.');
    return;
  }
  if(!myUserId){
    return;
  }

  // Optimistic
  const key = `${x},${y}`;
  const prev = pixels.get(key);
  pixels.set(key, selectedColor);
  draw();
  flashAt(x,y,selectedColor);
  lastPlaced = now;
  updateCooldown();

  const { error } = await supabase
    .from('pixel_war_grid')
    .upsert({
      x: x,
      y: y,
      color: selectedColor,
      user_id: myUserId
    }, { onConflict: 'x,y' });

  if(error){
    console.error('Place error:', error);
    if(prev !== undefined) pixels.set(key, prev);
    else pixels.delete(key);
    draw();
    if(error.code === 'PGRST205' || error.message.includes('not find')){
      dbAvailable = false;
      showStatus('SETUP REQUIRED', 'The pixel_war_grid table needs to be created. The schema is in /pixel-war/schema.sql.');
    }
  } else {
    myCount++;
    myCountEl.textContent = myCount;
    pxCountEl.textContent = pixels.size;
  }
}

function flashAt(x,y,color){
  const cell = parseInt(c.dataset.cell || PIXEL_SIZE);
  const rect = c.getBoundingClientRect();
  const f = document.createElement('div');
  f.className = 'flash';
  f.style.color = color;
  f.style.background = color;
  f.style.left = (rect.left + (x+0.5)*cell*(rect.width/c.width)) + 'px';
  f.style.top = (rect.top + (y+0.5)*cell*(rect.height/c.height)) + 'px';
  document.body.appendChild(f);
  setTimeout(()=>f.remove(), 600);
}

function updateCooldown(){
  const tick = () => {
    const remain = COOLDOWN_MS - (Date.now() - lastPlaced);
    if(remain <= 0){
      cooldownEl.textContent = 'READY';
      cooldownEl.classList.add('ready');
      return;
    }
    cooldownEl.textContent = (remain/1000).toFixed(1)+'s';
    cooldownEl.classList.remove('ready');
    requestAnimationFrame(tick);
  };
  tick();
}

function handleClick(e){
  e.preventDefault();
  const cell = getCellFromEvent(e);
  if(cell) placePixel(cell.x, cell.y);
}
c.addEventListener('click', handleClick);
c.addEventListener('touchend', e=>{
  if(e.changedTouches && e.changedTouches[0]){
    const t = e.changedTouches[0];
    const fakeE = { clientX: t.clientX, clientY: t.clientY, preventDefault:()=>{} };
    handleClick(fakeE);
  }
  e.preventDefault();
}, {passive:false});

function showStatus(title, sub){
  statusEl.innerHTML = `<div class="title-row">${title}</div><div class="sub">${sub}</div>`;
  statusEl.classList.add('show');
  setTimeout(()=>statusEl.classList.remove('show'), 6000);
}

async function init(){
  buildPalette();
  fitCanvas();

  // Auth
  let { data: { session } } = await supabase.auth.getSession();
  if(!session){
    const { data, error } = await supabase.auth.signInAnonymously();
    if(error){
      showStatus('AUTH FAILED', error.message);
      return;
    }
    session = data.session;
  }
  myUserId = session.user.id;

  // Load pixels
  const { data, error } = await supabase
    .from('pixel_war_grid')
    .select('x,y,color,user_id');

  if(error){
    console.error('Load error:', error);
    if(error.code === 'PGRST205' || error.message.includes('not find')){
      dbAvailable = false;
      showStatus('SETUP REQUIRED', 'The pixel_war_grid table needs to be created in Supabase before this app works. The schema is shipped at /pixel-war/schema.sql in the repo.');
      return;
    }
    showStatus('LOAD ERROR', error.message);
    return;
  }

  dbAvailable = true;
  for(const row of data){
    pixels.set(`${row.x},${row.y}`, row.color);
    if(row.user_id === myUserId) myCount++;
  }
  pxCountEl.textContent = pixels.size;
  myCountEl.textContent = myCount;
  draw();

  // Realtime subscription
  supabase
    .channel('pixel-war-grid')
    .on('postgres_changes', {
      event: '*',
      schema: 'public',
      table: 'pixel_war_grid'
    }, payload => {
      const row = payload.new;
      if(!row) return;
      pixels.set(`${row.x},${row.y}`, row.color);
      pxCountEl.textContent = pixels.size;
      draw();
    })
    .subscribe();
}

init().catch(err=>{
  console.error(err);
  showStatus('ERROR', err.message);
});
</script>
</body>
</html>
