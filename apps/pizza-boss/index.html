<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pizza Cutter Boss Fight</title>
<link rel="icon" href="https://emojicdn.elk.sh/🍕">
<meta property="og:title" content="Pizza Cutter Boss Fight">
<meta property="og:description" content="Wield the legendary pizza cutter sword against monstrous bosses. Slice or be sliced.">
<meta property="og:url" content="https://sloppy.live/pizza-boss/">
<meta property="og:image" content="https://sloppy.live/pizza-boss/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=DotGothic16&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#1a0a0a;font-family:'Silkscreen',cursive;image-rendering:pixelated}
canvas{display:block;width:100%;height:100%}
#start-screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;background:#1a0a0a}
#start-screen h1{font-size:clamp(2rem,7vw,4rem);color:#ff6b35;text-shadow:0 4px 0 #8b2500,0 0 30px rgba(255,107,53,.4);letter-spacing:.05em;margin-bottom:.1em}
#start-screen .sub{font-family:'DotGothic16',cursive;color:#ffcc00;font-size:clamp(.7rem,2vw,.95rem);margin-bottom:2em;opacity:.7}
#start-btn{font-family:'Silkscreen',cursive;font-size:clamp(.9rem,2.5vw,1.2rem);padding:.7em 2em;background:#ff6b35;border:none;color:#1a0a0a;cursor:pointer;letter-spacing:.1em;box-shadow:0 4px 0 #8b2500;transition:transform .1s}
#start-btn:active{transform:translateY(4px);box-shadow:none}
.controls{font-family:'DotGothic16',cursive;color:rgba(255,255,255,.25);font-size:.7rem;margin-top:1.5em;text-align:center;line-height:1.8}
#hud{position:fixed;top:0;left:0;right:0;padding:8px 12px;display:none;z-index:5;pointer-events:none}
.hp-row{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.hp-label{color:#aaa;font-size:11px;min-width:50px;text-align:right}
.hp-bar{flex:1;height:14px;background:#2a1515;border:2px solid #4a2020;position:relative;max-width:280px}
.hp-fill{height:100%;transition:width .3s}
.player-hp .hp-fill{background:linear-gradient(#5eff5e,#2a9d2a)}
.boss-hp .hp-fill{background:linear-gradient(#ff4444,#aa0000)}
.boss-name{color:#ff6b35;font-size:13px;text-align:center;margin-bottom:4px;text-shadow:0 0 8px rgba(255,107,53,.4)}
#wave-display{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:8;color:#ffcc00;font-size:clamp(1.5rem,5vw,3rem);text-shadow:0 0 20px rgba(255,204,0,.5);pointer-events:none;opacity:0;transition:opacity .3s}
#game-over{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:10;background:rgba(26,10,10,.9)}
#game-over h2{font-size:clamp(1.8rem,6vw,3rem);color:#ff4444;margin-bottom:.2em}
#game-over .result{font-family:'DotGothic16',cursive;color:#ffcc00;font-size:1rem;margin-bottom:1.5em}
#retry-btn{font-family:'Silkscreen',cursive;font-size:1rem;padding:.6em 1.8em;background:#ff6b35;border:none;color:#1a0a0a;cursor:pointer;box-shadow:0 4px 0 #8b2500}
#retry-btn:active{transform:translateY(4px);box-shadow:none}
#mobile-controls{position:fixed;bottom:0;left:0;right:0;display:none;z-index:6;padding:10px;pointer-events:none}
#mobile-controls button{pointer-events:all;font-family:'Silkscreen',cursive;font-size:18px;background:rgba(255,107,53,.2);border:2px solid rgba(255,107,53,.4);color:#ff6b35;border-radius:8px;width:56px;height:56px;cursor:pointer;-webkit-user-select:none;user-select:none}
.dpad{display:flex;flex-direction:column;align-items:center;gap:4px;position:absolute;bottom:20px;left:20px}
.dpad-row{display:flex;gap:4px}
.atk-btns{position:absolute;bottom:30px;right:20px;display:flex;gap:10px}
.atk-btns button{width:64px;height:64px;border-radius:50%;font-size:12px}
.back-link{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);z-index:20;color:rgba(255,255,255,.15);font-size:10px;text-decoration:none;font-family:'DotGothic16',cursive}
.back-link:hover{color:#ff6b35}
#chat-log{position:fixed;bottom:80px;left:12px;z-index:7;pointer-events:none;display:flex;flex-direction:column;gap:4px;max-width:280px}
.chat-msg{font-family:'DotGothic16',cursive;font-size:12px;padding:5px 10px;border-radius:4px;background:rgba(0,0,0,.7);border:1px solid rgba(255,204,0,.3);color:#ffcc00;animation:chatIn .3s ease-out,chatOut .5s ease-in forwards;animation-delay:0s,4s;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-msg.special{border-color:#ff6b35;color:#ff6b35;font-family:'Silkscreen',cursive;font-size:13px;animation-delay:0s,6s;text-shadow:0 0 8px rgba(255,107,53,.4)}
.chat-msg .who{color:#5eff5e;margin-right:4px}
.chat-msg.special .who{color:#ffcc00}
@keyframes chatIn{from{opacity:0;transform:translateX(-20px)}to{opacity:1;transform:translateX(0)}}
@keyframes chatOut{from{opacity:1}to{opacity:0}}
@media(pointer:coarse){#mobile-controls{display:block}}
</style>
</head>
<body>

<div id="start-screen">
  <h1>PIZZA BOSS</h1>
  <div class="sub">Wield the Legendary Pizza Cutter</div>
  <button id="start-btn" onclick="startGame()">FIGHT</button>
  <div class="controls">WASD/Arrows: Move &middot; J/Space: Slash &middot; K/Shift: Spin Attack<br>Dodge bosses, time your slashes, survive.</div>
</div>

<div id="hud">
  <div class="boss-name" id="boss-name">MEATBALL GOLEM</div>
  <div class="hp-row boss-hp"><span class="hp-label">BOSS</span><div class="hp-bar"><div class="hp-fill" id="boss-hp-fill" style="width:100%"></div></div></div>
  <div class="hp-row player-hp"><span class="hp-label">YOU</span><div class="hp-bar"><div class="hp-fill" id="player-hp-fill" style="width:100%"></div></div></div>
</div>

<div id="wave-display"></div>

<div id="game-over">
  <h2 id="go-title">SLICED</h2>
  <div class="result" id="go-result"></div>
  <button id="retry-btn" onclick="startGame()">RETRY</button>
</div>

<div id="mobile-controls">
  <div class="dpad">
    <div class="dpad-row"><button id="btn-up">&#9650;</button></div>
    <div class="dpad-row"><button id="btn-left">&#9664;</button><button id="btn-down">&#9660;</button><button id="btn-right">&#9654;</button></div>
  </div>
  <div class="atk-btns">
    <button id="btn-slash">SLASH</button>
    <button id="btn-spin" style="background:rgba(255,204,0,.2);border-color:rgba(255,204,0,.4);color:#ffcc00">SPIN</button>
  </div>
</div>

<div id="chat-log"></div>
<canvas id="cv"></canvas>
<a class="back-link" href="https://sloppy.live">sloppy.live</a>

<script>
const CV=document.getElementById('cv');
const X=CV.getContext('2d');
X.imageSmoothingEnabled=false;

// Pixel scale
const PX=3;
let W,H,GW,GH;
function resize(){
  W=CV.width=window.innerWidth;
  H=CV.height=window.innerHeight;
  GW=Math.floor(W/PX);
  GH=Math.floor(H/PX);
}
resize();
window.addEventListener('resize',resize);

// --- INPUT ---
const keys={};
document.addEventListener('keydown',e=>{keys[e.key]=true;keys[e.code]=true;});
document.addEventListener('keyup',e=>{keys[e.key]=false;keys[e.code]=false;});

// Mobile
function setupMobileBtn(id,key){
  let el=document.getElementById(id);
  if(!el)return;
  el.addEventListener('touchstart',e=>{e.preventDefault();keys[key]=true;},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();keys[key]=false;},{passive:false});
  el.addEventListener('touchcancel',e=>{keys[key]=false;});
}
setupMobileBtn('btn-up','ArrowUp');
setupMobileBtn('btn-down','ArrowDown');
setupMobileBtn('btn-left','ArrowLeft');
setupMobileBtn('btn-right','ArrowRight');
setupMobileBtn('btn-slash','j');
setupMobileBtn('btn-spin','k');

// --- PIXEL DRAW HELPERS ---
function pxRect(x,y,w,h,color){
  X.fillStyle=color;
  X.fillRect(Math.floor(x)*PX,Math.floor(y)*PX,w*PX,h*PX);
}

function pxCircle(cx,cy,r,color){
  X.fillStyle=color;
  for(let dy=-r;dy<=r;dy++){
    for(let dx=-r;dx<=r;dx++){
      if(dx*dx+dy*dy<=r*r) X.fillRect((Math.floor(cx)+dx)*PX,(Math.floor(cy)+dy)*PX,PX,PX);
    }
  }
}

// --- CHAT NOTIFICATIONS ---
const CHAT_NAMES=['PizzaFan99','xX_Slayer_Xx','vibelord','CrustCrusher','cheesyBoi','NightOwl','SloppyChat','pepperoni_pete','crumb_queen','dough_knight'];
function chatMsg(text,special){
  let log=document.getElementById('chat-log');
  let div=document.createElement('div');
  div.className='chat-msg'+(special?' special':'');
  let who=CHAT_NAMES[Math.floor(Math.random()*CHAT_NAMES.length)];
  div.innerHTML='<span class="who">'+who+':</span> '+text;
  log.appendChild(div);
  // Remove after animation
  setTimeout(()=>{if(div.parentNode)div.remove();},special?6500:4500);
  // Keep max 5 messages
  while(log.children.length>5) log.firstChild.remove();
}

const BOSS_DEFEAT_MSGS=[
  ['meatball down! gg','rip golem lmao','that meatball got ROLLED'],
  ['dragon slayed lets go','pepper breath cant save you','spicy but not spicy enough'],
  ['calamari time!!','kraken got kracked','tentacles? more like tent-a-kills'],
  ['THE KING IS DEAD','pineapple does NOT go on pizza','LONG LIVE THE PIZZA CUTTER','crowned and dethroned lol','controversial opinion: defeated'],
  ['oven is OFF','final boss DOWN','you absolute legend']
];
const BOSS_START_MSGS=[
  ['oh no here comes the meatball','big boi alert','watch out for the charge!'],
  ['ITS A DRAGON','fire incoming!!','pepper dragon is NO JOKE'],
  ['tentacles everywhere omg','kraken time baby','dodge the arms!!'],
  ['ALL HAIL THE PINEAPPLE KING','this one is controversial','he teleports?! unfair'],
  ['FINAL BOSS LETS GO','the oven heats up...','dont get cooked!!']
];

// --- GAME STATE ---
let playing=false;
let bossIdx=0;
let player,boss,particles,slashes,bossProjectiles;
let flashTimer=0,shakeTimer=0,shakeX=0,shakeY=0;
let spinCooldown=0;
let iframes=0; // invincibility frames
let arenaY; // ground level

const BOSSES=[
  {name:'MEATBALL GOLEM',hp:80,size:18,color:'#8b4513',accent:'#cd853f',speed:30,
   pattern:'charge',projColor:'#a0522d',projSpeed:60,attackRate:2.5},
  {name:'PEPPER DRAGON',hp:120,size:20,color:'#cc0000',accent:'#ff4444',speed:40,
   pattern:'strafe',projColor:'#ff6600',projSpeed:80,attackRate:1.8},
  {name:'ANCHOVY KRAKEN',hp:180,size:24,color:'#2f4f4f',accent:'#5f9ea0',speed:25,
   pattern:'tentacle',projColor:'#708090',projSpeed:50,attackRate:1.2},
  {name:'PINEAPPLE KING',hp:250,size:22,color:'#daa520',accent:'#ffd700',speed:45,
   pattern:'teleport',projColor:'#ffcc00',projSpeed:90,attackRate:1.5},
  {name:'THE OVEN LORD',hp:350,size:26,color:'#b22222',accent:'#ff4500',speed:35,
   pattern:'rage',projColor:'#ff0000',projSpeed:70,attackRate:0.8},
];

function initPlayer(){
  return {
    x:GW/2,y:0,vx:0,vy:0,w:8,h:12,
    hp:100,maxHp:100,
    facing:1,// 1=right,-1=left
    grounded:false,
    slashing:false,slashTimer:0,slashDir:1,
    spinning:false,spinTimer:0,
    animFrame:0,animTimer:0,
    speed:80,jumpPow:-160
  };
}

function initBoss(idx){
  let b=BOSSES[idx];
  return {
    ...b,x:GW*0.7,y:0,vx:0,vy:0,
    currentHp:b.hp,
    phase:0,phaseTimer:0,
    attackTimer:b.attackRate,
    animFrame:0,animTimer:0,
    flashTimer:0,
    chargeDir:0,chargeTimer:0,
    teleportTimer:0,teleportFlash:0,
    tentacleTimer:0,
    rageMode:false,rageMult:1
  };
}

// --- PARTICLES ---
function spawnParticle(x,y,color,count,speed){
  for(let i=0;i<count;i++){
    let a=Math.random()*Math.PI*2;
    let sp=(speed||40)+Math.random()*30;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-20,life:0.3+Math.random()*0.4,color,r:1+Math.random()});
  }
}

function spawnSlice(x,y){
  for(let i=0;i<6;i++){
    let a=Math.random()*Math.PI*2;
    particles.push({x,y,vx:Math.cos(a)*50,vy:Math.sin(a)*50,life:0.2+Math.random()*0.2,color:'#ffcc00',r:1,slash:true});
  }
}

// --- START ---
function startGame(){
  document.getElementById('start-screen').style.display='none';
  document.getElementById('game-over').style.display='none';
  document.getElementById('hud').style.display='block';
  bossIdx=0;
  player=initPlayer();
  particles=[];slashes=[];bossProjectiles=[];
  spinCooldown=0;iframes=0;
  arenaY=GH-20;
  player.y=arenaY-player.h;
  loadBoss(0);
  playing=true;
  lastTime=performance.now();
  requestAnimationFrame(loop);
}

function loadBoss(idx){
  if(idx>=BOSSES.length){
    victory();return;
  }
  bossIdx=idx;
  boss=initBoss(idx);
  boss.y=arenaY-boss.size;
  bossProjectiles=[];
  document.getElementById('boss-name').textContent=boss.name;
  // Flash wave text
  let wd=document.getElementById('wave-display');
  wd.textContent=boss.name;
  wd.style.opacity='1';
  setTimeout(()=>{wd.style.opacity='0';},1500);
  // Chat react to new boss
  let startMsgs=BOSS_START_MSGS[idx]||[];
  setTimeout(()=>chatMsg(startMsgs[Math.floor(Math.random()*startMsgs.length)]||'new boss!'),500);
  if(Math.random()<0.6) setTimeout(()=>chatMsg(startMsgs[Math.floor(Math.random()*startMsgs.length)]||'lets go!'),1200);
}

function victory(){
  playing=false;
  document.getElementById('game-over').style.display='flex';
  document.getElementById('go-title').textContent='VICTORY!';
  document.getElementById('go-title').style.color='#ffcc00';
  document.getElementById('go-result').textContent='All bosses defeated! The pizza realm is saved.';
}

function die(){
  playing=false;
  spawnParticle(player.x+player.w/2,player.y+player.h/2,'#ff4444',30,60);
  chatMsg('F','');
  setTimeout(()=>chatMsg(['rip','oof','so close!','try again!','nooo'][Math.floor(Math.random()*5)]),400);
  document.getElementById('game-over').style.display='flex';
  document.getElementById('go-title').textContent='SLICED';
  document.getElementById('go-title').style.color='#ff4444';
  document.getElementById('go-result').textContent='Defeated by '+boss.name+' (Boss '+(bossIdx+1)+'/'+BOSSES.length+')';
}

// --- UPDATE ---
function updatePlayer(dt){
  let p=player;
  // Movement
  let mx=0;
  if(keys['ArrowLeft']||keys['a']||keys['A']) mx=-1;
  if(keys['ArrowRight']||keys['d']||keys['D']) mx=1;
  if(mx!==0) p.facing=mx;
  p.vx=mx*p.speed;

  // Jump
  if((keys['ArrowUp']||keys['w']||keys['W'])&&p.grounded){
    p.vy=p.jumpPow;p.grounded=false;
  }

  // Gravity
  p.vy+=400*dt;
  p.x+=p.vx*dt;
  p.y+=p.vy*dt;

  // Ground
  if(p.y>=arenaY-p.h){p.y=arenaY-p.h;p.vy=0;p.grounded=true;}
  // Walls
  if(p.x<2) p.x=2;
  if(p.x>GW-p.w-2) p.x=GW-p.w-2;

  // Slash attack
  if((keys['j']||keys['J']||keys[' ']||keys['Space'])&&!p.slashing&&!p.spinning){
    p.slashing=true;p.slashTimer=0.2;p.slashDir=p.facing;
    // Hitbox
    let sx=p.facing>0?p.x+p.w:p.x-14;
    let sy=p.y+2;
    slashes.push({x:sx,y:sy,w:14,h:8,timer:0.15,dmg:8});
    spawnSlice(sx+7,sy+4);
  }
  if(p.slashing){
    p.slashTimer-=dt;
    if(p.slashTimer<=0) p.slashing=false;
  }

  // Spin attack
  if(spinCooldown>0) spinCooldown-=dt;
  if((keys['k']||keys['K']||keys['Shift']||keys['ShiftLeft'])&&!p.spinning&&!p.slashing&&spinCooldown<=0){
    p.spinning=true;p.spinTimer=0.5;spinCooldown=3;
    // Multi-hit slash circle
    let cx=p.x+p.w/2,cy=p.y+p.h/2;
    for(let a=0;a<Math.PI*2;a+=Math.PI/3){
      slashes.push({x:cx+Math.cos(a)*10-5,y:cy+Math.sin(a)*10-4,w:10,h:8,timer:0.4,dmg:5});
    }
    spawnParticle(cx,cy,'#ffcc00',15,50);
  }
  if(p.spinning){
    p.spinTimer-=dt;
    if(p.spinTimer<=0) p.spinning=false;
  }

  // Iframes
  if(iframes>0) iframes-=dt;

  // Animation
  p.animTimer+=dt;
  if(p.animTimer>0.15){p.animTimer=0;p.animFrame=(p.animFrame+1)%4;}
}

function updateBoss(dt){
  let b=boss;
  b.animTimer+=dt;
  if(b.animTimer>0.2){b.animTimer=0;b.animFrame=(b.animFrame+1)%2;}
  if(b.flashTimer>0) b.flashTimer-=dt;

  let px=player.x+player.w/2,py=player.y+player.h/2;
  let bx=b.x+b.size/2,by=b.y+b.size/2;
  let dx=px-bx,dy=py-by;
  let dist=Math.sqrt(dx*dx+dy*dy);

  // Gravity
  b.vy+=300*dt;
  b.y+=b.vy*dt;
  if(b.y>=arenaY-b.size){b.y=arenaY-b.size;b.vy=0;}
  b.x+=b.vx*dt;
  if(b.x<2){b.x=2;b.vx*=-1;}
  if(b.x>GW-b.size-2){b.x=GW-b.size-2;b.vx*=-1;}

  // Rage mode for Oven Lord
  if(b.pattern==='rage'&&b.currentHp<b.hp*0.4&&!b.rageMode){
    b.rageMode=true;b.rageMult=1.8;
    spawnParticle(bx,by,'#ff4500',20,60);
  }

  let mult=b.rageMult||1;

  // Attack patterns
  b.attackTimer-=dt*mult;
  if(b.attackTimer<=0){
    b.attackTimer=b.attackRate;
    fireProjectile(b);
  }

  // Movement pattern
  b.phaseTimer+=dt;
  switch(b.pattern){
    case 'charge':
      if(b.chargeTimer>0){
        b.chargeTimer-=dt;
        b.vx=b.chargeDir*b.speed*3;
      } else {
        b.vx*=0.9;
        if(b.phaseTimer>3){
          b.phaseTimer=0;
          b.chargeDir=dx>0?1:-1;
          b.chargeTimer=0.6;
          b.vy=-80;
        }
      }
      break;
    case 'strafe':
      b.vx=Math.sin(b.phaseTimer*2)*b.speed*mult;
      if(b.phaseTimer>4){b.phaseTimer=0;b.vy=-120;}
      break;
    case 'tentacle':
      b.vx=Math.sin(b.phaseTimer*1.2)*b.speed*0.5;
      b.tentacleTimer-=dt;
      if(b.tentacleTimer<=0){
        b.tentacleTimer=2;
        // Spawn tentacle wave
        for(let i=-2;i<=2;i++){
          bossProjectiles.push({x:bx+i*15,y:arenaY-3,vx:0,vy:-40,r:3,color:b.projColor,life:1.5,dmg:10});
        }
      }
      break;
    case 'teleport':
      b.teleportTimer-=dt;
      if(b.teleportTimer<=0){
        b.teleportTimer=2.5;
        b.teleportFlash=0.3;
        spawnParticle(bx,by,'#ffd700',10,40);
        b.x=Math.random()*(GW-b.size-20)+10;
        b.y=arenaY-b.size-Math.random()*40;
        spawnParticle(b.x+b.size/2,b.y+b.size/2,'#ffd700',10,40);
      }
      if(b.teleportFlash>0) b.teleportFlash-=dt;
      break;
    case 'rage':
      let spd=b.speed*mult;
      if(dist>2) b.vx=(dx/dist)*spd*0.6;
      if(b.phaseTimer>2){b.phaseTimer=0;b.vy=-100;}
      break;
  }

  // Contact damage
  if(iframes<=0){
    let overlap=rectsOverlap(player.x,player.y,player.w,player.h,b.x,b.y,b.size,b.size);
    if(overlap){
      player.hp-=12;
      iframes=0.8;
      shakeTimer=0.2;
      flashTimer=0.15;
      spawnParticle(player.x+player.w/2,player.y+player.h/2,'#ff4444',8,30);
      // Knockback
      player.vx=(dx<0?1:-1)*120;
      player.vy=-80;
      player.grounded=false;
      if(player.hp<=0){die();return;}
    }
  }

  // Check slash hits
  for(let i=slashes.length-1;i>=0;i--){
    let s=slashes[i];
    s.timer-=dt;
    if(s.timer<=0){slashes.splice(i,1);continue;}
    if(rectsOverlap(s.x,s.y,s.w,s.h,b.x,b.y,b.size,b.size)){
      b.currentHp-=s.dmg;
      b.flashTimer=0.1;
      shakeTimer=0.08;
      spawnParticle(b.x+b.size/2,b.y+b.size/2,b.accent,5,30);
      slashes.splice(i,1);
      if(b.currentHp<=0){
        // Boss defeated
        spawnParticle(b.x+b.size/2,b.y+b.size/2,'#ffcc00',40,80);
        spawnParticle(b.x+b.size/2,b.y+b.size/2,b.accent,25,60);
        player.hp=Math.min(player.hp+30,player.maxHp);
        // Chat notifications
        let msgs=BOSS_DEFEAT_MSGS[bossIdx]||[];
        let isPineapple=bossIdx===3;
        chatMsg(msgs[Math.floor(Math.random()*msgs.length)]||'boss down!',isPineapple);
        if(isPineapple){
          setTimeout(()=>chatMsg('THE PINEAPPLE DEBATE IS OVER',true),800);
          setTimeout(()=>chatMsg('pizza cutter settles it once and for all',true),1600);
        } else {
          if(Math.random()<0.5) setTimeout(()=>chatMsg(msgs[Math.floor(Math.random()*msgs.length)]||'gg'),600);
        }
        setTimeout(()=>{if(playing) loadBoss(bossIdx+1);},isPineapple?2500:1200);
        boss.currentHp=0;
        return;
      }
    }
  }
}

function fireProjectile(b){
  let bx=b.x+b.size/2,by=b.y+b.size/2;
  let px=player.x+player.w/2,py=player.y+player.h/2;
  let dx=px-bx,dy=py-by;
  let dist=Math.sqrt(dx*dx+dy*dy)||1;
  let spd=b.projSpeed*(b.rageMult||1);
  let count=b.pattern==='rage'&&b.rageMode?3:1;
  for(let i=0;i<count;i++){
    let spread=(i-Math.floor(count/2))*0.3;
    let a=Math.atan2(dy,dx)+spread;
    bossProjectiles.push({
      x:bx,y:by,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,
      r:2+Math.random(),color:b.projColor,life:3,dmg:8+(bossIdx*2)
    });
  }
}

function updateProjectiles(dt){
  for(let i=bossProjectiles.length-1;i>=0;i--){
    let p=bossProjectiles[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    p.life-=dt;
    if(p.life<=0||p.x<-10||p.x>GW+10||p.y>GH+10){bossProjectiles.splice(i,1);continue;}
    // Hit player
    if(iframes<=0){
      let dx=player.x+player.w/2-p.x,dy=player.y+player.h/2-p.y;
      if(Math.sqrt(dx*dx+dy*dy)<p.r+5){
        player.hp-=p.dmg;
        iframes=0.6;
        shakeTimer=0.15;
        flashTimer=0.1;
        spawnParticle(p.x,p.y,'#ff4444',5,20);
        bossProjectiles.splice(i,1);
        if(player.hp<=0){die();return;}
      }
    }
  }
}

function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){
    let p=particles[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    p.vy+=100*dt;
    p.life-=dt;
    if(p.life<=0) particles.splice(i,1);
  }
}

function rectsOverlap(ax,ay,aw,ah,bx,by,bw,bh){
  return ax<bx+bw&&ax+aw>bx&&ay<by+bh&&ay+ah>by;
}

// --- DRAWING ---
function drawArena(){
  // Sky gradient (pixelated bands)
  let colors=['#0a0015','#120025','#1a0035','#200040','#280050'];
  let bandH=Math.ceil(arenaY/colors.length);
  for(let i=0;i<colors.length;i++){
    pxRect(0,i*bandH,GW,bandH+1,colors[i]);
  }
  // Ground
  pxRect(0,arenaY,GW,GH-arenaY,'#3a2020');
  pxRect(0,arenaY,GW,2,'#5a3030');
  // Tiles on ground
  for(let tx=0;tx<GW;tx+=12){
    pxRect(tx,arenaY+2,1,GH-arenaY,'#2a1515');
  }
}

function drawPlayer(){
  let p=player;
  if(iframes>0&&Math.floor(iframes*15)%2===0) return; // blink

  let x=Math.floor(p.x),y=Math.floor(p.y);

  // Body
  pxRect(x+2,y,4,3,'#ffcc88'); // head
  pxRect(x+1,y+1,1,1,'#222'); // eye
  pxRect(x+1,y+3,6,5,'#cc4444'); // torso
  // Legs
  let legOff=p.grounded?(p.animFrame%2===0?0:1):1;
  pxRect(x+1,y+8,2,4-legOff,'#884422');
  pxRect(x+5,y+8,2,4-(1-legOff),'#884422');
  // Pizza cutter sword
  drawPizzaCutter(x,y,p);
}

function drawPizzaCutter(px,py,p){
  let sx,sy;
  if(p.spinning){
    // Spin - rotate around player
    let a=p.spinTimer*12;
    let cx=px+p.w/2,cy=py+p.h/2;
    let r=10;
    sx=cx+Math.cos(a)*r;sy=cy+Math.sin(a)*r;
    // Handle line
    X.strokeStyle='#888';X.lineWidth=PX;
    X.beginPath();X.moveTo(cx*PX,cy*PX);X.lineTo(sx*PX,sy*PX);X.stroke();
    // Blade circle
    pxCircle(Math.floor(sx),Math.floor(sy),3,'#cccccc');
    pxCircle(Math.floor(sx),Math.floor(sy),2,'#aaaaaa');
    pxCircle(Math.floor(sx),Math.floor(sy),1,'#888888');
    // Sparks
    if(Math.random()<0.3) spawnParticle(sx,sy,'#ffcc00',1,20);
  } else if(p.slashing){
    // Slash pose
    let ext=p.slashDir>0?12:-12;
    sx=px+p.w/2+ext;sy=py+3;
    // Handle
    X.strokeStyle='#888';X.lineWidth=PX;
    X.beginPath();X.moveTo((px+p.w/2)*PX,(py+4)*PX);X.lineTo(sx*PX,sy*PX);X.stroke();
    // Blade
    pxCircle(Math.floor(sx),Math.floor(sy),3,'#dddddd');
    pxCircle(Math.floor(sx),Math.floor(sy),2,'#bbbbbb');
    // Slash arc effect
    X.strokeStyle='rgba(255,204,0,0.6)';X.lineWidth=PX*2;
    X.beginPath();
    X.arc((px+p.w/2+ext*0.5)*PX,(py+4)*PX,12*PX,
      p.slashDir>0?-0.8:Math.PI-0.8,
      p.slashDir>0?0.8:Math.PI+0.8);
    X.stroke();
  } else {
    // Idle - held at side
    let dir=p.facing;
    sx=px+(dir>0?p.w+2:-4);sy=py+5;
    // Handle
    pxRect(sx,sy,2,5,'#888');
    // Blade circle
    pxCircle(sx+1,sy-1,2,'#cccccc');
    pxCircle(sx+1,sy-1,1,'#aaaaaa');
  }
}

function drawBoss(){
  let b=boss;
  if(!b||b.currentHp<=0) return;
  let x=Math.floor(b.x),y=Math.floor(b.y);
  let s=b.size;
  let color=b.flashTimer>0?'#ffffff':b.color;
  let accent=b.accent;

  // Each boss gets unique pixel art
  switch(bossIdx){
    case 0: // Meatball Golem
      pxCircle(x+s/2,y+s/2,s/2,color);
      pxCircle(x+s/2,y+s/2,s/2-2,accent);
      // Eyes
      pxRect(x+s/3-2,y+s/3,2,2,'#fff');
      pxRect(x+s*2/3,y+s/3,2,2,'#fff');
      pxRect(x+s/3-1,y+s/3,1,1,'#000');
      pxRect(x+s*2/3+1,y+s/3,1,1,'#000');
      // Mouth
      pxRect(x+s/3,y+s*2/3,s/3,2,'#4a1a00');
      // Herbs
      pxRect(x+s/4,y+s/4,2,2,'#228b22');
      pxRect(x+s*3/4,y+s/2,2,1,'#228b22');
      break;
    case 1: // Pepper Dragon
      // Body
      pxRect(x+4,y+4,s-8,s-6,color);
      // Head
      pxRect(x,y,s,6,accent);
      // Eyes
      pxRect(x+4,y+1,2,3,'#ff0');
      pxRect(x+s-6,y+1,2,3,'#ff0');
      pxRect(x+5,y+2,1,1,'#000');
      pxRect(x+s-5,y+2,1,1,'#000');
      // Wings
      pxRect(x-5,y+6,5,8,'#aa0000');
      pxRect(x+s,y+6,5,8,'#aa0000');
      // Tail
      pxRect(x+s/2-1,y+s-2,2,4,color);
      pxRect(x+s/2,y+s+1,3,2,accent);
      // Fire mouth
      if(b.animFrame===1){pxRect(x+s/2-3,y+5,6,2,'#ff6600');}
      break;
    case 2: // Anchovy Kraken
      // Body
      pxCircle(x+s/2,y+s/3,s/3,color);
      // Eyes
      pxRect(x+s/3,y+s/4,3,3,'#adff2f');
      pxRect(x+s*2/3-2,y+s/4,3,3,'#adff2f');
      pxRect(x+s/3+1,y+s/4+1,1,1,'#000');
      pxRect(x+s*2/3-1,y+s/4+1,1,1,'#000');
      // Tentacles
      for(let t=0;t<5;t++){
        let tx=x+2+t*(s-4)/4;
        let wave=Math.sin(b.phaseTimer*3+t)*3;
        pxRect(tx,y+s/2,3,s/2+4,accent);
        pxRect(tx+wave,y+s-4,3,6,accent);
      }
      break;
    case 3: // Pineapple King
      // Body (pineapple shape)
      pxRect(x+2,y+6,s-4,s-6,color);
      // Diamond pattern
      for(let py2=0;py2<s-8;py2+=4){
        for(let px2=0;px2<s-6;px2+=4){
          pxRect(x+3+px2,y+7+py2,2,2,'#b8860b');
        }
      }
      // Crown leaves
      pxRect(x+s/2-1,y,2,6,'#228b22');
      pxRect(x+s/2-4,y+1,3,5,'#32cd32');
      pxRect(x+s/2+2,y+1,3,5,'#32cd32');
      pxRect(x+s/2-6,y+3,3,3,'#228b22');
      pxRect(x+s/2+5,y+3,3,3,'#228b22');
      // Crown
      pxRect(x+s/2-2,y-2,4,3,'#ffd700');
      // Eyes
      pxRect(x+s/3,y+s/3+2,2,2,b.teleportFlash>0?'#fff':'#000');
      pxRect(x+s*2/3-1,y+s/3+2,2,2,b.teleportFlash>0?'#fff':'#000');
      // Mouth
      pxRect(x+s/3+1,y+s/2+2,s/3-1,2,'#8b4513');
      break;
    case 4: // Oven Lord
      // Oven body
      pxRect(x,y+4,s,s-4,color);
      pxRect(x+1,y+4,s-2,2,'#444');
      // Door
      pxRect(x+3,y+8,s-6,s-12,'#1a0000');
      // Fire inside
      if(b.rageMode||b.animFrame===1){
        let fc=b.rageMode?'#ff0':'#ff4500';
        pxRect(x+5,y+s-8,2,3,fc);
        pxRect(x+9,y+s-9,3,4,fc);
        pxRect(x+s-8,y+s-7,2,2,fc);
      }
      // Eyes on door
      pxRect(x+6,y+10,3,2,b.rageMode?'#ff0':'#ff4500');
      pxRect(x+s-9,y+10,3,2,b.rageMode?'#ff0':'#ff4500');
      // Handle
      pxRect(x+s-3,y+s/2,2,3,'#888');
      // Top pipe
      pxRect(x+s/2-2,y,4,5,'#555');
      // Smoke
      if(b.rageMode){
        pxRect(x+s/2-1+Math.sin(b.phaseTimer*5)*3,y-3,2,2,'#ff4500');
      }
      break;
  }
}

function drawProjectiles(){
  for(let p of bossProjectiles){
    pxCircle(Math.floor(p.x),Math.floor(p.y),Math.floor(p.r),p.color);
    // Glow
    X.fillStyle=p.color+'44';
    X.beginPath();X.arc(p.x*PX,p.y*PX,(p.r+2)*PX,0,Math.PI*2);X.fill();
  }
}

function drawParticles(){
  for(let p of particles){
    let a=Math.min(1,p.life*3);
    X.globalAlpha=a;
    pxRect(Math.floor(p.x),Math.floor(p.y),Math.ceil(p.r),Math.ceil(p.r),p.color);
  }
  X.globalAlpha=1;
}

function drawHUD(){
  if(!boss) return;
  let bossP=Math.max(0,boss.currentHp/boss.hp*100);
  let playerP=Math.max(0,player.hp/player.maxHp*100);
  document.getElementById('boss-hp-fill').style.width=bossP+'%';
  document.getElementById('player-hp-fill').style.width=playerP+'%';
  // Spin cooldown indicator
  if(spinCooldown>0){
    let cd=spinCooldown/3;
    X.fillStyle='rgba(255,204,0,0.3)';
    X.fillRect(4*PX,(arenaY-25)*PX,20*PX*cd,3*PX);
    X.fillStyle='rgba(255,204,0,0.6)';
    X.fillRect(4*PX,(arenaY-25)*PX,1*PX,3*PX);
  }
}

// --- MAIN LOOP ---
let lastTime=0;
function loop(now){
  if(!playing){
    // Death particles
    let dt=Math.min((now-lastTime)/1000,0.05);
    lastTime=now;
    X.save();
    drawArena();
    if(boss&&boss.currentHp>0) drawBoss();
    drawParticles();
    X.restore();
    if(particles.length>0) requestAnimationFrame(loop);
    return;
  }
  let dt=Math.min((now-lastTime)/1000,0.05);
  lastTime=now;

  updatePlayer(dt);
  if(boss&&boss.currentHp>0) updateBoss(dt);
  updateProjectiles(dt);
  updateParticles(dt);

  // Screen shake
  if(shakeTimer>0){shakeTimer-=dt;shakeX=(Math.random()-.5)*4;shakeY=(Math.random()-.5)*4;}
  else{shakeX=0;shakeY=0;}

  X.save();
  X.translate(shakeX*PX,shakeY*PX);

  drawArena();
  drawProjectiles();
  if(boss&&boss.currentHp>0) drawBoss();
  drawPlayer();
  drawParticles();
  drawHUD();

  // Damage flash
  if(flashTimer>0){
    flashTimer-=dt;
    X.fillStyle='rgba(255,0,0,'+flashTimer*2+')';
    X.fillRect(0,0,W,H);
  }

  X.restore();
  requestAnimationFrame(loop);
}

// Idle screen animation
function drawIdle(){
  X.fillStyle='#1a0a0a';X.fillRect(0,0,W,H);
  arenaY=GH-20;
  drawArena();
  // Idle player
  let ix=GW/2-4,iy=arenaY-12;
  pxRect(ix+2,iy,4,3,'#ffcc88');
  pxRect(ix+1,iy+3,6,5,'#cc4444');
  pxRect(ix+1,iy+8,2,4,'#884422');
  pxRect(ix+5,iy+8,2,4,'#884422');
  pxCircle(ix+9,iy+4,2,'#cccccc');
  pxRect(ix+7,iy+5,2,4,'#888');
  if(!playing) requestAnimationFrame(drawIdle);
}
requestAnimationFrame(drawIdle);
</script>
