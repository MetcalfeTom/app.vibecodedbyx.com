<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cosmic Craps</title>
<link rel="icon" href="https://emojicdn.elk.sh/🎲">
<meta property="og:title" content="Cosmic Craps">
<meta property="og:description" content="Roll dice to trigger supernovae, black holes, meteor showers, and cosmic chaos">
<meta property="og:url" content="https://sloppy.live/cosmic-craps">
<meta property="og:image" content="https://sloppy.live/cosmic-craps/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Anybody:wght@100;800;900&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#020108;font-family:'DM Mono',monospace}
canvas{position:fixed;top:0;left:0;width:100%;height:100%}
#ui{position:fixed;bottom:0;left:0;width:100%;z-index:10;pointer-events:none;display:flex;flex-direction:column;align-items:center;padding-bottom:16px}
.dice-area{display:flex;gap:16px;margin-bottom:10px;pointer-events:auto}
.die{width:64px;height:64px;background:rgba(10,8,20,0.8);border:2px solid rgba(100,80,160,0.4);display:flex;align-items:center;justify-content:center;font-family:'Anybody',sans-serif;font-weight:900;font-size:28px;color:#e0d0ff;transition:transform 0.1s,border-color 0.3s;user-select:none}
.die.rolling{animation:dieRoll 0.1s infinite;border-color:rgba(200,160,255,0.7)}
@keyframes dieRoll{0%{transform:rotate(-5deg) scale(1.05)}50%{transform:rotate(5deg) scale(0.95)}100%{transform:rotate(-5deg) scale(1.05)}}
.roll-btn{padding:10px 32px;background:rgba(100,60,180,0.3);border:1px solid rgba(140,100,220,0.5);color:#c0a8ff;font-family:'Anybody',sans-serif;font-weight:800;font-size:14px;letter-spacing:2px;cursor:pointer;pointer-events:auto;transition:all 0.15s;text-transform:uppercase}
.roll-btn:hover{background:rgba(140,80,220,0.5);border-color:rgba(180,140,255,0.7);color:#e0d0ff}
.roll-btn:active{transform:scale(0.95)}
.roll-btn:disabled{opacity:0.3;cursor:default}
.event-name{font-family:'Anybody',sans-serif;font-weight:800;font-size:clamp(18px,4vw,28px);color:#c0a8ff;text-shadow:0 0 30px rgba(140,80,255,0.4);margin-bottom:4px;opacity:0;transition:opacity 0.5s;text-align:center}
.event-name.show{opacity:1}
.event-desc{font-size:11px;color:rgba(160,140,200,0.5);margin-bottom:10px;text-align:center;opacity:0;transition:opacity 0.5s}
.event-desc.show{opacity:1}
.stats{display:flex;gap:16px;font-size:9px;color:rgba(140,120,180,0.4);letter-spacing:1px;text-transform:uppercase;pointer-events:none}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="ui">
  <div class="event-name" id="event-name"></div>
  <div class="event-desc" id="event-desc"></div>
  <div class="dice-area">
    <div class="die" id="die1">⚀</div>
    <div class="die" id="die2">⚀</div>
  </div>
  <button class="roll-btn" id="roll-btn" onclick="roll()">Roll the Cosmos</button>
  <div class="stats">
    <span>Rolls: <span id="st-rolls">0</span></span>
    <span>Events: <span id="st-events">0</span></span>
    <span>Streak: <span id="st-streak">0</span></span>
  </div>
</div>
<script>
var C=document.getElementById('cv'),X=C.getContext('2d');
var W,H;
function resize(){W=C.width=window.innerWidth;H=C.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();

var t=0,rolling=false,rollCount=0,eventCount=0,streak=0;
var stars=[],particles=[],effects=[];
var bgHue=260,bgShift=0;

// Unicode dice faces
var DICE=['⚀','⚁','⚂','⚃','⚄','⚅'];

// Stars
for(var i=0;i<200;i++){
  stars.push({x:Math.random()*2000-500,y:Math.random()*2000-500,z:Math.random(),
    size:0.5+Math.random()*1.5,blink:Math.random()*Math.PI*2,blinkSpd:0.5+Math.random()*2});
}

// Space events tied to dice totals
var EVENTS={
  2:{name:'BLACK HOLE',desc:'The void consumes all light',fn:blackHole},
  3:{name:'METEOR SHOWER',desc:'Burning debris streaks the sky',fn:meteorShower},
  4:{name:'NEBULA BIRTH',desc:'Gas clouds ignite with color',fn:nebulaBirth},
  5:{name:'SOLAR FLARE',desc:'The star erupts in fury',fn:solarFlare},
  6:{name:'ASTEROID BELT',desc:'Tumbling rocks fill the void',fn:asteroidBelt},
  7:{name:'SUPERNOVA',desc:'A star dies in spectacular glory',fn:supernova},
  8:{name:'COMET PASS',desc:'An icy wanderer blazes through',fn:cometPass},
  9:{name:'PULSAR BEAM',desc:'Rotating death ray from a neutron star',fn:pulsarBeam},
  10:{name:'WORMHOLE',desc:'Space folds in on itself',fn:wormhole},
  11:{name:'GAMMA BURST',desc:'The most violent flash in the universe',fn:gammaBurst},
  12:{name:'BIG BANG',desc:'Everything. All at once.',fn:bigBang}
};

// Event implementations
function blackHole(){
  effects.push({type:'blackhole',x:W/2,y:H/2,life:300,maxLife:300,r:0,maxR:Math.min(W,H)*0.35});
  // Suck in particles
  for(var i=0;i<80;i++){
    var a=Math.random()*Math.PI*2;
    var d=150+Math.random()*300;
    particles.push({x:W/2+Math.cos(a)*d,y:H/2+Math.sin(a)*d,
      vx:-Math.cos(a)*2,vy:-Math.sin(a)*2,
      life:150+Math.random()*100,size:1+Math.random()*3,
      col:'hsl('+(260+Math.random()*40)+',80%,70%)',gravity:{x:W/2,y:H/2,str:0.08}});
  }
}

function meteorShower(){
  for(var i=0;i<30;i++){
    var delay=i*3;
    setTimeout(function(){
      var sx=Math.random()*W;
      particles.push({x:sx,y:-20,vx:2+Math.random()*3,vy:4+Math.random()*5,
        life:60+Math.random()*40,size:2+Math.random()*3,
        col:'hsl('+(20+Math.random()*30)+',90%,'+(60+Math.random()*30)+'%)',trail:true});
    },delay*30);
  }
}

function nebulaBirth(){
  var cx=W*0.3+Math.random()*W*0.4,cy=H*0.3+Math.random()*H*0.4;
  effects.push({type:'nebula',x:cx,y:cy,life:400,maxLife:400,r:0,
    hue:Math.random()*360,clouds:[]});
  for(var i=0;i<40;i++){
    var a=Math.random()*Math.PI*2;
    var d=Math.random()*120;
    particles.push({x:cx+Math.cos(a)*d,y:cy+Math.sin(a)*d,
      vx:Math.cos(a)*0.5,vy:Math.sin(a)*0.5,
      life:200+Math.random()*200,size:20+Math.random()*40,
      col:'hsla('+(200+Math.random()*160)+',70%,50%,0.03)',blob:true});
  }
}

function solarFlare(){
  var cx=W/2,cy=H/2;
  effects.push({type:'flare',x:cx,y:cy,life:200,maxLife:200,angle:Math.random()*Math.PI*2});
  for(var i=0;i<60;i++){
    var a=Math.random()*Math.PI*2;
    var v=3+Math.random()*6;
    particles.push({x:cx,y:cy,vx:Math.cos(a)*v,vy:Math.sin(a)*v,
      life:40+Math.random()*60,size:2+Math.random()*4,
      col:'hsl('+(30+Math.random()*30)+',100%,'+(60+Math.random()*30)+'%)'});
  }
}

function asteroidBelt(){
  for(var i=0;i<25;i++){
    var a=Math.random()*Math.PI*2;
    var d=100+Math.random()*200;
    effects.push({type:'asteroid',x:W/2+Math.cos(a)*d,y:H/2+Math.sin(a)*d,
      life:300,maxLife:300,size:4+Math.random()*12,
      orbit:a,orbitR:d,orbitSpd:0.005+Math.random()*0.01*(Math.random()<0.5?1:-1),
      col:'hsl('+(20+Math.random()*20)+',30%,'+(30+Math.random()*20)+'%)'});
  }
}

function supernova(){
  var cx=W/2,cy=H/2;
  effects.push({type:'supernova',x:cx,y:cy,life:250,maxLife:250,r:0});
  for(var i=0;i<120;i++){
    var a=Math.random()*Math.PI*2;
    var v=2+Math.random()*8;
    particles.push({x:cx,y:cy,vx:Math.cos(a)*v,vy:Math.sin(a)*v,
      life:80+Math.random()*120,size:1+Math.random()*4,
      col:'hsl('+(Math.random()*360)+',90%,'+(60+Math.random()*30)+'%)'});
  }
  bgShift=40;
}

function cometPass(){
  var startX=-50,startY=H*0.2+Math.random()*H*0.3;
  effects.push({type:'comet',x:startX,y:startY,life:200,maxLife:200,
    vx:4+Math.random()*3,vy:1+Math.random()*2,tailPts:[]});
}

function pulsarBeam(){
  effects.push({type:'pulsar',x:W/2,y:H/2,life:250,maxLife:250,angle:0,
    speed:0.04+Math.random()*0.03});
}

function wormhole(){
  effects.push({type:'wormhole',x:W*0.3+Math.random()*W*0.4,y:H*0.3+Math.random()*H*0.4,
    life:300,maxLife:300,r:0,maxR:100+Math.random()*60,spin:0});
}

function gammaBurst(){
  effects.push({type:'gamma',x:W/2,y:H/2,life:120,maxLife:120,
    angle:Math.random()*Math.PI*2});
  bgShift=60;
}

function bigBang(){
  var cx=W/2,cy=H/2;
  effects.push({type:'bigbang',x:cx,y:cy,life:400,maxLife:400,r:0});
  for(var i=0;i<200;i++){
    var a=Math.random()*Math.PI*2;
    var v=1+Math.random()*10;
    particles.push({x:cx,y:cy,vx:Math.cos(a)*v,vy:Math.sin(a)*v,
      life:150+Math.random()*200,size:1+Math.random()*5,
      col:'hsl('+(Math.random()*360)+',90%,'+(70+Math.random()*25)+'%)',trail:true});
  }
  bgShift=80;
}

// Roll
function roll(){
  if(rolling)return;
  rolling=true;
  rollCount++;
  document.getElementById('roll-btn').disabled=true;
  var d1=document.getElementById('die1'),d2=document.getElementById('die2');
  d1.classList.add('rolling');d2.classList.add('rolling');

  var frames=0,finalD1,finalD2;
  var rollAnim=setInterval(function(){
    d1.textContent=DICE[Math.floor(Math.random()*6)];
    d2.textContent=DICE[Math.floor(Math.random()*6)];
    frames++;
    if(frames>20){
      clearInterval(rollAnim);
      finalD1=Math.floor(Math.random()*6);
      finalD2=Math.floor(Math.random()*6);
      d1.textContent=DICE[finalD1];
      d2.textContent=DICE[finalD2];
      d1.classList.remove('rolling');d2.classList.remove('rolling');
      var total=finalD1+finalD2+2;
      triggerEvent(total);
      rolling=false;
      document.getElementById('roll-btn').disabled=false;
    }
  },50);
}

function triggerEvent(total){
  var ev=EVENTS[total];
  if(!ev)return;
  eventCount++;
  streak++;
  ev.fn();
  var nameEl=document.getElementById('event-name');
  var descEl=document.getElementById('event-desc');
  nameEl.textContent=total+' — '+ev.name;
  descEl.textContent=ev.desc;
  nameEl.classList.add('show');descEl.classList.add('show');
  setTimeout(function(){nameEl.classList.remove('show');descEl.classList.remove('show');},3000);
  document.getElementById('st-rolls').textContent=rollCount;
  document.getElementById('st-events').textContent=eventCount;
  document.getElementById('st-streak').textContent=streak;
}

// Render
function frame(){
  t+=0.016;
  bgShift*=0.97;

  // Background
  var bh=bgHue+Math.sin(t*0.1)*10+bgShift;
  X.fillStyle='hsla('+bh+',60%,2%,0.2)';
  X.fillRect(0,0,W,H);

  // Stars
  for(var i=0;i<stars.length;i++){
    var s=stars[i];
    var sx=(s.x%W+W)%W,sy=(s.y%H+H)%H;
    var alpha=0.3+Math.sin(t*s.blinkSpd+s.blink)*0.3;
    X.fillStyle='rgba(200,190,230,'+alpha+')';
    X.fillRect(sx,sy,s.size,s.size);
  }

  // Effects
  for(var i=effects.length-1;i>=0;i--){
    var e=effects[i];
    e.life--;
    if(e.life<=0){effects.splice(i,1);continue;}
    var prog=1-e.life/e.maxLife;

    if(e.type==='blackhole'){
      e.r=e.maxR*Math.min(1,prog*3);
      var fadeR=e.r*(e.life<60?e.life/60:1);
      // Accretion disk
      X.save();X.translate(e.x,e.y);
      for(var j=0;j<3;j++){
        X.strokeStyle='hsla('+(260+j*30)+',70%,50%,'+(0.15*(e.life/e.maxLife))+')';
        X.lineWidth=2;
        X.beginPath();X.ellipse(0,0,fadeR+j*15,fadeR*0.3+j*5,t*0.5+j,0,Math.PI*2);X.stroke();
      }
      // Black center
      var bg2=X.createRadialGradient(0,0,0,0,0,fadeR);
      bg2.addColorStop(0,'rgba(0,0,0,0.95)');
      bg2.addColorStop(0.7,'rgba(0,0,0,0.5)');
      bg2.addColorStop(1,'transparent');
      X.fillStyle=bg2;X.fillRect(-fadeR,-fadeR,fadeR*2,fadeR*2);
      X.restore();
    }else if(e.type==='supernova'){
      e.r=Math.min(W,H)*prog*0.8;
      var alpha2=Math.max(0,(1-prog)*0.6);
      var sg=X.createRadialGradient(e.x,e.y,0,e.x,e.y,e.r);
      sg.addColorStop(0,'hsla(50,100%,90%,'+alpha2+')');
      sg.addColorStop(0.3,'hsla(30,100%,60%,'+alpha2*0.5+')');
      sg.addColorStop(0.6,'hsla(280,80%,40%,'+alpha2*0.2+')');
      sg.addColorStop(1,'transparent');
      X.fillStyle=sg;X.fillRect(e.x-e.r,e.y-e.r,e.r*2,e.r*2);
    }else if(e.type==='flare'){
      var fLen=200+prog*300;
      var fAlpha=Math.max(0,(1-prog)*0.7);
      X.save();X.translate(e.x,e.y);X.rotate(e.angle);
      var fg=X.createLinearGradient(0,0,fLen,0);
      fg.addColorStop(0,'hsla(40,100%,80%,'+fAlpha+')');
      fg.addColorStop(0.5,'hsla(20,100%,50%,'+fAlpha*0.4+')');
      fg.addColorStop(1,'transparent');
      X.fillStyle=fg;
      X.beginPath();X.moveTo(0,-20*(1-prog));X.lineTo(fLen,0);X.lineTo(0,20*(1-prog));X.closePath();X.fill();
      X.restore();
    }else if(e.type==='asteroid'){
      e.orbit+=e.orbitSpd;
      e.x=W/2+Math.cos(e.orbit)*e.orbitR;
      e.y=H/2+Math.sin(e.orbit)*e.orbitR*0.4;
      var aAlpha=e.life<60?e.life/60:1;
      X.fillStyle='hsla(30,30%,40%,'+aAlpha*0.8+')';
      X.beginPath();
      X.save();X.translate(e.x,e.y);X.rotate(e.orbit*3);
      X.moveTo(-e.size,-e.size*0.6);X.lineTo(e.size*0.8,-e.size*0.8);
      X.lineTo(e.size,e.size*0.4);X.lineTo(-e.size*0.5,e.size);X.closePath();
      X.fill();X.restore();
    }else if(e.type==='comet'){
      e.x+=e.vx;e.y+=e.vy;
      e.tailPts.unshift({x:e.x,y:e.y});
      if(e.tailPts.length>60)e.tailPts.pop();
      var cAlpha=e.life<40?e.life/40:1;
      // Tail
      for(var j=0;j<e.tailPts.length;j++){
        var tp=e.tailPts[j];
        var ta=(1-j/e.tailPts.length)*cAlpha;
        X.fillStyle='hsla(200,80%,70%,'+ta*0.3+')';
        X.beginPath();X.arc(tp.x,tp.y,4+j*0.3,0,Math.PI*2);X.fill();
      }
      // Head
      var cg=X.createRadialGradient(e.x,e.y,0,e.x,e.y,12);
      cg.addColorStop(0,'hsla(180,100%,90%,'+cAlpha+')');
      cg.addColorStop(1,'transparent');
      X.fillStyle=cg;X.fillRect(e.x-12,e.y-12,24,24);
    }else if(e.type==='pulsar'){
      e.angle+=e.speed;
      var pAlpha=e.life<40?e.life/40:Math.min(1,prog*5);
      var pLen=Math.max(W,H);
      X.save();X.translate(e.x,e.y);X.rotate(e.angle);
      X.fillStyle='hsla(200,100%,80%,'+pAlpha*0.15+')';
      X.fillRect(-pLen,-3,pLen*2,6);
      X.fillStyle='hsla(200,100%,90%,'+pAlpha*0.4+')';
      X.fillRect(-pLen,-1,pLen*2,2);
      X.restore();
      // Core
      var pg=X.createRadialGradient(e.x,e.y,0,e.x,e.y,15);
      pg.addColorStop(0,'hsla(200,100%,90%,'+pAlpha*0.8+')');
      pg.addColorStop(1,'transparent');
      X.fillStyle=pg;X.fillRect(e.x-15,e.y-15,30,30);
    }else if(e.type==='wormhole'){
      e.r=e.maxR*Math.min(1,prog*4);
      e.spin+=0.05;
      var wAlpha=e.life<60?e.life/60:1;
      X.save();X.translate(e.x,e.y);
      for(var j=0;j<5;j++){
        X.strokeStyle='hsla('+(260+j*25)+',80%,60%,'+wAlpha*(0.3-j*0.05)+')';
        X.lineWidth=2;
        X.beginPath();X.arc(0,0,e.r-j*12,e.spin+j*0.5,e.spin+j*0.5+Math.PI*1.5);X.stroke();
      }
      // Center
      var wg=X.createRadialGradient(0,0,0,0,0,e.r*0.4);
      wg.addColorStop(0,'hsla(280,90%,20%,'+wAlpha*0.8+')');
      wg.addColorStop(1,'transparent');
      X.fillStyle=wg;X.fillRect(-e.r*0.4,-e.r*0.4,e.r*0.8,e.r*0.8);
      X.restore();
    }else if(e.type==='gamma'){
      var gAlpha=e.life/e.maxLife;
      var gw=Math.max(W,H)*1.5;
      X.save();X.translate(e.x,e.y);X.rotate(e.angle);
      X.fillStyle='hsla(160,100%,70%,'+gAlpha*0.25+')';
      X.fillRect(-gw,-40*gAlpha,gw*2,80*gAlpha);
      X.fillStyle='hsla(140,100%,90%,'+gAlpha*0.6+')';
      X.fillRect(-gw,-6*gAlpha,gw*2,12*gAlpha);
      X.restore();
    }else if(e.type==='bigbang'){
      e.r=Math.max(W,H)*prog;
      var bbAlpha=Math.max(0,(1-prog*0.8));
      var bbg=X.createRadialGradient(e.x,e.y,0,e.x,e.y,e.r);
      bbg.addColorStop(0,'hsla(50,100%,95%,'+bbAlpha*0.8+')');
      bbg.addColorStop(0.2,'hsla(30,100%,60%,'+bbAlpha*0.4+')');
      bbg.addColorStop(0.4,'hsla(280,80%,50%,'+bbAlpha*0.2+')');
      bbg.addColorStop(0.7,'hsla(220,80%,30%,'+bbAlpha*0.1+')');
      bbg.addColorStop(1,'transparent');
      X.fillStyle=bbg;X.fillRect(0,0,W,H);
    }else if(e.type==='nebula'){
      // ambient glow
      var nAlpha=e.life<80?e.life/80:Math.min(0.15,prog*0.5);
      var ng=X.createRadialGradient(e.x,e.y,0,e.x,e.y,180);
      ng.addColorStop(0,'hsla('+e.hue+',60%,40%,'+nAlpha+')');
      ng.addColorStop(0.5,'hsla('+(e.hue+40)+',50%,30%,'+nAlpha*0.5+')');
      ng.addColorStop(1,'transparent');
      X.fillStyle=ng;X.fillRect(e.x-180,e.y-180,360,360);
    }
  }

  // Particles
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];
    if(p.gravity){
      var gdx=p.gravity.x-p.x,gdy=p.gravity.y-p.y;
      var gd=Math.sqrt(gdx*gdx+gdy*gdy);
      if(gd>2){p.vx+=gdx/gd*p.gravity.str;p.vy+=gdy/gd*p.gravity.str;}
    }
    p.x+=p.vx;p.y+=p.vy;
    p.life--;
    if(p.life<=0){particles.splice(i,1);continue;}
    var alpha3=Math.min(1,p.life/40);

    if(p.blob){
      X.fillStyle=p.col.replace(/[\d.]+\)$/,alpha3*0.03+')');
      X.beginPath();X.arc(p.x,p.y,p.size,0,Math.PI*2);X.fill();
    }else if(p.trail){
      X.strokeStyle=p.col.replace(')',','+alpha3*0.6+')').replace('hsl','hsla');
      X.lineWidth=p.size;
      X.beginPath();X.moveTo(p.x,p.y);X.lineTo(p.x-p.vx*3,p.y-p.vy*3);X.stroke();
      X.fillStyle=p.col;
      X.globalAlpha=alpha3;
      X.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
      X.globalAlpha=1;
    }else{
      X.fillStyle=p.col;
      X.globalAlpha=alpha3*0.8;
      X.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
      X.globalAlpha=1;
    }
  }

  // Vignette
  var vig=X.createRadialGradient(W/2,H/2,Math.min(W,H)*0.3,W/2,H/2,Math.max(W,H)*0.7);
  vig.addColorStop(0,'transparent');
  vig.addColorStop(1,'rgba(2,1,8,0.3)');
  X.fillStyle=vig;X.fillRect(0,0,W,H);

  requestAnimationFrame(frame);
}

// Keyboard
document.addEventListener('keydown',function(e){
