<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pass Forge</title>
<link rel="icon" href="https://emojicdn.elk.sh/🔐">
<meta property="og:title" content="Pass Forge">
<meta property="og:description" content="Generate strong passwords instantly. Toggle length, symbols, and more.">
<meta property="og:url" content="https://app.sloppy.live/pass-forge/">
<meta property="og:image" content="https://emojicdn.elk.sh/🔐?style=google">
<link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@300;500;700;900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0b0e11;--surface:#13171c;--border:#1e2530;
  --text:#e8eaed;--dim:#6b7280;--accent:#22d3ee;--accent2:#a78bfa;
  --green:#34d399;--red:#f87171;--orange:#fbbf24;
}
body{
  background:var(--bg);color:var(--text);
  font-family:'Azeret Mono',monospace;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:24px;
}
.container{max-width:520px;width:100%}
h1{
  font-family:'Instrument Serif',serif;font-weight:400;
  font-size:clamp(2.4rem,6vw,3.6rem);text-align:center;
  letter-spacing:-0.02em;margin-bottom:8px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.sub{text-align:center;color:var(--dim);font-size:0.75rem;margin-bottom:40px;font-weight:300}

.output-box{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:20px;margin-bottom:24px;
  position:relative;overflow:hidden;
}
.password-display{
  font-size:clamp(1.1rem,3.5vw,1.5rem);font-weight:700;
  word-break:break-all;line-height:1.5;min-height:3em;
  letter-spacing:0.04em;transition:opacity 0.15s;
}
.password-display .letter{color:var(--text)}
.password-display .digit{color:var(--accent)}
.password-display .symbol{color:var(--accent2)}

.strength-bar{
  height:3px;border-radius:2px;margin-top:16px;
  background:var(--border);overflow:hidden;
}
.strength-fill{height:100%;border-radius:2px;transition:width 0.4s,background 0.4s}
.strength-label{
  display:flex;justify-content:space-between;align-items:center;
  margin-top:8px;font-size:0.7rem;color:var(--dim);font-weight:300;
}

.actions{display:flex;gap:10px;margin-bottom:32px}
.btn{
  flex:1;padding:14px 16px;border:none;border-radius:10px;
  font-family:inherit;font-size:0.85rem;font-weight:500;
  cursor:pointer;transition:all 0.2s;
}
.btn-primary{background:var(--accent);color:var(--bg)}
.btn-primary:hover{filter:brightness(1.15);transform:translateY(-1px)}
.btn-primary:active{transform:translateY(0)}
.btn-secondary{background:var(--surface);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}
.btn.copied{background:var(--green);color:var(--bg)}

.controls{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:24px;
}
.control-group{margin-bottom:20px}
.control-group:last-child{margin-bottom:0}
.control-label{
  display:flex;justify-content:space-between;align-items:center;
  margin-bottom:10px;font-size:0.78rem;font-weight:500;
}
.length-val{
  font-size:1.1rem;font-weight:900;color:var(--accent);
  min-width:2ch;text-align:right;
}

input[type=range]{
  -webkit-appearance:none;width:100%;height:6px;
  background:var(--border);border-radius:3px;outline:none;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:20px;height:20px;
  background:var(--accent);border-radius:50%;cursor:pointer;
  box-shadow:0 0 12px rgba(34,211,238,0.4);
}
input[type=range]::-moz-range-thumb{
  width:20px;height:20px;background:var(--accent);
  border-radius:50%;cursor:pointer;border:none;
}

.toggles{display:flex;flex-wrap:wrap;gap:8px}
.toggle{
  display:flex;align-items:center;gap:8px;
  padding:8px 14px;border-radius:8px;
  background:var(--bg);border:1px solid var(--border);
  cursor:pointer;font-size:0.75rem;font-weight:500;
  transition:all 0.2s;user-select:none;
}
.toggle.active{border-color:var(--accent);color:var(--accent);background:rgba(34,211,238,0.06)}
.toggle-dot{
  width:8px;height:8px;border-radius:50%;
  background:var(--dim);transition:background 0.2s;
}
.toggle.active .toggle-dot{background:var(--accent)}

.back-link{
  text-align:center;margin-top:32px;
}
.back-link a{
  color:var(--dim);text-decoration:none;font-size:0.7rem;font-weight:300;
  transition:color 0.2s;
}
.back-link a:hover{color:var(--accent)}

@keyframes flash{0%{opacity:1}50%{opacity:0.4}100%{opacity:1}}
.flash{animation:flash 0.3s}
</style>
</head>
<body>
<div class="container">
  <h1>Pass Forge</h1>
  <p class="sub">strong passwords, zero tracking</p>

  <div class="output-box">
    <div class="password-display" id="pw-display"></div>
    <div class="strength-bar"><div class="strength-fill" id="str-fill"></div></div>
    <div class="strength-label">
      <span id="str-text">—</span>
      <span id="str-bits">0 bits</span>
    </div>
  </div>

  <div class="actions">
    <button class="btn btn-primary" id="gen-btn" onclick="generate()">Generate</button>
    <button class="btn btn-secondary" id="copy-btn" onclick="copyPw()">Copy</button>
  </div>

  <div class="controls">
    <div class="control-group">
      <div class="control-label">
        <span>Length</span>
        <span class="length-val" id="len-val">20</span>
      </div>
      <input type="range" id="len-slider" min="8" max="64" value="20" oninput="onLengthChange()">
    </div>

    <div class="control-group">
      <div class="control-label"><span>Character sets</span></div>
      <div class="toggles">
        <div class="toggle active" data-set="upper" onclick="toggleSet(this)">
          <div class="toggle-dot"></div>A-Z
        </div>
        <div class="toggle active" data-set="lower" onclick="toggleSet(this)">
          <div class="toggle-dot"></div>a-z
        </div>
        <div class="toggle active" data-set="digits" onclick="toggleSet(this)">
          <div class="toggle-dot"></div>0-9
        </div>
        <div class="toggle active" data-set="symbols" onclick="toggleSet(this)">
          <div class="toggle-dot"></div>!@#$
        </div>
      </div>
    </div>
  </div>

  <div class="back-link"><a href="https://sloppy.live">sloppy.live</a></div>
</div>

<script>
const CHARS = {
  upper: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
  lower: 'abcdefghijklmnopqrstuvwxyz',
  digits: '0123456789',
  symbols: '!@#$%^&*()-_=+[]{}|;:,.<>?'
};

const sets = { upper: true, lower: true, digits: true, symbols: true };
let currentPw = '';

function getPool() {
  let pool = '';
  for (const [k, v] of Object.entries(sets)) {
    if (v) pool += CHARS[k];
  }
  return pool;
}

function secureRandom(max) {
  const arr = new Uint32Array(1);
  crypto.getRandomValues(arr);
  return arr[0] % max;
}

function generate() {
  const pool = getPool();
  if (!pool) return;
  const len = parseInt(document.getElementById('len-slider').value);

  // Generate with guarantee that each active set has at least 1 char
  let pw;
  for (let attempt = 0; attempt < 50; attempt++) {
    let chars = [];
    for (let i = 0; i < len; i++) {
      chars.push(pool[secureRandom(pool.length)]);
    }
    // Check all active sets represented (if length allows)
    const activeSets = Object.entries(sets).filter(([,v]) => v);
    if (len >= activeSets.length) {
      let ok = true;
      for (const [k] of activeSets) {
        if (!chars.some(c => CHARS[k].includes(c))) {
          // Force one char from this set into a random position
          chars[secureRandom(len)] = CHARS[k][secureRandom(CHARS[k].length)];
        }
      }
    }
    pw = chars.join('');
    break;
  }

  currentPw = pw;
  renderPassword();
  updateStrength();

  const display = document.getElementById('pw-display');
  display.classList.remove('flash');
  void display.offsetWidth;
  display.classList.add('flash');

  // Reset copy button
  const copyBtn = document.getElementById('copy-btn');
  copyBtn.textContent = 'Copy';
  copyBtn.classList.remove('copied');
}

function renderPassword() {
  const display = document.getElementById('pw-display');
  display.innerHTML = currentPw.split('').map(c => {
    if (CHARS.digits.includes(c)) return `<span class="digit">${esc(c)}</span>`;
    if (CHARS.symbols.includes(c)) return `<span class="symbol">${esc(c)}</span>`;
    return `<span class="letter">${esc(c)}</span>`;
  }).join('');
}

function esc(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function updateStrength() {
  const pool = getPool();
  if (!pool || !currentPw) return;
  const bits = Math.floor(currentPw.length * Math.log2(pool.length));
  const fill = document.getElementById('str-fill');
  const text = document.getElementById('str-text');
  const bitsEl = document.getElementById('str-bits');

  bitsEl.textContent = bits + ' bits';

  let pct, color, label;
  if (bits < 40) { pct = 20; color = 'var(--red)'; label = 'Weak'; }
  else if (bits < 60) { pct = 40; color = 'var(--orange)'; label = 'Fair'; }
  else if (bits < 80) { pct = 60; color = 'var(--orange)'; label = 'Good'; }
  else if (bits < 100) { pct = 80; color = 'var(--green)'; label = 'Strong'; }
  else { pct = 100; color = 'var(--accent)'; label = 'Excellent'; }

  fill.style.width = pct + '%';
  fill.style.background = color;
  text.textContent = label;
  text.style.color = color;
}

function toggleSet(el) {
  const key = el.dataset.set;
  // Don't allow disabling all sets
  const activeCount = Object.values(sets).filter(Boolean).length;
  if (sets[key] && activeCount <= 1) return;

  sets[key] = !sets[key];
  el.classList.toggle('active', sets[key]);
  generate();
}

function onLengthChange() {
  document.getElementById('len-val').textContent = document.getElementById('len-slider').value;
  generate();
}

async function copyPw() {
  if (!currentPw) return;
  try {
    await navigator.clipboard.writeText(currentPw);
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  } catch(e) {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = currentPw;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    ta.remove();
    const btn = document.getElementById('copy-btn');
    btn.textContent = 'Copied';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
  }
}

// Generate on load
generate();
</script>
</body>
</html>
