<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Escape</title>
<link rel="icon" href="https://emojicdn.elk.sh/🔓">
<meta property="og:title" content="Neon Escape">
<meta property="og:description" content="Solve puzzles. Find codes. Escape the neon room.">
<meta property="og:url" content="https://sloppy.live/neon-escape">
<meta property="og:image" content="https://sloppy.live/neon-escape/og-image.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Fira+Code:wght@300;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a12;--panel:#0f0f1e;--border:#1a1a3a;
  --neon1:#00ffcc;--neon2:#ff00aa;--neon3:#ffcc00;--neon4:#00aaff;--neon5:#ff4444;
  --text:#c8d0e0;--dim:#4a5070;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Fira Code',monospace;overflow:hidden}
body{display:flex;flex-direction:column;align-items:center;justify-content:center}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 50% 40%,rgba(0,255,204,0.04),transparent 60%),radial-gradient(ellipse at 80% 80%,rgba(255,0,170,0.03),transparent 50%);pointer-events:none;z-index:0}

.game{width:min(520px,94vw);position:relative;z-index:1}
.hud{display:flex;justify-content:space-between;align-items:center;padding:8px 4px;font-size:11px}
.hud-left{display:flex;gap:12px;align-items:center}
.room-name{font-family:'Orbitron',sans-serif;font-size:clamp(11px,2.5vw,14px);color:var(--neon1);text-shadow:0 0 10px rgba(0,255,204,0.4);letter-spacing:2px}
.timer{font-family:'Orbitron',sans-serif;color:var(--neon3);text-shadow:0 0 8px rgba(255,204,0,0.3);font-size:13px}
.timer.warn{color:var(--neon5);animation:pulse 0.5s infinite}
@keyframes pulse{50%{opacity:0.5}}

.viewport{
  width:100%;aspect-ratio:4/3;background:var(--panel);
  border:2px solid var(--border);border-radius:12px;
  position:relative;overflow:hidden;cursor:default;
  box-shadow:0 0 40px rgba(0,255,204,0.06),inset 0 0 60px rgba(0,0,0,0.5);
}
.viewport::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent 0 3px,rgba(0,255,204,0.015) 3px 4px);pointer-events:none}

/* Rooms rendered via canvas-like divs */
.room{position:absolute;inset:0;display:none;flex-direction:column;padding:16px}
.room.active{display:flex}

/* Interactive objects */
.obj{
  position:absolute;cursor:pointer;transition:all 0.2s;
  border:1px solid transparent;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  font-size:24px;
}
.obj:hover{border-color:var(--neon1);box-shadow:0 0 15px rgba(0,255,204,0.3);transform:scale(1.08)}
.obj.collected{opacity:0.2;pointer-events:none}
.obj.solved{border-color:var(--neon1);box-shadow:0 0 20px rgba(0,255,204,0.5)}
.obj.locked{cursor:not-allowed}
.obj.locked:hover{border-color:var(--neon5);box-shadow:0 0 15px rgba(255,68,68,0.3)}

/* Wall decorations */
.wall-art{position:absolute;border:1px solid var(--border);border-radius:4px;background:rgba(255,255,255,0.02)}
.neon-line{position:absolute;height:2px;border-radius:1px;opacity:0.6}
.neon-line.h{width:100%}
.neon-line.v{width:2px;height:100%}

/* Floating text hints */
.hint-text{
  position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,0.85);border:1px solid var(--neon1);border-radius:8px;
  padding:8px 16px;font-size:12px;color:var(--neon1);white-space:nowrap;
  pointer-events:none;opacity:0;transition:opacity 0.3s;z-index:10;
  text-shadow:0 0 6px rgba(0,255,204,0.4);max-width:90%;text-align:center;
}
.hint-text.show{opacity:1}

/* Nav arrows */
.nav-arrows{display:flex;justify-content:center;gap:12px;margin-top:10px}
.nav-btn{
  background:var(--panel);border:1px solid var(--border);border-radius:8px;
  color:var(--dim);font-family:'Orbitron',sans-serif;font-size:10px;
  padding:8px 16px;cursor:pointer;transition:all 0.2s;letter-spacing:1px;
}
.nav-btn:hover{border-color:var(--neon1);color:var(--neon1);box-shadow:0 0 10px rgba(0,255,204,0.2)}
.nav-btn.disabled{opacity:0.2;pointer-events:none}

/* Modal for puzzles */
.modal-overlay{
  position:absolute;inset:0;background:rgba(0,0,0,0.88);
  display:none;align-items:center;justify-content:center;z-index:20;
  backdrop-filter:blur(4px);
}
.modal-overlay.open{display:flex}
.modal{
  background:var(--panel);border:2px solid var(--neon1);border-radius:14px;
  padding:20px;width:min(340px,88%);box-shadow:0 0 40px rgba(0,255,204,0.15);
  position:relative;
}
.modal h3{font-family:'Orbitron',sans-serif;font-size:14px;color:var(--neon1);margin-bottom:12px;letter-spacing:2px}
.modal p{font-size:12px;line-height:1.5;color:var(--text);margin-bottom:12px}
.modal-close{
  position:absolute;top:8px;right:12px;background:none;border:none;
  color:var(--dim);font-size:18px;cursor:pointer;
}
.modal-close:hover{color:var(--neon5)}
.modal input{
  width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;
  color:var(--neon1);font-family:'Fira Code',monospace;font-size:14px;
  padding:10px;text-align:center;letter-spacing:4px;outline:none;
}
.modal input:focus{border-color:var(--neon1);box-shadow:0 0 10px rgba(0,255,204,0.2)}
.modal input.wrong{border-color:var(--neon5);animation:shake 0.3s}
.modal input.correct{border-color:var(--neon1);background:rgba(0,255,204,0.1)}
@keyframes shake{25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
.modal .submit-btn{
  width:100%;margin-top:10px;padding:10px;background:transparent;
  border:1px solid var(--neon1);border-radius:6px;color:var(--neon1);
  font-family:'Orbitron',sans-serif;font-size:11px;cursor:pointer;
  letter-spacing:2px;transition:all 0.2s;
}
.modal .submit-btn:hover{background:rgba(0,255,204,0.1);box-shadow:0 0 15px rgba(0,255,204,0.2)}
.puzzle-hint{font-size:11px;color:var(--dim);margin-top:8px;font-style:italic}
.clue-item{
  display:flex;align-items:center;gap:8px;padding:6px 8px;
  background:rgba(0,255,204,0.05);border-radius:4px;margin-bottom:6px;
  font-size:11px;
}
.clue-item .icon{font-size:16px}

/* Inventory */
.inventory{
  display:flex;gap:6px;margin-top:10px;justify-content:center;flex-wrap:wrap;
  min-height:36px;
}
.inv-item{
  width:36px;height:36px;background:var(--panel);border:1px solid var(--border);
  border-radius:6px;display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:default;transition:all 0.2s;position:relative;
}
.inv-item.active{border-color:var(--neon3);box-shadow:0 0 10px rgba(255,204,0,0.3)}
.inv-item .inv-tip{
  position:absolute;bottom:110%;left:50%;transform:translateX(-50%);
  background:var(--bg);border:1px solid var(--border);border-radius:4px;
  padding:3px 8px;font-size:9px;white-space:nowrap;opacity:0;
  pointer-events:none;transition:opacity 0.2s;color:var(--dim);
}
.inv-item:hover .inv-tip{opacity:1}

/* Win screen */
.win-screen{
  position:absolute;inset:0;display:none;flex-direction:column;
  align-items:center;justify-content:center;z-index:30;
  background:rgba(0,0,0,0.92);backdrop-filter:blur(6px);
}
.win-screen.show{display:flex}
.win-screen h2{
  font-family:'Orbitron',sans-serif;font-size:clamp(22px,5vw,32px);
  color:var(--neon1);text-shadow:0 0 30px rgba(0,255,204,0.5);
  letter-spacing:4px;margin-bottom:8px;
}
.win-screen p{color:var(--dim);font-size:13px;margin-bottom:20px}
.win-screen .time-score{font-family:'Orbitron',sans-serif;font-size:18px;color:var(--neon3);margin-bottom:16px}
.win-screen button{
  background:transparent;border:2px solid var(--neon1);border-radius:8px;
  color:var(--neon1);font-family:'Orbitron',sans-serif;font-size:12px;
  padding:12px 28px;cursor:pointer;letter-spacing:2px;transition:all 0.2s;
}
.win-screen button:hover{background:rgba(0,255,204,0.1);box-shadow:0 0 20px rgba(0,255,204,0.3)}

@media(max-width:480px){
  .viewport{border-radius:8px}
  .obj{font-size:20px}
  .modal{padding:16px}
}
</style>
</head>
<body>

<div class="game">
  <div class="hud">
    <div class="hud-left">
      <div class="room-name" id="roomName">NORTH WALL</div>
    </div>
    <div class="timer" id="timer">10:00</div>
  </div>

  <div class="viewport" id="viewport">
    <!-- Room 0: North Wall -->
    <div class="room" id="room0" data-name="NORTH WALL">
      <div class="neon-line h" style="top:35%;background:var(--neon1);opacity:0.15"></div>
      <div class="neon-line h" style="top:70%;background:var(--neon2);opacity:0.1"></div>
      <!-- Painting with hidden symbol -->
      <div class="obj" id="obj-painting" style="left:10%;top:15%;width:100px;height:70px;font-size:14px;background:rgba(255,0,170,0.08);border:1px solid var(--neon2)" title="Strange painting">🖼️</div>
      <!-- Locked safe -->
      <div class="obj locked" id="obj-safe" style="right:12%;top:20%;width:70px;height:60px;background:rgba(0,170,255,0.08);border:1px solid var(--neon4)" title="Digital safe">🔒</div>
      <!-- Clock with clue -->
      <div class="obj" id="obj-clock" style="left:42%;top:8%;width:60px;height:60px" title="Neon clock">🕐</div>
      <!-- Floor vent -->
      <div class="obj" id="obj-vent" style="left:35%;bottom:8%;width:80px;height:30px;font-size:16px;background:rgba(255,255,255,0.03)" title="Floor vent">▓▓▓</div>
    </div>

    <!-- Room 1: East Wall -->
    <div class="room" id="room1" data-name="EAST WALL">
      <div class="neon-line v" style="left:25%;background:var(--neon3);opacity:0.12"></div>
      <div class="neon-line v" style="left:75%;background:var(--neon4);opacity:0.12"></div>
      <!-- Bookshelf -->
      <div class="obj" id="obj-books" style="left:8%;top:15%;width:90px;height:110px;font-size:28px;background:rgba(255,204,0,0.05)" title="Bookshelf">📚</div>
      <!-- Computer terminal -->
      <div class="obj" id="obj-terminal" style="right:10%;top:30%;width:80px;height:65px;background:rgba(0,255,204,0.06);border:1px solid var(--neon1)" title="Terminal">💻</div>
      <!-- Poster with numbers -->
      <div class="obj" id="obj-poster" style="left:45%;top:10%;width:60px;height:80px;font-size:14px;background:rgba(255,68,68,0.06)" title="Neon poster">📜</div>
    </div>

    <!-- Room 2: South Wall (Door) -->
    <div class="room" id="room2" data-name="SOUTH WALL">
      <div class="neon-line h" style="top:50%;background:var(--neon5);opacity:0.1"></div>
      <!-- The exit door -->
      <div class="obj locked" id="obj-door" style="left:30%;top:10%;width:120px;height:150px;font-size:40px;background:rgba(0,255,204,0.04);border:2px solid var(--neon5)" title="Exit door">🚪</div>
      <!-- Light switch -->
      <div class="obj" id="obj-switch" style="right:15%;top:40%;width:40px;height:55px;font-size:16px;background:rgba(255,204,0,0.06)" title="Switch panel">🔘</div>
      <!-- Trash bin -->
      <div class="obj" id="obj-trash" style="left:8%;bottom:12%;width:50px;height:50px" title="Trash bin">🗑️</div>
    </div>

    <!-- Room 3: West Wall -->
    <div class="room" id="room3" data-name="WEST WALL">
      <div class="neon-line v" style="left:50%;background:var(--neon2);opacity:0.1"></div>
      <!-- Mirror -->
      <div class="obj" id="obj-mirror" style="left:15%;top:18%;width:70px;height:90px;font-size:14px;background:rgba(0,170,255,0.06);border:1px solid var(--neon4)" title="Mirror">🪞</div>
      <!-- Drawer -->
      <div class="obj" id="obj-drawer" style="right:12%;top:50%;width:90px;height:45px;font-size:16px;background:rgba(255,255,255,0.03)" title="Desk drawer">🗄️</div>
      <!-- Weird symbol on wall -->
      <div class="obj" id="obj-symbol" style="left:50%;top:8%;width:50px;height:50px" title="Glowing symbol">✦</div>
      <!-- Plant -->
      <div class="obj" id="obj-plant" style="left:60%;bottom:10%;width:50px;height:55px" title="Neon plant">🌿</div>
    </div>

    <!-- Hint overlay -->
    <div class="hint-text" id="hintText"></div>
    <!-- Puzzle modal -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal" id="modal">
        <button class="modal-close" id="modalClose">×</button>
        <h3 id="modalTitle">PUZZLE</h3>
        <div id="modalBody"></div>
      </div>
    </div>
    <!-- Win screen -->
    <div class="win-screen" id="winScreen">
      <h2>ESCAPED</h2>
      <p>you broke the neon cage</p>
      <div class="time-score" id="winTime">00:00</div>
      <button onclick="location.reload()">PLAY AGAIN</button>
    </div>
  </div>

  <div class="nav-arrows">
    <button class="nav-btn" id="navLeft">◄ LEFT</button>
    <button class="nav-btn" id="navRight">RIGHT ►</button>
  </div>

  <div class="inventory" id="inventory"></div>
</div>

<script>
(function(){
'use strict';

// ======== GAME STATE ========
const S = {
  room: 0, // 0=north, 1=east, 2=south, 3=west
  inventory: [],    // item IDs
  flags: {},        // solved puzzles, found clues
  startTime: Date.now(),
  timerInterval: null,
  won: false,
  switchState: [false, false, false], // 3 switches for puzzle
};

// ======== PUZZLE DATA ========
// The game has 5 interconnected puzzles:
// 1. Painting → reveals symbol clue (triangle pattern)
// 2. Books → color-coded page numbers → safe code (3 digits)
// 3. Safe (needs code) → gives USB key
// 4. Terminal (needs USB) → reveals door code pattern
// 5. Door (needs final 4-digit code from combining clues)
//
// Side discoveries:
// - Clock shows time frozen at 7:42 → clue
// - Vent has a screwdriver
// - Mirror reflects text backward → "FLIP"
// - Poster has neon equation: ◈ = 3, ✦ = 7, ◇ = 2
// - Drawer needs screwdriver → has UV torch
// - Plant pot has note fragment: "last digit = switches count"
// - Switch panel: 3 toggle switches, but need UV torch to see labels
// - Trash has crumpled note: "safe wants the prime trio from the shelf"

const SAFE_CODE = '372'; // From books: primes on colored spines
const DOOR_CODE = '7423'; // Clock(7,42) + mirror(flip→4 from symbol) + switches(3)
// Actually let me make it cleaner:
// digit 1: clock hour = 7
// digit 2: poster equation ◈+✦-◇ = 3+7-2 = 8... no
// Let me keep it simple and fun:
// DOOR CODE = 7423
// 7 = from clock (hour hand)
// 4 = number of rooms
// 2 = mirror clue (reversed "2" on back)
// 3 = switch count (activate all 3 switches)

const HINTS = {};

// ======== DOM ========
const $ = id => document.getElementById(id);
const rooms = [0,1,2,3].map(i => $('room'+i));
const roomNameEl = $('roomName');
const timerEl = $('timer');
const hintEl = $('hintText');
const modalOverlay = $('modalOverlay');
const modalTitle = $('modalTitle');
const modalBody = $('modalBody');
const invEl = $('inventory');
const winScreen = $('winScreen');
const winTime = $('winTime');

let hintTimer = null;

// ======== ROOM NAV ========
function showRoom(idx) {
  S.room = ((idx % 4) + 4) % 4;
  rooms.forEach((r,i) => r.classList.toggle('active', i === S.room));
  roomNameEl.textContent = rooms[S.room].dataset.name;
  hideHint();
}

$('navLeft').onclick = () => showRoom(S.room - 1);
$('navRight').onclick = () => showRoom(S.room + 1);
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft') showRoom(S.room - 1);
  if (e.key === 'ArrowRight') showRoom(S.room + 1);
  if (e.key === 'Escape') closeModal();
});

// ======== HINT SYSTEM ========
function showHint(text, duration = 3000) {
  hintEl.textContent = text;
  hintEl.classList.add('show');
  if (hintTimer) clearTimeout(hintTimer);
  hintTimer = setTimeout(() => hintEl.classList.remove('show'), duration);
}
function hideHint() { hintEl.classList.remove('show'); }

// ======== MODAL ========
function openModal(title, bodyHTML) {
  modalTitle.textContent = title;
  modalBody.innerHTML = bodyHTML;
  modalOverlay.classList.add('open');
}
function closeModal() {
  modalOverlay.classList.remove('open');
}
$('modalClose').onclick = closeModal;
modalOverlay.addEventListener('click', e => { if (e.target === modalOverlay) closeModal(); });

// ======== INVENTORY ========
function addItem(id, emoji, name) {
  if (S.inventory.includes(id)) return;
  S.inventory.push(id);
  renderInventory();
  showHint(`Found: ${name}`, 2500);
}
function hasItem(id) { return S.inventory.includes(id); }
function removeItem(id) {
  S.inventory = S.inventory.filter(i => i !== id);
  renderInventory();
}
function renderInventory() {
  invEl.innerHTML = '';
  const items = {
    screwdriver: { emoji: '🪛', name: 'Screwdriver' },
    usb: { emoji: '💾', name: 'USB Key' },
    uvtorch: { emoji: '🔦', name: 'UV Torch' },
    note_fragment: { emoji: '📝', name: 'Note Fragment' },
  };
  S.inventory.forEach(id => {
    const info = items[id] || { emoji: '❓', name: id };
    const div = document.createElement('div');
    div.className = 'inv-item';
    div.innerHTML = `${info.emoji}<div class="inv-tip">${info.name}</div>`;
    invEl.appendChild(div);
  });
}

// ======== TIMER ========
function startTimer() {
  S.startTime = Date.now();
  S.timerInterval = setInterval(() => {
    if (S.won) return;
    const elapsed = Math.floor((Date.now() - S.startTime) / 1000);
    const min = Math.floor(elapsed / 60);
    const sec = elapsed % 60;
    timerEl.textContent = `${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
    if (elapsed > 540) timerEl.classList.add('warn');
  }, 250);
}

// ======== OBJECT INTERACTIONS ========

// -- PAINTING (North) --
$('obj-painting').onclick = () => {
  if (S.flags.painting_seen) {
    openModal('PAINTING', `
      <p>A neon abstract painting. Three shapes glow faintly in the corner:</p>
      <div style="font-size:28px;text-align:center;padding:12px;letter-spacing:12px;color:var(--neon2)">◈ ✦ ◇</div>
      <p class="puzzle-hint">The shapes match symbols elsewhere in the room...</p>
    `);
  } else {
    S.flags.painting_seen = true;
    openModal('PAINTING', `
      <p>You tilt the painting. Behind it, three glowing symbols are etched into the wall:</p>
      <div style="font-size:28px;text-align:center;padding:12px;letter-spacing:12px;color:var(--neon2)">◈ ✦ ◇</div>
      <p class="puzzle-hint">These symbols must mean something...</p>
    `);
    showHint('The painting hides symbols: ◈ ✦ ◇', 3500);
  }
};

// -- CLOCK (North) --
$('obj-clock').onclick = () => {
  S.flags.clock_seen = true;
  openModal('NEON CLOCK', `
    <p>A wall clock frozen in neon. The hands are stuck.</p>
    <div style="font-size:42px;text-align:center;padding:16px">🕖</div>
    <p style="text-align:center;color:var(--neon3);font-family:'Orbitron',sans-serif;font-size:18px;letter-spacing:4px">7 : 4 2</p>
    <p class="puzzle-hint">Time stopped at 7:42. The first digit stands out...</p>
  `);
};

// -- VENT (North) --
$('obj-vent').onclick = () => {
  if (S.flags.vent_opened) {
    showHint('The vent is empty now.', 2000);
    return;
  }
  S.flags.vent_opened = true;
  $('obj-vent').classList.add('collected');
  addItem('screwdriver', '🪛', 'Screwdriver');
  openModal('FLOOR VENT', `
    <p>You pry open the floor vent and find a small screwdriver tucked inside.</p>
    <div style="font-size:36px;text-align:center;padding:12px">🪛</div>
    <p class="puzzle-hint">This might open something...</p>
  `);
};

// -- SAFE (North) --
$('obj-safe').onclick = () => {
  if (S.flags.safe_solved) {
    showHint('Safe is already open.', 2000);
    return;
  }
  openModal('DIGITAL SAFE', `
    <p>A 3-digit combination safe. The display pulses ${S.flags.poster_seen ? 'with a faint symbol glow.' : 'coldly.'}</p>
    ${S.flags.trash_seen ? '<p style="color:var(--neon3);font-size:11px">Remember: "the prime trio from the shelf"</p>' : ''}
    <input type="text" id="safeInput" maxlength="3" placeholder="_ _ _" autocomplete="off" inputmode="numeric">
    <button class="submit-btn" id="safeSubmit">UNLOCK</button>
    <p class="puzzle-hint">${S.flags.books_seen ? 'The colored books had numbers: <span style="color:#ff4444">3</span>, <span style="color:#ffcc00">7</span>, <span style="color:#00aaff">2</span>' : 'Three digits. There must be a clue somewhere...'}</p>
  `);
  setTimeout(() => {
    const inp = $('safeInput');
    const btn = $('safeSubmit');
    if (!inp || !btn) return;
    inp.focus();
    const tryCode = () => {
      const v = inp.value.trim();
      if (v === SAFE_CODE) {
        inp.classList.add('correct');
        S.flags.safe_solved = true;
        $('obj-safe').classList.remove('locked');
        $('obj-safe').classList.add('solved');
        $('obj-safe').textContent = '🔓';
        addItem('usb', '💾', 'USB Key');
        setTimeout(() => {
          closeModal();
          showHint('Safe opened! Got a USB key.', 3000);
        }, 600);
      } else {

// -- DOOR (South) --
$('obj-door').onclick = () => {
  if (S.flags.door_solved) return;
  if (!S.flags.terminal_used) {
    showHint('The door has a 4-digit keypad. You need more clues.', 3000);
    return;
  }
  const switchesDone = S.switchState.every(Boolean);
  openModal('EXIT DOOR', `
    <p>A heavy door with a neon keypad. Four digits to freedom.</p>
    ${S.flags.terminal_used ? `
    <div style="font-size:11px;color:var(--dim);margin-bottom:10px;line-height:1.6">
      <div>1: the frozen hour → <span style="color:${S.flags.clock_seen ? 'var(--neon1)' : 'var(--dim)'}">${S.flags.clock_seen ? '7' : '?'}</span></div>
      <div>2: walls in this room → <span style="color:var(--neon1)">4</span></div>
      <div>3: what the mirror shows → <span style="color:${S.flags.mirror_seen ? 'var(--neon1)' : 'var(--dim)'}">${S.flags.mirror_seen ? '2' : '?'}</span></div>
      <div>4: activate all switches → <span style="color:${switchesDone ? 'var(--neon1)' : 'var(--neon5)'}">${switchesDone ? '3' : 'not done'}</span></div>
    </div>
    ` : ''}
    <input type="text" id="doorInput" maxlength="4" placeholder="_ _ _ _" autocomplete="off" inputmode="numeric">
    <button class="submit-btn" id="doorSubmit">OVERRIDE</button>
    <p class="puzzle-hint">${!switchesDone ? 'Have you activated all the switches?' : 'You have all the clues. Enter the code.'}</p>
  `);
  setTimeout(() => {
    const inp = $('doorInput');
    const btn = $('doorSubmit');
    if (!inp || !btn) return;
    inp.focus();
    const tryCode = () => {
      const v = inp.value.trim();
      if (v === DOOR_CODE) {
        inp.classList.add('correct');
        S.flags.door_solved = true;
        S.won = true;
        $('obj-door').classList.remove('locked');
        $('obj-door').classList.add('solved');
        $('obj-door').textContent = '🚪✨';
        setTimeout(() => {
          closeModal();
          const elapsed = Math.floor((Date.now() - S.startTime) / 1000);
          const min = Math.floor(elapsed / 60);
          const sec = elapsed % 60;
          winTime.textContent = `${String(min).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
          winScreen.classList.add('show');
          clearInterval(S.timerInterval);
        }, 800);
      } else {
        inp.classList.add('wrong');
        setTimeout(() => inp.classList.remove('wrong'), 400);
        showHint('ACCESS DENIED', 1500);
      }
    };
    btn.onclick = tryCode;
    inp.onkeydown = e => { if (e.key === 'Enter') tryCode(); };
  }, 50);
};

// ======== AUDIO ========
let audioCtx = null;
function beep(freq, dur, type='sine', vol=0.06) {
  if (!audioCtx) { try { audioCtx = new (window.AudioContext||window.webkitAudioContext)(); } catch { return; } }
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g).connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}

// Click sounds on objects
document.querySelectorAll('.obj').forEach(el => {
  el.addEventListener('click', () => beep(660, 0.08, 'triangle', 0.04));
});

// Nav sounds
$('navLeft').addEventListener('click', () => beep(440, 0.06, 'sine', 0.03));
$('navRight').addEventListener('click', () => beep(550, 0.06, 'sine', 0.03));
