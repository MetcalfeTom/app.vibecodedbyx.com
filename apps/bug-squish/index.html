<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bug Squish — Hammer Time</title>
<link rel="icon" href="https://emojicdn.elk.sh/🔨">
<meta property="og:title" content="Bug Squish">
<meta property="og:description" content="Squish increasingly glitchy bugs with a giant hammer. How many waves can you survive?">
<meta property="og:url" content="https://app.sloppy.live/bug-squish/">
<meta property="og:image" content="https://emojicdn.elk.sh/🔨?style=google">
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a10;color:#aaa;font-family:'Share Tech Mono',monospace;min-height:100vh;overflow:hidden}
canvas{display:block;cursor:none;touch-action:none}
.hud{position:fixed;top:0;left:0;width:100%;display:flex;justify-content:space-between;padding:8px 16px;z-index:5;pointer-events:none}
.hud-val{font-family:'Bungee',sans-serif;font-size:clamp(14px,3vw,22px);text-shadow:0 0 8px rgba(255,100,50,0.4)}
.hud .score{color:#ff6633}.hud .wave{color:#44ddff}.hud .combo{color:#ffcc00}.hud .missed{color:#ff3344}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:10;background:rgba(10,10,16,0.8)}
.overlay.hidden{display:none}
.overlay-box{text-align:center;font-family:'Bungee',sans-serif}
.overlay-box h2{font-size:clamp(22px,6vw,42px);color:#ff6633;margin-bottom:8px;text-shadow:0 0 15px rgba(255,102,51,0.5)}
.overlay-box p{font-family:'Share Tech Mono',monospace;font-size:13px;color:#888;margin:4px 0;line-height:1.6}
.overlay-box button{font-family:'Bungee',sans-serif;font-size:14px;background:#ff6633;color:#0a0a10;border:none;padding:10px 24px;cursor:pointer;border-radius:4px;margin-top:10px}
.overlay-box button:hover{background:#ff8855}
aa</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud">
<span class="hud-val score" id="scoreText">0</span>
<span class="hud-val wave" id="waveText">WAVE 1</span>
<span class="hud-val combo" id="comboText"></span>
<span class="hud-val missed" id="missedText">♥♥♥</span>
</div>
<div class="overlay" id="startOverlay">
<div class="overlay-box">
<h2>BUG SQUISH</h2>
<p>Squish the bugs with your hammer!<br>They get glitchier every wave.<br>Don't let too many escape!</p>
<button onclick="startGame()">SQUISH</button>
</div>
</div>
<div class="overlay hidden" id="gameOverOverlay">
<div class="overlay-box">
<h2>BUGS WIN</h2>
<p id="goStats">Score: 0 — Wave: 1</p>
<button onclick="startGame()">RETRY</button>
</div>
</div>
<script>
const C=document.getElementById('c');
const ctx=C.getContext('2d');
let W,H;
function resize(){W=C.width=window.innerWidth;H=C.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

let mouseX=W/2,mouseY=H/2;
let frame=0,score=0,wave=1,combo=0,maxCombo=0,missed=0,maxMissed=5;
let gameState='menu',bugs=[],splats=[],particles=[],texts=[];
let hammerSmash=0,hammerAngle=0;
let bugsPerWave=5,bugsSpawned=0,bugsKilled=0,spawnTimer=0;

// Bug types — get glitchier with waves
const BUG_BASE=[
  {name:'ant',size:12,speed:1,hp:1,pts:10,color:'#885533',legs:6},
  {name:'beetle',size:16,speed:0.7,hp:2,pts:25,color:'#336655',legs:6},
  {name:'roach',size:14,speed:1.5,hp:1,pts:15,color:'#664422',legs:6},
  {name:'spider',size:18,speed:0.8,hp:2,pts:30,color:'#553344',legs:8},
  {name:'centipede',size:20,speed:1.2,hp:3,pts:50,color:'#445533',legs:12},
];

function rng(a,b){return a+Math.random()*(b-a);}

function spawnBug(){
  const typeIdx=Math.min(BUG_BASE.length-1,Math.floor(Math.random()*(Math.min(wave,BUG_BASE.length))));
  const base=BUG_BASE[typeIdx];
  const glitch=Math.min(wave*0.1,1); // 0..1 glitchiness
  const side=Math.floor(Math.random()*4);
  let x,y;
  if(side===0){x=rng(0,W);y=-30;}
  else if(side===1){x=rng(0,W);y=H+30;}
  else if(side===2){x=-30;y=rng(0,H);}
  else{x=W+30;y=rng(0,H);}

  const targetX=rng(W*0.2,W*0.8);
  const targetY=rng(H*0.2,H*0.8);
  const spd=base.speed*(1+wave*0.05);

  bugs.push({
    x,y,targetX,targetY,
    size:base.size*(1+wave*0.02),
    speed:spd,
    hp:base.hp+Math.floor(wave/5),
    maxHp:base.hp+Math.floor(wave/5),
    pts:base.pts*(1+Math.floor(wave/3)),
    color:base.color,
    legs:base.legs,
    name:base.name,
    glitch,
    legPhase:Math.random()*Math.PI*2,
    wobble:Math.random()*Math.PI*2,
    alive:true,
    escapeTimer:200+Math.random()*150-wave*3,
    flash:0,
    glitchOffset:{x:0,y:0},
    teleportTimer:glitch>0.5?60+Math.random()*60:9999,
    splitChance:glitch>0.7?0.3:0,
  });
}

function startGame(){
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('gameOverOverlay').classList.add('hidden');
  gameState='playing';score=0;wave=1;combo=0;maxCombo=0;missed=0;
  bugs=[];splats=[];particles=[];texts=[];
  bugsPerWave=5;bugsSpawned=0;bugsKilled=0;spawnTimer=0;frame=0;
}

// Audio
let audioCtx;
function ensureAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playSmash(){const c=ensureAudio(),n=c.currentTime;const buf=c.createBuffer(1,c.sampleRate*0.15,c.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(c.sampleRate*0.03));const s=c.createBufferSource(),g=c.createGain();s.buffer=buf;g.gain.setValueAtTime(0.15,n);s.connect(g);g.connect(c.destination);s.start(n);
const o=c.createOscillator(),g2=c.createGain();o.type='sine';o.frequency.setValueAtTime(100,n);o.frequency.exponentialRampToValueAtTime(30,n+0.1);g2.gain.setValueAtTime(0.1,n);g2.gain.linearRampToValueAtTime(0,n+0.1);o.connect(g2);g2.connect(c.destination);o.start(n);o.stop(n+0.1);}
function playMiss(){const c=ensureAudio(),n=c.currentTime;const o=c.createOscillator(),g=c.createGain();o.type='triangle';o.frequency.value=200;g.gain.setValueAtTime(0.04,n);g.gain.linearRampToValueAtTime(0,n+0.1);o.connect(g);g.connect(c.destination);o.start(n);o.stop(n+0.1);}
function playEscape(){const c=ensureAudio(),n=c.currentTime;const o=c.createOscillator(),g=c.createGain();o.type='square';o.frequency.setValueAtTime(400,n);o.frequency.linearRampToValueAtTime(200,n+0.15);g.gain.setValueAtTime(0.04,n);g.gain.linearRampToValueAtTime(0,n+0.15);o.connect(g);g.connect(c.destination);o.start(n);o.stop(n+0.15);}
function playWaveChime(){const c=ensureAudio(),n=c.currentTime;[523,659,784,1047].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0.04,n+i*0.1);g.gain.linearRampToValueAtTime(0,n+i*0.1+0.2);o.connect(g);g.connect(c.destination);o.start(n+i*0.1);o.stop(n+i*0.1+0.2);});}

// Input
C.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;});
C.addEventListener('touchmove',e=>{e.preventDefault();mouseX=e.touches[0].clientX;mouseY=e.touches[0].clientY;},{passive:false});

function smash(){
  if(gameState!=='playing')return;
  hammerSmash=10;
  let hit=false;
  bugs.forEach(b=>{
    if(!b.alive)return;
    const dist=Math.hypot(b.x-mouseX,b.y-mouseY);
    if(dist<b.size+20){
      b.hp--;
      b.flash=6;
      if(b.hp<=0){
        b.alive=false;
        bugsKilled++;
        combo++;
        if(combo>maxCombo)maxCombo=combo;
        const mult=Math.min(combo,10);
        const pts=b.pts*mult;
        score+=pts;
        hit=true;
        // Splat
        splats.push({x:b.x,y:b.y,size:b.size*1.5,color:b.color,life:300,glitch:b.glitch});
        // Particles
        for(let i=0;i<8+b.size;i++){
          const a=Math.PI*2*Math.random();
          particles.push({x:b.x,y:b.y,vx:Math.cos(a)*(2+Math.random()*3),vy:Math.sin(a)*(2+Math.random()*3),life:20+Math.random()*15,maxLife:35,color:b.color,size:2+Math.random()*2});
        }
        // Score text
        texts.push({x:b.x,y:b.y-20,text:'+'+pts+(combo>1?' x'+combo:''),life:40,color:combo>=5?'#ffcc00':combo>=3?'#ff8844':'#fff'});
        // Split chance (glitchy bugs)
        if(Math.random()<b.splitChance){
          for(let j=0;j<2;j++){
            const nb={...b,x:b.x+(Math.random()-0.5)*30,y:b.y+(Math.random()-0.5)*30,
              size:b.size*0.7,hp:1,maxHp:1,pts:Math.floor(b.pts*0.5),alive:true,
              escapeTimer:100+Math.random()*60,flash:0,speed:b.speed*1.3,
              targetX:rng(W*0.1,W*0.9),targetY:rng(H*0.1,H*0.9),splitChance:0};
            bugs.push(nb);
          }
          texts.push({x:b.x,y:b.y-40,text:'SPLIT!',life:30,color:'#ff44aa'});
        }
      }
      playSmash();
    }
  });
  if(!hit){combo=0;playMiss();}
}

C.addEventListener('mousedown',smash);
C.addEventListener('touchstart',e=>{e.preventDefault();mouseX=e.touches[0].clientX;mouseY=e.touches[0].clientY;smash();},{passive:false});

function update(){
  if(gameState!=='playing')return;
  frame++;

  // Spawn bugs
  spawnTimer--;
  if(spawnTimer<=0&&bugsSpawned<bugsPerWave){
    spawnBug();bugsSpawned++;
    spawnTimer=Math.max(10,40-wave*2);
  }

  // Update bugs
  bugs.forEach(b=>{
    if(!b.alive)return;
    b.legPhase+=b.speed*0.15;
    b.wobble+=0.03;
    b.flash=Math.max(0,b.flash-1);

    // Glitch effects
    if(b.glitch>0.3){
      b.glitchOffset.x=Math.sin(frame*0.5+b.wobble)*(b.glitch*4);
      b.glitchOffset.y=Math.cos(frame*0.7+b.wobble)*(b.glitch*2);
    }
    // Teleport (very glitchy bugs)
    b.teleportTimer--;
    if(b.teleportTimer<=0){
      b.x+=rng(-60,60);b.y+=rng(-60,60);
      b.x=Math.max(20,Math.min(W-20,b.x));
      b.y=Math.max(20,Math.min(H-20,b.y));
      b.teleportTimer=40+Math.random()*40;
      // Teleport particles
      for(let i=0;i<4;i++)particles.push({x:b.x,y:b.y,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,life:10,maxLife:10,color:'#aa44ff',size:2});
    }

    // Movement toward target
    const dx=b.targetX-b.x,dy=b.targetY-b.y;
    const dist=Math.hypot(dx,dy);
    if(dist>5){
      b.x+=dx/dist*b.speed;
      b.y+=dy/dist*b.speed;
    }else{
      b.targetX=rng(W*0.1,W*0.9);b.targetY=rng(H*0.1,H*0.9);
    }

    // Escape
    b.escapeTimer--;
    if(b.escapeTimer<=0){
      b.alive=false;missed++;playEscape();
      texts.push({x:b.x,y:b.y-10,text:'ESCAPED!',life:30,color:'#ff3344'});
    }
  });

  bugs=bugs.filter(b=>b.alive||b.flash>0);

  // Wave complete
  if(bugsSpawned>=bugsPerWave&&bugs.filter(b=>b.alive).length===0){
    wave++;bugsPerWave=5+wave*2;bugsSpawned=0;bugsKilled=0;
    playWaveChime();
    texts.push({x:W/2,y:H/2,text:'WAVE '+wave,life:60,color:'#44ddff',big:true});
  }

  // Game over
  if(missed>=maxMissed){
    gameState='over';
    document.getElementById('goStats').textContent='Score: '+score+' — Wave: '+wave+' — Max Combo: x'+maxCombo;
    document.getElementById('gameOverOverlay').classList.remove('hidden');
  }

  // Particles
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=0.95;p.vy*=0.95;p.life--;});
  particles=particles.filter(p=>p.life>0);

  // Texts
  texts.forEach(t=>{t.y-=1;t.life--;});
  texts=texts.filter(t=>t.life>0);

  // Splats fade
  splats.forEach(s=>s.life--);
  splats=splats.filter(s=>s.life>0);

  if(hammerSmash>0)hammerSmash--;
  hammerAngle=Math.sin(frame*0.003)*0.05;

  // HUD
  document.getElementById('scoreText').textContent=score;
  document.getElementById('waveText').textContent='WAVE '+wave;
  document.getElementById('comboText').textContent=combo>1?'x'+combo+' COMBO':'';
  const hearts=maxMissed-missed;
  document.getElementById('missedText').textContent='♥'.repeat(Math.max(0,hearts));
}

function drawBug(b){
  if(!b.alive&&b.flash<=0)return;
  ctx.save();
  ctx.translate(b.x+b.glitchOffset.x,b.y+b.glitchOffset.y);

  const s=b.size;
  const flash=b.flash>0;
  const col=flash?'#ffffff':b.color;
  const glitchDraw=b.glitch>0.3&&frame%3===0;

  // Glitch: chromatic offset
  if(b.glitch>0.5){
    ctx.globalAlpha=0.15;
    ctx.save();ctx.translate(b.glitch*3,0);
    drawBugBody(s,b,'#ff0000',b.legs,b.legPhase);
    ctx.restore();
    ctx.save();ctx.translate(-b.glitch*3,0);
    drawBugBody(s,b,'#0000ff',b.legs,b.legPhase);
    ctx.restore();
    ctx.globalAlpha=1;
  }

  // Glitch: random rectangles
  if(glitchDraw){
    ctx.fillStyle=b.color+'80';
    ctx.fillRect((Math.random()-0.5)*s*2,(Math.random()-0.5)*s*2,s*Math.random(),3);
  }

  drawBugBody(s,b,col,b.legs,b.legPhase);
  ctx.restore();
}

function drawBugBody(s,b,col,legs,legPhase){
  // Legs
  ctx.strokeStyle=col;ctx.lineWidth=1.5;
  for(let i=0;i<legs;i++){
    const side=i%2===0?-1:1;
    const idx=Math.floor(i/2);
    const spread=idx/(legs/2-1)*0.8-0.4;
    const legAngle=spread+side*0.3+Math.sin(legPhase+idx)*0.3;
    const lx=Math.cos(legAngle+Math.PI/2*side)*s*0.8;
    const ly=Math.sin(legAngle)*s*0.5;
    ctx.beginPath();ctx.moveTo(side*s*0.3,spread*s*0.5);
    ctx.lineTo(side*s*0.3+lx,spread*s*0.5+ly);ctx.stroke();
  }

  // Body
  ctx.fillStyle=col;
  ctx.beginPath();ctx.ellipse(0,0,s*0.45,s*0.3,0,0,Math.PI*2);ctx.fill();
  // Head
  ctx.beginPath();ctx.arc(0,-s*0.3,s*0.25,0,Math.PI*2);ctx.fill();
  // Eyes
  ctx.fillStyle=b.glitch>0.5?'#ff0044':'#cc0000';
  ctx.beginPath();ctx.arc(-s*0.1,-s*0.35,s*0.07,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(s*0.1,-s*0.35,s*0.07,0,Math.PI*2);ctx.fill();
  // Eye glow for glitchy bugs
  if(b.glitch>0.3){
    ctx.shadowColor='#ff0044';ctx.shadowBlur=b.glitch*8;
    ctx.beginPath();ctx.arc(-s*0.1,-s*0.35,s*0.04,0,Math.PI*2);ctx.fillStyle='#ff4466';ctx.fill();
    ctx.beginPath();ctx.arc(s*0.1,-s*0.35,s*0.04,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  }
  // Shell marking
  ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(0,-s*0.1);ctx.lineTo(0,s*0.25);ctx.stroke();

  // HP bar for multi-hit bugs
  if(b.maxHp>1&&b.alive){
    const bw=s*0.8;
    ctx.fillStyle='#220000';ctx.fillRect(-bw/2,-s*0.55,bw,3);
    ctx.fillStyle='#ff2222';ctx.fillRect(-bw/2,-s*0.55,bw*(b.hp/b.maxHp),3);
  }

  // Escape warning
  if(b.escapeTimer<60&&b.alive){
    ctx.font='8px Share Tech Mono';ctx.fillStyle=`rgba(255,50,50,${0.5+Math.sin(frame*0.2)*0.3})`;
    ctx.textAlign='center';ctx.fillText('!',0,-s*0.65);
  }
}

function drawHammer(){
  ctx.save();
  ctx.translate(mouseX,mouseY);
  const smashAngle=hammerSmash>0?0.5:-0.3+hammerAngle;
  const smashY=hammerSmash>0?10:0;
  ctx.rotate(smashAngle);
  ctx.translate(0,smashY);

  // Handle
  ctx.fillStyle='#8B5E3C';
  ctx.fillRect(-4,-70,8,55);
  ctx.strokeStyle='#6B4226';ctx.lineWidth=1;ctx.strokeRect(-4,-70,8,55);
  // Grip lines
  ctx.strokeStyle='#5a3a1a';
  for(let i=0;i<4;i++){ctx.beginPath();ctx.moveTo(-4,-20+i*6);ctx.lineTo(4,-20+i*6);ctx.stroke();}

  // Head
  ctx.fillStyle='#778899';
  ctx.shadowColor='rgba(200,200,220,0.3)';ctx.shadowBlur=hammerSmash>5?15:5;
  ctx.fillRect(-18,-85,36,20);
  // Bevel
  ctx.fillStyle='#99aabb';ctx.fillRect(-16,-83,32,4);
  ctx.fillStyle='#667788';ctx.fillRect(-16,-69,32,4);
  ctx.shadowBlur=0;

  // Impact ring on smash
  if(hammerSmash>5){
    ctx.beginPath();ctx.arc(0,-75,(10-hammerSmash)*8,0,Math.PI*2);
    ctx.strokeStyle=`rgba(255,200,100,${hammerSmash/10*0.3})`;ctx.lineWidth=2;ctx.stroke();
  }

  ctx.restore();

  // Crosshair
  ctx.strokeStyle='rgba(255,100,50,0.3)';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(mouseX,mouseY,25,0,Math.PI*2);ctx.stroke();
}

function render(){
  // Background — dark floor
  ctx.fillStyle='#0a0a10';ctx.fillRect(0,0,W,H);

  // Floor grid
  ctx.strokeStyle='#12121a';ctx.lineWidth=0.5;
  for(let x=0;x<W;x+=40){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
  for(let y=0;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // Global glitch overlay at high waves
  if(wave>=5){
    const glitchLevel=Math.min((wave-5)*0.05,0.4);
    if(Math.random()<glitchLevel*0.1){
      ctx.fillStyle=`rgba(${Math.random()*100|0},0,${Math.random()*80|0},0.03)`;
      ctx.fillRect(0,Math.random()*H,W,2+Math.random()*4);
    }
  }

  // Splats
  splats.forEach(s=>{
    const a=Math.min(1,s.life/60);
    ctx.beginPath();
    // Irregular splat shape
    for(let i=0;i<8;i++){
      const angle=Math.PI*2*i/8;
      const r=s.size*(0.6+Math.sin(i*2.3)*0.4);
      const px=s.x+Math.cos(angle)*r,py=s.y+Math.sin(angle)*r;
      if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
    }
    ctx.closePath();
    ctx.fillStyle=s.color+Math.floor(a*60).toString(16).padStart(2,'0');
    ctx.fill();
    // Glitchy splats
    if(s.glitch>0.3&&Math.random()<0.02){
      ctx.fillStyle=s.color+'20';
      ctx.fillRect(s.x+(Math.random()-0.5)*40,s.y+(Math.random()-0.5)*20,20,2);
    }
  });

  // Bugs
  bugs.forEach(drawBug);

  // Particles
  particles.forEach(p=>{
    const a=p.life/p.maxLife;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size*a,0,Math.PI*2);
    ctx.fillStyle=p.color;ctx.globalAlpha=a;ctx.fill();
  });
  ctx.globalAlpha=1;

  // Score texts
  texts.forEach(t=>{
    const a=t.life/40;
    ctx.font=(t.big?'28':'14')+'px Bungee';
    ctx.fillStyle=t.color;ctx.globalAlpha=a;ctx.textAlign='center';
    ctx.fillText(t.text,t.x,t.y);
  });
  ctx.globalAlpha=1;

  // Hammer
  drawHammer();
}

function loop(){update();render();requestAnimationFrame(loop);}
loop();
</script>
</body>
</html>
