<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pixel Pond</title>
<link rel="icon" href="https://emojicdn.elk.sh/🐟">
<meta property="og:title" content="Pixel Pond">
<meta property="og:description" content="Pixel art fishing — drop your hook and catch rare glowing fish">
<meta property="og:url" content="https://sloppy.live/pixel-pond">
<meta property="og:image" content="https://sloppy.live/pixel-pond/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;image-rendering:pixelated}
body{background:#0a1628;overflow:hidden;font-family:'Press Start 2P',monospace}
canvas{display:block}
.back-link{position:fixed;top:6px;left:6px;color:rgba(80,140,180,0.4);font-size:8px;text-decoration:none;z-index:100;font-family:'Silkscreen',cursive}
.back-link:hover{color:#4ae8ff}
</style>
</head>
<body>
<a class="back-link" href="https://sloppy.live">← sloppy.live</a>
<canvas id="cv"></canvas>
<script>
var C=document.getElementById('cv'),X=C.getContext('2d');
var GW=320,GH=240,W,H,SCALE;
X.imageSmoothingEnabled=false;

function resize(){
  var r=GW/GH;
  if(window.innerWidth/window.innerHeight>r){H=window.innerHeight;W=Math.floor(H*r);}
  else{W=window.innerWidth;H=Math.floor(W/r);}
  C.width=W;C.height=H;SCALE=W/GW;
  X.imageSmoothingEnabled=false;
}
window.addEventListener('resize',resize);resize();

var t=0,frame=0;

// Game state
var STATE='idle'; // idle, casting, waiting, hooked, reeling, caught, journal
var hookX=GW/2,hookY=40,hookTargetY=40,hookSpeed=0;
var lineX=GW/2;
var bobTimer=0,nibbleTimer=0,hookedFish=null,reelProgress=0;
var caughtAnim=0,caughtFishData=null;
var waterLine=55;

// Collection
var caught=[];
var totalCaught=0;

// Fish species
var FISH=[
  {name:'Minnow',rarity:'common',color:'#8ac8e0',size:6,speed:1.2,
   pixels:['..XXX.','XXXXX.','XXXXXX','.XXXX.','.XX...'],
   depth:[60,140],value:1,desc:'Small but plentiful'},
  {name:'Goldscale',rarity:'common',color:'#e8c040',size:7,speed:1,
   pixels:['...XXX.','.XXXXX.','XXXXXXX','.XXXXX.','..XX...'],
   depth:[70,160],value:2,desc:'Shimmers in any light'},
  {name:'Crimson Fin',rarity:'uncommon',color:'#e84040',size:8,speed:1.4,
   pixels:['..XXXX..','.XXXXXX.','XXXXXXXX','.XXXXXX.','..XXX...'],
   depth:[80,170],value:5,desc:'Feisty and fast'},
  {name:'Jade Perch',rarity:'uncommon',color:'#40e880',size:8,speed:0.8,
   pixels:['.XXXXX.','.XXXXXX','XXXXXXX','XXXXXXX','.XXXX..'],
   depth:[90,180],value:5,desc:'Calm deep dweller'},
  {name:'Violet Eel',rarity:'rare',color:'#a060e0',size:10,speed:1.6,
   pixels:['XXXXXXXX','XXXXXXXX','XXXXXXXX'],
   depth:[120,200],value:15,desc:'Slippery and elusive'},
  {name:'Neon Tetra',rarity:'rare',color:'#40e8e8',size:5,speed:2,
   pixels:['.XXXX','XXXXX','XXXXX','.XXX.'],
   depth:[60,130],value:12,desc:'Electric glow in schools'},
  {name:'Sunspot Koi',rarity:'rare',color:'#ff8040',size:9,speed:0.7,
   pixels:['..XXXX..','XXXXXXXX','XXXXXXXX','XXXXXXXX','.XXXXXX.','.XXXX...'],
   depth:[70,150],value:18,desc:'Legendary beauty'},
  {name:'Phantom Ray',rarity:'epic',color:'#c0a0ff',size:12,speed:0.5,
   pixels:['...XX...','..XXXX..','.XXXXXX.','XXXXXXXX','XXXXXXXX','.X.XX.X.'],
   depth:[140,210],value:30,desc:'Barely visible, incredibly rare'},
  {name:'Abyssal Fang',rarity:'epic',color:'#ff4080',size:10,speed:1.8,
   pixels:['..XXXX..','X.XXXX.X','XXXXXXXX','XXXXXXXX','.XXXXXX.','..XXX...'],
   depth:[160,220],value:35,desc:'Lurks in the deepest dark'},
  {name:'Golden Leviathan',rarity:'legendary',color:'#ffe060',size:14,speed:0.4,
   pixels:['...XXXXX....','..XXXXXXXX..','XXXXXXXXXXXX','XXXXXXXXXXXX','XXXXXXXXXXXX','.XXXXXXXXXX.','.XXXXXXXX...','.XXXXX......'],
   depth:[180,230],value:100,desc:'The myth is real'}
];

var RARITY_COLORS={common:'#8ac8e0',uncommon:'#40e880',rare:'#a060e0',epic:'#ff4080',legendary:'#ffe060'};
var RARITY_WEIGHTS={common:40,uncommon:25,rare:20,epic:10,legendary:5};

// Swimming fish in the tank
var swimFish=[];
function spawnSwimFish(){
  if(swimFish.length>18)return;
  var depthBias=Math.random();
  var candidates=FISH.filter(function(f){return true;});
  // Weighted random by rarity
  var totalW=0;
  candidates.forEach(function(f){totalW+=RARITY_WEIGHTS[f.rarity];});
  var roll=Math.random()*totalW,acc=0,picked=candidates[0];
  for(var i=0;i<candidates.length;i++){
    acc+=RARITY_WEIGHTS[candidates[i].rarity];
    if(roll<=acc){picked=candidates[i];break;}
  }
  var dir=Math.random()<0.5?1:-1;
  var fy=picked.depth[0]+Math.random()*(picked.depth[1]-picked.depth[0]);
  swimFish.push({
    spec:picked,
    x:dir>0?-picked.size*3:GW+picked.size*3,
    y:fy,
    dir:dir,
    speed:picked.speed*(0.7+Math.random()*0.6),
    wobble:Math.random()*Math.PI*2,
    flash:0
  });
}

// Starfish that stick to the glass edges
var starfish=[];
var STARFISH_COLORS=['#4a90d0','#50b8e8','#e8c040','#f0d860'];
var STARFISH_PATTERN=[
  '..X..',
  '.XXX.',
  'XXXXX',
  '.X.X.',
  'X...X'
];
function initStarfish(){
  var count=6+Math.floor(Math.random()*4);
  for(var i=0;i<count;i++){
    var side=Math.floor(Math.random()*3); // 0=left, 1=right, 2=bottom
    var sx2,sy2;
    if(side===0){sx2=2+Math.random()*6;sy2=waterLine+20+Math.random()*(GH-waterLine-40);}
    else if(side===1){sx2=GW-12+Math.random()*6;sy2=waterLine+20+Math.random()*(GH-waterLine-40);}
    else{sx2=20+Math.random()*(GW-40);sy2=GH-14+Math.random()*4;}
    starfish.push({
      x:sx2,y:sy2,
      col:STARFISH_COLORS[Math.floor(Math.random()*STARFISH_COLORS.length)],
      wobble:Math.random()*Math.PI*2,
      size:1+Math.floor(Math.random()*2)
    });
  }
}
initStarfish();

// Bubbles
var bubbles=[];
function spawnBubble(bx,by){
  bubbles.push({x:bx+Math.random()*6-3,y:by,size:1+Math.floor(Math.random()*3),speed:0.3+Math.random()*0.4,life:80+Math.random()*60});
}

// Particles for catch
var sparkles=[];

function drawPx(px,py,pattern,color,pxSz,flip){
  X.fillStyle=color;
  for(var r=0;r<pattern.length;r++){
    var row=flip?pattern[r].split('').reverse().join(''):pattern[r];
    for(var c=0;c<row.length;c++){
      if(row[c]==='X'){
        X.fillRect(Math.floor((px+c*pxSz)*SCALE),Math.floor((py+r*pxSz)*SCALE),
          Math.ceil(pxSz*SCALE),Math.ceil(pxSz*SCALE));
      }
    }
  }
}

function castHook(targetX){
  if(STATE!=='idle')return;
  STATE='casting';
  lineX=targetX;
  hookX=targetX;
  hookY=waterLine;
  hookTargetY=waterLine+30+Math.random()*140;
  hookSpeed=2;
}

function reelIn(){
  if(STATE==='waiting'){
    STATE='idle';hookY=40;
    return;
  }
  if(STATE==='hooked'){
    STATE='reeling';reelProgress=0;
  }
}

function update(){
  frame++;t+=0.016;

  // Spawn fish
  if(frame%40===0)spawnSwimFish();
  if(frame%30===0&&Math.random()<0.3)spawnBubble(Math.random()*GW,GH-10-Math.random()*30);

  // Update swim fish
  for(var i=swimFish.length-1;i>=0;i--){
    var f=swimFish[i];
    f.x+=f.dir*f.speed;
    f.wobble+=0.06;
    f.y+=Math.sin(f.wobble)*0.3;
    if(f.flash>0)f.flash--;
    // Remove off-screen
    if((f.dir>0&&f.x>GW+20)||(f.dir<0&&f.x<-20)){
      swimFish.splice(i,1);
    }
  }

  // Bubbles
  for(var i=bubbles.length-1;i>=0;i--){
    var b=bubbles[i];
    b.y-=b.speed;b.x+=Math.sin(t*3+b.x)*0.15;b.life--;
    if(b.life<=0||b.y<waterLine){bubbles.splice(i,1);}
  }

  // Sparkles
  for(var i=sparkles.length-1;i>=0;i--){
    var s=sparkles[i];
    s.x+=s.vx;s.y+=s.vy;s.vy+=0.05;s.life--;
    if(s.life<=0)sparkles.splice(i,1);
  }

  // Hook states
  if(STATE==='casting'){
    hookY+=hookSpeed;
    if(hookY>=hookTargetY){
      hookY=hookTargetY;STATE='waiting';
      bobTimer=0;nibbleTimer=60+Math.floor(Math.random()*180);
      spawnBubble(hookX,hookY);
    }
  }else if(STATE==='waiting'){
    // Bob
    bobTimer++;
    hookY=hookTargetY+Math.sin(bobTimer*0.05)*1.5;

    // Check for fish near hook
    nibbleTimer--;
    if(nibbleTimer<=0){
      // Find fish near hook depth
      var nearFish=[];
      for(var i=0;i<swimFish.length;i++){
        var f=swimFish[i];
        var dy=Math.abs(f.y-hookY);
        var dx=Math.abs(f.x-hookX);
        if(dy<20&&dx<30)nearFish.push(f);
      }
      if(nearFish.length>0){
        // Pick one
        var target=nearFish[Math.floor(Math.random()*nearFish.length)];
        hookedFish=target;
        target.flash=30;
        STATE='hooked';
        spawnBubble(hookX,hookY);
        spawnBubble(hookX,hookY);
      }else{
        nibbleTimer=40+Math.floor(Math.random()*80);
      }
    }

    // Nibble visual
    if(nibbleTimer<15&&nibbleTimer>0&&nibbleTimer%3===0){
      hookY-=1;// little tug
    }
  }else if(STATE==='hooked'){
    // Fish struggles — hook wobbles
    hookX+=Math.sin(t*8)*1.5;
    hookY+=Math.cos(t*6)*0.8;
    // Auto-timeout: fish escapes after 4 seconds
    bobTimer++;
    if(bobTimer>240){
      // Escaped
      if(hookedFish){
        var idx=swimFish.indexOf(hookedFish);
        if(idx>=0)swimFish.splice(idx,1);
      }
      hookedFish=null;STATE='idle';hookY=40;
    }
  }else if(STATE==='reeling'){
    reelProgress+=0.015;
    hookY-=1.5;
    if(hookedFish){
      hookedFish.x+=(hookX-hookedFish.x)*0.1;
      hookedFish.y+=(hookY-hookedFish.y)*0.1;
    }
    if(hookY<=waterLine-5){
      // Caught!
      STATE='caught';caughtAnim=120;
      if(hookedFish){
        caughtFishData=hookedFish.spec;
        totalCaught++;
        // Add to collection if new
        var exists=false;
        for(var i=0;i<caught.length;i++){if(caught[i].name===caughtFishData.name){exists=true;caught[i].count++;break;}}
        if(!exists)caught.push({name:caughtFishData.name,spec:caughtFishData,count:1});
        // Sparkles
        for(var i=0;i<20;i++){
          sparkles.push({x:hookX,y:waterLine-10,vx:(Math.random()-0.5)*3,vy:-Math.random()*3-1,
            life:30+Math.random()*30,col:caughtFishData.color});
        }
        // Remove from swim
        var idx2=swimFish.indexOf(hookedFish);
        if(idx2>=0)swimFish.splice(idx2,1);
      }
      hookedFish=null;
    }
  }else if(STATE==='caught'){
    caughtAnim--;
    if(caughtAnim<=0){STATE='idle';hookY=40;caughtFishData=null;}
  }
}

function draw(){
  X.fillStyle='#0a1628';
  X.fillRect(0,0,W,H);

  // Sky gradient
  var sky=X.createLinearGradient(0,0,0,waterLine*SCALE);
  sky.addColorStop(0,'#0a1020');
  sky.addColorStop(1,'#142848');
  X.fillStyle=sky;
  X.fillRect(0,0,W,waterLine*SCALE);

  // Stars
  X.fillStyle='rgba(200,220,255,0.5)';
  for(var i=0;i<20;i++){
    var sx2=((i*37+13)%GW),sy2=((i*53+7)%(waterLine-5));
    if(Math.sin(t*2+i*1.7)>0.3)
      X.fillRect(Math.floor(sx2*SCALE),Math.floor(sy2*SCALE),Math.ceil(SCALE),Math.ceil(SCALE));
  }

  // Moon
  X.fillStyle='#e8e0c0';
  X.fillRect(Math.floor(250*SCALE),Math.floor(8*SCALE),Math.ceil(12*SCALE),Math.ceil(12*SCALE));
  X.fillStyle='#0a1020';
  X.fillRect(Math.floor(254*SCALE),Math.floor(6*SCALE),Math.ceil(10*SCALE),Math.ceil(10*SCALE));

  // Water
  var water=X.createLinearGradient(0,waterLine*SCALE,0,H);
  water.addColorStop(0,'#1a3058');
  water.addColorStop(0.3,'#142848');
  water.addColorStop(0.7,'#0c1830');
  water.addColorStop(1,'#080e20');
  X.fillStyle=water;
  X.fillRect(0,Math.floor(waterLine*SCALE),W,H);

  // Water surface shimmer
  X.fillStyle='rgba(60,120,180,0.15)';
  for(var wx=0;wx<GW;wx+=4){
    var wy=waterLine+Math.sin(t*2+wx*0.1)*1.5;
    X.fillRect(Math.floor(wx*SCALE),Math.floor(wy*SCALE),Math.ceil(4*SCALE),Math.ceil(SCALE));
  }

  // Seaweed
  X.fillStyle='#1a4030';
  for(var sw=0;sw<5;sw++){
    var swx=30+sw*65;
    for(var sy3=0;sy3<6;sy3++){
      var sxoff=Math.sin(t*1.5+sw+sy3*0.5)*3;
      X.fillRect(Math.floor((swx+sxoff)*SCALE),Math.floor((GH-8-sy3*6)*SCALE),Math.ceil(3*SCALE),Math.ceil(6*SCALE));
    }
  }

  // Ground
  X.fillStyle='#1a2840';
  X.fillRect(0,Math.floor((GH-6)*SCALE),W,Math.ceil(6*SCALE));
  X.fillStyle='#142030';
  for(var gx=0;gx<GW;gx+=8){
    X.fillRect(Math.floor(gx*SCALE),Math.floor((GH-8+((gx/8)%3))*SCALE),Math.ceil(6*SCALE),Math.ceil(3*SCALE));
  }

  // Rocks
  X.fillStyle='#2a3848';
  X.fillRect(Math.floor(40*SCALE),Math.floor((GH-12)*SCALE),Math.ceil(14*SCALE),Math.ceil(8*SCALE));
  X.fillRect(Math.floor(200*SCALE),Math.floor((GH-10)*SCALE),Math.ceil(10*SCALE),Math.ceil(6*SCALE));

  // Starfish on glass
  for(var i=0;i<starfish.length;i++){
    var sf=starfish[i];
    sf.wobble+=0.008;
    var sfx=sf.x+Math.sin(sf.wobble)*0.5;
    var sfy=sf.y+Math.cos(sf.wobble*1.3)*0.3;
    drawPx(sfx,sfy,STARFISH_PATTERN,sf.col,sf.size,false);
  }

  // Swim fish
  for(var i=0;i<swimFish.length;i++){
    var f=swimFish[i];
    var col=f.flash>0&&f.flash%4<2?'#fff':f.spec.color;
    drawPx(f.x,f.y,f.spec.pixels,col,2,f.dir<0);
    // Silly eye
    var eyeOffX=f.dir>0?f.spec.pixels[0].length*2-4:2;
    var eyeOffY=2;
    X.fillStyle='#fff';
    X.fillRect(Math.floor((f.x+eyeOffX)*SCALE),Math.floor((f.y+eyeOffY)*SCALE),Math.ceil(3*SCALE),Math.ceil(3*SCALE));
    X.fillStyle='#000';
    var pupilX=f.dir>0?eyeOffX+1:eyeOffX;
    X.fillRect(Math.floor((f.x+pupilX)*SCALE),Math.floor((f.y+eyeOffY+1)*SCALE),Math.ceil(SCALE),Math.ceil(SCALE));
    // Shadow beneath fish
    X.fillStyle='rgba(0,0,0,0.1)';
    X.fillRect(Math.floor((f.x+2)*SCALE),Math.floor((f.y+f.spec.pixels.length*2+2)*SCALE),
      Math.ceil((f.spec.pixels[0].length*2-4)*SCALE),Math.ceil(SCALE));
  }

  // Fishing line + hook
  if(STATE!=='idle'&&STATE!=='journal'){
    // Rod tip at top center
    var rodTipX=lineX,rodTipY=2;
    X.strokeStyle='rgba(200,200,200,0.4)';
    X.lineWidth=Math.ceil(SCALE);
    X.beginPath();
    X.moveTo(Math.floor(rodTipX*SCALE),Math.floor(rodTipY*SCALE));
    X.lineTo(Math.floor(hookX*SCALE),Math.floor(hookY*SCALE));
    X.stroke();

    // Hook
    if(hookY>waterLine-5){
      X.fillStyle=STATE==='hooked'?(frame%6<3?'#ff6060':'#ffc040'):'#c0c0c0';
      X.fillRect(Math.floor((hookX-1)*SCALE),Math.floor(hookY*SCALE),Math.ceil(2*SCALE),Math.ceil(4*SCALE));
      X.fillRect(Math.floor((hookX-2)*SCALE),Math.floor((hookY+4)*SCALE),Math.ceil(3*SCALE),Math.ceil(SCALE));
    }

    // Bob at water surface
    if(STATE==='waiting'||STATE==='hooked'){
      var bobY2=waterLine+Math.sin(t*3)*1;
      X.fillStyle=STATE==='hooked'?'#ff4040':'#ff6020';
      X.fillRect(Math.floor((lineX-2)*SCALE),Math.floor((bobY2-2)*SCALE),Math.ceil(4*SCALE),Math.ceil(4*SCALE));
      X.fillStyle='#fff';
      X.fillRect(Math.floor((lineX-1)*SCALE),Math.floor((bobY2-2)*SCALE),Math.ceil(2*SCALE),Math.ceil(SCALE));
    }
  }

  // Bubbles
  for(var i=0;i<bubbles.length;i++){
    var b=bubbles[i];
    X.fillStyle='rgba(100,180,220,0.3)';
    X.fillRect(Math.floor(b.x*SCALE),Math.floor(b.y*SCALE),Math.ceil(b.size*SCALE),Math.ceil(b.size*SCALE));
  }

  // Sparkles
  for(var i=0;i<sparkles.length;i++){
    var sp=sparkles[i];
    X.fillStyle=sp.col;
    X.globalAlpha=sp.life/60;
    X.fillRect(Math.floor(sp.x*SCALE),Math.floor(sp.y*SCALE),Math.ceil(2*SCALE),Math.ceil(2*SCALE));
  }
  X.globalAlpha=1;

  // HUD
  X.fillStyle='rgba(10,22,40,0.7)';
  X.fillRect(0,0,W,Math.ceil(14*SCALE));
  X.fillStyle='#8ac8e0';
  X.font=Math.floor(5*SCALE)+'px "Press Start 2P"';
  X.textAlign='left';
  X.fillText('FISH: '+totalCaught,Math.floor(4*SCALE),Math.floor(10*SCALE));
  X.textAlign='center';
  X.fillStyle='#e8c040';
  X.fillText('SPECIES: '+caught.length+'/'+FISH.length,Math.floor(GW/2*SCALE),Math.floor(10*SCALE));
  X.textAlign='right';
  X.fillStyle='#40e880';
  var stateText=STATE==='idle'?'TAP TO CAST':STATE==='casting'?'CASTING...':STATE==='waiting'?'WAITING...':STATE==='hooked'?'!! REEL IN !!':STATE==='reeling'?'REELING...':'';
  X.fillText(stateText,Math.floor((GW-4)*SCALE),Math.floor(10*SCALE));

  // Caught overlay
  if(STATE==='caught'&&caughtFishData){
    var alpha4=caughtAnim>100?1:caughtAnim>10?1:caughtAnim/10;
    X.fillStyle='rgba(10,22,40,'+alpha4*0.75+')';
    X.fillRect(Math.floor(40*SCALE),Math.floor(50*SCALE),Math.floor(240*SCALE),Math.floor(100*SCALE));
    X.strokeStyle=RARITY_COLORS[caughtFishData.rarity];
    X.lineWidth=Math.ceil(SCALE);
    X.strokeRect(Math.floor(40*SCALE),Math.floor(50*SCALE),Math.floor(240*SCALE),Math.floor(100*SCALE));

    // Fish preview
    drawPx(80,70,caughtFishData.pixels,caughtFishData.color,3,false);

    X.fillStyle=caughtFishData.color;
    X.font=Math.floor(6*SCALE)+'px "Press Start 2P"';
    X.textAlign='left';
    X.fillText(caughtFishData.name,Math.floor(140*SCALE),Math.floor(78*SCALE));

    X.fillStyle=RARITY_COLORS[caughtFishData.rarity];
    X.font=Math.floor(4*SCALE)+'px "Press Start 2P"';
    X.fillText(caughtFishData.rarity.toUpperCase(),Math.floor(140*SCALE),Math.floor(92*SCALE));

    X.fillStyle='#8a9ab0';
    X.fillText(caughtFishData.desc,Math.floor(140*SCALE),Math.floor(105*SCALE));

    X.fillStyle='#e8c040';
    X.fillText('VALUE: '+caughtFishData.value,Math.floor(140*SCALE),Math.floor(118*SCALE));

    // New species?
    var isNew=false;
    for(var i=0;i<caught.length;i++){if(caught[i].name===caughtFishData.name&&caught[i].count===1){isNew=true;break;}}
    if(isNew){
      X.fillStyle='#ffe060';
      X.font=Math.floor(5*SCALE)+'px "Press Start 2P"';
      X.textAlign='center';
      X.fillText('★ NEW SPECIES ★',Math.floor(GW/2*SCALE),Math.floor(140*SCALE));
    }
  }

  // Journal (collection) at bottom
  if(STATE==='idle'&&caught.length>0){
    var jy=GH-22;
    X.fillStyle='rgba(10,22,40,0.6)';
    X.fillRect(0,Math.floor(jy*SCALE),W,Math.ceil(22*SCALE));
    X.textAlign='left';
    X.fillStyle='#4a6880';
    X.font=Math.floor(4*SCALE)+'px "Press Start 2P"';
    X.fillText('COLLECTION:',Math.floor(4*SCALE),Math.floor((jy+8)*SCALE));
    var cx2=60;
    for(var i=0;i<caught.length&&cx2<GW-20;i++){
      var cf=caught[i];
      drawPx(cx2,jy+3,cf.spec.pixels,cf.spec.color,1,false);
      X.fillStyle='#8a9ab0';
      X.font=Math.floor(3*SCALE)+'px "Press Start 2P"';
      X.fillText('x'+cf.count,Math.floor((cx2+cf.spec.pixels[0].length+2)*SCALE),Math.floor((jy+10)*SCALE));
      cx2+=cf.spec.pixels[0].length+20;
    }
  }
}

// Input
function handleClick(mx,my){
  var gx=mx/SCALE,gy=my/SCALE;

  if(STATE==='idle'){
    castHook(Math.max(20,Math.min(GW-20,gx)));
  }else if(STATE==='waiting'){
    reelIn(); // reel in empty
  }else if(STATE==='hooked'){
    reelIn(); // catch!
  }else if(STATE==='caught'){
    STATE='idle';hookY=40;caughtFishData=null;caughtAnim=0;
  }
}

C.addEventListener('click',function(e){
  var rect=C.getBoundingClientRect();
  handleClick(e.clientX-rect.left,e.clientY-rect.top);
});
C.addEventListener('touchstart',function(e){
  e.preventDefault();
  var rect=C.getBoundingClientRect();
  var tc=e.touches[0];
  handleClick(tc.clientX-rect.left,tc.clientY-rect.top);
},{passive:false});

// Space bar
document.addEventListener('keydown',function(e){
  if(e.code==='Space'){e.preventDefault();
    var rect=C.getBoundingClientRect();
    handleClick(rect.width/2,rect.height/2);
  }
});

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
