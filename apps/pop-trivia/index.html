<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0014;--panel:#120022;--frame:#1e0040;
  --hot:#ff2d7b;--cyan:#00e5ff;--gold:#ffd740;--lime:#76ff03;--purple:#bb86fc;
  --text:#e8e0f0;--dim:#6a5890;
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Lexend Deca',sans-serif}
body{display:flex;flex-direction:column;align-items:center;
  background:radial-gradient(ellipse at 30% 20%,rgba(255,45,123,0.06),transparent 50%),
  radial-gradient(ellipse at 70% 80%,rgba(0,229,255,0.05),transparent 50%),
  radial-gradient(ellipse at 50% 50%,rgba(187,134,252,0.03),transparent 60%),var(--bg)}

.wrap{width:min(480px,94vw);padding:16px 0 24px;position:relative;z-index:1}

header{text-align:center;margin-bottom:12px}
header h1{font-family:'Righteous',sans-serif;font-size:clamp(26px,6vw,38px);
  background:linear-gradient(135deg,var(--hot),var(--cyan),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:2px;text-shadow:none;filter:drop-shadow(0 0 12px rgba(255,45,123,0.3))}
header p{font-size:11px;color:var(--dim);margin-top:2px;letter-spacing:1px}

.hud{display:flex;justify-content:space-between;align-items:center;padding:6px 8px;
  background:var(--panel);border:1px solid var(--frame);border-radius:10px;margin-bottom:12px}
.hud-item{text-align:center}
.hud-label{font-size:8px;color:var(--dim);letter-spacing:1px;text-transform:uppercase}
.hud-val{font-family:'Righteous',sans-serif;font-size:18px;color:var(--cyan)}
.hud-val.score{color:var(--gold)}
.hud-val.timer{color:var(--lime)}
.hud-val.timer.warn{color:var(--hot);animation:blink .5s infinite}
@keyframes blink{50%{opacity:.4}}

.card{background:var(--panel);border:1px solid var(--frame);border-radius:16px;
  padding:20px;box-shadow:0 0 40px rgba(187,134,252,0.05);position:relative;overflow:hidden;
  min-height:320px;display:flex;flex-direction:column}
.card::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:conic-gradient(from 0deg,transparent,rgba(255,45,123,0.03),transparent,rgba(0,229,255,0.03),transparent);
  animation:cardSpin 20s linear infinite;pointer-events:none}
@keyframes cardSpin{to{transform:rotate(360deg)}}

.category{font-size:10px;color:var(--purple);letter-spacing:2px;text-transform:uppercase;
  margin-bottom:8px;position:relative;z-index:1}
.question{font-size:clamp(15px,3.5vw,19px);font-weight:500;line-height:1.5;
  margin-bottom:18px;position:relative;z-index:1;flex:0}
.question .highlight{color:var(--cyan);font-weight:700}

.options{display:flex;flex-direction:column;gap:8px;position:relative;z-index:1;flex:1}
.opt-btn{
  width:100%;background:rgba(30,0,64,0.6);border:1px solid var(--frame);border-radius:10px;
  padding:12px 16px;color:var(--text);font-family:'Lexend Deca',sans-serif;font-size:14px;
  font-weight:500;cursor:pointer;transition:all 0.2s;text-align:left;
  display:flex;align-items:center;gap:10px;position:relative;overflow:hidden;
}
.opt-btn:hover{border-color:var(--cyan);background:rgba(0,229,255,0.08);transform:translateX(4px)}
.opt-btn:active{transform:scale(0.98)}
.opt-btn .letter{
  width:26px;height:26px;border-radius:50%;background:var(--frame);
  display:flex;align-items:center;justify-content:center;
  font-family:'Righteous',sans-serif;font-size:12px;color:var(--dim);
  flex-shrink:0;transition:all 0.2s;
}
.opt-btn:hover .letter{background:rgba(0,229,255,0.2);color:var(--cyan)}
.opt-btn.correct{border-color:var(--lime);background:rgba(118,255,3,0.12)}
.opt-btn.correct .letter{background:var(--lime);color:var(--bg)}
.opt-btn.wrong{border-color:var(--hot);background:rgba(255,45,123,0.1);opacity:0.7}
.opt-btn.wrong .letter{background:var(--hot);color:#fff}
.opt-btn.revealed{border-color:var(--lime);opacity:0.5}
.opt-btn.disabled{pointer-events:none}

.progress{display:flex;gap:4px;justify-content:center;margin-top:14px;position:relative;z-index:1}
.pip{width:20px;height:4px;border-radius:2px;background:var(--frame);transition:all 0.3s}
.pip.done{background:var(--lime)}
.pip.wrong-pip{background:var(--hot)}
.pip.current{background:var(--cyan);box-shadow:0 0 8px rgba(0,229,255,0.4)}

/* Results */
.results{display:none;flex-direction:column;align-items:center;gap:14px;padding:20px 0;position:relative;z-index:1}
.results.show{display:flex}
.results h2{font-family:'Righteous',sans-serif;font-size:clamp(24px,5vw,32px);
  background:linear-gradient(135deg,var(--hot),var(--gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.results .final-score{font-family:'Righteous',sans-serif;font-size:42px;color:var(--gold);
  text-shadow:0 0 20px rgba(255,215,64,0.3)}
.results .detail{font-size:13px;color:var(--dim);line-height:1.8}
.results .detail span{color:var(--text);font-weight:700}
.grade{font-size:48px;margin:4px 0}
.replay-btn{
  background:transparent;border:2px solid var(--cyan);border-radius:10px;
  color:var(--cyan);font-family:'Righteous',sans-serif;font-size:14px;
  padding:12px 32px;cursor:pointer;letter-spacing:2px;transition:all 0.2s;margin-top:8px;
}
.replay-btn:hover{background:rgba(0,229,255,0.1);box-shadow:0 0 20px rgba(0,229,255,0.2)}

/* Splash */
.splash{display:flex;flex-direction:column;align-items:center;gap:16px;padding:30px 0;position:relative;z-index:1}
.splash h2{font-family:'Righteous',sans-serif;font-size:22px;color:var(--cyan)}
.splash p{font-size:13px;color:var(--dim);text-align:center;line-height:1.6;max-width:300px}
.start-btn{
  background:linear-gradient(135deg,var(--hot),var(--purple));border:none;border-radius:10px;
  color:#fff;font-family:'Righteous',sans-serif;font-size:15px;
  padding:14px 36px;cursor:pointer;letter-spacing:2px;transition:all 0.2s;
  box-shadow:0 4px 20px rgba(255,45,123,0.3);
}
.start-btn:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(255,45,123,0.4)}
.mode-select{display:flex;gap:8px;margin-top:4px}
.mode-btn{
  background:var(--frame);border:1px solid var(--frame);border-radius:8px;
  color:var(--dim);font-size:11px;padding:8px 16px;cursor:pointer;
  font-family:'Lexend Deca',sans-serif;letter-spacing:1px;transition:all 0.2s;
}
.mode-btn.active{border-color:var(--cyan);color:var(--cyan);background:rgba(0,229,255,0.08)}
.mode-btn:hover{border-color:var(--purple);color:var(--purple)}

.backlink{margin-top:16px;font-size:11px;color:var(--dim);text-align:center}
.backlink a{color:var(--hot);text-decoration:none}
.backlink a:hover{text-decoration:underline}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>2000s POP TRIVIA</h1>
    <p>how well do you know the hits?</p>
  </header>

  <div class="hud" id="hud" style="display:none">
    <div class="hud-item"><div class="hud-label">QUESTION</div><div class="hud-val" id="qNum">1/15</div></div>
    <div class="hud-item"><div class="hud-label">SCORE</div><div class="hud-val score" id="scoreNum">0</div></div>
    <div class="hud-item"><div class="hud-label">STREAK</div><div class="hud-val" style="color:var(--hot)" id="streakNum">0</div></div>
    <div class="hud-item"><div class="hud-label">TIME</div><div class="hud-val timer" id="timer">15</div></div>
  </div>

  <div class="card" id="card">
    <!-- Splash -->
    <div class="splash" id="splash">
      <h2>🎤 READY?</h2>
      <p>15 questions about 2000s pop music — artists, albums, music videos, awards, and pop culture moments.</p>
      <div class="mode-select">
        <button class="mode-btn active" data-mode="normal" id="modeNormal">NORMAL</button>
        <button class="mode-btn" data-mode="speed" id="modeSpeed">SPEED</button>
        <button class="mode-btn" data-mode="endless" id="modeEndless">ENDLESS</button>
      </div>
      <button class="start-btn" id="startBtn">LET'S GO</button>
    </div>

    <!-- Question area (hidden initially) -->
    <div id="questionArea" style="display:none">
      <div class="category" id="category">GENERAL</div>
      <div class="question" id="question"></div>
      <div class="options" id="options"></div>
      <div class="progress" id="progress"></div>
    </div>

    <!-- Results -->
    <div class="results" id="results">
      <h2>GAME OVER</h2>
      <div class="grade" id="grade">🎤</div>
      <div class="final-score" id="finalScore">0</div>
      <div class="detail" id="detail"></div>
      <button class="replay-btn" onclick="location.reload()">PLAY AGAIN</button>
    </div>
  </div>
</div>
<div class="backlink"><a href="https://sloppy.live">sloppy.live</a></div>

<script>
(function(){
'use strict';

// ========== QUESTION BANK ==========
const QUESTIONS = [
  // ARTISTS & BANDS
  { q: 'Which boy band released "Bye Bye Bye" in 2000?', a: '*NSYNC', opts: ['Backstreet Boys','*NSYNC','98 Degrees','O-Town'], cat: 'ARTISTS' },
  { q: 'Beyoncé was part of which group before going solo?', a: "Destiny's Child", opts: ["Destiny's Child",'TLC','En Vogue','SWV'], cat: 'ARTISTS' },
  { q: 'Which Canadian artist released "Complicated" in 2002?', a: 'Avril Lavigne', opts: ['Alanis Morissette','Avril Lavigne','Nelly Furtado','Fefe Dobson'], cat: 'ARTISTS' },
  { q: 'Which rapper released "Lose Yourself" from the 8 Mile soundtrack?', a: 'Eminem', opts: ['50 Cent','Eminem','Jay-Z','Kanye West'], cat: 'ARTISTS' },
  { q: 'Which pop duo released "Crazy in Love" in 2003?', a: 'Beyoncé & Jay-Z', opts: ['Beyoncé & Jay-Z','Ashanti & Ja Rule','J.Lo & LL Cool J','Nelly & Kelly'], cat: 'ARTISTS' },
  { q: 'Which group had a massive hit with "Hey Ya!" in 2003?', a: 'OutKast', opts: ['OutKast','The Black Eyed Peas','Gorillaz','N.E.R.D.'], cat: 'ARTISTS' },
  { q: 'Which Irish group released "Breathless" in 2000?', a: 'The Corrs', opts: ["B*Witched",'The Corrs','Westlife','Boyzone'], cat: 'ARTISTS' },
  { q: 'Kelly Clarkson won the first season of which TV show?', a: 'American Idol', opts: ['The Voice','American Idol','X Factor','Star Search'], cat: 'ARTISTS' },
  { q: 'Which artist was known as "The Material Girl" and released "Hung Up" in 2005?', a: 'Madonna', opts: ['Britney Spears','Madonna','Christina Aguilera','Gwen Stefani'], cat: 'ARTISTS' },
  { q: 'Which band released "Mr. Brightside" in 2003?', a: 'The Killers', opts: ['The Strokes','Franz Ferdinand','The Killers','Interpol'], cat: 'ARTISTS' },

  // ALBUMS & SONGS
  { q: 'What was Britney Spears\' third studio album released in 2001?', a: 'Britney', opts: ['Oops!...I Did It Again','In the Zone','Britney','Blackout'], cat: 'ALBUMS' },
  { q: 'Which 2006 Justin Timberlake album included "SexyBack"?', a: 'FutureSex/LoveSounds', opts: ['Justified','FutureSex/LoveSounds','The 20/20 Experience','Man of the Woods'], cat: 'ALBUMS' },
  { q: '"Toxic" by Britney Spears was released in which year?', a: '2004', opts: ['2002','2003','2004','2005'], cat: 'SONGS' },
  { q: 'Which Missy Elliott hit featured the memorable "flip it and reverse it" hook in 2002?', a: 'Work It', opts: ['Get Ur Freak On','Work It','Lose Control','One Minute Man'], cat: 'SONGS' },
  { q: 'What Shakira hit featured the line about hips that don\'t lie?', a: 'Hips Don\'t Lie', opts: ['Whenever Wherever','Hips Don\'t Lie','She Wolf','Waka Waka'], cat: 'SONGS' },
  { q: '"Since U Been Gone" was a breakout hit for which artist in 2004?', a: 'Kelly Clarkson', opts: ['Pink','Kelly Clarkson','Ashlee Simpson','Michelle Branch'], cat: 'SONGS' },
  { q: 'Which Gwen Stefani solo single featured a cheerleader-style spelling?', a: 'Hollaback Girl', opts: ['Rich Girl','Hollaback Girl','What You Waiting For?','Cool'], cat: 'SONGS' },
  { q: 'Which band had a 2005 hit with "Sugar, We\'re Goin Down"?', a: 'Fall Out Boy', opts: ['Panic! at the Disco','My Chemical Romance','Fall Out Boy','Paramore'], cat: 'SONGS' },
  { q: '"In Da Club" was which rapper\'s breakout single in 2003?', a: '50 Cent', opts: ['Ludacris','50 Cent','The Game','Young Buck'], cat: 'SONGS' },
  { q: 'Which band released "Clocks" and "The Scientist" on the same 2002 album?', a: 'Coldplay', opts: ['Radiohead','Keane','Coldplay','Snow Patrol'], cat: 'SONGS' },

  // MUSIC VIDEOS & POP CULTURE
  { q: 'In the "Thriller"-inspired video for which 2006 song did prisoners perform a choreographed dance that went viral?', a: 'Thriller (CPDRC version)', opts: ['Thriller (CPDRC version)','Soulja Boy','Crank That','Crazy Frog'], cat: 'VIRAL' },
  { q: 'Which 2009 Lady Gaga video featured a famous telephone-shaped accessory?', a: 'Telephone', opts: ['Bad Romance','Poker Face','Telephone','Paparazzi'], cat: 'VIDEOS' },
  { q: 'Which artist famously shaved her head in 2007?', a: 'Britney Spears', opts: ['Pink','Britney Spears','Sinéad O\'Connor','Amber Rose'], cat: 'POP CULTURE' },
  { q: 'The iPod + iTunes store launched in 2003, transforming how people bought what?', a: 'Individual songs', opts: ['Full albums','Individual songs','Ringtones','Concert tickets'], cat: 'POP CULTURE' },
  { q: 'Which music platform launched in 2005 and made "Broadcast Yourself" its slogan?', a: 'YouTube', opts: ['MySpace','YouTube','Spotify','SoundCloud'], cat: 'POP CULTURE' },
  { q: 'Which artist performed at the controversial 2004 Super Bowl halftime show?', a: 'Janet Jackson', opts: ['Beyoncé','Janet Jackson','Madonna','Shakira'], cat: 'POP CULTURE' },
  { q: 'Which reality show launched the careers of many 2000s pop acts, created by Simon Cowell?', a: 'The X Factor', opts: ['American Idol','The X Factor','The Voice','Making the Band'], cat: 'POP CULTURE' },
  { q: 'MySpace was the dominant social platform for which type of artists in the mid-2000s?', a: 'Indie & unsigned bands', opts: ['Country artists','Classical musicians','Indie & unsigned bands','Jazz musicians'], cat: 'POP CULTURE' },

  // AWARDS & RECORDS
  { q: 'Which album won Album of the Year at the 2004 Grammys?', a: 'Speakerboxxx/The Love Below', opts: ['The Eminem Show','Speakerboxxx/The Love Below','Come Away with Me','Elephant'], cat: 'AWARDS' },
  { q: 'Which artist holds the record for most consecutive #1 Billboard hits in the 2000s?', a: 'Mariah Carey', opts: ['Beyoncé','Rihanna','Mariah Carey','Usher'], cat: 'AWARDS' },
  { q: '"Umbrella" by Rihanna spent how many weeks at #1 in the UK in 2007?', a: '10 weeks', opts: ['6 weeks','8 weeks','10 weeks','12 weeks'], cat: 'RECORDS' },
  { q: 'Which 2000s artist was the best-selling digital artist of the decade?', a: 'Rihanna', opts: ['Eminem','Rihanna','Black Eyed Peas','Beyoncé'], cat: 'RECORDS' },
  { q: 'Kanye West\'s debut album "The College Dropout" was released in which year?', a: '2004', opts: ['2002','2003','2004','2005'], cat: 'ALBUMS' },
  { q: 'Which 2000s pop-punk band released the album "American Idiot"?', a: 'Green Day', opts: ['Blink-182','Green Day','Sum 41','Good Charlotte'], cat: 'ALBUMS' },

  // FEATURES & COLLABS
  { q: 'Nelly and Kelly Rowland had a 2002 duet called what?', a: 'Dilemma', opts: ['Hot in Herre','Dilemma','Ride wit Me','Just a Dream'], cat: 'COLLABS' },
  { q: 'Which producer duo was behind many of Britney, *NSYNC, and Backstreet Boys\' hits?', a: 'Max Martin & Denniz Pop', opts: ['The Neptunes','Max Martin & Denniz Pop','Timbaland & Magoo','Dr. Dre & Mel-Man'], cat: 'BEHIND THE SCENES' },
  { q: 'Which R&B singer released "Yeah!" featuring Lil Jon and Ludacris in 2004?', a: 'Usher', opts: ['Chris Brown','Usher','Ne-Yo','Akon'], cat: 'COLLABS' },
  { q: 'Which act performed "Where Is the Love?" with Justin Timberlake in 2003?', a: 'Black Eyed Peas', opts: ['Gorillaz','Black Eyed Peas','Outkast','Maroon 5'], cat: 'COLLABS' },
  { q: 'Which 2009 collaboration between Jay-Z, Rihanna, and Kanye was a massive hit?', a: 'Run This Town', opts: ['Empire State of Mind','Run This Town','Forever','Swagga Like Us'], cat: 'COLLABS' },

  // MORE
  { q: 'Which band\'s lead singer is Brandon Flowers, known for their 2004 debut?', a: 'The Killers', opts: ['Muse','The Killers','Interpol','Bloc Party'], cat: 'ARTISTS' },
  { q: 'Which Disney Channel star released "Come Get It" and later "Good for You"?', a: 'Selena Gomez', opts: ['Miley Cyrus','Demi Lovato','Selena Gomez','Hilary Duff'], cat: 'ARTISTS' },
  { q: 'Which song by Crazy Town sampled a Red Hot Chili Peppers riff and hit #1 in 2001?', a: 'Butterfly', opts: ['Butterfly','Toxic','Numb','Crawling'], cat: 'SONGS' },
  { q: 'Which 2000 film soundtrack featured "Who Let the Dogs Out" by Baha Men?', a: 'Rugrats in Paris', opts: ['Shrek','Rugrats in Paris','Big Momma\'s House','Me, Myself & Irene'], cat: 'SOUNDTRACKS' },
  { q: 'Fergie\'s solo hit "Glamorous" was released in which year?', a: '2007', opts: ['2005','2006','2007','2008'], cat: 'SONGS' },
  { q: 'Which rock band released "Numb" and "In the End" in the early 2000s?', a: 'Linkin Park', opts: ['Evanescence','Linkin Park','Three Days Grace','Breaking Benjamin'], cat: 'ARTISTS' },
  { q: 'Which pop star released a perfume called "Curious" in 2004?', a: 'Britney Spears', opts: ['Jennifer Lopez','Britney Spears','Paris Hilton','Beyoncé'], cat: 'POP CULTURE' },
  { q: 'Which Timbaland-produced track featuring OneRepublic was a 2007 smash?', a: 'Apologize', opts: ['The Way I Are','Apologize','Give It to Me','Scream'], cat: 'SONGS' },
  { q: 'Which animated band had a hit with "Feel Good Inc." in 2005?', a: 'Gorillaz', opts: ['Daft Punk','Gorillaz','Crazy Frog','Alvin and the Chipmunks'], cat: 'ARTISTS' },
  { q: 'What was the best-selling single of the entire 2000s decade in the US?', a: 'Low (Flo Rida)', opts: ['Boom Boom Pow','Low (Flo Rida)','Yeah! (Usher)','I Gotta Feeling'], cat: 'RECORDS' },
];

// ========== STATE ==========
let mode = 'normal'; // normal | speed | endless
let questions = [];
let qIdx = 0;
let score = 0;
let streak = 0;
let bestStreak = 0;
let correct = 0;
let wrong = 0;
let timeLeft = 15;
let timerInterval = null;
let answered = false;
const TOTAL_Q = 15;

const $ = id => document.getElementById(id);

// ========== AUDIO ==========
let audioCtx = null;
function beep(freq, dur, type='sine', vol=0.04) {
  if (!audioCtx) { try { audioCtx = new (window.AudioContext||window.webkitAudioContext)(); } catch { return; } }
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g).connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}
function correctSfx() { beep(880, 0.06, 'triangle'); setTimeout(() => beep(1100, 0.08, 'triangle'), 60); }
function wrongSfx() { beep(220, 0.12, 'sawtooth', 0.03); }
function tickSfx() { beep(1000, 0.02, 'sine', 0.01); }

// ========== GAME ==========
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame() {
  questions = shuffle(QUESTIONS).slice(0, mode === 'endless' ? QUESTIONS.length : TOTAL_Q);
  qIdx = 0; score = 0; streak = 0; bestStreak = 0; correct = 0; wrong = 0;
  $('splash').style.display = 'none';
  $('results').classList.remove('show');
  $('questionArea').style.display = 'flex';
  $('questionArea').style.flexDirection = 'column';
  $('questionArea').style.flex = '1';
  $('hud').style.display = 'flex';
  showQuestion();
}

function showQuestion() {
  if (qIdx >= questions.length) { endGame(); return; }
  answered = false;
  const q = questions[qIdx];

  $('category').textContent = q.cat;
  $('question').innerHTML = q.q;
  $('qNum').textContent = `${qIdx + 1}/${questions.length}`;
  $('scoreNum').textContent = score;
  $('streakNum').textContent = streak;

  // Shuffle options
  const shuffled = shuffle(q.opts);
  const optEl = $('options');
  optEl.innerHTML = '';
  const letters = ['A','B','C','D'];
  shuffled.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'opt-btn';
    btn.innerHTML = `<span class="letter">${letters[i]}</span><span>${opt}</span>`;
    btn.onclick = () => selectAnswer(opt, btn);
    optEl.appendChild(btn);
  });

  // Progress pips
  renderProgress();

  // Timer
  timeLeft = mode === 'speed' ? 8 : 15;
  updateTimer();
  startTimer();
}

function selectAnswer(choice, btnEl) {
  if (answered) return;
  answered = true;
  stopTimer();

  const q = questions[qIdx];
  const isCorrect = choice === q.a;
  const allBtns = $('options').querySelectorAll('.opt-btn');

  if (isCorrect) {
    correctSfx();
    btnEl.classList.add('correct');
    streak++;
    if (streak > bestStreak) bestStreak = streak;
    correct++;
    const timeBonus = Math.floor(timeLeft);
    const streakBonus = Math.min(streak - 1, 5) * 5;
    score += 100 + timeBonus * 3 + streakBonus;
  } else {
    wrongSfx();
    btnEl.classList.add('wrong');
    streak = 0;
    wrong++;
    // Reveal correct answer
    allBtns.forEach(b => {
      if (b.querySelector('span:last-child').textContent === q.a) b.classList.add('revealed');
    });
  }

  allBtns.forEach(b => b.classList.add('disabled'));
  $('scoreNum').textContent = score;
  $('streakNum').textContent = streak;
  renderProgress();

  setTimeout(() => { qIdx++; showQuestion(); }, isCorrect ? 1000 : 1800);
}

function timeUp() {
  if (answered) return;
  answered = true;
  stopTimer();
  wrongSfx();
  streak = 0;
  wrong++;

  const q = questions[qIdx];
  const allBtns = $('options').querySelectorAll('.opt-btn');
  allBtns.forEach(b => {
    b.classList.add('disabled');
    if (b.querySelector('span:last-child').textContent === q.a) b.classList.add('revealed');
  });
  $('streakNum').textContent = streak;
  renderProgress();

  setTimeout(() => { qIdx++; showQuestion(); }, 1800);
}

function startTimer() {
  stopTimer();
  timerInterval = setInterval(() => {
    timeLeft -= 0.25;
    updateTimer();
    if (Math.ceil(timeLeft) <= 5 && timeLeft % 1 < 0.25) tickSfx();
    if (timeLeft <= 0) { timeLeft = 0; updateTimer(); timeUp(); }
  }, 250);
}
function stopTimer() { if (timerInterval) { clearInterval(timerInterval); timerInterval = null; } }
function updateTimer() {
  const t = Math.max(0, Math.ceil(timeLeft));
  $('timer').textContent = t;
  $('timer').classList.toggle('warn', t <= 5);
}

function renderProgress() {
  const el = $('progress');
  el.innerHTML = '';
  for (let i = 0; i < questions.length; i++) {
    const pip = document.createElement('div');
    pip.className = 'pip';
    if (i < qIdx) {
      // Check if it was answered correctly — approximate by tracking
      pip.classList.add(i < correct + wrong ? (i < qIdx ? 'done' : '') : '');
    }
    if (i === qIdx) pip.classList.add('current');
    el.appendChild(pip);
  }
}

function endGame() {
  stopTimer();
  $('questionArea').style.display = 'none';
  $('hud').style.display = 'none';
  const pct = Math.round((correct / questions.length) * 100);
  let grade, title;
  if (pct >= 90) { grade = '👑'; title = 'POP ROYALTY'; }
  else if (pct >= 75) { grade = '🌟'; title = 'CHART TOPPER'; }
  else if (pct >= 60) { grade = '🎤'; title = 'RADIO REGULAR'; }
  else if (pct >= 40) { grade = '🎧'; title = 'CASUAL LISTENER'; }
  else { grade = '📻'; title = 'DIAL TURNER'; }

  $('grade').textContent = grade;
  $('finalScore').textContent = score;
  $('detail').innerHTML = `
    <div>${title}</div>
    <div>Correct: <span>${correct}/${questions.length}</span> (${pct}%)</div>
    <div>Best streak: <span>${bestStreak}</span></div>
    <div>Mode: <span>${mode.toUpperCase()}</span></div>
  `;

  const res = $('results');
  res.classList.add('show');
}

// ========== MODE SELECT ==========
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.onclick = () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    mode = btn.dataset.mode;
  };
});

// ========== EVENTS ==========
$('startBtn').onclick = startGame;

document.addEventListener('keydown', e => {
  if (!answered && $('questionArea').style.display !== 'none') {
    const map = { '1': 0, '2': 1, '3': 2, '4': 3, a: 0, b: 1, c: 2, d: 3 };
    const idx = map[e.key.toLowerCase()];
    if (idx !== undefined) {
      const btn = $('options').children[idx];
      if (btn && !btn.classList.contains('disabled')) {
        btn.click();
      }
    }
  }
});

})();
</script>
</body>
</html>
