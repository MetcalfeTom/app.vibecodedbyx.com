<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Sloppy Mario</title>
<link rel="icon" href="https://emojicdn.elk.sh/🫠">
<meta property="og:title" content="Sloppy Mario">
<meta property="og:description" content="A wobbly platformer with gooey levels. Jump, bounce, and splat through slime.">
<meta property="og:url" content="https://app.sloppy.live/sloppy-mario/">
<meta property="og:image" content="https://emojicdn.elk.sh/🫠?style=google">
<link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Outfit:wght@300;600;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#1a0a2e}
body{display:flex;flex-direction:column;align-items:center;justify-content:center}
canvas{display:block;border-radius:6px;image-rendering:auto}

.hud{
  position:fixed;top:10px;left:14px;z-index:10;
  font-family:'Outfit',sans-serif;font-weight:800;pointer-events:none;
  display:flex;gap:20px;font-size:0.8rem;
}
.hud span{color:rgba(255,255,255,0.4)}
.hud .v{color:#ff6eb4;text-shadow:0 0 8px #ff6eb444}
.hud .lv{color:#7df9ff;text-shadow:0 0 8px #7df9ff44}

.overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:20;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(26,10,46,0.92);text-align:center;gap:14px;
}
.overlay h1{
  font-family:'Bungee Shade',sans-serif;font-size:clamp(1.6rem,5vw,3rem);
  color:#ff6eb4;text-shadow:0 0 30px #ff6eb455;
}
.overlay .sub{color:#777;font-size:0.75rem;font-family:'Outfit',sans-serif;font-weight:300;max-width:320px;line-height:1.5}
.overlay .big{font-family:'Bungee Shade',sans-serif;font-size:2rem;color:#7df9ff}
.play-btn{
  padding:12px 40px;border:2px solid #ff6eb4;border-radius:10px;
  background:transparent;color:#ff6eb4;font-family:'Outfit',sans-serif;
  font-size:0.9rem;font-weight:800;cursor:pointer;transition:all 0.2s;
}
.play-btn:hover{background:#ff6eb4;color:#1a0a2e;box-shadow:0 0 25px #ff6eb455}

.touch-controls{
  position:fixed;bottom:10px;left:0;right:0;z-index:15;
  display:none;justify-content:space-between;padding:0 16px;pointer-events:none;
}
.touch-controls>div{display:flex;gap:6px;pointer-events:all}
.t-btn{
  width:56px;height:56px;border-radius:14px;
  border:1px solid rgba(255,110,180,0.2);background:rgba(255,110,180,0.06);
  color:rgba(255,110,180,0.5);font-size:1.3rem;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;user-select:none;-webkit-tap-highlight-color:transparent;
}
.t-btn:active{background:rgba(255,110,180,0.2)}
.t-btn.jump{width:80px;border-color:rgba(125,249,255,0.2);background:rgba(125,249,255,0.06);color:rgba(125,249,255,0.5)}
.t-btn.jump:active{background:rgba(125,249,255,0.2)}
@media(pointer:coarse){.touch-controls{display:flex}}
@media(max-width:768px){.touch-controls{display:flex}}

.back-link{position:fixed;bottom:8px;right:12px;z-index:25}
.back-link a{color:rgba(255,255,255,0.12);text-decoration:none;font-size:0.5rem;font-family:'Outfit',sans-serif;font-weight:300}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="hud">
  <span>COINS <span class="v" id="h-coins">0</span></span>
  <span>LEVEL <span class="lv" id="h-level">1</span></span>
</div>

<div class="overlay" id="start-screen">
  <h1>SLOPPY MARIO</h1>
  <div class="sub">A wobbly hero in gooey levels. Jump on platforms, collect coins, reach the flag. Arrow keys / WASD / touch.</div>
  <button class="play-btn" onclick="startGame()">PLAY</button>
</div>

<div class="overlay" id="win-screen" style="display:none">
  <h1>LEVEL CLEAR!</h1>
  <div class="big" id="win-coins">0 coins</div>
  <button class="play-btn" onclick="nextLevel()">NEXT</button>
</div>

<div class="overlay" id="dead-screen" style="display:none">
  <h1>SPLATTED!</h1>
  <div class="sub">You fell into the goo...</div>
  <button class="play-btn" onclick="retryLevel()">RETRY</button>
</div>

<div class="touch-controls">
  <div>
    <div class="t-btn" data-key="left">◀</div>
    <div class="t-btn" data-key="right">▶</div>
  </div>
  <div>
    <div class="t-btn jump" data-key="jump">▲</div>
  </div>
</div>

<div class="back-link"><a href="https://sloppy.live">sloppy.live</a></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const GW = 800, GH = 500;
canvas.width = GW; canvas.height = GH;

function fitCanvas() {
  const s = Math.min(window.innerWidth / GW, (window.innerHeight - 20) / GH, 1.5);
  canvas.style.width = Math.floor(GW * s) + 'px';
  canvas.style.height = Math.floor(GH * s) + 'px';
}
fitCanvas();
window.addEventListener('resize', fitCanvas);

// ---- Constants ----
const GRAVITY = 0.55;
const JUMP_FORCE = -11;
const MOVE_SPEED = 4.5;
const FRICTION = 0.85;
const TILE = 32;

// ---- State ----
let player, platforms, coins, gooZones, flag, particles, splatters;
let camX, levelNum, totalCoins, gameActive;
let keys = {};
let wobbleT = 0;

// ---- Input ----
window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup', e => keys[e.key] = false);

document.querySelectorAll('.t-btn').forEach(b => {
  const k = b.dataset.key;
  const on = e => { e.preventDefault(); keys[k] = true; };
  const off = e => { e.preventDefault(); keys[k] = false; };
  b.addEventListener('touchstart', on, {passive:false});
  b.addEventListener('touchend', off, {passive:false});
  b.addEventListener('touchcancel', off, {passive:false});
  b.addEventListener('mousedown', on);
  b.addEventListener('mouseup', off);
  b.addEventListener('mouseleave', off);
});

// ---- Level generation ----
function generateLevel(num) {
  platforms = []; coins = []; gooZones = []; splatters = [];
  const length = 20 + num * 8;

  // Ground with gaps
  let gx = 0;
  while (gx < length) {
    const segLen = 3 + Math.floor(Math.random() * 5);
    const y = GH - TILE - (Math.random() < 0.3 ? Math.floor(Math.random() * 2) * TILE : 0);
    for (let i = 0; i < segLen && gx + i < length; i++) {
      platforms.push({ x: (gx + i) * TILE, y, w: TILE, h: TILE, type: 'ground' });
    }
    gx += segLen;
    // Gap or goo
    const gapLen = 1 + Math.floor(Math.random() * (1 + Math.floor(num / 2)));
    if (Math.random() < 0.5) {
      gooZones.push({ x: gx * TILE, y: GH - TILE * 0.6, w: gapLen * TILE, h: TILE });
    }
    gx += gapLen;
  }

  // Floating platforms
  const floatCount = 5 + num * 3;
  for (let i = 0; i < floatCount; i++) {
    const px = (3 + Math.floor(Math.random() * (length - 6))) * TILE;
    const py = GH - TILE * (2 + Math.floor(Math.random() * 6));
    const pw = (2 + Math.floor(Math.random() * 3)) * TILE;
    platforms.push({ x: px, y: py, w: pw, h: TILE * 0.6, type: 'float', wobble: Math.random() * Math.PI * 2 });
  }

  // Coins
  const coinCount = 8 + num * 4;
  for (let i = 0; i < coinCount; i++) {
    const cx = (2 + Math.floor(Math.random() * (length - 4))) * TILE + TILE / 2;
    const cy = GH - TILE * (2 + Math.floor(Math.random() * 8));
    coins.push({ x: cx, y: cy, collected: false, bob: Math.random() * Math.PI * 2 });
  }

  // Flag at end
  flag = { x: (length - 2) * TILE, y: GH - TILE * 4 };

  // Player start
  player = {
    x: TILE * 2, y: GH - TILE * 3,
    vx: 0, vy: 0, w: 24, h: 28,
    onGround: false, jumpHeld: false,
    squish: 0, stretchX: 1, stretchY: 1,
    facing: 1, dead: false, won: false,
    eyes: { blink: 0, lookX: 0 }
  };

  totalCoins = 0;
  camX = 0;
  particles = [];
}

// ---- Game flow ----
function startGame() {
  document.getElementById('start-screen').style.display = 'none';
  levelNum = 1;
  document.getElementById('h-level').textContent = levelNum;
  document.getElementById('h-coins').textContent = 0;
  generateLevel(levelNum);
  gameActive = true;
  requestAnimationFrame(loop);
}

function nextLevel() {
  document.getElementById('win-screen').style.display = 'none';
  levelNum++;
  document.getElementById('h-level').textContent = levelNum;
  generateLevel(levelNum);
  gameActive = true;
}

function retryLevel() {
  document.getElementById('dead-screen').style.display = 'none';
  generateLevel(levelNum);
  gameActive = true;
}

// ---- Physics ----
function update(dt) {
  if (player.dead || player.won) return;
  wobbleT += dt;

  // Input
  let moveX = 0;
  if (keys['ArrowLeft'] || keys['a'] || keys['A'] || keys['left']) moveX = -1;
  if (keys['ArrowRight'] || keys['d'] || keys['D'] || keys['right']) moveX = 1;
  const jumpPressed = keys['ArrowUp'] || keys['w'] || keys['W'] || keys[' '] || keys['jump'];

  // Move
  player.vx += moveX * 1.2;
  player.vx *= FRICTION;
  player.vy += GRAVITY;

  // Jump
  if (jumpPressed && player.onGround && !player.jumpHeld) {
    player.vy = JUMP_FORCE;
    player.onGround = false;
    player.squish = -0.3;
    spawnParticles(player.x, player.y + player.h/2, '#ff6eb4', 6, 2);
  }
  player.jumpHeld = jumpPressed;

  // Cap speeds
  player.vx = Math.max(-MOVE_SPEED, Math.min(MOVE_SPEED, player.vx));
  player.vy = Math.min(14, player.vy);

  if (moveX !== 0) player.facing = moveX;

  // Move X
  player.x += player.vx;
  resolveCollisionX();

  // Move Y
  player.y += player.vy;
  player.onGround = false;
  resolveCollisionY();

  // Wobble squish recovery
  player.squish *= 0.85;
  player.stretchX = 1 + player.squish * 0.5;
  player.stretchY = 1 - player.squish * 0.4;

  // Fall death
  if (player.y > GH + 50) {
    die();
    return;
  }

  // Goo zones
  for (const g of gooZones) {
    if (player.x + player.w/2 > g.x && player.x - player.w/2 < g.x + g.w &&
        player.y + player.h/2 > g.y) {
      die();
      return;
    }
  }

  // Coins
  for (const c of coins) {
    if (c.collected) continue;
    const dx = player.x - c.x, dy = player.y - c.y;
    if (Math.abs(dx) < 18 && Math.abs(dy) < 18) {
      c.collected = true;
      totalCoins++;
      document.getElementById('h-coins').textContent = totalCoins;
      spawnParticles(c.x, c.y, '#ffcc00', 8, 3);
    }
  }

  // Flag
  if (Math.abs(player.x - flag.x) < 30 && Math.abs(player.y - flag.y) < 60) {
    player.won = true;
    document.getElementById('win-coins').textContent = totalCoins + ' coins';
    setTimeout(() => { document.getElementById('win-screen').style.display = 'flex'; }, 500);
  }

  // Camera
  const targetCam = player.x - GW * 0.35;
  camX += (targetCam - camX) * 0.08;
  camX = Math.max(0, camX);

  // Eyes tracking
  player.eyes.lookX = moveX * 2;
  player.eyes.blink -= dt;
  if (player.eyes.blink <= 0) player.eyes.blink = 2 + Math.random() * 4;

  // Particles
  updateParticles();

  // Running particles
  if (player.onGround && Math.abs(player.vx) > 1.5) {
    if (Math.random() < 0.3) {
      spawnParticles(player.x, player.y + player.h/2, '#c084fc', 1, 1);
    }
  }
}

function resolveCollisionX() {
  for (const p of platforms) {
    const wobbleY = p.type === 'float' ? Math.sin(wobbleT * 1.5 + p.wobble) * 3 : 0;
    const py = p.y + wobbleY;
    if (player.x + player.w/2 > p.x && player.x - player.w/2 < p.x + p.w &&
        player.y + player.h/2 > py + 2 && player.y - player.h/2 < py + p.h - 2) {
      if (player.vx > 0) player.x = p.x - player.w/2;
      else player.x = p.x + p.w + player.w/2;
      player.vx = 0;
    }
  }
}

function resolveCollisionY() {
  for (const p of platforms) {
    const wobbleY = p.type === 'float' ? Math.sin(wobbleT * 1.5 + p.wobble) * 3 : 0;
    const py = p.y + wobbleY;
    if (player.x + player.w/2 > p.x + 2 && player.x - player.w/2 < p.x + p.w - 2 &&
        player.y + player.h/2 > py && player.y - player.h/2 < py + p.h) {
      if (player.vy > 0 && player.y - player.h/2 < py) {
        player.y = py - player.h/2;
        if (player.vy > 3) player.squish = Math.min(0.4, player.vy * 0.04);
        player.vy = 0;
        player.onGround = true;
      } else if (player.vy < 0) {
        player.y = py + p.h + player.h/2;
        player.vy = 0;
      }
    }
  }
}

function die() {
  player.dead = true;
  spawnParticles(player.x, player.y, '#ff6eb4', 20, 5);
  // Splatter
  for (let i = 0; i < 8; i++) {
    splatters.push({
      x: player.x + (Math.random()-0.5)*40,
      y: player.y + (Math.random()-0.5)*30,
      r: 5 + Math.random() * 12, a: 0.6
    });
  }
  setTimeout(() => { document.getElementById('dead-screen').style.display = 'flex'; }, 800);
}

function spawnParticles(x, y, color, count, spread) {
  for (let i = 0; i < count; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = 0.5 + Math.random() * spread;
    particles.push({
      x, y, vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd - 1,
      life: 1, decay: 0.02 + Math.random()*0.02,
      color, r: 2 + Math.random()*3
    });
  }
}

function updateParticles() {
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.05;
    p.life -= p.decay;
  }
  particles = particles.filter(p => p.life > 0);
}

// ---- Drawing ----
function draw() {
  const t = performance.now() * 0.001;

  // Background gradient
  const bg = ctx.createLinearGradient(0, 0, 0, GH);
  bg.addColorStop(0, '#1a0a2e');
  bg.addColorStop(0.6, '#2d1458');
  bg.addColorStop(1, '#1a0a2e');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, GW, GH);

  // Background blobs (parallax)
  for (let i = 0; i < 6; i++) {
    const bx = ((i * 180 + 50) - camX * 0.2) % (GW + 200) - 100;
    const by = 80 + i * 60 + Math.sin(t * 0.5 + i) * 20;
    const br = 30 + i * 8;
    ctx.fillStyle = `rgba(${80+i*15},${20+i*10},${120+i*10},0.12)`;
    ctx.beginPath(); ctx.arc(bx, by, br, 0, Math.PI*2); ctx.fill();
  }

  ctx.save();
  ctx.translate(-camX, 0);

  // Goo zones
  for (const g of gooZones) {
    // Goo body
    ctx.fillStyle = '#7c3aed';
    ctx.shadowColor = '#7c3aed';
    ctx.shadowBlur = 15;
    ctx.fillRect(g.x, g.y, g.w, g.h + 20);

    // Goo surface bubbles
    ctx.shadowBlur = 0;
    for (let bx = g.x + 8; bx < g.x + g.w; bx += 18) {
      const bobY = Math.sin(t * 2 + bx * 0.1) * 3;
      ctx.fillStyle = 'rgba(167,139,250,0.5)';
      ctx.beginPath();
      ctx.arc(bx, g.y + bobY, 4 + Math.sin(t*3+bx)*2, 0, Math.PI*2);
      ctx.fill();
    }

    // Goo drip highlight
    ctx.fillStyle = 'rgba(196,181,253,0.2)';
    ctx.fillRect(g.x, g.y - 2, g.w, 4);
  }
  ctx.shadowBlur = 0;

  // Platforms
  for (const p of platforms) {
    const wobbleY = p.type === 'float' ? Math.sin(t * 1.5 + p.wobble) * 3 : 0;
    const py = p.y + wobbleY;

    if (p.type === 'ground') {
      // Ground block with gooey top
      ctx.fillStyle = '#3b1d6e';
      ctx.fillRect(p.x, py, p.w, p.h);
      // Top slime layer
      ctx.fillStyle = '#6d28d9';
      ctx.fillRect(p.x, py, p.w, 6);
      // Highlight
      ctx.fillStyle = 'rgba(167,139,250,0.2)';
      ctx.fillRect(p.x + 2, py + 1, p.w - 4, 2);
      // Grid lines
      ctx.strokeStyle = 'rgba(255,255,255,0.04)';
      ctx.lineWidth = 0.5;
      ctx.strokeRect(p.x, py, p.w, p.h);
    } else {
      // Floating platform — wobbly
      const jiggle = Math.sin(t * 2 + p.wobble) * 1;
      ctx.fillStyle = '#c084fc';
      ctx.shadowColor = '#c084fc';
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.roundRect(p.x - jiggle, py, p.w + jiggle * 2, p.h, 6);
      ctx.fill();
      // Shine
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(p.x + 4, py + 2, p.w - 8, 2);
      ctx.shadowBlur = 0;
    }
  }

  // Splatters
  for (const s of splatters) {
    ctx.fillStyle = `rgba(255,110,180,${s.a})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
    s.a *= 0.995;
  }

  // Coins
  for (const c of coins) {
    if (c.collected) continue;
    c.bob += 0.03;
    const cy = c.y + Math.sin(c.bob) * 4;
    const pulse = 1 + Math.sin(t*4 + c.bob) * 0.15;

    ctx.shadowColor = '#ffcc00';
    ctx.shadowBlur = 10;
    ctx.fillStyle = '#ffcc00';
    ctx.beginPath();
    ctx.arc(c.x, cy, 7 * pulse, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#fff8';
    ctx.beginPath();
    ctx.arc(c.x - 1, cy - 2, 2, 0, Math.PI*2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Flag
  const flagWave = Math.sin(t * 3) * 5;
  ctx.fillStyle = '#666';
  ctx.fillRect(flag.x, flag.y, 4, GH - flag.y);
  // Flag cloth
  ctx.fillStyle = '#ff6eb4';
  ctx.shadowColor = '#ff6eb4'; ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.moveTo(flag.x + 4, flag.y);
  ctx.lineTo(flag.x + 34 + flagWave, flag.y + 12);
  ctx.lineTo(flag.x + 4, flag.y + 24);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;
  // Star on flag
  ctx.fillStyle = '#ffcc00';
  ctx.font = '12px sans-serif';
  ctx.fillText('★', flag.x + 10 + flagWave*0.5, flag.y + 16);

  // Particles
  for (const p of particles) {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Player
  if (!player.dead) drawPlayer(t);

  ctx.restore();
}

function drawPlayer(t) {
  const px = player.x, py = player.y;
  const sx = player.stretchX, sy = player.stretchY;
  const hw = player.w/2 * sx, hh = player.h/2 * sy;

  ctx.save();
  ctx.translate(px, py);

  // Wobble
  const wobX = Math.sin(t * 8) * (Math.abs(player.vx) > 1 ? 1.5 : 0.5);
  const wobY = Math.cos(t * 10) * 0.5;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(0, hh + 2, hw * 0.8, 4, 0, 0, Math.PI*2);
  ctx.fill();

  // Body — blobby shape
  ctx.shadowColor = '#ff6eb4';
  ctx.shadowBlur = 12;
  ctx.fillStyle = '#ff6eb4';
  ctx.beginPath();
  // Wobbly rounded body using bezier
  ctx.moveTo(-hw + wobX, -hh * 0.3);
  ctx.bezierCurveTo(-hw - 2 + wobX, -hh + wobY, hw + 2 + wobX, -hh - wobY, hw + wobX, -hh * 0.3);
  ctx.bezierCurveTo(hw + 3 - wobX, hh * 0.5, hw - wobX, hh, 0, hh + wobY);
  ctx.bezierCurveTo(-hw + wobX, hh, -hw - 3 - wobX, hh * 0.5, -hw + wobX, -hh * 0.3);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Highlight
  ctx.fillStyle = 'rgba(255,200,230,0.3)';
  ctx.beginPath();
  ctx.ellipse(-hw*0.3, -hh*0.5, hw*0.35, hh*0.25, -0.3, 0, Math.PI*2);
  ctx.fill();

  // Eyes
  const blink = player.eyes.blink < 0.08;
  const eyeY = -hh * 0.25;
  const eyeSpread = 5 * sx;

  if (blink) {
    ctx.strokeStyle = '#1a0a2e';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(-eyeSpread - 3, eyeY); ctx.lineTo(-eyeSpread + 3, eyeY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(eyeSpread - 3, eyeY); ctx.lineTo(eyeSpread + 3, eyeY); ctx.stroke();
  } else {
    // Eye whites
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.ellipse(-eyeSpread, eyeY, 4.5, 5.5, 0, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(eyeSpread, eyeY, 4.5, 5.5, 0, 0, Math.PI*2); ctx.fill();
    // Pupils
    const lk = player.eyes.lookX + player.facing * 1;
    ctx.fillStyle = '#1a0a2e';
    ctx.beginPath(); ctx.arc(-eyeSpread + lk, eyeY + 0.5, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(eyeSpread + lk, eyeY + 0.5, 2.5, 0, Math.PI*2); ctx.fill();
    // Eye shine
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    ctx.beginPath(); ctx.arc(-eyeSpread + lk - 1, eyeY - 1.5, 1, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(eyeSpread + lk - 1, eyeY - 1.5, 1, 0, Math.PI*2); ctx.fill();
  }

  // Mouth
  const mouthOpen = Math.abs(player.vy) > 4;
  ctx.fillStyle = '#1a0a2e';
  if (mouthOpen) {
    ctx.beginPath(); ctx.ellipse(0, eyeY + 10, 4, 3, 0, 0, Math.PI*2); ctx.fill();
  } else {
    ctx.beginPath();
    ctx.arc(0, eyeY + 8, 5, 0.1, Math.PI - 0.1);
    ctx.strokeStyle = '#1a0a2e';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // Cheeks
  ctx.fillStyle = 'rgba(255,150,200,0.35)';
  ctx.beginPath(); ctx.ellipse(-eyeSpread - 3, eyeY + 5, 3, 2, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(eyeSpread + 3, eyeY + 5, 3, 2, 0, 0, Math.PI*2); ctx.fill();

  ctx.restore();
}

// ---- Loop ----
let lastT = 0;
function loop(now) {
  if (!gameActive) return;
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;

  update(dt);
  draw();
  requestAnimationFrame(loop);
}

// Idle draw
(function idle() {
  if (gameActive) return;
  const t = performance.now() * 0.001;
  const bg = ctx.createLinearGradient(0,0,0,GH);
  bg.addColorStop(0,'#1a0a2e');bg.addColorStop(1,'#2d1458');
  ctx.fillStyle = bg; ctx.fillRect(0,0,GW,GH);

  // Bouncing blob
  const bx = GW/2, by = GH/2 + Math.sin(t*2)*30;
  const sx = 1 + Math.sin(t*3)*0.1, sy = 1 - Math.sin(t*3)*0.1;
  ctx.save(); ctx.translate(bx, by); ctx.scale(sx, sy);
  ctx.shadowColor = '#ff6eb4'; ctx.shadowBlur = 20;
  ctx.fillStyle = '#ff6eb4';
  ctx.beginPath(); ctx.arc(0, 0, 25, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-6, -4, 5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(6, -4, 5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#1a0a2e';
  ctx.beginPath(); ctx.arc(-5, -3, 2.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(7, -3, 2.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(0, 4, 4, 0.1, Math.PI-0.1);
  ctx.strokeStyle = '#1a0a2e'; ctx.lineWidth = 1.5; ctx.stroke();
  ctx.restore();

  requestAnimationFrame(idle);
})();
</script>
