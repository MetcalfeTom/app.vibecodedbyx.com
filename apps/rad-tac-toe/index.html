<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rad Tac Toe</title>
<link rel="icon" href="https://emojicdn.elk.sh/☢️">
<meta property="og:title" content="Rad Tac Toe">
<meta property="og:description" content="Radioactive tic-tac-toe with CRT glitch effects. Can you beat the reactor?">
<meta property="og:url" content="https://sloppy.live/rad-tac-toe">
<meta property="og:image" content="https://sloppy.live/rad-tac-toe/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=VT323&display=swap" rel="stylesheet">
<style>
:root{--green:#39ff14;--red:#ff1744;--amber:#ffab00;--bg:#0a0a0a;--crt-line:rgba(0,255,0,0.03)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--green);font-family:'VT323',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}

/* CRT effect overlay */
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,var(--crt-line) 0px,var(--crt-line) 1px,transparent 1px,transparent 3px);pointer-events:none;z-index:100}
body::after{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at center,transparent 50%,rgba(0,0,0,0.4) 100%);pointer-events:none;z-index:99}

@keyframes flicker{0%,100%{opacity:1}92%{opacity:1}93%{opacity:0.8}94%{opacity:1}97%{opacity:0.9}98%{opacity:1}}
.crt{animation:flicker 4s infinite}

@keyframes scanline{0%{top:-5%}100%{top:105%}}
#scanline{position:fixed;left:0;width:100%;height:8px;background:linear-gradient(transparent,rgba(57,255,20,0.06),transparent);z-index:101;pointer-events:none;animation:scanline 6s linear infinite}

@keyframes glitch-h{0%,100%{transform:translateX(0)}25%{transform:translateX(-2px)}50%{transform:translateX(1px)}75%{transform:translateX(-1px)}}

.container{position:relative;z-index:1}

header{text-align:center;margin-bottom:24px}
header h1{font-family:'Major Mono Display',monospace;font-size:clamp(28px,7vw,52px);color:var(--green);text-shadow:0 0 20px var(--green),0 0 40px rgba(57,255,20,0.3);letter-spacing:4px}
header h1 .rad{color:var(--amber);text-shadow:0 0 20px var(--amber)}

#status{font-size:22px;text-align:center;margin-bottom:16px;height:28px;text-shadow:0 0 10px var(--green);letter-spacing:2px}
#status.warning{color:var(--amber);text-shadow:0 0 10px var(--amber)}
#status.danger{color:var(--red);text-shadow:0 0 10px var(--red)}

.board{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;width:min(80vw,330px);height:min(80vw,330px);padding:12px;border:2px solid rgba(57,255,20,0.2);border-radius:4px;background:rgba(57,255,20,0.02);position:relative}

.cell{background:rgba(57,255,20,0.03);border:1px solid rgba(57,255,20,0.15);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,border-color .15s;position:relative;overflow:hidden}
.cell:hover:not(.taken){background:rgba(57,255,20,0.06);border-color:rgba(57,255,20,0.3)}
.cell.taken{cursor:default}
.cell canvas{position:absolute;inset:0}

/* Win line */
.cell.win-cell{border-color:var(--amber) !important;box-shadow:0 0 15px rgba(255,171,0,0.3) inset}

.scores{display:flex;justify-content:center;gap:40px;margin-top:20px;font-size:18px;letter-spacing:1px}
.scores span{opacity:0.6}
.scores .val{opacity:1;font-size:22px}
.p1-score{color:var(--green);text-shadow:0 0 8px var(--green)}
.p2-score{color:var(--red);text-shadow:0 0 8px var(--red)}

#controls{text-align:center;margin-top:20px}
#controls button{font-family:'VT323',monospace;font-size:16px;background:none;border:1px solid rgba(57,255,20,0.3);color:var(--green);padding:8px 20px;cursor:pointer;letter-spacing:2px;transition:all .2s;margin:0 4px}
#controls button:hover{background:rgba(57,255,20,0.1);border-color:var(--green);text-shadow:0 0 8px var(--green)}

.mode-select{text-align:center;margin-bottom:16px;font-size:14px;opacity:0.5}
.mode-select button{font-family:'VT323',monospace;font-size:15px;background:none;border:none;color:var(--green);cursor:pointer;padding:2px 10px;opacity:0.5;transition:opacity .2s;letter-spacing:1px}
.mode-select button.active{opacity:1;text-decoration:underline;text-shadow:0 0 8px var(--green)}

/* Glitch flash on place */
@keyframes place-glitch{0%{filter:none}15%{filter:hue-rotate(90deg) brightness(2)}30%{filter:none}45%{filter:hue-rotate(-60deg) brightness(1.5)}60%{filter:none}}
.cell.just-placed{animation:place-glitch .3s ease-out}
</style>
</head>
<body class="crt">
<div id="scanline"></div>
<div class="container">
  <header>
    <h1><span class="rad">RAD</span> TAC TOE</h1>
  </header>
  <div class="mode-select">
    <button class="active" id="mode-ai" onclick="setMode('ai')">VS REACTOR</button>
    <button id="mode-2p" onclick="setMode('2p')">2 PLAYER</button>
  </div>
  <div id="status">YOUR TURN ☢</div>
  <div class="board" id="board"></div>
  <div class="scores">
    <div class="p1-score"><span>☢ </span><span class="val" id="s1">0</span></div>
    <div class="p2-score"><span>☣ </span><span class="val" id="s2">0</span></div>
  </div>
  <div id="controls">
    <button onclick="resetGame()">NEW ROUND</button>
    <button onclick="resetScores()">RESET ALL</button>
  </div>
</div>

<script>
const board = document.getElementById('board');
const statusEl = document.getElementById('status');
let cells = Array(9).fill(null);
let cellEls = [];
let turn = 0; // 0 = player 1 (☢), 1 = player 2 / AI (☣)
let gameOver = false;
let mode = 'ai';
let scores = [0, 0];
let canPlay = true;

const SYMBOLS = ['☢', '☣'];
const COLORS = [getComputedStyle(document.documentElement).getPropertyValue('--green').trim(), getComputedStyle(document.documentElement).getPropertyValue('--red').trim()];

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function sfx(freq, dur, type, vol) {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type || 'square';
  o.frequency.setValueAtTime(freq, audioCtx.currentTime);
  g.gain.setValueAtTime(vol || 0.04, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}

function setMode(m) {
  mode = m;
  document.getElementById('mode-ai').classList.toggle('active', m === 'ai');
  document.getElementById('mode-2p').classList.toggle('active', m === '2p');
  resetScores();
}

function buildBoard() {
  board.innerHTML = '';
  cellEls = [];
  for (let i = 0; i < 9; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    const cvs = document.createElement('canvas');
    cell.appendChild(cvs);
    cell.addEventListener('click', () => handleClick(i));
    board.appendChild(cell);
    cellEls.push({ el: cell, canvas: cvs });
  }
  resizeCells();
}

function resizeCells() {
  cellEls.forEach(c => {
    const rect = c.el.getBoundingClientRect();
    c.canvas.width = rect.width;
    c.canvas.height = rect.height;
  });
  // Redraw existing symbols
  for (let i = 0; i < 9; i++) {
    if (cells[i] !== null) drawSymbol(i, cells[i]);
  }
}
addEventListener('resize', resizeCells);

function drawSymbol(idx, player) {
  const c = cellEls[idx];
  const ctx = c.canvas.getContext('2d');
  const w = c.canvas.width, h = c.canvas.height;
  ctx.clearRect(0, 0, w, h);
  const cx = w/2, cy = h/2;
  const r = Math.min(w, h) * 0.32;
  const color = player === 0 ? '#39ff14' : '#ff1744';
  const glowColor = player === 0 ? 'rgba(57,255,20,' : 'rgba(255,23,68,';

  if (player === 0) {
    // Radioactive symbol ☢
    ctx.save();
    ctx.translate(cx, cy);
    // Outer circle
    ctx.strokeStyle = color;
    ctx.shadowColor = color;
    ctx.shadowBlur = 12;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.stroke();
    // Three blades
    for (let i = 0; i < 3; i++) {
      const angle = i * (Math.PI * 2 / 3) - Math.PI / 2;
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.arc(0, 0, r * 0.85, angle - 0.45, angle + 0.45);
      ctx.closePath();
      ctx.fill();
    }
    // Center dot
    ctx.fillStyle = player === 0 ? '#0a0a0a' : '#0a0a0a';
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // Inner gaps
    ctx.globalCompositeOperation = 'destination-out';
    for (let i = 0; i < 3; i++) {
      const angle = i * (Math.PI * 2 / 3) - Math.PI / 2 + Math.PI / 3;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.arc(0, 0, r * 0.86, angle - 0.35, angle + 0.35);
      ctx.closePath();
      ctx.fill();
    }
    ctx.globalCompositeOperation = 'source-over';
    ctx.restore();
  } else {
    // Biohazard symbol ☣
    ctx.save();
    ctx.translate(cx, cy);
    ctx.strokeStyle = color;
    ctx.shadowColor = color;
    ctx.shadowBlur = 12;
    ctx.lineWidth = 2.5;
    const sr = r * 0.45;
    // Three interlocking circles
    for (let i = 0; i < 3; i++) {
      const angle = i * (Math.PI * 2 / 3) - Math.PI / 2;
      const ox = Math.cos(angle) * sr * 0.55;
      const oy = Math.sin(angle) * sr * 0.55;
      ctx.beginPath();
      ctx.arc(ox, oy, sr, 0, Math.PI * 2);
      ctx.stroke();
    }
    // Center ring
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.arc(0, 0, r * 0.12, 0, Math.PI * 2);
    ctx.fill();
    // Outer ring
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
}

function handleClick(idx) {
  if (cells[idx] !== null || gameOver || !canPlay) return;
  placeMove(idx, turn);
  sfx(400 + turn * 200, 0.1, 'square', 0.05);

  const winner = checkWin();
  if (winner !== null) {
    endRound(winner);
    return;
  }
  if (cells.every(c => c !== null)) {
    endRound(-1); // draw
    return;
  }

  turn = 1 - turn;
  updateStatus();

  if (mode === 'ai' && turn === 1 && !gameOver) {
    canPlay = false;
    setTimeout(aiMove, 300 + Math.random() * 400);
  }
}

function placeMove(idx, player) {
  cells[idx] = player;
  cellEls[idx].el.classList.add('taken', 'just-placed');
  setTimeout(() => cellEls[idx].el.classList.remove('just-placed'), 300);
  drawSymbol(idx, player);
}

function aiMove() {
  if (gameOver) return;
  // Try to win
  let move = findBestMove(1);
  // Try to block
  if (move === -1) move = findBestMove(0);
  // Take center
  if (move === -1 && cells[4] === null) move = 4;
  // Take corner
  if (move === -1) {
    const corners = [0,2,6,8].filter(i => cells[i] === null);
    if (corners.length) move = corners[Math.floor(Math.random() * corners.length)];
  }
  // Take any
  if (move === -1) {
    const avail = cells.map((c,i) => c === null ? i : -1).filter(i => i >= 0);
    move = avail[Math.floor(Math.random() * avail.length)];
  }

  placeMove(move, 1);
  sfx(300, 0.12, 'sawtooth', 0.04);

  const winner = checkWin();
  if (winner !== null) { endRound(winner); canPlay = true; return; }
  if (cells.every(c => c !== null)) { endRound(-1); canPlay = true; return; }

  turn = 0;
  canPlay = true;
  updateStatus();
}

function findBestMove(player) {
  const wins = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
  for (const w of wins) {
    const vals = w.map(i => cells[i]);
    const mine = vals.filter(v => v === player).length;
    const empty = vals.filter(v => v === null).length;
    if (mine === 2 && empty === 1) {
      return w.find(i => cells[i] === null);
    }
  }
  return -1;
}

const WIN_LINES = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];

function checkWin() {
  for (const w of WIN_LINES) {
    if (cells[w[0]] !== null && cells[w[0]] === cells[w[1]] && cells[w[1]] === cells[w[2]]) {
      return { winner: cells[w[0]], line: w };
    }
  }
  return null;
}

function endRound(result) {
  gameOver = true;
  if (result === -1) {
    statusEl.textContent = 'MELTDOWN - DRAW';
    statusEl.className = 'warning';
    sfx(200, 0.3, 'sawtooth', 0.06);
    sfx(150, 0.4, 'sawtooth', 0.04);
  } else {
    const w = result.winner;
    result.line.forEach(i => cellEls[i].el.classList.add('win-cell'));
    scores[w]++;
    document.getElementById('s1').textContent = scores[0];
    document.getElementById('s2').textContent = scores[1];
    if (w === 0) {
      statusEl.textContent = mode === '2p' ? 'PLAYER 1 WINS ☢' : 'YOU WIN ☢';
      statusEl.className = '';
    } else {
      statusEl.textContent = mode === '2p' ? 'PLAYER 2 WINS ☣' : 'REACTOR WINS ☣';
      statusEl.className = 'danger';
    }
    // Victory sound
    sfx(500, 0.1, 'sine', 0.05);
    setTimeout(() => sfx(700, 0.1, 'sine', 0.05), 100);
    setTimeout(() => sfx(900, 0.15, 'sine', 0.05), 200);
    // Glitch the whole board
    board.style.animation = 'glitch-h .15s ease 3';
    setTimeout(() => board.style.animation = '', 500);
  }
}

function updateStatus() {
  if (gameOver) return;
  if (mode === 'ai') {
    statusEl.textContent = turn === 0 ? 'YOUR TURN ☢' : 'REACTOR THINKING...';
    statusEl.className = turn === 0 ? '' : 'warning';
  } else {
    statusEl.textContent = turn === 0 ? 'PLAYER 1 ☢' : 'PLAYER 2 ☣';
    statusEl.className = turn === 0 ? '' : 'danger';
  }
}

function resetGame() {
  cells = Array(9).fill(null);
  gameOver = false;
  turn = 0;
  canPlay = true;
  cellEls.forEach(c => {
    c.el.classList.remove('taken', 'win-cell');
    const ctx = c.canvas.getContext('2d');
    ctx.clearRect(0, 0, c.canvas.width, c.canvas.height);
  });
  updateStatus();
  sfx(600, 0.08, 'sine', 0.03);
}

function resetScores() {
  scores = [0, 0];
  document.getElementById('s1').textContent = 0;
  document.getElementById('s2').textContent = 0;
  resetGame();
}

buildBoard();
updateStatus();
</script>
</body>
</html>
