<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Glitch Synth</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#04020a">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%93%BC">
<meta name="description" content="A live glitch-synth Рђћ bit-crushed waveshaper voices, stutter retrigger, chaos algorithm, and a full-screen visualizer stack reacting to every note.">
<meta property="og:title" content="Glitch Synth">
<meta property="og:description" content="A live glitch-synth Рђћ bit-crushed waveshaper voices, stutter retrigger, chaos algorithm, and a full-screen visualizer stack reacting to every note.">
<meta property="og:url" content="https://sloppy.live/glitch-synth">
<meta property="og:image" content="https://image.pollinations.ai/prompt/glitch%20synth%20visualizer%20with%20RGB%20split%20oscilloscope%2C%20bit-crushed%20audio%2C%20chromatic%20aberration%2C%20neon%20pink%20cyan%2C%20datamosh%20aesthetic?width=1200&height=630&model=flux&seed=9999&nologo=true">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Share+Tech+Mono&family=VT323&family=Audiowide&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#04020a;
    --void-2:#0c0418;
    --cyan:#5ce6ff;
    --magenta:#ff2bd6;
    --pink:#ff6ec0;
    --gold:#ffd454;
    --lime:#a5ff52;
    --violet:#9b5bff;
    --orange:#ff8a3a;
    --error:#ff5a5a;
    --ink:#f4f0ff;
    --silver:#a3a8c2;
    --silver-dim:#5e637a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  html,body{height:100%;overflow:hidden;background:var(--void);color:var(--ink);font-family:'Share Tech Mono', monospace;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:none}
  body{
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(255,43,214,0.16), transparent 60%),
      radial-gradient(ellipse 70% 40% at 50% 100%, rgba(92,230,255,0.10), transparent 70%),
      var(--void);
    display:flex;flex-direction:column;align-items:center;
  }

  #viz{position:fixed;inset:0;display:block;width:100%;height:100%;cursor:pointer;background:#000}

  header{
    position:fixed;top:0.6rem;left:50%;transform:translateX(-50%);
    text-align:center;z-index:6;pointer-events:none;
  }
  h1{
    font-family:'Audiowide', monospace;
    font-size:clamp(1.5rem, 3.4vw, 2.4rem);letter-spacing:0.12em;
    color:var(--ink);position:relative;
    text-shadow:0 0 14px rgba(255,43,214,0.5);
  }
  /* Glitchy RGB-split title duplicates */
  h1::before, h1::after{
    content:attr(data-text);position:absolute;top:0;left:0;width:100%;
    pointer-events:none;
  }
  h1::before{color:var(--magenta);transform:translate(-2px,1px);mix-blend-mode:screen;opacity:0.85;animation:glitchShift 3.4s steps(1) infinite}
  h1::after{color:var(--cyan);transform:translate(2px,-1px);mix-blend-mode:screen;opacity:0.85;animation:glitchShift 3.4s steps(1) infinite reverse}
  @keyframes glitchShift{
    0%,90%,100%{transform:translate(-2px,1px)}
    92%{transform:translate(-6px,-2px) skewX(-3deg)}
    94%{transform:translate(4px,3px) skewX(2deg)}
    96%{transform:translate(-3px,-1px)}
    98%{transform:translate(2px,2px)}
  }
  .tag{font-family:'VT323', monospace;font-size:clamp(0.85rem, 1.4vw, 1.05rem);letter-spacing:0.18em;color:var(--silver);margin-top:0.1rem;text-transform:uppercase}

  /* Bottom-stacked container Рђћ pads on top, controls below, single safe-gap column */
  .bottom-bar{
    position:fixed;bottom:0.6rem;left:50%;transform:translateX(-50%);
    display:flex;flex-direction:column;align-items:center;gap:0.5rem;
    z-index:6;max-width:calc(100% - 1rem);width:auto;
    pointer-events:none;          /* allow children to opt in (transparent gaps) */
  }
  .bottom-bar > *{pointer-events:auto}

  .pads{
    display:grid;grid-template-columns:repeat(6, 4.4rem);gap:0.4rem;
  }
  .pad{
    position:relative;
    background:rgba(8,3,18,0.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border:2px solid var(--violet);color:var(--ink);
    font-family:'VT323', monospace;font-size:0.95rem;letter-spacing:0.06em;
    border-radius:0.4rem;cursor:pointer;
    min-height:3.2rem;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.05rem;
    box-shadow:0 0 12px rgba(155,91,255,0.35), inset 0 0 8px rgba(155,91,255,0.10), 0 3px 0 rgba(0,0,0,0.4);
    transition:transform 0.06s, box-shadow 0.15s;
    text-transform:uppercase;
  }
  .pad .key{color:var(--silver-dim);font-size:0.65rem;letter-spacing:0.18em}
  .pad .note{font-size:0.95rem;font-weight:400}
  .pad:active, .pad.firing{
    transform:translateY(2px);
    box-shadow:0 0 22px var(--magenta), inset 0 0 14px rgba(255,43,214,0.40), 0 1px 0 rgba(0,0,0,0.4);
    border-color:var(--magenta);
    color:var(--magenta);
  }
  .pad:focus-visible{outline:3px solid var(--cyan);outline-offset:2px}
  .pad[data-hue] {} /* placeholder; hues set inline */

  /* Top HUD pills */
  .hud{
    position:fixed;top:3.4rem;left:0.6rem;right:0.6rem;
    display:flex;justify-content:space-between;align-items:flex-start;gap:0.5rem;
    z-index:6;pointer-events:none;
  }
  .hud .card{
    background:rgba(8,3,18,0.78);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(255,43,214,0.32);
    padding:0.4rem 0.7rem;border-radius:0.35rem;
    display:flex;flex-direction:column;gap:0.1rem;text-align:center;min-width:4.6rem;
    box-shadow:0 0 12px rgba(255,43,214,0.16);
    font-family:'Share Tech Mono', monospace;
  }
  .hud .label{font-size:0.55rem;letter-spacing:0.22em;color:var(--silver);text-transform:uppercase}
  .hud .val{font-family:'VT323', monospace;font-size:1.15rem;color:var(--cyan);letter-spacing:0.04em;line-height:1}
  .hud .card.bpm .val{color:var(--lime)}
  .hud .card.glitch.on .val{color:var(--magenta);text-shadow:0 0 8px var(--magenta);animation:flicker 0.4s steps(1) infinite}
  .hud .card.chaos.on .val{color:var(--error);animation:flicker 0.15s steps(1) infinite}
  @keyframes flicker{0%,90%{opacity:1}92%{opacity:0.4}94%{opacity:0.8}96%{opacity:0.5}}

  /* Controls bar Рђћ wraps naturally; lives inside .bottom-bar so it can't overlap pads */
  .controls{
    display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;justify-content:center;
    background:rgba(8,3,18,0.84);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border:1px solid rgba(255,43,214,0.32);
    padding:0.55rem 0.85rem;border-radius:0.5rem;
    font-size:0.62rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--silver);
    max-width:100%;
    font-family:'Share Tech Mono', monospace;
  }
  .controls label{display:flex;align-items:center;gap:0.35rem;font-family:'Share Tech Mono', monospace}
  .controls input[type="range"]{accent-color:var(--magenta);width:5rem;height:2.5rem}
  .controls .val{color:var(--lime);font-family:'VT323', monospace;font-size:0.9rem;min-width:2.6rem;text-align:right}
  .controls .sep{width:1px;background:rgba(255,43,214,0.25);height:1.2rem}
  .controls button{
    background:transparent;color:var(--cyan);border:1px solid var(--cyan);
    font-family:'Audiowide', monospace;font-size:0.7rem;letter-spacing:0.12em;text-transform:uppercase;
    padding:0.5rem 0.8rem;border-radius:0.22rem;cursor:pointer;min-height:2.5rem;
  }
  .controls button:hover{background:rgba(92,230,255,0.14)}
  .controls button:focus-visible{outline:3px solid var(--ink);outline-offset:2px}
  .controls button.chaos{
    color:var(--error);border-color:var(--error);font-family:'Audiowide', monospace;
    box-shadow:0 0 12px rgba(255,90,90,0.35);
  }
  .controls button.chaos:hover{background:rgba(255,90,90,0.18)}
  .controls button.glitch[aria-pressed="true"]{
    background:rgba(255,43,214,0.18);color:var(--magenta);border-color:var(--magenta);
    box-shadow:0 0 14px rgba(255,43,214,0.5);
  }
  .controls button.arp[aria-pressed="true"]{
    background:rgba(165,255,82,0.18);color:var(--lime);border-color:var(--lime);
  }

  @media (max-width: 720px){
    .pads{grid-template-columns:repeat(6, 3.6rem);gap:0.32rem}
    .pad{min-height:2.8rem;font-size:0.82rem}
  }
  @media (max-width: 480px){
    /* 12 pads as 3 rows of 4 Рђћ fits any phone width without horizontal overflow */
    .pads{grid-template-columns:repeat(4, 3.6rem);gap:0.32rem}
    .pad{min-height:2.6rem;font-size:0.78rem}
    .pad .key{font-size:0.55rem}
    .pad .note{font-size:0.8rem}
    .hud{top:2.6rem;gap:0.35rem}
    .hud .val{font-size:0.95rem}
    .hud .card{padding:0.3rem 0.5rem;min-width:3.6rem}
    .controls{font-size:0.54rem;padding:0.4rem 0.55rem;gap:0.35rem}
    .controls button{padding:0.4rem 0.6rem;font-size:0.6rem}
    .controls input[type="range"]{width:4rem}
    .controls .val{font-size:0.78rem;min-width:2rem}
    .bottom-bar{bottom:0.4rem;gap:0.4rem}
    header{padding-top:0.4rem}
  }
  @media (max-width: 340px){
    .pads{grid-template-columns:repeat(4, 3rem);gap:0.25rem}
    .pad{min-height:2.3rem;font-size:0.7rem}
  }
  @media (prefers-reduced-motion: reduce){
    h1::before, h1::after{animation:none}
    .hud .card.glitch.on .val, .hud .card.chaos.on .val{animation:none}
  }
</style>
</head>
<body>
  <canvas id="viz" role="application" aria-label="A glitch synthesizer. Click pads or use number keys 1 to 6 and Q W E R T Y for the 12 melodic pads. Space triggers a chaos burst. G toggles stutter glitch mode."></canvas>

  <header>
    <h1 data-text="GLITCH SYNTH">GLITCH SYNTH</h1>
    <div class="tag">┬и=┬и bit ┬иcrush┬и stutter ┬иchaos ┬и=┬и</div>
  </header>

  <div class="hud" role="group" aria-label="Synth state">
    <div class="card bpm"><div class="label">bpm</div><div class="val"><span id="bpmHud">112</span></div></div>
    <div class="card"><div class="label">notes</div><div class="val"><span id="notesHud">0</span></div></div>
    <div class="card glitch" id="glitchHud"><div class="label">glitch</div><div class="val" id="glitchHudVal">off</div></div>
    <div class="card chaos" id="chaosHud"><div class="label">chaos</div><div class="val" id="chaosHudVal">Рђћ</div></div>
  </div>

  <div class="bottom-bar">
    <div class="pads" id="pads" role="group" aria-label="Synth pads"></div>
    <div class="controls" role="group" aria-label="Synth controls">
      <label>bpm <input id="bpmInput" type="range" min="60" max="180" value="112" step="1"><span class="val" id="bpmVal">112</span></label>
      <span class="sep" aria-hidden="true"></span>
      <label>bits <input id="bitsInput" type="range" min="2" max="8" value="4" step="1"><span class="val" id="bitsVal">4</span></label>
      <span class="sep" aria-hidden="true"></span>
      <label>drive <input id="driveInput" type="range" min="0" max="100" value="35" step="1"><span class="val" id="driveVal">35</span></label>
      <span class="sep" aria-hidden="true"></span>
      <label>vol <input id="volInput" type="range" min="0" max="100" value="60" step="1"><span class="val" id="volVal">60</span></label>
      <span class="sep" aria-hidden="true"></span>
      <button class="glitch" id="glitchBtn" type="button" aria-pressed="false" aria-label="Toggle stutter glitch">Рџа glitch</button>
      <button class="arp" id="arpBtn" type="button" aria-pressed="false" aria-label="Toggle auto arpeggiator">Рє╗ arp</button>
      <button class="chaos" id="chaosBtn" type="button" aria-label="Trigger chaos burst">РџА chaos</button>
      <button id="muteBtn" type="button" aria-pressed="false" aria-label="Toggle sound">РЎф</button>
    </div>
  </div>

<script>
(function(){
  'use strict';

  function showError(msg){
    try {
      var t = document.getElementById('errToast');
      if (!t){
        t = document.createElement('div');
        t.id = 'errToast';
        t.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#3a0610;color:#ffb6c1;font-family:monospace;font-size:11px;padding:8px 12px;border-bottom:1px solid #ff2bd6;white-space:pre-wrap';
        document.body.appendChild(t);
      }
      t.textContent = 'Рџа ' + msg;
    } catch(_){}
  }
  window.addEventListener('error', function(ev){
    showError((ev.message || 'error') + ' @ ' + (ev.filename ? ev.filename.split('/').pop() : '?') + ':' + (ev.lineno || '?'));
  });

  var prefersReducedMotion = false;
  try { prefersReducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch(_){}

  var canvas = document.getElementById('viz');
  var ctx;
  try { ctx = canvas.getContext('2d'); } catch(e){ showError('canvas init: ' + e.message); return; }
  if (!ctx){ showError('canvas 2d unavailable'); return; }

  var DPR = Math.min(window.devicePixelRatio || 1, 2);
  var W = 800, H = 600;
  function resize(){
    try {
      W = window.innerWidth; H = window.innerHeight;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      canvas.width = Math.floor(W * DPR);
      canvas.height = Math.floor(H * DPR);
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    } catch(e){ showError('resize: ' + e.message); }
  }
  resize();
  window.addEventListener('resize', resize);
  // Orientation change on mobile + post-layout-settle resize so the canvas
  // always matches the live viewport (HUD + bottom bar reflow can shift the
  // visible area, esp. with browser chrome show/hide on iOS).
  window.addEventListener('orientationchange', function(){ setTimeout(resize, 60); });
  setTimeout(resize, 80);

  // РћђРћђ Notes (one octave + a few extras, chromatic) РћђРћђ
  // 12 pads Рђћ C4 chromatic
  var PAD_NOTES = [
    { name: 'C',  midi: 60, key: '1' },
    { name: 'C#', midi: 61, key: '2' },
    { name: 'D',  midi: 62, key: '3' },
    { name: 'D#', midi: 63, key: '4' },
    { name: 'E',  midi: 64, key: '5' },
    { name: 'F',  midi: 65, key: '6' },
    { name: 'F#', midi: 66, key: 'Q' },
    { name: 'G',  midi: 67, key: 'W' },
    { name: 'G#', midi: 68, key: 'E' },
    { name: 'A',  midi: 69, key: 'R' },
    { name: 'A#', midi: 70, key: 'T' },
    { name: 'B',  midi: 71, key: 'Y' }
  ];
  function midiToHz(m){ return 440 * Math.pow(2, (m - 69) / 12); }

  // РћђРћђ State РћђРћђ
  var state = {
    bpm: 112,
    bits: 4,
    drive: 35,
    volume: 0.60,
    muted: false,
    glitchOn: false,
    arpOn: false,
    chaosUntil: 0,
    notes: 0,
    arpStep: 0,
    arpNextT: 0,
    lastNoteMidi: 60
  };

  // РћђРћђ Build pads РћђРћђ
  var padsEl = document.getElementById('pads');
  var padEls = [];
  PAD_NOTES.forEach(function(n, i){
    var b = document.createElement('button');
    b.type = 'button';
    b.className = 'pad';
    b.dataset.idx = i;
    var hue = Math.round((i / 12) * 360);
    b.style.borderColor = 'hsl(' + hue + ',95%,55%)';
    b.style.color = 'hsl(' + hue + ',95%,75%)';
    b.style.boxShadow = '0 0 12px hsla(' + hue + ',95%,55%,0.4), inset 0 0 8px hsla(' + hue + ',95%,55%,0.10), 0 3px 0 rgba(0,0,0,0.4)';
    b.innerHTML = '<span class="key">' + n.key + '</span><span class="note">' + n.name + '</span>';
    b.addEventListener('pointerdown', function(e){
      e.preventDefault();
      ensureAudio();
      playPad(i);
      flashPad(i);
    });
    padsEl.appendChild(b);
    padEls.push(b);
  });
  function flashPad(i){
    var b = padEls[i]; if (!b) return;
    b.classList.add('firing');
    setTimeout(function(){ b.classList.remove('firing'); }, 110);
  }

  // РћђРћђ Audio graph РћђРћђ
  var audioCtx = null;
  var master = null, masterGain = null;
  var bitcrusher = null, distortion = null, lowpass = null;
  var reverb = null, reverbSend = null;
  var analyser = null, fftData = null, timeData = null;
  function ensureAudio(){
    if (audioCtx){ if (audioCtx.state === 'suspended') audioCtx.resume(); return audioCtx; }
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = state.muted ? 0 : state.volume;
      var comp = audioCtx.createDynamicsCompressor();
      comp.threshold.value = -8; comp.knee.value = 12; comp.ratio.value = 4;
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 1024; analyser.smoothingTimeConstant = 0.7;
      fftData = new Uint8Array(analyser.frequencyBinCount);
      timeData = new Uint8Array(analyser.fftSize);

      // Effect chain: voices Рєњ bitcrusher Рєњ distortion Рєњ lowpass Рєњ comp Рєњ analyser Рєњ dest
      bitcrusher = makeBitCrusher(state.bits);
      distortion = makeDistortion(state.drive / 100);
      lowpass = audioCtx.createBiquadFilter();
      lowpass.type = 'lowpass';
      lowpass.frequency.value = 8000;
      lowpass.Q.value = 1.2;
      bitcrusher.connect(distortion).connect(lowpass).connect(comp).connect(analyser).connect(audioCtx.destination);
      // Master into the same comp via lowpass (so notes always pass through bitcrush)
      // OR put master at the end. Use master at the top of the chain:
      masterGain.connect(bitcrusher);

      // Procedural reverb
      var irLen = audioCtx.sampleRate * 1.3;
      var ir = audioCtx.createBuffer(2, irLen, audioCtx.sampleRate);
      for (var ch = 0; ch < 2; ch++){
        var d = ir.getChannelData(ch);
        for (var i = 0; i < irLen; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / irLen, 2.4);
      }
      reverb = audioCtx.createConvolver(); reverb.buffer = ir;
      reverbSend = audioCtx.createGain(); reverbSend.gain.value = 0.32;
      reverb.connect(reverbSend).connect(masterGain);
    } catch(e){ showError('audio init: ' + e.message); audioCtx = null; }
    return audioCtx;
  }
  function makeBitCrusher(bits){
    var n = 1024;
    var ws = audioCtx.createWaveShaper();
    var curve = new Float32Array(n);
    var levels = Math.pow(2, bits);
    var step = 2 / levels;
    for (var i = 0; i < n; i++){
      var x = (i / n) * 2 - 1;
      curve[i] = Math.round(x / step) * step;
    }
    ws.curve = curve;
    ws.oversample = '2x';
    return ws;
  }
  function makeDistortion(amount){
    var n = 1024;
    var ws = audioCtx.createWaveShaper();
    var k = amount * 90;
    var curve = new Float32Array(n);
    for (var i = 0; i < n; i++){
      var x = (i / n) * 2 - 1;
      curve[i] = (3 + k) * x * 20 * (Math.PI / 180) / (Math.PI + k * Math.abs(x));
    }
    ws.curve = curve;
    ws.oversample = '2x';
    return ws;
  }
  function updateBitCrusher(){
    if (!audioCtx) return;
    var newBC = makeBitCrusher(state.bits);
    // Disconnect old and rewire
    try {
      masterGain.disconnect(); bitcrusher.disconnect();
      masterGain.connect(newBC);
      newBC.connect(distortion);
      bitcrusher = newBC;
    } catch(e){ showError('bc update: ' + e.message); }
  }
  function updateDistortion(){
    if (!audioCtx) return;
    var newD = makeDistortion(state.drive / 100);
    try {
      bitcrusher.disconnect(); distortion.disconnect();
      bitcrusher.connect(newD);
      newD.connect(lowpass);
      distortion = newD;
    } catch(e){ showError('dist update: ' + e.message); }
  }

  // РћђРћђ Voice РћђРћђ
  function playNote(midi, opts){
    opts = opts || {};
    ensureAudio(); if (!audioCtx) return;
    var t = audioCtx.currentTime + (opts.delay || 0);
    var freq = midiToHz(midi);
    var dur = opts.dur || 0.45;

    // 2-osc voice + noise for glitch character
    var o1 = audioCtx.createOscillator(); o1.type = opts.type || 'sawtooth';
    o1.frequency.setValueAtTime(freq, t);
    // Occasional random pitch jump for glitchiness
    if (state.glitchOn && Math.random() < 0.35){
      o1.frequency.setValueAtTime(freq * (1 + (Math.random() - 0.5) * 0.6), t + 0.04);
    }
    var o2 = audioCtx.createOscillator(); o2.type = 'square';
    o2.frequency.value = freq * (opts.detune || 1.005);
    o2.detune.value = 8;

    var vg = audioCtx.createGain();
    vg.gain.setValueAtTime(0.0001, t);
    vg.gain.exponentialRampToValueAtTime(opts.gain || 0.32, t + 0.005);
    vg.gain.exponentialRampToValueAtTime(0.0001, t + dur);

    // Voice filter for tonal variation
    var vf = audioCtx.createBiquadFilter();
    vf.type = 'bandpass';
    vf.frequency.value = freq * 4;
    vf.Q.value = 1.2;
    o1.connect(vf); o2.connect(vf);
    vf.connect(vg).connect(masterGain);

    // Wet send
    var ws = audioCtx.createGain(); ws.gain.value = 0.5;
    vg.connect(ws).connect(reverb);

    o1.start(t); o1.stop(t + dur + 0.05);
    o2.start(t); o2.stop(t + dur + 0.05);

    state.notes++;
    state.lastNoteMidi = midi;
    state.lastHitHue = ((midi % 12) / 12) * 360;
    state.lastHitT = performance.now();
    pushBurst(state.lastHitHue);

    // Glitch stutter Рђћ rapid retrigger
    if (state.glitchOn && !opts.fromStutter){
      var reps = 3 + Math.floor(Math.random() * 4);
      var gap = 0.035 + Math.random() * 0.04;
      for (var r = 1; r <= reps; r++){
        playNote(midi + (Math.random() < 0.4 ? (Math.random() < 0.5 ? 5 : -5) : 0), {
          delay: r * gap, gain: 0.22 * (1 - r/reps), dur: 0.18, fromStutter: true, type: 'sawtooth'
        });
      }
    }
  }

  function playPad(i){
    var n = PAD_NOTES[i];
    if (!n) return;
    playNote(n.midi);
  }

  // РћђРћђ CHAOS algorithm Рђћ rapid burst of random notes with bit-crush spike РћђРћђ
  function fireChaos(){
    ensureAudio(); if (!audioCtx) return;
    state.chaosUntil = performance.now() + 1200;
    var hits = 14 + Math.floor(Math.random() * 14);
    for (var i = 0; i < hits; i++){
      var midi = 48 + Math.floor(Math.random() * 36);  // wide range
      var delay = i * (0.025 + Math.random() * 0.06);
      playNote(midi, { delay: delay, gain: 0.16, dur: 0.12 + Math.random() * 0.12, type: Math.random() < 0.5 ? 'sawtooth' : 'square' });
    }
    // Noise burst
    var bufLen = Math.floor(audioCtx.sampleRate * 0.4);
    var buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
    var d = buf.getChannelData(0);
    for (var j = 0; j < bufLen; j++) d[j] = (Math.random() * 2 - 1) * Math.pow(1 - j/bufLen, 1.6);
    var ns = audioCtx.createBufferSource(); ns.buffer = buf;
    var bp = audioCtx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 1800; bp.Q.value = 1.4;
    var ng = audioCtx.createGain(); ng.gain.value = 0.20;
    ns.connect(bp).connect(ng).connect(masterGain);
    ns.start();
    // Quick bits jam Рђћ slam bits down to 2 then back up
    var origBits = state.bits;
    state.bits = 2;
    updateBitCrusher();
    setTimeout(function(){ state.bits = origBits; updateBitCrusher(); }, 600);
    state.shake = 28;
  }

  // РћђРћђ Arpeggiator Рђћ runs at BPM stepping through the pad notes РћђРћђ
  function arpStep(){
    if (!state.arpOn || state.muted) return;
    var idx = state.arpStep % PAD_NOTES.length;
    // Random jumps for chaotic feel
    if (Math.random() < 0.30) idx = Math.floor(Math.random() * PAD_NOTES.length);
    var note = PAD_NOTES[idx];
    var midi = note.midi + (Math.random() < 0.2 ? 12 : 0);  // occasional octave jump
    playNote(midi, { gain: 0.22, dur: 0.18, type: Math.random() < 0.4 ? 'square' : 'sawtooth' });
    flashPad(idx);
    state.arpStep++;
  }

  // РћђРћђ Input РћђРћђ
  var keyMap = {};
  PAD_NOTES.forEach(function(n, i){ keyMap[n.key] = i; });
  window.addEventListener('keydown', function(e){
    if (e.target && e.target.tagName === 'INPUT') return;
    var k = e.key.toUpperCase();
    if (keyMap[k] != null && !e.repeat){
      ensureAudio();
      playPad(keyMap[k]);
      flashPad(keyMap[k]);
      return;
    }
    if (e.code === 'Space'){
      e.preventDefault();
      ensureAudio(); fireChaos();
    } else if (e.code === 'KeyG'){
      toggleGlitch();
    } else if (e.code === 'KeyA'){
      // 'A' would conflict with future pads Рђћ use distinct toggle key for arp
    }
  });

  // РћђРћђ Controls wiring РћђРћђ
  document.getElementById('bpmInput').addEventListener('input', function(){
    state.bpm = parseInt(this.value, 10) || 112;
    document.getElementById('bpmVal').textContent = state.bpm;
    document.getElementById('bpmHud').textContent = state.bpm;
  });
  document.getElementById('bitsInput').addEventListener('input', function(){
    state.bits = parseInt(this.value, 10) || 4;
    document.getElementById('bitsVal').textContent = state.bits;
    updateBitCrusher();
  });
  document.getElementById('driveInput').addEventListener('input', function(){
    state.drive = parseInt(this.value, 10) || 35;
    document.getElementById('driveVal').textContent = state.drive;
    updateDistortion();
  });
  document.getElementById('volInput').addEventListener('input', function(){
    state.volume = (parseInt(this.value, 10) || 60) / 100;
    document.getElementById('volVal').textContent = Math.round(state.volume * 100);
    if (masterGain && !state.muted) masterGain.gain.setTargetAtTime(state.volume, audioCtx.currentTime, 0.05);
  });
  function toggleGlitch(){
    state.glitchOn = !state.glitchOn;
    var b = document.getElementById('glitchBtn');
    b.setAttribute('aria-pressed', state.glitchOn ? 'true' : 'false');
    var hud = document.getElementById('glitchHud');
    hud.classList.toggle('on', state.glitchOn);
    document.getElementById('glitchHudVal').textContent = state.glitchOn ? 'ON' : 'off';
  }
  document.getElementById('glitchBtn').addEventListener('click', toggleGlitch);
  document.getElementById('arpBtn').addEventListener('click', function(){
    state.arpOn = !state.arpOn;
    this.setAttribute('aria-pressed', state.arpOn ? 'true' : 'false');
    if (state.arpOn){ ensureAudio(); state.arpNextT = performance.now(); }
  });
  document.getElementById('chaosBtn').addEventListener('click', function(){ ensureAudio(); fireChaos(); });
  document.getElementById('muteBtn').addEventListener('click', function(){
    state.muted = !state.muted;
    this.textContent = state.muted ? 'РЎф off' : 'РЎф';
    this.setAttribute('aria-pressed', state.muted ? 'true' : 'false');
    if (masterGain) masterGain.gain.setTargetAtTime(state.muted ? 0 : state.volume, audioCtx.currentTime, 0.05);
  });
  // Audio unlock
  ['pointerdown', 'keydown'].forEach(function(ev){
    window.addEventListener(ev, function once(){ ensureAudio(); window.removeEventListener(ev, once); });
  });

  // РћђРћђ Visualizer state РћђРћђ
  state.bursts = [];
  state.glitchText = [];
  state.shake = 0;
  state.lastHitT = 0;
  state.lastHitHue = 0;

  function pushBurst(hue){
    var n = 14 + Math.floor(Math.random() * 14);
    for (var i = 0; i < n; i++){
      var ang = Math.random() * Math.PI * 2;
      var sp = 80 + Math.random() * 240;
      state.bursts.push({
        x: W / 2 + (Math.random() - 0.5) * W * 0.5,
        y: H / 2 + (Math.random() - 0.5) * H * 0.4,
        vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp,
        ttl: 0.35 + Math.random() * 0.4, life: 0,
        size: 2 + Math.random() * 3,
        hue: hue + (Math.random() - 0.5) * 50
      });
    }
    state.shake = Math.max(state.shake, 8);
  }

  var GLITCH_CHARS = 'РќѕРќЊРќњРќЉРЋ│РЋ▒РЋ▓РЋІРќђРќёРЌєРЌЄРЌѕРЌЅРїгРџаРўЊРџАРїйРїЌРїњРЋЉРЋљРЋг';
  function pushGlitchText(){
    var len = 4 + Math.floor(Math.random() * 16);
    var s = '';
    for (var i = 0; i < len; i++) s += GLITCH_CHARS[Math.floor(Math.random() * GLITCH_CHARS.length)];
    state.glitchText.push({
      x: Math.random() * W, y: Math.random() * H,
      vx: (Math.random() - 0.5) * 60,
      vy: (Math.random() - 0.5) * 30,
      text: s,
      hue: Math.random() * 360,
      ttl: 0.4 + Math.random() * 0.8,
      life: 0,
      size: 14 + Math.floor(Math.random() * 22)
    });
  }

  // РћђРћђ Render РћђРћђ
  var lastT = performance.now();
  function frame(now){
    var dt = Math.min(0.05, (now - lastT) / 1000);
    lastT = now;
    if (prefersReducedMotion) dt *= 0.85;

    // Arp scheduling
    if (state.arpOn){
      var stepDur = 60000 / state.bpm / 2; // 8th notes
      if (now >= state.arpNextT){
        arpStep();
        state.arpNextT = now + stepDur * (Math.random() < 0.1 ? 0.5 : 1);
      }
    }

    // Glitch text spawn
    if (state.glitchOn && Math.random() < dt * 12) pushGlitchText();
    if (now < state.chaosUntil && Math.random() < dt * 30) pushGlitchText();

    // Update bursts
    for (var i = state.bursts.length - 1; i >= 0; i--){
      var p = state.bursts[i];
      p.life += dt;
      if (p.life >= p.ttl){ state.bursts.splice(i, 1); continue; }
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.vy += 60 * dt;
    }
    // Update glitch text
    for (var j = state.glitchText.length - 1; j >= 0; j--){
      var g = state.glitchText[j];
      g.life += dt;
      if (g.life >= g.ttl){ state.glitchText.splice(j, 1); continue; }
      g.x += g.vx * dt; g.y += g.vy * dt;
    }

    state.shake *= Math.pow(0.85, dt * 60);

    // Update chaos HUD pill
    var chaosHud = document.getElementById('chaosHud');
    var chaosActive = now < state.chaosUntil;
    chaosHud.classList.toggle('on', chaosActive);
    document.getElementById('chaosHudVal').textContent = chaosActive ? Math.ceil((state.chaosUntil - now) / 100) + 'x' : 'Рђћ';
    document.getElementById('notesHud').textContent = state.notes;

    render(now);
    requestAnimationFrame(frame);
  }

  function render(now){
    var shakeX = (Math.random() - 0.5) * state.shake;
    var shakeY = (Math.random() - 0.5) * state.shake;
    ctx.save();
    ctx.translate(shakeX, shakeY);

    // Smoky background that reacts to overall energy
    var bgAlpha = 0.18 + (state.glitchOn ? 0.06 : 0) + (now < state.chaosUntil ? 0.10 : 0);
    ctx.fillStyle = 'rgba(4,2,10,' + bgAlpha + ')';
    ctx.fillRect(-20, -20, W + 40, H + 40);

    if (analyser){
      analyser.getByteFrequencyData(fftData);
      analyser.getByteTimeDomainData(timeData);

      // РћђРћђ Layer 1: FFT spectrum bars (radiating from bottom, rainbow) РћђРћђ
      var bars = 64;
      var binStep = Math.floor(fftData.length / bars);
      var barW = W / bars;
      for (var i = 0; i < bars; i++){
        var sum = 0;
        for (var k = 0; k < binStep; k++) sum += fftData[i * binStep + k];
        var amp = sum / binStep / 255;
        var h = amp * H * 0.55;
        var hue = 200 + (i / bars) * 180;
        var x = i * barW;
        var grad = ctx.createLinearGradient(x, H, x, H - h);
        grad.addColorStop(0, 'hsla(' + hue + ',95%,40%,0.9)');
        grad.addColorStop(0.5, 'hsla(' + hue + ',95%,55%,0.85)');
        grad.addColorStop(1, 'hsla(' + hue + ',100%,75%,0.95)');
        ctx.fillStyle = grad;
        ctx.shadowColor = 'hsl(' + hue + ',100%,60%)'; ctx.shadowBlur = 6;
        ctx.fillRect(x + 1, H - h, barW - 2, h);
      }
      ctx.shadowBlur = 0;

      // РћђРћђ Layer 2: Oscilloscope with 3-pass chromatic aberration РћђРћђ
      var oscY = H * 0.35;
      var oscH = H * 0.30;
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      var passes = [
        { off: -2, color: 'rgba(255,43,214,0.55)' },
        { off:  2, color: 'rgba(92,230,255,0.55)' },
        { off:  0, color: 'rgba(244,240,255,0.85)' }
      ];
      var stp = Math.max(1, Math.floor(timeData.length / W));
      passes.forEach(function(p){
        ctx.strokeStyle = p.color;
        ctx.lineWidth = p.off === 0 ? 1.5 : 1;
        ctx.shadowColor = p.color; ctx.shadowBlur = 8;
        ctx.beginPath();
        for (var ix = 0; ix < W; ix++){
          var idx = Math.min(timeData.length - 1, ix * stp);
          var v = timeData[idx] / 128 - 1;
          var y = oscY + oscH / 2 + v * oscH * 0.45;
          if (ix === 0) ctx.moveTo(ix + p.off, y);
          else ctx.lineTo(ix + p.off, y);
        }
        ctx.stroke();
      });
      ctx.restore();
      ctx.shadowBlur = 0;

      // РћђРћђ Occasional screen tear Рђћ copy a horizontal slice and shift it РћђРћђ
      if (state.glitchOn && Math.random() < 0.06){
        var sliceY = Math.random() * H;
        var sliceH = 8 + Math.random() * 32;
        var sliceShift = (Math.random() - 0.5) * 80;
        try {
          var img = ctx.getImageData(0, sliceY * DPR, W * DPR, sliceH * DPR);
          ctx.putImageData(img, sliceShift * DPR, sliceY * DPR);
        } catch(_){}
      }
    }

    // РћђРћђ Layer 3: drifting glitch text РћђРћђ
    for (var gi = 0; gi < state.glitchText.length; gi++){
      var g = state.glitchText[gi];
      var a = 1 - g.life / g.ttl;
      ctx.font = 'bold ' + g.size + 'px "VT323", monospace';
      ctx.fillStyle = 'hsla(' + g.hue + ',100%,70%,' + a + ')';
      ctx.shadowColor = 'hsl(' + g.hue + ',100%,60%)'; ctx.shadowBlur = 8;
      ctx.fillText(g.text, g.x, g.y);
    }
    ctx.shadowBlur = 0;

    // РћђРћђ Layer 4: burst particles (additive) РћђРћђ
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (var pi = 0; pi < state.bursts.length; pi++){
      var p = state.bursts[pi];
      var a = 1 - p.life / p.ttl;
      ctx.fillStyle = 'hsla(' + p.hue + ',100%,70%,' + a + ')';
      ctx.shadowColor = 'hsl(' + p.hue + ',100%,60%)'; ctx.shadowBlur = 10;
      ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    }
    ctx.restore();
    ctx.shadowBlur = 0;

    // РћђРћђ Last hit ripple РћђРћђ
    var sinceHit = (performance.now() - state.lastHitT) / 1000;
    if (sinceHit < 0.6){
      var rt = sinceHit / 0.6;
      ctx.strokeStyle = 'hsla(' + state.lastHitHue + ',100%,70%,' + (1 - rt) * 0.5 + ')';
      ctx.lineWidth = 2.5;
      ctx.shadowColor = ctx.strokeStyle; ctx.shadowBlur = 14;
      ctx.beginPath();
      ctx.arc(W/2, H/2, 60 + rt * 220, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.shadowBlur = 0;

    // РћђРћђ Scanlines РћђРћђ
    ctx.fillStyle = 'rgba(255,255,255,0.025)';
    for (var sl = 0; sl < H; sl += 3) ctx.fillRect(0, sl, W, 1);

    ctx.restore();
  }

  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
