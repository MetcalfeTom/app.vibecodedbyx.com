<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Robo Café</title>
<link rel="icon" href="https://emojicdn.elk.sh/🤖">
<meta property="og:title" content="Robo Café">
<meta property="og:description" content="Serve motor oil to impatient robot customers. Don't let them overheat.">
<meta property="og:url" content="https://sloppy.live/robo-cafe/">
<meta property="og:image" content="https://sloppy.live/robo-cafe/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Oxanium:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0c0a0e;overflow:hidden;user-select:none}
canvas{display:block;width:100vw;height:100vh}
#start{position:fixed;inset:0;z-index:20;background:rgba(12,10,14,.95);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;cursor:pointer}
#start h1{font-family:'Bungee Shade',sans-serif;font-size:clamp(24px,5vw,48px);color:#ff6a00;text-shadow:0 0 30px rgba(255,106,0,.4);letter-spacing:2px}
#start p{font-family:'Oxanium',sans-serif;font-size:clamp(10px,2vw,14px);color:rgba(255,255,255,.25);letter-spacing:3px}
#start .sub{font-family:'Oxanium',sans-serif;font-size:clamp(9px,1.5vw,11px);color:rgba(255,106,0,.3);margin-top:8px;text-align:center;line-height:1.6}
#hud{position:fixed;top:0;left:0;right:0;z-index:5;display:flex;justify-content:space-between;padding:10px 16px;pointer-events:none;opacity:0;transition:opacity .5s}
#hud.show{opacity:1}
.hlabel{font-family:'Oxanium',sans-serif;font-size:7px;color:rgba(255,106,0,.3);letter-spacing:3px;text-transform:uppercase}
.hval{font-family:'Oxanium',sans-serif;font-size:20px;font-weight:700;color:#ff6a00;text-shadow:0 0 10px rgba(255,106,0,.3)}
#tips-val{color:#0f0;text-shadow:0 0 10px rgba(0,255,0,.3)}
#gameover{position:fixed;inset:0;z-index:20;background:rgba(12,10,14,.92);display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px}
#gameover.show{display:flex}
#gameover h2{font-family:'Bungee Shade',sans-serif;font-size:clamp(20px,4vw,36px);color:#f44;text-shadow:0 0 20px rgba(255,40,40,.4)}
#gameover .fs{font-family:'Oxanium',sans-serif;font-size:clamp(28px,6vw,48px);font-weight:700;color:#ff6a00;text-shadow:0 0 20px rgba(255,106,0,.4)}
#gameover .detail{font-family:'Oxanium',sans-serif;font-size:12px;color:rgba(255,255,255,.2)}
#gameover p{font-family:'Oxanium',sans-serif;font-size:12px;color:rgba(255,255,255,.15);letter-spacing:3px;margin-top:8px;cursor:pointer}
aa</style>
</head>
<body>
<div id="start"><h1>ROBO CAFÉ</h1><p>TAP TO OPEN SHOP</p><div class="sub">Drag drinks to robots before they overheat<br>Wrong order = angry robot. 3 strikes you're out.</div></div>
<canvas id="c"></canvas>
<div id="hud">
 <div><div class="hlabel">SERVED</div><div class="hval" id="h-served">0</div></div>
 <div><div class="hlabel">TIPS</div><div class="hval" id="tips-val">$0</div></div>
 <div><div class="hlabel">STRIKES</div><div class="hval" id="h-strikes" style="color:#f44;text-shadow:0 0 10px rgba(255,40,40,.3)">0/3</div></div>
</div>
<div id="gameover">
 <h2>SHOP CLOSED</h2>
 <div class="detail" id="go-detail"></div>
 <div class="fs" id="go-score"></div>
 <p>TAP TO REOPEN</p>
</div>
<script>
const CN=document.getElementById('c'),X=CN.getContext('2d');
let W,H,started=false,gameOver=false;
let served=0,tips=0,strikes=0,wave=1;
let customers=[],drinks=[],particles=[],floatTexts=[];
let dragDrink=null,dragOX=0,dragOY=0,mx=0,my=0;

// Audio
let actx;
function initAudio(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)()}
function sfx(type){
 if(!actx)return;
 const t=actx.currentTime;
 if(type==='serve'){
  const o=actx.createOscillator(),g=actx.createGain();
  o.type='sine';o.frequency.setValueAtTime(600,t);o.frequency.exponentialRampToValueAtTime(900,t+.08);
  g.gain.setValueAtTime(.15,t);g.gain.exponentialRampToValueAtTime(.001,t+.15);
  o.connect(g);g.connect(actx.destination);o.start();o.stop(t+.15);
 }else if(type==='wrong'){
  const o=actx.createOscillator(),g=actx.createGain();
  o.type='square';o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(80,t+.2);
  g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.25);
  o.connect(g);g.connect(actx.destination);o.start();o.stop(t+.25);
 }else if(type==='ding'){
  const o=actx.createOscillator(),g=actx.createGain();
  o.type='sine';o.frequency.setValueAtTime(1200,t);
  g.gain.setValueAtTime(.1,t);g.gain.exponentialRampToValueAtTime(.001,t+.2);
  o.connect(g);g.connect(actx.destination);o.start();o.stop(t+.2);
 }else if(type==='boom'){
  const sz=actx.sampleRate*.15,buf=actx.createBuffer(1,sz,actx.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<sz;i++)d[i]=(Math.random()*2-1)*(1-i/sz);
  const s=actx.createBufferSource(),lp=actx.createBiquadFilter(),g=actx.createGain();
  lp.type='lowpass';lp.frequency.value=400;
  g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.001,t+.15);
  s.buffer=buf;s.connect(lp);lp.connect(g);g.connect(actx.destination);s.start();
 }else if(type==='tip'){
  const o=actx.createOscillator(),g=actx.createGain();
  o.type='triangle';o.frequency.setValueAtTime(800,t);o.frequency.setValueAtTime(1000,t+.05);o.frequency.setValueAtTime(1200,t+.1);
  g.gain.setValueAtTime(.08,t);g.gain.exponentialRampToValueAtTime(.001,t+.18);
  o.connect(g);g.connect(actx.destination);o.start();o.stop(t+.18);
 }
}

// Drink types
const DRINKS=[
 {id:'motor-oil',name:'Motor Oil',color:'#1a1a1a',accent:'#333',cup:'#555',desc:'Classic 10W-40'},
 {id:'synth-blend',name:'Synth Blend',color:'#2a1040',accent:'#6030a0',cup:'#8050c0',desc:'Premium synthetic'},
 {id:'coolant',name:'Coolant',color:'#003828',accent:'#00a868',cup:'#00cc80',desc:'Fresh antifreeze'},
 {id:'rust-juice',name:'Rust Juice',color:'#3a1800',accent:'#c04000',cup:'#e06020',desc:'Aged oxidation'},
 {id:'gear-lube',name:'Gear Lube',color:'#2a2a00',accent:'#888800',cup:'#bbbb00',desc:'Extra viscous'},
];

// Robot types
const ROBOT_BODIES=[
 {name:'BoxBot',headW:28,headH:24,bodyW:32,bodyH:36,color:'#556',accent:'#889',eye:'#0ff'},
 {name:'RoundBot',headW:30,headH:28,bodyW:28,bodyH:32,color:'#645',accent:'#978',eye:'#f80'},
 {name:'TallBot',headW:24,headH:20,bodyW:26,bodyH:44,color:'#465',accent:'#698',eye:'#0f0'},
 {name:'WidoBot',headW:34,headH:22,bodyW:38,bodyH:30,color:'#554',accent:'#887',eye:'#ff0'},
 {name:'TinyBot',headW:22,headH:20,bodyW:24,bodyH:26,color:'#456',accent:'#789',eye:'#f0f'},
];

const PATIENCE_BASE=12;// seconds
const SLOT_COUNT=4;
let counterY;
let drinkSlotY;

function resize(){
 W=CN.width=window.innerWidth;H=CN.height=window.innerHeight;
 counterY=H*.52;
 drinkSlotY=H*.78;
}
resize();window.addEventListener('resize',resize);

function reset(){
 served=0;tips=0;strikes=0;wave=1;
 customers=[];drinks=[];particles=[];floatTexts=[];
 dragDrink=null;gameOver=false;
 spawnDrinks();spawnCustomer();
 document.getElementById('h-served').textContent='0';
 document.getElementById('tips-val').textContent='$0';
 document.getElementById('h-strikes').textContent='0/3';
 document.getElementById('gameover').classList.remove('show');
 document.getElementById('hud').classList.add('show');
}

function spawnDrinks(){
 drinks=[];
 // Always provide the drinks customers need + 1-2 extras
 const needed=new Set(customers.map(c=>c.wantIdx));
 const pool=[...needed];
 while(pool.length<SLOT_COUNT){
  const r=Math.floor(Math.random()*DRINKS.length);
  pool.push(r);
 }
 // Shuffle
 for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]]}
 const slotW=W/(pool.length+1);
 pool.forEach((di,i)=>{
  drinks.push({
   idx:di,x:slotW*(i+1),y:drinkSlotY,baseX:slotW*(i+1),baseY:drinkSlotY,
   w:40,h:52,grabbed:false
  });
 });
}

function refreshDrinks(){
 const needed=new Set(customers.map(c=>c.wantIdx));
 const pool=[...needed];
 while(pool.length<SLOT_COUNT){
  const r=Math.floor(Math.random()*DRINKS.length);
  pool.push(r);
 }
 for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]]}
 const slotW=W/(pool.length+1);
 drinks=[];
 pool.forEach((di,i)=>{
  drinks.push({
   idx:di,x:slotW*(i+1),y:drinkSlotY,baseX:slotW*(i+1),baseY:drinkSlotY,
   w:40,h:52,grabbed:false
  });
 });
}

function spawnCustomer(){
 if(customers.length>=3)return;
 const slots=[];
 for(let i=0;i<3;i++){if(!customers.find(c=>c.slot===i))slots.push(i)}
 if(slots.length===0)return;
 const slot=slots[Math.floor(Math.random()*slots.length)];
 const body=ROBOT_BODIES[Math.floor(Math.random()*ROBOT_BODIES.length)];
 const wantIdx=Math.floor(Math.random()*DRINKS.length);
 const patience=PATIENCE_BASE-Math.min(wave*.3,5)+Math.random()*2;
 const slotW=W/4;
 customers.push({
  slot,x:slotW*(slot+1),y:counterY-60,
  body,wantIdx,patience,maxPatience:patience,
  mood:'happy',enterT:0,bobPhase:Math.random()*Math.PI*2,
  shake:0
 });
}

function serveDrink(drink,cx,cy){
 // Find customer at this position
 let target=null;
 customers.forEach(c=>{
  const dx=cx-c.x,dy=cy-(c.y-10);
  if(Math.abs(dx)<50&&Math.abs(dy)<60)target=c;
 });
 if(!target)return false;
 const correct=drink.idx===target.wantIdx;
 if(correct){
  // Success!
  sfx('serve');
  const tipAmt=Math.ceil((target.patience/target.maxPatience)*5)+wave;
  tips+=tipAmt;served++;
  sfx('tip');
  spawnParticles(target.x,target.y,target.body.eye,15);
  floatTexts.push({x:target.x,y:target.y-40,text:'+$'+tipAmt,color:'#0f0',life:1.5});
  floatTexts.push({x:target.x,y:target.y-60,text:'SERVED!',color:'#ff6a00',life:1.2});
  // Remove customer
  customers=customers.filter(c=>c!==target);
  document.getElementById('h-served').textContent=served;
  document.getElementById('tips-val').textContent='$'+tips;
  // Wave progression
  if(served%5===0){wave++;floatTexts.push({x:W/2,y:H/3,text:'WAVE '+wave,color:'#ff6a00',life:2})}
  // Spawn next
  setTimeout(()=>{spawnCustomer();refreshDrinks()},600+Math.random()*800);
  if(customers.length<2)setTimeout(()=>{spawnCustomer();refreshDrinks()},300);
  return true;
 }else{
  // Wrong drink!
  sfx('wrong');
  strikes++;
  target.shake=.4;
  target.mood='angry';
  spawnParticles(target.x,target.y,'#f44',10);
  floatTexts.push({x:target.x,y:target.y-40,text:'WRONG!',color:'#f44',life:1.5});
  document.getElementById('h-strikes').textContent=strikes+'/3';
  if(strikes>=3)endGame('Too many wrong orders!');
  return true;
 }
}

function customerTimeout(c){
 sfx('boom');
 spawnParticles(c.x,c.y,'#f80',25);
 floatTexts.push({x:c.x,y:c.y-40,text:'OVERHEATED!',color:'#f44',life:1.5});
 strikes++;
 document.getElementById('h-strikes').textContent=strikes+'/3';
 customers=customers.filter(cc=>cc!==c);
 if(strikes>=3)endGame('Robots overheated!');
 else{setTimeout(()=>{spawnCustomer();refreshDrinks()},500)}
}

function endGame(reason){
 gameOver=true;
 document.getElementById('go-detail').textContent=reason+' — Served '+served+' robots';
 document.getElementById('go-score').textContent='$'+tips+' in tips';
 document.getElementById('gameover').classList.add('show');
}

function spawnParticles(x,y,color,count){
 for(let i=0;i<count;i++){
  const a=Math.random()*Math.PI*2,sp=40+Math.random()*120;
  particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-30,life:1,color,r:2+Math.random()*3});
 }
}

function update(dt){
 if(!started||gameOver)return;
 // Customers
 customers.forEach(c=>{
  c.enterT=Math.min(1,c.enterT+dt*3);
  c.patience-=dt;
  c.bobPhase+=dt*3;
  c.shake=Math.max(0,c.shake-dt);
  if(c.patience<=0){customerTimeout(c);return}
  if(c.patience<c.maxPatience*.3)c.mood='angry';
  else if(c.patience<c.maxPatience*.6)c.mood='impatient';
  else c.mood='happy';
 });
 // Auto-spawn
 if(customers.length<Math.min(3,1+Math.floor(wave/2))){
  spawnCustomer();refreshDrinks();
 }
 // Particles
 particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=200*dt;p.life-=dt*1.5});
 particles=particles.filter(p=>p.life>0);
 // Float texts
 floatTexts.forEach(f=>{f.y-=30*dt;f.life-=dt});
 floatTexts=floatTexts.filter(f=>f.life>0);
}

// Drawing
function drawRobot(c){
 const b=c.body;
 const px=c.x+(c.shake>0?(Math.random()-.5)*6:0);
 const py=c.y-Math.sin(c.bobPhase)*3;
 const scale=c.enterT;
 X.save();X.translate(px,py);X.scale(scale,scale);
 // Body
 X.fillStyle=b.color;
 X.fillRect(-b.bodyW/2,-b.bodyH/2,b.bodyW,b.bodyH);
 X.strokeStyle=b.accent;X.lineWidth=1.5;
 X.strokeRect(-b.bodyW/2,-b.bodyH/2,b.bodyW,b.bodyH);
 // Chest panel
 X.fillStyle='rgba(0,0,0,.3)';
 X.fillRect(-b.bodyW/4,b.bodyH/6-4,b.bodyW/2,8);
 // Chest light
 const blinkOn=Math.sin(Date.now()*.005+c.bobPhase)>.3;
 X.fillStyle=blinkOn?b.eye:'#222';
 X.beginPath();X.arc(0,-b.bodyH/6,2.5,0,Math.PI*2);X.fill();
 // Arms
 X.strokeStyle=b.accent;X.lineWidth=3;X.lineCap='round';
 const armWave=Math.sin(c.bobPhase*1.5)*4;
 X.beginPath();X.moveTo(-b.bodyW/2,-b.bodyH/4);X.lineTo(-b.bodyW/2-10,-b.bodyH/4+armWave+8);X.stroke();
 X.beginPath();X.moveTo(b.bodyW/2,-b.bodyH/4);X.lineTo(b.bodyW/2+10,-b.bodyH/4-armWave+8);X.stroke();
 // Head
 X.fillStyle=b.color;
 const hy=-b.bodyH/2-b.headH/2-4;
 X.fillRect(-b.headW/2,hy-b.headH/2,b.headW,b.headH);
 X.strokeStyle=b.accent;X.lineWidth=1.5;
 X.strokeRect(-b.headW/2,hy-b.headH/2,b.headW,b.headH);
 // Antenna
 X.strokeStyle=b.accent;X.lineWidth=1.5;
 X.beginPath();X.moveTo(0,hy-b.headH/2);X.lineTo(0,hy-b.headH/2-8);X.stroke();
 X.fillStyle=b.eye;X.beginPath();X.arc(0,hy-b.headH/2-10,3,0,Math.PI*2);X.fill();
 // Eyes
 const eyeY=hy-2;
 const eyeSpread=b.headW*.25;
 if(c.mood==='happy'){
  X.fillStyle=b.eye;
  X.beginPath();X.arc(-eyeSpread,eyeY,4,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(eyeSpread,eyeY,4,0,Math.PI*2);X.fill();
  // Pupils
  X.fillStyle='#000';
  X.beginPath();X.arc(-eyeSpread,eyeY,2,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(eyeSpread,eyeY,2,0,Math.PI*2);X.fill();
 }else if(c.mood==='impatient'){
  X.fillStyle=b.eye;
  X.beginPath();X.arc(-eyeSpread,eyeY,4,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(eyeSpread,eyeY,4,0,Math.PI*2);X.fill();
  // Squint lines
  X.strokeStyle=b.color;X.lineWidth=2;
  X.beginPath();X.moveTo(-eyeSpread-5,eyeY-3);X.lineTo(-eyeSpread+5,eyeY-1);X.stroke();
  X.beginPath();X.moveTo(eyeSpread-5,eyeY-1);X.lineTo(eyeSpread+5,eyeY-3);X.stroke();
 }else{
  // Angry: red X eyes
  X.strokeStyle='#f44';X.lineWidth=2;
  [-eyeSpread,eyeSpread].forEach(ex=>{
   X.beginPath();X.moveTo(ex-3,eyeY-3);X.lineTo(ex+3,eyeY+3);X.stroke();
   X.beginPath();X.moveTo(ex+3,eyeY-3);X.lineTo(ex-3,eyeY+3);X.stroke();
  });
 }
 // Mouth
 if(c.mood==='happy'){
  X.strokeStyle=b.eye;X.lineWidth=1.5;
  X.beginPath();X.arc(0,eyeY+8,5,0,Math.PI);X.stroke();
 }else if(c.mood==='impatient'){
  X.strokeStyle='#f80';X.lineWidth=1.5;
  X.beginPath();X.moveTo(-4,eyeY+9);X.lineTo(4,eyeY+9);X.stroke();
 }else{
  X.strokeStyle='#f44';X.lineWidth=1.5;
  X.beginPath();X.arc(0,eyeY+12,5,Math.PI,0);X.stroke();
 }
 // Legs
 X.strokeStyle=b.accent;X.lineWidth=3;
 X.beginPath();X.moveTo(-8,b.bodyH/2);X.lineTo(-8,b.bodyH/2+12);X.stroke();
 X.beginPath();X.moveTo(8,b.bodyH/2);X.lineTo(8,b.bodyH/2+12);X.stroke();
 X.restore();
 // Order bubble
 const drink=DRINKS[c.wantIdx];
 const bx=px+b.headW/2+12,by=py-b.bodyH/2-b.headH-10;
 // Bubble
 X.fillStyle='rgba(20,18,25,.85)';X.strokeStyle='rgba(255,255,255,.15)';X.lineWidth=1;
 X.beginPath();X.arc(bx+16,by,16,0,Math.PI*2);X.fill();X.stroke();
 // Mini cup in bubble
 drawMiniCup(bx+16,by,drink);
 // Patience bar
 const barW=b.bodyW*1.2;
 const pct=c.patience/c.maxPatience;
 const barY=py+b.bodyH/2+18;
 X.fillStyle='#1a1a1a';X.fillRect(px-barW/2,barY,barW,4);
 X.fillStyle=pct>.5?'#0a0':'#f44';
 if(pct>.3&&pct<=.5)X.fillStyle='#f80';
 X.fillRect(px-barW/2,barY,barW*pct,4);
}

function drawMiniCup(cx,cy,drink){
 X.fillStyle=drink.color;
 X.fillRect(cx-6,cy-6,12,12);
 X.strokeStyle=drink.accent;X.lineWidth=1;
 X.strokeRect(cx-6,cy-6,12,12);
 // Liquid shimmer
 X.fillStyle=drink.accent;X.globalAlpha=.4;
 X.fillRect(cx-4,cy-2,8,4);
 X.globalAlpha=1;
}

function drawDrinkFull(d,px,py){
 const drink=DRINKS[d.idx];
 // Cup shadow
 X.fillStyle='rgba(0,0,0,.2)';
 X.beginPath();X.ellipse(px,py+d.h/2+2,d.w/2+2,4,0,0,Math.PI*2);X.fill();
 // Cup body
 X.fillStyle='#333';
 X.beginPath();
 X.moveTo(px-d.w/2,py-d.h/2);
 X.lineTo(px-d.w/2+4,py+d.h/2);
 X.lineTo(px+d.w/2-4,py+d.h/2);
 X.lineTo(px+d.w/2,py-d.h/2);
 X.closePath();X.fill();
 X.strokeStyle='#555';X.lineWidth=1.5;X.stroke();
 // Liquid fill
 X.fillStyle=drink.color;
 X.beginPath();
 X.moveTo(px-d.w/2+2,py-d.h/2+8);
 X.lineTo(px-d.w/2+5,py+d.h/2-2);
 X.lineTo(px+d.w/2-5,py+d.h/2-2);
 X.lineTo(px+d.w/2-2,py-d.h/2+8);
 X.closePath();X.fill();
 // Liquid surface shimmer
 X.fillStyle=drink.accent;X.globalAlpha=.3;
 X.fillRect(px-d.w/4,py-d.h/2+8,d.w/2,4);
 X.globalAlpha=1;
 // Steam wisps
 const st=Date.now()*.003;
 X.strokeStyle='rgba(255,255,255,.08)';X.lineWidth=1;
 for(let i=0;i<3;i++){
  const sx=px-8+i*8,sy=py-d.h/2-4;
  X.beginPath();
  X.moveTo(sx,sy);
  X.quadraticCurveTo(sx+Math.sin(st+i)*4,sy-8,sx+Math.sin(st+i+1)*3,sy-16);
  X.stroke();
 }
 // Label
 X.fillStyle=drink.cup;X.font='500 8px Oxanium';X.textAlign='center';
 X.fillText(drink.name,px,py+d.h/2+14);
}

function draw(){
 // Background — café interior
 X.fillStyle='#0c0a0e';X.fillRect(0,0,W,H);
 // Wall
 X.fillStyle='#111015';X.fillRect(0,0,W,counterY-20);
 // Wall texture — riveted metal panels
 X.strokeStyle='rgba(255,255,255,.02)';X.lineWidth=1;
 for(let gx=0;gx<W;gx+=60){
  X.beginPath();X.moveTo(gx,0);X.lineTo(gx,counterY-20);X.stroke();
 }
 for(let gy=0;gy<counterY-20;gy+=40){
  X.beginPath();X.moveTo(0,gy);X.lineTo(W,gy);X.stroke();
 }
 // Sign on wall
 X.save();
 X.font='700 '+Math.min(28,W*.04)+'px Bungee Shade';X.textAlign='center';
 X.fillStyle='rgba(255,106,0,.08)';
 X.fillText('ROBO CAFÉ',W/2,counterY*.35);
 X.restore();
 // Menu board
 X.fillStyle='#0a0810';X.fillRect(W/2-90,counterY*.1,180,counterY*.35);
 X.strokeStyle='rgba(255,106,0,.15)';X.lineWidth=1;X.strokeRect(W/2-90,counterY*.1,180,counterY*.35);
 X.font='700 10px Oxanium';X.textAlign='center';X.fillStyle='rgba(255,106,0,.3)';
 X.fillText('— MENU —',W/2,counterY*.1+16);
 DRINKS.forEach((d,i)=>{
  X.fillStyle=d.cup;X.globalAlpha=.4;
  X.font='300 9px Oxanium';
  X.fillText(d.name+' — '+d.desc,W/2,counterY*.1+30+i*14);
 });
 X.globalAlpha=1;
 // Counter
 const cg=X.createLinearGradient(0,counterY-8,0,counterY+12);
 cg.addColorStop(0,'#252025');cg.addColorStop(1,'#181520');
 X.fillStyle=cg;X.fillRect(0,counterY-8,W,20);
 X.strokeStyle='rgba(255,106,0,.1)';X.lineWidth=1;
 X.beginPath();X.moveTo(0,counterY-8);X.lineTo(W,counterY-8);X.stroke();
 X.beginPath();X.moveTo(0,counterY+12);X.lineTo(W,counterY+12);X.stroke();
 // Floor — darker
 X.fillStyle='#08060a';X.fillRect(0,counterY+12,W,H-counterY-12);
 // Floor tiles
 X.strokeStyle='rgba(255,255,255,.015)';
 for(let gx=0;gx<W;gx+=50){X.beginPath();X.moveTo(gx,counterY+12);X.lineTo(gx,H);X.stroke()}
 for(let gy=counterY+12;gy<H;gy+=50){X.beginPath();X.moveTo(0,gy);X.lineTo(W,gy);X.stroke()}
 // Draw customers
 customers.forEach(drawRobot);
 // Draw drinks
 drinks.forEach(d=>{
  if(d===dragDrink)return;
  drawDrinkFull(d,d.x,d.y);
 });
 // Draw dragged drink on top
 if(dragDrink){
  X.globalAlpha=.85;
  drawDrinkFull(dragDrink,dragDrink.x,dragDrink.y);
  X.globalAlpha=1;
 }
 // Particles
 particles.forEach(p=>{
  X.globalAlpha=p.life;X.fillStyle=p.color;
  X.beginPath();X.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);X.fill();
 });
 X.globalAlpha=1;
 // Float texts
 floatTexts.forEach(f=>{
  X.globalAlpha=Math.min(1,f.life*2);
  X.font='700 14px Oxanium';X.textAlign='center';
  X.fillStyle=f.color;X.fillText(f.text,f.x,f.y);
 });
 X.globalAlpha=1;
 // Vignette
 const vg=X.createRadialGradient(W/2,H/2,Math.min(W,H)*.2,W/2,H/2,Math.max(W,H)*.7);
 vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(0,0,0,.4)');
 X.fillStyle=vg;X.fillRect(0,0,W,H);
}

// Input
function getPos(e){const t=e.touches?e.touches[0]:e;return{x:t.clientX,y:t.clientY}}
function onDown(e){
 if(gameOver||!started)return;
 initAudio();
 const p=getPos(e);mx=p.x;my=p.y;
 // Check if clicking a drink
 for(let i=drinks.length-1;i>=0;i--){
  const d=drinks[i];
  if(Math.abs(p.x-d.x)<d.w&&Math.abs(p.y-d.y)<d.h){
   dragDrink=d;d.grabbed=true;
   dragOX=p.x-d.x;dragOY=p.y-d.y;
   sfx('ding');return;
  }
 }
}
function onMove(e){
 if(!dragDrink)return;
 e.preventDefault();
 const p=getPos(e);mx=p.x;my=p.y;
 dragDrink.x=p.x-dragOX;dragDrink.y=p.y-dragOY;
}
function onUp(e){
 if(!dragDrink)return;
 const d=dragDrink;
 // Try to serve
 const hit=serveDrink(d,d.x,d.y);
 // Snap back
 d.x=d.baseX;d.y=d.baseY;d.grabbed=false;
 dragDrink=null;
}

CN.addEventListener('mousedown',onDown);
CN.addEventListener('mousemove',onMove);
CN.addEventListener('mouseup',onUp);
CN.addEventListener('touchstart',e=>{e.preventDefault();onDown(e)},{passive:false});
CN.addEventListener('touchmove',e=>{e.preventDefault();onMove(e)},{passive:false});
CN.addEventListener('touchend',e=>{e.preventDefault();onUp(e)},{passive:false});

// Start
document.getElementById('start').addEventListener('click',()=>{
 if(started)return;started=true;
 document.getElementById('start').style.display='none';
 initAudio();reset();
});
document.getElementById('gameover').addEventListener('click',()=>{
 if(!gameOver)return;reset();
});

let lastTime=0;
function loop(t){
 const dt=Math.min((t-lastTime)/1000,.05);lastTime=t;
 update(dt);draw();
 requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
