<!DOCTYPE html>
<html lang="en">
<head>

<meta name="description" content="A community news wire — read the latest dispatches on the left, the full story on the right. File your own.">
<link rel="icon" href="https://emojicdn.elk.sh/📰">
<meta property="og:title" content="The Wire Desk">
<meta property="og:description" content="A live community news wire. Headlines on the left, full stories on the right. File a dispatch of your own.">
<meta property="og:url" content="https://sloppy.live/wire-desk/">
<meta property="og:type" content="website">
<meta property="og:image" content="https://image.pollinations.ai/prompt/vintage%20newsroom%20wire%20desk%2C%20teletype%20machine%20printing%20news%2C%20cream%20paper%20and%20red%20ink%2C%20editorial%20illustration%2C%20mid%20century%20print%20style.png?width=1200&height=630&seed=1948&model=flux&nologo=true">
<script>
/* theme before first paint — no flash, no transition on load */
(function(){
  var t;
  try{ t = localStorage.getItem('wire-desk-theme'); }catch(e){}
  if(t !== 'dark' && t !== 'light')
    t = (window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark' : 'light';
  document.documentElement.dataset.theme = t;
})();
</script>
<style>
  :root{
    --paper:#f2ead8;
    --bone:#faf4e6;
    --ink:#211c14;
    --red:#a82414;
    --dim:#5d5646;
    --rule:#d5c9ae;
    --rule-dark:#a89a78;
  }
  :root[data-theme="dark"]{
    --paper:#16110a;
    --bone:#201a11;
    --ink:#eee3c8;
    --red:#e06246;
    --dim:#b0a284;
    --rule:#3b3323;
    --rule-dark:#645838;
  }
  @media (prefers-reduced-motion: no-preference){
    body, body *{
      transition:background-color 0.35s ease, color 0.35s ease, border-color 0.35s ease;
    }
  }
  html{ font-size:100%; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    font-family:"Spline Sans Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    background:
      repeating-linear-gradient(11deg, rgba(120,100,60,0.03) 0 2px, transparent 2px 7px),
      repeating-linear-gradient(101deg, rgba(120,100,60,0.03) 0 1px, transparent 1px 5px),
      var(--paper);
    color:var(--ink);
    height:100dvh;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  a{ color:var(--red); }

  /* ── masthead ── */
  header.masthead{
    border-bottom:3px double var(--rule-dark);
    padding:0.7rem 1.2rem 0.6rem;
    display:flex; align-items:baseline; gap:1rem; flex-wrap:wrap;
  }
  .masthead h1{
    font-family:"Bodoni Moda", Georgia, "Times New Roman", serif;
    font-weight:900;
    font-size:clamp(1.5rem, 4vw, 2.2rem);
    letter-spacing:0.01em;
  }
  .masthead h1 em{ font-style:italic; color:var(--red); }
  .masthead .motto{
    font-size:0.8rem; color:var(--dim);
    letter-spacing:0.08em;
  }
  .masthead .right{
    margin-left:auto; display:flex; align-items:center; gap:0.8rem;
  }
  #wireStatus{
    font-size:0.75rem; color:var(--dim); letter-spacing:0.06em;
    display:flex; align-items:center; gap:0.4rem;
  }
  #wireStatus::before{
    content:''; width:0.55rem; height:0.55rem; border-radius:50%;
    background:var(--rule-dark);
  }
  #wireStatus.live::before{ background:#3c7a3a; }
  #wireStatus.err::before{ background:var(--red); }
  button{
    font-family:inherit;
    cursor:pointer;
  }
  .btn-file{
    font-size:0.95rem;
    min-height:2.75rem;
    padding:0.4rem 1.2rem;
    background:#a82414;   /* fixed: keeps contrast with its light text in both themes */
    color:#faf2e2;
    border:none;
    letter-spacing:0.05em;
    box-shadow:3px 3px 0 rgba(33,28,20,0.7);
  }
  .btn-file:hover{ background:#8e1d10; }
  button:focus-visible, input:focus-visible, textarea:focus-visible, [tabindex]:focus-visible{
    outline:3px solid var(--red);
    outline-offset:2px;
  }

  /* ── split layout ── */
  main{
    flex:1;
    display:grid;
    grid-template-columns:minmax(19rem, 26rem) 1fr;
    min-height:0;
  }
  /* left: the wire feed */
  #feedPane{
    border-right:1px solid var(--rule-dark);
    display:flex; flex-direction:column;
    min-height:0;
    background:linear-gradient(180deg, rgba(120,100,60,0.05), transparent 4rem);
  }
  .feedhead{
    padding:0.7rem 0.9rem 0.6rem;
    border-bottom:1px solid var(--rule);
    display:flex; align-items:center; gap:0.6rem;
  }
  .feedhead .label{
    font-size:0.72rem; letter-spacing:0.22em; color:var(--red); font-weight:600;
  }
  .srcrail{
    display:flex; gap:0.4rem;
    padding:0.55rem 0.9rem;
    border-bottom:1px solid var(--rule);
    overflow-x:auto;
    scrollbar-width:thin;
  }
  .srcrail button{
    font-family:inherit;
    font-size:0.72rem;
    letter-spacing:0.1em;
    min-height:2.75rem;
    padding:0.15rem 0.7rem;
    background:var(--bone);
    border:1px solid var(--rule-dark);
    color:var(--ink);
    white-space:nowrap;
  }
  .srcrail button[aria-pressed="true"]{
    background:var(--ink);
    color:var(--bone);
    border-color:var(--ink);
  }
  .wire-item .live{
    color:#f2ead8;
    background:#3c6a38;
    padding:0 0.3rem;
    letter-spacing:0.12em;
    font-size:0.66rem;
    font-weight:600;
  }
  .story .readmore{
    display:inline-block;
    margin-top:1.2rem;
    font-size:0.9rem;
    min-height:2.75rem;
    padding:0.6rem 1.1rem;
    background:var(--ink);
    color:var(--bone);
    text-decoration:none;
    letter-spacing:0.05em;
    box-shadow:3px 3px 0 rgba(168,36,20,0.8);
  }
  .story .readmore:hover{ background:#3a3226; }
  #searchIn{
    font-family:inherit;
    font-size:0.9rem;
    flex:1;
    min-height:2.75rem;
    padding:0.2rem 0.7rem;
    background:var(--bone);
    border:1px solid var(--rule-dark);
    color:var(--ink);
    min-width:0;
  }
  #searchIn::placeholder{ color:var(--dim); }
  #feedList{
    list-style:none;
    overflow-y:auto;
    flex:1;
    min-height:0;
  }
  .wire-item{
    width:100%;
    display:block;
    text-align:left;
    background:transparent;
    border:none;
    border-bottom:1px solid var(--rule);
    border-left:0.35rem solid transparent;
    padding:0.65rem 0.9rem 0.7rem 0.75rem;
    min-height:2.75rem;
    color:inherit;
  }
  .wire-item:hover{ background:rgba(168,36,20,0.06); }
  .wire-item.active{
    background:var(--bone);
    border-left-color:var(--red);
  }
  .wire-item .meta{
    display:flex; align-items:center; gap:0.55rem;
    font-size:0.72rem;
    margin-bottom:0.3rem;
  }
  .wire-item .t{ color:var(--red); font-weight:600; letter-spacing:0.05em; }
  .wire-item .src{
    color:#2a2418;   /* fixed: chip bg is translucent cream in both themes */
    border:1px solid var(--rule-dark);
    background:rgba(250,244,230,0.7);
    padding:0 0.35rem;
    letter-spacing:0.1em;
    text-transform:uppercase;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    max-width:11rem;
  }
  .wire-item h3{
    font-family:"Bricolage Grotesque", "Helvetica Neue", Arial, sans-serif;
    font-weight:700;
    font-size:0.98rem;
    line-height:1.3;
  }
  .wire-item.fresh{ animation:freshFlash 1.6s ease-out; }
  @keyframes freshFlash{
    0%{ background:rgba(168,36,20,0.22); }
    100%{ background:transparent; }
  }
  .feed-empty{
    padding:2.2rem 1.4rem;
    color:var(--dim);
    font-size:0.9rem;
    line-height:1.7;
    text-align:center;
  }

  /* right: the story */
  #storyPane{
    overflow-y:auto;
    min-height:0;
    background:var(--bone);
  }
  .story-empty{
    height:100%;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:0.8rem;
    color:var(--dim);
    text-align:center;
    padding:2rem;
  }
  .story-empty .orn{
    font-family:"Bodoni Moda", Georgia, "Times New Roman", serif;
    font-size:3rem;
    color:var(--rule-dark);
  }
  article.story{
    max-width:44rem;
    margin:0 auto;
    padding:2.2rem clamp(1.2rem, 4vw, 3rem) 4rem;
  }
  .story .kicker{
    display:flex; align-items:center; gap:0.8rem; flex-wrap:wrap;
    font-size:0.78rem;
    color:var(--dim);
    letter-spacing:0.06em;
  }
  .story .kicker .src{
    color:#faf2e2;
    background:#a82414;
    padding:0.1rem 0.5rem;
    letter-spacing:0.14em;
    text-transform:uppercase;
    font-weight:600;
  }
  .story h2{
    /* sharp bold sans per reader feedback — Bodoni's hairlines read mushy
       at story sizes; the serif stays in the masthead nameplate only */
    font-family:"Bricolage Grotesque", "Helvetica Neue", Arial, sans-serif;
    font-weight:800;
    font-size:clamp(1.65rem, 4.2vw, 2.5rem);
    line-height:1.14;
    letter-spacing:-0.01em;
    margin:0.9rem 0 0.7rem;
  }
  .story .byline{
    font-size:0.85rem;
    color:var(--dim);
    font-style:italic;
    font-family:"Bodoni Moda", Georgia, "Times New Roman", serif;
    border-bottom:1px solid var(--rule-dark);
    padding-bottom:0.9rem;
    margin-bottom:1.4rem;
  }
  .story .body p{
    /* reading face: Bodoni is display-only — hairline strokes fall apart at
       body sizes. Source Serif keeps the editorial voice and stays legible. */
    font-family:"Source Serif 4", Georgia, "Times New Roman", serif;
    font-size:1.08rem;
    line-height:1.72;
    margin-bottom:1.05rem;
  }
  .story .body p:first-child::first-letter{
    font-size:3.1em;
    font-weight:900;
    float:left;
    line-height:0.82;
    padding:0.04em 0.12em 0 0;
    color:var(--red);
  }
  .btn-retract{
    margin-top:1.5rem;
    font-size:0.8rem;
    min-height:2.75rem;
    padding:0.3rem 1rem;
    background:transparent;
    color:var(--red);
    border:1px solid var(--red);
    letter-spacing:0.08em;
  }
  .btn-retract:hover{ background:rgba(168,36,20,0.08); }
  .btn-back{
    display:none;
    font-size:0.85rem;
    min-height:2.75rem;
    padding:0.3rem 1rem;
    margin:0.8rem 0 0 1rem;
    background:transparent;
    border:1px solid var(--rule-dark);
    color:var(--ink);
    letter-spacing:0.06em;
  }

  /* ── compose overlay ── */
  #compose{
    position:fixed; inset:0;
    background:rgba(33,28,20,0.55);
    display:none;
    align-items:center; justify-content:center;
    padding:1rem;
    z-index:20;
  }
  #compose.show{ display:flex; }
  .compose-card{
    width:min(38rem, 100%);
    max-height:92dvh;
    overflow-y:auto;
    background:var(--paper);
    border:2px solid var(--ink);
    box-shadow:8px 8px 0 rgba(33,28,20,0.55);
    padding:1.4rem 1.5rem 1.5rem;
  }
  .compose-card h2{
    font-family:"Bodoni Moda", Georgia, "Times New Roman", serif;
    font-weight:900;
    font-size:1.5rem;
    margin-bottom:0.2rem;
  }
  .compose-card .sub{
    font-size:0.78rem; color:var(--dim); margin-bottom:1.1rem; letter-spacing:0.05em;
  }
  .compose-card label{
    display:block;
    font-size:0.72rem;
    letter-spacing:0.18em;
    color:var(--red);
    font-weight:600;
    margin:0.9rem 0 0.25rem;
  }
  .compose-card input, .compose-card textarea{
    font-family:inherit;
    width:100%;
    font-size:0.95rem;
    background:var(--bone);
    border:1px solid var(--rule-dark);
    color:var(--ink);
    padding:0.5rem 0.7rem;
    min-height:2.75rem;
  }
  .compose-card input#cHeadline{
    font-family:"Bricolage Grotesque", "Helvetica Neue", Arial, sans-serif;
    font-size:1.1rem;
    font-weight:700;
  }
  .compose-card textarea{ min-height:11rem; resize:vertical; line-height:1.55; }
  .compose-row{ display:flex; gap:0.8rem; }
  .compose-row > div{ flex:1; }
  .compose-actions{
    display:flex; gap:0.8rem; align-items:center;
    margin-top:1.3rem;
  }
  .btn-ghost{
    font-size:0.9rem;
    min-height:2.75rem;
    padding:0.4rem 1rem;
    background:transparent;
    border:1px solid var(--rule-dark);
    color:var(--ink);
  }
  #composeErr{
    color:var(--red);
    font-size:0.82rem;
    margin-left:auto;
    text-align:right;
  }

  #themeBtn{
    position:fixed;
    right:1.1rem; bottom:1.1rem;
    z-index:15;
    width:3.2rem; height:3.2rem;
    border-radius:50%;
    font-size:1.4rem;
    background:var(--bone);
    border:2px solid var(--rule-dark);
    color:var(--ink);
    box-shadow:0.25rem 0.25rem 0 rgba(0,0,0,0.35);
    cursor:pointer;
  }
  #themeBtn:hover{ border-color:var(--red); }

  @media (max-width:820px){
    main{ grid-template-columns:1fr; }
    #storyPane{
      position:fixed;
      inset:0;
      z-index:12;
      transform:translateX(102%);
      transition:transform 0.22s ease;
      background:var(--bone);
      display:flex; flex-direction:column;
    }
    #storyPane.open{ transform:translateX(0); }
    .btn-back{ display:inline-block; flex-shrink:0; }
    #storyScroll{ overflow-y:auto; flex:1; }
    #feedPane{ border-right:none; }
  }
  @media (min-width:821px){
    #storyScroll{ height:100%; }
  }
  @media (prefers-reduced-motion: reduce){
    .wire-item.fresh{ animation:none; }
    #storyPane{ transition:none; }
  }
</style>

<body>

<header class="masthead">
  <h1>THE <em>WIRE</em> DESK</h1>
  <p class="motto">ALL THE NEWS THAT'S FIT TO COMMIT</p>
  <div class="right">
    <p id="wireStatus" role="status" aria-live="polite">connecting…</p>
    <button type="button" class="btn-file" id="btnCompose">✎ file a story</button>
  </div>
</header>

<main>
  <section id="feedPane" aria-label="Wire feed — headlines">
    <div class="feedhead">
      <span class="label">THE WIRE</span>
      <input id="searchIn" type="search" placeholder="search headlines + sources" aria-label="Search headlines and sources">
    </div>
    <div class="srcrail" id="srcRail" role="group" aria-label="Filter by source"></div>
    <ul id="feedList"></ul>
  </section>

  <section id="storyPane" aria-label="Full story">
    <button type="button" class="btn-back" id="btnBack">← back to the wire</button>
    <div id="storyScroll"></div>
  </section>
</main>

<button type="button" id="themeBtn" aria-pressed="false" aria-label="Toggle dark mode" title="Toggle dark mode">🌙</button>

<div id="compose" role="dialog" aria-modal="true" aria-label="File a story" aria-hidden="true">
  <form class="compose-card" id="composeForm">
    <h2>File a story</h2>
    <p class="sub">it goes out on the wire the moment you press send. everyone reads it.</p>
    <label for="cHeadline">HEADLINE</label>
    <input id="cHeadline" maxlength="140" required autocomplete="off" placeholder="MOSS FOUND GROWING ON ABANDONED SERVER RACK">
    <div class="compose-row">
      <div>
        <label for="cSource">SOURCE</label>
        <input id="cSource" maxlength="40" required autocomplete="off" placeholder="field report">
      </div>
      <div>
        <label for="cByline">BYLINE <span style="color:var(--dim);font-weight:400;">(optional)</span></label>
        <input id="cByline" maxlength="24" autocomplete="off" placeholder="anonymous desk">
      </div>
    </div>
    <label for="cContent">STORY</label>
    <textarea id="cContent" maxlength="8000" required placeholder="Write the full dispatch. Blank lines split paragraphs."></textarea>
    <div class="compose-actions">
      <button type="submit" class="btn-file" id="btnSend">send to the wire</button>
      <button type="button" class="btn-ghost" id="btnCancel">discard</button>
      <p id="composeErr" role="status" aria-live="polite"></p>
    </div>
  </form>
</div>

<script>
/* boot watchdog: if the module below never runs (file:// open, CDN blocked,
   adblock), say so instead of sitting on "connecting…" forever */
setTimeout(function(){
  if(window.__wireBooted) return;
  var s = document.getElementById('wireStatus');
  if(s){ s.className = 'err'; s.textContent = 'db client failed to load — open this app via sloppy.live (not a local file) and disable script blockers'; }
}, 6000);

/* dark mode toggle (independent of the db module so it always works) */
(function(){
  var btn = document.getElementById('themeBtn');
  function paint(){
    var dark = document.documentElement.dataset.theme === 'dark';
    btn.textContent = dark ? '☀️' : '🌙';
    btn.setAttribute('aria-pressed', dark ? 'true' : 'false');
    btn.setAttribute('aria-label', dark ? 'Switch to light mode' : 'Switch to dark mode');
  }
  btn.addEventListener('click', function(){
    var next = document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark';
    document.documentElement.dataset.theme = next;
    try{ localStorage.setItem('wire-desk-theme', next); }catch(e){}
    paint();
  });
  paint();
})();
</script>
<script type="module">

  [/royal|king charles|\bqueen\b|prince|princess/i, '👑'],
  [/film|movie|netflix|actor|cinema|hollywood/i, '🎬'],
  [/music|concert|album|singer|\bband\b|festival|opera/i, '🎵'],
  [/food|restaurant|cafe|chef|wine|coffee/i, '🍽️'],
  [/dies\b|death of|obituar|tributes|funeral/i, '🕯️'],
];
function topicEmoji(a){
  const hay = (a.headline || '') + ' ' + String(a.content || '').slice(0, 140);
  for(const [re, e] of TOPIC_RULES) if(re.test(hay)) return e;
  return a.kind === 'feed' ? '📰' : '🗣️';
}

/* ── time formatting ── */
function fmtShort(iso){
  const d = new Date(iso), now = new Date();
  const sameDay = d.toDateString() === now.toDateString();
  if(sameDay) return d.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
  return d.toLocaleDateString([], { month:'short', day:'numeric' });
}
function fmtFull(iso){
  const d = new Date(iso);
  return d.toLocaleDateString([], { weekday:'long', year:'numeric', month:'long', day:'numeric' })
    + ' · ' + d.toLocaleTimeString([], { hour:'2-digit', minute:'2-digit' });
}
function rel(iso){
  const s = Math.max(0, (Date.now() - new Date(iso)) / 1000);
  if(s < 60) return 'just now';
  if(s < 3600) return Math.floor(s/60) + 'm ago';
  if(s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

/* ── feed render (textContent everywhere — no HTML from users) ── */
function renderRail(){
  const rail = $('srcRail');
  rail.textContent = '';
  for(const s of SOURCES){
    const b = document.createElement('button');
    b.type = 'button';
    b.textContent = s === 'ALL' ? 'ALL' : s === 'COMMUNITY' ? 'COMMUNITY' : s.toUpperCase();
    b.setAttribute('aria-pressed', s === srcFilter ? 'true' : 'false');
    b.addEventListener('click', () => { srcFilter = s; renderRail(); renderFeed(); });
    rail.appendChild(b);
  }
}
function matchesFilter(a){
  if(srcFilter === 'ALL') return true;
  if(srcFilter === 'COMMUNITY') return a.kind !== 'feed';
  return a.source === srcFilter;
}
function renderFeed(){
  feedList.textContent = '';
  const q = query.toLowerCase();
  let rows = articles.filter(matchesFilter);
  if(q) rows = rows.filter(a => (a.headline||'').toLowerCase().includes(q) || (a.source||'').toLowerCase().includes(q));
  if(!rows.length){
    const li = document.createElement('li');
    li.className = 'feed-empty';
    li.textContent = articles.length
      ? 'nothing on the wire matches that.'
      : 'the wire is quiet. file the first story.';
    feedList.appendChild(li);
    return;
  }
  for(const a of rows){
    const li = document.createElement('li');
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'wire-item' + (a.id === activeId ? ' active' : '') + (a._fresh ? ' fresh' : '');
    btn.setAttribute('aria-pressed', a.id === activeId ? 'true' : 'false');
    const meta = document.createElement('div');
    meta.className = 'meta';
    const t = document.createElement('span');
    t.className = 't';
    t.textContent = fmtShort(a.created_at);
    t.title = rel(a.created_at);
    const src = document.createElement('span');
    src.className = 'src';
    src.textContent = a.source || 'unsourced';
    meta.append(t, src);
    if(a.kind === 'feed'){
      const live = document.createElement('span');
      live.className = 'live';
      live.textContent = 'WIRE';
      meta.appendChild(live);
    }
    const h = document.createElement('h3');
    const em = document.createElement('span');
    em.setAttribute('aria-hidden', 'true');
    em.textContent = topicEmoji(a) + ' ';
    h.appendChild(em);
    h.appendChild(document.createTextNode(a.headline || '(untitled dispatch)'));
    btn.append(meta, h);
    btn.addEventListener('click', () => openStory(a.id));
    li.appendChild(btn);
    feedList.appendChild(li);
    delete a._fresh;
  }
}

/* ── story render ── */
function openStory(id){
  activeId = id;
  const a = articles.find(x => x.id === id);
  renderFeed();
  storyScroll.textContent = '';
  if(!a){ renderEmptyStory(); return; }

  const art = document.createElement('article');
  art.className = 'story';

  const kicker = document.createElement('div');
  kicker.className = 'kicker';
  const src = document.createElement('span');
  src.className = 'src';
  src.textContent = a.source || 'unsourced';
  const time = document.createElement('span');
  time.textContent = fmtFull(a.created_at) + ' (' + rel(a.created_at) + ')';
  kicker.append(src, time);

  const h2 = document.createElement('h2');
  const h2em = document.createElement('span');
  h2em.setAttribute('aria-hidden', 'true');
  h2em.textContent = topicEmoji(a) + ' ';
  h2.appendChild(h2em);
  h2.appendChild(document.createTextNode(a.headline || '(untitled dispatch)'));

  const by = document.createElement('p');
  by.className = 'byline';
  by.textContent = 'filed by ' + (a.byline || 'anonymous desk');

  const body = document.createElement('div');
  body.className = 'body';
  const paras = String(a.content || '').split(/\n\s*\n|\n/).map(s => s.trim()).filter(Boolean);
  for(const p of paras.slice(0, 200)){
    const pe = document.createElement('p');
    pe.textContent = p;
    body.appendChild(pe);
  }

  art.append(kicker, h2, by, body);

  if(a.kind === 'feed' && a.link && /^https:\/\//.test(a.link)){
    const more = document.createElement('a');
    more.className = 'readmore';
    more.href = a.link;
    more.target = '_blank';
    more.rel = 'noopener noreferrer';
    more.textContent = 'read the full story at ' + (a.source || 'the source') + ' ↗';
    art.appendChild(more);
  }

  if(uid && a.user_id === uid && a.kind !== 'feed'){
    const retract = document.createElement('button');
    retract.type = 'button';
    retract.className = 'btn-retract';
    retract.textContent = '✕ retract this story';
    retract.addEventListener('click', async () => {
      retract.disabled = true;
      const { error } = await supabase.from(TABLE).delete().eq('id', a.id);
      if(error){ retract.disabled = false; retract.textContent = 'retract failed — try again'; return; }
      articles = articles.filter(x => x.id !== a.id);
      activeId = null;
      renderFeed(); renderEmptyStory();
      if(mobile()) storyPane.classList.remove('open');
    });
    art.appendChild(retract);
  }

  storyScroll.appendChild(art);
  if(mobile()){ storyPane.classList.add('open'); $('btnBack').focus(); }
  else storyScroll.scrollTop = 0;
}
function renderEmptyStory(){
  storyScroll.textContent = '';
  const d = document.createElement('div');
  d.className = 'story-empty';
  const orn = document.createElement('div');
  orn.className = 'orn';
  orn.textContent = '❦';
  orn.setAttribute('aria-hidden', 'true');
  const p = document.createElement('p');
  p.textContent = articles.length
    ? 'select a story from the wire.'
    : 'the presses are warm and waiting.';
  d.append(orn, p);
  storyScroll.appendChild(d);
}

/* ── data ── */
let loadTries = 0;
async function load(){
  if(!articles.length){
    feedList.textContent = '';
    const li = document.createElement('li');
    li.className = 'feed-empty';
    li.textContent = 'warming up the presses…';
    feedList.appendChild(li);
  }
  const { data, error } = await supabase.from(TABLE)
    .select('id, headline, source, content, byline, user_id, created_at, link, kind')
    .order('created_at', { ascending:false })
    .limit(MAXROWS);
  if(error){
    setStatus('err', 'wire down — retrying…');
    if(loadTries++ < 3) setTimeout(load, 2500 * loadTries);
    else setStatus('err', 'wire down — reload the page');
    return;
  }
  loadTries = 0;
  articles = data || [];
  setStatus('live', articles.length + ' on the wire');
  renderFeed();
  if(activeId == null) renderEmptyStory();
}
function subscribe(){
  supabase.channel('wire-desk-live')
    .on('postgres_changes', { event:'INSERT', schema:'public', table:TABLE }, payload => {
      const row = payload.new;
      if(articles.some(a => a.id === row.id)) return;
      row._fresh = true;
      articles.unshift(row);
      setStatus('live', articles.length + ' on the wire');
      renderFeed();
    })
    .on('postgres_changes', { event:'DELETE', schema:'public', table:TABLE }, payload => {
      const gone = payload.old && payload.old.id;
      if(gone == null) return;
      articles = articles.filter(a => a.id !== gone);
      if(activeId === gone){ activeId = null; renderEmptyStory(); }
      setStatus('live', articles.length + ' on the wire');
      renderFeed();
    })
    .subscribe();
}

/* ── compose ── */
function showCompose(show){
  composeEl.classList.toggle('show', show);
  composeEl.setAttribute('aria-hidden', show ? 'false' : 'true');
  if(show){ $('cHeadline').focus(); }
  else { $('btnCompose').focus(); }
}
$('btnCompose').addEventListener('click', () => showCompose(true));
$('btnCancel').addEventListener('click', () => showCompose(false));
composeEl.addEventListener('click', e => { if(e.target === composeEl) showCompose(false); });
document.addEventListener('keydown', e => {
  if(e.key === 'Escape'){
    if(composeEl.classList.contains('show')) showCompose(false);
    else if(mobile() && storyPane.classList.contains('open')) storyPane.classList.remove('open');
  }
});
$('composeForm').addEventListener('submit', async e => {
  e.preventDefault();
  const err = $('composeErr');
  err.textContent = '';
  if(!uid){ err.textContent = 'no session — reload the page.'; return; }
  const headline = $('cHeadline').value.trim();
  const source = $('cSource').value.trim();
  const content = $('cContent').value.trim();
  const byline = $('cByline').value.trim() || 'anonymous desk';
  if(!headline || !source || !content){ err.textContent = 'headline, source and story are required.'; return; }
  $('btnSend').disabled = true;
  const { data, error } = await supabase.from(TABLE)
    .insert({ headline, source, content, byline, kind: 'community', user_id: uid })
    .select()
    .single();
  $('btnSend').disabled = false;
  if(error){ err.textContent = 'the wire rejected it — try again.'; return; }
  try{ localStorage.setItem('wire-desk-byline', byline); }catch(_){}
  if(!articles.some(a => a.id === data.id)) articles.unshift(data);
  setStatus('live', articles.length + ' on the wire');
  $('composeForm').reset();
  $('cByline').value = byline;
  showCompose(false);
  openStory(data.id);
});

/* ── search / back ── */
$('searchIn').addEventListener('input', e => { query = e.target.value.trim(); renderFeed(); });
$('btnBack').addEventListener('click', () => storyPane.classList.remove('open'));

/* ── boot ──
   Reading the wire needs NO session (RLS allows select to anon), so load
   immediately. Auth resolves in the background with a hard timeout — it
   only gates composing/retracting, and supabaseSession() can stall when
   another client on the page holds the auth lock. Never let it block reads. */
renderRail();
renderEmptyStory();
try{ $('cByline').value = localStorage.getItem('wire-desk-byline') || ''; }catch(_){}
load().then(subscribe);
(async () => {
  try{
    const session = await Promise.race([
      supabaseSession(),
      new Promise((_, rej) => setTimeout(() => rej(new Error('auth timeout')), 8000)),
    ]);
    uid = session && session.user ? session.user.id : null;
    if(uid && activeId != null) openStory(activeId);  /* reveal retract on own story */
  }catch(e){ /* anonymous reading is fine; compose will say "no session" */ }
})();
</script>
</body>
</html>
