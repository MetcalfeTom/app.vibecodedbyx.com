<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no" />
<title>Pixel Cactus</title>
<link rel="icon" href="https://emojicdn.elk.sh/🌵" />
<meta name="description" content="A tiny pixel cactus that drinks droplets and sprouts spikes when neglected." />
<meta property="og:title" content="Pixel Cactus" />
<meta property="og:description" content="Water your pixel cactus. Forget it and it grows defensive spikes." />
<meta property="og:url" content="https://sloppy.live/pixel-cactus" />
<meta property="og:image" content="https://sloppy.live/pixel-cactus/og-image.png" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --sand:#e9b873;
    --sand-dark:#c98a44;
    --sky-1:#f6c280;
    --sky-2:#e87d4a;
    --sky-3:#923a52;
    --night:#2a1530;
    --green:#4f9c44;
    --green-dark:#2f6b2c;
    --green-hi:#8ed27a;
    --terracotta:#c54a2c;
    --cream:#fff3d6;
    --ink:#2a1530;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;height:100%;background:var(--night);color:var(--cream);font-family:'VT323',monospace;overflow:hidden;-webkit-tap-highlight-color:transparent}
  body{
    background:
      radial-gradient(ellipse at 20% 0%, var(--sky-1) 0%, var(--sky-2) 25%, var(--sky-3) 55%, var(--night) 100%);
    display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
    min-height:100vh;padding:14px 12px 8px;
  }
  h1{
    font-family:'Silkscreen',monospace;font-weight:700;
    font-size:clamp(20px,5vw,34px);
    letter-spacing:2px;
    margin:0 0 8px;color:var(--cream);
    text-shadow:3px 3px 0 var(--terracotta), 6px 6px 0 rgba(0,0,0,0.35);
  }
  .stage{
    position:relative;
    width:min(96vw,520px);
    aspect-ratio: 4/3;
    background:#000;
    border:4px solid var(--cream);
    box-shadow:
      0 0 0 4px var(--terracotta),
      8px 8px 0 4px rgba(0,0,0,0.45);
    image-rendering:pixelated;
    cursor:crosshair;
    overflow:hidden;
  }
  canvas{
    position:absolute;inset:0;width:100%;height:100%;
    image-rendering:pixelated;
    image-rendering:-moz-crisp-edges;
  }
  .hud{
    width:min(96vw,520px);
    margin-top:10px;
    display:grid;grid-template-columns:1fr 1fr;gap:8px 14px;
    font-family:'VT323',monospace;font-size:20px;
    background:rgba(42,21,48,0.55);
    border:3px solid var(--cream);
    padding:10px 14px;
    box-shadow:6px 6px 0 rgba(0,0,0,0.4);
  }
  .stat{display:flex;align-items:center;gap:8px;line-height:1}
  .stat .label{font-family:'Silkscreen',monospace;font-size:10px;color:var(--sky-1);letter-spacing:1px}
  .stat .val{font-size:22px;color:var(--cream)}
  .bar{position:relative;flex:1;height:14px;background:#000;border:2px solid var(--cream);min-width:60px}
  .bar > i{display:block;height:100%;background:linear-gradient(90deg,#4ec9ff,#a8e7ff);transition:width .35s ease}
  .row{display:flex;align-items:center;gap:8px;grid-column:1/-1}
  button.water{
    margin-top:10px;
    font-family:'Silkscreen',monospace;font-size:12px;letter-spacing:1px;
    background:var(--terracotta);color:var(--cream);
    border:3px solid var(--cream);
    padding:10px 18px;cursor:pointer;
    box-shadow:4px 4px 0 rgba(0,0,0,0.4);
  }
  button.water:active{transform:translate(2px,2px);box-shadow:2px 2px 0 rgba(0,0,0,0.4)}
  .hint{font-family:'VT323',monospace;font-size:18px;opacity:.8;margin-top:6px;text-align:center}
  footer{
    margin-top:auto;padding:10px;font-family:'Silkscreen',monospace;font-size:9px;letter-spacing:1px;
  }
  footer a{color:var(--cream);text-decoration:none;border-bottom:1px dashed var(--sky-1)}
  .mood-happy{color:#a8ff7a}
  .mood-thirsty{color:#ffd166}
  .mood-spiky{color:#ff7a7a}
  .mood-wilted{color:#bda7c4}
</style>
</head>
<body>
  <h1>PIXEL CACTUS</h1>
  <div class="stage" id="stage">
    <canvas id="cv" width="160" height="120"></canvas>
  </div>
  <div class="hud">
    <div class="stat row">
      <span class="label">HYDRATION</span>
      <div class="bar"><i id="hyd"></i></div>
    </div>
    <div class="stat"><span class="label">AGE</span><span class="val" id="age">0d</span></div>
    <div class="stat"><span class="label">SPIKES</span><span class="val" id="spk">0</span></div>
    <div class="stat row"><span class="label">MOOD</span><span class="val mood-happy" id="mood">happy</span></div>
  </div>
  <button class="water" id="btn">TAP STAGE TO WATER</button>
  <div class="hint">click anywhere on the sky to drop water</div>
  
<script>
(function(){
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  ctx.imageSmoothingEnabled = false;
  const W = cv.width, H = cv.height;

  // ---------- state ----------
  const SAVE_KEY = 'pixel-cactus-v1';
  let state = {
    hydration: 0.7,        // 0..1
    age: 0,                // seconds
    spikes: 0,             // count of extra defensive spikes
    lastDryAccum: 0,       // seconds spent below dry threshold
    born: Date.now(),
    lastTick: Date.now()
  };
  try{
    const s = JSON.parse(localStorage.getItem(SAVE_KEY)||'null');
    if(s && typeof s.hydration==='number'){
      state = Object.assign(state,s);
      // catch up: simulate decay since last visit
      const now = Date.now();
      const dt = Math.min((now - (s.lastTick||now))/1000, 60*60*12); // cap 12h
      simulate(dt);
      state.lastTick = now;
    }
  }catch(e){}

  function save(){
    try{ localStorage.setItem(SAVE_KEY, JSON.stringify(state)); }catch(e){}
  }

  // ---------- droplets & particles ----------
  const drops = []; // {x,y,vy}
  const sparks = []; // {x,y,vx,vy,life}

  function addDrop(px,py){
    drops.push({x:Math.round(px), y:Math.round(py), vy:0.6});
  }
  function splash(px,py){
    for(let i=0;i<8;i++){
      sparks.push({
        x:px,y:py,
        vx:(Math.random()-0.5)*1.6,
        vy:-Math.random()*1.4-0.2,
        life: 18 + (Math.random()*10|0),
        c: Math.random()<0.5 ? '#a8e7ff' : '#fff3d6'
      });
    }
  }

  // ---------- input ----------
  const stage = document.getElementById('stage');
  function stageToCanvas(ev){
    const r = stage.getBoundingClientRect();
    const t = ev.touches ? ev.touches[0] : ev;
    const x = (t.clientX - r.left) / r.width  * W;
    const y = (t.clientY - r.top)  / r.height * H;
    return {x,y};
  }
  function onPress(ev){
    ev.preventDefault();
    const p = stageToCanvas(ev);
    if(p.y < H - 20){ // not on the ground
      addDrop(p.x, p.y);
    } else {
      addDrop(p.x, H-30);
    }
  }
  stage.addEventListener('mousedown', onPress);
  stage.addEventListener('touchstart', onPress, {passive:false});
  document.getElementById('btn').addEventListener('click', ()=>{
    addDrop(W/2 + (Math.random()*20-10), 8);
  });

  // ---------- simulation ----------
  function simulate(dt){
    state.age += dt;
    // hydration decay: ~ full bar lasts ~20 minutes of real time
    state.hydration -= dt * (1/1200);
    if(state.hydration < 0) state.hydration = 0;
    if(state.hydration > 1) state.hydration = 1;

    // dry tracking
    if(state.hydration < 0.25){
      state.lastDryAccum += dt;
      // every 60s of dryness => +1 spike
      while(state.lastDryAccum > 60){
        state.lastDryAccum -= 60;
        state.spikes = Math.min(state.spikes + 1, 60);
      }
    } else if(state.hydration > 0.5){
      // recovery is slow
      state.lastDryAccum = Math.max(0, state.lastDryAccum - dt*0.5);
    }
  }

  function growthStage(){
    // sprout 0, small 1, medium 2, tall 3, with arms 4
    const a = state.age;
    if(a < 30) return 0;
    if(a < 180) return 1;
    if(a < 600) return 2;
    if(a < 1500) return 3;
    return 4;
  }

  function mood(){
    if(state.spikes >= 8) return {t:'spiky',cls:'mood-spiky'};
    if(state.hydration < 0.18) return {t:'wilted',cls:'mood-wilted'};
    if(state.hydration < 0.4) return {t:'thirsty',cls:'mood-thirsty'};
    return {t:'happy',cls:'mood-happy'};
  }

  // ---------- drawing ----------
  // pixel helpers
  function px(x,y,c){ ctx.fillStyle=c; ctx.fillRect(x|0,y|0,1,1); }
  function rect(x,y,w,h,c){ ctx.fillStyle=c; ctx.fillRect(x|0,y|0,w|0,h|0); }

  function drawSky(){
    // gradient strips
    const bands = [
      ['#f6c280',0,18],
      ['#f1a368',18,32],
      ['#e87d4a',32,46],
      ['#c25563',46,60],
      ['#923a52',60,72],
      ['#5b2747',72,84],
      ['#2a1530',84,100]
    ];
    for(const b of bands){ rect(0,b[1],W,b[2]-b[1],b[0]); }
    // sun pixel circle in upper-right
    const sx=128, sy=22, sr=8;
    for(let y=-sr;y<=sr;y++){
      for(let x=-sr;x<=sr;x++){
        const d = x*x+y*y;
        if(d <= sr*sr){
          let c = '#ffe28a';
          if(d > (sr-1)*(sr-1)) c='#ffba5b';
          if(d < (sr-4)*(sr-4)) c='#fff5c2';
          px(sx+x,sy+y,c);
        }
      }
    }
    // sun rays
    for(let i=0;i<8;i++){
      const a = i*(Math.PI*2/8);
      const rx = sx + Math.cos(a)*(sr+2);
      const ry = sy + Math.sin(a)*(sr+2);
      px(rx,ry,'#ffd28a');
    }
    // a few stars in the dark band
    const stars = [[10,90],[24,86],[40,92],[58,88],[72,94],[100,90],[118,93],[140,91],[150,87]];
    for(const s of stars){ px(s[0],s[1],'#fff3d6'); }
  }

  function drawGround(){
    // sand with darker undershade
    rect(0,100,W,20,'#e9b873');
    rect(0,100,W,1,'#fff3d6');
    rect(0,118,W,2,'#a36a30');
    // dunes
    for(let x=0;x<W;x++){
      const y = 100 + Math.round(Math.sin(x*0.18)*1.2 + Math.cos(x*0.05)*1.2);
      px(x,y,'#c98a44');
      px(x,y+1,'#e9b873');
    }
    // pebbles
    const pebs=[[10,114],[28,116],[55,115],[80,117],[110,114],[132,116],[148,115]];
    for(const p of pebs){ px(p[0],p[1],'#7b4a1c'); }
  }

  // pot + cactus
  function drawPot(){
    // small terracotta pot at base
    const px0 = 70, py0 = 96;
    rect(px0, py0, 20, 6, '#c54a2c');
    rect(px0, py0, 20, 1, '#ff7a4a');
    rect(px0, py0+5, 20, 1, '#7a2412');
    rect(px0-1, py0-2, 22, 2, '#c54a2c');
    rect(px0-1, py0-2, 22, 1, '#ff7a4a');
  }

  function drawCactusBody(stage){
    const cx = 80;
    const baseY = 96; // top of pot
    const h = ({0:8, 1:18, 2:30, 3:44, 4:50})[stage];
    const w = ({0:4, 1:6, 2:8,  3:10, 4:10})[stage];

    const top = baseY - h;
    // body (rounded top)
    for(let y=top; y<baseY; y++){
      let ww = w;
      if(y - top < 2) ww = w-2;
      if(y - top < 1) ww = w-3;
      if(ww<1) ww=1;
      const x0 = cx - (ww>>1);
      // base color
      rect(x0, y, ww, 1, '#4f9c44');
      // shading right
      px(x0+ww-1, y, '#2f6b2c');
      // highlight left
      px(x0, y, '#8ed27a');
    }
    // ribs (vertical lines)
    const ribs = stage===0 ? 1 : (stage<3?2:3);
    for(let r=0;r<ribs;r++){
      const rx = cx - (w>>1) + 1 + r* Math.max(2, (w-2)/ribs|0);
      for(let y=top+1;y<baseY-1;y++){
        if((y%2)===0) px(rx, y, '#3b7c34');
      }
    }
    // arms (stage 4)
    if(stage>=4){
      // left arm
      const lay = top + 18;
      rect(cx - (w>>1) - 4, lay, 4, 2, '#4f9c44');
      px(cx - (w>>1) - 4, lay, '#8ed27a');
      for(let y=lay-6;y<lay;y++){
        rect(cx - (w>>1) - 4, y, 2, 1, '#4f9c44');
        px(cx - (w>>1) - 4, y, '#8ed27a');
      }
      // right arm
      const ray = top + 24;
      rect(cx + (w>>1), ray, 4, 2, '#4f9c44');
      px(cx + (w>>1)+3, ray, '#2f6b2c');
      for(let y=ray-5;y<ray;y++){
        rect(cx + (w>>1)+2, y, 2, 1, '#4f9c44');
        px(cx + (w>>1)+3, y, '#2f6b2c');
      }
    }

    // little flower when very happy + mature
    if(stage>=2 && state.hydration>0.75 && state.spikes<3){
      px(cx, top-1, '#ff7ab6');
      px(cx-1, top-1, '#ff9ec8');
      px(cx+1, top-1, '#ff9ec8');
      px(cx, top-2, '#ffe28a');
    }

    // wilt: tilt top when very dry
    if(state.hydration<0.18){
      // overdraw a pixel to one side to hint droop
      px(cx+1, top, '#3b7c34');
      px(cx-1, top+1, '#3b7c34');
    }

    // base default spikes (a few small)
    drawDefaultSpikes(cx, top, baseY, w);
    // extra defensive spikes
    drawExtraSpikes(cx, top, baseY, w, state.spikes);
  }

  function drawDefaultSpikes(cx, top, baseY, w){
    // a couple small white pixels along the body
    const lefts = [];
    for(let y=top+3; y<baseY-2; y+=4){
      lefts.push(y);
    }
    const halfW = w>>1;
    for(const y of lefts){
      px(cx-halfW-1, y, '#fff3d6');
      px(cx+halfW,   y+2, '#fff3d6');
    }
  }

  function drawExtraSpikes(cx, top, baseY, w, n){
    // distribute extra spikes around perimeter, longer when more
    const halfW = w>>1;
    const perimY = [];
    for(let y=top+2; y<baseY-1; y++) perimY.push(y);
    if(perimY.length===0) return;
    let placed = 0;
    let seed = 1234;
    function rnd(){ seed = (seed*9301 + 49297) % 233280; return seed/233280; }
    while(placed < n){
      const y = perimY[(rnd()*perimY.length)|0];
      const side = rnd()<0.5 ? -1 : 1;
      const len = 1 + ((placed/6)|0);
      for(let i=1;i<=len;i++){
        const xx = cx + side*(halfW + i);
        if(xx>=0 && xx<W) px(xx, y, '#fff3d6');
      }
      // tiny diagonal too
      px(cx + side*(halfW+1), y-1, '#fff3d6');
      placed++;
      if(placed>200) break;
    }
  }

  function drawDropsAndSparks(){
    // drops
    for(let i=drops.length-1;i>=0;i--){
      const d = drops[i];
      d.vy = Math.min(d.vy + 0.08, 1.6);
      d.y += d.vy;
      // draw little teardrop
      px(d.x, d.y|0, '#a8e7ff');
      px(d.x, (d.y|0)-1, '#4ec9ff');
      // collide with cactus area or pot top (~y=88..96)
      if(d.y >= 92 && d.x>68 && d.x<92){
        splash(d.x, d.y);
        // gain hydration
        state.hydration = Math.min(1, state.hydration + 0.06);
        drops.splice(i,1);
        save();
        continue;
      }
      // hit ground
      if(d.y >= 100){
        splash(d.x, 99);
        // small partial gain
        state.hydration = Math.min(1, state.hydration + 0.015);
        drops.splice(i,1);
        save();
        continue;
      }
    }
    // sparks
    for(let i=sparks.length-1;i>=0;i--){
      const s = sparks[i];
      s.vy += 0.07;
      s.x += s.vx; s.y += s.vy;
      s.life--;
      if(s.life<=0){ sparks.splice(i,1); continue; }
      px(s.x|0, s.y|0, s.c);
    }
  }

  // ---------- HUD ----------
  const hyd = document.getElementById('hyd');
  const ageEl = document.getElementById('age');
  const spkEl = document.getElementById('spk');
  const moodEl = document.getElementById('mood');

  function fmtAge(s){
    if(s<60) return Math.floor(s)+'s';
    if(s<3600) return Math.floor(s/60)+'m';
    if(s<86400) return Math.floor(s/3600)+'h';
    return Math.floor(s/86400)+'d';
  }
  function updateHUD(){
    hyd.style.width = (state.hydration*100).toFixed(0)+'%';
    ageEl.textContent = fmtAge(state.age);
    spkEl.textContent = state.spikes;
    const m = mood();
    moodEl.textContent = m.t;
    moodEl.className = 'val '+m.cls;
  }

  // ---------- main loop ----------
  let lastFrame = performance.now();
  function frame(now){
    const dt = Math.min((now-lastFrame)/1000, 0.1);
    lastFrame = now;
    // sim time uses real seconds
    simulate(dt);
    state.lastTick = Date.now();

    // draw
    drawSky();
    drawGround();
    drawPot();
    drawCactusBody(growthStage());
    drawDropsAndSparks();

    updateHUD();
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // periodic save
  setInterval(save, 5000);
  window.addEventListener('beforeunload', save);
})();
</script>
</body>
</html>
