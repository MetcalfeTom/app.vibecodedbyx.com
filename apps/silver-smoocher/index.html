<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Silver Smoocher</title>
<meta name="description" content="A pixel-art tycoon clicker. Smooch jet-pack-equipped silver foxes for coins. Denture polish, hover-rounds, and inheritance await." />
<meta property="og:title" content="Silver Smoocher" />
<meta property="og:description" content="A pixel-art tycoon clicker. Smooch jet-pack-equipped silver foxes for coins. Denture polish, hover-rounds, and inheritance await." />
<meta property="og:url" content="https://sloppy.live/silver-smoocher" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/pixel%20art%20old%20men%20with%20rocket%20jet%20packs%20kissing%20coins%20arcade%20game%20cardigan%20dentures%20comedic%20bright%20pastel%20retro?width=1200&height=630&nologo=true" />
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%92%8B" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen:wght@400;700&family=VT323&family=Fraunces:ital,wght@1,300&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#1a1224;
    --bg2:#241830;
    --panel:#2b1f3a;
    --panel-lt:#3a2c4d;
    --line:#4a3a5e;
    --line-lt:#6c5980;
    --ink:#f8ecdc;
    --dim:#9b8aa9;
    --gold:#f5c849;
    --gold-deep:#c89030;
    --rose:#f06a9a;
    --rose-deep:#c84878;
    --mint:#9ad6a8;
    --sky:#7cc8ff;
    --skin-base:#f7d4b3;
    --skin-shadow:#d29c79;
    --silver-light:#e2dde8;
    --silver-mid:#aea2bd;
    --silver-dark:#7a6e8a;
    --rocket:#cad0d8;
    --rocket-shadow:#7c8390;
    --flame:#ff8a3a;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%}
  body{
    background:
      radial-gradient(900px 600px at 80% 10%, rgba(245,200,73,0.10), transparent 60%),
      radial-gradient(1100px 700px at 10% 100%, rgba(240,106,154,0.08), transparent 60%),
      var(--bg);
    color:var(--ink);
    font-family:'VT323', monospace;
    min-height:100vh;
    overflow-x:hidden;
  }
  body::before{
    content:'';
    position:fixed;
    inset:0;
    background-image:
      radial-gradient(circle at 4px 4px, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size:24px 24px;
    pointer-events:none;
    z-index:1;
  }
  .stage{
    max-width:1200px;
    margin:0 auto;
    padding:18px 16px 60px;
    display:grid;
    grid-template-columns:1fr 360px;
    gap:18px;
    position:relative;
    z-index:2;
  }
  @media (max-width:920px){
    .stage{grid-template-columns:1fr}
  }
  header{
    grid-column:1 / -1;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:14px;
    padding:14px 18px;
    background:var(--panel);
    border:2px solid var(--line);
    border-radius:6px;
    box-shadow:0 0 0 2px var(--bg), 0 6px 0 var(--bg2);
  }
  .brand{
    font-family:'Press Start 2P', monospace;
    font-size:clamp(15px, 2.6vw, 22px);
    color:var(--gold);
    text-shadow:2px 2px 0 var(--gold-deep), 4px 4px 0 var(--bg2);
    letter-spacing:0.04em;
    line-height:1.3;
  }
  .brand .sub{
    display:block;
    font-family:'Silkscreen', sans-serif;
    font-size:11px;
    color:var(--rose);
    text-shadow:1px 1px 0 var(--bg2);
    letter-spacing:0.18em;
    margin-top:6px;
  }
  .stats{
    display:flex;
    gap:18px;
    flex-wrap:wrap;
    align-items:center;
  }
  .stat{
    background:var(--bg2);
    border:1px solid var(--line);
    border-radius:4px;
    padding:8px 14px;
    min-width:130px;
  }
  .stat-label{
    font-family:'Silkscreen', sans-serif;
    font-size:10px;
    color:var(--dim);
    letter-spacing:0.18em;
    text-transform:uppercase;
  }
  .stat-value{
    font-family:'Press Start 2P', monospace;
    font-size:14px;
    color:var(--gold);
    margin-top:6px;
    text-shadow:2px 2px 0 var(--bg);
  }
  .stat.coins .stat-value{color:var(--gold)}
  .stat.cps .stat-value{color:var(--mint)}
  .stat.click .stat-value{color:var(--rose)}

  /* main play area */
  .play{
    background:var(--panel);
    border:2px solid var(--line);
    border-radius:6px;
    overflow:hidden;
    box-shadow:0 0 0 2px var(--bg), 0 6px 0 var(--bg2);
    display:flex;
    flex-direction:column;
  }
  .play-head{
    background:var(--panel-lt);
    padding:8px 14px;
    border-bottom:2px solid var(--line);
    font-family:'Silkscreen', sans-serif;
    font-size:11px;
    color:var(--gold);
    letter-spacing:0.2em;
    text-transform:uppercase;
    display:flex;
    justify-content:space-between;
  }
  .stage-canvas{
    position:relative;
    height:560px;
    background:
      linear-gradient(180deg, #2a1c3a 0%, #1f1530 50%, #18112a 100%);
    overflow:hidden;
    cursor:pointer;
  }
  @media (max-width:920px){
    .stage-canvas{height:440px}
  }
  #stage{
    display:block;
    width:100%;
    height:100%;
    image-rendering:pixelated;
    image-rendering:crisp-edges;
  }
  .play-foot{
    background:var(--panel-lt);
    padding:10px 14px;
    border-top:2px solid var(--line);
    font-family:'Silkscreen', sans-serif;
    font-size:11px;
    color:var(--dim);
    letter-spacing:0.2em;
    text-transform:uppercase;
    text-align:center;
  }
  .play-foot b{color:var(--rose)}

  /* shop */
  .shop{
    background:var(--panel);
    border:2px solid var(--line);
    border-radius:6px;
    box-shadow:0 0 0 2px var(--bg), 0 6px 0 var(--bg2);
    display:flex;
    flex-direction:column;
    height:fit-content;
    max-height:760px;
    overflow:hidden;
  }
  .tabs{
    display:flex;
    background:var(--panel-lt);
    border-bottom:2px solid var(--line);
  }
  .tab{
    flex:1;
    background:transparent;
    border:none;
    color:var(--dim);
    font-family:'Press Start 2P', monospace;
    font-size:10px;
    padding:14px 8px;
    cursor:pointer;
    letter-spacing:0.06em;
    transition:all 0.12s;
    border-bottom:2px solid transparent;
  }
  .tab:hover{color:var(--ink);background:rgba(245,200,73,0.05)}
  .tab.active{
    color:var(--gold);
    border-bottom-color:var(--gold);
    background:rgba(245,200,73,0.08);
  }
  .shop-list{
    overflow-y:auto;
    max-height:680px;
    padding:8px;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .shop-list::-webkit-scrollbar{width:8px}
  .shop-list::-webkit-scrollbar-track{background:var(--bg2)}
  .shop-list::-webkit-scrollbar-thumb{background:var(--line);border-radius:4px}
  .item{
    background:var(--bg2);
    border:2px solid var(--line);
    border-radius:4px;
    padding:10px 12px;
    cursor:pointer;
    transition:transform 0.12s, border-color 0.12s, background 0.12s;
    position:relative;
    display:grid;
    grid-template-columns:42px 1fr auto;
    gap:10px;
    align-items:center;
  }
  .item:hover{
    border-color:var(--line-lt);
    transform:translateY(-1px);
  }
  .item.affordable{
    border-color:var(--gold-deep);
  }
  .item.affordable:hover{
    border-color:var(--gold);
    background:rgba(245,200,73,0.06);
  }
  .item.locked{
    opacity:0.42;
    cursor:not-allowed;
    background:#1f1428;
  }
  .item.maxed{
    opacity:0.55;
    cursor:not-allowed;
    border-color:var(--line);
    background:var(--bg2);
  }
  .item-icon{
    width:42px;height:42px;
    background:var(--bg);
    border:1px solid var(--line);
    border-radius:3px;
    display:grid;
    place-items:center;
    image-rendering:pixelated;
  }
  .item-icon canvas{
    width:38px;height:38px;
    image-rendering:pixelated;
  }
  .item-body{min-width:0}
  .item-name{
    font-family:'Press Start 2P', monospace;
    font-size:9px;
    color:var(--ink);
    line-height:1.4;
    margin-bottom:5px;
    letter-spacing:0.04em;
  }
  .item-desc{
    font-family:'VT323', monospace;
    font-size:14px;
    color:var(--dim);
    line-height:1.2;
  }
  .item-side{
    text-align:right;
    min-width:80px;
  }
  .item-cost{
    font-family:'Silkscreen', sans-serif;
    font-size:13px;
    color:var(--gold);
    letter-spacing:0.05em;
  }
  .item.locked .item-cost,
  .item:not(.affordable) .item-cost{color:var(--dim)}
  .item-owned{
    font-family:'Silkscreen', sans-serif;
    font-size:10px;
    color:var(--mint);
    letter-spacing:0.1em;
    margin-top:4px;
  }
  .item-locked-msg{
    font-family:'VT323', monospace;
    font-size:13px;
    color:var(--rose-deep);
  }
  .item.legendary{
    border:2px solid var(--gold);
    background:linear-gradient(135deg, rgba(245,200,73,0.10), rgba(240,106,154,0.08));
    box-shadow:0 0 0 1px rgba(245,200,73,0.4) inset, 0 0 14px rgba(245,200,73,0.18);
    animation:legendaryPulse 2.4s ease-in-out infinite;
  }
  .item.legendary .item-name{
    color:var(--gold);
    text-shadow:1px 1px 0 var(--gold-deep);
  }
  .item.legendary.locked{
    animation:none;
    box-shadow:none;
  }
  @keyframes legendaryPulse{
    0%,100%{box-shadow:0 0 0 1px rgba(245,200,73,0.4) inset, 0 0 14px rgba(245,200,73,0.18)}
    50%{box-shadow:0 0 0 1px rgba(245,200,73,0.7) inset, 0 0 24px rgba(245,200,73,0.36)}
  }
  .item-tag{
    display:inline-block;
    font-family:'Silkscreen', sans-serif;
    font-size:8px;
    color:var(--bg);
    background:var(--gold);
    padding:2px 5px;
    letter-spacing:0.14em;
    margin-bottom:4px;
    border-radius:2px;
  }

  /* floating coins / hearts */
  .float{
    position:absolute;
    pointer-events:none;
    font-family:'Press Start 2P', monospace;
    font-size:11px;
    color:var(--gold);
    text-shadow:1px 1px 0 var(--bg);
    animation:floatup 1.2s ease-out forwards;
    z-index:5;
  }
  .float.heart{color:var(--rose);font-size:18px}
  @keyframes floatup{
    0%{transform:translate(0,0) scale(0.6);opacity:0}
    18%{transform:translate(0,-6px) scale(1);opacity:1}
    100%{transform:translate(var(--dx,0), -80px) scale(1);opacity:0}
  }

  /* save status */
  .saved{
    position:fixed;
    bottom:14px;
    left:14px;
    background:var(--panel);
    border:1px solid var(--line);
    padding:6px 12px;
    font-family:'Silkscreen', sans-serif;
    font-size:10px;
    color:var(--dim);
    letter-spacing:0.16em;
    border-radius:3px;
    z-index:50;
  }
  .saved.flash{color:var(--mint);border-color:var(--mint)}

  /* reset button */
  .reset{
    background:transparent;
    border:1px solid var(--line);
    color:var(--dim);
    font-family:'Silkscreen', sans-serif;
    font-size:10px;
    padding:6px 10px;
    border-radius:3px;
    cursor:pointer;
    letter-spacing:0.16em;
    text-transform:uppercase;
  }
  .reset:hover{border-color:var(--rose-deep);color:var(--rose)}

  .creed{
    grid-column:1 / -1;
    text-align:center;
    color:var(--dim);
    font-family:'Fraunces', serif;
    font-style:italic;
    font-size:14px;
    margin-top:8px;
  }
  .creed b{color:var(--rose);font-weight:normal}
</style>
</head>
<body>
<div class="stage">
  <header>
    <div class="brand">
      SILVER SMOOCHER
      <span class="sub">★ jet-pack tycoon ★</span>
    </div>
    <div class="stats">
      <div class="stat coins">
        <div class="stat-label">Coins</div>
        <div class="stat-value" id="coinsLbl">0</div>
      </div>
      <div class="stat cps">
        <div class="stat-label">Per second</div>
        <div class="stat-value" id="cpsLbl">0</div>
      </div>
      <div class="stat click">
        <div class="stat-label">Per smooch</div>
        <div class="stat-value" id="clickLbl">1</div>
      </div>
      <button class="reset" id="resetBtn" title="reset save">RESET</button>
    </div>
  </header>

  <section class="play">
    <div class="play-head">
      <span>★ THE MAIN STAGE ★</span>
      <span id="totalLbl">0 smooches landed</span>
    </div>
    <div class="stage-canvas" id="stageWrap">
      <canvas id="stage" width="640" height="560"></canvas>
    </div>
    <div class="play-foot"><b>click</b> the silver foxes — they have rocketpacks and they will not refuse</div>
  </section>

  <aside class="shop">
    <div class="tabs">
      <button class="tab active" data-tab="generators">GENERATORS</button>
      <button class="tab" data-tab="upgrades">UPGRADES</button>
    </div>
    <div class="shop-list" id="shopList"></div>
  </aside>

  <div class="creed">smooch responsibly. respect the elders. <b>blast off into solvency.</b></div>
</div>

<div class="saved" id="saved">save: idle</div>

<script>
'use strict';

// ============================================================
// PALETTE — pixel art colors
// ============================================================
const PAL = {
  none:   null,
  bg:     '#1f1530',
  // skin
  skin:   '#f7d4b3',
  skinSh: '#d29c79',
  skinDk: '#a87554',
  // silver hair
  hairLt: '#e2dde8',
  hairMd: '#aea2bd',
  hairDk: '#7a6e8a',
  // rosy
  rose:   '#f06a9a',
  roseDk: '#c84878',
  cheek:  '#eda7b8',
  // eyes
  eyeWt:  '#ffffff',
  eyeBk:  '#2a1830',
  // dentures
  toothW: '#fffbed',
  toothS: '#d8d0bd',
  // glasses
  glass:  '#2a1830',
  glassR: '#5a4870',
  // lip
  lipLt:  '#ff6f9a',
  lipDk:  '#c84876',
  // cardigans (per buddy)
  card1:  '#a8d4b6',  // mint
  card2:  '#7cc8ff',  // sky
  card3:  '#f5c849',  // gold
  card4:  '#f06a9a',  // rose
  card5:  '#b6a6cc',  // lavender
  card6:  '#e89358',  // peach
  card7:  '#c8d65e',  // lime
  card8:  '#ed8aa6',  // pink
  card9:  '#9ad6a8',  // mint deep
  card10: '#d6b656',  // mustard
  // rocket
  rocket: '#cad0d8',
  rocketSh:'#8089a0',
  rocketDk:'#4a536b',
  rocketStripe:'#d6464c',
  flame1: '#ffd75e',
  flame2: '#ff8a3a',
  flame3: '#ff4a3a',
  // misc props
  cane:   '#5a3e2a',
  caneLt: '#8a6a48',
  paper:  '#fff8e0',
  paperD: '#bea778',
  // wrinkle
  wrkl:   '#c89070',
  // RAPPER (Prostate Power)
  gold:     '#f5c849',
  goldDp:   '#c89030',
  goldHi:   '#fff8c0',
  shades:   '#08050f',
  shadesH:  '#3a2c4d',
  cap:      '#1c1126',
  capLt:    '#3a2c4d',
  capRim:   '#0d0816',
  mic:      '#1a1224',
  micGrill: '#9aaab8',
  micBall:  '#d6dde8',
  jersey:   '#2a1f3c',
  jerseyHi: '#3a2c50',
  jerseyN:  '#f5c849',
};

// ============================================================
// SPRITE: OLD MAN (24 wide × 30 tall)
// Drawn with parametric pixel ops — variants per generator.
// ============================================================
function drawOldMan(ctx, ox, oy, scale, opts){
  opts = opts || {};
  const card = opts.card || PAL.card1;
  const propKind = opts.prop || 'none';   // bingo/cane/paper/cup/none
  const showDentures = !!opts.dentures;
  const showGlasses = !!opts.glasses;
  const showHearing = !!opts.hearing;
  const wave = !!opts.wave;
  const pucker = opts.pucker || 0;        // 0..1
  const jet = opts.jet || 0;              // 0..1 (flame intensity)
  const flameTick = (opts.flameTick||0);  // animation phase

  function p(x, y, color, w, h){
    if(!color) return;
    w = w || 1; h = h || 1;
    ctx.fillStyle = color;
    ctx.fillRect(ox + x*scale, oy + y*scale, w*scale, h*scale);
  }

  // ROCKET BACKPACK (drawn first — behind body)
  // The pack sits behind the torso, visible above the head and below the legs.
  // Rocket cone above head:
  p(15, 1, PAL.rocket, 4, 1);
  p(14, 2, PAL.rocketSh); p(15, 2, PAL.rocket, 4, 1); p(19, 2, PAL.rocketDk);
  p(14, 3, PAL.rocketSh); p(15, 3, PAL.rocket, 4, 1); p(19, 3, PAL.rocketDk);
  p(14, 4, PAL.rocketSh); p(15, 4, PAL.rocketStripe, 4, 1); p(19, 4, PAL.rocketDk);
  p(14, 5, PAL.rocketSh); p(15, 5, PAL.rocketStripe, 4, 1); p(19, 5, PAL.rocketDk);

  // strap line behind shoulders
  p(15, 16, PAL.rocketDk, 1, 4);
  p(8, 18, PAL.rocketDk, 1, 1);

  // pack body — between/behind head + body (visible on right side)
  p(18, 11, PAL.rocketSh, 3, 1);
  p(18, 12, PAL.rocket, 3, 1);
  p(18, 13, PAL.rocket, 2, 1); p(20, 13, PAL.rocketDk);
  p(18, 14, PAL.rocketStripe, 2, 1); p(20, 14, PAL.rocketDk);
  p(18, 15, PAL.rocket, 2, 1); p(20, 15, PAL.rocketDk);
  p(18, 16, PAL.rocketSh, 2, 1); p(20, 16, PAL.rocketDk);
  p(18, 17, PAL.rocketSh, 2, 1); p(20, 17, PAL.rocketDk);
  // small porthole
  p(19, 14, PAL.flame1);

  // pack fins below
  p(17, 18, PAL.rocketDk);
  p(20, 18, PAL.rocketDk);
  p(16, 19, PAL.rocketDk); p(21, 19, PAL.rocketDk);
  p(16, 20, PAL.rocketDk); p(21, 20, PAL.rocketDk);

  // jet flame at bottom (if jetting)
  if(jet > 0){
    const ti = flameTick & 1;
    p(18, 22+ti, PAL.flame1);
    p(19, 22+ti, PAL.flame1);
    p(18, 23+ti, PAL.flame2, 2, 1);
    p(18, 24+ti, PAL.flame3);
    p(19, 24+ti, PAL.flame3);
    if(jet > 0.6){
      p(17, 23, PAL.flame2);
      p(20, 23, PAL.flame2);
    }
  }

  // ---- HEAD ----
  // Bald top with side wisps of silver hair
  // Top of skull (slightly bald)
  p(7, 4, PAL.skinSh, 5, 1);
  p(6, 5, PAL.skinSh); p(7, 5, PAL.skin, 5, 1); p(12, 5, PAL.skinSh);
  p(6, 6, PAL.skin, 7, 1); p(13, 6, PAL.skinSh);
  // Side wisps (silver hair on sides, bald top)
  p(5, 6, PAL.hairMd);
  p(5, 7, PAL.hairLt); p(13, 7, PAL.hairLt);
  p(5, 8, PAL.hairLt); p(13, 8, PAL.hairLt);
  p(5, 9, PAL.hairMd); p(13, 9, PAL.hairMd);

  // Face main
  p(6, 7, PAL.skin, 7, 1);
  p(6, 8, PAL.skin, 7, 1);
  p(6, 9, PAL.skin, 7, 1);
  p(6, 10, PAL.skin, 7, 1);
  p(6, 11, PAL.skin, 7, 1);
  p(7, 12, PAL.skin, 5, 1);

  // Wrinkles (forehead + cheek)
  p(7, 7, PAL.wrkl);
  p(11, 7, PAL.wrkl);
  p(6, 11, PAL.wrkl); p(12, 11, PAL.wrkl);

  // Eyes — closed for kissing if puckering hard, otherwise small dots
  if(pucker > 0.5){
    // closed/squinting eyes (curved line)
    p(7, 9, PAL.eyeBk, 2, 1);
    p(11, 9, PAL.eyeBk, 1, 1);
    p(10, 9, PAL.eyeBk);
  } else {
    // open eyes
    p(7, 8, PAL.eyeWt); p(8, 8, PAL.eyeBk);
    p(10, 8, PAL.eyeBk); p(11, 8, PAL.eyeWt);
  }

  // Glasses (overlaid)
  if(showGlasses){
    // left lens
    p(6, 8, PAL.glass); p(7, 8, PAL.glass, 2, 1); p(9, 8, PAL.glass);
    p(6, 9, PAL.glass); p(9, 9, PAL.glass);
    p(6, 10, PAL.glass); p(7, 10, PAL.glass, 2, 1); p(9, 10, PAL.glass);
    // right lens
    p(10, 8, PAL.glass, 3, 1);
    p(10, 9, PAL.glass); p(12, 9, PAL.glass);
    p(10, 10, PAL.glass, 3, 1);
  }

  // Hearing aid (right ear)
  if(showHearing){
    p(13, 9, PAL.rose);
    p(13, 10, PAL.roseDk);
  }

  // Cheek dots (rosy)
  p(6, 10, PAL.cheek);
  p(12, 10, PAL.cheek);

  // Nose

// ============================================================
// STATE
// ============================================================
const SAVE_KEY = 'silver-smoocher-save-v1';
const state = {
  coins:0,
  totalEarned:0,
  totalClicks:0,
  owned:{},          // id -> count
  upgradesOwned:{},  // id -> 1
  pucker:0,
  shopTab:'generators',
  particles:[],
  buddies:[],        // visual reps of each owned generator instance
  flameTick:0,
};

function load(){
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return;
    const d = JSON.parse(raw);
    state.coins = d.coins || 0;
    state.totalEarned = d.totalEarned || 0;
    state.totalClicks = d.totalClicks || 0;
    state.owned = d.owned || {};
    state.upgradesOwned = d.upgradesOwned || {};
  } catch(e){ console.warn('load failed', e); }
}

let saveTimer = null;
function saveSoon(){
  if(saveTimer) return;
  saveTimer = setTimeout(() => {
    saveTimer = null;
    saveNow();
  }, 1500);
}
function saveNow(){
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      coins:state.coins,
      totalEarned:state.totalEarned,
      totalClicks:state.totalClicks,
      owned:state.owned,
      upgradesOwned:state.upgradesOwned,
    }));
    flashSaved();
  } catch(e){ console.warn('save failed', e); }
}
function flashSaved(){
  const el = document.getElementById('saved');
  el.textContent = 'save: ✓';
  el.classList.add('flash');
  setTimeout(() => {
    el.textContent = 'save: idle';
    el.classList.remove('flash');
  }, 1100);
}

// ============================================================
// COSTS / DERIVED
// ============================================================
function genCost(g, owned){
  return Math.ceil(g.baseCost * Math.pow(1.15, owned||0));
}
function genCps(g){
  let mul = 1;
  // per-generator upgrades
  for(const u of UPGRADES){
    if(state.upgradesOwned[u.id] && u.eff.type === 'gen' && u.eff.id === g.id){
      mul *= u.eff.mul;
    }
  }
  // global allgen
  for(const u of UPGRADES){
    if(state.upgradesOwned[u.id] && u.eff.type === 'allgen'){
      mul *= u.eff.mul;
    }
  }
  return g.cps * mul;
}
function clickPower(){
  let base = 1;
  for(const u of UPGRADES){
    if(state.upgradesOwned[u.id] && u.eff.type === 'click'){
      base *= u.eff.mul;
    }
  }
  // bonus from cps via clickPctCps
  for(const u of UPGRADES){
    if(state.upgradesOwned[u.id] && u.eff.type === 'clickPctCps'){
      base += totalCps() * u.eff.pct;
    }
  }
  return base;
}
function totalCps(){
  let s = 0;
  for(const g of GENERATORS){
    const n = state.owned[g.id] || 0;
    if(n > 0) s += n * genCps(g);
  }
  return s;
}

// ============================================================
// FORMAT
// ============================================================
function fmt(n){
  if(n < 1000) return Math.floor(n).toString();
  const units = ['', 'K', 'M', 'B', 'T', 'Qa', 'Qi', 'Sx', 'Sp'];
  let i = 0;
  while(n >= 1000 && i < units.length-1){ n /= 1000; i++; }
  return n.toFixed(n < 10 ? 2 : (n < 100 ? 1 : 0)) + units[i];
}
function fmtCps(n){
  if(n === 0) return '0';
  if(n < 0.1) return n.toFixed(2);
  if(n < 10) return n.toFixed(1);
  return fmt(n);
}

// ============================================================
// RENDER — main canvas
// ============================================================
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

function buildBuddies(){
  // Layout buddies in a grid along the bottom of the canvas
  // Each owned generator instance gets a small sprite.
  state.buddies.length = 0;
  const totalOwned = GENERATORS.reduce((s, g) => s + (state.owned[g.id]||0), 0);
  if(totalOwned === 0) return;
  // limit visible
  const cap = 36;
  const list = [];
  for(const g of GENERATORS){
    const n = Math.min(state.owned[g.id]||0, 12);
    for(let i=0;i<n;i++){
      list.push({ gen:g, idx:i });
    }
  }
  const visible = list.slice(0, cap);
  // grid: 9 cols × 4 rows (max 36)
  const cols = 9;
  const cellW = canvas.width / cols;
  const cellH = 90;
  const startY = canvas.height - 4*cellH;
  visible.forEach((b, i) => {
    const r = Math.floor(i / cols);
    const c = i % cols;
    state.buddies.push({
      gen: b.gen,
      x: c * cellW + cellW/2,
      y: startY + r * cellH + 26,
      jet: 0,
      bob: Math.random() * Math.PI * 2,
      // each buddy auto-clicks on its own offset cadence (visual-only)
      pulseT: Math.random() * 4,
    });
  });
}

let lastT = performance.now();
function frame(now){
  const dt = Math.min(0.1, (now - lastT) / 1000);
  lastT = now;

  // earn coins
  const cps = totalCps();
  if(cps > 0){
    const gain = cps * dt;
    state.coins += gain;
    state.totalEarned += gain;
  }

  // pucker decay
  if(state.pucker > 0){
    state.pucker = Math.max(0, state.pucker - dt * 4);
  }

  // particles
  for(let i=state.particles.length-1; i>=0; i--){
    const p = state.particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 220 * dt;
    p.life -= dt;
    if(p.life <= 0) state.particles.splice(i, 1);
  }

  // buddies tick — each pulses on its own
  state.flameTick = Math.floor(now / 80);
  for(const b of state.buddies){
    b.pulseT -= dt;
    b.bob += dt;
    if(b.pulseT <= 0){
      // visual auto-coin pop
      const gainOne = genCps(b.gen);
      // a quick floating coin every few seconds proportional to value
      spawnFloat(b.x, b.y - 30, '+'+fmt(gainOne), 'coin');
      b.jet = 1.0;
      b.pulseT = 1.6 + Math.random() * 2.5;
    }
    b.jet = Math.max(0, b.jet - dt * 1.6);
  }

  draw();
  updateHUD();
  requestAnimationFrame(frame);
}

function draw(){
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // soft floor
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.fillRect(0, canvas.height - 6, canvas.width, 6);

  // ---- Featured old man (big, top-center) ----
  const featuredScale = 7;
  const fx = canvas.width / 2 - 12 * featuredScale;
  const fy = 60 + (state.pucker > 0 ? -2 : 0);
  const hasProstate = (state.owned.prostate || 0) > 0;
  if(hasProstate){
    // PROSTATE POWER takes the spotlight
    drawOldMan(ctx, fx, fy, featuredScale, {
      card: PAL.jersey,
      prop: 'mic',
      cap: true, shades: true, chain: true, grill: true,
      pucker: state.pucker,
      jet: state.pucker > 0 ? 1.0 : 0.5 + 0.4*Math.sin(performance.now()/240),
      flameTick: state.flameTick,
    });
    // Spotlight glow ring
    const cx = canvas.width / 2;
    const cy = fy + 14 * featuredScale;
    const ringT = performance.now() / 320;
    ctx.fillStyle = 'rgba(245,200,73,0.18)';
    for(let i=0;i<6;i++){
      const a = ringT + i * Math.PI / 3;
      ctx.fillRect(cx + Math.cos(a)*68 - 3, cy + Math.sin(a)*48 - 3, 6, 6);
    }
  } else {
    drawOldMan(ctx, fx, fy, featuredScale, {
      card: PAL.card4,
      prop: 'none',
      dentures: state.upgradesOwned.polish1 || state.upgradesOwned.fluoride,
      glasses: state.upgradesOwned.lip || state.upgradesOwned.lavender,
      hearing: state.upgradesOwned.pace,
      pucker: state.pucker,
      jet: state.pucker > 0 ? 1.0 : 0.3 + 0.2*Math.sin(performance.now()/300),
      flameTick: state.flameTick,
    });
  }

  // halo of hearts when puckering
  if(state.pucker > 0.4){
    ctx.fillStyle = '#ff5a8a';
    const hx = canvas.width / 2;
    const hy = fy + 14 * featuredScale;
    for(let i=0;i<3;i++){
      const a = (performance.now()/200 + i*2) % (Math.PI*2);
      ctx.fillRect(hx + Math.cos(a)*40 - 2, hy + Math.sin(a)*30 - 2, 4, 4);
    }
  }

  // ---- Buddies ----
  for(const b of state.buddies){
    const bobY = Math.sin(b.bob*2) * 1.5;
    drawOldMan(ctx, b.x - 12*2, b.y + bobY - 24, 2, {
      card: b.gen.card,
      prop: b.gen.prop,
      dentures: b.gen.dentures,
      glasses: b.gen.glasses,
      hearing: b.gen.hearing,
      cap: b.gen.cap,
      shades: b.gen.shades,
      chain: b.gen.chain,
      grill: b.gen.grill,
      pucker: 0,
      jet: b.jet,
      flameTick: state.flameTick,
    });
  }

  // ---- Particles (coin / heart pixel sprites flying off) ----
  for(const p of state.particles){
    if(p.kind === 'heart'){
      ctx.fillStyle = '#ff5a8a';
      ctx.fillRect(p.x-2, p.y, 5, 1);
      ctx.fillRect(p.x-3, p.y+1, 7, 1);
      ctx.fillRect(p.x-3, p.y+2, 7, 1);
      ctx.fillRect(p.x-2, p.y+3, 5, 1);
      ctx.fillRect(p.x-1, p.y+4, 3, 1);
      ctx.fillStyle = '#ff8aa8';
      ctx.fillRect(p.x-2, p.y+1, 2, 1);
    } else {
      // coin
      ctx.fillStyle = '#c89030';
      ctx.fillRect(p.x-3, p.y-1, 6, 6);
      ctx.fillStyle = '#f5c849';
      ctx.fillRect(p.x-2, p.y, 4, 4);
      ctx.fillStyle = '#fff8d0';
      ctx.fillRect(p.x-1, p.y+1, 1, 1);
    }
  }
}

// ============================================================
// CLICK
// ============================================================
function smooch(clientX, clientY){
  const rect = canvas.getBoundingClientRect();
  const ratioX = canvas.width / rect.width;
  const ratioY = canvas.height / rect.height;
  const cx = (clientX - rect.left) * ratioX;
  const cy = (clientY - rect.top) * ratioY;

  const power = clickPower();
  state.coins += power;
  state.totalEarned += power;
  state.totalClicks += 1;
  state.pucker = 1.0;

  // burst particles at click point
  const N = 4 + Math.min(8, Math.floor(power/10));
  for(let i=0;i<N;i++){
    state.particles.push({
      x: cx + (Math.random()-0.5)*16,
      y: cy + (Math.random()-0.5)*16,
      vx: (Math.random()-0.5) * 280,
      vy: -160 - Math.random()*180,
      life: 0.9 + Math.random()*0.4,
      kind: Math.random() < 0.45 ? 'heart' : 'coin',
    });
  }

  // floating +N text in DOM (overlay)
  spawnFloatDom(clientX, clientY, '+'+fmt(power));

  saveSoon();
  renderShop(); // re-evaluate affordability
}

function spawnFloatDom(clientX, clientY, text){
  const wrap = document.getElementById('stageWrap');
  const wr = wrap.getBoundingClientRect();
  const f = document.createElement('div');
  f.className = 'float';
  f.textContent = text;
  f.style.left = (clientX - wr.left) + 'px';
  f.style.top = (clientY - wr.top) + 'px';
  f.style.setProperty('--dx', ((Math.random()-0.5)*60).toFixed(0)+'px');
  wrap.appendChild(f);
  setTimeout(() => f.remove(), 1300);
}

function spawnFloat(canvasX, canvasY, text, kind){
  // particle-only float, used for buddies
  const rect = canvas.getBoundingClientRect();
  const ratioX = rect.width / canvas.width;
  const ratioY = rect.height / canvas.height;
  const wrap = document.getElementById('stageWrap');
  const wr = wrap.getBoundingClientRect();
  const screenX = canvasX * ratioX + (rect.left - wr.left);
  const screenY = canvasY * ratioY + (rect.top - wr.top);
  const f = document.createElement('div');
  f.className = 'float';
  f.textContent = text;
  f.style.left = screenX + 'px';
  f.style.top = screenY + 'px';
  f.style.setProperty('--dx', ((Math.random()-0.5)*30).toFixed(0)+'px');
  f.style.fontSize = '9px';
  wrap.appendChild(f);
  setTimeout(() => f.remove(), 1300);
}

document.getElementById('stageWrap').addEventListener('pointerdown', (e) => {
  smooch(e.clientX, e.clientY);
});

// ============================================================
// HUD + SHOP
// ============================================================
function updateHUD(){
  document.getElementById('coinsLbl').textContent = fmt(state.coins);
  document.getElementById('cpsLbl').textContent = fmtCps(totalCps());
  document.getElementById('clickLbl').textContent = fmt(clickPower());
  document.getElementById('totalLbl').textContent = fmt(state.totalClicks) + ' smooches landed';
}

function renderShop(){
  const list = document.getElementById('shopList');
  const tab = state.shopTab;
  list.innerHTML = '';
  if(tab === 'generators'){
    for(const g of GENERATORS){
      const owned = state.owned[g.id] || 0;
      const cost = genCost(g, owned);
      const can = state.coins >= cost;
      // Lock if previous gen has 0 owned (gentle progression gate after first)
      const idx = GENERATORS.indexOf(g);
      let locked = idx > 0 && (state.owned[GENERATORS[idx-1].id]||0) < 1 && state.totalEarned < cost*0.5;
      // Legendary endgame gate: Prostate Power requires owning at least 1 Eternity Garden
      if(g.legendary && (state.owned.eternity||0) < 1) locked = true;
      const cls = ['item'];
      if(g.legendary) cls.push('legendary');
      if(locked) cls.push('locked');
      else if(can) cls.push('affordable');
      const item = document.createElement('div');
      item.className = cls.join(' ');
      const cps = genCps(g);
      const tag = g.legendary ? `<span class="item-tag">★ LEGENDARY</span>` : '';
      const lockedMsg = locked
        ? (g.legendary ? `<div class="item-locked-msg">unlock the eternity garden first</div>` : `<div class="item-locked-msg">locked</div>`)
        : '';
      item.innerHTML = `
        <div class="item-icon"><canvas width="36" height="36" data-gen="${g.id}"></canvas></div>
        <div class="item-body">
          ${tag}
          <div class="item-name">${g.name}</div>
          <div class="item-desc">${g.desc} <span style="color:var(--mint)">${fmtCps(cps)}/s</span> ea</div>
        </div>
        <div class="item-side">
          <div class="item-cost">${fmt(cost)} ¢</div>
          ${owned > 0 ? `<div class="item-owned">×${owned}</div>` : ''}
          ${lockedMsg}
        </div>
      `;
      if(!locked){
        item.addEventListener('click', () => buyGen(g));
      }
      list.appendChild(item);
      // draw mini sprite icon
      const iconCanvas = item.querySelector('canvas');
      const ictx = iconCanvas.getContext('2d');
      ictx.imageSmoothingEnabled = false;
      ictx.fillStyle = '#1f1530';
      ictx.fillRect(0, 0, 36, 36);
      drawOldMan(ictx, -6, 0, 1.4, {
        card: g.card, prop: g.prop, dentures: g.dentures, glasses: g.glasses, hearing: g.hearing,
        cap: g.cap, shades: g.shades, chain: g.chain, grill: g.grill,
        pucker: 0, jet: 0.6, flameTick: 0,
      });
    }
  } else {
    // upgrades
    const visible = UPGRADES.filter(u => !state.upgradesOwned[u.id] && u.unlock(state));
    if(visible.length === 0){
      const empty = document.createElement('div');
      empty.style.cssText = 'padding:32px 16px;text-align:center;color:var(--dim);font-family:VT323;font-size:14px';
      empty.innerHTML = 'no upgrades available yet.<br/>keep smooching.';
      list.appendChild(empty);
    }
    for(const u of visible){
      const can = state.coins >= u.cost;
      const item = document.createElement('div');
      item.className = 'item' + (can ? ' affordable' : '');
      item.innerHTML = `
        <div class="item-icon" style="font-family:'Press Start 2P';font-size:11px;color:var(--rose)">★</div>
        <div class="item-body">
          <div class="item-name">${u.name}</div>
          <div class="item-desc">${u.desc}</div>
        </div>
        <div class="item-side">
          <div class="item-cost">${fmt(u.cost)} ¢</div>
        </div>
      `;
      item.addEventListener('click', () => buyUpgrade(u));
      list.appendChild(item);
    }
    // also show owned upgrades summary at bottom
    const owned = UPGRADES.filter(u => state.upgradesOwned[u.id]);
    if(owned.length){
      const hdr = document.createElement('div');
      hdr.style.cssText = 'margin-top:12px;padding:6px 4px;border-top:1px dashed var(--line);font-family:Silkscreen;font-size:10px;color:var(--dim);letter-spacing:0.18em;text-transform:uppercase';
      hdr.textContent = 'owned';
      list.appendChild(hdr);
      for(const u of owned){
        const item = document.createElement('div');
        item.className = 'item maxed';
        item.innerHTML = `
          <div class="item-icon" style="font-family:'Press Start 2P';font-size:11px;color:var(--mint)">✓</div>
          <div class="item-body">
            <div class="item-name">${u.name}</div>
            <div class="item-desc">${u.desc}</div>
          </div>
          <div class="item-side"><div class="item-cost" style="color:var(--mint)">owned</div></div>
        `;
        list.appendChild(item);
      }
    }
  }
}

function buyGen(g){
  const owned = state.owned[g.id] || 0;
  const cost = genCost(g, owned);
  if(state.coins < cost) return;
  state.coins -= cost;
  state.owned[g.id] = owned + 1;
  buildBuddies();
  renderShop();
  updateHUD();
  saveSoon();
}

function buyUpgrade(u){
  if(state.coins < u.cost) return;
  if(state.upgradesOwned[u.id]) return;
  if(!u.unlock(state)) return;
  state.coins -= u.cost;
  state.upgradesOwned[u.id] = 1;
  renderShop();
  updateHUD();
  saveSoon();
}

// tab switching
for(const t of document.querySelectorAll('.tab')){
  t.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    t.classList.add('active');
    state.shopTab = t.dataset.tab;
    renderShop();
  });
}

// reset
document.getElementById('resetBtn').addEventListener('click', () => {
  if(!confirm('Hard reset? All progress will be lost. Your silver foxes will weep.')) return;
  state.coins = 0;
  state.totalEarned = 0;
  state.totalClicks = 0;
  state.owned = {};
  state.upgradesOwned = {};
  buildBuddies();
  renderShop();
  saveNow();
});

// auto-save periodically
setInterval(saveNow, 12000);
window.addEventListener('beforeunload', saveNow);

// re-render shop occasionally to update affordability
setInterval(renderShop, 600);

// HiDPI scale-up of canvas
function fitCanvas(){
  const wrap = document.getElementById('stageWrap');
  const w = wrap.clientWidth;
  const h = wrap.clientHeight;
  // Keep internal resolution fixed for pixel-art feel; CSS scales it.
  canvas.style.width = w + 'px';
  canvas.style.height = h + 'px';
  // Adjust internal width to keep ~1.14:1 aspect proportional to wrap
  const targetW = Math.max(480, Math.min(800, Math.floor(w * 0.6)));
  const targetH = Math.max(380, Math.min(700, Math.floor(h * 0.85)));
  canvas.width = targetW;
  canvas.height = targetH;
  ctx.imageSmoothingEnabled = false;
  buildBuddies();
}
window.addEventListener('resize', fitCanvas);

// ============================================================
// BOOT
// ============================================================
load();
buildBuddies();
renderShop();
fitCanvas();
requestAnimationFrame(frame);
</script>
