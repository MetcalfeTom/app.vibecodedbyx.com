<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>CTRL SWAP</title>
  <link rel="icon" href="https://emojicdn.elk.sh/🔀">
  <meta property="og:title" content="CTRL SWAP">
  <meta property="og:description" content="Collect coins, but your controls randomly shuffle every time you score. Good luck.">
  <meta property="og:url" content="https://sloppy.live/ctrl-swap">
  <meta property="og:image" content="https://emojicdn.elk.sh/🔀?style=google">
  <link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Source+Code+Pro:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #06060e;
      --green: #39ff14;
      --pink: #ff2d95;
      --cyan: #00e5ff;
      --yellow: #ffe14d;
      --dim: rgba(255,255,255,0.3);
      --panel: rgba(6,6,14,0.93);
    }
    body {
      background: var(--bg);
      color: #e0e0e0;
      font-family: 'Source Code Pro', monospace;
      overflow: hidden;
      height: 100dvh;
      width: 100vw;
      touch-action: none;
    }
    canvas { display: block; }

    .screen {
      position: absolute; inset: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10;
      background: var(--panel);
    }
    .screen.active { display: flex; }

    h1 {
      font-family: 'Bungee Shade', sans-serif;
      font-size: clamp(28px, 8vw, 56px);
      line-height: 1.1;
      text-align: center;
    }
    .title-green { color: var(--green); text-shadow: 0 0 15px var(--green), 0 0 40px rgba(57,255,20,0.2); }
    .title-pink { color: var(--pink); text-shadow: 0 0 15px var(--pink); }

    .subtitle {
      font-size: clamp(12px, 2.5vw, 16px);
      color: var(--cyan);
      text-shadow: 0 0 6px rgba(0,229,255,0.3);
      margin-top: 8px;
      margin-bottom: 24px;
      text-align: center;
    }
    .btn {
      font-family: 'Source Code Pro', monospace;
      font-weight: 700;
      font-size: clamp(12px, 2.8vw, 16px);
      padding: 10px 28px;
      margin: 5px;
      border: 2px solid var(--green);
      background: transparent;
      color: var(--green);
      cursor: pointer;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.15s;
    }
    .btn:hover { background: var(--green); color: var(--bg); box-shadow: 0 0 18px rgba(57,255,20,0.3); }
    .btn-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; margin-top: 14px; }

    .score-big {
      font-family: 'Bungee Shade', sans-serif;
      font-size: clamp(42px, 12vw, 80px);
      color: var(--yellow);
      text-shadow: 0 0 20px rgba(255,225,77,0.4);
      margin: 8px 0;
    }
    .stat-line {
      font-size: clamp(12px, 2.5vw, 15px);
      color: var(--dim);
      margin: 2px 0;
    }
    .stat-line span { color: var(--cyan); }

    .controls-hint {
      font-size: clamp(10px, 2vw, 13px);
      color: rgba(255,255,255,0.2);
      text-align: center;
      margin-top: 20px;
      line-height: 1.6;
    }

    .lb-list { width: 90%; max-width: 360px; margin: 14px 0; }
    .lb-row {
      display: flex;
      justify-content: space-between;
      padding: 6px 8px;
      border-bottom: 1px solid rgba(57,255,20,0.1);
      font-size: clamp(12px, 2.5vw, 15px);
    }
    .lb-rank { width: 32px; font-weight: 700; color: var(--green); }
    .lb-rank.g { color: #ffd700; }
    .lb-rank.s { color: #c0c0c0; }
    .lb-rank.b { color: #cd7f32; }
    .lb-name { flex: 1; color: var(--dim); overflow: hidden; text-overflow: ellipsis; }
    .lb-pts { font-weight: 700; color: var(--yellow); min-width: 40px; text-align: right; }

    .new-best {
      font-weight: 700;
      font-size: clamp(11px, 2.2vw, 14px);
      color: var(--pink);
      animation: blink 0.5s infinite;
    }
    @keyframes blink { 50% { opacity: 0.3; } }

    /* Mobile D-pad */
    .dpad {
      display: none;
      position: fixed;
      bottom: 20px; left: 20px;
      z-index: 20;
      width: 130px; height: 130px;
    }
    .dpad-btn {
      position: absolute;
      width: 40px; height: 40px;
      background: rgba(57,255,20,0.12);
      border: 1px solid rgba(57,255,20,0.25);
      color: var(--green);
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
      -webkit-user-select: none;
    }
    .dpad-btn:active { background: rgba(57,255,20,0.3); }
    .dpad-up { top: 0; left: 45px; }
    .dpad-down { bottom: 0; left: 45px; }
    .dpad-left { top: 45px; left: 0; }
    .dpad-right { top: 45px; right: 0; }

    @media (max-width: 768px), (pointer: coarse) {
      .dpad { display: block; }
    }

    .backlink {
      position: fixed;
      bottom: 6px; right: 8px;
      font-size: 11px;
      color: rgba(57,255,20,0.15);
      text-decoration: none;
      z-index: 100;
    }
    .backlink:hover { color: rgba(57,255,20,0.4); }
  </style>
</head>
<body>
  <canvas id="game"></canvas>

  <!-- Title -->
  <div id="title-screen" class="screen active">
    <h1 class="title-green">CTRL SWAP</h1>
    <div class="subtitle">Controls shuffle every time you score</div>
    <div class="btn-row">
      <button class="btn" onclick="startGame()">Play</button>
      <button class="btn" onclick="showLB()">Scores</button>
    </div>
    <div class="controls-hint">Arrow keys / WASD / D-pad to move<br>Collect coins before time runs out<br>Controls randomize on every catch!</div>
  </div>

  <!-- Game Over -->
  <div id="gameover-screen" class="screen">
    <h1 class="title-pink">GAME OVER</h1>
    <div class="score-big" id="go-score">0</div>
    <div class="stat-line"><span id="go-swaps">0</span> control swaps survived</div>
    <div id="go-best" class="new-best" style="display:none">NEW PERSONAL BEST!</div>
    <div class="btn-row">
      <button class="btn" onclick="startGame()">Retry</button>
      <button class="btn" onclick="showLB()">Scores</button>
      <button class="btn" onclick="showTitle()">Menu</button>
    </div>
  </div>

  <!-- Leaderboard -->
  <div id="lb-screen" class="screen">
    <h1 class="title-green" style="font-size:clamp(20px,5vw,36px)">LEADERBOARD</h1>
    <div class="lb-list" id="lb-list"></div>
    <div class="btn-row">
      <button class="btn" onclick="showTitle()">Back</button>
    </div>
  </div>

  <!-- Mobile D-pad -->
  <div class="dpad" id="dpad">
    <div class="dpad-btn dpad-up" data-dir="up">▲</div>
    <div class="dpad-btn dpad-down" data-dir="down">▼</div>
    <div class="dpad-btn dpad-left" data-dir="left">◀</div>
    <div class="dpad-btn dpad-right" data-dir="right">▶</div>
  </div>

  <a class="backlink" href="https://sloppy.live" target="_blank">sloppy.live</a>

  <script type="module">
    import supabase, { supabaseSession } from './supabase-config.js';

    // ─── Auth ───
    let userId = null, username = 'Anon', bestScore = 0;
    async function initAuth() {
      try {
        const s = await supabaseSession();
        userId = s.user.id;
        try {
          const stored = localStorage.getItem('sloppy-profile');
          if (stored) { const p = JSON.parse(stored); if (p.username) username = p.username; }
        } catch(_) {}
        if (username === 'Anon') {
          try {
            const { data } = await supabase.from('sloppygram_profiles').select('username').eq('user_id', userId).limit(1);
            if (data?.[0]?.username) username = data[0].username;
          } catch(_) {}
        }
        const { data: best } = await supabase.from('ctrl_swap_scores').select('score').eq('user_id', userId).order('score', { ascending: false }).limit(1);
        if (best?.[0]) bestScore = best[0].score;
      } catch(e) { console.error('Auth:', e); }
    }

    async function submitScore(sc, swaps) {
      if (!userId || sc <= 0) return false;
      if (sc > bestScore) {
        bestScore = sc;
        await supabase.from('ctrl_swap_scores').insert({ user_id: userId, username, score: sc, swaps });
        return true;
      }
      return false;
    }

    async function fetchLB() {
      const { data } = await supabase.from('ctrl_swap_scores').select('username, score, swaps').order('score', { ascending: false }).limit(10);
      return data || [];
    }

    // ─── Canvas ───
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    let CW = 0, CH = 0;

    function resize() {
      CW = window.innerWidth;
      CH = window.innerHeight;
      canvas.width = CW;
      canvas.height = CH;
    }
    resize();
    window.addEventListener('resize', resize);

    // ─── Game State ───
    const ROUND_TIME = 45;
    const PLAYER_SIZE = 14;
    const COIN_SIZE = 10;
    const PLAYER_SPEED = 220;
    const OBSTACLE_COUNT = 8;

    let state = 'title';
    let score = 0, swapCount = 0, timer = ROUND_TIME;
    let player = { x: 0, y: 0 };
    let coin = { x: 0, y: 0 };
    let obstacles = [];
    let lastTime = 0;
    let shakeAmount = 0;
    let swapFlash = 0;
    let coinPulse = 0;
    let scorePopups = [];
    let trailParticles = [];

    // Control mapping: input direction → actual movement direction
    // Directions: 0=up, 1=right, 2=down, 3=left
    const DIR_NAMES = ['UP', 'RIGHT', 'DOWN', 'LEFT'];
    const DIR_ARROWS = ['▲', '▶', '▼', '◀'];
    const DIR_VECTORS = [
      { x: 0, y: -1 },  // up
      { x: 1, y: 0 },   // right
      { x: 0, y: 1 },   // down
      { x: -1, y: 0 },  // left
    ];
    let controlMap = [0, 1, 2, 3]; // input[i] → output direction

    // Raw input state
    let inputState = [false, false, false, false]; // up, right, down, left

    // Swap indicator
    let swapIndicatorTimer = 0;
    let prevControlMap = [0, 1, 2, 3];

    function shuffleControls() {
      prevControlMap = [...controlMap];
      // Fisher-Yates shuffle
      const arr = [0, 1, 2, 3];
      for (let i = 3; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      // Ensure at least one control actually changed
      let same = arr.every((v, i) => v === controlMap[i]);
      if (same) {
        // Force a swap of two random indices
        const a = Math.floor(Math.random() * 4);
        let b = (a + 1 + Math.floor(Math.random() * 3)) % 4;
        [arr[a], arr[b]] = [arr[b], arr[a]];
      }
      controlMap = arr;
      swapCount++;
      swapFlash = 1;
      swapIndicatorTimer = 2.5; // show mapping for 2.5s
      shakeAmount = 6;
    }

    function resetControls() {
      controlMap = [0, 1, 2, 3];
      swapIndicatorTimer = 0;
    }

    // ─── Level generation ───
    function generateObstacles() {
      obstacles = [];
      const margin = 60;
      const minSize = 30, maxSize = 80;
      for (let i = 0; i < OBSTACLE_COUNT; i++) {
        let tries = 0, ox, oy, ow, oh;
        do {
          ow = minSize + Math.random() * (maxSize - minSize);
          oh = minSize + Math.random() * (maxSize - minSize);
          ox = margin + Math.random() * (CW - margin * 2 - ow);
          oy = margin + Math.random() * (CH - margin * 2 - oh);
          tries++;
        } while (tries < 20 && isNearCenter(ox, oy, ow, oh));
        obstacles.push({ x: ox, y: oy, w: ow, h: oh });
      }
    }

    function isNearCenter(x, y, w, h) {
      const cx = CW / 2, cy = CH / 2;
      return Math.abs((x + w / 2) - cx) < 80 && Math.abs((y + h / 2) - cy) < 80;
    }

    function placeCoin() {
      const margin = 30;
      let tries = 0;
      do {
        coin.x = margin + Math.random() * (CW - margin * 2);
        coin.y = margin + Math.random() * (CH - margin * 2);
        tries++;
      } while (tries < 50 && (distToPlayer(coin.x, coin.y) < 100 || isInObstacle(coin.x, coin.y, COIN_SIZE)));
      coinPulse = 0;
    }

    function distToPlayer(x, y) {
      const dx = x - player.x, dy = y - player.y;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function isInObstacle(x, y, r) {
      for (const o of obstacles) {
        if (x + r > o.x && x - r < o.x + o.w && y + r > o.y && y - r < o.y + o.h) return true;
      }
      return false;
    }

    // ─── Input ───
    window.addEventListener('keydown', e => {
      if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') inputState[0] = true;
      if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') inputState[1] = true;
      if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') inputState[2] = true;
      if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') inputState[3] = true;
      if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
    });
    window.addEventListener('keyup', e => {
      if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') inputState[0] = false;
      if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') inputState[1] = false;
      if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') inputState[2] = false;
      if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') inputState[3] = false;
    });

    // Mobile D-pad
    const dpadBtns = document.querySelectorAll('.dpad-btn');
    const dirMap = { up: 0, right: 1, down: 2, left: 3 };
    dpadBtns.forEach(btn => {
      const dir = dirMap[btn.dataset.dir];
      btn.addEventListener('touchstart', e => { e.preventDefault(); inputState[dir] = true; }, { passive: false });
      btn.addEventListener('touchend', e => { e.preventDefault(); inputState[dir] = false; }, { passive: false });
      btn.addEventListener('touchcancel', () => inputState[dir] = false);
    });

    // ─── Screens ───
    function hideAll() {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    }

    window.showTitle = function() {
      hideAll();
      document.getElementById('title-screen').classList.add('active');
      state = 'title';
    };

    window.startGame = function() {
      hideAll();
      state = 'playing';
      score = 0;
      swapCount = 0;
      timer = ROUND_TIME;
      player.x = CW / 2;
      player.y = CH / 2;
      inputState = [false, false, false, false];
      resetControls();
      scorePopups = [];
      trailParticles = [];
      generateObstacles();
      placeCoin();
    };

    window.showLB = async function() {
      hideAll();
      document.getElementById('lb-screen').classList.add('active');
      state = 'leaderboard';
      const data = await fetchLB();
      const el = document.getElementById('lb-list');
      if (!data.length) {
        el.innerHTML = '<div style="text-align:center;color:var(--dim);padding:20px;font-size:13px">No scores yet!</div>';
        return;
      }
      el.innerHTML = data.map((r, i) => {
        const rc = i === 0 ? 'g' : i === 1 ? 's' : i === 2 ? 'b' : '';
        const medal = i < 3 ? ['🥇','🥈','🥉'][i] : `${i+1}`;
        return `<div class="lb-row"><span class="lb-rank ${rc}">${medal}</span><span class="lb-name">${esc(r.username || 'Anon')}</span><span class="lb-pts">${r.score}</span></div>`;
      }).join('');
    };

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    async function gameOver() {
      state = 'gameover';
      document.getElementById('go-score').textContent = score;
      document.getElementById('go-swaps').textContent = swapCount;
      const isNew = await submitScore(score, swapCount);
      document.getElementById('go-best').style.display = isNew ? 'block' : 'none';
      hideAll();
      document.getElementById('gameover-screen').classList.add('active');
    }

    // ─── Update ───
    function update(dt) {
      if (state !== 'playing') return;

      timer -= dt;
      if (timer <= 0) { timer = 0; gameOver(); return; }

      // Decay effects
      if (shakeAmount > 0) shakeAmount *= Math.pow(0.02, dt);
      if (swapFlash > 0) swapFlash -= dt * 2.5;
      if (swapIndicatorTimer > 0) swapIndicatorTimer -= dt;
      coinPulse += dt * 3;

      // Apply control mapping to get actual movement
      let moveX = 0, moveY = 0;
      for (let i = 0; i < 4; i++) {
        if (inputState[i]) {
          const mapped = controlMap[i];
          moveX += DIR_VECTORS[mapped].x;
          moveY += DIR_VECTORS[mapped].y;
        }
      }

      // Normalize diagonal movement
      const mag = Math.sqrt(moveX * moveX + moveY * moveY);
      if (mag > 0) {
        moveX /= mag;
        moveY /= mag;
      }

      // Move player
      const speed = PLAYER_SPEED;
      let nx = player.x + moveX * speed * dt;
      let ny = player.y + moveY * speed * dt;

      // Wall collision
      nx = Math.max(PLAYER_SIZE, Math.min(CW - PLAYER_SIZE, nx));
      ny = Math.max(PLAYER_SIZE, Math.min(CH - PLAYER_SIZE, ny));

      // Obstacle collision (simple AABB push-out)
      for (const o of obstacles) {
        const closestX = Math.max(o.x, Math.min(nx, o.x + o.w));
        const closestY = Math.max(o.y, Math.min(ny, o.y + o.h));
        const dx = nx - closestX, dy = ny - closestY;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < PLAYER_SIZE) {
          if (dist > 0) {
            nx += (dx / dist) * (PLAYER_SIZE - dist);
            ny += (dy / dist) * (PLAYER_SIZE - dist);
          } else {
            nx = player.x;
            ny = player.y;
          }
        }
      }

      player.x = nx;
      player.y = ny;

      // Trail
      if (mag > 0) {
        trailParticles.push({
          x: player.x + (Math.random() - 0.5) * 6,
          y: player.y + (Math.random() - 0.5) * 6,
          life: 0.5,
        });
      }

      // Coin collision
      const cdx = player.x - coin.x, cdy = player.y - coin.y;
      if (Math.sqrt(cdx * cdx + cdy * cdy) < PLAYER_SIZE + COIN_SIZE) {
        score++;
        scorePopups.push({ x: coin.x, y: coin.y, text: `+1`, life: 1 });
        shuffleControls();
        placeCoin();
      }

      // Particles
      for (let i = trailParticles.length - 1; i >= 0; i--) {
        trailParticles[i].life -= dt * 2;
        if (trailParticles[i].life <= 0) trailParticles.splice(i, 1);
      }
      for (let i = scorePopups.length - 1; i >= 0; i--) {
        scorePopups[i].life -= dt * 1.5;
        scorePopups[i].y -= 30 * dt;
        if (scorePopups[i].life <= 0) scorePopups.splice(i, 1);
      }
    }

    // ─── Render ───
    function render() {
      ctx.save();

      // Shake
      if (shakeAmount > 0.5) {
        ctx.translate((Math.random() - 0.5) * shakeAmount * 2, (Math.random() - 0.5) * shakeAmount * 2);
      }

      // Background
      ctx.fillStyle = '#06060e';
      ctx.fillRect(-10, -10, CW + 20, CH + 20);

      // Grid
      ctx.strokeStyle = 'rgba(57,255,20,0.03)';
      ctx.lineWidth = 1;
      for (let x = 0; x < CW; x += 40) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, CH); ctx.stroke(); }
      for (let y = 0; y < CH; y += 40) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(CW, y); ctx.stroke(); }

      // Swap flash overlay
      if (swapFlash > 0) {
        ctx.fillStyle = `rgba(255,45,149,${swapFlash * 0.15})`;
        ctx.fillRect(0, 0, CW, CH);
      }

      // Obstacles
      for (const o of obstacles) {
        ctx.fillStyle = 'rgba(30,20,50,0.9)';
        ctx.fillRect(o.x, o.y, o.w, o.h);
        ctx.strokeStyle = 'rgba(57,255,20,0.12)';
        ctx.lineWidth = 1;
        ctx.strokeRect(o.x, o.y, o.w, o.h);
        // Hatching
        ctx.strokeStyle = 'rgba(57,255,20,0.04)';
        for (let d = -o.h; d < o.w; d += 8) {
          ctx.beginPath();
          ctx.moveTo(o.x + Math.max(0, d), o.y + Math.max(0, -d));
          ctx.lineTo(o.x + Math.min(o.w, d + o.h), o.y + Math.min(o.h, o.h - d));
          ctx.stroke();
        }
      }

      // Trail particles
      for (const p of trailParticles) {
        ctx.fillStyle = `rgba(57,255,20,${p.life * 0.3})`;
        ctx.fillRect(Math.floor(p.x) - 1, Math.floor(p.y) - 1, 2, 2);
      }

      // Coin
      if (state === 'playing') {
        const cp = 0.8 + Math.sin(coinPulse) * 0.2;
        const cr = COIN_SIZE * cp;
        // Glow
        ctx.shadowColor = '#ffe14d';
        ctx.shadowBlur = 12 + Math.sin(coinPulse) * 4;
        ctx.fillStyle = '#ffe14d';
        ctx.beginPath();
        ctx.arc(coin.x, coin.y, cr, 0, Math.PI * 2);
        ctx.fill();
        // Inner
        ctx.shadowBlur = 0;
        ctx.fillStyle = '#ffc800';
        ctx.beginPath();
        ctx.arc(coin.x, coin.y, cr * 0.6, 0, Math.PI * 2);
        ctx.fill();
      }

      // Player
      if (state === 'playing') {
        // Glow
        ctx.shadowColor = '#39ff14';
        ctx.shadowBlur = 10;
        ctx.fillStyle = '#39ff14';
        ctx.beginPath();
        ctx.arc(player.x, player.y, PLAYER_SIZE, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        // Inner
        ctx.fillStyle = '#1a6b08';
        ctx.beginPath();
        ctx.arc(player.x, player.y, PLAYER_SIZE * 0.55, 0, Math.PI * 2);
        ctx.fill();
        // Eyes (indicate current "up" direction)
        const upDir = controlMap[0]; // what pressing "up" actually does
        const eyeAngle = [Math.PI * 1.5, 0, Math.PI * 0.5, Math.PI][upDir];
        const ed = PLAYER_SIZE * 0.35;
        ctx.fillStyle = '#39ff14';
        ctx.beginPath();
        ctx.arc(
          player.x + Math.cos(eyeAngle - 0.3) * ed,
          player.y + Math.sin(eyeAngle - 0.3) * ed,
          2, 0, Math.PI * 2
        );
        ctx.arc(
          player.x + Math.cos(eyeAngle + 0.3) * ed,
          player.y + Math.sin(eyeAngle + 0.3) * ed,
          2, 0, Math.PI * 2
        );
        ctx.fill();
      }

      // Score popups
      for (const p of scorePopups) {
        ctx.font = '700 16px "Source Code Pro"';
        ctx.textAlign = 'center';
        ctx.fillStyle = `rgba(255,225,77,${p.life})`;
        ctx.fillText(p.text, p.x, p.y);
      }

      // HUD
      if (state === 'playing') drawHUD();

      ctx.restore();
    }

    function drawHUD() {
      // Timer
      const timeColor = timer <= 10 ? '#ff2d95' : '#e0e0e0';
      ctx.font = '700 18px "Source Code Pro"';
      ctx.textAlign = 'center';
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(CW / 2 - 40, 10, 80, 28);
      ctx.fillStyle = timeColor;
      ctx.fillText(`${Math.ceil(timer)}s`, CW / 2, 31);

      // Score
      ctx.textAlign = 'left';
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(10, 10, 100, 28);
      ctx.fillStyle = '#ffe14d';
      ctx.fillText(`${score}`, 16, 31);

      // Swap count
      ctx.textAlign = 'right';
      ctx.fillStyle = 'rgba(0,0,0,0.5)';
      ctx.fillRect(CW - 120, 10, 110, 28);
      ctx.fillStyle = '#ff2d95';
      ctx.font = '400 13px "Source Code Pro"';
      ctx.fillText(`swaps: ${swapCount}`, CW - 16, 29);

      // Control mapping indicator
      if (swapIndicatorTimer > 0) {
        const alpha = Math.min(1, swapIndicatorTimer);
        const bx = CW / 2 - 90, by = 48;
        ctx.fillStyle = `rgba(6,6,14,${alpha * 0.85})`;
        ctx.fillRect(bx, by, 180, 50);
        ctx.strokeStyle = `rgba(255,45,149,${alpha * 0.5})`;
        ctx.lineWidth = 1;
        ctx.strokeRect(bx, by, 180, 50);

        ctx.font = '700 9px "Source Code Pro"';
        ctx.textAlign = 'center';
        ctx.fillStyle = `rgba(255,45,149,${alpha})`;
        ctx.fillText('CONTROLS SWAPPED!', CW / 2, by + 14);

        ctx.font = '400 10px "Source Code Pro"';
        // Show mapping: input → output
        for (let i = 0; i < 4; i++) {
          const inputName = DIR_ARROWS[i];
          const outputName = DIR_ARROWS[controlMap[i]];
          const changed = controlMap[i] !== prevControlMap[i];
          ctx.fillStyle = changed ? `rgba(0,229,255,${alpha})` : `rgba(255,255,255,${alpha * 0.3})`;
          const mx = bx + 20 + i * 42;
          ctx.fillText(`${inputName}→${outputName}`, mx, by + 36);
        }
      }
    }

    // ─── Loop ───
    function loop(ts) {
      const dt = lastTime ? Math.min((ts - lastTime) / 1000, 0.05) : 0.016;
      lastTime = ts;
      update(dt);
      render();
      requestAnimationFrame(loop);
    }

    initAuth();
    requestAnimationFrame(loop);
  </script>
</body>
</html>
