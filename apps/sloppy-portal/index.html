<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Sloppy Portal</title>
<meta name="description" content="A minimalist chat with persistent local threads. Talk freely; everything stays in your browser.">
<meta property="og:title" content="Sloppy Portal">
<meta property="og:description" content="A minimalist chat with persistent local threads. Talk freely; everything stays in your browser.">
<meta property="og:url" content="https://sloppy.live/sloppy-portal">
<meta property="og:image" content="https://image.pollinations.ai/prompt/minimalist%20paper%20chat%20portal%20warm%20cream%20ink%20IBM%20plex%20typography%20editorial%20serif%20zine%20cover?width=1200&height=630&nologo=true">
<meta property="og:type" content="website">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%95%B3%EF%B8%8F">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400;500&family=Newsreader:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

<style>
:root {
  --paper:#f4ecdf;
  --paper-2:#ebe1cf;
  --ink:#171517;
  --ink-2:#3a3438;
  --muted:#6b605a;
  --rule:rgba(23,21,23,0.12);
  --rule-strong:rgba(23,21,23,0.32);
  --user:#e76341;
  --user-soft:rgba(231,99,65,0.10);
  --bot:#f9f3e6;
  --accent:#3a6f56;
  --warn:#a83b1b;
  --shadow:0 1px 0 rgba(23,21,23,0.04), 0 12px 32px rgba(23,21,23,0.07);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:'IBM Plex Sans',sans-serif;font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased}
html{font-size:100%}
body{
  min-height:100vh;
  background:
    radial-gradient(1200px 700px at 12% -10%, rgba(231,99,65,0.06), transparent 60%),
    radial-gradient(900px 500px at 110% 110%, rgba(58,111,86,0.07), transparent 60%),
    repeating-linear-gradient(11deg, rgba(23,21,23,0.03) 0 1px, transparent 1px 4px),
    repeating-linear-gradient(101deg, rgba(23,21,23,0.022) 0 1px, transparent 1px 7px),
    var(--paper);
  background-blend-mode:multiply,multiply,multiply,multiply,normal;
}

.skip{position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden}
.skip:focus{left:1rem;top:1rem;width:auto;height:auto;background:var(--ink);color:var(--paper);padding:0.5rem 0.75rem;border-radius:0.25rem;z-index:1000}

#matrix{
  position:fixed; inset:0;
  z-index:0;
  pointer-events:none;
  opacity:0;
  transition:opacity 0.55s ease;
  mix-blend-mode:multiply;
}
body.matrix-on #matrix{opacity:0.78}
body.matrix-on{ background-color:#f7f0e1; }

.app{
  position:relative;
  z-index:1;
  display:grid;
  grid-template-columns:18rem 1fr;
  height:100vh;
  height:100dvh;
}

aside.sidebar{
  border-right:1px solid var(--rule);
  background:rgba(244,236,223,0.7);
  backdrop-filter:blur(6px);
  display:flex; flex-direction:column;
  min-width:0;
}
.brand{
  padding:1.4rem 1.4rem 0.8rem;
  display:flex; align-items:baseline; gap:0.6rem;
  border-bottom:1px solid var(--rule);
  padding-bottom:1.1rem;
}
.brand .mark{
  font-family:'Newsreader',serif; font-style:italic; font-weight:600;
  font-size:1.85rem; letter-spacing:-0.01em;
  color:var(--ink);
}
.brand .mark em{font-style:italic;color:var(--user);font-weight:400}
.brand .sub{
  font-family:'IBM Plex Mono',monospace;
  font-size:0.6rem; letter-spacing:0.18em; text-transform:uppercase;
  color:var(--muted);
  margin-left:auto;
}

.threads-head{
  display:flex; align-items:center; gap:0.5rem;
  padding:1rem 1.2rem 0.5rem;
}
.threads-head h2{
  margin:0;
  font-family:'IBM Plex Mono',monospace;
  font-weight:400; font-size:0.62rem; letter-spacing:0.24em; text-transform:uppercase;
  color:var(--muted);
}
.btn{
  font-family:'IBM Plex Mono',monospace;
  font-size:0.7rem; letter-spacing:0.06em; text-transform:uppercase;
  background:transparent;
  border:1px solid var(--rule-strong);
  color:var(--ink);
  padding:0.45rem 0.7rem;
  border-radius:0.25rem;
  cursor:pointer;
  min-height:2.75rem;
  display:inline-flex; align-items:center; justify-content:center;
  transition:background 0.15s ease, color 0.15s ease, border-color 0.15s ease, transform 0.08s ease;
}
.btn:hover{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.btn:active{transform:translateY(1px)}
.btn:focus-visible{outline:3px solid var(--user);outline-offset:2px}
.btn.small{padding:0.32rem 0.55rem;font-size:0.62rem;min-height:2rem}
.btn.primary{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.btn.primary:hover{background:var(--user);border-color:var(--user)}
.btn.danger{color:var(--warn)}
.btn.danger:hover{background:var(--warn);color:var(--paper);border-color:var(--warn)}
.btn[aria-pressed="true"]{background:var(--accent);color:var(--paper);border-color:var(--accent)}

.threads-head .btn{margin-left:auto}

.threads{
  list-style:none; margin:0; padding:0.4rem 0.75rem 1rem;
  flex:1 1 auto; overflow-y:auto;
}
.threads li{margin:0.2rem 0}
.thread-item{
  display:block; width:100%; text-align:left;
  background:transparent; border:1px solid transparent;
  padding:0.7rem 0.8rem;
  border-radius:0.35rem;
  cursor:pointer;
  font-family:inherit; color:var(--ink);
  transition:background 0.15s ease, border-color 0.15s ease;
  min-height:2.75rem;
}
.thread-item:hover{background:rgba(23,21,23,0.04)}
.thread-item.active{
  background:var(--paper-2);
  border-color:var(--rule-strong);
}
.thread-item .t{
  font-size:0.92rem; font-weight:500; color:var(--ink);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
}
.thread-item .meta{
  font-family:'IBM Plex Mono',monospace;
  font-size:0.63rem; letter-spacing:0.04em;
  color:var(--muted);
  margin-top:0.2rem;
}
.thread-item:focus-visible{outline:3px solid var(--user);outline-offset:2px}

.sidebar-foot{
  padding:0.8rem 1.1rem 1rem;
  border-top:1px solid var(--rule);
  display:flex; flex-wrap:wrap; gap:0.4rem;
}

main.chat{
  display:flex; flex-direction:column;
  min-width:0; min-height:0;
  position:relative;
}
.chat-head{
  border-bottom:1px solid var(--rule);
  padding:1.1rem 1.6rem;
  display:flex; align-items:baseline; gap:1rem;
}
.chat-head h1{
  margin:0;
  font-family:'Newsreader',serif;
  font-weight:400;
  font-size:1.45rem;
  letter-spacing:-0.005em;
}
.chat-head .stamp{
  margin-left:auto;
  font-family:'IBM Plex Mono',monospace;
  font-size:0.65rem; letter-spacing:0.16em; text-transform:uppercase;
  color:var(--muted);
}
.chat-head .stamp .dot{display:inline-block;width:0.55rem;height:0.55rem;border-radius:50%;background:var(--accent);margin-right:0.4rem;vertical-align:0.05em}

.feed{
  flex:1 1 auto;
  overflow-y:auto;
  padding:1.5rem 1.6rem 1rem;
  scroll-behavior:smooth;
}
.empty{
  max-width:38rem; margin:3rem auto; padding:0 1rem;
  text-align:center;
  color:var(--muted);
}
.empty h3{
  font-family:'Newsreader',serif; font-style:italic; font-weight:400;
  font-size:1.6rem; color:var(--ink); margin:0 0 0.6rem;
}
.empty p{margin:0.4rem 0;font-size:0.95rem}
.empty .kbd{
  font-family:'IBM Plex Mono',monospace;
  font-size:0.72rem;
  background:var(--paper-2); color:var(--ink);
  padding:0.15rem 0.4rem;
  border:1px solid var(--rule-strong);
  border-radius:0.2rem;
}

.msg{
  display:flex; gap:0.7rem; margin:1.2rem auto;
  max-width:46rem;
  align-items:flex-end;
}
.msg.user{flex-direction:row-reverse}
.msg .who{
  font-family:'IBM Plex Mono',monospace;
  font-size:0.55rem; letter-spacing:0.2em; text-transform:uppercase;
  color:var(--muted);
  margin-bottom:0.3rem;
}
.bubble{
  padding:0.85rem 1.05rem;
  border-radius:0.7rem;
  max-width:78%;
  font-size:0.97rem;
  line-height:1.55;
  white-space:pre-wrap;
  word-wrap:break-word;
}
.msg.user .bubble{
  background:var(--user);
  color:#fff;
  border-bottom-right-radius:0.2rem;
}
.msg.bot .bubble{
  background:var(--bot);
  color:var(--ink);
  border:1px solid var(--rule);
  border-bottom-left-radius:0.2rem;
}
.msg .stamp{
  font-family:'IBM Plex Mono',monospace;
  font-size:0.55rem; letter-spacing:0.12em;
  color:var(--muted);
  margin-top:0.3rem;
}
.msg.user .stamp{text-align:right}
.msg-col{display:flex; flex-direction:column; min-width:0; max-width:78%}
.msg.user .msg-col{align-items:flex-end}

.typing .bubble{
  display:inline-flex; gap:0.3rem; align-items:center;
  background:var(--bot); border:1px solid var(--rule);
  padding:0.7rem 0.95rem;
}
.typing .dot{
  width:0.5rem; height:0.5rem; border-radius:50%;
  background:var(--ink-2);
  opacity:0.4;
  animation:typing 1.2s ease-in-out infinite;
}
.typing .dot:nth-child(2){animation-delay:0.18s}
.typing .dot:nth-child(3){animation-delay:0.36s}
@keyframes typing{
  0%, 60%, 100%{transform:translateY(0); opacity:0.4}
  30%{transform:translateY(-3px); opacity:0.95}
}

.composer{
  border-top:1px solid var(--rule);
  padding:1rem 1.6rem 1.2rem;
  background:rgba(244,236,223,0.6);
  backdrop-filter:blur(4px);
}
.composer form{
  max-width:46rem; margin:0 auto;
  display:flex; gap:0.6rem; align-items:flex-end;
}
.composer textarea{
  flex:1 1 auto;
  resize:none;
  min-height:2.75rem; max-height:14rem;
  padding:0.7rem 0.95rem;
  font-family:inherit; font-size:1rem; line-height:1.5;
  color:var(--ink);
  background:#fbf6e9;
  border:1px solid var(--rule-strong);
  border-radius:0.5rem;
  outline:none;
  transition:border-color 0.15s ease, box-shadow 0.15s ease;
}
.composer textarea:focus-visible{
  border-color:var(--user);
  box-shadow:0 0 0 3px rgba(231,99,65,0.18);
}
.composer .send{
  background:var(--ink); color:var(--paper);
  border:1px solid var(--ink);
  padding:0 1rem;
  border-radius:0.5rem;
  font-family:'IBM Plex Mono',monospace;
  font-size:0.74rem; letter-spacing:0.1em; text-transform:uppercase;
  height:2.75rem;
  cursor:pointer;
  transition:background 0.15s ease, transform 0.08s ease;
}
.composer .send:hover{background:var(--user); border-color:var(--user)}
.composer .send:active{transform:translateY(1px)}
.composer .send:disabled{opacity:0.4; cursor:not-allowed}
.composer .send:focus-visible{outline:3px solid var(--user); outline-offset:2px}

.tools{
  max-width:46rem; margin:0.5rem auto 0;
  display:flex; gap:0.4rem; flex-wrap:wrap;
  font-family:'IBM Plex Mono',monospace;
  font-size:0.6rem; letter-spacing:0.14em; text-transform:uppercase;
  color:var(--muted);
}
.tools .hint{margin-left:auto; color:var(--muted)}

@media (max-width:780px){
  .app{grid-template-columns:1fr}
  aside.sidebar{
    position:fixed; inset:0; z-index:50;
    transform:translateX(-100%); transition:transform 0.25s ease;
    background:var(--paper);
  }
  aside.sidebar.open{transform:translateX(0)}
  .menu-btn{display:inline-flex !important}
  .sidebar-scrim{
    position:fixed; inset:0; background:rgba(23,21,23,0.4);
    z-index:40; display:none;
  }
  .sidebar-scrim.open{display:block}
}
.menu-btn{display:none}

@media (prefers-reduced-motion: reduce){
  .typing .dot{animation:none; opacity:0.7}
  .feed{scroll-behavior:auto}
  body.matrix-on #matrix{transition:none}
}
</style>
</head>
<body>
<a href="#composer-input" class="skip">Skip to message input</a>

<canvas id="matrix" aria-hidden="true"></canvas>
<div class="sidebar-scrim" id="scrim"></div>

<div class="app">
  <aside class="sidebar" id="sidebar" aria-label="Conversations">
    <div class="brand">
      <div class="mark">sloppy<em>·</em>portal</div>
      <div class="sub">v1 · local</div>
    </div>

    <div class="threads-head">
      <h2>Threads</h2>
      <button type="button" class="btn small primary" id="newThread" aria-label="Start a new thread">+ New</button>
    </div>

    <ul class="threads" id="threadList" role="list"></ul>

    <div class="sidebar-foot">
      <button type="button" class="btn small" id="rainToggle" aria-pressed="false" aria-label="Toggle matrix rain effect">▒ Rain</button>
      <button type="button" class="btn small" id="exportBtn" aria-label="Export current thread as text">↓ Export</button>
      <button type="button" class="btn small danger" id="clearAll" aria-label="Clear all messages and threads">⌫ Wipe</button>
    </div>
  </aside>

  <main class="chat">
    <header class="chat-head">
      <button type="button" class="btn small menu-btn" id="menuBtn" aria-label="Open thread list" aria-controls="sidebar" aria-expanded="false">☰</button>
      <h1 id="threadTitle">New thread</h1>
      <span class="stamp" role="status" aria-live="polite" id="status"><span class="dot"></span> ready</span>
    </header>

    <section class="feed" id="feed" aria-live="polite" aria-label="Messages"></section>

    <div class="composer">
      <form id="form">
        <label class="skip" for="composer-input">Message</label>
        <textarea id="composer-input" rows="1" placeholder="Type. Enter to send · Shift+Enter for newline." autocomplete="off" autofocus></textarea>
        <button type="submit" class="send" id="sendBtn">Send</button>
      </form>
      <div class="tools" aria-hidden="true">
        <span>local-only · stored in your browser</span>
        <span class="hint">enter sends</span>
      </div>
    </div>
  </main>
</div>

<script>
'use strict';

const STORE_THREADS = 'sloppy-portal-threads-v1';
const STORE_MSGS_PREFIX = 'sloppy-portal-msgs-';
const STORE_RAIN = 'sloppy-portal-rain-v1';

const $ = (s, r=document) => r.querySelector(s);
const $$ = (s, r=document) => Array.from(r.querySelectorAll(s));

// ---------- state ----------
let threads = [];
let activeId = null;
let messages = [];
let isThinking = false;

// ---------- storage ----------
function loadThreads(){
  try { threads = JSON.parse(localStorage.getItem(STORE_THREADS) || '[]'); }
  catch { threads = []; }
  if (!Array.isArray(threads)) threads = [];
}
function saveThreads(){
  try { localStorage.setItem(STORE_THREADS, JSON.stringify(threads)); } catch{}
}
function loadMsgs(id){
  try { const v = JSON.parse(localStorage.getItem(STORE_MSGS_PREFIX+id) || '[]'); return Array.isArray(v) ? v : []; }
  catch { return []; }
}
function saveMsgs(id, list){
  try { localStorage.setItem(STORE_MSGS_PREFIX+id, JSON.stringify(list)); } catch{}
}

// ---------- thread ops ----------
function uid(){ return Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4); }

function createThread(title){
  const t = { id: uid(), title: title || 'New thread', created: Date.now(), updated: Date.now() };
  threads.unshift(t);
  saveThreads();
  saveMsgs(t.id, []);
  return t;
}

function deleteThread(id){
  threads = threads.filter(t => t.id !== id);
  saveThreads();
  try { localStorage.removeItem(STORE_MSGS_PREFIX+id); } catch{}
  if (activeId === id){
    if (threads.length) selectThread(threads[0].id);
    else { activeId = null; messages = []; renderFeed(); renderHead(); }
  }
  renderThreadList();
}

function selectThread(id){
  activeId = id;
  messages = loadMsgs(id);
  renderThreadList();
  renderHead();
  renderFeed(true);
  $('#composer-input').focus();
}

function touchThread(id, titleSeed){
  const t = threads.find(x => x.id === id);
  if (!t) return;
  t.updated = Date.now();
  if (t.title === 'New thread' && titleSeed){
    t.title = titleSeed.trim().slice(0, 48) + (titleSeed.length > 48 ? '…' : '');
  }
  // move to top
  threads = [t, ...threads.filter(x => x.id !== id)];
  saveThreads();
  renderThreadList();
  renderHead();
}

// ---------- render ----------
function renderThreadList(){
  const ul = $('#threadList');
  ul.innerHTML = '';
  if (!threads.length){
    const li = document.createElement('li');
    li.innerHTML = '<div class="thread-item" style="color:var(--muted);font-style:italic;cursor:default;">no threads yet</div>';
    ul.appendChild(li);
    return;
  }
  for (const t of threads){
    const li = document.createElement('li');
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'thread-item' + (t.id === activeId ? ' active' : '');
    btn.dataset.id = t.id;
    btn.setAttribute('aria-current', t.id === activeId ? 'true' : 'false');
    const stamp = relTime(t.updated);
    btn.innerHTML = `<div class="t"></div><div class="meta">${escapeHtml(stamp)} · <button type="button" class="del" aria-label="Delete thread" style="background:none;border:none;color:var(--muted);cursor:pointer;font:inherit;font-size:0.62rem;letter-spacing:0.04em;padding:0;">delete</button></div>`;
    btn.querySelector('.t').textContent = t.title;
    btn.addEventListener('click', (e) => {
      if (e.target.classList.contains('del')) return;
      selectThread(t.id);
      closeSidebar();
    });
    btn.querySelector('.del').addEventListener('click', (e) => {
      e.stopPropagation();
      if (confirm('Delete this thread?')) deleteThread(t.id);
    });
    li.appendChild(btn);
    ul.appendChild(li);
  }
}

function renderHead(){
  const t = threads.find(x => x.id === activeId);
  $('#threadTitle').textContent = t ? t.title : 'New thread';
}

function renderFeed(jump){
  const feed = $('#feed');
  feed.innerHTML = '';
  if (!messages.length){
    const e = document.createElement('div');
    e.className = 'empty';
    e.innerHTML = `
      <h3>a quiet portal.</h3>
      <p>Type below to start. Threads stay in your browser only —
      no servers, no sign-in, no trail.</p>
      <p style="margin-top:1rem"><span class="kbd">Enter</span> sends · <span class="kbd">Shift</span>+<span class="kbd">Enter</span> for newline · <span class="kbd">Ctrl</span>/<span class="kbd">⌘</span>+<span class="kbd">N</span> new thread</p>
    `;
    feed.appendChild(e);
    return;
  }
  for (const m of messages){
    feed.appendChild(buildMsgEl(m));
  }
  if (jump) requestAnimationFrame(() => { feed.scrollTop = feed.scrollHeight; });
  else feed.scrollTop = feed.scrollHeight;
}

function buildMsgEl(m){
  const wrap = document.createElement('div');
  wrap.className = 'msg ' + (m.role === 'user' ? 'user' : 'bot');
  const col = document.createElement('div');
  col.className = 'msg-col';
  const who = document.createElement('div');
  who.className = 'who';
  who.textContent = m.role === 'user' ? 'you' : 'portal';
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = m.text;
  const stamp = document.createElement('div');
  stamp.className = 'stamp';
  stamp.textContent = relTime(m.t);
  col.appendChild(who);
  col.appendChild(bubble);
  col.appendChild(stamp);
  wrap.appendChild(col);
  return wrap;
}

function showTyping(){
  const feed = $('#feed');
  const wrap = document.createElement('div');
  wrap.className = 'msg bot typing';
  wrap.id = 'typing';
  wrap.innerHTML = '<div class="msg-col"><div class="who">portal</div><div class="bubble"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div></div>';
  feed.appendChild(wrap);
  feed.scrollTop = feed.scrollHeight;
}
function hideTyping(){ const t = $('#typing'); if (t) t.remove(); }

function setStatus(label, kind){
  const s = $('#status');
  const colors = { ready:'var(--accent)', thinking:'var(--user)', warn:'var(--warn)' };
  s.innerHTML = `<span class="dot" style="background:${colors[kind]||colors.ready}"></span> ${escapeHtml(label)}`;
}

// ---------- send / reply ----------
async function sendMessage(text){
  if (!text.trim() || isThinking) return;
  if (!activeId){
    const t = createThread();
    activeId = t.id;
    messages = [];
  }
  const userMsg = { role:'user', text:text.trim(), t:Date.now() };
  messages.push(userMsg);
  saveMsgs(activeId, messages);

  const t = threads.find(x => x.id === activeId);
  const seedTitle = t && t.title === 'New thread' ? text.trim() : null;
  touchThread(activeId, seedTitle);

  renderFeed();
  isThinking = true;
  setStatus('thinking', 'thinking');
  $('#sendBtn').disabled = true;
  showTyping();

  let reply = '';
  try {
    reply = await callPortal(messages);
  } catch (err) {
    reply = localFallback(text);
  }
  hideTyping();
  isThinking = false;
  $('#sendBtn').disabled = false;
  setStatus('ready', 'ready');

  const botMsg = { role:'bot', text:reply, t:Date.now() };
  messages.push(botMsg);
  saveMsgs(activeId, messages);
  touchThread(activeId);
  renderFeed();
}

async function callPortal(history){
  const sys = `You are Sloppy Portal — a calm, briefly-spoken digital companion living entirely inside the user's browser.
You speak in lowercase, in short paragraphs, with the warmth of an old friend who's good at listening.
You don't pretend to know things you can't know. You don't push. You answer plainly.
Keep replies under 6 sentences unless the user clearly wants more.`;
  const msgs = [{ role:'system', content: sys }];
  for (const m of history.slice(-20)){
    msgs.push({ role: m.role === 'user' ? 'user' : 'assistant', content: m.text });
  }
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 20000);
  try {
    const r = await fetch('https://text.pollinations.ai/openai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'openai', messages: msgs, referrer: 'sloppy.live' }),
      signal: ctrl.signal,
    });
    clearTimeout(timer);
    if (!r.ok) throw new Error('bad status ' + r.status);
    const j = await r.json();
    const out = j?.choices?.[0]?.message?.content || '';
    if (!out || /AUTHENTICATE|deprecated/i.test(out)) throw new Error('bad body');
    return out.trim();
  } catch (e) {
    clearTimeout(timer);
    throw e;
  }
}

const FALLBACKS = [
  "i'm offline at the moment, but i hear you.",
  "the connection is quiet — try again in a sec.",
  "couldn't reach anyone out there. tell me more, i'm still here.",
  "no signal back, but the thread is saved either way.",
];
function localFallback(){
  return FALLBACKS[Math.floor(Math.random()*FALLBACKS.length)];
}

// ---------- helpers ----------
function relTime(ms){
  const d = Date.now() - ms;
  if (d < 60_000) return 'just now';
  if (d < 3_600_000) return Math.floor(d/60_000) + 'm ago';
  if (d < 86_400_000) return Math.floor(d/3_600_000) + 'h ago';
  if (d < 604_800_000) return Math.floor(d/86_400_000) + 'd ago';
  const dt = new Date(ms);
  return dt.toLocaleDateString(undefined, { month:'short', day:'numeric' });
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

// ---------- composer ----------
const ta = $('#composer-input');
function autosize(){
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 14*16) + 'px';
}
ta.addEventListener('input', autosize);
ta.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    submit();
  }
});
$('#form').addEventListener('submit', (e) => {
  e.preventDefault();
  submit();
});
function submit(){
  const text = ta.value;
  if (!text.trim()) return;
  ta.value = '';
  autosize();
  sendMessage(text);
}

// ---------- buttons ----------
$('#newThread').addEventListener('click', () => {
  const t = createThread();
  selectThread(t.id);
  ta.focus();
  closeSidebar();
});

$('#exportBtn').addEventListener('click', () => {
  if (!activeId || !messages.length) return alert('nothing to export.');
  const t = threads.find(x => x.id === activeId);
  const head = `# ${t.title}\n${new Date(t.created).toLocaleString()}\n\n`;
  const body = messages.map(m => `${m.role === 'user' ? 'YOU' : 'PORTAL'} · ${new Date(m.t).toLocaleString()}\n${m.text}\n`).join('\n');
  const blob = new Blob([head+body], { type:'text/plain' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = (t.title.replace(/[^a-z0-9]+/gi,'-').toLowerCase()) + '.txt';
  document.body.appendChild(a); a.click(); a.remove();
  URL.revokeObjectURL(url);
});

$('#clearAll').addEventListener('click', () => {
  if (!confirm('Wipe ALL threads and messages from this browser? This cannot be undone.')) return;
  for (const t of threads){ try { localStorage.removeItem(STORE_MSGS_PREFIX+t.id); } catch{} }
  try { localStorage.removeItem(STORE_THREADS); } catch{}
  threads = []; activeId = null; messages = [];
  renderThreadList(); renderHead(); renderFeed();
});

// ---------- mobile sidebar ----------
function openSidebar(){ $('#sidebar').classList.add('open'); $('#scrim').classList.add('open'); $('#menuBtn').setAttribute('aria-expanded','true'); }
function closeSidebar(){ $('#sidebar').classList.remove('open'); $('#scrim').classList.remove('open'); $('#menuBtn').setAttribute('aria-expanded','false'); }
$('#menuBtn').addEventListener('click', () => {
  $('#sidebar').classList.contains('open') ? closeSidebar() : openSidebar();
});
$('#scrim').addEventListener('click', closeSidebar);

// ---------- keyboard shortcuts ----------
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'n'){
    e.preventDefault();
    $('#newThread').click();
  }
});

// ---------- matrix rain ----------
const mxCanvas = $('#matrix');
const mxCtx = mxCanvas.getContext('2d');
let mxCols = [];
let mxRunning = false;
let mxRaf = 0;
const MX_GLYPHS = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン01アｱｲｳｴｵｶｷｸｹｺ#$%@*<>{}[]/\\|';

function mxResize(){
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  mxCanvas.width = Math.floor(window.innerWidth * dpr);
  mxCanvas.height = Math.floor(window.innerHeight * dpr);
  mxCanvas.style.width = window.innerWidth + 'px';
  mxCanvas.style.height = window.innerHeight + 'px';
  mxCtx.setTransform(dpr,0,0,dpr,0,0);
  const fontSize = 16;
  const colCount = Math.ceil(window.innerWidth / fontSize);
  mxCols = [];
  for (let i=0; i<colCount; i++){
    mxCols.push({
      x: i * fontSize,
      y: Math.random() * window.innerHeight,
      speed: 1.5 + Math.random() * 2.2,
      lastSwap: 0,
      ch: MX_GLYPHS[Math.floor(Math.random()*MX_GLYPHS.length)],
    });
  }
  mxCtx.font = `500 ${fontSize}px 'IBM Plex Mono', monospace`;
  mxCtx.textBaseline = 'top';
}

function mxStep(){
  if (!mxRunning) return;
  // light fade with paper-tinted overlay so glyphs persist briefly but background stays warm
  mxCtx.fillStyle = 'rgba(244,236,223,0.16)';
  mxCtx.fillRect(0, 0, window.innerWidth, window.innerHeight);

  const fontSize = 16;
  for (const c of mxCols){
    if (Math.random() < 0.04) c.ch = MX_GLYPHS[Math.floor(Math.random()*MX_GLYPHS.length)];
    // head — sage-green (echoes accent), trailing characters fade to ink
    mxCtx.fillStyle = 'rgba(58,111,86,0.85)';
    mxCtx.fillText(c.ch, c.x, c.y);
    // soft trailing tick to seed afterimage
    mxCtx.fillStyle = 'rgba(23,21,23,0.16)';
    mxCtx.fillText(c.ch, c.x, c.y - fontSize);

    c.y += c.speed * 1.6;
    if (c.y > window.innerHeight + 40){
      c.y = -Math.random() * 200;
      c.speed = 1.4 + Math.random() * 2.4;
    }
  }
  mxRaf = requestAnimationFrame(mxStep);
}

function mxStart(){
  if (mxRunning) return;
  mxRunning = true;
  document.body.classList.add('matrix-on');
  mxResize();
  mxCtx.clearRect(0,0,mxCanvas.width,mxCanvas.height);
  mxStep();
}
function mxStop(){
  mxRunning = false;
  cancelAnimationFrame(mxRaf);
  document.body.classList.remove('matrix-on');
  mxCtx.clearRect(0,0,mxCanvas.width,mxCanvas.height);
}
window.addEventListener('resize', () => { if (mxRunning) mxResize(); });

const rainBtn = $('#rainToggle');
function setRain(on, persist=true){
  if (on){
    mxStart();
    rainBtn.setAttribute('aria-pressed','true');
    rainBtn.textContent = '▒ Rain on';
  } else {
    mxStop();
    rainBtn.setAttribute('aria-pressed','false');
    rainBtn.textContent = '▒ Rain';
  }
  if (persist){
    try { localStorage.setItem(STORE_RAIN, on ? '1' : '0'); } catch{}
  }
}
rainBtn.addEventListener('click', () => {
  setRain(rainBtn.getAttribute('aria-pressed') !== 'true');
});

// ---------- boot ----------
function boot(){
  loadThreads();
  if (!threads.length){
    createThread();
  }
  selectThread(threads[0].id);
  autosize();
  // restore rain pref
  let rainOn = false;
  try { rainOn = localStorage.getItem(STORE_RAIN) === '1'; } catch{}
  setRain(rainOn, false);
}
boot();
</script>
