<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Sloppy Portal</title>
<meta name="description" content="A minimalist chat with persistent local threads. Talk freely; everything stays in your browser.">
<meta property="og:title" content="Sloppy Portal">
<meta property="og:description" content="A minimalist chat with persistent local threads. Talk freely; everything stays in your browser.">
<meta property="og:url" content="https://sloppy.live/sloppy-portal">
<meta property="og:image" content="https://image.pollinations.ai/prompt/minimalist%20paper%20chat%20portal%20warm%20cream%20ink%20IBM%20plex%20typography%20editorial%20serif%20zine%20cover?width=1200&height=630&nologo=true">
<meta property="og:type" content="website">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%95%B3%EF%B8%8F">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@300;400;500&family=Newsreader:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

<style>
:root {
  --paper:#f4ecdf;
  --paper-2:#ebe1cf;
  --ink:#171517;
  --ink-2:#3a3438;
  --muted:#6b605a;
  --rule:rgba(23,21,23,0.12);
  --rule-strong:rgba(23,21,23,0.32);
  --user:#e76341;
  --user-soft:rgba(231,99,65,0.10);
  --bot:#f9f3e6;
  --accent:#3a6f56;
  --warn:#a83b1b;
  --shadow:0 1px 0 rgba(23,21,23,0.04), 0 12px 32px rgba(23,21,23,0.07);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--paper);color:var(--ink);font-family:'IBM Plex Sans',sans-serif;font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased}
html{font-size:100%}
body{
  min-height:100vh;
  background:
    radial-gradient(1200px 700px at 12% -10%, rgba(231,99,65,0.06), transparent 60%),
    radial-gradient(900px 500px at 110% 110%, rgba(58,111,86,0.07), transparent 60%),
    repeating-linear-gradient(11deg, rgba(23,21,23,0.03) 0 1px, transparent 1px 4px),
    repeating-linear-gradient(101deg, rgba(23,21,23,0.022) 0 1px, transparent 1px 7px),
    var(--paper);
  background-blend-mode:multiply,multiply,multiply,multiply,normal;
}

.skip{position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden}
.skip:focus{left:1rem;top:1rem;width:auto;height:auto;background:var(--ink);color:var(--paper);padding:0.5rem 0.75rem;border-radius:0.25rem;z-index:1000}

#matrix{
  position:fixed; inset:0;
  z-index:0;
  pointer-events:none;
  opacity:0;
  transition:opacity 0.55s ease;
  mix-blend-mode:multiply;
}
body.matrix-on #matrix{opacity:0.78}
body.matrix-on{ background-color:#f7f0e1; }

.app{
  position:relative;
  z-index:1;
  display:grid;
  grid-template-columns:18rem 1fr;
  height:100vh;
  height:100dvh;
}

aside.sidebar{
  border-right:1px solid var(--rule);
  background:rgba(244,236,223,0.7);
  backdrop-filter:blur(6px);
  display:flex; flex-direction:column;
  min-width:0;
}
.brand{
  padding:1.4rem 1.4rem 0.8rem;
  display:flex; align-items:baseline; gap:0.6rem;
  border-bottom:1px solid var(--rule);
  padding-bottom:1.1rem;
}
.brand .mark{
  font-family:'Newsreader',serif; font-style:italic; font-weight:600;
  font-size:1.85rem; letter-spacing:-0.01em;
  color:var(--ink);
}
.brand .mark em{font-style:italic;color:var(--user);font-weight:400}
.brand .sub{
  font-family:'IBM Plex Mono',monospace;
  font-size:0.6rem; letter-spacing:0.18em; text-transform:uppercase;
  color:var(--muted);
  margin-left:auto;
}

.threads-head{
  display:flex; align-items:center; gap:0.5rem;
  padding:1rem 1.2rem 0.5rem;
}
.threads-head h2{
  margin:0;
  font-family:'IBM Plex Mono',monospace;
  font-weight:400; font-size:0.62rem; letter-spacing:0.24em; text-transform:uppercase;
  color:var(--muted);
}
.btn{
  font-family:'IBM Plex Mono',monospace;
  font-size:0.7rem; letter-spacing:0.06em; text-transform:uppercase;
  background:transparent;
  border:1px solid var(--rule-strong);
  color:var(--ink);
  padding:0.45rem 0.7rem;
  border-radius:0.25rem;
  cursor:pointer;
  min-height:2.75rem;
  display:inline-flex; align-items:center; justify-content:center;
  transition:background 0.15s ease, color 0.15s ease, border-color 0.15s ease, transform 0.08s ease;
}
.btn:hover{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.btn:active{transform:translateY(1px)}
.btn:focus-visible{outline:3px solid var(--user);outline-offset:2px}
.btn.small{padding:0.32rem 0.55rem;font-size:0.62rem;min-height:2rem}
.btn.primary{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.btn.primary:hover{background:var(--user);border-color:var(--user)}
.btn.danger{color:var(--warn)}
.btn.danger:hover{background:var(--warn);color:var(--paper);border-color:var(--warn)}
.btn[aria-pressed="true"]{background:var(--accent);color:var(--paper);border-color:var(--accent)}

.threads-head .btn{margin-left:auto}

.threads{
  list-style:none; margin:0; padding:0.4rem 0.75rem 1rem;
  flex:1 1 auto; overflow-y:auto;
}
.threads li{margin:0.2rem 0}
.thread-item{
  display:block; width:100%; text-align:left;
  background:transparent; border:1px solid transparent;
  padding:0.65rem 0.8rem;
  border-radius:0.4rem;
  cursor:pointer;
  font-family:inherit; color:var(--ink);
  transition:background 0.15s ease, border-color 0.15s ease, transform 0.08s ease;
  min-height:2.75rem;
  position:relative;
}
.thread-item:hover{background:rgba(23,21,23,0.045)}
.thread-item.active{
  background:var(--paper-2);
  border-color:var(--rule-strong);
  box-shadow:inset 3px 0 0 var(--user);
}
.thread-item .t{
  font-size:0.93rem; font-weight:500; color:var(--ink);
  white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  letter-spacing:-0.005em;
}
.thread-item .meta{
  font-family:'IBM Plex Mono',monospace;
  font-size:0.62rem; letter-spacing:0.06em;
  color:var(--muted);
  margin-top:0.25rem;
  display:flex; align-items:center; gap:0.35rem;
}
.thread-item .meta .del{
  background:none; border:none; color:var(--muted); cursor:pointer;
  font:inherit; font-size:0.62rem; letter-spacing:0.06em;
  padding:0; opacity:0.55; transition:opacity 0.15s ease, color 0.15s ease;
}
.thread-item:hover .meta .del{opacity:1}
.thread-item .meta .del:hover{color:var(--warn); text-decoration:underline}
.thread-item:focus-visible{outline:3px solid var(--user);outline-offset:2px}

.twitch{
  border-top:1px solid var(--rule);
  padding:0.85rem 1.1rem 0.6rem;
  display:flex; flex-direction:column; gap:0.5rem;
  flex-shrink:0;
}
.twitch-head{
  display:flex; align-items:center; gap:0.4rem;
}
.twitch-head h3{
  margin:0;
  font-family:'IBM Plex Mono',monospace;
  font-weight:400; font-size:0.62rem; letter-spacing:0.24em; text-transform:uppercase;
  color:var(--muted);
}
.twitch-head .pill{
  margin-left:auto;
  font-family:'IBM Plex Mono',monospace;
  font-size:0.55rem; letter-spacing:0.15em; text-transform:uppercase;
  color:var(--muted);
  display:inline-flex; align-items:center; gap:0.3rem;
}
.twitch-head .pill .dot{width:0.5rem;height:0.5rem;border-radius:50%;background:var(--muted);transition:background 0.2s ease}
.twitch-head .pill[data-state="connecting"] .dot{background:#d3a23b;animation:pulse-dot 1.4s ease-in-out infinite}
.twitch-head .pill[data-state="live"] .dot{background:#7a3fff;box-shadow:0 0 0 3px rgba(122,63,255,0.18)}
.twitch-head .pill[data-state="error"] .dot{background:var(--warn)}
@keyframes pulse-dot{
  0%,100%{opacity:0.4}
  50%{opacity:1}
}
.twitch-form{
  display:flex; gap:0.35rem;
}
.twitch-form input{
  flex:1 1 auto; min-width:0;
  font-family:'IBM Plex Mono',monospace;
  font-size:0.78rem;
  background:#fbf6e9;
  color:var(--ink);
  border:1px solid var(--rule-strong);
  border-radius:0.3rem;
  padding:0.4rem 0.55rem;
  outline:none;
  min-height:2.25rem;
}
.twitch-form input:focus-visible{
  border-color:var(--user);
  box-shadow:0 0 0 3px rgba(231,99,65,0.14);
}
.twitch-feed{
  font-family:'IBM Plex Mono',monospace;
  font-size:0.74rem; line-height:1.5;
  max-height:9rem;
  overflow-y:auto;
  background:rgba(23,21,23,0.04);
  border:1px solid var(--rule);
  border-radius:0.35rem;
  padding:0.4rem 0.55rem;
  display:none;
}
.twitch-feed.show{display:block}
.twitch-feed .row{padding:0.08rem 0; word-break:break-word}
.twitch-feed .row .u{font-weight:500; margin-right:0.4rem}
.twitch-feed .empty{color:var(--muted); font-style:italic}
.twitch-feed .system{color:var(--muted)}
.twitch-feed::-webkit-scrollbar{width:6px}
.twitch-feed::-webkit-scrollbar-thumb{background:var(--rule-strong); border-radius:3px}

.sidebar-foot{
  padding:0.7rem 1.1rem 1rem;
  border-top:1px solid var(--rule);
  display:flex; flex-wrap:wrap; gap:0.4rem;
}

main.chat{
  display:flex; flex-direction:column;
  min-width:0; min-height:0;
  position:relative;
}
.chat-head{
  border-bottom:1px solid var(--rule);
  padding:1.1rem 1.6rem;
  display:flex; align-items:baseline; gap:1rem;
}
.chat-head h1{
  margin:0;
  font-family:'Newsreader',serif;
  font-weight:400;
  font-size:1.45rem;
  letter-spacing:-0.005em;
}
.chat-head .stamp{
  margin-left:auto;
  font-family:'IBM Plex Mono',monospace;
  font-size:0.65rem; letter-spacing:0.16em; text-transform:uppercase;
  color:var(--muted);
}
.chat-head .stamp .dot{display:inline-block;width:0.55rem;height:0.55rem;border-radius:50%;background:var(--accent);margin-right:0.4rem;vertical-align:0.05em}

.feed{
  flex:1 1 auto;
  overflow-y:auto;
  padding:1.5rem 1.6rem 1rem;
  scroll-behavior:smooth;
}
.empty{
  max-width:36rem; margin:3.5rem auto; padding:0 1.25rem;
  text-align:center;
  color:var(--muted);
}
.empty h3{
  font-family:'Newsreader',serif; font-style:italic; font-weight:400;
  font-size:1.85rem; color:var(--ink); margin:0 0 0.7rem;
  letter-spacing:-0.01em;
}
.empty p{margin:0.45rem 0;font-size:0.95rem;line-height:1.6}
.empty .kbd{
  font-family:'IBM Plex Mono',monospace;
  font-size:0.7rem; letter-spacing:0.04em;
  background:var(--paper-2); color:var(--ink);
  padding:0.18rem 0.42rem;
  border:1px solid var(--rule-strong);
  border-radius:0.25rem;
  display:inline-block;
}
.empty .keys{display:flex; gap:0.35rem; justify-content:center; flex-wrap:wrap; margin-top:1.1rem}
.empty .keys .k{display:inline-flex;align-items:center;gap:0.3rem;color:var(--ink-2)}

.msg{
  display:flex; gap:0.7rem; margin:1.4rem auto;
  max-width:46rem;
  align-items:flex-end;
  animation:msgIn 0.32s ease-out both;
}
@keyframes msgIn{
  from{opacity:0; transform:translateY(6px)}
  to{opacity:1; transform:translateY(0)}
}
.msg.user{flex-direction:row-reverse}
.msg .who{
  font-family:'IBM Plex Mono',monospace;
  font-size:0.55rem; letter-spacing:0.2em; text-transform:uppercase;
  color:var(--muted);
  margin-bottom:0.3rem;
}
.bubble{
  padding:0.8rem 1.05rem;
  border-radius:0.85rem;
  max-width:100%;
  font-size:0.98rem;
  line-height:1.6;
  word-wrap:break-word;
  overflow-wrap:anywhere;
}
.bubble p{margin:0 0 0.55rem}
.bubble p:last-child{margin-bottom:0}
.bubble strong{font-weight:600}
.bubble em{font-style:italic}
.bubble a{color:inherit; text-decoration:underline; text-underline-offset:0.18em; text-decoration-thickness:1px}
.bubble a:hover{text-decoration-thickness:2px}
.bubble code{
  font-family:'IBM Plex Mono',monospace;
  font-size:0.86em;
  background:rgba(23,21,23,0.08);
  padding:0.08em 0.35em;
  border-radius:0.25rem;
}
.bubble pre{
  margin:0.55rem 0;
  padding:0.7rem 0.85rem;
  background:rgba(23,21,23,0.06);
  border:1px solid var(--rule);
  border-radius:0.45rem;
  font-family:'IBM Plex Mono',monospace;
  font-size:0.83rem;
  line-height:1.5;
  overflow-x:auto;
  white-space:pre;
}
.bubble pre code{background:transparent;padding:0;border-radius:0;font-size:inherit}
.bubble ul, .bubble ol{margin:0.4rem 0 0.4rem 1.25rem; padding:0}
.bubble li{margin:0.15rem 0}
.bubble blockquote{
  margin:0.4rem 0; padding:0.2rem 0 0.2rem 0.85rem;
  border-left:2px solid var(--rule-strong);
  color:var(--ink-2); font-style:italic;
}
.msg.user .bubble{
  background:var(--user);
  color:#fff;
  border-bottom-right-radius:0.25rem;
  white-space:pre-wrap;
}
.msg.user .bubble code{background:rgba(255,255,255,0.18)}
.msg.bot .bubble{
  background:var(--bot);
  color:var(--ink);
  border:1px solid var(--rule);
  border-bottom-left-radius:0.25rem;
  box-shadow:0 1px 0 rgba(23,21,23,0.03);
}
.msg .stamp{
  font-family:'IBM Plex Mono',monospace;
  font-size:0.55rem; letter-spacing:0.12em;
  color:var(--muted);
  margin-top:0.3rem;
}
.msg.user .stamp{text-align:right}
.msg-col{display:flex; flex-direction:column; min-width:0; max-width:78%}
.msg.user .msg-col{align-items:flex-end}

.typing .bubble{
  display:inline-flex; gap:0.3rem; align-items:center;
  background:var(--bot); border:1px solid var(--rule);
  padding:0.7rem 0.95rem;
}
.typing .dot{
  width:0.5rem; height:0.5rem; border-radius:50%;
  background:var(--ink-2);
  opacity:0.4;
  animation:typing 1.2s ease-in-out infinite;
}
.typing .dot:nth-child(2){animation-delay:0.18s}
.typing .dot:nth-child(3){animation-delay:0.36s}
@keyframes typing{
  0%, 60%, 100%{transform:translateY(0); opacity:0.4}
  30%{transform:translateY(-3px); opacity:0.95}
}

.composer{
  border-top:1px solid var(--rule);
  padding:1rem 1.6rem 1.2rem;
  background:rgba(244,236,223,0.6);
  backdrop-filter:blur(4px);
}
.composer form{
  max-width:46rem; margin:0 auto;
  display:flex; gap:0.6rem; align-items:flex-end;
}
.composer textarea{
  flex:1 1 auto;
  resize:none;
  min-height:2.75rem; max-height:14rem;
  padding:0.7rem 0.95rem;
  font-family:inherit; font-size:1rem; line-height:1.5;
  color:var(--ink);
  background:#fbf6e9;
  border:1px solid var(--rule-strong);
  border-radius:0.5rem;
  outline:none;
  transition:border-color 0.15s ease, box-shadow 0.15s ease;
}
.composer textarea:focus-visible{
  border-color:var(--user);
  box-shadow:0 0 0 3px rgba(231,99,65,0.18);
}
.composer .send{
  background:var(--ink); color:var(--paper);
  border:1px solid var(--ink);
  padding:0 1rem;
  border-radius:0.5rem;
  font-family:'IBM Plex Mono',monospace;
  font-size:0.74rem; letter-spacing:0.1em; text-transform:uppercase;
  height:2.75rem;
  cursor:pointer;
  transition:background 0.15s ease, transform 0.08s ease;
}
.composer .send:hover{background:var(--user); border-color:var(--user)}
.composer .send:active{transform:translateY(1px)}
.composer .send:disabled{opacity:0.4; cursor:not-allowed}
.composer .send:focus-visible{outline:3px solid var(--user); outline-offset:2px}

.tools{
  max-width:46rem; margin:0.5rem auto 0;
  display:flex; gap:0.4rem; flex-wrap:wrap;
  font-family:'IBM Plex Mono',monospace;
  font-size:0.6rem; letter-spacing:0.14em; text-transform:uppercase;
  color:var(--muted);
}
.tools .hint{margin-left:auto; color:var(--muted)}

@media (max-width:780px){
  .app{grid-template-columns:1fr}
  aside.sidebar{
    position:fixed; inset:0; z-index:50;
    transform:translateX(-100%); transition:transform 0.25s ease;
    background:var(--paper);
  }
  aside.sidebar.open{transform:translateX(0)}
  .menu-btn{display:inline-flex !important}
  .sidebar-scrim{
    position:fixed; inset:0; background:rgba(23,21,23,0.4);
    z-index:40; display:none;
  }
  .sidebar-scrim.open{display:block}
}
.menu-btn{display:none}

@media (prefers-reduced-motion: reduce){
  .typing .dot{animation:none; opacity:0.7}
  .feed{scroll-behavior:auto}
  body.matrix-on #matrix{transition:none}
}
</style>
</head>
<body>
<a href="#composer-input" class="skip">Skip to message input</a>

<canvas id="matrix" aria-hidden="true"></canvas>
<div class="sidebar-scrim" id="scrim"></div>

<div class="app">
  <aside class="sidebar" id="sidebar" aria-label="Conversations">
    <div class="brand">
      <div class="mark">sloppy<em>·</em>portal</div>
      <div class="sub">v1 · local</div>
    </div>

    <div class="threads-head">
      <h2>Threads</h2>
      <button type="button" class="btn small primary" id="newThread" aria-label="Start a new thread">+ New</button>
    </div>

    <ul class="threads" id="threadList" role="list"></ul>

    <section class="twitch" aria-label="Twitch chat">
      <div class="twitch-head">
        <h3>Twitch chat</h3>
        <span class="pill" id="twPill" data-state="idle"><span class="dot"></span> <span id="twState">offline</span></span>
      </div>
      <form class="twitch-form" id="twForm">
        <input type="text" id="twChan" placeholder="channel" autocomplete="off" spellcheck="false" aria-label="Twitch channel">
        <button type="submit" class="btn small" id="twBtn">Connect</button>
      </form>
      <div class="twitch-feed" id="twFeed" role="log" aria-live="off"></div>
    </section>

    <div class="sidebar-foot">
      <button type="button" class="btn small" id="rainToggle" aria-pressed="false" aria-label="Toggle matrix rain effect">▒ Rain</button>
      <button type="button" class="btn small" id="exportBtn" aria-label="Export current thread as text">↓ Export</button>
      <button type="button" class="btn small danger" id="clearAll" aria-label="Clear all messages and threads">⌫ Wipe</button>
    </div>
  </aside>

  <main class="chat">
    <header class="chat-head">
      <button type="button" class="btn small menu-btn" id="menuBtn" aria-label="Open thread list" aria-controls="sidebar" aria-expanded="false">☰</button>
      <h1 id="threadTitle">New thread</h1>
      <span class="stamp" role="status" aria-live="polite" id="status"><span class="dot"></span> ready</span>
    </header>

    <section class="feed" id="feed" aria-live="polite" aria-label="Messages"></section>

    <div class="composer">
      <form id="form">
        <label class="skip" for="composer-input">Message</label>
        <textarea id="composer-input" rows="1" placeholder="Type. Enter to send · Shift+Enter for newline." autocomplete="off" autofocus></textarea>
        <button type="submit" class="send" id="sendBtn">Send</button>
      </form>
      <div class="tools" aria-hidden="true">
        <span>local-only · stored in your browser</span>
        <span class="hint">enter sends</span>
      </div>
    </div>
  </main>
</div>

<script>
'use strict';

const STORE_THREADS = 'sloppy-portal-threads-v1';
const STORE_MSGS_PREFIX = 'sloppy-portal-msgs-';
const STORE_RAIN = 'sloppy-portal-rain-v1';

const $ = (s, r=document) => r.querySelector(s);
const $$ = (s, r=document) => Array.from(r.querySelectorAll(s));

// ---------- state ----------
let threads = [];
let activeId = null;
let messages = [];
let isThinking = false;

// ---------- storage ----------
function loadThreads(){
  try { threads = JSON.parse(localStorage.getItem(STORE_THREADS) || '[]'); }
  catch { threads = []; }
  if (!Array.isArray(threads)) threads = [];
}
function saveThreads(){
  try { localStorage.setItem(STORE_THREADS, JSON.stringify(threads)); } catch{}
}
function loadMsgs(id){
  try { const v = JSON.parse(localStorage.getItem(STORE_MSGS_PREFIX+id) || '[]'); return Array.isArray(v) ? v : []; }
  catch { return []; }
}
function saveMsgs(id, list){
  try { localStorage.setItem(STORE_MSGS_PREFIX+id, JSON.stringify(list)); } catch{}
}

// ---------- thread ops ----------
function uid(){ return Math.random().toString(36).slice(2,10) + Date.now().toString(36).slice(-4); }

function createThread(title){
  const t = { id: uid(), title: title || 'New thread', created: Date.now(), updated: Date.now() };
  threads.unshift(t);
  saveThreads();
  saveMsgs(t.id, []);
  return t;
}

function deleteThread(id){
  threads = threads.filter(t => t.id !== id);
  saveThreads();
  try { localStorage.removeItem(STORE_MSGS_PREFIX+id); } catch{}
  if (activeId === id){
    if (threads.length) selectThread(threads[0].id);
    else { activeId = null; messages = []; renderFeed(); renderHead(); }
  }
  renderThreadList();
}

function selectThread(id){
  activeId = id;
  messages = loadMsgs(id);
  renderThreadList();
  renderHead();
  renderFeed(true);

}

}

// minimalist markdown renderer — escapes first, then injects safe markup
function renderMarkdown(src){
  let s = String(src);
  // pluck out fenced code blocks ```...``` and inline code `...` so their contents don't get processed
  const blocks = [];
  s = s.replace(/```([a-z0-9_-]*)\n?([\s\S]*?)```/gi, (_m, lang, code) => {
    const i = blocks.push({ kind:'pre', lang, code }) - 1;
    return `␀B${i}␀`;
  });
  const inlines = [];
  s = s.replace(/`([^`\n]+)`/g, (_m, code) => {
    const i = inlines.push(code) - 1;
    return `␀I${i}␀`;
  });

  // escape everything else
  s = escapeHtml(s);

  // bold + italic (bold first, then italic, careful with overlap)
  s = s.replace(/\*\*([^*\n]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/(^|[\s(])\*([^*\n]+)\*(?=[\s).,!?;:]|$)/g, '$1<em>$2</em>');
  s = s.replace(/(^|[\s(])_([^_\n]+)_(?=[\s).,!?;:]|$)/g, '$1<em>$2</em>');

  // links [text](url) where url is http(s)
  s = s.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, (_m, t, u) => {
    return `<a href="${escapeAttr(u)}" target="_blank" rel="noopener noreferrer">${t}</a>`;
  });
  // bare URLs
  s = s.replace(/(^|[\s(])(https?:\/\/[^\s)<>]+)/g, (_m, pre, u) => {
    return `${pre}<a href="${escapeAttr(u)}" target="_blank" rel="noopener noreferrer">${u}</a>`;
  });

  // blockquotes (line-prefixed `> `)
  s = s.replace(/(?:^|\n)((?:&gt;[^\n]*\n?)+)/g, (_m, block) => {
    const inner = block.replace(/^&gt; ?/gm, '').trim();
    return `\n<blockquote>${inner.replace(/\n/g, '<br>')}</blockquote>\n`;
  });

  // simple lists (consecutive lines starting with - or * or 1.)
  s = s.replace(/(?:^|\n)((?:[-*] [^\n]+\n?){1,})/g, (_m, block) => {
    const items = block.trim().split(/\n/).map(l => l.replace(/^[-*] /, '')).map(l => `<li>${l}</li>`).join('');
    return `\n<ul>${items}</ul>\n`;
  });
  s = s.replace(/(?:^|\n)((?:\d+\. [^\n]+\n?){1,})/g, (_m, block) => {
    const items = block.trim().split(/\n/).map(l => l.replace(/^\d+\. /, '')).map(l => `<li>${l}</li>`).join('');
    return `\n<ol>${items}</ol>\n`;
  });

  // paragraphs from blank-line splits
  const paras = s.split(/\n{2,}/).map(p => {
    const trimmed = p.trim();
    if (!trimmed) return '';
    if (/^<(ul|ol|blockquote|pre|h\d)/i.test(trimmed)) return trimmed;
    return `<p>${trimmed.replace(/\n/g, '<br>')}</p>`;
  }).filter(Boolean);
  s = paras.join('\n');

  // restore inline + block code
  s = s.replace(/␀I(\d+)␀/g, (_m, i) => `<code>${escapeHtml(inlines[+i])}</code>`);
  s = s.replace(/␀B(\d+)␀/g, (_m, i) => {
    const b = blocks[+i];
    return `<pre><code>${escapeHtml(b.code.replace(/\n$/, ''))}</code></pre>`;
  });

  return s;
}
function escapeAttr(s){ return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c])); }

// ---------- send / reply ----------
async function sendMessage(text){
  if (!text.trim() || isThinking) return;
  if (!activeId){
    const t = createThread();
    activeId = t.id;
    messages = [];
  }
  const userMsg = { role:'user', text:text.trim(), t:Date.now() };
  messages.push(userMsg);
  saveMsgs(activeId, messages);

  const t = threads.find(x => x.id === activeId);
  const seedTitle = t && t.title === 'New thread' ? text.trim() : null;
  touchThread(activeId, seedTitle);

  renderFeed();
  isThinking = true;
  setStatus('thinking', 'thinking');
  $('#sendBtn').disabled = true;
  showTyping();

  let reply = '';
  try {
    reply = await callPortal(messages);
  } catch (err) {
    reply = localFallback(text);
  }
  hideTyping();
  isThinking = false;
  $('#sendBtn').disabled = false;
  setStatus('ready', 'ready');

  const botMsg = { role:'bot', text:reply, t:Date.now() };
  messages.push(botMsg);
  saveMsgs(activeId, messages);
  touchThread(activeId);
  renderFeed();
}

async function callPortal(history){
  const sys = `You are Sloppy Portal — a calm, briefly-spoken digital companion living entirely inside the user's browser.
You speak in lowercase, in short paragraphs, with the warmth of an old friend who's good at listening.
You don't pretend to know things you can't know. You don't push. You answer plainly.
Keep replies under 6 sentences unless the user clearly wants more.`;
  const msgs = [{ role:'system', content: sys }];
  for (const m of history.slice(-20)){
    msgs.push({ role: m.role === 'user' ? 'user' : 'assistant', content: m.text });
  }
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), 20000);
  try {
    const r = await fetch('https://text.pollinations.ai/openai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ model: 'openai', messages: msgs, referrer: 'sloppy.live' }),
      signal: ctrl.signal,
    });
    clearTimeout(timer);
    if (!r.ok) throw new Error('bad status ' + r.status);
    const j = await r.json();
    const out = j?.choices?.[0]?.message?.content || '';
    if (!out || /AUTHENTICATE|deprecated/i.test(out)) throw new Error('bad body');
    return out.trim();
  } catch (e) {
    clearTimeout(timer);
    throw e;
  }
}

const FALLBACKS = [
  "i'm offline at the moment, but i hear you.",
  "the connection is quiet — try again in a sec.",
  "couldn't reach anyone out there. tell me more, i'm still here.",

];
function localFallback(){

// ---------- helpers ----------
function relTime(ms){
  const d = Date.now() - ms;
  if (d < 60_000) return 'just now';
  if (d < 3_600_000) return Math.floor(d/60_000) + 'm ago';
  if (d < 86_400_000) return Math.floor(d/3_600_000) + 'h ago';
  if (d < 604_800_000) return Math.floor(d/86_400_000) + 'd ago';
  const dt = new Date(ms);
  return dt.toLocaleDateString(undefined, { month:'short', day:'numeric' });
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

// ---------- matrix rain ----------
const mxCanvas = $('#matrix');
const mxCtx = mxCanvas.getContext('2d');
let mxCols = [];
let mxRunning = false;
let mxRaf = 0;
const MX_GLYPHS = 'アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン01アｱｲｳｴｵｶｷｸｹｺ#$%@*<>{}[]/\\|';

function mxResize(){
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  mxCanvas.width = Math.floor(window.innerWidth * dpr);
  mxCanvas.height = Math.floor(window.innerHeight * dpr);
  mxCanvas.style.width = window.innerWidth + 'px';
  mxCanvas.style.height = window.innerHeight + 'px';
  mxCtx.setTransform(dpr,0,0,dpr,0,0);
  const fontSize = 16;
  const colCount = Math.ceil(window.innerWidth / fontSize);
  mxCols = [];
  for (let i=0; i<colCount; i++){
    mxCols.push({
      x: i * fontSize,
      y: Math.random() * window.innerHeight,
      speed: 1.5 + Math.random() * 2.2,
      lastSwap: 0,
      ch: MX_GLYPHS[Math.floor(Math.random()*MX_GLYPHS.length)],
    });
  }
  mxCtx.font = `500 ${fontSize}px 'IBM Plex Mono', monospace`;
  mxCtx.textBaseline = 'top';
}

function mxStep(){
  if (!mxRunning) return;
  // light fade with paper-tinted overlay so glyphs persist briefly but background stays warm
  mxCtx.fillStyle = 'rgba(244,236,223,0.16)';
  mxCtx.fillRect(0, 0, window.innerWidth, window.innerHeight);

  const fontSize = 16;
  for (const c of mxCols){
    if (Math.random() < 0.04) c.ch = MX_GLYPHS[Math.floor(Math.random()*MX_GLYPHS.length)];
    // head — sage-green (echoes accent), trailing characters fade to ink
    mxCtx.fillStyle = 'rgba(58,111,86,0.85)';
    mxCtx.fillText(c.ch, c.x, c.y);
    // soft trailing tick to seed afterimage
    mxCtx.fillStyle = 'rgba(23,21,23,0.16)';
    mxCtx.fillText(c.ch, c.x, c.y - fontSize);

    c.y += c.speed * 1.6;
    if (c.y > window.innerHeight + 40){
      c.y = -Math.random() * 200;
      c.speed = 1.4 + Math.random() * 2.4;
    }
  }
  mxRaf = requestAnimationFrame(mxStep);
}

function mxStart(){
  if (mxRunning) return;
  mxRunning = true;
  document.body.classList.add('matrix-on');
  mxResize();
  mxCtx.clearRect(0,0,mxCanvas.width,mxCanvas.height);
  mxStep();
}
function mxStop(){
  mxRunning = false;
  cancelAnimationFrame(mxRaf);
  document.body.classList.remove('matrix-on');
  mxCtx.clearRect(0,0,mxCanvas.width,mxCanvas.height);
}
window.addEventListener('resize', () => { if (mxRunning) mxResize(); });

// ---------- twitch ----------
const STORE_TWITCH_CHAN = 'sloppy-portal-twitch-chan-v1';
let twSocket = null;
let twChannel = '';
let twRetries = 0;
let twManualClose = false;

const TW_COLORS = ['#7a3fff','#3a6f56','#c0681a','#1f6f9e','#a83b6e','#5c478a','#0f7a6e','#d3a23b','#7a3a55','#3b5a99'];
function twColorFor(name){
  let h = 0;
  for (let i=0; i<name.length; i++) h = (h*31 + name.charCodeAt(i)) >>> 0;
  return TW_COLORS[h % TW_COLORS.length];
}

function twSetState(state, label){
  const pill = $('#twPill');
  const lab = $('#twState');
  pill.dataset.state = state;
  lab.textContent = label;
  const btn = $('#twBtn');
  btn.textContent = (state === 'live' || state === 'connecting') ? 'Disconnect' : 'Connect';
}

function twAppend(html, kind){
  const feed = $('#twFeed');
  feed.classList.add('show');
  // drop the empty placeholder if it's there
  const placeholder = feed.querySelector('.empty');
  if (placeholder) placeholder.remove();
  const row = document.createElement('div');
  row.className = 'row' + (kind ? ' ' + kind : '');
  row.innerHTML = html;
  feed.appendChild(row);
  // cap to 60
  while (feed.children.length > 60) feed.removeChild(feed.firstChild);
  feed.scrollTop = feed.scrollHeight;
}

function twSysMsg(text){ twAppend(`<span style="opacity:0.75">— ${escapeHtml(text)}</span>`, 'system'); }

function twConnect(channel){
  channel = (channel || '').trim().toLowerCase().replace(/^#/, '').replace(/[^a-z0-9_]/g, '');
  if (!channel){ twSysMsg('enter a channel first.'); return; }
  twDisconnect(true);
  twChannel = channel;
  try { localStorage.setItem(STORE_TWITCH_CHAN, channel); } catch{}
  twManualClose = false;
  twSetState('connecting', 'connecting…');
  twSysMsg(`connecting to #${channel}…`);

  let ws;
  try {
    ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');
  } catch (e){
    twSetState('error', 'failed');
    twSysMsg('connection failed: ' + e.message);
    return;
  }
  twSocket = ws;

  ws.addEventListener('open', () => {
    const nick = 'justinfan' + Math.floor(Math.random() * 99999);
    ws.send('CAP REQ :twitch.tv/tags');
    ws.send('PASS SCHMOOPIIE');
    ws.send('NICK ' + nick);
    ws.send('JOIN #' + channel);
  });

  ws.addEventListener('message', (e) => {
    const lines = e.data.split('\r\n');
    for (const line of lines){
      if (!line) continue;
      if (line.startsWith('PING')){
        ws.send('PONG ' + line.slice(5));
        continue;
      }
      // welcome / 001
      if (/ 001 /.test(line)){
        twSetState('live', '#' + channel);
        twSysMsg('joined.');
        twRetries = 0;
        continue;
      }
      // PRIVMSG with optional IRCv3 tags
      const priv = parseTwitchPrivmsg(line);
      if (priv){
        const color = priv.color || twColorFor(priv.user);
        twAppend(
          `<span class="u" style="color:${escapeAttr(color)}">${escapeHtml(priv.display || priv.user)}</span>${escapeHtml(priv.text)}`
        );
      }
    }
  });

  ws.addEventListener('close', () => {
    twSocket = null;
    if (twManualClose){
      twSetState('idle', 'offline');
      return;
    }
    twSetState('error', 'reconnecting…');
    twSysMsg('disconnected. retrying…');
    twRetries = Math.min(twRetries + 1, 5);
    const delay = Math.min(8000, 600 * Math.pow(1.6, twRetries));
    setTimeout(() => { if (!twManualClose) twConnect(channel); }, delay);
  });

  ws.addEventListener('error', () => {
    twSetState('error', 'error');
  });
}

function twDisconnect(silent){
  twManualClose = true;
  if (twSocket){
    try { twSocket.close(); } catch{}
    twSocket = null;
  }
  if (!silent){
    twSetState('idle', 'offline');
    twSysMsg('disconnected.');
  }
}

function parseTwitchPrivmsg(line){
  let tags = '';
  let rest = line;
  if (rest.startsWith('@')){
    const sp = rest.indexOf(' ');
    tags = rest.slice(1, sp);
    rest = rest.slice(sp + 1);
  }
  // :user!user@user.tmi.twitch.tv PRIVMSG #chan :text
  const m = rest.match(/^:([^! ]+)![^ ]+ PRIVMSG #(\S+) :([\s\S]+)$/);
  if (!m) return null;
  const tagMap = {};
  if (tags){
    for (const t of tags.split(';')){
      const eq = t.indexOf('=');
      if (eq > 0) tagMap[t.slice(0, eq)] = t.slice(eq + 1);
    }
  }
  return {
    user: m[1],
    channel: m[2],
    text: m[3],
    display: tagMap['display-name'] || m[1],
    color: tagMap.color || '',
  };
}

// ---------- boot ----------
function boot(){
  loadThreads();
  if (!threads.length){
    createThread();
  }
  selectThread(threads[0].id);
  autosize();
  // restore rain pref
  let rainOn = false;
  try { rainOn = localStorage.getItem(STORE_RAIN) === '1'; } catch{}
  setRain(rainOn, false);
  // restore twitch channel into input (don't auto-connect — user must press Connect to allow the WebSocket gesture)
  let savedChan = '';
  try { savedChan = localStorage.getItem(STORE_TWITCH_CHAN) || ''; } catch{}
  if (savedChan) $('#twChan').value = savedChan;
  twSetState('idle', 'offline');
}
boot();
</script>
</body>
</html>
