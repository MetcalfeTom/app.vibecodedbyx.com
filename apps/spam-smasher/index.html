<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Spam Smasher</title>
  <link rel="icon" href="https://emojicdn.elk.sh/🔨">
  <meta property="og:title" content="Spam Smasher">
  <meta property="og:description" content="Smash spam-bots with a neon hammer before they flood your inbox. Whack-a-bot!">
  <meta property="og:url" content="https://sloppy.live/spam-smasher">
  <meta property="og:image" content="https://sloppy.live/spam-smasher/og-image.png">
  <link href="https://fonts.googleapis.com/css2?family=Rubik+Glitch&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a14;
      overflow: hidden;
      height: 100dvh;
      font-family: 'IBM Plex Mono', monospace;
      touch-action: none;
      user-select: none;
    }
    canvas {
      display: block; position: fixed; inset: 0;
      cursor: none;
    }
    #hud {
      position: fixed; top: 10px; left: 0; right: 0;
      display: flex; justify-content: center; gap: 30px;
      font-family: 'Rubik Glitch', cursive;
      font-size: 15px; z-index: 10; pointer-events: none;
    }
    .hv { color: #00ff88; text-shadow: 0 0 8px #00ff8844; }
    .hv-combo { color: #ff44aa; text-shadow: 0 0 8px #ff44aa44; }
    .hv-spam { color: #ff4444; text-shadow: 0 0 8px #ff444444; }
    .hl { color: #445; font-size: 11px; font-family: 'IBM Plex Mono', monospace; }

    #overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 20; background: rgba(10,10,20,0.93);
    }
    #overlay.hidden { display: none; }
    #overlay h1 {
      font-family: 'Rubik Glitch', cursive;
      font-size: clamp(26px, 6vw, 50px);
      color: #00ff88;
      text-shadow: 0 0 30px #00ff8844;
      margin-bottom: 6px;
    }
    #overlay .sub {
      font-size: clamp(11px, 2.5vw, 14px);
      color: #445; margin-bottom: 22px;
      text-align: center; padding: 0 20px; line-height: 1.7;
    }
    #overlay .big { font-family: 'Rubik Glitch', cursive; font-size: 38px; color: #00ff88; margin: 8px 0; }
    #overlay .det { color: #ff44aa; font-size: 13px; margin-bottom: 16px; }
    .pbtn {
      font-family: 'Rubik Glitch', cursive;
      font-size: 16px; padding: 12px 30px;
      background: none; border: 2px solid #00ff88;
      color: #00ff88; cursor: pointer; letter-spacing: 2px;
      transition: all .2s;
    }
    .pbtn:hover { background: #00ff88; color: #0a0a14; }
    .hint { font-size: 10px; color: #334; margin-top: 12px; text-align: center; line-height: 1.7; }
          </style>
</head>
<body>

  <canvas id="c"></canvas>

  <div id="hud" style="display:none">
    <span><span class="hl">SMASHED</span> <span class="hv" id="h-score">0</span></span>
    <span><span class="hl">COMBO</span> <span class="hv-combo" id="h-combo">0</span></span>
    <span><span class="hl">SPAM</span> <span class="hv-spam" id="h-spam">0<span class="hl">/10</span></span></span>
  </div>

  <div id="overlay">
    <h1>SPAM SMASHER</h1>
    <p class="sub">Spam-bots are crawling out of the network.<br>Smash them with your neon hammer before they flood the inbox.</p>
    <button class="pbtn" id="btn-go">SMASH TIME</button>
    <div class="hint">Click / tap to hammer &middot; bots pop up from server nodes</div>
  </div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

/* ── Game Config ── */
const MAX_SPAM = 10; // spam reaches this = game over
const BOT_LIFETIME = 2500; // ms before bot escapes
const GRID_COLS = 4;
const GRID_ROWS = 3;

/* ── State ── */
let state = 'menu';
let score = 0, combo = 0, maxCombo = 0, spamLevel = 0;
let frame = 0, gameTime = 0;
let difficulty = 1;

/* ── Hammer ── */
const hammer = {
  x: 0, y: 0, // cursor position
  smashing: false, smashT: 0, smashDur: 8,
  angle: -0.3 // resting angle
};

/* ── Bot holes (server nodes) ── */
let holes = [];
let bots = [];
let particles = [];
let floatingTexts = [];
let spamMails = []; // escaped spam flying across screen

/* ── Spam bot messages ── */
const SPAM_MSGS = [
  'BUY NOW!!!', 'FREE $$$', 'U WON!!', 'CLICK HERE',
  'HOT DEAL', 'ACT FAST', 'NO RISK!!', 'BEST PRICE',
  '100% FREE', 'LAST CHANCE', 'MIRACLE!!', 'DON\'T MISS',
  'UR A WINNER', 'CASH NOW', 'LIMITED!!', 'SHOCKING!!',
  'EARN $10K', 'FREE TRIAL', 'NO CATCH', 'URGENT!!!',
  'DISCOUNT!!', 'OPEN ME!!!', 'CONGRATS!', 'SECRET TIP',
];

const BOT_TYPES = [
  { name: 'basic',   color: '#ff4444', eyeColor: '#ff8888', speed: 1, hp: 1, pts: 10 },
  { name: 'shield',  color: '#ffaa22', eyeColor: '#ffdd66', speed: 0.7, hp: 2, pts: 25 },
  { name: 'speed',   color: '#ff44ff', eyeColor: '#ff88ff', speed: 2, hp: 1, pts: 20 },
  { name: 'mega',    color: '#44ffaa', eyeColor: '#88ffcc', speed: 0.5, hp: 3, pts: 50 },
];

function initHoles() {
  holes = [];
  const padX = W * 0.1, padY = H * 0.15;
  const areaW = W - padX * 2;
  const areaH = H * 0.55;
  const startY = H * 0.25;
  for (let r = 0; r < GRID_ROWS; r++) {
    for (let c = 0; c < GRID_COLS; c++) {
      holes.push({
        x: padX + (c + 0.5) * (areaW / GRID_COLS),
        y: startY + (r + 0.5) * (areaH / GRID_ROWS),
        radius: Math.min(areaW / GRID_COLS, areaH / GRID_ROWS) * 0.3,
        occupied: false
      });
    }
  }
}

function spawnBot() {
  const free = holes.filter(h => !h.occupied);
  if (free.length === 0) return;
  const hole = free[Math.floor(Math.random() * free.length)];
  hole.occupied = true;

  // Pick type based on difficulty
  let pool = [0, 0, 0]; // basic weighted
  if (difficulty > 2) pool.push(1, 2);
  if (difficulty > 4) pool.push(2, 3);
  if (difficulty > 7) pool.push(3, 3);
  const typeIdx = pool[Math.floor(Math.random() * pool.length)];
  const type = BOT_TYPES[typeIdx];

  const lifetime = BOT_LIFETIME / type.speed - difficulty * 80;

  bots.push({
    hole,
    x: hole.x, y: hole.y,
    ...type,
    hp: type.hp,
    born: performance.now(),
    lifetime: Math.max(800, lifetime),
    riseT: 0, // 0-1 rise animation
    msg: SPAM_MSGS[Math.floor(Math.random() * SPAM_MSGS.length)],
    hitFlash: 0,
    dead: false
  });
}

/* ── Input ── */
let mouseX = W / 2, mouseY = H / 2;

canvas.addEventListener('pointermove', e => {
  mouseX = e.clientX; mouseY = e.clientY;
});

canvas.addEventListener('pointerdown', e => {
  mouseX = e.clientX; mouseY = e.clientY;
  if (state === 'play') doSmash();
});

document.getElementById('btn-go').onclick = startGame;
window.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter') {
    if (state === 'menu' || state === 'dead') startGame();
    else if (state === 'play') doSmash();
  }
});

function doSmash() {
  if (hammer.smashing) return;
  hammer.smashing = true;
  hammer.smashT = hammer.smashDur;

  // Check hit on bots
  let hitAny = false;
  for (let i = bots.length - 1; i >= 0; i--) {
    const b = bots[i];
    if (b.dead) continue;
    const dx = mouseX - b.x;
    const dy = mouseY - (b.y - b.hole.radius * b.riseT * 0.8);
    const dist = Math.sqrt(dx * dx + dy * dy);
    const hitR = b.hole.radius * 0.9;
    if (dist < hitR) {
      b.hp--;
      b.hitFlash = 6;
      if (b.hp <= 0) {
        // Killed!
        b.dead = true;
        b.hole.occupied = false;
        hitAny = true;
        combo++;
        if (combo > maxCombo) maxCombo = combo;
        const mult = Math.min(combo, 8);
        const pts = b.pts * mult;
        score += pts;

        // Particles
        const hue = b.color.includes('ff44') && b.color.includes('44ff') ? 160 :
                    b.color.includes('ffaa') ? 30 :
                    b.color.includes('ff44ff') ? 300 : 0;
        for (let j = 0; j < 18; j++) {
          particles.push({
            x: b.x, y: b.y - b.hole.radius * 0.5,
            vx: (Math.random() - 0.5) * 10,
            vy: (Math.random() - 1) * 8,
            life: 20 + Math.random() * 15,
            maxLife: 35,
            size: 1.5 + Math.random() * 3,
            hue: hue + Math.random() * 40
          });
        }

        // Floating score text
        floatingTexts.push({
          x: b.x, y: b.y - b.hole.radius,
          text: `+${pts}` + (mult > 1 ? ` ×${mult}` : ''),
          life: 40, maxLife: 40,
          color: mult >= 5 ? '#ff44aa' : '#00ff88'
        });

        // Gear/screw debris
        for (let j = 0; j < 5; j++) {
          particles.push({
            x: b.x + (Math.random() - 0.5) * 20,
            y: b.y - b.hole.radius * 0.4,
            vx: (Math.random() - 0.5) * 6,
            vy: -Math.random() * 5 - 2,
            life: 30 + Math.random() * 20,
            maxLife: 50,
            size: 2 + Math.random() * 2,
            hue: 40 + Math.random() * 20, // metallic
            isGear: true
          });
        }
      } else {
        // Hit but alive — small sparks
        for (let j = 0; j < 6; j++) {
          particles.push({
            x: b.x, y: b.y - b.hole.radius * 0.4,
            vx: (Math.random() - 0.5) * 5,
            vy: (Math.random() - 0.5) * 5,
            life: 10 + Math.random() * 8,
            maxLife: 18, size: 1 + Math.random() * 2,
            hue: 40
          });
        }
      }
    }
  }

  if (!hitAny) {
    combo = 0;
    // Miss impact sparks
    for (let j = 0; j < 4; j++) {
      particles.push({
        x: mouseX + (Math.random() - 0.5) * 16,
        y: mouseY + (Math.random() - 0.5) * 16,
        vx: (Math.random() - 0.5) * 4,
        vy: (Math.random() - 0.5) * 4,
        life: 8 + Math.random() * 6,
        maxLife: 14, size: 1 + Math.random(),
        hue: 180
      });
    }
  }
}

function startGame() {
  state = 'play';
  score = 0; combo = 0; maxCombo = 0; spamLevel = 0;
  frame = 0; gameTime = 0; difficulty = 1;
  bots = []; particles = []; floatingTexts = []; spamMails = [];
  initHoles();
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('hud').style.display = 'flex';
}

function gameOver() {
  state = 'dead';
  const el = document.getElementById('overlay');
  el.innerHTML = `
    <h1>INBOX FLOODED</h1>
    <div class="big">${score}</div>
    <div class="det">${maxCombo > 1 ? 'Best combo ×' + maxCombo + ' · ' : ''}Difficulty ${difficulty}</div>
    <button class="pbtn" id="btn-retry">AGAIN</button>
  `;
  el.querySelector('#btn-retry').onclick = startGame;
  el.classList.remove('hidden');
}

/* ── Spawn timer ── */
let spawnTimer = 0;

/* ── Update ── */
function update() {
  if (state !== 'play') return;
  frame++;
  gameTime += 16;

  difficulty = 1 + Math.floor(score / 200);

  // Hammer
  hammer.x += (mouseX - hammer.x) * 0.4;
  hammer.y += (mouseY - hammer.y) * 0.4;
  if (hammer.smashT > 0) {
    hammer.smashT--;
    if (hammer.smashT === 0) hammer.smashing = false;
  }

  // Spawn bots
  spawnTimer--;
  const baseInterval = Math.max(15, 60 - difficulty * 4);
  if (spawnTimer <= 0) {
    spawnBot();
    if (difficulty > 5 && Math.random() < 0.3) spawnBot(); // double spawn
    spawnTimer = baseInterval + Math.floor(Math.random() * 20);
  }

  // Update bots
  const now = performance.now();
  for (let i = bots.length - 1; i >= 0; i--) {
    const b = bots[i];
    if (b.dead) { bots.splice(i, 1); continue; }

    const age = now - b.born;
    // Rise animation (first 300ms)
    b.riseT = Math.min(1, age / 300);

    if (b.hitFlash > 0) b.hitFlash--;

    // Escaped!
    if (age > b.lifetime) {
      b.hole.occupied = false;
      bots.splice(i, 1);
      spamLevel++;
      combo = 0;

      // Spam mail flies across
      spamMails.push({
        x: b.x, y: b.y,
        vx: (Math.random() - 0.5) * 4 + 2,
        vy: -2 - Math.random() * 2,
        rot: (Math.random() - 0.5) * 0.1,
        msg: b.msg,
        life: 80
      });

      if (spamLevel >= MAX_SPAM) { gameOver(); return; }
    }
  }

  // Spam mails
  for (let i = spamMails.length - 1; i >= 0; i--) {
    const m = spamMails[i];
    m.x += m.vx; m.y += m.vy;
    m.vy += 0.05;
    m.rot += 0.02;
    m.life--;
    if (m.life <= 0 || m.y > H + 50) spamMails.splice(i, 1);
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.25;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
  if (particles.length > 400) particles.splice(0, particles.length - 400);

  // Floating texts
  for (let i = floatingTexts.length - 1; i >= 0; i--) {
    const ft = floatingTexts[i];
    ft.y -= 1.2;
    ft.life--;
    if (ft.life <= 0) floatingTexts.splice(i, 1);
  }

  // HUD
  document.getElementById('h-score').textContent = score;
  document.getElementById('h-combo').textContent = combo > 1 ? '×' + combo : '0';
  document.getElementById('h-spam').innerHTML = spamLevel + `<span class="hl">/${MAX_SPAM}</span>`;
}

/* ── Draw ── */
function draw() {
  ctx.fillStyle = '#0a0a14';
  ctx.fillRect(0, 0, W, H);

  // Background: circuit board pattern
  drawCircuitBg();

  // Spam meter bar at bottom
  drawSpamBar();

  // Holes (server nodes)
  for (const h of holes) {
    // Dark pit
    ctx.fillStyle = '#06060c';
    ctx.beginPath();
    ctx.ellipse(h.x, h.y, h.radius, h.radius * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Ring
    ctx.strokeStyle = '#1a2a1a';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.ellipse(h.x, h.y, h.radius, h.radius * 0.4, 0, 0, Math.PI * 2);
    ctx.stroke();

    // Server node label
    ctx.fillStyle = '#1a2a1a';
    ctx.font = '8px "IBM Plex Mono", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('NODE', h.x, h.y + h.radius * 0.4 + 14);
  }

  // Bots
  const now = performance.now();
  for (const b of bots) {
    if (b.dead) continue;
    const age = now - b.born;
    const timeLeft = b.lifetime - age;
    const riseY = b.y - b.hole.radius * b.riseT * 0.8;

    ctx.save();
    ctx.translate(b.x, riseY);

    const r = b.hole.radius * 0.55;
    const urgency = timeLeft < 600 ? Math.sin(frame * 0.4) * 3 : 0;

    // Body
    ctx.shadowColor = b.color;
    ctx.shadowBlur = 10 + Math.abs(urgency) * 2;
    ctx.fillStyle = b.hitFlash > 0 ? '#ffffff' : b.color;

    // Robot body
    ctx.fillRect(-r * 0.7, -r * 0.9, r * 1.4, r * 1.4);

    // Antenna
    ctx.strokeStyle = b.color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, -r * 0.9);
    ctx.lineTo(urgency, -r * 1.4);
    ctx.stroke();
    ctx.fillStyle = b.hitFlash > 0 ? '#fff' : b.eyeColor;
    ctx.beginPath();
    ctx.arc(urgency, -r * 1.4, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // Eyes
    ctx.fillStyle = '#0a0a14';
    ctx.fillRect(-r * 0.35, -r * 0.55, r * 0.25, r * 0.2);
    ctx.fillRect(r * 0.1, -r * 0.55, r * 0.25, r * 0.2);
    // Pupils (track hammer)
    const eyeLookX = Math.sign(hammer.x - b.x) * 2;
    ctx.fillStyle = b.eyeColor;
    ctx.fillRect(-r * 0.3 + eyeLookX, -r * 0.5, r * 0.12, r * 0.1);
    ctx.fillRect(r * 0.15 + eyeLookX, -r * 0.5, r * 0.12, r * 0.1);

    // Mouth — jagged teeth
    ctx.fillStyle = '#0a0a14';
    ctx.fillRect(-r * 0.3, -r * 0.15, r * 0.6, r * 0.15);
    ctx.fillStyle = b.hitFlash > 0 ? '#fff' : b.color;
    for (let t = 0; t < 4; t++) {
      ctx.fillRect(-r * 0.25 + t * r * 0.15, -r * 0.15, r * 0.07, r * 0.08);
    }

    // Shield indicator for shield type
    if (b.name === 'shield' && b.hp > 1) {
      ctx.strokeStyle = '#ffdd44';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(0, -r * 0.2, r * 0.85, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Mega glow rings
    if (b.name === 'mega') {
      ctx.strokeStyle = `rgba(68,255,170,${0.2 + Math.sin(frame * 0.1) * 0.1})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(0, -r * 0.2, r * 1.1 + Math.sin(frame * 0.15) * 3, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Spam message bubble
    if (b.riseT > 0.8) {
      const bubbleAlpha = Math.min((b.riseT - 0.8) / 0.2, 1) * (timeLeft < 400 ? 0.4 + Math.sin(frame * 0.5) * 0.3 : 0.7);
      ctx.fillStyle = `rgba(255,60,60,${bubbleAlpha * 0.15})`;
      ctx.font = `bold ${Math.max(9, r * 0.35)}px "IBM Plex Mono", monospace`;
      ctx.textAlign = 'center';
      const tw = ctx.measureText(b.msg).width;
      ctx.fillRect(-tw / 2 - 6, -r * 1.6 - 14, tw + 12, 18);
      ctx.fillStyle = `rgba(255,100,100,${bubbleAlpha})`;
      ctx.fillText(b.msg, 0, -r * 1.6 - 1);
    }

    // Timer bar
    const pct = Math.max(0, timeLeft / b.lifetime);
    const barW = r * 1.2;
    ctx.fillStyle = '#1a1a24';
    ctx.fillRect(-barW / 2, r * 0.65, barW, 3);
    ctx.fillStyle = pct > 0.3 ? '#00ff88' : '#ff4444';
    ctx.fillRect(-barW / 2, r * 0.65, barW * pct, 3);

    ctx.restore();
  }

  // Spam mails floating away
  for (const m of spamMails) {
    ctx.save();
    ctx.translate(m.x, m.y);
    ctx.rotate(m.rot * m.life * 0.1);
    const alpha = Math.min(m.life / 30, 1);
    // Envelope
    ctx.fillStyle = `rgba(255,80,60,${alpha * 0.6})`;
    ctx.fillRect(-18, -12, 36, 24);
    ctx.strokeStyle = `rgba(255,120,100,${alpha * 0.4})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(-18, -12); ctx.lineTo(0, 2); ctx.lineTo(18, -12);
    ctx.stroke();
    ctx.fillStyle = `rgba(255,200,200,${alpha * 0.5})`;
    ctx.font = '6px "IBM Plex Mono", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('SPAM', 0, 6);
    ctx.restore();
  }

  // Particles
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    if (p.isGear) {
      ctx.fillStyle = `hsla(${p.hue}, 30%, 55%, ${alpha})`;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(frame * 0.1 + p.x);
      ctx.fillRect(-p.size, -p.size / 3, p.size * 2, p.size * 0.6);
      ctx.fillRect(-p.size / 3, -p.size, p.size * 0.6, p.size * 2);
      ctx.restore();
    } else {
      ctx.fillStyle = `hsla(${p.hue}, 100%, 60%, ${alpha})`;
      ctx.shadowColor = `hsla(${p.hue}, 100%, 60%, ${alpha * 0.4})`;
      ctx.shadowBlur = 4;
      ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
      ctx.shadowBlur = 0;
    }
  }

  // Floating texts
  for (const ft of floatingTexts) {
    const alpha = ft.life / ft.maxLife;
    ctx.fillStyle = ft.color;
    ctx.globalAlpha = alpha;
    ctx.font = `bold ${14 + (1 - alpha) * 6}px "Rubik Glitch", cursive`;
    ctx.textAlign = 'center';
    ctx.fillText(ft.text, ft.x, ft.y);
    ctx.globalAlpha = 1;
  }

  // Hammer cursor
  drawHammer();
}

function drawHammer() {
  const hx = hammer.x, hy = hammer.y;
  const smashProgress = hammer.smashing ? (hammer.smashDur - hammer.smashT) / hammer.smashDur : 0;
  const angle = hammer.smashing
    ? hammer.angle + smashProgress * 1.2 // swing down
    : hammer.angle + Math.sin(frame * 0.05) * 0.05; // idle bob

  ctx.save();
  ctx.translate(hx, hy);
  ctx.rotate(angle);

  // Handle
  ctx.fillStyle = '#443322';
  ctx.fillRect(-3, 0, 6, 55);
  ctx.strokeStyle = '#665544';
  ctx.lineWidth = 1;
  ctx.strokeRect(-3, 0, 6, 55);
  // Grip lines
  ctx.strokeStyle = '#332211';
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.moveTo(-3, 35 + i * 5);
    ctx.lineTo(3, 35 + i * 5);
    ctx.stroke();
  }

  // Head
  const headGlow = hammer.smashing ? 0.8 : 0.3;
  ctx.shadowColor = `rgba(0,255,136,${headGlow})`;
  ctx.shadowBlur = hammer.smashing ? 25 : 10;

  // Main head block
  ctx.fillStyle = '#1a3a2a';
  ctx.fillRect(-18, -8, 36, 16);

  // Neon face
  ctx.fillStyle = `rgba(0,255,136,${0.3 + headGlow * 0.4})`;
  ctx.fillRect(-16, -6, 32, 12);

  // Edge highlights
  ctx.fillStyle = '#00ff88';
  ctx.fillRect(-18, -8, 36, 2);
  ctx.fillRect(-18, 6, 36, 2);

  // Impact face
  ctx.fillStyle = `rgba(0,255,136,${hammer.smashing ? 0.9 : 0.5})`;
  ctx.fillRect(-18, -6, 3, 12);
  ctx.fillRect(15, -6, 3, 12);

  ctx.shadowBlur = 0;
  ctx.restore();

  // Impact shockwave
  if (hammer.smashing && hammer.smashT > hammer.smashDur - 4) {
    const r = (hammer.smashDur - hammer.smashT) * 12;
    const a = hammer.smashT / hammer.smashDur;
    ctx.strokeStyle = `rgba(0,255,136,${a * 0.4})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(hx, hy, r, 0, Math.PI * 2);
    ctx.stroke();
  }
}

function drawCircuitBg() {
  ctx.strokeStyle = 'rgba(0,255,136,0.02)';
  ctx.lineWidth = 1;
  const spacing = 80;
  const ox = (frame * 0.1) % spacing;
  for (let x = -spacing + ox; x < W + spacing; x += spacing) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += spacing) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  // Random circuit nodes
  ctx.fillStyle = 'rgba(0,255,136,0.03)';
  for (let i = 0; i < 12; i++) {
    const nx = ((i * 173 + frame * 0.02) % W);
    const ny = ((i * 271) % H);
    ctx.fillRect(nx - 2, ny - 2, 4, 4);
  }
}

function drawSpamBar() {
  const barW = W * 0.6;
  const barH = 8;
  const bx = (W - barW) / 2;
  const by = H - 30;
  const pct = spamLevel / MAX_SPAM;

  ctx.fillStyle = '#111118';
  ctx.fillRect(bx, by, barW, barH);
  ctx.fillStyle = pct > 0.7 ? '#ff4444' : pct > 0.4 ? '#ffaa22' : '#00ff88';
  ctx.fillRect(bx, by, barW * pct, barH);
  ctx.strokeStyle = '#222230';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx, by, barW, barH);

  ctx.fillStyle = '#334';
  ctx.font = '9px "IBM Plex Mono", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('INBOX SPAM', W / 2, by - 4);
}

/* ── Loop ── */
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
