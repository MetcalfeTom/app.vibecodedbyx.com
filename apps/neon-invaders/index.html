<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Invaders</title>
<link rel="icon" href="https://emojicdn.elk.sh/👾">
<meta property="og:title" content="Neon Invaders">
<meta property="og:description" content="Blast waves of neon pixel invaders in this retro arcade shooter.">
<meta property="og:url" content="https://app.sloppy.live/neon-invaders/">
<meta property="og:image" content="https://emojicdn.elk.sh/👾?style=apple&size=512">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;display:flex;justify-content:center;align-items:center;
  min-height:100vh;overflow:hidden;font-family:'Press Start 2P',monospace}
canvas{image-rendering:pixelated;image-rendering:crisp-edges;
  border:2px solid #222;box-shadow:0 0 40px rgba(0,255,200,0.1)}
#touch{position:fixed;bottom:0;left:0;width:100%;z-index:10;
  display:none;padding:12px 20px;gap:10px;justify-content:space-between;align-items:center}
.tBtn{background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.15);
  border-radius:12px;color:#fff;font-family:'Press Start 2P',monospace;font-size:0.6rem;
  padding:14px 20px;cursor:pointer;touch-action:none;-webkit-user-select:none;user-select:none}
#backlink a{color:#0fc;text-decoration:none}
@media(pointer:coarse){#touch{display:flex}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="touch">
  <button class="tBtn" id="tLeft">◀</button>
  <button class="tBtn" id="tFire">FIRE</button>
  <button class="tBtn" id="tRight">▶</button>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// Native resolution — scaled up
const W = 240, H = 320;
canvas.width = W; canvas.height = H;

function fit() {
  const s = Math.min(innerWidth / W, innerHeight / H, 3);
  canvas.style.width = (W * s) + 'px';
  canvas.style.height = (H * s) + 'px';
}
fit(); window.addEventListener('resize', fit);

// --- Audio ---
let actx = null;
function initAudio() { if (!actx) actx = new AudioContext(); }
function playShoot() {
  if (!actx) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = 'square'; o.frequency.setValueAtTime(880, actx.currentTime);
  o.frequency.exponentialRampToValueAtTime(220, actx.currentTime + 0.08);
  g.gain.setValueAtTime(0.15, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.1);
  o.connect(g).connect(actx.destination); o.start(); o.stop(actx.currentTime + 0.1);
}
function playHit() {
  if (!actx) return;
  const dur = 0.12;
  const buf = actx.createBuffer(1, actx.sampleRate*dur, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<d.length;i++) { const t=i/d.length; d[i]=(Math.random()*2-1)*0.3*(1-t); }
  const s = actx.createBufferSource(); s.buffer = buf;
  const g = actx.createGain(); g.gain.value = 0.3;
  s.connect(g).connect(actx.destination); s.start();
}
function playExplosion() {
  if (!actx) return;
  const dur = 0.3;
  const buf = actx.createBuffer(1, actx.sampleRate*dur, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i=0;i<d.length;i++) { const t=i/d.length; d[i]=(Math.random()*2-1)*0.4*(1-t*t); }
  const s = actx.createBufferSource(); s.buffer = buf;
  const f = actx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=400;
  const g = actx.createGain(); g.gain.value = 0.35;
  s.connect(f).connect(g).connect(actx.destination); s.start();
}
function playDeath() {
  if (!actx) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type='sawtooth';
  o.frequency.setValueAtTime(300,actx.currentTime);
  o.frequency.exponentialRampToValueAtTime(30,actx.currentTime+0.8);
  g.gain.setValueAtTime(0.2,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.8);
  o.connect(g).connect(actx.destination); o.start(); o.stop(actx.currentTime+0.8);
}
function playWaveChime() {
  if (!actx) return;
  [523,659,784,1047].forEach((f,i)=>{
    const o=actx.createOscillator(),g=actx.createGain();
    o.type='triangle';o.frequency.value=f;
    g.gain.setValueAtTime(0,actx.currentTime+i*0.08);
    g.gain.linearRampToValueAtTime(0.12,actx.currentTime+i*0.08+0.03);
    g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+i*0.08+0.3);
    o.connect(g).connect(actx.destination);o.start(actx.currentTime+i*0.08);o.stop(actx.currentTime+i*0.08+0.3);
  });
}
function playPowerup() {
  if (!actx) return;
  const o=actx.createOscillator(),g=actx.createGain();
  o.type='sine';o.frequency.setValueAtTime(400,actx.currentTime);
  o.frequency.exponentialRampToValueAtTime(1200,actx.currentTime+0.2);
  g.gain.setValueAtTime(0.15,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.25);
  o.connect(g).connect(actx.destination);o.start();o.stop(actx.currentTime+0.25);
}

// --- Pixel sprites (8x8) ---
// Invader type A (crab)
const spriteA1 = [
  '..1..1..',
  '...11...',
  '..1111..',
  '.11..11.',
  '11111111',
  '1.1111.1',
  '1......1',
  '.1....1.',
];
const spriteA2 = [
  '..1..1..',
  '1..11..1',
  '1.1111.1',
  '11.11.11',
  '11111111',
  '..1111..',
  '.1....1.',
  '1......1',
];
// Invader type B (squid)
const spriteB1 = [
  '...11...',
  '..1111..',
  '.111111.',
  '11.11.11',
  '11111111',
  '..1..1..',
  '.1.11.1.',
  '1.1..1.1',
];
const spriteB2 = [
  '...11...',
  '..1111..',
  '.111111.',
  '11.11.11',
  '11111111',
  '.1.11.1.',
  '1......1',
  '.1....1.',
];
// Invader type C (octopus)
const spriteC1 = [
  '..1111..',
  '.111111.',
  '11111111',
  '11.11.11',
  '11111111',
  '..1..1..',
  '.1.11.1.',
  '.1....1.',
];
const spriteC2 = [
  '..1111..',
  '.111111.',
  '11111111',
  '11.11.11',
  '11111111',
  '..1..1..',
  '.11..11.',
  '11....11',
];
// Player ship
const playerSprite = [
  '...11...',
  '..1111..',
  '..1111..',
  '.111111.',
  '11111111',
  '11111111',
  '11.11.11',
  '11....11',
];
// Shield block (4x4)
const shieldSprite = [
  '.111.',
  '11111',
  '11111',
  '11.11',
];

function drawSprite(sprite, x, y, color, scale) {
  const s = scale || 2;
  ctx.fillStyle = color;
  for (let r = 0; r < sprite.length; r++) {
    for (let c = 0; c < sprite[r].length; c++) {
      if (sprite[r][c] === '1') {
        ctx.fillRect(x + c*s, y + r*s, s, s);
      }
    }
  }
}

// --- Game State ---
const INVADER_TYPES = [
  { s1: spriteC1, s2: spriteC2, color: '#ff0066', pts: 30 },
  { s1: spriteB1, s2: spriteB2, color: '#ff6600', pts: 20 },
  { s1: spriteA1, s2: spriteA2, color: '#00ffcc', pts: 10 },
];

let player, invaders, bullets, eBullets, particles, powerups, shields;
let score, lives, wave, gameState, animFrame, invMoveTimer, invMoveDir;
let invDropNext, invSpeed, shootCooldown, hiScore;
let starfield = [];

hiScore = parseInt(localStorage.getItem('neon-invaders-hi')) || 0;

function initStars() {
  starfield = [];
  for (let i = 0; i < 60; i++) {
    starfield.push({
      x: Math.random()*W, y: Math.random()*H,
      speed: 0.1 + Math.random()*0.3,
      brightness: 0.2 + Math.random()*0.5
    });
  }
}

function initShields() {
  shields = [];
  for (let i = 0; i < 4; i++) {
    const sx = 30 + i * 52;
    const blocks = [];
    for (let r = 0; r < shieldSprite.length; r++) {
      for (let c = 0; c < shieldSprite[r].length; c++) {
        if (shieldSprite[r][c] === '1') {
          blocks.push({ x: sx + c*4, y: 260 + r*4, w:4, h:4, hp:3 });
        }
      }
    }
    shields.push(...blocks);
  }
}

function spawnWave() {
  invaders = [];
  const rows = Math.min(5, 3 + Math.floor(wave / 3));
  const cols = Math.min(10, 7 + Math.floor(wave / 4));
  for (let r = 0; r < rows; r++) {
    const type = INVADER_TYPES[Math.min(r, INVADER_TYPES.length-1)];
    for (let c = 0; c < cols; c++) {
      invaders.push({
        x: 20 + c * 20, y: 30 + r * 18,
        type, alive: true, frame: 0
      });
    }
  }
  invMoveTimer = 0;
  invMoveDir = 1;
  invDropNext = false;
  invSpeed = Math.max(0.3, 1.2 - wave * 0.06);
  playWaveChime();
}

function resetGame() {
  player = { x: W/2, y: H - 28, w: 16, h: 16 };
  score = 0; lives = 3; wave = 1;
  bullets = []; eBullets = []; particles = []; powerups = [];
  shootCooldown = 0;
  gameState = 'play';
  initStars();
  initShields();
  spawnWave();
}

// --- Input ---
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space' || e.code === 'ArrowLeft' || e.code === 'ArrowRight') e.preventDefault();
  if (gameState === 'gameover' && e.code === 'Space') { initAudio(); resetGame(); }
  if (gameState === 'title' && e.code === 'Space') { initAudio(); resetGame(); }
});
document.addEventListener('keyup', e => keys[e.code] = false);

// Touch
const tLeft = document.getElementById('tLeft');
const tRight = document.getElementById('tRight');
const tFire = document.getElementById('tFire');
tLeft.addEventListener('touchstart', e => { e.preventDefault(); initAudio(); keys['ArrowLeft']=true; }, {passive:false});
tLeft.addEventListener('touchend', () => keys['ArrowLeft']=false);
tRight.addEventListener('touchstart', e => { e.preventDefault(); initAudio(); keys['ArrowRight']=true; }, {passive:false});
tRight.addEventListener('touchend', () => keys['ArrowRight']=false);
tFire.addEventListener('touchstart', e => {
  e.preventDefault(); initAudio();
  if (gameState==='gameover'||gameState==='title') resetGame();
  else keys['Space']=true;
}, {passive:false});
tFire.addEventListener('touchend', () => keys['Space']=false);

// --- Update ---
function update(dt) {
  // Stars
  for (const s of starfield) {
    s.y += s.speed;
    if (s.y > H) { s.y = 0; s.x = Math.random()*W; }
  }

  if (gameState !== 'play') return;

  // Player movement
  const spd = 120;
  if (keys['ArrowLeft'] || keys['KeyA']) player.x -= spd * dt;
  if (keys['ArrowRight'] || keys['KeyD']) player.x += spd * dt;
  player.x = Math.max(10, Math.min(W - 10, player.x));

  // Shooting
  shootCooldown -= dt;
  if ((keys['Space'] || keys['KeyW'] || keys['ArrowUp']) && shootCooldown <= 0) {
    bullets.push({ x: player.x, y: player.y - 6, vy: -200 });
    shootCooldown = 0.25;
    playShoot();
  }

  // Bullets
  for (let i = bullets.length-1; i >= 0; i--) {
    bullets[i].y += bullets[i].vy * dt;
    if (bullets[i].y < -5) bullets.splice(i,1);
  }

  // Enemy bullets
  for (let i = eBullets.length-1; i >= 0; i--) {
    const b = eBullets[i];
    b.y += b.vy * dt;
    b.x += (b.vx||0) * dt;
    if (b.y > H+5) { eBullets.splice(i,1); continue; }

    // Hit player
    if (Math.abs(b.x-player.x)<8 && Math.abs(b.y-player.y)<8) {
      eBullets.splice(i,1);
      loseLife();
      continue;
    }

    // Hit shield
    for (let s = shields.length-1; s >= 0; s--) {
      const sh = shields[s];
      if (b.x > sh.x && b.x < sh.x+sh.w && b.y > sh.y && b.y < sh.y+sh.h) {
        sh.hp--;
        if (sh.hp <= 0) shields.splice(s,1);
        eBullets.splice(i,1);
        break;
      }
    }
  }

  // Invader movement
  invMoveTimer += dt;
  const aliveCount = invaders.filter(v=>v.alive).length;
  const speedMult = 1 + (1 - aliveCount / Math.max(1, invaders.length)) * 2;
  
  if (invMoveTimer >= invSpeed / speedMult) {
    invMoveTimer = 0;
    animFrame = (animFrame||0) + 1;

    if (invDropNext) {
      for (const inv of invaders) { if (inv.alive) inv.y += 6; }
      invDropNext = false;
      invMoveDir *= -1;
    } else {
      let hitEdge = false;
      for (const inv of invaders) {
        if (!inv.alive) continue;
        inv.x += invMoveDir * 4;
        if (inv.x > W - 20 || inv.x < 8) hitEdge = true;
      }
      if (hitEdge) invDropNext = true;
    }

    // Enemy shooting
    const shooters = invaders.filter(v => v.alive);
    if (shooters.length > 0 && Math.random() < 0.3 + wave * 0.05) {
      const shooter = shooters[Math.floor(Math.random()*shooters.length)];
      const bulletType = Math.random();
      if (bulletType < 0.1 && wave > 3) {
        // Aimed shot
        const dx = player.x - shooter.x, dy = player.y - shooter.y;
        const dist = Math.sqrt(dx*dx+dy*dy);
        eBullets.push({ x:shooter.x+8, y:shooter.y+10, vx:dx/dist*60, vy:dy/dist*60 });
      } else {
        eBullets.push({ x:shooter.x+8, y:shooter.y+10, vy:70+wave*5 });
      }
    }
  }

  // Bullet-invader collision
  for (let b = bullets.length-1; b >= 0; b--) {
    const bul = bullets[b];
    let hit = false;
    for (const inv of invaders) {
      if (!inv.alive) continue;
      if (Math.abs(bul.x - inv.x - 8) < 9 && Math.abs(bul.y - inv.y - 7) < 9) {
        inv.alive = false;
        score += inv.type.pts * wave;
        hit = true;
        playHit();
        // Explosion particles
        for (let p = 0; p < 8; p++) {
          const a = Math.random()*Math.PI*2;
          particles.push({
            x:inv.x+8, y:inv.y+7,
            vx:Math.cos(a)*(20+Math.random()*40),
            vy:Math.sin(a)*(20+Math.random()*40),
            life:1, color:inv.type.color, size:2
          });
        }
        // Powerup drop
        if (Math.random() < 0.05) {
          const types = ['rapid','shield','triple','bomb'];
          powerups.push({
            x:inv.x+8, y:inv.y+8,
            type:types[Math.floor(Math.random()*types.length)],
            vy:30
          });
        }
        break;
      }
    }
    if (hit) bullets.splice(b,1);
    else {
      // Bullet-shield
      for (let s = shields.length-1; s >= 0; s--) {
        const sh = shields[s];
        if (bul.x > sh.x && bul.x < sh.x+sh.w && bul.y > sh.y && bul.y < sh.y+sh.h) {
          sh.hp--;
          if (sh.hp <= 0) shields.splice(s,1);
          bullets.splice(b,1);
          break;
        }
      }
    }
  }

  // Invaders reaching bottom
  for (const inv of invaders) {
    if (inv.alive && inv.y + 16 > player.y - 5) {
      loseLife();
      break;
    }
  }

  // Powerups
  for (let i = powerups.length-1; i >= 0; i--) {
    const p = powerups[i];
    p.y += p.vy * dt;
    if (p.y > H+10) { powerups.splice(i,1); continue; }
    if (Math.abs(p.x-player.x)<12 && Math.abs(p.y-player.y)<12) {
      playPowerup();
      if (p.type === 'rapid') shootCooldown = -2; // 2s of rapid fire
      if (p.type === 'shield') lives = Math.min(5, lives+1);
      if (p.type === 'triple') {
        bullets.push({x:player.x-6,y:player.y-6,vy:-200});
        bullets.push({x:player.x+6,y:player.y-6,vy:-200});
        bullets.push({x:player.x,y:player.y-6,vy:-200});
      }
      if (p.type === 'bomb') {
        playExplosion();
        invaders.forEach(inv => {
          if (inv.alive) {
            inv.alive = false;
            score += 5;
            for (let p2=0;p2<4;p2++){
              const a=Math.random()*Math.PI*2;
              particles.push({x:inv.x+8,y:inv.y+7,vx:Math.cos(a)*30,vy:Math.sin(a)*30,
                life:1,color:inv.type.color,size:1.5});
            }
          }
        });
      }
      powerups.splice(i,1);
    }
  }

  // Particles
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.life -= dt * 2;
    if (p.life <= 0) particles.splice(i,1);
  }

  // Wave complete
  if (invaders.every(v => !v.alive)) {
    wave++;
    spawnWave();
  }
}

function loseLife() {
  lives--;
  playDeath();
  // Death particles
  for (let i = 0; i < 15; i++) {
    const a = Math.random()*Math.PI*2;
    particles.push({
      x:player.x, y:player.y,
      vx:Math.cos(a)*(30+Math.random()*50),
      vy:Math.sin(a)*(30+Math.random()*50),
      life:1, color:'#00ffcc', size:2
    });
  }
  if (lives <= 0) {
    gameState = 'gameover';
    if (score > hiScore) {
      hiScore = score;
      localStorage.setItem('neon-invaders-hi', hiScore);
    }
  } else {
    player.x = W/2;
  }
}

// --- Draw ---
function draw(t) {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (const s of starfield) {
    ctx.fillStyle = `rgba(255,255,255,${s.brightness})`;
    ctx.fillRect(Math.floor(s.x), Math.floor(s.y), 1, 1);
  }

  if (gameState === 'title') {
    ctx.fillStyle = '#00ffcc';
    ctx.font = '12px "Press Start 2P"';
    ctx.textAlign = 'center';
    ctx.fillText('NEON', W/2, H*0.3);
    ctx.fillStyle = '#ff0066';
    ctx.fillText('INVADERS', W/2, H*0.3+18);
    ctx.fillStyle = '#666';
    ctx.font = '6px "Press Start 2P"';
    ctx.fillText('PRESS SPACE', W/2, H*0.55);
    ctx.fillText('OR TAP FIRE', W/2, H*0.55+12);
    // Demo invaders
    drawSprite(animFrame%2?spriteA1:spriteA2, W/2-30, H*0.4, '#00ffcc', 2);
    drawSprite(animFrame%2?spriteB1:spriteB2, W/2-8, H*0.4, '#ff6600', 2);
    drawSprite(animFrame%2?spriteC1:spriteC2, W/2+16, H*0.4, '#ff0066', 2);
    if (hiScore > 0) {
      ctx.fillStyle = '#ff6600';
      ctx.font = '5px "Press Start 2P"';
      ctx.fillText('HI: '+hiScore, W/2, H*0.7);
    }
    return;
  }

  // Shields
  for (const sh of shields) {
    const alpha = sh.hp / 3;
    ctx.fillStyle = `rgba(0,255,100,${0.3+alpha*0.5})`;
    ctx.fillRect(sh.x, sh.y, sh.w, sh.h);
  }

  // Invaders
  for (const inv of invaders) {
    if (!inv.alive) continue;
    const spr = (animFrame||0) % 2 === 0 ? inv.type.s1 : inv.type.s2;
    drawSprite(spr, inv.x, inv.y, inv.type.color, 2);
  }

  // Player
  if (gameState === 'play') {
    drawSprite(playerSprite, player.x - 8, player.y - 8, '#00ffcc', 2);
    // Engine glow
    ctx.fillStyle = `rgba(0,255,200,${0.3+Math.sin(t*15)*0.2})`;
    ctx.fillRect(player.x-3, player.y+7, 6, 3);
  }

  // Bullets
  ctx.fillStyle = '#00ffcc';
  ctx.shadowColor = '#00ffcc';
  ctx.shadowBlur = 4;
  for (const b of bullets) {
    ctx.fillRect(b.x-1, b.y-3, 2, 6);
  }
  ctx.shadowBlur = 0;

  // Enemy bullets
  ctx.fillStyle = '#ff3333';
  ctx.shadowColor = '#ff3333';
  ctx.shadowBlur = 3;
  for (const b of eBullets) {
    ctx.fillRect(b.x-1, b.y-2, 2, 4);
  }
  ctx.shadowBlur = 0;

  // Powerups
  const pwrColors = { rapid:'#ffff00', shield:'#00ff66', triple:'#00ccff', bomb:'#ff6600' };
  const pwrIcons = { rapid:'R', shield:'+', triple:'T', bomb:'B' };
  for (const p of powerups) {
    ctx.fillStyle = pwrColors[p.type];
    ctx.fillRect(p.x-4, p.y-4, 8, 8);
    ctx.fillStyle = '#000';
    ctx.font = '5px "Press Start 2P"';
    ctx.textAlign = 'center';
    ctx.fillText(pwrIcons[p.type], p.x, p.y+2);
  }

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x-p.size/2, p.y-p.size/2, p.size, p.size);
  }
  ctx.globalAlpha = 1;

  // HUD
  ctx.fillStyle = '#00ffcc';
  ctx.font = '6px "Press Start 2P"';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE:' + score, 4, 10);
  ctx.textAlign = 'right';
  ctx.fillText('HI:' + hiScore, W-4, 10);
  ctx.textAlign = 'center';
  ctx.fillText('WAVE ' + wave, W/2, 10);

  // Lives
  for (let i = 0; i < lives; i++) {
    drawSprite(playerSprite, 4 + i*14, H-14, '#00ffcc', 1);
  }

  // Game over
  if (gameState === 'gameover') {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ff0066';
    ctx.font = '10px "Press Start 2P"';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', W/2, H*0.4);
    ctx.fillStyle = '#888';
    ctx.font = '6px "Press Start 2P"';
    ctx.fillText('SCORE: ' + score, W/2, H*0.5);
    ctx.fillText('WAVE: ' + wave, W/2, H*0.5+12);
    if (score >= hiScore && score > 0) {
      ctx.fillStyle = '#ffff00';
      ctx.fillText('NEW HIGH SCORE!', W/2, H*0.5+28);
    }
    ctx.fillStyle = '#555';
    ctx.font = '5px "Press Start 2P"';
    ctx.fillText('SPACE / TAP TO RETRY', W/2, H*0.7);
  }
}

// --- Loop ---
let lastTime = 0;
gameState = 'title';
animFrame = 0;
initStars();

function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min((ts - lastTime) / 1000, 0.05);
  lastTime = ts;
  if (gameState === 'title') {
    if (Math.random()<0.1) animFrame = (animFrame||0)+1;
  }
  update(dt);
  draw(ts / 1000);
}
requestAnimationFrame(loop);

// Tick title anim
setInterval(()=>{ if(gameState==='title') animFrame=(animFrame||0)+1; }, 500);
</script>
