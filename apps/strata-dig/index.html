<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Strata — Dig Through Earth for Rare Gems</title>
<link rel="icon" href="https://emojicdn.elk.sh/%E2%9B%8F%EF%B8%8F">
<meta property="og:title" content="Strata">
<meta property="og:description" content="Dig through geological layers. Find gold, emeralds, diamonds, and rarer things deeper down.">
<meta property="og:url" content="https://sloppy.live/strata-dig">
<meta property="og:image" content="https://sloppy.live/strata-dig/og-image.png">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik+Mono+One&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #120906;
  --ink: #f0e3c8;
  --ink-dim: #a08a6e;
  --accent: #ffbc4a;
  --accent-2: #ff6a2e;
  --panel: rgba(30, 18, 10, 0.85);
  --border: #5a3a1e;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: var(--bg);
  color: var(--ink);
  font-family: 'Space Mono', monospace;
  overflow: hidden;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
body {
  background:
    radial-gradient(ellipse at top, #2a1608 0%, #120906 60%),
    var(--bg);
}
.app {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
  background: rgba(18, 9, 6, 0.9);
  backdrop-filter: blur(6px);
  z-index: 10;
}
.logo {
  font-family: 'Rubik Mono One', sans-serif;
  font-size: 20px;
  letter-spacing: 2px;
  color: var(--accent);
  text-shadow: 0 0 18px rgba(255, 188, 74, 0.4);
}
.logo .sub {
  display: block;
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 4px;
  color: var(--ink-dim);
  margin-top: 2px;
}
.stats {
  display: flex;
  gap: 14px;
  font-size: 11px;
}
.stat {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
}
.stat .label {
  font-size: 8px;
  letter-spacing: 1.5px;
  color: var(--ink-dim);
  text-transform: uppercase;
}
.stat .val {
  font-family: 'Rubik Mono One', sans-serif;
  font-size: 15px;
  color: var(--ink);
}
.stat.gold .val { color: var(--accent); }
.stat.depth .val { color: #ff9c5e; }

main {
  flex: 1;
  display: flex;
  min-height: 0;
  position: relative;
}

#shaft {
  flex: 1;
  display: block;
  background: #0a0503;
  cursor: crosshair;
  touch-action: none;
}

.side {
  width: 220px;
  background: var(--panel);
  border-left: 1px solid var(--border);
  padding: 14px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.side h3 {
  font-family: 'Rubik Mono One', sans-serif;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--accent);
  margin-bottom: 8px;
  border-bottom: 1px dashed var(--border);
  padding-bottom: 6px;
}
.section { font-size: 11px; }
.gem-list {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
}
.gem-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 7px;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: rgba(0, 0, 0, 0.3);
  font-size: 10px;
}
.gem-row.locked { opacity: 0.35; }
.gem-dot {
  width: 10px;
  height: 10px;
  border-radius: 2px;
  flex-shrink: 0;
  box-shadow: 0 0 6px currentColor;
}
.gem-row .count {
  margin-left: auto;
  font-weight: 700;
  color: var(--accent);
}
.upgrade {
  display: flex;
  flex-direction: column;
  padding: 8px 10px;
  border: 1px solid var(--border);
  background: rgba(0, 0, 0, 0.35);
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 6px;
}
.upgrade:hover:not(.disabled) {
  border-color: var(--accent);
  transform: translateX(-2px);
  box-shadow: -3px 0 12px rgba(255, 188, 74, 0.2);
}
.upgrade.disabled { opacity: 0.4; cursor: not-allowed; }
.upgrade .name {
  font-size: 10px;
  letter-spacing: 0.5px;
  color: var(--ink);
  margin-bottom: 3px;
}
.upgrade .desc {
  font-size: 9px;
  color: var(--ink-dim);
  margin-bottom: 4px;
  line-height: 1.3;
}
.upgrade .cost {
  font-size: 10px;
  color: var(--accent);
  font-weight: 700;
}
.upgrade .lv {
  font-size: 9px;
  color: var(--accent-2);
  float: right;
}
.tool {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 9px;
  border: 1px solid var(--border);
  background: rgba(0, 0, 0, 0.35);
  border-radius: 4px;
  margin-bottom: 6px;
  cursor: pointer;
  transition: all 0.15s;
}
.tool:hover { border-color: var(--accent); }
.tool.armed {
  border-color: var(--accent-2);
  background: rgba(255, 106, 46, 0.18);
  box-shadow: 0 0 12px rgba(255, 106, 46, 0.4);
}
.tool .ic { font-size: 18px; }
.tool .body { flex: 1; min-width: 0; }
.tool .name { font-size: 10px; color: var(--ink); }
.tool .meta { font-size: 9px; color: var(--ink-dim); }
.tool .count {
  font-family: 'Rubik Mono One', sans-serif;
  font-size: 13px;
  color: var(--accent);
  min-width: 18px;
  text-align: right;
}
.tool .buybtn {
  font-size: 9px;
  padding: 3px 7px;
  border: 1px solid var(--accent);
  color: var(--accent);
  background: transparent;
  border-radius: 3px;
  cursor: pointer;
  font-family: inherit;
  letter-spacing: 0.5px;
}
.tool .buybtn:hover:not(:disabled) { background: var(--accent); color: #120906; }
.tool .buybtn:disabled { opacity: 0.35; cursor: not-allowed; }
.arm-banner {
  position: absolute;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(255, 106, 46, 0.15);
  border: 1px solid var(--accent-2);
  padding: 6px 14px;
  border-radius: 3px;
  font-size: 10px;
  letter-spacing: 1.5px;
  color: var(--accent-2);
  pointer-events: none;
  animation: armpulse 1.2s infinite;
}
@keyframes armpulse {
  0%, 100% { box-shadow: 0 0 8px rgba(255, 106, 46, 0.3); }
  50% { box-shadow: 0 0 24px rgba(255, 106, 46, 0.7); }
}
.overlay-hint {
  position: absolute;
  top: 14px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(18, 9, 6, 0.85);
  border: 1px solid var(--border);
  padding: 8px 14px;
  border-radius: 4px;
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--ink-dim);
  pointer-events: none;
  animation: fadeOut 8s forwards;
}
@keyframes fadeOut {
  0%, 60% { opacity: 1; }
  100% { opacity: 0; }
}
.layer-label {
  position: absolute;
  left: 10px;
  font-size: 9px;
  letter-spacing: 2px;
  color: rgba(255, 188, 74, 0.35);
  pointer-events: none;
  font-family: 'Rubik Mono One', sans-serif;
  text-shadow: 0 0 4px rgba(0,0,0,0.8);
}
footer {
  padding: 6px 14px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  font-size: 9px;
  color: var(--ink-dim);
  background: rgba(18, 9, 6, 0.9);
}
footer a { color: var(--accent); text-decoration: none; }
.footerbtn {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--accent);
  font-family: inherit;
  font-size: 10px;
  letter-spacing: 1px;
  padding: 3px 10px;
  border-radius: 3px;
  cursor: pointer;
}
.footerbtn:hover {
  border-color: var(--accent);
  background: rgba(255, 188, 74, 0.1);
}
.modal {
  position: fixed;
  inset: 0;
  background: rgba(8, 4, 2, 0.85);
  backdrop-filter: blur(4px);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 100;
  padding: 20px;
}
.modal.show { display: flex; }
.modal-card {
  background: #1a0f08;
  border: 1px solid var(--accent);
  border-radius: 6px;
  max-width: 520px;
  width: 100%;
  max-height: 85vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 0 60px rgba(255, 188, 74, 0.3);
  overflow: hidden;
}
.modal-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 18px;
  border-bottom: 1px solid var(--border);
  background: rgba(255, 188, 74, 0.06);
}
.modal-head h2 {
  font-family: 'Rubik Mono One', sans-serif;
  font-size: 14px;
  letter-spacing: 2px;
  color: var(--accent);
}
.modal-head button {
  background: transparent;
  border: none;
  color: var(--ink-dim);
  font-size: 26px;
  cursor: pointer;
  line-height: 1;
  padding: 0 4px;
}
.modal-head button:hover { color: var(--accent); }
.lb-submit {
  padding: 12px 18px;
  display: flex;
  gap: 10px;
  align-items: flex-end;
  border-bottom: 1px dashed var(--border);
  flex-wrap: wrap;
}
.lb-submit label {
  font-size: 9px;
  letter-spacing: 1.5px;
  color: var(--ink-dim);
  text-transform: uppercase;
  display: flex;
  flex-direction: column;
  gap: 4px;
  flex: 1;
  min-width: 150px;
}
.lb-submit input {
  background: #0a0503;
  border: 1px solid var(--border);
  color: var(--ink);
  padding: 7px 10px;
  border-radius: 3px;
  font-family: 'Space Mono', monospace;
  font-size: 13px;
  outline: none;
}
.lb-submit input:focus { border-color: var(--accent); }
.lb-submit button {
  background: var(--accent);
  color: #120906;
  border: none;
  padding: 8px 14px;
  font-family: 'Rubik Mono One', sans-serif;
  font-size: 10px;
  letter-spacing: 1px;
  border-radius: 3px;
  cursor: pointer;
}
.lb-submit button:hover { background: #ffd47a; }
.lb-submit button:disabled { opacity: 0.5; cursor: wait; }
.lb-msg {
  padding: 0 18px;
  font-size: 10px;
  color: var(--accent-2);
  min-height: 14px;
}
.lb-msg.ok { color: #7dff9a; }
.lb-list {
  list-style: none;
  overflow-y: auto;
  padding: 10px 18px 18px;
  margin: 0;
  flex: 1;
}
.lb-list li {
  display: grid;
  grid-template-columns: 28px 1fr auto auto;
  gap: 10px;
  align-items: baseline;
  padding: 7px 8px;
  border-bottom: 1px solid rgba(90, 58, 30, 0.4);
  font-size: 12px;
}
.lb-list .lb-rank {
  font-family: 'Rubik Mono One', sans-serif;
  color: var(--ink-dim);
  font-size: 11px;
}
.lb-list li:nth-child(1) .lb-rank { color: #ffd700; }
.lb-list li:nth-child(2) .lb-rank { color: #c0c8d6; }
.lb-list li:nth-child(3) .lb-rank { color: #cd7f32; }
.lb-list .lb-name { color: var(--ink); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.lb-list .lb-val { color: var(--accent); font-weight: 700; font-family: 'Rubik Mono One', sans-serif; }
.lb-list .lb-depth { color: var(--ink-dim); font-size: 9px; }
.lb-empty { display: block !important; text-align: center; color: var(--ink-dim); padding: 20px; }
.toast {
  position: absolute;
  left: 50%;
  top: 60px;
  transform: translateX(-50%) translateY(-30px);
  background: rgba(18, 9, 6, 0.95);
  border: 1px solid var(--accent);
  padding: 10px 18px;
  border-radius: 3px;
  font-family: 'Rubik Mono One', sans-serif;
  font-size: 12px;
  letter-spacing: 2px;
  color: var(--accent);
  box-shadow: 0 0 30px rgba(255, 188, 74, 0.4);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s, transform 0.3s;
  z-index: 20;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 720px) {
  .side { width: 160px; padding: 10px; }
  .stats { gap: 8px; }
  .stat .val { font-size: 13px; }
  .logo { font-size: 15px; }
  .gem-list { grid-template-columns: 1fr; }
}
@media (max-width: 520px) {
  main { flex-direction: column; }
  .side {
    width: 100%;
    max-height: 38%;
    border-left: none;
    border-top: 1px solid var(--border);
  }
}
</style>

<script type="module">
import supabase from './supabase-config.js';
async function initAuth() {
  try {
    const s = await supabase.auth.getSession();
    if (!s.data.session) await supabase.auth.signInAnonymously();
  } catch (e) {}
}
async function loadLB() {
  try {
    const { data, error } = await supabase.from('strata_dig_scores')
      .select('display_name,total_value,depth,gems_found')
      .order('total_value', { ascending: false }).limit(20);
    if (error) return null;
    return data;
  } catch (e) { return null; }
}
async function submitScore(name, total, depth, gemsFound, rare) {
  try {
    const s = await supabase.auth.getSession();
    const uid = s.data.session ? s.data.session.user.id : null;
    if (!uid) return { ok: false, reason: 'auth' };
    // upsert-by-user: update if exists (and higher), else insert
    const existing = await supabase.from('strata_dig_scores')
      .select('total_value').eq('user_id', uid).limit(1);
    if (existing.data && existing.data.length > 0) {
      if (total <= existing.data[0].total_value) return { ok: true, improved: false };
      const { error } = await supabase.from('strata_dig_scores')
        .update({ display_name: name, total_value: total, depth, gems_found: gemsFound, rare_gems: rare })
        .eq('user_id', uid);
      return { ok: !error, improved: true, error };
    } else {
      const { error } = await supabase.from('strata_dig_scores').insert({
        display_name: name, total_value: total, depth, gems_found: gemsFound, rare_gems: rare, user_id: uid
      });
      return { ok: !error, improved: true, error };
    }
  } catch (e) { return { ok: false, reason: 'exc' }; }
}
window._lbLoad = loadLB;
window._lbSubmit = submitScore;
initAuth();
</script>

      name: 'AUTO-DRILL', desc: 'Mine one random exposed tile/sec', lv: 0,
      base: 800, mul: 2.8
    },
  };

  // ---------- state ----------
  const state = {
    gold: 0,
    tilesDug: 0,
    gemCounts: {},
    camY: 0,          // world pixel y at top of viewport
    tiles: new Map(), // key "x,y" -> { hp, maxHp, gem, layerIdx }
    dug: new Set(),   // "x,y"
    particles: [],
    floaters: [],
    sparkles: [],
    explosives: { dynamite: 0, tnt: 0, mega: 0 },
    armedTool: null,  // key of EXPLOSIVES or null
    shockwaves: [],
    totalValue: 0,    // lifetime gem value collected (never decreases on spend)
  };
  for (const k of Object.keys(GEMS)) state.gemCounts[k] = 0;

  // ---------- save / load ----------
  const SAVE_KEY = 'strata-dig-save-v2';
  function save() {
    try {
      localStorage.setItem(SAVE_KEY, JSON.stringify({
        gold: state.gold,
        tilesDug: state.tilesDug,
        gemCounts: state.gemCounts,
        dug: Array.from(state.dug),
        camY: state.camY,
        upgrades: Object.fromEntries(Object.entries(UPGRADES).map(([k,v]) => [k, v.lv])),
        explosives: state.explosives,
        totalValue: state.totalValue,
      }));
    } catch (e) {}
  }
  function load() {
    try {
      const raw = localStorage.getItem(SAVE_KEY);
      if (!raw) return;
      const d = JSON.parse(raw);
      state.gold = d.gold || 0;
      state.tilesDug = d.tilesDug || 0;
      state.gemCounts = { ...state.gemCounts, ...(d.gemCounts || {}) };
      state.dug = new Set(d.dug || []);
      state.camY = d.camY || 0;
      if (d.upgrades) for (const k in d.upgrades) if (UPGRADES[k]) UPGRADES[k].lv = d.upgrades[k];
      if (d.explosives) state.explosives = { ...state.explosives, ...d.explosives };
      if (typeof d.totalValue === 'number') state.totalValue = d.totalValue;
    } catch (e) {}
  }
  load();

  // ---------- tile generation (deterministic per cell) ----------
  function hashXY(x, y) {
    let h = x * 374761393 + y * 668265263;
    h = (h ^ (h >>> 13)) * 1274126177;
    return ((h ^ (h >>> 16)) >>> 0) / 4294967295;
  }
  function layerFor(depthM) {
    let l = LAYERS[0];
    for (const L of LAYERS) if (depthM >= L.top) l = L;
    return l;
  }
  function getTile(x, y) {
    const key = x + ',' + y;
    if (state.tiles.has(key)) return state.tiles.get(key);
    if (y < 0 || x < 0 || x >= COLS) return null;
    const depthM = y * (CELL / 10); // 10px per meter
    const L = layerFor(depthM);
    const r = hashXY(x, y);
    const hp = Math.floor(L.hmin + r * (L.hmax - L.hmin + 0.99));
    let gem = null;
    const luckMul = 1 + 0.15 * UPGRADES.luck.lv;
    let roll = hashXY(x + 999, y - 777);
    for (const [type, chance] of L.gems) {
      if (roll < chance * luckMul) { gem = type; break; }
      roll -= chance * luckMul;
    }
    const t = { hp, maxHp: hp, gem, layerIdx: LAYERS.indexOf(L) };
    state.tiles.set(key, t);
    return t;
  }

  // ---------- canvas sizing ----------
  let viewW = 0, viewH = 0, offsetX = 0;
  function resize() {
    const rect = canvas.getBoundingClientRect();
    viewW = rect.width;
    viewH = rect.height;
    canvas.width = Math.floor(viewW * devicePixelRatio);
    canvas.height = Math.floor(viewH * devicePixelRatio);
    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    offsetX = Math.max(0, (viewW - COLS * CELL) / 2);
  }
  window.addEventListener('resize', resize);

  // ---------- mining ----------
  function digAt(worldX, worldY, power) {
    const gx = Math.floor(worldX / CELL);
    const gy = Math.floor(worldY / CELL);
    const radius = 0.5 + 0.25 * UPGRADES.reach.lv;
    const rInt = Math.ceil(radius - 0.5);
    for (let dy = -rInt; dy <= rInt; dy++) {
      for (let dx = -rInt; dx <= rInt; dx++) {
        if (dx*dx + dy*dy > radius*radius + 0.01) continue;
        const x = gx + dx, y = gy + dy;
        if (x < 0 || x >= COLS || y < 0) continue;
        const key = x + ',' + y;
        if (state.dug.has(key)) continue;
        const t = getTile(x, y);
        if (!t) continue;
        t.hp -= power;
        if (t.hp <= 0) destroyTile(x, y, t);
        else hitSpark(x, y);
      }
    }
  }
  function destroyTile(x, y, t) {
    const key = x + ',' + y;
    state.dug.add(key);
    state.tilesDug++;
    // debris
    const cx = x * CELL + CELL/2;
    const cy = y * CELL + CELL/2;
    const L = LAYERS[t.layerIdx];
    for (let i = 0; i < 6; i++) {
      state.particles.push({
        x: cx, y: cy,
        vx: (Math.random()-0.5)*2.5,
        vy: -Math.random()*2 - 0.5,
        life: 30 + Math.random()*15,
        col: Math.random() < 0.5 ? L.col : L.col2,
        size: 2 + Math.random()*2,
      });
    }
    if (t.gem) {
      const g = GEMS[t.gem];
      const val = Math.round(g.price * (1 + 0.2 * UPGRADES.value.lv));
      state.gold += val;
      state.totalValue += val;
      state.gemCounts[t.gem] = (state.gemCounts[t.gem] || 0) + 1;
      state.floaters.push({ x: cx, y: cy, text: '+' + val, col: g.col, life: 60 });
      for (let i = 0; i < 16; i++) {
        const a = Math.random() * Math.PI * 2;
        state.particles.push({
          x: cx, y: cy,
          vx: Math.cos(a)*3, vy: Math.sin(a)*3,
          life: 40 + Math.random()*30,
          col: g.col,
          size: 2 + Math.random()*2,
          glow: true,
        });
      }
      // Rare gem toast
      if (g.price >= 160) showToast(g.name.toUpperCase() + ' +' + val);
    }
    // auto-deepen camera if player dug near the bottom of the viewport
    const tileBottom = (y + 1) * CELL;
    const viewBottom = state.camY + viewH;
    if (tileBottom > viewBottom - CELL * 3) {
      state.camY = Math.max(state.camY, tileBottom - viewH + CELL * 3);
    }
  }
  function detonate(worldX, worldY, key) {
    const def = EXPLOSIVES[key];
    if (!def) return;
    const gx = Math.floor(worldX / CELL);
    const gy = Math.floor(worldY / CELL);
    const r = def.radius;
    const gemMul = key === 'mega' ? 3 : key === 'tnt' ? 2 : 1;
    const rInt = Math.ceil(r);
    for (let dy = -rInt; dy <= rInt; dy++) {
      for (let dx = -rInt; dx <= rInt; dx++) {
        if (dx*dx + dy*dy > r*r) continue;
        const x = gx + dx, y = gy + dy;
        if (x < 0 || x >= COLS || y < 0) continue;
        const k2 = x + ',' + y;
        if (state.dug.has(k2)) continue;
        const t = getTile(x, y);
        if (!t) continue;
        // bonus gem value multiplier on explosion
        if (t.gem && gemMul > 1) {
          // temp boost via direct gold credit + floater, then destroy without gem
          const g = GEMS[t.gem];
          const baseVal = Math.round(g.price * (1 + 0.2 * UPGRADES.value.lv));
          const bonus = baseVal * (gemMul - 1);
          state.gold += bonus;
          state.totalValue += bonus;
          state.floaters.push({
            x: x * CELL + CELL/2, y: y * CELL + CELL/2,
            text: '×' + gemMul, col: '#ff6a2e', life: 55
          });
        }
        t.hp = 0;
        destroyTile(x, y, t);
      }
    }
    // shockwave ring + fireball particles
    const wx = gx * CELL + CELL/2;
    const wy = gy * CELL + CELL/2;
    state.shockwaves.push({ x: wx, y: wy, r: CELL * 0.5, max: r * CELL * 1.4, life: 28 });
    for (let i = 0; i < 40; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 2 + Math.random() * 5;
      state.particles.push({
        x: wx, y: wy,
        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        life: 30 + Math.random() * 30,
        col: Math.random() < 0.5 ? '#ffbc4a' : '#ff6a2e',
        size: 3 + Math.random() * 3,
        glow: true,
      });
    }
    showToast(def.name.toUpperCase() + '!');
  }

  function hitSpark(x, y) {
    const cx = x * CELL + CELL/2;
    const cy = y * CELL + CELL/2;
    for (let i = 0; i < 3; i++) {
      state.particles.push({
        x: cx, y: cy,
        vx: (Math.random()-0.5)*1.5,
        vy: -Math.random()*1.5,
        life: 14,
        col: '#fff0c8',
        size: 1.5,
      });
    }
  }

  // ---------- input ----------
  let dragging = false;
  let lastDig = 0;
  function eventToWorld(e) {
    const rect = canvas.getBoundingClientRect();
    const cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const cy = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    return { x: cx - offsetX, y: cy + state.camY };
  }
  function tryDig(e) {
    const { x, y } = eventToWorld(e);
    if (x < 0 || x > COLS * CELL) return;
    if (state.armedTool) {
      // require fresh click (not drag) for explosives
      if (!e._armClick) return;
      const key = state.armedTool;
      if ((state.explosives[key] || 0) <= 0) { disarm(); return; }
      state.explosives[key] -= 1;
      detonate(x, y, key);
      if (state.explosives[key] <= 0) disarm();
      renderHUD();
      return;
    }
    const now = performance.now();
    if (now - lastDig < Math.max(18, 40 - UPGRADES.pick.lv * 1.2)) return;
    lastDig = now;
    const power = UPGRADES.pick.lv;
    digAt(x, y, power);
  }

  function arm(key) {
    if ((state.explosives[key] || 0) <= 0) return;
    state.armedTool = key;
    canvas.style.cursor = 'cell';
    const banner = document.getElementById('armBanner');
    banner.style.display = 'block';
    banner.textContent = '⚠ ' + EXPLOSIVES[key].name.toUpperCase() + ' ARMED — CLICK TO DETONATE · ESC TO CANCEL';
    renderHUD();
  }
  function disarm() {
    state.armedTool = null;
    canvas.style.cursor = 'crosshair';
    document.getElementById('armBanner').style.display = 'none';
    renderHUD();
  }
  window.addEventListener('keydown', (e) => { if (e.key === 'Escape') disarm(); });
  canvas.addEventListener('mousedown', (e) => { dragging = true; e._armClick = true; tryDig(e); });
  canvas.addEventListener('mousemove', (e) => { if (dragging) tryDig(e); });
  window.addEventListener('mouseup', () => dragging = false);
  canvas.addEventListener('touchstart', (e) => { e.preventDefault(); dragging = true; e._armClick = true; tryDig(e); }, { passive: false });
  canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if (dragging) tryDig(e); }, { passive: false });
  canvas.addEventListener('touchend', () => dragging = false);

  // camera drag with right click / middle
  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    state.camY = Math.max(0, state.camY + e.deltaY);
  }, { passive: false });

  // ---------- rendering ----------
  function render(dt) {
    ctx.fillStyle = '#0a0503';
    ctx.fillRect(0, 0, viewW, viewH);

    // compute visible tile range
    const startY = Math.max(0, Math.floor(state.camY / CELL) - 1);
    const endY = Math.floor((state.camY + viewH) / CELL) + 1;

    ctx.save();
    ctx.translate(offsetX, -state.camY);

    // draw tiles
    for (let y = startY; y <= endY; y++) {
      for (let x = 0; x < COLS; x++) {
        const key = x + ',' + y;
        const dug = state.dug.has(key);
        const px = x * CELL, py = y * CELL;
        if (dug) {
          // dug space — dark void with faint ambient
          ctx.fillStyle = '#050302';
          ctx.fillRect(px, py, CELL, CELL);
          continue;
        }
        const t = getTile(x, y);
        if (!t) continue;
        const L = LAYERS[t.layerIdx];
        // base color varies slightly with hash
        const r = hashXY(x + 17, y + 31);
        ctx.fillStyle = r < 0.5 ? L.col : L.col2;
        ctx.fillRect(px, py, CELL, CELL);
        // damage overlay
        if (t.hp < t.maxHp) {
          const dmg = 1 - t.hp / t.maxHp;
          ctx.fillStyle = 'rgba(0,0,0,' + (dmg * 0.5) + ')';
          ctx.fillRect(px, py, CELL, CELL);
          // crack marks
          ctx.strokeStyle = 'rgba(0,0,0,0.6)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(px + 4, py + 4);
          ctx.lineTo(px + CELL - 4, py + CELL - 6);
          ctx.moveTo(px + CELL - 5, py + 5);
          ctx.lineTo(px + 5, py + CELL - 5);
          ctx.stroke();
        }
        // gem peek when partially damaged
        if (t.gem && t.hp < t.maxHp) {
          const g = GEMS[t.gem];
          ctx.fillStyle = g.col;
          ctx.globalAlpha = 0.85;
          const s = CELL * 0.45;
          ctx.fillRect(px + (CELL - s)/2, py + (CELL - s)/2, s, s);
          ctx.globalAlpha = 1;
          if (g.glow) {
            ctx.shadowColor = g.col;
            ctx.shadowBlur = 8;
            ctx.fillRect(px + (CELL - s)/2, py + (CELL - s)/2, s, s);
            ctx.shadowBlur = 0;
          }
        }
        // subtle grid line
        ctx.strokeStyle = 'rgba(0,0,0,0.25)';
        ctx.lineWidth = 1;
        ctx.strokeRect(px + 0.5, py + 0.5, CELL - 1, CELL - 1);
      }
    }

    // layer labels
    ctx.font = '9px "Rubik Mono One", sans-serif';
    ctx.fillStyle = 'rgba(255, 188, 74, 0.35)';
    for (const L of LAYERS) {
      const labelY = (L.top * 10 / CELL) * CELL; // reverse depthM mapping
      const yPix = Math.floor(L.top * 10 / CELL) * CELL;
      if (yPix > state.camY - 50 && yPix < state.camY + viewH + 50) {
        ctx.fillText(L.name, -offsetX + 8, yPix + 12);
      }
    }

    // particles
    for (let i = state.particles.length - 1; i >= 0; i--) {
      const p = state.particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.15;
      p.life -= 1;
      if (p.life <= 0) { state.particles.splice(i, 1); continue; }
      const a = Math.max(0, p.life / 40);
      ctx.globalAlpha = a;
      if (p.glow) {
        ctx.shadowColor = p.col;
        ctx.shadowBlur = 6;
      }
      ctx.fillStyle = p.col;
      ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
      ctx.shadowBlur = 0;
    }
    ctx.globalAlpha = 1;

    // shockwaves
    for (let i = state.shockwaves.length - 1; i >= 0; i--) {
      const s = state.shockwaves[i];
      s.r += (s.max - s.r) * 0.22;
      s.life -= 1;
      if (s.life <= 0) { state.shockwaves.splice(i, 1); continue; }
      const a = s.life / 28;
      ctx.strokeStyle = 'rgba(255, 188, 74,' + a + ')';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.strokeStyle = 'rgba(255, 106, 46,' + (a * 0.6) + ')';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r * 0.75, 0, Math.PI * 2);
      ctx.stroke();
    }

    // floaters
    ctx.font = 'bold 12px "Space Mono", monospace';
    ctx.textAlign = 'center';
    for (let i = state.floaters.length - 1; i >= 0; i--) {
      const f = state.floaters[i];
      f.y -= 0.7;
      f.life -= 1;
      if (f.life <= 0) { state.floaters.splice(i, 1); continue; }
      const a = f.life / 60;
      ctx.globalAlpha = a;
      ctx.fillStyle = '#000';
      ctx.fillText(f.text, f.x + 1, f.y + 1);
      ctx.fillStyle = f.col;
      ctx.fillText(f.text, f.x, f.y);
    }
    ctx.globalAlpha = 1;
    ctx.textAlign = 'left';

    ctx.restore();

    // depth fog at bottom
    const grad = ctx.createLinearGradient(0, viewH - 60, 0, viewH);
    grad.addColorStop(0, 'rgba(10,5,3,0)');
    grad.addColorStop(1, 'rgba(10,5,3,0.9)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, viewH - 60, viewW, 60);
  }

  // ---------- HUD ----------
  const goldEl = document.getElementById('goldVal');
  const depthEl = document.getElementById('depthVal');
  const pickEl = document.getElementById('pickVal');
  const tilesEl = document.getElementById('tilesDug');
  const gemListEl = document.getElementById('gemList');
  const upgradesEl = document.getElementById('upgrades');
  const toolsEl = document.getElementById('tools');

  function formatNum(n) {
    if (n >= 1e6) return (n/1e6).toFixed(2) + 'M';
    if (n >= 1e3) return (n/1e3).toFixed(1) + 'k';
    return n.toString();
  }

  function maxDugDepth() {
    let max = 0;
    for (const k of state.dug) {
      const y = parseInt(k.split(',')[1]);
      if (y > max) max = y;
    }
    return max;
  }

  function renderHUD() {
    goldEl.textContent = formatNum(state.gold);
    const depthM = Math.floor(maxDugDepth() * CELL / 10);
    depthEl.textContent = depthM + 'm';
    pickEl.textContent = UPGRADES.pick.lv;
    tilesEl.textContent = 'tiles: ' + state.tilesDug;

    // gems
    let html = '';
    const order = Object.keys(GEMS);
    for (const k of order) {
      const c = state.gemCounts[k] || 0;
      const g = GEMS[k];
      html += `<div class="gem-row${c === 0 ? ' locked' : ''}">
        <span class="gem-dot" style="background:${g.col};color:${g.col}"></span>
        <span>${g.name}</span>
        <span class="count">${c}</span>
      </div>`;
    }
    gemListEl.innerHTML = html;

    // upgrades
    let uh = '';
    for (const [k, u] of Object.entries(UPGRADES)) {
      const cost = Math.floor(u.base * Math.pow(u.mul, u.lv));
      const disabled = state.gold < cost;
      let name = u.name, desc = u.desc;
      if (k === 'pick') {
        const t = drillTier(u.lv);
        name = t.name;
        desc = t.desc;
      }
      uh += `<div class="upgrade${disabled ? ' disabled' : ''}" data-k="${k}">
        <span class="lv">Lv ${u.lv}</span>
        <div class="name">${name}</div>
        <div class="desc">${desc}</div>
        <div class="cost">${formatNum(cost)} gold</div>
      </div>`;
    }
    upgradesEl.innerHTML = uh;
    upgradesEl.querySelectorAll('.upgrade').forEach(el => {
      el.addEventListener('click', () => {
        const k = el.dataset.k;
        const u = UPGRADES[k];
        const cost = Math.floor(u.base * Math.pow(u.mul, u.lv));
        if (state.gold < cost) return;
        state.gold -= cost;
        u.lv += 1;
        renderHUD();
      });
    });

    // tools (explosives)
    let th = '';
    for (const [k, def] of Object.entries(EXPLOSIVES)) {
      const count = state.explosives[k] || 0;
      const canBuy = state.gold >= def.cost;
      const armed = state.armedTool === k;
      th += `<div class="tool${armed ? ' armed' : ''}" data-k="${k}">
        <span class="ic">${def.icon}</span>
        <div class="body">
          <div class="name">${def.name}</div>
          <div class="meta">${def.meta}</div>
        </div>
        <span class="count">${count}</span>
        <button class="buybtn" data-buy="${k}" ${canBuy ? '' : 'disabled'}>${formatNum(def.cost)}</button>
      </div>`;
    }
    toolsEl.innerHTML = th;
    toolsEl.querySelectorAll('.buybtn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const k = btn.dataset.buy;
        const def = EXPLOSIVES[k];
        if (state.gold < def.cost) return;
        state.gold -= def.cost;
        state.explosives[k] = (state.explosives[k] || 0) + 1;
        renderHUD();
      });
    });
    toolsEl.querySelectorAll('.tool').forEach(el => {
      el.addEventListener('click', () => {
        const k = el.dataset.k;
        if ((state.explosives[k] || 0) <= 0) return;
        if (state.armedTool === k) disarm();
        else arm(k);
      });
    });
  }

  function showToast(text) {
    toast.textContent = text;
    toast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toast.classList.remove('show'), 1800);
  }

  // ---------- auto-drill ----------
  let autoAcc = 0;
  function tickAuto(dt) {
    if (UPGRADES.auto.lv <= 0) return;
    autoAcc += dt * UPGRADES.auto.lv;
    while (autoAcc >= 1000) {
      autoAcc -= 1000;
      // find a random "exposed" (neighbor-dug) tile
      const candidates = [];
      for (const key of state.dug) {
        const [x, y] = key.split(',').map(Number);
        const neigh = [[x+1,y],[x-1,y],[x,y+1],[x,y-1]];
        for (const [nx, ny] of neigh) {
          if (nx < 0 || nx >= COLS || ny < 0) continue;
          if (state.dug.has(nx+','+ny)) continue;
          candidates.push([nx, ny]);
        }
      }
      if (candidates.length === 0) {
        // dig at surface
        candidates.push([Math.floor(Math.random()*COLS), 0]);
      }
      const [tx, ty] = candidates[Math.floor(Math.random()*candidates.length)];
      const t = getTile(tx, ty);
      if (t) {
        t.hp -= Math.max(1, UPGRADES.pick.lv);
        if (t.hp <= 0) destroyTile(tx, ty, t);
        else hitSpark(tx, ty);
      }
    }
  }

  // ---------- loop ----------
  let lastT = performance.now();
  let hudAcc = 0, saveAcc = 0;
  function loop(t) {
    const dt = Math.min(60, t - lastT);
    lastT = t;
    tickAuto(dt);
    render(dt);
    hudAcc += dt;
    if (hudAcc >= 120) {
      renderHUD();
      hudAcc = 0;
    }
    saveAcc += dt;
    if (saveAcc >= 4000) {
      save();
      saveAcc = 0;
    }
    requestAnimationFrame(loop);
  }

  // ---------- leaderboard modal ----------
  const lbModal = document.getElementById('lbModal');
  const lbBtn = document.getElementById('lbBtn');
  const lbClose = document.getElementById('lbClose');
  const lbName = document.getElementById('lbName');
  const lbSubmit = document.getElementById('lbSubmit');
  const lbList = document.getElementById('lbList');
  const lbMsg = document.getElementById('lbMsg');

  const savedName = localStorage.getItem('strata-dig-name');
  if (savedName) lbName.value = savedName;

  async function refreshLB() {
    lbList.innerHTML = '<li class="lb-empty">Loading…</li>';
    const rows = await (window._lbLoad ? window._lbLoad() : Promise.resolve(null));
    if (!rows) {
      lbList.innerHTML = '<li class="lb-empty">Leaderboard unavailable.</li>';
      return;
    }
    if (rows.length === 0) {
      lbList.innerHTML = '<li class="lb-empty">No miners yet — be the first!</li>';
      return;
    }
    lbList.innerHTML = rows.map((r, i) => {
      const name = (r.display_name || 'anon').replace(/[<>]/g, '');
      return `<li>
        <span class="lb-rank">#${i + 1}</span>
        <span class="lb-name">${name}</span>
        <span class="lb-val">${formatNum(r.total_value || 0)}g</span>
        <span class="lb-depth">${r.depth || 0}m</span>
      </li>`;
    }).join('');
  }

  lbBtn.addEventListener('click', () => {
    lbModal.classList.add('show');
    lbMsg.textContent = '';
    lbMsg.className = 'lb-msg';
    refreshLB();
  });
  lbClose.addEventListener('click', () => lbModal.classList.remove('show'));
  lbModal.addEventListener('click', (e) => {
    if (e.target === lbModal) lbModal.classList.remove('show');
  });

  lbSubmit.addEventListener('click', async () => {
    const name = (lbName.value || 'anon').trim().slice(0, 18) || 'anon';
    localStorage.setItem('strata-dig-name', name);
    if (!window._lbSubmit) {
      lbMsg.textContent = 'Leaderboard offline.';
      return;
    }
    if (state.totalValue <= 0) {
      lbMsg.textContent = 'Dig some gems first!';
      return;
    }
    lbSubmit.disabled = true;
    lbMsg.textContent = 'Submitting…';
    lbMsg.className = 'lb-msg';
    const depthM = Math.floor(maxDugDepth() * CELL / 10);
    const gemsFound = Object.values(state.gemCounts).reduce((a,b) => a + b, 0);
    const rare = {};
    for (const [k, c] of Object.entries(state.gemCounts)) if (c > 0 && GEMS[k].price >= 160) rare[k] = c;
    const res = await window._lbSubmit(name, state.totalValue, depthM, gemsFound, rare);
    lbSubmit.disabled = false;
    if (res && res.ok) {
      lbMsg.textContent = res.improved ? '✓ Score submitted!' : 'Your best is already on the board.';
      lbMsg.className = 'lb-msg ok';
      refreshLB();
    } else {
      lbMsg.textContent = 'Submit failed — are you online?';
    }
  });

  resize();
  renderHUD();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
