<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Strata — Dig Through Earth for Rare Gems</title>
<link rel="icon" href="https://emojicdn.elk.sh/%E2%9B%8F%EF%B8%8F">
<meta property="og:title" content="Strata">
<meta property="og:description" content="Dig through geological layers. Find gold, emeralds, diamonds, and rarer things deeper down.">
<meta property="og:url" content="https://sloppy.live/strata-dig">
<meta property="og:image" content="https://sloppy.live/strata-dig/og-image.png">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik+Mono+One&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #120906;
  --ink: #f0e3c8;
  --ink-dim: #a08a6e;
  --accent: #ffbc4a;
  --accent-2: #ff6a2e;
  --panel: rgba(30, 18, 10, 0.85);
  --border: #5a3a1e;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: var(--bg);
  color: var(--ink);
  font-family: 'Space Mono', monospace;
  overflow: hidden;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
body {
  background:
    radial-gradient(ellipse at top, #2a1608 0%, #120906 60%),
    var(--bg);
}
.app {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
}
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 18px;
  border-bottom: 1px solid var(--border);
  background: rgba(18, 9, 6, 0.9);
  backdrop-filter: blur(6px);
  z-index: 10;
}
.logo {
  font-family: 'Rubik Mono One', sans-serif;
  font-size: 20px;
  letter-spacing: 2px;
  color: var(--accent);
  text-shadow: 0 0 18px rgba(255, 188, 74, 0.4);
}
.logo .sub {
  display: block;
  font-family: 'Space Mono', monospace;
  font-size: 9px;
  letter-spacing: 4px;
  color: var(--ink-dim);
  margin-top: 2px;
}
.stats {
  display: flex;
  gap: 14px;
  font-size: 11px;
}
.stat {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
}
.stat .label {
  font-size: 8px;
  letter-spacing: 1.5px;
  color: var(--ink-dim);
  text-transform: uppercase;
}
.stat .val {
  font-family: 'Rubik Mono One', sans-serif;
  font-size: 15px;
  color: var(--ink);
}
.stat.gold .val { color: var(--accent); }
.stat.depth .val { color: #ff9c5e; }

main {
  flex: 1;
  display: flex;
  min-height: 0;
  position: relative;
}

#shaft {
  flex: 1;
  display: block;
  background: #0a0503;
  cursor: crosshair;
  touch-action: none;
}

.side {
  width: 220px;
  background: var(--panel);
  border-left: 1px solid var(--border);
  padding: 14px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.side h3 {
  font-family: 'Rubik Mono One', sans-serif;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--accent);
  margin-bottom: 8px;
  border-bottom: 1px dashed var(--border);
  padding-bottom: 6px;
}
.section { font-size: 11px; }
.gem-list {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 6px;
}
.gem-row {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 5px 7px;
  border: 1px solid var(--border);
  border-radius: 3px;
  background: rgba(0, 0, 0, 0.3);
  font-size: 10px;
}
.gem-row.locked { opacity: 0.35; }
.gem-dot {
  width: 10px;
  height: 10px;
  border-radius: 2px;
  flex-shrink: 0;
  box-shadow: 0 0 6px currentColor;
}
.gem-row .count {
  margin-left: auto;
  font-weight: 700;
  color: var(--accent);
}
.upgrade {
  display: flex;
  flex-direction: column;
  padding: 8px 10px;
  border: 1px solid var(--border);
  background: rgba(0, 0, 0, 0.35);
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.15s;
  margin-bottom: 6px;
}
.upgrade:hover:not(.disabled) {
  border-color: var(--accent);
  transform: translateX(-2px);
  box-shadow: -3px 0 12px rgba(255, 188, 74, 0.2);
}
.upgrade.disabled { opacity: 0.4; cursor: not-allowed; }
.upgrade .name {
  font-size: 10px;
  letter-spacing: 0.5px;
  color: var(--ink);
  margin-bottom: 3px;
}
.upgrade .desc {
  font-size: 9px;
  color: var(--ink-dim);
  margin-bottom: 4px;
  line-height: 1.3;
}
.upgrade .cost {
  font-size: 10px;
  color: var(--accent);
  font-weight: 700;
}
.upgrade .lv {
  font-size: 9px;
  color: var(--accent-2);
  float: right;
}
.overlay-hint {
  position: absolute;
  top: 14px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(18, 9, 6, 0.85);
  border: 1px solid var(--border);
  padding: 8px 14px;
  border-radius: 4px;
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--ink-dim);
  pointer-events: none;
  animation: fadeOut 8s forwards;
}
@keyframes fadeOut {
  0%, 60% { opacity: 1; }
  100% { opacity: 0; }
}
.layer-label {
  position: absolute;
  left: 10px;
  font-size: 9px;
  letter-spacing: 2px;
  color: rgba(255, 188, 74, 0.35);
  pointer-events: none;
  font-family: 'Rubik Mono One', sans-serif;
  text-shadow: 0 0 4px rgba(0,0,0,0.8);
}
footer {
  padding: 6px 14px;
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  font-size: 9px;
  color: var(--ink-dim);
  background: rgba(18, 9, 6, 0.9);
}
footer a { color: var(--accent); text-decoration: none; }
.toast {
  position: absolute;
  left: 50%;
  top: 60px;
  transform: translateX(-50%) translateY(-30px);
  background: rgba(18, 9, 6, 0.95);
  border: 1px solid var(--accent);
  padding: 10px 18px;
  border-radius: 3px;
  font-family: 'Rubik Mono One', sans-serif;
  font-size: 12px;
  letter-spacing: 2px;
  color: var(--accent);
  box-shadow: 0 0 30px rgba(255, 188, 74, 0.4);
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s, transform 0.3s;
  z-index: 20;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

@media (max-width: 720px) {
  .side { width: 160px; padding: 10px; }
  .stats { gap: 8px; }
  .stat .val { font-size: 13px; }
  .logo { font-size: 15px; }
  .gem-list { grid-template-columns: 1fr; }
}
@media (max-width: 520px) {
  main { flex-direction: column; }
  .side {
    width: 100%;
    max-height: 38%;
    border-left: none;
    border-top: 1px solid var(--border);
  }
}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo">STRATA<span class="sub">DIG · DEEPER</span></div>
    <div class="stats">
      <div class="stat gold">
        <span class="label">Gold</span>
        <span class="val" id="goldVal">0</span>
      </div>
      <div class="stat depth">
        <span class="label">Depth</span>
        <span class="val" id="depthVal">0m</span>
      </div>
      <div class="stat">
        <span class="label">Pick Lv</span>
        <span class="val" id="pickVal">1</span>
      </div>
    </div>
  </header>
  <main>
    <canvas id="shaft"></canvas>
    <div class="overlay-hint">⛏  click or drag on the dirt to dig</div>
    <div class="toast" id="toast"></div>
    <aside class="side">
      <div class="section">
        <h3>Gems Found</h3>
        <div class="gem-list" id="gemList"></div>
      </div>
      <div class="section">
        <h3>Upgrades</h3>
        <div id="upgrades"></div>
      </div>
    </aside>
  </main>
  <footer>
    <span>◆ streamed live at <a href="https://sloppy.live" target="_blank">sloppy.live</a></span>
    <span id="tilesDug">tiles: 0</span>
  </footer>
</div>

<script>
(() => {
  const canvas = document.getElementById('shaft');
  const ctx = canvas.getContext('2d', { alpha: false });
  const toast = document.getElementById('toast');

  // ---------- config ----------
  const CELL = 22;              // tile size in px
  const COLS = 28;              // columns across world
  // layers define what lives at each depth band
  // each entry: { name, topDepth, hardnessMin, hardnessMax, bg, dirt, gems: [{type, chance}] }
  const LAYERS = [
    { name: 'TOPSOIL',  top:   0, hmin: 1, hmax: 1, col: '#5c3a1a', col2: '#3d2611',
      gems: [ ['pebble', 0.04] ] },
    { name: 'CLAY',     top:  30, hmin: 1, hmax: 2, col: '#6e4022', col2: '#471f0d',
      gems: [ ['pebble', 0.05], ['gold', 0.02] ] },
    { name: 'SANDSTONE',top:  80, hmin: 2, hmax: 2, col: '#8a5a2a', col2: '#4a2a10',
      gems: [ ['gold', 0.05], ['quartz', 0.03] ] },
    { name: 'LIMESTONE',top: 150, hmin: 2, hmax: 3, col: '#6a5230', col2: '#3a2810',
      gems: [ ['gold', 0.05], ['quartz', 0.04], ['ruby', 0.01] ] },
    { name: 'GRANITE',  top: 240, hmin: 3, hmax: 3, col: '#4a3a28', col2: '#241a0e',
      gems: [ ['gold', 0.04], ['ruby', 0.02], ['emerald', 0.015] ] },
    { name: 'BASALT',   top: 360, hmin: 3, hmax: 4, col: '#2e2820', col2: '#161212',
      gems: [ ['gold', 0.03], ['emerald', 0.02], ['sapphire', 0.018] ] },
    { name: 'OBSIDIAN', top: 500, hmin: 4, hmax: 4, col: '#1a1822', col2: '#0a080e',
      gems: [ ['sapphire', 0.025], ['amethyst', 0.02], ['diamond', 0.008] ] },
    { name: 'MAGMA',    top: 700, hmin: 4, hmax: 5, col: '#5a1a0a', col2: '#2a0804',
      gems: [ ['diamond', 0.015], ['meteorite', 0.012], ['starshard', 0.005] ] },
    { name: 'CORE',     top: 950, hmin: 5, hmax: 6, col: '#701414', col2: '#280404',
      gems: [ ['diamond', 0.02], ['starshard', 0.015], ['voidgem', 0.006] ] },
  ];

  const GEMS = {
    pebble:    { name: 'Pebble',    col: '#a89078', price: 1,    glow: false },
    gold:      { name: 'Gold',      col: '#ffc13a', price: 12,   glow: true },
    quartz:    { name: 'Quartz',    col: '#ead9c8', price: 25,   glow: true },
    ruby:      { name: 'Ruby',      col: '#ff3060', price: 80,   glow: true },
    emerald:   { name: 'Emerald',   col: '#3dffa2', price: 160,  glow: true },
    sapphire:  { name: 'Sapphire',  col: '#4a9cff', price: 280,  glow: true },
    amethyst:  { name: 'Amethyst',  col: '#b457ff', price: 450,  glow: true },
    diamond:   { name: 'Diamond',   col: '#e0f7ff', price: 900,  glow: true },
    meteorite: { name: 'Meteorite', col: '#ff7a20', price: 1500, glow: true },
    starshard: { name: 'Starshard', col: '#fff0a0', price: 2800, glow: true },
    voidgem:   { name: 'Void Gem',  col: '#c040ff', price: 6000, glow: true },
  };

  const UPGRADES = {
    pick: {
      name: 'PICK POWER', desc: '+1 damage per strike', lv: 1,
      base: 50, mul: 1.8
    },
    reach: {
      name: 'REACH', desc: '+0.25 tile radius (AOE dig)', lv: 0,
      base: 150, mul: 2.2
    },
    luck: {
      name: 'GEM LUCK', desc: '+15% gem spawn chance', lv: 0,
      base: 220, mul: 2.1
    },
    value: {
      name: 'APPRAISAL', desc: '+20% gold value', lv: 0,
      base: 300, mul: 2.0
    },
    auto: {
      name: 'AUTO-DRILL', desc: 'Mine one random exposed tile/sec', lv: 0,
      base: 800, mul: 2.8
    },
  };

  // ---------- state ----------
  const state = {
    gold: 0,
    tilesDug: 0,
    gemCounts: {},
    camY: 0,          // world pixel y at top of viewport
    tiles: new Map(), // key "x,y" -> { hp, maxHp, gem, layerIdx }
    dug: new Set(),   // "x,y"
    particles: [],
    floaters: [],
    sparkles: [],
  };
  for (const k of Object.keys(GEMS)) state.gemCounts[k] = 0;

  // ---------- save / load ----------
  const SAVE_KEY = 'strata-dig-save-v1';
  function save() {
    try {
      localStorage.setItem(SAVE_KEY, JSON.stringify({
        gold: state.gold,
        tilesDug: state.tilesDug,
        gemCounts: state.gemCounts,
        dug: Array.from(state.dug),
        camY: state.camY,
        upgrades: Object.fromEntries(Object.entries(UPGRADES).map(([k,v]) => [k, v.lv])),
      }));
    } catch (e) {}
  }
  function load() {
    try {
      const raw = localStorage.getItem(SAVE_KEY);
      if (!raw) return;
      const d = JSON.parse(raw);
      state.gold = d.gold || 0;
      state.tilesDug = d.tilesDug || 0;
      state.gemCounts = { ...state.gemCounts, ...(d.gemCounts || {}) };
      state.dug = new Set(d.dug || []);
      state.camY = d.camY || 0;
      if (d.upgrades) for (const k in d.upgrades) if (UPGRADES[k]) UPGRADES[k].lv = d.upgrades[k];
    } catch (e) {}
  }
  load();

  // ---------- tile generation (deterministic per cell) ----------
  function hashXY(x, y) {
    let h = x * 374761393 + y * 668265263;
    h = (h ^ (h >>> 13)) * 1274126177;
    return ((h ^ (h >>> 16)) >>> 0) / 4294967295;
  }
  function layerFor(depthM) {
    let l = LAYERS[0];
    for (const L of LAYERS) if (depthM >= L.top) l = L;
    return l;
  }
  function getTile(x, y) {
    const key = x + ',' + y;
    if (state.tiles.has(key)) return state.tiles.get(key);
    if (y < 0 || x < 0 || x >= COLS) return null;
    const depthM = y * (CELL / 10); // 10px per meter
    const L = layerFor(depthM);
    const r = hashXY(x, y);
    const hp = Math.floor(L.hmin + r * (L.hmax - L.hmin + 0.99));
    let gem = null;
    const luckMul = 1 + 0.15 * UPGRADES.luck.lv;
    let roll = hashXY(x + 999, y - 777);
    for (const [type, chance] of L.gems) {
      if (roll < chance * luckMul) { gem = type; break; }
      roll -= chance * luckMul;
    }
    const t = { hp, maxHp: hp, gem, layerIdx: LAYERS.indexOf(L) };
    state.tiles.set(key, t);
    return t;
  }

  // ---------- canvas sizing ----------
  let viewW = 0, viewH = 0, offsetX = 0;
  function resize() {
    const rect = canvas.getBoundingClientRect();
    viewW = rect.width;
    viewH = rect.height;
    canvas.width = Math.floor(viewW * devicePixelRatio);
    canvas.height = Math.floor(viewH * devicePixelRatio);
    ctx.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
    offsetX = Math.max(0, (viewW - COLS * CELL) / 2);
  }
  window.addEventListener('resize', resize);

  // ---------- mining ----------
  function digAt(worldX, worldY, power) {
    const gx = Math.floor(worldX / CELL);
    const gy = Math.floor(worldY / CELL);
    const radius = 0.5 + 0.25 * UPGRADES.reach.lv;
    const rInt = Math.ceil(radius - 0.5);
    for (let dy = -rInt; dy <= rInt; dy++) {
      for (let dx = -rInt; dx <= rInt; dx++) {
        if (dx*dx + dy*dy > radius*radius + 0.01) continue;
        const x = gx + dx, y = gy + dy;
        if (x < 0 || x >= COLS || y < 0) continue;
        const key = x + ',' + y;
        if (state.dug.has(key)) continue;
        const t = getTile(x, y);
        if (!t) continue;
        t.hp -= power;
        if (t.hp <= 0) destroyTile(x, y, t);
        else hitSpark(x, y);
      }
    }
  }
  function destroyTile(x, y, t) {
    const key = x + ',' + y;
    state.dug.add(key);
    state.tilesDug++;
    // debris
    const cx = x * CELL + CELL/2;
    const cy = y * CELL + CELL/2;
    const L = LAYERS[t.layerIdx];
    for (let i = 0; i < 6; i++) {
      state.particles.push({
        x: cx, y: cy,
        vx: (Math.random()-0.5)*2.5,
        vy: -Math.random()*2 - 0.5,
        life: 30 + Math.random()*15,
        col: Math.random() < 0.5 ? L.col : L.col2,
        size: 2 + Math.random()*2,
      });
    }
    if (t.gem) {
      const g = GEMS[t.gem];
      const val = Math.round(g.price * (1 + 0.2 * UPGRADES.value.lv));
      state.gold += val;
      state.gemCounts[t.gem] = (state.gemCounts[t.gem] || 0) + 1;
      state.floaters.push({ x: cx, y: cy, text: '+' + val, col: g.col, life: 60 });
      for (let i = 0; i < 16; i++) {
        const a = Math.random() * Math.PI * 2;
        state.particles.push({
          x: cx, y: cy,
          vx: Math.cos(a)*3, vy: Math.sin(a)*3,
          life: 40 + Math.random()*30,
          col: g.col,
          size: 2 + Math.random()*2,
          glow: true,
        });
      }
      // Rare gem toast
      if (g.price >= 160) showToast(g.name.toUpperCase() + ' +' + val);
    }
    // auto-deepen camera if player dug near the bottom of the viewport
    const tileBottom = (y + 1) * CELL;
    const viewBottom = state.camY + viewH;
    if (tileBottom > viewBottom - CELL * 3) {
      state.camY = Math.max(state.camY, tileBottom - viewH + CELL * 3);
    }
  }
  function hitSpark(x, y) {
    const cx = x * CELL + CELL/2;
    const cy = y * CELL + CELL/2;
    for (let i = 0; i < 3; i++) {
      state.particles.push({
        x: cx, y: cy,
        vx: (Math.random()-0.5)*1.5,
        vy: -Math.random()*1.5,
        life: 14,
        col: '#fff0c8',
        size: 1.5,
      });
    }
  }

  // ---------- input ----------
  let dragging = false;
  let lastDig = 0;
  function eventToWorld(e) {
    const rect = canvas.getBoundingClientRect();
    const cx = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
    const cy = (e.touches ? e.touches[0].clientY : e.clientY) - rect.top;
    return { x: cx - offsetX, y: cy + state.camY };
  }
  function tryDig(e) {
    const now = performance.now();
    if (now - lastDig < 40) return;
    lastDig = now;
    const { x, y } = eventToWorld(e);
    if (x < 0 || x > COLS * CELL) return;
    const power = UPGRADES.pick.lv;
    digAt(x, y, power);
  }
  canvas.addEventListener('mousedown', (e) => { dragging = true; tryDig(e); });
  canvas.addEventListener('mousemove', (e) => { if (dragging) tryDig(e); });
  window.addEventListener('mouseup', () => dragging = false);
  canvas.addEventListener('touchstart', (e) => { e.preventDefault(); dragging = true; tryDig(e); }, { passive: false });
  canvas.addEventListener('touchmove', (e) => { e.preventDefault(); if (dragging) tryDig(e); }, { passive: false });
  canvas.addEventListener('touchend', () => dragging = false);

  // camera drag with right click / middle
  canvas.addEventListener('wheel', (e) => {
    e.preventDefault();
    state.camY = Math.max(0, state.camY + e.deltaY);
  }, { passive: false });

  // ---------- rendering ----------
  function render(dt) {
    ctx.fillStyle = '#0a0503';
    ctx.fillRect(0, 0, viewW, viewH);

    // compute visible tile range
    const startY = Math.max(0, Math.floor(state.camY / CELL) - 1);
    const endY = Math.floor((state.camY + viewH) / CELL) + 1;

    ctx.save();
    ctx.translate(offsetX, -state.camY);

    // draw tiles
    for (let y = startY; y <= endY; y++) {
      for (let x = 0; x < COLS; x++) {
        const key = x + ',' + y;
        const dug = state.dug.has(key);
        const px = x * CELL, py = y * CELL;
        if (dug) {
          // dug space — dark void with faint ambient
          ctx.fillStyle = '#050302';
          ctx.fillRect(px, py, CELL, CELL);
          continue;
        }
        const t = getTile(x, y);
        if (!t) continue;
        const L = LAYERS[t.layerIdx];
        // base color varies slightly with hash
        const r = hashXY(x + 17, y + 31);
        ctx.fillStyle = r < 0.5 ? L.col : L.col2;
        ctx.fillRect(px, py, CELL, CELL);
        // damage overlay
        if (t.hp < t.maxHp) {
          const dmg = 1 - t.hp / t.maxHp;
          ctx.fillStyle = 'rgba(0,0,0,' + (dmg * 0.5) + ')';
          ctx.fillRect(px, py, CELL, CELL);
          // crack marks
          ctx.strokeStyle = 'rgba(0,0,0,0.6)';
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.moveTo(px + 4, py + 4);
          ctx.lineTo(px + CELL - 4, py + CELL - 6);
          ctx.moveTo(px + CELL - 5, py + 5);
          ctx.lineTo(px + 5, py + CELL - 5);
          ctx.stroke();
        }
        // gem peek when partially damaged
        if (t.gem && t.hp < t.maxHp) {
          const g = GEMS[t.gem];
          ctx.fillStyle = g.col;
          ctx.globalAlpha = 0.85;
          const s = CELL * 0.45;
          ctx.fillRect(px + (CELL - s)/2, py + (CELL - s)/2, s, s);
          ctx.globalAlpha = 1;
          if (g.glow) {
            ctx.shadowColor = g.col;
            ctx.shadowBlur = 8;
            ctx.fillRect(px + (CELL - s)/2, py + (CELL - s)/2, s, s);
            ctx.shadowBlur = 0;
          }
        }
        // subtle grid line
        ctx.strokeStyle = 'rgba(0,0,0,0.25)';
        ctx.lineWidth = 1;
        ctx.strokeRect(px + 0.5, py + 0.5, CELL - 1, CELL - 1);
      }
    }

    // layer labels
    ctx.font = '9px "Rubik Mono One", sans-serif';
    ctx.fillStyle = 'rgba(255, 188, 74, 0.35)';
    for (const L of LAYERS) {
      const labelY = (L.top * 10 / CELL) * CELL; // reverse depthM mapping
      const yPix = Math.floor(L.top * 10 / CELL) * CELL;
      if (yPix > state.camY - 50 && yPix < state.camY + viewH + 50) {
        ctx.fillText(L.name, -offsetX + 8, yPix + 12);
      }
    }

    // particles
    for (let i = state.particles.length - 1; i >= 0; i--) {
      const p = state.particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.15;
      p.life -= 1;
      if (p.life <= 0) { state.particles.splice(i, 1); continue; }
      const a = Math.max(0, p.life / 40);
      ctx.globalAlpha = a;
      if (p.glow) {
        ctx.shadowColor = p.col;
        ctx.shadowBlur = 6;
      }
      ctx.fillStyle = p.col;
      ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
      ctx.shadowBlur = 0;
    }
    ctx.globalAlpha = 1;

    // floaters
    ctx.font = 'bold 12px "Space Mono", monospace';
    ctx.textAlign = 'center';
    for (let i = state.floaters.length - 1; i >= 0; i--) {
      const f = state.floaters[i];
      f.y -= 0.7;
      f.life -= 1;
      if (f.life <= 0) { state.floaters.splice(i, 1); continue; }
      const a = f.life / 60;
      ctx.globalAlpha = a;
      ctx.fillStyle = '#000';
      ctx.fillText(f.text, f.x + 1, f.y + 1);
      ctx.fillStyle = f.col;
      ctx.fillText(f.text, f.x, f.y);
    }
    ctx.globalAlpha = 1;
    ctx.textAlign = 'left';

    ctx.restore();

    // depth fog at bottom
    const grad = ctx.createLinearGradient(0, viewH - 60, 0, viewH);
    grad.addColorStop(0, 'rgba(10,5,3,0)');
    grad.addColorStop(1, 'rgba(10,5,3,0.9)');
    ctx.fillStyle = grad;
    ctx.fillRect(0, viewH - 60, viewW, 60);
  }

  // ---------- HUD ----------
  const goldEl = document.getElementById('goldVal');
  const depthEl = document.getElementById('depthVal');
  const pickEl = document.getElementById('pickVal');
  const tilesEl = document.getElementById('tilesDug');
  const gemListEl = document.getElementById('gemList');
  const upgradesEl = document.getElementById('upgrades');

  function formatNum(n) {
    if (n >= 1e6) return (n/1e6).toFixed(2) + 'M';
    if (n >= 1e3) return (n/1e3).toFixed(1) + 'k';
    return n.toString();
  }

  function maxDugDepth() {
    let max = 0;
    for (const k of state.dug) {
      const y = parseInt(k.split(',')[1]);
      if (y > max) max = y;
    }
    return max;
  }

  function renderHUD() {
    goldEl.textContent = formatNum(state.gold);
    const depthM = Math.floor(maxDugDepth() * CELL / 10);
    depthEl.textContent = depthM + 'm';
    pickEl.textContent = UPGRADES.pick.lv;
    tilesEl.textContent = 'tiles: ' + state.tilesDug;

    // gems
    let html = '';
    const order = Object.keys(GEMS);
    for (const k of order) {
      const c = state.gemCounts[k] || 0;
      const g = GEMS[k];
      html += `<div class="gem-row${c === 0 ? ' locked' : ''}">
        <span class="gem-dot" style="background:${g.col};color:${g.col}"></span>
        <span>${g.name}</span>
        <span class="count">${c}</span>
      </div>`;
    }
    gemListEl.innerHTML = html;

    // upgrades
    let uh = '';
    for (const [k, u] of Object.entries(UPGRADES)) {
      const cost = Math.floor(u.base * Math.pow(u.mul, u.lv));
      const disabled = state.gold < cost;
      uh += `<div class="upgrade${disabled ? ' disabled' : ''}" data-k="${k}">
        <span class="lv">Lv ${u.lv}</span>
        <div class="name">${u.name}</div>
        <div class="desc">${u.desc}</div>
        <div class="cost">${formatNum(cost)} gold</div>
      </div>`;
    }
    upgradesEl.innerHTML = uh;
    upgradesEl.querySelectorAll('.upgrade').forEach(el => {
      el.addEventListener('click', () => {
        const k = el.dataset.k;
        const u = UPGRADES[k];
        const cost = Math.floor(u.base * Math.pow(u.mul, u.lv));
        if (state.gold < cost) return;
        state.gold -= cost;
        u.lv += 1;
        renderHUD();
      });
    });
  }

  function showToast(text) {
    toast.textContent = text;
    toast.classList.add('show');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => toast.classList.remove('show'), 1800);
  }

  // ---------- auto-drill ----------
  let autoAcc = 0;
  function tickAuto(dt) {
    if (UPGRADES.auto.lv <= 0) return;
    autoAcc += dt * UPGRADES.auto.lv;
    while (autoAcc >= 1000) {
      autoAcc -= 1000;
      // find a random "exposed" (neighbor-dug) tile
      const candidates = [];
      for (const key of state.dug) {
        const [x, y] = key.split(',').map(Number);
        const neigh = [[x+1,y],[x-1,y],[x,y+1],[x,y-1]];
        for (const [nx, ny] of neigh) {
          if (nx < 0 || nx >= COLS || ny < 0) continue;
          if (state.dug.has(nx+','+ny)) continue;
          candidates.push([nx, ny]);
        }
      }
      if (candidates.length === 0) {
        // dig at surface
        candidates.push([Math.floor(Math.random()*COLS), 0]);
      }
      const [tx, ty] = candidates[Math.floor(Math.random()*candidates.length)];
      const t = getTile(tx, ty);
      if (t) {
        t.hp -= Math.max(1, UPGRADES.pick.lv);
        if (t.hp <= 0) destroyTile(tx, ty, t);
        else hitSpark(tx, ty);
      }
    }
  }

  // ---------- loop ----------
  let lastT = performance.now();
  let hudAcc = 0, saveAcc = 0;
  function loop(t) {
    const dt = Math.min(60, t - lastT);
    lastT = t;
    tickAuto(dt);
    render(dt);
    hudAcc += dt;
    if (hudAcc >= 120) {
      renderHUD();
      hudAcc = 0;
    }
    saveAcc += dt;
    if (saveAcc >= 4000) {
      save();
      saveAcc = 0;
    }
    requestAnimationFrame(loop);
  }

  resize();
  renderHUD();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
