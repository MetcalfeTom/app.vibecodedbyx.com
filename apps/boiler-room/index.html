<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Boiler Room</title>
<link rel="icon" href="https://emojicdn.elk.sh/🔥">
<meta property="og:title" content="Boiler Room">
<meta property="og:description" content="Maintain a crumbling boiler room. Turn valves, manage pressure, survive the steam.">
<meta property="og:url" content="https://sloppy.live/boiler-room/">
<meta property="og:image" content="https://sloppy.live/boiler-room/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0806;overflow:hidden;cursor:default}
canvas{display:block;width:100vw;height:100vh}
#hud{position:fixed;top:0;left:0;right:0;z-index:5;display:flex;justify-content:space-between;padding:10px 16px;pointer-events:none}
#pressure-wrap{text-align:left}
#pressure-label{font-family:'Courier Prime',monospace;font-size:8px;color:rgba(255,120,40,.3);letter-spacing:3px}
#pressure-val{font-family:'Special Elite',serif;font-size:28px;color:#f84;text-shadow:0 0 15px rgba(255,120,40,.3)}
#pressure-bar{width:140px;height:6px;background:#1a0a00;border:1px solid #321;margin-top:3px;overflow:hidden}
#pressure-fill{height:100%;background:#f60;transition:width .3s;box-shadow:inset 0 0 6px #f80}
#temp-wrap{text-align:right}
#temp-label{font-family:'Courier Prime',monospace;font-size:8px;color:rgba(255,80,30,.3);letter-spacing:3px}
#temp-val{font-family:'Special Elite',serif;font-size:22px;color:#f64;text-shadow:0 0 12px rgba(255,80,30,.3)}
#status{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:5;font-family:'Courier Prime',monospace;font-size:10px;color:rgba(255,120,40,.2);text-align:center;pointer-events:none}
#warning{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;font-family:'Special Elite',serif;font-size:clamp(16px,4vw,32px);color:#f44;text-shadow:0 0 30px rgba(255,40,20,.5);pointer-events:none;opacity:0;transition:opacity .3s}
aa</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div id="pressure-wrap">
    <div id="pressure-label">PRESSURE PSI</div>
    <div id="pressure-val">0</div>
    <div id="pressure-bar"><div id="pressure-fill"></div></div>
  </div>
  <div id="temp-wrap">
    <div id="temp-label">TEMP °F</div>
    <div id="temp-val">180</div>
  </div>
</div>
<div id="status">click valves to release pressure</div>
<div id="warning"></div>
<script>
const CV=document.getElementById('c'),X=CV.getContext('2d');
let W,H;
function resize(){W=CV.width=innerWidth;H=CV.height=innerHeight;}
resize();addEventListener('resize',resize);

// === AUDIO ===
let audioCtx=null;
function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
}
['click','keydown','touchstart'].forEach(ev=>
  addEventListener(ev,function ah(){initAudio();removeEventListener(ev,ah);},{once:true})
);

function snd(type){
  if(!audioCtx)return;
  const t0=audioCtx.currentTime;
  if(type==='steam'){
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.4,audioCtx.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()-0.5);
    const src=audioCtx.createBufferSource(),flt=audioCtx.createBiquadFilter(),g=audioCtx.createGain();
    src.buffer=buf;flt.type='bandpass';flt.frequency.value=2000+Math.random()*2000;flt.Q.value=2;
    g.gain.setValueAtTime(0.08,t0);g.gain.linearRampToValueAtTime(0,t0+0.4);
    src.connect(flt);flt.connect(g);g.connect(audioCtx.destination);
    src.start(t0);src.stop(t0+0.4);
  } else if(type==='valve'){
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.6,audioCtx.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()-0.5);
    const src=audioCtx.createBufferSource(),flt=audioCtx.createBiquadFilter(),g=audioCtx.createGain();
    src.buffer=buf;flt.type='bandpass';flt.frequency.setValueAtTime(3000,t0);
    flt.frequency.exponentialRampToValueAtTime(800,t0+0.5);flt.Q.value=3;
    g.gain.setValueAtTime(0.12,t0);g.gain.linearRampToValueAtTime(0,t0+0.6);
    src.connect(flt);flt.connect(g);g.connect(audioCtx.destination);
    src.start(t0);src.stop(t0+0.6);
    // metallic clank
    const o=audioCtx.createOscillator(),g2=audioCtx.createGain();
    o.connect(g2);g2.connect(audioCtx.destination);
    o.type='square';o.frequency.setValueAtTime(800,t0);o.frequency.exponentialRampToValueAtTime(200,t0+0.05);
    g2.gain.setValueAtTime(0.15,t0);g2.gain.exponentialRampToValueAtTime(0.001,t0+0.08);
    o.start(t0);o.stop(t0+0.08);
  } else if(type==='clank'){
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.type='triangle';o.frequency.setValueAtTime(300+Math.random()*200,t0);
    o.frequency.exponentialRampToValueAtTime(80,t0+0.06);
    g.gain.setValueAtTime(0.1,t0);g.gain.exponentialRampToValueAtTime(0.001,t0+0.08);
    o.start(t0);o.stop(t0+0.08);
  } else if(type==='rumble'){
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*1,audioCtx.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()-0.5)*(1-i/d.length);
    const src=audioCtx.createBufferSource(),flt=audioCtx.createBiquadFilter(),g=audioCtx.createGain();
    src.buffer=buf;flt.type='lowpass';flt.frequency.value=80;
    g.gain.setValueAtTime(0.15,t0);g.gain.linearRampToValueAtTime(0,t0+1);
    src.connect(flt);flt.connect(g);g.connect(audioCtx.destination);
    src.start(t0);src.stop(t0+1);
  } else if(type==='alarm'){
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);
    o.type='square';o.frequency.setValueAtTime(440,t0);o.frequency.setValueAtTime(520,t0+0.15);
    o.frequency.setValueAtTime(440,t0+0.3);o.frequency.setValueAtTime(520,t0+0.45);
    g.gain.setValueAtTime(0.06,t0);g.gain.linearRampToValueAtTime(0,t0+0.6);
    o.start(t0);o.stop(t0+0.6);
  } else if(type==='explode'){
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*1.5,audioCtx.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()-0.5)*(1-i/d.length);
    const src=audioCtx.createBufferSource(),flt=audioCtx.createBiquadFilter(),g=audioCtx.createGain();
    src.buffer=buf;flt.type='lowpass';flt.frequency.setValueAtTime(4000,t0);
    flt.frequency.exponentialRampToValueAtTime(60,t0+1);
    g.gain.setValueAtTime(0.3,t0);g.gain.linearRampToValueAtTime(0,t0+1.5);
    src.connect(flt);flt.connect(g);g.connect(audioCtx.destination);
    src.start(t0);src.stop(t0+1.5);
  }
}

// === AMBIENT DRONE ===
let droneStarted=false;
function startDrone(){
  if(droneStarted||!audioCtx)return;droneStarted=true;
  // low hum
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);
  o.type='sawtooth';o.frequency.value=28;g.gain.value=0.02;o.start();
  // machinery rattle
  const o2=audioCtx.createOscillator(),g2=audioCtx.createGain();
  o2.connect(g2);g2.connect(audioCtx.destination);
  o2.type='square';o2.frequency.value=55;g2.gain.value=0.008;o2.start();
  // filtered noise hiss
  const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*4,audioCtx.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()-0.5)*0.3;
  const src=audioCtx.createBufferSource(),flt=audioCtx.createBiquadFilter(),g3=audioCtx.createGain();
  src.buffer=buf;src.loop=true;flt.type='bandpass';flt.frequency.value=400;flt.Q.value=1;
  g3.gain.value=0.015;
  src.connect(flt);flt.connect(g3);g3.connect(audioCtx.destination);src.start();
}

let t=0;

// === BOILER STATE ===
let pressure=30; // 0-120 PSI, >100 = danger, >115 = explosion
let temp=180; // °F
let boilerIntegrity=100; // 0-100
let pressureRate=0.04; // pressure increase per frame
let steamParticles=[];
let sparks=[];
let drips=[];
let shakeAmt=0;
let exploded=false;
let explodeTimer=0;
let explodeParts=[];

// === PIPES ===
// Pipes are defined as line segments with optional valves and steam leak points
const pipes=[];
const valves=[];
const leaks=[];
const gauges=[];

function buildPipes(){
  pipes.length=0;valves.length=0;leaks.length=0;gauges.length=0;

  // main horizontal pipes
  const y1=H*0.35,y2=H*0.55,y3=H*0.72;
  // top pipe
  pipes.push({x1:W*0.05,y1:y1,x2:W*0.95,y2:y1,r:8,color:'#3a2a1a'});
  // middle pipe
  pipes.push({x1:W*0.1,y1:y2,x2:W*0.9,y2:y2,r:10,color:'#2a1a0a'});
  // bottom pipe
  pipes.push({x1:W*0.08,y1:y3,x2:W*0.92,y2:y3,r:7,color:'#3a2a18'});

  // vertical connectors
  pipes.push({x1:W*0.25,y1:y1,x2:W*0.25,y2:y2,r:6,color:'#2a1808'});
  pipes.push({x1:W*0.5,y1:y1,x2:W*0.5,y2:y3,r:7,color:'#2a1a0a'});
  pipes.push({x1:W*0.75,y1:y2,x2:W*0.75,y2:y3,r:6,color:'#2a1808'});
  // extra diagonal
  pipes.push({x1:W*0.15,y1:y2,x2:W*0.3,y2:y3,r:5,color:'#2a1a0a'});
  pipes.push({x1:W*0.6,y1:y1,x2:W*0.75,y2:y2,r:5,color:'#2a1808'});

  // small pipes — top area
  pipes.push({x1:W*0.35,y1:y1-30,x2:W*0.35,y2:y1,r:4,color:'#2a1808'});
  pipes.push({x1:W*0.65,y1:y1-25,x2:W*0.65,y2:y1,r:4,color:'#2a1a0a'});
  // small pipes — bottom area
  pipes.push({x1:W*0.4,y1:y3,x2:W*0.4,y2:y3+35,r:4,color:'#2a1808'});
  pipes.push({x1:W*0.8,y1:y3,x2:W*0.8,y2:y3+30,r:4,color:'#2a1a0a'});

  // VALVES — clickable
  valves.push({x:W*0.25,y:y1,r:16,open:false,cooldown:0});
  valves.push({x:W*0.5,y:y2,r:18,open:false,cooldown:0});
  valves.push({x:W*0.75,y:y3,r:16,open:false,cooldown:0});
  valves.push({x:W*0.4,y:y1,r:14,open:false,cooldown:0});
  valves.push({x:W*0.6,y:y2,r:14,open:false,cooldown:0});

  // STEAM LEAK POINTS — emit steam periodically based on pressure
  leaks.push({x:W*0.18,y:y1,dir:-1});
  leaks.push({x:W*0.55,y:y2,dir:1});
  leaks.push({x:W*0.82,y:y3,dir:-1});
  leaks.push({x:W*0.35,y:y1-15,dir:-1});
  leaks.push({x:W*0.7,y:y2+5,dir:1});

  // PRESSURE GAUGES
  gauges.push({x:W*0.15,y:y1-25,r:18});
  gauges.push({x:W*0.85,y:y2-25,r:18});
}
buildPipes();
addEventListener('resize',()=>{buildPipes();});

// === BOILER (center mass) ===
const boiler={};
function getBoiler(){
  boiler.x=W*0.5;boiler.y=H*0.52;
  boiler.w=W*0.22;boiler.h=H*0.2;
}
getBoiler();addEventListener('resize',getBoiler);

// === DRIP SYSTEM ===
function spawnDrip(){
  const px=pipes[Math.floor(Math.random()*pipes.length)];
  const t2=Math.random();
  drips.push({
    x:px.x1+(px.x2-px.x1)*t2,
    y:px.y1+(px.y2-px.y1)*t2+px.r,
    vy:0,size:1+Math.random()*2,
    life:80+Math.random()*60,
  });
}

// === UPDATE ===
function update(){
  t++;
  if(exploded){explodeTimer++;return;}

  // pressure builds naturally
  pressure+=pressureRate;
  // temperature follows pressure
  temp+=(180+pressure*1.5-temp)*0.01;

  // valves reduce pressure when open
  let totalRelease=0;
  for(const v of valves){
    if(v.cooldown>0)v.cooldown--;
    if(v.open){
      totalRelease+=0.3;
      pressure=Math.max(0,pressure-0.3);
      // steam from open valve
      if(t%3===0){
        steamParticles.push({
          x:v.x+(Math.random()-0.5)*10,y:v.y,
          vx:(Math.random()-0.5)*2,vy:-1.5-Math.random()*3,
          life:30+Math.random()*30,maxLife:60,
          size:3+Math.random()*6,alpha:0.3,
        });
      }
      // close after a bit
      v.cooldown++;
      if(v.cooldown>120){v.open=false;v.cooldown=60;}
    }
  }

  // difficulty ramp
  if(t%600===0&&pressureRate<0.12)pressureRate+=0.005;

  // steam leaks based on pressure
  for(const lk of leaks){
    if(pressure>40&&t%Math.max(2,Math.floor(20-pressure/8))===0){
      steamParticles.push({
        x:lk.x,y:lk.y,
        vx:lk.dir*(0.5+Math.random()*2),vy:-0.5-Math.random()*2,
        life:20+Math.random()*25,maxLife:45,
        size:2+Math.random()*4,alpha:0.15+pressure/400,
      });
    }
  }

  // random ambient steam puffs
  if(t%20===0&&pressure>20){
    snd('steam');
  }

  // random drips
  if(t%30===0)spawnDrip();

  // random pipe clanks
  if(t%180===0&&Math.random()<0.4)snd('clank');

  // sparks when pressure high
  if(pressure>70&&t%15===0){
    const px=pipes[Math.floor(Math.random()*pipes.length)];
    const st=Math.random();
    sparks.push({
      x:px.x1+(px.x2-px.x1)*st,y:px.y1+(px.y2-px.y1)*st,
      vx:(Math.random()-0.5)*4,vy:-2-Math.random()*3,
      life:15+Math.random()*15,size:1+Math.random()*2,
    });
  }

  // shake based on pressure
  shakeAmt=pressure>80?Math.sin(t*0.2)*(pressure-80)*0.05:0;

  // warnings
  const warn=document.getElementById('warning');
  if(pressure>100){
    warn.style.opacity='1';
    warn.textContent=pressure>110?'CRITICAL FAILURE IMMINENT':'WARNING: OVERPRESSURE';
    if(t%60===0)snd('alarm');
  } else {
    warn.style.opacity='0';
  }

  // explosion!
  if(pressure>118){
    exploded=true;snd('explode');snd('rumble');
    for(let i=0;i<300;i++){
      const a=Math.random()*Math.PI*2,spd=2+Math.random()*10;
      explodeParts.push({
        x:boiler.x+(Math.random()-0.5)*boiler.w,
        y:boiler.y+(Math.random()-0.5)*boiler.h,
        vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,
        life:80+Math.random()*100,maxLife:180,
        size:3+Math.random()*8,
        hue:Math.random()>0.5?20+Math.random()*30:0,
        sat:Math.random()>0.3?80:0,
        lum:30+Math.random()*40,
      });
    }
    document.getElementById('warning').textContent='BOILER EXPLOSION';
    document.getElementById('status').textContent='click anywhere to restart';
  }

  // update particles
  for(let i=steamParticles.length-1;i>=0;i--){
    const p=steamParticles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy-=0.01;p.life--;
    if(p.life<=0)steamParticles.splice(i,1);
  }
  for(let i=sparks.length-1;i>=0;i--){
    const s=sparks[i];
    s.x+=s.vx;s.y+=s.vy;s.vy+=0.15;s.life--;
    if(s.life<=0)sparks.splice(i,1);
  }
  for(let i=drips.length-1;i>=0;i--){
    const d=drips[i];
    d.vy+=0.08;d.y+=d.vy;d.life--;
    if(d.life<=0||d.y>H)drips.splice(i,1);
  }

  // HUD
  document.getElementById('pressure-val').textContent=Math.floor(pressure);
  document.getElementById('pressure-fill').style.width=Math.min(100,pressure/120*100)+'%';
  document.getElementById('pressure-fill').style.background=pressure>90?'#f22':pressure>70?'#f60':'#f84';
  document.getElementById('temp-val').textContent=Math.floor(temp);
}

// === RENDER ===
function render(){
  X.fillStyle='#0a0806';X.fillRect(0,0,W,H);

  X.save();
  if(shakeAmt)X.translate(Math.sin(t*0.5)*shakeAmt,(Math.cos(t*0.7)*shakeAmt)*0.5);

  // === BACKGROUND — grimy walls ===
  // brick-like texture
  X.fillStyle='#0e0a07';X.fillRect(0,0,W,H);
  for(let y=0;y<H;y+=16){
    for(let x=(y%32===0?0:8);x<W;x+=32){
      const v=5+Math.sin(x*0.1+y*0.07)*3;
      X.fillStyle='rgb('+(14+v)+','+(10+v*0.6)+','+(7+v*0.3)+')';
      X.fillRect(x+1,y+1,30,14);
    }
  }

  // grime/stain patches
  for(let i=0;i<8;i++){
    const gx=(i*W/7+50*Math.sin(i*2.3))%W;
    const gy=(i*H/6+40*Math.cos(i*1.7))%H;
    const gr=X.createRadialGradient(gx,gy,0,gx,gy,40+i*10);
    gr.addColorStop(0,'rgba(20,15,5,0.3)');
    gr.addColorStop(1,'rgba(20,15,5,0)');
    X.fillStyle=gr;X.fillRect(gx-60,gy-60,120,120);
  }

  // === BOILER UNIT ===
  const bx=boiler.x-boiler.w/2,by=boiler.y-boiler.h/2;
  if(!exploded){
    // body
    X.fillStyle='#1a1208';
    X.fillRect(bx,by,boiler.w,boiler.h);
    // rivets
    X.fillStyle='#2a1a0a';
    for(let rx=bx+10;rx<bx+boiler.w;rx+=20){
      X.beginPath();X.arc(rx,by+4,2,0,Math.PI*2);X.fill();
      X.beginPath();X.arc(rx,by+boiler.h-4,2,0,Math.PI*2);X.fill();
    }
    // glow from firebox
    const fireGlow=0.1+Math.sin(t*0.05)*0.04+pressure/500;
    X.fillStyle='rgba(255,80,20,'+fireGlow+')';
    X.fillRect(bx+boiler.w*0.2,by+boiler.h-8,boiler.w*0.6,8);
    // fire flicker
    for(let i=0;i<5;i++){
      const fx=bx+boiler.w*0.25+Math.random()*boiler.w*0.5;
      const fy=by+boiler.h-4-Math.random()*12;
      const fs=2+Math.random()*4;
      X.fillStyle='rgba(255,'+(60+Math.floor(Math.random()*60))+',0,'+(0.2+Math.random()*0.2)+')';
      X.fillRect(fx,fy,fs,fs);
    }
    // plate text
    X.font='700 '+Math.max(8,Math.floor(boiler.w*0.06))+'px "Courier Prime"';
    X.fillStyle='rgba(255,120,40,0.12)';
    X.textAlign='center';
    X.fillText('MODEL S-7 INDUSTRIAL BOILER',boiler.x,by+boiler.h/2+3);
  }

  // === PIPES ===
  for(const p of pipes){
    // pipe shadow
    X.strokeStyle='rgba(0,0,0,0.3)';X.lineWidth=p.r*2+4;X.lineCap='round';
    X.beginPath();X.moveTo(p.x1+2,p.y1+2);X.lineTo(p.x2+2,p.y2+2);X.stroke();
    // pipe body
    X.strokeStyle=p.color;X.lineWidth=p.r*2;
    X.beginPath();X.moveTo(p.x1,p.y1);X.lineTo(p.x2,p.y2);X.stroke();
    // highlight
    X.strokeStyle='rgba(80,50,20,0.15)';X.lineWidth=Math.max(1,p.r*0.5);
    X.beginPath();X.moveTo(p.x1,p.y1-p.r*0.4);X.lineTo(p.x2,p.y2-p.r*0.4);X.stroke();
    // rust spots
    if(p.r>5){
      for(let i=0;i<3;i++){
        const rt=0.2+i*0.3;
        const rx2=p.x1+(p.x2-p.x1)*rt;
        const ry2=p.y1+(p.y2-p.y1)*rt;
        X.fillStyle='rgba(80,30,5,0.15)';
        X.fillRect(rx2-3,ry2-2,6+Math.sin(i*5)*3,4);
      }
    }
    // joints at endpoints
    X.fillStyle='#221508';
    X.beginPath();X.arc(p.x1,p.y1,p.r+2,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(p.x2,p.y2,p.r+2,0,Math.PI*2);X.fill();
  }

  // === VALVES ===
  for(const v of valves){
    // valve body
    X.fillStyle=v.open?'#4a2a08':'#2a1808';
    X.beginPath();X.arc(v.x,v.y,v.r,0,Math.PI*2);X.fill();
    // rim
    X.strokeStyle='#3a2210';X.lineWidth=2;
    X.beginPath();X.arc(v.x,v.y,v.r,0,Math.PI*2);X.stroke();
    // wheel spokes
    const rot=v.open?t*0.05:0;
    X.strokeStyle=v.open?'#f80':'#4a3018';X.lineWidth=2;
    for(let i=0;i<4;i++){
      const a=rot+i*Math.PI/2;
      X.beginPath();
      X.moveTo(v.x+Math.cos(a)*4,v.y+Math.sin(a)*4);
      X.lineTo(v.x+Math.cos(a)*(v.r-3),v.y+Math.sin(a)*(v.r-3));
      X.stroke();
    }
    // center bolt
    X.fillStyle=v.open?'#fa0':'#3a2210';
    X.beginPath();X.arc(v.x,v.y,4,0,Math.PI*2);X.fill();
    // glow when open
    if(v.open){
      X.shadowColor='rgba(255,140,0,0.3)';X.shadowBlur=15;
      X.fillStyle='rgba(255,140,0,0.05)';
      X.beginPath();X.arc(v.x,v.y,v.r+5,0,Math.PI*2);X.fill();
      X.shadowBlur=0;
    }
  }

  // === PRESSURE GAUGES ===
  for(const g of gauges){
    X.fillStyle='#1a1008';
    X.beginPath();X.arc(g.x,g.y,g.r,0,Math.PI*2);X.fill();
    X.strokeStyle='#3a2a15';X.lineWidth=2;
    X.beginPath();X.arc(g.x,g.y,g.r,0,Math.PI*2);X.stroke();
    // dial marks
    for(let i=0;i<8;i++){
      const a=-Math.PI*0.8+i*Math.PI*1.6/7;
      X.strokeStyle='rgba(255,120,40,0.2)';X.lineWidth=1;
      X.beginPath();
      X.moveTo(g.x+Math.cos(a)*(g.r-4),g.y+Math.sin(a)*(g.r-4));
      X.lineTo(g.x+Math.cos(a)*(g.r-7),g.y+Math.sin(a)*(g.r-7));
      X.stroke();
    }
    // needle
    const needleA=-Math.PI*0.8+Math.min(1,pressure/120)*Math.PI*1.6;
    X.strokeStyle=pressure>90?'#f22':'#f84';X.lineWidth=1.5;
    X.beginPath();X.moveTo(g.x,g.y);
    X.lineTo(g.x+Math.cos(needleA)*(g.r-5),g.y+Math.sin(needleA)*(g.r-5));
    X.stroke();
    // center dot
    X.fillStyle='#f84';X.beginPath();X.arc(g.x,g.y,2,0,Math.PI*2);X.fill();
  }

  // === STEAM PARTICLES ===
  for(const p of steamParticles){
    const a=(p.life/p.maxLife)*p.alpha;
    const s=p.size*(1+0.5*(1-p.life/p.maxLife));
    X.fillStyle='rgba(180,170,160,'+a+')';
    X.beginPath();X.arc(p.x,p.y,s,0,Math.PI*2);X.fill();
  }

  // === SPARKS ===
  for(const s of sparks){
    const a=s.life/30;
    X.fillStyle='rgba(255,'+(150+Math.floor(Math.random()*100))+',0,'+a+')';
    X.fillRect(s.x,s.y,s.size,s.size);
  }

  // === DRIPS ===
  for(const d of drips){
    X.fillStyle='rgba(60,40,20,'+(d.life/80*0.4)+')';
    X.fillRect(d.x,d.y,d.size,d.size*2);
  }

  // === EXPLOSION DEBRIS ===
  if(exploded){
    for(let i=explodeParts.length-1;i>=0;i--){
      const p=explodeParts[i];
      p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.vx*=0.99;p.life--;
      if(p.life<=0){explodeParts.splice(i,1);continue;}
      const a=(p.life/p.maxLife)*0.8;
      X.fillStyle='hsla('+p.hue+','+p.sat+'%,'+p.lum+'%,'+a+')';
      X.fillRect(p.x,p.y,p.size,p.size);
    }
    // fire glow at boiler location
    if(explodeTimer<300){
      const gA=Math.max(0,(1-explodeTimer/300)*0.3);
      const gr=X.createRadialGradient(boiler.x,boiler.y,0,boiler.x,boiler.y,boiler.w);
      gr.addColorStop(0,'rgba(255,80,20,'+gA+')');
      gr.addColorStop(1,'rgba(255,80,20,0)');
      X.fillStyle=gr;X.fillRect(0,0,W,H);
    }
  }

  // === AMBIENT LIGHT ===
  // dim overhead light cone
  const lg=X.createRadialGradient(W*0.5,0,0,W*0.5,0,H*0.8);
  lg.addColorStop(0,'rgba(255,140,60,0.02)');
  lg.addColorStop(1,'rgba(0,0,0,0)');
  X.fillStyle=lg;X.fillRect(0,0,W,H);

  // vignette
  const vig=X.createRadialGradient(W/2,H/2,W*0.25,W/2,H/2,W*0.75);
  vig.addColorStop(0,'rgba(0,0,0,0)');
  vig.addColorStop(1,'rgba(0,0,0,0.5)');
  X.fillStyle=vig;X.fillRect(0,0,W,H);

  X.restore();
}

function restart(){
  exploded=false;explodeTimer=0;explodeParts=[];
  pressure=30;temp=180;pressureRate=0.04;
  shakeAmt=0;steamParticles=[];sparks=[];
  for(const v of valves){v.open=false;v.cooldown=0;}
  document.getElementById('warning').style.opacity='0';
  document.getElementById('status').textContent='click valves to release pressure';
}

// === INPUT ===
function handleClick(cx,cy){
  if(exploded){restart();return;}
  initAudio();startDrone();
  for(const v of valves){
    const dx=cx-v.x,dy=cy-v.y;
    if(dx*dx+dy*dy<(v.r+10)*(v.r+10)){
      if(!v.open&&v.cooldown<=0){
        v.open=true;v.cooldown=0;
        snd('valve');
        pressure=Math.max(0,pressure-5); // instant relief
      }
    }
  }
}
addEventListener('click',e=>handleClick(e.clientX,e.clientY));
addEventListener('touchstart',e=>{
  e.preventDefault();handleClick(e.touches[0].clientX,e.touches[0].clientY);
},{passive:false});

// cursor change on valve hover
addEventListener('mousemove',e=>{
  let onValve=false;
  for(const v of valves){
    const dx=e.clientX-v.x,dy=e.clientY-v.y;
    if(dx*dx+dy*dy<(v.r+10)*(v.r+10)){onValve=true;break;}
  }
  document.body.style.cursor=onValve?'pointer':'default';
});

function loop(){update();render();requestAnimationFrame(loop);}
loop();
</script>
</body>
