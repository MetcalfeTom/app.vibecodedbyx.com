<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Nitro Void</title>
<link rel="icon" href="https://emojicdn.elk.sh/🏎️" />
<meta name="description" content="High-speed neon racer with procedural tracks and drifting." />
<meta property="og:title" content="Nitro Void" />
<meta property="og:description" content="High-speed neon racer with procedural tracks and drifting." />
<meta property="og:url" content="https://sloppy.live/nitro-void" />
<meta property="og:image" content="https://sloppy.live/screenshots/nitro-void.jpg" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100vh;background:#02010a;overflow:hidden;position:fixed;width:100%;touch-action:none;user-select:none}
canvas{display:block;width:100%;height:100%}

.hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;padding:10px 18px;z-index:5;pointer-events:none}
.h-box{text-align:center}
.h-label{font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(0,240,255,0.5);letter-spacing:0.1em}
.h-val{font-family:'Rajdhani',sans-serif;font-size:22px;font-weight:700;color:#00f0ff;text-shadow:0 0 12px rgba(0,240,255,0.4)}
.h-val.spd{color:#ff3060;text-shadow:0 0 12px rgba(255,48,96,0.4)}
.h-val.drift{color:#f0e020;text-shadow:0 0 12px rgba(240,224,32,0.4)}

.ov{position:fixed;inset:0;z-index:10;background:rgba(2,1,10,0.93);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(5px)}
.ov.gone{display:none}
.ov-in{text-align:center;padding:24px}
.ov-in h1{font-family:'Rajdhani',sans-serif;font-size:42px;font-weight:700;color:#00f0ff;text-shadow:0 0 30px rgba(0,240,255,0.35);letter-spacing:0.06em}
.ov-in .tag{font-family:'Share Tech Mono',monospace;font-size:11px;color:#ff3060;letter-spacing:0.12em;margin:4px 0 18px}
.ov-in .fs{font-family:'Rajdhani',sans-serif;font-size:52px;font-weight:700;color:#ff3060;text-shadow:0 0 25px rgba(255,48,96,0.4);margin:6px 0}
.ov-in .best{font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(0,240,255,0.5);margin-bottom:14px}
.go{font-family:'Rajdhani',sans-serif;font-size:14px;font-weight:700;padding:14px 44px;background:transparent;border:2px solid #00f0ff;color:#00f0ff;border-radius:6px;cursor:pointer;letter-spacing:0.1em;text-transform:uppercase;transition:all .15s;pointer-events:auto}
.go:hover{background:rgba(0,240,255,0.08);box-shadow:0 0 20px rgba(0,240,255,0.15)}

.mob{position:fixed;bottom:16px;left:0;right:0;display:none;justify-content:space-between;padding:0 24px;z-index:6;pointer-events:none}
.mb{width:70px;height:70px;border-radius:50%;border:2px solid rgba(0,240,255,0.25);background:rgba(0,240,255,0.04);display:flex;align-items:center;justify-content:center;font-size:22px;pointer-events:auto;-webkit-tap-highlight-color:transparent}
.mb:active{background:rgba(0,240,255,0.12);border-color:#00f0ff}
.mb-mid{display:flex;gap:12px}
@media(max-width:768px){.mob{display:flex}}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div class="hud">
  <div class="h-box"><div class="h-label">SCORE</div><div class="h-val" id="hScore">0</div></div>
  <div class="h-box"><div class="h-label">SPEED</div><div class="h-val spd" id="hSpeed">0</div></div>
  <div class="h-box"><div class="h-label">DRIFT</div><div class="h-val drift" id="hDrift">0</div></div>
  <div class="h-box"><div class="h-label">BEST</div><div class="h-val" id="hBest">0</div></div>
</div>

<div class="ov" id="startOv">
  <div class="ov-in">
    <h1>NITRO VOID</h1>
    <div class="tag">DRIFT. BOOST. SURVIVE.</div>
    <button class="go" id="startBtn">IGNITE</button>
  </div>
</div>

<div class="ov gone" id="deathOv">
  <div class="ov-in">
    <h1 style="font-size:26px;color:#ff3060">WIPEOUT</h1>
    <div class="fs" id="finalScore">0</div>
    <div class="best" id="bestLbl">BEST: 0</div>
    <button class="go" id="retryBtn">RETRY</button>
  </div>
</div>

<div class="mob">
  <div class="mb" id="mL">◀</div>
  <div class="mb-mid">
    <div class="mb" id="mUp">▲</div>
    <div class="mb" id="mDn">▼</div>
  </div>
  <div class="mb" id="mR">▶</div>
</div>
<script>
(function(){
'use strict';

const cv=document.getElementById('c'),cx=cv.getContext('2d');
let W,H;
function resize(){W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();

// Audio
let actx;
function au(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx}
function sfx(f,d,t,v){try{const c=au();if(c.state==='suspended')c.resume();const o=c.createOscillator(),g=c.createGain();o.type=t||'sawtooth';o.frequency.setValueAtTime(f,c.currentTime);o.frequency.exponentialRampToValueAtTime(f*0.3,c.currentTime+d);g.gain.setValueAtTime(v||0.02,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.connect(g).connect(c.destination);o.start();o.stop(c.currentTime+d)}catch(e){}}

// === PROCEDURAL TRACK ===
// Track is a sequence of road segments with curvature
const SEGMENT_LEN = 200;
const DRAW_DIST = 120;
const ROAD_W = 1800;
const RUMBLE_W = 200;
let segments = [];
let trackLength = 0;

function addSeg(curve, hill){
  segments.push({
    curve: curve || 0,
    y: hill || 0,
    clip: 0,
    sprites: [],
  });
}

function buildTrack(){
  segments = [];
  // Procedural: alternating straights and curves
  const patterns = [
    {len:20,curve:0,hill:0},
    {len:15,curve:2,hill:0},
    {len:10,curve:0,hill:20},
    {len:18,curve:-3,hill:0},
    {len:8,curve:0,hill:-15},
    {len:12,curve:4,hill:10},
    {len:20,curve:0,hill:0},
    {len:10,curve:-2,hill:0},
    {len:15,curve:3,hill:-10},
    {len:8,curve:0,hill:20},
    {len:12,curve:-4,hill:0},
    {len:20,curve:1.5,hill:15},
  ];
  // Build several laps worth
  for(let rep=0;rep<6;rep++){
    for(const p of patterns){
      for(let i=0;i<p.len;i++){
        // Ease in/out of curves
        const t = i/p.len;
        const ease = Math.sin(t*Math.PI); // 0→1→0
        addSeg(p.curve*ease, p.hill*ease);
      }
    }
  }
  trackLength = segments.length * SEGMENT_LEN;

  // Add scenery sprites
  for(let i=0;i<segments.length;i++){
    if(Math.random()<0.15){
      segments[i].sprites.push({
        offset: (Math.random()>0.5?1:-1)*(ROAD_W*0.6+Math.random()*600),
        type: Math.floor(Math.random()*3), // 0=pole, 1=barrier, 2=crystal
      });
    }
  }
}

// === PSEUDO-3D PROJECTION ===
const CAM_H = 1200;
const CAM_DEPTH = 1 / Math.tan((80/2)*Math.PI/180); // FOV 80

function project(seg, camX, camY, camZ, segIdx){
  const worldX = seg.worldX || 0;
  const worldY = seg.worldY || 0;
  const worldZ = segIdx * SEGMENT_LEN;
  const tX = worldX - camX;
  const tY = worldY - camY;
  const tZ = worldZ - camZ;
  if(tZ <= 0) return null;
  const scale = CAM_DEPTH / tZ;
  return {
    x: W/2 + tX * scale * W/2,
    y: H/2 - tY * scale * H/2,
    w: ROAD_W * scale * W/2,
    scale,
    z: tZ,
  };
}

// === PLAYER ===
const car = {
  pos: 0, // distance along track
  x: 0, // lateral position (-1 to 1 is road)
  speed: 0,
  maxSpeed: 220,
  accel: 0.8,
  brake: 0.6,
  drift: 0,
  driftAngle: 0,
  driftScore: 0,
  totalDrift: 0,
  steer: 0,
  boost: 0,
};

let running = false;
let score = 0;
let best = parseInt(localStorage.getItem('nitrovoid_best')||'0');
let frameCount = 0;
let shakeX=0, shakeY=0;
let sparks = [];

// === INPUT ===
const keys={};
window.addEventListener('keydown',e=>{keys[e.key]=true;});
window.addEventListener('keyup',e=>{keys[e.key]=false;});

// Mobile
const mobState={l:false,r:false,u:false,d:false};
function mOn(k){return()=>{mobState[k]=true;}}
function mOff(k){return()=>{mobState[k]=false;}}
['mL','mR','mUp','mDn'].forEach(id=>{
  const k=id.replace('m','').toLowerCase()[0]; // l,r,u,d
  const el=document.getElementById(id);
  el.addEventListener('touchstart',e=>{e.preventDefault();mobState[k]=true;});
  el.addEventListener('touchend',e=>{mobState[k]=false;});
  el.addEventListener('touchcancel',e=>{mobState[k]=false;});
});

function isLeft(){return keys.ArrowLeft||keys.a||mobState.l;}
function isRight(){return keys.ArrowRight||keys.d||mobState.r;}
function isUp(){return keys.ArrowUp||keys.w||mobState.u;}
function isDown(){return keys.ArrowDown||keys.s||mobState.d;}

// === UPDATE ===
function update(){
  if(!running) return;
  frameCount++;

  // Steering
  let steerInput = 0;
  if(isLeft()) steerInput = -1;
  if(isRight()) steerInput = 1;

  // Acceleration
  if(isUp()) car.speed = Math.min(car.maxSpeed, car.speed + car.accel);
  else if(isDown()) car.speed = Math.max(0, car.speed - car.brake);
  else car.speed *= 0.995; // coast friction

  // Speed increases max over time
  car.maxSpeed = 220 + frameCount * 0.008;

  // Current segment curvature
  const segIdx = Math.floor(car.pos / SEGMENT_LEN) % segments.length;
  const seg = segments[segIdx];
  const curvature = seg.curve;

  // Centrifugal force pushes car outward on curves
  const centrifugal = curvature * car.speed * 0.0003;

  // Steering with drift
  const steerForce = steerInput * 0.008 * (1 + car.speed * 0.001);

  // Detect drifting: steering against curve direction or sharp steer at speed
  const isDrifting = car.speed > 80 && Math.abs(steerInput) > 0 &&
    (Math.sign(steerInput) !== Math.sign(curvature) && Math.abs(curvature) > 0.5 ||
     Math.abs(steerInput) > 0 && car.speed > 140);

  if(isDrifting){
    car.drift = Math.min(1, car.drift + 0.03);
    car.driftAngle = steerInput * car.drift * 0.3;
    car.driftScore += car.speed * car.drift * 0.01;
    // Drift sparks
    if(Math.random()<0.4){
      sparks.push({
        x: car.x * ROAD_W/2 + (Math.random()-0.5)*40,
        life: 15+Math.random()*10,
        vy: -1-Math.random()*2,
      });
    }
  } else {
    if(car.drift > 0.1){
      // Drift end bonus
      const bonus = Math.floor(car.driftScore);
      if(bonus > 10){
        score += bonus;
        sfx(600,0.06,'sine',0.03);sfx(800,0.04,'sine',0.02);
      }
      car.driftScore = 0;
    }
    car.drift *= 0.9;
    car.driftAngle *= 0.85;
  }

  car.x += steerForce + centrifugal + car.driftAngle * 0.01;
  car.totalDrift = Math.floor(car.driftScore);

  // Move forward
  car.pos += car.speed * 0.5;
  if(car.pos > trackLength) car.pos -= trackLength;

  // Off-road penalty
  if(Math.abs(car.x) > 1.1){
    car.speed *= 0.97;
    if(Math.abs(car.x) > 1.5){
      die();
      return;
    }
  }

  // Score
  score = Math.floor(car.pos * 0.01 + car.totalDrift);

  // Sparks update
  for(const s of sparks){s.life--;s.vy-=0.1;}
  sparks=sparks.filter(s=>s.life>0);

  // Shake decay
  shakeX*=0.85;shakeY*=0.85;

  // HUD
  document.getElementById('hScore').textContent=score;
  document.getElementById('hSpeed').textContent=Math.floor(car.speed);
  document.getElementById('hDrift').textContent=car.totalDrift>0?'+'+car.totalDrift:'0';
}

function die(){
  running=false;
  shakeX=(Math.random()-0.5)*20;shakeY=(Math.random()-0.5)*20;
  sfx(100,0.35,'sawtooth',0.07);sfx(70,0.4,'square',0.05);
  if(score>best){best=score;localStorage.setItem('nitrovoid_best',String(best));}
  document.getElementById('finalScore').textContent=score;
  document.getElementById('bestLbl').textContent='BEST: '+best;
  document.getElementById('hBest').textContent=best;
  setTimeout(()=>{document.getElementById('deathOv').classList.remove('gone');},500);
}

function reset(){
  car.pos=0;car.x=0;car.speed=0;car.maxSpeed=220;
  car.drift=0;car.driftAngle=0;car.driftScore=0;car.totalDrift=0;car.steer=0;car.boost=0;
  score=0;frameCount=0;shakeX=0;shakeY=0;sparks=[];
  document.getElementById('hScore').textContent='0';
  document.getElementById('hSpeed').textContent='0';
  document.getElementById('hDrift').textContent='0';
  document.getElementById('hBest').textContent=best;
  buildTrack();
  running=true;
}

// === RENDER ===
function draw(){
  cx.fillStyle='#02010a';
  cx.fillRect(0,0,W,H);
  cx.save();
  cx.translate(shakeX,shakeY);

  const baseIdx = Math.floor(car.pos / SEGMENT_LEN);
  const camZ = car.pos;
  const camX = car.x * ROAD_W / 2;
  const camY = CAM_H;

  // Compute world positions with curvature
  let ddx = 0, ddy = 0;
  const projected = [];
  for(let i = 0; i < DRAW_DIST; i++){
    const idx = (baseIdx + i) % segments.length;
    const seg = segments[idx];
    ddx += seg.curve;
    ddy += seg.y;
    seg.worldX = ddx * 50;
    seg.worldY = ddy * 2;
    const p = project(seg, camX, camY, camZ, baseIdx + i);
    if(p) projected.push({p, seg, idx: baseIdx+i, i});
  }

  // Draw from back to front
  for(let i = projected.length - 1; i > 0; i--){
    const curr = projected[i];
    const prev = projected[i-1];
    const p1 = prev.p, p2 = curr.p;

    // Ground
    const isEven = (curr.idx % 2 === 0);
    cx.fillStyle = isEven ? '#06040e' : '#08061a';
    cx.fillRect(0, p2.y, W, p1.y - p2.y + 1);

    // Road
    const rw1 = p1.w, rw2 = p2.w;
    const rumble1 = rw1 + RUMBLE_W * p1.scale * W/2;
    const rumble2 = rw2 + RUMBLE_W * p2.scale * W/2;

    // Rumble strips
    cx.fillStyle = isEven ? '#ff306020' : '#00f0ff15';
    cx.beginPath();
    cx.moveTo(p1.x - rumble1, p1.y);
    cx.lineTo(p2.x - rumble2, p2.y);
    cx.lineTo(p2.x + rumble2, p2.y);
    cx.lineTo(p1.x + rumble1, p1.y);
    cx.closePath();
    cx.fill();

    // Road surface
    cx.fillStyle = isEven ? '#0a0820' : '#0c0a28';
    cx.beginPath();
    cx.moveTo(p1.x - rw1, p1.y);
    cx.lineTo(p2.x - rw2, p2.y);
    cx.lineTo(p2.x + rw2, p2.y);
    cx.lineTo(p1.x + rw1, p1.y);
    cx.closePath();
    cx.fill();

    // Lane lines
    const lw = 3;
    cx.fillStyle = isEven ? '#00f0ff18' : '#00f0ff08';
    for(let lane = -1; lane <= 1; lane += 2){
      const frac = lane * 0.5;
      const lx1 = p1.x + rw1 * frac;
      const lx2 = p2.x + rw2 * frac;
      cx.fillRect(Math.min(lx1,lx2)-lw/2, p2.y, lw, p1.y-p2.y+1);
    }

    // Center line (dashed)
    if(isEven){
      cx.fillStyle = '#ff306030';
      cx.fillRect(p2.x - 1, p2.y, 2, p1.y - p2.y + 1);
    }

    // Edge glow
    cx.fillStyle = '#00f0ff12';
    cx.fillRect(p2.x - rw2 - 2, p2.y, 3, p1.y - p2.y + 1);
    cx.fillRect(p2.x + rw2 - 1, p2.y, 3, p1.y - p2.y + 1);

    // Scenery sprites
    for(const sp of curr.seg.sprites){
      const sprX = p2.x + sp.offset * p2.scale * W/2;
      const sprH = 60 * p2.scale * W/2;
      const sprW = 8 * p2.scale * W/2;
      if(sprH < 2) continue;
      if(sp.type === 0){
        // Neon pole
        cx.fillStyle = '#00f0ff20';
        cx.fillRect(sprX - sprW/2, p2.y - sprH, sprW, sprH);
        cx.fillStyle = '#00f0ff';
        cx.beginPath();cx.arc(sprX, p2.y - sprH, sprW*1.5, 0, Math.PI*2);cx.fill();
      } else if(sp.type === 1){
        // Barrier
        cx.fillStyle = '#ff306030';
        cx.fillRect(sprX - sprW*2, p2.y - sprH*0.3, sprW*4, sprH*0.3);
      } else {
        // Crystal
        cx.fillStyle = '#a040ff30';
        cx.beginPath();
        cx.moveTo(sprX, p2.y - sprH);
        cx.lineTo(sprX + sprW*2, p2.y);
        cx.lineTo(sprX - sprW*2, p2.y);
        cx.closePath();
        cx.fill();
      }
    }
  }

  // === PLAYER CAR ===
  const carScreenX = W / 2;
  const carScreenY = H * 0.78;
  const carW = 36;
  const carH = 50;

  // Drift visual rotation
  const driftVis = car.driftAngle * 15;

  cx.save();
  cx.translate(carScreenX, carScreenY);
  cx.rotate(driftVis * Math.PI / 180);

  // Car glow
  const glow = cx.createRadialGradient(0, 0, 10, 0, 0, 50);
  glow.addColorStop(0, car.drift > 0.3 ? 'rgba(240,224,32,0.15)' : 'rgba(0,240,255,0.1)');
  glow.addColorStop(1, 'transparent');
  cx.fillStyle = glow;
  cx.beginPath();cx.arc(0, 0, 50, 0, Math.PI*2);cx.fill();

  // Car body
  cx.fillStyle = '#00f0ff';
  cx.beginPath();
  cx.moveTo(0, -carH/2);
  cx.lineTo(carW/2, carH/2);
  cx.lineTo(carW/4, carH/2 - 8);
  cx.lineTo(-carW/4, carH/2 - 8);
  cx.lineTo(-carW/2, carH/2);
  cx.closePath();
  cx.fill();

  // Cockpit
  cx.fillStyle = '#02010a';
  cx.beginPath();
  cx.ellipse(0, -4, 7, 10, 0, 0, Math.PI*2);
  cx.fill();

  // Engine flames
  const flameH = 4 + car.speed * 0.06 + Math.random() * 4;
  cx.fillStyle = '#ff3060';
  cx.beginPath();
  cx.moveTo(-6, carH/2 - 8);
  cx.lineTo(0, carH/2 - 8 + flameH);
  cx.lineTo(6, carH/2 - 8);
  cx.closePath();
  cx.fill();

  // Drift sparks from wheels
  if(car.drift > 0.2){
    cx.fillStyle = '#f0e020';
    for(let i=0;i<3;i++){
      const sx = (Math.random()-0.5)*carW;
      const sy = carH/2 + Math.random()*10;
      cx.fillRect(sx-1,sy-1,2+Math.random()*2,2);
    }
  }

  cx.restore();

  // Speed lines
  if(car.speed > 100){
    const intensity = Math.min(1, (car.speed-100)*0.005);
    cx.strokeStyle = `rgba(0,240,255,${intensity*0.1})`;
    cx.lineWidth = 1;
    for(let i=0;i<10;i++){
      const lx = Math.random()*W;
      const ly = H*0.3 + Math.random()*H*0.5;
      cx.beginPath();cx.moveTo(lx,ly);cx.lineTo(lx+(car.x*-5),ly+15+car.speed*0.15);cx.stroke();
    }
  }

  // Drift trail
  if(car.drift > 0.3){
    cx.globalAlpha = car.drift * 0.3;
    cx.fillStyle = '#f0e020';
    for(const s of sparks){
      cx.fillRect(carScreenX+s.x*0.01-1, carScreenY+s.life*2, 2, 2);
    }
    cx.globalAlpha = 1;
  }

  cx.restore();

  // Vignette
  const vig=cx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.8);
  vig.addColorStop(0,'transparent');
  vig.addColorStop(1,'rgba(2,1,10,0.6)');
  cx.fillStyle=vig;
  cx.fillRect(0,0,W,H);

  // Scanlines
  cx.fillStyle='rgba(0,0,0,0.04)';
  for(let y=0;y<H;y+=3) cx.fillRect(0,y,W,1);
}

// === LOOP ===
function loop(){update();draw();requestAnimationFrame(loop);}

document.getElementById('startBtn').addEventListener('click',()=>{
  document.getElementById('startOv').classList.add('gone');reset();
});
document.getElementById('retryBtn').addEventListener('click',()=>{
  document.getElementById('deathOv').classList.add('gone');reset();
});
document.getElementById('hBest').textContent=best;
buildTrack();
loop();

})();
</script>
</body>
</html>
