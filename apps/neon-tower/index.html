<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" href="https://emojicdn.elk.sh/🏗️">
<meta property="og:title" content="Neon Tower">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#06000f;font-family:'Chakra Petch',sans-serif;color:#fff}
canvas{display:block}
#hud{position:fixed;top:0;left:0;width:100%;z-index:10;pointer-events:none;
  display:flex;justify-content:space-between;align-items:flex-start;padding:16px 24px}
#score{font-family:'Bungee Shade',cursive;font-size:clamp(1.8rem,5vw,3.2rem);
  text-shadow:0 0 20px rgba(255,0,200,0.7),0 0 60px rgba(255,0,200,0.3)}
#best{font-size:0.85rem;font-weight:300;opacity:0.6;margin-top:4px}
#msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Bungee Shade',cursive;font-size:clamp(1.2rem,4vw,2.2rem);
  text-align:center;pointer-events:none;z-index:20;opacity:0;
  text-shadow:0 0 30px rgba(0,255,255,0.8);transition:opacity 0.4s}
#restart{position:fixed;top:60%;left:50%;transform:translate(-50%,-50%);
  pointer-events:all;z-index:20;display:none;cursor:pointer;
  background:rgba(255,0,200,0.15);border:1px solid rgba(255,0,200,0.5);
  color:#ffaaee;font-family:'Bungee Shade',cursive;font-size:1.1rem;
  padding:14px 40px;border-radius:8px;letter-spacing:0.15em;transition:all 0.3s}
#restart:hover{background:rgba(255,0,200,0.3);box-shadow:0 0 30px rgba(255,0,200,0.4)}
#hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  font-size:0.8rem;font-weight:300;opacity:0.5;pointer-events:none;z-index:10;
  letter-spacing:0.1em;transition:opacity 1s}
#backlink{position:fixed;bottom:20px;right:20px;z-index:10;font-size:0.75rem;opacity:0.4}
#backlink a{color:#ffaaee;text-decoration:none}
</style>
</head>
<body>
<div id="hud">
  <div><div id="score">0</div><div id="best">BEST: 0</div></div>
</div>
<div id="msg"></div>
<button id="restart">PLAY AGAIN</button>
<div id="hint">TAP / CLICK / SPACE TO DROP</div>
<div id="backlink"><a href="https://sloppy.live">sloppy.live</a></div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js"}}
</script>
<script type="module">
import * as THREE from 'three';

// --- Setup ---
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x06000f, 0.025);
const camera = new THREE.PerspectiveCamera(55, innerWidth/innerHeight, 0.1, 200);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

// --- DOM ---
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const msgEl = document.getElementById('msg');
const restartBtn = document.getElementById('restart');
const hintEl = document.getElementById('hint');

let bestScore = parseInt(localStorage.getItem('neon-tower-best')) || 0;
bestEl.textContent = 'BEST: ' + bestScore;

// --- Lighting ---
const ambient = new THREE.AmbientLight(0x221133, 0.6);
scene.add(ambient);
const dirLight = new THREE.DirectionalLight(0xffffff, 0.4);
dirLight.position.set(5, 20, 8);
dirLight.castShadow = true;
dirLight.shadow.mapSize.set(1024, 1024);
dirLight.shadow.camera.near = 0.5;
dirLight.shadow.camera.far = 60;
dirLight.shadow.camera.left = -10;
dirLight.shadow.camera.right = 10;
dirLight.shadow.camera.top = 40;
dirLight.shadow.camera.bottom = -5;
scene.add(dirLight);

// --- Ground ---
const groundGeo = new THREE.PlaneGeometry(40, 40);
const groundMat = new THREE.MeshStandardMaterial({color:0x0a0015, roughness:0.9});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
ground.position.y = -0.5;
ground.receiveShadow = true;
scene.add(ground);

// Grid lines
const gridHelper = new THREE.GridHelper(40, 40, 0x1a0030, 0x0d0020);
gridHelper.position.y = -0.49;
scene.add(gridHelper);

// --- Neon colors ---
const NEON_COLORS = [
  0xff00cc, 0x00ffcc, 0xff6600, 0x00ccff, 0xffff00,
  0xff0066, 0x66ff00, 0xcc00ff, 0x00ff66, 0xff3399
];

function randomNeon() { return NEON_COLORS[Math.floor(Math.random()*NEON_COLORS.length)]; }

// --- Audio ---
let actx = null;
function initAudio() {
  if (!actx) actx = new AudioContext();
}
function playDrop() {
  if (!actx) return;
  const o = actx.createOscillator();
  const g = actx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(300, actx.currentTime);
  o.frequency.exponentialRampToValueAtTime(80, actx.currentTime + 0.15);
  g.gain.setValueAtTime(0.3, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + 0.2);
  o.connect(g).connect(actx.destination);
  o.start(); o.stop(actx.currentTime + 0.2);
}
function playCrumble() {
  if (!actx) return;
  const dur = 0.8;
  const buf = actx.createBuffer(1, actx.sampleRate * dur, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) {
    const t = i / d.length;
    d[i] = (Math.random()*2-1) * (1-t) * 0.5;
  }
  const src = actx.createBufferSource();
  src.buffer = buf;
  const filt = actx.createBiquadFilter();
  filt.type = 'lowpass';
  filt.frequency.setValueAtTime(500, actx.currentTime);
  filt.frequency.exponentialRampToValueAtTime(60, actx.currentTime + dur);
  const g = actx.createGain();
  g.gain.setValueAtTime(0.6, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
  src.connect(filt).connect(g).connect(actx.destination);
  src.start();
}
function playPerfect() {
  if (!actx) return;
  [523, 659, 784].forEach((f, i) => {
    const o = actx.createOscillator();
    const g = actx.createGain();
    o.type = 'triangle';
    o.frequency.value = f;
    g.gain.setValueAtTime(0, actx.currentTime + i*0.1);
    g.gain.linearRampToValueAtTime(0.2, actx.currentTime + i*0.1 + 0.05);
    g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + i*0.1 + 0.4);
    o.connect(g).connect(actx.destination);
    o.start(actx.currentTime + i*0.1);
    o.stop(actx.currentTime + i*0.1 + 0.4);
  });
}

// --- Physics ---
const GRAVITY = -18;
const BLOCK_H = 0.5;
const BASE_SIZE = 3.0;
const SWING_SPEED_BASE = 3.5;
const SWING_RANGE = 5;
const CRUMBLE_THRESHOLD = 20; // blocks before instability
const MAX_OVERHANG = 1.2; // max offset before penalty

// --- State ---
let blocks = [];       // placed blocks: { mesh, vx, vy, vz, rx, ry, rz, grounded, light }
let debris = [];       // crumble pieces
let currentBlock = null;
let swingDir = 1;
let swingAngle = 0;
let stackHeight = 0;
let level = 0;
let gameOver = false;
let dropping = false;
let shakeTime = 0;
let cameraTargetY = 4;
let perfectStreak = 0;

// --- Block creation ---
function createBlockMesh(w, d, color) {
  const geo = new THREE.BoxGeometry(w, BLOCK_H, d);
  const mat = new THREE.MeshStandardMaterial({
    color: color,
    emissive: color,
    emissiveIntensity: 0.35,
    roughness: 0.3,
    metalness: 0.1
  });
  const mesh = new THREE.Mesh(geo, mat);
  mesh.castShadow = true;
  mesh.receiveShadow = true;

  // Edge glow
  const edges = new THREE.EdgesGeometry(geo);
  const lineMat = new THREE.LineBasicMaterial({ color, transparent:true, opacity:0.7 });
  const wireframe = new THREE.LineSegments(edges, lineMat);
  mesh.add(wireframe);

  return mesh;
}

function spawnSwingBlock() {
  const prevSize = level === 0 ? BASE_SIZE : blocks[blocks.length-1].mesh.userData.size;
  const size = Math.max(0.5, prevSize);
  const color = randomNeon();
  const mesh = createBlockMesh(size, size, color);
  mesh.userData.size = size;
  mesh.userData.color = color;
  mesh.position.y = stackHeight + BLOCK_H/2;

  // Swing axis alternates
  const axis = level % 2 === 0 ? 'x' : 'z';
  mesh.userData.swingAxis = axis;

  // Point light on block
  const light = new THREE.PointLight(color, 1.5, 6);
  light.position.set(0, 0.3, 0);
  mesh.add(light);

  scene.add(mesh);
  currentBlock = mesh;
  dropping = false;
  swingAngle = -Math.PI/2; // start from side
}

function dropBlock() {
  if (!currentBlock || dropping || gameOver) return;
  initAudio();
  dropping = true;

  const mesh = currentBlock;
  const axis = mesh.userData.swingAxis;
  const prevBlock = blocks.length > 0 ? blocks[blocks.length-1] : null;
  const prevPos = prevBlock ? prevBlock.mesh.position : new THREE.Vector3(0, -BLOCK_H/2, 0);
  const prevSize = prevBlock ? prevBlock.mesh.userData.size : BASE_SIZE;

  // Calculate overhang
  const blockPos = axis === 'x' ? mesh.position.x : mesh.position.z;
  const prevCenter = axis === 'x' ? prevPos.x : prevPos.z;
  const overhang = blockPos - prevCenter;
  const absOverhang = Math.abs(overhang);
  const currentSize = mesh.userData.size;

  // Perfect placement
  if (absOverhang < 0.15) {
    // Snap to center
    if (axis === 'x') mesh.position.x = prevCenter;
    else mesh.position.z = prevCenter;
    perfectStreak++;
    playPerfect();
    showMsg(perfectStreak >= 3 ? 'PERFECT x' + perfectStreak + '!' : 'PERFECT!', 0x00ffcc);
    placeBlock(mesh, currentSize);
    return;
  }

  perfectStreak = 0;

  // Check if completely missed
  if (absOverhang >= currentSize) {
    // Total miss - block falls
    playDrop();
    const bdata = {
      mesh, vx: 0, vy: -2, vz: 0,
      rx: (Math.random()-0.5)*0.1, ry:0, rz: (Math.random()-0.5)*0.1,
      grounded: false, life: 3
    };
    debris.push(bdata);
    currentBlock = null;
    triggerGameOver();
    return;
  }

  // Slice off overhang
  const newSize = currentSize - absOverhang;
  const sliceSize = absOverhang;
  const newCenter = prevCenter + overhang/2;

  // Resize placed block
  scene.remove(mesh);
  const newMesh = createBlockMesh(
    axis === 'x' ? newSize : currentSize,
    axis === 'z' ? newSize : currentSize,
    mesh.userData.color
  );
  newMesh.userData.size = newSize;
  newMesh.userData.color = mesh.userData.color;
  newMesh.position.copy(mesh.position);
  if (axis === 'x') newMesh.position.x = newCenter;
  else newMesh.position.z = newCenter;

  const pLight = new THREE.PointLight(mesh.userData.color, 1.5, 6);
  pLight.position.set(0, 0.3, 0);
  newMesh.add(pLight);
  scene.add(newMesh);

  // Create falling slice
  const sliceMesh = createBlockMesh(
    axis === 'x' ? sliceSize : currentSize,
    axis === 'z' ? sliceSize : currentSize,
    mesh.userData.color
  );
  sliceMesh.position.copy(mesh.position);
  if (axis === 'x') sliceMesh.position.x = prevCenter + overhang/2 + (overhang > 0 ? newSize/2 + sliceSize/2 : -newSize/2 - sliceSize/2);
  else sliceMesh.position.z = prevCenter + overhang/2 + (overhang > 0 ? newSize/2 + sliceSize/2 : -newSize/2 - sliceSize/2);
  scene.add(sliceMesh);

  debris.push({
    mesh: sliceMesh, vx: overhang*0.5, vy: 0, vz: (axis==='z'?overhang*0.5:0),
    rx: (Math.random()-0.5)*0.05, ry:0, rz: (Math.random()-0.5)*0.05,
    grounded: false, life: 4
  });

  playDrop();

  // Cleanup old mesh
  mesh.traverse(c => { if(c.geometry) c.geometry.dispose(); if(c.material) c.material.dispose?.(); });

  placeBlock(newMesh, newSize);

  // Check if block too small
  if (newSize < 0.3) {
    triggerGameOver();
  }
}

function placeBlock(mesh, size) {
  const light = mesh.children.find(c => c.isPointLight);
  blocks.push({ mesh, vx:0, vy:0, vz:0, rx:0, ry:0, rz:0, grounded:true, light });
  currentBlock = null;
  level++;
  stackHeight += BLOCK_H;
  scoreEl.textContent = level;
  cameraTargetY = Math.max(4, stackHeight * 0.6 + 3);

  // Check crumble
  if (level >= CRUMBLE_THRESHOLD && level % 5 === 0) {
    triggerCrumble();
  }

  // Spawn next
  setTimeout(() => { if(!gameOver) spawnSwingBlock(); }, 300);
}

function triggerCrumble() {
  playCrumble();
  showMsg('TOWER UNSTABLE!', 0xff0066);
  shakeTime = 1.5;

  // Remove bottom blocks and turn to debris
  const removeCount = Math.min(3 + Math.floor((level - CRUMBLE_THRESHOLD)/8), blocks.length - 3);
  if (removeCount <= 0) return;

  for (let i = 0; i < removeCount; i++) {
    const b = blocks[i];
    if (!b) continue;
    // Spawn small debris cubes
    const size = b.mesh.userData.size || 1;
    const color = b.mesh.userData.color || 0xff00cc;
    const cx = b.mesh.position.x, cy = b.mesh.position.y, cz = b.mesh.position.z;
    const chunks = 4 + Math.floor(Math.random()*4);
    for (let j = 0; j < chunks; j++) {
      const cs = 0.15 + Math.random()*0.25;
      const cGeo = new THREE.BoxGeometry(cs, cs, cs);
      const cMat = new THREE.MeshStandardMaterial({color, emissive:color, emissiveIntensity:0.5, roughness:0.4});
      const cMesh = new THREE.Mesh(cGeo, cMat);
      cMesh.position.set(
        cx + (Math.random()-0.5)*size*0.8,
        cy + (Math.random()-0.5)*BLOCK_H,
        cz + (Math.random()-0.5)*size*0.8
      );
      cMesh.castShadow = true;
      scene.add(cMesh);
      debris.push({
        mesh: cMesh,
        vx: (Math.random()-0.5)*4,
        vy: Math.random()*3+1,
        vz: (Math.random()-0.5)*4,
        rx: (Math.random()-0.5)*0.3,
        ry: (Math.random()-0.5)*0.3,
        rz: (Math.random()-0.5)*0.3,
        grounded: false, life: 3 + Math.random()*2
      });
    }
    // Remove original block
    scene.remove(b.mesh);
    b.mesh.traverse(c => { if(c.geometry) c.geometry.dispose(); if(c.material) c.material.dispose?.(); });
  }
  blocks.splice(0, removeCount);

  // Shift remaining blocks down
  const dropDist = removeCount * BLOCK_H;
  stackHeight -= dropDist;
  for (const b of blocks) {
    b.mesh.position.y -= dropDist;
  }
  cameraTargetY = Math.max(4, stackHeight * 0.6 + 3);
}

function triggerGameOver() {
  gameOver = true;
  shakeTime = 1.0;

  if (level > bestScore) {
    bestScore = level;
    localStorage.setItem('neon-tower-best', bestScore);
    bestEl.textContent = 'BEST: ' + bestScore;
    showMsg('NEW RECORD: ' + level + '!', 0xffff00);
  } else {
    showMsg('TOWER FELL! HEIGHT: ' + level, 0xff0066);
  }

  restartBtn.style.display = 'block';

  // Topple remaining blocks
  playCrumble();
  for (const b of blocks) {
    b.vx = (Math.random()-0.5)*3;
    b.vy = Math.random()*2;
    b.vz = (Math.random()-0.5)*3;
    b.rx = (Math.random()-0.5)*0.15;
    b.rz = (Math.random()-0.5)*0.15;
    b.grounded = false;
    b.life = 5;
  }
}

function showMsg(text, color) {
  msgEl.textContent = text;
  msgEl.style.color = '#' + color.toString(16).padStart(6,'0');
  msgEl.style.opacity = '1';
  setTimeout(() => { msgEl.style.opacity = '0'; }, 1500);
}

function resetGame() {
  // Cleanup
  for (const b of blocks) {
    scene.remove(b.mesh);
    b.mesh.traverse(c => { if(c.geometry) c.geometry.dispose(); if(c.material) c.material.dispose?.(); });
  }
  for (const d of debris) {
    scene.remove(d.mesh);
    d.mesh.traverse(c => { if(c.geometry) c.geometry.dispose(); if(c.material) c.material.dispose?.(); });
  }
  if (currentBlock) {
    scene.remove(currentBlock);
    currentBlock.traverse(c => { if(c.geometry) c.geometry.dispose(); if(c.material) c.material.dispose?.(); });
  }
  blocks = [];
  debris = [];
  currentBlock = null;
  stackHeight = 0;
  level = 0;
  gameOver = false;
  dropping = false;
  perfectStreak = 0;
  scoreEl.textContent = '0';
  restartBtn.style.display = 'none';
  cameraTargetY = 4;
  hintEl.style.opacity = '0.5';

  // Base platform
  const base = createBlockMesh(BASE_SIZE, BASE_SIZE, 0x8800aa);
  base.userData.size = BASE_SIZE;
  base.userData.color = 0x8800aa;
  base.position.y = BLOCK_H / 2;
  const baseLight = new THREE.PointLight(0x8800aa, 1, 5);
  baseLight.position.set(0, 0.3, 0);
  base.add(baseLight);
  scene.add(base);
  blocks.push({ mesh:base, vx:0, vy:0, vz:0, rx:0, ry:0, rz:0, grounded:true, light:baseLight });
  stackHeight = BLOCK_H;
  level = 0;

  spawnSwingBlock();
}

// --- Input ---
function onDrop() {
  if (gameOver) return;
  dropBlock();
  hintEl.style.opacity = '0';
}
document.addEventListener('click', onDrop);
document.addEventListener('keydown', e => { if(e.code === 'Space') { e.preventDefault(); onDrop(); } });
document.addEventListener('touchstart', e => { e.preventDefault(); onDrop(); }, {passive:false});
restartBtn.addEventListener('click', e => { e.stopPropagation(); resetGame(); });

// --- Camera ---
camera.position.set(6, 5, 6);
camera.lookAt(0, 2, 0);

// --- Background stars ---
const starCount = 400;
const starGeo = new THREE.BufferGeometry();
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  starPos[i*3] = (Math.random()-0.5)*80;
  starPos[i*3+1] = Math.random()*50+5;
  starPos[i*3+2] = (Math.random()-0.5)*80;
}
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
const starMat = new THREE.PointsMaterial({color:0xffffff, size:0.08, transparent:true, opacity:0.6});
scene.add(new THREE.Points(starGeo, starMat));

// --- Animation ---
const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  const t = clock.getElapsedTime();

  // Swing current block
  if (currentBlock && !dropping) {
    const axis = currentBlock.userData.swingAxis;
    const speed = SWING_SPEED_BASE + level * 0.08;
    swingAngle += speed * dt * swingDir;
    const pos = Math.sin(swingAngle) * SWING_RANGE;
    if (axis === 'x') {
      currentBlock.position.x = pos;
      currentBlock.position.z = blocks.length > 0 ? blocks[blocks.length-1].mesh.position.z : 0;
    } else {
      currentBlock.position.z = pos;
      currentBlock.position.x = blocks.length > 0 ? blocks[blocks.length-1].mesh.position.x : 0;
    }
    currentBlock.position.y = stackHeight + BLOCK_H/2;
  }

  // Physics on debris
  for (let i = debris.length-1; i >= 0; i--) {
    const d = debris[i];
    d.life -= dt;
    if (d.life <= 0 || d.mesh.position.y < -10) {
      scene.remove(d.mesh);
      d.mesh.traverse(c => { if(c.geometry) c.geometry.dispose(); if(c.material) c.material.dispose?.(); });
      debris.splice(i, 1);
      continue;
    }
    if (!d.grounded) {
      d.vy += GRAVITY * dt;
      d.mesh.position.x += d.vx * dt;
      d.mesh.position.y += d.vy * dt;
      d.mesh.position.z += d.vz * dt;
      d.mesh.rotation.x += d.rx;
      d.mesh.rotation.z += d.rz;

      if (d.mesh.position.y < 0) {
        d.mesh.position.y = 0;
        d.vy *= -0.3;
        d.vx *= 0.7;
        d.vz *= 0.7;
        if (Math.abs(d.vy) < 0.5) d.grounded = true;
      }
    }
    // Fade out
    if (d.life < 1) {
      d.mesh.material.opacity = d.life;
      d.mesh.material.transparent = true;
    }
  }

  // Physics on toppled game-over blocks
  if (gameOver) {
    for (const b of blocks) {
      if (!b.grounded) {
        b.vy += GRAVITY * dt;
        b.mesh.position.x += b.vx * dt;
        b.mesh.position.y += b.vy * dt;
        b.mesh.position.z += b.vz * dt;
        b.mesh.rotation.x += b.rx;
        b.mesh.rotation.z += b.rz;
        if (b.mesh.position.y < BLOCK_H/2) {
          b.mesh.position.y = BLOCK_H/2;
          b.vy *= -0.2;
          b.vx *= 0.6;
          b.vz *= 0.6;
          if (Math.abs(b.vy) < 0.3) b.grounded = true;
        }
      }
    }
  }

  // Block glow pulse
  for (const b of blocks) {
    if (b.mesh.material) {
      b.mesh.material.emissiveIntensity = 0.3 + Math.sin(t * 2 + b.mesh.position.y) * 0.1;
    }
  }

  // Camera
  const camAngle = t * 0.15;
  const camDist = 7 + Math.sin(t*0.3)*0.5;
  const camX = Math.sin(camAngle) * camDist;
  const camZ = Math.cos(camAngle) * camDist;
  camera.position.x += (camX - camera.position.x) * 0.02;
  camera.position.z += (camZ - camera.position.z) * 0.02;
  camera.position.y += (cameraTargetY - camera.position.y) * 0.03;

  // Screen shake
  let shakeX = 0, shakeY = 0;
  if (shakeTime > 0) {
    shakeTime -= dt;
    const intensity = shakeTime * 0.15;
    shakeX = (Math.random()-0.5) * intensity;
    shakeY = (Math.random()-0.5) * intensity;
  }

  camera.lookAt(shakeX, stackHeight * 0.4 + shakeY, 0);

  renderer.render(scene, camera);
}

// --- Resize ---
window.addEventListener('resize', () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// --- Start ---
resetGame();
animate();
</script>
</body>
</html>
