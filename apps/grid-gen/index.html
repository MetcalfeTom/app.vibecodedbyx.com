<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>CSS Grid Generator</title>
<link rel="icon" href="https://emojicdn.elk.sh/⊞">
<meta property="og:title" content="CSS Grid Generator">
<meta property="og:description" content="Configure rows, columns, and gaps — copy the CSS.">
<meta property="og:url" content="https://sloppy.live/grid-gen">
<meta property="og:image" content="https://emojicdn.elk.sh/⊞?style=apple&size=512">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{background:#f5f5f0}
body{min-height:100dvh;background:#f5f5f0;font-family:'IBM Plex Mono',monospace;color:#1a1a1a;padding:0 16px 80px}

header{padding:24px 0 16px;max-width:800px;margin:0 auto}
header h1{font-size:1.1rem;font-weight:500;letter-spacing:1px;color:#1a1a1a}
header p{font-size:11px;color:#888;margin-top:2px}

.panel{max-width:800px;margin:0 auto}

.controls{
  display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end;
  padding:16px 0;border-bottom:1px solid #ddd;
}

.field{display:flex;flex-direction:column;gap:3px}
.field label{font-size:9px;font-weight:500;color:#666;letter-spacing:1px;text-transform:uppercase}
.field input,.field select{
  font-family:'IBM Plex Mono',monospace;font-size:12px;
  border:1px solid #ccc;background:#fff;color:#1a1a1a;
  padding:6px 8px;border-radius:3px;outline:none;width:120px;
}
.field input:focus,.field select:focus{border-color:#888}
.field input[type="number"]{width:60px}
.field.wide input{width:200px}

.row-fields{display:flex;flex-wrap:wrap;gap:12px;padding:12px 0;border-bottom:1px solid #eee}
.row-fields .section-title{font-size:10px;font-weight:500;color:#888;letter-spacing:1px;width:100%;text-transform:uppercase}
.track-input{
  font-family:'IBM Plex Mono',monospace;font-size:11px;
  border:1px solid #ccc;background:#fff;color:#1a1a1a;
  padding:4px 6px;border-radius:3px;outline:none;width:70px;
}
.track-input:focus{border-color:#888}
.track-label{font-size:9px;color:#999;margin-right:4px}

#preview-area{
  margin-top:16px;padding:16px;
  background:#fff;border:1px solid #ddd;border-radius:4px;
  min-height:200px;overflow:auto;
}

#grid-preview{
  width:100%;min-height:180px;
  border:1px dashed #ccc;
}

#grid-preview .cell{
  border:1px solid #bbb;
  background:#f0f0ea;
  display:flex;align-items:center;justify-content:center;
  font-size:10px;color:#888;
  min-height:30px;
}

#code-area{margin-top:16px}
#code-area .section-title{font-size:10px;font-weight:500;color:#888;letter-spacing:1px;text-transform:uppercase;margin-bottom:6px}
#code-box{
  width:100%;min-height:120px;padding:12px;
  background:#1a1a1a;color:#a8b8a0;border:none;border-radius:4px;
  font-family:'IBM Plex Mono',monospace;font-size:11px;line-height:1.6;
  resize:vertical;outline:none;
}
#copy-btn{
  font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:500;
  border:1px solid #ccc;background:#fff;color:#444;
  padding:5px 14px;border-radius:3px;cursor:pointer;margin-top:6px;
  letter-spacing:1px;
}
#copy-btn:hover{background:#eee}
#copy-btn:active{background:#ddd}
#copy-msg{font-size:10px;color:#888;margin-left:8px;opacity:0;transition:opacity .3s}

a
@media(max-width:500px){
  .field input,.field select{width:90px}
  .field.wide input{width:140px}
  header h1{font-size:0.95rem}
}
</style>
</head>
<body>

<header>
  <h1>CSS Grid Generator</h1>
  <p>Configure layout, copy the code.</p>
</header>

<div class="panel">
  <div class="controls">
    <div class="field">
      <label>Columns</label>
      <input type="number" id="cols" min="1" max="12" value="3">
    </div>
    <div class="field">
      <label>Rows</label>
      <input type="number" id="rows" min="1" max="12" value="3">
    </div>
    <div class="field">
      <label>Col Gap</label>
      <input type="text" id="col-gap" value="16px" style="width:70px">
    </div>
    <div class="field">
      <label>Row Gap</label>
      <input type="text" id="row-gap" value="16px" style="width:70px">
    </div>
    <div class="field">
      <label>Justify Items</label>
      <select id="justify">
        <option value="stretch" selected>stretch</option>
        <option value="start">start</option>
        <option value="center">center</option>
        <option value="end">end</option>
      </select>
    </div>
    <div class="field">
      <label>Align Items</label>
      <select id="align">
        <option value="stretch" selected>stretch</option>
        <option value="start">start</option>
        <option value="center">center</option>
        <option value="end">end</option>
      </select>
    </div>
  </div>

  <div class="row-fields" id="col-tracks">
    <div class="section-title">Column Tracks</div>
  </div>
  <div class="row-fields" id="row-tracks">
    <div class="section-title">Row Tracks</div>
  </div>

  <div id="preview-area">
    <div id="grid-preview"></div>
  </div>

  <div id="code-area">
    <div class="section-title">Generated CSS</div>
    <textarea id="code-box" readonly></textarea>
    <div style="display:flex;align-items:center">
      <button id="copy-btn">COPY</button>
      <span id="copy-msg">copied</span>
    </div>
  </div>
</div>
<script>
(function(){

var colsInput=document.getElementById('cols');
var rowsInput=document.getElementById('rows');
var colGapInput=document.getElementById('col-gap');
var rowGapInput=document.getElementById('row-gap');
var justifySelect=document.getElementById('justify');
var alignSelect=document.getElementById('align');
var colTracksEl=document.getElementById('col-tracks');
var rowTracksEl=document.getElementById('row-tracks');
var previewEl=document.getElementById('grid-preview');
var codeBox=document.getElementById('code-box');

var colValues=[];
var rowValues=[];

function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v))}

function buildTrackInputs(container,count,values,prefix){
  // Keep title
  var title=container.querySelector('.section-title');
  container.innerHTML='';
  container.appendChild(title);

  // Ensure values array matches count
  while(values.length<count)values.push('1fr');
  while(values.length>count)values.pop();

  for(var i=0;i<count;i++){
    var wrap=document.createElement('span');
    wrap.style.display='inline-flex';wrap.style.alignItems='center';wrap.style.gap='2px';
    var lbl=document.createElement('span');
    lbl.className='track-label';lbl.textContent=prefix+(i+1);
    var inp=document.createElement('input');
    inp.className='track-input';
    inp.value=values[i];
    inp.dataset.idx=i;
    inp.addEventListener('input',function(){
      values[parseInt(this.dataset.idx)]=this.value;
      update();
    });
    wrap.appendChild(lbl);
    wrap.appendChild(inp);
    container.appendChild(wrap);
  }
}

function getColCount(){return clamp(parseInt(colsInput.value)||3,1,12)}
function getRowCount(){return clamp(parseInt(rowsInput.value)||3,1,12)}

function update(){
  var cols=getColCount();
  var rows=getRowCount();
  var colGap=colGapInput.value.trim()||'0';
  var rowGap=rowGapInput.value.trim()||'0';
  var justify=justifySelect.value;
  var alignV=alignSelect.value;

  // Ensure track arrays
  while(colValues.length<cols)colValues.push('1fr');
  while(colValues.length>cols)colValues.pop();
  while(rowValues.length<rows)rowValues.push('1fr');
  while(rowValues.length>rows)rowValues.pop();

  var colTemplate=colValues.join(' ');
  var rowTemplate=rowValues.join(' ');

  // Preview
  previewEl.style.display='grid';
  previewEl.style.gridTemplateColumns=colTemplate;
  previewEl.style.gridTemplateRows=rowTemplate;
  previewEl.style.columnGap=colGap;
  previewEl.style.rowGap=rowGap;
  previewEl.style.justifyItems=justify;
  previewEl.style.alignItems=alignV;

  var totalCells=cols*rows;
  // Rebuild cells only if count changed
  while(previewEl.children.length>totalCells)previewEl.removeChild(previewEl.lastChild);
  while(previewEl.children.length<totalCells){
    var cell=document.createElement('div');
    cell.className='cell';
    previewEl.appendChild(cell);
  }
  for(var i=0;i<totalCells;i++){
    previewEl.children[i].textContent=(i+1);
  }

  // Generate CSS
  var css='.container {\n';
  css+='  display: grid;\n';
  css+='  grid-template-columns: '+colTemplate+';\n';
  css+='  grid-template-rows: '+rowTemplate+';\n';
  if(colGap===rowGap){
    css+='  gap: '+colGap+';\n';
  }else{
    css+='  column-gap: '+colGap+';\n';
    css+='  row-gap: '+rowGap+';\n';
  }
  if(justify!=='stretch')css+='  justify-items: '+justify+';\n';
  if(alignV!=='stretch')css+='  align-items: '+alignV+';\n';
  css+='}';

  codeBox.value=css;
}

function rebuildAll(){
  var cols=getColCount();
  var rows=getRowCount();
  buildTrackInputs(colTracksEl,cols,colValues,'C');
  buildTrackInputs(rowTracksEl,rows,rowValues,'R');
  update();
}

// Events
[colsInput,rowsInput].forEach(function(inp){
  inp.addEventListener('input',rebuildAll);
});
[colGapInput,rowGapInput,justifySelect,alignSelect].forEach(function(inp){
  inp.addEventListener('input',update);
});

// Copy
document.getElementById('copy-btn').addEventListener('click',function(){
  codeBox.select();
  document.execCommand('copy');
  var msg=document.getElementById('copy-msg');
  msg.style.opacity='1';
  setTimeout(function(){msg.style.opacity='0'},1500);
});

// Init
rebuildAll();

})();
</script>
<script src="/sloppy-header/sloppy-bar.js"></script>
</body>
</html>
