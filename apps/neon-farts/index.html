<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Neon Farts</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#070418">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%92%A8">
<meta name="description" content="A fully procedural fart generator. Every press creates a unique noise + 5-tier rarity roll. Collect legendaries.">
<meta property="og:title" content="Neon Farts">
<meta property="og:description" content="A fully procedural fart generator. Every press creates a unique noise + 5-tier rarity roll. Collect legendaries.">
<meta property="og:url" content="https://sloppy.live/neon-farts">
<meta property="og:image" content="https://image.pollinations.ai/prompt/neon%20glowing%20arcade%20buttons%20on%20dark%20synthwave%20background%2C%20procedural%20sound%20generator%2C%20cyan%20magenta%20gold?width=1200&height=630&model=flux&seed=8888&nologo=true">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Bowlby+One+SC&family=Major+Mono+Display&family=Share+Tech+Mono&family=Rubik+Mono+One&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#070418;
    --void-2:#15083a;
    --cyan:#5ce6ff;
    --magenta:#ff2bd6;
    --pink:#ff6ec0;
    --gold:#ffd454;
    --lime:#a5ff52;
    --violet:#9b5bff;
    --orange:#ff8a3a;
    --rust:#8a3a1f;
    --ink:#f4f0ff;
    --silver:#a3a8c2;
    --silver-dim:#5e637a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  html,body{min-height:100%;background:var(--void);color:var(--ink);font-family:'Share Tech Mono', monospace;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:manipulation;overflow-x:hidden}
  body{
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(255,43,214,0.15), transparent 60%),
      radial-gradient(ellipse 70% 40% at 50% 100%, rgba(92,230,255,0.10), transparent 70%),
      var(--void);
    display:flex;flex-direction:column;align-items:center;min-height:100vh;
  }
  header{text-align:center;padding:1rem 1rem 0.3rem;position:relative;z-index:2}
  h1{
    font-family:'Bowlby One SC', sans-serif;
    font-size:clamp(2rem, 5.4vw, 3.4rem);letter-spacing:0.05em;
    background:linear-gradient(180deg, var(--cyan), var(--magenta) 55%, var(--orange));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 14px rgba(255,138,58,0.4));line-height:1;text-transform:uppercase;
  }
  .tag{font-family:'Major Mono Display', monospace;font-size:clamp(0.65rem, 1.2vw, 0.85rem);letter-spacing:0.32em;color:var(--silver);margin-top:0.25rem;text-transform:lowercase}

  main{flex:1;display:flex;flex-direction:column;align-items:center;width:100%;max-width:44rem;padding:0.5rem 1rem 1rem;gap:1rem}

  /* viz canvas */
  .viz-wrap{
    width:100%;position:relative;
    background:rgba(7,4,24,0.74);
    border:1px solid rgba(155,91,255,0.30);border-radius:0.5rem;
    box-shadow:0 0 20px rgba(155,91,255,0.16), inset 0 0 14px rgba(0,0,0,0.45);
    padding:0.6rem 0.8rem;
  }
  .viz-wrap canvas{display:block;width:100%;height:90px;border-radius:0.25rem}
  .viz-label{
    position:absolute;top:0.5rem;left:0.9rem;
    font-family:'Share Tech Mono', monospace;font-size:0.62rem;letter-spacing:0.22em;color:var(--silver);text-transform:uppercase;
  }
  .last-card{
    position:absolute;bottom:0.45rem;right:0.85rem;
    font-family:'Audiowide', monospace;font-size:0.75rem;letter-spacing:0.06em;
    color:var(--cyan);
  }
  .last-card .rarity-tag{
    display:inline-block;margin-left:0.4rem;padding:0.15rem 0.45rem;border-radius:0.2rem;
    font-size:0.55rem;letter-spacing:0.2em;text-transform:uppercase;
    border:1px solid currentColor;
  }

  /* family grid */
  .grid{
    display:grid;grid-template-columns:repeat(3, 1fr);gap:0.6rem;width:100%;
  }
  .pad{
    position:relative;
    background:linear-gradient(180deg, rgba(40,18,80,0.85), rgba(8,2,22,0.95));
    color:var(--ink);
    border:2px solid var(--violet);
    border-radius:0.7rem;
    padding:1rem 0.5rem 0.7rem;
    cursor:pointer;font-family:'Audiowide', monospace;font-size:0.85rem;letter-spacing:0.06em;
    text-transform:uppercase;text-align:center;
    box-shadow:
      0 0 14px rgba(155,91,255,0.35),
      inset 0 0 8px rgba(155,91,255,0.10),
      0 5px 0 rgba(0,0,0,0.4);
    min-height:6rem;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.4rem;
    transition:transform 0.08s, box-shadow 0.2s;
    overflow:hidden;
  }
  .pad:hover{transform:translateY(-1px);box-shadow:0 0 22px rgba(155,91,255,0.55), inset 0 0 12px rgba(155,91,255,0.15), 0 5px 0 rgba(0,0,0,0.4)}
  .pad:active{transform:translateY(4px);box-shadow:0 0 22px rgba(255,43,214,0.55), inset 0 0 12px rgba(255,43,214,0.20), 0 1px 0 rgba(0,0,0,0.4)}
  .pad:focus-visible{outline:3px solid var(--cyan);outline-offset:3px}
  .pad .emoji{font-family:initial;font-size:2rem;line-height:1;filter:drop-shadow(0 0 8px currentColor)}
  .pad .name{font-size:0.78rem;color:var(--ink);text-shadow:0 0 6px currentColor;letter-spacing:0.08em}
  .pad .kbd{position:absolute;top:0.35rem;right:0.5rem;font-family:'Space Mono', monospace;font-size:0.55rem;color:var(--silver-dim);letter-spacing:0.1em}

  .pad[data-fam="brass"]   {border-color:var(--gold);    color:var(--gold);    box-shadow:0 0 14px rgba(255,212,84,0.40), inset 0 0 8px rgba(255,212,84,0.10), 0 5px 0 rgba(0,0,0,0.4)}
  .pad[data-fam="wet"]     {border-color:var(--cyan);    color:var(--cyan);    box-shadow:0 0 14px rgba(92,230,255,0.40), inset 0 0 8px rgba(92,230,255,0.10), 0 5px 0 rgba(0,0,0,0.4)}
  .pad[data-fam="squeak"]  {border-color:var(--pink);    color:var(--pink);    box-shadow:0 0 14px rgba(255,110,192,0.40), inset 0 0 8px rgba(255,110,192,0.10), 0 5px 0 rgba(0,0,0,0.4)}
  .pad[data-fam="sub"]     {border-color:var(--magenta); color:var(--magenta); box-shadow:0 0 14px rgba(255,43,214,0.40), inset 0 0 8px rgba(255,43,214,0.10), 0 5px 0 rgba(0,0,0,0.4)}
  .pad[data-fam="bubble"]  {border-color:var(--lime);    color:var(--lime);    box-shadow:0 0 14px rgba(165,255,82,0.40), inset 0 0 8px rgba(165,255,82,0.10), 0 5px 0 rgba(0,0,0,0.4)}
  .pad[data-fam="ghost"]   {border-color:var(--violet);  color:var(--violet);  box-shadow:0 0 14px rgba(155,91,255,0.40), inset 0 0 8px rgba(155,91,255,0.10), 0 5px 0 rgba(0,0,0,0.4)}

  /* big action row */
  .actions{display:flex;gap:0.5rem;width:100%;flex-wrap:wrap}
  .actions .big{
    flex:1;min-width:9rem;
    background:linear-gradient(180deg, rgba(80,10,40,0.92), rgba(20,4,30,0.95));
    border:2px solid #ff2c2c;color:#ff7c7c;
    font-family:'Bowlby One SC', sans-serif;font-size:0.95rem;letter-spacing:0.08em;
    padding:0.85rem;border-radius:0.5rem;cursor:pointer;min-height:3rem;text-transform:uppercase;
    box-shadow:0 0 18px rgba(255,44,44,0.45), inset 0 0 12px rgba(255,44,44,0.15), 0 4px 0 rgba(0,0,0,0.4);
  }
  .actions .big:hover{box-shadow:0 0 26px rgba(255,44,44,0.7), inset 0 0 14px rgba(255,44,44,0.2), 0 4px 0 rgba(0,0,0,0.4)}
  .actions .big.random{
    background:linear-gradient(180deg, rgba(20,80,30,0.92), rgba(4,20,8,0.95));
    border-color:var(--lime);color:var(--lime);
    box-shadow:0 0 18px rgba(165,255,82,0.42), inset 0 0 12px rgba(165,255,82,0.12), 0 4px 0 rgba(0,0,0,0.4);
  }
  .actions .big.random:hover{box-shadow:0 0 26px rgba(165,255,82,0.7), inset 0 0 14px rgba(165,255,82,0.2), 0 4px 0 rgba(0,0,0,0.4)}
  .actions .big.mash{
    background:linear-gradient(180deg, rgba(80,40,10,0.92), rgba(30,12,4,0.95));
    border-color:var(--orange);color:var(--orange);
    box-shadow:0 0 18px rgba(255,138,58,0.45), inset 0 0 12px rgba(255,138,58,0.15), 0 4px 0 rgba(0,0,0,0.4);
  }
  .actions .big.mash:hover{box-shadow:0 0 26px rgba(255,138,58,0.7), inset 0 0 14px rgba(255,138,58,0.2), 0 4px 0 rgba(0,0,0,0.4)}
  .actions .big.mash[aria-pressed="true"]{background:linear-gradient(180deg, rgba(120,60,15,0.95), rgba(60,24,8,0.95));animation:mashPulse 0.6s ease-in-out infinite alternate}
  @keyframes mashPulse{from{box-shadow:0 0 18px rgba(255,138,58,0.45), inset 0 0 12px rgba(255,138,58,0.15)} to{box-shadow:0 0 32px rgba(255,138,58,0.8), inset 0 0 18px rgba(255,138,58,0.25)}}

  /* stats */
  .stats-row{
    display:flex;gap:0.45rem;width:100%;justify-content:center;flex-wrap:wrap;
    background:rgba(7,4,24,0.82);
    border:1px solid rgba(92,230,255,0.32);
    padding:0.55rem 0.7rem;border-radius:0.4rem;
    font-family:'Share Tech Mono', monospace;font-size:0.7rem;letter-spacing:0.14em;text-transform:uppercase;
    color:var(--silver);
  }
  .stats-row .pill{
    background:rgba(155,91,255,0.16);color:var(--cyan);
    padding:0.32rem 0.55rem;border-radius:0.2rem;border:1px solid rgba(92,230,255,0.4);
    font-family:'Audiowide', monospace;font-size:0.7rem;
  }
  .stats-row .pill.legend{color:var(--gold);border-color:var(--gold);background:rgba(255,212,84,0.16);box-shadow:0 0 10px rgba(255,212,84,0.4)}
  .stats-row .pill.rare{color:var(--magenta);border-color:var(--magenta);background:rgba(255,43,214,0.14)}

  /* hud bottom */
  .hud{
    margin-top:auto;display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;justify-content:center;
    background:rgba(7,4,24,0.86);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(92,230,255,0.32);
    padding:0.5rem 0.75rem;border-radius:0.4rem;
    font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--silver);
    width:100%;font-family:'Share Tech Mono', monospace;
  }
  .hud kbd{
    background:#1a0735;border:1px solid rgba(92,230,255,0.4);border-radius:0.2rem;
    color:var(--ink);padding:0.18rem 0.35rem;font-size:0.6rem;
    min-width:1.3rem;text-align:center;display:inline-block;
  }
  .hud button{
    background:transparent;color:var(--cyan);border:1px solid var(--cyan);
    font-family:inherit;font-size:0.62rem;letter-spacing:0.18em;text-transform:uppercase;
    padding:0.42rem 0.65rem;border-radius:0.22rem;cursor:pointer;min-height:2.5rem;
  }
  .hud button:hover{background:rgba(92,230,255,0.12)}
  .hud button:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}

  .legendary-banner{
    position:fixed;left:50%;top:30%;transform:translate(-50%, -50%);
    font-family:'Bowlby One SC', sans-serif;
    font-size:clamp(2rem, 7vw, 4.4rem);letter-spacing:0.08em;text-transform:uppercase;
    color:var(--gold);text-shadow:0 0 22px var(--gold), 0 0 44px rgba(255,212,84,0.6);
    pointer-events:none;z-index:9;opacity:0;text-align:center;
  }
  .legendary-banner.show{opacity:1;animation:lgPop 1.6s cubic-bezier(0.34, 1.56, 0.64, 1)}
  @keyframes lgPop{0%{opacity:0;transform:translate(-50%,-50%) scale(0.4)}15%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}50%{transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(1)}}

  @media (max-width: 540px){
    .grid{gap:0.4rem}
    .pad{padding:0.7rem 0.35rem 0.55rem;min-height:5rem;font-size:0.7rem}
    .pad .emoji{font-size:1.5rem}
    .pad .name{font-size:0.62rem}
    .actions .big{font-size:0.78rem;padding:0.7rem}
  }
  @media (prefers-reduced-motion: reduce){
    .actions .big.mash[aria-pressed="true"]{animation:none}
  }
</style>
</head>
<body>
  <header>
    <h1>Neon Farts</h1>
    <div class="tag">every press · uniquely generated · never repeats</div>
  </header>

  <main>
    <div class="viz-wrap">
      <span class="viz-label">last waveform</span>
      <canvas id="vizCanvas"></canvas>
      <div class="last-card" id="lastCard">— · <span class="rarity-tag" style="color:var(--silver)">none</span></div>
    </div>

    <div class="grid" id="grid" role="group" aria-label="Fart family pads"></div>

    <div class="actions" role="group" aria-label="Generator actions">
      <button class="big random" id="randomBtn" type="button" aria-label="Roll a random family + random params">🎲 ROLL UNIQUE</button>
      <button class="big mash" id="mashBtn" type="button" aria-pressed="false" aria-label="Auto-mash: rapid random farts">🌪 MASH MODE</button>
      <button class="big" id="legendBtn" type="button" aria-label="Force a guaranteed legendary">⭐ FORCE LEGEND</button>
    </div>

    <div class="stats-row" role="group" aria-label="Session stats">
      <span class="pill" id="totalPill">0 unique</span>
      <span class="pill rare" id="rarePill">0 rare</span>
      <span class="pill legend" id="legendPill">0 legendary</span>
    </div>

    <div class="hud">
      <span><kbd>1</kbd>–<kbd>6</kbd> family</span>
      <span><kbd>R</kbd> roll</span>
      <span><kbd>M</kbd> mash</span>
      <span style="margin-left:auto">
        <button id="muteBtn" type="button" aria-pressed="false" aria-label="Toggle sound">♪ on</button>
      </span>
    </div>
  </main>

  <div class="legendary-banner" id="legendBanner" aria-live="polite"></div>

<script>
(function(){
  'use strict';

  function showError(msg){
    try {
      var t = document.getElementById('errToast');
      if (!t){
        t = document.createElement('div');
        t.id = 'errToast';
        t.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#3a0610;color:#ffb6c1;font-family:monospace;font-size:11px;padding:8px 12px;border-bottom:1px solid #ff2bd6;white-space:pre-wrap';
        document.body.appendChild(t);
      }
      t.textContent = '⚠ ' + msg;
    } catch(_){}
  }
  window.addEventListener('error', function(ev){
    showError((ev.message || 'error') + ' @ ' + (ev.filename ? ev.filename.split('/').pop() : '?') + ':' + (ev.lineno || '?'));
  });

  // ── Families ──
  // Each family is a parameter-space template. randomFart(family) samples
  // values within the ranges and synthesizes a fresh voice — every press is unique.
  var FAMILIES = [
    {
      id: 'brass', name: 'BRASS', emoji: '🎺',
      // brassy formant farts — saw through dual bandpass
      ranges: {
        baseFreq:  [140, 220],
        slideTo:   [-30, 30],    // semitones-ish offset
        dur:       [0.45, 0.85],
        formant1:  [780, 980],
        formant2:  [1200, 1500],
        formantQ:  [4, 7],
        gain:      [0.32, 0.50]
      }
    },
    {
      id: 'wet', name: 'WET', emoji: '💧',
      // wet rip — sawtooth with heavy LFO wobble + bandpass + noise crackle
      ranges: {
        baseFreq:  [75, 115],
        slideTo:   [-60, -10],  // slides down
        dur:       [0.4, 0.75],
        lfoRate:   [12, 22],
        lfoDepth:  [22, 42],
        bpFreq:    [240, 420],
        bpQ:       [3.5, 5.5],
        crackleGain: [0.08, 0.16],
        gain:      [0.42, 0.60]
      }
    },
    {
      id: 'squeak', name: 'SQUEAK', emoji: '🐭',
      // high-pitched square with vibrato
      ranges: {
        baseFreq:  [320, 540],
        slideTo:   [-80, 80],
        dur:       [0.18, 0.42],
        lfoRate:   [18, 32],
        lfoDepth:  [18, 38],
        bpFreq:    [600, 900],
        bpQ:       [3, 5],
        gain:      [0.22, 0.38]
      }
    },
    {
      id: 'sub', name: 'SUB', emoji: '🪨',
      // deep sub + saw harmonic
      ranges: {
        baseFreq:  [50, 75],
        slideTo:   [-30, -10],
        dur:       [0.6, 1.0],
        subGain:   [0.65, 0.85],
        sawFreq:   [60, 90],
        sawCutoff: [180, 280],
        crackleGain: [0.10, 0.20],
        gain:      [0.55, 0.80]
      }
    },
    {
      id: 'bubble', name: 'BUBBLE', emoji: '🫧',
      // staircase pitch + bubble pop overlays
      ranges: {
        baseRange: [60, 200],   // random per-step pitch range
        steps:     [5, 9],
        dur:       [0.55, 0.95],
        bpFreq:    [320, 480],
        bpQ:       [2.8, 4.5],
        popCount:  [3, 7],
        popRange:  [240, 600],
        gain:      [0.35, 0.55]
      }
    },
    {
      id: 'ghost', name: 'GHOST', emoji: '👻',
      // breathy noise sweep + sub whisper tone
      ranges: {
        startFreq: [1800, 2600],
        endFreq:   [300, 500],
        dur:       [0.9, 1.4],
        whisperFreq: [180, 260],
        whisperEnd:  [60, 100],
        Q:         [1.5, 2.5],
        gain:      [0.14, 0.22]
      }
    }
  ];

  function r(rng){ return rng[0] + Math.random() * (rng[1] - rng[0]); }
  function pick(arr){ return arr[Math.floor(Math.random() * arr.length)]; }

  // ── Rarity rolls ──
  // common 50 / uncommon 30 / rare 15 / epic 4 / legendary 1
  var RARITIES = [
    { id: 'common',    label: 'common',    weight: 50, color: 'var(--silver)',  durMul: [1.0, 1.0],   modifier: null },
    { id: 'uncommon',  label: 'uncommon',  weight: 30, color: 'var(--lime)',    durMul: [1.0, 1.15],  modifier: 'slightlyLonger' },
    { id: 'rare',      label: 'rare',      weight: 15, color: 'var(--magenta)', durMul: [1.1, 1.35],  modifier: 'extraWobble' },
    { id: 'epic',      label: 'epic',      weight: 4,  color: 'var(--violet)',  durMul: [1.2, 1.5],   modifier: 'distorted' },
    { id: 'legendary', label: 'legendary', weight: 1,  color: 'var(--gold)',    durMul: [1.4, 1.8],   modifier: 'epicReverb' }
  ];
  function rollRarity(){
    var total = RARITIES.reduce(function(s, x){ return s + x.weight; }, 0);
    var n = Math.random() * total;
    var acc = 0;
    for (var i = 0; i < RARITIES.length; i++){
      acc += RARITIES[i].weight;
      if (n < acc) return RARITIES[i];
    }
    return RARITIES[0];
  }

  // ── Audio ──
  var audioCtx = null;
  var muted = false;
  var masterGain = null;
  var analyser = null;
  var reverbConvolver = null;
  var reverbSend = null;
  function ensureAudio(){
    if (audioCtx){ if (audioCtx.state === 'suspended') audioCtx.resume(); return audioCtx; }
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.85;
      var comp = audioCtx.createDynamicsCompressor();
      comp.threshold.value = -10; comp.knee.value = 14; comp.ratio.value = 4;
      analyser = audioCtx.createAnalyser();
      analyser.fftSize = 2048; analyser.smoothingTimeConstant = 0.5;
      masterGain.connect(comp).connect(analyser).connect(audioCtx.destination);

      // procedural impulse response for the epic reverb modifier
      var irLen = audioCtx.sampleRate * 2.4;
      var ir = audioCtx.createBuffer(2, irLen, audioCtx.sampleRate);
      for (var ch = 0; ch < 2; ch++){
        var d = ir.getChannelData(ch);
        for (var i = 0; i < irLen; i++){
          d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / irLen, 2.2);
        }
      }
      reverbConvolver = audioCtx.createConvolver();
      reverbConvolver.buffer = ir;
      reverbSend = audioCtx.createGain();
      reverbSend.gain.value = 0.55;
      reverbConvolver.connect(reverbSend).connect(masterGain);
    } catch(e){ showError('audio: ' + e.message); audioCtx = null; }
    return audioCtx;
  }
  function noiseBuf(durSec){
    var n = Math.floor(audioCtx.sampleRate * durSec);
    var b = audioCtx.createBuffer(1, n, audioCtx.sampleRate);
    var d = b.getChannelData(0);
    for (var i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/n, 1.4);
    return b;
  }

  // ── Synthesis dispatch ──
  function synthFart(familyIdx, rarityOverride){
    if (!ensureAudio() || muted) {
      // still register the "unique" for the count, just don't play audio
      return { familyIdx: familyIdx, rarity: rarityOverride || rollRarity(), params: {} };
    }
    var fam = FAMILIES[familyIdx];
    var rarity = rarityOverride || rollRarity();
    var c = audioCtx;
    var t = c.currentTime;
    var params = sampleParams(fam.ranges);

    // Apply rarity duration multiplier
    var durMul = r(rarity.durMul);
    if (params.dur) params.dur *= durMul;

    // Modifier hooks: build the "wet" output node + optionally a distortion + reverb send
    var outNode = c.createGain();
    outNode.gain.value = 1.0;
    outNode.connect(masterGain);

    var sendReverb = (rarity.modifier === 'epicReverb');
    if (sendReverb){
      var rg = c.createGain(); rg.gain.value = 0.55;
      outNode.connect(rg).connect(reverbConvolver);
    }

    var sinkNode = outNode;
    if (rarity.modifier === 'distorted'){
      // mild waveshaper for grit
      var ws = c.createWaveShaper();
      var n = 256, curve = new Float32Array(n);
      for (var i = 0; i < n; i++){
        var x = (i / n) * 2 - 1;
        curve[i] = Math.tanh(x * 4.5);
      }
      ws.curve = curve;
      ws.oversample = '2x';
      var dryGain = c.createGain(); dryGain.gain.value = 0.6;
      dryGain.connect(outNode);
      ws.connect(dryGain);
      sinkNode = ws;
    }

    // Build voice based on family
    switch (fam.id){
      case 'brass':   synthBrass(t, params, sinkNode); break;
      case 'wet':     synthWet(t, params, sinkNode, rarity); break;
      case 'squeak':  synthSqueak(t, params, sinkNode, rarity); break;
      case 'sub':     synthSub(t, params, sinkNode); break;
      case 'bubble':  synthBubble(t, params, sinkNode); break;
      case 'ghost':   synthGhost(t, params, sinkNode); break;
    }

    return { familyIdx: familyIdx, rarity: rarity, params: params };
  }

  function sampleParams(ranges){
    var out = {};
    for (var k in ranges) out[k] = r(ranges[k]);
    return out;
  }

  function synthBrass(t, p, dest){
    var o = audioCtx.createOscillator(); o.type = 'sawtooth';
    var startFreq = p.baseFreq;
    o.frequency.setValueAtTime(startFreq, t);
    o.frequency.linearRampToValueAtTime(startFreq + p.slideTo * 0.5, t + 0.08);
    o.frequency.linearRampToValueAtTime(startFreq + p.slideTo, t + p.dur);
    var bp1 = audioCtx.createBiquadFilter(); bp1.type = 'bandpass'; bp1.frequency.value = p.formant1; bp1.Q.value = p.formantQ;
    var bp2 = audioCtx.createBiquadFilter(); bp2.type = 'bandpass'; bp2.frequency.value = p.formant2; bp2.Q.value = p.formantQ * 0.85;
    var mix = audioCtx.createGain(); mix.gain.value = 0.6;
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(p.gain, t + 0.08);
    g.gain.linearRampToValueAtTime(p.gain * 0.4, t + p.dur * 0.7);
    g.gain.exponentialRampToValueAtTime(0.0001, t + p.dur);
    o.connect(bp1).connect(mix);
    o.connect(bp2).connect(mix);
    mix.connect(g).connect(dest);
    o.start(t); o.stop(t + p.dur + 0.05);
  }

  function synthWet(t, p, dest, rarity){
    var o = audioCtx.createOscillator(); o.type = 'sawtooth';
    o.frequency.setValueAtTime(p.baseFreq, t);
    o.frequency.exponentialRampToValueAtTime(Math.max(20, p.baseFreq + p.slideTo), t + p.dur);
    var lfo = audioCtx.createOscillator(); lfo.type = 'sine';
    var lfoRate = p.lfoRate;
    if (rarity && rarity.modifier === 'extraWobble') lfoRate *= 1.6;
    lfo.frequency.value = lfoRate;
    var lfoG = audioCtx.createGain();
    var lfoDepth = p.lfoDepth;
    if (rarity && rarity.modifier === 'extraWobble') lfoDepth *= 1.8;
    lfoG.gain.value = lfoDepth;
    lfo.connect(lfoG).connect(o.frequency);
    var bp = audioCtx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = p.bpFreq; bp.Q.value = p.bpQ;
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(p.gain, t + 0.04);
    g.gain.linearRampToValueAtTime(p.gain * 0.3, t + p.dur * 0.7);
    g.gain.exponentialRampToValueAtTime(0.0001, t + p.dur);
    o.connect(bp).connect(g).connect(dest);
    o.start(t); o.stop(t + p.dur + 0.05);
    lfo.start(t); lfo.stop(t + p.dur + 0.05);
    // crackle layer
    var nb = noiseBuf(p.dur);
    var ns = audioCtx.createBufferSource(); ns.buffer = nb;
    var nbp = audioCtx.createBiquadFilter(); nbp.type = 'bandpass'; nbp.frequency.value = 1200; nbp.Q.value = 1.8;
    var ng = audioCtx.createGain(); ng.gain.value = p.crackleGain;
    ns.connect(nbp).connect(ng).connect(dest);
    ns.start(t);
  }

  function synthSqueak(t, p, dest, rarity){
    var o = audioCtx.createOscillator(); o.type = 'square';
    o.frequency.setValueAtTime(p.baseFreq, t);
    o.frequency.linearRampToValueAtTime(p.baseFreq + p.slideTo * 0.3, t + 0.08);
    o.frequency.linearRampToValueAtTime(p.baseFreq + p.slideTo, t + p.dur);
    var lfo = audioCtx.createOscillator(); lfo.type = 'sine';
    var lfoRate = p.lfoRate * (rarity && rarity.modifier === 'extraWobble' ? 1.5 : 1);
    lfo.frequency.value = lfoRate;
    var lfoG = audioCtx.createGain(); lfoG.gain.value = p.lfoDepth;
    lfo.connect(lfoG).connect(o.frequency);
    var bp = audioCtx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = p.bpFreq; bp.Q.value = p.bpQ;
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(p.gain, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + p.dur);
    o.connect(bp).connect(g).connect(dest);
    o.start(t); o.stop(t + p.dur + 0.05);
    lfo.start(t); lfo.stop(t + p.dur + 0.05);
  }

  function synthSub(t, p, dest){
    var o = audioCtx.createOscillator(); o.type = 'sine';
    o.frequency.setValueAtTime(p.baseFreq, t);
    o.frequency.exponentialRampToValueAtTime(Math.max(20, p.baseFreq + p.slideTo), t + p.dur);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(p.gain * p.subGain, t + 0.04);
    g.gain.exponentialRampToValueAtTime(0.0001, t + p.dur);
    o.connect(g).connect(dest);
    o.start(t); o.stop(t + p.dur + 0.05);
    // saw harmonic for grit
    var o2 = audioCtx.createOscillator(); o2.type = 'sawtooth';
    o2.frequency.setValueAtTime(p.sawFreq, t);
    o2.frequency.exponentialRampToValueAtTime(Math.max(20, p.sawFreq * 0.5), t + p.dur);
    var lp = audioCtx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = p.sawCutoff;
    var g2 = audioCtx.createGain();
    g2.gain.setValueAtTime(0.0001, t);
    g2.gain.linearRampToValueAtTime(p.gain * 0.3, t + 0.04);
    g2.gain.exponentialRampToValueAtTime(0.0001, t + p.dur);
    o2.connect(lp).connect(g2).connect(dest);
    o2.start(t); o2.stop(t + p.dur + 0.05);
    // crackle transient
    var nb = noiseBuf(0.06);
    var ns = audioCtx.createBufferSource(); ns.buffer = nb;
    var nlp = audioCtx.createBiquadFilter(); nlp.type = 'lowpass'; nlp.frequency.value = 380;
    var ng = audioCtx.createGain(); ng.gain.value = p.crackleGain;
    ns.connect(nlp).connect(ng).connect(dest);
    ns.start(t);
  }

  function synthBubble(t, p, dest){
    var o = audioCtx.createOscillator(); o.type = 'sawtooth';
    var steps = Math.floor(p.steps);
    for (var s = 0; s < steps; s++){
      var st = t + (s / steps) * p.dur;
      var f = p.baseRange + Math.random() * 80;
      o.frequency.setValueAtTime(f, st);
    }
    var bp = audioCtx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = p.bpFreq; bp.Q.value = p.bpQ;
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(p.gain, t + 0.05);
    g.gain.exponentialRampToValueAtTime(0.0001, t + p.dur);
    o.connect(bp).connect(g).connect(dest);
    o.start(t); o.stop(t + p.dur + 0.05);
    // pop overlays
    var pops = Math.floor(p.popCount);
    for (var pi = 0; pi < pops; pi++){
      var pt = t + Math.random() * p.dur;
      var po = audioCtx.createOscillator(); po.type = 'sine';
      po.frequency.value = 200 + Math.random() * (p.popRange - 200);
      var pg = audioCtx.createGain();
      pg.gain.setValueAtTime(0.0001, pt);
      pg.gain.exponentialRampToValueAtTime(0.20, pt + 0.005);
      pg.gain.exponentialRampToValueAtTime(0.0001, pt + 0.06);
      po.connect(pg).connect(dest);
      po.start(pt); po.stop(pt + 0.08);
    }
  }

  function synthGhost(t, p, dest){
    var nb = noiseBuf(p.dur);
    var ns = audioCtx.createBufferSource(); ns.buffer = nb;
    var bp = audioCtx.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = p.Q;
    bp.frequency.setValueAtTime(p.startFreq, t);
    bp.frequency.exponentialRampToValueAtTime(p.endFreq, t + p.dur);
    var g = audioCtx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(p.gain, t + 0.20);
    g.gain.linearRampToValueAtTime(p.gain * 0.6, t + p.dur * 0.6);
    g.gain.exponentialRampToValueAtTime(0.0001, t + p.dur);
    ns.connect(bp).connect(g).connect(dest);
    ns.start(t);
    // sub whisper tone
    var o = audioCtx.createOscillator(); o.type = 'sine';
    o.frequency.setValueAtTime(p.whisperFreq, t);
    o.frequency.exponentialRampToValueAtTime(Math.max(20, p.whisperEnd), t + p.dur);
    var og = audioCtx.createGain();
    og.gain.setValueAtTime(0.0001, t);
    og.gain.linearRampToValueAtTime(0.10, t + 0.10);
    og.gain.exponentialRampToValueAtTime(0.0001, t + p.dur);
    o.connect(og).connect(dest);
    o.start(t); o.stop(t + p.dur + 0.05);
  }

  // ── State ──
  var state = {
    total: 0,
    byRarity: { common: 0, uncommon: 0, rare: 0, epic: 0, legendary: 0 },
    mashOn: false,
    mashTimer: null
  };

  function loadState(){
    try {
      var raw = localStorage.getItem('neon-farts-v1');
      if (!raw) return;
      var s = JSON.parse(raw);
      if (s.total) state.total = s.total;
      if (s.byRarity) state.byRarity = Object.assign(state.byRarity, s.byRarity);
    } catch(_){}
  }
  function saveState(){
    try {
      localStorage.setItem('neon-farts-v1', JSON.stringify({ total: state.total, byRarity: state.byRarity }));
    } catch(_){}
  }
  loadState();

  function refreshStats(){
    document.getElementById('totalPill').textContent = state.total + ' unique';
    var rareCount = state.byRarity.rare + state.byRarity.epic;
    document.getElementById('rarePill').textContent = rareCount + ' rare';
    document.getElementById('legendPill').textContent = state.byRarity.legendary + ' legendary';
  }
  refreshStats();

  // ── Last card + viz ──
  var lastCard = document.getElementById('lastCard');
  function setLastCard(famName, rarity, params){
    var color = rarity.color;
    var label = famName + ' · ' + Math.round(params.baseFreq || params.startFreq || params.baseRange || 100) + 'Hz';
    var dur = params.dur ? params.dur.toFixed(2) + 's' : '';
    lastCard.innerHTML =
      '<span style="color:' + color + '">' + label + ' · ' + dur + '</span>' +
      '<span class="rarity-tag" style="color:' + color + ';text-shadow:0 0 6px ' + color + '">' + rarity.label + '</span>';
  }

  // ── Viz canvas ──
  var vizCanvas = document.getElementById('vizCanvas');
  var vctx = vizCanvas.getContext('2d');
  var vDPR = Math.min(window.devicePixelRatio || 1, 2);
  function resizeViz(){
    var rect = vizCanvas.getBoundingClientRect();
    vizCanvas.width = Math.floor(rect.width * vDPR);
    vizCanvas.height = Math.floor(rect.height * vDPR);
    vctx.setTransform(vDPR, 0, 0, vDPR, 0, 0);
  }
  setTimeout(resizeViz, 50);
  window.addEventListener('resize', resizeViz);

  var timeData = null;
  function drawViz(){
    requestAnimationFrame(drawViz);
    if (!analyser){
      // empty grid
      var rect = vizCanvas.getBoundingClientRect();
      vctx.fillStyle = '#04020f'; vctx.fillRect(0, 0, rect.width, rect.height);
      vctx.strokeStyle = 'rgba(155,91,255,0.25)'; vctx.lineWidth = 1;
      vctx.beginPath(); vctx.moveTo(0, rect.height/2); vctx.lineTo(rect.width, rect.height/2); vctx.stroke();
      return;
    }
    if (!timeData) timeData = new Uint8Array(analyser.fftSize);
    analyser.getByteTimeDomainData(timeData);
    var rect = vizCanvas.getBoundingClientRect();
    var w = rect.width, h = rect.height;
    vctx.fillStyle = '#04020f';
    vctx.fillRect(0, 0, w, h);
    // grid
    vctx.strokeStyle = 'rgba(155,91,255,0.18)'; vctx.lineWidth = 1;
    vctx.beginPath();
    vctx.moveTo(0, h/2); vctx.lineTo(w, h/2); vctx.stroke();
    // 3-pass chromatic-aberration waveform
    vctx.save();
    vctx.globalCompositeOperation = 'lighter';
    var passes = [
      { off: -1, color: 'rgba(255,43,214,0.55)' },
      { off:  1, color: 'rgba(92,230,255,0.55)' },
      { off:  0, color: 'rgba(244,240,255,0.85)' }
    ];
    var step = Math.max(1, Math.floor(timeData.length / w));
    passes.forEach(function(p){
      vctx.strokeStyle = p.color;
      vctx.lineWidth = p.off === 0 ? 1.5 : 1;
      vctx.shadowColor = p.color; vctx.shadowBlur = 6;
      vctx.beginPath();
      for (var i = 0; i < w; i++){
        var idx = Math.min(timeData.length - 1, i * step);
        var v = timeData[idx] / 128 - 1;
        var y = h/2 + v * h * 0.42;
        if (i === 0) vctx.moveTo(i + p.off, y);
        else vctx.lineTo(i + p.off, y);
      }
      vctx.stroke();
    });
    vctx.restore();
    vctx.shadowBlur = 0;
  }
  requestAnimationFrame(drawViz);

  // ── Trigger ──
  function fire(familyIdx, opts){
    ensureAudio();
    var rarityOverride = opts && opts.forceRarity ? RARITIES.find(function(x){ return x.id === opts.forceRarity; }) : null;
    var result = synthFart(familyIdx, rarityOverride);
    state.total++;
    state.byRarity[result.rarity.id] = (state.byRarity[result.rarity.id] || 0) + 1;
    saveState();
    refreshStats();
    setLastCard(FAMILIES[familyIdx].name, result.rarity, result.params);
    // Legendary banner
    if (result.rarity.id === 'legendary'){
      var b = document.getElementById('legendBanner');
      b.textContent = '⭐ LEGENDARY ⭐';
      b.classList.remove('show');
      void b.offsetWidth;
      b.classList.add('show');
      setTimeout(function(){ b.classList.remove('show'); }, 1700);
    } else if (result.rarity.id === 'epic'){
      var b2 = document.getElementById('legendBanner');
      b2.textContent = '◆ EPIC ◆';
      b2.style.color = 'var(--violet)';
      b2.style.textShadow = '0 0 22px var(--violet), 0 0 44px rgba(155,91,255,0.5)';
      b2.classList.remove('show');
      void b2.offsetWidth;
      b2.classList.add('show');
      setTimeout(function(){
        b2.classList.remove('show');
        // restore gold style for next legend
        b2.style.color = ''; b2.style.textShadow = '';
      }, 1200);
    }
  }

  // ── Build grid ──
  var grid = document.getElementById('grid');
  FAMILIES.forEach(function(f, i){
    var b = document.createElement('button');
    b.type = 'button';
    b.className = 'pad';
    b.dataset.fam = f.id;
    b.setAttribute('aria-label', f.name + ' family — generates a unique fart in this family on each press');
    b.innerHTML =
      '<span class="kbd">' + (i + 1) + '</span>' +
      '<span class="emoji" aria-hidden="true">' + f.emoji + '</span>' +
      '<span class="name">' + f.name + '</span>';
    b.addEventListener('click', function(){ fire(i); });
    grid.appendChild(b);
  });

  // Actions
  document.getElementById('randomBtn').addEventListener('click', function(){
    var idx = Math.floor(Math.random() * FAMILIES.length);
    fire(idx);
  });
  document.getElementById('legendBtn').addEventListener('click', function(){
    var idx = Math.floor(Math.random() * FAMILIES.length);
    fire(idx, { forceRarity: 'legendary' });
  });
  var mashBtn = document.getElementById('mashBtn');
  function toggleMash(){
    state.mashOn = !state.mashOn;
    mashBtn.setAttribute('aria-pressed', state.mashOn ? 'true' : 'false');
    if (state.mashOn){
      mashBtn.textContent = '⏹ STOP MASH';
      function loop(){
        if (!state.mashOn) return;
        var idx = Math.floor(Math.random() * FAMILIES.length);
        fire(idx);
        state.mashTimer = setTimeout(loop, 180 + Math.random() * 180);
      }
      loop();
    } else {
      mashBtn.textContent = '🌪 MASH MODE';
      if (state.mashTimer){ clearTimeout(state.mashTimer); state.mashTimer = null; }
    }
  }
  mashBtn.addEventListener('click', toggleMash);

  // Mute
  document.getElementById('muteBtn').addEventListener('click', function(){
    muted = !muted;
    this.textContent = muted ? '♪ off' : '♪ on';
    this.setAttribute('aria-pressed', muted ? 'true' : 'false');
  });

  // Keyboard
  window.addEventListener('keydown', function(e){
    if (e.target && e.target.tagName === 'INPUT') return;
    if (e.code === 'KeyR'){ e.preventDefault(); document.getElementById('randomBtn').click(); }
    else if (e.code === 'KeyM'){ e.preventDefault(); toggleMash(); }
    else if (e.code === 'KeyL'){ e.preventDefault(); document.getElementById('legendBtn').click(); }
    else {
      var num = parseInt(e.key, 10);
      if (num >= 1 && num <= FAMILIES.length){
        fire(num - 1);
      }
    }
  });

  // Set viz canvas size after main is laid out
  setTimeout(resizeViz, 200);
})();
</script>
</body>
</html>
