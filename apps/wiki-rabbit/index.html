<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wiki Rabbit Hole</title>
<link rel="icon" href="https://emojicdn.elk.sh/🐇">
<meta property="og:title" content="Wiki Rabbit Hole">
<meta property="og:description" content="Fall down the Wikipedia rabbit hole. Follow links, track your journey, see how deep you go.">
<meta property="og:url" content="https://sloppy.live/wiki-rabbit/">
<meta property="og:image" content="https://sloppy.live/wiki-rabbit/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a12;--card:#10111a;--border:rgba(120,100,255,0.1);--accent:#7c6aff;--accent2:#ff6a9f;--text:#ccc;--dim:rgba(255,255,255,0.3);--glow:rgba(124,106,255,0.15)}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:'Newsreader',serif;overflow-x:hidden}
.app{max-width:800px;margin:0 auto;padding:16px 12px 60px}
.header{text-align:center;padding:20px 0 12px}
.header h1{font-size:clamp(1.2rem,4vw,1.8rem);color:var(--accent);text-shadow:0 0 20px var(--glow);letter-spacing:.02em}
.header .sub{font-family:'IBM Plex Mono',monospace;font-size:.65rem;color:var(--dim);margin-top:4px}
.search-bar{display:flex;gap:8px;margin:16px 0;position:relative}
.search-bar input{flex:1;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:#eee;font-family:'Newsreader',serif;font-size:.95rem;outline:none;transition:border-color .2s}
.search-bar input:focus{border-color:var(--accent)}
.search-bar input::placeholder{color:var(--dim)}
.search-bar button{background:var(--accent);border:none;border-radius:8px;padding:10px 18px;color:#fff;font-family:'IBM Plex Mono',monospace;font-size:.75rem;cursor:pointer;letter-spacing:.05em;white-space:nowrap}
.search-bar button:hover{filter:brightness(1.2)}
.suggestions{position:absolute;top:100%;left:0;right:60px;background:var(--card);border:1px solid var(--border);border-radius:0 0 8px 8px;max-height:200px;overflow-y:auto;z-index:10;display:none}
.suggestions.show{display:block}
.suggestions div{padding:8px 14px;cursor:pointer;font-size:.85rem;border-bottom:1px solid var(--border)}
.suggestions div:hover{background:rgba(124,106,255,0.1)}
.trail{display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin:10px 0;min-height:28px}
.trail .crumb{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--accent);cursor:pointer;padding:2px 8px;background:rgba(124,106,255,0.08);border-radius:10px;white-space:nowrap;transition:background .2s}
.trail .crumb:hover{background:rgba(124,106,255,0.2)}
.trail .arrow{color:var(--dim);font-size:.6rem}
.depth-bar{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:8px 12px;margin:8px 0;display:flex;align-items:center;gap:10px;font-family:'IBM Plex Mono',monospace;font-size:.65rem;color:var(--dim)}
.depth-bar .meter{flex:1;height:6px;background:rgba(255,255,255,0.05);border-radius:3px;overflow:hidden}
.depth-bar .meter-fill{height:100%;border-radius:3px;transition:width .4s,background .4s}
.depth-bar .depth-num{color:var(--accent2);font-weight:500}
.article{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin:12px 0;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.article h2{font-size:clamp(1rem,3vw,1.4rem);color:#eee;margin-bottom:4px}
.article .extract{font-size:.9rem;line-height:1.7;color:var(--text);margin:10px 0 16px}
.article .links-label{font-family:'IBM Plex Mono',monospace;font-size:.6rem;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px}
.article .links{display:flex;flex-wrap:wrap;gap:6px}
.article .links a{font-size:.8rem;color:var(--accent);text-decoration:none;padding:4px 12px;border:1px solid var(--border);border-radius:16px;cursor:pointer;transition:all .2s;font-family:'IBM Plex Mono',monospace}
.article .links a:hover{background:rgba(124,106,255,0.12);border-color:var(--accent)}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:12px 0}
.stat{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:10px;text-align:center}
.stat .snum{font-family:'IBM Plex Mono',monospace;font-size:1.1rem;color:var(--accent)}
.stat .slabel{font-size:.55rem;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-top:2px}
.empty{text-align:center;padding:40px 20px;color:var(--dim);font-size:.9rem;line-height:2}
.empty .rabbit{font-size:3rem;display:block;margin-bottom:10px}
.loading{text-align:center;padding:30px;color:var(--dim)}
.loading::after{content:'';display:inline-block;width:16px;height:16px;border:2px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;margin-left:8px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}
.graph-wrap{background:var(--card);border:1px solid var(--border);border-radius:10px;margin:12px 0;overflow:hidden;position:relative;display:none}
.graph-wrap.show{display:block}
.graph-wrap canvas{display:block;width:100%;cursor:grab}
.graph-wrap canvas:active{cursor:grabbing}
.graph-label{position:absolute;top:6px;right:10px;font-family:'IBM Plex Mono',monospace;font-size:.55rem;color:var(--dim);pointer-events:none}
.starter-topics{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:16px 0}
.starter-topics button{font-family:'IBM Plex Mono',monospace;font-size:.7rem;color:var(--accent);background:rgba(124,106,255,0.06);border:1px solid var(--border);border-radius:14px;padding:5px 14px;cursor:pointer;transition:all .2s}
.starter-topics button:hover{background:rgba(124,106,255,0.15);border-color:var(--accent)}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Wiki Rabbit Hole</h1>
    <div class="sub">how deep will you go?</div>
  </div>

  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search Wikipedia..." autocomplete="off">
    <button id="searchBtn">DIVE IN</button>
    <div class="suggestions" id="suggestions"></div>
  </div>

  <div class="trail" id="trail"></div>
  <div class="depth-bar" id="depthBar" style="display:none">
    <span>DEPTH</span>
    <div class="meter"><div class="meter-fill" id="depthFill"></div></div>
    <span class="depth-num" id="depthNum">0</span>
  </div>

  <div class="stats" id="stats" style="display:none">
    <div class="stat"><div class="snum" id="statDepth">0</div><div class="slabel">Depth</div></div>
    <div class="stat"><div class="snum" id="statArticles">0</div><div class="slabel">Articles</div></div>
    <div class="stat"><div class="snum" id="statTime">0:00</div><div class="slabel">Time</div></div>
  </div>

  <div class="graph-wrap" id="graphWrap">
    <div class="graph-label">JOURNEY MAP</div>
    <canvas id="graphCV" height="180"></canvas>
  </div>

  <div id="content">
    <div class="empty">
      <span class="rabbit">🐇</span>
      Search for any topic to start your rabbit hole journey.<br>
      Follow the links. See how deep you go.
    </div>
    <div class="starter-topics" id="starters">
    </div>
  </div>
</div>
<script>
var searchInput=document.getElementById('searchInput');
var searchBtn=document.getElementById('searchBtn');
var suggestionsEl=document.getElementById('suggestions');
var trailEl=document.getElementById('trail');
var contentEl=document.getElementById('content');
var depthBar=document.getElementById('depthBar');
var depthFill=document.getElementById('depthFill');
var depthNum=document.getElementById('depthNum');
var statsEl=document.getElementById('stats');

var trail=[];
var visited=new Set();
var startTime=null;
var timerInterval=null;

var STARTERS=['Black Holes','Ancient Rome','Octopus','Quantum Mechanics','Bermuda Triangle',
  'Nikola Tesla','Deep Sea','Pyramids','Fermi Paradox','Synesthesia','Fibonacci','Cuttlefish','Alchemy'];

// Render starter buttons
var startersEl=document.getElementById('starters');
var shuffled=STARTERS.sort(function(){return Math.random()-0.5;}).slice(0,8);
for(var i=0;i<shuffled.length;i++){
  var btn=document.createElement('button');
  btn.textContent=shuffled[i];
  btn.addEventListener('click',(function(t){return function(){loadArticle(t);};})(shuffled[i]));
  startersEl.appendChild(btn);
}

// --- WIKIPEDIA API ---
var API='https://en.wikipedia.org/api/rest_v1';

function searchWiki(query){
  return fetch('https://en.wikipedia.org/w/api.php?action=opensearch&search='+encodeURIComponent(query)+'&limit=6&format=json&origin=*')
    .then(function(r){return r.json();})
    .then(function(d){
      // opensearch returns [query, [titles], [descriptions], [urls]]
      var titles=d[1]||[];
      return titles.map(function(t){return {title:t};});
    });
}

function getArticle(title){
  // Use MediaWiki API for reliable redirects and encoding
  return fetch('https://en.wikipedia.org/w/api.php?action=query&titles='+encodeURIComponent(title)+
    '&prop=extracts|pageimages|info&exintro=1&explaintext=1&redirects=1&format=json&origin=*')
    .then(function(r){return r.json();})
    .then(function(d){
      var pages=d.query.pages;
      for(var id in pages){
        if(id==='-1') throw new Error('Not found');
        var p=pages[id];
        return {title:p.title,extract:p.extract||'',description:''};
      }
      throw new Error('Not found');
    });
}

function getLinks(title){
  return fetch('https://en.wikipedia.org/w/api.php?action=query&titles='+encodeURIComponent(title)+
    '&prop=links&pllimit=50&plnamespace=0&redirects=1&format=json&origin=*')
    .then(function(r){return r.json();})
    .then(function(d){
      if(!d.query) return [];
      var pages=d.query.pages;
      var links=[];
      for(var id in pages){
        if(id==='-1') continue;
        if(pages[id].links){
          for(var i=0;i<pages[id].links.length;i++){
            links.push(pages[id].links[i].title);
          }
        }
      }
      return links;
    }).catch(function(){return [];});
}

// --- AUTOCOMPLETE ---
var suggestTimer=null;
searchInput.addEventListener('input',function(){
  clearTimeout(suggestTimer);
  var q=searchInput.value.trim();
  if(q.length<2){suggestionsEl.className='suggestions';return;}
  suggestTimer=setTimeout(function(){
    searchWiki(q).then(function(pages){
      if(pages.length===0){suggestionsEl.className='suggestions';return;}
      suggestionsEl.innerHTML='';
      for(var i=0;i<pages.length;i++){
        var div=document.createElement('div');
        div.textContent=pages[i].title;
        div.addEventListener('click',(function(t){return function(){
          searchInput.value='';suggestionsEl.className='suggestions';
          loadArticle(t);
        };})(pages[i].title));
        suggestionsEl.appendChild(div);
      }
      suggestionsEl.className='suggestions show';
    });
  },300);
});

document.addEventListener('click',function(e){
  if(!e.target.closest('.search-bar')) suggestionsEl.className='suggestions';
});

searchBtn.addEventListener('click',function(){
  var q=searchInput.value.trim();
  if(q) loadArticle(q);
  searchInput.value='';suggestionsEl.className='suggestions';
});
searchInput.addEventListener('keydown',function(e){
  if(e.key==='Enter'){searchBtn.click();}
});

// --- LOAD ARTICLE ---
function loadArticle(title){
  contentEl.innerHTML='<div class="loading">Diving deeper</div>';

  if(!startTime){
    startTime=Date.now();
    timerInterval=setInterval(updateTimer,1000);
  }

  Promise.all([getArticle(title),getLinks(title)]).then(function(results){
    var article=results[0];
    var links=results[1];
    var realTitle=article.title||title;

    trail.push(realTitle);
    visited.add(realTitle);

    renderTrail();
    renderDepth();
    renderArticle(article,links);
    updateStats();
  }).catch(function(err){
    console.error('Wiki fetch error:',err);
    contentEl.innerHTML='<div class="empty">Could not find &ldquo;'+escHtml(title)+'&rdquo;. Try another search!</div>';
  });
}

function renderArticle(article,links){
  // Filter links: remove boring ones, shuffle, pick interesting subset
  var filtered=links.filter(function(l){
    return l.length>2&&l.indexOf(':')===-1&&!visited.has(l);
  });
  // Shuffle
  for(var i=filtered.length-1;i>0;i--){
    var j=Math.floor(Math.random()*(i+1));
    var t=filtered[i];filtered[i]=filtered[j];filtered[j]=t;
  }
  var shown=filtered.slice(0,15);

  var extract=article.extract||'No summary available.';
  // Truncate long extracts
  if(extract.length>600) extract=extract.substring(0,600).replace(/\s\S*$/,'')+'...';

  var html='<div class="article">';
  html+='<h2>'+escHtml(article.title)+'</h2>';
  if(article.description) html+='<div style="font-size:.75rem;color:var(--dim);margin-bottom:6px;font-family:IBM Plex Mono,monospace">'+escHtml(article.description)+'</div>';
  html+='<div class="extract">'+escHtml(extract)+'</div>';

  if(shown.length>0){
    html+='<div class="links-label">Follow the rabbit &rarr;</div>';
    html+='<div class="links">';
    for(var i=0;i<shown.length;i++){
      html+='<a data-title="'+escAttr(shown[i])+'">'+escHtml(shown[i])+'</a>';
    }
    html+='</div>';
  }
  html+='</div>';
  contentEl.innerHTML=html;

  // Wire link clicks
  var linkEls=contentEl.querySelectorAll('.links a');
  for(var i=0;i<linkEls.length;i++){
    linkEls[i].addEventListener('click',function(e){
      e.preventDefault();
      loadArticle(this.dataset.title);
    });
  }

  // Scroll to article
  contentEl.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function renderTrail(){
  trailEl.innerHTML='';
  var start=Math.max(0,trail.length-8);
  if(start>0){
    var dots=document.createElement('span');dots.className='arrow';dots.textContent='...';
    trailEl.appendChild(dots);
  }
  for(var i=start;i<trail.length;i++){
    if(i>start){
      var arrow=document.createElement('span');arrow.className='arrow';arrow.textContent='\u2192';
      trailEl.appendChild(arrow);
    }
    var crumb=document.createElement('span');crumb.className='crumb';
    crumb.textContent=trail[i];
    crumb.dataset.idx=i;
    crumb.addEventListener('click',function(){
      var idx=parseInt(this.dataset.idx);
      trail=trail.slice(0,idx);
      loadArticle(this.textContent);
    });
    trailEl.appendChild(crumb);
  }
}

function renderDepth(){
  var depth=trail.length;
  depthBar.style.display='flex';
  statsEl.style.display='grid';
  depthNum.textContent=depth;
  var pct=Math.min(100,depth/20*100);
  depthFill.style.width=pct+'%';
  // Color shifts as you go deeper
  var hue=270-depth*8;
  depthFill.style.background='hsl('+hue+',80%,60%)';
}

function updateStats(){
  document.getElementById('statDepth').textContent=trail.length;
  document.getElementById('statArticles').textContent=visited.size;
}

function updateTimer(){
  if(!startTime) return;
  var elapsed=Math.floor((Date.now()-startTime)/1000);
  var m=Math.floor(elapsed/60);
  var s=elapsed%60;
  document.getElementById('statTime').textContent=m+':'+(s<10?'0':'')+s;
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escAttr(s){return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;');}

// --- NODE GRAPH ---
var graphWrap=document.getElementById('graphWrap');
var graphCV=document.getElementById('graphCV');
var gX=graphCV.getContext('2d');
var graphNodes=[];// {title,x,y,vx,vy}
var graphEdges=[];// {from,to}

function addGraphNode(title){
  // Check if node exists
  for(var i=0;i<graphNodes.length;i++){
    if(graphNodes[i].title===title) return i;
  }
  // Position relative to parent
  var px=graphCV.width/2,py=90;
  if(graphNodes.length>0){
    var last=graphNodes[graphNodes.length-1];
    var ang=-Math.PI/2+(Math.random()-0.5)*1.2;
    px=last.x+Math.cos(ang)*80;
    py=last.y+Math.sin(ang)*60;
  }
  var idx=graphNodes.length;
  graphNodes.push({title:title,x:px,y:py,vx:0,vy:0,r:18,hue:240+idx*25});
  return idx;
}

function addGraphEdge(fromTitle,toTitle){
  var fi=-1,ti=-1;
  for(var i=0;i<graphNodes.length;i++){
    if(graphNodes[i].title===fromTitle) fi=i;
    if(graphNodes[i].title===toTitle) ti=i;
  }
  if(fi>=0&&ti>=0){
    // Check duplicate
    for(var i=0;i<graphEdges.length;i++){
      if(graphEdges[i].from===fi&&graphEdges[i].to===ti) return;
    }
    graphEdges.push({from:fi,to:ti});
  }
}

function updateGraph(){
  if(graphNodes.length<1) return;
  graphWrap.classList.add('show');
  var w=graphCV.width=graphCV.offsetWidth||600;
  var h=graphCV.height=Math.max(160,Math.min(280,graphNodes.length*30+80));

  // Simple force layout
  for(var iter=0;iter<20;iter++){
    // Repulsion between all nodes
    for(var i=0;i<graphNodes.length;i++){
      for(var j=i+1;j<graphNodes.length;j++){
        var dx=graphNodes[j].x-graphNodes[i].x;
        var dy=graphNodes[j].y-graphNodes[i].y;
        var d=Math.sqrt(dx*dx+dy*dy)||1;
        var force=800/(d*d);
        var fx=dx/d*force,fy=dy/d*force;
        graphNodes[i].vx-=fx;graphNodes[i].vy-=fy;
        graphNodes[j].vx+=fx;graphNodes[j].vy+=fy;
      }
    }
    // Attraction along edges
    for(var i=0;i<graphEdges.length;i++){
      var e=graphEdges[i];
      var a=graphNodes[e.from],b=graphNodes[e.to];
      var dx=b.x-a.x,dy=b.y-a.y;
      var d=Math.sqrt(dx*dx+dy*dy)||1;
      var force=(d-80)*0.05;
      var fx=dx/d*force,fy=dy/d*force;
      a.vx+=fx;a.vy+=fy;
      b.vx-=fx;b.vy-=fy;
    }
    // Center pull
    var cx=w/2,cy=h/2;
    for(var i=0;i<graphNodes.length;i++){
      graphNodes[i].vx+=(cx-graphNodes[i].x)*0.005;
      graphNodes[i].vy+=(cy-graphNodes[i].y)*0.005;
    }
    // Apply velocity with damping
    for(var i=0;i<graphNodes.length;i++){
      var n=graphNodes[i];
      n.x+=n.vx*0.3;n.y+=n.vy*0.3;
      n.vx*=0.5;n.vy*=0.5;
      // Keep in bounds
      n.x=Math.max(50,Math.min(w-50,n.x));
      n.y=Math.max(25,Math.min(h-25,n.y));
    }
  }

  drawGraph(w,h);
}

function drawGraph(w,h){
  var X=gX;
  X.clearRect(0,0,w,h);

  // Edges
  for(var i=0;i<graphEdges.length;i++){
    var e=graphEdges[i];
    var a=graphNodes[e.from],b=graphNodes[e.to];
    // Glow
    X.strokeStyle='rgba(124,106,255,0.12)';X.lineWidth=4;
    X.beginPath();X.moveTo(a.x,a.y);X.lineTo(b.x,b.y);X.stroke();
    // Line
    X.strokeStyle='rgba(124,106,255,0.35)';X.lineWidth=1.5;
    X.beginPath();X.moveTo(a.x,a.y);X.lineTo(b.x,b.y);X.stroke();
    // Arrow
    var ang=Math.atan2(b.y-a.y,b.x-a.x);
    var ax=b.x-Math.cos(ang)*22,ay=b.y-Math.sin(ang)*22;
    X.fillStyle='rgba(124,106,255,0.4)';
    X.beginPath();
    X.moveTo(ax+Math.cos(ang)*8,ay+Math.sin(ang)*8);
    X.lineTo(ax+Math.cos(ang+2.5)*6,ay+Math.sin(ang+2.5)*6);
    X.lineTo(ax+Math.cos(ang-2.5)*6,ay+Math.sin(ang-2.5)*6);
    X.closePath();X.fill();
  }

  // Nodes
  for(var i=0;i<graphNodes.length;i++){
    var n=graphNodes[i];
    var isLast=i===graphNodes.length-1;
    var hue=n.hue%360;
    var color='hsl('+hue+',70%,65%)';
    var glowColor='hsla('+hue+',70%,65%,0.2)';

    // Glow
    var g=X.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r*2);
    g.addColorStop(0,glowColor);g.addColorStop(1,'transparent');
    X.fillStyle=g;X.beginPath();X.arc(n.x,n.y,n.r*2,0,Math.PI*2);X.fill();

    // Node circle
    X.fillStyle=isLast?color:'hsla('+hue+',50%,20%,0.8)';
    X.strokeStyle=color;X.lineWidth=isLast?2.5:1.5;
    X.shadowColor=color;X.shadowBlur=isLast?12:4;
    X.beginPath();X.arc(n.x,n.y,n.r-(isLast?0:4),0,Math.PI*2);
    X.fill();X.stroke();
    X.shadowBlur=0;

    // Label
    var label=n.title.length>16?n.title.substring(0,15)+'..':n.title;
    X.fillStyle=isLast?'#fff':'rgba(255,255,255,0.6)';
    X.font=(isLast?'500 ':'')+'9px "IBM Plex Mono",monospace';
    X.textAlign='center';X.textBaseline='middle';
    X.fillText(label,n.x,n.y);

    // Depth number
    X.fillStyle='rgba(255,255,255,0.15)';
    X.font='7px "IBM Plex Mono",monospace';
    X.fillText('#'+(i+1),n.x,n.y+n.r+8);
  }
}

// Hook into loadArticle - update graph when articles load
var _origRenderTrail=renderTrail;
renderTrail=function(){
  _origRenderTrail();
  // Rebuild graph from trail
  if(trail.length>=2){
    var prevTitle=trail[trail.length-2];
    var curTitle=trail[trail.length-1];
    addGraphNode(prevTitle);
    addGraphNode(curTitle);
    addGraphEdge(prevTitle,curTitle);
  } else if(trail.length===1){
    addGraphNode(trail[0]);
  }
  updateGraph();
};
</script>
</body>
</html>
