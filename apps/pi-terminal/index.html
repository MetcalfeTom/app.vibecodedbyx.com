<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>π TERMINAL</title>
<meta name="description" content="One million true digits of π streaming down a green CRT. Search for your birthday and watch it glow gold in the infinite.">
<link rel="icon" href="https://emojicdn.elk.sh/🥧">
<meta property="og:title" content="π TERMINAL — the digits never stop">
<meta property="og:description" content="A phosphor-green terminal streaming a million digits of π. Find your birthday hiding in the decimals — it glows gold.">
<meta property="og:url" content="https://sloppy.live/pi-terminal/">
<meta property="og:type" content="website">
<meta property="og:image" content="https://image.pollinations.ai/prompt/green%20phosphor%20CRT%20terminal%20screen%20streaming%20endless%20digits%20of%20pi%2C%20one%20golden%20glowing%20number%20sequence%20highlighted%2C%20retro%20computer%2C%20dark%20room.png?width=1200&height=630&seed=3141&model=flux&nologo=true">
<style>
  :root{
    --bg:#020604;
    --phos:#41ff7a;
    --phos-dim:#1d8a44;
    --phos-faint:#0f4023;
    --gold:#ffd34d;
    --amber:#c8a03a;
  }
  html{ font-size:100%; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    font-family:"VT323", monospace;
    background:var(--bg);
    color:var(--phos);
    height:100dvh;
    display:flex;
    flex-direction:column;
    overflow:hidden;
  }
  /* CRT screen */
  #crt{
    position:relative;
    flex:1;
    min-height:0;
    margin:0.6rem 0.8rem;
    border-radius:1rem;
    background:radial-gradient(ellipse 90% 80% at 50% 45%, #04140a, var(--bg) 85%);
    box-shadow:
      inset 0 0 6rem rgba(0,0,0,0.85),
      inset 0 0 1.4rem rgba(65,255,122,0.12),
      0 0 2rem rgba(65,255,122,0.08);
    border:3px solid #0c1a10;
    overflow:hidden;
  }
  #crt::after{
    content:'';
    position:absolute; inset:0;
    pointer-events:none;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,0.22) 0 1px, transparent 1px 3px);
    mix-blend-mode:multiply;
  }
  #crt::before{
    content:'';
    position:absolute; inset:0;
    pointer-events:none;
    z-index:2;
    background:radial-gradient(ellipse at 50% 45%, transparent 60%, rgba(0,0,0,0.5) 100%);
  }
  #scroll{
    position:absolute; inset:0;
    overflow-y:auto;
    padding:1rem 1.4rem 3rem;
    scrollbar-width:thin;
    scrollbar-color:var(--phos-dim) transparent;
  }
  .ln{
    display:flex;
    gap:1.2rem;
    font-size:clamp(0.95rem, 1.9vw, 1.25rem);
    line-height:1.5;
    white-space:pre;
    text-shadow:0 0 0.5rem rgba(65,255,122,0.55);
  }
  .ln .off{
    color:var(--phos-dim);
    min-width:5.4rem;
    text-align:right;
    text-shadow:none;
    user-select:none;
  }
  .ln mark{
    background:transparent;
    color:var(--gold);
    text-shadow:0 0 0.7rem rgba(255,211,77,0.9), 0 0 1.6rem rgba(255,211,77,0.5);
    border-bottom:2px solid var(--gold);
  }
  #cursor{
    display:inline-block;
    width:0.6em;
    background:var(--phos);
    animation:blink 1s steps(2) infinite;
  }
  @keyframes blink{ 50%{ opacity:0; } }
  #head3{
    font-size:clamp(1rem, 2vw, 1.3rem);
    padding-bottom:0.4rem;
    color:var(--phos);
    text-shadow:0 0 0.6rem rgba(65,255,122,0.6);
  }
  /* top bar */
  header{
    display:flex; align-items:baseline; gap:1rem;
    padding:0.7rem 1.2rem 0;
    flex-wrap:wrap;
  }
  h1{
    font-family:"Major Mono Display", monospace;
    font-size:clamp(1.1rem, 3vw, 1.6rem);
    color:var(--phos);
    text-shadow:0 0 1rem rgba(65,255,122,0.6);
    letter-spacing:0.1em;
  }
  .tag{ font-size:1rem; color:var(--phos-dim); }
  #stats{
    margin-left:auto;
    font-size:1rem;
    color:var(--phos-dim);
    display:flex; gap:1.4rem;
  }
  #stats b{ color:var(--phos); font-weight:400; }
  /* controls */
  #bar{
    display:flex; gap:0.6rem; align-items:center; flex-wrap:wrap;
    padding:0.4rem 1.2rem 0.8rem;
  }
  button, input, .lbl{
    font-family:inherit;
    font-size:1.05rem;
  }
  button{
    min-height:2.75rem;
    padding:0.2rem 1rem;
    background:transparent;
    color:var(--phos);
    border:1px solid var(--phos-dim);
    border-radius:0.3rem;
    cursor:pointer;
    text-shadow:0 0 0.5rem rgba(65,255,122,0.5);
  }
  button:hover{ border-color:var(--phos); }
  button.gold{ color:var(--gold); border-color:var(--amber); text-shadow:0 0 0.5rem rgba(255,211,77,0.6); }
  button:focus-visible, input:focus-visible{ outline:3px solid var(--gold); outline-offset:2px; }
  input[type=date]{
    min-height:2.75rem;
    padding:0.2rem 0.6rem;
    background:#04140a;
    color:var(--phos);
    border:1px solid var(--phos-dim);
    border-radius:0.3rem;
    color-scheme:dark;
  }
  input[type=range]{ width:8rem; accent-color:var(--phos); min-height:2.75rem; }
  .lbl{ color:var(--phos-dim); display:flex; align-items:center; gap:0.5rem; }
  #results{
    display:flex; gap:0.5rem; flex-wrap:wrap;
    padding:0 1.2rem 0.5rem;
    min-height:1.4rem;
    font-size:1rem;
  }
  #results .hit{
    color:var(--gold);
    border:1px solid var(--amber);
    border-radius:0.3rem;
    padding:0.1rem 0.6rem;
    cursor:pointer;
    min-height:2.2rem;
    display:inline-flex; align-items:center;
    background:transparent;
    font-family:inherit;
    font-size:1rem;
  }
  #results .miss{ color:var(--phos-dim); }
  #banner{
    position:fixed;
    top:4.6rem; left:50%;
    transform:translateX(-50%);
    color:var(--gold);
    font-size:1.2rem;
    text-shadow:0 0 1rem rgba(255,211,77,0.8);
    opacity:0;
    transition:opacity 0.4s ease;
    pointer-events:none;
    z-index:5;
  }
  #banner.show{ opacity:1; }
  @media (prefers-reduced-motion: reduce){
    #cursor{ animation:none; }
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=VT323&display=swap" rel="stylesheet">
</head>
<body>
<header>
  <h1>π TERMINAL</h1>
  <p class="tag">one million true decimals · the feed never sleeps</p>
  <div id="stats" aria-live="off">
    <span>POS <b id="sPos">0</b></span>
    <span><b id="sRate">60</b> digits/s</span>
  </div>
</header>

<div id="bar" role="group" aria-label="Terminal controls">
  <button type="button" id="btnPause">⏸ PAUSE</button>
  <label class="lbl">SPEED
    <input id="speed" type="range" min="10" max="500" value="60" aria-label="Streaming speed, digits per second">
  </label>
  <label class="lbl">🎂
    <input id="bday" type="date" aria-label="Your birthday">
  </label>
  <button type="button" class="gold" id="btnFind">FIND MY BIRTHDAY</button>
  <button type="button" id="btnLive" hidden>▶ RESUME LIVE FEED</button>
</div>
<div id="results" aria-live="polite"></div>
<p id="banner" aria-hidden="true"></p>

<main id="crt" aria-label="Pi digit stream">
  <div id="scroll" tabindex="0">
    <p id="head3">π = 3.</p>
    <div id="lines"></div>
  </div>
</main>

<script>
(function(){
'use strict';

var PI = '';
var LINE = 50, GROUP = 10, MAXDOM = 500;
var pos = 0;                /* digits streamed so far (index into PI) */
var speed = 60, paused = false, inspect = false;
var follow = true;

var scrollEl = document.getElementById('scroll');
var linesEl = document.getElementById('lines');

function fmtLine(start, text, mStart, mLen){
  /* text = up to LINE digits beginning at PI index start.
     optional match [mStart, mStart+mLen) in absolute PI coords → gold */
  var out = '';
  for(var i = 0; i < text.length; i++){
    if(i > 0 && i % GROUP === 0) out += ' ';
    var abs = start + i;
    var inM = mLen && abs >= mStart && abs < mStart + mLen;
    var ch = text[i];
    if(inM) out += '' + ch + '';   /* placeholders → <mark> */
    else out += ch;
  }
  out = out.replace(//g, '<mark>').replace(//g, '</mark>').replace(/<\/mark><mark>/g, '');
  return '<span class="off">' + (start + 1) + '</span><span>' + out + '</span>';
}
function addStreamLine(start, text, done){
  var d = document.createElement('div');
  d.className = 'ln';
  d.innerHTML = fmtLine(start, text) + (done ? '' : '');
  linesEl.appendChild(d);
  while(linesEl.children.length > MAXDOM) linesEl.firstChild.remove();
}

/* ── streaming ── */
var carry = null;   /* the currently-growing line element */
var carryStart = 0;
function stream(nDigits){
  if(pos >= PI.length) return;
  var end = Math.min(PI.length, pos + nDigits);
  while(pos < end){
    var lineStart = Math.floor(pos / LINE) * LINE;
    var lineEnd = Math.min(lineStart + LINE, end);
    var isNew = pos === lineStart;
    var text = PI.slice(lineStart, lineEnd);
    if(isNew || !carry || carryStart !== lineStart){
      carry = document.createElement('div');
      carry.className = 'ln';
      carryStart = lineStart;
      linesEl.appendChild(carry);
      while(linesEl.children.length > MAXDOM) linesEl.firstChild.remove();
    }
    carry.innerHTML = fmtLine(lineStart, text) + (lineEnd % LINE ? '<span id="cursor"> </span>' : '');
    pos = lineEnd;
  }
  document.getElementById('sPos').textContent = pos.toLocaleString();
  if(follow) scrollEl.scrollTop = scrollEl.scrollHeight;
  /* did the birthday just stream past? */
  if(bdayPatterns.length){
    var from = Math.max(0, pos - nDigits - 12);
    var chunk = PI.slice(from, pos);
    for(var i = 0; i < bdayPatterns.length; i++){
      var at = chunk.indexOf(bdayPatterns[i].p);
      if(at >= 0 && from + at + bdayPatterns[i].p.length > pos - nDigits){
        flashBanner('🎂 your birthday (' + bdayPatterns[i].p + ') just streamed past at position ' + (from + at + 1).toLocaleString() + '!');
      }
    }
  }
}
var bannerT = 0;
function flashBanner(t){
  var b = document.getElementById('banner');
  b.textContent = t;
  b.classList.add('show');
  clearTimeout(bannerT);
  bannerT = setTimeout(function(){ b.classList.remove('show'); }, 4500);
}

var last = performance.now(), acc = 0;
function frame(now){
  requestAnimationFrame(frame);
  var dt = (now - last) / 1000;
  last = now;
  if(paused || inspect || !PI) return;
  acc += dt * speed;
  var n = Math.floor(acc);
  if(n > 0){ acc -= n; stream(n); }
}
requestAnimationFrame(frame);

/* user scrolling up disables follow */
scrollEl.addEventListener('scroll', function(){
  var nearBottom = scrollEl.scrollHeight - scrollEl.scrollTop - scrollEl.clientHeight < 60;
  follow = nearBottom;
});

/* ── controls ── */
var pauseBtn = document.getElementById('btnPause');
pauseBtn.addEventListener('click', function(){
  paused = !paused;
  pauseBtn.textContent = paused ? '▶ RESUME' : '⏸ PAUSE';
});
var speedIn = document.getElementById('speed');
speedIn.addEventListener('input', function(){
  speed = +speedIn.value;
  document.getElementById('sRate').textContent = speed;
});

/* ── birthday search ── */
var bdayPatterns = [];
function datePatterns(iso){
  var m = iso.match(/^(\d{4})-(\d{2})-(\d{2})$/);
  if(!m) return [];
  var Y = m[1], M = m[2], D = m[3], y = Y.slice(2);
  var raw = [
    { p: D + M + y,  f: 'DDMMYY' },
    { p: M + D + y,  f: 'MMDDYY' },
    { p: y + M + D,  f: 'YYMMDD' },
    { p: D + M + Y,  f: 'DDMMYYYY' },
    { p: M + D + Y,  f: 'MMDDYYYY' },
    { p: Y + M + D,  f: 'YYYYMMDD' }
  ];
  var seen = {};
  return raw.filter(function(r){ if(seen[r.p]) return false; seen[r.p] = true; return true; });
}
document.getElementById('btnFind').addEventListener('click', function(){
  var iso = document.getElementById('bday').value;
  var res = document.getElementById('results');
  res.textContent = '';
  if(!iso){ res.innerHTML = '<span class="miss">enter your birthday first — π is patient.</span>'; return; }
  bdayPatterns = datePatterns(iso);
  var any = false;
  bdayPatterns.forEach(function(r){
    var at = PI.indexOf(r.p);
    if(at < 0){
      var s = document.createElement('span');
      s.className = 'miss';
      s.textContent = r.f + ' (' + r.p + '): not in the first million';
      res.appendChild(s);
      return;
    }
    any = true;
    var b = document.createElement('button');
    b.type = 'button';
    b.className = 'hit';
    b.textContent = '★ ' + r.f + ' (' + r.p + ') @ ' + (at + 1).toLocaleString();
    b.addEventListener('click', function(){ jumpTo(at, r.p.length); });
    res.appendChild(b);
  });
  if(!any){
    var s2 = document.createElement('span');
    s2.className = 'miss';
    s2.textContent = ' your birthday hides beyond the first million digits. too legendary for this terminal.';
    res.appendChild(s2);
  }
});

/* ── inspect mode: jump to a match, gold it ── */
function jumpTo(at, len){
  inspect = true;
  document.getElementById('btnLive').hidden = false;
  linesEl.textContent = '';
  carry = null;
  var firstLine = Math.max(0, Math.floor(at / LINE) - 8) * 1;
  var startLine = Math.max(0, Math.floor(at / LINE) - 8);
  var endLine = Math.floor((at + len) / LINE) + 8;
  for(var L = startLine; L <= endLine; L++){
    var s = L * LINE;
    if(s >= PI.length) break;
    var d = document.createElement('div');
    d.className = 'ln';
    d.innerHTML = fmtLine(s, PI.slice(s, s + LINE), at, len);
    linesEl.appendChild(d);
  }
  /* scroll the gold into view */
  var mk = linesEl.querySelector('mark');
  if(mk) mk.scrollIntoView({ block: 'center' });
  document.getElementById('sPos').textContent = (at + 1).toLocaleString() + ' (inspecting)';
}
document.getElementById('btnLive').addEventListener('click', function(){
  inspect = false;
  this.hidden = true;
  linesEl.textContent = '';
  carry = null;
  /* re-render the tail before resuming */
  var startLine = Math.max(0, Math.floor(pos / LINE) - 30);
  for(var L = startLine; L * LINE < pos; L++){
    var s = L * LINE;
    var d = document.createElement('div');
    d.className = 'ln';
    d.innerHTML = fmtLine(s, PI.slice(s, Math.min(s + LINE, pos)));
    linesEl.appendChild(d);
  }
  follow = true;
  scrollEl.scrollTop = scrollEl.scrollHeight;
});

/* ── boot: fetch the million ── */
fetch('pi.txt')
  .then(function(r){ if(!r.ok) throw new Error('pi ' + r.status); return r.text(); })
  .then(function(t){
    PI = t.trim();
    flashBanner('π loaded: ' + PI.length.toLocaleString() + ' true decimals. streaming…');
  })
  .catch(function(){
    document.getElementById('head3').textContent = 'π failed to load — reload the terminal.';
  });

/* debug/testing */
window.__pi = function(){
  return { loaded: PI.length, pos: pos, paused: paused, inspect: inspect };
};
window.__piFind = function(p){ return PI.indexOf(p); };
window.__piJump = jumpTo;
})();
</script>
</body>
</html>
