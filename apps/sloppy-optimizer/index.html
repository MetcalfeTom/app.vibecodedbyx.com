<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Sloppy Optimizer</title>
<meta name="description" content="Type a sloppy prompt — get a sharp, paste-ready prompt. Neon big-button prompt optimizer." />
<meta property="og:title" content="Sloppy Optimizer" />
<meta property="og:description" content="Type a sloppy prompt → get a sharp, paste-ready prompt. Neon big-button prompt optimizer." />
<meta property="og:url" content="https://sloppy.live/sloppy-optimizer/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/neon%20brutalist%20prompt%20optimizer%20interface%20huge%20chunky%20typography%20hot%20magenta%20cyan%20amber%20glow%20deep%20black%20background%20arcade%20cabinet%20vibes%20massive%20buttons%20bright%20glowing%20text?width=1200&height=630&model=flux&nologo=true&seed=90909" />
<meta property="og:type" content="website" />
<link rel="icon" href="https://emojicdn.elk.sh/%E2%9C%A8" type="image/png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bungee&family=JetBrains+Mono:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" />
<style>
:root{
  --bg-a: #050008;
  --bg-b: #0d0218;
  --ink: #fff5fc;
  --dim: #b694c0;
  --mag: #ff2db4;
  --cyan: #2df0ff;
  --amb: #ffcc2d;
  --lime: #b8ff5a;
  --line: rgba(255, 45, 180, 0.40);
}
*{ box-sizing: border-box; }
html{ font-size: 100%; }
body{
  margin: 0;
  min-height: 100vh;
  font-family: 'JetBrains Mono', monospace;
  color: var(--ink);
  background:
    radial-gradient(ellipse 50% 35% at 50% 0%, rgba(255, 45, 180, 0.30), transparent 70%),
    radial-gradient(ellipse 60% 50% at 100% 100%, rgba(45, 240, 255, 0.22), transparent 70%),
    radial-gradient(ellipse 60% 50% at 0% 100%, rgba(255, 204, 45, 0.18), transparent 70%),
    linear-gradient(180deg, var(--bg-a) 0%, var(--bg-b) 60%, var(--bg-a) 100%);
  background-attachment: fixed;
  padding: 4.5rem 1rem 4rem;
  overflow-x: hidden;
}
/* CRT scanlines */
body::after{
  content: '';
  position: fixed; inset: 0;
  pointer-events: none;
  background-image: repeating-linear-gradient(0deg, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,0,0,0.16) 3px, rgba(0,0,0,0) 4px);
  z-index: 70;
  mix-blend-mode: multiply;
}

main{
  max-width: 64rem;
  margin: 0 auto;
  position: relative;
  z-index: 1;
}

/* ───── HERO ───── */
header{
  text-align: center;
  margin-bottom: 2rem;
}
h1{
  margin: 0;
  font-family: 'Bungee', cursive;
  font-weight: 400;
  font-size: clamp(3rem, 11vw, 7rem);
  line-height: 0.95;
  letter-spacing: 0.01em;
  background: linear-gradient(96deg, #ff2db4 0%, #ffcc2d 50%, #2df0ff 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-shadow: 0 0 22px rgba(255, 45, 180, 0.45);
  filter: drop-shadow(0 4px 0 rgba(0,0,0,0.50));
}
h1 .x{
  display: inline-block;
  transform: rotate(-6deg);
  color: var(--amb);
  background: none;
  -webkit-text-fill-color: var(--amb);
}
.tag{
  margin: 0.6rem 0 0;
  font-family: 'Space Mono', monospace;
  font-size: clamp(0.95rem, 2.4vw, 1.3rem);
  color: var(--cyan);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  text-shadow: 0 0 6px rgba(45, 240, 255, 0.55);
}
.tag b{ color: var(--mag); }

/* ───── PANEL ───── */
.panel{
  background:
    linear-gradient(180deg, rgba(20, 4, 38, 0.72), rgba(10, 2, 20, 0.86));
  border: 3px solid var(--mag);
  border-radius: 0;
  padding: 1.6rem;
  margin-bottom: 1.2rem;
  position: relative;
  box-shadow:
    0 0 0 1px rgba(255, 45, 180, 0.20),
    0 0 32px rgba(255, 45, 180, 0.30),
    8px 8px 0 var(--cyan);
}
.panel.cyan{ border-color: var(--cyan); box-shadow: 0 0 0 1px rgba(45,240,255,0.20), 0 0 32px rgba(45,240,255,0.28), 8px 8px 0 var(--mag); }
.panel.amber{ border-color: var(--amb); box-shadow: 0 0 0 1px rgba(255,204,45,0.20), 0 0 32px rgba(255,204,45,0.28), 8px 8px 0 var(--lime); }

.legend{
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  font-family: 'Bungee', cursive;
  font-size: 1.1rem;
  letter-spacing: 0.05em;
  background: var(--mag);
  color: var(--bg-a);
  padding: 0.3rem 0.85rem;
  margin: -2rem 0 0.9rem -0.7rem;
  box-shadow: 4px 4px 0 var(--cyan);
}
.panel.cyan .legend{ background: var(--cyan); box-shadow: 4px 4px 0 var(--mag); }
.panel.amber .legend{ background: var(--amb); box-shadow: 4px 4px 0 var(--lime); }

/* INPUT — extra large */
textarea{
  width: 100%;
  background: rgba(0,0,0,0.55);
  border: 2px solid var(--cyan);
  color: var(--ink);
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: clamp(1.3rem, 3.5vw, 1.8rem);
  line-height: 1.32;
  padding: 1.1rem 1.2rem;
  resize: vertical;
  min-height: 9rem;
  border-radius: 0;
  caret-color: var(--mag);
  transition: border-color 0.18s, box-shadow 0.18s;
}
textarea:focus{
  outline: none;
  border-color: var(--mag);
  box-shadow:
    0 0 0 3px rgba(255, 45, 180, 0.30),
    inset 0 0 24px rgba(255, 45, 180, 0.16);
}
textarea::placeholder{ color: rgba(182, 148, 192, 0.55); font-weight: 400; font-style: italic; }
*:focus-visible{ outline: 3px solid var(--amb); outline-offset: 3px; }

/* ───── TOGGLE CHIPS ───── */
.chips{
  display: flex;
  flex-wrap: wrap;
  gap: 0.55rem;
  margin-top: 1rem;
}
.chip{
  background: transparent;
  border: 2px solid var(--dim);
  color: var(--dim);
  font-family: 'Bungee', cursive;
  font-size: 1rem;
  letter-spacing: 0.03em;
  padding: 0.6rem 1rem;
  border-radius: 0;
  cursor: pointer;
  min-height: 2.75rem;
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  text-transform: lowercase;
  transition: transform 0.12s ease-out, background 0.18s, color 0.18s, border-color 0.18s, box-shadow 0.18s;
}
.chip .em{ font-size: 1.15rem; line-height: 1; }
.chip:hover{ transform: translateY(-2px); color: var(--ink); border-color: var(--ink); }
.chip[aria-pressed="true"]{
  background: var(--mag);
  color: var(--bg-a);
  border-color: var(--mag);
  box-shadow: 0 0 24px rgba(255, 45, 180, 0.55), 0 4px 0 var(--cyan);
}
.chip[aria-pressed="true"][data-key="role"]{ background: var(--cyan); border-color: var(--cyan); box-shadow: 0 0 24px rgba(45, 240, 255, 0.55), 0 4px 0 var(--mag); }
.chip[aria-pressed="true"][data-key="context"]{ background: var(--amb); border-color: var(--amb); box-shadow: 0 0 24px rgba(255, 204, 45, 0.55), 0 4px 0 var(--lime); }
.chip[aria-pressed="true"][data-key="examples"]{ background: var(--lime); border-color: var(--lime); color: var(--bg-a); box-shadow: 0 0 24px rgba(184, 255, 90, 0.55), 0 4px 0 var(--mag); }
.chip[aria-pressed="true"][data-key="reasoning"]{ background: var(--mag); border-color: var(--mag); }

/* sub-fields for chips that need text input — appear when chip is on */
.subfields{
  display: grid;
  grid-template-columns: 1fr;
  gap: 0.55rem;
  margin-top: 0.9rem;
}
.subfield{
  display: none;
}
.subfield.on{ display: block; }
.subfield label{
  display: block;
  font-family: 'Space Mono', monospace;
  font-size: 0.84rem;
  color: var(--dim);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 0.3rem;
}
.subfield input, .subfield textarea{
  font-size: 1.15rem;
  min-height: auto;
  padding: 0.7rem 0.85rem;
  border-color: var(--dim);
}
.subfield input{ height: 2.75rem; }

/* ───── BIG OPTIMIZE BUTTON ───── */
.go{
  width: 100%;
  margin-top: 1.4rem;
  background: linear-gradient(180deg, #ff5ec8, #c41680);
  border: 4px solid #fff;
  color: #fff;
  font-family: 'Bungee', cursive;
  font-size: clamp(1.6rem, 5.5vw, 2.6rem);
  letter-spacing: 0.04em;
  padding: 1.2rem 1.4rem;
  border-radius: 0;
  cursor: pointer;
  min-height: 4rem;
  box-shadow:
    0 0 0 3px var(--cyan),
    0 0 36px rgba(255, 45, 180, 0.65),
    10px 10px 0 var(--amb);
  text-transform: uppercase;
  transition: transform 0.12s, box-shadow 0.12s, filter 0.18s;
}
.go:hover{
  transform: translate(-2px, -2px);
  box-shadow: 0 0 0 3px var(--cyan), 0 0 48px rgba(255, 45, 180, 0.85), 12px 12px 0 var(--amb);
}
.go:active{
  transform: translate(4px, 4px);
  box-shadow: 0 0 0 3px var(--cyan), 0 0 32px rgba(255, 45, 180, 0.50), 6px 6px 0 var(--amb);
}
.go:disabled{
  filter: grayscale(0.6) brightness(0.7);
  cursor: not-allowed;
}
.go.busy{
  animation: pulseGo 1.0s ease-in-out infinite;
}
@keyframes pulseGo{ 0%,100%{ filter: brightness(1); } 50%{ filter: brightness(1.3); } }

/* ───── OUTPUT ───── */
.out-meta{
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 1rem;
  margin-bottom: 0.6rem;
  font-family: 'Space Mono', monospace;
  font-size: 0.92rem;
  color: var(--dim);
  letter-spacing: 0.06em;
}
.out-meta .status{ color: var(--cyan); }
.out-meta .status.busy{ color: var(--amb); animation: blink 0.9s steps(2) infinite; }
.out-meta .status.done{ color: var(--lime); }
.out-meta .status.fail{ color: #ff4060; }
@keyframes blink{ 50%{ opacity: 0.4; } }

#output{
  background: rgba(0,0,0,0.65);
  border: 2px solid var(--amb);
  color: var(--ink);
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: clamp(1.25rem, 3.4vw, 1.7rem);
  line-height: 1.35;
  padding: 1.2rem;
  min-height: 12rem;
  width: 100%;
  resize: vertical;
  white-space: pre-wrap;
  border-radius: 0;
}
#output:focus{
  outline: none;
  border-color: var(--amb);
  box-shadow: 0 0 0 3px rgba(255, 204, 45, 0.30);
}
#output.idle{ color: rgba(182, 148, 192, 0.55); font-style: italic; font-weight: 400; }

.out-actions{
  display: flex;
  flex-wrap: wrap;
  gap: 0.6rem;
  margin-top: 1rem;
}
.btn{
  background: var(--cyan);
  color: var(--bg-a);
  border: 3px solid var(--bg-a);
  font-family: 'Bungee', cursive;
  font-size: 1.1rem;
  letter-spacing: 0.03em;
  padding: 0.75rem 1.2rem;
  border-radius: 0;
  cursor: pointer;
  min-height: 2.75rem;
  box-shadow: 0 0 18px rgba(45, 240, 255, 0.45), 4px 4px 0 var(--mag);
  transition: transform 0.12s, box-shadow 0.12s;
  text-transform: lowercase;
}
.btn:hover{ transform: translate(-2px, -2px); box-shadow: 0 0 24px rgba(45, 240, 255, 0.65), 6px 6px 0 var(--mag); }
.btn:active{ transform: translate(2px, 2px); box-shadow: 0 0 14px rgba(45, 240, 255, 0.40), 2px 2px 0 var(--mag); }
.btn.amber{ background: var(--amb); box-shadow: 0 0 18px rgba(255, 204, 45, 0.45), 4px 4px 0 var(--lime); }
.btn.amber:hover{ box-shadow: 0 0 24px rgba(255, 204, 45, 0.65), 6px 6px 0 var(--lime); }
.btn.muted{ background: transparent; color: var(--dim); border-color: var(--dim); box-shadow: 4px 4px 0 transparent; }
.btn.muted:hover{ color: var(--ink); border-color: var(--ink); box-shadow: 4px 4px 0 var(--dim); }

/* ───── HISTORY ───── */
.history{
  margin-top: 0.6rem;
}
.history-header{
  font-family: 'Space Mono', monospace;
  font-size: 0.84rem;
  color: var(--dim);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  margin-bottom: 0.5rem;
}
.history-list{
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
}
.history-row{
  background: rgba(0,0,0,0.4);
  border: 1px solid var(--line);
  padding: 0.6rem 0.8rem;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 0.6rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.96rem;
  transition: background 0.18s, border-color 0.18s, transform 0.12s;
}
.history-row:hover{ background: rgba(255, 45, 180, 0.10); border-color: var(--mag); transform: translateX(2px); }
.history-row .task{ color: var(--ink); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.history-row .when{ color: var(--dim); font-size: 0.78rem; flex-shrink: 0; }
.history-row .del{
  background: transparent;
  border: 1px solid var(--dim);
  color: var(--dim);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.8rem;
  width: 1.8rem;
  height: 1.8rem;
  cursor: pointer;
  padding: 0;
  border-radius: 0;
}
.history-row .del:hover{ color: var(--mag); border-color: var(--mag); }

/* ───── TOAST ───── */
#toast{
  position: fixed;
  bottom: 1.4rem;
  left: 50%;
  transform: translate(-50%, 1rem);
  background: var(--bg-a);
  color: var(--mag);
  font-family: 'Bungee', cursive;
  font-size: 1.05rem;
  padding: 0.8rem 1.4rem;
  letter-spacing: 0.03em;
  opacity: 0;
  pointer-events: none;
  z-index: 80;
  transition: opacity 0.22s, transform 0.22s;
  border: 3px solid var(--mag);
  box-shadow: 0 0 0 1px rgba(255, 45, 180, 0.50), 0 0 30px rgba(255, 45, 180, 0.60), 4px 4px 0 var(--cyan);
}
#toast.show{ opacity: 1; transform: translate(-50%, 0); }
#toast.warn{ color: var(--amb); border-color: var(--amb); box-shadow: 0 0 0 1px rgba(255,204,45,0.50), 0 0 30px rgba(255,204,45,0.50), 4px 4px 0 var(--lime); }
#toast.fail{ color: #ff4060; border-color: #ff4060; box-shadow: 0 0 0 1px rgba(255,64,96,0.50), 0 0 30px rgba(255,64,96,0.50), 4px 4px 0 var(--amb); }

/* footer */
footer{
  margin-top: 1.5rem;
  text-align: center;
  color: var(--dim);
  font-family: 'Space Mono', monospace;
  font-size: 0.84rem;
  letter-spacing: 0.06em;
}
footer .credit{ color: var(--cyan); }
footer .heart{ color: var(--mag); }

@media (prefers-reduced-motion: reduce){
  *{ animation: none !important; transition: none !important; }
  .go:hover, .btn:hover, .chip:hover{ transform: none; }
}
@media (max-width: 32rem){
  body{ padding: 3rem 0.5rem 3.5rem; }
  .panel{ padding: 1.1rem; }
  .legend{ margin-left: -0.3rem; font-size: 0.95rem; }
}
</style>
</head>
<body>

<main>
  <header>
    <h1>SLOPPY <span class="x">×</span> OPTIMIZER</h1>
    <p class="tag">type a sloppy prompt · get a <b>sharp</b> one back</p>
  </header>

  <section class="panel" aria-label="input">
    <span class="legend">INPUT · YOUR TASK</span>
    <label for="taskInput" style="position: absolute; left: -9999px;">Your task</label>
    <textarea id="taskInput" placeholder="write me a cold email to a designer about a website redesign that is friendly but not begging" aria-required="true"></textarea>

    <div class="chips" role="group" aria-label="optional elements to include">
      <button class="chip" type="button" data-key="role" aria-pressed="false"><span class="em">🎩</span><span>role</span></button>
      <button class="chip" type="button" data-key="context" aria-pressed="false"><span class="em">📎</span><span>context</span></button>
      <button class="chip" type="button" data-key="examples" aria-pressed="false"><span class="em">🧪</span><span>examples</span></button>
      <button class="chip" type="button" data-key="reasoning" aria-pressed="false"><span class="em">🧠</span><span>step-by-step</span></button>
    </div>

    <div class="subfields">
      <div class="subfield" id="sub-role">
        <label for="roleInput">role · who claude should be</label>
        <input id="roleInput" type="text" placeholder="you are a senior copywriter with B2B SaaS chops" />
      </div>
      <div class="subfield" id="sub-context">
        <label for="contextInput">context · the background that changes the answer</label>
        <textarea id="contextInput" placeholder="our brand is friendly + irreverent · we charge $8k+ · target lead is solo product designers" style="min-height: 5rem; font-size: 1.1rem;"></textarea>
      </div>
      <div class="subfield" id="sub-examples">
        <label for="examplesInput">examples · one short worked example</label>
        <textarea id="examplesInput" placeholder='example: "subject: your portfolio · body: hey [name], saw [project] — would love to chat about a redesign..."' style="min-height: 5rem; font-size: 1.1rem;"></textarea>
      </div>
    </div>

    <button class="go" type="button" id="goBtn">⚡ OPTIMIZE</button>
  </section>

  <section class="panel cyan" aria-label="output">
    <span class="legend">OUTPUT · PASTE-READY</span>
    <div class="out-meta">
      <span id="outStatus" class="status">idle · type a task, press OPTIMIZE</span>
      <span id="outChars">0 chars</span>
    </div>
    <textarea id="output" class="idle" readonly aria-label="optimized prompt">your sharp prompt lands here…</textarea>
    <div class="out-actions">
      <button class="btn" type="button" id="copyBtn" disabled>📋 copy</button>
      <button class="btn amber" type="button" id="reoptBtn" disabled>🔄 re-optimize</button>
      <button class="btn muted" type="button" id="clearBtn">🗑️ clear</button>
    </div>
  </section>

  <section class="panel amber history" aria-label="history" id="historyPanel" style="display: none;">
    <span class="legend">HISTORY · LAST 5</span>
    <div class="history-list" id="historyList"></div>
  </section>

  <footer>
    <span class="credit">sloppy.live</span> · prompts for the chaos era · <span class="heart">♥</span>
  </footer>
</main>

<div id="toast" role="status" aria-live="polite"></div>

<script>
/* ─────── SLOPPY OPTIMIZER ───────
   Big neon take on prompt-optimizer. Same two-pass refine logic:
     1. Heuristic local assemble — instant, runs offline, builds a clean
        Role/Task/Context/Examples/Reasoning markdown prompt from the
        toggled chips.
     2. Async Pollinations LLM polish — REFINER_SYSTEM_PROMPT prepended,
        replaces the heuristic when it returns clean markdown; otherwise
        the heuristic stays.
   localStorage history keeps the last 5 tasks. */

/* ── REFINER SYSTEM PROMPT — adapted from prompt-optimizer v0.9.5 baseline */
const REFINER_SYSTEM_PROMPT = [
  "You are a prompt editor for Claude.",
  "Rewrite the user's prompt so it is clear, concise, and directly usable.",
  "Preserve the original intent.",
  "",
  "Hard rules — never break these:",
  "- Never echo the user's Task verbatim. Refine the wording: tighter phrasing, missing implications surfaced.",
  "- Never add encyclopedic background, definitions, or topic-tutorial context about the subject.",
  "- Never introduce new topics, examples, or constraints the input doesn't supply.",
  "- The output has at most these sections: Role, Task, Context, Examples, Reasoning. Omit any section whose input is empty. Nothing else.",
  "",
  "Editorial rules:",
  "- Remove filler words and meta-instructions.",
  "- Use positive phrasing: say what to do, not what to avoid.",
  "- Use **Bold** headers per section. Section bodies are plain prose or short lists.",
  "- No nested headers. No code fences around the whole response.",
  "",
  "Output rules:",
  "- Return ONLY the rewritten prompt, paste-ready.",
  "- No preamble (no \"Here is\", \"Sure\", \"Rewritten prompt:\"). No trailing explanation.",
].join("\n");

/* ── DOM ── */
const $ = (id) => document.getElementById(id);
const els = {
  task: $('taskInput'),
  role: $('roleInput'),
  context: $('contextInput'),
  examples: $('examplesInput'),
  go: $('goBtn'),
  out: $('output'),
  status: $('outStatus'),
  chars: $('outChars'),
  copy: $('copyBtn'),
  reopt: $('reoptBtn'),
  clear: $('clearBtn'),
  toast: $('toast'),
  histPanel: $('historyPanel'),
  histList: $('historyList'),
};

/* ── State + chip toggles ── */
const state = {
  on: { role: false, context: false, examples: false, reasoning: false },
  busy: false,
  lastOutput: '',
  refineToken: 0,
  history: [],
};

const HIST_KEY = 'sloppy-optimizer-history-v1';
try {
  const raw = localStorage.getItem(HIST_KEY);
  if (raw){
    const p = JSON.parse(raw);
    if (Array.isArray(p)) state.history = p.slice(0, 5);
  }
} catch(e){}

function saveHistory(){
  try { localStorage.setItem(HIST_KEY, JSON.stringify(state.history.slice(0, 5))); } catch(e){}
}

function setChip(key, on){
  state.on[key] = on;
  const c = document.querySelector('.chip[data-key="' + key + '"]');
  if (c) c.setAttribute('aria-pressed', String(on));
  const sub = document.getElementById('sub-' + key);
  if (sub) sub.classList.toggle('on', on);
}
document.querySelectorAll('.chip[data-key]').forEach(c => {
  c.addEventListener('click', () => setChip(c.dataset.key, !state.on[c.dataset.key]));
});

/* ── HEURISTIC FALLBACK ──
   Build a structured markdown prompt from the toggled chips + their
   text inputs. Always runs first so the user sees something instantly
   even if the Pollinations call is slow / blocked. */
function buildHeuristic(){
  const task = els.task.value.trim();
  if (!task) return '';
  const lines = [];
  if (state.on.role && els.role.value.trim()){
    lines.push('**Role**', els.role.value.trim(), '');
  }
  lines.push('**Task**', task, '');
  if (state.on.context && els.context.value.trim()){
    lines.push('**Context**', els.context.value.trim(), '');
  }
  if (state.on.examples && els.examples.value.trim()){
    lines.push('**Examples**', els.examples.value.trim(), '');
  }
  if (state.on.reasoning){
    lines.push('**Reasoning**', 'Think privately step-by-step before answering, then give only the final answer.', '');
  }
  return lines.join('\n').trim();
}

/* ── POLLINATIONS LLM POLISH ──
   Fetches a polished rewrite via the text.pollinations.ai GET endpoint.
   Token-protected against stale responses; 14s timeout; cleanRewrite()
   strips preamble + code fences. Falls back silently to the heuristic
   on any failure. */
async function fetchLLM(structured){
  const full = REFINER_SYSTEM_PROMPT +
    "\n\n---\nPrompt to refine:\n" + structured +
    "\n---\nRefined prompt:";
  const url = 'https://text.pollinations.ai/' + encodeURIComponent(full);
  const ctrl = new AbortController();
  const tid = setTimeout(() => ctrl.abort(), 14000);
  try {
    const r = await fetch(url, { signal: ctrl.signal, headers: { 'Accept': 'text/plain' } });
    clearTimeout(tid);
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const t = await r.text();
    if (/legacy api|deprecation_notice|Model not found/i.test(t) && t.length < 500){
      throw new Error('legacy banner');
    }
    return t;
  } finally {
    clearTimeout(tid);
  }
}

function cleanRewrite(raw){
  if (!raw) return '';
  let t = String(raw).trim();
  // strip wrapping code fence
  t = t.replace(/^```[a-zA-Z]*\n?/, '').replace(/\n?```$/, '');
  // drop preamble lines like "Here is...", "Refined prompt:", etc.
  t = t.replace(/^(here(?:'s| is)|sure[,.]?|okay[,.]?|certainly[,.]?|got it[,.]?|refined prompt:?|the refined prompt:?)[^\n]*\n/i, '');
  t = t.replace(/^---+\n?/, '');
  return t.trim();
}

function hasStructure(text){
  if (!text) return false;
  if (/\*\*[^*\n]+\*\*/.test(text)) return true;        // bold headers
  if (/(^|\n)#{1,4}\s+\S/.test(text)) return true;       // ATX headings
  if (text.includes('\n') && text.length >= 40 && /(^|\n)\s*[-*•]\s+\S/.test(text)) return true;
  return false;
}

/* ── OPTIMIZE FLOW ── */
async function optimize(){
  const task = els.task.value.trim();
  if (!task){
    showToast('type a task first', 'warn');
    els.task.focus();
    return;
  }
  const heuristic = buildHeuristic();
  // 1. show heuristic immediately
  renderOutput(heuristic);
  setStatus('heuristic · ai polishing…', 'busy');
  els.copy.disabled = false;
  els.reopt.disabled = false;
  pushHistory(task, heuristic);

  // 2. fire LLM rewrite
  state.busy = true;
  els.go.classList.add('busy');
  els.go.disabled = true;
  const token = ++state.refineToken;
  try {
    const t0 = performance.now();
    const llm = await fetchLLM(heuristic);
    if (token !== state.refineToken) return;     // stale
    const cleaned = cleanRewrite(llm);
    if (cleaned && cleaned.length >= 16 && hasStructure(cleaned)){
      renderOutput(cleaned);
      setStatus('ai-refined · ' + Math.round(performance.now() - t0) + 'ms', 'done');
      showToast('✓ refined · ' + cleaned.length + ' chars');
      // overwrite history's latest entry to use the LLM output (so re-open shows the better version)
      if (state.history.length && state.history[0].task === task){
        state.history[0].output = cleaned;
        saveHistory();
      }
    } else {
      setStatus('ai dropped structure · kept heuristic', 'fail');
      showToast('kept heuristic version', 'warn');
    }
  } catch (e){
    if (token !== state.refineToken) return;
    setStatus('offline · kept heuristic', 'fail');
    showToast('Claude busy — kept the local refine', 'warn');
  } finally {
    state.busy = false;
    els.go.classList.remove('busy');
    els.go.disabled = false;
  }
}

function renderOutput(text){
  state.lastOutput = text;
  els.out.value = text;
  els.out.classList.remove('idle');
  els.chars.textContent = text.length + ' chars';
}

function setStatus(msg, cls){
  els.status.textContent = msg;
  els.status.className = 'status' + (cls ? ' ' + cls : '');
}

/* ── HISTORY (last 5) ── */
function pushHistory(task, output){
  // de-dupe: if last entry has the same task, replace it
  if (state.history.length && state.history[0].task === task){
    state.history[0].output = output;
    state.history[0].at = Date.now();
  } else {
    state.history.unshift({ task, output, at: Date.now(),
      opts: { ...state.on },
      sub: { role: els.role.value, context: els.context.value, examples: els.examples.value }
    });
    state.history = state.history.slice(0, 5);
  }
  saveHistory();
  renderHistory();
}

function renderHistory(){
  if (!state.history.length){
    els.histPanel.style.display = 'none';
    return;
  }
  els.histPanel.style.display = '';
  els.histList.innerHTML = '';
  for (let i = 0; i < state.history.length; i++){
    const h = state.history[i];
    const row = document.createElement('div');
    row.className = 'history-row';
    row.setAttribute('role', 'button');
    row.setAttribute('tabindex', '0');
    const ago = ((Date.now() - h.at) / 60000) | 0;
    const when = ago < 1 ? 'just now' : ago < 60 ? ago + 'm' : (ago/60|0) + 'h';
    row.innerHTML = `
      <span class="task">${escapeHtml(h.task.slice(0, 90))}</span>
      <span class="when">${when}</span>
      <button class="del" type="button" aria-label="delete">×</button>
    `;
    row.addEventListener('click', (e) => {
      if (e.target.classList.contains('del')) return;
      restoreHistory(i);
    });
    row.addEventListener('keydown', (e) => {
      if (e.code === 'Enter' || e.code === 'Space'){ e.preventDefault(); restoreHistory(i); }
    });
    row.querySelector('.del').addEventListener('click', (e) => {
      e.stopPropagation();
      state.history.splice(i, 1);
      saveHistory();
      renderHistory();
    });
    els.histList.appendChild(row);
  }
}

function restoreHistory(idx){
  const h = state.history[idx];
  if (!h) return;
  els.task.value = h.task;
  if (h.sub){
    els.role.value = h.sub.role || '';
    els.context.value = h.sub.context || '';
    els.examples.value = h.sub.examples || '';
  }
  if (h.opts){
    for (const k of Object.keys(state.on)){
      setChip(k, !!h.opts[k]);
    }
  }
  renderOutput(h.output || '');
  setStatus('restored from history', 'done');
  els.copy.disabled = !h.output;
  els.reopt.disabled = false;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ── BUTTONS ── */
els.go.addEventListener('click', optimize);
els.reopt.addEventListener('click', optimize);
els.copy.addEventListener('click', async () => {
  if (!state.lastOutput) return;
  try {
    await navigator.clipboard.writeText(state.lastOutput);
    showToast('✓ copied to clipboard');
  } catch (e){
    els.out.select();
    document.execCommand('copy');
    showToast('✓ copied');
  }
});
els.clear.addEventListener('click', () => {
  els.task.value = '';
  els.role.value = '';
  els.context.value = '';
  els.examples.value = '';
  els.out.value = 'your sharp prompt lands here…';
  els.out.classList.add('idle');
  els.chars.textContent = '0 chars';
  els.copy.disabled = true;
  els.reopt.disabled = true;
  state.lastOutput = '';
  setStatus('cleared', 'done');
  els.task.focus();
});

/* keyboard: Ctrl/Cmd+Enter to optimize from anywhere in the input */
document.addEventListener('keydown', (e) => {
  if ((e.ctrlKey || e.metaKey) && e.code === 'Enter'){
    if (!state.busy) optimize();
  }
});

/* ── TOAST ── */
function showToast(msg, cls){
  els.toast.textContent = msg;
  els.toast.className = 'show ' + (cls || '');
  clearTimeout(showToast._t);
  showToast._t = setTimeout(() => { els.toast.className = ''; }, 1900);
}

/* ── HELPERS ── */
function escapeHtml(s){
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

/* ── boot ── */
renderHistory();
setStatus('idle · type a task, press OPTIMIZE', '');
</script>
</body>
</html>
