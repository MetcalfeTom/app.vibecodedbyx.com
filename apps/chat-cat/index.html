<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chat Cat</title>
<link rel="icon" href="https://emojicdn.elk.sh/🐱">
<meta property="og:title" content="Chat Cat">
<meta property="og:description" content="A pixel cat that reacts to your activity. Leave it alone and it falls asleep.">
<meta property="og:url" content="https://sloppy.live/chat-cat/">
<meta property="og:image" content="https://sloppy.live/chat-cat/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1520}
canvas{display:block;width:100%;height:100%;image-rendering:pixelated}
#status{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);font-family:'Silkscreen',cursive;font-size:clamp(.7rem,2vw,.9rem);color:rgba(255,255,255,.25);z-index:5;pointer-events:none;text-align:center;letter-spacing:.1em;transition:color .5s}
#msg-input{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);width:min(320px,85vw);font-family:'Silkscreen',cursive;font-size:12px;padding:8px 12px;background:rgba(30,25,40,.8);border:1px solid rgba(255,255,255,.1);color:#ccc;border-radius:4px;outline:none;z-index:5}
#msg-input:focus{border-color:rgba(255,180,100,.3)}
#msg-input::placeholder{color:rgba(255,255,255,.15)}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<input id="msg-input" type="text" placeholder="type something to wake the cat..." autocomplete="off">
<div id="status">zzz...</div>
<script>
var CV=document.getElementById('cv');
var X=CV.getContext('2d');
X.imageSmoothingEnabled=false;
var PX=4;
var W,H,GW,GH;
function resize(){W=CV.width=window.innerWidth;H=CV.height=window.innerHeight;GW=Math.floor(W/PX);GH=Math.floor(H/PX);}
resize();window.addEventListener('resize',resize);

var statusEl=document.getElementById('status');
var msgInput=document.getElementById('msg-input');

// --- PIXEL HELPERS ---
function px(x,y,c){X.fillStyle=c;X.fillRect(Math.floor(x)*PX,Math.floor(y)*PX,PX,PX);}
function pxRect(x,y,w,h,c){X.fillStyle=c;X.fillRect(Math.floor(x)*PX,Math.floor(y)*PX,w*PX,h*PX);}

// --- CAT STATE ---
var cat={
  x:0,y:0,
  state:'sleeping', // sleeping, waking, awake, playing, eating, yawning, sleepy
  stateTimer:0,
  mood:50, // 0=deep sleep, 100=hyper
  energy:30,
  blink:0,blinkTimer:3,
  tailPhase:0,
  earWiggle:0,
  purr:0,
  breathe:0,
  pawLift:0,
  zzzPhase:0,
  emote:'',emoteTimer:0,
  lookX:0,lookY:0,
  walkX:0,walkTarget:0,walkSpeed:0,
  frame:0,frameTimer:0
};

var lastActivity=0;
var activityLevel=0; // rolling average of recent activity
var messages=[];
var particles=[];
var bubbles=[];

// --- ACTIVITY TRACKING ---
function onActivity(type){
  lastActivity=performance.now();
  activityLevel=Math.min(100,activityLevel+15);
  cat.energy=Math.min(100,cat.energy+8);
  if(cat.state==='sleeping'){
    cat.state='waking';cat.stateTimer=1.5;
    spawnEmote('!');
  }
  if(type==='msg'){
    cat.energy=Math.min(100,cat.energy+12);
    if(cat.state==='awake'||cat.state==='playing'){
      if(Math.random()<0.3) spawnEmote(['<3','!','?','~','!!'][Math.floor(Math.random()*5)]);
    }
  }
}

msgInput.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&msgInput.value.trim()){
    var msg=msgInput.value.trim();
    messages.push({text:msg,timer:4,y:0});
    msgInput.value='';
    onActivity('msg');
    // Special reactions
    var lower=msg.toLowerCase();
    if(lower.includes('pet')||lower.includes('pat')||lower.includes('scratch')){
      cat.purr=3;spawnEmote('<3');spawnHearts();
    }
    if(lower.includes('feed')||lower.includes('food')||lower.includes('treat')||lower.includes('fish')||lower.includes('tuna')){
      cat.state='eating';cat.stateTimer=3;spawnEmote('nom');
      cat.energy=Math.min(100,cat.energy+25);
    }
    if(lower.includes('play')||lower.includes('toy')||lower.includes('laser')){
      cat.state='playing';cat.stateTimer=5;spawnEmote('!!');
      cat.energy=Math.min(100,cat.energy+15);
    }
    if(lower.includes('bad')||lower.includes('no')){
      spawnEmote('>:(');
    }
    if(lower.includes('good')||lower.includes('cute')||lower.includes('love')){
      spawnEmote('<3');cat.purr=2;spawnHearts();
    }
  }
});
document.addEventListener('mousemove',function(){onActivity('mouse');});
document.addEventListener('click',function(){onActivity('click');});
document.addEventListener('touchstart',function(){onActivity('touch');});

function spawnEmote(text){
  cat.emote=text;cat.emoteTimer=2;
}
function spawnHearts(){
  for(var i=0;i<6;i++){
    particles.push({x:cat.x+8+(Math.random()-.5)*12,y:cat.y-5-Math.random()*8,
      vx:(Math.random()-.5)*15,vy:-15-Math.random()*20,life:1+Math.random()*0.5,
      type:'heart',color:'#ff6b8a'});
  }
}
function spawnZzz(){
  bubbles.push({x:cat.x+14,y:cat.y-2,vy:-8,life:2.5,text:'z',size:0.5+Math.random()*0.5,
    vx:3+Math.random()*4,phase:Math.random()*Math.PI*2});
}

// --- UPDATE ---
function update(dt,now){
  var timeSinceActivity=(now-lastActivity)/1000;
  activityLevel=Math.max(0,activityLevel-3*dt);
  cat.energy=Math.max(0,cat.energy-1.5*dt);

  // State machine
  cat.stateTimer-=dt;
  switch(cat.state){
    case 'sleeping':
      cat.mood=Math.max(0,cat.mood-5*dt);
      cat.zzzPhase+=dt;
      if(Math.random()<0.03*dt) spawnZzz();
      cat.breathe+=dt*1.5;
      if(activityLevel>30){cat.state='waking';cat.stateTimer=1.5;}
      break;
    case 'waking':
      cat.mood+=20*dt;
      if(cat.stateTimer<=0){cat.state='awake';cat.stateTimer=0;spawnEmote('?');}
      break;
    case 'awake':
      cat.mood=50+activityLevel*0.3;
      cat.breathe+=dt*2;
      if(timeSinceActivity>8){cat.state='sleepy';cat.stateTimer=4;spawnEmote('...');}
      if(activityLevel>60){cat.state='playing';cat.stateTimer=3+Math.random()*3;}
      // Random look around
      if(Math.random()<0.5*dt){cat.lookX=(Math.random()-.5)*6;cat.lookY=(Math.random()-.5)*3;}
      break;
    case 'playing':
      cat.mood=Math.min(100,cat.mood+10*dt);
      cat.breathe+=dt*3;
      cat.frame+=dt*6;
      // Walk around
      if(Math.abs(cat.walkX-cat.walkTarget)<2){
        cat.walkTarget=(Math.random()-.5)*GW*0.4;
        cat.walkSpeed=8+Math.random()*12;
      }
      var wdx=cat.walkTarget-cat.walkX;
      cat.walkX+=Math.sign(wdx)*Math.min(Math.abs(wdx),cat.walkSpeed*dt);
      cat.pawLift+=dt*8;
      if(cat.stateTimer<=0){cat.state='awake';cat.stateTimer=0;cat.walkTarget=0;}
      if(timeSinceActivity>6){cat.state='awake';cat.stateTimer=0;}
      break;
    case 'eating':
      cat.mood=Math.min(100,cat.mood+15*dt);
      cat.breathe+=dt*2;
      if(cat.stateTimer<=0){cat.state='awake';spawnEmote(':3');}
      break;
    case 'sleepy':
      cat.mood=Math.max(20,cat.mood-8*dt);
      cat.breathe+=dt*1.8;
      if(cat.stateTimer<=0){
        cat.state='yawning';cat.stateTimer=2;
      }
      if(activityLevel>20){cat.state='awake';cat.stateTimer=0;spawnEmote('!');}
      break;
    case 'yawning':
      cat.breathe+=dt*1.5;
      if(cat.stateTimer<=0){cat.state='sleeping';cat.stateTimer=0;spawnEmote('zzz');}
      if(activityLevel>30){cat.state='awake';cat.stateTimer=0;spawnEmote('?');}
      break;
  }

  // Blink
  cat.blinkTimer-=dt;
  if(cat.blinkTimer<=0){cat.blink=0.15;cat.blinkTimer=2+Math.random()*4;}
  if(cat.blink>0)cat.blink-=dt;

  // Tail
  cat.tailPhase+=dt*(1+cat.mood*0.03);

  // Ear wiggle
  cat.earWiggle*=0.9;
  if(Math.random()<0.02)cat.earWiggle=1;

  // Purr decay
  if(cat.purr>0)cat.purr-=dt;

  // Emote timer
  if(cat.emoteTimer>0)cat.emoteTimer-=dt;

  // Position
  cat.x=GW/2-8+cat.walkX;
  cat.y=GH*0.55;

  // Particles
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt;
    if(p.life<=0)particles.splice(i,1);
  }

  // Bubbles (zzz)
  for(var i=bubbles.length-1;i>=0;i--){
    var b=bubbles[i];b.y+=b.vy*dt;b.x+=b.vx*dt+Math.sin(b.phase+b.y*0.05)*3*dt;b.life-=dt;
    if(b.life<=0)bubbles.splice(i,1);
  }

  // Messages
  for(var i=messages.length-1;i>=0;i--){
    messages[i].timer-=dt;messages[i].y+=20*dt;
    if(messages[i].timer<=0)messages.splice(i,1);
  }

  // Status text
  var stateNames={sleeping:'zzz...',waking:'*yawn*',awake:'watching...',
    playing:'zooming!',eating:'nom nom nom',sleepy:'getting sleepy...',yawning:'*yaaawn*'};
  statusEl.textContent=stateNames[cat.state]||'';
  if(cat.purr>0) statusEl.textContent='*purrrrrr*';
}

// --- DRAW CAT ---
function drawCat(now){
  var cx=Math.floor(cat.x),cy=Math.floor(cat.y);
  var sleeping=cat.state==='sleeping';
  var yawning=cat.state==='yawning';
  var eating=cat.state==='eating';
  var playing=cat.state==='playing';
  var breatheOff=Math.sin(cat.breathe)*0.5;
  var walkFrame=playing?Math.floor(cat.pawLift)%2:0;

  // Shadow
  pxRect(cx+2,cy+13,12,2,'rgba(0,0,0,0.15)');

  // Tail
  var tailY=cy+10;
  var tailWave=Math.sin(cat.tailPhase)*3;
  var tailWave2=Math.sin(cat.tailPhase*1.3+1)*2;
  if(sleeping){
    // Curled tail
    px(cx-1,cy+11,'#e8a040');px(cx-2,cy+10,'#e8a040');px(cx-2,cy+9,'#e8a040');
  } else {
    px(cx+15,tailY+tailWave,'#e8a040');
    px(cx+16,tailY-1+tailWave2,'#e8a040');
    px(cx+17,tailY-2+tailWave,'#e8a040');
    px(cx+18,tailY-3+tailWave2,'#e8a040');
  }

  if(sleeping){
    // Sleeping pose — curled up, smaller
    // Body (round loaf)
    pxRect(cx+2,cy+6+breatheOff,12,6,'#e8a040');
    pxRect(cx+3,cy+5+breatheOff,10,1,'#e8a040');
    // Stripe
    pxRect(cx+5,cy+6+breatheOff,2,5,'#c88030');
    pxRect(cx+9,cy+6+breatheOff,2,5,'#c88030');
    // Head tucked
    pxRect(cx+1,cy+5+breatheOff,5,5,'#e8a040');
    // Ears
    px(cx+1,cy+4+breatheOff,'#e8a040');
    px(cx+5,cy+4+breatheOff,'#e8a040');
    px(cx+2,cy+3+breatheOff,'#ffb8b8');
    px(cx+4,cy+3+breatheOff,'#ffb8b8');
    // Closed eyes
    px(cx+2,cy+7+breatheOff,'#222');
    px(cx+4,cy+7+breatheOff,'#222');
    // Paw
    pxRect(cx+1,cy+10,3,2,'#f0c070');
  } else {
    // Standing/sitting pose
    var bobY=playing?Math.sin(cat.pawLift*2)*1:0;
    var by=cy+breatheOff+bobY;
    // Back legs
    pxRect(cx+2,by+10,3,3,'#d09030');
    pxRect(cx+11,by+10,3,3,'#d09030');
    // Body
    pxRect(cx+2,by+4,12,7,'#e8a040');
    pxRect(cx+3,by+3,10,1,'#e8a040');
    // Stripes
    pxRect(cx+5,by+4,2,6,'#c88030');
    pxRect(cx+9,by+4,2,6,'#c88030');
    // Belly
    pxRect(cx+5,by+8,6,3,'#f0c070');
    // Front legs
    if(playing&&walkFrame===0){
      pxRect(cx+3,by+10,2,3,'#f0c070');
      pxRect(cx+11,by+9,2,3,'#f0c070');
    } else {
      pxRect(cx+3,by+10,2,3,'#f0c070');
      pxRect(cx+11,by+10,2,3,'#f0c070');
    }
    // Paws
    px(cx+3,by+12,'#f8d890');px(cx+4,by+12,'#f8d890');
    px(cx+11,by+12,'#f8d890');px(cx+12,by+12,'#f8d890');

    // Head
    pxRect(cx+3,by-1,10,6,'#e8a040');
    pxRect(cx+4,by-2,8,1,'#e8a040');
    // Ears
    var earOff=cat.earWiggle>0.5?1:0;
    px(cx+3,by-2-earOff,'#e8a040');px(cx+4,by-3-earOff,'#e8a040');
    px(cx+4,by-2-earOff,'#ffb8b8');
    px(cx+11,by-2-earOff,'#e8a040');px(cx+12,by-3-earOff,'#e8a040');
    px(cx+11,by-2-earOff,'#ffb8b8');
    // Cheeks
    px(cx+3,by+2,'#f0c070');px(cx+12,by+2,'#f0c070');

    // Eyes
    var eyeY=by+1+Math.round(cat.lookY*0.3);
    var eyeOff=Math.round(cat.lookX*0.3);
    if(cat.blink>0||yawning){
      // Closed/squint
      px(cx+5+eyeOff,eyeY,'#222');px(cx+6+eyeOff,eyeY,'#222');
      px(cx+9+eyeOff,eyeY,'#222');px(cx+10+eyeOff,eyeY,'#222');
    } else {
      // Open eyes
      px(cx+5,eyeY,'#222');px(cx+6,eyeY,'#222');
      px(cx+5,eyeY-1,'#222');px(cx+6,eyeY-1,'#222');
      px(cx+9,eyeY,'#222');px(cx+10,eyeY,'#222');
      px(cx+9,eyeY-1,'#222');px(cx+10,eyeY-1,'#222');
      // Pupils
      px(cx+5+eyeOff,eyeY,'#111');
      px(cx+10+eyeOff,eyeY,'#111');
      // Highlights
      px(cx+6+eyeOff,eyeY-1,'#fff');
      px(cx+10+eyeOff,eyeY-1,'#fff');
    }

    // Nose
    px(cx+7,by+2,'#ff9090');px(cx+8,by+2,'#ff9090');

    // Mouth
    if(yawning){
      pxRect(cx+6,by+3,4,2,'#cc6060');
      px(cx+7,by+3,'#ff8080');px(cx+8,by+3,'#ff8080');
    } else if(eating){
      var eatFrame=Math.floor(now/200)%2;
      if(eatFrame===0){pxRect(cx+6,by+3,4,1,'#cc6060');}
      else{px(cx+7,by+3,'#cc6060');px(cx+8,by+3,'#cc6060');}
    } else {
      // Smile
      px(cx+7,by+3,'#c88060');px(cx+8,by+3,'#c88060');
    }

    // Whiskers
    px(cx+1,by+1,'#d0a050');px(cx+2,by+2,'#d0a050');
    px(cx+13,by+1,'#d0a050');px(cx+14,by+2,'#d0a050');
  }

  // Purr effect
  if(cat.purr>0){
    var purrAlpha=Math.min(1,cat.purr)*0.15;
    var pr=12+Math.sin(now/100)*3;
    X.fillStyle='rgba(255,180,200,'+purrAlpha+')';
    X.beginPath();X.arc((cx+8)*PX,(cy+6)*PX,pr*PX,0,Math.PI*2);X.fill();
  }

  // Food bowl when eating
  if(eating){
    pxRect(cx+5,cy+13,6,2,'#888');
    pxRect(cx+4,cy+14,8,1,'#888');
    pxRect(cx+6,cy+13,4,1,'#a06030');
  }
}

// --- DRAW SCENE ---
function drawScene(now){
  // Sky
  var skyH=GH*0.45;
  for(var y=0;y<skyH;y++){
    var t=y/skyH;
    var r=Math.floor(20+t*10),g=Math.floor(16+t*8),b=Math.floor(30+t*15);
    pxRect(0,y,GW,1,'rgb('+r+','+g+','+b+')');
  }

  // Stars
  var starSeed=42;
  for(var i=0;i<25;i++){
    starSeed=(starSeed*1103515245+12345)&0x7fffffff;
    var sx=starSeed%GW;starSeed=(starSeed*1103515245+12345)&0x7fffffff;
    var sy=starSeed%(Math.floor(skyH));
    var twinkle=Math.sin(now/1000+i*3)>0.3?1:0;
    if(twinkle) px(sx,sy,'rgba(255,255,230,'+(0.3+Math.sin(now/800+i)*0.2)+')');
  }

  // Moon
  var moonX=GW*0.8,moonY=GH*0.12;
  pxRect(moonX-3,moonY-3,6,6,'#ffe8a0');
  pxRect(moonX-4,moonY-2,8,4,'#ffe8a0');
  pxRect(moonX-2,moonY-4,4,8,'#ffe8a0');
  // Moon glow
  X.fillStyle='rgba(255,232,160,0.03)';
  X.beginPath();X.arc(moonX*PX,moonY*PX,30*PX,0,Math.PI*2);X.fill();

  // Ground
  pxRect(0,GH*0.55+13,GW,GH,'#1a1a12');
  // Grass line
  for(var gx=0;gx<GW;gx+=2){
    var gh=1+Math.floor(Math.sin(gx*0.8)*1.5+1.5);
    pxRect(gx,GH*0.55+12-gh,2,gh+1,'#2a3518');
  }

  // Window warm glow behind cat
  pxRect(cat.x-5,cat.y-15,26,18,'rgba(40,30,20,0.3)');
  // Windowsill
  pxRect(cat.x-6,cat.y+3,28,2,'#3a3030');
  // Curtains
  pxRect(cat.x-6,cat.y-16,3,20,'#2a2035');
  pxRect(cat.x+19,cat.y-16,3,20,'#2a2035');
  // Warm interior glow
  X.fillStyle='rgba(60,45,25,0.2)';
  X.fillRect((cat.x-3)*PX,(cat.y-14)*PX,22*PX,16*PX);
}

function drawParticles(){
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    var a=Math.min(1,p.life*2);
    if(p.type==='heart'){
      X.fillStyle=p.color;X.globalAlpha=a;
      // Tiny pixel heart
      px(Math.floor(p.x),Math.floor(p.y),p.color);
      px(Math.floor(p.x)+1,Math.floor(p.y),p.color);
      px(Math.floor(p.x)-1,Math.floor(p.y),p.color);
      px(Math.floor(p.x),Math.floor(p.y)+1,p.color);
      X.globalAlpha=1;
    }
  }
}

function drawBubbles(){
  for(var i=0;i<bubbles.length;i++){
    var b=bubbles[i];
    var a=Math.min(1,b.life);
    X.fillStyle='rgba(200,200,255,'+a*0.4+')';
    X.font=(Math.floor(8*b.size*PX))+'px Silkscreen';
    X.fillText(b.text,b.x*PX,b.y*PX);
  }
}

function drawEmote(){
  if(cat.emoteTimer<=0)return;
  var a=Math.min(1,cat.emoteTimer);
  X.fillStyle='rgba(255,255,255,'+a*0.7+')';
  X.font='bold '+(10*PX)+'px Silkscreen';
  X.textAlign='center';
  X.fillText(cat.emote,(cat.x+8)*PX,(cat.y-10-cat.emoteTimer*5)*PX);
  X.textAlign='left';
}

function drawMessages(){
  for(var i=0;i<messages.length;i++){
    var m=messages[i];
    var a=Math.min(1,m.timer);
    X.fillStyle='rgba(255,255,255,'+a*0.3+')';
    X.font=(3*PX)+'px Silkscreen';
    X.textAlign='center';
    X.fillText(m.text,W/2,(H*0.35-m.y));
    X.textAlign='left';
  }
}

// --- MAIN LOOP ---
lastActivity=performance.now();
var lastTime=performance.now();
function loop(now){
  var dt=Math.min((now-lastTime)/1000,0.05);
  lastTime=now;
  update(dt,now);

  X.fillStyle='#1a1520';X.fillRect(0,0,W,H);

  drawScene(now);
  drawCat(now);
  drawParticles();
  drawBubbles();
  drawEmote();
  drawMessages();

  // Vignette
  var vig=X.createRadialGradient(W/2,H*0.5,H*0.2,W/2,H*0.5,H*0.8);
  vig.addColorStop(0,'transparent');vig.addColorStop(1,'rgba(15,10,20,0.5)');
  X.fillStyle=vig;X.fillRect(0,0,W,H);

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
