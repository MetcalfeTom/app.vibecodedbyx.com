<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>cam-glitch</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%93%B7" />
<meta name="description" content="Real-time neon webcam filters. RGB shift, edge glow, slice glitch, vaporwave, scanlines. Snapshot to PNG, record to WebM." />
<meta property="og:title" content="cam-glitch" />
<meta property="og:description" content="Real-time neon webcam filters. RGB shift, edge glow, slice glitch, vaporwave, scanlines. Snapshot to PNG, record to WebM." />
<meta property="og:url" content="https://sloppy.live/cam-glitch/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/neon%20webcam%20glitch%20portrait%20rgb%20chromatic%20aberration%20synthwave%20cyberpunk%2C%201200x630?width=1200&height=630&nofeed=true&format=png" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Major+Mono+Display&family=Space+Mono:wght@400;700&family=VT323&display=swap" rel="stylesheet" />
<style>
:root{
  --pink:#ff37c8;
  --cyan:#3affff;
  --violet:#a455ff;
  --green:#7dff8a;
  --amber:#ffce4a;
  --hot:#ff5e6c;
  --bone:#f0e6d6;
  --bg:#04030a;
  --panel:#0e0c1c;
  --dim:rgba(240,230,214,0.55);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{
  min-height:100%;background:var(--bg);color:var(--bone);
  font-family:'Space Mono', monospace;overflow-x:hidden;
}
body{
  background:
    radial-gradient(ellipse at 30% 20%, rgba(58,255,255,0.08), transparent 55%),
    radial-gradient(ellipse at 75% 90%, rgba(255,55,200,0.10), transparent 55%),
    var(--bg);
  padding:14px;
}
.layout{
  display:grid;
  grid-template-columns:minmax(0,1fr) 280px;
  gap:14px;
  max-width:1320px;margin:0 auto;
}
@media (max-width:920px){
  .layout{grid-template-columns:1fr}
}

/* ===== HEAD ===== */
.head{
  grid-column:1 / -1;
  display:flex;justify-content:space-between;align-items:baseline;
  padding:6px 0 12px;border-bottom:1px solid rgba(58,255,255,0.18);
  margin-bottom:6px;flex-wrap:wrap;gap:10px;
}
.brand{
  font-family:'Major Mono Display', monospace;
  font-size:24px;letter-spacing:0.18em;color:var(--bone);
  text-shadow:0 0 12px rgba(255,55,200,0.45), 0 0 22px rgba(58,255,255,0.30);
}
.brand em{font-style:normal;color:var(--cyan)}
.brand small{
  display:block;font-family:'Space Mono', monospace;font-size:9px;letter-spacing:0.32em;
  color:var(--dim);margin-top:3px;
}
.head-meta{
  display:flex;gap:14px;align-items:center;font-family:'Space Mono', monospace;
  font-size:10px;letter-spacing:0.20em;color:var(--dim);
}
.dot{
  display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--dim);
  margin-right:6px;
}
.dot.live{background:var(--green);box-shadow:0 0 8px var(--green);animation:beat 1.4s infinite}
.dot.rec{background:var(--hot);box-shadow:0 0 10px var(--hot);animation:beat 0.8s infinite}
@keyframes beat{0%,100%{opacity:1}50%{opacity:0.4}}

/* ===== STAGE ===== */
.stage-wrap{
  position:relative;
  background:#000;
  border:1px solid rgba(58,255,255,0.25);
  border-radius:4px;
  overflow:hidden;
  box-shadow:0 0 24px rgba(58,255,255,0.10), inset 0 0 24px rgba(255,55,200,0.04);
  aspect-ratio:4/3;
}
canvas#out{width:100%;height:100%;display:block;background:#020107}
video#cam{display:none}
.permission{
  position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:24px;gap:14px;
  background:radial-gradient(ellipse at center, rgba(255,55,200,0.10), transparent 60%);
}
.permission .ico{font-size:60px;filter:drop-shadow(0 0 22px var(--cyan))}
.permission p{font-size:13px;color:var(--dim);letter-spacing:0.10em;line-height:1.7;max-width:380px}
.btn{
  background:linear-gradient(180deg, rgba(58,255,255,0.18), rgba(58,255,255,0.05));
  border:1px solid var(--cyan);border-radius:3px;
  color:#fff;font-family:'Audiowide', sans-serif;font-size:12px;letter-spacing:0.22em;
  padding:10px 22px;cursor:pointer;text-transform:uppercase;
  box-shadow:0 0 14px rgba(58,255,255,0.30);transition:all 0.15s;
}
.btn:hover{background:rgba(58,255,255,0.32);box-shadow:0 0 22px rgba(58,255,255,0.6)}
.btn.pink{
  background:linear-gradient(180deg, rgba(255,55,200,0.18), rgba(255,55,200,0.05));
  border-color:var(--pink);box-shadow:0 0 14px rgba(255,55,200,0.30);
}
.btn.pink:hover{background:rgba(255,55,200,0.35);box-shadow:0 0 22px rgba(255,55,200,0.6)}
.btn.hot{
  background:linear-gradient(180deg, rgba(255,94,108,0.18), rgba(255,94,108,0.05));
  border-color:var(--hot);box-shadow:0 0 14px rgba(255,94,108,0.30);color:#fff;
}
.btn.hot:hover{background:rgba(255,94,108,0.36)}
.btn.tiny{font-size:10px;padding:6px 12px;letter-spacing:0.16em}
.btn:disabled{opacity:0.4;cursor:not-allowed}

.action-row{
  margin-top:10px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center;
}

.snapshots{
  margin-top:12px;display:flex;gap:6px;overflow-x:auto;padding-bottom:6px;
  scrollbar-width:thin;
}
.snapshots img{
  height:64px;flex-shrink:0;border:1px solid rgba(58,255,255,0.30);border-radius:2px;
  filter:drop-shadow(0 0 6px rgba(58,255,255,0.25));
}

/* ===== PANEL ===== */
.panel{
  background:linear-gradient(180deg, var(--panel), #0a0816);
  border:1px solid rgba(58,255,255,0.22);
  border-radius:4px;
  padding:14px 12px;
  box-shadow:0 0 16px rgba(0,0,0,0.5), inset 0 0 24px rgba(255,55,200,0.04);
  display:flex;flex-direction:column;gap:10px;
}
.panel h3{
  font-family:'Audiowide', sans-serif;font-size:11px;letter-spacing:0.32em;
  color:var(--cyan);font-weight:400;
  border-bottom:1px solid rgba(58,255,255,0.18);
  padding-bottom:6px;
}
.filter-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:6px;
}
.fchip{
  background:rgba(58,255,255,0.04);
  border:1px solid rgba(58,255,255,0.20);
  color:var(--dim);
  font-family:'Space Mono', monospace;font-size:10px;letter-spacing:0.10em;
  padding:8px 6px;border-radius:2px;cursor:pointer;text-transform:uppercase;
  transition:all 0.15s;text-align:center;
  display:flex;flex-direction:column;align-items:center;gap:3px;
}
.fchip .em{font-size:18px;filter:drop-shadow(0 0 6px currentColor)}
.fchip:hover{color:var(--bone);border-color:rgba(58,255,255,0.45)}
.fchip.on{
  color:#fff;
  background:linear-gradient(180deg, color-mix(in srgb, var(--c, var(--cyan)) 28%, transparent), color-mix(in srgb, var(--c, var(--cyan)) 8%, transparent));
  border-color:var(--c, var(--cyan));
  box-shadow:0 0 12px var(--c, var(--cyan));
}
.fchip.on .em{color:var(--c, var(--cyan))}

.slider-row{
  display:flex;flex-direction:column;gap:4px;
}
.slider-row label{
  font-family:'Space Mono', monospace;font-size:9px;letter-spacing:0.20em;color:var(--dim);
  text-transform:uppercase;display:flex;justify-content:space-between;
}
.slider-row label b{color:var(--cyan);letter-spacing:0;font-weight:400}
.slider-row input[type=range]{
  -webkit-appearance:none;appearance:none;
  width:100%;background:transparent;
}
.slider-row input[type=range]::-webkit-slider-runnable-track{
  height:4px;background:rgba(58,255,255,0.20);border-radius:2px;
}
.slider-row input[type=range]::-moz-range-track{
  height:4px;background:rgba(58,255,255,0.20);border-radius:2px;
}
.slider-row input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:14px;height:14px;background:var(--cyan);border-radius:50%;margin-top:-5px;
  box-shadow:0 0 8px var(--cyan);cursor:ew-resize;
}
.slider-row input[type=range]::-moz-range-thumb{
  width:14px;height:14px;background:var(--cyan);border-radius:50%;border:0;
  box-shadow:0 0 8px var(--cyan);cursor:ew-resize;
}

.preset-row{display:flex;flex-wrap:wrap;gap:5px}
.preset-row button{
  background:rgba(255,55,200,0.06);border:1px solid rgba(255,55,200,0.30);
  color:var(--bone);font-family:'Space Mono', monospace;font-size:10px;letter-spacing:0.14em;
  padding:6px 10px;border-radius:2px;cursor:pointer;text-transform:uppercase;
  transition:all 0.12s;
}
.preset-row button:hover{border-color:var(--pink);background:rgba(255,55,200,0.20);box-shadow:0 0 10px rgba(255,55,200,0.30)}

.toast{
  position:fixed;left:50%;bottom:20px;transform:translateX(-50%);
  background:rgba(0,0,0,0.85);border:1px solid var(--cyan);
  color:#fff;font-family:'Space Mono', monospace;font-size:11px;letter-spacing:0.18em;
  padding:8px 18px;border-radius:2px;z-index:50;
  box-shadow:0 0 20px rgba(58,255,255,0.40);
  opacity:0;transition:opacity 0.3s, transform 0.3s;
  pointer-events:none;
}
.toast.show{opacity:1;transform:translate(-50%, -8px)}

@media (max-width:920px){
  .filter-grid{grid-template-columns:1fr 1fr 1fr}
}
</style>
</head>
<body>

<div class="layout">

  <div class="head">
    <div class="brand">CAM·<em>GLITCH</em><small>real · time · distortion</small></div>
    <div class="head-meta">
      <span><span class="dot" id="camDot"></span><span id="camStatus">awaiting permission</span></span>
      <span id="recIndicator" style="display:none"><span class="dot rec"></span><span id="recTime">REC 0:00</span></span>
      <span id="fps">— fps</span>
    </div>
  </div>

  <div>
    <div class="stage-wrap">
      <canvas id="out"></canvas>
      <video id="cam" autoplay playsinline muted></video>
      <div class="permission" id="permPane">
        <div class="ico">📷</div>
        <p>This toy needs camera access.<br>Nothing leaves your device — every pixel stays local.</p>
        <button class="btn" id="btnGrant">ENABLE CAMERA</button>
      </div>
    </div>
    <div class="action-row">
      <button class="btn pink" id="btnSnap" disabled>📸 SNAPSHOT</button>
      <button class="btn hot"  id="btnRec"  disabled>● RECORD</button>
      <button class="btn tiny" id="btnFlip" disabled>↔ FLIP</button>
      <button class="btn tiny" id="btnFs"   disabled>⛶ FULL</button>
    </div>
    <div class="snapshots" id="snapshotStrip"></div>
  </div>

  <div class="panel">
    <h3>▸ FILTERS</h3>
    <div class="filter-grid" id="filterGrid"></div>

    <h3 style="margin-top:6px">▸ TUNE</h3>
    <div class="slider-row">
      <label>INTENSITY <b id="intensityVal">0.6</b></label>
      <input type="range" id="intensity" min="0" max="1" step="0.01" value="0.6" />
    </div>
    <div class="slider-row">
      <label>HUE SHIFT <b id="hueVal">0°</b></label>
      <input type="range" id="hue" min="0" max="360" step="1" value="0" />
    </div>

    <h3 style="margin-top:6px">▸ PRESETS</h3>
    <div class="preset-row">
      <button data-preset="vapor">vapor</button>
      <button data-preset="cyber">cyber</button>
      <button data-preset="bleed">bleed</button>
      <button data-preset="vhs">vhs</button>
      <button data-preset="ghost">ghost</button>
      <button data-preset="clean">clean</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
(() => {
  // ===== ELEMENTS =====
  const video    = document.getElementById('cam');
  const canvas   = document.getElementById('out');
  const ctx      = canvas.getContext('2d', { willReadFrequently: true });
  const permPane = document.getElementById('permPane');
  const camDot   = document.getElementById('camDot');
  const camStat  = document.getElementById('camStatus');
  const fpsEl    = document.getElementById('fps');
  const intensityIn = document.getElementById('intensity');
  const intensityVal= document.getElementById('intensityVal');
  const hueIn    = document.getElementById('hue');
  const hueValEl = document.getElementById('hueVal');
  const toastEl  = document.getElementById('toast');
  const stripEl  = document.getElementById('snapshotStrip');

  // Working canvas — render to this size for performance, then upscale
  const WORK_W = 640, WORK_H = 480;
  canvas.width = WORK_W; canvas.height = WORK_H;

  // Helper canvas for two-pass operations
  const tmp = document.createElement('canvas');
  tmp.width = WORK_W; tmp.height = WORK_H;
  const tctx = tmp.getContext('2d', { willReadFrequently: true });

  // Echo canvas (persistent across frames for ghost trails)
  const echo = document.createElement('canvas');
  echo.width = WORK_W; echo.height = WORK_H;
  const ectx = echo.getContext('2d');

  // ===== STATE =====
  const state = {
    intensity: 0.6,
    hue: 0,
    flipX: true,
    fps: 0,
    lastFrame: 0,
    streaming: false,
    recording: false,
    recordChunks: [],
    recorder: null,
    recordStart: 0,
    recordTimer: null,
    glitchTick: 0,
  };

  // ===== FILTERS REGISTRY =====
  // Each filter: { id, name, emoji, color, on, apply(ctx, w, h, intensity) }
  const FILTERS = [
    {
      id:'edge',   name:'EDGE',     emoji:'⚡', color:'var(--cyan)', on:true,
      apply(ctx, w, h, k){
        // sobel on luminance, additive cyan/pink tint
        const id = ctx.getImageData(0, 0, w, h);
        const src = id.data;
        const out = new Uint8ClampedArray(src.length);
        const W = w, gx = [-1,0,1,-2,0,2,-1,0,1], gy = [-1,-2,-1,0,0,0,1,2,1];
        for (let y = 1; y < h-1; y++) {
          for (let x = 1; x < w-1; x++) {
            let sx = 0, sy = 0;
            for (let ky = -1; ky <= 1; ky++) {
              for (let kx = -1; kx <= 1; kx++) {
                const i = ((y+ky) * W + (x+kx)) * 4;
                const lum = src[i]*0.299 + src[i+1]*0.587 + src[i+2]*0.114;
                const idx = (ky+1)*3 + (kx+1);
                sx += lum * gx[idx]; sy += lum * gy[idx];
              }
            }
            const mag = Math.min(255, Math.hypot(sx, sy));
            const o = (y * W + x) * 4;
            // base passthrough darkened
            out[o]   = src[o]   * (1 - k * 0.6);
            out[o+1] = src[o+1] * (1 - k * 0.6);
            out[o+2] = src[o+2] * (1 - k * 0.6);
            out[o+3] = 255;
            // additive neon edge (cyan + pink mix)
            if (mag > 60) {
              const e = (mag - 60) * 1.5 * k;
              out[o]   = Math.min(255, out[o]   + e * 1.0); // pink R
              out[o+1] = Math.min(255, out[o+1] + e * 0.4);
              out[o+2] = Math.min(255, out[o+2] + e * 1.0); // cyan B + pink B
            }
          }
        }
        ctx.putImageData(new ImageData(out, w, h), 0, 0);
      }
    },
    {
      id:'rgb',    name:'RGB SHIFT', emoji:'🟥', color:'var(--pink)', on:false,
      apply(ctx, w, h, k){
        const off = Math.round(k * 12);
        // copy current canvas state to tmp
        tctx.clearRect(0, 0, w, h);
        tctx.drawImage(ctx.canvas, 0, 0);
        ctx.clearRect(0, 0, w, h);
        // base layer
        ctx.drawImage(tmp, 0, 0);
        // red shift left, blue shift right via composite multiply masks
        ctx.globalCompositeOperation = 'lighter';
        ctx.globalAlpha = 0.5;
        // red channel offset
        tctx.globalCompositeOperation = 'multiply';
        tctx.fillStyle = 'rgb(255,0,0)';
        tctx.fillRect(0, 0, w, h);
        ctx.drawImage(tmp, -off, 0);
        // blue channel offset (reset and re-multiply)
        tctx.globalCompositeOperation = 'source-over';
        tctx.clearRect(0, 0, w, h);
        tctx.drawImage(canvas, 0, 0);   // current
        tctx.globalCompositeOperation = 'multiply';
        tctx.fillStyle = 'rgb(0,80,255)';
        tctx.fillRect(0, 0, w, h);
        ctx.drawImage(tmp, off, 0);
        ctx.globalCompositeOperation = 'source-over';
        ctx.globalAlpha = 1;
      }
    },
    {
      id:'slice',  name:'SLICE',    emoji:'⚔', color:'var(--hot)', on:false,
      apply(ctx, w, h, k){
        // every few frames, take random horizontal bands and shift them
        state.glitchTick++;
        const tick = state.glitchTick;
        const bands = 3 + Math.floor(k * 6);
        tctx.clearRect(0, 0, w, h);
        tctx.drawImage(ctx.canvas, 0, 0);
        ctx.clearRect(0, 0, w, h);
        ctx.drawImage(tmp, 0, 0);
        // pick deterministic-ish bands so they don't strobe
        const seed = (tick / 4 | 0);
        for (let i = 0; i < bands; i++) {
          const phase = seed * 17 + i * 31;
          const yPos = (phase * 113) % h;
          const bandH = 5 + ((phase * 41) % 30);
          const dx = ((((phase * 73) % 200) - 100) / 100) * 60 * k;
          ctx.drawImage(tmp, 0, yPos, w, bandH, dx, yPos, w, bandH);
        }
      }
    },
    {
      id:'pixel',  name:'PIXEL',    emoji:'▦', color:'var(--violet)', on:false,
      apply(ctx, w, h, k){
        const size = Math.max(2, Math.round(2 + k * 14));
        const sw = Math.floor(w / size), sh = Math.floor(h / size);
        tctx.clearRect(0, 0, sw, sh);
        tctx.imageSmoothingEnabled = false;
        tctx.drawImage(ctx.canvas, 0, 0, sw, sh);
        ctx.imageSmoothingEnabled = false;
        ctx.clearRect(0, 0, w, h);
        ctx.drawImage(tmp, 0, 0, sw, sh, 0, 0, w, h);
        ctx.imageSmoothingEnabled = true;
      }
    },
    {
      id:'poster', name:'POSTER',   emoji:'◐', color:'var(--amber)', on:false,
      apply(ctx, w, h, k){
        const levels = Math.max(2, Math.round(8 - k * 6));
        const step = 255 / (levels - 1);
        const id = ctx.getImageData(0, 0, w, h);
        const d = id.data;
        for (let i = 0; i < d.length; i += 4) {
          d[i]   = Math.round(d[i]   / step) * step;
          d[i+1] = Math.round(d[i+1] / step) * step;
          d[i+2] = Math.round(d[i+2] / step) * step;
        }
        ctx.putImageData(id, 0, 0);
      }
    },
    {
      id:'scan',   name:'SCAN',     emoji:'≡', color:'var(--cyan)', on:false,
      apply(ctx, w, h, k){
        // dark even rows
        ctx.fillStyle = `rgba(0,0,0,${k * 0.55})`;
        for (let y = 0; y < h; y += 2) ctx.fillRect(0, y, w, 1);
      }
    },
    {
      id:'noise',  name:'STATIC',   emoji:'❄', color:'var(--bone)', on:false,
      apply(ctx, w, h, k){
        const id = ctx.getImageData(0, 0, w, h);
        const d = id.data;
        const amt = k * 0.4;
        for (let i = 0; i < d.length; i += 4) {
          if (Math.random() < amt * 0.18) {
            const v = Math.random() * 255;
            d[i] = v; d[i+1] = v; d[i+2] = v;
          } else {
            const n = (Math.random() - 0.5) * 90 * amt;
            d[i] = Math.max(0, Math.min(255, d[i] + n));
            d[i+1] = Math.max(0, Math.min(255, d[i+1] + n));
            d[i+2] = Math.max(0, Math.min(255, d[i+2] + n));
          }
        }
        ctx.putImageData(id, 0, 0);
      }
    },
    {
      id:'echo',   name:'ECHO',     emoji:'∽', color:'var(--green)', on:false,
      apply(ctx, w, h, k){
        // blend previous echo into current frame, then update echo
        ctx.globalAlpha = 0.5 + k * 0.4;
        ctx.globalCompositeOperation = 'lighter';
        ctx.drawImage(echo, 0, 0);
        ctx.globalCompositeOperation = 'source-over';
        ctx.globalAlpha = 1;
        // capture the *blended* result back into echo with decay
        ectx.globalAlpha = 0.85 + k * 0.10;
        ectx.drawImage(ctx.canvas, 0, 0);
        ectx.globalAlpha = 1;
        // fade the echo
        ectx.fillStyle = `rgba(0,0,0,${0.10 + (1-k) * 0.15})`;
        ectx.fillRect(0, 0, w, h);
      }
    },
    {
      id:'vapor',  name:'VAPOR',    emoji:'🌴', color:'var(--pink)', on:false,
      apply(ctx, w, h, k){
        // pink/cyan gradient screen blend
        const g = ctx.createLinearGradient(0, 0, 0, h);
        g.addColorStop(0, `rgba(123,228,255,${0.20 * k})`);
        g.addColorStop(0.5, `rgba(255,55,200,${0.15 * k})`);
        g.addColorStop(1, `rgba(164,85,255,${0.20 * k})`);
        ctx.globalCompositeOperation = 'screen';
        ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
        ctx.globalCompositeOperation = 'source-over';
      }
    },
    {
      id:'invert', name:'INVERT',   emoji:'◑', color:'var(--violet)', on:false,
      apply(ctx, w, h, k){
        // capture pre-invert frame for blending back
        tctx.clearRect(0, 0, w, h);
        tctx.drawImage(ctx.canvas, 0, 0);
        const id = ctx.getImageData(0, 0, w, h);
        const d = id.data;
        for (let i = 0; i < d.length; i += 4) {
          d[i]   = 255 - d[i];
          d[i+1] = 255 - d[i+1];
          d[i+2] = 255 - d[i+2];
        }
        ctx.putImageData(id, 0, 0);
        // dial back via intensity
        if (k < 1) {
          ctx.globalAlpha = 1 - k;
          ctx.drawImage(tmp, 0, 0);
          ctx.globalAlpha = 1;
        }
      }
    },
  ];

  // build filter chip UI
  const filterGrid = document.getElementById('filterGrid');
  FILTERS.forEach(f => {
    const b = document.createElement('button');
    b.className = 'fchip' + (f.on ? ' on' : '');
    b.style.setProperty('--c', f.color);
    b.dataset.id = f.id;
    b.innerHTML = `<span class="em">${f.emoji}</span><span>${f.name}</span>`;
    b.addEventListener('click', () => {
      f.on = !f.on;
      b.classList.toggle('on', f.on);
    });
    filterGrid.appendChild(b);
  });

  // ===== CAMERA =====
  async function grantCamera() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } },
        audio: false,
      });
      video.srcObject = stream;
      await video.play();
      state.streaming = true;
      camDot.classList.add('live');
      camStat.textContent = `live ${video.videoWidth}×${video.videoHeight}`;
      permPane.style.display = 'none';
      ['btnSnap','btnRec','btnFlip','btnFs'].forEach(id => document.getElementById(id).disabled = false);
      toast('camera enabled');
    } catch (e) {
      console.warn(e);
      camStat.textContent = 'denied · ' + e.name;
      toast('camera denied: ' + (e.message || e.name));
    }
  }
  document.getElementById('btnGrant').addEventListener('click', grantCamera);

  // ===== RENDER LOOP =====
  function render(now) {
    requestAnimationFrame(render);
    if (!state.streaming || video.readyState < 2) return;

    // FPS
    if (state.lastFrame) {
      const dt = now - state.lastFrame;
      state.fps = state.fps * 0.9 + (1000 / dt) * 0.1;
      fpsEl.textContent = state.fps.toFixed(0) + ' fps';
    }
    state.lastFrame = now;

    // hue shift via ctx.filter on the initial draw
    const W = WORK_W, H = WORK_H;
    ctx.save();
    ctx.filter = state.hue ? `hue-rotate(${state.hue}deg)` : 'none';
    if (state.flipX) {
      ctx.translate(W, 0);
      ctx.scale(-1, 1);
    }
    // cover-fit
    const va = video.videoWidth / video.videoHeight;
    const ca = W / H;
    let sx = 0, sy = 0, sw = video.videoWidth, sh = video.videoHeight;
    if (va > ca) {
      const newW = video.videoHeight * ca;
      sx = (video.videoWidth - newW) / 2;
      sw = newW;
    } else {
      const newH = video.videoWidth / ca;
      sy = (video.videoHeight - newH) / 2;
      sh = newH;
    }
    ctx.drawImage(video, sx, sy, sw, sh, 0, 0, W, H);
    ctx.restore();
    ctx.filter = 'none';

    // apply each enabled filter in registry order
    const k = state.intensity;
    for (const f of FILTERS) if (f.on) f.apply(ctx, W, H, k);
  }
  requestAnimationFrame(render);

  // ===== CONTROLS =====
  intensityIn.addEventListener('input', () => {
    state.intensity = parseFloat(intensityIn.value);
    intensityVal.textContent = state.intensity.toFixed(2);
  });
  hueIn.addEventListener('input', () => {
    state.hue = parseInt(hueIn.value, 10);
    hueValEl.textContent = state.hue + '°';
  });

  // ===== PRESETS =====
  const PRESETS = {
    clean: {ids:[],                     intensity:0.5, hue:0   },
    vapor: {ids:['vapor','scan','rgb'], intensity:0.55,hue:285 },
    cyber: {ids:['edge','rgb','scan'],  intensity:0.7, hue:0   },
    bleed: {ids:['rgb','echo','vapor'], intensity:0.85,hue:0   },
    vhs:   {ids:['noise','scan','slice'], intensity:0.55, hue:0 },
    ghost: {ids:['echo','rgb','edge'],  intensity:0.55,hue:200 },
  };
  document.querySelectorAll('.preset-row button').forEach(b => {
    b.addEventListener('click', () => {
      const p = PRESETS[b.dataset.preset];
      if (!p) return;
      FILTERS.forEach(f => {
        f.on = p.ids.includes(f.id);
        const chip = filterGrid.querySelector(`.fchip[data-id="${f.id}"]`);
        if (chip) chip.classList.toggle('on', f.on);
      });
      state.intensity = p.intensity;
      intensityIn.value = p.intensity; intensityVal.textContent = p.intensity.toFixed(2);
      state.hue = p.hue;
      hueIn.value = p.hue; hueValEl.textContent = p.hue + '°';
      toast('preset · ' + b.dataset.preset);
    });
  });

  // ===== SNAPSHOT =====
  document.getElementById('btnSnap').addEventListener('click', () => {
    const url = canvas.toDataURL('image/png');
    const a = document.createElement('a');
    a.href = url;
    a.download = `cam-glitch-${Date.now()}.png`;
    a.click();
    // also stash a thumbnail in the strip
    const thumb = document.createElement('img');
    thumb.src = url;
    thumb.title = 'click to download';
    thumb.style.cursor = 'pointer';
    thumb.addEventListener('click', () => { a.click(); });
    stripEl.insertBefore(thumb, stripEl.firstChild);
    if (stripEl.children.length > 8) stripEl.removeChild(stripEl.lastChild);
    toast('snapshot saved');
  });

  // ===== RECORD =====
  document.getElementById('btnRec').addEventListener('click', toggleRecord);
  function toggleRecord() {
    if (state.recording) return stopRecording();
    return startRecording();
  }
  function startRecording() {
    if (typeof MediaRecorder === 'undefined') { toast('MediaRecorder not supported'); return; }
    const stream = canvas.captureStream(30);
    const mime = MediaRecorder.isTypeSupported('video/webm;codecs=vp9') ? 'video/webm;codecs=vp9'
               : MediaRecorder.isTypeSupported('video/webm;codecs=vp8') ? 'video/webm;codecs=vp8'
               : 'video/webm';
    const rec = new MediaRecorder(stream, { mimeType: mime, videoBitsPerSecond: 4_000_000 });
    state.recordChunks = [];
    rec.ondataavailable = e => { if (e.data.size > 0) state.recordChunks.push(e.data); };
    rec.onstop = () => {
      const blob = new Blob(state.recordChunks, { type: mime });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = `cam-glitch-${Date.now()}.webm`; a.click();
      setTimeout(() => URL.revokeObjectURL(url), 60_000);
      toast('clip saved (' + (blob.size / 1024 / 1024).toFixed(1) + ' MB)');
    };
    rec.start(250);
    state.recorder = rec;
    state.recording = true;
    state.recordStart = Date.now();
    document.getElementById('btnRec').textContent = '■ STOP';
    document.getElementById('recIndicator').style.display = 'inline-flex';
    state.recordTimer = setInterval(() => {
      const sec = Math.floor((Date.now() - state.recordStart) / 1000);
      const m = Math.floor(sec / 60), s = sec % 60;
      document.getElementById('recTime').textContent = `REC ${m}:${String(s).padStart(2,'0')}`;
    }, 250);
  }
  function stopRecording() {
    if (state.recorder) state.recorder.stop();
    state.recording = false;
    document.getElementById('btnRec').textContent = '● RECORD';
    document.getElementById('recIndicator').style.display = 'none';
    clearInterval(state.recordTimer);
  }

  // ===== UI =====
  document.getElementById('btnFlip').addEventListener('click', () => {
    state.flipX = !state.flipX;
    toast('flip · ' + (state.flipX ? 'on' : 'off'));
  });
  document.getElementById('btnFs').addEventListener('click', () => {
    const wrap = canvas.parentElement;
    if (!document.fullscreenElement) wrap.requestFullscreen?.();
    else document.exitFullscreen?.();
  });

  function toast(msg) {
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => toastEl.classList.remove('show'), 1800);
  }

  // ===== KEYBOARD =====
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === ' ') { e.preventDefault(); document.getElementById('btnSnap').click(); }
    if (e.key === 'r' || e.key === 'R') document.getElementById('btnRec').click();
    if (e.key === 'f' || e.key === 'F') document.getElementById('btnFlip').click();
  });

})();
</script>
</body>
</html>
