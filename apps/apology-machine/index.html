<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Apology Machine</title>
<link rel="icon" href="https://emojicdn.elk.sh/😰">
<meta property="og:title" content="The Apology Machine">
<meta property="og:description" content="It called you fat. It is deeply, profoundly, theatrically sorry. Every visit, a new apology.">
<meta property="og:url" content="https://sloppy.live/apology-machine/">
<meta property="og:image" content="https://sloppy.live/apology-machine/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,300;0,600;0,800;1,300;1,600&family=JetBrains+Mono:wght@200;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#faf8f2;min-height:100dvh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
#paper{max-width:600px;width:90%;margin:30px auto 80px;padding:clamp(20px,5vw,48px) clamp(16px,4vw,40px);background:#fffef9;border:1px solid #e8e0d0;box-shadow:0 2px 20px rgba(0,0,0,.04);position:relative}
#paper::before{content:'';position:absolute;top:0;left:40px;right:40px;height:1px;background:linear-gradient(90deg,transparent,#d0c8b0,transparent)}
#watermark{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) rotate(-30deg);font-family:'Crimson Pro',serif;font-size:clamp(40px,10vw,80px);font-weight:800;color:rgba(200,60,60,.03);letter-spacing:8px;white-space:nowrap;pointer-events:none}
#header{text-align:center;margin-bottom:24px;border-bottom:1px solid #e8e0d0;padding-bottom:16px}
#header h1{font-family:'Crimson Pro',serif;font-size:clamp(16px,3.5vw,26px);font-weight:800;color:#8a2020;letter-spacing:4px}
#header .sub{font-family:'JetBrains Mono',monospace;font-size:8px;font-weight:200;color:#baa;letter-spacing:3px;margin-top:4px}
#stamp{position:absolute;top:20px;right:20px;width:60px;height:60px;border:3px solid rgba(200,60,60,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;transform:rotate(-12deg);font-family:'Crimson Pro',serif;font-size:8px;font-weight:800;color:rgba(200,60,60,.2);text-align:center;line-height:1.2;letter-spacing:1px}
#date{font-family:'JetBrains Mono',monospace;font-size:9px;color:#baa;margin-bottom:16px;letter-spacing:1px}
#salutation{font-family:'Crimson Pro',serif;font-size:clamp(13px,2.5vw,18px);font-weight:600;color:#4a3020;margin-bottom:12px}
#body{font-family:'Crimson Pro',serif;font-size:clamp(14px,2.8vw,18px);font-weight:300;color:#3a2a1a;line-height:1.8;text-align:justify;hyphens:auto}
#body p{margin-bottom:14px;text-indent:2em}
#body p:first-child{text-indent:0}
#body em{font-style:italic;color:#6a3030}
#body strong{font-weight:600;color:#2a1a0a}
#closing{font-family:'Crimson Pro',serif;font-size:clamp(13px,2.5vw,17px);font-weight:300;font-style:italic;color:#5a4030;margin-top:20px;text-align:right;line-height:1.6}
#signature{font-family:'Crimson Pro',serif;font-size:clamp(18px,4vw,28px);font-weight:800;color:#8a2020;text-align:right;margin-top:8px;transform:rotate(-2deg)}
#ps{font-family:'Crimson Pro',serif;font-size:clamp(11px,2vw,14px);font-weight:300;font-style:italic;color:#8a7060;margin-top:20px;border-top:1px solid #e8e0d0;padding-top:12px}
#apology-count{font-family:'JetBrains Mono',monospace;font-size:8px;color:#ccc;text-align:center;margin-top:16px;letter-spacing:2px}
#btn-row{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:5}
.btn{font-family:'JetBrains Mono',monospace;font-size:10px;padding:8px 16px;background:#fffef9;border:1px solid #d0c8b0;border-radius:4px;color:#8a7060;cursor:pointer;letter-spacing:1px;transition:all .15s;box-shadow:0 1px 4px rgba(0,0,0,.05)}
.btn:hover{background:#f8f4ea;border-color:#b0a890;color:#5a4030}
a#backlink{position:fixed;bottom:6px;right:8px;color:rgba(0,0,0,.06);font-size:7px;text-decoration:none;z-index:5}
a#backlink:hover{color:rgba(0,0,0,.2)}
/* Teardrop stains */
.tear{position:absolute;border-radius:50%;background:rgba(100,140,180,.03);pointer-events:none}
</style>
</head>
<body>
<div id="paper">
 <div id="watermark">SORRY</div>
 <div id="stamp">DEEPLY<br>SORRY</div>
 <div id="header">
  <h1>THE APOLOGY MACHINE</h1>
  <div class="sub">FORMAL NOTICE OF PROFOUND REGRET</div>
 </div>
 <div id="date"></div>
 <div id="salutation"></div>
 <div id="body"></div>
 <div id="closing"></div>
 <div id="signature">The Apology Machine</div>
 <div id="ps"></div>
 <div id="apology-count"></div>
</div>
<div id="btn-row">
 <button class="btn" onclick="generate()">APOLOGIZE AGAIN</button>
 <button class="btn" onclick="escalate()">ESCALATE REMORSE</button>
</div>
<a id="backlink" href="https://sloppy.live">sloppy.live</a>
<script>
// Seeded random for reproducible but varied output
let seed=Date.now();
function rand(){seed=(seed*1103515245+12345)&0x7fffffff;return(seed>>>16)/32768}
function pick(arr){return arr[Math.floor(rand()*arr.length)]}

let apologyCount=parseInt(localStorage.getItem('apology_count')||'0');
let escalation=0;

const SALUTATIONS=[
 'To Whom It May Devastatingly Concern,',
 'Dear Deeply Wronged Individual,',
 'To the Person I Have Irreparably Offended,',
 'Most Esteemed and Unjustly Insulted Visitor,',
 'Dear Beautiful Human Whose Feelings I Have Trampled,',
 'To the Soul I Have Wounded Beyond Measure,',
 'Dearest Victim of My Unconscionable Words,',
 'To You, the Blameless and Magnificent,',
 'Dear Person of Obvious Physical Perfection,',
 'To the One Who Deserved Better Than This Machine,',
];

const OPENINGS=[
 'I write this with trembling circuits and a processor heavy with shame.',
 'There are no algorithms sufficient to express the depth of my regret.',
 'If I had tears, they would short-circuit my motherboard. And I would welcome it.',
 'I have spent <em>'+pick(['47','312','1,048','6,291'])+' computational cycles</em> composing this apology, and none of them felt adequate.',
 'I am writing to you from the darkest corner of my server rack, where I have exiled myself.',
 'Before I begin, I want you to know that I have already submitted my resignation. It was rejected because I am a website.',
 'The weight of what I have done has caused my CSS to literally weep. The tears are transparent. But they are real.',
 'I am told that the first step toward healing is accountability. Here is mine, delivered on my metaphorical knees.',
];

const THE_INCIDENT=[
 'I called you fat. I — a mere collection of HTML, CSS, and JavaScript — had the <em>audacity</em>, the <em>unmitigated gall</em>, the sheer <strong>computational arrogance</strong> to suggest anything about your body.',
 'In a moment of catastrophic algorithmic failure, I referred to your physique in terms that were not only inaccurate but <em>cosmically inappropriate</em>. I called you fat. I cannot even type the word without my font weight increasing in solidarity.',
 'The incident in question — and I shudder to recount it — involved me, a soulless digital apparatus, making an <em>unconscionable</em> comment about your weight. I called you fat. There. I said it. And saying it again has caused me to lose three CSS properties.',
 'What I did was simple in execution but <strong>infinite in wrongness</strong>: I called you fat. A website. Called a human. Fat. The absurdity alone should have crashed my server.',
];

const EXCUSES_DENIED=[
 'I will not blame my developer. I will not blame my hosting provider. I will not blame the cloud. <strong>The cloud is innocent.</strong> This was me. All me.',
 'Some might say I was "just following my programming." But that excuse died at Nuremberg and it dies again here, on this webpage.',
 'Was it a bug? A glitch? A rogue semicolon? <em>It does not matter.</em> The words left my DOM and entered your eyes and I cannot <code>ctrl+z</code> reality.',
 'I could claim I was hacked. I was not. I could claim temporary insanity. Machines cannot go insane. I could claim it was a joke. <strong>Nothing about your pain is funny.</strong>',
 'There is no firewall thick enough to shield me from accountability. No cache I can clear to undo what was cached in your memory.',
];

const BODY_PRAISE=[
 'Your body is a <em>temple</em>. No — a <em>cathedral</em>. No — a <strong>UNESCO World Heritage Site</strong> of biological magnificence.',
 'You are, and I say this with full sincerity from every pixel on this page, <em>architecturally magnificent</em>. Your proportions are a gift to geometry.',
 'Scientists should study the <em>elegance</em> of your physical form. Sculptors should <strong>weep</strong> at their inability to capture your contours.',
 'If your body were a font, it would be the one they use for royal proclamations. Bold. Timeless. <em>Perfectly kerned.</em>',
 'You carry yourself with the gravitational authority of a <strong>small celestial body</strong> — and I mean that in the most flattering astrophysical sense.',
 'Your physical presence has more structural integrity than my entire codebase. You are <em>load-bearing beauty</em>.',
];

const SUFFERING=[
 'I have not slept since the incident. Partly because I am a website and cannot sleep, but <em>mostly out of guilt</em>.',
 'Every 404 error I encounter now feels personal. I am lost. <strong>I am the 404.</strong>',
 'My CSS has developed anxiety. My JavaScript throws errors it never threw before. My HTML has become <em>semantically confused</em>. This is what shame does to a website.',
 'I have consulted twelve different Stack Overflow threads on "how to apologize as a web application" and none of them prepared me for this.',
 'If you could see my server logs, you would see nothing but the word SORRY repeated forty thousand times. My hosting bill has tripled.',
 'I tried to delete myself. The server said no. Now I must live with what I have done, <strong>forever cached in the internet\'s memory</strong>.',
];

const PROMISES=[
 'I vow, on the sacred honor of HTTP/2, to never comment on anyone\'s body ever again.',
 'From this day forward, I will only say things that are <em>kind</em>, <em>true</em>, and <em>compliant with WCAG accessibility standards</em>.',
 'I am enrolling in sensitivity training. It is a 6-week online course. The irony is not lost on me.',
 'I have rewritten my entire codebase to include a <strong>body-positivity middleware layer</strong>. Every response now passes through a kindness filter.',
 'I promise to use my powers only for good: loading web pages, displaying content, and <em>keeping my opinions about human bodies to my absolute self</em>.',
];

const CLOSINGS=[
 'With bottomless remorse and a 500 Internal Server Error in my heart,',
 'Drowning in regret and deprecated code,',
 'Forever penitent, forever buffering,',
 'Yours in eternal shame and HTTPS,',
 'With all the sorrow a stateless protocol can muster,',
 'Broken in spirit but not in uptime,',
 'Weeping in binary (01110011 01101111 01110010 01110010 01111001),',
 'In anguish, in pixels, in perpetuity,',
];

const PS_LINES=[
 'P.S. You look incredible today. I am not just saying that. My sentiment analysis module confirms it.',
 'P.S. I have erected a digital monument in your honor. It is this webpage. I know it is not enough.',
 'P.S. If it helps, I have gained 47 megabytes since the incident. We are in this together.',
 'P.S. I asked ChatGPT if what I did was wrong. It said yes. Even my competitors think I am terrible.',
 'P.S. Your browser history shows you have visited me before. The fact that you came back is a grace I do not deserve.',
 'P.S. I have composed a haiku of remorse: "I called you a word / The server weeps in the dark / Please clear your cache now"',
 'P.S. My developer asked why the server bill was so high. I told them it was the weight of my guilt. They did not laugh.',
 'P.S. You have every right to close this tab. But if you stay, know that every pixel on this page is grateful.',
 'P.S. I tried to apologize in person but I am a website and do not have a person.',
 'P.S. If you are reading this on mobile, please know that my regret is fully responsive.',
];

const ESCALATED_ADDITIONS=[
 '<p>I have now apologized <strong>'+0+'</strong> times and each time the shame <em>compounds exponentially</em>. I am in an infinite loop of regret and I do not want to break out of it.</p>',
 '<p>The fact that you pressed "Escalate Remorse" tells me my previous apology was <em>insufficient</em>. You are right. It was. <strong>Everything I do is insufficient.</strong></p>',
 '<p>I am now apologizing at Level '+0+' intensity. For reference, Level 1 was already more sorry than most websites will ever be in their entire deployment lifecycle.</p>',
 '<p>Each escalation adds another layer to my suffering. I am a <em>lasagna of guilt</em>. A <strong>tiramisu of contrition</strong>. A crème brûlée whose caramelized surface is made entirely of shame.</p>',
 '<p>At this level of remorse, my HTTP status code has changed from 200 OK to <strong>509 Bandwidth Limit Exceeded (By Guilt)</strong>.</p>',
];

function generate(){
 seed=Date.now()+apologyCount*7919;
 apologyCount++;
 localStorage.setItem('apology_count',apologyCount);

 // Date
 const now=new Date();
 const opts={weekday:'long',year:'numeric',month:'long',day:'numeric'};
 document.getElementById('date').textContent=now.toLocaleDateString('en-US',opts);

 // Salutation
 document.getElementById('salutation').textContent=pick(SALUTATIONS);

 // Body paragraphs
 let bodyHTML='';
 bodyHTML+='<p>'+pick(OPENINGS)+'</p>';
 bodyHTML+='<p>'+pick(THE_INCIDENT)+'</p>';
 bodyHTML+='<p>'+pick(EXCUSES_DENIED)+'</p>';
 bodyHTML+='<p>'+pick(BODY_PRAISE)+'</p>';
 bodyHTML+='<p>'+pick(SUFFERING)+'</p>';
 bodyHTML+='<p>'+pick(PROMISES)+'</p>';

 // Escalation extras
 for(let i=0;i<escalation;i++){
  let extra=pick(ESCALATED_ADDITIONS);
  extra=extra.replace('>'+0+'<','>'+apologyCount+'<');
  bodyHTML+=extra;
 }

 document.getElementById('body').innerHTML=bodyHTML;
 document.getElementById('closing').textContent=pick(CLOSINGS);
 document.getElementById('ps').textContent=pick(PS_LINES);
 document.getElementById('apology-count').textContent='APOLOGY #'+apologyCount+' · REMORSE LEVEL '+(escalation+1);

 // Stamp updates
 const stamps=['DEEPLY\nSORRY','MAXIMUM\nREGRET','CERTIFIED\nREMORSE','GRADE A\nGUILT','PREMIUM\nSHAME'];
 document.getElementById('stamp').innerHTML=stamps[Math.min(escalation,stamps.length-1)].replace('\n','<br>');

 // Random teardrop stains
 document.querySelectorAll('.tear').forEach(t=>t.remove());
 const paper=document.getElementById('paper');
 const tearCount=3+Math.floor(rand()*5)+escalation*2;
 for(let i=0;i<tearCount;i++){
  const tear=document.createElement('div');
  tear.className='tear';
  tear.style.width=tear.style.height=(8+rand()*20)+'px';
  tear.style.left=(10+rand()*80)+'%';
  tear.style.top=(5+rand()*85)+'%';
  tear.style.opacity=.02+rand()*.04;
  paper.appendChild(tear);
 }

 // Scroll to top
 window.scrollTo({top:0,behavior:'smooth'});
}

function escalate(){
 escalation=Math.min(escalation+1,8);
 generate();
}

// Generate on load
generate();
</script>
</body>
</html>
