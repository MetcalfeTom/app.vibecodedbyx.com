<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Glow Terrarium</title>
<link rel="icon" href="https://emojicdn.elk.sh/🌿">
<meta property="og:title" content="Glow Terrarium">
<meta property="og:description" content="Digital terrarium with glowing floating plants and geometric orbs — click to interact">
<meta property="og:url" content="https://sloppy.live/glow-terrarium">
<meta property="og:image" content="https://sloppy.live/glow-terrarium/og-image.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#060810}
canvas{display:block;width:100%;height:100%;position:fixed;top:0;left:0;cursor:crosshair}
.back-link{position:fixed;top:8px;left:8px;color:rgba(120,180,140,0.4);font-size:11px;text-decoration:none;z-index:100;font-family:Georgia,serif}
.back-link:hover{color:rgba(160,230,180,0.7)}
.hint{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);color:rgba(120,180,140,0.25);font-size:10px;font-family:Georgia,serif;letter-spacing:1px;pointer-events:none;transition:opacity 2s;z-index:100}
</style>
</head>
<body>
<a class="back-link" href="https://sloppy.live">← sloppy.live</a>
<canvas id="cv"></canvas>
<div class="hint" id="hint">click to disturb the ecosystem</div>
<script>
var C=document.getElementById('cv'),X=C.getContext('2d');
var W,H;
function resize(){W=C.width=window.innerWidth;H=C.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();

var t=0,clicks=0;
var plants=[],orbs=[],spores=[],ripples=[],fireflies=[];

// Color palettes for plants
var GREENS=['#2ae87a','#1abc54','#40ffa0','#80ffcc','#00cc66'];
var PURPLES=['#b060ff','#8a40e0','#d090ff','#c070ff','#9a50ff'];
var CYANS=['#40e8e0','#20c8c0','#60fff0','#80ffd8','#00ddc8'];
var PINKS=['#ff60a0','#e04080','#ff80b0','#ff40c0','#e860aa'];

// Generate plants
function createPlant(x,y,palette){
  var cols=palette||[GREENS,PURPLES,CYANS,PINKS][Math.floor(Math.random()*4)];
  return{
    x:x||Math.random()*W,
    y:y||H*0.4+Math.random()*H*0.5,
    baseY:0,
    stems:[],
    col:cols[Math.floor(Math.random()*cols.length)],
    cols:cols,
    glow:0.3+Math.random()*0.4,
    phase:Math.random()*Math.PI*2,
    floatAmp:8+Math.random()*15,
    floatSpeed:0.3+Math.random()*0.3,
    size:0.6+Math.random()*0.8,
    type:Math.floor(Math.random()*5),
    pulse:0,
    age:0
  };
}

function initPlants(){
  plants=[];
  var count=12+Math.floor(Math.random()*6);
  for(var i=0;i<count;i++){
    var p=createPlant();
    p.baseY=p.y;
    plants.push(p);
  }
}

// Generate orbs
function createOrb(x,y){
  var palettes=[GREENS,PURPLES,CYANS,PINKS];
  var pal=palettes[Math.floor(Math.random()*palettes.length)];
  return{
    x:x||Math.random()*W,
    y:y||Math.random()*H,
    vx:(Math.random()-0.5)*0.3,
    vy:(Math.random()-0.5)*0.3,
    r:12+Math.random()*25,
    col:pal[Math.floor(Math.random()*pal.length)],
    sides:3+Math.floor(Math.random()*5),
    rotation:Math.random()*Math.PI*2,
    rotSpeed:0.002+Math.random()*0.008*(Math.random()<0.5?1:-1),
    glow:0.2+Math.random()*0.3,
    pulse:Math.random()*Math.PI*2,
    pulseSpeed:0.5+Math.random()*0.5,
    reactForce:0,
    reactAngle:0
  };
}

function initOrbs(){
  orbs=[];
  for(var i=0;i<8;i++)orbs.push(createOrb());
}

// Fireflies
function spawnFirefly(){
  if(fireflies.length>40)return;
  fireflies.push({
    x:Math.random()*W,y:Math.random()*H,
    vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,
    life:200+Math.random()*400,
    maxLife:200+Math.random()*400,
    size:1+Math.random()*2,
    col:['#2ae87a','#40e8e0','#b060ff','#ffe040'][Math.floor(Math.random()*4)],
    blink:Math.random()*Math.PI*2,
    blinkSpeed:2+Math.random()*3
  });
}

// Drawing
function drawPlant(p){
  var px=p.x;
  var py=p.baseY+Math.sin(t*p.floatSpeed+p.phase)*p.floatAmp;
  p.y=py;
  var s=p.size;
  var glowAmt=p.glow+Math.sin(t*0.8+p.phase)*0.1+p.pulse*0.5;

  X.save();
  X.translate(px,py);
  X.scale(s,s);

  // Glow under plant
  var rg=X.createRadialGradient(0,0,0,0,0,40);
  rg.addColorStop(0,hexAlpha(p.col,glowAmt*0.3));
  rg.addColorStop(1,'transparent');
  X.fillStyle=rg;
  X.fillRect(-40,-40,80,80);

  if(p.type===0){
    // Fern-like
    for(var i=0;i<5;i++){
      var angle=-Math.PI/2+(i-2)*0.4+Math.sin(t*0.5+i)*0.1;
      var len=20+i*3;
      X.strokeStyle=hexAlpha(p.col,0.6+glowAmt*0.3);
      X.lineWidth=2;
      X.beginPath();X.moveTo(0,0);
      var ex=Math.cos(angle)*len,ey=Math.sin(angle)*len;
      X.quadraticCurveTo(ex*0.5+Math.sin(t+i)*3,ey*0.5,ex,ey);
      X.stroke();
      // Leaf tips
      X.fillStyle=hexAlpha(p.cols[(i+1)%p.cols.length],0.5+glowAmt*0.3);
      X.beginPath();X.arc(ex,ey,3+Math.sin(t+i)*1,0,Math.PI*2);X.fill();
    }
  }else if(p.type===1){
    // Bulb plant
    X.fillStyle=hexAlpha(p.col,0.4+glowAmt*0.3);
    X.beginPath();X.ellipse(0,-8,10,14,0,0,Math.PI*2);X.fill();
    X.strokeStyle=hexAlpha(p.col,0.7);X.lineWidth=1.5;
    X.beginPath();X.moveTo(0,6);X.lineTo(0,20);X.stroke();
    // Inner glow
    var ig=X.createRadialGradient(0,-8,0,0,-8,8);
    ig.addColorStop(0,hexAlpha(p.col,glowAmt*0.5));
    ig.addColorStop(1,'transparent');
    X.fillStyle=ig;X.beginPath();X.ellipse(0,-8,8,12,0,0,Math.PI*2);X.fill();
  }else if(p.type===2){
    // Spiral tendril
    X.strokeStyle=hexAlpha(p.col,0.5+glowAmt*0.3);
    X.lineWidth=2;
    X.beginPath();
    for(var a=0;a<Math.PI*4;a+=0.2){
      var r2=a*3+Math.sin(t+a)*1.5;
      var xx=Math.cos(a+t*0.2)*r2;
      var yy=Math.sin(a+t*0.2)*r2-a*2;
      if(a===0)X.moveTo(xx,yy);else X.lineTo(xx,yy);
    }
    X.stroke();
    X.fillStyle=hexAlpha(p.col,glowAmt*0.6);
    X.beginPath();X.arc(0,-25,4+Math.sin(t)*1.5,0,Math.PI*2);X.fill();
  }else if(p.type===3){
    // Crystal cluster
    for(var i=0;i<4;i++){
      var ca=i*Math.PI/2+Math.sin(t*0.3+i)*0.15;
      var ch=10+i*4;
      X.fillStyle=hexAlpha(p.cols[i%p.cols.length],0.3+glowAmt*0.3);
      X.save();X.rotate(ca);
      X.beginPath();X.moveTo(-3,0);X.lineTo(0,-ch);X.lineTo(3,0);X.closePath();
      X.fill();
      X.strokeStyle=hexAlpha(p.col,0.5);X.lineWidth=0.5;X.stroke();
      X.restore();
    }
  }else{
    // Jellyfish plant
    X.fillStyle=hexAlpha(p.col,0.25+glowAmt*0.2);
    X.beginPath();X.arc(0,-5,12,Math.PI,0);X.fill();
    var ig2=X.createRadialGradient(0,-8,0,0,-8,10);
    ig2.addColorStop(0,hexAlpha(p.col,glowAmt*0.4));
    ig2.addColorStop(1,'transparent');
    X.fillStyle=ig2;X.beginPath();X.arc(0,-8,10,0,Math.PI*2);X.fill();
    // Tendrils
    X.strokeStyle=hexAlpha(p.col,0.3+glowAmt*0.2);
    X.lineWidth=1;
    for(var j=0;j<5;j++){
      var tx=-8+j*4;
      X.beginPath();X.moveTo(tx,-2);
      X.quadraticCurveTo(tx+Math.sin(t*1.2+j*0.8)*6,12,tx+Math.sin(t*0.8+j)*4,22+Math.sin(t+j)*3);
      X.stroke();
    }
  }

  X.restore();
  p.pulse*=0.95;
}

function drawOrb(o){
  o.rotation+=o.rotSpeed;
  o.pulse+=o.pulseSpeed*0.016;

  // React force decay
  o.x+=o.vx+Math.cos(o.reactAngle)*o.reactForce;
  o.y+=o.vy+Math.sin(o.reactAngle)*o.reactForce;
  o.reactForce*=0.92;

  // Gentle drift
  o.vx+=Math.sin(t*0.2+o.pulse)*0.003;
  o.vy+=Math.cos(t*0.15+o.pulse*1.3)*0.003;
  o.vx*=0.995;o.vy*=0.995;

  // Bounds
  if(o.x<-50)o.x=W+50;if(o.x>W+50)o.x=-50;
  if(o.y<-50)o.y=H+50;if(o.y>H+50)o.y=-50;

  var glowAmt=o.glow+Math.sin(o.pulse)*0.1;
  var r=o.r+Math.sin(o.pulse)*2;

  // Outer glow
  var rg=X.createRadialGradient(o.x,o.y,r*0.5,o.x,o.y,r*2.5);
  rg.addColorStop(0,hexAlpha(o.col,glowAmt*0.2));
  rg.addColorStop(1,'transparent');
  X.fillStyle=rg;
  X.fillRect(o.x-r*2.5,o.y-r*2.5,r*5,r*5);

  // Geometric shape
  X.save();
  X.translate(o.x,o.y);
  X.rotate(o.rotation);

  X.strokeStyle=hexAlpha(o.col,0.4+glowAmt*0.3);
  X.lineWidth=1.5;
  X.beginPath();
  for(var i=0;i<=o.sides;i++){
    var a=i*Math.PI*2/o.sides;
    var px2=Math.cos(a)*r,py2=Math.sin(a)*r;
    if(i===0)X.moveTo(px2,py2);else X.lineTo(px2,py2);
  }
  X.closePath();
  X.stroke();

  // Inner wireframe
  X.strokeStyle=hexAlpha(o.col,0.15+glowAmt*0.1);
  X.lineWidth=0.5;
  for(var i=0;i<o.sides;i++){
    var a1=i*Math.PI*2/o.sides;
    for(var j=i+2;j<o.sides;j++){
      var a2=j*Math.PI*2/o.sides;
      X.beginPath();
      X.moveTo(Math.cos(a1)*r,Math.sin(a1)*r);
      X.lineTo(Math.cos(a2)*r,Math.sin(a2)*r);
      X.stroke();
    }
  }

  // Center dot
  X.fillStyle=hexAlpha(o.col,glowAmt*0.6);
  X.beginPath();X.arc(0,0,2+Math.sin(o.pulse)*1,0,Math.PI*2);X.fill();

  X.restore();
}

function hexAlpha(hex,a){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return'rgba('+r+','+g+','+b+','+Math.max(0,Math.min(1,a))+')';
}

// Spores (from click)
function spawnSpores(x,y,count){
  for(var i=0;i<count;i++){
    var a=Math.random()*Math.PI*2;
    var v=1+Math.random()*3;
    var cols=[GREENS,PURPLES,CYANS,PINKS][Math.floor(Math.random()*4)];
    spores.push({
      x:x,y:y,
      vx:Math.cos(a)*v,vy:Math.sin(a)*v,
      life:60+Math.random()*80,
      maxLife:60+Math.random()*80,
      size:2+Math.random()*4,
      col:cols[Math.floor(Math.random()*cols.length)]
    });
  }
}

function spawnRipple(x,y){
  ripples.push({x:x,y:y,r:0,maxR:80+Math.random()*60,life:1,col:['#2ae87a','#40e8e0','#b060ff','#ff60a0'][Math.floor(Math.random()*4)]});
}

// Click handler
function onClick(mx,my){
  clicks++;
  if(clicks===1)document.getElementById('hint').style.opacity='0';

  spawnSpores(mx,my,15+Math.floor(Math.random()*10));
  spawnRipple(mx,my);

  // React nearby orbs
  orbs.forEach(function(o){
    var dx=o.x-mx,dy=o.y-my;
    var dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<200){
      var force=(1-dist/200)*5;
      o.reactForce=force;
      o.reactAngle=Math.atan2(dy,dx);
      o.rotSpeed*=-1; // reverse spin
    }
  });

  // Pulse nearby plants
  plants.forEach(function(p){
    var dx=p.x-mx,dy=p.y-my;
    var dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<150){
      p.pulse=1-dist/150;
    }
  });

  // Chance to spawn new plant at click
  if(Math.random()<0.3&&plants.length<25){
    var np=createPlant(mx,my);
    np.baseY=my;np.size=0.1;
    plants.push(np);
  }
}

C.addEventListener('click',function(e){onClick(e.clientX,e.clientY);});
C.addEventListener('touchstart',function(e){
  e.preventDefault();
  var t2=e.touches[0];onClick(t2.clientX,t2.clientY);
},{passive:false});

// Main loop
function frame(){
  t+=0.016;
  X.fillStyle='rgba(6,8,16,0.15)';
  X.fillRect(0,0,W,H);

  // Subtle background gradient
  if(Math.floor(t*60)%120===0){
    var bg=X.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*0.6);
    bg.addColorStop(0,'rgba(10,20,30,0.03)');
    bg.addColorStop(1,'transparent');
    X.fillStyle=bg;X.fillRect(0,0,W,H);
  }

  // Fireflies
  if(Math.random()<0.05)spawnFirefly();
  for(var i=fireflies.length-1;i>=0;i--){
    var f=fireflies[i];
    f.x+=f.vx+Math.sin(t*2+f.blink)*0.3;
    f.y+=f.vy+Math.cos(t*1.5+f.blink*1.3)*0.3;
    f.life--;
    if(f.life<=0||f.x<-20||f.x>W+20||f.y<-20||f.y>H+20){fireflies.splice(i,1);continue;}
    var alpha=(f.life/f.maxLife)*(0.3+Math.sin(t*f.blinkSpeed+f.blink)*0.3);
    var fg=X.createRadialGradient(f.x,f.y,0,f.x,f.y,f.size*4);
    fg.addColorStop(0,hexAlpha(f.col,alpha));
    fg.addColorStop(1,'transparent');
    X.fillStyle=fg;
    X.fillRect(f.x-f.size*4,f.y-f.size*4,f.size*8,f.size*8);
    X.fillStyle=hexAlpha(f.col,alpha*1.5);
    X.fillRect(f.x-f.size/2,f.y-f.size/2,f.size,f.size);
  }

  // Plants — grow small ones
  plants.forEach(function(p){
    if(p.size<p.age*0.01+0.6)p.size=Math.min(p.size+0.003,0.6+Math.random()*0.8);
    p.age++;
    drawPlant(p);
  });

  // Orbs
  orbs.forEach(function(o){drawOrb(o);});

  // Ripples
  for(var i=ripples.length-1;i>=0;i--){
    var r=ripples[i];
    r.r+=2;r.life-=0.015;
    if(r.life<=0){ripples.splice(i,1);continue;}
    X.strokeStyle=hexAlpha(r.col,r.life*0.4);
    X.lineWidth=1.5;
    X.beginPath();X.arc(r.x,r.y,r.r,0,Math.PI*2);X.stroke();
    // Inner ring
    if(r.r>20){
      X.strokeStyle=hexAlpha(r.col,r.life*0.2);
      X.beginPath();X.arc(r.x,r.y,r.r*0.6,0,Math.PI*2);X.stroke();
    }
  }

  // Spores
  for(var i=spores.length-1;i>=0;i--){
    var s=spores[i];
    s.x+=s.vx;s.y+=s.vy;
    s.vx*=0.97;s.vy*=0.97;s.vy+=0.01;
    s.life--;
    if(s.life<=0){spores.splice(i,1);continue;}
    var alpha=s.life/s.maxLife;
    var sg=X.createRadialGradient(s.x,s.y,0,s.x,s.y,s.size*2);
    sg.addColorStop(0,hexAlpha(s.col,alpha*0.6));
    sg.addColorStop(1,'transparent');
    X.fillStyle=sg;
    X.fillRect(s.x-s.size*2,s.y-s.size*2,s.size*4,s.size*4);
  }

  requestAnimationFrame(frame);
}

initPlants();
initOrbs();
for(var i=0;i<15;i++)spawnFirefly();
frame();
</script>
</body>
</html>
