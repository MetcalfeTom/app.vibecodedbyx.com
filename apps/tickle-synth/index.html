<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tickle Synth — feather-powered giggle synthesizer</title>
<meta name="description" content="Nine feathers, nine notes, one extremely ticklish blob. Strum the feathers, fill the giggle-o-meter, trigger the laugh fit.">
<link rel="icon" href="https://emojicdn.elk.sh/🪶">
<meta property="og:title" content="Tickle Synth">
<meta property="og:description" content="A synthesizer played by tickling. Nine feather-notes, one very ticklish blob, one giggle-o-meter.">
<meta property="og:url" content="https://sloppy.live/tickle-synth">
<meta property="og:image" content="https://image.pollinations.ai/prompt/a%20round%20giggling%20pastel%20blob%20creature%20being%20tickled%20by%20nine%20rainbow%20feathers%20arranged%20like%20piano%20keys%2C%20cute%20cartoon%2C%20soft%20lavender%20background%2C%20joyful?width=1200&height=630&seed=8787&nologo=true&model=flux&image=.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;800&family=Patrick+Hand&display=swap" rel="stylesheet">
<style>
:root{ --bg:#efe6ff; --bg2:#ffe9f2; --ink:#4a3560; --dim:#907aac; --meter:#ff7ab0; --focus:#2456c8; }
*{box-sizing:border-box;}
html{font-size:100%;}
body{margin:0; min-height:100vh; font-family:'Baloo 2',sans-serif; color:var(--ink); overflow-x:hidden;
  background:linear-gradient(160deg,var(--bg) 0%, var(--bg2) 55%, #fff3dc 100%);
  display:flex; flex-direction:column; align-items:center; padding:1rem 1rem 2rem;}
h1{font-weight:800; font-size:clamp(2.2rem,7vw,3.6rem); margin:.2rem 0 0; line-height:1; letter-spacing:.01em;}
h1 span{display:inline-block;}
h1 .t1{color:#ff7ab0; transform:rotate(-4deg);} h1 .t2{color:#a06ff0; transform:rotate(3deg);}
.sub{font-family:'Patrick Hand',cursive; font-size:1.05rem; color:var(--dim); margin:.15rem 0 .6rem; text-align:center;}
#stage{position:relative; width:min(40rem,96vw); height:clamp(21rem,60vh,26rem); user-select:none; touch-action:none;}
/* blob */
#blob-wrap{position:absolute; left:50%; top:36%; transform:translate(-50%,-50%); width:clamp(11rem,34vw,14rem);}
#blob-wrap svg{width:100%; height:auto; display:block;}
@keyframes idle{0%,100%{transform:translate(-50%,-50%) scale(1,1);}50%{transform:translate(-50%,-52%) scale(1.015,.985);}}
#blob-wrap{animation:idle 3.6s ease-in-out infinite;}
#blob-wrap.giggle{animation:gig .38s ease-in-out;}
@keyframes gig{0%,100%{transform:translate(-50%,-50%) rotate(0);}25%{transform:translate(-52%,-50%) rotate(-3deg) scale(1.04,.96);}75%{transform:translate(-48%,-50%) rotate(3deg) scale(.97,1.05);}}
#blob-wrap.laughfit{animation:fit 1.7s ease-in-out;}
@keyframes fit{0%,100%{transform:translate(-50%,-50%);}10%{transform:translate(-50%,-54%) scale(1.08,.9) rotate(-4deg);}25%{transform:translate(-50%,-47%) scale(.92,1.1) rotate(4deg);}40%{transform:translate(-50%,-55%) scale(1.1,.88) rotate(-5deg);}60%{transform:translate(-50%,-46%) scale(.9,1.1) rotate(5deg);}80%{transform:translate(-50%,-53%) scale(1.06,.94) rotate(-3deg);}}
/* giggle text particles */
.gg{position:absolute; font-family:'Patrick Hand',cursive; font-weight:400; pointer-events:none; z-index:6;
  animation:ggfly 1.25s ease-out forwards;}
@keyframes ggfly{0%{opacity:0; transform:translate(0,0) rotate(var(--rr)) scale(.6);}15%{opacity:1;}100%{opacity:0; transform:translate(var(--dx),-90px) rotate(var(--rr)) scale(1.25);}}
/* feathers */
#fan{position:absolute; left:50%; bottom:0; width:0; height:0;}
button.feather{position:absolute; left:0; bottom:0; width:3.4rem; height:9.5rem; margin-left:-1.7rem;
  border:0; background:transparent; cursor:pointer; transform-origin:50% 92%; padding:0;}
button.feather svg{width:100%; height:100%; display:block; filter:drop-shadow(0 3px 4px rgba(90,60,130,.25));}
button.feather:focus-visible{outline:4px solid var(--focus); outline-offset:2px; border-radius:2rem;}
button.feather.tickling{animation:tk .3s ease-out;}
@keyframes tk{0%{translate:0 0;}35%{translate:0 -1.6rem; rotate:-6deg;}70%{translate:0 -.7rem; rotate:4deg;}100%{translate:0 0;}}
/* meter */
#meter-row{display:flex; align-items:center; gap:.7rem; margin-top:.4rem; width:min(26rem,90vw);}
#meter-lbl{font-family:'Patrick Hand',cursive; font-size:1rem; color:var(--dim); white-space:nowrap;}
#meter{flex:1; height:1.1rem; background:#fff; border:2px solid #d8c4f0; border-radius:99px; overflow:hidden;}
#meter-fill{height:100%; width:0%; border-radius:99px; transition:width .15s;
  background:linear-gradient(90deg,#ffd36e,#ff7ab0,#a06ff0);}
#meter.full{box-shadow:0 0 16px rgba(255,122,176,.8);}
.row{display:flex; gap:.6rem; margin-top:.7rem; flex-wrap:wrap; justify-content:center;}
button.ui{font-family:'Baloo 2',sans-serif; font-weight:800; font-size:.85rem; cursor:pointer; min-height:2.75rem;
  padding:.45rem 1.1rem; border-radius:99px; border:2px solid #d8c4f0; background:#fff; color:var(--ink);}
button.ui:hover{border-color:#a06ff0;}
button.ui:focus-visible{outline:3px solid var(--focus); outline-offset:2px;}
button.ui[aria-pressed="true"]{background:#a06ff0; color:#fff; border-color:#8a5ae0;}
.hint{font-family:'Patrick Hand',cursive; font-size:.95rem; color:var(--dim); margin:.6rem 0 0; text-align:center;}
kbd{background:#fff; border:1px solid #d8c4f0; border-radius:6px; padding:0 .35rem; font-family:inherit;}
#sr-status{position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0);}
@media (max-width:560px){ button.feather{width:2.9rem; height:8rem; margin-left:-1.45rem;} }
@media (prefers-reduced-motion:reduce){
  #blob-wrap,#blob-wrap.giggle,#blob-wrap.laughfit{animation:none;}
  button.feather.tickling{animation:none;}
  .gg{display:none;}
}
</style>
</head>
<body>
<h1><span class="t1">Tickle</span> <span class="t2">Synth</span></h1>
<p class="sub">nine feathers · nine notes · one extremely ticklish blob</p>
<main id="stage" aria-label="Tickle synthesizer. Nine feather buttons play notes. Keys A S D F G H J K L also play.">
  <div id="blob-wrap" aria-hidden="true">
    <svg viewBox="0 0 200 190">
      <defs>
        <radialGradient id="bg1" cx="38%" cy="30%">
          <stop offset="0%" stop-color="#d8b8ff"/><stop offset="55%" stop-color="#a988e8"/><stop offset="100%" stop-color="#7e5cc0"/>
        </radialGradient>
      </defs>
      <ellipse id="body" cx="100" cy="105" rx="88" ry="80" fill="url(#bg1)" stroke="#5a3f90" stroke-width="4"/>
      <ellipse cx="66" cy="128" rx="14" ry="9" fill="#ff9ac0" opacity=".75"/>
      <ellipse cx="134" cy="128" rx="14" ry="9" fill="#ff9ac0" opacity=".75"/>
      <g id="eyes-open">
        <ellipse cx="72" cy="88" rx="10" ry="13" fill="#2c1a4a"/>
        <ellipse cx="128" cy="88" rx="10" ry="13" fill="#2c1a4a"/>
        <circle cx="75" cy="83" r="3.4" fill="#fff"/>
        <circle cx="131" cy="83" r="3.4" fill="#fff"/>
      </g>
      <g id="eyes-shut" style="display:none">
        <path d="M62 88 Q72 96 82 88" stroke="#2c1a4a" stroke-width="4" fill="none" stroke-linecap="round"/>
        <path d="M118 88 Q128 96 138 88" stroke="#2c1a4a" stroke-width="4" fill="none" stroke-linecap="round"/>
      </g>
      <path id="mouth-smile" d="M78 118 Q100 134 122 118" stroke="#2c1a4a" stroke-width="4.5" fill="none" stroke-linecap="round"/>
      <path id="mouth-laugh" style="display:none" d="M74 116 Q100 152 126 116 Q100 128 74 116 Z" fill="#5a2050" stroke="#2c1a4a" stroke-width="4"/>
      <path d="M40 40 Q46 22 60 30 Q52 38 56 46" fill="#a988e8" stroke="#5a3f90" stroke-width="3.5" stroke-linejoin="round"/>
    </svg>
  </div>
  <div id="fan"></div>
</main>
<div id="meter-row">
  <span id="meter-lbl">giggle-o-meter</span>
  <div id="meter" role="progressbar" aria-label="Giggle meter" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0"><div id="meter-fill"></div></div>
</div>
<div class="row">
  <button class="ui" id="mute-btn" type="button" aria-pressed="false">🔊 sound on</button>
</div>
<p class="hint">drag across the feathers to strum · keys <kbd>A</kbd>–<kbd>L</kbd> play too · fill the meter for a laugh fit</p>
<p id="sr-status" role="status" aria-live="polite"></p>

<script>
(function(){
"use strict";
var $=function(id){ return document.getElementById(id); };
var reduceMotion=false;
try{ reduceMotion=matchMedia('(prefers-reduced-motion: reduce)').matches; }catch(e){}

/* ── notes: C major pentatonic, two-ish octaves ── */
var NOTES=[
  {n:'C4', f:261.63}, {n:'D4', f:293.66}, {n:'E4', f:329.63}, {n:'G4', f:392.00}, {n:'A4', f:440.00},
  {n:'C5', f:523.25}, {n:'D5', f:587.33}, {n:'E5', f:659.25}, {n:'G5', f:783.99}
];
var COLORS=['#ff6f91','#ff9a5c','#ffd36e','#8ed86e','#5ecfd6','#6ea8ff','#a06ff0','#e06fd0','#ff7ab0'];
var KEYS=['a','s','d','f','g','h','j','k','l'];

/* ── build the feather fan ── */
var fan=$('fan');
function featherSVG(color){
  return '<svg viewBox="0 0 60 170" aria-hidden="true">'+
    '<path d="M30 8 Q52 40 46 95 Q42 128 30 136 Q18 128 14 95 Q8 40 30 8 Z" fill="'+color+'" stroke="#4a3560" stroke-width="3"/>'+
    '<line x1="30" y1="16" x2="30" y2="136" stroke="#4a3560" stroke-width="2.5"/>'+
    '<path d="M30 34 L44 28 M30 50 L47 44 M30 66 L48 61 M30 82 L46 79 M30 98 L43 96 M30 34 L16 28 M30 50 L13 44 M30 66 L12 61 M30 82 L14 79 M30 98 L17 96" stroke="#4a3560" stroke-width="1.6" opacity=".55"/>'+
    '<path d="M30 136 L30 162" stroke="#e8d9b0" stroke-width="5" stroke-linecap="round"/>'+
    '<path d="M30 136 L30 162" stroke="#4a3560" stroke-width="5" stroke-linecap="round" opacity=".25"/>'+
  '</svg>';
}
var feathers=[];
NOTES.forEach(function(note,i){
  var b=document.createElement('button');
  b.className='feather'; b.type='button';
  b.setAttribute('aria-label','feather — note '+note.n+' (key '+KEYS[i].toUpperCase()+')');
  b.innerHTML=featherSVG(COLORS[i]);
  var ang=(i-4)*13;   /* fan: -52°..+52° */
  b.style.transform='rotate('+ang+'deg)';
  b.style.transformOrigin='50% 130%';
  fan.appendChild(b);
  feathers.push(b);
  b.addEventListener('pointerdown',function(e){ e.preventDefault(); stroking=true; tickle(i); });
  b.addEventListener('pointerenter',function(){ if(stroking) tickle(i); });
  b.addEventListener('keydown',function(e){ if(e.key===' '||e.key==='Enter'){ e.preventDefault(); tickle(i); } });
});
var stroking=false;
addEventListener('pointerup',function(){ stroking=false; });
addEventListener('pointercancel',function(){ stroking=false; });

/* ── audio ── */
var AC=null, master=null, muted=false;
function ensureAC(){
  if(AC) return AC;
  try{
    AC=new (window.AudioContext||window.webkitAudioContext)();
    master=AC.createGain(); master.gain.value=muted?0:1;
    master.connect(AC.destination);
  }catch(e){}
  return AC;
}
function pluck(freq){
  if(!ensureAC()||muted) return;
  if(AC.state==='suspended') AC.resume();
  var t=AC.currentTime;
  var detune=1+(Math.random()-.5)*.006;
  /* feather swish */
  var nb=AC.createBufferSource(), nbuf=AC.createBuffer(1,AC.sampleRate*.1,AC.sampleRate), nd=nbuf.getChannelData(0);
  for(var i=0;i<nd.length;i++) nd[i]=(Math.random()*2-1)*(1-i/nd.length);
  nb.buffer=nbuf;
  var nf=AC.createBiquadFilter(); nf.type='bandpass'; nf.frequency.value=1400; nf.Q.value=1.2;
  var ng=AC.createGain(); ng.gain.value=.05;
  nb.connect(nf).connect(ng).connect(master); nb.start(t);
  /* the tickly note: triangle + octave sine, fluttery vibrato */
  var o1=AC.createOscillator(), o2=AC.createOscillator(), g=AC.createGain();
  var lfo=AC.createOscillator(), lg=AC.createGain();
  o1.type='triangle'; o1.frequency.value=freq*detune;
  o2.type='sine'; o2.frequency.value=freq*2*detune;
  lfo.frequency.value=6.5+Math.random()*1.5; lg.gain.value=freq*.009;
  lfo.connect(lg); lg.connect(o1.frequency); lg.connect(o2.frequency);
  var lp=AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=2600;
  g.gain.setValueAtTime(.0001,t);
  g.gain.linearRampToValueAtTime(.22,t+.012);
  g.gain.exponentialRampToValueAtTime(.0001,t+.85);
  var g2=AC.createGain(); g2.gain.value=.35;
  o1.connect(g); o2.connect(g2); g2.connect(g);
  g.connect(lp).connect(master);
  o1.start(t); o2.start(t); lfo.start(t);
  o1.stop(t+.9); o2.stop(t+.9); lfo.stop(t+.9);
}
function giggleSound(big){
  if(!ensureAC()||muted) return;
  var t=AC.currentTime;
  var seq=big?[420,660,540,720,600,760]:[480,760,620];
  seq.forEach(function(f,i){
    var o=AC.createOscillator(), g=AC.createGain();
    o.type='square';
    var st=t+i*(big?.09:.075);
    o.frequency.setValueAtTime(f,st);
    o.frequency.exponentialRampToValueAtTime(f*1.25,st+.05);
    var bp=AC.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1100; bp.Q.value=2.4;
    g.gain.setValueAtTime(.0001,st);
    g.gain.linearRampToValueAtTime(big?.16:.11,st+.015);
    g.gain.exponentialRampToValueAtTime(.0001,st+.07);
    o.connect(bp).connect(g).connect(master);
    o.start(st); o.stop(st+.09);
  });
}
function laughArp(){
  if(!ensureAC()||muted) return;
  var t=AC.currentTime;
  var run=[0,1,2,3,4,5,6,7,8,7,5,3,1];
  run.forEach(function(ni,i){
    var o=AC.createOscillator(), g=AC.createGain();
    o.type='triangle'; o.frequency.value=NOTES[ni].f;
    var st=t+i*.07;
    g.gain.setValueAtTime(.0001,st);
    g.gain.linearRampToValueAtTime(.15,st+.01);
    g.gain.exponentialRampToValueAtTime(.0001,st+.12);
    o.connect(g).connect(master);
    o.start(st); o.stop(st+.15);
  });
}
$('mute-btn').addEventListener('click',function(){
  muted=!muted;
  this.setAttribute('aria-pressed',muted?'true':'false');
  this.textContent=muted?'🔇 sound off':'🔊 sound on';
  if(master&&AC) master.gain.setTargetAtTime(muted?0:1,AC.currentTime,.02);
});

/* ── tickle logic ── */
var meter=0, fitActive=false, lastGiggle=0, lastAnnounce=0;
var GGWORDS=['hehe','hihi','ha!','heehee','pfff','hah','tee-hee','hehehe'];
function tickle(i){
  var f=feathers[i];
  f.classList.remove('tickling'); void f.offsetWidth; f.classList.add('tickling');
  pluck(NOTES[i].f);
  blobGiggle();
  if(!fitActive){
    meter=Math.min(100,meter+8);
    updateMeter();
    if(meter>=100) laughFit();
  }
  var now=Date.now();
  if(now-lastGiggle>900&&Math.random()<.35){ lastGiggle=now; giggleSound(false); }
  spawnGiggleText(false);
}
function blobGiggle(){
  var w=$('blob-wrap');
  if(fitActive) return;
  w.classList.remove('giggle'); void w.offsetWidth; w.classList.add('giggle');
  squint(true);
  clearTimeout(blobGiggle._t);
  blobGiggle._t=setTimeout(function(){ squint(false); },420);
}
function squint(on){
  $('eyes-open').style.display=on?'none':'';
  $('eyes-shut').style.display=on?'':'none';
  $('mouth-smile').style.display=on?'none':'';
  $('mouth-laugh').style.display=on?'':'none';
}
function updateMeter(){
  $('meter-fill').style.width=meter+'%';
  $('meter').setAttribute('aria-valuenow',Math.round(meter));
  $('meter').classList.toggle('full',meter>=100);
}
function laughFit(){
  fitActive=true;
  var w=$('blob-wrap');
  w.classList.remove('laughfit'); void w.offsetWidth; w.classList.add('laughfit');
  squint(true);
  laughArp(); giggleSound(true);
  $('sr-status').textContent='laugh fit! the blob is losing it';
  for(var i=0;i<10;i++) setTimeout(spawnGiggleText,i*130,true);
  setTimeout(function(){
    fitActive=false; meter=0; updateMeter();
    squint(false);
    w.classList.remove('laughfit');
  },1800);
}
function spawnGiggleText(big){
  if(reduceMotion) return;
  var s=document.createElement('span');
  s.className='gg';
  s.textContent=GGWORDS[Math.floor(Math.random()*GGWORDS.length)];
  s.style.left=(50+(Math.random()-.5)*30)+'%';
  s.style.top=(26+(Math.random()-.5)*18)+'%';
  s.style.fontSize=(big?1.6+Math.random():1+Math.random()*.5)+'rem';
  s.style.color=COLORS[Math.floor(Math.random()*COLORS.length)];
  s.style.setProperty('--dx',((Math.random()-.5)*120)+'px');
  s.style.setProperty('--rr',((Math.random()-.5)*40)+'deg');
  $('stage').appendChild(s);
  setTimeout(function(){ s.remove(); },1350);
}
/* meter decay */
setInterval(function(){
  if(!fitActive&&meter>0){ meter=Math.max(0,meter-2.2); updateMeter(); }
},300);

/* keyboard */
addEventListener('keydown',function(e){
  if(e.repeat) return;
  var i=KEYS.indexOf(e.key.toLowerCase());
  if(i>=0&&document.activeElement.tagName!=='BUTTON'){ tickle(i); }
});

window.__tk={ tickle:tickle, meter:function(){ return meter; }, fit:function(){ return fitActive; }, notes:NOTES };
})();
</script>
</body>
</html>
