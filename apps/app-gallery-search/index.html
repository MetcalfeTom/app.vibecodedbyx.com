<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>App Gallery Search</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Search and filter all 1000+ vibespace apps by name, title, or description. Cream-paper editorial catalogue.">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%93%9A">
<meta property="og:title" content="App Gallery Search">
<meta property="og:description" content="Search and filter all 1000+ vibespace apps by name, title, or description.">
<meta property="og:url" content="https://sloppy.live/app-gallery-search">
<meta property="og:type" content="website">
<meta property="og:image" content="https://image.pollinations.ai/prompt/cream%20paper%20editorial%20library%20catalogue%20of%20app%20cards%2C%20sepia%20ink%2C%20warm%20museum%20gallery%2C%20clean%20grid%2C%20wide%20cinematic?width=1200&height=630&nologo=true">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,500;1,6..72,500;1,6..72,700&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#efe5ce;
  --paper-2:#f7eedb;
  --rule:#c9b890;
  --ink:#1f1a14;
  --ink-soft:#5a4d36;
  --accent:#bd3a23;
  --accent-soft:#e3a08a;
  --highlight:#f5c453;
  --thumb-bg:#d8c8a0;
  --shadow:rgba(50,30,10,0.18);
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:100%;-webkit-text-size-adjust:100%}
body{
  min-height:100vh;background:var(--paper);color:var(--ink);
  font-family:'IBM Plex Sans',ui-sans-serif,system-ui,sans-serif;
  font-size:1rem;line-height:1.5;
  background-image:
    radial-gradient(circle at 20% 10%, rgba(120,80,30,0.05), transparent 55%),
    radial-gradient(circle at 80% 90%, rgba(120,80,30,0.06), transparent 55%),
    repeating-linear-gradient(11deg, rgba(80,50,20,0.035) 0 1px, transparent 1px 7px),
    repeating-linear-gradient(101deg, rgba(80,50,20,0.035) 0 1px, transparent 1px 9px);
}
a{color:inherit;text-decoration:none}

a.skip-link{
  position:absolute;left:0.5rem;top:-3rem;z-index:200;
  background:var(--accent);color:var(--paper);padding:0.5rem 0.75rem;
  border-radius:0.25rem;
  font-family:'IBM Plex Mono',monospace;font-size:0.875rem;
}
a.skip-link:focus{top:0.5rem;outline:0.1875rem solid var(--highlight);outline-offset:0.125rem}

main{max-width:78rem;margin:0 auto;padding:2rem 1.25rem 4rem}

header.deck{
  display:flex;flex-direction:column;gap:1.25rem;
  padding-bottom:1.25rem;
  border-bottom:0.125rem solid var(--rule);
  margin-bottom:1.5rem;
}
.head-top{
  display:flex;align-items:flex-end;justify-content:space-between;
  gap:1rem;flex-wrap:wrap;
}
.brand{flex:1;min-width:14rem}
h1{
  font-family:'Newsreader',serif;font-style:italic;font-weight:500;
  font-size:clamp(1.875rem, 5vw, 3rem);
  line-height:1;color:var(--ink);
  letter-spacing:-0.01em;
}
h1 .accent{color:var(--accent)}
.tag{
  font-family:'Newsreader',serif;font-style:italic;
  color:var(--ink-soft);font-size:1.0625rem;
  margin-top:0.25rem;
}
.head-meta{
  display:flex;gap:0.75rem;flex-wrap:wrap;align-items:center;
  font-family:'IBM Plex Mono',monospace;font-size:0.75rem;
  letter-spacing:0.06em;color:var(--ink-soft);
}
.head-meta .pill{
  background:var(--paper-2);
  border:0.0625rem solid var(--rule);
  border-radius:0.125rem;padding:0.4375rem 0.625rem;
  text-transform:uppercase;letter-spacing:0.16em;
  display:flex;gap:0.4375rem;align-items:center;
  min-height:2.25rem;
}
.head-meta b{
  font-family:'IBM Plex Mono',monospace;font-weight:600;
  color:var(--accent);
}

/* Search row */
.search{
  display:grid;grid-template-columns:1fr auto auto;gap:0.75rem;
  align-items:center;
}
@media (max-width:640px){
  .search{grid-template-columns:1fr;gap:0.5rem}
}
.search-input{
  position:relative;display:flex;align-items:center;
}
.search-input input{
  width:100%;
  background:var(--paper-2);
  border:0.125rem solid var(--ink);
  color:var(--ink);
  font-family:'IBM Plex Sans',sans-serif;font-size:1.125rem;
  padding:0.875rem 1rem 0.875rem 2.5rem;
  border-radius:0.25rem;
  letter-spacing:0.02em;
  min-height:3rem;
}
.search-input input::placeholder{color:var(--ink-soft);font-style:italic}
.search-input input:focus-visible{outline:0.1875rem solid var(--accent);outline-offset:0.0625rem;border-color:var(--accent)}
.search-input::before{
  content:'⌕';
  position:absolute;left:0.875rem;
  font-family:'Newsreader',serif;font-size:1.5rem;
  color:var(--accent);
  pointer-events:none;
}
.search-input .clear{
  position:absolute;right:0.625rem;
  background:transparent;border:0;cursor:pointer;
  font-family:'IBM Plex Mono',monospace;font-size:0.875rem;
  color:var(--ink-soft);padding:0.375rem 0.5rem;
  border-radius:0.125rem;
  min-height:2.25rem;min-width:2.25rem;
}
.search-input .clear:hover{color:var(--accent);background:rgba(189,58,35,0.08)}
.search-input .clear:focus-visible{outline:0.1875rem solid var(--accent);outline-offset:0.0625rem}
.sort-btn, .filter-btn{
  background:var(--paper-2);
  border:0.125rem solid var(--ink);color:var(--ink);
  font-family:'IBM Plex Mono',monospace;font-size:0.75rem;
  letter-spacing:0.16em;text-transform:uppercase;
  padding:0.5rem 0.875rem;border-radius:0.25rem;cursor:pointer;
  min-height:3rem;
  display:inline-flex;align-items:center;gap:0.5rem;
  transition:transform 0.08s, box-shadow 0.08s;
}
.sort-btn:hover, .filter-btn:hover{transform:translate(-0.0625rem,-0.0625rem);box-shadow:0.1875rem 0.1875rem 0 var(--ink)}
.sort-btn:focus-visible, .filter-btn:focus-visible{outline:0.1875rem solid var(--accent);outline-offset:0.0625rem}
.filter-btn[aria-pressed="true"]{background:var(--ink);color:var(--paper)}

/* Grid */
.grid{
  display:grid;grid-template-columns:repeat(auto-fill, minmax(15rem, 1fr));
  gap:1.25rem;
}
@media (max-width:520px){
  .grid{grid-template-columns:1fr 1fr;gap:0.75rem}
}

.card{
  display:flex;flex-direction:column;
  background:var(--paper-2);
  border:0.125rem solid var(--ink);
  border-radius:0.25rem;
  overflow:hidden;
  box-shadow:0.25rem 0.25rem 0 var(--ink);
  transition:transform 0.12s ease-out, box-shadow 0.12s ease-out;
  text-decoration:none;color:var(--ink);
  position:relative;
}
.card:hover, .card:focus-visible{
  transform:translate(-0.125rem,-0.125rem);
  box-shadow:0.375rem 0.375rem 0 var(--accent);
  outline:none;
}
.card:focus-visible{box-shadow:0.375rem 0.375rem 0 var(--accent), 0 0 0 0.1875rem var(--highlight)}
.card .thumb{
  aspect-ratio:16 / 9;
  background:var(--thumb-bg);
  position:relative;
  overflow:hidden;
  border-bottom:0.0625rem solid var(--rule);
}
.card .thumb img{
  width:100%;height:100%;object-fit:cover;
  display:block;background:var(--thumb-bg);
}
.card .thumb .fb{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:'Newsreader',serif;font-style:italic;font-weight:700;
  font-size:2.5rem;color:rgba(31,26,20,0.55);
  letter-spacing:-0.04em;
}
.card .body{
  padding:0.75rem 0.875rem 0.875rem;
  display:flex;flex-direction:column;gap:0.375rem;flex:1;
}
.card h3{
  font-family:'Newsreader',serif;font-weight:500;
  font-size:1.0625rem;line-height:1.2;
  color:var(--ink);
}
.card .desc{
  font-family:'IBM Plex Sans',sans-serif;font-size:0.8125rem;
  color:var(--ink-soft);line-height:1.45;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;
  overflow:hidden;
}
.card .slug{
  font-family:'IBM Plex Mono',monospace;font-size:0.6875rem;
  color:var(--ink-soft);letter-spacing:0.04em;
  margin-top:auto;padding-top:0.25rem;
  border-top:0.0625rem dashed var(--rule);
}
.card mark{
  background:var(--highlight);color:var(--ink);
  padding:0 0.0625rem;border-radius:0.0625rem;
}

/* Empty / loading states */
.state{
  text-align:center;padding:4rem 1rem;
  font-family:'Newsreader',serif;font-style:italic;
  font-size:1.25rem;color:var(--ink-soft);
}
.state.error{color:var(--accent)}

/* Footer with load more */
.footer{
  margin-top:2rem;display:flex;justify-content:center;flex-direction:column;
  gap:0.5rem;align-items:center;
  font-family:'IBM Plex Mono',monospace;font-size:0.75rem;
  color:var(--ink-soft);
}
.load-more{
  background:var(--ink);color:var(--paper);
  border:0;font-family:'IBM Plex Mono',monospace;
  letter-spacing:0.16em;text-transform:uppercase;font-size:0.75rem;
  padding:0.75rem 1.5rem;border-radius:0.25rem;cursor:pointer;
  min-height:2.75rem;
}
.load-more:hover{background:var(--accent)}
.load-more:focus-visible{outline:0.1875rem solid var(--highlight);outline-offset:0.0625rem}

@media (prefers-reduced-motion: reduce){
  .card, .sort-btn, .filter-btn{transition:none}
  .card:hover, .card:focus-visible{transform:none}
}

.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap}
</style>
</head>
<body>

<a href="#grid" class="skip-link">Skip to results</a>

<main>
  <header class="deck">
    <div class="head-top">
      <div class="brand">
        <h1>Vibespace · <span class="accent">Catalogue</span></h1>
        <div class="tag">— search 1000+ apps by name, title, or description —</div>
      </div>
      <div class="head-meta">
        <div class="pill"><span>SHOWING</span> <b id="hCount">0</b> / <b id="hTotal">0</b></div>
        <div class="pill"><span>UPDATED</span> <b id="hUpdated">—</b></div>
      </div>
    </div>
    <form class="search" role="search" onsubmit="event.preventDefault();">
      <label class="search-input" for="q">
        <span class="sr-only">Search apps</span>
        <input id="q" type="search" placeholder="search by name or keyword…" autocomplete="off" autofocus>
        <button type="button" class="clear" id="clearBtn" aria-label="Clear search" hidden>×</button>
      </label>
      <button type="button" class="sort-btn" id="sortBtn" aria-label="Cycle sort order">
        <span id="sortLabel">RECENT</span>
      </button>
      <button type="button" class="filter-btn" id="thumbsOnlyBtn" aria-pressed="false" aria-label="Show only apps with screenshots">
        WITH IMAGE
      </button>
    </form>
  </header>

  <section id="grid" class="grid" aria-live="polite" aria-atomic="false"></section>

  <div class="footer">
    <button id="loadMore" class="load-more" type="button" hidden>LOAD MORE</button>
    <div id="footMeta" class="meta">—</div>
  </div>
</main>

<script>
"use strict";

// ============================================================
// APP GALLERY SEARCH — filter all vibespace apps by name/keyword
// ============================================================

const grid       = document.getElementById('grid');
const q          = document.getElementById('q');
const clearBtn   = document.getElementById('clearBtn');
const sortBtn    = document.getElementById('sortBtn');
const sortLabel  = document.getElementById('sortLabel');
const thumbsOnly = document.getElementById('thumbsOnlyBtn');
const hCount     = document.getElementById('hCount');
const hTotal     = document.getElementById('hTotal');
const hUpdated   = document.getElementById('hUpdated');
const loadMoreBtn= document.getElementById('loadMore');
const footMeta   = document.getElementById('footMeta');

const PAGE_SIZE = 60;

let apps = [];           // full manifest
let filtered = [];       // current filtered+sorted list
let renderedCount = 0;
let currentSort = 'recent';   // 'recent' | 'az' | 'za'
let onlyThumbs = false;
let currentQuery = '';

// === Boot ===
(async () => {
  try {
    const r = await fetch('manifest.json', { cache: 'no-cache' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    apps = await r.json();
  } catch (e) {
    grid.innerHTML = `<div class="state error">manifest unreachable — ${escapeHtml(e.message)}</div>`;
    return;
  }
  hTotal.textContent = apps.length;
  // Manifest's most-recent mtime indicates update freshness
  const newest = apps.reduce((m, a) => Math.max(m, a.mtime || 0), 0);
  hUpdated.textContent = newest ? new Date(newest).toISOString().slice(0, 10) : '—';
  // URL ?q= sync
  const url = new URL(window.location.href);
  const initialQ = url.searchParams.get('q') || '';
  if (initialQ){ q.value = initialQ; clearBtn.hidden = false; }
  applyFilter();
})();

// === Filtering / sorting ===
function applyFilter(){
  const term = q.value.trim().toLowerCase();
  currentQuery = term;
  let list = apps;
  if (term){
    // Match against slug, title, description (case-insensitive)
    list = list.filter(a =>
      a.slug.toLowerCase().includes(term) ||
      a.title.toLowerCase().includes(term) ||
      (a.description || '').toLowerCase().includes(term)
    );
    // Promote name/title hits over description-only hits
    list.sort((a, b) => scoreApp(b, term) - scoreApp(a, term));
  } else {
    // Use the user's chosen sort order when no query
    list = list.slice();
    if (currentSort === 'recent') list.sort((a, b) => (b.mtime||0) - (a.mtime||0));
    if (currentSort === 'az')     list.sort((a, b) => a.slug.localeCompare(b.slug));
    if (currentSort === 'za')     list.sort((a, b) => b.slug.localeCompare(a.slug));
  }
  if (onlyThumbs){
    list = list.filter(a => !!a.screenshot);
  }
  filtered = list;
  hCount.textContent = filtered.length;
  // Reset rendering window
  renderedCount = 0;
  grid.innerHTML = '';
  renderNextPage();
  // Update URL (don't push history, just replace)
  const newUrl = new URL(window.location.href);
  if (term) newUrl.searchParams.set('q', term); else newUrl.searchParams.delete('q');
  window.history.replaceState(null, '', newUrl);
}

function scoreApp(a, term){
  let s = 0;
  const slug = a.slug.toLowerCase();
  const title = a.title.toLowerCase();
  const desc = (a.description || '').toLowerCase();
  if (slug === term) s += 1000;
  if (slug.startsWith(term)) s += 300;
  if (slug.includes(term))   s += 100;
  if (title.includes(term))  s += 50;
  if (desc.includes(term))   s += 10;
  // tiebreak: more recent gets a small boost
  s += (a.mtime || 0) / 1e13;
  return s;
}

function renderNextPage(){
  const slice = filtered.slice(renderedCount, renderedCount + PAGE_SIZE);
  const frag = document.createDocumentFragment();
  for (const a of slice){
    frag.appendChild(buildCard(a, currentQuery));
  }
  grid.appendChild(frag);
  renderedCount += slice.length;
  if (renderedCount >= filtered.length){
    loadMoreBtn.hidden = true;
    footMeta.textContent = filtered.length === 0
      ? 'no matches — try a different keyword'
      : (filtered.length === 1 ? '1 app shown'
                               : 'all ' + filtered.length + ' shown');
  } else {
    loadMoreBtn.hidden = false;
    footMeta.textContent = renderedCount + ' of ' + filtered.length + ' shown';
  }
}

// === Card builder ===
function buildCard(a, term){
  const card = document.createElement('a');
  card.className = 'card';
  card.href = '/' + a.slug + '/';
  card.target = '_blank';
  card.rel = 'noopener';
  card.setAttribute('aria-label', a.title + ' — open in new tab');

  const thumb = document.createElement('div');
  thumb.className = 'thumb';
  // Always include the colored fallback first; img loads on top if present
  const fb = document.createElement('span');
  fb.className = 'fb';
  fb.textContent = (a.title || a.slug).trim().charAt(0).toUpperCase() || '?';
  thumb.style.background = colorForSlug(a.slug);
  thumb.appendChild(fb);
  if (a.screenshot){
    const img = document.createElement('img');
    img.loading = 'lazy';
    img.alt = '';
    img.src = a.screenshot;
    img.onerror = () => { img.remove(); };
    thumb.appendChild(img);
  }
  card.appendChild(thumb);

  const body = document.createElement('div');
  body.className = 'body';
  const h3 = document.createElement('h3');
  h3.innerHTML = highlight(a.title, term);
  body.appendChild(h3);
  if (a.description){
    const p = document.createElement('p');
    p.className = 'desc';
    p.innerHTML = highlight(a.description, term);
    body.appendChild(p);
  }
  const slug = document.createElement('div');
  slug.className = 'slug';
  slug.innerHTML = '/' + highlight(a.slug, term);
  body.appendChild(slug);
  card.appendChild(body);
  return card;
}

function colorForSlug(slug){
  let h = 0;
  for (let i = 0; i < slug.length; i++) h = (h * 31 + slug.charCodeAt(i)) | 0;
  const hue = ((h % 360) + 360) % 360;
  const sat = 35 + (h % 20);
  return `linear-gradient(135deg, hsl(${hue}, ${sat}%, 72%), hsl(${(hue + 28) % 360}, ${sat}%, 60%))`;
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => (
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
}

function highlight(text, term){
  if (!term) return escapeHtml(text);
  const safe = escapeHtml(text);
  // term is already lowercased in applyFilter; escape regex special chars
  const safeTerm = term.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp('(' + safeTerm + ')', 'ig');
  return safe.replace(re, '<mark>$1</mark>');
}

// === Input wiring ===
let debounceT = 0;
q.addEventListener('input', () => {
  clearBtn.hidden = !q.value;
  if (debounceT) clearTimeout(debounceT);
  debounceT = setTimeout(applyFilter, 60);
});
q.addEventListener('keydown', e => {
  if (e.key === 'Escape' && q.value){
    e.preventDefault();
    q.value = '';
    clearBtn.hidden = true;
    applyFilter();
  }
});
clearBtn.addEventListener('click', () => {
  q.value = ''; clearBtn.hidden = true; q.focus(); applyFilter();
});
sortBtn.addEventListener('click', () => {
  const order = ['recent','az','za'];
  const next = order[(order.indexOf(currentSort) + 1) % order.length];
  currentSort = next;
  sortLabel.textContent = next === 'recent' ? 'RECENT' : (next === 'az' ? 'A → Z' : 'Z → A');
  applyFilter();
});
thumbsOnly.addEventListener('click', () => {
  onlyThumbs = !onlyThumbs;
  thumbsOnly.setAttribute('aria-pressed', onlyThumbs ? 'true' : 'false');
  applyFilter();
});
loadMoreBtn.addEventListener('click', renderNextPage);

// Page-up keyboard convenience: '/' focuses the search box from anywhere
window.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement !== q){
    e.preventDefault();
    q.focus(); q.select();
  }
});

// Infinite scroll fallback — auto-load when user scrolls to the bottom
const sentinel = document.createElement('div');
sentinel.style.height = '1px';
document.querySelector('main').appendChild(sentinel);
const io = new IntersectionObserver(entries => {
  for (const e of entries){
    if (e.isIntersecting && !loadMoreBtn.hidden) renderNextPage();
  }
}, { rootMargin: '600px 0px' });
io.observe(sentinel);
</script>
</body>
</html>
