<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Scientific Calculator</title>
<link rel="icon" href="https://emojicdn.elk.sh/🧮">
<meta property="og:title" content="Scientific Calculator">
<meta property="og:description" content="A proper scientific calculator with trig, logs, and constants.">
<meta property="og:url" content="https://sloppy.live/neon-sci-calc">
<meta property="og:image" content="https://emojicdn.elk.sh/🧮?style=apple&size=512">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{background:#0c0c14}
body{
  min-height:100dvh;background:#0c0c14;
  font-family:'IBM Plex Mono',monospace;
  display:flex;align-items:center;justify-content:center;
  padding:12px;
}

.calc{
  width:100%;max-width:380px;
  background:#111119;
  border:1px solid rgba(0,255,180,0.1);
  border-radius:12px;
  padding:16px;
  box-shadow:0 0 40px rgba(0,255,180,0.03);
}

.display{
  background:#0a0a10;
  border:1px solid rgba(0,255,180,0.08);
  border-radius:8px;
  padding:14px 16px 10px;
  margin-bottom:12px;
  min-height:80px;
  display:flex;flex-direction:column;justify-content:flex-end;align-items:flex-end;
  overflow:hidden;
}
#expr{
  font-size:12px;color:rgba(0,255,180,0.35);
  word-break:break-all;text-align:right;
  min-height:16px;margin-bottom:4px;
}
#result{
  font-size:28px;font-weight:500;color:#0fb;
  text-shadow:0 0 12px rgba(0,255,180,0.2);
  word-break:break-all;text-align:right;
  transition:color .15s;
}
#result.error{color:#f44;text-shadow:0 0 12px rgba(255,68,68,0.2)}

#mode-indicator{
  font-size:9px;color:rgba(0,255,180,0.25);
  text-align:right;margin-bottom:8px;letter-spacing:1px;
}

.btn-grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:5px;
}

.btn{
  font-family:'IBM Plex Mono',monospace;
  font-size:13px;font-weight:400;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06);
  color:rgba(255,255,255,0.6);
  padding:12px 4px;border-radius:6px;
  cursor:pointer;transition:all .1s;
  text-align:center;line-height:1.2;
}
.btn:hover{background:rgba(255,255,255,0.06)}
.btn:active{background:rgba(255,255,255,0.1);transform:scale(0.96)}

.btn.num{color:rgba(255,255,255,0.8);font-weight:500;font-size:15px}
.btn.op{color:#0fb;border-color:rgba(0,255,180,0.12)}
.btn.op:hover{background:rgba(0,255,180,0.06)}
.btn.fn{color:rgba(0,180,255,0.7);font-size:11px}
.btn.fn:hover{background:rgba(0,180,255,0.06)}
.btn.eq{
  background:rgba(0,255,180,0.1);border-color:rgba(0,255,180,0.25);
  color:#0fb;font-size:16px;font-weight:600;
}
.btn.eq:hover{background:rgba(0,255,180,0.18)}
.btn.clear{color:#f66;border-color:rgba(255,102,102,0.15)}
.btn.clear:hover{background:rgba(255,102,102,0.06)}
.btn.mem{color:rgba(255,200,0,0.6);font-size:10px}
.btn.mem:hover{background:rgba(255,200,0,0.06)}

.btn .sub{font-size:8px;display:block;color:rgba(255,255,255,0.2);margin-top:1px}

a</style>
</head>
<body>

<div class="calc">
  <div class="display">
    <div id="expr"></div>
    <div id="result">0</div>
  </div>
  <div id="mode-indicator">RAD</div>
  <div class="btn-grid" id="buttons"></div>
</div>
<script>
(function(){
'use strict';

var exprEl=document.getElementById('expr');
var resultEl=document.getElementById('result');
var modeEl=document.getElementById('mode-indicator');
var grid=document.getElementById('buttons');

var current='0';
var expression='';
var lastResult=null;
var memory=0;
var degMode=false; // false=RAD, true=DEG
var shift=false;

var BUTTONS=[
  {l:'2nd',cls:'fn',act:'shift'},
  {l:'sin',cls:'fn',act:'sin',shift:{l:'sin⁻¹',act:'asin'}},
  {l:'cos',cls:'fn',act:'cos',shift:{l:'cos⁻¹',act:'acos'}},
  {l:'tan',cls:'fn',act:'tan',shift:{l:'tan⁻¹',act:'atan'}},
  {l:'DEG',cls:'fn',act:'deg'},

  {l:'x²',cls:'fn',act:'sq'},
  {l:'√x',cls:'fn',act:'sqrt'},
  {l:'xʸ',cls:'op',act:'^'},
  {l:'log',cls:'fn',act:'log',shift:{l:'10ˣ',act:'pow10'}},
  {l:'ln',cls:'fn',act:'ln',shift:{l:'eˣ',act:'exp'}},

  {l:'(',cls:'op',act:'('},
  {l:')',cls:'op',act:')'},
  {l:'π',cls:'fn',act:'pi'},
  {l:'e',cls:'fn',act:'euler'},
  {l:'C',cls:'clear',act:'clear'},

  {l:'7',cls:'num',act:'7'},
  {l:'8',cls:'num',act:'8'},
  {l:'9',cls:'num',act:'9'},
  {l:'÷',cls:'op',act:'/'},
  {l:'⌫',cls:'clear',act:'back'},

  {l:'4',cls:'num',act:'4'},
  {l:'5',cls:'num',act:'5'},
  {l:'6',cls:'num',act:'6'},
  {l:'×',cls:'op',act:'*'},
  {l:'%',cls:'fn',act:'mod'},

  {l:'1',cls:'num',act:'1'},
  {l:'2',cls:'num',act:'2'},
  {l:'3',cls:'num',act:'3'},
  {l:'−',cls:'op',act:'-'},
  {l:'1/x',cls:'fn',act:'inv'},

  {l:'0',cls:'num',act:'0'},
  {l:'.',cls:'num',act:'.'},
  {l:'±',cls:'fn',act:'neg'},
  {l:'+',cls:'op',act:'+'},
  {l:'=',cls:'eq',act:'='},

  {l:'MC',cls:'mem',act:'mc'},
  {l:'MR',cls:'mem',act:'mr'},
  {l:'M+',cls:'mem',act:'m+'},
  {l:'M−',cls:'mem',act:'m-'},
  {l:'|x|',cls:'fn',act:'abs'},
];

// Build buttons
for(var i=0;i<BUTTONS.length;i++){
  var b=BUTTONS[i];
  var btn=document.createElement('button');
  btn.className='btn '+b.cls;
  btn.textContent=b.l;
  if(b.shift){
    var sub=document.createElement('span');
    sub.className='sub';sub.textContent=b.shift.l;
    btn.appendChild(sub);
  }
  btn.dataset.idx=i;
  btn.addEventListener('click',handleBtn);
  grid.appendChild(btn);
}

function handleBtn(e){
  var idx=parseInt(this.dataset.idx);
  var b=BUTTONS[idx];
  var act=b.act;

  // Shift override
  if(shift&&b.shift){
    act=b.shift.act;
    shift=false;
    updateShift();
  }

  processAction(act);
}

function processAction(act){
  // Numbers and decimal
  if('0123456789'.indexOf(act)>=0){
    if(current==='0'&&act!=='.')current='';
    if(lastResult!==null&&expression===''){current='';lastResult=null}
    current+=act;
    updateDisplay();
    return;
  }
  if(act==='.'){
    if(current.indexOf('.')<0)current+='.';
    updateDisplay();return;
  }

  // Operators
  if('+-*/^'.indexOf(act)>=0){
    if(lastResult!==null){expression=formatNum(lastResult);lastResult=null}
    else if(current){expression+=current}
    expression+=' '+getOpSymbol(act)+' ';
    current='';
    updateDisplay();return;
  }

  if(act==='('){expression+='(';current='';updateDisplay();return}
  if(act===')'){
    if(current)expression+=current;
    expression+=')';current='';updateDisplay();return;
  }

  // Functions
  if(act==='sin'||act==='cos'||act==='tan'){
    var v=parseFloat(current)||0;
    if(degMode)v=v*Math.PI/180;
    if(act==='sin')current=formatNum(Math.sin(v));
    if(act==='cos')current=formatNum(Math.cos(v));
    if(act==='tan')current=formatNum(Math.tan(v));
    updateDisplay();return;
  }
  if(act==='asin'||act==='acos'||act==='atan'){
    var v=parseFloat(current)||0;
    var r;
    if(act==='asin')r=Math.asin(v);
    if(act==='acos')r=Math.acos(v);
    if(act==='atan')r=Math.atan(v);
    if(degMode)r=r*180/Math.PI;
    current=formatNum(r);
    updateDisplay();return;
  }
  if(act==='sq'){var v=parseFloat(current)||0;current=formatNum(v*v);updateDisplay();return}
  if(act==='sqrt'){var v=parseFloat(current)||0;current=formatNum(Math.sqrt(v));updateDisplay();return}
  if(act==='log'){var v=parseFloat(current)||0;current=formatNum(Math.log10(v));updateDisplay();return}
  if(act==='ln'){var v=parseFloat(current)||0;current=formatNum(Math.log(v));updateDisplay();return}
  if(act==='pow10'){var v=parseFloat(current)||0;current=formatNum(Math.pow(10,v));updateDisplay();return}
  if(act==='exp'){var v=parseFloat(current)||0;current=formatNum(Math.exp(v));updateDisplay();return}
  if(act==='inv'){var v=parseFloat(current)||0;current=v!==0?formatNum(1/v):'Error';updateDisplay();return}
  if(act==='neg'){
    if(current.charAt(0)==='-')current=current.slice(1);
    else if(current!=='0')current='-'+current;
    updateDisplay();return;
  }
  if(act==='abs'){var v=parseFloat(current)||0;current=formatNum(Math.abs(v));updateDisplay();return}
  if(act==='mod'){
    if(current)expression+=current;
    expression+=' % ';current='';updateDisplay();return;
  }

  // Constants
  if(act==='pi'){current=formatNum(Math.PI);updateDisplay();return}
  if(act==='euler'){current=formatNum(Math.E);updateDisplay();return}

  // Mode
  if(act==='deg'){degMode=!degMode;modeEl.textContent=degMode?'DEG':'RAD';return}
  if(act==='shift'){shift=!shift;updateShift();return}

  // Memory
  if(act==='mc'){memory=0;return}
  if(act==='mr'){current=formatNum(memory);updateDisplay();return}
  if(act==='m+'){memory+=parseFloat(current)||0;return}
  if(act==='m-'){memory-=parseFloat(current)||0;return}

  // Clear
  if(act==='clear'){current='0';expression='';lastResult=null;updateDisplay();return}
  if(act==='back'){
    if(current.length>1)current=current.slice(0,-1);
    else current='0';
    updateDisplay();return;
  }

  // Equals
  if(act==='='){
    var full=expression+(current||'0');
    try{
      var safe=full
        .replace(/×/g,'*').replace(/÷/g,'/').replace(/−/g,'-')
        .replace(/\^/g,'**');
      // Validate — only allow safe math chars
      if(/[^0-9+\-*/().%e **]/.test(safe.replace(/\s/g,''))){
        throw new Error('Invalid');
      }
      var r=Function('"use strict";return('+safe+')')();
      if(typeof r!=='number'||!isFinite(r)){
        resultEl.textContent=isNaN(r)?'NaN':'∞';
        resultEl.classList.add('error');
      }else{
        lastResult=r;
        expression='';
        current=formatNum(r);
        resultEl.classList.remove('error');
      }
    }catch(e){
      resultEl.textContent='Error';
      resultEl.classList.add('error');
      current='0';expression='';
    }
    exprEl.textContent=full+' =';
    resultEl.textContent=current;
    return;
  }
}

function getOpSymbol(op){
  if(op==='*')return'×';if(op==='/')return'÷';if(op==='-')return'−';
  return op;
}

function formatNum(n){
  if(typeof n!=='number'||isNaN(n))return'NaN';
  if(!isFinite(n))return'∞';
  // Avoid floating point noise
  var s=parseFloat(n.toPrecision(12));
  var str=String(s);
  if(str.length>14)str=s.toExponential(8);
  return str;
}

function updateDisplay(){
  exprEl.textContent=expression;
  resultEl.textContent=current||'0';
  resultEl.classList.remove('error');
}

function updateShift(){
  var btns=grid.querySelectorAll('.btn');
  // Just toggle visual — the 2nd button
  btns[0].style.background=shift?'rgba(0,180,255,0.15)':'';
  btns[0].style.borderColor=shift?'rgba(0,180,255,0.4)':'';
}

// Keyboard support
document.addEventListener('keydown',function(e){
  var k=e.key;
  if('0123456789'.indexOf(k)>=0){processAction(k);e.preventDefault();return}
  if(k==='.')processAction('.');
  if(k==='+')processAction('+');
  if(k==='-')processAction('-');
  if(k==='*')processAction('*');
  if(k==='/')processAction('/');
  if(k==='%')processAction('mod');
  if(k==='('||k===')')processAction(k);
  if(k==='^')processAction('^');
  if(k==='Enter'||k==='='){processAction('=');e.preventDefault()}
  if(k==='Backspace')processAction('back');
  if(k==='Escape')processAction('clear');
});

updateDisplay();

})();
</script>
<script src="/sloppy-header/sloppy-bar.js"></script>
</body>
</html>
