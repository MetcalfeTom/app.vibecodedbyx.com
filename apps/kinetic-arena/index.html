<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Kinetic Arena · Zero-G Neon Smash</title>
<meta name="description" content="A zero-gravity playground of glowing neon blocks. Drag, fling, detonate. Every collision is a tiny supernova." />
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%92%A5" />
<meta property="og:title" content="Kinetic Arena" />
<meta property="og:description" content="Zero gravity. Neon blocks. Explosive collisions. Drag to fling, click to detonate, space for chaos." />
<meta property="og:url" content="https://sloppy.live/kinetic-arena/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/zero%20gravity%20neon%20glowing%20cubes%20cyan%20magenta%20yellow%20colliding%20explosion%20sparks%20dark%20void%20synthwave?width=1200&height=630&nologo=true" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Audiowide&family=Space+Mono:wght@400;700&family=Orbitron:wght@500;800&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#05030f;
  --void:#0a0820;
  --pink:#ff2bd6;
  --cyan:#00f0ff;
  --yellow:#fff04b;
  --green:#5dffb3;
  --violet:#b86bff;
  --orange:#ff8a3d;
  --bone:#fbf2dc;
  --dim:rgba(251,242,220,0.45);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--bone);font-family:'Space Mono',monospace}
body{
  background:
    radial-gradient(ellipse at 18% 12%, rgba(255,43,214,0.16), transparent 55%),
    radial-gradient(ellipse at 82% 88%, rgba(0,240,255,0.14), transparent 55%),
    radial-gradient(ellipse at 50% 50%, rgba(184,107,255,0.08), transparent 65%),
    linear-gradient(180deg, var(--bg) 0%, var(--void) 100%);
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:1;
  background:repeating-linear-gradient(0deg, rgba(255,255,255,0.018) 0 1px, transparent 1px 3px);
  mix-blend-mode:screen;
}
#canvas{position:fixed;inset:0;z-index:2;cursor:crosshair;touch-action:none}
.ui{position:fixed;z-index:5;color:var(--bone);pointer-events:none}
.title{
  top:14px;left:18px;
  font-family:'Audiowide',sans-serif;
  font-size:clamp(22px, 3.2vw, 34px);
  letter-spacing:0.18em;
  text-shadow:0 0 18px rgba(255,43,214,0.6), 0 0 36px rgba(0,240,255,0.35), 2px 2px 0 #000;
  line-height:1;
}
.title .a{color:var(--pink)}
.title .b{color:var(--cyan)}
.title .c{color:var(--yellow)}
.tagline{
  position:fixed;top:50px;left:18px;z-index:5;
  font-family:'Major Mono Display',monospace;
  font-size:11px;letter-spacing:0.42em;
  color:var(--dim);
  pointer-events:none;
}
.hud{
  position:fixed;top:14px;right:14px;z-index:5;
  display:flex;flex-direction:column;gap:6px;
  font-family:'Orbitron',sans-serif;font-size:11px;letter-spacing:0.22em;
  text-align:right;
  text-shadow:0 0 6px rgba(0,0,0,0.8);
}
.hud .row{display:flex;gap:6px;justify-content:flex-end;align-items:baseline}
.hud .lbl{color:var(--dim);font-size:9px}
.hud .val{font-family:'Major Mono Display',monospace;font-size:14px;color:var(--cyan);min-width:42px;text-align:right}
.hud .val.ke{color:var(--pink)}
.hud .val.ex{color:var(--yellow)}
.toolbar{
  position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:6;
  display:flex;gap:6px;
  background:rgba(8,4,22,0.65);
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
  border:1px solid rgba(184,107,255,0.35);
  padding:6px;border-radius:2px;
  box-shadow:0 0 24px rgba(184,107,255,0.18), inset 0 0 18px rgba(0,240,255,0.08);
}
.tb{
  background:transparent;border:1px solid rgba(255,255,255,0.16);
  color:var(--bone);
  font-family:'Audiowide',sans-serif;font-size:11px;letter-spacing:0.2em;
  padding:8px 14px;cursor:pointer;border-radius:1px;
  transition:all 0.12s ease;
  min-width:64px;
}
.tb:hover{background:rgba(255,43,214,0.18);border-color:var(--pink);box-shadow:0 0 14px rgba(255,43,214,0.3)}
.tb.boom:hover{background:rgba(255,240,75,0.16);border-color:var(--yellow);box-shadow:0 0 14px rgba(255,240,75,0.4);color:var(--yellow)}
.tb.spawn:hover{border-color:var(--cyan);box-shadow:0 0 14px rgba(0,240,255,0.4);color:var(--cyan)}
.tb.reset:hover{border-color:var(--violet);color:var(--violet)}
.tb.hole:hover{border-color:var(--violet);color:var(--violet);box-shadow:0 0 14px rgba(184,107,255,0.45)}
.tb.hole.on{background:rgba(184,107,255,0.18);border-color:var(--violet);color:var(--violet);box-shadow:0 0 18px rgba(184,107,255,0.55), inset 0 0 10px rgba(184,107,255,0.25)}
.tb .k{color:var(--dim);font-size:9px;display:block;margin-top:2px}
.kbd{
  position:fixed;bottom:14px;right:14px;z-index:5;
  font-family:'Space Mono',monospace;font-size:10px;letter-spacing:0.04em;
  color:var(--dim);text-align:right;line-height:1.6;
  pointer-events:none;
  text-shadow:0 0 4px rgba(0,0,0,0.8);
}
.kbd b{color:var(--cyan);font-weight:700}
.muted{
  position:fixed;bottom:14px;left:14px;z-index:5;
  background:transparent;border:1px solid rgba(255,255,255,0.18);
  color:var(--dim);font-family:'Audiowide',sans-serif;font-size:10px;letter-spacing:0.18em;
  padding:6px 10px;cursor:pointer;border-radius:1px;
}
.muted:hover{color:var(--bone);border-color:var(--cyan)}
.intro{
  position:fixed;left:50%;top:46%;transform:translateX(-50%);z-index:7;
  font-family:'Major Mono Display',monospace;
  letter-spacing:0.36em;font-size:13px;color:var(--bone);
  text-shadow:0 0 12px rgba(0,240,255,0.6);
  text-align:center;pointer-events:none;
  opacity:0.8;animation:fadeIntro 9s ease-out forwards;
}
@keyframes fadeIntro{
  0%{opacity:0;letter-spacing:0.6em}
  18%{opacity:0.9;letter-spacing:0.36em}
  82%{opacity:0.9}
  100%{opacity:0;transform:translateX(-50%) translateY(-10px)}
}
@media (max-width:520px){
  .toolbar{padding:5px;gap:4px}
  .tb{padding:8px 10px;min-width:48px;font-size:10px;letter-spacing:0.12em}
  .kbd{display:none}
  .tagline{display:none}
  .hud{font-size:10px}
}
</style>
</head>
<body>
<canvas id="canvas"></canvas>

<div class="ui title"><span class="a">KINETIC</span> <span class="b">ARENA</span></div>
<div class="tagline">ZERO · G · DETONATION · LAB</div>

<div class="hud">
  <div class="row"><span class="lbl">BLOCKS</span><span class="val" id="hCount">0</span></div>
  <div class="row"><span class="lbl">KIN·E</span><span class="val ke" id="hKE">0</span></div>
  <div class="row"><span class="lbl">BOOMS</span><span class="val ex" id="hEx">0</span></div>
  <div class="row"><span class="lbl">FPS</span><span class="val" id="hFps">0</span></div>
</div>

<div class="toolbar">
  <button class="tb spawn" id="bSpawn">+5 BLOCKS<span class="k">N</span></button>
  <button class="tb boom" id="bBoom">CHAOS<span class="k">SPACE</span></button>
  <button class="tb" id="bGrav">ZERO·G<span class="k">G</span></button>
  <button class="tb hole" id="bHole">BLACK HOLE<span class="k">B</span></button>
  <button class="tb reset" id="bReset">RESET<span class="k">R</span></button>
</div>

<button class="muted" id="bMute">♪ ON</button>
<div class="kbd">
  drag <b>·</b> fling block &nbsp;&nbsp; click empty <b>·</b> detonate<br>
  <b>SPACE</b> chaos &nbsp; <b>N</b> +5 &nbsp; <b>G</b> grav &nbsp; <b>B</b> black hole &nbsp; <b>R</b> reset &nbsp; <b>M</b> mute
</div>
<div class="intro" id="intro">DRAG · FLING · DETONATE</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
(() => {
  const { Engine, World, Bodies, Body, Composite, Mouse, MouseConstraint, Events, Vector } = Matter;

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
  let W = window.innerWidth, H = window.innerHeight;

  function resize() {
    W = window.innerWidth; H = window.innerHeight;
    canvas.width = W * dpr; canvas.height = H * dpr;
    canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    rebuildWalls();
  }
  window.addEventListener('resize', resize);

  // === engine ===
  const engine = Engine.create();
  engine.gravity.x = 0; engine.gravity.y = 0;
  engine.positionIterations = 8;
  engine.velocityIterations = 8;

  let walls = [];
  function rebuildWalls() {
    if (walls.length) Composite.remove(engine.world, walls);
    const t = 200; // thick offscreen walls
    walls = [
      Bodies.rectangle(W/2, -t/2, W + t*2, t, { isStatic:true, restitution:0.96, friction:0, label:'wall' }),
      Bodies.rectangle(W/2, H + t/2, W + t*2, t, { isStatic:true, restitution:0.96, friction:0, label:'wall' }),
      Bodies.rectangle(-t/2, H/2, t, H + t*2, { isStatic:true, restitution:0.96, friction:0, label:'wall' }),
      Bodies.rectangle(W + t/2, H/2, t, H + t*2, { isStatic:true, restitution:0.96, friction:0, label:'wall' }),
    ];
    Composite.add(engine.world, walls);
  }

  const COLORS = ['#ff2bd6', '#00f0ff', '#fff04b', '#5dffb3', '#b86bff', '#ff8a3d'];

  function pickColor(){ return COLORS[Math.floor(Math.random()*COLORS.length)]; }

  function spawnBlock(x, y, size) {
    size = size || 24 + Math.random() * 44;
    const body = Bodies.rectangle(x, y, size, size, {
      restitution: 0.92,
      friction: 0,
      frictionAir: 0.0006, // tiny drag so chaos eventually calms
      density: 0.001,
      label: 'block',
    });
    body.colorIdx = Math.floor(Math.random() * COLORS.length);
    body.color = COLORS[body.colorIdx];
    body.glow = 0;
    body.spawn = performance.now();
    Body.setVelocity(body, { x: (Math.random()-0.5) * 5, y: (Math.random()-0.5) * 5 });
    Body.setAngularVelocity(body, (Math.random()-0.5) * 0.2);
    Composite.add(engine.world, body);
    return body;
  }

  function spawnMany(n, opts) {
    for (let i = 0; i < n; i++) {
      spawnBlock(
        opts && opts.x != null ? opts.x : 60 + Math.random() * (W - 120),
        opts && opts.y != null ? opts.y : 60 + Math.random() * (H - 120)
      );
    }
  }

  // === detonation impulses ===
  function detonate(x, y, power) {
    power = power || 0.18;
    const radius = 200;
    Composite.allBodies(engine.world).forEach(b => {
      if (b.label !== 'block' || b.isStatic) return;
      const dx = b.position.x - x, dy = b.position.y - y;
      const d = Math.hypot(dx, dy) || 0.01;
      if (d > radius) return;
      const fall = (1 - d / radius);
      const force = power * fall * b.mass;
      Body.applyForce(b, b.position, { x: (dx / d) * force, y: (dy / d) * force });
      Body.setAngularVelocity(b, b.angularVelocity + (Math.random()-0.5) * 0.6);
      b.glow = Math.min(1.5, (b.glow || 0) + 0.8);
    });
    spawnExplosion(x, y, power * 60);
    boomSfx(power);
    addShake(power * 8);
    boomCount++;
  }

  function chaosBurst() {
    Composite.allBodies(engine.world).forEach(b => {
      if (b.label !== 'block') return;
      const ang = Math.random() * Math.PI * 2;
      const mag = 0.04 + Math.random() * 0.08;
      Body.applyForce(b, b.position, { x: Math.cos(ang) * mag * b.mass, y: Math.sin(ang) * mag * b.mass });
      Body.setAngularVelocity(b, (Math.random()-0.5) * 1.2);
      b.glow = Math.min(2, (b.glow || 0) + 1.4);
    });
    chaosSfx();
    addShake(14);
    spawnExplosion(W/2, H/2, 60);
  }

  // === particles + shockwaves ===
  const particles = [];
  const shocks = [];
  function spawnExplosion(x, y, intensity) {
    const n = Math.min(70, Math.floor(intensity * 1.4));
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 80 + Math.random() * intensity * 8;
      particles.push({
        x, y,
        vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
        life: 0.6 + Math.random() * 0.7,
        max:  0.6 + Math.random() * 0.7,
        color: Math.random() < 0.5 ? '#fff04b' : (Math.random() < 0.5 ? '#ff2bd6' : '#00f0ff'),
        r: 1 + Math.random() * 3,
      });
    }
    shocks.push({ x, y, r: 0, max: 50 + intensity * 4, life: 0.55 });
  }

  function tickFx(dt) {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.vx *= Math.pow(0.94, dt * 60);
      p.vy *= Math.pow(0.94, dt * 60);
      p.life -= dt;
      if (p.life <= 0) particles.splice(i, 1);
    }
    for (let i = shocks.length - 1; i >= 0; i--) {
      const s = shocks[i];
      s.r += (s.max - s.r) * Math.min(1, dt * 8);
      s.life -= dt;
      if (s.life <= 0) shocks.splice(i, 1);
    }
  }

  // === collisions ===
  let boomCount = 0;
  Events.on(engine, 'collisionStart', (ev) => {
    for (const pair of ev.pairs) {
      const a = pair.bodyA, b = pair.bodyB;
      const va = a.velocity, vb = b.velocity;
      const rv = { x: vb.x - va.x, y: vb.y - va.y };
      const speed = Math.hypot(rv.x, rv.y);
      if (a.label === 'block') a.glow = Math.min(2, (a.glow || 0) + speed * 0.04);
      if (b.label === 'block') b.glow = Math.min(2, (b.glow || 0) + speed * 0.04);
      // small spark always
      if (speed > 1.5) {
        const cx = (a.position.x + b.position.x) / 2;
        const cy = (a.position.y + b.position.y) / 2;
        const c1 = a.color || '#ffffff', c2 = b.color || '#ffffff';
        sparkAt(cx, cy, Math.min(20, speed * 1.8), c1, c2);
        clinkSfx(Math.min(1, speed / 30));
      }
      if (speed > 12) {
        const cx = (a.position.x + b.position.x) / 2;
        const cy = (a.position.y + b.position.y) / 2;
        spawnExplosion(cx, cy, Math.min(40, speed * 1.2));
        addShake(Math.min(10, speed * 0.4));
        crashSfx(speed);
        boomCount++;
      }
    }
  });

  function sparkAt(x, y, n, c1, c2) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 30 + Math.random() * 160;
      particles.push({
        x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp,
        life: 0.25 + Math.random() * 0.3, max: 0.5,
        color: Math.random() < 0.5 ? c1 : c2,
        r: 0.8 + Math.random() * 1.6,
      });
    }
  }

  // === shake ===
  let shake = 0;
  function addShake(amt) { shake = Math.min(28, shake + amt); }

  // === black hole ===
  let blackHole = false;
  let bhSpinPhase = 0;
  const BH_R = 26;            // event horizon radius
  const BH_PULL_R = 600;      // gravitational reach
  const BH_STRENGTH = 4200;   // tuned for 0.001-density blocks at this scale
  function applyBlackHole(dt) {
    if (!blackHole) return;
    const cx = W / 2, cy = H / 2;
    const eaten = [];
    Composite.allBodies(engine.world).forEach(b => {
      if (b.label !== 'block' || b.isStatic) return;
      const dx = cx - b.position.x, dy = cy - b.position.y;
      const d2 = dx*dx + dy*dy;
      const d = Math.sqrt(d2) || 0.01;
      // event-horizon swallow
      if (d < BH_R + 4) {
        eaten.push(b);
        return;
      }
      if (d > BH_PULL_R) return;
      // 1/d softened-gravity, capped
      const f = Math.min(0.06, BH_STRENGTH / (d2 + 4000)) * b.mass;
      Body.applyForce(b, b.position, { x: (dx / d) * f, y: (dy / d) * f });
      // tangential swirl so things spiral instead of plummeting straight in
      const tangent = { x: -dy / d, y: dx / d };
      const swirl = Math.min(0.012, 30 / d) * b.mass;
      Body.applyForce(b, b.position, { x: tangent.x * swirl, y: tangent.y * swirl });
      // glow ramps up near the horizon
      const proximity = 1 - Math.min(1, d / BH_PULL_R);
      b.glow = Math.max(b.glow || 0, proximity * 1.4);
    });
    if (eaten.length) {
      eaten.forEach(b => {
        Composite.remove(engine.world, b);
        spawnExplosion(cx, cy, 14);
        consumeSfx();
      });
      addShake(eaten.length * 1.5);
    }
  }
  function drawBlackHole() {
    if (!blackHole) return;
    const cx = W / 2, cy = H / 2;
    bhSpinPhase += 0.04;
    // accretion swirl
    ctx.save();
    ctx.translate(cx, cy);
    ctx.globalCompositeOperation = 'lighter';
    for (let ring = 0; ring < 3; ring++) {
      const ringR = BH_R + 14 + ring * 14;
      const segs = 36;
      for (let i = 0; i < segs; i++) {
        const a = (i / segs) * Math.PI * 2 + bhSpinPhase * (1 + ring * 0.5);
        const a2 = a + (Math.PI * 2) / segs * 0.7;
        const hue = (i * 8 + ring * 60 + bhSpinPhase * 30) % 360;
        ctx.strokeStyle = `hsla(${280 + Math.sin(a*2)*30}, 92%, 64%, ${0.45 - ring * 0.1})`;
        ctx.lineWidth = 2.4 - ring * 0.4;
        ctx.shadowColor = '#b86bff';
        ctx.shadowBlur = 22 - ring * 4;
        ctx.beginPath();
        ctx.arc(0, 0, ringR, a, a2);
        ctx.stroke();
      }
    }
    ctx.shadowBlur = 0;
    // pull-radius hint
    ctx.globalCompositeOperation = 'source-over';
    const grad = ctx.createRadialGradient(0, 0, BH_R, 0, 0, BH_PULL_R);
    grad.addColorStop(0, 'rgba(184,107,255,0.18)');
    grad.addColorStop(1, 'rgba(184,107,255,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, BH_PULL_R, 0, Math.PI * 2);
    ctx.fill();
    // event horizon — pure black with violet rim
    ctx.shadowColor = '#b86bff';
    ctx.shadowBlur = 36;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(0, 0, BH_R, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(184,107,255,0.85)';
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.arc(0, 0, BH_R, 0, Math.PI * 2);
    ctx.stroke();
    // photon ring shimmer
    ctx.strokeStyle = `rgba(0,240,255,${0.4 + Math.sin(bhSpinPhase * 4) * 0.2})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(0, 0, BH_R + 4, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
  }
  function consumeSfx() {
    if (muted) return;
    const ac = audio();
    const t = ac.currentTime;
    const o = ac.createOscillator(); o.type = 'sine';
    o.frequency.setValueAtTime(420, t);
    o.frequency.exponentialRampToValueAtTime(40, t + 0.4);
    const g = ac.createGain();
    g.gain.setValueAtTime(0.001, t);
    g.gain.exponentialRampToValueAtTime(0.18, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.42);
    o.connect(g); g.connect(master);
    o.start(t); o.stop(t + 0.44);
  }
  function toggleBlackHole() {
    blackHole = !blackHole;
    const btn = document.getElementById('bHole');
    btn.classList.toggle('on', blackHole);
    btn.firstChild.textContent = blackHole ? 'BH ACTIVE' : 'BLACK HOLE';
    if (blackHole) addShake(8);
  }

  // === audio ===
  let audioCtx = null, master = null, muted = false;
  function audio() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      master = audioCtx.createGain();
      master.gain.value = 0.4;
      master.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  function clinkSfx(intensity) {
    if (muted) return;
    const ac = audio();
    const t = ac.currentTime;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = 'triangle';
    const f = 380 + Math.random() * 540 + intensity * 600;
    o.frequency.setValueAtTime(f, t);
    o.frequency.exponentialRampToValueAtTime(Math.max(80, f * 0.4), t + 0.12);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.05 + intensity * 0.18, t + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.16);
    o.connect(g); g.connect(master);
    o.start(t); o.stop(t + 0.18);
  }
  function crashSfx(speed) {
    if (muted) return;
    const ac = audio();
    const t = ac.currentTime;
    // noise burst
    const buf = ac.createBuffer(1, ac.sampleRate * 0.32, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/d.length, 1.6);
    const src = ac.createBufferSource(); src.buffer = buf;
    const bp = ac.createBiquadFilter(); bp.type = 'bandpass';
    bp.frequency.setValueAtTime(1800, t); bp.frequency.exponentialRampToValueAtTime(420, t + 0.3); bp.Q.value = 1.4;
    const ng = ac.createGain();
    ng.gain.setValueAtTime(0.3, t); ng.gain.exponentialRampToValueAtTime(0.0001, t + 0.32);
    src.connect(bp); bp.connect(ng); ng.connect(master);
    src.start(t);
    // sub thump
    const o = ac.createOscillator(); o.type = 'sawtooth';
    o.frequency.setValueAtTime(140, t);
    o.frequency.exponentialRampToValueAtTime(36, t + 0.22);
    const g = ac.createGain();
    g.gain.setValueAtTime(0.001, t);
    g.gain.exponentialRampToValueAtTime(0.18 + Math.min(0.18, speed * 0.005), t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.32);
    o.connect(g); g.connect(master);
    o.start(t); o.stop(t + 0.34);
  }
  function boomSfx(power) {
    if (muted) return;
    const ac = audio();
    const t = ac.currentTime;
    // big noise
    const buf = ac.createBuffer(1, ac.sampleRate * 0.6, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/d.length, 1.2);
    const src = ac.createBufferSource(); src.buffer = buf;
    const lp = ac.createBiquadFilter(); lp.type = 'lowpass';
    lp.frequency.setValueAtTime(2400, t); lp.frequency.exponentialRampToValueAtTime(180, t + 0.55); lp.Q.value = 1.0;
    const ng = ac.createGain();
    ng.gain.setValueAtTime(0.45, t); ng.gain.exponentialRampToValueAtTime(0.0001, t + 0.6);
    src.connect(lp); lp.connect(ng); ng.connect(master);
    src.start(t);
    // sub
    const o = ac.createOscillator(); o.type = 'sine';
    o.frequency.setValueAtTime(120, t);
    o.frequency.exponentialRampToValueAtTime(28, t + 0.5);
    const g = ac.createGain();
    g.gain.setValueAtTime(0.001, t);
    g.gain.exponentialRampToValueAtTime(0.5, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.55);
    o.connect(g); g.connect(master);
    o.start(t); o.stop(t + 0.6);
  }
  function chaosSfx() {
    if (muted) return;
    const ac = audio();
    const t = ac.currentTime;
    [220, 330, 440, 660, 880, 1100].forEach((f, i) => {
      const o = ac.createOscillator(); o.type = 'square';
      o.frequency.setValueAtTime(f, t + i * 0.02);
      const g = ac.createGain();
      g.gain.setValueAtTime(0.001, t + i * 0.02);
      g.gain.exponentialRampToValueAtTime(0.06, t + 0.005 + i * 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.4);
      o.connect(g); g.connect(master);
      o.start(t + i * 0.02); o.stop(t + 0.42);
    });
    boomSfx(0.4);
  }

  // === render ===
  let lastTime = performance.now();
  let fps = 60, fpsAcc = 0, fpsCount = 0, fpsLast = lastTime;

  const hCount = document.getElementById('hCount');
  const hKE = document.getElementById('hKE');
  const hEx = document.getElementById('hEx');
  const hFps = document.getElementById('hFps');

  function render(now) {
    const dt = Math.min(0.05, (now - lastTime) / 1000);
    lastTime = now;
    fpsAcc += 1; fpsCount++;
    if (now - fpsLast > 500) {
      fps = Math.round(fpsAcc / ((now - fpsLast) / 1000));
      fpsAcc = 0; fpsLast = now;
      hFps.textContent = fps;
    }
    applyBlackHole(dt);
    Engine.update(engine, dt * 1000);
    tickFx(dt);
    // motion trail wash
    ctx.fillStyle = 'rgba(5,3,15,0.22)';
    ctx.fillRect(0, 0, W, H);
    ctx.save();
    if (shake > 0.1) {
      ctx.translate((Math.random()-0.5) * shake, (Math.random()-0.5) * shake);
      shake *= Math.pow(0.86, dt * 60);
    }
    // shockwaves
    ctx.globalCompositeOperation = 'lighter';
    for (const s of shocks) {
      const a = Math.max(0, s.life / 0.55);
      ctx.strokeStyle = `rgba(255,200,255,${a * 0.7})`;
      ctx.lineWidth = 2.2;
      ctx.shadowColor = '#ff66ee';
      ctx.shadowBlur = 30;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.shadowBlur = 0;
    // particles
    for (const p of particles) {
      const a = Math.max(0, p.life / p.max);
      ctx.globalAlpha = a;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
    ctx.globalCompositeOperation = 'source-over';
    // blocks
    let totalKE = 0;
    let blockCount = 0;
    for (const b of Composite.allBodies(engine.world)) {
      if (b.label !== 'block') continue;
      blockCount++;
      const v2 = b.velocity.x * b.velocity.x + b.velocity.y * b.velocity.y;
      totalKE += 0.5 * b.mass * v2;
      b.glow = (b.glow || 0) * Math.pow(0.94, dt * 60);
      const v = b.vertices;
      ctx.save();
      const glowPx = 14 + b.glow * 32;
      ctx.shadowColor = b.color;
      ctx.shadowBlur = glowPx;
      ctx.fillStyle = b.color + '24';
      ctx.strokeStyle = b.color;
      ctx.lineWidth = 2.2;
      ctx.beginPath();
      ctx.moveTo(v[0].x, v[0].y);
      for (let i = 1; i < v.length; i++) ctx.lineTo(v[i].x, v[i].y);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      // inner cross-hatch
      ctx.shadowBlur = 0;
      ctx.strokeStyle = b.color + '70';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(v[0].x, v[0].y); ctx.lineTo(v[2].x, v[2].y);
      ctx.moveTo(v[1].x, v[1].y); ctx.lineTo(v[3].x, v[3].y);
      ctx.stroke();
      ctx.restore();
    }
    drawBlackHole();
    ctx.restore();
    hCount.textContent = blockCount;
    hKE.textContent = Math.round(totalKE).toLocaleString();
    hEx.textContent = boomCount;
    requestAnimationFrame(render);
  }

  // === input: mouse + drag ===
  const mouse = Mouse.create(canvas);
  // matter.js Mouse uses pageX/Y vs offsetX/Y; with dpr we need correction... canvas has CSS w/h matching W/H so it's fine
  const mc = MouseConstraint.create(engine, {
    mouse,
    constraint: { stiffness: 0.16, render: { visible: false } },
  });
  Composite.add(engine.world, mc);

  // suppress matter's default wheel zoom on canvas
  canvas.addEventListener('wheel', (e) => e.preventDefault(), { passive: false });

  // detect "click on empty space" (no body grabbed) → detonate
  let downAt = null, downBody = null;
  canvas.addEventListener('pointerdown', (e) => {
    audio();
    downAt = { x: e.clientX, y: e.clientY, t: performance.now() };
    downBody = mc.body || null;
  });
  canvas.addEventListener('pointerup', (e) => {
    if (!downAt) return;
    const dx = e.clientX - downAt.x, dy = e.clientY - downAt.y;
    const dist = Math.hypot(dx, dy);
    const dur = performance.now() - downAt.t;
    if (!downBody && !mc.body && dist < 6 && dur < 280) {
      detonate(e.clientX, e.clientY, 0.22);
    }
    downAt = null; downBody = null;
  });
  canvas.addEventListener('pointercancel', () => { downAt = null; downBody = null; });

  // === keyboard ===
  let zeroG = true;
  window.addEventListener('keydown', (e) => {
    if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
    if (e.code === 'Space') { e.preventDefault(); chaosBurst(); }
    else if (e.key === 'r' || e.key === 'R') reset();
    else if (e.key === 'n' || e.key === 'N') spawnMany(5);
    else if (e.key === 'g' || e.key === 'G') toggleGrav();
    else if (e.key === 'm' || e.key === 'M') toggleMute();
    else if (e.key === 'b' || e.key === 'B') toggleBlackHole();
  });

  function toggleGrav() {
    zeroG = !zeroG;
    engine.gravity.y = zeroG ? 0 : 1;
    document.getElementById('bGrav').textContent = zeroG ? 'ZERO·G' : 'GRAV·1';
    const k = document.createElement('span'); k.className = 'k'; k.textContent = 'G';
    document.getElementById('bGrav').appendChild(k);
  }
  function reset() {
    Composite.allBodies(engine.world).forEach(b => {
      if (b.label === 'block') Composite.remove(engine.world, b);
    });
    particles.length = 0; shocks.length = 0; boomCount = 0; shake = 0;
    spawnMany(28);
  }
  function toggleMute() {
    muted = !muted;
    document.getElementById('bMute').textContent = muted ? '♪ OFF' : '♪ ON';
  }

  document.getElementById('bSpawn').onclick = () => { audio(); spawnMany(5); };
  document.getElementById('bBoom').onclick = () => { audio(); chaosBurst(); };
  document.getElementById('bReset').onclick = () => { audio(); reset(); };
  document.getElementById('bGrav').onclick = () => { audio(); toggleGrav(); };
  document.getElementById('bMute').onclick = () => { audio(); toggleMute(); };
  document.getElementById('bHole').onclick = () => { audio(); toggleBlackHole(); };

  // hide intro after fade
  setTimeout(() => { const i = document.getElementById('intro'); if (i) i.style.display = 'none'; }, 9200);

  // === boot ===
  resize();
  spawnMany(28);
  requestAnimationFrame(render);
})();
</script>
</body>
</html>
