<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Journey</title>
<link rel="icon" href="https://emojicdn.elk.sh/🌌">
<meta property="og:title" content="Neon Journey">
<meta property="og:description" content="Generate stunning AI images with a neon synthwave interface.">
<meta property="og:url" content="https://sloppy.live/neon-journey">
<meta property="og:image" content="https://sloppy.live/neon-journey/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--neon-pink:#ff2d95;--neon-cyan:#00f0ff;--neon-purple:#b347ea;--neon-blue:#4361ee;--dark:#06060f;--card:#0c0c1a;--border:#1a1a35}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--dark);color:#e0e0f0;font-family:'Rajdhani',sans-serif;min-height:100vh;overflow-x:hidden}

/* Grid background */
body::before{content:'';position:fixed;inset:0;background:
  linear-gradient(transparent 0%, rgba(6,6,15,0.8) 50%, var(--dark) 100%),
  linear-gradient(90deg, rgba(67,97,238,0.06) 1px, transparent 1px),
  linear-gradient(rgba(67,97,238,0.06) 1px, transparent 1px);
  background-size:100% 100%, 40px 40px, 40px 40px;
  pointer-events:none;z-index:0}

/* Horizon glow */
body::after{content:'';position:fixed;bottom:0;left:0;right:0;height:40%;background:radial-gradient(ellipse 120% 60% at 50% 100%, rgba(255,45,149,0.08) 0%, rgba(179,71,234,0.04) 40%, transparent 70%);pointer-events:none;z-index:0}

.container{position:relative;z-index:1;max-width:900px;margin:0 auto;padding:20px 16px 80px}

header{text-align:center;padding:40px 0 30px}
header h1{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(28px,6vw,52px);background:linear-gradient(135deg,var(--neon-cyan),var(--neon-pink),var(--neon-purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:3px;text-transform:uppercase;filter:drop-shadow(0 0 20px rgba(255,45,149,0.3))}
header p{font-family:'Share Tech Mono',monospace;color:rgba(0,240,255,0.5);font-size:13px;margin-top:8px;letter-spacing:2px}

/* Prompt area */
.prompt-section{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;margin-bottom:24px;position:relative;overflow:hidden}
.prompt-section::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--neon-cyan),var(--neon-pink),transparent)}
.prompt-label{font-family:'Orbitron',sans-serif;font-size:11px;color:var(--neon-cyan);letter-spacing:3px;text-transform:uppercase;margin-bottom:10px;opacity:0.7}
textarea{width:100%;background:#08081a;border:1px solid var(--border);border-radius:10px;padding:16px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:500;resize:vertical;min-height:80px;outline:none;transition:border .3s;line-height:1.5}
textarea:focus{border-color:var(--neon-pink);box-shadow:0 0 20px rgba(255,45,149,0.1)}
textarea::placeholder{color:rgba(255,255,255,0.2)}

/* Controls row */
.controls{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap;align-items:end}
.control-group{display:flex;flex-direction:column;gap:4px}
.control-group label{font-family:'Share Tech Mono',monospace;font-size:10px;color:var(--neon-cyan);letter-spacing:2px;text-transform:uppercase;opacity:0.6}
.control-group select{background:#08081a;border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:14px;outline:none;cursor:pointer;min-width:130px}
.control-group select:focus{border-color:var(--neon-purple)}

.generate-btn{flex:1;min-width:140px;background:linear-gradient(135deg,var(--neon-pink),var(--neon-purple));border:none;border-radius:10px;padding:12px 28px;color:#fff;font-family:'Orbitron',sans-serif;font-weight:700;font-size:14px;letter-spacing:1px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden}
.generate-btn:hover{transform:translateY(-1px);box-shadow:0 4px 25px rgba(255,45,149,0.3)}
.generate-btn:active{transform:translateY(0)}
.generate-btn:disabled{opacity:0.5;cursor:not-allowed;transform:none}
.generate-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.1),transparent);transform:translateX(-100%);transition:none}
.generate-btn:hover::after{transform:translateX(100%);transition:transform .6s}

/* Style presets */
.presets{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap}
.preset{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-family:'Share Tech Mono',monospace;font-size:11px;color:rgba(255,255,255,0.5);cursor:pointer;transition:all .2s;white-space:nowrap}
.preset:hover{border-color:var(--neon-pink);color:var(--neon-pink);background:rgba(255,45,149,0.05)}

/* Gallery */
.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.image-card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden;position:relative;transition:transform .2s,box-shadow .2s}
.image-card:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(179,71,234,0.15)}
.image-card img{width:100%;aspect-ratio:1;object-fit:cover;display:block;background:#08081a}
.image-card .loading-state{width:100%;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#08081a;gap:12px}
.image-card .loading-state .pulse-ring{width:50px;height:50px;border:2px solid var(--neon-pink);border-radius:50%;animation:pulse-ring 1.5s ease-out infinite}
@keyframes pulse-ring{0%{transform:scale(0.8);opacity:1}100%{transform:scale(1.6);opacity:0}}
.image-card .loading-state span{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--neon-cyan);letter-spacing:2px;opacity:0.5}
.image-info{padding:14px}
.image-prompt{font-size:13px;color:rgba(255,255,255,0.6);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.image-meta{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.image-meta span{font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(0,240,255,0.4);letter-spacing:1px}
.image-actions{display:flex;gap:6px}
.image-actions button{background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:6px;padding:5px 10px;color:rgba(255,255,255,0.5);font-size:11px;cursor:pointer;transition:all .2s;font-family:'Share Tech Mono',monospace}
.image-actions button:hover{border-color:var(--neon-cyan);color:var(--neon-cyan)}

/* Empty state */
.empty-state{text-align:center;padding:60px 20px;grid-column:1/-1}
.empty-state .icon{font-size:48px;margin-bottom:16px;opacity:0.3}
.empty-state p{font-family:'Share Tech Mono',monospace;color:rgba(255,255,255,0.2);font-size:13px;letter-spacing:1px}

/* Lightbox */
#lightbox{position:fixed;inset:0;background:rgba(0,0,0,0.92);z-index:100;display:none;align-items:center;justify-content:center;cursor:pointer}
#lightbox.open{display:flex}
#lightbox img{max-width:90vw;max-height:90vh;border-radius:8px;box-shadow:0 0 60px rgba(255,45,149,0.2)}

@media(max-width:600px){
  .controls{flex-direction:column}
  .control-group select{width:100%}
  .gallery{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>Neon Journey</h1>
    <p>// AI image synthesis terminal</p>
  </header>

  <div class="prompt-section">
    <div class="prompt-label">Prompt</div>
    <textarea id="prompt" placeholder="A cyberpunk cityscape at sunset with flying cars and holographic billboards..." rows="3"></textarea>
    <div class="controls">
      <div class="control-group">
        <label>Dimensions</label>
        <select id="dimensions">
          <option value="1024x1024">1024 x 1024</option>
          <option value="1024x768">1024 x 768</option>
          <option value="768x1024">768 x 1024</option>
          <option value="1280x720">1280 x 720</option>
          <option value="720x1280">720 x 1280</option>
        </select>
      </div>
      <div class="control-group">
        <label>Model</label>
        <select id="model">
          <option value="flux">Flux</option>
          <option value="flux-realism">Flux Realism</option>
          <option value="flux-anime">Flux Anime</option>
          <option value="flux-3d">Flux 3D</option>
          <option value="turbo">Turbo</option>
        </select>
      </div>
      <button class="generate-btn" id="gen-btn" onclick="generate()">GENERATE</button>
    </div>
    <div class="presets">
      <div class="preset" onclick="applyPreset('cyberpunk city at night, neon signs, rain-slicked streets, volumetric fog, cinematic')">Cyberpunk City</div>
      <div class="preset" onclick="applyPreset('synthwave sunset over ocean, chrome palm trees, grid floor, retro 80s, vaporwave')">Synthwave</div>
      <div class="preset" onclick="applyPreset('cosmic nebula with floating crystals, bioluminescent, ethereal, 8k render')">Cosmic</div>
      <div class="preset" onclick="applyPreset('ancient temple overgrown with glowing plants, mystical atmosphere, fantasy art')">Fantasy</div>
      <div class="preset" onclick="applyPreset('futuristic mech warrior in neon arena, dramatic lighting, concept art, detailed')">Mech</div>
      <div class="preset" onclick="applyPreset('underwater city with glass domes, bioluminescent fish, art nouveau architecture')">Underwater</div>
      <div class="preset" onclick="applyPreset('portrait of an android with glowing circuitry skin, photorealistic, studio lighting')">Android</div>
      <div class="preset" onclick="applyPreset('isometric pixel art diorama of a space station, cute, detailed, vibrant colors')">Pixel Art</div>
    </div>
  </div>

  <div class="gallery" id="gallery">
    <div class="empty-state">
      <div class="icon">&#9670;</div>
      <p>Enter a prompt and generate your first image</p>
    </div>
  </div>
</div>

<div id="lightbox" onclick="this.classList.remove('open')">
  <img id="lightbox-img" src="">
</div>

<script>
const gallery = document.getElementById('gallery');
const promptEl = document.getElementById('prompt');
let imageCount = 0;
let generating = false;

function applyPreset(text) {
  promptEl.value = text;
  promptEl.focus();
}

function generate() {
  if (generating) return;
  const prompt = promptEl.value.trim();
  if (!prompt) { promptEl.focus(); return; }

  generating = true;
  const btn = document.getElementById('gen-btn');
  btn.disabled = true;
  btn.textContent = 'GENERATING...';

  // Clear empty state
  const empty = gallery.querySelector('.empty-state');
  if (empty) empty.remove();

  const dims = document.getElementById('dimensions').value.split('x');
  const width = parseInt(dims[0]);
  const height = parseInt(dims[1]);
  const model = document.getElementById('model').value;

  imageCount++;
  const id = 'img-' + imageCount;
  const seed = Math.floor(Math.random() * 999999);

  // Create card with loading state
  const card = document.createElement('div');
  card.className = 'image-card';
  card.id = id;
  card.innerHTML = `
    <div class="loading-state">
      <div class="pulse-ring"></div>
      <span>SYNTHESIZING</span>
    </div>
    <div class="image-info">
      <div class="image-prompt">${escapeHtml(prompt)}</div>
      <div class="image-meta">
        <span>${width}x${height} / ${model}</span>
        <div class="image-actions">
          <button onclick="openLightbox('${id}')" disabled>VIEW</button>
          <button onclick="downloadImage('${id}')" disabled>SAVE</button>
          <button onclick="remixPrompt('${id}')">REMIX</button>
        </div>
      </div>
    </div>
  `;
  card.dataset.prompt = prompt;
  gallery.prepend(card);

  // Build Pollinations URL
  const encodedPrompt = encodeURIComponent(prompt);
  const url = `https://image.pollinations.ai/prompt/${encodedPrompt}?width=${width}&height=${height}&seed=${seed}&model=${model}&nologo=true&referrer=sloppy.live`;

  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    const loadingState = card.querySelector('.loading-state');
    if (loadingState) {
      loadingState.replaceWith(img);
      img.style.cssText = 'width:100%;aspect-ratio:auto;object-fit:cover;display:block;cursor:pointer';
      img.onclick = () => openLightbox(id);
    }
    // Enable buttons
    card.querySelectorAll('.image-actions button').forEach(b => b.disabled = false);
    generating = false;
    btn.disabled = false;
    btn.textContent = 'GENERATE';
  };
  img.onerror = () => {
    const loadingState = card.querySelector('.loading-state');
    if (loadingState) {
      loadingState.innerHTML = '<span style="color:var(--neon-pink)">GENERATION FAILED</span><span>Try a different prompt</span>';
    }
    generating = false;
    btn.disabled = false;
    btn.textContent = 'GENERATE';
  };
  img.src = url;

  // Timeout fallback
  setTimeout(() => {
    if (generating) {
      generating = false;
      btn.disabled = false;
      btn.textContent = 'GENERATE';
    }
  }, 60000);
}

function openLightbox(id) {
  const card = document.getElementById(id);
  const img = card.querySelector('img');
  if (!img) return;
  document.getElementById('lightbox-img').src = img.src;
  document.getElementById('lightbox').classList.add('open');
}

function downloadImage(id) {
  const card = document.getElementById(id);
  const img = card.querySelector('img');
  if (!img) return;
  const a = document.createElement('a');
  a.href = img.src;
  a.download = 'neon-journey-' + id + '.jpg';
  a.target = '_blank';
  a.click();
}

function remixPrompt(id) {
  const card = document.getElementById(id);
  promptEl.value = card.dataset.prompt;
  promptEl.focus();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function escapeHtml(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

// Enter to generate
promptEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); generate(); }
});
</script>
</body>
</html>
