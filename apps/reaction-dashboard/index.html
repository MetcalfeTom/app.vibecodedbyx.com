<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Reaction Dashboard</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8E%9B%EF%B8%8F">
<meta name="description" content="Big chunky buttons. Silly sounds. Emoji rain on demand.">
<meta property="og:title" content="Reaction Dashboard">
<meta property="og:description" content="16 chunky neon buttons. Each one rains its own emoji and honks its own sound.">
<meta property="og:url" content="https://sloppy.live/reaction-dashboard/">
<meta property="og:image" content="https://image.pollinations.ai/prompt/chunky%20neon%20soundboard%20dashboard%20with%20colorful%20square%20buttons%20fire%20skull%20party%20emoji%20confetti%20raining%20from%20top%20of%20screen%2C%20dark%20background%2C%20arcade%20vibes?width=1200&height=630&nologo=true">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Silkscreen:wght@400;700&family=JetBrains+Mono:wght@500;700&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0e0a1f;
    --panel:#14102a;
    --ink:#f4eeff;
    --dim:#8b82b0;
    --edge:rgba(255,255,255,0.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(at 20% 10%, rgba(255,92,140,0.18), transparent 55%),
      radial-gradient(at 80% 90%, rgba(80,230,255,0.18), transparent 55%),
      var(--bg);
    color:var(--ink);
    font-family:'Space Mono',monospace;
    min-height:100vh;
    overflow:hidden;
    user-select:none;
    -webkit-user-select:none;
  }
  body::before{
    content:"";position:fixed;inset:0;pointer-events:none;
    background:repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0 1px, transparent 1px 3px);
    z-index:1;
  }
  #rain{
    position:fixed;inset:0;pointer-events:none;overflow:hidden;z-index:50;
  }
  .drop{
    position:absolute;
    top:-80px;
    font-family:'Apple Color Emoji','Segoe UI Emoji','Noto Color Emoji',sans-serif;
    will-change:transform,opacity;
    animation:fall linear forwards;
    filter:drop-shadow(0 4px 10px rgba(0,0,0,0.4));
  }
  @keyframes fall{
    0%  { transform:translate(0,-20vh) rotate(0deg) scale(0.9); opacity:0; }
    12% { opacity:1; transform:translate(calc(var(--sway) * -0.3), 0vh) rotate(calc(var(--rot) * 0.2)) scale(1); }
    55% { transform:translate(var(--sway), 55vh) rotate(calc(var(--rot) * 0.55)) scale(1.05); }
    100%{ transform:translate(calc(var(--sway) * -0.6), 120vh) rotate(var(--rot)) scale(1); opacity:0; }
  }
  .drop.float {
    animation:floatup linear forwards;
  }
  @keyframes floatup {
    0%  { transform:translate(0, 80vh) rotate(0deg); opacity:0; }
    18% { opacity:1; }
    100%{ transform:translate(var(--sway), -20vh) rotate(var(--rot)); opacity:0; }
  }

  .stage{
    position:relative;z-index:2;
    min-height:100vh;
    display:flex;flex-direction:column;align-items:center;
    padding:20px 16px;
  }
  header{text-align:center;margin-bottom:18px}
  h1{
    font-family:'Bungee',cursive;
    font-size:clamp(28px,5vw,58px);
    letter-spacing:0.04em;
    line-height:1;
    background:linear-gradient(90deg,#ff5c8c,#ffd23f,#50e6ff,#a4ff3c,#ff5c8c);
    background-size:200% 100%;
    -webkit-background-clip:text;background-clip:text;color:transparent;
    animation:shift 8s linear infinite;
    filter:drop-shadow(0 0 14px rgba(255,92,140,0.25));
  }
  @keyframes shift{0%{background-position:0 0}100%{background-position:200% 0}}
  .sub{
    margin-top:4px;
    font-family:'JetBrains Mono',monospace;
    font-size:11px;
    letter-spacing:0.45em;
    color:var(--dim);
    text-transform:uppercase;
  }

  #grid{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:12px;
    max-width:740px;
    width:100%;
  }
  .rxn{
    position:relative;
    background:linear-gradient(160deg, var(--c1), var(--c2));
    border:3px solid rgba(255,255,255,0.18);
    border-radius:22px;
    padding:18px 8px 14px;
    cursor:pointer;
    color:#10081e;
    font-family:'Silkscreen',cursive;
    overflow:hidden;
    box-shadow:
      0 6px 0 rgba(0,0,0,0.35),
      0 0 0 1px rgba(0,0,0,0.25) inset,
      0 0 22px var(--glow);
    transition:transform 0.1s cubic-bezier(.3,1.4,.4,1), box-shadow 0.12s;
    outline:none;
    -webkit-tap-highlight-color:transparent;
  }
  .rxn:hover{transform:translateY(-2px) scale(1.02)}
  .rxn:active,.rxn.pressed{
    transform:translateY(4px) scale(0.96);
    box-shadow:
      0 2px 0 rgba(0,0,0,0.4),
      0 0 0 1px rgba(0,0,0,0.25) inset,
      0 0 36px var(--glow);
  }
  .rxn .emoji{
    font-size:clamp(32px,6vw,56px);
    display:block;
    line-height:1;
    text-shadow:0 3px 0 rgba(0,0,0,0.25);
    filter:drop-shadow(0 2px 6px rgba(0,0,0,0.35));
    transition:transform 0.2s;
  }
  .rxn:hover .emoji{transform:scale(1.12) rotate(-4deg)}
  .rxn .label{
    display:block;
    margin-top:6px;
    font-size:clamp(9px,1.3vw,12px);
    letter-spacing:0.14em;
    color:#10081e;
    text-shadow:0 1px 0 rgba(255,255,255,0.2);
  }
  .rxn .key{
    position:absolute;
    top:6px;right:8px;
    font-family:'JetBrains Mono',monospace;
    font-size:9px;letter-spacing:0.1em;
    color:rgba(0,0,0,0.5);
    background:rgba(255,255,255,0.25);
    padding:2px 5px;border-radius:5px;
    line-height:1;
  }
  .rxn .pulse{
    position:absolute;inset:0;border-radius:22px;
    pointer-events:none;
    box-shadow:0 0 0 0 var(--glow);
  }
  .rxn.pressed .pulse{
    animation:pulseRing 0.6s ease-out;
  }
  @keyframes pulseRing{
    0%{box-shadow:0 0 0 0 var(--glow);opacity:0.9}
    100%{box-shadow:0 0 0 40px transparent;opacity:0}
  }
  .count{
    position:absolute;
    bottom:6px;left:8px;
    font-family:'JetBrains Mono',monospace;
    font-size:9px;
    color:rgba(0,0,0,0.55);
    background:rgba(255,255,255,0.22);
    padding:2px 5px;border-radius:5px;
  }

  footer{
    margin-top:18px;
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:0.18em;
    color:var(--dim);
    text-transform:uppercase;
    text-align:center;
    display:flex;gap:18px;align-items:center;flex-wrap:wrap;justify-content:center;
  }
  footer .k{
    background:rgba(255,255,255,0.06);
    border:1px solid var(--edge);
    padding:4px 8px;border-radius:6px;
    color:#c8bde8;
  }
  #muteBtn{
    background:transparent;
    border:1px solid var(--edge);
    color:#c8bde8;
    font-family:'JetBrains Mono',monospace;
    font-size:10px;
    letter-spacing:0.16em;
    padding:6px 14px;border-radius:999px;
    cursor:pointer;
    text-transform:uppercase;
  }
  #muteBtn:hover{color:#50e6ff;border-color:#50e6ff}
  #hitCounter{
    background:rgba(255,255,255,0.06);
    border:1px solid var(--edge);
    padding:6px 14px;border-radius:999px;
    color:#ffd23f;
    letter-spacing:0.16em;
  }
  #hitCounter b{color:#fff;font-family:'Silkscreen',cursive;margin-left:4px;font-size:13px;letter-spacing:0.06em}

  @media (max-width:640px){
    #grid{grid-template-columns:repeat(2,1fr);gap:10px;max-width:400px}
    .rxn{padding:14px 6px 10px;border-radius:18px}
    .rxn .emoji{font-size:44px}
    footer{font-size:9px;gap:10px}
  }
  @media (max-width:400px){
    #grid{grid-template-columns:repeat(2,1fr)}
    h1{font-size:28px}
  }
</style>
</head>
<body>
<div id="rain"></div>
<div class="stage">
  <header>
    <h1>REACTION DASHBOARD</h1>
    <div class="sub">▾ tap · blast · react ▾</div>
  </header>

  <div id="grid"></div>

  <footer>
    <span class="k">Q W E R · A S D F · Z X C V · 1 2 3 4</span>
    <span class="k">SPACE random</span>
    <span id="hitCounter">hits <b id="hits">0</b></span>
    <button id="muteBtn">♪ ON</button>
  </footer>
</div>

<script>
// -------- reaction config --------
const R = [
  { id:'fire',   key:'1', emoji:'🔥', label:'FIRE',     rain:['🔥','🔥','🧨','✨'],         c1:'#ff9632',c2:'#ff3c6b',glow:'rgba(255,90,40,0.45)',  sound:'whomp',  dir:'fall' },
  { id:'dead',   key:'2', emoji:'💀', label:'R.I.P.',   rain:['💀','☠️','⚰️','🥀'],          c1:'#909090',c2:'#404050',glow:'rgba(180,180,200,0.45)',sound:'sadtrom',dir:'fall' },
  { id:'based',  key:'3', emoji:'💯', label:'BASED',    rain:['💯','💯','💪','🥶'],           c1:'#ff3c6b',c2:'#a62cff',glow:'rgba(255,60,107,0.45)',sound:'arp',    dir:'fall' },
  { id:'party',  key:'4', emoji:'🎉', label:'PARTY',    rain:['🎉','🎊','🥳','🪅','🎁'],       c1:'#ffd23f',c2:'#ff3c9e',glow:'rgba(255,210,63,0.45)',sound:'party',  dir:'fall' },

  { id:'clap',   key:'Q', emoji:'👏', label:'CLAP',     rain:['👏','👏','👏','✨'],           c1:'#ffc46b',c2:'#ff7a3c',glow:'rgba(255,180,90,0.45)',sound:'clap',   dir:'fall' },
  { id:'lol',    key:'W', emoji:'😂', label:'LMFAO',    rain:['😂','🤣','💀','😭'],           c1:'#ffe45c',c2:'#ffaa00',glow:'rgba(255,210,40,0.45)',sound:'lol',    dir:'fall' },
  { id:'eyes',   key:'E', emoji:'👀', label:'EYES',     rain:['👀','👁️','🫣','😳'],           c1:'#ffffff',c2:'#a8b0ff',glow:'rgba(200,210,255,0.45)',sound:'boing', dir:'fall' },
  { id:'rocket', key:'R', emoji:'🚀', label:'SEND IT',  rain:['🚀','✨','🌟','💫','🛸'],       c1:'#50e6ff',c2:'#3c5cff',glow:'rgba(80,230,255,0.45)',sound:'rocket', dir:'float' },

  { id:'goat',   key:'A', emoji:'🐐', label:'G.O.A.T.', rain:['🐐','🐐','🏆','👑'],           c1:'#c8aa6e',c2:'#8a5e2a',glow:'rgba(200,170,110,0.45)',sound:'goat',  dir:'fall' },
  { id:'slay',   key:'S', emoji:'💅', label:'SLAY',     rain:['💅','💋','💖','👠','✨'],       c1:'#ff8fc7',c2:'#d4299a',glow:'rgba(255,140,200,0.45)',sound:'slay', dir:'fall' },
  { id:'clown',  key:'D', emoji:'🤡', label:'CLOWN',    rain:['🤡','🎈','🤪','🎪'],           c1:'#ff5ea8',c2:'#6a3cff',glow:'rgba(255,94,168,0.45)',sound:'honk',   dir:'fall' },
  { id:'praise', key:'F', emoji:'🙌', label:'PRAISE',   rain:['🙌','✨','😇','💫','⭐'],       c1:'#ffe45c',c2:'#ffa500',glow:'rgba(255,225,90,0.45)',sound:'praise', dir:'float' },

  { id:'brain',  key:'Z', emoji:'🧠', label:'BRAIN',    rain:['🧠','💡','🌌','✨','⚡'],       c1:'#ff8cff',c2:'#4ac6ff',glow:'rgba(180,140,255,0.45)',sound:'brain',dir:'fall' },
  { id:'nope',   key:'X', emoji:'💩', label:'NOPE',     rain:['💩','💩','🙅','🚫'],           c1:'#9a6c3a',c2:'#4a2f14',glow:'rgba(160,110,60,0.45)',sound:'fart',  dir:'fall' },
  { id:'tea',    key:'C', emoji:'🍿', label:'TEA TIME', rain:['🍿','🫖','☕','👀'],            c1:'#ffd89a',c2:'#d68c3a',glow:'rgba(255,200,130,0.45)',sound:'pop',   dir:'fall' },
  { id:'boo',    key:'V', emoji:'👻', label:'BOO',      rain:['👻','👻','🕸️','🎃','💀'],      c1:'#e0d0ff',c2:'#6a3cff',glow:'rgba(200,170,255,0.45)',sound:'ghost', dir:'float' }
];

// -------- build grid --------
const grid = document.getElementById('grid');
for (const r of R){
  const btn = document.createElement('button');
  btn.className = 'rxn';
  btn.dataset.id = r.id;
  btn.style.setProperty('--c1', r.c1);
  btn.style.setProperty('--c2', r.c2);
  btn.style.setProperty('--glow', r.glow);
  btn.innerHTML = `
    <span class="key">${r.key}</span>
    <span class="emoji">${r.emoji}</span>
    <span class="label">${r.label}</span>
    <span class="count" data-count="0">×0</span>
    <span class="pulse"></span>
  `;
  btn.addEventListener('click', ()=>trigger(r.id));
  grid.appendChild(btn);
}

// -------- audio --------
let audioCtx = null, muted = false;
function ac(){
  if (!audioCtx) audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}
function noiseBuf(a, dur, shape){
  const n = Math.floor(a.sampleRate*dur);
  const b = a.createBuffer(1, n, a.sampleRate);
  const d = b.getChannelData(0);
  for (let i=0;i<n;i++){
    const p = i/n;
    const amp = shape==='attack' ? Math.pow(1-p,1.5) : shape==='swell' ? p*(1-p)*4 : shape==='rise' ? p : 1;
    d[i] = (Math.random()*2-1)*amp;
  }
  return b;
}
const SND = {
  whomp(){
    const a = ac(), now = a.currentTime;
    const o = a.createOscillator(); o.type='sawtooth';
    o.frequency.setValueAtTime(200, now);
    o.frequency.exponentialRampToValueAtTime(45, now+0.5);
    const g = a.createGain();
    g.gain.setValueAtTime(0.32, now);
    g.gain.exponentialRampToValueAtTime(0.001, now+0.6);
    o.connect(g); g.connect(a.destination);
    o.start(now); o.stop(now+0.65);
    // crackle
    const src = a.createBufferSource(); src.buffer = noiseBuf(a, 0.4, 'attack');
    const bp = a.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1800; bp.Q.value=1.2;
    const ng = a.createGain(); ng.gain.value=0.18;
    src.connect(bp); bp.connect(ng); ng.connect(a.destination);
    src.start(now); src.stop(now+0.42);
  },
  sadtrom(){
    const a = ac(), now = a.currentTime;
    const notes = [392, 349.2, 311.1, 277.2];
    notes.forEach((f,i)=>{
      const o = a.createOscillator(); o.type='sawtooth';
      const g = a.createGain();
      const lp = a.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=950;
      o.frequency.setValueAtTime(f, now+i*0.22);
      o.frequency.exponentialRampToValueAtTime(f*0.92, now+i*0.22+0.2);
      g.gain.setValueAtTime(0.2, now+i*0.22);
      g.gain.exponentialRampToValueAtTime(0.001, now+i*0.22+0.35);
      o.connect(lp); lp.connect(g); g.connect(a.destination);
      o.start(now+i*0.22); o.stop(now+i*0.22+0.4);
    });
  },
  arp(){
    const a = ac(), now = a.currentTime;
    [523, 659, 784, 1047, 1319].forEach((f,i)=>{
      const o = a.createOscillator(); o.type='triangle';
      const g = a.createGain();
      o.frequency.value = f;
      g.gain.setValueAtTime(0.16, now+i*0.06);
      g.gain.exponentialRampToValueAtTime(0.001, now+i*0.06+0.22);
      o.connect(g); g.connect(a.destination);
      o.start(now+i*0.06); o.stop(now+i*0.06+0.25);
    });
  },
  party(){
    const a = ac(), now = a.currentTime;
    const src = a.createBufferSource(); src.buffer = noiseBuf(a, 0.5, 'swell');
    const bp = a.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1400; bp.Q.value=1;
    const ng = a.createGain(); ng.gain.value=0.16;
    src.connect(bp); bp.connect(ng); ng.connect(a.destination);
    src.start(now); src.stop(now+0.5);
    [784, 988, 1174, 1568, 1976].forEach((f,i)=>{
      const o = a.createOscillator(); o.type='sine';
      const g = a.createGain();
      o.frequency.value = f;
      g.gain.setValueAtTime(0.14, now+i*0.045);
      g.gain.exponentialRampToValueAtTime(0.001, now+i*0.045+0.4);
      o.connect(g); g.connect(a.destination);
      o.start(now+i*0.045); o.stop(now+i*0.045+0.45);
    });
  },
  clap(){
    const a = ac(), now = a.currentTime;
    for (let k=0;k<3;k++){
      const t = now + k*0.035;
      const src = a.createBufferSource(); src.buffer = noiseBuf(a, 0.06, 'attack');
      const bp = a.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=2300; bp.Q.value=1.8;
      const g = a.createGain(); g.gain.value=0.32;
      src.connect(bp); bp.connect(g); g.connect(a.destination);
      src.start(t); src.stop(t+0.06);
    }
  },
  lol(){
    const a = ac(), now = a.currentTime;
    const pitches = [360, 440, 380, 460, 400, 480];
    pitches.forEach((p,i)=>{
      const o = a.createOscillator(); o.type='square';
      const bp = a.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1100; bp.Q.value=2.2;
      const g = a.createGain();
      o.frequency.value = p;
      g.gain.setValueAtTime(0.14, now+i*0.095);
      g.gain.exponentialRampToValueAtTime(0.001, now+i*0.095+0.075);
      o.connect(bp); bp.connect(g); g.connect(a.destination);
      o.start(now+i*0.095); o.stop(now+i*0.095+0.09);
    });
  },
  boing(){
    const a = ac(), now = a.currentTime;
    const o = a.createOscillator(); o.type='sine';
    const g = a.createGain();
    o.frequency.setValueAtTime(900, now);
    o.frequency.exponentialRampToValueAtTime(200, now+0.35);
    g.gain.setValueAtTime(0.22, now);
    g.gain.exponentialRampToValueAtTime(0.001, now+0.4);
    o.connect(g); g.connect(a.destination);
    o.start(now); o.stop(now+0.42);
  },
  rocket(){
    const a = ac(), now = a.currentTime;
    const src = a.createBufferSource(); src.buffer = noiseBuf(a, 0.6, 'rise');
    const bp = a.createBiquadFilter(); bp.type='bandpass';
    bp.frequency.setValueAtTime(500, now);
    bp.frequency.exponentialRampToValueAtTime(3400, now+0.55);
    bp.Q.value = 2.2;
    const g = a.createGain(); g.gain.value=0.22;
    src.connect(bp); bp.connect(g); g.connect(a.destination);
    src.start(now); src.stop(now+0.62);
    // boom
    const o = a.createOscillator(); o.type='sine';
    const og = a.createGain();
    o.frequency.setValueAtTime(140, now+0.5);
    o.frequency.exponentialRampToValueAtTime(40, now+0.85);
    og.gain.setValueAtTime(0.38, now+0.5);
    og.gain.exponentialRampToValueAtTime(0.001, now+0.95);
    o.connect(og); og.connect(a.destination);
    o.start(now+0.5); o.stop(now+0.98);
  },
  goat(){
    const a = ac(), now = a.currentTime;
    const o = a.createOscillator(); o.type='square';
    const g = a.createGain();
    const lfo = a.createOscillator(); const lfoG = a.createGain();
    lfo.frequency.value = 16;
    lfoG.gain.value = 24;
    lfo.connect(lfoG); lfoG.connect(o.frequency);
    o.frequency.value = 380;
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.18, now+0.03);
    g.gain.setValueAtTime(0.18, now+0.03);
    // tremolo via second gain
    const tg = a.createGain();
    const tremLfo = a.createOscillator(); tremLfo.frequency.value=22;
    const tremG = a.createGain(); tremG.gain.value=0.4;
    tremLfo.connect(tremG); tremG.connect(tg.gain);
    tg.gain.value = 0.6;
    g.gain.exponentialRampToValueAtTime(0.001, now+0.55);
    o.connect(g); g.connect(tg); tg.connect(a.destination);
    o.start(now); lfo.start(now); tremLfo.start(now);
    o.stop(now+0.58); lfo.stop(now+0.58); tremLfo.stop(now+0.58);
  },
  slay(){
    const a = ac(), now = a.currentTime;
    const o = a.createOscillator(); o.type='triangle';
    const g = a.createGain();
    o.frequency.setValueAtTime(523, now);
    o.frequency.linearRampToValueAtTime(1047, now+0.22);
    o.frequency.linearRampToValueAtTime(932, now+0.4);
    o.frequency.linearRampToValueAtTime(1175, now+0.55);
    g.gain.setValueAtTime(0.18, now);
    g.gain.exponentialRampToValueAtTime(0.001, now+0.6);
    o.connect(g); g.connect(a.destination);
    o.start(now); o.stop(now+0.65);
    // harmony
    const o2 = a.createOscillator(); o2.type='sine';
    const g2 = a.createGain();
    o2.frequency.setValueAtTime(659, now);
    o2.frequency.linearRampToValueAtTime(1319, now+0.22);
    g2.gain.setValueAtTime(0.1, now);
    g2.gain.exponentialRampToValueAtTime(0.001, now+0.6);
    o2.connect(g2); g2.connect(a.destination);
    o2.start(now); o2.stop(now+0.65);
  },
  honk(){
    const a = ac(), now = a.currentTime;
    [[420,0],[330,0.13]].forEach(([f,t])=>{
      const o = a.createOscillator(); o.type='square';
      const g = a.createGain();
      o.frequency.value = f;
      g.gain.setValueAtTime(0.24, now+t);
      g.gain.exponentialRampToValueAtTime(0.001, now+t+0.12);
      o.connect(g); g.connect(a.destination);
      o.start(now+t); o.stop(now+t+0.14);
    });
  },
  praise(){
    const a = ac(), now = a.currentTime;
    [523, 659, 784, 1047, 1319].forEach((f,i)=>{
      const o = a.createOscillator(); o.type='sine';
      const g = a.createGain();
      o.frequency.value = f;
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(0.11, now+0.1+i*0.02);
      g.gain.exponentialRampToValueAtTime(0.001, now+0.9);
      o.connect(g); g.connect(a.destination);
      o.start(now); o.stop(now+0.95);
    });
  },
  brain(){
    const a = ac(), now = a.currentTime;
    [1047, 1319, 1568, 2093, 2637].forEach((f,i)=>{
      const o = a.createOscillator(); o.type='sine';
      const g = a.createGain();
      o.frequency.value = f;
      g.gain.setValueAtTime(0.08, now+i*0.04);
      g.gain.exponentialRampToValueAtTime(0.001, now+i*0.04+0.55);
      o.connect(g); g.connect(a.destination);
      o.start(now+i*0.04); o.stop(now+i*0.04+0.6);
    });
    // shimmer noise
    const src = a.createBufferSource(); src.buffer = noiseBuf(a, 0.5, 'swell');
    const hp = a.createBiquadFilter(); hp.type='highpass'; hp.frequency.value=3500;
    const ng = a.createGain(); ng.gain.value=0.08;
    src.connect(hp); hp.connect(ng); ng.connect(a.destination);
    src.start(now); src.stop(now+0.5);
  },
  fart(){
    const a = ac(), now = a.currentTime;
    const o = a.createOscillator(); o.type='sawtooth';
    const g = a.createGain();
    const lfo = a.createOscillator(); const lfoG = a.createGain();
    lfo.frequency.value = 9;
    lfoG.gain.value = 50;
    lfo.connect(lfoG); lfoG.connect(o.frequency);
    o.frequency.setValueAtTime(110, now);
    o.frequency.exponentialRampToValueAtTime(70, now+0.4);
    g.gain.setValueAtTime(0.32, now);
    g.gain.exponentialRampToValueAtTime(0.001, now+0.45);
    o.connect(g); g.connect(a.destination);
    o.start(now); lfo.start(now);
    o.stop(now+0.5); lfo.stop(now+0.5);
  },
  pop(){
    const a = ac(), now = a.currentTime;
    for (let k=0;k<8;k++){
      const t = now + Math.random()*0.55;
      const o = a.createOscillator(); o.type='square';
      const g = a.createGain();
      o.frequency.value = 520 + Math.random()*900;
      g.gain.setValueAtTime(0.14, t);
      g.gain.exponentialRampToValueAtTime(0.001, t+0.04);
      o.connect(g); g.connect(a.destination);
      o.start(t); o.stop(t+0.05);
    }
  },
  ghost(){
    const a = ac(), now = a.currentTime;
    const o = a.createOscillator(); o.type='sine';
    const g = a.createGain();
    o.frequency.setValueAtTime(180, now);
    o.frequency.linearRampToValueAtTime(420, now+0.45);
    o.frequency.linearRampToValueAtTime(220, now+0.9);
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.26, now+0.2);
    g.gain.exponentialRampToValueAtTime(0.001, now+1.0);
    o.connect(g); g.connect(a.destination);
    o.start(now); o.stop(now+1.05);
    // detuned shadow
    const o2 = a.createOscillator(); o2.type='sine';
    const g2 = a.createGain();
    o2.frequency.setValueAtTime(182, now);
    o2.frequency.linearRampToValueAtTime(424, now+0.45);
    o2.frequency.linearRampToValueAtTime(222, now+0.9);
    g2.gain.setValueAtTime(0, now);
    g2.gain.linearRampToValueAtTime(0.14, now+0.2);
    g2.gain.exponentialRampToValueAtTime(0.001, now+1.0);
    o2.connect(g2); g2.connect(a.destination);
    o2.start(now); o2.stop(now+1.05);
  }
};

// -------- rain --------
const rainEl = document.getElementById('rain');
const MAX_DROPS = 240;
function rain(emojis, count, dir){
  if (rainEl.childElementCount > MAX_DROPS){
    // trim oldest
    while (rainEl.childElementCount > MAX_DROPS - count){
      rainEl.firstChild && rainEl.firstChild.remove();
    }
  }
  for (let i=0;i<count;i++){
    const e = document.createElement('div');
    e.className = 'drop' + (dir==='float' ? ' float' : '');
    e.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    const startX = Math.random()*100;
    e.style.left = startX + 'vw';
    const size = 28 + Math.random()*44;
    e.style.fontSize = size + 'px';
    const dur = (dir==='float' ? 2.4 : 2.6) + Math.random()*2.2;
    e.style.animationDuration = dur + 's';
    e.style.animationDelay = (Math.random()*0.35) + 's';
    e.style.setProperty('--sway', (Math.random()*140-70) + 'px');
    e.style.setProperty('--rot', (Math.random()*960-480) + 'deg');
    rainEl.appendChild(e);
    const life = (dur + 0.4) * 1000;
    setTimeout(()=>e.remove(), life);
  }
}

// -------- trigger --------
let hits = 0;
function trigger(id){
  const r = R.find(x=>x.id===id);
  if (!r) return;
  const btn = grid.querySelector(`[data-id="${id}"]`);
  btn.classList.remove('pressed');
  void btn.offsetWidth;
  btn.classList.add('pressed');
  setTimeout(()=>btn.classList.remove('pressed'), 600);
  // bump count
  const countEl = btn.querySelector('.count');
  const n = parseInt(countEl.dataset.count,10) + 1;
  countEl.dataset.count = n;
  countEl.textContent = '×' + n;
  // global hits
  hits++;
  document.getElementById('hits').textContent = hits;
  // sfx
  if (!muted){
    try { SND[r.sound](); } catch(e){ console.warn(e); }
  }
  // rain
  const count = 26 + Math.floor(Math.random()*12);
  rain(r.rain, count, r.dir);
}

// -------- keyboard --------
addEventListener('keydown', (e)=>{
  if (e.repeat) return;
  if (e.code === 'Space'){
    e.preventDefault();
    const r = R[Math.floor(Math.random()*R.length)];
    trigger(r.id);
    return;
  }
  if (e.key === 'm' || e.key === 'M'){
    toggleMute(); return;
  }
  const k = e.key.toUpperCase();
  const match = R.find(x=>x.key===k);
  if (match){
    e.preventDefault();
    trigger(match.id);
  }
});

// -------- mute --------
const muteBtn = document.getElementById('muteBtn');
function toggleMute(){
  muted = !muted;
  muteBtn.textContent = muted ? '♪ OFF' : '♪ ON';
  muteBtn.style.color = muted ? '#ff5c8c' : '';
  muteBtn.style.borderColor = muted ? '#ff5c8c' : '';
}
muteBtn.addEventListener('click', toggleMute);

// -------- unlock audio on first interaction --------
addEventListener('pointerdown', ()=>ac(), {once:true});
</script>
