<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Neon Pinball</title>
<link rel="icon" href="https://emojicdn.elk.sh/🔮">
<meta property="og:title" content="Neon Pinball">
<meta property="og:description" content="Magnetic beam paddles and a gravity orb that warps the playfield.">
<meta property="og:url" content="https://sloppy.live/neon-pinball">
<meta property="og:image" content="https://emojicdn.elk.sh/🔮?style=apple&size=512">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Fira+Code:wght@300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100dvh;overflow:hidden;background:#050510;font-family:'Fira Code',monospace}
canvas{display:block;width:100%;height:100%}
#ui{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;align-items:center;padding:12px 18px;pointer-events:none;z-index:2}
#score-display{font-family:'Orbitron',sans-serif;font-size:1.4rem;font-weight:900;color:#0ff;text-shadow:0 0 20px rgba(0,255,255,0.6),0 0 40px rgba(0,255,255,0.3);letter-spacing:2px}
#balls-display{font-size:0.7rem;color:rgba(0,255,255,0.5);letter-spacing:1px}
#combo-display{font-family:'Orbitron',sans-serif;font-size:0.8rem;font-weight:700;color:#f0f;text-shadow:0 0 15px rgba(255,0,255,0.5);opacity:0;transition:opacity 0.3s}
#combo-display.show{opacity:1}
#start-screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;background:rgba(5,5,16,0.95)}
#start-screen h1{font-family:'Orbitron',sans-serif;font-size:2.4rem;font-weight:900;color:#0ff;text-shadow:0 0 30px rgba(0,255,255,0.5),0 0 60px rgba(0,255,255,0.2);margin-bottom:8px}
#start-screen .sub{font-size:0.7rem;color:rgba(255,0,255,0.6);margin-bottom:40px;letter-spacing:3px}
#start-btn{font-family:'Orbitron',sans-serif;font-size:1rem;font-weight:700;color:#0ff;background:none;border:2px solid rgba(0,255,255,0.4);padding:14px 40px;border-radius:8px;cursor:pointer;min-height:48px;min-width:120px;transition:all 0.2s;letter-spacing:2px}
#start-btn:hover{border-color:#0ff;background:rgba(0,255,255,0.08);box-shadow:0 0 30px rgba(0,255,255,0.2)}
#start-screen .keys{font-size:0.6rem;color:rgba(100,200,255,0.35);margin-top:24px;text-align:center;line-height:1.8}
#game-over{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:10;background:rgba(5,5,16,0.92);overflow-y:auto;padding:20px}
#game-over h2{font-family:'Orbitron',sans-serif;font-size:1.8rem;font-weight:900;color:#f0f;text-shadow:0 0 30px rgba(255,0,255,0.5);margin-bottom:6px}
#game-over .final{font-family:'Orbitron',sans-serif;font-size:2.2rem;color:#0ff;font-weight:900;margin-bottom:4px}
#game-over .hi{font-size:0.65rem;color:rgba(0,255,255,0.4);margin-bottom:16px}
.lb-section{width:100%;max-width:320px;margin-bottom:20px}
.lb-title{font-family:'Orbitron',sans-serif;font-size:0.7rem;color:rgba(0,255,255,0.5);letter-spacing:2px;margin-bottom:8px;text-align:center}
.lb-row{display:flex;justify-content:space-between;padding:5px 10px;font-size:0.7rem;color:rgba(200,220,255,0.6);border-bottom:1px solid rgba(0,255,255,0.06)}
.lb-row.me{color:#0ff;font-weight:700}
.lb-rank{width:24px;text-align:right;margin-right:8px;color:rgba(0,255,255,0.4)}
.lb-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-score{margin-left:8px;font-variant-numeric:tabular-nums}
.lb-row:nth-child(1) .lb-rank{color:gold}
.lb-row:nth-child(2) .lb-rank{color:silver}
.lb-row:nth-child(3) .lb-rank{color:#cd7f32}
.submit-row{display:flex;gap:8px;margin-bottom:16px;width:100%;max-width:320px}
.submit-row input{flex:1;background:rgba(0,255,255,0.05);border:1px solid rgba(0,255,255,0.2);color:#0ff;font-family:'Fira Code',monospace;font-size:14px;padding:10px 12px;border-radius:6px;min-height:44px;outline:none}
.submit-row input::placeholder{color:rgba(0,255,255,0.25)}
.submit-row input:focus{border-color:rgba(0,255,255,0.5)}
.submit-row button{font-family:'Orbitron',sans-serif;font-size:0.7rem;font-weight:700;color:#0ff;background:rgba(0,255,255,0.08);border:1px solid rgba(0,255,255,0.3);padding:10px 16px;border-radius:6px;cursor:pointer;min-height:44px;white-space:nowrap}
.submit-row button:hover{background:rgba(0,255,255,0.15)}
.submit-row button:disabled{opacity:0.3;cursor:default}
#restart-btn{font-family:'Orbitron',sans-serif;font-size:0.9rem;font-weight:700;color:#f0f;background:none;border:2px solid rgba(255,0,255,0.4);padding:14px 36px;border-radius:8px;cursor:pointer;min-height:48px;transition:all 0.2s;letter-spacing:2px}
#restart-btn:hover{border-color:#f0f;background:rgba(255,0,255,0.08)}
a@media(max-width:500px){
  #score-display{font-size:1rem}
  #start-screen h1{font-size:1.6rem}
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div><div id="score-display">0</div><div id="balls-display">BALLS: 3</div></div>
  <div id="combo-display">x2 COMBO</div>
</div>
<div id="start-screen">
  <h1>NEON PINBALL</h1>
  <div class="sub">MAGNETIC BEAM EDITION</div>
  <button id="start-btn">LAUNCH</button>
  <div class="keys">A/D or LEFT/RIGHT paddles<br>Hold SPACE to charge, release to launch<br>Touch: left/right paddles, bottom-right to charge</div>
</div>
<div id="game-over">
  <h2>GAME OVER</h2>
  <div class="final" id="final-score">0</div>
  <div class="hi" id="hi-score">HIGH SCORE: 0</div>
  <div class="submit-row" id="submit-row">
    <input type="text" id="name-input" placeholder="Your name" maxlength="20" autocomplete="off">
    <button id="submit-btn">SUBMIT</button>
  </div>
  <div class="lb-section">
    <div class="lb-title">GLOBAL LEADERBOARD</div>
    <div id="lb-list"></div>
  </div>
  <button id="restart-btn">AGAIN</button>
</div>
<script type="module">
import supabase, { supabaseSession } from './supabase-config.js';

var currentUser = null;
(async function(){
  try { var s = await supabaseSession(); currentUser = s.user; } catch(e){ console.warn('Auth:',e); }
})();

var C=document.getElementById('c'),X=C.getContext('2d');
var W,H,scale;
var TW=400,TH=720;
var ox=0,oy=0;

function resize(){
  W=C.width=window.innerWidth;H=C.height=window.innerHeight;
  var sx=W/TW,sy=H/TH;
  scale=Math.min(sx,sy);
  ox=(W-TW*scale)/2;
  oy=(H-TH*scale)/2;
}
resize();window.addEventListener('resize',resize);

var score=0,balls=3,combo=0,comboTimer=0;
var hiScore=parseInt(localStorage.getItem('neon_pinball_hi'))||0;
var gameState='start';
var shakeTimer=0,shakeX=0,shakeY=0;

// BALL
var ball={x:TW/2,y:TH-120,vx:0,vy:0,r:7,trail:[],active:false,gravityWell:0};
var GRAVITY=0.15;
var MAX_VY=13;

// SPRING LAUNCHER
var spring={charge:0,charging:false,maxCharge:1,x:TW-39,y:TH-50,restY:TH-100};

// PADDLES (magnetic beams)
var paddles=[
  {x:TW/2-75,y:TH-80,angle:0.35,len:62,side:'left',active:false,mag:0},
  {x:TW/2+75,y:TH-80,angle:Math.PI-0.35,len:62,side:'right',active:false,mag:0}
];
var PADDLE_SWING=0.85;

// BUMPERS
var bumpers=[];
function initBumpers(){
  bumpers=[
    {x:TW/2,y:190,r:22,hue:0,flash:0,points:100,ox:0,oy:0},
    {x:TW/2-80,y:250,r:18,hue:120,flash:0,points:100,ox:0,oy:0},
    {x:TW/2+80,y:250,r:18,hue:240,flash:0,points:100,ox:0,oy:0},
    {x:TW/2-50,y:330,r:16,hue:60,flash:0,points:75,ox:0,oy:0},
    {x:TW/2+50,y:330,r:16,hue:300,flash:0,points:75,ox:0,oy:0},
    {x:TW/2,y:290,r:15,hue:180,flash:0,points:150,ox:0,oy:0}
  ];
}

// TARGETS
var targets=[];
function initTargets(){
  targets=[];
  for(var i=0;i<5;i++){
    targets.push({x:80+i*60,y:110,w:30,h:8,hit:false,hue:i*72,flash:0,points:200});
  }
}

// SLINGSHOTS
var slings=[
  {x:65,y:TH-180,side:'left',flash:0},
  {x:TW-65,y:TH-180,side:'right',flash:0}
];

// WALLS
var walls=[];
function initWalls(){
  walls=[
    {x1:30,y1:50,x2:30,y2:TH-140},
    {x1:30,y1:TH-140,x2:paddles[0].x-paddles[0].len*0.7,y2:paddles[0].y+10},
    {x1:TW-30,y1:50,x2:TW-30,y2:TH-140},
    {x1:TW-30,y1:TH-140,x2:paddles[1].x+paddles[1].len*0.7,y2:paddles[1].y+10},
    {x1:30,y1:50,x2:TW-30,y2:50},
    // launch lane
    {x1:TW-48,y1:50,x2:TW-48,y2:TH-50}
  ];
}

// GRAVITY DISTORTION GRID
var gridCols=20,gridRows=36,gridSpacing=TW/gridCols;
var gridPoints=[];
function initGrid(){
  gridPoints=[];
  for(var gy=0;gy<=gridRows;gy++){
    for(var gx=0;gx<=gridCols;gx++){
      gridPoints.push({bx:gx*gridSpacing,by:gy*gridSpacing,dx:0,dy:0});
    }
  }
}

function updateGrid(){
  if(!ball.active)return;
  var strength=8+ball.gravityWell*15;
  for(var i=0;i<gridPoints.length;i++){
    var gp=gridPoints[i];
    var ddx=ball.x-gp.bx,ddy=ball.y-gp.by;
    var d2=ddx*ddx+ddy*ddy;
    var d=Math.sqrt(d2);
    if(d<10)d=10;
    var force=strength/(d*0.8);
    if(force>6)force=6;
    gp.dx+=(ddx/d*force-gp.dx)*0.15;
    gp.dy+=(ddy/d*force-gp.dy)*0.15;
  }
}

// PARTICLES
var particles=[];
function spawnParticles(x,y,hue,count,speed){
  for(var i=0;i<count;i++){
    var a=Math.random()*Math.PI*2;
    var s=speed*(0.5+Math.random());
    particles.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:1,hue:hue,size:1.5+Math.random()*2});
  }
}

// SCORE POPUPS
var popups=[];
function showPopup(x,y,text,hue){popups.push({x:x,y:y,text:text,life:1,hue:hue});}

// INPUT
var keys={};
var touchL=false,touchR=false,touchSpring=false;
window.addEventListener('keydown',function(e){
  keys[e.key.toLowerCase()]=true;
  if(e.key===' '){
    e.preventDefault();
    if(gameState==='launch'&&!spring.charging){spring.charging=true;}
  }
});
window.addEventListener('keyup',function(e){
  keys[e.key.toLowerCase()]=false;
  if(e.key===' '&&gameState==='launch'&&spring.charging){
    releaseLaunch();
  }
});

C.addEventListener('touchstart',function(e){
  e.preventDefault();
  for(var i=0;i<e.touches.length;i++){
    var tx=e.touches[i].clientX, ty=e.touches[i].clientY;
    // bottom-right quadrant = spring launcher
    if(tx>W*0.7&&ty>H*0.6){
      touchSpring=true;
      if(gameState==='launch'&&!spring.charging) spring.charging=true;
    } else if(tx<W/2){touchL=true;}
    else{touchR=true;}
  }
},{passive:false});
C.addEventListener('touchend',function(e){
  // check if spring finger was released
  var springStillDown=false;
  touchL=false;touchR=false;
  for(var i=0;i<e.touches.length;i++){
    var tx=e.touches[i].clientX, ty=e.touches[i].clientY;
    if(tx>W*0.7&&ty>H*0.6) springStillDown=true;
    else if(tx<W/2) touchL=true;
    else touchR=true;
  }
  if(touchSpring&&!springStillDown){
    touchSpring=false;
    if(gameState==='launch'&&spring.charging) releaseLaunch();
  }
},{passive:false});

// GAME LOGIC
function resetBall(){
  ball.x=TW-39;ball.y=TH-100;
  ball.vx=0;ball.vy=0;
  ball.active=false;ball.trail=[];ball.gravityWell=0;
  spring.charge=0;spring.charging=false;
  gameState='launch';
}

function releaseLaunch(){
  if(gameState!=='launch')return;
  var power=spring.charge;
  if(power<0.1) power=0.1; // minimum launch
  spring.charging=false;
  // launch velocity based on charge — up the lane then curves left at top
  ball.vy=-(6+power*8);
  ball.vx=-0.3-power*0.5;
  ball.active=true;
  gameState='play';
  spawnParticles(ball.x,ball.y+10,60,8,2+power*3);
  spring.charge=0;
}

function addScore(pts,x,y,hue){
  combo++;comboTimer=2;
  var mult=Math.min(combo,5);
  var total=pts*mult;
  score+=total;
  ball.gravityWell=Math.min(ball.gravityWell+0.08,1);
  if(mult>1){
    document.getElementById('combo-display').textContent='x'+mult+' COMBO';
    document.getElementById('combo-display').classList.add('show');
  }
  document.getElementById('score-display').textContent=score;
  showPopup(x,y,'+'+total,hue);
}

function loseBall(){
  balls--;
  document.getElementById('balls-display').textContent='BALLS: '+balls;
  shakeTimer=0.3;
  if(balls<=0){
    gameState='over';
    if(score>hiScore){hiScore=score;localStorage.setItem('neon_pinball_hi',hiScore);}
    document.getElementById('final-score').textContent=score;
    document.getElementById('hi-score').textContent='HIGH SCORE: '+hiScore;
    document.getElementById('game-over').style.display='flex';
    loadLeaderboard();
    // restore name
    var saved=localStorage.getItem('neon_pinball_name');
    if(saved) document.getElementById('name-input').value=saved;
    document.getElementById('submit-btn').disabled=false;
  }else{
    combo=0;resetBall();
  }
}

function startGame(){
  score=0;balls=3;combo=0;
  document.getElementById('score-display').textContent='0';
  document.getElementById('balls-display').textContent='BALLS: 3';
  initBumpers();initTargets();initWalls();initGrid();
  particles=[];popups=[];
  resetBall();
}

// LEADERBOARD
async function loadLeaderboard(){
  var el=document.getElementById('lb-list');
  el.innerHTML='<div class="lb-row" style="justify-content:center;opacity:0.3">Loading...</div>';
  try{
    var {data,error}=await supabase.from('neon_pinball_scores').select('score,display_name,user_id').order('score',{ascending:false}).limit(10);
    if(error||!data){el.innerHTML='<div class="lb-row" style="justify-content:center;opacity:0.3">No scores yet</div>';return;}
    if(data.length===0){el.innerHTML='<div class="lb-row" style="justify-content:center;opacity:0.3">No scores yet</div>';return;}
    el.innerHTML=data.map(function(r,i){
      var isMe=currentUser&&r.user_id===currentUser.id;
      return '<div class="lb-row'+(isMe?' me':'')+'"><span class="lb-rank">'+(i+1)+'</span><span class="lb-name">'+(r.display_name||'Anon')+'</span><span class="lb-score">'+r.score+'</span></div>';
    }).join('');
  }catch(e){
    el.innerHTML='<div class="lb-row" style="justify-content:center;opacity:0.3">Error loading</div>';
  }
}

document.getElementById('submit-btn').addEventListener('click',async function(){
  var btn=this;
  var name=document.getElementById('name-input').value.trim()||'Anon';
  if(name.length>20) name=name.slice(0,20);
  localStorage.setItem('neon_pinball_name',name);
  btn.disabled=true;btn.textContent='...';
  try{
    if(!currentUser){var s=await supabaseSession();currentUser=s.user;}
    await supabase.from('neon_pinball_scores').insert([{score:score,display_name:name,user_id:currentUser.id}]);
    btn.textContent='SENT';
    loadLeaderboard();
  }catch(e){
    btn.textContent='ERROR';
    console.warn('Submit:',e);
  }
});

// COLLISION
function dist(ax,ay,bx,by){var dx=bx-ax,dy=by-ay;return Math.sqrt(dx*dx+dy*dy);}

function circleLineCollision(cx,cy,cr,x1,y1,x2,y2){
  var dx=x2-x1,dy=y2-y1;
  var len2=dx*dx+dy*dy;
  if(len2===0)return null;
  var t=((cx-x1)*dx+(cy-y1)*dy)/len2;
  t=Math.max(0,Math.min(1,t));
  var nx=x1+t*dx,ny=y1+t*dy;
  var d=dist(cx,cy,nx,ny);
  if(d<cr){
    var pen=cr-d;
    if(d===0)return{nx:0,ny:-1,pen:pen,px:nx,py:ny};
    var ndx=(cx-nx)/d,ndy=(cy-ny)/d;
    return{nx:ndx,ny:ndy,pen:pen,px:nx,py:ny};
  }
  return null;
}

// UPDATE
var t=0;
function update(dt){
  t+=dt;

  if(comboTimer>0){comboTimer-=dt;if(comboTimer<=0){combo=0;document.getElementById('combo-display').classList.remove('show');}}
  if(shakeTimer>0){shakeTimer-=dt;shakeX=(Math.random()-0.5)*6*shakeTimer;shakeY=(Math.random()-0.5)*6*shakeTimer;}
  else{shakeX=0;shakeY=0;}

  ball.gravityWell*=0.998;

  // paddles
  var lActive=keys['a']||keys['arrowleft']||touchL;
  var rActive=keys['d']||keys['arrowright']||touchR;
  paddles[0].active=lActive;
  paddles[1].active=rActive;

  for(var p=0;p<paddles.length;p++){
    var pad=paddles[p];
    var target=pad.active?PADDLE_SWING:0;
    var dir=pad.side==='left'?-1:1;
    var restAngle=pad.side==='left'?0.35:Math.PI-0.35;
    pad.angle+=(restAngle+dir*target-pad.angle)*0.2;
    pad.mag+=(pad.active?1:0-pad.mag)*5*dt;
    if(pad.mag>1)pad.mag=1;if(pad.mag<0)pad.mag=0;
  }

  // spring charging
  if(gameState==='launch'&&spring.charging){
    // heavy spring — starts slow, accelerates as tension builds
    var chargeRate=0.5+spring.charge*1.2; // ramps up from 0.5 to 1.7
    spring.charge+=dt*chargeRate;
    if(spring.charge>spring.maxCharge) spring.charge=spring.maxCharge;
    // ball compresses down onto spring
    ball.y=spring.restY+spring.charge*40;
  }

  // distort bumper positions
  for(var i=0;i<bumpers.length;i++){
    var b=bumpers[i];
    if(ball.active){
      var ddx=ball.x-b.x,ddy=ball.y-b.y;
      var dd=Math.sqrt(ddx*ddx+ddy*ddy);
      if(dd>10){
        var f=ball.gravityWell*3/(dd*0.5);if(f>4)f=4;
        b.ox+=(ddx/dd*f-b.ox)*0.08;
        b.oy+=(ddy/dd*f-b.oy)*0.08;
      }
    }else{b.ox*=0.95;b.oy*=0.95;}
  }

  updateGrid();

  if(gameState!=='play')return;

  // ball physics
  ball.vy+=GRAVITY;
  if(ball.vy>MAX_VY)ball.vy=MAX_VY;
  ball.x+=ball.vx;
  ball.y+=ball.vy;

  // trail
  ball.trail.push({x:ball.x,y:ball.y,life:1});
  if(ball.trail.length>35)ball.trail.shift();
  for(var i=0;i<ball.trail.length;i++)ball.trail[i].life-=dt*3;

  // bumpers
  for(var i=0;i<bumpers.length;i++){
    var b=bumpers[i];
    var bx=b.x+b.ox,by=b.y+b.oy;
    var d=dist(ball.x,ball.y,bx,by);
    if(d<ball.r+b.r){
      var nx=(ball.x-bx)/d,ny=(ball.y-by)/d;
      ball.x=bx+nx*(b.r+ball.r+1);
      ball.y=by+ny*(b.r+ball.r+1);
      var dot=ball.vx*nx+ball.vy*ny;
      ball.vx-=2*dot*nx;ball.vy-=2*dot*ny;
      var spd=Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy);
      if(spd<6){ball.vx*=6/spd;ball.vy*=6/spd;}
      b.flash=1;
      addScore(b.points,bx,by-b.r-10,b.hue);
      spawnParticles(ball.x,ball.y,b.hue,12,3);
      shakeTimer=0.1;
    }
    if(b.flash>0)b.flash-=dt*4;
  }

  // targets
  var allHit=true;
  for(var i=0;i<targets.length;i++){
    var tg=targets[i];
    if(tg.hit)continue;
    allHit=false;
    if(ball.x>tg.x-tg.w/2-ball.r&&ball.x<tg.x+tg.w/2+ball.r&&ball.y>tg.y-tg.h/2-ball.r&&ball.y<tg.y+tg.h/2+ball.r){
      tg.hit=true;tg.flash=1;
      ball.vy=Math.abs(ball.vy)*1.1;
      addScore(tg.points,tg.x,tg.y-15,tg.hue);
      spawnParticles(tg.x,tg.y,tg.hue,8,2);
    }
    if(tg.flash>0)tg.flash-=dt*3;
  }
  if(allHit){
    addScore(1000,TW/2,90,60);
    for(var i=0;i<targets.length;i++)targets[i].hit=false;
  }

  // slingshots
  for(var i=0;i<slings.length;i++){
    var sl=slings[i];
    var d=dist(ball.x,ball.y,sl.x,sl.y);
    if(d<ball.r+20){
      var nx=(ball.x-sl.x)/d,ny=(ball.y-sl.y)/d;
      ball.vx+=nx*4;ball.vy+=ny*4;
      ball.x=sl.x+nx*(20+ball.r+1);
      ball.y=sl.y+ny*(20+ball.r+1);
      sl.flash=1;
      addScore(50,sl.x,sl.y-20,180);
      spawnParticles(sl.x,sl.y,180,6,2);
    }
    if(sl.flash>0)sl.flash-=dt*3;
  }

  // walls
  for(var i=0;i<walls.length;i++){
    var w=walls[i];
    var col=circleLineCollision(ball.x,ball.y,ball.r,w.x1,w.y1,w.x2,w.y2);
    if(col){
      ball.x+=col.nx*col.pen;ball.y+=col.ny*col.pen;
      var dot=ball.vx*col.nx+ball.vy*col.ny;
      ball.vx-=1.8*dot*col.nx;ball.vy-=1.8*dot*col.ny;
    }
  }

  // paddles
  for(var p=0;p<paddles.length;p++){
    var pad=paddles[p];
    var px=pad.x,py=pad.y;
    var ex=px+Math.cos(pad.angle)*pad.len;
    var ey=py+Math.sin(pad.angle)*pad.len;
    var col=circleLineCollision(ball.x,ball.y,ball.r,px,py,ex,ey);
    if(col){
      ball.x+=col.nx*(col.pen+1);ball.y+=col.ny*(col.pen+1);
      var dot=ball.vx*col.nx+ball.vy*col.ny;
      ball.vx-=2*dot*col.nx;ball.vy-=2*dot*col.ny;
      var kick=pad.active?8:3;
      ball.vy-=kick;
      if(pad.side==='left')ball.vx+=kick*0.4;else ball.vx-=kick*0.4;
      spawnParticles(col.px,col.py,pad.side==='left'?180:300,6,2);
    }
    // magnetic pull
    if(pad.active){
      var midx=(px+ex)/2,midy=(py+ey)/2;
      var md=dist(ball.x,ball.y,midx,midy);
      if(md<100&&md>5){
        var pull=0.3*(1-md/100);
        ball.vx+=(midx-ball.x)/md*pull;
        ball.vy+=(midy-ball.y)/md*pull;
      }
    }
  }

  // bounds
  if(ball.y-ball.r<40){ball.y=40+ball.r;ball.vy=Math.abs(ball.vy)*0.7;}
  if(ball.x-ball.r<22){ball.x=22+ball.r;ball.vx=Math.abs(ball.vx)*0.8;}
  // right bound: if in launch lane (x > TW-48), use right wall; else normal bound
  var rightBound=(ball.x>TW-48&&ball.y>50)?TW-31:TW-22;
  if(ball.x+ball.r>rightBound){ball.x=rightBound-ball.r;ball.vx=-Math.abs(ball.vx)*0.8;}

  // drain
  if(ball.y>TH+20)loseBall();

  // particles
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;
    p.life-=dt*2.5;
    if(p.life<=0)particles.splice(i,1);
  }
  for(var i=popups.length-1;i>=0;i--){
    popups[i].y-=40*dt;
    popups[i].life-=dt*1.5;
    if(popups[i].life<=0)popups.splice(i,1);
  }
}

// DRAW
function draw(){
  X.clearRect(0,0,W,H);
  X.save();
  X.translate(ox+shakeX,oy+shakeY);
  X.scale(scale,scale);

  // background
  var bg=X.createLinearGradient(0,0,0,TH);
  bg.addColorStop(0,'#080818');bg.addColorStop(0.5,'#060612');bg.addColorStop(1,'#0a0a1a');
  X.fillStyle=bg;X.fillRect(0,0,TW,TH);

  // distortion grid
  X.strokeStyle='rgba(0,255,255,0.025)';X.lineWidth=0.5;
  var cols=gridCols+1;
  for(var gy=0;gy<=gridRows;gy++){
    X.beginPath();
    for(var gx=0;gx<=gridCols;gx++){
      var gp=gridPoints[gy*cols+gx];
      if(gx===0)X.moveTo(gp.bx+gp.dx,gp.by+gp.dy);
      else X.lineTo(gp.bx+gp.dx,gp.by+gp.dy);
    }
    X.stroke();
  }
  for(var gx=0;gx<=gridCols;gx++){
    X.beginPath();
    for(var gy=0;gy<=gridRows;gy++){
      var gp=gridPoints[gy*cols+gx];
      if(gy===0)X.moveTo(gp.bx+gp.dx,gp.by+gp.dy);
      else X.lineTo(gp.bx+gp.dx,gp.by+gp.dy);
    }
    X.stroke();
  }

  // gravity well visual
  if(ball.active&&ball.gravityWell>0.05){
    var wellR=40+ball.gravityWell*60;
    var wellAlpha=ball.gravityWell*0.12;
    var wg=X.createRadialGradient(ball.x,ball.y,ball.r,ball.x,ball.y,wellR);
    wg.addColorStop(0,'rgba(140,0,220,'+wellAlpha+')');
    wg.addColorStop(0.4,'rgba(80,0,180,'+wellAlpha*0.5+')');
    wg.addColorStop(0.7,'rgba(50,0,140,'+wellAlpha*0.2+')');
    wg.addColorStop(1,'rgba(30,0,100,0)');
    X.fillStyle=wg;X.beginPath();X.arc(ball.x,ball.y,wellR,0,Math.PI*2);X.fill();
    // radioactive inner pulse
    var pulseR=15+Math.sin(t*4)*5;
    var pg=X.createRadialGradient(ball.x,ball.y,0,ball.x,ball.y,pulseR);
    pg.addColorStop(0,'rgba(180,0,255,'+ball.gravityWell*0.2+')');
    pg.addColorStop(1,'rgba(120,0,200,0)');
    X.fillStyle=pg;X.beginPath();X.arc(ball.x,ball.y,pulseR,0,Math.PI*2);X.fill();
    X.strokeStyle='rgba(160,0,255,'+ball.gravityWell*0.2+')';X.lineWidth=0.7;
    for(var r=0;r<3;r++){
      var rr=15+r*15+Math.sin(t*2+r)*4;
      X.beginPath();X.arc(ball.x,ball.y,rr,0,Math.PI*2);X.stroke();
    }
  }

  // walls
  X.strokeStyle='rgba(0,255,255,0.15)';X.lineWidth=2;X.lineCap='round';
  for(var i=0;i<walls.length;i++){
    var w=walls[i];
    X.beginPath();X.moveTo(w.x1,w.y1);X.lineTo(w.x2,w.y2);X.stroke();
  }

  // spring launcher visual
  if(gameState==='launch'){
    var sy=spring.restY+spring.charge*40;
    var springAlpha=0.3+spring.charge*0.7;
    // spring coils
    X.strokeStyle='rgba(255,200,0,'+springAlpha+')';X.lineWidth=2;
    var coils=6;
    var springTop=sy;
    var springBot=TH-15;
    X.beginPath();
    for(var c=0;c<=coils*2;c++){
      var frac=c/(coils*2);
      var cx=spring.x+(c%2===0?-6:6);
      var cy=springTop+(springBot-springTop)*frac;
      if(c===0)X.moveTo(spring.x,springTop);
      else X.lineTo(cx,cy);
    }
    X.stroke();
    // plunger head — vibrates at high charge
    var vib=spring.charge>0.7?(Math.random()-0.5)*spring.charge*3:0;
    X.fillStyle='rgba(255,'+Math.floor(200-spring.charge*150)+',0,'+springAlpha+')';
    X.fillRect(spring.x-10+vib,sy-5,20,10);
    // plunger grip lines
    X.strokeStyle='rgba(255,160,0,'+(springAlpha*0.5)+')';X.lineWidth=1;
    for(var gl=0;gl<3;gl++){X.beginPath();X.moveTo(spring.x-6+vib,sy-3+gl*3);X.lineTo(spring.x+6+vib,sy-3+gl*3);X.stroke();}
    // charge bar (side indicator)
    if(spring.charge>0.01){
      var barHue=spring.charge>0.7?0:40; // turns red at high charge
      X.fillStyle='hsla('+barHue+',100%,50%,'+(0.3+spring.charge*0.5)+')';
      X.fillRect(TW-25,TH-180,6,160*spring.charge);
      // tension glow — intensifies dramatically
      var glowR=15+spring.charge*25;
      var cg=X.createRadialGradient(spring.x,sy,0,spring.x,sy,glowR);
      cg.addColorStop(0,'rgba(255,'+Math.floor(150-spring.charge*100)+',0,'+spring.charge*0.3+')');
      cg.addColorStop(1,'rgba(255,100,0,0)');
      X.fillStyle=cg;X.beginPath();X.arc(spring.x,sy,glowR,0,Math.PI*2);X.fill();
    }
  }

  // slingshots
  for(var i=0;i<slings.length;i++){
    var sl=slings[i];
    var a=sl.flash>0?0.6+sl.flash*0.4:0.3;
    var glow=X.createRadialGradient(sl.x,sl.y,0,sl.x,sl.y,25);
    glow.addColorStop(0,'rgba(0,255,255,'+a*0.3+')');glow.addColorStop(1,'rgba(0,255,255,0)');
    X.fillStyle=glow;X.beginPath();X.arc(sl.x,sl.y,25,0,Math.PI*2);X.fill();
    X.fillStyle='rgba(0,255,255,'+a+')';
    X.beginPath();
    if(sl.side==='left'){X.moveTo(sl.x-15,sl.y-20);X.lineTo(sl.x+10,sl.y);X.lineTo(sl.x-15,sl.y+20);}
    else{X.moveTo(sl.x+15,sl.y-20);X.lineTo(sl.x-10,sl.y);X.lineTo(sl.x+15,sl.y+20);}
    X.closePath();X.fill();
  }

  // bumpers
  for(var i=0;i<bumpers.length;i++){
    var b=bumpers[i];
    var bx=b.x+b.ox,by=b.y+b.oy;
    var brightness=0.4+b.flash*0.6;
    var g=X.createRadialGradient(bx,by,0,bx,by,b.r*2.5);
    g.addColorStop(0,'hsla('+b.hue+',100%,60%,'+brightness*0.2+')');
    g.addColorStop(1,'hsla('+b.hue+',100%,60%,0)');
    X.fillStyle=g;X.beginPath();X.arc(bx,by,b.r*2.5,0,Math.PI*2);X.fill();
    X.strokeStyle='hsla('+b.hue+',100%,65%,'+brightness+')';X.lineWidth=2.5;
    X.beginPath();X.arc(bx,by,b.r,0,Math.PI*2);X.stroke();
    X.fillStyle='hsla('+b.hue+',100%,70%,'+brightness*0.3+')';
    X.beginPath();X.arc(bx,by,b.r*0.6,0,Math.PI*2);X.fill();
    X.fillStyle='hsla('+b.hue+',100%,85%,'+brightness+')';
    X.beginPath();X.arc(bx,by,3,0,Math.PI*2);X.fill();
  }

  // targets
  for(var i=0;i<targets.length;i++){
    var tg=targets[i];
    var a=tg.hit?0.1:0.6+tg.flash*0.4;
    X.fillStyle='hsla('+tg.hue+',100%,60%,'+a+')';
    X.fillRect(tg.x-tg.w/2,tg.y-tg.h/2,tg.w,tg.h);
    if(!tg.hit){
      X.shadowColor='hsla('+tg.hue+',100%,60%,0.5)';X.shadowBlur=10;
      X.fillRect(tg.x-tg.w/2,tg.y-tg.h/2,tg.w,tg.h);
      X.shadowBlur=0;
    }
  }

  // paddles (magnetic beams)
  for(var p=0;p<paddles.length;p++){
    var pad=paddles[p];
    var px=pad.x,py=pad.y;
    var ex=px+Math.cos(pad.angle)*pad.len;
    var ey=py+Math.sin(pad.angle)*pad.len;
    var hue=pad.side==='left'?180:300;
    var mg=pad.mag;
    if(mg>0.05){
      var midx=(px+ex)/2,midy=(py+ey)/2;
      var fg=X.createRadialGradient(midx,midy,0,midx,midy,pad.len*0.8);
      fg.addColorStop(0,'hsla('+hue+',100%,60%,'+mg*0.12+')');
      fg.addColorStop(1,'hsla('+hue+',100%,60%,0)');
      X.fillStyle=fg;X.beginPath();X.arc(midx,midy,pad.len*0.8,0,Math.PI*2);X.fill();
      X.strokeStyle='hsla('+hue+',100%,70%,'+mg*0.15+')';X.lineWidth=0.5;
      for(var fl=0;fl<5;fl++){
        var frac=(fl+0.5)/5;
        var fx=px+(ex-px)*frac,fy=py+(ey-py)*frac;
        var fPhase=t*3+fl*1.2;
        X.beginPath();X.arc(fx,fy-8-Math.sin(fPhase)*6,4+Math.sin(fPhase)*2,0,Math.PI*2);X.stroke();
      }
    }
    X.strokeStyle='hsla('+hue+',100%,70%,'+(0.5+mg*0.5)+')';
    X.lineWidth=4+mg*2;X.lineCap='round';
    X.beginPath();X.moveTo(px,py);X.lineTo(ex,ey);X.stroke();
    X.strokeStyle='hsla('+hue+',100%,85%,'+(0.3+mg*0.4)+')';
    X.lineWidth=2;X.beginPath();X.moveTo(px,py);X.lineTo(ex,ey);X.stroke();
    X.fillStyle='hsla('+hue+',100%,80%,0.8)';
    X.beginPath();X.arc(px,py,4,0,Math.PI*2);X.fill();
    X.fillStyle='hsla('+hue+',100%,90%,'+(0.5+mg*0.5)+')';
    X.beginPath();X.arc(ex,ey,3+mg*2,0,Math.PI*2);X.fill();
  }

  // ball trail
  for(var i=0;i<ball.trail.length;i++){
    var tr=ball.trail[i];
    if(tr.life<=0)continue;
    var trHue=ball.gravityWell>0.2?285:190; // deeper violet trail
    X.fillStyle='hsla('+trHue+','+(ball.gravityWell>0.2?'90%':'100%')+',60%,'+tr.life*0.35+')';
    X.beginPath();X.arc(tr.x,tr.y,ball.r*tr.life*0.6,0,Math.PI*2);X.fill();
  }

  // ball
  if(ball.active||gameState==='launch'){
    var orbHue=190+ball.gravityWell*90; // shifts deeper into violet
    var bg2=X.createRadialGradient(ball.x,ball.y,0,ball.x,ball.y,ball.r*4);
    bg2.addColorStop(0,'hsla('+orbHue+',100%,60%,0.15)');
    bg2.addColorStop(0.5,'hsla('+orbHue+',100%,50%,0.05)');
    bg2.addColorStop(1,'hsla('+orbHue+',100%,50%,0)');
    X.fillStyle=bg2;X.beginPath();X.arc(ball.x,ball.y,ball.r*4,0,Math.PI*2);X.fill();
    var cg2=X.createRadialGradient(ball.x-2,ball.y-2,0,ball.x,ball.y,ball.r);
    cg2.addColorStop(0,'hsla('+orbHue+',80%,90%,0.95)');
    cg2.addColorStop(0.5,'hsla('+orbHue+',100%,65%,0.8)');
    cg2.addColorStop(1,'hsla('+orbHue+',100%,45%,0.4)');
    X.fillStyle=cg2;X.beginPath();X.arc(ball.x,ball.y,ball.r,0,Math.PI*2);X.fill();
    X.fillStyle='rgba(255,255,255,0.7)';
    X.beginPath();X.arc(ball.x-2,ball.y-2,ball.r*0.3,0,Math.PI*2);X.fill();
    var pulse=0.5+Math.sin(t*6)*0.5;
    X.strokeStyle='hsla('+orbHue+',100%,70%,'+pulse*0.3+')';X.lineWidth=1;
    X.beginPath();X.arc(ball.x,ball.y,ball.r+3+pulse*3,0,Math.PI*2);X.stroke();
  }

  // launch hint
  if(gameState==='launch'&&!spring.charging){
    var hintAlpha=0.2+Math.sin(t*3)*0.1;
    X.font='700 9px Orbitron,sans-serif';X.textAlign='center';
    X.fillStyle='rgba(255,200,0,'+hintAlpha+')';
    X.fillText('HOLD TO CHARGE',spring.x,TH-190);
  }

  // particles
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    X.fillStyle='hsla('+p.hue+',100%,70%,'+p.life*0.8+')';
    X.beginPath();X.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);X.fill();
  }

  // popups
  X.font='700 12px Orbitron,sans-serif';X.textAlign='center';
  for(var i=0;i<popups.length;i++){
    var pp=popups[i];
    X.fillStyle='hsla('+pp.hue+',100%,75%,'+pp.life+')';
    X.fillText(pp.text,pp.x,pp.y);
  }

  // drain zone
  var drainGlow=X.createLinearGradient(0,TH-30,0,TH);
  drainGlow.addColorStop(0,'rgba(255,0,80,0)');
  drainGlow.addColorStop(1,'rgba(255,0,80,0.08)');
  X.fillStyle=drainGlow;
  X.fillRect(paddles[0].x-20,TH-30,paddles[1].x-paddles[0].x+40,30);

  X.restore();
}

// LOOP
var lastTime=0;
function loop(now){
  var dt=Math.min((now-lastTime)/1000,0.033);
  lastTime=now;
  update(dt);draw();
  requestAnimationFrame(loop);
}

document.getElementById('start-btn').addEventListener('click',function(){
  document.getElementById('start-screen').style.display='none';
  startGame();
});
document.getElementById('restart-btn').addEventListener('click',function(){
  document.getElementById('game-over').style.display='none';
  startGame();
});

initBumpers();initTargets();initWalls();initGrid();
requestAnimationFrame(function(now){lastTime=now;loop(now);});
</script>
