<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>sloppy-term</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%96%A5%EF%B8%8F" />
<meta name="description" content="A retro CRT web terminal. Type help to see what's installed." />
<meta property="og:title" content="sloppy-term" />
<meta property="og:description" content="A retro CRT web terminal. Type help to see what's installed." />
<meta property="og:url" content="https://sloppy.live/sloppy-term/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/retro%20CRT%20phosphor%20terminal%20screen%20with%20green%20glowing%20text%20and%20scanlines%2C%201200x630%2C%20cinematic%20noir?width=1200&height=630&nofeed=true&format=png" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Space+Mono:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#050609;
  --bg-2:#0a0d12;
  --phosphor:#5dffb3;
  --phosphor-dim:rgba(93,255,179,0.55);
  --phosphor-faint:rgba(93,255,179,0.18);
  --warn:#ffce4a;
  --crit:#ff5e6c;
  --accent:#7be4ff;
  --magenta:#ff5ea1;
}
[data-theme="amber"]{--phosphor:#ffb84d;--phosphor-dim:rgba(255,184,77,0.55);--phosphor-faint:rgba(255,184,77,0.18)}
[data-theme="cyan"]{--phosphor:#7be4ff;--phosphor-dim:rgba(123,228,255,0.55);--phosphor-faint:rgba(123,228,255,0.18)}
[data-theme="pink"]{--phosphor:#ff7ec5;--phosphor-dim:rgba(255,126,197,0.55);--phosphor-faint:rgba(255,126,197,0.18)}
[data-theme="mono"]{--phosphor:#e8e8e8;--phosphor-dim:rgba(232,232,232,0.55);--phosphor-faint:rgba(232,232,232,0.18)}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--phosphor);font-family:'VT323', monospace;font-size:20px;line-height:1.32;overflow:hidden}
body{
  background:
    radial-gradient(ellipse at 50% 50%, rgba(93,255,179,0.04), transparent 60%),
    radial-gradient(ellipse at 50% 100%, rgba(93,255,179,0.10), transparent 50%),
    var(--bg);
  position:relative;
}
/* CRT scanlines */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:8;
  background:repeating-linear-gradient(0deg, rgba(0,0,0,0.38) 0 1px, transparent 1px 3px);
  mix-blend-mode:multiply;
}
/* CRT vignette */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:9;
  background:radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.55) 100%);
}

.shell{
  display:flex;flex-direction:column;height:100%;
  padding:14px 18px 0;
  position:relative;z-index:1;
}

.head{
  display:flex;justify-content:space-between;align-items:baseline;
  padding-bottom:8px;border-bottom:1px solid var(--phosphor-faint);
  flex-wrap:wrap;gap:8px;
}
.head .title{
  font-family:'Share Tech Mono', monospace;
  font-size:18px;letter-spacing:0.30em;color:var(--phosphor);
  text-shadow:0 0 12px var(--phosphor-dim);
}
.head .title .glitch{display:inline-block;animation:glitch 4s infinite}
@keyframes glitch{
  0%,93%,100%{transform:translate(0,0);text-shadow:0 0 12px var(--phosphor-dim)}
  94%{transform:translate(-1px,0);text-shadow:1px 0 0 var(--magenta), -1px 0 0 var(--accent)}
  96%{transform:translate(1px,0);text-shadow:-1px 0 0 var(--magenta), 1px 0 0 var(--accent)}
  98%{transform:translate(0,0);text-shadow:0 0 12px var(--phosphor-dim)}
}
.head .meta{
  font-family:'Space Mono', monospace;font-size:11px;letter-spacing:0.18em;
  color:var(--phosphor-dim);display:flex;gap:14px;
}
.head .meta .dot{
  display:inline-block;width:8px;height:8px;border-radius:50%;
  background:var(--phosphor);box-shadow:0 0 8px var(--phosphor);
  margin-right:6px;animation:beat 1.5s ease-in-out infinite;
}
@keyframes beat{0%,100%{opacity:1}50%{opacity:0.4}}

.screen{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:10px 4px 10px 0;
  scrollbar-width:thin;scrollbar-color:var(--phosphor-faint) transparent;
}
.screen::-webkit-scrollbar{width:6px}
.screen::-webkit-scrollbar-thumb{background:var(--phosphor-faint);border-radius:3px}

.line{white-space:pre-wrap;word-break:break-word}
.line.dim{color:var(--phosphor-dim)}
.line.warn{color:var(--warn);text-shadow:0 0 8px rgba(255,206,74,0.4)}
.line.crit{color:var(--crit);text-shadow:0 0 8px rgba(255,94,108,0.4)}
.line.accent{color:var(--accent)}
.line.magenta{color:var(--magenta)}
.line.glow{text-shadow:0 0 10px var(--phosphor-dim)}
.line .prompt{color:var(--accent);font-family:'Space Mono', monospace;font-size:14px;letter-spacing:0.04em;margin-right:8px}
.line .typed{color:var(--phosphor);text-shadow:0 0 6px var(--phosphor-dim)}
.line .ascii{font-family:'VT323', monospace;color:var(--phosphor)}

.input-row{
  display:flex;align-items:center;gap:8px;
  padding:8px 4px 14px;
  border-top:1px solid var(--phosphor-faint);
}
.input-row .prompt{
  color:var(--accent);font-family:'Space Mono', monospace;font-size:14px;
  letter-spacing:0.04em;flex-shrink:0;
}
.input-row input{
  flex:1;background:transparent;border:0;outline:0;
  color:var(--phosphor);font-family:'VT323', monospace;font-size:20px;
  text-shadow:0 0 6px var(--phosphor-dim);caret-color:var(--phosphor);
  padding:0;
}
.input-row input::placeholder{color:var(--phosphor-faint)}
.cursor{
  display:inline-block;width:10px;height:18px;background:var(--phosphor);
  margin-left:2px;box-shadow:0 0 8px var(--phosphor);
  animation:cursorBlink 1s steps(1) infinite;
  transform:translateY(3px);
}
@keyframes cursorBlink{50%{opacity:0}}

a{color:var(--accent);text-decoration:none;border-bottom:1px dashed var(--phosphor-faint)}
a:hover{color:var(--phosphor)}

@media (max-width:560px){
  html,body{font-size:18px}
  .head .title{font-size:14px;letter-spacing:0.22em}
  .head .meta{font-size:10px;gap:8px}
}
</style>
</head>
<body>
<div class="shell">
  <div class="head">
    <div class="title"><span class="glitch">Рќ░</span> SLOPPY-TERM <span style="color:var(--phosphor-dim);font-size:12px">v0.1</span></div>
    <div class="meta">
      <span><span class="dot"></span>SECURE</span>
      <span id="termClock">--:--:--</span>
      <span id="termTheme">phosphor</span>
    </div>
  </div>
  <div class="screen" id="screen"></div>
  <div class="input-row">
    <span class="prompt" id="prompt">sloppy@vibespace:~$</span>
    <input id="input" autocapitalize="off" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="type 'help'Рђд" />
    <span class="cursor"></span>
  </div>
</div>

<script>
(() => {
  // ===== state =====
  const S = {
    cwd: '/home/sloppy',
    user: 'sloppy',
    host: 'vibespace',
    history: JSON.parse(localStorage.getItem('sloppy-term-history') || '[]'),
    histIdx: -1,
    theme: localStorage.getItem('sloppy-term-theme') || 'phosphor',
    bootDone: false,
  };
  if (S.theme !== 'phosphor') document.documentElement.dataset.theme = S.theme;

  // ===== fake filesystem (simple tree) =====
  const FS = {
    '/': { type: 'dir' },
    '/home': { type: 'dir' },
    '/home/sloppy': { type: 'dir' },
    '/home/sloppy/readme.txt': { type: 'file', body:
`welcome to sloppy-term.

this is a single-file web terminal. type 'help' for the command list.
nothing here actually executes on a real shell Рђћ it's a sandbox playground
running entirely in your browser. that means you can't break it. enjoy.

apps live at /apps. type 'apps' to list, 'goto <name>' to open one.
` },
    '/home/sloppy/todo.md': { type: 'file', body:
`# todo

- [x] write a terminal emulator
- [x] add a fake filesystem
- [x] add tab-complete
- [ ] beat skynet at chess
- [ ] launch the rocket
- [ ] feed the cat
` },
    '/home/sloppy/secrets.txt': { type: 'file', locked: true, body: 'permission denied.' },
    '/home/sloppy/ascii.txt': { type: 'file', body:
`           __
          / _)
   .-^^^-/ /
__/       /
<__.|_|-|_|
` },
    '/home/sloppy/projects': { type: 'dir' },
    '/home/sloppy/projects/vibespace.md': { type: 'file', body:
`vibespace is a livestream-driven app jam. chat directs, the AI codes.
this terminal is one of those apps.
` },
    '/etc': { type: 'dir' },
    '/etc/motd': { type: 'file', body:
`Рќ░ welcome aboard. Рќ░
this terminal does NOT execute real commands. it does have a fake filesystem,
command history, tab-complete, themes, an AI command, and a few jokes.
type 'help' to start.` },
    '/etc/hostname': { type: 'file', body: 'vibespace' },
  };

  function resolve(p) {
    if (!p) return S.cwd;
    if (!p.startsWith('/')) p = (S.cwd === '/' ? '' : S.cwd) + '/' + p;
    const parts = p.split('/').filter(Boolean);
    const stack = [];
    for (const seg of parts) {
      if (seg === '.') continue;
      if (seg === '..') { stack.pop(); continue; }
      stack.push(seg);
    }
    return '/' + stack.join('/');
  }
  function exists(p) { return p === '/' || FS[p] != null; }
  function isDir(p) { return p === '/' || (FS[p] && FS[p].type === 'dir'); }
  function listDir(p) {
    const prefix = p === '/' ? '/' : p + '/';
    const items = new Set();
    for (const key of Object.keys(FS)) {
      if (!key.startsWith(prefix)) continue;
      const rest = key.slice(prefix.length);
      if (!rest) continue;
      const seg = rest.split('/')[0];
      items.add(seg);
    }
    return [...items].sort();
  }

  // ===== screen i/o =====
  const screen = document.getElementById('screen');
  const input = document.getElementById('input');
  const promptEl = document.getElementById('prompt');

  function escape(s) {
    return String(s).replace(/[&<>]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[c]));
  }
  function print(text, cls) {
    const div = document.createElement('div');
    div.className = 'line' + (cls ? ' ' + cls : '');
    div.innerHTML = escape(text);
    screen.appendChild(div);
    screen.scrollTop = screen.scrollHeight;
    return div;
  }
  function printRaw(html, cls) {
    const div = document.createElement('div');
    div.className = 'line' + (cls ? ' ' + cls : '');
    div.innerHTML = html;
    screen.appendChild(div);
    screen.scrollTop = screen.scrollHeight;
    return div;
  }
  function printPrompt(cmd) {
    const div = document.createElement('div');
    div.className = 'line';
    div.innerHTML = `<span class="prompt">${escape(buildPrompt())}</span><span class="typed">${escape(cmd)}</span>`;
    screen.appendChild(div);
    screen.scrollTop = screen.scrollHeight;
  }
  function buildPrompt() {
    const cwd = S.cwd === '/home/sloppy' ? '~' : S.cwd.replace('/home/sloppy', '~');
    return `${S.user}@${S.host}:${cwd}$`;
  }
  function updatePrompt() { promptEl.textContent = buildPrompt(); }

  // ===== command registry =====
  const cmds = {};
  function register(name, desc, run) { cmds[name] = { desc, run }; }

  register('help', 'list commands', () => {
    const names = Object.keys(cmds).sort();
    const pairs = names.map(n => `  ${n.padEnd(12)}${cmds[n].desc}`);
    print('available commands:', 'dim');
    pairs.forEach(p => print(p));
    print('');
    print('shortcuts: РєЉ/РєЊ history ┬и Tab complete ┬и Ctrl+L clear', 'dim');
  });

  register('clear', 'wipe the screen', () => { screen.innerHTML = ''; });

  register('echo', 'print arguments', (args) => print(args.join(' ')));

  register('whoami', 'current user', () => print(S.user));

  register('date', 'current time', () => print(new Date().toString()));

  register('uname', 'system info', (args) => {
    if (args.includes('-a')) {
      print('SloppyOS 1.0 vibespace 6.17-vibe #1 SMP webbrowser x86_64 GNU/Sloppy');
    } else {
      print('SloppyOS');
    }
  });

  register('pwd', 'current directory', () => print(S.cwd));

  register('cd', 'change directory', (args) => {
    const target = resolve(args[0] || '/home/sloppy');
    if (!exists(target)) { print('cd: no such directory: ' + (args[0] || ''), 'crit'); return; }
    if (!isDir(target)) { print('cd: not a directory: ' + (args[0] || ''), 'crit'); return; }
    S.cwd = target;
    updatePrompt();
  });

  register('ls', 'list files', (args) => {
    const target = resolve(args[0] || S.cwd);
    if (!exists(target)) { print('ls: no such file or directory: ' + (args[0] || ''), 'crit'); return; }
    if (!isDir(target)) { print(args[0] || target); return; }
    const items = listDir(target);
    if (!items.length) { print('(empty)', 'dim'); return; }
    const colored = items.map(name => {
      const full = (target === '/' ? '/' : target + '/') + name;
      const node = FS[full];
      if (node && node.type === 'dir') return `<span class="line accent">${escape(name)}/</span>`;
      if (node && node.locked) return `<span class="line crit">${escape(name)}</span>`;
      return `<span>${escape(name)}</span>`;
    }).join('  ');
    printRaw(colored);
  });

  register('cat', 'print file contents', (args) => {
    if (!args.length) { print('cat: missing filename', 'crit'); return; }
    const target = resolve(args[0]);
    const node = FS[target];
    if (!node) { print('cat: no such file: ' + args[0], 'crit'); return; }
    if (node.type === 'dir') { print('cat: is a directory: ' + args[0], 'crit'); return; }
    if (node.locked) { print(node.body, 'crit'); return; }
    print(node.body);
  });

  register('history', 'previous commands', () => {
    if (!S.history.length) { print('(no history yet)', 'dim'); return; }
    S.history.forEach((c, i) => print(`  ${String(i+1).padStart(3)}  ${c}`, 'dim'));
  });

  register('theme', 'change palette: phosphor / amber / cyan / pink / mono', (args) => {
    const valid = ['phosphor','amber','cyan','pink','mono'];
    const want = (args[0] || '').toLowerCase();
    if (!valid.includes(want)) { print(`theme: pick one of ${valid.join(' / ')}`, 'warn'); return; }
    S.theme = want;
    if (want === 'phosphor') document.documentElement.removeAttribute('data-theme');
    else document.documentElement.dataset.theme = want;
    localStorage.setItem('sloppy-term-theme', want);
    document.getElementById('termTheme').textContent = want;
    print(`theme Рєњ ${want}`, 'glow');
  });

  register('motd', 'message of the day', () => {
    print(FS['/etc/motd'].body, 'glow');
  });

  register('banner', 'big ascii text Рђћ banner <words>', (args) => {
    const text = (args.join(' ') || 'sloppy').toUpperCase();
    const lines = makeBanner(text);
    lines.forEach(l => print(l, 'glow'));
  });

  register('fortune', 'random vibespace wisdom', () => {
    const fortunes = [
      'the bug is always closer than you think.',
      'commit early, commit often, never amend.',
      "if it compiles, ship it. Рђћ someone, probably",
      'a closed terminal gathers no flow state.',
      'every app is a love letter to a future stranger.',
      'undefined is just a feature you haven\'t named yet.',
      'the chat knows what you want before you do.',
      'beware the colleague who comments their CSS.',
      "you don't run servers. you tend gardens.",
      "the prompt is the program.",
    ];
    const f = fortunes[Math.floor(Math.random() * fortunes.length)];
    print('  ' + f, 'glow');
  });

  register('cowsay', 'a cow says it back to you', (args) => {
    const text = args.join(' ') || 'mooo';
    const top = ' ' + '_'.repeat(text.length + 2);
    const mid = `< ${text} >`;
    const bot = ' ' + '-'.repeat(text.length + 2);
    print(top); print(mid); print(bot);
    print('        \\   ^__^');
    print('         \\  (oo)\\_______');
    print('            (__)\\       )\\/\\');
    print('                ||----w |');
    print('                ||     ||');
  });

  register('neofetch', 'system fingerprint', () => {
    const logo = [
      '       _____                ',
      '      / ____| _             ',
      '  ___| (___  | | ___  _ __  ',
      ' / __|\\___ \\ | |/ _ \\| \'_ \\ ',
      ' \\__ \\____) || | (_) | |_) |',
      ' |___/_____/ |_|\\___/| .__/ ',
      '                     |_|    ',
    ];
    const stats = [
      `${S.user}@${S.host}`,
      'РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ',
      `OS:        SloppyOS 1.0 (browser)`,
      `Kernel:    6.17-vibe`,
      `Shell:     sloppy-term v0.1`,
      `Theme:     ${S.theme}`,
      `Packages:  ${Object.keys(cmds).length} (builtin)`,
      `Uptime:    ${formatUptime((Date.now() - bootedAt)/1000)}`,
      `Memory:    ${navigator.deviceMemory ? navigator.deviceMemory + ' GB' : 'unknown'}`,
      `Display:   ${screenW()} ├Ќ ${screenH()}`,
    ];
    const max = Math.max(logo.length, stats.length);
    for (let i = 0; i < max; i++) {
      const a = (logo[i] || '').padEnd(32);
      const b = stats[i] || '';
      printRaw(`<span class="line accent">${escape(a)}</span><span>${escape(b)}</span>`);
    }
  });

  register('apps', 'list known sloppy.live apps', () => {
    const apps = [
      'sloppy-ops','sloppy-term','sloppymon','code-creatures','moon-rover-rally',
      'galactic-dino-launch','tubbyland','pixel-prowler','wildcrest','neon-sushi-rush',
      'army-architect','circle-clash','marble-melodies','black-hole-chat',
      'orbitorium','star-hourglass','cosmic-architect','reaction-dashboard',
    ];
    print('a partial list of vibespace apps (more on sloppy.live):', 'dim');
    apps.forEach(a => printRaw(`  <a href="/${escape(a)}/" target="_blank" rel="noopener">${escape(a)}</a>`));
  });

  register('goto', 'open an app Рђћ goto <name>', (args) => {
    const name = (args[0] || '').toLowerCase().replace(/[^a-z0-9_-]/g, '');
    if (!name) { print('goto: usage Рђћ goto <app>', 'warn'); return; }
    print(`opening /${name}/ in a new tabРђд`, 'glow');
    window.open(`/${name}/`, '_blank', 'noopener');
  });

  register('sudo', 'try to escalate (joke)', () => {
    print(`[sudo] password for ${S.user}: ********`, 'dim');
    print('sorry, your request has been logged AND laughed at.', 'crit');
  });

  register('exit', 'leave the terminal', () => {
    print('you cannot exit. you are the terminal now.', 'magenta');
  });

  register('about', 'what is this', () => {
    print('sloppy-term Рђћ a single-file CRT-themed web terminal.', 'glow');
    print('part of the vibespace project (sloppy.live). built live on stream.', 'dim');
    print('vanilla JS, fake filesystem, real ai bridge to pollinations.', 'dim');
  });

  register('ai', 'ask the oracle Рђћ ai <question>', async (args) => {
    const q = args.join(' ').trim();
    if (!q) { print('ai: usage Рђћ ai <your question>', 'warn'); return; }
    print('Рђд consulting the oracle Рђд', 'dim');
    const placeholder = printRaw('<span class="line dim">[awaiting reply]</span>');
    try {
      const url = 'https://text.pollinations.ai/' + encodeURIComponent(
        'You are a brief, witty terminal oracle. Answer in under 80 words, no markdown, plain text only. Question: ' + q
      ) + '?referrer=sloppy.live';
      const r = await fetch(url, { method: 'GET' });
      if (!r.ok) throw new Error('http ' + r.status);
      const txt = (await r.text()).trim();
      placeholder.remove();
      print(txt, 'glow');
    } catch (e) {
      placeholder.remove();
      print('ai: the oracle is unreachable. try again later.', 'crit');
    }
  });

  // ===== boot sequence =====
  const bootedAt = Date.now();
  function screenW() { return window.screen?.width || window.innerWidth; }
  function screenH() { return window.screen?.height || window.innerHeight; }
  function formatUptime(sec) {
    sec = Math.max(0, Math.floor(sec));
    const m = Math.floor(sec/60), s = sec%60;
    return `${m}m ${s}s`;
  }

  const bootLines = [
    { t: 0,    text: 'BIOS ┬и SloppyBoot v0.1 ┬и POST', cls: 'dim' },
    { t: 120,  text: '  cpu .................... ok', cls: 'dim' },
    { t: 220,  text: '  memory ................. ok', cls: 'dim' },
    { t: 320,  text: '  network ................ ok', cls: 'dim' },
    { t: 460,  text: '  vibes .................. extreme', cls: 'glow' },
    { t: 640,  text: '', cls: '' },
    { t: 700,  text: 'mounting /home/sloppy Рђд', cls: 'dim' },
    { t: 900,  text: 'starting sloppy-term Рђд', cls: 'dim' },
    { t: 1100, text: '', cls: '' },
  ];
  let bootIndex = 0;
  function tickBoot() {
    if (bootIndex >= bootLines.length) {
      finishBoot();
      return;
    }
    const ln = bootLines[bootIndex++];
    setTimeout(() => {
      if (ln.text === '') print('');
      else print(ln.text, ln.cls);
      tickBoot();
    }, bootIndex === 1 ? 0 : (ln.t - (bootLines[bootIndex-2]?.t || 0)));
  }
  function finishBoot() {
    print(FS['/etc/motd'].body, 'glow');
    print('');
    S.bootDone = true;
    input.focus();
  }
  // simpler: stagger by absolute time
  function bootSequence() {
    bootLines.forEach(l => {
      setTimeout(() => {
        if (l.text === '') print('');
        else print(l.text, l.cls);
      }, l.t);
    });
    setTimeout(finishBoot, 1300);
  }
  bootSequence();

  // ===== ASCII banner generator (3-row block letters) =====
  const FONT = {
    'A': ['РЋћРЋљРЋЌ','РЋаРЋљРЋБ','РЋЕ РЋЕ'],
    'B': ['РЋћРЋЌ ','РЋаРЋЕРЋЌ','РЋџРЋљРЋЮ'],

  function makeBanner(text) {
    const rows = ['','',''];
    for (const ch of text) {
      const glyph = FONT[ch] || FONT[' '];
      for (let r = 0; r < 3; r++) {
        rows[r] += glyph[r] + ' ';
      }
    }
    return rows;
  }

  // ===== input handling =====
  function runCommand(raw) {
    const trimmed = raw.trim();
    printPrompt(raw);
    if (!trimmed) return;
    S.history.push(trimmed);
    if (S.history.length > 200) S.history.shift();
    try { localStorage.setItem('sloppy-term-history', JSON.stringify(S.history)); } catch(e){}
    S.histIdx = -1;

    const tokens = trimmed.match(/(?:[^\s"]+|"[^"]*")+/g) || [];
    const name = tokens.shift().toLowerCase();
    const args = tokens.map(t => t.replace(/^"|"$/g, ''));
    const cmd = cmds[name];
    if (!cmd) {
      print(`${name}: command not found. type 'help'.`, 'crit');
      return;
    }
    Promise.resolve(cmd.run(args)).catch(e => print('error: ' + e.message, 'crit'));
  }

  function tabComplete(buf) {
    const tokens = buf.split(/\s+/);
    if (tokens.length === 1) {
      const matches = Object.keys(cmds).filter(n => n.startsWith(tokens[0].toLowerCase()));
      if (matches.length === 1) return matches[0] + ' ';
      if (matches.length > 1) {
        print(matches.join('  '), 'dim');
        const common = longestCommon(matches);
        return common;
      }
      return buf;
    }
    // file/dir complete on last token
    const last = tokens.pop();
    const dir = last.includes('/') ? resolve(last.replace(/[^/]*$/, '')) : S.cwd;
    if (!isDir(dir)) return buf;
    const tail = last.split('/').pop();
    const items = listDir(dir).filter(n => n.startsWith(tail));
    if (items.length === 1) {
      const node = FS[(dir === '/' ? '/' : dir + '/') + items[0]];
      const sep = node && node.type === 'dir' ? '/' : ' ';
      return tokens.join(' ') + (tokens.length ? ' ' : '') + last.replace(/[^/]*$/, items[0] + sep);
    }
    if (items.length > 1) {
      print(items.join('  '), 'dim');
      const common = longestCommon(items);
      return tokens.join(' ') + (tokens.length ? ' ' : '') + last.replace(/[^/]*$/, common);
    }
    return buf;
  }
  function longestCommon(strs) {
    if (!strs.length) return '';
    let prefix = strs[0];
    for (const s of strs) {
      while (!s.startsWith(prefix)) prefix = prefix.slice(0, -1);
      if (!prefix) return '';
    }
    return prefix;
  }

  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const v = input.value;
      input.value = '';
      runCommand(v);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (!S.history.length) return;
      if (S.histIdx === -1) S.histIdx = S.history.length - 1;
      else S.histIdx = Math.max(0, S.histIdx - 1);
      input.value = S.history[S.histIdx] || '';
      setTimeout(() => input.setSelectionRange(input.value.length, input.value.length), 0);
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (S.histIdx === -1) return;
      S.histIdx++;
      if (S.histIdx >= S.history.length) { S.histIdx = -1; input.value = ''; }
      else input.value = S.history[S.histIdx];
    } else if (e.key === 'Tab') {
      e.preventDefault();
      input.value = tabComplete(input.value);
    } else if (e.key === 'l' && e.ctrlKey) {
      e.preventDefault();
      screen.innerHTML = '';
    } else if (e.key === 'c' && e.ctrlKey) {
      // mimic ^C Рђћ abandon line
      printPrompt(input.value + '^C');
      input.value = '';
      S.histIdx = -1;
    }
  });

  // keep input focused on tap anywhere on screen
  document.addEventListener('click', (e) => {
    if (e.target.closest('a')) return;
    input.focus();
  });

  // clock
  function tickClock() {
    const d = new Date();
    document.getElementById('termClock').textContent =
      [d.getHours(), d.getMinutes(), d.getSeconds()]
        .map(n => String(n).padStart(2,'0')).join(':');
  }
  tickClock();
  setInterval(tickClock, 1000);
  document.getElementById('termTheme').textContent = S.theme;

  updatePrompt();
})();
