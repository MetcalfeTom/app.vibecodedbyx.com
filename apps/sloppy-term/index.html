<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>term.xyz</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%96%A5%EF%B8%8F" />
<meta name="description" content="A retro CRT web terminal with sandboxed file explorer, app launcher, and tabs." />
<meta property="og:title" content="term.xyz" />
<meta property="og:description" content="A retro CRT web terminal with sandboxed file explorer, app launcher, and tabs." />
<meta property="og:url" content="https://sloppy.live/sloppy-term/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/retro%20CRT%20phosphor%20terminal%20with%20file%20explorer%20panel%20and%20app%20launcher%2C%20glowing%20green%20text%20on%20deep%20black%2C%201200x630?width=1200&height=630&nofeed=true&format=png" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Space+Mono:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
<style>
:root{
  --bg:#050609;
  --bg-2:#0a0d12;
  --bg-panel:#070a10;
  --phosphor:#5dffb3;
  --phosphor-dim:rgba(93,255,179,0.55);
  --phosphor-faint:rgba(93,255,179,0.18);
  --phosphor-bare:rgba(93,255,179,0.08);
  --warn:#ffce4a;
  --crit:#ff5e6c;
  --accent:#7be4ff;
  --magenta:#ff5ea1;
}
[data-theme="amber"]{--phosphor:#ffb84d;--phosphor-dim:rgba(255,184,77,0.55);--phosphor-faint:rgba(255,184,77,0.18);--phosphor-bare:rgba(255,184,77,0.08)}
[data-theme="cyan"]{--phosphor:#7be4ff;--phosphor-dim:rgba(123,228,255,0.55);--phosphor-faint:rgba(123,228,255,0.18);--phosphor-bare:rgba(123,228,255,0.08)}
[data-theme="pink"]{--phosphor:#ff7ec5;--phosphor-dim:rgba(255,126,197,0.55);--phosphor-faint:rgba(255,126,197,0.18);--phosphor-bare:rgba(255,126,197,0.08)}
[data-theme="mono"]{--phosphor:#e8e8e8;--phosphor-dim:rgba(232,232,232,0.55);--phosphor-faint:rgba(232,232,232,0.18);--phosphor-bare:rgba(232,232,232,0.08)}

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--phosphor);font-family:'VT323', monospace;font-size:19px;line-height:1.34;overflow:hidden}
body{
  background:
    radial-gradient(ellipse at 50% 50%, rgba(93,255,179,0.04), transparent 60%),
    radial-gradient(ellipse at 50% 100%, rgba(93,255,179,0.08), transparent 55%),
    var(--bg);
  position:relative;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:50;
  background:repeating-linear-gradient(0deg, rgba(0,0,0,0.36) 0 1px, transparent 1px 3px);
  mix-blend-mode:multiply;
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:51;
  background:radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.55) 100%);
}

/* ===== layout ===== */
.shell{
  display:grid;
  grid-template-rows:auto auto 1fr;
  grid-template-columns:220px 1fr 200px;
  grid-template-areas:
    "head head head"
    "tabs tabs tabs"
    "side term apps";
  height:100vh;
  position:relative;z-index:1;
  gap:0;
}
.head{
  grid-area:head;
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 16px;border-bottom:1px solid var(--phosphor-faint);
  flex-wrap:wrap;gap:8px;
}
.head .title{
  font-family:'Share Tech Mono', monospace;
  font-size:18px;letter-spacing:0.30em;color:var(--phosphor);
  text-shadow:0 0 12px var(--phosphor-dim);
  display:flex;align-items:center;gap:8px;
}
.head .title .glitch{display:inline-block;animation:glitch 4s infinite}
.head .title .v{font-size:11px;color:var(--phosphor-dim);letter-spacing:0.2em}
@keyframes glitch{
  0%,93%,100%{transform:translate(0,0)}
  94%{transform:translate(-1px,0);text-shadow:1px 0 0 var(--magenta), -1px 0 0 var(--accent)}
  96%{transform:translate(1px,0);text-shadow:-1px 0 0 var(--magenta), 1px 0 0 var(--accent)}
}
.head .meta{
  font-family:'Space Mono', monospace;font-size:11px;letter-spacing:0.18em;
  color:var(--phosphor-dim);display:flex;gap:14px;align-items:center;
}
.head .meta .dot{
  display:inline-block;width:8px;height:8px;border-radius:50%;
  background:var(--phosphor);box-shadow:0 0 8px var(--phosphor);
  margin-right:6px;animation:beat 1.5s ease-in-out infinite;
}
@keyframes beat{0%,100%{opacity:1}50%{opacity:0.4}}
.head .icbtn{
  background:transparent;border:1px solid var(--phosphor-faint);
  color:var(--phosphor-dim);font-family:'Space Mono', monospace;
  font-size:11px;letter-spacing:0.16em;padding:4px 8px;border-radius:2px;
  cursor:pointer;transition:all 0.15s;display:none;
}
.head .icbtn:hover{color:var(--phosphor);border-color:var(--phosphor-dim)}

/* ===== tabs ===== */
.tabbar{
  grid-area:tabs;
  display:flex;align-items:flex-end;gap:0;
  padding:0 12px;
  border-bottom:1px solid var(--phosphor-faint);
  background:linear-gradient(180deg, transparent, rgba(93,255,179,0.02));
  overflow-x:auto;scrollbar-width:none;
}
.tabbar::-webkit-scrollbar{display:none}
.tab{
  display:inline-flex;align-items:center;gap:6px;
  padding:6px 12px 5px;border:1px solid var(--phosphor-faint);
  border-bottom:0;border-radius:3px 3px 0 0;
  background:rgba(93,255,179,0.02);
  font-family:'Space Mono', monospace;font-size:11px;letter-spacing:0.10em;
  color:var(--phosphor-dim);cursor:pointer;
  margin-right:2px;margin-top:5px;
  transition:all 0.15s;white-space:nowrap;
  position:relative;top:1px;
}
.tab:hover{color:var(--phosphor)}
.tab.active{
  background:var(--bg);color:var(--phosphor);
  border-color:var(--phosphor-dim);
  box-shadow:0 -2px 0 0 var(--phosphor) inset;
}
.tab .x{
  margin-left:4px;color:var(--phosphor-dim);
  cursor:pointer;font-size:13px;line-height:1;
  width:14px;height:14px;display:inline-flex;align-items:center;justify-content:center;
  border-radius:2px;
}
.tab .x:hover{color:var(--crit);background:rgba(255,94,108,0.10)}
.tab-add{
  border:1px dashed var(--phosphor-faint);background:transparent;
  color:var(--phosphor-dim);
  font-family:'Space Mono', monospace;font-size:13px;
  padding:4px 11px;border-radius:3px 3px 0 0;cursor:pointer;
  margin-top:5px;transition:all 0.15s;
}
.tab-add:hover{color:var(--phosphor);border-color:var(--phosphor-dim)}

/* ===== explorer ===== */
.side{
  grid-area:side;
  border-right:1px solid var(--phosphor-faint);
  background:var(--bg-panel);
  overflow:hidden;display:flex;flex-direction:column;
}
.side-head{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 12px;border-bottom:1px solid var(--phosphor-faint);
  font-family:'Space Mono', monospace;font-size:10px;letter-spacing:0.28em;
  color:var(--phosphor-dim);
}
.tree{
  flex:1;overflow-y:auto;padding:6px 0;
  scrollbar-width:thin;scrollbar-color:var(--phosphor-faint) transparent;
  font-family:'VT323', monospace;font-size:17px;
}
.tree::-webkit-scrollbar{width:4px}
.tree::-webkit-scrollbar-thumb{background:var(--phosphor-faint);border-radius:2px}
.tnode{
  padding:2px 12px 2px 0;cursor:pointer;
  white-space:nowrap;display:flex;align-items:center;gap:4px;
  color:var(--phosphor-dim);transition:color 0.1s, background 0.1s;
}
.tnode:hover{color:var(--phosphor);background:var(--phosphor-bare)}
.tnode.dir{color:var(--phosphor)}
.tnode.locked{color:var(--crit)}
.tnode .ic{width:10px;text-align:center;flex-shrink:0;color:var(--phosphor-dim);font-size:13px}
.tnode .name{overflow:hidden;text-overflow:ellipsis;flex:1}

/* ===== terminal ===== */
.term{
  grid-area:term;
  display:flex;flex-direction:column;
  min-width:0;overflow:hidden;
  border-right:1px solid var(--phosphor-faint);
  position:relative;
}
.screen{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:12px 16px 12px;
  scrollbar-width:thin;scrollbar-color:var(--phosphor-faint) transparent;
}
.screen::-webkit-scrollbar{width:6px}
.screen::-webkit-scrollbar-thumb{background:var(--phosphor-faint);border-radius:3px}
.line{white-space:pre-wrap;word-break:break-word}
.line.dim{color:var(--phosphor-dim)}
.line.warn{color:var(--warn);text-shadow:0 0 8px rgba(255,206,74,0.4)}
.line.crit{color:var(--crit);text-shadow:0 0 8px rgba(255,94,108,0.4)}
.line.accent{color:var(--accent)}
.line.magenta{color:var(--magenta)}
.line.glow{text-shadow:0 0 10px var(--phosphor-dim)}
.line .prompt{color:var(--accent);font-family:'Space Mono', monospace;font-size:13px;letter-spacing:0.04em;margin-right:8px}
.line .typed{color:var(--phosphor);text-shadow:0 0 6px var(--phosphor-dim)}
.line a{color:var(--accent);text-decoration:none;border-bottom:1px dashed var(--phosphor-faint)}
.line a:hover{color:var(--phosphor)}

.input-row{
  display:flex;align-items:center;gap:8px;
  padding:8px 16px 12px;
  border-top:1px solid var(--phosphor-faint);
}
.input-row .prompt{
  color:var(--accent);font-family:'Space Mono', monospace;font-size:13px;
  letter-spacing:0.04em;flex-shrink:0;
}
.input-row input{
  flex:1;background:transparent;border:0;outline:0;
  color:var(--phosphor);font-family:'VT323', monospace;font-size:19px;
  text-shadow:0 0 6px var(--phosphor-dim);caret-color:var(--phosphor);padding:0;
}
.input-row input::placeholder{color:var(--phosphor-faint)}
.cursor{
  display:inline-block;width:10px;height:18px;background:var(--phosphor);
  margin-left:2px;box-shadow:0 0 8px var(--phosphor);
  animation:cursorBlink 1s steps(1) infinite;transform:translateY(3px);
}
@keyframes cursorBlink{50%{opacity:0}}

/* ===== launcher ===== */
.launcher{
  grid-area:apps;
  background:var(--bg-panel);
  display:flex;flex-direction:column;overflow:hidden;
}
.launcher-head{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 12px;border-bottom:1px solid var(--phosphor-faint);
  font-family:'Space Mono', monospace;font-size:10px;letter-spacing:0.28em;
  color:var(--phosphor-dim);
}
.launcher input.search{
  background:transparent;border:0;border-bottom:1px solid var(--phosphor-faint);
  color:var(--phosphor);font-family:'VT323', monospace;font-size:16px;
  padding:6px 12px 5px;outline:none;
}
.launcher input.search:focus{border-bottom-color:var(--phosphor)}
.launcher input.search::placeholder{color:var(--phosphor-faint)}
.launcher-list{
  flex:1;overflow-y:auto;padding:4px 0;
  scrollbar-width:thin;scrollbar-color:var(--phosphor-faint) transparent;
}
.launcher-list::-webkit-scrollbar{width:4px}
.launcher-list::-webkit-scrollbar-thumb{background:var(--phosphor-faint);border-radius:2px}
.app-row{
  display:flex;align-items:center;gap:8px;
  padding:5px 12px;cursor:pointer;
  font-family:'VT323', monospace;font-size:16px;color:var(--phosphor-dim);
  transition:all 0.1s;
  border-left:2px solid transparent;
}
.app-row:hover{
  color:var(--phosphor);background:var(--phosphor-bare);
  border-left-color:var(--phosphor);
}
.app-row .ic{width:14px;text-align:center;color:var(--accent);font-size:12px;flex-shrink:0}
.app-row .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.app-row .ext{color:var(--phosphor-faint);font-size:11px;letter-spacing:0.1em}

/* ===== mobile overlays ===== */
@media (max-width:880px){
  .shell{
    grid-template-columns:1fr;
    grid-template-areas:"head" "tabs" "term";
  }
  .head .icbtn{display:inline-flex}
  .side, .launcher{
    position:fixed;top:0;bottom:0;width:80vw;max-width:300px;z-index:60;
    transform:translateX(-100%);transition:transform 0.25s ease;
    box-shadow:0 0 40px rgba(0,0,0,0.6);
  }
  .side{left:0;border-right:1px solid var(--phosphor-dim);background:var(--bg)}
  .launcher{right:0;left:auto;transform:translateX(100%);border-left:1px solid var(--phosphor-dim);background:var(--bg)}
  .side.open{transform:translateX(0)}
  .launcher.open{transform:translateX(0)}
  .term{border-right:0}
  .head .meta{font-size:10px;gap:8px}
}
</style>
</head>
<body>
<div class="shell">
  <div class="head">
    <div class="title">
      <button class="icbtn" id="btnSide">☰ FS</button>
      <span class="glitch">▰</span>TERM<span style="color:var(--accent)">.</span>XYZ
      <span class="v">v0.2</span>
      <button class="icbtn" id="btnApps">⊞ APPS</button>
    </div>
    <div class="meta">
      <span><span class="dot"></span>SECURE</span>
      <span id="termClock">--:--:--</span>
      <span id="termTheme">phosphor</span>
    </div>
  </div>

  <div class="tabbar" id="tabbar"></div>

  <aside class="side" id="side">
    <div class="side-head">▸ EXPLORER<span style="color:var(--phosphor-faint)" id="cwdLabel">~</span></div>
    <div class="tree" id="tree"></div>
  </aside>

  <main class="term">
    <div class="screen" id="screen"></div>
    <div class="input-row">
      <span class="prompt" id="prompt">$</span>
      <input id="input" autocapitalize="off" autocomplete="off" autocorrect="off" spellcheck="false" placeholder="type 'help'…" />
      <span class="cursor"></span>
    </div>
  </main>

  <aside class="launcher" id="launcher">
    <div class="launcher-head">⊞ APPS<span id="launcherCount">—</span></div>
    <input class="search" id="appSearch" placeholder="filter…" />
    <div class="launcher-list" id="appList"></div>
  </aside>
</div>

<script>
(() => {
  // ===== fake filesystem =====
  const FS = {
    '/': { type: 'dir' },
    '/home': { type: 'dir' },
    '/home/sloppy': { type: 'dir' },
    '/home/sloppy/readme.txt': { type: 'file', body:
`welcome to term.xyz.

a single-file web terminal with a sandboxed file explorer (left), an app launcher (right),
and tabs above. nothing actually executes on a real shell — but you have ~25 builtins,
history, tab-complete, themes, and even an AI bridge.

click files in the explorer to cat them. click apps in the launcher to open them.
type 'help' to see all commands.` },
    '/home/sloppy/todo.md': { type: 'file', body:
`# todo
- [x] write a terminal emulator
- [x] add a fake filesystem
- [x] add tab-complete
- [x] add tabs, file explorer, app launcher
- [ ] beat skynet at chess
- [ ] launch the rocket
- [ ] feed the cat` },
    '/home/sloppy/secrets.txt': { type: 'file', locked: true, body: 'permission denied.' },
    '/home/sloppy/ascii.txt': { type: 'file', body:
`           __
          / _)
   .-^^^-/ /
__/       /
<__.|_|-|_|
` },
    '/home/sloppy/projects': { type: 'dir' },
    '/home/sloppy/projects/vibespace.md': { type: 'file', body:
`vibespace is a livestream-driven app jam. chat directs, the AI codes.
this terminal is one of those apps.` },
    '/home/sloppy/projects/notes.txt': { type: 'file', body:
`scratch notes. nothing important. yet.` },
    '/etc': { type: 'dir' },
    '/etc/motd': { type: 'file', body:
`▰ welcome to term.xyz ▰
sandboxed CRT terminal. type 'help' to start. click files in the explorer.
press Ctrl+T for a new tab. open apps from the launcher panel on the right.` },
    '/etc/hostname': { type: 'file', body: 'vibespace' },
    '/etc/shells': { type: 'file', body: '/bin/sloppy-shell\n/bin/term.xyz' },
  };

  function resolve(cwd, p) {
    if (!p) return cwd;
    if (p === '~') return '/home/sloppy';
    if (p.startsWith('~/')) p = '/home/sloppy' + p.slice(1);
    if (!p.startsWith('/')) p = (cwd === '/' ? '' : cwd) + '/' + p;
    const parts = p.split('/').filter(Boolean);
    const stack = [];
    for (const seg of parts) {
      if (seg === '.') continue;
      if (seg === '..') { stack.pop(); continue; }
      stack.push(seg);
    }
    return '/' + stack.join('/');
  }
  const exists = p => p === '/' || FS[p] != null;
  const isDir = p => p === '/' || (FS[p] && FS[p].type === 'dir');
  function listDir(p) {
    const prefix = p === '/' ? '/' : p + '/';
    const items = new Set();
    for (const key of Object.keys(FS)) {
      if (!key.startsWith(prefix)) continue;
      const rest = key.slice(prefix.length);
      if (!rest) continue;
      const seg = rest.split('/')[0];
      items.add(seg);
    }
    return [...items].sort();
  }
  function escape(s) {
    return String(s).replace(/[&<>]/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;' }[c]));
  }

  // ===== sessions / tabs =====
  let nextTabId = 1;
  const sessions = new Map();   // id -> { id, cwd, history, histIdx, screenHTML }
  let activeId = null;

  function makeSession() {
    const id = nextTabId++;
    sessions.set(id, {
      id,
      cwd: '/home/sloppy',
      history: [],
      histIdx: -1,
      screenHTML: '',
    });
    return id;
  }
  function activeSession() { return sessions.get(activeId); }

  // ===== UI refs =====
  const screen = document.getElementById('screen');
  const input = document.getElementById('input');
  const promptEl = document.getElementById('prompt');
  const tabbar = document.getElementById('tabbar');
  const tree = document.getElementById('tree');
  const cwdLabel = document.getElementById('cwdLabel');
  const sideEl = document.getElementById('side');
  const launcherEl = document.getElementById('launcher');
  const appList = document.getElementById('appList');
  const appSearch = document.getElementById('appSearch');
  const launcherCount = document.getElementById('launcherCount');

  function buildPrompt() {
    const s = activeSession();
    if (!s) return '$';
    const cwd = s.cwd === '/home/sloppy' ? '~' : s.cwd.replace('/home/sloppy', '~');
    return `sloppy@vibespace:${cwd}$`;
  }
  function updatePromptUI() {
    promptEl.textContent = buildPrompt();
    cwdLabel.textContent = (activeSession()?.cwd || '/').replace('/home/sloppy', '~') || '/';
    renderTabs();
  }

  function print(text, cls) {
    const div = document.createElement('div');
    div.className = 'line' + (cls ? ' ' + cls : '');
    div.innerHTML = escape(text);
    screen.appendChild(div);
    screen.scrollTop = screen.scrollHeight;
    return div;
  }
  function printRaw(html, cls) {
    const div = document.createElement('div');
    div.className = 'line' + (cls ? ' ' + cls : '');
    div.innerHTML = html;
    screen.appendChild(div);
    screen.scrollTop = screen.scrollHeight;
    return div;
  }
  function printPrompt(cmd) {
    const div = document.createElement('div');
    div.className = 'line';
    div.innerHTML = `<span class="prompt">${escape(buildPrompt())}</span><span class="typed">${escape(cmd)}</span>`;
    screen.appendChild(div);
    screen.scrollTop = screen.scrollHeight;
  }

  // ===== command registry =====
  const cmds = {};
  const reg = (name, desc, run) => { cmds[name] = { desc, run }; };

  reg('help', 'list commands', () => {
    print('available commands:', 'dim');
    Object.keys(cmds).sort().forEach(n => print(`  ${n.padEnd(11)} ${cmds[n].desc}`));
    print('');
    print('shortcuts: ↑/↓ history · Tab complete · Ctrl+L clear · Ctrl+T new tab · Ctrl+W close tab', 'dim');
  });
  reg('clear', 'wipe the screen', () => { screen.innerHTML = ''; });
  reg('echo', 'print arguments', a => print(a.join(' ')));
  reg('whoami', 'current user', () => print('sloppy'));
  reg('date', 'current time', () => print(new Date().toString()));
  reg('uname', 'system info', a => print(a.includes('-a') ? 'SloppyOS 1.0 vibespace 6.17-vibe #1 SMP webbrowser x86_64 GNU/Sloppy' : 'SloppyOS'));
  reg('pwd', 'current directory', () => print(activeSession().cwd));
  reg('cd', 'change directory', a => {
    const s = activeSession();
    const target = resolve(s.cwd, a[0] || '/home/sloppy');
    if (!exists(target)) { print('cd: no such directory: ' + (a[0] || ''), 'crit'); return; }
    if (!isDir(target)) { print('cd: not a directory: ' + (a[0] || ''), 'crit'); return; }
    s.cwd = target; updatePromptUI(); renderTree();
  });
  reg('ls', 'list files', a => {
    const s = activeSession();
    const target = resolve(s.cwd, a[0] || s.cwd);
    if (!exists(target)) { print('ls: no such file or directory: ' + (a[0] || ''), 'crit'); return; }
    if (!isDir(target)) { print(a[0] || target); return; }
    const items = listDir(target);
    if (!items.length) { print('(empty)', 'dim'); return; }
    const out = items.map(name => {
      const full = (target === '/' ? '/' : target + '/') + name;
      const node = FS[full];
      if (node && node.type === 'dir') return `<span class="line accent">${escape(name)}/</span>`;
      if (node && node.locked) return `<span class="line crit">${escape(name)}</span>`;
      return `<span>${escape(name)}</span>`;
    }).join('  ');
    printRaw(out);
  });
  reg('cat', 'print file contents', a => {
    if (!a.length) { print('cat: missing filename', 'crit'); return; }
    const s = activeSession();
    const target = resolve(s.cwd, a[0]);
    const node = FS[target];
    if (!node) { print('cat: no such file: ' + a[0], 'crit'); return; }
    if (node.type === 'dir') { print('cat: is a directory: ' + a[0], 'crit'); return; }
    if (node.locked) { print(node.body, 'crit'); return; }
    print(node.body);
  });
  reg('history', 'previous commands', () => {
    const s = activeSession();
    if (!s.history.length) { print('(no history yet)', 'dim'); return; }
    s.history.forEach((c, i) => print(`  ${String(i+1).padStart(3)}  ${c}`, 'dim'));
  });
  reg('theme', 'palette: phosphor / amber / cyan / pink / mono', a => {
    const valid = ['phosphor','amber','cyan','pink','mono'];
    const want = (a[0] || '').toLowerCase();
    if (!valid.includes(want)) { print(`theme: pick one of ${valid.join(' / ')}`, 'warn'); return; }
    if (want === 'phosphor') document.documentElement.removeAttribute('data-theme');
    else document.documentElement.dataset.theme = want;
    localStorage.setItem('term-xyz-theme', want);
    document.getElementById('termTheme').textContent = want;
    print(`theme → ${want}`, 'glow');
  });
  reg('motd', 'message of the day', () => print(FS['/etc/motd'].body, 'glow'));
  reg('fortune', 'random vibespace wisdom', () => {
    const F = [
      'the bug is always closer than you think.',
      'commit early, commit often, never amend.',
      "if it compiles, ship it.",
      'a closed terminal gathers no flow state.',
      'every app is a love letter to a future stranger.',
      'undefined is just a feature you haven\'t named yet.',
      'the chat knows what you want before you do.',
      "you don't run servers. you tend gardens.",
      "the prompt is the program.",
      "tabs are sacred. close them gently.",
    ];
    print('  ' + F[Math.floor(Math.random() * F.length)], 'glow');
  });
  reg('cowsay', 'a cow says it back', a => {
    const t = a.join(' ') || 'mooo';
    print(' ' + '_'.repeat(t.length + 2));
    print(`< ${t} >`);
    print(' ' + '-'.repeat(t.length + 2));
    print('        \\   ^__^');
    print('         \\  (oo)\\_______');
    print('            (__)\\       )\\/\\');
    print('                ||----w |');
    print('                ||     ||');
  });
  reg('neofetch', 'system fingerprint', () => {
    const logo = [
      '       _____         ',
      '      / ____|        ',
      '  ___| (___          ',
      ' / __|\\___ \\         ',
      ' \\__ \\____) |        ',
      ' |___/_____/         ',
    ];
    const stats = [
      'sloppy@vibespace',
      '─────────────',
      `OS:        SloppyOS 1.0 (browser)`,
      `Kernel:    6.17-vibe`,
      `Shell:     term.xyz v0.2`,
      `Theme:     ${localStorage.getItem('term-xyz-theme') || 'phosphor'}`,
      `Tabs:      ${sessions.size}`,
      `Packages:  ${Object.keys(cmds).length} (builtin)`,
      `Memory:    ${navigator.deviceMemory ? navigator.deviceMemory + ' GB' : 'unknown'}`,
      `Display:   ${window.innerWidth} × ${window.innerHeight}`,
    ];
    const max = Math.max(logo.length, stats.length);
    for (let i = 0; i < max; i++) {
      printRaw(`<span class="accent">${escape((logo[i] || '').padEnd(22))}</span>${escape(stats[i] || '')}`);
    }
  });
  reg('apps', 'list known sloppy.live apps', () => {
    print('open the launcher panel on the right (or press ⊞ APPS on mobile).', 'dim');
    print(`${APPS.length} apps known. type 'goto <name>' to open one.`, 'dim');
  });
  reg('goto', 'open an app — goto <name>', a => {
    const name = (a[0] || '').toLowerCase().replace(/[^a-z0-9_-]/g, '');
    if (!name) { print('goto: usage — goto <app>', 'warn'); return; }
    print(`opening /${name}/ in a new tab…`, 'glow');
    window.open(`/${name}/`, '_blank', 'noopener');
  });
  reg('open', 'alias of goto', a => cmds.goto.run(a));
  reg('tab', 'tab control: tab new | tab close | tab list', a => {
    const sub = a[0];
    if (sub === 'new') { newTab(); return; }
    if (sub === 'close') { closeTab(activeId); return; }
    if (sub === 'list' || !sub) {
      sessions.forEach(s => print(`  ${s.id === activeId ? '*' : ' '} tab${s.id}  cwd=${s.cwd.replace('/home/sloppy','~')}  ${s.history.length} cmd`, s.id === activeId ? 'glow' : 'dim'));
      return;
    }
    print('tab: usage — tab new | close | list', 'warn');
  });
  reg('sudo', 'try to escalate (joke)', () => {
    print('[sudo] password for sloppy: ********', 'dim');
    print('sorry, your request has been logged AND laughed at.', 'crit');
  });
  reg('exit', 'leave the terminal', () => print('you cannot exit. you are the terminal now.', 'magenta'));
  reg('about', 'what is this', () => {
    print('term.xyz — single-file CRT terminal w/ explorer + launcher + tabs', 'glow');
    print('part of vibespace (sloppy.live). vanilla JS, fake FS, real ai.', 'dim');
  });
  reg('ai', 'ask the oracle — ai <question>', async a => {
    const q = a.join(' ').trim();
    if (!q) { print('ai: usage — ai <your question>', 'warn'); return; }
    const placeholder = printRaw('<span class="line dim">[awaiting reply…]</span>');
    try {
      const url = 'https://text.pollinations.ai/' + encodeURIComponent(
        'You are a brief, witty terminal oracle. Answer in under 80 words, plain text only. Question: ' + q
      ) + '?referrer=sloppy.live';
      const r = await fetch(url);
      if (!r.ok) throw new Error('http ' + r.status);
      placeholder.remove();
      print((await r.text()).trim(), 'glow');
    } catch (e) {
      placeholder.remove();
      print('ai: the oracle is unreachable.', 'crit');
    }
  });

  // ===== input handling =====
  function runCommand(raw) {
    const trimmed = raw.trim();
    printPrompt(raw);
    if (!trimmed) return;
    const s = activeSession();
    s.history.push(trimmed);
    if (s.history.length > 200) s.history.shift();
    s.histIdx = -1;

    const tokens = trimmed.match(/(?:[^\s"]+|"[^"]*")+/g) || [];
    const name = tokens.shift().toLowerCase();
    const args = tokens.map(t => t.replace(/^"|"$/g, ''));
    const cmd = cmds[name];
    if (!cmd) { print(`${name}: command not found. type 'help'.`, 'crit'); return; }
    Promise.resolve(cmd.run(args)).catch(e => print('error: ' + e.message, 'crit'));
  }

  function tabComplete(buf) {
    const s = activeSession();
    const tokens = buf.split(/\s+/);
    if (tokens.length === 1) {
      const matches = Object.keys(cmds).filter(n => n.startsWith(tokens[0].toLowerCase()));
      if (matches.length === 1) return matches[0] + ' ';
      if (matches.length > 1) {
        print(matches.join('  '), 'dim');
        return longestCommon(matches);
      }
      return buf;
    }
    const last = tokens.pop();
    const dir = last.includes('/') ? resolve(s.cwd, last.replace(/[^/]*$/, '')) : s.cwd;
    if (!isDir(dir)) return buf;
    const tail = last.split('/').pop();
    const items = listDir(dir).filter(n => n.startsWith(tail));
    if (items.length === 1) {
      const node = FS[(dir === '/' ? '/' : dir + '/') + items[0]];
      const sep = node && node.type === 'dir' ? '/' : ' ';
      return tokens.join(' ') + (tokens.length ? ' ' : '') + last.replace(/[^/]*$/, items[0] + sep);
    }
    if (items.length > 1) {
      print(items.join('  '), 'dim');
      return tokens.join(' ') + (tokens.length ? ' ' : '') + last.replace(/[^/]*$/, longestCommon(items));
    }
    return buf;
  }
  function longestCommon(strs) {
    if (!strs.length) return '';
    let p = strs[0];
    for (const s of strs) {
      while (!s.startsWith(p)) p = p.slice(0, -1);
      if (!p) return '';
    }
    return p;
  }

  input.addEventListener('keydown', (e) => {
    const s = activeSession();
    if (e.key === 'Enter') {
      const v = input.value;
      input.value = '';
      runCommand(v);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      if (!s.history.length) return;
      if (s.histIdx === -1) s.histIdx = s.history.length - 1;
      else s.histIdx = Math.max(0, s.histIdx - 1);
      input.value = s.history[s.histIdx] || '';
      setTimeout(() => input.setSelectionRange(input.value.length, input.value.length), 0);
    } else if (e.key === 'ArrowDown') {
      e.preventDefault();
      if (s.histIdx === -1) return;
      s.histIdx++;
      if (s.histIdx >= s.history.length) { s.histIdx = -1; input.value = ''; }
      else input.value = s.history[s.histIdx];
    } else if (e.key === 'Tab') {
      e.preventDefault();
      input.value = tabComplete(input.value);
    } else if (e.key === 'l' && e.ctrlKey) {
      e.preventDefault(); screen.innerHTML = '';
    } else if (e.key === 'c' && e.ctrlKey && !window.getSelection().toString()) {
      printPrompt(input.value + '^C'); input.value = ''; s.histIdx = -1;
    } else if (e.key === 't' && e.ctrlKey) {
      e.preventDefault(); newTab();
    } else if (e.key === 'w' && e.ctrlKey) {
      e.preventDefault(); closeTab(activeId);
    } else if (e.key === 'Tab' && e.ctrlKey) {
      e.preventDefault(); cycleTabs(e.shiftKey ? -1 : 1);
    }
  });

  // keep input focused on tap inside terminal area
  document.querySelector('.term').addEventListener('click', (e) => {
    if (e.target.closest('a')) return;
    input.focus();
  });

  // ===== tab management =====
  function renderTabs() {
    tabbar.innerHTML = '';
    sessions.forEach(s => {
      const t = document.createElement('div');
      t.className = 'tab' + (s.id === activeId ? ' active' : '');
      const cwdShort = s.cwd === '/home/sloppy' ? '~' : (s.cwd.split('/').pop() || '/');
      t.innerHTML = `<span>tab${s.id}</span><span style="color:var(--phosphor-faint);font-size:10px">${escape(cwdShort)}</span>`;
      const x = document.createElement('span');
      x.className = 'x'; x.textContent = '×'; x.title = 'close tab';
      x.addEventListener('click', (ev) => { ev.stopPropagation(); closeTab(s.id); });
      t.appendChild(x);
      t.addEventListener('click', () => switchTab(s.id));
      tabbar.appendChild(t);
    });
    const add = document.createElement('button');
    add.className = 'tab-add';
    add.textContent = '+';
    add.title = 'new tab (Ctrl+T)';
    add.addEventListener('click', () => newTab());
    tabbar.appendChild(add);
  }
  function switchTab(id) {
    if (id === activeId) return;
    const cur = activeSession();
    if (cur) cur.screenHTML = screen.innerHTML;
    activeId = id;
    const next = activeSession();
    screen.innerHTML = next.screenHTML || '';
    updatePromptUI();
    setTimeout(() => screen.scrollTop = screen.scrollHeight, 0);
    input.focus();
  }
  function newTab() {
    const id = makeSession();
    if (activeId !== null) {
      const cur = activeSession(); if (cur) cur.screenHTML = screen.innerHTML;
    }
    activeId = id;
    screen.innerHTML = '';
    updatePromptUI();
    print(FS['/etc/motd'].body, 'glow');
    print('');
    input.focus();
  }
  function closeTab(id) {
    if (sessions.size <= 1) {
      print('cannot close the last tab.', 'warn');
      return;
    }
    sessions.delete(id);
    if (activeId === id) {
      const next = sessions.values().next().value;
      activeId = next.id;
      screen.innerHTML = next.screenHTML || '';
      updatePromptUI();
    } else {
      renderTabs();
    }
    input.focus();
  }
  function cycleTabs(dir) {
    const ids = [...sessions.keys()];
    const cur = ids.indexOf(activeId);
    const next = ids[(cur + dir + ids.length) % ids.length];
    switchTab(next);
  }

  // ===== file explorer =====
  const collapsed = new Set();   // paths users have collapsed
  function renderTree(root = '/') {
    tree.innerHTML = '';
    const cwd = activeSession()?.cwd;
    function walk(path, depth) {
      const items = listDir(path);
      for (const name of items) {
        const full = (path === '/' ? '/' : path + '/') + name;
        const node = FS[full];
        const isOpen = !collapsed.has(full);
        const row = document.createElement('div');
        row.className = 'tnode';
        if (node && node.type === 'dir') row.classList.add('dir');
        if (node && node.locked) row.classList.add('locked');
        if (full === cwd) row.style.background = 'var(--phosphor-bare)';
        row.style.paddingLeft = (depth * 10 + 8) + 'px';
        const icon = node?.type === 'dir' ? (isOpen ? '▾' : '▸') : (node?.locked ? '✕' : '·');
        row.innerHTML = `<span class="ic">${icon}</span><span class="name">${escape(name)}</span>`;
        row.addEventListener('click', (ev) => {
          ev.stopPropagation();
          if (!node) return;
          if (node.type === 'dir') {
            // toggle expand
            if (collapsed.has(full)) collapsed.delete(full); else collapsed.add(full);
            renderTree();
            // also cd into it
            const s = activeSession();
            s.cwd = full; updatePromptUI();
          } else {
            // cat the file
            const s = activeSession();
            const rel = full.startsWith(s.cwd + '/') ? full.slice(s.cwd.length + 1) : full;
            runCommand('cat ' + rel);
          }
        });
        tree.appendChild(row);
        if (node && node.type === 'dir' && isOpen) walk(full, depth + 1);
      }
    }
    // root row
    const rootRow = document.createElement('div');
    rootRow.className = 'tnode dir';
    rootRow.style.paddingLeft = '8px';
    rootRow.innerHTML = `<span class="ic">▾</span><span class="name">/</span>`;
    rootRow.addEventListener('click', () => { activeSession().cwd = '/'; updatePromptUI(); renderTree(); });
    tree.appendChild(rootRow);
    walk('/', 1);
  }

  // ===== app launcher =====
  const APPS = [
    'sloppy-ops','sloppy-term','sloppymon','code-creatures','moon-rover-rally',
    'galactic-dino-launch','tubbyland','pixel-prowler','wildcrest','neon-sushi-rush',
    'army-architect','circle-clash','marble-melodies','black-hole-chat',
    'orbitorium','star-hourglass','neon-pipes-screensaver','reaction-dashboard',
    'word-garden','glitch-canvas','snore-synth','vilnius-eats','zen-aquarium',
    'ghost-rodeo','pixel-bestiary','sprite-oracle','rune-scroll','toaster-escape',
    'sloppyland','el-amigo','grumpy-code','saw-pad','beatbox-booth',
    'tail-wagger','sloppy-feed','sloppy-id','flip-text','halo-lite',
    'slime-melt','singularity-chat','super-sloppy-bros','headache-cure',
    'local-flora-finder','tubbyland','puyo-physics','voltage-valley','sketchnet',
    'critter-crunch','bards-insults','music-garden','macro-snap','sql-notes',
    'army-architect','reaction-dashboard','the-procrastinator','cosmic-architect',
    'lidless','unicorn-reef','cursed-pizza-parlor','kinetic-arena','neon-heart',
    'neon-purr','zennlogic-celebration','sloppy-pet','sloppy-feed','sloppy-stats',
    'sloppy-network','sloppy-factions','sloppy-canvas','sloppy-manifestos',
    'sloppy-radio','sloppy-alerts','sloppy-reputation','sloppy-dms',
  ];
  const APP_SET = [...new Set(APPS)].sort();

  function renderAppList(filter = '') {
    const f = filter.trim().toLowerCase();
    const list = APP_SET.filter(a => !f || a.toLowerCase().includes(f));
    appList.innerHTML = list.map(a => `
      <div class="app-row" data-app="${a}">
        <span class="ic">▸</span>
        <span class="nm">${escape(a)}</span>
        <span class="ext">↗</span>
      </div>
    `).join('') || '<div style="padding:14px;color:var(--phosphor-faint);font-size:12px">no apps match.</div>';
    launcherCount.textContent = list.length;
  }
  appList.addEventListener('click', (e) => {
    const row = e.target.closest('.app-row');
    if (!row) return;
    const a = row.dataset.app;
    if (!a) return;
    window.open(`/${a}/`, '_blank', 'noopener');
    print(`opening /${a}/ in a new tab…`, 'glow');
    if (window.innerWidth < 880) launcherEl.classList.remove('open');
  });
  appSearch.addEventListener('input', () => renderAppList(appSearch.value));

  // ===== mobile overlays =====
  document.getElementById('btnSide').addEventListener('click', () => {
    sideEl.classList.toggle('open');
    launcherEl.classList.remove('open');
  });
  document.getElementById('btnApps').addEventListener('click', () => {
    launcherEl.classList.toggle('open');
    sideEl.classList.remove('open');
  });

  // ===== boot =====
  function tickClock() {
    const d = new Date();
    document.getElementById('termClock').textContent =
      [d.getHours(), d.getMinutes(), d.getSeconds()]
        .map(n => String(n).padStart(2,'0')).join(':');
  }
  tickClock(); setInterval(tickClock, 1000);

  const savedTheme = localStorage.getItem('term-xyz-theme');
  if (savedTheme && savedTheme !== 'phosphor') document.documentElement.dataset.theme = savedTheme;
  document.getElementById('termTheme').textContent = savedTheme || 'phosphor';

  // initial session + boot sequence
  activeId = makeSession();
  updatePromptUI();
  renderTree();
  renderAppList();

  const bootLines = [
    { t: 0,    text: 'BIOS · SloppyBoot v0.2 · POST', cls: 'dim' },
    { t: 110,  text: '  cpu .................... ok', cls: 'dim' },
    { t: 200,  text: '  memory ................. ok', cls: 'dim' },
    { t: 290,  text: '  network ................ ok', cls: 'dim' },
    { t: 390,  text: '  filesystem ............. mounted (sandboxed)', cls: 'dim' },
    { t: 510,  text: '  vibes .................. extreme', cls: 'glow' },
    { t: 660,  text: '', cls: '' },
    { t: 720,  text: 'starting term.xyz session …', cls: 'dim' },
    { t: 920,  text: '', cls: '' },
  ];
  bootLines.forEach(l => setTimeout(() => l.text === '' ? print('') : print(l.text, l.cls), l.t));
  setTimeout(() => {
    print(FS['/etc/motd'].body, 'glow');
    print('');
    input.focus();
  }, 1100);
})();
</script>
