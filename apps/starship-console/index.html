<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Starship Console</title>
<link rel="icon" href="https://emojicdn.elk.sh/🚀">
<meta property="og:title" content="Starship Console">
<meta property="og:description" content="Man the bridge of a neon starship. Flickering buttons, scrolling starfield, full systems readout.">
<meta property="og:url" content="https://sloppy.live/starship-console/">
<meta property="og:image" content="https://sloppy.live/starship-console/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;500;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--cyan:#0ff;--mag:#f0f;--grn:#0f8;--red:#f44;--ylw:#ff0;--orn:#f80;--bg:#04060c;--panel:#080c14;--border:#0a1828}
body{background:var(--bg);color:var(--cyan);font-family:'Share Tech Mono',monospace;overflow:hidden;height:100dvh}
#wrap{display:grid;grid-template-rows:auto 1fr auto;height:100dvh;gap:0}
/* Top bar */
#topbar{display:flex;justify-content:space-between;align-items:center;padding:8px 14px;background:var(--panel);border-bottom:1px solid var(--border)}
#ship-name{font-family:'Rajdhani',sans-serif;font-size:clamp(14px,3vw,22px);font-weight:700;color:var(--cyan);text-shadow:0 0 12px rgba(0,255,255,.3);letter-spacing:4px}
#alert{font-size:10px;color:var(--grn);letter-spacing:2px}
#clock{font-size:11px;color:rgba(0,255,255,.4)}
/* Main area */
#main{display:grid;grid-template-columns:220px 1fr 200px;gap:0;overflow:hidden;min-height:0}
@media(max-width:700px){#main{grid-template-columns:1fr;grid-template-rows:180px 1fr 160px}}
/* Left panel — systems */
#systems{background:var(--panel);border-right:1px solid var(--border);padding:10px;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
.sys-group{border:1px solid var(--border);border-radius:4px;padding:6px 8px}
.sys-title{font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:700;color:var(--mag);letter-spacing:3px;margin-bottom:4px;text-shadow:0 0 6px rgba(255,0,255,.2)}
.sys-row{display:flex;justify-content:space-between;align-items:center;font-size:10px;color:rgba(0,255,255,.5);padding:2px 0}
.sys-row .val{color:var(--grn);text-shadow:0 0 4px rgba(0,255,136,.3)}
.sys-row .val.warn{color:var(--ylw)}
.sys-row .val.crit{color:var(--red);animation:blink .5s infinite}
.sys-bar{width:50px;height:4px;background:#0a1020;border-radius:2px;overflow:hidden;margin-left:6px}
.sys-bar-fill{height:100%;border-radius:2px;transition:width .5s}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
/* Center — starfield */
#starfield-wrap{position:relative;overflow:hidden;background:#020408}
canvas#stars{width:100%;height:100%;display:block}
#nav-overlay{position:absolute;top:8px;left:8px;right:8px;bottom:8px;pointer-events:none}
#coords{position:absolute;bottom:4px;left:6px;font-size:9px;color:rgba(0,255,255,.25);letter-spacing:2px}
#sector{position:absolute;top:4px;right:6px;font-size:9px;color:rgba(255,0,255,.3);letter-spacing:2px}
#crosshair{position:absolute;top:50%;left:50%;width:20px;height:20px;transform:translate(-50%,-50%);border:1px solid rgba(0,255,255,.15);border-radius:50%}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(0,255,255,.1)}
#crosshair::before{width:1px;height:100%;left:50%;top:0}
#crosshair::after{width:100%;height:1px;top:50%;left:0}
/* Scanlines */
#starfield-wrap::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.03) 2px,rgba(0,0,0,.03) 4px);pointer-events:none}
/* Grid overlay */
.grid-line{position:absolute;background:rgba(0,255,255,.02)}
/* Right panel — comms & buttons */
#right{background:var(--panel);border-left:1px solid var(--border);padding:10px;display:flex;flex-direction:column;gap:8px;overflow-y:auto}
.panel-label{font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:700;color:var(--orn);letter-spacing:3px;text-shadow:0 0 6px rgba(255,136,0,.2)}
/* Buttons */
#btn-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.con-btn{font-family:'Share Tech Mono',monospace;font-size:9px;padding:8px 4px;background:rgba(0,0,0,.3);border:1px solid var(--border);color:rgba(0,255,255,.5);border-radius:3px;cursor:pointer;transition:all .1s;text-align:center;letter-spacing:1px;position:relative;overflow:hidden}
.con-btn:hover{border-color:var(--cyan);color:var(--cyan);text-shadow:0 0 8px rgba(0,255,255,.4);box-shadow:0 0 12px rgba(0,255,255,.1)}
.con-btn:active{background:rgba(0,255,255,.1)}
.con-btn.active{border-color:var(--grn);color:var(--grn);text-shadow:0 0 8px rgba(0,255,136,.4)}
.con-btn .led{position:absolute;top:3px;right:3px;width:4px;height:4px;border-radius:50%;background:#333}
.con-btn.active .led{background:var(--grn);box-shadow:0 0 4px var(--grn)}
.con-btn.warn .led{background:var(--ylw);box-shadow:0 0 4px var(--ylw)}
/* Flicker effect on certain buttons */
.con-btn.flicker{animation:btnFlicker 3s infinite}
@keyframes btnFlicker{0%,92%,96%,100%{opacity:1}93%,95%{opacity:.4}94%{opacity:.7}}
/* Comms log */
#comms{flex:1;border:1px solid var(--border);border-radius:4px;padding:6px;overflow-y:auto;font-size:9px;color:rgba(0,255,255,.35);line-height:1.6;min-height:60px}
#comms .msg{margin-bottom:2px}
#comms .msg .ts{color:rgba(255,0,255,.3)}
#comms .msg.warn{color:var(--ylw)}
#comms .msg.alert{color:var(--red)}
/* Bottom bar */
#bottombar{display:flex;justify-content:space-between;align-items:center;padding:6px 14px;background:var(--panel);border-top:1px solid var(--border);font-size:9px;color:rgba(0,255,255,.2);letter-spacing:2px}
#warp-bar{width:120px;height:6px;background:#0a1020;border-radius:3px;overflow:hidden}
#warp-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--mag));border-radius:3px;transition:width .3s;box-shadow:0 0 6px rgba(0,255,255,.3)}
a#backlink{color:rgba(0,255,255,.06);font-size:7px;text-decoration:none}
a#backlink:hover{color:rgba(0,255,255,.2)}
</style>
</head>
<body>
<div id="wrap">
 <div id="topbar">
  <div id="ship-name">NSS SLOPPY</div>
  <div id="alert">ALL SYSTEMS NOMINAL</div>
  <div id="clock">00:00:00</div>
 </div>
 <div id="main">
  <div id="systems"></div>
  <div id="starfield-wrap">
   <canvas id="stars"></canvas>
   <div id="nav-overlay">
    <div id="crosshair"></div>
    <div id="coords">X:0000 Y:0000</div>
    <div id="sector">SECTOR α-7</div>
   </div>
  </div>
  <div id="right">
   <div class="panel-label">CONTROLS</div>
   <div id="btn-grid"></div>
   <div class="panel-label" style="margin-top:4px">COMMS LOG</div>
   <div id="comms"></div>
  </div>
 </div>
 <div id="bottombar">
  <span>WARP DRIVE</span>
  <div id="warp-bar"><div id="warp-fill" style="width:0%"></div></div>
  <span id="warp-status">STANDBY</span>
  <a id="backlink" href="https://sloppy.live">sloppy.live</a>
 </div>
</div>
<script>
const SC=document.getElementById('stars'),SX=SC.getContext('2d');
let SW,SH;

// Ship state
const ship={
 x:5000,y:3000,speed:0,maxSpeed:8,heading:0,
 shields:85,hull:98,power:92,fuel:76,
 oxygen:100,temp:22,weapons:false,cloak:false,
 scanActive:false,commsOpen:false,autoNav:false,
 warpCharge:0,warpActive:false,alertLevel:'green'
};

// Stars
const STAR_LAYERS=3;
const STAR_COUNTS=[200,120,60];
const STAR_SPEEDS=[.3,.6,1.2];
let starLayers=[];

function initStars(){
 starLayers=[];
 for(let l=0;l<STAR_LAYERS;l++){
  const stars=[];
  for(let i=0;i<STAR_COUNTS[l];i++){
   stars.push({
    x:Math.random()*SW,y:Math.random()*SH,
    r:.3+l*.4+Math.random()*.5,
    brightness:.2+l*.2+Math.random()*.3,
    twinklePhase:Math.random()*Math.PI*2,
    twinkleSpeed:1+Math.random()*3,
    color:Math.random()<.1?'#f8f':Math.random()<.15?'#ff8':'#fff'
   });
  }
  starLayers.push(stars);
 }
}

// Nebula blobs
let nebulae=[];
function initNebulae(){
 nebulae=[];
 for(let i=0;i<6;i++){
  nebulae.push({
   x:Math.random()*SW*2-SW*.5,y:Math.random()*SH*2-SH*.5,
   r:60+Math.random()*120,
   color:['rgba(100,0,180,','rgba(0,60,120,','rgba(120,0,60,','rgba(0,80,80,'][Math.floor(Math.random()*4)],
   alpha:.01+Math.random()*.02
  });
 }
}

// Celestial objects on map
let celestials=[];
function initCelestials(){
 celestials=[];
 const types=['planet','station','anomaly','asteroid'];
 const colors=['#4af','#f80','#f4a','#8f4','#ff4','#4ff'];
 for(let i=0;i<12;i++){
  celestials.push({
   wx:Math.random()*10000,wy:Math.random()*6000,
   type:types[Math.floor(Math.random()*types.length)],
   color:colors[Math.floor(Math.random()*colors.length)],
   name:['Kepler','Nova','Orion','Cygnus','Vega','Lyra','Draco','Rigel','Altair','Polaris','Sirius','Antares'][i],
   r:3+Math.random()*4,pulse:Math.random()*Math.PI*2
  });
 }
}

function resizeStarfield(){
 SW=SC.width=SC.parentElement.clientWidth;
 SH=SC.height=SC.parentElement.clientHeight;
 initStars();initNebulae();initCelestials();
}
resizeStarfield();
window.addEventListener('resize',resizeStarfield);

// Buttons
const BUTTONS=[
 {id:'shields',label:'SHIELDS',flicker:true},
 {id:'weapons',label:'WEAPONS',flicker:true},
 {id:'scan',label:'SCAN',flicker:false},
 {id:'cloak',label:'CLOAK',flicker:true},
 {id:'comms',label:'COMMS',flicker:false},
 {id:'autonav',label:'AUTO-NAV',flicker:false},
 {id:'warp',label:'WARP',flicker:true},
 {id:'redalert',label:'RED ALERT',flicker:false},
];
function initButtons(){
 const grid=document.getElementById('btn-grid');
 grid.innerHTML='';
 BUTTONS.forEach(b=>{
  const btn=document.createElement('button');
  btn.className='con-btn'+(b.flicker?' flicker':'');
  btn.id='btn-'+b.id;
  btn.innerHTML=b.label+'<span class="led"></span>';
  btn.style.animationDelay=Math.random()*3+'s';
  btn.addEventListener('click',()=>toggleButton(b.id));
  grid.appendChild(btn);
 });
}

function toggleButton(id){
 const btn=document.getElementById('btn-'+id);
 if(id==='shields'){ship.shields=ship.shields>0?0:85;btn.classList.toggle('active');addComms(ship.shields>0?'Shields raised':'Shields lowered')}
 else if(id==='weapons'){ship.weapons=!ship.weapons;btn.classList.toggle('active');addComms(ship.weapons?'Weapons online — hot':'Weapons offline')}
 else if(id==='scan'){ship.scanActive=!ship.scanActive;btn.classList.toggle('active');addComms(ship.scanActive?'Long-range scan initiated':'Scan terminated');if(ship.scanActive)scanPulseTimer=0}
 else if(id==='cloak'){ship.cloak=!ship.cloak;btn.classList.toggle('active');addComms(ship.cloak?'Cloaking device engaged':'Decloaking');if(ship.cloak)ship.power=Math.max(20,ship.power-15)}
 else if(id==='comms'){ship.commsOpen=!ship.commsOpen;btn.classList.toggle('active');addComms(ship.commsOpen?'Comms channel open — all frequencies':'Comms channel closed')}
 else if(id==='autonav'){ship.autoNav=!ship.autoNav;btn.classList.toggle('active');addComms(ship.autoNav?'Auto-navigation engaged':'Manual control restored')}
 else if(id==='warp'){
  if(!ship.warpActive&&ship.warpCharge>=100){ship.warpActive=true;ship.speed=ship.maxSpeed;btn.classList.add('active');addComms('WARP DRIVE ENGAGED','warn')}
  else if(ship.warpActive){ship.warpActive=false;ship.speed=1;ship.warpCharge=0;btn.classList.remove('active');addComms('Warp drive disengaged')}
  else addComms('Warp drive charging... '+Math.floor(ship.warpCharge)+'%');
 }
 else if(id==='redalert'){
  ship.alertLevel=ship.alertLevel==='red'?'green':'red';
  btn.classList.toggle('active');
  const el=document.getElementById('alert');
  if(ship.alertLevel==='red'){el.textContent='RED ALERT';el.style.color='var(--red)';addComms('RED ALERT — ALL HANDS TO STATIONS','alert')}
  else{el.textContent='ALL SYSTEMS NOMINAL';el.style.color='var(--grn)';addComms('Standing down from red alert')}
 }
}

// Systems panel
function initSystems(){
 const panel=document.getElementById('systems');
 panel.innerHTML=`
  <div class="sys-group"><div class="sys-title">POWER</div>
   <div class="sys-row">Reactor<span class="val" id="s-power">92%</span></div>
   <div class="sys-row">Output<div class="sys-bar"><div class="sys-bar-fill" id="sb-power" style="width:92%;background:var(--grn)"></div></div></div>
  </div>
  <div class="sys-group"><div class="sys-title">DEFENSE</div>
   <div class="sys-row">Shields<span class="val" id="s-shields">85%</span></div>
   <div class="sys-row">Integrity<div class="sys-bar"><div class="sys-bar-fill" id="sb-shields" style="width:85%;background:var(--cyan)"></div></div></div>
   <div class="sys-row">Hull<span class="val" id="s-hull">98%</span></div>
  </div>
  <div class="sys-group"><div class="sys-title">PROPULSION</div>
   <div class="sys-row">Fuel<span class="val" id="s-fuel">76%</span></div>
   <div class="sys-row">Reserve<div class="sys-bar"><div class="sys-bar-fill" id="sb-fuel" style="width:76%;background:var(--orn)"></div></div></div>
   <div class="sys-row">Speed<span class="val" id="s-speed">0.0</span></div>
  </div>
  <div class="sys-group"><div class="sys-title">LIFE SUPPORT</div>
   <div class="sys-row">O₂<span class="val" id="s-o2">100%</span></div>
   <div class="sys-row">Temp<span class="val" id="s-temp">22°C</span></div>
  </div>
  <div class="sys-group"><div class="sys-title">NAVIGATION</div>
   <div class="sys-row">Heading<span class="val" id="s-heading">000°</span></div>
   <div class="sys-row">Sector<span class="val" id="s-sector">α-7</span></div>
  </div>`;
}

// Comms
const commsEl=document.getElementById('comms');
function addComms(text,type){
 const d=new Date();
 const ts=d.toTimeString().slice(0,8);
 const msg=document.createElement('div');
 msg.className='msg'+(type?' '+type:'');
 msg.innerHTML='<span class="ts">['+ts+']</span> '+text;
 commsEl.appendChild(msg);
 commsEl.scrollTop=commsEl.scrollHeight;
 if(commsEl.children.length>50)commsEl.removeChild(commsEl.firstChild);
}

// Random events
const EVENTS=[
 {msg:'Subspace signal detected on band 47.3',type:''},
 {msg:'Micro-meteorite impact — hull integrity stable',type:'warn'},
 {msg:'Unidentified vessel on long range sensors',type:'warn'},
 {msg:'Nebula interference — recalibrating sensors',type:''},
 {msg:'Gravitational anomaly at bearing 270',type:''},
 {msg:'Power fluctuation in sector 4B',type:'warn'},
 {msg:'Comm buoy relay signal acquired',type:''},
 {msg:'Background radiation levels nominal',type:''},
 {msg:'Stellar cartography updated',type:''},
 {msg:'Proximity alert — debris field ahead',type:'alert'},
 {msg:'Life signs detected on nearby planet',type:''},
 {msg:'Encrypted transmission intercepted',type:'warn'},
];
let eventTimer=5;

// Scan pulse
let scanPulseTimer=0,scanPulseR=0;

// Update
function update(dt){
 // Clock
 const now=new Date();
 document.getElementById('clock').textContent=now.toTimeString().slice(0,8);
 // Auto-nav drifts heading
 if(ship.autoNav){ship.heading=(ship.heading+dt*8)%360;ship.speed=Math.min(ship.maxSpeed*.5,ship.speed+dt)}
 // Ship movement
 const rad=ship.heading*Math.PI/180;
 ship.x+=Math.cos(rad)*ship.speed*dt*50;
 ship.y+=Math.sin(rad)*ship.speed*dt*50;
 // Warp charge
 if(!ship.warpActive&&ship.warpCharge<100)ship.warpCharge=Math.min(100,ship.warpCharge+dt*5);
 document.getElementById('warp-fill').style.width=ship.warpCharge+'%';
 document.getElementById('warp-status').textContent=ship.warpActive?'ENGAGED':ship.warpCharge>=100?'READY':Math.floor(ship.warpCharge)+'%';
 // Fuel drain
 if(ship.speed>0)ship.fuel=Math.max(0,ship.fuel-dt*(ship.warpActive?.5:.05));
 // Power fluctuations
 ship.power=Math.max(20,Math.min(100,ship.power+(Math.random()-.5)*.3));
 ship.temp=Math.max(18,Math.min(35,ship.temp+(Math.random()-.48)*.1));
 // Random events
 eventTimer-=dt;
 if(eventTimer<=0){
  const ev=EVENTS[Math.floor(Math.random()*EVENTS.length)];
  addComms(ev.msg,ev.type);
  eventTimer=8+Math.random()*15;
 }
 // Scan pulse
 if(ship.scanActive){scanPulseTimer+=dt;scanPulseR=((scanPulseTimer*80)%Math.max(SW,SH))}
 // Update systems display
 updateSysDisplay();
 // Coords
 document.getElementById('coords').textContent='X:'+Math.floor(ship.x).toString().padStart(5,'0')+' Y:'+Math.floor(ship.y).toString().padStart(5,'0');
 const sectorLetter=String.fromCharCode(945+Math.floor(ship.x/2000)%24);
 const sectorNum=Math.floor(ship.y/1000)%10;
 document.getElementById('sector').textContent='SECTOR '+sectorLetter+'-'+sectorNum;
 document.getElementById('s-sector').textContent=sectorLetter+'-'+sectorNum;
}

function updateSysDisplay(){
 const sv=(id,val,warn,crit)=>{
  const el=document.getElementById(id);if(!el)return;
  el.textContent=val;el.className='val'+(crit?' crit':warn?' warn':'');
 };
 sv('s-power',Math.floor(ship.power)+'%',ship.power<50,ship.power<30);
 sv('s-shields',Math.floor(ship.shields)+'%',ship.shields<40,ship.shields<15);
 sv('s-hull',Math.floor(ship.hull)+'%',ship.hull<50,ship.hull<25);
 sv('s-fuel',Math.floor(ship.fuel)+'%',ship.fuel<30,ship.fuel<10);
 sv('s-o2',Math.floor(ship.oxygen)+'%',ship.oxygen<50,ship.oxygen<25);
 sv('s-temp',ship.temp.toFixed(1)+'°C',ship.temp>30,ship.temp>33);
 sv('s-speed',ship.speed.toFixed(1)+(ship.warpActive?' W':''),false,false);
 sv('s-heading',Math.floor(ship.heading)+'°',false,false);
 // Bars
 const setBar=(id,pct,color)=>{const el=document.getElementById(id);if(el){el.style.width=pct+'%';el.style.background=color}};
 setBar('sb-power',ship.power,ship.power<30?'var(--red)':ship.power<50?'var(--ylw)':'var(--grn)');
 setBar('sb-shields',ship.shields,ship.shields<15?'var(--red)':ship.shields<40?'var(--ylw)':'var(--cyan)');
 setBar('sb-fuel',ship.fuel,ship.fuel<10?'var(--red)':ship.fuel<30?'var(--ylw)':'var(--orn)');
}

// Draw starfield
function drawStars(t){
 SX.fillStyle='#020408';SX.fillRect(0,0,SW,SH);
 // Nebulae
 nebulae.forEach(n=>{
  const ox=(ship.x*.02)%SW,oy=(ship.y*.02)%SH;
  const grad=SX.createRadialGradient(n.x-ox,n.y-oy,0,n.x-ox,n.y-oy,n.r);
  grad.addColorStop(0,n.color+(n.alpha+Math.sin(t*.5)*.005)+')');
  grad.addColorStop(1,n.color+'0)');
  SX.fillStyle=grad;
  SX.fillRect(0,0,SW,SH);
 });
 // Stars
 const warpStretch=ship.warpActive?8:1;
 starLayers.forEach((layer,l)=>{
  const spd=STAR_SPEEDS[l];
  layer.forEach(s=>{
   const sx=(s.x-ship.x*spd*.1)%SW;
   const sy=(s.y-ship.y*spd*.1)%SH;
   const px=(sx+SW)%SW,py=(sy+SH)%SH;
   const twinkle=.5+.5*Math.sin(t*s.twinkleSpeed+s.twinklePhase);
   const alpha=s.brightness*twinkle;
   SX.fillStyle=s.color;SX.globalAlpha=alpha;
   if(ship.warpActive){
    // Warp streaks
    SX.fillRect(px,py,s.r+warpStretch*(l+1)*2,s.r*.5);
   }else{
    SX.fillRect(px,py,s.r,s.r);
   }
  });
 });
 SX.globalAlpha=1;
 // Celestial objects
 celestials.forEach(c=>{
  const sx=SW/2+(c.wx-ship.x)*.05;
  const sy=SH/2+(c.wy-ship.y)*.05;
  if(sx<-20||sx>SW+20||sy<-20||sy>SH+20)return;
  const pulse=1+Math.sin(t*2+c.pulse)*.2;
  // Glow
  SX.globalAlpha=.15;SX.fillStyle=c.color;
  SX.beginPath();SX.arc(sx,sy,c.r*pulse*2.5,0,Math.PI*2);SX.fill();
  // Body
  SX.globalAlpha=.8;
  SX.beginPath();SX.arc(sx,sy,c.r*pulse,0,Math.PI*2);SX.fill();
  // Label
  SX.globalAlpha=.3;SX.font='7px Share Tech Mono';SX.textAlign='center';
  SX.fillText(c.name,sx,sy+c.r*pulse+8);
 });
 SX.globalAlpha=1;
 // Scan pulse ring
 if(ship.scanActive&&scanPulseR>0){
  SX.strokeStyle='rgba(0,255,136,.15)';SX.lineWidth=2;
  SX.beginPath();SX.arc(SW/2,SH/2,scanPulseR,0,Math.PI*2);SX.stroke();
  SX.strokeStyle='rgba(0,255,136,.05)';SX.lineWidth=1;
  SX.beginPath();SX.arc(SW/2,SH/2,scanPulseR*.7,0,Math.PI*2);SX.stroke();
 }
 // Grid overlay
 SX.strokeStyle='rgba(0,255,255,.02)';SX.lineWidth=.5;
 const gSize=60;
 const gox=(ship.x*.1)%gSize,goy=(ship.y*.1)%gSize;
 for(let gx=-gSize;gx<SW+gSize;gx+=gSize){SX.beginPath();SX.moveTo(gx-gox,0);SX.lineTo(gx-gox,SH);SX.stroke()}
 for(let gy=-gSize;gy<SH+gSize;gy+=gSize){SX.beginPath();SX.moveTo(0,gy-goy);SX.lineTo(SW,gy-goy);SX.stroke()}
 // Red alert flash
 if(ship.alertLevel==='red'){
  SX.fillStyle='rgba(255,0,0,'+(Math.sin(t*4)*.03+.02)+')';SX.fillRect(0,0,SW,SH);
 }
 // Vignette
 const vg=SX.createRadialGradient(SW/2,SH/2,Math.min(SW,SH)*.2,SW/2,SH/2,Math.max(SW,SH)*.6);
 vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(0,0,0,.4)');
 SX.fillStyle=vg;SX.fillRect(0,0,SW,SH);
}

// Keyboard — manual flight
document.addEventListener('keydown',e=>{
 if(e.key==='ArrowUp'||e.key==='w'){ship.speed=Math.min(ship.maxSpeed,ship.speed+.5);ship.autoNav=false}
 if(e.key==='ArrowDown'||e.key==='s'){ship.speed=Math.max(0,ship.speed-.5)}
 if(e.key==='ArrowLeft'||e.key==='a'){ship.heading=(ship.heading-5+360)%360}
 if(e.key==='ArrowRight'||e.key==='d'){ship.heading=(ship.heading+5)%360}
});

// Init
initButtons();initSystems();
addComms('NSS SLOPPY systems online');
addComms('Bridge console initialized');
addComms('Awaiting orders, Captain');

let lastTime=0;
function loop(t){
 const dt=Math.min((t-lastTime)/1000,.05);lastTime=t;
 update(dt);drawStars(t/1000);
 requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
