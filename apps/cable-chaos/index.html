<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cable Chaos</title>
<link rel="icon" href="https://emojicdn.elk.sh/🔌">
<meta property="og:title" content="Cable Chaos">
<meta property="og:description" content="Untangle the mess of knotted power cables. Drag nodes apart until no cables cross.">
<meta property="og:url" content="https://sloppy.live/cable-chaos/">
<meta property="og:image" content="https://sloppy.live/cable-chaos/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0c0e14;overflow:hidden;height:100dvh;display:flex;flex-direction:column;align-items:center;user-select:none}
canvas{position:fixed;inset:0;z-index:0;cursor:grab}
canvas.dragging{cursor:grabbing}
#hud{position:fixed;top:0;left:0;right:0;z-index:5;display:flex;justify-content:space-between;align-items:center;padding:10px 16px;pointer-events:none}
#hud-left,#hud-right{display:flex;gap:12px;align-items:center}
.hud-item{font-family:'Share Tech Mono',monospace;font-size:11px;color:rgba(100,220,255,.5);letter-spacing:2px}
.hud-val{color:rgba(100,220,255,.8);font-weight:700}
#title-bar{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;text-align:center;pointer-events:none;transition:opacity .5s}
#title-bar h1{font-family:'Chakra Petch',sans-serif;font-size:clamp(28px,6vw,52px);font-weight:700;color:#64dcff;text-shadow:0 0 30px rgba(100,220,255,.3);letter-spacing:6px}
#title-bar .sub{font-family:'Share Tech Mono',monospace;font-size:clamp(10px,2vw,14px);color:rgba(100,220,255,.3);letter-spacing:4px;margin-top:6px}
#win-msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;text-align:center;pointer-events:none;opacity:0;transition:opacity .5s}
#win-msg h2{font-family:'Chakra Petch',sans-serif;font-size:clamp(22px,5vw,44px);font-weight:700;color:#50ff80;text-shadow:0 0 30px rgba(80,255,128,.4);letter-spacing:4px}
#win-msg .sub{font-family:'Share Tech Mono',monospace;font-size:12px;color:rgba(80,255,128,.4);letter-spacing:3px;margin-top:8px}
#controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:5;display:flex;gap:8px}
.ctrl-btn{font-family:'Share Tech Mono',monospace;font-size:11px;padding:6px 14px;background:rgba(100,220,255,.06);border:1px solid rgba(100,220,255,.15);border-radius:4px;color:rgba(100,220,255,.5);cursor:pointer;letter-spacing:1px;transition:all .15s}
.ctrl-btn:hover{background:rgba(100,220,255,.12);color:rgba(100,220,255,.8);border-color:rgba(100,220,255,.3)}
a#backlink{position:fixed;bottom:6px;right:8px;color:rgba(255,255,255,.03);font-size:7px;text-decoration:none;z-index:5}
a#backlink:hover{color:rgba(255,255,255,.12)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
 <div id="hud-left">
  <div class="hud-item">CROSSINGS: <span class="hud-val" id="cross-count">0</span></div>
  <div class="hud-item">MOVES: <span class="hud-val" id="move-count">0</span></div>
 </div>
 <div id="hud-right">
  <div class="hud-item">LEVEL: <span class="hud-val" id="level-num">1</span></div>
  <div class="hud-item" id="time-display">TIME: <span class="hud-val" id="timer">0:00</span></div>
 </div>
</div>
<div id="title-bar">
 <h1>CABLE CHAOS</h1>
 <div class="sub">DRAG NODES TO UNTANGLE ALL CABLES</div>
</div>
<div id="win-msg">
 <h2>UNTANGLED!</h2>
 <div class="sub" id="win-stats"></div>
</div>
<div id="controls">
 <button class="ctrl-btn" onclick="newLevel(level)">RETRY</button>
 <button class="ctrl-btn" onclick="newLevel(level+1)">NEXT →</button>
 <button class="ctrl-btn" onclick="scramble()">SCRAMBLE</button>
</div>
<a id="backlink" href="https://sloppy.live">sloppy.live</a>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H;
function resize(){W=C.width=innerWidth;H=C.height=innerHeight}
resize();addEventListener('resize',()=>{resize();if(nodes.length)centerGraph()});

// Cable colors — vivid neon palette
const COLORS=[
 '#ff4060','#40ff80','#4080ff','#ffcc20','#ff60ff',
 '#20ffdd','#ff8830','#aa60ff','#60ffaa','#ff2020',
 '#20aaff','#ddff30','#ff50aa','#30ffff','#ff9060',
];

let nodes=[],edges=[],level=1,moves=0,crossings=0,solved=false;
// Jiggle physics — each edge gets control points that simulate bouncy wire
const JIGGLE_PTS=5;// interior points per cable
const JIGGLE_STIFF=12;// spring stiffness
const JIGGLE_DAMP=4;// damping
const JIGGLE_GRAVITY=40;// sag gravity
let startTime=0,elapsed=0;
let dragging=null,dragOff={x:0,y:0};
let sparkParticles=[];

// Audio
let actx;
function initAudio(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)()}
function snapSound(){
 if(!actx)return;const t=actx.currentTime;
 const o=actx.createOscillator(),g=actx.createGain();
 o.type='sine';o.frequency.value=600+Math.random()*200;
 g.gain.setValueAtTime(.06,t);g.gain.exponentialRampToValueAtTime(.001,t+.08);
 o.connect(g);g.connect(actx.destination);o.start();o.stop(t+.08);
}
function winSound(){
 if(!actx)return;const t=actx.currentTime;
 [0,.1,.2,.35].forEach((d,i)=>{
  const o=actx.createOscillator(),g=actx.createGain();
  o.type='sine';o.frequency.value=[523,659,784,1047][i];
  g.gain.setValueAtTime(.08,t+d);g.gain.exponentialRampToValueAtTime(.001,t+d+.2);
  o.connect(g);g.connect(actx.destination);o.start(t+d);o.stop(t+d+.2);
 });
}
function pickupSound(){
 if(!actx)return;const t=actx.currentTime;
 const o=actx.createOscillator(),g=actx.createGain();
 o.type='triangle';o.frequency.value=400;
 g.gain.setValueAtTime(.04,t);g.gain.exponentialRampToValueAtTime(.001,t+.05);
 o.connect(g);g.connect(actx.destination);o.start();o.stop(t+.05);
}

// Generate a planar graph that CAN be untangled
function generateLevel(lvl){
 const n=Math.min(4+lvl*2,30);// node count scales with level
 const e=Math.min(Math.floor(n*1.5),n*(n-1)/2);// edge count
 nodes=[];edges=[];
 // Place nodes in a circle (the "solution" layout)
 const cx=W/2,cy=H/2,r=Math.min(W,H)*.3;
 for(let i=0;i<n;i++){
  const a=i/n*Math.PI*2-Math.PI/2;
  nodes.push({
   x:cx+Math.cos(a)*r,y:cy+Math.sin(a)*r,
   solX:cx+Math.cos(a)*r,solY:cy+Math.sin(a)*r,
   r:Math.max(8,14-lvl*.3),
   color:COLORS[i%COLORS.length],
   glow:0
  });
 }
 // Generate edges — connect neighbors + some cross-connections
 const edgeSet=new Set();
 // Ring connections
 for(let i=0;i<n;i++){
  const j=(i+1)%n;
  const key=Math.min(i,j)+'-'+Math.max(i,j);
  if(!edgeSet.has(key)){edgeSet.add(key);edges.push({a:i,b:j,color:COLORS[edges.length%COLORS.length]})}
 }
 // Extra edges
 let attempts=0;
 while(edges.length<e&&attempts<e*5){
  attempts++;
  const a=Math.floor(Math.random()*n);
  let b=Math.floor(Math.random()*n);
  if(a===b)continue;
  const key=Math.min(a,b)+'-'+Math.max(a,b);
  if(edgeSet.has(key))continue;
  edgeSet.add(key);
  edges.push({a,b,color:COLORS[edges.length%COLORS.length]});
 }
 // Init jiggle physics on all edges
 initJiggle();
 // Now scramble node positions into a tangled mess
 scramble();
}

function initJiggle(){
 edges.forEach(e=>{
  e.pts=[];
  for(let i=0;i<JIGGLE_PTS;i++){
   const t=(i+1)/(JIGGLE_PTS+1);
   const na=nodes[e.a],nb=nodes[e.b];
   e.pts.push({x:na.x+(nb.x-na.x)*t,y:na.y+(nb.y-na.y)*t,vx:0,vy:0});
  }
 });
}

function updateJiggle(dt){
 const cdt=Math.min(dt,.016);// clamp for stability
 edges.forEach(e=>{
  if(!e.pts)return;
  const na=nodes[e.a],nb=nodes[e.b];
  const pts=e.pts;
  const all=[{x:na.x,y:na.y},...pts,{x:nb.x,y:nb.y}];
  for(let i=0;i<pts.length;i++){
   const p=pts[i];
   const prev=all[i],next=all[i+2];
   // Rest position = lerp between endpoints
   const t=(i+1)/(JIGGLE_PTS+1);
   const restX=na.x+(nb.x-na.x)*t;
   const restY=na.y+(nb.y-na.y)*t;
   // Spring toward rest position
   let fx=(restX-p.x)*JIGGLE_STIFF;
   let fy=(restY-p.y)*JIGGLE_STIFF;
   // Spring toward neighbors (keeps curve smooth)
   fx+=(prev.x-p.x)*JIGGLE_STIFF*.3+(next.x-p.x)*JIGGLE_STIFF*.3;
   fy+=(prev.y-p.y)*JIGGLE_STIFF*.3+(next.y-p.y)*JIGGLE_STIFF*.3;
   // Gravity sag
   fy+=JIGGLE_GRAVITY;
   // Damping
   fx-=p.vx*JIGGLE_DAMP;
   fy-=p.vy*JIGGLE_DAMP;
   // Integrate
   p.vx+=fx*cdt;p.vy+=fy*cdt;
   p.x+=p.vx*cdt;p.y+=p.vy*cdt;
  }
 });
}

function pokeJiggle(nodeIdx){
 // When a node is dropped, give connected cables a velocity kick
 edges.forEach(e=>{
  if(e.a===nodeIdx||e.b===nodeIdx){
   if(!e.pts)return;
   e.pts.forEach(p=>{
    p.vy+=(Math.random()-.3)*80;
    p.vx+=(Math.random()-.5)*40;
   });
  }
 });
}

function scramble(){
 const cx=W/2,cy=H/2,r=Math.min(W,H)*.25;
 // Keep re-scrambling until we have crossings (max 50 attempts)
 let attempts=0;
 do{
  nodes.forEach(n=>{
   n.x=cx+(Math.random()-.5)*r*2;
   n.y=cy+(Math.random()-.5)*r*2;
  });
  attempts++;
  // Quick crossing check without triggering victory
  let c=0;
  for(let i=0;i<edges.length&&c===0;i++){
   for(let j=i+1;j<edges.length;j++){
    const e1=edges[i],e2=edges[j];
    if(e1.a===e2.a||e1.a===e2.b||e1.b===e2.a||e1.b===e2.b)continue;
    if(segmentsIntersect(
     nodes[e1.a].x,nodes[e1.a].y,nodes[e1.b].x,nodes[e1.b].y,
     nodes[e2.a].x,nodes[e2.a].y,nodes[e2.b].x,nodes[e2.b].y
    )){c++;break}
   }
  }
  if(c>0)break;
 }while(attempts<50);
 // Reset jiggle points to new positions
 edges.forEach(e=>{
  if(!e.pts)return;
  const na=nodes[e.a],nb=nodes[e.b];
  e.pts.forEach((p,i)=>{
   const t=(i+1)/(JIGGLE_PTS+1);
   p.x=na.x+(nb.x-na.x)*t;p.y=na.y+(nb.y-na.y)*t;
   p.vx=(Math.random()-.5)*30;p.vy=(Math.random()-.5)*30;
  });
 });
 solved=false;
 document.getElementById('win-msg').style.opacity='0';
 countCrossings();
}

function centerGraph(){
 // Recenter after resize
 const cx=W/2,cy=H/2;
 let ax=0,ay=0;
 nodes.forEach(n=>{ax+=n.x;ay+=n.y});
 ax/=nodes.length;ay/=nodes.length;
 const dx=cx-ax,dy=cy-ay;
 nodes.forEach(n=>{n.x+=dx;n.y+=dy});
}

// Line segment intersection test
function segmentsIntersect(x1,y1,x2,y2,x3,y3,x4,y4){
 const d=(x1-x2)*(y3-y4)-(y1-y2)*(x3-x4);
 if(Math.abs(d)<1e-10)return false;
 const t=((x1-x3)*(y3-y4)-(y1-y3)*(x3-x4))/d;
 const u=-((x1-x2)*(y1-y3)-(y1-y2)*(x1-x3))/d;
 return t>0.01&&t<0.99&&u>0.01&&u<0.99;
}

function countCrossings(){
 let c=0;
 for(let i=0;i<edges.length;i++){
  for(let j=i+1;j<edges.length;j++){
   const e1=edges[i],e2=edges[j];
   // Skip edges sharing a node
   if(e1.a===e2.a||e1.a===e2.b||e1.b===e2.a||e1.b===e2.b)continue;
   if(segmentsIntersect(
    nodes[e1.a].x,nodes[e1.a].y,nodes[e1.b].x,nodes[e1.b].y,
    nodes[e2.a].x,nodes[e2.a].y,nodes[e2.b].x,nodes[e2.b].y
   ))c++;
  }
 }
 crossings=c;
 document.getElementById('cross-count').textContent=c;
 if(c===0&&!solved&&nodes.length>0&&moves>0){
  solved=true;
  winSound();
  document.getElementById('win-msg').style.opacity='1';
  const m=Math.floor(elapsed/60),s=Math.floor(elapsed%60);
  document.getElementById('win-stats').textContent=
   moves+' MOVES · '+m+':'+s.toString().padStart(2,'0')+' · LEVEL '+level;
  // Victory sparks
  for(let i=0;i<40;i++){
   const a=Math.random()*Math.PI*2,sp=60+Math.random()*120;
   sparkParticles.push({x:W/2,y:H/2,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
    life:1+Math.random(),r:2+Math.random()*3,color:COLORS[Math.floor(Math.random()*COLORS.length)]});
  }
 }
 return c;
}

function newLevel(lvl){
 initAudio();
 level=Math.max(1,lvl);
 moves=0;elapsed=0;startTime=Date.now();solved=false;
 document.getElementById('level-num').textContent=level;
 document.getElementById('move-count').textContent=0;
 document.getElementById('win-msg').style.opacity='0';
 document.getElementById('title-bar').style.opacity='0';
 generateLevel(level);
}

// Input handling
function getNodeAt(mx,my){
 for(let i=nodes.length-1;i>=0;i--){
  const n=nodes[i];
  const dx=mx-n.x,dy=my-n.y;
  if(dx*dx+dy*dy<(n.r+6)*(n.r+6))return i;
 }
 return-1;
}

C.addEventListener('mousedown',e=>{
 initAudio();
 const idx=getNodeAt(e.clientX,e.clientY);
 if(idx>=0){
  dragging=idx;
  dragOff.x=e.clientX-nodes[idx].x;
  dragOff.y=e.clientY-nodes[idx].y;
  C.classList.add('dragging');
  pickupSound();
  // Hide title on first interaction
  document.getElementById('title-bar').style.opacity='0';
  if(!startTime)startTime=Date.now();
 }
});
C.addEventListener('mousemove',e=>{
 if(dragging!==null){
  nodes[dragging].x=e.clientX-dragOff.x;
  nodes[dragging].y=e.clientY-dragOff.y;
 }
});
C.addEventListener('mouseup',()=>{
 if(dragging!==null){
  moves++;
  document.getElementById('move-count').textContent=moves;
  nodes[dragging].glow=1;
  pokeJiggle(dragging);
  snapSound();
  countCrossings();
  dragging=null;
  C.classList.remove('dragging');
 }
});

// Touch support
C.addEventListener('touchstart',e=>{
 e.preventDefault();initAudio();
 const t=e.touches[0];
 const idx=getNodeAt(t.clientX,t.clientY);
 if(idx>=0){
  dragging=idx;dragOff.x=t.clientX-nodes[idx].x;dragOff.y=t.clientY-nodes[idx].y;
  pickupSound();
  document.getElementById('title-bar').style.opacity='0';
  if(!startTime)startTime=Date.now();
 }
},{passive:false});
C.addEventListener('touchmove',e=>{
 e.preventDefault();
 if(dragging!==null){const t=e.touches[0];nodes[dragging].x=t.clientX-dragOff.x;nodes[dragging].y=t.clientY-dragOff.y}
},{passive:false});
C.addEventListener('touchend',e=>{
 e.preventDefault();
 if(dragging!==null){moves++;document.getElementById('move-count').textContent=moves;nodes[dragging].glow=1;pokeJiggle(dragging);snapSound();countCrossings();dragging=null}
},{passive:false});

// Drawing
function drawCable(edge,color,crossing){
 const na=nodes[edge.a],nb=nodes[edge.b];
 const x1=na.x,y1=na.y,x2=nb.x,y2=nb.y;
 const alpha=crossing?.3:.7;
 const pts=edge.pts||[];
 const all=[{x:x1,y:y1},...pts,{x:x2,y:y2}];
 // Glow layer
 X.strokeStyle=color;X.lineWidth=crossing?4:6;X.globalAlpha=alpha*.15;X.lineCap='round';X.lineJoin='round';
 X.beginPath();X.moveTo(all[0].x,all[0].y);
 for(let i=1;i<all.length;i++){
  const prev=all[i-1],cur=all[i];
  const mx=(prev.x+cur.x)/2,my=(prev.y+cur.y)/2;
  X.quadraticCurveTo(prev.x,prev.y,mx,my);
 }
 X.lineTo(all[all.length-1].x,all[all.length-1].y);
 X.stroke();
 // Main cable body
 X.globalAlpha=alpha;X.lineWidth=crossing?2:4;
 X.beginPath();X.moveTo(all[0].x,all[0].y);
 for(let i=1;i<all.length;i++){
  const prev=all[i-1],cur=all[i];
  const mx=(prev.x+cur.x)/2,my=(prev.y+cur.y)/2;
  X.quadraticCurveTo(prev.x,prev.y,mx,my);
 }
 X.lineTo(all[all.length-1].x,all[all.length-1].y);
 X.stroke();
 // Highlight stripe
 const dx=x2-x1,dy=y2-y1,len=Math.sqrt(dx*dx+dy*dy)||1;
 const offX=-dy/len*1.5,offY=dx/len*1.5;
 X.globalAlpha=alpha*.35;X.lineWidth=1;
 X.beginPath();X.moveTo(all[0].x+offX,all[0].y+offY);
 for(let i=1;i<all.length;i++){
  const prev=all[i-1],cur=all[i];
  const mx=(prev.x+cur.x)/2,my=(prev.y+cur.y)/2;
  X.quadraticCurveTo(prev.x+offX,prev.y+offY,mx+offX,my+offY);
 }
 X.lineTo(all[all.length-1].x+offX,all[all.length-1].y+offY);
 X.stroke();
 X.globalAlpha=1;
}

function drawNode(n,idx){
 // Glow ring
 if(n.glow>0||idx===dragging){
  const gr=X.createRadialGradient(n.x,n.y,n.r,n.x,n.y,n.r*2.5);
  gr.addColorStop(0,n.color+'40');
  gr.addColorStop(1,'transparent');
  X.fillStyle=gr;
  X.beginPath();X.arc(n.x,n.y,n.r*2.5,0,Math.PI*2);X.fill();
 }
 // Plug socket shape
 X.fillStyle=idx===dragging?'#fff':'#1a1e28';
 X.beginPath();X.arc(n.x,n.y,n.r,0,Math.PI*2);X.fill();
 // Colored ring
 X.strokeStyle=n.color;X.lineWidth=2.5;
 X.beginPath();X.arc(n.x,n.y,n.r,0,Math.PI*2);X.stroke();
 // Inner prongs (power socket look)
 X.fillStyle=n.color;
 X.fillRect(n.x-3,n.y-n.r*.4,2,n.r*.8);
 X.fillRect(n.x+1,n.y-n.r*.4,2,n.r*.8);
}

// Pre-compute crossing edges each frame
function getCrossingEdges(){
 const set=new Set();
 for(let i=0;i<edges.length;i++){
  for(let j=i+1;j<edges.length;j++){
   const e1=edges[i],e2=edges[j];
   if(e1.a===e2.a||e1.a===e2.b||e1.b===e2.a||e1.b===e2.b)continue;
   if(segmentsIntersect(
    nodes[e1.a].x,nodes[e1.a].y,nodes[e1.b].x,nodes[e1.b].y,
    nodes[e2.a].x,nodes[e2.a].y,nodes[e2.b].x,nodes[e2.b].y
   )){set.add(i);set.add(j)}
  }
 }
 return set;
}

function draw(t){
 X.fillStyle='#0c0e14';X.fillRect(0,0,W,H);
 // Subtle grid
 X.strokeStyle='rgba(100,220,255,.02)';X.lineWidth=.5;
 const gs=60;
 for(let gx=0;gx<W;gx+=gs){X.beginPath();X.moveTo(gx,0);X.lineTo(gx,H);X.stroke()}
 for(let gy=0;gy<H;gy+=gs){X.beginPath();X.moveTo(0,gy);X.lineTo(W,gy);X.stroke()}

 if(!nodes.length)return;

 // Draw cables
 const crossingSet=getCrossingEdges();
 // Draw crossing cables first (behind), then clean ones on top
 edges.forEach((e,i)=>{
  if(!crossingSet.has(i))return;
  drawCable(e,e.color,true);
 });
 edges.forEach((e,i)=>{
  if(crossingSet.has(i))return;
  drawCable(e,e.color,false);
 });
 // Crossing flash X marks
 for(let i=0;i<edges.length;i++){
  if(!crossingSet.has(i))continue;
  for(let j=i+1;j<edges.length;j++){
   if(!crossingSet.has(j))continue;
   const e1=edges[i],e2=edges[j];
   if(e1.a===e2.a||e1.a===e2.b||e1.b===e2.a||e1.b===e2.b)continue;
   // Find intersection point for the X marker
   const x1=nodes[e1.a].x,y1=nodes[e1.a].y,x2=nodes[e1.b].x,y2=nodes[e1.b].y;
   const x3=nodes[e2.a].x,y3=nodes[e2.a].y,x4=nodes[e2.b].x,y4=nodes[e2.b].y;
   const d=(x1-x2)*(y3-y4)-(y1-y2)*(x3-x4);
   if(Math.abs(d)<1e-10)continue;
   const tt=((x1-x3)*(y3-y4)-(y1-y3)*(x3-x4))/d;
   const ix=x1+tt*(x2-x1),iy=y1+tt*(y2-y1);
   // Pulsing red X
   const pulse=.5+Math.sin(t*6)*.3;
   X.strokeStyle='rgba(255,60,60,'+pulse+')';X.lineWidth=1.5;
   X.beginPath();X.moveTo(ix-5,iy-5);X.lineTo(ix+5,iy+5);X.stroke();
   X.beginPath();X.moveTo(ix+5,iy-5);X.lineTo(ix-5,iy+5);X.stroke();
  }
 }
 // Draw nodes
 nodes.forEach((n,i)=>drawNode(n,i));
 // Spark particles
 sparkParticles.forEach(p=>{
  X.globalAlpha=Math.min(1,p.life);X.fillStyle=p.color;
  X.beginPath();X.arc(p.x,p.y,p.r,0,Math.PI*2);X.fill();
 });
 X.globalAlpha=1;
 // Vignette
 const vg=X.createRadialGradient(W/2,H/2,Math.min(W,H)*.2,W/2,H/2,Math.max(W,H)*.65);
 vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(6,8,12,.6)');
 X.fillStyle=vg;X.fillRect(0,0,W,H);
}

function update(dt){
 // Jiggle physics
 updateJiggle(dt);
 // Node glow decay
 nodes.forEach(n=>{if(n.glow>0)n.glow=Math.max(0,n.glow-dt*3)});
 // Particles
 sparkParticles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=50*dt;p.life-=dt});
 sparkParticles=sparkParticles.filter(p=>p.life>0);
 // Timer
 if(startTime&&!solved){
  elapsed=(Date.now()-startTime)/1000;
  const m=Math.floor(elapsed/60),s=Math.floor(elapsed%60);
  document.getElementById('timer').textContent=m+':'+s.toString().padStart(2,'0');
 }
 // Live crossing count during drag
 if(dragging!==null)countCrossings();
}

let lastTime=0;
function loop(t){
 const dt=Math.min((t-lastTime)/1000,.05);lastTime=t;
 update(dt);draw(t/1000);
 requestAnimationFrame(loop);
}

// Start level 1
generateLevel(1);
countCrossings();
requestAnimationFrame(loop);
</script>
</body>
</html>
