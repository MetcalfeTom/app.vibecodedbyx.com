<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Blueprint Vault · Unreal animation snippet library</title>
  <link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%93%98">
  <meta name="description" content="A local-first snippet library for Unreal Engine animation work — state machines, IK, montages, anim notifies. Save, tag, copy, done.">
  <meta property="og:title" content="Blueprint Vault — Unreal animation snippets">
  <meta property="og:description" content="Stash, categorise, and recall Unreal animation snippets. State machines, IK, montages, anim notifies — all in your browser.">
  <meta property="og:image" content="https://image.pollinations.ai/prompt/Unreal%20Engine%205%20blueprint%20node%20graph%20deep%20navy%20background%20glowing%20orange%20cyan%20wires%20technical%20schematic%20vault%20interface?width=1200&height=630&seed=20420&nologo=true&model=flux">
  <meta property="og:url" content="https://sloppy.live/blueprint-vault">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300;12..96,500;12..96,800&family=IBM+Plex+Sans:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0a0e1a;
      --panel: #10172b;
      --panel-2: #161d33;
      --card: #131a2e;
      --line: #1e2842;
      --ink: #d8e3ee;
      --ink-soft: #a8b4c4;
      --dim: #6c7c8c;
      --dimmer: #455160;
      --accent: #3eaeff;
      --accent-2: #ff7a3d;
      --warn: #e84c3d;
      --good: #6ee7b7;
      --hl-kw: #ff7a3d;
      --hl-type: #5ee3ff;
      --hl-string: #b6dc8a;
      --hl-comment: #5a6478;
      --hl-num: #ffd451;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      background: var(--bg);
      color: var(--ink);
      font: 400 0.9rem/1.5 'IBM Plex Sans', system-ui, sans-serif;
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
      background-image:
        radial-gradient(ellipse at top right, rgba(62, 174, 255, 0.05) 0%, transparent 50%),
        radial-gradient(ellipse at bottom left, rgba(255, 122, 61, 0.04) 0%, transparent 50%),
        repeating-linear-gradient(0deg, transparent 0 39px, rgba(62, 174, 255, 0.018) 39px 40px),
        repeating-linear-gradient(90deg, transparent 0 39px, rgba(62, 174, 255, 0.018) 39px 40px);
    }
    header.top {
      display: grid;
      grid-template-columns: 19rem 1fr auto;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }
    header.top .brand { display: flex; flex-direction: column; gap: 0.15rem; }
    header.top h1 {
      font: 800 1.4rem/1 'Bricolage Grotesque', sans-serif;
      margin: 0;
      letter-spacing: -0.01em;
      color: var(--ink);
    }
    header.top h1 em { font-style: normal; color: var(--accent); font-weight: 300; }
    header.top .sub {
      font-size: 0.7rem; color: var(--dim);
      letter-spacing: 0.12em; text-transform: uppercase; margin: 0;
    }
    header.top .stat-pill {
      font: 500 0.65rem 'JetBrains Mono', monospace;
      color: var(--accent);
      padding: 0.3rem 0.6rem;
      border: 1px solid var(--accent);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }
    button.primary {
      background: var(--accent); color: #051227;
      border: none;
      font: 600 0.78rem 'JetBrains Mono', monospace;
      padding: 0.65rem 1.1rem;
      cursor: pointer;
      letter-spacing: 0.12em; text-transform: uppercase;
      min-height: 2.5rem;
      transition: filter 0.12s, transform 0.06s;
    }
    button.primary:hover { filter: brightness(1.1); }
    button.primary:active { transform: translateY(1px); }
    main { display: grid; grid-template-columns: 19rem 1fr; min-height: 0; }
    aside.sidebar {
      background: var(--panel);
      border-right: 1px solid var(--line);
      padding: 1rem 0.8rem;
      overflow-y: auto;
      display: flex; flex-direction: column; gap: 1rem;
    }
    .search {
      background: var(--panel-2);
      border: 1px solid var(--line);
      color: var(--ink);
      font: 400 0.85rem 'JetBrains Mono', monospace;
      padding: 0.55rem 0.7rem;
      width: 100%;
      min-height: 2.5rem;
    }
    .search::placeholder { color: var(--dimmer); }
    .search:focus { outline: 2px solid var(--accent); outline-offset: 1px; }
    h2.section-label {
      font: 500 0.6rem 'JetBrains Mono', monospace;
      color: var(--dim);
      margin: 0.25rem 0 0.3rem;
      letter-spacing: 0.2em; text-transform: uppercase;
    }
    ul.cats {
      list-style: none; padding: 0; margin: 0;
      display: flex; flex-direction: column; gap: 0.15rem;
    }
    ul.cats button {
      width: 100%;
      background: transparent;
      border: none;
      border-left: 3px solid transparent;
      color: var(--ink-soft);
      font: 500 0.82rem 'IBM Plex Sans', sans-serif;
      text-align: left;
      padding: 0.5rem 0.6rem 0.5rem 0.7rem;
      cursor: pointer;
      display: flex; justify-content: space-between; align-items: center;
      min-height: 2.25rem;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }
    ul.cats button:hover { background: rgba(62, 174, 255, 0.05); color: var(--ink); }
    ul.cats button.active {
      background: rgba(62, 174, 255, 0.08);
      color: var(--ink);
      border-left-color: var(--cat-color, var(--accent));
    }
    ul.cats button.active::before {
      content: "▸ ";
      color: var(--cat-color, var(--accent));
      margin-right: 0.2rem;
    }
    ul.cats button span { font: 500 0.7rem 'JetBrains Mono', monospace; color: var(--dim); }
    ul.cats button.active span { color: var(--cat-color, var(--accent)); }
    .vault-actions {
      margin-top: auto;
      display: flex; flex-direction: column; gap: 0.4rem;
      padding-top: 1rem; border-top: 1px solid var(--line);
    }
    .ghost {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--dim);
      font: 400 0.7rem 'JetBrains Mono', monospace;
      padding: 0.55rem 0.7rem;
      cursor: pointer;
      letter-spacing: 0.1em; text-transform: uppercase;
      min-height: 2.25rem;
      transition: color 0.12s, border-color 0.12s;
    }
    .ghost:hover { color: var(--accent); border-color: var(--accent); }
    section.grid {
      padding: 1.25rem;
      overflow-y: auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 28rem), 1fr));
      gap: 1rem;
      align-content: start;
    }
    article.card {
      background: var(--card);
      border: 1px solid var(--line);
      border-left: 3px solid var(--cat-color, var(--accent));
      padding: 1rem;
      display: flex; flex-direction: column; gap: 0.6rem;
      transition: border-color 0.12s, box-shadow 0.12s;
    }
    article.card:hover {
      border-color: var(--cat-color, var(--accent));
      box-shadow: 0 4px 14px rgba(0, 0, 0, 0.3);
    }
    article.card header {
      display: flex; justify-content: space-between; align-items: baseline; gap: 0.6rem;
    }
    article.card h3 {
      font: 500 1rem 'Bricolage Grotesque', sans-serif;
      margin: 0;
      color: var(--ink);
      letter-spacing: -0.005em;
    }
    .cat-badge {
      font: 500 0.6rem 'JetBrains Mono', monospace;
      color: var(--cat-color, var(--accent));
      letter-spacing: 0.1em; text-transform: uppercase;
      white-space: nowrap; flex-shrink: 0;
    }
    .desc { margin: 0; font-size: 0.82rem; color: var(--ink-soft); line-height: 1.45; }
    pre.code {
      background: var(--bg);
      border: 1px solid var(--line);
      padding: 0.75rem 0.9rem;
      margin: 0;
      overflow-x: auto;
      font: 400 0.78rem/1.55 'JetBrains Mono', monospace;
      color: var(--ink);
      max-height: 18rem;
    }
    pre.code code { font: inherit; color: inherit; }
    .hl-kw      { color: var(--hl-kw); font-weight: 500; }
    .hl-type    { color: var(--hl-type); }
    .hl-string  { color: var(--hl-string); }
    .hl-comment { color: var(--hl-comment); font-style: italic; }
    .hl-num     { color: var(--hl-num); }
    article.card footer {
      display: flex; align-items: center; gap: 0.4rem; flex-wrap: wrap;
      font-size: 0.7rem;
    }
    .lang {
      font: 500 0.6rem 'JetBrains Mono', monospace;
      color: var(--dim);
      letter-spacing: 0.1em; text-transform: uppercase;
      padding: 0.18rem 0.4rem;
      background: var(--panel-2);
      border: 1px solid var(--line);
    }
    .tag { font: 400 0.68rem 'JetBrains Mono', monospace; color: var(--dim); }
    .spacer { flex: 1; }
    .action {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--dim);
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      padding: 0.3rem 0.55rem;
      cursor: pointer;
      min-height: 1.9rem;
      min-width: 1.9rem;
      transition: color 0.12s, border-color 0.12s, background 0.12s;
    }
    .action:hover { color: var(--accent); border-color: var(--accent); }
    .action.danger:hover { color: var(--warn); border-color: var(--warn); }
    .empty {
      grid-column: 1 / -1;
      padding: 4rem 1rem;
      text-align: center;
      color: var(--dim);
      font: 400 0.85rem 'JetBrains Mono', monospace;
      letter-spacing: 0.05em;
    }
    dialog.modal {
      background: var(--panel);
      color: var(--ink);
      border: 1px solid var(--accent);
      border-radius: 2px;
      padding: 0;
      width: min(94vw, 720px);
      max-height: 90vh;
      box-shadow: 0 16px 60px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(62, 174, 255, 0.25);
    }
    dialog.modal::backdrop {
      background: rgba(5, 8, 16, 0.78);
      backdrop-filter: blur(4px);
    }
    dialog.modal form {
      display: flex; flex-direction: column; gap: 0.7rem;
      padding: 1.5rem;
    }
    dialog.modal h3 {
      margin: 0 0 0.5rem;
      font: 500 1.2rem 'Bricolage Grotesque', sans-serif;
      color: var(--accent);
    }
    dialog.modal .row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.7rem; }
    dialog.modal label {
      display: flex; flex-direction: column; gap: 0.25rem;
      font: 500 0.68rem 'JetBrains Mono', monospace;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--dim);
    }
    dialog.modal input,
    dialog.modal select,
    dialog.modal textarea {
      background: var(--bg);
      border: 1px solid var(--line);
      color: var(--ink);
      font: 400 0.85rem 'JetBrains Mono', monospace;
      padding: 0.5rem 0.6rem;
      min-height: 2.25rem;
      letter-spacing: 0.02em; text-transform: none;
    }
    dialog.modal textarea { resize: vertical; line-height: 1.5; }
    dialog.modal textarea[name="code"] { min-height: 16rem; }
    dialog.modal input:focus,
    dialog.modal select:focus,
    dialog.modal textarea:focus { outline: 2px solid var(--accent); outline-offset: 1px; border-color: var(--accent); }
    dialog.modal menu {
      display: flex; gap: 0.5rem; justify-content: flex-end;
      padding: 0; margin: 0.5rem 0 0;
    }
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translate(-50%, 8px);
      padding: 0.6rem 1rem;
      background: var(--accent);
      color: #051227;
      font: 500 0.75rem 'JetBrains Mono', monospace;
      letter-spacing: 0.08em; text-transform: uppercase;
      box-shadow: 0 6px 18px rgba(0, 0, 0, 0.4);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.22s, transform 0.22s;
      z-index: 100;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }
    .toast.warn { background: var(--warn); color: #fff; }
    *:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
    @media (max-width: 880px) {
      header.top { grid-template-columns: 1fr auto; }
      header.top .stat-pill { display: none; }
      main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
      aside.sidebar { max-height: 14rem; border-right: none; border-bottom: 1px solid var(--line); }
      section.grid { grid-template-columns: 1fr; padding: 1rem; }
    }
    @media (prefers-reduced-motion: reduce) {
      *, .toast { transition: none !important; }
    }
  </style>
</head>
<body>
  <header class="top">
    <div class="brand">
      <h1>Blueprint <em>Vault</em></h1>
      <p class="sub">Unreal Engine animation node snippets</p>
    </div>
    <div></div>
    <div style="display: flex; gap: 0.5rem; align-items: center;">
      <span class="stat-pill" id="totalPill">— snippets</span>
      <button class="primary" id="newBtn" type="button">＋ new snippet</button>
    </div>
  </header>
  <main>
    <aside class="sidebar">
      <input class="search" id="search" type="search" placeholder="search title, code, tags…" aria-label="search snippets">
      <h2 class="section-label">categories</h2>
      <ul class="cats" id="cats" role="list"></ul>
      <div class="vault-actions">
        <button class="ghost" id="exportBtn" type="button">⤓ export vault.json</button>
        <button class="ghost" id="importBtn" type="button">⤒ import vault.json</button>
        <input type="file" id="importFile" accept=".json,application/json" hidden>
      </div>
    </aside>
    <section class="grid" id="grid" aria-live="polite"></section>
  </main>
  <dialog class="modal" id="modal" aria-label="snippet editor">
    <form id="form">
      <h3 id="modalTitle">New snippet</h3>
      <label>Title <input name="title" required maxlength="120"></label>
      <div class="row">
        <label>Category <select name="category" id="catSelect" required></select></label>
        <label>Language
          <select name="language">
            <option>C++</option>
            <option>BP Pseudo</option>
            <option>Python</option>
            <option>INI</option>
          </select>
        </label>
      </div>
      <label>Tags <input name="tags" placeholder="comma, separated"></label>
      <label>Description <textarea name="description" rows="2" maxlength="400"></textarea></label>
      <label>Code <textarea name="code" rows="14" required spellcheck="false"></textarea></label>
      <menu>
        <button type="button" class="ghost" id="cancelBtn">cancel</button>
        <button type="submit" class="primary">save</button>
      </menu>
    </form>
  </dialog>
  <div class="toast" id="toast" role="status" aria-live="polite"></div>
  <script>
  (() => {
    'use strict';

    const STORAGE_KEY = 'blueprint-vault-v1';

    const CATEGORIES = [
      { id: 'state-machines',   name: 'State Machines',   color: '#ff6a3d' },
      { id: 'blend-spaces',     name: 'Blend Spaces',     color: '#3eaeff' },
      { id: 'anim-notifies',    name: 'Anim Notifies',    color: '#ffa940' },
      { id: 'bone-transforms',  name: 'Bone Transforms',  color: '#c779ff' },
      { id: 'ik',               name: 'IK',               color: '#ff5e8e' },
      { id: 'montages',         name: 'Montages',         color: '#5ee3ff' },
      { id: 'root-motion',      name: 'Root Motion',      color: '#7be37e' },
      { id: 'layered-blend',    name: 'Layered Blend',    color: '#8b9eff' },
      { id: 'curves',           name: 'Curves',           color: '#ffd451' },
    ];

    const SEED = [
      {
        title: 'State Transition Rule · Idle → Walk',
        category: 'state-machines',
        language: 'C++',
        tags: ['state-machine', 'locomotion'],
        description: 'Velocity-based transition rule between Idle and Walk states. Drop into your AnimInstance subclass.',
        code: '// In your custom UAnimInstance subclass\nUFUNCTION(BlueprintCallable, Category = "Locomotion")\nbool ShouldTransitionToWalk() const\n{\n    const APawn* Owner = Cast<APawn>(GetOwningActor());\n    if (!Owner) return false;\n\n    const float Speed2D = Owner->GetVelocity().Size2D();\n    return Speed2D > 10.f;  // tweak for desired deadzone\n}\n\n// Hook it up in the State Machine\'s transition rule\n// graph by calling ShouldTransitionToWalk and feeding\n// the bool into the Can Enter Transition pin.',
      },
      {
        title: 'Footstep Anim Notify',
        category: 'anim-notifies',
        language: 'C++',
        tags: ['notify', 'audio', 'footstep'],
        description: 'Custom AnimNotify that plays a sound at the chosen foot socket whenever the notify fires.',
        code: '// MyAnimNotify_Footstep.h\nUCLASS(meta = (DisplayName = "Footstep"))\nclass GAME_API UMyAnimNotify_Footstep : public UAnimNotify\n{\n    GENERATED_BODY()\npublic:\n    virtual void Notify(USkeletalMeshComponent* Mesh,\n                        UAnimSequenceBase* Anim,\n                        const FAnimNotifyEventReference& Ref) override;\n\n    UPROPERTY(EditAnywhere, Category = "Footstep")\n    USoundBase* Sound = nullptr;\n\n    UPROPERTY(EditAnywhere, Category = "Footstep")\n    FName FootSocket = TEXT("foot_l");\n};\n\n// MyAnimNotify_Footstep.cpp\nvoid UMyAnimNotify_Footstep::Notify(USkeletalMeshComponent* Mesh,\n                                     UAnimSequenceBase*, const FAnimNotifyEventReference&)\n{\n    if (Sound && Mesh)\n    {\n        const FVector Loc = Mesh->GetSocketLocation(FootSocket);\n        UGameplayStatics::PlaySoundAtLocation(Mesh, Sound, Loc);\n    }\n}',
      },
      {
        title: 'Two Bone IK · Hand to World Target',
        category: 'ik',
        language: 'BP Pseudo',
        tags: ['ik', 'hand', 'two-bone'],
        description: 'Drives a hand bone toward a world-space target with elbow-pole control. Place between locomotion and Output Pose.',
        code: '// AnimGraph wiring\n[Input Pose]\n        │\n        ▼\n[Two Bone IK]\n    IK Bone Name              : hand_r\n    Effector Location Space   : World Space\n    Effector Location         : TargetLocation  (FVector var)\n    Joint Target Location Sp. : Component Space\n    Joint Target Location     : ElbowGoal       (FVector var)\n    Allow Stretching          : false\n    Stretch Limits            : 0.0, 1.05\n    Alpha                     : IKAlpha         (0..1)\n        │\n        ▼\n[Output Pose]\n\n// Update IKAlpha in event graph based on context\n// (e.g. interp toward 1.0 while holding an object).',
      },
      {
        title: 'Layered Blend Per Bone · Upper-Body Aim',
        category: 'layered-blend',
        language: 'BP Pseudo',
        tags: ['layered-blend', 'aiming', 'upper-body'],
        description: 'Blend an aiming pose on top of the locomotion pose, using spine_03 as the layer root.',
        code: '// AnimGraph\n[Locomotion Pose]\n        │\n        ├──────────────────────┐\n        │                      │\n        ▼                      ▼\n[Layered blend per bone]   (aim pose source)\n    Layer Setup\n      ├ Branch Filters\n      │   ├ Bone Name      : spine_03\n      │   ├ Blend Depth    : 1\n      │   └ Bone Include   : true   (include children)\n      └ Blend Pose 0       : AimingPose\n    Mesh Space Rotation/Scale Blend : on (for crisp arms)\n    Alpha                  : AimAlpha\n        │\n        ▼\n[Output Pose]\n\n// AimAlpha = 1.0 when aiming, lerp to 0.0 when not.\n// Use Mesh Space setting so arms do not twist on rotation.',
      },
      {
        title: 'Play Montage with End Callback',
        category: 'montages',
        language: 'C++',
        tags: ['montage', 'callback', 'combat'],
        description: 'Play an attack montage and bind a delegate that fires when it finishes or gets interrupted.',
        code: 'void AMyCharacter::PerformAttack(UAnimMontage* Montage)\n{\n    if (!Montage) return;\n\n    UAnimInstance* AnimInst = GetMesh()->GetAnimInstance();\n    if (!AnimInst) return;\n\n    const float Duration = AnimInst->Montage_Play(Montage, 1.0f);\n    if (Duration <= 0.f) return;  // failed to play\n\n    FOnMontageEnded EndDelegate;\n    EndDelegate.BindUObject(this, &AMyCharacter::OnAttackMontageEnded);\n    AnimInst->Montage_SetEndDelegate(EndDelegate, Montage);\n}\n\nvoid AMyCharacter::OnAttackMontageEnded(UAnimMontage* Montage, bool bInterrupted)\n{\n    bIsAttacking = false;\n    OnAttackFinished.Broadcast(Montage, bInterrupted);\n}',
      },
      {
        title: 'Root Motion · Character Setup Checklist',
        category: 'root-motion',
        language: 'BP Pseudo',
        tags: ['root-motion', 'character', 'setup'],
        description: 'Mandatory project + character settings so root motion drives movement instead of getting ignored.',
        code: '// 1. Anim Blueprint settings\n//    Class Defaults → Root Motion Mode = Root Motion From Montages Only\n//    (or Root Motion From Everything if also used by sequences)\n\n// 2. Character Movement Component\nCharacterMovement->bUseControllerDesiredRotation = false;\nCharacterMovement->bOrientRotationToMovement     = false;  // root motion drives rotation\nCharacterMovement->MovementMode                  = MOVE_Walking;\n\n// 3. Mesh Component\nGetMesh()->bUseAttachParentBound = false;\nGetMesh()->VisibilityBasedAnimTickOption =\n    EVisibilityBasedAnimTickOption::AlwaysTickPose;\n\n// 4. Anim Sequence asset\n//    Enable Root Motion checkbox\n//    Root Motion Root Lock = Anim First Frame (typical)\n//    Force Root Lock = false (true to test in place)\n\n// 5. Montage asset\n//    Enable Root Motion = true on the slot used by gameplay',
      },
      {
        title: 'Anim Notify State · Hit Detection Window',
        category: 'anim-notifies',
        language: 'C++',
        tags: ['notify-state', 'combat', 'hit-window'],
        description: 'NotifyBegin/NotifyEnd pair that opens and closes a hit detection window across a frame range.',
        code: '// UMyAnimNotifyState_HitWindow.h\nUCLASS(meta = (DisplayName = "Hit Window"))\nclass GAME_API UMyAnimNotifyState_HitWindow : public UAnimNotifyState\n{\n    GENERATED_BODY()\npublic:\n    virtual void NotifyBegin(USkeletalMeshComponent* Mesh,\n                             UAnimSequenceBase* Anim,\n                             float Duration,\n                             const FAnimNotifyEventReference&) override;\n\n    virtual void NotifyEnd(USkeletalMeshComponent* Mesh,\n                           UAnimSequenceBase* Anim,\n                           const FAnimNotifyEventReference&) override;\n\n    UPROPERTY(EditAnywhere, Category = "HitWindow")\n    FName WindowTag = TEXT("Primary");\n};\n\n// .cpp\nvoid UMyAnimNotifyState_HitWindow::NotifyBegin(USkeletalMeshComponent* Mesh, ...)\n{\n    if (auto* Char = Cast<AMyCharacter>(Mesh->GetOwner()))\n        Char->OpenHitWindow(WindowTag);\n}\n\nvoid UMyAnimNotifyState_HitWindow::NotifyEnd(USkeletalMeshComponent* Mesh, ...)\n{\n    if (auto* Char = Cast<AMyCharacter>(Mesh->GetOwner()))\n        Char->CloseHitWindow(WindowTag);\n}',
      },
      {
        title: 'Read Animation Curve at Runtime',
        category: 'curves',
        language: 'C++',
        tags: ['curve', 'runtime', 'gameplay'],
        description: 'Read a per-frame animation curve value from the active anim instance. Useful for driving weapon timing, IK alpha, etc.',
        code: 'float AMyCharacter::ReadAnimCurve(FName CurveName) const\n{\n    USkeletalMeshComponent* Mesh = GetMesh();\n    if (!Mesh) return 0.f;\n\n    UAnimInstance* AnimInst = Mesh->GetAnimInstance();\n    if (!AnimInst) return 0.f;\n\n    return AnimInst->GetCurveValue(CurveName);\n}\n\n// Example: drive a weapon trail intensity from a baked curve\nconst float Momentum = ReadAnimCurve(TEXT("WeaponMomentum"));\nTrailComponent->SetFloatParameter(TEXT("Intensity"), Momentum);',
      },
      {
        title: 'BlendSpace 1D · Speed Locomotion',
        category: 'blend-spaces',
        language: 'BP Pseudo',
        tags: ['blend-space', 'locomotion', 'speed'],
        description: 'Single-axis blend space mapping speed (0-600) to idle / walk / jog / sprint cycles. Use in the locomotion state.',
        code: '// Asset: BlendSpace1D · BS_SpeedLocomotion\n// Axis X: Speed   Min 0   Max 600   Snap 1\n// Samples:\n//     0.0  → IdleLoop\n//    150.0 → WalkLoop\n//    400.0 → JogLoop\n//    600.0 → SprintLoop\n//\n// Smoothing Time: 0.15 (avoids snap when speed jumps)\n\n// In AnimGraph (Locomotion state)\n[Get Speed]   (float var, updated from CharacterMovement->Velocity.Size2D())\n        │\n        ▼\n[BlendSpace Player · BS_SpeedLocomotion]\n    X-Axis     : Speed\n    Loop       : true\n    Play Rate  : 1.0\n        │\n        ▼\n[Output Pose]',
      },
      {
        title: 'Modify Bone · Head Look-At',
        category: 'bone-transforms',
        language: 'BP Pseudo',
        tags: ['modify-bone', 'head-look', 'aim-offset'],
        description: 'Use Modify Bone in the AnimGraph to bend a head/spine bone toward a target rotation each frame.',
        code: '// AnimGraph\n[Input Pose]\n        │\n        ▼\n[Modify Bone]\n    Bone to Modify           : head\n    Translation Mode         : Ignore\n    Rotation Mode            : Add to Existing\n    Rotation                 : LookAtRotation  (FRotator)\n    Rotation Space           : Component Space\n    Scale Mode               : Ignore\n    Alpha                    : LookAlpha       (0..1)\n        │\n        ▼\n[Output Pose]\n\n// Event Graph\n//   LookAtRotation = clamp(\n//     Delta(Camera->ComponentRotation, Pawn->ActorRotation),\n//     Yaw=-70..70, Pitch=-40..30)\n// Clamp prevents the head from over-rotating Linda Blair style.',
      },
    ];

    /* ───────────── state ───────────── */
    function loadVault() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return null;
        const parsed = JSON.parse(raw);
        return Array.isArray(parsed) ? parsed : null;
      } catch { return null; }
    }
    function saveVault() {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.snippets)); }
      catch (e) { console.warn('[blueprint-vault] save failed', e); }
    }
    function seedWithIds() {
      const now = Date.now();
      return SEED.map((s, i) => ({
        ...s,
        id: 'sn-' + Math.random().toString(36).slice(2, 10) + i,
        createdAt: now - (SEED.length - i) * 86400000,
        updatedAt: now - (SEED.length - i) * 86400000,
      }));
    }
    function newId() { return 'sn-' + Math.random().toString(36).slice(2, 12); }

    const state = {
      snippets: loadVault() || seedWithIds(),
      selectedCategory: 'all',
      search: '',
      editingId: null,
    };
    if (!loadVault()) saveVault();

    /* ───────────── escape + highlighter ───────────── */
    function esc(s) {
      return String(s).replace(/[&<>"']/g, c => (
        { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]
      ));
    }

    const KW = /\b(UCLASS|USTRUCT|UENUM|UPROPERTY|UFUNCTION|UINTERFACE|GENERATED_BODY|GENERATED_USTRUCT_BODY|virtual|override|public|private|protected|class|struct|enum|namespace|template|typename|const|static|return|if|else|for|while|do|switch|case|break|continue|true|false|nullptr|new|delete|this|auto|using|inline|constexpr|def|import|from|None|self)\b/g;
    const TY = /\b(bool|int|int32|uint8|uint32|int64|uint64|float|double|void|char|FName|FString|FText|FVector|FVector2D|FRotator|FQuat|FTransform|FLinearColor|FColor|UObject|AActor|APawn|ACharacter|UAnimInstance|UAnimSequence|UAnimSequenceBase|UAnimMontage|UAnimNotify|UAnimNotifyState|USkeletalMeshComponent|UCharacterMovementComponent|UCapsuleComponent|UStaticMeshComponent|USoundBase|UTexture2D|UMaterialInterface|TArray|TMap|TSet|TWeakObjectPtr|TSubclassOf|TSharedPtr|TSharedRef|EditAnywhere|EditDefaultsOnly|BlueprintReadOnly|BlueprintReadWrite|BlueprintCallable|BlueprintPure|VisibleAnywhere|VisibleDefaultsOnly|Category|EVisibilityBasedAnimTickOption|MOVE_Walking|MOVE_Falling)\b/g;
    const STR = /("(?:[^"\\]|\\.)*")/g;
    const NUM = /\b(\d+\.?\d*[fL]?)\b/g;
    const LINE_COMMENT  = /(\/\/[^\n]*)/g;
    const BLOCK_COMMENT = /(\/\*[\s\S]*?\*\/)/g;
    const BP_NODE_NAME  = /(\[[^\]\n]+\])/g;
    const BP_FLOW       = /(▼|▶|→|■|│|├|└|◆)/g;

    function highlight(code, language) {
      // Stash comments + strings on RAW source FIRST so the delimiters are
      // visible to the regexes. Per-block esc() makes restored HTML safe.
      // PUA chars (E100..E1FF) aren't in [&<>"'] (so esc passes them through)
      // and aren't word chars (so \b boundaries in KW/TY/NUM never match
      // across them). Cap 256 stashes per snippet.
      const blocks = [];
      const stash = (escapedSpan) => {
        if (blocks.length >= 256) return escapedSpan;
        const ch = String.fromCharCode(0xE100 + blocks.length);
        blocks.push(escapedSpan);
        return ch;
      };
      let raw = String(code || '');
      raw = raw.replace(BLOCK_COMMENT, m => stash('<span class="hl-comment">' + esc(m) + '</span>'));
      raw = raw.replace(LINE_COMMENT,  m => stash('<span class="hl-comment">' + esc(m) + '</span>'));
      raw = raw.replace(STR,           m => stash('<span class="hl-string">'  + esc(m) + '</span>'));
      let h = esc(raw);
      if (language === 'C++' || language === 'Python') {
        h = h.replace(KW, '<span class="hl-kw">$1</span>');
        h = h.replace(TY, '<span class="hl-type">$1</span>');
      } else if (language === 'BP Pseudo') {
        h = h.replace(BP_NODE_NAME, '<span class="hl-type">$1</span>');
        h = h.replace(BP_FLOW,      '<span class="hl-kw">$1</span>');
      }
      h = h.replace(NUM, '<span class="hl-num">$1</span>');
      h = h.replace(/[-]/g, c => blocks[c.charCodeAt(0) - 0xE100]);
      return h;
    }

    /* ───────────── rendering ───────────── */
    const grid = document.getElementById('grid');
    const cats = document.getElementById('cats');
    const totalPill = document.getElementById('totalPill');

    function render() {
      renderCategories();
      renderSnippets();
      totalPill.textContent = state.snippets.length + ' snippet' + (state.snippets.length === 1 ? '' : 's');
    }
    function renderCategories() {
      const counts = {};
      state.snippets.forEach(s => { counts[s.category] = (counts[s.category] || 0) + 1; });
      const items = [
        '<li><button data-cat="all" class="' + (state.selectedCategory === 'all' ? 'active' : '') + '" style="--cat-color: var(--accent)">All <span>' + state.snippets.length + '</span></button></li>'
      ].concat(CATEGORIES.map(c =>
        '<li><button data-cat="' + c.id + '" class="' + (state.selectedCategory === c.id ? 'active' : '') + '" style="--cat-color: ' + c.color + '">' + esc(c.name) + ' <span>' + (counts[c.id] || 0) + '</span></button></li>'
      )).join('');
      cats.innerHTML = items;
      cats.querySelectorAll('button').forEach(btn => {
        btn.addEventListener('click', () => {
          state.selectedCategory = btn.dataset.cat;
          render();
        });
      });
    }
    function renderSnippets() {
      let filtered = state.snippets;
      if (state.selectedCategory !== 'all') {
        filtered = filtered.filter(s => s.category === state.selectedCategory);
      }
      if (state.search) {
        const q = state.search.toLowerCase();
        filtered = filtered.filter(s =>
          (s.title || '').toLowerCase().includes(q) ||
          (s.code  || '').toLowerCase().includes(q) ||
          (s.description || '').toLowerCase().includes(q) ||
          (s.tags || []).some(t => String(t).toLowerCase().includes(q))
        );
      }
      filtered = [...filtered].sort((a, b) => (b.updatedAt || 0) - (a.updatedAt || 0));

      if (filtered.length === 0) {
        const hint = state.snippets.length === 0
          ? 'vault is empty · click + new snippet to add your first'
          : 'no snippets match · clear the search or pick another category';
        grid.innerHTML = '<div class="empty">' + hint + '</div>';
        return;
      }

      grid.innerHTML = filtered.map(s => {
        const cat = CATEGORIES.find(c => c.id === s.category) || { name: s.category, color: '#888' };
        const tagHtml = (s.tags || []).map(t => '<span class="tag">#' + esc(t) + '</span>').join('');
        const descHtml = s.description ? '<p class="desc">' + esc(s.description) + '</p>' : '';
        return (
          '<article class="card" data-id="' + s.id + '" style="--cat-color: ' + cat.color + '">' +
            '<header>' +
              '<h3>' + esc(s.title || 'Untitled') + '</h3>' +
              '<span class="cat-badge">' + esc(cat.name) + '</span>' +
            '</header>' +
            descHtml +
            '<pre class="code"><code>' + highlight(s.code || '', s.language || 'C++') + '</code></pre>' +
            '<footer>' +
              '<span class="lang">' + esc(s.language || 'C++') + '</span>' +
              tagHtml +
              '<span class="spacer"></span>' +
              '<button class="action" data-act="copy"   data-id="' + s.id + '" title="Copy code" aria-label="Copy code">⌹</button>' +
              '<button class="action" data-act="edit"   data-id="' + s.id + '" title="Edit"      aria-label="Edit snippet">✎</button>' +
              '<button class="action danger" data-act="delete" data-id="' + s.id + '" title="Delete" aria-label="Delete snippet">×</button>' +
            '</footer>' +
          '</article>'
        );
      }).join('');

      grid.querySelectorAll('.action').forEach(btn => {
        btn.addEventListener('click', () => {
          const id = btn.dataset.id;
          const snippet = state.snippets.find(s => s.id === id);
          if (!snippet) return;
          const act = btn.dataset.act;
          if (act === 'copy')   copyCode(snippet);
          else if (act === 'edit')   openEditor(snippet);
          else if (act === 'delete') deleteSnippet(snippet);
        });
      });
    }

    /* ───────────── editor modal ───────────── */
    const modal = document.getElementById('modal');
    const form = document.getElementById('form');
    const catSelect = document.getElementById('catSelect');
    CATEGORIES.forEach(c => {
      const o = document.createElement('option');
      o.value = c.id;
      o.textContent = c.name;
      catSelect.appendChild(o);
    });

    function openEditor(snippet) {
      document.getElementById('modalTitle').textContent = snippet ? 'Edit snippet' : 'New snippet';
      form.elements.title.value       = snippet?.title || '';
      form.elements.category.value    = snippet?.category || CATEGORIES[0].id;
      form.elements.language.value    = snippet?.language || 'C++';
      form.elements.tags.value        = (snippet?.tags || []).join(', ');
      form.elements.description.value = snippet?.description || '';
      form.elements.code.value        = snippet?.code || '';
      state.editingId = snippet?.id || null;
      modal.showModal();
      setTimeout(() => form.elements.title.focus(), 50);
    }
    function closeEditor() {
      modal.close();
      state.editingId = null;
    }
    document.getElementById('newBtn').addEventListener('click', () => openEditor(null));
    document.getElementById('cancelBtn').addEventListener('click', closeEditor);
    modal.addEventListener('cancel', closeEditor);
    modal.addEventListener('click', (e) => { if (e.target === modal) closeEditor(); });
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const data = {
        title:       form.elements.title.value.trim(),
        category:    form.elements.category.value,
        language:    form.elements.language.value,
        tags:        form.elements.tags.value.split(',').map(t => t.trim()).filter(Boolean),
        description: form.elements.description.value.trim(),
        code:        form.elements.code.value,
        updatedAt:   Date.now(),
      };
      if (state.editingId) {
        const i = state.snippets.findIndex(s => s.id === state.editingId);
        if (i >= 0) state.snippets[i] = { ...state.snippets[i], ...data };
        flash('saved · ' + data.title);
      } else {
        state.snippets.unshift({ ...data, id: newId(), createdAt: Date.now() });
        flash('added · ' + data.title);
      }
      saveVault();
      closeEditor();
      render();
    });

    function deleteSnippet(snippet) {
      if (!confirm('Delete "' + snippet.title + '"? This cannot be undone.')) return;
      state.snippets = state.snippets.filter(s => s.id !== snippet.id);
      saveVault();
      render();
      flash('deleted · ' + snippet.title);
    }

    async function copyCode(snippet) {
      try {
        await navigator.clipboard.writeText(snippet.code);
        flash('copied · ' + snippet.title);
      } catch (err) {
        const ta = document.createElement('textarea');
        ta.value = snippet.code;
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); flash('copied · ' + snippet.title); }
        catch { flash('copy failed', true); }
        ta.remove();
      }
    }

    /* ───────────── export / import ───────────── */
    document.getElementById('exportBtn').addEventListener('click', () => {
      const data = JSON.stringify(state.snippets, null, 2);
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'blueprint-vault-' + new Date().toISOString().slice(0, 10) + '.json';
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
      flash('exported ' + state.snippets.length + ' snippets');
    });
    document.getElementById('importBtn').addEventListener('click', () => {
      document.getElementById('importFile').click();
    });
    document.getElementById('importFile').addEventListener('change', (e) => {
      const f = e.target.files && e.target.files[0];
      if (!f) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const parsed = JSON.parse(ev.target.result);
          if (!Array.isArray(parsed)) throw new Error('expected an array of snippets');
          if (!confirm('Import ' + parsed.length + ' snippets? They will be added to your current vault.')) return;
          const incoming = parsed.map(s => ({
            ...s,
            id: s.id || newId(),
            updatedAt: s.updatedAt || Date.now(),
            createdAt: s.createdAt || Date.now(),
          }));
          state.snippets = incoming.concat(state.snippets);
          saveVault();
          render();
          flash('imported ' + parsed.length + ' snippets');
        } catch (err) {
          console.warn('[blueprint-vault] import failed', err);
          flash('import failed · ' + err.message, true);
        }
      };
      reader.readAsText(f);
      e.target.value = '';
    });

    /* ───────────── search ───────────── */
    let searchT = null;
    document.getElementById('search').addEventListener('input', (e) => {
      clearTimeout(searchT);
      searchT = setTimeout(() => {
        state.search = e.target.value;
        renderSnippets();
      }, 100);
    });

    /* ───────────── toast ───────────── */
    let toastT = null;
    function flash(msg, warn) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.toggle('warn', !!warn);
      t.classList.add('show');
      clearTimeout(toastT);
      toastT = setTimeout(() => t.classList.remove('show'), 1900);
    }

    /* ───────────── keyboard ───────────── */
    window.addEventListener('keydown', (e) => {
      if (e.target.matches('input, textarea, select')) return;
      if ((e.key === 'n' || e.key === 'N') && (e.metaKey || e.ctrlKey)) {
        e.preventDefault();
        openEditor(null);
      }
      if (e.key === '/') {
        e.preventDefault();
        document.getElementById('search').focus();
      }
    });

    render();
  })();
  </script>
</body>
</html>
