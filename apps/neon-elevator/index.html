<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>Neon Elevator</title>
<link rel="icon" href="https://emojicdn.elk.sh/🛗">
<meta property="og:title" content="Neon Elevator">
<meta property="og:description" content="Ride a neon elevator through 100 floors of bizarre occupants and strange encounters.">
<meta property="og:url" content="https://sloppy.live/neon-elevator">
<meta property="og:image" content="https://emojicdn.elk.sh/🛗?style=apple&size=512">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#08080f;user-select:none;touch-action:none}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Share Tech Mono',monospace}

#scene{position:relative;width:min(380px,92vw);height:min(600px,80vh);overflow:hidden;border:1px solid rgba(0,255,255,0.08);border-radius:8px;background:#0a0a14}

#shaft{position:absolute;left:50%;top:0;bottom:0;width:200px;transform:translateX(-50%)}

#elevator{
  position:absolute;left:0;width:200px;height:120px;bottom:40px;
  border:2px solid rgba(0,255,255,0.3);border-radius:4px;
  background:linear-gradient(180deg,#12121e 0%,#0e0e18 100%);
  transition:none;overflow:hidden;
}
#el-interior{position:absolute;inset:3px;display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:center;gap:2px;padding:4px 4px 8px}

#doors{
  position:absolute;inset:0;display:flex;z-index:3;pointer-events:none;
}
.door{
  flex:1;height:100%;
  background:linear-gradient(90deg,rgba(0,200,220,0.12),rgba(0,200,220,0.04));
  border:1px solid rgba(0,255,255,0.15);
  transition:transform 0.6s ease-in-out;
}
.door.left{transform-origin:left;border-right:none}
.door.right{transform-origin:right;border-left:none}
.doors-open .door.left{transform:scaleX(0.05)}
.doors-open .door.right{transform:scaleX(0.05)}

#floor-display{
  position:absolute;top:8px;left:50%;transform:translateX(-50%);z-index:5;
  font-family:'Rajdhani',sans-serif;font-size:42px;font-weight:700;
  color:#0ff;text-shadow:0 0 15px #0ff,0 0 30px rgba(0,255,255,0.3);
  min-width:60px;text-align:center;
}
#floor-name{
  position:absolute;top:56px;left:50%;transform:translateX(-50%);z-index:5;
  font-size:10px;color:rgba(0,255,255,0.4);letter-spacing:1px;text-align:center;
  width:90%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}

#arrow{
  position:absolute;top:74px;left:50%;transform:translateX(-50%);z-index:5;
  font-size:16px;color:rgba(0,255,255,0.3);transition:opacity .3s;
}

#occupants-label{
  position:absolute;bottom:168px;left:50%;transform:translateX(-50%);z-index:5;
  font-size:9px;color:rgba(255,255,255,0.15);letter-spacing:2px;
}

#message{
  position:absolute;bottom:170px;left:50%;transform:translateX(-50%);z-index:5;
  font-size:11px;color:rgba(255,200,50,0.7);text-align:center;width:90%;
  min-height:16px;transition:opacity .3s;
}

.occupant{
  font-size:22px;line-height:1;
  animation:bobble 2s ease-in-out infinite;
  transition:transform .3s,opacity .3s;
}
.occupant.entering{animation:slideIn .4s ease-out}
.occupant.leaving{animation:slideOut .4s ease-in forwards}
@keyframes bobble{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
@keyframes slideIn{0%{transform:translateX(40px);opacity:0}100%{transform:translateX(0);opacity:1}}
@keyframes slideOut{0%{transform:translateX(0);opacity:1}100%{transform:translateX(-40px);opacity:0}}

#controls{
  position:absolute;bottom:0;left:0;right:0;height:155px;
  display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:6px;background:linear-gradient(0deg,#0a0a14 60%,transparent);z-index:6;
}

#floor-buttons{
  display:grid;grid-template-columns:repeat(10,1fr);gap:2px;
  width:100%;max-height:90px;overflow-y:auto;
}
.fl-btn{
  font-family:'Share Tech Mono',monospace;font-size:9px;
  padding:3px 0;border:1px solid rgba(0,255,255,0.1);
  background:rgba(0,255,255,0.03);color:rgba(0,255,255,0.4);
  border-radius:2px;cursor:pointer;text-align:center;
  transition:all .12s;
}
.fl-btn:hover{background:rgba(0,255,255,0.1);color:#0ff}
.fl-btn.active{background:rgba(0,255,255,0.15);color:#0ff;border-color:rgba(0,255,255,0.4);box-shadow:0 0 6px rgba(0,255,255,0.2)}
.fl-btn.current{background:rgba(255,200,0,0.15);color:#ff0;border-color:rgba(255,200,0,0.4)}

#quick-nav{display:flex;gap:4px;width:100%}
.qn-btn{
  flex:1;font-family:'Share Tech Mono',monospace;font-size:10px;
  padding:6px 0;border:1px solid rgba(0,255,255,0.1);
  background:rgba(0,255,255,0.03);color:rgba(0,255,255,0.35);
  border-radius:3px;cursor:pointer;text-align:center;
}
.qn-btn:hover{background:rgba(0,255,255,0.1);color:#0ff}

#stats{
  position:absolute;top:8px;right:8px;z-index:5;
  font-size:9px;color:rgba(255,255,255,0.15);text-align:right;
  line-height:1.6;
}

a#back{position:fixed;bottom:4px;left:4px;font-size:9px;opacity:0.12;color:#888;text-decoration:none;z-index:20}
</style>
</head>
<body>

<div id="scene">
  <div id="floor-display">1</div>
  <div id="floor-name">LOBBY</div>
  <div id="arrow">&#9650;</div>
  <div id="stats"></div>

  <div id="shaft">
    <div id="elevator">
      <div id="doors">
        <div class="door left"></div>
        <div class="door right"></div>
      </div>
      <div id="el-interior"></div>
    </div>
  </div>

  <div id="message"></div>

  <div id="controls">
    <div id="quick-nav">
      <button class="qn-btn" data-floor="1">LOBBY</button>
      <button class="qn-btn" data-floor="25">25</button>
      <button class="qn-btn" data-floor="50">50</button>
      <button class="qn-btn" data-floor="75">75</button>
      <button class="qn-btn" data-floor="100">ROOF</button>
      <button class="qn-btn" id="random-btn">?</button>
    </div>
    <div id="floor-buttons"></div>
  </div>
</div>

<a id="back" href="https://sloppy.live">sloppy.live</a>

<script>
(function(){
'use strict';

var FLOORS=100;
var currentFloor=1;
var targetFloor=1;
var moving=false;
var doorsOpen=true;
var riders=[];
var maxRiders=6;
var tripsCount=0;
var floorsVisited=new Set([1]);

// Occupant types — quirky characters
var OCCUPANTS=[
  {emoji:'👻',name:'Ghost',quote:'Going to the ethereal plane...'},
  {emoji:'🤖',name:'Robot',quote:'FLOOR.REQUEST: COMPUTED'},
  {emoji:'🧙',name:'Wizard',quote:'I could teleport but this is cozier'},
  {emoji:'👽',name:'Alien',quote:'Your vertical transport is primitive'},
  {emoji:'🎅',name:'Santa',quote:'Chimney was under maintenance'},
  {emoji:'🧛',name:'Vampire',quote:'Which floor has no mirrors?'},
  {emoji:'🐸',name:'Business Frog',quote:'Ribbit. I mean, quarterly reports.'},
  {emoji:'🦊',name:'Fox CEO',quote:'Disrupting the elevator industry'},
  {emoji:'💀',name:'Skeleton',quote:'Got no body to ride with'},
  {emoji:'🤡',name:'Clown',quote:'Is this elevator... funny to you?'},
  {emoji:'👑',name:'The King',quote:'This elevator displeases me'},
  {emoji:'🧟',name:'Zombie',quote:'Braaaaains... floor please'},
  {emoji:'🦄',name:'Unicorn',quote:'Rainbow floor, please'},
  {emoji:'🐙',name:'Octopus',quote:'I pressed ALL the buttons'},
  {emoji:'🎃',name:'Pumpkin Head',quote:'Every floor is spooky season'},
  {emoji:'🧑‍🚀',name:'Astronaut',quote:'This is nothing like a rocket'},
  {emoji:'🥷',name:'Ninja',quote:'You didn\'t see me get on'},
  {emoji:'🧜',name:'Mermaid',quote:'Is there a pool floor?'},
  {emoji:'🦖',name:'T-Rex',quote:'These buttons are too small'},
  {emoji:'🎭',name:'Theater Ghost',quote:'Floor 5... no wait... floor 50!'},
  {emoji:'🧞',name:'Genie',quote:'3 wishes... all for floor 42'},
  {emoji:'🐧',name:'Penguin',quote:'Definitely the coldest floor'},
  {emoji:'🦝',name:'Trash Panda',quote:'Heard there\'s good trash on 37'},
  {emoji:'🍕',name:'Pizza Delivery',quote:'30 minutes or it\'s free'},
  {emoji:'🎵',name:'Music Note',quote:'♪ Going up~ Going down~ ♪'},
  {emoji:'🔮',name:'Fortune Teller',quote:'I already know which floor'},
  {emoji:'🌵',name:'Sentient Cactus',quote:'Don\'t stand too close'},
  {emoji:'🧸',name:'Teddy Bear',quote:'Someone left me on floor 88'},
  {emoji:'🦜',name:'Parrot',quote:'FLOOR TWELVE! FLOOR TWELVE!'},
  {emoji:'🎩',name:'Top Hat',quote:'I\'m just a hat. Don\'t ask.'},
  {emoji:'🧁',name:'Cupcake Person',quote:'Don\'t eat in the elevator'},
  {emoji:'🦀',name:'Crab',quote:'*clicks claws menacingly*'},
  {emoji:'🪐',name:'Saturn',quote:'Ring floor, obviously'},
  {emoji:'🎸',name:'Rock Star',quote:'This elevator needs more bass'},
  {emoji:'🐉',name:'Baby Dragon',quote:'*hiccups fire* sorry'},
  {emoji:'🧪',name:'Mad Scientist',quote:'My experiment requires floor 99!'},
  {emoji:'🦈',name:'Shark',quote:'Just a land shark, nothing weird'},
  {emoji:'🌻',name:'Sunflower',quote:'Which floor has the most sun?'},
  {emoji:'🎪',name:'Circus Director',quote:'The show is on EVERY floor'},
  {emoji:'🧶',name:'Yarn Ball',quote:'I\'m unraveling... hurry!'},
  {emoji:'🦉',name:'Night Owl',quote:'Who? Who pressed 13?'},
  {emoji:'🍄',name:'Mushroom',quote:'Floor 1-UP please'},
  {emoji:'🐌',name:'Snail',quote:'This is actually really fast for me'},
  {emoji:'🎰',name:'Slot Machine',quote:'Feeling lucky? Press any floor'},
  {emoji:'🧲',name:'Magnet',quote:'I\'m attracted to floor 50'},
  {emoji:'☂️',name:'Umbrella',quote:'It\'s raining on floor 72'},
  {emoji:'🗿',name:'Moai',quote:'🗿'},
  {emoji:'🫠',name:'Melting Face',quote:'Is it hot in here or...'},
  {emoji:'🤌',name:'Italian Chef',quote:'Floor 44. Bellissimo!'},
  {emoji:'🦩',name:'Flamingo',quote:'Standing on one leg. As one does.'},
];

// Floor names
var FLOOR_NAMES={
  1:'LOBBY',2:'MAIL ROOM',3:'CAFÉ',4:'GYM',5:'ARCADE',
  6:'LIBRARY',7:'LUCKY SEVEN',8:'POOL HALL',9:'CLOUD NINE',10:'SKY GARDEN',
  13:'HAUNTED',14:'VOID',15:'NEON LOUNGE',20:'OBSERVATORY',
  25:'MIDWAY STATION',30:'CRYSTAL HALL',33:'JAZZ CLUB',
  37:'PRIME FLOOR',42:'ANSWER TO EVERYTHING',44:'ITALIAN KITCHEN',
  50:'HALFWAY HOUSE',55:'RETRO ARCADE',60:'MOONBASE',
  66:'DARK FLOOR',69:'NICE',72:'RAIN ROOM',
  75:'CLOUD DECK',77:'LUCKY AGAIN',80:'WIND TUNNEL',
  85:'STARLIGHT BAR',88:'INFINITY POOL',90:'PENTHOUSE LOBBY',
  95:'HELIPAD',99:'SECRET LAB',100:'ROOFTOP'
};

function getFloorName(f){
  return FLOOR_NAMES[f]||('FLOOR '+f);
}

// DOM
var floorDisplay=document.getElementById('floor-display');
var floorNameEl=document.getElementById('floor-name');
var arrowEl=document.getElementById('arrow');
var elevatorEl=document.getElementById('elevator');
var doorsEl=document.getElementById('doors');
var interiorEl=document.getElementById('el-interior');
var messageEl=document.getElementById('message');
var statsEl=document.getElementById('stats');
var floorBtns=document.getElementById('floor-buttons');

// Build floor buttons
for(var f=FLOORS;f>=1;f--){
  var btn=document.createElement('button');
  btn.className='fl-btn';
  btn.textContent=f;
  btn.setAttribute('data-floor',f);
  if(f===1)btn.classList.add('current');
  floorBtns.appendChild(btn);
}

floorBtns.addEventListener('click',function(e){
  var fl=parseInt(e.target.getAttribute('data-floor'));
  if(fl&&!isNaN(fl))goToFloor(fl);
});

document.querySelectorAll('.qn-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    var fl=parseInt(this.getAttribute('data-floor'));
    if(fl&&!isNaN(fl))goToFloor(fl);
  });
});
document.getElementById('random-btn').addEventListener('click',function(){
  goToFloor(1+Math.floor(Math.random()*100));
});

function goToFloor(fl){
  if(fl===currentFloor||moving||fl<1||fl>FLOORS)return;
  targetFloor=fl;
  moving=true;
  closeDoors();

  setTimeout(function(){
    moveElevator();
  },700);
}

function closeDoors(){
  doorsOpen=false;
  elevatorEl.classList.remove('doors-open');
}

function openDoors(){
  doorsOpen=true;
  elevatorEl.classList.add('doors-open');
}

function moveElevator(){
  var dir=targetFloor>currentFloor?1:-1;
  arrowEl.innerHTML=dir>0?'&#9650;':'&#9660;';
  arrowEl.style.color=dir>0?'rgba(0,255,100,0.5)':'rgba(255,100,0,0.5)';

  var interval=setInterval(function(){
    currentFloor+=dir;
    floorDisplay.textContent=currentFloor;
    floorNameEl.textContent=getFloorName(currentFloor);
    updateFloorButtons();

    if(currentFloor===targetFloor){
      clearInterval(interval);
      arrowEl.innerHTML='&#9679;';
      arrowEl.style.color='rgba(0,255,255,0.3)';
      floorsVisited.add(currentFloor);
      tripsCount++;

      setTimeout(function(){
        openDoors();
        handleArrival();
        moving=false;
        updateStats();
      },400);
    }
  },80);
}

function handleArrival(){
  // Some riders leave
  var leaving=[];
  for(var i=riders.length-1;i>=0;i--){
    if(riders[i].destFloor===currentFloor||Math.random()<0.3){
      leaving.push(riders[i]);
      riders.splice(i,1);
    }
  }

  // Animate leaving
  if(leaving.length>0){
    showMessage(leaving.map(function(r){return r.emoji}).join('')+' got off');
  }

  // New occupants board
  setTimeout(function(){
    var boarding=Math.floor(Math.random()*3);
    if(currentFloor===1)boarding=Math.min(3,maxRiders-riders.length);
    if(currentFloor===100)boarding=0;

    for(var i=0;i<boarding&&riders.length<maxRiders;i++){
      var occ=OCCUPANTS[Math.floor(Math.random()*OCCUPANTS.length)];
      var dest=currentFloor;
      while(dest===currentFloor)dest=1+Math.floor(Math.random()*100);
      riders.push({
        emoji:occ.emoji,name:occ.name,quote:occ.quote,
        destFloor:dest,id:Date.now()+i
      });
    }

    renderRiders();

    if(riders.length>0&&Math.random()<0.6){
      var talker=riders[Math.floor(Math.random()*riders.length)];
      setTimeout(function(){
        showMessage(talker.emoji+' "'+talker.quote+'"');
      },300);
    }
  },400);
}

function renderRiders(){
  interiorEl.innerHTML='';
  riders.forEach(function(r){
    var span=document.createElement('span');
    span.className='occupant entering';
    span.textContent=r.emoji;
    span.title=r.name+' → Floor '+r.destFloor;
    span.style.animationDelay=(Math.random()*0.5)+'s';
    interiorEl.appendChild(span);
  });
}

function showMessage(msg){
  messageEl.style.opacity='1';
  messageEl.textContent=msg;
  clearTimeout(showMessage._t);
  showMessage._t=setTimeout(function(){messageEl.style.opacity='0.3'},3000);
}

function updateFloorButtons(){
  var btns=floorBtns.querySelectorAll('.fl-btn');
  btns.forEach(function(b){
    var f=parseInt(b.getAttribute('data-floor'));
    b.classList.toggle('current',f===currentFloor);
    b.classList.toggle('active',f===targetFloor&&moving);
  });
}

function updateStats(){
  statsEl.innerHTML='TRIPS: '+tripsCount+'<br>VISITED: '+floorsVisited.size+'/100<br>RIDERS: '+riders.length;
}

// Initial state
openDoors();
updateStats();
showMessage('Welcome to the Neon Elevator. Pick a floor.');

// Ambient — random floor calls (riders appear)
setInterval(function(){
  if(!moving&&doorsOpen&&riders.length<maxRiders&&Math.random()<0.3){
    var occ=OCCUPANTS[Math.floor(Math.random()*OCCUPANTS.length)];
    var dest=currentFloor;
    while(dest===currentFloor)dest=1+Math.floor(Math.random()*100);
    riders.push({
      emoji:occ.emoji,name:occ.name,quote:occ.quote,
      destFloor:dest,id:Date.now()
    });
    renderRiders();
    showMessage(occ.emoji+' '+occ.name+' entered → Floor '+dest);
    updateStats();
  }
},5000);

})();
</script>
<script src="/sloppy-header/sloppy-bar.js"></script>
</body>
</html>
