<body>

  <h1>NEON RASH</h1>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';

const startScreen = document.getElementById('start-screen');
const msgEl = document.getElementById('msg');

// Audio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playTone(f,d,t='sine',v=0.05){const o=audioCtx.createOscillator();const g=audioCtx.createGain();o.type=t;o.frequency.value=f;g.gain.setValueAtTime(v,audioCtx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d);}
function playPunch(){playTone(100,0.12,'sawtooth',0.1);playTone(200,0.08,'square',0.06);}
function playEngine(spd){/* handled in loop */}

// Scene
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000011, 0.0025);
scene.background = new THREE.Color(0x000011);

const camera = new THREE.PerspectiveCamera(70, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.prepend(renderer.domElement);
window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Lighting
scene.add(new THREE.AmbientLight(0x111122, 0.5));
const dirLight = new THREE.DirectionalLight(0x4444ff, 0.3);
dirLight.position.set(0, 50, 50);
scene.add(dirLight);

// Track generation - oval circuit
const TRACK_SEGMENTS = 400;
const TRACK_WIDTH = 14;
const trackPoints = [];
const trackCurve = [];
for (let i = 0; i <= TRACK_SEGMENTS; i++) {
  const t = (i / TRACK_SEGMENTS) * Math.PI * 2;
  const rx = 180, rz = 100;
  const px = Math.sin(t) * rx + Math.sin(t*2)*20 + Math.cos(t*3)*10;
  const pz = Math.cos(t) * rz + Math.cos(t*2)*15;
  trackPoints.push(new THREE.Vector3(px, 0, pz));
}

// Track mesh
const trackGeo = new THREE.BufferGeometry();
const tverts = [], tuvs = [], tidx = [];
for (let i = 0; i < TRACK_SEGMENTS; i++) {
  const p0 = trackPoints[i], p1 = trackPoints[(i+1)%TRACK_SEGMENTS];
  const dir = new THREE.Vector3().subVectors(p1, p0).normalize();
  const side = new THREE.Vector3(-dir.z, 0, dir.x);
  const l0 = p0.clone().add(side.clone().multiplyScalar(-TRACK_WIDTH/2));
  const r0 = p0.clone().add(side.clone().multiplyScalar(TRACK_WIDTH/2));
  const l1 = p1.clone().add(side.clone().multiplyScalar(-TRACK_WIDTH/2));
  const r1 = p1.clone().add(side.clone().multiplyScalar(TRACK_WIDTH/2));
  const vi = tverts.length / 3;
  tverts.push(l0.x,0.01,l0.z, r0.x,0.01,r0.z, l1.x,0.01,l1.z, r1.x,0.01,r1.z);
  tuvs.push(0,i/10, 1,i/10, 0,(i+1)/10, 1,(i+1)/10);
  tidx.push(vi,vi+1,vi+2, vi+1,vi+3,vi+2);
}
trackGeo.setAttribute('position', new THREE.Float32BufferAttribute(tverts,3));
trackGeo.setAttribute('uv', new THREE.Float32BufferAttribute(tuvs,2));
trackGeo.setIndex(tidx);
trackGeo.computeVertexNormals();
const trackMat = new THREE.MeshBasicMaterial({color:0x0a0a1a, transparent:true, opacity:0.9});
const trackMesh = new THREE.Mesh(trackGeo, trackMat);
scene.add(trackMesh);

// Neon edge lines
function makeEdgeLine(offset, color) {
  const pts = [];
  for (let i = 0; i <= TRACK_SEGMENTS; i++) {
    const p0 = trackPoints[i % TRACK_SEGMENTS];
    const p1 = trackPoints[(i+1) % TRACK_SEGMENTS];
    const dir = new THREE.Vector3().subVectors(p1, p0).normalize();
    const side = new THREE.Vector3(-dir.z, 0, dir.x);
    pts.push(p0.clone().add(side.clone().multiplyScalar(offset)).setY(0.2));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineBasicMaterial({color, linewidth:2});
  scene.add(new THREE.Line(geo, mat));
}
makeEdgeLine(-TRACK_WIDTH/2, 0x00ffff);
makeEdgeLine(TRACK_WIDTH/2, 0xff00ff);

// Center dashed line (segments)
for (let i = 0; i < TRACK_SEGMENTS; i+=4) {
  const p0 = trackPoints[i], p1 = trackPoints[(i+1)%TRACK_SEGMENTS];
  const geo = new THREE.BufferGeometry().setFromPoints([
    new THREE.Vector3(p0.x,0.15,p0.z), new THREE.Vector3(p1.x,0.15,p1.z)
  ]);
  scene.add(new THREE.Line(geo, new THREE.LineBasicMaterial({color:0x333355})));
}

// Neon posts along track
for (let i = 0; i < TRACK_SEGMENTS; i += 8) {
  const p = trackPoints[i], pn = trackPoints[(i+1)%TRACK_SEGMENTS];
  const dir = new THREE.Vector3().subVectors(pn, p).normalize();
  const side = new THREE.Vector3(-dir.z, 0, dir.x);
  [-1,1].forEach(s => {
    const pos = p.clone().add(side.clone().multiplyScalar(s * (TRACK_WIDTH/2 + 2)));
    const postGeo = new THREE.BoxGeometry(0.15, 3, 0.15);
    const postMat = new THREE.MeshBasicMaterial({color: s<0 ? 0x00aaaa : 0xaa00aa});
    const post = new THREE.Mesh(postGeo, postMat);
    post.position.set(pos.x, 1.5, pos.z);
    scene.add(post);
    // Glow orb on top
    const orbGeo = new THREE.SphereGeometry(0.25, 6, 6);
    const orbMat = new THREE.MeshBasicMaterial({color: s<0 ? 0x00ffff : 0xff00ff});
    const orb = new THREE.Mesh(orbGeo, orbMat);
    orb.position.set(pos.x, 3.2, pos.z);
    scene.add(orb);
  });
}

// Ground plane
const groundGeo = new THREE.PlaneGeometry(800, 800);
const groundMat = new THREE.MeshBasicMaterial({color:0x020208});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
ground.position.y = -0.1;
scene.add(ground);

// Grid on ground
const gridH = new THREE.GridHelper(800, 80, 0x0a0a2a, 0x0a0a2a);
gridH.position.y = 0;
scene.add(gridH);

// Stars
const starGeo = new THREE.BufferGeometry();
const starVerts = [];
for (let i = 0; i < 500; i++) {
  starVerts.push((Math.random()-0.5)*600, 50+Math.random()*150, (Math.random()-0.5)*600);
}
starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({color:0x4444aa, size:0.5})));

// Create bike mesh
function createBike(color) {
  const group = new THREE.Group();
  // Body
  const bodyGeo = new THREE.BoxGeometry(0.6, 0.5, 2);
  const bodyMat = new THREE.MeshPhongMaterial({color, emissive:color, emissiveIntensity:0.3});
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  body.position.y = 0.6;
  group.add(body);
  // Seat
  const seatGeo = new THREE.BoxGeometry(0.5, 0.2, 0.8);
  const seatMat = new THREE.MeshPhongMaterial({color:0x222222});
  const seat = new THREE.Mesh(seatGeo, seatMat);
  seat.position.set(0, 1, -0.1);
  group.add(seat);
  // Front fork
  const forkGeo = new THREE.BoxGeometry(0.1, 0.8, 0.1);
  const forkMat = new THREE.MeshPhongMaterial({color:0x888888});
  const fork = new THREE.Mesh(forkGeo, forkMat);
  fork.position.set(0, 0.6, 1);
  fork.rotation.x = 0.3;
  group.add(fork);
  // Wheels
  const wheelGeo = new THREE.CylinderGeometry(0.35, 0.35, 0.15, 12);
  const wheelMat = new THREE.MeshPhongMaterial({color:0x333333});
  [1, -0.8].forEach(z => {
    const wheel = new THREE.Mesh(wheelGeo, wheelMat);
    wheel.rotation.x = Math.PI/2;
    wheel.position.set(0, 0.35, z);
    group.add(wheel);
    // Neon ring
    const ringGeo = new THREE.TorusGeometry(0.35, 0.03, 8, 16);
    const ringMat = new THREE.MeshBasicMaterial({color});
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.position.set(0, 0.35, z);
    group.add(ring);
  });
  // Headlight
  const hlGeo = new THREE.SphereGeometry(0.12, 8, 8);
  const hlMat = new THREE.MeshBasicMaterial({color:0xffffaa});
  const hl = new THREE.Mesh(hlGeo, hlMat);
  hl.position.set(0, 0.7, 1.2);
  group.add(hl);
  // Rider (simple)
  const torsoGeo = new THREE.BoxGeometry(0.4, 0.6, 0.3);
  const torsoMat = new THREE.MeshPhongMaterial({color:0x222233});
  const torso = new THREE.Mesh(torsoGeo, torsoMat);
  torso.position.set(0, 1.4, -0.1);
  torso.rotation.x = 0.2;
  group.add(torso);
  // Head
  const headGeo = new THREE.SphereGeometry(0.18, 8, 8);
  const headMat = new THREE.MeshPhongMaterial({color:0x333344});
  const head = new THREE.Mesh(headGeo, headMat);
  head.position.set(0, 1.85, 0.05);
  group.add(head);
  // Visor
  const visorGeo = new THREE.BoxGeometry(0.25, 0.08, 0.15);
  const visorMat = new THREE.MeshBasicMaterial({color});
  const visor = new THREE.Mesh(visorGeo, visorMat);
  visor.position.set(0, 1.85, 0.2);
  group.add(visor);
  return group;
}

// Racer class
const TOTAL_LAPS = 3;
class Racer {
  constructor(color, isPlayer, idx) {
    this.mesh = createBike(color);
    scene.add(this.mesh);
    this.isPlayer = isPlayer;
    this.color = color;
    this.segIdx = idx * 30; // staggered start
    this.segFrac = 0;
    this.laneOffset = 0; // -1 to 1
    this.targetLane = 0;
    this.speed = 0;
    this.maxSpeed = isPlayer ? 1.2 : 0.85 + Math.random()*0.35;
    this.accel = isPlayer ? 0.008 : 0.005 + Math.random()*0.003;
    this.hp = 100;
    this.lap = 0;
    this.finished = false;
    this.punchCooldown = 0;
    this.hitFlash = 0;
    this.knockback = 0;
    this.crashed = false;
    this.crashTimer = 0;
  }
  getTrackPos() {
    const i0 = Math.floor(this.segIdx) % TRACK_SEGMENTS;
    const i1 = (i0+1) % TRACK_SEGMENTS;
    const p0 = trackPoints[i0], p1 = trackPoints[i1];
    const pos = new THREE.Vector3().lerpVectors(p0, p1, this.segFrac);
    const dir = new THREE.Vector3().subVectors(p1, p0).normalize();
    const side = new THREE.Vector3(-dir.z, 0, dir.x);
    pos.add(side.multiplyScalar(this.laneOffset * (TRACK_WIDTH/2 - 1.5)));
    return { pos, dir, side };
  }
  totalProgress() { return this.lap * TRACK_SEGMENTS + this.segIdx + this.segFrac; }
}

// Create racers
const COLORS = [0x00ffff, 0xff0050, 0x00ff66, 0xffaa00, 0xff00ff, 0xaaff00];
let player, racers = [];

function initRace() {
  racers.forEach(r => scene.remove(r.mesh));
  racers = [];
  for (let i = 0; i < 6; i++) {
    const r = new Racer(COLORS[i], i===0, i);
    racers.push(r);
  }
  player = racers[0];
  raceState = 'countdown';
  countdownVal = 3;
  countdownTimer = 0;
  raceTime = 0;
}

let raceState = 'menu'; // menu, countdown, racing, finished
let countdownVal = 3, countdownTimer = 0, raceTime = 0;

// Input
const keys = {};
let mLeft=false, mRight=false, mPunch=false, mKick=false;
document.addEventListener('keydown', e => { keys[e.code]=true; });
document.addEventListener('keyup', e => { keys[e.code]=false; });
// Mobile
document.getElementById('m-left').addEventListener('touchstart', e=>{e.preventDefault();mLeft=true});
document.getElementById('m-left').addEventListener('touchend', ()=>mLeft=false);
document.getElementById('m-right').addEventListener('touchstart', e=>{e.preventDefault();mRight=true});
document.getElementById('m-right').addEventListener('touchend', ()=>mRight=false);
document.getElementById('m-punch').addEventListener('touchstart', e=>{e.preventDefault();mPunch=true});
document.getElementById('m-punch').addEventListener('touchend', ()=>mPunch=false);
document.getElementById('m-kick').addEventListener('touchstart', e=>{e.preventDefault();mKick=true});
document.getElementById('m-kick').addEventListener('touchend', ()=>mKick=false);
// Tilt
let tiltX = 0;
window.addEventListener('deviceorientation', e => { if(e.gamma) tiltX = e.gamma; });

function showMsg(text, dur) {
  msgEl.textContent = text;
  msgEl.style.opacity = 1;
  setTimeout(()=> msgEl.style.opacity = 0, dur || 1500);
}

function update(dt) {
  if (raceState === 'countdown') {
    countdownTimer += dt;
    if (countdownTimer > 1) {
      countdownTimer = 0;
      countdownVal--;
      if (countdownVal > 0) showMsg(countdownVal, 800);
      else if (countdownVal === 0) { showMsg('GO!', 800); raceState = 'racing'; }
    }
    // Position bikes at start
    racers.forEach(r => {
      const {pos, dir} = r.getTrackPos();
      r.mesh.position.copy(pos);
      r.mesh.lookAt(pos.clone().add(dir));
    });
    return;
  }
  if (raceState !== 'racing') return;
  raceTime += dt;

  racers.forEach((r, ri) => {
    if (r.finished || r.crashed) {
      if (r.crashed) {
        r.crashTimer -= dt;
        if (r.crashTimer <= 0) { r.crashed = false; r.speed = 0; r.hp = Math.max(r.hp, 20); }
        r.mesh.rotation.z += 0.05;
        return;
      }
      return;
    }

    // AI logic
    if (!r.isPlayer) {
      r.speed += (r.maxSpeed - r.speed) * 0.02;
      // Weave
      if (Math.random() < 0.02) r.targetLane = (Math.random()-0.5)*1.6;
      r.laneOffset += (r.targetLane - r.laneOffset) * 0.03;
      // Try to punch player if nearby
      if (r.punchCooldown <= 0) {
        const dist = r.mesh.position.distanceTo(player.mesh.position);
        if (dist < 3 && Math.random() < 0.02) {
          r.punchCooldown = 60;
          if (dist < 2.5) {
            player.hp -= 8 + Math.floor(Math.random()*7);
            player.knockback = (Math.random()>0.5?1:-1) * 0.3;
            player.hitFlash = 10;
            playPunch();
          }
        }
      }
    } else {
      // Player input
      const accelInput = keys['ArrowUp'] || keys['KeyW'];
      const brakeInput = keys['ArrowDown'] || keys['KeyS'];
      const leftInput = keys['ArrowLeft'] || keys['KeyA'] || mLeft || tiltX < -8;
      const rightInput = keys['ArrowRight'] || keys['KeyD'] || mRight || tiltX > 8;

      if (accelInput) r.speed = Math.min(r.maxSpeed, r.speed + r.accel);
      else r.speed *= 0.995;
      if (brakeInput) r.speed = Math.max(0, r.speed - 0.015);

      if (leftInput) r.laneOffset = Math.max(-1, r.laneOffset - 0.025);
      if (rightInput) r.laneOffset = Math.min(1, r.laneOffset + 0.025);
      if (!leftInput && !rightInput) r.laneOffset *= 0.98;

      // Combat
      if (r.punchCooldown <= 0 && (keys['KeyZ'] || keys['KeyX'] || mPunch)) {
        r.punchCooldown = 30;
        const punchDir = keys['KeyZ'] ? -1 : 1;
        playPunch();
        racers.forEach(other => {
          if (other === r || other.crashed) return;
          const d = r.mesh.position.distanceTo(other.mesh.position);
          if (d < 3) {
            other.hp -= 12 + Math.floor(Math.random()*8);
            other.knockback = punchDir * 0.4;
            other.hitFlash = 10;
            other.speed *= 0.7;
            showMsg('HIT!', 500);
          }
        });
      }
      if (r.punchCooldown <= 0 && (keys['KeyC'] || mKick)) {
        r.punchCooldown = 45;
        playPunch();
        racers.forEach(other => {
          if (other === r || other.crashed) return;
          const d = r.mesh.position.distanceTo(other.mesh.position);
          if (d < 3.5) {
            other.hp -= 18 + Math.floor(Math.random()*10);
            other.knockback = (r.laneOffset < other.laneOffset ? 1 : -1) * 0.6;
            other.hitFlash = 15;
            other.speed *= 0.5;
            showMsg('KICK!', 500);
          }
        });
      }
    }

    r.punchCooldown = Math.max(0, r.punchCooldown - 1);

    // HP check
    if (r.hp <= 0) {
      r.crashed = true;
      r.crashTimer = 2;
      r.hp = 0;
      r.speed = 0;
      if (r.isPlayer) showMsg('CRASHED!', 1500);
    }

    // Knockback
    if (r.knockback) {
      r.laneOffset += r.knockback;
      r.knockback *= 0.85;
      if (Math.abs(r.knockback) < 0.01) r.knockback = 0;
    }
    r.laneOffset = Math.max(-1.1, Math.min(1.1, r.laneOffset));
    r.hitFlash = Math.max(0, r.hitFlash - 1);

    // Move along track
    r.segFrac += r.speed * 0.15;
    while (r.segFrac >= 1) {
      r.segFrac -= 1;
      r.segIdx++;
      if (r.segIdx >= TRACK_SEGMENTS) {
        r.segIdx = 0;
        r.lap++;
        if (r.isPlayer) {
          if (r.lap >= TOTAL_LAPS) {
            r.finished = true;
            const pos = getPosition(r);
            raceState = 'finished';
            showMsg('FINISHED ' + ordinal(pos) + '!', 5000);
          } else {
            showMsg('LAP ' + (r.lap+1), 1000);
          }
        } else if (r.lap >= TOTAL_LAPS) {
          r.finished = true;
        }
      }
    }

    // Position mesh
    const {pos, dir} = r.getTrackPos();
    r.mesh.position.copy(pos);
    r.mesh.position.y = r.crashed ? 0.3 : 0;
    const lookAt = pos.clone().add(dir);
    r.mesh.lookAt(lookAt);
    // Lean
    r.mesh.rotation.z = r.isPlayer ? -r.laneOffset * 0.3 : -r.laneOffset * 0.15;

    // Hit flash
    if (r.hitFlash > 0) {
      r.mesh.children[0].material.emissiveIntensity = 1;
    } else {
      r.mesh.children[0].material.emissiveIntensity = 0.3;
    }
  });

  // HP regen slowly
  racers.forEach(r => { if (!r.crashed && r.hp < 100) r.hp += 0.02; });

  // Update HUD
  const kmh = Math.round(player.speed * 280);
  document.getElementById('speed-num').textContent = kmh;
  const pos = getPosition(player);
  document.getElementById('pos-num').textContent = ordinal(pos);
  document.getElementById('hp-fill').style.width = Math.max(0, player.hp) + '%';
  document.getElementById('lap-text').textContent = 'LAP ' + Math.min(player.lap+1, TOTAL_LAPS) + '/' + TOTAL_LAPS;

  // Engine hum
  if (Math.random() < 0.1 && player.speed > 0.3) {
    playTone(40 + kmh*0.5, 0.05, 'sawtooth', 0.01);
  }

  // Camera
  const {pos: pPos, dir: pDir} = player.getTrackPos();
  const camTarget = pPos.clone().add(new THREE.Vector3(0, 4, 0)).sub(pDir.clone().multiplyScalar(8));
  camTarget.y = 4;
  camera.position.lerp(camTarget, 0.06);
  camera.lookAt(pPos.clone().add(new THREE.Vector3(0, 1.2, 0)));
}

function getPosition(racer) {
  const prog = racer.totalProgress();
  let pos = 1;
  racers.forEach(r => { if (r !== racer && r.totalProgress() > prog) pos++; });
  return pos;
}

function ordinal(n) {
  const s = ['th','st','nd','rd'];
  const v = n % 100;
  return n + (s[(v-20)%10]||s[v]||s[0]);
}

// Game loop
const clock = new THREE.Clock();
function animate() {
  const dt = Math.min(clock.getDelta(), 0.05);
  update(dt);
  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}

document.getElementById('start-btn').addEventListener('click', () => {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  startScreen.style.display = 'none';
  initRace();
  showMsg('3', 800);
});

// Start render loop immediately for bg
animate();
</script>
</body>
