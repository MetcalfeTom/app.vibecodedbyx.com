<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Neon Snake</title>
<link rel="icon" href="https://emojicdn.elk.sh/🐍">
<meta property="og:title" content="Neon Snake">
<meta property="og:description" content="Classic snake with neon glow trails and pulsating food. How long can you survive?">
<meta property="og:url" content="https://sloppy.live/neon-snake/">
<meta property="og:image" content="https://sloppy.live/neon-snake/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#06000a;display:flex;align-items:center;justify-content:center;flex-direction:column}
canvas{display:block;border:2px solid rgba(0,255,180,0.15);border-radius:4px}
#hud{position:fixed;top:12px;left:50%;transform:translateX(-50%);font-family:'Orbitron',sans-serif;color:#0f6;font-size:clamp(.7rem,2vw,1rem);z-index:5;pointer-events:none;text-align:center;text-shadow:0 0 10px rgba(0,255,100,0.5)}
#msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron',sans-serif;color:#0f6;font-size:clamp(1rem,3vw,1.6rem);z-index:10;text-align:center;line-height:2;text-shadow:0 0 20px rgba(0,255,100,0.6);pointer-events:none;transition:opacity 0.3s}
.back-link{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);z-index:20;color:rgba(0,255,100,.08);font-size:11px;text-decoration:none;font-family:'Share Tech Mono',monospace}
.back-link:hover{color:rgba(0,255,100,.3)}
#mobile{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:15;display:none}
@media(hover:none)and(pointer:coarse){#mobile{display:flex;gap:4px}}
#mobile button{width:52px;height:52px;border:1px solid rgba(0,255,100,0.2);border-radius:8px;background:rgba(0,255,100,0.05);color:#0f6;font-size:20px;font-family:'Orbitron',sans-serif;cursor:pointer;-webkit-tap-highlight-color:transparent}
#mobile button:active{background:rgba(0,255,100,0.15)}
</style>
</head>
<body>
<div id="hud">SCORE: <span id="score">0</span> &nbsp; HI: <span id="hi">0</span></div>
<div id="msg">NEON SNAKE<br><span style="font-size:0.6em;color:rgba(0,255,100,0.5)">PRESS ANY KEY OR TAP TO START</span></div>
<canvas id="cv"></canvas>
<div id="mobile">
<div style="display:flex;flex-direction:column;align-items:center;gap:4px">
<button id="bu">▲</button>
<div style="display:flex;gap:4px"><button id="bl">◀</button><button id="bd">▼</button><button id="br">▶</button></div>
</div>
</div>
<a class="back-link" href="https://sloppy.live">sloppy.live</a>
<script>
var CV=document.getElementById('cv');
var X=CV.getContext('2d');
var scoreEl=document.getElementById('score');
var hiEl=document.getElementById('hi');
var msgEl=document.getElementById('msg');

// Grid
var CELL=18;
var COLS=28,ROWS=28;
// Responsive sizing
function fitCanvas(){
  var maxW=window.innerWidth-20;
  var maxH=window.innerHeight-100;
  var maxCell=Math.floor(Math.min(maxW/COLS,maxH/ROWS));
  CELL=Math.max(10,Math.min(maxCell,22));
  CV.width=COLS*CELL;CV.height=ROWS*CELL;
}
fitCanvas();
window.addEventListener('resize',fitCanvas);

// Game state
var snake,dir,nextDir,food,score,hiScore,alive,started,speed,tick,trail;

hiScore=parseInt(localStorage.getItem('neonSnakeHi'))||0;
hiEl.textContent=hiScore;

function init(){
  var cx=Math.floor(COLS/2),cy=Math.floor(ROWS/2);
  snake=[{x:cx,y:cy},{x:cx-1,y:cy},{x:cx-2,y:cy}];
  dir={x:1,y:0};nextDir={x:1,y:0};
  score=0;scoreEl.textContent='0';
  alive=true;speed=120;tick=0;
  trail=[];
  placeFood();
}

function placeFood(){
  var attempts=0;
  do{
    food={x:Math.floor(Math.random()*COLS),y:Math.floor(Math.random()*ROWS),born:performance.now()};
    var onSnake=false;
    for(var i=0;i<snake.length;i++){
      if(snake[i].x===food.x&&snake[i].y===food.y){onSnake=true;break;}
    }
    attempts++;
    if(!onSnake) break;
  }while(attempts<500);
}

// Palettes for snake gradient
var SNAKE_COLORS=['#00ff88','#00ffcc','#00ddff','#0088ff','#4400ff','#8800ff','#cc00ff'];

function snakeColor(i,len){
  var t=len>1?i/(len-1):0;
  var idx=t*(SNAKE_COLORS.length-1);
  var lo=Math.floor(idx),hi=Math.min(SNAKE_COLORS.length-1,lo+1);
  var f=idx-lo;
  // Simple hex lerp
  var c1=SNAKE_COLORS[lo],c2=SNAKE_COLORS[hi];
  var r=Math.round(parseInt(c1.slice(1,3),16)*(1-f)+parseInt(c2.slice(1,3),16)*f);
  var g=Math.round(parseInt(c1.slice(3,5),16)*(1-f)+parseInt(c2.slice(3,5),16)*f);
  var b=Math.round(parseInt(c1.slice(5,7),16)*(1-f)+parseInt(c2.slice(5,7),16)*f);
  return 'rgb('+r+','+g+','+b+')';
}

// --- INPUT ---
function setDir(dx,dy){
  if(dx===1&&dir.x===-1) return;
  if(dx===-1&&dir.x===1) return;
  if(dy===1&&dir.y===-1) return;
  if(dy===-1&&dir.y===1) return;
  nextDir={x:dx,y:dy};
}

document.addEventListener('keydown',function(e){
  if(!started){started=true;init();msgEl.style.opacity='0';return;}
  if(!alive){started=true;init();msgEl.style.opacity='0';return;}
  if(e.key==='ArrowUp'||e.key==='w'||e.key==='W') setDir(0,-1);
  else if(e.key==='ArrowDown'||e.key==='s'||e.key==='S') setDir(0,1);
  else if(e.key==='ArrowLeft'||e.key==='a'||e.key==='A') setDir(-1,0);
  else if(e.key==='ArrowRight'||e.key==='d'||e.key==='D') setDir(1,0);
});

// Mobile buttons
document.getElementById('bu').addEventListener('touchstart',function(e){e.preventDefault();handleTap(0,-1);});
document.getElementById('bd').addEventListener('touchstart',function(e){e.preventDefault();handleTap(0,1);});
document.getElementById('bl').addEventListener('touchstart',function(e){e.preventDefault();handleTap(-1,0);});
document.getElementById('br').addEventListener('touchstart',function(e){e.preventDefault();handleTap(1,0);});

function handleTap(dx,dy){
  if(!started||!alive){started=true;init();msgEl.style.opacity='0';return;}
  setDir(dx,dy);
}

// Tap to start on canvas
CV.addEventListener('touchstart',function(e){
  if(!started||!alive){started=true;init();msgEl.style.opacity='0';}
});
CV.addEventListener('click',function(){
  if(!started||!alive){started=true;init();msgEl.style.opacity='0';}
});

// Swipe controls
var touchStartX=0,touchStartY=0;
CV.addEventListener('touchstart',function(e){touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;},{passive:true});
CV.addEventListener('touchend',function(e){
  if(!alive) return;
  var dx=e.changedTouches[0].clientX-touchStartX;
  var dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)<15&&Math.abs(dy)<15) return;
  if(Math.abs(dx)>Math.abs(dy)){setDir(dx>0?1:-1,0);}
  else{setDir(0,dy>0?1:-1);}
});

// --- UPDATE ---
function update(now){
  if(!started||!alive) return;
  tick+=16.67; // approximate
  if(tick<speed) return;
  tick=0;

  dir=nextDir;
  var head={x:snake[0].x+dir.x,y:snake[0].y+dir.y};

  // Wall collision
  if(head.x<0||head.x>=COLS||head.y<0||head.y>=ROWS){die();return;}
  // Self collision
  for(var i=0;i<snake.length;i++){
    if(snake[i].x===head.x&&snake[i].y===head.y){die();return;}
  }

  snake.unshift(head);

  // Eat food
  if(head.x===food.x&&head.y===food.y){
    score++;scoreEl.textContent=score;
    if(score>hiScore){hiScore=score;hiEl.textContent=hiScore;localStorage.setItem('neonSnakeHi',''+hiScore);}
    // Speed up gradually
    speed=Math.max(55,120-score*1.5);
    // Spawn eat particles
    for(var p=0;p<6;p++){
      var a=Math.random()*Math.PI*2;
      trail.push({x:food.x*CELL+CELL/2,y:food.y*CELL+CELL/2,
        vx:Math.cos(a)*60,vy:Math.sin(a)*60,life:0.5,maxLife:0.5,
        color:'#ff0088',r:3});
    }
    placeFood();
  } else {
    // Add trail ghost from removed tail
    var removed=snake.pop();
    trail.push({x:removed.x*CELL+CELL/2,y:removed.y*CELL+CELL/2,
      vx:0,vy:0,life:0.4,maxLife:0.4,
      color:snakeColor(snake.length,snake.length+5),r:CELL*0.35});
  }
}

function die(){
  alive=false;
  // Death burst
  for(var i=0;i<snake.length;i++){
    var seg=snake[i];
    for(var p=0;p<2;p++){
      var a=Math.random()*Math.PI*2;
      trail.push({x:seg.x*CELL+CELL/2,y:seg.y*CELL+CELL/2,
        vx:Math.cos(a)*80,vy:Math.sin(a)*80,life:0.8,maxLife:0.8,
        color:snakeColor(i,snake.length),r:3});
    }
  }
  msgEl.innerHTML='GAME OVER<br><span style="font-size:0.5em;color:rgba(0,255,100,0.4)">SCORE: '+score+'</span><br><span style="font-size:0.5em;color:rgba(0,255,100,0.3)">TAP OR PRESS ANY KEY</span>';
  msgEl.style.opacity='1';
}

// --- DRAW ---
function draw(now){
  X.fillStyle='#06000a';X.fillRect(0,0,CV.width,CV.height);

  // Subtle grid
  X.strokeStyle='rgba(0,255,100,0.02)';X.lineWidth=0.5;
  for(var gx=0;gx<=COLS;gx++){X.beginPath();X.moveTo(gx*CELL,0);X.lineTo(gx*CELL,ROWS*CELL);X.stroke();}
  for(var gy=0;gy<=ROWS;gy++){X.beginPath();X.moveTo(0,gy*CELL);X.lineTo(COLS*CELL,gy*CELL);X.stroke();}

  if(!started){drawFood(now);return;}

  // Trail particles
  for(var i=trail.length-1;i>=0;i--){
    var t=trail[i];
    t.x+=t.vx*(1/60);t.y+=t.vy*(1/60);
    t.life-=1/60;
    if(t.life<=0){trail.splice(i,1);continue;}
    var ta=t.life/t.maxLife;
    X.globalAlpha=ta*0.5;
    X.fillStyle=t.color;
    X.shadowColor=t.color;X.shadowBlur=8;
    X.beginPath();X.arc(t.x,t.y,t.r*ta,0,Math.PI*2);X.fill();
    X.shadowBlur=0;
  }
  X.globalAlpha=1;

  // Snake
  for(var i=snake.length-1;i>=0;i--){
    var s=snake[i];
    var c=snakeColor(i,snake.length);
    var cx=s.x*CELL+CELL/2,cy=s.y*CELL+CELL/2;
    var r=CELL*0.42;
    if(i===0) r=CELL*0.48; // Head bigger

    // Glow
    X.shadowColor=c;X.shadowBlur=i===0?18:10;
    X.fillStyle=c;
    X.beginPath();
    if(i===0){
      // Rounded head
      X.arc(cx,cy,r,0,Math.PI*2);
    } else {
      // Rounded body segment
      X.beginPath();
      X.roundRect(s.x*CELL+1,s.y*CELL+1,CELL-2,CELL-2,4);
    }
    X.fill();
    X.shadowBlur=0;

    // Head eyes
    if(i===0){
      X.fillStyle='#fff';
      var ex1=cx+dir.x*CELL*0.18+dir.y*CELL*0.15;
      var ey1=cy+dir.y*CELL*0.18-dir.x*CELL*0.15;
      var ex2=cx+dir.x*CELL*0.18-dir.y*CELL*0.15;
      var ey2=cy+dir.y*CELL*0.18+dir.x*CELL*0.15;
      X.beginPath();X.arc(ex1,ey1,2.5,0,Math.PI*2);X.fill();
      X.beginPath();X.arc(ex2,ey2,2.5,0,Math.PI*2);X.fill();
    }

    // Inner highlight
    if(i===0){
      X.fillStyle='rgba(255,255,255,0.15)';
      X.beginPath();X.arc(cx-r*0.2,cy-r*0.2,r*0.4,0,Math.PI*2);X.fill();
    }
  }

  // Food
  drawFood(now);
}

function drawFood(now){
  if(!food) return;
  var fx=food.x*CELL+CELL/2,fy=food.y*CELL+CELL/2;
  var age=(now-food.born)/1000;
  var pulse=0.7+Math.sin(age*5)*0.3;
  var pulse2=1+Math.sin(age*3)*0.15;
  var r=CELL*0.4*pulse2;

  // Outer glow ring
  X.strokeStyle='rgba(255,0,136,'+(0.15+Math.sin(age*4)*0.1)+')';
  X.lineWidth=2;X.shadowColor='#ff0088';X.shadowBlur=15;
  X.beginPath();X.arc(fx,fy,r*1.8*pulse,0,Math.PI*2);X.stroke();

  // Second ring
  X.strokeStyle='rgba(255,0,200,'+(0.08+Math.sin(age*6)*0.05)+')';
  X.lineWidth=1;
  X.beginPath();X.arc(fx,fy,r*2.5*pulse,0,Math.PI*2);X.stroke();
  X.shadowBlur=0;

  // Glow halo
  var fg=X.createRadialGradient(fx,fy,0,fx,fy,r*2);
  fg.addColorStop(0,'rgba(255,0,136,'+(0.2*pulse)+')');
  fg.addColorStop(1,'transparent');
  X.fillStyle=fg;X.beginPath();X.arc(fx,fy,r*2,0,Math.PI*2);X.fill();

  // Core
  X.fillStyle='#ff0088';X.shadowColor='#ff0088';X.shadowBlur=12;
  X.beginPath();X.arc(fx,fy,r*pulse,0,Math.PI*2);X.fill();
  // Inner bright
  X.fillStyle='rgba(255,200,255,'+(0.5*pulse)+')';X.shadowBlur=0;
  X.beginPath();X.arc(fx-r*0.15,fy-r*0.15,r*0.35,0,Math.PI*2);X.fill();
}

// --- LOOP ---
var started=false;
init();

var lastNow=performance.now();
function loop(now){
  var dt=now-lastNow;lastNow=now;
  update(now);
  draw(now);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
