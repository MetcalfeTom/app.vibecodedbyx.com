<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Neon Snake</title>
<meta name="description" content="Classic snake with serious neon trail effects. Ribbon trails, spark emission, speed lines, the works.">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%90%8D">
<meta property="og:title" content="Neon Snake">
<meta property="og:description" content="Classic snake with serious neon trails. Ribbon ghosts behind the head, spark emission off every segment, speed lines at full tilt.">
<meta property="og:url" content="https://sloppy.live/neon-snake">
<meta property="og:image" content="https://image.pollinations.ai/prompt/neon%20snake%20game%2C%20rainbow%20glowing%20snake%20with%20long%20light%20trails%2C%20pink%20pulsing%20food%2C%20dark%20synthwave%20void?width=1200&height=630&seed=8848&nologo=true">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Rubik+Mono+One&family=Share+Tech+Mono&family=Cormorant+Garamond:ital,wght@1,500&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #06000a;
    --grid: rgba(0, 255, 180, 0.06);
    --cyan: #00f0ff;
    --magenta: #ff2bd6;
    --lime: #6cfa5e;
    --hot: #ff5fa7;
    --gold: #ffd54a;
    --bone: #e6e0f0;
    --dim: #7d7a8a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 100%; }
  body {
    width: 100%;
    min-height: 100vh;
    overflow: hidden;
    background:
      radial-gradient(ellipse at 18% 12%, rgba(0,240,255,0.10), transparent 55%),
      radial-gradient(ellipse at 82% 88%, rgba(255,43,214,0.10), transparent 55%),
      var(--void);
    color: var(--bone);
    font-family: 'Share Tech Mono', monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overscroll-behavior: none;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    background: repeating-linear-gradient(0deg, rgba(0,255,180,0.02) 0 1px, transparent 1px 3px);
    mix-blend-mode: screen;
  }
  #wrap {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.6rem;
    padding: 0.8rem 0.6rem 5.5rem;
  }
  #hud {
    display: flex;
    justify-content: center;
    gap: 1.4rem;
    font-family: 'Audiowide', sans-serif;
    font-size: clamp(0.78rem, 2vw, 1rem);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-shadow: 0 0 12px rgba(0,240,255,0.5);
    color: var(--cyan);
  }
  #hud .score-val {
    color: var(--gold);
    font-family: 'Rubik Mono One', sans-serif;
    font-size: 1.4em;
    line-height: 1;
    text-shadow: 0 0 14px rgba(255,213,74,0.6);
    margin-left: 0.4rem;
    font-variant-numeric: tabular-nums;
  }
  #hud .hi-val {
    color: var(--magenta);
    font-family: 'Rubik Mono One', sans-serif;
    font-size: 1.4em;
    line-height: 1;
    text-shadow: 0 0 14px rgba(255,43,214,0.6);
    margin-left: 0.4rem;
    font-variant-numeric: tabular-nums;
  }
  canvas#cv {
    display: block;
    border: 1.5px solid rgba(0,240,255,0.32);
    border-radius: 6px;
    box-shadow:
      0 0 40px rgba(0,240,255,0.20),
      0 0 80px rgba(255,43,214,0.12),
      inset 0 0 40px rgba(0,0,0,0.6);
    background: var(--void);
  }
  #title-bar {
    text-align: center;
    margin-bottom: 0.2rem;
  }
  h1 {
    font-family: 'Audiowide', sans-serif;
    font-size: clamp(1.6rem, 4.5vw, 2.6rem);
    line-height: 1;
    letter-spacing: 0.08em;
    background: linear-gradient(90deg, var(--cyan), var(--lime), var(--magenta));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 24px rgba(0,240,255,0.4);
    margin: 0;
  }
  .sub {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(0.85rem, 1.8vw, 1rem);
    color: var(--dim);
    margin-top: 0.1rem;
  }
  .sub em { color: var(--hot); font-style: italic; }
  #msg {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Audiowide', sans-serif;
    color: var(--cyan);
    font-size: clamp(1.2rem, 3vw, 2rem);
    z-index: 10;
    text-align: center;
    line-height: 1.6;
    text-shadow: 0 0 28px rgba(0,240,255,0.7);
    pointer-events: none;
    transition: opacity 0.3s;
    letter-spacing: 0.1em;
  }
  #msg .ghost-line {
    font-size: 0.5em;
    color: rgba(0,240,255,0.6);
    letter-spacing: 0.25em;
    display: block;
    margin-top: 0.3rem;
  }
  #msg .final {
    font-size: 0.6em;
    color: var(--gold);
    font-family: 'Rubik Mono One', sans-serif;
    display: block;
    margin-top: 0.4rem;
    text-shadow: 0 0 18px rgba(255,213,74,0.6);
  }
  #msg.hide { opacity: 0; }
  #controls {
    position: fixed;
    bottom: 0.9rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 12;
    display: flex;
    gap: 0.5rem;
    align-items: center;
  }
  .ctrl-btn {
    background: rgba(0,240,255,0.08);
    border: 1px solid rgba(0,240,255,0.35);
    color: var(--cyan);
    font-family: 'Audiowide', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.16em;
    padding: 0.55rem 0.75rem;
    border-radius: 0.4rem;
    cursor: pointer;
    text-transform: uppercase;
    min-height: 2.5rem;
    transition: all 0.15s ease;
  }
  .ctrl-btn:hover { background: rgba(0,240,255,0.16); box-shadow: 0 0 14px rgba(0,240,255,0.4); }
  .ctrl-btn:focus-visible { outline: 3px solid var(--gold); outline-offset: 2px; }
  #mobile-pad {
    display: none;
    grid-template-areas:
      ".  up  ."
      "lt  .  rt"
      ".  dn  .";
    gap: 4px;
  }
  @media (hover: none) and (pointer: coarse) {
    #mobile-pad { display: grid; }
    #controls { bottom: 0.6rem; }
  }
  .pad-btn {
    width: 3rem;
    height: 3rem;
    border: 1.5px solid rgba(0,240,255,0.4);
    border-radius: 8px;
    background: rgba(0,240,255,0.08);
    color: var(--cyan);
    font-size: 1.3rem;
    font-family: 'Audiowide', sans-serif;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
  }
  .pad-btn:active { background: rgba(0,240,255,0.22); }
  #bu { grid-area: up; }
  #bd { grid-area: dn; }
  #bl { grid-area: lt; }
  #br { grid-area: rt; }
  #stage-wrap {
    position: relative;
  }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }
</style>
</head>
<body>
<div id="wrap">
  <div id="title-bar">
    <h1>NEON SNAKE</h1>
    <div class="sub">eat the dot. <em>burn the trail.</em></div>
  </div>
  <div id="hud" role="status" aria-live="polite">
    <span>Score<span class="score-val" id="score">0</span></span>
    <span>Hi<span class="hi-val" id="hi">0</span></span>
    <span style="color: var(--lime); text-shadow: 0 0 12px rgba(108,250,94,0.5)">Spd<span class="score-val" id="spd" style="color: var(--lime); text-shadow: 0 0 14px rgba(108,250,94,0.6)">9</span></span>
    <span id="combo-wrap" style="color: var(--hot); text-shadow: 0 0 12px rgba(255,95,167,0.5)">Combo<span class="score-val" id="combo" style="color: var(--hot); text-shadow: 0 0 14px rgba(255,95,167,0.6)">×1</span></span>
  </div>
  <div id="stage-wrap">
    <canvas id="cv" aria-label="Snake playfield"></canvas>
    <div id="msg" role="dialog" aria-live="polite">
      NEON SNAKE
      <span class="ghost-line">press any key · tap to start</span>
    </div>
  </div>
</div>
<div id="controls">
  <button class="ctrl-btn" id="muteBtn" type="button" aria-label="Toggle sound">🔊 SFX</button>
  <button class="ctrl-btn" id="wrapBtn" type="button" aria-pressed="false" aria-label="Toggle wrap-around walls">▢ WRAP</button>
  <button class="ctrl-btn" id="restartBtn" type="button">↻ Restart</button>
  <div id="mobile-pad" aria-label="Direction pad">
    <button class="pad-btn" id="bu" type="button" aria-label="Up">▲</button>
    <button class="pad-btn" id="bl" type="button" aria-label="Left">◀</button>
    <button class="pad-btn" id="bd" type="button" aria-label="Down">▼</button>
    <button class="pad-btn" id="br" type="button" aria-label="Right">▶</button>
  </div>
</div>

<script>
(function(){
  const CV = document.getElementById('cv');
  const X = CV.getContext('2d');
  const scoreEl = document.getElementById('score');
  const hiEl = document.getElementById('hi');
  const spdEl = document.getElementById('spd');
  const msgEl = document.getElementById('msg');
  const muteBtn = document.getElementById('muteBtn');
  const restartBtn = document.getElementById('restartBtn');

  const COLS = 28, ROWS = 28;
  const HI_KEY = 'neonSnakeHi';
  let CELL = 18;

  function fitCanvas() {
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    const maxW = Math.min(window.innerWidth - 24, 720);
    const maxH = window.innerHeight - 220;
    const maxCell = Math.floor(Math.min(maxW / COLS, maxH / ROWS));
    CELL = Math.max(11, Math.min(maxCell, 24));
    const W = COLS * CELL, H = ROWS * CELL;
    CV.style.width = W + 'px';
    CV.style.height = H + 'px';
    CV.width = W * dpr;
    CV.height = H * dpr;
    X.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  fitCanvas();
  window.addEventListener('resize', fitCanvas);

  // Game state
  const state = {
    snake: [],
    dir: { x: 1, y: 0 },
    nextDir: { x: 1, y: 0 },
    food: null,
    score: 0,
    hi: parseInt(localStorage.getItem(HI_KEY)) || 0,
    alive: false,
    started: false,
    speed: 130,      // ms per tick
    minSpeed: 60,
    tickAcc: 0,
    lastTickAt: 0,
    headTrail: [],   // [{x, y, t}] in pixel coords
    sparks: [],      // [{x, y, vx, vy, life, maxLife, color, r}]
    sound: true,
    shake: 0,
    flash: 0,        // red flash on death
    deathFreezeUntil: 0,
    // — added 2026-05-22: wrap mode + gold bonus + combo multiplier —
    wrapMode: (localStorage.getItem('neonSnakeWrap') === '1'),
    gold: null,      // { x, y, born, life }  (life in seconds)
    combo: 1,
    comboMax: 1,
    lastEatAt: 0,    // ms timestamp of last pellet eaten
    floats: [],      // [{ x, y, text, color, age, life }]
  };
  hiEl.textContent = state.hi;
  const WRAP_KEY = 'neonSnakeWrap';
  const GOLD_LIFE_MS = 8000;
  const COMBO_DECAY_MS = 4000;

  function init() {
    const cx = Math.floor(COLS / 2), cy = Math.floor(ROWS / 2);
    state.snake = [{ x: cx, y: cy }, { x: cx - 1, y: cy }, { x: cx - 2, y: cy }];
    state.dir = { x: 1, y: 0 };
    state.nextDir = { x: 1, y: 0 };
    state.score = 0;
    state.alive = true;
    state.speed = 130;
    state.tickAcc = 0;
    state.lastTickAt = performance.now();
    state.headTrail = [];
    state.sparks = [];
    state.shake = 0;
    state.flash = 0;
    state.gold = null;
    state.combo = 1;
    state.comboMax = 1;
    state.lastEatAt = 0;
    state.floats = [];
    scoreEl.textContent = '0';
    spdEl.textContent = '9';
    const comboEl = document.getElementById('combo');
    if (comboEl) comboEl.textContent = '×1';
    placeFood();
  }
  function placeGold(){
    // pick a free cell — skip if grid is too packed
    for (let tries = 0; tries < 200; tries++){
      const gx = Math.floor(Math.random() * COLS);
      const gy = Math.floor(Math.random() * ROWS);
      let occ = false;
      for (let i = 0; i < state.snake.length; i++){
        if (state.snake[i].x === gx && state.snake[i].y === gy){ occ = true; break; }
      }
      if (occ) continue;
      if (state.food && state.food.x === gx && state.food.y === gy) continue;
      state.gold = { x: gx, y: gy, born: performance.now(), life: GOLD_LIFE_MS };
      return;
    }
  }

  function placeFood() {
    let attempts = 0;
    while (attempts < 800) {
      const fx = Math.floor(Math.random() * COLS);
      const fy = Math.floor(Math.random() * ROWS);
      let onSnake = false;
      for (let i = 0; i < state.snake.length; i++) {
        if (state.snake[i].x === fx && state.snake[i].y === fy) { onSnake = true; break; }
      }
      if (!onSnake) {
        state.food = { x: fx, y: fy, born: performance.now() };
        return;
      }
      attempts++;
    }
  }

  // Color helpers
  const SNAKE_COLORS = ['#6cfa5e', '#00f0ff', '#5fb3ff', '#8a5bff', '#ff5fa7', '#ff2bd6'];
  function lerpHex(a, b, t) {
    const ar = parseInt(a.slice(1, 3), 16), ag = parseInt(a.slice(3, 5), 16), ab = parseInt(a.slice(5, 7), 16);
    const br = parseInt(b.slice(1, 3), 16), bg = parseInt(b.slice(3, 5), 16), bb = parseInt(b.slice(5, 7), 16);
    const r = Math.round(ar + (br - ar) * t);
    const g = Math.round(ag + (bg - ag) * t);
    const b2 = Math.round(ab + (bb - ab) * t);
    return `rgb(${r},${g},${b2})`;
  }
  function snakeColor(i, len) {
    const t = len > 1 ? i / (len - 1) : 0;
    const slots = SNAKE_COLORS.length - 1;
    const idx = t * slots;
    const lo = Math.floor(idx);
    const hi = Math.min(slots, lo + 1);
    return lerpHex(SNAKE_COLORS[lo], SNAKE_COLORS[hi], idx - lo);
  }

  // Audio
  let audioCtx = null, master = null;
  function ensureAudio() {
    if (audioCtx) return;
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    audioCtx = new Ctx();
    master = audioCtx.createGain();
    master.gain.value = 0.4;
    master.connect(audioCtx.destination);
  }
  function withSound(fn) {
    if (!state.sound) return;
    ensureAudio();
    if (!audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    fn(audioCtx.currentTime);
  }
  function playEat() {
    withSound(t => {
      const base = 520 + state.score * 12;
      [base, base * 1.5, base * 2].forEach((f, i) => {
        const o = audioCtx.createOscillator();
        o.type = i === 0 ? 'triangle' : 'sine';
        o.frequency.value = f;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0, t + i * 0.04);
        g.gain.linearRampToValueAtTime(0.12 - i * 0.03, t + i * 0.04 + 0.01);
        g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.04 + 0.25);
        o.connect(g); g.connect(master);
        o.start(t + i * 0.04); o.stop(t + i * 0.04 + 0.27);
      });
    });
  }
  function playGold(){
    withSound(t => {
      // 4-note major arpeggio with extra shimmer
      [659, 880, 1175, 1568].forEach((f, i) => {
        const o = audioCtx.createOscillator();
        o.type = i === 3 ? 'sine' : 'triangle';
        o.frequency.value = f;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0, t + i * 0.05);
        g.gain.linearRampToValueAtTime(0.14, t + i * 0.05 + 0.01);
        g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.05 + 0.32);
        o.connect(g); g.connect(master);
        o.start(t + i * 0.05); o.stop(t + i * 0.05 + 0.34);
      });
    });
  }
  function playMove() {
    withSound(t => {
      const o = audioCtx.createOscillator();
      o.type = 'square'; o.frequency.value = 110;
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.02, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.035);
      o.connect(g); g.connect(master);
      o.start(t); o.stop(t + 0.04);
    });
  }
  function playDie() {
    withSound(t => {
      const o = audioCtx.createOscillator();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(440, t);
      o.frequency.exponentialRampToValueAtTime(60, t + 0.6);
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.22, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
      const f = audioCtx.createBiquadFilter();
      f.type = 'lowpass'; f.frequency.value = 1100;
      o.connect(f); f.connect(g); g.connect(master);
      o.start(t); o.stop(t + 0.62);
      // Noise burst
      const len = Math.floor(0.4 * audioCtx.sampleRate);
      const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * (1 - i/len);
      const src = audioCtx.createBufferSource(); src.buffer = buf;
      const ng = audioCtx.createGain(); ng.gain.value = 0.16;
      src.connect(ng); ng.connect(master);
      src.start(t);
    });
  }

  // Input
  function setDir(dx, dy) {
    if (dx === 1 && state.dir.x === -1) return;
    if (dx === -1 && state.dir.x === 1) return;
    if (dy === 1 && state.dir.y === -1) return;
    if (dy === -1 && state.dir.y === 1) return;
    state.nextDir = { x: dx, y: dy };
  }
  function startIfNeeded() {
    if (!state.started || !state.alive) {
      state.started = true;
      init();
      msgEl.classList.add('hide');
      ensureAudio();
    }
  }
  document.addEventListener('keydown', (e) => {
    if (e.key === ' ' || e.key.startsWith('Arrow') || /[wasdWASD]/.test(e.key)) e.preventDefault();
    if (!state.started || !state.alive) {
      if (e.key === ' ' || e.key === 'Enter' || e.key.startsWith('Arrow') || /[wasdWASD]/.test(e.key)) {
        startIfNeeded();
        return;
      }
    }
    if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') setDir(0, -1);
    else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') setDir(0, 1);
    else if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') setDir(-1, 0);
    else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') setDir(1, 0);
    else if (e.key === 'm' || e.key === 'M') muteBtn.click();
    else if (e.key === 'r' || e.key === 'R') restartBtn.click();
  });
  // Mobile pad
  function bindPad(id, dx, dy) {
    const b = document.getElementById(id);
    const fire = (e) => { e.preventDefault(); if (!state.started || !state.alive) startIfNeeded(); else setDir(dx, dy); };
    b.addEventListener('pointerdown', fire);
  }
  bindPad('bu', 0, -1); bindPad('bd', 0, 1); bindPad('bl', -1, 0); bindPad('br', 1, 0);
  CV.addEventListener('pointerdown', () => { if (!state.started || !state.alive) startIfNeeded(); });
  // Swipe
  let touchStartX = 0, touchStartY = 0;
  CV.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY; }, { passive: true });
  CV.addEventListener('touchend', (e) => {
    if (!state.alive) return;
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) < 15 && Math.abs(dy) < 15) return;
    if (Math.abs(dx) > Math.abs(dy)) setDir(dx > 0 ? 1 : -1, 0);
    else setDir(0, dy > 0 ? 1 : -1);
  });

  muteBtn.addEventListener('click', () => {
    state.sound = !state.sound;
    muteBtn.textContent = state.sound ? '🔊 SFX' : '🔇 SFX';
    if (state.sound) ensureAudio();
  });
  const wrapBtn = document.getElementById('wrapBtn');
  function updateWrapBtn(){
    wrapBtn.textContent = state.wrapMode ? '◌ WRAP' : '▢ WRAP';
    wrapBtn.classList.toggle('on', state.wrapMode);
    wrapBtn.setAttribute('aria-pressed', state.wrapMode ? 'true' : 'false');
  }
  wrapBtn.addEventListener('click', () => {
    state.wrapMode = !state.wrapMode;
    try { localStorage.setItem(WRAP_KEY, state.wrapMode ? '1' : '0'); } catch(_){}
    updateWrapBtn();
  });
  updateWrapBtn();
  restartBtn.addEventListener('click', () => { state.started = true; init(); msgEl.classList.add('hide'); });

  // Tick
  function tick() {
    state.dir = state.nextDir;
    let head = { x: state.snake[0].x + state.dir.x, y: state.snake[0].y + state.dir.y };

    if (state.wrapMode){
      // pass through walls — wrap to opposite edge
      if (head.x < 0) head.x = COLS - 1;
      else if (head.x >= COLS) head.x = 0;
      if (head.y < 0) head.y = ROWS - 1;
      else if (head.y >= ROWS) head.y = 0;
    } else {
      if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) { die(); return; }
    }
    for (let i = 0; i < state.snake.length; i++) {
      if (state.snake[i].x === head.x && state.snake[i].y === head.y) { die(); return; }
    }
    state.snake.unshift(head);

    // combo decay before this tick's potential eat
    const now = performance.now();
    if (state.combo > 1 && state.lastEatAt > 0 && (now - state.lastEatAt) > COMBO_DECAY_MS){
      state.combo = 1;
      const ce = document.getElementById('combo');
      if (ce) ce.textContent = '×1';
    }

    // gold pellet pickup
    let ateGold = false;
    if (state.gold && head.x === state.gold.x && head.y === state.gold.y){
      const goldPts = 5 * state.combo;
      state.score += goldPts;
      scoreEl.textContent = state.score;
      if (state.score > state.hi) {
        state.hi = state.score;
        hiEl.textContent = state.hi;
        try { localStorage.setItem(HI_KEY, '' + state.hi); } catch (e) {}
      }
      // gold burst — yellow particles + bigger shockwave
      for (let p = 0; p < 36; p++){
        const a = Math.random() * Math.PI * 2;
        const sp = 60 + Math.random() * 240;
        state.sparks.push({
          x: state.gold.x * CELL + CELL/2,
          y: state.gold.y * CELL + CELL/2,
          vx: Math.cos(a) * sp,
          vy: Math.sin(a) * sp,
          life: 0.7 + Math.random() * 0.5,
          maxLife: 1.2,
          color: Math.random() < 0.7 ? '#ffd54a' : '#fff7a8',
          r: 2 + Math.random() * 2.4,
        });
      }
      state.sparks.push({
        x: state.gold.x * CELL + CELL/2,
        y: state.gold.y * CELL + CELL/2,
        kind: 'ring', life: 0.7, maxLife: 0.7,
        r: CELL * 0.5, color: '#ffd54a',
      });
      state.floats.push({
        x: state.gold.x * CELL + CELL/2,
        y: state.gold.y * CELL + CELL/2 - 4,
        text: '+' + goldPts + ' GOLD',
        color: '#ffd54a',
        age: 0, life: 1.1,
      });
      state.shake = Math.max(state.shake, 12);
      state.gold = null;
      playGold();
      ateGold = true;
    }

    if (state.food && head.x === state.food.x && head.y === state.food.y) {
      // combo: any pellet within 4s of last keeps the chain alive
      if (state.lastEatAt > 0 && (now - state.lastEatAt) <= COMBO_DECAY_MS){
        state.combo = Math.min(8, state.combo + 1);
        if (state.combo > state.comboMax) state.comboMax = state.combo;
      }
      state.lastEatAt = now;
      const pellPts = 1 * state.combo;
      state.score += pellPts;
      scoreEl.textContent = state.score;
      if (state.score > state.hi) {
        state.hi = state.score;
        hiEl.textContent = state.hi;
        try { localStorage.setItem(HI_KEY, '' + state.hi); } catch (e) {}
      }
      state.speed = Math.max(state.minSpeed, 130 - state.score * 2.2);
      spdEl.textContent = Math.round(2200 / state.speed);
      const ce = document.getElementById('combo');
      if (ce) ce.textContent = '×' + state.combo;
      // Eat burst — pink + gold sparks
      for (let p = 0; p < 22; p++) {
        const a = Math.random() * Math.PI * 2;
        const sp = 50 + Math.random() * 200;
        state.sparks.push({
          x: state.food.x * CELL + CELL/2,
          y: state.food.y * CELL + CELL/2,
          vx: Math.cos(a) * sp,
          vy: Math.sin(a) * sp,
          life: 0.6 + Math.random() * 0.4,
          maxLife: 1.0,
          color: Math.random() < 0.4 ? '#ffd54a' : '#ff2bd6',
          r: 1.8 + Math.random() * 2.2,
        });
      }
      // Shockwave
      state.sparks.push({
        x: state.food.x * CELL + CELL/2,
        y: state.food.y * CELL + CELL/2,
        kind: 'ring', life: 0.5, maxLife: 0.5,
        r: CELL * 0.5, color: '#ff5fa7',
      });
      if (state.combo >= 2){
        state.floats.push({
          x: state.food.x * CELL + CELL/2,
          y: state.food.y * CELL + CELL/2 - 4,
          text: '×' + state.combo,
          color: '#ff5fa7',
          age: 0, life: 0.8,
        });
      }
      placeFood();
      // ~ every 4th pellet, drop a gold (if one isn't already present)
      if (!state.gold && state.snake.length >= 5 && (state.score % 4 === 0 || Math.random() < 0.18)){
        placeGold();
      }
      playEat();
    } else if (!ateGold) {
      state.snake.pop();
    } else {
      // gold ate didn't grow — still pop tail
      state.snake.pop();
    }

    // Per-segment spark emission
    for (let i = 0; i < state.snake.length; i++) {
      if (Math.random() < 0.5) {
        const seg = state.snake[i];
        const c = snakeColor(i, state.snake.length);
        state.sparks.push({
          x: seg.x * CELL + CELL/2 + (Math.random()-0.5) * CELL * 0.6,
          y: seg.y * CELL + CELL/2 + (Math.random()-0.5) * CELL * 0.6,
          vx: (Math.random()-0.5) * 18,
          vy: (Math.random()-0.5) * 18,
          life: 0.32 + Math.random() * 0.2,
          maxLife: 0.55,
          color: c,
          r: 1.2 + Math.random() * 1.4,
        });
      }
    }

    playMove();
  }

  function die() {
    state.alive = false;
    state.shake = 18;
    state.flash = 0.6;
    state.deathFreezeUntil = performance.now() + 250;
    // Massive death burst — every segment explodes
    for (let i = 0; i < state.snake.length; i++) {
      const seg = state.snake[i];
      const c = snakeColor(i, state.snake.length);
      for (let p = 0; p < 6; p++) {
        const a = Math.random() * Math.PI * 2;
        const sp = 90 + Math.random() * 220;
        state.sparks.push({
          x: seg.x * CELL + CELL/2,
          y: seg.y * CELL + CELL/2,
          vx: Math.cos(a) * sp,
          vy: Math.sin(a) * sp,
          life: 0.7 + Math.random() * 0.6,
          maxLife: 1.3,
          color: c,
          r: 1.8 + Math.random() * 2.5,
        });
      }
    }
    msgEl.innerHTML = `GAME OVER<span class="final">SCORE ${state.score}</span><span class="ghost-line">press any key · tap to restart</span>`;
    msgEl.classList.remove('hide');
    playDie();
  }

  // Render
  let lastNow = performance.now();
  let bgPattern = null;
  function loop(now) {
    const dt = Math.min(0.05, (now - lastNow) / 1000);
    lastNow = now;
    if (state.started && state.alive) {
      state.tickAcc += (now - state.lastTickAt);
      state.lastTickAt = now;
      while (state.tickAcc >= state.speed) {
        state.tickAcc -= state.speed;
        tick();
        if (!state.alive) break;
      }
    } else {
      state.lastTickAt = now;
    }

    // Record head trail
    if (state.alive && state.snake.length) {
      const h = state.snake[0];
      const hx = h.x * CELL + CELL/2;
      const hy = h.y * CELL + CELL/2;
      const last = state.headTrail[state.headTrail.length - 1];
      if (!last || last.x !== hx || last.y !== hy) {
        state.headTrail.push({ x: hx, y: hy, t: now });
      }
      // Prune old (>0.9s)
      while (state.headTrail.length && now - state.headTrail[0].t > 900) {
        state.headTrail.shift();
      }
    }

    // Update sparks
    for (let i = state.sparks.length - 1; i >= 0; i--) {
      const s = state.sparks[i];
      if (s.kind === 'ring') {
        s.life -= dt;
        s.r += dt * 320;
        if (s.life <= 0) state.sparks.splice(i, 1);
        continue;
      }
      s.x += s.vx * dt;
      s.y += s.vy * dt;
      s.vx *= 0.94;
      s.vy *= 0.94;
      s.life -= dt;
      if (s.life <= 0) state.sparks.splice(i, 1);
    }

    state.shake *= 0.88;
    if (state.shake < 0.1) state.shake = 0;
    state.flash *= 0.92;

    draw(now);
    requestAnimationFrame(loop);
  }

  function draw(now) {
    const W = COLS * CELL, H = ROWS * CELL;
    const sx = state.shake > 0 ? (Math.random() - 0.5) * state.shake : 0;
    const sy = state.shake > 0 ? (Math.random() - 0.5) * state.shake : 0;

    // Trail fade overlay (the secret sauce — leaves a smear of previous frames)
    X.save();
    X.fillStyle = 'rgba(6, 0, 10, 0.22)';
    X.fillRect(0, 0, W, H);
    X.restore();

    X.save();
    X.translate(sx, sy);

    // Grid (drawn dim each frame but blended into fade)
    X.strokeStyle = 'rgba(0,255,180,0.035)';
    X.lineWidth = 1;
    X.beginPath();
    for (let gx = 0; gx <= COLS; gx++) {
      X.moveTo(gx * CELL + 0.5, 0);
      X.lineTo(gx * CELL + 0.5, H);
    }
    for (let gy = 0; gy <= ROWS; gy++) {
      X.moveTo(0, gy * CELL + 0.5);
      X.lineTo(W, gy * CELL + 0.5);
    }
    X.stroke();

    // Vignette + radial scene glow
    if (!bgPattern || bgPattern.w !== W || bgPattern.h !== H) {
      // (kept for future caching) - simple per-frame radials are fine here
      bgPattern = { w: W, h: H };
    }
    const vg = X.createRadialGradient(W/2, H/2, W*0.2, W/2, H/2, W*0.7);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, 'rgba(0,0,0,0.5)');
    X.fillStyle = vg;
    X.fillRect(0, 0, W, H);

    // Head ribbon trail (drawn FIRST so segments paint over top)
    if (state.alive && state.headTrail.length > 1) {
      drawHeadRibbon(now);
    }

    // Food
    if (state.food) drawFood(now);

    // Gold bonus pellet
    if (state.gold){
      // expire if past life
      if ((now - state.gold.born) >= state.gold.life){
        // poof
        for (let p = 0; p < 8; p++){
          const a = Math.random() * Math.PI * 2;
          state.sparks.push({
            x: state.gold.x * CELL + CELL/2, y: state.gold.y * CELL + CELL/2,
            vx: Math.cos(a) * 80, vy: Math.sin(a) * 80,
            life: 0.4, maxLife: 0.4, color: '#ffd54a', r: 1.6,
          });
        }
        state.gold = null;
      } else {
        drawGold(now);
      }
    }

    // Speed lines behind head when going fast
    if (state.alive && state.snake.length && state.speed < 100) {
      drawSpeedLines();
    }

    // Sparks
    drawSparks();

    // Floats (combo + gold pop-up text)
    if (state.floats.length){
      drawFloats(now);
    }

    // Snake
    if (state.snake.length) drawSnake();

    // Death red flash
    if (state.flash > 0.01) {
      X.fillStyle = `rgba(255, 30, 60, ${state.flash * 0.4})`;
      X.fillRect(0, 0, W, H);
    }

    X.restore();
  }

  function drawHeadRibbon(now) {
    // A glowing polyline through head positions, fading + tapering toward old end
    const pts = state.headTrail;
    if (pts.length < 2) return;
    X.save();
    X.lineCap = 'round';
    X.lineJoin = 'round';
    // Multi-pass for glow (outer halo → mid → core)
    const passes = [
      { width: CELL * 0.95, alpha: 0.18, color: '#00f0ff', blur: 22 },
      { width: CELL * 0.62, alpha: 0.34, color: '#5fb3ff', blur: 14 },
      { width: CELL * 0.32, alpha: 0.7,  color: '#b9faff', blur: 6 },
    ];
    passes.forEach(p => {
      X.shadowColor = p.color;
      X.shadowBlur = p.blur;
      X.strokeStyle = p.color;
      X.lineWidth = p.width;
      X.beginPath();
      for (let i = 0; i < pts.length; i++) {
        const age = (now - pts[i].t) / 900;
        const a = (1 - age) * p.alpha;
        if (a <= 0) continue;
        X.globalAlpha = a;
        if (i === 0) X.moveTo(pts[i].x, pts[i].y);
        else X.lineTo(pts[i].x, pts[i].y);
      }
      X.stroke();
    });
    X.globalAlpha = 1;
    X.shadowBlur = 0;
    X.restore();
  }

  function drawSpeedLines() {
    const head = state.snake[0];
    const hx = head.x * CELL + CELL/2;
    const hy = head.y * CELL + CELL/2;
    const back = { x: -state.dir.x, y: -state.dir.y };
    const intensity = Math.min(1, (130 - state.speed) / 70);
    X.save();
    X.strokeStyle = 'rgba(185,250,255,' + (0.25 * intensity) + ')';
    X.lineWidth = 1.4;
    X.shadowColor = '#00f0ff';
    X.shadowBlur = 8;
    for (let i = 0; i < 5; i++) {
      const off = (i - 2) * CELL * 0.18;
      const px = hx + back.x * (CELL * 0.4) - back.y * off;
      const py = hy + back.y * (CELL * 0.4) - back.x * off;
      const len = CELL * (1 + Math.random() * 1.3) * intensity;
      X.beginPath();
      X.moveTo(px, py);
      X.lineTo(px + back.x * len, py + back.y * len);
      X.stroke();
    }
    X.shadowBlur = 0;
    X.restore();
  }

  function drawSparks() {
    X.save();
    for (let i = 0; i < state.sparks.length; i++) {
      const s = state.sparks[i];
      if (s.kind === 'ring') {
        const a = Math.max(0, s.life / s.maxLife);
        X.strokeStyle = s.color;
        X.shadowColor = s.color;
        X.shadowBlur = 14;
        X.globalAlpha = a;
        X.lineWidth = 2 * a + 0.5;
        X.beginPath();
        X.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        X.stroke();
        continue;
      }
      const a = Math.max(0, s.life / s.maxLife);
      X.globalAlpha = a;
      X.fillStyle = s.color;
      X.shadowColor = s.color;
      X.shadowBlur = 10;
      X.beginPath();
      X.arc(s.x, s.y, s.r * a, 0, Math.PI * 2);
      X.fill();
    }
    X.globalAlpha = 1;
    X.shadowBlur = 0;
    X.restore();
  }

  function drawSnake() {
    const len = state.snake.length;
    // Draw tail→head so head sits on top
    for (let i = len - 1; i >= 0; i--) {
      const seg = state.snake[i];
      const c = snakeColor(i, len);
      const cx = seg.x * CELL + CELL/2;
      const cy = seg.y * CELL + CELL/2;
      const r = i === 0 ? CELL * 0.5 : CELL * 0.42;

      // Outer halo
      X.save();
      X.shadowColor = c;
      X.shadowBlur = i === 0 ? 24 : 14;
      X.fillStyle = c;
      X.beginPath();
      if (i === 0) {
        X.arc(cx, cy, r, 0, Math.PI * 2);
      } else {
        X.roundRect(seg.x * CELL + 1, seg.y * CELL + 1, CELL - 2, CELL - 2, 5);
      }
      X.fill();
      X.restore();

      // Inner core (whiter)
      X.save();
      X.fillStyle = 'rgba(255,255,255,0.45)';
      X.beginPath();
      if (i === 0) {
        X.arc(cx, cy, r * 0.45, 0, Math.PI * 2);
      } else {
        X.roundRect(seg.x * CELL + CELL*0.25, seg.y * CELL + CELL*0.25, CELL*0.5, CELL*0.5, 3);
      }
      X.fill();
      X.restore();

      // Head eyes
      if (i === 0) {
        X.fillStyle = '#06000a';
        const ex1 = cx + state.dir.x * CELL * 0.18 + state.dir.y * CELL * 0.18;
        const ey1 = cy + state.dir.y * CELL * 0.18 - state.dir.x * CELL * 0.18;
        const ex2 = cx + state.dir.x * CELL * 0.18 - state.dir.y * CELL * 0.18;
        const ey2 = cy + state.dir.y * CELL * 0.18 + state.dir.x * CELL * 0.18;
        X.beginPath(); X.arc(ex1, ey1, 2.4, 0, Math.PI * 2); X.fill();
        X.beginPath(); X.arc(ex2, ey2, 2.4, 0, Math.PI * 2); X.fill();
      }
    }
  }

  function drawFood(now) {
    const fx = state.food.x * CELL + CELL/2;
    const fy = state.food.y * CELL + CELL/2;
    const age = (now - state.food.born) / 1000;
    const pulse = 0.7 + Math.sin(age * 5) * 0.3;
    const pulse2 = 1 + Math.sin(age * 3) * 0.15;
    const r = CELL * 0.4 * pulse2;

    X.save();
    // Outer pulse ring
    X.strokeStyle = `rgba(255,43,214,${0.15 + Math.sin(age * 4) * 0.1})`;
    X.lineWidth = 2;
    X.shadowColor = '#ff2bd6';
    X.shadowBlur = 18;
    X.beginPath(); X.arc(fx, fy, r * 1.9 * pulse, 0, Math.PI * 2); X.stroke();
    // Second ring
    X.strokeStyle = `rgba(255,95,167,${0.10 + Math.sin(age * 6) * 0.05})`;
    X.lineWidth = 1;
    X.beginPath(); X.arc(fx, fy, r * 2.7 * pulse, 0, Math.PI * 2); X.stroke();
    // Halo gradient
    const g = X.createRadialGradient(fx, fy, 0, fx, fy, r * 2.2);
    g.addColorStop(0, `rgba(255,43,214,${0.25 * pulse})`);
    g.addColorStop(1, 'transparent');
    X.fillStyle = g;
    X.beginPath(); X.arc(fx, fy, r * 2.2, 0, Math.PI * 2); X.fill();
    // Core
    X.shadowBlur = 16;
    X.fillStyle = '#ff2bd6';
    X.beginPath(); X.arc(fx, fy, r * pulse, 0, Math.PI * 2); X.fill();
    // Highlight
    X.shadowBlur = 0;
    X.fillStyle = `rgba(255,230,255,${0.65 * pulse})`;
    X.beginPath(); X.arc(fx - r * 0.2, fy - r * 0.2, r * 0.35, 0, Math.PI * 2); X.fill();
    // Orbiting electron
    const orbX = fx + Math.cos(age * 3.4) * r * 1.5;
    const orbY = fy + Math.sin(age * 3.4) * r * 1.5;
    X.fillStyle = '#ffd54a';
    X.shadowColor = '#ffd54a';
    X.shadowBlur = 10;
    X.beginPath(); X.arc(orbX, orbY, 1.6, 0, Math.PI * 2); X.fill();
    X.restore();
  }

  function drawGold(now){
    const gx = state.gold.x * CELL + CELL/2;
    const gy = state.gold.y * CELL + CELL/2;
    const age = (now - state.gold.born) / 1000;
    const life = state.gold.life / 1000;
    const remain = Math.max(0, life - age);
    // flicker when about to expire
    const flick = remain < 1.4 ? (Math.sin(age * 22) > 0 ? 1 : 0.35) : 1;
    const pulse = 1 + Math.sin(age * 6) * 0.18;
    const r = CELL * 0.42 * pulse;
    X.save();
    X.globalAlpha = flick;
    // Halo
    const grd = X.createRadialGradient(gx, gy, 0, gx, gy, r * 3);
    grd.addColorStop(0, 'rgba(255,213,74,0.55)');
    grd.addColorStop(1, 'rgba(255,213,74,0)');
    X.fillStyle = grd;
    X.beginPath(); X.arc(gx, gy, r * 3, 0, Math.PI * 2); X.fill();
    // Diamond body
    X.shadowColor = '#ffd54a';
    X.shadowBlur = 22;
    X.translate(gx, gy);
    X.rotate(age * 1.4);
    X.fillStyle = '#ffd54a';
    X.beginPath();
    X.moveTo(0, -r);
    X.lineTo(r, 0);
    X.lineTo(0, r);
    X.lineTo(-r, 0);
    X.closePath();
    X.fill();
    // Inner highlight diamond
    X.shadowBlur = 0;
    X.fillStyle = '#fff7d8';
    X.beginPath();
    X.moveTo(0, -r * 0.42);
    X.lineTo(r * 0.42, 0);
    X.lineTo(0, r * 0.42);
    X.lineTo(-r * 0.42, 0);
    X.closePath();
    X.fill();
    X.rotate(-age * 1.4);
    // Life timer ring (counts down)
    const ratio = remain / life;
    X.strokeStyle = '#ffd54a';
    X.lineWidth = 1.5;
    X.shadowColor = '#ffd54a';
    X.shadowBlur = 8;
    X.beginPath();
    X.arc(0, 0, r + 5, -Math.PI/2, -Math.PI/2 + ratio * Math.PI * 2);
    X.stroke();
    X.restore();
    X.globalAlpha = 1;
    X.shadowBlur = 0;
  }

  function drawFloats(now){
    // also advance their age here using delta — use lastNow if available
    const dt = (now - (window._lastFloatT || now)) / 1000;
    window._lastFloatT = now;
    X.save();
    X.font = '700 13px "Audiowide", sans-serif';
    X.textAlign = 'center';
    for (let i = state.floats.length - 1; i >= 0; i--){
      const f = state.floats[i];
      f.age += Math.min(0.05, dt);
      f.y -= 22 * Math.min(0.05, dt);
      if (f.age >= f.life){ state.floats.splice(i, 1); continue; }
      const a = 1 - f.age / f.life;
      X.fillStyle = 'rgba(0,0,0,' + a + ')';
      X.fillText(f.text, f.x + 2, f.y + 2);
      X.fillStyle = f.color;
      X.globalAlpha = a;
      X.shadowColor = f.color;
      X.shadowBlur = 8;
      X.fillText(f.text, f.x, f.y);
      X.globalAlpha = 1;
      X.shadowBlur = 0;
    }
    X.restore();
  }

  // Boot
  init();
  // Show intro
  msgEl.classList.remove('hide');
  state.alive = false;
  state.started = false;
  requestAnimationFrame((t) => { lastNow = t; loop(t); });
})();
</script>
</body>
</html>
