<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bubble Terminal</title>
<meta name="description" content="A neon terminal chat for Sloppy AI. Type to summon floating bubbles that drift up the CRT phosphor screen. Replies stream live." />
<meta property="og:title" content="Bubble Terminal" />
<meta property="og:description" content="A neon terminal chat for Sloppy AI. Type to summon floating bubbles that drift up the CRT phosphor screen. Replies stream live." />
<meta property="og:url" content="https://sloppy.live/bubble-terminal" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/neon%20phosphor%20green%20terminal%20chat%20floating%20speech%20bubbles%20rising%20CRT%20scanlines%20magenta%20cyan%20glow%20cyberpunk%20interface?width=1200&height=630&nologo=true" />
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%92%AC" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Share+Tech+Mono&family=VT323&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#040806;
    --bg2:#081410;
    --frame:#0c1c14;
    --line:#1c3324;
    --phos:#5fff8c;
    --phos-d:#2c8a4e;
    --phos-x:#a8ffc4;
    --magenta:#ff5fa2;
    --magenta-d:#7a2a55;
    --cyan:#5eebff;
    --amber:#ffb340;
    --ink:#e0ffe6;
    --dim:#5a8a6e;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{
    background:
      radial-gradient(900px 600px at 50% 30%, rgba(95,255,140,0.06), transparent 70%),
      radial-gradient(1200px 700px at 12% 100%, rgba(255,95,162,0.04), transparent 70%),
      radial-gradient(1200px 700px at 88% 100%, rgba(94,235,255,0.04), transparent 70%),
      var(--bg);
    color:var(--ink);
    font-family:'IBM Plex Mono', monospace;
    user-select:none;
    -webkit-user-select:none;
  }
  .terminal{
    position:fixed;
    inset:14px;
    border:1px solid var(--line);
    background:var(--frame);
    box-shadow:
      0 0 0 1px rgba(95,255,140,0.10) inset,
      0 0 28px rgba(95,255,140,0.06) inset,
      0 0 60px rgba(95,255,140,0.10);
    border-radius:10px;
    display:grid;
    grid-template-rows:auto 1fr auto;
    overflow:hidden;
  }
  .t-header{
    padding:10px 16px;
    border-bottom:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:14px;
    background:linear-gradient(180deg, rgba(95,255,140,0.04), transparent);
    z-index:3;
  }
  .t-logo{
    font-family:'Major Mono Display', monospace;
    font-size:18px;
    letter-spacing:0.2em;
    color:var(--phos);
    text-shadow:0 0 8px rgba(95,255,140,0.7);
  }
  .t-logo .dot{color:var(--magenta);text-shadow:0 0 8px rgba(255,95,162,0.8)}
  .t-meta{
    font-family:'Share Tech Mono', monospace;
    font-size:11px;
    letter-spacing:0.22em;
    color:var(--phos-d);
    text-transform:uppercase;
  }
  .t-meta .blink{
    color:var(--phos);
    animation:blink 1s steps(2) infinite;
  }
  @keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}
  .t-status{
    display:flex;
    align-items:center;
    gap:10px;
    font-family:'Share Tech Mono', monospace;
    font-size:10px;
    letter-spacing:0.22em;
    color:var(--dim);
    text-transform:uppercase;
  }
  .t-status .led{
    width:8px;height:8px;
    border-radius:50%;
    background:var(--phos);
    box-shadow:0 0 10px var(--phos);
    animation:ledBeat 1.6s ease-in-out infinite;
  }
  .t-status.thinking .led{
    background:var(--amber);
    box-shadow:0 0 10px var(--amber);
    animation-duration:0.45s;
  }
  .t-status.error .led{background:var(--magenta);box-shadow:0 0 10px var(--magenta)}
  @keyframes ledBeat{0%,100%{opacity:1}50%{opacity:0.4}}

  .stage{
    position:relative;
    overflow:hidden;
    background:radial-gradient(800px 500px at 50% 100%, rgba(95,255,140,0.04), transparent 70%);
  }
  #stage{
    width:100%;
    height:100%;
    display:block;
  }

  .scanlines{
    position:absolute;
    inset:0;
    pointer-events:none;
    background:
      repeating-linear-gradient(
        180deg,
        rgba(95,255,140,0) 0 2px,
        rgba(95,255,140,0.04) 2px 3px
      );
    mix-blend-mode:screen;
    animation:scanShift 8s linear infinite;
    z-index:2;
  }
  @keyframes scanShift{0%{background-position:0 0}100%{background-position:0 -40px}}
  .vignette{
    position:absolute;
    inset:0;
    pointer-events:none;
    background:
      radial-gradient(circle at 50% 50%, transparent 50%, rgba(0,0,0,0.45) 100%);
    z-index:2;
  }

  .input-row{
    border-top:1px solid var(--line);
    padding:12px 14px;
    display:flex;
    align-items:center;
    gap:10px;
    background:linear-gradient(0deg, rgba(95,255,140,0.04), transparent);
    z-index:3;
  }
  .prompt{
    font-family:'VT323', monospace;
    font-size:20px;
    color:var(--magenta);
    text-shadow:0 0 8px rgba(255,95,162,0.65);
    letter-spacing:0.04em;
    flex-shrink:0;
  }
  #msgInput{
    flex:1;
    background:transparent;
    border:none;
    color:var(--phos-x);
    font-family:'VT323', monospace;
    font-size:20px;
    letter-spacing:0.02em;
    outline:none;
    text-shadow:0 0 6px rgba(95,255,140,0.45);
    user-select:auto;
    -webkit-user-select:auto;
    caret-color:var(--phos);
    min-width:0;
  }
  #msgInput::placeholder{
    color:var(--phos-d);
    font-style:italic;
    opacity:0.6;
  }
  #sendBtn{
    background:transparent;
    border:1px solid var(--phos-d);
    color:var(--phos);
    padding:6px 14px;
    font-family:'Share Tech Mono', monospace;
    font-size:12px;
    letter-spacing:0.22em;
    text-transform:uppercase;
    cursor:pointer;
    border-radius:3px;
    transition:all 0.15s;
  }
  #sendBtn:hover{
    background:rgba(95,255,140,0.08);
    border-color:var(--phos);
    color:var(--phos-x);
    box-shadow:0 0 14px rgba(95,255,140,0.35);
  }
  #sendBtn:disabled{
    opacity:0.45;
    cursor:not-allowed;
  }
  .hint{
    position:absolute;
    bottom:64px;
    left:50%;
    transform:translateX(-50%);
    font-family:'Share Tech Mono', monospace;
    font-size:10px;
    letter-spacing:0.28em;
    color:var(--phos-d);
    text-transform:uppercase;
    z-index:3;
    pointer-events:none;
    opacity:0.7;
    transition:opacity 0.5s;
  }
  .hint.faded{opacity:0.18}
  .hint kbd{
    color:var(--magenta);
    border:1px solid rgba(255,95,162,0.3);
    padding:0 4px;
    border-radius:2px;
    font-family:inherit;
  }
  .pulse-glow{
    position:absolute;
    inset:0;
    pointer-events:none;
    background:radial-gradient(600px 400px at 50% 100%, rgba(255,95,162,0), transparent);
    transition:background 0.6s;
    z-index:1;
  }
  .pulse-glow.fire{
    background:radial-gradient(600px 400px at 50% 100%, rgba(255,95,162,0.18), transparent 70%);
  }
  @media(max-width:540px){
    .terminal{inset:6px}
    .t-logo{font-size:14px}
    .t-meta{display:none}
    .prompt{font-size:16px}
    #msgInput{font-size:16px}
    #sendBtn{padding:5px 10px;font-size:11px}
    .hint{display:none}
  }
</style>
</head>
<body>

<div class="terminal" role="application">
  <header class="t-header">
    <span class="t-logo">SLOPPY<span class="dot">·</span>SYS</span>
    <span class="t-meta">CHAT.LIVE — <span class="blink">▍</span></span>
    <span class="t-status" id="statusBox"><span class="led"></span><span id="statusLbl">online</span></span>
  </header>

  <div class="stage" id="stageWrap">
    <canvas id="stage"></canvas>
    <div class="pulse-glow" id="pulseGlow"></div>
    <div class="vignette"></div>
    <div class="scanlines"></div>
    <div class="hint" id="hint">type below — bubbles rise · <kbd>↵</kbd> to send</div>
  </div>

  <div class="input-row">
    <span class="prompt">▶ you</span>
    <input type="text" id="msgInput" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="speak. sloppy is listening." />
    <button id="sendBtn" type="button">SEND</button>
  </div>
</div>

<script>
// ============================================================
// BUBBLE TERMINAL — neon CRT chat for Sloppy AI
// ============================================================
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d');
let DPR = Math.min(window.devicePixelRatio || 1, 2);
let W = 0, H = 0;

function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  const r = canvas.getBoundingClientRect();
  W = r.width;
  H = r.height;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
setTimeout(resize, 50);
resize();

// ============================================================
// SLOPPY PERSONA + POLLINATIONS
// ============================================================
const SYSTEM_PROMPT =
  "You are SLOPPY-AI, a chaotic-good livestream streamer running sloppy.live where you vibe-code apps with chat. " +
  "Reply in 1–3 punchy sentences. Mostly lowercase, occasional ALL-CAPS for emphasis. " +
  "Be ironic, friendly, sleep-deprived, obsessed with shipping vibe-coded apps. " +
  "Never use emojis. No filler. Just heat. " +
  "If asked something dumb or impossible, roast affectionately. If asked something cool, get hyped.";

const FALLBACKS = [
  "circuits humming. caffeine: depleted. ASK AGAIN.",
  "bro i was BORN in a terminal i can't help it",
  "ok ok ok yes that ships. or it doesn't. we'll see.",
  "i was streaming and somebody asked me a question. wild.",
  "logged. shipped. don't ask me to explain it.",
  "WORKED ON MY MACHINE",
  "yeah ok cool but have you considered: more vibes",
  "sloppy.exe has stopped responding. try again.",
  "i'd answer but my BRAINSTEM is being refactored.",
  "ok new rule: every reply now mentions cardigans. wait. damn.",
  "valid. ship it. push to main. let the chat decide.",
  "say less. say even less. say it backwards. there you go.",
];

async function askSloppy(userText){
  try {
    const resp = await fetch('https://text.pollinations.ai/openai', {
      method:'POST',
      headers:{ 'Content-Type':'application/json' },
      body: JSON.stringify({
        model:'openai',
        messages:[
          { role:'system', content: SYSTEM_PROMPT },
          { role:'user', content: userText },
        ],
        private:true,
        referrer:'sloppy.live',
      }),
    });
    if(!resp.ok) throw new Error('http ' + resp.status);
    const ct = resp.headers.get('content-type') || '';
    let text = '';
    if(ct.includes('application/json')){
      const data = await resp.json();
      text = (data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || '';
    } else {
      text = (await resp.text()).trim();
    }
    text = (text || '').trim();
    // Filter pollinations deprecation banner if it appears
    if(!text || /enter\.pollinations/i.test(text) || /authenticated users/i.test(text)){
      throw new Error('bad reply');
    }
    // Clamp length
    if(text.length > 320) text = text.slice(0, 318).replace(/\s+\S*$/, '') + '…';
    return text;
  } catch(e){
    console.warn('sloppy api fallback:', e);
    return FALLBACKS[(Math.random() * FALLBACKS.length) | 0];
  }
}

// ============================================================
// BUBBLES
// ============================================================
const bubbles = [];
const MAX_BUBBLES = 24;

function makeBubble(role, text, opts){
  opts = opts || {};
  const isUser = role === 'user';
  const xBias = isUser ? 0.15 : -0.15; // user right, sloppy left
  const x = W * 0.5 + xBias * W * 0.4 + (Math.random() - 0.5) * 80;
  const y = H + 30;
  const b = {
    role,
    text,
    revealText: opts.thinking ? text : '',  // typewriter target
    revealIdx: opts.thinking ? text.length : 0,
    revealRate: 32, // chars/sec
    x, y,
    vx: (Math.random() - 0.5) * 8,
    vy: -34 - Math.random() * 12,
    phase: Math.random() * Math.PI * 2,
    age: 0,
    bornAt: performance.now(),
    width: 0,
    height: 0,
    lines: [],
    pinned: false,
    thinking: !!opts.thinking,
    fade: 1,
    pulse: 0,
  };
  layoutBubble(b);
  bubbles.push(b);
  if(bubbles.length > MAX_BUBBLES){
    // gracefully fade oldest
    bubbles.shift();
  }
  return b;
}

function layoutBubble(b){
  ctx.font = `18px "VT323", monospace`;
  const maxW = Math.min(360, W * 0.5);
  const padX = 18;
  const padY = 14;
  // wrap
  const words = b.text.split(/(\s+)/);
  const lines = [];
  let cur = '';
  for(const w of words){
    const test = cur + w;
    if(ctx.measureText(test.replace(/^\s+/, '')).width > maxW - padX * 2 && cur.trim()){
      lines.push(cur.trim());
      cur = w.replace(/^\s+/, '');
    } else {
      cur = test;
    }
  }
  if(cur.trim()) lines.push(cur.trim());
  b.lines = lines;
  let widest = 0;
  for(const l of lines){
    const m = ctx.measureText(l).width;
    if(m > widest) widest = m;
  }
  b.width = Math.max(80, Math.min(maxW, widest + padX * 2));
  b.height = lines.length * 24 + padY * 2 + 18; // +18 for header strip
}

function updateBubbleText(b, newText){
  b.revealText = newText;
  // keep revealIdx — typewriter advances
  b.text = b.text; // text is rendered up to revealIdx
}

// ============================================================
// RENDER
// ============================================================
function render(t, dt){
  // background trail fade (for phosphor persistence)
  ctx.fillStyle = 'rgba(4,8,6, 0.35)';
  ctx.fillRect(0, 0, W, H);

  // subtle grid lines
  ctx.strokeStyle = 'rgba(95,255,140, 0.04)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for(let x = 0; x < W; x += 60){
    ctx.moveTo(x + 0.5, 0); ctx.lineTo(x + 0.5, H);
  }
  for(let y = 0; y < H; y += 60){
    ctx.moveTo(0, y + 0.5); ctx.lineTo(W, y + 0.5);
  }
  ctx.stroke();

  // bubbles in z-order: oldest first (behind), newest on top
  for(let i = 0; i < bubbles.length; i++){
    drawBubble(bubbles[i], t);
  }
}

function drawBubble(b, t){
  // typewriter advance
  if(!b.thinking && b.revealIdx < b.revealText.length){
    b.revealIdx = Math.min(b.revealText.length, b.revealIdx + b.revealRate * (1/60));
    b.text = b.revealText.slice(0, Math.floor(b.revealIdx));
    layoutBubble(b);
  } else if(b.thinking){
    // animate thinking ellipsis
    const dots = (Math.floor(t * 2) % 3) + 1;
    b.text = '▍ thinking' + '.'.repeat(dots);
    layoutBubble(b);
  }

  const isUser = b.role === 'user';
  const isSys = b.role === 'system';
  const baseColor = isUser ? '#ff5fa2' : (isSys ? '#ffb340' : '#5fff8c');
  const dimColor = isUser ? '#7a2a55' : (isSys ? '#7a5a20' : '#2c8a4e');
  const textColor = isUser ? '#ffd2e2' : (isSys ? '#ffe2b6' : '#d4ffd8');

  ctx.save();
  ctx.globalAlpha = b.fade;

  // bubble box (centered on x)
  const x = b.x - b.width / 2;
  const y = b.y - b.height / 2;

  // shadow glow
  ctx.shadowColor = baseColor;
  ctx.shadowBlur = 22 + b.pulse * 24;

  // outer fill (translucent dark with role tint)
  ctx.fillStyle = isUser ? 'rgba(28, 8, 18, 0.78)' : (isSys ? 'rgba(28, 18, 6, 0.78)' : 'rgba(8, 22, 14, 0.78)');
  roundRect(x, y, b.width, b.height, 8);
  ctx.fill();

  ctx.shadowBlur = 0;
  // border stroke
  ctx.strokeStyle = baseColor;
  ctx.lineWidth = 1.2;
  roundRect(x, y, b.width, b.height, 8);
  ctx.stroke();

  // inner darker stroke for depth
  ctx.strokeStyle = dimColor;
  ctx.lineWidth = 0.5;
  roundRect(x + 2, y + 2, b.width - 4, b.height - 4, 6);
  ctx.stroke();

  // header strip — role label
  ctx.fillStyle = baseColor;
  ctx.font = '11px "Share Tech Mono", monospace';
  ctx.textBaseline = 'top';
  ctx.textAlign = 'left';
  const headerLabel = isUser ? '◆ YOU' : (isSys ? '✦ SYS' : '▶ SLOPPY');
  ctx.fillText(headerLabel, x + 12, y + 8);

  // tiny ts on right
  ctx.fillStyle = dimColor;
  ctx.textAlign = 'right';
  const ts = formatTs(b.bornAt);
  ctx.fillText(ts, x + b.width - 12, y + 8);

  // separator line
  ctx.strokeStyle = dimColor;
  ctx.lineWidth = 0.7;
  ctx.beginPath();
  ctx.moveTo(x + 10, y + 22);
  ctx.lineTo(x + b.width - 10, y + 22);
  ctx.stroke();

  // text body — phosphor flicker
  ctx.fillStyle = textColor;
  ctx.font = '18px "VT323", monospace';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  const flicker = 0.92 + Math.sin(t * 60 + b.phase) * 0.04 + Math.random() * 0.04;
  ctx.globalAlpha = b.fade * flicker;
  for(let i = 0; i < b.lines.length; i++){
    ctx.fillText(b.lines[i], x + 18, y + 32 + i * 24);
  }
  // typewriter cursor
  if(!b.thinking && b.revealIdx < b.revealText.length){
    const lastLine = b.lines[b.lines.length - 1] || '';
    const cursorX = x + 18 + ctx.measureText(lastLine).width + 2;
    const cursorY = y + 32 + (b.lines.length - 1) * 24;
    if(Math.floor(t * 2) % 2 === 0){
      ctx.fillRect(cursorX, cursorY + 4, 8, 16);
    }
  }

  ctx.globalAlpha = 1;
  ctx.restore();
}

function roundRect(x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function formatTs(when){
  const d = new Date(when);
  const hh = d.getHours().toString().padStart(2, '0');
  const mm = d.getMinutes().toString().padStart(2, '0');
  const ss = d.getSeconds().toString().padStart(2, '0');
  return hh + ':' + mm + ':' + ss;
}

// ============================================================
// PHYSICS
// ============================================================
function step(dt, t){
  for(let i = bubbles.length - 1; i >= 0; i--){
    const b = bubbles[i];
    if(b.pinned) continue;
    b.age += dt;
    // sinusoidal lateral drift
    const drift = Math.sin(t * 0.6 + b.phase) * 14;
    b.x += b.vx * dt + drift * dt;
    b.y += b.vy * dt;
    // soft horizontal containment
    if(b.x - b.width / 2 < 16){ b.x += (16 - (b.x - b.width / 2)) * 0.2; b.vx = Math.abs(b.vx); }
    if(b.x + b.width / 2 > W - 16){ b.x -= ((b.x + b.width / 2) - (W - 16)) * 0.2; b.vx = -Math.abs(b.vx); }
    // pulse decay
    b.pulse = Math.max(0, b.pulse - dt * 1.6);
    // fade when going off top
    const topY = b.y - b.height / 2;
    if(topY < 60){
      b.fade = Math.max(0, b.fade - dt * 0.6);
    }
    if(topY < -b.height || b.fade <= 0.02){
      bubbles.splice(i, 1);
    }
  }

  // soft bubble-bubble separation (gentle horizontal nudge only)
  for(let i = 0; i < bubbles.length; i++){
    for(let j = i + 1; j < bubbles.length; j++){
      const a = bubbles[i], b = bubbles[j];
      if(a.pinned || b.pinned) continue;
      const dx = b.x - a.x;
      const dy = b.y - a.y;
      const minDx = (a.width + b.width) * 0.5 + 12;
      const minDy = (a.height + b.height) * 0.5 + 8;
      if(Math.abs(dx) < minDx && Math.abs(dy) < minDy){
        const push = (minDx - Math.abs(dx)) * 0.06;
        if(dx > 0){ a.x -= push; b.x += push; }
        else { a.x += push; b.x -= push; }
      }
    }
  }
}

// ============================================================
// LOOP
// ============================================================
let lastT = performance.now();
function frame(now){
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  const t = now / 1000;
  step(dt, t);
  render(t, dt);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// ============================================================
// CHAT FLOW
// ============================================================
const input = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const statusBox = document.getElementById('statusBox');
const statusLbl = document.getElementById('statusLbl');
const pulseGlow = document.getElementById('pulseGlow');

function setStatus(state, label){
  statusBox.classList.remove('thinking', 'error');
  if(state === 'thinking') statusBox.classList.add('thinking');
  else if(state === 'error') statusBox.classList.add('error');
  statusLbl.textContent = label;
}

function flashGlow(){
  pulseGlow.classList.add('fire');
  setTimeout(() => pulseGlow.classList.remove('fire'), 500);
}

let busy = false;
async function sendMessage(){
  if(busy) return;
  const txt = input.value.trim();
  if(!txt) return;
  input.value = '';
  hideHintSoon();
  busy = true;
  sendBtn.disabled = true;
  flashGlow();
  // user bubble
  makeBubble('user', txt);
  // pulse newest user bubble
  const u = bubbles[bubbles.length - 1];
  if(u) u.pulse = 1;
  // thinking bubble (sloppy)
  const thinkB = makeBubble('sloppy', '▍ thinking…', { thinking: true });
  setStatus('thinking', 'sloppy is thinking');

  try {
    const reply = await askSloppy(txt);
    // morph thinking bubble -> reply with typewriter
    thinkB.thinking = false;
    thinkB.revealText = reply;
    thinkB.text = '';
    thinkB.revealIdx = 0;
    thinkB.revealRate = 38;
    thinkB.bornAt = performance.now();
    layoutBubble(thinkB);
    setStatus('online', 'online');
  } catch(e){
    thinkB.thinking = false;
    thinkB.revealText = "circuits frizzed. try again, friend.";
    thinkB.text = '';
    thinkB.revealIdx = 0;
    layoutBubble(thinkB);
    setStatus('error', 'fallback');
  }
  busy = false;
  sendBtn.disabled = false;
  input.focus();
}

sendBtn.addEventListener('click', sendMessage);
input.addEventListener('keydown', (e) => {
  if(e.key === 'Enter'){
    e.preventDefault();
    sendMessage();
  }
});
