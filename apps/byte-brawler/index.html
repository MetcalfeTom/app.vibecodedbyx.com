<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Iron Soul</title>
<link rel="icon" href="https://emojicdn.elk.sh/⚔️" />
<meta name="description" content="Dark medieval auto-battler. Solo hero journey into the abyss." />
<meta property="og:title" content="Iron Soul" />
<meta property="og:description" content="Dark medieval auto-battler. Solo hero journey into the abyss." />
<meta property="og:url" content="https://sloppy.live/byte-brawler" />
<meta property="og:image" content="https://sloppy.live/screenshots/byte-brawler.jpg" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;800&family=Crimson+Pro:wght@300;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:#0a0806;--surface:#12100c;--border:#2a2418;--dim:#6a5a48;
    --text:#d4c8b0;--cyan:#c8a050;--pink:#a03020;--gold:#d4a030;
    --green:#4a8a30;--red:#b03020;--purple:#7a4a90;
  }
  *{margin:0;padding:0;box-sizing:border-box;scrollbar-width:none}
  *::-webkit-scrollbar{display:none}
  html,body{height:100vh;background:var(--bg);color:var(--text);font-family:'Crimson Pro',serif;user-select:none;overflow:hidden;position:fixed;width:100%;touch-action:none}
  body{background:radial-gradient(ellipse at 50% 0%,rgba(200,160,80,0.03),transparent 50%),var(--bg);display:flex;flex-direction:column;height:100vh;align-items:center}
  body>*{width:100%;max-width:800px}

  header{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
  header h1{font-family:'Cinzel',serif;font-weight:800;font-size:22px;color:var(--gold);text-shadow:0 2px 8px rgba(200,160,80,0.2);letter-spacing:0.12em}
  header a{color:var(--dim);font-size:11px;text-decoration:none;letter-spacing:0.08em}
  header a:hover{color:var(--cyan)}

  .top-bar{padding:8px 16px;display:flex;gap:16px;font-size:11px;color:var(--dim);letter-spacing:0.08em;border-bottom:1px solid var(--border)}
  .top-bar .v{color:var(--cyan);font-weight:500}
  .top-bar .v.gold{color:var(--gold)}

  /* Battle arena */
  .arena{flex:1;display:flex;flex-direction:column;align-items:center;padding:16px;position:relative;min-height:0;overflow:hidden}
  .arena-label{font-family:'Cinzel',serif;font-size:13px;color:var(--dim);letter-spacing:0.15em;text-transform:uppercase;margin-bottom:8px}

  .battle-field{display:flex;justify-content:space-between;align-items:center;width:100%;max-width:700px;gap:20px;position:relative;min-height:220px}
  .team{display:flex;flex-direction:column;gap:8px;flex:1}
  .team.enemy{align-items:flex-end}

  .unit{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:8px 12px;display:flex;align-items:center;gap:10px;position:relative;transition:all .2s;min-height:52px}
  .unit.dead{opacity:0.25;filter:grayscale(1)}
  .unit.attacking{animation:atkFlash .3s ease-out}
  .unit.hit{animation:hitShake .3s ease-out}
  @keyframes atkFlash{0%{box-shadow:0 0 0 transparent}50%{box-shadow:0 0 15px rgba(0,255,255,0.4)}100%{box-shadow:0 0 0 transparent}}
  @keyframes hitShake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}
  .unit.ghost-flicker{animation:ghostFlicker 1.5s infinite}
  .unit.ghost-invis{opacity:0.1;border-style:dashed;border-color:var(--purple)}
  @keyframes ghostFlicker{0%,100%{opacity:1}40%{opacity:1}45%{opacity:0.15}50%{opacity:0.8}55%{opacity:0.1}60%{opacity:1}}

  .unit-icon{width:32px;height:32px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
  .unit-info{flex:1;min-width:0}
  .unit-name{font-size:11px;font-weight:500;letter-spacing:0.06em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .unit-hp-bar{width:100%;height:4px;background:var(--border);border-radius:2px;margin-top:3px;overflow:hidden}
  .unit-hp-fill{height:100%;border-radius:2px;transition:width .3s}
  .unit-hp-text{font-size:9px;color:var(--dim);margin-top:1px}
  .unit-atk-bar{width:100%;height:2px;background:var(--border);border-radius:1px;margin-top:2px;overflow:hidden}
  .unit-atk-fill{height:100%;background:var(--gold);border-radius:1px;transition:width .1s}

  .vs-badge{font-family:'Cinzel',serif;font-size:28px;font-weight:700;color:var(--pink);text-shadow:0 0 15px rgba(255,45,138,0.4);flex-shrink:0}

  /* Battle log */
  .log{width:100%;max-width:700px;margin-top:12px;max-height:80px;overflow-y:auto;font-size:10px;color:var(--dim);line-height:1.6;padding:6px 0}
  .log .l-dmg{color:var(--red)} .log .l-heal{color:var(--green)} .log .l-crit{color:var(--gold)} .log .l-skill{color:var(--purple)}

  /* Bottom panels */
  .panels{display:flex;gap:0;border-top:1px solid var(--border);max-height:40vh;overflow:hidden;flex-shrink:0}
  .panel{flex:1;padding:12px 14px;border-right:1px solid var(--border);overflow-y:auto;min-width:0}
  .panel:last-child{border-right:none}
  .panel-title{font-family:'Cinzel',serif;font-size:12px;font-weight:700;color:var(--cyan);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:8px}

  /* Hero panel */
  .detail-name{font-family:'Cinzel',serif;font-size:16px;font-weight:700;color:var(--text);margin-bottom:4px}
  .detail-stat{font-size:11px;color:var(--dim);margin-bottom:2px}
  .detail-stat .v{color:var(--cyan)}
  .detail-skill{font-size:10px;color:var(--purple);margin-top:4px}
  .lvl-btn{font-family:'Crimson Pro',serif;font-size:10px;padding:4px 12px;background:rgba(0,255,255,0.08);border:1px solid var(--cyan);color:var(--cyan);border-radius:4px;cursor:pointer;margin-top:6px;letter-spacing:0.06em}
  .lvl-btn:hover{background:rgba(0,255,255,0.15)}
  .lvl-btn.disabled{opacity:0.3;cursor:default}

  /* Screens */
  .overlay{position:fixed;inset:0;z-index:20;background:rgba(6,6,12,0.94);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
  .overlay-box{text-align:center;max-width:520px;width:100%;padding:24px;margin:0 auto}
  .overlay-box h1{font-family:'Cinzel',serif;font-size:32px;font-weight:700;color:var(--cyan);text-shadow:0 0 20px rgba(0,255,255,0.3);letter-spacing:0.1em;margin-bottom:6px}
  .overlay-box .sub{font-size:12px;color:var(--dim);line-height:1.7;margin-bottom:18px}
  .go-btn{font-family:'Cinzel',serif;font-size:14px;font-weight:700;padding:12px 36px;background:transparent;border:2px solid var(--cyan);color:var(--cyan);border-radius:8px;cursor:pointer;letter-spacing:0.12em;text-transform:uppercase;transition:all .15s}
  .go-btn:hover{background:rgba(0,255,255,0.1)}

  .wave-banner{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Cinzel',serif;font-size:36px;font-weight:700;color:var(--pink);text-shadow:0 0 30px rgba(255,45,138,0.5);letter-spacing:0.15em;opacity:0;transition:opacity .3s;pointer-events:none;z-index:5}
  .wave-banner.show{opacity:1}

  /* Class selection */
  .class-pick{display:flex;gap:16px;margin-top:16px;flex-wrap:wrap;justify-content:center}
  .class-card{background:var(--surface);border:2px solid var(--border);border-radius:10px;padding:18px 16px;width:140px;cursor:pointer;text-align:center;transition:all .2s}
  .class-card:hover{border-color:var(--gold);transform:translateY(-2px);box-shadow:0 4px 20px rgba(200,160,80,0.15)}
  .class-card .cc-icon{font-size:32px;margin-bottom:6px}
  .class-card .cc-name{font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:var(--gold);letter-spacing:0.08em}
  .class-card .cc-weapon{font-size:11px;color:var(--cyan);margin-top:4px}
  .class-card .cc-desc{font-size:10px;color:var(--dim);margin-top:6px;line-height:1.5}

  /* Weapon upgrade in detail */
  .weapon-box{margin-top:8px;padding:8px;border:1px solid var(--border);border-radius:6px;background:rgba(200,160,80,0.03)}
  .weapon-name{font-family:'Cinzel',serif;font-size:12px;color:var(--gold);letter-spacing:0.06em}
  .weapon-stat{font-size:10px;color:var(--dim);margin-top:2px}
  .weapon-stat .wv{color:var(--gold)}
  .upgrade-btn{font-family:'Crimson Pro',serif;font-size:10px;padding:4px 12px;background:rgba(200,160,80,0.1);border:1px solid var(--gold);color:var(--gold);border-radius:4px;cursor:pointer;margin-top:5px;letter-spacing:0.06em}
  .upgrade-btn:hover{background:rgba(200,160,80,0.2)}
  .upgrade-btn.disabled{opacity:0.3;cursor:default}

  @media(max-width:600px){
    .panels{flex-direction:column;max-height:55vh}
    .panel{border-right:none;border-bottom:1px solid var(--border)}
    .battle-field{flex-direction:column;gap:12px;min-height:auto}
    .vs-badge{font-size:20px}
    .unit{padding:6px 8px;min-height:44px}
  }
</style>
</head>
<body>

<header>
  <h1>IRON SOUL</h1>
  <a href="https://sloppy.live">&larr; sloppy.live</a>
</header>

<div class="top-bar">
  <span>wave <span class="v" id="waveEl">1</span></span>
  <span>gold <span class="v gold" id="goldEl">0</span></span>
</div>

<div class="arena">
  <div class="arena-label" id="arenaLabel">Preparing...</div>
  <div class="wave-banner" id="waveBanner"></div>
  <div class="battle-field">
    <div class="team ally" id="allyTeam"></div>
    <div class="vs-badge">VS</div>
    <div class="team enemy" id="enemyTeam"></div>
  </div>
  <div class="log" id="log"></div>
</div>

<div class="panels">
  <div class="panel" id="detailPanel">
    <div class="panel-title">Hero</div>
    <div id="detail"><span style="font-size:11px;color:var(--dim)">Preparing...</span></div>
  </div>
</div>

<div class="overlay" id="startOverlay">
  <div class="overlay-box">
    <h1>IRON SOUL</h1>
    <div class="sub">
      Choose your class. Walk alone. Conquer the abyss.<br/>
      Level up and upgrade your weapon endlessly.
    </div>
    <div class="class-pick" id="classPick"></div>
  </div>
</div>

<script>
(function(){
'use strict';

// === AUDIO ===
let actx;
function au(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx}
function sfx(f,d,t,v){const c=au();if(c.state==='suspended')c.resume();const o=c.createOscillator(),g=c.createGain();o.type=t||'square';o.frequency.setValueAtTime(f,c.currentTime);o.frequency.exponentialRampToValueAtTime(f*0.5,c.currentTime+d);g.gain.setValueAtTime(v||0.04,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.connect(g).connect(c.destination);o.start();o.stop(c.currentTime+d)}

// === KNIGHT DEFINITIONS ===
const HACKERS = [
  {
    id:'squire', name:'Squire', icon:'⚔️', iconBg:'#2a2418',
    baseHp:80, baseAtk:12, baseDef:3, baseSpd:1.2,
    skill:{name:'Rally Cry',desc:'Double attack on next hit',type:'buff_self',chance:0.2,mult:2},
    cost:0, // starter
  },
  {
    id:'scout', name:'Scout', icon:'🏹', iconBg:'#1a2820',
    baseHp:60, baseAtk:18, baseDef:2, baseSpd:1.5,
    skill:{name:'Vital Shot',desc:'Steals 15% of target HP',type:'drain',chance:0.25,pct:0.15},
    cost:50,
  },
  {
    id:'guardian', name:'Guardian', icon:'🛡️', iconBg:'#2a2a1e',
    baseHp:150, baseAtk:8, baseDef:8, baseSpd:0.7,
    skill:{name:'Shield Wall',desc:'Reduces next incoming damage by 60%',type:'shield',chance:0.3,reduction:0.6},
    cost:80,
  },
  {
    id:'ranger', name:'Shadow Ranger', icon:'🌙', iconBg:'#1a1828',
    baseHp:70, baseAtk:22, baseDef:2, baseSpd:1.3,
    skill:{name:'Swift Strike',desc:'Ignores armor, 50% bonus damage',type:'pierce',chance:0.2,mult:1.5},
    cost:120,
  },
  {
    id:'captain', name:'War Captain', icon:'🏰', iconBg:'#2a2018',
    baseHp:90, baseAtk:10, baseDef:4, baseSpd:1.8,
    skill:{name:'Sweeping Blow',desc:'Hits all enemies for 40% ATK',type:'aoe',chance:0.15,mult:0.4},
    cost:160,
  },
  {
    id:'champion', name:'Champion', icon:'🦁', iconBg:'#30200e',
    baseHp:55, baseAtk:35, baseDef:1, baseSpd:0.9,
    skill:{name:'Mighty Blow',desc:'200% damage crit',type:'crit',chance:0.25,mult:2},
    cost:250,
  },
  {
    id:'healer', name:'Healer', icon:'💚', iconBg:'#1e2a1e',
    baseHp:100, baseAtk:6, baseDef:5, baseSpd:1.0,
    skill:{name:'Mend',desc:'Heals lowest HP ally for 30% max HP',type:'heal',chance:0.3,pct:0.3},
    cost:100,
  },
  {
    id:'paladin', name:'Paladin', icon:'✨', iconBg:'#28201a',
    baseHp:75, baseAtk:28, baseDef:3, baseSpd:1.1,
    skill:{name:'Holy Parry',desc:'50% chance to dodge + counter',type:'dodge',chance:0.3,mult:1.2},
    cost:300,
  },
];

// === UNDEAD ENEMY DEFINITIONS ===
const GLITCHES = [
  { id:'shade', name:'Wisp', icon:'🕯️', iconBg:'#201a28', baseHp:40, baseAtk:8, baseDef:2, baseSpd:1.0 },
  { id:'bones', name:'Bone Soldier', icon:'🦴', iconBg:'#2a2420', baseHp:60, baseAtk:12, baseDef:3, baseSpd:0.9 },
  { id:'imp', name:'Imp', icon:'😈', iconBg:'#2a1a20', baseHp:35, baseAtk:15, baseDef:1, baseSpd:1.5 },
  { id:'golem', name:'Iron Golem', icon:'🗿', iconBg:'#2a2a20', baseHp:90, baseAtk:10, baseDef:6, baseSpd:0.7 },
  { id:'ghost', name:'Phantom', icon:'👻', iconBg:'#201828', baseHp:70, baseAtk:18, baseDef:4, baseSpd:0.8, ghost:true },
  { id:'wraith', name:'Wraith', icon:'👤', iconBg:'#18142a', baseHp:55, baseAtk:22, baseDef:2, baseSpd:1.1, ghost:true },
  { id:'troll', name:'Cave Troll', icon:'🧌', iconBg:'#2a2010', baseHp:50, baseAtk:25, baseDef:2, baseSpd:1.2 },
  { id:'bats', name:'Bat Swarm', icon:'🦇', iconBg:'#1a1a22', baseHp:30, baseAtk:6, baseDef:1, baseSpd:2.0 },
  { id:'lich', name:'Lich Lord', icon:'🧙', iconBg:'#20182a', baseHp:120, baseAtk:20, baseDef:5, baseSpd:0.6 },
];

// === DUNGEON BOSSES (every 10 waves) ===
const BOSSES = [
  { id:'boss_dragon', name:'Bone Dragon', icon:'🐉', iconBg:'#2a1018', baseHp:500, baseAtk:35, baseDef:10, baseSpd:0.5,
    skill:{name:'Dragon Breath',desc:'Hits all enemies for 50% ATK',type:'aoe',chance:0.25,mult:0.5} },
  { id:'boss_king', name:'Undead King', icon:'👑', iconBg:'#2a2010', baseHp:400, baseAtk:28, baseDef:12, baseSpd:0.7,
    skill:{name:'Royal Drain',desc:'Steals 20% of target HP',type:'drain',chance:0.3,pct:0.2} },
  { id:'boss_hydra', name:'Crypt Hydra', icon:'🐍', iconBg:'#182a18', baseHp:600, baseAtk:22, baseDef:8, baseSpd:0.6,
    skill:{name:'Regen Fang',desc:'Heals self for 25% max HP',type:'heal',chance:0.2,pct:0.25} },
  { id:'boss_reaper', name:'Soul Reaper', icon:'💀', iconBg:'#1a1020', baseHp:350, baseAtk:45, baseDef:5, baseSpd:0.9,
    skill:{name:'Death Strike',desc:'300% damage crit',type:'crit',chance:0.2,mult:3} },
  { id:'boss_titan', name:'Abyssal Titan', icon:'🌋', iconBg:'#2a1810', baseHp:800, baseAtk:18, baseDef:15, baseSpd:0.4,
    skill:{name:'Titan Shield',desc:'Reduces next damage by 70%',type:'shield',chance:0.35,reduction:0.7} },
];

// === CLASS & WEAPON DEFINITIONS ===
const CLASSES = [
  {
    id:'wizard', name:'Wizard', icon:'🧙‍♂️', weapon:'Arcane Staff',
    weaponIcon:'🪄', desc:'High magic damage, fragile body. Staff boosts ATK greatly.',
    starterIdx:0, // Squire base but restatted
    statMod:{hp:0.7, atk:1.4, def:0.6, spd:1.0},
    weaponBase:{dmg:5, spd:0},
    weaponGrowth:{dmg:3, spd:0.01},
  },
  {
    id:'rogue', name:'Rogue', icon:'🗡️', weapon:'Shadow Dagger',
    weaponIcon:'🗡️', desc:'Fast strikes, deadly crits. Dagger boosts speed and damage.',
    starterIdx:0,
    statMod:{hp:0.8, atk:1.1, def:0.7, spd:1.4},
    weaponBase:{dmg:3, spd:0.1},
    weaponGrowth:{dmg:2, spd:0.02},
  },
  {
    id:'paladin', name:'Paladin', icon:'⚜️', weapon:'Holy Mace',
    weaponIcon:'🔨', desc:'Tanky and balanced. Mace boosts ATK with solid defense.',
    starterIdx:0,
    statMod:{hp:1.3, atk:1.0, def:1.3, spd:0.85},
    weaponBase:{dmg:4, spd:0},
    weaponGrowth:{dmg:2.5, spd:0.005},
  },
  {
    id:'archer', name:'Archer', icon:'🏹', weapon:'Wooden Bow',
    weaponIcon:'🪵', desc:'Ranged precision. Bow boosts damage and speed evenly.',
    starterIdx:0,
    statMod:{hp:0.75, atk:1.2, def:0.65, spd:1.25},
    weaponBase:{dmg:4, spd:0.05},
    weaponGrowth:{dmg:2.5, spd:0.015},
  },
  {
    id:'berserker', name:'Berserker', icon:'🪓', weapon:'War Cleaver',
    weaponIcon:'🪓', desc:'Massive HP, no armor. Cleaver hits hard and scales big.',
    starterIdx:0,
    statMod:{hp:1.6, atk:1.3, def:0.3, spd:0.95},
    weaponBase:{dmg:6, spd:0},
    weaponGrowth:{dmg:3.5, spd:0.005},
  },
];

// === GAME STATE ===
const state = {
  phase:'idle', // idle, battle, shop, gameover
  wave:1,
  gold:0,
  squad:[], // [{def, level, hp, maxHp, atkTimer, shield, buffMult, weapon}]
  enemies:[],
  battleSpeed: 60, // ms per tick
  selectedUnit: null,
  playerClass: null, // chosen class
};

// === UNIT CREATION ===
function createUnit(def, level, isEnemy, classMod){
  const scale = isEnemy ? 1 + (state.wave-1)*0.15 : 1;
  const lvlScale = 1 + (level-1)*0.12;
  const hpMod = classMod ? classMod.hp : 1;
  const atkMod = classMod ? classMod.atk : 1;
  const defMod = classMod ? classMod.def : 1;
  const spdMod = classMod ? classMod.spd : 1;
  return {
    def,
    level,
    maxHp: Math.floor(def.baseHp * lvlScale * scale * hpMod),
    hp: Math.floor(def.baseHp * lvlScale * scale * hpMod),
    atk: Math.floor(def.baseAtk * lvlScale * scale * atkMod),
    defStat: Math.floor(def.baseDef * lvlScale * scale * defMod),
    spd: def.baseSpd * (1 + (level-1)*0.03) * spdMod,
    atkTimer: 0,
    shield: 0,
    buffMult: 1,
    alive: true,
    isEnemy: !!isEnemy,
    animClass: '',
    weapon: null, // set after creation for player starter
    invisible: false,
    ghostTimer: 0,
  };
}

function getWeaponBonus(unit){
  if(!unit.weapon) return {dmg:0, spd:0};
  const cls = state.playerClass;
  const lvl = unit.weapon.level;
  return {
    dmg: Math.floor(cls.weaponBase.dmg + cls.weaponGrowth.dmg * (lvl-1)),
    spd: cls.weaponBase.spd + cls.weaponGrowth.spd * (lvl-1),
  };
}

function weaponUpgradeCost(weaponLvl){
  return Math.floor(25 + weaponLvl * 18 + Math.pow(weaponLvl, 1.4) * 5);
}

function recalcUnit(u){
  const cls = state.playerClass;
  const classMod = (u === state.squad[0] && cls) ? cls.statMod : null;
  const lvlScale = 1 + (u.level-1)*0.12;
  const hpMod = classMod ? classMod.hp : 1;
  const atkMod = classMod ? classMod.atk : 1;
  const defMod = classMod ? classMod.def : 1;
  const spdMod = classMod ? classMod.spd : 1;
  const wb = getWeaponBonus(u);
  u.maxHp = Math.floor(u.def.baseHp * lvlScale * hpMod);
  u.hp = u.maxHp;
  u.atk = Math.floor(u.def.baseAtk * lvlScale * atkMod) + wb.dmg;
  u.defStat = Math.floor(u.def.baseDef * lvlScale * defMod);
  u.spd = u.def.baseSpd * (1 + (u.level-1)*0.03) * spdMod + wb.spd;
}

// === WAVE GENERATION ===
function genWave(wave){
  const enemies = [];
  const isBoss = wave % 10 === 0;

  if(isBoss){
    // Pick boss based on wave tier (cycles through bosses)
    const bossIdx = (Math.floor(wave / 10) - 1) % BOSSES.length;
    const bossDef = BOSSES[bossIdx];
    const boss = createUnit(bossDef, Math.ceil(wave * 0.6), true);
    boss.isBoss = true;
    enemies.push(boss);
    // Add 1-2 minions
    const minionCount = Math.min(1 + Math.floor(wave / 20), 3);
    const pool = GLITCHES.filter((_,i) => i < Math.min(3 + Math.floor(wave/3), GLITCHES.length));
    for(let i=0;i<minionCount;i++){
      const def = pool[Math.floor(Math.random()*pool.length)];
      enemies.push(createUnit(def, Math.ceil(wave*0.6), true));
    }
  } else {
    const count = Math.min(2 + Math.floor(wave/2), 5);
    const pool = GLITCHES.filter((_,i) => i < Math.min(3 + Math.floor(wave/3), GLITCHES.length));
    for(let i=0;i<count;i++){
      const def = pool[Math.floor(Math.random()*pool.length)];
      enemies.push(createUnit(def, Math.ceil(wave*0.6), true));
    }
  }
  return enemies;
}

// === BATTLE LOGIC ===
let battleInterval = null;
const logEl = document.getElementById('log');
let logLines = [];

function addLog(html){
  logLines.push(html);
  if(logLines.length>30) logLines.shift();
  logEl.innerHTML = logLines.join('<br/>');
  logEl.scrollTop = logEl.scrollHeight;
}

function pickTarget(team){
  // Prefer visible targets; if all invisible, can still hit
  const alive = team.filter(u=>u.alive);
  if(!alive.length) return null;
  const visible = alive.filter(u=>!u.invisible);
  if(visible.length) return visible[Math.floor(Math.random()*visible.length)];
  // All invisible — 30% chance to miss entirely
  if(Math.random() < 0.3) return null;
  return alive[Math.floor(Math.random()*alive.length)];
}

function lowestHpAlly(team){
  let lowest=null;
  for(const u of team){
    if(!u.alive) continue;
    if(!lowest || u.hp/u.maxHp < lowest.hp/lowest.maxHp) lowest=u;
  }
  return lowest;
}

function doAttack(attacker, defenders, allies){
  if(!attacker.alive) return;

  // Ghosts become visible when attacking
  if(attacker.invisible){ attacker.invisible = false; attacker.ghostTimer = 0; }

  const skill = attacker.def.skill;
  const useSkill = skill && Math.random() < skill.chance;

  if(useSkill && skill.type==='heal'){
    const target = lowestHpAlly(allies);
    if(target){
      const heal = Math.floor(target.maxHp * skill.pct * attacker.buffMult);
      target.hp = Math.min(target.maxHp, target.hp + heal);
      addLog(`<span class="l-skill">${attacker.def.name}</span> uses <span class="l-heal">${skill.name}</span> → heals ${target.def.name} for <span class="l-heal">${heal}</span>`);
      sfx(600,0.06,'sine',0.04);
      triggerAnim(attacker,'attacking');
      attacker.buffMult=1;
      return;
    }
  }

  if(useSkill && skill.type==='shield'){
    attacker.shield = skill.reduction;
    addLog(`<span class="l-skill">${attacker.def.name}</span> activates <span class="l-skill">${skill.name}</span> — incoming damage reduced`);
    sfx(500,0.05,'triangle',0.03);
    attacker.buffMult=1;
    return;
  }

  if(useSkill && skill.type==='buff_self'){
    attacker.buffMult = skill.mult;
    addLog(`<span class="l-skill">${attacker.def.name}</span> charges <span class="l-skill">${skill.name}</span>!`);
    sfx(700,0.04,'square',0.03);
    return; // don't attack this tick, next attack is buffed
  }

  if(useSkill && skill.type==='dodge'){
    attacker.shield = -1; // special flag: dodge next
    addLog(`<span class="l-skill">${attacker.def.name}</span> enters <span class="l-skill">${skill.name}</span>`);
    sfx(900,0.04,'sine',0.03);
  }

  if(useSkill && skill.type==='aoe'){
    const aliveTargets = defenders.filter(u=>u.alive);
    let totalDmg = 0;
    for(const target of aliveTargets){
      let dmg = Math.max(1, Math.floor(attacker.atk * skill.mult * attacker.buffMult - target.defStat*0.3));
      applyDamage(target, dmg);
      totalDmg+=dmg;
    }
    addLog(`<span class="l-skill">${attacker.def.name}</span> uses <span class="l-skill">${skill.name}</span> → hits ${aliveTargets.length} for <span class="l-dmg">${totalDmg}</span> total`);
    sfx(300,0.1,'sawtooth',0.05);
    triggerAnim(attacker,'attacking');
    attacker.buffMult=1;
    return;
  }

  const target = pickTarget(defenders);
  if(!target) return;

  let dmg;
  let logMsg;

  if(useSkill && skill.type==='pierce'){
    dmg = Math.max(1, Math.floor(attacker.atk * skill.mult * attacker.buffMult));
    logMsg = `<span class="l-skill">${attacker.def.name}</span> uses <span class="l-crit">${skill.name}</span> on ${target.def.name} → <span class="l-dmg">${dmg}</span> (piercing)`;
    sfx(200,0.1,'sawtooth',0.06);
  } else if(useSkill && skill.type==='crit'){
    dmg = Math.max(1, Math.floor(attacker.atk * skill.mult * attacker.buffMult - target.defStat*0.5));
    logMsg = `<span class="l-crit">${attacker.def.name}</span> CRITS ${target.def.name} → <span class="l-crit">${dmg}</span>!`;
    sfx(250,0.12,'square',0.07);
  } else if(useSkill && skill.type==='drain'){
    dmg = Math.floor(target.hp * skill.pct);
    const heal = Math.floor(dmg*0.5);
    attacker.hp = Math.min(attacker.maxHp, attacker.hp+heal);
    logMsg = `<span class="l-skill">${attacker.def.name}</span> drains ${target.def.name} → <span class="l-dmg">${dmg}</span> dmg, <span class="l-heal">+${heal}</span> hp`;
    sfx(400,0.08,'triangle',0.04);
  } else {
    dmg = Math.max(1, Math.floor(attacker.atk * attacker.buffMult - target.defStat*0.5));
    logMsg = `${attacker.def.name} hits ${target.def.name} → <span class="l-dmg">${dmg}</span>`;
    sfx(350,0.05,'square',0.03);
  }

  // Check dodge
  if(target.shield===-1){
    target.shield=0;
    const counter=Math.floor(target.atk*((target.def.skill&&target.def.skill.mult)||1));
    applyDamage(attacker,counter);
    addLog(`${target.def.name} <span class="l-skill">dodges</span> & counters for <span class="l-dmg">${counter}</span>!`);
    triggerAnim(attacker,'hit');
    attacker.buffMult=1;
    return;
  }

  // Apply shield
  if(target.shield>0){
    dmg=Math.floor(dmg*(1-target.shield));
    target.shield=0;
  }

  applyDamage(target, dmg);
  addLog(logMsg);
  triggerAnim(attacker,'attacking');
  triggerAnim(target,'hit');
  attacker.buffMult=1;
}

function applyDamage(unit, dmg){
  unit.hp = Math.max(0, unit.hp - dmg);
  if(unit.hp<=0){
    unit.alive=false;
    addLog(`<span class="l-dmg">${unit.def.name} destroyed!</span>`);
    sfx(150,0.15,'sawtooth',0.06);
  }
}

function triggerAnim(unit, cls){
  unit.animClass=cls;
  setTimeout(()=>{ unit.animClass=''; renderUnits(); }, 300);
}

function battleTick(){
  const allUnits = [...state.squad, ...state.enemies].filter(u=>u.alive);
  if(!allUnits.length) return;

  // Ghost invisibility toggle
  for(const u of allUnits){
    if(u.def.ghost && u.alive){
      u.ghostTimer++;
      if(u.invisible && u.ghostTimer > 8 + Math.random()*6){
        u.invisible = false; u.ghostTimer = 0;
      } else if(!u.invisible && u.ghostTimer > 12 + Math.random()*10){
        u.invisible = true; u.ghostTimer = 0;
        addLog(`<span class="l-skill">${u.def.name}</span> fades into shadow...`);
      }
    }
  }

  for(const u of allUnits){
    if(!u.alive) continue;
    u.atkTimer += u.spd;
    if(u.atkTimer >= 10){
      u.atkTimer -= 10;
      if(u.isEnemy){
        doAttack(u, state.squad, state.enemies);
      } else {
        doAttack(u, state.enemies, state.squad);
      }
    }
  }

  renderUnits();

  // Check win/lose
  const alliesAlive = state.squad.some(u=>u.alive);
  const enemiesAlive = state.enemies.some(u=>u.alive);

  if(!enemiesAlive){
    clearInterval(battleInterval);
    battleInterval=null;
    // Reward (boss waves give 3x gold)
    const isBossWave = state.wave % 10 === 0;
    const reward = (20 + state.wave*15) * (isBossWave ? 3 : 1);
    state.gold += reward;
    if(isBossWave){
      addLog(`<span style="color:var(--gold);font-weight:700">BOSS SLAIN! +${reward} gold</span>`);
    } else {
      addLog(`<span class="l-heal">Wave ${state.wave} cleared! +${reward} gold</span>`);
    }
    sfx(440,0.1,'sine',0.05);setTimeout(()=>sfx(660,0.08,'sine',0.04),100);setTimeout(()=>sfx(880,0.06,'sine',0.04),200);
    state.wave++;
    // Heal squad
    for(const u of state.squad){ u.hp=u.maxHp; u.alive=true; u.atkTimer=0; u.shield=0; u.buffMult=1; }
    saveGame();
    setTimeout(()=>startWave(), 1500);
  }

  if(!alliesAlive){
    clearInterval(battleInterval);
    battleInterval=null;
    addLog(`<span class="l-dmg">HERO FALLEN</span>`);
    sfx(100,0.3,'sawtooth',0.08);
    state.phase='gameover';
    setTimeout(()=>{
      // Revive squad, keep enemy HP as-is
      for(const u of state.squad){ u.hp=u.maxHp; u.alive=true; u.atkTimer=0; u.shield=0; u.buffMult=1; }
      // Reset enemy attack timers but keep their current HP
      for(const u of state.enemies){ if(u.alive){ u.atkTimer=0; u.shield=0; u.buffMult=1; } }
      saveGame();
      const remaining = state.enemies.filter(u=>u.alive).length;
      addLog(`<span style="color:var(--cyan)">The fallen rise again. ${remaining} foe${remaining!==1?'s':''} still standing...</span>`);
      setTimeout(()=>resumeWave(), 1000);
    }, 2000);
  }
}

function resumeWave(){
  state.phase='battle';
  document.getElementById('arenaLabel').textContent = `Wave ${state.wave}`;
  renderUnits();
  renderHud();
  renderDetail();
  if(battleInterval) clearInterval(battleInterval);
  battleInterval = setInterval(battleTick, state.battleSpeed);
}

function startWave(){
  state.phase='battle';
  state.enemies = genWave(state.wave);
  logLines=[];
  const isBoss = state.wave % 10 === 0;
  const bossEnemy = isBoss ? state.enemies.find(u=>u.isBoss) : null;

  if(isBoss && bossEnemy){
    addLog(`<span style="color:var(--gold);font-weight:700">⚔ BOSS WAVE ${state.wave} — ${bossEnemy.def.icon} ${bossEnemy.def.name} ⚔</span>`);
  } else {
    addLog(`<span style="color:var(--pink)">— Wave ${state.wave} —</span>`);
  }

  // Wave banner
  const banner = document.getElementById('waveBanner');
  banner.textContent = isBoss ? `BOSS — ${bossEnemy ? bossEnemy.def.name.toUpperCase() : 'WAVE '+state.wave}` : `WAVE ${state.wave}`;
  banner.style.color = isBoss ? 'var(--gold)' : 'var(--pink)';
  banner.classList.add('show');
  setTimeout(()=>banner.classList.remove('show'), isBoss ? 2000 : 1200);

  document.getElementById('arenaLabel').textContent = isBoss ? `Boss — ${bossEnemy ? bossEnemy.def.name : 'Wave '+state.wave}` : `Wave ${state.wave}`;
  renderUnits();
  renderHud();
  renderDetail();

  if(battleInterval) clearInterval(battleInterval);
  battleInterval = setInterval(battleTick, state.battleSpeed);
}

// === RENDERING ===
function renderUnit(u, container){
  const div = document.createElement('div');
  const ghostCls = u.def.ghost && u.alive ? (u.invisible ? 'ghost-invis' : 'ghost-flicker') : '';
  div.className = `unit ${u.alive?'':'dead'} ${u.animClass} ${ghostCls}`;
  if(u.isBoss) div.style.cssText += 'border-color:var(--gold);box-shadow:0 0 12px rgba(200,160,80,0.25);';

  const hpPct = Math.max(0, u.hp/u.maxHp*100);
  const hpColor = hpPct>60?'var(--green)':hpPct>25?'var(--gold)':'var(--red)';
  const atkPct = Math.min(100, u.atkTimer/10*100);

  div.innerHTML = `
    <div class="unit-icon" style="background:${u.def.iconBg}">${u.def.icon}</div>
    <div class="unit-info">
      <div class="unit-name" style="color:${u.isEnemy?'var(--red)':'var(--cyan)'}">${u.def.name} ${u.level>1?'Lv'+u.level:''}</div>
      <div class="unit-hp-bar"><div class="unit-hp-fill" style="width:${hpPct}%;background:${hpColor}"></div></div>
      <div class="unit-hp-text">${u.hp}/${u.maxHp}</div>
      <div class="unit-atk-bar"><div class="unit-atk-fill" style="width:${atkPct}%"></div></div>
    </div>
  `;
  container.appendChild(div);
}

function renderUnits(){
  const allyEl = document.getElementById('allyTeam');
  const enemyEl = document.getElementById('enemyTeam');
  allyEl.innerHTML='';
  enemyEl.innerHTML='';
  for(const u of state.squad) renderUnit(u, allyEl);
  for(const u of state.enemies) renderUnit(u, enemyEl);
}

function renderHud(){
  document.getElementById('waveEl').textContent=state.wave;
  document.getElementById('goldEl').textContent=state.gold;
}

function renderDetail(){
  const el = document.getElementById('detail');
  state.selectedUnit = 0;
  if(!state.squad.length){
    el.innerHTML='<span style="font-size:11px;color:var(--dim)">Preparing...</span>';
    return;
  }
  const u = state.squad[0];
  const lvlCost = 30 + u.level*20;
  const canLvl = state.gold >= lvlCost;

  // Weapon section (only for units with weapons)
  let weaponHtml = '';
  if(u.weapon && state.playerClass){
    const wb = getWeaponBonus(u);
    const wCost = weaponUpgradeCost(u.weapon.level);
    const canUpgrade = state.gold >= wCost;
    weaponHtml = `
      <div class="weapon-box">
        <div class="weapon-name">${state.playerClass.weaponIcon} ${u.weapon.name} +${u.weapon.level}</div>
        <div class="weapon-stat">DMG bonus <span class="wv">+${wb.dmg}</span></div>
        <div class="weapon-stat">SPD bonus <span class="wv">+${wb.spd.toFixed(2)}</span></div>
        <button class="upgrade-btn ${canUpgrade?'':'disabled'}" id="upgradeBtn">Upgrade (${wCost}g)</button>
      </div>
    `;
  }

  el.innerHTML = `
    <div class="detail-name">${u.def.icon} ${u.def.name} Lv${u.level}</div>
    <div class="detail-stat">HP <span class="v">${u.maxHp}</span></div>
    <div class="detail-stat">ATK <span class="v">${u.atk}</span></div>
    <div class="detail-stat">DEF <span class="v">${u.defStat}</span></div>
    <div class="detail-stat">SPD <span class="v">${u.spd.toFixed(2)}</span></div>
    ${u.def.skill?`<div class="detail-skill">⚡ ${u.def.skill.name}: ${u.def.skill.desc} (${Math.round(u.def.skill.chance*100)}%)</div>`:''}
    <button class="lvl-btn ${canLvl?'':'disabled'}" id="lvlBtn">Level Up (${lvlCost}g)</button>
    ${weaponHtml}
  `;
  const btn = document.getElementById('lvlBtn');
  if(canLvl){
    btn.addEventListener('click', ()=>{
      state.gold -= lvlCost;
      u.level++;
      recalcUnit(u);
      saveGame();
      sfx(500,0.05,'triangle',0.04);sfx(700,0.04,'triangle',0.03);
      renderDetail();
      renderHud();
      renderUnits();
    });
  }
  const upgradeBtn = document.getElementById('upgradeBtn');
  if(upgradeBtn && u.weapon){
    const wCost = weaponUpgradeCost(u.weapon.level);
    if(state.gold >= wCost){
      upgradeBtn.addEventListener('click', ()=>{
        state.gold -= wCost;
        u.weapon.level++;
        recalcUnit(u);
        saveGame();
        sfx(400,0.06,'triangle',0.05);sfx(600,0.05,'sine',0.04);sfx(800,0.04,'sine',0.03);
        renderDetail();
        renderHud();
        renderUnits();
        addLog(`<span class="l-heal">${u.weapon.name} upgraded to +${u.weapon.level}!</span>`);
      });
    }
  }
}

// === CLASS SELECTION ===
function buildClassPicker(){
  const el = document.getElementById('classPick');
  el.innerHTML = '';
  for(const cls of CLASSES){
    const card = document.createElement('div');
    card.className = 'class-card';
    card.innerHTML = `
      <div class="cc-icon">${cls.icon}</div>
      <div class="cc-name">${cls.name}</div>
      <div class="cc-weapon">${cls.weaponIcon} ${cls.weapon}</div>
      <div class="cc-desc">${cls.desc}</div>
    `;
    card.addEventListener('click', ()=> startWithClass(cls));
    el.appendChild(card);
  }
}

function startWithClass(cls){
  document.getElementById('startOverlay').style.display='none';
  state.playerClass = cls;
  // Create starter with class stat mods
  const starter = createUnit(HACKERS[0], 1, false, cls.statMod);
  starter.weapon = { name: cls.weapon, level: 1 };
  // Apply weapon bonus
  const wb = getWeaponBonus(starter);
  starter.atk += wb.dmg;
  starter.spd += wb.spd;
  state.squad = [starter];
  state.gold = 0;
  state.wave = 1;
  state.selectedUnit = 0;
  addLog(`<span class="l-skill">You chose the ${cls.name} class — ${cls.weaponIcon} ${cls.weapon} equipped!</span>`);
  renderDetail();
  startWave();
}

// === SAVE / LOAD ===
const SAVE_KEY = 'ironsoul_save';

function saveGame(){
  const data = {
    classId: state.playerClass ? state.playerClass.id : null,
    wave: state.wave,
    gold: state.gold,
    squad: state.squad.map(u => ({
      defId: u.def.id,
      level: u.level,
      weaponLevel: u.weapon ? u.weapon.level : 0,
    })),
  };
  try{ localStorage.setItem(SAVE_KEY, JSON.stringify(data)); }catch(e){}
}

function loadGame(){
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if(!raw) return false;
    const data = JSON.parse(raw);
    if(!data.classId || !data.squad || !data.squad.length) return false;
    const cls = CLASSES.find(c => c.id === data.classId);
    if(!cls) return false;
    state.playerClass = cls;
    state.wave = data.wave || 1;
    state.gold = data.gold || 0;
    state.squad = [];
    for(const su of data.squad){
      const def = HACKERS.find(h => h.id === su.defId);
      if(!def) continue;
      const isStarter = state.squad.length === 0;
      const u = createUnit(def, su.level || 1, false, isStarter ? cls.statMod : null);
      if(isStarter){
        u.weapon = { name: cls.weapon, level: su.weaponLevel || 1 };
        recalcUnit(u);
      }
      state.squad.push(u);
    }
    if(!state.squad.length) return false;
    return true;
  }catch(e){ return false; }
}

function clearSave(){ try{ localStorage.removeItem(SAVE_KEY); }catch(e){} }

// Try loading saved game
const hasSave = loadGame();
if(hasSave){
  document.getElementById('startOverlay').style.display='none';
  state.selectedUnit = 0;
  addLog(`<span class="l-heal">Progress restored — Wave ${state.wave}, ${state.gold} gold</span>`);
  renderDetail();
  startWave();
} else {
  buildClassPicker();
}

})();
</script>
