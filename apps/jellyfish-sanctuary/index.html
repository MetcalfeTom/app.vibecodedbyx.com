<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jellyfish Sanctuary</title>
  <meta name="description" content="A bioluminescent jellyfish sanctuary. Type a thought; watch it drift into the deep blue void.">
  <meta property="og:title" content="Jellyfish Sanctuary">
  <meta property="og:description" content="A deep-sea sanctuary of glowing jellies. Type a message and watch it ascend with one of them, slowly fading into the void.">
  <meta property="og:url" content="https://sloppy.live/jellyfish-sanctuary">
  <meta property="og:image" content="https://image.pollinations.ai/prompt/A%20bioluminescent%20jellyfish%20glowing%20cyan%20and%20violet%20in%20the%20deep%20blue%20ocean%20void,%20soft%20caustics,%20editorial%20photography?model=flux&seed=8118&width=1200&height=630&nologo=true">
  <link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%AA%BC">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Major+Mono+Display&family=Syne+Mono&display=swap" rel="stylesheet">

  <style>
    :root {
      --void:    #02091a;
      --deep:    #03182a;
      --tide:    #0a2c4a;
      --shore:   #1a4670;
      --glow:    #8ad8ff;
      --bloom:   #b89aff;
      --coral:   #ff9ec4;
      --pearl:   #f4f4ff;
      --pearl-d: rgba(244,244,255,0.7);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background:
        radial-gradient(ellipse at 50% 100%, var(--tide) 0%, var(--deep) 35%, var(--void) 80%),
        var(--void);
      color: var(--pearl);
      font-family: 'Cormorant Garamond', serif;
      position: relative;
    }

    canvas#sea {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      display: block;
      z-index: 0;
    }

    /* ============ HEADER ============ */
    header.mast {
      position: fixed;
      top: 1.1rem;
      left: 50%;
      transform: translateX(-50%);
      z-index: 5;
      text-align: center;
      pointer-events: none;
      max-width: 90vw;
    }
    header.mast .brand {
      font-family: 'Major Mono Display', monospace;
      font-size: clamp(1.05rem, 2.6vw, 1.6rem);
      letter-spacing: 0.22em;
      color: var(--glow);
      text-shadow:
        0 0 12px rgba(138,216,255,0.55),
        0 0 36px rgba(138,216,255,0.25);
    }
    header.mast .tag {
      display: block;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-weight: 300;
      font-size: clamp(0.85rem, 1.7vw, 1.05rem);
      color: rgba(244,244,255,0.62);
      margin-top: 0.2rem;
      letter-spacing: 0.01em;
    }
    header.mast .stat {
      display: block;
      font-family: 'Syne Mono', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      color: rgba(184,154,255,0.55);
      margin-top: 0.4rem;
      text-transform: uppercase;
    }

    /* ============ MESSAGE BAR ============ */
    .composer {
      position: fixed;
      left: 50%;
      bottom: 1.5rem;
      transform: translateX(-50%);
      z-index: 6;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      width: min(540px, calc(100% - 2rem));
      padding: 0.45rem 0.45rem 0.45rem 1rem;
      background: rgba(10,44,74,0.55);
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      border: 1px solid rgba(138,216,255,0.28);
      border-radius: 999px;
      box-shadow:
        0 0 0 1px rgba(184,154,255,0.10) inset,
        0 0 38px rgba(138,216,255,0.10),
        0 12px 30px rgba(0,0,0,0.45);
    }
    .composer input {
      flex: 1;
      background: none;
      border: none;
      color: var(--pearl);
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.05rem;
      letter-spacing: 0.01em;
      outline: none;
      padding: 0.4rem 0.1rem;
      min-width: 0;
    }
    .composer input::placeholder {
      color: rgba(244,244,255,0.4);
    }
    .composer button {
      appearance: none; -webkit-appearance: none;
      background: linear-gradient(135deg, var(--glow), var(--bloom));
      color: var(--void);
      border: none;
      width: 2.6rem; height: 2.6rem;
      border-radius: 50%;
      cursor: pointer;
      font-family: 'Syne Mono', monospace;
      font-weight: 700;
      font-size: 1.05rem;
      box-shadow: 0 0 14px rgba(138,216,255,0.5);
      transition: transform 0.1s, filter 0.12s, box-shadow 0.12s;
      flex-shrink: 0;
    }
    .composer button:hover  { filter: brightness(1.1); box-shadow: 0 0 28px rgba(184,154,255,0.7); transform: translateY(-1px); }
    .composer button:active { transform: translateY(1px); }
    .composer button:focus-visible { outline: 2px solid var(--bloom); outline-offset: 3px; }

    .footnote {
      position: fixed;
      left: 50%; bottom: 5rem;
      transform: translateX(-50%);
      z-index: 5;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 0.92rem;
      color: rgba(244,244,255,0.4);
      pointer-events: none;
      text-align: center;
      letter-spacing: 0.02em;
      opacity: 0;
      transition: opacity 0.6s;
    }
    .footnote.visible { opacity: 1; }

    @media (max-width: 540px) {
      header.mast .tag { display: none; }
      header.mast .stat { display: none; }
      .composer { bottom: 1rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition: none !important; }
    }
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
  </style>
</head>
<body>
  <canvas id="sea" aria-label="A bioluminescent jellyfish sanctuary. The deep blue void is filled with drifting glowing jellies. Type a message in the composer to release a jellyfish carrying your thought."></canvas>

  <header class="mast" aria-label="Sanctuary header">
    <span class="brand">JELLYFISH · SANCTUARY</span>
    <span class="tag">your thoughts ascend, slowly, into the deep</span>
    <span class="stat" id="stat-line">∞ drifting · 0 released</span>
  </header>

  <form class="composer" id="composer" autocomplete="off" aria-label="Release a message into the sanctuary">
    <input id="msg" type="text" maxlength="140" placeholder="release a thought into the void…" aria-label="Your message">
    <button type="submit" id="btn-send" title="Release" aria-label="Release message">↑</button>
  </form>

  <p class="footnote" id="footnote">released. follow it upward.</p>

  <script>
  (function(){
    'use strict';

    // ============================================================
    // CANVAS + SCENE
    // ============================================================
    const canvas = document.getElementById('sea');
    const ctx    = canvas.getContext('2d');
    let W = window.innerWidth, H = window.innerHeight;
    let dpr = Math.min(2, window.devicePixelRatio || 1);
    function resize() {
      W = window.innerWidth;
      H = window.innerHeight;
      dpr = Math.min(2, window.devicePixelRatio || 1);
      canvas.width  = W * dpr;
      canvas.height = H * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
    window.addEventListener('resize', resize, { passive: true });
    resize();

    // ============================================================
    // JELLYFISH FACTORY
    // ============================================================
    const HUES = [
      { bell: '#8ad8ff', halo: '#b89aff', tent: 'rgba(138,216,255,0.42)' }, // cyan/violet
      { bell: '#b89aff', halo: '#ff9ec4', tent: 'rgba(184,154,255,0.42)' }, // violet/coral
      { bell: '#ff9ec4', halo: '#8ad8ff', tent: 'rgba(255,158,196,0.42)' }, // coral/cyan
      { bell: '#9affd4', halo: '#8ad8ff', tent: 'rgba(154,255,212,0.40)' }, // mint/cyan
      { bell: '#f4f4ff', halo: '#b89aff', tent: 'rgba(244,244,255,0.34)' }, // pearl/violet
    ];
    let nextId = 1;
    function makeJelly(opts) {
      opts = opts || {};
      const hue = HUES[Math.floor(Math.random() * HUES.length)];
      const size = opts.size || (24 + Math.random() * 28);
      return {
        id: nextId++,
        x: opts.x != null ? opts.x : Math.random() * W,
        y: opts.y != null ? opts.y : Math.random() * H,
        vx: (Math.random() - 0.5) * 18,         // gentle horizontal drift
        vy: opts.vy != null ? opts.vy : -6 - Math.random() * 8,  // upward
        size,
        pulse: Math.random() * Math.PI * 2,
        pulseSpeed: 1.3 + Math.random() * 0.7,
        tentacles: 6 + Math.floor(Math.random() * 5),
        bellHue: hue.bell,
        haloHue: hue.halo,
        tentHue: hue.tent,
        wobblePhase: Math.random() * Math.PI * 2,
        message: opts.message || null,           // floating text under the bell
        messageAge: 0,
        messageLife: 22,                         // seconds before text fades
        age: 0,
        life: opts.life || 999,                  // ambient jellies live forever
        ascended: false                          // becomes true once off-screen-top
      };
    }
    // Seed ambient jellies — they live forever, just drift
    const jellies = [];
    const AMBIENT_COUNT = 9;
    for (let i = 0; i < AMBIENT_COUNT; i++) {
      jellies.push(makeJelly({
        x: Math.random() * W,
        y: Math.random() * H,
        vy: -3 - Math.random() * 4,             // ambient drifts upward slower
        life: Infinity
      }));
    }

    // ============================================================
    // PARTICLES — drifting plankton + bubbles
    // ============================================================
    const PLANKTON_N = 80;
    const plankton = [];
    for (let i = 0; i < PLANKTON_N; i++) {
      plankton.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: 0.4 + Math.random() * 1.2,
        phase: Math.random() * Math.PI * 2,
        speed: 0.15 + Math.random() * 0.4,
        drift: (Math.random() - 0.5) * 0.4,
        hue: Math.random() < 0.4 ? 'rgba(138,216,255,' : Math.random() < 0.7 ? 'rgba(184,154,255,' : 'rgba(244,244,255,'
      });
    }
    const bubbles = [];
    function emitBubble(x, y) {
      bubbles.push({
        x, y,
        r: 2 + Math.random() * 3,
        vy: -10 - Math.random() * 18,
        vx: (Math.random() - 0.5) * 8,
        age: 0,
        life: 3 + Math.random() * 2
      });
    }

    // ============================================================
    // CAUSTICS — slow shifting back-light
    // ============================================================
    let causticT = 0;
    function drawCaustics(dt, now) {
      causticT += dt * 0.05;
      const passes = 3;
      for (let i = 0; i < passes; i++) {
        const x = (Math.sin(causticT + i * 1.7) * 0.5 + 0.5) * W;
        const y = (Math.cos(causticT * 0.8 + i * 2.3) * 0.5 + 0.5) * H * 0.7;
        const r = 220 + Math.sin(causticT * 1.4 + i) * 80;
        const g = ctx.createRadialGradient(x, y, 0, x, y, r);
        g.addColorStop(0, 'rgba(138,216,255,0.06)');
        g.addColorStop(0.5, 'rgba(184,154,255,0.03)');
        g.addColorStop(1, 'rgba(0,0,0,0)');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, W, H);
      }
    }

    // ============================================================
    // DRAW JELLYFISH
    // ============================================================
    function drawJelly(j, t) {
      // Bell scale pulses
      const pulse = 1 + Math.sin(j.pulse) * 0.18;
      const r = j.size;
      const cx = j.x;
      const cy = j.y;
      const wobble = Math.sin(j.wobblePhase) * 4;
      // Outer halo
      const halo = ctx.createRadialGradient(cx, cy, 0, cx, cy, r * 2.6);
      halo.addColorStop(0, hexToRgba(j.haloHue, 0.30));
      halo.addColorStop(1, hexToRgba(j.haloHue, 0));
      ctx.fillStyle = halo;
      ctx.beginPath();
      ctx.arc(cx, cy, r * 2.6, 0, Math.PI * 2);
      ctx.fill();
      // Bell body — radial gradient ellipse
      ctx.save();
      ctx.translate(cx, cy);
      ctx.scale(pulse, 1);
      const bellGrad = ctx.createRadialGradient(0, -r * 0.3, 0, 0, 0, r);
      bellGrad.addColorStop(0, hexToRgba(j.bellHue, 0.95));
      bellGrad.addColorStop(0.45, hexToRgba(j.bellHue, 0.6));
      bellGrad.addColorStop(1, hexToRgba(j.bellHue, 0.0));
      ctx.fillStyle = bellGrad;
      ctx.beginPath();
      ctx.ellipse(0, 0, r, r * 0.78, 0, 0, Math.PI * 2);
      ctx.fill();
      // Inner glow ring
      ctx.fillStyle = hexToRgba(j.haloHue, 0.45);
      ctx.beginPath();
      ctx.ellipse(0, -r * 0.1, r * 0.55, r * 0.42, 0, 0, Math.PI * 2);
      ctx.fill();
      // Highlight
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.beginPath();
      ctx.ellipse(-r * 0.25, -r * 0.35, r * 0.18, r * 0.10, -0.35, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      // Tentacles
      ctx.strokeStyle = j.tentHue;
      ctx.lineWidth = 1.4;
      ctx.lineCap = 'round';
      for (let i = 0; i < j.tentacles; i++) {
        const offset = (i / (j.tentacles - 1) - 0.5) * r * 1.4;
        const startX = cx + offset * pulse;
        const startY = cy + r * 0.55;
        ctx.beginPath();
        ctx.moveTo(startX, startY);
        for (let s = 1; s <= 8; s++) {
          const sy = startY + s * r * 0.32;
          const sway = Math.sin(t * 0.0015 + i * 0.5 + s * 0.4) * 4 + wobble * (s / 8);
          ctx.lineTo(startX + sway, sy);
        }
        ctx.stroke();
      }
      // Frilly oral arms — soft inner glow
      ctx.strokeStyle = hexToRgba(j.haloHue, 0.55);
      ctx.lineWidth = 1.8;
      for (let i = 0; i < 4; i++) {
        const dx = (i - 1.5) * (r * 0.18) * pulse;
        ctx.beginPath();
        ctx.moveTo(cx + dx, cy + r * 0.35);
        ctx.quadraticCurveTo(
          cx + dx + Math.sin(t * 0.002 + i) * 6,
          cy + r * 1.0,
          cx + dx + Math.sin(t * 0.002 + i + 1.5) * 8,
          cy + r * 1.45
        );
        ctx.stroke();
      }
      // Floating message ABOVE the bell — fades over messageLife seconds.
      // Anchored above (not below) so the label is visible as soon as the
      // jelly enters the viewport from the bottom. The previous below-bell
      // position lagged ~r*1.9 below the bell, which kept the text
      // off-screen for the first ~15s of the slow ascent.
      if (j.message) {
        let alpha = 1;
        if (j.messageAge > j.messageLife * 0.55) {
          alpha = Math.max(0, 1 - (j.messageAge - j.messageLife * 0.55) / (j.messageLife * 0.45));
        }
        if (alpha > 0.02) {
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.font = 'italic 500 20px "Cormorant Garamond", Georgia, serif';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'alphabetic';
          // Soft glow behind the text — drawn first as a halo for readability
          ctx.shadowColor = j.bellHue;
          ctx.shadowBlur = 22;
          ctx.fillStyle = hexToRgba(j.bellHue, 0.7);
          const lines = wrapText(j.message, 28);
          let ty = cy - r * 1.4 - (lines.length - 1) * 22;
          for (const line of lines) {
            ctx.fillText(line, cx, ty);
            ty += 22;
          }
          // Re-draw the text without shadow in solid white for crisp legibility
          ctx.shadowBlur = 0;
          ctx.fillStyle = 'rgba(255,255,255,0.95)';
          ty = cy - r * 1.4 - (lines.length - 1) * 22;
          for (const line of lines) {
            ctx.fillText(line, cx, ty);
            ty += 22;
          }
          ctx.restore();
        }
      }
    }
    function wrapText(text, maxLen) {
      if (text.length <= maxLen) return [text];
      const words = text.split(' ');
      const lines = [];
      let cur = '';
      for (const w of words) {
        if ((cur + ' ' + w).trim().length > maxLen) {
          if (cur) lines.push(cur);
          cur = w;
        } else {
          cur = (cur + ' ' + w).trim();
        }
        if (lines.length >= 1 && cur.length > maxLen) {
          lines.push(cur.slice(0, maxLen - 1) + '…');
          return lines;
        }
      }
      if (cur) lines.push(cur);
      return lines.slice(0, 2);
    }
    function hexToRgba(hex, a) {
      // hex like #aabbcc → rgba(r, g, b, a)
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
    }

    // ============================================================
    // DRAW PARTICLES
    // ============================================================
    function drawPlankton(dt, t) {
      for (const p of plankton) {
        p.phase += dt * p.speed;
        p.y -= p.speed * 8 * dt;
        p.x += p.drift;
        if (p.y < -4) { p.y = H + 4; p.x = Math.random() * W; }
        if (p.x < -4) p.x = W + 4;
        if (p.x > W + 4) p.x = -4;
        const a = 0.2 + (Math.sin(p.phase) * 0.5 + 0.5) * 0.55;
        ctx.fillStyle = p.hue + a + ')';
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    function drawBubbles(dt) {
      for (let i = bubbles.length - 1; i >= 0; i--) {
        const b = bubbles[i];
        b.age += dt;
        if (b.age >= b.life) { bubbles.splice(i, 1); continue; }
        b.x += b.vx * dt;
        b.y += b.vy * dt;
        const a = 1 - b.age / b.life;
        ctx.strokeStyle = 'rgba(138,216,255,' + (0.45 * a) + ')';
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    // ============================================================
    // UPDATE
    // ============================================================
    let lastT = performance.now();
    let releasedCount = 0;
    const statLine = document.getElementById('stat-line');
    function tick(now) {
      const dt = Math.min(0.05, (now - lastT) / 1000);
      lastT = now;

      // Smear-fade for the bg (trail effect)
      ctx.fillStyle = 'rgba(2,9,26,0.28)';
      ctx.fillRect(0, 0, W, H);

      // Caustics layer (soft tinted bloom on top of the fade)
      drawCaustics(dt, now);

      // Plankton + bubbles
      drawPlankton(dt, now);
      drawBubbles(dt);

      // Jellies
      for (let i = jellies.length - 1; i >= 0; i--) {
        const j = jellies[i];
        j.age += dt;
        j.pulse += dt * j.pulseSpeed;
        j.wobblePhase += dt * 1.4;
        // Drift
        j.x += j.vx * dt;
        j.y += j.vy * dt;
        // Wrap horizontally for ambient
        if (j.life === Infinity) {
          if (j.x < -j.size) j.x = W + j.size;
          if (j.x > W + j.size) j.x = -j.size;
          // Wrap vertically too — when they ascend off-top, respawn at bottom
          if (j.y < -j.size * 3) j.y = H + j.size * 2;
        } else {
          // Message-carrying jelly: when it ascends past the top, fade out + cull
          if (j.y < -j.size * 3) {
            jellies.splice(i, 1);
            continue;
          }
        }
        // Message text age (drives text fade)
        if (j.message) {
          j.messageAge += dt;
        }
        // Occasional bubble emission
        if (Math.random() < dt * 0.6 && j.life !== Infinity) {
          emitBubble(j.x + (Math.random() - 0.5) * 6, j.y - j.size * 0.4);
        }
        drawJelly(j, now);
      }
      // Live stat update
      statLine.textContent = (jellies.length) + ' drifting · ' + releasedCount + ' released';

      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);

    // ============================================================
    // COMPOSER — release a jellyfish carrying the message
    // ============================================================
    const form = document.getElementById('composer');
    const input = document.getElementById('msg');
    const note = document.getElementById('footnote');
    form.addEventListener('submit', e => {
      e.preventDefault();
      const text = (input.value || '').trim().slice(0, 140);
      if (!text) return;
      // Spawn a message-carrying jelly just below the bottom edge with a
      // noticeably faster upward drift than the ambient flock so the
      // player can actually follow their thought across the viewport
      // within the 22s caption lifespan.
      jellies.push(makeJelly({
        x: W * 0.35 + Math.random() * W * 0.3,
        y: H - 40,                       // spawn IN view, near the bottom
        vy: -38 - Math.random() * 14,    // ~40-52 px/s — clearly upward
        size: 40 + Math.random() * 18,
        message: text,
        life: 60
      }));
      releasedCount++;
      input.value = '';
      // Footnote flash
      note.classList.add('visible');
      clearTimeout(form._noteTimer);
      form._noteTimer = setTimeout(() => note.classList.remove('visible'), 2400);
      // A burst of bubbles to mark the release
      for (let k = 0; k < 6; k++) {
        emitBubble(W * 0.5 + (Math.random() - 0.5) * 30, H - 60 + (Math.random() - 0.5) * 10);
      }
    });

    // Hide footnote initially
    note.classList.remove('visible');

    // ============================================================
    // FONT-LOAD WARMUP — pre-resolve the Cormorant Garamond italic
    // weight so the very first message-label paints in the intended
    // font (and not the Georgia fallback that ships from the system).
    // Canvas text doesn't trigger a webfont fetch on its own — the
    // browser only loads a face when an HTML element uses it. The
    // header tag already requests Cormorant, so this is belt-and-
    // suspenders for sluggish networks.
    // ============================================================
    try {
      if (document.fonts && document.fonts.load) {
        document.fonts.load('italic 500 20px "Cormorant Garamond"').catch(() => {});
      }
    } catch (_) { /* older browser — Georgia fallback is fine */ }
  })();
  </script>
</body>
</html>
