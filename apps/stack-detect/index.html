<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Stack Detect</title>
<link rel="icon" href="https://emojicdn.elk.sh/🔬">
<meta property="og:title" content="Stack Detect">
<meta property="og:description" content="Paste any website's HTML source and detect its tech stack instantly.">
<meta property="og:url" content="https://sloppy.live/stack-detect">
<meta property="og:image" content="https://emojicdn.elk.sh/🔬?style=apple&size=512">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;500;700&family=Newsreader:opsz,wght@6..72,300;6..72,700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{background:#0a0c10}
body{min-height:100dvh;background:#0a0c10;font-family:'IBM Plex Mono',monospace;color:#b8c0d0;padding:0 16px 80px}

header{text-align:center;padding:28px 0 6px}
header h1{font-family:'Newsreader',serif;font-size:2.4rem;font-weight:700;color:#60e0c0;letter-spacing:1px}
header p{font-size:10px;color:rgba(96,224,192,0.2);letter-spacing:3px;margin-top:2px}

#input-area{max-width:700px;margin:20px auto 0;position:relative}
#input-area label{font-size:10px;color:rgba(96,224,192,0.3);letter-spacing:1px;display:block;margin-bottom:6px}
#source{
  width:100%;height:160px;padding:10px 12px;border-radius:6px;
  background:rgba(96,224,192,0.03);border:1px solid rgba(96,224,192,0.1);
  color:#c0d0d8;font-family:'IBM Plex Mono',monospace;font-size:11px;
  resize:vertical;outline:none;
}
#source::placeholder{color:rgba(96,224,192,0.15)}
#source:focus{border-color:rgba(96,224,192,0.25)}

#actions{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center}
#actions button{
  font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:500;letter-spacing:1px;
  border:1px solid rgba(96,224,192,0.2);background:rgba(96,224,192,0.05);color:#60e0c0;
  padding:8px 20px;border-radius:5px;cursor:pointer;transition:all .15s;
  -webkit-tap-highlight-color:transparent;
}
#actions button:hover{background:rgba(96,224,192,0.1);border-color:rgba(96,224,192,0.35)}
#or-label{font-size:10px;color:rgba(96,224,192,0.15)}

#results{max-width:700px;margin:24px auto 0;display:none}
#results h2{font-family:'Newsreader',serif;font-size:1.3rem;color:#60e0c0;margin-bottom:12px}

.category{margin-bottom:18px}
.cat-title{font-size:10px;font-weight:700;color:rgba(96,224,192,0.35);letter-spacing:2px;margin-bottom:6px;text-transform:uppercase}
.det-list{display:flex;flex-wrap:wrap;gap:6px}

.det-tag{
  display:inline-flex;align-items:center;gap:5px;
  padding:5px 12px;border-radius:4px;
  border:1px solid var(--tag-clr,rgba(96,224,192,0.15));
  background:rgba(96,224,192,0.03);
  font-size:11px;color:var(--tag-clr,#60e0c0);
}
.det-tag .conf{font-size:9px;opacity:0.4;margin-left:2px}

#no-results{display:none;text-align:center;padding:30px;color:rgba(96,224,192,0.2);font-size:12px}

#analyze-sloppy{font-size:10px;color:rgba(96,224,192,0.15);cursor:pointer;text-decoration:underline;margin-left:auto}
#analyze-sloppy:hover{color:rgba(96,224,192,0.3)}

a#back{position:fixed;bottom:8px;left:10px;font-size:9px;opacity:0.12;color:#042;text-decoration:none;z-index:5}

@media(max-width:500px){
  header h1{font-size:1.8rem}
  #source{height:120px;font-size:10px}
}
</style>
</head>
<body>

<header>
  <h1>Stack Detect</h1>
  <p>FRAMEWORK ANALYZER</p>
</header>

<div id="input-area">
  <label>PASTE PAGE SOURCE (VIEW-SOURCE HTML)</label>
  <textarea id="source" placeholder="Paste the full HTML source of any website here...&#10;&#10;Tip: Right-click a page > View Page Source > Select All > Copy"></textarea>
  <div id="actions">
    <button id="analyze-btn">ANALYZE</button>
    <span id="or-label">or</span>
    <button id="demo-btn">DEMO (THIS PAGE)</button>
    <span id="analyze-sloppy" title="Analyze sloppy.live homepage">try sloppy.live</span>
  </div>
</div>

<div id="results">
  <h2>Detected Stack</h2>
  <div id="detections"></div>
</div>
<div id="no-results">No frameworks or libraries detected. Make sure you pasted the full HTML source.</div>

<a id="back" href="https://sloppy.live">sloppy.live</a>

<script>
(function(){

// --- DETECTION RULES ---
// Each rule: {name, category, color, patterns:[regex or string], confidence:'high'|'med'|'low'}
var RULES=[
  // JS Frameworks
  {name:'React',cat:'Framework',clr:'#61dafb',patterns:[/react[\.\-]dom/i,/react\.production/i,/data-reactroot/i,/data-reactid/i,/__NEXT_DATA__/,/_next\//,/react@/i],conf:'high'},
  {name:'Next.js',cat:'Framework',clr:'#000fff',patterns:[/__NEXT_DATA__/,/_next\/static/,/next\/dist/,/_next\/image/],conf:'high'},
  {name:'Vue.js',cat:'Framework',clr:'#42b883',patterns:[/vue[\.\-]runtime/i,/vue@[23]/i,/data-v-[a-f0-9]/,/__vue__/,/Vue\./,/v-bind:|v-on:|v-if|v-for/],conf:'high'},
  {name:'Nuxt',cat:'Framework',clr:'#00dc82',patterns:[/__NUXT__/,/_nuxt\//,/nuxt\.js/i],conf:'high'},
  {name:'Angular',cat:'Framework',clr:'#dd0031',patterns:[/angular[\.\-]core/i,/ng-version/i,/_ngcontent-/,/\[\(ngModel\)\]/,/angular@/i,/ng-app/i],conf:'high'},
  {name:'Svelte',cat:'Framework',clr:'#ff3e00',patterns:[/svelte[\.\-]internal/i,/svelte@/i,/__svelte/,/\.svelte-/],conf:'high'},
  {name:'SvelteKit',cat:'Framework',clr:'#ff3e00',patterns:[/__sveltekit/,/\.svelte-kit/],conf:'high'},
  {name:'Astro',cat:'Framework',clr:'#bc52ee',patterns:[/astro-island/i,/astro@/i,/client:load/,/client:visible/],conf:'high'},
  {name:'Remix',cat:'Framework',clr:'#121212',patterns:[/__remix/i,/remix\.run/i,/@remix-run/],conf:'high'},
  {name:'Gatsby',cat:'Framework',clr:'#663399',patterns:[/gatsby-/,/__gatsby/,/gatsby\.js/i],conf:'high'},
  {name:'Solid.js',cat:'Framework',clr:'#2c4f7c',patterns:[/solid-js/i,/_\$createComponent/,/solid@/i],conf:'med'},
  {name:'Ember',cat:'Framework',clr:'#e04e39',patterns:[/ember[\.\-]/i,/ember-cli/i,/ember@/i],conf:'high'},
  {name:'Backbone',cat:'Framework',clr:'#0071b5',patterns:[/backbone[\.\-]/i,/Backbone\./],conf:'med'},
  {name:'Alpine.js',cat:'Framework',clr:'#8bc0d0',patterns:[/alpine[\.\-]/i,/x-data=/,/x-bind:/,/x-on:/,/@click\./],conf:'med'},
  {name:'htmx',cat:'Framework',clr:'#3366cc',patterns:[/htmx[\.\-]/i,/hx-get/,/hx-post/,/hx-swap/,/hx-trigger/],conf:'high'},
  {name:'Preact',cat:'Framework',clr:'#673ab8',patterns:[/preact[\.\-]/i,/preact@/i],conf:'high'},
  {name:'Lit',cat:'Framework',clr:'#325cff',patterns:[/lit[\.\-]html/i,/lit-element/i,/@lit\//],conf:'high'},
  {name:'Qwik',cat:'Framework',clr:'#18b6f6',patterns:[/qwik[\.\-]/i,/qwikloader/i],conf:'high'},

  // CSS Frameworks
  {name:'Tailwind CSS',cat:'CSS',clr:'#06b6d4',patterns:[/tailwindcss/i,/tailwind[\.\-]/i,/class="[^"]*\b(flex|grid|bg-|text-|p-|m-|w-|h-|rounded|shadow|hover:)/],conf:'high'},
  {name:'Bootstrap',cat:'CSS',clr:'#7952b3',patterns:[/bootstrap[\.\-]/i,/bootstrap@/i,/class="[^"]*\b(container|row|col-|btn|navbar|modal)/],conf:'high'},
  {name:'Bulma',cat:'CSS',clr:'#00d1b2',patterns:[/bulma[\.\-]/i,/bulma@/i],conf:'high'},
  {name:'Material UI',cat:'CSS',clr:'#007fff',patterns:[/@mui\//i,/material-ui/i,/MuiButton/,/css-[a-z0-9]+-Mui/],conf:'high'},
  {name:'Chakra UI',cat:'CSS',clr:'#319795',patterns:[/chakra-ui/i,/@chakra/i],conf:'high'},
  {name:'Ant Design',cat:'CSS',clr:'#1890ff',patterns:[/antd[\.\-]/i,/ant-design/i,/class="ant-/],conf:'high'},
  {name:'Foundation',cat:'CSS',clr:'#232323',patterns:[/foundation[\.\-]sites/i,/foundation@/i],conf:'med'},
  {name:'Styled Components',cat:'CSS',clr:'#db7093',patterns:[/styled-components/i,/sc-[a-z]/i],conf:'med'},
  {name:'Emotion',cat:'CSS',clr:'#d36ac2',patterns:[/@emotion\//i,/css-[a-z0-9]{6,}/],conf:'low'},
  {name:'UnoCSS',cat:'CSS',clr:'#858585',patterns:[/unocss/i,/__uno/],conf:'high'},

  // Libraries
  {name:'jQuery',cat:'Library',clr:'#0769ad',patterns:[/jquery[\.\-]/i,/jquery@/i,/jQuery\(/],conf:'high'},
  {name:'Lodash',cat:'Library',clr:'#3492ff',patterns:[/lodash[\.\-]/i,/lodash@/i],conf:'high'},
  {name:'Axios',cat:'Library',clr:'#5a29e4',patterns:[/axios[\.\-]/i,/axios@/i],conf:'high'},
  {name:'D3.js',cat:'Library',clr:'#f9a03c',patterns:[/d3[\.\-]selection/i,/d3@/i,/d3\.js/i],conf:'high'},
  {name:'Three.js',cat:'Library',clr:'#049ef4',patterns:[/three[\.\-]/i,/three@/i,/THREE\./],conf:'high'},
  {name:'GSAP',cat:'Library',clr:'#88ce02',patterns:[/gsap[\.\-]/i,/gsap@/i,/TweenMax/i,/ScrollTrigger/i],conf:'high'},
  {name:'Framer Motion',cat:'Library',clr:'#0055ff',patterns:[/framer-motion/i,/motion\./],conf:'med'},
  {name:'Chart.js',cat:'Library',clr:'#ff6384',patterns:[/chart[\.\-]js/i,/chart@/i,/chartjs/i],conf:'high'},
  {name:'Moment.js',cat:'Library',clr:'#4a4a4a',patterns:[/moment[\.\-]js/i,/moment@/i,/moment\.min/],conf:'high'},
  {name:'Socket.io',cat:'Library',clr:'#010101',patterns:[/socket[\.\-]io/i,/socket\.io@/i],conf:'high'},
  {name:'Supabase',cat:'Library',clr:'#3ecf8e',patterns:[/supabase[\.\-]/i,/@supabase\//i,/supabase\.co/],conf:'high'},
  {name:'Firebase',cat:'Library',clr:'#ffca28',patterns:[/firebase[\.\-]/i,/firebaseapp/i,/firebase@/i,/\.firebaseio\.com/],conf:'high'},
  {name:'Stripe',cat:'Library',clr:'#635bff',patterns:[/js\.stripe\.com/i,/stripe[\.\-]/i],conf:'high'},

  // Build Tools / Bundlers
  {name:'Vite',cat:'Build',clr:'#646cff',patterns:[/@vite\//,/vite\/client/,/vite[\.\-]plugin/i],conf:'high'},
  {name:'Webpack',cat:'Build',clr:'#8dd6f9',patterns:[/webpack/i,/webpackChunk/,/__webpack_require__/],conf:'high'},
  {name:'Parcel',cat:'Build',clr:'#e1a72e',patterns:[/parcel[\.\-]/i,/parcelRequire/],conf:'high'},
  {name:'esbuild',cat:'Build',clr:'#ffcf00',patterns:[/esbuild/i],conf:'med'},
  {name:'Turbopack',cat:'Build',clr:'#f00',patterns:[/turbopack/i],conf:'high'},
  {name:'Rollup',cat:'Build',clr:'#ff3333',patterns:[/rollup[\.\-]/i,/rollup@/i],conf:'med'},

  // CMS / Platforms
  {name:'WordPress',cat:'Platform',clr:'#21759b',patterns:[/wp-content/i,/wp-includes/i,/wordpress/i,/wp-json/i],conf:'high'},
  {name:'Shopify',cat:'Platform',clr:'#96bf48',patterns:[/cdn\.shopify/i,/shopify[\.\-]/i,/Shopify\./],conf:'high'},
  {name:'Webflow',cat:'Platform',clr:'#4353ff',patterns:[/webflow[\.\-]/i,/\.webflow\.com/],conf:'high'},
  {name:'Squarespace',cat:'Platform',clr:'#000',patterns:[/squarespace[\.\-]/i,/sqsp\.net/],conf:'high'},
  {name:'Wix',cat:'Platform',clr:'#faad4d',patterns:[/wix[\.\-]com/i,/wixstatic/i,/wix-code/i],conf:'high'},
  {name:'Ghost',cat:'Platform',clr:'#15171a',patterns:[/ghost[\.\-]org/i,/ghost\/api/i],conf:'med'},
  {name:'Drupal',cat:'Platform',clr:'#0678be',patterns:[/drupal[\.\-]/i,/Drupal\./],conf:'high'},
  {name:'Hugo',cat:'Platform',clr:'#ff4088',patterns:[/hugo[\.\-]/i,/hugo-version/i],conf:'med'},
  {name:'Jekyll',cat:'Platform',clr:'#cc0000',patterns:[/jekyll/i],conf:'low'},

  // Analytics / Services
  {name:'Google Analytics',cat:'Analytics',clr:'#e37400',patterns:[/google-analytics\.com/i,/googletagmanager/i,/gtag\(/,/ga\('send'/],conf:'high'},
  {name:'Google Tag Manager',cat:'Analytics',clr:'#4285f4',patterns:[/googletagmanager\.com\/gtm/i,/GTM-[A-Z0-9]/],conf:'high'},
  {name:'Hotjar',cat:'Analytics',clr:'#fd3a5c',patterns:[/hotjar[\.\-]/i,/static\.hotjar/],conf:'high'},
  {name:'Segment',cat:'Analytics',clr:'#52bd95',patterns:[/segment[\.\-]com/i,/cdn\.segment/i,/analytics\.js/],conf:'med'},
  {name:'Plausible',cat:'Analytics',clr:'#5850ec',patterns:[/plausible[\.\-]io/i],conf:'high'},
  {name:'Vercel Analytics',cat:'Analytics',clr:'#000',patterns:[/vercel[\.\-]analytics/i,/_vercel\/insights/],conf:'high'},
  {name:'Sentry',cat:'Analytics',clr:'#362d59',patterns:[/sentry[\.\-]io/i,/sentry@/i,/Sentry\./],conf:'high'},
  {name:'Cloudflare',cat:'CDN',clr:'#f38020',patterns:[/cdnjs\.cloudflare/i,/cloudflare[\.\-]insights/i,/cf-beacon/],conf:'high'},

  // Meta / Hosting
  {name:'Vercel',cat:'Hosting',clr:'#000',patterns:[/vercel[\.\-]app/i,/\.vercel\.app/,/x-vercel/i],conf:'med'},
  {name:'Netlify',cat:'Hosting',clr:'#00c7b7',patterns:[/netlify[\.\-]/i,/\.netlify\.app/],conf:'med'},
  {name:'Cloudflare Pages',cat:'Hosting',clr:'#f38020',patterns:[/\.pages\.dev/,/cloudflare[\.\-]pages/i],conf:'med'},

  // Head/Meta patterns
  {name:'Open Graph',cat:'Meta',clr:'#4267B2',patterns:[/og:title/i,/og:description/i,/og:image/i],conf:'high'},
  {name:'Twitter Cards',cat:'Meta',clr:'#1da1f2',patterns:[/twitter:card/i,/twitter:title/i],conf:'high'},
  {name:'JSON-LD',cat:'Meta',clr:'#ff6600',patterns:[/application\/ld\+json/i],conf:'high'},
  {name:'PWA Manifest',cat:'Meta',clr:'#5a0fc8',patterns:[/manifest\.json/i,/manifest\.webmanifest/i],conf:'high'},
  {name:'Service Worker',cat:'Meta',clr:'#888',patterns:[/serviceWorker\.register/i,/navigator\.serviceWorker/i,/sw\.js/],conf:'high'},

  // Fonts
  {name:'Google Fonts',cat:'Fonts',clr:'#4285f4',patterns:[/fonts\.googleapis\.com/i,/fonts\.gstatic\.com/i],conf:'high'},
  {name:'Adobe Fonts',cat:'Fonts',clr:'#ff0000',patterns:[/use\.typekit\.net/i,/adobe[\.\-]fonts/i],conf:'high'},
  {name:'Font Awesome',cat:'Fonts',clr:'#339af0',patterns:[/font-awesome/i,/fontawesome/i,/fa-[a-z]/],conf:'high'},
];

function analyze(html){
  var found=[];
  var seen={};
  for(var i=0;i<RULES.length;i++){
    var rule=RULES[i];
    if(seen[rule.name])continue;
    for(var p=0;p<rule.patterns.length;p++){
      var pat=rule.patterns[p];
      var match=false;
      if(pat instanceof RegExp){match=pat.test(html)}
      else{match=html.indexOf(pat)>=0}
      if(match){
        seen[rule.name]=true;
        found.push({name:rule.name,cat:rule.cat,clr:rule.clr,conf:rule.conf});
        break;
      }
    }
  }
  return found;
}

function render(detections){
  var resEl=document.getElementById('results');
  var detEl=document.getElementById('detections');
  var noEl=document.getElementById('no-results');

  if(detections.length===0){
    resEl.style.display='none';
    noEl.style.display='block';
    return;
  }

  noEl.style.display='none';
  resEl.style.display='block';

  // Group by category
  var cats={};
  var catOrder=['Framework','CSS','Library','Build','Platform','Analytics','CDN','Hosting','Meta','Fonts'];
  detections.forEach(function(d){
    if(!cats[d.cat])cats[d.cat]=[];
    cats[d.cat].push(d);
  });

  var html='';
  catOrder.forEach(function(cat){
    if(!cats[cat])return;
    html+='<div class="category">';
    html+='<div class="cat-title">'+cat+'</div>';
    html+='<div class="det-list">';
    cats[cat].forEach(function(d){
      html+='<span class="det-tag" style="--tag-clr:'+d.clr+'">';
      html+=d.name;
      html+='<span class="conf">'+d.conf+'</span>';
      html+='</span>';
    });
    html+='</div></div>';
  });
  detEl.innerHTML=html;
}

// --- EVENTS ---
document.getElementById('analyze-btn').addEventListener('click',function(){
  var src=document.getElementById('source').value.trim();
  if(!src)return;
  render(analyze(src));
});

document.getElementById('demo-btn').addEventListener('click',function(){
  var src=document.documentElement.outerHTML;
  document.getElementById('source').value=src;
  render(analyze(src));
});

document.getElementById('analyze-sloppy').addEventListener('click',function(){
  var x=new XMLHttpRequest();
  x.open('GET','/',true);
  x.onload=function(){
    if(x.status===200){
      document.getElementById('source').value=x.responseText;
      render(analyze(x.responseText));
    }
  };
  x.send();
});

// Auto-analyze on paste
document.getElementById('source').addEventListener('paste',function(){
  var el=this;
  setTimeout(function(){
    var src=el.value.trim();
    if(src.length>50)render(analyze(src));
  },100);
});

})();
</script>
<script src="/sloppy-header/sloppy-bar.js"></script>
</body>
</html>
