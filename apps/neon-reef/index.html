<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">

  <link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%AA%B8">

  <meta property="og:title" content="Neon Reef — bioluminescent generative coral">
  <meta property="og:description" content="Click anywhere in the deep · watch neon coral branches sprout with pulsing polyps and slow ambient drift. Fully procedural.">
  <meta property="og:image" content="https://image.pollinations.ai/prompt/bioluminescent%20neon%20coral%20reef%20glowing%20pink%20cyan%20violet%20branches%20deep%20ocean%20dark%20bokeh%20depths%20cinematic?width=1200&height=630&seed=2742&nologo=true&model=flux">
  <meta property="og:url" content="https://sloppy.live/neon-reef">

  <link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Cormorant+Garamond:ital,wght@1,300;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #020514;
      --bg-2: #060c24;
      --ink: #d8e3ee;
      --dim: #6c7c8c;
      --dimmer: #3a4254;
      --cyan: #5eecff;
      --magenta: #ff5ec8;
      --lime: #7eff8e;
      --amber: #ffb84e;
      --violet: #b865ff;
      --pink: #ff7a9c;
    }
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; overflow: hidden; }
    body {
      background: var(--bg);
      color: var(--ink);
      font: 400 0.9rem 'JetBrains Mono', monospace;
      cursor: crosshair;
    }
    canvas#stage {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      display: block;
      z-index: 0;
    }
    .hud {
      position: fixed;
      top: 1.5rem; left: 1.75rem;
      z-index: 10;
      pointer-events: none;
      transition: opacity 0.5s;
    }
    .hud.fade { opacity: 0.35; }
    h1 {
      font: 400 1.8rem 'Major Mono Display', monospace;
      letter-spacing: 0.16em;
      margin: 0;
      color: #fff;
      text-shadow:
        -1.5px 0 0 var(--magenta),
        1.5px 0 0 var(--cyan),
        0 0 18px rgba(94, 236, 255, 0.45);
    }
    h1 .dot { color: var(--magenta); font-style: normal; }
    .tag {
      font: 1.3rem/1.3 'Cormorant Garamond', serif;
      font-style: italic;
      color: rgba(216, 227, 238, 0.65);
      margin: 0.25rem 0 0;
      max-width: 28rem;
    }
    .stats {
      position: fixed;
      bottom: 1.5rem; left: 1.75rem;
      z-index: 10;
      display: flex;

    .actions {

    .actions button {

    @media (max-width: 720px) {

<body>
  <canvas id="stage" aria-label="neon coral reef canvas · click or drag to grow coral"></canvas>
  <div class="hud" id="hud">
    <h1>NEON<span class="dot">·</span>REEF</h1>
    <p class="tag">click the deep · let the coral bloom · the polyps know you are here</p>
  </div>
  <div class="hint" id="hint">drag, tap, or click anywhere to seed</div>
  <div class="actions">
    <button id="reset" type="button" title="clear the reef">↺ reset</button>
    <button id="save" type="button" title="download a PNG snapshot">↓ png</button>
    <button id="mute" type="button" title="toggle ambient drone (off by default)">♪ drone</button>
  </div>
  <div class="stats" id="stats">
    <span><strong id="coralCount">0</strong>·corals</span>
    <span><strong id="segCount">0</strong>·branches</span>
    <span><strong id="polypCount">0</strong>·polyps</span>
  </div>
  <script>
  (() => {
    'use strict';

    /* ───────── palette ───────── */
    const PALETTE = [
      { h: 188, name: 'cyan' },     // teal/cyan
      { h: 320, name: 'magenta' },  // hot pink/magenta
      { h: 280, name: 'violet' },   // violet
      { h: 130, name: 'lime' },     // bioluminescent green
      { h:  36, name: 'amber' },    // warm gold
      { h: 340, name: 'pink' },     // pale pink
    ];
    const MAX_CORALS = 80;
    const SEG_LEN = 11;
    const TRUNK_THICKNESS = 4.5;
    const TIP_THICKNESS = 0.45;
    const PLANKTON_COUNT = 70;

    /* ───────── canvas + DPR ───────── */
    const canvas = document.getElementById('stage');
    const ctx = canvas.getContext('2d');
    let W = 0, H = 0, DPR = 1;
    function resize() {
      DPR = Math.min(window.devicePixelRatio || 1, 2);
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.width = Math.floor(W * DPR);
      canvas.height = Math.floor(H * DPR);
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }
    window.addEventListener('resize', resize);
    resize();

    /* ───────── state ───────── */
    const state = {
      corals: [],
      plankton: [],
      pulses: [],   // bright flash on each branch sprout
      time: 0,
      mouse: { x: W / 2, y: H / 2, prevX: W / 2, prevY: H / 2, accum: 0, lastSpawn: 0, down: false },
      muted: true,
      audioReady: false,
    };

    /* ───────── plankton ───────── */
    for (let i = 0; i < PLANKTON_COUNT; i++) {
      const pal = PALETTE[(Math.random() * PALETTE.length) | 0];
      state.plankton.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vy: -10 - Math.random() * 25,           // drift upward
        wobbleA: 6 + Math.random() * 14,
        wobbleK: 0.4 + Math.random() * 0.9,
        wobbleP: Math.random() * Math.PI * 2,
        r: 0.6 + Math.random() * 1.4,
        hue: pal.h + (Math.random() - 0.5) * 18,
        flick: Math.random() * Math.PI * 2,
      });
    }

    /* ───────── coral generation ───────── */
    function spawnCoral(x, y, intensity) {
      if (state.corals.length >= MAX_CORALS) {
        // gracefully retire the oldest so the field stays performant
        state.corals.shift();
      }
      const pal = PALETTE[(Math.random() * PALETTE.length) | 0];
      const hue = pal.h + (Math.random() - 0.5) * 20;
      // intensity: 0..1 (click=1 full, gentle hover-drag=0.4)
      const inten = intensity == null ? 0.6 : intensity;
      const maxSegs = Math.round(22 + inten * 60); // 22..82
      const spreadAngle = 0.6 + Math.random() * 0.5;
      const bias = -Math.PI / 2; // grow upward
      const swayPhase = Math.random() * Math.PI * 2;
      const swayAmp = 0.5 + Math.random() * 1.2;
      // initial trunk segment
      const seg0 = {
        x1: x, y1: y,
        x2: x + Math.cos(bias) * SEG_LEN * 1.2,
        y2: y + Math.sin(bias) * SEG_LEN * 1.2,
        angle: bias,
        depth: 0,
        thickness: TRUNK_THICKNESS,
        grown: 0, target: 220,
        children: 0,
      };
      const coral = {
        rootX: x, rootY: y,
        hue,
        spread: spreadAngle,
        bias,
        maxSegs,
        segs: [seg0],
        nextGrow: 90,            // ms until next sprout
        born: state.time,
        swayPhase,
        swayAmp,
        inten,
        done: false,
      };
      state.corals.push(coral);
      pushPulse(x, y, hue, 22, 0.9);
      sndBloop(hue, inten);
    }
    function growStep(coral) {
      if (coral.segs.length >= coral.maxSegs) { coral.done = true; return; }
      // Pick a parent — bias toward leaves but allow occasional mid-segment fork
      const leaves = coral.segs.filter(s => s.children < 2);
      if (!leaves.length) { coral.done = true; return; }
      // Recent leaves grow faster than ancient ones — slight bias to last 1/3
      const fresh = leaves.slice(Math.floor(leaves.length * 0.55));
      const pool = fresh.length ? fresh : leaves;
      const parent = pool[(Math.random() * pool.length) | 0];
      // Branch angle: parent angle + spread, with bias back toward up (-PI/2)
      const upBias = (coral.bias - parent.angle) * 0.15;
      const angle = parent.angle + (Math.random() - 0.5) * coral.spread + upBias;
      const lenScale = 1 - (parent.depth / Math.max(8, coral.maxSegs * 0.4)) * 0.5;
      const len = SEG_LEN * Math.max(0.45, lenScale);
      const thickness = Math.max(TIP_THICKNESS, parent.thickness * 0.86);
      const seg = {
        x1: parent.x2, y1: parent.y2,
        x2: parent.x2 + Math.cos(angle) * len,
        y2: parent.y2 + Math.sin(angle) * len,
        angle,
        depth: parent.depth + 1,
        thickness,
        grown: 0, target: 180 + Math.random() * 140,
        children: 0,
      };
      parent.children++;
      coral.segs.push(seg);
      pushPulse(seg.x1, seg.y1, coral.hue, 14, 0.55);
      sndTick(coral.hue);
    }

    function pushPulse(x, y, hue, r, life) {
      state.pulses.push({ x, y, hue, r, max: r * 5, life, age: 0 });
      if (state.pulses.length > 240) state.pulses.shift();
    }

    /* ───────── per-frame update ───────── */
    function update(dt) {
      state.time += dt;
      // Mouse-distance gated spawning while pointer is moving with button or hover
      // (movement-spawn keeps it gentle so click-spawn feels meaningful)
      // — gentle hover spawn is debounced via accum + cooldown
      const m = state.mouse;
      const dx = m.x - m.prevX, dy = m.y - m.prevY;
      const d = Math.sqrt(dx * dx + dy * dy);
      m.accum += d;
      m.prevX = m.x; m.prevY = m.y;
      if (m.accum > 110 && state.time - m.lastSpawn > 220) {
        spawnCoral(m.x, m.y, m.down ? 0.85 : 0.4);
        m.accum = 0;
        m.lastSpawn = state.time;
      }
      // Grow corals
      for (const c of state.corals) {
        if (c.done) continue;
        // animate any growing segments toward full length
        for (const s of c.segs) {
          if (s.grown < s.target) s.grown = Math.min(s.target, s.grown + dt);
        }
        c.nextGrow -= dt;
        if (c.nextGrow <= 0) {
          growStep(c);
          // sprout cadence depends on coral intensity — bigger ones sprout faster
          c.nextGrow = 50 + Math.random() * 130 - c.inten * 30;
        }
      }
      // Move plankton — slow upward drift, horizontal wobble
      for (const p of state.plankton) {
        p.y += (p.vy * dt) / 1000;
        p.x += Math.sin(state.time * 0.001 * p.wobbleK + p.wobbleP) * 0.3;
        p.flick += dt * 0.004;
        if (p.y < -10) { p.y = H + 10; p.x = Math.random() * W; }
        if (p.x < -5) p.x = W + 5;
        if (p.x > W + 5) p.x = -5;
      }
      // Pulses
      for (const pu of state.pulses) {
        pu.age += dt / 1000;
        if (pu.age > pu.life) pu.dead = true;
      }
      state.pulses = state.pulses.filter(p => !p.dead);
    }

    /* ───────── render ───────── */
    function easeOut(t) { return 1 - Math.pow(1 - t, 3); }

    function drawFrame() {
      // base
      const grad = ctx.createRadialGradient(W * 0.5, H * 0.85, 0, W * 0.5, H * 0.5, Math.max(W, H));
      grad.addColorStop(0, '#0a163d');
      grad.addColorStop(0.55, '#040a22');
      grad.addColorStop(1, '#01020a');
      ctx.fillStyle = grad;
      ctx.fillRect(0, 0, W, H);
      // caustics — slow shifting overlay
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.globalAlpha = 0.05;
      for (let i = 0; i < 3; i++) {
        const t = state.time * 0.0003 + i * 2.1;
        const cx = W * (0.5 + Math.sin(t) * 0.4);
        const cy = H * (0.5 + Math.cos(t * 0.8) * 0.4);
        const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.min(W, H) * 0.55);
        g.addColorStop(0, 'rgba(120, 200, 255, 1)');
        g.addColorStop(1, 'rgba(120, 200, 255, 0)');
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, W, H);
      }
      ctx.restore();

      // plankton (back layer)
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      for (const p of state.plankton) {
        const flick = 0.6 + Math.sin(p.flick) * 0.4;
        ctx.shadowBlur = 12 * flick;
        ctx.shadowColor = `hsl(${p.hue}, 90%, 65%)`;
        ctx.fillStyle = `hsla(${p.hue}, 95%, ${65 + flick * 15}%, ${0.55 + flick * 0.3})`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();

      // corals
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      ctx.lineCap = 'round';
      for (const c of state.corals) {
        const sway = Math.sin(state.time * 0.0006 + c.swayPhase) * c.swayAmp;
        for (const s of c.segs) {
          if (s.grown <= 0) continue;
          const p = Math.min(1, s.grown / s.target);
          const ease = easeOut(p);
          // animate from (x1,y1) toward (x2,y2) by `ease`
          const xa = s.x1, ya = s.y1;
          const xb = s.x1 + (s.x2 - s.x1) * ease + sway * (s.depth * 0.04);
          const yb = s.y1 + (s.y2 - s.y1) * ease;
          // body
          ctx.lineWidth = s.thickness;
          ctx.shadowBlur = s.thickness * 4.5;
          ctx.shadowColor = `hsl(${c.hue}, 95%, 60%)`;
          ctx.strokeStyle = `hsla(${c.hue}, 95%, 55%, 0.85)`;
          ctx.beginPath();
          ctx.moveTo(xa, ya);
          ctx.lineTo(xb, yb);
          ctx.stroke();
          // bright core overlay
          ctx.shadowBlur = 0;
          ctx.lineWidth = Math.max(0.4, s.thickness * 0.42);
          ctx.strokeStyle = `hsla(${c.hue}, 100%, 92%, 0.95)`;
          ctx.beginPath();
          ctx.moveTo(xa, ya);
          ctx.lineTo(xb, yb);
          ctx.stroke();
          // polyp at the leaf tip (segments with no children)
          if (s.children === 0 && p >= 1) {
            const polypPulse = 0.7 + Math.sin(state.time * 0.004 + (s.x2 + s.y2) * 0.013) * 0.5;
            const polypR = Math.max(0.9, s.thickness * 0.65) * polypPulse;
            ctx.shadowBlur = polypR * 9;
            ctx.shadowColor = `hsl(${c.hue}, 100%, 70%)`;
            ctx.fillStyle = `hsla(${c.hue}, 100%, 78%, ${0.6 + polypPulse * 0.35})`;
            ctx.beginPath();
            ctx.arc(xb, yb, polypR, 0, Math.PI * 2);
            ctx.fill();
            // brighter center pip
            ctx.shadowBlur = 0;
            ctx.fillStyle = `hsla(${c.hue}, 100%, 96%, ${0.7 + polypPulse * 0.3})`;
            ctx.beginPath();
            ctx.arc(xb, yb, Math.max(0.6, polypR * 0.45), 0, Math.PI * 2);
            ctx.fill();
          }
        }
      }
      ctx.restore();

      // sprout pulses (bright flash on each new segment)
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      for (const pu of state.pulses) {
        const t = pu.age / pu.life;
        const r = pu.r + (pu.max - pu.r) * easeOut(t);
        const a = (1 - t) * 0.55;
        ctx.shadowBlur = 24;
        ctx.shadowColor = `hsl(${pu.hue}, 95%, 65%)`;
        ctx.strokeStyle = `hsla(${pu.hue}, 100%, 75%, ${a})`;
        ctx.lineWidth = 1.4;
        ctx.beginPath();
        ctx.arc(pu.x, pu.y, r, 0, Math.PI * 2);
        ctx.stroke();
      }
      ctx.restore();
    }

    /* ───────── stats ───────── */
    const coralCountEl = document.getElementById('coralCount');
    const segCountEl = document.getElementById('segCount');
    const polypCountEl = document.getElementById('polypCount');
    let statsT = 0;
    function updateStats(dt) {
      statsT += dt;
      if (statsT < 220) return;
      statsT = 0;
      let segs = 0, polyps = 0;
      for (const c of state.corals) {
        segs += c.segs.length;
        for (const s of c.segs) if (s.children === 0 && s.grown >= s.target) polyps++;
      }
      coralCountEl.textContent = state.corals.length;
      segCountEl.textContent = segs;
      polypCountEl.textContent = polyps;
    }

    /* ───────── ambient audio (deep-sea drone, muted by default) ───────── */
    let audio = null;
    function ensureAudio() {
      if (audio) return audio;
      const AC = window.AudioContext || window.webkitAudioContext;
      if (!AC) return null;
      audio = { ctx: new AC() };
      audio.master = audio.ctx.createGain();
      audio.master.gain.value = 0;
      audio.master.connect(audio.ctx.destination);
      // 4-voice low chord through a swept low-pass for ocean-drone feel
      const lp = audio.ctx.createBiquadFilter();
      lp.type = 'lowpass';
      lp.frequency.value = 420;
      lp.Q.value = 1.2;
      lp.connect(audio.master);
      const lfo = audio.ctx.createOscillator();
      lfo.frequency.value = 0.06;
      const lfoG = audio.ctx.createGain();
      lfoG.gain.value = 180;
      lfo.connect(lfoG).connect(lp.frequency);
      lfo.start();
      const freqs = [41.2, 55, 82.4, 110, 138.6];
      for (const f of freqs) {
        const o1 = audio.ctx.createOscillator();
        o1.type = 'sine'; o1.frequency.value = f;
        const o2 = audio.ctx.createOscillator();
        o2.type = 'triangle'; o2.frequency.value = f * 1.005;
        const g = audio.ctx.createGain();
        g.gain.value = 0.22;
        o1.connect(g); o2.connect(g);
        g.connect(lp);
        o1.start(); o2.start();
      }
      audio.ready = true;
      return audio;
    }
    function sndTick(hue) {
      if (state.muted || !audio || !audio.ready) return;
      try {
        const t = audio.ctx.currentTime;
        const o = audio.ctx.createOscillator();
        o.type = 'sine';
        const f = 540 + (hue / 360) * 700;
        o.frequency.value = f;
        const g = audio.ctx.createGain();
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.05, t + 0.005);
        g.gain.exponentialRampToValueAtTime(0.0008, t + 0.45);
        o.connect(g).connect(audio.master);
        o.start(t); o.stop(t + 0.5);
      } catch (_) {}
    }
    function sndBloop(hue, inten) {
      if (state.muted || !audio || !audio.ready) return;
      try {
        const t = audio.ctx.currentTime;
        const o = audio.ctx.createOscillator();
        o.type = 'triangle';
        const f = 220 + (hue / 360) * 220;
        o.frequency.setValueAtTime(f * 1.5, t);
        o.frequency.exponentialRampToValueAtTime(f * 0.6, t + 0.6);
        const g = audio.ctx.createGain();
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.18 * inten, t + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0008, t + 0.85);
        o.connect(g).connect(audio.master);
        o.start(t); o.stop(t + 0.9);
      } catch (_) {}
    }

    /* ───────── input ───────── */
    const hud = document.getElementById('hud');
    const hintEl = document.getElementById('hint');
    let hudFadeT = null;
    function nudgeHud() {
      hud.classList.add('fade');
      clearTimeout(hudFadeT);
      hudFadeT = setTimeout(() => hud.classList.remove('fade'), 2400);
    }
    let firstInteract = true;
    function onPointer(e) {
      if (e.target && e.target.tagName === 'BUTTON') return;
      const x = e.clientX, y = e.clientY;
      state.mouse.x = x; state.mouse.y = y;
      if (firstInteract) {
        firstInteract = false;
        hintEl.classList.add('hide');
      }
      nudgeHud();
    }
    canvas.addEventListener('pointermove', onPointer, { passive: true });
    canvas.addEventListener('pointerdown', (e) => {
      state.mouse.down = true;
      state.mouse.x = e.clientX; state.mouse.y = e.clientY;
      state.mouse.prevX = e.clientX; state.mouse.prevY = e.clientY;
      // click-spawn is a stronger seed than move-spawn
      spawnCoral(e.clientX, e.clientY, 1.0);
      state.mouse.lastSpawn = state.time;
      if (firstInteract) { firstInteract = false; hintEl.classList.add('hide'); }
      nudgeHud();
    });
    window.addEventListener('pointerup', () => { state.mouse.down = false; });

    /* ───────── UI buttons ───────── */
    document.getElementById('reset').addEventListener('click', () => {
      state.corals = [];
      state.pulses = [];
      coralCountEl.textContent = '0';
      segCountEl.textContent = '0';
      polypCountEl.textContent = '0';
    });
    document.getElementById('save').addEventListener('click', () => {
      const url = canvas.toDataURL('image/png');
      const a = document.createElement('a');
      a.href = url;
      a.download = 'neon-reef-' + new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19) + '.png';
      a.click();
    });
    const muteBtn = document.getElementById('mute');
    muteBtn.addEventListener('click', () => {
      state.muted = !state.muted;
      muteBtn.classList.toggle('on', !state.muted);
      muteBtn.textContent = state.muted ? '♪ drone' : '♬ drone';
      if (!state.muted) {
        const a = ensureAudio();
        if (a && a.ctx.state === 'suspended') a.ctx.resume();
        if (a) a.master.gain.cancelScheduledValues(a.ctx.currentTime);
        if (a) a.master.gain.linearRampToValueAtTime(0.35, a.ctx.currentTime + 1.4);
      } else if (audio) {
        audio.master.gain.cancelScheduledValues(audio.ctx.currentTime);
        audio.master.gain.linearRampToValueAtTime(0, audio.ctx.currentTime + 0.6);
      }
    });

    /* ───────── animation loop ───────── */
    let last = performance.now();
    function tick(now) {
      const dt = Math.min(50, now - last); // clamp to avoid jank after tab-out
      last = now;
      update(dt);
      drawFrame();
      updateStats(dt);
      requestAnimationFrame(tick);
    }
    requestAnimationFrame(tick);
  })();
  </script>
</body>
</html>
