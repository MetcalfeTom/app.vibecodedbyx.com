<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Neon Marquee · global scrolling message board</title>
<meta name="description" content="Post a message · watch it scroll across a global neon billboard with everyone else in real-time.">
<meta property="og:title" content="Neon Marquee">
<meta property="og:description" content="Post a message · watch it scroll across a global neon billboard with everyone else in real-time.">
<meta property="og:image" content="https://image.pollinations.ai/prompt/Retro%20neon%20billboard%20at%20night%20with%20three%20stacked%20scrolling%20message%20lanes%20in%20pink%20cyan%20and%20yellow%2C%20Times%20Square%20LED%20ticker%2C%20rainy%20synthwave%20cityscape%20background?width=1200&height=630&model=flux&nologo=true&seed=4747">
<meta property="og:url" content="https://sloppy.live/neon-marquee">
<meta property="og:type" content="website">
<link rel="icon" href="https://emojicdn.elk.sh/💬">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Monoton&family=Press+Start+2P&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --void:    #0a0214;
    --void-2:  #1a0828;
    --frame:   #2a0838;
    --frame-2: #4a1858;
    --glow-p:  #ff2e9a;
    --glow-c:  #66f5ff;
    --glow-y:  #ffd24a;
    --glow-g:  #7dffd5;
    --glow-v:  #b870ff;
    --glow-o:  #ff7e3a;
    --text:    #e5edff;
    --text-dim:#8a78a8;
  }
  *{ box-sizing: border-box; margin: 0; padding: 0; }
  html, body{
    background: var(--void);
    color: var(--text);
    overflow: hidden;
    height: 100vh;
  }
  body{
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(255,46,154,0.20), transparent 70%),
      radial-gradient(ellipse 60% 40% at 20% 60%, rgba(102,245,255,0.12), transparent 70%),
      radial-gradient(ellipse 70% 50% at 80% 70%, rgba(184,112,255,0.14), transparent 70%),
      radial-gradient(ellipse 90% 80% at 50% 100%, rgba(255,126,58,0.10), transparent 80%),
      linear-gradient(180deg, var(--void) 0%, var(--void-2) 50%, var(--void) 100%);
    display: flex; flex-direction: column;
  }
  /* Animated rainy synthwave grid behind everything */
  body::before{
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,46,154,0.18) 1px, transparent 1px),
      linear-gradient(90deg, rgba(102,245,255,0.10) 1px, transparent 1px);
    background-size: 70px 70px;
    transform: perspective(420px) rotateX(60deg) translateY(20vh);
    transform-origin: bottom;
    opacity: 0.5;
    pointer-events: none;
    z-index: 0;
  }
  body::after{
    /* scanlines + faint static */
    content: '';
    position: fixed; inset: 0;
    background:
      repeating-linear-gradient(0deg,
        transparent 0 2px,
        rgba(0,0,0,0.18) 2px 3px);
    pointer-events: none;
    z-index: 4;
    mix-blend-mode: multiply;
  }

  /* Header — billboard "marquee, since 1987" plate */
  header{
    position: relative; z-index: 2;
    padding: 18px 28px 8px;
    text-align: center;
  }
  header h1{
    font-family: 'Monoton', 'VT323', monospace;
    font-size: clamp(36px, 6vw, 56px);
    color: var(--glow-p);
    letter-spacing: 0.08em;
    line-height: 1;
    text-shadow:
      0 0 4px var(--glow-p),
      0 0 12px var(--glow-p),
      0 0 28px rgba(255,46,154,0.6),
      0 0 60px rgba(255,46,154,0.3);
    animation: titleFlicker 6s steps(1, end) infinite;
  }
  header h1 .c{
    color: var(--glow-c);
    text-shadow:
      0 0 4px var(--glow-c),
      0 0 12px var(--glow-c),
      0 0 28px rgba(102,245,255,0.6);
  }
  @keyframes titleFlicker{
    0%, 92%, 100%{ opacity: 1; }
    93%, 94%      { opacity: 0.55; }
    95%, 96%      { opacity: 1; }
    97%           { opacity: 0.45; }
  }
  header .plate{
    margin-top: 6px;
    display: inline-flex; align-items: center; gap: 12px;
    font: 11px 'JetBrains Mono', monospace;
    color: var(--text-dim);
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  header .plate .live{
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--glow-g);
  }
  header .plate .live .dot{
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--glow-g);
    box-shadow: 0 0 8px var(--glow-g);
    animation: livePulse 1.4s ease-in-out infinite;
  }
  @keyframes livePulse{ 50%{ opacity: 0.3; } }
  header .plate.offline .live{ color: var(--glow-o); }
  header .plate.offline .live .dot{ background: var(--glow-o); box-shadow: 0 0 8px var(--glow-o); animation: none; }
  header .plate b{ color: var(--text); }

  /* Billboard frame — the actual scrolling marquee container */
  .billboard{
    position: relative; z-index: 2;
    margin: 14px auto 0;
    width: calc(100vw - 56px);
    max-width: 1480px;
    flex: 1;
    min-height: 320px;
    border: 4px solid var(--frame-2);
    border-radius: 6px;
    background:
      linear-gradient(180deg, #050010 0%, #0a0218 100%);
    box-shadow:
      inset 0 0 60px rgba(255,46,154,0.25),
      inset 0 0 0 1px rgba(255,46,154,0.3),
      0 0 80px rgba(255,46,154,0.3),
      0 0 0 8px var(--frame),
      0 0 0 9px var(--frame-2),
      0 14px 0 -2px rgba(0,0,0,0.6);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  /* Bolts in the corners */
  .billboard::before, .billboard::after{
    content: '';
    position: absolute;
    width: 10px; height: 10px;
    background: radial-gradient(circle at 30% 30%, #888 0%, #444 60%, #1a1a1a 100%);
    border-radius: 50%;
    box-shadow: 0 0 3px rgba(0,0,0,0.8);
  }
  .billboard::before{ top: 8px;    left: 8px; }
  .billboard::after { bottom: 8px; right: 8px; }
  .bolt{ position: absolute; width: 10px; height: 10px;
    background: radial-gradient(circle at 30% 30%, #888 0%, #444 60%, #1a1a1a 100%);
    border-radius: 50%; box-shadow: 0 0 3px rgba(0,0,0,0.8); z-index: 5; }
  .bolt.tr{ top: 8px; right: 8px; }
  .bolt.bl{ bottom: 8px; left: 8px; }

  /* Marquee lanes */
  .lanes{
    flex: 1;
    display: flex; flex-direction: column;
    position: relative;
    overflow: hidden;
    /* dot-matrix overlay applied via mask later */
  }
  .lane{
    flex: 1;
    position: relative;
    overflow: hidden;
    border-bottom: 1px dashed rgba(255,46,154,0.18);
  }
  .lane:last-child{ border-bottom: none; }
  .lane-bg{
    position: absolute; inset: 0;
    background:
      radial-gradient(ellipse 100% 50% at 50% 50%, rgba(255,46,154,0.03), transparent 70%);
  }
  /* LED dot-matrix overlay over the entire billboard */
  .lanes::after{
    content: '';
    position: absolute; inset: 0;
    background-image: radial-gradient(circle at 50% 50%, rgba(0,0,0,0.45) 0.7px, transparent 1.4px);
    background-size: 4px 4px;
    pointer-events: none;
    mix-blend-mode: multiply;
    z-index: 3;
  }
  /* The scrolling messages live as positioned divs */
  .ticker{
    position: absolute;
    white-space: nowrap;
    font-family: 'VT323', 'Press Start 2P', monospace;
    font-size: 56px;
    line-height: 1;
    letter-spacing: 0.04em;
    top: 50%;
    transform: translateY(-50%);
    will-change: transform;
    pointer-events: auto;
    cursor: default;
    text-shadow:
      0 0 4px currentColor,
      0 0 12px currentColor,
      0 0 28px currentColor;
  }
  .ticker .meta{
    font-size: 0.36em;
    color: rgba(255,255,255,0.55);
    margin-left: 14px;
    text-shadow: none;
    letter-spacing: 0.1em;
    font-family: 'JetBrains Mono', monospace;
    vertical-align: middle;
  }
  .ticker.mine{
    text-shadow:
      0 0 4px currentColor,
      0 0 12px currentColor,
      0 0 28px currentColor,
      0 0 60px currentColor;
  }
  .ticker.mine::after{
    content: ' ★';
    color: var(--glow-y);
    font-size: 0.7em;
    margin-left: 8px;
  }
  /* Empty-lane idle text */
  .lane-idle{
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.10);
    font-family: 'VT323', monospace;
    font-size: 38px;
    letter-spacing: 0.18em;
    pointer-events: none;
    transition: opacity 0.4s;
  }
  .lane-idle.hide{ opacity: 0; }

  /* Compose form */
  .compose{
    position: relative; z-index: 2;
    margin: 14px auto 18px;
    width: calc(100vw - 56px);
    max-width: 1480px;
    background: rgba(20, 8, 38, 0.85);
    backdrop-filter: blur(10px);
    border: 1px solid var(--frame-2);
    border-radius: 6px;
    padding: 14px 18px;
    display: flex; gap: 12px; align-items: center;
    box-shadow:
      0 -6px 24px rgba(255,46,154,0.18),
      inset 0 1px 0 rgba(255,255,255,0.05);
    flex-wrap: wrap;
  }
  .compose .swatches{ display: flex; gap: 4px; flex-shrink: 0; }
  .compose .swatch{
    width: 24px; height: 24px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 80ms, border-color 80ms;
  }
  .compose .swatch:hover{ transform: scale(1.1); }
  .compose .swatch.selected{
    border-color: rgba(255,255,255,0.85);
    transform: scale(1.15);
  }
  .compose input[type=text]{
    flex: 1; min-width: 0;
    background: rgba(0,0,0,0.4);
    border: 1px solid var(--frame-2);
    border-radius: 4px;
    padding: 11px 14px;
    color: var(--text);
    font-family: 'VT323', monospace;
    font-size: 22px;
    letter-spacing: 0.04em;
    outline: none;
    caret-color: var(--glow-p);
    transition: border-color 0.15s, box-shadow 0.15s;
  }
  .compose input[type=text]:focus{
    border-color: var(--glow-p);
    box-shadow: 0 0 0 3px rgba(255,46,154,0.25);
  }
  .compose input[type=text]::placeholder{ color: var(--text-dim); }
  .compose .count{
    font: 11px 'JetBrains Mono', monospace;
    color: var(--text-dim);
    min-width: 48px;
    text-align: right;
  }
  .compose .count.warn{ color: var(--glow-o); }
  .compose .count.full{ color: var(--glow-p); }
  .compose button.send{
    background: var(--glow-p);
    border: 2px solid #fff;
    color: #fff;
    font-family: 'VT323', monospace;
    font-size: 22px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 6px 22px;
    border-radius: 4px;
    cursor: pointer;
    box-shadow:
      0 0 18px rgba(255,46,154,0.6),
      0 4px 0 rgba(0,0,0,0.4);
    transition: transform 80ms, box-shadow 80ms;
  }
  .compose button.send:hover{ transform: translateY(-1px); box-shadow: 0 0 24px rgba(255,46,154,0.8), 0 5px 0 rgba(0,0,0,0.4); }
  .compose button.send:active{ transform: translateY(2px); box-shadow: 0 0 12px rgba(255,46,154,0.5), 0 2px 0 rgba(0,0,0,0.4); }
  .compose button.send:disabled{
    opacity: 0.4; cursor: not-allowed;
    box-shadow: none; transform: none;
  }
  .compose .author-input{
    background: rgba(0,0,0,0.4);
    border: 1px solid rgba(184,112,255,0.4);
    border-radius: 4px;
    padding: 6px 10px;
    color: var(--glow-v);
    font: 11px 'JetBrains Mono', monospace;
    width: 110px;
    outline: none;
  }
  .compose .author-input:focus{
    border-color: var(--glow-v);
    box-shadow: 0 0 0 2px rgba(184,112,255,0.25);
  }
  .compose .author-input::placeholder{ color: var(--text-dim); }

  /* Toast / status */
  #toast{
    position: fixed;
    top: 18px; right: 18px;
    background: rgba(20, 8, 38, 0.92);
    backdrop-filter: blur(6px);
    border: 1px solid var(--glow-g);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 4px;
    font: 12px 'JetBrains Mono', monospace;
    box-shadow: 0 4px 18px rgba(125,255,213,0.3);
    z-index: 10;
    transform: translateX(420px);
    transition: transform 0.32s cubic-bezier(0.2,0.7,0.1,1.1);
    pointer-events: none;
  }
  #toast.show{ transform: translateX(0); }
  #toast.warn{ border-color: var(--glow-o); box-shadow: 0 4px 18px rgba(255,126,58,0.3); color: var(--glow-o); }
  #toast.err { border-color: var(--glow-p); box-shadow: 0 4px 18px rgba(255,46,154,0.3); color: var(--glow-p); }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce){
    header h1{ animation: none; }
    header .plate .live .dot{ animation: none; }
    body::before{ display: none; }
  }
  /* Mobile */
  @media (max-width: 640px){
    .billboard, .compose{ width: calc(100vw - 16px); }
    .compose{ padding: 12px; gap: 8px; }
    .compose .author-input{ width: 80px; }
    .ticker{ font-size: 40px; }
    header h1{ font-size: 32px; }
  }
  /* Focus */
  button:focus-visible, input:focus-visible, .swatch:focus-visible{
    outline: 2px solid var(--glow-c); outline-offset: 2px;
  }
</style>
</head>
<body>

<header>
  <h1>NEON <span class="c">MARQUEE</span></h1>
  <div class="plate" id="status-plate">
    <span class="live"><span class="dot"></span><span id="status-text">CONNECTING…</span></span>
    <span>·</span>
    <span><b id="viewer-count">1</b> viewer<span id="vp">s</span></span>
    <span>·</span>
    <span><b id="msg-count">0</b> scrolling</span>
  </div>
</header>

<div class="billboard" aria-label="Scrolling message billboard">
  <span class="bolt tr"></span>
  <span class="bolt bl"></span>
  <div class="lanes" id="lanes">
    <div class="lane" data-lane="0"><div class="lane-bg"></div><div class="lane-idle" id="idle-0">… AWAITING TRANSMISSIONS …</div></div>
    <div class="lane" data-lane="1"><div class="lane-bg"></div><div class="lane-idle" id="idle-1">… TYPE BELOW TO BROADCAST …</div></div>
    <div class="lane" data-lane="2"><div class="lane-bg"></div><div class="lane-idle" id="idle-2">… EVERYONE SEES YOUR MESSAGE …</div></div>
  </div>
</div>

<form class="compose" id="compose" autocomplete="off">
  <div class="swatches" id="swatches" aria-label="Choose message color"></div>
  <input type="text" id="msg-text" placeholder="type a message · everyone sees it scroll"
         maxlength="180" aria-label="Message" required>
  <span class="count" id="char-count">180</span>
  <input type="text" id="author-input" class="author-input" placeholder="handle"
         maxlength="20" aria-label="Your handle">
  <button type="submit" class="send" id="btn-send">⏵ Broadcast</button>
</form>

<div id="toast" role="status" aria-live="polite"></div>

<script type="module">
import supabase from '/supabase-config-fixed.js';

/* ── Constants ───────────────────────────────────────────────── */
const COLORS = [
  { name: 'magenta', hex: '#ff2e9a', css: 'var(--glow-p)' },
  { name: 'cyan',    hex: '#66f5ff', css: 'var(--glow-c)' },
  { name: 'yellow',  hex: '#ffd24a', css: 'var(--glow-y)' },
  { name: 'mint',    hex: '#7dffd5', css: 'var(--glow-g)' },
  { name: 'violet',  hex: '#b870ff', css: 'var(--glow-v)' },
  { name: 'orange',  hex: '#ff7e3a', css: 'var(--glow-o)' },
];
const LANES = 3;
const MAX_LIVE_TICKERS = 24; // safety cap

/* ── Persistent identity ─────────────────────────────────────── */
const myColor = (function(){
  const c = localStorage.getItem('marquee-color');
  if (c && COLORS.find(x => x.hex === c)) return c;
  return COLORS[Math.floor(Math.random() * COLORS.length)].hex;
})();
let myAuthor = localStorage.getItem('marquee-author') || '';
const MY_ID = 'm-' + Math.random().toString(36).slice(2, 10);

/* ── Build color swatches ────────────────────────────────────── */
(function buildSwatches(){
  const el = document.getElementById('swatches');
  el.innerHTML = COLORS.map(c =>
    '<button type="button" class="swatch' + (c.hex === myColor ? ' selected' : '') + '" '
    + 'data-color="' + c.hex + '" '
    + 'aria-label="' + c.name + '" title="' + c.name + '" '
    + 'style="background:' + c.hex + '; box-shadow: 0 0 12px ' + c.hex + ';"></button>'
  ).join('');
  el.querySelectorAll('.swatch').forEach(s => {
    s.addEventListener('click', () => {
      el.querySelectorAll('.swatch').forEach(x => x.classList.remove('selected'));
      s.classList.add('selected');
      currentColor = s.dataset.color;
      localStorage.setItem('marquee-color', currentColor);
    });
  });
})();
let currentColor = myColor;

/* ── Author field ────────────────────────────────────────────── */
const authorInput = document.getElementById('author-input');
authorInput.value = myAuthor;
authorInput.addEventListener('input', () => {
  myAuthor = authorInput.value.trim().slice(0, 20);
  localStorage.setItem('marquee-author', myAuthor);
});

/* ── Char count ──────────────────────────────────────────────── */
const msgInput = document.getElementById('msg-text');
const charCount = document.getElementById('char-count');
msgInput.addEventListener('input', () => {
  const remaining = 180 - msgInput.value.length;
  charCount.textContent = remaining;
  charCount.className = 'count' + (remaining < 30 ? ' warn' : '') + (remaining <= 0 ? ' full' : '');
});

/* ── Status pill ─────────────────────────────────────────────── */
function setStatus(state){
  const plate = document.getElementById('status-plate');
  const txt = document.getElementById('status-text');
  plate.classList.remove('offline');
  if (state === 'live'){ txt.textContent = 'LIVE · ON AIR'; }
  else if (state === 'connecting'){ txt.textContent = 'CONNECTING…'; }
  else { txt.textContent = 'OFFLINE'; plate.classList.add('offline'); }
}
function toast(msg, kind, ms){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = kind || '';
  t.classList.add('show');
  if (toast._timer) clearTimeout(toast._timer);
  toast._timer = setTimeout(() => t.classList.remove('show'), ms || 2400);
}

/* ── Marquee lane manager ────────────────────────────────────── */
// Each lane keeps track of the "front" of its scroll — the X position of the
// rightmost ticker currently in the lane. A new message slots into the lane
// whose front has retreated furthest left (= most room on the right edge).
const laneState = []; // { el, rightEdge, idleEl }
let activeTickerCount = 0;
function initLanes(){
  const lanesParent = document.getElementById('lanes');
  const laneDivs = lanesParent.querySelectorAll('.lane');
  laneDivs.forEach((el, i) => {
    laneState.push({
      el,
      idleEl: document.getElementById('idle-' + i),
      rightEdge: -Infinity, // no ticker yet
    });
  });
}
function pickLane(){
  // pick the lane with the smallest rightEdge (= most empty on the right)
  let best = 0, bestEdge = Infinity;
  for (let i = 0; i < laneState.length; i++){
    if (laneState[i].rightEdge < bestEdge){
      bestEdge = laneState[i].rightEdge;
      best = i;
    }
  }
  return best;
}

function addTicker({ text, color, author, mine }){
  if (activeTickerCount >= MAX_LIVE_TICKERS){
    // drop oldest — but in practice tickers self-cleanup; skip silently
    return;
  }
  const laneIdx = pickLane();
  const lane = laneState[laneIdx];
  lane.idleEl.classList.add('hide');

  const div = document.createElement('div');
  div.className = 'ticker' + (mine ? ' mine' : '');
  div.style.color = color || '#fff';
  const authorPart = author ? '<span class="meta">— ' + escapeHtml(author) + '</span>' : '';
  div.innerHTML = escapeHtml(text) + authorPart;

  // place off-screen right
  const laneRect = lane.el.getBoundingClientRect();
  const startX = laneRect.width + 20;
  div.style.left = '0';
  div.style.transform = 'translate(' + startX + 'px, -50%)';
  lane.el.appendChild(div);

  // measure width AFTER insertion so we know how far to travel
  const tickerWidth = div.getBoundingClientRect().width;
  const endX = -tickerWidth - 40;

  // speed: based on text length, with some variation
  const baseSpeed = 110; // px/sec
  const speed = baseSpeed + Math.random() * 30;
  const distance = startX - endX;
  const duration = distance / speed * 1000; // ms

  // update lane's rightEdge so the next ticker doesn't overlap
  // after this ticker fully clears the right edge, the lane is "free" again
  // We approximate: rightEdge = (startX + tickerWidth) shifted by speed*time
  // For simplicity, store the time we'll be safe to add the next ticker
  // → expressed as "current rightmost position of any ticker tail"
  // For now, just track when this ticker will have scrolled enough that
  // its right edge is at (laneRect.width - 20). That's safe spacing.
  const safeOffset = tickerWidth + 60; // tail clearance + buffer
  const timeToSafe = (safeOffset / speed) * 1000;
  // record the rightmost x for the next picker call
  lane.rightEdge = startX;
  setTimeout(() => {
    // by now the ticker has moved by `safeOffset` px, so its right edge is at startX - safeOffset
    if (lane.rightEdge === startX){ // only update if no new ticker arrived
      lane.rightEdge = startX - safeOffset;
    }
  }, timeToSafe);

  activeTickerCount++;
  updateMsgCount();

  // animate via requestAnimationFrame
  let startTime = null;
  function step(now){
    if (startTime === null) startTime = now;
    const elapsed = now - startTime;
    const progress = Math.min(1, elapsed / duration);
    const x = startX + (endX - startX) * progress;
    div.style.transform = 'translate(' + x + 'px, -50%)';
    if (progress < 1){
      requestAnimationFrame(step);
    } else {
      div.remove();
      activeTickerCount--;
      updateMsgCount();
      // if all lanes are empty, show idle text
      if (lane.el.querySelectorAll('.ticker').length === 0){
        lane.idleEl.classList.remove('hide');
        lane.rightEdge = -Infinity;
      }
    }
  }
  requestAnimationFrame(step);
}
function updateMsgCount(){
  document.getElementById('msg-count').textContent = activeTickerCount;
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

initLanes();

/* ── Initial load: fetch recent messages + seed scroll ──────── */
async function loadRecent(){
  try{
    const { data, error } = await supabase
      .from('marquee_messages')
      .select('id, text, color, author, created_at, user_id')
      .order('created_at', { ascending: false })
      .limit(15);
    if (error) throw error;
    // reverse so the oldest fetched message scrolls in first
    (data || []).reverse().forEach((m, i) => {
      // stagger so they cascade in
      setTimeout(() => addTicker({
        text: m.text,
        color: m.color || '#ff2e9a',
        author: m.author || '',
        mine: false,
      }), i * 380);
    });
  } catch(e){
    console.error('load recent failed', e);
    toast("couldn't load history · live messages still work", 'warn', 3500);
  }
}

/* ── Supabase realtime: presence + postgres_changes ─────────── */
let myUid = null;
async function setupAuth(){
  // anonymous sign-in via supabase (the fixed config returns a default client)
  try{
    const { data: { session } } = await supabase.auth.getSession();
    if (session && session.user){
      myUid = session.user.id;
      return;
    }
    const { data, error } = await supabase.auth.signInAnonymously();
    if (error) throw error;
    myUid = data?.user?.id || null;
  } catch(e){
    console.warn('anon auth failed', e);
    // continue — read-only mode for sending will fail later if no uid
  }
}

const channel = supabase.channel('neon-marquee-v1', {
  config: { presence: { key: MY_ID } },
});

channel
  .on('postgres_changes',
    { event: 'INSERT', schema: 'public', table: 'marquee_messages' },
    payload => {
      const m = payload.new;
      // skip if we just posted this ourselves (we add it locally on submit
      // before broadcast arrives, with mine=true)
      if (m.user_id && m.user_id === myUid){
        // already shown locally; skip
        return;
      }
      addTicker({
        text: m.text,
        color: m.color || '#ff2e9a',
        author: m.author || '',
        mine: false,
      });
    })
  .on('presence', { event: 'sync' }, () => {
    const presenceState = channel.presenceState();
    const n = Object.keys(presenceState).length;
    document.getElementById('viewer-count').textContent = n;
    document.getElementById('vp').textContent = (n === 1) ? '' : 's';
  })
  .subscribe(async status => {
    if (status === 'SUBSCRIBED'){
      setStatus('live');
      await channel.track({ id: MY_ID, t: Date.now() });
    } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT' || status === 'CLOSED'){
      setStatus('offline');
    }
  });

/* ── Submit handler ──────────────────────────────────────────── */
const form = document.getElementById('compose');
const btnSend = document.getElementById('btn-send');
form.addEventListener('submit', async e => {
  e.preventDefault();
  const text = msgInput.value.trim();
  if (!text) return;
  if (text.length > 180){
    toast('message too long', 'warn');
    return;
  }
  // local cooldown to discourage spam
  if (form._cooldown && Date.now() < form._cooldown){
    toast('slow down · 1 message per 2 seconds', 'warn');
    return;
  }
  form._cooldown = Date.now() + 2000;
  btnSend.disabled = true;
  msgInput.disabled = true;

  // optimistic: add to marquee locally with the "mine" flag
  addTicker({
    text, color: currentColor,
    author: myAuthor || 'anon',
    mine: true,
  });

  // ensure we have an anonymous session
  if (!myUid) await setupAuth();
  if (!myUid){
    toast("couldn't authenticate — message shown locally only", 'err', 3500);
    afterSubmit();
    return;
  }

  try{
    const { error } = await supabase
      .from('marquee_messages')
      .insert({
        text,
        color: currentColor,
        author: myAuthor || 'anon',
        user_id: myUid,
      });
    if (error) throw error;
    toast('broadcast · live', null, 1600);
  } catch(e){
    console.error('insert failed', e);
    toast("couldn't broadcast globally — message shown locally only", 'err', 3500);
  }
  afterSubmit();
});

function afterSubmit(){
  msgInput.value = '';
  charCount.textContent = '180';
  charCount.className = 'count';
  setTimeout(() => {
    btnSend.disabled = false;
    msgInput.disabled = false;
    msgInput.focus();
  }, 600);
}

/* ── Init ────────────────────────────────────────────────────── */
setStatus('connecting');
(async () => {
  await setupAuth();
  await loadRecent();
})();

</script>
