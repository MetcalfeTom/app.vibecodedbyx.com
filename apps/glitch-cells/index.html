<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Glitch Cells</title>
<link rel="icon" href="https://emojicdn.elk.sh/🔷">
<meta property="og:title" content="Glitch Cells">
<meta property="og:description" content="Neon geometric agar.io — eat, grow, glitch. Consume smaller shapes in a digital petri dish.">
<meta property="og:url" content="https://app.sloppy.live/glitch-cells/">
<meta property="og:image" content="https://emojicdn.elk.sh/🔷?style=google">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#04060c;overflow:hidden;touch-action:none;cursor:none}
canvas{display:block;position:fixed;top:0;left:0}
#hud{
  position:fixed;top:10px;left:50%;transform:translateX(-50%);
  font-family:'Orbitron',monospace;font-size:0.6rem;color:rgba(0,232,255,0.5);
  text-align:center;pointer-events:none;z-index:2;letter-spacing:0.1em;
}
#hud .mass{font-size:1rem;font-weight:900;color:rgba(0,232,255,0.7)}
#leader{
  position:fixed;top:10px;right:10px;
  font-family:'Share Tech Mono',monospace;font-size:0.5rem;
  color:rgba(0,232,255,0.3);pointer-events:none;z-index:2;
  text-align:right;line-height:1.8;
}
#start-screen{
  position:fixed;top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(4,6,12,0.95);z-index:10;text-align:center;
}
#start-screen.hidden{display:none}
#start-screen h1{
  font-family:'Orbitron',monospace;font-size:clamp(1.5rem,5vw,2.5rem);
  font-weight:900;margin-bottom:10px;
  background:linear-gradient(135deg,#00e8ff,#ff00aa,#00ff88);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
#start-screen p{font-family:'Share Tech Mono',monospace;font-size:0.6rem;color:#445;margin-bottom:14px;line-height:1.8}
#name-input{
  padding:10px 16px;border:1px solid #1a2040;border-radius:6px;
  background:#0c1018;color:#00e8ff;font-family:'Share Tech Mono',monospace;
  font-size:0.8rem;outline:none;text-align:center;width:200px;margin-bottom:10px;
}
#name-input:focus{border-color:#00e8ff}
#name-input::placeholder{color:#334}
.play-btn{
  padding:12px 28px;border:2px solid #00e8ff;border-radius:6px;
  background:transparent;color:#00e8ff;font-family:'Orbitron',monospace;
  font-size:0.65rem;font-weight:700;cursor:pointer;transition:all 0.2s;
}
.play-btn:hover{background:#00e8ff;color:#04060c}
#back{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);z-index:2}
#back a{color:#223;text-decoration:none;font-family:'Share Tech Mono',monospace;font-size:0.45rem}
#back a:hover{color:#00e8ff}
</style>
</head>
<body>

<div id="hud">
  <div class="mass" id="h-mass">0</div>
  <div id="h-label">MASS</div>
</div>
<div id="leader"></div>

<canvas id="c"></canvas>

<div id="start-screen">
  <h1>GLITCH CELLS</h1>
  <p>Move mouse to navigate. Eat smaller shapes to grow.<br>Avoid bigger cells or get consumed.</p>
  <input id="name-input" placeholder="Enter name..." maxlength="12">
  <br>
  <button class="play-btn" onclick="startGame()">ENTER PETRI DISH</button>
</div>

<div id="back"><a href="https://sloppy.live">sloppy.live</a></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// World
const WORLD = 4000;
const FOOD_COUNT = 300;
const BOT_COUNT = 12;
const SHAPES = ['triangle','square','pentagon','hexagon','diamond','star'];
const NEON_COLORS = [
  {h:185,s:100,l:50},{h:320,s:100,l:50},{h:150,s:100,l:50},
  {h:40,s:100,l:50},{h:270,s:80,l:60},{h:0,s:100,l:55},
  {h:60,s:100,l:50},{h:210,s:100,l:55}
];

let state = 'menu';
let camera = {x:0,y:0,zoom:1};
let player = null;
let food = [];
let bots = [];
let glitchEffects = [];
let mouseX = W/2, mouseY = H/2;
let frame = 0;

function rColor() { return NEON_COLORS[Math.floor(Math.random()*NEON_COLORS.length)]; }
function rShape() { return SHAPES[Math.floor(Math.random()*SHAPES.length)]; }
function massToRadius(mass) { return Math.sqrt(mass) * 3; }

function createCell(x, y, mass, name, isPlayer) {
  return {
    x, y, mass, name, isPlayer,
    vx: 0, vy: 0,
    shape: rShape(),
    color: rColor(),
    rotation: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.02,
    glitchTimer: 0,
    glitchIntensity: 0,
    alive: true,
    trail: []
  };
}

function createFood(x, y) {
  return {
    x: x ?? Math.random() * WORLD,
    y: y ?? Math.random() * WORLD,
    mass: 1 + Math.random() * 2,
    shape: rShape(),
    color: rColor(),
    rotation: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.04,
    pulse: Math.random() * Math.PI * 2
  };
}

function initWorld() {
  food = [];
  for (let i = 0; i < FOOD_COUNT; i++) food.push(createFood());
  bots = [];
  for (let i = 0; i < BOT_COUNT; i++) {
    const names = ['VIRUS','N0DE','PROXY','CIPHER','DAEMON','KERNEL','MALLOC','STACK','HEAP','THREAD','MUTEX','SIGINT'];
    bots.push(createCell(
      200 + Math.random() * (WORLD - 400),
      200 + Math.random() * (WORLD - 400),
      15 + Math.random() * 40,
      names[i],
      false
    ));
  }
}

window.startGame = function() {
  const name = document.getElementById('name-input').value.trim() || 'ANON';
  player = createCell(WORLD/2, WORLD/2, 80, name.toUpperCase(), true);
  initWorld();
  state = 'playing';
  document.getElementById('start-screen').classList.add('hidden');
};

function drawShape(x, y, radius, shape, rotation, color, glitchAmt) {
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rotation);

  const col = `hsl(${color.h},${color.s}%,${color.l}%)`;
  const glow = `hsla(${color.h},${color.s}%,${color.l}%,0.3)`;

  // Glitch offset
  let gx = 0, gy = 0;
  if (glitchAmt > 0) {
    gx = (Math.random() - 0.5) * glitchAmt * 8;
    gy = (Math.random() - 0.5) * glitchAmt * 8;
    // RGB split
    ctx.globalAlpha = 0.3;
    ctx.translate(gx * 2, gy * 0.5);
    drawShapePath(radius, shape);
    ctx.fillStyle = `hsla(${(color.h + 120) % 360},100%,50%,0.2)`;
    ctx.fill();
    ctx.translate(-gx * 4, gy);
    drawShapePath(radius, shape);
    ctx.fillStyle = `hsla(${(color.h + 240) % 360},100%,50%,0.2)`;
    ctx.fill();
    ctx.translate(gx * 2, -gy * 1.5);
    ctx.globalAlpha = 1;
  }

  // Glow
  ctx.shadowColor = col;
  ctx.shadowBlur = 8 + radius * 0.3;

  // Fill
  drawShapePath(radius, shape);
  ctx.fillStyle = `hsla(${color.h},${color.s}%,${color.l}%,0.15)`;
  ctx.fill();
  ctx.strokeStyle = col;
  ctx.lineWidth = 1.5 + radius * 0.03;
  ctx.stroke();

  // Inner wireframe
  if (radius > 12) {
    drawShapePath(radius * 0.6, shape);
    ctx.strokeStyle = `hsla(${color.h},${color.s}%,${color.l}%,0.15)`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // Scanline glitch
  if (glitchAmt > 0.3) {
    const lines = Math.floor(glitchAmt * 5);
    for (let i = 0; i < lines; i++) {
      const ly = -radius + Math.random() * radius * 2;
      ctx.fillStyle = `hsla(${color.h},100%,80%,${glitchAmt * 0.3})`;
      ctx.fillRect(-radius - 3, ly, radius * 2 + 6, 1 + Math.random());
    }
  }

  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawShapePath(r, shape) {
  ctx.beginPath();
  let sides;
  switch(shape) {
    case 'triangle': sides = 3; break;
    case 'square': sides = 4; break;
    case 'pentagon': sides = 5; break;
    case 'hexagon': sides = 6; break;
    case 'diamond':
      ctx.moveTo(0, -r);
      ctx.lineTo(r * 0.6, 0);
      ctx.lineTo(0, r);
      ctx.lineTo(-r * 0.6, 0);
      ctx.closePath();
      return;
    case 'star':
      for (let i = 0; i < 10; i++) {
        const a = (i / 10) * Math.PI * 2 - Math.PI / 2;
        const sr = i % 2 === 0 ? r : r * 0.5;
        ctx.lineTo(Math.cos(a) * sr, Math.sin(a) * sr);
      }
      ctx.closePath();
      return;
    default: sides = 6;
  }
  for (let i = 0; i < sides; i++) {
    const a = (i / sides) * Math.PI * 2 - Math.PI / 2;
    ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
  }
  ctx.closePath();
}

function updateBot(bot) {
  if (!bot.alive) return;

  // Find nearest food or smaller cell to chase
  let targetX = WORLD/2, targetY = WORLD/2;
  let bestDist = Infinity;

  // Chase food
  food.forEach(f => {
    const d = Math.hypot(f.x - bot.x, f.y - bot.y);
    if (d < bestDist && d < 400) { bestDist = d; targetX = f.x; targetY = f.y; }
  });

  // Chase smaller bots/player
  const allCells = [...bots.filter(b => b !== bot && b.alive), player].filter(Boolean);
  allCells.forEach(c => {
    if (!c.alive) return;
    if (c.mass < bot.mass * 0.8) {
      const d = Math.hypot(c.x - bot.x, c.y - bot.y);
      if (d < 300 && d < bestDist) { bestDist = d; targetX = c.x; targetY = c.y; }
    }
    // Flee from bigger
    if (c.mass > bot.mass * 1.2) {
      const d = Math.hypot(c.x - bot.x, c.y - bot.y);
      if (d < 250) { targetX = bot.x - (c.x - bot.x); targetY = bot.y - (c.y - bot.y); }
    }
  });

  const dx = targetX - bot.x, dy = targetY - bot.y;
  const d = Math.hypot(dx, dy);
  if (d > 1) {
    const speed = Math.max(1, 4 - bot.mass * 0.015);
    bot.vx += (dx / d) * speed * 0.05;
    bot.vy += (dy / d) * speed * 0.05;
  }

  bot.vx *= 0.95;
  bot.vy *= 0.95;
  bot.x += bot.vx;
  bot.y += bot.vy;
  bot.x = Math.max(0, Math.min(WORLD, bot.x));
  bot.y = Math.max(0, Math.min(WORLD, bot.y));
  bot.rotation += bot.rotSpeed;

  if (bot.glitchTimer > 0) {
    bot.glitchIntensity *= 0.92;
    bot.glitchTimer--;
  }
}

function checkEat(a, b) {
  if (!a.alive || !b.alive) return false;
  const ar = massToRadius(a.mass), br = massToRadius(b.mass);
  const d = Math.hypot(a.x - b.x, a.y - b.y);
  if (d < ar && a.mass > b.mass * 1.15) {
    a.mass += b.mass * 0.8;
    b.alive = false;
    a.glitchTimer = 15;
    a.glitchIntensity = 1;
    // Glitch screen effect if player eating
    if (a.isPlayer) glitchEffects.push({ timer: 8, intensity: 0.5 + b.mass * 0.02 });
    return true;
  }
  return false;
}

function update() {
  if (state !== 'playing' || !player || !player.alive) return;
  frame++;

  // Player movement toward mouse
  const worldMouseX = (mouseX - W/2) / camera.zoom + camera.x;
  const worldMouseY = (mouseY - H/2) / camera.zoom + camera.y;
  const dx = worldMouseX - player.x, dy = worldMouseY - player.y;
  const d = Math.hypot(dx, dy);
  if (d > 5) {
    const speed = Math.max(1.5, 5 - player.mass * 0.01);
    player.vx += (dx / d) * speed * 0.08;
    player.vy += (dy / d) * speed * 0.08;
  }
  player.vx *= 0.92;
  player.vy *= 0.92;
  player.x += player.vx;
  player.y += player.vy;
  player.x = Math.max(0, Math.min(WORLD, player.x));
  player.y = Math.max(0, Math.min(WORLD, player.y));
  player.rotation += player.rotSpeed;

  if (player.glitchTimer > 0) { player.glitchIntensity *= 0.92; player.glitchTimer--; }

  // Camera
  camera.x += (player.x - camera.x) * 0.08;
  camera.y += (player.y - camera.y) * 0.08;
  const targetZoom = Math.max(0.3, 1 - player.mass * 0.002);
  camera.zoom += (targetZoom - camera.zoom) * 0.05;

  // Bots
  bots.forEach(updateBot);

  // Eating: player vs food
  food = food.filter(f => {
    const pr = massToRadius(player.mass);
    const fd = Math.hypot(f.x - player.x, f.y - player.y);
    if (fd < pr) {
      player.mass += f.mass * 0.5;
      player.glitchTimer = 6;
      player.glitchIntensity = Math.min(1, player.glitchIntensity + 0.3);
      return false;
    }
    // Bots eat food too
    for (const bot of bots) {
      if (!bot.alive) continue;
      const br = massToRadius(bot.mass);
      if (Math.hypot(f.x - bot.x, f.y - bot.y) < br) {
        bot.mass += f.mass * 0.5;
        bot.glitchTimer = 6;
        bot.glitchIntensity = Math.min(1, bot.glitchIntensity + 0.3);
        return false;
      }
    }
    return true;
  });

  // Eating: cells vs cells
  const allCells = [player, ...bots.filter(b => b.alive)];
  for (let i = 0; i < allCells.length; i++) {
    for (let j = i + 1; j < allCells.length; j++) {
      if (allCells[i].mass > allCells[j].mass) checkEat(allCells[i], allCells[j]);
      else checkEat(allCells[j], allCells[i]);
    }
  }

  // Player death
  if (!player.alive) {
    state = 'dead';
    setTimeout(() => {
      document.getElementById('start-screen').classList.remove('hidden');
      state = 'menu';
    }, 1500);
  }

  // Respawn food
  while (food.length < FOOD_COUNT) food.push(createFood());

  // Respawn dead bots
  bots.forEach((b, i) => {
    if (!b.alive && Math.random() < 0.005) {
      const names = ['VIRUS','N0DE','PROXY','CIPHER','DAEMON','KERNEL','MALLOC','STACK','HEAP','THREAD','MUTEX','SIGINT'];
      bots[i] = createCell(Math.random() * WORLD, Math.random() * WORLD, 15 + Math.random() * 30, names[i], false);
    }
  });

  // Slow mass decay
  if (player.mass > 25 && frame % 120 === 0) player.mass *= 0.995;
  bots.forEach(b => { if (b.alive && b.mass > 25 && frame % 120 === 0) b.mass *= 0.995; });

  // Glitch effects
  glitchEffects = glitchEffects.filter(g => { g.timer--; g.intensity *= 0.9; return g.timer > 0; });

  // HUD
  if (frame % 5 === 0) {
    document.getElementById('h-mass').textContent = Math.floor(player.mass);
  }
}

function draw() {
  ctx.fillStyle = '#04060c';
  ctx.fillRect(0, 0, W, H);

  ctx.save();
  ctx.translate(W/2, H/2);
  ctx.scale(camera.zoom, camera.zoom);
  ctx.translate(-camera.x, -camera.y);

  // World border
  ctx.strokeStyle = 'rgba(0,232,255,0.06)';
  ctx.lineWidth = 2;
  ctx.strokeRect(0, 0, WORLD, WORLD);

  // Grid
  ctx.strokeStyle = 'rgba(0,232,255,0.015)';
  ctx.lineWidth = 0.5;
  const gs = 100;
  const vl = Math.floor((camera.x - W/2/camera.zoom) / gs) * gs;
  const vr = camera.x + W/2/camera.zoom;
  const vt = Math.floor((camera.y - H/2/camera.zoom) / gs) * gs;
  const vb = camera.y + H/2/camera.zoom;
  for (let x = vl; x <= vr; x += gs) { ctx.beginPath(); ctx.moveTo(x, vt); ctx.lineTo(x, vb); ctx.stroke(); }
  for (let y = vt; y <= vb; y += gs) { ctx.beginPath(); ctx.moveTo(vl, y); ctx.lineTo(vr, y); ctx.stroke(); }

  // Food
  food.forEach(f => {
    f.rotation += f.rotSpeed;
    f.pulse += 0.03;
    const r = massToRadius(f.mass) * (0.9 + Math.sin(f.pulse) * 0.1);
    drawShape(f.x, f.y, r, f.shape, f.rotation, f.color, 0);
  });

  // Cells (sort by mass for depth)
  const allCells = [player, ...bots].filter(c => c && c.alive);
  allCells.sort((a, b) => a.mass - b.mass);

  allCells.forEach(c => {
    const r = massToRadius(c.mass);
    drawShape(c.x, c.y, r, c.shape, c.rotation, c.color, c.glitchIntensity);

    // Name
    ctx.fillStyle = `hsla(${c.color.h},${c.color.s}%,${c.color.l + 20}%,0.7)`;
    ctx.font = `700 ${Math.max(8, r * 0.35)}px "Orbitron"`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(c.name, c.x, c.y);

    // Mass number below
    ctx.fillStyle = `hsla(${c.color.h},${c.color.s}%,${c.color.l}%,0.35)`;
    ctx.font = `400 ${Math.max(6, r * 0.2)}px "Share Tech Mono"`;
    ctx.fillText(Math.floor(c.mass), c.x, c.y + r * 0.4);
  });

  ctx.restore();

  // Screen glitch overlay
  if (glitchEffects.length > 0) {
    const totalGlitch = glitchEffects.reduce((s, g) => s + g.intensity, 0);
    if (totalGlitch > 0.1) {
      // Scanlines
      ctx.fillStyle = `rgba(0,232,255,${totalGlitch * 0.03})`;
      for (let i = 0; i < totalGlitch * 8; i++) {
        const y = Math.random() * H;
        ctx.fillRect(0, y, W, 1 + Math.random() * 2);
      }
      // Block glitch
      for (let i = 0; i < totalGlitch * 3; i++) {
        const bx = Math.random() * W, by = Math.random() * H;
        const bw = 20 + Math.random() * 60, bh = 2 + Math.random() * 8;
        ctx.fillStyle = `hsla(${Math.random() * 360},100%,50%,${totalGlitch * 0.1})`;
        ctx.fillRect(bx, by, bw, bh);
      }
    }
  }

  // Death message
  if (state === 'dead') {
    ctx.fillStyle = 'rgba(4,6,12,0.7)';
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#ff0044';
    ctx.font = '900 28px "Orbitron"';
    ctx.textAlign = 'center';
    ctx.fillText('CONSUMED', W/2, H/2);
    ctx.fillStyle = '#445';
    ctx.font = '400 12px "Share Tech Mono"';
    ctx.fillText('Final mass: ' + Math.floor(player?.mass || 0), W/2, H/2 + 30);
  }

  // Leaderboard
  if (state === 'playing' && frame % 30 === 0) {
    const all = [player, ...bots].filter(c => c && c.alive).sort((a, b) => b.mass - a.mass);
    document.getElementById('leader').innerHTML = '<span style="color:rgba(0,232,255,0.4)">LEADERBOARD</span><br>' +
      all.slice(0, 6).map((c, i) =>
        `<span style="color:hsla(${c.color.h},${c.color.s}%,${c.color.l}%,${c.isPlayer ? 0.7 : 0.3})">${i+1}. ${c.name} ${Math.floor(c.mass)}</span>`
      ).join('<br>');
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Input
document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
document.addEventListener('touchmove', e => {
  e.preventDefault();
  mouseX = e.touches[0].clientX;
  mouseY = e.touches[0].clientY;
}, { passive: false });
document.addEventListener('touchstart', e => {
  mouseX = e.touches[0].clientX;
  mouseY = e.touches[0].clientY;
}, { passive: true });

document.getElementById('name-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') startGame();
});

loop();
</script>
</body>
</html>
