<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sloppyland</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8D%AD">
<meta name="description" content="Hot-seat candy board game. 2–6 players, one device. Draw sugar cards, race to the Sticky Throne.">
<meta property="og:title" content="Sloppyland">
<meta property="og:description" content="Hot-seat candy board game. 2–6 players, one device. Draw sugar cards, race to the Sticky Throne.">
<meta property="og:url" content="https://sloppy.live/sloppyland">
<meta property="og:image" content="https://sloppy.live/sloppyland/og-image.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=Chewy&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#ffeaf2;
  --ink:#3a1c48;
  --pink:#ff6fae;
  --hot:#e3298a;
  --grape:#8a4bff;
  --mint:#3ed6b0;
  --lemon:#ffd94a;
  --vanilla:#fff3d9;
  --cocoa:#6b3d2e;
  --cream:#fff8ed;
  --sticky:#3c1f14;
  --red:#ff3e4e;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg);color:var(--ink);font-family:'Fredoka',sans-serif;overflow:hidden}
body{
  background:
    radial-gradient(circle at 15% 10%, rgba(255,111,174,.35), transparent 45%),
    radial-gradient(circle at 85% 90%, rgba(138,75,255,.3), transparent 50%),
    radial-gradient(circle at 70% 20%, rgba(62,214,176,.2), transparent 50%),
    repeating-radial-gradient(circle at 20% 40%, rgba(255,217,74,.08) 0 3px, transparent 3px 12px),
    repeating-radial-gradient(circle at 70% 70%, rgba(255,111,174,.08) 0 3px, transparent 3px 14px),
    var(--bg);
}

.layout{display:grid;grid-template-columns:1fr 340px;height:100%;}
@media (max-width:900px){
  html,body{overflow:auto;height:auto;min-height:100%}
  .layout{grid-template-columns:1fr;grid-template-rows:auto auto;height:auto;min-height:100%}
}

.board-wrap{
  position:relative;display:flex;flex-direction:column;padding:12px 16px 12px 20px;min-width:0;min-height:0;
}
.header{
  display:flex;align-items:center;gap:12px;margin-bottom:10px;flex-wrap:wrap;
}
.brand{
  font-family:'Chewy',cursive;font-size:2.4rem;line-height:.9;color:var(--hot);
  text-shadow:3px 3px 0 var(--lemon), 6px 6px 0 var(--grape);letter-spacing:.01em;
  transform:rotate(-2deg);
}
.brand span{color:var(--grape);text-shadow:3px 3px 0 var(--mint), 6px 6px 0 var(--pink)}
.sub{font-family:'Space Mono',monospace;font-size:.72rem;color:var(--ink);opacity:.7;letter-spacing:.2em;text-transform:uppercase}
.sub b{color:var(--hot)}
.spacer{flex:1}
.hint{
  font-family:'Space Mono',monospace;font-size:.72rem;letter-spacing:.15em;
  color:var(--grape);background:#fff;border:2px solid var(--ink);padding:4px 10px;
  box-shadow:2px 2px 0 var(--ink);
}

.board{
  flex:1;position:relative;min-height:0;
  background:radial-gradient(ellipse at 50% 50%, #fff 0%, var(--vanilla) 100%);
  border:4px solid var(--ink);border-radius:18px;
  box-shadow:6px 6px 0 var(--ink), 0 0 60px rgba(227,41,138,.25) inset;
  overflow:hidden;
}
.board svg{width:100%;height:100%;display:block}

.zone-lbl{
  position:absolute;font-family:'Chewy',cursive;pointer-events:none;
  text-transform:uppercase;letter-spacing:.05em;opacity:.9;
  text-shadow:2px 2px 0 rgba(255,255,255,.8);
}

.sidebar{
  display:flex;flex-direction:column;gap:10px;padding:14px 14px 14px 0;
  min-height:0;overflow:hidden;
}
@media (max-width:900px){
  .sidebar{padding:0 12px 18px;overflow:visible}
  .board-wrap{padding:10px 12px 4px}
  .board{height:60vh;min-height:360px;flex:none}
  .brand{font-size:2rem}
  .players{max-height:none}
  .log{max-height:30vh}
}
.panel{
  background:#fff;border:3px solid var(--ink);border-radius:14px;
  padding:12px;box-shadow:4px 4px 0 var(--ink);
}
.panel h2{
  font-family:'Chewy',cursive;font-size:1.15rem;color:var(--hot);letter-spacing:.02em;
  margin-bottom:8px;display:flex;align-items:center;gap:6px;
}
.row{display:flex;gap:6px;align-items:center;flex-wrap:wrap}
.input, select{
  font-family:'Space Mono',monospace;font-size:.9rem;
  padding:8px 10px;border:2px solid var(--ink);border-radius:8px;background:var(--cream);
  color:var(--ink);outline:none;min-width:0;width:100%;
}
.input:focus{background:#fff;box-shadow:2px 2px 0 var(--ink)}
.btn{
  font-family:'Chewy',cursive;font-size:1rem;
  padding:9px 14px;border:2px solid var(--ink);border-radius:10px;
  background:var(--pink);color:#fff;cursor:pointer;
  box-shadow:3px 3px 0 var(--ink);transition:transform .08s, box-shadow .08s;
  letter-spacing:.02em;
}
.btn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--ink)}
.btn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}
.btn:disabled{opacity:.45;cursor:not-allowed;transform:none;box-shadow:3px 3px 0 var(--ink)}
.btn.grape{background:var(--grape)}
.btn.mint{background:var(--mint);color:var(--ink)}
.btn.lemon{background:var(--lemon);color:var(--ink)}
.btn.ghost{background:#fff;color:var(--ink)}
.btn.big{font-size:1.3rem;padding:14px 18px;width:100%}

.picker{display:flex;gap:4px;flex-wrap:wrap;margin:2px 0 6px}
.picker-label{font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:.22em;text-transform:uppercase;opacity:.6;margin-top:8px;color:var(--ink)}
@keyframes fall{
  from{transform:translate(0,0) rotate(0);opacity:1}
  to{transform:translate(var(--dx,0), var(--dy,400px)) rotate(var(--rot,720deg));opacity:0}
}
.pick{
  position:relative;width:42px;height:42px;border:2px solid var(--ink);border-radius:10px;
  background:#fff;font-size:1.2rem;display:grid;place-items:center;cursor:pointer;
  box-shadow:2px 2px 0 var(--ink);transition:transform .08s;overflow:hidden;padding:0;
}
.pick:hover{transform:translate(-1px,-1px)}
.pick.sel{background:var(--lemon);box-shadow:1px 1px 0 var(--ink);transform:translate(1px,1px);outline:3px solid var(--hot);outline-offset:-3px}
.pick .pick-emoji{position:absolute;inset:0;display:grid;place-items:center;font-size:1.3rem;z-index:1}
.pick .pick-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:2;border-radius:8px}
.cpick{
  width:28px;height:28px;border-radius:50%;border:2px solid var(--ink);cursor:pointer;
  box-shadow:2px 2px 0 var(--ink);
}
.cpick.sel{outline:3px solid var(--lemon);outline-offset:2px}

.players{display:flex;flex-direction:column;gap:6px;max-height:30vh;overflow:auto;padding-right:4px}
.plist-item{
  display:flex;align-items:center;gap:8px;padding:6px 8px;
  background:var(--cream);border:2px solid var(--ink);border-radius:8px;
  font-family:'Fredoka',sans-serif;font-size:.9rem;
}
.plist-item.turn{background:var(--lemon);box-shadow:inset 0 0 0 2px var(--hot);}
.plist-item .piece{
  position:relative;width:38px;height:38px;border-radius:9px;display:grid;place-items:center;
  font-size:1.2rem;border:2px solid var(--ink);flex-shrink:0;overflow:hidden;
  box-shadow:2px 2px 0 var(--ink);
}
.plist-item .piece .piece-emoji{position:absolute;inset:0;display:grid;place-items:center;z-index:1}
.plist-item .piece .piece-img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:7px;z-index:2}
.plist-item .nm{font-weight:700;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.plist-item .pos{font-family:'Space Mono',monospace;font-size:.72rem;opacity:.7}
.plist-item .x{
  background:none;border:none;color:var(--red);font-size:1.1rem;cursor:pointer;padding:0 4px;
}
.plist-item.winner{background:linear-gradient(90deg,var(--mint),var(--lemon));animation:win 1.2s infinite}
@keyframes win{0%,100%{transform:scale(1)}50%{transform:scale(1.02)}}

.turn-banner{
  text-align:center;padding:10px 6px;border-radius:10px;
  background:var(--vanilla);border:2px dashed var(--ink);
  font-family:'Chewy',cursive;font-size:1.25rem;color:var(--hot);
}
.turn-banner .sub-t{font-family:'Space Mono',monospace;font-size:.7rem;color:var(--ink);opacity:.65;letter-spacing:.15em;text-transform:uppercase}

.card-show{
  display:none;text-align:center;padding:12px;border:3px solid var(--ink);border-radius:12px;
  background:linear-gradient(135deg,#fff,var(--vanilla));box-shadow:4px 4px 0 var(--ink);
  animation:cardIn .4s ease-out;
}
.card-show.show{display:block}
@keyframes cardIn{from{transform:scale(.6) rotate(-6deg);opacity:0}to{transform:none;opacity:1}}
.card-emoji{font-size:2.4rem;margin-bottom:4px}
.card-label{font-family:'Chewy',cursive;font-size:1.2rem;color:var(--hot);margin-bottom:2px}
.card-effect{font-family:'Fredoka',sans-serif;font-size:.85rem;opacity:.8;margin-bottom:8px}

.toast{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:var(--ink);color:#fff;padding:10px 16px;border-radius:10px;
  font-family:'Fredoka',sans-serif;font-weight:700;font-size:.95rem;
  box-shadow:4px 4px 0 rgba(0,0,0,.25);z-index:999;
  opacity:0;pointer-events:none;transition:opacity .2s, transform .2s;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}

.log{
  flex:1;min-height:60px;max-height:20vh;overflow:auto;
  font-family:'Space Mono',monospace;font-size:.78rem;line-height:1.45;
  background:var(--cream);border:2px solid var(--ink);border-radius:8px;padding:8px;
}
.log-entry{margin-bottom:4px;padding-bottom:4px;border-bottom:1px dashed rgba(58,28,72,.2)}
.log-entry:last-child{border-bottom:none;margin-bottom:0}
.log-entry b{color:var(--hot)}

.hidden{display:none !important}

/* Board pieces */
.piece-avatar{
  transition: transform .55s cubic-bezier(.3, 1.4, .45, 1);
  filter: drop-shadow(2px 2px 0 rgba(0,0,0,.35));
  transform-box: view-box;
}
.piece-avatar.spawn{animation: popIn .4s ease-out}
@keyframes popIn{from{opacity:0;transform: translate(var(--px,0), var(--py,0)) scale(.2)}to{opacity:1}}
.confetti{position:absolute;pointer-events:none;inset:0;overflow:hidden}

/* ── Gummy Bear Boss ── */
.board-boss{
  position:absolute;top:10px;right:14px;z-index:4;pointer-events:none;
  text-align:center;transition:opacity .5s, filter .5s, transform .5s;
  filter:drop-shadow(3px 3px 0 rgba(255,62,78,.35));
}
.board-boss .boss-ring{
  position:absolute;inset:-6px -6px auto auto;width:96px;height:96px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, rgba(255,62,78,.35), rgba(255,62,78,.05) 70%);
  z-index:-1;animation: bossGlow 2.4s ease-in-out infinite;
}
.boss-emoji{font-size:74px;line-height:1;display:block;animation: bossIdle 2.8s ease-in-out infinite;transform-origin:50% 100%}
.boss-hp{font-size:16px;letter-spacing:2px;margin-top:-4px}
.boss-label{font-family:'Chewy',cursive;font-size:.78rem;color:var(--red);letter-spacing:.08em;margin-top:2px;text-shadow:1px 1px 0 #fff, 2px 2px 0 var(--ink)}
@keyframes bossIdle{0%,100%{transform:translateY(0) rotate(-3deg) scale(1)}50%{transform:translateY(-6px) rotate(3deg) scale(1.04)}}
@keyframes bossGlow{0%,100%{opacity:.55;transform:scale(1)}50%{opacity:.9;transform:scale(1.12)}}
.board-boss.hit .boss-emoji{animation: bossHit .55s}
@keyframes bossHit{
  0%{transform:translate(0,0) rotate(0) scale(1);filter:none}
  15%{transform:translate(-10px,-4px) rotate(-10deg) scale(1.08);filter:hue-rotate(-20deg) brightness(1.5)}
  35%{transform:translate(10px,4px) rotate(10deg) scale(1.08)}
  60%{transform:translate(-6px,0) rotate(-5deg)}
  80%{transform:translate(6px,0) rotate(5deg)}
  100%{transform:translate(0,0) rotate(0) scale(1);filter:none}
}
.board-boss.melted{opacity:0;transform:translateY(40px) scale(.3) rotate(45deg)}
/* Soda blast projectile on the board */
.soda-blast{
  position:absolute;pointer-events:none;font-size:38px;z-index:5;
  filter:drop-shadow(0 0 6px rgba(58,140,255,.7));
  animation: sodaFly .65s cubic-bezier(.2,.6,.3,1) forwards;
}
@keyframes sodaFly{
  0%{opacity:0;transform:scale(.4)}
  15%{opacity:1}
  100%{opacity:0;transform:var(--sodaEnd, translate(0,0) scale(1.4)) rotate(60deg)}
}
</style>
</head>
<body>
<div class="layout">
  <div class="board-wrap">
    <div class="header">
      <div class="brand">Sloppy<span>land</span></div>
      <div class="sub"><b>Hot-seat</b> · Pass the device · 2–6 players</div>
      <div class="spacer"></div>
      <div class="hint" id="tileCount">56 tiles</div>
    </div>
    <div class="board" id="board">
      <svg id="boardSvg" viewBox="0 0 1000 700" preserveAspectRatio="xMidYMid meet"></svg>
      <div class="board-boss" id="boardBoss">
        <span class="boss-ring"></span>
        <span class="boss-emoji">🐻</span>
        <div class="boss-hp" id="bossHp">❤️❤️❤️</div>
        <div class="boss-label">GUMMY BOSS</div>
      </div>
      <div class="confetti" id="confetti"></div>
    </div>
  </div>

  <div class="sidebar">

    <div class="panel" id="setupPanel">
      <h2>🍬 Add players</h2>
      <div class="row">
        <input class="input" id="nameInput" maxlength="16" placeholder="Enter name…" autocomplete="off">
      </div>
      <div class="picker-label">Piece</div>
      <div class="picker" id="piecePicker"></div>
      <div class="picker-label">Color</div>
      <div class="picker" id="colorPicker"></div>
      <div class="row" style="margin-top:6px">
        <button class="btn grape" id="addBtn" style="flex:1">➕ Add player</button>
        <button class="btn lemon" id="addCpuBtn">🤖 Add CPU</button>
      </div>
      <div class="row" style="margin-top:6px">
        <button class="btn mint" id="startBtn" disabled style="flex:1">▶ Start</button>
      </div>
    </div>

    <div class="panel hidden" id="playPanel">
      <h2 id="playTitle">🎲 Turn</h2>
      <div class="turn-banner" id="turnBanner">
        <div id="turnName">–</div>
        <div class="sub-t">It's your turn!</div>
      </div>
      <div class="card-show" id="cardShow">
        <div class="card-emoji" id="cardEmoji"></div>
        <div class="card-label" id="cardLabel"></div>
        <div class="card-effect" id="cardEffect"></div>
      </div>
      <div class="row" style="margin-top:10px">
        <button class="btn big lemon" id="drawBtn">🎴 Draw a card</button>
      </div>
      <div class="row" style="margin-top:6px">
        <button class="btn ghost" id="resetBtn" style="flex:1">↻ New game</button>
      </div>
    </div>

    <div class="panel">
      <h2>👥 Players</h2>
      <div class="players" id="playersList"></div>
    </div>

    <div class="panel" style="flex:1;display:flex;flex-direction:column;min-height:0">
      <h2>📜 Log</h2>
      <div class="log" id="log"></div>
    </div>

  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ──────────────────────────────────────────────────────────
   Sloppyland — Pure local hot-seat candy board game
   No network, no auth, no realtime. Pass the device.
   ────────────────────────────────────────────────────────── */

// ── Pieces & colors ──
// Each "piece" is now a food-themed anime-girl portrait generated on demand by
// Pollinations.ai (with an emoji fallback while the image loads). The `id` is
// what we store on players; everything else is metadata.
const PIECES = [
  { id:'cotton',     label:'Cotton',     emoji:'🍭', seed:101, prompt:'chibi kawaii anime girl, cotton candy pink pigtails, sweet dessert portrait, pastel pink, cream background' },
  { id:'chocolate',  label:'Choco',      emoji:'🍫', seed:102, prompt:'chibi kawaii anime girl, chocolate brown wavy hair, chocolate bar hair clip, warm browns, cream background' },
  { id:'strawberry', label:'Berry',      emoji:'🍓', seed:103, prompt:'chibi kawaii anime girl, strawberry red hair, strawberry hair pin, pink tones, cream background' },
  { id:'lemon',      label:'Lemon',      emoji:'🍋', seed:104, prompt:'chibi kawaii anime girl, lemon yellow hair, citrus leaf accent, bright yellow, cream background' },
  { id:'matcha',     label:'Matcha',     emoji:'🍵', seed:105, prompt:'chibi kawaii anime girl, mint matcha green hair, tea leaf clip, soft greens, cream background' },
  { id:'blueberry',  label:'Blue',       emoji:'🫐', seed:106, prompt:'chibi kawaii anime girl, blueberry blue hair, tiny berry pins, cool blues, cream background' },
  { id:'grape',      label:'Grape',      emoji:'🍇', seed:107, prompt:'chibi kawaii anime girl, grape purple hair, vineyard theme, lavender tones, cream background' },
  { id:'caramel',    label:'Caramel',    emoji:'🍮', seed:108, prompt:'chibi kawaii anime girl, caramel golden hair, toffee dessert theme, honey tones, cream background' },
  { id:'vanilla',    label:'Vanilla',    emoji:'🍦', seed:109, prompt:'chibi kawaii anime girl, vanilla ice cream cream hair, soft cream tones, cream background' },
  { id:'honey',      label:'Honey',      emoji:'🍯', seed:110, prompt:'chibi kawaii anime girl, honey gold hair, honeycomb hair clip, amber tones, cream background' },
  { id:'cookie',     label:'Cookie',     emoji:'🍪', seed:111, prompt:'chibi kawaii anime girl, cookie dough beige hair, chocolate chip hair pins, cozy tan tones, cream background' },
];
const PIECES_MAP = Object.fromEntries(PIECES.map(p=>[p.id,p]));
const PIECE_IDS = PIECES.map(p=>p.id);
// NOTE: Pollinations changed their policy — requests with `referrer=sloppy.live`
// now 500 with "Authenticated users should use enter.pollinations.ai". We drop
// the referrer and use the legacy anon endpoint. Cold generation still takes
// up to ~90s per unique prompt; once served, Cloudflare edge-caches the URL.
function pieceImgUrl(id){
  const p = PIECES_MAP[id];
  if(!p) return '';
  return 'https://image.pollinations.ai/prompt/' + encodeURIComponent(p.prompt) +
    `?seed=${p.seed}&width=192&height=192&nologo=true`;
}
// Warm the Pollinations edge cache — staggered so we don't overwhelm the browser's
// connection-per-origin limit or the Pollinations queue.
(function preloadPieces(){
  PIECES.forEach((p, idx)=>{
    setTimeout(()=>{
      const i = new Image();
      i.src = pieceImgUrl(p.id);
    }, idx * 400);
  });
})();
const PIECE_COLORS = ['#ff6fae','#8a4bff','#3ed6b0','#ffd94a','#ff3e4e','#3a8cff','#ff8c00','#d4a017'];

// ── Board ──
const COLORS = ['pink','grape','mint','lemon','cocoa'];
const COLOR_HEX = {
  pink:'#ff6fae', grape:'#8a4bff', mint:'#3ed6b0', lemon:'#ffd94a', cocoa:'#6b3d2e',
};
const CANDY_EMOJI = {
  pink:'🍭', grape:'🍇', mint:'🍬', lemon:'🍋', cocoa:'🍫',
};
// 56 tiles winding path, with specials
// tile: {color, special?}
// special: 'sticky' (lose turn next draw), 'shortcut:target' (advance immediately)
const TILES = (function(){
  const arr = [];
  for(let i=0;i<56;i++){
    const c = COLORS[i%COLORS.length];
    arr.push({color:c});
  }
  // Specials
  arr[7].special = 'shortcut:22';
  arr[12].special = 'sticky';
  arr[19].special = 'sticky';
  arr[27].special = 'shortcut:40';
  arr[33].special = 'sticky';
  arr[44].special = 'sticky';
  arr[49].special = 'shortcut:54';
  return arr;
})();
const FINAL_TILE = TILES.length - 1;

document.getElementById('tileCount').textContent = `${TILES.length} tiles`;

// ── Path geometry — winding S-curve ──
function computePath(){
  const pts = [];
  const rows = 7;
  const cols = 8;
  const w = 1000, h = 700;
  const padX = 70, padY = 70;
  const stepX = (w - padX*2) / (cols-1);
  const stepY = (h - padY*2) / (rows-1);
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      const realC = (r%2===0) ? c : (cols-1 - c);
      const x = padX + realC*stepX;
      const y = padY + r*stepY;
      // Tiny wobble for sweetness
      const wob = Math.sin(r*1.3 + c*.7) * 6;
      pts.push({x:x + wob, y:y + (c%2?4:-4)});
    }
  }
  return pts.slice(0, TILES.length);
}
const PATH = computePath();

// ── Render board ──
const svg = document.getElementById('boardSvg');
function renderBoard(){
  let s = '';
  // Connecting ribbon
  let d = `M ${PATH[0].x} ${PATH[0].y}`;
  for(let i=1;i<PATH.length;i++){
    const p = PATH[i], prev = PATH[i-1];
    const mx = (p.x+prev.x)/2, my=(p.y+prev.y)/2;
    d += ` Q ${prev.x} ${prev.y}, ${mx} ${my}`;
  }
  d += ` T ${PATH[PATH.length-1].x} ${PATH[PATH.length-1].y}`;
  s += `<path d="${d}" fill="none" stroke="#fff" stroke-width="42" stroke-linecap="round" stroke-linejoin="round" opacity=".9"/>`;
  s += `<path d="${d}" fill="none" stroke="#3a1c48" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" stroke-dasharray="4 8" opacity=".35"/>`;

  // Tiles (pure emoji, no plain circles)
  TILES.forEach((t, i)=>{
    const p = PATH[i];
    const hex = COLOR_HEX[t.color];
    const isStart = i===0, isEnd = i===FINAL_TILE;
    let emoji = CANDY_EMOJI[t.color] || '🍬';
    let size = 34;
    if(t.special === 'sticky'){ emoji = '🍯'; size = 36; }
    else if(t.special && t.special.startsWith('shortcut')){ emoji = '✨'; size = 36; }
    if(isStart){ emoji = '🚀'; size = 44; }
    if(isEnd){ emoji = '🏰'; size = 50; }
    // Soft colored glow so the path's color sequence stays readable
    s += `<circle cx="${p.x}" cy="${p.y}" r="${size*.7}" fill="${hex}" opacity=".22"/>`;
    s += `<circle cx="${p.x}" cy="${p.y}" r="${size*.45}" fill="${hex}" opacity=".35"/>`;
    s += `<text x="${p.x}" y="${p.y + size*.33}" text-anchor="middle" font-size="${size}" style="filter:drop-shadow(1px 2px 0 rgba(0,0,0,.25))">${emoji}</text>`;
    // Shortcut arrow ribbon
    if(t.special && t.special.startsWith('shortcut:')){
      const tgt = parseInt(t.special.split(':')[1]);
      const tp = PATH[tgt];
      if(tp){
        s += `<line x1="${p.x}" y1="${p.y}" x2="${tp.x}" y2="${tp.y}" stroke="#ffd94a" stroke-width="4" stroke-dasharray="6 6" opacity=".55" stroke-linecap="round"/>`;
      }
    }
  });

  // Piece layer
  s += `<g id="pieceLayer"></g>`;
  svg.innerHTML = s;
}
renderBoard();

// ── Game state ──
const state = {
  players: [],        // {id, name, piece, color, position, skipNext, lastCard, finishedAt, isCpu}
  turnIdx: 0,
  started: false,
  finished: false,
  rank: [],           // names in order of finishing
  animating: false,
  boss: { hp: 3, maxHp: 3, alive: true }, // Giant Gummy Boss — must be melted before anyone can win
};
const SODA_RANGE = 10; // Must be within this many tiles of the boss gate to draw a 🥤 soda card

// Cute CPU opponents
const CPU_NAMES = ['Gummy','Sprinkle','Fudge','Taffy','Caramel','Marshmallow','Jellybean','Butterscotch','Mochi','Licorice','Sherbet','Nougat','Cookie-Cruncher','Cake-Smasher','Pizza-Face'];

let pieceSel = PIECE_IDS[0];
let colorSel = PIECE_COLORS[0];

// ── Setup UI: pickers ──
function buildPickers(){
  const pp = document.getElementById('piecePicker');
  pp.innerHTML = '';
  PIECES.forEach((p)=>{
    const b = document.createElement('button');
    b.className = 'pick' + (p.id===pieceSel?' sel':'');

    b.innerHTML = `
      <span class="pick-emoji">${p.emoji}</span>
      <img class="pick-img" src="${pieceImgUrl(p.id)}" alt="${p.label}" loading="lazy" onerror="this.style.display='none'">
    `;
    b.onclick = ()=>{ pieceSel = p.id; buildPickers(); };

  });
  const cp = document.getElementById('colorPicker');
  cp.innerHTML = '';
  PIECE_COLORS.forEach((c)=>{
    const b = document.createElement('button');

    b.style.background = c;

buildPickers();

// ── Add player ──
const nameInput = document.getElementById('nameInput');
const addBtn = document.getElementById('addBtn');
const startBtn = document.getElementById('startBtn');

nameInput.addEventListener('keydown', e=>{
  if(e.key==='Enter'){ e.preventDefault(); addPlayer(); }
});
addBtn.addEventListener('click', addPlayer);
startBtn.addEventListener('click', startGame);
document.getElementById('addCpuBtn').addEventListener('click', addCpu);

function addCpu(){
  if(state.players.length >= 6){ toast('Max 6 players'); return; }
  // Build the set of lowercased taken names (already include " 🤖" suffix on prior CPUs).
  const takenLower = new Set(state.players.map(p=>p.name.toLowerCase()));
  const isTaken = (candidate)=> takenLower.has(candidate.toLowerCase());

  // Try base CPU names first, with the 🤖 suffix. Filter against fully-suffixed candidate.
  let name = null;
  const basePool = CPU_NAMES.filter(n => !isTaken(n + ' 🤖'));
  if(basePool.length){
    name = basePool[(Math.random()*basePool.length)|0] + ' 🤖';
  } else {
    // Pool exhausted — fall back to Bot 2, Bot 3, … guaranteed unique by suffix number.
    let i = 2;
    while(isTaken(`Bot ${i} 🤖`) && i < 999) i++;
    name = `Bot ${i} 🤖`;
  }

  const usedPieces = new Set(state.players.map(p=>p.piece));
  const piece = PIECE_IDS.find(e=>!usedPieces.has(e)) || PIECE_IDS[(Math.random()*PIECE_IDS.length)|0];
  const usedColors = new Set(state.players.map(p=>p.color));
  const color = PIECE_COLORS.find(c=>!usedColors.has(c)) || PIECE_COLORS[(Math.random()*PIECE_COLORS.length)|0];
  const id = 'cpu_' + Math.random().toString(36).slice(2,8);
  state.players.push({
    id, name, piece, color, isCpu:true,
    position:0, skipNext:false, lastCard:null, finishedAt:null,
  });
  renderPlayers();
  toast(`🤖 ${name} joined`);
}

function addPlayer(){
  if(state.players.length >= 6){ toast('Max 6 players'); return; }
  const raw = (nameInput.value || '').trim();
  if(!raw){ toast('Enter a name first'); nameInput.focus(); return; }
  const name = raw.slice(0,16);
  if(state.players.some(p=>p.name.toLowerCase()===name.toLowerCase())){ toast('Name already taken'); return; }
  const id = 'p_' + Math.random().toString(36).slice(2,8);
  state.players.push({
    id, name, piece: pieceSel, color: colorSel,
    position: 0, skipNext: false, lastCard: null, finishedAt: null,
  });
  nameInput.value = '';
  // Auto-rotate piece/color so next add is different
  pieceSel = PIECE_IDS[state.players.length % PIECE_IDS.length];
  colorSel = PIECE_COLORS[state.players.length % PIECE_COLORS.length];
  buildPickers();
  renderPlayers();
  nameInput.focus();
  toast(`🍭 ${name} joined`);
}

function removePlayer(id){
  if(state.started){ return; }
  state.players = state.players.filter(p=>p.id!==id);
  renderPlayers();
}

// ── Start game ──
function startGame(){
  if(state.players.length < 2){ toast('Need at least 2 players'); return; }
  state.started = true;
  state.turnIdx = 0;
  state.finished = false;
  state.rank = [];
  document.getElementById('setupPanel').classList.add('hidden');
  document.getElementById('playPanel').classList.remove('hidden');
  renderPlayers();
  renderPieces();
  updateTurnUI();
  log(`🎲 Game started with ${state.players.length} players!`);
}

// ── Render players sidebar ──
function renderPlayers(){
  const list = document.getElementById('playersList');
  list.innerHTML = '';
  state.players.forEach((p, i)=>{
    const row = document.createElement('div');
    const isTurn = state.started && !state.finished && i===state.turnIdx;
    const isWinner = state.finished && state.rank[0]===p.id;
    row.className = 'plist-item' + (isTurn?' turn':'') + (isWinner?' winner':'');
    const posTxt = p.finishedAt ? `🏆 finished #${state.rank.indexOf(p.id)+1}` : `Tile ${p.position+1}/${TILES.length}`;
    const pd = PIECES_MAP[p.piece] || {emoji:'👧'};
    row.innerHTML = `
      <div class="piece" style="background:${p.color}">
        <span class="piece-emoji">${pd.emoji}</span>
        <img class="piece-img" src="${pieceImgUrl(p.piece)}" alt="" onerror="this.style.display='none'">
      </div>
      <div class="nm">${escapeHtml(p.name)}</div>
      <div class="pos">${posTxt}</div>
    `;
    if(!state.started){
      const x = document.createElement('button');
      x.className = 'x';
      x.textContent = '✕';
      x.onclick = ()=>removePlayer(p.id);
      row.appendChild(x);
    }
    list.appendChild(row);
  });
  startBtn.disabled = state.players.length < 2;
  startBtn.textContent = state.players.length < 2 ? `Need ${2-state.players.length}+` : '▶ Start';
}
renderPlayers();

// ── Render piece positions on board (preserves nodes so transforms can tween) ──
const SVGNS = 'http://www.w3.org/2000/svg';
function renderPieces(){
  const layer = svg.querySelector('#pieceLayer');
  if(!layer) return;
  // Group pieces by tile to fan them out
  const byTile = new Map();
  state.players.forEach(p=>{
    if(!byTile.has(p.position)) byTile.set(p.position, []);
    byTile.get(p.position).push(p);
  });
  // Compute target positions
  const targets = new Map(); // id -> {x, y}
  byTile.forEach((ps, tile)=>{
    const base = PATH[tile];
    if(!base) return;
    ps.forEach((p, k)=>{
      const ang = (k / Math.max(ps.length,1)) * Math.PI * 2 - Math.PI/2;
      const off = ps.length>1 ? 16 : 0;
      targets.set(p.id, { x: base.x + Math.cos(ang)*off, y: base.y + Math.sin(ang)*off });
    });
  });
  // Remove nodes for players that no longer exist
  const existing = new Map();
  layer.querySelectorAll('g.piece-avatar').forEach(g => existing.set(g.dataset.pid, g));
  existing.forEach((g, pid)=>{
    if(!state.players.some(p => p.id === pid)) g.remove();
  });
  // Upsert each player
  state.players.forEach(p=>{
    const tgt = targets.get(p.id);
    if(!tgt) return;
    let g = existing.get(p.id);
    const pd = PIECES_MAP[p.piece] || {emoji:'👧'};
    if(!g){
      g = document.createElementNS(SVGNS,'g');
      g.setAttribute('class','piece-avatar spawn');
      g.dataset.pid = p.id;
      g.style.setProperty('--px', tgt.x + 'px');
      g.style.setProperty('--py', tgt.y + 'px');
      // Rounded-square tile background (bigger than the old 20r circle)
      const sq = document.createElementNS(SVGNS,'rect');
      sq.setAttribute('x','-24');
      sq.setAttribute('y','-24');
      sq.setAttribute('width','48');
      sq.setAttribute('height','48');
      sq.setAttribute('rx','10');
      sq.setAttribute('ry','10');
      sq.setAttribute('fill', p.color);
      sq.setAttribute('stroke','#3a1c48');
      sq.setAttribute('stroke-width','3');
      g.appendChild(sq);
      // Emoji fallback (visible until portrait loads)
      const t = document.createElementNS(SVGNS,'text');
      t.setAttribute('y','8');
      t.setAttribute('text-anchor','middle');
      t.setAttribute('font-size','26');
      t.textContent = pd.emoji;
      g.appendChild(t);
      // Pollinations portrait — clipped to rounded square — covers emoji once loaded
      const clipId = 'clip_' + p.id;
      const defs = document.createElementNS(SVGNS,'defs');
      const clip = document.createElementNS(SVGNS,'clipPath');
      clip.setAttribute('id', clipId);
      const clipR = document.createElementNS(SVGNS,'rect');
      clipR.setAttribute('x','-21');
      clipR.setAttribute('y','-21');
      clipR.setAttribute('width','42');
      clipR.setAttribute('height','42');
      clipR.setAttribute('rx','8');
      clipR.setAttribute('ry','8');
      clip.appendChild(clipR);
      defs.appendChild(clip);
      g.appendChild(defs);
      const img = document.createElementNS(SVGNS,'image');
      img.setAttribute('x','-21');
      img.setAttribute('y','-21');
      img.setAttribute('width','42');
      img.setAttribute('height','42');
      img.setAttribute('clip-path', `url(#${clipId})`);
      img.setAttribute('preserveAspectRatio','xMidYMid slice');
      img.setAttributeNS('http://www.w3.org/1999/xlink','href', pieceImgUrl(p.piece));
      img.setAttribute('href', pieceImgUrl(p.piece));
      g.appendChild(img);
      // Spawn at target (no jump from 0,0)
      g.style.transform = `translate(${tgt.x}px, ${tgt.y}px)`;
      layer.appendChild(g);
      // Drop spawn class after pop-in
      setTimeout(()=>g.classList.remove('spawn'), 420);
    } else {
      // Update visuals if piece/color changed
      const circle = g.querySelector('circle');
      if(circle && circle.getAttribute('fill') !== p.color) circle.setAttribute('fill', p.color);
      const text = g.querySelector('text');
      if(text && text.textContent !== pd.emoji) text.textContent = pd.emoji;
      const img = g.querySelector('image');
      if(img){
        const url = pieceImgUrl(p.piece);
        if(img.getAttribute('href') !== url){
          img.setAttribute('href', url);
          img.setAttributeNS('http://www.w3.org/1999/xlink','href', url);
        }
      }
      g.style.transform = `translate(${tgt.x}px, ${tgt.y}px)`;
    }
  });
}

// ── Cards & deck ──
function generateCard(player){
  const r = Math.random();
  // Soda cannon card only drops while the Gummy Boss is still alive AND the
  // player is within 10 tiles of the boss gate (final tile). You have to get
  // close to the castle before you can shoot at it.
  const inSodaRange = player && (FINAL_TILE - player.position) <= SODA_RANGE;
  if(state.boss && state.boss.alive && inSodaRange && r < 0.22){
    return {kind:'soda', label:'🥤', effect:'FIRE THE SODA CANNON at the Gummy Boss! 💥'};
  }
  const r2 = Math.random();
  if(r2 < 0.55){
    const c = COLORS[(Math.random()*COLORS.length)|0];
    return {kind:'single', color:c, label:renderColorSquares([c]), effect:`Advance to next ${c} tile`};
  } else if(r2 < 0.80){
    const c = COLORS[(Math.random()*COLORS.length)|0];
    return {kind:'double', color:c, label:renderColorSquares([c,c]), effect:`Advance to the SECOND next ${c} tile`};
  } else if(r2 < 0.92){
    return {kind:'sticky', label:'🍯', effect:'Sticky toffee! Lose next turn.'};
  } else {
    return {kind:'rush', label:'⚡', effect:'Sugar rush! Leap forward 4–9 tiles.'};
  }
}
function renderColorSquares(cs){
  return cs.map(c=>`<span style="display:inline-block;width:48px;height:48px;background:${COLOR_HEX[c]};border:3px solid #3a1c48;border-radius:12px;margin:0 5px;vertical-align:middle;box-shadow:3px 3px 0 #3a1c48"></span>`).join('');
}

// ── Resolve card ──
function resolveCard(player, card){
  let newPos = player.position;
  let skip = false;
  if(card.kind === 'single' || card.kind === 'double'){
    const target = card.kind==='single' ? 1 : 2;
    let found = 0;
    let firstMatch = -1;
    for(let i=player.position+1;i<TILES.length;i++){
      if(TILES[i].color === card.color){
        found++;
        if(firstMatch < 0) firstMatch = i;
        if(found === target){ newPos = i; break; }
      }
    }
    // Partial credit for double: if only one match, land on it.
    // If zero matches, stay put (no silent teleport to finish).
    if(found < target && firstMatch >= 0) newPos = firstMatch;
  } else if(card.kind === 'sticky'){
    skip = true;
  } else if(card.kind === 'rush'){
    const leap = 4 + ((Math.random()*6)|0);
    newPos = Math.min(FINAL_TILE, player.position + leap);
  } else if(card.kind === 'soda'){
    // Soda cannon: fire at boss, player does NOT move this turn.
    // Damage is applied in drawTurn() so we can animate the hit cleanly.
  }
  // Apply board specials ONCE on landing
  if(newPos !== player.position){
    const t = TILES[newPos];
    if(t.special === 'sticky'){
      skip = true;
    } else if(t.special && t.special.startsWith('shortcut:')){
      const tgt = parseInt(t.special.split(':')[1]);
      if(!isNaN(tgt)) newPos = Math.min(FINAL_TILE, tgt);
    }
  }
  return {newPos, skip};
}

// ── Draw button / turn flow ──
const drawBtn = document.getElementById('drawBtn');
const resetBtn = document.getElementById('resetBtn');
const cardShow = document.getElementById('cardShow');

drawBtn.addEventListener('click', drawTurn);
resetBtn.addEventListener('click', newGame);

function updateTurnUI(){
  if(state.finished){
    document.getElementById('playTitle').textContent = '🏆 Game over';
    document.getElementById('turnBanner').innerHTML = `<div>🎉 ${escapeHtml(winnerName())} wins!</div><div class="sub-t">Tap "New game" to play again</div>`;
    drawBtn.disabled = true;
    drawBtn.textContent = '🏁 Game over';
    return;
  }
  const p = state.players[state.turnIdx];
  if(!p) return;
  const _pd = PIECES_MAP[p.piece] || {emoji:'👧'};
  document.getElementById('turnName').innerHTML = `<img src="${pieceImgUrl(p.piece)}" alt="" style="width:40px;height:40px;border-radius:9px;border:2px solid var(--ink);vertical-align:middle;margin-right:6px;background:${p.color};object-fit:cover;box-shadow:2px 2px 0 var(--ink)" onerror="this.replaceWith(Object.assign(document.createElement('span'),{textContent:'${_pd.emoji}'}))"> <span style="color:${p.color}">${escapeHtml(p.name)}</span>`;
  const banner = document.getElementById('turnBanner');
  const subT = banner.querySelector('.sub-t');
  if(subT){
    const inRange = state.boss.alive && (FINAL_TILE - p.position) <= SODA_RANGE;
    let txt = p.isCpu
      ? (p.skipNext ? 'CPU stuck in toffee…' : 'CPU thinking…')
      : (p.skipNext ? 'Sticky toffee — will skip!' : "It's your turn!");
    if(inRange) txt += ' · 🥤 in range';
    subT.textContent = txt;
  }
  if(p.isCpu){
    drawBtn.disabled = true;
    drawBtn.textContent = '🤖 CPU turn…';
    if(!state.animating){
      setTimeout(()=>{ if(state.players[state.turnIdx]===p && !state.animating) drawTurn(); }, 900);
    }
  } else {
    drawBtn.disabled = state.animating;
    drawBtn.textContent = p.skipNext ? '🍯 Skip turn' : '🎴 Draw a card';
  }
}

function winnerName(){
  const winId = state.rank[0];
  const p = state.players.find(x=>x.id===winId);
  return p ? p.name : '?';
}

function advanceTurn(){
  // If the game is already over, still refresh the UI so the Game Over banner
  // appears and the draw button stops sitting on "🤖 CPU turn…" (soft lock).
  if(state.finished){
    renderPlayers();
    updateTurnUI();
    return;
  }
  // Skip finished players
  let tries = 0;
  do {
    state.turnIdx = (state.turnIdx + 1) % state.players.length;
    tries++;
  } while(state.players[state.turnIdx].finishedAt && tries < state.players.length);
  // Check if everyone finished except one (or none)
  const remaining = state.players.filter(p=>!p.finishedAt);
  if(remaining.length === 0){
    state.finished = true;
  }
  renderPlayers();
  updateTurnUI();
}

async function drawTurn(){
  if(state.animating || state.finished) return;
  const p = state.players[state.turnIdx];
  if(!p) return;
  if(p.finishedAt){ advanceTurn(); return; }
  state.animating = true;
  drawBtn.disabled = true;
  cardShow.classList.remove('show');

  // Sticky skip handling
  if(p.skipNext){
    p.skipNext = false;
    log(`🍯 <b>${escapeHtml(p.name)}</b> is stuck in toffee — turn skipped!`);
    toast(`${p.name} skipped!`);
    await sleep(700);
    state.animating = false;
    advanceTurn();
    return;
  }

  const card = generateCard(p);
  p.lastCard = card;
  showCard(card);
  await sleep(900);

  let {newPos, skip} = resolveCard(p, card);
  // Boss gate: nobody can cross the finish line until the Gummy Boss is melted.
  if(state.boss && state.boss.alive && newPos >= FINAL_TILE){
    newPos = FINAL_TILE - 2;
    log(`🐻 <b>${escapeHtml(p.name)}</b> bounced off the Gummy Boss! Use a 🥤 to melt it.`);
  }
  const moved = newPos !== p.position;
  p.position = newPos;
  p.skipNext = skip;
  renderPieces();

  // Soda cannon hit
  if(card.kind === 'soda'){
    await sodaBlast(p);
    if(state.boss.alive){
      state.boss.hp = Math.max(0, state.boss.hp - 1);
      renderBoss();
      if(state.boss.hp <= 0){
        state.boss.alive = false;
        const bossEl = document.getElementById('boardBoss');
        if(bossEl) bossEl.classList.add('melted');
        log(`💥 <b>${escapeHtml(p.name)}</b> MELTED the Gummy Boss! The castle is open! 🏰`);
        toast(`🐻💥 Boss melted!`);
        confettiBurst();
      } else {
        log(`🥤 <b>${escapeHtml(p.name)}</b> blasted the Gummy Boss! (${state.boss.hp}/${state.boss.maxHp} HP left)`);
      }
    }
  }

  let msg = `<b>${escapeHtml(p.name)}</b> `;
  if(card.kind==='single' || card.kind==='double'){
    msg += moved ? `→ tile ${newPos+1}` : `stays (no ${card.color} tile ahead)`;
    log(msg);
  } else if(card.kind==='sticky'){
    msg += `landed in toffee — skip next turn 🍯`;
    log(msg);
  } else if(card.kind==='rush'){
    msg += `sugar rushed → tile ${newPos+1} ⚡`;
    log(msg);
  }

  // Shortcut or sticky landing effects
  const landed = TILES[newPos];
  if(moved && landed.special){
    if(landed.special === 'sticky'){
      log(`🍯 …and stuck on toffee tile!`);
    } else if(landed.special.startsWith('shortcut:')){
      log(`⚡ …rode a sugar shortcut to tile ${newPos+1}!`);
    }
  }

  // Check for win
  if(p.position >= FINAL_TILE){
    p.finishedAt = Date.now();
    state.rank.push(p.id);
    confettiBurst();
    log(`🏆 <b>${escapeHtml(p.name)}</b> reached the Sticky Throne!`);
    toast(`🎉 ${p.name} wins!`);
    if(state.rank.length === 1){
      state.finished = true;
    }
  }

  await sleep(700);
  cardShow.classList.remove('show');
  state.animating = false;
  advanceTurn();
}

function showCard(card){
  document.getElementById('cardEmoji').innerHTML = card.kind==='single'||card.kind==='double' ? card.label : card.label;
  document.getElementById('cardLabel').textContent = {
    single:'SINGLE', double:'DOUBLE', sticky:'STICKY TOFFEE', rush:'SUGAR RUSH', soda:'SODA CANNON!'
  }[card.kind];
  document.getElementById('cardEffect').textContent = card.effect;
  cardShow.classList.add('show');
}

// ── Gummy Boss rendering & soda projectile ──
function renderBoss(){
  const hpEl = document.getElementById('bossHp');
  const bossEl = document.getElementById('boardBoss');
  if(!hpEl || !bossEl) return;
  const b = state.boss;
  hpEl.textContent = '❤️'.repeat(b.hp) + '🖤'.repeat(Math.max(0, b.maxHp - b.hp));
  if(b.alive){
    bossEl.classList.remove('melted');
  }
}
renderBoss();

async function sodaBlast(player){
  const board = document.getElementById('board');
  const bossEl = document.getElementById('boardBoss');
  if(!board || !bossEl) return;
  // Find player piece position in screen space
  const g = svg.querySelector(`g.piece-avatar[data-pid="${player.id}"]`);
  const boardRect = board.getBoundingClientRect();
  let from = { x: boardRect.width/2, y: boardRect.height/2 };
  if(g){
    const pr = g.getBoundingClientRect();
    from = { x: pr.left - boardRect.left + pr.width/2, y: pr.top - boardRect.top + pr.height/2 };
  }
  const br = bossEl.getBoundingClientRect();
  const to = { x: br.left - boardRect.left + br.width/2, y: br.top - boardRect.top + br.height/2 };
  const dx = to.x - from.x, dy = to.y - from.y;
  const blast = document.createElement('div');
  blast.className = 'soda-blast';
  blast.textContent = '🥤';
  blast.style.left = (from.x - 19) + 'px';
  blast.style.top = (from.y - 19) + 'px';
  blast.style.setProperty('--sodaEnd', `translate(${dx}px, ${dy}px) scale(1.8)`);
  board.appendChild(blast);
  await sleep(480);
  bossEl.classList.add('hit');
  setTimeout(()=>bossEl.classList.remove('hit'), 560);
  await sleep(200);
  blast.remove();
}

function newGame(){
  if(!confirm('Start a new game? Current progress will be lost.')) return;
  state.players.forEach(p=>{ p.position=0; p.skipNext=false; p.lastCard=null; p.finishedAt=null; });
  state.started = false;
  state.finished = false;
  state.rank = [];
  state.turnIdx = 0;
  state.boss = { hp: 3, maxHp: 3, alive: true };
  const bossEl = document.getElementById('boardBoss');
  if(bossEl){ bossEl.classList.remove('melted','hit'); }
  renderBoss();
  document.getElementById('setupPanel').classList.remove('hidden');
  document.getElementById('playPanel').classList.add('hidden');
  document.getElementById('log').innerHTML = '';
  cardShow.classList.remove('show');
  renderPlayers();
  renderPieces();
}

// ── Confetti ──
function confettiBurst(){
  const host = document.getElementById('confetti');
  const colors = ['#ff6fae','#8a4bff','#3ed6b0','#ffd94a','#ff3e4e','#3a8cff'];
  for(let i=0;i<70;i++){
    const bit = document.createElement('div');
    const c = colors[(Math.random()*colors.length)|0];
    const size = 6 + Math.random()*10;
    const dx = (Math.random()-.5) * 520;
    const dy = 260 + Math.random()*380;
    const rot = (Math.random()*4 - 2) * 360;
    const dur = 1.1 + Math.random()*1.6;
    bit.style.cssText = `
      position:absolute;left:${42+Math.random()*16}%;top:${30+Math.random()*15}%;
      width:${size}px;height:${size}px;background:${c};
      border-radius:${Math.random()<.5?'50%':'2px'};
      --dx:${dx}px;--dy:${dy}px;--rot:${rot}deg;
      animation:fall ${dur}s cubic-bezier(.2,.55,.35,1) forwards;
    `;
    host.appendChild(bit);
    setTimeout(()=>bit.remove(), (dur*1000)+120);
  }
}

// ── Utilities ──
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toast._t);
  toast._t = setTimeout(()=>t.classList.remove('show'), 1800);
}
function log(html){
  const L = document.getElementById('log');
  const e = document.createElement('div');
  e.className = 'log-entry';
  e.innerHTML = html;
  L.appendChild(e);
  L.scrollTop = L.scrollHeight;
}

// Focus name field on load
nameInput.focus();
log('🍭 Welcome! Add 2–6 players, then tap <b>Start</b>.');
