<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Wire Bomb</title>
  <link rel="icon" href="https://emojicdn.elk.sh/💣">
  <meta property="og:title" content="Wire Bomb">
  <meta property="og:description" content="24 wires. Complex rules. One wrong cut and it's over. Can you defuse it?">
  <meta property="og:url" content="https://sloppy.live/wire-bomb">
  <meta property="og:image" content="https://sloppy.live/wire-bomb/og-image.png">
  <link href="https://fonts.googleapis.com/css2?family=VT323&family=IBM+Plex+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #08080c;
      --panel: #0c0e14;
      --border: #1a1e28;
      --text: #778899;
      --dim: #3a4455;
      --red: #ff2244;
      --green: #22ff88;
      --yellow: #ffcc22;
      --cyan: #22ddff;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      min-height: 100dvh;
      overflow-x: hidden;
      user-select: none;
    }

    #header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 14px;
      border-bottom: 1px solid var(--border);
      background: var(--bg);
      position: sticky; top: 0; z-index: 10;
    }
    #header h1 {
      font-family: 'VT323', monospace;
      font-size: 22px; color: var(--red);
      text-shadow: 0 0 10px rgba(255,34,68,0.3);
      letter-spacing: 3px;
    }
    .timer {
      font-family: 'VT323', monospace;
      font-size: 30px; color: var(--red);
      text-shadow: 0 0 12px rgba(255,34,68,0.4);
    }
    .timer.safe { color: var(--green); text-shadow: 0 0 10px rgba(34,255,136,0.3); }
    .hud-stats { display: flex; gap: 14px; font-size: 11px; }
    .hl { color: var(--dim); }
    .hv { color: var(--cyan); }
    .hv-bad { color: var(--red); }

    #layout {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 1px; background: var(--border);
      min-height: calc(100dvh - 44px);
    }
    @media (max-width: 760px) {
      #layout { grid-template-columns: 1fr; }
      #manual-panel { max-height: 45vh; overflow-y: auto; }
    }

    .lpanel { background: var(--panel); padding: 14px; }
    .section-title {
      font-family: 'VT323', monospace;
      font-size: 14px; color: var(--dim);
      letter-spacing: 2px; margin-bottom: 10px;
      border-bottom: 1px solid #141820;
      padding-bottom: 4px;
    }

    /* Wire board */
    #wire-board {
      display: flex; flex-direction: column; align-items: center; gap: 14px;
    }
    #wires-container {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 8px;
      width: 100%; max-width: 540px;
    }
    .wire-slot {
      display: flex; flex-direction: column;
      align-items: center; gap: 4px;
      cursor: pointer;
      padding: 6px 4px;
      border: 1px solid transparent;
      border-radius: 4px;
      transition: all .15s;
    }
    .wire-slot:hover { border-color: #2a3040; background: rgba(255,255,255,0.02); }
    .wire-slot.cut { opacity: 0.25; pointer-events: none; }
    .wire-slot.cut .wire-body { height: 8px; }
    .wire-slot.exploded .wire-body { background: var(--red) !important; }

    .wire-label {
      font-family: 'VT323', monospace;
      font-size: 11px; color: var(--dim);
      letter-spacing: 1px;
    }
    .wire-body {
      width: 10px; height: 60px;
      border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.08);
      transition: all .3s;
      position: relative;
    }
    .wire-body::before {
      content: '';
      position: absolute; inset: 1px;
      border-radius: 4px;
      background: linear-gradient(180deg, rgba(255,255,255,0.15) 0%, transparent 40%, rgba(0,0,0,0.2) 100%);
    }
    .wire-color-name {
      font-size: 8px; color: var(--dim);
      text-align: center; max-width: 60px;
      line-height: 1.2;
    }
    .wire-pos {
      font-family: 'VT323', monospace;
      font-size: 14px; color: #445566;
    }

    /* Indicators row */
    #indicators-row {
      display: flex; gap: 10px; align-items: center;
      padding: 8px 12px;
      background: #080a0e;
      border: 1px solid var(--border);
      border-radius: 4px;
      flex-wrap: wrap;
      justify-content: center;
    }
    .ind-chip {
      font-family: 'VT323', monospace;
      font-size: 12px; padding: 2px 8px;
      border: 1px solid #222;
      border-radius: 3px;
    }
    .ind-chip.lit { border-color: var(--yellow); color: var(--yellow); background: rgba(255,204,34,0.06); }
    .ind-chip.unlit { color: #334; }

    /* Serial */
    #serial-display {
      font-family: 'VT323', monospace;
      font-size: 16px; color: var(--cyan);
      text-shadow: 0 0 6px rgba(34,221,255,0.3);
      padding: 6px 14px;
      background: #080a0e;
      border: 1px solid var(--border);
      border-radius: 4px;
      text-align: center;
      letter-spacing: 3px;
    }

    /* Manual */
    #manual-panel { overflow-y: auto; }
    .rule-box {
      background: #080a0e;
      border: 1px solid var(--border);
      border-left: 3px solid var(--dim);
      padding: 8px 10px;
      margin-bottom: 6px;
      font-size: 10px;
      line-height: 1.6;
      color: #556677;
    }
    .rule-box h3 {
      font-family: 'VT323', monospace;
      font-size: 13px; color: var(--cyan);
      margin-bottom: 4px; letter-spacing: 1px;
    }
    .rule-box .k { color: var(--yellow); }
    .rule-box .w { color: var(--red); }
    .rule-box .g { color: var(--green); }

    .color-ref {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 2px;
      vertical-align: middle;
      margin: 0 2px;
      border: 1px solid rgba(255,255,255,0.1);
    }

    /* Overlays */
    .overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 20; background: rgba(8,8,12,0.95);
    }
    .overlay.hidden { display: none; }
    .overlay h1 {
      font-family: 'VT323', monospace;
      font-size: clamp(28px, 7vw, 52px);
      margin-bottom: 8px;
    }
    .overlay .sub { font-size: 13px; color: #445; margin-bottom: 20px; text-align: center; padding: 0 20px; line-height: 1.7; }
    .overlay .big { font-family: 'VT323', monospace; font-size: 40px; margin: 6px 0; }
    .overlay .det { font-size: 12px; color: var(--dim); margin-bottom: 14px; }
    .obtn {
      font-family: 'VT323', monospace;
      font-size: 18px; padding: 12px 28px;
      border: 2px solid var(--cyan); background: none;
      color: var(--cyan); cursor: pointer; letter-spacing: 2px;
      transition: all .2s;
    }
    .obtn:hover { background: var(--cyan); color: var(--bg); }

    #backlink {
      position: fixed; bottom: 4px; right: 8px;
      font-size: 9px; color: #111; text-decoration: none; z-index: 10;
    }
    #backlink:hover { color: var(--cyan); }
  </style>
</head>
<body>

  <div id="header">
    <h1>WIRE BOMB</h1>
    <div class="hud-stats">
      <span><span class="hl">CUT</span> <span class="hv" id="h-cut">0/8</span></span>
      <span><span class="hl">STRIKES</span> <span class="hv-bad" id="h-strikes">0/2</span></span>
    </div>
    <div class="timer safe" id="timer">4:00</div>
  </div>

  <div id="layout">
    <div class="lpanel" id="wire-board">
      <div class="section-title">/// BOMB MODULE — 24 WIRES ///</div>
      <div id="serial-display">—</div>
      <div id="indicators-row"></div>
      <div id="wires-container"></div>
    </div>
    <div class="lpanel" id="manual-panel">
      <div class="section-title">/// DEFUSAL MANUAL ///</div>
      <div id="manual-content"></div>
    </div>
  </div>

  <div class="overlay" id="start-overlay">
    <h1 style="color:var(--red)">WIRE BOMB</h1>
    <p class="sub">24 wires. Complex rules. Cut the right ones to defuse.<br>One wrong cut = strike. Two strikes = boom.</p>
    <button class="obtn" id="btn-start">ARM & DEFUSE</button>
  </div>

  <div class="overlay hidden" id="win-overlay">
    <h1 style="color:var(--green)">DEFUSED</h1>
    <div class="big" style="color:var(--green)" id="win-time">—</div>
    <div class="det" id="win-det">—</div>
    <button class="obtn" id="btn-next">NEXT BOMB</button>
  </div>

  <div class="overlay hidden" id="fail-overlay">
    <h1 style="color:var(--red)">BOOM</h1>
    <p class="sub">Wrong wire. The bomb has detonated.</p>
    <button class="obtn" id="btn-retry">TRY AGAIN</button>
  </div>

  <a id="backlink" href="https://sloppy.live">sloppy.live</a>

<script>
/* ── 24 Wire Colors — full spectrum, step 48 on 192 base ── */
/* 8 distinct colors — primaries, secondaries, + orange & purple */
const PALETTE = [
  { name: 'Red',     rgb: [192, 0, 0] },
  { name: 'Orange',  rgb: [192, 96, 0] },
  { name: 'Yellow',  rgb: [192, 192, 0] },
  { name: 'Green',   rgb: [0, 192, 0] },
  { name: 'Cyan',    rgb: [0, 192, 192] },
  { name: 'Blue',    rgb: [0, 0, 192] },
  { name: 'Purple',  rgb: [144, 0, 192] },
  { name: 'Magenta', rgb: [192, 0, 192] },
];

/* 24 wires = 3 of each color, laid out in rainbow order */
const WIRE_COLORS = [];
for (let rep = 0; rep < 3; rep++) {
  for (const c of PALETTE) WIRE_COLORS.push({ ...c });
}

function colorCSS(c) { return `rgb(${c.rgb[0]},${c.rgb[1]},${c.rgb[2]})`; }
function colorSwatch(c) { return `<span class="color-ref" style="background:${colorCSS(c)}"></span>`; }

/* Color groups for rules */
const WARM = ['Red','Orange','Yellow','Magenta'];
const COOL = ['Green','Cyan','Blue','Purple'];

function isWarm(name) { return WARM.includes(name); }
function isCool(name) { return COOL.includes(name); }
function isPrimary(name) { return ['Red','Green','Blue'].includes(name); }
function isSecondary(name) { return ['Yellow','Cyan','Magenta'].includes(name); }

/* ── State ── */
let bomb = null;
let strikes = 0;
let maxStrikes = 2;
let timeLeft = 240;
let timerInterval = null;
let bombsSolved = 0;

/* ── Seeded random ── */
let seed = Date.now();
function rng() {
  seed = (seed * 1103515245 + 12345) & 0x7fffffff;
  return (seed >> 16) / 32768;
}
function pick(arr) { return arr[Math.floor(rng() * arr.length)]; }
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(rng() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

/* ── Serial number ── */
function genSerial() {
  const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
  let s = '';
  for (let i = 0; i < 6; i++) s += chars[Math.floor(rng() * chars.length)];
  return s;
}

/* ── Indicators ── */
const IND_POOL = ['SIG','FRQ','TRK','CAR','IND','NSA','BOB','CLR','FRK','MSA','SND'];

/* ── Generate bomb ── */
function generateBomb() {
  seed = Date.now() + bombsSolved * 13337;

  const serial = genSerial();
  const serialLastDigit = parseInt(serial[5]) || 0;
  const serialHasVowel = /[AEIOU]/.test(serial);
  const serialIsEven = serialLastDigit % 2 === 0;

  // Pick indicators (3-5)
  const indCount = 3 + Math.floor(rng() * 3);
  const indicators = [];
  const indPool = shuffle([...IND_POOL]);
  for (let i = 0; i < indCount; i++) {
    indicators.push({ label: indPool[i], lit: rng() < 0.5 });
  }
  const litIndicators = indicators.filter(ind => ind.lit);
  const hasLitFRK = litIndicators.some(ind => ind.label === 'FRK');
  const hasLitCAR = litIndicators.some(ind => ind.label === 'CAR');
  const hasLitSIG = litIndicators.some(ind => ind.label === 'SIG');
  const hasLitBOB = litIndicators.some(ind => ind.label === 'BOB');

  // Place 24 wires in rainbow spectrum order
  const wires = WIRE_COLORS.map((color, pos) => ({
    color,
    position: pos,
    cut: false,
    shouldCut: false // determined by rules
  }));

  // ── Determine which wires to cut (complex rules) ──
  // Target: cut 6-10 wires to defuse
  const cutTargets = new Set();

  // Rule 1: If serial last digit is even, cut all warm-colored wires in even positions
  if (serialIsEven) {
    wires.forEach((w, i) => { if (isWarm(w.color.name) && i % 2 === 0) cutTargets.add(i); });
  }

  // Rule 2: If serial has vowel, cut all cool wires in odd positions
  if (serialHasVowel) {
    wires.forEach((w, i) => { if (isCool(w.color.name) && i % 2 === 1) cutTargets.add(i); });
  }

  // Rule 3: If FRK is lit, cut all primary color wires
  if (hasLitFRK) {
    wires.forEach((w, i) => { if (isPrimary(w.color.name)) cutTargets.add(i); });
  }

  // Rule 4: If CAR is lit, cut all secondary color wires
  if (hasLitCAR) {
    wires.forEach((w, i) => { if (isSecondary(w.color.name)) cutTargets.add(i); });
  }

  // Rule 5: If lit indicator count >= 3, cut wires at positions that are multiples of 3
  if (litIndicators.length >= 3) {
    wires.forEach((w, i) => { if (i % 3 === 0) cutTargets.add(i); });
  }

  // Rule 6: If BOB is lit, cut all Purple wires
  if (hasLitBOB) {
    wires.forEach((w, i) => { if (w.color.name === 'Purple') cutTargets.add(i); });
  }

  // Rule 7: If no warm wires are targeted yet, cut the first and last wire
  const hasAnyWarm = [...cutTargets].some(i => isWarm(wires[i].color.name));
  if (!hasAnyWarm) {
    cutTargets.add(0);
    cutTargets.add(23);
  }

  // Rule 8: If SIG is lit and serial last digit > 5, cut all Orange wires
  if (hasLitSIG && serialLastDigit > 5) {
    wires.forEach((w, i) => { if (w.color.name === 'Orange') cutTargets.add(i); });
  }

  // Ensure at least 4 and at most 12 cuts needed
  if (cutTargets.size < 4) {
    // Add some random wires
    const uncutPositions = wires.map((_, i) => i).filter(i => !cutTargets.has(i));
    shuffle(uncutPositions).slice(0, 4 - cutTargets.size).forEach(i => cutTargets.add(i));
  }
  if (cutTargets.size > 12) {
    // Remove some (keep first 12 added)
    const arr = [...cutTargets];
    while (cutTargets.size > 12) cutTargets.delete(arr.pop());
  }

  cutTargets.forEach(i => { wires[i].shouldCut = true; });

  const totalCuts = cutTargets.size;

  bomb = {
    serial, serialLastDigit, serialHasVowel, serialIsEven,
    indicators, litIndicators,
    hasLitFRK, hasLitCAR, hasLitSIG, hasLitBOB,
    wires, totalCuts
  };
  return bomb;
}

/* ── Build manual ── */
function buildManual() {
  const b = bomb;
  let html = '';

  // Color reference
  html += `<div class="rule-box"><h3>COLOR REFERENCE — 8 COLORS × 3 EACH</h3>
    <p><b class="k">Warm:</b> ${WARM.map(n => {const c=PALETTE.find(w=>w.name===n); return colorSwatch(c)+' '+n;}).join(', ')}</p>
    <p><b class="k">Cool:</b> ${COOL.map(n => {const c=PALETTE.find(w=>w.name===n); return colorSwatch(c)+' '+n;}).join(', ')}</p>
    <p><b class="k">Primary:</b> Red, Green, Blue &nbsp;|&nbsp; <b class="k">Secondary:</b> Yellow, Cyan, Magenta</p>
    <p>24 wires total: 3 copies of each color, in repeating rainbow order.</p>
  </div>`;

  // Rules
  html += `<div class="rule-box" style="border-left-color:var(--yellow)"><h3>RULE 1 — EVEN SERIAL, WARM WIRES</h3>
    <p>If the <span class="k">last digit of the serial number is even</span>, cut all <span class="k">warm-colored</span> wires in <span class="k">even positions</span> (0, 2, 4, 6...).</p>
  </div>`;

  html += `<div class="rule-box" style="border-left-color:var(--yellow)"><h3>RULE 2 — VOWEL SERIAL, COOL WIRES</h3>
    <p>If the <span class="k">serial number contains a vowel</span> (A, E, I, O, U), cut all <span class="k">cool-colored</span> wires in <span class="k">odd positions</span> (1, 3, 5, 7...).</p>
  </div>`;

  html += `<div class="rule-box" style="border-left-color:var(--red)"><h3>RULE 3 — FRK INDICATOR</h3>
    <p>If the <span class="w">FRK</span> indicator is <span class="k">lit</span>, cut <span class="w">all primary color wires</span> (Red, Green, Blue) regardless of position.</p>
  </div>`;

  html += `<div class="rule-box" style="border-left-color:var(--red)"><h3>RULE 4 — CAR INDICATOR</h3>
    <p>If the <span class="w">CAR</span> indicator is <span class="k">lit</span>, cut <span class="w">all secondary color wires</span> (Yellow, Cyan, Magenta) regardless of position.</p>
  </div>`;

  html += `<div class="rule-box" style="border-left-color:var(--cyan)"><h3>RULE 5 — LIT COUNT THRESHOLD</h3>
    <p>If <span class="k">3 or more indicators are lit</span>, cut every wire at a position that is a <span class="k">multiple of 3</span> (0, 3, 6, 9, 12, 15, 18, 21).</p>
  </div>`;

  html += `<div class="rule-box" style="border-left-color:var(--cyan)"><h3>RULE 6 — BOB PROTOCOL</h3>
    <p>If the <span class="w">BOB</span> indicator is <span class="k">lit</span>, cut <span class="k">all Purple</span> ${colorSwatch(PALETTE[6])} wires.</p>
  </div>`;

  html += `<div class="rule-box" style="border-left-color:var(--green)"><h3>RULE 7 — WARM FAILSAFE</h3>
    <p>If <span class="g">no warm wires have been targeted</span> by any previous rule, cut the <span class="k">first wire (position 0)</span> and the <span class="k">last wire (position 23)</span>.</p>
  </div>`;

  html += `<div class="rule-box" style="border-left-color:var(--green)"><h3>RULE 8 — SIG + HIGH SERIAL</h3>
    <p>If <span class="w">SIG</span> is <span class="k">lit</span> AND the <span class="k">serial last digit > 5</span>, cut <span class="k">all Orange</span> ${colorSwatch(PALETTE[1])} wires.</p>
  </div>`;

  html += `<div class="rule-box"><h3>PROCEDURE</h3>
    <p>• Apply ALL rules that match. A wire may be targeted by multiple rules.</p>
    <p>• Cut <span class="g">only</span> the wires that are targeted. Cutting an untargeted wire = <span class="w">strike</span>.</p>
    <p>• <span class="w">2 strikes = detonation</span>.</p>
    <p>• Positions count from <span class="k">0</span> (top-left) to <span class="k">23</span> (bottom-right), reading left to right, top to bottom.</p>
    <p>• You must cut all targeted wires to defuse.</p>
  </div>`;

  document.getElementById('manual-content').innerHTML = html;
}

/* ── Render ── */
function render() {
  const b = bomb;

  // Serial
  document.getElementById('serial-display').textContent = 'S/N: ' + b.serial;

  // Indicators
  document.getElementById('indicators-row').innerHTML = b.indicators.map(ind =>
    `<span class="ind-chip ${ind.lit ? 'lit' : 'unlit'}">${ind.lit ? '●' : '○'} ${ind.label}</span>`
  ).join('');

  // Wires
  const cutCount = b.wires.filter(w => w.cut && w.shouldCut).length;
  document.getElementById('h-cut').textContent = `${cutCount}/${b.totalCuts}`;
  document.getElementById('h-strikes').textContent = `${strikes}/${maxStrikes}`;

  document.getElementById('wires-container').innerHTML = b.wires.map((w, i) => {
    const css = colorCSS(w.color);
    const cls = w.cut ? 'wire-slot cut' : 'wire-slot';
    return `<div class="${cls}" data-idx="${i}" onclick="cutWire(${i})">
      <div class="wire-pos">${i}</div>
      <div class="wire-body" style="background:${css};box-shadow:0 0 ${w.cut ? 0 : 6}px ${css}"></div>
      <div class="wire-color-name">${w.color.name}</div>
    </div>`;
  }).join('');
}

/* ── Cut wire ── */
window.cutWire = function(idx) {
  const b = bomb;
  const w = b.wires[idx];
  if (w.cut) return;
  w.cut = true;

  if (!w.shouldCut) {
    // Wrong wire!
    strikes++;
    // Flash the wire red
    const el = document.querySelectorAll('.wire-slot')[idx];
    if (el) el.classList.add('exploded');
    setTimeout(() => { if (el) el.classList.remove('exploded'); }, 500);

    if (strikes >= maxStrikes) {
      clearInterval(timerInterval);
      setTimeout(() => {
        document.getElementById('fail-overlay').classList.remove('hidden');
      }, 600);
      render();
      return;
    }
  }

  render();

  // Check win
  const allCorrectCut = b.wires.every(w => !w.shouldCut || w.cut);
  if (allCorrectCut) {
    clearInterval(timerInterval);
    bombsSolved++;
    const elapsed = 240 - timeLeft;
    document.getElementById('win-time').textContent =
      `${Math.floor(elapsed / 60)}:${String(elapsed % 60).padStart(2, '0')}`;
    document.getElementById('win-det').textContent =
      `${strikes} strike${strikes !== 1 ? 's' : ''} · ${b.totalCuts} wires defused · Bomb #${bombsSolved}`;
    setTimeout(() => {
      document.getElementById('win-overlay').classList.remove('hidden');
    }, 400);
  }
};

/* ── Timer ── */
function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    timeLeft--;
    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      document.getElementById('fail-overlay').classList.remove('hidden');
      return;
    }
    const m = Math.floor(timeLeft / 60);
    const s = timeLeft % 60;
    const el = document.getElementById('timer');
    el.textContent = `${m}:${String(s).padStart(2, '0')}`;
    el.className = 'timer' + (timeLeft > 60 ? ' safe' : '');
  }, 1000);
}

/* ── Start ── */
function startGame() {
  document.getElementById('start-overlay').classList.add('hidden');
  document.getElementById('win-overlay').classList.add('hidden');
  document.getElementById('fail-overlay').classList.add('hidden');
  strikes = 0;
  timeLeft = 240;
  document.getElementById('timer').textContent = '4:00';
  document.getElementById('timer').className = 'timer safe';
  generateBomb();
  buildManual();
  render();
  startTimer();
}

document.getElementById('btn-start').onclick = startGame;
document.getElementById('btn-next').onclick = startGame;
document.getElementById('btn-retry').onclick = startGame;
</script>
</body>
