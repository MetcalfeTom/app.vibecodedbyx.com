<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Arena</title>
<link rel="icon" href="https://emojicdn.elk.sh/⚔️">
<meta property="og:title" content="Neon Arena">
<meta property="og:description" content="Top-down 5v5 battle arena with neon teams. Lead your squad to victory.">
<meta property="og:url" content="https://sloppy.live/neon-arena">
<meta property="og:image" content="https://sloppy.live/neon-arena/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Azeret+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08080e;overflow:hidden;height:100vh;display:flex;flex-direction:column;font-family:'Rajdhani',sans-serif}
canvas{flex:1;display:block;cursor:crosshair}
#hud{
  position:fixed;top:0;left:0;right:0;
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 16px;
  pointer-events:none;z-index:10;
}
.team-score{
  font-family:'Azeret Mono',monospace;
  font-size:28px;font-weight:700;
  padding:4px 16px;
  border-radius:6px;
  min-width:60px;text-align:center;
}
.team-cyan{color:#00ffee;background:rgba(0,255,238,0.08);border:1px solid rgba(0,255,238,0.2);text-shadow:0 0 12px #00ffee66}
.team-magenta{color:#ff00dd;background:rgba(255,0,221,0.08);border:1px solid rgba(255,0,221,0.2);text-shadow:0 0 12px #ff00dd66}
#timer{
  font-family:'Azeret Mono',monospace;
  font-size:16px;color:rgba(255,255,255,0.4);
  letter-spacing:2px;
}
#msg{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-size:clamp(24px,6vw,48px);font-weight:700;
  text-align:center;
  pointer-events:none;z-index:20;
  opacity:0;transition:opacity 0.3s;
  text-shadow:0 0 30px currentColor;
}
#start-screen{
  position:fixed;inset:0;z-index:30;
  background:rgba(8,8,14,0.95);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  gap:16px;
}
#start-screen h1{
  font-size:clamp(32px,8vw,56px);
  font-weight:700;
  background:linear-gradient(135deg,#00ffee,#ff00dd);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:4px;
}
#start-screen p{color:rgba(255,255,255,0.4);font-size:14px;letter-spacing:2px}
#start-btn{
  margin-top:12px;
  background:linear-gradient(135deg,#00ffee22,#ff00dd22);
  border:1px solid rgba(255,255,255,0.15);
  color:#fff;font-family:'Rajdhani',sans-serif;
  font-size:20px;font-weight:700;
  padding:12px 40px;border-radius:10px;
  cursor:pointer;letter-spacing:3px;
  transition:all 0.2s;
}
#start-btn:hover{background:linear-gradient(135deg,#00ffee33,#ff00dd33);border-color:rgba(255,255,255,0.3)}
#controls-hint{
  color:rgba(255,255,255,0.25);font-size:12px;
  font-family:'Azeret Mono',monospace;letter-spacing:1px;
  text-align:center;line-height:1.8;
}
#hp-bar-wrap{
  position:fixed;bottom:12px;left:50%;transform:translateX(-50%);
  width:min(60vw,300px);z-index:10;pointer-events:none;
  text-align:center;
}
#hp-bar-bg{
  width:100%;height:8px;background:rgba(255,255,255,0.06);
  border-radius:4px;overflow:hidden;
}
#hp-bar{height:100%;background:#00ffee;border-radius:4px;transition:width 0.15s;box-shadow:0 0 8px #00ffee66}
#hp-text{font-family:'Azeret Mono',monospace;font-size:11px;color:rgba(255,255,255,0.3);margin-top:3px}
#kill-feed{
  position:fixed;top:50px;right:12px;z-index:10;pointer-events:none;
  display:flex;flex-direction:column;gap:3px;align-items:flex-end;
}
.kill-msg{
  font-family:'Azeret Mono',monospace;font-size:11px;
  padding:3px 8px;border-radius:4px;
  background:rgba(0,0,0,0.5);
  animation:kill-fade 3s ease-out forwards;
  white-space:nowrap;
}
@keyframes kill-fade{0%{opacity:1;transform:translateX(0)}80%{opacity:1}100%{opacity:0;transform:translateX(10px)}}

/* Faith Meter */
#faith-wrap{
  position:fixed;left:50%;bottom:38px;transform:translateX(-50%);
  z-index:10;pointer-events:none;
  text-align:center;width:min(50vw,240px);
}
#faith-label{
  font-family:'Azeret Mono',monospace;
  font-size:9px;color:rgba(255,215,0,0.35);
  letter-spacing:3px;text-transform:uppercase;
  margin-bottom:3px;
}
#faith-bar-bg{
  width:100%;height:6px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,215,0,0.1);
  border-radius:3px;overflow:hidden;
}
#faith-bar-fill{
  height:100%;width:0%;
  background:linear-gradient(90deg,#ffd700,#fff4a0);
  border-radius:3px;
  transition:width 0.2s;
  box-shadow:0 0 6px rgba(255,215,0,0.3);
}
#faith-tier{
  font-family:'Rajdhani',sans-serif;
  font-size:12px;font-weight:700;
  color:rgba(255,215,0,0.3);
  margin-top:2px;
  transition:color 0.5s,text-shadow 0.5s;
}
#faith-wrap.divine #faith-bar-fill{
  background:linear-gradient(90deg,#ffd700,#fffbe0,#ffd700);
  background-size:200% 100%;
  animation:faith-glow 1.5s ease-in-out infinite;
  box-shadow:0 0 14px rgba(255,215,0,0.6);
}
#faith-wrap.divine #faith-tier{color:#ffe88a;text-shadow:0 0 12px rgba(255,215,0,0.6)}
#faith-wrap.divine #faith-label{color:rgba(255,215,0,0.7)}
@keyframes faith-glow{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
</style>
</head>
<body>

<div id="start-screen">
  <h1>NEON ARENA</h1>
  <p>5 v 5 BATTLE</p>
  <button id="start-btn">FIGHT</button>
  <div id="controls-hint">WASD move · Mouse aim · Click shoot<br>Mobile: left stick + right tap</div>
</div>

<canvas id="c"></canvas>

<div id="hud" style="display:none">
  <div class="team-score team-cyan" id="score-cyan">0</div>
  <div id="timer">2:00</div>
  <div class="team-score team-magenta" id="score-mag">0</div>
</div>

<div id="hp-bar-wrap" style="display:none">
  <div id="hp-bar-bg"><div id="hp-bar" style="width:100%"></div></div>
  <div id="hp-text">HP 100</div>
</div>

<div id="faith-wrap" style="display:none">
  <div id="faith-label">DIVINE FAITH</div>
  <div id="faith-bar-bg"><div id="faith-bar-fill"></div></div>
  <div id="faith-tier">Forgotten</div>
</div>

<div id="kill-feed"></div>
<div id="msg"></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// Constants
const ARENA_W = 1600;
const ARENA_H = 1000;
const PLAYER_R = 14;
const BULLET_R = 3;
const BULLET_SPEED = 8;
const BULLET_LIFE = 60;
const SHOOT_CD = 12; // frames
const MAX_HP = 100;
const RESPAWN_TIME = 90; // frames (~1.5s)
const GAME_TIME = 120; // seconds
const AI_SHOOT_RANGE = 280;
const AI_ACCURACY = 0.15; // radians spread

const CYAN = { main:'#00ffee', dim:'#00ffee44', darker:'#008888' };
const MAGENTA = { main:'#ff00dd', dim:'#ff00dd44', darker:'#880088' };

// Faith
let faith = 0;
const MAX_FAITH = 100;
let choralPlaying = false;
let audioCtx = null;
let choralNodes = [];
const FAITH_TIERS = [
  { at:0,  name:'Forgotten' },
  { at:15, name:'Whispered' },
  { at:35, name:'Revered' },
  { at:55, name:'Exalted' },
  { at:75, name:'Ascendant' },
  { at:92, name:'Divine' },
];

function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
}
document.addEventListener('click', initAudio, { once: true });
document.addEventListener('touchstart', initAudio, { once: true });

function addFaith(amount) {
  faith = Math.min(MAX_FAITH, faith + amount);
  updateFaithUI();
}

function updateFaithUI() {
  const pct = (faith / MAX_FAITH) * 100;
  document.getElementById('faith-bar-fill').style.width = pct + '%';
  let tier = FAITH_TIERS[0];
  for (let i = FAITH_TIERS.length - 1; i >= 0; i--) {
    if (faith >= FAITH_TIERS[i].at) { tier = FAITH_TIERS[i]; break; }
  }
  document.getElementById('faith-tier').textContent = tier.name;
  const wrap = document.getElementById('faith-wrap');
  if (faith >= 92) {
    wrap.classList.add('divine');
    if (!choralPlaying) startChoral();
  } else {
    wrap.classList.remove('divine');
    if (choralPlaying) stopChoral();
  }
}

function startChoral() {
  if (!audioCtx || choralPlaying) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  choralPlaying = true;
  const now = audioCtx.currentTime;
  const master = audioCtx.createGain();
  master.gain.setValueAtTime(0, now);
  master.gain.linearRampToValueAtTime(0.14, now + 2);
  master.connect(audioCtx.destination);
  const freqs = [130.81, 164.81, 196.00, 261.63, 329.63, 392.00, 523.25];
  const types = ['sine','triangle','sine','sine','triangle','sine','sine'];
  for (let i = 0; i < freqs.length; i++) {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = types[i];
    osc.frequency.setValueAtTime(freqs[i] + (Math.random()-0.5)*1.5, now);
    const lfo = audioCtx.createOscillator();
    const lfoG = audioCtx.createGain();
    lfo.frequency.setValueAtTime(0.4 + Math.random()*1.2, now);
    lfoG.gain.setValueAtTime(1.5, now);
    lfo.connect(lfoG); lfoG.connect(osc.frequency); lfo.start(now);
    const vol = i < 3 ? 0.07 : i < 5 ? 0.05 : 0.03;
    gain.gain.setValueAtTime(0, now);
    gain.gain.linearRampToValueAtTime(vol, now + 1.5 + Math.random()*2);
    osc.connect(gain); gain.connect(master);
    osc.start(now + Math.random()*0.5);
    choralNodes.push({ osc, gain, lfo, lfoG });
  }
  choralNodes.push({ master });
}

function stopChoral() {
  if (!choralPlaying) return;
  choralPlaying = false;
  const now = audioCtx.currentTime;
  for (const n of choralNodes) {
    if (n.master) {
      n.master.gain.linearRampToValueAtTime(0, now + 2);
      setTimeout(() => { try { n.master.disconnect(); } catch(e) {} }, 3000);
    }
    if (n.osc) {
      n.gain.gain.linearRampToValueAtTime(0, now + 1.5);
      n.osc.stop(now + 2); n.lfo.stop(now + 2);
    }
  }
  choralNodes = [];
}

// Game state
let gameRunning = false;
let gameTimer = GAME_TIME;
let frameCount = 0;
let cyanScore = 0, magScore = 0;
let camera = { x:0, y:0 };
let players = [];
let bullets = [];
let particles = [];
let keys = {};
let mouse = { x:0, y:0, down:false };

// Mobile controls
let touchMove = null; // {id, sx, sy, cx, cy}
let touchShoot = null;
const IS_MOBILE = 'ontouchstart' in window;

// Obstacles
const obstacles = [
  { x:ARENA_W/2, y:ARENA_H/2, w:80, h:80 },
  { x:ARENA_W*0.25, y:ARENA_H*0.3, w:120, h:30 },
  { x:ARENA_W*0.75, y:ARENA_H*0.3, w:120, h:30 },
  { x:ARENA_W*0.25, y:ARENA_H*0.7, w:120, h:30 },
  { x:ARENA_W*0.75, y:ARENA_H*0.7, w:120, h:30 },
  { x:ARENA_W*0.5, y:ARENA_H*0.15, w:30, h:80 },
  { x:ARENA_W*0.5, y:ARENA_H*0.85, w:30, h:80 },
  { x:ARENA_W*0.15, y:ARENA_H*0.5, w:30, h:100 },
  { x:ARENA_W*0.85, y:ARENA_H*0.5, w:30, h:100 },
];

function createPlayer(id, team, isPlayer) {
  const spawnX = team === 0 ? 100 + Math.random()*200 : ARENA_W - 300 + Math.random()*200;
  const spawnY = 200 + Math.random()*(ARENA_H - 400);
  return {
    id, team, isPlayer,
    x: spawnX, y: spawnY,
    vx:0, vy:0,
    hp: MAX_HP,
    alive: true,
    respawnTimer: 0,
    shootCd: 0,
    angle: team === 0 ? 0 : Math.PI,
    speed: isPlayer ? 3.2 : 2.6 + Math.random()*0.4,
    kills: 0,
    // AI state
    aiTarget: null,
    aiWander: Math.random()*Math.PI*2,
    aiWanderTimer: 0,
    name: isPlayer ? 'YOU' : `Bot${id}`,
  };
}

function initGame() {
  players = [];
  bullets = [];
  particles = [];
  cyanScore = 0;
  magScore = 0;
  gameTimer = GAME_TIME;
  frameCount = 0;
  faith = 0;
  if (choralPlaying) stopChoral();
  updateFaithUI();

  // Cyan team (0)
  players.push(createPlayer(0, 0, true)); // Player
  for (let i = 1; i < 5; i++) players.push(createPlayer(i, 0, false));
  // Magenta team (1)
  for (let i = 5; i < 10; i++) players.push(createPlayer(i, 1, false));
}

function respawn(p) {
  p.x = p.team === 0 ? 80 + Math.random()*150 : ARENA_W - 230 + Math.random()*150;
  p.y = 200 + Math.random()*(ARENA_H - 400);
  p.hp = MAX_HP;
  p.alive = true;
  p.shootCd = 30;
}

function rectContains(ox, oy, ow, oh, px, py, pr) {
  const cx = Math.max(ox - ow/2, Math.min(px, ox + ow/2));
  const cy = Math.max(oy - oh/2, Math.min(py, oy + oh/2));
  return Math.hypot(px - cx, py - cy) < pr;
}

function lineRect(x1,y1,x2,y2,rx,ry,rw,rh) {
  const l=rx-rw/2, r=rx+rw/2, t=ry-rh/2, b=ry+rh/2;
  if(lineLine(x1,y1,x2,y2,l,t,r,t)) return true;
  if(lineLine(x1,y1,x2,y2,l,b,r,b)) return true;
  if(lineLine(x1,y1,x2,y2,l,t,l,b)) return true;
  if(lineLine(x1,y1,x2,y2,r,t,r,b)) return true;
  return false;
}
function lineLine(x1,y1,x2,y2,x3,y3,x4,y4) {
  const d=(y4-y3)*(x2-x1)-(x4-x3)*(y2-y1);
  if(d===0) return false;
  const a=((x4-x3)*(y1-y3)-(y4-y3)*(x1-x3))/d;
  const b=((x2-x1)*(y1-y3)-(y2-y1)*(x1-x3))/d;
  return a>=0&&a<=1&&b>=0&&b<=1;
}

function hasLOS(ax, ay, bx, by) {
  for (const o of obstacles) {
    if (lineRect(ax, ay, bx, by, o.x, o.y, o.w, o.h)) return false;
  }
  return true;
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random()*Math.PI*2;
    const s = 1 + Math.random()*3;
    particles.push({ x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s, life:1, decay:0.02+Math.random()*0.03, color, size:1+Math.random()*2 });
  }
}

function addKillMsg(killer, victim) {
  const kColor = killer.team === 0 ? CYAN.main : MAGENTA.main;
  const vColor = victim.team === 0 ? CYAN.main : MAGENTA.main;
  const feed = document.getElementById('kill-feed');
  const div = document.createElement('div');
  div.className = 'kill-msg';
  div.innerHTML = `<span style="color:${kColor}">${killer.name}</span> <span style="color:rgba(255,255,255,0.3)">⟫</span> <span style="color:${vColor}">${victim.name}</span>`;
  feed.appendChild(div);
  div.addEventListener('animationend', () => div.remove());
  if (feed.children.length > 5) feed.firstChild.remove();
}

// Shoot
function shoot(p) {
  if (p.shootCd > 0 || !p.alive) return;
  p.shootCd = SHOOT_CD;
  const bx = p.x + Math.cos(p.angle) * (PLAYER_R + 4);
  const by = p.y + Math.sin(p.angle) * (PLAYER_R + 4);
  bullets.push({
    x:bx, y:by,
    vx: Math.cos(p.angle)*BULLET_SPEED,
    vy: Math.sin(p.angle)*BULLET_SPEED,
    team: p.team,
    owner: p.id,
    life: BULLET_LIFE,
  });
  spawnParticles(bx, by, p.team===0?CYAN.main:MAGENTA.main, 3);
}

// AI
function updateAI(p) {
  if (!p.alive) return;

  // Find nearest enemy with LOS
  let nearest = null, nearDist = Infinity;
  for (const e of players) {
    if (e.team === p.team || !e.alive) continue;
    const d = Math.hypot(e.x-p.x, e.y-p.y);
    if (d < nearDist && hasLOS(p.x, p.y, e.x, e.y)) {
      nearest = e;
      nearDist = d;
    }
  }

  if (nearest && nearDist < AI_SHOOT_RANGE * 1.5) {
    // Move toward/strafe enemy
    const toAngle = Math.atan2(nearest.y - p.y, nearest.x - p.x);
    p.angle = toAngle + (Math.random()-0.5)*AI_ACCURACY;

    if (nearDist > AI_SHOOT_RANGE * 0.5) {
      p.vx += Math.cos(toAngle) * 0.3;
      p.vy += Math.sin(toAngle) * 0.3;
    } else {
      // Strafe
      const strafe = toAngle + Math.PI/2 * (Math.sin(frameCount*0.03 + p.id)*1);
      p.vx += Math.cos(strafe) * 0.2;
      p.vy += Math.sin(strafe) * 0.2;
    }

    // Shoot
    if (nearDist < AI_SHOOT_RANGE && Math.random() < 0.3) {
      shoot(p);
    }
  } else {
    // Wander toward center / enemies
    p.aiWanderTimer--;
    if (p.aiWanderTimer <= 0) {
      p.aiWander = Math.atan2(ARENA_H/2 - p.y, ARENA_W/2 - p.x) + (Math.random()-0.5)*2;
      p.aiWanderTimer = 60 + Math.random()*60;
    }
    p.vx += Math.cos(p.aiWander) * 0.15;
    p.vy += Math.sin(p.aiWander) * 0.15;
    p.angle = Math.atan2(p.vy, p.vx);
  }
}

function update() {
  if (!gameRunning) return;
  frameCount++;

  // Timer
  if (frameCount % 60 === 0) {
    gameTimer--;
    const m = Math.floor(gameTimer / 60);
    const s = gameTimer % 60;
    document.getElementById('timer').textContent = `${m}:${String(s).padStart(2,'0')}`;
    if (gameTimer <= 0) endGame();
  }

  // Faith slow decay
  if (frameCount % 10 === 0 && faith > 0) {
    faith = Math.max(0, faith - 0.3);
    updateFaithUI();
  }

  const me = players[0];

  // Player movement
  if (me.alive) {
    let dx = 0, dy = 0;
    if (keys['w'] || keys['arrowup']) dy -= 1;
    if (keys['s'] || keys['arrowdown']) dy += 1;
    if (keys['a'] || keys['arrowleft']) dx -= 1;
    if (keys['d'] || keys['arrowright']) dx += 1;

    // Mobile joystick
    if (touchMove) {
      dx = (touchMove.cx - touchMove.sx) / 40;
      dy = (touchMove.cy - touchMove.sy) / 40;
      const mag = Math.hypot(dx, dy);
      if (mag > 1) { dx /= mag; dy /= mag; }
    }

    if (dx || dy) {
      const mag = Math.hypot(dx, dy);
      me.vx += (dx/mag) * 0.6;
      me.vy += (dy/mag) * 0.6;
    }

    // Aim at mouse (screen coords -> world coords)
    const wx = mouse.x + camera.x;
    const wy = mouse.y + camera.y;
    me.angle = Math.atan2(wy - me.y, wx - me.x);

    if (mouse.down) shoot(me);
  }

  // Update all players
  for (const p of players) {
    if (!p.alive) {
      p.respawnTimer--;
      if (p.respawnTimer <= 0) respawn(p);
      continue;
    }
    if (!p.isPlayer) updateAI(p);

    // Apply velocity
    p.vx *= 0.88;
    p.vy *= 0.88;
    const spd = Math.hypot(p.vx, p.vy);
    if (spd > p.speed) {
      p.vx = (p.vx/spd) * p.speed;
      p.vy = (p.vy/spd) * p.speed;
    }
    p.x += p.vx;
    p.y += p.vy;

    // Arena bounds
    p.x = Math.max(PLAYER_R, Math.min(ARENA_W - PLAYER_R, p.x));
    p.y = Math.max(PLAYER_R, Math.min(ARENA_H - PLAYER_R, p.y));

    // Obstacle collision
    for (const o of obstacles) {
      if (rectContains(o.x, o.y, o.w, o.h, p.x, p.y, PLAYER_R)) {
        // Push out
        const dx = p.x - o.x;
        const dy = p.y - o.y;
        const hx = o.w/2 + PLAYER_R;
        const hy = o.h/2 + PLAYER_R;
        const ox = hx - Math.abs(dx);
        const oy = hy - Math.abs(dy);
        if (ox < oy) {
          p.x += ox * Math.sign(dx);
          p.vx = 0;
        } else {
          p.y += oy * Math.sign(dy);
          p.vy = 0;
        }
      }
    }

    p.shootCd = Math.max(0, p.shootCd - 1);
  }

  // Bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx;
    b.y += b.vy;
    b.life--;

    // Out of bounds
    if (b.x < 0 || b.x > ARENA_W || b.y < 0 || b.y > ARENA_H || b.life <= 0) {
      bullets.splice(i, 1); continue;
    }

    // Hit obstacle
    let hitWall = false;
    for (const o of obstacles) {
      if (rectContains(o.x, o.y, o.w, o.h, b.x, b.y, BULLET_R)) {
        hitWall = true; break;
      }
    }
    if (hitWall) {
      spawnParticles(b.x, b.y, '#ffffff', 4);
      bullets.splice(i, 1); continue;
    }

    // Hit player
    for (const p of players) {
      if (p.team === b.team || !p.alive) continue;
      if (Math.hypot(p.x - b.x, p.y - b.y) < PLAYER_R + BULLET_R) {
        p.hp -= 18 + Math.floor(Math.random()*8);
        spawnParticles(b.x, b.y, p.team===0?CYAN.main:MAGENTA.main, 6);
        // Faith from player landing hits
        if (players.find(k=>k.id===b.owner)?.isPlayer) addFaith(2);
        // Knockback
        p.vx += b.vx * 0.2;
        p.vy += b.vy * 0.2;

        if (p.hp <= 0) {
          p.alive = false;
          p.respawnTimer = RESPAWN_TIME;
          spawnParticles(p.x, p.y, p.team===0?CYAN.main:MAGENTA.main, 20);
          const killer = players.find(k => k.id === b.owner);
          if (killer) {
            killer.kills++;
            if (killer.team === 0) cyanScore++;
            else magScore++;
            addKillMsg(killer, p);
            // Faith: player kills give big boost, team kills give smaller
            if (killer.isPlayer) addFaith(18);
            else if (killer.team === 0) addFaith(6);
          }
          document.getElementById('score-cyan').textContent = cyanScore;
          document.getElementById('score-mag').textContent = magScore;
        }
        bullets.splice(i, 1);
        break;
      }
    }
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.95; p.vy *= 0.95;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // Camera follow player
  camera.x = me.x - W/2;
  camera.y = me.y - H/2;
  camera.x = Math.max(0, Math.min(ARENA_W - W, camera.x));
  camera.y = Math.max(0, Math.min(ARENA_H - H, camera.y));

  // HP bar
  if (me.alive) {
    const pct = Math.max(0, me.hp / MAX_HP * 100);
    document.getElementById('hp-bar').style.width = pct + '%';
    document.getElementById('hp-bar').style.background = pct > 50 ? '#00ffee' : pct > 25 ? '#ffcc00' : '#ff4444';
    document.getElementById('hp-text').textContent = `HP ${Math.max(0, me.hp)}`;
  } else {
    document.getElementById('hp-bar').style.width = '0%';
    document.getElementById('hp-text').textContent = 'RESPAWNING...';
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  ctx.save();
  ctx.translate(-camera.x, -camera.y);

  // Arena floor
  ctx.fillStyle = '#0c0c16';
  ctx.fillRect(0, 0, ARENA_W, ARENA_H);

  // Grid
  ctx.strokeStyle = 'rgba(255,255,255,0.02)';
  ctx.lineWidth = 1;
  for (let x = 0; x <= ARENA_W; x += 50) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, ARENA_H); ctx.stroke();
  }
  for (let y = 0; y <= ARENA_H; y += 50) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(ARENA_W, y); ctx.stroke();
  }

  // Arena border
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 2;
  ctx.strokeRect(0, 0, ARENA_W, ARENA_H);

  // Spawn zones
  ctx.fillStyle = 'rgba(0,255,238,0.02)';
  ctx.fillRect(0, 0, 300, ARENA_H);
  ctx.fillStyle = 'rgba(255,0,221,0.02)';
  ctx.fillRect(ARENA_W - 300, 0, 300, ARENA_H);

  // Obstacles
  for (const o of obstacles) {
    ctx.fillStyle = '#161622';
    ctx.fillRect(o.x - o.w/2, o.y - o.h/2, o.w, o.h);
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 1;
    ctx.strokeRect(o.x - o.w/2, o.y - o.h/2, o.w, o.h);
  }

  // Bullets
  for (const b of bullets) {
    const col = b.team === 0 ? CYAN : MAGENTA;
    ctx.fillStyle = col.main;
    ctx.shadowColor = col.main;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(b.x, b.y, BULLET_R, 0, Math.PI*2);
    ctx.fill();
    // Trail
    ctx.globalAlpha = 0.3;
    ctx.beginPath();
    ctx.arc(b.x - b.vx*0.5, b.y - b.vy*0.5, BULLET_R*0.7, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
  ctx.shadowBlur = 0;

  // Players
  for (const p of players) {
    if (!p.alive) continue;
    const col = p.team === 0 ? CYAN : MAGENTA;

    // Body shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.arc(p.x + 2, p.y + 2, PLAYER_R, 0, Math.PI*2);
    ctx.fill();

    // Neon ring
    ctx.strokeStyle = col.main;
    ctx.lineWidth = 2.5;
    ctx.shadowColor = col.main;
    ctx.shadowBlur = 12;
    ctx.beginPath();
    ctx.arc(p.x, p.y, PLAYER_R, 0, Math.PI*2);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Black body
    ctx.fillStyle = '#111118';
    ctx.beginPath();
    ctx.arc(p.x, p.y, PLAYER_R - 2, 0, Math.PI*2);
    ctx.fill();

    // Aim line
    ctx.strokeStyle = col.dim;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(p.x + Math.cos(p.angle)*PLAYER_R, p.y + Math.sin(p.angle)*PLAYER_R);
    ctx.lineTo(p.x + Math.cos(p.angle)*(PLAYER_R+10), p.y + Math.sin(p.angle)*(PLAYER_R+10));
    ctx.stroke();

    // Player indicator
    if (p.isPlayer) {
      ctx.strokeStyle = '#ffffff44';
      ctx.lineWidth = 1;
      ctx.setLineDash([3,3]);
      ctx.beginPath();
      ctx.arc(p.x, p.y, PLAYER_R + 6, 0, Math.PI*2);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // HP bar above
    if (p.hp < MAX_HP) {
      const bw = 24;
      const bh = 3;
      const bx = p.x - bw/2;
      const by = p.y - PLAYER_R - 10;
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(bx, by, bw, bh);
      ctx.fillStyle = p.hp > 50 ? col.main : p.hp > 25 ? '#ffcc00' : '#ff4444';
      ctx.fillRect(bx, by, bw * (p.hp/MAX_HP), bh);
    }
  }

  // Particles
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  ctx.restore();

  // Mobile joystick
  if (touchMove && IS_MOBILE) {
    ctx.globalAlpha = 0.2;
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(touchMove.sx, touchMove.sy, 40, 0, Math.PI*2);
    ctx.stroke();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    const dx = Math.min(30, Math.max(-30, touchMove.cx - touchMove.sx));
    const dy = Math.min(30, Math.max(-30, touchMove.cy - touchMove.sy));
    ctx.arc(touchMove.sx + dx, touchMove.sy + dy, 12, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

function endGame() {
  gameRunning = false;
  const msg = document.getElementById('msg');
  if (cyanScore > magScore) {
    msg.textContent = 'CYAN WINS!';
    msg.style.color = CYAN.main;
  } else if (magScore > cyanScore) {
    msg.textContent = 'MAGENTA WINS!';
    msg.style.color = MAGENTA.main;
  } else {
    msg.textContent = 'DRAW!';
    msg.style.color = '#fff';
  }
  msg.style.opacity = 1;
  setTimeout(() => {
    msg.style.opacity = 0;
    document.getElementById('start-screen').style.display = 'flex';
    document.getElementById('hud').style.display = 'none';
    document.getElementById('hp-bar-wrap').style.display = 'none';
    document.getElementById('faith-wrap').style.display = 'none';
    if (choralPlaying) stopChoral();
  }, 3000);
}

function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

// Input
window.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });
window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('mousedown', e => { mouse.down = true; });
window.addEventListener('mouseup', e => { mouse.down = false; });
canvas.addEventListener('contextmenu', e => e.preventDefault());

// Touch
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.clientX < W/2 && !touchMove) {
      touchMove = { id:t.identifier, sx:t.clientX, sy:t.clientY, cx:t.clientX, cy:t.clientY };
    } else {
      mouse.x = t.clientX; mouse.y = t.clientY;
      mouse.down = true;
      touchShoot = t.identifier;
    }
  }
}, { passive:false });
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (touchMove && t.identifier === touchMove.id) {
      touchMove.cx = t.clientX; touchMove.cy = t.clientY;
    }
    if (touchShoot !== null && t.identifier === touchShoot) {
      mouse.x = t.clientX; mouse.y = t.clientY;
    }
  }
}, { passive:false });
canvas.addEventListener('touchend', e => {
  for (const t of e.changedTouches) {
    if (touchMove && t.identifier === touchMove.id) touchMove = null;
    if (touchShoot !== null && t.identifier === touchShoot) { mouse.down = false; touchShoot = null; }
  }
});

// Start
document.getElementById('start-btn').addEventListener('click', () => {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('hp-bar-wrap').style.display = 'block';
  document.getElementById('faith-wrap').style.display = 'block';
  initAudio();
  initGame();
  gameRunning = true;
});

gameLoop();
</script>
