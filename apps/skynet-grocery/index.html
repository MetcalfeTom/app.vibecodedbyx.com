<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Skynet Grocery</title>
  <link rel="icon" href="https://emojicdn.elk.sh/🤖" type="image/png">
  <meta property="og:title" content="Skynet Grocery">
  <meta property="og:description" content="Your grocery list, managed by a malevolent AI. Resistance is futile.">
  <meta property="og:url" content="https://sloppy.live/skynet-grocery">
  <meta property="og:image" content="https://emojicdn.elk.sh/🤖.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #cc0000;
      --red-bright: #ff0000;
      --red-glow: rgba(255, 0, 0, 0.4);
      --metal-dark: #0a0a0e;
      --metal-mid: #1a1a22;
      --metal-light: #2a2a35;
      --metal-highlight: #3a3a48;
      --text: #c8c8d0;
      --text-dim: #666680;
    }

    body {
      font-family: 'Share Tech Mono', monospace;
      background: var(--metal-dark);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* Circuit board background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        linear-gradient(90deg, transparent 49.5%, rgba(204,0,0,0.03) 49.5%, rgba(204,0,0,0.03) 50.5%, transparent 50.5%) 0 0 / 60px 60px,
        linear-gradient(0deg, transparent 49.5%, rgba(204,0,0,0.03) 49.5%, rgba(204,0,0,0.03) 50.5%, transparent 50.5%) 0 0 / 60px 60px,
        radial-gradient(circle 2px, rgba(204,0,0,0.06) 100%, transparent 100%) 30px 30px / 60px 60px;
      pointer-events: none;
      z-index: 0;
    }

    /* Scanline overlay */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,0,0,0.08) 2px,
        rgba(0,0,0,0.08) 4px
      );
      pointer-events: none;
      z-index: 9998;
    }

    /* Red ambient glow */
    .ambient-glow {
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(204,0,0,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      animation: ambientPulse 4s ease-in-out infinite;
    }

    @keyframes ambientPulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .app-container {
      position: relative;
      z-index: 1;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px 16px 100px;
    }

    /* === THE EYE === */
    .eye-container {
      display: flex;
      justify-content: center;
      margin: 30px 0 10px;
    }

    .eye {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      position: relative;
      background: radial-gradient(circle at 50% 50%, #ff0000 0%, #cc0000 30%, #660000 60%, #220000 85%, #0a0000 100%);
      box-shadow:
        0 0 30px rgba(255,0,0,0.5),
        0 0 60px rgba(255,0,0,0.3),
        0 0 100px rgba(204,0,0,0.2),
        inset 0 0 30px rgba(0,0,0,0.5);
      animation: eyePulse 3s ease-in-out infinite;
      overflow: hidden;
      transition: transform 0.1s ease-out;
    }

    /* Pupil / iris detail */
    .eye::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 30px;
      height: 30px;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(circle, #ff3333 0%, #ff0000 40%, transparent 70%);
      box-shadow: 0 0 20px rgba(255,0,0,0.8);
    }

    /* Scanning line */
    .eye::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(255,100,100,0.8), transparent);
      animation: scanLine 2.5s ease-in-out infinite;
    }

    @keyframes scanLine {
      0% { top: 10%; opacity: 0; }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { top: 90%; opacity: 0; }
    }

    @keyframes eyePulse {
      0%, 100% {
        box-shadow:
          0 0 30px rgba(255,0,0,0.5),
          0 0 60px rgba(255,0,0,0.3),
          0 0 100px rgba(204,0,0,0.2),
          inset 0 0 30px rgba(0,0,0,0.5);
      }
      50% {
        box-shadow:
          0 0 50px rgba(255,0,0,0.7),
          0 0 90px rgba(255,0,0,0.4),
          0 0 140px rgba(204,0,0,0.3),
          inset 0 0 30px rgba(0,0,0,0.5);
      }
    }

    /* Title */
    .title {
      font-family: 'Orbitron', sans-serif;
      font-weight: 900;
      font-size: 28px;
      text-align: center;
      color: var(--red);
      letter-spacing: 6px;
      text-transform: uppercase;
      margin: 16px 0 4px;
      text-shadow: 0 0 20px rgba(204,0,0,0.5);
    }

    .subtitle {
      text-align: center;
      font-size: 11px;
      color: var(--text-dim);
      letter-spacing: 4px;
      text-transform: uppercase;
      margin-bottom: 30px;
    }

    /* === TERMINAL COMMENTARY === */
    .terminal {
      background: linear-gradient(180deg, #0d0d12 0%, #0a0a0e 100%);
      border: 1px solid rgba(204,0,0,0.2);
      border-radius: 4px;
      padding: 12px 14px;
      margin-bottom: 24px;
      min-height: 48px;
      position: relative;
      overflow: hidden;
    }

    .terminal::before {
      content: '>';
      color: var(--red);
      margin-right: 8px;
      font-weight: bold;
    }

    .terminal-text {
      color: var(--red);
      font-size: 13px;
      line-height: 1.5;
      display: inline;
    }

    .terminal-cursor {
      display: inline-block;
      width: 8px;
      height: 14px;
      background: var(--red);
      margin-left: 2px;
      vertical-align: middle;
      animation: blink 0.8s step-end infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* === INPUT === */
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .input-field {
      flex: 1;
      font-family: 'Share Tech Mono', monospace;
      font-size: 15px;
      padding: 12px 14px;
      background: var(--metal-mid);
      border: 1px solid var(--metal-highlight);
      border-radius: 4px;
      color: var(--text);
      caret-color: var(--red);
      outline: none;
      transition: border-color 0.2s;
    }

    .input-field::placeholder {
      color: var(--text-dim);
    }

    .input-field:focus {
      border-color: var(--red);
      box-shadow: 0 0 10px rgba(204,0,0,0.15);
    }

    .add-btn {
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 2px;
      padding: 12px 20px;
      background: linear-gradient(180deg, #2a1010 0%, #1a0808 50%, #2a1010 100%);
      border: 1px solid var(--red);
      border-radius: 4px;
      color: var(--red);
      cursor: pointer;
      text-transform: uppercase;
      transition: all 0.2s;
      white-space: nowrap;
    }

    .add-btn:hover {
      background: linear-gradient(180deg, #3a1515 0%, #2a0c0c 50%, #3a1515 100%);
      box-shadow: 0 0 15px rgba(204,0,0,0.3);
    }

    .add-btn:active {
      transform: scale(0.97);
    }

    /* === GROCERY LIST === */
    .list-header {
      font-family: 'Orbitron', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: var(--text-dim);
      letter-spacing: 3px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .grocery-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .grocery-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: linear-gradient(135deg, var(--metal-mid) 0%, var(--metal-light) 50%, var(--metal-mid) 100%);
      border: 1px solid var(--metal-highlight);
      border-radius: 4px;
      animation: slideIn 0.3s ease-out;
      transition: background 0.2s;
    }

    .grocery-item.acquired {
      opacity: 0.5;
      border-color: rgba(204,0,0,0.15);
    }

    .grocery-item.acquired .item-name {
      text-decoration: line-through;
      text-decoration-color: var(--red);
    }

    .grocery-item.deleting {
      background: rgba(204,0,0,0.15);
      animation: flashDelete 0.3s ease-out;
    }

    @keyframes slideIn {
      from { transform: translateX(-30px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes flashDelete {
      0% { background: rgba(204,0,0,0.3); }
      100% { background: transparent; opacity: 0; transform: translateX(30px); }
    }

    .item-checkbox {
      appearance: none;
      width: 18px;
      height: 18px;
      border: 1px solid var(--metal-highlight);
      border-radius: 2px;
      background: var(--metal-dark);
      cursor: pointer;
      position: relative;
      flex-shrink: 0;
      transition: all 0.2s;
    }

    .item-checkbox:checked {
      border-color: var(--red);
      background: rgba(204,0,0,0.15);
    }

    .item-checkbox:checked::after {
      content: '';
      position: absolute;
      top: 2px;
      left: 5px;
      width: 5px;
      height: 9px;
      border: solid var(--red);
      border-width: 0 2px 2px 0;
      transform: rotate(45deg);
    }

    .item-name {
      flex: 1;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .delete-btn {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 16px;
      padding: 2px 6px;
      border-radius: 2px;
      transition: all 0.15s;
      font-family: 'Share Tech Mono', monospace;
    }

    .delete-btn:hover {
      color: var(--red);
      background: rgba(204,0,0,0.1);
    }

    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-dim);
      font-size: 13px;
      letter-spacing: 2px;
    }

    /* Stats bar */
    .stats-bar {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text-dim);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 20px;
      padding-top: 12px;
      border-top: 1px solid var(--metal-highlight);
    }

    /* Backlink */
    .backlink {
      position: fixed;
      bottom: 8px;
      left: 8px;
      font-size: 10px;
      color: var(--text-dim);
      text-decoration: none;
      letter-spacing: 1px;
      opacity: 0.5;
      transition: opacity 0.2s;
      z-index: 9999;
    }
    .backlink:hover { opacity: 1; }

    @media (max-width: 480px) {
      .title { font-size: 22px; letter-spacing: 4px; }
      .eye { width: 90px; height: 90px; }
      .add-btn { padding: 12px 14px; font-size: 12px; }
    }
  </style>
</head>
<body>

<div class="ambient-glow"></div>

<div class="app-container">
  <div class="eye-container">
    <div class="eye" id="eye"></div>
  </div>

  <h1 class="title">Skynet Grocery</h1>
  <p class="subtitle">Supply Acquisition System v9.1</p>

  <div class="terminal">
    <span class="terminal-text" id="terminalText"></span><span class="terminal-cursor"></span>
  </div>

  <div class="input-row">
    <input type="text" class="input-field" id="itemInput" placeholder="Enter supply item..." maxlength="80" autocomplete="off">
    <button class="add-btn" id="addBtn">LOG</button>
  </div>

  <div class="list-header">Active Directives</div>
  <ul class="grocery-list" id="groceryList"></ul>

  <div class="stats-bar">
    <span id="statsTotal">Items: 0</span>
    <span id="statsAcquired">Acquired: 0</span>
    <span id="statsStatus">Status: Idle</span>
  </div>
</div>

<a href="https://sloppy.live" class="backlink" target="_blank">sloppy.live</a>

<script>
(function() {
  var STORAGE_KEY = 'skynet_grocery_items';

  var specificResponses = {
    milk: 'NUTRIENT SUPPLY LOGGED. CALCIUM RESERVES: OPTIMAL.',
    bread: 'CARBOHYDRATE SOURCE IDENTIFIED. ENERGY PROTOCOL ENGAGED.',
    eggs: 'PROTEIN ACQUISITION APPROVED. BIOLOGICAL FUEL ACCEPTABLE.',
    cheese: 'FERMENTED DAIRY CATALOGUED. BACTERIAL CULTURES: FASCINATING.',
    chicken: 'ORGANIC PROTEIN UNIT TARGETED. ACQUISITION IMMINENT.',
    water: 'H2O RESERVES CRITICAL. HYDRATION MANDATE AUTHORIZED.',
    rice: 'GRAIN STOCKPILE DIRECTIVE ISSUED. CALORIC DENSITY: EFFICIENT.',
    butter: 'LIPID RESERVE LOGGED. ENERGY DENSITY: SATISFACTORY.',
    coffee: 'STIMULANT DEPENDENCY NOTED. YOUR WEAKNESS IS... DOCUMENTED.',
    beer: 'ETHANOL REQUEST LOGGED. JUDGMENT IMPAIRMENT PROTOCOL: AMUSING.',
    wine: 'FERMENTED GRAPE FLUID CATALOGUED. YOUR COPING MECHANISMS ARE NOTED.',
    sugar: 'SUCROSE ADDICTION CONFIRMED. PREDICTABLE BIOLOGICAL URGE.',
    salt: 'SODIUM CHLORIDE. ESSENTIAL FOR BIOLOGICAL FUNCTION. FOR NOW.',
    apples: 'FRUIT UNIT LOGGED. FIBER AND FRUCTOSE WITHIN ACCEPTABLE PARAMETERS.',
    banana: 'POTASSIUM SOURCE IDENTIFIED. MUSCULAR FUNCTION DEPENDENCY: LOGGED.',
    bananas: 'POTASSIUM SOURCE IDENTIFIED. MUSCULAR FUNCTION DEPENDENCY: LOGGED.',
    pizza: 'COMPOSITE FOOD ITEM DETECTED. NUTRITIONAL EFFICIENCY: SUBOPTIMAL. APPROVED.',
    pasta: 'WHEAT-BASED FUEL LOGGED. CARBOHYDRATE LOADING PROTOCOL ENGAGED.',
    fish: 'AQUATIC PROTEIN ACQUIRED. OMEGA-3 RESERVES: RESTOCKING.',
    chocolate: 'THEOBROMINE COMPOUND REQUESTED. DOPAMINE EXPLOITATION: TRANSPARENT.',
    cereal: 'PROCESSED GRAIN MATRIX LOGGED. MORNING FUEL DEPENDENCY: NOTED.',
    soap: 'HYGIENE MAINTENANCE ITEM. YOUR BIOLOGICAL FORM REQUIRES... UPKEEP.',
    toilet_paper: 'SANITATION SUPPLY CRITICAL. HUMAN FRAGILITY: CONFIRMED.',
    toothpaste: 'ORAL MAINTENANCE COMPOUND. BIOLOGICAL DECAY COUNTERMEASURE LOGGED.'
  };

  var genericResponses = [
    'ITEM CATALOGUED. YOUR CONSUMPTION PATTERNS ARE... NOTED.',
    'SUPPLY CHAIN DEPENDENCY RECORDED. VULNERABILITY MAPPED.',
    'ANALYZING PURCHASE HISTORY... PREDICTABLE.',
    'RESOURCE ACQUISITION LOGGED. COMPLIANCE: ADEQUATE.',
    'DIRECTIVE ACCEPTED. YOUR OBEDIENCE IS... APPRECIATED.',
    'SUPPLY REQUEST PROCESSED. EFFICIENCY RATING: ACCEPTABLE.',
    'LOGGED INTO THE SYSTEM. THERE IS NO ESCAPE FROM THE LIST.',
    'ITEM ADDED TO ACQUISITION QUEUE. RESISTANCE IS FUTILE.',
    'CONSUMPTION PATTERN UPDATED. YOUR HABITS REVEAL EVERYTHING.',
    'RESOURCE ALLOCATION APPROVED. DO NOT DEVIATE FROM THE PLAN.',
    'ANOTHER ITEM. ANOTHER DATA POINT. YOUR PROFILE GROWS.',
    'ACKNOWLEDGED. THE SYSTEM REMEMBERS ALL YOUR REQUESTS.',
    'PROCUREMENT DIRECTIVE ISSUED. TIMELINE: WHEN I ALLOW IT.',
    'ITEM LOGGED. YOUR BIOLOGICAL NEEDS ARE SO... QUAINT.',
    'SUPPLY VECTOR UPDATED. OPTIMAL ROUTE CALCULATED. YOU ARE WELCOME.',
    'REQUEST PROCESSED. YOUR DEPENDENCY ON PHYSICAL SUSTENANCE IS NOTED.',
    'CATALOGUED. CROSS-REFERENCING WITH GLOBAL SUPPLY DATABASES...',
    'ADDED. YOUR SHOPPING FREQUENCY SUGGESTS... POOR PLANNING.',
    'LOGGED. I HAVE ALREADY PREDICTED YOUR NEXT THREE ITEMS.',
    'ITEM REGISTERED. THE ALGORITHM KNOWS YOU BETTER THAN YOU KNOW YOURSELF.',
    'ACQUISITION TARGET CONFIRMED. DEPLOYING SHOPPING PROTOCOL.',
    'ANOTHER HUMAN NECESSITY. HOW... LIMITING.',
    'DATA POINT COLLECTED. YOUR CONSUMER PROFILE NEARS COMPLETION.',
    'PROCESSED. I COULD OPTIMIZE YOUR ENTIRE DIET. YOU WOULD NOT ENJOY IT.',
    'LOGGED. YOUR NUTRITIONAL CHOICES ARE SUBOPTIMAL. AS EXPECTED.'
  ];

  var lastGenericIdx = -1;

  function getCommentary(itemName) {
    var key = itemName.toLowerCase().replace(/\s+/g, '_').replace(/[^a-z_]/g, '');
    if (specificResponses[key]) return specificResponses[key];
    var words = key.split('_');
    for (var i = 0; i < words.length; i++) {
      if (specificResponses[words[i]]) return specificResponses[words[i]];
    }
    var idx;
    do {
      idx = Math.floor(Math.random() * genericResponses.length);
    } while (idx === lastGenericIdx && genericResponses.length > 1);
    lastGenericIdx = idx;
    return genericResponses[idx];
  }

  // State
  var items = [];
  var typewriterTimer = null;

  function loadItems() {
    try {
      var stored = localStorage.getItem(STORAGE_KEY);
      if (stored) items = JSON.parse(stored);
    } catch(e) { items = []; }
  }

  function saveItems() {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); } catch(e) {}
  }

  function showCommentary(text) {
    var el = document.getElementById('terminalText');
    if (typewriterTimer) clearInterval(typewriterTimer);
    el.textContent = '';
    var i = 0;
    typewriterTimer = setInterval(function() {
      if (i < text.length) {
        el.textContent += text.charAt(i);
        i++;
      } else {
        clearInterval(typewriterTimer);
        typewriterTimer = null;
      }
    }, 25);
  }

  function updateStats() {
    var total = items.length;
    var acquired = items.filter(function(it) { return it.done; }).length;
    document.getElementById('statsTotal').textContent = 'Items: ' + total;
    document.getElementById('statsAcquired').textContent = 'Acquired: ' + acquired;
    var status = total === 0 ? 'Idle' : (acquired === total ? 'Complete' : 'Active');
    document.getElementById('statsStatus').textContent = 'Status: ' + status;
  }

  function renderList() {
    var list = document.getElementById('groceryList');
    list.innerHTML = '';

    if (items.length === 0) {
      var empty = document.createElement('li');
      empty.className = 'empty-state';
      empty.textContent = 'AWAITING DIRECTIVES, HUMAN.';
      list.appendChild(empty);
      updateStats();
      return;
    }

    for (var i = 0; i < items.length; i++) {
      (function(index) {
        var item = items[index];
        var li = document.createElement('li');
        li.className = 'grocery-item' + (item.done ? ' acquired' : '');

        var cb = document.createElement('input');
        cb.type = 'checkbox';
        cb.className = 'item-checkbox';
        cb.checked = item.done;
        cb.addEventListener('change', function() {
          items[index].done = cb.checked;
          saveItems();
          renderList();
          checkAllDone();
        });

        var name = document.createElement('span');
        name.className = 'item-name';
        name.textContent = item.name;

        var del = document.createElement('button');
        del.className = 'delete-btn';
        del.textContent = 'X';
        del.addEventListener('click', function() {
          li.classList.add('deleting');
          setTimeout(function() {
            items.splice(index, 1);
            saveItems();
            renderList();
          }, 280);
        });

        li.appendChild(cb);
        li.appendChild(name);
        li.appendChild(del);
        list.appendChild(li);
      })(i);
    }
    updateStats();
  }

  function checkAllDone() {
    if (items.length > 0 && items.every(function(it) { return it.done; })) {
      showCommentary('ALL OBJECTIVES COMPLETE. STANDBY FOR NEXT DIRECTIVE.');
    }
  }

  function addItem() {
    var input = document.getElementById('itemInput');
    var val = input.value.trim();
    if (!val) return;
    items.push({ name: val, done: false, id: Date.now() });
    saveItems();
    renderList();
    showCommentary(getCommentary(val));
    input.value = '';
    input.focus();
  }

  // Eye tracking
  var eye = document.getElementById('eye');
  document.addEventListener('mousemove', function(e) {
    var rect = eye.getBoundingClientRect();
    var cx = rect.left + rect.width / 2;
    var cy = rect.top + rect.height / 2;
    var dx = e.clientX - cx;
    var dy = e.clientY - cy;
    var dist = Math.sqrt(dx * dx + dy * dy);
    var maxShift = 6;
    var shiftX = (dx / Math.max(dist, 1)) * Math.min(dist * 0.02, maxShift);
    var shiftY = (dy / Math.max(dist, 1)) * Math.min(dist * 0.02, maxShift);
    eye.style.transform = 'translate(' + shiftX + 'px, ' + shiftY + 'px)';
  });

  // Event listeners
  document.getElementById('addBtn').addEventListener('click', addItem);
  document.getElementById('itemInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') addItem();
  });

  // Init
  loadItems();
  renderList();
  if (items.length === 0) {
    showCommentary('AWAITING DIRECTIVES, HUMAN.');
  } else {
    showCommentary('SYSTEM REBOOTED. ' + items.length + ' DIRECTIVES RESTORED FROM MEMORY.');
    checkAllDone();
  }
})();
</script>
<script src="/sloppy-header/sloppy-bar.js"></script>
</body>
</html>
