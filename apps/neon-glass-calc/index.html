<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Neon Glass Calc</title>
  <meta name="description" content="A glassmorphism calculator with neon accents that gently roasts you if you try to divide by zero.">
  <meta property="og:title" content="Neon Glass Calc">
  <meta property="og:description" content="Sleek frosted glass. Cyan + magenta neon. Will sass you if you divide by zero.">
  <meta property="og:url" content="https://sloppy.live/neon-glass-calc">
  <meta property="og:image" content="https://image.pollinations.ai/prompt/A%20glassmorphism%20calculator%20floating%20against%20a%20deep%20purple%20void,%20cyan%20and%20magenta%20neon%20glow,%20frosted%20glass%20panel,%20editorial%20product%20render?model=flux&seed=4040&width=1200&height=630&nologo=true">
  <link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%92%A0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Audiowide&family=JetBrains+Mono:wght@300;400;500&family=Major+Mono+Display&family=Caveat:wght@500&display=swap" rel="stylesheet">

  <style>
    :root {
      --void:    #06021c;
      --void-2:  #1a0838;
      --void-3:  #2a0530;
      --glass:   rgba(255,255,255,0.06);
      --glass-2: rgba(255,255,255,0.10);
      --glass-b: rgba(255,255,255,0.18);
      --ink:     #f4f0ff;
      --ink-dim: rgba(244,240,255,0.55);
      --cyan:    #5effff;
      --cyan-d:  #00d4ff;
      --magenta: #ff5eb8;
      --mag-d:   #ff2d8a;
      --gold:    #ffd966;
      --err:     #ff6680;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 100%; }
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 1.4rem 1rem;
      background: radial-gradient(ellipse at 20% 0%, #2a0c5a 0%, transparent 55%),
                  radial-gradient(ellipse at 100% 100%, #4a0a4a 0%, transparent 60%),
                  radial-gradient(ellipse at 50% 50%, #1a0838 0%, var(--void) 75%),
                  var(--void);
      color: var(--ink);
      font-family: 'JetBrains Mono', monospace;
      overflow: hidden;
      position: relative;
    }
    /* Floating neon orbs */
    body::before, body::after {
      content: '';
      position: fixed;
      width: 30rem; height: 30rem;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
      animation: orb-drift 18s ease-in-out infinite alternate;
    }
    body::before {
      top: -10rem; left: -8rem;
      background: radial-gradient(circle, var(--cyan), transparent 60%);
    }
    body::after {
      bottom: -12rem; right: -10rem;
      background: radial-gradient(circle, var(--magenta), transparent 60%);
      animation-delay: -9s;
    }
    @keyframes orb-drift {
      0%   { transform: translate(0, 0) scale(1); }
      100% { transform: translate(40px, -30px) scale(1.15); }
    }
    /* Faint grid behind everything */
    body > .grid {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        linear-gradient(rgba(94,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,94,184,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
    }
    main { position: relative; z-index: 1; width: 100%; max-width: 24rem; }

    /* ============ MASTHEAD ============ */
    header.mast {
      text-align: center;
      margin-bottom: 1rem;
    }
    header.mast .brand {
      font-family: 'Major Mono Display', monospace;
      font-size: 1.4rem;
      letter-spacing: 0.18em;
      background: linear-gradient(90deg, var(--cyan), var(--magenta));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 24px rgba(94,255,255,0.35);
    }
    header.mast .tag {
      display: block;
      font-family: 'Caveat', cursive;
      font-size: 1.1rem;
      color: var(--ink-dim);
      margin-top: 0.1rem;
      font-style: italic;
    }

    /* ============ GLASS PANEL ============ */
    .panel {
      background: var(--glass);
      backdrop-filter: blur(28px) saturate(140%);
      -webkit-backdrop-filter: blur(28px) saturate(140%);
      border: 1.5px solid var(--glass-b);
      border-radius: 22px;
      padding: 1.2rem 1rem 1rem;
      box-shadow:
        0 0 0 1px rgba(94,255,255,0.06) inset,
        0 0 70px rgba(94,255,255,0.12),
        0 0 60px rgba(255,94,184,0.12),
        0 20px 60px rgba(0,0,0,0.45);
      position: relative;
    }
    .panel::before {
      content: '';
      position: absolute; inset: 0;
      border-radius: 22px;
      pointer-events: none;
      background: linear-gradient(135deg, rgba(255,255,255,0.10) 0%, transparent 30%, transparent 70%, rgba(255,94,184,0.08) 100%);
    }

    /* ============ DISPLAY ============ */
    .display {
      padding: 0.9rem 0.4rem 0.7rem;
      min-height: 7.5rem;
      display: flex; flex-direction: column; justify-content: flex-end;
      text-align: right;
      position: relative;
      overflow: hidden;
    }
    .display .history {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 300;
      font-size: 0.8rem;
      color: var(--ink-dim);
      line-height: 1.3;
      letter-spacing: 0.04em;
      min-height: 1.3em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .display .number {
      font-family: 'Audiowide', monospace;
      font-size: clamp(2.6rem, 9vw, 3.8rem);
      line-height: 1;
      letter-spacing: -0.01em;
      background: linear-gradient(135deg, var(--cyan) 0%, #b39dff 50%, var(--magenta) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
      text-shadow: 0 0 28px rgba(94,255,255,0.35);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: filter 0.2s;
    }
    .display.error .number {
      background: linear-gradient(135deg, var(--err) 0%, var(--mag-d) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      animation: err-flicker 0.4s ease-out;
    }
    @keyframes err-flicker {
      0%, 100% { opacity: 1; }
      25%      { opacity: 0.4; transform: translateX(-2px); }
      50%      { opacity: 1; }
      75%      { opacity: 0.6; transform: translateX(2px); }
    }
    .display .roast {
      position: absolute;
      top: 0.4rem; left: 0.4rem; right: 0.4rem;
      font-family: 'Caveat', cursive;
      font-size: 1rem;
      font-style: italic;
      color: var(--err);
      text-align: left;
      text-shadow: 0 0 12px rgba(255,102,128,0.5);
      opacity: 0;
      transform: translateY(-8px);
      transition: opacity 0.4s, transform 0.4s;
      pointer-events: none;
    }
    .display .roast.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* ============ KEYPAD ============ */
    .pad {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
      margin-top: 0.5rem;
    }
    .key {
      appearance: none; -webkit-appearance: none;
      background: var(--glass-2);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.10);
      color: var(--ink);
      font-family: 'JetBrains Mono', monospace;
      font-weight: 400;
      font-size: 1.3rem;
      padding: 0.95rem 0.5rem;
      border-radius: 14px;
      cursor: pointer;
      min-height: 3.3rem;
      box-shadow:
        0 1px 0 rgba(255,255,255,0.10) inset,
        0 4px 14px -6px rgba(0,0,0,0.5);
      transition: transform 0.08s, background 0.14s, box-shadow 0.14s, border-color 0.14s;
      letter-spacing: -0.01em;
    }
    .key:hover {
      background: rgba(255,255,255,0.14);
      border-color: rgba(255,255,255,0.22);
    }
    .key:active {
      transform: translateY(1px);
      box-shadow: 0 0 0 inset, 0 0 0 rgba(0,0,0,0);
    }
    .key:focus-visible {
      outline: 2px solid var(--cyan);
      outline-offset: 3px;
    }
    .key.op {
      color: var(--cyan);
      border-color: rgba(94,255,255,0.32);
      box-shadow:
        0 0 0 1px rgba(94,255,255,0.12) inset,
        0 0 16px -8px var(--cyan),
        0 4px 14px -6px rgba(0,0,0,0.5);
    }
    .key.op:hover {
      background: rgba(94,255,255,0.12);
      border-color: rgba(94,255,255,0.55);
      box-shadow:
        0 0 0 1px rgba(94,255,255,0.22) inset,
        0 0 26px -4px var(--cyan),
        0 4px 14px -6px rgba(0,0,0,0.5);
    }
    .key.op.active {
      background: rgba(94,255,255,0.22);
      color: #fff;
      border-color: var(--cyan);
      box-shadow:
        0 0 0 1px rgba(94,255,255,0.5) inset,
        0 0 30px -2px var(--cyan),
        0 0 60px -10px var(--cyan);
    }
    .key.fn {
      color: var(--ink-dim);
      font-size: 1rem;
      font-weight: 500;
      letter-spacing: 0.04em;
    }
    .key.fn:hover { color: var(--ink); }
    .key.equals {
      background: linear-gradient(135deg, var(--mag-d), #ff6ee0);
      border-color: var(--magenta);
      color: #fff;
      font-size: 1.5rem;
      box-shadow:
        0 0 0 1px rgba(255,94,184,0.55) inset,
        0 0 22px -2px var(--magenta),
        0 0 48px -8px var(--magenta);
      text-shadow: 0 0 12px rgba(255,255,255,0.4);
    }
    .key.equals:hover {
      filter: brightness(1.12);
      box-shadow:
        0 0 0 1px rgba(255,255,255,0.65) inset,
        0 0 36px -2px var(--magenta),
        0 0 80px -10px var(--magenta);
    }
    .key.zero { grid-column: span 2; text-align: center; }

    /* ============ FOOTER NOTE ============ */
    .foot {
      text-align: center;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.7rem;
      color: var(--ink-dim);
      margin-top: 1.2rem;
      letter-spacing: 0.08em;
    }
    .foot kbd {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      padding: 0.16rem 0.4rem;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 4px;
      background: rgba(255,255,255,0.06);
      color: var(--ink);
      margin: 0 0.1rem;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition: none !important; }
    }
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
  </style>
</head>
<body>
  <div class="grid" aria-hidden="true"></div>
  <main>
    <header class="mast">
      <span class="brand">NEON · GLASS · CALC</span>
      <span class="tag">don't even think about dividing by zero</span>
    </header>

    <section class="panel">
      <section class="display" id="display" role="status" aria-live="polite" aria-atomic="true">
        <div class="roast" id="display-roast"></div>
        <div class="history" id="display-history">&nbsp;</div>
        <div class="number" id="display-number">0</div>
      </section>

      <section class="pad" id="pad" aria-label="Calculator keypad">
        <button type="button" class="key fn" data-act="ac">AC</button>
        <button type="button" class="key fn" data-act="neg">±</button>
        <button type="button" class="key fn" data-act="pct">%</button>
        <button type="button" class="key op" data-op="/">÷</button>

        <button type="button" class="key" data-num="7">7</button>
        <button type="button" class="key" data-num="8">8</button>
        <button type="button" class="key" data-num="9">9</button>
        <button type="button" class="key op" data-op="*">×</button>

        <button type="button" class="key" data-num="4">4</button>
        <button type="button" class="key" data-num="5">5</button>
        <button type="button" class="key" data-num="6">6</button>
        <button type="button" class="key op" data-op="-">−</button>

        <button type="button" class="key" data-num="1">1</button>
        <button type="button" class="key" data-num="2">2</button>
        <button type="button" class="key" data-num="3">3</button>
        <button type="button" class="key op" data-op="+">+</button>

        <button type="button" class="key zero" data-num="0">0</button>
        <button type="button" class="key" data-act="dot">.</button>
        <button type="button" class="key equals" data-act="eq">=</button>
      </section>
    </section>

    <p class="foot">
      <kbd>0–9</kbd> <kbd>+ − × ÷</kbd> <kbd>Enter</kbd> <kbd>⌫</kbd> <kbd>Esc</kbd>
    </p>
  </main>

  <script>
  (function(){
    'use strict';

    // ============================================================
    // DIVIDE-BY-ZERO ROAST POOL
    // ============================================================
    const ROASTS = [
      "Bold move. Mathematically inadvisable.",
      "Even math has limits. You found one.",
      "Zero said no. Respect zero.",
      "Division by zero — the universe folds its arms.",
      "We don't talk about that division.",
      "404: dividend not found in this dimension.",
      "You discovered infinity. It's heavier than you think.",
      "Mathematicians are visibly crying.",
      "Calculator declines. Sip your coffee.",
      "That's not math, that's a dare.",
      "Hard pass. Try a number greater than literally nothing.",
      "Nope. The void answers your call.",
      "Zero would rather be alone right now.",
      "Pythagoras left a voicemail. He's disappointed."
    ];

    // ============================================================
    // STATE
    // ============================================================
    const state = {
      current: '0',
      stored: null,
      op: null,
      justEvaluated: false,
      attemptedDivZero: false
    };
    const display  = document.getElementById('display');
    const numEl    = document.getElementById('display-number');
    const histEl   = document.getElementById('display-history');
    const roastEl  = document.getElementById('display-roast');

    // ============================================================
    // FORMATTING (thin-space thousands, trim trailing zeros)
    // ============================================================
    function formatNumber(s) {
      if (s === 'Error') return 'ERR';
      const n = Number(s);
      if (!isFinite(n)) return 'ERR';
      const inProgress = /[.]/.test(s) && /[.]\d*0+$|[.]$/.test(s);
      if (inProgress) {
        const [ip, fp] = s.split('.');
        const neg = ip.startsWith('-');
        const digits = neg ? ip.slice(1) : ip;
        const grouped = digits.replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
        return (neg ? '-' : '') + grouped + '.' + (fp || '');
      }
      let out;
      if (Math.abs(n) >= 1e15 || (n !== 0 && Math.abs(n) < 1e-6)) {
        out = n.toExponential(6).replace('e+', 'e');
      } else {
        out = n.toFixed(12).replace(/0+$/, '').replace(/\.$/, '');
        const neg = out.startsWith('-');
        const dotI = out.indexOf('.');
        const ip = dotI === -1 ? out : out.slice(0, dotI);
        const fp = dotI === -1 ? '' : out.slice(dotI);
        const digits = neg ? ip.slice(1) : ip;
        out = (neg ? '-' : '') + digits.replace(/\B(?=(\d{3})+(?!\d))/g, ' ') + fp;
      }
      return out;
    }
    function renderDisplay() {
      display.classList.toggle('error', state.current === 'Error');
      numEl.textContent = formatNumber(state.current);
      if (state.op && state.stored !== null) {
        const opSym = { '+': '+', '-': '−', '*': '×', '/': '÷' }[state.op] || state.op;
        histEl.textContent = formatNumber(String(state.stored)) + ' ' + opSym;
      } else {
        histEl.innerHTML = '&nbsp;';
      }
    }
    renderDisplay();

    // ============================================================
    // ROAST SHOWER — randomly picks a line on divide-by-zero, slides
    // in at top of display, auto-clears after 3.5s.
    // ============================================================
    let roastTimer = null;
    function showRoast() {
      const line = ROASTS[Math.floor(Math.random() * ROASTS.length)];
      roastEl.textContent = '✦ ' + line;
      roastEl.classList.add('show');
      if (roastTimer) clearTimeout(roastTimer);
      roastTimer = setTimeout(() => roastEl.classList.remove('show'), 3500);
    }
    function clearRoast() {
      roastEl.classList.remove('show');
      if (roastTimer) clearTimeout(roastTimer);
    }

    // ============================================================
    // COMPUTE — float-precision-safe basic ops, divide-by-zero = roast
    // ============================================================
    function compute(a, op, b) {
      a = Number(a); b = Number(b);
      let r;
      switch (op) {
        case '+': r = a + b; break;
        case '-': r = a - b; break;
        case '*': r = a * b; break;
        case '/':
          if (b === 0) { state.attemptedDivZero = true; return 'Error'; }
          r = a / b; break;
        default: return String(b);
      }
      if (!isFinite(r)) return 'Error';
      return String(Number(r.toPrecision(12)));
    }

    // ============================================================
    // INPUT HANDLERS
    // ============================================================
    function inputDigit(d) {
      if (state.current === 'Error') resetAll();
      clearRoast();
      if (state.justEvaluated) {
        state.current = d;
        state.stored = null;
        state.op = null;
        state.justEvaluated = false;
        highlightOp(null);
      } else if (state.current === '0') {
        state.current = d;
      } else {
        if (state.current.replace(/[-.]/, '').length >= 14) return;
        state.current += d;
      }
      renderDisplay();
    }
    function inputDot() {
      if (state.current === 'Error') resetAll();
      clearRoast();
      if (state.justEvaluated) {
        state.current = '0';
        state.stored = null;
        state.op = null;
        state.justEvaluated = false;
      }
      if (!state.current.includes('.')) {
        state.current += '.';
        renderDisplay();
      }
    }
    function inputOp(op) {
      if (state.current === 'Error') return;
      clearRoast();
      if (state.stored !== null && state.op && !state.justEvaluated) {
        const result = compute(state.stored, state.op, state.current);
        if (result === 'Error' && state.attemptedDivZero) {
          state.current = 'Error';
          state.stored = null;
          state.op = null;
          state.attemptedDivZero = false;
          showRoast();
          highlightOp(null);
          renderDisplay();
          return;
        }
        state.stored = result;
        state.current = result;
      } else {
        state.stored = state.current;
      }
      state.op = op;
      state.justEvaluated = true;  // next digit overwrites
      highlightOp(op);
      renderDisplay();
    }
    function highlightOp(op) {
      document.querySelectorAll('.key.op').forEach(k => k.classList.remove('active'));
      if (!op) return;
      const el = document.querySelector('.key.op[data-op="' + op + '"]');
      if (el) el.classList.add('active');
    }
    function evaluate() {
      if (state.current === 'Error') return;
      clearRoast();
      if (state.op && state.stored !== null) {
        const result = compute(state.stored, state.op, state.current);
        const opSym = { '+': '+', '-': '−', '*': '×', '/': '÷' }[state.op] || state.op;
        const expr  = formatNumber(state.stored) + ' ' + opSym + ' ' + formatNumber(state.current) + ' =';
        if (result === 'Error' && state.attemptedDivZero) {
          state.current = 'Error';
          state.stored = null;
          state.op = null;
          state.justEvaluated = true;
          state.attemptedDivZero = false;
          highlightOp(null);
          renderDisplay();
          histEl.textContent = expr;
          showRoast();
          return;
        }
        state.current = result;
        state.stored = null;
        state.op = null;
        state.justEvaluated = true;
        highlightOp(null);
        renderDisplay();
        histEl.textContent = expr;
      }
    }
    function negate() {
      if (state.current === 'Error') return;
      clearRoast();
      if (state.current === '0') return;
      if (state.current.startsWith('-')) state.current = state.current.slice(1);
      else state.current = '-' + state.current;
      renderDisplay();
    }
    function percent() {
      if (state.current === 'Error') return;
      clearRoast();
      const n = Number(state.current);
      if (!isFinite(n)) return;
      state.current = String(Number((n / 100).toPrecision(12)));
      renderDisplay();
    }
    function backspace() {
      if (state.current === 'Error') { resetAll(); return; }
      clearRoast();
      if (state.justEvaluated) return;
      if (state.current.length <= 1 || (state.current.length === 2 && state.current.startsWith('-'))) {
        state.current = '0';
      } else {
        state.current = state.current.slice(0, -1);
      }
      renderDisplay();
    }
    function resetAll() {
      state.current = '0';
      state.stored = null;
      state.op = null;
      state.justEvaluated = false;
      state.attemptedDivZero = false;
      clearRoast();
      highlightOp(null);
      renderDisplay();
    }

    // ============================================================
    // EVENT WIRING
    // ============================================================
    document.getElementById('pad').addEventListener('click', e => {
      const k = e.target.closest('.key');
      if (!k) return;
      if (k.dataset.num) inputDigit(k.dataset.num);
      else if (k.dataset.op) inputOp(k.dataset.op);
      else if (k.dataset.act === 'dot') inputDot();
      else if (k.dataset.act === 'eq')  evaluate();
      else if (k.dataset.act === 'ac')  resetAll();
      else if (k.dataset.act === 'neg') negate();
      else if (k.dataset.act === 'pct') percent();
    });

    // Keyboard
    window.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      const k = e.key;
      if (/^[0-9]$/.test(k)) { inputDigit(k); flashKey('[data-num="' + k + '"]'); }
      else if (k === '.' || k === ',') { inputDot(); flashKey('[data-act="dot"]'); }
      else if (k === '+') { inputOp('+'); flashKey('[data-op="+"]'); }
      else if (k === '-') { inputOp('-'); flashKey('[data-op="-"]'); }
      else if (k === '*' || k === 'x' || k === 'X') { inputOp('*'); flashKey('[data-op="*"]'); }
      else if (k === '/') { e.preventDefault(); inputOp('/'); flashKey('[data-op="/"]'); }
      else if (k === 'Enter' || k === '=') { e.preventDefault(); evaluate(); flashKey('[data-act="eq"]'); }
      else if (k === 'Backspace') { backspace(); }
      else if (k === 'Escape' || k.toLowerCase() === 'c') { resetAll(); flashKey('[data-act="ac"]'); }
      else if (k === '%') { percent(); flashKey('[data-act="pct"]'); }
    });
    function flashKey(sel) {
      const el = document.querySelector(sel);
      if (!el) return;
      el.style.transition = 'background 0.06s';
      const orig = el.style.background;
      el.style.background = 'rgba(94,255,255,0.18)';
      setTimeout(() => { el.style.background = orig; }, 90);
    }
  })();
  </script>
</body>
