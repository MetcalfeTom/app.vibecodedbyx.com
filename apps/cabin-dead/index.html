<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cabin Dead — First-Person Zombie Survival</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%A7%9F">
<meta property="og:title" content="Cabin Dead">
<meta property="og:description" content="Board up the windows. Aim at the dark. They come in waves.">
<meta property="og:url" content="https://sloppy.live/cabin-dead">
<meta property="og:image" content="https://sloppy.live/cabin-dead/og-image.png">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet">
<style>
:root {
  --blood: #8a0e0e;
  --bone: #d6c8a8;
  --moss: #3a5a2e;
  --moon: #c5d4e8;
  --ink: #0a0a0c;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  background: #000;
  color: var(--bone);
  font-family: 'Special Elite', serif;
  overflow: hidden;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
}
#c {
  display: block;
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  cursor: none;
  image-rendering: pixelated;
  background: #000;
}
.hud {
  position: fixed;
  pointer-events: none;
  color: var(--bone);
  font-family: 'Silkscreen', monospace;
  text-shadow: 2px 2px 0 var(--ink), 0 0 12px rgba(0,0,0,0.9);
}
.hud-top {
  top: 16px;
  left: 16px;
  right: 16px;
  display: flex;
  justify-content: space-between;
  font-size: 14px;
  letter-spacing: 2px;
}
.hud-bot {
  bottom: 16px;
  left: 16px;
  right: 16px;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  font-size: 14px;
  letter-spacing: 2px;
}
.stat { line-height: 1.4; }
.stat .label { font-size: 9px; opacity: 0.6; display: block; letter-spacing: 3px; }
.stat .val { font-size: 22px; color: var(--bone); }
.stat.hp .val { color: #ff5a4a; }
.stat.ammo .val { color: #ffcf5a; }
.stat.wave .val { color: #5addff; }
.stat.score .val { color: #9dff5a; }
.center {
  position: fixed;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  font-family: 'Silkscreen', monospace;
  pointer-events: auto;
}
.start-screen, .over-screen {
  background: rgba(5, 3, 6, 0.88);
  border: 2px solid var(--blood);
  padding: 32px 40px;
  box-shadow: 0 0 80px rgba(138, 14, 14, 0.4), inset 0 0 40px rgba(0,0,0,0.6);
  max-width: 440px;
}
.start-screen h1, .over-screen h1 {
  font-family: 'Silkscreen', monospace;
  font-weight: 700;
  font-size: 38px;
  letter-spacing: 3px;
  color: var(--blood);
  text-shadow: 3px 3px 0 var(--ink), 0 0 24px rgba(138, 14, 14, 0.8);
  margin-bottom: 6px;
}
.start-screen .sub {
  font-family: 'Special Elite', serif;
  font-size: 13px;
  color: var(--bone);
  opacity: 0.7;
  margin-bottom: 24px;
  letter-spacing: 1px;
}
.instructions {
  font-family: 'Special Elite', serif;
  font-size: 12px;
  color: var(--bone);
  opacity: 0.75;
  line-height: 1.7;
  margin-bottom: 24px;
  text-align: left;
}
.instructions b { color: #ffcf5a; }
.btn {
  background: transparent;
  border: 2px solid var(--blood);
  color: var(--bone);
  font-family: 'Silkscreen', monospace;
  font-size: 16px;
  letter-spacing: 3px;
  padding: 12px 28px;
  cursor: pointer;
  transition: all 0.15s;
}
.btn:hover {
  background: var(--blood);
  color: var(--bone);
  box-shadow: 0 0 24px rgba(138, 14, 14, 0.8);
}
.hidden { display: none !important; }
.wave-banner {
  position: fixed;
  left: 50%;
  top: 30%;
  transform: translateX(-50%);
  font-family: 'Silkscreen', monospace;
  font-size: 44px;
  letter-spacing: 6px;
  color: var(--blood);
  text-shadow: 4px 4px 0 var(--ink), 0 0 30px rgba(138, 14, 14, 0.9);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.4s;
}
.wave-banner.show { opacity: 1; }
.damage-flash {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 30%, rgba(138, 14, 14, 0.6) 100%);
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.1s;
}
.damage-flash.show { opacity: 1; }
.muzzle-flash {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at 50% 75%, rgba(255, 220, 120, 0.35) 0%, transparent 35%);
  pointer-events: none;
  opacity: 0;
}
.muzzle-flash.show { opacity: 1; }
.vignette {
  position: fixed;
  inset: 0;
  background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.75) 100%);
  pointer-events: none;
}
.scanline {
  position: fixed;
  inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(
    to bottom,
    rgba(0,0,0,0) 0px,
    rgba(0,0,0,0) 2px,
    rgba(0,0,0,0.08) 3px
  );
  mix-blend-mode: multiply;
}
.reload-bar {
  position: fixed;
  left: 50%;
  bottom: 90px;
  transform: translateX(-50%);
  width: 180px;
  height: 6px;
  background: rgba(255, 255, 255, 0.15);
  border: 1px solid rgba(255, 207, 90, 0.4);
  display: none;
}
.reload-bar.show { display: block; }
.reload-bar .fill {
  height: 100%;
  background: #ffcf5a;
  width: 0%;
  transition: width 0.05s linear;
}
.backlink {
  position: fixed;
  bottom: 8px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 9px;
  color: rgba(214, 200, 168, 0.3);
  font-family: 'Silkscreen', monospace;
  letter-spacing: 2px;
  text-decoration: none;
}
.backlink:hover { color: var(--blood); }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="vignette"></div>
<div class="scanline"></div>
<div class="muzzle-flash" id="muzzle"></div>
<div class="damage-flash" id="dmg"></div>

<div class="hud hud-top">
  <div class="stat wave"><span class="label">NIGHT</span><span class="val" id="waveVal">1</span></div>
  <div class="stat score"><span class="label">KILLS</span><span class="val" id="killVal">0</span></div>
</div>
<div class="hud hud-bot">
  <div class="stat hp"><span class="label">HULL</span><span class="val" id="hpVal">100</span></div>
  <div class="stat ammo"><span class="label">AMMO</span><span class="val" id="ammoVal">6 / 24</span></div>
</div>

<div class="reload-bar" id="reloadBar"><div class="fill" id="reloadFill"></div></div>

<div class="wave-banner" id="waveBanner">NIGHT 1</div>

<div class="center start-screen" id="startScreen">
  <h1>CABIN DEAD</h1>
  <div class="sub">they're coming out of the trees</div>
  <div class="instructions">
    <b>MOVE MOUSE</b> aim<br>
    <b>CLICK / TAP</b> shoot<br>
    <b>R</b> reload · 6 rounds<br>
    <b>E</b> board up the windows<br><br>
    Zombies pour from the treeline. Shoot the ones closest to the glass first. Every boarded plank adds hull.
  </div>
  <button class="btn" id="startBtn">BEGIN</button>
</div>

<div class="center over-screen hidden" id="overScreen">
  <h1 id="overTitle">YOU DIED</h1>
  <div class="instructions" id="overStats"></div>
  <button class="btn" id="restartBtn">AGAIN</button>
</div>

<a class="backlink" href="https://sloppy.live">sloppy.live</a>

<script>
(() => {
'use strict';
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1;
function resize() {
  DPR = Math.min(2, window.devicePixelRatio || 1);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.imageSmoothingEnabled = false;
}
resize();
window.addEventListener('resize', resize);

// ---------- state ----------
const state = {
  running: false,
  mx: 0, my: 0,
  zombies: [],
  bullets: [],
  bloods: [],
  casings: [],
  hp: 100,
  maxHp: 100,
  ammo: 6,
  clipSize: 6,
  reserve: 24,
  reloading: false,
  reloadStart: 0,
  reloadTime: 1400,
  wave: 0,
  kills: 0,
  waveSpawnLeft: 0,
  waveInterval: 1400,
  lastSpawn: 0,
  waveBreakUntil: 0,
  boards: 3,            // cabin reinforcement
  shake: 0,
  lastShoot: 0,
  cooldown: 180,
  msg: '',
};

// ---------- input ----------
window.addEventListener('mousemove', (e) => {
  state.mx = e.clientX;
  state.my = e.clientY;
});
window.addEventListener('touchmove', (e) => {
  if (e.touches[0]) { state.mx = e.touches[0].clientX; state.my = e.touches[0].clientY; }
}, { passive: true });
canvas.addEventListener('mousedown', (e) => { if (state.running) shoot(); });
canvas.addEventListener('touchstart', (e) => {
  if (!state.running) return;
  if (e.touches[0]) { state.mx = e.touches[0].clientX; state.my = e.touches[0].clientY; }
  shoot();
  e.preventDefault();
}, { passive: false });
window.addEventListener('keydown', (e) => {
  if (!state.running) return;
  if (e.key === 'r' || e.key === 'R') startReload();
  if (e.key === 'e' || e.key === 'E') reinforce();
});

// ---------- zombie types ----------
const Z_TYPES = {
  walker: { hp: 2, speed: 0.045, reward: 10, sizeMul: 1.0, col: '#5b7a42', headCol: '#8aa85a' },
  runner: { hp: 1, speed: 0.11, reward: 15, sizeMul: 0.85, col: '#7a3a2a', headCol: '#b35944' },
  brute:  { hp: 6, speed: 0.028, reward: 30, sizeMul: 1.4, col: '#3a3a28', headCol: '#6a6a40' },
  crawler:{ hp: 2, speed: 0.06,  reward: 20, sizeMul: 0.7, col: '#2a3a48', headCol: '#4e6e88' },
};

// ---------- waves ----------
function startWave(n) {
  state.wave = n;
  const base = 4 + n * 2;
  state.waveSpawnLeft = base;
  state.waveInterval = Math.max(450, 1500 - n * 70);
  state.lastSpawn = performance.now();
  state.waveBreakUntil = 0;
  showWaveBanner('NIGHT ' + n);
}

function showWaveBanner(text) {
  const el = document.getElementById('waveBanner');
  el.textContent = text;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1800);
}

function spawnZombie() {
  // mix types by wave
  const roll = Math.random();
  let type;
  if (state.wave >= 3 && roll < 0.12) type = 'brute';
  else if (state.wave >= 2 && roll < 0.32) type = 'runner';
  else if (state.wave >= 4 && roll < 0.45) type = 'crawler';
  else type = 'walker';
  const def = Z_TYPES[type];
  // per-wave scaling: +1 HP every 2 nights, +9% speed per night (compounding softly)
  const waveHp = def.hp + Math.floor(state.wave / 2);
  const speedMul = Math.pow(1.09, state.wave - 1);
  state.zombies.push({
    type,
    x: (Math.random() - 0.5) * 1.6, // -0.8..0.8 world x
    z: 0.02 + Math.random() * 0.04, // far
    hp: waveHp,
    maxHp: waveHp,
    speed: def.speed * (0.85 + Math.random() * 0.3) * speedMul,
    wobble: Math.random() * Math.PI * 2,
    dying: 0,
  });
}

// ---------- shooting ----------
function shoot() {
  const now = performance.now();
  if (now - state.lastShoot < state.cooldown) return;
  if (state.reloading) return;
  if (state.ammo <= 0) { startReload(); return; }
  state.ammo -= 1;
  state.lastShoot = now;
  flashMuzzle();
  state.shake = 6;
  // hit-scan: aim at crosshair, pick closest zombie under reticle
  const target = pickTarget(state.mx, state.my);
  if (target) {
    target.hp -= 1;
    spawnBlood(target);
    if (target.hp <= 0) {
      target.dying = 1;
      state.kills += 1;
      // gun ammo refills
      if (Math.random() < 0.25) state.reserve += 2;
    }
  }
  updateHUD();
  if (state.ammo === 0) startReload();
}

function pickTarget(sx, sy) {
  // find zombie whose screen rect contains (sx, sy), pick nearest (highest z)
  let best = null;
  let bestZ = -1;
  for (const z of state.zombies) {
    if (z.dying) continue;
    const { px, py, w, h } = zombieScreen(z);
    if (sx >= px - w/2 && sx <= px + w/2 && sy >= py - h && sy <= py + h*0.1) {
      if (z.z > bestZ) { bestZ = z.z; best = z; }
    }
  }
  return best;
}

function zombieScreen(z) {
  const def = Z_TYPES[z.type];
  const horizon = H * 0.55;
  const depthScale = 0.15 + z.z * 2.4;
  const px = W/2 + z.x * W * 0.5 * (0.3 + depthScale * 0.9);
  const py = horizon + z.z * (H * 0.42);
  const h = (60 + 300 * z.z) * def.sizeMul;
  const w = h * 0.45;
  return { px, py, w, h };
}

function spawnBlood(z) {
  const s = zombieScreen(z);
  for (let i = 0; i < 10; i++) {
    const a = Math.random() * Math.PI * 2;
    state.bloods.push({
      x: s.px, y: s.py - s.h * 0.7,
      vx: Math.cos(a) * (1 + Math.random() * 3),
      vy: Math.sin(a) * (1 + Math.random() * 3) - 1,
      life: 30 + Math.random() * 20,
      size: 2 + Math.random() * 3,
    });
  }
}

function startReload() {
  if (state.reloading) return;
  if (state.ammo >= state.clipSize) return;
  if (state.reserve <= 0) return;
  state.reloading = true;
  state.reloadStart = performance.now();
  document.getElementById('reloadBar').classList.add('show');
}

function finishReload() {
  const need = state.clipSize - state.ammo;
  const give = Math.min(need, state.reserve);
  state.ammo += give;
  state.reserve -= give;
  state.reloading = false;
  document.getElementById('reloadBar').classList.remove('show');
  updateHUD();
}

function reinforce() {
  if (state.boards >= 10) return;
  // costs 50 hp... no, costs 1 kill credit via reserve ammo
  // simple: each "board" ability gives +15 hp but at cost of 3 reserve ammo
  if (state.reserve < 3) { showToast('NO SCRAP'); return; }
  state.reserve -= 3;
  state.hp = Math.min(state.maxHp + 10, state.hp + 15);
  state.boards += 1;
  updateHUD();
}

function showToast(text) {
  showWaveBanner(text);
}

// ---------- damage ----------
function takeDamage(amt) {
  state.hp -= amt;
  state.shake = 10;
  const dmg = document.getElementById('dmg');
  dmg.classList.add('show');
  setTimeout(() => dmg.classList.remove('show'), 120);
  if (state.hp <= 0) {
    state.hp = 0;
    gameOver();
  }
  updateHUD();
}

function flashMuzzle() {
  const m = document.getElementById('muzzle');
  m.classList.add('show');
  setTimeout(() => m.classList.remove('show'), 60);
}

// ---------- update ----------
function update(dt) {
  // reload progress
  if (state.reloading) {
    const p = (performance.now() - state.reloadStart) / state.reloadTime;
    document.getElementById('reloadFill').style.width = Math.min(100, p * 100) + '%';
    if (p >= 1) finishReload();
  }

  // spawns
  const now = performance.now();
  if (state.waveBreakUntil === 0 && state.waveSpawnLeft > 0) {
    if (now - state.lastSpawn > state.waveInterval) {
      spawnZombie();
      state.waveSpawnLeft -= 1;
      state.lastSpawn = now;
    }
  } else if (state.waveSpawnLeft <= 0 && state.zombies.length === 0 && state.waveBreakUntil === 0) {
    // wave cleared
    state.waveBreakUntil = now + 3500;
    showToast('NIGHT ' + state.wave + ' CLEARED');
    state.reserve += 12 + state.wave * 3;
    state.hp = Math.min(state.maxHp, state.hp + 20);
    updateHUD();
  } else if (state.waveBreakUntil > 0 && now > state.waveBreakUntil) {
    startWave(state.wave + 1);
  }

  // zombies
  for (let i = state.zombies.length - 1; i >= 0; i--) {
    const z = state.zombies[i];
    z.wobble += dt * 0.008;
    if (z.dying) {
      z.dying += dt * 0.004;
      if (z.dying > 1) state.zombies.splice(i, 1);
      continue;
    }
    z.z += z.speed * dt * 0.012;
    // slight drift toward center
    z.x += (0 - z.x) * 0.0004 * dt;
    if (z.z >= 1.0) {
      // reached cabin
      takeDamage(z.type === 'brute' ? 25 : 12);
      state.zombies.splice(i, 1);
    }
  }

  // bloods
  for (let i = state.bloods.length - 1; i >= 0; i--) {
    const b = state.bloods[i];
    b.x += b.vx;
    b.y += b.vy;
    b.vy += 0.25;
    b.life -= 1;
    if (b.life <= 0) state.bloods.splice(i, 1);
  }

  if (state.shake > 0) state.shake *= 0.85;
}

// ---------- rendering ----------
function render() {
  // shake
  const sx = (Math.random() - 0.5) * state.shake;
  const sy = (Math.random() - 0.5) * state.shake;
  ctx.save();
  ctx.translate(sx, sy);

  drawBackground();
  drawZombies();
  drawBloods();
  drawCabinFrame();
  drawWeapon();
  drawCrosshair();

  ctx.restore();
}

function drawBackground() {
  // night sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H * 0.6);
  sky.addColorStop(0, '#050a14');
  sky.addColorStop(0.6, '#0c1424');
  sky.addColorStop(1, '#1a1010');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // moon
  ctx.save();
  ctx.globalAlpha = 0.85;
  ctx.fillStyle = '#e4eef8';
  ctx.shadowColor = '#c5d4e8';
  ctx.shadowBlur = 40;
  ctx.beginPath();
  ctx.arc(W * 0.75, H * 0.18, 28, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // stars
  ctx.fillStyle = '#e4eef8';
  for (let i = 0; i < 60; i++) {
    const sx = (i * 73 + 11) % W;
    const sy = ((i * 37) % (H * 0.5));
    ctx.globalAlpha = 0.4 + (i % 3) * 0.2;
    ctx.fillRect(sx, sy, 1.5, 1.5);
  }
  ctx.globalAlpha = 1;

  // distant tree silhouettes
  ctx.fillStyle = '#0a0f0a';
  const horizon = H * 0.55;
  for (let i = 0; i < 20; i++) {
    const tx = (i * W / 20) - 20;
    const tw = 30 + (i % 4) * 18;
    const th = 80 + ((i * 13) % 60);
    ctx.beginPath();
    ctx.moveTo(tx, horizon);
    ctx.lineTo(tx + tw / 2, horizon - th);
    ctx.lineTo(tx + tw, horizon);
    ctx.closePath();
    ctx.fill();
  }

  // ground (moonlit grass)
  const ground = ctx.createLinearGradient(0, horizon, 0, H);
  ground.addColorStop(0, '#0f1810');
  ground.addColorStop(1, '#050806');
  ctx.fillStyle = ground;
  ctx.fillRect(0, horizon, W, H - horizon);

  // ground mist
  ctx.fillStyle = 'rgba(90, 120, 140, 0.08)';
  for (let i = 0; i < 5; i++) {
    ctx.fillRect(0, horizon + 10 + i * 18, W, 6);
  }
}

function drawZombies() {
  // sort by depth (far first so near paints on top)
  const zs = state.zombies.slice().sort((a, b) => a.z - b.z);
  for (const z of zs) {
    const s = zombieScreen(z);
    const def = Z_TYPES[z.type];
    const alpha = z.dying ? Math.max(0, 1 - z.dying) : 1;
    ctx.globalAlpha = alpha;
    drawZombieSprite(z, s, def);
    // hp bar if damaged
    if (!z.dying && z.hp < z.maxHp && s.h > 40) {
      const bw = s.w * 0.9;
      const bx = s.px - bw / 2;
      const by = s.py - s.h - 8;
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(bx, by, bw, 4);
      ctx.fillStyle = '#ff5a4a';
      ctx.fillRect(bx, by, bw * (z.hp / z.maxHp), 4);
    }
    ctx.globalAlpha = 1;
  }
}

function drawZombieSprite(z, s, def) {
  const wob = Math.sin(z.wobble) * s.w * 0.04;
  const px = s.px + wob;
  const py = s.py;
  const w = s.w;
  const h = s.h;
  // pixel size scales with depth for pixel-art feel
  const P = Math.max(2, Math.floor(h / 28));
  function px_rect(rx, ry, rw, rh, col) {
    ctx.fillStyle = col;
    ctx.fillRect(px + rx * P - w/2, py - h + ry * P, rw * P, rh * P);
  }
  const bodyCol = def.col;
  const headCol = def.headCol;
  const blood = '#6a0e0e';

  // body
  px_rect(2, 10, 8, 12, bodyCol);
  // arms reaching forward
  const armSway = Math.sin(z.wobble * 1.3) * 0.8;
  px_rect(0, 11 + armSway, 2, 6, bodyCol);
  px_rect(10, 11 - armSway, 2, 6, bodyCol);
  // clawed hands
  px_rect(-1, 14 + armSway, 3, 2, blood);
  px_rect(11, 14 - armSway, 3, 2, blood);
  // legs
  const legSway = Math.sin(z.wobble * 2) * 0.6;
  px_rect(3, 22, 3, 6, bodyCol);
  px_rect(7, 22, 3, 6, bodyCol);
  // head
  px_rect(3, 4, 6, 7, headCol);
  // eyes (glowing)
  ctx.fillStyle = '#ffdd44';
  ctx.fillRect(px + 4*P - w/2, py - h + 6*P, P, P);
  ctx.fillRect(px + 7*P - w/2, py - h + 6*P, P, P);
  // mouth blood
  px_rect(4, 9, 4, 1, blood);
  // shoulder blood smear
  px_rect(2, 11, 2, 2, blood);
}

function drawBloods() {
  for (const b of state.bloods) {
    const a = Math.min(1, b.life / 30);
    ctx.fillStyle = `rgba(138, 14, 14, ${a})`;
    ctx.fillRect(b.x, b.y, b.size, b.size);
  }
}

function drawCabinFrame() {
  // draw window frame around view — suggests we're inside a cabin
  const frameCol = '#2a1a0c';
  const plankCol = '#3a2410';
  const inset = Math.min(W, H) * 0.05;
  // dark wood walls around edge
  ctx.fillStyle = frameCol;
  // top
  ctx.fillRect(0, 0, W, inset);
  // bottom
  ctx.fillRect(0, H - inset * 1.2, W, inset * 1.2);
  // left
  ctx.fillRect(0, 0, inset * 0.8, H);
  // right
  ctx.fillRect(W - inset * 0.8, 0, inset * 0.8, H);
  // plank texture (horizontal lines)
  ctx.strokeStyle = plankCol;
  ctx.lineWidth = 1;
  for (let y = 0; y < inset; y += 6) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  for (let y = H - inset * 1.2; y < H; y += 6) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }
  // nailed boards across the window based on state.boards
  ctx.fillStyle = '#5a3a1a';
  ctx.strokeStyle = '#2a1a08';
  const windowTop = inset;
  const windowBot = H - inset * 1.2;
  const wh = windowBot - windowTop;
  for (let i = 0; i < Math.min(state.boards, 6); i++) {
    const ang = (i * 0.11 - 0.15) + (i % 2 ? 0.05 : -0.05);
    const by = windowTop + (i + 1) * (wh / 7) - 10;
    ctx.save();
    ctx.translate(W / 2, by);
    ctx.rotate(ang);
    ctx.fillRect(-W * 0.4, -6, W * 0.8, 12);
    ctx.strokeRect(-W * 0.4, -6, W * 0.8, 12);
    // nails
    ctx.fillStyle = '#888';
    ctx.fillRect(-W * 0.38, -2, 3, 3);
    ctx.fillRect(W * 0.36, -2, 3, 3);
    ctx.fillStyle = '#5a3a1a';
    ctx.restore();
  }
}

function drawWeapon() {
  // crude pump-shotgun silhouette at bottom of screen, tilts toward crosshair
  const cx = W / 2;
  const cy = H + 40;
  const tilt = ((state.mx - W/2) / W) * 0.25;
  const recoil = Math.max(0, (state.cooldown - (performance.now() - state.lastShoot)) / state.cooldown) * 14;
  ctx.save();
  ctx.translate(cx, cy - recoil);
  ctx.rotate(tilt);
  // stock
  ctx.fillStyle = '#3a220e';
  ctx.fillRect(-60, -10, 120, 30);
  // metal body
  ctx.fillStyle = '#1a1a1e';
  ctx.fillRect(-40, -26, 120, 18);
  // barrel
  ctx.fillStyle = '#0a0a0c';
  ctx.fillRect(40, -24, 80, 10);
  // pump grip
  ctx.fillStyle = '#2a1a0c';
  ctx.fillRect(10, -4, 30, 10);
  // muzzle
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(118, -22, 6, 6);
  ctx.restore();
}

function drawCrosshair() {
  const x = state.mx, y = state.my;
  ctx.strokeStyle = 'rgba(255, 240, 200, 0.85)';
  ctx.lineWidth = 1.5;
  const r = 12;
  ctx.beginPath();
  ctx.moveTo(x - r, y); ctx.lineTo(x - 3, y);
  ctx.moveTo(x + 3, y); ctx.lineTo(x + r, y);
  ctx.moveTo(x, y - r); ctx.lineTo(x, y - 3);
  ctx.moveTo(x, y + 3); ctx.lineTo(x, y + r);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(x, y, 2, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(255, 90, 74, 0.9)';
  ctx.stroke();
}

// ---------- game flow ----------
function startGame() {
  state.running = true;
  state.hp = state.maxHp = 100;
  state.ammo = state.clipSize;
  state.reserve = 24;
  state.kills = 0;
  state.zombies = [];
  state.bloods = [];
  state.boards = 3;
  state.reloading = false;
  document.getElementById('startScreen').classList.add('hidden');
  document.getElementById('overScreen').classList.add('hidden');
  document.getElementById('reloadBar').classList.remove('show');
  updateHUD();
  startWave(1);
}

function gameOver() {
  state.running = false;
  document.getElementById('overTitle').textContent = 'YOU DIED';
  document.getElementById('overStats').innerHTML =
    `Survived to <b>NIGHT ${state.wave}</b><br>` +
    `Kills: <b>${state.kills}</b>`;
  document.getElementById('overScreen').classList.remove('hidden');
}

function updateHUD() {
  document.getElementById('waveVal').textContent = state.wave;
  document.getElementById('killVal').textContent = state.kills;
  document.getElementById('hpVal').textContent = Math.max(0, Math.round(state.hp));
  document.getElementById('ammoVal').textContent = `${state.ammo} / ${state.reserve}`;
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);

// ---------- loop ----------
let lastT = performance.now();
function loop(t) {
  const dt = Math.min(60, t - lastT);
  lastT = t;
  if (state.running) update(dt);
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
