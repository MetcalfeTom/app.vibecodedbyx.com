<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Memory Attic</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%AB%99">
<meta name="description" content="A dusty attic shelf where every glowing glass jar holds the next chat message from the stream.">
<meta property="og:title" content="Memory Attic">
<meta property="og:description" content="A dusty attic shelf where every glowing glass jar holds the next chat message from the stream.">
<meta property="og:url" content="https://sloppy.live/memory-attic">
<meta property="og:image" content="https://image.pollinations.ai/prompt/dusty%20wooden%20attic%20shelf%20with%20glowing%20glass%20jars%20full%20of%20fireflies%20warm%20amber%20light%20painterly?width=1200&height=630&nologo=true&model=flux">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;1,400;1,500&family=JetBrains+Mono:wght@500&family=Fraunces:ital,wght@1,400;1,500&display=swap" rel="stylesheet">
<style>
:root{
  --night:#1a0e08;
  --dust:#3a2818;
  --wood:#4a3220;
  --wood-deep:#2a1a0c;
  --grain:#6b4626;
  --amber:#f5c453;
  --amber-warm:#ffb84a;
  --glow:#ffd884;
  --cream:#f3e8c8;
  --dim:#9a7858;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:var(--night);color:var(--cream);font-family:'Cormorant Garamond',serif;overflow:hidden}
body{
  background:
    radial-gradient(ellipse at 50% 30%, #4a2a18 0%, #1a0e08 65%, #0a0604 100%),
    var(--night);
  min-height:100vh;
  display:flex;flex-direction:column;
  padding:1rem;
}
/* dust film overlay */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:3;
  background:repeating-linear-gradient(43deg, transparent 0 80px, rgba(255,200,140,0.012) 80px 81px);
  mix-blend-mode:screen;
}
canvas#dust{
  position:fixed;inset:0;pointer-events:none;z-index:4;
}

header{
  width:100%;max-width:64rem;margin:0 auto 1rem;
  display:flex;justify-content:space-between;align-items:baseline;
  gap:0.6rem;flex-wrap:wrap;
  z-index:5;position:relative;
}
h1{
  font-family:'Fraunces',serif;font-style:italic;font-weight:500;
  font-size:clamp(1.8rem, 4.5vw, 2.7rem);
  color:var(--amber);
  letter-spacing:-0.01em;
  text-shadow:0 0 18px rgba(245,196,83,0.35);
}
.tag{
  font-family:'JetBrains Mono',monospace;font-size:0.7rem;
  letter-spacing:0.22em;color:var(--dim);text-transform:uppercase;
}
.tag .dot{color:var(--amber-warm);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.35}}

.attic{
  position:relative;
  flex:1;width:100%;max-width:64rem;margin:0 auto;
  display:flex;flex-direction:column;justify-content:flex-end;
  gap:1.8rem;padding-bottom:1rem;
  z-index:5;
}
.shelf{
  position:relative;
  display:flex;justify-content:space-around;align-items:flex-end;
  padding:0 0.4rem;
  min-height:11rem;
}
.shelf-board{
  position:absolute;left:0;right:0;bottom:0;
  height:1.6rem;
  background:
    linear-gradient(180deg, #4a3220 0%, #2a1a0c 100%),
    var(--wood);
  border-top:1px solid #6b4626;
  border-bottom:3px solid #1a0c04;
  box-shadow:
    inset 0 1px 0 rgba(255,220,160,0.18),
    0 -1px 0 rgba(0,0,0,0.4),
    0 12px 22px rgba(0,0,0,0.5);
}
.shelf-board::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(90deg, transparent 0 30px, rgba(0,0,0,0.18) 30px 31px),
             repeating-linear-gradient(180deg, transparent 0 4px, rgba(255,220,160,0.04) 4px 5px);
}
.shelf-bracket{
  position:absolute;bottom:0;width:12px;height:18px;
  background:#2a1a0c;
}
.shelf-bracket.left{left:0.4rem}
.shelf-bracket.right{right:0.4rem}

.jar{
  position:relative;
  width:6.4rem;height:9rem;
  display:flex;flex-direction:column;align-items:center;
  /* glass body */
  background:linear-gradient(
    180deg,
    rgba(245,232,200,0.04) 0%,
    rgba(245,196,83,0.06) 25%,
    rgba(245,196,83,0.10) 65%,
    rgba(245,196,83,0.18) 90%,
    rgba(196,122,20,0.22) 100%
  );
  border:1px solid rgba(255,220,160,0.18);
  border-radius:0.6rem 0.6rem 1.4rem 1.4rem;
  box-shadow:
    inset 0 0 18px rgba(245,196,83,0.10),
    inset -8px -2px 14px rgba(255,255,255,0.05),
    inset 8px -2px 14px rgba(0,0,0,0.18),
    0 6px 16px rgba(0,0,0,0.45);
  margin-bottom:0.3rem;
  overflow:hidden;
  cursor:default;
  transition:transform 0.4s ease, box-shadow 0.4s ease;
}
.jar:hover{transform:translateY(-3px)}
.jar.lit{
  background:linear-gradient(
    180deg,
    rgba(255,232,160,0.18) 0%,
    rgba(255,200,80,0.22) 30%,
    rgba(255,180,60,0.32) 70%,
    rgba(232,140,40,0.40) 100%
  );
  box-shadow:
    inset 0 0 24px rgba(255,210,120,0.45),
    inset -8px -2px 18px rgba(255,240,180,0.20),
    inset 8px -2px 18px rgba(0,0,0,0.18),
    0 6px 20px rgba(0,0,0,0.55),
    0 0 28px rgba(245,180,80,0.45);
  animation:jarPulse 4s infinite ease-in-out;
}
.jar.fresh{animation:jarFresh 1.4s ease-out, jarPulse 4s 1.4s infinite ease-in-out}
@keyframes jarPulse{
  0%,100%{box-shadow:
    inset 0 0 24px rgba(255,210,120,0.45),
    inset -8px -2px 18px rgba(255,240,180,0.20),
    inset 8px -2px 18px rgba(0,0,0,0.18),
    0 6px 20px rgba(0,0,0,0.55),
    0 0 28px rgba(245,180,80,0.45)}
  50%{box-shadow:
    inset 0 0 32px rgba(255,210,120,0.55),
    inset -8px -2px 18px rgba(255,240,180,0.28),
    inset 8px -2px 18px rgba(0,0,0,0.18),
    0 6px 20px rgba(0,0,0,0.55),
    0 0 44px rgba(245,180,80,0.70)}
}
@keyframes jarFresh{
  0%  {transform:translateY(-30px);opacity:0;box-shadow:0 0 60px rgba(255,220,140,0.9)}
  50% {transform:translateY(4px);opacity:1;box-shadow:0 0 50px rgba(255,220,140,0.8)}
  100%{transform:translateY(0);opacity:1}
}
.jar .cork{
  position:absolute;top:-0.4rem;left:50%;transform:translateX(-50%);
  width:5.4rem;height:0.7rem;
  background:linear-gradient(180deg, #7a4a20, #4a2a10);
  border-radius:0.2rem;
  box-shadow:0 1px 0 rgba(0,0,0,0.4);
  z-index:2;
}
.jar .cork::before{
  content:'';position:absolute;left:0;right:0;top:0;height:2px;
  background:linear-gradient(90deg, transparent, rgba(255,200,140,0.4), transparent);
}
.jar .label{
  position:absolute;left:0.2rem;right:0.2rem;top:0.65rem;
  background:#f3e8c8;color:#3a2008;
  font-family:'JetBrains Mono',monospace;font-size:0.5rem;
  letter-spacing:0.06em;text-transform:uppercase;
  padding:0.08rem 0.18rem;text-align:center;
  border:1px solid rgba(58,32,8,0.25);
  border-radius:1px;
  box-shadow:0 1px 2px rgba(0,0,0,0.3);
  font-weight:500;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  z-index:1;
}
.jar .content{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  padding:1.8rem 0.4rem 0.7rem;text-align:center;
  font-family:'Cormorant Garamond',serif;font-style:italic;
  width:100%;
  position:relative;
  z-index:1;
}
.jar .user{
  font-family:'JetBrains Mono',monospace;font-size:0.56rem;
  letter-spacing:0.06em;
  color:var(--c, var(--amber));
  text-shadow:0 0 4px rgba(0,0,0,0.5);
  font-weight:500;
  margin-bottom:0.18rem;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;
}
.jar .msg{
  font-size:0.74rem;line-height:1.15;
  color:#fff8e0;
  text-shadow:0 0 6px rgba(245,140,40,0.6), 0 1px 2px rgba(0,0,0,0.6);
  word-break:break-word;
  display:-webkit-box;
  -webkit-line-clamp:4;
  -webkit-box-orient:vertical;
  overflow:hidden;
}
.jar.empty .content{opacity:0}
.jar .firefly{
  position:absolute;width:3px;height:3px;border-radius:50%;
  background:#fff8d0;box-shadow:0 0 6px #ffd884, 0 0 12px #f5c453;
  pointer-events:none;
}

.status-bar{
  position:fixed;left:1rem;bottom:0.8rem;z-index:6;
  font-family:'JetBrains Mono',monospace;font-size:0.66rem;
  color:var(--dim);letter-spacing:0.16em;text-transform:uppercase;
  display:flex;align-items:center;gap:0.4rem;
}
.status-dot{width:0.45rem;height:0.45rem;border-radius:50%;background:#9a7858}
.status-dot.live{background:#7dc97a;box-shadow:0 0 6px #7dc97a}
.status-dot.away{background:#c47a14;box-shadow:0 0 6px #c47a14}

@media (max-width: 760px){
  .jar{width:4.6rem;height:7rem;border-radius:0.4rem 0.4rem 1rem 1rem}
  .jar .cork{width:4.0rem;height:0.5rem}
  .jar .label{top:0.4rem;font-size:0.42rem}
  .jar .msg{font-size:0.6rem;-webkit-line-clamp:3}
  .attic{gap:1rem}
}
@media (prefers-reduced-motion: reduce){
  .jar.lit,.jar.fresh{animation:none}
  .tag .dot{animation:none}
}
</style>
</head>
<body>
<canvas id="dust"></canvas>

<header>
  <h1>memory attic</h1>
  <span class="tag">recent chat <span class="dot">●</span> in glass jars</span>
</header>

<main class="attic" id="attic" aria-label="Shelves of glass jars holding recent chat messages"></main>

<div class="status-bar" aria-live="polite">
  <span class="status-dot" id="statusDot"></span>
  <span id="statusText">connecting · twitch chat</span>
</div>

<script>
'use strict';

// ─────────────────────────────────────────────────────────────
// MEMORY ATTIC — three dusty shelves of glass jars. Each jar holds
// one recent chat message from the stream. New messages drop into
// the leftmost jar of the top shelf, pushing the rest down the line.
// ─────────────────────────────────────────────────────────────
const SHELF_COUNT = 3;
const JARS_PER_SHELF = 4;
const TOTAL_JARS = SHELF_COUNT * JARS_PER_SHELF;
const TWITCH_CHANNEL = 'sloppyaistreamer';   // chat-reading-only; anon login
const PALETTE = ['#f5c453','#7dc97a','#5ec2e8','#c986e0','#ff8fb9','#ffb43c','#a4d8ff','#fff094'];

// ── jar state — newest message is at index 0; jars[N-1] is oldest ──
const jars = Array.from({length: TOTAL_JARS}, () => null);
let nextFreshIndex = -1;  // animate this index as "just landed"

const atticEl = document.getElementById('attic');
const statusDot = document.getElementById('statusDot');
const statusText = document.getElementById('statusText');

// build the shelves + empty jars
function buildShelves(){
  atticEl.innerHTML = '';
  for (let s = 0; s < SHELF_COUNT; s++){
    const shelf = document.createElement('section');
    shelf.className = 'shelf';
    shelf.setAttribute('aria-label', 'Shelf ' + (s + 1));
    const left = document.createElement('div'); left.className = 'shelf-bracket left';
    const right = document.createElement('div'); right.className = 'shelf-bracket right';
    const board = document.createElement('div'); board.className = 'shelf-board';
    for (let j = 0; j < JARS_PER_SHELF; j++){
      const idx = s * JARS_PER_SHELF + j;
      const jar = document.createElement('div');
      jar.className = 'jar empty';
      jar.dataset.idx = idx;
      jar.innerHTML =
        '<div class="cork"></div>' +
        '<div class="label" id="lbl_' + idx + '">empty</div>' +
        '<div class="content">' +
          '<div class="user" id="usr_' + idx + '"></div>' +
          '<div class="msg"  id="msg_' + idx + '"></div>' +
        '</div>';
      shelf.appendChild(jar);
    }
    shelf.appendChild(left); shelf.appendChild(right); shelf.appendChild(board);
    atticEl.appendChild(shelf);
  }
}
buildShelves();

function userColor(name){
  // deterministic-ish hue per username so the same chatter glows the same colour
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) | 0;
  return PALETTE[Math.abs(h) % PALETTE.length];
}

function renderJars(){
  for (let i = 0; i < TOTAL_JARS; i++){
    const jar = atticEl.querySelector('.jar[data-idx="' + i + '"]');
    const m = jars[i];
    if (!m){
      jar.className = 'jar empty';
      document.getElementById('lbl_' + i).textContent = 'empty';
      document.getElementById('usr_' + i).textContent = '';
      document.getElementById('msg_' + i).textContent = '';
      continue;
    }
    jar.className = 'jar lit' + (i === nextFreshIndex ? ' fresh' : '');
    const c = userColor(m.user);
    document.getElementById('usr_' + i).textContent = '@' + m.user;
    document.getElementById('usr_' + i).style.setProperty('--c', c);
    document.getElementById('msg_' + i).textContent = m.text;
    // label: relative time
    const ageS = Math.max(1, Math.floor((Date.now() - m.ts) / 1000));
    const label = ageS < 60 ? ageS + 's ago' : ageS < 3600 ? Math.floor(ageS/60) + 'm ago' : 'older';
    document.getElementById('lbl_' + i).textContent = label;
  }
  nextFreshIndex = -1;
}

function pushMessage(user, text){
  // sanitize text — strip control chars + trim
  const clean = String(text).replace(/[\x00-\x1f]/g, '').slice(0, 220).trim();
  if (!clean) return;
  // shift jars right, drop oldest; insert new at 0
  for (let i = TOTAL_JARS - 1; i > 0; i--) jars[i] = jars[i - 1];
  jars[0] = { user, text: clean, ts: Date.now() };
  nextFreshIndex = 0;
  renderJars();
}

// refresh relative timestamps every 8s so jars age visibly
setInterval(renderJars, 8000);

// ─────────────────────────────────────────────────────────────
// Twitch IRC anonymous WSS — read-only chat listener
// ─────────────────────────────────────────────────────────────
function connectTwitch(){
  let ws;
  try {
    ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');
  } catch (e){
    setStatus('away', 'chat unreachable');
    seedExamples();
    return;
  }
  setStatus('away', 'connecting · twitch');
  ws.onopen = () => {
    const nick = 'justinfan' + Math.floor(Math.random() * 90000 + 10000);
    ws.send('CAP REQ :twitch.tv/tags');
    ws.send('NICK ' + nick);
    ws.send('JOIN #' + TWITCH_CHANNEL);
    setStatus('live', 'listening · #' + TWITCH_CHANNEL);
  };
  ws.onmessage = (ev) => {
    const lines = ev.data.split('\r\n');
    for (const line of lines){
      if (!line) continue;
      if (line.startsWith('PING ')){
        ws.send('PONG ' + line.slice(5));
        continue;
      }
      const msg = parsePrivmsg(line);
      if (msg) pushMessage(msg.user, msg.text);
    }
  };
  ws.onclose = () => {
    setStatus('away', 'reconnecting · 5s');
    setTimeout(connectTwitch, 5000);
  };
  ws.onerror = () => {
    setStatus('away', 'chat offline');
  };
}

// Parse a single IRC PRIVMSG line into { user, text }
function parsePrivmsg(line){
  // Strip optional @tags prefix
  let l = line;
  if (l.startsWith('@')){
    const sp = l.indexOf(' ');
    if (sp === -1) return null;
    l = l.slice(sp + 1);
  }
  // Form: :user!user@user.tmi.twitch.tv PRIVMSG #channel :message
  const m = l.match(/^:([^!]+)![^ ]+ PRIVMSG #[^ ]+ :(.*)$/);
  if (!m) return null;
  return { user: m[1], text: m[2] };
}

function setStatus(kind, text){
  statusDot.className = 'status-dot ' + kind;
  statusText.textContent = text;
}

function seedExamples(){
  const examples = [
    { user: 'noothropic',   text: 'this attic is unreasonably cozy' },
    { user: 'paulrinaldi',  text: 'love the jars' },
    { user: 'zennlogic',    text: 'one for each thought' },
    { user: 'awarpigeon',   text: 'put my thoughts in the big one' },
    { user: 'fela',         text: 'the attic remembers' },
    { user: 'marcipopsis',  text: 'sepia · always sepia' },
  ];
  for (const e of examples) pushMessage(e.user, e.text);
}

// ── DUST MOTES — drifting particles on a fixed canvas overlay ──
const dustC = document.getElementById('dust');
const dCtx = dustC.getContext('2d');
const motes = [];
function resizeDust(){
  dustC.width = window.innerWidth;
  dustC.height = window.innerHeight;
}
window.addEventListener('resize', resizeDust);
resizeDust();
for (let i = 0; i < 80; i++){
  motes.push({
    x: Math.random() * window.innerWidth,
    y: Math.random() * window.innerHeight,
    vx: (Math.random() - 0.5) * 0.2,
    vy: -0.05 - Math.random() * 0.15,
    r: 0.4 + Math.random() * 1.4,
    phase: Math.random() * 6.28,
    layer: Math.random() < 0.5 ? 0.5 : 1,
  });
}
function tickDust(){
  dCtx.clearRect(0, 0, dustC.width, dustC.height);
  for (const m of motes){
    m.x += m.vx; m.y += m.vy;
    m.phase += 0.012;
    if (m.y < -10){ m.y = dustC.height + 10; m.x = Math.random() * dustC.width; }
    if (m.x < -10) m.x = dustC.width + 10;
    if (m.x > dustC.width + 10) m.x = -10;
    const a = (0.18 + Math.sin(m.phase) * 0.15) * m.layer;
    dCtx.fillStyle = 'rgba(255,228,180,' + a.toFixed(3) + ')';
    dCtx.beginPath(); dCtx.arc(m.x, m.y, m.r, 0, Math.PI * 2); dCtx.fill();
  }
  requestAnimationFrame(tickDust);
}
requestAnimationFrame(tickDust);

// ── boot ───────────────────────────────────────────────────────
seedExamples();          // start with a handful so the attic isn't empty
connectTwitch();         // then connect live and overwrite as messages arrive
</script>
</body>
</html>
