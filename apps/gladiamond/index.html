<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gladiamond — isometric melee arena</title>
<meta name="description" content="An isometric diamond-tile arena. One hero, one sword, endless slimes. WASD + Space.">
<link rel="icon" href="https://emojicdn.elk.sh/⚔️">
<meta property="og:title" content="Gladiamond">
<meta property="og:description" content="Isometric diamond-tile arena — one hero, one sword, endless slimes. WASD + Space.">
<meta property="og:url" content="https://sloppy.live/gladiamond">
<meta property="og:image" content="https://image.pollinations.ai/prompt/isometric%20pixel%20art%20diamond%20tile%20arena%2C%20tiny%20knight%20with%20sword%20fighting%20green%20slimes%2C%20deep%20indigo%20dungeon%2C%20teal%20rim%20light%2C%20ember%20particles%2C%20crisp%20game%20art?width=1200&height=630&seed=7741&nologo=true&model=flux&image=.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jacquard+12&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --void:#100c1e; --panel:#1c1633; --line:#443a68; --teal:#7fe7ff; --gold:#e8b23c;
  --slime:#56c98e; --blood:#ff5a4a; --dim:#9a8fc0;
}
*{box-sizing:border-box;}
html{font-size:100%;}
html,body{height:100%;}
body{
  margin:0; font-family:'Space Mono',monospace; color:#efeafc; overflow:hidden;
  background:
    radial-gradient(900px 600px at 50% -10%, rgba(127,231,255,.07), transparent 60%),
    radial-gradient(700px 500px at 85% 110%, rgba(232,178,60,.06), transparent 55%),
    var(--void);
}
#stage{position:fixed; inset:0; display:flex; align-items:center; justify-content:center;}
canvas{display:block; image-rendering:pixelated;}
.hud{
  position:fixed; top:.7rem; left:50%; transform:translateX(-50%); z-index:5;
  display:flex; align-items:center; gap:1.1rem; pointer-events:none;
  background:rgba(16,12,30,.72); border:1px solid var(--line); border-radius:10px;
  padding:.35rem 1rem; backdrop-filter:blur(3px);
}
.hud .t{font-family:'Jacquard 12',monospace; font-size:1.5rem; line-height:1; color:var(--gold);}
.hud .stat{font-size:.78rem; letter-spacing:.06em; color:var(--dim);}
.hud .stat b{color:#efeafc; font-size:.95rem;}
.hud .hearts{letter-spacing:.1em; font-size:.9rem;}
#hint{
  position:fixed; bottom:.9rem; left:50%; transform:translateX(-50%); z-index:5;
  font-size:.72rem; letter-spacing:.12em; color:var(--dim); text-transform:uppercase;
  background:rgba(16,12,30,.6); border-radius:99px; padding:.3rem .95rem;
  transition:opacity 1s; pointer-events:none;
}
#hint.gone{opacity:0;}
.overlay{
  position:fixed; inset:0; z-index:10; display:none; align-items:center; justify-content:center;
  background:rgba(16,12,30,.82); backdrop-filter:blur(4px);
}
.overlay.on{display:flex;}
.card{
  text-align:center; padding:2rem 2.4rem; background:var(--panel); border:1px solid var(--line);
  border-radius:14px; box-shadow:0 24px 60px rgba(0,0,0,.55); max-width:26rem;
}
.card h1{font-family:'Jacquard 12',monospace; font-weight:400; font-size:clamp(3rem,10vw,4.6rem); margin:0; line-height:.9; color:var(--gold);}
.card h1 span{color:var(--teal);}
.card p{color:var(--dim); font-size:.85rem; margin:.9rem 0;}
.card .big{font-size:2.4rem; font-family:'Jacquard 12',monospace; color:#efeafc; margin:.2rem 0;}
.card kbd{
  font-family:inherit; border:1px solid var(--line); border-bottom-width:3px; border-radius:5px;
  padding:.1rem .45rem; font-size:.78rem; background:#241c42; color:#efeafc;
}
button{
  font-family:'Space Mono',monospace; font-weight:700; font-size:1rem; letter-spacing:.08em; cursor:pointer;
  min-height:2.75rem; padding:.6rem 1.9rem; border-radius:10px; border:1px solid var(--gold);
  background:var(--gold); color:var(--void);
}
button:hover{filter:brightness(1.1);}
button:focus-visible{outline:3px solid var(--teal); outline-offset:3px;}
/* touch controls */
#pad{position:fixed; left:1.1rem; bottom:1.1rem; width:8.5rem; height:8.5rem; z-index:6; display:none; touch-action:none;}
#pad .ring{position:absolute; inset:0; border-radius:50%; border:2px solid var(--line); background:rgba(28,22,51,.5);}
#pad .nub{position:absolute; width:3.4rem; height:3.4rem; border-radius:50%; background:rgba(127,231,255,.35); border:2px solid var(--teal); left:50%; top:50%; transform:translate(-50%,-50%);}
#atk{
  position:fixed; right:1.2rem; bottom:1.6rem; width:5.5rem; height:5.5rem; z-index:6; display:none;
  border-radius:50%; border:2px solid var(--gold); background:rgba(232,178,60,.28); color:var(--gold);
  font-family:'Jacquard 12',monospace; font-size:1.6rem; padding:0; touch-action:none;
}
@media (pointer:coarse){ #pad,#atk{display:block;} #hint{display:none;} }
@media (prefers-reduced-motion: reduce){ #hint{transition:none;} }
</style>
</head>
<body>
<div id="stage"><canvas id="cv" role="application" aria-label="Gladiamond arena. Move with W A S D or arrow keys, strike with Space. On touch devices use the joystick and sword button."></canvas></div>

<div class="hud" role="status" aria-live="off">
  <span class="t" aria-hidden="true">Gladiamond</span>
  <span class="stat">slain <b id="kills">0</b></span>
  <span class="stat hearts" id="hearts" aria-label="health">♥♥♥♥♥</span>
  <span class="stat"><b id="wave">1</b> wave</span>
</div>
<p id="hint">WASD move · SPACE strike · M mute</p>

<div class="overlay on" id="start-ov" role="dialog" aria-modal="true" aria-labelledby="st-h">
  <div class="card">
    <h1 id="st-h">GLADI<span>◆</span>MOND</h1>
    <p>a diamond pit. a sword. company is coming.</p>
    <p><kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> move &nbsp; <kbd>SPACE</kbd> strike &nbsp; <kbd>M</kbd> mute</p>
    <button id="start-btn" type="button">enter the pit</button>
  </div>
</div>

<div class="overlay" id="over-ov" role="dialog" aria-modal="true" aria-labelledby="go-h">
  <div class="card">
    <h1 id="go-h" style="color:var(--blood);">FELLED</h1>
    <p class="big" id="go-stats">0 slain</p>
    <p id="go-best"></p>
    <button id="retry-btn" type="button">once more</button>
  </div>
</div>

<button id="atk" type="button" aria-label="Strike">⚔</button>
<div id="pad" aria-hidden="true"><div class="ring"></div><div class="nub" id="nub"></div></div>

<script>
(function(){
"use strict";
/* ── iso projection: diamond tiles from the start ── */
var TILE_W=64, TILE_H=32, N=13;           // 13×13 world grid
var WALL_H=26;
function isoX(x,y){ return (x-y)*TILE_W/2; }
function isoY(x,y){ return (x+y)*TILE_H/2; }

var cv=document.getElementById('cv'), ctx=cv.getContext('2d');
var killsEl=document.getElementById('kills'), heartsEl=document.getElementById('hearts'),
    waveEl=document.getElementById('wave'), hint=document.getElementById('hint'),
    startOv=document.getElementById('start-ov'), overOv=document.getElementById('over-ov'),
    goStats=document.getElementById('go-stats'), goBest=document.getElementById('go-best');

var view={s:1, ox:0, oy:0, w:0, h:0};
function resize(){
  var dpr=Math.min(devicePixelRatio||1,2);
  var vw=innerWidth, vh=innerHeight;
  var worldW=N*TILE_W+40, worldH=N*TILE_H+WALL_H*2+90;
  view.s=Math.min(vw/worldW, vh/worldH);
  view.w=vw; view.h=vh;
  cv.width=vw*dpr; cv.height=vh*dpr;
  cv.style.width=vw+'px'; cv.style.height=vh+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  view.ox=vw/2;
  view.oy=(vh - N*TILE_H*view.s)/2 + 14;
}
addEventListener('resize',resize); resize();

/* ── audio ── */
var AC=null, muted=false;
function ac(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return AC; }
function snd(fn){ if(muted) return; var c=ac(); if(!c) return; try{ fn(c); }catch(e){} }
function tone(c,type,f0,f1,dur,vol){
  var o=c.createOscillator(), g=c.createGain();
  o.type=type; o.frequency.setValueAtTime(f0,c.currentTime);
  if(f1) o.frequency.exponentialRampToValueAtTime(f1,c.currentTime+dur);
  g.gain.setValueAtTime(vol,c.currentTime);
  g.gain.exponentialRampToValueAtTime(.0001,c.currentTime+dur);
  o.connect(g).connect(c.destination); o.start(); o.stop(c.currentTime+dur+.02);
}
function noise(c,dur,vol,fq){
  var len=c.sampleRate*dur, buf=c.createBuffer(1,len,c.sampleRate), d=buf.getChannelData(0);
  for(var i=0;i<len;i++) d[i]=(Math.random()*2-1)*(1-i/len);
  var s=c.createBufferSource(); s.buffer=buf;
  var f=c.createBiquadFilter(); f.type='bandpass'; f.frequency.value=fq||1400; f.Q.value=1.2;
  var g=c.createGain(); g.gain.value=vol;
  s.connect(f).connect(g).connect(c.destination); s.start();
}
var sSwing=function(){ snd(function(c){ noise(c,.14,.25,2400); tone(c,'sawtooth',420,180,.12,.05); }); };
var sHit=function(){ snd(function(c){ tone(c,'square',220,90,.1,.14); noise(c,.08,.2,900); }); };
var sKill=function(){ snd(function(c){ tone(c,'triangle',520,880,.16,.14); tone(c,'triangle',660,1100,.2,.09); }); };
var sHurt=function(){ snd(function(c){ tone(c,'sawtooth',300,80,.28,.16); }); };
var sWave=function(){ snd(function(c){ [440,554,659].forEach(function(f,i){ setTimeout(function(){ snd(function(c2){ tone(c2,'triangle',f,f,.18,.1); }); }, i*110); }); }); };
var sOver=function(){ snd(function(c){ tone(c,'sawtooth',330,60,.9,.14); }); };

/* ── state ── */
var st=null, best=+(localStorage.getItem('gladiamond-best')||0);
var reduceMotion=matchMedia('(prefers-reduced-motion: reduce)').matches;
function newGame(){
  st={
    hero:{x:N/2, y:N/2, vx:0, vy:0, face:{x:1,y:0}, hp:5, iframes:0,
          swing:0, swingDir:{x:1,y:0}, walk:0},
    slimes:[], parts:[], slashes:[],
    kills:0, wave:1, spawnT:1.2, alive:0, toSpawn:3, running:true, shake:0, t:0
  };
  updateHud();
}
var MIN=1.55, MAX=N-1.55;   // inner bounds inside the walls
var PILLARS=[{x:3.5,y:3.5},{x:N-3.5,y:3.5},{x:3.5,y:N-3.5},{x:N-3.5,y:N-3.5}];

function updateHud(){
  killsEl.textContent=st.kills;
  waveEl.textContent=st.wave;
  heartsEl.textContent='♥'.repeat(Math.max(0,st.hero.hp))+'♡'.repeat(Math.max(0,5-st.hero.hp));
}

/* ── input ── */
var keys={}, touchVec={x:0,y:0};
addEventListener('keydown',function(e){
  if(e.repeat) return;
  var k=e.key.toLowerCase();
  if(k==='m'){ muted=!muted; return; }
  if(['w','a','s','d','arrowup','arrowdown','arrowleft','arrowright',' '].indexOf(k)>=0){
    if(st&&st.running) e.preventDefault();
    keys[k]=true;
    if(k===' ') strike();
    hint.classList.add('gone');
  }
  if(k==='r'&&st&&!st.running){ restart(); }
});
addEventListener('keyup',function(e){ keys[e.key.toLowerCase()]=false; });

/* screen-relative WASD → world axes (diamond projection means
   screen-up is world (-1,-1), screen-right is world (+1,-1)) */
var IRT=1/Math.SQRT2;
function inputVec(){
  var sx=0, sy=0;
  if(keys.w||keys.arrowup) sy-=1;
  if(keys.s||keys.arrowdown) sy+=1;
  if(keys.a||keys.arrowleft) sx-=1;
  if(keys.d||keys.arrowright) sx+=1;
  sx+=touchVec.x; sy+=touchVec.y;
  var wx=(sx+sy)*IRT, wy=(sy-sx)*IRT;      // rotate screen vector into world grid
  var m=Math.hypot(wx,wy);
  return m>1?{x:wx/m,y:wy/m}:{x:wx,y:wy};
}

function strike(){
  if(!st||!st.running||st.hero.swing>0) return;
  st.hero.swing=.3;
  st.hero.swingDir={x:st.hero.face.x, y:st.hero.face.y};
  sSwing();
  var h=st.hero, hitAny=false;
  st.slimes.forEach(function(sl){
    var dx=sl.x-h.x, dy=sl.y-h.y, d=Math.hypot(dx,dy);
    if(d>1.35||d===0) return;
    var dot=(dx/d)*h.swingDir.x+(dy/d)*h.swingDir.y;
    if(dot<0.25) return;                     // ~105° arc in front
    sl.hp--; sl.flash=.18; hitAny=true;
    var kb=2.6; sl.kx=dx/d*kb; sl.ky=dy/d*kb;
    if(sl.hp<=0){ sl.dead=true; st.kills++; sKill(); burst(sl.x,sl.y,'#56c98e',14); }
    else sHit();
  });
  if(hitAny){ st.shake=reduceMotion?0:5; updateHud(); }
  st.slashes.push({x:h.x,y:h.y,dir:Math.atan2(h.swingDir.y,h.swingDir.x),t:.22});
}

/* ── slimes ── */
function spawnSlime(fx,fy){
  var edge=Math.floor(Math.random()*4), t=MIN+Math.random()*(MAX-MIN);
  var x=fx!=null?fx:(edge===0?MIN:edge===1?MAX:t);
  var y=fy!=null?fy:(edge===2?MIN:edge===3?MAX:t);
  st.slimes.push({x:x,y:y,hp:2,flash:0,kx:0,ky:0,dead:false,bob:Math.random()*6,
                  spd:.85+Math.random()*.35+st.wave*.05});
}
function burst(x,y,color,n){
  for(var i=0;i<(reduceMotion?Math.min(n,5):n);i++){
    var a=Math.random()*Math.PI*2, v=.8+Math.random()*2.4;
    st.parts.push({x:x,y:y,vx:Math.cos(a)*v,vy:Math.sin(a)*v,z:0,vz:2+Math.random()*3,
                   life:.5+Math.random()*.4,color:color});
  }
}

/* ── collision helper ── */
function clampWorld(e,r){
  e.x=Math.max(MIN,Math.min(MAX,e.x));
  e.y=Math.max(MIN,Math.min(MAX,e.y));
  PILLARS.forEach(function(p){
    var dx=e.x-p.x, dy=e.y-p.y, d=Math.hypot(dx,dy), min=r+.52;
    if(d<min&&d>0){ e.x=p.x+dx/d*min; e.y=p.y+dy/d*min; }
  });
}

/* ── update ── */
function update(dt){
  if(!st.running) return;
  st.t+=dt;
  var h=st.hero;
  var iv=inputVec(), sp=4.6;
  h.vx=iv.x*sp; h.vy=iv.y*sp;
  h.x+=h.vx*dt; h.y+=h.vy*dt;
  clampWorld(h,.3);
  var moving=Math.hypot(h.vx,h.vy)>.1;
  if(moving){ h.face={x:h.vx/Math.hypot(h.vx,h.vy), y:h.vy/Math.hypot(h.vx,h.vy)}; h.walk+=dt*10; }
  if(h.swing>0) h.swing-=dt;
  if(h.iframes>0) h.iframes-=dt;

  /* waves */
  st.spawnT-=dt;
  if(st.toSpawn>0&&st.spawnT<=0){ spawnSlime(); st.toSpawn--; st.spawnT=.9; }
  if(st.toSpawn===0&&st.slimes.length===0){
    st.wave++; st.toSpawn=2+st.wave; st.spawnT=1.4; sWave(); updateHud();
  }

  /* slimes */
  st.slimes=st.slimes.filter(function(sl){ return !sl.dead; });
  st.slimes.forEach(function(sl){
    sl.bob+=dt*6; if(sl.flash>0) sl.flash-=dt;
    sl.x+=sl.kx*dt; sl.y+=sl.ky*dt; sl.kx*=Math.pow(.02,dt); sl.ky*=Math.pow(.02,dt);
    var dx=h.x-sl.x, dy=h.y-sl.y, d=Math.hypot(dx,dy);
    if(d>.05){ sl.x+=dx/d*sl.spd*dt; sl.y+=dy/d*sl.spd*dt; }
    clampWorld(sl,.26);
    if(d<.55&&h.iframes<=0){
      h.hp--; h.iframes=1; sHurt(); updateHud();
      var kb=1.6; h.x-= dx/Math.max(d,.1)*kb*dt*30; h.y-=dy/Math.max(d,.1)*kb*dt*30;
      clampWorld(h,.3);
      st.shake=reduceMotion?0:8; burst(h.x,h.y,'#ff5a4a',8);
      if(h.hp<=0) gameOver();
    }
  });

  /* particles + slashes */
  st.parts=st.parts.filter(function(p){ return (p.life-=dt)>0; });
  st.parts.forEach(function(p){ p.x+=p.vx*dt; p.y+=p.vy*dt; p.z+=p.vz*dt; p.vz-=12*dt; if(p.z<0){p.z=0;p.vz*=-.4;} });
  st.slashes=st.slashes.filter(function(s){ return (s.t-=dt)>0; });
  if(st.shake>0) st.shake=Math.max(0,st.shake-dt*30);
}
function gameOver(){
  st.running=false; sOver();
  if(st.kills>best){ best=st.kills; localStorage.setItem('gladiamond-best',best); }
  goStats.textContent=st.kills+' slain · wave '+st.wave;
  goBest.textContent='best: '+best+' slain';
  overOv.classList.add('on');
  document.getElementById('retry-btn').focus();
}
function restart(){ overOv.classList.remove('on'); newGame(); }

/* ── render ── */
function tilePath(cx,cy,scale){
  var hw=TILE_W/2*(scale||1), hh=TILE_H/2*(scale||1);
  ctx.beginPath();
  ctx.moveTo(cx,cy-hh); ctx.lineTo(cx+hw,cy); ctx.lineTo(cx,cy+hh); ctx.lineTo(cx-hw,cy);
  ctx.closePath();
}
function drawFloor(){
  for(var y=1;y<N-1;y++) for(var x=1;x<N-1;x++){
    var cx=isoX(x+.5,y+.5), cy=isoY(x+.5,y+.5);
    tilePath(cx,cy,1);
    ctx.fillStyle=((x+y)%2)?'#2e2547':'#352b52';
    ctx.fill();
    ctx.strokeStyle='rgba(127,231,255,.10)'; ctx.lineWidth=1; ctx.stroke();
  }
}
function drawWallBlock(x,y){
  var cx=isoX(x+.5,y+.5), cy=isoY(x+.5,y+.5);
  var hw=TILE_W/2, hh=TILE_H/2;
  /* left face */
  ctx.fillStyle='#171130';
  ctx.beginPath(); ctx.moveTo(cx-hw,cy); ctx.lineTo(cx,cy+hh); ctx.lineTo(cx,cy+hh-WALL_H); ctx.lineTo(cx-hw,cy-WALL_H); ctx.closePath(); ctx.fill();
  /* right face */
  ctx.fillStyle='#1f1839';
  ctx.beginPath(); ctx.moveTo(cx+hw,cy); ctx.lineTo(cx,cy+hh); ctx.lineTo(cx,cy+hh-WALL_H); ctx.lineTo(cx+hw,cy-WALL_H); ctx.closePath(); ctx.fill();
  /* top */
  tilePath(cx,cy-WALL_H,1);
  ctx.fillStyle='#443a68'; ctx.fill();
  ctx.strokeStyle='rgba(127,231,255,.14)'; ctx.stroke();
}
function drawShadow(cx,cy,r){
  ctx.fillStyle='rgba(0,0,0,.35)';
  ctx.beginPath(); ctx.ellipse(cx,cy,r,r*.45,0,0,Math.PI*2); ctx.fill();
}
function drawHero(h){
  var cx=isoX(h.x,h.y), cy=isoY(h.x,h.y);
  var bob=Math.abs(Math.sin(h.walk))*2.5;
  var flicker=h.iframes>0&&Math.floor(st.t*18)%2===0;
  drawShadow(cx,cy,13);
  if(flicker) return;
  var yb=cy-bob;
  /* legs */
  ctx.strokeStyle='#3a2f16'; ctx.lineWidth=4; ctx.lineCap='round';
  var lg=Math.sin(h.walk)*4;
  ctx.beginPath(); ctx.moveTo(cx-4,yb-10); ctx.lineTo(cx-4+lg*.4,yb); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(cx+4,yb-10); ctx.lineTo(cx+4-lg*.4,yb); ctx.stroke();
  /* tunic */
  ctx.fillStyle='#e8b23c';
  ctx.beginPath(); ctx.ellipse(cx,yb-16,9,10,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(0,0,0,.18)';
  ctx.beginPath(); ctx.ellipse(cx+3,yb-14,5,7,0,0,Math.PI*2); ctx.fill();
  /* head + helm */
  ctx.fillStyle='#f4e6c8';
  ctx.beginPath(); ctx.arc(cx,yb-29,6.5,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#4a3f6e';
  ctx.beginPath(); ctx.arc(cx,yb-31,6.8,Math.PI,0); ctx.fill();
  ctx.fillRect(cx-6.8,yb-31,13.6,2.6);
  /* sword */
  var sa;
  if(h.swing>0){
    var k=1-(h.swing/.3);                   // 0→1 over the swing
    sa=Math.atan2(h.swingDir.y,h.swingDir.x)*0+isoAngle(h.swingDir)-1.3+k*2.6;
  } else sa=isoAngle(h.face)+.55;
  var sx0=cx+Math.cos(sa)*8, sy0=yb-16+Math.sin(sa)*4;
  var sx1=cx+Math.cos(sa)*24, sy1=yb-16+Math.sin(sa)*12;
  ctx.strokeStyle='#cfd6e4'; ctx.lineWidth=3.4;
  ctx.beginPath(); ctx.moveTo(sx0,sy0); ctx.lineTo(sx1,sy1); ctx.stroke();
  ctx.strokeStyle='#8d5b21'; ctx.lineWidth=4.4;
  ctx.beginPath(); ctx.moveTo(sx0,sy0); ctx.lineTo(cx+Math.cos(sa)*11,sy0+Math.sin(sa)*1.5); ctx.stroke();
}
function isoAngle(v){ return Math.atan2((v.x+v.y)*.5,(v.x-v.y)); }
function drawSlime(sl){
  var cx=isoX(sl.x,sl.y), cy=isoY(sl.x,sl.y);
  var sq=1+Math.sin(sl.bob)*.12;
  drawShadow(cx,cy,10*sq);
  ctx.fillStyle=sl.flash>0?'#eafff3':'#56c98e';
  ctx.beginPath(); ctx.ellipse(cx,cy-7,10*sq,8/sq,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle=sl.flash>0?'#fff':'#2e7d55';
  ctx.beginPath(); ctx.ellipse(cx,cy-6,7*sq,5/sq,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#10241a';
  ctx.beginPath(); ctx.arc(cx-3,cy-9,1.4,0,Math.PI*2); ctx.arc(cx+3,cy-9,1.4,0,Math.PI*2); ctx.fill();
  if(sl.hp<2){ ctx.fillStyle='rgba(255,90,74,.85)'; ctx.fillRect(cx-8,cy-20,16*(sl.hp/2)||.001,3); ctx.strokeStyle='rgba(0,0,0,.5)'; ctx.strokeRect(cx-8,cy-20,16,3); }
}
function drawPillar(p){
  var cx=isoX(p.x,p.y), cy=isoY(p.x,p.y), H=42;
  drawShadow(cx,cy+2,16);
  ctx.fillStyle='#241c42'; ctx.fillRect(cx-9,cy-H,18,H);
  ctx.fillStyle='#171130'; ctx.fillRect(cx+3,cy-H,6,H);
  tilePath(cx,cy-H,.42); ctx.fillStyle='#443a68'; ctx.fill();
  ctx.strokeStyle='rgba(127,231,255,.2)'; ctx.stroke();
  tilePath(cx,cy,.42); ctx.fillStyle='rgba(0,0,0,.25)'; ctx.fill();
}
function drawSlash(s){
  var cx=isoX(s.x,s.y), cy=isoY(s.x,s.y)-14;
  var k=1-s.t/.22;
  var a0=isoAngle({x:Math.cos(s.dir),y:Math.sin(s.dir)});
  ctx.strokeStyle='rgba(127,231,255,'+(0.75*(1-k))+')';
  ctx.lineWidth=5*(1-k)+1.5;
  ctx.beginPath(); ctx.ellipse(cx,cy,26+k*10,14+k*5,0,a0-1.1,a0+1.1); ctx.stroke();
}
function drawPart(p){
  var cx=isoX(p.x,p.y), cy=isoY(p.x,p.y)-p.z*8;
  ctx.fillStyle=p.color; ctx.globalAlpha=Math.max(0,Math.min(1,p.life*2));
  ctx.fillRect(cx-2,cy-2,4,4); ctx.globalAlpha=1;
}

function render(){
  ctx.clearRect(0,0,view.w,view.h);
  ctx.save();
  var shx=st.shake?(Math.random()-.5)*st.shake:0, shy=st.shake?(Math.random()-.5)*st.shake*.6:0;
  ctx.translate(view.ox+shx, view.oy+shy);
  ctx.scale(view.s,view.s);
  /* back walls (rows x=0 and y=0) */
  for(var i=0;i<N;i++){ drawWallBlock(i,0); }
  for(var j=1;j<N-1;j++){ drawWallBlock(0,j); }
  drawFloor();
  /* depth-sorted entities */
  var ents=[];
  PILLARS.forEach(function(p){ ents.push({d:p.x+p.y, f:function(){ drawPillar(p); }}); });
  st.slimes.forEach(function(sl){ ents.push({d:sl.x+sl.y, f:function(){ drawSlime(sl); }}); });
  ents.push({d:st.hero.x+st.hero.y, f:function(){ drawHero(st.hero); }});
  st.parts.forEach(function(p){ ents.push({d:p.x+p.y, f:function(){ drawPart(p); }}); });
  st.slashes.forEach(function(s){ ents.push({d:s.x+s.y+.01, f:function(){ drawSlash(s); }}); });
  ents.sort(function(a,b){ return a.d-b.d; });
  ents.forEach(function(e){ e.f(); });
  /* front walls (rows x=N-1, y=N-1) drawn last — they overlap entities correctly */
  for(var k=1;k<N;k++){ drawWallBlock(N-1,k); }
  for(var m2=1;m2<N-1;m2++){ drawWallBlock(m2,N-1); }
  ctx.restore();
}

/* ── loop ── */
var last=0, raf=0;
function loop(t){
  raf=requestAnimationFrame(loop);
  var dt=Math.min(.05,(t-last)/1000||.016); last=t;
  if(st){ update(dt); render(); }
}

/* ── touch controls ── */
var pad=document.getElementById('pad'), nub=document.getElementById('nub'), atk=document.getElementById('atk');
var padActive=false, padId=null;
function padMove(e){
  var r=pad.getBoundingClientRect(), t=null;
  for(var i=0;i<e.touches.length;i++) if(e.touches[i].identifier===padId) t=e.touches[i];
  if(!t) return;
  var dx=t.clientX-(r.left+r.width/2), dy=t.clientY-(r.top+r.height/2);
  var m=Math.hypot(dx,dy), max=r.width/2;
  if(m>max){ dx=dx/m*max; dy=dy/m*max; }
  touchVec.x=dx/max; touchVec.y=dy/max;
  nub.style.left='calc(50% + '+dx+'px)'; nub.style.top='calc(50% + '+dy+'px)';
}
pad.addEventListener('touchstart',function(e){ e.preventDefault(); padId=e.changedTouches[0].identifier; padActive=true; padMove(e); },{passive:false});
pad.addEventListener('touchmove',function(e){ e.preventDefault(); padMove(e); },{passive:false});
pad.addEventListener('touchend',function(e){ e.preventDefault(); padActive=false; padId=null; touchVec={x:0,y:0}; nub.style.left='50%'; nub.style.top='50%'; },{passive:false});
atk.addEventListener('touchstart',function(e){ e.preventDefault(); strike(); },{passive:false});
atk.addEventListener('click',function(){ strike(); });
cv.addEventListener('pointerdown',function(){ if(st&&st.running&&matchMedia('(pointer:fine)').matches) strike(); });

/* ── boot ── */
document.getElementById('start-btn').addEventListener('click',function(){
  startOv.classList.remove('on'); ac(); newGame();
});
document.getElementById('retry-btn').addEventListener('click',restart);

newGame(); st.running=false;   // render a frozen arena behind the start card
raf=requestAnimationFrame(loop);

/* debug hook (house test pattern) */
window.__arena={
  state:function(){ return st?{hero:{x:st.hero.x,y:st.hero.y,hp:st.hero.hp},slimes:st.slimes.length,kills:st.kills,wave:st.wave,running:st.running}:null; },
  start:function(){ startOv.classList.remove('on'); newGame(); },
  step:function(n,dt){ for(var i=0;i<(n||1);i++) update(dt||.016); },
  key:function(k,down){ keys[k]=down!==false; },
  strike:strike,
  spawn:function(x,y){ spawnSlime(x,y); },
  iso:{isoX:isoX,isoY:isoY}
};
})();
</script>
