<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Survivors</title>
<link rel="icon" href="https://emojicdn.elk.sh/⚡">
<meta property="og:title" content="Neon Survivors">
<meta property="og:description" content="Auto-battler roguelike. Dodge hordes, collect XP, pick upgrades, survive.">
<meta property="og:url" content="https://sloppy.live/neon-survivors">
<meta property="og:image" content="https://sloppy.live/neon-survivors/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700;800&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050510;overflow:hidden;display:flex;align-items:center;justify-content:center;min-height:100vh;font-family:'Chakra Petch',sans-serif}
canvas{display:block;image-rendering:auto}
#ui-bar{
  position:fixed;top:0;left:0;right:0;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:6px 14px;background:rgba(5,5,16,.9);
  border-bottom:1px solid rgba(0,255,180,.15);
  font-size:12px;color:#88ffcc;font-family:'Fira Code',monospace;
}
#ui-bar .title{font-family:'Chakra Petch';font-weight:800;font-size:16px;color:#00ffaa;letter-spacing:3px}
#ui-bar .stats{display:flex;gap:16px}
#ui-bar b{color:#ffdd44}
#xp-bar-wrap{
  position:fixed;top:32px;left:0;right:0;height:4px;z-index:10;
  background:rgba(0,255,180,.08);
}
#xp-bar{height:100%;width:0%;background:linear-gradient(90deg,#00ff88,#44ffdd);transition:width .2s}
#start-screen,#death-screen,#upgrade-screen{
  position:fixed;inset:0;z-index:30;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(5,5,16,.95);gap:10px;
}
#start-screen h1{font-size:48px;font-weight:800;color:#00ffaa;letter-spacing:6px;text-shadow:0 0 30px rgba(0,255,170,.4)}
.sub{font-size:13px;color:#447766;letter-spacing:3px;font-family:'Fira Code',monospace}
.info{font-size:12px;color:#668877;line-height:2;text-align:center;margin:8px 0}
.info kbd{background:rgba(0,255,170,.1);border:1px solid rgba(0,255,170,.2);border-radius:3px;padding:1px 7px;color:#88ffcc;font-size:11px}
.btn{
  margin-top:8px;padding:14px 44px;border:2px solid #00ffaa;border-radius:6px;
  background:transparent;color:#00ffaa;font-size:18px;font-weight:700;
  cursor:pointer;font-family:'Chakra Petch';letter-spacing:2px;transition:all .15s;
}
.btn:hover{background:rgba(0,255,170,.15);transform:scale(1.05);box-shadow:0 0 20px rgba(0,255,170,.3)}
.btn-death{border-color:#ff4466;color:#ff4466}
.btn-death:hover{background:rgba(255,68,102,.15);box-shadow:0 0 20px rgba(255,68,102,.3)}
#death-screen{display:none}
#death-screen h2{font-size:36px;color:#ff4466;text-shadow:0 0 20px rgba(255,68,102,.4)}
.death-stats{font-family:'Fira Code',monospace;font-size:13px;color:#88ffcc;line-height:2}
#upgrade-screen{display:none}
#upgrade-screen h2{font-size:24px;color:#ffdd44;letter-spacing:3px}
#upgrade-cards{display:flex;gap:14px;margin:12px 0;flex-wrap:wrap;justify-content:center}
.upg-card{
  width:180px;padding:16px 12px;border-radius:10px;cursor:pointer;
  border:2px solid rgba(255,221,68,.3);background:rgba(255,221,68,.05);
  text-align:center;transition:all .15s;
}
.upg-card:hover{border-color:#ffdd44;background:rgba(255,221,68,.12);transform:scale(1.05)}
.upg-icon{font-size:28px;margin-bottom:6px}
.upg-name{font-size:14px;font-weight:700;color:#ffdd44;margin-bottom:4px}
.upg-desc{font-size:11px;color:#88aa88;font-family:'Fira Code',monospace}
#touch-move{
  position:fixed;bottom:20px;left:20px;z-index:15;
  width:100px;height:100px;border-radius:50%;
  background:rgba(0,255,170,.06);border:2px solid rgba(0,255,170,.15);
  display:none;touch-action:none;
}
#touch-move .knob{
  position:absolute;width:36px;height:36px;border-radius:50%;
  background:rgba(0,255,170,.25);border:1px solid rgba(0,255,170,.4);
  top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;
}
@media(pointer:coarse){#touch-move{display:block}}
</style>
</head>
<body>

<div id="ui-bar" style="display:none">
  <span class="title">NEON SURVIVORS</span>
  <div class="stats">
    <span>LV <b id="ui-lv">1</b></span>
    <span>KILLS <b id="ui-kills">0</b></span>
    <span>TIME <b id="ui-time">0:00</b></span>
  </div>
</div>
<div id="xp-bar-wrap" style="display:none"><div id="xp-bar"></div></div>

<div id="start-screen">
  <h1>NEON SURVIVORS</h1>
  <div class="sub">AUTO-BATTLER ROGUELIKE</div>
  <div class="info">
    <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> or <kbd>Arrows</kbd> to move<br>
    Auto-fire at nearest enemies<br>
    Collect XP gems · Level up · Pick upgrades · Survive
  </div>
  <button class="btn" id="start-btn">SURVIVE</button>
</div>

<div id="death-screen">
  <h2>OVERWHELMED</h2>
  <div class="death-stats" id="death-stats"></div>
  <button class="btn btn-death" id="retry-btn">AGAIN</button>
</div>

<div id="upgrade-screen">
  <h2>⚡ LEVEL UP ⚡</h2>
  <div id="upgrade-cards"></div>
</div>

<div id="touch-move"><div class="knob" id="knob"></div></div>

<canvas id="c"></canvas>

<script>
const C=document.getElementById('c'), X=C.getContext('2d');

// ── Arena ──
const AW=2400, AH=2400; // arena size
let W,H;

// ── Upgrades catalog ──
const UPGRADES=[
  {id:'dmg',     icon:'🗡️', name:'Damage+',       desc:'+25% projectile damage',       apply:s=>{s.dmg*=1.25}},
  {id:'spd',     icon:'💨', name:'Move Speed+',    desc:'+12% movement speed',          apply:s=>{s.spd*=1.12}},
  {id:'rate',    icon:'🔥', name:'Fire Rate+',     desc:'+20% attack speed',            apply:s=>{s.fireRate*=0.8}},
  {id:'proj',    icon:'✦',  name:'Extra Projectile',desc:'+1 projectile per volley',    apply:s=>{s.projCount++}},
  {id:'area',    icon:'💥', name:'Blast Radius+',  desc:'+30% projectile size',         apply:s=>{s.projSize*=1.3}},
  {id:'pierce',  icon:'🔱', name:'Pierce+',        desc:'Projectiles pierce +1 enemy',  apply:s=>{s.pierce++}},
  {id:'magnet',  icon:'🧲', name:'XP Magnet+',     desc:'+40% pickup range',            apply:s=>{s.magnetRange*=1.4}},
  {id:'maxhp',   icon:'❤️', name:'Max HP+',        desc:'+20 max health',               apply:s=>{s.maxHp+=20;s.hp=Math.min(s.hp+20,s.maxHp)}},
  {id:'regen',   icon:'💚', name:'Regen+',         desc:'Heal 0.5 HP/sec faster',       apply:s=>{s.regen+=0.5}},
  {id:'orbitals',icon:'🛡️', name:'Orbital+',       desc:'+1 spinning shield orb',       apply:s=>{s.orbitals++}},
  {id:'crit',    icon:'⚡', name:'Crit Chance+',   desc:'+8% chance for 2x damage',     apply:s=>{s.crit=Math.min(s.crit+0.08,0.6)}},
  {id:'luck',    icon:'🍀', name:'Luck+',          desc:'+15% XP from gems',            apply:s=>{s.xpMult*=1.15}},
  {id:'laser',   icon:'🔴', name:'Laser Beam',     desc:'Piercing beam every 2s',       apply:s=>{s.laser++}},
];

// ── State ──
let player, enemies, projectiles, gems, particles, floatTexts;
let gameTime, kills, paused, running, shakeT, shakeMag;
let keys={}, frame=0, cam={x:0,y:0};

function mkPlayer(){
  return {
    x:AW/2, y:AH/2, vx:0, vy:0, r:10,
    hp:100, maxHp:100, regen:0.5,
    spd:3, dmg:10, fireRate:24, fireCD:0,
    projCount:1, projSize:4, pierce:0,
    magnetRange:60, orbitals:0, crit:0.05,
    xp:0, xpNext:10, level:1, xpMult:1,
    iFrames:0, face:1, laser:0, laserCD:0,
  };
}

// ── Enemy types ──
const ETYPES=[
  {id:'drone',  r:8,  hp:15, spd:1.2, dmg:8,  col:'#ff4466', xp:2},
  {id:'tank',   r:14, hp:60, spd:0.6, dmg:15, col:'#ff8844', xp:5},
  {id:'swarm',  r:5,  hp:8,  spd:2.0, dmg:5,  col:'#ffaa22', xp:1},
  {id:'ghost',  r:10, hp:25, spd:1.5, dmg:12, col:'#aa44ff', xp:3},
  {id:'brute',  r:18, hp:120,spd:0.4, dmg:25, col:'#ff2222', xp:8},
];

function spawnEnemy(){
  const elapsed=gameTime/60;
  // Difficulty ramp
  const tier=Math.min(Math.floor(elapsed/30), ETYPES.length-1);
  const pool=ETYPES.slice(0, tier+2);
  const et=pool[Math.floor(Math.random()*pool.length)];
  // Spawn outside screen
  const angle=Math.random()*Math.PI*2;
  const dist=Math.max(W,H)/2+60;
  const ex=player.x+Math.cos(angle)*dist;
  const ey=player.y+Math.sin(angle)*dist;
  const hpScale=1+elapsed*0.03;
  enemies.push({
    x:Math.max(et.r,Math.min(AW-et.r,ex)),
    y:Math.max(et.r,Math.min(AH-et.r,ey)),
    r:et.r, hp:et.hp*hpScale, maxHp:et.hp*hpScale,
    spd:et.spd, dmg:et.dmg, col:et.col, xp:et.xp,
    hitFlash:0,
  });
}

// ── Spawn wave logic ──
let spawnCD=0;
function updateSpawns(){
  const elapsed=gameTime/60;
  const rate=Math.max(4, 30-elapsed*0.5); // frames between spawns
  const batchSize=Math.min(1+Math.floor(elapsed/20), 5);
  spawnCD--;
  if(spawnCD<=0){
    for(let i=0;i<batchSize;i++) spawnEnemy();
    spawnCD=rate;
  }
  // Boss wave every 60s
  if(gameTime>0 && gameTime%(60*60)===0){
    for(let i=0;i<3+Math.floor(elapsed/60)*2;i++) spawnEnemy();
  }
}

// ── Projectiles ──
function fireProjectiles(){
  const p=player;
  if(p.fireCD>0){p.fireCD--;return}
  if(enemies.length===0)return;
  // Find nearest enemy
  let nearest=null, nd=Infinity;
  for(const e of enemies){
    const d=Math.hypot(e.x-p.x,e.y-p.y);
    if(d<nd){nd=d;nearest=e}
  }
  if(!nearest||nd>400)return;
  const baseAngle=Math.atan2(nearest.y-p.y,nearest.x-p.x);
  const spread=p.projCount>1?0.3:0;
  for(let i=0;i<p.projCount;i++){
    const a=baseAngle+spread*(i-(p.projCount-1)/2);
    projectiles.push({
      x:p.x, y:p.y, vx:Math.cos(a)*8, vy:Math.sin(a)*8,
      dmg:p.dmg*(Math.random()<p.crit?2:1),
      r:p.projSize, pierce:p.pierce, life:90,
      isCrit:false,
    });
  }
  p.fireCD=p.fireRate;
  p.face=nearest.x>p.x?1:-1;
}

function updateProjectiles(){
  for(let i=projectiles.length-1;i>=0;i--){
    const b=projectiles[i];
    b.x+=b.vx; b.y+=b.vy; b.life--;
    if(b.life<=0||b.x<-50||b.x>AW+50||b.y<-50||b.y>AH+50){
      projectiles.splice(i,1); continue;
    }
    // Hit enemies
    for(let j=enemies.length-1;j>=0;j--){
      const e=enemies[j];
      if(Math.hypot(b.x-e.x,b.y-e.y)<b.r+e.r){
        e.hp-=b.dmg; e.hitFlash=6;
        spawnParticles(e.x,e.y,4,e.col);
        floatTexts.push({x:e.x,y:e.y-e.r,text:Math.round(b.dmg),col:b.dmg>=player.dmg*1.8?'#ffdd44':'#fff',life:30,vy:-1.5});
        if(b.pierce>0){b.pierce--}else{projectiles.splice(i,1)}
        if(e.hp<=0){
          kills++;
          spawnParticles(e.x,e.y,12,e.col);
          // Drop XP gem
          gems.push({x:e.x,y:e.y,xp:e.xp,r:3+e.xp*.5,life:600,col:'#44ffaa'});
          enemies.splice(j,1);
          shake(3,4);
        }
        break;
      }
    }
  }
}

// ── Orbitals ──
function updateOrbitals(){
  const p=player;
  if(p.orbitals<=0)return;
  const orbR=30;
  for(let i=0;i<p.orbitals;i++){
    const a=(frame*0.04)+i*(Math.PI*2/p.orbitals);
    const ox=p.x+Math.cos(a)*orbR, oy=p.y+Math.sin(a)*orbR;
    for(let j=enemies.length-1;j>=0;j--){
      const e=enemies[j];
      if(Math.hypot(ox-e.x,oy-e.y)<8+e.r){
        e.hp-=p.dmg*0.5; e.hitFlash=4;
        if(e.hp<=0){
          kills++;
          spawnParticles(e.x,e.y,10,e.col);
          gems.push({x:e.x,y:e.y,xp:e.xp,r:3+e.xp*.5,life:600,col:'#44ffaa'});
          enemies.splice(j,1);
        }
      }
    }
  }
}

// ── Laser beams ──
let laserBeams=[];
function updateLasers(){
  const p=player;
  if(p.laser<=0)return;
  if(p.laserCD>0){p.laserCD--;return}
  // Fire laser at nearest enemy
  if(enemies.length===0)return;
  let nearest=null,nd=Infinity;
  for(const e of enemies){
    const d=Math.hypot(e.x-p.x,e.y-p.y);
    if(d<nd){nd=d;nearest=e}
  }
  if(!nearest||nd>500)return;
  const angle=Math.atan2(nearest.y-p.y,nearest.x-p.x);
  const beamLen=400;
  // Damage all enemies along the beam
  const bx=Math.cos(angle), by=Math.sin(angle);
  for(const e of enemies){
    const ex=e.x-p.x, ey=e.y-p.y;
    const proj=ex*bx+ey*by;
    if(proj<0||proj>beamLen)continue;
    const perp=Math.abs(ex*by-ey*bx);
    if(perp<e.r+4){
      e.hp-=p.dmg*p.laser*0.8;
      e.hitFlash=6;
      if(e.hp<=0){
        kills++;
        spawnParticles(e.x,e.y,10,e.col);
        gems.push({x:e.x,y:e.y,xp:e.xp,r:3+e.xp*.5,life:600,col:'#44ffaa'});
      }
    }
  }
  // Remove dead enemies
  for(let i=enemies.length-1;i>=0;i--) if(enemies[i].hp<=0) enemies.splice(i,1);
  // Visual beam
  laserBeams.push({
    x:p.x, y:p.y,
    ex:p.x+bx*beamLen, ey:p.y+by*beamLen,
    life:12,
  });
  shake(2,3);
  p.laserCD=120; // 2 seconds at 60fps
}

// ── Player update ──
function updatePlayer(){
  const p=player;
  let mx=0,my=0;
  if(keys['w']||keys['arrowup'])my=-1;
  if(keys['s']||keys['arrowdown'])my=1;
  if(keys['a']||keys['arrowleft'])mx=-1;
  if(keys['d']||keys['arrowright'])mx=1;
  if(touchDir.x||touchDir.y){mx=touchDir.x;my=touchDir.y}
  const len=Math.hypot(mx,my);
  if(len>0){mx/=len;my/=len;p.face=mx>0?1:-1}
  p.x+=mx*p.spd; p.y+=my*p.spd;
  p.x=Math.max(p.r,Math.min(AW-p.r,p.x));
  p.y=Math.max(p.r,Math.min(AH-p.r,p.y));

  // Regen
  if(frame%60===0) p.hp=Math.min(p.hp+p.regen,p.maxHp);

  // iFrames
  if(p.iFrames>0)p.iFrames--;

  // Enemy collision
  for(const e of enemies){
    if(Math.hypot(e.x-p.x,e.y-p.y)<p.r+e.r && p.iFrames<=0){
      p.hp-=e.dmg;
      p.iFrames=30;
      shake(5,6);
      spawnParticles(p.x,p.y,8,'#ff4466');
      floatTexts.push({x:p.x,y:p.y-p.r,text:'-'+e.dmg,col:'#ff4466',life:40,vy:-2});
      if(p.hp<=0) die();
    }
  }

  // Collect gems
  for(let i=gems.length-1;i>=0;i--){
    const g=gems[i];
    g.life--;
    if(g.life<=0){gems.splice(i,1);continue}
    const d=Math.hypot(g.x-p.x,g.y-p.y);
    if(d<p.magnetRange){
      // Attract
      const pull=Math.min(5,p.magnetRange/Math.max(d,1)*2);
      g.x+=(p.x-g.x)/d*pull;
      g.y+=(p.y-g.y)/d*pull;
    }
    if(d<p.r+g.r+4){
      p.xp+=g.xp*p.xpMult;
      spawnParticles(g.x,g.y,5,'#44ffaa');
      gems.splice(i,1);
      checkLevelUp();
    }
  }
}

function checkLevelUp(){
  const p=player;
  while(p.xp>=p.xpNext){
    p.xp-=p.xpNext;
    p.level++;
    p.xpNext=Math.floor(p.xpNext*1.35)+5;
    showUpgradeScreen();
  }
}

// ── Enemies AI ──
function updateEnemies(){
  for(const e of enemies){
    const dx=player.x-e.x, dy=player.y-e.y;
    const d=Math.hypot(dx,dy);
    if(d>1){e.x+=dx/d*e.spd;e.y+=dy/d*e.spd}
    if(e.hitFlash>0) e.hitFlash--;
    // Separation from other enemies
    for(const o of enemies){
      if(o===e)continue;
      const sd=Math.hypot(o.x-e.x,o.y-e.y);
      const minD=e.r+o.r;
      if(sd<minD&&sd>0){
        const push=0.3;
        e.x-=(o.x-e.x)/sd*push;
        e.y-=(o.y-e.y)/sd*push;
      }
    }
  }
}

// ── Particles ──
function spawnParticles(x,y,n,col){
  for(let i=0;i<n;i++){
    const a=Math.random()*6.28, spd=1+Math.random()*3;
    particles.push({
      x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,
      life:1,decay:0.03+Math.random()*0.04,
      size:1.5+Math.random()*2.5,col
    });
  }
}
function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vx*=.96;p.vy*=.96;p.life-=p.decay;
    if(p.life<=0)particles.splice(i,1);
  }
}
function updateFloatTexts(){
  for(let i=floatTexts.length-1;i>=0;i--){
    const f=floatTexts[i];
    f.y+=f.vy;f.life--;
    if(f.life<=0)floatTexts.splice(i,1);
  }
}

// ── Screen shake ──
function shake(mag,dur){shakeMag=mag;shakeT=dur}

// ── Camera ──
function updateCam(){
  const tx=player.x-W/2, ty=player.y-H/2;
  cam.x+=(tx-cam.x)*0.1;
  cam.y+=(ty-cam.y)*0.1;
  cam.x=Math.max(0,Math.min(cam.x,AW-W));
  cam.y=Math.max(0,Math.min(cam.y,AH-H));
}

// ── Draw ──
function draw(){
  X.fillStyle='#050510';
  X.fillRect(0,0,W,H);

  X.save();
  // Shake
  let sx=0,sy=0;
  if(shakeT>0){
    sx=(Math.random()-.5)*shakeMag*2;
    sy=(Math.random()-.5)*shakeMag*2;
    shakeT--;
  }
  X.translate(-Math.round(cam.x)+sx,-Math.round(cam.y)+sy);

  // Grid
  X.strokeStyle='rgba(0,255,170,.04)';X.lineWidth=1;
  const gs=80;
  const gx0=Math.floor(cam.x/gs)*gs, gy0=Math.floor(cam.y/gs)*gs;
  for(let gx=gx0;gx<cam.x+W+gs;gx+=gs){
    X.beginPath();X.moveTo(gx,cam.y);X.lineTo(gx,cam.y+H);X.stroke();
  }
  for(let gy=gy0;gy<cam.y+H+gs;gy+=gs){
    X.beginPath();X.moveTo(cam.x,gy);X.lineTo(cam.x+W,gy);X.stroke();
  }

  // Arena border
  X.strokeStyle='rgba(0,255,170,.15)';X.lineWidth=2;
  X.strokeRect(0,0,AW,AH);

  // Gems
  for(const g of gems){
    const pulse=1+Math.sin(frame*.1+g.x)*0.2;
    X.globalAlpha=Math.min(1,g.life/60);
    X.fillStyle=g.col;
    X.shadowColor=g.col;X.shadowBlur=8;
    X.beginPath();
    // Diamond shape
    X.moveTo(g.x,g.y-g.r*pulse);
    X.lineTo(g.x+g.r*pulse*.7,g.y);
    X.lineTo(g.x,g.y+g.r*pulse);
    X.lineTo(g.x-g.r*pulse*.7,g.y);
    X.closePath();X.fill();
    X.shadowBlur=0;
    X.globalAlpha=1;
  }

  // Enemies
  for(const e of enemies){
    X.fillStyle=e.hitFlash>0?'#fff':e.col;
    X.shadowColor=e.col;X.shadowBlur=e.hitFlash>0?12:6;
    X.beginPath();X.arc(e.x,e.y,e.r,0,6.28);X.fill();
    // Inner detail
    X.fillStyle='rgba(0,0,0,.3)';
    X.beginPath();X.arc(e.x,e.y,e.r*.5,0,6.28);X.fill();
    // Eyes
    const dx=player.x-e.x, dy=player.y-e.y, d=Math.hypot(dx,dy)||1;
    X.fillStyle='#fff';
    X.beginPath();X.arc(e.x+dx/d*e.r*.3-2,e.y+dy/d*e.r*.3,1.5,0,6.28);X.fill();
    X.beginPath();X.arc(e.x+dx/d*e.r*.3+2,e.y+dy/d*e.r*.3,1.5,0,6.28);X.fill();
    X.shadowBlur=0;
    // HP bar (if not full)
    if(e.hp<e.maxHp){
      const bw=e.r*2, bx=e.x-e.r, by=e.y-e.r-6;
      X.fillStyle='rgba(0,0,0,.5)';X.fillRect(bx,by,bw,3);
      X.fillStyle=e.col;X.fillRect(bx,by,bw*(e.hp/e.maxHp),3);
    }
  }

  // Projectiles
  X.shadowColor='#44ffdd';X.shadowBlur=6;
  for(const b of projectiles){
    X.fillStyle='#44ffdd';
    X.beginPath();X.arc(b.x,b.y,b.r,0,6.28);X.fill();
    // Trail
    X.fillStyle='rgba(68,255,221,.3)';
    X.beginPath();X.arc(b.x-b.vx,b.y-b.vy,b.r*.6,0,6.28);X.fill();
  }
  X.shadowBlur=0;

  // Laser beams
  for(const lb of laserBeams){
    X.globalAlpha=lb.life/12;
    X.strokeStyle='#ff2244';X.shadowColor='#ff2244';X.shadowBlur=14;
    X.lineWidth=3+lb.life*.3;
    X.beginPath();X.moveTo(lb.x,lb.y);X.lineTo(lb.ex,lb.ey);X.stroke();
    X.strokeStyle='#ffaacc';X.lineWidth=1.5;
    X.beginPath();X.moveTo(lb.x,lb.y);X.lineTo(lb.ex,lb.ey);X.stroke();
    X.shadowBlur=0;X.globalAlpha=1;
  }

  // Player orbitals
  const p=player;
  if(p.orbitals>0){
    X.fillStyle='#88ddff';X.shadowColor='#88ddff';X.shadowBlur=8;
    for(let i=0;i<p.orbitals;i++){
      const a=(frame*0.04)+i*(Math.PI*2/p.orbitals);
      X.beginPath();X.arc(p.x+Math.cos(a)*30,p.y+Math.sin(a)*30,5,0,6.28);X.fill();
    }
    X.shadowBlur=0;
  }

  // Player
  const flash=p.iFrames>0&&(frame%4<2);
  if(!flash){
    X.fillStyle='#00ffaa';
    X.shadowColor='#00ffaa';X.shadowBlur=10;
    X.beginPath();X.arc(p.x,p.y,p.r,0,6.28);X.fill();
    X.shadowBlur=0;
    // Inner
    X.fillStyle='#aaffdd';
    X.beginPath();X.arc(p.x,p.y,p.r*.5,0,6.28);X.fill();
    // Eyes
    X.fillStyle='#050510';
    X.beginPath();X.arc(p.x+p.face*3-1,p.y-2,1.8,0,6.28);X.fill();
    X.beginPath();X.arc(p.x+p.face*3+3,p.y-2,1.8,0,6.28);X.fill();
    // HP ring
    if(p.hp<p.maxHp){
      const hpFrac=p.hp/p.maxHp;
      X.strokeStyle=hpFrac>.5?'#00ff88':hpFrac>.25?'#ffaa44':'#ff4466';
      X.lineWidth=2;
      X.beginPath();X.arc(p.x,p.y,p.r+3,-Math.PI/2,-Math.PI/2+hpFrac*Math.PI*2);X.stroke();
    }
  }

  // Particles
  for(const pt of particles){
    X.globalAlpha=pt.life;
    X.fillStyle=pt.col;
    X.beginPath();X.arc(pt.x,pt.y,pt.size,0,6.28);X.fill();
  }
  X.globalAlpha=1;

  // Float texts
  X.textAlign='center';X.textBaseline='bottom';
  for(const f of floatTexts){
    X.globalAlpha=f.life/30;
    X.fillStyle=f.col;X.font='bold 12px "Fira Code",monospace';
    X.fillText(f.text,f.x,f.y);
  }
  X.globalAlpha=1;

  X.restore();

  // Minimap
  const mmW=80,mmH=80,mmX=W-mmW-8,mmY=H-mmH-8;
  X.fillStyle='rgba(5,5,16,.7)';X.fillRect(mmX,mmY,mmW,mmH);
  X.strokeStyle='rgba(0,255,170,.2)';X.lineWidth=1;X.strokeRect(mmX,mmY,mmW,mmH);
  // Enemies on minimap
  X.fillStyle='rgba(255,68,102,.6)';
  for(const e of enemies){
    X.fillRect(mmX+e.x/AW*mmW,mmY+e.y/AH*mmH,1.5,1.5);
  }
  // Player on minimap
  X.fillStyle='#00ffaa';
  X.fillRect(mmX+p.x/AW*mmW-1.5,mmY+p.y/AH*mmH-1.5,3,3);
}

// ── Upgrade screen ──
function showUpgradeScreen(){
  paused=true;
  const screen=document.getElementById('upgrade-screen');
  const cards=document.getElementById('upgrade-cards');
  cards.innerHTML='';
  // Pick 3 random upgrades
  const shuffled=[...UPGRADES].sort(()=>Math.random()-.5).slice(0,3);
  for(const u of shuffled){
    const card=document.createElement('div');
    card.className='upg-card';
    card.innerHTML=`<div class="upg-icon">${u.icon}</div><div class="upg-name">${u.name}</div><div class="upg-desc">${u.desc}</div>`;
    card.onclick=()=>{
      u.apply(player);
      paused=false;
      screen.style.display='none';
      updateHUD();
    };
    cards.appendChild(card);
  }
  screen.style.display='flex';
}

// ── Die ──
function die(){
  running=false;
  const elapsed=gameTime/60;
  const min=Math.floor(elapsed/60), sec=Math.floor(elapsed%60);
  document.getElementById('death-stats').innerHTML=
    `Time survived: <b>${min}:${String(sec).padStart(2,'0')}</b><br>`+
    `Enemies killed: <b>${kills}</b><br>`+
    `Level reached: <b>${player.level}</b>`;
  document.getElementById('death-screen').style.display='flex';
  document.getElementById('ui-bar').style.display='none';
  document.getElementById('xp-bar-wrap').style.display='none';
}

// ── HUD ──
function updateHUD(){
  document.getElementById('ui-lv').textContent=player.level;
  document.getElementById('ui-kills').textContent=kills;
  const elapsed=gameTime/60;
  const min=Math.floor(elapsed/60), sec=Math.floor(elapsed%60);
  document.getElementById('ui-time').textContent=min+':'+String(sec).padStart(2,'0');
  document.getElementById('xp-bar').style.width=(player.xp/player.xpNext*100)+'%';
}

// ── Game start ──
function startGame(){
  player=mkPlayer();
  enemies=[];projectiles=[];gems=[];particles=[];floatTexts=[];
  gameTime=0;kills=0;paused=false;running=true;
  shakeT=0;shakeMag=0;spawnCD=0;frame=0;
  cam={x:player.x-W/2,y:player.y-H/2};
  document.getElementById('start-screen').style.display='none';
  document.getElementById('death-screen').style.display='none';
  document.getElementById('upgrade-screen').style.display='none';
  document.getElementById('ui-bar').style.display='flex';
  document.getElementById('xp-bar-wrap').style.display='block';
  updateHUD();
}

// ── Main loop ──
function loop(){
  if(running&&!paused){
    updatePlayer();
    updateEnemies();
    fireProjectiles();
    updateProjectiles();
    updateOrbitals();
    updateLasers();
    // Decay laser beams
    for(let i=laserBeams.length-1;i>=0;i--){laserBeams[i].life--;if(laserBeams[i].life<=0)laserBeams.splice(i,1)}
    updateSpawns();
    updateParticles();
    updateFloatTexts();
    updateCam();
    gameTime++;
    frame++;
    if(frame%15===0)updateHUD();
  }
  draw();
  requestAnimationFrame(loop);
}

// ── Input ──
addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true});
addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false});

// Touch joystick
let touchDir={x:0,y:0}, touchId=null;
const joyEl=document.getElementById('touch-move');
const knobEl=document.getElementById('knob');
joyEl.addEventListener('touchstart',e=>{
  e.preventDefault();
  touchId=e.changedTouches[0].identifier;
  handleJoy(e.changedTouches[0]);
},{passive:false});
joyEl.addEventListener('touchmove',e=>{
  e.preventDefault();
  for(const t of e.changedTouches) if(t.identifier===touchId) handleJoy(t);
},{passive:false});
joyEl.addEventListener('touchend',e=>{
  for(const t of e.changedTouches){
    if(t.identifier===touchId){
      touchDir={x:0,y:0};touchId=null;
      knobEl.style.transform='translate(-50%,-50%)';
    }
  }
});
function handleJoy(t){
  const rect=joyEl.getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  let dx=t.clientX-cx, dy=t.clientY-cy;
  const maxR=rect.width/2;
  const d=Math.hypot(dx,dy);
  if(d>maxR){dx=dx/d*maxR;dy=dy/d*maxR}
  touchDir.x=dx/maxR;
  touchDir.y=dy/maxR;
  knobEl.style.transform=`translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
}

// ── Resize ──
function resize(){
  W=Math.min(innerWidth,1200);H=Math.min(innerHeight,800);
  C.width=W;C.height=H;C.style.width=W+'px';C.style.height=H+'px';
}
onresize=resize;resize();

// ── Events ──
document.getElementById('start-btn').onclick=startGame;
document.getElementById('retry-btn').onclick=startGame;

// Init
running=false;paused=false;
player=mkPlayer();enemies=[];projectiles=[];gems=[];particles=[];floatTexts=[];
gameTime=0;kills=0;cam={x:0,y:0};
loop();
</script>
