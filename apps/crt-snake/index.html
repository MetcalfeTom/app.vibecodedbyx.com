<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>CRT Snake</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#04020a">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%90%8D">
<meta name="description" content="A retro neon snake on a CRT — grid-tick movement smoothed between frames, hue-cycling segments, chunky pixel particles, 8-bit synth blips.">
<meta property="og:title" content="CRT Snake">
<meta property="og:description" content="A retro neon snake on a CRT — grid-tick movement smoothed between frames, hue-cycling segments, chunky pixel particles, 8-bit synth blips.">
<meta property="og:url" content="https://sloppy.live/crt-snake">
<meta property="og:image" content="https://image.pollinations.ai/prompt/neon%20snake%20game%20on%20CRT%20monitor%20with%20pink%20cyan%20glowing%20segments%2C%20pixel%20art%2C%20scanlines%2C%20chromatic%20aberration%2C%20arcade?width=1200&height=630&model=flux&seed=2929&nologo=true">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Share+Tech+Mono&family=Major+Mono+Display&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#04020a;
    --void-2:#0c0418;
    --cyan:#5ce6ff;
    --magenta:#ff2bd6;
    --pink:#ff6ec0;
    --gold:#ffd454;
    --lime:#a5ff52;
    --violet:#9b5bff;
    --ink:#f4f0ff;
    --silver:#a3a8c2;
    --silver-dim:#5e637a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  html,body{height:100%;overflow:hidden;background:var(--void);color:var(--ink);font-family:'Share Tech Mono', monospace;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:none}
  body{
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(255,43,214,0.18), transparent 60%),
      radial-gradient(ellipse 70% 40% at 50% 100%, rgba(92,230,255,0.12), transparent 70%),
      var(--void);
    display:flex;flex-direction:column;align-items:center;
  }
  header{
    text-align:center;padding:0.7rem 1rem 0.2rem;position:relative;z-index:3;pointer-events:none;width:100%;
  }
  h1{
    font-family:'Press Start 2P', monospace;
    font-size:clamp(1.1rem, 2.6vw, 1.7rem);letter-spacing:0.12em;
    background:linear-gradient(180deg, var(--cyan), var(--magenta));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 12px rgba(255,43,214,0.5));line-height:1;text-transform:uppercase;
  }
  .tag{font-family:'VT323', monospace;font-size:clamp(0.85rem, 1.4vw, 1.05rem);letter-spacing:0.16em;color:var(--silver);margin-top:0.2rem;text-transform:uppercase}

  main{
    flex:1;display:flex;align-items:center;justify-content:center;
    width:100%;padding:0.3rem 0.4rem 5.5rem;position:relative;
  }
  canvas#game{
    display:block;background:#02011a;
    border:2px solid rgba(255,43,214,0.35);border-radius:0.4rem;
    box-shadow:
      0 0 36px rgba(255,43,214,0.25),
      0 0 80px rgba(92,230,255,0.12),
      inset 0 0 24px rgba(0,0,0,0.7);
    max-width:100%;max-height:100%;
    image-rendering:pixelated;image-rendering:crisp-edges;
  }

  .hud-top{
    position:fixed;top:3.4rem;left:0.6rem;right:0.6rem;
    display:flex;justify-content:space-between;align-items:flex-start;gap:0.5rem;
    z-index:5;pointer-events:none;font-family:'Share Tech Mono', monospace;
  }
  .hud-top .card{
    background:rgba(8,3,18,0.86);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(255,43,214,0.36);
    padding:0.4rem 0.7rem;border-radius:0.35rem;
    display:flex;flex-direction:column;gap:0.15rem;text-align:center;min-width:4.6rem;
    box-shadow:0 0 12px rgba(255,43,214,0.18);
  }
  .hud-top .label{font-size:0.55rem;letter-spacing:0.22em;color:var(--silver);text-transform:uppercase}
  .hud-top .val{font-family:'Press Start 2P', monospace;font-size:0.95rem;color:var(--cyan);letter-spacing:0.04em;line-height:1}
  .hud-top .card.length .val{color:var(--lime)}
  .hud-top .card.best .val{color:var(--gold)}
  .hud-top .card.speed .val{color:var(--magenta);font-size:0.85rem}
  .hud-top .card.pop .val{animation:popScore 0.45s cubic-bezier(0.34, 1.56, 0.64, 1)}
  @keyframes popScore{0%{transform:scale(1)}30%{transform:scale(1.35)}100%{transform:scale(1)}}

  .hints{
    position:fixed;bottom:0.7rem;left:50%;transform:translateX(-50%);
    display:flex;gap:0.55rem;align-items:center;flex-wrap:wrap;justify-content:center;
    background:rgba(8,3,18,0.82);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(92,230,255,0.32);
    padding:0.4rem 0.7rem;border-radius:0.4rem;z-index:5;
    font-size:0.62rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--silver);
    max-width:calc(100% - 1rem);font-family:'Share Tech Mono', monospace;
  }
  .hints kbd{
    background:#161035;border:1px solid rgba(92,230,255,0.4);border-radius:0.2rem;
    color:var(--ink);padding:0.25rem 0.4rem;font-family:'Share Tech Mono', monospace;font-size:0.6rem;
    min-width:1.6rem;text-align:center;display:inline-block;
  }
  .hints button{
    background:transparent;color:var(--cyan);border:1px solid var(--cyan);
    font-family:'Press Start 2P', monospace;font-size:0.6rem;letter-spacing:0.1em;text-transform:uppercase;
    padding:0.5rem 0.7rem;border-radius:0.22rem;cursor:pointer;min-height:2.5rem;
  }
  .hints button:hover{background:rgba(92,230,255,0.14)}
  .hints button:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}

  #touch{position:fixed;inset:0;pointer-events:none;z-index:4;display:none}
  #touch .dpad{
    position:absolute;left:1rem;bottom:5.5rem;
    width:9rem;height:9rem;pointer-events:auto;
    background:rgba(8,3,18,0.50);border:1px solid rgba(92,230,255,0.4);border-radius:0.6rem;
    backdrop-filter:blur(6px);
    display:grid;grid-template-columns:repeat(3, 1fr);grid-template-rows:repeat(3, 1fr);gap:0.2rem;padding:0.3rem;
  }
  #touch .dpad button{
    background:rgba(92,230,255,0.10);border:1px solid var(--cyan);color:var(--cyan);
    font-family:'Press Start 2P', monospace;font-size:1.2rem;border-radius:0.3rem;cursor:pointer;
  }
  #touch .dpad .empty{visibility:hidden}
  @media (pointer: coarse), (max-width: 720px){
    #touch{display:block}
  }

  .game-over{
    position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;gap:1rem;
    background:radial-gradient(circle at center, rgba(255,43,214,0.20), rgba(0,0,0,0.94));
    backdrop-filter:blur(8px);text-align:center;padding:1.5rem;z-index:20;
  }
  .game-over.show{display:flex}
  .game-over h2{font-family:'Press Start 2P', monospace;font-size:clamp(1.6rem, 4.4vw, 2.6rem);color:var(--magenta);text-shadow:0 0 22px rgba(255,43,214,0.7), 0 2px 8px rgba(0,0,0,0.6);letter-spacing:0.08em;text-transform:uppercase}
  .game-over p{font-family:'VT323', monospace;font-size:1.3rem;color:var(--cyan);letter-spacing:0.06em;text-shadow:0 0 12px var(--cyan)}
  .game-over button{
    margin-top:0.6rem;background:transparent;color:var(--lime);
    border:2px solid var(--lime);
    font-family:'Press Start 2P', monospace;font-size:0.85rem;letter-spacing:0.12em;text-transform:uppercase;
    padding:0.85rem 1.6rem;cursor:pointer;border-radius:0.4rem;min-height:2.75rem;
    box-shadow:0 0 18px rgba(165,255,82,0.45);
  }
  .game-over button:hover{background:rgba(165,255,82,0.16)}
  .game-over button:focus-visible{outline:3px solid var(--ink);outline-offset:3px}

  @media (max-width: 540px){
    .hud-top{top:2.6rem;gap:0.35rem}
    .hud-top .card{padding:0.3rem 0.5rem;min-width:3.6rem}
    .hud-top .val{font-size:0.78rem}
    .hud-top .card.speed .val{font-size:0.7rem}
  }
  @media (prefers-reduced-motion: reduce){
    .hud-top .card.pop .val{animation:none}
    .game-over.show{animation:none}
  }
</style>
</head>
<body>
  <header>
    <h1>CRT SNAKE</h1>
    <div class="tag">tick · grow · glow</div>
  </header>

  <div class="hud-top">
    <div class="card score" id="scoreCard"><div class="label">score</div><div class="val"><span id="scoreVal">0</span></div></div>
    <div class="card length" id="lengthCard"><div class="label">length</div><div class="val"><span id="lengthVal">3</span></div></div>
    <div class="card speed"><div class="label">speed</div><div class="val"><span id="speedVal">1x</span></div></div>
    <div class="card best"><div class="label">best</div><div class="val"><span id="bestVal">0</span></div></div>
  </div>

  <main>
    <canvas id="game" width="576" height="432" role="application" aria-label="Retro neon snake game. Use arrow keys or WASD to steer the snake. Eat food to grow. Don't hit walls or your own body."></canvas>
  </main>

  <div class="hints">
    <span><kbd>WASD</kbd>/<kbd>↑↓←→</kbd> steer</span>
    <span><kbd>Space</kbd> pause</span>
    <button id="restartBtn" type="button">⟳ restart</button>
    <button id="muteBtn" type="button" aria-pressed="false" aria-label="Toggle sound">♪ on</button>
  </div>

  <div id="touch" aria-hidden="true">
    <div class="dpad">
      <span class="empty"></span>
      <button id="touchUp" type="button" aria-label="Up">▲</button>
      <span class="empty"></span>
      <button id="touchLeft" type="button" aria-label="Left">◀</button>
      <span class="empty"></span>
      <button id="touchRight" type="button" aria-label="Right">▶</button>
      <span class="empty"></span>
      <button id="touchDown" type="button" aria-label="Down">▼</button>
      <span class="empty"></span>
    </div>
  </div>

  <div class="game-over" id="gameOver" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="goTitle">
    <h2 id="goTitle">GAME OVER</h2>
    <p id="goStats">score 0 · length 3</p>
    <button id="goRestart" type="button">⟳ Re-tick</button>
  </div>

<script>
(function(){
  'use strict';
  function showError(msg){
    try {
      var t = document.getElementById('errToast');
      if (!t){
        t = document.createElement('div');
        t.id = 'errToast';
        t.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#3a0610;color:#ffb6c1;font-family:monospace;font-size:11px;padding:8px 12px;border-bottom:1px solid #ff2bd6;white-space:pre-wrap';
        document.body.appendChild(t);
      }
      t.textContent = '⚠ ' + msg;
    } catch(_){}
  }
  window.addEventListener('error', function(ev){
    showError((ev.message || 'error') + ' @ ' + (ev.filename ? ev.filename.split('/').pop() : '?') + ':' + (ev.lineno || '?'));
  });

  var prefersReducedMotion = false;
  try { prefersReducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch(_){}

  var canvas = document.getElementById('game');
  var ctx;
  try { ctx = canvas.getContext('2d'); } catch(e){ showError('canvas init: ' + e.message); return; }
  if (!ctx){ showError('canvas 2d unavailable'); return; }
  ctx.imageSmoothingEnabled = false;

  // ── Grid ──
  var COLS = 24, ROWS = 18;
  var CELL = 24;
  var W = COLS * CELL, H = ROWS * CELL;
  canvas.width = W; canvas.height = H;
  var DPR = Math.min(window.devicePixelRatio || 1, 2);
  function resizeBacking(){
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    ctx.imageSmoothingEnabled = false;
  }
  resizeBacking();

  // CSS scale canvas to fit viewport while preserving aspect ratio
  function scaleCanvasToViewport(){
    var maxW = Math.min(window.innerWidth - 24, 900);
    var maxH = Math.max(280, window.innerHeight - 230);
    var ratio = W / H;
    var cssW = Math.min(maxW, maxH * ratio);
    var cssH = cssW / ratio;
    if (cssH > maxH){ cssH = maxH; cssW = cssH * ratio; }
    canvas.style.width = cssW + 'px';
    canvas.style.height = cssH + 'px';
  }
  scaleCanvasToViewport();
  window.addEventListener('resize', scaleCanvasToViewport);
  window.addEventListener('orientationchange', function(){ setTimeout(scaleCanvasToViewport, 60); });

  // ── State ──
  var DIR = { UP: {x:0, y:-1}, DOWN: {x:0, y:1}, LEFT: {x:-1, y:0}, RIGHT: {x:1, y:0} };
  var BASE_TICK = 180;       // ms per move at speed 1
  var MIN_TICK = 65;         // floor
  var state = {
    snake: [],            // array of {x, y} grid cells, [0] = head
    prevSnake: [],        // snapshot at start of current tick (for smooth interpolation)
    dir: DIR.RIGHT,
    queuedDir: DIR.RIGHT,
    food: { x: 0, y: 0, hue: 0 },
    score: 0,
    best: 0,
    over: false,
    paused: false,
    growPending: 0,
    tickMs: BASE_TICK,
    tickT: 0,             // current tick progress 0..1 (smoothing)
    accum: 0,             // ms accumulator
    particles: [],
    shake: 0,
    eatPulseT: 0,
    eatHue: 0,
    headHue: 195
  };

  try { state.best = parseInt(localStorage.getItem('crt-snake-best') || '0', 10) || 0; } catch(_){}

  function reset(){
    state.snake = [{x: 12, y: 9}, {x: 11, y: 9}, {x: 10, y: 9}];
    state.prevSnake = state.snake.map(function(s){ return {x: s.x, y: s.y}; });
    state.dir = DIR.RIGHT; state.queuedDir = DIR.RIGHT;
    state.score = 0; state.over = false; state.paused = false;
    state.growPending = 0;
    state.tickMs = BASE_TICK;
    state.tickT = 0; state.accum = 0;
    state.particles = [];
    state.shake = 0;
    spawnFood();
    refreshHUD();
    var go = document.getElementById('gameOver');
    go.classList.remove('show');
    go.setAttribute('aria-hidden', 'true');
  }

  function spawnFood(){
    var open = [];
    for (var y = 0; y < ROWS; y++){
      for (var x = 0; x < COLS; x++){
        var occupied = false;
        for (var i = 0; i < state.snake.length; i++){
          if (state.snake[i].x === x && state.snake[i].y === y){ occupied = true; break; }
        }
        if (!occupied) open.push({x: x, y: y});
      }
    }
    if (!open.length){ winGame(); return; }
    var pick = open[Math.floor(Math.random() * open.length)];
    state.food.x = pick.x; state.food.y = pick.y;
    state.food.hue = Math.floor(Math.random() * 360);
  }

  function winGame(){
    state.over = true;
    document.getElementById('goTitle').textContent = 'PERFECT GRID';
    document.getElementById('goStats').textContent = 'score ' + state.score + ' · length ' + state.snake.length + ' · max length';
    document.getElementById('gameOver').classList.add('show');
    document.getElementById('gameOver').setAttribute('aria-hidden', 'false');
    sndWin();
  }

  // ── Audio ──
  var audioCtx = null, muted = false;
  function ensureAudio(){
    if (audioCtx){ if (audioCtx.state === 'suspended') audioCtx.resume(); return audioCtx; }
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(_){ audioCtx = null; }
    return audioCtx;
  }
  function tone(type, freq, dur, gain, slideTo, t0){
    var c = ensureAudio(); if (!c || muted) return;
    var o = c.createOscillator(); o.type = type;
    var t = t0 || c.currentTime;
    o.frequency.setValueAtTime(freq, t);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20, slideTo), t + dur);
    var g = c.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(gain, t + 0.006);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g).connect(c.destination);
    o.start(t); o.stop(t + dur + 0.02);
  }
  function sndEat(len){
    var f = 520 + (len % 12) * 60;
    tone('square', f, 0.10, 0.10, f * 1.6);
  }
  function sndTurn(){ tone('square', 280, 0.03, 0.04, 320); }
  function sndDie(){
    [440, 330, 220, 165].forEach(function(f, i){
      tone('sawtooth', f, 0.30, 0.18, null, ensureAudio() && audioCtx.currentTime + i * 0.10);
    });
  }
  function sndWin(){
    [523, 659, 784, 1047, 1318].forEach(function(f, i){
      tone('triangle', f, 0.28, 0.18, null, ensureAudio() && audioCtx.currentTime + i * 0.10);
    });
  }

  // ── Input ──
  function tryQueue(newDir){
    // Disallow direct reverse (which would self-collide immediately)
    if (newDir.x === -state.dir.x && newDir.y === -state.dir.y && state.snake.length > 1) return;
    state.queuedDir = newDir;
    sndTurn();
  }
  window.addEventListener('keydown', function(e){
    if (e.target && e.target.tagName === 'INPUT') return;
    if (state.over && e.code === 'Space'){ e.preventDefault(); reset(); return; }
    if (state.over && e.code !== 'KeyR') return;
    if (e.code === 'KeyW' || e.code === 'ArrowUp'){ e.preventDefault(); ensureAudio(); tryQueue(DIR.UP); }
    else if (e.code === 'KeyS' || e.code === 'ArrowDown'){ e.preventDefault(); ensureAudio(); tryQueue(DIR.DOWN); }
    else if (e.code === 'KeyA' || e.code === 'ArrowLeft'){ e.preventDefault(); ensureAudio(); tryQueue(DIR.LEFT); }
    else if (e.code === 'KeyD' || e.code === 'ArrowRight'){ e.preventDefault(); ensureAudio(); tryQueue(DIR.RIGHT); }
    else if (e.code === 'Space'){ e.preventDefault(); state.paused = !state.paused; }
    else if (e.code === 'KeyR'){ reset(); }
  });
  // Touch d-pad
  function bindTouch(id, dir){
    var b = document.getElementById(id);
    if (!b) return;
    b.addEventListener('pointerdown', function(e){ e.preventDefault(); ensureAudio(); tryQueue(dir); });
  }
  bindTouch('touchUp', DIR.UP);
  bindTouch('touchDown', DIR.DOWN);
  bindTouch('touchLeft', DIR.LEFT);
  bindTouch('touchRight', DIR.RIGHT);

  // Restart + mute
  document.getElementById('restartBtn').addEventListener('click', reset);
  document.getElementById('goRestart').addEventListener('click', reset);
  document.getElementById('muteBtn').addEventListener('click', function(){
    muted = !muted;
    this.textContent = muted ? '♪ off' : '♪ on';
    this.setAttribute('aria-pressed', muted ? 'true' : 'false');
  });
  // Audio unlock
  ['pointerdown', 'keydown'].forEach(function(ev){
    window.addEventListener(ev, function once(){ ensureAudio(); window.removeEventListener(ev, once); });
  });

  // ── Tick (game logic) ──
  function tick(){
    // Snapshot for smooth interpolation between ticks
    state.prevSnake = state.snake.map(function(s){ return {x: s.x, y: s.y}; });
    // Apply queued direction
    state.dir = state.queuedDir;
    // New head position
    var head = state.snake[0];
    var newHead = { x: head.x + state.dir.x, y: head.y + state.dir.y };
    // Wall collision
    if (newHead.x < 0 || newHead.x >= COLS || newHead.y < 0 || newHead.y >= ROWS){
      gameOver();
      return;
    }
    // Self collision (skip the very tail since it'll move out of the way)
    var willGrow = state.growPending > 0;
    var lastIdx = willGrow ? state.snake.length : state.snake.length - 1;
    for (var i = 0; i < lastIdx; i++){
      if (state.snake[i].x === newHead.x && state.snake[i].y === newHead.y){
        gameOver();
        return;
      }
    }
    // Move
    state.snake.unshift(newHead);
    if (willGrow){
      state.growPending--;
    } else {
      state.snake.pop();
    }
    // Food collision
    if (newHead.x === state.food.x && newHead.y === state.food.y){
      state.score += 10 + Math.floor(state.snake.length * 0.4);
      state.growPending += 1;
      // Speed up
      state.tickMs = Math.max(MIN_TICK, state.tickMs - 5);
      // Particles
      spawnEatParticles(state.food.x, state.food.y, state.food.hue);
      state.shake = Math.min(20, state.shake + 12);
      state.eatPulseT = 0.55;
      state.eatHue = state.food.hue;
      sndEat(state.snake.length);
      spawnFood();
      refreshHUD(true);
    }
  }

  function gameOver(){
    state.over = true;
    if (state.score > state.best){
      state.best = state.score;
      try { localStorage.setItem('crt-snake-best', String(state.best)); } catch(_){}
    }
    refreshHUD();
    document.getElementById('goTitle').textContent = 'GAME OVER';
    document.getElementById('goStats').textContent = 'score ' + state.score + ' · length ' + state.snake.length;
    document.getElementById('gameOver').classList.add('show');
    document.getElementById('gameOver').setAttribute('aria-hidden', 'false');
    sndDie();
    state.shake = 24;
    // Big death burst
    var h = state.snake[0];
    if (h) spawnEatParticles(h.x, h.y, 0, 38);
  }

  function spawnEatParticles(gx, gy, hue, count){
    count = count || 22;
    var cx = gx * CELL + CELL / 2;
    var cy = gy * CELL + CELL / 2;
    for (var i = 0; i < count; i++){
      var ang = Math.random() * Math.PI * 2;
      var sp = 60 + Math.random() * 230;
      state.particles.push({
        x: cx, y: cy,
        vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp,
        ttl: 0.4 + Math.random() * 0.6, life: 0,
        size: 2 + Math.random() * 2,
        hue: (hue + (Math.random() - 0.5) * 50 + 360) % 360
      });
    }
  }

  // ── HUD ──
  function refreshHUD(pop){
    document.getElementById('scoreVal').textContent = state.score;
    document.getElementById('lengthVal').textContent = state.snake.length;
    document.getElementById('bestVal').textContent = state.best;
    var spd = (BASE_TICK / state.tickMs).toFixed(2);
    document.getElementById('speedVal').textContent = spd + 'x';
    if (pop){
      var card = document.getElementById('scoreCard');
      card.classList.remove('pop');
      void card.offsetWidth;
      card.classList.add('pop');
    }
  }
  refreshHUD();

  // ── Render ──
  function lerp(a, b, t){ return a + (b - a) * t; }

  function drawBackground(){
    // CRT-tinted grid background
    ctx.fillStyle = '#02011a';
    ctx.fillRect(0, 0, W, H);
    // Subtle radial vignette
    var g = ctx.createRadialGradient(W/2, H/2, Math.min(W,H) * 0.2, W/2, H/2, Math.max(W,H) * 0.7);
    g.addColorStop(0, 'rgba(155,91,255,0.04)');
    g.addColorStop(1, 'rgba(0,0,0,0.5)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
    // Faint grid lines
    ctx.strokeStyle = 'rgba(92,230,255,0.06)';
    ctx.lineWidth = 1;
    for (var x = 0; x <= COLS; x++){
      ctx.beginPath(); ctx.moveTo(x * CELL + 0.5, 0); ctx.lineTo(x * CELL + 0.5, H); ctx.stroke();
    }
    for (var y = 0; y <= ROWS; y++){
      ctx.beginPath(); ctx.moveTo(0, y * CELL + 0.5); ctx.lineTo(W, y * CELL + 0.5); ctx.stroke();
    }
  }

  function drawFood(now){
    // Pulse + glow
    var pulse = 0.7 + Math.sin(now * 0.008) * 0.3;
    var hue = state.food.hue;
    var cx = state.food.x * CELL + CELL / 2;
    var cy = state.food.y * CELL + CELL / 2;
    // Halo
    var grad = ctx.createRadialGradient(cx, cy, 2, cx, cy, CELL * 1.4);
    grad.addColorStop(0, 'hsla(' + hue + ',100%,75%,' + (0.7 * pulse) + ')');
    grad.addColorStop(0.5, 'hsla(' + hue + ',100%,55%,' + (0.35 * pulse) + ')');
    grad.addColorStop(1, 'hsla(' + hue + ',100%,40%,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(cx - CELL * 1.5, cy - CELL * 1.5, CELL * 3, CELL * 3);
    // Inner pixel apple
    ctx.fillStyle = 'hsl(' + hue + ',100%,60%)';
    var r = CELL / 2 - 4;
    ctx.fillRect(cx - r, cy - r, r * 2, r * 2);
    ctx.fillStyle = 'hsl(' + hue + ',100%,82%)';
    ctx.fillRect(cx - r + 2, cy - r + 2, 4, 4);  // highlight
  }

  function drawSnake(){
    var n = state.snake.length;
    var t = state.tickT;  // 0..1 interpolation factor
    for (var i = n - 1; i >= 0; i--){
      var seg = state.snake[i];
      var prev = state.prevSnake[i] || seg;
      // Special handling: when growing, prevSnake has one fewer element than snake,
      // so the head's "prev" doesn't exist. We default to the segment itself (no interp).
      var x = lerp(prev.x, seg.x, t) * CELL + CELL / 2;
      var y = lerp(prev.y, seg.y, t) * CELL + CELL / 2;
      // Hue cycles along the body from head to tail
      var headHue = state.headHue + (Date.now() * 0.04) % 360;
      var hue = (headHue + (i / Math.max(1, n)) * 120) % 360;
      // Glow halo (skip on tail for performance)
      if (i < 5 || i % 2 === 0){
        var gradS = ctx.createRadialGradient(x, y, 2, x, y, CELL * 0.95);
        gradS.addColorStop(0, 'hsla(' + hue + ',100%,75%,0.55)');
        gradS.addColorStop(1, 'hsla(' + hue + ',100%,55%,0)');
        ctx.fillStyle = gradS;
        ctx.fillRect(x - CELL, y - CELL, CELL * 2, CELL * 2);
      }
      // Body cell
      var sz = CELL - 4;
      ctx.fillStyle = 'hsl(' + hue + ',95%,55%)';
      ctx.fillRect(x - sz/2, y - sz/2, sz, sz);
      // Inner pixel highlight (top-left)
      ctx.fillStyle = 'hsl(' + hue + ',95%,75%)';
      ctx.fillRect(x - sz/2 + 2, y - sz/2 + 2, sz - 8, 3);
      // Outline
      ctx.strokeStyle = 'hsl(' + hue + ',100%,80%)';
      ctx.lineWidth = 1;
      ctx.strokeRect(x - sz/2 + 0.5, y - sz/2 + 0.5, sz - 1, sz - 1);
      // Head: draw 2 eyes
      if (i === 0){
        var dx = state.dir.x, dy = state.dir.y;
        // Eye positions perpendicular to facing
        var perpX = -dy * (sz/3.5);
        var perpY = dx * (sz/3.5);
        // Forward bias
        var fwdX = dx * (sz/5);
        var fwdY = dy * (sz/5);
        ctx.fillStyle = '#fff';
        ctx.fillRect(x + perpX + fwdX - 1.5, y + perpY + fwdY - 1.5, 3, 3);
        ctx.fillRect(x - perpX + fwdX - 1.5, y - perpY + fwdY - 1.5, 3, 3);
        ctx.fillStyle = '#000';
        ctx.fillRect(x + perpX + fwdX, y + perpY + fwdY, 1, 1);
        ctx.fillRect(x - perpX + fwdX, y - perpY + fwdY, 1, 1);
      }
    }
  }

  function drawParticles(){
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (var i = 0; i < state.particles.length; i++){
      var p = state.particles[i];
      var a = 1 - p.life / p.ttl;
      ctx.fillStyle = 'hsla(' + p.hue + ',100%,70%,' + a + ')';
      // Pixel-square particles (no rotation, chunky retro feel)
      ctx.fillRect(Math.floor(p.x - p.size/2), Math.floor(p.y - p.size/2), p.size, p.size);
    }
    ctx.restore();
  }

  function drawScanlines(){
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    for (var y = 0; y < H; y += 3){
      ctx.fillRect(0, y, W, 1);
    }
    // Chromatic aberration tint bands at top and bottom
    ctx.fillStyle = 'rgba(255,43,214,0.04)';
    ctx.fillRect(0, 0, W, 8);
    ctx.fillStyle = 'rgba(92,230,255,0.04)';
    ctx.fillRect(0, H - 8, W, 8);
  }

  function drawEatPulse(){
    if (state.eatPulseT <= 0) return;
    var t = 1 - state.eatPulseT / 0.55;
    ctx.strokeStyle = 'hsla(' + state.eatHue + ',100%,70%,' + (1 - t) * 0.8 + ')';
    ctx.lineWidth = 3 * (1 - t);
    ctx.shadowColor = 'hsl(' + state.eatHue + ',100%,65%)';
    ctx.shadowBlur = 12 * (1 - t);
    ctx.strokeRect(2, 2, W - 4, H - 4);
    ctx.shadowBlur = 0;
  }

  // ── Main loop ──
  var lastT = performance.now();
  function frame(now){
    var dt = now - lastT;
    lastT = now;
    if (prefersReducedMotion) dt *= 0.85;

    // Pause + game over freeze game tick but keep particles + effects animating
    if (!state.paused && !state.over){
      state.accum += dt;
      while (state.accum >= state.tickMs){
        state.accum -= state.tickMs;
        tick();
        if (state.over) break;
      }
      state.tickT = Math.min(1, state.accum / state.tickMs);
    }

    // Update particles
    var dtSec = dt / 1000;
    for (var i = state.particles.length - 1; i >= 0; i--){
      var p = state.particles[i];
      p.life += dtSec;
      if (p.life >= p.ttl){ state.particles.splice(i, 1); continue; }
      p.vy += 120 * dtSec;
      p.vx *= Math.pow(0.94, dtSec * 60);
      p.x += p.vx * dtSec; p.y += p.vy * dtSec;
    }
    state.eatPulseT = Math.max(0, state.eatPulseT - dtSec);
    state.shake *= Math.pow(0.85, dtSec * 60);

    // Render
    try {
      var sx = (Math.random() - 0.5) * state.shake;
      var sy = (Math.random() - 0.5) * state.shake;
      ctx.save();
      ctx.translate(sx, sy);
      drawBackground();
      drawFood(now);
      drawSnake();
      drawParticles();
      drawEatPulse();
      drawScanlines();
      // Paused overlay
      if (state.paused && !state.over){
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.fillRect(0, 0, W, H);
        ctx.fillStyle = '#5ce6ff';
        ctx.font = 'bold 28px "Press Start 2P", monospace';
        ctx.textAlign = 'center';
        ctx.shadowColor = '#5ce6ff'; ctx.shadowBlur = 16;
        ctx.fillText('PAUSED', W / 2, H / 2);
        ctx.shadowBlur = 0;
      }
      ctx.restore();
    } catch(e){ showError('render: ' + e.message); }

    requestAnimationFrame(frame);
  }
  reset();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
