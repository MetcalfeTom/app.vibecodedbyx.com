<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Puyo Physics</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%9F%A3?style=twitter">
<meta name="description" content="A jiggly ragdoll take on Puyo Puyo. Drop wobbly blobs into a tank, watch them squash, and pop matches of four.">
<meta property="og:title" content="Puyo Physics">
<meta property="og:description" content="Squishy, wobbly, gelatinous puzzle drops. Match four blobs to pop them in a jiggling cascade of color.">
<meta property="og:url" content="https://sloppy.live/puyo-physics">
<meta property="og:image" content="https://image.pollinations.ai/prompt/colorful%20gelatinous%20blob%20puzzle%20game%20with%20squishy%20cute%20slimes%20red%20yellow%20green%20blue%20purple%20jiggling%20in%20a%20glass%20tank?width=1200&height=630&nologo=true">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik+Bubbles&family=Fredoka:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a0f2e;
    --tank: #0e0820;
    --ink: #f3e9ff;
    --dim: #9b8fb8;
    --red: #ef4343;
    --yel: #f5c453;
    --grn: #7dbd5c;
    --blu: #5ea8e5;
    --pur: #a76fc3;
    --accent: #ff66c4;
    --hi: #66f2ff;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; min-height: 100%;
    background:
      radial-gradient(ellipse 700px 500px at 20% -10%, #2a1050 0%, transparent 65%),
      radial-gradient(ellipse 700px 500px at 80% 110%, #3a0a50 0%, transparent 60%),
      var(--bg);
    color: var(--ink);
    font-family: 'Fredoka', sans-serif;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
  }
  ::selection { background: var(--accent); color: #fff; }

  .stage {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    grid-gap: 30px;
    align-items: center;
    justify-items: center;
    max-width: 1100px;
    margin: 0 auto;
    padding: 24px 20px;
    min-height: 100vh;
  }
  @media (max-width: 820px) {
    .stage { grid-template-columns: 1fr; grid-gap: 10px; padding: 10px; }
    .side { order: 1; }
    .tank-wrap { order: 0; }
    .title-block { order: -1; text-align: center; }
  }

  /* TITLE */
  .title-block { text-align: left; }
  .eyebrow {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.35em;
    color: var(--accent);
    text-transform: uppercase;
  }
  h1 {
    margin: 4px 0 6px;
    font-family: 'Rubik Bubbles', cursive;
    font-size: clamp(38px, 5.5vw, 72px);
    letter-spacing: 0.02em;
    line-height: 0.92;
    background: linear-gradient(135deg, var(--hi) 0%, var(--accent) 55%, var(--yel) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 3px 0 #3a1060);
  }
  .tagline {
    font-family: 'Fredoka', sans-serif;
    font-weight: 400;
    font-style: italic;
    color: var(--dim);
    font-size: 14px;
    max-width: 280px;
    line-height: 1.45;
  }

  /* TANK */
  .tank-wrap {
    position: relative;
    width: min(360px, 95vw);
    aspect-ratio: 360 / 660;
    filter: drop-shadow(0 14px 40px rgba(255, 102, 196, 0.2));
  }
  canvas#game {
    display: block;
    width: 100%;
    height: 100%;
    background:
      radial-gradient(ellipse 300px 600px at 50% 40%, #1a0a30 0%, #0a041c 80%);
    border: 3px solid #3a1a68;
    border-radius: 14px;
    box-shadow:
      inset 0 0 30px rgba(138, 90, 255, 0.2),
      inset 0 4px 0 rgba(255, 255, 255, 0.05),
      inset 0 -6px 0 rgba(0, 0, 0, 0.4);
    touch-action: none;
  }
  .tank-glow {
    position: absolute;
    inset: -10px;
    border-radius: 18px;
    box-shadow: 0 0 60px rgba(167, 111, 195, 0.25);
    pointer-events: none;
  }
  .danger-line {
    position: absolute;
    top: 12%;
    left: 3px;
    right: 3px;
    height: 2px;
    background: repeating-linear-gradient(90deg, transparent 0 6px, rgba(255, 80, 120, 0.5) 6px 12px);
    pointer-events: none;
    z-index: 2;
  }

  /* OVERLAYS */
  .game-status {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Rubik Bubbles', cursive;
    font-size: 28px;
    letter-spacing: 0.08em;
    color: var(--yel);
    text-shadow: 0 3px 0 #3a1a68, 0 0 14px var(--yel);
    z-index: 3;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .game-status.show { opacity: 1; }

  .over-card {
    position: absolute;
    inset: 20% 8% auto 8%;
    background: linear-gradient(180deg, #2a1a4a, #1a0a30);
    border: 3px solid var(--accent);
    border-radius: 16px;
    padding: 24px 20px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(255, 102, 196, 0.4);
    display: none;
    z-index: 4;
  }
  .over-card.show { display: block; }
  .over-card h2 {
    margin: 0 0 6px;
    font-family: 'Rubik Bubbles', cursive;
    font-size: 32px;
    color: var(--hi);
    text-shadow: 0 3px 0 #0a041c;
  }
  .over-card .final {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    font-size: 38px;
    color: var(--yel);
    margin: 8px 0;
  }
  .over-card button {
    margin-top: 14px;
    font-family: 'Rubik Bubbles', cursive;
    font-size: 16px;
    padding: 10px 20px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(180deg, var(--accent), #c44890);
    color: #fff;
    cursor: pointer;
    letter-spacing: 0.1em;
    box-shadow: 0 4px 0 #5a0a40, 0 0 20px rgba(255, 102, 196, 0.4);
    transition: transform 0.1s;
  }
  .over-card button:active { transform: translateY(2px); box-shadow: 0 2px 0 #5a0a40; }

  /* SIDE PANEL */
  .side {
    display: flex;
    flex-direction: column;
    gap: 14px;
    min-width: 180px;
  }
  .score-card, .next-card, .info-card {
    background: rgba(255, 255, 255, 0.04);
    border: 2px solid #3a1a68;
    border-radius: 12px;
    padding: 12px 14px;
    text-align: center;
  }
  .score-card .label, .next-card .label, .info-card .label {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--dim);
    text-transform: uppercase;
  }
  .score-card .score {
    font-family: 'Rubik Bubbles', cursive;
    font-size: 36px;
    color: var(--yel);
    text-shadow: 0 2px 0 #3a1a68, 0 0 12px rgba(245, 196, 83, 0.4);
    line-height: 1;
    margin: 4px 0 2px;
  }
  .score-card .chain {
    font-family: 'Fredoka', sans-serif;
    font-weight: 700;
    font-size: 16px;
    color: var(--accent);
    min-height: 22px;
  }
  .chain-anim {
    display: inline-block;
    animation: chainPop 0.4s ease-out;
  }
  @keyframes chainPop {
    0% { transform: scale(0.5) rotate(-10deg); }
    50% { transform: scale(1.3) rotate(5deg); }
    100% { transform: scale(1) rotate(0); }
  }

  .next-preview {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-top: 8px;
    min-height: 48px;
    align-items: center;
  }
  .mini-blob {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    position: relative;
    box-shadow: inset -3px -3px 0 rgba(0, 0, 0, 0.2), inset 3px 3px 0 rgba(255, 255, 255, 0.3);
  }
  .mini-blob::after {
    content: '';
    position: absolute;
    top: 4px; left: 5px;
    width: 4px; height: 4px;
    background: white;
    border-radius: 50%;
  }
  .next-pair {
    display: flex;
    flex-direction: column;
    gap: 2px;
    align-items: center;
  }

  .info-card .keys {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 4px 10px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    text-align: left;
    margin-top: 6px;
  }
  .kbd {
    display: inline-block;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    padding: 2px 6px;
    background: #3a1a68;
    border-radius: 4px;
    border: 1px solid #5a3a88;
    box-shadow: 0 2px 0 #2a0a58;
    color: var(--hi);
  }

  .btn {
    font-family: 'Rubik Bubbles', cursive;
    font-size: 14px;
    padding: 10px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(180deg, var(--accent), #c44890);
    color: #fff;
    cursor: pointer;
    letter-spacing: 0.08em;
    box-shadow: 0 3px 0 #5a0a40;
    transition: transform 0.1s;
  }
  .btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #5a0a40; }
  .btn.ghost {
    background: transparent;
    border: 2px solid #5a3a88;
    color: var(--dim);
    box-shadow: none;
  }

  /* Touch controls - shown on touch devices */
  .touch-controls {
    display: none;
    position: fixed;
    bottom: 10px;
    left: 0;
    right: 0;
    justify-content: space-between;
    padding: 0 16px;
    z-index: 20;
    pointer-events: none;
  }
  .touch-controls > div { pointer-events: auto; display: flex; gap: 8px; }
  .tbtn {
    width: 66px; height: 66px;
    border-radius: 50%;
    background: rgba(167, 111, 195, 0.25);
    border: 2px solid rgba(255, 102, 196, 0.5);
    color: #fff;
    font-family: 'Rubik Bubbles', cursive;
    font-size: 22px;
    box-shadow: 0 4px 0 rgba(0,0,0,0.4);
    backdrop-filter: blur(8px);
    touch-action: none;
  }
  .tbtn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.4); }
  @media (hover: none) and (pointer: coarse) {
    .touch-controls { display: flex; }
  }
</style>
</head>
<body>

<div class="stage">
  <div class="title-block">
    <div class="eyebrow">▿ squish · wobble · pop ▿</div>
    <h1>Puyo<br>Physics</h1>
    <p class="tagline">
      Each blob is a jiggly little ragdoll. Drop pairs, watch them splat and settle, and pop four in a row to set off a cascading wobble.
    </p>
  </div>

  <div class="tank-wrap">
    <div class="tank-glow"></div>
    <div class="danger-line"></div>
    <canvas id="game" width="360" height="660"></canvas>
    <div class="game-status" id="statusText"></div>
    <div class="over-card" id="overCard">
      <h2>Tank Overflow!</h2>
      <div style="color:var(--dim); font-size:13px;">the blobs have escaped</div>
      <div class="final" id="finalScore">0</div>
      <div style="color:var(--dim); font-size:12px; font-family:'Space Mono',monospace; letter-spacing:0.1em;">points</div>
      <button id="restartBtn">Drop Again</button>
    </div>
  </div>

  <div class="side">
    <div class="score-card">
      <div class="label">Score</div>
      <div class="score" id="scoreDisplay">0</div>
      <div class="chain" id="chainDisplay"></div>
    </div>
    <div class="next-card">
      <div class="label">Next</div>
      <div class="next-preview" id="nextPreview"></div>
    </div>
    <div class="info-card">
      <div class="label">Controls</div>
      <div class="keys">
        <span class="kbd">← →</span><span>Move</span>
        <span class="kbd">↑</span><span>Rotate</span>
        <span class="kbd">↓</span><span>Soft drop</span>
        <span class="kbd">Space</span><span>Hard drop</span>
        <span class="kbd">P</span><span>Pause</span>
      </div>
    </div>
    <button class="btn ghost" id="muteBtn">♪ sound: on</button>
  </div>
</div>

<div class="touch-controls">
  <div>
    <button class="tbtn" id="tLeft">◀</button>
    <button class="tbtn" id="tRight">▶</button>
  </div>
  <div>
    <button class="tbtn" id="tRot">↻</button>
    <button class="tbtn" id="tDrop">▼</button>
  </div>
</div>

<script>
(function(){
'use strict';

// ========== CONSTANTS ==========

const W = 360;
const H = 660;
const R = 24;                  // blob radius
const FLOOR = H - 8;
const WALL_L = 8;
const WALL_R = W - 8;
const DANGER_Y = H * 0.12;     // if blob above this when settled, game over
const COLORS = [
  { key: 'red', body: '#ef4343', hi: '#ff9e9e', sh: '#8a1717', name: 'R' },
  { key: 'yel', body: '#f5c453', hi: '#ffe49b', sh: '#8a6510', name: 'Y' },
  { key: 'grn', body: '#7dbd5c', hi: '#c1e8a8', sh: '#3a6020', name: 'G' },
  { key: 'blu', body: '#5ea8e5', hi: '#a8d4f7', sh: '#1a4a7a', name: 'B' },
  { key: 'pur', body: '#a76fc3', hi: '#d4b0e5', sh: '#50207a', name: 'P' }
];
const COLOR_KEYS = COLORS.map(c => c.key);
const PERIMETER_POINTS = 14;
const GRAVITY = 980;           // px/s²
const DAMPING = 0.82;
const WOBBLE_DAMPING = 0.86;
const FALL_SPEED = 90;         // px/s while pair falling
const SOFT_DROP_SPEED = 380;
const HARD_DROP_SPEED = 1600;
const PAIR_MOVE_STEP = 44;     // move 44px each tap
const MATCH_MIN = 4;
const CONTACT_TOL = 4;         // extra radius tolerance for adjacency matching

// ========== STATE ==========

const state = {
  blobs: [],                   // settled / active (non-pair)
  pair: null,                  // { pivot: Blob, satellite: Blob, orientation, x, y, falling: true, landTimer }
  nextPair: null,
  score: 0,
  chainCount: 0,
  particles: [],
  popLabels: [],
  running: true,
  paused: false,
  gameOver: false,
  phase: 'fall',               // 'fall' | 'settle' | 'match' | 'over'
  settleTimer: 0,
  muted: false,
  lastTime: 0
};

let nextBlobId = 1;

// ========== BLOB ==========

function makeBlob(x, y, colorIdx, vx = 0, vy = 0) {
  const points = [];
  const pVels = [];
  for (let i = 0; i < PERIMETER_POINTS; i++) {
    const a = (i / PERIMETER_POINTS) * Math.PI * 2;
    points.push({ ox: Math.cos(a) * R, oy: Math.sin(a) * R });
    pVels.push({ vx: 0, vy: 0 });
  }
  return {
    id: nextBlobId++,
    x, y, vx, vy,
    angle: 0,
    angV: 0,
    color: colorIdx,
    points, pVels,
    squash: 1,
    squashDir: 0,   // 0 = vertical, 1 = horizontal
    eyeBlinkT: Math.random() * 5,
    eyeBlinking: 0,
    matched: false,
    alive: true,
    popT: 0,
    floor: false
  };
}

function spawnPair() {
  const c1 = Math.floor(Math.random() * COLORS.length);
  const c2 = Math.floor(Math.random() * COLORS.length);
  return {
    c1, c2,
    pivot: null, satellite: null,
    orientation: 0,  // 0=up, 1=right, 2=down, 3=left (satellite position relative to pivot)
    x: W / 2,
    y: R + 6,
    vy: FALL_SPEED,
    landTimer: 0
  };
}

function startPair() {
  if (!state.nextPair) state.nextPair = spawnPair();
  state.pair = state.nextPair;
  state.nextPair = spawnPair();
  state.pair.x = W / 2;
  state.pair.y = R + 6;
  state.pair.orientation = 0;
  state.pair.vy = FALL_SPEED;
  state.pair.landTimer = 0;
  state.phase = 'fall';
  updateNextPreview();
}

function pairBlobPositions(pair) {
  const dx = [0, R * 2, 0, -R * 2][pair.orientation];
  const dy = [-R * 2, 0, R * 2, 0][pair.orientation];
  return {
    pivot: { x: pair.x, y: pair.y },
    sat: { x: pair.x + dx, y: pair.y + dy }
  };
}

function releasePair() {
  const pair = state.pair;
  if (!pair) return;
  const pos = pairBlobPositions(pair);
  const pivotBlob = makeBlob(pos.pivot.x, pos.pivot.y, pair.c1, 0, pair.vy * 0.3);
  const satBlob = makeBlob(pos.sat.x, pos.sat.y, pair.c2, 0, pair.vy * 0.3);
  state.blobs.push(pivotBlob);
  state.blobs.push(satBlob);
  state.pair = null;
  state.phase = 'settle';
  state.settleTimer = 0;
}

// ========== PHYSICS ==========

function updateBlobs(dt) {
  const blobs = state.blobs;
  // integrate
  for (const b of blobs) {
    if (!b.alive) continue;
    b.vy += GRAVITY * dt;
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    b.angle += b.angV * dt;
    b.angV *= 0.96;
    // wall collisions
    if (b.x < WALL_L + R) {
      const over = (WALL_L + R) - b.x;
      b.x = WALL_L + R;
      b.vx = Math.abs(b.vx) * 0.3;
      b.squash = Math.min(b.squash, 0.85 - Math.min(0.25, over * 0.03));
      b.squashDir = 1;
    }
    if (b.x > WALL_R - R) {
      const over = b.x - (WALL_R - R);
      b.x = WALL_R - R;
      b.vx = -Math.abs(b.vx) * 0.3;
      b.squash = Math.min(b.squash, 0.85 - Math.min(0.25, over * 0.03));
      b.squashDir = 1;
    }
    // floor
    if (b.y > FLOOR - R) {
      const over = (b.y - (FLOOR - R));
      const impact = Math.abs(b.vy);
      b.y = FLOOR - R;
      if (b.vy > 40 && !b.floor) {
        playSquish(impact);
      }
      b.floor = true;
      b.vy = -b.vy * 0.15;
      if (Math.abs(b.vy) < 20) b.vy = 0;
      b.vx *= 0.88;
      // squash vertically
      const amt = Math.min(0.4, impact * 0.0004 + 0.08);
      b.squash = Math.min(b.squash, 1 - amt);
      b.squashDir = 0;
    } else {
      b.floor = false;
    }
  }
  // blob-blob collision (circle-circle with soft push)
  for (let i = 0; i < blobs.length; i++) {
    const a = blobs[i];
    if (!a.alive) continue;
    for (let j = i + 1; j < blobs.length; j++) {
      const bo = blobs[j];
      if (!bo.alive) continue;
      const dx = bo.x - a.x;
      const dy = bo.y - a.y;
      const d2 = dx * dx + dy * dy;
      const minD = R * 2;
      if (d2 < minD * minD && d2 > 0.001) {
        const d = Math.sqrt(d2);
        const overlap = minD - d;
        const nx = dx / d;
        const ny = dy / d;
        // separate
        a.x -= nx * overlap * 0.5;
        a.y -= ny * overlap * 0.5;
        bo.x += nx * overlap * 0.5;
        bo.y += ny * overlap * 0.5;
        // transfer some velocity (soft)
        const relVel = (bo.vx - a.vx) * nx + (bo.vy - a.vy) * ny;
        if (relVel < 0) {
          const impulse = relVel * 0.5;
          a.vx += nx * impulse;
          a.vy += ny * impulse;
          bo.vx -= nx * impulse;
          bo.vy -= ny * impulse;
          // squash effect on strong hits
          const imp = Math.abs(relVel);
          if (imp > 40) {
            const amt = Math.min(0.3, imp * 0.0005);
            a.squash = Math.min(a.squash, 1 - amt);
            bo.squash = Math.min(bo.squash, 1 - amt);
            a.squashDir = Math.abs(nx) > Math.abs(ny) ? 1 : 0;
            bo.squashDir = a.squashDir;
          }
        }
        // resting contact damping: prevents gravity-impulse oscillation
        // for stacked blobs so they can actually settle
        if (Math.abs(ny) > 0.7 && Math.abs(relVel) < 40) {
          if (ny < 0) {
            if (bo.vy > 0) bo.vy = 0;
          } else {
            if (a.vy > 0) a.vy = 0;
          }
        }
        // friction when resting: slight angular wobble
        a.angV += (Math.random() - 0.5) * 0.05;
        bo.angV += (Math.random() - 0.5) * 0.05;
      }
    }
  }
  // damping + squash recovery
  for (const b of blobs) {
    if (!b.alive) continue;
    b.vx *= 1 - (1 - DAMPING) * dt * 6;
    // squash recovers
    b.squash = b.squash + (1 - b.squash) * Math.min(1, dt * 9);
    // update perimeter wobble (visual-only soft body)
    updateWobble(b, dt);
    // eye blink timer
    b.eyeBlinkT -= dt;
    if (b.eyeBlinkT < 0) {
      b.eyeBlinking = 0.12;
      b.eyeBlinkT = 3 + Math.random() * 4;
    }
    if (b.eyeBlinking > 0) b.eyeBlinking -= dt;
  }
}

function updateWobble(b, dt) {
  // each perimeter point has ox,oy as rest offset from center; pVels stores wobble velocity
  // We treat pts as masses with spring to rest and neighbor springs.
  const pts = b.points;
  const vels = b.pVels;
  const n = pts.length;
  // seed: if a strong collision happened this frame, inject outward wobble proportional to squash
  const squishAmt = 1 - b.squash;
  if (squishAmt > 0.02) {
    for (let i = 0; i < n; i++) {
      const a = (i / n) * Math.PI * 2;
      // push perpendicular to squash direction
      const dx = Math.cos(a);
      const dy = Math.sin(a);
      const factor = (b.squashDir === 0 ? Math.abs(dx) - Math.abs(dy) : Math.abs(dy) - Math.abs(dx));
      vels[i].vx += dx * squishAmt * 60 * factor * dt;
      vels[i].vy += dy * squishAmt * 60 * factor * dt;
    }
  }
  // integrate each point (offset relative to rest)
  for (let i = 0; i < n; i++) {
    const pt = pts[i];
    const a = (i / n) * Math.PI * 2;
    const restX = Math.cos(a) * R;
    const restY = Math.sin(a) * R;
    // spring to rest
    const kx = (restX - pt.ox) * 28;
    const ky = (restY - pt.oy) * 28;
    vels[i].vx += kx * dt;
    vels[i].vy += ky * dt;
    // damping
    vels[i].vx *= Math.pow(WOBBLE_DAMPING, dt * 60);
    vels[i].vy *= Math.pow(WOBBLE_DAMPING, dt * 60);
    pt.ox += vels[i].vx * dt;
    pt.oy += vels[i].vy * dt;
  }
  // neighbor cohesion: pull each point toward midpoint of its neighbors (smoothing)
  for (let i = 0; i < n; i++) {
    const prev = pts[(i - 1 + n) % n];
    const next = pts[(i + 1) % n];
    const pt = pts[i];
    const mx = (prev.ox + next.ox) * 0.5;
    const my = (prev.oy + next.oy) * 0.5;
    const pullX = (mx - pt.ox) * 0.2;
    const pullY = (my - pt.oy) * 0.2;
    vels[i].vx += pullX;
    vels[i].vy += pullY;
  }
}

// ========== PAIR CONTROL ==========

function updatePair(dt) {
  const pair = state.pair;
  if (!pair) return;
  pair.y += pair.vy * dt;
  // check collision for both blob positions
  const pos = pairBlobPositions(pair);
  let maxY = -Infinity;
  // find max allowable y so neither blob collides
  // check floor
  const hitFloor = (y) => y > FLOOR - R;
  // check against existing blobs
  const hitBlob = (x, y) => {
    for (const b of state.blobs) {
      if (!b.alive) continue;
      const dx = b.x - x;
      const dy = b.y - y;
      if (dx * dx + dy * dy < (R * 2 - 2) * (R * 2 - 2)) return true;
    }
    return false;
  };
  // simple: back off if any collision
  const blocked = hitFloor(pos.pivot.y) || hitFloor(pos.sat.y) ||
                  hitBlob(pos.pivot.x, pos.pivot.y) || hitBlob(pos.sat.x, pos.sat.y);
  if (blocked) {
    // step back a bit
    pair.y -= pair.vy * dt;
    pair.landTimer += dt;
    if (pair.landTimer > 0.22) {
      releasePair();
      return;
    }
  } else {
    pair.landTimer = 0;
  }
}

function movePair(dx) {
  const pair = state.pair;
  if (!pair) return;
  const oldX = pair.x;
  pair.x += dx;
  const pos = pairBlobPositions(pair);
  // walls check
  if (pos.pivot.x < WALL_L + R || pos.sat.x < WALL_L + R ||
      pos.pivot.x > WALL_R - R || pos.sat.x > WALL_R - R) {
    pair.x = oldX;
    return;
  }
  // blob overlap check
  const hitBlob = (x, y) => {
    for (const b of state.blobs) {
      if (!b.alive) continue;
      const ddx = b.x - x;
      const ddy = b.y - y;
      if (ddx * ddx + ddy * ddy < (R * 2 - 2) * (R * 2 - 2)) return true;
    }
    return false;
  };
  if (hitBlob(pos.pivot.x, pos.pivot.y) || hitBlob(pos.sat.x, pos.sat.y)) {
    pair.x = oldX;
  }
}

function rotatePair() {
  const pair = state.pair;
  if (!pair) return;
  const oldO = pair.orientation;
  pair.orientation = (pair.orientation + 1) % 4;
  const pos = pairBlobPositions(pair);
  // wall kick
  if (pos.sat.x < WALL_L + R) {
    pair.x += (WALL_L + R) - pos.sat.x;
  } else if (pos.sat.x > WALL_R - R) {
    pair.x -= pos.sat.x - (WALL_R - R);
  }
  if (pos.sat.y > FLOOR - R) {
    pair.y -= pos.sat.y - (FLOOR - R);
  }
  const pos2 = pairBlobPositions(pair);
  // blob overlap check
  const hitBlob = (x, y) => {
    for (const b of state.blobs) {
      if (!b.alive) continue;
      const ddx = b.x - x;
      const ddy = b.y - y;
      if (ddx * ddx + ddy * ddy < (R * 2 - 2) * (R * 2 - 2)) return true;
    }
    return false;
  };
  if (hitBlob(pos2.pivot.x, pos2.pivot.y) || hitBlob(pos2.sat.x, pos2.sat.y)) {
    pair.orientation = oldO;
  }
  playClick();
}

// ========== MATCHING ==========

function findMatches() {
  // flood-fill clusters of same-color blobs where any two are "touching"
  const blobs = state.blobs.filter(b => b.alive && !b.matched);
  const visited = new Set();
  const clusters = [];
  for (const b of blobs) {
    if (visited.has(b.id)) continue;
    const cluster = [];
    const stack = [b];
    while (stack.length) {
      const cur = stack.pop();
      if (visited.has(cur.id)) continue;
      visited.add(cur.id);
      cluster.push(cur);
      for (const other of blobs) {
        if (visited.has(other.id)) continue;
        if (other.color !== cur.color) continue;
        const dx = other.x - cur.x;
        const dy = other.y - cur.y;
        const minD = R * 2 + CONTACT_TOL;
        if (dx * dx + dy * dy < minD * minD) {
          stack.push(other);
        }
      }
    }
    if (cluster.length >= MATCH_MIN) clusters.push(cluster);
  }
  return clusters;
}

function isSettled() {
  for (const b of state.blobs) {
    if (!b.alive) continue;
    if (Math.abs(b.vx) > 22) return false;
    if (Math.abs(b.vy) > 22) return false;
  }
  return true;
}

function popCluster(cluster) {
  for (const b of cluster) {
    b.matched = true;
    // schedule pop
    b.popT = 0.01;
  }
}

function finalizePop() {
  // remove matched blobs that have finished popping and add score
  const removed = state.blobs.filter(b => b.matched && b.popT >= 0.32);
  for (const b of removed) {
    b.alive = false;
    // particle burst
    const col = COLORS[b.color];
    for (let i = 0; i < 12; i++) {
      const a = (i / 12) * Math.PI * 2 + Math.random() * 0.3;
      const spd = 80 + Math.random() * 220;
      state.particles.push({
        x: b.x, y: b.y,
        vx: Math.cos(a) * spd,
        vy: Math.sin(a) * spd - 50,
        life: 0.5 + Math.random() * 0.3,
        maxLife: 0.8,
        r: 3 + Math.random() * 4,
        col: col.body,
        hi: col.hi
      });
    }
  }
  return removed.length;
}

// ========== PARTICLES ==========

function updateParticles(dt) {
  const parts = state.particles;
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];
    p.vy += GRAVITY * 0.5 * dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
    if (p.life <= 0) parts.splice(i, 1);
  }
  // pop labels
  for (let i = state.popLabels.length - 1; i >= 0; i--) {
    const pl = state.popLabels[i];
    pl.y -= 70 * dt;
    pl.life -= dt;
    if (pl.life <= 0) state.popLabels.splice(i, 1);
  }
}

// ========== GAME LOOP ==========

function tick(dt) {
  if (state.paused || state.gameOver) return;
  // update pair
  if (state.phase === 'fall' && state.pair) {
    updatePair(dt);
  }
  // physics
  updateBlobs(dt);
  updateParticles(dt);
  // handle popping
  for (const b of state.blobs) {
    if (b.matched && b.popT > 0) {
      b.popT += dt;
    }
  }
  // phase transitions
  if (state.phase === 'settle') {
    state.settleTimer += dt;
    if (isSettled() && state.settleTimer > 0.35) {
      // check for matches
      const clusters = findMatches();
      if (clusters.length > 0) {
        state.chainCount++;
        let totalPopped = 0;
        for (const cluster of clusters) {
          popCluster(cluster);
          totalPopped += cluster.length;
        }
        // chain scoring
        const chainMult = Math.pow(2, state.chainCount - 1);
        const gained = totalPopped * 10 * chainMult;
        state.score += gained;
        state.popLabels.push({
          x: W / 2, y: H * 0.45,
          text: state.chainCount > 1 ? `CHAIN × ${state.chainCount}!` : `+${gained}`,
          life: 1.2, maxLife: 1.2,
          color: state.chainCount > 1 ? '#ff66c4' : '#f5c453'
        });
        playPop(state.chainCount);
        updateScoreUI();
        state.phase = 'match';
      } else {
        // no matches; check game over condition
        if (checkGameOver()) {
          doGameOver();
          return;
        }
        state.chainCount = 0;
        updateChainUI();
        startPair();
      }
    }
  } else if (state.phase === 'match') {
    // wait for pop animations to finish then resettle
    const anyPopping = state.blobs.some(b => b.matched && b.popT > 0 && b.popT < 0.32);
    if (!anyPopping) {
      const popped = finalizePop();
      // give cells above time to fall
      state.phase = 'settle';
      state.settleTimer = 0;
    }
  }
}

function checkGameOver() {
  for (const b of state.blobs) {
    if (!b.alive) continue;
    if (b.y - R < DANGER_Y + 8) return true;
  }
  return false;
}

function doGameOver() {
  state.gameOver = true;
  state.phase = 'over';
  document.getElementById('finalScore').textContent = state.score;
  document.getElementById('overCard').classList.add('show');
  playGameOver();
}

// ========== RENDER ==========

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

function render() {
  ctx.clearRect(0, 0, W, H);
  // faint grid
  ctx.save();
  ctx.globalAlpha = 0.05;
  ctx.strokeStyle = '#8a5fd5';
  ctx.lineWidth = 1;
  for (let y = DANGER_Y; y < H; y += R * 2) {
    ctx.beginPath();
    ctx.moveTo(WALL_L, y);
    ctx.lineTo(WALL_R, y);
    ctx.stroke();
  }
  ctx.restore();

  // shadow on floor for each blob
  for (const b of state.blobs) {
    if (!b.alive) continue;
    ctx.save();
    ctx.globalAlpha = 0.22;
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(b.x, FLOOR - 4, R * 0.8, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // pair (falling)
  if (state.pair) {
    const pair = state.pair;
    const pos = pairBlobPositions(pair);
    drawBlob(pos.pivot.x, pos.pivot.y, pair.c1, 1, 0, 0, null, 1);
    drawBlob(pos.sat.x, pos.sat.y, pair.c2, 1, 0, 0, null, 1);
    // link line
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 2;
    ctx.setLineDash([3,3]);
    ctx.beginPath();
    ctx.moveTo(pos.pivot.x, pos.pivot.y);
    ctx.lineTo(pos.sat.x, pos.sat.y);
    ctx.stroke();
    ctx.restore();
  }

  // blobs
  for (const b of state.blobs) {
    if (!b.alive) continue;
    let popScale = 1;
    let popAlpha = 1;
    if (b.matched) {
      const t = b.popT / 0.32;
      popScale = 1 + t * 0.5;
      popAlpha = 1 - t;
    }
    drawBlob(b.x, b.y, b.color, b.squash, b.squashDir, b.angle, b.points, popScale, popAlpha, b.eyeBlinking, b.vx, b.vy);
  }

  // particles
  for (const p of state.particles) {
    const lt = p.life / p.maxLife;
    ctx.save();
    ctx.globalAlpha = Math.max(0, lt);
    ctx.fillStyle = p.col;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * lt, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // pop labels
  for (const pl of state.popLabels) {
    const lt = pl.life / pl.maxLife;
    ctx.save();
    ctx.globalAlpha = Math.max(0, lt);
    ctx.textAlign = 'center';
    ctx.font = 'bold 28px Rubik Bubbles, cursive';
    ctx.fillStyle = pl.color;
    ctx.strokeStyle = '#0a041c';
    ctx.lineWidth = 5;
    ctx.strokeText(pl.text, pl.x, pl.y);
    ctx.fillText(pl.text, pl.x, pl.y);
    ctx.restore();
  }

  // danger line highlight
  ctx.save();
  ctx.strokeStyle = 'rgba(255, 80, 120, 0.25)';
  ctx.setLineDash([5, 5]);
  ctx.beginPath();
  ctx.moveTo(WALL_L, DANGER_Y);
  ctx.lineTo(WALL_R, DANGER_Y);
  ctx.stroke();
  ctx.restore();
}

function drawBlob(cx, cy, colorIdx, squash, squashDir, angle, points, scale, alpha, blink, vx, vy) {
  const col = COLORS[colorIdx];
  scale = scale || 1;
  alpha = (alpha === undefined) ? 1 : alpha;
  blink = blink || 0;
  vx = vx || 0;
  vy = vy || 0;

  ctx.save();
  ctx.translate(cx, cy);
  // apply squash transform
  const sVal = squash;
  if (squashDir === 0) {
    ctx.scale(2 - sVal, sVal);
  } else {
    ctx.scale(sVal, 2 - sVal);
  }
  ctx.scale(scale, scale);
  ctx.globalAlpha = alpha;

  // body path (use wobble points if available)
  ctx.beginPath();
  if (points) {
    for (let i = 0; i <= points.length; i++) {
      const p = points[i % points.length];
      if (i === 0) ctx.moveTo(p.ox, p.oy);
      else {
        // smooth with midpoint
        const prev = points[(i - 1) % points.length];
        const mx = (prev.ox + p.ox) / 2;
        const my = (prev.oy + p.oy) / 2;
        ctx.quadraticCurveTo(prev.ox, prev.oy, mx, my);
      }
    }
  } else {
    ctx.arc(0, 0, R, 0, Math.PI * 2);
  }
  ctx.closePath();

  // gradient fill
  const grad = ctx.createRadialGradient(-R * 0.35, -R * 0.4, R * 0.1, 0, 0, R * 1.2);
  grad.addColorStop(0, col.hi);
  grad.addColorStop(0.4, col.body);
  grad.addColorStop(1, col.sh);
  ctx.fillStyle = grad;
  ctx.fill();

  // outer rim
  ctx.lineWidth = 2;
  ctx.strokeStyle = 'rgba(0,0,0,0.28)';
  ctx.stroke();

  // shiny highlight
  ctx.save();
  ctx.globalAlpha = 0.55 * alpha;
  ctx.beginPath();
  ctx.ellipse(-R * 0.35, -R * 0.4, R * 0.28, R * 0.18, -0.4, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.fill();
  ctx.restore();

  // eyes look slightly toward velocity
  const spd = Math.sqrt(vx*vx + vy*vy);
  const look = Math.min(4, spd * 0.02);
  const lookX = spd > 0 ? (vx / spd) * look : 0;
  const lookY = spd > 0 ? (vy / spd) * look : 0;
  drawEye(-R * 0.28, -R * 0.05, blink > 0, lookX, lookY);
  drawEye(R * 0.18, -R * 0.05, blink > 0, lookX, lookY);

  // mouth (tiny smile)
  ctx.beginPath();
  ctx.strokeStyle = 'rgba(0,0,0,0.5)';
  ctx.lineWidth = 1.5;
  ctx.arc(0, R * 0.2, R * 0.22, 0.2, Math.PI - 0.2);
  ctx.stroke();

  ctx.restore();
}

function drawEye(x, y, blinking, lookX, lookY) {
  ctx.save();
  if (blinking) {
    // closed eye: horizontal line
    ctx.strokeStyle = '#0a0a20';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x - 4, y);
    ctx.lineTo(x + 4, y);
    ctx.stroke();
  } else {
    // white
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(x, y, 4.5, 0, Math.PI * 2);
    ctx.fill();
    // pupil
    ctx.fillStyle = '#0a0820';
    ctx.beginPath();
    ctx.arc(x + lookX * 0.5, y + lookY * 0.5, 2.4, 0, Math.PI * 2);
    ctx.fill();
    // tiny sparkle
    ctx.fillStyle = 'rgba(255,255,255,0.9)';
    ctx.beginPath();
    ctx.arc(x + lookX * 0.5 - 0.8, y + lookY * 0.5 - 0.8, 0.8, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

// ========== AUDIO ==========

let audioCtx = null;
function audio() {
  if (state.muted) return null;
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}

function tone(freq, dur, type, vol) {
  const a = audio(); if (!a) return;
  const o = a.createOscillator();
  const g = a.createGain();
  o.type = type || 'triangle';
  o.frequency.value = freq;
  g.gain.value = 0;
  g.gain.linearRampToValueAtTime(vol || 0.15, a.currentTime + 0.01);
  g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
  o.connect(g).connect(a.destination);
  o.start();
  o.stop(a.currentTime + dur + 0.05);
}

function playSquish(impact) {
  const a = audio(); if (!a) return;
  const freq = 120 + Math.random() * 40;
  tone(freq, 0.15, 'sine', Math.min(0.12, impact * 0.0003));
  // tiny noise burst
  const bufferSize = a.sampleRate * 0.08;
  const buf = a.createBuffer(1, bufferSize, a.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufferSize; i++) {
    data[i] = (Math.random() - 0.5) * Math.pow(1 - i / bufferSize, 2);
  }
  const src = a.createBufferSource();
  src.buffer = buf;
  const g = a.createGain();
  g.gain.value = Math.min(0.06, impact * 0.0002);
  const bp = a.createBiquadFilter();
  bp.type = 'lowpass';
  bp.frequency.value = 400;
  src.connect(bp).connect(g).connect(a.destination);
  src.start();
}

function playClick() {
  tone(680, 0.05, 'square', 0.05);
}

function playPop(chain) {
  const a = audio(); if (!a) return;
  const base = 440 * Math.pow(1.2, chain);
  tone(base, 0.12, 'triangle', 0.13);
  setTimeout(() => tone(base * 1.5, 0.1, 'triangle', 0.1), 60);
  setTimeout(() => tone(base * 2, 0.1, 'sine', 0.08), 120);
}

function playGameOver() {
  const a = audio(); if (!a) return;
  tone(330, 0.25, 'sawtooth', 0.12);
  setTimeout(() => tone(260, 0.25, 'sawtooth', 0.12), 200);
  setTimeout(() => tone(180, 0.4, 'sawtooth', 0.14), 400);
}

// ========== UI UPDATES ==========

function updateScoreUI() {
  document.getElementById('scoreDisplay').textContent = state.score;
  updateChainUI();
}

function updateChainUI() {
  const el = document.getElementById('chainDisplay');
  if (state.chainCount > 1) {
    el.innerHTML = `<span class="chain-anim">${state.chainCount}× chain!</span>`;
  } else {
    el.textContent = '';
  }
}

function updateNextPreview() {
  const el = document.getElementById('nextPreview');
  el.innerHTML = '';
  if (!state.nextPair) return;
  const div = document.createElement('div');
  div.className = 'next-pair';
  const d1 = document.createElement('div');
  d1.className = 'mini-blob';
  d1.style.background = COLORS[state.nextPair.c2].body;
  const d2 = document.createElement('div');
  d2.className = 'mini-blob';
  d2.style.background = COLORS[state.nextPair.c1].body;
  div.appendChild(d1);
  div.appendChild(d2);
  el.appendChild(div);
}

// ========== INPUT ==========

const keys = {};
window.addEventListener('keydown', e => {
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
  if (state.gameOver) return;
  if (e.key === 'p' || e.key === 'P') { state.paused = !state.paused; return; }
  if (state.paused) return;
  if (keys[e.key]) return;
  keys[e.key] = true;
  if (!state.pair || state.phase !== 'fall') return;
  if (e.key === 'ArrowLeft') { movePair(-PAIR_MOVE_STEP); playClick(); }
  if (e.key === 'ArrowRight') { movePair(PAIR_MOVE_STEP); playClick(); }
  if (e.key === 'ArrowUp') { rotatePair(); }
  if (e.key === 'ArrowDown') { state.pair.vy = SOFT_DROP_SPEED; }
  if (e.key === ' ') {
    // hard drop: fast-fall until lands
    state.pair.vy = HARD_DROP_SPEED;
  }
});
window.addEventListener('keyup', e => {
  keys[e.key] = false;
  if (!state.pair) return;
  if (e.key === 'ArrowDown') { state.pair.vy = FALL_SPEED; }
});

// touch buttons
function bindTouch(id, down) {
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('touchstart', e => { e.preventDefault(); down(); }, { passive: false });
  el.addEventListener('mousedown', e => { e.preventDefault(); down(); });
}
bindTouch('tLeft', () => { if (state.pair && state.phase === 'fall') { movePair(-PAIR_MOVE_STEP); playClick(); } });
bindTouch('tRight', () => { if (state.pair && state.phase === 'fall') { movePair(PAIR_MOVE_STEP); playClick(); } });
bindTouch('tRot', () => { if (state.pair && state.phase === 'fall') { rotatePair(); } });
bindTouch('tDrop', () => { if (state.pair && state.phase === 'fall') { state.pair.vy = HARD_DROP_SPEED; } });

// mute button
document.getElementById('muteBtn').addEventListener('click', () => {
  state.muted = !state.muted;
  document.getElementById('muteBtn').textContent = '♪ sound: ' + (state.muted ? 'off' : 'on');
});

// restart
document.getElementById('restartBtn').addEventListener('click', () => {
  state.blobs = [];
  state.pair = null;
  state.nextPair = null;
  state.score = 0;
  state.chainCount = 0;
  state.particles = [];
  state.popLabels = [];
  state.gameOver = false;
  state.phase = 'fall';
  document.getElementById('overCard').classList.remove('show');
  updateScoreUI();
  startPair();
});

// ========== MAIN LOOP ==========

function loop(t) {
  const dt = Math.min(0.033, (t - state.lastTime) / 1000 || 0);
  state.lastTime = t;
  tick(dt);
  render();
  requestAnimationFrame(loop);
}

// boot
startPair();
updateScoreUI();
updateNextPreview();
requestAnimationFrame(t => { state.lastTime = t; loop(t); });

})();
</script>
