<style>

    --cyan:    #45e7ff;
    --lime:    #c4ff52;
    --yellow:  #ffe156;
    --orange:  #ff8c3a;
    --violet:  #b07cff;
    --magenta: #ff2dd7;
    --green:   #5fff85;
    --blue:    #5fb5ff;
    --ink:     #2a0a3c;
    --ink-soft:rgba(42, 10, 60, 0.65);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--pink);
    color: var(--ink);
    font-family: 'Fredoka', sans-serif;
    -webkit-font-smoothing: antialiased;
    user-select: none;
    touch-action: manipulation;

  body {
    position: relative;
    min-height: 100vh;
    background:
      linear-gradient(135deg, #fff48f 0%, #ff5fb2 35%, #b07cff 70%, #45e7ff 100%);
    background-size: 200% 200%;
    animation: bgDrift 24s ease-in-out infinite;
    display: flex;
    flex-direction: column;
  }
  @keyframes bgDrift {
    0%, 100% { background-position: 0% 0%; }
    50%      { background-position: 100% 100%; }
  }

  /* rainbow scrolling stripes BEHIND the dance floor */
  .rainbow {
    position: fixed;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    background: repeating-linear-gradient(
      135deg,
      rgba(255, 95, 178, 0.18) 0 60px,
      rgba(255, 225, 86, 0.18) 60px 120px,
      rgba(95, 255, 133, 0.18) 120px 180px,
      rgba(69, 231, 255, 0.18) 180px 240px,
      rgba(176, 124, 255, 0.18) 240px 300px
    );
    background-size: 400% 400%;
    animation: rainbowSlide 6s linear infinite;
    mix-blend-mode: screen;
  }
  @keyframes rainbowSlide {
    from { background-position: 0 0; }
    to   { background-position: 200px 200px; }
  }

  /* disco floor — chequered dance tiles */
  .floor {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 22vh;
    z-index: 2;
    background:
      repeating-conic-gradient(
        var(--pink-hot) 0 25%, var(--cyan) 0 50%
      );
    background-size: 80px 80px;
    transform: perspective(420px) rotateX(58deg);
    transform-origin: 50% 100%;
    opacity: 0.5;
  }

  /* header */
  header {
    position: relative;
    z-index: 5;
    text-align: center;
    padding: 1.6vh 1rem 0;
    pointer-events: none;
  }
  h1 {
    font-family: 'Bungee', cursive;
    font-size: clamp(1.8rem, 5vw, 3.2rem);
    color: #fff;

    text-shadow:

  h1 .gum { color: var(--yellow); }
  h1 .heart {
    display: inline-block;
    color: var(--magenta);

  @keyframes pulseHeart {
    0%, 100% { transform: scale(1); }

  }
  .tag {
    font-family: 'Major Mono Display', monospace;
    font-size: clamp(0.7rem, 1.2vw, 0.9rem);
    letter-spacing: 0.42em;
    color: #fff;

    text-shadow: 2px 2px 0 var(--pink-hot);
    margin-top: 0.5rem;
  }

  /* dance floor: row of silhouettes */
  .stage {
    position: absolute;
    inset: 0;
    z-index: 3;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: clamp(0.5rem, 1.5vw, 1.4rem);
    padding-bottom: 18vh;
    pointer-events: none;
    flex-wrap: wrap;

  .dancer {
    width: clamp(54px, 9vw, 110px);
    height: clamp(120px, 22vw, 220px);
    position: relative;
    pointer-events: none;
    /* base sway animation; the JS overrides duration to match BPM */
    animation: sway 0.36s ease-in-out infinite;
    transform-origin: 50% 96%;

  @keyframes sway {
    0%   { transform: translateY(0) rotate(-8deg); }

  .dancer svg {
    width: 100%;

  /* per-dancer color variants */

  .dancer.c1 { color: var(--cyan); }
  .dancer.c2 { color: var(--yellow); }
  .dancer.c3 { color: var(--lime); }
  .dancer.c4 { color: var(--violet); }
  .dancer.c5 { color: var(--orange); }
  .dancer.c6 { color: var(--magenta); }
  .dancer.c7 { color: var(--blue); }
  .dancer.c8 { color: var(--green); }
  .dancer.c9 { color: var(--pink); }
  /* stagger the sway so they don't all hit the same phase */
  .dancer:nth-child(2n)     { animation-delay: -0.18s; }
  .dancer:nth-child(3n)     { animation-delay: -0.09s; }

  /* karaoke-style verse bar — scrolls food-pun parody lines on the beat */
  .verse-bar {
    position: fixed;

    body { animation: none; }
    .rainbow { animation: none; }
    .disco { animation: none; }

</style>

<script>
'use strict';

// ═════════════════════════════════════════════════════════════════════════
// caramel-dansen — wholesome parody-mix tribute
// All audio is procedurally synthesized: no samples, no real song,
// no real lyrics. Beat-synced dancing silhouettes shake left/right.
// ═════════════════════════════════════════════════════════════════════════

// ── DANCER SILHOUETTES (inline SVG, classic arms-up hop pose) ────────────
// 10 figures in a row, varied shades, each with the iconic "rabbit-ears"
// arms-overhead party stance.
const DANCER_SVG = `
<svg viewBox="0 0 80 160" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <!-- shadow under feet -->
  <ellipse cx="40" cy="156" rx="22" ry="3" fill="rgba(42, 10, 60, 0.32)"/>
  <!-- body -->
  <path d="
    M 32 60 L 28 102 L 22 144 L 36 144 L 40 110
    L 44 144 L 58 144 L 52 102 L 48 60 Z"
    fill="currentColor" stroke="rgba(42,10,60,0.55)" stroke-width="2"/>
  <!-- arms raised overhead with hands together (party stance) -->
  <path d="
    M 30 62 L 22 30 L 30 8 L 40 26 L 50 8 L 58 30 L 50 62 Z"
    fill="currentColor" stroke="rgba(42,10,60,0.55)" stroke-width="2"/>
  <!-- hands (a circle each at the top of each arm tip) -->
  <circle cx="30" cy="8" r="6" fill="currentColor" stroke="rgba(42,10,60,0.55)" stroke-width="2"/>
  <circle cx="50" cy="8" r="6" fill="currentColor" stroke="rgba(42,10,60,0.55)" stroke-width="2"/>
  <!-- head -->
  <circle cx="40" cy="60" r="18" fill="#ffe1c4" stroke="rgba(42,10,60,0.6)" stroke-width="2"/>
  <!-- hair tuft -->
  <path d="M 22 52 Q 28 36 40 36 Q 52 36 58 52 Q 50 48 40 50 Q 30 48 22 52 Z"
        fill="rgba(42,10,60,0.7)"/>
  <!-- eyes (closed-happy ^ ^) -->
  <path d="M 30 60 q 4 -4 7 0" stroke="rgba(42,10,60,0.85)" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M 43 60 q 4 -4 7 0" stroke="rgba(42,10,60,0.85)" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- mouth (little smile) -->
  <path d="M 35 70 q 5 5 10 0" stroke="rgba(42,10,60,0.85)" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <!-- cheek blush -->
  <ellipse cx="30" cy="68" rx="3.4" ry="2.2" fill="rgba(255, 45, 199, 0.6)"/>
  <ellipse cx="50" cy="68" rx="3.4" ry="2.2" fill="rgba(255, 45, 199, 0.6)"/>
</svg>
`.trim();

const stageEl = document.getElementById('stage');
const NUM_DANCERS = 10;
for (let i = 0; i < NUM_DANCERS; i++){
  const d = document.createElement('div');
  d.className = 'dancer c' + (i % 10);
  d.innerHTML = DANCER_SVG;
  stageEl.appendChild(d);
}

// ── AUDIO — Web Audio synth, NO samples, NO real lyrics ─────────────────
// Tempo + key roughly evoke high-tempo Euro dance pop. The melody and
// progression are original and not derived from any actual song.
const BPM = 165;
const BEAT = 60 / BPM;             // ≈ 0.3636s per beat at 165
const BAR = BEAT * 4;
const SIXTEENTH = BEAT / 4;

let actx = null;
let masterGain = null;
let muted = false;
let userGestured = false;
let nextBarTime = 0;
let songStartTime = 0;
let isPlaying = false;
let scheduleHandle = 0;
let beatCount = 0;     // total beats elapsed since songStart
let barCount = 0;

function ensureAudio(){
  if (!userGestured) return null;
  if (!actx){
    try { actx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e){ return null; }
    masterGain = actx.createGain();
    masterGain.gain.value = muted ? 0 : 0.6;
    const comp = actx.createDynamicsCompressor();
    comp.threshold.value = -14;
    comp.knee.value = 14;
    comp.ratio.value = 6;
    comp.attack.value = 0.005;
    comp.release.value = 0.18;
    masterGain.connect(comp);
    comp.connect(actx.destination);
  }
  if (actx.state === 'suspended') actx.resume();
  return actx;
}

function midi(n){ return 440 * Math.pow(2, (n - 69) / 12); }

// 4-bar chord loop in A natural minor — i / VI / III / VII (Am F C G).
// This is one of the most common minor-key pop rotations of the last
// fifty years; it gives the loop a high-energy Euro-pop tilt without
// quoting any specific track. ROOT MIDI = the bass note; CHORD = the
// 4 voices the pad + lead pick from.
const PROGRESSION = [
  { rootMidi: 33, chord: [57, 60, 64, 69] },  // Am   — A C E A
  { rootMidi: 29, chord: [53, 57, 60, 65] },  // F    — F A C F
  { rootMidi: 36, chord: [60, 64, 67, 72] },  // C    — C E G C
  { rootMidi: 31, chord: [55, 59, 62, 67] },  // G    — G B D G
];

// 16-sixteenth lead patterns per bar — bouncy syncopated runs in A
// minor pentatonic. Indices reference the chord notes. -1 = rest. These
// are app-original phrases written for this loop; the rhythm leans into
// the genre's signature off-beat "and"-emphasis stutter without copying
// any specific song's melody.
const LEAD_PATTERN = [
  // bar 1 (Am) — root → 3rd skip with off-beat punches
  [0, -1, 1,  2, -1, 1, 0, -1, 2, -1, 1, 0, -1, 1, 2, -1],
  // bar 2 (F)  — climbing variation
  [0, -1, 1,  2,  3, -1, 2, 0, -1, 1, -1, 2, 1, -1, 0, 1],
  // bar 3 (C)  — drop-in on the 1, eighth-note triplet feel
  [0, -1, 0,  1, -1, 2, 1, 0, -1, 2, 1, -1, 0, 1, 2, -1],
  // bar 4 (G)  — release / one-note-pickup before the loop repeats
  [0, -1, 1, -1, 2, -1, 1, 0,  0, -1, 1, 2, -1, 1, 0, -1],
];

// Off-beat "stab" — a classic Euro-pop ornament. Plays a short bright
// chord blip on the "and" of every beat. Genre flavor only; not derived
// from any one record.
function stab(at, freq){
  if (!actx || muted) return;
  const t = at;
  const o = actx.createOscillator();
  const o2 = actx.createOscillator();
  o.type = 'square';
  o2.type = 'sawtooth';
  o.frequency.value = freq;
  o2.frequency.value = freq * 2;
  const f = actx.createBiquadFilter();
  f.type = 'bandpass';
  f.frequency.value = 1800;
  f.Q.value = 1.6;
  const g = actx.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.08, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.12);
  o.connect(f); o2.connect(f); f.connect(g); g.connect(masterGain);
  o.start(t); o2.start(t);
  o.stop(t + 0.13); o2.stop(t + 0.13);
}

// ── INSTRUMENT VOICES (procedural) ────────────────────────────────────
function kick(at){
  if (!actx || muted) return;
  const t = at;
  const o = actx.createOscillator();
  const g = actx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(160, t);
  o.frequency.exponentialRampToValueAtTime(42, t + 0.16);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.62, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
  o.connect(g); g.connect(masterGain);
  o.start(t); o.stop(t + 0.24);
  // tiny click
  const n = Math.floor(actx.sampleRate * 0.03);
  const buf = actx.createBuffer(1, n, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/n, 2);
  const src = actx.createBufferSource(); src.buffer = buf;
  const hp = actx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 1800;
  const ng = actx.createGain(); ng.gain.value = 0.15;
  src.connect(hp); hp.connect(ng); ng.connect(masterGain);
  src.start(t); src.stop(t + 0.04);
}
function hat(at, open){
  if (!actx || muted) return;
  const t = at;
  const dur = open ? 0.16 : 0.055;
  const n = Math.floor(actx.sampleRate * dur);
  const buf = actx.createBuffer(1, n, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/n, open ? 1.4 : 2.4);
  const src = actx.createBufferSource(); src.buffer = buf;
  const hp = actx.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 6000;
  const g = actx.createGain(); g.gain.value = open ? 0.12 : 0.08;
  src.connect(hp); hp.connect(g); g.connect(masterGain);
  src.start(t); src.stop(t + dur);
}
function clap(at){
  if (!actx || muted) return;
  const t = at;
  const dur = 0.18;
  const n = Math.floor(actx.sampleRate * dur);
  const buf = actx.createBuffer(1, n, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/n, 1.6);
  const src = actx.createBufferSource(); src.buffer = buf;
  const bp = actx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 1400; bp.Q.value = 0.9;
  const g = actx.createGain(); g.gain.value = 0.25;
  src.connect(bp); bp.connect(g); g.connect(masterGain);
  src.start(t); src.stop(t + dur);
}
function bass(at, freq, duration){
  if (!actx || muted) return;
  const t = at;
  const o = actx.createOscillator();
  o.type = 'square';
  const sub = actx.createOscillator();
  sub.type = 'sine';
  o.frequency.value = freq;
  sub.frequency.value = freq * 0.5;
  const f = actx.createBiquadFilter();
  f.type = 'lowpass';
  f.frequency.setValueAtTime(700, t);
  f.frequency.exponentialRampToValueAtTime(220, t + duration * 0.7);
  f.Q.value = 3;
  const g = actx.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.22, t + 0.012);
  g.gain.setValueAtTime(0.18, t + duration * 0.7);
  g.gain.exponentialRampToValueAtTime(0.0001, t + duration);
  o.connect(f); sub.connect(f); f.connect(g); g.connect(masterGain);
  o.start(t); sub.start(t);
  o.stop(t + duration + 0.02); sub.stop(t + duration + 0.02);
}
function lead(at, freq, duration){
  if (!actx || muted) return;
  const t = at;
  // bright synth-pop voice: two saws +5¢ apart + a square octave up
  const o = actx.createOscillator();  o.type = 'sawtooth'; o.frequency.value = freq;
  const o2 = actx.createOscillator(); o2.type = 'sawtooth'; o2.frequency.value = freq; o2.detune.value = 9;
  const o3 = actx.createOscillator(); o3.type = 'square';   o3.frequency.value = freq * 2;
  const f = actx.createBiquadFilter();
  f.type = 'lowpass';
  f.frequency.value = 3000;
  f.Q.value = 1.6;
  const g = actx.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.16, t + 0.008);
  g.gain.exponentialRampToValueAtTime(0.04, t + duration * 0.6);
  g.gain.exponentialRampToValueAtTime(0.0001, t + duration);
  o.connect(f); o2.connect(f); o3.connect(f); f.connect(g); g.connect(masterGain);
  o.start(t); o2.start(t); o3.start(t);
  o.stop(t + duration + 0.02); o2.stop(t + duration + 0.02); o3.stop(t + duration + 0.02);
}
function pad(at, notes, duration){
  if (!actx || muted) return;
  for (const f of notes){
    const o = actx.createOscillator();
    o.type = 'sawtooth';
    o.detune.value = (Math.random() - 0.5) * 8;
    o.frequency.value = f;
    const fl = actx.createBiquadFilter();
    fl.type = 'lowpass'; fl.frequency.value = 1200; fl.Q.value = 0.6;
    const g = actx.createGain();
    g.gain.setValueAtTime(0.0001, at);
    g.gain.linearRampToValueAtTime(0.04, at + 0.6);
    g.gain.setValueAtTime(0.04, at + duration - 0.5);
    g.gain.linearRampToValueAtTime(0.0001, at + duration);
    o.connect(fl); fl.connect(g); g.connect(masterGain);
    o.start(at); o.stop(at + duration + 0.05);
  }
}

// ── SCHEDULER — schedule one bar at a time, look-ahead ~120ms ─────────
function scheduleBar(barIdx, barStart){
  const prog = PROGRESSION[barIdx % PROGRESSION.length];
  // pad (1-bar held chord, transposed up 2 octaves)
  const padNotes = prog.chord.map(n => midi(n + 24));
  pad(barStart, padNotes, BAR);

  // drums: 4-on-the-floor kick + closed hats every 8th + clap on 2 & 4
  for (let beat = 0; beat < 4; beat++){
    const beatT = barStart + beat * BEAT;
    kick(beatT);
    hat(beatT);
    hat(beatT + BEAT / 2);
    if (beat === 1 || beat === 3) clap(beatT);
  }
  // open hat on the "and" of beat 4 for that EDM lift
  hat(barStart + BEAT * 3.5, true);

  // bass — driving 8th-note pump on the chord root. This is the
  // signature feel of high-energy Euro-pop (think: anything Cascada-
  // adjacent), where the bass never stops bouncing. Same root every
  // eighth; the LEAD does the melodic work. Each note ducks 0.42 of
  // a beat so adjacent notes don't blend.
  const r = prog.rootMidi;
  for (let i = 0; i < 8; i++){
    bass(barStart + i * (BEAT / 2), midi(r), BEAT * 0.42);
  }
  // off-beat stab — short bright chord blip on every "and" (0.5, 1.5,
  // 2.5, 3.5). Genre flavor; the pitch is the 3rd of the bar's chord
  // for a snappy +chord-tone color.
  for (let beat = 0; beat < 4; beat++){
    stab(barStart + beat * BEAT + BEAT / 2, midi(prog.chord[1]));
  }

  // lead — 16 sixteenths, indices into prog.chord
  const pat = LEAD_PATTERN[barIdx % LEAD_PATTERN.length];
  for (let i = 0; i < 16; i++){
    if (pat[i] < 0) continue;
    const note = prog.chord[pat[i]];
    const leadFreq = midi(note + 12);
    lead(barStart + i * SIXTEENTH, leadFreq, SIXTEENTH * 1.6);
  }
}

function tickScheduler(){
  if (!actx || !isPlaying) return;
  const ahead = actx.currentTime + 0.18;
  while (nextBarTime < ahead){
    scheduleBar(barCount, nextBarTime);
    nextBarTime += BAR;
    barCount++;
  }
  scheduleHandle = setTimeout(tickScheduler, 60);
}

// ── PLAY CONTROL ──────────────────────────────────────────────────────
const playBtn = document.getElementById('playBtn');
const muteBtn = document.getElementById('muteBtn');
playBtn.addEventListener('click', () => {
  userGestured = true;
  if (!ensureAudio()) return;
  if (!isPlaying){
    songStartTime = actx.currentTime + 0.2;
    nextBarTime = songStartTime;
    barCount = 0;
    isPlaying = true;
    playBtn.textContent = '■ STOP';
    tickScheduler();
    // sync the CSS sway animation to the bar tempo (full sway = 1 beat)
    document.documentElement.style.setProperty('--swayDur', BEAT + 's');
    for (const d of document.querySelectorAll('.dancer')){
      d.style.animationDuration = BEAT + 's';
    }
  } else {
    isPlaying = false;
    clearTimeout(scheduleHandle);
    playBtn.textContent = '▶ DANCE';
  }
});
muteBtn.addEventListener('click', () => {
  muted = !muted;
  muteBtn.textContent = muted ? '♪ OFF' : '♪ ON';
  if (masterGain && actx) masterGain.gain.value = muted ? 0 : 0.6;
});

// ── BEAT-DRIVEN VISUAL FX ─────────────────────────────────────────────
const chantEl = document.getElementById('chant');
// ALL CHANT + VERSE LINES BELOW ARE ORIGINAL — written for this app.
// They're silly food-pun nonsense in the Weird-Al spirit (silly tribute
// content) but do NOT quote, paraphrase, or derive from any actual song's
// lyrics. The melody is also fully original procedural synthesis.
const CHANT_WORDS = [
  'MELT!', 'DRIP!', 'GLAZE!', 'BOUNCE!', 'WIGGLE!', 'CHEW!',
  'STIR!', 'WHISK!', 'DIP!', 'CRUNCH!', 'SQUISH!', 'POP!',
];
const VERSE_LINES = [
  'wiggle like a nougat in the noonday sun',
  'two-step in a taffy hail · everybody run',
  'glazed and giddy, dipped and dizzy',
  'i\'m a little caramel cube, watch me square-dance',
  'jiggly as a gelatin, twice as nutritious',
  'butterscotch heartbeat, marzipan toes',
  'stir me with a wooden spoon · don\'t spill the kettle',
  'sticky feet, sticky hands, sticky sticky chandeliers',
  'we\'re all just sugar in a saucepan, baby',
  'fold the fudge, flip the praline, spin the brittle plate',
  'every fondant has its day · today is yours',
  'melt your heart, melt your shoes, melt the dance floor',
];
const verseBarEl = document.getElementById('verseBar');
const verseLineEl = document.getElementById('verseLine');
let lastVerseBar = -1;
let lastBeatPulsed = -1;
let lastDownbeatBar = -1;

const beatVal = document.getElementById('beatVal');
const barVal = document.getElementById('barVal');

function spawnConfetti(){
  const layer = document.getElementById('confetti');
  for (let i = 0; i < 22; i++){
    const c = document.createElement('div');
    c.className = 'conf';
    const colors = ['#ff5fb2', '#45e7ff', '#ffe156', '#c4ff52', '#b07cff', '#ff8c3a', '#ff2dd7'];
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.left = (5 + Math.random() * 90) + '%';
    c.style.animationDuration = (3 + Math.random() * 2) + 's';
    c.style.animationDelay = (Math.random() * 0.4) + 's';
    layer.appendChild(c);
    setTimeout(() => c.remove(), 5500);
  }
}

function visualTick(){
  if (isPlaying && actx){
    const elapsed = actx.currentTime - songStartTime;
    const beats = elapsed / BEAT;
    const bar = Math.floor(beats / 4);
    const beat = Math.floor(beats % 4) + 1;
    beatVal.textContent = beat;
    barVal.textContent = String(bar % 100).padStart(2, '0');
    const beatIdx = Math.floor(beats);
    if (beatIdx !== lastBeatPulsed && beatIdx >= 0){
      lastBeatPulsed = beatIdx;
      // pop the chant on every downbeat
      if (beatIdx % 4 === 0){
        chantEl.textContent = CHANT_WORDS[Math.floor(Math.random() * CHANT_WORDS.length)];
        chantEl.classList.remove('flash');
        void chantEl.offsetWidth;
        chantEl.classList.add('flash');
      }
      // disco beams sweep on every beat
      const ang = (beatIdx % 4) * 22 - 33;
      const baseAng = (beatIdx % 8) * 6;
      const b1 = document.getElementById('beam1');
      const b2 = document.getElementById('beam2');
      const b3 = document.getElementById('beam3');
      b1.style.transform = 'translateX(-50%) rotate(' + (-22 + baseAng) + 'deg)';
      b2.style.transform = 'translateX(-50%) rotate(' + (0   + baseAng) + 'deg)';
      b3.style.transform = 'translateX(-50%) rotate(' + (22  + baseAng) + 'deg)';
    }
    if (bar !== lastDownbeatBar && bar > 0 && bar % 4 === 0){
      lastDownbeatBar = bar;
      spawnConfetti();
    }
    // rotate the karaoke verse every 2 bars
    if (bar !== lastVerseBar && bar % 2 === 0){
      lastVerseBar = bar;
      const line = VERSE_LINES[Math.floor(bar / 2) % VERSE_LINES.length];
      // swap element so the versePop keyframe re-runs
      const fresh = document.createElement('span');
      fresh.className = 'verse';
      fresh.textContent = line;
      verseLineEl.replaceWith(fresh);
      fresh.id = 'verseLine';
      window._verseLineEl = fresh;
    }
    // karaoke pulse — the active verse syllable pulses yellow on each beat
    const cur = document.getElementById('verseLine');
    if (cur){
      const pulseOn = (Math.floor(beats * 2) % 2) === 0;
      cur.style.color = pulseOn ? '#fff' : 'var(--yellow)';
    }
  } else {
    beatVal.textContent = '-';
    barVal.textContent = '--';
  }
  requestAnimationFrame(visualTick);
}
requestAnimationFrame(visualTick);
</script>
