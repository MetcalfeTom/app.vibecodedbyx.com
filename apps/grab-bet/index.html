<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grab Bet</title>
  <link rel="icon" href="https://emojicdn.elk.sh/🛵">
  <meta property="og:title" content="Grab Bet">
  <meta property="og:description" content="Bet on delivery times through Bangkok traffic chaos. Will the rider make it?">
  <meta property="og:url" content="https://sloppy.live/grab-bet">
  <meta property="og:image" content="https://emojicdn.elk.sh/🛵?style=google">
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    :root{
      --bg:#0c1117;--green:#00b14f;--green-dim:rgba(0,177,79,0.15);
      --red:#e74c3c;--gold:#f1c40f;--cyan:#00d4ff;
      --panel:rgba(12,17,23,0.95);--card:rgba(20,28,38,0.9);
      --text:#c8d6e5;--dim:rgba(200,214,229,0.4);
      --border:rgba(0,177,79,0.15);
    }
    body{background:var(--bg);color:var(--text);font-family:'Chakra Petch',sans-serif;min-height:100dvh;overflow-x:hidden}

    header{
      background:var(--green);padding:10px 16px;
      display:flex;align-items:center;justify-content:space-between;
      position:sticky;top:0;z-index:20;
    }
    .logo{font-weight:700;font-size:clamp(16px,4vw,22px);color:#fff;letter-spacing:1px}
    .logo span{font-weight:300;opacity:0.7}
    .coins-display{
      font-family:'JetBrains Mono',monospace;font-size:14px;font-weight:700;
      color:#fff;background:rgba(0,0,0,0.2);padding:4px 12px;border-radius:20px;
    }

    .container{max-width:520px;margin:0 auto;padding:12px 14px 80px}

    /* Delivery card */
    .delivery-card{
      background:var(--card);border:1px solid var(--border);
      padding:16px;margin-bottom:14px;border-radius:4px;
    }
    .dc-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
    .dc-route{font-weight:700;font-size:clamp(14px,3vw,18px);color:#fff;line-height:1.3}
    .dc-route small{font-weight:300;font-size:0.7em;color:var(--dim);display:block}
    .dc-distance{
      font-family:'JetBrains Mono',monospace;font-size:11px;
      color:var(--cyan);padding:3px 8px;border:1px solid rgba(0,212,255,0.2);
      white-space:nowrap;
    }

    .dc-conditions{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px}
    .condition-tag{
      font-size:11px;padding:3px 8px;border-radius:2px;
      background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);
      color:var(--dim);
    }
    .condition-tag.bad{border-color:rgba(231,76,60,0.3);color:var(--red)}
    .condition-tag.good{border-color:rgba(0,177,79,0.3);color:var(--green)}

    .dc-estimate{
      font-family:'JetBrains Mono',monospace;font-size:13px;
      color:var(--dim);margin-bottom:14px;
    }
    .dc-estimate span{color:var(--cyan);font-weight:700}

    /* Bet options */
    .bet-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
    .bet-btn{
      font-family:'Chakra Petch',sans-serif;font-weight:700;
      font-size:13px;padding:10px 8px;
      background:rgba(255,255,255,0.03);border:1px solid var(--border);
      color:var(--text);cursor:pointer;text-align:center;transition:all 0.15s;
      border-radius:2px;
    }
    .bet-btn:hover{border-color:var(--green);background:var(--green-dim)}
    .bet-btn .odds{
      font-family:'JetBrains Mono',monospace;font-size:11px;
      color:var(--gold);display:block;margin-top:2px;
    }
    .bet-btn:disabled{opacity:0.3;cursor:not-allowed}
    .bet-btn.selected{border-color:var(--green);background:var(--green-dim);color:var(--green)}

    /* Wager */
    .wager-row{display:flex;align-items:center;gap:8px;margin-bottom:12px}
    .wager-label{font-size:12px;color:var(--dim);white-space:nowrap}
    .wager-btns{display:flex;gap:4px;flex-wrap:wrap}
    .wager-btn{
      font-family:'JetBrains Mono',monospace;font-size:11px;
      padding:4px 10px;background:rgba(255,255,255,0.04);
      border:1px solid rgba(255,255,255,0.1);color:var(--text);cursor:pointer;
      border-radius:2px;transition:all 0.1s;
    }
    .wager-btn:hover{border-color:var(--gold);color:var(--gold)}
    .wager-btn.active{border-color:var(--gold);background:rgba(241,196,15,0.1);color:var(--gold)}

    .place-bet{
      width:100%;font-family:'Chakra Petch',sans-serif;font-weight:700;
      font-size:15px;padding:12px;background:var(--green);border:none;
      color:#fff;cursor:pointer;letter-spacing:1px;border-radius:2px;
      transition:all 0.15s;
    }
    .place-bet:hover{filter:brightness(1.1)}
    .place-bet:disabled{opacity:0.3;cursor:not-allowed}

    /* Simulation */
    .sim-area{
      display:none;background:var(--card);border:1px solid var(--border);
      padding:16px;margin-bottom:14px;border-radius:4px;
    }
    .sim-area.active{display:block}
    .sim-header{font-weight:700;font-size:14px;color:var(--cyan);margin-bottom:10px}
    .sim-progress{
      height:6px;background:rgba(255,255,255,0.05);margin-bottom:8px;
      border-radius:3px;overflow:hidden;
    }
    .sim-bar{height:100%;background:var(--green);transition:width 0.3s;border-radius:3px}
    .sim-log{
      font-family:'JetBrains Mono',monospace;font-size:11px;
      color:var(--dim);line-height:1.7;max-height:140px;overflow-y:auto;
    }
    .sim-log .event{margin-bottom:2px}
    .sim-log .event.bad{color:var(--red)}
    .sim-log .event.good{color:var(--green)}
    .sim-log .event.neutral{color:var(--cyan)}

    /* Result */
    .result-card{
      display:none;background:var(--card);border:1px solid var(--border);
      padding:20px;margin-bottom:14px;text-align:center;border-radius:4px;
    }
    .result-card.active{display:block}
    .result-outcome{font-weight:700;font-size:clamp(20px,5vw,28px);margin-bottom:4px}
    .result-outcome.win{color:var(--green)}
    .result-outcome.lose{color:var(--red)}
    .result-time{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--cyan);margin-bottom:8px}
    .result-payout{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:700;margin-bottom:12px}
    .result-payout.win{color:var(--gold)}
    .result-payout.lose{color:var(--red)}
    .next-btn{
      font-family:'Chakra Petch',sans-serif;font-weight:700;
      font-size:14px;padding:10px 28px;background:var(--green);
      border:none;color:#fff;cursor:pointer;border-radius:2px;
    }
    .next-btn:hover{filter:brightness(1.1)}

    /* Leaderboard */
    .lb-btn{
      display:block;width:100%;font-family:'Chakra Petch',sans-serif;
      font-size:13px;font-weight:500;padding:10px;
      background:rgba(255,255,255,0.03);border:1px solid var(--border);
      color:var(--dim);cursor:pointer;text-align:center;margin-bottom:14px;
      border-radius:2px;
    }
    .lb-btn:hover{border-color:var(--green);color:var(--green)}
    .lb-panel{display:none;margin-bottom:14px}
    .lb-panel.visible{display:block}
    .lb-row{
      display:flex;justify-content:space-between;padding:6px 0;
      border-bottom:1px solid rgba(255,255,255,0.04);font-size:13px;
    }
    .lb-rank{width:28px;font-weight:700;color:var(--green)}
    .lb-rank.g{color:#ffd700}.lb-rank.s{color:#c0c0c0}.lb-rank.b{color:#cd7f32}
    .lb-name{flex:1;color:var(--dim);overflow:hidden;text-overflow:ellipsis}
    .lb-coins{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--gold);min-width:60px;text-align:right}

    .stats-row{
      display:flex;justify-content:space-around;padding:10px 0;margin-bottom:14px;
      border-top:1px solid var(--border);border-bottom:1px solid var(--border);
    }
    .stat-item{text-align:center}
    .stat-val{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:16px;color:var(--green)}
    .stat-label{font-size:10px;color:var(--dim);margin-top:2px}

    .name-row{
      display:flex;align-items:center;justify-content:center;gap:8px;
      margin-bottom:14px;font-size:12px;color:var(--dim);
    }
    .name-row label{white-space:nowrap}
    .name-input{
      font-family:'JetBrains Mono',monospace;font-size:12px;
      background:rgba(255,255,255,0.04);border:1px solid var(--border);
      color:var(--text);padding:4px 10px;width:130px;border-radius:2px;
      outline:none;transition:border-color 0.2s;
    }
    .name-input:focus{border-color:var(--green)}
    .name-save{
      font-family:'JetBrains Mono',monospace;font-size:10px;
      padding:4px 10px;background:var(--green);border:none;
      color:#fff;cursor:pointer;border-radius:2px;opacity:0;
      transition:opacity 0.2s;pointer-events:none;
    }
    .name-save.visible{opacity:1;pointer-events:auto}
    .name-saved{font-size:10px;color:var(--green);opacity:0;transition:opacity 0.3s}
    .name-saved.show{opacity:1}

    .backlink{
      position:fixed;bottom:6px;left:50%;transform:translateX(-50%);
      font-size:11px;color:rgba(0,177,79,0.2);text-decoration:none;z-index:100;
    }
    .backlink:hover{color:rgba(0,177,79,0.5)}
  </style>
</head>
<body>
  <header>
    <div class="logo">GrabBet <span>Delivery Chaos</span></div>
    <div class="coins-display" id="coins-hud">🪙 500</div>
  </header>

  <div class="container">
    <div class="stats-row">
      <div class="stat-item"><div class="stat-val" id="stat-wins">0</div><div class="stat-label">Wins</div></div>
      <div class="stat-item"><div class="stat-val" id="stat-losses">0</div><div class="stat-label">Losses</div></div>
      <div class="stat-item"><div class="stat-val" id="stat-streak">0</div><div class="stat-label">Streak</div></div>
    </div>

    <div class="name-row">
      <label>Name:</label>
      <input class="name-input" id="name-input" type="text" maxlength="20" placeholder="Anon" spellcheck="false">
      <button class="name-save" id="name-save" onclick="saveName()">Save</button>
      <span class="name-saved" id="name-saved">✓</span>
    </div>

    <!-- Delivery card (betting phase) -->
    <div class="delivery-card" id="bet-card">
      <div class="dc-header">
        <div class="dc-route" id="dc-route">Loading route...</div>
        <div class="dc-distance" id="dc-distance">--km</div>
      </div>
      <div class="dc-conditions" id="dc-conditions"></div>
      <div class="dc-estimate" id="dc-estimate">Est. delivery: <span>--</span> min</div>

      <div class="bet-options" id="bet-options"></div>

      <div class="wager-row">
        <div class="wager-label">Wager:</div>
        <div class="wager-btns" id="wager-btns"></div>
      </div>

      <button class="place-bet" id="place-bet-btn" disabled onclick="placeBet()">PLACE BET</button>
    </div>

    <!-- Simulation -->
    <div class="sim-area" id="sim-area">
      <div class="sim-header" id="sim-header">🛵 Rider en route...</div>
      <div class="sim-progress"><div class="sim-bar" id="sim-bar" style="width:0%"></div></div>
      <div class="sim-log" id="sim-log"></div>
    </div>

    <!-- Result -->
    <div class="result-card" id="result-card">
      <div class="result-outcome" id="result-outcome"></div>
      <div class="result-time" id="result-time"></div>
      <div class="result-payout" id="result-payout"></div>
      <button class="next-btn" onclick="nextDelivery()">Next Delivery</button>
    </div>

    <button class="lb-btn" onclick="toggleLB()">📊 Leaderboard</button>
    <div class="lb-panel" id="lb-panel">
      <div id="lb-list"></div>
    </div>
  </div>

  <a class="backlink" href="https://sloppy.live" target="_blank">sloppy.live</a>

  <script type="module">
    import supabase, { supabaseSession } from './supabase-config.js';

    // ─── Auth ───
    let userId = null, username = 'Anon';
    async function initAuth() {
      try {
        const s = await supabaseSession();
        userId = s.user.id;
        try {
          const stored = localStorage.getItem('sloppy-profile');
          if (stored) { const p = JSON.parse(stored); if (p.username) username = p.username; }
        } catch(_) {}
        if (username === 'Anon') {
          try {
            const { data } = await supabase.from('sloppygram_profiles').select('username').eq('user_id', userId).limit(1);
            if (data?.[0]?.username) username = data[0].username;
          } catch(_) {}
        }
        // Also check grab_bet_scores for a saved username
        if (username === 'Anon') {
          try {
            const { data: saved } = await supabase.from('grab_bet_scores').select('username').eq('user_id', userId).limit(1);
            if (saved?.[0]?.username && saved[0].username !== 'Anon') username = saved[0].username;
          } catch(_) {}
        }
        await loadStats();
        document.getElementById('name-input').value = username === 'Anon' ? '' : username;
      } catch(e) { console.error('Auth:', e); }
    }

    async function loadStats() {
      if (!userId) return;
      const { data } = await supabase.from('grab_bet_scores').select('*').eq('user_id', userId).limit(1);
      if (data?.[0]) {
        coins = data[0].coins || 500;
        betsWon = data[0].bets_won || 0;
        betsLost = data[0].bets_lost || 0;
        bestStreak = data[0].best_streak || 0;
      }
      updateHUD();
    }

    async function saveStats() {
      if (!userId) return;
      const fields = { username, coins, bets_won: betsWon, bets_lost: betsLost, best_streak: bestStreak };
      const { data: existing } = await supabase.from('grab_bet_scores').select('user_id').eq('user_id', userId).limit(1);
      if (existing?.length > 0) {
        await supabase.from('grab_bet_scores').update(fields).eq('user_id', userId);
      } else {
        await supabase.from('grab_bet_scores').insert({ user_id: userId, ...fields });
      }
    }

    async function fetchLB() {
      const { data } = await supabase.from('grab_bet_scores').select('username, coins, bets_won, best_streak')
        .order('coins', { ascending: false }).limit(10);
      return data || [];
    }

    // ─── Game State ───
    let coins = 500;
    let betsWon = 0, betsLost = 0, streak = 0, bestStreak = 0;
    let selectedBet = null, selectedWager = 50;
    let currentDelivery = null;

    // ─── Data ───
    const RESTAURANTS = [
      'Som Tam Jay So', 'Pad Thai Thip Samai', 'Raan Jay Fai', 'Kuay Teow Reua',
      'MK Suki', 'Bonchon Chicken', 'McDonald\'s Silom', 'Pizza Hut Asok',
      'Khao Man Gai Pratunam', 'Somboon Seafood', 'After You Dessert',
      'Burger King Siam', 'Café Amazon', 'S&P Restaurant', 'Cabbages & Condoms',
      'Jeh O Chula', 'Phed Phed', 'Mango Tango', 'CoCo Ichibanya', 'Ootoya',
    ];

    const AREAS = [
      'Silom', 'Sukhumvit', 'Siam', 'Asok', 'Thonglor', 'Ekkamai', 'Sathorn',
      'Ratchathewi', 'Phaya Thai', 'Ari', 'Chatuchak', 'Bang Na', 'On Nut',
      'Pratunam', 'Khlong Toei', 'Phra Khanong', 'Lat Phrao', 'Huai Khwang',
      'Rama 9', 'Din Daeng', 'Saphan Khwai', 'Victory Monument',
    ];

    const CONDITIONS_POOL = [
      { text: '🌧 Heavy rain', impact: 1.5, bad: true },
      { text: '🚗 Rush hour', impact: 1.4, bad: true },
      { text: '🏗 Road construction', impact: 1.3, bad: true },
      { text: '🎉 Festival traffic', impact: 1.3, bad: true },
      { text: '🛑 Protest route', impact: 1.6, bad: true },
      { text: '💧 Flooded soi', impact: 1.7, bad: true },
      { text: '🐘 Elephant on road', impact: 1.2, bad: true },
      { text: '🛺 Tuk-tuk blockade', impact: 1.2, bad: true },
      { text: '🐕 Soi dog pack', impact: 1.1, bad: true },
      { text: '🏍 Motorbike race', impact: 1.3, bad: true },
      { text: '☀️ Clear skies', impact: 0.9, bad: false },
      { text: '🌙 Late night (empty roads)', impact: 0.7, bad: false },
      { text: '🛣 Expressway open', impact: 0.8, bad: false },
      { text: '🏎 Experienced rider', impact: 0.85, bad: false },
      { text: '📍 Short route', impact: 0.8, bad: false },
    ];

    const SIM_EVENTS_DELAY = [
      { text: '🛵 Rider stuck behind a bus...', delay: 2 },
      { text: '🌧 Sudden downpour! Slowing down...', delay: 3 },
      { text: '🚦 Red light... longest one in Bangkok...', delay: 2 },
      { text: '🐕 Soi dogs chasing the rider!', delay: 1 },
      { text: '🏗 Detour around construction...', delay: 3 },
      { text: '🛺 Stuck behind a slow tuk-tuk...', delay: 2 },
      { text: '💧 Riding through a flooded soi...', delay: 3 },
      { text: '📱 Rider checking GPS... wrong turn!', delay: 2 },
      { text: '🎉 Festival crowd blocking the road...', delay: 3 },
      { text: '🐘 Wait... is that an elephant?!', delay: 4 },
      { text: '🏍 Nearly crashed! Close call...', delay: 1 },
      { text: '🛑 Police checkpoint ahead...', delay: 2 },
      { text: '🍜 Rider stopped to grab a snack...', delay: 3 },
    ];

    const SIM_EVENTS_SPEED = [
      { text: '🛣 Found a shortcut through the soi!', speed: -2 },
      { text: '💨 Clear stretch — full throttle!', speed: -2 },
      { text: '🏎 Rider weaving through traffic!', speed: -1 },
      { text: '🟢 Green light streak!', speed: -2 },
      { text: '📍 Almost there!', speed: -1 },
    ];

    function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

    // ─── Generate Delivery ───
    function generateDelivery() {
      const restaurant = pick(RESTAURANTS);
      const from = pick(AREAS);
      let to = pick(AREAS);
      while (to === from) to = pick(AREAS);

      const baseDist = 2 + Math.random() * 12;
      const distance = Math.round(baseDist * 10) / 10;
      const baseTime = distance * 2.5 + 5;

      // Pick 2-4 conditions
      const numConditions = 2 + Math.floor(Math.random() * 3);
      const shuffled = [...CONDITIONS_POOL].sort(() => Math.random() - 0.5);
      const conditions = shuffled.slice(0, numConditions);

      let multiplier = 1;
      conditions.forEach(c => multiplier *= c.impact);

      const estimatedTime = Math.round(baseTime * multiplier);
      // Actual time will vary from estimate
      const variance = 0.7 + Math.random() * 0.6; // 0.7x to 1.3x of estimate
      const actualTime = Math.round(estimatedTime * variance);

      return {
        restaurant, from, to, distance, conditions,
        estimatedTime, actualTime, multiplier,
      };
    }

    function generateBetOptions(delivery) {
      const est = delivery.estimatedTime;
      const fast = Math.max(5, Math.round(est * 0.7));
      const onTime = est;
      const late = Math.round(est * 1.3);
      const chaos = Math.round(est * 1.7);

      // Odds based on likelihood
      return [
        { label: `Under ${fast} min`, key: 'fast', check: t => t < fast, odds: 3.5 },
        { label: `${fast}-${onTime} min`, key: 'ontime', check: t => t >= fast && t <= onTime, odds: 1.8 },
        { label: `${onTime+1}-${late} min`, key: 'late', check: t => t > onTime && t <= late, odds: 2.2 },
        { label: `Over ${late} min`, key: 'chaos', check: t => t > late, odds: 2.8 },
      ];
    }

    // ─── UI ───
    function updateHUD() {
      document.getElementById('coins-hud').textContent = `🪙 ${coins}`;
      document.getElementById('stat-wins').textContent = betsWon;
      document.getElementById('stat-losses').textContent = betsLost;
      document.getElementById('stat-streak').textContent = streak;
    }

    function showBetCard() {
      currentDelivery = generateDelivery();
      const d = currentDelivery;

      document.getElementById('dc-route').innerHTML =
        `${d.restaurant}<small>${d.from} → ${d.to}</small>`;
      document.getElementById('dc-distance').textContent = `${d.distance}km`;
      document.getElementById('dc-estimate').innerHTML =
        `Est. delivery: <span>${d.estimatedTime}</span> min`;

      // Conditions
      const condEl = document.getElementById('dc-conditions');
      condEl.innerHTML = d.conditions.map(c =>
        `<span class="condition-tag ${c.bad ? 'bad' : 'good'}">${c.text}</span>`
      ).join('');

      // Bet options
      const options = generateBetOptions(d);
      currentDelivery.betOptions = options;
      const optEl = document.getElementById('bet-options');
      optEl.innerHTML = options.map((o, i) =>
        `<button class="bet-btn" data-idx="${i}" onclick="selectBet(${i})">${o.label}<span class="odds">x${o.odds}</span></button>`
      ).join('');

      // Wager buttons
      const wagers = [25, 50, 100, 250];
      document.getElementById('wager-btns').innerHTML = wagers.map(w =>
        `<button class="wager-btn ${w === selectedWager ? 'active' : ''}" ${w > coins ? 'disabled' : ''} onclick="selectWager(${w})">${w}</button>`
      ).join('');

      selectedBet = null;
      document.getElementById('place-bet-btn').disabled = true;
      document.getElementById('bet-card').style.display = '';
      document.getElementById('sim-area').classList.remove('active');
      document.getElementById('result-card').classList.remove('active');
    }

    window.selectBet = function(idx) {
      selectedBet = idx;
      document.querySelectorAll('.bet-btn').forEach((b, i) => {
        b.classList.toggle('selected', i === idx);
      });
      document.getElementById('place-bet-btn').disabled = false;
    };

    window.selectWager = function(w) {
      if (w > coins) return;
      selectedWager = w;
      document.querySelectorAll('.wager-btn').forEach(b => {
        b.classList.toggle('active', parseInt(b.textContent) === w);
      });
    };

    window.placeBet = function() {
      if (selectedBet === null || selectedWager > coins) return;
      coins -= selectedWager;
      updateHUD();
      document.getElementById('bet-card').style.display = 'none';
      runSimulation();
    };

    // ─── Simulation ───
    async function runSimulation() {
      const simArea = document.getElementById('sim-area');
      const simBar = document.getElementById('sim-bar');
      const simLog = document.getElementById('sim-log');
      const simHeader = document.getElementById('sim-header');

      simArea.classList.add('active');
      simBar.style.width = '0%';
      simLog.innerHTML = '';
      simHeader.textContent = '🛵 Rider en route...';

      const d = currentDelivery;
      const totalSteps = 8 + Math.floor(Math.random() * 5);
      let elapsed = 0;
      const timePerStep = d.actualTime / totalSteps;

      for (let step = 0; step < totalSteps; step++) {
        await sleep(600 + Math.random() * 800);

        const progress = ((step + 1) / totalSteps) * 100;
        simBar.style.width = progress + '%';

        // Random event
        if (Math.random() < 0.5) {
          const isDelay = Math.random() < 0.6;
          if (isDelay) {
            const ev = pick(SIM_EVENTS_DELAY);
            addLog(simLog, ev.text, 'bad');
            elapsed += ev.delay;
          } else {
            const ev = pick(SIM_EVENTS_SPEED);
            addLog(simLog, ev.text, 'good');
            elapsed += ev.speed;
          }
        } else {
          const km = ((step + 1) / totalSteps * d.distance).toFixed(1);
          addLog(simLog, `📍 ${km}km covered...`, 'neutral');
        }

        elapsed += timePerStep;
      }

      // Final
      simBar.style.width = '100%';
      simHeader.textContent = '📦 Delivered!';
      addLog(simLog, `✅ Order delivered in ${d.actualTime} min`, 'good');

      await sleep(800);
      showResult();
    }

    function addLog(el, text, cls) {
      const div = document.createElement('div');
      div.className = `event ${cls}`;
      div.textContent = text;
      el.appendChild(div);
      el.scrollTop = el.scrollHeight;
    }

    function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

    // ─── Result ───
    function showResult() {
      const d = currentDelivery;
      const option = d.betOptions[selectedBet];
      const won = option.check(d.actualTime);

      const resultCard = document.getElementById('result-card');
      const outcomeEl = document.getElementById('result-outcome');
      const timeEl = document.getElementById('result-time');
      const payoutEl = document.getElementById('result-payout');

      if (won) {
        const payout = Math.round(selectedWager * option.odds);
        coins += payout;
        betsWon++;
        streak++;
        if (streak > bestStreak) bestStreak = streak;
        outcomeEl.textContent = '🎉 YOU WIN!';
        outcomeEl.className = 'result-outcome win';
        payoutEl.textContent = `+${payout} coins`;
        payoutEl.className = 'result-payout win';
      } else {
        betsLost++;
        streak = 0;
        outcomeEl.textContent = '💀 YOU LOSE';
        outcomeEl.className = 'result-outcome lose';
        payoutEl.textContent = `-${selectedWager} coins`;
        payoutEl.className = 'result-payout lose';
      }

      timeEl.textContent = `Actual: ${d.actualTime} min | Bet: ${option.label}`;

      // Bankrupt check
      if (coins <= 0) {
        coins = 500;
        payoutEl.textContent += ' (Bankrupt! Reset to 500)';
      }

      updateHUD();
      saveStats();
      resultCard.classList.add('active');
    }

    window.nextDelivery = function() {
      showBetCard();
    };

    // ─── Leaderboard ───
    window.toggleLB = async function() {
      const panel = document.getElementById('lb-panel');
      if (panel.classList.contains('visible')) {
        panel.classList.remove('visible');
        return;
      }
      panel.classList.add('visible');
      const data = await fetchLB();
      const el = document.getElementById('lb-list');
      if (!data.length) {
        el.innerHTML = '<div style="text-align:center;color:var(--dim);padding:12px;font-size:12px">No bets placed yet!</div>';
        return;
      }
      el.innerHTML = data.map((r, i) => {
        const rc = i === 0 ? 'g' : i === 1 ? 's' : i === 2 ? 'b' : '';
        const medal = i < 3 ? ['🥇','🥈','🥉'][i] : `${i+1}`;
        return `<div class="lb-row"><span class="lb-rank ${rc}">${medal}</span><span class="lb-name">${esc(r.username || 'Anon')} (${r.bets_won}W)</span><span class="lb-coins">🪙${r.coins}</span></div>`;
      }).join('');
    };

    function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

    // ─── Name Input ───
    const nameInput = document.getElementById('name-input');
    const nameSaveBtn = document.getElementById('name-save');
    const nameSavedEl = document.getElementById('name-saved');

    nameInput.addEventListener('input', () => {
      const val = nameInput.value.trim();
      const changed = val && val !== username && val !== 'Anon';
      nameSaveBtn.classList.toggle('visible', changed);
      nameSavedEl.classList.remove('show');
    });
    nameInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') saveName();
    });

    window.saveName = function() {
      const val = nameInput.value.trim().slice(0, 20);
      if (!val || val === username) return;
      username = val;
      nameSaveBtn.classList.remove('visible');
      nameSavedEl.classList.add('show');
      setTimeout(() => nameSavedEl.classList.remove('show'), 2000);
      saveStats();
    };

    // ─── Init ───
    await initAuth();
    updateHUD();
    showBetCard();
  </script>
</body>
</html>
