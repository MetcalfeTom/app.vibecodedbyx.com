<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Coin Toss · realistic 3D flip with bounce physics</title>
<meta name="description" content="A high-quality golden coin tumbles through real physics: gravity, angular momentum, bouncing, settling. Click to flip. Click again. Forever.">
<meta property="og:title" content="Coin Toss · 3D golden coin">
<meta property="og:description" content="Click to flip a hand-modeled gold coin. Watch it tumble, bounce, and settle with realistic physics. Heads or tails — fairly.">
<meta property="og:image" content="https://image.pollinations.ai/prompt/3D%20gold%20coin%20mid-flip%20on%20a%20dark%20marble%20surface%2C%20cinematic%20studio%20lighting%2C%20motion%20blur%2C%20engraved%20laurel%20wreath%20relief%2C%20editorial%20product%20render?width=1200&height=630&model=flux&nologo=true&seed=1888">
<meta property="og:url" content="https://sloppy.live/coin-toss">

<link rel="icon" href="https://emojicdn.elk.sh/🪙">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Cormorant+Garamond:ital,wght@1,400;0,500&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-1:    #1a1614;
    --bg-2:    #0e0a08;
    --ink:     #f0e8d8;
    --ink-dim: #8a7e6a;
    --gold:    #d4a83a;
    --gold-hi: #f5d878;
    --gold-dk: #6a4e10;
    --heads:   #f5d878;
    --tails:   #b8c0d0;
  }
  *{ box-sizing: border-box; margin: 0; padding: 0; }
  html, body{ background: var(--bg-2); color: var(--ink); height: 100vh; overflow: hidden; }
  body{
    font-family: 'Cormorant Garamond', Georgia, serif;
    display: flex; flex-direction: column;
    align-items: center;
    padding: 12px 12px 0;
  }
  /* Top bar */
  .top{
    width: 100%; max-width: 1100px;
    display: flex; align-items: baseline; gap: 18px; flex-wrap: wrap;
    padding: 4px 8px 0;
  }
  .top h1{
    font-family: 'Cinzel', serif;
    font-size: clamp(20px, 2.8vw, 28px);
    color: var(--gold-hi);
    letter-spacing: 0.14em;
    line-height: 1;
    text-shadow: 0 1px 0 #000, 0 0 10px rgba(213,168,58,0.25);
    font-weight: 700;
  }
  .top h1 em{
    color: var(--ink);
    font-style: italic;
    font-family: 'Cormorant Garamond', serif;
    font-size: 0.62em;
    font-weight: 400;
    letter-spacing: 0.04em;
    margin-left: 6px;
  }
  .top .stats{
    margin-left: auto;
    display: flex; gap: 18px;
    font: 14px 'JetBrains Mono', monospace;
    color: var(--ink-dim);
  }
  .top .stats .val{
    font-family: 'Cinzel', serif;
    font-size: 18px; font-weight: 700;
    color: var(--ink);
    margin-left: 4px;
  }
  .top .stats .val.heads{ color: var(--heads); }
  .top .stats .val.tails{ color: var(--tails); }
  .top .stats .val.streak{ color: var(--gold-hi); }
  /* Stage */
  .stage{
    position: relative;
    width: 100%;
    max-width: 1100px;
    flex: 1;
    margin-top: 10px;
    border-radius: 12px;
    overflow: hidden;
    background:
      radial-gradient(ellipse 80% 60% at 50% 35%, #2a2218, #0a0604 80%);
    box-shadow:
      0 0 0 4px #2a1f14,
      0 18px 40px rgba(0,0,0,0.7),
      inset 0 0 80px rgba(60,40,20,0.3);
    cursor: pointer;
  }
  canvas#cv{
    display: block;
    width: 100%; height: 100%;
  }
  /* Result overlay (big HEADS/TAILS verdict) */
  #result{
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
    z-index: 3;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #result.show{ opacity: 1; }
  #result .verdict{
    font-family: 'Cinzel', serif;
    font-size: clamp(56px, 9vw, 110px);
    font-weight: 900;
    letter-spacing: 0.06em;
    line-height: 1;
    text-shadow:
      0 4px 0 rgba(0,0,0,0.55),
      0 0 28px rgba(213,168,58,0.5);
    animation: verdictPop 0.5s cubic-bezier(0.2, 0.85, 0.35, 1.1);
  }
  #result.heads .verdict{ color: var(--heads); }
  #result.tails .verdict{ color: var(--tails); }
  @keyframes verdictPop{
    0%   { transform: scale(0.4); opacity: 0; }
    60%  { transform: scale(1.1); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  /* "Click to flip" prompt */
  #prompt{
    position: absolute;
    bottom: 22px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Cinzel', serif;
    font-size: 14px;
    color: var(--ink-dim);
    letter-spacing: 0.32em;
    text-transform: uppercase;
    z-index: 3;
    pointer-events: none;
    animation: promptPulse 2.4s ease-in-out infinite;
  }
  @keyframes promptPulse{
    0%, 100%{ opacity: 0.35; }
    50%     { opacity: 0.85; }
  }
  #prompt.hidden{ display: none; }
  /* Audio toggle in corner */
  .audio-toggle{
    position: absolute;
    top: 14px; right: 14px;
    z-index: 4;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(213,168,58,0.3);
    color: var(--gold-hi);
    padding: 6px 12px;
    font: 12px 'JetBrains Mono', monospace;
    letter-spacing: 0.06em;
    border-radius: 4px;
    cursor: pointer;
  }
  .audio-toggle:hover{ background: rgba(60,40,20,0.6); }
  .audio-toggle.off{ color: var(--ink-dim); border-color: rgba(255,255,255,0.1); }
  /* Footer hint */
  .footer{
    margin-top: 6px;
    padding: 6px 12px;
    font: italic 13px 'Cormorant Garamond', serif;
    color: var(--ink-dim);
    text-align: center;
  }
  .footer kbd{
    background: rgba(213,168,58,0.1);
    border: 1px solid rgba(213,168,58,0.25);
    border-bottom-width: 2px;
    border-radius: 3px;
    padding: 0 6px;
    font: 11px 'JetBrains Mono', monospace;
    font-style: normal;
    color: var(--gold-hi);
  }
  /* Loading state */
  #loading{
    position: absolute;
    inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(10,6,4,0.85);
    z-index: 5;
    font: italic 16px 'Cormorant Garamond', serif;
    color: var(--gold-hi);
    transition: opacity 0.3s;
  }
  #loading.hidden{ opacity: 0; pointer-events: none; }
  @media (prefers-reduced-motion: reduce){
    #prompt{ animation: none; }
    #result .verdict{ animation: none; }
  }
  button:focus-visible{ outline: 2px solid var(--gold-hi); outline-offset: 2px; }
</style>
</head>
<body>

<div class="top">
  <h1>COIN TOSS <em>· three quarters fair</em></h1>
  <div class="stats">
    <span>HEADS<span class="val heads" id="stat-heads">0</span></span>
    <span>TAILS<span class="val tails" id="stat-tails">0</span></span>
    <span>STREAK<span class="val streak" id="stat-streak">0</span></span>
    <span>TOTAL<span class="val" id="stat-total">0</span></span>
  </div>
</div>

<div class="stage" id="stage">
  <canvas id="cv"></canvas>
  <button type="button" class="audio-toggle" id="audio-btn" title="Toggle sound">♪ ON</button>
  <div id="prompt">click anywhere to flip</div>
  <div id="result"><span class="verdict" id="result-text">HEADS</span></div>
  <div id="loading">forging the coin…</div>
</div>

<div class="footer">
  click the stage or press <kbd>Space</kbd> to flip · gold coin, real physics, fair odds
</div>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160/build/three.module.js';

/* ── Setup ──────────────────────────────────────────────────── */
const stage = document.getElementById('stage');
const cv = document.getElementById('cv');

const renderer = new THREE.WebGLRenderer({ canvas: cv, antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;

const scene = new THREE.Scene();

// Soft dark scene background tinted warm
const skyTex = makeBackgroundTexture();
scene.background = skyTex;

const camera = new THREE.PerspectiveCamera(40, 1, 0.1, 200);
camera.position.set(0, 6.5, 12);
camera.lookAt(0, 0.5, 0);

/* ── Lighting ───────────────────────────────────────────────── */
const ambient = new THREE.AmbientLight(0xffd9a0, 0.35);
scene.add(ambient);

const key = new THREE.DirectionalLight(0xffeec8, 1.6);
key.position.set(5, 11, 6);
key.castShadow = true;
key.shadow.mapSize.set(1024, 1024);
key.shadow.camera.left = -8; key.shadow.camera.right = 8;
key.shadow.camera.top = 8; key.shadow.camera.bottom = -8;
key.shadow.camera.near = 0.5; key.shadow.camera.far = 25;
key.shadow.bias = -0.0008;
key.shadow.radius = 4;
scene.add(key);

const rim = new THREE.DirectionalLight(0x8a6020, 0.55);
rim.position.set(-6, 4, -8);
scene.add(rim);

// Warm point light for the gold to catch
const point = new THREE.PointLight(0xffc060, 1.0, 30, 1.5);
point.position.set(-3, 3, 4);
scene.add(point);

/* ── Table (the surface the coin lands on) ───────────────── */
const tableGeo = new THREE.CircleGeometry(7, 64);
const tableTex = makeTableTexture();
const tableMat = new THREE.MeshStandardMaterial({
  map: tableTex,
  roughness: 0.55,
  metalness: 0.15,
  color: 0x3a2a1a,
});
const table = new THREE.Mesh(tableGeo, tableMat);
table.rotation.x = -Math.PI / 2;
table.position.y = 0;
table.receiveShadow = true;
scene.add(table);

// Soft contact halo on the table beneath where the coin will rest (decorative)
const halo = new THREE.Mesh(
  new THREE.RingGeometry(1.05, 2.4, 64),
  new THREE.MeshBasicMaterial({ color: 0x2a1808, transparent: true, opacity: 0.55, side: THREE.DoubleSide })
);
halo.rotation.x = -Math.PI / 2;
halo.position.y = 0.001;
scene.add(halo);

/* ── Coin ──────────────────────────────────────────────────── */
const COIN_R = 1.0;
const COIN_THICK = 0.16;
const coinGeo = new THREE.CylinderGeometry(COIN_R, COIN_R, COIN_THICK, 64, 1, false);
// Face textures (heads + tails) generated to canvas
const headsTex = makeCoinFaceTexture('HEADS', true);
const tailsTex = makeCoinFaceTexture('TAILS', false);
// CylinderGeometry has materials in order [side, top, bottom]
const sideMat = new THREE.MeshStandardMaterial({
  color: 0xd4a83a,
  metalness: 0.95,
  roughness: 0.28,
  envMapIntensity: 0.6,
});
const topMat = new THREE.MeshStandardMaterial({
  map: headsTex,
  color: 0xf0d878,
  metalness: 0.85,
  roughness: 0.32,
});
const botMat = new THREE.MeshStandardMaterial({
  map: tailsTex,
  color: 0xf0d878,
  metalness: 0.85,
  roughness: 0.32,
});
// Add ridged edge ("reeded" coin) via a normal map sketch on side
sideMat.normalMap = makeReedingNormalMap();
sideMat.normalScale = new THREE.Vector2(0.5, 0.5);

const coin = new THREE.Mesh(coinGeo, [sideMat, topMat, botMat]);
coin.castShadow = true;
coin.receiveShadow = true;
coin.position.y = COIN_THICK / 2;
scene.add(coin);

/* ── Background scene texture (radial warm gradient) ────────── */
function makeBackgroundTexture(){
  const c = document.createElement('canvas');
  c.width = 256; c.height = 256;
  const g = c.getContext('2d');
  const grad = g.createRadialGradient(128, 96, 8, 128, 128, 220);
  grad.addColorStop(0, '#3a261a');
  grad.addColorStop(0.4, '#1c100a');
  grad.addColorStop(1, '#070403');
  g.fillStyle = grad;
  g.fillRect(0, 0, 256, 256);
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

/* ── Table texture (dark marbled wood) ──────────────────────── */
function makeTableTexture(){
  const S = 512;
  const c = document.createElement('canvas');
  c.width = S; c.height = S;
  const g = c.getContext('2d');
  // base brown
  g.fillStyle = '#2a1d12';
  g.fillRect(0, 0, S, S);
  // wood grain noise
  for (let i = 0; i < 800; i++){
    const x = Math.random() * S;
    const y = Math.random() * S;
    const len = 20 + Math.random() * 80;
    const a = 0.04 + Math.random() * 0.08;
    g.strokeStyle = 'rgba(60,40,20,' + a.toFixed(2) + ')';
    g.lineWidth = 0.6 + Math.random() * 1.4;
    g.beginPath();
    g.moveTo(x, y);
    g.bezierCurveTo(x + len * 0.3, y + 4, x + len * 0.7, y - 4, x + len, y + 2);
    g.stroke();
  }
  // some darker knots
  for (let i = 0; i < 8; i++){
    const x = Math.random() * S;
    const y = Math.random() * S;
    const r = 6 + Math.random() * 12;
    const grad = g.createRadialGradient(x, y, 0, x, y, r);
    grad.addColorStop(0, 'rgba(30,18,8,0.7)');
    grad.addColorStop(1, 'rgba(30,18,8,0)');
    g.fillStyle = grad;
    g.beginPath(); g.arc(x, y, r, 0, Math.PI * 2); g.fill();
  }
  // vignette darkening near edges (so the table feels like spotlit center)
  const v = g.createRadialGradient(S/2, S/2, S * 0.25, S/2, S/2, S * 0.55);
  v.addColorStop(0, 'rgba(0,0,0,0)');
  v.addColorStop(1, 'rgba(0,0,0,0.7)');
  g.fillStyle = v;
  g.fillRect(0, 0, S, S);
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.colorSpace = THREE.SRGBColorSpace;
  return tex;
}

/* ── Coin face texture (heads OR tails design) ──────────────── */
function makeCoinFaceTexture(label, isHeads){
  const S = 512;
  const c = document.createElement('canvas');
  c.width = S; c.height = S;
  const g = c.getContext('2d');
  // base gold disc fill
  const grad = g.createRadialGradient(S/2, S/2 - 60, 40, S/2, S/2, S/2);
  grad.addColorStop(0, '#fff0b0');
  grad.addColorStop(0.4, '#f0d878');
  grad.addColorStop(1, '#a8782a');
  g.fillStyle = grad;
  g.fillRect(0, 0, S, S);
  // outer ring (raised rim)
  g.strokeStyle = '#6a4e10';
  g.lineWidth = 14;
  g.beginPath(); g.arc(S/2, S/2, S/2 - 20, 0, Math.PI * 2); g.stroke();
  g.strokeStyle = '#fff0c0';
  g.lineWidth = 3;
  g.beginPath(); g.arc(S/2, S/2, S/2 - 30, 0, Math.PI * 2); g.stroke();
  g.strokeStyle = '#8a6020';
  g.lineWidth = 1;
  g.beginPath(); g.arc(S/2, S/2, S/2 - 40, 0, Math.PI * 2); g.stroke();
  // dotted bead ring
  g.fillStyle = '#6a4e10';
  for (let i = 0; i < 72; i++){
    const a = (i / 72) * Math.PI * 2;
    const r = S/2 - 50;
    const x = S/2 + Math.cos(a) * r;
    const y = S/2 + Math.sin(a) * r;
    g.beginPath(); g.arc(x, y, 1.5, 0, Math.PI * 2); g.fill();
  }
  // label text around the top
  g.fillStyle = '#6a4e10';
  g.font = '900 30px Cinzel, serif';
  g.textAlign = 'center';
  g.textBaseline = 'middle';
  // arc text along top
  const topText = isHeads ? '★ HEADS ★ AURUM ★' : '★ TAILS ★ FORTUNA ★';
  drawArcText(g, topText, S/2, S/2, S/2 - 68, -Math.PI/2 - 0.95, -Math.PI/2 + 0.95);
  // bottom year-style text
  g.fillStyle = '#5a4408';
  g.font = '700 22px Cinzel, serif';
  drawArcText(g, '· MMXXVI ·', S/2, S/2, S/2 - 70, Math.PI/2 - 0.35, Math.PI/2 + 0.35, true);
  // central emblem
  if (isHeads){
    // a stylized face — circle + simple features (a "head" profile silhouette)
    g.save();
    g.translate(S/2, S/2 + 10);
    // profile silhouette (left-facing)
    g.fillStyle = '#6a4e10';
    g.beginPath();
    g.moveTo(40, -90);
    g.bezierCurveTo(20, -100, -20, -100, -40, -80);
    g.bezierCurveTo(-55, -60, -55, -20, -45, 20);
    g.bezierCurveTo(-50, 40, -42, 70, -20, 80);
    g.lineTo(40, 80);
    g.bezierCurveTo(40, 60, 35, 30, 30, 0);
    g.bezierCurveTo(45, -30, 50, -60, 40, -90);
    g.closePath();
    g.fill();
    // raised highlight on the cheek/jaw
    g.fillStyle = 'rgba(255,240,180,0.35)';
    g.beginPath();
    g.ellipse(-15, 20, 14, 28, 0.3, 0, Math.PI * 2);
    g.fill();
    // eye dot
    g.fillStyle = '#6a4e10';
    g.beginPath(); g.arc(8, -28, 3, 0, Math.PI * 2); g.fill();
    g.restore();
  } else {
    // tails: laurel wreath + Roman numeral I
    g.save();
    g.translate(S/2, S/2);
    // two curved laurel branches
    g.strokeStyle = '#6a4e10';
    g.lineWidth = 5;
    for (let side = -1; side <= 1; side += 2){
      g.beginPath();
      g.moveTo(side * 90, 80);
      g.bezierCurveTo(side * 110, 20, side * 90, -60, side * 30, -90);
      g.stroke();
      // leaves
      g.fillStyle = '#6a4e10';
      for (let k = 0; k < 7; k++){
        const t = k / 6;
        const lx = side * (90 - t * 60 + (1-t) * 20 * Math.sin(t * 3));
        const ly = 80 - t * 170;
        g.save();
        g.translate(lx, ly);
        g.rotate(side * (t * 1.4 + 0.4));
        g.beginPath();
        g.ellipse(0, 0, 10, 4, 0, 0, Math.PI * 2);
        g.fill();
        g.restore();
      }
    }
    // central I (number 1)
    g.fillStyle = '#6a4e10';
    g.font = '900 130px Cinzel, serif';
    g.textAlign = 'center';
    g.textBaseline = 'middle';
    g.fillText('I', 0, -4);
    // highlight on the I
    g.fillStyle = 'rgba(255,240,180,0.35)';
    g.fillRect(-8, -54, 4, 100);
    g.restore();
  }
  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = 8;
  return tex;
}
function drawArcText(g, text, cx, cy, radius, startAngle, endAngle, flip){
  const len = text.length;
  for (let i = 0; i < len; i++){
    const t = i / (len - 1);
    const a = startAngle + (endAngle - startAngle) * t;
    g.save();
    g.translate(cx + Math.cos(a) * radius, cy + Math.sin(a) * radius);
    g.rotate(a + (flip ? -Math.PI/2 : Math.PI/2));
    g.fillText(text[i], 0, 0);
    g.restore();
  }
}

/* ── Reeded edge normal map (the "ridged" coin side) ───── */
function makeReedingNormalMap(){
  const S = 512;
  const c = document.createElement('canvas');
  c.width = S; c.height = 32;
  const g = c.getContext('2d');
  // generate vertical "ridge" stripes simulating normal map
  for (let x = 0; x < S; x++){
    // sin profile → red channel encodes x-normal
    const v = Math.sin((x / S) * Math.PI * 120); // 60 ridges around
    const r = Math.round(128 + v * 110);
    g.fillStyle = 'rgb(' + r + ',128,255)';
    g.fillRect(x, 0, 1, 32);
  }
  const tex = new THREE.CanvasTexture(c);
  tex.wrapS = THREE.RepeatWrapping;
  tex.wrapT = THREE.ClampToEdgeWrapping;
  return tex;
}

/* ── Audio: Web Audio synth for clink + whoosh + thud ───── */
let audioCtx = null;
let audioOn = true;
function ensureAudio(){
  if (audioCtx) return audioCtx;
  try{
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } catch(_){}
  return audioCtx;
}
function playWhoosh(){
  if (!audioOn) return;
  const a = ensureAudio(); if (!a) return;
  const dur = 0.22;
  // noise burst → bandpass → exp envelope
  const len = Math.floor(a.sampleRate * dur);
  const buf = a.createBuffer(1, len, a.sampleRate);
  const ch = buf.getChannelData(0);
  for (let i = 0; i < len; i++) ch[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = a.createBufferSource();
  src.buffer = buf;
  const bp = a.createBiquadFilter();
  bp.type = 'bandpass'; bp.frequency.value = 1800; bp.Q.value = 1.3;
  const g = a.createGain();
  g.gain.setValueAtTime(0.001, a.currentTime);
  g.gain.linearRampToValueAtTime(0.35, a.currentTime + 0.02);
  g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
  src.connect(bp).connect(g).connect(a.destination);
  src.start();
  src.stop(a.currentTime + dur + 0.05);
}
function playClink(volume){
  if (!audioOn) return;
  const a = ensureAudio(); if (!a) return;
  const t0 = a.currentTime;
  const v = (volume || 1) * 0.32;
  // bell-like: two sine partials with quick exp decay
  [{ f: 2400, g: v },
   { f: 3600, g: v * 0.55 },
   { f: 5400, g: v * 0.25 }].forEach(({f, g}) => {
    const osc = a.createOscillator();
    osc.type = 'sine'; osc.frequency.value = f;
    const gain = a.createGain();
    gain.gain.setValueAtTime(g, t0);
    gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.18);
    osc.connect(gain).connect(a.destination);
    osc.start(t0);
    osc.stop(t0 + 0.2);
  });
  // tiny noise click on attack
  const len = Math.floor(a.sampleRate * 0.04);
  const buf = a.createBuffer(1, len, a.sampleRate);
  const ch = buf.getChannelData(0);
  for (let i = 0; i < len; i++) ch[i] = (Math.random() * 2 - 1) * (1 - i / len) * 0.5;
  const src = a.createBufferSource(); src.buffer = buf;
  const ng = a.createGain(); ng.gain.value = 0.3 * v;
  src.connect(ng).connect(a.destination);
  src.start(t0);
}
function playSettle(){
  if (!audioOn) return;
  const a = ensureAudio(); if (!a) return;
  const t0 = a.currentTime;
  [{ f: 120, g: 0.15 },
   { f: 90,  g: 0.10 }].forEach(({f, g}) => {
    const osc = a.createOscillator();
    osc.type = 'sine'; osc.frequency.value = f;
    const gain = a.createGain();
    gain.gain.setValueAtTime(g, t0);
    gain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.32);
    osc.connect(gain).connect(a.destination);
    osc.start(t0);
    osc.stop(t0 + 0.34);
  });
}

document.getElementById('audio-btn').addEventListener('click', e => {
  audioOn = !audioOn;
  e.currentTarget.textContent = audioOn ? '♪ ON' : '♪ OFF';
  e.currentTarget.classList.toggle('off', !audioOn);
  if (audioOn){ ensureAudio(); playClink(0.5); }
});

/* ── Physics state ──────────────────────────────────────── */
const physics = {
  flipping: false,
  vy: 0,
  angVel: new THREE.Vector3(0, 0, 0),
  bounces: 0,
  settling: false,
  settleStart: 0,
  settleFromQ: new THREE.Quaternion(),
  settleToQ: new THREE.Quaternion(),
};
const GRAVITY = -22; // units/s²
const REST_Y = COIN_THICK / 2;
const FLOOR_Y = COIN_THICK / 2 + 0.01;

function flip(){
  if (physics.flipping) return;
  physics.flipping = true;
  physics.settling = false;
  physics.bounces = 0;
  // hide result + prompt
  document.getElementById('result').classList.remove('show', 'heads', 'tails');
  document.getElementById('prompt').classList.add('hidden');
  // randomize starting conditions
  physics.vy = 11 + Math.random() * 2.5;
  physics.angVel.set(
    16 + Math.random() * 14,   // X tumble (the main flipping axis)
    (Math.random() - 0.5) * 4, // Y spin (around the coin's vertical axis - subtle)
    (Math.random() - 0.5) * 6  // Z tumble (some lateral wobble)
  );
  // small lateral position kick (so it doesn't always land in exact center)
  coin.position.x = (Math.random() - 0.5) * 0.4;
  coin.position.z = (Math.random() - 0.5) * 0.4;
  coin.position.y = REST_Y;
  playWhoosh();
}

/* ── Animation loop ─────────────────────────────────────── */
let last = performance.now();
function frame(now){
  const dt = Math.min(0.04, (now - last) / 1000);
  last = now;
  updatePhysics(dt, now);
  renderer.render(scene, camera);
  requestAnimationFrame(frame);
}
function updatePhysics(dt, now){
  if (physics.settling){
    const t = Math.min(1, (now - physics.settleStart) / 380);
    coin.quaternion.copy(physics.settleFromQ).slerp(physics.settleToQ, easeOut(t));
    // settle Y too (push back to rest height in case of small overshoot)
    coin.position.y += (REST_Y - coin.position.y) * 0.18;
    if (t >= 1){
      physics.settling = false;
      physics.flipping = false;
      // reveal result
      revealResult();
    }
    return;
  }
  if (!physics.flipping){
    // idle: gentle rotation on Y so the coin shimmers
    coin.rotation.y += 0.005;
    return;
  }
  // FLIGHT physics
  physics.vy += GRAVITY * dt;
  coin.position.y += physics.vy * dt;
  // air drag on angular velocity (slow, mostly noticeable late)
  physics.angVel.multiplyScalar(Math.pow(0.985, dt * 60));
  // apply angular velocity: integrate as quaternion delta
  const dq = new THREE.Quaternion();
  const omega = physics.angVel;
  const angle = omega.length() * dt;
  if (angle > 1e-6){
    const axis = omega.clone().normalize();
    dq.setFromAxisAngle(axis, angle);
    coin.quaternion.premultiply(dq);
  }
  // ground hit
  if (coin.position.y < FLOOR_Y && physics.vy < 0){
    coin.position.y = FLOOR_Y;
    physics.bounces++;
    const impact = Math.abs(physics.vy);
    const ret = Math.max(0.18, 0.55 - physics.bounces * 0.10);
    physics.vy = impact * ret;
    // dampen angular velocity on bounce (friction)
    physics.angVel.multiplyScalar(0.62);
    // play clink with volume scaled to impact
    playClink(Math.min(1, impact / 14));
    // when energy gets low, start settling
    if (physics.bounces >= 3 || impact < 4){
      startSettle(now);
    }
  }
}
function startSettle(now){
  // figure out whether the coin's "up" axis (its local +Y) is currently
  // pointing up or down in world space → snap to the closest flat rest.
  const localUp = new THREE.Vector3(0, 1, 0).applyQuaternion(coin.quaternion);
  const headsUp = localUp.y > 0;
  // build target quaternion: keep current world-Y rotation (yaw), zero pitch/roll
  // Decompose current quaternion to euler in YXZ order
  const eul = new THREE.Euler().setFromQuaternion(coin.quaternion, 'YXZ');
  const targetEul = new THREE.Euler(
    headsUp ? 0 : Math.PI,  // X tilt: 0 = heads up, PI = tails up
    eul.y,                  // keep yaw
    0,
    'YXZ'
  );
  physics.settleToQ = new THREE.Quaternion().setFromEuler(targetEul);
  physics.settleFromQ = coin.quaternion.clone();
  physics.settling = true;
  physics.settleStart = now;
  playSettle();
}
function easeOut(t){ return 1 - Math.pow(1 - t, 3); }

/* ── Reveal result + update stats ────────────────────────── */
let stats = {
  heads: +localStorage.getItem('coin-toss-heads') || 0,
  tails: +localStorage.getItem('coin-toss-tails') || 0,
  streak: 0,
  streakKind: null,
};
document.getElementById('stat-heads').textContent = stats.heads;
document.getElementById('stat-tails').textContent = stats.tails;
document.getElementById('stat-total').textContent = stats.heads + stats.tails;

function revealResult(){
  // determine heads/tails from coin's local Y axis
  const localUp = new THREE.Vector3(0, 1, 0).applyQuaternion(coin.quaternion);
  const isHeads = localUp.y > 0;
  const result = isHeads ? 'HEADS' : 'TAILS';
  // update stats
  if (isHeads){ stats.heads++; localStorage.setItem('coin-toss-heads', stats.heads); }
  else        { stats.tails++; localStorage.setItem('coin-toss-tails', stats.tails); }
  if (stats.streakKind === result) stats.streak++;
  else { stats.streak = 1; stats.streakKind = result; }
  document.getElementById('stat-heads').textContent = stats.heads;
  document.getElementById('stat-tails').textContent = stats.tails;
  document.getElementById('stat-total').textContent = stats.heads + stats.tails;
  document.getElementById('stat-streak').textContent = stats.streak + ' ' + result[0];
  // verdict overlay
  const el = document.getElementById('result');
  el.classList.remove('heads', 'tails');
  el.classList.add(isHeads ? 'heads' : 'tails');
  document.getElementById('result-text').textContent = result;
  // hard re-trigger animation
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
}

/* ── Resize handling ─────────────────────────────────────── */
function resize(){
  const rect = stage.getBoundingClientRect();
  renderer.setSize(rect.width, rect.height, false);
  camera.aspect = rect.width / rect.height;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

/* ── Click / key to flip ─────────────────────────────────── */
stage.addEventListener('click', () => {
  // first click also unlocks audio context
  ensureAudio();
  flip();
});
document.addEventListener('keydown', e => {
  if (e.code === 'Space'){
    e.preventDefault();
    ensureAudio();
    flip();
  }
});

/* ── Hide loading + kick off ─────────────────────────────── */
requestAnimationFrame(frame);
setTimeout(() => document.getElementById('loading').classList.add('hidden'), 250);
</script>
</body>
