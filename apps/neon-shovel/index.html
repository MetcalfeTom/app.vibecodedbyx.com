<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Neon Shovel</title>
<meta name="description" content="A 3D dig simulator. Crack open the synthwave dirt for glowing neon loot boxes." />
<link rel="icon" href="https://emojicdn.elk.sh/%E2%9B%8F%EF%B8%8F" />
<meta property="og:title" content="Neon Shovel" />
<meta property="og:description" content="A 3D dig simulator. Crack open the synthwave dirt for glowing neon loot boxes." />
<meta property="og:url" content="https://sloppy.live/neon-shovel/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/A%203D%20synthwave%20neon%20dig%20site%20with%20a%20glowing%20shovel%20and%20floating%20cyan%20magenta%20violet%20loot%20boxes%20on%20a%20cyan%20grid%20floor%20with%20magenta%20sun?width=1200&height=630&nologo=true" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Monoton&family=Audiowide&family=Press+Start+2P&family=Space+Mono&family=VT323&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;width:100%;overflow:hidden;background:#04020c;color:#eaeaff;font-family:'Space Mono',monospace}
  body{position:relative;cursor:crosshair}
  #stage{position:fixed;inset:0;z-index:0}
  /* HUD */
  .hud{position:fixed;z-index:10;pointer-events:none;color:#eaeaff;text-shadow:0 0 6px #ff5ea1, 0 0 16px rgba(255,94,161,0.4)}
  .hud .pill{
    pointer-events:auto;
    background:rgba(15,5,30,0.62);
    border:1px solid rgba(94,224,255,0.28);
    padding:8px 14px;border-radius:4px;
    backdrop-filter:blur(6px);
    box-shadow:0 0 16px rgba(94,224,255,0.18);
  }
  #title{position:fixed;top:18px;left:50%;transform:translateX(-50%);z-index:11;text-align:center;pointer-events:none}
  #title h1{
    font-family:'Monoton',cursive;font-weight:400;font-size:clamp(38px,6vw,70px);
    color:#fff;letter-spacing:0.16em;
    text-shadow:0 0 6px #ff5ea1, 0 0 22px rgba(255,94,161,0.6),
                3px 0 0 #5ee0ff, -3px 0 0 #ff5ea1;
    line-height:1;
  }
  #title .sub{
    font-family:'Audiowide',sans-serif;font-size:11px;letter-spacing:0.4em;color:#5ee0ff;
    text-shadow:0 0 8px rgba(94,224,255,0.7);margin-top:6px;
  }
  #title .sub b{color:#ffd25b;font-weight:400;text-shadow:0 0 8px rgba(255,210,91,0.7)}

  #stats{position:fixed;top:18px;left:18px;z-index:11;display:flex;flex-direction:column;gap:8px}
  #stats .pill{font-family:'Press Start 2P',monospace;font-size:9px;letter-spacing:0.1em;line-height:1.7}
  #stats .pill .lab{color:#5ee0ff;margin-right:8px}
  #stats .pill .v{color:#ffd25b}

  #rarity{position:fixed;top:18px;right:18px;z-index:11;display:flex;flex-direction:column;gap:6px;align-items:flex-end}
  #rarity .pill{font-family:'Press Start 2P',monospace;font-size:8px;letter-spacing:0.1em;display:flex;gap:8px;align-items:center;min-width:170px;justify-content:space-between}
  #rarity .swatch{display:inline-block;width:12px;height:12px;border-radius:2px;box-shadow:0 0 6px currentColor}
  #rarity .pill.common{color:#5ee0ff}
  #rarity .pill.rare{color:#ff5ea1}
  #rarity .pill.epic{color:#ffd25b}
  #rarity .pill.legendary{color:#c47bff;border-color:rgba(196,123,255,0.5);box-shadow:0 0 18px rgba(196,123,255,0.25)}
  #rarity .pill.legendary .swatch{box-shadow:0 0 12px currentColor}

  #hint{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:11;
        font-family:'VT323',monospace;font-size:18px;color:#5ee0ff;letter-spacing:0.1em;
        text-shadow:0 0 10px rgba(94,224,255,0.6);pointer-events:none;opacity:0.85}
  #hint b{color:#ff5ea1;text-shadow:0 0 10px rgba(255,94,161,0.7);font-weight:400}

  #ctrls{position:fixed;bottom:24px;left:24px;z-index:11;display:flex;gap:10px;flex-wrap:wrap}
  #ctrls button{
    pointer-events:auto;
    background:rgba(15,5,30,0.62);
    border:1px solid rgba(196,123,255,0.4);
    color:#dfb5ff;
    font-family:'Audiowide',sans-serif;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;
    padding:8px 14px;border-radius:4px;cursor:pointer;
    text-shadow:0 0 8px rgba(196,123,255,0.6);
    transition:all 0.15s ease;
    backdrop-filter:blur(6px);
  }
  #ctrls button:hover{border-color:#ffd25b;color:#ffd25b;text-shadow:0 0 8px rgba(255,210,91,0.8)}

  /* Pop toasts */
  .toast{
    position:fixed;left:50%;transform:translateX(-50%);z-index:30;
    font-family:'Audiowide',sans-serif;font-size:32px;letter-spacing:0.12em;
    pointer-events:none;animation:toastFloat 1.6s cubic-bezier(0.2,0.6,0.3,1) forwards;
  }
  @keyframes toastFloat{
    0%{opacity:0;transform:translate(-50%, 30px) scale(0.6)}
    20%{opacity:1;transform:translate(-50%, 0) scale(1.1)}
    65%{opacity:1;transform:translate(-50%, -50px) scale(1)}
    100%{opacity:0;transform:translate(-50%, -130px) scale(0.95)}
  }
  .toast.legendary{
    font-size:48px;
    text-shadow:0 0 12px #c47bff, 0 0 28px #ff5ea1, 0 0 48px #ffd25b;
    animation-duration:2.4s;
  }
  .toast.epic{text-shadow:0 0 10px #ffd25b, 0 0 26px rgba(255,210,91,0.7)}
  .toast.rare{text-shadow:0 0 10px #ff5ea1, 0 0 22px rgba(255,94,161,0.6)}
  .toast.common{text-shadow:0 0 10px #5ee0ff, 0 0 22px rgba(94,224,255,0.6);font-size:24px}

  #intro{
    position:fixed;inset:0;z-index:50;display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle at center, rgba(15,5,30,0.7), rgba(2,1,8,0.95));
    backdrop-filter:blur(4px);
    flex-direction:column;gap:20px;
  }
  #intro h2{
    font-family:'Monoton',cursive;font-size:clamp(40px,6.5vw,80px);
    color:#fff;letter-spacing:0.12em;
    text-shadow:0 0 10px #ff5ea1, 0 0 28px rgba(255,94,161,0.6),
                3px 0 0 #5ee0ff, -3px 0 0 #ff5ea1;
  }
  #intro p{font-family:'VT323',monospace;font-size:22px;color:#5ee0ff;text-align:center;max-width:420px;line-height:1.4}
  #intro p b{color:#ff5ea1;font-weight:400;text-shadow:0 0 10px rgba(255,94,161,0.8)}
  #digIn{
    background:linear-gradient(180deg, rgba(196,123,255,0.4), rgba(80,30,140,0.6));
    border:1px solid #c47bff;color:#fff;
    font-family:'Audiowide',sans-serif;font-size:18px;letter-spacing:0.24em;
    padding:14px 36px;border-radius:6px;cursor:pointer;text-transform:uppercase;
    text-shadow:0 0 12px rgba(255,255,255,0.7);
    box-shadow:0 0 22px rgba(196,123,255,0.5), inset 0 0 16px rgba(255,255,255,0.18);
  }
  #digIn:hover{transform:scale(1.04);box-shadow:0 0 32px rgba(196,123,255,0.7), inset 0 0 22px rgba(255,255,255,0.25)}

  @media (max-width:680px){
    #title h1{font-size:34px;letter-spacing:0.1em}
    #stats .pill{font-size:8px;padding:6px 10px}
    #rarity .pill{min-width:140px;font-size:7px}
    #hint{font-size:14px;bottom:88px}
    #ctrls{flex-direction:column;left:12px;bottom:12px}
  }
</style>
</head>
<body>
<canvas id="stage"></canvas>

<div id="title">
  <h1>NEON SHOVEL</h1>
  <div class="sub">DIG · UNEARTH · <b>HOARD</b></div>
</div>

<div id="stats">
  <div class="pill"><span class="lab">DIGS</span><span class="v" id="statDigs">0</span></div>
  <div class="pill"><span class="lab">BOXES</span><span class="v" id="statBoxes">0</span></div>
  <div class="pill"><span class="lab">COINS</span><span class="v" id="statCoins">0</span></div>
</div>

<div id="rarity">
  <div class="pill common"><span><span class="swatch" style="background:#5ee0ff"></span> COMMON</span><span id="cntCommon">0</span></div>
  <div class="pill rare"><span><span class="swatch" style="background:#ff5ea1"></span> RARE</span><span id="cntRare">0</span></div>
  <div class="pill epic"><span><span class="swatch" style="background:#ffd25b"></span> EPIC</span><span id="cntEpic">0</span></div>
  <div class="pill legendary"><span><span class="swatch" style="background:#c47bff"></span> LEGENDARY</span><span id="cntLegendary">0</span></div>
</div>

<div id="hint">CLICK <b>GROUND</b> TO DIG · CLICK <b>BOX</b> TO CLAIM</div>

<div id="ctrls">
  <button id="resetBtn">RESET FIELD</button>
  <button id="muteBtn">♪ ON</button>
</div>

<div id="intro">
  <h2>NEON SHOVEL</h2>
  <p>The grid hums beneath your boots.<br/>Somewhere down there: <b>treasure</b>.<br/>Click anywhere to start digging.</p>
  <button id="digIn">⛏ START DIGGING</button>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script>
(() => {
  const canvas = document.getElementById('stage');

  // ----- THREE setup -----
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: false });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setClearColor(0x04020c, 1);

  const scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x150930, 18, 90);

  const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 200);
  camera.position.set(0, 9, 14);
  camera.lookAt(0, 0, 2);

  // ----- LIGHTS -----
  const ambient = new THREE.AmbientLight(0x6b3aff, 0.5);
  scene.add(ambient);
  const sun = new THREE.DirectionalLight(0xff5ea1, 0.9);
  sun.position.set(-6, 10, -8);
  scene.add(sun);
  const cool = new THREE.PointLight(0x5ee0ff, 0.9, 50);
  cool.position.set(8, 6, 4);
  scene.add(cool);

  // ----- BACKDROP: synthwave horizon -----
  // Distant magenta sun on a black sky as a sprite
  const sunCanvas = document.createElement('canvas');
  sunCanvas.width = 256; sunCanvas.height = 256;
  const sctx = sunCanvas.getContext('2d');
  const grd = sctx.createRadialGradient(128,128,8, 128,128,128);
  grd.addColorStop(0, '#ffd2e8');
  grd.addColorStop(0.4, '#ff5ea1');
  grd.addColorStop(0.78, 'rgba(196,80,140,0.4)');
  grd.addColorStop(1, 'rgba(196,80,140,0)');
  sctx.fillStyle = grd;
  sctx.fillRect(0,0,256,256);
  // horizontal scanline cuts
  sctx.fillStyle = 'rgba(4,2,12,0.9)';
  for(let i=140;i<210;i+=10){
    const h = (i-140)/70;
    sctx.fillRect(0, i, 256, 2 + h*4);
  }
  const sunTex = new THREE.CanvasTexture(sunCanvas);
  const sunMat = new THREE.SpriteMaterial({ map: sunTex, transparent:true, depthWrite:false });
  const sunSprite = new THREE.Sprite(sunMat);
  sunSprite.scale.set(34, 34, 1);
  sunSprite.position.set(0, 8, -45);
  scene.add(sunSprite);

  // distant mountain silhouette
  const mountainShape = new THREE.Shape();
  const peaks = [];
  for(let x=-50;x<=50;x+=3){
    const y = 1.5 + Math.sin(x*0.5)*1.2 + Math.cos(x*0.27)*1.4 + Math.sin(x*1.1)*0.7;
    peaks.push({x, y});
  }
  mountainShape.moveTo(-50, 0);
  peaks.forEach(p => mountainShape.lineTo(p.x, p.y));
  mountainShape.lineTo(50, 0);
  mountainShape.lineTo(-50, 0);
  const mtnGeo = new THREE.ShapeGeometry(mountainShape);
  const mtnMat = new THREE.MeshBasicMaterial({ color: 0x230d40, side: THREE.DoubleSide });
  const mtn = new THREE.Mesh(mtnGeo, mtnMat);
  mtn.position.set(0, -0.3, -38);
  scene.add(mtn);

  // ----- GROUND with grid texture -----
  const groundCanvas = document.createElement('canvas');
  groundCanvas.width = 1024; groundCanvas.height = 1024;
  const gctx = groundCanvas.getContext('2d');
  // base
  const ggrd = gctx.createRadialGradient(512,512,40, 512,512,720);
  ggrd.addColorStop(0, '#1a0e3c');
  ggrd.addColorStop(0.5, '#0d0524');
  ggrd.addColorStop(1, '#04020c');
  gctx.fillStyle = ggrd; gctx.fillRect(0,0,1024,1024);
  // major grid
  gctx.strokeStyle = 'rgba(94,224,255, 0.55)';
  gctx.lineWidth = 2;
  for(let i=0;i<=1024;i+=64){
    gctx.beginPath(); gctx.moveTo(i,0); gctx.lineTo(i,1024); gctx.stroke();
    gctx.beginPath(); gctx.moveTo(0,i); gctx.lineTo(1024,i); gctx.stroke();
  }
  // glow accents at intersections
  gctx.fillStyle = 'rgba(94,224,255, 0.85)';
  for(let x=0;x<=1024;x+=64){
    for(let y=0;y<=1024;y+=64){
      gctx.fillRect(x-1, y-1, 3, 3);
    }
  }
  const groundTex = new THREE.CanvasTexture(groundCanvas);
  groundTex.wrapS = groundTex.wrapT = THREE.RepeatWrapping;
  groundTex.repeat.set(2, 2);
  const groundMat = new THREE.MeshBasicMaterial({ map: groundTex });
  const ground = new THREE.Mesh(new THREE.PlaneGeometry(80, 80), groundMat);
  ground.rotation.x = -Math.PI/2;
  ground.position.y = 0;
  scene.add(ground);

  // ----- SHOVEL -----
  const shovel = new THREE.Group();

  const handleGeo = new THREE.CylinderGeometry(0.12, 0.12, 4.2, 12);
  const handleMat = new THREE.MeshPhongMaterial({ color: 0x5a3a20, emissive: 0x6a2200, emissiveIntensity: 0.15, shininess: 60 });
  const handle = new THREE.Mesh(handleGeo, handleMat);
  handle.position.y = 2.1;
  shovel.add(handle);

  const grip = new THREE.Mesh(new THREE.TorusGeometry(0.22, 0.08, 6, 14), new THREE.MeshPhongMaterial({ color: 0x111118, emissive: 0xff5ea1, emissiveIntensity: 0.3 }));
  grip.position.y = 4.2;
  grip.rotation.x = Math.PI/2;
  shovel.add(grip);

  // blade
  const bladeGeo = new THREE.BoxGeometry(0.9, 1.2, 0.06);
  const bladeMat = new THREE.MeshPhongMaterial({ color: 0xc8d6ff, emissive: 0x5ee0ff, emissiveIntensity: 0.45, shininess: 120 });
  const blade = new THREE.Mesh(bladeGeo, bladeMat);
  blade.position.y = -0.35;
  blade.position.z = 0;
  shovel.add(blade);

  // blade neon edge
  const bladeEdges = new THREE.LineSegments(new THREE.EdgesGeometry(bladeGeo), new THREE.LineBasicMaterial({ color: 0x5ee0ff }));
  bladeEdges.position.copy(blade.position);
  shovel.add(bladeEdges);

  // tip triangle for digging visual
  const tipGeo = new THREE.ConeGeometry(0.45, 0.6, 4);
  const tipMat = new THREE.MeshPhongMaterial({ color: 0xeaf6ff, emissive: 0x5ee0ff, emissiveIntensity: 0.5 });
  const tip = new THREE.Mesh(tipGeo, tipMat);
  tip.rotation.z = Math.PI;
  tip.position.y = -1.15;
  shovel.add(tip);

  shovel.position.set(2.4, 0.5, 4);
  shovel.rotation.z = 0.2;
  scene.add(shovel);

  // pin shovel state for animation
  const shovelState = {
    target: new THREE.Vector3(0, 0, 0),
    home: new THREE.Vector3(2.4, 0.5, 4),
    digging: false,
    swing: 0, // 0..1
  };

  // ----- HOLES, BOXES, PARTICLES -----
  const holes = [];
  const boxes = [];
  const particles = [];

  const RARITIES = [
    { id:'common',    weight: 60, color: 0x5ee0ff, hex:'#5ee0ff', value: 10,   label:'COMMON',    name:'+10 COINS' },
    { id:'rare',      weight: 25, color: 0xff5ea1, hex:'#ff5ea1', value: 50,   label:'RARE',      name:'+50 COINS' },
    { id:'epic',      weight: 12, color: 0xffd25b, hex:'#ffd25b', value: 250,  label:'EPIC',      name:'+250 COINS' },
    { id:'legendary', weight: 3,  color: 0xc47bff, hex:'#c47bff', value: 1500, label:'LEGENDARY', name:'+1500 COINS' },
  ];

  function pickRarity(){
    const total = RARITIES.reduce((s,r)=>s+r.weight, 0);
    let r = Math.random()*total;
    for(const rar of RARITIES){
      if(r < rar.weight) return rar;
      r -= rar.weight;
    }
    return RARITIES[0];
  }

  function spawnHole(x, z){
    const geo = new THREE.CircleGeometry(0.85, 24);
    const mat = new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0.85 });
    const m = new THREE.Mesh(geo, mat);
    m.rotation.x = -Math.PI/2;
    m.position.set(x, 0.005, z);
    scene.add(m);
    // ring outline
    const ringGeo = new THREE.RingGeometry(0.78, 0.92, 24);
    const ringMat = new THREE.MeshBasicMaterial({ color: 0xff5ea1, transparent: true, opacity: 0.7 });
    const ring = new THREE.Mesh(ringGeo, ringMat);
    ring.rotation.x = -Math.PI/2;
    ring.position.set(x, 0.006, z);
    scene.add(ring);
    holes.push({ mesh: m, ring });
    if(holes.length > 28){
      const old = holes.shift();
      scene.remove(old.mesh); scene.remove(old.ring);
    }
  }

  function spawnDirt(x, z){
    for(let i=0;i<22;i++){
      const sz = 0.08 + Math.random()*0.14;
      const geo = new THREE.BoxGeometry(sz, sz, sz);
      const mat = new THREE.MeshPhongMaterial({ color: 0x6e4a26, emissive: 0xff5ea1, emissiveIntensity: 0.06 });
      const m = new THREE.Mesh(geo, mat);
      m.position.set(x, 0.1, z);
      scene.add(m);
      const ang = Math.random()*Math.PI*2;
      const spd = 1.5 + Math.random()*4.5;
      particles.push({
        mesh: m,
        vx: Math.cos(ang)*spd*0.6,
        vy: 4 + Math.random()*5,
        vz: Math.sin(ang)*spd*0.6,
        rot: { x: Math.random()*5, y: Math.random()*5, z: Math.random()*5 },
        life: 1.4 + Math.random()*0.7,
        type: 'dirt'
      });
    }
  }

  function spawnLootBox(x, z, rarity){
    const grp = new THREE.Group();
    const sz = rarity.id === 'legendary' ? 0.95 : (rarity.id === 'epic' ? 0.78 : 0.65);
    const geo = new THREE.BoxGeometry(sz, sz, sz);
    const mat = new THREE.MeshPhongMaterial({
      color: 0x0a0418,
      emissive: rarity.color,
      emissiveIntensity: 0.45,
      transparent: true, opacity: 0.78
    });
    const m = new THREE.Mesh(geo, mat);
    grp.add(m);

    const edges = new THREE.LineSegments(new THREE.EdgesGeometry(geo), new THREE.LineBasicMaterial({ color: rarity.color, linewidth: 2 }));
    grp.add(edges);

    // floating glow sprite
    const glowCv = document.createElement('canvas');
    glowCv.width = 128; glowCv.height = 128;
    const gx = glowCv.getContext('2d');
    const gg = gx.createRadialGradient(64,64,2, 64,64,64);
    gg.addColorStop(0, rarity.hex);
    gg.addColorStop(0.4, rarity.hex+'aa');
    gg.addColorStop(1, 'rgba(0,0,0,0)');
    gx.fillStyle = gg; gx.fillRect(0,0,128,128);
    const glowTex = new THREE.CanvasTexture(glowCv);
    const glowMat = new THREE.SpriteMaterial({ map: glowTex, transparent:true, depthWrite:false, blending: THREE.AdditiveBlending });
    const glow = new THREE.Sprite(glowMat);
    glow.scale.set(sz*4, sz*4, 1);
    grp.add(glow);

    grp.position.set(x, 0.05, z);
    scene.add(grp);
    boxes.push({
      group: grp,
      mesh: m,
      edges: edges,
      glow: glow,
      rarity: rarity,
      x, z,
      birth: performance.now(),
      hover: 0,
      claimed: false,
      sz
    });
  }

  function spawnRewardParticles(x, y, z, rarity, count){
    for(let i=0;i<count;i++){
      const sz = 0.12 + Math.random()*0.18;
      const geo = new THREE.BoxGeometry(sz, sz, sz);
      const mat = new THREE.MeshBasicMaterial({ color: rarity.color });
      const m = new THREE.Mesh(geo, mat);
      m.position.set(x, y, z);
      scene.add(m);
      const ang = Math.random()*Math.PI*2;
      const elev = 0.3 + Math.random()*0.7;
      const spd = 2 + Math.random()*5;
      particles.push({
        mesh: m,
        vx: Math.cos(ang)*spd*Math.cos(elev),
        vy: 5 + Math.random()*7,
        vz: Math.sin(ang)*spd*Math.cos(elev),
        rot: { x: Math.random()*8, y: Math.random()*8, z: Math.random()*8 },
        life: 2.0 + Math.random()*0.8,
        type: 'reward',
        rarity
      });
    }
  }

  // ----- INPUT -----
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  const pointerWorld = new THREE.Vector3();

  function setMouse(e){
    const r = canvas.getBoundingClientRect();
    mouse.x = ((e.clientX - r.left) / r.width) * 2 - 1;
    mouse.y = -((e.clientY - r.top) / r.height) * 2 + 1;
  }

  function pickAt(e){
    setMouse(e);
    raycaster.setFromCamera(mouse, camera);
    // first try boxes
    const boxObjs = boxes.filter(b => !b.claimed).map(b => b.mesh);
    const bHit = raycaster.intersectObjects(boxObjs, false);
    if(bHit.length){
      const box = boxes.find(b => b.mesh === bHit[0].object);
      if(box) return { type:'box', box };
    }
    // then ground
    const gHit = raycaster.intersectObject(ground, false);
    if(gHit.length){
      pointerWorld.copy(gHit[0].point);
      return { type:'ground', point: gHit[0].point.clone() };
    }
    return null;
  }

  canvas.addEventListener('pointerdown', e => {
    if(intro.style.display === 'none' || intro.classList.contains('gone')){
      const hit = pickAt(e);
      if(!hit) return;
      if(hit.type === 'ground'){
        digAt(hit.point);
      } else if(hit.type === 'box'){
        openBox(hit.box);
      }
    }
  });

  // ----- DIG ACTION -----
  function digAt(point){
    if(shovelState.digging) return;
    shovelState.digging = true;
    shovelState.target.copy(point);
    shovelState.swing = 0;
    state.digs++;
    updateHUD();
  }

  function performDig(point){
    spawnDirt(point.x, point.z);
    spawnHole(point.x, point.z);
    digSound();
    // 22% chance of loot
    if(Math.random() < 0.22){
      const rarity = pickRarity();
      spawnLootBox(point.x, point.z, rarity);
      // reveal rumble
      rumbleSound(rarity);
    }
  }

  function openBox(box){
    if(box.claimed) return;
    box.claimed = true;
    state.boxes++;
    state.coins += box.rarity.value;
    state[box.rarity.id]++;
    updateHUD();

    spawnRewardParticles(box.x, 0.6, box.z, box.rarity, box.rarity.id === 'legendary' ? 70 : (box.rarity.id === 'epic' ? 40 : 22));
    openSound(box.rarity);
    showToast(box.rarity.name, box.rarity.id);

    // remove box mesh
    scene.remove(box.group);
    const idx = boxes.indexOf(box);
    if(idx >= 0) boxes.splice(idx, 1);
  }

  function showToast(text, rarityId){
    const t = document.createElement('div');
    t.className = 'toast ' + rarityId;
    t.textContent = (rarityId === 'legendary' ? '★ ' : '') + text + (rarityId === 'legendary' ? ' ★' : '');
    t.style.color = RARITIES.find(r => r.id === rarityId).hex;
    t.style.top = '34%';
    document.body.appendChild(t);
    setTimeout(()=> t.remove(), rarityId==='legendary'? 2400 : 1600);
  }

  // ----- AUDIO -----
  let actx = null;
  function ensureAudio(){
    if(actx) return actx;
    try{ actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return null; }
    return actx;
  }
  function digSound(){
    if(state.muted) return;
    const ac = ensureAudio(); if(!ac) return;
    if(ac.state==='suspended') ac.resume();
    const t = ac.currentTime;
    // sub thump
    const o = ac.createOscillator(); o.type='sine';
    o.frequency.setValueAtTime(120, t);
    o.frequency.exponentialRampToValueAtTime(40, t+0.2);
    const g = ac.createGain();
    g.gain.setValueAtTime(0.3, t);
    g.gain.exponentialRampToValueAtTime(0.001, t+0.25);
    o.connect(g).connect(ac.destination);
    o.start(t); o.stop(t+0.3);
    // dirt scatter noise
    const buf = ac.createBuffer(1, 0.28*ac.sampleRate, ac.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<d.length;i++){ d[i] = (Math.random()*2-1) * Math.pow(1-i/d.length, 2); }
    const n = ac.createBufferSource(); n.buffer = buf;
    const lp = ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=900;
    const ng = ac.createGain(); ng.gain.value = 0.15;
    n.connect(lp).connect(ng).connect(ac.destination);
    n.start(t); n.stop(t+0.28);
  }
  function rumbleSound(rarity){
    if(state.muted) return;
    const ac = ensureAudio(); if(!ac) return;
    const t = ac.currentTime;
    // rising bell triad
    const baseHz = rarity.id === 'legendary' ? 196 : (rarity.id === 'epic' ? 247 : (rarity.id === 'rare' ? 294 : 349));
    [1, 1.25, 1.5].forEach((mult,i) => {
      const o = ac.createOscillator(); o.type='triangle';
      o.frequency.value = baseHz * mult;
      const g = ac.createGain();
      const start = t + i*0.07;
      g.gain.setValueAtTime(0, start);
      g.gain.linearRampToValueAtTime(0.1, start+0.01);
      g.gain.exponentialRampToValueAtTime(0.001, start+0.5);
      o.connect(g).connect(ac.destination);
      o.start(start); o.stop(start+0.55);
    });
  }
  function openSound(rarity){
    if(state.muted) return;
    const ac = ensureAudio(); if(!ac) return;
    const t = ac.currentTime;
    const arpRoot = rarity.id === 'legendary' ? 261.63 : (rarity.id === 'epic' ? 392 : (rarity.id === 'rare' ? 329.63 : 440));
    const arp = [arpRoot, arpRoot*1.25, arpRoot*1.5, arpRoot*2, arpRoot*2.5, arpRoot*3];
    const n = rarity.id === 'legendary' ? 6 : (rarity.id === 'epic' ? 5 : 4);
    arp.slice(0,n).forEach((f,i) => {
      const o = ac.createOscillator(); o.type='triangle';
      o.frequency.value = f;
      const o2 = ac.createOscillator(); o2.type='sine';
      o2.frequency.value = f*2;
      const g = ac.createGain();
      const start = t + i*0.07;
      g.gain.setValueAtTime(0, start);
      g.gain.linearRampToValueAtTime(0.13, start+0.01);
      g.gain.exponentialRampToValueAtTime(0.001, start+0.32);
      o.connect(g).connect(ac.destination);
      o2.connect(g);
      o.start(start); o2.start(start);
      o.stop(start+0.36); o2.stop(start+0.36);
    });
    // legendary chord stinger
    if(rarity.id === 'legendary'){
      [arpRoot/2, arpRoot, arpRoot*1.5, arpRoot*2].forEach((f,i)=>{
        const o = ac.createOscillator(); o.type='sawtooth';
        o.frequency.value = f;
        const lp = ac.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=1800;
        const g = ac.createGain();
        const start = t + 0.4 + i*0.02;
        g.gain.setValueAtTime(0, start);
        g.gain.linearRampToValueAtTime(0.08, start+0.01);
        g.gain.exponentialRampToValueAtTime(0.001, start+1.2);
        o.connect(lp).connect(g).connect(ac.destination);
        o.start(start); o.stop(start+1.4);
      });
    }
  }

  // ----- STATE / HUD -----
  const STORE_KEY = 'neon-shovel-v1';
  const state = loadState();
  function loadState(){
    try{
      const raw = localStorage.getItem(STORE_KEY);
      if(raw){
        const s = JSON.parse(raw);
        s.digs ||= 0; s.boxes ||= 0; s.coins ||= 0;
        s.common ||= 0; s.rare ||= 0; s.epic ||= 0; s.legendary ||= 0;
        s.muted = !!s.muted;
        return s;
      }
    }catch(e){}
    return { digs:0, boxes:0, coins:0, common:0, rare:0, epic:0, legendary:0, muted:false };
  }
  function saveState(){
    try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }catch(e){}
  }

  function updateHUD(){
    document.getElementById('statDigs').textContent = state.digs;
    document.getElementById('statBoxes').textContent = state.boxes;
    document.getElementById('statCoins').textContent = state.coins;
    document.getElementById('cntCommon').textContent = state.common;
    document.getElementById('cntRare').textContent = state.rare;
    document.getElementById('cntEpic').textContent = state.epic;
    document.getElementById('cntLegendary').textContent = state.legendary;
    saveState();
  }
  updateHUD();

  // ----- RESET / MUTE -----
  document.getElementById('resetBtn').addEventListener('click', () => {
    if(!confirm('Wipe all dig progress? Coins, boxes, holes — gone.')) return;
    state.digs = 0; state.boxes = 0; state.coins = 0;
    state.common = 0; state.rare = 0; state.epic = 0; state.legendary = 0;
    holes.forEach(h => { scene.remove(h.mesh); scene.remove(h.ring); });
    holes.length = 0;
    boxes.forEach(b => { scene.remove(b.group); });
    boxes.length = 0;
    updateHUD();
  });
  const muteBtn = document.getElementById('muteBtn');
  muteBtn.textContent = state.muted ? '♪ OFF' : '♪ ON';
  muteBtn.addEventListener('click', () => {
    state.muted = !state.muted;
    muteBtn.textContent = state.muted ? '♪ OFF' : '♪ ON';
    saveState();
    if(!state.muted) ensureAudio();
  });

  // ----- INTRO -----
  const intro = document.getElementById('intro');
  document.getElementById('digIn').addEventListener('click', () => {
    ensureAudio();
    intro.classList.add('gone');
    intro.style.display = 'none';
  });

  // ----- TICK -----
  let last = performance.now();
  function tick(now){
    const dt = Math.min(0.05, (now - last)/1000);
    last = now;

    // shovel animation
    if(shovelState.digging){
      shovelState.swing += dt*4.2;
      const s = shovelState.swing;
      if(s < 0.4){
        // raise + tilt over target
        const t = s/0.4;
        shovel.position.x = lerp(shovelState.home.x, shovelState.target.x, t);
        shovel.position.z = lerp(shovelState.home.z, shovelState.target.z, t);
        shovel.position.y = lerp(0.5, 2.6, Math.sin(t*Math.PI));
        shovel.rotation.z = -0.1 - 0.6*t;
        shovel.rotation.x = -0.2;
      } else if(s < 0.7){
        // strike down
        const t = (s - 0.4)/0.3;
        shovel.position.y = lerp(2.6, 0.0, t);
        shovel.rotation.x = lerp(-0.2, 0.4, t);
        shovel.rotation.z = lerp(-0.7, -0.1, t);
        if(s > 0.5 && !shovelState.struck){
          shovelState.struck = true;
          performDig(shovelState.target);
        }
      } else if(s < 1){
        // return to home
        const t = (s - 0.7)/0.3;
        shovel.position.x = lerp(shovelState.target.x, shovelState.home.x, t);
        shovel.position.z = lerp(shovelState.target.z, shovelState.home.z, t);
        shovel.position.y = lerp(0.0, 0.5, t);
        shovel.rotation.x = lerp(0.4, 0, t);
        shovel.rotation.z = lerp(-0.1, 0.2, t);
      } else {
        shovelState.digging = false;
        shovelState.struck = false;
        shovel.position.copy(shovelState.home);
        shovel.rotation.set(0, 0, 0.2);
      }
    } else {
      // idle bob
      shovel.position.y = 0.5 + Math.sin(now*0.002)*0.08;
      shovel.rotation.z = 0.2 + Math.sin(now*0.0011)*0.04;
    }

    // boxes float + rotate
    boxes.forEach(b => {
      const age = (now - b.birth)/1000;
      b.group.rotation.y += dt * 0.9;
      b.group.rotation.x = Math.sin(age*1.4)*0.18;
      b.group.position.y = 0.7 + Math.sin(age*2.0 + b.x)*0.16;
      b.glow.material.opacity = 0.6 + Math.sin(age*3 + b.z)*0.3;
      // legendary pulse extra
      if(b.rarity.id === 'legendary'){
        b.mesh.material.emissiveIntensity = 0.6 + Math.sin(age*4)*0.35;
      }
    });

    // particles
    for(let i=particles.length-1;i>=0;i--){
      const p = particles[i];
      p.mesh.position.x += p.vx*dt;
      p.mesh.position.y += p.vy*dt;
      p.mesh.position.z += p.vz*dt;
      p.vy -= 18*dt;
      // bounce
      if(p.mesh.position.y < 0.05){
        p.mesh.position.y = 0.05;
        p.vy = Math.abs(p.vy)*0.32;
        p.vx *= 0.7; p.vz *= 0.7;
        if(p.type==='reward' && Math.abs(p.vy) < 0.4){ p.life *= 0.5; }
      }
      p.mesh.rotation.x += p.rot.x*dt;
      p.mesh.rotation.y += p.rot.y*dt;
      p.mesh.rotation.z += p.rot.z*dt;
      p.life -= dt;
      if(p.life < 0.4){
        p.mesh.material.opacity = Math.max(0, p.life/0.4);
        p.mesh.material.transparent = true;
      }
      if(p.life <= 0){
        scene.remove(p.mesh);
        particles.splice(i,1);
      }
    }

    // gentle camera drift
    const t = now*0.0001;
    camera.position.x = Math.sin(t)*0.6;
    camera.position.z = 14 + Math.cos(t*1.4)*0.3;
    camera.lookAt(0, 0.4, 2);

    renderer.render(scene, camera);
    requestAnimationFrame(tick);
  }
  function lerp(a,b,t){ return a + (b-a)*t; }
  requestAnimationFrame(tick);

  // ----- RESIZE -----
  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth/window.innerHeight;
    camera.updateProjectionMatrix();
  });
})();
</script>
</body>
</html>
