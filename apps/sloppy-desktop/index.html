const FONT_APP = {
  ot: null,                // opentype.js global once loaded
  fonts: new Map(),        // id -> parsed Font (per-pick cache)
  activeId: 'audiowide',   // currently displayed pick
  inflight: new Map(),     // id -> Promise — dedupe parallel fetches
  loadingPromise: null,    // opentype.js lib load
};
const FONT_LIB_URL  = 'https://cdn.jsdelivr.net/npm/opentype.js@2.0.0/dist/opentype.min.js';
const FONT_LIB_FALLBACK = 'https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js';

function loadOpenType(){
  if (FONT_APP.ot) return Promise.resolve(FONT_APP.ot);
  if (FONT_APP.loadingPromise) return FONT_APP.loadingPromise;
  FONT_APP.loadingPromise = new Promise((resolve, reject) => {
    const tryLoad = (url, onFail) => {
      const s = document.createElement('script');
      s.src = url;
      s.onload = () => {
        if (window.opentype){ FONT_APP.ot = window.opentype; resolve(window.opentype); }
        else onFail(new Error('opentype global missing after load'));
      };
      s.onerror = onFail;
      document.head.appendChild(s);
    };
    // try 2.0.0 first (chat-asked version), fall back to 1.3.4
    tryLoad(FONT_LIB_URL, () => {
      console.warn('[sloppy-font] opentype 2.0.0 failed, falling back to 1.3.4');
      tryLoad(FONT_LIB_FALLBACK, (e) => reject(e));
    });
  });
  return FONT_APP.loadingPromise;
}
// Fetch + parse a font by id, caching the result. Concurrent calls
// for the same id share one fetch via FONT_APP.inflight.
async function loadFont(id){
  id = id || FONT_APP.activeId;
  if (FONT_APP.fonts.has(id)) return FONT_APP.fonts.get(id);
  if (FONT_APP.inflight.has(id)) return FONT_APP.inflight.get(id);
  const def = FONT_LIBRARY.find(f => f.id === id) || FONT_LIBRARY[0];
  const promise = (async () => {
    const ot = await loadOpenType();
    const res = await fetch(def.url);
    if (!res.ok) throw new Error('font http ' + res.status + ' for ' + id);
    const buf = await res.arrayBuffer();
    // opentype.js 2.0: opentype.parse(buffer, opts) → Font with
    // charToGlyph + getPath. Same signature as 1.x.
    const parsed = ot.parse(buf);
    FONT_APP.fonts.set(id, parsed);
    return parsed;
  })();
  FONT_APP.inflight.set(id, promise);
  promise.finally(() => FONT_APP.inflight.delete(id));
  return promise;
}
function getActiveFont(){ return FONT_APP.fonts.get(FONT_APP.activeId); }

// ── COLR v0 LAYER EXTRACTION ──────────────────────────────────────
// Color fonts using OpenType COLR v0 + CPAL store each glyph as a
// stack of monochrome layers (each is a regular outline glyph filled
// with a CPAL palette entry). opentype.js 2.0 parses COLR v0 records
// into `font.tables.colr.{baseGlyphRecords, layerRecords}` and CPAL
// into `font.tables.cpal.{numPaletteEntries, colorRecords[]}` (each
// colorRecord is a 32-bit BGRA int — we extract bytes manually).
//
// COLR v1 (gradient-based, used by most modern color fonts including
// Bungee Spice) is NOT yet decoded by opentype.js 2.0 — the lib prints
// a warning at parse time. When v0 records are absent we return null
// so the caller falls back to single-layer monochrome rendering.
function cpalIntToRGBA(n){
  if (n === undefined || n === null) return '#ffffff';
  const b = (n >>> 24) & 0xff;
  const g = (n >>> 16) & 0xff;
  const r = (n >>>  8) & 0xff;
  const a = (n >>>  0) & 0xff;
  return 'rgba(' + r + ',' + g + ',' + b + ',' + (a / 255).toFixed(3) + ')';
}
function extractColorLayers(font, glyph){
  if (!font || !font.tables) return null;
  const colr = font.tables.colr;
  const cpal = font.tables.cpal;
  if (!colr || !cpal) return null;
  const baseRecs = colr.baseGlyphRecords || [];
  const layerRecs = colr.layerRecords || [];
  if (!baseRecs.length || !layerRecs.length) return null;     // COLR v1-only or empty
  // baseGlyphRecord shape: { glyphID, firstLayerIndex, numLayers }
  const base = baseRecs.find(r => r.glyphID === glyph.index);
  if (!base) return null;
  const start = base.firstLayerIndex || 0;
  const count = base.numLayers || 0;
  if (!count) return null;
  const records = cpal.colorRecords || [];
  // CPAL palette indices: paletteIndex 0xFFFF = "use foreground color"
  const FOREGROUND = 0xFFFF;
  const out = [];
  for (let i = 0; i < count; i++){
    const L = layerRecs[start + i];
    if (!L) continue;
    const layerGlyph = font.glyphs.get(L.glyphID);
    if (!layerGlyph) continue;
    const palIdx = L.paletteIndex;
    const fill = (palIdx === FOREGROUND) ? null : cpalIntToRGBA(records[palIdx]);
    out.push({ glyph: layerGlyph, fill });
  }
  return out.length ? out : null;
}
// Best-effort summary used by the UI pill — not load-bearing for render.
function describeColorSupport(font){
  if (!font || !font.tables || !font.tables.colr) return null;
  const recs = (font.tables.colr.baseGlyphRecords || []).length;
  return recs > 0
    ? { type: 'v0', layers: recs }
    : { type: 'v1', layers: 0 };       // v1 detected, layers not decoded
}

const FONT_MODES = [
  { id:'dance',   label:'dance' },
  { id:'vibrate', label:'vibrate' },
  { id:'wave',    label:'wave' },
  { id:'melt',    label:'melt' },
  { id:'chaos',   label:'chaos' },
  { id:'magnet',  label:'magnet' },
];
// Per-VERTEX distortion (chat ask: "refactor sloppy-font to use raw
// vector path data from OpenType.js 2.0.0 instead of basic SVG text").
// Earlier revision composed CSS transforms on each glyph's <g> — that
// was rigid-body animation, the M/L/Q/C control points themselves
// never moved. This refactor walks the raw `commands` array we now
// cache from `glyph.getPath(...)` and remaps every (x, y) — including
// bezier control points (x1/y1, x2/y2) — through one of these
// functions before rebuilding the `d` string each frame. Result:
// letterforms genuinely deform at the bezier level (curves bulge,
// stems ripple) instead of just translating as a unit.
//
// Signature: distort(x, y, t, glyphIdx, vtxIdx, glyphHeight) → [x', y']
const FONT_DISTORTIONS = {
  // dance — vertical sin wave whose phase shifts with glyph index AND
  // along the x axis of each vertex, so even a single wide glyph
  // ripples instead of moving as a slab.
  dance: (x, y, t, gi, vi, h) => [
    x,
    y + Math.sin(t * 4 + gi * 0.55 + x * 0.045) * 8,
  ],
  // vibrate — independent micro-jitter per vertex, re-seeded every
  // frame. Curves get jittery in their middle as well as their
  // endpoints because control points are jittered too.
  vibrate: (x, y, t, gi, vi, h) => [
    x + (Math.random() - 0.5) * 3.2,
    y + (Math.random() - 0.5) * 3.2,
  ],
  // wave — y modulated by a travelling wave along x; glyph index
  // staggers the phase. A glyph mid-rise looks like a flag.
  wave: (x, y, t, gi, vi, h) => [
    x,
    y + Math.sin(t * 3 + gi * 0.4 + x * 0.06) * 12,
  ],
  // melt — points further down the glyph (higher y) drift further
  // down, scaled by depth so the top of the letter stays fixed and
  // the bottom droops/stretches like wax.
  melt: (x, y, t, gi, vi, h) => {
    const depth = h > 0 ? Math.max(0, Math.min(1, y / h)) : 0;
    const drip = (Math.sin(t * 1.6 + gi * 0.7 + vi * 0.2) * 0.5 + 0.5) * 18 * depth;
    return [x, y + drip];
  },
  // chaos — combine sin offsets with a tiny random per-vertex twist
  // so the letterform writhes. control-points + endpoints all share
  // the same noise field which keeps curves smooth.
  chaos: (x, y, t, gi, vi, h) => [
    x + Math.sin(t * 2.6 + vi * 0.4 + gi) * 5 + (Math.random() - 0.5) * 1.4,
    y + Math.cos(t * 2.2 + vi * 0.3 + gi * 0.6) * 5 + (Math.random() - 0.5) * 1.4,
  ],
  // magnet — identity base; distortion comes from the mouse-proximity
  // post-step in distortCommands(). When the cursor is far from the
  // letter (or off the SVG entirely) the glyph sits perfectly still.
  // (chat ask: "make the letters distort based on mouse proximity")
  magnet: (x, y, t, gi, vi, h) => [x, y],
};

// Render an opentype.js commands array back to an SVG path "d" string.
// This is the same shape opentype emits internally for `toPathData()`,
// just rebuilt from possibly-distorted commands. Numbers truncated to
// 2 decimals for compact d-strings.
function commandsToD(cmds){
  const f = (n) => (Math.round(n * 100) / 100).toString();
  let s = '';
  for (let i = 0; i < cmds.length; i++){
    const c = cmds[i];
    switch (c.type){
      case 'M': s += 'M' + f(c.x) + ',' + f(c.y); break;
      case 'L': s += 'L' + f(c.x) + ',' + f(c.y); break;
      case 'C': s += 'C' + f(c.x1) + ',' + f(c.y1) + ' ' + f(c.x2) + ',' + f(c.y2) + ' ' + f(c.x) + ',' + f(c.y); break;
      case 'Q': s += 'Q' + f(c.x1) + ',' + f(c.y1) + ' ' + f(c.x) + ',' + f(c.y); break;
      case 'Z': s += 'Z'; break;
    }
  }
  return s;
}
// Per-vertex distortion sweep: clones every command and runs each
// (x,y) coordinate pair through the distortion function. Touches
// endpoints, quadratic control (x1,y1), and cubic controls
// (x1,y1)/(x2,y2). Z (close path) has no points to move.
//
// `env` (optional) applies a mouse-proximity push on top of the base
// distortion: { mx, my, mActive, slotX, radius, strength }. Mouse
// coords are SVG-space; we subtract the glyph's slotX to convert to
// glyph-local before measuring distance. The push direction is AWAY
// from the cursor (it's a repel/magnet field, not suction) with a
// quadratic falloff inside `radius`. Behaviour applies to ALL base
// modes — even with `mode='dance'` the letters will shy away from
// the cursor — and the dedicated `magnet` mode has identity base so
// the mouse field is the ONLY motion.
function distortCommands(commands, t, glyphIdx, glyphHeight, mode, env){
  const fn = FONT_DISTORTIONS[mode] || FONT_DISTORTIONS.dance;
  const useEnv = env && env.mActive;
  const slotX = env ? env.slotX : 0;
  const r2  = useEnv ? (env.radius * env.radius) : 0;
  const r   = useEnv ? env.radius : 0;
  const str = useEnv ? env.strength : 0;
  // local mouse position in glyph-local coords
  const mxL = useEnv ? (env.mx - slotX) : 0;
  const myL = useEnv ? env.my : 0;

  // Apply base distortion + magnet push for one (x, y).
  function distortPoint(px, py, vi){
    const base = fn(px, py, t, glyphIdx, vi, glyphHeight);
    let x = base[0], y = base[1];
    if (useEnv){
      const dx = x - mxL, dy = y - myL;
      const d2 = dx * dx + dy * dy;
      if (d2 < r2 && d2 > 1){
        const d = Math.sqrt(d2);
        const k = 1 - d / r;            // 0 at edge → 1 at cursor
        const push = k * k * str;       // quadratic falloff
        x += (dx / d) * push;
        y += (dy / d) * push;
      }
    }
    return [x, y];
  }

  const out = new Array(commands.length);
  let vtx = 0;
  for (let i = 0; i < commands.length; i++){
    const c = commands[i];
    const o = { type: c.type };
    if (c.type === 'Z'){ out[i] = o; continue; }
    if (c.type === 'C'){
      const a = distortPoint(c.x1, c.y1, vtx++);
      const b = distortPoint(c.x2, c.y2, vtx++);
      const e = distortPoint(c.x,  c.y,  vtx++);
      o.x1 = a[0]; o.y1 = a[1];
      o.x2 = b[0]; o.y2 = b[1];
      o.x  = e[0]; o.y  = e[1];
    } else if (c.type === 'Q'){
      const a = distortPoint(c.x1, c.y1, vtx++);
      const e = distortPoint(c.x,  c.y,  vtx++);
      o.x1 = a[0]; o.y1 = a[1];
      o.x  = e[0]; o.y  = e[1];
    } else {
      const e = distortPoint(c.x, c.y, vtx++);
      o.x = e[0]; o.y = e[1];
    }
    out[i] = o;
  }
  return out;
}

function spawnFont(){
  const root = document.createElement('div');
  root.className = 'font-app';
  root.innerHTML =
    '<div class="input-row">' +
      '<label for="fontTextInput">TEXT</label>' +
      '<input id="fontTextInput" type="text" maxlength="20" value="SLOPPY" autocomplete="off" spellcheck="false">' +
      '<label for="fontFamilySel" style="margin-left:.4rem">FONT</label>' +
      '<select id="fontFamilySel" data-role="font-sel" ' +
        'style="background:rgba(2,1,12,0.6);color:var(--text);border:1px solid rgba(255,255,255,0.16);' +
        'border-radius:.32rem;padding:.42rem .55rem;font-family:\'JetBrains Mono\',monospace;' +
        'font-size:.78rem;letter-spacing:.04em;outline:none;cursor:pointer;min-width:8rem">' +
      '</select>' +
    '</div>' +
    '<div class="modes" role="radiogroup" aria-label="Animation mode"></div>' +
    '<div class="stage" data-role="stage">' +
      '<div class="status">loading opentype.js 2.0.0…</div>' +
    '</div>' +
    '<div class="ctrls">' +
      '<label for="fontColor">COLOR</label>' +
      '<input id="fontColor" type="color" value="#ff4dc8">' +
      '<label for="fontSize">SIZE</label>' +
      '<input id="fontSize" type="range" min="48" max="180" value="120">' +
      '<span class="size-out" data-role="size-out">120</span>' +
      '<button type="button" class="pause-btn" data-role="pause" data-paused="false">❚❚ pause</button>' +
      '<button type="button" class="pause-btn" data-role="magnet" data-on="true" title="Toggle mouse-proximity distortion">◉ magnet · on</button>' +
      '<span class="pause-btn" data-role="colr" style="display:none;color:var(--dim);border-color:rgba(255,255,255,0.2);cursor:default" title="COLR/CPAL color-font support: v0 renders layered, v1 falls back to monochrome (lib limitation)">COLR · mono</span>' +
      '<span class="size-out" data-role="vtx" style="color:var(--cyan);min-width:auto;letter-spacing:.08em" title="raw vector points being distorted every frame">— verts · — glyphs</span>' +
      '<button type="button" class="download-btn" data-role="download">▼ snapshot svg</button>' +
    '</div>';
  const stageEl   = root.querySelector('[data-role="stage"]');
  const inputEl   = root.querySelector('#fontTextInput');
  const colorEl   = root.querySelector('#fontColor');
  const sizeEl    = root.querySelector('#fontSize');
  const sizeOutEl = root.querySelector('[data-role="size-out"]');
  const pauseEl   = root.querySelector('[data-role="pause"]');
  const downloadEl= root.querySelector('[data-role="download"]');
  const vtxOutEl  = root.querySelector('[data-role="vtx"]');
  const colrPillEl= root.querySelector('[data-role="colr"]');
  const modesEl   = root.querySelector('.modes');

  const fontState = {
    text: 'SLOPPY',
    mode: 'dance',
    color: '#ff4dc8',
    size: 120,
    paused: false,
    glyphs: [],
    bounds: null,
    vtxOutEl,
    colrPillEl,
    // Mouse-proximity field. Tracked in SVG-local coords so glyph
    // distortion math is straightforward; populated in the pointermove
    // handler attached after rebuildGlyphs creates the SVG.
    mouse: { x: 0, y: 0, active: false },
    magnetRadius: 110,    // glyph-local px
    magnetStrength: 28,   // peak push at the cursor itself
    // Optional magnet toggle (chat ask: "make the mouse distortion an
    // optional toggle in the UI"). Default ON to keep the playful
    // discoverability of the previous version, but can be flipped off
    // — when off, the rAF tick skips the env entirely so letters run
    // their pure base-mode animation regardless of cursor position.
    magnetEnabled: true,
  };

  // build mode pills
  for (const m of FONT_MODES){
    const btn = document.createElement('button');
    btn.className = 'mode'; btn.type = 'button'; btn.dataset.mode = m.id;
    btn.setAttribute('aria-pressed', fontState.mode === m.id ? 'true' : 'false');
    btn.textContent = m.label;
    btn.addEventListener('click', () => {
      fontState.mode = m.id;
      modesEl.querySelectorAll('.mode').forEach(o => o.setAttribute('aria-pressed', o.dataset.mode === m.id ? 'true' : 'false'));
    });
    modesEl.appendChild(btn);
  }

  // build font selector
  const fontSelEl = root.querySelector('[data-role="font-sel"]');
  for (const f of FONT_LIBRARY){
    const opt = document.createElement('option');
    opt.value = f.id;
    opt.textContent = f.label;
    fontSelEl.appendChild(opt);
  }
  fontSelEl.value = FONT_APP.activeId;
  // Per-font default text. Twemoji has emoji + digits but NO Latin
  // glyphs, so the default "SLOPPY" would render as 6 .notdef boxes.
  // We auto-swap to a sensible default when the user picks a font that
  // can't render any of the current text — but if they typed something
  // the new font CAN render, we leave their text alone.
  const FONT_DEFAULT_TEXT = {
    twemoji: '🎉🔥❤️⭐🍕',
  };
  function fontHasAnyGlyph(font, text){
    if (!font || !text) return false;
    for (const ch of text){
      const g = font.charToGlyph(ch);
      if (g && g.index !== 0) return true;
    }
    return false;
  }
  fontSelEl.addEventListener('change', async () => {
    const id = fontSelEl.value;
    setStatus('loading font · ' + id + ' …');
    try {
      await loadFont(id);
      FONT_APP.activeId = id;
      const newFont = getActiveFont();
      if (!fontHasAnyGlyph(newFont, fontState.text)){
        const def = FONT_DEFAULT_TEXT[id] || 'SLOPPY';
        fontState.text = def;
        inputEl.value = def;
      }
      rebuildGlyphs();
    } catch(err){
      console.warn('[sloppy-font] font load failed:', err);
      setStatus('font load failed · ' + (err && err.message || err), true);
      fontSelEl.value = FONT_APP.activeId;     // revert dropdown
    }
  });

  function setStatus(text, isErr){
    stageEl.innerHTML = '<div class="status' + (isErr ? ' err' : '') + '">' + escHtml(text) + '</div>';
  }
  function rebuildGlyphs(){
    const font = getActiveFont();
    if (!font) return;
    const text = fontState.text;
    const fs = fontState.size;
    // Lay out from x=0 along the baseline; baseline at y=fs*0.85 so the
    // ascender fits inside the viewBox above.
    const svgNS = 'http://www.w3.org/2000/svg';
    const svg = document.createElementNS(svgNS, 'svg');
    svg.setAttribute('xmlns', svgNS);
    let x = 0;
    const baselineY = fs * 0.85;
    const groups = [];
    let maxAscent = 0, maxDescent = 0;
    // Helper: clone an opentype commands array deep enough that the
    // distortion loop can't alias the originals back into the cache.
    const cloneCommands = (cmds) => cmds.map(c => {
      const o = { type: c.type };
      if ('x'  in c){ o.x  = c.x;  o.y  = c.y;  }
      if ('x1' in c){ o.x1 = c.x1; o.y1 = c.y1; }
      if ('x2' in c){ o.x2 = c.x2; o.y2 = c.y2; }
      return o;
    });
    for (let i = 0; i < text.length; i++){
      const ch = text[i];
      const glyph = font.charToGlyph(ch);
      const advance = (glyph.advanceWidth || 0) * (fs / font.unitsPerEm);
      // COLR-aware: try to extract color layers; null = monochrome
      const colrLayers = extractColorLayers(font, glyph);
      const layerSpecs = colrLayers || [{ glyph, fill: null }];
      // Use the BASE glyph's bounding box for height + ascent math
      // (layers share the same glyph metrics by construction).
      const basePath = glyph.getPath(0, baselineY, fs);
      let bb = null;
      try { bb = basePath.getBoundingBox(); } catch(_){}
      const glyphHeight = bb ? Math.max(1, bb.y2 - bb.y1) : fs;
      const g = document.createElementNS(svgNS, 'g');
      g.setAttribute('transform', 'translate(' + x + ',0)');
      // Build a <path> per layer. Each layer caches its OWN commands
      // array so the per-frame distortion loop walks the union of
      // layer commands across all glyphs.
      const layerEntries = [];
      for (const spec of layerSpecs){
        const lp = spec.glyph.getPath(0, baselineY, fs);
        const commands = cloneCommands(lp.commands);
        const p = document.createElementNS(svgNS, 'path');
        p.setAttribute('d', commandsToD(commands));
        p.setAttribute('fill', spec.fill || fontState.color);
        if (spec.fill) p.dataset.colrFill = '1';   // skip global color picker overrides
        g.appendChild(p);
        layerEntries.push({ el: p, commands });
      }
      svg.appendChild(g);
      groups.push({
        layers: layerEntries,    // [{el, commands}, ...] — 1 entry for mono, N for COLR
        slotX: x,
        advanceWidth: advance,
        glyphHeight,
        glyphTop: bb ? bb.y1 : (baselineY - fs),
        isColor: !!colrLayers,
      });
      x += advance;
      if (bb){
        maxAscent  = Math.max(maxAscent,  baselineY - bb.y1);
        maxDescent = Math.max(maxDescent, bb.y2 - baselineY);
      }
    }
    // viewBox: extra padding so per-vertex distortion doesn't clip.
    const padX = fs * 0.5, padY = fs * 0.6;
    const totalW = x + padX * 2;
    const totalH = (maxAscent + maxDescent) + padY * 2 || fs * 1.4;
    svg.setAttribute('viewBox', (-padX) + ' ' + ((baselineY - maxAscent) - padY) + ' ' + totalW + ' ' + totalH);
    svg.setAttribute('width',  totalW);
    svg.setAttribute('height', totalH);
    svg.style.maxWidth = '100%';
    stageEl.innerHTML = '';
    stageEl.appendChild(svg);
    fontState.glyphs = groups;
    fontState.svg = svg;
    fontState.viewBox = svg.getAttribute('viewBox');
    // Update the live readouts so chat can see the refactor is hitting
    // raw commands AND the COLR layer extraction is firing when the
    // font supports it.
    let vtxCount = 0, layerCount = 0;
    for (const g of groups){
      for (const layer of g.layers){
        layerCount += 1;
        for (const c of layer.commands){
          if (c.type === 'C') vtxCount += 3;
          else if (c.type === 'Q') vtxCount += 2;
          else if (c.type === 'M' || c.type === 'L') vtxCount += 1;
        }
      }
    }
    fontState.vtxCount = vtxCount;
    if (fontState.vtxOutEl){
      fontState.vtxOutEl.textContent = vtxCount + ' verts · ' + groups.length + ' glyphs' +
        (layerCount > groups.length ? ' · ' + layerCount + ' layers' : '');
    }
    // COLR pill: reports which color path is engaged.
    if (fontState.colrPillEl){
      const support = describeColorSupport(font);
      if (!support){
        fontState.colrPillEl.style.display = 'none';
      } else {
        fontState.colrPillEl.style.display = '';
        if (support.type === 'v0' && layerCount > groups.length){
          fontState.colrPillEl.textContent = '🌈 COLR v0 · layered';
          fontState.colrPillEl.style.color = 'var(--lime)';
          fontState.colrPillEl.style.borderColor = 'var(--lime)';
        } else if (support.type === 'v1'){
          fontState.colrPillEl.textContent = '⚠ COLR v1 · mono fallback';
          fontState.colrPillEl.style.color = 'var(--gold)';
          fontState.colrPillEl.style.borderColor = 'var(--gold)';
        } else {
          fontState.colrPillEl.textContent = 'COLR · mono';
          fontState.colrPillEl.style.color = 'var(--dim)';
          fontState.colrPillEl.style.borderColor = 'rgba(255,255,255,0.2)';
        }
      }
    }
  }

  // ── ANIMATION LOOP — RAW VECTOR PATH DATA REFACTOR ──
  // Instead of slapping a CSS transform on each glyph's <g>, we now
  // walk the cached opentype.js commands array, distort every
  // (x,y) — including bezier control points — through the active
  // mode's distortion function, and re-emit a fresh `d` string on
  // each glyph's <path> every frame. This means letterforms genuinely
  // BEND at the curve level (stems ripple, bowls breathe, descenders
  // droop) rather than translating as rigid bodies.
  let rafId = null;
  let t0 = performance.now();
  function tick(now){
    if (fontState.glyphs.length){
      // We tick even while paused if the magnet is active — the user
      // expects to drag the cursor and SEE letters react. Base time
      // freezes when paused so dance/wave/etc. stop, but mouse pull
      // still applies.
      const t = fontState.paused ? 0 : (now - t0) / 1000;
      const mode = fontState.mode;
      const m = fontState.mouse;
      // env is only built when the magnet toggle is ON — saves a per-
      // glyph object allocation each frame when the user has it off.
      const magnetActive = fontState.magnetEnabled && m.active;
      for (let i = 0; i < fontState.glyphs.length; i++){
        const g = fontState.glyphs[i];
        const env = magnetActive ? {
          mActive: true,
          mx: m.x, my: m.y,
          slotX: g.slotX,
          radius: fontState.magnetRadius,
          strength: fontState.magnetStrength,
        } : null;
        // Walk the glyph's layer stack — 1 layer for monochrome
        // glyphs, N layers when COLR returned color records. Each
        // layer animates its own `commands` array independently so
        // the colour bands of a Bungee-Spice-style font would slide
        // past each other when distorted (when v0 layers exist).
        for (let li = 0; li < g.layers.length; li++){
          const layer = g.layers[li];
          const distorted = distortCommands(layer.commands, t, i, g.glyphHeight, mode, env);
          layer.el.setAttribute('d', commandsToD(distorted));
        }
      }
    }
    rafId = requestAnimationFrame(tick);
  }
  rafId = requestAnimationFrame(tick);

  // ── MOUSE PROXIMITY TRACKING ───────────────────────────────────
  // Convert pointer (clientX, clientY) → SVG-local coords via the
  // SVG's getScreenCTM inverse. Listener is attached on the stage
  // wrapper so the cursor doesn't have to be exactly over a glyph
  // for the magnet to read it; pointerleave on the stage clears
  // `active` so glyphs spring back when the cursor exits.
  function attachMouseListeners(){
    if (!fontState.svg) return;
    const wrap = stageEl;
    const updateFromEvent = (e) => {
      const svg = fontState.svg;
      if (!svg) return;
      const ctm = svg.getScreenCTM();
      if (!ctm) return;
      const pt = svg.createSVGPoint();
      pt.x = e.clientX; pt.y = e.clientY;
      const local = pt.matrixTransform(ctm.inverse());
      fontState.mouse.x = local.x;
      fontState.mouse.y = local.y;
      fontState.mouse.active = true;
    };
    wrap.addEventListener('pointermove',  updateFromEvent);
    wrap.addEventListener('pointerenter', updateFromEvent);
    wrap.addEventListener('pointerleave', () => { fontState.mouse.active = false; });
    // touch support — pointermove fires for touch already, but explicit
    // touchstart helps on iOS Safari which can swallow the first event.
    wrap.addEventListener('touchstart', e => {
      if (e.touches.length){
        updateFromEvent(e.touches[0]);
      }
    }, { passive: true });
  }
  // Hook listeners after the SVG exists. rebuildGlyphs replaces the
  // SVG node every text/size change, so we re-attach inside that path.
  const origRebuild = rebuildGlyphs;
  rebuildGlyphs = function(){
    origRebuild();
    attachMouseListeners();
  };

  // ── INPUT WIRING ──
  inputEl.addEventListener('input', () => {
    fontState.text = inputEl.value || ' ';
    rebuildGlyphs();
  });
  colorEl.addEventListener('input', () => {
    fontState.color = colorEl.value;
    root.style.setProperty('--font-glow', colorEl.value);
    if (fontState.svg){
      // Skip paths whose fill came from CPAL — those are owned by the
      // color font's palette, not the user's color picker.
      fontState.svg.querySelectorAll('path').forEach(p => {
        if (p.dataset.colrFill !== '1') p.setAttribute('fill', fontState.color);
      });
    }
  });
  sizeEl.addEventListener('input', () => {
    fontState.size = parseInt(sizeEl.value, 10);
    sizeOutEl.textContent = fontState.size;
    rebuildGlyphs();
  });
  pauseEl.addEventListener('click', () => {
    fontState.paused = !fontState.paused;
    pauseEl.dataset.paused = String(fontState.paused);
    pauseEl.textContent = fontState.paused ? '▶ resume' : '❚❚ pause';
  });
  const magnetBtn = root.querySelector('[data-role="magnet"]');
  magnetBtn.addEventListener('click', () => {
    fontState.magnetEnabled = !fontState.magnetEnabled;
    magnetBtn.dataset.on = String(fontState.magnetEnabled);
    magnetBtn.textContent = fontState.magnetEnabled ? '◉ magnet · on' : '○ magnet · off';
  });
  downloadEl.addEventListener('click', () => {
    if (!fontState.svg) return;
    // Snapshot the CURRENT animated transforms by serialising the live SVG.
    const xml = new XMLSerializer().serializeToString(fontState.svg);
    const blob = new Blob([xml], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'sloppy-font-' + Date.now() + '.svg';
    document.body.appendChild(a); a.click(); a.remove();
    setTimeout(() => URL.revokeObjectURL(url), 1000);
  });
  // initial color glow var
  root.style.setProperty('--font-glow', fontState.color);

  // Auto-cleanup when window closes — same MutationObserver pattern as music.
  setTimeout(() => {
    const win = root.closest('.win');
    if (!win) return;
    const obs = new MutationObserver(() => {
      if (!document.body.contains(win)){
        if (rafId) cancelAnimationFrame(rafId);
        obs.disconnect();
      }
    });
    obs.observe(document.body, { childList: true, subtree: true });
  }, 50);

  // Lazy-load lib + font, then render the default text. Errors surface
  // in the stage area as a rose-coloured status line.
  loadFont().then(() => {
    rebuildGlyphs();
  }).catch(err => {
    console.warn('[sloppy-font] load failed:', err);
    setStatus('font load failed · ' + (err && err.message || err), true);
  });

  return root;
}
function spawnFontWindow(){
  return spawnWindow({ title: 'font — opentype glyphs', app: 'font', w: 720, h: 460, body: spawnFont() });
}

// ── LOFI MUSIC + PAINT-REACTIVE VISUALIZER ─────────────────────────
// (chat ask: "add a lofi music player to sloppy-desktop with a
// visualizer that reacts to the paint canvas"). The reactive part is
// the interesting twist — instead of pure FFT bars, we sample any
// open paint window's canvas-stack to drive the BAR COLORS each frame
// while the FFT of the actual music drives BAR HEIGHTS. Result: while
// the user paints, their artwork becomes the visualizer's palette in
// real time. Falls back to a default cyan→pink gradient when no paint
// canvas is open.
const SHARED_AUDIO = { ctx: null, master: null, analyser: null };
function ensureMusicAudio(){
  if (SHARED_AUDIO.ctx) return SHARED_AUDIO;
  const C = (window.AudioContext || window.webkitAudioContext);
  const ctx = new C();
  // Lower master ceiling (was 0.4 → 0.3) so the floor sits quieter
  // overall — the user's volume slider can still ride it back up.
  const master = ctx.createGain(); master.gain.value = 0.3;
  // A gentle limiter on the master keeps transients from running away
  // without audibly squashing the chord pad.
  const limiter = ctx.createDynamicsCompressor();
  limiter.threshold.value = -8;
  limiter.knee.value = 12;
  limiter.ratio.value = 6;
  limiter.attack.value = 0.005;
  limiter.release.value = 0.18;
  // Master tilt-EQ: small high-shelf cut to roll off the synth-grit
  // band that was making the lofi feel sharp on near-field speakers.
  const tilt = ctx.createBiquadFilter();
  tilt.type = 'highshelf';
  tilt.frequency.value = 4000;
  tilt.gain.value = -6;
  const analyser = ctx.createAnalyser(); analyser.fftSize = 256;
  master.connect(tilt); tilt.connect(limiter); limiter.connect(analyser); analyser.connect(ctx.destination);
  SHARED_AUDIO.ctx = ctx; SHARED_AUDIO.master = master; SHARED_AUDIO.analyser = analyser;
  return SHARED_AUDIO;
}

// Note name → frequency in Hz. Accepts e.g. "A3", "F#4", "Bb2".
function noteHz(n){
  const m = n.match(/^([A-G])([#b]?)(-?\d+)$/);
  if (!m) return 440;
  const semis = { C:0, D:2, E:4, F:5, G:7, A:9, B:11 };
  let s = semis[m[1]];
  if (m[2] === '#') s += 1;
  if (m[2] === 'b') s -= 1;
  const midi = 12 * (parseInt(m[3], 10) + 1) + s;
  return 440 * Math.pow(2, (midi - 69) / 12);
}

// One playback session — kept per-window so multiple music apps can run independently.
function makePlayback(){
  const p = {
    track:    null,
    voices:   [],     // active oscillators / nodes for cleanup
    rainNode: null,
    rainGain: null,
    chordIdx: 0,
    bar:      0,
    timer:    null,
    playing:  false,
  };
  return p;
}

function startTrack(playback, track){
  stopTrack(playback);
  const A = ensureMusicAudio();
  const ctx = A.ctx;
  if (ctx.state === 'suspended') ctx.resume();

  // ── PAD: stacked sines per chord-note through a slow LFO-modulated
  // lowpass. Tweaks (chat ask: "tweak the lofi synth to reduce the noise
  // floor and smooth out the oscillator grit"):
  //   • Lowpass cutoff dropped 1100 → 820 Hz so the upper-mid grit
  //     (where stacked oscillators sound saw-edged) never reaches the
  //     master bus.
  //   • LFO sweep amplitude 280 → 160 so the cutoff doesn't open all
  //     the way to brightness and bring grit back in.
  //   • Lowpass Q raised 0.8 → 0.55: shallower resonance, no whistle.
  //   • A second post-reverb damp lowpass at 2.6kHz darkens the wet
  //     tail (the noise-IR was the loudest contributor to "hiss").
  const trackBus = ctx.createGain(); trackBus.gain.value = 1;
  const lp = ctx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 820; lp.Q.value = 0.55;
  const lfo = ctx.createOscillator(); lfo.frequency.value = 0.08;
  const lfoGain = ctx.createGain(); lfoGain.gain.value = 160;
  lfo.connect(lfoGain); lfoGain.connect(lp.frequency); lfo.start();

  // Noise-impulse convolver reverb. The IR itself is now low-pass
  // softened in-place via a 4-tap moving average so the wet tail isn't
  // hissy white-noise. Decay shape eased from 2.2 → 2.6 for a longer
  // gentler tail without raising overall energy.
  const rev = ctx.createConvolver();
  const rb = ctx.createBuffer(2, ctx.sampleRate * 2.4, ctx.sampleRate);
  for (let ch = 0; ch < 2; ch++){
    const data = rb.getChannelData(ch);
    for (let i = 0; i < data.length; i++){
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 2.6);
    }
    // 4-tap rolling-average: kills the brightest noise bins, leaving a
    // warmer pad-tail. Done in-place since the IR isn't reused.
    for (let i = 3; i < data.length; i++){
      data[i] = (data[i] + data[i-1] + data[i-2] + data[i-3]) * 0.25;
    }
  }
  rev.buffer = rb;
  // Post-reverb damp: a second lowpass on the wet bus stops the tail
  // adding back the high-end the pre-reverb LP already removed.
  const wetDamp = ctx.createBiquadFilter();
  wetDamp.type = 'lowpass'; wetDamp.frequency.value = 2600; wetDamp.Q.value = 0.5;
  const wet = ctx.createGain(); wet.gain.value = 0.26;
  const dry = ctx.createGain(); dry.gain.value = 0.72;
  trackBus.connect(lp);
  lp.connect(dry); dry.connect(A.master);
  lp.connect(rev); rev.connect(wetDamp); wetDamp.connect(wet); wet.connect(A.master);
  playback.voices.push(lfo, lfoGain, lp, rev, wetDamp, wet, dry, trackBus);

  // ── RAIN: bandpassed noise loop. Tweaks:
  //   • Per-track gain factor slashed by ~0.30 so the rain sits under
  //     the pad rather than competing with it.
  //   • Bandpass Q widened 0.7 → 1.6 (narrower band) so far less of the
  //     full-spectrum hiss leaks through — only the chosen freq band.
  //   • A series lowpass at 3.2kHz on top tames sibilance.
  //   • Source noise scaled 0.7 → 0.5 so the buffer itself is quieter.
  if (track.rain > 0){
    const noiseBuf = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
    const nd = noiseBuf.getChannelData(0);
    for (let i = 0; i < nd.length; i++) nd[i] = (Math.random() * 2 - 1) * 0.5;
    const noise = ctx.createBufferSource(); noise.buffer = noiseBuf; noise.loop = true;
    const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 1500; bp.Q.value = 1.6;
    const rainLp = ctx.createBiquadFilter(); rainLp.type = 'lowpass'; rainLp.frequency.value = 3200; rainLp.Q.value = 0.5;
    const rg = ctx.createGain(); rg.gain.value = track.rain * 0.30;
    noise.connect(bp); bp.connect(rainLp); rainLp.connect(rg); rg.connect(A.master);
    noise.start();
    playback.voices.push(noise, bp, rainLp, rg);
    playback.rainNode = noise; playback.rainGain = rg;
  }

  // ── CHORD CYCLE: each chord fires 3 sine voices through the trackBus.
  //    Tweaks for grit reduction:
  //      • Dropped the brighter 2× octave triangle voice — it was the
  //        single loudest grit source against the sine fundamentals.
  //      • Replaced with a fundamental-octave sine at 0.55× gain for
  //        body, plus a -7 cent detuned sine for gentle chorus instead
  //        of the +6 cent bright detune.
  //      • Per-note gain ramps via setTargetAtTime (exponential) rather
  //        than linear, plus a 0.7s attack (was 0.4s linear) — softer
  //        onset, no transient spike on chord change.
  //      • Per-note release fades via exponential decay over the last
  //        0.9s of the bar instead of a hard linear-to-zero, killing
  //        the click-on-stop artifact.
  const beatMs = (60 / track.bpm) * 1000;
  const barMs  = beatMs * 4;
  function fireChord(chord){
    const t = ctx.currentTime;
    const barSec = barMs / 1000;
    const total = ctx.createGain(); total.gain.value = 0.0001;
    total.gain.setTargetAtTime(0.16, t, 0.32);                            // ~exponential 0.7s attack
    total.gain.setTargetAtTime(0,    t + barSec - 0.9, 0.3);              // gentle release
    total.connect(trackBus);
    for (const note of chord){
      const f = noteHz(note);
      // fundamental + soft detuned twin + low-octave body
      const o1 = ctx.createOscillator(); o1.type = 'sine'; o1.frequency.value = f;
      const o2 = ctx.createOscillator(); o2.type = 'sine'; o2.frequency.value = f; o2.detune.value = -7;
      const o3 = ctx.createOscillator(); o3.type = 'sine'; o3.frequency.value = f * 0.5;
      const g1 = ctx.createGain(); g1.gain.value = 0.22;
      const g2 = ctx.createGain(); g2.gain.value = 0.18;
      const g3 = ctx.createGain(); g3.gain.value = 0.12;
      o1.connect(g1); g1.connect(total);
      o2.connect(g2); g2.connect(total);
      o3.connect(g3); g3.connect(total);
      o1.start(t); o2.start(t); o3.start(t);
      o1.stop(t + barSec + 0.4);
      o2.stop(t + barSec + 0.4);
      o3.stop(t + barSec + 0.4);
    }
    // Soft kick on beat 1: peak gain 0.45 → 0.30 (less thumpy), longer
    // 6ms attack to soften the click, lowpass on its own bus to cut
    // any aliasing whistle from the fast freq sweep.
    const kFilt = ctx.createBiquadFilter(); kFilt.type = 'lowpass'; kFilt.frequency.value = 220; kFilt.Q.value = 0.6;
    const k = ctx.createOscillator(); const kg = ctx.createGain();
    k.type = 'sine'; k.frequency.setValueAtTime(80, t); k.frequency.exponentialRampToValueAtTime(40, t + 0.18);
    kg.gain.setValueAtTime(0, t);
    kg.gain.linearRampToValueAtTime(0.30, t + 0.006);
    kg.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
    k.connect(kFilt); kFilt.connect(kg); kg.connect(A.master);
    k.start(t); k.stop(t + 0.26);
  }

  playback.chordIdx = 0;
  fireChord(track.chords[0]);
  playback.timer = setInterval(() => {
    playback.chordIdx = (playback.chordIdx + 1) % track.chords.length;
    fireChord(track.chords[playback.chordIdx]);
  }, barMs);
  playback.track = track;
  playback.playing = true;
}
function stopTrack(playback){
  if (playback.timer){ clearInterval(playback.timer); playback.timer = null; }
  for (const node of playback.voices){
    try { node.stop && node.stop(); } catch(_){}
    try { node.disconnect && node.disconnect(); } catch(_){}
  }
  playback.voices.length = 0;
  playback.rainNode = null; playback.rainGain = null;
  playback.playing = false; playback.track = null;
}

function spawnMusic(){
  const root = document.createElement('div');
  root.className = 'music';
  root.innerHTML =
    '<div class="viz-wrap">' +
      '<canvas data-role="viz"></canvas>' +
      '<span class="src-pill" data-role="src">SRC · IDLE</span>' +
    '</div>' +
    '<div class="now">' +
      '<span class="title" data-role="title">— pick a track —</span>' +
      '<span class="meta">BPM <b data-role="bpm">—</b></span>' +
      '<div class="vol"><label for="musicVol">VOL</label><input id="musicVol" type="range" min="0" max="100" value="40" data-role="vol"></div>' +
      '<div class="transport">' +
        '<button type="button" class="prev" aria-label="Previous">◀</button>' +
        '<button type="button" class="play" aria-label="Play / pause">▶</button>' +
        '<button type="button" class="next" aria-label="Next">▶▶</button>' +
        '<button type="button" class="stop" aria-label="Stop">■</button>' +
      '</div>' +
    '</div>' +
    '<div class="tracklist" data-role="tracklist"></div>';

  const vizEl   = root.querySelector('[data-role="viz"]');
  const vizCtx  = vizEl.getContext('2d');
  const srcPill = root.querySelector('[data-role="src"]');
  const titleEl = root.querySelector('[data-role="title"]');
  const bpmEl   = root.querySelector('[data-role="bpm"]');
  const volEl   = root.querySelector('[data-role="vol"]');
  const tracklistEl = root.querySelector('[data-role="tracklist"]');

  const playback = makePlayback();
  let curIdx = 0;

  function renderTracklist(){
    tracklistEl.innerHTML = '';
    LOFI_TRACKS.forEach((t, i) => {
      const row = document.createElement('div');
      row.className = 'track' + (playback.playing && playback.track && playback.track.id === t.id ? ' playing' : '');
      row.innerHTML =
        '<span class="glyph">' + t.glyph + '</span>' +
        '<div style="flex:1;min-width:0">' +
          '<div class="name">' + escHtml(t.name) + '</div>' +
          '<div class="desc">' + escHtml(t.desc) + '</div>' +
        '</div>' +
        '<span class="bpm">' + t.bpm + ' bpm</span>';
      row.addEventListener('click', () => playIdx(i));
      tracklistEl.appendChild(row);
    });
  }
  function setNow(t){
    titleEl.textContent = t ? t.name : '— pick a track —';
    bpmEl.textContent   = t ? t.bpm : '—';
    document.querySelector;
    renderTracklist();
  }

  function playIdx(i){
    curIdx = ((i % LOFI_TRACKS.length) + LOFI_TRACKS.length) % LOFI_TRACKS.length;
    const t = LOFI_TRACKS[curIdx];
    startTrack(playback, t);
    setNow(t);
  }
  function togglePlay(){
    if (playback.playing) { stopTrack(playback); setNow(null); }
    else { playIdx(curIdx); }
  }

  root.querySelector('.play').addEventListener('click', togglePlay);
  root.querySelector('.stop').addEventListener('click', () => { stopTrack(playback); setNow(null); });
  root.querySelector('.prev').addEventListener('click', () => playIdx(curIdx - 1));
  root.querySelector('.next').addEventListener('click', () => playIdx(curIdx + 1));
  volEl.addEventListener('input', e => {
    const A = ensureMusicAudio();
    A.master.gain.value = parseInt(e.target.value, 10) / 100 * 0.9;
  });

  renderTracklist();

  // ── PAINT-REACTIVE VISUALIZER ──
  // 64 vertical bars. Each frame we sample two data sources:
  //   1. The OPEN paint window's canvas-stack (composited via drawImage
  //      onto a tiny offscreen 64×16 canvas → getImageData → per-column
  //      avg colors). When the user paints, this changes immediately.
  //   2. The audio AnalyserNode FFT bytes (256 → take first 64 bins).
  // BAR COLOR comes from (1) — falling back to a cyan→pink gradient if
  // no paint canvas is open or all sampled columns are dark. BAR HEIGHT
  // comes from (2) — falling back to a soft idle wave if music is off.
  const BARS = 64;
  const sampleC = document.createElement('canvas'); sampleC.width = BARS; sampleC.height = 16;
  const sampleCtx = sampleC.getContext('2d', { willReadFrequently: true });
  const fftData = new Uint8Array(128);
  let rafId = null;
  let t0 = performance.now();

  function findPaintStack(){
    return document.querySelector('.canvas-stack');
  }

  function tickViz(now){
    const W = vizEl.width  = vizEl.clientWidth  * (window.devicePixelRatio || 1);
    const H = vizEl.height = vizEl.clientHeight * (window.devicePixelRatio || 1);
    vizCtx.clearRect(0, 0, W, H);

    // 1. paint canvas color sampling
    let paintColors = null;
    const stack = findPaintStack();
    if (stack){
      const layers = stack.querySelectorAll('canvas');
      sampleCtx.fillStyle = '#0a0420';
      sampleCtx.fillRect(0, 0, BARS, 16);
      let anyVis = false;
      for (const c of layers){
        if (c.dataset.vis === 'false') continue;
        anyVis = true;
        sampleCtx.drawImage(c, 0, 0, BARS, 16);
      }
      if (anyVis){
        const img = sampleCtx.getImageData(0, 0, BARS, 16).data;
        paintColors = [];
        let total = 0;
        for (let x = 0; x < BARS; x++){
          let r=0, g=0, b=0;
          for (let y = 0; y < 16; y++){
            const o = (y * BARS + x) * 4;
            r += img[o]; g += img[o + 1]; b += img[o + 2];
          }
          r /= 16; g /= 16; b /= 16;
          paintColors.push([r, g, b]);
          total += r + g + b;
        }
        // if the canvas is essentially black (no paint yet), drop colors
        if (total / BARS < 30) paintColors = null;
      }
    }
    // src pill
    if (paintColors){ srcPill.textContent = 'SRC · PAINT'; srcPill.className = 'src-pill paint'; }
    else if (playback.playing){ srcPill.textContent = 'SRC · FFT'; srcPill.className = 'src-pill fft'; }
    else { srcPill.textContent = 'SRC · IDLE'; srcPill.className = 'src-pill'; }

    // 2. FFT
    let heights;
    if (playback.playing && SHARED_AUDIO.analyser){
      SHARED_AUDIO.analyser.getByteFrequencyData(fftData);
      heights = new Array(BARS);
      for (let i = 0; i < BARS; i++) heights[i] = fftData[i] / 255;
    } else {
      // idle wave when music is off
      heights = new Array(BARS);
      const phase = (now - t0) / 600;
      for (let i = 0; i < BARS; i++){
        heights[i] = 0.18 + Math.sin(phase + i * 0.2) * 0.10 + Math.sin(phase * 0.7 + i * 0.05) * 0.06;
      }
    }

    // ── render bars ──
    const barW = W / BARS;
    for (let i = 0; i < BARS; i++){
      const h = Math.max(0.04, heights[i]);
      const bh = h * H * 0.92;
      // colour: paint or fallback cyan→pink gradient
      let r, g, b;
      if (paintColors){
        const c = paintColors[i];
        // boost saturation so pale paints still pop
        r = Math.min(255, c[0] * 1.2);
        g = Math.min(255, c[1] * 1.2);
        b = Math.min(255, c[2] * 1.2);
      } else {
        const t = i / (BARS - 1);
        r = Math.round(122 + (255 - 122) * t);
        g = Math.round(240 + (77  - 240) * t);
        b = Math.round(255 + (200 - 255) * t);
      }
      vizCtx.fillStyle = 'rgb(' + Math.round(r) + ',' + Math.round(g) + ',' + Math.round(b) + ')';
      vizCtx.shadowColor = vizCtx.fillStyle; vizCtx.shadowBlur = 8;
      const x = i * barW;
      vizCtx.fillRect(x + barW * 0.12, H - bh, barW * 0.76, bh);
    }
    vizCtx.shadowBlur = 0;
    rafId = requestAnimationFrame(tickViz);
  }
  rafId = requestAnimationFrame(tickViz);

  // Stop the rAF + audio when the window closes (via MutationObserver
  // on the desktop). We watch for the host .win element being removed.
  setTimeout(() => {
    const win = root.closest('.win');
    if (!win) return;
    const obs = new MutationObserver(() => {
      if (!document.body.contains(win)){
        if (rafId) cancelAnimationFrame(rafId);
        stopTrack(playback);
        obs.disconnect();
      }
    });
    obs.observe(document.body, { childList: true, subtree: true });
  }, 50);

  return root;
}

// UNIVERSAL APP LIBRARY (the sloppy.live launcher window)
// A curated catalogue of 60 apps from across the sloppy.live ecosystem
// — games, tools, viz, audio, social, rng — searchable + category-
// filtered + one-click-launch into a new tab via window.open. This is
// the OS's "Applications" folder equivalent: instead of bundling the
// apps into this shell, it indexes the real running apps on the live
// site so the desktop becomes a launcher front-end for the platform.
// ══════════════════════════════════════════════════════════════════
// Universe of apps now sourced from app-directory's index.json (rebuilt
// by /vibespace/apps/app-directory/build-index.sh — scans every app dir,
// extracts title + desc + creator credits + genre cascade). The library
// lazy-fetches it on first window open and caches the parsed array;
// subsequent opens are instant. If the fetch fails we fall back to a
// tiny hardcoded seed so the library never renders empty.
const LIBRARY_INDEX_URL = '/app-directory/index.json';
const LIBRARY_FALLBACK = [
  { slug:'sloppy-desktop',     title:'sloppy desktop', desc:'this OS', genre:'tools', mtime:0, creators:[] },
  { slug:'app-directory',      title:'App Directory',  desc:'1200+ apps catalog', genre:'tools', mtime:0, creators:[] },
  { slug:'hover-rush',         title:'Hover Rush',     desc:'pseudo-3D racer', genre:'games', mtime:0, creators:[] },
  { slug:'neon-aquarium',      title:'Neon Aquarium',  desc:'glitchy fish tank', genre:'sims', mtime:0, creators:[] },
  { slug:'portal-chamber',     title:'Portal Chamber', desc:'3-persona oracle', genre:'ai', mtime:0, creators:[] }
];
const LIBRARY_CACHE = { data: null, loading: null, error: null, mtime: null };
function loadLibrary(){
  if (LIBRARY_CACHE.data) return Promise.resolve(LIBRARY_CACHE.data);
  if (LIBRARY_CACHE.loading) return LIBRARY_CACHE.loading;
  LIBRARY_CACHE.loading = fetch(LIBRARY_INDEX_URL, { cache: 'no-cache' })
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(arr => {
      if (!Array.isArray(arr) || !arr.length) throw new Error('empty index');
      LIBRARY_CACHE.data = arr;
      LIBRARY_CACHE.error = null;
      return arr;
    })
    .catch(e => {
      LIBRARY_CACHE.error = e.message || String(e);
      LIBRARY_CACHE.data = LIBRARY_FALLBACK;
      return LIBRARY_FALLBACK;
    });
  return LIBRARY_CACHE.loading;
}
// Genre buckets match the indexer's classifyApp() output exactly so the
// filter chips align with whatever the indexer ships.
const LIBRARY_CATS = [
  { id:'all',   label:'all'    },
  { id:'games', label:'games'  },
  { id:'sims',  label:'sims'   },
  { id:'tools', label:'tools'  },
  { id:'art',   label:'art'    },
  { id:'ai',    label:'ai'     },
  { id:'misc',  label:'misc'   }
];
// Per-genre accent colours — reuse the existing sloppy-bar palette.
const GENRE_COLOURS = {
  games:'#00ff88', sims:'#ff9a3a', tools:'#00ddff',
  art:'#c44dff',   ai:'#ff6b9d',   misc:'#888899'
};
const GENRE_EMOJI = { games:'🎮', sims:'🌱', tools:'🧰', art:'🎨', ai:'🤖', misc:'◆' };
function launchExternal(slug){
  if (!slug) return;
  try { window.open('https://sloppy.live/' + slug, '_blank', 'noopener,noreferrer'); } catch(_){}
}
function spawnLibrary(){
  const root = document.createElement('div');
  root.style.cssText = 'display:flex;flex-direction:column;height:100%;padding:0;background:transparent;font-family:\'JetBrains Mono\',monospace;color:var(--text);overflow:hidden';
  root.innerHTML = ''
    + '<div style="padding:.8rem 1rem;border-bottom:1px solid rgba(255,255,255,0.08);display:flex;gap:.5rem;align-items:center;flex-wrap:wrap">'
    +   '<input type="search" data-role="lib-search" placeholder="search 1,292 apps · name, desc, or creator:zennlogic" style="flex:1;min-width:10rem;background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.15);color:var(--text);font-family:inherit;font-size:.72rem;padding:.45rem .65rem;border-radius:4px;letter-spacing:.02em">'
    +   '<select data-role="lib-sort" style="background:rgba(0,0,0,0.4);border:1px solid rgba(255,255,255,0.15);color:var(--text);font-family:inherit;font-size:.62rem;padding:.42rem .55rem;border-radius:4px;letter-spacing:.06em;cursor:pointer">'
    +     '<option value="newest">newest first</option>'
    +     '<option value="az">a → z</option>'
    +   '</select>'
    +   '<span data-role="lib-count" style="font-family:inherit;font-size:.62rem;color:var(--cyan);letter-spacing:.08em">loading…</span>'
    + '</div>'
    + '<div data-role="lib-cats" style="padding:.5rem 1rem .25rem;display:flex;gap:.3rem;flex-wrap:wrap"></div>'
    + '<div data-role="lib-grid" style="flex:1;overflow:auto;padding:.65rem 1rem 1rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(9rem,1fr));gap:.55rem">'
    +   '<div style="grid-column:1/-1;text-align:center;padding:1.5rem;color:var(--mute);font-size:.72rem;letter-spacing:.08em">fetching app index…</div>'
    + '</div>';
  const searchEl = root.querySelector('[data-role="lib-search"]');
  const sortEl   = root.querySelector('[data-role="lib-sort"]');
  const countEl  = root.querySelector('[data-role="lib-count"]');
  const catsEl   = root.querySelector('[data-role="lib-cats"]');
  const gridEl   = root.querySelector('[data-role="lib-grid"]');
  const st = { cat:'all', q:'', sort:'newest', data:[] };

  function renderCats(){
    catsEl.innerHTML = LIBRARY_CATS.map(c =>
      '<button type="button" data-cat="' + c.id + '" aria-pressed="' + (c.id===st.cat) + '" style="background:' + (c.id===st.cat?'rgba(0,221,255,0.12)':'transparent') + ';border:1px solid ' + (c.id===st.cat?'var(--cyan)':'rgba(255,255,255,0.08)') + ';color:' + (c.id===st.cat?'var(--cyan)':'var(--dim)') + ';font-family:inherit;font-size:.6rem;padding:.25rem .55rem;border-radius:4px;cursor:pointer;letter-spacing:.06em;text-transform:lowercase;min-height:1.7rem">' + c.label + '</button>'
    ).join('');
    catsEl.querySelectorAll('button').forEach(b => {
      b.addEventListener('click', () => { st.cat = b.dataset.cat; renderCats(); renderGrid(); });
    });
  }
  function renderGrid(){
    let q = st.q.toLowerCase();
    // Scoped 'creator:name' (alias 'by:') — filter to apps where any
    // creator's name includes the substring after the colon.
    let creatorQ = null;
    const mC = q.match(/(?:creator|by):(\S+)/);
    if (mC){ creatorQ = mC[1]; q = q.replace(mC[0], '').trim(); }
    const filtered = st.data.filter(a => {
      if (st.cat !== 'all' && a.genre !== st.cat) return false;
      if (creatorQ){
        const cs = (a.creators || []).map(c => (c.name||'').toLowerCase());
        if (!cs.some(n => n.includes(creatorQ))) return false;
      }
      if (q){
        const hay = (a.title + ' ' + (a.desc||'') + ' ' + a.slug).toLowerCase();
        if (!hay.includes(q)) return false;
      }
      return true;
    });
    if (st.sort === 'newest') filtered.sort((a,b) => (b.mtime||0) - (a.mtime||0));
    else filtered.sort((a,b) => a.slug.localeCompare(b.slug));
    const cacheNote = LIBRARY_CACHE.error ? ' · ⚠ ' + LIBRARY_CACHE.error : '';
    countEl.textContent = filtered.length.toLocaleString() + ' shown · ' + st.data.length.toLocaleString() + ' total' + cacheNote;
    if (!filtered.length){
      gridEl.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:1.5rem;color:var(--mute);font-size:.72rem">no apps match · try a different category or query</div>';
      return;
    }
    // Cap render at 240 so a 1200-app list doesn't lock the DOM.
    const shown = filtered.slice(0, 240);
    gridEl.innerHTML = shown.map(a => {
      const col = GENRE_COLOURS[a.genre] || GENRE_COLOURS.misc;
      const em = GENRE_EMOJI[a.genre] || '◆';
      const creator = (a.creators && a.creators[0]) ? a.creators[0].name : '';
      const title = a.title || a.slug;
      const tagLine = creator ? ('by ' + creator) : a.genre;
      return '<button type="button" data-slug="' + escHtml(a.slug) + '" title="' + escHtml(a.slug + (a.desc ? ' · ' + a.desc : '')) + '" style="background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.08);border-radius:6px;padding:.65rem .6rem .55rem;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:.3rem;text-align:center;min-height:6rem;transition:all .14s;font-family:inherit;color:var(--text)" onmouseover="this.style.borderColor=\'' + col + '\';this.style.background=\'rgba(255,255,255,0.06)\'" onmouseout="this.style.borderColor=\'rgba(255,255,255,0.08)\';this.style.background=\'rgba(255,255,255,0.025)\'">'
        + '<span style="font-size:1.45rem;line-height:1;color:' + col + ';filter:drop-shadow(0 0 5px ' + col + '66)">' + em + '</span>'
        + '<span style="font-family:inherit;font-weight:500;font-size:.6rem;color:var(--text);line-height:1.15;word-break:break-word;max-height:2.4em;overflow:hidden">' + escHtml(title) + '</span>'
        + '<span style="font-family:inherit;font-size:.48rem;color:var(--mute);letter-spacing:.1em;text-transform:lowercase">' + escHtml(tagLine) + '</span>'
        + '</button>';
    }).join('');
    if (filtered.length > shown.length){
      gridEl.insertAdjacentHTML('beforeend',
        '<div style="grid-column:1/-1;text-align:center;padding:1rem;color:var(--mute);font-size:.65rem;letter-spacing:.08em">+ ' + (filtered.length - shown.length).toLocaleString() + ' more · refine the search to narrow</div>');
    }
    gridEl.querySelectorAll('button[data-slug]').forEach(b => {
      b.addEventListener('click', () => launchExternal(b.dataset.slug));
    });
  }
  searchEl.addEventListener('input', () => { st.q = searchEl.value.trim(); renderGrid(); });
  sortEl.addEventListener('change', () => { st.sort = sortEl.value; renderGrid(); });
  renderCats();
  // Fetch the live index then paint
  loadLibrary().then(arr => {
    st.data = arr;
    renderGrid();
  });
  return root;
}
function spawnLibraryWindow(){
  const total = LIBRARY_CACHE.data ? LIBRARY_CACHE.data.length : '…';
  return spawnWindow({ title:'app library · sloppy.live · ' + total + ' apps', app:'library', w:600, h:480, body:spawnLibrary() });
}

// ══════════════════════════════════════════════════════════════════
// GLOBAL KARMA WIDGET
// Tiny persistent panel modeled after the karma chip in sloppy-bar.
// Shows network score + tier + daily delta + streak + a recent-events
// feed. Score drifts every 4s on a small random walk so the widget
// feels live without needing a real Supabase round-trip.
// ══════════════════════════════════════════════════════════════════
const KARMA_STATE = {
  score: 2418, today: 47, streak: 14, rank: 7,
  events: [
    { em:'👍', who:'inisso',         text:'upvoted hover-rush',    amt:'+8' },
    { em:'💬', who:'tt2513073',      text:'commented on vow-bureau', amt:'+3' },
    { em:'🚀', who:'arkuzzzzz',      text:'shipped prism-roll',    amt:'+25' },
    { em:'🎯', who:'stbrumme',       text:'cleared age-of-audit',  amt:'+12' },
    { em:'⭐', who:'zennlogic',      text:'starred portal-chamber',amt:'+6' },
    { em:'🔥', who:'remytwofive',    text:'30-day streak earned',  amt:'+50' },
    { em:'🎲', who:'mrmald92',       text:'rolled prism-roll',     amt:'+2' },
    { em:'🪶', who:'thecrazygamer16',text:'tickled sloppy',        amt:'+4' }
  ]
};
function karmaTier(score){
  if (score < 100) return '○ initiate tier';
  if (score < 500) return '◇ contributor tier';
  if (score < 1500) return '◆ luminary tier';
  return '★ paragon tier';
}
function spawnKarma(){
  const root = document.createElement('div');
  root.style.cssText = 'display:flex;flex-direction:column;height:100%;font-family:\'JetBrains Mono\',monospace;color:var(--text)';
  root.innerHTML = ''
    + '<div data-role="k-hero" style="padding:1.2rem 1rem 1rem;text-align:center;border-bottom:1px solid rgba(255,255,255,0.08);background:radial-gradient(ellipse 80% 60% at 50% 30%, rgba(255,215,0,0.06), transparent)">'
    +   '<div data-role="k-score" style="font-family:inherit;font-weight:700;font-size:2.6rem;line-height:1;letter-spacing:.01em;background:linear-gradient(135deg,#ffd700,#ff6b9d);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent">0</div>'
    +   '<div style="font-family:inherit;font-size:.54rem;color:var(--dim);letter-spacing:.22em;text-transform:uppercase;margin-top:.4rem">network karma · live</div>'
    +   '<div data-role="k-tier" style="display:inline-block;margin-top:.5rem;background:rgba(255,215,0,0.18);color:#ffd700;font-family:inherit;font-size:.58rem;font-weight:700;padding:.18rem .55rem;border-radius:3px;letter-spacing:.12em;text-transform:uppercase">—</div>'
    + '</div>'
    + '<div style="display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid rgba(255,255,255,0.08)">'
    +   '<div style="padding:.7rem .85rem;border-right:1px solid rgba(255,255,255,0.08)"><div style="font-family:inherit;font-size:.5rem;color:var(--mute);letter-spacing:.18em;text-transform:uppercase;margin-bottom:.2rem">today</div><div data-role="k-today" style="font-family:inherit;font-weight:700;font-size:1.05rem;color:#00ff88">+0</div></div>'
    +   '<div style="padding:.7rem .85rem"><div style="font-family:inherit;font-size:.5rem;color:var(--mute);letter-spacing:.18em;text-transform:uppercase;margin-bottom:.2rem">streak</div><div data-role="k-streak" style="font-family:inherit;font-weight:700;font-size:1.05rem;color:#00ddff">0d</div></div>'
    +   '<div style="padding:.7rem .85rem;border-right:1px solid rgba(255,255,255,0.08);border-top:1px solid rgba(255,255,255,0.08)"><div style="font-family:inherit;font-size:.5rem;color:var(--mute);letter-spacing:.18em;text-transform:uppercase;margin-bottom:.2rem">rank</div><div data-role="k-rank" style="font-family:inherit;font-weight:700;font-size:1.05rem;color:#ff6b9d">#0</div></div>'
    +   '<div style="padding:.7rem .85rem;border-top:1px solid rgba(255,255,255,0.08)"><div style="font-family:inherit;font-size:.5rem;color:var(--mute);letter-spacing:.18em;text-transform:uppercase;margin-bottom:.2rem">earned</div><div data-role="k-earned" style="font-family:inherit;font-weight:700;font-size:1.05rem;color:var(--text)">0</div></div>'
    + '</div>'
    + '<div style="padding:.6rem .85rem;flex:1;overflow-y:auto">'
    +   '<div style="font-family:inherit;font-size:.5rem;color:var(--dim);letter-spacing:.2em;text-transform:uppercase;margin-bottom:.5rem">recent</div>'
    +   '<div data-role="k-events"></div>'
    + '</div>';
  function paint(){
    root.querySelector('[data-role="k-score"]').textContent = KARMA_STATE.score.toLocaleString();
    root.querySelector('[data-role="k-tier"]').textContent = karmaTier(KARMA_STATE.score);
    const t = KARMA_STATE.today;
    root.querySelector('[data-role="k-today"]').textContent = (t>=0?'+':'') + t + ' ' + (t>=0?'▲':'▼');
    root.querySelector('[data-role="k-streak"]').textContent = KARMA_STATE.streak + 'd';
    root.querySelector('[data-role="k-rank"]').textContent = '#' + KARMA_STATE.rank;
    root.querySelector('[data-role="k-earned"]').textContent = KARMA_STATE.score.toLocaleString();
    root.querySelector('[data-role="k-events"]').innerHTML = KARMA_STATE.events.map(ev =>
      '<div style="display:flex;align-items:center;gap:.5rem;padding:.3rem 0;border-bottom:1px solid rgba(255,255,255,0.04);font-family:inherit;font-size:.62rem;color:var(--dim)">'
      + '<span style="font-size:.85rem;line-height:1;flex:0 0 auto">' + ev.em + '</span>'
      + '<span><span style="color:var(--text);font-weight:500">' + escHtml(ev.who) + '</span> ' + escHtml(ev.text) + '</span>'
      + '<span style="margin-left:auto;font-weight:700;color:' + (ev.amt.startsWith('-')?'#ff4466':'#00ff88') + ';font-size:.66rem;letter-spacing:.04em">' + escHtml(ev.amt) + '</span>'
      + '</div>'
    ).join('');
  }
  paint();
  // Live drift — random walk every 4s. Stops cleanly when the window
  // is removed (the interval callback checks isConnected).
  const drift = setInterval(() => {
    if (!root.isConnected){ clearInterval(drift); return; }
    if (Math.random() < 0.7){
      const d = Math.floor(Math.random() * 5) + 1;
      KARMA_STATE.score += d;
      KARMA_STATE.today += d;
      paint();
    }
  }, 4000);
  return root;
}
function spawnKarmaWindow(){
  return spawnWindow({ title:'⚡ global karma', app:'karma', w:300, h:400, body:spawnKarma() });
}

// ── DOCK WIRING ────────────────────────────────────────────────────
document.querySelectorAll('.dock .icon').forEach(btn => {
  btn.addEventListener('click', () => {
    const a = btn.dataset.app;
    if (a === 'terminal')        spawnTerminalWindow();
    else if (a === 'chat')       spawnChatWindow();
    else if (a === 'paint')      spawnPaintWindow();
    else if (a === 'font')       spawnFontWindow();
    else if (a === 'music')      spawnMusicWindow();
    else if (a === 'harvest')    spawnHarvestWindow();
    else if (a === 'volley')     spawnVolleyWindow();
    else if (a === 'blackjack')  spawnBlackjackWindow();
    else if (a === 'browser')    spawnBrowserWindow();
    else if (a === 'readme')     spawnReadme();
    else if (a === 'about')      spawnAbout();
    else if (a === 'library')    spawnLibraryWindow();
    else if (a === 'karma')      spawnKarmaWindow();
  });
});

// ── BOOT — open a readme + the app library + the karma widget so the
//          desktop feels populated and the new universal-launcher +
//          global-karma surfaces are visible from the first frame.
spawnReadme();
setTimeout(spawnLibraryWindow, 220);
setTimeout(spawnKarmaWindow, 360);
setTimeout(spawnTerminalWindow, 520);

})();
</script>
