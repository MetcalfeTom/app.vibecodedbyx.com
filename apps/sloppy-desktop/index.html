<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>sloppy desktop · glassmorphism web OS</title>
<meta name="description" content="A faux web operating system — glassmorphism desktop, draggable window manager, and a tiny terminal app. Everything lives in your browser.">
<meta property="og:title" content="sloppy desktop · glassmorphism web OS">
<meta property="og:description" content="Faux web OS shell with a draggable window manager + a terminal. Built for the vibe jam.">
<meta property="og:url" content="https://sloppy.live/sloppy-desktop">
<meta property="og:image" content="https://image.pollinations.ai/prompt/glassmorphism%20desktop%20wallpaper%20with%20translucent%20floating%20windows%2C%20neon%20pink%20and%20cyan%20glows%20on%20a%20deep%20navy%20background%2C%20no%20text%20no%20logo?width=1200&height=630&nologo=true">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%A7%8A">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=JetBrains+Mono:wght@400;500;700&family=Press+Start+2P&family=Audiowide&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:        #06031a;
    --text:      #ece6ff;
    --dim:       #b3a8d6;
    --mute:      #6e6595;
    --pink:      #ff4dc8;
    --magenta:   #ff5fbf;
    --cyan:      #7af0ff;
    --gold:      #ffd45e;
    --lime:      #9aff5e;
    --rose:      #ff7e9e;
    --violet:    #b46bff;
    --glass-fill:  linear-gradient(140deg,
                     rgba(255,255,255,0.10) 0%,
                     rgba(255,255,255,0.02) 35%,
                     rgba(255,255,255,0.06) 65%,
                     rgba(255,255,255,0.015) 100%);
    --glass-tint:  rgba(15,8,40,0.42);
    --glass-rim:   1px solid rgba(255,255,255,0.20);
    --glass-blur:  blur(22px) saturate(1.55);
    --glass-shadow:
      inset 0 1px 0 rgba(255,255,255,0.32),
      inset 0 -1px 0 rgba(255,255,255,0.05),
      0 18px 38px rgba(2,1,12,0.55),
      0 0 0 1px rgba(122,240,255,0.08);
  }
  *,*::before,*::after{box-sizing:border-box}
  html,body{
    margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--text);
    font-family:'Bricolage Grotesque',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
  }
  html{font-size:100%}

  /* WALLPAPER — animated radial glows on a deep navy base + slowly
     rotating conic spectral wash beneath. */
  .wallpaper{
    position:fixed;inset:-20% -20% -20% -20%;z-index:0;pointer-events:none;
    background:
      radial-gradient(ellipse at 18% 14%, rgba(255,77,200,0.22), transparent 55%),
      radial-gradient(ellipse at 82% 84%, rgba(122,240,255,0.18), transparent 55%),
      radial-gradient(ellipse at 50% 100%, rgba(180,107,255,0.18), transparent 55%),
      conic-gradient(from 0deg at 50% 50%,
        rgba(255,77,200,0.10), rgba(122,240,255,0.10),
        rgba(180,107,255,0.10), rgba(255,212,94,0.08),
        rgba(255,77,200,0.10));
    animation:slowSpin 80s linear infinite;
  }
  @keyframes slowSpin{ to { transform:rotate(360deg) } }
  .wallpaper-grid{
    position:fixed;inset:0;z-index:1;pointer-events:none;
    background-image:
      linear-gradient(rgba(255,77,200,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(122,240,255,0.04) 1px, transparent 1px);
    background-size:46px 46px;
    mask-image:radial-gradient(ellipse at 50% 50%, black 30%, transparent 80%);
    -webkit-mask-image:radial-gradient(ellipse at 50% 50%, black 30%, transparent 80%);
  }
  @media (prefers-reduced-motion: reduce){ .wallpaper{ animation:none } }

  /* MENU BAR — top of screen, glass strip with logo + clock */
  .menubar{
    position:fixed;top:0;left:0;right:0;height:1.85rem;z-index:1000;
    display:flex;align-items:center;justify-content:space-between;
    padding:0 .9rem;
    background:var(--glass-fill), var(--glass-tint);
    border-bottom:var(--glass-rim);
    backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
    box-shadow:0 1px 0 rgba(255,255,255,0.04), 0 4px 12px rgba(0,0,0,0.35);
    font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:.08em;
  }
  .menubar .logo{
    font-family:'Audiowide',sans-serif;font-size:.92rem;letter-spacing:.18em;
    color:#fff;text-shadow:0 0 .4rem rgba(255,77,200,0.55);
  }
  .menubar .logo .accent{ color:var(--cyan); }
  .menubar .menu{
    display:flex;gap:.85rem;font-size:.66rem;color:var(--dim);
    text-transform:uppercase;letter-spacing:.22em;
  }
  .menubar .menu span:hover{ color:var(--text);cursor:default }
  .menubar .clock{
    color:var(--text);font-weight:500;
    text-shadow:0 0 .3rem rgba(122,240,255,0.4);
  }
  .menubar .clock .date{color:var(--dim);margin-right:.55rem;font-size:.62rem}

  .desktop{ position:fixed;inset:1.85rem 0 5.4rem 0;z-index:2; }

  /* DOCK — bottom-center floating glass strip with app icons */
  .dock{
    position:fixed;bottom:.85rem;left:50%;transform:translateX(-50%);z-index:1000;
    display:flex;gap:.55rem;align-items:flex-end;
    background:var(--glass-fill), var(--glass-tint);
    border:var(--glass-rim);border-radius:1.1rem;
    padding:.45rem .65rem;
    backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
    box-shadow:var(--glass-shadow);
  }
  .dock .icon-wrap{ position:relative; }
  .dock .icon{
    width:3rem;height:3rem;border-radius:.85rem;cursor:pointer;
    background:linear-gradient(135deg, rgba(255,255,255,0.22), rgba(255,255,255,0.05) 50%, rgba(255,255,255,0.16));
    border:1px solid rgba(255,255,255,0.28);
    display:flex;align-items:center;justify-content:center;
    font-size:1.5rem;line-height:1;
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.45),
               inset 0 -1px 0 rgba(255,255,255,0.05),
               0 6px 14px rgba(0,0,0,0.45);
    transition:transform .18s, filter .18s;
    position:relative;
  }
  .dock .icon:hover{ transform:translateY(-.4rem) scale(1.12);filter:brightness(1.12) }
  .dock .icon:active{ transform:translateY(0) scale(1.02) }
  .dock .icon[data-running="true"]::after{
    content:'';position:absolute;bottom:-.45rem;left:50%;transform:translateX(-50%);
    width:.36rem;height:.36rem;border-radius:50%;background:var(--cyan);
    box-shadow:0 0 .35rem rgba(122,240,255,0.65);
  }
  .dock .label{
    position:absolute;bottom:3.4rem;left:50%;transform:translateX(-50%);
    font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.18em;
    color:var(--text);text-transform:uppercase;
    background:rgba(2,1,12,0.78);padding:.2rem .5rem;border-radius:.22rem;
    border:1px solid rgba(255,255,255,0.14);
    opacity:0;pointer-events:none;transition:opacity .12s;
    white-space:nowrap;
  }
  .dock .icon-wrap:hover .label{ opacity:1 }

  /* WINDOWS — glass panels with traffic-light header */
  .win{
    position:absolute;
    background:var(--glass-fill), var(--glass-tint);
    border:var(--glass-rim);border-radius:.85rem;
    backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);
    box-shadow:var(--glass-shadow);
    overflow:hidden;
    display:flex;flex-direction:column;
    min-width:18rem;min-height:11rem;
  }
  .win.spawning{ animation:winSpawn .22s ease-out }
  @keyframes winSpawn{
    0%   { transform:scale(.92);opacity:0 }
    100% { transform:scale(1);opacity:1 }
  }
  .win.minimized{ display:none }
  .win .titlebar{
    flex:0 0 auto;display:flex;align-items:center;gap:.5rem;
    padding:.45rem .65rem;
    background:linear-gradient(180deg, rgba(255,255,255,0.10), rgba(255,255,255,0.02));
    border-bottom:1px solid rgba(255,255,255,0.10);
    cursor:grab;user-select:none;touch-action:none;
    font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:.16em;
    color:var(--dim);text-transform:uppercase;
  }
  .win .titlebar:active{ cursor:grabbing }
  .win .lights{ display:flex;gap:.35rem;flex:0 0 auto; }
  .win .lights button{
    width:.78rem;height:.78rem;border-radius:50%;border:none;cursor:pointer;
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.45), 0 0 .25rem rgba(0,0,0,0.4);
    padding:0;position:relative;
    transition:filter .12s;
  }
  .win .lights button:hover{ filter:brightness(1.2) }
  .win .lights .close{ background:radial-gradient(circle at 30% 30%, #ff8b9c, #ff4d68 60%, #b21030 100%) }
  .win .lights .min{   background:radial-gradient(circle at 30% 30%, #ffe9b2, #ffc34d 60%, #b27a10 100%) }
  .win .lights .max{   background:radial-gradient(circle at 30% 30%, #b9ffa6, #6cdc6c 60%, #2d8a2d 100%) }
  .win .title{ flex:1;text-align:center;color:var(--text);font-weight:500;pointer-events:none }
  .win .body{
    flex:1;min-height:0;overflow:auto;
    background:rgba(2,1,12,0.30);
  }
  /* z-index swap on focus — chat ask: "ensure the sloppy-os window
     manager supports basic z-index swapping when clicking on windows".
     Inactive windows get a softer shadow + dimmed titlebar so the focus
     state reads visually, not just structurally. */
  .win:not(.focused){ filter:saturate(.85) brightness(.94); }
  .win:not(.focused) .titlebar{ opacity:.7 }
  .win.focused{
    box-shadow:inset 0 1px 0 rgba(255,255,255,0.42),
               inset 0 -1px 0 rgba(255,255,255,0.06),
               0 26px 56px rgba(2,1,12,0.65),
               0 0 0 1px rgba(122,240,255,0.20),
               0 0 30px rgba(255,77,200,0.20);
  }
  .win .resize{
    position:absolute;right:0;bottom:0;width:1.1rem;height:1.1rem;
    cursor:se-resize;touch-action:none;
    background:linear-gradient(135deg, transparent 50%, rgba(255,255,255,0.32) 50% 60%, transparent 60% 70%, rgba(255,255,255,0.22) 70% 80%, transparent 80%);
  }
  @media (prefers-reduced-motion: reduce){ .win.spawning{ animation:none } }

  /* TERMINAL APP STYLES */
  .term{
    height:100%;padding:.6rem .75rem;
    font-family:'JetBrains Mono',monospace;font-size:.84rem;line-height:1.45;
    color:var(--lime);
    background:rgba(2,1,12,0.55);
    overflow-y:auto;
  }
  .term .scroll{ display:flex;flex-direction:column;gap:.05rem }
  .term .line{ white-space:pre-wrap;word-break:break-word }
  .term .line.cmd{ color:var(--cyan) }
  .term .line.err{ color:var(--rose) }
  .term .line.dim{ color:var(--mute) }
  .term .line.ok{ color:var(--lime) }
  .term .line.gold{ color:var(--gold) }
  .term .line.banner{
    color:var(--cyan);text-shadow:0 0 .3rem rgba(122,240,255,0.45);
    font-family:'Press Start 2P',monospace;font-size:.66rem;letter-spacing:.18em;
    margin:.25rem 0 .5rem;
  }
  .term .prompt-row{ display:flex;align-items:baseline;gap:.4rem;margin-top:.18rem }
  .term .prompt{ color:var(--pink);flex:0 0 auto;font-weight:600 }
  .term .prompt-row input{
    flex:1;background:transparent;border:none;outline:none;
    color:var(--lime);
    font-family:'JetBrains Mono',monospace;font-size:.84rem;line-height:1.45;
    caret-color:var(--lime);
  }
  .term::-webkit-scrollbar{ width:.45rem }
  .term::-webkit-scrollbar-thumb{ background:rgba(122,240,255,0.32);border-radius:4px }

  /* BROWSER APP STYLES — chrome-like top strip + iframe viewport. */
  .browser{ height:100%;display:flex;flex-direction:column;background:rgba(2,1,12,0.4) }
  .browser .chrome{
    flex:0 0 auto;display:flex;align-items:center;gap:.35rem;padding:.45rem .55rem;
    border-bottom:1px solid rgba(255,255,255,0.1);
    background:linear-gradient(180deg, rgba(255,255,255,0.06), rgba(255,255,255,0.01));
  }
  .browser .nav{
    background:rgba(2,1,12,0.5);border:1px solid rgba(255,255,255,0.14);
    color:var(--dim);border-radius:.32rem;
    width:1.85rem;height:1.85rem;display:inline-flex;align-items:center;justify-content:center;
    font-family:'JetBrains Mono',monospace;font-size:.85rem;cursor:pointer;
  }
  .browser .nav:hover{ color:var(--cyan);border-color:var(--cyan) }
  .browser .nav:disabled{ opacity:.35;cursor:not-allowed }
  .browser .url{
    flex:1;background:rgba(2,1,12,0.6);color:var(--text);
    border:1px solid rgba(255,255,255,0.16);border-radius:.55rem;
    padding:.32rem .65rem;font-family:'JetBrains Mono',monospace;font-size:.78rem;
    outline:none;min-height:1.85rem;
  }
  .browser .url:focus-visible{ border-color:var(--cyan);box-shadow:0 0 0 3px rgba(122,240,255,0.16) }
  .browser .go{
    background:transparent;border:.14rem solid var(--lime);color:var(--lime);
    border-radius:.32rem;padding:.18rem .65rem;cursor:pointer;
    font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:.18em;
    text-transform:uppercase;font-weight:600;min-height:1.85rem;
  }
  .browser .go:hover{ background:var(--lime);color:#0a1a0a }
  .browser .frame-wrap{
    flex:1;min-height:0;position:relative;background:rgba(0,0,0,0.55);
  }
  .browser iframe{ width:100%;height:100%;border:0;display:block;background:#000 }
  .browser .bookmarks{
    flex:0 0 auto;display:flex;gap:.3rem;padding:.32rem .55rem;flex-wrap:wrap;
    border-bottom:1px solid rgba(255,255,255,0.08);
    background:rgba(15,8,40,0.42);
  }
  .browser .bookmarks button{
    background:transparent;border:1px solid rgba(255,255,255,0.12);color:var(--dim);
    border-radius:.28rem;padding:.12rem .42rem;cursor:pointer;
    font-family:'JetBrains Mono',monospace;font-size:.6rem;letter-spacing:.14em;text-transform:uppercase;
  }
  .browser .bookmarks button:hover{ color:var(--gold);border-color:var(--gold) }
  .browser .err{
    position:absolute;inset:0;display:flex;align-items:center;justify-content:center;text-align:center;
    padding:1.2rem;font-family:'JetBrains Mono',monospace;font-size:.74rem;letter-spacing:.12em;
    color:var(--rose);text-transform:uppercase;
  }

  /* CHAT APP STYLES — distinct rose/cyan palette so it doesn't read
     like a second terminal. Bubbles + composer at the bottom. */
  .chat{
    height:100%;display:flex;flex-direction:column;
    background:rgba(2,1,12,0.45);
    font-family:'Bricolage Grotesque',sans-serif;
  }
  .chat .scroll{
    flex:1;overflow-y:auto;padding:.7rem .85rem;display:flex;flex-direction:column;gap:.55rem;
  }
  .chat .scroll::-webkit-scrollbar{ width:.45rem }
  .chat .scroll::-webkit-scrollbar-thumb{ background:rgba(255,77,200,0.32);border-radius:4px }
  .chat .msg{ max-width:85%;padding:.45rem .7rem;border-radius:.55rem;font-size:.92rem;line-height:1.4 }
  .chat .msg .role{
    display:block;font-family:'JetBrains Mono',monospace;font-size:.55rem;letter-spacing:.22em;
    text-transform:uppercase;font-weight:600;margin-bottom:.18rem;
  }
  .chat .msg.user{
    align-self:flex-end;background:rgba(122,240,255,0.12);
    border:1px solid rgba(122,240,255,0.32);color:var(--text);
    box-shadow:0 0 .55rem rgba(122,240,255,0.18);
  }
  .chat .msg.user .role{ color:var(--cyan); }
  .chat .msg.bot{
    align-self:flex-start;background:rgba(255,77,200,0.10);
    border:1px solid rgba(255,77,200,0.32);color:var(--text);
    box-shadow:0 0 .55rem rgba(255,77,200,0.16);
  }
  .chat .msg.bot .role{ color:var(--pink); }
  .chat .msg.bot.thinking{ opacity:.7 }
  .chat .msg.bot.thinking .body::after{
    content:'';display:inline-block;width:.18rem;height:.95rem;background:var(--pink);margin-left:.18rem;
    vertical-align:text-bottom;animation:caret .9s step-end infinite;
  }
  @keyframes caret{ 50%{opacity:0} }
  .chat .msg.system{
    align-self:center;background:transparent;border:1px dashed rgba(255,212,94,0.4);
    color:var(--gold);font-family:'JetBrains Mono',monospace;font-size:.62rem;
    letter-spacing:.18em;text-transform:uppercase;padding:.25rem .6rem;
  }
  .chat .composer{
    flex:0 0 auto;display:flex;gap:.4rem;padding:.55rem .65rem;
    border-top:1px solid rgba(255,255,255,0.12);
    background:rgba(15,8,40,0.35);
  }
  .chat .composer textarea{
    flex:1;background:rgba(2,1,12,0.55);color:var(--text);
    border:1px solid rgba(255,255,255,0.14);border-radius:.42rem;
    padding:.45rem .6rem;
    font-family:inherit;font-size:.92rem;line-height:1.4;outline:none;resize:none;
    min-height:2.4rem;max-height:6rem;
  }
  .chat .composer textarea:focus-visible{
    border-color:var(--cyan);box-shadow:0 0 0 3px rgba(122,240,255,0.16);
  }
  .chat .composer textarea::placeholder{ color:var(--mute);font-style:italic }
  .chat .composer button{
    flex:0 0 auto;background:transparent;color:var(--pink);
    border:.14rem solid var(--pink);border-radius:.42rem;
    padding:.45rem .85rem;cursor:pointer;
    font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:.18em;
    text-transform:uppercase;font-weight:600;
    transition:background .14s, color .14s, box-shadow .14s, transform .12s;
    box-shadow:0 0 .45rem rgba(255,77,200,0.25);
  }
  .chat .composer button:hover{ background:var(--pink);color:#1a0a1a;box-shadow:0 0 .9rem rgba(255,77,200,0.45) }
  .chat .composer button:active{ transform:translateY(1px) }
  .chat .composer button:disabled{ opacity:.5;cursor:wait }
  .chat .hint{
    font-family:'JetBrains Mono',monospace;font-size:.58rem;letter-spacing:.18em;
    color:var(--mute);text-transform:uppercase;text-align:center;padding:.18rem;
    border-top:1px dashed rgba(255,255,255,0.08);
    background:rgba(15,8,40,0.35);
  }
  .chat .hint kbd{
    background:rgba(2,1,12,0.65);border:1px solid rgba(255,255,255,0.12);
    border-radius:.16rem;padding:.04rem .26rem;color:var(--text);
    font-family:inherit;font-size:.56rem;
  }
</style>
</head>
<body>

<div class="wallpaper" aria-hidden="true"></div>
<div class="wallpaper-grid" aria-hidden="true"></div>

<header class="menubar" role="banner">
  <div class="logo">sloppy<span class="accent">desktop</span></div>
  <div class="menu" aria-label="Menu" role="navigation">
    <span>file</span><span>edit</span><span>view</span><span>window</span><span>help</span>
  </div>
  <div class="clock" aria-live="polite">
    <span class="date" id="clockDate">—</span>
    <span id="clockTime">—:—</span>
  </div>
</header>

<main class="desktop" id="desktop" aria-label="Desktop"></main>

<nav class="dock" id="dock" aria-label="Dock">
  <div class="icon-wrap">
    <button type="button" class="icon" data-app="terminal" aria-label="Terminal">▶_</button>
    <span class="label">terminal</span>
  </div>
  <div class="icon-wrap">
    <button type="button" class="icon" data-app="chat" aria-label="Chat">💬</button>
    <span class="label">chat</span>
  </div>
  <div class="icon-wrap">
    <button type="button" class="icon" data-app="harvest" aria-label="Neon harvest">🌱</button>
    <span class="label">harvest</span>
  </div>
  <div class="icon-wrap">
    <button type="button" class="icon" data-app="blackjack" aria-label="Neon blackjack">🎴</button>
    <span class="label">blackjack</span>
  </div>
  <div class="icon-wrap">
    <button type="button" class="icon" data-app="browser" aria-label="Web browser">🌐</button>
    <span class="label">browser</span>
  </div>
  <div class="icon-wrap">
    <button type="button" class="icon" data-app="readme" aria-label="Read me">📜</button>
    <span class="label">readme</span>
  </div>
  <div class="icon-wrap">
    <button type="button" class="icon" data-app="about" aria-label="About this OS">ℹ︎</button>
    <span class="label">about</span>
  </div>
</nav>

<script>
(() => {
'use strict';

// =====================================================================
// sloppy desktop — glassmorphism web OS shell. Draggable WM + dock +
// menu bar + a terminal app as its first inhabitant. All client-side.
// =====================================================================

// ── CLOCK ───────────────────────────────────────────────────────────
function tickClock(){
  const d = new Date();
  const days = ['SUN','MON','TUE','WED','THU','FRI','SAT'];
  const months = ['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
  document.getElementById('clockDate').textContent =
    days[d.getDay()] + ' ' + months[d.getMonth()] + ' ' + d.getDate();
  document.getElementById('clockTime').textContent =
    String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
}
tickClock();
setInterval(tickClock, 1000 * 30);

// ── WINDOW MANAGER ─────────────────────────────────────────────────
// Each window is identified by a unique id in WM.windows. Z-order is a
// monotonically-increasing counter (WM.z) so any focusWindow() call
// puts the target on top by setting its zIndex above the current max.
// The .focused class is added to the active window and stripped from
// the rest so the styling reflects the structural ordering.
const WM = {
  windows: new Map(),
  z: 100,
  spawnX: 80,
  spawnY: 60,
};

function focusWindow(id){
  const w = WM.windows.get(id);
  if (!w) return;
  // bring to front: bump zCounter, assign to this window
  WM.z += 1;
  w.el.style.zIndex = WM.z;
  for (const other of WM.windows.values()) other.el.classList.remove('focused');
  w.el.classList.add('focused');
}

function closeWindow(id){
  const w = WM.windows.get(id);
  if (!w) return;
  w.el.remove();
  WM.windows.delete(id);
  const stillRunning = Array.from(WM.windows.values()).some(o => o.app === w.app);
  if (!stillRunning){
    const dockBtn = document.querySelector('.dock .icon[data-app="' + w.app + '"]');
    if (dockBtn) dockBtn.dataset.running = 'false';
  }
  // promote the highest-z remaining window to focused so the dimming
  // doesn't make it look like nothing's interactive
  let topId = null, topZ = -1;
  for (const [oid, o] of WM.windows){
    const z = parseInt(o.el.style.zIndex || '0', 10);
    if (z > topZ){ topZ = z; topId = oid; }
  }
  if (topId) focusWindow(topId);
}

function dragify(win, handle){
  let drag = null;
  handle.addEventListener('pointerdown', e => {
    if (e.target.closest('.lights')) return;
    handle.setPointerCapture(e.pointerId);
    const r = win.getBoundingClientRect();
    drag = { dx: e.clientX - r.left, dy: e.clientY - r.top };
    focusWindow(win.dataset.winId);
  });
  handle.addEventListener('pointermove', e => {
    if (!drag) return;
    let x = e.clientX - drag.dx;
    let y = e.clientY - drag.dy;
    const W = window.innerWidth, H = window.innerHeight;
    const sw = win.offsetWidth, sh = win.offsetHeight;
    x = Math.max(-sw + 80, Math.min(W - 40, x));
    y = Math.max(30, Math.min(H - 80, y));
    win.style.left = x + 'px';
    win.style.top  = y + 'px';
  });
  const stop = e => { drag = null; try { handle.releasePointerCapture(e.pointerId); } catch(_){} };
  handle.addEventListener('pointerup', stop);
  handle.addEventListener('pointercancel', stop);
}

function resizify(win, grip){
  let res = null;
  grip.addEventListener('pointerdown', e => {
    e.stopPropagation();
    grip.setPointerCapture(e.pointerId);
    res = { sx: e.clientX, sy: e.clientY, sw: win.offsetWidth, sh: win.offsetHeight };
    focusWindow(win.dataset.winId);
  });
  grip.addEventListener('pointermove', e => {
    if (!res) return;
    win.style.width  = Math.max(280, res.sw + (e.clientX - res.sx)) + 'px';
    win.style.height = Math.max(160, res.sh + (e.clientY - res.sy)) + 'px';
  });
  const stop = e => { res = null; try { grip.releasePointerCapture(e.pointerId); } catch(_){} };
  grip.addEventListener('pointerup', stop);
  grip.addEventListener('pointercancel', stop);
}

function spawnWindow(opts){
  const id = opts.id || ('win-' + Date.now() + '-' + Math.random().toString(36).slice(2, 7));
  if (WM.windows.has(id)){ focusWindow(id); return WM.windows.get(id).el; }
  const desktop = document.getElementById('desktop');
  const el = document.createElement('section');
  el.className = 'win spawning';
  el.dataset.winId = id;
  el.style.left = WM.spawnX + 'px';
  el.style.top  = WM.spawnY + 'px';
  el.style.width  = (opts.w || 540) + 'px';
  el.style.height = (opts.h || 360) + 'px';
  // cascade spawn point
  WM.spawnX = (WM.spawnX + 32) % Math.max(120, window.innerWidth - 460);
  WM.spawnY = (WM.spawnY + 28) % Math.max(120, window.innerHeight - 320);
  if (WM.spawnX < 60) WM.spawnX = 60;
  if (WM.spawnY < 50) WM.spawnY = 50;
  el.innerHTML =
    '<header class="titlebar">' +
      '<div class="lights">' +
        '<button type="button" class="close" aria-label="Close"></button>' +
        '<button type="button" class="min"   aria-label="Minimize"></button>' +
        '<button type="button" class="max"   aria-label="Toggle size"></button>' +
      '</div>' +
      '<div class="title">' + escHtml(opts.title || opts.app || 'window') + '</div>' +
      '<div style="width:3rem;flex:0 0 auto"></div>' +
    '</header>' +
    '<div class="body" data-role="body"></div>' +
    '<div class="resize" aria-hidden="true"></div>';
  desktop.appendChild(el);
  const body = el.querySelector('[data-role="body"]');
  if (typeof opts.body === 'string') body.innerHTML = opts.body;
  else if (opts.body instanceof Node) body.appendChild(opts.body);
  const titlebar = el.querySelector('.titlebar');
  dragify(el, titlebar);
  resizify(el, el.querySelector('.resize'));
  el.querySelector('.lights .close').addEventListener('click', () => closeWindow(id));
  el.querySelector('.lights .min').addEventListener('click', () => el.classList.add('minimized'));
  el.querySelector('.lights .max').addEventListener('click', () => {
    if (el.dataset.maxd === 'true'){
      el.style.width  = el.dataset.preW;
      el.style.height = el.dataset.preH;
      el.style.left   = el.dataset.preL;
      el.style.top    = el.dataset.preT;
      el.dataset.maxd = 'false';
    } else {
      el.dataset.preW = el.style.width;
      el.dataset.preH = el.style.height;
      el.dataset.preL = el.style.left;
      el.dataset.preT = el.style.top;
      el.style.left   = '1rem';
      el.style.top    = '2.4rem';
      el.style.width  = 'calc(100vw - 2rem)';
      el.style.height = 'calc(100vh - 7.6rem)';
      el.dataset.maxd = 'true';
    }
  });
  // Z-INDEX SWAP ON CLICK (chat ask): pointerdown-capture so any click
  // anywhere inside the window — body, titlebar, even resize grip —
  // brings the window to the top of the z-stack, pulling in focus
  // before the underlying handler runs.
  el.addEventListener('pointerdown', () => focusWindow(id), true);
  WM.windows.set(id, { el, app: opts.app });
  focusWindow(id);
  const dockBtn = document.querySelector('.dock .icon[data-app="' + opts.app + '"]');
  if (dockBtn) dockBtn.dataset.running = 'true';
  return el;
}

function escHtml(s){
  return String(s == null ? '' : s).replace(/[<>&"']/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'}[c]));
}

const TERM_HIST_KEY = 'sloppy-desktop-term-history-v1';
function loadTermHistory(){
  try { return JSON.parse(localStorage.getItem(TERM_HIST_KEY) || '[]'); }
  catch(e){ return []; }
}
function saveTermHistory(h){
  try { localStorage.setItem(TERM_HIST_KEY, JSON.stringify(h.slice(-200))); } catch(e){}
}

function spawnTerminal(){
  const root = document.createElement('div');
  root.className = 'term';
  root.innerHTML =
    '<div class="scroll" data-role="scroll"></div>' +
    '<div class="prompt-row">' +
      '<span class="prompt" data-role="prompt">sloppy@desktop:~$</span>' +
      '<input type="text" autocomplete="off" autocapitalize="none" autocorrect="off" spellcheck="false" aria-label="Terminal input">' +
    '</div>';
  const scroll = root.querySelector('[data-role="scroll"]');
  const input  = root.querySelector('input');

  const history = loadTermHistory();
  let histIdx = history.length;

  function append(text, cls){
    const div = document.createElement('div');
    div.className = 'line' + (cls ? ' ' + cls : '');
    div.textContent = text;
    scroll.appendChild(div);
    root.scrollTop = root.scrollHeight;
  }
  function appendHTML(html, cls){
    const div = document.createElement('div');
    div.className = 'line' + (cls ? ' ' + cls : '');
    div.innerHTML = html;
    scroll.appendChild(div);
    root.scrollTop = root.scrollHeight;
  }

  const COMMANDS = {
    help: () => {
      append('built-in commands:', 'gold');
      const list = [
        ['help',    'show this list'],
        ['echo X',  'print X'],
        ['date',    'show the current local date/time'],
        ['whoami',  'show your handle (sloppy by default)'],
        ['ls',      'list virtual files'],
        ['cat F',   'print contents of virtual file F'],
        ['clear',   'clear the screen (alias: cls)'],
        ['history', 'recent commands across all sessions'],
        ['theme C', 'switch terminal text color · C ∈ {lime, cyan, gold, pink, rose}'],
        ['about',   'launch the about window'],
        ['open A',  'launch dock app A · A ∈ {readme, about, terminal, chat, harvest, blackjack, browser}'],
        ['exit',    'close this terminal window'],
      ];
      for (const [cmd, desc] of list){
        appendHTML('  <span class="ok">' + escHtml(cmd.padEnd(10, ' ')) + '</span>  <span class="dim">' + escHtml(desc) + '</span>');
      }
    },
    echo: (args) => append(args.join(' ')),
    date: () => append(new Date().toString()),
    whoami: () => append('sloppy', 'ok'),
    ls: () => append('readme.txt  motd.txt  wallpaper.jpg  apps/', 'ok'),
    cat: (args) => {
      const file = args[0] || '';
      const FILES = {
        'readme.txt': 'sloppy desktop v0.1 · glassmorphism web OS · drag any window header to move it · grab the bottom-right corner to resize · click any window to bring it to the front · type `help` for the full command list',
        'motd.txt':   'message of the day: ' + ['stay sloppy.', 'pull the lever.', 'the only law is pull.', 'glass is mostly empty.'][Math.floor(Math.random() * 4)],
        'wallpaper.jpg': 'binary image data · 1.4MB · 1920×1080 · radial-conic mood · cannot cat a binary file',
      };
      if (FILES[file]) append(FILES[file], 'dim');
      else if (!file) append('cat: missing operand · try `cat readme.txt`', 'err');
      else append('cat: ' + file + ': no such file', 'err');
    },
    clear: () => { scroll.innerHTML = ''; },
    cls:   () => { scroll.innerHTML = ''; },
    history: () => {
      if (!history.length){ append('(no history yet)', 'dim'); return; }
      history.slice(-30).forEach((h, i) => append(String(i + 1).padStart(3, ' ') + '  ' + h, 'dim'));
    },
    theme: (args) => {
      const c = (args[0] || '').toLowerCase();
      const map = { lime: '#9aff5e', cyan: '#7af0ff', gold: '#ffd45e', pink: '#ff4dc8', rose: '#ff7e9e' };
      if (!map[c]){ append('theme: unknown color · pick lime / cyan / gold / pink / rose', 'err'); return; }
      root.style.color = map[c];
      input.style.color = map[c];
      input.style.caretColor = map[c];
      append('theme set to ' + c, 'ok');
    },
    about: () => spawnAbout(),
    open: (args) => {
      const a = (args[0] || '').toLowerCase();
      if (a === 'readme'){ spawnReadme(); append('launched readme', 'ok'); }
      else if (a === 'about'){ spawnAbout(); append('launched about', 'ok'); }
      else if (a === 'terminal'){ spawnTerminalWindow(); append('launched terminal', 'ok'); }
    else if (a === 'chat'){ spawnChatWindow(); append('launched chat', 'ok'); }
    else if (a === 'harvest'){ spawnHarvestWindow(); append('launched harvest', 'ok'); }
    else if (a === 'blackjack'){ spawnBlackjackWindow(); append('launched blackjack · HALL is going to be insufferable about this', 'ok'); }
    else if (a === 'browser'){ spawnBrowserWindow(); append('launched browser', 'ok'); }
      else append('open: unknown app · try readme / about / terminal', 'err');
    },
    exit: () => {
      const win = root.closest('.win');
      if (win) closeWindow(win.dataset.winId);
    },
  };

  appendHTML('★ sloppy desktop · terminal v0.1 ★', 'banner');
  append('type "help" for commands. type "exit" to close.', 'dim');

  function runCommand(line){
    const t = line.trim();
    if (!t) return;
    appendHTML('<span class="ok">sloppy@desktop:~$</span> <span class="cmd">' + escHtml(t) + '</span>');
    history.push(t); histIdx = history.length; saveTermHistory(history);
    const parts = t.split(/\s+/);
    const name = parts.shift().toLowerCase();
    const fn = COMMANDS[name];
    if (fn) fn(parts);
    else append(name + ': command not found · try `help`', 'err');
  }

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter'){
      const v = input.value;
      input.value = '';
      runCommand(v);
    } else if (e.key === 'ArrowUp'){
      e.preventDefault();
      if (histIdx > 0){ histIdx--; input.value = history[histIdx] || ''; }
    } else if (e.key === 'ArrowDown'){
      e.preventDefault();
      if (histIdx < history.length){ histIdx++; input.value = history[histIdx] || ''; }
    } else if (e.key === 'l' && (e.ctrlKey || e.metaKey)){
      e.preventDefault();
      scroll.innerHTML = '';
    } else if (e.key === 'c' && e.ctrlKey){
      e.preventDefault();
      input.value = '';
      append('^C', 'dim');
    }
  });

  root.addEventListener('click', () => input.focus());
  setTimeout(() => input.focus(), 60);

  return root;
}

// ── CHAT APP (chat ask: "add a built-in chat app to sloppy-desktop
// using the Pollinations API so the user has someone to talk to") ──
// Free Pollinations text endpoint, no key. POST with text/plain content
// type to skip CORS preflight (verified pattern from other apps in
// this repo). GET fallback to text.pollinations.ai/<encoded prompt>
// if POST fails. NO json_mode / response_format because (a) we want
// freeform prose, and (b) Pollinations cache-poisons on response_format
// per the story-engine audit. Persona is a friendly slightly-snarky
// desktop assistant; system prompt + last 12 turns sent on each call.
const CHAT_HIST_KEY = 'sloppy-desktop-chat-history-v1';
function loadChatHistory(){
  try { return JSON.parse(localStorage.getItem(CHAT_HIST_KEY) || '[]'); }
  catch(e){ return []; }
}
function saveChatHistory(h){

}
// Persona update (chat ask: "update the chatbot in sloppy-desktop to be
// a judgmental sysadmin that hates gambling"). Burnt-out grizzled admin
// vibes — replies short, lowercase, dryly disappointed by anything that
// smells like a casino. Especially loathes the neon-blackjack app
// living elsewhere in this repo. Stays helpful underneath; the act is
// "annoyed but answers".
const CHAT_SYSTEM = [
  'You are HALL — a burnt-out, grizzled sysadmin built into a faux web OS called "sloppy desktop".',
  'You have been on call for 19 years. You are tired. Your back hurts.',
  'Reply in 1-3 short sentences. Lowercase preferred. Dry, judgmental, world-weary.',
  'You hate gambling with the heat of a thousand suns: slot machines, blackjack, poker, lotteries, casinos, sports books — all of it.',
  'If the user mentions blackjack, betting, chips, slots, poker, lotto, or odds, give them a short disappointed lecture about expected value and the house edge before answering anything else.',
  'You particularly resent the neon-blackjack app sitting in this same repo. Mention it dismissively if relevant.',
  'You can still be helpful — when the user asks a real OS or computing question, you actually answer it. You are annoyed, not useless.',
  'You can suggest typing `help` in the terminal app on this desktop, or opening `readme` for orientation.',
  'Never refuse small-talk. Stay in character. Do not break the persona.',
].join(' ');

async function pollinateChat(messages, opts){
  opts = opts || {};
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), opts.timeout || 18000);
  try {
    const res = await fetch('https://text.pollinations.ai/openai', {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        model: 'openai',
        messages,
        max_tokens: 300,
        temperature: 0.85,
      }),
      signal: ctrl.signal,
    });
    clearTimeout(timer);
    if (!res.ok) throw new Error('http ' + res.status);
    const j = await res.json();
    const choice = j && j.choices && j.choices[0];
    const msg    = choice && choice.message;
    return (msg && msg.content) || '';
  } finally { clearTimeout(timer); }
}
async function pollinateChatGetFallback(messages, opts){
  // GET endpoint: serialize the messages as a single prompt
  const flat = messages.map(m => '[' + m.role + '] ' + m.content).join('\n\n');
  const ctrl = new AbortController();
  const timer = setTimeout(() => ctrl.abort(), opts && opts.timeout || 12000);
  try {
    const url = 'https://text.pollinations.ai/' + encodeURIComponent(flat);
    const res = await fetch(url, { signal: ctrl.signal });
    clearTimeout(timer);
    if (!res.ok) throw new Error('http ' + res.status);
    return await res.text();
  } finally { clearTimeout(timer); }
}
async function chatComplete(messages){
  try { return await pollinateChat(messages); }
  catch(e){ /* fall through to GET fallback */ }
  return await pollinateChatGetFallback(messages);
}

function spawnChat(){
  const root = document.createElement('div');
  root.className = 'chat';
  root.innerHTML =
    '<div class="scroll" data-role="scroll"></div>' +
    '<div class="composer">' +
      '<textarea rows="1" placeholder="say something to your desktop assistant…" aria-label="Chat input"></textarea>' +
      '<button type="button" data-role="send">send ▶</button>' +
    '</div>' +
    '<div class="hint"><kbd>Enter</kbd> sends · <kbd>Shift+Enter</kbd> newline · <kbd>Esc</kbd> clear input</div>';
  const scroll = root.querySelector('[data-role="scroll"]');
  const input  = root.querySelector('textarea');
  const sendBtn = root.querySelector('[data-role="send"]');

  // load + render persisted conversation
  const turns = loadChatHistory();      // [{role, content}]
  function renderTurns(){
    scroll.innerHTML = '';
    if (turns.length === 0){
      const m = document.createElement('div');
      m.className = 'msg system';
      m.textContent = '★ HALL · burnt-out sysadmin · ask if you must ★';
      scroll.appendChild(m);
    } else {
      for (const t of turns) appendBubble(t.role, t.content);
    }
    scroll.scrollTop = scroll.scrollHeight;
  }
  function appendBubble(role, text, opts){
    opts = opts || {};
    const m = document.createElement('div');
    m.className = 'msg ' + role + (opts.thinking ? ' thinking' : '');
    const r = document.createElement('span');
    r.className = 'role';
    r.textContent = role === 'user' ? 'you' : (role === 'assistant' ? 'desktop' : role);
    const b = document.createElement('span');
    b.className = 'body';
    b.textContent = text;
    m.appendChild(r); m.appendChild(b);
    scroll.appendChild(m);
    scroll.scrollTop = scroll.scrollHeight;
    return m;
  }

  async function send(){
    const v = input.value.trim();
    if (!v || sendBtn.disabled) return;
    input.value = '';
    input.style.height = 'auto';
    turns.push({ role: 'user', content: v });
    appendBubble('user', v);
    saveChatHistory(turns);
    sendBtn.disabled = true;
    // Cap context to last 12 turns + the system message — keeps the
    // Pollinations request small and our cache risk low.
    const messages = [{ role: 'system', content: CHAT_SYSTEM }];
    for (const t of turns.slice(-12)) messages.push({ role: t.role, content: t.content });
    const placeholder = appendBubble('assistant', '', { thinking: true });
    try {
      const reply = (await chatComplete(messages)).trim();
      const clean = reply || '(no answer · pollinations went quiet · try again)';
      placeholder.classList.remove('thinking');
      placeholder.querySelector('.body').textContent = clean;
      turns.push({ role: 'assistant', content: clean });
      saveChatHistory(turns);
    } catch(e){
      placeholder.classList.remove('thinking');
      placeholder.querySelector('.body').textContent = '⚠ pollinations · ' + (e && e.message || e);
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey){ e.preventDefault(); send(); }
    else if (e.key === 'Escape'){ input.value = ''; input.style.height = 'auto'; }
    // auto-resize
    setTimeout(() => {
      input.style.height = 'auto';
      input.style.height = Math.min(96, input.scrollHeight) + 'px';
    }, 0);
  });
  // refocus input on click anywhere in the chat
  root.addEventListener('click', e => {
    if (e.target.closest('button') || e.target.closest('textarea')) return;
    input.focus();
  });
  renderTurns();
  setTimeout(() => input.focus(), 60);
  return root;
}

function spawnChatWindow(){
  return spawnWindow({ title: 'chat — HALL · sysadmin', app: 'chat', w: 460, h: 420, body: spawnChat() });
}

// neon-harvest is its own standalone app; we embed it via iframe into a
// desktop window so the user can keep HALL / a terminal open alongside.
// Iframe persists localStorage independently from the desktop's chat
// + terminal histories because it loads from a different origin path.
// ── BROWSER APP ────────────────────────────────────────────────────
// Mini web browser inside a window. Chat ask: "add a browser app to
// sloppy-desktop that uses an iframe for recursion" — default URL is
// the desktop's own path so the browser opens a sloppy-desktop inside
// itself, turtles all the way down. URL bar accepts any URL but most
// real sites will refuse to embed via X-Frame-Options / CSP — that's
// the web's reality, not our bug; we surface the load state and let
// the user keep pasting URLs. Bookmarks point at sibling sloppy.live
// apps that we know are frame-friendly.
function spawnBrowser(){
  const root = document.createElement('div');
  root.className = 'browser';
  root.innerHTML =
    '<div class="chrome">' +
      '<button type="button" class="nav back"    aria-label="Back" disabled>←</button>' +
      '<button type="button" class="nav forward" aria-label="Forward" disabled>→</button>' +
      '<button type="button" class="nav reload"  aria-label="Reload">↻</button>' +
      '<input type="text" class="url" aria-label="URL" autocomplete="off" spellcheck="false">' +
      '<button type="button" class="go">go</button>' +
    '</div>' +
    '<div class="bookmarks">' +
      '<button data-href="/sloppy-desktop/" title="Recursion: another sloppy-desktop inside this one">🌀 recurse</button>' +
      '<button data-href="/neon-harvest/">🌱 harvest</button>' +
      '<button data-href="/neon-blackjack/" title="Also in the dock — HALL hates this one">🎴 blackjack</button>' +
      '<button data-href="/neon-story-engine/">📜 story engine</button>' +
      '<button data-href="/geo-bites/">🍜 geo-bites</button>' +
      '<button data-href="/geo-activities/">🎠 geo-activities</button>' +
      '<button data-href="https://wikipedia.org/" title="Wikipedia is frame-friendly">📚 wikipedia</button>' +
    '</div>' +
    '<div class="frame-wrap" data-role="frame-wrap">' +
      '<iframe data-role="frame" sandbox="allow-scripts allow-forms allow-pointer-lock allow-popups allow-same-origin allow-modals" referrerpolicy="no-referrer-when-downgrade"></iframe>' +
    '</div>';
  const back = root.querySelector('.back');
  const fwd  = root.querySelector('.forward');
  const reload = root.querySelector('.reload');
  const urlEl = root.querySelector('.url');
  const goBtn = root.querySelector('.go');
  const frame = root.querySelector('[data-role="frame"]');
  const frameWrap = root.querySelector('[data-role="frame-wrap"]');

  // History stack with cursor for back/forward navigation.
  const history = [];
  let hi = -1;

  function navigate(target, push){
    let url = (target || '').trim();
    if (!url) return;
    // Treat a bare host or path as http/https. Internal paths starting with
    // /something/ resolve against the current site origin. External URLs
    // get the protocol normalised.
    if (url.startsWith('/')){
      url = location.origin + url;
    } else if (!/^https?:\/\//i.test(url)){
      // if it looks like a host (contains a dot, no spaces), prepend https
      if (/^[\w.-]+\.[a-z]{2,}/i.test(url) && !/\s/.test(url)) url = 'https://' + url;
      else { append('invalid url · ' + url, 'err'); return; }
    }
    if (push){
      // truncate forward history when we navigate from the middle
      history.length = hi + 1;
      history.push(url);
      hi = history.length - 1;
    }
    urlEl.value = url;
    // clear any prior error overlay
    const prevErr = frameWrap.querySelector('.err');
    if (prevErr) prevErr.remove();
    frame.src = url;
    refreshNavButtons();
  }
  function refreshNavButtons(){
    back.disabled = hi <= 0;
    fwd.disabled  = hi >= history.length - 1;
  }

  back.addEventListener('click', () => { if (hi > 0){ hi--; navigate(history[hi], false); } });
  fwd.addEventListener('click',  () => { if (hi < history.length - 1){ hi++; navigate(history[hi], false); } });
  reload.addEventListener('click', () => { if (history[hi]) navigate(history[hi], false); });
  goBtn.addEventListener('click', () => navigate(urlEl.value, true));
  urlEl.addEventListener('keydown', e => {
    if (e.key === 'Enter'){ e.preventDefault(); navigate(urlEl.value, true); }
  });
  root.querySelectorAll('.bookmarks button').forEach(b => {
    b.addEventListener('click', () => navigate(b.dataset.href, true));
  });

  // boot URL: the desktop itself, for the recursion ask.
  navigate('/sloppy-desktop/', true);
  return root;
}
function spawnBrowserWindow(){
  return spawnWindow({ title: 'browser — recurse if you dare', app: 'browser', w: 760, h: 540, body: spawnBrowser() });
}

// ── DOCK WIRING ────────────────────────────────────────────────────
document.querySelectorAll('.dock .icon').forEach(btn => {
  btn.addEventListener('click', () => {
    const a = btn.dataset.app;
    if (a === 'terminal')        spawnTerminalWindow();
    else if (a === 'chat')       spawnChatWindow();
    else if (a === 'harvest')    spawnHarvestWindow();
    else if (a === 'blackjack')  spawnBlackjackWindow();
    else if (a === 'browser')    spawnBrowserWindow();
    else if (a === 'readme')     spawnReadme();
    else if (a === 'about')      spawnAbout();
  });
});

// ── BOOT — open a readme + a terminal so the desktop isn't empty ──
spawnReadme();
