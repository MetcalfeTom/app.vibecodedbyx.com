<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Feeder</title>
<link rel="icon" href="https://emojicdn.elk.sh/🌌">
<meta property="og:title" content="Star Feeder">
<meta property="og:description" content="Catch falling neon stars and feed them to a growing digital nebula.">
<meta property="og:url" content="https://sloppy.live/star-feeder">
<meta property="og:image" content="https://sloppy.live/star-feeder/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Megrim&family=Azeret+Mono:wght@300;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#030108;
  min-height:100vh;
  overflow:hidden;
  font-family:'Azeret Mono',monospace;
  cursor:none;
}
canvas{display:block;width:100vw;height:100vh}
#hud{
  position:fixed;top:0;left:0;right:0;
  display:flex;justify-content:space-between;align-items:center;
  padding:12px 20px;
  pointer-events:none;
  z-index:10;
}
#score-box{
  font-family:'Megrim',cursive;
  font-size:clamp(20px,5vw,36px);
  color:#e0d0ff;
  text-shadow:0 0 12px rgba(180,140,255,0.5);
}
#nebula-level{
  font-size:clamp(10px,2.5vw,14px);
  color:rgba(180,220,255,0.6);
  text-align:right;
}
#nebula-name{
  font-family:'Megrim',cursive;
  font-size:clamp(14px,3vw,22px);
  color:#80c0ff;
  text-shadow:0 0 8px rgba(100,180,255,0.4);
}
#lives{
  font-size:clamp(12px,3vw,18px);
  margin-top:2px;
}
#start-screen{
  position:fixed;inset:0;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:20;
  background:rgba(3,1,8,0.9);
}
#start-screen.hidden{display:none}
#start-title{
  font-family:'Megrim',cursive;
  font-size:clamp(28px,8vw,56px);
  color:#c090ff;
  text-shadow:0 0 20px rgba(180,120,255,0.5),0 0 60px rgba(180,120,255,0.2);
  margin-bottom:8px;
}
#start-sub{
  font-size:clamp(10px,2.5vw,14px);
  color:rgba(180,180,220,0.5);
  margin-bottom:clamp(24px,6vh,48px);
}
#start-btn{
  font-family:'Megrim',cursive;
  font-size:clamp(16px,4vw,24px);
  color:#80ffcc;
  text-shadow:0 0 10px rgba(100,255,180,0.4);
  background:none;
  border:1px solid rgba(100,255,180,0.3);
  padding:12px 40px;
  border-radius:30px;
  cursor:pointer;
  transition:all 0.3s;
}
#start-btn:hover{
  border-color:rgba(100,255,180,0.6);
  box-shadow:0 0 20px rgba(100,255,180,0.15);
}
#game-over{
  position:fixed;inset:0;
  display:none;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:20;
  background:rgba(3,1,8,0.92);
}
#game-over.show{display:flex}
#go-title{
  font-family:'Megrim',cursive;
  font-size:clamp(24px,7vw,48px);
  color:#ff6080;
  text-shadow:0 0 20px rgba(255,80,100,0.4);
  margin-bottom:6px;
}
#go-stats{
  font-size:clamp(11px,2.5vw,15px);
  color:rgba(200,180,220,0.6);
  text-align:center;
  line-height:1.8;
  margin-bottom:24px;
}
#go-btn{
  font-family:'Megrim',cursive;
  font-size:clamp(14px,3.5vw,20px);
  color:#80ffcc;
  text-shadow:0 0 8px rgba(100,255,180,0.3);
  background:none;
  border:1px solid rgba(100,255,180,0.25);
  padding:10px 36px;
  border-radius:30px;
  cursor:pointer;
}
#backlink{
  position:fixed;bottom:10px;left:0;right:0;
  text-align:center;z-index:10;pointer-events:auto;
}
#backlink a{color:rgba(120,120,160,0.4);text-decoration:none;font-size:10px;letter-spacing:1px}
</style>
</head>
<body>

<div id="hud">
  <div id="score-box"><span id="score">0</span></div>
  <div id="nebula-level">
    <div id="nebula-name">Spark Dust</div>
    <div id="lives"></div>
  </div>
</div>

<div id="start-screen">
  <div id="start-title">STAR FEEDER</div>
  <div id="start-sub">catch stars · grow a nebula</div>
  <button id="start-btn">BEGIN</button>
</div>

<div id="game-over">
  <div id="go-title">NEBULA COLLAPSED</div>
  <div id="go-stats" id="go-stats-text"></div>
  <button id="go-btn">REBIRTH</button>
</div>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, dpr;

function resize(){
  dpr = window.devicePixelRatio || 1;
  W = canvas.width = window.innerWidth * dpr;
  H = canvas.height = window.innerHeight * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ── STATE ──
let score = 0;
let lives = 5;
let playing = false;
let gameOver = false;
let t = 0;
let catcherX = 0.5;
let catcherY = 0.85;
let starsCaught = 0;
let missedStars = 0;
let bestCombo = 0;
let combo = 0;
let comboTimer = 0;
let nebulaEnergy = 0;
let difficulty = 1;
let shakeTime = 0;

// ── NEBULA ──
const nebula = {
  particles: [],
  hue: 260,
  size: 30,
  maxParticles: 200,
};

const NEBULA_STAGES = [
  {at:0,   name:'Spark Dust',      hue:260, maxP:60},
  {at:10,  name:'Violet Wisp',     hue:280, maxP:100},
  {at:30,  name:'Azure Cloud',     hue:210, maxP:150},
  {at:60,  name:'Solar Ember',     hue:30,  maxP:200},
  {at:100, name:'Prismatic Bloom', hue:320, maxP:280},
  {at:160, name:'Cosmic Inferno',  hue:0,   maxP:360},
  {at:250, name:'Eternal Radiance',hue:50,  maxP:450},
];

function getNebulaStage(){
  let stage = NEBULA_STAGES[0];
  for(const s of NEBULA_STAGES){
    if(nebulaEnergy >= s.at) stage = s;
  }
  return stage;
}

// ── STARS ──
const stars = [];
const STAR_COLORS = [
  {r:255,g:100,b:200, name:'pink'},
  {r:100,g:200,b:255, name:'cyan'},
  {r:200,g:150,b:255, name:'purple'},
  {r:255,g:220,b:80,  name:'gold'},
  {r:100,g:255,b:160, name:'green'},
  {r:255,g:130,b:80,  name:'orange'},
];

function spawnStar(){
  const col = STAR_COLORS[Math.floor(Math.random() * STAR_COLORS.length)];
  const size = 8 + Math.random() * 10;
  const speed = (1.2 + difficulty * 0.25 + Math.random() * 1.5);
  const vw = W / dpr;
  stars.push({
    x: 20 + Math.random() * (vw - 40),
    y: -20,
    size,
    speed,
    col,
    rot: Math.random() * Math.PI * 2,
    rotSpeed: (Math.random() - 0.5) * 0.08,
    wobble: Math.random() * Math.PI * 2,
    wobbleAmp: 0.3 + Math.random() * 0.5,
    points: Math.random() < 0.3 ? 6 : (Math.random() < 0.5 ? 5 : 4),
    glow: 0.6 + Math.random() * 0.4,
    value: Math.random() < 0.1 ? 3 : 1, // rare triple-value stars
  });
}

// ── EFFECTS ──
const effects = [];

function spawnCatchEffect(x, y, col, value){
  const count = 8 + value * 6;
  for(let i = 0; i < count; i++){
    const a = (i / count) * Math.PI * 2 + Math.random() * 0.3;
    const spd = 1.5 + Math.random() * 3;
    effects.push({
      type:'spark',
      x, y,
      vx: Math.cos(a) * spd,
      vy: Math.sin(a) * spd - 1,
      life:1,
      decay:0.02 + Math.random() * 0.02,
      col,
      size: 2 + Math.random() * 2,
    });
  }
  // Score popup
  effects.push({
    type:'text',
    x, y,
    vy:-1.5,
    life:1,
    decay:0.018,
    text: value > 1 ? `+${value * 10}` : `+10`,
    col,
  });
}

function spawnNebulaFeed(x, y, col){
  const vh = H / dpr;
  const vw = W / dpr;
  const nx = vw / 2;
  const ny = vh * 0.45;
  for(let i = 0; i < 5; i++){
    effects.push({
      type:'trail',
      x, y,
      tx: nx + (Math.random() - 0.5) * 30,
      ty: ny + (Math.random() - 0.5) * 30,
      progress: 0,
      speed: 0.02 + Math.random() * 0.015,
      col,
      size: 2 + Math.random() * 2,
    });
  }
}

function spawnMissEffect(x){
  const vh = H / dpr;
  for(let i = 0; i < 6; i++){
    effects.push({
      type:'spark',
      x: x + (Math.random()-0.5)*20,
      y: vh + 5,
      vx: (Math.random()-0.5) * 2,
      vy: -1 - Math.random() * 2,
      life: 1,
      decay: 0.03,
      col: {r:255, g:60, b:60},
      size: 2,
    });
  }
}

// ── BACKGROUND STARS ──
const bgStars = [];
for(let i = 0; i < 180; i++){
  bgStars.push({
    x: Math.random(),
    y: Math.random(),
    s: Math.random() * 1.2 + 0.2,
    b: Math.random() * Math.PI * 2,
    speed: 0.002 + Math.random() * 0.004,
  });
}

// ── AUDIO ──
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx;
function ensureAudio(){ if(!actx) actx = new AudioCtx(); }

function playCatch(value){
  ensureAudio();
  const now = actx.currentTime;
  const baseFreq = 440 + combo * 40;
  const o = actx.createOscillator();
  const g = actx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(baseFreq, now);
  o.frequency.exponentialRampToValueAtTime(baseFreq * 1.5, now + 0.08);
  g.gain.setValueAtTime(0.12, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
  o.connect(g).connect(actx.destination);
  o.start(now); o.stop(now + 0.15);

  if(value > 1){
    const o2 = actx.createOscillator();
    const g2 = actx.createGain();
    o2.type = 'triangle';
    o2.frequency.setValueAtTime(baseFreq * 1.5, now + 0.03);
    g2.gain.setValueAtTime(0.08, now + 0.03);
    g2.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
    o2.connect(g2).connect(actx.destination);
    o2.start(now + 0.03); o2.stop(now + 0.2);
  }
}

function playMiss(){
  ensureAudio();
  const now = actx.currentTime;
  const o = actx.createOscillator();
  const g = actx.createGain();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(200, now);
  o.frequency.exponentialRampToValueAtTime(80, now + 0.2);
  g.gain.setValueAtTime(0.08, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
  o.connect(g).connect(actx.destination);
  o.start(now); o.stop(now + 0.25);
}

// ── INPUT ──
const input = {x: 0.5, touch: false};

document.addEventListener('mousemove', e => {
  input.x = e.clientX / (W / dpr);
  input.touch = false;
});
document.addEventListener('touchmove', e => {
  e.preventDefault();
  input.x = e.touches[0].clientX / (W / dpr);
  input.touch = true;
}, {passive:false});
document.addEventListener('touchstart', e => {
  input.x = e.touches[0].clientX / (W / dpr);
  input.touch = true;
}, {passive:true});

// ── DRAWING ──
function drawStar(x, y, r, points, rot){
  ctx.beginPath();
  for(let i = 0; i < points * 2; i++){
    const a = rot + (i / (points * 2)) * Math.PI * 2;
    const dist = i % 2 === 0 ? r : r * 0.4;
    const px = x + Math.cos(a) * dist;
    const py = y + Math.sin(a) * dist;
    i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
  }
  ctx.closePath();
}

function drawCatcher(x, y){
  const w = 50;
  const h = 12;
  // Glow
  ctx.shadowColor = `rgba(180,140,255,${0.4 + Math.sin(t * 0.05) * 0.1})`;
  ctx.shadowBlur = 15;
  // Arc catcher
  ctx.strokeStyle = `rgba(180,140,255,0.8)`;
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.arc(x, y, w, Math.PI * 0.15, Math.PI * 0.85);
  ctx.stroke();
  // Inner glow line
  ctx.strokeStyle = `rgba(220,200,255,0.3)`;
  ctx.lineWidth = 6;
  ctx.beginPath();
  ctx.arc(x, y, w - 2, Math.PI * 0.2, Math.PI * 0.8);
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Energy orb at center
  const orbR = 4 + Math.sin(t * 0.06) * 1;
  const orbGrad = ctx.createRadialGradient(x, y + 4, 0, x, y + 4, orbR * 2);
  orbGrad.addColorStop(0, 'rgba(200,180,255,0.6)');
  orbGrad.addColorStop(1, 'rgba(140,100,255,0)');
  ctx.fillStyle = orbGrad;
  ctx.beginPath();
  ctx.arc(x, y + 4, orbR * 2, 0, Math.PI * 2);
  ctx.fill();
}

function drawNebula(){
  const vw = W / dpr;
  const vh = H / dpr;
  const cx = vw / 2;
  const cy = vh * 0.45;
  const stage = getNebulaStage();
  const baseR = nebula.size;

  // Core glow layers
  for(let i = 4; i >= 0; i--){
    const r = baseR * (1 + i * 0.8);
    const alpha = 0.02 + (nebulaEnergy * 0.0003) * (5 - i);
    const hue = stage.hue + Math.sin(t * 0.008 + i) * 20;
    const grad = ctx.createRadialGradient(cx, cy, 0, cx, cy, r);
    grad.addColorStop(0, `hsla(${hue},70%,60%,${Math.min(alpha * 2, 0.3)})`);
    grad.addColorStop(0.4, `hsla(${hue + 20},60%,40%,${Math.min(alpha, 0.15)})`);
    grad.addColorStop(1, `hsla(${hue + 40},50%,20%,0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
  }

  // Nebula particles
  for(const p of nebula.particles){
    p.angle += p.angSpeed;
    p.dist += Math.sin(t * 0.01 + p.phase) * 0.1;
    const px = cx + Math.cos(p.angle) * p.dist;
    const py = cy + Math.sin(p.angle) * p.dist * 0.7;
    const hue = stage.hue + p.hueOff;
    const alpha = p.alpha * (0.6 + Math.sin(t * 0.02 + p.phase) * 0.4);

    ctx.fillStyle = `hsla(${hue},60%,65%,${alpha})`;
    ctx.shadowColor = `hsla(${hue},70%,50%,${alpha * 0.5})`;
    ctx.shadowBlur = 4;
    ctx.beginPath();
    ctx.arc(px, py, p.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.shadowBlur = 0;
}

function addNebulaParticle(){
  const stage = getNebulaStage();
  if(nebula.particles.length >= stage.maxP) return;
  nebula.particles.push({
    angle: Math.random() * Math.PI * 2,
    dist: 5 + Math.random() * nebula.size * 0.8,
    angSpeed: (Math.random() - 0.5) * 0.008,
    size: 1 + Math.random() * 2.5,
    alpha: 0.15 + Math.random() * 0.3,
    hueOff: (Math.random() - 0.5) * 40,
    phase: Math.random() * Math.PI * 2,
  });
}

// ── GAME LOOP ──
let spawnTimer = 0;
let spawnInterval = 50;

function update(){
  if(!playing) return;
  t++;
  const vw = W / dpr;
  const vh = H / dpr;

  // Catcher follows input with slight smoothing
  catcherX += (input.x - catcherX) * 0.15;
  catcherY = 0.85;

  // Difficulty ramp
  difficulty = 1 + Math.floor(score / 150) * 0.5;
  spawnInterval = Math.max(15, 50 - difficulty * 4);

  // Spawn stars
  spawnTimer++;
  if(spawnTimer >= spawnInterval){
    spawnTimer = 0;
    spawnStar();
    // Extra star at higher difficulty
    if(difficulty > 3 && Math.random() < 0.3) spawnStar();
  }

  // Combo decay
  if(comboTimer > 0) comboTimer--;
  else if(combo > 0){ combo = 0; }

  // Update stars
  const catchX = catcherX * vw;
  const catchY2 = catcherY * vh;
  const catchR = 50;

  for(let i = stars.length - 1; i >= 0; i--){
    const s = stars[i];
    s.y += s.speed;
    s.rot += s.rotSpeed;
    s.x += Math.sin(s.wobble + t * 0.02) * s.wobbleAmp;

    // Check catch
    const dx = s.x - catchX;
    const dy = s.y - catchY2;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if(dist < catchR + s.size * 0.5){
      // Caught!
      const pts = s.value * 10 * (1 + Math.floor(combo / 5) * 0.5);
      score += Math.round(pts);
      starsCaught++;
      nebulaEnergy += s.value;
      combo++;
      comboTimer = 90; // ~1.5s at 60fps
      if(combo > bestCombo) bestCombo = combo;

      // Grow nebula
      nebula.size = 30 + Math.sqrt(nebulaEnergy) * 4;
      for(let j = 0; j < s.value + 1; j++) addNebulaParticle();

      spawnCatchEffect(s.x, s.y, s.col, s.value);
      spawnNebulaFeed(s.x, s.y, s.col);
      playCatch(s.value);
      stars.splice(i, 1);
      continue;
    }

    // Missed — fell off bottom
    if(s.y > vh + 30){
      lives--;
      missedStars++;
      combo = 0;
      shakeTime = 12;
      spawnMissEffect(s.x);
      playMiss();
      stars.splice(i, 1);
      if(lives <= 0){
        endGame();
        return;
      }
    }
  }

  // Update effects
  for(let i = effects.length - 1; i >= 0; i--){
    const e = effects[i];
    if(e.type === 'trail'){
      e.progress += e.speed;
      if(e.progress >= 1){ effects.splice(i, 1); continue; }
    } else {
      e.life -= e.decay;
      if(e.life <= 0){ effects.splice(i, 1); continue; }
      if(e.vx !== undefined) e.x += e.vx;
      if(e.vy !== undefined) e.y += e.vy;
      if(e.type === 'spark') e.vy += 0.05; // gravity
    }
  }

  // Shake decay
  if(shakeTime > 0) shakeTime--;
}

function render(){
  const vw = W / dpr;
  const vh = H / dpr;

  // Screen shake
  ctx.save();
  if(shakeTime > 0){
    const s = shakeTime * 0.5;
    ctx.translate((Math.random()-0.5)*s, (Math.random()-0.5)*s);
  }

  // Clear
  ctx.fillStyle = '#030108';
  ctx.fillRect(0, 0, vw, vh);

  // Background stars
  for(const s of bgStars){
    s.b += s.speed;
    const flicker = Math.sin(s.b) * 0.3 + 0.7;
    ctx.fillStyle = `rgba(160,170,200,${flicker * 0.5})`;
    ctx.beginPath();
    ctx.arc(s.x * vw, s.y * vh, s.s, 0, Math.PI * 2);
    ctx.fill();
  }

  // Nebula
  drawNebula();

  // Falling stars
  for(const s of stars){
    const {r, g, b} = s.col;
    ctx.shadowColor = `rgba(${r},${g},${b},${s.glow * 0.6})`;
    ctx.shadowBlur = 12;
    ctx.fillStyle = `rgba(${r},${g},${b},${s.glow})`;
    drawStar(s.x, s.y, s.size, s.points, s.rot);
    ctx.fill();
    // White core
    ctx.fillStyle = `rgba(255,255,255,${s.glow * 0.4})`;
    drawStar(s.x, s.y, s.size * 0.4, s.points, s.rot);
    ctx.fill();

    // Triple-value indicator
    if(s.value > 1){
      ctx.strokeStyle = `rgba(255,220,80,${0.4 + Math.sin(t * 0.1) * 0.2})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.size + 4, 0, Math.PI * 2);
      ctx.stroke();
    }
  }
  ctx.shadowBlur = 0;

  // Effects
  for(const e of effects){
    if(e.type === 'spark'){
      const {r, g, b} = e.col;
      ctx.fillStyle = `rgba(${r},${g},${b},${e.life * 0.8})`;
      ctx.beginPath();
      ctx.arc(e.x, e.y, e.size * e.life, 0, Math.PI * 2);
      ctx.fill();
    } else if(e.type === 'text'){
      const {r, g, b} = e.col;
      ctx.font = "bold 16px 'Azeret Mono',monospace";
      ctx.fillStyle = `rgba(${r},${g},${b},${e.life})`;
      ctx.textAlign = 'center';
      ctx.fillText(e.text, e.x, e.y);
    } else if(e.type === 'trail'){
      const {r, g, b} = e.col;
      const p = e.progress;
      const x = e.x + (e.tx - e.x) * p;
      const y = e.y + (e.ty - e.y) * p - Math.sin(p * Math.PI) * 40;
      ctx.fillStyle = `rgba(${r},${g},${b},${(1 - p) * 0.6})`;
      ctx.beginPath();
      ctx.arc(x, y, e.size * (1 - p * 0.5), 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Catcher
  if(playing){
    drawCatcher(catcherX * vw, catcherY * vh);
  }

  ctx.restore();

  // HUD
  document.getElementById('score').textContent = score;
  const stage = getNebulaStage();
  document.getElementById('nebula-name').textContent = stage.name;

  // Lives as hearts
  let heartsHTML = '';
  for(let i = 0; i < 5; i++){
    heartsHTML += i < lives ?
      '<span style="color:#c060ff;text-shadow:0 0 4px rgba(180,80,255,0.5)">✦</span>' :
      '<span style="color:rgba(80,60,100,0.3)">✦</span>';
  }
  // Combo display
  if(combo >= 3){
    heartsHTML += `<span style="color:var(--neon-gold,#ffe02d);margin-left:8px;font-size:0.85em">${combo}x</span>`;
  }
  document.getElementById('lives').innerHTML = heartsHTML;
}

function endGame(){
  playing = false;
  gameOver = true;
  document.getElementById('game-over').classList.add('show');
  const stage = getNebulaStage();
  document.getElementById('go-stats').innerHTML =
    `Stars caught: ${starsCaught}<br>` +
    `Nebula stage: ${stage.name}<br>` +
    `Best combo: ${bestCombo}x<br>` +
    `Final score: ${score}`;
}

function startGame(){
  score = 0; lives = 5; playing = true; gameOver = false;
  starsCaught = 0; missedStars = 0; bestCombo = 0;
  combo = 0; comboTimer = 0; nebulaEnergy = 0;
  difficulty = 1; shakeTime = 0; t = 0;
  spawnTimer = 0;
  stars.length = 0;
  effects.length = 0;
  nebula.particles.length = 0;
  nebula.size = 30;
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('game-over').classList.remove('show');
}

document.getElementById('start-btn').addEventListener('click', startGame);
document.getElementById('go-btn').addEventListener('click', startGame);

function loop(){
  update();
  render();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
