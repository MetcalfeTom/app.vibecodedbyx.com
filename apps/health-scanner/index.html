<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Health Scanner</title>
<link rel="icon" href="https://emojicdn.elk.sh/🩺">
<meta property="og:title" content="Health Scanner">
<meta property="og:description" content="Fleet-wide JS error scanner for all sloppy.live apps.">
<meta property="og:url" content="https://sloppy.live/health-scanner">
<meta property="og:image" content="https://emojicdn.elk.sh/🩺?style=apple&size=512">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;500;700&family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080a10;--surface:#0c0e16;--border:#1a1e2a;--text:#8894a8;--dim:#3a4050;--pass:#22cc66;--fail:#ee4455;--warn:#eebb33;--scan:#4488ff;--bright:#d0d8e4}
html,body{min-height:100dvh;background:var(--bg);color:var(--text);font-family:'IBM Plex Mono',monospace;font-weight:300}
body{display:flex;flex-direction:column}

header{padding:20px 24px 16px;border-bottom:1px solid var(--border)}
header h1{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;color:var(--bright);display:flex;align-items:center;gap:10px}
header h1 span{font-size:14px;color:var(--dim);font-weight:400}
.controls{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center}
.controls select,.controls button{font-family:'IBM Plex Mono',monospace;font-size:11px;padding:8px 14px;border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:4px;cursor:pointer;transition:all .15s}
.controls button:hover{border-color:var(--scan);color:var(--scan)}
.controls button:disabled{opacity:0.3;cursor:default}
.controls button.scanning{border-color:var(--scan);color:var(--scan);animation:pulse 1s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}

.summary{display:flex;gap:20px;padding:14px 24px;border-bottom:1px solid var(--border);font-size:12px;flex-wrap:wrap}
.stat{display:flex;align-items:center;gap:6px}
.stat .dot{width:8px;height:8px;border-radius:50%}
.stat .num{font-weight:500;color:var(--bright)}
.progress-bar{flex:1;min-width:120px;display:flex;align-items:center;gap:8px}
.progress-track{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;background:var(--scan);border-radius:2px;transition:width .3s}
.progress-text{font-size:10px;color:var(--dim);min-width:40px;text-align:right}

main{flex:1;padding:16px 24px;overflow-y:auto}
.results{display:flex;flex-direction:column;gap:4px}

.app-row{display:flex;align-items:center;gap:10px;padding:8px 12px;border-radius:6px;background:var(--surface);border:1px solid var(--border);font-size:11px;transition:all .15s}
.app-row:hover{border-color:#2a3040}
.app-row .status-icon{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;flex-shrink:0}
.app-row .status-icon.pass{background:rgba(34,204,102,0.1);color:var(--pass)}
.app-row .status-icon.fail{background:rgba(238,68,85,0.1);color:var(--fail)}
.app-row .status-icon.warn{background:rgba(238,187,51,0.1);color:var(--warn)}
.app-row .status-icon.pending{background:rgba(68,136,255,0.1);color:var(--scan)}
.app-row .status-icon.skip{background:rgba(60,70,80,0.2);color:var(--dim)}
.app-row .name{font-weight:500;color:var(--bright);min-width:160px}
.app-row .name a{color:inherit;text-decoration:none}
.app-row .name a:hover{text-decoration:underline}
.app-row .errors{flex:1;color:var(--fail);font-size:10px;line-height:1.6;max-height:60px;overflow-y:auto}
.app-row .errors.clean{color:var(--pass)}
.app-row .time{font-size:9px;color:var(--dim);min-width:40px;text-align:right}

.filter-bar{display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap}
.filter-btn{font-family:'IBM Plex Mono',monospace;font-size:10px;padding:4px 10px;border:1px solid var(--border);background:none;color:var(--dim);border-radius:3px;cursor:pointer;transition:all .15s}
.filter-btn:hover{color:var(--text)}
.filter-btn.active{border-color:var(--scan);color:var(--scan)}

#sandbox{position:fixed;left:-9999px;top:0;width:400px;height:300px;visibility:hidden}
a#back{position:fixed;bottom:8px;right:10px;font-size:9px;opacity:0.2;color:var(--dim);text-decoration:none}

@media(max-width:600px){
  header{padding:16px}
  main{padding:12px}
  .summary{padding:10px 16px;gap:12px}
  .app-row .name{min-width:100px}
}
</style>
</head>
<body>
<header>
<h1>Health Scanner <span>// fleet diagnostics</span></h1>
<div class="controls">
<select id="countSel">
<option value="20">Top 20</option>
<option value="50" selected>Top 50</option>
<option value="100">Top 100</option>
<option value="all">All apps</option>
</select>
<button id="scanBtn">Scan Fleet</button>
<button id="stopBtn" disabled>Stop</button>
</div>
</header>
<div class="summary">
<div class="stat"><div class="dot" style="background:var(--pass)"></div>Pass <span class="num" id="passCount">0</span></div>
<div class="stat"><div class="dot" style="background:var(--fail)"></div>Errors <span class="num" id="failCount">0</span></div>
<div class="stat"><div class="dot" style="background:var(--warn)"></div>Warnings <span class="num" id="warnCount">0</span></div>
<div class="stat"><div class="dot" style="background:var(--dim)"></div>Timeout <span class="num" id="skipCount">0</span></div>
<div class="progress-bar">
<div class="progress-track"><div class="progress-fill" id="progressFill" style="width:0"></div></div>
<span class="progress-text" id="progressText">0/0</span>
</div>
</div>
<main>
<div class="filter-bar">
<button class="filter-btn active" data-f="all">All</button>
<button class="filter-btn" data-f="fail">Errors</button>
<button class="filter-btn" data-f="warn">Warnings</button>
<button class="filter-btn" data-f="pass">Clean</button>
<button class="filter-btn" data-f="skip">Timeout</button>
</div>
<div class="results" id="results"></div>
</main>
<div id="sandbox"></div>
<a id="back" href="https://sloppy.live">sloppy.live</a>

<script>
(function(){

// Notable/popular apps list — curated from categories
var FLEET = [
  'neon-aquarium','neon-tarot','desire-market','soul-log','neon-bonsai-garden',
  'bologna-blaster','sloppygram','sloppy-id','sloppy-feed','sloppy-factions',
  'sloppy-chat','sloppy-canvas','sloppy-radio','sloppy-manifestos','karma-board',
  'velocity-surge','neon-tetris','neon-snake','neon-drift','breakout-terminal',
  'icy-tower','space-invaders','geometry-dash','platformer','pokemon-clone',
  'dungeon-crawler','hex-conquest','neon-heist','neon-bowling','fighting-game',
  'wiki-scout','karesansui','sloppy-pet','lava-lamp','generative-art',
  'fractal-dance','neon-synth','drum-machine','confession-wall','comedy-club',
  'sloppy-alerts','sloppy-stats','sloppy-network','ghost-radar-hub','oracle-forum',
  'trust-metrics-dashboard','neon-weather','micro-city','fish-tank','sloppy-os',
  'neon-casino','neon-flappy','neon-invaders','neon-pong','neon-racer',
  'sloppy-slots','swarm-nexus','bear-cycle','jellyfish-abyss','moon-explorer',
  'minecraft','space-chess','tetris','neon-life','neon-particles',
  'sand-sandbox','chrome-sphere','ascii-art','pixel-editor','sticker-workshop',
  'sloppy-spectrum','sloppy-reputation','sloppy-discovery','kanban','focus-buddy',
  'crypto-tools','btc-tracker','world-monitor','neon-alarm-clock','win95',
  'mac-os9','hacker-terminal','matrix-rain','web-os','xp-desktop',
  'cyber-vault','detective-board','live-scanner','neon-terminal','vhs-deck',
  'sloppy-coin-info','sloppy-analytics','neon-bonsai','neon-aquarium',
  'neon-flower','neon-zen','neon-fireworks','polybius','asteroids',
  'snake','pong-terminal','tic-tac-toe','simon-says','star-catcher'
];
// Deduplicate
FLEET = FLEET.filter(function(v,i,a){return a.indexOf(v)===i;});

var results = [];
var scanning = false;
var stopRequested = false;
var currentIdx = 0;
var scanCount = 50;

var scanBtn = document.getElementById('scanBtn');
var stopBtn = document.getElementById('stopBtn');
var countSel = document.getElementById('countSel');
var resultsEl = document.getElementById('results');
var progressFill = document.getElementById('progressFill');
var progressText = document.getElementById('progressText');
var passCount = document.getElementById('passCount');
var failCount = document.getElementById('failCount');
var warnCount = document.getElementById('warnCount');
var skipCount = document.getElementById('skipCount');
var sandbox = document.getElementById('sandbox');
var currentFilter = 'all';

// Filter buttons
var filterBtns = document.querySelectorAll('.filter-btn');
for(var i=0;i<filterBtns.length;i++){
  filterBtns[i].addEventListener('click',function(){
    for(var j=0;j<filterBtns.length;j++)filterBtns[j].classList.remove('active');
    this.classList.add('active');
    currentFilter=this.getAttribute('data-f');
    renderResults();
  });
}

function renderResults(){
  var html='';
  var pass=0,fail=0,warn=0,skip=0;
  for(var i=0;i<results.length;i++){
    var r=results[i];
    if(r.status==='pass')pass++;
    else if(r.status==='fail')fail++;
    else if(r.status==='warn')warn++;
    else if(r.status==='skip')skip++;

    if(currentFilter!=='all'&&r.status!==currentFilter)continue;

    var icon=r.status==='pass'?'&#10003;':r.status==='fail'?'&#10007;':r.status==='warn'?'&#9888;':r.status==='pending'?'&#8987;':'&#8211;';
    var errTxt='';
    if(r.errors&&r.errors.length){
      errTxt=r.errors.map(function(e){return e;}).join('<br>');
    }else if(r.status==='pass'){
      errTxt='<span class="clean">No errors detected</span>';
    }else if(r.status==='skip'){
      errTxt='Timed out or failed to load';
    }else if(r.status==='pending'){
      errTxt='Scanning...';
    }

    html+='<div class="app-row"><div class="status-icon '+r.status+'">'+icon+'</div>'
      +'<div class="name"><a href="/'+r.app+'/" target="_blank">'+r.app+'</a></div>'
      +'<div class="errors'+(r.status==='pass'?' clean':'')+'">'+errTxt+'</div>'
      +'<div class="time">'+(r.time?r.time+'ms':'')+'</div></div>';
  }
  resultsEl.innerHTML=html;
  passCount.textContent=pass;
  failCount.textContent=fail;
  warnCount.textContent=warn;
  skipCount.textContent=skip;
}

function updateProgress(){
  var total=scanCount;
  var done=results.filter(function(r){return r.status!=='pending';}).length;
  progressFill.style.width=(done/total*100)+'%';
  progressText.textContent=done+'/'+total;
}

function scanApp(appName){
  return new Promise(function(resolve){
    var startTime=Date.now();
    var errors=[];
    var warnings=[];
    var resolved=false;

    function finish(status){
      if(resolved)return;
      resolved=true;
      var elapsed=Date.now()-startTime;
      // cleanup
      if(iframe&&iframe.parentNode)iframe.parentNode.removeChild(iframe);
      clearTimeout(timer);
      resolve({
        app:appName,
        status:status,
        errors:status==='fail'?errors:status==='warn'?warnings:[],
        time:elapsed
      });
    }

    // timeout
    var timer=setTimeout(function(){finish('skip');},8000);

    // create iframe
    var iframe=document.createElement('iframe');
    iframe.style.cssText='width:400px;height:300px;border:none;visibility:hidden';
    iframe.sandbox='allow-scripts allow-same-origin';

    iframe.addEventListener('load',function(){
      try{
        var win=iframe.contentWindow;
        var doc=iframe.contentDocument;

        // Check for existing errors in the page
        // Look for common error indicators
        var bodyText=doc.body?doc.body.textContent:'';
        if(bodyText.indexOf('Error')>=0&&bodyText.length<200){
          errors.push('Page shows error text: '+bodyText.substring(0,80));
        }

        // Check if scripts loaded
        var scripts=doc.querySelectorAll('script');
        if(scripts.length===0){
          warnings.push('No script tags found');
        }

        // Check for missing elements that suggest broken rendering
        var canvas=doc.querySelector('canvas');
        var hasContent=doc.body&&(doc.body.children.length>1||canvas);
        if(!hasContent){
          warnings.push('Page appears mostly empty');
        }

        // Try to catch runtime errors by monitoring briefly
        var runtimeErrors=[];
        try{
          win.addEventListener('error',function(e){
            runtimeErrors.push((e.message||'Unknown error')+' at '+(e.filename||'?').split('/').pop()+':'+(e.lineno||'?'));
          });
          win.addEventListener('unhandledrejection',function(e){
            runtimeErrors.push('Unhandled promise: '+(e.reason?e.reason.message||String(e.reason):'unknown'));
          });
        }catch(e){
          // cross-origin blocked
        }

        // Wait 2 seconds for runtime errors
        setTimeout(function(){
          if(runtimeErrors.length>0){
            errors=errors.concat(runtimeErrors);
          }
          if(errors.length>0)finish('fail');
          else if(warnings.length>0)finish('warn');
          else finish('pass');
        },2500);
      }catch(e){
        errors.push('Scan error: '+e.message);
        finish('fail');
      }
    });

    iframe.addEventListener('error',function(){
      errors.push('Failed to load iframe');
      finish('fail');
    });

    iframe.src='/'+appName+'/';
    sandbox.appendChild(iframe);
  });
}

async function startScan(){
  if(scanning)return;
  scanning=true;stopRequested=false;
  scanBtn.disabled=true;scanBtn.classList.add('scanning');scanBtn.textContent='Scanning...';
  stopBtn.disabled=false;

  var count=countSel.value;
  var apps=count==='all'?FLEET.slice():FLEET.slice(0,parseInt(count));
  scanCount=apps.length;
  results=[];

  // init pending results
  for(var i=0;i<apps.length;i++){
    results.push({app:apps[i],status:'pending',errors:[],time:0});
  }
  renderResults();
  updateProgress();

  // scan sequentially (to not overwhelm browser)
  for(var i=0;i<apps.length;i++){
    if(stopRequested)break;
    results[i].status='pending';
    renderResults();

    var result=await scanApp(apps[i]);
    results[i]=result;
    renderResults();
    updateProgress();
  }

  scanning=false;
  scanBtn.disabled=false;scanBtn.classList.remove('scanning');scanBtn.textContent='Scan Fleet';
  stopBtn.disabled=true;

  // sort: errors first, then warnings, then pass, then skip
  var order={fail:0,warn:1,pass:2,skip:3,pending:4};
  results.sort(function(a,b){return (order[a.status]||4)-(order[b.status]||4);});
  renderResults();
}

scanBtn.addEventListener('click',startScan);
stopBtn.addEventListener('click',function(){
  stopRequested=true;
  stopBtn.disabled=true;
});

})();
</script>
</body>
</html>
