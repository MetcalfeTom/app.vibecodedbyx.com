<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Music Crossword — neon clue grid</title>
<meta name="description" content="A neon-lit music crossword. Five across, five down. All music-themed clues.">
<meta property="og:title" content="Music Crossword">
<meta property="og:description" content="A neon-lit music crossword. Five across, five down. Solve famous artists and song clues.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://sloppy.live/music-crossword/">
<meta property="og:image" content="https://image.pollinations.ai/prompt/neon%20crossword%20grid%20hot%20pink%20electric%20cyan%20violet%20glow%20dark%20vaporwave%20synthwave%20floating%20letters%20music%20notes%20staff%20clef%20centered%20composition?width=1200&height=630&model=flux&nologo=true&seed=88815">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8E%B5">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Major+Mono+Display&family=Space+Mono:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0317; --bg2:#1a0533; --void:#03000a;
  --pink:#ff3fa8; --cyan:#3ff0ff; --violet:#a86bff; --gold:#ffdf5e;
  --pink-soft: rgba(255, 63, 168, .35);
  --cyan-soft: rgba(63, 240, 255, .35);
  --paper:#f6e7ff;
  --grid:#1a0c2e; --grid-line:rgba(168, 107, 255, 0.35);
}
*{box-sizing:border-box}
html{font-size:100%}
body{
  margin:0; min-height:100vh; color:var(--paper);
  background:
    radial-gradient(ellipse at 20% 10%, rgba(255,63,168,0.20), transparent 55%),
    radial-gradient(ellipse at 80% 90%, rgba(63,240,255,0.18), transparent 55%),
    radial-gradient(ellipse at 50% 50%, rgba(168,107,255,0.10), transparent 70%),
    linear-gradient(180deg, var(--bg) 0%, var(--void) 100%);
  background-attachment: fixed;
  font-family:'Inter', sans-serif;
  font-size:1rem; line-height:1.4;
  /* faint scanlines */
  position:relative;
}
body::before{
  content:''; position:fixed; inset:0; pointer-events:none; z-index:0;
  background: repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0 1px, transparent 1px 3px);
  mix-blend-mode:overlay;
}
main{ max-width:1100px; margin:0 auto; padding:2rem 1.25rem 4rem; position:relative; z-index:1; }
header{ text-align:center; margin-bottom:2rem; }
.eyebrow{
  font-family:'Space Mono', monospace; font-weight:700;
  font-size:.7rem; letter-spacing:.5em; color:var(--cyan);
  text-transform:uppercase; margin-bottom:.4rem;
  text-shadow:0 0 8px var(--cyan-soft);
}
h1{
  font-family:'Audiowide', sans-serif; font-weight:400;
  font-size:clamp(2.4rem, 7vw, 4.4rem); line-height:1; margin:0;
  background: linear-gradient(90deg, var(--pink), var(--cyan), var(--violet), var(--pink));
  background-size: 250% 100%;
  -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent; color:transparent;
  text-shadow: 0 0 30px rgba(255,63,168,0.3);
  animation: shimmer 7s linear infinite;
}
@keyframes shimmer{ 0%{background-position:0 0} 100%{background-position:200% 0} }
.tag{
  font-family:'Space Mono', monospace; color:rgba(246,231,255,0.6);
  font-size:.95rem; margin-top:.6rem;
}
.layout{
  display:grid; gap:2.2rem;
  grid-template-columns: minmax(320px, 460px) 1fr;
  align-items:start;
}
@media (max-width:760px){
  .layout{ grid-template-columns:1fr; }
}
.board-wrap{
  display:flex; flex-direction:column; gap:1rem;
}
.board{
  position:relative;
  width:min(100%, 440px); aspect-ratio:1; margin:0 auto;
  background: var(--grid);
  border:2px solid var(--violet);
  box-shadow:
    0 0 24px rgba(168, 107, 255, 0.5),
    0 0 48px rgba(168, 107, 255, 0.25),
    inset 0 0 40px rgba(0,0,0,0.5);
  display:grid;
  grid-template-columns: repeat(5, 1fr);
  grid-template-rows: repeat(5, 1fr);
  padding:4px;
  gap:3px;
  border-radius:6px;
}
.cell{
  position:relative;
  background: rgba(10, 3, 23, 0.85);
  border:1px solid rgba(168, 107, 255, 0.2);
  display:flex; align-items:center; justify-content:center;
  cursor:pointer;
  transition: background .12s, border-color .12s, box-shadow .12s;
  font-family:'Space Mono', monospace; font-weight:700;
  font-size:clamp(1.4rem, 5vw, 2.1rem);
  color:var(--paper);
  text-transform:uppercase;
  user-select:none;
  -webkit-tap-highlight-color: transparent;
}
.cell:hover{ border-color: var(--cyan-soft); }
.cell .num{
  position:absolute; top:2px; left:4px;
  font-family:'Space Mono', monospace; font-weight:400;
  font-size:.55rem; color:var(--violet);
  letter-spacing:0; line-height:1;
}
.cell.highlight{
  background: rgba(63, 240, 255, 0.12);
  border-color: var(--cyan-soft);
}
.cell.selected{
  background: rgba(255, 63, 168, 0.22);
  border-color: var(--pink);
  box-shadow:
    0 0 16px rgba(255, 63, 168, 0.6),
    inset 0 0 12px rgba(255, 63, 168, 0.3);
  z-index:2;
}
.cell.wrong{
  color: #ff5577;
  text-shadow: 0 0 6px #ff5577;
}
.cell.correct{
  color: var(--gold);
  text-shadow: 0 0 10px var(--gold);
}
.cell .letter{
  text-shadow: 0 0 6px rgba(246,231,255,0.6);
}
.board.win .cell{
  animation: winFlash 1.6s ease-out;
}
.board.win .cell:nth-child(odd){ animation-delay: .05s; }
@keyframes winFlash{
  0%{ box-shadow: 0 0 0 rgba(255,223,94,0); }
  35%{ box-shadow: 0 0 22px var(--gold); background: rgba(255,223,94,0.25); }
  100%{ box-shadow: 0 0 0 rgba(255,223,94,0); }
}
.toolbar{
  display:flex; gap:.5rem; flex-wrap:wrap; justify-content:center;
}
.btn{
  appearance:none; background: rgba(168, 107, 255, 0.08);
  border:1px solid var(--violet); color:var(--paper);
  font-family:'Space Mono', monospace; font-weight:700;
  font-size:.78rem; padding:.7rem 1.1rem;
  cursor:pointer; text-transform:uppercase; letter-spacing:.15em;
  transition: all .15s; min-height:2.75rem;
  border-radius:0;
}
.btn:hover, .btn:focus-visible{
  background: rgba(255, 63, 168, 0.15);
  border-color: var(--pink);
  color:var(--pink);
  box-shadow: 0 0 12px var(--pink-soft);
  outline:none;
}
.btn:focus-visible{ outline:2px solid var(--cyan); outline-offset:2px; }
.btn.win{ border-color: var(--gold); color: var(--gold); }
.status{
  font-family:'Space Mono', monospace; font-size:.78rem;
  color:rgba(246,231,255,0.55); text-align:center;
  min-height:1.2rem; letter-spacing:.05em;
}
.status .err{ color:#ff5577; }
.status .ok{ color: var(--gold); text-shadow: 0 0 8px var(--gold); }

.clues-panel{
  display:grid; gap:1.4rem;
  grid-template-columns: 1fr 1fr;
}
@media (max-width:760px){
  .clues-panel{ grid-template-columns:1fr; }
}
.clue-block h2{
  font-family:'Major Mono Display', monospace; font-weight:400;
  font-size:.95rem; letter-spacing:.3em; color:var(--cyan);
  margin:0 0 .7rem; padding-bottom:.4rem;
  border-bottom:1px solid rgba(63, 240, 255, 0.25);
  text-shadow: 0 0 8px var(--cyan-soft);
}
.clue-block.down h2{ color:var(--pink); text-shadow:0 0 8px var(--pink-soft); border-bottom-color:rgba(255, 63, 168, 0.25); }
.clue-list{ list-style:none; padding:0; margin:0; display:flex; flex-direction:column; gap:.35rem; }
.clue{
  display:grid; grid-template-columns: 2rem 1fr; gap:.5rem;
  padding:.55rem .6rem;
  font-size:.92rem; line-height:1.3;
  background: transparent;
  border-left:2px solid transparent;
  cursor:pointer; color: rgba(246,231,255,0.78);
  transition: all .12s;
}
.clue:hover{ background: rgba(255, 255, 255, 0.04); color: var(--paper); }
.clue .n{
  font-family:'Space Mono', monospace; font-weight:700;
  color:var(--violet); font-size:.78rem; padding-top:2px;
}
.clue.active{
  background: rgba(255, 63, 168, 0.13);
  border-left-color: var(--pink);
  color:var(--paper);
  text-shadow: 0 0 6px rgba(255, 63, 168, 0.4);
}
.clue.active .n{ color: var(--pink); }
.clue-block.down .clue.active{
  background: rgba(63, 240, 255, 0.13);
  border-left-color: var(--cyan);
  text-shadow: 0 0 6px var(--cyan-soft);
}
.clue-block.down .clue.active .n{ color: var(--cyan); }
.clue.solved{ color:var(--gold); }
.clue.solved .n{ color: var(--gold); }

.now-clue{
  font-family:'Space Mono', monospace; font-weight:700;
  font-size:.92rem; padding:.65rem .85rem;
  background: rgba(168, 107, 255, 0.1);
  border:1px solid var(--violet);
  color:var(--paper);
  text-align:center;
  letter-spacing:.05em;
}
.now-clue .dir{ color: var(--cyan); }
.now-clue .num{ color: var(--pink); }

footer{
  margin-top:3rem; padding-top:1.4rem; border-top:1px solid rgba(168, 107, 255, 0.18);
  font-family:'Space Mono', monospace; font-size:.72rem;
  color:rgba(246,231,255,0.4); text-align:center;
  letter-spacing:.1em;
}
@media (prefers-reduced-motion: reduce){
  h1{ animation:none; }
  .board.win .cell{ animation:none; }
}
.hidden-input{
  position:absolute; opacity:0; pointer-events:none;
  width:1px; height:1px;
}
</style>
</head>
<body>
<main>
  <header>
    <div class="eyebrow">▣ 5 × 5 · all music · neon</div>
    <h1>Music Crossword</h1>
    <p class="tag">Click a cell, type a letter. Tab or Enter flips direction.</p>
  </header>

  <div class="layout">
    <div class="board-wrap">
      <div id="now-clue" class="now-clue" aria-live="polite">
        <span class="num">1</span> <span class="dir">ACROSS</span> · pick a cell to begin
      </div>
      <div id="board" class="board" role="application" aria-label="Crossword grid, 5 by 5">
        <!-- cells injected -->
      </div>
      <div id="status" class="status">↑ ↓ ← → to navigate · Tab to flip · Backspace to delete</div>
      <div class="toolbar">
        <button class="btn" type="button" id="check-btn">Check</button>
        <button class="btn" type="button" id="reveal-btn">Reveal word</button>
        <button class="btn" type="button" id="solve-btn">Reveal all</button>
        <button class="btn" type="button" id="clear-btn">Clear</button>
      </div>
    </div>

    <div class="clues-panel">
      <div class="clue-block across">
        <h2>Across</h2>
        <ul id="across-list" class="clue-list"></ul>
      </div>
      <div class="clue-block down">
        <h2>Down</h2>
        <ul id="down-list" class="clue-list"></ul>
      </div>
    </div>
  </div>

  <footer>music crossword · synth · neon · v1</footer>
</main>

<input id="kbd" class="hidden-input" autocomplete="off" autocapitalize="characters" inputmode="text">

<script>
// Puzzle data — generated by validate.py
const PUZZLE = {
  size: 5,
  across: [
    { num: 1, row: 0, col: 0, answer: 'CHORD', clue: 'Three or more notes played at once' },
    { num: 6, row: 1, col: 0, answer: 'LEGER', clue: '___ line: a music-staff extension above or below' },
    { num: 7, row: 2, col: 0, answer: 'ALLAY', clue: 'Soothe, as a tense crowd at a show' },
    { num: 8, row: 3, col: 0, answer: 'SIEVE', clue: 'Strainer in a tea-room kit' },
    { num: 9, row: 4, col: 0, answer: 'HOSER', clue: 'Bob & Doug McKenzie’s favorite put-down (Canadian slang)' },
  ],
  down: [
    { num: 1, row: 0, col: 0, answer: 'CLASH', clue: '“Rock the Casbah” English punk band, with “The”' },
    { num: 2, row: 0, col: 1, answer: 'HELIO', clue: 'Sun-related prefix (think “__centric”)' },
    { num: 3, row: 0, col: 2, answer: 'OGLES', clue: 'Gawks at, as a Beatlemania front-row fan' },
    { num: 4, row: 0, col: 3, answer: 'REAVE', clue: 'Plunder, in archaic English balladry' },
    { num: 5, row: 0, col: 4, answer: 'DRYER', clue: 'Common laundry-room hum source' },
  ],
};

const SIZE = PUZZLE.size;
const state = {
  letters: Array.from({length: SIZE}, () => Array(SIZE).fill('')),
  selected: { r: 0, c: 0 },
  direction: 'A',
  solved: false,
};

// Build cell map: each cell records the across/down clues that cover it
const cellMap = Array.from({length: SIZE}, () => Array.from({length: SIZE}, () => ({
  acrossClue: null,
  downClue: null,
  number: null,
  answer: '', // expected letter
})));

for (const a of PUZZLE.across) {
  for (let i = 0; i < a.answer.length; i++) {
    const cm = cellMap[a.row][a.col + i];
    cm.acrossClue = a;
    cm.answer = a.answer[i];
  }
  cellMap[a.row][a.col].number = a.num;
}
for (const d of PUZZLE.down) {
  for (let i = 0; i < d.answer.length; i++) {
    const cm = cellMap[d.row + i][d.col];
    cm.downClue = d;
    if (cm.answer && cm.answer !== d.answer[i]) {
      console.error('puzzle inconsistency at', d.row + i, d.col);
    }
    cm.answer = d.answer[i];
  }
  // numbers from across already set; if a cell starts a down word and not an across, mark it
  if (cellMap[d.row][d.col].number == null) {
    cellMap[d.row][d.col].number = d.num;
  } else if (cellMap[d.row][d.col].number !== d.num) {
    // both across and down share a number — keep across number (since across loop ran first)
    // no-op
  }
}

const $board = document.getElementById('board');
const $across = document.getElementById('across-list');
const $down = document.getElementById('down-list');
const $nowClue = document.getElementById('now-clue');
const $status = document.getElementById('status');
const $kbd = document.getElementById('kbd');

function buildBoard(){
  $board.innerHTML = '';
  for (let r = 0; r < SIZE; r++){
    for (let c = 0; c < SIZE; c++){
      const div = document.createElement('div');
      div.className = 'cell';
      div.dataset.r = r;
      div.dataset.c = c;
      div.setAttribute('role','gridcell');
      const cm = cellMap[r][c];
      if (cm.number){
        const n = document.createElement('span');
        n.className = 'num';
        n.textContent = cm.number;
        div.appendChild(n);
      }
      const letter = document.createElement('span');
      letter.className = 'letter';
      div.appendChild(letter);
      div.addEventListener('click', () => selectCell(r, c, true));
      $board.appendChild(div);
    }
  }
}

function buildClues(){
  $across.innerHTML = '';
  $down.innerHTML = '';
  for (const a of PUZZLE.across){
    const li = document.createElement('li');
    li.className = 'clue';
    li.dataset.dir = 'A';
    li.dataset.num = a.num;
    li.innerHTML = `<span class="n">${a.num}</span><span>${a.clue}</span>`;
    li.addEventListener('click', () => {
      state.direction = 'A';
      selectCell(a.row, a.col, true);
    });
    $across.appendChild(li);
  }
  for (const d of PUZZLE.down){
    const li = document.createElement('li');
    li.className = 'clue';
    li.dataset.dir = 'D';
    li.dataset.num = d.num;
    li.innerHTML = `<span class="n">${d.num}</span><span>${d.clue}</span>`;
    li.addEventListener('click', () => {
      state.direction = 'D';
      selectCell(d.row, d.col, true);
    });
    $down.appendChild(li);
  }
}

function selectCell(r, c, focusKbd){
  if (r < 0 || r >= SIZE || c < 0 || c >= SIZE) return;
  state.selected = { r, c };
  render();
  if (focusKbd) {
    // Focus hidden input so mobile keyboards appear and physical keys work
    try { $kbd.focus({ preventScroll: true }); } catch (e) { $kbd.focus(); }
  }
}

function activeClue(){
  const { r, c } = state.selected;
  const cm = cellMap[r][c];
  return state.direction === 'A' ? cm.acrossClue : cm.downClue;
}

function cellsInClue(clue){
  if (!clue) return [];
  const cells = [];
  for (let i = 0; i < clue.answer.length; i++){
    if (clue.row === clue.row && clue.answer.length){
      // Determine direction by checking if this clue is in the down list
      if (PUZZLE.down.includes(clue)){
        cells.push({ r: clue.row + i, c: clue.col });
      } else {
        cells.push({ r: clue.row, c: clue.col + i });
      }
    }
  }
  return cells;
}

function render(){
  const { r: sr, c: sc } = state.selected;
  const clue = activeClue();
  const highlight = new Set();
  if (clue) {
    for (const ce of cellsInClue(clue)) {
      highlight.add(ce.r + ',' + ce.c);
    }
  }
  const cells = $board.querySelectorAll('.cell');
  for (const cell of cells){
    const r = +cell.dataset.r;
    const c = +cell.dataset.c;
    cell.classList.remove('selected','highlight','wrong','correct');
    if (r === sr && c === sc) cell.classList.add('selected');
    else if (highlight.has(r + ',' + c)) cell.classList.add('highlight');
    cell.querySelector('.letter').textContent = state.letters[r][c];
  }
  // clue lists
  const aClues = $across.querySelectorAll('.clue');
  const dClues = $down.querySelectorAll('.clue');
  for (const el of aClues) el.classList.remove('active');
  for (const el of dClues) el.classList.remove('active');
  if (clue) {
    const list = state.direction === 'A' ? aClues : dClues;
    for (const el of list){
      if (+el.dataset.num === clue.num){
        el.classList.add('active');
        el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
        break;
      }
    }
  }
  // now-clue banner
  if (clue) {
    $nowClue.innerHTML = `<span class="num">${clue.num}</span> <span class="dir">${state.direction === 'A' ? 'ACROSS' : 'DOWN'}</span> · ${clue.clue}`;
  }
  // mark solved clues in lists
  for (const a of PUZZLE.across){
    const li = $across.querySelector(`.clue[data-num="${a.num}"]`);
    if (!li) continue;
    let solved = true;
    for (let i = 0; i < a.answer.length; i++){
      if (state.letters[a.row][a.col + i] !== a.answer[i]) { solved = false; break; }
    }
    li.classList.toggle('solved', solved);
  }
  for (const d of PUZZLE.down){
    const li = $down.querySelector(`.clue[data-num="${d.num}"]`);
    if (!li) continue;
    let solved = true;
    for (let i = 0; i < d.answer.length; i++){
      if (state.letters[d.row + i][d.col] !== d.answer[i]) { solved = false; break; }
    }
    li.classList.toggle('solved', solved);
  }
  // win check
  if (isComplete() && allCorrect()){
    if (!state.solved){
      state.solved = true;
      $board.classList.add('win');
      $status.innerHTML = '<span class="ok">★ SOLVED ★ encore!</span>';
    }
  } else {
    $board.classList.remove('win');
    if (state.solved){ state.solved = false; }
  }
}

function isComplete(){
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (!state.letters[r][c]) return false;
  return true;
}

function allCorrect(){
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (state.letters[r][c] !== cellMap[r][c].answer) return false;
  return true;
}

function advance(){
  const clue = activeClue();
  if (!clue) return;
  const { r, c } = state.selected;
  if (state.direction === 'A'){
    if (c + 1 < SIZE && c + 1 < clue.col + clue.answer.length){
      selectCell(r, c + 1);
    }
  } else {
    if (r + 1 < SIZE && r + 1 < clue.row + clue.answer.length){
      selectCell(r + 1, c);
    }
  }
}
function retreat(){
  const clue = activeClue();
  if (!clue) return;
  const { r, c } = state.selected;
  if (state.direction === 'A'){
    if (c - 1 >= clue.col){
      selectCell(r, c - 1);
    }
  } else {
    if (r - 1 >= clue.row){
      selectCell(r - 1, c);
    }
  }
}

function typeLetter(ch){
  const { r, c } = state.selected;
  state.letters[r][c] = ch.toUpperCase();
  advance();
  render();
}

function backspace(){
  const { r, c } = state.selected;
  if (state.letters[r][c]){
    state.letters[r][c] = '';
  } else {
    retreat();
    const { r: nr, c: nc } = state.selected;
    state.letters[nr][nc] = '';
  }
  render();
}

function flipDirection(){
  state.direction = state.direction === 'A' ? 'D' : 'A';
  render();
}

function move(dr, dc){
  const { r, c } = state.selected;
  let nr = r + dr, nc = c + dc;
  // If moving in direction-aligned axis, just move; else also flip direction to match
  if (dr !== 0 && state.direction !== 'D') state.direction = 'D';
  if (dc !== 0 && state.direction !== 'A') state.direction = 'A';
  if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE) {
    render();
    return;
  }
  selectCell(nr, nc);
}

function handleKey(e){
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (e.key === 'Backspace') { e.preventDefault(); backspace(); return; }
  if (e.key === 'Tab' || e.key === 'Enter') { e.preventDefault(); flipDirection(); return; }
  if (e.key === 'ArrowLeft')  { e.preventDefault(); move(0, -1); return; }
  if (e.key === 'ArrowRight') { e.preventDefault(); move(0, +1); return; }
  if (e.key === 'ArrowUp')    { e.preventDefault(); move(-1, 0); return; }
  if (e.key === 'ArrowDown')  { e.preventDefault(); move(+1, 0); return; }
  if (/^[a-zA-Z]$/.test(e.key)){
    e.preventDefault();
    typeLetter(e.key);
    return;
  }
}

// Mobile: also listen to the hidden input
$kbd.addEventListener('input', () => {
  const v = $kbd.value;
  if (v && /[a-zA-Z]/.test(v[v.length-1])) {
    typeLetter(v[v.length-1]);
  }
  $kbd.value = '';
});

document.addEventListener('keydown', handleKey);

document.getElementById('check-btn').addEventListener('click', () => {
  const cells = $board.querySelectorAll('.cell');
  let bad = 0, ok = 0, blank = 0;
  for (const cell of cells){
    const r = +cell.dataset.r, c = +cell.dataset.c;
    cell.classList.remove('wrong','correct');
    const v = state.letters[r][c];
    if (!v) { blank++; continue; }
    if (v === cellMap[r][c].answer){ cell.classList.add('correct'); ok++; }
    else { cell.classList.add('wrong'); bad++; }
  }
  if (bad === 0 && blank === 0){
    $status.innerHTML = '<span class="ok">★ all green — solved ★</span>';
  } else if (bad === 0){
    $status.innerHTML = `<span>so far so good · ${ok}/25 correct</span>`;
  } else {
    $status.innerHTML = `<span class="err">${bad} off-key letter${bad===1?'':'s'}</span>`;
  }
  setTimeout(() => {
    for (const cell of cells) cell.classList.remove('wrong','correct');
    render();
  }, 1800);
});

document.getElementById('reveal-btn').addEventListener('click', () => {
  const clue = activeClue();
  if (!clue) return;
  const cells = cellsInClue(clue);
  for (const ce of cells){
    state.letters[ce.r][ce.c] = cellMap[ce.r][ce.c].answer;
  }
  render();
});

document.getElementById('solve-btn').addEventListener('click', () => {
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      state.letters[r][c] = cellMap[r][c].answer;
  render();
});

document.getElementById('clear-btn').addEventListener('click', () => {
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      state.letters[r][c] = '';
  $status.innerHTML = '↑ ↓ ← → to navigate · Tab to flip · Backspace to delete';
  render();
});

// boot
buildBoard();
buildClues();
selectCell(0, 0, false);
</script>
</body>
</html>
