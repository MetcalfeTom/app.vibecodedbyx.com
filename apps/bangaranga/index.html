<style>
:root{
  --bg-a: #fff5e1;
  --bg-b: #ffe2c8;
  --ink: #1d0f3d;
  --dim: #6a4e8a;

  /* tropical accent palette — 8 swappable hues */
  --coral:  #ff5e7a;
  --mango:  #ff9a3c;
  --lemon:  #ffd54a;
  --lime:   #b8ff5a;
  --mint:   #3cffd9;
  --sky:    #3cd0ff;
  --pop:    #ff3ccc;
  --grape:  #7e5bff;

  --card-bg: #ffffff;
}
*{ box-sizing: border-box; }
html{ font-size: 100%; }
body{
  margin: 0;
  min-height: 100vh;
  font-family: 'Bricolage Grotesque', system-ui, sans-serif;
  color: var(--ink);
  background:
    radial-gradient(circle at 12% 8%, rgba(255, 60, 204, 0.32), transparent 38%),
    radial-gradient(circle at 92% 12%, rgba(60, 208, 255, 0.32), transparent 38%),
    radial-gradient(circle at 88% 92%, rgba(184, 255, 90, 0.28), transparent 38%),
    radial-gradient(circle at 8% 90%, rgba(255, 154, 60, 0.28), transparent 38%),
    linear-gradient(180deg, var(--bg-a) 0%, var(--bg-b) 100%);
  background-attachment: fixed;
  padding: 4.5rem 1rem 5rem;
}

main{
  width: 100%;
  max-width: 76rem;
  margin: 0 auto;
}

/* ───── HERO ───── */
header{
  text-align: center;
  margin-bottom: 1.6rem;
}
h1{
  margin: 0;
  font-family: 'Bagel Fat One', cursive;
  font-weight: 400;
  font-size: clamp(3rem, 11vw, 6.4rem);
  letter-spacing: -0.01em;
  line-height: 0.92;
  background: linear-gradient(96deg, #ff5e7a 0%, #ff9a3c 18%, #ffd54a 35%, #b8ff5a 55%, #3cffd9 72%, #3cd0ff 88%, #ff3ccc 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-shadow: 0 6px 0 rgba(0,0,0,0.06);
  filter: drop-shadow(0 4px 0 rgba(29, 15, 61, 0.10));
}
.tag{
  margin: 0.5rem 0 0;
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 300;
  font-size: clamp(1rem, 2.6vw, 1.4rem);
  color: var(--ink);
  letter-spacing: 0.01em;
}
.tag em{ color: var(--pop); font-style: normal; font-family: 'Bagel Fat One', cursive; }
.meta{
  margin-top: 0.7rem;
  display: inline-flex;
  gap: 0.4rem;
  flex-wrap: wrap;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
  letter-spacing: 0.06em;
  color: var(--dim);
}
.meta .chip{
  background: rgba(255,255,255,0.6);
  border: 1px solid rgba(29, 15, 61, 0.16);
  padding: 0.18rem 0.5rem;
  border-radius: 999px;
}

/* ───── TAB NAV ───── */
nav.tabs{
  display: flex;
  gap: 0.42rem;
  overflow-x: auto;
  padding: 0.8rem 0.2rem;
  margin-bottom: 1rem;
  scrollbar-width: thin;
  scroll-snap-type: x proximity;
  -webkit-overflow-scrolling: touch;
}
nav.tabs::-webkit-scrollbar{ height: 6px; }
nav.tabs::-webkit-scrollbar-thumb{ background: rgba(29,15,61,0.16); border-radius: 999px; }

.tab{
  flex-shrink: 0;
  scroll-snap-align: start;
  background: rgba(255, 255, 255, 0.78);
  border: 2px solid rgba(29, 15, 61, 0.20);
  color: var(--ink);
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 700;
  font-size: 0.96rem;
  padding: 0.62rem 1.1rem;
  border-radius: 999px;
  cursor: pointer;
  min-height: 2.75rem;
  display: inline-flex;
  align-items: center;
  gap: 0.42rem;
  transition: transform 0.14s ease-out, background 0.2s, border-color 0.2s, box-shadow 0.2s;
}
.tab .emoji{ font-size: 1.1rem; line-height: 1; }
.tab:hover{ transform: translateY(-2px); }
.tab[aria-pressed="true"]{
  background: var(--ink);
  color: #fff;
  border-color: var(--ink);
  box-shadow:
    0 4px 0 rgba(29, 15, 61, 0.18),
    0 0 0 4px rgba(255, 60, 204, 0.20);
}
.tab[aria-pressed="true"] .emoji{ transform: scale(1.18); }

/* ───── CATEGORY HEADER + ACTIONS ───── */
.cat-head{
  display: flex;
  flex-wrap: wrap;
  align-items: baseline;
  gap: 0.6rem;
  padding: 0 0.2rem;
  margin: 0.4rem 0 0.8rem;
}
.cat-title{
  font-family: 'Bagel Fat One', cursive;
  font-size: clamp(1.5rem, 4.4vw, 2.4rem);
  line-height: 1;
  color: var(--ink);
  letter-spacing: -0.005em;
}
.cat-blurb{
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 300;
  font-size: 1.04rem;
  color: var(--dim);
  flex: 1 1 14rem;
}
.actions{
  display: flex;
  gap: 0.5rem;
  margin-left: auto;
  flex-wrap: wrap;
}
.btn{
  background: var(--ink);
  color: #fff;
  border: none;
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 700;
  font-size: 0.88rem;
  letter-spacing: 0.02em;
  padding: 0.6rem 1rem;
  border-radius: 999px;
  cursor: pointer;
  min-height: 2.75rem;
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  box-shadow: 0 4px 0 rgba(29, 15, 61, 0.22);
  transition: transform 0.12s, box-shadow 0.12s;
}
.btn:hover{ transform: translateY(-2px); box-shadow: 0 6px 0 rgba(29, 15, 61, 0.22); }
.btn:active{ transform: translateY(2px); box-shadow: 0 2px 0 rgba(29, 15, 61, 0.22); }
.btn.alt{ background: #fff; color: var(--ink); border: 2px solid var(--ink); }
*:focus-visible{ outline: 3px solid var(--pop); outline-offset: 3px; }

/* ───── CARD GRID ───── */
.grid{
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(15rem, 1fr));
  gap: 0.85rem;
}
.card{
  position: relative;
  background: var(--card-bg);
  border: 2px solid var(--ink);
  border-radius: 14px;
  padding: 1rem 1rem 0.85rem;
  cursor: pointer;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  gap: 0.6rem;
  min-height: 8rem;
  box-shadow: 4px 4px 0 var(--accent, var(--coral));
  transition: transform 0.14s ease-out, box-shadow 0.14s ease-out;
  text-align: left;
  overflow: hidden;
}
.card::before{
  content: '';
  position: absolute;
  inset: 0 0 0 0;
  background: linear-gradient(125deg, color-mix(in srgb, var(--accent, var(--coral)) 18%, transparent), transparent 55%);
  pointer-events: none;
  border-radius: 12px;
}
.card:hover{
  transform: translate(-2px, -2px);
  box-shadow: 8px 8px 0 var(--accent, var(--coral));
}
.card:active{ transform: translate(0, 0); box-shadow: 2px 2px 0 var(--accent, var(--coral)); }
.card .idx{
  font-family: 'Bagel Fat One', cursive;
  color: var(--accent, var(--coral));
  font-size: 0.92rem;
  letter-spacing: 0.02em;
  position: relative;
  z-index: 1;
}
.card .body{
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 700;
  color: var(--ink);
  font-size: 1.05rem;
  line-height: 1.28;
  position: relative;
  z-index: 1;
}
.card .meta-row{
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.72rem;
  color: var(--dim);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  position: relative;
  z-index: 1;
}
.card .meta-row .copy{
  background: var(--ink);
  color: #fff;
  border: none;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.66rem;
  letter-spacing: 0.10em;
  padding: 0.34rem 0.6rem;
  border-radius: 999px;
  cursor: pointer;
  min-height: 1.8rem;
}

/* hashtag stacks rendered as chips */
.tags{
  display: flex;
  flex-wrap: wrap;
  gap: 0.3rem;
  position: relative;
  z-index: 1;
}
.tags .h{
  background: color-mix(in srgb, var(--accent, var(--coral)) 18%, white);
  color: var(--ink);
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  font-size: 0.82rem;
  padding: 0.18rem 0.46rem;
  border-radius: 999px;
  border: 1px solid color-mix(in srgb, var(--accent, var(--coral)) 50%, transparent);
}

/* color palette swatches */
.swatches{
  display: flex;
  gap: 0;
  border-radius: 8px;
  overflow: hidden;
  position: relative;
  z-index: 1;
  border: 1px solid rgba(29,15,61,0.20);
}
.swatches .sw{
  flex: 1;
  height: 3.4rem;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  padding: 0.3rem 0.2rem;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.66rem;
  letter-spacing: 0.02em;
  color: #fff;
  text-shadow: 0 1px 2px rgba(0,0,0,0.5);
  font-weight: 700;
}
.swatches .sw.light{ color: #1d0f3d; text-shadow: 0 1px 0 rgba(255,255,255,0.7); }

/* font pair card */
.font-pair .display{
  font-size: 1.55rem;
  line-height: 1.05;
  margin: 0.2rem 0 0.1rem;
  color: var(--ink);
}
.font-pair .sample{
  font-size: 0.92rem;
  line-height: 1.36;
  color: var(--ink);
}
.font-pair .credit{
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.66rem;
  color: var(--dim);
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-top: 0.2rem;
}

/* ───── TOAST ───── */
#toast{
  position: fixed;
  bottom: 1.4rem;
  left: 50%;
  transform: translate(-50%, 1rem);
  background: var(--ink);
  color: #fff;
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 700;
  font-size: 0.95rem;
  padding: 0.75rem 1.2rem;
  border-radius: 999px;
  opacity: 0;
  pointer-events: none;
  z-index: 80;
  transition: opacity 0.22s, transform 0.22s;
  box-shadow:
    0 0 0 3px var(--pop),
    0 12px 30px rgba(0,0,0,0.25);
}
#toast.show{ opacity: 1; transform: translate(-50%, 0); }

/* ───── FOOTER ───── */
footer{
  margin-top: 2rem;
  text-align: center;
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 300;
  color: var(--dim);
  font-size: 0.95rem;
}
footer .heart{ color: var(--pop); font-style: normal; }

@media (prefers-reduced-motion: reduce){
  *{ transition: none !important; animation: none !important; }
  .card:hover, .tab:hover, .btn:hover{ transform: none; }
}

@media (max-width: 28rem){
  body{ padding: 3rem 0.7rem 4rem; }
  .actions{ width: 100%; }
  .actions .btn{ flex: 1 1 8rem; justify-content: center; }
}
</style>

      'professional [thing] hater · part-time [thing] lover',
      '🥥 chronically online but in a tropical way',
      'ceo of [unserious thing] · 📩 [email]',
      '[birth year] · [zodiac] · [niche obsession] · soft launched',
      '📍 [location] 🥥 [niche] ✿ [link]',
      'the [adjective] one · @[handle] for the rest of the cast',
      'i make videos when the sun says so ☀️',
      '🌺 [thing] connoisseur · taking applications for muse',
    ],
  },
];

let activeCat = CATEGORIES[0].id;
let orderMap = {};      // catId → array of indices (for shuffle)
for (const c of CATEGORIES) orderMap[c.id] = c.items.map((_, i) => i);

/* ── tab nav ── */
const navEl = document.querySelector('nav.tabs');
function buildTabs(){
  navEl.innerHTML = '';
  for (const c of CATEGORIES){
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'tab';
    b.dataset.cat = c.id;
    b.setAttribute('role', 'tab');
    b.setAttribute('aria-pressed', c.id === activeCat ? 'true' : 'false');
    b.innerHTML = `<span class="emoji" aria-hidden="true">${c.emoji}</span><span>${c.label}</span>`;
    b.addEventListener('click', () => setActive(c.id));
    navEl.appendChild(b);
  }
}
function setActive(id){
  activeCat = id;
  for (const t of navEl.querySelectorAll('.tab')){
    t.setAttribute('aria-pressed', t.dataset.cat === id ? 'true' : 'false');
    if (t.dataset.cat === id) t.scrollIntoView({ block: 'nearest', inline: 'center', behavior: 'smooth' });
  }
  render();
}

/* ── render the active category ── */
const gridEl = document.getElementById('grid');
const titleEl = document.getElementById('cat-title');
const blurbEl = document.getElementById('cat-blurb');

function render(){
  const cat = CATEGORIES.find(c => c.id === activeCat);
  titleEl.textContent = cat.label + '.';
  blurbEl.textContent = cat.blurb;
  gridEl.innerHTML = '';
  const order = orderMap[cat.id];
  for (let i = 0; i < order.length; i++){
    const itemIdx = order[i];
    const card = makeCard(cat, itemIdx, i);
    gridEl.appendChild(card);
  }
}

function makeCard(cat, itemIdx, displayIdx){
  const item = cat.items[itemIdx];
  const card = document.createElement('div');
  card.className = 'card';
  if (cat.kind === 'fontpair') card.classList.add('font-pair');
  const accentVar = PALETTE_VARS[displayIdx % PALETTE_VARS.length];
  card.style.setProperty('--accent', `var(${accentVar})`);
  card.setAttribute('role', 'button');
  card.setAttribute('tabindex', '0');

  const number = (displayIdx + 1).toString().padStart(2, '0');
  const idxRow = `<div class="idx">${number} · ${cat.emoji}</div>`;
  let body = '';
  let copyText = '';
  let typeLabel = cat.label.toUpperCase();

  if (cat.kind === 'text'){
    body = `<div class="body">${escapeHtml(item)}</div>`;
    copyText = item;
  } else if (cat.kind === 'tags'){
    body = `<div class="tags">${item.map(t => `<span class="h">${escapeHtml(t)}</span>`).join('')}</div>`;
    copyText = item.join(' ');
  } else if (cat.kind === 'palette'){
    body = `
      <div class="body" style="font-size: 0.96rem;">${escapeHtml(item.name)}</div>
      <div class="swatches">${item.hexes.map(h => {
        const lum = hexLuminance(h);
        return `<div class="sw ${lum > 0.55 ? 'light' : ''}" style="background:${h}">${h}</div>`;
      }).join('')}</div>
    `;
    copyText = item.name + '\n' + item.hexes.join(' ');
  } else if (cat.kind === 'fontpair'){
    body = `
      <div class="display" style="font-family: '${item.display}', system-ui, sans-serif;">${escapeHtml(item.display)}</div>
      <div class="sample" style="font-family: '${item.body}', system-ui, sans-serif;">The quick tropical fox vibes over the lazy palm tree — 0123 ✦</div>
      <div class="credit">${escapeHtml(item.vibe)}</div>
    `;
    copyText = item.display + ' + ' + item.body + '\n' + item.vibe;
  }

  card.innerHTML = `
    ${idxRow}
    ${body}
    <div class="meta-row">
      <span>${typeLabel}</span>
      <button class="copy" type="button" aria-label="Copy this ${cat.label} item">copy</button>
    </div>
  `;
  // whole-card click = copy
  card.addEventListener('click', (e) => {
    // ignore if the click was on the explicit copy button itself (handled below)
    if (e.target.closest('.copy')) return;
    copyToClipboard(copyText);
  });
  card.addEventListener('keydown', (e) => {
    if (e.code === 'Enter' || e.code === 'Space'){
      e.preventDefault();
      copyToClipboard(copyText);
    }
  });
  card.querySelector('.copy').addEventListener('click', (e) => {
    e.stopPropagation();
    copyToClipboard(copyText);
  });
  return card;
}

/* ── shuffle + steal all ── */
document.getElementById('btn-shuffle').addEventListener('click', () => {
  const order = orderMap[activeCat];
  // Fisher-Yates
  for (let i = order.length - 1; i > 0; i--){
    const j = (Math.random() * (i + 1)) | 0;
    [order[i], order[j]] = [order[j], order[i]];
  }
  render();
  showToast('🔀 shuffled');
});
document.getElementById('btn-steal-all').addEventListener('click', () => {
  const cat = CATEGORIES.find(c => c.id === activeCat);
  const lines = [];
  for (let i = 0; i < cat.items.length; i++){
    const idx = orderMap[cat.id][i];
    const it = cat.items[idx];
    let s = '';
    if (cat.kind === 'text') s = it;
    else if (cat.kind === 'tags') s = it.join(' ');
    else if (cat.kind === 'palette') s = it.name + ' — ' + it.hexes.join(' ');
    else if (cat.kind === 'fontpair') s = it.display + ' + ' + it.body + ' (' + it.vibe + ')';
    lines.push(`${(i+1).toString().padStart(2,'0')}. ${s}`);
  }
  const blob = `BANGARANGA · ${cat.label.toUpperCase()}\n\n` + lines.join('\n');
  copyToClipboard(blob, '📋 all 10 copied');
});

/* ── clipboard + toast ── */
async function copyToClipboard(text, msg){
  try {
    await navigator.clipboard.writeText(text);
    showToast(msg || '✓ copied');
  } catch (e){
    // fallback for older browsers
    const ta = document.createElement('textarea');
    ta.value = text;
    ta.style.position = 'fixed'; ta.style.left = '-9999px';
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand('copy'); showToast(msg || '✓ copied'); }
    catch (_e){ showToast('couldn’t copy — try the button'); }
    document.body.removeChild(ta);
  }
}
let toastTimer = null;
function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1700);
}

/* ── helpers ── */
function escapeHtml(s){
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}
function hexLuminance(hex){
  const v = hex.replace('#','');
  const r = parseInt(v.substring(0,2),16) / 255;
  const g = parseInt(v.substring(2,4),16) / 255;
  const b = parseInt(v.substring(4,6),16) / 255;
  return 0.299 * r + 0.587 * g + 0.114 * b;
}

/* ── boot ── */
buildTabs();
render();
</script>
</body>
</html>
