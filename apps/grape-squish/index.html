<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Grape Squish</title>
<link rel="icon" href="https://emojicdn.elk.sh/🍇" />
<meta name="description" content="Squish grapes with a cat paw. They dodge when you click." />
<meta property="og:title" content="Grape Squish" />
<meta property="og:description" content="Squish grapes with a cat paw. They dodge when you click." />
<meta property="og:url" content="https://sloppy.live/grape-squish" />
<meta property="og:image" content="https://sloppy.live/screenshots/grape-squish.jpg" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Azeret+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0a0510;
    --grape: #9b30ff;
    --grape-dark: #6a1fb0;
    --paw: #ffb8d0;
    --paw-dark: #e89ab0;
    --neon-pink: #ff2d8a;
    --neon-cyan: #00ffe5;
    --neon-gold: #ffd642;
    --splat: #c850ff;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--bg);
    font-family: 'Azeret Mono', monospace;
    user-select: none;
    touch-action: none;
    cursor: none;
  }
  canvas { display: block; }

  /* HUD */
  #hud {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    padding: 10px 16px;
    display: flex; justify-content: space-between; align-items: center;
    pointer-events: none;
  }
  #hud .title {
    font-family: 'Bungee Shade', sans-serif;
    font-size: 16px;
    color: var(--grape);
    text-shadow: 0 0 10px rgba(155,48,255,0.5), 2px 2px 0 rgba(0,0,0,0.8);
    letter-spacing: 0.08em;
  }
  #hud .stats {
    display: flex; gap: 14px;
    font-size: 12px; font-weight: 700; letter-spacing: 0.08em;
  }
  .stat-label { color: #5a4570; }
  .stat-val { color: var(--neon-gold); }
  .stat-val.combo { color: var(--neon-pink); }
  .stat-val.miss { color: #f55; }

  /* Screens */
  .screen-overlay {
    position: fixed; inset: 0; z-index: 20;
    background: rgba(10,5,16,0.93);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(6px);
    cursor: default;
  }
  .screen-box { text-align: center; max-width: 420px; padding: 24px; }
  .screen-box h1 {
    font-family: 'Bungee Shade', sans-serif;
    font-size: 36px; color: var(--grape);
    text-shadow: 0 0 30px rgba(155,48,255,0.4);
    margin-bottom: 6px;
  }
  .screen-box .tagline {
    font-size: 13px; color: #6a5580; line-height: 1.7; margin-bottom: 20px;
  }
  .screen-box .final-score {
    font-family: 'Bungee Shade', sans-serif;
    font-size: 48px; color: var(--neon-gold);
    text-shadow: 0 0 20px rgba(255,214,66,0.4);
    margin: 10px 0;
  }
  .screen-box .final-stats {
    display: flex; gap: 16px; justify-content: center; margin: 14px 0;
    font-size: 12px; color: #6a5580;
  }
  .screen-box .final-stats .v { color: var(--neon-cyan); font-weight: 700; }
  .play-btn {
    font-family: 'Azeret Mono', monospace;
    font-size: 14px; font-weight: 700;
    padding: 14px 40px;
    background: transparent;
    border: 2px solid var(--grape);
    color: var(--grape);
    border-radius: 8px;
    cursor: pointer;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    transition: all .15s;
  }
  .play-btn:hover { background: rgba(155,48,255,0.15); color: #c070ff; border-color: #c070ff; }

    </style>
</head>
<body>

<div id="hud" style="display:none">
  <div class="title">GRAPE SQUISH</div>
  <div class="stats">
    <span><span class="stat-label">score </span><span class="stat-val" id="scoreEl">0</span></span>
    <span><span class="stat-label">combo </span><span class="stat-val combo" id="comboEl">0</span></span>
    <span><span class="stat-label">miss </span><span class="stat-val miss" id="missEl">0</span>/5</span>
    <span><span class="stat-label">wave </span><span class="stat-val" id="waveEl">1</span></span>
  </div>
</div>

<div class="screen-overlay" id="startScreen">
  <div class="screen-box">
    <h1>Grape Squish</h1>
    <div class="tagline">
      Purple grapes fall from the sky.<br/>
      Squish them with your cat paw.<br/>
      But click and they <span style="color:var(--neon-pink)">dodge</span>.
    </div>
    <button class="play-btn" id="startBtn">Pounce</button>
  </div>
</div>

<div class="screen-overlay" id="endScreen" style="display:none">
  <div class="screen-box">
    <h1>Game Over</h1>
    <div class="final-score" id="finalScore">0</div>
    <div class="final-stats">
      <span>squished <span class="v" id="finalSquished">0</span></span>
      <span>dodged <span class="v" id="finalDodged">0</span></span>
      <span>best combo <span class="v" id="finalCombo">0</span></span>
      <span>wave <span class="v" id="finalWave">1</span></span>
    </div>
    <button class="play-btn" id="replayBtn">Again</button>
  </div>
</div>
<canvas id="c"></canvas>

<script>
(function() {
  'use strict';

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W, H;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  resize();
  window.addEventListener('resize', resize);

  // === AUDIO ===
  let audioCtx;
  function audio() {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtx;
  }

  function sfx(freq, dur, type, vol) {
    const ctx = audio();
    if (ctx.state === 'suspended') ctx.resume();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type || 'square';
    osc.frequency.setValueAtTime(freq, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(freq * 0.5, ctx.currentTime + dur);
    gain.gain.setValueAtTime(vol || 0.08, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
    osc.connect(gain).connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + dur);
  }

  function splatSfx() {
    sfx(300, 0.08, 'sine', 0.12);
    setTimeout(() => sfx(150, 0.06, 'triangle', 0.08), 30);
  }

  function dodgeSfx() {
    sfx(800, 0.06, 'square', 0.05);
    sfx(1200, 0.04, 'square', 0.03);
  }

  function missSfx() {
    sfx(120, 0.2, 'sawtooth', 0.06);
  }

  // === STATE ===
  const state = {
    phase: 'idle', // idle, playing, over
    score: 0,
    combo: 0,
    bestCombo: 0,
    squished: 0,
    dodged: 0,
    misses: 0,
    maxMisses: 5,
    wave: 1,
    waveTimer: 0,
    waveInterval: 600, // frames per wave
  };

  let grapes = [];
  let splats = [];  // visual effects
  let pawX = W / 2, pawY = H / 2;
  let pawSlamming = 0; // frames of slam animation
  let pawScale = 1;
  const PAW_SIZE = 44;
  let particles = [];

  // === GRAPE ===
  function spawnGrape() {
    const speed = 1.5 + state.wave * 0.25 + Math.random() * 0.8;
    const x = 40 + Math.random() * (W - 80);
    grapes.push({
      x,
      y: -20,
      vx: (Math.random() - 0.5) * 0.5,
      vy: speed,
      r: 14 + Math.random() * 6,
      hue: 260 + Math.random() * 30, // purple range
      dodging: 0,       // dodge cooldown
      dodgeVx: 0,
      dodgeVy: 0,
      wobble: Math.random() * Math.PI * 2,
      alive: true,
    });
  }

  function updateGrape(g) {
    g.wobble += 0.08;

    // Dodge logic
    if (g.dodging > 0) {
      g.dodging--;
      g.x += g.dodgeVx;
      g.y += g.dodgeVy;
      g.dodgeVx *= 0.94;
      g.dodgeVy *= 0.94;
    }

    g.x += g.vx + Math.sin(g.wobble) * 0.3;
    g.y += g.vy;

    // Bounce off edges
    if (g.x < g.r) { g.x = g.r; g.vx = Math.abs(g.vx) + 0.5; }
    if (g.x > W - g.r) { g.x = W - g.r; g.vx = -(Math.abs(g.vx) + 0.5); }

    // Fell off bottom = miss
    if (g.y > H + 30) {
      g.alive = false;
      state.misses++;
      state.combo = 0;
      missSfx();
    }
  }

  function triggerDodge(g, fromX, fromY) {
    if (g.dodging > 0) return; // already dodging
    const dx = g.x - fromX;
    const dy = g.y - fromY;
    const dist = Math.hypot(dx, dy);
    if (dist < 1) return;

    const dodgeSpeed = 8 + state.wave * 0.5;
    g.dodgeVx = (dx / dist) * dodgeSpeed + (Math.random() - 0.5) * 4;
    g.dodgeVy = (dy / dist) * dodgeSpeed * 0.6 - 3; // bias upward
    g.dodging = 20;
    state.dodged++;
    dodgeSfx();
  }

  // === SQUISH CHECK ===
  function trySquish(x, y) {
    let hit = false;
    for (let i = grapes.length - 1; i >= 0; i--) {
      const g = grapes[i];
      if (!g.alive) continue;
      const dist = Math.hypot(g.x - x, g.y - y);
      if (dist < g.r + PAW_SIZE * 0.5) {
        // Squished!
        g.alive = false;
        hit = true;
        state.combo++;
        if (state.combo > state.bestCombo) state.bestCombo = state.combo;
        const comboMult = Math.min(state.combo, 10);
        state.score += 10 * comboMult;
        state.squished++;

        // Splat effect
        createSplat(g.x, g.y, g.r, g.hue);
        splatSfx();

        // Only squish one per click for fairness? No — reward precision, squish all in range
      }
    }
    if (!hit) {
      // Clicked empty — all nearby grapes dodge!
      for (const g of grapes) {
        if (!g.alive) continue;
        const dist = Math.hypot(g.x - x, g.y - y);
        if (dist < 120) {
          triggerDodge(g, x, y);
        }
      }
      state.combo = 0;
    }
    return hit;
  }

  // === VISUAL EFFECTS ===
  function createSplat(x, y, r, hue) {
    splats.push({ x, y, r, hue, ttl: 30, maxTtl: 30 });

    // Juice particles
    for (let i = 0; i < 12; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 2 + Math.random() * 5;
      particles.push({
        x, y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 2,
        r: 2 + Math.random() * 3,
        hue: hue + Math.random() * 20 - 10,
        ttl: 20 + Math.random() * 15,
        maxTtl: 35,
        gravity: 0.15,
      });
    }
  }

  // === DRAWING ===
  function drawGrape(g) {
    ctx.save();
    ctx.translate(g.x, g.y);

    // Glow
    ctx.shadowColor = `hsl(${g.hue}, 80%, 55%)`;
    ctx.shadowBlur = g.dodging > 0 ? 18 : 10;

    // Main grape body
    ctx.fillStyle = `hsl(${g.hue}, 70%, 42%)`;
    ctx.beginPath();
    ctx.arc(0, 0, g.r, 0, Math.PI * 2);
    ctx.fill();

    // Highlight
    ctx.fillStyle = `hsla(${g.hue}, 80%, 65%, 0.4)`;
    ctx.beginPath();
    ctx.arc(-g.r * 0.25, -g.r * 0.3, g.r * 0.4, 0, Math.PI * 2);
    ctx.fill();

    // Stem
    ctx.strokeStyle = '#4a8a30';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, -g.r);
    ctx.quadraticCurveTo(3, -g.r - 6, 6, -g.r - 10);
    ctx.stroke();

    // Dodge flash
    if (g.dodging > 10) {
      ctx.fillStyle = `hsla(0, 100%, 80%, ${(g.dodging - 10) / 10 * 0.3})`;
      ctx.beginPath();
      ctx.arc(0, 0, g.r + 4, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.shadowBlur = 0;
    ctx.restore();
  }

  function drawPaw(x, y) {
    ctx.save();
    ctx.translate(x, y);

    const scale = pawSlamming > 0 ? 1.15 - (pawSlamming / 12) * 0.3 : pawScale;
    ctx.scale(scale, scale);

    // Paw shadow
    if (pawSlamming > 0) {
      ctx.fillStyle = 'rgba(255,180,210,0.08)';
      ctx.beginPath();
      ctx.ellipse(0, 6, PAW_SIZE * 0.6, PAW_SIZE * 0.3, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Main pad
    ctx.fillStyle = 'var(--paw)';
    ctx.shadowColor = '#ff88bb';
    ctx.shadowBlur = pawSlamming > 0 ? 20 : 8;

    // Big central pad
    ctx.fillStyle = '#ffb8d0';
    ctx.beginPath();
    ctx.ellipse(0, 4, 18, 14, 0, 0, Math.PI * 2);
    ctx.fill();

    // Toe beans
    const beans = [
      { x: -12, y: -10, rx: 7, ry: 8 },
      { x: 0,   y: -14, rx: 7, ry: 8 },
      { x: 12,  y: -10, rx: 7, ry: 8 },
      { x: -18, y: -2,  rx: 6, ry: 7 },
    ];
    ctx.fillStyle = '#ffc8d8';
    for (const b of beans) {
      ctx.beginPath();
      ctx.ellipse(b.x, b.y, b.rx, b.ry, 0, 0, Math.PI * 2);
      ctx.fill();
    }

    // Inner pads (darker pink)
    ctx.fillStyle = '#e8a0b8';
    ctx.beginPath();
    ctx.ellipse(0, 6, 12, 9, 0, 0, Math.PI * 2);
    ctx.fill();

    const innerBeans = [
      { x: -11, y: -9, r: 4.5 },
      { x: 0,   y: -13, r: 4.5 },
      { x: 11,  y: -9, r: 4.5 },
      { x: -17, y: -1, r: 4 },
    ];
    ctx.fillStyle = '#e090a8';
    for (const b of innerBeans) {
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();
    }

    // Claws on slam
    if (pawSlamming > 6) {
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 1.5;
      ctx.lineCap = 'round';
      const clawExt = (pawSlamming - 6) / 6 * 6;
      const clawPts = [
        { fx: -14, fy: -16, tx: -18, ty: -22 },
        { fx: -1,  fy: -20, tx: -1,  ty: -27 },
        { fx: 12,  fy: -16, tx: 16,  ty: -22 },
        { fx: -22, fy: -6,  tx: -28, ty: -10 },
      ];
      for (const cl of clawPts) {
        ctx.beginPath();
        ctx.moveTo(cl.fx, cl.fy);
        ctx.lineTo(cl.fx + (cl.tx - cl.fx) * clawExt / 6, cl.fy + (cl.ty - cl.fy) * clawExt / 6);
        ctx.stroke();
      }
    }

    ctx.shadowBlur = 0;
    ctx.restore();
  }

  function drawSplats() {
    for (let i = splats.length - 1; i >= 0; i--) {
      const s = splats[i];
      s.ttl--;
      if (s.ttl <= 0) { splats.splice(i, 1); continue; }
      const alpha = s.ttl / s.maxTtl;
      const expand = 1 + (1 - alpha) * 0.5;

      ctx.save();
      ctx.globalAlpha = alpha * 0.6;
      ctx.fillStyle = `hsl(${s.hue}, 70%, 50%)`;
      ctx.shadowColor = `hsl(${s.hue}, 80%, 60%)`;
      ctx.shadowBlur = 15;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r * expand, 0, Math.PI * 2);
      ctx.fill();

      // Splat ring
      ctx.strokeStyle = `hsla(${s.hue}, 80%, 65%, ${alpha * 0.4})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r * expand * 1.8, 0, Math.PI * 2);
      ctx.stroke();

      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
      ctx.restore();
    }
  }

  function drawParticles() {
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.ttl--;
      if (p.ttl <= 0) { particles.splice(i, 1); continue; }
      p.vy += p.gravity;
      p.x += p.vx;
      p.y += p.vy;
      const alpha = p.ttl / p.maxTtl;
      ctx.fillStyle = `hsla(${p.hue}, 70%, 55%, ${alpha})`;
      ctx.shadowColor = `hsl(${p.hue}, 80%, 60%)`;
      ctx.shadowBlur = 4;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * alpha, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
  }

  function drawComboText() {
    if (state.combo < 2) return;
    ctx.save();
    ctx.font = `700 ${20 + state.combo * 2}px 'Azeret Mono', monospace`;
    ctx.fillStyle = state.combo >= 8 ? '#ffd642' : state.combo >= 4 ? '#ff2d8a' : '#c850ff';
    ctx.shadowColor = ctx.fillStyle;
    ctx.shadowBlur = 10;
    ctx.textAlign = 'center';
    ctx.fillText(`${state.combo}x COMBO`, W / 2, 80);
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  function drawMissIndicator() {
    const barW = 120;
    const barH = 4;
    const x = W / 2 - barW / 2;
    const y = H - 30;
    ctx.fillStyle = '#1a1020';
    ctx.fillRect(x, y, barW, barH);
    const pct = state.misses / state.maxMisses;
    ctx.fillStyle = pct > 0.6 ? '#f55' : '#f84';
    ctx.fillRect(x, y, barW * pct, barH);
  }

  // === GAME LOOP ===
  let running = false;
  let spawnTimer = 0;

  function getSpawnRate() {
    // Faster spawn with each wave
    return Math.max(12, 45 - state.wave * 3);
  }

  function update() {
    if (state.phase !== 'playing') return;

    // Spawn grapes
    spawnTimer++;
    if (spawnTimer >= getSpawnRate()) {
      spawnTimer = 0;
      // Spawn 1-3 grapes depending on wave
      const count = state.wave >= 8 ? 3 : state.wave >= 4 ? 2 : 1;
      for (let i = 0; i < count; i++) spawnGrape();
    }

    // Update grapes
    for (let i = grapes.length - 1; i >= 0; i--) {
      updateGrape(grapes[i]);
      if (!grapes[i].alive) grapes.splice(i, 1);
    }

    // Wave progression
    state.waveTimer++;
    if (state.waveTimer >= state.waveInterval) {
      state.waveTimer = 0;
      state.wave++;
    }

    // Paw animation
    if (pawSlamming > 0) pawSlamming--;

    // Game over check
    if (state.misses >= state.maxMisses) {
      state.phase = 'over';
      showEndScreen();
    }
  }

  function render() {
    // Dark trail fade
    ctx.fillStyle = 'rgba(10, 5, 16, 0.25)';
    ctx.fillRect(0, 0, W, H);

    // Background grid
    ctx.strokeStyle = 'rgba(155, 48, 255, 0.03)';
    ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 50) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = 0; y < H; y += 50) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    drawSplats();
    drawParticles();
    for (const g of grapes) drawGrape(g);
    drawComboText();
    drawMissIndicator();
    drawPaw(pawX, pawY);

    // HUD
    document.getElementById('scoreEl').textContent = state.score;
    document.getElementById('comboEl').textContent = state.combo;
    document.getElementById('missEl').textContent = state.misses;
    document.getElementById('waveEl').textContent = state.wave;
  }

  function frame() {
    requestAnimationFrame(frame);
    if (state.phase === 'playing') update();
    if (state.phase === 'playing' || state.phase === 'over') render();
  }

  // === INPUT ===
  function onPointerMove(e) {
    pawX = e.clientX;
    pawY = e.clientY;
  }

  function onPointerDown(e) {
    pawX = e.clientX;
    pawY = e.clientY;

    if (state.phase !== 'playing') return;

    pawSlamming = 12;
    trySquish(e.clientX, e.clientY);
  }

  canvas.addEventListener('pointermove', onPointerMove);
  canvas.addEventListener('pointerdown', onPointerDown);

  // Keyboard support
  document.addEventListener('keydown', (e) => {
    if (e.code === 'Space' && state.phase === 'playing') {
      pawSlamming = 12;
      trySquish(pawX, pawY);
    }
  });

  // === SCREENS ===
  function startGame() {
    state.phase = 'playing';
    state.score = 0;
    state.combo = 0;
    state.bestCombo = 0;
    state.squished = 0;
    state.dodged = 0;
    state.misses = 0;
    state.wave = 1;
    state.waveTimer = 0;
    grapes = [];
    splats = [];
    particles = [];
    spawnTimer = 0;

    document.getElementById('startScreen').style.display = 'none';
    document.getElementById('endScreen').style.display = 'none';
    document.getElementById('hud').style.display = '';

    // Clear canvas fully
    ctx.fillStyle = 'var(--bg)';
    ctx.fillRect(0, 0, W, H);
  }

  function showEndScreen() {
    document.getElementById('endScreen').style.display = '';
    document.getElementById('finalScore').textContent = state.score;
    document.getElementById('finalSquished').textContent = state.squished;
    document.getElementById('finalDodged').textContent = state.dodged;
    document.getElementById('finalCombo').textContent = state.bestCombo;
    document.getElementById('finalWave').textContent = state.wave;
  }

  document.getElementById('startBtn').addEventListener('click', startGame);
  document.getElementById('replayBtn').addEventListener('click', startGame);

  // Start render loop
  requestAnimationFrame(frame);

})();
</script>
</body>
</html>
