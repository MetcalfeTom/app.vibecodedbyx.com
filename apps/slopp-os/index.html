<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>SLOPP/OS — cybersecurity ops dashboard</title>
<meta name="description" content="A futuristic cybersecurity dashboard mockup. Scrolling logs, terminal windows, a fake live attack map. Pure theatre.">
<meta property="og:title" content="SLOPP/OS">
<meta property="og:description" content="A futuristic cybersecurity dashboard mockup. Scrolling logs, terminal windows, a fake live attack map. Pure theatre.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://sloppy.live/slopp-os/">
<meta property="og:image" content="https://image.pollinations.ai/prompt/futuristic%20cybersecurity%20dashboard%20with%20multiple%20green%20terminal%20windows%20scrolling%20logs%20world%20attack%20map%20red%20dots%20amber%20phosphor%20noir%20centered?width=1200&height=630&model=flux&nologo=true&seed=13371">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%9B%A1%EF%B8%8F">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=VT323&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --void:#04060a; --jet:#070b14;
  --grid:#0e1622;
  --hairline: rgba(122,255,148,0.10);
  --amber:#ffb45a; --amber-bright:#ffd28a;
  --green:#7aff94; --green-dim:#3a8a4a;
  --cyan:#7adcff;
  --rose:#ff5d7a; --rose-dim:#a02845;
  --paper:#dff6e3;
  --dim: rgba(223,246,227,0.55);
  --faint:rgba(223,246,227,0.30);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100vh;width:100vw;background:var(--void);color:var(--paper);font-family:'IBM Plex Mono', monospace;font-size:13px;line-height:1.4;overflow:hidden}
body{
  background:
    radial-gradient(60vmin 60vmin at 18% 22%, rgba(122,255,148,0.045), transparent 65%),
    radial-gradient(60vmin 60vmin at 82% 78%, rgba(255,93,122,0.05), transparent 65%),
    linear-gradient(135deg, var(--jet) 0%, var(--void) 100%);
}
body::before{
  content:''; position:fixed; inset:0; z-index:50; pointer-events:none;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,0.16) 0 1px, transparent 1px 3px);
  mix-blend-mode: multiply;
}
body::after{
  content:''; position:fixed; inset:0; z-index:51; pointer-events:none;
  background: radial-gradient(120vmin 120vmin at 50% 50%, transparent 55%, rgba(0,0,0,0.6) 100%);
}

.app{
  position:fixed; inset:0; padding:.6rem; gap:.6rem;
  display:grid;
  grid-template-rows: 56px 1fr 1fr 130px;
  grid-template-columns: 1.4fr 1.2fr 1fr;
  grid-template-areas:
    "top  top  top"
    "map  t1   t2"
    "ips  t3   conn"
    "feed feed feed";
}
@media (max-width: 1000px){
  .app{
    grid-template-rows: 48px 220px 200px 200px 200px 140px;
    grid-template-columns: 1fr 1fr;
    grid-template-areas:
      "top top"
      "map map"
      "t1  t2"
      "ips conn"
      "t3  t3"
      "feed feed";
  }
}
@media (max-width: 640px){
  .app{
    grid-template-rows: auto 200px 160px 160px 200px 160px 130px;
    grid-template-columns: 1fr;
    grid-template-areas:
      "top" "map" "t1" "t2" "t3" "conn" "feed";
  }
  .panel.ips{ display:none; }
}

.panel{
  background: rgba(7,11,20,0.85);
  border: 1px solid var(--hairline);
  border-radius: 4px;
  padding: .45rem .6rem;
  position:relative;
  overflow:hidden;
  display:flex; flex-direction:column;
  min-height: 0;
  z-index:1;
}
.panel::before{
  /* corner brackets */
  content:''; position:absolute; inset:2px; pointer-events:none;
  border: 1px dashed rgba(122,255,148,0.05);
  border-radius: 3px;
}
.panel h2{
  margin: 0 0 .35rem; padding-bottom: .25rem;
  font-family:'IBM Plex Mono', monospace; font-size: .68rem;
  letter-spacing: .35em; text-transform: uppercase;
  color: var(--amber); font-weight: 500;
  border-bottom: 1px dashed var(--hairline);
  display:flex; align-items:center; justify-content:space-between;
}
.panel h2 .corner{ font-family:'VT323', monospace; font-size: .85rem; color: var(--green-dim); letter-spacing:.1em; }

/* top bar (threat level + system health) */
.panel.top{ grid-area: top; padding: .5rem 1rem; flex-direction: row; gap:1.2rem; align-items:center; }
.brand{ display:flex; align-items:center; gap:.7rem; flex-shrink:0; }
.brand .logo{
  font-family:'Major Mono Display', monospace; font-size: 1.3rem;
  color: var(--green);
  text-shadow: 0 0 8px rgba(122,255,148,0.5);
  letter-spacing: .04em;
}
.brand .ver{
  font-family:'IBM Plex Mono', monospace; font-size: .6rem;
  letter-spacing: .25em; color: var(--dim); text-transform: uppercase;
}
.threat{ display:flex; align-items:center; gap:.55rem; flex:1; min-width:0; }
.threat .lab{
  font-size:.62rem; letter-spacing:.32em; text-transform:uppercase;
  color:var(--dim);
}
.threat .level{
  font-family:'Major Mono Display', monospace; font-size: 1.2rem;
  letter-spacing: .08em;
  color: var(--rose); text-shadow: 0 0 8px rgba(255,93,122,0.5);
  animation: pulseRose 1.5s ease-in-out infinite;
}
@keyframes pulseRose { 0%, 100% { opacity:1 } 50% { opacity:.6 } }
.threat .bar{
  flex:1; min-width:80px; height: 8px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.08);
  position:relative; overflow:hidden;
}
.threat .bar .fill{
  position:absolute; left:0; top:0; bottom:0;
  width: 78%;
  background: linear-gradient(90deg, var(--green) 0%, var(--amber) 60%, var(--rose) 100%);
}
.health{
  display:flex; gap:.5rem; flex-wrap: wrap; flex-shrink:0;
}
.health .pill{
  border: 1px solid var(--hairline);
  padding: .25rem .55rem;
  font-size: .65rem; letter-spacing: .15em; text-transform: uppercase;
  color: var(--dim);
  display: inline-flex; align-items:center; gap:.4rem;
}
.health .pill b{
  color: var(--green); font-weight: 500;
  font-family: 'Major Mono Display', monospace; font-size: .85rem;
  letter-spacing: .04em;
}
.health .pill.warn b{ color: var(--amber-bright); }
.health .pill.bad  b{ color: var(--rose); }

/* attack map */
.panel.map{ grid-area: map; }
.map-stage{
  flex:1; position:relative; min-height: 0;
  background:
    radial-gradient(70% 60% at 50% 50%, rgba(122,255,148,0.05), transparent 75%);
}
.map-stage svg{ position:absolute; inset:0; width:100%; height:100%; display:block; }
.map-blip{
  position:absolute; width:8px; height:8px;
  border-radius:50%;
  background: var(--rose);
  box-shadow: 0 0 8px var(--rose);
  transform: translate(-50%, -50%);
  pointer-events:none;
}
.map-blip::after{
  content:''; position:absolute; left:50%; top:50%; transform: translate(-50%, -50%);
  width: 8px; height: 8px; border-radius: 50%;
  border: 1px solid var(--rose);
  animation: pingPulse 1.3s ease-out infinite;
}
@keyframes pingPulse{
  0% { width: 8px; height: 8px; opacity: 1; }
  100% { width: 60px; height: 60px; opacity: 0; }
}
.map-blip.ok{ background: var(--green); box-shadow: 0 0 8px var(--green); }
.map-blip.ok::after{ border-color: var(--green); }
.map-stage .legend{
  position:absolute; left:8px; bottom:6px;
  font-size: .58rem; letter-spacing:.2em; text-transform: uppercase;
  color: var(--faint);
  display:flex; gap: .9rem;
}
.map-stage .legend span::before{
  content:''; display:inline-block; width:6px; height:6px; border-radius:50%;
  margin-right:.3em; vertical-align:middle;
}
.map-stage .legend .atk::before{ background: var(--rose); box-shadow: 0 0 4px var(--rose); }
.map-stage .legend .ok::before { background: var(--green); box-shadow: 0 0 4px var(--green); }

/* terminals */
.term{ font-family: 'VT323', monospace; font-size: 16px; color: var(--green);
  line-height: 1.15; flex:1; overflow:hidden; min-height: 0;
  text-shadow: 0 0 2px rgba(122,255,148,0.4);
}
.term .ln{ white-space: pre-wrap; word-break: break-all; }
.term .ln.warn  { color: var(--amber-bright); text-shadow: 0 0 3px rgba(255,210,138,0.5); }
.term .ln.bad   { color: var(--rose);         text-shadow: 0 0 3px rgba(255,93,122,0.5); }
.term .ln.dim   { color: var(--green-dim); text-shadow:none; }
.term .ln .cmd  { color: var(--amber-bright); }
.term .ln .ip   { color: var(--cyan); }
.term .prompt   { color: var(--green-dim); }
.term::after{
  content:'_';
  font-family:'VT323', monospace;
  color: var(--green);
  animation: caret 1s steps(2,end) infinite;
}
@keyframes caret { 0%,50%{opacity:1} 51%,100%{opacity:0} }
.panel.t1{ grid-area: t1; }
.panel.t2{ grid-area: t2; }
.panel.t3{ grid-area: t3; }

/* top blocked IPs (bar chart) */
.panel.ips{ grid-area: ips; }
.bars{
  flex:1; display:grid; grid-template-columns: 1fr; gap:.3rem;
  font-family:'IBM Plex Mono', monospace; font-size:.74rem;
  overflow:hidden;
}
.bar-row{
  display:grid; grid-template-columns: 110px 1fr auto;
  align-items:center; gap:.5rem;
}
.bar-row .ip{ color: var(--cyan); }
.bar-row .v{
  height: 9px;
  background: linear-gradient(90deg, var(--rose) 0%, var(--amber) 80%, var(--amber-bright) 100%);
  border-radius: 1px;
  box-shadow: 0 0 6px rgba(255,93,122,0.4);
  transition: width .35s ease;
}
.bar-row .ct{ color: var(--amber-bright); font-family:'Major Mono Display', monospace; font-size:.8rem; }

/* connections table */
.panel.conn{ grid-area: conn; }
.conn-list{
  flex:1; overflow:hidden;
  font-family:'IBM Plex Mono', monospace; font-size:.7rem;
  display:flex; flex-direction:column;
}
.conn-list .head, .conn-list .row{
  display:grid; grid-template-columns: 1fr 50px 1fr 60px;
  gap:.4rem; padding: .15rem 0;
  border-bottom: 1px dashed var(--hairline);
}
.conn-list .head{
  font-size: .58rem; letter-spacing: .25em; text-transform: uppercase;
  color: var(--dim); font-weight: 500;
}
.conn-list .row .src{ color: var(--cyan); }
.conn-list .row .dst{ color: var(--paper); }
.conn-list .row .port{ color: var(--amber-bright); }
.conn-list .row .state{
  font-size: .58rem; letter-spacing: .15em; text-transform: uppercase;
  text-align: right;
}
.conn-list .row .state.ok{ color: var(--green); }
.conn-list .row .state.bad{ color: var(--rose); }
.conn-list .row .state.warn{ color: var(--amber-bright); }
.conn-list .scroll{ flex:1; overflow:hidden; }

/* alert feed */
.panel.feed{ grid-area: feed; }
.feed-list{
  flex:1; overflow:hidden;
  font-family:'IBM Plex Mono', monospace; font-size: .72rem;
  display:flex; flex-direction:column-reverse;
}
.feed-list .ln{
  padding: .2rem 0;
  border-bottom: 1px dashed var(--hairline);
  display:grid; grid-template-columns: 70px 70px 1fr; gap:.6rem;
  align-items: start;
  opacity: 0;
  animation: feedIn .4s forwards;
}
@keyframes feedIn{ to { opacity: 1; } }
.feed-list .ts{ color: var(--dim); font-family:'IBM Plex Mono', monospace; }
.feed-list .lvl{
  font-size:.62rem; letter-spacing: .2em; text-transform: uppercase;
  text-align:center;
  border: 1px solid currentColor;
  padding: 0 .25em; border-radius: 2px;
  height: 1.2rem; line-height: 1.1rem;
}
.feed-list .lvl.info { color: var(--cyan); }
.feed-list .lvl.warn { color: var(--amber-bright); }
.feed-list .lvl.bad  { color: var(--rose); }
.feed-list .msg .ip { color: var(--cyan); }
.feed-list .msg .nm { color: var(--amber-bright); }

@media (prefers-reduced-motion: reduce){
  .threat .level, .map-blip::after, .term::after{ animation: none; }
}
</style>
</head>
<body>
<main class="app" role="application" aria-label="SLOPP/OS cybersecurity operations dashboard mockup">

  <section class="panel top" aria-label="Status header">
    <div class="brand">
      <div class="logo">SLOPP/OS</div>
      <div class="ver">v6.6.6 · ops</div>
    </div>
    <div class="threat" role="status" aria-live="polite">
      <span class="lab">threat</span>
      <span class="level" id="threat-level">DEFCON 3</span>
      <div class="bar"><div class="fill" id="threat-fill"></div></div>
    </div>
    <div class="health">
      <span class="pill"><span>cpu</span><b id="h-cpu">28%</b></span>
      <span class="pill"><span>mem</span><b id="h-mem">61%</b></span>
      <span class="pill warn"><span>net</span><b id="h-net">412mb/s</b></span>
      <span class="pill"><span>nodes</span><b id="h-nodes">14/14</b></span>
    </div>
  </section>

  <section class="panel map" aria-label="Attack origin map">
    <h2><span>Live attack origin</span><span class="corner" id="atk-count">∮ 0</span></h2>
    <div class="map-stage" id="map-stage">
      <!-- minimal world-ish SVG: continents as abstract blobs so it reads as a map without bloating the page -->
      <svg viewBox="0 0 800 360" preserveAspectRatio="none" aria-hidden="true">
        <g fill="none" stroke="rgba(122,255,148,0.18)" stroke-width="0.6">
          <!-- a faint grid -->
          <path d="M0,40 L800,40 M0,80 L800,80 M0,120 L800,120 M0,160 L800,160 M0,200 L800,200 M0,240 L800,240 M0,280 L800,280 M0,320 L800,320"/>
          <path d="M100,0 L100,360 M200,0 L200,360 M300,0 L300,360 M400,0 L400,360 M500,0 L500,360 M600,0 L600,360 M700,0 L700,360"/>
        </g>
        <g fill="rgba(122,255,148,0.16)" stroke="rgba(122,255,148,0.55)" stroke-width="0.7">
          <!-- N America -->
          <path d="M80,80 Q110,60 160,70 Q200,80 220,100 Q240,110 250,140 Q230,170 200,170 Q170,180 140,190 Q120,160 100,140 Q80,110 80,80 Z"/>
          <!-- S America -->
          <path d="M200,200 Q220,210 230,230 Q240,260 230,290 Q220,310 210,320 Q200,310 195,290 Q190,250 195,220 Z"/>
          <!-- Europe -->
          <path d="M380,80 Q420,72 450,80 Q470,90 470,110 Q450,130 420,130 Q400,120 380,110 Q370,95 380,80 Z"/>
          <!-- Africa -->
          <path d="M400,150 Q430,145 450,170 Q460,200 455,230 Q445,260 430,275 Q415,260 405,230 Q400,200 400,150 Z"/>
          <!-- Asia -->
          <path d="M470,70 Q540,60 620,75 Q670,90 700,110 Q695,140 670,150 Q620,160 570,150 Q520,140 490,125 Q475,100 470,70 Z"/>
          <!-- Australia -->
          <path d="M620,240 Q660,235 690,245 Q710,260 700,275 Q670,285 640,280 Q620,270 620,240 Z"/>
        </g>
      </svg>
      <div class="legend">
        <span class="atk">incoming attack</span>
        <span class="ok">cleared</span>
      </div>
    </div>
  </section>

  <section class="panel t1" aria-label="Terminal: auth log">
    <h2><span>tail -f auth.log</span><span class="corner">●</span></h2>
    <div class="term" id="term-1"></div>
  </section>

  <section class="panel t2" aria-label="Terminal: kernel">
    <h2><span>journalctl -ku kernel</span><span class="corner">●</span></h2>
    <div class="term" id="term-2"></div>
  </section>

  <section class="panel ips" aria-label="Top blocked IPs">
    <h2><span>top blocked / 5min</span><span class="corner" id="ip-tot">Σ 0</span></h2>
    <div class="bars" id="bars"></div>
  </section>

  <section class="panel t3" aria-label="Terminal: IDS">
    <h2><span>suricata -i eth0</span><span class="corner">●</span></h2>
    <div class="term" id="term-3"></div>
  </section>

  <section class="panel conn" aria-label="Active connections">
    <h2><span>active conn</span><span class="corner" id="conn-count">0</span></h2>
    <div class="conn-list">
      <div class="head"><span>SRC</span><span>:PORT</span><span>DST</span><span>STATE</span></div>
      <div class="scroll" id="conn-rows"></div>
    </div>
  </section>

  <section class="panel feed" aria-label="Alert feed">
    <h2><span>incident stream</span><span class="corner" id="feed-rate">— evt/s</span></h2>
    <div class="feed-list" id="feed"></div>
  </section>

</main>

<script>
'use strict';

// ──────────────────────────────────────────────────────────────────────
// fake data generators
// All numbers + IPs + actions are randomized at boot and updated on a
// timer. This is a mockup; nothing here phones home or reads real logs.
// ──────────────────────────────────────────────────────────────────────
function randInt(min, max){ return Math.floor(Math.random() * (max - min + 1)) + min; }
function pick(arr){ return arr[Math.floor(Math.random() * arr.length)]; }
function ip(){
  // pretty-distributed bogus IPs in valid public ranges
  const a = pick([23, 45, 64, 78, 91, 103, 121, 134, 158, 172, 185, 203, 212]);
  return a + '.' + randInt(1,255) + '.' + randInt(1,255) + '.' + randInt(1,255);
}
function pad(n, w){ return String(n).padStart(w, '0'); }
function ts(){
  const d = new Date();
  return pad(d.getHours(),2) + ':' + pad(d.getMinutes(),2) + ':' + pad(d.getSeconds(),2);
}

const USERS = ['admin', 'root', 'sloppy', 'jenn2', 'guest', 'marci', 'icekrieg', 'zennlogic', 'developer', 'svc-build', 'ops'];
const HOSTS = ['edge-01', 'edge-02', 'core-01', 'core-02', 'db-01', 'cache-01', 'auth-01', 'api-01', 'queue-01'];
const PROTOS = ['TCP', 'UDP', 'ICMP'];

// ── threat level (random walk) ─────────────────────────────────────
const THREATS = ['DEFCON 5', 'DEFCON 4', 'DEFCON 3', 'DEFCON 2', 'DEFCON 1'];
let threatIdx = 2;
function updateThreat(){
  threatIdx += pick([-1, 0, 0, 0, 1]);
  threatIdx = Math.max(0, Math.min(4, threatIdx));
  const tEl = document.getElementById('threat-level');
  const fEl = document.getElementById('threat-fill');
  tEl.textContent = THREATS[threatIdx];
  fEl.style.width = ((threatIdx + 1) * 20) + '%';
  // color the level by severity
  const colors = ['#7aff94', '#a5e26b', '#ffd28a', '#ffb45a', '#ff5d7a'];
  tEl.style.color = colors[threatIdx];
  tEl.style.textShadow = '0 0 8px ' + colors[threatIdx];
}
updateThreat();
setInterval(updateThreat, 6000);

// ── system health (slow random walk) ────────────────────────────────
const $hCpu  = document.getElementById('h-cpu');
const $hMem  = document.getElementById('h-mem');
const $hNet  = document.getElementById('h-net');
let cpu = 28, mem = 61, net = 412;
function updateHealth(){
  cpu = Math.max(10, Math.min(94, cpu + (Math.random() - 0.5) * 9));
  mem = Math.max(35, Math.min(92, mem + (Math.random() - 0.5) * 3));
  net = Math.max(80, Math.min(1200, net + (Math.random() - 0.5) * 90));
  $hCpu.textContent = Math.round(cpu) + '%';
  $hMem.textContent = Math.round(mem) + '%';
  $hNet.textContent = Math.round(net) + 'mb/s';
}
updateHealth();
setInterval(updateHealth, 1400);

// ── attack map ──────────────────────────────────────────────────────
const $map = document.getElementById('map-stage');
const $atk = document.getElementById('atk-count');
let atkTotal = 0;
function dropBlip(){
  // weight against major landmasses in the abstract map (rough lat/lon)
  const HOTSPOTS = [
    { x: 0.18, y: 0.32, w: 5 },   // N America
    { x: 0.28, y: 0.72, w: 2 },   // S America
    { x: 0.52, y: 0.28, w: 4 },   // Europe
    { x: 0.53, y: 0.55, w: 2 },   // Africa
    { x: 0.72, y: 0.30, w: 6 },   // Asia
    { x: 0.83, y: 0.72, w: 1 },   // Australia
  ];
  const total = HOTSPOTS.reduce((s, h) => s + h.w, 0);
  let r = Math.random() * total;
  let h = HOTSPOTS[0];
  for (const c of HOTSPOTS){
    r -= c.w;
    if (r <= 0){ h = c; break; }
  }
  const x = (h.x + (Math.random() - 0.5) * 0.10) * 100;
  const y = (h.y + (Math.random() - 0.5) * 0.10) * 100;
  const blip = document.createElement('div');
  blip.className = 'map-blip';
  if (Math.random() < 0.18) blip.classList.add('ok');   // some are "cleared" green
  blip.style.left = x + '%';
  blip.style.top  = y + '%';
  $map.appendChild(blip);
  atkTotal++;
  $atk.textContent = '∮ ' + atkTotal;
  // expire after 1.5s
  setTimeout(() => { if (blip.parentNode) blip.parentNode.removeChild(blip); }, 1500);
}
setInterval(dropBlip, 600 + Math.random() * 400);
setTimeout(() => setInterval(dropBlip, 900 + Math.random() * 600), 50);

// ── terminals ──────────────────────────────────────────────────────
class Terminal {
  constructor(id, lineCap = 24){
    this.el = document.getElementById(id);
    this.cap = lineCap;
  }
  push(html, cls){
    const div = document.createElement('div');
    div.className = 'ln' + (cls ? ' ' + cls : '');
    div.innerHTML = html;
    this.el.appendChild(div);
    while (this.el.children.length > this.cap){
      this.el.removeChild(this.el.firstChild);
    }
    this.el.scrollTop = this.el.scrollHeight;
  }
}

const T1 = new Terminal('term-1', 22);
const T2 = new Terminal('term-2', 18);
const T3 = new Terminal('term-3', 22);

// auth.log generator (T1)
function genAuth(){
  const t = ts();
  const host = pick(HOSTS);
  const r = Math.random();
  if (r < 0.55){
    const u = pick(USERS);
    const i = ip();
    T1.push(`${t} ${host} sshd[<span class="cmd">${randInt(2000,9999)}</span>]: Failed password for ${u} from <span class="ip">${i}</span> port ${randInt(22000,65000)} ssh2`, 'warn');
  } else if (r < 0.72){
    const u = pick(USERS.slice(0,4));
    const i = ip();
    T1.push(`${t} ${host} sshd[<span class="cmd">${randInt(2000,9999)}</span>]: <span class="bad">Invalid user</span> ${u} from <span class="ip">${i}</span>`, 'bad');
  } else if (r < 0.86){
    const u = pick(['sloppy', 'jenn2', 'ops']);
    const i = ip();
    T1.push(`${t} ${host} sshd[${randInt(2000,9999)}]: Accepted publickey for <span class="cmd">${u}</span> from <span class="ip">${i}</span> port ${randInt(22000,65000)} ssh2`);
  } else {
    T1.push(`${t} ${host} sudo: <span class="cmd">${pick(USERS)}</span> : TTY=pts/${randInt(0,5)} ; PWD=/var/log ; USER=root ; COMMAND=/usr/bin/${pick(['less','tail','journalctl','systemctl'])}`, 'dim');
  }
}
// kernel generator (T2)
function genKernel(){
  const t = ts();
  const r = Math.random();
  if (r < 0.4){
    const i = ip();
    T2.push(`[${(Math.random()*99999).toFixed(3)}] iptables: <span class="bad">DROP</span> IN=eth0 OUT= MAC=… SRC=<span class="ip">${i}</span> PROTO=${pick(PROTOS)} DPT=${pick([22,80,443,3306,5432,3389,8080])}`, 'warn');
  } else if (r < 0.7){
    T2.push(`[${(Math.random()*99999).toFixed(3)}] cpu${randInt(0,15)}: temperature ${randInt(58,82)}°C (normal)`, 'dim');
  } else if (r < 0.86){
    T2.push(`[${(Math.random()*99999).toFixed(3)}] eth0: link up, 10 Gbps full-duplex`);
  } else {
    T2.push(`[${(Math.random()*99999).toFixed(3)}] kernel: BUG: ${pick(['soft lockup','memory pressure','io stall'])} - watchdog ok`, 'bad');
  }
}
// suricata-ish IDS generator (T3)
const SURI_RULES = [
  ['ET TROJAN Generic',          'bad'],
  ['ET POLICY Outbound rsync',   'warn'],
  ['ET SCAN Nmap fingerprint',   'warn'],
  ['ET WEB_SERVER SQLi attempt', 'bad'],
  ['ET INFO Suspicious DNS',     'warn'],
  ['ET MALWARE CnC beacon',      'bad'],
  ['ET POLICY DNS-Tunnel',       'warn'],
  ['ET DOS NTP Reflection',      'bad'],
  ['STREAM established',         'dim'],
  ['STREAM cleanup',             'dim'],
];
function genSuri(){
  const t = ts();
  const r = pick(SURI_RULES);
  const sip = ip(), dip = ip();
  T3.push(`${t} [**] [<span class="cmd">1:${randInt(2000000,2099999)}</span>] ${r[0]} [**] {${pick(PROTOS)}} <span class="ip">${sip}</span>:${randInt(1024,65000)} -> <span class="ip">${dip}</span>:${pick([22,53,80,443,3306,5432,8080,9200])}`, r[1]);
}

// seed terminals with a banner so they aren't empty on first paint
function seedTerminals(){
  T1.push('<span class="prompt">root@auth-01:~$</span> tail -F /var/log/auth.log');
  T2.push('<span class="prompt">root@core-01:~$</span> journalctl -ku kernel --follow');
  T3.push('<span class="prompt">root@ids-01:~$</span> suricata -c /etc/suricata/suricata.yaml -i eth0', 'dim');
}
seedTerminals();
setInterval(genAuth,    1100 + Math.random() * 700);
setInterval(genKernel,  1700 + Math.random() * 600);
setInterval(genSuri,    900  + Math.random() * 500);

// ── top blocked IPs ────────────────────────────────────────────────
const $bars = document.getElementById('bars');
const $ipTot = document.getElementById('ip-tot');
const ipCounts = new Map();   // ip → count
function addIP(){
  const i = ip();
  ipCounts.set(i, (ipCounts.get(i) || 0) + randInt(1, 4));
  // Cap entries
  if (ipCounts.size > 40){
    // remove smallest
    let smallest = null, smallestV = Infinity;
    for (const [k, v] of ipCounts) if (v < smallestV){ smallest = k; smallestV = v; }
    ipCounts.delete(smallest);
  }
  renderBars();
}
function renderBars(){
  const arr = [...ipCounts.entries()].sort((a, b) => b[1] - a[1]).slice(0, 6);
  const max = arr.length ? arr[0][1] : 1;
  let total = 0;
  $bars.innerHTML = '';
  for (const [ipAddr, ct] of arr){
    total += ct;
    const row = document.createElement('div');
    row.className = 'bar-row';
    row.innerHTML = `<span class="ip">${ipAddr}</span><div class="v" style="width:${(ct / max * 100).toFixed(0)}%"></div><span class="ct">${ct}</span>`;
    $bars.appendChild(row);
  }
  let grand = 0;
  for (const v of ipCounts.values()) grand += v;
  $ipTot.textContent = 'Σ ' + grand;
}
for (let i = 0; i < 10; i++) addIP();
setInterval(addIP, 1500);

// ── active connections (rolling table) ─────────────────────────────
const $connRows = document.getElementById('conn-rows');
const $connCount = document.getElementById('conn-count');
const conns = [];
const STATES = [
  { t: 'ESTAB',  cls: 'ok' },
  { t: 'SYN-S',  cls: 'warn' },
  { t: 'FIN-W',  cls: 'warn' },
  { t: 'RST',    cls: 'bad' },
  { t: 'TIME-W', cls: 'warn' },
];
function makeConn(){
  return {
    src: ip(),
    port: pick([22, 80, 443, 3306, 5432, 6379, 8080, 9200, 27017]),
    dst: pick(HOSTS),
    state: pick(STATES),
  };
}
function renderConns(){
  $connRows.innerHTML = '';
  for (const c of conns.slice(0, 9)){
    const row = document.createElement('div');
    row.className = 'row';
    row.innerHTML = `<span class="src">${c.src}</span><span class="port">${c.port}</span><span class="dst">${c.dst}</span><span class="state ${c.state.cls}">${c.state.t}</span>`;
    $connRows.appendChild(row);
  }
  $connCount.textContent = conns.length;
}
function shuffleConns(){
  // add 1-2, drop 0-1 to feel live without churning everything
  for (let i = 0; i < randInt(1, 2); i++) conns.unshift(makeConn());
  while (conns.length > 30) conns.pop();
  if (Math.random() < 0.4 && conns.length) conns.splice(randInt(0, conns.length - 1), 1);
  renderConns();
}
for (let i = 0; i < 9; i++) conns.push(makeConn());
renderConns();
setInterval(shuffleConns, 1700);

// ── incident feed ──────────────────────────────────────────────────
const $feed = document.getElementById('feed');
const $feedRate = document.getElementById('feed-rate');
const FEED_TEMPLATES = [
  { l:'info', t: 'connection from {ip} accepted on port {port}' },
  { l:'info', t: '{user} authenticated via key on {host}' },
  { l:'warn', t: 'rate-limit triggered for {ip} ({n} req/min)' },
  { l:'warn', t: 'TLS handshake failed: {ip} on edge-01 ({n} retries)' },
  { l:'warn', t: 'unusual outbound traffic to {ip}:8080' },
  { l:'bad',  t: 'brute-force detected from {ip} ({n} attempts)' },
  { l:'bad',  t: 'firewall DROP rule "scan-block" fired on {ip}' },
  { l:'bad',  t: 'SQL injection signature matched in /api/login from {ip}' },
  { l:'info', t: 'cluster {host} promoted to primary' },
  { l:'warn', t: 'disk usage on {host}: {n}% — investigate' },
  { l:'info', t: 'patch applied to {host} (kernel {n})' },
  { l:'bad',  t: 'CnC beacon to {ip} — host {host} quarantined' },
];
let feedCount = 0;
let feedWindowStart = performance.now();
function genFeed(){
  const tmpl = pick(FEED_TEMPLATES);
  const msg = tmpl.t
    .replace('{ip}',  '<span class="ip">' + ip() + '</span>')
    .replace('{user}','<span class="nm">' + pick(USERS) + '</span>')
    .replace('{host}','<span class="nm">' + pick(HOSTS) + '</span>')
    .replace('{port}', pick([22, 80, 443, 3306, 5432, 8080, 9200]))
    .replace('{n}',    randInt(3, 480).toString());
  const ln = document.createElement('div');
  ln.className = 'ln';
  ln.innerHTML = `<span class="ts">${ts()}</span><span class="lvl ${tmpl.l}">${tmpl.l}</span><span class="msg">${msg}</span>`;
  $feed.appendChild(ln);
  // cap
  while ($feed.children.length > 18) $feed.removeChild($feed.firstChild);
  feedCount++;
  // periodic rate update
  const now = performance.now();
  if (now - feedWindowStart > 2000){
    const rate = (feedCount / ((now - feedWindowStart) / 1000)).toFixed(1);
    $feedRate.textContent = rate + ' evt/s';
    feedCount = 0;
    feedWindowStart = now;
  }
}
setInterval(genFeed, 700);
genFeed();  // seed
</script>
