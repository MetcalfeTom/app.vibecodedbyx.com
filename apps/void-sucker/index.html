<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Void Sucker — Vacuum Chaos Minigame</title>
<link rel="icon" href="https://emojicdn.elk.sh/🌀">
<meta property="og:title" content="Void Sucker">
<meta property="og:description" content="High-speed vacuum frenzy — suck up all the floating junk before time runs out!">
<meta property="og:url" content="https://sloppy.live/void-sucker">
<meta property="og:image" content="https://sloppy.live/void-sucker/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Rubik+Glitch&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#08090f;--vac:#00e5ff;--warn:#ff3366;--gold:#ffe033;--green:#33ff99}
body{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:var(--bg);overflow:hidden;cursor:none;
  font-family:'Share Tech Mono',monospace;color:#ccc;
}
canvas{display:block;touch-action:none}
#hud{
  position:fixed;top:0;left:0;width:100%;
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 16px;z-index:10;pointer-events:none;
}
#score{font-family:'Rubik Glitch',cursive;font-size:24px;color:var(--vac);text-shadow:0 0 12px rgba(0,229,255,.4)}
#timer{font-size:16px;color:var(--warn)}
#multi{font-size:14px;color:var(--gold);opacity:0;transition:opacity .3s}
#power-wrap{display:flex;align-items:center;gap:6px}
#power-label{font-size:10px;color:rgba(255,255,255,.4)}
#power-bar{width:80px;height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
#power-fill{height:100%;width:100%;background:var(--vac);border-radius:3px;transition:width .2s}
#msg{
  position:fixed;top:42%;left:50%;transform:translate(-50%,-50%);
  font-family:'Rubik Glitch',cursive;font-size:30px;color:var(--gold);
  pointer-events:none;z-index:20;opacity:0;transition:opacity .4s;
  text-shadow:0 0 15px rgba(255,224,51,.4);text-align:center;
}
#overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;z-index:30;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(8,9,15,.95);gap:10px;
}
#overlay h1{font-family:'Rubik Glitch',cursive;font-size:30px;color:var(--vac);text-shadow:0 0 20px rgba(0,229,255,.3)}
#overlay p{font-size:14px;color:rgba(255,255,255,.45);max-width:280px;text-align:center;line-height:1.5}
#go-btn{
  margin-top:8px;padding:12px 36px;background:var(--vac);color:var(--bg);
  border:none;border-radius:8px;font-family:'Rubik Glitch',cursive;font-size:18px;
  cursor:pointer;box-shadow:0 0 20px rgba(0,229,255,.3);transition:transform .15s;
}
#go-btn:hover{transform:scale(1.06)}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="hud">
  <span id="score">0</span>
  <span id="multi"></span>
  <div id="power-wrap">
    <span id="power-label">SUCC</span>
    <div id="power-bar"><div id="power-fill"></div></div>
  </div>
  <span id="timer">45s</span>
</div>
<div id="msg"></div>
<div id="overlay">
  <h1>🌀 Void Sucker</h1>
  <p>Hold click to activate the vacuum. Suck up junk for points — don't let the power run dry!</p>
  <button id="go-btn">SUCC</button>
</div>
<canvas id="c"></canvas>

<script>
const C=document.getElementById('c'),X=C.getContext('2d');
const scoreEl=document.getElementById('score'),timerEl=document.getElementById('timer');
const multiEl=document.getElementById('multi'),powerFill=document.getElementById('power-fill');
const msgEl=document.getElementById('msg'),overlay=document.getElementById('overlay');
let W,H;
function resize(){W=C.width=window.innerWidth;H=C.height=window.innerHeight}
resize();window.addEventListener('resize',resize);

// ── Audio ──
let ac=null;
function ia(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)()}
function tone(f,d,t,v){
  if(!ac)return;const o=ac.createOscillator(),g=ac.createGain();
  o.connect(g);g.connect(ac.destination);o.type=t||'sine';o.frequency.value=f;
  g.gain.setValueAtTime(v||.06,ac.currentTime);
  g.gain.exponentialRampToValueAtTime(.001,ac.currentTime+d);
  o.start();o.stop(ac.currentTime+d);
}
function sndSuck(){tone(600+Math.random()*200,.08,'square',.04)}
function sndBig(){tone(300,.2,'sawtooth',.06);setTimeout(()=>tone(450,.15,'triangle',.05),60)}
function sndBomb(){tone(100,.4,'sawtooth',.08);setTimeout(()=>tone(60,.3,'square',.06),100)}
// vacuum hum
let humOsc=null,humGain=null;
function startHum(){
  if(!ac||humOsc)return;
  humOsc=ac.createOscillator();humGain=ac.createGain();
  humOsc.connect(humGain);humGain.connect(ac.destination);
  humOsc.type='sawtooth';humOsc.frequency.value=55;
  humGain.gain.value=0;humOsc.start();
}
function setHum(v){if(humGain)humGain.gain.value=Math.min(.03,v)}

// ── Junk types ──
const JUNK=[
  {name:'bolt',pts:10,size:6,color:'#aab0c0',draw(x,y,s,f){
    X.fillStyle=this.color;X.fillRect(x-s,y-s*.3,s*2,s*.6);
    X.fillRect(x-s*.3,y-s,s*.6,s*2);
  }},
  {name:'gear',pts:15,size:8,color:'#8899aa',draw(x,y,s,f){
    X.strokeStyle=this.color;X.lineWidth=2;
    X.beginPath();X.arc(x,y,s,0,Math.PI*2);X.stroke();
    for(let i=0;i<6;i++){const a=i/6*Math.PI*2+f*.02;
      X.beginPath();X.moveTo(x+Math.cos(a)*s*.5,y+Math.sin(a)*s*.5);
      X.lineTo(x+Math.cos(a)*s*1.3,y+Math.sin(a)*s*1.3);X.stroke();
    }
  }},
  {name:'chip',pts:20,size:7,color:'#44dd88',draw(x,y,s,f){
    X.fillStyle='#1a2a1a';X.fillRect(x-s,y-s*.7,s*2,s*1.4);
    X.fillStyle=this.color;
    for(let i=0;i<3;i++)X.fillRect(x-s+3+i*5,y-s*.4,3,s*.8);
    X.strokeStyle='#33aa66';X.lineWidth=1;X.strokeRect(x-s,y-s*.7,s*2,s*1.4);
  }},
  {name:'spring',pts:12,size:9,color:'#cc7733',draw(x,y,s,f){
    X.strokeStyle=this.color;X.lineWidth=2;X.beginPath();
    for(let i=0;i<8;i++){const t=i/7;
      X.lineTo(x+(i%2?s*.6:-s*.6),y-s+t*s*2);
    }X.stroke();
  }},
  {name:'crystal',pts:30,size:8,color:'#aa55ff',draw(x,y,s,f){
    const glow=.3+Math.sin(f*.06)*.15;
    X.fillStyle=`rgba(170,85,255,${glow})`;
    X.beginPath();X.arc(x,y,s*1.4,0,Math.PI*2);X.fill();
    X.fillStyle=this.color;X.beginPath();
    X.moveTo(x,y-s*1.2);X.lineTo(x+s*.6,y);X.lineTo(x,y+s*.8);X.lineTo(x-s*.6,y);X.closePath();X.fill();
  }},
  {name:'star',pts:50,size:6,color:'#ffe033',draw(x,y,s,f){
    X.fillStyle=this.color;X.beginPath();
    for(let i=0;i<10;i++){const a=i/10*Math.PI*2-Math.PI/2;const r=i%2?s*.4:s;
      i?X.lineTo(x+Math.cos(a)*r,y+Math.sin(a)*r):X.moveTo(x+Math.cos(a)*r,y+Math.sin(a)*r);
    }X.closePath();X.fill();
    X.fillStyle='rgba(255,224,51,.2)';X.beginPath();X.arc(x,y,s*1.5,0,Math.PI*2);X.fill();
  }},
  {name:'bomb',pts:-30,size:10,color:'#ff3366',draw(x,y,s,f){
    X.fillStyle='#2a1020';X.beginPath();X.arc(x,y,s,0,Math.PI*2);X.fill();
    X.strokeStyle=this.color;X.lineWidth=2;X.beginPath();X.arc(x,y,s,0,Math.PI*2);X.stroke();
    X.fillStyle=this.color;X.font=`bold ${s}px "Share Tech Mono"`;X.textAlign='center';
    X.fillText('X',x,y+s*.35);X.textAlign='left';
    // fuse spark
    const spark=Math.sin(f*.2)>.3;
    if(spark){X.fillStyle='#ffaa33';X.beginPath();X.arc(x,y-s-3,2,0,Math.PI*2);X.fill()}
  }},
  {name:'dust',pts:5,size:4,color:'#665544',draw(x,y,s,f){
    X.fillStyle=this.color;X.globalAlpha=.6;
    X.beginPath();X.arc(x,y,s,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(x+s*.8,y-s*.3,s*.5,0,Math.PI*2);X.fill();
    X.globalAlpha=1;
  }},
];

// ── State ──
let items=[],particles=[];
let score=0,multi=1,multiTimer=0,streak=0;
let timeLeft=45,playing=false,gameOver=false,frame=0;
let mx=W/2,my=H/2,sucking=false;
let power=100; // vacuum power meter
const POWER_DRAIN=0.4,POWER_REGEN=0.25,SUCK_RADIUS=90,PULL_FORCE=0.35;

function spawnItem(){
  const type=JUNK[Math.random()<.08?6:Math.random()<.15?7:Math.floor(Math.random()*6)];
  const edge=Math.floor(Math.random()*4);
  let x,y;
  if(edge===0){x=Math.random()*W;y=-20}
  else if(edge===1){x=W+20;y=Math.random()*H}
  else if(edge===2){x=Math.random()*W;y=H+20}
  else{x=-20;y=Math.random()*H}
  items.push({
    type,x,y,
    vx:(Math.random()-.5)*1.5,vy:(Math.random()-.5)*1.5,
    rot:Math.random()*Math.PI*2,rotSpd:(Math.random()-.5)*.04,
    size:type.size*(0.8+Math.random()*.4),
    alive:true,suckProg:0,
  });
}

function spawnBurst(x,y,color,count){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2;
    particles.push({
      x,y,vx:Math.cos(a)*(1+Math.random()*3),vy:Math.sin(a)*(1+Math.random()*3),
      life:20+Math.random()*15,max:35,
      color,size:2+Math.random()*3,
    });
  }
}

// ── Input ──
function onMove(px,py){mx=px;my=py}
C.addEventListener('mousemove',e=>onMove(e.clientX,e.clientY));
C.addEventListener('touchmove',e=>{e.preventDefault();onMove(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});
C.addEventListener('touchstart',e=>{e.preventDefault();ia();sucking=true;startHum();onMove(e.touches[0].clientX,e.touches[0].clientY)},{passive:false});
C.addEventListener('touchend',e=>{e.preventDefault();sucking=false},{passive:false});
C.addEventListener('mousedown',e=>{ia();sucking=true;startHum()});
C.addEventListener('mouseup',()=>sucking=false);
C.addEventListener('mouseleave',()=>sucking=false);

// ── Start ──
document.getElementById('go-btn').onclick=()=>{
  ia();overlay.classList.add('hidden');
  playing=true;gameOver=false;score=0;multi=1;streak=0;timeLeft=45;
  power=100;items=[];particles=[];
  for(let i=0;i<12;i++) spawnItem();
  scoreEl.textContent='0';
};

// ── Messages ──
let msgTO;
function showMsg(t,d){msgEl.textContent=t;msgEl.style.opacity='1';clearTimeout(msgTO);msgTO=setTimeout(()=>msgEl.style.opacity='0',d||1000)}

// ── Update ──
function update(){
  if(!playing||gameOver) return;
  frame++;
  timeLeft-=1/60;
  if(timeLeft<=0){timeLeft=0;gameOver=true;showMsg('TIME! Score: '+score,5000);return}
  timerEl.textContent=Math.ceil(timeLeft)+'s';
  if(timeLeft<=10) timerEl.style.color='#ff3366';
  else timerEl.style.color='';

  // power
  if(sucking&&power>0){
    power=Math.max(0,power-POWER_DRAIN);
    setHum(.03*(power/100));
  } else {
    power=Math.min(100,power+POWER_REGEN);
    setHum(0);
  }
  powerFill.style.width=power+'%';
  if(power<20)powerFill.style.background='#ff3366';
  else powerFill.style.background='#00e5ff';

  const active=sucking&&power>0;

  // multi decay
  if(multiTimer>0){multiTimer--;if(multiTimer===0){multi=1;streak=0;multiEl.style.opacity='0'}}

  // spawn
  const aliveCount=items.filter(i=>i.alive).length;
  const target=10+Math.floor(score/200)*2;
  if(aliveCount<target&&frame%15===0) spawnItem();

  // update items
  items.forEach(it=>{
    if(!it.alive) return;
    const dx=mx-it.x,dy=my-it.y;
    const dist=Math.sqrt(dx*dx+dy*dy);

    if(active&&dist<SUCK_RADIUS){
      // pull toward cursor
      const pull=PULL_FORCE*(1-dist/SUCK_RADIUS)*(power/100);
      it.vx+=dx/dist*pull;
      it.vy+=dy/dist*pull;
      it.suckProg+=.02;

      // sucked in!
      if(dist<14){
        it.alive=false;
        const pts=it.type.pts*multi;
        score=Math.max(0,score+pts);
        scoreEl.textContent=score;

        if(it.type.pts>0){
          streak++;
          if(streak>=3){multi=Math.min(8,1+Math.floor(streak/3));multiTimer=90;
            multiEl.textContent=multi+'x';multiEl.style.opacity='1';}
          if(streak===5)showMsg('SUCC STREAK!',800);
          if(streak===10)showMsg('🌀 VOID MASTER!',1000);
          if(streak===20)showMsg('💀 UNSTOPPABLE!',1200);
          spawnBurst(it.x,it.y,it.type.color,8);
          sndSuck();
          if(it.type.pts>=30) sndBig();
        } else {
          // bomb
          streak=0;multi=1;multiTimer=0;multiEl.style.opacity='0';
          spawnBurst(it.x,it.y,'#ff3366',15);
          sndBomb();
          showMsg('💥 -'+Math.abs(it.type.pts*multi),600);
          // screen flash
          flashAlpha=.15;
        }
      }
    } else {
      it.suckProg=Math.max(0,it.suckProg-.01);
    }

    // drift
    it.x+=it.vx;it.y+=it.vy;
    it.vx*=.97;it.vy*=.97;
    it.rot+=it.rotSpd;

    // wrap
    if(it.x<-40)it.x=W+30;if(it.x>W+40)it.x=-30;
    if(it.y<-40)it.y=H+30;if(it.y>H+40)it.y=-30;
  });

  items=items.filter(i=>i.alive);
}

// ── Render ──
let flashAlpha=0;

function drawBG(){
  X.fillStyle='#08090f';X.fillRect(0,0,W,H);
  // subtle grid
  X.strokeStyle='rgba(0,229,255,.015)';X.lineWidth=1;
  const gs=50;
  for(let x=0;x<W;x+=gs){X.beginPath();X.moveTo(x,0);X.lineTo(x,H);X.stroke()}
  for(let y=0;y<H;y+=gs){X.beginPath();X.moveTo(0,y);X.lineTo(W,y);X.stroke()}
}

function drawVacuum(){
  const active=sucking&&power>0;
  const r=SUCK_RADIUS;
  // pull field
  if(active){
    const pulse=.08+Math.sin(frame*.1)*.03;
    const grd=X.createRadialGradient(mx,my,5,mx,my,r);
    grd.addColorStop(0,`rgba(0,229,255,${pulse})`);
    grd.addColorStop(.6,`rgba(0,229,255,${pulse*.3})`);
    grd.addColorStop(1,'transparent');
    X.fillStyle=grd;X.beginPath();X.arc(mx,my,r,0,Math.PI*2);X.fill();

    // spiral lines
    X.strokeStyle='rgba(0,229,255,.1)';X.lineWidth=1;
    for(let i=0;i<4;i++){
      X.beginPath();
      for(let t=0;t<40;t++){
        const a=t*.15+i*Math.PI/2+frame*.05;
        const d=r*(t/40);
        const px=mx+Math.cos(a)*d,py=my+Math.sin(a)*d;
        t===0?X.moveTo(px,py):X.lineTo(px,py);
      }X.stroke();
    }
  }

  // nozzle
  X.fillStyle=active?'rgba(0,229,255,.6)':'rgba(100,120,140,.3)';
  X.beginPath();X.arc(mx,my,active?7:5,0,Math.PI*2);X.fill();
  if(active){
    X.fillStyle='rgba(0,229,255,.15)';
    X.beginPath();X.arc(mx,my,12,0,Math.PI*2);X.fill();
  }
}

function drawItems(){
  items.forEach(it=>{
    if(!it.alive) return;
    X.save();X.translate(it.x,it.y);X.rotate(it.rot);
    // suck stretch
    if(it.suckProg>.1){
      const sx=1+it.suckProg*.3,sy=1-it.suckProg*.15;
      const ang=Math.atan2(my-it.y,mx-it.x);
      X.rotate(-it.rot);X.rotate(ang);X.scale(sx,sy);X.rotate(-ang);X.rotate(it.rot);
    }
    it.type.draw(0,0,it.size,frame);
    X.restore();
  });
}

function drawParticles(){
  particles=particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.vx*=.95;p.vy*=.95;p.life--;
    const a=p.life/p.max;
    X.globalAlpha=a;X.fillStyle=p.color;
    X.beginPath();X.arc(p.x,p.y,Math.max(0,p.size*a),0,Math.PI*2);X.fill();
    X.globalAlpha=1;
    return p.life>0;
  });
}

function render(){
  update();
  drawBG();
  drawItems();
  drawVacuum();
  drawParticles();

  // flash
  if(flashAlpha>0){
    X.fillStyle=`rgba(255,51,102,${flashAlpha})`;X.fillRect(0,0,W,H);
    flashAlpha*=.9;
  }

  // game over
  if(gameOver){
    X.fillStyle='rgba(8,9,15,.7)';X.fillRect(0,0,W,H);
    X.fillStyle='#00e5ff';X.font='32px "Rubik Glitch"';X.textAlign='center';
    X.fillText('VOID CLEARED',W/2,H/2-30);
    X.fillStyle='rgba(255,255,255,.5)';X.font='16px "Share Tech Mono"';
    X.fillText('Score: '+score,W/2,H/2+10);
    X.fillText('tap to retry',W/2,H/2+40);
    X.textAlign='left';
    C.onclick=()=>{
      if(!gameOver)return;
      gameOver=false;score=0;multi=1;streak=0;timeLeft=45;power=100;
      items=[];particles=[];
      for(let i=0;i<12;i++)spawnItem();
      scoreEl.textContent='0';C.onclick=null;
    };
  }

  requestAnimationFrame(render);
}
requestAnimationFrame(render);
</script>
</body>
</html>
