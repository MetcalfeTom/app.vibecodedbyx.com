<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Neon Ants</title>
<link rel="icon" href="https://emojicdn.elk.sh/🐜" />
<meta name="description" content="Glowing ants. Pheromone trails. Click to cause chaos." />
<meta property="og:title" content="Neon Ants" />
<meta property="og:description" content="Glowing ants. Pheromone trails. Click to cause chaos." />
<meta property="og:url" content="https://sloppy.live/neon-ants" />
<meta property="og:image" content="https://sloppy.live/screenshots/neon-ants.jpg" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;600&family=Fira+Code:wght@300&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #05050a;
    user-select: none;
    touch-action: none;
    font-family: 'Fira Code', monospace;
    color: #c0ffee;
  }
  canvas { display: block; position: absolute; top: 0; left: 0; }

  /* HUD */
  #hud {
    position: fixed; top: 0; left: 0; right: 0; z-index: 10;
    padding: 10px 16px;
    display: flex; justify-content: space-between; align-items: center;
    pointer-events: none;
    background: linear-gradient(to bottom, rgba(5,5,10,0.8), transparent);
  }
  #hud .title {
    font-family: 'Chakra Petch', sans-serif;
    font-weight: 600;
    font-size: 18px;
    letter-spacing: 0.15em;
    color: #0ff;
    text-shadow: 0 0 12px rgba(0,255,255,0.5);
  }
  #hud .stats {
    display: flex; gap: 16px;
    font-size: 11px; letter-spacing: 0.1em; color: #6a8a8a;
  }
  #hud .stats .v { color: #0ff; }

  /* Controls */
  #controls {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 10;
    padding: 10px 16px;
    display: flex; justify-content: center; gap: 8px; flex-wrap: wrap;
    background: linear-gradient(to top, rgba(5,5,10,0.8), transparent);
  }
  .ctrl-btn {
    font-family: 'Fira Code', monospace;
    font-size: 10px;
    padding: 6px 14px;
    background: rgba(0,255,255,0.06);
    border: 1px solid rgba(0,255,255,0.2);
    color: #0ff;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.08em;
    transition: all .15s;
    pointer-events: all;
  }
  .ctrl-btn:hover { background: rgba(0,255,255,0.15); border-color: rgba(0,255,255,0.5); }
  .ctrl-btn.active { background: rgba(0,255,255,0.2); border-color: #0ff; color: #fff; }
  .ctrl-btn.danger { border-color: rgba(255,50,80,0.4); color: #f36; }
  .ctrl-btn.danger:hover { background: rgba(255,50,80,0.15); }

    
  /* Click ripple */
  .ripple {
    position: fixed; border-radius: 50%; pointer-events: none; z-index: 5;
    border: 1px solid rgba(255,0,100,0.6);
    animation: rippleOut 0.8s ease-out forwards;
  }
  @keyframes rippleOut {
    0% { width: 0; height: 0; opacity: 1; }
    100% { width: 120px; height: 120px; opacity: 0; margin-top: -60px; margin-left: -60px; }
  }

  /* Instructions overlay */
  #instructions {
    position: fixed; inset: 0; z-index: 20;
    background: rgba(5,5,10,0.92);
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  #instructions .box {
    text-align: center; max-width: 400px; padding: 32px;
  }
  #instructions h2 {
    font-family: 'Chakra Petch', sans-serif;
    font-weight: 600; font-size: 28px; color: #0ff;
    text-shadow: 0 0 20px rgba(0,255,255,0.4);
    letter-spacing: 0.12em;
    margin-bottom: 16px;
  }
  #instructions p {
    font-size: 13px; color: #6a8a8a; line-height: 1.8;
    margin-bottom: 20px;
  }
  #instructions .start-btn {
    font-family: 'Chakra Petch', sans-serif;
    font-size: 14px; font-weight: 600;
    padding: 12px 36px;
    background: transparent; border: 2px solid #0ff; color: #0ff;
    border-radius: 8px; cursor: pointer;
    letter-spacing: 0.15em; text-transform: uppercase;
    transition: all .15s;
  }
  #instructions .start-btn:hover { background: rgba(0,255,255,0.1); }
</style>
</head>
<body>

<div id="hud">
  <div class="title">NEON ANTS</div>
  <div class="stats">
    <span>ants <span class="v" id="antCount">0</span></span>
    <span>food <span class="v" id="foodCount">0</span></span>
    <span>collected <span class="v" id="collected">0</span></span>
    <span>fps <span class="v" id="fpsEl">0</span></span>
  </div>
</div>

<div id="controls">
  <button class="ctrl-btn active" data-tool="distract">Click: Distract</button>
  <button class="ctrl-btn" data-tool="food">Click: Drop Food</button>
  <button class="ctrl-btn" data-tool="wall">Click: Wall</button>
  <button class="ctrl-btn" data-tool="erase">Click: Erase</button>
  <button class="ctrl-btn" id="trailBtn">Trails: ON</button>
  <button class="ctrl-btn" id="addAntsBtn">+10 Ants</button>
  <button class="ctrl-btn danger" id="resetBtn">Reset</button>
</div>
<div id="instructions">
  <div class="box">
    <h2>NEON ANTS</h2>
    <p>
      Watch glowing ants build pheromone highways to find food.<br/>
      <span style="color:#0ff">Click anywhere</span> to distract them.<br/>
      Drop food, build walls, or just watch the chaos.
    </p>
    <button class="start-btn" id="startBtn">Enter Colony</button>
  </div>
</div>

<canvas id="c"></canvas>

<script>
(function() {
  'use strict';

  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  // === CONFIG ===
  const CFG = {
    antCount: 60,
    antSpeed: 1.8,
    antTurnSpeed: 0.35,
    antSenseAngle: 0.5,      // radians
    antSenseDistance: 12,
    pheromoneDecay: 0.992,
    pheromoneDeposit: 0.4,
    foodPheromoneDeposit: 0.6,
    distractRadius: 80,
    distractDuration: 120,    // frames
    foodSize: 4,
    gridScale: 2,             // pheromone grid is canvas/gridScale
    nestGlow: 20,
  };

  // === STATE ===
  let W, H, GW, GH;
  let ants = [];
  let foods = [];
  let walls = [];   // [{x, y, r}]
  let nest = { x: 0, y: 0 };
  let pHome, pFood; // pheromone grids (Float32Array)
  let distractions = []; // [{x, y, ttl}]
  let collected = 0;
  let showTrails = true;
  let tool = 'distract';
  let running = false;
  let mouseDown = false;
  let mouseX = 0, mouseY = 0;

  // Pheromone image data for rendering
  let pherImg;

  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
    GW = Math.ceil(W / CFG.gridScale);
    GH = Math.ceil(H / CFG.gridScale);
    pHome = new Float32Array(GW * GH);
    pFood = new Float32Array(GW * GH);
    pherImg = ctx.createImageData(GW, GH);
    nest.x = W / 2;
    nest.y = H / 2;
  }

  function init() {
    resize();
    ants = [];
    foods = [];
    walls = [];
    distractions = [];
    collected = 0;

    // Spawn ants at nest
    for (let i = 0; i < CFG.antCount; i++) spawnAnt();

    // Scatter food clusters
    for (let c = 0; c < 5; c++) {
      const cx = 80 + Math.random() * (W - 160);
      const cy = 80 + Math.random() * (H - 160);
      // Don't place food too close to nest
      if (Math.hypot(cx - nest.x, cy - nest.y) < 120) continue;
      for (let j = 0; j < 12; j++) {
        foods.push({
          x: cx + (Math.random() - 0.5) * 40,
          y: cy + (Math.random() - 0.5) * 40,
        });
      }
    }
  }

  function spawnAnt() {
    ants.push({
      x: nest.x + (Math.random() - 0.5) * 10,
      y: nest.y + (Math.random() - 0.5) * 10,
      angle: Math.random() * Math.PI * 2,
      carrying: false,
      distracted: 0,         // frames of distraction remaining
      distractTarget: null,  // {x, y}
      speed: CFG.antSpeed * (0.85 + Math.random() * 0.3),
      hue: 160 + Math.random() * 40, // cyan-green range
    });
  }

  // === PHEROMONE GRID ===
  function gIdx(wx, wy) {
    const gx = Math.floor(wx / CFG.gridScale);
    const gy = Math.floor(wy / CFG.gridScale);
    if (gx < 0 || gx >= GW || gy < 0 || gy >= GH) return -1;
    return gy * GW + gx;
  }

  function depositPheromone(grid, wx, wy, amount) {
    const idx = gIdx(wx, wy);
    if (idx >= 0) grid[idx] = Math.min(1, grid[idx] + amount);
  }

  function samplePheromone(grid, wx, wy) {
    const idx = gIdx(wx, wy);
    return idx >= 0 ? grid[idx] : 0;
  }

  function decayPheromones() {
    const decay = CFG.pheromoneDecay;
    for (let i = 0; i < pHome.length; i++) {
      pHome[i] *= decay;
      pFood[i] *= decay;
      if (pHome[i] < 0.001) pHome[i] = 0;
      if (pFood[i] < 0.001) pFood[i] = 0;
    }
  }

  // === ANT LOGIC ===
  function senseDir(ant, grid, angleOffset) {
    const sx = ant.x + Math.cos(ant.angle + angleOffset) * CFG.antSenseDistance;
    const sy = ant.y + Math.sin(ant.angle + angleOffset) * CFG.antSenseDistance;
    return samplePheromone(grid, sx, sy);
  }

  function steerToward(ant, grid) {
    const left = senseDir(ant, grid, -CFG.antSenseAngle);
    const center = senseDir(ant, grid, 0);
    const right = senseDir(ant, grid, CFG.antSenseAngle);

    if (center >= left && center >= right) {
      // Keep going straight, tiny random wobble
      ant.angle += (Math.random() - 0.5) * 0.1;
    } else if (left > right) {
      ant.angle -= CFG.antTurnSpeed * (0.5 + Math.random() * 0.5);
    } else if (right > left) {
      ant.angle += CFG.antTurnSpeed * (0.5 + Math.random() * 0.5);
    }
  }

  function isInWall(x, y) {
    for (let w of walls) {
      if (Math.hypot(x - w.x, y - w.y) < w.r) return true;
    }
    return false;
  }

  function updateAnt(ant) {
    // Distraction
    if (ant.distracted > 0) {
      ant.distracted--;
      if (ant.distractTarget) {
        const dx = ant.distractTarget.x - ant.x;
        const dy = ant.distractTarget.y - ant.y;
        const dist = Math.hypot(dx, dy);
        if (dist > 5) {
          ant.angle = Math.atan2(dy, dx) + (Math.random() - 0.5) * 0.8;
        } else {
          // Wander chaotically near distraction
          ant.angle += (Math.random() - 0.5) * 1.5;
        }
      }
      // Move
      const nx = ant.x + Math.cos(ant.angle) * ant.speed;
      const ny = ant.y + Math.sin(ant.angle) * ant.speed;
      if (nx > 2 && nx < W - 2 && ny > 2 && ny < H - 2 && !isInWall(nx, ny)) {
        ant.x = nx; ant.y = ny;
      } else {
        ant.angle += Math.PI * 0.5 + Math.random();
      }
      return;
    }

    if (ant.carrying) {
      // Carrying food: head toward nest, follow home pheromone
      const dx = nest.x - ant.x;
      const dy = nest.y - ant.y;
      const distNest = Math.hypot(dx, dy);

      // Deposit food pheromone
      depositPheromone(pFood, ant.x, ant.y, CFG.foodPheromoneDeposit);

      if (distNest < 12) {
        // Drop food at nest
        ant.carrying = false;
        collected++;
        ant.angle += Math.PI; // turn around
        // Small burst of home pheromone at nest
        depositPheromone(pHome, ant.x, ant.y, 0.8);
      } else {
        // Steer toward nest with some pheromone help
        const nestAngle = Math.atan2(dy, dx);
        let angleDiff = nestAngle - ant.angle;
        while (angleDiff > Math.PI) angleDiff -= Math.PI * 2;
        while (angleDiff < -Math.PI) angleDiff += Math.PI * 2;
        ant.angle += angleDiff * 0.08;

        // Also follow home pheromone
        steerToward(ant, pHome);

        ant.angle += (Math.random() - 0.5) * 0.15;
      }
    } else {
      // Searching: follow food pheromone, random walk
      depositPheromone(pHome, ant.x, ant.y, CFG.pheromoneDeposit);
      steerToward(ant, pFood);

      // Random wander
      ant.angle += (Math.random() - 0.5) * 0.4;

      // Check for food pickup
      for (let fi = foods.length - 1; fi >= 0; fi--) {
        const f = foods[fi];
        if (Math.hypot(ant.x - f.x, ant.y - f.y) < CFG.foodSize + 3) {
          ant.carrying = true;
          foods.splice(fi, 1);
          ant.angle += Math.PI; // turn around
          // Big pheromone deposit at food location
          depositPheromone(pFood, ant.x, ant.y, 1);
          break;
        }
      }
    }

    // Move forward
    const nx = ant.x + Math.cos(ant.angle) * ant.speed;
    const ny = ant.y + Math.sin(ant.angle) * ant.speed;

    if (nx > 2 && nx < W - 2 && ny > 2 && ny < H - 2 && !isInWall(nx, ny)) {
      ant.x = nx;
      ant.y = ny;
    } else {
      // Bounce off edges/walls
      ant.angle += Math.PI * 0.5 + (Math.random() - 0.5) * 0.5;
    }
  }

  // === DISTRACTION ===
  function createDistraction(x, y) {
    distractions.push({ x, y, ttl: CFG.distractDuration });

    // Distract nearby ants
    for (const ant of ants) {
      const dist = Math.hypot(ant.x - x, ant.y - y);
      if (dist < CFG.distractRadius) {
        ant.distracted = CFG.distractDuration * (1 - dist / CFG.distractRadius);
        ant.distractTarget = { x, y };
      }
    }
  }

  // === RENDERING ===
  function renderPheromones() {
    if (!showTrails) return;
    const data = pherImg.data;
    for (let i = 0; i < GW * GH; i++) {
      const ph = pHome[i];
      const pf = pFood[i];
      const idx = i * 4;

      // Home pheromone = cyan, food pheromone = magenta
      const hr = 0;
      const hg = Math.min(255, ph * 400);
      const hb = Math.min(255, ph * 500);

      const fr = Math.min(255, pf * 500);
      const fg = 0;
      const fb = Math.min(255, pf * 300);

      data[idx]     = Math.min(255, hr + fr);
      data[idx + 1] = Math.min(255, hg + fg);
      data[idx + 2] = Math.min(255, hb + fb);
      data[idx + 3] = Math.max(hr + fr, hg + fg, hb + fb) > 5 ? 180 : 0;
    }
    // Scale up pheromone image
    const tmpCvs = document.createElement('canvas');
    tmpCvs.width = GW; tmpCvs.height = GH;
    tmpCvs.getContext('2d').putImageData(pherImg, 0, 0);
    ctx.drawImage(tmpCvs, 0, 0, W, H);
  }

  function renderNest() {
    // Pulsing glow
    const pulse = 0.7 + 0.3 * Math.sin(performance.now() / 400);
    const r = CFG.nestGlow * pulse;

    ctx.save();
    const grad = ctx.createRadialGradient(nest.x, nest.y, 2, nest.x, nest.y, r);
    grad.addColorStop(0, 'rgba(0, 255, 255, 0.5)');
    grad.addColorStop(0.4, 'rgba(0, 255, 255, 0.15)');
    grad.addColorStop(1, 'rgba(0, 255, 255, 0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(nest.x, nest.y, r, 0, Math.PI * 2);
    ctx.fill();

    // Inner dot
    ctx.fillStyle = '#0ff';
    ctx.beginPath();
    ctx.arc(nest.x, nest.y, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function renderFood() {
    ctx.fillStyle = '#0f0';
    ctx.shadowColor = '#0f0';
    ctx.shadowBlur = 6;
    for (const f of foods) {
      ctx.beginPath();
      ctx.arc(f.x, f.y, CFG.foodSize, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
  }

  function renderWalls() {
    ctx.fillStyle = 'rgba(60, 60, 80, 0.6)';
    ctx.strokeStyle = 'rgba(100, 100, 140, 0.4)';
    ctx.lineWidth = 1;
    for (const w of walls) {
      ctx.beginPath();
      ctx.arc(w.x, w.y, w.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
    }
  }

  function renderAnts() {
    for (const ant of ants) {
      ctx.save();
      ctx.translate(ant.x, ant.y);
      ctx.rotate(ant.angle);

      // Body glow
      const alpha = ant.distracted > 0 ? 0.4 + 0.6 * Math.sin(performance.now() / 50) : 1;
      const bodyColor = ant.carrying
        ? `hsla(120, 100%, 65%, ${alpha})`
        : `hsla(${ant.hue}, 90%, 60%, ${alpha})`;
      const glowColor = ant.carrying
        ? `hsla(120, 100%, 65%, ${alpha * 0.3})`
        : `hsla(${ant.hue}, 90%, 60%, ${alpha * 0.2})`;

      // Glow
      ctx.shadowColor = bodyColor;
      ctx.shadowBlur = ant.carrying ? 8 : 4;

      // Body: 3 segments
      ctx.fillStyle = bodyColor;
      ctx.beginPath();
      ctx.ellipse(0, 0, 3, 2, 0, 0, Math.PI * 2);    // thorax
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(-4, 0, 2.5, 2, 0, 0, Math.PI * 2);  // abdomen
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(3.5, 0, 1.8, 1.5, 0, 0, Math.PI * 2); // head
      ctx.fill();

      // Antennae
      ctx.strokeStyle = bodyColor;
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(4.5, -1); ctx.lineTo(7, -3);
      ctx.moveTo(4.5, 1); ctx.lineTo(7, 3);
      ctx.stroke();

      // Legs
      ctx.lineWidth = 0.4;
      ctx.beginPath();
      const legPhase = performance.now() / 80;
      for (let l = 0; l < 3; l++) {
        const lx = -2 + l * 2;
        const wobble = Math.sin(legPhase + l * 2) * 1.5;
        ctx.moveTo(lx, -2); ctx.lineTo(lx - 1, -4 - wobble);
        ctx.moveTo(lx, 2);  ctx.lineTo(lx - 1, 4 + wobble);
      }
      ctx.stroke();

      // Carried food indicator
      if (ant.carrying) {
        ctx.fillStyle = '#0f0';
        ctx.beginPath();
        ctx.arc(5, 0, 1.5, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.shadowBlur = 0;
      ctx.restore();
    }
  }

  function renderDistractions() {
    for (let i = distractions.length - 1; i >= 0; i--) {
      const d = distractions[i];
      d.ttl--;
      if (d.ttl <= 0) { distractions.splice(i, 1); continue; }

      const alpha = d.ttl / CFG.distractDuration;
      const r = CFG.distractRadius * (1 - alpha * 0.3);
      ctx.save();
      ctx.strokeStyle = `rgba(255, 0, 100, ${alpha * 0.4})`;
      ctx.lineWidth = 1;
      ctx.setLineDash([4, 4]);
      ctx.beginPath();
      ctx.arc(d.x, d.y, r, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);

      // Inner pulse
      const grad = ctx.createRadialGradient(d.x, d.y, 0, d.x, d.y, r * 0.3);
      grad.addColorStop(0, `rgba(255, 0, 100, ${alpha * 0.15})`);
      grad.addColorStop(1, 'rgba(255, 0, 100, 0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(d.x, d.y, r * 0.3, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }

  // === MAIN LOOP ===
  let lastFrame = 0;
  let frameCount = 0;
  let fpsTimer = 0;

  function frame(now) {
    if (!running) return;
    requestAnimationFrame(frame);

    // FPS counter
    frameCount++;
    if (now - fpsTimer > 1000) {
      document.getElementById('fpsEl').textContent = frameCount;
      frameCount = 0;
      fpsTimer = now;
    }

    // Clear
    ctx.fillStyle = 'rgba(5, 5, 10, 0.15)';
    ctx.fillRect(0, 0, W, H);

    // Update
    decayPheromones();
    for (const ant of ants) updateAnt(ant);

    // Continuous tool actions on mouse drag
    if (mouseDown && tool === 'wall') {
      walls.push({ x: mouseX, y: mouseY, r: 8 });
    } else if (mouseDown && tool === 'erase') {
      // Erase walls and food near cursor
      walls = walls.filter(w => Math.hypot(w.x - mouseX, w.y - mouseY) > 20);
      foods = foods.filter(f => Math.hypot(f.x - mouseX, f.y - mouseY) > 20);
      // Clear pheromones in area
      const gx0 = Math.max(0, Math.floor((mouseX - 20) / CFG.gridScale));
      const gy0 = Math.max(0, Math.floor((mouseY - 20) / CFG.gridScale));
      const gx1 = Math.min(GW - 1, Math.floor((mouseX + 20) / CFG.gridScale));
      const gy1 = Math.min(GH - 1, Math.floor((mouseY + 20) / CFG.gridScale));
      for (let gy = gy0; gy <= gy1; gy++) {
        for (let gx = gx0; gx <= gx1; gx++) {
          const i = gy * GW + gx;
          pHome[i] = 0;
          pFood[i] = 0;
        }
      }
    }

    // Render
    renderPheromones();
    renderWalls();
    renderNest();
    renderFood();
    renderDistractions();
    renderAnts();

    // Update HUD
    document.getElementById('antCount').textContent = ants.length;
    document.getElementById('foodCount').textContent = foods.length;
    document.getElementById('collected').textContent = collected;
  }

  // === INPUT ===
  function handleClick(x, y) {
    if (tool === 'distract') {
      createDistraction(x, y);
    } else if (tool === 'food') {
      // Drop food cluster
      for (let i = 0; i < 8; i++) {
        foods.push({
          x: x + (Math.random() - 0.5) * 30,
          y: y + (Math.random() - 0.5) * 30,
        });
      }
    } else if (tool === 'wall') {
      walls.push({ x, y, r: 12 });
    } else if (tool === 'erase') {
      walls = walls.filter(w => Math.hypot(w.x - x, w.y - y) > 20);
      foods = foods.filter(f => Math.hypot(f.x - x, f.y - y) > 20);
    }
  }

  canvas.addEventListener('pointerdown', (e) => {
    mouseDown = true;
    mouseX = e.clientX;
    mouseY = e.clientY;
    handleClick(e.clientX, e.clientY);

    // Visual ripple for distract mode
    if (tool === 'distract') {
      const ripple = document.createElement('div');
      ripple.className = 'ripple';
      ripple.style.left = e.clientX + 'px';
      ripple.style.top = e.clientY + 'px';
      document.body.appendChild(ripple);
      setTimeout(() => ripple.remove(), 800);
    }
  });

  canvas.addEventListener('pointermove', (e) => {
    mouseX = e.clientX;
    mouseY = e.clientY;
    if (mouseDown && tool === 'food') {
      foods.push({ x: e.clientX, y: e.clientY });
    }
  });

  window.addEventListener('pointerup', () => { mouseDown = false; });

  // Tool buttons
  document.querySelectorAll('[data-tool]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('[data-tool]').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      tool = btn.dataset.tool;
    });
  });

  document.getElementById('trailBtn').addEventListener('click', function() {
    showTrails = !showTrails;
    this.textContent = 'Trails: ' + (showTrails ? 'ON' : 'OFF');
    this.classList.toggle('active', showTrails);
  });

  document.getElementById('addAntsBtn').addEventListener('click', () => {
    for (let i = 0; i < 10; i++) spawnAnt();
  });

  document.getElementById('resetBtn').addEventListener('click', () => {
    pHome.fill(0);
    pFood.fill(0);
    init();
  });

  // Start
  document.getElementById('startBtn').addEventListener('click', () => {
    document.getElementById('instructions').style.display = 'none';
    if (!running) {
      running = true;
      init();
      requestAnimationFrame(frame);
    }
  });

  window.addEventListener('resize', () => {
    const oldAnts = ants;
    const oldFoods = foods;
    const oldWalls = walls;
    const oldCollected = collected;
    resize();
    ants = oldAnts;
    foods = oldFoods;
    walls = oldWalls;
    collected = oldCollected;
    // Reposition nest
    nest.x = W / 2;
    nest.y = H / 2;
  });

  // Pre-render pheromone canvas (reused each frame to avoid GC)
  // Actually we create it in renderPheromones — let's cache it
  let pherCanvas = null;
  let pherCtx = null;

  const origRenderPheromones = renderPheromones;
  renderPheromones = function() {
    if (!showTrails) return;
    const data = pherImg.data;
    for (let i = 0; i < GW * GH; i++) {
      const ph = pHome[i];
      const pf = pFood[i];
      const idx = i * 4;
      const hg = Math.min(255, ph * 400);
      const hb = Math.min(255, ph * 500);
      const fr = Math.min(255, pf * 500);
      const fb = Math.min(255, pf * 300);
      data[idx]     = Math.min(255, fr);
      data[idx + 1] = Math.min(255, hg);
      data[idx + 2] = Math.min(255, hb + fb);
      data[idx + 3] = Math.max(fr, hg, hb + fb) > 5 ? 180 : 0;
    }
    if (!pherCanvas) {
      pherCanvas = document.createElement('canvas');
      pherCanvas.width = GW;
      pherCanvas.height = GH;
      pherCtx = pherCanvas.getContext('2d');
    }
    if (pherCanvas.width !== GW || pherCanvas.height !== GH) {
      pherCanvas.width = GW;
      pherCanvas.height = GH;
    }
    pherCtx.putImageData(pherImg, 0, 0);
    ctx.drawImage(pherCanvas, 0, 0, W, H);
  };

})();
</script>
</body>
</html>
