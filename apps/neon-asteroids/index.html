<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Asteroids</title>
<link rel="icon" href="https://emojicdn.elk.sh/☄️">
<meta property="og:title" content="Neon Asteroids">
<meta property="og:description" content="Blast neon asteroids with retro vector graphics and screen-shaking explosions.">
<meta property="og:url" content="https://sloppy.live/neon-asteroids">
<meta property="og:image" content="https://sloppy.live/neon-asteroids/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Share Tech Mono',monospace;color:#0ff}
canvas{display:block}
#ui{position:fixed;top:0;left:0;width:100%;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;pointer-events:none;z-index:10}
#score{font-family:'Press Start 2P',monospace;font-size:18px;color:#0ff;text-shadow:0 0 10px #0ff}
#lives{font-family:'Press Start 2P',monospace;font-size:14px;color:#0f8}
#level-display{font-family:'Press Start 2P',monospace;font-size:12px;color:#f0a}
#start-screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.85);z-index:20}
#start-screen h1{font-family:'Press Start 2P',monospace;font-size:clamp(20px,5vw,42px);color:#0ff;text-shadow:0 0 20px #0ff,0 0 40px #088;margin-bottom:30px}
#start-screen .sub{font-size:14px;color:#0f8;margin-bottom:40px}
#start-screen button{font-family:'Press Start 2P',monospace;font-size:16px;background:none;border:2px solid #0ff;color:#0ff;padding:14px 32px;cursor:pointer;text-shadow:0 0 8px #0ff;transition:all .2s}
#start-screen button:hover{background:#0ff;color:#000}
#game-over{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.88);z-index:20}
#game-over h2{font-family:'Press Start 2P',monospace;font-size:28px;color:#f44;text-shadow:0 0 20px #f44;margin-bottom:15px}
#game-over .final{font-family:'Press Start 2P',monospace;font-size:16px;color:#0ff;margin-bottom:30px}
#game-over button{font-family:'Press Start 2P',monospace;font-size:14px;background:none;border:2px solid #0ff;color:#0ff;padding:12px 28px;cursor:pointer}
#game-over button:hover{background:#0ff;color:#000}
#mobile-controls{position:fixed;bottom:10px;left:0;width:100%;display:none;justify-content:space-between;padding:0 10px;z-index:15;pointer-events:none}
.m-btn{width:60px;height:60px;border-radius:50%;border:2px solid rgba(0,255,255,0.4);background:rgba(0,255,255,0.08);color:rgba(0,255,255,0.6);font-size:22px;display:flex;align-items:center;justify-content:center;pointer-events:auto;user-select:none;-webkit-user-select:none}
.m-left{display:flex;gap:8px}
.m-right{display:flex;gap:8px}
#backlink{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);font-size:11px;z-index:10;opacity:0.4}
#backlink a{color:#0ff;text-decoration:none}
@media(pointer:coarse){#mobile-controls{display:flex}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="score">0</div>
  <div id="level-display">WAVE 1</div>
  <div id="lives"></div>
</div>
<div id="start-screen">
  <h1>NEON ASTEROIDS</h1>
  <div class="sub">Retro vector destruction</div>
  <button onclick="startGame()">START</button>
</div>
<div id="game-over">
  <h2>DESTROYED</h2>
  <div class="final" id="final-score"></div>
  <button onclick="startGame()">RETRY</button>
</div>
<div id="mobile-controls">
  <div class="m-left">
    <button class="m-btn" id="m-left">&#9664;</button>
    <button class="m-btn" id="m-right">&#9654;</button>
  </div>
  <div class="m-right">
    <button class="m-btn" id="m-thrust">&#9650;</button>
    <button class="m-btn" id="m-fire">&#9679;</button>
  </div>
</div>
<div id="backlink"><a href="https://sloppy.live">sloppy.live</a></div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize();
addEventListener('resize', resize);

let ship, asteroids, bullets, particles, score, lives, level, gameRunning, invincibleTimer, shakes;
const keys = {};

addEventListener('keydown', e => { keys[e.key] = true; if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault(); });
addEventListener('keyup', e => keys[e.key] = false);

const mobileKeys = { 'm-left': 'ArrowLeft', 'm-right': 'ArrowRight', 'm-thrust': 'ArrowUp', 'm-fire': ' ' };
Object.entries(mobileKeys).forEach(([id, key]) => {
  const el = document.getElementById(id);
  if (!el) return;
  const on = () => { keys[key] = true; };
  const off = () => { keys[key] = false; };
  el.addEventListener('touchstart', e => { e.preventDefault(); on(); });
  el.addEventListener('touchend', e => { e.preventDefault(); off(); });
  el.addEventListener('mousedown', on);
  el.addEventListener('mouseup', off);
});

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playSound(freq, dur, type, vol) {
  type = type || 'square'; vol = vol || 0.1;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, audioCtx.currentTime);
  g.gain.setValueAtTime(vol, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + dur);
}

function createShip() {
  return { x: W / 2, y: H / 2, angle: -Math.PI / 2, vx: 0, vy: 0, thrust: false };
}

function createAsteroid(x, y, size) {
  const speed = (1.2 + level * 0.15) * (4 - size) * 0.5;
  const angle = Math.random() * Math.PI * 2;
  const verts = [];
  const numVerts = 8 + Math.floor(Math.random() * 5);
  const radius = size === 3 ? 50 : size === 2 ? 28 : 14;
  for (let i = 0; i < numVerts; i++) {
    const a = (i / numVerts) * Math.PI * 2;
    const r = radius * (0.7 + Math.random() * 0.5);
    verts.push({ x: Math.cos(a) * r, y: Math.sin(a) * r });
  }
  return { x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, size, radius, verts, rot: 0, rotSpeed: (Math.random() - 0.5) * 0.02 };
}

function spawnWaveAsteroids() {
  const count = 3 + level;
  for (let i = 0; i < count; i++) {
    let x, y;
    do { x = Math.random() * W; y = Math.random() * H; } while (Math.hypot(x - ship.x, y - ship.y) < 150);
    asteroids.push(createAsteroid(x, y, 3));
  }
}

function startGame() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('game-over').style.display = 'none';
  score = 0; lives = 3; level = 1; invincibleTimer = 120; shakes = [];
  ship = createShip();
  asteroids = []; bullets = []; particles = [];
  spawnWaveAsteroids();
  gameRunning = true;
  updateUI();
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('level-display').textContent = 'WAVE ' + level;
  var livesStr = '';
  for (let i = 0; i < lives; i++) livesStr += '\u25B2 ';
  document.getElementById('lives').textContent = livesStr;
}

function addShake(amount) { shakes.push(amount); }

function spawnExplosion(x, y, count, color, speed) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = Math.random() * speed;
    const isLine = Math.random() > 0.5;
    particles.push({ x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s, life: 30 + Math.random() * 30, maxLife: 60, color, isLine, len: isLine ? 4 + Math.random() * 8 : 0, angle: a });
  }
}

function wrap(obj) {
  if (obj.x < -50) obj.x = W + 50;
  if (obj.x > W + 50) obj.x = -50;
  if (obj.y < -50) obj.y = H + 50;
  if (obj.y > H + 50) obj.y = -50;
}

var fireCooldown = 0;

function update() {
  if (!gameRunning) return;
  if (keys['ArrowLeft'] || keys['a'] || keys['A']) ship.angle -= 0.06;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) ship.angle += 0.06;
  ship.thrust = keys['ArrowUp'] || keys['w'] || keys['W'];
  if (ship.thrust) {
    ship.vx += Math.cos(ship.angle) * 0.12;
    ship.vy += Math.sin(ship.angle) * 0.12;
    if (Math.random() > 0.3) {
      var bx = ship.x - Math.cos(ship.angle) * 16;
      var by = ship.y - Math.sin(ship.angle) * 16;
      particles.push({ x: bx, y: by, vx: -Math.cos(ship.angle) * (1 + Math.random() * 2) + (Math.random() - 0.5), vy: -Math.sin(ship.angle) * (1 + Math.random() * 2) + (Math.random() - 0.5), life: 10 + Math.random() * 15, maxLife: 25, color: '#f80', isLine: false, len: 0, angle: 0 });
    }
  }
  ship.vx *= 0.995; ship.vy *= 0.995;
  var spd = Math.hypot(ship.vx, ship.vy);
  if (spd > 8) { ship.vx = (ship.vx / spd) * 8; ship.vy = (ship.vy / spd) * 8; }
  ship.x += ship.vx; ship.y += ship.vy;
  wrap(ship);

  if (fireCooldown > 0) fireCooldown--;
  if ((keys[' '] || keys['z'] || keys['Z']) && fireCooldown <= 0) {
    bullets.push({ x: ship.x + Math.cos(ship.angle) * 16, y: ship.y + Math.sin(ship.angle) * 16, vx: Math.cos(ship.angle) * 8 + ship.vx * 0.3, vy: Math.sin(ship.angle) * 8 + ship.vy * 0.3, life: 55 });
    fireCooldown = 8;
    playSound(800, 0.08, 'square', 0.06);
  }

  bullets.forEach(function(b) { b.x += b.vx; b.y += b.vy; b.life--; wrap(b); });
  bullets = bullets.filter(function(b) { return b.life > 0; });

  asteroids.forEach(function(a) { a.x += a.vx; a.y += a.vy; a.rot += a.rotSpeed; wrap(a); });

  for (var i = bullets.length - 1; i >= 0; i--) {
    for (var j = asteroids.length - 1; j >= 0; j--) {
      var b = bullets[i], a = asteroids[j];
      if (!b || !a) continue;
      if (Math.hypot(b.x - a.x, b.y - a.y) < a.radius) {
        bullets.splice(i, 1);
        var hitA = asteroids.splice(j, 1)[0];
        score += hitA.size === 3 ? 20 : hitA.size === 2 ? 50 : 100;
        addShake(hitA.size === 3 ? 6 : hitA.size === 2 ? 4 : 2);
        var colors = ['#0ff', '#0f8', '#f0a', '#ff0'];
        spawnExplosion(hitA.x, hitA.y, 12 + hitA.size * 5, colors[Math.floor(Math.random() * colors.length)], 3);
        playSound(150 + hitA.size * 50, 0.2, 'sawtooth', 0.08);
        if (hitA.size > 1) {
          for (var k = 0; k < 2; k++) asteroids.push(createAsteroid(hitA.x, hitA.y, hitA.size - 1));
        }
        updateUI();
        break;
      }
    }
  }

  if (invincibleTimer > 0) { invincibleTimer--; } else {
    for (var j2 = asteroids.length - 1; j2 >= 0; j2--) {
      var a2 = asteroids[j2];
      if (Math.hypot(ship.x - a2.x, ship.y - a2.y) < a2.radius + 10) {
        lives--;
        addShake(12);
        spawnExplosion(ship.x, ship.y, 30, '#0ff', 4);
        playSound(80, 0.5, 'sawtooth', 0.12);
        if (lives <= 0) {
          gameRunning = false;
          document.getElementById('final-score').textContent = 'SCORE: ' + score;
          document.getElementById('game-over').style.display = 'flex';
          return;
        }
        ship = createShip();
        invincibleTimer = 120;
        updateUI();
        break;
      }
    }
  }

  if (asteroids.length === 0) {
    level++;
    spawnWaveAsteroids();
    updateUI();
    playSound(440, 0.15, 'sine', 0.08);
    setTimeout(function() { playSound(660, 0.15, 'sine', 0.08); }, 150);
  }

  particles.forEach(function(p) { p.x += p.vx; p.y += p.vy; p.vx *= 0.97; p.vy *= 0.97; p.life--; });
  particles = particles.filter(function(p) { return p.life > 0; });
  shakes = shakes.map(function(s) { return s * 0.85; }).filter(function(s) { return s > 0.3; });
}

function draw() {
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fillRect(0, 0, W, H);
  var shakeX = shakes.reduce(function(a, s) { return a + (Math.random() - 0.5) * s; }, 0);
  var shakeY = shakes.reduce(function(a, s) { return a + (Math.random() - 0.5) * s; }, 0);
  ctx.save();
  ctx.translate(shakeX, shakeY);

  if (!gameRunning && document.getElementById('start-screen').style.display !== 'none') { ctx.restore(); return; }

  if (ship && (gameRunning || document.getElementById('game-over').style.display === 'flex')) {
    var flicker = invincibleTimer > 0 && Math.floor(invincibleTimer / 4) % 2;
    if (!flicker) {
      ctx.save();
      ctx.translate(ship.x, ship.y);
      ctx.rotate(ship.angle);
      ctx.strokeStyle = '#0ff';
      ctx.shadowColor = '#0ff';
      ctx.shadowBlur = 8;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(16, 0);
      ctx.lineTo(-10, -10);
      ctx.lineTo(-6, 0);
      ctx.lineTo(-10, 10);
      ctx.closePath();
      ctx.stroke();
      if (ship.thrust) {
        ctx.strokeStyle = '#f80';
        ctx.shadowColor = '#f80';
        ctx.beginPath();
        ctx.moveTo(-6, -5);
        ctx.lineTo(-16 - Math.random() * 8, 0);
        ctx.lineTo(-6, 5);
        ctx.stroke();
      }
      ctx.restore();
    }
  }

  ctx.strokeStyle = '#4fd';
  ctx.shadowColor = '#4fd';
  ctx.shadowBlur = 6;
  ctx.lineWidth = 1.5;
  asteroids.forEach(function(a) {
    ctx.save();
    ctx.translate(a.x, a.y);
    ctx.rotate(a.rot);
    ctx.beginPath();
    ctx.moveTo(a.verts[0].x, a.verts[0].y);
    for (var i = 1; i < a.verts.length; i++) ctx.lineTo(a.verts[i].x, a.verts[i].y);
    ctx.closePath();
    ctx.stroke();
    ctx.restore();
  });

  ctx.shadowColor = '#f4a';
  ctx.shadowBlur = 10;
  bullets.forEach(function(b) {
    ctx.fillStyle = '#f4a';
    ctx.beginPath();
    ctx.arc(b.x, b.y, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,80,160,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(b.x, b.y);
    ctx.lineTo(b.x - b.vx * 3, b.y - b.vy * 3);
    ctx.stroke();
  });

  ctx.shadowBlur = 0;
  particles.forEach(function(p) {
    var alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    if (p.isLine) {
      ctx.strokeStyle = p.color;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x + Math.cos(p.angle) * p.len, p.y + Math.sin(p.angle) * p.len);
      ctx.stroke();
    } else {
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
  });
  ctx.globalAlpha = 1;
  ctx.restore();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
