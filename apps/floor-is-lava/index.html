<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>Floor Is Lava</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8C%8B" />

<meta name="description" content="The page is the floor. The floor is lava. Tiles glow amber, then erupt bright red — keep your cursor off them as long as you can." />
<meta property="og:type" content="website" />
<meta property="og:title" content="Floor Is Lava" />
<meta property="og:description" content="Keep your cursor alive. The tiles are erupting." />
<meta property="og:url" content="https://sloppy.live/floor-is-lava/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/cracked%20dark%20stone%20floor%20tiles%20with%20glowing%20lava%20erupting%20through%20some%20tiles%2C%20top%20down%20view%2C%20video%20game%2C%20dramatic?width=1200&height=630&nologo=true&seed=666" />
<meta name="twitter:card" content="summary_large_image" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bakbak+One&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />

<style>
  :root{ --stone:#26221f; --stone2:#1c1916; --crack:#3a332c; --warn:#e88a2e; --lava:#ff3b1f; --lava2:#ffd23f; --ink:#f2e8d8; }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  html,body{height:100%; overflow:hidden;}
  body{ font-family:'IBM Plex Mono',monospace; background:#141110; color:var(--ink); cursor:crosshair; }

  #floor{ position:fixed; inset:0; display:grid; }
  .tile{ position:relative; background:
      radial-gradient(60% 60% at 30% 30%, var(--stone), var(--stone2));
    border:1px solid var(--crack); transition:background .25s; }
  .tile::after{ content:""; position:absolute; inset:0; opacity:0; transition:opacity .25s; }
  /* warning: amber pulse */
  .tile.warn{ animation:warnPulse .5s ease-in-out infinite alternate; }
  @keyframes warnPulse{
    from{ background:radial-gradient(60% 60% at 40% 40%, #6b3a12, #2c1c0c); box-shadow:inset 0 0 18px rgba(232,138,46,.4); }
    to{ background:radial-gradient(60% 60% at 60% 60%, #a3541a, #3a2408); box-shadow:inset 0 0 34px rgba(232,138,46,.8); }
  }
  /* erupted: bright lava */
  .tile.lava{ border-color:#7e1f0a;
    background:radial-gradient(80% 80% at 30% 25%, var(--lava2) 0%, var(--lava) 35%, #a3200c 80%, #6b1206 100%);
    animation:bubble 1.1s ease-in-out infinite alternate;
    box-shadow:inset 0 0 26px rgba(255,210,63,.5), 0 0 22px rgba(255,59,31,.5); }
  @keyframes bubble{
    from{ background-position:0% 0%; filter:brightness(1); }
    to{ background-position:30% 40%; filter:brightness(1.25); }
  }
  .tile.cooling{ background:radial-gradient(70% 70% at 50% 50%, #4a2418, var(--stone2)); }

  /* HUD */
  .hud{ position:fixed; top:.8rem; left:50%; transform:translateX(-50%); z-index:10; display:flex; gap:1.2rem;
    background:rgba(20,17,16,.82); border:1px solid var(--crack); border-radius:12px; padding:.5rem 1.1rem;
    font-size:.72rem; letter-spacing:.08em; pointer-events:none; }
  .hud b{ font-family:'Bakbak One',sans-serif; font-size:1.25rem; letter-spacing:.02em; color:var(--lava2); display:block; text-align:center; }
  .hud .u{ color:#9a8f78; text-transform:uppercase; font-size:.58rem; display:block; text-align:center; }

  .overlay{ position:fixed; inset:0; z-index:20; display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center; background:rgba(12,9,8,.88); padding:1.4rem; }
  .overlay[hidden]{ display:none; }
  .overlay h1{ font-family:'Bakbak One',sans-serif; font-size:clamp(2.4rem,10vw,4.5rem); line-height:1;
    color:var(--lava); text-shadow:0 0 30px rgba(255,59,31,.5); }
  .overlay p{ color:#c9b896; font-size:.9rem; line-height:1.8; margin:1rem 0 1.4rem; max-width:30em; }
  .overlay .big{ font-family:'Bakbak One',sans-serif; font-size:2.2rem; color:var(--lava2); }
  .overlay button{ font-family:'Bakbak One',sans-serif; font-size:1.3rem; letter-spacing:.04em; color:#1c0f08;
    background:linear-gradient(180deg,var(--lava2),var(--warn)); border:0; border-radius:12px; padding:.7rem 2rem;
    cursor:pointer; min-height:3rem; box-shadow:0 5px 0 #8a4d10; }
  .overlay button:active{ transform:translateY(3px); box-shadow:0 2px 0 #8a4d10; }
  .overlay button:focus-visible{ outline:3px solid var(--ink); outline-offset:3px; }

  #feet{ position:fixed; z-index:8; width:26px; height:26px; margin:-13px 0 0 -13px; pointer-events:none;
    font-size:20px; line-height:26px; text-align:center; filter:drop-shadow(0 2px 3px rgba(0,0,0,.6)); }
  @media (prefers-reduced-motion: reduce){ .tile.warn,.tile.lava{ animation:none; } }
</style>
</head>
<body>
  <div id="floor" role="application" aria-label="Floor is lava. Move your pointer to avoid tiles that glow amber and then erupt red."></div>
  <div id="feet" aria-hidden="true">🧍</div>

  <div class="hud" aria-hidden="false">
    <span><b id="time">0.0</b><span class="u">seconds</span></span>
    <span><b id="lavaN">0</b><span class="u">erupted</span></span>
    <span><b id="best">0.0</b><span class="u">best</span></span>
  </div>

  <div class="overlay" id="startOv">
    <h1>THE FLOOR IS LAVA</h1>
    <p>Your cursor is you. Tiles glow <b style="color:var(--warn)">amber</b> as a warning, then erupt
      <b style="color:var(--lava)">bright red</b>. Don't be standing there.<br>It gets faster. It always gets faster.</p>
    <button id="startBtn" type="button">STEP ONTO THE FLOOR</button>
  </div>

  <div class="overlay" id="endOv" hidden>
    <h1>🔥 CRISPY</h1>
    <p id="endLine">you lasted</p>
    <div class="big" id="endTime">0.0s</div>
    <p id="endBest"></p>
    <button id="againBtn" type="button">HOP BACK ON</button>
  </div>

<script>
(function(){
  "use strict";
  var $=function(id){return document.getElementById(id);};
  var floor=$('floor'), feet=$('feet');
  var reduce=window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ---- audio ----
  var AC=null, muted=false;
  function ac(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
    if(AC&&AC.state==='suspended') AC.resume(); return AC; }
  function tone(type,f0,f1,dur,vol,delay){
    var c=ac(); if(!c||muted) return; var t=c.currentTime+(delay||0);
    var o=c.createOscillator(); o.type=type; o.frequency.setValueAtTime(f0,t);
    if(f1) o.frequency.exponentialRampToValueAtTime(f1,t+dur);
    var g=c.createGain(); g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(vol,t+0.015);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g); g.connect(c.destination); o.start(t); o.stop(t+dur+0.05);
  }
  function nz(dur,f,vol,delay){
    var c=ac(); if(!c||muted) return; var t=c.currentTime+(delay||0);
    var len=Math.ceil(c.sampleRate*dur), buf=c.createBuffer(1,len,c.sampleRate), d=buf.getChannelData(0);
    for(var i=0;i<len;i++) d[i]=Math.random()*2-1;
    var s=c.createBufferSource(); s.buffer=buf;
    var bp=c.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=f; bp.Q.value=1;
    var g=c.createGain(); g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    s.connect(bp); bp.connect(g); g.connect(c.destination); s.start(t); s.stop(t+dur);
  }
  function sndWarn(){ tone('square',420,380,0.09,0.06); }
  function sndErupt(){ nz(0.4,300,0.2); tone('sawtooth',90,45,0.4,0.14); }
  function sndDeath(){ nz(0.7,1800,0.25); nz(0.5,500,0.2,0.05); tone('sawtooth',300,60,0.6,0.18); }

  // ---- grid ----
  var cols=0, rows=0, tiles=[];   // state: 0 stone, 1 warn, 2 lava, 3 cooling
  function buildGrid(){
    var size=Math.max(70, Math.min(110, Math.floor(Math.min(innerWidth,innerHeight)/7)));
    cols=Math.ceil(innerWidth/size); rows=Math.ceil(innerHeight/size);
    floor.style.gridTemplateColumns='repeat('+cols+',1fr)';
    floor.style.gridTemplateRows='repeat('+rows+',1fr)';
    floor.innerHTML=''; tiles=[];
    for(var i=0;i<cols*rows;i++){
      var d=document.createElement('div'); d.className='tile';
      floor.appendChild(d);
      tiles.push({el:d, state:0});
    }
  }
  buildGrid();
  addEventListener('resize', function(){ if(!playing) buildGrid(); });

  // ---- player = pointer ----
  var px=innerWidth/2, py=innerHeight/2;
  function tileAt(x,y){
    var c=Math.min(cols-1,Math.max(0,Math.floor(x/ (innerWidth/cols))));
    var r=Math.min(rows-1,Math.max(0,Math.floor(y/ (innerHeight/rows))));
    return tiles[r*cols+c];
  }
  addEventListener('pointermove', function(e){ px=e.clientX; py=e.clientY; });
  addEventListener('pointerdown', function(e){ px=e.clientX; py=e.clientY; });

  // ---- game ----
  var playing=false, t0=0, lavaCount=0, timers=[], best=0;
  try{ best=parseFloat(localStorage.getItem('floor-is-lava-best'))||0; }catch(e){}
  $('best').textContent=best.toFixed(1);
  function later(fn,ms){ var t=setTimeout(fn,ms); timers.push(t); return t; }
  function clearTimers(){ timers.forEach(clearTimeout); timers=[]; }

  function elapsed(){ return (performance.now()-t0)/1000; }
  function difficulty(){ return Math.min(1, elapsed()/75); }   // full spice at 75s

  function eruptRound(){
    if(!playing) return;
    var d=difficulty();
    var count=Math.round(1 + d*(cols*rows*0.14));         // 1 tile → ~14% of the floor
    var warnMs=reduce? 1500 : Math.round(1400 - d*750);   // 1.4s → 0.65s telegraph
    var lavaMs=Math.round(2600 + d*1400);                 // eruptions linger longer
    var pool=tiles.filter(function(t){ return t.state===0; });
    for(var i=0;i<count && pool.length;i++){
      var idx=Math.floor(Math.random()*pool.length);
      var tile=pool.splice(idx,1)[0];
      (function(tile){
        tile.state=1; tile.el.className='tile warn'; sndWarn();
        later(function(){
          if(!playing||tile.state!==1) return;
          tile.state=2; tile.el.className='tile lava'; lavaCount++; $('lavaN').textContent=lavaCount;
          sndErupt();
          later(function(){
            if(tile.state!==2) return;
            tile.state=3; tile.el.className='tile cooling';
            later(function(){ if(tile.state===3){ tile.state=0; tile.el.className='tile'; } }, 900);
          }, lavaMs);
        }, warnMs);
      })(tile);
    }
    later(eruptRound, Math.round(2200 - d*1300));         // rounds accelerate 2.2s → 0.9s
  }

  function loop(){
    if(!playing) return;
    requestAnimationFrame(loop);
    feet.style.left=px+'px'; feet.style.top=py+'px';
    $('time').textContent=elapsed().toFixed(1);
    var t=tileAt(px,py);
    if(t && t.state===2) die();
  }

  function start(){
    ac();
    clearTimers(); buildGrid();
    playing=true; t0=performance.now(); lavaCount=0;
    $('lavaN').textContent='0';
    $('startOv').hidden=true; $('endOv').hidden=true;
    feet.textContent='🧍';
    later(eruptRound, 1800);   // grace period
    requestAnimationFrame(loop);
  }
  function die(){
    if(!playing) return;
    playing=false; clearTimers();
    sndDeath();
    feet.textContent='💀';
    var s=elapsed();
    var isBest=s>best;
    if(isBest){ best=s; try{ localStorage.setItem('floor-is-lava-best', String(best)); }catch(e){} $('best').textContent=best.toFixed(1); }
    $('endTime').textContent=s.toFixed(1)+'s';
    $('endLine').textContent=isBest? 'NEW RECORD — you lasted' : 'you lasted';
    $('endBest').textContent='best: '+best.toFixed(1)+'s · '+lavaCount+' eruptions dodged';
    later(function(){ $('endOv').hidden=false; }, 650);
  }

  $('startBtn').addEventListener('click', start);
  $('againBtn').addEventListener('click', start);
})();
</script>
</body>
</html>
