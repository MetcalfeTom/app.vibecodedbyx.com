<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lingua Void — Decode the Lost Language</title>
<link rel="icon" href="https://emojicdn.elk.sh/🗿">
<meta property="og:title" content="Lingua Void">
<meta property="og:description" content="Decode a fictional language through context clues. No dictionary — only intuition.">
<meta property="og:url" content="https://sloppy.live/lingua-void">
<meta property="og:image" content="https://sloppy.live/lingua-void/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0c0a10;--card:#14111a;--border:#2a2435;
  --gold:#d4a855;--cyan:#5cc8c8;--muted:#7a7088;
  --text:#d8d0e0;--alien:#c49bff;--correct:#55cc88;--wrong:#cc5566;
}
body{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  background:var(--bg);color:var(--text);
  font-family:'Cormorant Garamond',serif;
  overflow-x:hidden;
}
.container{max-width:560px;width:100%;padding:16px;margin-top:10px}
header{
  text-align:center;padding:20px 0 10px;
}
header h1{
  font-size:28px;font-weight:700;color:var(--gold);
  letter-spacing:3px;text-shadow:0 0 20px rgba(212,168,85,.2);
}
header .sub{font-size:13px;color:var(--muted);font-family:'Fira Code',monospace;margin-top:4px}
#hud{
  display:flex;justify-content:space-between;align-items:center;
  padding:8px 0;font-family:'Fira Code',monospace;font-size:12px;
  color:var(--muted);border-bottom:1px solid var(--border);margin-bottom:14px;
}
#hud .score{color:var(--gold)}
#hud .level{color:var(--cyan)}
.tablet{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:20px;margin-bottom:16px;position:relative;
  box-shadow:0 4px 30px rgba(0,0,0,.3);
}
.tablet::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  border-radius:12px;pointer-events:none;
  background:linear-gradient(135deg,rgba(196,155,255,.03),transparent 60%);
}
.context-label{
  font-family:'Fira Code',monospace;font-size:10px;color:var(--muted);
  letter-spacing:2px;margin-bottom:10px;text-transform:uppercase;
}
.sentence{
  font-size:22px;line-height:1.6;margin-bottom:8px;color:var(--text);
}
.word-alien{
  color:var(--alien);font-style:italic;font-weight:700;
  text-decoration:underline;text-decoration-color:rgba(196,155,255,.25);
  text-underline-offset:3px;cursor:default;
  transition:color .3s;
}
.word-alien.decoded{color:var(--correct);text-decoration-color:rgba(85,204,136,.25)}
.word-known{color:var(--text);opacity:.85}
.illustration{
  font-size:14px;color:var(--muted);font-style:italic;
  margin-top:8px;padding-top:8px;border-top:1px solid rgba(255,255,255,.04);
}
.question-area{margin-bottom:16px}
.question{
  font-size:18px;color:var(--text);margin-bottom:12px;line-height:1.5;
}
.question .target{
  color:var(--alien);font-weight:700;font-style:italic;font-size:22px;
}
.options{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.opt-btn{
  background:rgba(255,255,255,.03);border:1px solid var(--border);
  border-radius:8px;padding:12px 8px;color:var(--text);
  font-family:'Cormorant Garamond',serif;font-size:17px;
  cursor:pointer;transition:all .2s;text-align:center;
}
.opt-btn:hover{background:rgba(196,155,255,.08);border-color:var(--alien)}
.opt-btn.correct{background:rgba(85,204,136,.12);border-color:var(--correct);color:var(--correct)}
.opt-btn.wrong{background:rgba(204,85,102,.08);border-color:var(--wrong);color:var(--wrong)}
.opt-btn:disabled{cursor:default;opacity:.7}
.feedback{
  text-align:center;padding:10px;font-size:15px;
  border-radius:8px;margin-bottom:12px;display:none;
}
.feedback.show{display:block}
.feedback.right{background:rgba(85,204,136,.08);color:var(--correct)}
.feedback.wrong-fb{background:rgba(204,85,102,.08);color:var(--wrong)}
#next-btn{
  display:none;width:100%;padding:12px;
  background:rgba(212,168,85,.1);border:1px solid rgba(212,168,85,.3);
  border-radius:8px;color:var(--gold);font-family:'Fira Code',monospace;
  font-size:13px;cursor:pointer;transition:all .2s;letter-spacing:1px;
}
#next-btn:hover{background:rgba(212,168,85,.2)}
.lexicon{
  background:var(--card);border:1px solid var(--border);border-radius:12px;
  padding:16px;margin-bottom:16px;
}
.lexicon h3{
  font-family:'Fira Code',monospace;font-size:11px;color:var(--muted);
  letter-spacing:2px;margin-bottom:10px;text-transform:uppercase;
}
.lex-grid{display:flex;flex-wrap:wrap;gap:6px}
.lex-entry{
  background:rgba(196,155,255,.06);border:1px solid rgba(196,155,255,.12);
  border-radius:6px;padding:4px 10px;font-size:13px;
  display:flex;gap:6px;align-items:center;
}
.lex-entry .alien-w{color:var(--alien);font-style:italic;font-weight:700}
.lex-entry .eng-w{color:var(--correct);font-family:'Fira Code',monospace;font-size:11px}
.lex-entry.unknown .eng-w{color:var(--muted);font-style:italic}
.progress-bar{
  width:100%;height:4px;background:rgba(255,255,255,.05);
  border-radius:2px;margin-bottom:16px;overflow:hidden;
}
.progress-fill{height:100%;background:var(--gold);border-radius:2px;transition:width .5s}
.backlink{text-align:center;padding:10px 0 20px;font-size:12px;opacity:.3}
.backlink a{color:var(--muted);text-decoration:none}
#complete{display:none;text-align:center;padding:30px 0}
#complete h2{font-size:26px;color:var(--gold);margin-bottom:8px}
#complete p{color:var(--muted);margin-bottom:14px}
#restart-btn{
  padding:10px 28px;background:rgba(212,168,85,.15);
  border:1px solid rgba(212,168,85,.3);border-radius:8px;
  color:var(--gold);font-family:'Fira Code',monospace;font-size:13px;
  cursor:pointer;
}
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>LINGUA VOID</h1>
    <div class="sub">decode the lost tongue</div>
  </header>
  <div id="hud">
    <span class="level" id="levelLabel">Tablet 1 / 20</span>
    <span class="score" id="scoreLabel">0 pts</span>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
  <div class="tablet" id="tablet"></div>
  <div class="question-area" id="questionArea"></div>
  <div class="feedback" id="feedback"></div>
  <button id="next-btn">NEXT TABLET →</button>
  <div class="lexicon" id="lexicon">
    <h3>🗿 Your Lexicon</h3>
    <div class="lex-grid" id="lexGrid"></div>
  </div>
  <div id="complete">
    <h2>🗿 Language Mastered</h2>
    <p id="finalMsg"></p>
    <button id="restart-btn">NEW LANGUAGE</button>
  </div>
</div>
<div class="backlink"><a href="https://sloppy.live">sloppy.live</a></div>

<script>
// ── Fictional language generation ──
// Syllable system for alien words
const ONSETS=['k','t','n','m','v','s','z','r','l','sh','th','dr','kr','gl','zr','vn'];
const VOWELS=['a','e','i','o','u','ae','ou','ei','uu','aa'];
const CODAS=['','n','r','k','sh','l','th','s','z','x'];

function randEl(a){return a[Math.floor(Math.random()*a.length)]}
function makeSyllable(){return randEl(ONSETS)+randEl(VOWELS)+randEl(CODAS)}
function makeWord(syls){
  let w='';for(let i=0;i<(syls||1+Math.floor(Math.random()*2));i++) w+=makeSyllable();
  return w;
}

// ── Core vocabulary with semantic categories ──
const CONCEPTS = [
  // nature
  {en:'water',cat:'nature',hints:['flows','drink','river']},
  {en:'fire',cat:'nature',hints:['burns','warm','light']},
  {en:'stone',cat:'nature',hints:['hard','mountain','build']},
  {en:'tree',cat:'nature',hints:['tall','leaves','forest']},
  {en:'sky',cat:'nature',hints:['above','blue','clouds']},
  {en:'moon',cat:'nature',hints:['night','round','silver']},
  {en:'sun',cat:'nature',hints:['day','bright','warm']},
  {en:'wind',cat:'nature',hints:['blows','invisible','cold']},
  // actions
  {en:'go',cat:'action',hints:['move','walk','travel']},
  {en:'see',cat:'action',hints:['eyes','look','watch']},
  {en:'eat',cat:'action',hints:['food','mouth','hungry']},
  {en:'give',cat:'action',hints:['hand','share','offer']},
  {en:'take',cat:'action',hints:['grab','hold','receive']},
  {en:'speak',cat:'action',hints:['voice','words','mouth']},
  // qualities
  {en:'big',cat:'quality',hints:['large','huge','great']},
  {en:'small',cat:'quality',hints:['tiny','little','short']},
  {en:'good',cat:'quality',hints:['nice','well','happy']},
  {en:'dark',cat:'quality',hints:['night','shadow','black']},
  {en:'old',cat:'quality',hints:['ancient','time','wise']},
  {en:'new',cat:'quality',hints:['fresh','young','begin']},
  // beings
  {en:'person',cat:'being',hints:['human','one','self']},
  {en:'child',cat:'being',hints:['young','small','play']},
  {en:'beast',cat:'being',hints:['animal','wild','hunt']},
  {en:'spirit',cat:'being',hints:['ghost','soul','invisible']},
];

// ── Sentence templates ──
// {0}=subject-slot, alien words are %%wordkey%%
const TEMPLATES = [
  {text:'The %%W1%% falls from the %%W2%%.', needs:2, illustration:'A scene of nature in motion.'},
  {text:'%%W1%% is %%W2%% when the %%W3%% rises.', needs:3, illustration:'A truth about the world.'},
  {text:'The %%W1%% can %%W2%% the %%W3%%.', needs:3, illustration:'A creature demonstrates its power.'},
  {text:'Every %%W1%% must %%W2%%.', needs:2, illustration:'An ancient proverb.'},
  {text:'A %%W1%% %%W2%% told me about the %%W3%%.', needs:3, illustration:'A whispered memory.'},
  {text:'Without %%W1%%, there is only %%W2%%.', needs:2, illustration:'A fundamental law of this world.'},
  {text:'The %%W1%% will %%W2%% the %%W3%% tonight.', needs:3, illustration:'A prophecy carved in stone.'},
  {text:'%%W1%% %%W2%% are found near the %%W3%%.', needs:3, illustration:'A naturalist\'s observation.'},
  {text:'To %%W1%% is to %%W2%%.', needs:2, illustration:'A philosopher\'s inscription.'},
  {text:'The %%W1%% of the %%W2%% is %%W3%%.', needs:3, illustration:'A description etched in clay.'},
  {text:'Only a %%W1%% can %%W2%% in the %%W3%%.', needs:3, illustration:'A warning from the elders.'},
  {text:'When the %%W1%% %%W2%%, the %%W3%% awakens.', needs:3, illustration:'A cycle recorded in glyphs.'},
];

// ── Game state ──
let dictionary = {}; // alienWord -> english
let known = {};      // alienWord -> english (decoded by player)
let puzzles = [];
let currentPuzzle = 0;
let score = 0;
let answered = false;

function generateLanguage(){
  dictionary = {};
  known = {};
  const shuffled = [...CONCEPTS].sort(()=>Math.random()-.5);
  shuffled.forEach(c=>{
    let w;
    do { w = makeWord(); } while(dictionary[w]);
    dictionary[w] = c.en;
  });
}

function alienFor(en){
  for(const[k,v]of Object.entries(dictionary)) if(v===en) return k;
  return null;
}

function generatePuzzles(){
  puzzles = [];
  const wordList = Object.entries(dictionary);
  // introduce words gradually — each puzzle introduces 1-2 new words + uses known ones
  const introduced = new Set();
  const order = wordList.sort(()=>Math.random()-.5);

  for(let i=0;i<20;i++){
    const tmpl = TEMPLATES[i % TEMPLATES.length];
    const needs = tmpl.needs;

    // pick words for this puzzle: some new, some already introduced
    let chosenWords = [];
    // always introduce at least 1 new word
    const newOnes = order.filter(([k])=>!introduced.has(k));
    if(newOnes.length>0){
      const nw = newOnes[0];
      chosenWords.push(nw);
      introduced.add(nw[0]);
    }

    // fill remaining with mix of known + new
    while(chosenWords.length<needs){
      if(Math.random()<0.5 && introduced.size>chosenWords.length){
        // reuse a known word
        const knownArr=[...introduced].filter(k=>!chosenWords.find(c=>c[0]===k));
        if(knownArr.length>0){
          const rk=knownArr[Math.floor(Math.random()*knownArr.length)];
          chosenWords.push([rk,dictionary[rk]]);
          continue;
        }
      }
      // add new
      if(newOnes.length>chosenWords.filter(c=>!introduced.has(c[0])||c===chosenWords[0]).length){
        const remaining=order.filter(([k])=>!introduced.has(k)&&!chosenWords.find(c=>c[0]===k));
        if(remaining.length>0){
          const nw=remaining[0];
          chosenWords.push(nw);
          introduced.add(nw[0]);
          continue;
        }
      }
      // fallback: reuse any
      const any=[...introduced].filter(k=>!chosenWords.find(c=>c[0]===k));
      if(any.length>0){
        const rk=any[Math.floor(Math.random()*any.length)];
        chosenWords.push([rk,dictionary[rk]]);
      } else break;
    }

    // which word to ask about?
    // prefer asking about the newest introduced word
    const askIdx=0; // first word is always the new one
    const askWord=chosenWords[askIdx];

    // build sentence text
    let sentenceHTML=tmpl.text;
    chosenWords.forEach(([alien,eng],idx)=>{
      const tag=`%%W${idx+1}%%`;
      const cls=idx===askIdx?'word-alien target-word':'word-alien';
      sentenceHTML=sentenceHTML.replace(tag,`<span class="${cls}" data-alien="${alien}" data-en="${eng}">${alien}</span>`);
    });

    // generate wrong answers
    const concept=CONCEPTS.find(c=>c.en===askWord[1]);
    const wrongPool=CONCEPTS.filter(c=>c.en!==askWord[1]).sort(()=>Math.random()-.5);
    // pick wrongs from same category first for difficulty
    const sameCat=wrongPool.filter(c=>c.cat===concept.cat);
    const diffCat=wrongPool.filter(c=>c.cat!==concept.cat);
    const wrongs=[...sameCat,...diffCat].slice(0,3).map(c=>c.en);

    const options=[askWord[1],...wrongs].sort(()=>Math.random()-.5);

    puzzles.push({
      sentenceHTML,
      illustration:tmpl.illustration,
      askAlien:askWord[0],
      askEnglish:askWord[1],
      options,
      allWords:chosenWords,
      hints:concept?concept.hints:[],
    });
  }
}

// ── Rendering ──
function renderPuzzle(){
  const p=puzzles[currentPuzzle];
  answered=false;

  document.getElementById('levelLabel').textContent=`Tablet ${currentPuzzle+1} / ${puzzles.length}`;
  document.getElementById('scoreLabel').textContent=score+' pts';
  document.getElementById('progFill').style.width=((currentPuzzle)/puzzles.length*100)+'%';

  // tablet with sentence
  const tablet=document.getElementById('tablet');
  // replace already-known words with green
  let html=p.sentenceHTML;
  // mark known words
  p.allWords.forEach(([alien,eng])=>{
    if(known[alien]){
      html=html.replace(
        new RegExp(`data-alien="${alien}">`+alien+'</span>'),
        `data-alien="${alien}" title="${known[alien]}">${alien} <small style="color:var(--correct);font-size:12px">[${known[alien]}]</small></span>`
      );
    }
  });

  tablet.innerHTML=`
    <div class="context-label">Ancient Tablet ${currentPuzzle+1}</div>
    <div class="sentence">${html}</div>
    <div class="illustration">${p.illustration}</div>
  `;

  // question
  const qa=document.getElementById('questionArea');
  const hintText=p.hints.length>0?`<div style="font-size:12px;color:var(--muted);font-family:'Fira Code',monospace;margin-bottom:8px">hint: ${p.hints[Math.floor(Math.random()*p.hints.length)]}</div>`:'';
  qa.innerHTML=`
    <div class="question">What does <span class="target">${p.askAlien}</span> mean?</div>
    ${hintText}
    <div class="options" id="opts"></div>
  `;

  const optsDiv=document.getElementById('opts');
  p.options.forEach(opt=>{
    const btn=document.createElement('button');
    btn.className='opt-btn';
    btn.textContent=opt;
    btn.addEventListener('click',()=>handleAnswer(opt,btn));
    optsDiv.appendChild(btn);
  });

  document.getElementById('feedback').className='feedback';
  document.getElementById('feedback').style.display='none';
  document.getElementById('next-btn').style.display='none';
}

function handleAnswer(choice,btn){
  if(answered) return;
  answered=true;
  const p=puzzles[currentPuzzle];
  const correct=choice===p.askEnglish;
  const fb=document.getElementById('feedback');

  // disable all buttons
  document.querySelectorAll('.opt-btn').forEach(b=>{
    b.disabled=true;
    if(b.textContent===p.askEnglish) b.classList.add('correct');
  });

  if(correct){
    btn.classList.add('correct');
    score+=10+(currentPuzzle);
    known[p.askAlien]=p.askEnglish;
    fb.textContent='✓ Correct! "'+p.askAlien+'" means "'+p.askEnglish+'"';
    fb.className='feedback show right';
  } else {
    btn.classList.add('wrong');
    score=Math.max(0,score-5);
    fb.textContent='✗ "'+p.askAlien+'" means "'+p.askEnglish+'", not "'+choice+'"';
    fb.className='feedback show wrong-fb';
    // still learn it
    known[p.askAlien]=p.askEnglish;
  }

  document.getElementById('scoreLabel').textContent=score+' pts';
  document.getElementById('next-btn').style.display='block';
  renderLexicon();
}

function renderLexicon(){
  const grid=document.getElementById('lexGrid');
  grid.innerHTML='';
  const entries=Object.entries(dictionary);
  entries.forEach(([alien,eng])=>{
    const div=document.createElement('div');
    const isKnown=!!known[alien];
    div.className='lex-entry'+(isKnown?'':' unknown');
    div.innerHTML=`<span class="alien-w">${alien}</span><span class="eng-w">${isKnown?eng:'???'}</span>`;
    grid.appendChild(div);
  });
}

function nextPuzzle(){
  currentPuzzle++;
  if(currentPuzzle>=puzzles.length){
    // game complete
    document.getElementById('tablet').style.display='none';
    document.getElementById('questionArea').style.display='none';
    document.getElementById('feedback').style.display='none';
    document.getElementById('next-btn').style.display='none';
    document.getElementById('progFill').style.width='100%';
    const total=Object.keys(dictionary).length;
    const decoded=Object.keys(known).length;
    document.getElementById('finalMsg').textContent=
      `You decoded ${decoded}/${total} words and scored ${score} points. The void remembers your name.`;
    document.getElementById('complete').style.display='block';
  } else {
    renderPuzzle();
  }
}

// ── Init ──
function startGame(){
  generateLanguage();
  generatePuzzles();
  currentPuzzle=0;score=0;known={};
  document.getElementById('tablet').style.display='';
  document.getElementById('questionArea').style.display='';
  document.getElementById('complete').style.display='none';
  renderPuzzle();
  renderLexicon();
}

document.getElementById('next-btn').addEventListener('click',nextPuzzle);
document.getElementById('restart-btn').addEventListener('click',startGame);

startGame();
</script>
</body>
</html>
