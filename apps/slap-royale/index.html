<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Slap Royale</title>
<link rel="icon" href="https://emojicdn.elk.sh/👋">
<meta property="og:title" content="Slap Royale">
<meta property="og:description" content="4-player same-keyboard slap fight on a shrinking platform. Last one standing wins.">
<meta property="og:url" content="https://sloppy.live/slap-royale">
<meta property="og:image" content="https://image.pollinations.ai/prompt/4%20colorful%20fighters%20on%20a%20shrinking%20circular%20arena%20neon%20chaos%20pixel%20art?width=1200&height=630&seed=7777&nologo=true">
<style>
@import url('https://fonts.googleapis.com/css2?family=Bungee&family=Fredoka:wght@400;600;700&family=Azeret+Mono:wght@400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:100%}
body{background:#0a0612;overflow:hidden;height:100vh;width:100vw;font-family:'Fredoka',sans-serif;color:#f0e6ff}
canvas{display:block;position:absolute;top:0;left:0}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#title-screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 40%,#1a0f2e 0%,#0a0612 70%);z-index:20;pointer-events:all}
#title-screen h1{font-family:'Bungee',sans-serif;font-size:clamp(2.8rem,8vw,5.5rem);letter-spacing:.06em;background:linear-gradient(135deg,#ff5ea1,#ffdf5e,#5ec2ff,#a76fc3);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-shadow:none;margin-bottom:.3rem}
#title-screen .sub{font-family:'Azeret Mono',monospace;font-size:.85rem;color:#a090c0;letter-spacing:.15em;margin-bottom:2.5rem}
.player-keys{display:flex;gap:1.2rem;flex-wrap:wrap;justify-content:center;margin-bottom:2rem;max-width:40rem}
.pk{display:flex;align-items:center;gap:.5rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:.6rem;padding:.5rem 1rem}
.pk .dot{width:14px;height:14px;border-radius:50%;flex-shrink:0}
.pk span{font-family:'Azeret Mono',monospace;font-size:.75rem;color:#c0b0e0}
.pk kbd{font-family:'Azeret Mono',monospace;font-size:.8rem;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.18);border-radius:4px;padding:2px 7px;color:#fff}
#start-btn{pointer-events:all;font-family:'Bungee',sans-serif;font-size:1.3rem;padding:.9rem 2.8rem;border:none;border-radius:1rem;background:linear-gradient(135deg,#ff5ea1,#a76fc3);color:#fff;cursor:pointer;letter-spacing:.05em;box-shadow:0 4px 20px rgba(255,94,161,.35);transition:transform .15s,box-shadow .15s}
#start-btn:hover{transform:scale(1.06);box-shadow:0 6px 28px rgba(255,94,161,.5)}
#start-btn:focus-visible{outline:3px solid #ffdf5e;outline-offset:3px}
#hud{position:absolute;top:1rem;left:50%;transform:translateX(-50%);display:flex;gap:1.2rem;align-items:center;opacity:0;transition:opacity .3s}
#hud.show{opacity:1}
.hud-pill{font-family:'Azeret Mono',monospace;font-size:.8rem;background:rgba(10,6,18,.7);backdrop-filter:blur(8px);border:1px solid rgba(255,255,255,.12);border-radius:2rem;padding:.35rem 1rem;display:flex;align-items:center;gap:.4rem}
.hud-pill .label{color:#a090c0;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase}
.hud-pill .val{color:#fff;font-weight:700}
#player-status{position:absolute;bottom:1.2rem;left:50%;transform:translateX(-50%);display:flex;gap:.8rem;opacity:0;transition:opacity .3s}
#player-status.show{opacity:1}
.ps{display:flex;align-items:center;gap:.4rem;font-family:'Azeret Mono',monospace;font-size:.75rem;background:rgba(10,6,18,.65);backdrop-filter:blur(6px);border-radius:1.2rem;padding:.3rem .8rem;border:1px solid rgba(255,255,255,.1);transition:opacity .3s}
.ps.dead{opacity:.3;text-decoration:line-through}
.ps .pip{width:10px;height:10px;border-radius:50%;flex-shrink:0}
#winner-overlay{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,6,18,.85);backdrop-filter:blur(12px);z-index:25;pointer-events:all}
#winner-overlay.show{display:flex}
#winner-overlay h2{font-family:'Bungee',sans-serif;font-size:clamp(2rem,6vw,4rem);margin-bottom:.5rem}
#winner-overlay .stats{font-family:'Azeret Mono',monospace;font-size:.85rem;color:#a090c0;margin-bottom:2rem}
#restart-btn{font-family:'Bungee',sans-serif;font-size:1.1rem;padding:.7rem 2.2rem;border:none;border-radius:.8rem;background:linear-gradient(135deg,#5ec2ff,#a76fc3);color:#fff;cursor:pointer;letter-spacing:.04em;box-shadow:0 4px 16px rgba(94,194,255,.3)}
#restart-btn:focus-visible{outline:3px solid #ffdf5e;outline-offset:3px}
#controls-hint{position:absolute;bottom:4rem;left:50%;transform:translateX(-50%);font-family:'Azeret Mono',monospace;font-size:.7rem;color:#706090;opacity:0;transition:opacity .3s;text-align:center}
#controls-hint.show{opacity:1}
@media(max-width:600px){
.player-keys{gap:.6rem}
.pk{padding:.35rem .6rem}
#player-status{flex-wrap:wrap;justify-content:center;bottom:.6rem}
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
<div id="title-screen">
<h1>SLAP ROYALE</h1>
<p class="sub">4-PLAYER · SAME KEYBOARD · LAST ONE STANDING</p>
<div class="player-keys">
<div class="pk"><div class="dot" style="background:#ff5ea1"></div><span>P1</span><kbd>Z</kbd><span>move</span><kbd>X</kbd><span>slap</span></div>
<div class="pk"><div class="dot" style="background:#5ec2ff"></div><span>P2</span><kbd>N</kbd><span>move</span><kbd>M</kbd><span>slap</span></div>
<div class="pk"><div class="dot" style="background:#ffdf5e"></div><span>P3</span><kbd>Q</kbd><span>move</span><kbd>W</kbd><span>slap</span></div>
<div class="pk"><div class="dot" style="background:#a76fc3"></div><span>P4</span><kbd>O</kbd><span>move</span><kbd>P</kbd><span>slap</span></div>
</div>
<button id="start-btn" type="button">START BRAWL</button>
</div>
<div id="hud">
<div class="hud-pill"><span class="label">Time</span><span class="val" id="hud-time">45</span></div>
<div class="hud-pill"><span class="label">Arena</span><span class="val" id="hud-arena">100%</span></div>
<div class="hud-pill"><span class="label">Alive</span><span class="val" id="hud-alive">4</span></div>
</div>
<div id="player-status"></div>
<div id="controls-hint">move = orbit clockwise · slap = knock nearby players outward</div>
<div id="winner-overlay">
<h2 id="win-text">PLAYER 1 WINS</h2>
<p class="stats" id="win-stats"></p>
<button id="restart-btn" type="button">REMATCH</button>
</div>
</div>
<script>
(function(){
'use strict';
var canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
var W,H,cx,cy,dpr;
function resize(){
dpr=Math.min(window.devicePixelRatio||1,2);
W=window.innerWidth;H=window.innerHeight;
canvas.width=W*dpr;canvas.height=H*dpr;
canvas.style.width=W+'px';canvas.style.height=H+'px';
ctx.setTransform(dpr,0,0,dpr,0,0);
cx=W/2;cy=H/2;
}
resize();window.addEventListener('resize',resize);

// Audio
var audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}

function sndSlap(pan){
initAudio();
var t=audioCtx.currentTime;
var o=audioCtx.createOscillator(),g=audioCtx.createGain(),p=audioCtx.createStereoPanner();
o.type='sawtooth';o.frequency.setValueAtTime(320,t);o.frequency.exponentialRampToValueAtTime(80,t+.12);
g.gain.setValueAtTime(.4,t);g.gain.exponentialRampToValueAtTime(.001,t+.15);
p.pan.value=Math.max(-1,Math.min(1,pan||0));
o.connect(g);g.connect(p);p.connect(audioCtx.destination);
o.start(t);o.stop(t+.16);
// noise
var buf=audioCtx.createBuffer(1,audioCtx.sampleRate*.08,audioCtx.sampleRate);
var d=buf.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*.6;
var ns=audioCtx.createBufferSource(),ng=audioCtx.createGain(),bp=audioCtx.createBiquadFilter();
ns.buffer=buf;bp.type='bandpass';bp.frequency.value=1800;bp.Q.value=1.2;
ng.gain.setValueAtTime(.35,t);ng.gain.exponentialRampToValueAtTime(.001,t+.1);
ns.connect(bp);bp.connect(ng);ng.connect(p);ns.start(t);
}

function sndEliminate(){
initAudio();var t=audioCtx.currentTime;
var o=audioCtx.createOscillator(),g=audioCtx.createGain();
o.type='square';o.frequency.setValueAtTime(600,t);o.frequency.exponentialRampToValueAtTime(60,t+.5);
g.gain.setValueAtTime(.3,t);g.gain.exponentialRampToValueAtTime(.001,t+.55);
o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+.6);
// sub thud
var o2=audioCtx.createOscillator(),g2=audioCtx.createGain();
o2.type='sine';o2.frequency.value=55;g2.gain.setValueAtTime(.5,t);g2.gain.exponentialRampToValueAtTime(.001,t+.3);
o2.connect(g2);g2.connect(audioCtx.destination);o2.start(t);o2.stop(t+.35);
}

function sndPowerup(){
initAudio();var t=audioCtx.currentTime;
[440,660,880].forEach(function(f,i){
var o=audioCtx.createOscillator(),g=audioCtx.createGain();
o.type='triangle';o.frequency.value=f;
g.gain.setValueAtTime(0,t+i*.06);g.gain.linearRampToValueAtTime(.2,t+i*.06+.02);
g.gain.exponentialRampToValueAtTime(.001,t+i*.06+.2);
o.connect(g);g.connect(audioCtx.destination);o.start(t+i*.06);o.stop(t+i*.06+.22);
});
}

function sndWin(){
initAudio();var t=audioCtx.currentTime;
[523,659,784,1047].forEach(function(f,i){
var o=audioCtx.createOscillator(),g=audioCtx.createGain();
o.type='triangle';o.frequency.value=f;
g.gain.setValueAtTime(0,t+i*.12);g.gain.linearRampToValueAtTime(.25,t+i*.12+.03);
g.gain.exponentialRampToValueAtTime(.001,t+i*.12+.5);
o.connect(g);g.connect(audioCtx.destination);o.start(t+i*.12);o.stop(t+i*.12+.55);
});
}

function sndShrink(){
initAudio();var t=audioCtx.currentTime;
var o=audioCtx.createOscillator(),g=audioCtx.createGain();
o.type='sine';o.frequency.setValueAtTime(900,t);o.frequency.exponentialRampToValueAtTime(200,t+.6);
g.gain.setValueAtTime(.12,t);g.gain.exponentialRampToValueAtTime(.001,t+.65);
o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+.7);
}

// Players
var COLORS=['#ff5ea1','#5ec2ff','#ffdf5e','#a76fc3'];
var NAMES=['P1','P2','P3','P4'];
var KEYS=[
{move:'z',slap:'x'},
{move:'n',slap:'m'},
{move:'q',slap:'w'},
{move:'o',slap:'p'}
];
var PLAYER_R=16;
var ARENA_R_START;
var ARENA_R_MIN=40;
var SHRINK_INTERVAL=8;
var ROUND_TIME=45;
var SLAP_RANGE=58;
var SLAP_FORCE=420;
var SLAP_CD=.45;
var MOVE_SPEED=3.8;

var players,particles,powerups,shakeAmt,shakeDecay;
var arenaR,timer,gameOver,gameStarted,elimOrder;
var lastShrink,shrinkFlash;
var stars=[];

// Stars bg
for(var i=0;i<120;i++){
stars.push({x:Math.random(),y:Math.random(),r:Math.random()*1.5+.3,a:Math.random()*.6+.2,sp:Math.random()*.3+.1});
}

function baseArenaR(){return Math.min(W,H)*.38}

function initGame(){
ARENA_R_START=baseArenaR();
arenaR=ARENA_R_START;
timer=ROUND_TIME;
gameOver=false;
shakeAmt=0;shakeDecay=0;
particles=[];
powerups=[];
elimOrder=[];
lastShrink=0;
shrinkFlash=0;
players=[];
for(var i=0;i<4;i++){
var ang=Math.PI*2*(i/4)-Math.PI/2;
var dist=arenaR*.55;
players.push({
idx:i,
x:cx+Math.cos(ang)*dist,
y:cy+Math.sin(ang)*dist,
vx:0,vy:0,
angle:ang,
alive:true,
slaps:0,
slapCD:0,
color:COLORS[i],
name:NAMES[i],
powerup:null,
powerupTime:0,
shieldHits:0,
slapScale:0,
hitFlash:0
});
}
updateStatusUI();
}

// Powerup types
var PW_TYPES=[
{type:'speed',emoji:'⚡',color:'#ffdf5e',dur:5},
{type:'mega',emoji:'💥',color:'#ff5ea1',dur:0},
{type:'shield',emoji:'🛡️',color:'#5ec2ff',dur:8}
];

function spawnPowerup(){
if(powerups.length>=2)return;
var ang=Math.random()*Math.PI*2;
var dist=Math.random()*arenaR*.5;
var pw=PW_TYPES[Math.floor(Math.random()*PW_TYPES.length)];
powerups.push({
x:cx+Math.cos(ang)*dist,
y:cy+Math.sin(ang)*dist,
type:pw.type,emoji:pw.emoji,
color:pw.color,
dur:pw.dur,
age:0,
bob:Math.random()*Math.PI*2
});
}

// Input
var keysDown={};
window.addEventListener('keydown',function(e){
var k=e.key.toLowerCase();
keysDown[k]=true;
if(gameStarted&&!gameOver){
for(var i=0;i<4;i++){
if(k===KEYS[i].slap&&players[i].alive&&players[i].slapCD<=0){
doSlap(players[i]);
}
}
}
});
window.addEventListener('keyup',function(e){keysDown[e.key.toLowerCase()]=false});

function doSlap(p){
p.slapCD=SLAP_CD;
p.slapScale=1;
p.slaps++;
var force=SLAP_FORCE;
var range=SLAP_RANGE;
if(p.powerup==='mega'){
force*=2.2;range*=1.5;
p.powerup=null;p.powerupTime=0;
}
var spdMul=p.powerup==='speed'?1.3:1;
// find targets
var hit=false;
for(var i=0;i<players.length;i++){
var t=players[i];
if(t.idx===p.idx||!t.alive)continue;
var dx=t.x-p.x,dy=t.y-p.y;
var d=Math.sqrt(dx*dx+dy*dy);
if(d<range){
if(t.powerup==='shield'){
t.shieldHits++;
if(t.shieldHits>=3){t.powerup=null;t.powerupTime=0;t.shieldHits=0;}
// reduced knockback
var nx=dx/d,ny=dy/d;
t.vx+=nx*force*.25;t.vy+=ny*force*.25;
} else {
var nx=dx/d,ny=dy/d;
t.vx+=nx*force*spdMul;t.vy+=ny*force*spdMul;
}
t.hitFlash=.3;
hit=true;
// slap particles
for(var j=0;j<8;j++){
var pa=Math.atan2(dy,dx)+Math.random()*.8-.4;
particles.push({
x:t.x,y:t.y,
vx:Math.cos(pa)*(120+Math.random()*100),
vy:Math.sin(pa)*(120+Math.random()*100),
r:2+Math.random()*3,
life:1,decay:.015+Math.random()*.01,
color:p.color
});
}
}
}
if(hit){
shakeAmt=Math.min(shakeAmt+6,20);
sndSlap((p.x-cx)/(W/2));
}
}

function eliminate(p){
p.alive=false;
elimOrder.push(p.idx);
sndEliminate();
shakeAmt=Math.min(shakeAmt+14,30);
// big explosion
for(var i=0;i<28;i++){
var ang=Math.PI*2*i/28+Math.random()*.3;
var spd=140+Math.random()*180;
particles.push({
x:p.x,y:p.y,
vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,
r:3+Math.random()*4,
life:1,decay:.008+Math.random()*.006,
color:p.color
});
}
}

// UI
var hudEl=document.getElementById('hud');
var hudTime=document.getElementById('hud-time');
var hudArena=document.getElementById('hud-arena');
var hudAlive=document.getElementById('hud-alive');
var statusEl=document.getElementById('player-status');
var hintEl=document.getElementById('controls-hint');
var titleEl=document.getElementById('title-screen');
var winOverlay=document.getElementById('winner-overlay');
var winText=document.getElementById('win-text');
var winStats=document.getElementById('win-stats');

function updateStatusUI(){
var html='';
for(var i=0;i<4;i++){
var p=players[i];
var cls=p.alive?'ps':'ps dead';
html+='<div class="'+cls+'"><div class="pip" style="background:'+p.color+'"></div>'+p.name;
if(p.powerup)html+=' '+({speed:'⚡',mega:'💥',shield:'🛡️'}[p.powerup]||'');
html+='</div>';
}
statusEl.innerHTML=html;
}

document.getElementById('start-btn').addEventListener('click',function(){
initAudio();
titleEl.style.display='none';
hudEl.classList.add('show');
statusEl.classList.add('show');
hintEl.classList.add('show');
gameStarted=true;
initGame();
setTimeout(function(){hintEl.classList.remove('show')},6000);
});
document.getElementById('restart-btn').addEventListener('click',function(){
winOverlay.classList.remove('show');
initGame();
});

// Game loop
var lastT=0;
var pwSpawnT=0;
gameStarted=false;

function update(dt){
if(!gameStarted||gameOver)return;

timer-=dt;
if(timer<=0){timer=0;gameOver=true;}

// shrink
lastShrink+=dt;
if(lastShrink>=SHRINK_INTERVAL){
lastShrink=0;
var target=Math.max(ARENA_R_MIN,arenaR-ARENA_R_START*.1);
arenaR=target;
shrinkFlash=.6;
sndShrink();
}
if(shrinkFlash>0)shrinkFlash-=dt*2;

// powerup spawn
pwSpawnT+=dt;
if(pwSpawnT>4+Math.random()*3){pwSpawnT=0;spawnPowerup();}

var aliveCount=0;
var lastAlive=null;

for(var i=0;i<players.length;i++){
var p=players[i];
if(!p.alive)continue;
aliveCount++;lastAlive=p;

// move
if(keysDown[KEYS[i].move]){
var spd=MOVE_SPEED*(p.powerup==='speed'?1.6:1);
p.angle+=spd*dt;
}
// slap cooldown
if(p.slapCD>0)p.slapCD-=dt;
if(p.slapScale>0)p.slapScale=Math.max(0,p.slapScale-dt*4);
if(p.hitFlash>0)p.hitFlash-=dt;

// powerup timer
if(p.powerup&&p.powerupTime>0){
p.powerupTime-=dt;
if(p.powerupTime<=0){p.powerup=null;p.powerupTime=0;p.shieldHits=0;}
}

// velocity
p.x+=p.vx*dt;
p.y+=p.vy*dt;
p.vx*=Math.pow(.04,dt);
p.vy*=Math.pow(.04,dt);

// check arena bounds
var dx=p.x-cx,dy=p.y-cy;
var dist=Math.sqrt(dx*dx+dy*dy);
if(dist>arenaR-PLAYER_R){
// push back gently if walking, eliminate if launched
var speed=Math.sqrt(p.vx*p.vx+p.vy*p.vy);
if(dist>arenaR+PLAYER_R*2){
eliminate(p);continue;
}
if(dist>arenaR-PLAYER_R){
var nx=dx/dist,ny=dy/dist;
var pen=dist-(arenaR-PLAYER_R);
p.x-=nx*pen;p.y-=ny*pen;
// bounce velocity
var dot=p.vx*nx+p.vy*ny;
if(dot>0){p.vx-=nx*dot*1.2;p.vy-=ny*dot*1.2;}
}
}

// powerup pickup
for(var j=powerups.length-1;j>=0;j--){
var pw=powerups[j];
var pdx=p.x-pw.x,pdy=p.y-pw.y;
if(Math.sqrt(pdx*pdx+pdy*pdy)<PLAYER_R+16){
p.powerup=pw.type;
p.powerupTime=pw.dur;
p.shieldHits=0;
powerups.splice(j,1);
sndPowerup();
updateStatusUI();
for(var k=0;k<10;k++){
var a=Math.PI*2*k/10;
particles.push({x:pw.x,y:pw.y,vx:Math.cos(a)*80,vy:Math.sin(a)*80,r:2.5,life:1,decay:.02,color:pw.color});
}
}
}
}

// check win
if(aliveCount<=1&&!gameOver){
gameOver=true;
if(lastAlive){
winText.textContent=lastAlive.name+' WINS!';
winText.style.color=lastAlive.color;
winStats.textContent='Slaps thrown: '+lastAlive.slaps+' · Arena at '+Math.round(arenaR/ARENA_R_START*100)+'%';
} else {
winText.textContent='DRAW!';
winText.style.color='#fff';
winStats.textContent='Everyone fell off!';
}
sndWin();
setTimeout(function(){winOverlay.classList.add('show')},800);
}
if(timer<=0&&!gameOver){
gameOver=true;
// whoever is closest to center wins
var best=null,bestD=Infinity;
for(var i=0;i<players.length;i++){
if(!players[i].alive)continue;
var dx2=players[i].x-cx,dy2=players[i].y-cy;
var d2=Math.sqrt(dx2*dx2+dy2*dy2);
if(d2<bestD){bestD=d2;best=players[i];}
}
if(best){
winText.textContent=best.name+' WINS!';
winText.style.color=best.color;
winStats.textContent='Closest to center when time ran out · Slaps: '+best.slaps;
} else {
winText.textContent='DRAW!';winText.style.color='#fff';winStats.textContent='';
}
sndWin();
setTimeout(function(){winOverlay.classList.add('show')},800);
}

// particles
for(var i=particles.length-1;i>=0;i--){
var pt=particles[i];
pt.x+=pt.vx*dt;pt.y+=pt.vy*dt;
pt.vx*=Math.pow(.3,dt);pt.vy*=Math.pow(.3,dt);
pt.life-=pt.decay;
if(pt.life<=0)particles.splice(i,1);
}

// powerup age
for(var i=0;i<powerups.length;i++){powerups[i].age+=dt;powerups[i].bob+=dt*3;}

// shake
if(shakeAmt>0){shakeAmt*=Math.pow(.01,dt);}
if(shakeAmt<.2)shakeAmt=0;

// HUD
hudTime.textContent=Math.ceil(timer);
hudArena.textContent=Math.round(arenaR/ARENA_R_START*100)+'%';
hudAlive.textContent=players.filter(function(p){return p.alive}).length;
}

function draw(){
ctx.clearRect(0,0,W,H);

// shake offset
var sx=0,sy=0;
if(shakeAmt>0){sx=(Math.random()-.5)*shakeAmt*2;sy=(Math.random()-.5)*shakeAmt*2;}

ctx.save();
ctx.translate(sx,sy);

// stars
for(var i=0;i<stars.length;i++){
var s=stars[i];
s.a+=s.sp*.016;
var bright=.3+Math.sin(s.a)*.3;
ctx.globalAlpha=bright;
ctx.fillStyle='#c0b0e0';
ctx.beginPath();ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2);ctx.fill();
}
ctx.globalAlpha=1;

// arena
// outer glow
var grd=ctx.createRadialGradient(cx,cy,arenaR*.7,cx,cy,arenaR+30);
grd.addColorStop(0,'rgba(167,111,195,.0)');
grd.addColorStop(.8,'rgba(167,111,195,.08)');
grd.addColorStop(1,'rgba(167,111,195,0)');
ctx.fillStyle=grd;
ctx.fillRect(0,0,W,H);

// arena circle
ctx.save();
ctx.beginPath();ctx.arc(cx,cy,arenaR,0,Math.PI*2);
var ag=ctx.createRadialGradient(cx,cy,0,cx,cy,arenaR);
ag.addColorStop(0,'#0f0a1e');
ag.addColorStop(.85,'#0f0a1e');
ag.addColorStop(1,'#1a1230');
ctx.fillStyle=ag;
ctx.fill();

// grid lines
ctx.strokeStyle='rgba(160,144,192,.08)';
ctx.lineWidth=1;
var gs=40;
for(var gx=-arenaR;gx<=arenaR;gx+=gs){
ctx.beginPath();ctx.moveTo(cx+gx,cy-arenaR);ctx.lineTo(cx+gx,cy+arenaR);ctx.stroke();
}
for(var gy=-arenaR;gy<=arenaR;gy+=gs){
ctx.beginPath();ctx.moveTo(cx-arenaR,cy+gy);ctx.lineTo(cx+arenaR,cy+gy);ctx.stroke();
}

// arena edge
ctx.beginPath();ctx.arc(cx,cy,arenaR,0,Math.PI*2);
var edgeAlpha=shrinkFlash>0?(.2+shrinkFlash*.5):.15;
ctx.strokeStyle='rgba(167,111,195,'+edgeAlpha+')';
ctx.lineWidth=3;ctx.stroke();

// danger zone ring
if(arenaR<ARENA_R_START*.6){
ctx.beginPath();ctx.arc(cx,cy,arenaR,0,Math.PI*2);
ctx.strokeStyle='rgba(255,80,80,'+(0.1+Math.sin(Date.now()*.006)*.08)+')';
ctx.lineWidth=6;ctx.stroke();
}
ctx.restore();

// powerups
for(var i=0;i<powerups.length;i++){
var pw=powerups[i];
var by=Math.sin(pw.bob)*4;
// halo
ctx.beginPath();ctx.arc(pw.x,pw.y+by,18,0,Math.PI*2);
ctx.fillStyle=pw.color.replace(')',',0.15)').replace('rgb','rgba');
var pha=pw.color+'33';
ctx.shadowColor=pw.color;ctx.shadowBlur=16;
ctx.fill();ctx.shadowBlur=0;
// emoji
ctx.font='20px serif';ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText(pw.emoji,pw.x,pw.y+by);
}

// players
var t=Date.now()*.001;
for(var i=0;i<players.length;i++){
var p=players[i];
if(!p.alive)continue;

// shield bubble
if(p.powerup==='shield'){
ctx.beginPath();ctx.arc(p.x,p.y,PLAYER_R+10+Math.sin(t*4+i)*.8,0,Math.PI*2);
ctx.strokeStyle='rgba(94,194,255,'+(0.3+Math.sin(t*6)*.1)+')';
ctx.lineWidth=2.5;ctx.stroke();
}

// speed trail
if(p.powerup==='speed'){
for(var tr=1;tr<=3;tr++){
var ta=p.angle-tr*.12*MOVE_SPEED;
var tdx=p.x-Math.cos(ta)*tr*6,tdy=p.y-Math.sin(ta)*tr*6;
ctx.globalAlpha=.15/tr;
ctx.beginPath();ctx.arc(tdx,tdy,PLAYER_R-tr,0,Math.PI*2);
ctx.fillStyle=p.color;ctx.fill();
}
ctx.globalAlpha=1;
}

// body
ctx.beginPath();ctx.arc(p.x,p.y,PLAYER_R+(p.slapScale>0?p.slapScale*6:0),0,Math.PI*2);
var bodyColor=p.hitFlash>0?'#ffffff':p.color;
ctx.fillStyle=bodyColor;
ctx.shadowColor=p.color;ctx.shadowBlur=p.slapScale>0?24:12;
ctx.fill();
ctx.shadowBlur=0;

// inner highlight
ctx.beginPath();ctx.arc(p.x-3,p.y-3,PLAYER_R*.5,0,Math.PI*2);
ctx.fillStyle='rgba(255,255,255,.25)';ctx.fill();

// face — direction indicator
var fd=p.angle;
var ex1=p.x+Math.cos(fd-.25)*PLAYER_R*.45;
var ey1=p.y+Math.sin(fd-.25)*PLAYER_R*.45;
var ex2=p.x+Math.cos(fd+.25)*PLAYER_R*.45;
var ey2=p.y+Math.sin(fd+.25)*PLAYER_R*.45;
ctx.fillStyle='#0a0612';
ctx.beginPath();ctx.arc(ex1,ey1,2.5,0,Math.PI*2);ctx.fill();
ctx.beginPath();ctx.arc(ex2,ey2,2.5,0,Math.PI*2);ctx.fill();

// slap ring
if(p.slapScale>0){
ctx.beginPath();ctx.arc(p.x,p.y,SLAP_RANGE*(1-p.slapScale*.3),0,Math.PI*2);
ctx.strokeStyle=p.color.slice(0,-1).replace('#','')||p.color;
var sa=p.slapScale*.5;
ctx.strokeStyle='rgba(255,255,255,'+sa+')';
ctx.lineWidth=2;ctx.setLineDash([6,6]);ctx.stroke();ctx.setLineDash([]);
}

// name
ctx.font='600 11px Fredoka,sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillStyle='rgba(255,255,255,.7)';
ctx.fillText(p.name,p.x,p.y+PLAYER_R+14);

// mega powerup glow
if(p.powerup==='mega'){
ctx.beginPath();ctx.arc(p.x,p.y,PLAYER_R+4+Math.sin(t*8)*2,0,Math.PI*2);
ctx.strokeStyle='rgba(255,94,161,'+(0.4+Math.sin(t*6)*.15)+')';
ctx.lineWidth=3;ctx.stroke();
}
}

// particles
for(var i=0;i<particles.length;i++){
var pt=particles[i];
ctx.globalAlpha=pt.life;
ctx.beginPath();ctx.arc(pt.x,pt.y,pt.r*pt.life,0,Math.PI*2);
ctx.fillStyle=pt.color;ctx.fill();
}
ctx.globalAlpha=1;

ctx.restore();
}

function loop(ts){
var dt=Math.min((ts-lastT)/1000,.05);
lastT=ts;
update(dt);
draw();
requestAnimationFrame(loop);
}
requestAnimationFrame(function(ts){lastT=ts;loop(ts)});
})();
</script>
</body>
</html>
