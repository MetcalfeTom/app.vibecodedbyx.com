    const cellH = pillH + 6 + subH;
    const margin = 12;
    // Anchor table for up to 3 bots:
    //   index 0 → top-right
    //   index 1 → bottom-left
    //   index 2 → bottom-right
    const anchors = [
      { x: cw - margin - pillW,         y: margin },
      { x: margin,                      y: ch - margin - cellH },
      { x: cw - margin - pillW,         y: ch - margin - cellH },
    ];
    for (let i = 0; i < bots.length; i++) {
      const b = bots[i];
      const sidePal = PALETTE.sides[b.side] || PALETTE.sides[2];
      const color = sidePal.neon;
      const score = (s.sideScore && s.sideScore[b.side]) || 0;
      const anchor = anchors[i] || anchors[anchors.length - 1];
      const x = anchor.x;
      const y = anchor.y;
      // counter pill
      ctx.save();
      ctx.fillStyle = 'rgba(20,10,40,0.72)';
      ctx.beginPath();
      if (ctx.roundRect) ctx.roundRect(x, y, pillW, pillH, 10);
      else                ctx.rect(x, y, pillW, pillH);
      ctx.fill();
      ctx.strokeStyle = color;
      ctx.lineWidth = 2;
      ctx.shadowColor = color;
      ctx.shadowBlur = 12;
      ctx.stroke();
      ctx.shadowBlur = 0;
      // label
      ctx.font = '11px "Silkscreen", monospace';
      ctx.fillStyle = color;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.shadowColor = color;
      ctx.shadowBlur = 8;
      const label = bots.length === 1 ? "BOT'S TILES" : ('BOT ' + (i + 1));
      ctx.fillText(label, x + pillW / 2, y + 8);
      // score
      ctx.font = '900 26px "Bungee", sans-serif';
      ctx.fillStyle = '#f7eee0';
      ctx.shadowBlur = 14;
      ctx.fillText(String(score), x + pillW / 2, y + 22);
      ctx.restore();
      drawPersonaSubpill({ x, y, w: pillW, h: pillH }, color, b.personality);
    }
  }

  // Bot personality sub-pill — width-locked to the box above it so the
  // pair reads as one stacked HUD element. Renders the current AI
  // archetype (RUSHER / HUNTER / COLLECTOR / SIEGER) with the same
  // cyan accent as the BOT'S TILES counter.
  function drawPersonaSubpill(parentBox, color, personalityKey) {
    const key = personalityKey || botPersonality;
    const personaLabel = { rusher: 'RUSHER', hunter: 'HUNTER', collector: 'COLLECTOR', sieger: 'SIEGER', arsonist: 'ARSONIST' }[key] || 'RIVAL';
    const subH = 22;
    const subX = parentBox.x;
    const subY = parentBox.y + parentBox.h + 6;
    const subW = parentBox.w;        // width-matched to parent
    ctx.save();
    ctx.fillStyle = 'rgba(20,10,40,0.72)';
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(subX, subY, subW, subH, 7);
    else                ctx.rect(subX, subY, subW, subH);
    ctx.fill();
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.shadowColor = color;
    ctx.shadowBlur = 8;
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.font = '10px "Silkscreen", monospace';
    ctx.fillStyle = color;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = color;
    ctx.shadowBlur = 6;
    ctx.fillText(personaLabel, subX + subW / 2, subY + subH / 2 + 1);
    ctx.restore();
  }

  // Bomb counter — bottom-centre clickable pill. Hit-region stored on
  // `bombHit` so onClick can route taps in this rect to dropPlayerTrap
  // without HTML button machinery. Greys out when charges hit 0.
  let bombHit = null;
  function drawBombCounter() {
    const enabled = youTrapCharges > 0 && gameActive;
    const pillW = 200, pillH = 56;
    // Bottom-centre — bot counters reclaimed the top-right corners so
    // the bomb pill anchors the bottom of the layout.
    const pillX = (cw - pillW) / 2;
    const pillY = ch - pillH - 12;
    bombHit = { x: pillX, y: pillY, w: pillW, h: pillH };
    const accent = enabled ? '#b94dff' : '#5a3677';
    ctx.save();
    ctx.fillStyle = enabled ? 'rgba(60,18,42,0.72)' : 'rgba(30,18,30,0.65)';
    ctx.beginPath();
    if (ctx.roundRect) ctx.roundRect(pillX, pillY, pillW, pillH, 12);
    else                ctx.rect(pillX, pillY, pillW, pillH);
    ctx.fill();
    ctx.strokeStyle = accent;
    ctx.lineWidth = 2;
    ctx.shadowColor = accent;
    ctx.shadowBlur = enabled ? 16 : 4;
    ctx.stroke();
    ctx.shadowBlur = 0;
    // 💣 glyph
    ctx.font = '26px serif';
    ctx.textAlign = 'left';
    ctx.textBaseline = 'middle';
    ctx.globalAlpha = enabled ? 1 : 0.5;
    ctx.fillText('💣', pillX + 14, pillY + pillH / 2);
    // label
    ctx.font = '11px "Silkscreen", monospace';
    ctx.fillStyle = accent;
    ctx.shadowColor = accent;
    ctx.shadowBlur = enabled ? 8 : 0;
    ctx.fillText('COLOR BOMB', pillX + 50, pillY + 18);
    // count
    ctx.font = '900 22px "Bungee", sans-serif';
    ctx.fillStyle = '#f7eee0';
    ctx.shadowColor = accent;
    ctx.shadowBlur = enabled ? 12 : 0;
    ctx.fillText(String(youTrapCharges), pillX + 50, pillY + 38);
    // SPACE hint
    ctx.font = '9px "Silkscreen", monospace';
    ctx.textAlign = 'right';
    ctx.fillStyle = 'rgba(247,238,224,0.55)';
    ctx.shadowBlur = 0;
    ctx.fillText('SPACE', pillX + pillW - 14, pillY + pillH / 2 - 6);
    ctx.fillText('· CLICK', pillX + pillW - 14, pillY + pillH / 2 + 8);
    ctx.restore();
  }

  // ===== TIMER + GAME LOOP =====
  // ROUND_S is recomputed by resizeArena() each round (scales with cell
  // count), so initialise from the current value after the boot-time
  // resetRound() has already chosen a size.
  let timeLeft = ROUND_S;
  let gameActive = true;
  let lastT = performance.now();
  function loop(now) {
    const dt = Math.min(0.05, (now - lastT) / 1000);
    lastT = now;
    if (gameActive) {
      tickPiece(you, dt);
      for (const b of bots) tickPiece(b, dt);
      botThink(dt);
      tickPowerups(dt);
      tickBombFuses(dt);
      timeLeft -= dt;
      if (timeLeft <= 0) {
        timeLeft = 0;
        endGame();
      }
    }
    // HUD
    const s = tally();
    // Early end: every tile claimed → no point waiting out the timer.
    // End the round early only once every tile is fully LOCKED — light
    // claims still count as up-for-grabs, so a contested floor plays out.
    if (gameActive && s.unlocked === 0) endGame();
    document.getElementById('scoreYou').textContent = s.you;
    document.getElementById('scoreBot').textContent = s.bot;
    document.getElementById('timer').textContent = Math.ceil(timeLeft);
    render();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // ===== END =====
  function endGame() {
    gameActive = false;
    const s = tally();
    const personalityLabels = { rusher: 'RUSHER', hunter: 'HUNTER', collector: 'COLLECTOR', sieger: 'SIEGER', arsonist: 'ARSONIST' };

    // Per chat: render one row per side ranked highest → lowest. Player
    // is always present; each bot gets its own row with personality.
    const rows = [{ side: 1, label: 'YOU',     score: s.you, persona: '',
                    accentClass: 'you' }];
    for (const b of bots) {
      const sc = (s.sideScore && s.sideScore[b.side]) || 0;
      rows.push({
        side: b.side,
        label: bots.length === 1 ? 'RIVAL' : ('BOT ' + (b.side - 1)),
        score: sc,
        persona: personalityLabels[b.personality] || 'BOT',
        accentClass: 'bot',
      });
    }
    rows.sort((a, b) => b.score - a.score);
    const host = document.getElementById('finalRows');
    if (host) {
      host.innerHTML = '';
      rows.forEach((r, i) => {
        const trophy = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : '';
        const row = document.createElement('div');
        row.className = 'sb-row ' + r.accentClass;
        row.innerHTML = `
          <span style="display:block;font-size:9px;letter-spacing:0.22em;opacity:0.55;margin-bottom:2px">#${i + 1} ${trophy}</span>
          ${r.label}
          <span class="v">${r.score}</span>
          ${r.persona ? `<span class="persona">${r.persona}</span>` : ''}
        `;
        host.appendChild(row);
      });
    }

    // Win/lose/tie verdict computed against the highest-scoring bot
    // rather than the sum, so a player who edges out the leader still
    // wins even if the COMBINED bot score is higher.
    const topBot = rows.find(r => r.accentClass === 'bot');
    const myScore = s.you;
    const topBotScore = topBot ? topBot.score : 0;
    const card  = document.getElementById('overCard');
    const title = document.getElementById('overTitle');
    let cls, txt;
    if (myScore > topBotScore)      { cls = 'win';  txt = 'YOU WIN'; }
    else if (myScore < topBotScore) { cls = 'lose'; txt = bots.length > 1
                                                       ? `${topBot.persona} WINS`
                                                       : 'RIVAL WINS'; }
    else                            { cls = 'tie';  txt = 'DEAD HEAT'; }
    card.classList.remove('win','lose','tie'); card.classList.add(cls);
    title.classList.remove('win','lose','tie'); title.classList.add(cls);
    title.textContent = txt;
    document.getElementById('over').classList.add('show');
    sfxEnd();
  }

  // ===== MATCH SETUP MENU =====
  // Highlight the persisted choice on each option group, wire clicks
  // to update gameSettings (+localStorage), and the START button to
  // close the menu and kick off the first round.
  function refreshMenuSelection() {
    document.querySelectorAll('.setting-options[data-group="bots"] .opt').forEach(b => {
      b.classList.toggle('on', String(gameSettings.bots) === b.dataset.value);
    });
    document.querySelectorAll('.setting-options[data-group="size"] .opt').forEach(b => {
      b.classList.toggle('on', gameSettings.size === b.dataset.value);
    });
  }
  document.querySelectorAll('.setting-options[data-group="bots"] .opt').forEach(b => {
    b.addEventListener('click', () => {
      gameSettings.bots = parseInt(b.dataset.value, 10);
      saveSettings();
      refreshMenuSelection();
    });
  });
  document.querySelectorAll('.setting-options[data-group="size"] .opt').forEach(b => {
    b.addEventListener('click', () => {
      gameSettings.size = b.dataset.value;
      saveSettings();
      refreshMenuSelection();
    });
  });
  refreshMenuSelection();

  function startMatch() {
    document.getElementById('menu').classList.remove('show');
    document.getElementById('over').classList.remove('show');
    resetRound();
    timeLeft = ROUND_S;
    gameActive = true;
  }
  document.getElementById('startBtn').addEventListener('click', startMatch);
  document.getElementById('restartBtn').addEventListener('click', startMatch);

  // Boot — show the menu first and keep the timer paused. The very
  // first resetRound() above already seeded a board so the canvas
  // shows something behind the menu blur.
  gameActive = false;

})();
</script>
</body>
</html>
