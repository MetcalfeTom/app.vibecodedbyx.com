<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Horrorblin</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#06080c">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%97%A1%EF%B8%8F">
<meta name="description" content="Top-down sword crawl through a derelict space station. Slice biomass, behead horrorblins dropping from the ceiling.">
<meta property="og:title" content="Horrorblin">
<meta property="og:description" content="Top-down sword crawl through a derelict space station. Slice biomass, behead horrorblins dropping from the ceiling.">
<meta property="og:url" content="https://sloppy.live/horrorblin">
<meta property="og:image" content="https://image.pollinations.ai/prompt/top-down%20pixel%20art%20space%20station%20corridor%20with%20cyan%20plasma%20sword%20hero%20and%20black%20spider%20goblin%20on%20ceiling%2C%20horror%20sci-fi%2C%20dark%20metal%20floor%2C%20red%20warning%20lights?width=1200&height=630&model=flux&seed=6666&nologo=true">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Major+Mono+Display&family=JetBrains+Mono:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#06080c;
    --void-2:#0a0d13;
    --plasma:#80f0ff;
    --plasma-2:#3ad8ff;
    --plasma-glow:rgba(128,240,255,0.5);
    --gore:#c8324f;
    --rust:#7a3e22;
    --ink:#e6e8ee;
    --silver:#9aa3b1;
    --silver-dim:#5e6776;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  html,body{height:100%;overflow:hidden;background:var(--void);color:var(--ink);font-family:'JetBrains Mono', monospace;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:none}
  body{
    background:
      radial-gradient(ellipse 60% 40% at 50% 100%, rgba(200,50,79,0.10), transparent 60%),
      radial-gradient(ellipse 50% 35% at 50% 0%, rgba(58,216,255,0.06), transparent 60%),
      var(--void);
    display:flex;flex-direction:column;align-items:center;
  }
  header{
    width:100%;text-align:center;padding:0.8rem 1rem 0.3rem;pointer-events:none;
  }
  h1{
    font-family:'Press Start 2P', monospace;
    font-size:clamp(1.1rem, 2.6vw, 1.7rem);
    letter-spacing:0.18em;color:var(--plasma);
    text-shadow:0 0 8px var(--plasma-glow), 0 0 18px rgba(200,50,79,0.4);
  }
  .tag{
    font-family:'Special Elite', monospace;font-size:clamp(0.7rem, 1.3vw, 0.85rem);
    letter-spacing:0.22em;color:var(--silver);margin-top:0.3rem;text-transform:uppercase;
  }
  main.stage{
    flex:1;display:flex;align-items:center;justify-content:center;
    width:100%;padding:0.4rem 0 5rem;
  }
  #game{
    display:block;background:var(--void);
    image-rendering:pixelated;image-rendering:crisp-edges;
    border:1px solid #232732;
    box-shadow:0 0 40px rgba(128,240,255,0.10), inset 0 0 30px rgba(0,0,0,0.5);
    max-width:calc(100vw - 12px);max-height:calc(100vh - 8.5rem);
  }
  #hud{
    position:fixed;top:3.6rem;left:0.6rem;right:0.6rem;
    display:flex;justify-content:space-between;align-items:flex-start;
    pointer-events:none;z-index:6;font-family:'Press Start 2P', monospace;font-size:0.7rem;letter-spacing:0.12em;
  }
  #hud .card{
    background:rgba(10,13,19,0.86);border:1px solid #2a3140;
    padding:0.55rem 0.8rem;border-radius:0.3rem;
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    display:flex;flex-direction:column;gap:0.3rem;
  }
  .hp-row{display:flex;gap:0.18rem;align-items:center}
  .pip{width:0.85rem;height:0.85rem;border-radius:0.18rem;background:#1a1d22;border:1px solid #353a44;box-shadow:inset 0 0 4px rgba(0,0,0,0.5)}
  .pip.full{background:linear-gradient(180deg, #ff5e6b, #b21f2f);border-color:#ff8a92;box-shadow:0 0 8px rgba(255,90,107,0.55), inset 0 0 4px rgba(255,255,255,0.2)}
  .label{font-size:0.55rem;letter-spacing:0.2em;color:var(--silver);margin-bottom:0.1rem;text-transform:uppercase}
  .val{color:var(--plasma);font-size:0.85rem}
  .toolbar{
    position:fixed;bottom:0.8rem;left:50%;transform:translateX(-50%);
    display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;justify-content:center;
    background:rgba(10,13,19,0.84);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border:1px solid #2a3140;
    padding:0.5rem 0.7rem;border-radius:0.5rem;
    font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;
    z-index:5;max-width:calc(100% - 1.2rem);
  }
  .toolbar kbd{
    background:#161a23;border:1px solid #353a44;border-radius:0.2rem;
    color:var(--ink);padding:0.25rem 0.4rem;font-family:'JetBrains Mono', monospace;font-size:0.6rem;
    min-width:1.6rem;text-align:center;display:inline-block;
  }
  .toolbar .grp{display:flex;align-items:center;gap:0.3rem}
  .toolbar .sep{width:1px;background:#2a3140;height:1rem}
  .toolbar button{
    background:transparent;color:var(--plasma);
    border:1px solid var(--plasma-2);
    font-family:inherit;font-size:0.62rem;letter-spacing:0.18em;text-transform:uppercase;
    padding:0.45rem 0.7rem;border-radius:0.25rem;cursor:pointer;min-height:2.5rem;
  }
  .toolbar button:hover{background:rgba(58,216,255,0.14)}
  .toolbar button:focus-visible{outline:3px solid var(--plasma);outline-offset:2px}

  /* Mobile virtual controls */
  #touch{
    position:fixed;inset:0;pointer-events:none;z-index:4;display:none;
  }
  #touch .pad{
    position:absolute;left:1rem;bottom:6.5rem;
    width:9rem;height:9rem;pointer-events:auto;
    background:rgba(10,13,19,0.55);border:1px solid #2a3140;border-radius:50%;
    backdrop-filter:blur(6px);
  }
  #touch .pad .stick{
    position:absolute;left:50%;top:50%;width:3rem;height:3rem;margin-left:-1.5rem;margin-top:-1.5rem;
    background:rgba(128,240,255,0.18);border:1px solid var(--plasma-2);border-radius:50%;
    box-shadow:0 0 12px rgba(128,240,255,0.25);
  }
  #touch .swing{
    position:absolute;right:1rem;bottom:7rem;width:5rem;height:5rem;
    background:rgba(128,240,255,0.18);border:1.5px solid var(--plasma);border-radius:50%;
    color:var(--plasma);font-family:'Press Start 2P', monospace;font-size:0.7rem;
    pointer-events:auto;cursor:pointer;
    box-shadow:0 0 16px rgba(128,240,255,0.35);
    display:flex;align-items:center;justify-content:center;letter-spacing:0.1em;
  }
  @media (pointer: coarse), (max-width: 720px){
    #touch{display:block}
    .toolbar{font-size:0.55rem;padding:0.4rem 0.5rem}
  }

  .game-over, .you-win{
    position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;gap:1.2rem;
    background:radial-gradient(circle at center, rgba(200,50,79,0.18), rgba(0,0,0,0.92));
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);text-align:center;padding:1.5rem;z-index:20;
  }
  .you-win{background:radial-gradient(circle at center, rgba(128,240,255,0.16), rgba(0,0,0,0.92))}
  .game-over.show, .you-win.show{display:flex}
  .game-over h2{font-family:'Press Start 2P', monospace;font-size:clamp(1.8rem, 5vw, 3rem);color:var(--gore);text-shadow:0 0 18px rgba(200,50,79,0.6);letter-spacing:0.1em}
  .you-win h2{font-family:'Press Start 2P', monospace;font-size:clamp(1.8rem, 5vw, 3rem);color:var(--plasma);text-shadow:0 0 18px var(--plasma-glow);letter-spacing:0.1em}
  .game-over p, .you-win p{font-family:'Special Elite', monospace;font-size:1rem;letter-spacing:0.18em;color:var(--silver);text-transform:uppercase}
  .game-over button, .you-win button{
    margin-top:0.6rem;background:transparent;color:var(--plasma);
    border:2px solid var(--plasma);
    font-family:'Press Start 2P', monospace;font-size:0.85rem;letter-spacing:0.18em;
    padding:0.9rem 2rem;cursor:pointer;border-radius:0.4rem;min-height:2.75rem;
    box-shadow:0 0 20px var(--plasma-glow);
  }
  .game-over button:hover, .you-win button:hover{background:rgba(128,240,255,0.14)}
  .game-over button:focus-visible, .you-win button:focus-visible{outline:3px solid var(--ink);outline-offset:3px}

  @media (prefers-reduced-motion: reduce){
    #game{box-shadow:none}
  }
</style>
</head>
<body>
  <header>
    <h1>HORRORBLIN</h1>
    <div class="tag">deck 7 · biohazard · plasma sword issued</div>
  </header>
  <main class="stage">
    <canvas id="game" width="704" height="528" role="application" aria-label="Top-down space station crawl. WASD or arrow keys to move. Space to swing your plasma sword. Slice biomass off walls. Horrorblins crawl the ceiling and drop when you get close — slice them mid-air or after they land."></canvas>
  </main>

  <div id="hud" aria-live="polite">
    <div class="card" id="hpCard">
      <div class="label">vitals</div>
      <div class="hp-row" id="hpRow"></div>
    </div>
    <div class="card" id="killsCard" style="text-align:right">
      <div class="label">cleared</div>
      <div class="val" id="cleared">0 / 0</div>
    </div>
  </div>

  <div class="toolbar" role="group" aria-label="controls">
    <span class="grp"><kbd>WASD</kbd> move</span>
    <span class="sep" aria-hidden="true"></span>
    <span class="grp"><kbd>Space</kbd> swing</span>
    <span class="sep" aria-hidden="true"></span>
    <button type="button" id="restartBtn" aria-label="Restart">↻ restart</button>
    <button type="button" id="muteBtn" aria-pressed="false" aria-label="Toggle sound">♪ on</button>
  </div>

  <div id="touch" aria-hidden="true">
    <div class="pad" id="dpad"><div class="stick" id="stick"></div></div>
    <button class="swing" id="swingBtn" type="button" aria-label="Swing plasma sword">SLICE</button>
  </div>

  <div class="game-over" id="gameOver" role="dialog" aria-modal="true" aria-hidden="true">
    <h2>FLATLINED</h2>
    <p id="goStats">deck 7 · 0 horrorblins down</p>
    <button id="goRestart" type="button">retry</button>
  </div>
  <div class="you-win" id="youWin" role="dialog" aria-modal="true" aria-hidden="true">
    <h2>DECK CLEAR</h2>
    <p id="winStats">all horrorblins down · 0s</p>
    <button id="winRestart" type="button">again</button>
  </div>

<script>
(function(){
  'use strict';

  // ── error toast ──
  function showError(msg){
    try {
      var t = document.getElementById('errToast');
      if (!t){
        t = document.createElement('div');
        t.id = 'errToast';
        t.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#3a0610;color:#ffb6c1;font-family:monospace;font-size:11px;padding:8px 12px;border-bottom:1px solid #ff2bd6;white-space:pre-wrap;max-height:30vh;overflow:auto';
        document.body.appendChild(t);
      }
      t.textContent = '⚠ ' + msg;
    } catch(_){}
  }
  window.addEventListener('error', function(ev){
    showError((ev.message || 'error') + ' @ ' + (ev.filename ? ev.filename.split('/').pop() : '?') + ':' + (ev.lineno || '?'));
  });

  var prefersReducedMotion = false;
  try { prefersReducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch(_){}

  var canvas = document.getElementById('game');
  var ctx;
  try { ctx = canvas.getContext('2d'); } catch(e){ showError('canvas init: ' + e.message); return; }
  if (!ctx){ showError('canvas 2d unavailable'); return; }
  ctx.imageSmoothingEnabled = false;

  // ── World ──
  var TILE = 32;               // logical tile size in px
  var COLS = 22, ROWS = 16;    // visible world size in tiles
  var W = COLS * TILE;         // 704
  var H = ROWS * TILE;         // 512

  canvas.width = W;
  canvas.height = H + 16;      // tiny ceiling band above

  // Tile codes
  var T_FLOOR  = 0,
      T_WALL   = 1,
      T_BIO    = 2,   // cuttable biomass
      T_WIRE   = 3,   // cuttable wire bundle (sparks)
      T_POOL   = 4,   // impassable acid pool
      T_PANEL  = 5,   // solid metal panel
      T_LIGHT  = 6,   // floor with light strip
      T_VENT   = 7,   // floor variant
      T_CONSOLE= 8;   // solid console

  // Hand-authored layout. 22 wide × 16 tall.
  // # wall  . floor  , light-strip floor  v vent  b biomass  w wires  p pool  c console
  var LAYOUT = [
    '######################',
    '#....,..#.b.....#....#',
    '#..v.,..#.b.....#.cc.#',
    '#....,..#.bbb...#.cc.#',
    '#....,..#.......#....#',
    '#....,..#####.#######',
    '#....,..............w#',
    '#....,..............w#',
    '#####,.....pppp.....w#',
    '#....,.....pppp......#',
    '#....,...............#',
    '#..b.,......##.......#',
    '#.bbb,......##....bb.#',
    '#..b.,......##....bb.#',
    '#....,...............#',
    '######################'
  ];

  // Tile data — store {type, alive, cutT (0..1 cut anim), pulse phase}
  var tiles = [];
  function buildTiles(){
    tiles = [];
    for (var y = 0; y < ROWS; y++){
      var row = [];
      for (var x = 0; x < COLS; x++){
        var ch = LAYOUT[y] ? LAYOUT[y][x] : '.';
        var t = T_FLOOR;
        if (ch === '#') t = T_WALL;
        else if (ch === ',') t = T_LIGHT;
        else if (ch === 'v') t = T_VENT;
        else if (ch === 'b') t = T_BIO;
        else if (ch === 'w') t = T_WIRE;
        else if (ch === 'p') t = T_POOL;
        else if (ch === 'c') t = T_CONSOLE;
        row.push({ type: t, alive: true, cutT: 0, pulse: Math.random() * 6.28 });
      }
      tiles.push(row);
    }
  }
  buildTiles();

  function tileAt(tx, ty){
    if (ty < 0 || ty >= ROWS || tx < 0 || tx >= COLS) return null;
    return tiles[ty][tx];
  }
  function isSolid(tx, ty){
    var t = tileAt(tx, ty);
    if (!t) return true;
    if (!t.alive) return false; // cut biomass becomes passable floor
    return t.type === T_WALL || t.type === T_PANEL || t.type === T_CONSOLE || t.type === T_BIO || t.type === T_WIRE || t.type === T_POOL;
  }
  function isCuttable(tx, ty){
    var t = tileAt(tx, ty);
    if (!t || !t.alive) return false;
    return t.type === T_BIO || t.type === T_WIRE;
  }

  // ── Player ──
  var player = {
    x: 80, y: 80, w: 16, h: 16,
    vx: 0, vy: 0,
    facing: 'down',
    hp: 6, maxHp: 6,
    state: 'idle',   // idle | walk | attack | hurt
    stateT: 0,
    walkPhase: 0,
    iframes: 0,
    speed: 105
  };

  // ── Sword swing ──
  var sword = null; // { dir, t, dur, hit:Set }
  var SWING_DUR = 0.26;

  // ── Horrorblins ──
  function makeHorrorblin(tx, ty){
    return {
      mode: 'ceiling',      // ceiling | dropping | floor | dying
      modeT: Math.random() * 2.5,
      x: tx * TILE + TILE/2,
      y: ty * TILE + TILE/2,
      vx: 0, vy: 0,
      hp: 2,
      legPhase: Math.random() * 6.28,
      // wandering offset on ceiling
      anchorX: tx * TILE + TILE/2,
      anchorY: ty * TILE + TILE/2,
      flashT: 0,
      hurtPulse: 0
    };
  }
  var blobs = [];   // horrorblins
  var TOTAL_TO_KILL = 0;
  function seedBlobs(){
    blobs = [];
    // place horrorblins on floor cells, well-distributed
    var spots = [
      [4, 2], [16, 3], [18, 7], [3, 9], [11, 12], [17, 13], [12, 2], [6, 13]
    ];
    for (var i = 0; i < spots.length; i++){
      var s = spots[i];
      var t = tileAt(s[0], s[1]);
      if (t && t.type === T_FLOOR) blobs.push(makeHorrorblin(s[0], s[1]));
    }
    TOTAL_TO_KILL = blobs.length;
  }
  seedBlobs();

  // ── Particles & FX ──
  var particles = [];   // {x,y,vx,vy,life,ttl,color,size}
  var shocks = [];      // sword swoosh arcs {x,y,dir,t,ttl}
  var floatTexts = [];  // {x,y,vy,text,color,life,ttl}

  function pushParticle(p){ particles.push(p); if (particles.length > 800) particles.splice(0, particles.length - 800); }

  // ── Audio ──
  var audioCtx = null;
  var muted = false;
  function ensureAudio(){
    if (audioCtx){ if (audioCtx.state === 'suspended') audioCtx.resume(); return audioCtx; }
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(_){ audioCtx = null; }
    return audioCtx;
  }
  function noise(dur, freq, Q, gain, t0){
    var c = ensureAudio(); if (!c || muted) return;
    var n = Math.floor(c.sampleRate * dur);
    var buf = c.createBuffer(1, n, c.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < n; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/n, 1.8);
    var s = c.createBufferSource(); s.buffer = buf;
    var bp = c.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = freq; bp.Q.value = Q;
    var g = c.createGain(); g.gain.value = gain;
    s.connect(bp).connect(g).connect(c.destination);
    s.start(t0 || c.currentTime);
  }
  function tone(type, freq, dur, gain, slideTo, t0){
    var c = ensureAudio(); if (!c || muted) return;
    var o = c.createOscillator(); o.type = type;
    var t = t0 || c.currentTime;
    o.frequency.setValueAtTime(freq, t);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20, slideTo), t + dur);
    var g = c.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(gain, t + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g).connect(c.destination);
    o.start(t); o.stop(t + dur + 0.02);
  }
  function sndSwing(){ noise(0.10, 2400, 1.2, 0.08); tone('triangle', 740, 0.10, 0.18, 280); }
  function sndCutBio(){ noise(0.16, 600, 1.4, 0.16); tone('sawtooth', 280, 0.10, 0.12, 100); }
  function sndCutWire(){ noise(0.10, 3600, 4, 0.20); tone('square', 1200, 0.05, 0.10, 200); }
  function sndHurt(){ tone('sawtooth', 220, 0.30, 0.20, 70); noise(0.18, 350, 0.7, 0.10); }
  function sndKill(){ tone('triangle', 200, 0.18, 0.22, 60); noise(0.20, 240, 0.6, 0.18); tone('square', 540, 0.08, 0.10, 320); }
  function sndDrop(){ tone('triangle', 420, 0.18, 0.10, 110); noise(0.10, 480, 1.2, 0.06); }
  function sndStep(){ noise(0.04, 320, 1.6, 0.04); }
  function sndFlatline(){ tone('square', 60, 0.9, 0.18, 30); noise(0.6, 220, 0.5, 0.10); }
  function sndWin(){ [320, 480, 640, 880].forEach(function(f, i){ tone('triangle', f, 0.30, 0.20, null, ensureAudio() && audioCtx.currentTime + i * 0.10); }); }

  // ── Input ──
  var keys = {};
  var stick = { active: false, dx: 0, dy: 0 };
  window.addEventListener('keydown', function(e){
    if (e.target && e.target.tagName === 'INPUT') return;
    keys[e.code] = true;
    if (e.code === 'Space'){
      e.preventDefault();
      doSwing();
    }
  });
  window.addEventListener('keyup', function(e){ keys[e.code] = false; });

  // ── Touch d-pad ──
  (function(){
    var pad = document.getElementById('dpad');
    var stickEl = document.getElementById('stick');
    var swingBtn = document.getElementById('swingBtn');
    var activeTouch = null;
    var center = null;
    function touchStart(e){
      var t = e.changedTouches ? e.changedTouches[0] : e;
      var r = pad.getBoundingClientRect();
      center = { x: r.left + r.width/2, y: r.top + r.height/2, r: r.width/2 };
      activeTouch = t.identifier !== undefined ? t.identifier : 'mouse';
      stick.active = true;
      updateStick(t.clientX, t.clientY);
      e.preventDefault();
    }
    function touchMove(e){
      if (!stick.active) return;
      var touch = e.changedTouches ? Array.from(e.changedTouches).find(function(c){return c.identifier === activeTouch;}) : e;
      if (!touch) return;
      updateStick(touch.clientX, touch.clientY);
      e.preventDefault();
    }
    function touchEnd(e){
      stick.active = false;
      stick.dx = 0; stick.dy = 0;
      stickEl.style.transform = '';
      e.preventDefault();
    }
    function updateStick(cx, cy){
      var dx = cx - center.x, dy = cy - center.y;
      var d = Math.hypot(dx, dy);
      var max = center.r - 18;
      if (d > max){ dx = dx/d * max; dy = dy/d * max; }
      stick.dx = dx / max; stick.dy = dy / max;
      stickEl.style.transform = 'translate(' + dx + 'px,' + dy + 'px)';
    }
    pad.addEventListener('touchstart', touchStart);
    pad.addEventListener('touchmove', touchMove);
    pad.addEventListener('touchend', touchEnd);
    pad.addEventListener('touchcancel', touchEnd);
    swingBtn.addEventListener('pointerdown', function(e){ e.preventDefault(); doSwing(); });
  })();

  // ── Player movement ──
  function aabbCollidesTiles(nx, ny){
    var l = nx - player.w/2, r = nx + player.w/2;
    var t = ny - player.h/2, b = ny + player.h/2;
    var tl = Math.floor(l / TILE), tr = Math.floor((r - 0.01) / TILE);
    var tt = Math.floor(t / TILE), tb = Math.floor((b - 0.01) / TILE);
    for (var ty = tt; ty <= tb; ty++){
      for (var tx = tl; tx <= tr; tx++){
        if (isSolid(tx, ty)) return true;
      }
    }
    return false;
  }
  function tryMove(dx, dy){
    var nx = player.x + dx;
    if (!aabbCollidesTiles(nx, player.y)) player.x = nx;
    else player.vx = 0;
    var ny = player.y + dy;
    if (!aabbCollidesTiles(player.x, ny)) player.y = ny;
    else player.vy = 0;
  }

  function updatePlayer(dt){
    if (player.state === 'dead') return;
    // Input → vector
    var ix = 0, iy = 0;
    if (keys['KeyW'] || keys['ArrowUp'])    iy -= 1;
    if (keys['KeyS'] || keys['ArrowDown'])  iy += 1;
    if (keys['KeyA'] || keys['ArrowLeft'])  ix -= 1;
    if (keys['KeyD'] || keys['ArrowRight']) ix += 1;
    if (stick.active && (Math.abs(stick.dx) > 0.18 || Math.abs(stick.dy) > 0.18)){
      ix = stick.dx; iy = stick.dy;
    }
    var m = Math.hypot(ix, iy);
    if (m > 1){ ix /= m; iy /= m; }

    if (player.state !== 'attack'){
      if (Math.abs(ix) > Math.abs(iy)){
        if (ix < -0.15) player.facing = 'left';
        else if (ix > 0.15) player.facing = 'right';
      } else {
        if (iy < -0.15) player.facing = 'up';
        else if (iy > 0.15) player.facing = 'down';
      }
    }

    var speedMul = (player.state === 'attack') ? 0.35 : 1.0;
    tryMove(ix * player.speed * dt * speedMul, iy * player.speed * dt * speedMul);

    if (Math.abs(ix) + Math.abs(iy) > 0.1 && player.state !== 'attack'){
      player.state = 'walk';
      player.walkPhase += dt * 8;
      if (Math.floor(player.walkPhase * 1.5) !== Math.floor((player.walkPhase - dt * 8) * 1.5)){
        sndStep();
      }
    } else if (player.state !== 'attack'){
      player.state = 'idle';
    }

    if (player.iframes > 0) player.iframes -= dt;
  }

  function doSwing(){
    if (player.state === 'attack' || player.state === 'dead') return;
    player.state = 'attack';
    player.stateT = 0;
    sword = { dir: player.facing, t: 0, dur: SWING_DUR, hit: {} };
    sndSwing();
  }

  function swingHitbox(dir, t){
    var len = 26, wide = 22;
    var px = player.x, py = player.y;
    var rect;
    if (dir === 'right') rect = { x: px + 4, y: py - wide/2, w: len, h: wide };
    else if (dir === 'left') rect = { x: px - 4 - len, y: py - wide/2, w: len, h: wide };
    else if (dir === 'down') rect = { x: px - wide/2, y: py + 4, w: wide, h: len };
    else rect = { x: px - wide/2, y: py - 4 - len, w: wide, h: len };
    return rect;
  }
  function rectIntersect(r, x, y, w, h){
    return !(r.x + r.w < x || r.x > x + w || r.y + r.h < y || r.y > y + h);
  }
  function rectContainsPoint(r, x, y){
    return x >= r.x && x <= r.x + r.w && y >= r.y && y <= r.y + r.h;
  }

  function updateSword(dt){
    if (player.state === 'attack'){
      player.stateT += dt;
      if (player.stateT >= SWING_DUR){
        player.state = 'idle';
        sword = null;
        return;
      }
      sword.t = player.stateT;

      // The hitbox is "armed" briefly in the middle of the swing
      var t = sword.t / SWING_DUR;
      if (t < 0.12 || t > 0.85) return;
      var hb = swingHitbox(sword.dir, t);

      // Cut tiles inside hitbox
      var tl = Math.floor(hb.x / TILE), tr = Math.floor((hb.x + hb.w) / TILE);
      var tt = Math.floor(hb.y / TILE), tb = Math.floor((hb.y + hb.h) / TILE);
      for (var ty = tt; ty <= tb; ty++){
        for (var tx = tl; tx <= tr; tx++){
          if (isCuttable(tx, ty)){
            var key = tx + ',' + ty;
            if (sword.hit[key]) continue;
            sword.hit[key] = true;
            cutTile(tx, ty);
          }
        }
      }

      // Hit blobs in hitbox (excluding ceiling ones unless they're directly above)
      for (var i = 0; i < blobs.length; i++){
        var b = blobs[i];
        var bkey = 'b' + i;
        if (sword.hit[bkey]) continue;
        if (b.mode === 'dying') continue;
        // ceiling blobs are above the floor — sword on floor can't reach them mid-ceiling
        // dropping = midair, sliceable
        // floor = sliceable
        if (b.mode === 'ceiling') continue;
        var bx = b.x, by = b.y;
        if (rectContainsPoint(hb, bx, by) || rectIntersect(hb, bx - 10, by - 10, 20, 20)){
          sword.hit[bkey] = true;
          damageBlob(b, 1);
        }
      }

      // Add a swoosh trail particle
      if (Math.random() < 0.7){
        var cx2 = (hb.x + hb.w/2), cy2 = (hb.y + hb.h/2);
        pushParticle({ x: cx2, y: cy2, vx: 0, vy: 0, life: 0, ttl: 0.25, color: '#a6f6ff', size: 3 });
      }
    }
  }

  function cutTile(tx, ty){
    var t = tileAt(tx, ty);
    if (!t || !t.alive) return;
    t.alive = false;
    t.cutT = 0;
    var cx = tx * TILE + TILE/2;
    var cy = ty * TILE + TILE/2;
    if (t.type === T_BIO){
      sndCutBio();
      for (var i = 0; i < 14; i++){
        var ang = Math.random() * Math.PI * 2;
        var sp = 50 + Math.random() * 110;
        pushParticle({
          x: cx + (Math.random()-0.5)*8, y: cy + (Math.random()-0.5)*8,
          vx: Math.cos(ang)*sp, vy: Math.sin(ang)*sp - 30,
          life: 0, ttl: 0.55 + Math.random()*0.4,
          color: Math.random() < 0.5 ? '#5a8a2a' : '#7baa3f',
          size: 1 + Math.random()*2
        });
      }
      // 18% chance heart drop
      if (Math.random() < 0.18){
        pickups.push({ kind: 'heart', x: cx, y: cy, life: 0, vy: -40 });
      }
    } else if (t.type === T_WIRE){
      sndCutWire();
      for (var j = 0; j < 18; j++){
        var ang2 = Math.random() * Math.PI * 2;
        var sp2 = 80 + Math.random() * 220;
        pushParticle({
          x: cx, y: cy,
          vx: Math.cos(ang2)*sp2, vy: Math.sin(ang2)*sp2,
          life: 0, ttl: 0.22 + Math.random()*0.18,
          color: Math.random() < 0.5 ? '#ffe04a' : '#fff',
          size: 1 + Math.random()*1.5
        });
      }
    }
  }

  var pickups = []; // {kind, x, y, life, vy}
  function updatePickups(dt){
    for (var i = pickups.length - 1; i >= 0; i--){
      var p = pickups[i];
      p.life += dt;
      p.vy = p.vy * Math.pow(0.92, dt*60) + 220 * dt; // settle
      p.y += p.vy * dt;
      // Pick up if near player
      var dx = p.x - player.x, dy = p.y - player.y;
      if (dx*dx + dy*dy < 18*18){
        if (p.kind === 'heart'){
          player.hp = Math.min(player.maxHp, player.hp + 2);
          floatTexts.push({ x: player.x, y: player.y - 16, vy: -22, text: '+2', color: '#ff6b78', life: 0, ttl: 0.9 });
          tone('triangle', 660, 0.10, 0.18); tone('triangle', 880, 0.12, 0.18, null, ensureAudio() && audioCtx.currentTime + 0.06);
        }
        pickups.splice(i, 1);
        continue;
      }
      if (p.life > 14) pickups.splice(i, 1);
    }
  }

  // ── Horrorblin behavior ──
  function damageBlob(b, dmg){
    b.hp -= dmg;
    b.flashT = 0.18;
    b.hurtPulse = 1;
    // knockback away from player
    var dx = b.x - player.x, dy = b.y - player.y;
    var d = Math.hypot(dx, dy) || 1;
    b.vx += (dx/d) * 160;
    b.vy += (dy/d) * 160;
    // blood
    for (var i = 0; i < 8; i++){
      var ang = Math.random() * Math.PI * 2;
      var sp = 40 + Math.random() * 120;
      pushParticle({
        x: b.x, y: b.y,
        vx: Math.cos(ang)*sp, vy: Math.sin(ang)*sp - 20,
        life: 0, ttl: 0.4 + Math.random()*0.3,
        color: '#8b1530', size: 1 + Math.random()*2
      });
    }
    if (b.hp <= 0){
      killBlob(b);
    } else {
      sndHurt();
    }
  }
  function killBlob(b){
    b.mode = 'dying';
    b.modeT = 0;
    sndKill();
    floatTexts.push({ x: b.x, y: b.y - 14, vy: -24, text: '+1', color: '#80f0ff', life: 0, ttl: 0.9 });
    // ichor burst
    for (var i = 0; i < 24; i++){
      var ang = Math.random() * Math.PI * 2;
      var sp = 60 + Math.random() * 220;
      pushParticle({
        x: b.x, y: b.y,
        vx: Math.cos(ang)*sp, vy: Math.sin(ang)*sp - 60,
        life: 0, ttl: 0.5 + Math.random()*0.5,
        color: Math.random() < 0.6 ? '#5a0e22' : '#a82240', size: 1.5 + Math.random()*2.5
      });
    }
  }

  function updateBlobs(dt){
    for (var i = blobs.length - 1; i >= 0; i--){
      var b = blobs[i];
      b.modeT += dt;
      b.legPhase += dt * 6;
      b.flashT = Math.max(0, b.flashT - dt);
      b.hurtPulse *= Math.pow(0.86, dt*60);

      if (b.mode === 'dying'){
        if (b.modeT > 0.5){ blobs.splice(i, 1); continue; }
        continue;
      }

      var pdx = player.x - b.x;
      var pdy = player.y - b.y;
      var pd = Math.hypot(pdx, pdy);

      if (b.mode === 'ceiling'){
        // wander a little around anchor
        b.x = b.anchorX + Math.sin(b.modeT * 0.8 + b.legPhase*0.3) * 16;
        b.y = b.anchorY + Math.cos(b.modeT * 0.7) * 10;
        // Drop if player within ~110 px
        if (pd < 110 || player.state === 'attack' && pd < 160){
          b.mode = 'dropping';
          b.modeT = 0;
          b.vx = 0; b.vy = 60;
          sndDrop();
        }
      } else if (b.mode === 'dropping'){
        // animate falling — y stays, but visual "ceilingZ" goes from -16 to 0
        b.vy += 380 * dt;
        b.y += 0; // floor pos already
        // simulate "dropping" via modeT timing
        if (b.modeT > 0.45){
          b.mode = 'floor';
          b.modeT = 0;
          b.vx = (Math.random()-0.5) * 40;
          b.vy = 0;
        }
      } else if (b.mode === 'floor'){
        // Chase player when within 200px, otherwise idle
        if (pd < 240){
          var nx = pdx / (pd || 1), ny = pdy / (pd || 1);
          var sp = 78 + Math.random() * 14;
          b.vx += nx * sp * dt * 4;
          b.vy += ny * sp * dt * 4;
        }
        b.vx *= Math.pow(0.86, dt*60);
        b.vy *= Math.pow(0.86, dt*60);

        // Soft movement with floor-tile collision (don't go into walls/pools)
        var nx2 = b.x + b.vx * dt;
        var ny2 = b.y + b.vy * dt;
        var tx = Math.floor(nx2 / TILE), ty = Math.floor(ny2 / TILE);
        if (!isSolid(tx, Math.floor(b.y / TILE))) b.x = nx2; else b.vx *= -0.4;
        if (!isSolid(Math.floor(b.x / TILE), ty)) b.y = ny2; else b.vy *= -0.4;

        // Damage player on contact
        if (pd < 14 && player.iframes <= 0){
          hurtPlayer(1);
          // shove blob back
          b.vx = -pdx / pd * 200;
          b.vy = -pdy / pd * 200;
        }
      }
    }
  }

  function hurtPlayer(dmg){
    if (player.iframes > 0) return;
    player.hp -= dmg;
    player.iframes = 0.9;
    sndHurt();
    floatTexts.push({ x: player.x, y: player.y - 14, vy: -22, text: '-' + dmg, color: '#ff5a6b', life: 0, ttl: 0.9 });
    if (player.hp <= 0){
      player.hp = 0;
      player.state = 'dead';
      sndFlatline();
      setTimeout(function(){
        var go = document.getElementById('gameOver');
        document.getElementById('goStats').textContent = 'deck 7 · ' + (TOTAL_TO_KILL - blobs.filter(function(b){return b.mode !== 'dying';}).length) + ' horrorblins down';
        go.classList.add('show');
        go.setAttribute('aria-hidden', 'false');
        document.getElementById('goRestart').focus();
      }, 400);
    }
  }

  // ── HUD ──
  var hpRow = document.getElementById('hpRow');
  var clearedEl = document.getElementById('cleared');
  function renderHUD(){
    if (hpRow.childElementCount !== player.maxHp){
      hpRow.innerHTML = '';
      for (var i = 0; i < player.maxHp; i++){
        var d = document.createElement('div');
        d.className = 'pip';
        hpRow.appendChild(d);
      }
    }
    for (var j = 0; j < player.maxHp; j++){
      var pip = hpRow.children[j];
      if (j < player.hp) pip.classList.add('full'); else pip.classList.remove('full');
    }
    var killed = TOTAL_TO_KILL - blobs.filter(function(b){return b.mode !== 'dying';}).length;
    clearedEl.textContent = killed + ' / ' + TOTAL_TO_KILL;
  }

  // ── Render ──
  var startT = performance.now();

  function drawTile(tx, ty){
    var t = tileAt(tx, ty);
    var x = tx * TILE, y = ty * TILE;
    if (!t) return;
    // Floor base for nearly everything
    ctx.fillStyle = '#181c24';
    ctx.fillRect(x, y, TILE, TILE);
    // subtle grid
    ctx.fillStyle = 'rgba(255,255,255,0.025)';
    ctx.fillRect(x, y, TILE, 1);
    ctx.fillRect(x, y, 1, TILE);

    switch (t.type){
      case T_FLOOR: {
        // small bolts
        ctx.fillStyle = '#222731';
        ctx.fillRect(x + 4, y + 4, 2, 2);
        ctx.fillRect(x + TILE - 6, y + 4, 2, 2);
        ctx.fillRect(x + 4, y + TILE - 6, 2, 2);
        ctx.fillRect(x + TILE - 6, y + TILE - 6, 2, 2);
        break;
      }
      case T_LIGHT: {
        // glowing cyan strip down the middle
        var pulse = 0.7 + Math.sin((performance.now() - startT) * 0.004 + t.pulse) * 0.3;
        ctx.fillStyle = 'rgba(58,216,255,' + (0.18 * pulse) + ')';
        ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = '#3ad8ff';
        ctx.fillRect(x + TILE/2 - 2, y, 4, TILE);
        ctx.fillStyle = 'rgba(128,240,255,' + pulse + ')';
        ctx.fillRect(x + TILE/2 - 1, y, 2, TILE);
        break;
      }
      case T_VENT: {
        ctx.fillStyle = '#1a1d24';
        ctx.fillRect(x + 5, y + 5, TILE - 10, TILE - 10);
        ctx.fillStyle = '#2a2f3a';
        for (var i = 0; i < 4; i++) ctx.fillRect(x + 6, y + 7 + i*5, TILE - 12, 2);
        break;
      }
      case T_WALL: {
        // dark metal panel with rivets
        ctx.fillStyle = '#101218';
        ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = '#1d2129';
        ctx.fillRect(x + 1, y + 1, TILE - 2, TILE - 2);
        ctx.fillStyle = '#0a0c12';
        ctx.fillRect(x + 1, y + TILE - 6, TILE - 2, 5);
        ctx.fillStyle = '#3a3f4a';
        ctx.fillRect(x + 3, y + 3, 2, 2);
        ctx.fillRect(x + TILE - 5, y + 3, 2, 2);
        ctx.fillRect(x + 3, y + TILE - 9, 2, 2);
        ctx.fillRect(x + TILE - 5, y + TILE - 9, 2, 2);
        break;
      }
      case T_POOL: {
        var pp = 0.6 + Math.sin((performance.now() - startT) * 0.003 + t.pulse) * 0.4;
        ctx.fillStyle = '#0c1810';
        ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = 'rgba(60,180,80,' + (0.35 + pp * 0.15) + ')';
        ctx.fillRect(x + 2, y + 2, TILE - 4, TILE - 4);
        ctx.fillStyle = 'rgba(140,255,160,' + (0.5 * pp) + ')';
        ctx.fillRect(x + TILE/2 - 4, y + TILE/2 - 2, 8, 1);
        ctx.fillRect(x + 6, y + TILE/2 + 4, 4, 1);
        break;
      }
      case T_CONSOLE: {
        ctx.fillStyle = '#15181f';
        ctx.fillRect(x, y, TILE, TILE);
        ctx.fillStyle = '#1f2530';
        ctx.fillRect(x + 2, y + 2, TILE - 4, TILE - 4);
        // screen
        ctx.fillStyle = '#0f1820';
        ctx.fillRect(x + 5, y + 5, TILE - 10, TILE - 16);
        var sp = 0.7 + Math.sin((performance.now() - startT) * 0.006 + t.pulse) * 0.3;
        ctx.fillStyle = 'hsl(' + ((performance.now() * 0.01 + tx * 30 + ty * 12) % 360) + ',80%,' + (40 + sp * 25) + '%)';
        ctx.fillRect(x + 8, y + 7, 4, 2);
        ctx.fillRect(x + 14, y + 7, 8, 2);
        ctx.fillRect(x + 8, y + 11, 14, 2);
        ctx.fillRect(x + 8, y + 15, 6, 2);
        // base
        ctx.fillStyle = '#262c38';
        ctx.fillRect(x + 4, y + TILE - 9, TILE - 8, 6);
        break;
      }
      case T_BIO: {
        if (!t.alive){
          // residue floor
          ctx.fillStyle = '#1a1c1f';
          ctx.fillRect(x + 4, y + 4, TILE - 8, TILE - 8);
          ctx.fillStyle = '#2a3a18';
          ctx.fillRect(x + 6, y + 8, 2, 2);
          ctx.fillRect(x + 16, y + 18, 3, 2);
          ctx.fillRect(x + 22, y + 10, 2, 1);
          break;
        }
        // pulsating sickly biomass
        var bp = 0.7 + Math.sin((performance.now() - startT) * 0.005 + t.pulse) * 0.3;
        ctx.fillStyle = '#1a1c10';
        ctx.fillRect(x + 2, y + 2, TILE - 4, TILE - 4);
        ctx.fillStyle = '#3a5a18';
        ctx.beginPath(); ctx.arc(x + TILE/2, y + TILE/2, 11, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = '#5a8a2a';
        ctx.beginPath(); ctx.arc(x + 10, y + 10, 5, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(x + 22, y + 12, 4, 0, Math.PI*2); ctx.fill();
        ctx.beginPath(); ctx.arc(x + 14, y + 22, 5, 0, Math.PI*2); ctx.fill();
        // glowing veins
        ctx.fillStyle = 'rgba(160,255,90,' + (0.4 * bp) + ')';
        ctx.fillRect(x + TILE/2 - 1, y + 7, 2, 18);
        ctx.fillRect(x + 8, y + TILE/2 - 1, 16, 2);
        // bulbs
        ctx.fillStyle = 'rgba(220,255,140,' + bp + ')';
        ctx.fillRect(x + TILE/2 - 2, y + TILE/2 - 2, 4, 4);
        break;
      }
      case T_WIRE: {
        if (!t.alive){
          ctx.fillStyle = '#202126';
          ctx.fillRect(x + 4, y + 4, TILE - 8, TILE - 8);
          ctx.fillStyle = '#3a2a14';
          ctx.fillRect(x + 8, y + 14, 16, 2);
          break;
        }
        ctx.fillStyle = '#1a1d22';
        ctx.fillRect(x, y, TILE, TILE);
        // wires in 3 colors
        ctx.lineWidth = 3;
        ctx.strokeStyle = '#d04a3e';
        ctx.beginPath(); ctx.moveTo(x, y + 8); ctx.lineTo(x + TILE, y + 10); ctx.stroke();
        ctx.strokeStyle = '#e5c044';
        ctx.beginPath(); ctx.moveTo(x, y + 18); ctx.lineTo(x + TILE, y + 16); ctx.stroke();
        ctx.strokeStyle = '#3a90ff';
        ctx.beginPath(); ctx.moveTo(x, y + 26); ctx.lineTo(x + TILE, y + 24); ctx.stroke();
        // sparks?
        var wp = Math.sin((performance.now() - startT) * 0.02 + t.pulse);
        if (wp > 0.92){
          ctx.fillStyle = '#fff';
          ctx.fillRect(x + ((tx*17 + ty*9) % (TILE - 4)) + 2, y + 12 + (Math.floor(wp*100) % 8), 2, 2);
        }
        break;
      }
    }
  }

  function drawPlayer(){
    var px = Math.floor(player.x), py = Math.floor(player.y);
    var blink = (player.iframes > 0 && Math.floor(player.iframes * 16) % 2 === 0);
    if (blink) return;

    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.beginPath(); ctx.ellipse(px, py + 10, 9, 3, 0, 0, Math.PI*2); ctx.fill();

    // Legs (animate when walking)
    var legAlt = (player.state === 'walk') ? (Math.floor(player.walkPhase * 1.5) % 2) : 0;
    ctx.fillStyle = '#23262e';
    if (player.facing === 'left' || player.facing === 'right'){
      // side legs
      ctx.fillRect(px - 4, py + 4, 3, 5);
      ctx.fillRect(px + 1, py + 4 - legAlt, 3, 5 + legAlt);
    } else {
      var ox1 = legAlt === 0 ? 0 : 1;
      var ox2 = legAlt === 0 ? 0 : -1;
      ctx.fillRect(px - 5 + ox1, py + 4, 3, 6 - legAlt);
      ctx.fillRect(px + 2 + ox2, py + 4, 3, 6 - legAlt);
    }

    // Torso (light armor, slate-grey)
    ctx.fillStyle = '#2c333f';
    ctx.fillRect(px - 7, py - 4, 14, 9);
    ctx.fillStyle = '#3a4150';
    ctx.fillRect(px - 6, py - 3, 12, 4);
    // chest pack
    ctx.fillStyle = '#1c2028';
    ctx.fillRect(px - 4, py, 8, 4);
    // shoulder plates
    ctx.fillStyle = '#4d566a';
    ctx.fillRect(px - 7, py - 4, 14, 2);

    // Head (helmet with cyan visor)
    ctx.fillStyle = '#1c2028';
    ctx.fillRect(px - 5, py - 11, 10, 7);
    ctx.fillStyle = '#2c333f';
    ctx.fillRect(px - 4, py - 11, 8, 4);
    // visor
    if (player.facing === 'down'){
      ctx.fillStyle = '#80f0ff';
      ctx.fillRect(px - 3, py - 8, 6, 2);
      ctx.fillStyle = '#fff';
      ctx.fillRect(px - 2, py - 8, 1, 1);
    } else if (player.facing === 'up'){
      // back of head: no visor visible, just helmet ridge
      ctx.fillStyle = '#3a4150';
      ctx.fillRect(px - 4, py - 10, 8, 1);
    } else if (player.facing === 'left'){
      ctx.fillStyle = '#80f0ff';
      ctx.fillRect(px - 5, py - 8, 4, 2);
      ctx.fillStyle = '#fff';
      ctx.fillRect(px - 5, py - 8, 1, 1);
    } else {
      ctx.fillStyle = '#80f0ff';
      ctx.fillRect(px + 1, py - 8, 4, 2);
      ctx.fillStyle = '#fff';
      ctx.fillRect(px + 4, py - 8, 1, 1);
    }

    // Arm holding sword (when not attacking — sword sheathed glyph)
    if (player.state !== 'attack'){
      var armX, armY;
      if (player.facing === 'down'){ armX = px + 6; armY = py + 2; }
      else if (player.facing === 'up'){ armX = px - 6; armY = py + 1; }
      else if (player.facing === 'left'){ armX = px - 7; armY = py + 2; }
      else { armX = px + 7; armY = py + 2; }
      ctx.fillStyle = '#3a4150';
      ctx.fillRect(armX - 1, armY - 1, 2, 3);
      // hilt of holstered sword on hip
      ctx.fillStyle = '#80f0ff';
      ctx.fillRect(armX - 1, armY, 1, 1);
    }

    // Iframe tint
    if (player.iframes > 0){
      ctx.fillStyle = 'rgba(255,90,107,0.18)';
      ctx.fillRect(px - 8, py - 12, 16, 22);
    }
  }

  function drawSword(){
    if (!sword) return;
    var dir = sword.dir;
    var t = sword.t / sword.dur;
    // sweep angle: -π/2 → +π/2 relative to facing
    var sweep = (t - 0.5) * Math.PI * 1.1;
    var baseAngle;
    if (dir === 'right') baseAngle = 0;
    else if (dir === 'left') baseAngle = Math.PI;
    else if (dir === 'down') baseAngle = Math.PI/2;
    else baseAngle = -Math.PI/2;
    var angle = baseAngle + sweep;

    var hx = player.x;
    var hy = player.y - 2;
    var bladeLen = 22;
    var bx = hx + Math.cos(angle) * bladeLen;
    var by = hy + Math.sin(angle) * bladeLen;

    // outer glow trail
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.strokeStyle = 'rgba(58,216,255,0.35)';
    ctx.lineWidth = 12;
    ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(hx, hy); ctx.lineTo(bx, by); ctx.stroke();

    ctx.strokeStyle = 'rgba(128,240,255,0.65)';
    ctx.lineWidth = 6;
    ctx.beginPath(); ctx.moveTo(hx, hy); ctx.lineTo(bx, by); ctx.stroke();

    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(hx, hy); ctx.lineTo(bx, by); ctx.stroke();
    ctx.restore();

    // arc trail — leading swoosh
    var trailA1 = baseAngle + (t - 0.5) * Math.PI * 1.1 - 0.35;
    var trailA2 = baseAngle + (t - 0.5) * Math.PI * 1.1 - 0.05;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.strokeStyle = 'rgba(128,240,255,' + (0.55 * (1 - t)) + ')';
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.arc(hx, hy, bladeLen, trailA1, trailA2);
    ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,255,' + (0.4 * (1 - t)) + ')';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(hx, hy, bladeLen - 3, trailA1 + 0.1, trailA2);
    ctx.stroke();
    ctx.restore();

    // hilt
    ctx.fillStyle = '#1a1d22';
    ctx.fillRect(hx - 2, hy - 2, 4, 4);
  }

  function drawBlob(b){
    var bx = Math.floor(b.x), by = Math.floor(b.y);
    if (b.mode === 'ceiling'){
      // shadow below on floor
      var fx = b.x, fy = b.anchorY + 14;
      ctx.fillStyle = 'rgba(0,0,0,0.30)';
      ctx.beginPath(); ctx.ellipse(fx, fy, 6, 2.5, 0, 0, Math.PI*2); ctx.fill();
      // creature on ceiling — drawn above tile band with slight glow
      drawHorrorblinSprite(bx, by - 4, b.legPhase, true, b);
      // hint: red eye glow shining down
      var eyeGlow = 0.55 + Math.sin(b.legPhase * 0.5) * 0.25;
      ctx.fillStyle = 'rgba(255,40,60,' + eyeGlow + ')';
      ctx.beginPath(); ctx.arc(b.x - 2, b.y - 3, 1.2, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.arc(b.x + 2, b.y - 3, 1.2, 0, Math.PI*2); ctx.fill();
      return;
    }
    if (b.mode === 'dropping'){
      // streak from ceiling — fading line
      var fall = Math.min(1, b.modeT / 0.45);
      ctx.strokeStyle = 'rgba(180,40,60,' + (0.5 * (1 - fall)) + ')';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(b.x, b.y - 20 * (1 - fall));
      ctx.lineTo(b.x, b.y);
      ctx.stroke();
      drawHorrorblinSprite(bx, by, b.legPhase, false, b);
      return;
    }
    if (b.mode === 'dying'){
      var k = Math.min(1, b.modeT / 0.5);
      ctx.globalAlpha = 1 - k;
      drawHorrorblinSprite(bx, by, b.legPhase + k * 6, false, b);
      ctx.globalAlpha = 1;
      return;
    }
    // floor
    ctx.fillStyle = 'rgba(0,0,0,0.40)';
    ctx.beginPath(); ctx.ellipse(bx, by + 7, 8, 3, 0, 0, Math.PI*2); ctx.fill();
    drawHorrorblinSprite(bx, by, b.legPhase, false, b);
  }
  function drawHorrorblinSprite(x, y, legPhase, ceiling, b){
    // 8 legs as quick lines, body as dark sphere with red eyes
    var bodyR = 6;
    ctx.save();
    // flash white on hit
    if (b && b.flashT > 0){
      ctx.fillStyle = '#ffffff';
      for (var l = 0; l < 6; l++){
        var ang = l * (Math.PI / 3) + Math.sin(legPhase) * 0.4;
        var lx = x + Math.cos(ang) * 12;
        var ly = y + Math.sin(ang) * 10;
        ctx.beginPath(); ctx.arc(lx, ly, 1.5, 0, Math.PI*2); ctx.fill();
      }
      ctx.beginPath(); ctx.arc(x, y, bodyR + 1, 0, Math.PI*2); ctx.fill();
      ctx.restore();
      return;
    }

    // legs — articulated
    ctx.strokeStyle = '#0c0610';
    ctx.lineWidth = 2;
    ctx.lineCap = 'round';
    for (var li = 0; li < 6; li++){
      var ang2 = (li - 2.5) * (Math.PI / 6) + Math.sin(legPhase + li) * 0.18;
      if (li > 2) ang2 = Math.PI - ang2; // mirror to other side
      var x1 = x + Math.cos(ang2) * 4;
      var y1 = y + Math.sin(ang2) * 3;
      var x2 = x + Math.cos(ang2) * 10;
      var y2 = y + Math.sin(ang2) * 7 + Math.sin(legPhase + li * 1.2) * 1;
      var x3 = x + Math.cos(ang2) * 13;
      var y3 = y + Math.sin(ang2) * 9 + 2;
      ctx.beginPath();
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.lineTo(x3, y3);
      ctx.stroke();
    }
    // body shadow
    ctx.fillStyle = '#0c0610';
    ctx.beginPath(); ctx.arc(x, y + 1, bodyR + 1, 0, Math.PI*2); ctx.fill();
    // body
    ctx.fillStyle = ceiling ? '#1a0d18' : '#1c0e1e';
    ctx.beginPath(); ctx.arc(x, y, bodyR, 0, Math.PI*2); ctx.fill();
    // back ridge
    ctx.fillStyle = '#2a1024';
    ctx.beginPath(); ctx.arc(x - 1, y - 1, bodyR - 1, 0, Math.PI*2); ctx.fill();
    // eyes
    ctx.fillStyle = '#ff2a3a';
    ctx.beginPath(); ctx.arc(x - 2, y - 1, 1.4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(x + 2, y - 1, 1.4, 0, Math.PI*2); ctx.fill();
    // eye glints
    ctx.fillStyle = '#ffd0b0';
    ctx.fillRect(x - 2, y - 1.5, 1, 1);
    ctx.fillRect(x + 2, y - 1.5, 1, 1);
    // mandibles
    ctx.fillStyle = '#3a0610';
    ctx.fillRect(x - 1, y + 3, 1, 2);
    ctx.fillRect(x + 0, y + 3, 1, 2);

    ctx.restore();
  }

  function drawParticles(){
    for (var i = 0; i < particles.length; i++){
      var p = particles[i];
      var a = 1 - p.life / p.ttl;
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.max(0, a);
      ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    }
    ctx.globalAlpha = 1;
  }

  function updateParticles(dt){
    for (var i = particles.length - 1; i >= 0; i--){
      var p = particles[i];
      p.life += dt;
      if (p.life >= p.ttl){ particles.splice(i, 1); continue; }
      p.vy += 380 * dt;
      p.vx *= Math.pow(0.92, dt*60);
      p.x += p.vx * dt;
      p.y += p.vy * dt;
    }
  }
  function updateFloatTexts(dt){
    for (var i = floatTexts.length - 1; i >= 0; i--){
      var ft = floatTexts[i];
      ft.life += dt;
      ft.y += ft.vy * dt;
      if (ft.life >= ft.ttl) floatTexts.splice(i, 1);
    }
  }
  function drawFloatTexts(){
    ctx.font = 'bold 10px "Press Start 2P", monospace';
    ctx.textAlign = 'center';
    for (var i = 0; i < floatTexts.length; i++){
      var ft = floatTexts[i];
      var a = 1 - ft.life / ft.ttl;
      ctx.fillStyle = ft.color;
      ctx.globalAlpha = a;
      ctx.fillText(ft.text, ft.x, ft.y);
    }
    ctx.globalAlpha = 1;
  }

  function drawPickups(){
    for (var i = 0; i < pickups.length; i++){
      var p = pickups[i];
      var bob = Math.sin((performance.now() - startT) * 0.006 + i) * 1.5;
      if (p.kind === 'heart'){
        // small pixel heart
        ctx.fillStyle = '#ff5e6b';
        var hx = Math.floor(p.x), hy = Math.floor(p.y + bob);
        // 5x5 chunky heart
        ctx.fillRect(hx - 3, hy - 3, 2, 2);
        ctx.fillRect(hx + 1, hy - 3, 2, 2);
        ctx.fillRect(hx - 4, hy - 1, 8, 2);
        ctx.fillRect(hx - 3, hy + 1, 6, 1);
        ctx.fillRect(hx - 1, hy + 2, 2, 1);
        ctx.fillStyle = '#ff9aa1';
        ctx.fillRect(hx - 3, hy - 3, 1, 1);
        // glow
        ctx.fillStyle = 'rgba(255,94,107,0.18)';
        ctx.beginPath(); ctx.arc(hx, hy, 10, 0, Math.PI*2); ctx.fill();
      }
    }
  }

  function render(){
    // bg
    ctx.fillStyle = '#040508';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Tiles
    for (var y = 0; y < ROWS; y++){
      for (var x = 0; x < COLS; x++){
        drawTile(x, y);
      }
    }

    // Pickups (under entities)
    drawPickups();

    // Build sort list of entities by y
    var ents = [];
    ents.push({ y: player.y, draw: drawPlayer });
    for (var i = 0; i < blobs.length; i++){
      (function(b){
        ents.push({ y: b.mode === 'ceiling' ? -10 : b.y, draw: function(){ drawBlob(b); } });
      })(blobs[i]);
    }
    ents.sort(function(a, b){ return a.y - b.y; });
    ents.forEach(function(e){ e.draw(); });

    // Sword on top of player when attacking
    drawSword();

    // Particles + float texts on top
    drawParticles();
    drawFloatTexts();

    // Vignette
    ctx.save();
    ctx.globalCompositeOperation = 'multiply';
    var grad = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.25, W/2, H/2, Math.max(W,H)*0.7);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(1, '#202028');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H + 16);
    ctx.restore();

    // Scanlines very subtle
    ctx.fillStyle = 'rgba(255,255,255,0.02)';
    for (var sl = 0; sl < canvas.height; sl += 3) ctx.fillRect(0, sl, canvas.width, 1);
  }

  // ── Main loop ──
  var lastT = performance.now();
  function frame(now){
    var dt = Math.min(0.05, (now - lastT) / 1000);
    lastT = now;
    if (prefersReducedMotion) dt *= 0.65;

    if (!gameOverShown){
      updatePlayer(dt);
      updateSword(dt);
      updateBlobs(dt);
      updateParticles(dt);
      updatePickups(dt);
      updateFloatTexts(dt);

      // Win condition
      var aliveBlobs = blobs.filter(function(b){ return b.mode !== 'dying'; }).length;
      if (aliveBlobs === 0 && !winShown){
        winShown = true;
        sndWin();
        var elapsed = ((performance.now() - levelStartT) / 1000).toFixed(1);
        var wn = document.getElementById('youWin');
        document.getElementById('winStats').textContent = 'all horrorblins down · ' + elapsed + 's';
        wn.classList.add('show');
        wn.setAttribute('aria-hidden', 'false');
        document.getElementById('winRestart').focus();
      }
    }

    render();
    renderHUD();
    requestAnimationFrame(frame);
  }

  var gameOverShown = false;
  var winShown = false;
  var levelStartT = performance.now();

  function reset(){
    player.x = 80; player.y = 80;
    player.vx = 0; player.vy = 0;
    player.facing = 'down';
    player.hp = player.maxHp;
    player.state = 'idle';
    player.iframes = 0;
    sword = null;
    particles = [];
    pickups = [];
    floatTexts = [];
    buildTiles();
    seedBlobs();
    gameOverShown = false;
    winShown = false;
    levelStartT = performance.now();
    document.getElementById('gameOver').classList.remove('show');
    document.getElementById('gameOver').setAttribute('aria-hidden', 'true');
    document.getElementById('youWin').classList.remove('show');
    document.getElementById('youWin').setAttribute('aria-hidden', 'true');
  }

  // Watch gameOver shown flag — we use the CSS class as truth
  Object.defineProperty(window, '__hb_go', { get: function(){ return document.getElementById('gameOver').classList.contains('show'); } });
  setInterval(function(){ gameOverShown = window.__hb_go; }, 100);

  // Restart buttons
  document.getElementById('restartBtn').addEventListener('click', reset);
  document.getElementById('goRestart').addEventListener('click', reset);
  document.getElementById('winRestart').addEventListener('click', reset);

  // Mute button
  document.getElementById('muteBtn').addEventListener('click', function(){
    muted = !muted;
    this.textContent = muted ? '♪ off' : '♪ on';
    this.setAttribute('aria-pressed', muted ? 'true' : 'false');
    if (!muted) ensureAudio();
  });

  // Resume audio on first interaction
  ['keydown', 'pointerdown'].forEach(function(ev){
    window.addEventListener(ev, function once(){ ensureAudio(); window.removeEventListener(ev, once); });
  });

  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
