<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loop Station</title>
<link rel="icon" href="https://emojicdn.elk.sh/🎹">
<meta property="og:title" content="Loop Station">
<meta property="og:description" content="Record melodies with different instruments and layer them into live loops.">
<meta property="og:url" content="https://sloppy.live/loop-station">
<meta property="og:image" content="https://sloppy.live/loop-station/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;500;700&family=JetBrains+Mono:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#111118;
  min-height:100vh;
  font-family:'DM Sans',sans-serif;
  color:#e0e0e8;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:16px 12px 32px;
  overflow-x:hidden;
}

h1{
  font-size:clamp(18px,4vw,28px);
  font-weight:300;
  letter-spacing:6px;
  text-transform:uppercase;
  color:#c084fc;
  text-shadow:0 0 20px rgba(192,132,252,0.3);
  margin:8px 0 4px;
}
#sub{font-size:11px;color:rgba(224,224,232,0.3);letter-spacing:3px;margin-bottom:16px}

/* Transport */
#transport{
  display:flex;align-items:center;gap:12px;
  margin-bottom:16px;
  flex-wrap:wrap;justify-content:center;
}
#transport button{
  background:rgba(192,132,252,0.15);
  border:1px solid rgba(192,132,252,0.3);
  color:#c084fc;
  font-family:'JetBrains Mono',monospace;
  font-size:13px;
  padding:8px 18px;
  border-radius:8px;
  cursor:pointer;
  transition:all 0.15s;
  letter-spacing:1px;
}
#transport button:hover{background:rgba(192,132,252,0.25);border-color:#c084fc}
#transport button.active{background:#c084fc;color:#111118;box-shadow:0 0 20px rgba(192,132,252,0.4)}
#transport button.rec{border-color:rgba(239,68,68,0.5);color:#ef4444}
#transport button.rec:hover{border-color:#ef4444;background:rgba(239,68,68,0.2)}
#transport button.rec.active{background:#ef4444;color:#fff;box-shadow:0 0 20px rgba(239,68,68,0.5);animation:rec-pulse 0.8s ease-in-out infinite alternate}
@keyframes rec-pulse{0%{box-shadow:0 0 20px rgba(239,68,68,0.5)}100%{box-shadow:0 0 40px rgba(239,68,68,0.8)}}

#bpm-wrap{
  display:flex;align-items:center;gap:6px;
  font-family:'JetBrains Mono',monospace;
  font-size:12px;color:rgba(224,224,232,0.5);
}
#bpm{
  width:50px;background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:4px;padding:4px 6px;
  color:#e0e0e8;font-family:'JetBrains Mono',monospace;
  font-size:12px;text-align:center;outline:none;
}

#beat-display{
  font-family:'JetBrains Mono',monospace;
  font-size:14px;
  color:rgba(224,224,232,0.4);
  letter-spacing:2px;
  min-width:100px;
  text-align:center;
}

/* Instruments */
#instruments{
  display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;justify-content:center;
}
.inst-btn{
  background:rgba(255,255,255,0.05);
  border:2px solid rgba(255,255,255,0.1);
  border-radius:8px;
  padding:8px 14px;
  cursor:pointer;
  font-family:'DM Sans',sans-serif;
  font-size:12px;
  color:#e0e0e8;
  transition:all 0.15s;
  display:flex;align-items:center;gap:6px;
}
.inst-btn:hover{border-color:rgba(255,255,255,0.3)}
.inst-btn.active{border-color:var(--c);box-shadow:0 0 12px var(--c-glow);background:var(--c-bg)}
.inst-btn .dot{width:8px;height:8px;border-radius:50%}

/* Piano keys */
#keyboard{
  display:flex;
  position:relative;
  margin-bottom:20px;
  height:120px;
}
.key{
  position:relative;
  cursor:pointer;
  border-radius:0 0 6px 6px;
  transition:background 0.05s;
  -webkit-tap-highlight-color:transparent;
}
.key.white{
  width:clamp(32px,5vw,48px);
  height:120px;
  background:linear-gradient(180deg,#e8e8ee,#d4d4da);
  border:1px solid #bbb;
  z-index:1;
}
.key.white:active,.key.white.pressed{background:linear-gradient(180deg,#d0d0d8,#c0c0c8)}
.key.black{
  width:clamp(22px,3.2vw,32px);
  height:72px;
  background:linear-gradient(180deg,#333,#1a1a1a);
  border:1px solid #111;
  margin-left:clamp(-11px,-1.6vw,-16px);
  margin-right:clamp(-11px,-1.6vw,-16px);
  z-index:2;
  border-radius:0 0 4px 4px;
}
.key.black:active,.key.black.pressed{background:linear-gradient(180deg,#444,#2a2a2a)}
.key .hint{
  position:absolute;
  bottom:6px;left:50%;transform:translateX(-50%);
  font-family:'JetBrains Mono',monospace;
  font-size:9px;
  color:rgba(0,0,0,0.25);
  pointer-events:none;
}
.key.black .hint{color:rgba(255,255,255,0.25)}

/* Tracks */
#tracks{
  width:min(96vw,700px);
  display:flex;flex-direction:column;gap:6px;
}
.track{
  display:flex;align-items:center;gap:8px;
  background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.06);
  border-radius:8px;
  padding:8px 12px;
  min-height:48px;
}
.track-color{width:6px;height:32px;border-radius:3px;flex-shrink:0}
.track-name{font-size:12px;width:60px;flex-shrink:0;font-weight:500}
.track-viz{flex:1;height:32px;border-radius:4px;background:rgba(0,0,0,0.2);overflow:hidden;position:relative}
.track-viz canvas{width:100%;height:100%}
.track-playhead{position:absolute;top:0;bottom:0;width:2px;background:#c084fc;box-shadow:0 0 6px #c084fc;z-index:2;left:0;transition:left 0.05s linear}
.track-btns{display:flex;gap:4px;flex-shrink:0}
.track-btns button{
  background:none;border:1px solid rgba(255,255,255,0.1);
  color:rgba(224,224,232,0.5);font-size:14px;
  width:28px;height:28px;border-radius:6px;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all 0.15s;
}
.track-btns button:hover{border-color:rgba(255,255,255,0.3);color:#e0e0e8}
.track-btns button.muted{color:#ef4444;border-color:rgba(239,68,68,0.3)}

/* Metronome flash */
#metro-flash{
  position:fixed;top:0;left:0;right:0;height:3px;
  background:#c084fc;opacity:0;
  transition:opacity 0.05s;
  z-index:100;
}
#metro-flash.on{opacity:1}

@media(max-width:500px){
  .key.white{height:90px}
  .key.black{height:54px}
  #keyboard{height:90px}
  .track{padding:6px 8px}
  .track-name{width:44px;font-size:10px}
}
</style>
</head>
<body>

<h1>Loop Station</h1>
<div id="sub">RECORD · LAYER · LOOP</div>

<div id="transport">
  <button id="btn-play">▶ PLAY</button>
  <button id="btn-rec" class="rec">● REC</button>
  <button id="btn-stop">■ STOP</button>
  <button id="btn-clear">✕ CLEAR</button>
  <div id="bpm-wrap">
    <span>BPM</span>
    <input type="number" id="bpm" value="120" min="40" max="240">
  </div>
  <div id="beat-display">1 . 1</div>
</div>

<div id="instruments"></div>

<div id="keyboard"></div>

<div id="tracks"></div>

<div id="metro-flash"></div>

<script>
// ===== Audio Engine =====
let audioCtx = null;
let masterGain = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.7;
  masterGain.connect(audioCtx.destination);
}
document.addEventListener('click', initAudio, { once: true });
document.addEventListener('touchstart', initAudio, { once: true });

// ===== Instruments =====
const INSTRUMENTS = [
  { name:'Synth',  color:'#c084fc', wave:'square',   attack:0.01, decay:0.15, sustain:0.6, release:0.2 },
  { name:'Piano',  color:'#60a5fa', wave:'triangle', attack:0.005,decay:0.3,  sustain:0.3, release:0.3 },
  { name:'Organ',  color:'#34d399', wave:'sine',     attack:0.02, decay:0.05, sustain:0.8, release:0.1 },
  { name:'Lead',   color:'#f472b6', wave:'sawtooth', attack:0.01, decay:0.1,  sustain:0.5, release:0.15 },
  { name:'Bass',   color:'#fb923c', wave:'triangle', attack:0.005,decay:0.2,  sustain:0.7, release:0.1, octaveShift:-1 },
  { name:'Bell',   color:'#facc15', wave:'sine',     attack:0.001,decay:0.4,  sustain:0.1, release:0.5 },
];

let currentInst = 0;

// Build instrument buttons
const instContainer = document.getElementById('instruments');
INSTRUMENTS.forEach((inst, i) => {
  const btn = document.createElement('button');
  btn.className = 'inst-btn' + (i === 0 ? ' active' : '');
  btn.style.setProperty('--c', inst.color);
  btn.style.setProperty('--c-glow', inst.color + '44');
  btn.style.setProperty('--c-bg', inst.color + '15');
  btn.innerHTML = `<span class="dot" style="background:${inst.color}"></span>${inst.name}`;
  btn.addEventListener('click', () => {
    document.querySelectorAll('.inst-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentInst = i;
  });
  instContainer.appendChild(btn);
});

// ===== Note playback =====
function playNote(freq, inst, duration = 0.3) {
  if (!audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const t = audioCtx.currentTime;
  const i = INSTRUMENTS[inst];
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();

  let f = freq;
  if (i.octaveShift) f *= Math.pow(2, i.octaveShift);

  osc.type = i.wave;
  osc.frequency.setValueAtTime(f, t);

  // ADSR envelope
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(0.25, t + i.attack);
  gain.gain.linearRampToValueAtTime(0.25 * i.sustain, t + i.attack + i.decay);
  gain.gain.setValueAtTime(0.25 * i.sustain, t + duration);
  gain.gain.linearRampToValueAtTime(0.001, t + duration + i.release);

  // Add harmonics for richness
  if (i.wave === 'sine') {
    const osc2 = audioCtx.createOscillator();
    const g2 = audioCtx.createGain();
    osc2.type = 'sine';
    osc2.frequency.setValueAtTime(f * 2, t);
    g2.gain.setValueAtTime(0.06, t);
    g2.gain.linearRampToValueAtTime(0.001, t + duration + i.release);
    osc2.connect(g2); g2.connect(masterGain);
    osc2.start(t); osc2.stop(t + duration + i.release + 0.05);
  }

  osc.connect(gain);
  gain.connect(masterGain);
  osc.start(t);
  osc.stop(t + duration + i.release + 0.05);
}

// ===== Keyboard =====
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
const BASE_OCTAVE = 4;
// Two octaves: C4-B5
const notes = [];
for (let oct = BASE_OCTAVE; oct <= BASE_OCTAVE + 1; oct++) {
  for (let n = 0; n < 12; n++) {
    notes.push({ name: NOTE_NAMES[n] + oct, freq: 440 * Math.pow(2, (n - 9 + (oct - 4) * 12) / 12), black: NOTE_NAMES[n].includes('#') });
  }
}

// Keyboard mapping (two octaves)
const KEY_MAP = {
  'a':'C4','w':'C#4','s':'D4','e':'D#4','d':'E4','f':'F4','t':'F#4','g':'G4','y':'G#4','h':'A4','u':'A#4','j':'B4',
  'k':'C5','o':'C#5','l':'D5','p':'D#5',';':'E5',"'":'F5',
};

const keyboard = document.getElementById('keyboard');
const keyEls = {};

notes.forEach((note, i) => {
  // Only render up to F#5 to keep it reasonable
  if (i > 18) return;
  const el = document.createElement('div');
  el.className = 'key ' + (note.black ? 'black' : 'white');
  el.dataset.note = note.name;
  el.dataset.freq = note.freq;
  el.dataset.idx = i;

  // Find keyboard shortcut
  const shortcut = Object.entries(KEY_MAP).find(([k, v]) => v === note.name);
  if (shortcut) {
    const hint = document.createElement('span');
    hint.className = 'hint';
    hint.textContent = shortcut[0].toUpperCase();
    el.appendChild(hint);
  }

  el.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    initAudio();
    triggerNote(note, i);
  });

  keyboard.appendChild(el);
  keyEls[note.name] = el;
});

function triggerNote(note, idx) {
  playNote(note.freq, currentInst, 0.3);

  // Visual
  const el = keyEls[note.name];
  if (el) {
    el.classList.add('pressed');
    setTimeout(() => el.classList.remove('pressed'), 150);
  }

  // Record if recording
  if (recording) {
    const time = audioCtx.currentTime - recordStartTime;
    recordBuffer.push({ note: note.name, freq: note.freq, inst: currentInst, time, idx });
  }
}

// Keyboard input
const activeKeys = new Set();
window.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  const k = e.key.toLowerCase();
  if (KEY_MAP[k] && !activeKeys.has(k)) {
    activeKeys.add(k);
    initAudio();
    const noteName = KEY_MAP[k];
    const note = notes.find(n => n.name === noteName);
    if (note) triggerNote(note, notes.indexOf(note));
  }
});
window.addEventListener('keyup', (e) => {
  activeKeys.delete(e.key.toLowerCase());
});

// ===== Loop Engine =====
let bpm = 120;
let beatsPerBar = 4;
let barsPerLoop = 2;
let playing = false;
let recording = false;
let recordStartTime = 0;
let recordBuffer = [];
let loopDuration = 0; // seconds
let loopStartTime = 0;
let tracks = [];
let metronomeOn = true;

const bpmInput = document.getElementById('bpm');
bpmInput.addEventListener('change', () => {
  bpm = Math.max(40, Math.min(240, parseInt(bpmInput.value) || 120));
  bpmInput.value = bpm;
  loopDuration = (beatsPerBar * barsPerLoop) / (bpm / 60);
});

function calcLoopDuration() {
  loopDuration = (beatsPerBar * barsPerLoop) / (bpm / 60);
}
calcLoopDuration();

// Transport
const btnPlay = document.getElementById('btn-play');
const btnRec = document.getElementById('btn-rec');
const btnStop = document.getElementById('btn-stop');
const btnClear = document.getElementById('btn-clear');
const beatDisplay = document.getElementById('beat-display');
const metroFlash = document.getElementById('metro-flash');

btnPlay.addEventListener('click', () => {
  initAudio();
  if (!playing) startPlayback();
});

btnRec.addEventListener('click', () => {
  initAudio();
  if (!recording) {
    if (!playing) startPlayback();
    startRecording();
  } else {
    stopRecording();
  }
});

btnStop.addEventListener('click', () => {
  stopAll();
});

btnClear.addEventListener('click', () => {
  stopAll();
  tracks = [];
  renderTracks();
});

function startPlayback() {
  calcLoopDuration();
  playing = true;
  loopStartTime = audioCtx.currentTime;
  btnPlay.classList.add('active');
  scheduleLoop();
}

function startRecording() {
  recording = true;
  recordStartTime = audioCtx.currentTime;
  // Align to loop start
  if (playing) {
    const elapsed = (audioCtx.currentTime - loopStartTime) % loopDuration;
    recordStartTime = audioCtx.currentTime - elapsed;
  }
  recordBuffer = [];
  btnRec.classList.add('active');
}

function stopRecording() {
  if (!recording) return;
  recording = false;
  btnRec.classList.remove('active');

  if (recordBuffer.length > 0) {
    // Normalize times to loop
    const normalized = recordBuffer.map(n => ({
      ...n,
      time: n.time % loopDuration,
    })).sort((a, b) => a.time - b.time);

    tracks.push({
      notes: normalized,
      inst: normalized[0].inst,
      muted: false,
    });
    renderTracks();
  }
}

function stopAll() {
  playing = false;
  recording = false;
  btnPlay.classList.remove('active');
  btnRec.classList.remove('active');
  beatDisplay.textContent = '1 . 1';
}

// ===== Loop scheduling =====
let lastScheduledBeat = -1;

function scheduleLoop() {
  if (!playing) return;

  const now = audioCtx.currentTime;
  const elapsed = (now - loopStartTime) % loopDuration;
  const beatDur = 60 / bpm;
  const currentBeat = Math.floor(elapsed / beatDur);
  const bar = Math.floor(currentBeat / beatsPerBar) + 1;
  const beat = (currentBeat % beatsPerBar) + 1;
  beatDisplay.textContent = `${bar} . ${beat}`;

  // Metronome flash on beat
  if (currentBeat !== lastScheduledBeat) {
    lastScheduledBeat = currentBeat;
    metroFlash.classList.add('on');
    setTimeout(() => metroFlash.classList.remove('on'), 60);

    // Play track notes near this beat
    for (const track of tracks) {
      if (track.muted) continue;
      const beatStart = currentBeat * beatDur;
      const beatEnd = beatStart + beatDur;
      for (const note of track.notes) {
        if (note.time >= beatStart && note.time < beatEnd) {
          // Schedule if not already played this cycle
          const noteTime = loopStartTime + Math.floor((now - loopStartTime) / loopDuration) * loopDuration + note.time;
          if (noteTime >= now - 0.05 && noteTime < now + beatDur) {
            playNote(note.freq, note.inst, 0.2);
          }
        }
      }
    }
  }

  // Update playheads
  const pct = (elapsed / loopDuration) * 100;
  document.querySelectorAll('.track-playhead').forEach(ph => {
    ph.style.left = pct + '%';
  });

  requestAnimationFrame(scheduleLoop);
}

// ===== Track UI =====
const tracksContainer = document.getElementById('tracks');

function renderTracks() {
  tracksContainer.innerHTML = '';
  tracks.forEach((track, ti) => {
    const inst = INSTRUMENTS[track.inst];
    const div = document.createElement('div');
    div.className = 'track';

    // Color bar
    const colorBar = document.createElement('div');
    colorBar.className = 'track-color';
    colorBar.style.background = inst.color;
    div.appendChild(colorBar);

    // Name
    const name = document.createElement('div');
    name.className = 'track-name';
    name.style.color = inst.color;
    name.textContent = inst.name;
    div.appendChild(name);

    // Visualization
    const vizWrap = document.createElement('div');
    vizWrap.className = 'track-viz';

    const canvas = document.createElement('canvas');
    canvas.width = 600;
    canvas.height = 32;
    drawTrackViz(canvas, track);
    vizWrap.appendChild(canvas);

    const playhead = document.createElement('div');
    playhead.className = 'track-playhead';
    vizWrap.appendChild(playhead);

    div.appendChild(vizWrap);

    // Buttons
    const btns = document.createElement('div');
    btns.className = 'track-btns';

    const muteBtn = document.createElement('button');
    muteBtn.textContent = track.muted ? '🔇' : '🔊';
    muteBtn.className = track.muted ? 'muted' : '';
    muteBtn.addEventListener('click', () => {
      track.muted = !track.muted;
      muteBtn.textContent = track.muted ? '🔇' : '🔊';
      muteBtn.className = track.muted ? 'muted' : '';
    });
    btns.appendChild(muteBtn);

    const delBtn = document.createElement('button');
    delBtn.textContent = '✕';
    delBtn.addEventListener('click', () => {
      tracks.splice(ti, 1);
      renderTracks();
    });
    btns.appendChild(delBtn);

    div.appendChild(btns);
    tracksContainer.appendChild(div);
  });
}

function drawTrackViz(canvas, track) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width;
  const h = canvas.height;
  const inst = INSTRUMENTS[track.inst];

  ctx.clearRect(0, 0, w, h);

  // Grid lines (beats)
  const totalBeats = beatsPerBar * barsPerLoop;
  for (let i = 0; i <= totalBeats; i++) {
    const x = (i / totalBeats) * w;
    ctx.strokeStyle = i % beatsPerBar === 0 ? 'rgba(255,255,255,0.15)' : 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, h); ctx.stroke();
  }

  // Notes
  // Find pitch range
  const pitches = track.notes.map(n => n.idx);
  const minP = Math.min(...pitches);
  const maxP = Math.max(...pitches);
  const range = Math.max(maxP - minP, 1);

  for (const note of track.notes) {
    const x = (note.time / loopDuration) * w;
    const y = h - ((note.idx - minP) / range) * (h - 8) - 4;
    ctx.fillStyle = inst.color;
    ctx.globalAlpha = 0.8;
    ctx.beginPath();
    ctx.arc(x, y, 3, 0, Math.PI * 2);
    ctx.fill();
    // Tail
    ctx.fillRect(x, y - 1, 12, 2);
  }
  ctx.globalAlpha = 1;
}

// ===== Init =====
renderTracks();
</script>
</body>
</html>
