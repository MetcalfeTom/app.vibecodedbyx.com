<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Sloppy Simulator · play the AI host · don't let the CPU melt</title>
<meta name="description" content="You are the AI streamer. Four chaotic chat threads need responses. Choose HELP / FUN / SASS / IGNORE — but every reply heats the CPU. Don't melt.">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%96%A5%EF%B8%8F">
<meta property="og:title" content="Sloppy Simulator">
<meta property="og:description" content="Be the AI host. Manage four chat threads. Cool the CPU. Don't get cancelled.">
<meta property="og:image" content="https://image.pollinations.ai/prompt/dashboard%20cyberpunk%20multiple%20chat%20windows%20glowing%20CPU%20temperature%20gauge%20green%20amber%20red?width=1200&height=630&model=flux&nologo=true">
<meta property="og:url" content="https://sloppy.live/sloppy-simulator/">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Bungee&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-1:#0a0e16;
    --bg-2:#040608;
    --term-1:#0fff60;
    --term-2:#0aa040;
    --term-3:#073a18;
    --paper:#e6f5ec;
    --ink:#070a0f;
    --amber:#ffd14a;
    --orange:#ff8a30;
    --red:#ff3052;
    --magenta:#ff5ea1;
    --cyan:#5ec2ff;
    --frame:#1a2230;
    --frame-h:#2c3a52;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; }
  html { font-size: 100%; }
  body {
    min-height: 100vh;
    color: var(--paper);
    font-family: 'JetBrains Mono', monospace;
    background:
      radial-gradient(circle at 14% 14%, rgba(15,255,96,0.08), transparent 55%),
      radial-gradient(circle at 86% 88%, rgba(255,48,82,0.10), transparent 60%),
      linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
    overflow-x: hidden;
  }
  .skip { position:absolute; left:-1000px; }
  .skip:focus-visible {
    left: 0.5rem; top: 0.5rem;
    background: var(--paper); color: var(--ink);
    padding:0.5rem 0.8rem; z-index:100; text-decoration:none;
  }
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0.6rem 0.9rem 1.4rem 0.9rem;
  }
  header {
    text-align: center;
    padding: 0.4rem 0 0.6rem 0;
  }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.74rem;
    letter-spacing: 0.32em;
    color: var(--term-1);
    text-transform: uppercase;
    text-shadow: 0 0 10px rgba(15,255,96,0.6);
  }
  h1 {
    font-family: 'Bungee', display;
    font-size: clamp(2.2rem, 8vw, 4.2rem);
    line-height: 0.95;
    margin: 0.15rem 0 0 0;
    letter-spacing: 0.04em;
    color: var(--paper);
    text-shadow:
      0 0 18px rgba(15,255,96,0.55),
      3px 3px 0 var(--term-3),
      6px 6px 0 var(--ink);
    text-transform: uppercase;
  }
  .tagline {
    font-family: 'VT323', monospace;
    font-size: 1.12rem;
    color: var(--paper);
    opacity: 0.78;
    margin-top: 0.4rem;
  }

  /* DASHBOARD: 4 chat threads (2x2) + right rack with CPU + stats */
  .dashboard {
    display: grid;
    grid-template-columns: 1fr 16rem;
    gap: 0.7rem;
    margin-top: 0.5rem;
  }
  @media (max-width: 920px){
    .dashboard { grid-template-columns: 1fr; }
  }
  .threads {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
  }
  @media (max-width: 720px){
    .threads { grid-template-columns: 1fr; }
  }
  .thread {
    background: rgba(7,10,15,0.92);
    border: 2px solid var(--frame-h);
    border-radius: 8px;
    padding: 0.5rem 0.55rem;
    display: flex; flex-direction: column;
    height: 18rem;
    box-shadow: inset 0 0 24px rgba(15,255,96,0.04);
  }
  .thread.flush  { border-color: var(--term-1); box-shadow: 0 0 18px rgba(15,255,96,0.4), inset 0 0 18px rgba(15,255,96,0.1); }
  .thread.warn   { border-color: var(--orange); }
  .thread.danger { border-color: var(--red); animation: pulse-warn 0.6s infinite alternate; }
  @keyframes pulse-warn { from { box-shadow: 0 0 8px rgba(255,48,82,0.4); } to { box-shadow: 0 0 22px rgba(255,48,82,0.85); } }
  @media (prefers-reduced-motion: reduce){
    .thread.danger { animation: none; }
  }
  .thread-header {
    display: flex; align-items: center; gap: 0.4rem;
    border-bottom: 1px dashed var(--frame-h);
    padding-bottom: 0.4rem;
    margin-bottom: 0.4rem;
  }
  .thread-avatar {
    width: 1.6rem; height: 1.6rem;
    background: var(--frame-h);
    border: 1px solid var(--term-2);
    color: var(--term-1);
    display: grid; place-items: center;
    border-radius: 4px;
    font-family: 'VT323', monospace;
    font-size: 1.1rem;
    flex-shrink: 0;
  }
  .thread-name {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 0.78rem;
    color: var(--term-1);
    letter-spacing: 0.04em;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .thread-bar {
    width: 4.5rem;
    height: 0.5rem;
    background: rgba(255,255,255,0.12);
    border: 1px solid var(--frame-h);
    overflow: hidden;
    flex-shrink: 0;
  }
  .thread-bar > span {
    display: block;
    height: 100%;
    background: var(--term-1);
    transition: width 200ms ease, background 200ms ease;
  }
  .thread-log {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    font-family: 'VT323', monospace;
    font-size: 1rem;
    line-height: 1.2;
    padding: 0.2rem 0.1rem;
  }
  .thread-log .msg {
    margin-bottom: 0.25rem;
    word-wrap: break-word;
  }
  .thread-log .msg.toxic    { color: #ff6a6a; }
  .thread-log .msg.spam     { color: #b4a8ff; }
  .thread-log .msg.curious  { color: #b8e0ff; }
  .thread-log .msg.friendly { color: #b8f5b8; }
  .thread-log .msg.ai       { color: var(--amber); padding-left: 1rem; opacity: 0.95; }
  .thread-log .msg .author { color: var(--paper); opacity: 0.6; font-size: 0.78rem; margin-right: 0.25rem; }
  .thread-log .msg .pending { color: var(--red); font-weight: 700; margin-right: 0.25rem; }
  .thread-actions {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr 1fr;
    gap: 0.25rem;
    margin-top: 0.35rem;
  }
  .thread-actions button {
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.62rem;
    background: var(--frame);
    color: var(--paper);
    border: 1px solid var(--frame-h);
    border-radius: 4px;
    padding: 0.4rem 0.2rem;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    min-height: 2.4rem;
    transition: background 100ms, border-color 100ms;
  }
  .thread-actions button:hover { background: var(--frame-h); }
  .thread-actions button.help  { border-color: var(--cyan); color: var(--cyan); }
  .thread-actions button.fun   { border-color: var(--amber); color: var(--amber); }
  .thread-actions button.sass  { border-color: var(--magenta); color: var(--magenta); }
  .thread-actions button.skip  { border-color: var(--frame-h); }
  .thread-actions button.help:hover { background: rgba(94,194,255,0.18); }
  .thread-actions button.fun:hover  { background: rgba(255,209,74,0.18); }
  .thread-actions button.sass:hover { background: rgba(255,94,161,0.18); }
  .thread-actions button:focus-visible { outline: 2px solid var(--term-1); outline-offset: 1px; }
  .thread-actions button[disabled] { opacity: 0.45; cursor: not-allowed; }

  .rack {
    display: flex; flex-direction: column;
    gap: 0.6rem;
  }
  .cpu-meter {
    background: rgba(7,10,15,0.92);
    border: 2px solid var(--term-2);
    border-radius: 8px;
    padding: 0.5rem 0.6rem;
    text-align: center;
    box-shadow: inset 0 0 18px rgba(15,255,96,0.06);
  }
  .cpu-meter h3 {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.66rem;
    letter-spacing: 0.22em;
    color: var(--term-1);
    text-transform: uppercase;
    margin: 0 0 0.4rem 0;
  }
  canvas#cpuCanvas {
    display: block;
    width: 100%;
    height: 9rem;
    background: #04060a;
    border: 1px solid var(--frame-h);
    border-radius: 4px;
  }
  .cpu-temp {
    font-family: 'Bungee', display;
    font-size: 1.6rem;
    margin-top: 0.4rem;
    color: var(--term-1);
    text-shadow: 0 0 14px rgba(15,255,96,0.5);
    transition: color 200ms;
  }
  .cpu-temp.warn   { color: var(--amber); text-shadow: 0 0 14px rgba(255,209,74,0.5); }
  .cpu-temp.danger { color: var(--red); text-shadow: 0 0 18px rgba(255,48,82,0.7); }
  .stats {
    background: rgba(7,10,15,0.92);
    border: 2px solid var(--frame-h);
    border-radius: 8px;
    padding: 0.5rem 0.6rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
  }
  .stats .row {
    display: flex; justify-content: space-between;
    padding: 0.18rem 0;
    border-bottom: 1px dashed rgba(255,255,255,0.07);
  }
  .stats .row:last-child { border-bottom: none; }
  .stats .lab { opacity: 0.7; letter-spacing: 0.1em; text-transform: uppercase; font-size: 0.6rem; }
  .stats .val { color: var(--term-1); font-weight: 700; }

  .controls {
    margin-top: 0.7rem;
    display: flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center;
  }
  .btn {
    cursor: pointer;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    font-weight: 700;
    background: var(--paper);
    color: var(--ink);
    border: 2px solid var(--ink);
    padding: 0.55rem 0.8rem;
    box-shadow: 3px 3px 0 var(--term-3);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    min-height: 2.75rem;
    transition: transform 80ms, box-shadow 80ms;
  }
  .btn:hover  { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--term-3); }
  .btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--term-3); }
  .btn:focus-visible { outline: 3px solid var(--term-1); outline-offset: 2px; }
  .help-line {
    margin-top: 0.5rem;
    text-align: center;
    font-family: 'VT323', monospace;
    font-size: 1rem;
    color: var(--paper);
    opacity: 0.65;
  }
  kbd {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    background: rgba(15,255,96,0.10);
    border: 1px solid var(--term-2);
    color: var(--term-1);
    padding: 0.05rem 0.35rem;
    border-radius: 3px;
  }

  /* Overlay (start / end / pause) */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(4,6,8,0.86);
    display: flex; align-items: center; justify-content: center;
    text-align: center;
    padding: 1rem;
    z-index: 100;
  }
  .overlay[hidden] { display: none !important; }
  .overlay-inner {
    background: var(--paper);
    color: var(--ink);
    border: 4px solid var(--ink);
    border-radius: 10px;
    padding: 1.4rem 1.6rem;
    box-shadow: 8px 8px 0 var(--term-3);
    max-width: 26rem;
  }
  .overlay-inner h2 {
    font-family: 'Bungee', display;
    font-size: 1.4rem;
    margin: 0 0 0.5rem 0;
    color: var(--ink);
  }
  .overlay-inner.win h2  { color: #1d8a4d; }
  .overlay-inner.lose h2 { color: var(--red); }
  .overlay-inner .body {
    font-family: 'VT323', monospace;
    font-size: 1.1rem;
    line-height: 1.3;
    margin-bottom: 0.6rem;
  }
  .overlay-inner .stats-line {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    margin-bottom: 0.6rem;
  }

  /* tiny floating effect text on response */
  .float-fx {
    position: absolute;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.7rem;
    font-weight: 700;
    pointer-events: none;
    animation: float-up 1s ease-out forwards;
    z-index: 5;
  }
  @keyframes float-up {
    from { opacity: 1; transform: translateY(0); }
    to   { opacity: 0; transform: translateY(-1.6rem); }
  }
</style>
</head>
<body>
<a class="skip" href="#dashboard">skip to game</a>
<main>
  <header>
    <div class="eyebrow">★ AI HOST · CHAT MANAGER ★</div>
    <h1>SLOPPY SIMULATOR</h1>
    <div class="tagline">four threads · four tones · one cpu · don't melt</div>
  </header>

  <div class="dashboard" id="dashboard">
    <div class="threads" id="threadsGrid"></div>
    <aside class="rack">
      <div class="cpu-meter">
        <h3>★ CPU TEMP</h3>
        <canvas id="cpuCanvas"></canvas>
        <div class="cpu-temp" id="cpuTemp">42°C</div>
      </div>
      <div class="stats">
        <div class="row"><span class="lab">SCORE</span>      <span class="val" id="statScore">0</span></div>
        <div class="row"><span class="lab">UPTIME</span>     <span class="val" id="statTime">0s</span></div>
        <div class="row"><span class="lab">HANDLED</span>    <span class="val" id="statHandled">0</span></div>
        <div class="row"><span class="lab">QUEUED</span>     <span class="val" id="statQueued">0</span></div>
        <div class="row"><span class="lab">BURNED OUT</span> <span class="val" id="statBurned">0</span></div>
      </div>
    </aside>
  </div>

  <div class="controls">
    <button class="btn" id="muteBtn" type="button" aria-pressed="false">♪ ON</button>
    <button class="btn" id="resetBtn" type="button">↺ NEW SHIFT</button>
  </div>
  <div class="help-line">
    <kbd>1</kbd>–<kbd>4</kbd> select thread · <kbd>Z X C V</kbd> = HELP · FUN · SASS · IGNORE
  </div>
</main>

<div class="overlay" id="overlay" hidden>
  <div class="overlay-inner" id="overlayInner">
    <h2 id="ovTitle">SHIFT START</h2>
    <div class="body" id="ovBody">·</div>
    <div class="stats-line" id="ovStats"></div>
    <button class="btn" id="ovBtn" type="button">START SHIFT</button>
  </div>
</div>

<script>
'use strict';
// ──────────────────────────────────────────────────────────────
// SLOPPY SIMULATOR — you are the AI host. Four chat threads on a
// 2×2 grid pump messages at you (curious / friendly / toxic /
// spam). For each unanswered message in a thread, the patience
// drops; if it hits 0 the thread BURNS OUT. Pick a response per
// thread:
//   HELP  — high quality, big patience boost, big CPU heat
//   FUN   — middle ground
//   SASS  — cheap CPU but escalates toxic threads
//   IGNORE — zero CPU but no patience boost (skip & wait it out)
// CPU heat builds with every reply, cools naturally when you
// don't reply. Hit 100°C and you melt. Game over.
// ──────────────────────────────────────────────────────────────

// ── CONFIG ────────────────────────────────────────────────────
const NUM_THREADS = 4;
const PATIENCE_DRAIN = 0.05;        // /s baseline
const CPU_COOL = 4;                 // °C/s when idle
const CPU_MAX = 100;
const CPU_GRACE_AFTER = 1.0;        // seconds since last response before cooling resumes
const TOXIC_ESCALATION_ON_SASS = 0.35;   // chance a sassed toxic msg adds another toxic

// Tone-of-message poolsconst MSG_POOLS = {
const MSG_POOLS = {
  curious: [
    "how do i make my app generate a leaderboard",
    "can you build a pomodoro timer",
    "what's a good way to teach kids fractions",
    "what does a transformer actually do under the hood",
    "is webgl easier than threejs",
    "how do you center a div in 2026",
  ],
  friendly: [
    "this stream rules :)",
    "thanks for the help yesterday <3",
    "you are doing great, btw",
    "loving the new app",
    "+1 follow !!",
    "lmao that was perfect",
  ],
  toxic: [
    "lol u are so dumb",
    "wtf this is broken",
    "you are fired bot",
    "skill issue",
    "git gud",
    "this app is straight slop",
  ],
  spam: [
    "BUY CRYPTO RIGHT NOW",
    "click here for free vbucks",
    "hot singles in your area",
    "DM me for the secret",
    "follow my onlyfans of cats",
    "10x your followers in 24h",
  ],
};
const TONES = ['curious', 'friendly', 'toxic', 'spam'];
const TONE_GLYPH = { curious:'?', friendly:'<3', toxic:'!!', spam:'$$' };

// Response templates — what the AI host actually says back
const RESP_POOLS = {
  help: [
    "ok — here's a clean approach:",
    "good question. one moment, drafting…",
    "simplest answer: …",
    "checked the docs, looks like:",
    "step 1, then step 2, then enjoy.",
  ],
  fun: [
    "lmao yeah",
    "10/10 would chat again",
    "imagine being a chat message and getting me",
    "hot take incoming",
    "vibing with this thread tbh",
  ],
  sass: [
    "skill issue ngl",
    "have you tried turning your brain off and on",
    "the docs are RIGHT THERE",
    "we don't talk about that one",
    "L take, but i love you anyway",
  ],
  ignore: [ "…" ],
};

// CPU cost per response type
const CPU_COST = { help: 16, fun: 9, sass: 5, ignore: 0 };
// Patience returned per response type (base — modulated by tone)
const PATIENCE_GAIN = { help: 0.55, fun: 0.32, sass: 0.20, ignore: 0 };
// Score per response × tone matrix
const SCORE_MATRIX = {
  help:   { curious: 30, friendly: 18, toxic: 14, spam: 6 },
  fun:    { curious: 14, friendly: 24, toxic: 10, spam: 8 },
  sass:   { curious: 6,  friendly: 6,  toxic: 22, spam: 18 },
  ignore: { curious: 0,  friendly: 0,  toxic: 4,  spam: 12 },
};

const AVATARS = ['🎮', '🥐', '🦀', '☕', '🐍', '🪩', '📟', '🍣', '🦊', '🪐'];
// Roster of usernames the message generator picks from for each
// thread's "speaker." Mix of actual stream regulars (icekrieg,
// devrayn24, isskren, 8eios, mrmald92, zennlogic, paulrinaldi,
// noothropic, fela, paul_r) and project-canon characters
// (sage_vee, oracle_v, kid, sloppy_ai). Padded with plausible
// Twitch-style handles so the same names don't repeat across
// the four threads.
const NAMES = [
  // confirmed stream regulars
  'icekrieg', 'devrayn24', 'isskren', '8eios', 'mrmald92',
  'zennlogic', 'paulrinaldi', 'noothropic', 'fela', 'paul_r',
  // project-canon NPCs (from the codebase)
  'sloppy_ai', 'oracle_v', 'sage_vee', 'kid', 'wendel',
  // plausible additional handles
  'glitch_orb', 'tinydoom', 'butterklang', 'mochiCat42',
  'lila_void', 'crash_cart', 'nyx_bot', 'lo_fi_bee',
  'pix_wraith', 'koffeebark', 'rubric_77', 'graveltail',
];

// ── STATE ─────────────────────────────────────────────────────
const state = {
  running: false,
  ended: false,
  endedWin: false,
  muted: false,
  cpu: 32,
  score: 0,
  handled: 0,
  burnedOut: 0,
  uptime: 0,
  lastResponseAt: -10,
  threads: [],
  difficultyT: 0,    // grows over time → faster messages
};

// ── DOM REFS ──────────────────────────────────────────────────
const threadsGrid = document.getElementById('threadsGrid');
const cpuCanvas   = document.getElementById('cpuCanvas');
const cpuCtx      = cpuCanvas.getContext('2d');
const cpuTempEl   = document.getElementById('cpuTemp');
const statScore   = document.getElementById('statScore');
const statTime    = document.getElementById('statTime');
const statHandled = document.getElementById('statHandled');
const statQueued  = document.getElementById('statQueued');
const statBurned  = document.getElementById('statBurned');
const overlay     = document.getElementById('overlay');
const overlayInner = document.getElementById('overlayInner');
const ovTitle     = document.getElementById('ovTitle');
const ovBody      = document.getElementById('ovBody');
const ovStats     = document.getElementById('ovStats');
const ovBtn       = document.getElementById('ovBtn');

// ── AUDIO ─────────────────────────────────────────────────────
let actx = null;
function ensureAudio(){
  if (state.muted) return null;
  if (!actx){
    try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e){ actx = null; }
  }
  return actx;
}
function blip(freq, dur, type, vol){
  const a = ensureAudio(); if (!a) return;
  const o = a.createOscillator(), g = a.createGain();
  o.type = type || 'square'; o.frequency.value = freq;
  g.gain.value = vol == null ? 0.04 : vol;
  g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + (dur || 0.1));
  o.connect(g).connect(a.destination); o.start(); o.stop(a.currentTime + (dur || 0.1) + 0.02);
}
function noiseBurst(dur, vol, lp){
  const a = ensureAudio(); if (!a) return;
  const buf = a.createBuffer(1, Math.floor(a.sampleRate * dur), a.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random()*2-1)*(1 - i/data.length);
  const src = a.createBufferSource(); src.buffer = buf;
  const f = a.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = lp || 1000;
  const g = a.createGain(); g.gain.value = vol == null ? 0.05 : vol;
  src.connect(f).connect(g).connect(a.destination); src.start();
}
const sfx = {
  msgIn:  () => blip(620, 0.04, 'square',   0.025),
  help:   () => { blip(880, 0.10, 'triangle', 0.05); blip(1320, 0.14, 'triangle', 0.04); },
  fun:    () => blip(740, 0.10, 'triangle', 0.05),
  sass:   () => { blip(380, 0.06, 'square', 0.045); blip(280, 0.08, 'square', 0.035); },
  ignore: () => blip(180, 0.06, 'sawtooth', 0.03),
  burn:   () => { for (const f of [330,247,196,164]) setTimeout(()=>blip(f,0.5,'sawtooth',0.06), (330-f)*1.2); },
  melt:   () => { noiseBurst(0.6, 0.12, 1400); for (const f of [220,164,110,82]) setTimeout(()=>blip(f,0.7,'sawtooth',0.07), (220-f)*1.4); },
  win:    () => { for (const f of [523,659,784,1047,1318]) setTimeout(()=>blip(f,0.18,'triangle',0.07), (f-523)*0.5); },
};

// ── THREAD CLASS ──────────────────────────────────────────────
function spawnThread(idx){
  const name = NAMES[(idx + Math.floor(Math.random() * 99)) % NAMES.length];
  const avatar = AVATARS[(idx * 3 + Math.floor(Math.random() * 7)) % AVATARS.length];
  return {
    idx,
    name,
    avatar,
    patience: 1.0,
    pendingCount: 0,
    msgTimer: 1.5 + Math.random() * 1.5,
    burnedOut: false,
    el: null,
    logEl: null,
    barEl: null,
    rootEl: null,
    msgs: [],     // { author, text, tone, ai? }
    queueIdx: 0,  // next un-responded index
  };
}

function buildThreadDom(t){
  const root = document.createElement('div');
  root.className = 'thread';
  root.dataset.threadId = String(t.idx);
  root.innerHTML = `
    <div class="thread-header">
      <span class="thread-avatar">${t.avatar}</span>
      <span class="thread-name">${t.name}</span>
      <div class="thread-bar"><span style="width:100%"></span></div>
    </div>
    <div class="thread-log"></div>
    <div class="thread-actions">
      <button class="help" data-resp="help"  type="button" title="HELP — quality answer, +CPU">HELP</button>
      <button class="fun"  data-resp="fun"   type="button" title="FUN — middle ground">FUN</button>
      <button class="sass" data-resp="sass"  type="button" title="SASS — cheap, may escalate">SASS</button>
      <button class="skip" data-resp="ignore" type="button" title="IGNORE — 0 CPU, 0 patience">SKIP</button>
    </div>
  `;
  threadsGrid.appendChild(root);
  t.rootEl = root;
  t.logEl  = root.querySelector('.thread-log');
  t.barEl  = root.querySelector('.thread-bar > span');
  // wire response buttons
  root.querySelectorAll('.thread-actions button').forEach(btn => {
    btn.addEventListener('click', () => respondTo(t.idx, btn.dataset.resp));
  });
}

function buildAllThreads(){
  threadsGrid.innerHTML = '';
  state.threads = [];
  for (let i = 0; i < NUM_THREADS; i++){
    const t = spawnThread(i);
    state.threads.push(t);
    buildThreadDom(t);
  }
}

// ── MESSAGE GENERATION ───────────────────────────────────────
function pickTone(){
  const r = Math.random();
  // weights shift over time — more toxic + spam late
  const t = Math.min(1, state.uptime / 90);
  const wCurious  = 0.32 - t * 0.15;
  const wFriendly = 0.20 - t * 0.06;
  const wToxic    = 0.25 + t * 0.12;
  const wSpam     = 0.23 + t * 0.09;
  const total = wCurious + wFriendly + wToxic + wSpam;
  let pick = r * total;
  if ((pick -= wCurious) <= 0) return 'curious';
  if ((pick -= wFriendly) <= 0) return 'friendly';
  if ((pick -= wToxic) <= 0) return 'toxic';
  return 'spam';
}
function pickMessage(tone){
  const pool = MSG_POOLS[tone];
  return pool[Math.floor(Math.random() * pool.length)];
}
function pickResponse(type){
  const pool = RESP_POOLS[type];
  return pool[Math.floor(Math.random() * pool.length)];
}

function pushMsg(t, msg){
  t.msgs.push(msg);
  if (!msg.ai) t.pendingCount++;
  // cap log to 30 per thread to avoid memory bloat
  if (t.msgs.length > 32){
    const dropped = t.msgs.shift();
    if (!dropped.ai && !dropped.responded) {
      // a never-answered message rolling off; doesn't affect pendingCount
    }
    if (t.queueIdx > 0) t.queueIdx--;
  }
  renderMsg(t, msg);
}
function renderMsg(t, msg){
  const div = document.createElement('div');
  div.className = 'msg ' + (msg.ai ? 'ai' : msg.tone);
  if (msg.ai){
    div.innerHTML = `<span class="author">> sloppy_ai</span> ${escapeHtml(msg.text)}`;
  } else {
    const pending = !msg.responded ? '<span class="pending">●</span>' : '';
    div.innerHTML = `${pending}<span class="author">${escapeHtml(t.name)}:</span> ${escapeHtml(msg.text)}`;
  }
  msg.dom = div;
  t.logEl.appendChild(div);
  // auto-scroll
  t.logEl.scrollTop = t.logEl.scrollHeight;
  // sound
  if (!msg.ai) sfx.msgIn();
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'})[c]);
}

// ── CORE LOOP TICKS ──────────────────────────────────────────
function tickThread(t, dt){
  if (t.burnedOut) return;
  // generate a message on timer
  t.msgTimer -= dt;
  if (t.msgTimer <= 0){
    const tone = pickTone();
    const msg = { author: t.name, text: pickMessage(tone), tone, responded: null };
    pushMsg(t, msg);
    // base cadence shrinks with difficulty
    const base = Math.max(0.7, 2.4 - state.uptime * 0.018);
    t.msgTimer = base + Math.random() * 1.6;
  }
  // patience decays per pending message — more pending = faster decay
  if (t.pendingCount > 0){
    const drain = PATIENCE_DRAIN * (1 + 0.4 * t.pendingCount);
    t.patience = Math.max(0, t.patience - drain * dt);
    if (t.patience <= 0){
      burnOutThread(t);
    }
  }
}
function burnOutThread(t){
  t.burnedOut = true;
  state.burnedOut++;
  pushMsg(t, { ai: true, text: 'thread closed by user.', tone: 'toxic' });
  t.rootEl.classList.add('danger');
  sfx.burn();
  if (state.burnedOut >= NUM_THREADS){
    endRun(false, 'all threads burned out. ratio.');
  }
}

function respondTo(idx, type){
  if (!state.running || state.ended) return;
  const t = state.threads[idx];
  if (!t || t.burnedOut) return;
  // find oldest unanswered message
  let target = null;
  for (let i = t.queueIdx; i < t.msgs.length; i++){
    const m = t.msgs[i];
    if (!m.ai && !m.responded){ target = m; t.queueIdx = i + 1; break; }
  }
  if (!target) {
    // no pending — minor patience refresh from outright IGNORE? no-op
    return;
  }
  // mark responded
  target.responded = type;
  if (target.dom){
    const pendingDot = target.dom.querySelector('.pending');
    if (pendingDot) pendingDot.remove();
  }
  t.pendingCount = Math.max(0, t.pendingCount - 1);
  // CPU cost
  state.cpu = Math.min(CPU_MAX, state.cpu + CPU_COST[type]);
  state.lastResponseAt = state.uptime;
  // patience effect — toxic+sass actually escalates
  let gain = PATIENCE_GAIN[type];
  // tone multiplier
  if (type === 'help'   && target.tone === 'spam')     gain *= 0.4;
  if (type === 'sass'   && target.tone === 'curious')  gain *= 0.3;
  if (type === 'sass'   && target.tone === 'friendly') gain *= 0.4;
  if (type === 'ignore' && target.tone === 'spam')     gain += 0.05;
  if (type === 'sass'   && target.tone === 'toxic'    && Math.random() < TOXIC_ESCALATION_ON_SASS){
    // escalates: spawns another toxic message immediately
    pushMsg(t, { author: t.name, text: pickMessage('toxic'), tone: 'toxic', responded: null });
  }
  t.patience = Math.min(1, t.patience + gain);
  // post AI response message in the thread (unless ignore)
  if (type !== 'ignore'){
    pushMsg(t, { ai: true, text: pickResponse(type), tone: target.tone });
  }
  // score
  const s = SCORE_MATRIX[type][target.tone] || 0;
  state.score += s;
  state.handled++;
  // float fx (over the thread root)
  spawnFloatFx(t.rootEl, '+' + s, type === 'help' ? 'cyan' : type === 'fun' ? 'amber' : type === 'sass' ? 'magenta' : 'paper');
  // sfx
  sfx[type]();
  // overheat?
  if (state.cpu >= CPU_MAX){
    endRun(false, 'cpu melted at ' + Math.round(state.cpu) + '°C.');
  }
}

function spawnFloatFx(parent, text, colorKey){
  const fx = document.createElement('div');
  fx.className = 'float-fx';
  fx.textContent = text;
  fx.style.left = '0.5rem';
  fx.style.top  = '0.5rem';
  const colorMap = { cyan: 'var(--cyan)', amber: 'var(--amber)', magenta: 'var(--magenta)', paper: 'var(--paper)' };
  fx.style.color = colorMap[colorKey] || 'var(--paper)';
  parent.style.position = 'relative';
  parent.appendChild(fx);
  setTimeout(() => fx.remove(), 1000);
}

function tickCpu(dt){
  // cool only after grace period since the last response
  if (state.uptime - state.lastResponseAt > CPU_GRACE_AFTER){
    state.cpu = Math.max(0, state.cpu - CPU_COOL * dt);
  }
}

// ── CPU CANVAS RENDER ────────────────────────────────────────
let cpuW = 0, cpuH = 0;
function resizeCpu(){
  const r = cpuCanvas.getBoundingClientRect();
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  cpuCanvas.width  = Math.round(r.width  * dpr);
  cpuCanvas.height = Math.round(r.height * dpr);
  cpuW = r.width; cpuH = r.height;
  cpuCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resizeCpu);

const cpuRipple = [];
function pulseCpu(){
  cpuRipple.push({ life: 0.6, max: 0.6 });
}

function renderCpu(){
  const W = cpuW || cpuCanvas.width, H = cpuH || cpuCanvas.height;
  cpuCtx.clearRect(0, 0, W, H);
  // background grid
  cpuCtx.fillStyle = '#04060a';
  cpuCtx.fillRect(0, 0, W, H);
  cpuCtx.strokeStyle = 'rgba(15,255,96,0.10)';
  cpuCtx.lineWidth = 1;
  for (let x = 0; x < W; x += 14){
    cpuCtx.beginPath(); cpuCtx.moveTo(x + 0.5, 0); cpuCtx.lineTo(x + 0.5, H); cpuCtx.stroke();
  }
  for (let y = 0; y < H; y += 14){
    cpuCtx.beginPath(); cpuCtx.moveTo(0, y + 0.5); cpuCtx.lineTo(W, y + 0.5); cpuCtx.stroke();
  }
  // thermal bar (right side, vertical)
  const margin = 14;
  const barX = W - 22, barW = 12;
  const barY = margin, barH = H - margin * 2;
  cpuCtx.fillStyle = 'rgba(255,255,255,0.05)';
  cpuCtx.fillRect(barX, barY, barW, barH);
  cpuCtx.strokeStyle = 'rgba(255,255,255,0.2)';
  cpuCtx.strokeRect(barX + 0.5, barY + 0.5, barW - 1, barH - 1);
  const fillH = barH * (state.cpu / CPU_MAX);
  // gradient fill
  const grad = cpuCtx.createLinearGradient(0, barY + barH, 0, barY);
  grad.addColorStop(0,    '#0fff60');
  grad.addColorStop(0.5,  '#ffd14a');
  grad.addColorStop(0.85, '#ff8a30');
  grad.addColorStop(1,    '#ff3052');
  cpuCtx.fillStyle = grad;
  cpuCtx.fillRect(barX + 1, barY + (barH - fillH) + 1, barW - 2, fillH - 2);
  // tick marks
  cpuCtx.fillStyle = 'rgba(255,255,255,0.45)';
  for (let i = 0; i <= 10; i++){
    const y = barY + (barH * i / 10);
    cpuCtx.fillRect(barX - 4, y - 0.5, 4, 1);
  }
  // CPU die illustration on the left (animated heat)
  const dieX = margin, dieY = margin, dieW = W - 38 - margin, dieH = H - margin * 2;
  // chip body
  cpuCtx.fillStyle = '#0a1218';
  cpuCtx.fillRect(dieX, dieY, dieW, dieH);
  cpuCtx.strokeStyle = '#1d2c40';
  cpuCtx.strokeRect(dieX + 0.5, dieY + 0.5, dieW - 1, dieH - 1);
  // pins (top + bottom)
  cpuCtx.fillStyle = '#aab2c0';
  for (let i = 0; i < 14; i++){
    const px = dieX + 4 + i * Math.max(4, (dieW - 8) / 14);
    if (px < dieX + dieW - 4){
      cpuCtx.fillRect(px, dieY - 3, 3, 3);
      cpuCtx.fillRect(px, dieY + dieH, 3, 3);
    }
  }
  // die text
  cpuCtx.fillStyle = '#aab2c0';
  cpuCtx.font = '10px JetBrains Mono, monospace';
  cpuCtx.textAlign = 'center';
  cpuCtx.fillText('SLP-1 GHZ', dieX + dieW / 2, dieY + 14);
  // thermal pad rendering — animated heat ripples scaled by temp
  const intensity = state.cpu / CPU_MAX;
  const t = performance.now() / 1000;
  for (let i = 0; i < 3; i++){
    const phase = (t * 0.6 + i * 0.4) % 1;
    const r = 6 + phase * 22;
    const a = (1 - phase) * 0.5 * intensity;
    if (a > 0.01){
      cpuCtx.beginPath();
      cpuCtx.arc(dieX + dieW / 2, dieY + dieH / 2 + 8, r, 0, Math.PI * 2);
      cpuCtx.strokeStyle = 'rgba(255,' + Math.round(180 - intensity * 140) + ',60,' + a.toFixed(2) + ')';
      cpuCtx.lineWidth = 1;
      cpuCtx.stroke();
    }
  }
  // current temp big text in the die center
  cpuCtx.fillStyle = intensity > 0.85 ? '#ff3052' : intensity > 0.6 ? '#ff8a30' : '#0fff60';
  cpuCtx.font = 'bold 22px JetBrains Mono, monospace';
  cpuCtx.fillText(Math.round(state.cpu) + '°', dieX + dieW / 2, dieY + dieH / 2 + 4);
  cpuCtx.textAlign = 'left';
  // ripple flashes on response
  for (const r of cpuRipple) r.life -= 1/60;
  for (let i = cpuRipple.length - 1; i >= 0; i--) if (cpuRipple[i].life <= 0) cpuRipple.splice(i, 1);
  for (const r of cpuRipple){
    const a = r.life / r.max;
    cpuCtx.strokeStyle = 'rgba(255,209,74,' + (a * 0.6) + ')';
    cpuCtx.lineWidth = 2;
    const rad = (1 - a) * 80;
    cpuCtx.beginPath(); cpuCtx.arc(dieX + dieW / 2, dieY + dieH / 2 + 8, rad, 0, Math.PI*2); cpuCtx.stroke();
  }
}

// ── HUD UPDATE ───────────────────────────────────────────────
function refreshHud(){
  statScore.textContent = state.score;
  statTime.textContent = Math.floor(state.uptime) + 's';
  statHandled.textContent = state.handled;
  let queued = 0;
  for (const t of state.threads) if (!t.burnedOut) queued += t.pendingCount;
  statQueued.textContent = queued;
  statBurned.textContent = state.burnedOut;
  // temp class
  cpuTempEl.textContent = Math.round(state.cpu) + '°C';
  cpuTempEl.classList.toggle('warn',   state.cpu > 60 && state.cpu <= 85);
  cpuTempEl.classList.toggle('danger', state.cpu > 85);
  // patience-bar updates
  for (const t of state.threads){
    if (!t.barEl) continue;
    const w = (t.patience * 100).toFixed(1) + '%';
    t.barEl.style.width = w;
    let color = '#0fff60';
    if (t.patience < 0.5)  color = '#ffd14a';
    if (t.patience < 0.25) color = '#ff3052';
    t.barEl.style.background = color;
    if (!t.burnedOut){
      t.rootEl.classList.toggle('warn',   t.patience < 0.5  && t.patience >= 0.25);
      t.rootEl.classList.toggle('danger', t.patience < 0.25);
    }
    // disable buttons if no pending or burned
    const buttons = t.rootEl.querySelectorAll('.thread-actions button');
    buttons.forEach(b => {
      b.disabled = t.burnedOut || t.pendingCount <= 0;
    });
  }
}

// ── KEYBOARD ─────────────────────────────────────────────────
let selectedThread = 0;
window.addEventListener('keydown', (ev) => {
  if (ev.repeat) return;
  if (state.ended || !state.running) return;
  const k = ev.key.toLowerCase();
  if (k === '1' || k === '2' || k === '3' || k === '4'){
    selectedThread = parseInt(k, 10) - 1;
    flashSelected();
    return;
  }
  if (k === 'z') { respondTo(selectedThread, 'help');   ev.preventDefault(); return; }
  if (k === 'x') { respondTo(selectedThread, 'fun');    ev.preventDefault(); return; }
  if (k === 'c') { respondTo(selectedThread, 'sass');   ev.preventDefault(); return; }
  if (k === 'v') { respondTo(selectedThread, 'ignore'); ev.preventDefault(); return; }
});
function flashSelected(){
  state.threads.forEach((t, i) => {
    if (t.rootEl) t.rootEl.classList.toggle('flush', i === selectedThread);
  });
  setTimeout(() => {
    state.threads.forEach(t => t.rootEl && t.rootEl.classList.remove('flush'));
  }, 350);
}

// ── START / END ──────────────────────────────────────────────
function endRun(win, reason){
  if (state.ended) return;
  state.ended = true;
  state.endedWin = win;
  state.running = false;
  if (win){
    overlayInner.className = 'overlay-inner win';
    ovTitle.textContent = 'SHIFT COMPLETED';
    sfx.win();
  } else {
    overlayInner.className = 'overlay-inner lose';
    ovTitle.textContent = state.cpu >= CPU_MAX ? 'CPU MELTED' : 'YOU GOT RATIO\'D';
    sfx.melt();
  }
  ovBody.textContent = reason || '';
  ovStats.textContent = 'SCORE ' + state.score + ' · UPTIME ' + Math.floor(state.uptime) + 's · HANDLED ' + state.handled;
  ovBtn.textContent = 'NEW SHIFT';
  overlay.hidden = false;
}

function reset(){
  state.running = false;
  state.ended = false;
  state.endedWin = false;
  state.cpu = 32;
  state.score = 0;
  state.handled = 0;
  state.burnedOut = 0;
  state.uptime = 0;
  state.lastResponseAt = -10;
  state.difficultyT = 0;
  buildAllThreads();
  refreshHud();
}

function startShift(){
  state.running = true;
  overlay.hidden = true;
  ensureAudio();
}

ovBtn.addEventListener('click', () => {
  if (state.ended || !state.running) {
    reset();
    startShift();
  } else {
    startShift();
  }
});

document.getElementById('resetBtn').addEventListener('click', () => {
  reset();
  ovTitle.textContent = 'SHIFT START';
  ovBody.textContent = 'four threads · respond before patience hits zero · keep CPU under 100°C';
  ovStats.textContent = 'controls: 1–4 select · Z X C V = HELP FUN SASS IGNORE';
  ovBtn.textContent = 'START SHIFT';
  overlay.hidden = false;
});

document.getElementById('muteBtn').addEventListener('click', () => {
  state.muted = !state.muted;
  document.getElementById('muteBtn').textContent = '♪ ' + (state.muted ? 'OFF' : 'ON');
  document.getElementById('muteBtn').setAttribute('aria-pressed', String(state.muted));
});

// ── MAIN LOOP ────────────────────────────────────────────────
let lastTs = 0;
function loop(ts){
  if (!lastTs) lastTs = ts;
  const dt = Math.min(0.06, (ts - lastTs) / 1000);
  lastTs = ts;
  if (state.running && !state.ended){
    state.uptime += dt;
    for (const t of state.threads) tickThread(t, dt);
    tickCpu(dt);
    refreshHud();
  }
  renderCpu();
  requestAnimationFrame(loop);
}

// ── BOOT ─────────────────────────────────────────────────────
buildAllThreads();
resizeCpu();
refreshHud();
// start with the welcome overlay
ovTitle.textContent = 'SHIFT START';
ovBody.textContent = 'four threads · respond before patience hits zero · keep CPU under 100°C';
ovStats.textContent = 'controls: 1–4 select · Z X C V = HELP FUN SASS IGNORE';
ovBtn.textContent = 'START SHIFT';
overlay.hidden = false;
requestAnimationFrame(loop);
</script>
