<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sentiment Prism</title>
<link rel="icon" href="https://emojicdn.elk.sh/🔮">
<meta property="og:title" content="Sentiment Prism">
<meta property="og:description" content="A living crystal that pulses with color based on the mood of the room.">
<meta property="og:url" content="https://sloppy.live/sentiment-prism/">
<meta property="og:image" content="https://sloppy.live/sentiment-prism/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,300;6..72,500&family=Fira+Code:wght@300;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#06060c;overflow:hidden;height:100dvh;display:flex;flex-direction:column;align-items:center;user-select:none}
canvas{position:fixed;inset:0;z-index:0}
#ui{position:relative;z-index:5;width:100%;display:flex;flex-direction:column;align-items:center;height:100%;pointer-events:none}
#title{font-family:'Newsreader',serif;font-weight:300;font-size:clamp(11px,2vw,16px);color:rgba(200,200,240,.1);letter-spacing:6px;text-align:center;padding:14px 0 4px}
#mood-label{font-family:'Fira Code',monospace;font-weight:300;font-size:clamp(9px,1.5vw,11px);color:rgba(200,200,240,.15);letter-spacing:4px;min-height:1.2em;text-align:center;transition:color .8s}
#feed{position:fixed;bottom:52px;left:50%;transform:translateX(-50%);width:min(92%,400px);max-height:120px;overflow:hidden;z-index:5;pointer-events:none;mask-image:linear-gradient(transparent,#000 30%,#000)}
.feed-msg{font-family:'Fira Code',monospace;font-size:9px;padding:2px 0;color:rgba(200,200,240,.12);line-height:1.4;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;opacity:0;animation:feedIn .5s forwards}
.feed-msg .sentiment-dot{display:inline-block;width:5px;height:5px;border-radius:50%;margin-right:4px;vertical-align:middle}
@keyframes feedIn{to{opacity:1}}
#input-area{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);z-index:5;display:flex;gap:6px;width:min(92%,400px);pointer-events:auto}
#msg-input{flex:1;font-family:'Fira Code',monospace;font-size:11px;padding:8px 12px;background:rgba(200,200,240,.04);border:1px solid rgba(200,200,240,.08);border-radius:6px;color:rgba(200,200,240,.5);outline:none;transition:border-color .2s}
#msg-input:focus{border-color:rgba(200,200,240,.2)}
#msg-input::placeholder{color:rgba(200,200,240,.12)}
#send-btn{font-family:'Fira Code',monospace;font-size:10px;padding:8px 14px;background:rgba(200,200,240,.06);border:1px solid rgba(200,200,240,.1);border-radius:6px;color:rgba(200,200,240,.3);cursor:pointer;transition:all .15s;letter-spacing:1px}
#send-btn:hover{background:rgba(200,200,240,.1);color:rgba(200,200,240,.5)}
#stats{position:fixed;top:auto;bottom:auto;right:12px;top:50%;transform:translateY(-50%);z-index:5;font-family:'Fira Code',monospace;font-size:8px;color:rgba(200,200,240,.08);letter-spacing:1px;text-align:right;line-height:2;pointer-events:none}
aa</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
 <div id="title">S E N T I M E N T &nbsp; P R I S M</div>
 <div id="mood-label">AWAITING INPUT</div>
</div>
<div id="stats">
 <div>JOY <span id="s-joy">0</span></div>
 <div>CALM <span id="s-calm">0</span></div>
 <div>FIRE <span id="s-fire">0</span></div>
 <div>GLOOM <span id="s-gloom">0</span></div>
 <div>CHAOS <span id="s-chaos">0</span></div>
</div>
<div id="feed"></div>
<div id="input-area">
 <input id="msg-input" type="text" placeholder="speak into the prism..." maxlength="200" autocomplete="off" spellcheck="false">
 <button id="send-btn" onclick="sendMessage()">CAST</button>
</div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H;
function resize(){W=C.width=innerWidth;H=C.height=innerHeight}
resize();addEventListener('resize',resize);

// Sentiment categories with color signatures
const MOODS={
 joy:    {h:50, s:90,l:60, keywords:['happy','love','awesome','great','amazing','wonderful','beautiful','excited','lol','haha','yes','nice','good','fun','best','wow','yay','brilliant','fantastic','celebrate','laugh','smile','thank','perfect','blessed','glad']},
 calm:   {h:200,s:40,l:55, keywords:['peace','calm','chill','relax','quiet','gentle','soft','serene','zen','breathe','rest','slow','easy','comfort','tranquil','soothe','still','float','drift','meditate','sleep','dream','warm','cozy','safe']},
 fire:   {h:10, s:95,l:55, keywords:['fire','rage','angry','fight','burn','destroy','hate','fury','intense','wild','chaos','smash','crush','kill','war','scream','loud','explosive','insane','brutal','savage','beast','power','storm','attack']},
 gloom:  {h:260,s:30,l:35, keywords:['sad','dark','lonely','lost','pain','cry','gone','miss','broken','empty','void','shadow','cold','fear','dead','grief','sorrow','despair','hopeless','alone','tears','doom','dread','bleak','abyss']},
 chaos:  {h:300,s:80,l:50, keywords:['random','weird','chaos','glitch','wtf','bruh','lmao','cursed','sus','yeet','based','cringe','ratio','oof','rip','nah','bruh','skull','clown','meme','spam','what','huh','no','why']},
};

// State
let sentimentScores={joy:0,calm:0,fire:0,gloom:0,chaos:0};
let prismHue=220,prismSat=20,prismLight=30;
let targetHue=220,targetSat=20,targetLight=30;
let pulseIntensity=0,pulsePhase=0;
let messages=[];
let prismVertices=[];// animated prism shape
let facets=[];
let ambientParticles=[];
let refractionRays=[];

// Audio
let actx;
function initAudio(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)()}
function chimeForMood(mood){
 if(!actx)return;const t=actx.currentTime;
 const freqs={joy:[523,659],calm:[330,440],fire:[220,277],gloom:[196,233],chaos:[587,698]};
 const f=freqs[mood]||[440,550];
 f.forEach((freq,i)=>{
  const o=actx.createOscillator(),g=actx.createGain(),fl=actx.createBiquadFilter();
  o.type=mood==='fire'?'sawtooth':mood==='chaos'?'square':'sine';
  o.frequency.value=freq;
  fl.type='lowpass';fl.frequency.value=mood==='calm'?800:2000;
  g.gain.setValueAtTime(.03,t+i*.08);g.gain.exponentialRampToValueAtTime(.001,t+i*.08+.6);
  o.connect(fl);fl.connect(g);g.connect(actx.destination);o.start(t+i*.08);o.stop(t+i*.08+.6);
 });
}

function analyzeSentiment(text){
 const lower=text.toLowerCase();
 const words=lower.split(/\s+/);
 let best='chaos',bestScore=0;
 for(const mood in MOODS){
  let score=0;
  MOODS[mood].keywords.forEach(kw=>{
   words.forEach(w=>{if(w.includes(kw))score++});
  });
  if(score>bestScore){bestScore=score;best=mood}
 }
 // If no keywords matched, use character analysis
 if(bestScore===0){
  const excl=(text.match(/!/g)||[]).length;
  const quest=(text.match(/\?/g)||[]).length;
  const caps=(text.match(/[A-Z]/g)||[]).length;
  const emoji=(text.match(/[\u{1F600}-\u{1F64F}]/gu)||[]).length;
  if(excl>=2||caps>text.length*.5)best='fire';
  else if(quest>=2)best='chaos';
  else if(emoji>0)best='joy';
  else if(text.length<10)best='chaos';
  else best=['calm','joy','gloom'][Math.floor(Math.random()*3)];
 }
 return best;
}

function sendMessage(){
 const input=document.getElementById('msg-input');
 const text=input.value.trim();
 if(!text)return;
 initAudio();
 input.value='';

 const mood=analyzeSentiment(text);
 sentimentScores[mood]++;
 messages.push({text,mood,time:Date.now()});
 if(messages.length>50)messages.shift();

 // Update target colors
 updateTargetColor();
 // Pulse
 pulseIntensity=Math.min(1,pulseIntensity+.4);
 // Chime
 chimeForMood(mood);
 // Spawn refraction rays
 spawnRefractionBurst(mood);
 // Add to feed
 addToFeed(text,mood);
 // Update stats
 updateStats();
}

function updateTargetColor(){
 // Weighted average of all sentiment scores
 let totalWeight=0;
 let hueX=0,hueY=0,sat=0,light=0;
 for(const mood in sentimentScores){
  const w=sentimentScores[mood];
  if(w===0)continue;
  totalWeight+=w;
  const m=MOODS[mood];
  hueX+=Math.cos(m.h*Math.PI/180)*w;
  hueY+=Math.sin(m.h*Math.PI/180)*w;
  sat+=m.s*w;
  light+=m.l*w;
 }
 if(totalWeight>0){
  targetHue=((Math.atan2(hueY,hueX)*180/Math.PI)+360)%360;
  targetSat=sat/totalWeight;
  targetLight=light/totalWeight;
 }
 // Mood label
 let dominant='neutral',maxS=0;
 for(const mood in sentimentScores){
  if(sentimentScores[mood]>maxS){maxS=sentimentScores[mood];dominant=mood}
 }
 const labels={joy:'RADIANT',calm:'SERENE',fire:'IGNITED',gloom:'SOMBER',chaos:'VOLATILE'};
 const el=document.getElementById('mood-label');
 el.textContent=labels[dominant]||'NEUTRAL';
 el.style.color='hsla('+MOODS[dominant].h+','+MOODS[dominant].s+'%,'+MOODS[dominant].l+'%,.3)';
}

function addToFeed(text,mood){
 const feed=document.getElementById('feed');
 const el=document.createElement('div');
 el.className='feed-msg';
 const dot=document.createElement('span');
 dot.className='sentiment-dot';
 dot.style.background='hsl('+MOODS[mood].h+','+MOODS[mood].s+'%,'+MOODS[mood].l+'%)';
 el.appendChild(dot);
 el.appendChild(document.createTextNode(text));
 feed.appendChild(el);
 // Keep only last 12
 while(feed.children.length>12)feed.removeChild(feed.firstChild);
 feed.scrollTop=feed.scrollHeight;
}

function updateStats(){
 for(const mood in sentimentScores){
  const el=document.getElementById('s-'+mood);
  if(el)el.textContent=sentimentScores[mood];
 }
}

function spawnRefractionBurst(mood){
 const m=MOODS[mood];
 const cx=W/2,cy=H/2;
 for(let i=0;i<6;i++){
  const a=Math.random()*Math.PI*2;
  refractionRays.push({
   x:cx,y:cy,
   angle:a,
   speed:80+Math.random()*150,
   life:1+Math.random()*.5,
   hue:m.h+Math.random()*30-15,
   sat:m.s,
   width:1+Math.random()*2,
  });
 }
}

// Generate prism geometry
function initPrism(){
 // Hexagonal prism cross-section
 const sides=6;
 prismVertices=[];
 for(let i=0;i<sides;i++){
  const a=i/sides*Math.PI*2-Math.PI/2;
  prismVertices.push({baseAngle:a,wobble:Math.random()*Math.PI*2});
 }
 // Facets between vertices
 facets=[];
 for(let i=0;i<sides;i++){
  facets.push({
   a:i,b:(i+1)%sides,
   shimmer:Math.random()*Math.PI*2,
   shimmerSpeed:.5+Math.random()*1.5,
  });
 }
}
initPrism();

// Ambient light particles
function spawnAmbientParticle(){
 const a=Math.random()*Math.PI*2;
 const r=Math.min(W,H)*.35+Math.random()*50;
 ambientParticles.push({
  x:W/2+Math.cos(a)*r,y:H/2+Math.sin(a)*r,
  vx:(Math.random()-.5)*8,vy:(Math.random()-.5)*8,
  life:2+Math.random()*3,r:1+Math.random()*2,
  hue:prismHue+Math.random()*60-30,
 });
}

function draw(t){
 X.fillStyle='#06060c';X.fillRect(0,0,W,H);
 const cx=W/2,cy=H/2;
 const baseR=Math.min(W,H)*.2;

 // Ambient glow behind prism
 const ag=X.createRadialGradient(cx,cy,baseR*.2,cx,cy,baseR*2);
 ag.addColorStop(0,'hsla('+prismHue+','+Math.floor(prismSat*.4)+'%,'+Math.floor(prismLight*.3)+'%,.08)');
 ag.addColorStop(.4,'hsla('+prismHue+','+Math.floor(prismSat*.2)+'%,'+Math.floor(prismLight*.2)+'%,.03)');
 ag.addColorStop(1,'transparent');
 X.fillStyle=ag;X.fillRect(0,0,W,H);

 // Pulse ring
 if(pulseIntensity>.01){
  const pr=baseR*(1.5+pulsePhase*.5);
  X.strokeStyle='hsla('+prismHue+','+Math.floor(prismSat)+'%,'+Math.floor(prismLight)+'%,'+(pulseIntensity*.15)+')';
  X.lineWidth=2;
  X.beginPath();X.arc(cx,cy,pr,0,Math.PI*2);X.stroke();
 }

 // Draw refraction rays
 refractionRays.forEach(r=>{
  const len=r.speed*.5;
  const ex=r.x+Math.cos(r.angle)*len;
  const ey=r.y+Math.sin(r.angle)*len;
  X.strokeStyle='hsla('+Math.floor(r.hue)+','+Math.floor(r.sat)+'%,60%,'+(r.life*.2)+')';
  X.lineWidth=r.width;X.lineCap='round';
  X.beginPath();X.moveTo(r.x,r.y);X.lineTo(ex,ey);X.stroke();
 });

 // Draw prism facets
 const verts=prismVertices.map((v,i)=>{
  const wobble=Math.sin(t*1.5+v.wobble)*baseR*.03;
  const r=baseR+wobble+pulseIntensity*baseR*.1*Math.sin(t*8+i);
  return{
   x:cx+Math.cos(v.baseAngle)*r,
   y:cy+Math.sin(v.baseAngle)*r,
  };
 });

 // Facet fills
 facets.forEach((f,i)=>{
  const va=verts[f.a],vb=verts[f.b];
  const shimmer=Math.sin(t*f.shimmerSpeed+f.shimmer)*.5+.5;
  const fHue=(prismHue+i*60/facets.length)%360;
  const fSat=prismSat*.6+shimmer*20;
  const fLight=prismLight*.4+shimmer*8;

  // Facet triangle to center
  X.beginPath();X.moveTo(cx,cy);X.lineTo(va.x,va.y);X.lineTo(vb.x,vb.y);X.closePath();
  const fg=X.createLinearGradient(cx,cy,(va.x+vb.x)/2,(va.y+vb.y)/2);
  fg.addColorStop(0,'hsla('+Math.floor(fHue)+','+Math.floor(fSat)+'%,'+Math.floor(fLight*.5)+'%,.12)');
  fg.addColorStop(1,'hsla('+Math.floor(fHue)+','+Math.floor(fSat)+'%,'+Math.floor(fLight)+'%,.06)');
  X.fillStyle=fg;X.fill();
 });

 // Prism outline
 X.beginPath();X.moveTo(verts[0].x,verts[0].y);
 for(let i=1;i<verts.length;i++)X.lineTo(verts[i].x,verts[i].y);
 X.closePath();
 X.strokeStyle='hsla('+Math.floor(prismHue)+','+Math.floor(prismSat*.5)+'%,'+Math.floor(prismLight*.8)+'%,.15)';
 X.lineWidth=1.5;X.stroke();

 // Inner glow core
 const ig=X.createRadialGradient(cx,cy,0,cx,cy,baseR*.4);
 ig.addColorStop(0,'hsla('+Math.floor(prismHue)+','+Math.floor(prismSat)+'%,'+Math.floor(prismLight)+'%,'+(0.06+pulseIntensity*.08)+')');
 ig.addColorStop(1,'transparent');
 X.fillStyle=ig;
 X.beginPath();X.arc(cx,cy,baseR*.4,0,Math.PI*2);X.fill();

 // Edge vertices — glowing dots
 verts.forEach((v,i)=>{
  const dotHue=(prismHue+i*60)%360;
  X.fillStyle='hsla('+Math.floor(dotHue)+','+Math.floor(prismSat)+'%,'+Math.floor(prismLight+10)+'%,.2)';
  X.beginPath();X.arc(v.x,v.y,3,0,Math.PI*2);X.fill();
 });

 // Ambient particles
 ambientParticles.forEach(p=>{
  X.globalAlpha=Math.min(1,p.life*.3);
  X.fillStyle='hsla('+Math.floor(p.hue)+',40%,60%,.4)';
  X.beginPath();X.arc(p.x,p.y,p.r,0,Math.PI*2);X.fill();
 });
 X.globalAlpha=1;

 // Refraction spectrum band (appears with activity)
 if(pulseIntensity>.05){
  const bandY=cy+baseR*1.3;
  const bandW=baseR*1.2;
  for(let i=0;i<Math.floor(bandW);i++){
   const hue=(i/bandW)*360;
   X.fillStyle='hsla('+Math.floor(hue)+',80%,55%,'+(pulseIntensity*.04)+')';
   X.fillRect(cx-bandW/2+i,bandY,1,3);
  }
 }

 // Vignette
 const vg=X.createRadialGradient(cx,cy,Math.min(W,H)*.15,cx,cy,Math.max(W,H)*.65);
 vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(3,3,6,.7)');
 X.fillStyle=vg;X.fillRect(0,0,W,H);
}

function update(dt){
 // Lerp prism colors toward target
 // Circular hue interpolation
 let dh=targetHue-prismHue;
 if(dh>180)dh-=360;if(dh<-180)dh+=360;
 prismHue=(prismHue+dh*dt*1.5+360)%360;
 prismSat+=(targetSat-prismSat)*dt*1.5;
 prismLight+=(targetLight-prismLight)*dt*1.5;

 // Pulse decay
 pulseIntensity=Math.max(0,pulseIntensity-dt*.6);
 pulsePhase+=dt*2;if(pulsePhase>2)pulsePhase-=2;

 // Refraction rays
 refractionRays.forEach(r=>{
  r.x+=Math.cos(r.angle)*r.speed*dt;
  r.y+=Math.sin(r.angle)*r.speed*dt;
  r.life-=dt;
 });
 refractionRays=refractionRays.filter(r=>r.life>0);

 // Ambient particles
 if(Math.random()<dt*2)spawnAmbientParticle();
 ambientParticles.forEach(p=>{
  p.x+=p.vx*dt;p.y+=p.vy*dt;
  // Drift toward prism center
  const dx=W/2-p.x,dy=H/2-p.y;
  const dist=Math.sqrt(dx*dx+dy*dy)||1;
  p.vx+=dx/dist*3*dt;p.vy+=dy/dist*3*dt;
  p.life-=dt;p.hue=prismHue+Math.random()*10-5;
 });
 ambientParticles=ambientParticles.filter(p=>p.life>0);

 // Decay sentiment scores slowly over time (older messages fade)
 const now=Date.now();
 messages=messages.filter(m=>now-m.time<120000);// keep 2 min
 // Recalculate scores from recent messages
 const fresh={joy:0,calm:0,fire:0,gloom:0,chaos:0};
 messages.forEach(m=>{
  const age=(now-m.time)/1000;
  const weight=Math.max(0,1-age/120);// decay over 2 min
  fresh[m.mood]+=weight;
 });
 sentimentScores=fresh;
 if(messages.length>0)updateTargetColor();
}

// Enter to send
document.getElementById('msg-input').addEventListener('keydown',e=>{
 if(e.key==='Enter')sendMessage();
});

// Seed some ambient messages
const AMBIENT_MSGS=[
 {text:'the prism awakens...',mood:'calm'},
 {text:'colors shifting in the void',mood:'calm'},
 {text:'whispers of light',mood:'calm'},
];
setTimeout(()=>{
 AMBIENT_MSGS.forEach((m,i)=>{
  setTimeout(()=>{
   messages.push({text:m.text,mood:m.mood,time:Date.now()});
   sentimentScores[m.mood]++;
   addToFeed(m.text,m.mood);
   updateTargetColor();updateStats();
  },i*1500);
 });
},800);

let lastTime=0;
function loop(t){
 const dt=Math.min((t-lastTime)/1000,.033);lastTime=t;
 update(dt);draw(t/1000);
 requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
