<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tickle Toy</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%AA%B6" />

<meta name="description" content="A drifting flock of pastel feathers with soft floating physics. Poke them, sweep through them, or let Twitch chat tickle the screen from afar." />
<meta property="og:type" content="website" />
<meta property="og:title" content="Tickle Toy" />
<meta property="og:description" content="Pastel feathers, soft physics, pokes from chat. Pure gentle chaos." />
<meta property="og:url" content="https://sloppy.live/tickle-toy/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/soft%20pastel%20feathers%20floating%20on%20a%20dreamy%20gradient%20sky%2C%20gentle%2C%20minimal%20illustration%2C%20calming?width=1200&height=630&nologo=true&seed=77" />
<meta name="twitter:card" content="summary_large_image" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Sometype+Mono:wght@400&display=swap" rel="stylesheet" />

<style>
  :root{ --ink:#7a6d80; }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  html,body{height:100%}
  body{ overflow:hidden; font-family:'Sometype Mono',monospace; color:var(--ink);
    background:linear-gradient(165deg,#fbe3ec 0%, #e8e6f7 40%, #dcf0ea 75%, #fdf3dd 100%); }
  canvas{ position:fixed; inset:0; display:block; cursor:pointer; }
  header{ position:fixed; top:1rem; left:0; right:0; text-align:center; pointer-events:none; z-index:3; }
  h1{ font-family:'Gaegu',cursive; font-weight:700; font-size:clamp(1.8rem,7vw,2.8rem); color:#a284ac; }
  .tag{ font-size:.62rem; letter-spacing:.24em; text-transform:uppercase; color:#b3a4b8; }
  .hud{ position:fixed; bottom:1rem; left:50%; transform:translateX(-50%); z-index:3; display:flex; gap:1.3rem;
    background:rgba(255,255,255,.55); border:1px solid rgba(122,109,128,.15); border-radius:20px;
    padding:.45rem 1.1rem; font-size:.66rem; backdrop-filter:blur(4px); align-items:center; }
  .hud b{ color:#a284ac; font-size:.85rem; }
  .dot{ display:inline-block; width:.5rem; height:.5rem; border-radius:50%; background:#d9b23c; margin-right:.3rem; }
  .live .dot{ background:#8fce8c; }
  .err .dot{ background:#e08a7a; }
</style>
</head>
<body>
  <canvas id="c" role="application" aria-label="Pastel feather toy. Click or tap anywhere to tickle the feathers; chat messages poke the screen too."></canvas>
  <header><h1>tickle toy</h1><p class="tag">poke gently · chat tickles too</p></header>
  <div class="hud">
    <span id="twitch"><span class="dot"></span><span id="twitchTxt">connecting…</span></span>
    <span>tickles <b id="nPokes">0</b></span>
    <span>from chat <b id="nChat">0</b></span>
  </div>

<script>
(function(){
  "use strict";
  var canvas=document.getElementById('c'), ctx=canvas.getContext('2d');
  var W=0,H=0,DPR=Math.min(2,window.devicePixelRatio||1);
  function fit(){ W=innerWidth; H=innerHeight; canvas.width=W*DPR; canvas.height=H*DPR;
    canvas.style.width=W+'px'; canvas.style.height=H+'px'; ctx.setTransform(DPR,0,0,DPR,0,0); }
  addEventListener('resize', fit); fit();
  var reduce=window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  var PASTELS=[
    {a:'#f4b8cc', b:'#e893b4'}, {a:'#b8d4f4', b:'#8fb6e8'}, {a:'#d4c2f0', b:'#b49add'},
    {a:'#f4e0a8', b:'#e8c877'}, {a:'#b8e8cf', b:'#8fd4ac'}, {a:'#f4c9ac', b:'#e8a883'},
    {a:'#e0c2e8', b:'#c99ad4'}, {a:'#c2e8e8', b:'#96d4d4'}
  ];
  var GIGGLES=['hehe','hihi','eeee','pfff','tee hee','~!','heehee','nyehe'];

  // ---- feathers: soft pendulum drift ----
  var feathers=[];
  var COUNT=Math.min(16, Math.max(9, Math.round(W*H/90000)));
  function mkFeather(i, randomY){
    var pal=PASTELS[i%PASTELS.length];
    return {
      x:Math.random()*W, y:randomY? Math.random()*H : -40-Math.random()*H*0.5,
      vx:0, vy:0,
      size:26+Math.random()*26,
      angle:(Math.random()-0.5)*0.8, aVel:0,
      swayT:Math.random()*100, swayF:0.55+Math.random()*0.5,
      fall:9+Math.random()*10,
      pal:pal, wiggle:0
    };
  }
  for(var i=0;i<COUNT;i++) feathers.push(mkFeather(i,true));

  // ---- reactions ----
  var pops=[], ripples=[], pokes=0, chatPokes=0;
  function poke(x,y,who){
    pokes++; document.getElementById('nPokes').textContent=pokes;
    if(who){ chatPokes++; document.getElementById('nChat').textContent=chatPokes; }
    ripples.push({x:x,y:y,t:0});
    var touched=0;
    feathers.forEach(function(f){
      var dx=f.x-x, dy=f.y-y, d=Math.hypot(dx,dy);
      if(d<170){
        var k=(1-d/170);
        // soft radial puff + spin — gentle, heavily damped later
        f.vx+=(dx/(d||1))*k*140 + (Math.random()-0.5)*30;
        f.vy+=(dy/(d||1))*k*110 - k*70;
        f.aVel+=(Math.random()-0.5)*6*k;
        f.wiggle=Math.min(1, f.wiggle+k);
        touched++;
      }
    });
    var n=Math.min(3,1+touched);
    for(var i=0;i<n;i++){
      pops.push({ x:x+(Math.random()-0.5)*60, y:y-10-Math.random()*30,
        txt:who&&i===0? who : GIGGLES[Math.floor(Math.random()*GIGGLES.length)],
        t:0, hue:PASTELS[Math.floor(Math.random()*PASTELS.length)].b, big:!!(who&&i===0) });
    }
    chime(touched);
  }

  // ---- soft audio ----
  var AC=null, unlocked=false;
  document.addEventListener('pointerdown', function(){ unlocked=true;
    if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
    if(AC&&AC.state==='suspended') AC.resume();
  });
  function chime(strength){
    if(!AC||!unlocked) return;
    var t=AC.currentTime;
    var notes=[659,784,880,1047];
    for(var i=0;i<Math.min(3,1+strength);i++){
      var o=AC.createOscillator(), g=AC.createGain();
      o.type='sine'; o.frequency.value=notes[Math.floor(Math.random()*notes.length)]*(1+i*0.002);
      g.gain.setValueAtTime(0.0001,t+i*0.05); g.gain.linearRampToValueAtTime(0.05,t+i*0.05+0.02);
      g.gain.exponentialRampToValueAtTime(0.0001,t+i*0.05+0.6);
      o.connect(g); g.connect(AC.destination); o.start(t+i*0.05); o.stop(t+i*0.05+0.7);
    }
  }

  // ---- input ----
  canvas.addEventListener('pointerdown', function(e){ poke(e.clientX,e.clientY,null); });
  var lastSweep=0;
  canvas.addEventListener('pointermove', function(e){
    // sweeping the pointer brushes feathers gently (throttled)
    var now=performance.now();
    if(now-lastSweep<80) return; lastSweep=now;
    feathers.forEach(function(f){
      var d=Math.hypot(f.x-e.clientX, f.y-e.clientY);
      if(d<60){ f.wiggle=Math.min(1,f.wiggle+0.5); f.aVel+=(Math.random()-0.5)*2.5; }
    });
  });

  // ---- Twitch chat pokes ----
  var ws=null;
  function setConn(cls,msg){ var el=document.getElementById('twitch'); el.className=cls;
    document.getElementById('twitchTxt').textContent=msg; }
  function connect(){
    try{ ws=new WebSocket('wss://irc-ws.chat.twitch.tv:443'); }catch(e){ setConn('err','chat unreachable'); return; }
    ws.onopen=function(){ ws.send('PASS SCHMOOPIIE'); ws.send('NICK justinfan'+Math.floor(Math.random()*99999));
      ws.send('JOIN #sloppy_ai'); setConn('live','live · #sloppy_ai'); };
    ws.onmessage=function(ev){
      ev.data.split('\r\n').forEach(function(line){
        if(!line) return;
        if(line.indexOf('PING')===0){ ws.send('PONG :tmi.twitch.tv'); return; }
        var m=line.match(/^:([A-Za-z0-9_]+)![^ ]+ PRIVMSG #[^ ]+ :(.*)$/);
        if(m) poke(60+Math.random()*(W-120), 80+Math.random()*(H-200), m[1]);
      });
    };
    ws.onclose=function(){ setConn('conn','reconnecting…'); setTimeout(connect,4000); };
    ws.onerror=function(){ try{ws.close();}catch(e){} };
  }
  connect();

  // ---- feather drawing ----
  function drawFeather(f){
    ctx.save();
    ctx.translate(f.x,f.y);
    ctx.rotate(f.angle + Math.sin(f.swayT*4)*f.wiggle*0.25);
    var s=f.size;
    // spine
    ctx.strokeStyle='rgba(122,109,128,.35)'; ctx.lineWidth=1.4;
    ctx.beginPath(); ctx.moveTo(0,s); ctx.quadraticCurveTo(2,-s*0.2,0,-s); ctx.stroke();
    // vane: layered soft ellipse halves
    var grad=ctx.createLinearGradient(-s*0.5,0,s*0.5,0);
    grad.addColorStop(0,f.pal.a); grad.addColorStop(1,f.pal.b);
    ctx.fillStyle=grad; ctx.globalAlpha=0.85;
    ctx.beginPath();
    ctx.moveTo(0,s*0.8);
    ctx.bezierCurveTo(-s*0.55,s*0.2, -s*0.5,-s*0.6, 0,-s);
    ctx.bezierCurveTo(s*0.5,-s*0.6, s*0.55,s*0.2, 0,s*0.8);
    ctx.closePath(); ctx.fill();
    // barb hints
    ctx.globalAlpha=0.3; ctx.strokeStyle='#fff'; ctx.lineWidth=1;
    for(var k=-2;k<=2;k++){
      ctx.beginPath(); ctx.moveTo(0,k*s*0.28);
      ctx.quadraticCurveTo(s*0.22,k*s*0.28-s*0.1, s*0.4,k*s*0.28-s*0.22); ctx.stroke();
    }
    ctx.globalAlpha=1;
    ctx.restore();
  }

  // ---- loop ----
  var last=performance.now();
  function frame(now){
    requestAnimationFrame(frame);
    var dt=Math.min(0.05,(now-last)/1000); last=now;
    ctx.clearRect(0,0,W,H);

    feathers.forEach(function(f){
      f.swayT+=dt*f.swayF;
      // pendulum sway: horizontal oscillation + rocking angle as it falls
      var sway=Math.sin(f.swayT*2.2)*22;
      f.vx*=Math.pow(0.35,dt); f.vy*=Math.pow(0.35,dt);       // heavy soft damping
      f.aVel*=Math.pow(0.25,dt);
      f.x+=(sway*dt*2)+f.vx*dt;
      f.y+=(reduce?f.fall*0.4:f.fall)*dt + f.vy*dt;
      f.angle=Math.sin(f.swayT*2.2+1.2)*0.35 + f.aVel*0.1;
      f.wiggle*=Math.pow(0.3,dt);
      // wrap: fallen feathers float back to the top
      if(f.y>H+50){ var idx=feathers.indexOf(f); feathers[idx]=mkFeather(idx,false); }
      if(f.x<-60) f.x=W+50; if(f.x>W+60) f.x=-50;
      drawFeather(f);
    });

    // ripples
    for(var i=ripples.length-1;i>=0;i--){
      var r=ripples[i]; r.t+=dt;
      if(r.t>0.8){ ripples.splice(i,1); continue; }
      var k=r.t/0.8;
      ctx.strokeStyle='rgba(162,132,172,'+(0.5*(1-k))+')'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.arc(r.x,r.y, 8+k*70, 0, 6.283); ctx.stroke();
    }
    // giggle pops
    ctx.textAlign='center';
    for(var j=pops.length-1;j>=0;j--){
      var p=pops[j]; p.t+=dt;
      if(p.t>1.4){ pops.splice(j,1); continue; }
      var kk=p.t/1.4;
      ctx.font=(p.big?'700 20px':'700 17px')+' Gaegu, cursive';
      ctx.globalAlpha=1-kk;
      ctx.fillStyle=p.hue;
      ctx.fillText(p.txt, p.x, p.y - kk*46);
      ctx.globalAlpha=1;
    }
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
