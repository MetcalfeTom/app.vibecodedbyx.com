<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ragdoll Gears</title>
<link rel="icon" href="https://emojicdn.elk.sh/⚙️">
<meta property="og:title" content="Ragdoll Gears">
<meta property="og:description" content="Throw ragdolls into giant spinning gears. Pure chaos.">
<meta property="og:url" content="https://sloppy.live/ragdoll-gears/">
<meta property="og:image" content="https://sloppy.live/ragdoll-gears/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0c;overflow:hidden;cursor:crosshair;user-select:none}
canvas{display:block;width:100vw;height:100vh}
#hud{position:fixed;top:0;left:0;right:0;z-index:5;display:flex;justify-content:space-between;padding:10px 16px;pointer-events:none}
#count{font-family:'Chakra Petch',sans-serif;font-size:22px;font-weight:700;color:#f80;text-shadow:0 0 12px rgba(255,120,0,.3)}
#hint{font-family:'Share Tech Mono',monospace;font-size:10px;color:rgba(255,255,255,.15);letter-spacing:2px;align-self:center}
#controls{text-align:right}
#controls span{font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(255,120,0,.2);display:block;line-height:1.6}
a#backlink{position:fixed;bottom:6px;left:8px;color:rgba(255,255,255,.03);font-size:7px;text-decoration:none;z-index:5}
a#backlink:hover{color:rgba(255,255,255,.15)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
 <div id="count">0</div>
 <div id="hint">CLICK & DRAG TO THROW</div>
 <div id="controls">
  <span>R — RESET</span>
  <span>G — ADD GEAR</span>
  <span>+/- GEAR SPEED</span>
 </div>
</div>
<a id="backlink" href="https://sloppy.live">sloppy.live</a>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H;
const GRAVITY=800;
const DAMPING=.98;
const JOINT_STIFFNESS=.4;
const ITERATIONS=8;
const BOUNCE=.5;
const FRICTION=.7;
const BODY_COLORS=['#f44','#4af','#fa4','#4f4','#f4f','#ff4','#4ff','#f84'];
const GEAR_COLOR='#1a1a22';
const GEAR_EDGE='#333340';
const GEAR_TEETH='#22222e';

// Audio
let actx;
function initAudio(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)()}
function playImpact(force){
 if(!actx)return;
 const vol=Math.min(1,force/500)*.3;if(vol<.02)return;
 const o=actx.createOscillator(),g=actx.createGain();
 o.type='square';o.frequency.setValueAtTime(40+Math.random()*30,actx.currentTime);
 o.frequency.exponentialRampToValueAtTime(20,actx.currentTime+.1);
 g.gain.setValueAtTime(vol,actx.currentTime);
 g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.15);
 o.connect(g);g.connect(actx.destination);o.start();o.stop(actx.currentTime+.15);
}
function playCrunch(){
 if(!actx)return;
 const bufSz=actx.sampleRate*.06,buf=actx.createBuffer(1,bufSz,actx.sampleRate);
 const d=buf.getChannelData(0);for(let i=0;i<bufSz;i++)d[i]=(Math.random()*2-1)*(.8-i/bufSz*.7);
 const s=actx.createBufferSource(),f=actx.createBiquadFilter(),g=actx.createGain();
 f.type='bandpass';f.frequency.value=800+Math.random()*400;f.Q.value=3;
 g.gain.setValueAtTime(.2,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.06);
 s.buffer=buf;s.connect(f);f.connect(g);g.connect(actx.destination);s.start();
}
function playGearGrind(){
 if(!actx)return;
 const bufSz=actx.sampleRate*.12,buf=actx.createBuffer(1,bufSz,actx.sampleRate);
 const d=buf.getChannelData(0);for(let i=0;i<bufSz;i++){const t=i/actx.sampleRate;d[i]=Math.sin(t*200)*(.5-i/bufSz*.5)+(Math.random()-.5)*.3}
 const s=actx.createBufferSource(),lp=actx.createBiquadFilter(),g=actx.createGain();
 lp.type='lowpass';lp.frequency.value=600;
 g.gain.setValueAtTime(.1,actx.currentTime);g.gain.exponentialRampToValueAtTime(.001,actx.currentTime+.12);
 s.buffer=buf;s.connect(lp);lp.connect(g);g.connect(actx.destination);s.start();
}

// Gears
let gears=[];
let gearSpeed=1;
function initGears(){
 gears=[];
 const s=Math.min(W,H);
 // Default gear layout
 addGear(W*.35,H*.55,s*.18,16,1);
 addGear(W*.65,H*.55,s*.15,14,-1.3);
 addGear(W*.5,H*.8,s*.12,12,1.6);
}
function addGear(x,y,r,teeth,dir){
 gears.push({x,y,radius:r,teeth,dir,angle:0});
}
function addRandomGear(){
 const s=Math.min(W,H);
 const r=s*(.08+Math.random()*.12);
 const x=r+Math.random()*(W-2*r);
 const y=H*.3+Math.random()*(H*.6);
 const teeth=8+Math.floor(Math.random()*10);
 const dir=Math.random()>.5?1:-1;
 addGear(x,y,r,teeth,dir*(1+Math.random()));
}

// Ragdoll
let bodies=[];
let particles=[];
let bloodSplats=[];

function createRagdoll(x,y,vx,vy){
 const color=BODY_COLORS[Math.floor(Math.random()*BODY_COLORS.length)];
 const scale=.7+Math.random()*.5;
 const nodes=[];
 const constraints=[];
 // Node layout: 0=head, 1=neck, 2=chest, 3=hip, 4=lhand, 5=rhand, 6=lelbow, 7=relbow, 8=lknee, 9=rknee, 10=lfoot, 11=rfoot
 const def=[
  {ox:0,oy:-28,r:7},   //0 head
  {ox:0,oy:-20,r:3},   //1 neck
  {ox:0,oy:-8,r:5},    //2 chest
  {ox:0,oy:5,r:4},     //3 hip
  {ox:-16,oy:-6,r:3},  //4 lhand
  {ox:16,oy:-6,r:3},   //5 rhand
  {ox:-10,oy:-14,r:3}, //6 lelbow
  {ox:10,oy:-14,r:3},  //7 relbow
  {ox:-6,oy:18,r:3},   //8 lknee
  {ox:6,oy:18,r:3},    //9 rknee
  {ox:-8,oy:32,r:3},   //10 lfoot
  {ox:8,oy:32,r:3},    //11 rfoot
 ];
 def.forEach(d=>{
  nodes.push({x:x+d.ox*scale,y:y+d.oy*scale,ox:x+d.ox*scale,oy:y+d.oy*scale,vx:vx+(Math.random()-.5)*40,vy:vy+(Math.random()-.5)*40,r:d.r*scale,pinned:false});
 });
 // Constraints: [a, b, length]
 const links=[[0,1],[1,2],[2,3],[1,6],[6,4],[1,7],[7,5],[3,8],[8,10],[3,9],[9,11],[2,6],[2,7],[0,2],[2,8],[2,9]];
 links.forEach(([a,b])=>{
  const dx=nodes[a].x-nodes[b].x,dy=nodes[a].y-nodes[b].y;
  constraints.push({a,b,len:Math.sqrt(dx*dx+dy*dy)});
 });
 bodies.push({nodes,constraints,color,alive:true,grindTimer:0});
 updateCount();
}

function updateCount(){document.getElementById('count').textContent=bodies.length}

// Particles
function spawnSpark(x,y,color){
 for(let i=0;i<3;i++){
  const a=Math.random()*Math.PI*2,sp=50+Math.random()*150;
  particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,color,r:1+Math.random()*2,type:'spark'});
 }
}
function spawnBlood(x,y){
 for(let i=0;i<5;i++){
  const a=Math.random()*Math.PI*2,sp=30+Math.random()*80;
  particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:1,color:'#f22',r:2+Math.random()*3,type:'blood'});
 }
 bloodSplats.push({x,y,r:4+Math.random()*8,alpha:.6});
}

// Physics
function simulate(dt){
 bodies.forEach(body=>{
  if(!body.alive)return;
  body.grindTimer=Math.max(0,body.grindTimer-dt);
  body.nodes.forEach(n=>{
   if(n.pinned)return;
   n.vx*=DAMPING;n.vy*=DAMPING;
   n.vy+=GRAVITY*dt;
   n.x+=n.vx*dt;n.y+=n.vy*dt;
  });
  // Constraints
  for(let iter=0;iter<ITERATIONS;iter++){
   body.constraints.forEach(c=>{
    const a=body.nodes[c.a],b=body.nodes[c.b];
    let dx=b.x-a.x,dy=b.y-a.y;
    const dist=Math.sqrt(dx*dx+dy*dy)||.001;
    const diff=(dist-c.len)/dist*JOINT_STIFFNESS;
    dx*=diff;dy*=diff;
    if(!a.pinned){a.x+=dx;a.y+=dy}
    if(!b.pinned){b.x-=dx;b.y-=dy}
   });
  }
  // Walls
  body.nodes.forEach(n=>{
   if(n.y+n.r>H){n.y=H-n.r;n.vy*=-BOUNCE;n.vx*=FRICTION;if(Math.abs(n.vy)>50)playImpact(Math.abs(n.vy))}
   if(n.y-n.r<0){n.y=n.r;n.vy*=-BOUNCE}
   if(n.x-n.r<0){n.x=n.r;n.vx*=-BOUNCE}
   if(n.x+n.r>W){n.x=W-n.r;n.vx*=-BOUNCE}
  });
  // Gear collision
  gears.forEach(gear=>{
   body.nodes.forEach(n=>{
    const dx=n.x-gear.x,dy=n.y-gear.y;
    const dist=Math.sqrt(dx*dx+dy*dy);
    const overlap=gear.radius+n.r-dist;
    if(overlap>0&&dist>.01){
     // Push out
     const nx=dx/dist,ny=dy/dist;
     n.x+=nx*overlap*.8;n.y+=ny*overlap*.8;
     // Apply gear rotation as tangential force
     const tangentX=-ny*gear.dir*gearSpeed*300;
     const tangentY=nx*gear.dir*gearSpeed*300;
     n.vx+=tangentX*dt*2;n.vy+=tangentY*dt*2;
     // Bounce off
     const dot=n.vx*nx+n.vy*ny;
     if(dot<0){n.vx-=dot*nx*1.2;n.vy-=dot*ny*1.2}
     // Effects
     if(body.grindTimer<=0){
      spawnSpark(n.x,n.y,body.color);
      if(Math.random()<.3)spawnBlood(n.x,n.y);
      if(Math.random()<.15){playCrunch();playGearGrind()}
      body.grindTimer=.05;
     }
    }
    // Gear teeth — check inner notches for extra chaos
    if(dist<gear.radius*1.1&&dist>gear.radius*.7){
     const angle=Math.atan2(dy,dx)-gear.angle;
     const toothAngle=Math.PI*2/gear.teeth;
     const inTooth=((angle%toothAngle)+toothAngle)%toothAngle;
     if(inTooth<toothAngle*.4){
      // In a tooth gap — extra grab force
      const grabX=-ny*gear.dir*gearSpeed*500;
      const grabY=nx*gear.dir*gearSpeed*500;
      n.vx+=grabX*dt;n.vy+=grabY*dt;
     }
    }
   });
  });
 });
 // Particles
 particles.forEach(p=>{
  p.vy+=GRAVITY*.5*dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.life-=dt*2;
  if(p.type==='blood'&&p.y>H-2){p.y=H-2;p.vy=0;p.vx*=.8;bloodSplats.push({x:p.x,y:p.y,r:p.r,alpha:.4})}
 });
 particles=particles.filter(p=>p.life>0);
 // Cap blood splats
 if(bloodSplats.length>300)bloodSplats.splice(0,bloodSplats.length-300);
}

// Drawing
function drawGear(g){
 X.save();X.translate(g.x,g.y);X.rotate(g.angle);
 const r=g.radius,tr=r*.13,teeth=g.teeth;
 // Outer teeth
 X.beginPath();
 for(let i=0;i<teeth;i++){
  const a1=i/teeth*Math.PI*2;
  const a2=(i+.35)/teeth*Math.PI*2;
  const a3=(i+.65)/teeth*Math.PI*2;
  const a4=(i+1)/teeth*Math.PI*2;
  const ir=r*.85;
  if(i===0)X.moveTo(Math.cos(a1)*r,Math.sin(a1)*r);
  X.lineTo(Math.cos(a2)*r,Math.sin(a2)*r);
  X.lineTo(Math.cos(a2)*(r+tr),Math.sin(a2)*(r+tr));
  X.lineTo(Math.cos(a3)*(r+tr),Math.sin(a3)*(r+tr));
  X.lineTo(Math.cos(a3)*r,Math.sin(a3)*r);
  X.lineTo(Math.cos(a4)*r,Math.sin(a4)*r);
 }
 X.closePath();
 X.fillStyle=GEAR_COLOR;X.fill();
 X.strokeStyle=GEAR_EDGE;X.lineWidth=2;X.stroke();
 // Inner circle
 X.beginPath();X.arc(0,0,r*.35,0,Math.PI*2);
 X.fillStyle='#0e0e12';X.fill();
 X.strokeStyle=GEAR_EDGE;X.lineWidth=2;X.stroke();
 // Spokes
 X.strokeStyle='#1a1a24';X.lineWidth=3;
 for(let i=0;i<4;i++){
  const a=i/4*Math.PI*2;
  X.beginPath();X.moveTo(Math.cos(a)*r*.35,Math.sin(a)*r*.35);
  X.lineTo(Math.cos(a)*r*.82,Math.sin(a)*r*.82);X.stroke();
 }
 // Center bolt
 X.beginPath();X.arc(0,0,r*.1,0,Math.PI*2);
 X.fillStyle='#252530';X.fill();X.strokeStyle='#333';X.lineWidth=1;X.stroke();
 // Hex bolt
 X.beginPath();
 for(let i=0;i<6;i++){const a=i/6*Math.PI*2;const m=i===0?'moveTo':'lineTo';X[m](Math.cos(a)*r*.06,Math.sin(a)*r*.06)}
 X.closePath();X.strokeStyle='#444';X.lineWidth=1;X.stroke();
 X.restore();
}

function drawRagdoll(body){
 const n=body.nodes;const c=body.color;
 X.lineWidth=3;X.lineCap='round';X.strokeStyle=c;
 // Torso
 X.globalAlpha=.8;
 X.beginPath();X.moveTo(n[1].x,n[1].y);X.lineTo(n[2].x,n[2].y);X.lineTo(n[3].x,n[3].y);X.stroke();
 // Arms
 X.beginPath();X.moveTo(n[4].x,n[4].y);X.lineTo(n[6].x,n[6].y);X.lineTo(n[1].x,n[1].y);X.stroke();
 X.beginPath();X.moveTo(n[5].x,n[5].y);X.lineTo(n[7].x,n[7].y);X.lineTo(n[1].x,n[1].y);X.stroke();
 // Legs
 X.beginPath();X.moveTo(n[3].x,n[3].y);X.lineTo(n[8].x,n[8].y);X.lineTo(n[10].x,n[10].y);X.stroke();
 X.beginPath();X.moveTo(n[3].x,n[3].y);X.lineTo(n[9].x,n[9].y);X.lineTo(n[11].x,n[11].y);X.stroke();
 // Head
 X.fillStyle=c;X.beginPath();X.arc(n[0].x,n[0].y,n[0].r,0,Math.PI*2);X.fill();
 // Eyes (two dots)
 const hx=n[0].x,hy=n[0].y,hr=n[0].r;
 X.fillStyle='#000';
 X.beginPath();X.arc(hx-hr*.3,hy-hr*.15,1.5,0,Math.PI*2);X.fill();
 X.beginPath();X.arc(hx+hr*.3,hy-hr*.15,1.5,0,Math.PI*2);X.fill();
 // Joints
 X.globalAlpha=.5;X.fillStyle=c;
 [1,2,3,6,7,8,9].forEach(i=>{X.beginPath();X.arc(n[i].x,n[i].y,n[i].r*.7,0,Math.PI*2);X.fill()});
 // Hands/feet
 X.globalAlpha=.7;
 [4,5,10,11].forEach(i=>{X.beginPath();X.arc(n[i].x,n[i].y,n[i].r,0,Math.PI*2);X.fill()});
 X.globalAlpha=1;
}

function draw(){
 X.fillStyle='#0a0a0c';X.fillRect(0,0,W,H);
 // Floor
 X.fillStyle='#0e0e12';X.fillRect(0,H-4,W,4);
 X.strokeStyle='#1a1a20';X.lineWidth=1;
 X.beginPath();X.moveTo(0,H-4);X.lineTo(W,H-4);X.stroke();
 // Blood splats
 bloodSplats.forEach(s=>{
  X.globalAlpha=s.alpha;X.fillStyle='#a00';
  X.beginPath();X.arc(s.x,s.y,s.r,0,Math.PI*2);X.fill();
 });
 X.globalAlpha=1;
 // Gears
 gears.forEach(drawGear);
 // Ragdolls
 bodies.forEach(drawRagdoll);
 // Particles
 particles.forEach(p=>{
  X.globalAlpha=p.life;X.fillStyle=p.color;
  if(p.type==='spark'){
   X.fillRect(p.x-p.r/2,p.y-p.r/2,p.r,p.r);
  }else{
   X.beginPath();X.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);X.fill();
  }
 });
 X.globalAlpha=1;
 // Drag line
 if(dragging&&dragStart){
  const dx=dragStart.x-dragCurr.x,dy=dragStart.y-dragCurr.y;
  const len=Math.sqrt(dx*dx+dy*dy);
  X.strokeStyle='rgba(255,120,0,.3)';X.lineWidth=2;X.setLineDash([6,4]);
  X.beginPath();X.moveTo(dragStart.x,dragStart.y);X.lineTo(dragCurr.x,dragCurr.y);X.stroke();
  X.setLineDash([]);
  // Arrow at start
  if(len>20){
   const nx=dx/len,ny=dy/len;
   X.fillStyle='rgba(255,120,0,.4)';
   X.beginPath();
   X.moveTo(dragStart.x+nx*12,dragStart.y+ny*12);
   X.lineTo(dragStart.x+ny*6,dragStart.y-nx*6);
   X.lineTo(dragStart.x-ny*6,dragStart.y+nx*6);
   X.closePath();X.fill();
  }
  // Power indicator
  const power=Math.min(len/300,1);
  X.fillStyle=`rgba(255,${Math.floor(120*(1-power))},0,.5)`;
  X.font='700 12px Chakra Petch';X.textAlign='center';
  X.fillText(Math.floor(power*100)+'%',dragStart.x,dragStart.y-16);
 }
 // Vignette
 const vg=X.createRadialGradient(W/2,H/2,Math.min(W,H)*.3,W/2,H/2,Math.max(W,H)*.7);
 vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(0,0,0,.5)');
 X.fillStyle=vg;X.fillRect(0,0,W,H);
}

// Input
let dragging=false,dragStart=null,dragCurr=null;
function getPos(e){
 const t=e.touches?e.touches[0]:e;
 return{x:t.clientX,y:t.clientY};
}
C.addEventListener('mousedown',e=>{initAudio();dragging=true;dragStart=getPos(e);dragCurr={...dragStart}});
C.addEventListener('mousemove',e=>{if(dragging)dragCurr=getPos(e)});
C.addEventListener('mouseup',e=>{
 if(dragging&&dragStart){
  const end=getPos(e);
  const dx=dragStart.x-end.x,dy=dragStart.y-end.y;
  const power=Math.min(Math.sqrt(dx*dx+dy*dy)/300,1);
  createRagdoll(dragStart.x,dragStart.y,dx*3*power,dy*3*power);
 }
 dragging=false;dragStart=null;
});
C.addEventListener('touchstart',e=>{e.preventDefault();initAudio();dragging=true;dragStart=getPos(e);dragCurr={...dragStart}},{passive:false});
C.addEventListener('touchmove',e=>{e.preventDefault();if(dragging)dragCurr=getPos(e)},{passive:false});
C.addEventListener('touchend',e=>{
 e.preventDefault();
 if(dragging&&dragStart){
  const t=e.changedTouches[0];
  const dx=dragStart.x-t.clientX,dy=dragStart.y-t.clientY;
  const power=Math.min(Math.sqrt(dx*dx+dy*dy)/300,1);
  createRagdoll(dragStart.x,dragStart.y,dx*3*power,dy*3*power);
 }
 dragging=false;dragStart=null;
},{passive:false});

document.addEventListener('keydown',e=>{
 if(e.key==='r'||e.key==='R'){bodies=[];particles=[];bloodSplats=[];updateCount()}
 if(e.key==='g'||e.key==='G'){addRandomGear()}
 if(e.key==='='||e.key==='+'){gearSpeed=Math.min(4,gearSpeed+.3)}
 if(e.key==='-'){gearSpeed=Math.max(.2,gearSpeed-.3)}
});

function resize(){
 W=C.width=window.innerWidth;H=C.height=window.innerHeight;
 if(gears.length===0)initGears();
}
resize();window.addEventListener('resize',resize);

let lastTime=0;
function loop(t){
 const dt=Math.min((t-lastTime)/1000,.033);lastTime=t;
 // Rotate gears
 gears.forEach(g=>{g.angle+=g.dir*gearSpeed*dt*1.5});
 simulate(dt);
 draw();
 requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
