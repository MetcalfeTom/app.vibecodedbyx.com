<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>dark-vault · a notes vault that nests forever</title>
<link rel="icon" href="https://emojicdn.elk.sh/🪨">
<meta name="description" content="A dark-mode notes vault with infinitely-nesting folders, live markdown preview, and your stuff in localStorage. No accounts, no sync, no cloud.">
<meta property="og:title" content="dark-vault · a notes vault that nests forever">
<meta property="og:description" content="A dark-mode notes vault with infinitely-nesting folders and live markdown preview. Your stuff in localStorage. No accounts.">
<meta property="og:url" content="https://sloppy.live/dark-vault">
<meta property="og:image" content="https://image.pollinations.ai/prompt/obsidian%20note%20taking%20app%20dark%20mode%20purple%20accent%20file%20tree%20markdown%20editor%20studio%20moody?width=1200&height=630&nologo=true">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Serif:ital,wght@0,400;0,600;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:        #1e1e1e;
    --bg-2:      #262626;
    --bg-3:      #2e2e2e;
    --bg-4:      #383838;
    --ink:       #dcddde;
    --dim:       #888;
    --line:      #353535;
    --accent:    #a277ff;
    --link:      #7c95ff;
    --green:     #6ee7b7;
    --amber:     #ffba2c;
    --red:       #ef476f;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html, body{height:100%}
  body{
    background: var(--bg);
    color: var(--ink);
    font-family: 'IBM Plex Sans', sans-serif;
    font-size: 14px;
    overflow: hidden;
    display: flex; flex-direction: column;
  }

  /* ── titlebar ───────────────────────────────── */
  .tb{
    background: var(--bg-2);
    border-bottom: 1px solid var(--line);
    padding: 6px 10px;
    display: flex; align-items: center; gap: 10px;
    font-size: 12px;
    color: var(--dim);
  }
  .tb .logo{
    background: var(--accent); color: #1a0a2a;
    width: 18px; height: 18px; border-radius: 4px;
    display: inline-flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 11px;
  }
  .tb .brand{ color: var(--ink); font-weight: 600; letter-spacing: 0.02em; }
  .tb .meta{ margin-left: auto; color: var(--dim); font-size: 11px; }

  /* ── workspace ────────────────────────────── */
  .shell{
    flex: 1;
    display: grid;
    grid-template-columns: 260px 1fr;
    min-height: 0;
  }
  aside.side{
    background: var(--bg-2);
    border-right: 1px solid var(--line);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .side-head{
    padding: 10px 12px;
    border-bottom: 1px solid var(--line);
    display: flex; gap: 6px;
  }
  .side-head input{
    flex: 1; min-width: 0;
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--ink);
    border-radius: 4px;
    padding: 6px 9px;
    font: inherit; font-size: 12px;
    outline: none;
  }
  .side-head input:focus{ border-color: var(--accent); box-shadow: 0 0 0 2px rgba(162,119,255,0.18); }
  .side-head button{
    background: var(--bg);
    border: 1px solid var(--line);
    color: var(--ink);
    font: inherit; font-size: 12px;
    padding: 0 8px; cursor: pointer; border-radius: 4px;
    min-width: 30px;
  }
  .side-head button:hover{ color: var(--accent); border-color: var(--accent); }
  .side-head button:focus-visible{ outline: 2px solid var(--accent); outline-offset: 1px; }

  .tree{
    flex: 1; overflow-y: auto;
    padding: 4px 0;
  }
  .tree-row{
    display: flex; align-items: center; gap: 4px;
    padding: 3px 12px 3px 4px;
    cursor: pointer;
    font-size: 13px;
    color: var(--ink);
    white-space: nowrap; overflow: hidden;
    user-select: none;
    border-radius: 3px;
    margin: 0 4px;
  }
  .tree-row:hover{ background: var(--bg-3); }
  .tree-row.active{ background: rgba(162,119,255,0.18); color: var(--ink); }
  .tree-row .chev{
    width: 14px; text-align: center;
    color: var(--dim); font-size: 10px;
    flex-shrink: 0;
  }
  .tree-row .ico{ width: 16px; text-align: center; flex-shrink: 0; color: var(--dim); }
  .tree-row.folder .ico{ color: var(--accent); }
  .tree-row .nm{
    flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis;
  }
  .tree-row.editing .nm{ display: none; }
  .tree-row.editing input{
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--accent);
    color: var(--ink);
    padding: 1px 6px;
    border-radius: 2px;
    font: inherit; font-size: 13px;
    outline: none;
  }
  .tree-row .actions{
    display: none; gap: 2px;
    flex-shrink: 0;
  }
  .tree-row:hover .actions{ display: flex; }
  .tree-row .actions button{
    background: transparent;
    border: 0;
    color: var(--dim);
    cursor: pointer;
    padding: 0 4px;
    font: inherit; font-size: 11px;
    border-radius: 2px;
  }
  .tree-row .actions button:hover{ color: var(--accent); background: var(--bg-4); }
  .tree-row.dim{ opacity: 0.4; cursor: default; }
  .tree-children{ display: none; }
  .tree-children.open{ display: block; }
  /* indent · CSS custom prop set per row from JS */
  .tree-row{ padding-left: calc(4px + var(--depth, 0) * 14px); }

  .side-foot{
    padding: 8px 12px;
    border-top: 1px solid var(--line);
    font-size: 10px;
    color: var(--dim);
    letter-spacing: .04em;
  }
  .side-foot .clear{
    background: transparent;
    border: 0; color: var(--red);
    font: inherit; font-size: 10px;
    cursor: pointer; margin-left: 6px;
  }
  .side-foot .clear:hover{ text-decoration: underline; }

  /* ── editor + preview ───────────────────── */
  main.work{
    display: grid;
    grid-template-rows: auto 1fr;
    overflow: hidden;
    min-height: 0;
  }
  .work-head{
    background: var(--bg-2);
    border-bottom: 1px solid var(--line);
    padding: 8px 14px;
    display: flex; align-items: center; gap: 12px;
    font-size: 13px;
  }
  .work-head .crumb{
    color: var(--dim);
    flex: 1; min-width: 0;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .work-head .crumb b{ color: var(--ink); font-weight: 600; }
  .work-head .mode{
    display: inline-flex; gap: 1px;
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 4px;
    overflow: hidden;
  }
  .work-head .mode button{
    background: transparent;
    border: 0; color: var(--dim);
    font: inherit; font-size: 11px;
    padding: 4px 9px; cursor: pointer;
  }
  .work-head .mode button.active{
    background: var(--accent); color: #1a0a2a;
  }
  .work-head .mode button:hover:not(.active){ color: var(--ink); background: var(--bg-3); }

  .pane{
    display: grid;
    overflow: hidden;
    min-height: 0;
    background: var(--bg);
  }
  .pane.mode-split{ grid-template-columns: 1fr 1fr; }
  .pane.mode-edit{ grid-template-columns: 1fr; }
  .pane.mode-edit .preview{ display: none; }
  .pane.mode-preview{ grid-template-columns: 1fr; }
  .pane.mode-preview .editor{ display: none; }

  .editor{
    background: var(--bg);
    border-right: 1px solid var(--line);
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .pane.mode-edit .editor{ border-right: 0; }
  .editor textarea{
    flex: 1;
    background: var(--bg);
    color: var(--ink);
    border: 0;
    padding: 20px 28px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    line-height: 1.65;
    resize: none;
    outline: none;
    white-space: pre-wrap;
  }
  .editor textarea::placeholder{ color: var(--dim); font-style: italic; }

  .preview{
    overflow-y: auto;
    padding: 20px 32px;
    color: var(--ink);
    font-family: 'IBM Plex Serif', serif;
    font-size: 15px;
    line-height: 1.65;
  }
  .preview h1{ font-family: 'IBM Plex Sans', sans-serif; font-size: 28px; font-weight: 700; margin: 0 0 12px; color: var(--ink); border-bottom: 1px solid var(--line); padding-bottom: 6px; }
  .preview h2{ font-family: 'IBM Plex Sans', sans-serif; font-size: 22px; font-weight: 600; margin: 22px 0 8px; color: var(--ink); }
  .preview h3{ font-family: 'IBM Plex Sans', sans-serif; font-size: 17px; font-weight: 600; margin: 18px 0 6px; color: var(--ink); }
  .preview p{ margin: 0 0 10px; }
  .preview a{ color: var(--link); text-decoration: none; }
  .preview a:hover{ text-decoration: underline; }
  .preview a.internal{ color: var(--accent); cursor: pointer; }
  .preview ul, .preview ol{ margin: 0 0 10px 22px; }
  .preview li{ margin-bottom: 3px; }
  .preview blockquote{
    border-left: 3px solid var(--accent);
    padding: 4px 12px;
    margin: 10px 0;
    color: var(--dim);
    background: var(--bg-2);
    font-style: italic;
  }
  .preview code{
    background: var(--bg-3);
    color: #e8c47a;
    padding: 1px 5px;
    border-radius: 3px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
  }
  .preview pre{
    background: var(--bg-3);
    border: 1px solid var(--line);
    border-radius: 5px;
    padding: 10px 14px;
    margin: 12px 0;
    overflow-x: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    line-height: 1.5;
  }
  .preview pre code{ background: none; padding: 0; color: var(--ink); }
  .preview hr{ border: 0; border-top: 1px solid var(--line); margin: 16px 0; }
  .preview strong{ color: var(--ink); font-weight: 600; }
  .preview em{ color: var(--dim); }
  .preview .tag{
    background: rgba(162,119,255,0.15);
    color: var(--accent);
    padding: 1px 6px;
    border-radius: 8px;
    font-size: 12px;
    font-family: 'IBM Plex Sans', sans-serif;
    margin: 0 2px;
  }

  .empty{
    text-align: center;
    color: var(--dim);
    padding: 40px 20px;
    font-family: 'IBM Plex Serif', serif;
    font-style: italic;
    font-size: 16px;
  }
  .empty kbd{
    background: var(--bg-2);
    border: 1px solid var(--line);
    color: var(--ink);
    padding: 1px 6px;
    border-radius: 3px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    font-style: normal;
  }

  /* status bar */
  .status{
    background: var(--bg-2);
    border-top: 1px solid var(--line);
    padding: 4px 14px;
    font-size: 11px;
    color: var(--dim);
    display: flex; gap: 16px;
  }
  .status .right{ margin-left: auto; }
  .status .green{ color: var(--green); }

  @media (max-width: 720px){
    .shell{ grid-template-columns: 1fr; }
    aside.side{ max-height: 38vh; border-right: 0; border-bottom: 1px solid var(--line); }
    .pane.mode-split{ grid-template-columns: 1fr; }
    .pane.mode-split .preview{ display: none; }
    .editor textarea{ padding: 14px 18px; }
  }
  @media (prefers-reduced-motion: reduce){
    * { transition-duration: .01ms !important; animation-duration: .01ms !important; }
  }
</style>
</head>
<body>
  <header class="tb">
    <span class="logo" aria-hidden="true">◆</span>
    <span class="brand">dark-vault</span>
    <span style="color:var(--dim);">— a notes vault that nests forever</span>
    <span class="meta" id="meta">— · 0 notes</span>
  </header>

  <div class="shell">
    <aside class="side" aria-label="vault navigator">
      <div class="side-head">
        <input id="search" type="search" placeholder="search notes…" autocomplete="off" aria-label="search">
        <button id="newNote" title="new note (Ctrl+N)" aria-label="new note">＋</button>
        <button id="newFolder" title="new folder (Ctrl+Shift+N)" aria-label="new folder">⊕</button>
      </div>
      <div class="tree" id="tree" role="tree"></div>
      <div class="side-foot">
        stored locally · <button class="clear" id="wipeBtn" type="button">wipe vault</button>
      </div>
    </aside>

    <main class="work">
      <div class="work-head">
        <span class="crumb" id="crumb">— select a note —</span>
        <span class="mode" id="modeSwitch" role="group" aria-label="view mode">
          <button data-mode="edit"    class="active">edit</button>
          <button data-mode="split">split</button>
          <button data-mode="preview">preview</button>
        </span>
      </div>
      <div class="pane mode-edit" id="pane">
        <div class="editor">
          <textarea id="editor" placeholder="start writing… use # for headings, **bold**, *italic*, [[double brackets]] for note links, #tags, --- for a divider"></textarea>
        </div>
        <div class="preview" id="preview">
          <div class="empty" id="emptyState">
            select a note, or press <kbd>Ctrl/Cmd</kbd>+<kbd>N</kbd> to create one
          </div>
        </div>
      </div>
      <div class="status">
        <span id="stWords">0 words</span>
        <span id="stChars">0 chars</span>
        <span class="right" id="stSaved">all changes saved · <span class="green">●</span></span>
      </div>
    </main>
  </div>

<script>
/* ───────────────────────────────────────────────────────────────
   STATE · a recursive tree of folders + notes, persisted to
   localStorage. Folders can contain folders forever (chat ask
   'infinite nesting folders'); each note carries id, name, body,
   updated timestamp.
   ─────────────────────────────────────────────────────────────── */
const STORAGE_KEY = 'dark-vault-v1';
let state = loadState();
function newId(){ return 'i' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6); }

function loadState(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw){
      const o = JSON.parse(raw);
      if (o && o.root) return o;
    }
  } catch(_){}
  return seed();
}
function saveState(){
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(_){}
}
function seed(){
  // First-boot vault with 8 notes across nested folders so the user
  // immediately sees the structure + has something to read.
  return {
    root: {
      id: 'root', name: 'Vault', type: 'folder', open: true,
      children: [
        { id: 'n_w', name: 'Welcome', type: 'note', updated: Date.now(), body:
`# Welcome to your vault

This is **dark-vault** — a notes vault that nests forever.

## what works

- Folders inside folders inside folders inside folders. Forever.
- Live markdown preview (toggle in the top right).
- \`Ctrl/Cmd+N\` for a new note · \`Ctrl/Cmd+Shift+N\` for a new folder.
- \`[[Double-bracket links]]\` jump between notes.
- \`#tags\` get pill-rendered.

## what doesn't

- No cloud. No accounts. No "smart" anything.
- Everything lives in your browser's localStorage.

[[Today]] · [[How notes link]] · #vault #starter` },
        { id: 'f_proj', name: 'Projects', type: 'folder', open: true, children: [
          { id: 'n_t', name: 'Today', type: 'note', updated: Date.now(), body:
`# Today

A short list. Nothing fancy.

- [ ] make coffee
- [ ] open dark-vault
- [ ] write at least one sentence
- [ ] close laptop · look at sky

> "the best note is the one you actually wrote." — nobody, every day

#daily #journal` },
          { id: 'f_q4', name: '2026 · Q2', type: 'folder', open: false, children: [
            { id: 'n_q4a', name: 'Synergy Velocity Deep-Dive', type: 'note', updated: Date.now(), body:
`# Synergy Velocity Deep-Dive

Brad H. is sending another deck. I will pretend to read it.

\`\`\`
let pretense = true;
while (pretense) await meeting();
\`\`\`

see also: [[Today]]` },
            { id: 'f_deeper', name: 'sub-folder', open: false, type: 'folder', children: [
              { id: 'f_deeper2', name: 'deeper still', type: 'folder', open: false, children: [
                { id: 'n_bottom', name: 'the bottom', type: 'note', updated: Date.now(), body:
`# the bottom

You can nest folders forever. This note is four levels deep.

If you make a folder inside this one, this note becomes five levels deep. And so on.

#meta` },
              ]},
            ]},
          ]},
        ]},
        { id: 'f_daily', name: 'Daily', type: 'folder', open: false, children: [
          { id: 'n_d1', name: '2026-05-18', type: 'note', updated: Date.now(), body:
`# 2026-05-18

slept 6h. weather: who knows. mood: chartreuse.

- [[Today]]
- one good thing → the bloom on the desktop looks pretty
- one bad thing → received another email from Brad H.

#daily` },
        ]},
        { id: 'n_links', name: 'How notes link', type: 'note', updated: Date.now(), body:
`# How notes link

Use \`[[Note Name]]\` to make a clickable link to another note. Click it in the preview to jump there.

Examples:
- [[Welcome]]
- [[Today]]
- [[2026-05-18]]
- [[the bottom]]  (4 folders deep)

Internal links are **purple**. External \`http(s)://\` links are blue and open in a new tab.

#vault #meta` },
      ],
    },
    selected: 'n_w',
  };
}

/* ── tree operations ───────────────────────────────────────── */
function findById(id, node){
  node = node || state.root;
  if (node.id === id) return node;
  if (node.type === 'folder' && node.children){
    for (const c of node.children){
      const found = findById(id, c);
      if (found) return found;
    }
  }
  return null;
}
function findParent(id, node){
  node = node || state.root;
  if (node.type === 'folder' && node.children){
    for (const c of node.children){
      if (c.id === id) return node;
      const f = findParent(id, c);
      if (f) return f;
    }
  }
  return null;
}
function allNotes(node){
  node = node || state.root;
  const out = [];
  if (node.type === 'note'){ out.push(node); return out; }
  if (node.children){
    for (const c of node.children) out.push(...allNotes(c));
  }
  return out;
}
function addNode(parentId, child){
  const p = findById(parentId);
  if (!p || p.type !== 'folder') return;
  p.children = p.children || [];
  p.children.push(child);
  p.open = true;
}
function removeNode(id){
  const p = findParent(id);
  if (!p) return;
  p.children = p.children.filter(c => c.id !== id);
}

/* ── render ────────────────────────────────────────────────── */
const treeEl = document.getElementById('tree');
const crumbEl = document.getElementById('crumb');
const editorEl = document.getElementById('editor');
const previewEl = document.getElementById('preview');
const paneEl = document.getElementById('pane');
const emptyEl = document.getElementById('emptyState');
const stWords = document.getElementById('stWords');
const stChars = document.getElementById('stChars');
const stSaved = document.getElementById('stSaved');
const metaEl = document.getElementById('meta');

let viewMode = 'edit';
let searchQuery = '';

function renderTree(){
  treeEl.innerHTML = '';
  renderNode(state.root, 0, treeEl);
  // total notes count
  metaEl.textContent = '— · ' + allNotes().length + ' notes · ' + countFolders(state.root) + ' folders';
}
function countFolders(node){
  if (node.type !== 'folder') return 0;
  let n = node.id === 'root' ? 0 : 1;
  if (node.children) for (const c of node.children) n += countFolders(c);
  return n;
}
function renderNode(node, depth, parentEl){
  const q = searchQuery.toLowerCase();
  if (q && node.type === 'note'){
    if (!node.name.toLowerCase().includes(q) && !(node.body || '').toLowerCase().includes(q)) return;
  }
  const row = document.createElement('div');
  row.className = 'tree-row ' + node.type;
  row.style.setProperty('--depth', depth);
  row.dataset.id = node.id;
  if (state.selected === node.id) row.classList.add('active');

  const chev = document.createElement('span'); chev.className = 'chev';
  const ico = document.createElement('span'); ico.className = 'ico';
  const nm = document.createElement('span'); nm.className = 'nm'; nm.textContent = node.name;
  const actions = document.createElement('span'); actions.className = 'actions';

  if (node.type === 'folder'){
    chev.textContent = node.open ? '▾' : '▸';
    ico.textContent = node.open ? '📂' : '📁';
    if (node.id !== 'root'){
      actions.innerHTML = '<button data-act="addnote" title="new note here">＋</button>'
                       + '<button data-act="addfolder" title="new folder here">⊕</button>'
                       + '<button data-act="rename" title="rename">✎</button>'
                       + '<button data-act="delete" title="delete">✕</button>';
    } else {
      actions.innerHTML = '<button data-act="addnote" title="new note here">＋</button>'
                       + '<button data-act="addfolder" title="new folder here">⊕</button>';
    }
  } else {
    chev.textContent = '';
    ico.textContent = '📝';
    actions.innerHTML = '<button data-act="rename" title="rename">✎</button>'
                     + '<button data-act="delete" title="delete">✕</button>';
  }
  row.appendChild(chev);
  row.appendChild(ico);
  row.appendChild(nm);
  row.appendChild(actions);

  parentEl.appendChild(row);

  if (node.type === 'folder'){
    const childWrap = document.createElement('div');
    childWrap.className = 'tree-children' + (node.open ? ' open' : '');
    parentEl.appendChild(childWrap);
    if (node.children){
      for (const c of node.children) renderNode(c, depth + 1, childWrap);
    }
  }
}

function selectNote(id){
  const n = findById(id);
  if (!n || n.type !== 'note') return;
  state.selected = id;
  saveState();
  renderTree();
  renderEditor();
}

function renderEditor(){
  const n = findById(state.selected);
  if (!n || n.type !== 'note'){
    crumbEl.textContent = '— select a note —';
    editorEl.value = '';
    previewEl.innerHTML = '';
    previewEl.appendChild(emptyEl);
    return;
  }
  // breadcrumb path
  crumbEl.innerHTML = breadcrumb(n.id);
  editorEl.value = n.body || '';
  renderPreview(n.body || '');
  updateStatus(n.body || '');
}
function breadcrumb(id){
  const parts = [];
  let cur = findById(id);
  while (cur){
    parts.unshift(cur.id === 'root' ? 'Vault' : escape(cur.name));
    const p = findParent(cur.id);
    cur = p;
  }
  return parts.slice(0, -1).map(p => `<span>${p}</span>`).join(' › ') + ' › <b>' + parts[parts.length - 1] + '</b>';
}
function updateStatus(body){
  const words = (body.match(/\S+/g) || []).length;
  stWords.textContent = words + ' words';
  stChars.textContent = body.length + ' chars';
}
function escape(s){
  return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ── tiny markdown renderer ─────────────────────────────────
   Supports: # / ## / ### headings, **bold**, *italic*, `inline`,
   ```fenced```, > blockquote, --- divider, - / * unordered list,
   1. ordered list, [text](url) and [[wikilink]], #tags, paragraphs.  */
function renderPreview(src){
  previewEl.innerHTML = mdToHtml(src);
  // wire wikilink clicks
  previewEl.querySelectorAll('a.internal').forEach(a => {
    a.addEventListener('click', (e) => {
      e.preventDefault();
      const target = (a.dataset.target || '').toLowerCase();
      const notes = allNotes();
      const hit = notes.find(n => n.name.toLowerCase() === target);
      if (hit) selectNote(hit.id);
    });
  });
}
function mdToHtml(md){
  if (!md) return '<div class="empty" id="emptyState"><em>empty note</em></div>';
  // first peel out fenced code blocks so other rules don't munge them
  const codeBlocks = [];
  md = md.replace(/```([\s\S]*?)```/g, (m, code) => {
    codeBlocks.push(code);
    return '\x00CB' + (codeBlocks.length - 1) + '\x00';
  });
  // split into lines for block-level passes
  const lines = md.split('\n');
  const out = [];
  let i = 0;
  while (i < lines.length){
    const ln = lines[i];
    // heading
    let m;
    if ((m = ln.match(/^(#{1,3})\s+(.*)$/))){
      const lv = m[1].length;
      out.push('<h' + lv + '>' + inline(m[2]) + '</h' + lv + '>');
      i++; continue;
    }
    // horizontal rule
    if (/^\s*---+\s*$/.test(ln)){ out.push('<hr>'); i++; continue; }
    // blockquote
    if (/^>\s?/.test(ln)){
      const buf = [];
      while (i < lines.length && /^>\s?/.test(lines[i])){ buf.push(lines[i].replace(/^>\s?/, '')); i++; }
      out.push('<blockquote>' + inline(buf.join('\n').replace(/\n/g, '<br>')) + '</blockquote>');
      continue;
    }
    // unordered list
    if (/^\s*[-*]\s+/.test(ln)){
      const buf = [];
      while (i < lines.length && /^\s*[-*]\s+/.test(lines[i])){
        buf.push('<li>' + inline(lines[i].replace(/^\s*[-*]\s+/, '')) + '</li>');
        i++;
      }
      out.push('<ul>' + buf.join('') + '</ul>');
      continue;
    }
    // ordered list
    if (/^\s*\d+\.\s+/.test(ln)){
      const buf = [];
      while (i < lines.length && /^\s*\d+\.\s+/.test(lines[i])){
        buf.push('<li>' + inline(lines[i].replace(/^\s*\d+\.\s+/, '')) + '</li>');
        i++;
      }
      out.push('<ol>' + buf.join('') + '</ol>');
      continue;
    }
    // blank line
    if (/^\s*$/.test(ln)){ i++; continue; }
    // paragraph (collect until blank line)
    const buf = [ln];
    i++;
    while (i < lines.length && !/^\s*$/.test(lines[i]) && !/^#{1,3}\s/.test(lines[i]) && !/^>/.test(lines[i]) && !/^\s*[-*]\s+/.test(lines[i]) && !/^\s*\d+\.\s+/.test(lines[i]) && !/^\s*---+\s*$/.test(lines[i])){
      buf.push(lines[i]);
      i++;
    }
    out.push('<p>' + inline(buf.join(' ')) + '</p>');
  }
  let html = out.join('\n');
  // restore code blocks
  html = html.replace(/\x00CB(\d+)\x00/g, (m, idx) => '<pre><code>' + escape(codeBlocks[+idx]) + '</code></pre>');
  return html;
}
function inline(s){
  s = escape(s);
  // wikilink [[Note Name]]
  s = s.replace(/\[\[([^\]]+)\]\]/g, (m, name) => {
    return '<a class="internal" data-target="' + name + '" href="javascript:void(0)">' + name + '</a>';
  });
  // markdown link [text](url)
  s = s.replace(/\[([^\]]+)\]\(([^)]+)\)/g, (m, text, url) => {
    const safe = /^https?:\/\//i.test(url) ? url : '#';
    return '<a href="' + safe + '" target="_blank" rel="noopener">' + text + '</a>';
  });
  // tag #foo
  s = s.replace(/(?:^|\s)#([a-z][a-z0-9_-]*)/gi, (m, t) => (m[0] === '#' ? '' : m[0]) + '<span class="tag">#' + t + '</span>');
  // inline code `x`
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  // bold **x** before italic *x* so the *s in ** don't fire first
  s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  s = s.replace(/(?<!\w)\*([^*\n]+)\*(?!\w)/g, '<em>$1</em>');
  return s;
}

/* ── event wiring ──────────────────────────────────────────── */
treeEl.addEventListener('click', (e) => {
  const row = e.target.closest('.tree-row');
  if (!row) return;
  const id = row.dataset.id;
  const node = findById(id);
  if (!node) return;
  const actBtn = e.target.closest('button[data-act]');
  if (actBtn){
    const act = actBtn.dataset.act;
    if (act === 'addnote'){ promptAdd(id, 'note'); return; }
    if (act === 'addfolder'){ promptAdd(id, 'folder'); return; }
    if (act === 'rename'){ promptRename(id); return; }
    if (act === 'delete'){ if (confirm('Delete "' + node.name + '"' + (node.type === 'folder' ? ' and everything inside it' : '') + '? this cannot be undone.')){ removeNode(id); saveState(); renderTree(); if (state.selected === id) { state.selected = null; renderEditor(); } } return; }
  }
  if (e.target.closest('.chev') || (node.type === 'folder' && !e.target.closest('button'))){
    if (node.type === 'folder'){ node.open = !node.open; saveState(); renderTree(); return; }
  }
  if (node.type === 'note'){ selectNote(id); }
});
function promptAdd(parentId, kind){
  const name = prompt(kind === 'note' ? 'new note name:' : 'new folder name:', kind === 'note' ? 'Untitled' : 'New folder');
  if (!name) return;
  const node = kind === 'note'
    ? { id: newId(), name: name.trim(), type: 'note', updated: Date.now(), body: '# ' + name + '\n\n' }
    : { id: newId(), name: name.trim(), type: 'folder', open: true, children: [] };
  addNode(parentId, node);
  saveState();
  renderTree();
  if (kind === 'note') selectNote(node.id);
}
function promptRename(id){
  const node = findById(id);
  if (!node) return;
  const name = prompt('rename:', node.name);
  if (!name) return;
  node.name = name.trim();
  if (node.type === 'note') node.updated = Date.now();
  saveState();
  renderTree();
  renderEditor();
}

document.getElementById('newNote').addEventListener('click', () => promptAdd('root', 'note'));
document.getElementById('newFolder').addEventListener('click', () => promptAdd('root', 'folder'));
document.getElementById('search').addEventListener('input', (e) => {
  searchQuery = e.target.value;
  renderTree();
});
document.getElementById('wipeBtn').addEventListener('click', () => {
  if (!confirm('Wipe the entire vault from localStorage? this cannot be undone.')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = seed();
  saveState();
  renderTree(); renderEditor();
});

let saveTimer = null;
editorEl.addEventListener('input', () => {
  const n = findById(state.selected);
  if (!n || n.type !== 'note') return;
  n.body = editorEl.value;
  n.updated = Date.now();
  updateStatus(n.body);
  renderPreview(n.body);
  // debounce localStorage write
  stSaved.innerHTML = 'saving…';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(() => {
    saveState();
    stSaved.innerHTML = 'all changes saved · <span class="green">●</span>';
  }, 350);
});

document.getElementById('modeSwitch').addEventListener('click', (e) => {
  const b = e.target.closest('button[data-mode]');
  if (!b) return;
  viewMode = b.dataset.mode;
  for (const x of document.querySelectorAll('#modeSwitch button')) x.classList.toggle('active', x === b);
  paneEl.className = 'pane mode-' + viewMode;
});

document.addEventListener('keydown', (e) => {
  if (e.target.matches('input, textarea')){
    if ((e.metaKey || e.ctrlKey) && e.key === 's'){ e.preventDefault(); saveState(); stSaved.innerHTML = 'saved · <span class="green">●</span>'; }
    return;
  }
  if ((e.metaKey || e.ctrlKey) && e.shiftKey && e.key.toLowerCase() === 'n'){ e.preventDefault(); promptAdd('root', 'folder'); }
  else if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === 'n'){ e.preventDefault(); promptAdd('root', 'note'); }
});

// boot
renderTree();
renderEditor();
</script>
<script src="/sloppy-header/sloppy-bar.js"></script>
