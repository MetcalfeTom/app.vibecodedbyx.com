<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Oracle</title>
<link rel="icon" href="https://emojicdn.elk.sh/🔮">
<meta name="description" content="Seek cryptic digital prophecies from the glowing oracle.">
<meta property="og:title" content="Neon Oracle">
<meta property="og:description" content="Tap the crystal ball. Receive your digital fate.">
<meta property="og:url" content="https://sloppy.live/neon-oracle">
<meta property="og:image" content="https://sloppy.live/neon-oracle/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Fira+Code:wght@300;400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0a0612;--purple:#8b5cf6;--cyan:#22d3ee;--magenta:#d946ef;
--indigo:#4f46e5;--deep:#1e1040;--glow:rgba(139,92,246,.5);
}
html,body{height:100%;overflow-x:hidden}
body{
background:var(--bg);
color:#e2d6ff;
font-family:'Fira Code',monospace;
display:flex;flex-direction:column;align-items:center;
min-height:100vh;
position:relative;
}
/* Vignette */
body::after{
content:'';position:fixed;inset:0;pointer-events:none;z-index:100;
background:radial-gradient(ellipse at center,transparent 50%,rgba(5,2,15,.7) 100%);
animation:vignettePulse 4s ease-in-out infinite;
}
@keyframes vignettePulse{0%,100%{opacity:.8}50%{opacity:1}}

/* Circuit pattern background */
.circuit-bg{
position:fixed;inset:0;opacity:.06;pointer-events:none;z-index:0;
background-image:
  linear-gradient(var(--purple) 1px,transparent 1px),
  linear-gradient(90deg,var(--purple) 1px,transparent 1px),
  radial-gradient(circle 2px,var(--cyan) 100%,transparent 100%);
background-size:60px 60px,60px 60px,60px 60px;
background-position:0 0,0 0,30px 30px;
}

/* Binary runes */
.binary-runes{
position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden;opacity:.08;
font-family:'Fira Code',monospace;font-size:11px;color:var(--cyan);
}
.rune-col{
position:absolute;top:-100%;
animation:runefall linear infinite;
white-space:nowrap;writing-mode:vertical-lr;
}
@keyframes runefall{0%{transform:translateY(0)}100%{transform:translateY(200vh)}}

/* Particle canvas */
#particles{position:fixed;inset:0;z-index:2;pointer-events:none}

.main{
position:relative;z-index:10;
display:flex;flex-direction:column;align-items:center;
padding:80px 20px 100px;
max-width:600px;width:100%;
}

h1{
font-family:'Cinzel',serif;font-weight:900;
font-size:clamp(1.8rem,5vw,2.8rem);
text-transform:uppercase;letter-spacing:.15em;
background:linear-gradient(135deg,var(--cyan),var(--purple),var(--magenta));
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
background-clip:text;
text-shadow:none;
margin-bottom:8px;
filter:drop-shadow(0 0 20px var(--glow));
}
.subtitle{
font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;
color:rgba(139,92,246,.6);margin-bottom:40px;
}

/* Crystal ball container */
.orb-wrap{
position:relative;width:220px;height:220px;margin:0 auto 30px;
cursor:pointer;
}
.orb-wrap:hover .orb{filter:brightness(1.15)}

.orb{
width:100%;height:100%;border-radius:50%;position:relative;
background:radial-gradient(circle at 35% 35%,rgba(34,211,238,.3),transparent 50%),
           radial-gradient(circle at 65% 65%,rgba(217,70,239,.4),transparent 50%),
           radial-gradient(circle at 50% 50%,var(--deep),#0a0612);
box-shadow:
  0 0 40px var(--glow),
  0 0 80px rgba(79,70,229,.3),
  inset 0 0 60px rgba(139,92,246,.2);
overflow:hidden;
transition:box-shadow .3s,filter .3s;
}
.orb::before{
content:'';position:absolute;inset:-10%;border-radius:50%;
background:conic-gradient(from 0deg,transparent,var(--purple),transparent,var(--cyan),transparent,var(--magenta),transparent);
opacity:.3;
animation:orbSpin 6s linear infinite;
}
.orb::after{
content:'';position:absolute;inset:5%;border-radius:50%;
background:radial-gradient(circle at 30% 25%,rgba(255,255,255,.15),transparent 60%);
}
@keyframes orbSpin{to{transform:rotate(360deg)}}

.orb-inner{
position:absolute;inset:10%;border-radius:50%;
background:radial-gradient(circle at 40% 40%,rgba(34,211,238,.15),transparent 60%),
           radial-gradient(circle at 60% 60%,rgba(217,70,239,.2),transparent 60%);
animation:orbSwirl 4s ease-in-out infinite alternate;
}
@keyframes orbSwirl{
0%{transform:scale(1) rotate(0deg);opacity:.6}
100%{transform:scale(1.1) rotate(180deg);opacity:1}
}

/* Orb ring */
.orb-ring{
position:absolute;inset:-15px;border-radius:50%;
border:1px solid rgba(139,92,246,.2);
animation:ringPulse 3s ease-in-out infinite;
}
.orb-ring:nth-child(2){inset:-25px;animation-delay:1s;border-color:rgba(34,211,238,.15)}
.orb-ring:nth-child(3){inset:-35px;animation-delay:2s;border-color:rgba(217,70,239,.1)}
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.03);opacity:1}}

/* Active state */
.orb-wrap.active .orb{
box-shadow:
  0 0 80px var(--glow),
  0 0 160px rgba(79,70,229,.5),
  inset 0 0 80px rgba(139,92,246,.4);
}
.orb-wrap.active .orb::before{animation-duration:1s}
.orb-wrap.active .orb-inner{animation-duration:1s}

/* Burst particles */
.burst{
position:absolute;width:6px;height:6px;border-radius:50%;
pointer-events:none;
}
@keyframes burstOut{
0%{transform:translate(-50%,-50%) scale(1);opacity:1}
100%{transform:translate(-50%,-50%) scale(0);opacity:0}
}

/* Screen pulse on activation */
@keyframes screenPulse{
0%{box-shadow:inset 0 0 100px rgba(139,92,246,.3)}
100%{box-shadow:inset 0 0 0 transparent}
}
body.pulse::before{
content:'';position:fixed;inset:0;z-index:99;pointer-events:none;
animation:screenPulse .6s ease-out forwards;
}

/* Seek button */
.seek-btn{
font-family:'Cinzel',serif;font-weight:700;
font-size:clamp(.75rem,2.5vw,1rem);
letter-spacing:.2em;text-transform:uppercase;
color:var(--cyan);
background:transparent;
border:1px solid rgba(34,211,238,.3);
padding:12px 36px;
cursor:pointer;
position:relative;overflow:hidden;
transition:all .3s;
margin-bottom:30px;
}
.seek-btn:hover{
border-color:var(--cyan);
box-shadow:0 0 20px rgba(34,211,238,.3),inset 0 0 20px rgba(34,211,238,.1);
color:#fff;
}
.seek-btn:disabled{opacity:.4;cursor:default;pointer-events:none}
.seek-btn::after{
content:'';position:absolute;inset:0;
background:linear-gradient(90deg,transparent,rgba(34,211,238,.1),transparent);
transform:translateX(-100%);
}
.seek-btn:hover::after{animation:btnShine 1s forwards}
@keyframes btnShine{to{transform:translateX(100%)}}

/* Streak counter */
.streak{
font-size:.7rem;color:rgba(139,92,246,.6);
margin-bottom:20px;letter-spacing:.15em;
}
.streak span{color:var(--cyan);font-weight:700}

/* Prophecy output */
.prophecy-box{
width:100%;min-height:80px;
text-align:center;margin-bottom:10px;
padding:20px;
position:relative;
}
.prophecy-text{
font-family:'Cinzel',serif;font-weight:400;
font-size:clamp(.9rem,3vw,1.15rem);
line-height:1.7;
color:#e2d6ff;
text-shadow:0 0 15px var(--glow);
white-space:pre-wrap;
}
.fate-rating{
margin-top:14px;
font-size:.75rem;letter-spacing:.2em;
color:var(--magenta);
opacity:0;transition:opacity .6s;
}
.fate-rating.show{opacity:1}

/* Neon frame */
.neon-frame{
border:1px solid rgba(139,92,246,.15);
position:relative;
}
.neon-frame::before,.neon-frame::after{
content:'';position:absolute;width:12px;height:12px;
border-color:var(--purple);border-style:solid;
}
.neon-frame::before{top:-1px;left:-1px;border-width:1px 0 0 1px}
.neon-frame::after{bottom:-1px;right:-1px;border-width:0 1px 1px 0}

/* Prophecy log */
.log-section{
width:100%;margin-top:30px;
}
.log-title{
font-family:'Cinzel',serif;font-weight:700;
font-size:.7rem;letter-spacing:.25em;text-transform:uppercase;
color:rgba(139,92,246,.5);
margin-bottom:12px;
padding-bottom:6px;
border-bottom:1px solid rgba(139,92,246,.1);
}
.log-list{list-style:none;max-height:300px;overflow-y:auto}
.log-list::-webkit-scrollbar{width:4px}
.log-list::-webkit-scrollbar-thumb{background:rgba(139,92,246,.3);border-radius:2px}
.log-entry{
padding:10px 12px;margin-bottom:6px;
border-left:2px solid rgba(139,92,246,.2);
font-size:.72rem;line-height:1.5;
animation:slideIn .4s ease-out;
}
.log-entry .log-prophecy{color:rgba(226,214,255,.7)}
.log-entry .log-fate{color:var(--magenta);font-size:.6rem;margin-top:4px;opacity:.6}
.log-entry:nth-child(n+4){opacity:.5}
.log-entry:nth-child(n+7){opacity:.3}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}

/* Backlink */
.backlink{
position:fixed;bottom:8px;left:10px;z-index:200;
font-size:.55rem;letter-spacing:.1em;
color:rgba(139,92,246,.3);text-decoration:none;
}
.backlink:hover{color:rgba(139,92,246,.6)}

@media(max-width:480px){
.main{padding:70px 14px 90px}
.orb-wrap{width:170px;height:170px}
.orb-ring:nth-child(3){display:none}
.seek-btn{padding:10px 24px}
}
</style>
</head>
<body>

<div class="circuit-bg"></div>
<div class="binary-runes" id="binaryRunes"></div>
<canvas id="particles"></canvas>

<div class="main">
  <h1>Neon Oracle</h1>
  <div class="subtitle">digital divination protocol</div>

  <div class="orb-wrap" id="orbWrap" title="Click to seek your fate">
    <div class="orb-ring"></div>
    <div class="orb-ring"></div>
    <div class="orb-ring"></div>
    <div class="orb">
      <div class="orb-inner"></div>
    </div>
  </div>

  <button class="seek-btn" id="seekBtn">Seek Your Fate</button>

  <div class="streak">Prophecies received: <span id="streakCount">0</span></div>

  <div class="prophecy-box neon-frame">
    <div class="prophecy-text" id="prophecyText"></div>
    <div class="fate-rating" id="fateRating"></div>
  </div>

  <div class="log-section" id="logSection" style="display:none">
    <div class="log-title">Prophecy Log</div>
    <ul class="log-list" id="logList"></ul>
  </div>
</div>

<a href="https://sloppy.live" class="backlink">sloppy.live</a>

<script>
(function(){

const PROPHECIES=[
"The cache remembers what you have forgotten. Clear it at your peril.",
"A merge conflict approaches from the east. Choose your branch wisely.",
"Your commits are being watched by forces beyond the CI pipeline.",
"The bug you seek is not in the code, but in the assumptions.",
"Three pull requests shall cross your path. Approve only one.",
"The server that never sleeps dreams of your downtime.",
"A stranger will fork your repository. Great wisdom follows.",
"The deprecated function still holds power. Do not underestimate legacy.",
"Your localhost hides a secret. Port 3000 knows the truth.",
"The void returns undefined, yet within it lies all possibility.",
"A forgotten cron job stirs in the darkness. Its hour approaches.",
"The database whispers of normalization, but chaos is its true nature.",
"Refactor not the code that works, lest you awaken sleeping bugs.",
"The linter sees all. It judges you in silence.",
"Your dependencies have dependencies. Turtles, all the way down.",
"An infinite loop awaits the careless. Count your iterations.",
"The cloud is just someone else's computer, dreaming of your data.",
"Beware the developer who says 'it works on my machine.'",
"A segfault ripples through the quantum fabric. Memory weeps.",
"The senior dev departs. The tribal knowledge goes with them.",
"You will encounter a semicolon where none should exist. Or should it?",
"The regex you write today will confuse you tomorrow.",
"A race condition decides your fate. Both outcomes are true.",
"The tests pass locally but the CI knows your sins.",
"Kubernetes orchestrates not just containers, but destinies.",
"A null pointer exception illuminates the path to enlightenment.",
"The blockchain remembers forever. Choose your transactions wisely.",
"Stack overflow holds the answer, but the question was asked in 2009.",
"Your API key is showing. The void has already memorized it.",
"The algorithm is O(n!). Patience is your only optimization.",
"A websocket connection opens to the astral plane. Latency: ∞ms.",
"The intern pushed to main. The prophecy is fulfilled.",
"Docker containers contain multitudes. Also, 47 unused images.",
"The load balancer distributes not just traffic, but karma.",
"rm -rf whispers from the terminal. Do not heed its call.",
"Your backup was last tested never. Faith is not a strategy.",
"The monolith crumbles into microservices. Each one a new problem.",
"A migration script runs at midnight. The schema transforms.",
"The CSS specificity wars have begun. !important is nuclear.",
"Recursion: see recursion. But first, check your base case.",
"The sprint ends but the bugs are eternal.",
"A phantom process consumes all memory. It answers to no kill signal.",
"Your .env file is committed. The secrets are no longer secret.",
"The documentation lies. Trust only the source code. Maybe.",
"A CORS error blocks your destiny. The origin is not allowed.",
"The AI writes code now. It dreams in tokens and loss functions.",
"Garbage collection comes for us all. Release your references.",
"The 404 page is the most visited. Make it beautiful.",
"Binary speaks in absolutes. But floating point whispers doubt.",
"The git blame reveals the true author. It was you, all along.",
"A zombie process walks the system. It has no parent to mourn it.",
"The firewall guards the gates, but the call comes from inside the VPN.",
"Your technical debt accrues interest. The compounding is merciless.",
"The favicon is missing. Your browser tab weeps in anonymity.",
"Premature optimization is the root of all evil. But so is tech debt.",
"The console.log you forgot to remove will appear in production.",
"A quantum bit both passes and fails the test. Observe carefully.",
"The dark mode is not merely a theme. It is a way of life.",
"Your package-lock.json conflicts with destiny itself.",
"The singleton holds court. There can be only one instance.",
"A heisenbug appears only when unobserved. The debugger collapses it.",
"The timestamp is in UTC. Or is it? Timezone chaos reigns."
];

const FATES=[
"⚡ ELECTRIC OMEN","🌀 RECURSIVE DESTINY","💀 STACK OVERFLOW",
"✨ BLESSED COMMIT","🔥 HOT RELOAD","🌑 DARK MODE PROPHECY",
"🎯 ZERO-DAY REVELATION","🌊 EVENTUAL CONSISTENCY","👁 ALL-SEEING DEBUGGER",
"🔮 QUANTUM ENTANGLEMENT","⏳ ASYNC AWAKENING","💎 DIAMOND DEPENDENCY",
"🕳 VOID POINTER VISION","🧬 RECURSIVE MUTATION","☠ FATAL EXCEPTION"
];

let streak=0,busy=false,usedIndices=[],log=[];

const orbWrap=document.getElementById('orbWrap');
const seekBtn=document.getElementById('seekBtn');
const prophecyText=document.getElementById('prophecyText');
const fateRating=document.getElementById('fateRating');
const streakCount=document.getElementById('streakCount');
const logList=document.getElementById('logList');
const logSection=document.getElementById('logSection');

function pickProphecy(){
  if(usedIndices.length>=PROPHECIES.length)usedIndices=[];
  let i;
  do{i=Math.floor(Math.random()*PROPHECIES.length)}while(usedIndices.includes(i));
  usedIndices.push(i);
  return PROPHECIES[i];
}

function typewriter(el,text,speed,cb){
  el.textContent='';
  let i=0;
  function tick(){
    if(i<text.length){el.textContent+=text[i];i++;setTimeout(tick,speed)}
    else if(cb)cb();
  }
  tick();
}

function spawnBurst(){
  const rect=orbWrap.getBoundingClientRect();
  const cx=rect.left+rect.width/2;
  const cy=rect.top+rect.height/2;
  for(let i=0;i<12;i++){
    const el=document.createElement('div');
    el.className='burst';
    const angle=Math.random()*Math.PI*2;
    const dist=80+Math.random()*60;
    const colors=['var(--purple)','var(--cyan)','var(--magenta)'];
    el.style.cssText=`
      left:${cx}px;top:${cy}px;position:fixed;z-index:50;
      background:${colors[i%3]};
      box-shadow:0 0 6px ${colors[i%3]};
      animation:burstOut .8s ease-out forwards;
      transform:translate(${Math.cos(angle)*dist}px,${Math.sin(angle)*dist}px);
    `;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),900);
  }
}

function seek(){
  if(busy)return;
  busy=true;
  seekBtn.disabled=true;
  orbWrap.classList.add('active');
  document.body.classList.add('pulse');
  prophecyText.textContent='';
  fateRating.classList.remove('show');
  fateRating.textContent='';
  spawnBurst();

  setTimeout(()=>{
    document.body.classList.remove('pulse');
  },600);

  setTimeout(()=>{
    orbWrap.classList.remove('active');
    const p=pickProphecy();
    const f=FATES[Math.floor(Math.random()*FATES.length)];

    typewriter(prophecyText,p,30,()=>{
      fateRating.textContent=f;
      fateRating.classList.add('show');
      streak++;
      streakCount.textContent=streak;

      log.unshift({prophecy:p,fate:f});
      if(log.length>10)log.pop();
      renderLog();

      busy=false;
      seekBtn.disabled=false;
    });
  },2000);
}

function renderLog(){
  if(log.length===0){logSection.style.display='none';return}
  logSection.style.display='';
  logList.innerHTML='';
  log.forEach(function(entry){
    var li=document.createElement('li');
    li.className='log-entry';
    li.innerHTML='<div class="log-prophecy">'+escapeHtml(entry.prophecy)+'</div><div class="log-fate">'+escapeHtml(entry.fate)+'</div>';
    logList.appendChild(li);
  });
}

function escapeHtml(s){
  var d=document.createElement('div');
  d.textContent=s;
  return d.innerHTML;
}

orbWrap.addEventListener('click',seek);
seekBtn.addEventListener('click',seek);

// === Binary runes ===
(function(){
  var container=document.getElementById('binaryRunes');
  for(var i=0;i<10;i++){
    var col=document.createElement('div');
    col.className='rune-col';
    var chars='';
    for(var j=0;j<80;j++)chars+=Math.random()>.5?'1':'0';
    col.textContent=chars;
    col.style.left=(Math.random()*100)+'%';
    col.style.animationDuration=(10+Math.random()*15)+'s';
    col.style.animationDelay=(-Math.random()*20)+'s';
    col.style.fontSize=(9+Math.random()*4)+'px';
    container.appendChild(col);
  }
})();

// === Particle system ===
(function(){
  var canvas=document.getElementById('particles');
  var ctx=canvas.getContext('2d');
  var W,H;
  var particles=[];

  function resize(){
    W=canvas.width=window.innerWidth;
    H=canvas.height=window.innerHeight;
  }
  resize();
  window.addEventListener('resize',resize);

  for(var i=0;i<50;i++){
    particles.push({
      x:Math.random()*W,y:Math.random()*H,
      vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)*.3,
      r:Math.random()*1.5+.5,
      alpha:Math.random()*.5+.1,
      color:['139,92,246','34,211,238','217,70,239'][Math.floor(Math.random()*3)]
    });
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    for(var i=0;i<particles.length;i++){
      var p=particles[i];
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;
      if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle='rgba('+p.color+','+p.alpha+')';
      ctx.fill();
    }
    requestAnimationFrame(draw);
  }
  draw();
})();

})();
</script>
<script src="/sloppy-header/sloppy-bar.js"></script>
</body>
</html>
