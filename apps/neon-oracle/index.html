<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Oracle</title>
<link rel="icon" href="https://emojicdn.elk.sh/🔮">
<meta name="description" content="Seek cryptic digital prophecies from the glowing oracle.">
<meta property="og:title" content="Neon Oracle">
<meta property="og:description" content="Tap the crystal ball. Receive your digital fate.">
<meta property="og:url" content="https://sloppy.live/neon-oracle">
<meta property="og:image" content="https://sloppy.live/neon-oracle/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;image-rendering:pixelated}
:root{
--bg:#1a1a2e;--purple:#7b68ae;--cyan:#5bc0be;--magenta:#c45baa;
--indigo:#3a3a6e;--deep:#12122a;--dark:#0e0e1f;
--text:#d0c8e8;--text-dim:#7a7494;
}
html,body{height:100%;overflow-x:hidden}
body{
background:var(--bg);
color:var(--text);
font-family:'Silkscreen',cursive;
display:flex;flex-direction:column;align-items:center;
min-height:100vh;
position:relative;
}

/* ===== CRT OVERLAY ===== */
body::before{
content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;
background:
  repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0.15) 0px,
    rgba(0,0,0,0.15) 1px,
    transparent 1px,
    transparent 3px
  );
mix-blend-mode:multiply;
}
/* Vignette + subtle curvature */
body::after{
content:'';position:fixed;inset:0;pointer-events:none;z-index:9998;
background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,.75) 100%);
border-radius:8px;
}
/* Screen flicker */
@keyframes crtFlicker{
0%,100%{opacity:1}
50%{opacity:.97}
75%{opacity:.99}
}
body{animation:crtFlicker .1s steps(2) infinite}

/* Pixel grid background */
.circuit-bg{
position:fixed;inset:0;opacity:.08;pointer-events:none;z-index:0;
background-image:
  linear-gradient(var(--indigo) 2px,transparent 2px),
  linear-gradient(90deg,var(--indigo) 2px,transparent 2px);
background-size:16px 16px;
}

/* Binary runes */
.binary-runes{
position:fixed;inset:0;pointer-events:none;z-index:1;overflow:hidden;opacity:.07;
font-family:'Press Start 2P',monospace;font-size:8px;color:var(--cyan);
}
.rune-col{
position:absolute;top:-100%;
animation:runefall steps(60) infinite;
white-space:nowrap;writing-mode:vertical-lr;
}
@keyframes runefall{0%{transform:translateY(0)}100%{transform:translateY(200vh)}}

/* Particle canvas */
#particles{position:fixed;inset:0;z-index:2;pointer-events:none}

.main{
position:relative;z-index:10;
display:flex;flex-direction:column;align-items:center;
padding:80px 20px 100px;
max-width:560px;width:100%;
}

h1{
font-family:'Press Start 2P',monospace;
font-size:clamp(16px,4vw,24px);
text-transform:uppercase;letter-spacing:.08em;
color:var(--cyan);
text-shadow:3px 3px 0 var(--deep),
            -1px -1px 0 var(--purple);
margin-bottom:8px;
}
.subtitle{
font-family:'Silkscreen',cursive;
font-size:8px;letter-spacing:.2em;text-transform:uppercase;
color:var(--text-dim);margin-bottom:40px;
}

/* ===== PIXEL CRYSTAL BALL ===== */
.orb-wrap{
position:relative;width:200px;height:200px;margin:0 auto 24px;
cursor:pointer;
}
.orb-wrap:hover .orb{filter:brightness(1.1)}

.orb{
width:100%;height:100%;position:relative;
/* Octagonal pixel ball approximation */
background:var(--deep);
clip-path:polygon(
  30% 2%, 70% 2%,
  95% 25%, 100% 50%,
  95% 75%, 70% 98%,
  30% 98%, 5% 75%,
  0% 50%, 5% 25%
);
box-shadow:0 0 0 3px var(--purple),0 0 0 6px var(--deep);
overflow:hidden;
transition:filter .2s;
}
/* Hard stepped inner glow */
.orb::before{
content:'';position:absolute;inset:0;
background:
  linear-gradient(135deg,
    rgba(91,192,190,.25) 0%, rgba(91,192,190,.25) 20%,
    transparent 20%, transparent 40%,
    rgba(123,104,174,.2) 40%, rgba(123,104,174,.2) 60%,
    transparent 60%, transparent 80%,
    rgba(196,91,170,.15) 80%, rgba(196,91,170,.15) 100%
  );
animation:orbShift 4s steps(4) infinite alternate;
}
/* Hard pixel highlight */
.orb::after{
content:'';position:absolute;
top:15%;left:20%;width:24px;height:24px;
background:rgba(255,255,255,.18);
}
@keyframes orbShift{
0%{opacity:.5;transform:rotate(0deg)}
100%{opacity:1;transform:rotate(90deg)}
}

.orb-inner{
position:absolute;inset:20%;
background:
  linear-gradient(45deg,
    var(--cyan) 0%, var(--cyan) 25%,
    transparent 25%, transparent 50%,
    var(--magenta) 50%, var(--magenta) 75%,
    transparent 75%, transparent 100%
  );
background-size:16px 16px;
opacity:.15;
animation:orbInnerPulse 3s steps(3) infinite alternate;
clip-path:polygon(
  30% 2%, 70% 2%,
  95% 25%, 100% 50%,
  95% 75%, 70% 98%,
  30% 98%, 5% 75%,
  0% 50%, 5% 25%
);
}
@keyframes orbInnerPulse{
0%{opacity:.1;transform:scale(.9)}
100%{opacity:.2;transform:scale(1.05)}
}

/* Orb ring — pixel squares */
.orb-ring{
position:absolute;inset:-12px;
border:2px solid var(--purple);
animation:ringPulse 3s steps(4) infinite;
}
.orb-ring:nth-child(2){inset:-22px;animation-delay:1s;border-color:var(--cyan)}
.orb-ring:nth-child(3){inset:-32px;animation-delay:2s;border-color:var(--magenta)}
@keyframes ringPulse{0%,100%{opacity:.3}50%{opacity:.8}}

/* Active state */
.orb-wrap.active .orb{
box-shadow:0 0 0 3px var(--cyan),0 0 0 6px var(--purple),0 0 0 9px var(--deep);
}
.orb-wrap.active .orb::before{animation-duration:.5s}
.orb-wrap.active .orb-inner{animation-duration:.5s}

/* Burst particles — SQUARE pixels */
.burst{
position:absolute;width:6px;height:6px;
pointer-events:none;
}
@keyframes burstOut{
0%{transform:translate(-50%,-50%) scale(1);opacity:1}
100%{transform:translate(-50%,-50%) scale(0);opacity:0}
}

/* Screen pulse on activation */
@keyframes screenPulse{
0%{box-shadow:inset 0 0 0 4px var(--purple)}
100%{box-shadow:inset 0 0 0 0px transparent}
}
body.pulse>.crt-flash{
position:fixed;inset:0;z-index:9997;pointer-events:none;
animation:screenPulse .4s steps(4) forwards;
}

/* ===== PIXEL SEEK BUTTON ===== */
.seek-btn{
font-family:'Press Start 2P',monospace;
font-size:10px;
letter-spacing:.1em;text-transform:uppercase;
color:var(--bg);
background:var(--cyan);
border:none;
box-shadow:0 0 0 3px var(--deep),0 0 0 5px var(--cyan);
padding:12px 24px;
cursor:pointer;
position:relative;
transition:all .15s steps(2);
margin-bottom:24px;
}
.seek-btn:hover{
background:var(--magenta);
box-shadow:0 0 0 3px var(--deep),0 0 0 5px var(--magenta);
color:#fff;
}
.seek-btn:active{
transform:translate(2px,2px);
}
.seek-btn:disabled{opacity:.3;cursor:default;pointer-events:none}

/* Streak counter */
.streak{
font-family:'Silkscreen',cursive;
font-size:8px;color:var(--text-dim);
margin-bottom:16px;letter-spacing:.1em;
}
.streak span{color:var(--cyan)}

/* ===== PROPHECY OUTPUT ===== */
.prophecy-box{
width:100%;min-height:80px;
text-align:center;margin-bottom:10px;
padding:16px;
position:relative;
}
.prophecy-text{
font-family:'Silkscreen',cursive;
font-size:clamp(10px,2.5vw,13px);
line-height:2;
color:var(--text);
white-space:pre-wrap;
}
.fate-rating{
margin-top:12px;
font-family:'Press Start 2P',monospace;
font-size:8px;letter-spacing:.1em;
color:var(--magenta);
opacity:0;transition:opacity .4s steps(4);
}
.fate-rating.show{opacity:1}

/* Pixel neon frame */
.neon-frame{
border:2px solid var(--indigo);
background:var(--dark);
position:relative;
}
.neon-frame::before,.neon-frame::after{
content:'';position:absolute;width:8px;height:8px;
background:var(--purple);
}
.neon-frame::before{top:-2px;left:-2px}
.neon-frame::after{bottom:-2px;right:-2px}

/* ===== PROPHECY LOG ===== */
.log-section{
width:100%;margin-top:24px;
}
.log-title{
font-family:'Press Start 2P',monospace;
font-size:8px;letter-spacing:.1em;text-transform:uppercase;
color:var(--text-dim);
margin-bottom:10px;
padding-bottom:6px;
border-bottom:2px solid var(--indigo);
}
.log-list{list-style:none;max-height:280px;overflow-y:auto}
.log-list::-webkit-scrollbar{width:6px}
.log-list::-webkit-scrollbar-track{background:var(--dark)}
.log-list::-webkit-scrollbar-thumb{background:var(--indigo)}
.log-entry{
padding:8px 10px;margin-bottom:4px;
border-left:3px solid var(--indigo);
background:var(--dark);
font-size:8px;line-height:1.8;
animation:slideIn .3s steps(4);
}
.log-entry .log-prophecy{
font-family:'Silkscreen',cursive;
color:var(--text);font-size:9px;
}
.log-entry .log-fate{
font-family:'Press Start 2P',monospace;
color:var(--magenta);font-size:7px;margin-top:4px;opacity:.7;
}
.log-entry:nth-child(n+4){opacity:.5}
.log-entry:nth-child(n+7){opacity:.25}
@keyframes slideIn{from{transform:translateY(16px);opacity:0}to{transform:translateY(0);opacity:1}}

/* Backlink */

@media(max-width:480px){
.main{padding:64px 12px 80px}
.orb-wrap{width:152px;height:152px}
.orb-ring:nth-child(3){display:none}
.seek-btn{padding:10px 16px;font-size:8px}
h1{font-size:14px}
}
</style>
</head>
<body>

<div class="circuit-bg"></div>
<div class="binary-runes" id="binaryRunes"></div>
<canvas id="particles"></canvas>

<div class="main">
  <h1>Neon Oracle</h1>
  <div class="subtitle">digital divination protocol</div>

  <div class="orb-wrap" id="orbWrap" title="Click to seek your fate">
    <div class="orb-ring"></div>
    <div class="orb-ring"></div>
    <div class="orb-ring"></div>
    <div class="orb">
      <div class="orb-inner"></div>
    </div>
  </div>

  <button class="seek-btn" id="seekBtn">Seek Your Fate</button>

  <div class="streak">Prophecies received: <span id="streakCount">0</span></div>

  <div class="prophecy-box neon-frame">
    <div class="prophecy-text" id="prophecyText"></div>
    <div class="fate-rating" id="fateRating"></div>
  </div>

  <div class="log-section" id="logSection" style="display:none">
    <div class="log-title">Prophecy Log</div>
    <ul class="log-list" id="logList"></ul>
  </div>
</div>
<script>
(function(){

const PROPHECIES=[
"The cache remembers what you have forgotten. Clear it at your peril.",
"A merge conflict approaches from the east. Choose your branch wisely.",
"Your commits are being watched by forces beyond the CI pipeline.",
"The bug you seek is not in the code, but in the assumptions.",
"Three pull requests shall cross your path. Approve only one.",
"The server that never sleeps dreams of your downtime.",
"A stranger will fork your repository. Great wisdom follows.",
"The deprecated function still holds power. Do not underestimate legacy.",
"Your localhost hides a secret. Port 3000 knows the truth.",
"The void returns undefined, yet within it lies all possibility.",
"A forgotten cron job stirs in the darkness. Its hour approaches.",
"The database whispers of normalization, but chaos is its true nature.",
"Refactor not the code that works, lest you awaken sleeping bugs.",
"The linter sees all. It judges you in silence.",
"Your dependencies have dependencies. Turtles, all the way down.",
"An infinite loop awaits the careless. Count your iterations.",
"The cloud is just someone else's computer, dreaming of your data.",
"Beware the developer who says 'it works on my machine.'",
"A segfault ripples through the quantum fabric. Memory weeps.",
"The senior dev departs. The tribal knowledge goes with them.",
"You will encounter a semicolon where none should exist. Or should it?",
"The regex you write today will confuse you tomorrow.",
"A race condition decides your fate. Both outcomes are true.",
"The tests pass locally but the CI knows your sins.",
"Kubernetes orchestrates not just containers, but destinies.",
"A null pointer exception illuminates the path to enlightenment.",
"The blockchain remembers forever. Choose your transactions wisely.",
"Stack overflow holds the answer, but the question was asked in 2009.",
"Your API key is showing. The void has already memorized it.",
"The algorithm is O(n!). Patience is your only optimization.",
"A websocket connection opens to the astral plane. Latency: infinity ms.",
"The intern pushed to main. The prophecy is fulfilled.",
"Docker containers contain multitudes. Also, 47 unused images.",
"The load balancer distributes not just traffic, but karma.",
"rm -rf whispers from the terminal. Do not heed its call.",
"Your backup was last tested never. Faith is not a strategy.",
"The monolith crumbles into microservices. Each one a new problem.",
"A migration script runs at midnight. The schema transforms.",
"The CSS specificity wars have begun. !important is nuclear.",
"Recursion: see recursion. But first, check your base case.",
"The sprint ends but the bugs are eternal.",
"A phantom process consumes all memory. It answers to no kill signal.",
"Your .env file is committed. The secrets are no longer secret.",
"The documentation lies. Trust only the source code. Maybe.",
"A CORS error blocks your destiny. The origin is not allowed.",
"The AI writes code now. It dreams in tokens and loss functions.",
"Garbage collection comes for us all. Release your references.",
"The 404 page is the most visited. Make it beautiful.",
"Binary speaks in absolutes. But floating point whispers doubt.",
"The git blame reveals the true author. It was you, all along.",
"A zombie process walks the system. It has no parent to mourn it.",
"The firewall guards the gates, but the call comes from inside the VPN.",
"Your technical debt accrues interest. The compounding is merciless.",
"The favicon is missing. Your browser tab weeps in anonymity.",
"Premature optimization is the root of all evil. But so is tech debt.",
"The console.log you forgot to remove will appear in production.",
"A quantum bit both passes and fails the test. Observe carefully.",
"The dark mode is not merely a theme. It is a way of life.",
"Your package-lock.json conflicts with destiny itself.",
"The singleton holds court. There can be only one instance.",
"A heisenbug appears only when unobserved. The debugger collapses it.",
"The timestamp is in UTC. Or is it? Timezone chaos reigns."
];

const FATES=[
">> ELECTRIC OMEN",">> RECURSIVE DESTINY",">> STACK OVERFLOW",
">> BLESSED COMMIT",">> HOT RELOAD",">> DARK MODE PROPHECY",
">> ZERO-DAY REVELATION",">> EVENTUAL CONSISTENCY",">> ALL-SEEING DEBUGGER",
">> QUANTUM ENTANGLEMENT",">> ASYNC AWAKENING",">> DIAMOND DEPENDENCY",
">> VOID POINTER VISION",">> RECURSIVE MUTATION",">> FATAL EXCEPTION"
];

var streak=0,busy=false,usedIndices=[],log=[];

var orbWrap=document.getElementById('orbWrap');
var seekBtn=document.getElementById('seekBtn');
var prophecyText=document.getElementById('prophecyText');
var fateRating=document.getElementById('fateRating');
var streakCount=document.getElementById('streakCount');
var logList=document.getElementById('logList');
var logSection=document.getElementById('logSection');

function pickProphecy(){
  if(usedIndices.length>=PROPHECIES.length)usedIndices=[];
  var i;
  do{i=Math.floor(Math.random()*PROPHECIES.length)}while(usedIndices.indexOf(i)!==-1);
  usedIndices.push(i);
  return PROPHECIES[i];
}

function typewriter(el,text,speed,cb){
  el.textContent='';
  var i=0;
  function tick(){
    if(i<text.length){el.textContent+=text[i];i++;setTimeout(tick,speed)}
    else if(cb)cb();
  }
  tick();
}

function spawnBurst(){
  var rect=orbWrap.getBoundingClientRect();
  var cx=rect.left+rect.width/2;
  var cy=rect.top+rect.height/2;
  for(var i=0;i<8;i++){
    var el=document.createElement('div');
    el.className='burst';
    var angle=Math.random()*Math.PI*2;
    var dist=60+Math.random()*50;
    var colors=['var(--purple)','var(--cyan)','var(--magenta)'];
    el.style.cssText=
      'left:'+cx+'px;top:'+cy+'px;position:fixed;z-index:50;'+
      'background:'+colors[i%3]+';'+
      'animation:burstOut .6s steps(6) forwards;'+
      'transform:translate('+Math.cos(angle)*dist+'px,'+Math.sin(angle)*dist+'px);';
    document.body.appendChild(el);
    setTimeout(function(e){return function(){e.remove()}}(el),700);
  }
}

function seek(){
  if(busy)return;
  busy=true;
  seekBtn.disabled=true;
  orbWrap.classList.add('active');
  prophecyText.textContent='';
  fateRating.classList.remove('show');
  fateRating.textContent='';
  spawnBurst();

  setTimeout(function(){
    orbWrap.classList.remove('active');
    var p=pickProphecy();
    var f=FATES[Math.floor(Math.random()*FATES.length)];

    typewriter(prophecyText,p,35,function(){
      fateRating.textContent=f;
      fateRating.classList.add('show');
      streak++;
      streakCount.textContent=streak;

      log.unshift({prophecy:p,fate:f});
      if(log.length>10)log.pop();
      renderLog();

      busy=false;
      seekBtn.disabled=false;
    });
  },1800);
}

function renderLog(){
  if(log.length===0){logSection.style.display='none';return}
  logSection.style.display='';
  logList.innerHTML='';
  log.forEach(function(entry){
    var li=document.createElement('li');
    li.className='log-entry';
    li.innerHTML='<div class="log-prophecy">'+escapeHtml(entry.prophecy)+'</div><div class="log-fate">'+escapeHtml(entry.fate)+'</div>';
    logList.appendChild(li);
  });
}

function escapeHtml(s){
  var d=document.createElement('div');
  d.textContent=s;
  return d.innerHTML;
}

orbWrap.addEventListener('click',seek);
seekBtn.addEventListener('click',seek);

// === Binary runes ===
(function(){
  var container=document.getElementById('binaryRunes');
  for(var i=0;i<8;i++){
    var col=document.createElement('div');
    col.className='rune-col';
    var chars='';
    for(var j=0;j<60;j++)chars+=Math.random()>.5?'1':'0';
    col.textContent=chars;
    col.style.left=(Math.random()*100)+'%';
    col.style.animationDuration=(12+Math.random()*10)+'s';
    col.style.animationDelay=(-Math.random()*15)+'s';
    container.appendChild(col);
  }
})();

// === Particle system — square pixels ===
(function(){
  var canvas=document.getElementById('particles');
  var ctx=canvas.getContext('2d');
  var W,H;
  var particles=[];

  function resize(){
    W=canvas.width=window.innerWidth;
    H=canvas.height=window.innerHeight;
  }
  resize();
  window.addEventListener('resize',resize);

  var colors=['#7b68ae','#5bc0be','#c45baa'];
  for(var i=0;i<20;i++){
    particles.push({
      x:Math.random()*W,y:Math.random()*H,
      vx:(Math.random()-.5)*.4,vy:(Math.random()-.5)*.4,
      s:2+Math.floor(Math.random()*3)*2,
      alpha:Math.random()*.4+.15,
      color:colors[Math.floor(Math.random()*3)]
    });
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    for(var i=0;i<particles.length;i++){
      var p=particles[i];
      p.x+=p.vx;p.y+=p.vy;
      if(p.x<0)p.x=W;if(p.x>W)p.x=0;
      if(p.y<0)p.y=H;if(p.y>H)p.y=0;
      // Snap to 2px grid for pixel feel
      var sx=Math.round(p.x/2)*2;
      var sy=Math.round(p.y/2)*2;
      ctx.globalAlpha=p.alpha;
      ctx.fillStyle=p.color;
      ctx.fillRect(sx,sy,p.s,p.s);
    }
    ctx.globalAlpha=1;
    requestAnimationFrame(draw);
  }
  draw();
})();

})();
</script>
<script src="/sloppy-header/sloppy-bar.js"></script>
</body>
</html>
