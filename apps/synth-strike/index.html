<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Synth Strike</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8E%B9">
<meta name="description" content="Neon rhythm game. Tap D F J K to the synthwave beat. Chase the combo.">
<meta property="og:title" content="Synth Strike">
<meta property="og:description" content="Neon rhythm game. Tap D F J K to the synthwave beat. Chase the combo.">
<meta property="og:url" content="https://sloppy.live/synth-strike">
<meta property="og:image" content="https://sloppy.live/synth-strike/og-image.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Share+Tech+Mono&family=Monoton&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0320;
  --horizon:#2a003f;
  --hot:#ff2975;
  --cyan:#00e5ff;
  --violet:#b47cff;
  --yellow:#ffd23a;
  --ink:#0a0320;
  --glow-cyan:#00e5ff;
  --glow-hot:#ff2975;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg);color:#fff;font-family:'Share Tech Mono',monospace;user-select:none;-webkit-user-select:none;touch-action:manipulation}
canvas#bg{position:fixed;inset:0;width:100%;height:100%;z-index:0}

/* ── Stage ── */
.stage{
  position:fixed;inset:0;display:grid;grid-template-rows:auto 1fr auto;z-index:2;
}

/* ── Top HUD ── */
.hud{
  display:flex;align-items:flex-start;justify-content:space-between;
  padding:14px 20px;gap:16px;pointer-events:none;
}
.title{
  font-family:'Monoton',cursive;font-size:2.2rem;line-height:1;
  color:transparent;background:linear-gradient(180deg,#fff,var(--hot) 60%,#7b008c);
  -webkit-background-clip:text;background-clip:text;letter-spacing:.1em;
  text-shadow:0 0 14px rgba(255,41,117,.5);
}
.stats{
  display:grid;gap:2px;justify-items:end;text-align:right;
  font-family:'Share Tech Mono',monospace;
}
.stats .score{
  font-family:'Audiowide',sans-serif;font-size:2.2rem;line-height:1;
  color:var(--cyan);text-shadow:0 0 12px rgba(0,229,255,.6),0 0 2px #fff;
  letter-spacing:.05em;
}
.stats .combo{
  font-size:1rem;color:var(--yellow);letter-spacing:.2em;
}
.stats .combo b{font-family:'Audiowide',sans-serif;font-size:1.4rem;color:var(--yellow);text-shadow:0 0 10px rgba(255,210,58,.6)}
.stats .acc{font-size:.78rem;opacity:.7;letter-spacing:.2em}

/* ── Lanes ── */
.lanes{
  position:relative;display:grid;grid-template-columns:repeat(4,1fr);
  max-width:720px;width:92vw;margin:0 auto;height:100%;
  perspective:900px;perspective-origin:50% 10%;
}
.lane{
  position:relative;height:100%;border-left:1px solid rgba(255,41,117,.22);
  overflow:visible;
}
.lane:last-child{border-right:1px solid rgba(255,41,117,.22)}
.lane.L-0{--c:var(--hot)}
.lane.L-1{--c:var(--cyan)}
.lane.L-2{--c:var(--yellow)}
.lane.L-3{--c:var(--violet)}

.lane::before{
  content:'';position:absolute;inset:0 6% 0 6%;
  background:linear-gradient(180deg,transparent 0,transparent 70%,color-mix(in srgb,var(--c) 22%,transparent) 100%);
  pointer-events:none;
}
.lane .glow{
  position:absolute;inset:auto 0 0 0;height:46%;pointer-events:none;
  background:radial-gradient(ellipse at 50% 100%, color-mix(in srgb,var(--c) 35%,transparent) 0%, transparent 65%);
  opacity:0;transition:opacity .1s ease-out;
}
.lane.hit .glow{opacity:1;animation:laneFlash .35s ease-out}
@keyframes laneFlash{0%{opacity:1}100%{opacity:.25}}

/* Hit bar */
.hit-bar{
  position:absolute;left:0;right:0;bottom:18%;height:4px;
  background:linear-gradient(90deg,transparent,var(--hot),var(--cyan),var(--hot),transparent);
  box-shadow:0 0 22px rgba(255,41,117,.7),0 0 60px rgba(0,229,255,.45);
  pointer-events:none;z-index:4;
}
.hit-bar::after{
  content:'';position:absolute;inset:-3px 0;background:inherit;filter:blur(6px);opacity:.85;
}

/* Keys */
.keys{
  position:absolute;left:0;right:0;bottom:0;display:grid;grid-template-columns:repeat(4,1fr);
  height:18%;gap:0;pointer-events:auto;
}
.key{
  position:relative;border-top:3px solid rgba(255,255,255,.12);
  display:grid;place-items:center;font-family:'Audiowide',sans-serif;
  font-size:1.8rem;color:#fff;letter-spacing:.05em;
  background:linear-gradient(180deg,rgba(10,3,32,.2),rgba(10,3,32,.85));
  text-shadow:0 0 8px rgba(255,255,255,.4);
  transition:transform .05s ease, background .12s ease;
  cursor:pointer;
}
.key.k-0{border-top-color:var(--hot);  color:#fff;  box-shadow:inset 0 14px 40px -20px var(--hot)}
.key.k-1{border-top-color:var(--cyan); color:#fff;  box-shadow:inset 0 14px 40px -20px var(--cyan)}
.key.k-2{border-top-color:var(--yellow);color:#fff; box-shadow:inset 0 14px 40px -20px var(--yellow)}
.key.k-3{border-top-color:var(--violet);color:#fff; box-shadow:inset 0 14px 40px -20px var(--violet)}
.key.pressed{
  transform:translateY(2px) scale(.98);
  background:linear-gradient(180deg,rgba(255,255,255,.12),rgba(10,3,32,.9));
}
.key .lbl{font-size:.7rem;display:block;opacity:.65;letter-spacing:.3em;margin-top:4px;font-family:'Share Tech Mono',monospace}

/* Notes */
.note{
  position:absolute;left:8%;right:8%;height:22px;
  border-radius:6px;
  background:linear-gradient(180deg,#fff,var(--c,#fff));
  box-shadow:0 0 14px 2px var(--c,#fff),0 0 28px 6px color-mix(in srgb,var(--c) 45%,transparent);
  will-change:transform;pointer-events:none;
  border:1px solid rgba(255,255,255,.7);
}
.note.hold{
  height:auto;background:linear-gradient(180deg,color-mix(in srgb,var(--c) 60%,transparent),color-mix(in srgb,var(--c) 35%,transparent));
}
.note.fade{animation:noteMiss .32s ease-out forwards}
@keyframes noteMiss{to{opacity:0;transform:translateY(120px) scale(.8)}}

/* Pop (hit feedback text) */
.pop{
  position:absolute;font-family:'Audiowide',sans-serif;font-size:1.1rem;
  letter-spacing:.1em;pointer-events:none;animation:popUp .55s ease-out forwards;
  text-shadow:0 0 12px currentColor;
}
.pop.perfect{color:var(--cyan)}
.pop.good{color:var(--yellow)}
.pop.miss{color:#ff3a3a}
@keyframes popUp{
  from{opacity:0;transform:translate(-50%,-20%) scale(.6)}
  30%{opacity:1;transform:translate(-50%,-50%) scale(1.15)}
  to{opacity:0;transform:translate(-50%,-140%) scale(1)}
}

/* Center banners */
.banner{
  position:fixed;inset:0;z-index:6;display:grid;place-items:center;
  background:radial-gradient(ellipse at 50% 50%,rgba(10,3,32,.7),rgba(10,3,32,.92));
  backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);
}
.banner.hidden{display:none}
.card{
  text-align:center;padding:28px 34px;border:2px solid var(--hot);border-radius:14px;
  background:rgba(10,3,32,.7);box-shadow:0 0 40px rgba(255,41,117,.4),inset 0 0 30px rgba(0,229,255,.1);
  max-width:90vw;
}
.card h1{
  font-family:'Monoton',cursive;font-size:3.4rem;line-height:1;letter-spacing:.06em;
  color:transparent;background:linear-gradient(180deg,#fff,var(--hot) 55%,#7b008c);
  -webkit-background-clip:text;background-clip:text;margin-bottom:8px;
  text-shadow:0 0 22px rgba(255,41,117,.6);
}
.card h1 span{color:var(--cyan);-webkit-text-fill-color:initial;background:none;text-shadow:0 0 22px rgba(0,229,255,.55)}
.card p{font-size:.95rem;opacity:.85;line-height:1.55;margin:10px 0 18px;letter-spacing:.06em}
.card .keys-hint{
  display:inline-flex;gap:6px;margin:6px 0 14px;font-family:'Audiowide',sans-serif;
}
.card .keys-hint span{
  padding:4px 10px;border:1px solid var(--cyan);border-radius:6px;color:var(--cyan);
  box-shadow:0 0 10px rgba(0,229,255,.35);letter-spacing:.1em;
}
.btn{
  font-family:'Audiowide',sans-serif;font-size:1.3rem;letter-spacing:.1em;
  padding:12px 28px;border-radius:10px;border:2px solid var(--cyan);
  background:transparent;color:var(--cyan);cursor:pointer;
  text-shadow:0 0 10px var(--cyan);box-shadow:0 0 20px rgba(0,229,255,.3), inset 0 0 14px rgba(0,229,255,.15);
  transition:transform .08s, box-shadow .15s, background .15s;
}
.btn:hover{transform:translateY(-2px);background:rgba(0,229,255,.08);box-shadow:0 0 32px rgba(0,229,255,.6)}
.btn:active{transform:translateY(1px)}
.btn.hot{border-color:var(--hot);color:var(--hot);text-shadow:0 0 10px var(--hot);box-shadow:0 0 20px rgba(255,41,117,.3), inset 0 0 14px rgba(255,41,117,.15)}
.btn.hot:hover{background:rgba(255,41,117,.08);box-shadow:0 0 32px rgba(255,41,117,.6)}
.final{
  display:grid;grid-template-columns:repeat(2,auto);gap:8px 26px;justify-content:center;
  font-family:'Share Tech Mono',monospace;margin:16px 0;
}
.final b{font-family:'Audiowide',sans-serif;color:var(--cyan);text-shadow:0 0 10px var(--cyan)}
.final .r{text-align:right;color:var(--yellow);text-shadow:0 0 8px var(--yellow)}
.grade{
  font-family:'Monoton',cursive;font-size:5rem;color:var(--yellow);
  text-shadow:0 0 24px var(--yellow);margin:6px 0 10px;
}

/* Pulse-with-beat ring overlay */
.pulse{position:fixed;inset:0;pointer-events:none;z-index:1;mix-blend-mode:screen;opacity:0;
  background:radial-gradient(ellipse at 50% 60%, rgba(255,41,117,.22), transparent 55%);
  transition:opacity .08s linear;
}

@media (max-width:640px){
  .title{font-size:1.6rem}
  .stats .score{font-size:1.7rem}
  .card h1{font-size:2.4rem}
  .key{font-size:1.3rem}
  .key .lbl{display:none}
  .keys{height:22%}
}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div class="pulse" id="pulse"></div>

<div class="stage">
  <div class="hud">
    <div class="title">SYNTH<br>STRIKE</div>
    <div class="stats">
      <div class="score" id="score">0</div>
      <div class="combo">× <b id="combo">0</b></div>
      <div class="acc" id="acc">ACC 100%</div>
    </div>
  </div>

  <div class="lanes" id="lanes">
    <div class="lane L-0" data-lane="0"><div class="glow"></div></div>
    <div class="lane L-1" data-lane="1"><div class="glow"></div></div>
    <div class="lane L-2" data-lane="2"><div class="glow"></div></div>
    <div class="lane L-3" data-lane="3"><div class="glow"></div></div>

    <div class="hit-bar" id="hitBar"></div>

    <div class="keys">
      <div class="key k-0" data-key="0">D<span class="lbl">LANE 1</span></div>
      <div class="key k-1" data-key="1">F<span class="lbl">LANE 2</span></div>
      <div class="key k-2" data-key="2">J<span class="lbl">LANE 3</span></div>
      <div class="key k-3" data-key="3">K<span class="lbl">LANE 4</span></div>
    </div>
  </div>
</div>

<!-- Start screen -->
<div class="banner" id="startBanner">
  <div class="card">
    <h1>SYNTH <span>STRIKE</span></h1>
    <p>Hit the neon bars when they cross the line.<br>Chain combos, ride the synthwave.</p>
    <div class="keys-hint"><span>D</span><span>F</span><span>J</span><span>K</span></div>
    <p style="font-size:.78rem;opacity:.55;letter-spacing:.15em">OR TAP THE LANES</p>
    <button class="btn hot" id="startBtn">▶ START</button>
  </div>
</div>

<!-- End screen -->
<div class="banner hidden" id="endBanner">
  <div class="card">
    <div class="grade" id="grade">S</div>
    <h1 id="endTitle">TRACK <span>CLEAR</span></h1>
    <div class="final">
      <span>SCORE</span><b class="r" id="fScore">0</b>
      <span>MAX COMBO</span><b class="r" id="fMax">0</b>
      <span>PERFECT</span><b class="r" id="fPerfect">0</b>
      <span>GOOD</span><b class="r" id="fGood">0</b>
      <span>MISS</span><b class="r" id="fMiss">0</b>
      <span>ACCURACY</span><b class="r" id="fAcc">100%</b>
    </div>
    <button class="btn" id="replayBtn">▶ PLAY AGAIN</button>
  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════════════════
   SYNTH STRIKE — neon rhythm game
   4 lanes · D F J K · synthwave backing track (Web Audio only)
   ═══════════════════════════════════════════════════════════════ */

// ── Audio engine ──
let AC = null;
let masterGain, bassGain, kickGain, arpGain, padGain, snareGain;
let delayNode;
function initAudio(){
  if(AC) return;
  AC = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = AC.createGain(); masterGain.gain.value = 0.82;
  masterGain.connect(AC.destination);

  // Soft sidechain-ish master compressor
  const comp = AC.createDynamicsCompressor();
  comp.threshold.value = -14; comp.knee.value = 8; comp.ratio.value = 4;
  comp.attack.value = 0.004; comp.release.value = 0.22;
  comp.connect(masterGain);

  // Stereo-ish delay for arp
  delayNode = AC.createDelay(1.2);
  delayNode.delayTime.value = 60 / 100 * 0.375; // dotted eighth-ish
  const delayFb = AC.createGain(); delayFb.gain.value = 0.34;
  const delayFilt = AC.createBiquadFilter(); delayFilt.type='highpass'; delayFilt.frequency.value = 500;
  delayNode.connect(delayFilt); delayFilt.connect(delayFb); delayFb.connect(delayNode);
  delayNode.connect(comp);

  kickGain  = AC.createGain(); kickGain.gain.value  = 1.1;  kickGain.connect(comp);
  snareGain = AC.createGain(); snareGain.gain.value = 0.55; snareGain.connect(comp);
  bassGain  = AC.createGain(); bassGain.gain.value  = 0.7;  bassGain.connect(comp);
  arpGain   = AC.createGain(); arpGain.gain.value   = 0.55; arpGain.connect(comp);
  // Arp also sends to delay
  const arpSend = AC.createGain(); arpSend.gain.value = 0.42;
  arpGain.connect(arpSend); arpSend.connect(delayNode);
  padGain   = AC.createGain(); padGain.gain.value   = 0.32; padGain.connect(comp);
}

// ── Sound presets ──
function kick(when){
  if(!AC) return;
  const o = AC.createOscillator();
  const g = AC.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(150, when);
  o.frequency.exponentialRampToValueAtTime(40, when + 0.14);
  g.gain.setValueAtTime(0.0001, when);
  g.gain.exponentialRampToValueAtTime(1, when + 0.003);
  g.gain.exponentialRampToValueAtTime(0.001, when + 0.28);
  o.connect(g); g.connect(kickGain);
  o.start(when); o.stop(when + 0.35);
  // Click
  const n = noiseBuf(0.03);
  const ns = AC.createBufferSource(); ns.buffer = n;
  const nf = AC.createBiquadFilter(); nf.type='lowpass'; nf.frequency.value=2400;
  const ng = AC.createGain(); ng.gain.setValueAtTime(.35, when); ng.gain.exponentialRampToValueAtTime(.001, when+.04);
  ns.connect(nf); nf.connect(ng); ng.connect(kickGain);
  ns.start(when); ns.stop(when+0.05);
}
function snare(when){
  if(!AC) return;
  const n = noiseBuf(0.3);
  const s = AC.createBufferSource(); s.buffer = n;
  const hp = AC.createBiquadFilter(); hp.type='highpass'; hp.frequency.value = 1400;
  const bp = AC.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value = 2500; bp.Q.value = 0.8;
  const g = AC.createGain(); g.gain.setValueAtTime(0.0001, when);
  g.gain.exponentialRampToValueAtTime(0.7, when + 0.004);
  g.gain.exponentialRampToValueAtTime(0.001, when + 0.18);
  s.connect(hp); hp.connect(bp); bp.connect(g); g.connect(snareGain);
  s.start(when); s.stop(when+0.2);
  // Body thump
  const o = AC.createOscillator(); const og = AC.createGain();
  o.type='triangle'; o.frequency.setValueAtTime(220, when);
  o.frequency.exponentialRampToValueAtTime(130, when+.06);
  og.gain.setValueAtTime(0.0001, when); og.gain.exponentialRampToValueAtTime(.4, when+.004); og.gain.exponentialRampToValueAtTime(.001, when+.12);
  o.connect(og); og.connect(snareGain);
  o.start(when); o.stop(when+0.14);
}
function hat(when, open=false){
  if(!AC) return;
  const dur = open ? 0.22 : 0.06;
  const n = noiseBuf(dur+0.02);
  const s = AC.createBufferSource(); s.buffer = n;
  const hp = AC.createBiquadFilter(); hp.type='highpass'; hp.frequency.value = 7000;
  const g = AC.createGain();
  g.gain.setValueAtTime(0.0001, when);
  g.gain.exponentialRampToValueAtTime(open?.32:.24, when+.003);
  g.gain.exponentialRampToValueAtTime(.001, when+dur);
  s.connect(hp); hp.connect(g); g.connect(kickGain);
  s.start(when); s.stop(when+dur+0.05);
}
function bass(freq, when, dur=0.22){
  if(!AC) return;
  const o1 = AC.createOscillator(); const o2 = AC.createOscillator();
  o1.type = 'sawtooth'; o2.type = 'square';
  o1.frequency.setValueAtTime(freq, when);
  o2.frequency.setValueAtTime(freq*0.5, when);
  o1.detune.value = -7; o2.detune.value = 7;
  const f = AC.createBiquadFilter(); f.type='lowpass';
  f.frequency.setValueAtTime(600, when);
  f.frequency.exponentialRampToValueAtTime(1600, when+0.05);
  f.frequency.exponentialRampToValueAtTime(380, when+dur);
  f.Q.value = 5;
  const g = AC.createGain();
  g.gain.setValueAtTime(0.0001, when);
  g.gain.exponentialRampToValueAtTime(0.7, when+0.008);
  g.gain.setTargetAtTime(0.45, when+0.04, 0.06);
  g.gain.exponentialRampToValueAtTime(0.001, when+dur);
  o1.connect(f); o2.connect(f); f.connect(g); g.connect(bassGain);
  o1.start(when); o2.start(when); o1.stop(when+dur+0.05); o2.stop(when+dur+0.05);
}
function arp(freq, when, dur=0.2){
  if(!AC) return;
  const o1 = AC.createOscillator(); const o2 = AC.createOscillator();
  o1.type = 'sawtooth'; o2.type = 'sawtooth';
  o1.frequency.setValueAtTime(freq, when);
  o2.frequency.setValueAtTime(freq, when);
  o1.detune.value = -8; o2.detune.value = 8;
  const f = AC.createBiquadFilter(); f.type='lowpass';
  f.frequency.setValueAtTime(3200, when);
  f.Q.value = 2;
  const g = AC.createGain();
  g.gain.setValueAtTime(0.0001, when);
  g.gain.exponentialRampToValueAtTime(0.45, when+0.004);
  g.gain.exponentialRampToValueAtTime(0.001, when+dur);
  o1.connect(f); o2.connect(f); f.connect(g); g.connect(arpGain);
  o1.start(when); o2.start(when); o1.stop(when+dur+0.05); o2.stop(when+dur+0.05);
}
function pad(freqs, when, dur){
  if(!AC) return;
  freqs.forEach(f=>{
    const o = AC.createOscillator(); o.type='sawtooth'; o.frequency.value=f; o.detune.value=(Math.random()-.5)*14;
    const lp = AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value = 1400; lp.Q.value = 0.5;
    const g = AC.createGain();
    g.gain.setValueAtTime(0.0001, when);
    g.gain.exponentialRampToValueAtTime(0.28, when+0.6);
    g.gain.setTargetAtTime(0.22, when+1.0, 0.4);
    g.gain.exponentialRampToValueAtTime(0.001, when+dur);
    o.connect(lp); lp.connect(g); g.connect(padGain);
    o.start(when); o.stop(when+dur+0.1);
  });
}

// White noise buffer helper
function noiseBuf(seconds){
  const len = Math.max(1, Math.floor(AC.sampleRate * seconds));
  const buf = AC.createBuffer(1, len, AC.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i] = Math.random()*2-1;
  return buf;
}

// ── Note frequencies ──
const NOTE = (() => {
  const names = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const map = {};
  for(let oct=1; oct<7; oct++){
    names.forEach((n, i)=>{
      const midi = (oct+1)*12 + i;
      map[n + oct] = 440 * Math.pow(2, (midi-69)/12);
    });
  }
  return map;
})();

// ── Track (A minor synthwave loop) ──
// Chord progression (2 bars each): Am - F - C - G  → 8 bars = one loop. Four loops = 32 bars.
const BPM = 104;
const SPB = 60 / BPM;                // seconds per beat
const BEATS_PER_BAR = 4;
const CHORDS = [
  { root:'A', deg:['A','C','E'],    bass:['A2','A2','E2','A2','A2','C3','E2','A2'] },
  { root:'F', deg:['F','A','C'],    bass:['F2','F2','C3','F2','F2','A2','C3','F2'] },
  { root:'C', deg:['C','E','G'],    bass:['C3','C3','G2','C3','C3','E3','G2','C3'] },
  { root:'G', deg:['G','B','D'],    bass:['G2','G2','D3','G2','G2','B2','D3','G2'] },
];
const ARP_PATTERN = [0,1,2,1,0,2,1,0, 0,2,1,2,0,1,2,1]; // 16 sixteenth-indices into chord tone
const LOOP_BARS = 8;
const LOOP_BEATS = LOOP_BARS * BEATS_PER_BAR; // 32

// Which chord index (0..3) at a given bar
function chordAtBar(bar){ return CHORDS[(bar >> 1) % CHORDS.length]; }

// ── Chart: notes the player must hit (lane 0..3) on beats ──
// Build a chart procedurally — 4-on-the-floor feel, syncopated taps.
// Beat numbers are absolute from song start (0, 1, 1.5, ...)
function buildChart(totalLoops){
  const chart = [];
  for(let loop=0; loop<totalLoops; loop++){
    for(let bar=0; bar<LOOP_BARS; bar++){
      const barStart = (loop*LOOP_BARS + bar) * BEATS_PER_BAR;
      // Kick hits (beats 0,1,2,3) → alternate lanes 0 and 1
      for(let b=0;b<4;b++){
        const lane = b%2===0 ? 0 : 1;
        chart.push({ beat: barStart + b, lane });
      }
      // Snare-ish hits on beat 1 and 3 in lane 2 or 3
      chart.push({ beat: barStart + 1, lane: 2 });
      chart.push({ beat: barStart + 3, lane: 3 });
      // Syncopation fills — vary by bar
      const phase = bar % 4;
      if(phase === 0){
        chart.push({ beat: barStart + 1.5, lane: 3 });
        chart.push({ beat: barStart + 2.5, lane: 2 });
      } else if(phase === 1){
        chart.push({ beat: barStart + 0.5, lane: 2 });
        chart.push({ beat: barStart + 2.5, lane: 3 });
        chart.push({ beat: barStart + 3.5, lane: 1 });
      } else if(phase === 2){
        chart.push({ beat: barStart + 0.75, lane: 3 });
        chart.push({ beat: barStart + 1.5, lane: 2 });
        chart.push({ beat: barStart + 2.25, lane: 0 });
        chart.push({ beat: barStart + 3.5, lane: 3 });
      } else {
        // End-of-phrase fill (bar 3, 7, ...)
        chart.push({ beat: barStart + 3.25, lane: 2 });
        chart.push({ beat: barStart + 3.5,  lane: 3 });
        chart.push({ beat: barStart + 3.75, lane: 1 });
      }
    }
  }
  return chart.sort((a,b)=>a.beat - b.beat);
}

const TOTAL_LOOPS = 3;   // ~ 1m 50s
const TOTAL_BEATS = TOTAL_LOOPS * LOOP_BEATS;
const TOTAL_DURATION = TOTAL_BEATS * SPB;

// ── Audio scheduler ──
// Walk 16th notes, schedule every sound. Also schedule on-screen note spawns.
let songStartAt = 0;
let nextSixteenth = 0;
let SCHED_AHEAD = 0.15; // seconds
let schedulerInterval = null;

function currentSongTime(){
  if(!AC) return 0;
  return AC.currentTime - songStartAt;
}
function currentBeat(){
  return currentSongTime() / SPB;
}

function startAudioSchedule(){
  if(!AC) return;
  nextSixteenth = 0;
  clearInterval(schedulerInterval);
  // Schedule a one-second count-in lead tail
  schedulerInterval = setInterval(audioTick, 25);
  // Pad chord plays on every 2-bar chord change
  // We'll schedule pads along with sixteenths in audioTick (at 0-th sixteenth of each 2-bar block).
}

function audioTick(){
  if(!AC) return;
  const now = AC.currentTime;
  // Song may not have started if we're in countdown
  while(true){
    const t = songStartAt + nextSixteenth * (SPB/4);
    if(t > now + SCHED_AHEAD) break;
    const sixteenth = nextSixteenth;
    const bar = Math.floor(sixteenth / 16);
    if(bar >= TOTAL_LOOPS * LOOP_BARS){
      clearInterval(schedulerInterval); schedulerInterval = null;
      break;
    }
    const beatInBar = Math.floor((sixteenth % 16) / 4);
    const sixteenthInBeat = sixteenth % 4;
    const chord = chordAtBar(bar);

    // Kick: beats 0 1 2 3 (quarter). Schedule when sixteenthInBeat === 0
    if(sixteenthInBeat === 0){ kick(t); pulseBeat(t); }
    // Snare: beats 1 and 3
    if(sixteenthInBeat === 0 && (beatInBar === 1 || beatInBar === 3)) snare(t);
    // Hats: every 8th note; open on off-beat of 4
    if(sixteenthInBeat === 0 || sixteenthInBeat === 2){
      hat(t, sixteenthInBeat === 2 && beatInBar === 3);
    }

    // Bass: 8th-note pattern per bar
    if(sixteenthInBeat % 2 === 0){
      const eighthInBar = Math.floor((sixteenth % 16) / 2);
      const bn = chord.bass[eighthInBar];
      if(bn && NOTE[bn]) bass(NOTE[bn], t, SPB*0.45);
    }
    // Arp: every sixteenth, walking across chord tones one octave up
    {
      const idx = ARP_PATTERN[sixteenth % 16];
      const tone = chord.deg[idx % chord.deg.length] + '5';
      if(NOTE[tone]) arp(NOTE[tone], t, SPB*0.22);
    }
    // Pad: on the first sixteenth of each chord change (every 2 bars = 32 sixteenths)
    if(sixteenth % 32 === 0){
      const ch = chordAtBar(bar);
      const freqs = ch.deg.map(n => NOTE[n+'3']).filter(Boolean);
      pad(freqs, t, SPB * BEATS_PER_BAR * 2);
    }

    nextSixteenth++;
  }
}

// ── Visual beat pulse ──
const pulseEl = document.getElementById('pulse');
let pulseDecayTimer = null;
function pulseBeat(when){
  // Schedule DOM flash to sync with audio time "when"
  const delay = Math.max(0, (when - AC.currentTime) * 1000);
  setTimeout(()=>{
    pulseEl.style.opacity = '1';
    clearTimeout(pulseDecayTimer);
    pulseDecayTimer = setTimeout(()=>{ pulseEl.style.opacity = '0'; }, 120);
  }, delay);
}

// ── Game state ──
const game = {
  running:false,
  chart:[],
  nextSpawnIdx:0,      // next chart note to render
  activeNotes:[],      // [{el, lane, hitAt, spawnedAt, hit:false, missed:false}]
  score:0,
  combo:0,
  maxCombo:0,
  perfects:0,
  goods:0,
  misses:0,
};

// Hit timing windows (seconds) from note hit time
const WIN_PERFECT = 0.085;
const WIN_GOOD    = 0.165;
const WIN_MISS    = 0.22;  // anything past this that hasn't been hit is a miss

// Approach time: how long a note is visible before its hit moment
const APPROACH = 1.6; // seconds

// ── DOM refs ──
const lanesEl = document.getElementById('lanes');
const laneDivs = [...document.querySelectorAll('.lane')];
const keyDivs  = [...document.querySelectorAll('.key')];
const scoreEl = document.getElementById('score');
const comboEl = document.getElementById('combo');
const accEl   = document.getElementById('acc');
const hitBar  = document.getElementById('hitBar');

function laneHitLineY(){
  // Hit bar bottom:18% from lanes container. Return top offset in pixels within .lanes box.
  const rect = lanesEl.getBoundingClientRect();
  return rect.height * (1 - 0.18);
}

// ── Spawn / update notes ──
function maybeSpawn(){
  const songT = currentSongTime();
  const beatNow = songT / SPB;
  while(game.nextSpawnIdx < game.chart.length){
    const n = game.chart[game.nextSpawnIdx];
    const hitAtSec = n.beat * SPB;
    if(hitAtSec - songT > APPROACH){ break; } // not time yet
    // Spawn it
    const el = document.createElement('div');
    el.className = 'note';
    const lane = laneDivs[n.lane];
    el.style.left = '8%'; el.style.right = '8%';
    el.style.top = '0px';
    el.style.transform = 'translateY(-40px)';
    lane.appendChild(el);
    game.activeNotes.push({ el, lane:n.lane, hitAt:hitAtSec, hit:false, missed:false });
    game.nextSpawnIdx++;
  }
}

function tickNotes(){
  const songT = currentSongTime();
  const hitY = laneHitLineY();
  for(const n of game.activeNotes){
    if(n.hit || n.missed) continue;
    const remaining = n.hitAt - songT; // seconds until it hits the line
    const progress = 1 - (remaining / APPROACH); // 0 at spawn, 1 at hit line
    const y = progress * hitY - 12; // -12 so center aligns with bar
    n.el.style.transform = `translateY(${y}px)`;
    if(songT - n.hitAt > WIN_MISS){
      // Missed
      n.missed = true;
      n.el.classList.add('fade');
      setTimeout(()=>n.el.remove(), 320);
      registerMiss(n.lane);
    }
  }
  // Remove stale notes from active list (once removed from DOM)
  game.activeNotes = game.activeNotes.filter(n => !(n.hit || n.missed) || document.body.contains(n.el));
}

// ── Player input ──
function hitLane(lane){
  if(!game.running) return;
  const songT = currentSongTime();
  // Visual feedback
  keyDivs[lane].classList.add('pressed');
  setTimeout(()=>keyDivs[lane].classList.remove('pressed'), 90);
  laneDivs[lane].classList.add('hit');
  setTimeout(()=>laneDivs[lane].classList.remove('hit'), 340);
  // Find nearest in-lane note not yet resolved
  let best = null, bestDist = Infinity;
  for(const n of game.activeNotes){
    if(n.hit || n.missed) continue;
    if(n.lane !== lane) continue;
    const d = Math.abs(n.hitAt - songT);
    if(d < bestDist){ bestDist = d; best = n; }
  }
  if(best && bestDist <= WIN_MISS){
    best.hit = true;
    best.el.remove();
    if(bestDist <= WIN_PERFECT){ registerHit(lane, 'perfect'); }
    else if(bestDist <= WIN_GOOD){ registerHit(lane, 'good'); }
    else { // late or early beyond GOOD → still miss visually but count as miss
      registerMiss(lane);
    }
  } else {
    // Nothing in window → just a harmless tap (small penalty optional — we'll ignore)
  }
}

function registerHit(lane, kind){
  if(kind==='perfect'){ game.score += 300; game.perfects++; }
  else { game.score += 120; game.goods++; }
  game.combo++;
  if(game.combo > game.maxCombo) game.maxCombo = game.combo;
  // Combo bonus
  const bonus = Math.min(10, Math.floor(game.combo / 10)) * 20;
  game.score += bonus;
  popText(lane, kind.toUpperCase(), kind);
  updateHud();
}
function registerMiss(lane){
  game.combo = 0;
  game.misses++;
  popText(lane, 'MISS', 'miss');
  updateHud();
}
function popText(lane, text, cls){
  const p = document.createElement('div');
  p.className = 'pop ' + cls;
  p.textContent = text;
  p.style.left = '50%';
  p.style.top = (laneHitLineY() - 20) + 'px';
  laneDivs[lane].appendChild(p);
  setTimeout(()=>p.remove(), 560);
}
function updateHud(){
  scoreEl.textContent = game.score.toLocaleString();
  comboEl.textContent = game.combo;
  const total = game.perfects + game.goods + game.misses;
  const acc = total === 0 ? 100 : Math.round(((game.perfects + game.goods*0.5) / total) * 100);
  accEl.textContent = `ACC ${acc}%`;
}

// Key bindings
const KEY_LANE = { 'd':0, 'f':1, 'j':2, 'k':3 };
const downKeys = new Set();
window.addEventListener('keydown', e=>{
  const k = e.key.toLowerCase();
  if(k in KEY_LANE){
    if(downKeys.has(k)) return;
    downKeys.add(k);
    hitLane(KEY_LANE[k]);
    e.preventDefault();
  }
});
window.addEventListener('keyup', e=>{
  const k = e.key.toLowerCase();
  if(k in KEY_LANE) downKeys.delete(k);
});
// Touch / click lanes
laneDivs.forEach((lane, i)=>{
  const tap = (e)=>{ e.preventDefault(); hitLane(i); };
  lane.addEventListener('pointerdown', tap);
});
keyDivs.forEach((k, i)=>{
  const tap = (e)=>{ e.preventDefault(); hitLane(i); };
  k.addEventListener('pointerdown', tap);
});

// ── Main loop ──
let rafId = 0;
function loop(){
  if(!game.running) return;
  maybeSpawn();
  tickNotes();
  // Check end of track (give a short tail so last notes can resolve)
  if(currentSongTime() > TOTAL_DURATION + 1.5){
    endGame();
    return;
  }
  rafId = requestAnimationFrame(loop);
}

// ── Start / end ──
const startBanner = document.getElementById('startBanner');
const endBanner   = document.getElementById('endBanner');
document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('replayBtn').addEventListener('click', ()=>{
  endBanner.classList.add('hidden');
  startGame();
});

function resetGame(){
  game.activeNotes.forEach(n=>n.el.remove());
  game.activeNotes = [];
  game.nextSpawnIdx = 0;
  game.score = 0; game.combo = 0; game.maxCombo = 0;
  game.perfects = 0; game.goods = 0; game.misses = 0;
  updateHud();
  // Clear any stray notes/pops
  laneDivs.forEach(l => {
    l.querySelectorAll('.note, .pop').forEach(n => n.remove());
  });
}

function startGame(){
  initAudio();
  if(AC.state === 'suspended') AC.resume();
  resetGame();
  game.chart = buildChart(TOTAL_LOOPS);
  startBanner.classList.add('hidden');
  endBanner.classList.add('hidden');
  // Count-in: 4 beats before track
  const now = AC.currentTime;
  songStartAt = now + SPB * 4;
  // Soft count-in clicks (hat each beat)
  for(let i=0;i<4;i++){
    hat(now + i*SPB, false);
    if(i===3) hat(now + i*SPB + SPB*0.5, false);
  }
  game.running = true;
  startAudioSchedule();
  rafId = requestAnimationFrame(loop);
}

function endGame(){
  game.running = false;
  cancelAnimationFrame(rafId);
  clearInterval(schedulerInterval); schedulerInterval = null;
  // Final stats
  const total = game.perfects + game.goods + game.misses;
  const acc = total === 0 ? 0 : Math.round(((game.perfects + game.goods*0.5) / total) * 100);
  document.getElementById('fScore').textContent = game.score.toLocaleString();
  document.getElementById('fMax').textContent   = game.maxCombo;
  document.getElementById('fPerfect').textContent = game.perfects;
  document.getElementById('fGood').textContent  = game.goods;
  document.getElementById('fMiss').textContent  = game.misses;
  document.getElementById('fAcc').textContent   = acc + '%';
  const grade = acc >= 98 ? 'S' : acc >= 92 ? 'A' : acc >= 80 ? 'B' : acc >= 65 ? 'C' : 'D';
  document.getElementById('grade').textContent = grade;
  endBanner.classList.remove('hidden');
}

/* ═══════════════════════════════════════════════════════════════
   Background canvas — synthwave grid + sun + stars
   ═══════════════════════════════════════════════════════════════ */
const bg = document.getElementById('bg');
const bctx = bg.getContext('2d');
let bgW=0, bgH=0, dpr = Math.min(2, window.devicePixelRatio||1);
function resizeBg(){
  dpr = Math.min(2, window.devicePixelRatio||1);
  bgW = window.innerWidth; bgH = window.innerHeight;
  bg.width = bgW * dpr; bg.height = bgH * dpr;
  bg.style.width = bgW+'px'; bg.style.height = bgH+'px';
  bctx.setTransform(dpr,0,0,dpr,0,0);
}
window.addEventListener('resize', resizeBg);
resizeBg();

const STARS = Array.from({length:80}, ()=>({
  x:Math.random(), y:Math.random()*0.5,
  r: Math.random()*1.3 + 0.3,
  tw: Math.random()*Math.PI*2,
  sp: 0.3 + Math.random()*1.4,
}));

function drawBg(t){
  const H = bgH, W = bgW;
  // Sky gradient
  const sky = bctx.createLinearGradient(0,0,0,H*0.62);
  sky.addColorStop(0,   '#0a0320');
  sky.addColorStop(0.35,'#22013f');
  sky.addColorStop(0.62,'#ff2975');
  bctx.fillStyle = sky; bctx.fillRect(0,0,W,H*0.62);

  // Ground gradient
  const gr = bctx.createLinearGradient(0, H*0.62, 0, H);
  gr.addColorStop(0, '#2a003f');
  gr.addColorStop(1, '#05001b');
  bctx.fillStyle = gr; bctx.fillRect(0, H*0.62, W, H*0.38);

  // Stars
  bctx.save();
  for(const s of STARS){
    const tw = 0.5 + Math.sin(t*0.001*s.sp + s.tw)*0.5;
    bctx.globalAlpha = 0.4 + tw*0.55;
    bctx.fillStyle = '#fff';
    bctx.beginPath(); bctx.arc(s.x*W, s.y*H*0.62, s.r, 0, Math.PI*2); bctx.fill();
  }
  bctx.restore();

  // Sun (semi-circle with scan lines)
  const cx = W*0.5, cy = H*0.62, rad = Math.min(W,H)*0.22;
  const sunG = bctx.createLinearGradient(cx, cy-rad, cx, cy+rad);
  sunG.addColorStop(0,    '#ffd23a');
  sunG.addColorStop(0.55, '#ff7a2d');
  sunG.addColorStop(1,    '#ff2975');
  bctx.save();
  bctx.beginPath();
  bctx.arc(cx, cy, rad, Math.PI, Math.PI*2);
  bctx.closePath();
  bctx.fillStyle = sunG;
  bctx.shadowColor = 'rgba(255,41,117,.7)'; bctx.shadowBlur = 50;
  bctx.fill();
  bctx.shadowBlur = 0;
  // Sun scan lines
  bctx.globalCompositeOperation = 'destination-out';
  const lines = 6;
  for(let i=0;i<lines;i++){
    const y = cy - rad + (rad * (0.55 + i*0.12)) + Math.sin(t*0.002 + i)*2;
    const h = rad * (0.045 + i*0.006);
    bctx.fillRect(cx-rad, y, rad*2, h);
  }
  bctx.globalCompositeOperation = 'source-over';
  bctx.restore();

  // Grid floor (perspective)
  bctx.save();
  const horizonY = H*0.62;
  const vanishX = cx;
  bctx.strokeStyle = 'rgba(255,41,117,.65)';
  bctx.lineWidth = 1.2;
  bctx.shadowColor = 'rgba(255,41,117,.6)';
  bctx.shadowBlur = 6;
  // Longitudinal lines (converging to vanishing point)
  const cols = 18;
  for(let i=-cols;i<=cols;i++){
    const frac = i/cols;
    const xBottom = vanishX + frac * W * 1.4;
    bctx.beginPath();
    bctx.moveTo(vanishX, horizonY);
    bctx.lineTo(xBottom, H);
    bctx.stroke();
  }
  // Latitudinal lines scrolling toward camera
  const scroll = (t*0.00045) % 1; // 0..1
  const rows = 14;
  for(let i=0;i<rows;i++){
    const f = (i + scroll) / rows;
    // Exponential spacing so rows accelerate toward the camera
    const fe = Math.pow(f, 2.2);
    const y = horizonY + (H - horizonY) * fe;
    const alpha = Math.max(0, 0.28 + fe*0.7);
    bctx.strokeStyle = `rgba(255,41,117,${alpha})`;
    bctx.beginPath();
    bctx.moveTo(0, y); bctx.lineTo(W, y);
    bctx.stroke();
  }
  bctx.restore();

  // Cyan horizon bloom
  bctx.save();
  const hb = bctx.createLinearGradient(0, horizonY-14, 0, horizonY+6);
  hb.addColorStop(0, 'rgba(0,229,255,0)');
  hb.addColorStop(0.7, 'rgba(0,229,255,.35)');
  hb.addColorStop(1, 'rgba(255,41,117,.0)');
  bctx.fillStyle = hb; bctx.fillRect(0, horizonY-14, W, 22);
  bctx.restore();
}

function bgLoop(t){
  drawBg(t || 0);
  requestAnimationFrame(bgLoop);
}
bgLoop();

// Prevent context menu long-press on mobile
lanesEl.addEventListener('contextmenu', e=>e.preventDefault());

</script>
