<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Neon Aquarium</title>
<link rel="icon" href="https://emojicdn.elk.sh/🐠">
<meta property="og:title" content="Neon Aquarium">
<meta property="og:description" content="Glowing fish that grow every time someone chats. Feed the tank together.">
<meta property="og:url" content="https://sloppy.live/neon-aquarium">
<meta property="og:image" content="https://emojicdn.elk.sh/🐠?style=apple&size=512">
<link href="https://fonts.googleapis.com/css2?family=Anybody:wght@200;500&family=Fira+Code:wght@300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100dvh;overflow:hidden;background:#020810;font-family:'Fira Code',monospace}
body{display:flex}
canvas{flex:1;display:block;cursor:crosshair}
#hud{position:fixed;top:10px;left:14px;font-size:10px;color:rgba(100,200,255,0.4);pointer-events:none;font-weight:300}
#sidebar{width:0;overflow:hidden;background:rgba(4,10,24,0.95);border-left:1px solid rgba(40,80,120,0.2);flex-shrink:0;transition:width .25s;display:flex;flex-direction:column}
#sidebar.open{width:180px}
#sidebar h3{font-size:9px;letter-spacing:2px;color:rgba(100,180,255,0.4);text-transform:uppercase;padding:14px 14px 8px;margin:0}
.sp-btn{display:flex;align-items:center;gap:8px;padding:8px 14px;border:none;background:none;cursor:pointer;font-family:'Fira Code',monospace;font-size:10px;color:rgba(140,200,255,0.6);transition:all .15s;text-align:left;width:100%}
.sp-btn:hover{background:rgba(40,80,140,0.15);color:#8cf}
.sp-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sp-info{font-size:8px;color:rgba(100,160,220,0.3);margin-top:1px}
.sidebar-section{border-top:1px solid rgba(40,80,120,0.15);margin-top:4px}
.clear-btn{margin:8px 14px;padding:6px;border:1px solid rgba(120,40,40,0.3);border-radius:4px;background:none;color:rgba(255,80,80,0.4);font-family:'Fira Code',monospace;font-size:9px;cursor:pointer;transition:all .15s}
.clear-btn:hover{border-color:rgba(255,80,80,0.5);color:rgba(255,80,80,0.7)}
.decor-toggle{cursor:pointer;user-select:none;display:flex;align-items:center;justify-content:space-between}
.decor-toggle:hover{color:rgba(100,200,255,0.6)}
.sub-label{font-size:8px;letter-spacing:1.5px;color:rgba(80,150,200,0.3);text-transform:uppercase;padding:6px 14px 2px}
#toggle-btn{position:fixed;top:10px;right:12px;background:rgba(20,40,70,0.6);border:1px solid rgba(40,80,120,0.3);color:rgba(100,200,255,0.6);font-family:'Fira Code',monospace;font-size:11px;padding:10px 16px;border-radius:6px;cursor:pointer;z-index:5;transition:all .15s;min-height:44px;min-width:44px;display:flex;align-items:center;justify-content:center}
#toggle-btn:hover{color:#8cf;border-color:rgba(80,160,255,0.5)}
#feed-flash{position:fixed;top:0;left:0;right:0;bottom:0;pointer-events:none;background:radial-gradient(ellipse at 50% 80%,rgba(40,200,255,0.06),transparent 70%);opacity:0;transition:opacity .3s}
a#back{position:fixed;bottom:8px;left:10px;font-size:9px;opacity:0.15;color:#468;text-decoration:none;z-index:5}
@media(max-width:500px){
  #sidebar.open{width:160px}
  .sp-btn{padding:10px 14px;font-size:11px;min-height:44px}
  .clear-btn{padding:10px;font-size:10px;min-height:44px}
  #hud{font-size:9px;max-width:calc(100% - 80px)}
  #toggle-btn{top:8px;right:8px}
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="sidebar">
<h3>Add Fish</h3>
<div id="sp-list"></div>
<div class="sidebar-section"></div>
<h3 class="decor-toggle" id="decorToggle">Decor <span id="decorArrow">▸</span></h3>
<div id="decor-menu" style="display:none">
<div class="sub-label" id="stoneLabel">Stones</div>
<div id="stone-list"></div>
<div class="sub-label" id="lifeLabel">Plants</div>
<div id="life-list"></div>
</div>
<div class="sidebar-section"></div>
<button class="clear-btn" id="clearBtn">Clear Tank</button>
</div>
<div id="hud"></div>
<div id="feed-flash"></div>
<button id="toggle-btn">+Fish</button>
<a id="back" href="https://sloppy.live">sloppy.live</a>

<script>
(function(){
var C=document.getElementById('c'),X=C.getContext('2d');
var W,H;
function resize(){W=C.width=C.clientWidth;H=C.height=C.clientHeight;}
resize();window.addEventListener('resize',resize);

// --- FISH ---
var SPECIES=[
  {name:'Tetra',hue:190,bodyW:1.8,bodyH:0.7,tailSize:0.8,finSize:0.3,speed:1.2,glow:'rgba(40,200,255,'},
  {name:'Angel',hue:270,bodyW:1.2,bodyH:1.4,tailSize:0.6,finSize:0.7,speed:0.7,glow:'rgba(160,80,255,'},
  {name:'Guppy',hue:320,bodyW:1.5,bodyH:0.6,tailSize:1.0,finSize:0.2,speed:1.5,glow:'rgba(255,80,200,'},
  {name:'Betta',hue:20,bodyW:1.4,bodyH:0.9,tailSize:1.3,finSize:0.8,speed:0.6,glow:'rgba(255,140,40,'},
  {name:'Neon',hue:140,bodyW:1.6,bodyH:0.5,tailSize:0.7,finSize:0.2,speed:1.4,glow:'rgba(40,255,140,'},
  {name:'Molly',hue:50,bodyW:1.5,bodyH:0.8,tailSize:0.6,finSize:0.4,speed:1.0,glow:'rgba(255,220,40,'},
  {name:'Danio',hue:210,bodyW:2.0,bodyH:0.45,tailSize:0.5,finSize:0.15,speed:1.8,glow:'rgba(60,160,255,'},
  {name:'Jelly',hue:280,bodyW:1.0,bodyH:1.0,tailSize:0,finSize:0,speed:0.3,glow:'rgba(180,100,255,',jelly:true}
];

var fish=[];
var totalChats=0;
var bubbles=[];
var particles=[];
var lightning={active:false,bolts:[],timer:0,x:0,y:0,flash:0};

function makeBolt(x1,y1,x2,y2,depth){
  var segs=[];
  var dx=x2-x1,dy=y2-y1;
  var len=Math.sqrt(dx*dx+dy*dy);
  var steps=Math.max(3,Math.floor(len/12));
  var px=x1,py=y1;
  segs.push({x:px,y:py});
  for(var i=1;i<steps;i++){
    var frac=i/steps;
    var jitter=(1-frac)*30+10;
    px=x1+dx*frac+(Math.random()-0.5)*jitter;
    py=y1+dy*frac+(Math.random()-0.5)*jitter*0.3;
    segs.push({x:px,y:py});
    // branch
    if(depth<2&&Math.random()<0.3){
      var bx=px+(Math.random()-0.5)*60;
      var by=py+30+Math.random()*40;
      lightning.bolts.push(makeBolt(px,py,bx,by,depth+1));
    }
  }
  segs.push({x:x2,y:y2});
  return segs;
}

function strikeLightning(cx,cy){
  lightning.active=true;
  lightning.timer=0.6;
  lightning.flash=1;
  lightning.x=cx;lightning.y=cy;
  lightning.bolts=[];
  // main bolt from surface to click point
  var topX=cx+(Math.random()-0.5)*40;
  lightning.bolts.push(makeBolt(topX,0,cx,cy,0));
  // hit kraken eye?
  if(kraken.active&&kraken.retreatTimer<=0){
    var edx=cx-kraken.eyeX,edy=cy-kraken.eyeY;
    var eDist=Math.sqrt(edx*edx+edy*edy);
    if(eDist<kraken.eyeRadius*3){
      kraken.hp--;
      // pain flash particles
      for(var i=0;i<12;i++){
        particles.push({x:kraken.eyeX+(Math.random()-0.5)*20,y:kraken.eyeY+(Math.random()-0.5)*15,vx:(Math.random()-0.5)*4,vy:-1-Math.random()*3,life:1,hue:0,size:2+Math.random()*3});
      }
      // release one grabbed fish
      for(var i=0;i<kraken.tentacles.length;i++){
        var tent=kraken.tentacles[i];
        if(tent.grabbing&&tent.grabTarget){
          tent.grabTarget.vy=-3;tent.grabbing=false;tent.grabTarget=null;
          break;
        }
      }
    }
  }
  // scare predators away from strike
  for(var i=0;i<fish.length;i++){
    var f=fish[i];
    var dx=f.x-cx,dy=f.y-cy;
    var dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<250){
      var force=f.size>=16?8:3; // predators get pushed much harder
      var push=(250-dist)/250*force;
      if(dist>0){f.vx+=dx/dist*push;f.vy+=dy/dist*push;}
      // predators shrink slightly from fear
      if(f.size>=16){
        f.growTarget=Math.max(8,f.growTarget-1.5);
      }
    }
  }
}

function makeFish(){
  var sp=SPECIES[Math.floor(Math.random()*SPECIES.length)];
  var size=8+Math.random()*6;
  return{
    x:Math.random()*W,y:60+Math.random()*(H-160),
    vx:(Math.random()-0.5)*sp.speed,vy:(Math.random()-0.5)*0.3,
    size:size,maxSize:size,growTarget:size,
    sp:sp,
    phase:Math.random()*Math.PI*2,
    wobble:Math.random()*Math.PI*2,
    breathe:Math.random()*Math.PI*2,
    tailPhase:Math.random()*Math.PI*2,
    hueShift:(Math.random()-0.5)*30,
    alpha:0.7+Math.random()*0.3,
    turnTimer:0,
    blinkTimer:2+Math.random()*4,
    blink:false
  };
}

// init fish — load from localStorage or create fresh
// (loadState defined later, called after all functions exist)

function growRandomFish(amount){
  if(fish.length===0)return;
  var f=fish[Math.floor(Math.random()*fish.length)];
  f.growTarget+=amount||0.8;
  if(f.growTarget>60)f.growTarget=60;
  // feed particles
  for(var i=0;i<6;i++){
    particles.push({
      x:f.x,y:f.y,
      vx:(Math.random()-0.5)*2,vy:-1-Math.random()*2,
      life:1,hue:f.sp.hue+f.hueShift,size:2+Math.random()*3
    });
  }
  // flash
  var flash=document.getElementById('feed-flash');
  flash.style.opacity='1';
  setTimeout(function(){flash.style.opacity='0';},150);
}

// spawn new fish occasionally when tank is fed enough
function maybeSpawnFish(){
  if(totalChats>0&&totalChats%8===0&&fish.length<30){
    fish.push(makeFish());
  }
}

// --- ENVIRONMENT ---
var seaweedPoles=[];
for(var i=0;i<7;i++){
  seaweedPoles.push({
    x:40+Math.random()*(W>400?W-80:320),
    segments:4+Math.floor(Math.random()*4),
    hue:100+Math.random()*60,
    phase:Math.random()*Math.PI*2,
    height:40+Math.random()*60
  });
}

var dustParticles=[];
for(var i=0;i<40;i++){
  dustParticles.push({x:Math.random()*2000,y:Math.random()*2000,s:0.5+Math.random()*1.5,d:0.3+Math.random()*0.7,p:Math.random()*Math.PI*2});
}

// --- UPDATE ---
var t=0;
function update(){
  t+=0.016;
  // fish
  for(var i=0;i<fish.length;i++){
    var f=fish[i];
    // smooth grow
    f.size+=(f.growTarget-f.size)*0.02;
    // swim
    f.phase+=0.03;
    f.wobble+=0.02;
    f.breathe+=0.04;
    f.tailPhase+=0.12*f.sp.speed;
    if(f.sp.jelly){
      // jellyfish: pulse propulsion upward, slow lateral drift
      var pulse=Math.sin(f.phase*2);
      if(pulse>0.9)f.vy-=0.15; // upward thrust on pulse peak
      f.vy+=0.01; // gentle sinking
      f.vx+=(Math.random()-0.5)*0.02;
      f.vx*=0.98;f.vy*=0.97;
      f.x+=f.vx;f.y+=f.vy;
    }else{
      f.x+=f.vx;
      f.y+=f.vy+Math.sin(f.wobble)*0.15;
    }
    // turn at edges
    if(f.x<-f.size*3)f.vx=Math.abs(f.vx);
    if(f.x>W+f.size*3)f.vx=-Math.abs(f.vx);
    if(f.y<30)f.vy+=0.02;
    if(f.y>H-100)f.vy-=0.02;
    // gentle random direction changes
    f.turnTimer-=0.016;
    if(f.turnTimer<=0){
      f.turnTimer=f.sp.jelly?5+Math.random()*8:3+Math.random()*5;
      f.vx+=(Math.random()-0.5)*0.4*f.sp.speed;
      f.vy+=(Math.random()-0.5)*(f.sp.jelly?0.1:0.2);
    }
    // clamp speed
    var spd=Math.sqrt(f.vx*f.vx+f.vy*f.vy);
    var maxSpd=f.sp.speed*1.2;
    if(spd>maxSpd){f.vx*=maxSpd/spd;f.vy*=maxSpd/spd;}
    // blink
    f.blinkTimer-=0.016;
    if(f.blinkTimer<=0){
      f.blink=!f.blink;
      f.blinkTimer=f.blink?0.1:2+Math.random()*4;
    }
  }
  // predator-prey: large fish hunt smaller ones
  var eaten=[];
  for(var i=0;i<fish.length;i++){
    var a=fish[i];
    if(a.size<16||a.sp.jelly)continue; // only fish size 16+ become predators, not jellyfish
    for(var j=0;j<fish.length;j++){
      if(i===j||eaten.indexOf(j)>=0)continue;
      var b=fish[j];
      if(b.size>=a.size*0.6||b.sp.jelly)continue; // don't eat jellyfish
      var dx=b.x-a.x,dy=b.y-a.y;
      var dist=Math.sqrt(dx*dx+dy*dy);
      // chase: predator steers toward nearby small fish
      if(dist<120+a.size*3){
        a.vx+=(dx/dist)*0.08;
        a.vy+=(dy/dist)*0.04;
      }
      // eat: close enough to swallow
      if(dist<a.size*0.8+b.size*0.5){
        eaten.push(j);
        // predator grows from the meal
        a.growTarget+=b.size*0.3;
        if(a.growTarget>60)a.growTarget=60;
        // burst of prey-colored particles
        for(var k=0;k<10;k++){
          particles.push({
            x:b.x,y:b.y,
            vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,
            life:1,hue:b.sp.hue+b.hueShift,size:1.5+Math.random()*2
          });
        }
      }
    }
    // predators flee prey slightly to avoid killing everything
    if(a.size>35){
      a.vx*=0.98; // big fish are sluggish
    }
  }
  // remove eaten fish (reverse order to preserve indices)
  eaten.sort(function(a,b){return b-a;});
  for(var i=0;i<eaten.length;i++){
    fish.splice(eaten[i],1);
  }
  // replenish: if population drops below 6, spawn replacements
  while(fish.length<6)fish.push(makeFish());

  // lightning decay
  if(lightning.active){
    lightning.timer-=0.016;
    lightning.flash*=0.88;
    if(lightning.timer<=0){lightning.active=false;lightning.bolts=[];}
    // regenerate bolts for flicker effect
    if(lightning.timer>0.3&&Math.random()<0.4){
      lightning.bolts=[];
      var topX=lightning.x+(Math.random()-0.5)*40;
      lightning.bolts.push(makeBolt(topX,0,lightning.x,lightning.y,0));
    }
  }

  // volcano eruption cycle
  eruptTimer-=0.016;
  if(eruptTimer<=0){
    // check if any volcano exists
    var hasVolcano=false;
    for(var i=0;i<decor.length;i++){if(decor[i].shape==='volcano'){hasVolcano=true;break;}}
    if(hasVolcano){
      erupting=true;
      eruptDuration=3+Math.random()*3;
      eruptTimer=12+Math.random()*15; // next eruption in 12-27s
    }else{
      eruptTimer=3;
    }
  }
  if(erupting){
    eruptDuration-=0.016;
    if(eruptDuration<=0){erupting=false;}
    // spawn bioluminescent particles from each volcano
    for(var i=0;i<decor.length;i++){
      var d=decor[i];
      if(d.shape!=='volcano')continue;
      var peakY=d.y-50*1.6;
      // eruption particles: varying colors for bioluminescence
      if(Math.random()<0.6){
        var bioHues=[340,180,120,60,280,30]; // pink, cyan, green, yellow, purple, orange
        var bh=bioHues[Math.floor(Math.random()*bioHues.length)];
        volcanoParticles.push({
          x:d.x+(Math.random()-0.5)*20,
          y:peakY,
          vx:(Math.random()-0.5)*2.5,
          vy:-2-Math.random()*4,
          life:1,
          hue:bh,
          size:2+Math.random()*4,
          glow:Math.random()<0.3 // some particles glow extra
        });
      }
      // lava blobs — heavier, fall back down
      if(Math.random()<0.2){
        volcanoParticles.push({
          x:d.x+(Math.random()-0.5)*15,
          y:peakY,
          vx:(Math.random()-0.5)*1.5,
          vy:-1.5-Math.random()*2,
          life:1,
          hue:15+Math.random()*20,
          size:3+Math.random()*3,
          glow:false,
          lava:true
        });
      }
      // eruption feeds nearby fish
      if(Math.random()<0.03){
        for(var j=0;j<fish.length;j++){
          var f=fish[j];
          var dx=f.x-d.x,dy=f.y-d.y;
          if(Math.sqrt(dx*dx+dy*dy)<150){
            f.growTarget+=0.1;
            if(f.growTarget>60)f.growTarget=60;
          }
        }
      }
    }
  }
  // update volcano particles
  for(var i=volcanoParticles.length-1;i>=0;i--){
    var p=volcanoParticles[i];
    p.x+=p.vx;p.y+=p.vy;
    if(p.lava){p.vy+=0.04;}else{p.vy+=0.005;} // bioluminescent floats, lava sinks
    p.vx*=0.99;
    p.life-=p.lava?0.015:0.008;
    if(p.life<=0)volcanoParticles.splice(i,1);
  }

  // particles
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];
    p.x+=p.vx;p.y+=p.vy;
    p.vy+=0.02;
    p.life-=0.02;
    if(p.life<=0)particles.splice(i,1);
  }

  // --- KRAKEN UPDATE ---
  var totalBiomass=0;
  for(var i=0;i<fish.length;i++)totalBiomass+=fish[i].size;
  // spawn check: biomass > 400 and not active and cooldown done
  if(!kraken.active&&totalBiomass>400&&kraken.spawnCooldown<=0){
    spawnKraken();
  }
  if(!kraken.active&&kraken.spawnCooldown>0)kraken.spawnCooldown-=0.016;

  if(kraken.active){
    kraken.pulsePhase+=0.04;
    // rise from the deep
    if(kraken.y>kraken.targetY)kraken.y-=0.5;
    kraken.eyeX=kraken.x;kraken.eyeY=kraken.y-40;

    // retreating?
    if(kraken.retreatTimer>0){
      kraken.retreatTimer-=0.016;
      kraken.y+=1.5;
      if(kraken.retreatTimer<=0||kraken.y>H+80){
        kraken.active=false;
        kraken.level++;
        kraken.spawnCooldown=20+Math.random()*15; // 20-35s before return
        // release any grabbed fish
        for(var i=0;i<kraken.grabbed.length;i++){
          var gf=kraken.grabbed[i];
          if(gf)gf.vy=-2;
        }
        kraken.grabbed=[];
      }
    }else{
      // tentacle behavior
      for(var ti=0;ti<kraken.tentacles.length;ti++){
        var tent=kraken.tentacles[ti];
        tent.phase+=tent.speed*0.016*3;
        var baseX=kraken.x+tent.baseX;
        var baseY=kraken.y-10;

        if(tent.grabbing&&tent.grabTarget){
          // move tip toward grabbed fish
          tent.grabProgress=Math.min(1,tent.grabProgress+0.02);
          tent.tipX+=(tent.grabTarget.x-tent.tipX)*0.08;
          tent.tipY+=(tent.grabTarget.y-tent.tipY)*0.08;
          // drag fish downward
          tent.grabTarget.x+=(kraken.x-tent.grabTarget.x)*0.01;
          tent.grabTarget.y+=0.5+kraken.rage;
          tent.grabTarget.vx*=0.9;tent.grabTarget.vy*=0.9;
          // fish dragged off screen = eaten
          if(tent.grabTarget.y>H+20){
            var idx=fish.indexOf(tent.grabTarget);
            if(idx>=0){
              // death particles
              for(var k=0;k<8;k++){
                particles.push({x:tent.grabTarget.x,y:H,vx:(Math.random()-0.5)*3,vy:-2-Math.random()*2,life:1,hue:tent.grabTarget.sp.hue,size:2+Math.random()*2});
              }
              fish.splice(idx,1);
            }
            tent.grabbing=false;tent.grabTarget=null;tent.grabProgress=0;
          }
        }else{
          // idle sway — seek nearby fish
          var swayX=Math.sin(tent.phase)*40+Math.sin(tent.phase*0.7)*20;
          var swayY=-tent.len+Math.sin(tent.phase*1.3)*15;
          tent.tipX=baseX+swayX;
          tent.tipY=baseY+swayY;
          // try to grab a fish
          if(Math.random()<0.008+kraken.rage*0.01){
            var closest=null,closestD=120;
            for(var fi=0;fi<fish.length;fi++){
              var f=fish[fi];
              if(f.sp.jelly)continue; // don't grab jellyfish
              var alreadyGrabbed=false;
              for(var gi=0;gi<kraken.tentacles.length;gi++){
                if(kraken.tentacles[gi].grabTarget===f){alreadyGrabbed=true;break;}
              }
              if(alreadyGrabbed)continue;
              var dd=Math.sqrt((f.x-tent.tipX)*(f.x-tent.tipX)+(f.y-tent.tipY)*(f.y-tent.tipY));
              if(dd<closestD){closestD=dd;closest=f;}
            }
            if(closest){
              tent.grabbing=true;tent.grabTarget=closest;tent.grabProgress=0;
              kraken.grabbed.push(closest);
            }
          }
        }
      }
    }
    // kraken defeated — check hp
    if(kraken.hp<=0&&kraken.retreatTimer<=0){
      kraken.retreatTimer=3;
      // release grabbed fish upward
      for(var ti=0;ti<kraken.tentacles.length;ti++){
        var tent=kraken.tentacles[ti];
        if(tent.grabTarget){tent.grabTarget.vy=-3;tent.grabbing=false;tent.grabTarget=null;}
      }
      // victory particles
      for(var i=0;i<20;i++){
        particles.push({x:kraken.eyeX+(Math.random()-0.5)*40,y:kraken.eyeY+(Math.random()-0.5)*20,vx:(Math.random()-0.5)*4,vy:-2-Math.random()*3,life:1,hue:0,size:3+Math.random()*3});
      }
    }
  }
}

// --- DRAW ---
function drawSeaweed(sw){
  var baseX=sw.x,baseY=H-40;
  var segH=sw.height/sw.segments;
  X.strokeStyle='hsla('+sw.hue+',60%,30%,0.6)';
  X.lineWidth=3;
  X.beginPath();
  X.moveTo(baseX,baseY);
  for(var j=1;j<=sw.segments;j++){
    var sway=Math.sin(t*0.8+sw.phase+j*0.5)*8*j/sw.segments;
    var px=baseX+sway;
    var py=baseY-segH*j;
    X.lineTo(px,py);
  }
  X.stroke();
  // glow
  X.strokeStyle='hsla('+sw.hue+',80%,50%,0.08)';
  X.lineWidth=10;
  X.beginPath();
  X.moveTo(baseX,baseY);
  for(var j=1;j<=sw.segments;j++){
    var sway=Math.sin(t*0.8+sw.phase+j*0.5)*8*j/sw.segments;
    X.lineTo(baseX+sway,baseY-segH*j);
  }
  X.stroke();
}

function drawJelly(f){
  var sz=f.size;
  var hue=f.sp.hue+f.hueShift;
  var pulse=Math.sin(f.phase*2); // -1 to 1
  var bellSquash=1-pulse*0.15; // bell contracts on pulse
  var bellW=sz*1.2;
  var bellH=sz*0.8*bellSquash;

  X.save();
  X.translate(f.x,f.y);

  // outer glow
  var og=X.createRadialGradient(0,0,sz*0.3,0,0,sz*3);
  og.addColorStop(0,'hsla('+hue+',80%,60%,'+(0.06+pulse*0.03)+')');
  og.addColorStop(1,'hsla('+hue+',80%,60%,0)');
  X.fillStyle=og;
  X.beginPath();X.arc(0,0,sz*3,0,Math.PI*2);X.fill();

  // tentacles (6-8 flowing tendrils)
  var numTent=6+Math.floor(sz/8);
  for(var i=0;i<numTent;i++){
    var tx=(i/(numTent-1)-0.5)*bellW*1.6;
    var tentLen=sz*1.5+sz*Math.sin(t*0.5+i*1.7)*0.3;
    var sway=Math.sin(t*0.7+i*2.1)*8+Math.sin(t*1.3+i*0.9)*4;
    var sway2=Math.sin(t*0.5+i*3.2)*12;
    var alpha=0.15+pulse*0.08;

    // tentacle glow
    X.strokeStyle='hsla('+hue+',85%,70%,'+alpha*0.3+')';
    X.lineWidth=4;X.lineCap='round';
    X.beginPath();
    X.moveTo(tx,bellH*0.3);
    X.quadraticCurveTo(tx+sway,bellH*0.3+tentLen*0.5,tx+sway2,bellH*0.3+tentLen);
    X.stroke();

    // tentacle core
    X.strokeStyle='hsla('+hue+',80%,65%,'+alpha+')';
    X.lineWidth=1.5;
    X.beginPath();
    X.moveTo(tx,bellH*0.3);
    X.quadraticCurveTo(tx+sway,bellH*0.3+tentLen*0.5,tx+sway2,bellH*0.3+tentLen);
    X.stroke();

    // tip glow dot
    if(Math.sin(t*2+i*1.5)>0.3){
      X.fillStyle='hsla('+(hue+40)+',90%,80%,'+(alpha*0.8)+')';
      X.beginPath();X.arc(tx+sway2,bellH*0.3+tentLen,1.5,0,Math.PI*2);X.fill();
    }
  }

  // bell (dome shape)
  X.fillStyle='hsla('+hue+',60%,55%,'+(0.2+pulse*0.08)+')';
  X.beginPath();
  X.ellipse(0,0,bellW*0.5,bellH*0.5,0,Math.PI,Math.PI*2); // top dome
  X.quadraticCurveTo(bellW*0.5,bellH*0.3,0,bellH*0.35);
  X.quadraticCurveTo(-bellW*0.5,bellH*0.3,-bellW*0.5,0);
  X.fill();

  // bell highlight
  var hg=X.createRadialGradient(0,-bellH*0.2,0,0,-bellH*0.1,bellW*0.4);
  hg.addColorStop(0,'hsla('+hue+',80%,80%,'+(0.15+pulse*0.1)+')');
  hg.addColorStop(1,'hsla('+hue+',80%,80%,0)');
  X.fillStyle=hg;
  X.beginPath();X.ellipse(0,-bellH*0.15,bellW*0.35,bellH*0.3,0,0,Math.PI*2);X.fill();

  // internal organs (faint radial lines)
  X.strokeStyle='hsla('+(hue+20)+',70%,60%,'+(0.08+pulse*0.04)+')';
  X.lineWidth=0.8;
  for(var i=0;i<4;i++){
    var ox=(i/3-0.5)*bellW*0.5;
    X.beginPath();
    X.moveTo(ox,-bellH*0.1);
    X.lineTo(ox+Math.sin(t+i)*2,bellH*0.2);
    X.stroke();
  }

  // rim glow (bottom edge of bell pulses)
  X.strokeStyle='hsla('+(hue+30)+',90%,75%,'+(0.2+pulse*0.15)+')';
  X.lineWidth=2;
  X.beginPath();
  X.ellipse(0,bellH*0.15,bellW*0.45,bellH*0.08,0,0,Math.PI);
  X.stroke();

  // bioluminescent spots
  for(var i=0;i<3;i++){
    var sx=(Math.sin(i*2.5+t*0.3)-0.5)*bellW*0.3;
    var sy=-bellH*0.1+Math.cos(i*3.1+t*0.2)*bellH*0.15;
    var spotAlpha=0.1+Math.sin(t*1.5+i*2)*0.1;
    X.fillStyle='hsla('+(hue+60)+',90%,80%,'+spotAlpha+')';
    X.beginPath();X.arc(sx,sy,sz*0.08,0,Math.PI*2);X.fill();
  }

  X.restore();
}

function drawFish(f){
  if(f.sp.jelly)return drawJelly(f);
  var dir=f.vx>=0?1:-1;
  var sz=f.size;
  var bw=sz*f.sp.bodyW;
  var bh=sz*f.sp.bodyH;
  var hue=f.sp.hue+f.hueShift;
  var breathScale=1+Math.sin(f.breathe)*0.03;

  X.save();
  X.translate(f.x,f.y);
  X.scale(dir,breathScale);

  // outer glow — predators get a red-tinted aura
  var isPredator=sz>=16;
  var grad=X.createRadialGradient(0,0,sz*0.5,0,0,sz*2.5);
  if(isPredator){
    grad.addColorStop(0,'rgba(255,60,40,0.06)');
    grad.addColorStop(0.5,f.sp.glow+'0.04)');
    grad.addColorStop(1,f.sp.glow+'0)');
  }else{
    grad.addColorStop(0,f.sp.glow+'0.06)');
    grad.addColorStop(1,f.sp.glow+'0)');
  }
  X.fillStyle=grad;
  X.fillRect(-sz*3,-sz*3,sz*6,sz*6);

  // tail
  var tailSwing=Math.sin(f.tailPhase)*0.4;
  var ts=sz*f.sp.tailSize;
  X.fillStyle='hsla('+hue+',80%,55%,'+f.alpha*0.6+')';
  X.beginPath();
  X.moveTo(-bw*0.4,0);
  X.quadraticCurveTo(-bw*0.5-ts*0.5+tailSwing*ts,-ts*0.7,-bw*0.4-ts+tailSwing*ts*1.5,-ts*0.9);
  X.quadraticCurveTo(-bw*0.5-ts*0.3,0,-bw*0.4-ts+tailSwing*ts*1.5,ts*0.9);
  X.quadraticCurveTo(-bw*0.5-ts*0.5+tailSwing*ts,ts*0.7,-bw*0.4,0);
  X.fill();

  // dorsal fin
  if(f.sp.finSize>0.3){
    var finSway=Math.sin(f.tailPhase*0.7)*0.15;
    X.fillStyle='hsla('+hue+',70%,50%,'+f.alpha*0.4+')';
    X.beginPath();
    X.moveTo(bw*0.1,-bh*0.4);
    X.quadraticCurveTo(0+finSway*sz,-bh*0.4-sz*f.sp.finSize,-bw*0.2,-bh*0.3);
    X.fill();
  }

  // body
  X.fillStyle='hsla('+hue+',70%,50%,'+f.alpha+')';
  X.beginPath();
  X.ellipse(0,0,bw*0.5,bh*0.5,0,0,Math.PI*2);
  X.fill();

  // body highlight
  var hgrad=X.createRadialGradient(bw*0.1,-bh*0.15,0,0,0,bw*0.4);
  hgrad.addColorStop(0,'hsla('+hue+',80%,80%,0.25)');
  hgrad.addColorStop(1,'hsla('+hue+',80%,80%,0)');
  X.fillStyle=hgrad;
  X.beginPath();
  X.ellipse(0,0,bw*0.5,bh*0.5,0,0,Math.PI*2);
  X.fill();

  // neon stripe (for tetra/neon types)
  if(f.sp.bodyW>1.5){
    X.strokeStyle='hsla('+(hue+30)+',100%,70%,'+f.alpha*0.7+')';
    X.lineWidth=sz*0.08;
    X.beginPath();
    X.moveTo(bw*0.35,0);
    X.lineTo(-bw*0.3,0);
    X.stroke();
    // stripe glow
    X.strokeStyle='hsla('+(hue+30)+',100%,70%,0.15)';
    X.lineWidth=sz*0.25;
    X.beginPath();
    X.moveTo(bw*0.35,0);
    X.lineTo(-bw*0.3,0);
    X.stroke();
  }

  // eye — predators get red-tinted pupils
  if(!f.blink){
    X.fillStyle=isPredator?'rgba(255,230,220,0.9)':'rgba(220,240,255,0.9)';
    X.beginPath();X.arc(bw*0.25,-bh*0.05,sz*0.12,0,Math.PI*2);X.fill();
    X.fillStyle=isPredator?'rgba(60,10,10,0.9)':'rgba(10,20,40,0.9)';
    X.beginPath();X.arc(bw*0.27,-bh*0.05,sz*0.06,0,Math.PI*2);X.fill();
    if(isPredator){
      X.fillStyle='rgba(255,80,40,0.6)';
      X.beginPath();X.arc(bw*0.27,-bh*0.05,sz*0.035,0,Math.PI*2);X.fill();
    }
    X.fillStyle='rgba(200,230,255,0.8)';
    X.beginPath();X.arc(bw*0.28,-bh*0.08,sz*0.025,0,Math.PI*2);X.fill();
  }else{
    X.strokeStyle='rgba(180,220,255,0.5)';X.lineWidth=1;
    X.beginPath();X.moveTo(bw*0.2,-bh*0.05);X.lineTo(bw*0.32,-bh*0.05);X.stroke();
  }

  X.restore();
}

function draw(){
  // deep ocean gradient
  var bg=X.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#020a18');
  bg.addColorStop(0.4,'#041020');
  bg.addColorStop(0.85,'#061428');
  bg.addColorStop(1,'#081830');
  X.fillStyle=bg;
  X.fillRect(0,0,W,H);

  // light rays from top
  X.save();
  for(var i=0;i<5;i++){
    var rx=W*0.15+i*W*0.18;
    var sway=Math.sin(t*0.3+i*1.2)*20;
    var grad=X.createLinearGradient(rx+sway,0,rx+sway+40,H*0.7);
    grad.addColorStop(0,'rgba(40,120,200,0.03)');
    grad.addColorStop(0.5,'rgba(40,120,200,0.015)');
    grad.addColorStop(1,'rgba(40,120,200,0)');
    X.fillStyle=grad;
    X.beginPath();
    X.moveTo(rx+sway-15,0);X.lineTo(rx+sway+25,0);
    X.lineTo(rx+sway+60,H*0.7);X.lineTo(rx+sway-50,H*0.7);
    X.fill();
  }
  X.restore();

  // dust particles
  for(var i=0;i<dustParticles.length;i++){
    var d=dustParticles[i];
    var dx=(d.x+Math.sin(t*0.2+d.p)*30)%W;
    var dy=(d.y+t*d.d*8)%H;
    X.fillStyle='rgba(100,180,255,'+(0.03+Math.sin(t+d.p)*0.02)+')';
    X.beginPath();X.arc(dx,dy,d.s,0,Math.PI*2);X.fill();
  }

  // seaweed
  for(var i=0;i<seaweedPoles.length;i++)drawSeaweed(seaweedPoles[i]);

  // sandy bottom
  var sand=X.createLinearGradient(0,H-45,0,H);
  sand.addColorStop(0,'rgba(20,40,60,0)');
  sand.addColorStop(0.3,'rgba(25,45,55,0.4)');
  sand.addColorStop(1,'rgba(30,50,60,0.6)');
  X.fillStyle=sand;
  X.fillRect(0,H-45,W,45);
  // sand pebbles
  for(var i=0;i<20;i++){
    var px=(i*137+53)%W;
    X.fillStyle='rgba(40,70,80,0.3)';
    X.beginPath();X.ellipse(px,H-15+Math.sin(i)*8,3+i%4,2,0,0,Math.PI*2);X.fill();
  }

  // decor
  for(var i=0;i<decor.length;i++)drawDecor(decor[i]);

  // fish (sorted by size for depth)
  fish.sort(function(a,b){return a.size-b.size;});
  for(var i=0;i<fish.length;i++)drawFish(fish[i]);

  // feed particles
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    X.fillStyle='hsla('+p.hue+',80%,70%,'+p.life*0.6+')';
    X.beginPath();X.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);X.fill();
  }

  // volcano particles (bioluminescent + lava)
  for(var i=0;i<volcanoParticles.length;i++){
    var p=volcanoParticles[i];
    if(p.glow){
      // glowing bioluminescent particle with halo
      var vg=X.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size*3*p.life);
      vg.addColorStop(0,'hsla('+p.hue+',90%,70%,'+p.life*0.3+')');
      vg.addColorStop(1,'hsla('+p.hue+',90%,70%,0)');
      X.fillStyle=vg;
      X.beginPath();X.arc(p.x,p.y,p.size*3*p.life,0,Math.PI*2);X.fill();
    }
    X.fillStyle=p.lava
      ?'rgba(255,'+(80+Math.floor(p.life*100))+',20,'+p.life*0.7+')'
      :'hsla('+p.hue+',85%,65%,'+p.life*0.6+')';
    X.beginPath();X.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);X.fill();
  }

  // --- KRAKEN ---
  if(kraken.active){
    var kx=kraken.x,ky=kraken.y;
    var kPulse=Math.sin(kraken.pulsePhase);
    var retreating=kraken.retreatTimer>0;
    var kAlpha=retreating?0.3+kraken.retreatTimer*0.2:0.8;

    // deep glow from below
    var deepG=X.createRadialGradient(kx,ky+20,0,kx,ky+20,120);
    deepG.addColorStop(0,'rgba(180,20,40,'+(0.06*kAlpha)+')');
    deepG.addColorStop(0.5,'rgba(120,0,60,'+(0.03*kAlpha)+')');
    deepG.addColorStop(1,'rgba(80,0,40,0)');
    X.fillStyle=deepG;
    X.beginPath();X.arc(kx,ky+20,120,0,Math.PI*2);X.fill();

    // tentacles
    for(var ti=0;ti<kraken.tentacles.length;ti++){
      var tent=kraken.tentacles[ti];
      var bx=kx+tent.baseX,by=ky-10;
      var tx=tent.tipX,ty=tent.tipY;
      var midX=(bx+tx)/2+Math.sin(t*0.8+ti*2)*15;
      var midY=(by+ty)/2+Math.cos(t*0.6+ti*1.5)*10;

      // tentacle glow
      X.strokeStyle='rgba(180,40,80,'+(0.08*kAlpha)+')';
      X.lineWidth=12;X.lineCap='round';
      X.beginPath();X.moveTo(bx,by);X.quadraticCurveTo(midX,midY,tx,ty);X.stroke();

      // tentacle core
      var tWidth=tent.grabbing?4:3;
      X.strokeStyle='rgba(200,50,80,'+(0.4*kAlpha)+')';
      X.lineWidth=tWidth;
      X.beginPath();X.moveTo(bx,by);X.quadraticCurveTo(midX,midY,tx,ty);X.stroke();

      // suckers
      var suckerCount=4;
      for(var si=1;si<=suckerCount;si++){
        var sf=si/(suckerCount+1);
        var sx=bx*(1-sf)*(1-sf)+midX*2*sf*(1-sf)+tx*sf*sf;
        var sy=by*(1-sf)*(1-sf)+midY*2*sf*(1-sf)+ty*sf*sf;
        X.fillStyle='rgba(220,60,100,'+(0.2*kAlpha)+')';
        X.beginPath();X.arc(sx,sy,2,0,Math.PI*2);X.fill();
      }

      // grabbing indicator — bright tip
      if(tent.grabbing){
        X.fillStyle='rgba(255,100,120,'+(0.5*kAlpha)+')';
        X.beginPath();X.arc(tx,ty,4,0,Math.PI*2);X.fill();
      }
    }

    // body (mantle — partially visible from bottom)
    X.fillStyle='rgba(60,10,30,'+(0.6*kAlpha)+')';
    X.beginPath();
    X.ellipse(kx,ky+15,55+kPulse*3,35+kPulse*2,0,0,Math.PI);
    X.fill();
    // body texture
    X.strokeStyle='rgba(120,30,60,'+(0.15*kAlpha)+')';X.lineWidth=1;
    for(var i=0;i<5;i++){
      var ofs=(i-2)*16;
      X.beginPath();X.moveTo(kx+ofs-5,ky+5);
      X.quadraticCurveTo(kx+ofs+Math.sin(t+i)*3,ky+25,kx+ofs+8,ky+45);X.stroke();
    }

    // EYE — the target!
    var ex=kraken.eyeX,ey=kraken.eyeY;
    var er=kraken.eyeRadius+kPulse*2;
    // eye glow
    var eg=X.createRadialGradient(ex,ey,er*0.3,ex,ey,er*3);
    eg.addColorStop(0,'rgba(255,40,20,'+(0.15*kAlpha)+')');
    eg.addColorStop(1,'rgba(255,0,0,0)');
    X.fillStyle=eg;
    X.beginPath();X.arc(ex,ey,er*3,0,Math.PI*2);X.fill();
    // eye white
    X.fillStyle='rgba(200,180,160,'+(0.7*kAlpha)+')';
    X.beginPath();X.ellipse(ex,ey,er,er*0.7,0,0,Math.PI*2);X.fill();
    // pupil — tracks nearest fish
    var pupilOfsX=0,pupilOfsY=0;
    var nearF=null,nearD=999;
    for(var i=0;i<fish.length;i++){
      var dd=Math.sqrt((fish[i].x-ex)*(fish[i].x-ex)+(fish[i].y-ey)*(fish[i].y-ey));
      if(dd<nearD){nearD=dd;nearF=fish[i];}
    }
    if(nearF){
      var pdx=nearF.x-ex,pdy=nearF.y-ey;
      var pd=Math.sqrt(pdx*pdx+pdy*pdy);
      if(pd>0){pupilOfsX=pdx/pd*er*0.3;pupilOfsY=pdy/pd*er*0.2;}
    }
    X.fillStyle='rgba(180,20,10,'+(0.9*kAlpha)+')';
    X.beginPath();X.ellipse(ex+pupilOfsX,ey+pupilOfsY,er*0.45,er*0.55,0,0,Math.PI*2);X.fill();
    // pupil slit
    X.fillStyle='rgba(20,0,0,'+(0.9*kAlpha)+')';
    X.beginPath();X.ellipse(ex+pupilOfsX,ey+pupilOfsY,er*0.12,er*0.45,0,0,Math.PI*2);X.fill();
    // eye glint
    X.fillStyle='rgba(255,200,180,'+(0.6*kAlpha)+')';
    X.beginPath();X.arc(ex+er*0.2,ey-er*0.2,er*0.12,0,Math.PI*2);X.fill();

    // HP bar
    if(!retreating){
      var barW=60,barH=4;
      var barX=kx-barW/2,barY=ky-55;
      X.fillStyle='rgba(40,0,10,0.5)';
      X.fillRect(barX,barY,barW,barH);
      var hpFrac=kraken.hp/kraken.maxHp;
      X.fillStyle=hpFrac>0.5?'rgba(255,60,80,0.7)':'rgba(255,30,30,0.9)';
      X.fillRect(barX,barY,barW*hpFrac,barH);
      // level indicator
      X.fillStyle='rgba(255,100,120,0.4)';
      X.font='8px "Fira Code"';X.textAlign='center';
      X.fillText('KRAKEN LV'+kraken.level,kx,barY-3);
    }
  }

  // surface caustics
  X.strokeStyle='rgba(40,140,220,0.02)';
  X.lineWidth=2;
  for(var i=0;i<6;i++){
    X.beginPath();
    for(var x=0;x<W;x+=8){
      var y=20+Math.sin(x*0.02+t*0.5+i*1.1)*6+Math.sin(x*0.035+t*0.3)*4;
      x===0?X.moveTo(x,y):X.lineTo(x,y);
    }
    X.stroke();
  }

  // lightning
  if(lightning.active){
    // screen flash
    if(lightning.flash>0.05){
      X.fillStyle='rgba(180,220,255,'+lightning.flash*0.15+')';
      X.fillRect(0,0,W,H);
    }
    // draw bolts
    for(var b=0;b<lightning.bolts.length;b++){
      var bolt=lightning.bolts[b];
      if(!bolt||bolt.length<2)continue;
      // thick glow
      X.strokeStyle='rgba(100,180,255,'+lightning.flash*0.3+')';
      X.lineWidth=6;X.lineCap='round';X.lineJoin='round';
      X.beginPath();X.moveTo(bolt[0].x,bolt[0].y);
      for(var s=1;s<bolt.length;s++)X.lineTo(bolt[s].x,bolt[s].y);
      X.stroke();
      // bright core
      X.strokeStyle='rgba(200,240,255,'+lightning.flash*0.8+')';
      X.lineWidth=2;
      X.beginPath();X.moveTo(bolt[0].x,bolt[0].y);
      for(var s=1;s<bolt.length;s++)X.lineTo(bolt[s].x,bolt[s].y);
      X.stroke();
    }
    // impact glow
    if(lightning.flash>0.1){
      var ig=X.createRadialGradient(lightning.x,lightning.y,0,lightning.x,lightning.y,80*lightning.flash);
      ig.addColorStop(0,'rgba(180,220,255,'+lightning.flash*0.4+')');
      ig.addColorStop(1,'rgba(100,180,255,0)');
      X.fillStyle=ig;
      X.beginPath();X.arc(lightning.x,lightning.y,80*lightning.flash,0,Math.PI*2);X.fill();
    }
  }

  // HUD
  var totalSize=0,predCount=0;
  for(var i=0;i<fish.length;i++){totalSize+=fish[i].size;if(fish[i].size>=16)predCount++;}
  var hudTxt=fish.length+' fish  |  '+predCount+' predators  |  '+totalChats+' fed  |  biomass '+Math.floor(totalSize);
  if(kraken.active)hudTxt+='  |  KRAKEN LV'+kraken.level+' ('+kraken.hp+'/'+kraken.maxHp+')';
  else if(kraken.spawned&&kraken.spawnCooldown>0)hudTxt+='  |  kraken returns in '+Math.ceil(kraken.spawnCooldown)+'s';
  document.getElementById('hud').textContent=hudTxt;
}

// --- DECOR (placeable rocks + plants) ---
var DECOR_TYPES=[
  {name:'Coral',hue:340,shape:'coral',cat:'life'},
  {name:'Rock',hue:200,shape:'rock',cat:'stone'},
  {name:'Anemone',hue:60,shape:'anemone',cat:'life'},
  {name:'Crystal',hue:260,shape:'crystal',cat:'stone'},
  {name:'Volcano',hue:15,shape:'volcano',cat:'stone'},
  {name:'Pebbles',hue:170,shape:'pebbles',cat:'stone'},
  {name:'Driftwood',hue:30,shape:'driftwood',cat:'stone'},
  {name:'Kelp',hue:120,shape:'kelp',cat:'life'},
  {name:'Seagrass',hue:150,shape:'seagrass',cat:'life'},
  {name:'Lily Pad',hue:100,shape:'lilypad',cat:'life'}
];
var decor=[];
var placingDecor=null;
var volcanoParticles=[]; // separate particle array for eruption
var eruptTimer=0; // countdown to next eruption
var erupting=false;
var eruptDuration=0;

// --- KRAKEN BOSS ---
var kraken={
  active:false,spawned:false,
  x:0,y:0,targetY:0,
  hp:5,maxHp:5,level:1,
  eyeX:0,eyeY:0,eyeRadius:12,
  tentacles:[],
  grabbed:[], // indices of grabbed fish
  retreatTimer:0,
  spawnCooldown:0, // time before next appearance
  pulsePhase:0,
  rage:0 // increases each return
};

function initKrakenTentacles(){
  kraken.tentacles=[];
  var numTent=6+kraken.level;
  if(numTent>10)numTent=10;
  for(var i=0;i<numTent;i++){
    kraken.tentacles.push({
      baseX:(i/(numTent-1)-0.5)*120,
      phase:Math.random()*Math.PI*2,
      speed:0.4+Math.random()*0.3,
      len:80+Math.random()*40+kraken.level*10,
      grabbing:false,grabTarget:null,grabProgress:0,
      tipX:0,tipY:0
    });
  }
}

function spawnKraken(){
  kraken.active=true;kraken.spawned=true;
  kraken.x=W/2+(Math.random()-0.5)*W*0.3;
  kraken.y=H+60;kraken.targetY=H-30;
  kraken.hp=5+kraken.level*2;kraken.maxHp=kraken.hp;
  kraken.retreatTimer=0;kraken.grabbed=[];
  kraken.rage=Math.min(kraken.level*0.1,0.5);
  initKrakenTentacles();
}

function drawDecor(d){
  var x=d.x,y=d.y,hue=d.hue,sz=d.size||20;
  // glow
  var g=X.createRadialGradient(x,y,0,x,y,sz*2);
  g.addColorStop(0,'hsla('+hue+',80%,50%,0.06)');
  g.addColorStop(1,'hsla('+hue+',80%,50%,0)');
  X.fillStyle=g;
  X.beginPath();X.arc(x,y,sz*2,0,Math.PI*2);X.fill();

  if(d.shape==='rock'){
    X.fillStyle='hsla('+hue+',20%,25%,0.7)';
    X.beginPath();
    X.ellipse(x,y,sz*1.2,sz*0.7,0,0,Math.PI*2);X.fill();
    X.fillStyle='hsla('+hue+',30%,40%,0.3)';
    X.beginPath();X.ellipse(x-sz*0.2,y-sz*0.2,sz*0.5,sz*0.3,0,0,Math.PI*2);X.fill();
  }else if(d.shape==='coral'){
    X.strokeStyle='hsla('+hue+',70%,50%,0.6)';X.lineWidth=3;X.lineCap='round';
    for(var b=0;b<4;b++){
      var angle=-Math.PI/2+(b-1.5)*0.4;
      var bx=x+Math.cos(angle)*sz*0.8;
      var by=y+Math.sin(angle)*sz*0.8;
      X.beginPath();X.moveTo(x,y);X.quadraticCurveTo(x+(bx-x)*0.5+(Math.sin(t+b)*3),by*0.5+y*0.5,bx,by);X.stroke();
      X.fillStyle='hsla('+hue+',80%,60%,0.5)';
      X.beginPath();X.arc(bx,by,3,0,Math.PI*2);X.fill();
    }
  }else if(d.shape==='anemone'){
    for(var a=0;a<8;a++){
      var angle=a*Math.PI/4+Math.sin(t*0.5+a)*0.2;
      var len=sz*0.6+Math.sin(t*0.8+a*1.3)*sz*0.15;
      var tx=x+Math.cos(angle)*len;
      var ty=y+Math.sin(angle)*len;
      X.strokeStyle='hsla('+hue+',70%,55%,0.4)';X.lineWidth=2;
      X.beginPath();X.moveTo(x,y);X.quadraticCurveTo(x+Math.cos(angle)*len*0.5+Math.sin(t+a)*4,y+Math.sin(angle)*len*0.5,tx,ty);X.stroke();
      X.fillStyle='hsla('+hue+',90%,70%,0.6)';
      X.beginPath();X.arc(tx,ty,2,0,Math.PI*2);X.fill();
    }
  }else if(d.shape==='crystal'){
    X.fillStyle='hsla('+hue+',60%,50%,0.3)';
    X.beginPath();
    X.moveTo(x,y-sz);X.lineTo(x+sz*0.4,y);X.lineTo(x-sz*0.4,y);X.closePath();X.fill();
    X.fillStyle='hsla('+hue+',80%,70%,0.15)';
    X.beginPath();
    X.moveTo(x-sz*0.3,y-sz*0.7);X.lineTo(x+sz*0.1,y);X.lineTo(x-sz*0.5,y);X.closePath();X.fill();
    var cg=X.createRadialGradient(x,y-sz*0.4,0,x,y-sz*0.4,sz*0.5);
    cg.addColorStop(0,'hsla('+hue+',90%,80%,0.15)');
    cg.addColorStop(1,'hsla('+hue+',90%,80%,0)');
    X.fillStyle=cg;
    X.beginPath();X.arc(x,y-sz*0.4,sz*0.5,0,Math.PI*2);X.fill();
  }else if(d.shape==='volcano'){
    // volcano is big — override size
    var vs=50;
    var baseW=vs*1.8;
    var baseY=y;
    var peakY=y-vs*1.6;
    var craterW=vs*0.4;

    // deep lava glow underneath
    var lavaBg=X.createRadialGradient(x,peakY+vs*0.3,0,x,peakY+vs*0.3,vs*1.5);
    lavaBg.addColorStop(0,'rgba(255,60,10,'+((erupting?0.12:0.04)+Math.sin(t*2)*0.02)+')');
    lavaBg.addColorStop(1,'rgba(255,30,0,0)');
    X.fillStyle=lavaBg;
    X.beginPath();X.arc(x,peakY+vs*0.3,vs*1.5,0,Math.PI*2);X.fill();

    // mountain body — dark with lava veins
    X.fillStyle='rgba(30,15,10,0.85)';
    X.beginPath();
    X.moveTo(x-baseW,baseY);
    X.lineTo(x-craterW,peakY);
    X.lineTo(x+craterW,peakY);
    X.lineTo(x+baseW,baseY);
    X.closePath();
    X.fill();

    // lava veins
    var veinAlpha=erupting?0.5+Math.sin(t*4)*0.2:0.15+Math.sin(t*1.5)*0.08;
    X.strokeStyle='rgba(255,80,20,'+veinAlpha+')';X.lineWidth=2;X.lineCap='round';
    // left vein
    X.beginPath();X.moveTo(x-craterW*0.5,peakY+4);
    X.quadraticCurveTo(x-vs*0.6+Math.sin(t*0.7)*3,peakY+vs*0.6,x-vs*0.9,baseY-5);X.stroke();
    // right vein
    X.beginPath();X.moveTo(x+craterW*0.3,peakY+4);
    X.quadraticCurveTo(x+vs*0.5+Math.sin(t*0.9)*3,peakY+vs*0.5,x+vs*1.1,baseY-5);X.stroke();
    // center vein
    X.beginPath();X.moveTo(x,peakY+6);
    X.quadraticCurveTo(x+Math.sin(t*0.6)*5,peakY+vs*0.8,x+vs*0.2,baseY-3);X.stroke();

    // rim glow
    var rimAlpha=erupting?0.7:0.25+Math.sin(t*2)*0.1;
    X.strokeStyle='rgba(255,100,20,'+rimAlpha+')';X.lineWidth=3;
    X.beginPath();X.moveTo(x-craterW,peakY);X.lineTo(x+craterW,peakY);X.stroke();
    // inner crater glow
    var crGlow=X.createRadialGradient(x,peakY,0,x,peakY,craterW*1.5);
    crGlow.addColorStop(0,'rgba(255,120,20,'+(erupting?0.5:0.15)+')');
    crGlow.addColorStop(0.5,'rgba(255,40,0,'+(erupting?0.2:0.05)+')');
    crGlow.addColorStop(1,'rgba(255,40,0,0)');
    X.fillStyle=crGlow;
    X.beginPath();X.arc(x,peakY,craterW*1.5,0,Math.PI*2);X.fill();

    // edge highlight
    X.strokeStyle='rgba(255,140,60,0.08)';X.lineWidth=1;
    X.beginPath();X.moveTo(x-baseW,baseY);X.lineTo(x-craterW,peakY);X.stroke();
    X.beginPath();X.moveTo(x+baseW,baseY);X.lineTo(x+craterW,peakY);X.stroke();
  }else if(d.shape==='pebbles'){
    // cluster of small round stones
    var seeds=d._seeds;
    if(!seeds){seeds=[];for(var p=0;p<6;p++)seeds.push({ox:(Math.random()-0.5)*sz*1.4,oy:(Math.random()-0.5)*sz*0.5,r:3+Math.random()*5,hOff:Math.floor(Math.random()*40-20)});d._seeds=seeds;}
    for(var p=0;p<seeds.length;p++){
      var s=seeds[p];
      X.fillStyle='hsla('+(hue+s.hOff)+',25%,30%,0.65)';
      X.beginPath();X.ellipse(x+s.ox,y+s.oy,s.r,s.r*0.7,0,0,Math.PI*2);X.fill();
      X.fillStyle='hsla('+(hue+s.hOff)+',30%,50%,0.15)';
      X.beginPath();X.ellipse(x+s.ox-s.r*0.2,y+s.oy-s.r*0.2,s.r*0.4,s.r*0.3,0,0,Math.PI*2);X.fill();
    }
  }else if(d.shape==='driftwood'){
    // gnarled branch lying on the floor
    X.strokeStyle='hsla('+hue+',30%,28%,0.7)';X.lineWidth=5;X.lineCap='round';
    X.beginPath();X.moveTo(x-sz*1.2,y+2);
    X.quadraticCurveTo(x-sz*0.3,y-sz*0.4,x+sz*0.4,y-sz*0.1);
    X.quadraticCurveTo(x+sz*0.8,y+sz*0.2,x+sz*1.3,y-2);X.stroke();
    // bark texture
    X.strokeStyle='hsla('+hue+',20%,40%,0.2)';X.lineWidth=1;
    for(var k=0;k<3;k++){
      var kx=x-sz*0.6+k*sz*0.5;
      X.beginPath();X.moveTo(kx,y-3);X.lineTo(kx+4,y+3);X.stroke();
    }
    // small branch fork
    X.strokeStyle='hsla('+hue+',30%,28%,0.5)';X.lineWidth=2;
    X.beginPath();X.moveTo(x+sz*0.2,y-sz*0.1);X.lineTo(x+sz*0.1,y-sz*0.5);X.stroke();
  }else if(d.shape==='kelp'){
    // tall swaying kelp stalk with leafy blades
    var stalkH=sz*3;
    var sway=Math.sin(t*0.6+d.x*0.01)*12;
    X.strokeStyle='hsla('+hue+',50%,30%,0.6)';X.lineWidth=3;X.lineCap='round';
    X.beginPath();X.moveTo(x,y);
    X.quadraticCurveTo(x+sway*0.5,y-stalkH*0.5,x+sway,y-stalkH);X.stroke();
    // blades along the stalk
    for(var b=0;b<5;b++){
      var bfrac=(b+1)/6;
      var bx=x+sway*bfrac;
      var by=y-stalkH*bfrac;
      var bsway=Math.sin(t*0.8+b*1.1)*8;
      var side=(b%2===0)?1:-1;
      X.fillStyle='hsla('+hue+',55%,40%,0.35)';
      X.beginPath();X.moveTo(bx,by);
      X.quadraticCurveTo(bx+side*(10+bsway),by-5,bx+side*(14+bsway),by+3);
      X.quadraticCurveTo(bx+side*6,by+6,bx,by);X.fill();
    }
    // bulb at top
    X.fillStyle='hsla('+hue+',60%,45%,0.5)';
    X.beginPath();X.arc(x+sway,y-stalkH-4,4,0,Math.PI*2);X.fill();
  }else if(d.shape==='seagrass'){
    // cluster of thin swaying grass blades
    var blades=d._blades;
    if(!blades){blades=[];for(var g=0;g<7;g++)blades.push({ox:(Math.random()-0.5)*sz*0.8,h:sz*1.5+Math.random()*sz,phase:Math.random()*Math.PI*2,w:1+Math.random()*1.5});d._blades=blades;}
    for(var g=0;g<blades.length;g++){
      var bl=blades[g];
      var gs=Math.sin(t*0.5+bl.phase)*8;
      X.strokeStyle='hsla('+hue+',45%,38%,0.45)';X.lineWidth=bl.w;X.lineCap='round';
      X.beginPath();X.moveTo(x+bl.ox,y);
      X.quadraticCurveTo(x+bl.ox+gs*0.6,y-bl.h*0.6,x+bl.ox+gs,y-bl.h);X.stroke();
    }
  }else if(d.shape==='lilypad'){
    // floating pad on water surface — snaps to top
    var lx=d.x,ly=30+Math.sin(t*0.3+d.x*0.02)*3;
    var lr=sz*1.2;
    X.fillStyle='hsla('+hue+',50%,30%,0.4)';
    X.beginPath();X.arc(lx,ly,lr,0,Math.PI*2);X.fill();
    // wedge cut
    X.fillStyle='rgba(2,8,16,0.8)';
    X.beginPath();X.moveTo(lx,ly);X.lineTo(lx+lr*0.3,ly-lr);X.lineTo(lx-lr*0.3,ly-lr);X.closePath();X.fill();
    // vein lines
    X.strokeStyle='hsla('+hue+',40%,40%,0.25)';X.lineWidth=0.5;
    for(var v=0;v<4;v++){
      var va=Math.PI*0.3+v*Math.PI*0.35;
      X.beginPath();X.moveTo(lx,ly);X.lineTo(lx+Math.cos(va)*lr*0.85,ly+Math.sin(va)*lr*0.85);X.stroke();
    }
    // subtle glow on water
    var lg=X.createRadialGradient(lx,ly,0,lx,ly,lr*1.5);
    lg.addColorStop(0,'hsla('+hue+',60%,50%,0.04)');lg.addColorStop(1,'hsla('+hue+',60%,50%,0)');
    X.fillStyle=lg;X.beginPath();X.arc(lx,ly,lr*1.5,0,Math.PI*2);X.fill();
  }
}

// --- SIDEBAR ---
var sidebar=document.getElementById('sidebar');
var toggleBtn=document.getElementById('toggle-btn');
var spList=document.getElementById('sp-list');
var decorMenu=document.getElementById('decor-menu');
var decorArrow=document.getElementById('decorArrow');
var stoneList=document.getElementById('stone-list');
var lifeList=document.getElementById('life-list');

toggleBtn.addEventListener('click',function(){
  sidebar.classList.toggle('open');
  toggleBtn.textContent=sidebar.classList.contains('open')?'Close':'+Fish';
});

document.getElementById('decorToggle').addEventListener('click',function(){
  var shown=decorMenu.style.display!=='none';
  decorMenu.style.display=shown?'none':'block';
  decorArrow.textContent=shown?'▸':'▾';
});

// populate species buttons
for(var i=0;i<SPECIES.length;i++){
  (function(idx){
    var sp=SPECIES[idx];
    var btn=document.createElement('button');
    btn.className='sp-btn';
    btn.innerHTML='<span class="sp-dot" style="background:hsl('+sp.hue+',70%,50%)"></span><span>'+sp.name+'<br><span class="sp-info">spd:'+sp.speed.toFixed(1)+' tail:'+sp.tailSize.toFixed(1)+'</span></span>';
    btn.addEventListener('click',function(){
      if(fish.length>=30)return;
      var f=makeFish();
      f.sp=sp;f.hueShift=(Math.random()-0.5)*30;
      f.x=W/2+((Math.random()-0.5)*W*0.5);
      f.y=H/3+Math.random()*H*0.3;
      fish.push(f);
      totalChats++;
      saveState();
    });
    spList.appendChild(btn);
  })(i);
}

// populate decor buttons by category
for(var i=0;i<DECOR_TYPES.length;i++){
  (function(idx){
    var dt=DECOR_TYPES[idx];
    var btn=document.createElement('button');
    btn.className='sp-btn';
    btn.innerHTML='<span class="sp-dot" style="background:hsl('+dt.hue+',60%,45%)"></span><span>'+dt.name+'</span>';
    btn.addEventListener('click',function(){
      placingDecor=idx;
      sidebar.classList.remove('open');
      toggleBtn.textContent='+Fish';
      C.style.cursor='cell';
    });
    (dt.cat==='stone'?stoneList:lifeList).appendChild(btn);
  })(i);
}

// clear tank
document.getElementById('clearBtn').addEventListener('click',function(){
  fish=[];decor=[];totalChats=0;
  for(var i=0;i<14;i++)fish.push(makeFish());
  saveState();
});

// --- SAVE / LOAD ---
function saveState(){
  var state={
    fish:fish.map(function(f){return{x:f.x,y:f.y,size:f.size,growTarget:f.growTarget,spIdx:SPECIES.indexOf(f.sp),hueShift:f.hueShift};}),
    decor:decor.map(function(d){return{x:d.x,y:d.y,shape:d.shape,hue:d.hue,size:d.size};}),
    totalChats:totalChats
  };
  try{localStorage.setItem('neon_aquarium',JSON.stringify(state));}catch(e){}
}

function loadState(){
  try{
    var raw=localStorage.getItem('neon_aquarium');
    if(!raw)return false;
    var state=JSON.parse(raw);
    if(!state.fish||!state.fish.length)return false;
    fish=[];
    for(var i=0;i<state.fish.length;i++){
      var sf=state.fish[i];
      var f=makeFish();
      f.x=sf.x;f.y=sf.y;f.size=sf.size;f.growTarget=sf.growTarget;
      f.sp=SPECIES[sf.spIdx]||SPECIES[0];
      f.hueShift=sf.hueShift||0;
      fish.push(f);
    }
    decor=state.decor||[];
    totalChats=state.totalChats||0;
    return true;
  }catch(e){return false;}
}

// auto-save every 10 seconds
setInterval(saveState,10000);

// tap: lightning strike scares predators + feeds fish, or place decor
C.addEventListener('click',function(e){
  var rect=C.getBoundingClientRect();
  var cx=e.clientX-rect.left,cy=e.clientY-rect.top;
  // placing decor?
  if(placingDecor!==null){
    var dt=DECOR_TYPES[placingDecor];
    var dy=cy,dsz=15+Math.random()*10;
    if(dt.shape==='volcano'){dy=H-40;dsz=50;eruptTimer=3;}
    else if(dt.shape==='kelp'){dy=H-10;dsz=20+Math.random()*10;}
    else if(dt.shape==='seagrass'){dy=H-5;dsz=12+Math.random()*8;}
    else if(dt.shape==='lilypad'){dy=30;dsz=14+Math.random()*6;}
    else if(dt.shape==='driftwood'){dy=H-15+Math.random()*10;dsz=18+Math.random()*8;}
    else if(dt.shape==='pebbles'){dy=H-8+Math.random()*5;dsz=12+Math.random()*6;}
    decor.push({x:cx,y:dy,shape:dt.shape,hue:dt.hue,size:dsz});
    placingDecor=null;
    C.style.cursor='crosshair';
    saveState();
    return;
  }
  // lightning!
  strikeLightning(cx,cy);
  // still feed a fish + spawn particles
  for(var i=0;i<8;i++){
    particles.push({
      x:cx,y:cy,vx:(Math.random()-0.5)*3,vy:1+Math.random()*2,
      life:1,hue:180+Math.random()*60,size:2+Math.random()*2
    });
  }
  totalChats++;
  growRandomFish(0.3+Math.random()*0.3);
  maybeSpawnFish();
});

// --- INIT + LOOP ---
if(!loadState()){for(var i=0;i<14;i++)fish.push(makeFish());}
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

// resize seaweed on window resize
window.addEventListener('resize',function(){
  for(var i=0;i<seaweedPoles.length;i++){
    if(seaweedPoles[i].x>W)seaweedPoles[i].x=Math.random()*W;
  }
});

})();
