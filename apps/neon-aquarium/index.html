<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Aquarium</title>
<link rel="icon" href="https://emojicdn.elk.sh/🐠">
<meta property="og:title" content="Neon Aquarium">
<meta property="og:description" content="A glowing 3D aquarium where neon fish change color every time you type. Watch them swim and pulse.">
<meta property="og:url" content="https://app.sloppy.live/neon-aquarium/">
<meta property="og:image" content="https://image.pollinations.ai/prompt/3D%20neon%20aquarium%20glowing%20fish%20dark%20water%20bioluminescent%20underwater%20scene?width=1200&height=630&nologo=true&referrer=sloppy.live">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Anybody:wght@400;700&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#020810;font-family:'IBM Plex Mono',monospace;user-select:none}
canvas{display:block}
#chat-area{position:absolute;bottom:0;left:0;width:100%;z-index:10;padding:8px 12px;background:linear-gradient(transparent,rgba(2,8,16,0.85) 30%)}
#chat-log{max-height:120px;overflow-y:auto;margin-bottom:6px;scrollbar-width:thin;scrollbar-color:rgba(0,255,200,0.2) transparent}
#chat-log::-webkit-scrollbar{width:3px}
#chat-log::-webkit-scrollbar-thumb{background:rgba(0,255,200,0.2)}
.chat-msg{font-size:12px;padding:2px 0;line-height:1.4;opacity:0.8}
.chat-msg .name{font-weight:700;margin-right:6px}
#chat-form{display:flex;gap:6px}
#chat-input{flex:1;padding:8px 12px;background:rgba(0,255,200,0.05);border:1px solid rgba(0,255,200,0.15);color:#aaffdd;font-family:'IBM Plex Mono',monospace;font-size:13px;border-radius:4px;outline:none}
#chat-input:focus{border-color:rgba(0,255,200,0.35)}
#chat-input::placeholder{color:rgba(0,255,200,0.2)}
#send-btn{padding:8px 16px;background:rgba(0,255,200,0.08);border:1px solid rgba(0,255,200,0.2);color:#0fc;font-family:'Anybody',sans-serif;font-size:12px;font-weight:700;cursor:pointer;border-radius:4px;letter-spacing:1px}
#send-btn:hover{background:rgba(0,255,200,0.15)}
#fish-count{position:absolute;top:10px;left:14px;font-size:10px;color:rgba(0,255,200,0.25);z-index:10;letter-spacing:1px}
#color-flash{position:absolute;inset:0;pointer-events:none;z-index:5;opacity:0;transition:opacity 0.3s}
#backlink{position:absolute;top:10px;right:12px;font-size:9px;color:rgba(0,255,200,0.15);text-decoration:none;z-index:10}
#backlink:hover{color:rgba(0,255,200,0.4)}
</style>
</head>
<body>
<div id="fish-count">12 FISH</div>
<div id="color-flash"></div>
<div id="chat-area">
  <div id="chat-log"></div>
  <form id="chat-form">
    <input type="text" id="chat-input" placeholder="Type to change the fish colors..." maxlength="100" autocomplete="off">
    <button type="submit" id="send-btn">SEND</button>
  </form>
</div>
<a id="backlink" href="https://sloppy.live" target="_blank">sloppy.live</a>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js"}}</script>
<script type="module">
import * as THREE from 'three';

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020810);
scene.fog = new THREE.FogExp2(0x020810, 0.012);

const camera = new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 0.1, 200);
camera.position.set(0, 2, 18);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.prepend(renderer.domElement);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// Lighting
scene.add(new THREE.AmbientLight(0x112233, 0.4));
const topLight = new THREE.PointLight(0x0066aa, 0.6, 50);
topLight.position.set(0, 15, 0);
scene.add(topLight);

// Tank walls (glass)
const tankW = 30, tankH = 14, tankD = 16;
const glassMat = new THREE.MeshPhysicalMaterial({
  color:0x88ccff, transparent:true, opacity:0.06,
  roughness:0.1, metalness:0, side:THREE.BackSide
});
const tank = new THREE.Mesh(new THREE.BoxGeometry(tankW, tankH, tankD), glassMat);
tank.position.y = tankH/2 - 2;
scene.add(tank);

// Tank edges
const edgeMat = new THREE.LineBasicMaterial({color:0x1a3355, transparent:true, opacity:0.3});
const edgeGeo = new THREE.EdgesGeometry(new THREE.BoxGeometry(tankW, tankH, tankD));
const edges = new THREE.LineSegments(edgeGeo, edgeMat);
edges.position.copy(tank.position);
scene.add(edges);

// Sand floor
const sandGeo = new THREE.PlaneGeometry(tankW-1, tankD-1, 30, 20);
const sandPos = sandGeo.attributes.position;
for (let i = 0; i < sandPos.count; i++) {
  sandPos.setZ(i, sandPos.getZ(i) + (Math.random()-0.5)*0.3);
}
sandGeo.computeVertexNormals();
const sandMat = new THREE.MeshLambertMaterial({color:0x1a2a15});
const sand = new THREE.Mesh(sandGeo, sandMat);
sand.rotation.x = -Math.PI/2;
sand.position.y = -1.8;
scene.add(sand);

// Plants
function createPlant(x, z, height, color) {
  const group = new THREE.Group();
  const bladeCount = 5 + Math.floor(Math.random()*6);
  for (let i = 0; i < bladeCount; i++) {
    const h = height * (0.5 + Math.random()*0.5);
    const geo = new THREE.BoxGeometry(0.08, h, 0.04);
    const mat = new THREE.MeshLambertMaterial({color, transparent:true, opacity:0.7});
    const blade = new THREE.Mesh(geo, mat);
    blade.position.set((Math.random()-0.5)*0.6, h/2 - 1.8, (Math.random()-0.5)*0.4);
    blade.rotation.z = (Math.random()-0.5)*0.3;
    blade.userData = {phase: Math.random()*Math.PI*2, speed: 0.5+Math.random()};
    group.add(blade);
  }
  group.position.set(x, 0, z);
  return group;
}
const plants = [];
for (let i = 0; i < 18; i++) {
  const x = (Math.random()-0.5)*(tankW-4);
  const z = (Math.random()-0.5)*(tankD-4);
  const h = 1.5 + Math.random()*3;
  const colors = [0x00aa44, 0x008855, 0x22cc66, 0x006633, 0x11aa55];
  const p = createPlant(x, z, h, colors[Math.floor(Math.random()*colors.length)]);
  scene.add(p);
  plants.push(p);
}

// Rocks
for (let i = 0; i < 10; i++) {
  const size = 0.3 + Math.random()*0.8;
  const geo = new THREE.DodecahedronGeometry(size, 0);
  const mat = new THREE.MeshLambertMaterial({color: 0x222233 + Math.floor(Math.random()*0x111111)});
  const rock = new THREE.Mesh(geo, mat);
  rock.position.set((Math.random()-0.5)*(tankW-6), -1.5+size*0.3, (Math.random()-0.5)*(tankD-4));
  rock.rotation.set(Math.random(), Math.random(), Math.random());
  scene.add(rock);
}

// Bubbles
const bubbles = [];
function spawnBubble(x, z) {
  const geo = new THREE.SphereGeometry(0.05+Math.random()*0.1, 6, 6);
  const mat = new THREE.MeshBasicMaterial({color:0x88ccff, transparent:true, opacity:0.3});
  const b = new THREE.Mesh(geo, mat);
  b.position.set(x || (Math.random()-0.5)*tankW*0.8, -1.5, z || (Math.random()-0.5)*tankD*0.5);
  b.userData = {vy: 0.01+Math.random()*0.02, wobble: Math.random()*Math.PI*2};
  scene.add(b);
  bubbles.push(b);
}

// Fish
const FISH_COUNT = 12;
const fishList = [];
let globalHue = Math.random();

function hslToHex(h, s, l) {
  const c = (1-Math.abs(2*l-1))*s;
  const x = c*(1-Math.abs((h*6)%2-1));
  const m = l-c/2;
  let r,g,b;
  if(h<1/6){r=c;g=x;b=0}else if(h<2/6){r=x;g=c;b=0}else if(h<3/6){r=0;g=c;b=x}
  else if(h<4/6){r=0;g=x;b=c}else if(h<5/6){r=x;g=0;b=c}else{r=c;g=0;b=x}
  return new THREE.Color(r+m, g+m, b+m);
}

function createFish(index) {
  const group = new THREE.Group();
  const hue = (globalHue + index/FISH_COUNT * 0.6 + Math.random()*0.1) % 1;
  const color = hslToHex(hue, 0.9, 0.55);

  // Body
  const bodyGeo = new THREE.SphereGeometry(0.5, 8, 6);
  bodyGeo.scale(1.6, 0.8, 0.7);
  const bodyMat = new THREE.MeshPhongMaterial({
    color, emissive: color, emissiveIntensity: 0.4,
    transparent: true, opacity: 0.85
  });
  const body = new THREE.Mesh(bodyGeo, bodyMat);
  group.add(body);

  // Tail
  const tailGeo = new THREE.ConeGeometry(0.35, 0.6, 4);
  tailGeo.rotateZ(Math.PI/2);
  const tailMat = new THREE.MeshPhongMaterial({
    color, emissive: color, emissiveIntensity: 0.3,
    transparent: true, opacity: 0.7
  });
  const tail = new THREE.Mesh(tailGeo, tailMat);
  tail.position.set(-0.9, 0, 0);
  group.add(tail);

  // Dorsal fin
  const finGeo = new THREE.ConeGeometry(0.15, 0.4, 3);
  const finMat = tailMat.clone();
  const dorsal = new THREE.Mesh(finGeo, finMat);
  dorsal.position.set(-0.1, 0.35, 0);
  group.add(dorsal);

  // Eye
  const eyeGeo = new THREE.SphereGeometry(0.08, 6, 6);
  const eyeMat = new THREE.MeshBasicMaterial({color:0xffffff});
  const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
  eyeL.position.set(0.5, 0.1, 0.25);
  group.add(eyeL);
  const eyeR = eyeL.clone();
  eyeR.position.z = -0.25;
  group.add(eyeR);
  // Pupils
  const pupilGeo = new THREE.SphereGeometry(0.04, 4, 4);
  const pupilMat = new THREE.MeshBasicMaterial({color:0x000000});
  const pupilL = new THREE.Mesh(pupilGeo, pupilMat);
  pupilL.position.set(0.56, 0.1, 0.27);
  group.add(pupilL);
  const pupilR = pupilL.clone();
  pupilR.position.z = -0.27;
  group.add(pupilR);

  // Glow light
  const light = new THREE.PointLight(color, 0.4, 6);
  light.position.set(0, 0, 0);
  group.add(light);

  // Movement data
  const scale = 0.6 + Math.random() * 0.8;
  group.scale.setScalar(scale);
  group.userData = {
    body, tail, dorsal, light, bodyMat, tailMat, finMat,
    targetX: (Math.random()-0.5)*(tankW-6),
    targetY: -0.5 + Math.random()*(tankH-6),
    targetZ: (Math.random()-0.5)*(tankD-5),
    speed: 0.3 + Math.random()*0.5,
    turnSpeed: 0.02 + Math.random()*0.02,
    tailPhase: Math.random()*Math.PI*2,
    tailSpeed: 3 + Math.random()*3,
    hue, targetHue: hue,
    pulsePhase: Math.random()*Math.PI*2,
    scale,
    retargetTimer: Math.random()*200,
    schoolIdx: index
  };

  group.position.set(
    (Math.random()-0.5)*(tankW-8),
    Math.random()*(tankH-6),
    (Math.random()-0.5)*(tankD-6)
  );

  scene.add(group);
  fishList.push(group);
  return group;
}

for (let i = 0; i < FISH_COUNT; i++) createFish(i);

// Color change system
function triggerColorChange(text) {
  // Generate hue from text
  let hash = 0;
  for (let i = 0; i < text.length; i++) hash = ((hash << 5) - hash + text.charCodeAt(i)) | 0;
  globalHue = (Math.abs(hash) % 1000) / 1000;

  // Flash
  const flashColor = hslToHex(globalHue, 0.8, 0.5);
  const flashEl = document.getElementById('color-flash');
  flashEl.style.background = 'radial-gradient(ellipse at 50% 50%, ' + '#' + flashColor.getHexString() + '22, transparent 70%)';
  flashEl.style.opacity = 1;
  setTimeout(() => flashEl.style.opacity = 0, 600);

  // Set new target hues for all fish
  fishList.forEach((f, i) => {
    const d = f.userData;
    d.targetHue = (globalHue + i/FISH_COUNT*0.5 + Math.random()*0.15) % 1;
    // Excitement burst — change target
    d.targetX = (Math.random()-0.5)*(tankW-6);
    d.targetY = -0.5 + Math.random()*(tankH-6);
    d.targetZ = (Math.random()-0.5)*(tankD-5);
    d.speed = Math.min(d.speed + 0.2, 1.5);
  });

  // Spawn bubbles
  for (let i = 0; i < 8; i++) spawnBubble();
}

// Chat
const chatLog = document.getElementById('chat-log');
const chatInput = document.getElementById('chat-input');
const names = ['Anon','Nemo','Bubbles','Coral','Splash','Finley','Gill','Marlin','Dory','Flipper'];
let userName = names[Math.floor(Math.random()*names.length)];

function addChatMsg(name, text, color) {
  const div = document.createElement('div');
  div.className = 'chat-msg';
  div.innerHTML = '<span class="name" style="color:'+color+'">'+name+':</span>' +
    '<span style="color:rgba(200,240,220,0.6)">'+text.replace(/</g,'&lt;')+'</span>';
  chatLog.appendChild(div);
  if (chatLog.children.length > 30) chatLog.removeChild(chatLog.firstChild);
  chatLog.scrollTop = chatLog.scrollHeight;
}

document.getElementById('chat-form').addEventListener('submit', e => {
  e.preventDefault();
  const text = chatInput.value.trim();
  if (!text) return;
  const msgColor = '#' + hslToHex(globalHue, 0.8, 0.6).getHexString();
  addChatMsg(userName, text, msgColor);
  triggerColorChange(text);
  chatInput.value = '';
});

// Auto messages
const autoMsgs = [
  'the fish are so pretty','change to blue!','neon vibes','make them pink',
  'woah look at them go','rainbow fish!','so peaceful','love the glow',
  'purple please','they look alive','amazing colors','swim little fishies'
];
function autoChat() {
  if (Math.random() < 0.3) {
    const name = names[Math.floor(Math.random()*names.length)];
    const msg = autoMsgs[Math.floor(Math.random()*autoMsgs.length)];
    const color = '#' + hslToHex(Math.random(), 0.7, 0.6).getHexString();
    addChatMsg(name, msg, color);
    triggerColorChange(msg);
  }
  setTimeout(autoChat, 8000 + Math.random()*12000);
}
setTimeout(autoChat, 5000);

// Caustic light pattern on sand
const causticLight = new THREE.SpotLight(0x0088aa, 0.5, 30, Math.PI/3, 0.5);
causticLight.position.set(0, 12, 0);
causticLight.target.position.set(0, -2, 0);
scene.add(causticLight);
scene.add(causticLight.target);

// Animation
const clock = new THREE.Clock();
let frame = 0;

function animate() {
  const dt = Math.min(clock.getDelta(), 0.05);
  frame++;

  // Fish
  fishList.forEach(f => {
    const d = f.userData;

    // Retarget
    d.retargetTimer -= 1;
    if (d.retargetTimer <= 0) {
      d.targetX = (Math.random()-0.5)*(tankW-6);
      d.targetY = -0.5 + Math.random()*(tankH-6);
      d.targetZ = (Math.random()-0.5)*(tankD-5);
      d.retargetTimer = 150 + Math.random()*250;
    }

    // Move toward target
    const dx = d.targetX - f.position.x;
    const dy = d.targetY - f.position.y;
    const dz = d.targetZ - f.position.z;
    const dist = Math.sqrt(dx*dx + dy*dy + dz*dz) || 1;

    f.position.x += (dx/dist) * d.speed * dt * 2;
    f.position.y += (dy/dist) * d.speed * dt * 2;
    f.position.z += (dz/dist) * d.speed * dt * 2;

    // Clamp to tank
    const hw = tankW/2-2, hh = tankH/2-2, hd = tankD/2-2;
    f.position.x = Math.max(-hw, Math.min(hw, f.position.x));
    f.position.y = Math.max(-1.5, Math.min(tankH-4, f.position.y));
    f.position.z = Math.max(-hd, Math.min(hd, f.position.z));

    // Face direction
    const targetRot = Math.atan2(dz, dx);
    const yRot = -targetRot + Math.PI/2;
    f.rotation.y += (yRot - f.rotation.y) * d.turnSpeed;

    // Tail wag
    d.tailPhase += d.tailSpeed * dt;
    d.tail.rotation.y = Math.sin(d.tailPhase) * 0.4;

    // Color transition
    d.hue += (d.targetHue - d.hue) * 0.02;
    const newColor = hslToHex(d.hue, 0.9, 0.5 + Math.sin(frame*0.03 + d.pulsePhase)*0.1);
    d.bodyMat.color.copy(newColor);
    d.bodyMat.emissive.copy(newColor);
    d.tailMat.color.copy(newColor);
    d.tailMat.emissive.copy(newColor);
    d.finMat.color.copy(newColor);
    d.finMat.emissive.copy(newColor);
    d.light.color.copy(newColor);

    // Speed decay
    d.speed = Math.max(0.3 + Math.random()*0.2, d.speed * 0.998);

    // Gentle bob
    f.position.y += Math.sin(frame*0.02 + d.pulsePhase) * 0.003;
    d.pulsePhase += 0.01;
  });

  // Plants sway
  plants.forEach(p => {
    p.children.forEach(blade => {
      const ud = blade.userData;
      blade.rotation.z = Math.sin(frame*0.01*ud.speed + ud.phase) * 0.15;
    });
  });

  // Bubbles
  for (let i = bubbles.length-1; i >= 0; i--) {
    const b = bubbles[i];
    b.position.y += b.userData.vy;
    b.position.x += Math.sin(frame*0.03 + b.userData.wobble) * 0.005;
    if (b.position.y > tankH - 3) {
      scene.remove(b);
      bubbles.splice(i, 1);
    }
  }
  if (frame % 60 === 0 && Math.random() < 0.5) spawnBubble();

  // Camera gentle drift
  camera.position.x = Math.sin(frame*0.003) * 2;
  camera.position.y = 3 + Math.sin(frame*0.005) * 0.5;
  camera.lookAt(0, 2, 0);

  // Caustic shift
  causticLight.position.x = Math.sin(frame*0.007)*5;
  causticLight.position.z = Math.cos(frame*0.005)*3;

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}

animate();
</script>
</body>
</html>
