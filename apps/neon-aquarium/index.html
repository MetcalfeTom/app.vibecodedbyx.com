<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Neon Aquarium</title>
<link rel="icon" href="https://emojicdn.elk.sh/🐟">
<meta property="og:title" content="Neon Aquarium">
<meta property="og:description" content="Watch neon fish evolve legs and walk on the sea floor. Tap to feed them.">
<meta property="og:url" content="https://app.sloppy.live/neon-aquarium/">
<meta property="og:image" content="https://emojicdn.elk.sh/🐟?style=google">
<link href="https://fonts.googleapis.com/css2?family=Anybody:wght@400;700;900&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#040818;overflow:hidden;font-family:'IBM Plex Mono',monospace;user-select:none}
canvas{display:block}
#hud{position:fixed;top:10px;left:14px;z-index:10;pointer-events:none}
#hud h1{font-family:'Anybody',sans-serif;font-weight:900;font-size:20px;letter-spacing:3px;background:linear-gradient(90deg,#0ff,#0f8,#ff0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:2px}
#hud p{font-size:10px;color:rgba(255,255,255,.35);margin-bottom:1px}
#evo-bar{position:fixed;top:10px;right:14px;z-index:10;pointer-events:none;text-align:right}
#evo-bar .label{font-size:9px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:1px}
#evo-bar .stages{display:flex;gap:4px;justify-content:flex-end;margin-top:3px}
#evo-bar .stage{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1)}
#evo-bar .stage.done{background:rgba(0,255,200,.5);border-color:#0fc;box-shadow:0 0 6px rgba(0,255,200,.3)}
#instructions{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.15);font-size:12px;text-align:center;pointer-events:none;transition:opacity .8s;z-index:5}
.back-link{position:fixed;bottom:4px;right:8px;font-size:9px;color:rgba(255,255,255,.08);text-decoration:none;z-index:10}
.back-link:hover{color:rgba(255,255,255,.2)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
<h1>NEON AQUARIUM</h1>
<p id="fish-count">Fish: 0</p>
<p id="evolved-count">Evolved: 0</p>
</div>
<div id="evo-bar">
<div class="label">Evolution</div>
<div class="stages" id="stages"></div>
</div>
<div id="instructions">Tap to drop food. Fish eat, grow, and evolve legs.</div>
<a href="https://sloppy.live" class="back-link" target="_blank">sloppy.live</a>

<script>
var CV=document.getElementById('c'),X=CV.getContext('2d');
var W,H;
function resize(){W=CV.width=window.innerWidth;H=CV.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

var FLOOR_Y_RATIO=0.82;
var MAX_FISH=25;
var COLORS=[
  {h:180,s:100,l:55,glow:'rgba(0,255,220,.4)'},
  {h:300,s:90,l:60,glow:'rgba(200,60,255,.4)'},
  {h:340,s:100,l:60,glow:'rgba(255,50,100,.4)'},
  {h:50,s:100,l:55,glow:'rgba(255,220,0,.4)'},
  {h:120,s:90,l:50,glow:'rgba(0,255,80,.4)'},
  {h:200,s:100,l:55,glow:'rgba(0,160,255,.4)'},
  {h:20,s:100,l:55,glow:'rgba(255,140,40,.4)'},
  {h:260,s:80,l:65,glow:'rgba(140,100,255,.4)'}
];

var fish=[];
var food=[];
var bubbles=[];
var particles=[];
var time=0;
var totalEvolved=0;
var instrShown=true;

function floorY(){return H*FLOOR_Y_RATIO;}

function rndCol(){return COLORS[Math.floor(Math.random()*COLORS.length)];}

function makeFish(x,y){
  var col=rndCol();
  return{
    x:x||Math.random()*W,
    y:y||(floorY()*0.3+Math.random()*floorY()*0.5),
    vx:(Math.random()-0.5)*40,
    vy:(Math.random()-0.5)*10,
    size:8+Math.random()*6,
    col:col,
    facing:Math.random()<0.5?1:-1,
    xp:0,
    evoStage:0, // 0=fish, 1=fins thicken, 2=nubs, 3=small legs, 4=full legs+walk
    legPhase:Math.random()*Math.PI*2,
    legLength:0,
    onGround:false,
    walkSpeed:0,
    tailPhase:Math.random()*Math.PI*2,
    targetFood:null,
    idleTimer:0,
    bobPhase:Math.random()*Math.PI*2
  };
}

function makeFood(x,y){
  return{x:x,y:y,vy:15+Math.random()*10,size:2.5+Math.random()*1.5,life:12,col:rndCol()};
}

// Init fish
for(var i=0;i<8;i++)fish.push(makeFish());

// Evolution thresholds
var EVO_XP=[0,15,35,60,100];

function evolveFish(f){
  if(f.evoStage>=4)return;
  var next=EVO_XP[f.evoStage+1];
  if(f.xp>=next){
    f.evoStage++;
    f.size+=2;
    if(f.evoStage>=3)f.legLength=f.evoStage===3?f.size*0.3:f.size*0.5;
    if(f.evoStage===4){f.walkSpeed=20+Math.random()*15;totalEvolved++;}
    // Sparkle
    for(var i=0;i<8;i++){
      var a=Math.random()*Math.PI*2;
      particles.push({x:f.x,y:f.y,vx:Math.cos(a)*40,vy:Math.sin(a)*40,life:0.6,maxLife:0.6,size:2,hue:f.col.h});
    }
  }
}

function updateFish(f,dt){
  f.tailPhase+=dt*6;
  f.bobPhase+=dt*2.5;
  f.legPhase+=dt*(f.evoStage>=4?f.walkSpeed*0.3:4);

  var fy=floorY();

  // Walking behavior for evolved fish
  if(f.evoStage>=4){
    // Transition to walking
    var targetY=fy-f.size*0.6;
    if(f.y<targetY-2){
      f.vy+=120*dt; // sink to floor
    } else {
      f.y=targetY;
      f.vy=0;
      f.onGround=true;
    }
    if(f.onGround){
      // Walk along the floor
      if(f.targetFood){
        var dx=f.targetFood.x-f.x;
        f.facing=dx>0?1:-1;
        f.vx+=(dx>0?1:-1)*f.walkSpeed*dt*3;
      } else {
        f.idleTimer-=dt;
        if(f.idleTimer<=0){
          f.idleTimer=2+Math.random()*4;
          f.facing=Math.random()<0.5?1:-1;
        }
        f.vx+=(f.facing)*f.walkSpeed*0.5*dt;
      }
      f.vx*=0.92;
      f.x+=f.vx*dt;
      // Sometimes jump back in water for food
      if(f.targetFood&&f.targetFood.y<fy-f.size*3){
        f.onGround=false;
        f.vy=-60;
      }
    } else {
      // Still in water briefly
      f.vy+=30*dt;
      f.y+=f.vy*dt;
      f.x+=f.vx*dt;
    }
  } else {
    // Swimming fish
    if(f.targetFood){
      var fdx=f.targetFood.x-f.x,fdy=f.targetFood.y-f.y;
      var fd=Math.sqrt(fdx*fdx+fdy*fdy);
      if(fd>1){
        f.vx+=(fdx/fd)*80*dt;
        f.vy+=(fdy/fd)*80*dt;
      }
      f.facing=fdx>0?1:-1;
    } else {
      f.idleTimer-=dt;
      if(f.idleTimer<=0){
        f.idleTimer=1.5+Math.random()*3;
        f.vx=(Math.random()-0.5)*50;
        f.vy=(Math.random()-0.5)*20;
        f.facing=f.vx>0?1:-1;
      }
    }
    // Slight bob
    f.vy+=Math.sin(f.bobPhase)*5*dt;
    f.vx*=0.98;f.vy*=0.98;
    f.x+=f.vx*dt;f.y+=f.vy*dt;
    // Keep in water
    if(f.y<30)f.y=30;
    if(f.y>fy-f.size)f.y=fy-f.size;
  }
  // Walls
  if(f.x<f.size){f.x=f.size;f.vx=Math.abs(f.vx)*0.5;f.facing=1;}
  if(f.x>W-f.size){f.x=W-f.size;f.vx=-Math.abs(f.vx)*0.5;f.facing=-1;}

  // Find nearest food
  f.targetFood=null;
  var bestDist=999999;
  food.forEach(function(fd){
    var ddx=fd.x-f.x,ddy=fd.y-f.y;
    var d=ddx*ddx+ddy*ddy;
    if(d<bestDist){bestDist=d;f.targetFood=fd;}
  });

  // Eat food
  food.forEach(function(fd,idx){
    var edx=fd.x-f.x,edy=fd.y-f.y;
    if(Math.sqrt(edx*edx+edy*edy)<f.size+fd.size){
      f.xp+=3+Math.floor(Math.random()*3);
      evolveFish(f);
      fd.life=0;
      // Bubble
      bubbles.push({x:f.x,y:f.y,vy:-15-Math.random()*20,size:1.5+Math.random()*2,life:1.5+Math.random()});
    }
  });

  // Random bubbles
  if(Math.random()<0.005&&!f.onGround){
    bubbles.push({x:f.x+f.facing*f.size*0.5,y:f.y-f.size*0.3,vy:-10-Math.random()*15,size:1+Math.random()*1.5,life:1+Math.random()*1.5});
  }
}

function drawFish(f){
  X.save();
  X.translate(f.x,f.y);
  X.scale(f.facing,1);
  var s=f.size;
  var hue=f.col.h;
  var sat=f.col.s;
  var light=f.col.l;

  X.shadowColor=f.col.glow;
  X.shadowBlur=8+f.evoStage*3;

  // Body
  var tailWag=Math.sin(f.tailPhase)*0.15;
  X.fillStyle='hsl('+hue+','+sat+'%,'+light+'%)';
  X.beginPath();
  X.ellipse(0,0,s,s*0.55,tailWag,0,Math.PI*2);
  X.fill();

  // Belly
  X.fillStyle='hsl('+hue+','+Math.floor(sat*0.6)+'%,'+(light+15)+'%)';
  X.beginPath();
  X.ellipse(0,s*0.15,s*0.7,s*0.25,tailWag,0,Math.PI);
  X.fill();

  // Tail
  var tw=Math.sin(f.tailPhase)*s*0.3;
  X.fillStyle='hsl('+hue+','+sat+'%,'+(light-5)+'%)';
  X.beginPath();
  X.moveTo(-s*0.85,0);
  X.lineTo(-s*1.4,tw-s*0.4);
  X.lineTo(-s*1.4,tw+s*0.4);
  X.closePath();X.fill();

  // Dorsal fin
  X.fillStyle='hsl('+hue+','+sat+'%,'+(light-8)+'%)';
  X.beginPath();
  X.moveTo(s*0.1,-s*0.45);
  X.lineTo(-s*0.3,-s*0.9);
  X.lineTo(-s*0.5,-s*0.45);
  X.closePath();X.fill();

  // Eye
  X.shadowBlur=0;
  X.fillStyle='#fff';
  X.beginPath();X.arc(s*0.5,-s*0.1,s*0.2,0,Math.PI*2);X.fill();
  X.fillStyle='#111';
  X.beginPath();X.arc(s*0.55,-s*0.1,s*0.1,0,Math.PI*2);X.fill();
  // Eye shine
  X.fillStyle='rgba(255,255,255,.8)';
  X.beginPath();X.arc(s*0.58,-s*0.15,s*0.04,0,Math.PI*2);X.fill();

  // Evolution features
  if(f.evoStage>=1){
    // Thickened pectoral fins
    X.fillStyle='hsl('+hue+','+sat+'%,'+(light+5)+'%)';
    X.beginPath();
    X.moveTo(s*0.1,s*0.4);
    X.lineTo(s*0.3,s*0.8);
    X.lineTo(-s*0.1,s*0.6);
    X.closePath();X.fill();
    X.beginPath();
    X.moveTo(-s*0.3,s*0.4);
    X.lineTo(-s*0.1,s*0.8);
    X.lineTo(-s*0.5,s*0.6);
    X.closePath();X.fill();
  }

  if(f.evoStage>=2){
    // Nub legs
    X.fillStyle='hsl('+hue+','+sat+'%,'+(light-5)+'%)';
    X.strokeStyle='hsl('+hue+','+sat+'%,'+(light+10)+'%)';
    X.lineWidth=2;
    var lp=Math.sin(f.legPhase)*0.2;
    // Front nubs
    X.beginPath();X.moveTo(s*0.3,s*0.5);X.lineTo(s*0.4,s*0.8+lp*s);X.stroke();
    X.beginPath();X.arc(s*0.4,s*0.8+lp*s,2,0,Math.PI*2);X.fill();
    // Back nubs
    X.beginPath();X.moveTo(-s*0.3,s*0.5);X.lineTo(-s*0.2,s*0.8-lp*s);X.stroke();
    X.beginPath();X.arc(-s*0.2,s*0.8-lp*s,2,0,Math.PI*2);X.fill();
  }

  if(f.evoStage>=3){
    // Small legs with joints
    X.lineWidth=2.5;
    X.lineCap='round';
    var lSwing=Math.sin(f.legPhase);
    var ll=f.legLength;
    // Front legs
    var fkx=s*0.3+lSwing*ll*0.3;
    var fky=s*0.5+ll*0.6;
    var ffx=fkx+lSwing*ll*0.2;
    var ffy=fky+ll*0.4;
    X.beginPath();X.moveTo(s*0.3,s*0.45);X.lineTo(fkx,fky);X.lineTo(ffx,ffy);X.stroke();
    X.beginPath();X.arc(ffx,ffy,2.5,0,Math.PI*2);X.fill();
    // Back legs
    var bkx=-s*0.3-lSwing*ll*0.3;
    var bky=s*0.5+ll*0.6;
    var bfx=bkx-lSwing*ll*0.2;
    var bfy=bky+ll*0.4;
    X.beginPath();X.moveTo(-s*0.3,s*0.45);X.lineTo(bkx,bky);X.lineTo(bfx,bfy);X.stroke();
    X.beginPath();X.arc(bfx,bfy,2.5,0,Math.PI*2);X.fill();
  }

  if(f.evoStage>=4){
    // Full walking legs with feet, more pronounced
    X.lineWidth=3;
    X.strokeStyle='hsl('+hue+','+sat+'%,'+(light+10)+'%)';
    X.fillStyle='hsl('+hue+','+sat+'%,'+(light+5)+'%)';
    var walk=f.onGround?1:0.4;
    var ls=Math.sin(f.legPhase)*walk;
    var lc=Math.cos(f.legPhase)*walk;
    var ll2=f.legLength;
    // Front right
    var fr1x=s*0.35+ls*ll2*0.4;
    var fr1y=s*0.5+ll2*0.5;
    var fr2x=fr1x+ls*ll2*0.3;
    var fr2y=fr1y+ll2*0.5;
    X.beginPath();X.moveTo(s*0.35,s*0.45);X.lineTo(fr1x,fr1y);X.lineTo(fr2x,fr2y);X.stroke();
    // Foot
    X.beginPath();X.moveTo(fr2x-3,fr2y);X.lineTo(fr2x+5,fr2y);X.lineTo(fr2x+3,fr2y+2);X.closePath();X.fill();
    // Back right
    var br1x=-s*0.35-ls*ll2*0.4;
    var br1y=s*0.5+ll2*0.5;
    var br2x=br1x-ls*ll2*0.3;
    var br2y=br1y+ll2*0.5;
    X.beginPath();X.moveTo(-s*0.35,s*0.45);X.lineTo(br1x,br1y);X.lineTo(br2x,br2y);X.stroke();
    X.beginPath();X.moveTo(br2x-3,br2y);X.lineTo(br2x+5,br2y);X.lineTo(br2x+3,br2y+2);X.closePath();X.fill();
    // Front left (offset phase)
    var ls2=Math.sin(f.legPhase+Math.PI)*walk;
    var fl1x=s*0.2+ls2*ll2*0.35;
    var fl1y=s*0.5+ll2*0.45;
    var fl2x=fl1x+ls2*ll2*0.25;
    var fl2y=fl1y+ll2*0.45;
    X.beginPath();X.moveTo(s*0.2,s*0.45);X.lineTo(fl1x,fl1y);X.lineTo(fl2x,fl2y);X.stroke();
    X.beginPath();X.moveTo(fl2x-3,fl2y);X.lineTo(fl2x+5,fl2y);X.lineTo(fl2x+3,fl2y+2);X.closePath();X.fill();
    // Back left
    var bl1x=-s*0.2-ls2*ll2*0.35;
    var bl1y=s*0.5+ll2*0.45;
    var bl2x=bl1x-ls2*ll2*0.25;
    var bl2y=bl1y+ll2*0.45;
    X.beginPath();X.moveTo(-s*0.2,s*0.45);X.lineTo(bl1x,bl1y);X.lineTo(bl2x,bl2y);X.stroke();
    X.beginPath();X.moveTo(bl2x-3,bl2y);X.lineTo(bl2x+5,bl2y);X.lineTo(bl2x+3,bl2y+2);X.closePath();X.fill();
  }

  X.restore();
}

function drawBackground(){
  // Water gradient
  var grad=X.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#060d1f');
  grad.addColorStop(0.6,'#081828');
  grad.addColorStop(0.8,'#0a2030');
  grad.addColorStop(1,'#040810');
  X.fillStyle=grad;X.fillRect(0,0,W,H);

  // Light rays from top
  X.globalAlpha=0.02;
  for(var i=0;i<5;i++){
    var rx=W*0.15+i*W*0.18;
    var rw=30+Math.sin(time*0.3+i)*15;
    X.fillStyle='#4af';
    X.beginPath();
    X.moveTo(rx-rw,0);X.lineTo(rx+rw,0);
    X.lineTo(rx+rw*2,H);X.lineTo(rx-rw*2,H);
    X.closePath();X.fill();
  }
  X.globalAlpha=1;

  // Sea floor
  var fy=floorY();
  var floorGrad=X.createLinearGradient(0,fy,0,H);
  floorGrad.addColorStop(0,'#0d1a12');
  floorGrad.addColorStop(1,'#050a08');
  X.fillStyle=floorGrad;
  // Bumpy floor
  X.beginPath();X.moveTo(0,H);
  for(var sx=0;sx<=W;sx+=20){
    var sy=fy+Math.sin(sx*0.02)*5+Math.sin(sx*0.05+2)*3;
    X.lineTo(sx,sy);
  }
  X.lineTo(W,H);X.closePath();X.fill();

  // Floor details — little rocks/plants
  X.fillStyle='rgba(0,255,100,.04)';
  for(var p=0;p<W;p+=60){
    var ph=10+Math.sin(p*0.07)*8;
    var py=fy+Math.sin(p*0.02)*5-2;
    var sway=Math.sin(time*1.5+p*0.03)*3;
    X.beginPath();
    X.moveTo(p,py);
    X.quadraticCurveTo(p+sway,py-ph,p+3,py);
    X.fill();
  }
}

// Input
CV.addEventListener('click',function(e){
  var r=CV.getBoundingClientRect();
  var mx=e.clientX-r.left,my=e.clientY-r.top;
  // Drop food
  for(var i=0;i<2+Math.floor(Math.random()*2);i++){
    food.push(makeFood(mx+(Math.random()-0.5)*30,my));
  }
  // Occasionally spawn new fish
  if(fish.length<MAX_FISH&&Math.random()<0.15){
    fish.push(makeFish(mx,my));
  }
  if(instrShown){
    instrShown=false;
    var el=document.getElementById('instructions');
    if(el){el.style.opacity='0';setTimeout(function(){el.remove();},800);}
  }
});

CV.addEventListener('touchstart',function(e){
  e.preventDefault();
  var t=e.touches[0],r=CV.getBoundingClientRect();
  var mx=t.clientX-r.left,my=t.clientY-r.top;
  for(var i=0;i<2+Math.floor(Math.random()*2);i++){
    food.push(makeFood(mx+(Math.random()-0.5)*30,my));
  }
  if(fish.length<MAX_FISH&&Math.random()<0.15){
    fish.push(makeFish(mx,my));
  }
  if(instrShown){
    instrShown=false;
    var el=document.getElementById('instructions');
    if(el){el.style.opacity='0';setTimeout(function(){el.remove();},800);}
  }
},{passive:false});

// Evolution stage indicators
function updateEvoBar(){
  var stagesEl=document.getElementById('stages');
  stagesEl.innerHTML='';
  for(var s=0;s<=4;s++){
    var div=document.createElement('div');
    div.className='stage';
    // Check if any fish reached this stage
    var reached=false;
    fish.forEach(function(f){if(f.evoStage>=s)reached=true;});
    if(reached)div.classList.add('done');
    stagesEl.appendChild(div);
  }
}

var lastTime=0;
function loop(t){
  var dt=Math.min((t-lastTime)/1000,0.033);
  lastTime=t;
  time+=dt;

  // Update food
  food.forEach(function(fd){
    fd.y+=fd.vy*dt;
    fd.life-=dt;
    var fy=floorY();
    if(fd.y>fy-3){fd.y=fy-3;fd.vy=0;}
  });
  food=food.filter(function(fd){return fd.life>0;});

  // Update fish
  fish.forEach(function(f){updateFish(f,dt);});

  // Update bubbles
  bubbles.forEach(function(b){
    b.y+=b.vy*dt;
    b.x+=Math.sin(time*3+b.y*0.1)*0.3;
    b.life-=dt;
  });
  bubbles=bubbles.filter(function(b){return b.life>0&&b.y>0;});

  // Update particles
  particles.forEach(function(p){
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    p.vx*=0.95;p.vy*=0.95;p.life-=dt;
  });
  particles=particles.filter(function(p){return p.life>0;});

  // Render
  drawBackground();

  // Food
  food.forEach(function(fd){
    var fa=Math.min(1,fd.life/2);
    X.globalAlpha=fa;
    X.shadowColor=fd.col.glow;
    X.shadowBlur=6*fa;
    X.fillStyle='hsl('+fd.col.h+',100%,70%)';
    X.beginPath();X.arc(fd.x,fd.y,fd.size,0,Math.PI*2);X.fill();
    X.globalAlpha=1;X.shadowBlur=0;
  });

  // Fish (draw walkers last so they're on top)
  var swimmers=[];var walkers=[];
  fish.forEach(function(f){if(f.evoStage>=4&&f.onGround)walkers.push(f);else swimmers.push(f);});
  swimmers.forEach(drawFish);
  walkers.forEach(drawFish);

  // Bubbles
  bubbles.forEach(function(b){
    var ba=b.life/2;
    X.strokeStyle='rgba(150,220,255,'+ba*0.3+')';
    X.lineWidth=0.5;
    X.beginPath();X.arc(b.x,b.y,b.size,0,Math.PI*2);X.stroke();
  });

  // Particles
  particles.forEach(function(p){
    var pa=p.life/p.maxLife;
    X.globalAlpha=pa;
    X.fillStyle='hsl('+p.hue+',100%,75%)';
    X.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
  });
  X.globalAlpha=1;X.shadowBlur=0;

  // HUD
  document.getElementById('fish-count').textContent='Fish: '+fish.length;
  document.getElementById('evolved-count').textContent='Evolved: '+totalEvolved;
  updateEvoBar();

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
