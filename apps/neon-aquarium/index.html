<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Neon Aquarium</title>
<link rel="icon" href="https://emojicdn.elk.sh/🪼">
<meta property="og:title" content="Neon Aquarium">
<meta property="og:description" content="Mesmerizing deep-sea aquarium with glowing jellyfish and bioluminescent coral.">
<meta property="og:url" content="https://sloppy.live/neon-aquarium/">
<meta property="og:image" content="https://sloppy.live/neon-aquarium/og-image.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#020810;overflow:hidden;cursor:crosshair}
canvas{display:block}
#hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(100,200,255,.25);font-family:'Segoe UI',sans-serif;font-size:12px;letter-spacing:1px;pointer-events:none;transition:opacity 2s;z-index:10}
#backlink{position:fixed;bottom:6px;right:10px;color:rgba(100,200,255,.1);font-size:9px;font-family:sans-serif;text-decoration:none;z-index:10}
#backlink:hover{color:rgba(100,200,255,.25)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hint">click or tap to attract jellyfish</div>
<a id="backlink" href="https://sloppy.live">sloppy.live</a>
<script>
const CV=document.getElementById('c'),X=CV.getContext('2d');
let W,H;
function resize(){
  let dpr=window.devicePixelRatio||1;
  W=window.innerWidth;H=window.innerHeight;
  CV.width=W*dpr;CV.height=H*dpr;
  CV.style.width=W+'px';CV.style.height=H+'px';
  X.setTransform(dpr,0,0,dpr,0,0);
}
resize();
window.addEventListener('resize',resize);

// Palettes for jellyfish
const JELLY_PALETTES=[
  {body:'rgba(0,220,255,',tentacle:'rgba(0,180,255,',glow:'#00ddff'},
  {body:'rgba(255,0,200,',tentacle:'rgba(200,0,180,',glow:'#ff00cc'},
  {body:'rgba(120,0,255,',tentacle:'rgba(100,0,220,',glow:'#7700ff'},
  {body:'rgba(0,255,150,',tentacle:'rgba(0,200,120,',glow:'#00ff99'},
  {body:'rgba(255,100,0,',tentacle:'rgba(220,80,0,',glow:'#ff6600'},
  {body:'rgba(255,255,0,',tentacle:'rgba(200,200,0,',glow:'#ffff00'},
  {body:'rgba(0,150,255,',tentacle:'rgba(0,120,220,',glow:'#0099ff'},
  {body:'rgba(255,50,100,',tentacle:'rgba(220,40,80,',glow:'#ff3366'},
];

// Jellyfish
let jellies=[];
const JELLY_COUNT=8;
for(let i=0;i<JELLY_COUNT;i++) jellies.push(makeJelly());

function makeJelly(){
  let pal=JELLY_PALETTES[Math.floor(Math.random()*JELLY_PALETTES.length)];
  let sz=25+Math.random()*40;
  return{
    x:Math.random()*W,y:H*0.2+Math.random()*H*0.6,
    vx:(Math.random()-.5)*15,vy:-8-Math.random()*12,
    size:sz,
    pulsePhase:Math.random()*Math.PI*2,
    pulseSpeed:1.5+Math.random()*1.5,
    tentCount:5+Math.floor(Math.random()*4),
    tentLen:sz*1.5+Math.random()*sz,
    pal,
    drift:Math.random()*Math.PI*2,
    driftSpeed:0.3+Math.random()*0.4,
    glowPulse:Math.random()*Math.PI*2
  };
}

// Coral
let corals=[];
const CORAL_COUNT=12;
const CORAL_COLORS=[
  {base:'#ff0066',glow:'rgba(255,0,102,'},
  {base:'#00ffaa',glow:'rgba(0,255,170,'},
  {base:'#6600ff',glow:'rgba(102,0,255,'},
  {base:'#ff6600',glow:'rgba(255,102,0,'},
  {base:'#00ccff',glow:'rgba(0,204,255,'},
  {base:'#ff00ff',glow:'rgba(255,0,255,'},
  {base:'#ffcc00',glow:'rgba(255,204,0,'},
];
for(let i=0;i<CORAL_COUNT;i++){
  let col=CORAL_COLORS[Math.floor(Math.random()*CORAL_COLORS.length)];
  let cx=W*0.05+Math.random()*W*0.9;
  let type=Math.random();
  corals.push({
    x:cx,y:H,
    color:col,
    type:type<0.33?'branch':type<0.66?'fan':'tube',
    height:40+Math.random()*80,
    width:20+Math.random()*30,
    branches:3+Math.floor(Math.random()*4),
    phase:Math.random()*Math.PI*2,
    pulsePhase:Math.random()*Math.PI*2
  });
}

// Particles (plankton / bioluminescence)
let motes=[];
for(let i=0;i<80;i++){
  motes.push({
    x:Math.random()*W,y:Math.random()*H,
    vx:(Math.random()-.5)*8,vy:(Math.random()-.5)*5,
    size:1+Math.random()*2,
    life:Math.random(),
    color:Math.random()>.5?'rgba(0,220,255,':'rgba(0,255,150,'
  });
}

// Light rays
let rays=[];
for(let i=0;i<5;i++){
  rays.push({
    x:W*0.1+Math.random()*W*0.8,
    width:30+Math.random()*60,
    alpha:0.015+Math.random()*0.015,
    speed:5+Math.random()*10,
    phase:Math.random()*Math.PI*2
  });
}

// Mouse/touch attraction
let attractX=null,attractY=null;
let interacted=false;

CV.addEventListener('mousedown',e=>{
  attractX=e.clientX;attractY=e.clientY;
  if(!interacted){interacted=true;document.getElementById('hint').style.opacity='0';}
});
CV.addEventListener('mousemove',e=>{if(attractX!==null){attractX=e.clientX;attractY=e.clientY;}});
CV.addEventListener('mouseup',()=>{attractX=null;attractY=null;});
CV.addEventListener('touchstart',e=>{
  e.preventDefault();
  let t=e.touches[0];attractX=t.clientX;attractY=t.clientY;
  if(!interacted){interacted=true;document.getElementById('hint').style.opacity='0';}
},{passive:false});
CV.addEventListener('touchmove',e=>{
  e.preventDefault();let t=e.touches[0];attractX=t.clientX;attractY=t.clientY;
},{passive:false});
CV.addEventListener('touchend',e=>{e.preventDefault();attractX=null;attractY=null;},{passive:false});

function update(dt){
  let t=performance.now()*0.001;
  // Jellyfish
  for(let j of jellies){
    j.pulsePhase+=j.pulseSpeed*dt;
    j.glowPulse+=dt*2;
    j.drift+=j.driftSpeed*dt;

    // Pulse thrust
    let pulse=Math.sin(j.pulsePhase);
    if(pulse>0.9) j.vy-=pulse*25*dt;

    // Drift
    j.vx+=Math.sin(j.drift)*8*dt;
    j.vy+=2*dt; // slight sink

    // Attraction
    if(attractX!==null){
      let dx=attractX-j.x,dy=attractY-j.y;
      let dist=Math.sqrt(dx*dx+dy*dy);
      if(dist>10&&dist<400){
        let force=80/(dist+50);
        j.vx+=dx/dist*force;
        j.vy+=dy/dist*force;
      }
    }

    // Damping
    j.vx*=0.97;j.vy*=0.97;
    j.x+=j.vx*dt;j.y+=j.vy*dt;

    // Wrap
    if(j.x<-j.size*2) j.x=W+j.size;
    if(j.x>W+j.size*2) j.x=-j.size;
    if(j.y<-j.size*2) j.y=H*0.7;
    if(j.y>H-40) j.vy=-Math.abs(j.vy)-5;
    if(j.y>H+j.size) j.y=-j.size;
  }

  // Motes
  for(let m of motes){
    m.x+=m.vx*dt;m.y+=m.vy*dt;
    m.life+=dt*0.5;
    if(m.x<0) m.x=W;if(m.x>W) m.x=0;
    if(m.y<0) m.y=H;if(m.y>H) m.y=0;
  }
}

function drawBackground(){
  // Deep ocean gradient
  let grad=X.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#020c18');
  grad.addColorStop(0.3,'#03101f');
  grad.addColorStop(0.6,'#040d1a');
  grad.addColorStop(1,'#020810');
  X.fillStyle=grad;
  X.fillRect(0,0,W,H);

  // Light rays from above
  let t=performance.now()*0.001;
  for(let r of rays){
    let rx=r.x+Math.sin(t*0.1+r.phase)*r.speed;
    let grad2=X.createLinearGradient(rx,0,rx,H);
    grad2.addColorStop(0,'rgba(80,180,255,'+r.alpha+')');
    grad2.addColorStop(0.5,'rgba(40,120,200,'+(r.alpha*0.3)+')');
    grad2.addColorStop(1,'rgba(0,0,0,0)');
    X.fillStyle=grad2;
    X.beginPath();
    X.moveTo(rx-r.width/2,0);
    X.lineTo(rx+r.width/2,0);
    X.lineTo(rx+r.width*1.5,H);
    X.lineTo(rx-r.width,H);
    X.closePath();
    X.fill();
  }

  // Sea floor
  X.fillStyle='#060e1a';
  X.fillRect(0,H-30,W,30);
  let floorGrad=X.createLinearGradient(0,H-30,0,H);
  floorGrad.addColorStop(0,'rgba(10,20,40,.5)');
  floorGrad.addColorStop(1,'rgba(5,10,20,.9)');
  X.fillStyle=floorGrad;
  X.fillRect(0,H-30,W,30);
}

function drawCoral(c){
  let t=performance.now()*0.001;
  let sway=Math.sin(t*0.5+c.phase)*4;
  c.pulsePhase+=0.02;
  let glow=0.3+Math.sin(c.pulsePhase)*0.2;
  let cx=c.x,cy=c.y-10;

  // Glow
  let grad=X.createRadialGradient(cx,cy-c.height/2,0,cx,cy-c.height/2,c.height*0.8);
  grad.addColorStop(0,c.color.glow+glow*0.15+')');
  grad.addColorStop(1,'rgba(0,0,0,0)');
  X.fillStyle=grad;
  X.fillRect(cx-c.height,cy-c.height*1.2,c.height*2,c.height*1.5);

  X.lineCap='round';

  if(c.type==='branch'){
    for(let i=0;i<c.branches;i++){
      let angle=-Math.PI/2+(i-c.branches/2+0.5)*0.4;
      let bSway=sway*(1+i*0.1);
      let len=c.height*(0.6+i%2*0.4);
      X.strokeStyle=c.color.glow+(0.4+glow*0.3)+')';
      X.lineWidth=3+Math.sin(c.pulsePhase+i)*1;
      X.beginPath();
      X.moveTo(cx,cy);
      let mx=cx+Math.cos(angle)*len*0.5+bSway;
      let my=cy+Math.sin(angle)*len*0.5;
      let ex=cx+Math.cos(angle)*len+bSway*1.5;
      let ey=cy+Math.sin(angle)*len;
      X.quadraticCurveTo(mx,my,ex,ey);
      X.stroke();
      // Tip glow
      X.fillStyle=c.color.glow+(0.5+glow*0.4)+')';
      X.beginPath();X.arc(ex,ey,3+Math.sin(c.pulsePhase+i)*1.5,0,Math.PI*2);X.fill();
    }
  } else if(c.type==='fan'){
    let segments=8;
    for(let i=0;i<segments;i++){
      let angle=-Math.PI/2+(i-segments/2+0.5)*0.15;
      let len=c.height*(0.7+Math.sin(i*1.3)*0.3);
      X.strokeStyle=c.color.glow+(0.25+glow*0.2)+')';
      X.lineWidth=1.5;
      X.beginPath();
      X.moveTo(cx,cy);
      X.lineTo(cx+Math.cos(angle)*len+sway,cy+Math.sin(angle)*len);
      X.stroke();
    }
    // Membrane
    X.fillStyle=c.color.glow+(0.06+glow*0.04)+')';
    X.beginPath();
    X.moveTo(cx,cy);
    for(let i=0;i<=segments;i++){
      let angle=-Math.PI/2+(i-segments/2)*0.15;
      let len=c.height*(0.7+Math.sin(i*1.3)*0.3);
      X.lineTo(cx+Math.cos(angle)*len+sway,cy+Math.sin(angle)*len);
    }
    X.closePath();
    X.fill();
  } else { // tube
    for(let i=0;i<c.branches;i++){
      let ox=(i-c.branches/2+0.5)*c.width*0.4;
      let len=c.height*(0.5+Math.random()*0.1);
      let sw=sway*(1+i*0.15);
      X.strokeStyle=c.color.glow+(0.35+glow*0.3)+')';
      X.lineWidth=5+Math.sin(c.pulsePhase+i*2)*2;
      X.beginPath();
      X.moveTo(cx+ox,cy);
      X.quadraticCurveTo(cx+ox+sw*0.5,cy-len*0.6,cx+ox+sw,cy-len);
      X.stroke();
      // Mouth
      X.fillStyle=c.color.glow+(0.5+glow*0.3)+')';
      X.beginPath();X.arc(cx+ox+sw,cy-len,4+Math.sin(c.pulsePhase+i)*2,0,Math.PI*2);X.fill();
    }
  }
}

function drawJelly(j){
  let t=performance.now()*0.001;
  let pulse=Math.sin(j.pulsePhase);
  let sz=j.size;
  let squeeze=1+pulse*0.15;
  let bw=sz*squeeze;
  let bh=sz*(1-pulse*0.1);
  let gAlpha=0.15+Math.sin(j.glowPulse)*0.08;

  // Ambient glow
  let grad=X.createRadialGradient(j.x,j.y,0,j.x,j.y,sz*2.5);
  grad.addColorStop(0,j.pal.body+gAlpha+')');
  grad.addColorStop(1,'rgba(0,0,0,0)');
  X.fillStyle=grad;
  X.fillRect(j.x-sz*2.5,j.y-sz*2.5,sz*5,sz*5);

  // Bell (dome)
  X.fillStyle=j.pal.body+(0.2+pulse*0.05)+')';
  X.beginPath();
  X.ellipse(j.x,j.y,bw,bh*0.7,0,Math.PI,0);
  X.fill();

  // Inner bell highlight
  X.fillStyle=j.pal.body+(0.08+pulse*0.03)+')';
  X.beginPath();
  X.ellipse(j.x,j.y+bh*0.05,bw*0.7,bh*0.5,0,Math.PI,0);
  X.fill();

  // Bell rim
  X.strokeStyle=j.pal.body+(0.4+pulse*0.15)+')';
  X.lineWidth=1.5;
  X.beginPath();
  X.ellipse(j.x,j.y,bw,bh*0.1,0,0,Math.PI);
  X.stroke();

  // Oral arms (short frilly)
  for(let i=0;i<3;i++){
    let ox=(i-1)*bw*0.25;
    X.strokeStyle=j.pal.body+(0.15+pulse*0.05)+')';
    X.lineWidth=2;
    X.beginPath();
    X.moveTo(j.x+ox,j.y+2);
    let armLen=sz*0.4;
    for(let s=0;s<4;s++){
      let sx=j.x+ox+Math.sin(t*2+i+s*1.5)*6;
      let sy=j.y+2+s*armLen/4;
      X.lineTo(sx,sy);
    }
    X.stroke();
  }

  // Tentacles
  for(let i=0;i<j.tentCount;i++){
    let tx=j.x+(i-j.tentCount/2+0.5)*bw*2/j.tentCount;
    X.strokeStyle=j.pal.tentacle+(0.2+Math.sin(j.glowPulse+i)*0.1)+')';
    X.lineWidth=1+Math.sin(t+i)*0.5;
    X.beginPath();
    X.moveTo(tx,j.y+3);
    let segments=6;
    let tLen=j.tentLen;
    for(let s=1;s<=segments;s++){
      let prog=s/segments;
      let wave=Math.sin(t*1.5+i*0.8+s*0.7)*8*prog;
      let sy=j.y+3+prog*tLen;
      X.lineTo(tx+wave,sy);
    }
    X.stroke();

    // Tentacle tip glow
    let tipX=tx+Math.sin(t*1.5+i*0.8+segments*0.7)*8;
    let tipY=j.y+3+tLen;
    X.fillStyle=j.pal.body+(0.3+Math.sin(j.glowPulse+i*2)*0.15)+')';
    X.beginPath();X.arc(tipX,tipY,1.5,0,Math.PI*2);X.fill();
  }

  // Central organ glow
  X.fillStyle=j.pal.body+(0.3+pulse*0.1)+')';
  X.beginPath();
  X.arc(j.x,j.y-bh*0.25,sz*0.12,0,Math.PI*2);
  X.fill();
}

function drawMotes(){
  for(let m of motes){
    let a=0.15+Math.sin(m.life*3)*0.15;
    X.fillStyle=m.color+a+')';
    X.beginPath();X.arc(m.x,m.y,m.size,0,Math.PI*2);X.fill();
  }
}

function drawBubbles(){
  let t=performance.now()*0.001;
  X.strokeStyle='rgba(100,200,255,.06)';
  X.lineWidth=0.8;
  for(let i=0;i<15;i++){
    let bx=W*0.1+((i*W*0.07+t*20)%W);
    let by=H-((t*30+i*80)%H);
    let br=2+Math.sin(t+i)*1.5;
    X.beginPath();X.arc(bx,by,br,0,Math.PI*2);X.stroke();
  }
}

// Main loop
let lastTime=performance.now();
function loop(now){
  let dt=Math.min((now-lastTime)/1000,0.05);
  lastTime=now;

  update(dt);

  drawBackground();
  drawBubbles();
  for(let c of corals) drawCoral(c);
  drawMotes();

  // Sort jellies by size for depth (smaller = further back)
  let sorted=[...jellies].sort((a,b)=>a.size-b.size);
  for(let j of sorted) drawJelly(j);

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
