<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>3AM Thoughts</title>
<link rel="icon" href="https://emojicdn.elk.sh/🌙">
<meta property="og:title" content="3AM Thoughts">
<meta property="og:description" content="Type into the void. Watch it melt. Nothing is saved. That's the point.">
<meta property="og:url" content="https://sloppy.live/3am-thoughts">
<meta property="og:image" content="https://image.pollinations.ai/prompt/melting%20text%20dripping%20down%20a%20dark%20screen%20at%203am%20neon%20glow%20insomnia?width=1200&height=630&seed=3333&nologo=true">
<style>
@import url('https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,300;0,400;1,300;1,400&family=Azeret+Mono:wght@300;400&family=Instrument+Serif:ital@0;1&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:100%}
body{background:var(--bg);overflow:hidden;height:100vh;width:100vw;font-family:'Newsreader',serif;transition:background 60s linear}
:root{
--bg:#080818;
--glow:#4a3a8a;
--text:#c8b8e8;
--melt:#6a5aaa;
--warn:#e8785a;
--dim:#3a2a5a;
}
canvas{position:absolute;top:0;left:0;z-index:1}
#void{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;pointer-events:none}
#header{margin-top:clamp(2rem,6vh,4rem);text-align:center;pointer-events:none;transition:opacity 1.5s}
#header h1{font-family:'Instrument Serif',serif;font-style:italic;font-size:clamp(2.2rem,5vw,4rem);color:var(--text);font-weight:400;letter-spacing:.02em;opacity:.7}
#header .sub{font-family:'Azeret Mono',monospace;font-size:.7rem;color:var(--dim);letter-spacing:.2em;margin-top:.5rem;text-transform:uppercase}
#input-wrap{position:absolute;bottom:clamp(2rem,8vh,5rem);left:50%;transform:translateX(-50%);width:min(90vw,42rem);pointer-events:all;z-index:5}
#thought-input{width:100%;background:rgba(255,255,255,.03);border:1px solid rgba(200,184,232,.1);border-radius:1rem;padding:1rem 1.4rem;font-family:'Newsreader',serif;font-size:1.1rem;color:var(--text);resize:none;outline:none;height:3.6rem;max-height:8rem;overflow-y:auto;transition:border-color .4s,box-shadow .4s;line-height:1.5}
#thought-input:focus{border-color:rgba(200,184,232,.25);box-shadow:0 0 30px rgba(74,58,138,.2)}
#thought-input::placeholder{color:var(--dim);font-style:italic}
#metrics{position:absolute;top:1rem;right:1.2rem;display:flex;flex-direction:column;align-items:flex-end;gap:.5rem;z-index:5;pointer-events:none;opacity:0;transition:opacity 2s}
#metrics.show{opacity:1}
.metric{font-family:'Azeret Mono',monospace;font-size:.65rem;color:var(--dim);letter-spacing:.1em;display:flex;align-items:center;gap:.4rem}
.metric .val{color:var(--text);font-weight:400;min-width:3ch;text-align:right}
.metric .bar{width:60px;height:4px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden}
.metric .bar-fill{height:100%;border-radius:2px;transition:width .8s,background .8s}
#regret-pill{position:absolute;top:1rem;left:1.2rem;z-index:5;pointer-events:none;opacity:0;transition:opacity 2s}
#regret-pill.show{opacity:1}
#regret-pill .label{font-family:'Azeret Mono',monospace;font-size:.6rem;color:var(--dim);letter-spacing:.15em;text-transform:uppercase}
#regret-pill .time{font-family:'Instrument Serif',serif;font-style:italic;font-size:1.6rem;color:var(--warn);opacity:.8;margin-top:.15rem}
#regret-pill .judge{font-family:'Newsreader',serif;font-style:italic;font-size:.75rem;color:var(--warn);opacity:.6;margin-top:.25rem}
#wake-setup{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:30;display:none;text-align:center;pointer-events:all}
#wake-setup.show{display:block}
#wake-setup label{font-family:'Instrument Serif',serif;font-style:italic;font-size:1.3rem;color:var(--text);display:block;margin-bottom:1rem;opacity:.7}
#wake-time{font-family:'Azeret Mono',monospace;font-size:1.4rem;background:rgba(255,255,255,.05);border:1px solid rgba(200,184,232,.15);border-radius:.6rem;padding:.6rem 1.2rem;color:var(--text);outline:none;text-align:center;-webkit-appearance:none}
#wake-time:focus-visible{outline:3px solid var(--glow);outline-offset:2px}
#wake-time::-webkit-calendar-picker-indicator{filter:invert(.7)}
#wake-ok{font-family:'Azeret Mono',monospace;font-size:.8rem;margin-top:1rem;padding:.5rem 1.6rem;background:rgba(200,184,232,.1);border:1px solid rgba(200,184,232,.15);border-radius:.5rem;color:var(--text);cursor:pointer;display:block;margin-left:auto;margin-right:auto}
#wake-ok:hover{background:rgba(200,184,232,.18)}
#wake-ok:focus-visible{outline:3px solid var(--glow);outline-offset:2px}
#dissolve-note{position:absolute;bottom:.8rem;left:50%;transform:translateX(-50%);font-family:'Azeret Mono',monospace;font-size:.55rem;color:rgba(58,42,90,.6);letter-spacing:.15em;z-index:5;pointer-events:none}
@media(prefers-reduced-motion:reduce){
.melt-word{animation:none!important;transition:none!important}
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="void">
<div id="header">
<h1>3am thoughts</h1>
<p class="sub">type into the void · nothing is saved</p>
</div>
</div>
<div id="input-wrap">
<textarea id="thought-input" placeholder="what's keeping you up?" rows="1" aria-label="Type your thoughts"></textarea>
</div>
<div id="metrics">
<div class="metric"><span class="label">deprivation</span><div class="bar"><div class="bar-fill" id="dep-bar" style="width:0%;background:var(--glow)"></div></div><span class="val" id="dep-val">0%</span></div>
<div class="metric"><span class="label">ramble</span><div class="bar"><div class="bar-fill" id="ram-bar" style="width:0%;background:var(--melt)"></div></div><span class="val" id="ram-val">0</span></div>
<div class="metric"><span class="label">typos</span><span class="val" id="typo-val">0</span></div>
<div class="metric"><span class="label">thoughts</span><span class="val" id="thought-count">0</span></div>
</div>
<div id="regret-pill">
<div class="label">until alarm</div>
<div class="time" id="regret-time">—</div>
<div class="judge" id="regret-judge"></div>
</div>
<div id="wake-setup">
<label for="wake-time">when does reality resume?</label>
<input type="time" id="wake-time" value="07:00">
<button type="button" id="wake-ok">accept fate</button>
</div>
<div id="dissolve-note">nothing is saved · everything dissolves</div>
<script>
(function(){
'use strict';

// Canvas background
var canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
var W,H,dpr;
function resize(){
dpr=Math.min(window.devicePixelRatio||1,2);
W=window.innerWidth;H=window.innerHeight;
canvas.width=W*dpr;canvas.height=H*dpr;
canvas.style.width=W+'px';canvas.style.height=H+'px';
ctx.setTransform(dpr,0,0,dpr,0,0);
}
resize();window.addEventListener('resize',resize);

// Melting words state
var meltWords=[];
var wordFreq={};
var totalThoughts=0;
var totalChars=0;
var typoCount=0;
var sessionStart=Date.now();
var lastKeyTime=0;
var keyIntervals=[];
var wakeMinutes=420; // 7am default
var wakeSet=false;

// Elements
var input=document.getElementById('thought-input');
var headerEl=document.getElementById('header');
var metricsEl=document.getElementById('metrics');
var regretEl=document.getElementById('regret-pill');
var regretTime=document.getElementById('regret-time');
var regretJudge=document.getElementById('regret-judge');
var depBar=document.getElementById('dep-bar');
var depVal=document.getElementById('dep-val');
var ramBar=document.getElementById('ram-bar');
var ramVal=document.getElementById('ram-val');
var typoVal=document.getElementById('typo-val');
var thoughtCount=document.getElementById('thought-count');
var wakeSetup=document.getElementById('wake-setup');
var wakeInput=document.getElementById('wake-time');
var wakeOk=document.getElementById('wake-ok');

// Audio
var audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}

function sndMelt(){
initAudio();var t=audioCtx.currentTime;
var o=audioCtx.createOscillator(),g=audioCtx.createGain();
o.type='sine';
var base=200+Math.random()*300;
o.frequency.setValueAtTime(base,t);
o.frequency.exponentialRampToValueAtTime(base*.4,t+.8);
g.gain.setValueAtTime(.04,t);g.gain.exponentialRampToValueAtTime(.001,t+.9);
o.connect(g);g.connect(audioCtx.destination);
o.start(t);o.stop(t+1);
}

function sndShatter(){
initAudio();var t=audioCtx.currentTime;
var buf=audioCtx.createBuffer(1,audioCtx.sampleRate*.15,audioCtx.sampleRate);
var d=buf.getChannelData(0);
for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,1.5);
var s=audioCtx.createBufferSource(),g=audioCtx.createGain(),bp=audioCtx.createBiquadFilter();
s.buffer=buf;bp.type='bandpass';bp.frequency.value=2200;bp.Q.value=1.5;
g.gain.setValueAtTime(.08,t);g.gain.exponentialRampToValueAtTime(.001,t+.18);
s.connect(bp);bp.connect(g);g.connect(audioCtx.destination);s.start(t);
}

function sndDrip(){
initAudio();var t=audioCtx.currentTime;
var o=audioCtx.createOscillator(),g=audioCtx.createGain();
o.type='triangle';
o.frequency.setValueAtTime(800+Math.random()*400,t);
o.frequency.exponentialRampToValueAtTime(100,t+.4);
g.gain.setValueAtTime(.025,t);g.gain.exponentialRampToValueAtTime(.001,t+.45);
o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+.5);
}

// Wake time setup
setTimeout(function(){wakeSetup.classList.add('show')},1500);

wakeOk.addEventListener('click',function(){
var parts=wakeInput.value.split(':');
wakeMinutes=parseInt(parts[0])*60+parseInt(parts[1]);
wakeSet=true;
wakeSetup.classList.remove('show');
input.focus();
metricsEl.classList.add('show');
regretEl.classList.add('show');
});

// Typo detection — simple: backspace count
var backspaceCount=0;
input.addEventListener('keydown',function(e){
var now=Date.now();
if(lastKeyTime>0){
keyIntervals.push(now-lastKeyTime);
if(keyIntervals.length>50)keyIntervals.shift();
}
lastKeyTime=now;

if(e.key==='Backspace'){
backspaceCount++;
if(backspaceCount%3===0){typoCount++;typoVal.textContent=typoCount;}
}

if(e.key==='Enter'&&!e.shiftKey){
e.preventDefault();
submitThought();
}
});

function submitThought(){
var text=input.value.trim();
if(!text)return;
initAudio();

totalThoughts++;
totalChars+=text.length;
thoughtCount.textContent=totalThoughts;
input.value='';
input.style.height='3.6rem';

// fade header after first thought
if(totalThoughts===1){
headerEl.style.opacity='.25';
if(!wakeSet){wakeSetup.classList.remove('show');metricsEl.classList.add('show');regretEl.classList.add('show');}
}

// split into words and spawn melting text
var words=text.split(/\s+/);
var startX=W*.1+Math.random()*W*.15;
var y=H*.15+Math.random()*H*.25;

words.forEach(function(word,i){
var lower=word.toLowerCase().replace(/[^a-z]/g,'');
if(lower.length<2)return;
wordFreq[lower]=(wordFreq[lower]||0)+1;
var freq=wordFreq[lower];

var mw={
text:word,
x:startX+i*(word.length*11+12),
y:y,
vy:.3+Math.random()*.4,
vx:(Math.random()-.5)*.3,
opacity:1,
scale:1,
rotation:(Math.random()-.5)*.1,
rotSpeed:(Math.random()-.5)*.02,
freq:freq,
tremble:freq>=3,
shatter:false,
shatterTime:0,
shatterParts:[],
meltStretch:1,
age:0,
drips:[],
fontSize:16+Math.random()*6,
hue:250+Math.random()*40
};

// if overused, schedule shatter
if(freq>=5){
mw.shatter=true;
mw.shatterTime=2+Math.random()*2;
}

meltWords.push(mw);
});

sndMelt();
updateDeprivation();
}

// Auto-resize textarea
input.addEventListener('input',function(){
this.style.height='3.6rem';
this.style.height=Math.min(this.scrollHeight,128)+'px';
});

// Deprivation calc
function updateDeprivation(){
var minutesAwake=(Date.now()-sessionStart)/60000;
var typingSpeed=0;
if(keyIntervals.length>5){
var avg=keyIntervals.reduce(function(a,b){return a+b},0)/keyIntervals.length;
typingSpeed=Math.max(0,1-avg/500); // faster = more deprived (paradox)
}
var ramble=Math.min(1,totalChars/2000);
var typoFactor=Math.min(1,typoCount/15);
var timeFactor=Math.min(1,minutesAwake/60);

var dep=Math.min(100,Math.round((typoFactor*.35+ramble*.25+timeFactor*.25+typingSpeed*.15)*100));

depBar.style.width=dep+'%';
depBar.style.background=dep>60?'var(--warn)':dep>30?'var(--melt)':'var(--glow)';
depVal.textContent=dep+'%';

ramBar.style.width=Math.min(100,ramble*100)+'%';
ramVal.textContent=totalChars;
}

// Regret timer
function updateRegret(){
var now=new Date();
var nowMin=now.getHours()*60+now.getMinutes();
var diff=wakeMinutes-nowMin;
if(diff<=0)diff+=1440;
var h=Math.floor(diff/60);
var m=diff%60;
regretTime.textContent=h+'h '+m+'m';

var judgments;
if(diff<120)judgments=['this was a mistake','why are you like this','your alarm will show no mercy','future you will suffer'];
else if(diff<300)judgments=['still time to pretend this is fine','the void appreciates your company','sleep is a social construct, right?','questionable life choices detected'];
else judgments=['the night is young','plenty of time to spiral','you have hours of regret ahead','the void is patient'];

regretJudge.textContent=judgments[Math.floor(Date.now()/8000)%judgments.length];
}

// Background color shift based on real time
function updateBgColor(){
var h=new Date().getHours();
var m=new Date().getMinutes();
var t=h+m/60;
var r,g,b;
if(t>=0&&t<4){
// midnight blue -> sickly green-tinged
var p=(t)/4;
r=Math.round(8+p*12);
g=Math.round(8+p*18);
b=Math.round(24-p*6);
} else if(t>=4&&t<6){
// sickly fluorescent
var p=(t-4)/2;
r=Math.round(20+p*25);
g=Math.round(26+p*20);
b=Math.round(18+p*8);
} else {
r=8;g=8;b=24;
}
document.body.style.background='rgb('+r+','+g+','+b+')';
}

// Drip particles
function spawnDrip(mw){
mw.drips.push({
x:mw.x+Math.random()*(mw.text.length*mw.fontSize*.55),
y:mw.y+mw.fontSize*.5,
vy:1+Math.random()*2,
r:1.5+Math.random()*2,
opacity:.6,
hue:mw.hue
});
}

// Shatter into fragments
function doShatter(mw){
sndShatter();
for(var i=0;i<mw.text.length;i++){
var ch=mw.text[i];
if(ch===' ')continue;
mw.shatterParts.push({
ch:ch,
x:mw.x+i*mw.fontSize*.6,
y:mw.y,
vx:(Math.random()-.5)*120,
vy:-40-Math.random()*80,
rotation:Math.random()*Math.PI*2,
rotV:(Math.random()-.5)*8,
opacity:1,
gravity:180+Math.random()*100
});
}
mw.opacity=0;
}

// Main render
var lastT=0;
var frameCount=0;

function loop(ts){
var dt=Math.min((ts-lastT)/1000,.05);
lastT=ts;
frameCount++;

ctx.clearRect(0,0,W,H);

// ambient particles — sparse floating motes
if(frameCount%120===0&&meltWords.length>0){
sndDrip();
}

// update & draw melting words
for(var i=meltWords.length-1;i>=0;i--){
var mw=meltWords[i];
mw.age+=dt;

// gravity — accelerating melt
mw.vy+=dt*.08;
mw.y+=mw.vy;
mw.x+=mw.vx;
mw.rotation+=mw.rotSpeed*dt;

// stretch as it melts down
mw.meltStretch=Math.min(2.2,1+mw.age*.06);

// fade out as it goes down
var fadeStart=H*.4;
if(mw.y>fadeStart){
mw.opacity=Math.max(0,1-(mw.y-fadeStart)/(H*.5));
}

// trembling for overused words
var tx=0,ty=0;
if(mw.tremble){
var intensity=Math.min(4,mw.freq*.6);
tx=Math.sin(ts*.015+i*7)*intensity;
ty=Math.cos(ts*.018+i*11)*intensity*.6;
}

// shatter countdown
if(mw.shatter&&mw.shatterTime>0){
mw.shatterTime-=dt;
if(mw.shatterTime<=0){
doShatter(mw);
}
}

// drips
if(mw.age>2&&Math.random()<.02&&mw.opacity>.2){
spawnDrip(mw);
}

// draw drips
for(var j=mw.drips.length-1;j>=0;j--){
var dr=mw.drips[j];
dr.y+=dr.vy;dr.vy+=dt*60;
dr.opacity-=dt*.4;
if(dr.opacity<=0||dr.y>H){mw.drips.splice(j,1);continue;}
ctx.globalAlpha=dr.opacity*.5;
ctx.fillStyle='hsl('+dr.hue+',40%,55%)';
ctx.beginPath();
// teardrop shape
ctx.ellipse(dr.x,dr.y,dr.r*.6,dr.r*1.4,0,0,Math.PI*2);
ctx.fill();
}

// draw shatter parts
for(var j=mw.shatterParts.length-1;j>=0;j--){
var sp=mw.shatterParts[j];
sp.x+=sp.vx*dt;sp.y+=sp.vy*dt;
sp.vy+=sp.gravity*dt;
sp.rotation+=sp.rotV*dt;
sp.opacity-=dt*.5;
if(sp.opacity<=0){mw.shatterParts.splice(j,1);continue;}
ctx.save();
ctx.translate(sp.x,sp.y);
ctx.rotate(sp.rotation);
ctx.globalAlpha=sp.opacity;
ctx.font=mw.fontSize+'px Newsreader,serif';
ctx.fillStyle='hsl('+(mw.hue+20)+',50%,60%)';
ctx.textAlign='center';ctx.textBaseline='middle';
ctx.fillText(sp.ch,0,0);
ctx.restore();
}

// draw word
if(mw.opacity>0.01){
ctx.save();
var wx=mw.x+tx;
var wy=mw.y+ty;
ctx.translate(wx,wy);
ctx.rotate(mw.rotation);
ctx.scale(1,mw.meltStretch);
ctx.globalAlpha=mw.opacity;

// glow
ctx.shadowColor='hsl('+mw.hue+',50%,50%)';
ctx.shadowBlur=mw.tremble?12:6;

// color shifts with frequency
var sat=30+mw.freq*5;
var light=55+mw.freq*3;
if(mw.freq>=4)light=65;
ctx.fillStyle='hsl('+mw.hue+','+Math.min(70,sat)+'%,'+Math.min(80,light)+'%)';
ctx.font=(mw.tremble?'italic ':'')+mw.fontSize+'px Newsreader,serif';
ctx.textAlign='left';ctx.textBaseline='top';
ctx.fillText(mw.text,0,0);

// frequency indicator
if(mw.freq>=3){
ctx.font='9px "Azeret Mono",monospace';
ctx.fillStyle='rgba(232,120,90,'+(0.4+mw.freq*.08)+')';
ctx.fillText('×'+mw.freq,mw.text.length*mw.fontSize*.58+6,-2);
}

ctx.shadowBlur=0;
ctx.restore();
}

// remove if offscreen or fully faded
if(mw.y>H+50||(mw.opacity<=0&&mw.shatterParts.length===0&&mw.drips.length===0)){
meltWords.splice(i,1);
}
}

ctx.globalAlpha=1;

// floating ambient dust
for(var i=0;i<8;i++){
var px=Math.sin(ts*.0003+i*2.3)*W*.35+W*.5;
var py=Math.cos(ts*.0002+i*1.7)*H*.35+H*.5;
var pa=.03+Math.sin(ts*.001+i)*.02;
ctx.fillStyle='rgba(160,140,200,'+pa+')';
ctx.beginPath();ctx.arc(px,py,1.5,0,Math.PI*2);ctx.fill();
}

// update timers
if(frameCount%60===0){
updateRegret();
updateBgColor();
updateDeprivation();
}

requestAnimationFrame(loop);
}

requestAnimationFrame(function(ts){lastT=ts;loop(ts)});

// Focus input on load
setTimeout(function(){
if(!wakeSet)return;
input.focus();
},2000);

updateBgColor();
updateRegret();
})();
</script>
</body>
</html>
