<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Neon Fox Sanctuary</title>
<link rel="icon" href="https://emojicdn.elk.sh/🦊">
<meta property="og:title" content="Neon Fox Sanctuary">
<meta property="og:description" content="Neon foxes with laser eyes roam a glowing sanctuary. Tickle them if you dare.">
<meta property="og:url" content="https://sloppy.live/neon-fox/">
<meta property="og:image" content="https://sloppy.live/neon-fox/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Righteous&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#06000f}
canvas{display:block;width:100%;height:100%}
#hint{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Share Tech Mono',monospace;color:rgba(255,140,0,.15);font-size:clamp(.6rem,1.5vw,.8rem);pointer-events:none;z-index:5;text-align:center;letter-spacing:.1em;transition:opacity 2s;line-height:2}
#fox-count{position:fixed;top:10px;right:14px;font-family:'Righteous',cursive;color:rgba(255,140,0,.2);font-size:.8rem;z-index:5;pointer-events:none}
.back-link{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);z-index:20;color:rgba(255,140,0,.08);font-size:9px;text-decoration:none;font-family:'Share Tech Mono',monospace}
.back-link:hover{color:rgba(255,140,0,.3)}
</style>
</head>
<body>
<div id="hint">HOVER OVER FOXES TO TICKLE THEM<br>CLICK TO SUMMON MORE</div>
<div id="fox-count"></div>
<canvas id="cv"></canvas>
<a class="back-link" href="https://sloppy.live">sloppy.live</a>
<script>
var CV=document.getElementById('cv');
var X=CV.getContext('2d');
var W,H;
function resize(){W=CV.width=window.innerWidth;H=CV.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

var mx=-999,my=-999;
document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;});
document.addEventListener('touchmove',function(e){e.preventDefault();mx=e.touches[0].clientX;my=e.touches[0].clientY;},{passive:false});
document.addEventListener('touchstart',function(e){mx=e.touches[0].clientX;my=e.touches[0].clientY;spawnFox(mx,my);});
document.addEventListener('click',function(e){spawnFox(e.clientX,e.clientY);});

var hintShown=true;
setTimeout(function(){document.getElementById('hint').style.opacity='0';hintShown=false;},5000);

// --- FOX PALETTE ---
var FOX_COLORS=[
  {body:'#ff6600',accent:'#ff9933',belly:'#ffcc66',eye:'#00ffcc',laser:'#00ffcc',glow:'rgba(0,255,204,'},
  {body:'#cc00ff',accent:'#dd55ff',belly:'#eea0ff',eye:'#ff0066',laser:'#ff0066',glow:'rgba(255,0,102,'},
  {body:'#00ccff',accent:'#44ddff',belly:'#99eeff',eye:'#ffcc00',laser:'#ffcc00',glow:'rgba(255,204,0,'},
  {body:'#ff0066',accent:'#ff3388',belly:'#ff88aa',eye:'#00ff66',laser:'#00ff66',glow:'rgba(0,255,102,'},
  {body:'#33ff00',accent:'#66ff33',belly:'#aaff77',eye:'#ff00cc',laser:'#ff00cc',glow:'rgba(255,0,204,'},
  {body:'#ffcc00',accent:'#ffdd44',belly:'#ffee88',eye:'#0088ff',laser:'#0088ff',glow:'rgba(0,136,255,'},
];

// --- FOXES ---
var foxes=[];

function createFox(x,y){
  var pal=FOX_COLORS[Math.floor(Math.random()*FOX_COLORS.length)];
  return {
    x:x||100+Math.random()*(W-200),
    y:y||H*0.5+Math.random()*H*0.3,
    vx:(Math.random()-.5)*30,
    vy:0,
    dir:Math.random()<0.5?1:-1,
    size:28+Math.random()*16,
    pal:pal,
    // State
    tickle:0, // 0-1 tickle intensity
    laughTimer:0,
    wiggle:0,
    tailPhase:Math.random()*Math.PI*2,
    earPhase:Math.random()*Math.PI*2,
    blink:0,blinkTimer:2+Math.random()*3,
    laser:false,laserTimer:0,laserTarget:{x:0,y:0},
    // Walk
    walkTimer:Math.random()*5,
    idleTimer:0,
    state:'idle', // idle, walk, tickled, laughing, laser
    breathe:Math.random()*Math.PI*2,
    jumpVy:0,grounded:true,
    // Particles
    laughParticles:[]
  };
}

// Start with 3 foxes
for(var i=0;i<3;i++) foxes.push(createFox());

function spawnFox(x,y){
  if(foxes.length>=8) return;
  foxes.push(createFox(x,y));
  updateCount();
}

function updateCount(){
  document.getElementById('fox-count').textContent=foxes.length+' fox'+(foxes.length!==1?'es':'');
}
updateCount();

// --- GROUND ---
var groundY;
function getGroundY(){return H*0.78;}

// --- PARTICLES ---
var particles=[];

function spawnLaughBurst(fx,fy,color){
  for(var i=0;i<8;i++){
    var a=-Math.PI/2+(Math.random()-.5)*1.5;
    var sp=40+Math.random()*80;
    particles.push({x:fx,y:fy-10,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      life:0.5+Math.random()*0.5,maxLife:1,r:2+Math.random()*3,color:color,type:'star'});
  }
}

function spawnTickleSparkle(x,y,color){
  particles.push({x:x,y:y,vx:(Math.random()-.5)*30,vy:-20-Math.random()*30,
    life:0.3+Math.random()*0.3,maxLife:0.6,r:1.5+Math.random()*2,color:color,type:'spark'});
}

// --- UPDATE ---
function update(dt,now){
  groundY=getGroundY();

  for(var i=0;i<foxes.length;i++){
    var f=foxes[i];
    f.breathe+=dt*2;
    f.tailPhase+=dt*(2+f.tickle*8);
    f.earPhase+=dt*3;

    // Blink
    f.blinkTimer-=dt;
    if(f.blinkTimer<=0){f.blink=0.12;f.blinkTimer=2+Math.random()*4;}
    if(f.blink>0) f.blink-=dt;

    // Gravity
    if(!f.grounded){
      f.jumpVy+=500*dt;
      f.y+=f.jumpVy*dt;
      if(f.y>=groundY-f.size*0.3){
        f.y=groundY-f.size*0.3;
        f.jumpVy=0;f.grounded=true;
      }
    }

    // Tickle detection
    var dx=mx-f.x,dy=my-f.y;
    var dist=Math.sqrt(dx*dx+dy*dy);
    var tickleRange=f.size*1.5;

    if(dist<tickleRange&&dist>0){
      f.tickle=Math.min(1,f.tickle+dt*2);
      f.wiggle+=dt*25;
      if(f.state!=='laughing'&&f.state!=='laser') f.state='tickled';
      // Sparkles
      if(Math.random()<0.4) spawnTickleSparkle(f.x+(Math.random()-.5)*f.size,f.y-(Math.random()*f.size*0.5),f.pal.accent);
      // Trigger laugh at high tickle
      if(f.tickle>0.8&&f.state==='tickled'){
        f.state='laughing';f.laughTimer=1.5;
        spawnLaughBurst(f.x,f.y,f.pal.accent);
        // Jump!
        if(f.grounded){f.jumpVy=-150-Math.random()*100;f.grounded=false;}
      }
      // Random laser eyes
      if(f.tickle>0.5&&Math.random()<0.01&&!f.laser){
        f.laser=true;f.laserTimer=0.8+Math.random()*0.5;
        f.laserTarget={x:mx+((Math.random()-.5)*200),y:my+((Math.random()-.5)*200)};
      }
    } else {
      f.tickle=Math.max(0,f.tickle-dt*1.5);
      if(f.tickle<0.1&&f.state==='tickled') f.state='idle';
    }

    // Laughing
    if(f.state==='laughing'){
      f.laughTimer-=dt;
      f.wiggle+=dt*30;
      if(f.laughTimer<=0) f.state='idle';
    }

    // Laser eyes
    if(f.laser){
      f.laserTimer-=dt;
      if(f.laserTimer<=0) f.laser=false;
    }

    // Walk behavior
    if(f.state==='idle'){
      f.walkTimer-=dt;
      if(f.walkTimer<=0){
        f.state='walk';f.walkTimer=2+Math.random()*4;
        f.dir=Math.random()<0.5?1:-1;
      }
      f.vx*=0.9;
    }
    if(f.state==='walk'){
      f.vx=f.dir*25;
      f.walkTimer-=dt;
      if(f.walkTimer<=0){f.state='idle';f.walkTimer=2+Math.random()*5;}
    }

    // Movement
    f.x+=f.vx*dt;
    // Boundaries
    if(f.x<f.size){f.x=f.size;f.dir=1;f.vx=Math.abs(f.vx);}
    if(f.x>W-f.size){f.x=W-f.size;f.dir=-1;f.vx=-Math.abs(f.vx);}

    // Fox particles
    for(var p=f.laughParticles.length-1;p>=0;p--){
      f.laughParticles[p].life-=dt;
      if(f.laughParticles[p].life<=0) f.laughParticles.splice(p,1);
    }
  }

  // Global particles
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;
    if(p.type!=='spark') p.vy+=100*dt;
    p.life-=dt;
    if(p.life<=0) particles.splice(i,1);
  }
}

// --- DRAW FOX ---
function drawFox(f,now){
  var s=f.size;
  var fx=f.x,fy=f.y;
  var dir=f.dir;
  var wiggleX=f.tickle>0?Math.sin(f.wiggle)*f.tickle*4:0;
  var breatheY=Math.sin(f.breathe)*1.5;
  fx+=wiggleX;
  fy+=breatheY;

  // Neon glow aura
  var glowR=s*1.8+f.tickle*s*0.5+Math.sin(now/500)*s*0.1;
  var grd=X.createRadialGradient(fx,fy-s*0.2,0,fx,fy-s*0.2,glowR);
  grd.addColorStop(0,f.pal.glow+(0.06+f.tickle*0.08)+')');
  grd.addColorStop(1,'transparent');
  X.fillStyle=grd;
  X.beginPath();X.arc(fx,fy-s*0.2,glowR,0,Math.PI*2);X.fill();

  X.save();
  X.translate(fx,fy);
  if(dir<0) X.scale(-1,1);

  // Tail
  var tailSwing=Math.sin(f.tailPhase)*0.5*(1+f.tickle*2);
  X.save();
  X.translate(-s*0.3,-s*0.1);
  X.rotate(tailSwing);
  X.fillStyle=f.pal.body;
  X.shadowColor=f.pal.body;X.shadowBlur=8;
  X.beginPath();
  X.moveTo(0,0);
  X.quadraticCurveTo(-s*0.6,-s*0.4,-s*0.7,-s*0.6);
  X.quadraticCurveTo(-s*0.5,-s*0.3,-s*0.2,-s*0.1);
  X.quadraticCurveTo(-s*0.1,s*0.1,0,0);
  X.fill();
  // Tail tip
  X.fillStyle=f.pal.belly;
  X.beginPath();
  X.arc(-s*0.65,-s*0.55,s*0.1,0,Math.PI*2);
  X.fill();
  X.shadowBlur=0;
  X.restore();

  // Body
  X.fillStyle=f.pal.body;
  X.shadowColor=f.pal.body;X.shadowBlur=6;
  X.beginPath();
  X.ellipse(0,0,s*0.4,s*0.3,0,0,Math.PI*2);
  X.fill();
  X.shadowBlur=0;

  // Belly
  X.fillStyle=f.pal.belly;
  X.beginPath();
  X.ellipse(s*0.05,s*0.05,s*0.22,s*0.18,0,0,Math.PI*2);
  X.fill();

  // Legs
  X.fillStyle=f.pal.body;
  var legKick=f.state==='walk'?Math.sin(now/120)*3:0;
  var tickleKick=f.tickle>0?Math.sin(f.wiggle*2)*f.tickle*5:0;
  // Front legs
  X.fillRect(s*0.15,s*0.15,s*0.1,s*0.2+legKick);
  X.fillRect(s*0.28,s*0.15,s*0.1,s*0.2-legKick);
  // Back legs
  X.fillRect(-s*0.25,s*0.12,s*0.12,s*0.22-legKick+tickleKick);
  X.fillRect(-s*0.12,s*0.12,s*0.12,s*0.22+legKick-tickleKick);
  // Paws
  X.fillStyle=f.pal.accent;
  X.fillRect(s*0.15,s*0.33+legKick,s*0.12,s*0.05);
  X.fillRect(s*0.27,s*0.33-legKick,s*0.12,s*0.05);
  X.fillRect(-s*0.26,s*0.32-legKick+tickleKick,s*0.14,s*0.05);
  X.fillRect(-s*0.13,s*0.32+legKick-tickleKick,s*0.14,s*0.05);

  // Head
  X.fillStyle=f.pal.body;
  X.shadowColor=f.pal.body;X.shadowBlur=8;
  X.beginPath();
  X.ellipse(s*0.3,-s*0.15,s*0.25,s*0.22,0,0,Math.PI*2);
  X.fill();
  X.shadowBlur=0;

  // Ears
  var earWig=Math.sin(f.earPhase)*2*(1+f.tickle);
  X.fillStyle=f.pal.body;
  // Left ear
  X.beginPath();X.moveTo(s*0.18,-s*0.3);X.lineTo(s*0.12+earWig,-s*0.55);X.lineTo(s*0.28,-s*0.32);X.fill();
  // Right ear
  X.beginPath();X.moveTo(s*0.38,-s*0.3);X.lineTo(s*0.44-earWig,-s*0.55);X.lineTo(s*0.32,-s*0.32);X.fill();
  // Inner ears
  X.fillStyle=f.pal.accent;
  X.beginPath();X.moveTo(s*0.19,-s*0.32);X.lineTo(s*0.14+earWig,-s*0.48);X.lineTo(s*0.26,-s*0.33);X.fill();
  X.beginPath();X.moveTo(s*0.37,-s*0.32);X.lineTo(s*0.42-earWig,-s*0.48);X.lineTo(s*0.33,-s*0.33);X.fill();

  // Muzzle
  X.fillStyle=f.pal.belly;
  X.beginPath();
  X.ellipse(s*0.42,-s*0.12,s*0.12,s*0.1,0,0,Math.PI*2);
  X.fill();

  // Snout
  X.fillStyle=f.pal.body;
  X.beginPath();
  X.ellipse(s*0.48,-s*0.13,s*0.06,s*0.05,-0.2,0,Math.PI*2);
  X.fill();

  // Nose
  X.fillStyle='#222';
  X.beginPath();X.arc(s*0.52,-s*0.14,s*0.03,0,Math.PI*2);X.fill();

  // Mouth
  if(f.state==='laughing'||f.tickle>0.6){
    // Big open mouth laugh
    X.fillStyle='#cc4466';
    X.beginPath();
    X.ellipse(s*0.42,-s*0.06,s*0.08,s*0.06+f.tickle*s*0.04,0,0,Math.PI);
    X.fill();
    X.fillStyle='#ff6688';
    X.beginPath();X.arc(s*0.42,-s*0.06,s*0.04,0,Math.PI);X.fill();
  } else {
    // Closed smile
    X.strokeStyle='#444';X.lineWidth=1;
    X.beginPath();X.arc(s*0.42,-s*0.08,s*0.04,0.2,Math.PI-0.2);X.stroke();
  }

  // Eyes
  var eyeY=-s*0.2;
  var eyeL=s*0.24,eyeR=s*0.36;
  if(f.blink>0){
    // Closed
    X.strokeStyle=f.pal.eye;X.lineWidth=2;
    X.beginPath();X.moveTo(eyeL-s*0.04,eyeY);X.lineTo(eyeL+s*0.04,eyeY);X.stroke();
    X.beginPath();X.moveTo(eyeR-s*0.04,eyeY);X.lineTo(eyeR+s*0.04,eyeY);X.stroke();
  } else if(f.state==='laughing'){
    // Happy squint ^_^
    X.strokeStyle=f.pal.eye;X.lineWidth=2;
    X.beginPath();X.arc(eyeL,eyeY+s*0.02,s*0.04,Math.PI+0.3,Math.PI*2-0.3);X.stroke();
    X.beginPath();X.arc(eyeR,eyeY+s*0.02,s*0.04,Math.PI+0.3,Math.PI*2-0.3);X.stroke();
  } else {
    // Neon glowing eyes
    var eyeR2=s*0.04;
    // Glow
    var eg=X.createRadialGradient(eyeL,eyeY,0,eyeL,eyeY,eyeR2*3);
    eg.addColorStop(0,f.pal.glow+'0.3)');eg.addColorStop(1,'transparent');
    X.fillStyle=eg;X.beginPath();X.arc(eyeL,eyeY,eyeR2*3,0,Math.PI*2);X.fill();
    eg=X.createRadialGradient(eyeR,eyeY,0,eyeR,eyeY,eyeR2*3);
    eg.addColorStop(0,f.pal.glow+'0.3)');eg.addColorStop(1,'transparent');
    X.fillStyle=eg;X.beginPath();X.arc(eyeR,eyeY,eyeR2*3,0,Math.PI*2);X.fill();
    // Eye
    X.fillStyle=f.pal.eye;
    X.shadowColor=f.pal.eye;X.shadowBlur=10;
    X.beginPath();X.arc(eyeL,eyeY,eyeR2,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(eyeR,eyeY,eyeR2,0,Math.PI*2);X.fill();
    // Pupil
    X.fillStyle='#111';X.shadowBlur=0;
    X.beginPath();X.arc(eyeL,eyeY,eyeR2*0.45,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(eyeR,eyeY,eyeR2*0.45,0,Math.PI*2);X.fill();
    // Highlight
    X.fillStyle='#fff';
    X.beginPath();X.arc(eyeL+eyeR2*0.3,eyeY-eyeR2*0.3,eyeR2*0.2,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(eyeR+eyeR2*0.3,eyeY-eyeR2*0.3,eyeR2*0.2,0,Math.PI*2);X.fill();
  }

  X.restore();

  // --- LASER EYES ---
  if(f.laser){
    var eyeWorldL,eyeWorldR;
    if(dir>0){
      eyeWorldL={x:fx+s*0.24,y:fy-s*0.2+breatheY};
      eyeWorldR={x:fx+s*0.36,y:fy-s*0.2+breatheY};
    } else {
      eyeWorldL={x:fx-s*0.24,y:fy-s*0.2+breatheY};
      eyeWorldR={x:fx-s*0.36,y:fy-s*0.2+breatheY};
    }
    var tgt=f.laserTarget;
    var laserAlpha=Math.min(1,f.laserTimer*3);

    X.strokeStyle=f.pal.laser;
    X.lineWidth=3;X.globalAlpha=laserAlpha*0.8;
    X.shadowColor=f.pal.laser;X.shadowBlur=15;
    X.beginPath();X.moveTo(eyeWorldL.x,eyeWorldL.y);X.lineTo(tgt.x,tgt.y);X.stroke();
    X.beginPath();X.moveTo(eyeWorldR.x,eyeWorldR.y);X.lineTo(tgt.x,tgt.y);X.stroke();

    // Impact glow
    var impGrd=X.createRadialGradient(tgt.x,tgt.y,0,tgt.x,tgt.y,25);
    impGrd.addColorStop(0,f.pal.glow+(laserAlpha*0.5)+')');
    impGrd.addColorStop(1,'transparent');
    X.fillStyle=impGrd;
    X.beginPath();X.arc(tgt.x,tgt.y,25,0,Math.PI*2);X.fill();

    // Core beam
    X.strokeStyle='rgba(255,255,255,'+laserAlpha*0.4+')';
    X.lineWidth=1;
    X.beginPath();X.moveTo(eyeWorldL.x,eyeWorldL.y);X.lineTo(tgt.x,tgt.y);X.stroke();
    X.beginPath();X.moveTo(eyeWorldR.x,eyeWorldR.y);X.lineTo(tgt.x,tgt.y);X.stroke();

    X.shadowBlur=0;X.globalAlpha=1;
  }
}

// --- DRAW SCENE ---
function drawScene(now){
  // Dark gradient sky
  var grd=X.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,'#06000f');grd.addColorStop(0.5,'#0a0018');grd.addColorStop(1,'#080012');
  X.fillStyle=grd;X.fillRect(0,0,W,H);

  // Stars
  var seed=77;
  for(var i=0;i<40;i++){
    seed=(seed*1103515245+12345)&0x7fffffff;
    var sx=seed%W;seed=(seed*1103515245+12345)&0x7fffffff;
    var sy=seed%(H*0.6);
    var twinkle=Math.sin(now/1000+i*2.7)*0.3+0.5;
    X.fillStyle='rgba(255,220,255,'+twinkle*0.3+')';
    X.beginPath();X.arc(sx,sy,0.8+twinkle,0,Math.PI*2);X.fill();
  }

  // Neon aurora bands
  for(var b=0;b<3;b++){
    var by=H*0.1+b*H*0.12;
    var wave=Math.sin(now/4000+b*2)*H*0.05;
    var colors=['rgba(0,255,150,0.015)','rgba(100,0,255,0.012)','rgba(255,0,100,0.01)'];
    X.fillStyle=colors[b];
    X.beginPath();
    X.moveTo(0,by+wave);
    for(var bx=0;bx<W;bx+=20){
      X.lineTo(bx,by+wave+Math.sin(bx*0.005+now/2000+b)*20);
    }
    X.lineTo(W,by+60+wave);X.lineTo(0,by+60+wave);X.fill();
  }

  // Ground
  groundY=getGroundY();
  var ggrd=X.createLinearGradient(0,groundY-20,0,H);
  ggrd.addColorStop(0,'#0a0015');ggrd.addColorStop(1,'#050008');
  X.fillStyle=ggrd;X.fillRect(0,groundY-5,W,H-groundY+5);

  // Neon grass tufts
  for(var gx=0;gx<W;gx+=8){
    var gh=3+Math.sin(gx*0.3+now/2000)*2;
    var ga=0.08+Math.sin(gx*0.7)*0.04;
    X.strokeStyle='rgba(0,255,100,'+ga+')';
    X.lineWidth=1.5;
    X.beginPath();X.moveTo(gx,groundY);X.lineTo(gx+Math.sin(now/1500+gx)*2,groundY-gh);X.stroke();
  }

  // Ground glow line
  X.strokeStyle='rgba(100,0,255,0.08)';X.lineWidth=2;
  X.beginPath();X.moveTo(0,groundY);X.lineTo(W,groundY);X.stroke();
}

function drawParticles(){
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    var a=p.life/p.maxLife;
    X.fillStyle=p.color;X.globalAlpha=a;
    if(p.type==='star'){
      // 4-point star
      X.save();X.translate(p.x,p.y);X.rotate(p.life*5);
      X.beginPath();
      for(var j=0;j<4;j++){
        var ang=(j/4)*Math.PI*2;
        X.lineTo(Math.cos(ang)*p.r*a,Math.sin(ang)*p.r*a);
        var ang2=ang+Math.PI/4;
        X.lineTo(Math.cos(ang2)*p.r*0.3*a,Math.sin(ang2)*p.r*0.3*a);
      }
      X.closePath();X.fill();X.restore();
    } else {
      X.beginPath();X.arc(p.x,p.y,p.r*a,0,Math.PI*2);X.fill();
    }
  }
  X.globalAlpha=1;
}

// --- ROBOT FOX ---
var roboFox={
  x:W*0.5,y:0,
  dir:1,vx:0,
  size:90,
  walkTimer:0,walkPhase:0,
  stompTimer:0,stomping:false,stompFoot:0,
  stompCooldown:0,
  eyeGlow:0,eyePulse:0,
  reactorPulse:0,
  shakeX:0,shakeY:0,shakeDamp:0,
  sparks:[],
  jawOpen:0,
  state:'walk' // walk, stomp, idle
};
roboFox.y=getGroundY()-roboFox.size*0.35;

function updateRoboFox(dt,now){
  var r=roboFox;
  r.eyePulse+=dt*6;
  r.reactorPulse+=dt*4;
  r.eyeGlow=0.6+Math.sin(r.eyePulse)*0.4;

  // Shake decay
  if(r.shakeDamp>0){
    r.shakeX=(Math.random()-.5)*r.shakeDamp*12;
    r.shakeY=(Math.random()-.5)*r.shakeDamp*8;
    r.shakeDamp=Math.max(0,r.shakeDamp-dt*3);
  } else {r.shakeX=0;r.shakeY=0;}

  // Walk
  r.walkPhase+=dt*2.5;
  if(r.state==='walk'){
    r.vx=r.dir*18;
    r.x+=r.vx*dt;
    // Boundary
    if(r.x<r.size*1.2){r.x=r.size*1.2;r.dir=1;}
    if(r.x>W-r.size*1.2){r.x=W-r.size*1.2;r.dir=-1;}
    // Random stomp
    r.stompCooldown-=dt;
    if(r.stompCooldown<=0&&Math.random()<0.008){
      r.state='stomp';r.stompTimer=0.6;r.stomping=true;
      r.stompFoot=Math.random()<0.5?0:1;
      r.stompCooldown=3+Math.random()*4;
    }
  }
  if(r.state==='stomp'){
    r.vx*=0.8;
    r.stompTimer-=dt;
    // Impact at halfway
    if(r.stompTimer<0.3&&r.stomping){
      r.stomping=false;
      r.shakeDamp=1;
      // Spawn ground sparks
      var sx=r.x+(r.stompFoot===0?-r.size*0.25:r.size*0.25)*r.dir;
      for(var sp=0;sp<12;sp++){
        var ang=-Math.PI/2+(Math.random()-.5)*2.5;
        var spd=50+Math.random()*120;
        r.sparks.push({x:sx,y:getGroundY(),vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd*0.7,
          life:0.4+Math.random()*0.4,maxLife:0.8,r:1.5+Math.random()*2,
          color:Math.random()<0.5?'#ff6600':'#ffcc00'});
      }
      // Scare nearby foxes
      for(var fi=0;fi<foxes.length;fi++){
        var f=foxes[fi];
        var ddx=f.x-r.x;
        if(Math.abs(ddx)<200&&f.grounded){
          f.jumpVy=-80-Math.random()*60;f.grounded=false;
          f.vx+=(ddx>0?1:-1)*(40+Math.random()*30);
        }
      }
    }
    if(r.stompTimer<=0) r.state='walk';
  }

  // Update sparks
  for(var i=r.sparks.length-1;i>=0;i--){
    var s=r.sparks[i];s.x+=s.vx*dt;s.y+=s.vy*dt;s.vy+=200*dt;
    s.life-=dt;if(s.life<=0) r.sparks.splice(i,1);
  }

  // Jaw idle animation
  r.jawOpen=r.state==='stomp'&&r.stompTimer<0.3?0.5:Math.sin(now/800)*0.05+0.05;
}

function drawRoboFox(now){
  var r=roboFox;
  var s=r.size;
  var fx=r.x+r.shakeX,fy=r.y+r.shakeY;
  var dir=r.dir;

  // Shadow
  X.fillStyle='rgba(0,0,0,0.3)';
  X.beginPath();X.ellipse(fx,getGroundY()+2,s*0.6,s*0.08,0,0,Math.PI*2);X.fill();

  X.save();
  X.translate(fx,fy);
  if(dir<0) X.scale(-1,1);

  // --- LEG PISTONS ---
  var legPhase=r.walkPhase;
  var stompDrop=r.state==='stomp'&&r.stompTimer<0.3?8:0;
  for(var leg=0;leg<2;leg++){
    var lx=leg===0?-s*0.22:s*0.22;
    var legOff=Math.sin(legPhase+(leg===0?0:Math.PI))*6;
    if(r.state==='stomp'&&leg===r.stompFoot) legOff=stompDrop;

    // Upper leg (piston housing)
    X.fillStyle='#555';
    X.fillRect(lx-s*0.06,s*0.05,s*0.12,s*0.22+legOff*0.5);
    // Piston rod
    X.fillStyle='#888';
    X.fillRect(lx-s*0.03,s*0.2,s*0.06,s*0.15+legOff*0.5);
    // Joint bolts
    X.fillStyle='#ff6600';
    X.beginPath();X.arc(lx,s*0.08,s*0.03,0,Math.PI*2);X.fill();
    // Foot plate
    X.fillStyle='#666';
    X.fillRect(lx-s*0.08,s*0.33+legOff*0.5,s*0.16,s*0.04);
    // Foot glow
    X.fillStyle='rgba(255,100,0,0.15)';
    X.fillRect(lx-s*0.1,s*0.35+legOff*0.5,s*0.2,s*0.02);
  }

  // --- BODY (armored hull) ---
  // Main body plate
  var bodyGrd=X.createLinearGradient(0,-s*0.1,0,s*0.15);
  bodyGrd.addColorStop(0,'#444');bodyGrd.addColorStop(0.5,'#333');bodyGrd.addColorStop(1,'#222');
  X.fillStyle=bodyGrd;
  X.beginPath();
  X.moveTo(-s*0.4,-s*0.05);
  X.lineTo(-s*0.35,-s*0.18);X.lineTo(s*0.2,-s*0.18);X.lineTo(s*0.35,-s*0.08);
  X.lineTo(s*0.35,s*0.1);X.lineTo(-s*0.38,s*0.1);
  X.closePath();X.fill();
  // Armor lines
  X.strokeStyle='#555';X.lineWidth=1;
  X.beginPath();X.moveTo(-s*0.3,0);X.lineTo(s*0.3,0);X.stroke();
  X.beginPath();X.moveTo(0,-s*0.18);X.lineTo(0,s*0.1);X.stroke();

  // Reactor core (glowing circle on body)
  var rGlow=0.3+Math.sin(r.reactorPulse)*0.2;
  var rcx=0,rcy=-s*0.04;
  var rcGrd=X.createRadialGradient(rcx,rcy,0,rcx,rcy,s*0.12);
  rcGrd.addColorStop(0,'rgba(255,100,0,'+rGlow+')');rcGrd.addColorStop(0.5,'rgba(255,50,0,'+(rGlow*0.4)+')');rcGrd.addColorStop(1,'transparent');
  X.fillStyle=rcGrd;X.beginPath();X.arc(rcx,rcy,s*0.12,0,Math.PI*2);X.fill();
  X.fillStyle='#ff6600';X.shadowColor='#ff6600';X.shadowBlur=10;
  X.beginPath();X.arc(rcx,rcy,s*0.04,0,Math.PI*2);X.fill();
  X.shadowBlur=0;

  // --- TAIL (mechanical, segmented) ---
  X.save();
  X.translate(-s*0.38,0);
  var tailSwing=Math.sin(now/800)*0.3;
  X.rotate(tailSwing);
  // Segments
  for(var seg=0;seg<4;seg++){
    var segX=-seg*s*0.12;
    X.fillStyle=seg%2===0?'#444':'#555';
    X.fillRect(segX-s*0.04,-s*0.03,s*0.1,s*0.06);
    // Joint
    X.fillStyle='#ff6600';
    X.beginPath();X.arc(segX-s*0.04,0,s*0.02,0,Math.PI*2);X.fill();
  }
  // Tail tip antenna
  X.fillStyle='#ff3300';X.shadowColor='#ff3300';X.shadowBlur=6;
  X.beginPath();X.arc(-4*s*0.12-s*0.02,0,s*0.025,0,Math.PI*2);X.fill();
  X.shadowBlur=0;
  X.restore();

  // --- HEAD ---
  var headGrd=X.createLinearGradient(s*0.2,-s*0.35,s*0.2,-s*0.1);
  headGrd.addColorStop(0,'#555');headGrd.addColorStop(1,'#333');
  X.fillStyle=headGrd;
  // Angular head shape
  X.beginPath();
  X.moveTo(s*0.1,-s*0.32);X.lineTo(s*0.45,-s*0.35);X.lineTo(s*0.55,-s*0.22);
  X.lineTo(s*0.5,-s*0.1);X.lineTo(s*0.1,-s*0.12);
  X.closePath();X.fill();
  // Chin plate
  X.fillStyle='#2a2a2a';
  X.beginPath();X.moveTo(s*0.2,-s*0.12);X.lineTo(s*0.5,-s*0.1);X.lineTo(s*0.45,-s*0.05);X.lineTo(s*0.2,-s*0.07);X.closePath();X.fill();

  // --- EARS (antenna fins) ---
  X.fillStyle='#555';
  // Left ear
  X.beginPath();X.moveTo(s*0.15,-s*0.32);X.lineTo(s*0.1,-s*0.55);X.lineTo(s*0.22,-s*0.33);X.fill();
  // Right ear
  X.beginPath();X.moveTo(s*0.35,-s*0.35);X.lineTo(s*0.38,-s*0.58);X.lineTo(s*0.42,-s*0.35);X.fill();
  // Ear tips glow
  X.fillStyle='#ff3300';X.shadowColor='#ff3300';X.shadowBlur=5;
  X.beginPath();X.arc(s*0.1,-s*0.55,s*0.015,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(s*0.38,-s*0.58,s*0.015,0,Math.PI*2);X.fill();
  X.shadowBlur=0;

  // --- JAW (opens on stomp) ---
  X.save();
  X.translate(s*0.45,-s*0.1);
  X.rotate(r.jawOpen);
  X.fillStyle='#2a2a2a';
  X.beginPath();X.moveTo(0,0);X.lineTo(s*0.12,s*0.02);X.lineTo(s*0.08,s*0.06);X.lineTo(-s*0.02,s*0.03);X.closePath();X.fill();
  // Teeth
  X.fillStyle='#888';
  for(var t=0;t<3;t++){
    X.fillRect(t*s*0.03+s*0.01,0,s*0.015,s*0.02);
  }
  X.restore();

  // --- EYES (red scanner) ---
  var eyeY=-s*0.24;
  var eyeL=s*0.22,eyeR2=s*0.38;
  // Visor strip
  X.fillStyle='rgba(30,0,0,0.8)';
  X.fillRect(s*0.14,eyeY-s*0.03,s*0.32,s*0.06);
  X.strokeStyle='#440000';X.lineWidth=1;
  X.strokeRect(s*0.14,eyeY-s*0.03,s*0.32,s*0.06);
  // Eye glow
  var eAlpha=r.eyeGlow;
  X.fillStyle='rgba(255,0,0,'+eAlpha*0.2+')';
  X.beginPath();X.arc(eyeL,eyeY,s*0.06,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(eyeR2,eyeY,s*0.06,0,Math.PI*2);X.fill();
  X.fillStyle='#ff0000';X.shadowColor='#ff0000';X.shadowBlur=12;
  X.beginPath();X.arc(eyeL,eyeY,s*0.025,0,Math.PI*2);X.fill();
  X.beginPath();X.arc(eyeR2,eyeY,s*0.025,0,Math.PI*2);X.fill();
  // Scanner sweep
  var scanX=s*0.14+Math.abs(Math.sin(now/400))*s*0.32;
  X.fillStyle='rgba(255,0,0,'+(eAlpha*0.15)+')';
  X.fillRect(scanX-s*0.02,eyeY-s*0.03,s*0.04,s*0.06);
  X.shadowBlur=0;

  X.restore();

  // --- SPARKS ---
  for(var i=0;i<r.sparks.length;i++){
    var sp=r.sparks[i];
    var sa=sp.life/sp.maxLife;
    X.fillStyle=sp.color;X.globalAlpha=sa;
    X.beginPath();X.arc(sp.x+r.shakeX,sp.y+r.shakeY,sp.r*sa,0,Math.PI*2);X.fill();
  }
  X.globalAlpha=1;
}

// --- MAIN LOOP ---
var lastTime=performance.now();
function loop(now){
  var dt=Math.min((now-lastTime)/1000,0.05);
  lastTime=now;
  update(dt,now);
  updateRoboFox(dt,now);

  // Apply screen shake from robot stomp
  X.save();
  X.translate(roboFox.shakeX,roboFox.shakeY);

  drawScene(now);

  // Sort foxes by Y for overlap, draw robot fox in order
  foxes.sort(function(a,b){return a.y-b.y;});
  var roboDrawn=false;
  for(var i=0;i<foxes.length;i++){
    if(!roboDrawn&&foxes[i].y>roboFox.y){drawRoboFox(now);roboDrawn=true;}
    drawFox(foxes[i],now);
  }
  if(!roboDrawn) drawRoboFox(now);

  drawParticles();
  X.restore();

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
