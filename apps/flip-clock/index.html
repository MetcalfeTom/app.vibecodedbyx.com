<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flip Clock</title>
<link rel="icon" href="https://emojicdn.elk.sh/🕐">
<meta property="og:title" content="Flip Clock">
<meta property="og:description" content="A mesmerizing flip clock with satisfying oof sounds every minute.">
<meta property="og:url" content="https://sloppy.live/flip-clock">
<meta property="og:image" content="https://sloppy.live/flip-clock/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Red+Hat+Mono:wght@300;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#1a1a2e;
  background-image:
    radial-gradient(ellipse at 50% 0%,#16213e 0%,transparent 60%),
    radial-gradient(circle at 20% 80%,rgba(15,52,96,0.3) 0%,transparent 50%),
    radial-gradient(circle at 80% 80%,rgba(15,52,96,0.3) 0%,transparent 50%);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  font-family:'Red Hat Mono',monospace;
  overflow:hidden;
  user-select:none
}

#clock{
  display:flex;
  align-items:center;
  gap:12px;
}

.group{
  display:flex;
  gap:8px;
}

.separator{
  display:flex;
  flex-direction:column;
  gap:16px;
  justify-content:center;
  padding:0 4px;
}
.separator .dot{
  width:14px;height:14px;
  border-radius:50%;
  background:#e94560;
  box-shadow:0 0 12px rgba(233,69,96,0.6);
  animation:pulse-dot 1s ease-in-out infinite alternate;
}
@keyframes pulse-dot{0%{opacity:0.4;transform:scale(0.8)}100%{opacity:1;transform:scale(1)}}

/* Flip tile */
.flip-tile{
  position:relative;
  width:100px;height:140px;
  perspective:400px;
}

.tile-inner{
  position:relative;
  width:100%;height:100%;
}

.tile-face{
  position:absolute;
  width:100%;
  height:50%;
  overflow:hidden;
  border-radius:8px;
  background:#0f3460;
  box-shadow:inset 0 0 20px rgba(0,0,0,0.4);
}

.tile-face .digit{
  font-family:'Bebas Neue',sans-serif;
  font-size:120px;
  line-height:140px;
  text-align:center;
  color:#e8e8e8;
  text-shadow:0 2px 4px rgba(0,0,0,0.3);
}

.tile-top{
  top:0;
  border-bottom:1.5px solid rgba(0,0,0,0.5);
  border-bottom-left-radius:0;
  border-bottom-right-radius:0;
}
.tile-top .digit{
  /* top half: digit aligned to top */
}

.tile-bottom{
  bottom:0;
  border-top:1.5px solid rgba(0,0,0,0.3);
  border-top-left-radius:0;
  border-top-right-radius:0;
}
.tile-bottom .digit{
  margin-top:-70px;
}

/* Hinge line */
.tile-inner::after{
  content:'';
  position:absolute;
  top:50%;left:0;
  width:100%;height:2px;
  background:rgba(0,0,0,0.6);
  z-index:10;
  transform:translateY(-1px);
}

/* Flipping cards */
.flip-top, .flip-bottom{
  position:absolute;
  width:100%;height:50%;
  overflow:hidden;
  border-radius:8px;
  z-index:20;
}

.flip-top{
  top:0;
  transform-origin:bottom center;
  border-bottom-left-radius:0;
  border-bottom-right-radius:0;
  background:#0f3460;
  box-shadow:inset 0 0 20px rgba(0,0,0,0.4);
}
.flip-top .digit{
  font-family:'Bebas Neue',sans-serif;
  font-size:120px;
  line-height:140px;
  text-align:center;
  color:#e8e8e8;
  text-shadow:0 2px 4px rgba(0,0,0,0.3);
}

.flip-bottom{
  bottom:0;
  transform-origin:top center;
  transform:rotateX(90deg);
  border-top-left-radius:0;
  border-top-right-radius:0;
  background:#0f3460;
  box-shadow:inset 0 0 20px rgba(0,0,0,0.4);
}
.flip-bottom .digit{
  font-family:'Bebas Neue',sans-serif;
  font-size:120px;
  line-height:140px;
  text-align:center;
  color:#e8e8e8;
  text-shadow:0 2px 4px rgba(0,0,0,0.3);
  margin-top:-70px;
}

/* Animations */
.flipping .flip-top{
  animation:flipDown 0.5s ease-in forwards;
}
.flipping .flip-bottom{
  animation:flipUp 0.5s 0.25s ease-out forwards;
}
@keyframes flipDown{
  0%{transform:rotateX(0deg);background:#0f3460}
  100%{transform:rotateX(-90deg);background:#0a2647}
}
@keyframes flipUp{
  0%{transform:rotateX(90deg);background:#0a2647}
  100%{transform:rotateX(0deg);background:#0f3460}
}

/* Shine on flip */
.flipping .flip-top::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(to bottom,rgba(255,255,255,0.15),transparent);
  animation:shine 0.5s ease-out;
}
@keyframes shine{0%{opacity:1}100%{opacity:0}}

/* Shadow under flipping tile */
.flipping .tile-bottom::before{
  content:'';position:absolute;inset:0;
  background:rgba(0,0,0,0.2);
  animation:shadow-fade 0.6s ease-out forwards;
  z-index:5;border-radius:inherit;
}
@keyframes shadow-fade{0%{opacity:0}30%{opacity:1}100%{opacity:0}}

/* Date and label */
#date-display{
  margin-top:40px;
  color:rgba(232,232,232,0.4);
  font-size:14px;
  font-weight:300;
  letter-spacing:6px;
  text-transform:uppercase;
}

#period{
  font-family:'Bebas Neue',sans-serif;
  font-size:32px;
  color:#e94560;
  text-shadow:0 0 10px rgba(233,69,96,0.4);
  margin-left:12px;
  align-self:flex-end;
  padding-bottom:8px;
}

/* Sound toggle */
#sound-toggle{
  position:fixed;
  bottom:20px;
  right:20px;
  background:rgba(15,52,96,0.6);
  border:1px solid rgba(233,69,96,0.3);
  color:#e8e8e8;
  font-family:'Red Hat Mono',monospace;
  font-size:13px;
  padding:8px 14px;
  border-radius:8px;
  cursor:pointer;
  transition:all 0.2s;
  backdrop-filter:blur(8px);
}
#sound-toggle:hover{background:rgba(15,52,96,0.9);border-color:#e94560}

/* Back link */
#back{
  position:fixed;
  bottom:20px;
  left:20px;
  color:rgba(232,232,232,0.3);
  font-size:12px;
  text-decoration:none;
  font-family:'Red Hat Mono',monospace;
  letter-spacing:2px;
}
#back:hover{color:rgba(232,232,232,0.6)}

/* Ambient particles */
.particle{
  position:fixed;
  width:2px;height:2px;
  background:rgba(233,69,96,0.3);
  border-radius:50%;
  pointer-events:none;
  animation:float-up linear infinite;
}
@keyframes float-up{
  0%{transform:translateY(100vh) scale(1);opacity:0}
  10%{opacity:1}
  90%{opacity:1}
  100%{transform:translateY(-20px) scale(0);opacity:0}
}

/* Mobile */
@media(max-width:700px){
  .flip-tile{width:60px;height:84px}
  .tile-face .digit,.flip-top .digit,.flip-bottom .digit{font-size:72px;line-height:84px}
  .tile-bottom .digit,.flip-bottom .digit{margin-top:-42px}
  .tile-inner::after{top:50%}
  #clock{gap:6px}
  .group{gap:4px}
  .separator .dot{width:8px;height:8px}
  .separator{gap:10px}
  #period{font-size:20px;padding-bottom:4px;margin-left:6px}
  #date-display{font-size:11px;letter-spacing:3px;margin-top:24px}
  @keyframes flipDown{0%{transform:rotateX(0deg)}100%{transform:rotateX(-90deg)}}
  @keyframes flipUp{0%{transform:rotateX(90deg)}100%{transform:rotateX(0deg)}}
}
@media(max-width:400px){
  .flip-tile{width:46px;height:64px}
  .tile-face .digit,.flip-top .digit,.flip-bottom .digit{font-size:56px;line-height:64px}
  .tile-bottom .digit,.flip-bottom .digit{margin-top:-32px}
  #period{font-size:16px}
}
</style>
</head>
<body>

<div id="clock">
  <div class="group">
    <div class="flip-tile" id="h1"></div>
    <div class="flip-tile" id="h2"></div>
  </div>
  <div class="separator"><div class="dot"></div><div class="dot"></div></div>
  <div class="group">
    <div class="flip-tile" id="m1"></div>
    <div class="flip-tile" id="m2"></div>
  </div>
  <div class="separator"><div class="dot"></div><div class="dot"></div></div>
  <div class="group">
    <div class="flip-tile" id="s1"></div>
    <div class="flip-tile" id="s2"></div>
  </div>
  <div id="period">AM</div>
</div>

<div id="date-display"></div>

<button id="sound-toggle">🔊 Sound ON</button>

<script>
// Audio context for oof sound
let audioCtx = null;
let soundEnabled = true;

function initAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  }
}

function playOof() {
  if (!soundEnabled || !audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();

  const now = audioCtx.currentTime;

  // "Oof" = a low thud with a slight pitch drop + mechanical click

  // Mechanical click
  const clickOsc = audioCtx.createOscillator();
  const clickGain = audioCtx.createGain();
  clickOsc.type = 'square';
  clickOsc.frequency.setValueAtTime(1200, now);
  clickOsc.frequency.exponentialRampToValueAtTime(200, now + 0.03);
  clickGain.gain.setValueAtTime(0.15, now);
  clickGain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
  clickOsc.connect(clickGain);
  clickGain.connect(audioCtx.destination);
  clickOsc.start(now);
  clickOsc.stop(now + 0.05);

  // Low thud "oof"
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(180, now + 0.02);
  osc.frequency.exponentialRampToValueAtTime(60, now + 0.25);
  gain.gain.setValueAtTime(0, now);
  gain.gain.linearRampToValueAtTime(0.35, now + 0.03);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
  filter.type = 'lowpass';
  filter.frequency.setValueAtTime(400, now);
  osc.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(now + 0.02);
  osc.stop(now + 0.4);

  // Subtle noise burst for texture
  const bufSize = audioCtx.sampleRate * 0.06;
  const noiseBuf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = noiseBuf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
  const noise = audioCtx.createBufferSource();
  noise.buffer = noiseBuf;
  const noiseGain = audioCtx.createGain();
  const noiseFilter = audioCtx.createBiquadFilter();
  noiseFilter.type = 'bandpass';
  noiseFilter.frequency.setValueAtTime(300, now);
  noiseFilter.Q.setValueAtTime(2, now);
  noiseGain.gain.setValueAtTime(0.12, now);
  noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.06);
  noise.connect(noiseFilter);
  noiseFilter.connect(noiseGain);
  noiseGain.connect(audioCtx.destination);
  noise.start(now);
}

// Lighter tick for seconds
function playTick() {
  if (!soundEnabled || !audioCtx) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const now = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(800, now);
  osc.frequency.exponentialRampToValueAtTime(400, now + 0.03);
  gain.gain.setValueAtTime(0.04, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + 0.04);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now + 0.05);
}

// Sound toggle
const toggleBtn = document.getElementById('sound-toggle');
toggleBtn.addEventListener('click', () => {
  initAudio();
  soundEnabled = !soundEnabled;
  toggleBtn.textContent = soundEnabled ? '🔊 Sound ON' : '🔇 Sound OFF';
});

// Unlock audio on first interaction
document.addEventListener('click', initAudio, { once: true });
document.addEventListener('touchstart', initAudio, { once: true });

// === Flip tile rendering ===
function buildTile(el) {
  el.innerHTML = `
    <div class="tile-inner">
      <div class="tile-face tile-top"><div class="digit">0</div></div>
      <div class="tile-face tile-bottom"><div class="digit">0</div></div>
    </div>`;
  el._current = '0';
}

const tiles = {};
['h1','h2','m1','m2','s1','s2'].forEach(id => {
  const el = document.getElementById(id);
  buildTile(el);
  tiles[id] = el;
});

function setTile(id, val, animate = true) {
  const el = tiles[id];
  if (el._current === val) return false;

  const oldVal = el._current;
  el._current = val;

  if (!animate) {
    el.querySelector('.tile-top .digit').textContent = val;
    el.querySelector('.tile-bottom .digit').textContent = val;
    return false;
  }

  // Create flip animation cards
  const inner = el.querySelector('.tile-inner');

  // Remove old flip cards
  inner.querySelectorAll('.flip-top,.flip-bottom').forEach(x => x.remove());
  inner.classList.remove('flipping');

  // Flip top shows OLD value, flips down
  const flipTop = document.createElement('div');
  flipTop.className = 'flip-top';
  flipTop.innerHTML = `<div class="digit">${oldVal}</div>`;

  // Flip bottom shows NEW value, flips up
  const flipBottom = document.createElement('div');
  flipBottom.className = 'flip-bottom';
  flipBottom.innerHTML = `<div class="digit">${val}</div>`;

  // Update static bottom to new value immediately (revealed as top flips)
  el.querySelector('.tile-bottom .digit').textContent = val;

  inner.appendChild(flipTop);
  inner.appendChild(flipBottom);

  // Force reflow
  void inner.offsetWidth;
  inner.classList.add('flipping');

  // After animation, update static top and clean up
  setTimeout(() => {
    el.querySelector('.tile-top .digit').textContent = val;
    inner.querySelectorAll('.flip-top,.flip-bottom').forEach(x => x.remove());
    inner.classList.remove('flipping');
  }, 800);

  return true;
}

// === Clock update ===
let lastMin = -1;
let lastSec = -1;

function updateClock() {
  const now = new Date();
  let h = now.getHours();
  const m = now.getMinutes();
  const s = now.getSeconds();

  const period = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;

  const hStr = String(h).padStart(2, '0');
  const mStr = String(m).padStart(2, '0');
  const sStr = String(s).padStart(2, '0');

  document.getElementById('period').textContent = period;

  const isFirstRun = lastSec === -1;

  const flipped = [
    setTile('h1', hStr[0], !isFirstRun),
    setTile('h2', hStr[1], !isFirstRun),
    setTile('m1', mStr[0], !isFirstRun),
    setTile('m2', mStr[1], !isFirstRun),
    setTile('s1', sStr[0], !isFirstRun),
    setTile('s2', sStr[1], !isFirstRun),
  ];

  // Play oof on minute change
  if (!isFirstRun && m !== lastMin) {
    playOof();
  } else if (!isFirstRun && s !== lastSec) {
    playTick();
  }

  lastMin = m;
  lastSec = s;

  // Update date
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('date-display').textContent =
    `${days[now.getDay()]}  •  ${months[now.getMonth()]} ${now.getDate()}, ${now.getFullYear()}`;
}

updateClock();
setInterval(updateClock, 200);

// === Ambient particles ===
function spawnParticle() {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left = Math.random() * 100 + 'vw';
  p.style.animationDuration = (8 + Math.random() * 12) + 's';
  p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
  p.style.opacity = 0.2 + Math.random() * 0.3;
  document.body.appendChild(p);
  p.addEventListener('animationend', () => p.remove());
}
for (let i = 0; i < 15; i++) {
  setTimeout(spawnParticle, Math.random() * 5000);
}
setInterval(spawnParticle, 800);
</script>
</body>
</html>
