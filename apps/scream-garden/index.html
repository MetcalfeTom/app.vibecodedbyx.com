<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Scream Garden</title>
<meta name="description" content="Three houseplants. Three voices. Don't let them dry out — or they'll let you know.">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%AA%B4">
<meta property="og:title" content="Scream Garden">
<meta property="og:description" content="Three houseplants. Three voices. Water them before they start to scream.">
<meta property="og:url" content="https://sloppy.live/scream-garden">
<meta property="og:image" content="https://image.pollinations.ai/prompt/three%20cartoon%20houseplants%20with%20wide%20eyes%20and%20open%20mouths%20screaming%20in%20terracotta%20pots%2C%20dark%20moody%20greenhouse%2C%20bioluminescent%20glow%2C%20comic%20style?width=1200&height=630&seed=313&nologo=true">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,500&family=Space+Mono:wght@400;700&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #050a08;
    --moss-1: #0a1410;
    --moss-2: #0f1d17;
    --moss-3: #16332a;
    --stem: #8ed26a;
    --leaf: #5fa343;
    --leaf-dark: #2c5824;
    --cream: #f3eccf;
    --bone: #d8d0b0;
    --dim: #8b9183;
    --terra-1: #b86340;
    --terra-2: #8c4327;
    --terra-3: #5d2916;
    --hydro-high: #5fdcff;
    --hydro-mid: #f5c453;
    --hydro-low: #ff5a64;
    --panic: #ff4670;
  }
  * { box-sizing: border-box; }
  html { font-size: 100%; }
  body {
    margin: 0;
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 18% 12%, rgba(95,163,67,0.16), transparent 55%),
      radial-gradient(ellipse at 82% 88%, rgba(95,220,255,0.10), transparent 55%),
      radial-gradient(ellipse at 50% 60%, rgba(255,70,112,0.06), transparent 60%),
      linear-gradient(180deg, var(--moss-1), var(--void) 70%);
    color: var(--cream);
    font-family: 'Space Mono', ui-monospace, monospace;
    padding: 1rem 0.85rem 1.5rem;
    overscroll-behavior: none;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    background: repeating-linear-gradient(0deg, rgba(255,255,255,0.018) 0 1px, transparent 1px 3px);
    mix-blend-mode: screen;
  }
  body.panic::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(255,70,112,0.18));
    animation: panicPulse 0.6s ease-in-out infinite;
  }
  @keyframes panicPulse {
    0%, 100% { opacity: 0.65; }
    50% { opacity: 1; }
  }
  main {
    position: relative;
    z-index: 2;
    max-width: 62rem;
    margin: 0 auto;
    display: grid;
    gap: 1.1rem;
  }
  header.head {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    flex-wrap: wrap;
    padding: 0.1rem 0.2rem 0.65rem;
    border-bottom: 1px dashed rgba(95,163,67,0.25);
  }
  .stamp {
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--stem);
    padding: 0.25rem 0.5rem;
    border: 1px solid rgba(95,163,67,0.35);
    border-radius: 0.2rem;
    background: rgba(95,163,67,0.06);
  }
  h1 {
    font-family: 'Lilita One', display;
    font-weight: 400;
    font-size: clamp(2.4rem, 6.5vw, 4.2rem);
    line-height: 0.95;
    margin: 0;
    letter-spacing: 0.02em;
    color: var(--cream);
    text-shadow: 0 0 0 var(--void),
      -2px 2px 0 var(--leaf),
      -4px 4px 0 var(--leaf-dark),
      -6px 6px 18px rgba(255,70,112,0.4);
  }
  h1 .scr {
    color: var(--panic);
    font-style: italic;
    -webkit-text-stroke: 1px var(--cream);
  }
  .tagline {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: clamp(0.95rem, 2vw, 1.15rem);
    color: var(--dim);
    margin-left: auto;
  }
  .tagline em { color: var(--panic); }

  .garden {
    display: grid;
    grid-template-columns: 1fr;
    gap: 1rem;
  }
  @media (min-width: 44rem) {
    .garden { grid-template-columns: repeat(3, 1fr); }
  }

  .plant-card {
    position: relative;
    background: linear-gradient(180deg, rgba(22,51,42,0.7), rgba(10,20,16,0.85));
    border: 1.5px solid rgba(95,163,67,0.25);
    border-radius: 0.8rem;
    padding: 1rem 0.9rem 1rem;
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.4), 0 12px 30px rgba(0,0,0,0.4);
    overflow: hidden;
    display: grid;
    gap: 0.6rem;
    cursor: pointer;
    transition: transform 0.18s ease, border-color 0.25s ease, box-shadow 0.25s ease;
  }
  .plant-card:focus-visible { outline: 3px solid var(--cream); outline-offset: 3px; }
  .plant-card:hover { border-color: var(--hydro-high); }
  .plant-card.thirsty { border-color: var(--hydro-mid); box-shadow: inset 0 0 0 1px rgba(0,0,0,0.4), 0 0 24px rgba(245,196,83,0.25); }
  .plant-card.parched { border-color: var(--hydro-low); box-shadow: inset 0 0 0 1px rgba(0,0,0,0.4), 0 0 26px rgba(255,90,100,0.45); }
  .plant-card.dead { opacity: 0.55; filter: saturate(0.4); cursor: default; }
  @keyframes shake {
    0%, 100% { transform: translate(0, 0) rotate(0); }
    20% { transform: translate(-3px, 1px) rotate(-1deg); }
    40% { transform: translate(3px, -1px) rotate(1deg); }
    60% { transform: translate(-2px, 2px) rotate(-0.6deg); }
    80% { transform: translate(2px, -1px) rotate(0.6deg); }
  }
  .plant-card.screaming .plant-svg { animation: shake 0.18s ease-in-out infinite; }
  .plant-name {
    font-family: 'Lilita One', sans-serif;
    font-size: 1.05rem;
    color: var(--cream);
    letter-spacing: 0.1em;
    text-align: center;
    text-transform: uppercase;
  }
  .plant-card.dead .plant-name::after { content: ' †'; color: var(--dim); }
  .latin {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 0.8rem;
    color: var(--dim);
    text-align: center;
    margin-top: -0.4rem;
  }
  .svg-stage {
    aspect-ratio: 1 / 1;
    width: 100%;
    display: flex;
    align-items: end;
    justify-content: center;
    background: radial-gradient(ellipse at 50% 90%, rgba(95,163,67,0.12), transparent 60%);
    border-radius: 0.6rem;
  }
  .plant-svg {
    width: 100%;
    height: 100%;
    display: block;
  }

  .meter {
    position: relative;
    height: 0.85rem;
    background: rgba(10,20,16,0.7);
    border: 1px solid rgba(95,163,67,0.3);
    border-radius: 1rem;
    overflow: hidden;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.4);
  }
  .meter-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--hydro-high), var(--stem));
    border-radius: 1rem;
    width: 100%;
    transition: width 0.18s ease, background 0.3s ease, box-shadow 0.3s ease;
    box-shadow: 0 0 10px rgba(95,220,255,0.4);
  }
  .meter-fill.mid { background: linear-gradient(90deg, var(--hydro-mid), var(--terra-1)); box-shadow: 0 0 12px rgba(245,196,83,0.5); }
  .meter-fill.low { background: linear-gradient(90deg, var(--hydro-low), var(--panic)); box-shadow: 0 0 16px rgba(255,90,100,0.7); animation: meterPulse 0.8s ease-in-out infinite; }
  .meter-fill.empty { width: 0 !important; }
  @keyframes meterPulse {
    0%, 100% { opacity: 0.85; }
    50% { opacity: 1; }
  }
  .meter-label {
    position: absolute;
    inset: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 0.5rem;
    font-family: 'VT323', monospace;
    font-size: 0.95rem;
    color: var(--cream);
    text-shadow: 0 0 4px rgba(0,0,0,0.85);
    letter-spacing: 0.06em;
    pointer-events: none;
  }
  .water-btn {
    font-family: 'Lilita One', sans-serif;
    font-size: 0.8rem;
    letter-spacing: 0.16em;
    padding: 0.5rem 0.6rem;
    border-radius: 0.4rem;
    border: 1.5px solid var(--hydro-high);
    background: rgba(95,220,255,0.12);
    color: var(--hydro-high);
    cursor: pointer;
    text-transform: uppercase;
    min-height: 2.5rem;
    transition: all 0.16s ease;
  }
  .water-btn:hover { background: rgba(95,220,255,0.24); box-shadow: 0 0 14px rgba(95,220,255,0.4); }
  .water-btn:active { transform: translateY(1px); }
  .water-btn:focus-visible { outline: 3px solid var(--cream); outline-offset: 2px; }
  .water-btn:disabled {
    border-color: var(--dim);
    color: var(--dim);
    background: transparent;
    cursor: default;
  }
  .splash {
    position: absolute;
    pointer-events: none;
    font-family: 'Lilita One', sans-serif;
    font-size: 1.2rem;
    color: var(--hydro-high);
    opacity: 0;
    transform: translateY(0);
    transition: opacity 0.16s ease;
  }
  .splash.show {
    opacity: 1;
    transform: translateY(-1.5rem);
    transition: opacity 0.4s ease, transform 0.6s ease;
  }

  .ctrl-panel {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0.6rem;
    padding: 0.85rem;
    background: linear-gradient(180deg, rgba(22,51,42,0.6), rgba(10,20,16,0.8));
    border: 1px solid rgba(95,163,67,0.22);
    border-radius: 0.6rem;
  }
  @media (min-width: 36rem) {
    .ctrl-panel { grid-template-columns: 1fr 1fr 1fr 1fr; }
  }
  .stat {
    display: grid;
    gap: 0.1rem;
    padding: 0.45rem 0.65rem;
    background: rgba(10,20,16,0.55);
    border: 1px solid rgba(95,163,67,0.18);
    border-radius: 0.4rem;
  }
  .stat-key {
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.28em;
    color: var(--dim);
    text-transform: uppercase;
  }
  .stat-val {
    font-family: 'Lilita One', sans-serif;
    font-size: 1.25rem;
    color: var(--cream);
    letter-spacing: 0.06em;
  }
  .stat-val.warn { color: var(--hydro-mid); }
  .stat-val.panic { color: var(--panic); text-shadow: 0 0 12px rgba(255,70,112,0.5); }
  .btn {
    font-family: 'Lilita One', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 0.16em;
    padding: 0.7rem 0.6rem;
    border-radius: 0.5rem;
    border: 1.5px solid var(--bone);
    background: rgba(10,20,16,0.6);
    color: var(--bone);
    text-transform: uppercase;
    cursor: pointer;
    min-height: 2.75rem;
    transition: all 0.16s ease;
  }
  .btn:hover { border-color: var(--cream); color: var(--cream); }
  .btn:focus-visible { outline: 3px solid var(--hydro-high); outline-offset: 2px; }
  .btn.primary {
    background: var(--leaf);
    color: var(--moss-1);
    border-color: var(--stem);
  }
  .btn.primary:hover { background: var(--stem); color: var(--moss-1); }
  .toggle-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.55rem 0.7rem;
    background: rgba(10,20,16,0.55);
    border: 1px solid rgba(95,163,67,0.2);
    border-radius: 0.4rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    color: var(--dim);
    text-transform: uppercase;
    cursor: pointer;
    min-height: 2.75rem;
  }
  .toggle-row:hover { color: var(--cream); }
  .toggle-row input { display: none; }
  .toggle-row .pill {
    width: 2rem;
    height: 1rem;
    border-radius: 1rem;
    background: rgba(10,20,16,0.9);
    border: 1px solid rgba(95,163,67,0.4);
    position: relative;
    flex-shrink: 0;
  }
  .toggle-row .pill::after {
    content: '';
    position: absolute;
    top: 1px;
    left: 1px;
    width: 0.75rem;
    height: 0.75rem;
    border-radius: 50%;
    background: var(--dim);
    transition: all 0.2s ease;
  }
  .toggle-row input:checked + .pill { background: rgba(95,220,255,0.2); border-color: var(--hydro-high); }
  .toggle-row input:checked + .pill::after { left: 1rem; background: var(--hydro-high); box-shadow: 0 0 6px rgba(95,220,255,0.7); }

  .legend {
    font-family: 'Space Mono', monospace;
    font-size: 0.66rem;
    letter-spacing: 0.06em;
    color: var(--dim);
    line-height: 1.55;
    text-align: center;
    padding-top: 0.4rem;
  }
  .legend kbd {
    background: rgba(10,20,16,0.7);
    border: 1px solid rgba(95,163,67,0.3);
    border-radius: 0.2rem;
    padding: 0.05rem 0.35rem;
    color: var(--cream);
  }

  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%) translateY(1rem);
    background: rgba(5,10,8,0.92);
    color: var(--cream);
    font-family: 'Lilita One', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.1em;
    padding: 0.55rem 1.1rem;
    border: 1.5px solid var(--cream);
    border-radius: 0.4rem;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.18s ease, transform 0.3s ease;
    z-index: 50;
    text-transform: uppercase;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.dead { color: var(--panic); border-color: var(--panic); }
  .toast.win { color: var(--stem); border-color: var(--stem); }

  .visually-hidden {
    position: absolute;
    width: 1px;
    height: 1px;
    margin: -1px;
    padding: 0;
    overflow: hidden;
    clip: rect(0,0,0,0);
    border: 0;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: 0.001ms !important;
      transition-duration: 0.001ms !important;
    }
    .plant-card.screaming .plant-svg { animation: none; }
  }
</style>
</head>
<body>
<main>
  <header class="head">
    <span class="stamp">GREENHOUSE №7 · CARE LOG</span>
    <h1>scream<span class="scr">·garden</span></h1>
    <p class="tagline">they get thirsty. <em>they let you know.</em></p>
  </header>

  <section class="garden" aria-label="Three houseplants">
    <article class="plant-card" data-id="sprout" tabindex="0" role="button" aria-label="Water Sprouty">
      <div class="plant-name">Sprouty</div>
      <div class="latin">Anxius cotyledon</div>
      <div class="svg-stage" aria-hidden="true">
        <svg class="plant-svg" id="svg-sprout" viewBox="0 0 200 220" preserveAspectRatio="xMidYEnd meet"></svg>
      </div>
      <div class="meter" role="meter" aria-valuemin="0" aria-valuemax="100" aria-valuenow="100" aria-label="Sprouty hydration" id="meter-sprout">
        <div class="meter-fill" id="meterFill-sprout"></div>
        <div class="meter-label"><span>HYDRO</span><span id="meterVal-sprout">100</span></div>
      </div>
      <button class="water-btn" data-water="sprout" type="button">💧 Water</button>
      <span class="splash" id="splash-sprout">+splash</span>
    </article>

    <article class="plant-card" data-id="cactus" tabindex="0" role="button" aria-label="Water Spike">
      <div class="plant-name">Spike</div>
      <div class="latin">Cactus grumblii</div>
      <div class="svg-stage" aria-hidden="true">
        <svg class="plant-svg" id="svg-cactus" viewBox="0 0 200 220" preserveAspectRatio="xMidYEnd meet"></svg>
      </div>
      <div class="meter" role="meter" aria-valuemin="0" aria-valuemax="100" aria-valuenow="100" aria-label="Spike hydration" id="meter-cactus">
        <div class="meter-fill" id="meterFill-cactus"></div>
        <div class="meter-label"><span>HYDRO</span><span id="meterVal-cactus">100</span></div>
      </div>
      <button class="water-btn" data-water="cactus" type="button">💧 Water</button>
      <span class="splash" id="splash-cactus">+splash</span>
    </article>

    <article class="plant-card" data-id="fern" tabindex="0" role="button" aria-label="Water Lord Frondsworth">
      <div class="plant-name">Lord Frondsworth</div>
      <div class="latin">Fronda dramaticus</div>
      <div class="svg-stage" aria-hidden="true">
        <svg class="plant-svg" id="svg-fern" viewBox="0 0 200 220" preserveAspectRatio="xMidYEnd meet"></svg>
      </div>
      <div class="meter" role="meter" aria-valuemin="0" aria-valuemax="100" aria-valuenow="100" aria-label="Lord Frondsworth hydration" id="meter-fern">
        <div class="meter-fill" id="meterFill-fern"></div>
        <div class="meter-label"><span>HYDRO</span><span id="meterVal-fern">100</span></div>
      </div>
      <button class="water-btn" data-water="fern" type="button">💧 Water</button>
      <span class="splash" id="splash-fern">+splash</span>
    </article>
  </section>

  <section class="ctrl-panel" aria-label="Garden controls">
    <div class="stat">
      <span class="stat-key">Day</span>
      <span class="stat-val" id="dayOut" aria-live="polite">1</span>
    </div>
    <div class="stat">
      <span class="stat-key">Alive</span>
      <span class="stat-val" id="aliveOut">3 / 3</span>
    </div>
    <div class="stat">
      <span class="stat-key">Best day</span>
      <span class="stat-val" id="bestOut">1</span>
    </div>
    <div class="stat">
      <span class="stat-key">Screams</span>
      <span class="stat-val" id="screamsOut">0</span>
    </div>
    <button class="btn primary" id="resetBtn" type="button">↻ Replant</button>
    <button class="btn" id="waterAllBtn" type="button">💧 Water all</button>
    <label class="toggle-row" for="soundToggle"><span>Sound</span><input type="checkbox" id="soundToggle" checked><span class="pill" aria-hidden="true"></span></label>
    <div class="legend"><kbd>1</kbd><kbd>2</kbd><kbd>3</kbd> water plant · <kbd>W</kbd> water all · <kbd>M</kbd> mute</div>
  </section>
</main>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
(function(){
  const $ = (id) => document.getElementById(id);
  const els = {
    dayOut: $('dayOut'),
    aliveOut: $('aliveOut'),
    bestOut: $('bestOut'),
    screamsOut: $('screamsOut'),
    resetBtn: $('resetBtn'),
    waterAllBtn: $('waterAllBtn'),
    soundToggle: $('soundToggle'),
    toast: $('toast'),
  };

  const BEST_KEY = 'scream-garden-best-day-v1';

  const PLANTS = [
    { id: 'sprout', name: 'Sprouty', decayPerSec: 1.6, threshold: 38, screamCooldown: 2.4, screamPitch: 720, voice: 'sprout' },
    { id: 'cactus', name: 'Spike',   decayPerSec: 0.7, threshold: 28, screamCooldown: 3.6, screamPitch: 360, voice: 'cactus' },
    { id: 'fern',   name: 'Lord Frondsworth', decayPerSec: 2.0, threshold: 45, screamCooldown: 2.0, screamPitch: 210, voice: 'fern' },
  ];

  // Per-plant runtime state
  const garden = PLANTS.map(p => ({
    ...p,
    hydration: 100,
    dead: false,
    screamingT: 0,
    sinceLastScream: Math.random() * 1.5,
    blinkT: Math.random() * 4,
    moodFlash: 0,
    card: null,
    fill: null,
    val: null,
    meter: null,
    btn: null,
    svg: null,
    mouthEl: null,
    leftEyeEl: null,
    rightEyeEl: null,
    aura: null,
    splash: null,
  }));

  const state = {
    playing: true,
    dayStart: performance.now(),
    bestDay: 1,
    screams: 0,
    sound: true,
  };

  try {
    const v = parseInt(localStorage.getItem(BEST_KEY), 10);
    if (!isNaN(v) && v > 0) state.bestDay = v;
  } catch (e) {}
  function saveBest() {
    try { localStorage.setItem(BEST_KEY, String(state.bestDay)); } catch (e) {}
  }
  els.bestOut.textContent = state.bestDay;

  // ---- SVG construction (three distinct plants) ----
  function svgNS() { return 'http://www.w3.org/2000/svg'; }
  function el(tag, attrs) {
    const e = document.createElementNS(svgNS(), tag);
    for (const k in attrs) e.setAttribute(k, attrs[k]);
    return e;
  }

  function buildPot(svg, x, y, w, h) {
    // Terracotta pot with rim, body, dirt
    const body = el('path', {
      d: `M ${x-w/2+6} ${y} L ${x+w/2-6} ${y} L ${x+w/2-14} ${y+h} L ${x-w/2+14} ${y+h} Z`,
      fill: 'url(#potBody)', stroke: '#3d1c0e', 'stroke-width': '2',
    });
    const rim = el('rect', { x: x-w/2, y: y-7, width: w, height: 11, rx: 2, fill: 'url(#potRim)', stroke: '#3d1c0e', 'stroke-width': '2' });
    const dirt = el('ellipse', { cx: x, cy: y-2, rx: w/2 - 4, ry: 4, fill: '#3a2614' });
    svg.appendChild(body);
    svg.appendChild(rim);
    svg.appendChild(dirt);
    // Highlight
    const hi = el('path', { d: `M ${x-w/2+10} ${y+5} L ${x-w/2+18} ${y+h-6}`, stroke: 'rgba(255,255,255,0.18)', 'stroke-width': '3', 'stroke-linecap': 'round', fill: 'none' });
    svg.appendChild(hi);
  }

  function buildDefs(svg) {
    const defs = el('defs', {});
    const potBody = el('linearGradient', { id: 'potBody', x1: '0%', y1: '0%', x2: '0%', y2: '100%' });
    potBody.appendChild(el('stop', { offset: '0%', 'stop-color': '#c97250' }));
    potBody.appendChild(el('stop', { offset: '60%', 'stop-color': '#a04e2e' }));
    potBody.appendChild(el('stop', { offset: '100%', 'stop-color': '#6b2c14' }));
    defs.appendChild(potBody);
    const potRim = el('linearGradient', { id: 'potRim', x1: '0%', y1: '0%', x2: '0%', y2: '100%' });
    potRim.appendChild(el('stop', { offset: '0%', 'stop-color': '#d68466' }));
    potRim.appendChild(el('stop', { offset: '100%', 'stop-color': '#8f4628' }));
    defs.appendChild(potRim);
    svg.appendChild(defs);
  }

  function eyeSet(svg, lx, ly, rx, ry, r) {
    const lwhite = el('circle', { cx: lx, cy: ly, r: r, fill: '#fbf8e8', stroke: '#1d2a17', 'stroke-width': 1.4 });
    const rwhite = el('circle', { cx: rx, cy: ry, r: r, fill: '#fbf8e8', stroke: '#1d2a17', 'stroke-width': 1.4 });
    const lpup = el('circle', { cx: lx, cy: ly, r: r * 0.45, fill: '#0a1410' });
    const rpup = el('circle', { cx: rx, cy: ry, r: r * 0.45, fill: '#0a1410' });
    svg.appendChild(lwhite); svg.appendChild(rwhite);
    svg.appendChild(lpup); svg.appendChild(rpup);
    return { lwhite, rwhite, lpup, rpup };
  }

  function buildSprout(plant) {
    const svg = plant.svg;
    svg.innerHTML = '';
    buildDefs(svg);
    buildPot(svg, 100, 165, 110, 50);
    // Stem
    const stem = el('path', { d: 'M 100 160 Q 96 130 100 110 Q 104 90 100 70', stroke: '#7eb346', 'stroke-width': 6, fill: 'none', 'stroke-linecap': 'round' });

    // Leaf vein highlights

    plant.mouthEl = mouth;
    // Cheek dot
    svg.appendChild(el('circle', { cx: 75, cy: 78, r: 3, fill: '#ff8aa8', opacity: 0.55 }));
    svg.appendChild(el('circle', { cx: 125, cy: 78, r: 3, fill: '#ff8aa8', opacity: 0.55 }));
  }

  function buildCactus(plant) {
    const svg = plant.svg;
    svg.innerHTML = '';
    buildDefs(svg);
    buildPot(svg, 100, 175, 120, 45);
    // Body (pear shape)
    const body = el('path', { d: 'M 70 170 Q 60 100 78 60 Q 100 30 122 60 Q 140 100 130 170 Z', fill: '#5e9c45', stroke: '#2a4f1c', 'stroke-width': 2.4 });
    svg.appendChild(body);
    // Vertical ribs
    [82, 100, 118].forEach(x => {
      svg.appendChild(el('path', { d: `M ${x} 60 Q ${x} 110 ${x} 165`, stroke: '#2c5824', 'stroke-width': 1.2, fill: 'none', opacity: 0.5 }));
    });
    // Side arm
    svg.appendChild(el('path', { d: 'M 130 110 Q 160 105 162 80 Q 162 65 152 65 Q 144 65 144 85 Q 144 100 130 105 Z', fill: '#6cab50', stroke: '#2a4f1c', 'stroke-width': 2.2 }));
    // Spikes — small radial lines
    const spikes = [
      [82,65,-1.2], [100,52,-1.6], [118,65,-2.0],
      [70,100,-0.5], [130,100,-2.6],
      [78,140,-0.4], [122,140,-2.7],
      [86,170,-0.7], [114,170,-2.4],
      [152,70,-1.5], [162,90,-2.0],
    ];
    spikes.forEach(([x, y, ang]) => {
      const x2 = x + Math.cos(ang) * 6;

    });
    // Flower on top
    const petals = [0, 1, 2, 3, 4].map(i => i * (Math.PI*2/5));
    petals.forEach(a => {
      const cx = 100 + Math.cos(a - Math.PI/2) * 9;
      const cy = 40 + Math.sin(a - Math.PI/2) * 9;
      svg.appendChild(el('circle', { cx, cy, r: 5, fill: '#ff7eaa', stroke: '#9a3060', 'stroke-width': 1 }));
    });
    svg.appendChild(el('circle', { cx: 100, cy: 40, r: 4, fill: '#f5d04a' }));
    // Eyes
    const eyes = eyeSet(svg, 88, 100, 112, 100, 9);
    plant.leftEyeEl = eyes.lpup;
    plant.rightEyeEl = eyes.rpup;
    plant._eyes = eyes;
    // Mouth (grumpy line)
    const mouth = el('path', { d: 'M 86 122 Q 100 116 114 122', stroke: '#1d2a17', 'stroke-width': 2.6, fill: 'none', 'stroke-linecap': 'round' });
    svg.appendChild(mouth);

  }

  function buildFern(plant) {
    const svg = plant.svg;
    svg.innerHTML = '';
    buildDefs(svg);
    buildPot(svg, 100, 175, 130, 45);
    // Long fronds: 7 stems radiating outward + upward
    const fronds = [
      { ang: -110, len: 110, side: 'L' },
      { ang: -130, len: 95,  side: 'L' },
      { ang: -150, len: 80,  side: 'L' },
      { ang: -90,  len: 120, side: 'C' },
      { ang: -70,  len: 110, side: 'R' },
      { ang: -50,  len: 95,  side: 'R' },
      { ang: -30,  len: 80,  side: 'R' },
    ];
    fronds.forEach(f => {
      const a = f.ang * Math.PI / 180;
      const ex = 100 + Math.cos(a) * f.len;
      const ey = 170 + Math.sin(a) * f.len;
      // Curve control: bend opposite of direction
      const cx = 100 + Math.cos(a) * f.len * 0.45 + Math.cos(a + Math.PI/2) * 12 * (f.side === 'R' ? 1 : -1);
      const cy = 170 + Math.sin(a) * f.len * 0.45 + Math.sin(a + Math.PI/2) * 12 * (f.side === 'R' ? 1 : -1);
      svg.appendChild(el('path', { d: `M 100 170 Q ${cx} ${cy} ${ex} ${ey}`, stroke: '#3e7a2a', 'stroke-width': 3, fill: 'none', 'stroke-linecap': 'round' }));
      // Leaflets along the stem
      for (let t = 0.2; t < 0.95; t += 0.13) {
        const px = 100 + (ex - 100) * t;
        const py = 170 + (ey - 170) * t;
        const lw = 5;
        const norm = a + Math.PI/2;
        const lx1 = px + Math.cos(norm) * lw;
        const ly1 = py + Math.sin(norm) * lw;
        const lx2 = px - Math.cos(norm) * lw;
        const ly2 = py - Math.sin(norm) * lw;
        svg.appendChild(el('ellipse', { cx: lx1, cy: ly1, rx: 4, ry: 7, transform: `rotate(${(a*180/Math.PI)+90} ${lx1} ${ly1})`, fill: '#76b653', stroke: '#2d5a1f', 'stroke-width': 1 }));
        svg.appendChild(el('ellipse', { cx: lx2, cy: ly2, rx: 4, ry: 7, transform: `rotate(${(a*180/Math.PI)-90} ${lx2} ${ly2})`, fill: '#76b653', stroke: '#2d5a1f', 'stroke-width': 1 }));
      }
    });
    // Central face leaf cluster
    svg.appendChild(el('ellipse', { cx: 100, cy: 115, rx: 38, ry: 36, fill: '#4d8b1c', stroke: '#2c5824', 'stroke-width': 2 }));
    // Eyes
    const eyes = eyeSet(svg, 88, 110, 112, 110, 9);
    plant.leftEyeEl = eyes.lpup;
    plant.rightEyeEl = eyes.rpup;
    plant._eyes = eyes;
    // Mouth (dramatic frown / oval)
    const mouth = el('path', { d: 'M 84 132 Q 100 142 116 132', stroke: '#1d2a17', 'stroke-width': 2.8, fill: 'none', 'stroke-linecap': 'round' });
    svg.appendChild(mouth);
    plant.mouthEl = mouth;
  }

  // ---- Audio ----
  let audioCtx = null, masterGain = null;
  function ensureAudio() {
    if (audioCtx) return;
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    audioCtx = new Ctx();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.5;
    const comp = audioCtx.createDynamicsCompressor();
    comp.threshold.value = -14; comp.ratio.value = 4;
    masterGain.connect(comp);
    comp.connect(audioCtx.destination);
  }

  function makeVibrato(t, dur, rate, depthCents) {
    const vib = audioCtx.createOscillator();
    vib.type = 'sine';
    vib.frequency.value = rate;
    const amp = audioCtx.createGain();
    amp.gain.value = depthCents;
    vib.connect(amp);
    vib.start(t);
    vib.stop(t + dur + 0.1);
    return amp; // connect amp -> osc.detune
  }
  function makeFormant(freq, q) {
    const f = audioCtx.createBiquadFilter();
    f.type = 'bandpass';
    f.frequency.value = freq;
    f.Q.value = q;
    return f;
  }
  function noiseBuffer(seconds) {
    const len = Math.floor(seconds * audioCtx.sampleRate);
    const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    return buf;
  }

  function screamSprout() {
    const t = audioCtx.currentTime;
    const dur = 0.55;
    const f0 = 660 + Math.random() * 60;
    const peak = f0 * 1.35;
    const osc = audioCtx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(f0, t);
    osc.frequency.exponentialRampToValueAtTime(peak, t + dur * 0.55);
    osc.frequency.exponentialRampToValueAtTime(f0 * 0.9, t + dur);
    const vib = makeVibrato(t, dur, 9, 18);
    vib.connect(osc.detune);
    // Formant — vowel "EE" (bright, panicky): F1 ~340, F2 ~2400
    const f1 = makeFormant(720, 6);
    const f2 = makeFormant(2400, 8);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.16, t + 0.025);
    g.gain.setValueAtTime(0.14, t + dur - 0.08);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    osc.connect(f1); osc.connect(f2);
    f1.connect(g); f2.connect(g);
    g.connect(masterGain);
    // Breath layer (tiny noise burst at attack)
    const src = audioCtx.createBufferSource();
    src.buffer = noiseBuffer(0.08);
    const bf = makeFormant(2200, 1.2);
    const bg = audioCtx.createGain(); bg.gain.value = 0.08;
    src.connect(bf); bf.connect(bg); bg.connect(masterGain);
    osc.start(t); osc.stop(t + dur + 0.05);
    src.start(t);
  }

  function screamCactus() {
    const t = audioCtx.currentTime;
    const dur = 0.95;
    const f0 = 330 + Math.random() * 40;
    const peak = f0 * 1.2;
    // Two slightly detuned sawtooths for grumble
    const o1 = audioCtx.createOscillator();
    o1.type = 'sawtooth';
    o1.frequency.setValueAtTime(f0, t);
    o1.frequency.exponentialRampToValueAtTime(peak, t + dur * 0.55);
    o1.frequency.exponentialRampToValueAtTime(f0 * 0.85, t + dur);
    const o2 = audioCtx.createOscillator();
    o2.type = 'square';
    o2.frequency.setValueAtTime(f0 * 1.01, t);
    o2.frequency.exponentialRampToValueAtTime(peak * 1.01, t + dur * 0.55);
    o2.frequency.exponentialRampToValueAtTime(f0 * 0.85, t + dur);
    const vib = makeVibrato(t, dur, 6.5, 14);
    vib.connect(o1.detune); vib.connect(o2.detune);
    // Vowel "AW" — F1 600, F2 950
    const f1 = makeFormant(600, 7);
    const f2 = makeFormant(950, 8);
    // Distortion (tanh waveshaper for harmonic grit)
    const dist = audioCtx.createWaveShaper();
    const k = 14;
    const curve = new Float32Array(2048);
    for (let i = 0; i < curve.length; i++) {
      const x = (i - 1024) / 1024;
      curve[i] = Math.tanh(k * x) / Math.tanh(k);
    }
    dist.curve = curve;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.18, t + 0.05);
    g.gain.setValueAtTime(0.18, t + dur - 0.15);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    const mix = audioCtx.createGain();
    o1.connect(mix); o2.connect(mix);
    mix.connect(f1); mix.connect(f2);
    f1.connect(dist); f2.connect(dist);
    dist.connect(g); g.connect(masterGain);
    // Sub thump
    const sub = audioCtx.createOscillator();
    sub.type = 'sine';
    sub.frequency.setValueAtTime(f0 / 2, t);
    const sg = audioCtx.createGain();
    sg.gain.setValueAtTime(0.12, t);
    sg.gain.exponentialRampToValueAtTime(0.001, t + dur);
    sub.connect(sg); sg.connect(masterGain);
    o1.start(t); o2.start(t); sub.start(t);
    o1.stop(t + dur + 0.1); o2.stop(t + dur + 0.1); sub.stop(t + dur + 0.1);
  }

  function screamFern() {
    const t = audioCtx.currentTime;
    const dur = 1.4;
    const f0 = 190 + Math.random() * 30;
    const peak = f0 * 1.15;
    // Dramatic deep groan
    const o1 = audioCtx.createOscillator();
    o1.type = 'sawtooth';
    o1.frequency.setValueAtTime(f0 * 0.9, t);
    o1.frequency.exponentialRampToValueAtTime(peak, t + dur * 0.3);
    o1.frequency.exponentialRampToValueAtTime(f0 * 0.55, t + dur);
    const o2 = audioCtx.createOscillator();
    o2.type = 'triangle';
    o2.frequency.setValueAtTime(f0 * 2, t);
    o2.frequency.exponentialRampToValueAtTime(f0 * 1.1, t + dur);
    const vib = makeVibrato(t, dur, 5, 22);
    vib.connect(o1.detune); vib.connect(o2.detune);
    // Vowel "OH" — F1 500, F2 800
    const f1 = makeFormant(500, 6);
    const f2 = makeFormant(800, 7);
    const f3 = makeFormant(2200, 6);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.22, t + 0.12);
    g.gain.setValueAtTime(0.18, t + dur - 0.25);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    const mix = audioCtx.createGain();
    o1.connect(mix); o2.connect(mix);
    mix.connect(f1); mix.connect(f2); mix.connect(f3);
    const fmix = audioCtx.createGain(); fmix.gain.value = 0.7;
    f1.connect(fmix); f2.connect(fmix); f3.connect(fmix);
    fmix.connect(g); g.connect(masterGain);
    // Wet noise breath
    const src = audioCtx.createBufferSource();
    src.buffer = noiseBuffer(dur);
    const bf = audioCtx.createBiquadFilter();
    bf.type = 'lowpass'; bf.frequency.value = 700;
    const bg = audioCtx.createGain();
    bg.gain.setValueAtTime(0, t);
    bg.gain.linearRampToValueAtTime(0.06, t + 0.15);
    bg.gain.exponentialRampToValueAtTime(0.001, t + dur);
    src.connect(bf); bf.connect(bg); bg.connect(masterGain);
    o1.start(t); o2.start(t); src.start(t);
    o1.stop(t + dur + 0.1); o2.stop(t + dur + 0.1);
  }

  const SCREAMS = { sprout: screamSprout, cactus: screamCactus, fern: screamFern };

  function scream(plant) {
    if (!state.sound) return;
    ensureAudio(); if (!audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const fn = SCREAMS[plant.voice];
    if (fn) fn();
    state.screams += 1;
    els.screamsOut.textContent = state.screams;
  }

  function splash(plant) {
    if (!state.sound) return;
    ensureAudio(); if (!audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    const t = audioCtx.currentTime;
    const src = audioCtx.createBufferSource();
    src.buffer = noiseBuffer(0.18);
    const f = audioCtx.createBiquadFilter();
    f.type = 'bandpass'; f.frequency.value = 2200; f.Q.value = 1.4;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.22, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
    src.connect(f); f.connect(g); g.connect(masterGain);
    src.start(t);
    // Bright bell on top
    const o = audioCtx.createOscillator();
    o.type = 'sine'; o.frequency.setValueAtTime(880, t);
    o.frequency.exponentialRampToValueAtTime(1320, t + 0.12);
    const og = audioCtx.createGain();
    og.gain.setValueAtTime(0.1, t);
    og.gain.exponentialRampToValueAtTime(0.001, t + 0.14);
    o.connect(og); og.connect(masterGain);
    o.start(t); o.stop(t + 0.16);
  }

  function deathChord() {
    if (!state.sound) return;
    ensureAudio(); if (!audioCtx) return;
    const t = audioCtx.currentTime;
    [180, 220, 280].forEach((f, i) => {
      const o = audioCtx.createOscillator();
      o.type = 'sawtooth'; o.frequency.value = f;
      o.frequency.exponentialRampToValueAtTime(f * 0.5, t + 0.9);
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.14, t + i * 0.06);
      g.gain.exponentialRampToValueAtTime(0.001, t + 1);
      const flt = audioCtx.createBiquadFilter();
      flt.type = 'lowpass'; flt.frequency.value = 700;
      o.connect(flt); flt.connect(g); g.connect(masterGain);
      o.start(t + i * 0.06); o.stop(t + 1.1);
    });
  }

  // ---- Mouth / eye animation ----
  function setMouth(plant, mode) {
    if (!plant.mouthEl) return;
    const cx = plant.id === 'sprout' ? 100 : plant.id === 'cactus' ? 100 : 100;
    const cy = plant.id === 'sprout' ? 86 : plant.id === 'cactus' ? 122 : 134;
    if (mode === 'scream') {
      plant.mouthEl.setAttribute('d', `M ${cx-10} ${cy-3} Q ${cx} ${cy+14} ${cx+10} ${cy-3} Q ${cx} ${cy+18} ${cx-10} ${cy-3}`);
      plant.mouthEl.setAttribute('fill', '#3a0d18');
    } else if (mode === 'wilt') {
      plant.mouthEl.setAttribute('d', `M ${cx-9} ${cy+4} Q ${cx} ${cy-3} ${cx+9} ${cy+4}`);
      plant.mouthEl.setAttribute('fill', 'none');
    } else if (mode === 'sad') {
      plant.mouthEl.setAttribute('d', `M ${cx-9} ${cy+2} Q ${cx} ${cy-2} ${cx+9} ${cy+2}`);
      plant.mouthEl.setAttribute('fill', 'none');
    } else if (mode === 'dead') {
      plant.mouthEl.setAttribute('d', `M ${cx-8} ${cy} L ${cx+8} ${cy}`);
      plant.mouthEl.setAttribute('fill', 'none');
    } else {
      // happy
      plant.mouthEl.setAttribute('d', plant.id === 'sprout' ? `M ${cx-12} ${cy-3} Q ${cx} ${cy+5} ${cx+12} ${cy-3}` :
                                       plant.id === 'cactus' ? `M ${cx-13} ${cy-1} Q ${cx} ${cy-7} ${cx+13} ${cy-1}` :
                                       `M ${cx-13} ${cy-1} Q ${cx} ${cy+5} ${cx+13} ${cy-1}`);
      plant.mouthEl.setAttribute('fill', 'none');
    }
  }

  function setEyes(plant, mode) {
    const e = plant._eyes;
    if (!e) return;
    if (mode === 'scream') {
      // wide open
      [e.lwhite, e.rwhite].forEach(c => c.setAttribute('r', 11));
      [e.lpup, e.rpup].forEach(p => p.setAttribute('r', 3));
    } else if (mode === 'wilt') {
      [e.lwhite, e.rwhite].forEach(c => c.setAttribute('r', 7));
      [e.lpup, e.rpup].forEach(p => p.setAttribute('r', 2.5));
    } else if (mode === 'dead') {
      // X eyes
      [e.lpup, e.rpup].forEach(p => p.setAttribute('r', 0));
      e.lwhite.setAttribute('fill', '#bbb6a0');
      e.rwhite.setAttribute('fill', '#bbb6a0');
    } else if (mode === 'blink') {
      [e.lwhite, e.rwhite].forEach(c => c.setAttribute('r', 2));
      [e.lpup, e.rpup].forEach(p => p.setAttribute('r', 0));
    } else {
      [e.lwhite, e.rwhite].forEach(c => { c.setAttribute('r', plant.id === 'sprout' ? 8 : 9); c.setAttribute('fill', '#fbf8e8'); });
      [e.lpup, e.rpup].forEach(p => p.setAttribute('r', plant.id === 'sprout' ? 3.6 : 4));
    }
  }

  // ---- HUD ----
  function updateMeter(plant) {
    const pct = Math.max(0, Math.min(100, plant.hydration));
    plant.fill.style.width = pct + '%';
    plant.val.textContent = Math.round(pct);
    plant.meter.setAttribute('aria-valuenow', String(Math.round(pct)));
    plant.fill.classList.remove('mid', 'low', 'empty');
    if (plant.dead) {
      plant.fill.classList.add('empty');
    } else if (pct < plant.threshold * 0.5) {
      plant.fill.classList.add('low');
    } else if (pct < plant.threshold) {
      plant.fill.classList.add('mid');
    }
  }

  function updateCardClass(plant) {
    plant.card.classList.remove('thirsty', 'parched', 'dead', 'screaming');
    if (plant.dead) {
      plant.card.classList.add('dead');
    } else if (plant.hydration < plant.threshold * 0.5) {
      plant.card.classList.add('parched');
      if (plant.sinceLastScream < 0.4) plant.card.classList.add('screaming');
    } else if (plant.hydration < plant.threshold) {
      plant.card.classList.add('thirsty');
    }
  }

  function updateAliveCount() {
    const alive = garden.filter(p => !p.dead).length;
    els.aliveOut.textContent = alive + ' / ' + garden.length;
    document.body.classList.toggle('panic', garden.some(p => !p.dead && p.hydration < p.threshold * 0.4));
    if (alive === 0) {
      // game over
      state.playing = false;
      const day = Math.floor((performance.now() - state.dayStart) / 8000) + 1;
      if (day > state.bestDay) {
        state.bestDay = day;
        saveBest();
        els.bestOut.textContent = day;
      }
      deathChord();
      showToast('The garden is silent.', 'dead', 2400);
    }
  }

  function showToast(text, cls, ms) {
    els.toast.textContent = text;
    els.toast.className = 'toast show' + (cls ? ' ' + cls : '');
    clearTimeout(showToast._t);
    showToast._t = setTimeout(() => {
      els.toast.className = 'toast';
    }, ms || 1400);
  }

  function waterPlant(plant) {
    if (plant.dead || !state.playing) return;
    plant.hydration = Math.min(100, plant.hydration + 38);
    updateMeter(plant);
    updateCardClass(plant);
    updateAliveCount();
    splash(plant);
    // Splash float text
    if (plant.splash) {
      plant.splash.textContent = '+ splash';
      plant.splash.classList.remove('show');
      void plant.splash.offsetWidth;
      plant.splash.classList.add('show');
      const r = plant.svg.getBoundingClientRect();
      const cardR = plant.card.getBoundingClientRect();
      plant.splash.style.left = (r.left - cardR.left + r.width/2 - 28) + 'px';
      plant.splash.style.top = (r.top - cardR.top + 24) + 'px';
      setTimeout(() => plant.splash.classList.remove('show'), 700);
    }
  }

  function killPlant(plant) {
    plant.dead = true;
    plant.hydration = 0;
    updateMeter(plant);
    setEyes(plant, 'dead');
    setMouth(plant, 'dead');
    updateCardClass(plant);
    plant.btn.disabled = true;
    showToast(plant.name + ' has wilted.', 'dead', 1800);
    updateAliveCount();
  }

  // ---- Boot ----
  function bootGarden() {
    garden.forEach(plant => {
      plant.card = document.querySelector(`.plant-card[data-id="${plant.id}"]`);
      plant.fill = document.getElementById('meterFill-' + plant.id);
      plant.val = document.getElementById('meterVal-' + plant.id);
      plant.meter = document.getElementById('meter-' + plant.id);
      plant.btn = document.querySelector(`.water-btn[data-water="${plant.id}"]`);
      plant.svg = document.getElementById('svg-' + plant.id);
      plant.splash = document.getElementById('splash-' + plant.id);
      if (plant.id === 'sprout') buildSprout(plant);
      else if (plant.id === 'cactus') buildCactus(plant);
      else buildFern(plant);
      setMouth(plant, 'happy');
      setEyes(plant, 'happy');
      updateMeter(plant);

      const onWater = (e) => { e.stopPropagation(); ensureAudio(); waterPlant(plant); };
      plant.btn.addEventListener('click', onWater);
      plant.card.addEventListener('click', () => { ensureAudio(); waterPlant(plant); });
      plant.card.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); ensureAudio(); waterPlant(plant); }
      });
    });
  }

  function resetGarden() {
    garden.forEach(plant => {
      plant.hydration = 100;
      plant.dead = false;
      plant.sinceLastScream = Math.random() * 1.5;
      plant.screamingT = 0;
      plant.btn.disabled = false;
      setMouth(plant, 'happy');
      setEyes(plant, 'happy');
      updateMeter(plant);
      updateCardClass(plant);
      if (plant._eyes) {
        plant._eyes.lwhite.setAttribute('fill', '#fbf8e8');
        plant._eyes.rwhite.setAttribute('fill', '#fbf8e8');
      }
    });
    state.playing = true;
    state.dayStart = performance.now();
    state.screams = 0;
    els.screamsOut.textContent = '0';
    els.dayOut.textContent = '1';
    updateAliveCount();
    document.body.classList.remove('panic');
  }

  els.resetBtn.addEventListener('click', () => { ensureAudio(); resetGarden(); });
  els.waterAllBtn.addEventListener('click', () => {
    ensureAudio();
    garden.forEach(p => { if (!p.dead) waterPlant(p); });
  });
  els.soundToggle.addEventListener('change', () => {
    state.sound = els.soundToggle.checked;
    if (state.sound) ensureAudio();
  });

  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === '1') waterPlant(garden[0]);
    else if (e.key === '2') waterPlant(garden[1]);
    else if (e.key === '3') waterPlant(garden[2]);
    else if (e.key === 'w' || e.key === 'W') els.waterAllBtn.click();
    else if (e.key === 'm' || e.key === 'M') {
      els.soundToggle.checked = !els.soundToggle.checked;
      els.soundToggle.dispatchEvent(new Event('change'));
    } else if (e.key === 'r' || e.key === 'R') {
      els.resetBtn.click();
    }
  });

  // ---- Main loop ----
  let last = performance.now();
  function frame(now) {
    let dt = (now - last) / 1000;
    last = now;
    if (dt > 1/15) dt = 1/15;

    if (state.playing) {
      // Day counter: 1 day = 8 seconds
      const day = Math.floor((now - state.dayStart) / 8000) + 1;
      els.dayOut.textContent = day;

      garden.forEach(plant => {
        if (plant.dead) return;
        plant.hydration -= plant.decayPerSec * dt;
        plant.sinceLastScream += dt;
        plant.blinkT += dt;
        plant.screamingT = Math.max(0, plant.screamingT - dt);

        if (plant.hydration <= 0) {
          killPlant(plant);
          return;
        }

        // Maybe scream
        if (plant.hydration < plant.threshold) {
          const intensity = 1 - (plant.hydration / plant.threshold); // 0..1
          const cd = plant.screamCooldown * (1 - intensity * 0.55);
          if (plant.sinceLastScream >= cd) {
            plant.sinceLastScream = 0;
            plant.screamingT = 0.32;
            scream(plant);
            setMouth(plant, 'scream');
            setEyes(plant, 'scream');
            setTimeout(() => {
              if (!plant.dead) {
                setMouth(plant, plant.hydration < plant.threshold * 0.5 ? 'wilt' : 'sad');
                setEyes(plant, 'happy');
              }
            }, 380);
          } else if (plant.screamingT <= 0) {
            // Idle thirsty face
            setMouth(plant, plant.hydration < plant.threshold * 0.5 ? 'wilt' : 'sad');
          }
        } else {
          if (plant.screamingT <= 0) setMouth(plant, 'happy');
        }

        // Blink (when not screaming, alive)
        if (plant.screamingT <= 0 && plant.blinkT > 3.5 + Math.random() * 2) {
          plant.blinkT = 0;
          setEyes(plant, 'blink');
          setTimeout(() => { if (!plant.dead && plant.screamingT <= 0) setEyes(plant, 'happy'); }, 150);
        }

        updateMeter(plant);
        updateCardClass(plant);
      });

      updateAliveCount();
    }
    requestAnimationFrame(frame);
  }

  bootGarden();
  updateAliveCount();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
