<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>Gravity Box</title>
<link rel="icon" href="https://emojicdn.elk.sh/⚛️">
<meta property="og:title" content="Gravity Box">
<meta property="og:description" content="Drop glowing shapes into a low-gravity sandbox and fling them around.">
<meta property="og:url" content="https://sloppy.live/gravity-box">
<meta property="og:image" content="https://emojicdn.elk.sh/⚛️?style=apple&size=512">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;600&family=IBM+Plex+Mono:wght@200&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#06060e;user-select:none;touch-action:none}
canvas{display:block;width:100%;height:100%}
#ui{
  position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:5;
  display:flex;gap:5px;align-items:center;flex-wrap:wrap;justify-content:center;
}
.ui-btn{
  font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:200;
  padding:5px 11px;border:1px solid rgba(0,255,255,0.1);
  background:rgba(0,255,255,0.03);color:rgba(0,255,255,0.35);
  border-radius:4px;cursor:pointer;transition:all .12s;
}
.ui-btn:hover{background:rgba(0,255,255,0.08);color:#0ff}
.ui-btn.active{border-color:rgba(0,255,255,0.3);color:#0ff;background:rgba(0,255,255,0.1)}
#hint{
  position:fixed;top:46px;left:50%;transform:translateX(-50%);z-index:5;
  font-family:'Chakra Petch',sans-serif;font-size:13px;font-weight:300;
  color:rgba(255,255,255,0.1);pointer-events:none;transition:opacity 3s;
}
#count{
  position:fixed;top:10px;right:12px;z-index:5;
  font-family:'IBM Plex Mono',monospace;font-size:10px;color:rgba(255,255,255,0.12);
}
a</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <button class="ui-btn active" data-shape="box">BOX</button>
  <button class="ui-btn" data-shape="circle">CIRCLE</button>
  <button class="ui-btn" data-shape="tri">TRI</button>
  <button class="ui-btn" data-shape="star">STAR</button>
  <button class="ui-btn" id="gravity-btn">LOW GRAV</button>
  <button class="ui-btn" id="clear-btn">CLEAR</button>
</div>
<div id="hint">Click to spawn &bull; Drag to throw</div>
<div id="count"></div>
<script>
(function(){
'use strict';

var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
var W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
resize();
window.addEventListener('resize',resize);

var bodies=[];
var shapeType='box';
var gravity=0.04;
var gravModes=[
  {label:'LOW GRAV',g:0.04},
  {label:'MICRO',g:0.008},
  {label:'ZERO G',g:0},
  {label:'NORMAL',g:0.15},
  {label:'HEAVY',g:0.35},
  {label:'REVERSE',g:-0.06}
];
var gravIdx=0;
var dragging=null;
var dragOffX=0,dragOffY=0;
var prevDragX=0,prevDragY=0;
var MAX_BODIES=80;

var COLORS=['#0ff','#f0f','#ff0','#0f0','#f80','#08f','#f44','#4ff','#ff4','#a4f','#4fa','#fa4'];

function randColor(){return COLORS[Math.floor(Math.random()*COLORS.length)]}

function hexRgba(hex,a){
  var r,g,b;
  if(hex.length===4){r=parseInt(hex[1]+hex[1],16);g=parseInt(hex[2]+hex[2],16);b=parseInt(hex[3]+hex[3],16)}
  else{r=parseInt(hex.slice(1,3),16);g=parseInt(hex.slice(3,5),16);b=parseInt(hex.slice(5,7),16)}
  return'rgba('+r+','+g+','+b+','+a+')';
}

function createBody(x,y,type,vx,vy){
  var size=16+Math.random()*24;
  var col=randColor();
  var mass=size*size*0.003;
  var pts=null;

  if(type==='tri'){
    pts=[];
    for(var i=0;i<3;i++){var a=i/3*Math.PI*2-Math.PI/2;pts.push({x:Math.cos(a)*size,y:Math.sin(a)*size})}
  }else if(type==='star'){
    pts=[];
    for(var i=0;i<10;i++){var a=i/10*Math.PI*2-Math.PI/2;var r=i%2===0?size:size*0.42;pts.push({x:Math.cos(a)*r,y:Math.sin(a)*r})}
  }

  bodies.push({
    x:x,y:y,vx:vx||0,vy:vy||0,
    size:size,type:type,color:col,
    rot:Math.random()*Math.PI*2,
    rotV:(Math.random()-0.5)*0.05,
    mass:mass,pts:pts,
    restitution:0.65+Math.random()*0.25,
    trail:[]
  });
  if(bodies.length>MAX_BODIES)bodies.shift();
}

function bodyContains(b,px,py){
  var dx=px-b.x,dy=py-b.y;
  return dx*dx+dy*dy<b.size*b.size*1.2;
}

function update(){
  for(var i=0;i<bodies.length;i++){
    var b=bodies[i];
    if(b===dragging)continue;

    b.vy+=gravity;
    b.vx*=0.9985;
    b.vy*=0.9985;

    // Speed cap
    var spd=Math.sqrt(b.vx*b.vx+b.vy*b.vy);
    if(spd>15){b.vx*=15/spd;b.vy*=15/spd}

    b.x+=b.vx;
    b.y+=b.vy;
    b.rot+=b.rotV;
    b.rotV*=0.997;

    // Trail
    if(spd>0.5){
      b.trail.push({x:b.x,y:b.y,life:1});
      if(b.trail.length>15)b.trail.shift();
    }
    for(var t=b.trail.length-1;t>=0;t--){
      b.trail[t].life-=0.07;
      if(b.trail[t].life<=0)b.trail.splice(t,1);
    }

    // Walls
    var r=b.size;
    if(b.x-r<0){b.x=r;b.vx=-b.vx*b.restitution;b.rotV+=b.vy*0.003}
    if(b.x+r>W){b.x=W-r;b.vx=-b.vx*b.restitution;b.rotV-=b.vy*0.003}
    if(b.y-r<0){b.y=r;b.vy=-b.vy*b.restitution;b.rotV+=b.vx*0.003}
    if(b.y+r>H){b.y=H-r;b.vy=-b.vy*b.restitution;b.vx*=0.97;b.rotV*=0.95;
      if(Math.abs(b.vy)<0.15)b.vy=0;
    }

    // Collisions
    for(var j=i+1;j<bodies.length;j++){
      var b2=bodies[j];
      if(b2===dragging)continue;
      var dx=b2.x-b.x,dy=b2.y-b.y;
      var dist=Math.sqrt(dx*dx+dy*dy);
      var minD=b.size*0.78+b2.size*0.78;
      if(dist<minD&&dist>0.1){
        var nx=dx/dist,ny=dy/dist;
        var overlap=(minD-dist)*0.5;
        b.x-=nx*overlap;b.y-=ny*overlap;
        b2.x+=nx*overlap;b2.y+=ny*overlap;
        var dvx=b.vx-b2.vx,dvy=b.vy-b2.vy;
        var dot=dvx*nx+dvy*ny;
        if(dot>0){
          var m1=b.mass,m2=b2.mass;
          var imp=2*dot/(m1+m2);
          var rest=Math.min(b.restitution,b2.restitution);
          b.vx-=imp*m2*nx*rest;b.vy-=imp*m2*ny*rest;
          b2.vx+=imp*m1*nx*rest;b2.vy+=imp*m1*ny*rest;
          b.rotV+=(Math.random()-0.5)*0.02;
          b2.rotV+=(Math.random()-0.5)*0.02;
        }
      }
    }
  }

  document.getElementById('count').textContent=bodies.length+'/'+MAX_BODIES;
}

function drawBody(b){
  ctx.save();

  // Trail
  for(var t=0;t<b.trail.length;t++){
    var tr=b.trail[t];
    ctx.globalAlpha=tr.life*0.12;
    ctx.fillStyle=b.color;
    ctx.beginPath();ctx.arc(tr.x,tr.y,b.size*0.25,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  ctx.translate(b.x,b.y);
  ctx.rotate(b.rot);

  ctx.strokeStyle=b.color;
  ctx.lineWidth=2;
  ctx.shadowColor=b.color;
  ctx.shadowBlur=14;

  var s=b.size;

  if(b.type==='box'){
    ctx.strokeRect(-s,-s,s*2,s*2);
    ctx.fillStyle=hexRgba(b.color,0.07);
    ctx.fillRect(-s,-s,s*2,s*2);
    // Inner cross
    ctx.strokeStyle=hexRgba(b.color,0.12);ctx.lineWidth=0.5;ctx.shadowBlur=0;
    ctx.beginPath();ctx.moveTo(-s*0.4,0);ctx.lineTo(s*0.4,0);ctx.moveTo(0,-s*0.4);ctx.lineTo(0,s*0.4);ctx.stroke();
  }else if(b.type==='circle'){
    ctx.beginPath();ctx.arc(0,0,s,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle=hexRgba(b.color,0.07);ctx.fill();
    ctx.strokeStyle=hexRgba(b.color,0.15);ctx.lineWidth=0.5;ctx.shadowBlur=0;
    ctx.beginPath();ctx.arc(0,0,s*0.5,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(0,-s);ctx.lineTo(0,s);ctx.stroke();
  }else if(b.pts){
    ctx.beginPath();
    ctx.moveTo(b.pts[0].x,b.pts[0].y);
    for(var p=1;p<b.pts.length;p++)ctx.lineTo(b.pts[p].x,b.pts[p].y);
    ctx.closePath();ctx.stroke();
    ctx.fillStyle=hexRgba(b.color,0.07);ctx.fill();
  }

  ctx.restore();
}

function render(){
  ctx.fillStyle='rgba(6,6,14,0.18)';
  ctx.fillRect(0,0,W,H);

  // Subtle grid
  ctx.strokeStyle='rgba(0,255,255,0.012)';
  ctx.lineWidth=0.5;
  var gs=50;
  for(var x=gs;x<W;x+=gs){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(var y=gs;y<H;y+=gs){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}

  // Wall glow
  ctx.strokeStyle='rgba(0,255,255,0.03)';ctx.lineWidth=1;
  ctx.strokeRect(1,1,W-2,H-2);

  // Gravity indicator
  if(gravity!==0){
    ctx.save();
    var cx=W/2,cy=H-20;
    var arrowLen=Math.min(30,Math.abs(gravity)*200);
    var dir=gravity>0?1:-1;
    ctx.strokeStyle='rgba(0,255,255,0.06)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(cx,cy);ctx.lineTo(cx,cy+arrowLen*dir);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-4,cy+arrowLen*dir-4*dir);ctx.lineTo(cx,cy+arrowLen*dir);ctx.lineTo(cx+4,cy+arrowLen*dir-4*dir);ctx.stroke();
    ctx.restore();
  }

  for(var i=0;i<bodies.length;i++)drawBody(bodies[i]);
}

function loop(){update();render();requestAnimationFrame(loop)}

// Input
function getPos(e){
  if(e.touches&&e.touches.length)return{x:e.touches[0].clientX,y:e.touches[0].clientY};
  return{x:e.clientX,y:e.clientY};
}

function onDown(e){
  e.preventDefault();
  var p=getPos(e);
  for(var i=bodies.length-1;i>=0;i--){
    if(bodyContains(bodies[i],p.x,p.y)){
      dragging=bodies[i];
      dragOffX=p.x-dragging.x;dragOffY=p.y-dragging.y;
      prevDragX=p.x;prevDragY=p.y;
      dragging.vx=0;dragging.vy=0;
      return;
    }
  }
  createBody(p.x,p.y,shapeType);
  dragging=bodies[bodies.length-1];
  dragOffX=0;dragOffY=0;prevDragX=p.x;prevDragY=p.y;
}

function onMove(e){
  if(!dragging)return;
  e.preventDefault();
  var p=getPos(e);
  dragging.x=p.x-dragOffX;dragging.y=p.y-dragOffY;
  dragging.vx=0;dragging.vy=0;
  prevDragX=p.x;prevDragY=p.y;
}

function onUp(e){
  if(!dragging)return;
  var p;
  if(e.changedTouches&&e.changedTouches.length)p={x:e.changedTouches[0].clientX,y:e.changedTouches[0].clientY};
  else p={x:e.clientX,y:e.clientY};
  dragging.vx=(p.x-prevDragX)*0.4;
  dragging.vy=(p.y-prevDragY)*0.4;
  dragging=null;
}

canvas.addEventListener('mousedown',onDown);
canvas.addEventListener('mousemove',onMove);
canvas.addEventListener('mouseup',onUp);
canvas.addEventListener('touchstart',onDown,{passive:false});
canvas.addEventListener('touchmove',onMove,{passive:false});
canvas.addEventListener('touchend',onUp);
canvas.addEventListener('touchcancel',function(){if(dragging){dragging=null}});

// UI buttons
document.querySelectorAll('[data-shape]').forEach(function(btn){
  btn.addEventListener('click',function(e){
    e.stopPropagation();
    document.querySelectorAll('[data-shape]').forEach(function(b){b.classList.remove('active')});
    this.classList.add('active');
    shapeType=this.getAttribute('data-shape');
  });
});

var gravBtn=document.getElementById('gravity-btn');
gravBtn.classList.add('active');
gravBtn.addEventListener('click',function(e){
  e.stopPropagation();
  gravIdx=(gravIdx+1)%gravModes.length;
  gravity=gravModes[gravIdx].g;
  this.textContent=gravModes[gravIdx].label;
});

document.getElementById('clear-btn').addEventListener('click',function(e){
  e.stopPropagation();
  bodies=[];
});

// Hide hint
setTimeout(function(){document.getElementById('hint').style.opacity='0'},5000);

// Initial shapes
var types=['box','circle','tri','star'];
for(var i=0;i<6;i++){
  createBody(W*0.15+Math.random()*W*0.7,H*0.15+Math.random()*H*0.4,types[i%4],(Math.random()-0.5)*2,(Math.random()-0.5)*2);
}

loop();

})();
</script>
<script src="/sloppy-header/sloppy-bar.js"></script>
</body>
</html>
