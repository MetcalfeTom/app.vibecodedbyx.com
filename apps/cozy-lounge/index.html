<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Cozy Lounge</title>
<meta name="description" content="A warm fireside chatroom for stream fans — soft amber light, gentle conversation." />
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%94%A5" />

<meta property="og:title" content="Cozy Lounge" />
<meta property="og:description" content="Pull up a chair by the fire. Real-time chat with the stream." />
<meta property="og:url" content="https://sloppy.live/cozy-lounge" />
<meta property="og:image" content="https://sloppy.live/cozy-lounge/og-image.png" />
<meta property="og:type" content="website" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500;9..144,800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg-0: #1a0f08;
    --bg-1: #241509;
    --bg-2: #2f1d10;
    --fire: #ff8a3d;
    --ember: #ff5a1f;
    --amber: #ffb566;
    --cream: #f6e3c3;
    --cream-soft: #e7d1ab;
    --ink: #3a1f0d;
    --muted: #a88868;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }

  body {
    font-family: 'Fraunces', Georgia, serif;
    color: var(--cream);
    background:
      radial-gradient(ellipse 80% 60% at 50% 100%, rgba(255,120,40,0.30), transparent 70%),
      radial-gradient(ellipse 60% 40% at 50% 100%, rgba(255,180,80,0.18), transparent 60%),
      radial-gradient(circle at 20% 10%, rgba(120,60,20,0.25), transparent 60%),
      radial-gradient(circle at 80% 20%, rgba(90,40,10,0.30), transparent 60%),
      linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 40%, var(--bg-2) 100%);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    overflow: hidden;
    position: relative;
  }

  /* subtle animated ember glow at bottom */
  body::before {
    content: '';
    position: fixed;
    left: 0; right: 0; bottom: 0;
    height: 40vh;
    background: radial-gradient(ellipse at 50% 100%, rgba(255,100,20,0.28), transparent 70%);
    animation: flicker 5s ease-in-out infinite;
    pointer-events: none;
    z-index: 0;
  }
  @keyframes flicker {
    0%,100% { opacity: 0.85; transform: translateY(0) scaleY(1); }
    50%     { opacity: 1.0;  transform: translateY(-4px) scaleY(1.04); }
  }

  /* drifting embers */
  .ember {
    position: fixed;
    bottom: -10px;
    width: 3px; height: 3px;
    background: #ffb566;
    border-radius: 50%;
    box-shadow: 0 0 6px #ff8a3d, 0 0 12px #ff5a1f;
    pointer-events: none;
    opacity: 0;
    z-index: 1;
  }
  @keyframes rise {
    0%   { transform: translate(0, 0) scale(1); opacity: 0; }
    10%  { opacity: 1; }
    80%  { opacity: 0.8; }
    100% { transform: translate(var(--dx), -100vh) scale(0.4); opacity: 0; }
  }

  .lounge {
    position: relative;
    z-index: 2;
    width: 100%;
    max-width: 720px;
    height: min(88vh, 780px);
    display: flex;
    flex-direction: column;
    background:
      linear-gradient(180deg, rgba(60,32,14,0.78), rgba(40,20,8,0.88));
    border: 1px solid rgba(255,180,100,0.22);
    border-radius: 18px;
    box-shadow:
      0 30px 80px rgba(0,0,0,0.55),
      0 0 0 1px rgba(255,140,50,0.08) inset,
      0 0 80px rgba(255,100,30,0.10);
    backdrop-filter: blur(4px);
    overflow: hidden;
  }

  header {
    padding: 22px 28px 18px;
    border-bottom: 1px solid rgba(255,180,100,0.15);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    background: linear-gradient(180deg, rgba(255,140,60,0.08), transparent);
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .fire-icon {
    font-size: 28px;
    filter: drop-shadow(0 0 8px rgba(255,120,30,0.8));
    animation: flicker 2.2s ease-in-out infinite;
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 800;
    font-size: 28px;
    letter-spacing: -0.5px;
    color: var(--cream);
    font-variation-settings: "opsz" 144;
  }
  .tag {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.15em;
    color: var(--amber);
    text-transform: uppercase;
    opacity: 0.8;
    margin-top: 2px;
  }

  .status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: var(--cream-soft);
    opacity: 0.75;
  }
  .dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: #6ad17a;
    box-shadow: 0 0 8px #6ad17a;
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

  /* join screen */
  .join {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 30px;
    text-align: center;
    gap: 22px;
  }
  .join p {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 19px;
    color: var(--cream-soft);
    max-width: 420px;
    line-height: 1.55;
  }
  .join .big-fire {
    font-size: 72px;
    filter: drop-shadow(0 0 20px rgba(255,120,30,0.6));
    animation: flicker 2.2s ease-in-out infinite;
  }
  .name-row {
    display: flex;
    gap: 10px;
    width: 100%;
    max-width: 380px;
  }
  input[type="text"] {
    flex: 1;
    padding: 14px 18px;
    background: rgba(20,10,4,0.55);
    border: 1px solid rgba(255,180,100,0.3);
    border-radius: 10px;
    color: var(--cream);
    font-family: 'Fraunces', serif;
    font-size: 16px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input[type="text"]:focus {
    border-color: var(--fire);
    box-shadow: 0 0 0 3px rgba(255,120,30,0.18);
  }
  input[type="text"]::placeholder {
    color: var(--muted);
    font-style: italic;
  }
  button {
    padding: 14px 22px;
    border: 1px solid rgba(255,180,100,0.4);
    background: linear-gradient(180deg, rgba(255,140,60,0.3), rgba(200,80,20,0.35));
    color: var(--cream);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    border-radius: 10px;
    cursor: pointer;
    transition: transform 0.1s, box-shadow 0.2s, background 0.2s;
  }
  button:hover {
    background: linear-gradient(180deg, rgba(255,160,70,0.45), rgba(220,90,25,0.45));
    box-shadow: 0 0 16px rgba(255,120,30,0.3);
  }
  button:active { transform: translateY(1px); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .err {
    color: #ff9b6e;
    font-size: 13px;
    font-family: 'IBM Plex Mono', monospace;
    min-height: 16px;
  }

  /* chat */
  .chat {
    flex: 1;
    display: none;
    flex-direction: column;
    min-height: 0;
  }
  .chat.active { display: flex; }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 22px 26px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    scroll-behavior: smooth;
  }
  .messages::-webkit-scrollbar { width: 8px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb {
    background: rgba(255,180,100,0.2);
    border-radius: 4px;
  }
  .messages::-webkit-scrollbar-thumb:hover { background: rgba(255,180,100,0.35); }

  .msg {
    display: flex;
    flex-direction: column;
    gap: 3px;
    animation: slideIn 0.35s cubic-bezier(0.2, 0.9, 0.3, 1);
    max-width: 85%;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .msg-meta {
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  .msg-user {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 14px;
    color: var(--amber);
  }
  .msg-time {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    opacity: 0.7;
  }
  .msg-text {
    font-family: 'Fraunces', serif;
    font-size: 16px;
    line-height: 1.5;
    color: var(--cream);
    padding: 10px 14px;
    background: rgba(30,16,6,0.55);
    border: 1px solid rgba(255,180,100,0.12);
    border-radius: 4px 14px 14px 14px;
    word-wrap: break-word;
  }
  .msg.own { align-self: flex-end; }
  .msg.own .msg-meta { justify-content: flex-end; }
  .msg.own .msg-text {
    background: linear-gradient(180deg, rgba(255,140,60,0.25), rgba(200,80,20,0.3));
    border-color: rgba(255,180,100,0.3);
    border-radius: 14px 4px 14px 14px;
  }
  .msg.own .msg-user { color: var(--fire); }

  .empty {
    text-align: center;
    color: var(--muted);
    font-style: italic;
    font-size: 15px;
    margin: auto 0;
  }

  .compose {
    padding: 16px 20px 18px;
    border-top: 1px solid rgba(255,180,100,0.15);
    display: flex;
    gap: 10px;
    background: linear-gradient(0deg, rgba(255,140,60,0.05), transparent);
  }
  .compose input {
    flex: 1;
  }

  footer {
    text-align: center;
    padding: 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.1em;
    opacity: 0.7;
  }
  footer a { color: var(--amber); text-decoration: none; }
  footer a:hover { text-decoration: underline; }

  @media (max-width: 600px) {
    body { padding: 10px; }
    .lounge { height: 96vh; border-radius: 14px; }
    header { padding: 16px 18px 14px; }
    h1 { font-size: 22px; }
    .messages { padding: 16px 16px; }
    .compose { padding: 12px 14px 14px; }
    .join .big-fire { font-size: 56px; }
    .join p { font-size: 16px; }
  }
</style>
</head>
<body>

<div class="lounge">
  <header>
    <div class="brand">
      <div class="fire-icon">🔥</div>
      <div>
        <h1>Cozy Lounge</h1>
        <div class="tag">fireside · real-time</div>
      </div>
    </div>
    <div class="status" id="status">
      <div class="dot"></div>
      <span id="statusText">connecting…</span>
    </div>
  </header>

  <!-- Join screen -->
  <section class="join" id="joinScreen">
    <div class="big-fire">🔥</div>
    <p>Pull up a chair by the fire.<br/>What should we call you?</p>
    <div class="name-row">
      <input type="text" id="nameInput" placeholder="your cozy name…" maxlength="24" autocomplete="off" />
      <button id="joinBtn">Enter</button>
    </div>
    <div class="err" id="joinErr"></div>
  </section>

  <!-- Chat screen -->
  <section class="chat" id="chatScreen">
    <div class="messages" id="messages">
      <div class="empty">The hearth is quiet. Say hello.</div>
    </div>
    <div class="compose">
      <input type="text" id="msgInput" placeholder="share a thought…" maxlength="400" autocomplete="off" />
      <button id="sendBtn">Send</button>
    </div>
  </section>

  <footer>
    watching the stream? visit <a href="https://sloppy.live" target="_blank" rel="noopener">sloppy.live</a>
  </footer>
</div>

<script>
  // drifting embers background
  (function spawnEmbers() {
    const n = 18;
    for (let i = 0; i < n; i++) {
      const e = document.createElement('div');
      e.className = 'ember';
      const left = Math.random() * 100;
      const dx = (Math.random() - 0.5) * 120;
      const dur = 6 + Math.random() * 8;
      const delay = Math.random() * 10;
      const size = 2 + Math.random() * 3;
      e.style.left = left + 'vw';
      e.style.width = size + 'px';
      e.style.height = size + 'px';
      e.style.setProperty('--dx', dx + 'px');
      e.style.animation = `rise ${dur}s linear ${delay}s infinite`;
      document.body.appendChild(e);
    }
  })();
</script>

<script type="module">
  import supabase, { supabaseSession } from './supabase-config.js';

  const joinScreen = document.getElementById('joinScreen');
  const chatScreen = document.getElementById('chatScreen');
  const nameInput  = document.getElementById('nameInput');
  const joinBtn    = document.getElementById('joinBtn');
  const joinErr    = document.getElementById('joinErr');
  const messagesEl = document.getElementById('messages');
  const msgInput   = document.getElementById('msgInput');
  const sendBtn    = document.getElementById('sendBtn');
  const statusText = document.getElementById('statusText');

  let currentUserId = null;
  let currentUsername = '';
  let seenIds = new Set();

  // cozy default names
  const COZY_NAMES = [
    'FiresideFox','EmberMoth','Hazelnut','CinnamonTea','WoolSock','KindleBee',
    'MapleHearth','LanternOwl','SaffronCat','BirchSmoke','QuiltedFern','HoneyBadger'
  ];
  nameInput.placeholder = COZY_NAMES[Math.floor(Math.random() * COZY_NAMES.length)] + '…';

  // try restore username
  try {
    const saved = localStorage.getItem('cozy-lounge-name');
    if (saved) nameInput.value = saved;
  } catch (_) {}

  async function init() {
    try {
      const { user } = await supabaseSession();
      currentUserId = user.id;
      statusText.textContent = 'by the fire';
    } catch (err) {
      console.error('session error', err);
      statusText.textContent = 'offline';
      joinErr.textContent = 'Could not connect to the lounge. Try refresh.';
    }
  }

  function escapeHtml(s) {
    const d = document.createElement('div');
    d.textContent = s == null ? '' : String(s);
    return d.innerHTML;
  }

  function fmtTime(iso) {
    try {
      return new Date(iso).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    } catch { return ''; }
  }

  function renderMessage(m) {
    if (!m || !m.id || seenIds.has(m.id)) return;
    seenIds.add(m.id);

    // clear empty state
    const empty = messagesEl.querySelector('.empty');
    if (empty) empty.remove();

    const wrap = document.createElement('div');
    wrap.className = 'msg' + (m.user_id === currentUserId ? ' own' : '');
    wrap.innerHTML = `
      <div class="msg-meta">
        <span class="msg-user">${escapeHtml(m.username || 'stranger')}</span>
        <span class="msg-time">${fmtTime(m.created_at)}</span>
      </div>
      <div class="msg-text">${escapeHtml(m.message || '')}</div>
    `;
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  async function loadRecent() {
    try {
      const { data, error } = await supabase
        .from('simple_chat_messages')
        .select('*')
        .order('created_at', { ascending: false })
        .limit(80);
      if (error) throw error;
      const ordered = (data || []).slice().reverse();
      if (ordered.length === 0) {
        messagesEl.innerHTML = '<div class="empty">The hearth is quiet. Say hello.</div>';
      } else {
        messagesEl.innerHTML = '';
        ordered.forEach(renderMessage);
      }
    } catch (err) {
      console.error('load error', err);
      messagesEl.innerHTML = '<div class="empty">Could not load the conversation.</div>';
    }
  }

  function subscribe() {
    const channel = supabase
      .channel('cozy-lounge-feed')
      .on('postgres_changes', {
        event: 'INSERT',
        schema: 'public',
        table: 'simple_chat_messages'
      }, (payload) => {
        renderMessage(payload.new);
      })
      .subscribe();
    return channel;
  }

  // fallback polling in case realtime isn't available
  let lastPoll = new Date().toISOString();
  async function pollLoop() {
    try {
      const { data, error } = await supabase
        .from('simple_chat_messages')
        .select('*')
        .gt('created_at', lastPoll)
        .order('created_at', { ascending: true })
        .limit(30);
      if (!error && data && data.length) {
        data.forEach(m => {
          renderMessage(m);
          if (m.created_at > lastPoll) lastPoll = m.created_at;
        });
      }
    } catch (_) {}
  }

  async function enter() {
    const name = nameInput.value.trim();
    if (name.length < 2) { joinErr.textContent = 'a name, please (2+ letters)'; return; }
    if (name.length > 24) { joinErr.textContent = 'too long, shorten it'; return; }
    if (!currentUserId) { joinErr.textContent = 'still warming up… one sec'; return; }

    currentUsername = name;
    try { localStorage.setItem('cozy-lounge-name', name); } catch (_) {}

    joinScreen.style.display = 'none';
    chatScreen.classList.add('active');

    await loadRecent();
    lastPoll = new Date().toISOString();
    subscribe();
    setInterval(pollLoop, 4000);
    msgInput.focus();
  }

  async function send() {
    const text = msgInput.value.trim();
    if (!text) return;
    sendBtn.disabled = true;
    try {
      const { error } = await supabase
        .from('simple_chat_messages')
        .insert({
          username: currentUsername,
          message: text,
          user_id: currentUserId
        });
      if (error) throw error;
      msgInput.value = '';
    } catch (err) {
      console.error('send error', err);
      joinErr.textContent = '';
      alert('Couldn\'t send: ' + (err.message || err));
    } finally {
      sendBtn.disabled = false;
      msgInput.focus();
    }
  }

  joinBtn.addEventListener('click', enter);
  nameInput.addEventListener('keydown', e => { if (e.key === 'Enter') enter(); });
  sendBtn.addEventListener('click', send);
  msgInput.addEventListener('keydown', e => { if (e.key === 'Enter') send(); });

  init();
</script>

</body>
</html>
