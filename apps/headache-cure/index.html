<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Headache Cure</title>
<link rel="icon" href="https://emojicdn.elk.sh/%E2%9A%AA" />
<meta name="description" content="A quiet zen garden. Rake sand, place stones, breathe." />
<meta property="og:title" content="Headache Cure" />
<meta property="og:description" content="A quiet zen garden. Rake sand, place stones, breathe." />
<meta property="og:url" content="https://sloppy.live/headache-cure" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/minimalist%20zen%20garden%20with%20raked%20sand%20patterns%20and%20a%20few%20smooth%20stones%2C%20soft%20morning%20light%2C%20muted%20cream%20beige%20and%20warm%20grey%20tones%2C%20peaceful%20negative%20space?width=1200&height=630&nologo=true" />
<meta name="twitter:card" content="summary_large_image" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Shippori+Mincho:wght@400&display=swap" rel="stylesheet" />
<style>
  :root {
    --sand-0: #f1e8d2;
    --sand-1: #e8dcc0;
    --sand-2: #d8c79f;
    --sand-3: #c4b080;
    --sand-shadow: rgba(100, 82, 56, 0.45);
    --sand-highlight: rgba(255, 248, 228, 0.55);
    --ink: #4a4538;
    --ink-soft: #7a705f;
    --stone-dark: #6f6e65;
    --stone-mid: #9b968a;
    --stone-light: #c5beae;
    --sage: #7e8c7b;
    --page-0: #f6efdf;
    --page-1: #eadfc6;
    --frame: #3a3428;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
  }
  body {
    font-family: 'Cormorant Garamond', serif;
    color: var(--ink);
    background:
      radial-gradient(1400px 900px at 20% 10%, #faf3e0 0%, transparent 60%),
      radial-gradient(1200px 800px at 85% 90%, #e9dcb9 0%, transparent 60%),
      linear-gradient(170deg, var(--page-0) 0%, var(--page-1) 100%);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: fixed;
    inset: 0;
    user-select: none;
    -webkit-user-select: none;
  }
  .title {
    position: absolute;
    top: max(14px, env(safe-area-inset-top, 0px));
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 3;
    pointer-events: none;
    transition: opacity 1.4s ease;
  }
  .title.fade { opacity: 0.4; }
  .kanji {
    font-family: 'Shippori Mincho', serif;
    font-size: 32px;
    color: var(--sage);
    opacity: 0.75;
    display: block;
    line-height: 1;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: clamp(22px, 3vw, 30px);
    color: var(--ink);
    margin: 6px 0 0;
    letter-spacing: 0.18em;
    line-height: 1;
  }
  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-style: italic;
    font-size: 13px;
    color: var(--ink-soft);
    margin: 8px 0 0;
    letter-spacing: 0.22em;
    transition: opacity 1.2s ease;
  }
  .tagline.hide { opacity: 0; }

  .garden-wrap {
    position: relative;
    width: min(94vw, 1200px);
    height: min(84vh, 780px);
    border-radius: 6px;
    box-shadow:
      0 0 0 1px rgba(58, 52, 40, 0.35),
      0 0 0 10px var(--page-0),
      0 0 0 11px rgba(58, 52, 40, 0.22),
      0 30px 60px -20px rgba(58, 52, 40, 0.3),
      0 10px 30px -10px rgba(58, 52, 40, 0.2);
    overflow: hidden;
    background: var(--sand-1);
    touch-action: none;
  }
  .garden-wrap::before {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse at 50% 30%, transparent 0%, rgba(100, 82, 56, 0.1) 90%),
      radial-gradient(ellipse at 50% 80%, transparent 0%, rgba(100, 82, 56, 0.12) 90%);
    z-index: 2;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    cursor: crosshair;
  }

  .breath {
    position: absolute;
    bottom: 18px;
    left: 22px;
    width: 60px;
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 4;
    pointer-events: none;
  }
  .breath svg { overflow: visible; }
  .breath .circle {
    fill: none;
    stroke: var(--sage);
    stroke-width: 1.2;
    opacity: 0.6;
    transform-origin: center;
    animation: breatheCircle 16s ease-in-out infinite;
  }
  .breath .label {
    position: absolute;
    bottom: -14px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 10px;
    letter-spacing: 0.3em;
    color: var(--ink-soft);
    text-transform: lowercase;
    opacity: 0.7;
  }
  @keyframes breatheCircle {
    0%   { transform: scale(0.6); opacity: 0.4; }
    25%  { transform: scale(1.0); opacity: 0.7; }
    50%  { transform: scale(1.0); opacity: 0.7; }
    75%  { transform: scale(0.6); opacity: 0.4; }
    100% { transform: scale(0.6); opacity: 0.4; }
  }

  .controls {
    position: absolute;
    bottom: 18px;
    right: 22px;
    display: flex;
    gap: 10px;
    z-index: 4;
  }
  button {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 14px;
    letter-spacing: 0.22em;
    color: var(--ink-soft);
    background: transparent;
    border: 1px solid rgba(74, 69, 56, 0.25);
    padding: 6px 14px;
    border-radius: 1px;
    cursor: pointer;
    backdrop-filter: blur(2px);
    transition: color 0.3s, border-color 0.3s, background 0.3s;
  }
  button:hover {
    color: var(--ink);
    border-color: rgba(74, 69, 56, 0.5);
    background: rgba(255, 248, 228, 0.25);
  }
  button:active { transform: scale(0.98); }

  .footer-note {
    position: absolute;
    bottom: 6px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 11px;
    letter-spacing: 0.28em;
    color: var(--ink-soft);
    opacity: 0.5;
    z-index: 3;
    pointer-events: none;
  }

  @media (max-width: 560px) {
    .garden-wrap {
      width: 94vw;
      height: 78vh;
      box-shadow:
        0 0 0 1px rgba(58, 52, 40, 0.35),
        0 0 0 6px var(--page-0),
        0 0 0 7px rgba(58, 52, 40, 0.22),
        0 10px 20px -6px rgba(58, 52, 40, 0.25);
    }
    .title { top: 8px; }
    .breath { width: 44px; height: 44px; bottom: 12px; left: 14px; }
    .controls { bottom: 12px; right: 14px; gap: 6px; }
    button { padding: 4px 10px; font-size: 12px; letter-spacing: 0.16em; }
  }
</style>
</head>
<body>
  <div class="title" id="title">
    <span class="kanji">静</span>
    <h1>headache cure</h1>
    <p class="tagline" id="tagline">drag to rake · tap to place a stone</p>
  </div>

  <div class="garden-wrap" id="wrap">
    <canvas id="canvas"></canvas>

    <div class="breath" aria-hidden="true">
      <svg viewBox="-30 -30 60 60" width="60" height="60">
        <circle class="circle" cx="0" cy="0" r="24" />
      </svg>
      <span class="label">breathe</span>
    </div>

    <div class="controls">
      <button id="smoothBtn" title="Smooth the sand">smooth</button>
      <button id="soundBtn" title="Toggle sound">◉ sound</button>
    </div>
  </div>

  <div class="footer-note">— take a breath —</div>

<script>
(() => {
  const wrap = document.getElementById('wrap');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const smoothBtn = document.getElementById('smoothBtn');
  const soundBtn = document.getElementById('soundBtn');
  const title = document.getElementById('title');
  const tagline = document.getElementById('tagline');

  let DPR = Math.min(window.devicePixelRatio || 1, 2);
  let W = 0, H = 0;
  let sandCanvas, sandCtx;
  let strokes = [];       // committed rake strokes (arrays of points)
  let activeStroke = null;
  let stones = [];        // { x, y, r, hue, placedAt }
  let ripples = [];       // { x, y, r, maxR, alpha, bornAt }
  let soundOn = true;
  let hintHidden = false;

  // ---------- audio ----------
  let ac = null;
  let master = null;
  let reverbNode = null;
  function ensureAudio() {
    if (ac) {
      if (ac.state === 'suspended') ac.resume();
      return;
    }
    try { ac = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { ac = null; return; }
    master = ac.createGain();
    master.gain.value = 0.55;
    master.connect(ac.destination);

    // Gentle convolver reverb (dry + wet)
    reverbNode = ac.createConvolver();
    const dur = 2.6;
    const rate = ac.sampleRate;
    const len = Math.floor(rate * dur);
    const buf = ac.createBuffer(2, len, rate);
    for (let ch = 0; ch < 2; ch++) {
      const d = buf.getChannelData(ch);
      for (let i = 0; i < len; i++) {
        const t = i / len;
        d[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, 2.6) * 0.5;
      }
    }
    reverbNode.buffer = buf;
    const wetGain = ac.createGain();
    wetGain.gain.value = 0.38;
    reverbNode.connect(wetGain).connect(master);
  }

  const PENTATONIC = [
    // lower, calmer register
    261.63, 293.66, 329.63, 392.00, 440.00,  // C4 D4 E4 G4 A4
    523.25, 587.33, 659.25, 783.99           // C5 D5 E5 G5
  ];

  function gentleTone(freq, dur = 1.8, vol = 0.18) {
    if (!soundOn) return;
    ensureAudio();
    if (!ac) return;
    const now = ac.currentTime;

    // triangle fundamental + sine octave blend = soft singing-bowl / marimba
    const o1 = ac.createOscillator();
    o1.type = 'triangle';
    o1.frequency.value = freq;
    const o2 = ac.createOscillator();
    o2.type = 'sine';
    o2.frequency.value = freq * 2.001;

    const g = ac.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(vol, now + 0.015);
    g.gain.exponentialRampToValueAtTime(0.001, now + dur);

    const o2Gain = ac.createGain();
    o2Gain.gain.value = 0.22;

    const filt = ac.createBiquadFilter();
    filt.type = 'lowpass';
    filt.frequency.value = 2400;
    filt.Q.value = 0.6;

    o1.connect(g);
    o2.connect(o2Gain).connect(g);
    g.connect(filt);
    filt.connect(master);
    filt.connect(reverbNode);

    o1.start(now); o2.start(now);
    o1.stop(now + dur); o2.stop(now + dur);
  }

  function softClick(vol = 0.06) {
    if (!soundOn) return;
    ensureAudio();
    if (!ac) return;
    const now = ac.currentTime;
    // Tiny filtered-noise blip for rake grain
    const len = Math.floor(ac.sampleRate * 0.06);
    const buf = ac.createBuffer(1, len, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1);
    const src = ac.createBufferSource();
    src.buffer = buf;
    const bp = ac.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = 1400 + Math.random() * 800;
    bp.Q.value = 1.2;
    const g = ac.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(vol, now + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
    src.connect(bp).connect(g).connect(master);
    src.start(now);
    src.stop(now + 0.1);
  }

  function pickNoteFromY(y) {
    // higher on canvas -> higher pitch
    const t = 1 - Math.max(0, Math.min(1, y / H));
    const idx = Math.floor(t * (PENTATONIC.length - 1) + Math.random() * 1.6);
    return PENTATONIC[Math.max(0, Math.min(PENTATONIC.length - 1, idx))];
  }

  // ---------- sand base (offscreen) ----------
  function buildSand() {
    sandCanvas = document.createElement('canvas');
    sandCanvas.width = canvas.width;
    sandCanvas.height = canvas.height;
    sandCtx = sandCanvas.getContext('2d');

    // Soft vertical gradient
    const g = sandCtx.createLinearGradient(0, 0, 0, sandCanvas.height);
    g.addColorStop(0, '#efe2c3');
    g.addColorStop(0.5, '#e6d6b2');
    g.addColorStop(1, '#d9c69a');
    sandCtx.fillStyle = g;
    sandCtx.fillRect(0, 0, sandCanvas.width, sandCanvas.height);

    // Subtle radial vignette for organic feel
    const rg = sandCtx.createRadialGradient(
      sandCanvas.width * 0.5, sandCanvas.height * 0.45, 0,
      sandCanvas.width * 0.5, sandCanvas.height * 0.5, sandCanvas.width * 0.75
    );
    rg.addColorStop(0, 'rgba(255,248,228,0.3)');
    rg.addColorStop(1, 'rgba(160,128,72,0.2)');
    sandCtx.fillStyle = rg;
    sandCtx.fillRect(0, 0, sandCanvas.width, sandCanvas.height);

    // Grain noise (subtle)
    const img = sandCtx.getImageData(0, 0, sandCanvas.width, sandCanvas.height);
    const data = img.data;
    for (let i = 0; i < data.length; i += 4) {
      const n = (Math.random() - 0.5) * 16;
      data[i]   = clamp255(data[i]   + n);
      data[i+1] = clamp255(data[i+1] + n * 0.95);
      data[i+2] = clamp255(data[i+2] + n * 0.85);
    }
    sandCtx.putImageData(img, 0, 0);

    // A scatter of larger flecks (grains of sand)
    for (let i = 0; i < sandCanvas.width * sandCanvas.height / 1200; i++) {
      const x = Math.random() * sandCanvas.width;
      const y = Math.random() * sandCanvas.height;
      const r = Math.random() * 1.2 + 0.3;
      sandCtx.fillStyle = 'rgba(120, 95, 60, 0.18)';
      sandCtx.beginPath();
      sandCtx.arc(x, y, r, 0, Math.PI * 2);
      sandCtx.fill();
    }
  }
  function clamp255(v) { return v < 0 ? 0 : v > 255 ? 255 : v; }

  // ---------- stones ----------
  function drawStone(s) {
    ctx.save();
    // cast soft shadow
    const sh = ctx.createRadialGradient(s.x + s.r * 0.15, s.y + s.r * 0.5, 0, s.x + s.r * 0.15, s.y + s.r * 0.5, s.r * 1.6);
    sh.addColorStop(0, 'rgba(40, 30, 15, 0.35)');
    sh.addColorStop(1, 'rgba(40, 30, 15, 0)');
    ctx.fillStyle = sh;
    ctx.beginPath();
    ctx.ellipse(s.x + s.r * 0.12, s.y + s.r * 0.45, s.r * 1.25, s.r * 0.6, 0, 0, Math.PI * 2);
    ctx.fill();

    // stone body
    const g = ctx.createRadialGradient(
      s.x - s.r * 0.25, s.y - s.r * 0.35, s.r * 0.1,
      s.x, s.y, s.r * 1.05
    );
    const topLight = s.lightColor;
    const midColor = s.midColor;
    const darkColor = s.darkColor;
    g.addColorStop(0, topLight);
    g.addColorStop(0.55, midColor);
    g.addColorStop(1, darkColor);
    ctx.fillStyle = g;
    ctx.beginPath();
    ctx.ellipse(s.x, s.y, s.r, s.r * 0.88, s.rot, 0, Math.PI * 2);
    ctx.fill();

    // subtle highlight
    ctx.globalAlpha = 0.45;
    ctx.fillStyle = 'rgba(255, 250, 230, 0.55)';
    ctx.beginPath();
    ctx.ellipse(s.x - s.r * 0.3, s.y - s.r * 0.35, s.r * 0.35, s.r * 0.18, s.rot, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  function hitStone(x, y) {
    for (let i = stones.length - 1; i >= 0; i--) {
      const s = stones[i];
      const dx = (x - s.x) / s.r;
      const dy = (y - s.y) / (s.r * 0.88);
      if (dx * dx + dy * dy <= 1) return i;
    }
    return -1;
  }

  function makeStone(x, y) {
    const r = 14 + Math.random() * 22;
    // Mute grey-to-warm grey palette
    const palettes = [
      { d: '#4e4d45', m: '#7b7a71', l: '#b9b4a7' },
      { d: '#5f574d', m: '#918878', l: '#c6bcab' },
      { d: '#3d3c36', m: '#6a695f', l: '#a6a295' },
      { d: '#6a5c4a', m: '#958771', l: '#cdbfa3' },
      { d: '#4a4e45', m: '#787e74', l: '#b4b8a8' }
    ];
    const p = palettes[Math.floor(Math.random() * palettes.length)];
    return {
      x, y, r,
      rot: Math.random() * Math.PI,
      darkColor: p.d, midColor: p.m, lightColor: p.l,
      placedAt: performance.now()
    };
  }

  // ---------- rake ----------
  function drawRakeStroke(stroke) {
    if (stroke.points.length < 2) return;
    const tines = stroke.tines;
    const sp = stroke.spacing;
    for (let t = 0; t < tines; t++) {
      const off = (t - (tines - 1) / 2) * sp;
      // main groove shadow
      ctx.beginPath();
      for (let i = 0; i < stroke.points.length; i++) {
        const p = stroke.points[i];
        let nx, ny;
        if (i === 0) {
          const q = stroke.points[Math.min(1, stroke.points.length - 1)];
          const dx = q.x - p.x, dy = q.y - p.y;
          const d = Math.hypot(dx, dy) || 1;
          nx = -dy / d; ny = dx / d;
        } else {
          const prev = stroke.points[i - 1];
          const dx = p.x - prev.x, dy = p.y - prev.y;
          const d = Math.hypot(dx, dy) || 1;
          nx = -dy / d; ny = dx / d;
        }
        const x = p.x + nx * off;
        const y = p.y + ny * off;
        if (i === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      // darker groove shadow (the dip)
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      ctx.lineWidth = 2.3;
      ctx.strokeStyle = 'rgba(120, 92, 52, 0.42)';
      ctx.stroke();

      // lighter highlight offset by 1px
      ctx.lineWidth = 1.2;
      ctx.strokeStyle = 'rgba(255, 246, 220, 0.38)';
      ctx.translate(0, 1);
      ctx.stroke();
      ctx.translate(0, -1);
    }
  }

  // ---------- ripples ----------
  function addRipple(x, y, maxR, alpha = 0.5) {
    ripples.push({ x, y, r: 0, maxR, alpha, bornAt: performance.now() });
  }
  function drawRipple(r, now) {
    const age = (now - r.bornAt) / 1200;
    if (age >= 1) return false;
    const e = 1 - Math.pow(1 - age, 2);
    r.r = r.maxR * e;
    const a = r.alpha * (1 - age);
    ctx.save();
    ctx.strokeStyle = `rgba(90, 70, 40, ${a})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.restore();
    return true;
  }

  // ---------- render loop ----------
  function render() {
    const now = performance.now();
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(sandCanvas, 0, 0);

    // rake strokes
    for (const s of strokes) drawRakeStroke(s);
    if (activeStroke) drawRakeStroke(activeStroke);

    // stones
    for (const s of stones) drawStone(s);

    // ripples
    ripples = ripples.filter(r => drawRipple(r, now));

    requestAnimationFrame(render);
  }

  // ---------- input ----------
  let pointerDown = false;
  let pointerMoved = false;
  let pressStart = 0;
  let pressStartXY = null;
  let lastEmittedAt = 0;

  function canvasPos(e) {
    const rect = canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left) * (canvas.width / rect.width);
    const y = (e.clientY - rect.top) * (canvas.height / rect.height);
    return { x, y };
  }

  wrap.addEventListener('pointerdown', (e) => {
    if (e.target.tagName === 'BUTTON') return;
    e.preventDefault();
    wrap.setPointerCapture(e.pointerId);
    ensureAudio();
    const p = canvasPos(e);
    pointerDown = true;
    pointerMoved = false;
    pressStart = performance.now();
    pressStartXY = p;

    // Start a potential rake stroke — committed only if pointer moves enough
    activeStroke = {
      points: [{ x: p.x, y: p.y }],
      tines: 5,
      spacing: 7 * DPR
    };
    hideHint();
  });

  wrap.addEventListener('pointermove', (e) => {
    if (!pointerDown || !activeStroke) return;
    const p = canvasPos(e);
    const last = activeStroke.points[activeStroke.points.length - 1];
    const dx = p.x - last.x, dy = p.y - last.y;
    const d = Math.hypot(dx, dy);
    if (d < 2 * DPR) return;
    activeStroke.points.push({ x: p.x, y: p.y });
    pointerMoved = true;

    // Very soft rake grain sound, rate-limited
    const now = performance.now();
    if (now - lastEmittedAt > 90) {
      lastEmittedAt = now;
      softClick(0.028 + Math.min(0.05, d / 400));
    }
  });

  wrap.addEventListener('pointerup', (e) => {
    if (!pointerDown) return;
    pointerDown = false;
    const p = canvasPos(e);
    const dur = performance.now() - pressStart;
    const dx = p.x - pressStartXY.x, dy = p.y - pressStartXY.y;
    const totalMoved = Math.hypot(dx, dy);

    if (pointerMoved && activeStroke && activeStroke.points.length >= 2 && totalMoved > 6 * DPR) {
      // Commit rake stroke
      strokes.push(activeStroke);
      activeStroke = null;
      // little descending tone at end of rake stroke
      const endNote = pickNoteFromY(p.y) * 0.5;
      gentleTone(endNote, 1.4, 0.07);
    } else {
      activeStroke = null;
      // Tap — place or remove stone
      const hit = hitStone(p.x, p.y);
      if (hit >= 0) {
        // remove stone
        const s = stones[hit];
        stones.splice(hit, 1);
        addRipple(s.x, s.y, s.r * 3.2, 0.45);
        gentleTone(pickNoteFromY(s.y) * 1.5, 1.4, 0.11);
      } else {
        const s = makeStone(p.x, p.y);
        stones.push(s);
        addRipple(p.x, p.y, s.r * 3.0, 0.55);
        gentleTone(pickNoteFromY(p.y), 2.2, 0.18);
      }
    }
  });

  wrap.addEventListener('pointercancel', () => {
    pointerDown = false;
    activeStroke = null;
  });

  // ---------- controls ----------
  smoothBtn.addEventListener('click', () => {
    if (strokes.length === 0 && stones.length === 0) return;
    // Gentle wave of ripples sweeping the garden
    const cx = canvas.width / 2;
    const cy = canvas.height / 2;
    addRipple(cx, cy, Math.hypot(canvas.width, canvas.height) * 0.6, 0.5);
    strokes = [];
    // Stones stay — it's the sand that gets smoothed. Feels right.
    gentleTone(196.00, 2.8, 0.16);    // G3
    setTimeout(() => gentleTone(293.66, 2.8, 0.12), 180);  // D4
  });

  soundBtn.addEventListener('click', () => {
    soundOn = !soundOn;
    soundBtn.textContent = soundOn ? '◉ sound' : '○ sound';
    if (soundOn) {
      ensureAudio();
      gentleTone(440.00, 1.4, 0.08);
    }
  });

  // ---------- resize ----------
  function resize() {
    const rect = wrap.getBoundingClientRect();
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.max(1, Math.floor(rect.width * DPR));
    canvas.height = Math.max(1, Math.floor(rect.height * DPR));
    buildSand();
    // Rescale existing stroke/stones? We'll keep their coordinates as-is; simplest.
  }
  window.addEventListener('resize', resize);
  resize();

  function hideHint() {
    if (hintHidden) return;
    hintHidden = true;
    tagline.classList.add('hide');
    setTimeout(() => title.classList.add('fade'), 2000);
  }

  // Start loop
  render();

  // Gentle welcome on first load — a quiet ambient chord once audio unlocks
  let unlocked = false;
  const unlock = () => {
    if (unlocked) return;
    unlocked = true;
    ensureAudio();
    setTimeout(() => gentleTone(261.63, 3.4, 0.1), 120);
    setTimeout(() => gentleTone(329.63, 3.4, 0.08), 360);
    setTimeout(() => gentleTone(392.00, 3.4, 0.07), 620);
    window.removeEventListener('pointerdown', unlock);
  };
  window.addEventListener('pointerdown', unlock);
})();
</script>
</body>
</html>
