<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fox Quest — Berry Platformer</title>
<link rel="icon" href="https://emojicdn.elk.sh/🦊">
<meta property="og:title" content="Fox Quest">
<meta property="og:description" content="Guide a fluffy fox through forests and caves collecting berries. WASD platformer with coyote jumps and particle effects.">
<meta property="og:url" content="https://sloppy.live/fox-quest">
<meta property="og:image" content="https://sloppy.live/fox-quest/og-image.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0a0e0a;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
}
canvas{display:block}
#ui{
  position:fixed;top:0;left:0;right:0;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 16px;background:rgba(10,14,10,.85);
  font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;color:#c8d8c0;
  border-bottom:1px solid #1a2a1a;
}
#ui .title{font-weight:800;font-size:17px;color:#ff9944;letter-spacing:2px}
#ui .stats{display:flex;gap:18px}
#ui .stats b{color:#ffcc44}
#ui .berry-icon{color:#e44060}
#start-screen,#death-screen,#win-screen{
  position:fixed;inset:0;z-index:20;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#0a0e0a;gap:12px;font-family:'Segoe UI',system-ui,sans-serif;color:#c8d8c0;
}
#start-screen h1,#win-screen h2{font-size:42px;font-weight:900;color:#ff9944;letter-spacing:4px}
#death-screen h2{font-size:34px;color:#e44060}
.sub-text{font-size:12px;color:#6a8a5a;letter-spacing:2px}
.info-text{font-size:13px;color:#8aaa7a}
.controls-text{font-size:11px;color:#5a7a4a;line-height:2;text-align:center}
.controls-text kbd{
  background:#1a2a1a;border:1px solid #2a4a2a;border-radius:3px;
  padding:2px 8px;color:#aaccaa;font-size:12px;
}
.btn{
  margin-top:6px;padding:12px 36px;border:none;border-radius:8px;
  background:#ff9944;color:#1a0a00;font-size:17px;font-weight:700;
  cursor:pointer;font-family:inherit;transition:all .15s;
}
.btn:hover{background:#ffbb66;transform:scale(1.05)}
.btn-retry{background:#e44060;color:#fff}
.btn-retry:hover{background:#ff6080}
#touch-controls{
  position:fixed;bottom:12px;left:0;right:0;z-index:15;
  display:none;justify-content:space-between;padding:0 16px;
}
.touch-zone{display:flex;gap:8px}
.touch-btn{
  width:56px;height:56px;border-radius:14px;
  background:rgba(255,153,68,.15);border:2px solid rgba(255,153,68,.3);
  color:#ff9944;font-size:18px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  user-select:none;-webkit-user-select:none;touch-action:manipulation;
  font-family:inherit;
}
.touch-btn:active{background:rgba(255,153,68,.35)}
.bl{position:fixed;bottom:4px;left:50%;transform:translateX(-50%);font-size:9px;opacity:.15;z-index:5}
.bl a{color:#6a8a5a;text-decoration:none;font-family:'Segoe UI',sans-serif}
@media(pointer:coarse){#touch-controls{display:flex}}
#death-screen{display:none}
#win-screen{display:none}
</style>
</head>
<body>
<div id="ui">
  <span class="title">FOX QUEST</span>
  <div class="stats">
    <span><span class="berry-icon">●</span> <b id="ui-berries">0</b>/<b id="ui-total">0</b></span>
    <span>Level <b id="ui-level">1</b></span>
    <span>Lives <b id="ui-lives">3</b></span>
  </div>
</div>

<div id="start-screen">
  <h1>FOX QUEST</h1>
  <div class="sub-text">A BERRY-COLLECTING ADVENTURE</div>
  <div class="controls-text">
    <kbd>W</kbd> / <kbd>↑</kbd> / <kbd>Space</kbd> Jump<br>
    <kbd>A</kbd> / <kbd>←</kbd> Left &nbsp; <kbd>D</kbd> / <kbd>→</kbd> Right
  </div>
  <button class="btn" id="start-btn">PLAY</button>
</div>

<div id="death-screen">
  <h2>OH NO!</h2>
  <div class="info-text" id="death-info"></div>
  <button class="btn btn-retry" id="retry-btn">TRY AGAIN</button>
</div>

<div id="win-screen">
  <h2>LEVEL COMPLETE!</h2>
  <div class="info-text" id="win-info"></div>
  <button class="btn" id="next-btn">NEXT LEVEL</button>
</div>

<div id="touch-controls">
  <div class="touch-zone">
    <button class="touch-btn" id="tb-left">◀</button>
    <button class="touch-btn" id="tb-right">▶</button>
  </div>
  <div class="touch-zone">
    <button class="touch-btn" id="tb-jump">▲</button>
  </div>
</div>

<canvas id="c"></canvas>
<div class="bl"><a href="https://sloppy.live">sloppy.live</a></div>

<script>
const C = document.getElementById('c');
const X = C.getContext('2d');

// ── Constants ──
const T = 32; // tile size
const G = 0.52;
const JUMP = -10.8;
const SPD = 4.5;
const FRIC = 0.82;
const MAXF = 12;

// ── State ──
let W, H, cols, rows, player, cam, keys={}, particles=[], frame=0;
let berries, totalBerries, lives, currentLv, running;

// ── Levels ──
const LVS = [
  { name:'Mossy Hollow', sky1:'#0a1a0a', sky2:'#0a0e14', map:[
    '................................',
    '................................',
    '..........B.....B...............',
    '.......####...####..............',
    '...B........................B..F',
    '..####...B..B.......B..########',
    '.........####.....####.........',
    '....B...........................',
    '...####....B........B..........',
    '..........####....####.........',
    '.P..B...........................',
    '####..####....####....####.....',
    '................................',
    'SSSSSSSSSSSSSSSSSSSSSSSSSSSSSSSS',
  ]},
  { name:'Bramble Ridge', sky1:'#141008', sky2:'#0a0e0a', map:[
    '................................',
    '......................F.........',
    '.....................####.......',
    '..................B.............',
    '...............####..B.........',
    '...........B.......####........',
    '..........####..................',
    '.......B.........B..............',
    '......####....####.............',
    '...B........B...................',
    '..####...####...................',
    '.P.............................B',
    '####..S...####..S...####..####.',
    'SSSSSSSSSSSSSSSSSSSSSSSSSSSSSSSS',
  ]},
  { name:'Thorn Cavern', sky1:'#0e0814', sky2:'#060410', map:[
    '..F.............................',
    '.####...........................',
    '......B.....B...................',
    '....####..####..................',
    '..........S...B.................',
    '.............####..B............',
    '...B.............####..........',
    '..####..S.......................',
    '........B......B..B............',
    '.....####...####..####.........',
    '..........S.....................',
    '.P......B.......................',
    '####.S..####.S..####.S..####...',
    'SSSSSSSSSSSSSSSSSSSSSSSSSSSSSSSS',
  ]},
  { name:'Crimson Falls', sky1:'#1a0808', sky2:'#0e0606', map:[
    '................................',
    '....................F...........',
    '...................####.........',
    '...............B..S.............',
    '.............####...............',
    '..........B......B..............',
    '.........####.####..............',
    '......S........S................',
    '.....B.....B....................',
    '....####.####...................',
    '..S..........S..................',
    '.P...B..B.......................',
    '####.S.####.S..####.S...####...',
    'SSSSSSSSSSSSSSSSSSSSSSSSSSSSSSSS',
  ]},
  { name:'Frozen Thicket', sky1:'#081018', sky2:'#040810', map:[
    '.............................F..',
    '............................####',
    '........................B.......',
    '.....................S.####.....',
    '...................B............',
    '................####.S..........',
    '..............B.................',
    '...........####.................',
    '........B.......B...............',
    '......####.S.####...............',
    '....B......B....................',
    '..####..####.S..................',
    '.P..............................',
    '####.S...####.S...####.S..####.',
    'SSSSSSSSSSSSSSSSSSSSSSSSSSSSSSSS',
  ]},
  { name:'The Den', sky1:'#100614', sky2:'#06020a', map:[
    '..............F.................',
    '.............####...............',
    '...........B....................',
    '..........####..................',
    '........S....S..................',
    '.......B......B.................',
    '......####..####................',
    '....S.............S.............',
    '...B........B...................',
    '..####.S..####.S................',
    '.........S......................',
    '......B.......B....B............',
    '.P...####..####..####...........',
    '####.S.........S.......S..####.',
    'SSSSSSSSSSSSSSSSSSSSSSSSSSSSSSSS',
  ]},
];

// ── Parse ──
let tiles, spikes, berryList, flag, startPos;

function parseLv(idx) {
  const lv = LVS[idx % LVS.length];
  tiles=[]; spikes=[]; berryList=[]; flag=null; startPos={x:64,y:320};
  const map = lv.map;
  rows = map.length; cols = map[0].length;
  for (let r=0; r<rows; r++) {
    for (let c=0; c<cols; c++) {
      const ch = map[r][c];
      const x=c*T, y=r*T;
      if (ch==='#') tiles.push({x,y,w:T,h:T});
      else if (ch==='S') spikes.push({x,y,w:T,h:T});
      else if (ch==='B') berryList.push({x:x+T/2,y:y+T/2,taken:false,bob:Math.random()*6.28});
      else if (ch==='F') flag={x,y:y-T/2};
      else if (ch==='P') startPos={x,y:y-T};
    }
  }
  totalBerries = berryList.length;
}

// ── Player ──
function mkPlayer() {
  return {
    x:startPos.x, y:startPos.y, vx:0, vy:0,
    w:24, h:30, grnd:false, face:1,
    jBuf:0, coyote:0, squash:1, legT:0, tailT:0,
  };
}

// ── Input ──
onkeydown = e => { keys[e.key.toLowerCase()]=true; if([32,37,38,39,40].includes(e.keyCode))e.preventDefault(); };
onkeyup = e => keys[e.key.toLowerCase()]=false;
function bindTouch(id,k){
  const el=document.getElementById(id);
  el.ontouchstart=e=>{e.preventDefault();keys[k]=true};
  el.ontouchend=e=>{e.preventDefault();keys[k]=false};
  el.onmousedown=()=>keys[k]=true;
  el.onmouseup=()=>keys[k]=false;
}
bindTouch('tb-left','a'); bindTouch('tb-right','d'); bindTouch('tb-jump','w');

// ── Physics ──
function update() {
  const p = player;
  p.legT += 0.15; p.tailT += 0.08;

  let mx=0;
  if (keys.a||keys.arrowleft){mx=-1;p.face=-1}
  if (keys.d||keys.arrowright){mx=1;p.face=1}
  p.vx += mx*1.3;
  p.vx *= FRIC;
  if (Math.abs(p.vx)>SPD) p.vx=Math.sign(p.vx)*SPD;
  if (Math.abs(p.vx)<.1) p.vx=0;

  const wj = keys.w||keys.arrowup||keys[' '];
  if (wj) p.jBuf=6;
  if (p.jBuf>0 && p.coyote>0){
    p.vy=JUMP; p.jBuf=0; p.coyote=0; p.squash=.7;
    spawn(p.x+p.w/2,p.y+p.h,4,'#aa8866','jump');
  }
  if (p.jBuf>0) p.jBuf--;

  p.vy+=G;
  if (p.vy>MAXF) p.vy=MAXF;

  p.x+=p.vx; collide('x');
  const wasG=p.grnd; p.grnd=false;
  p.y+=p.vy; collide('y');

  if (p.grnd){
    if (!wasG){p.squash=1.3;spawn(p.x+p.w/2,p.y+p.h,3,'#aa8866','land')}
    p.coyote=6;
  } else { if(p.coyote>0)p.coyote--; }
  p.squash+=(1-p.squash)*.2;

  if(p.x<0){p.x=0;p.vx=0}
  if(p.x+p.w>cols*T){p.x=cols*T-p.w;p.vx=0}

  // Spikes
  for (const s of spikes){
    if(boxHit(p.x+3,p.y+3,p.w-6,p.h-6,s.x+4,s.y+8,s.w-8,s.h-12)){die();return}
  }

  // Berries
  for (const b of berryList){
    if(b.taken) continue;
    const dx=(p.x+p.w/2)-b.x, dy=(p.y+p.h/2)-b.y;
    if(Math.sqrt(dx*dx+dy*dy)<20){
      b.taken=true; berries++;
      spawn(b.x,b.y,10,'#e44060','collect');
      spawn(b.x,b.y,4,'#ff88aa','collect');
      updateUI();
    }
  }

  // Flag
  if(flag){
    const dx=(p.x+p.w/2)-(flag.x+T/2), dy=(p.y+p.h/2)-(flag.y+T/2);
    if(Math.sqrt(dx*dx+dy*dy)<28) win();
  }

  if(p.y>rows*T+100) die();
}

function collide(axis){
  const p=player;
  for(const t of tiles){
    if(!boxHit(p.x,p.y,p.w,p.h,t.x,t.y,t.w,t.h)) continue;
    if(axis==='x'){
      if(p.vx>0)p.x=t.x-p.w; else if(p.vx<0)p.x=t.x+t.w;
      p.vx=0;
    } else {
      if(p.vy>0){p.y=t.y-p.h;p.vy=0;p.grnd=true}
      else if(p.vy<0){p.y=t.y+t.h;p.vy=0}
    }
  }
}

function boxHit(a,b,c,d,e,f,g,h){return a<e+g&&a+c>e&&b<f+h&&b+d>f}

// ── Particles ──
function spawn(x,y,n,col,type){
  for(let i=0;i<n;i++){
    particles.push({
      x,y,
      vx:(Math.random()-.5)*(type==='collect'?5:3),
      vy:-Math.random()*(type==='collect'?5:type==='jump'?3:1.5)-1,
      life:1, decay:.025+Math.random()*.03,
      size:type==='collect'?2+Math.random()*3:2+Math.random()*2,
      col,
    });
  }
}
function updatePart(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=.15;p.life-=p.decay;
    if(p.life<=0)particles.splice(i,1);
  }
}

// ── Camera ──
function updateCam(){
  const tx=player.x+player.w/2-W/2, ty=player.y+player.h/2-H/2;
  cam.x+=(tx-cam.x)*.1; cam.y+=(ty-cam.y)*.1;
  cam.x=Math.max(0,Math.min(cam.x,cols*T-W));
  cam.y=Math.max(0,Math.min(cam.y,rows*T-H));
}

// ── Draw ──
function draw(){
  const lv=LVS[currentLv%LVS.length];
  // Sky
  const grd=X.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,lv.sky1); grd.addColorStop(1,lv.sky2);
  X.fillStyle=grd; X.fillRect(0,0,W,H);

  // Stars
  X.fillStyle='rgba(255,255,255,.1)';
  const sd=currentLv*999;
  for(let i=0;i<35;i++){
    const sx=((sd+i*137)%1000)/1000*(cols*T)-cam.x*.3;
    const sy=((sd+i*251)%1000)/1000*(rows*T)-cam.y*.3;
    X.fillRect(((sx%W)+W)%W,((sy%H)+H)%H,1+((sd+i*73)%2),1+((sd+i*73)%2));
  }

  // Background trees (parallax)
  X.fillStyle='rgba(20,40,20,.4)';
  for(let i=0;i<8;i++){
    const tx=i*130-cam.x*.2;
    const bx=((tx%W)+W)%W;
    X.beginPath();
    X.moveTo(bx,H-40); X.lineTo(bx+15,H-120-i*8); X.lineTo(bx+30,H-40);
    X.fill();
  }

  X.save();
  X.translate(-Math.round(cam.x),-Math.round(cam.y));

  // Platforms
  for(const t of tiles){
    // Grass top
    X.fillStyle='#2a5a2a'; X.fillRect(t.x,t.y,t.w,t.h);
    X.fillStyle='#3a7a3a'; X.fillRect(t.x,t.y,t.w,5);
    X.fillStyle='rgba(255,255,255,.03)'; X.fillRect(t.x,t.y,2,t.h);
    // Grass blades
    X.strokeStyle='#4a9a4a'; X.lineWidth=1;
    for(let g=0;g<3;g++){
      const gx=t.x+4+g*10;
      X.beginPath(); X.moveTo(gx,t.y); X.lineTo(gx+2,t.y-4-g); X.stroke();
    }
  }

  // Spikes
  for(const s of spikes){
    X.fillStyle='#aa3030';
    X.beginPath(); X.moveTo(s.x+4,s.y+T); X.lineTo(s.x+T/2,s.y+6); X.lineTo(s.x+T-4,s.y+T); X.fill();
    X.fillStyle='#dd5050';
    X.beginPath(); X.moveTo(s.x+8,s.y+T); X.lineTo(s.x+T/2,s.y+12); X.lineTo(s.x+T-8,s.y+T); X.fill();
  }

  // Berries
  for(const b of berryList){
    if(b.taken) continue;
    const bob=Math.sin(frame*.06+b.bob)*3;
    const glow=.25+Math.sin(frame*.08+b.bob)*.15;
    // Glow
    X.fillStyle=`rgba(228,64,96,${glow})`;
    X.beginPath(); X.arc(b.x,b.y+bob,10,0,6.28); X.fill();
    // Berry body
    X.fillStyle='#e44060';
    X.beginPath(); X.arc(b.x,b.y+bob,6,0,6.28); X.fill();
    // Highlight
    X.fillStyle='rgba(255,180,200,.5)';
    X.beginPath(); X.arc(b.x-2,b.y+bob-2,2,0,6.28); X.fill();
    // Stem
    X.strokeStyle='#2a6a2a'; X.lineWidth=1.5; X.lineCap='round';
    X.beginPath(); X.moveTo(b.x,b.y+bob-6); X.lineTo(b.x+2,b.y+bob-10); X.stroke();
    // Leaf
    X.fillStyle='#3a8a3a';
    X.beginPath(); X.ellipse(b.x+3,b.y+bob-9,3,1.5,-.5,0,6.28); X.fill();
  }

  // Flag
  if(flag){
    const wv=Math.sin(frame*.08)*3;
    X.fillStyle='#888'; X.fillRect(flag.x+T/2-2,flag.y,4,T*1.5);
    X.fillStyle='#ff9944';
    X.beginPath();
    X.moveTo(flag.x+T/2+2,flag.y);
    X.lineTo(flag.x+T/2+22,flag.y+10+wv);
    X.lineTo(flag.x+T/2+2,flag.y+22);
    X.fill();
  }

  // Fox
  drawFox();

  // Particles
  for(const p of particles){
    X.globalAlpha=p.life;
    X.fillStyle=p.col;
    X.beginPath(); X.arc(p.x,p.y,p.size/2,0,6.28); X.fill();
  }
  X.globalAlpha=1;

  X.restore();

  // Berry count HUD at bottom
  if(running){
    const hudY=H-32, hudX=W/2;
    const collected=berries, total=totalBerries;
    X.fillStyle='rgba(10,14,10,.7)';
    X.beginPath(); X.roundRect(hudX-50,hudY-8,100,24,6); X.fill();
    X.fillStyle='#e44060'; X.font='bold 13px system-ui';
    X.textAlign='center'; X.textBaseline='middle';
    X.fillText('● '.repeat(Math.min(collected,10)).trim() + (collected>10?' +':''),hudX-10,hudY+4);
    X.fillStyle='#aaccaa'; X.font='12px system-ui';
    X.fillText(collected+'/'+total,hudX+30,hudY+4);
  }
}

function drawFox(){
  const p=player;
  const cx=p.x+p.w/2, cy=p.y+p.h/2;
  X.save();
  X.translate(cx,cy);
  const sy=p.squash, sx=2-sy;
  X.scale(sx*p.face,sy);

  const run=Math.abs(p.vx)>1;
  const legSwing=run?Math.sin(p.legT*3)*6:0;
  const tailWag=Math.sin(p.tailT*2)*(run?10:4);
  const earWag=Math.sin(p.tailT*2.5)*(run?5:2);

  // Tail
  X.strokeStyle='#dd7722'; X.lineWidth=5; X.lineCap='round';
  X.beginPath();
  X.moveTo(-8,6);
  X.quadraticCurveTo(-18,0+tailWag,-22,-8+tailWag);
  X.stroke();
  // Tail tip
  X.strokeStyle='#fff8ee'; X.lineWidth=4;
  X.beginPath();
  X.moveTo(-20,-6+tailWag); X.lineTo(-24,-10+tailWag);
  X.stroke();

  // Back leg
  X.strokeStyle='#cc6600'; X.lineWidth=4;
  X.beginPath(); X.moveTo(-3,10); X.lineTo(-5,16-legSwing); X.stroke();

  // Body (oval)
  X.fillStyle='#ee8833';
  X.beginPath(); X.ellipse(0,2,13,10,0,0,6.28); X.fill();
  // Belly
  X.fillStyle='#ffcc88';
  X.beginPath(); X.ellipse(2,5,8,6,0,0,6.28); X.fill();

  // Front leg
  X.strokeStyle='#dd7722'; X.lineWidth=4; X.lineCap='round';
  X.beginPath(); X.moveTo(5,10); X.lineTo(7,16+legSwing); X.stroke();
  // Paws
  X.fillStyle='#553300';
  X.beginPath(); X.arc(7,17+legSwing,2.5,0,6.28); X.fill();
  X.beginPath(); X.arc(-5,17-legSwing,2.5,0,6.28); X.fill();

  // Head
  X.fillStyle='#ee8833';
  X.beginPath(); X.ellipse(8,-6,9,8,-.15,0,6.28); X.fill();
  // Cheek
  X.fillStyle='#ffcc88';
  X.beginPath(); X.ellipse(11,-3,5,4,0,0,6.28); X.fill();

  // Ears
  X.fillStyle='#dd7722';
  // Left ear
  X.beginPath();
  X.moveTo(3,-10); X.lineTo(0+earWag,-22); X.lineTo(7,-12);
  X.fill();
  // Right ear
  X.beginPath();
  X.moveTo(11,-10); X.lineTo(14+earWag*.7,-22); X.lineTo(15,-11);
  X.fill();
  // Inner ears
  X.fillStyle='#ffbb88';
  X.beginPath();
  X.moveTo(4,-11); X.lineTo(2+earWag,-19); X.lineTo(6,-12); X.fill();
  X.beginPath();
  X.moveTo(12,-11); X.lineTo(13+earWag*.7,-19); X.lineTo(14,-12); X.fill();

  // Eyes
  const blink=(frame%200<4);
  if(!blink){
    X.fillStyle='#fff';
    X.beginPath(); X.ellipse(6,-7,2.8,3,.1,0,6.28); X.fill();
    X.beginPath(); X.ellipse(12,-7,2.8,3,.1,0,6.28); X.fill();
    // Pupils
    X.fillStyle='#221100';
    X.beginPath(); X.arc(6.5+p.face*.5,-7,1.4,0,6.28); X.fill();
    X.beginPath(); X.arc(12.5+p.face*.5,-7,1.4,0,6.28); X.fill();
    // Eye shine
    X.fillStyle='rgba(255,255,255,.6)';
    X.beginPath(); X.arc(5.5,-8,.8,0,6.28); X.fill();
    X.beginPath(); X.arc(11.5,-8,.8,0,6.28); X.fill();
  } else {
    X.strokeStyle='#553300'; X.lineWidth=1.5;
    X.beginPath(); X.moveTo(4,-7); X.lineTo(8,-7); X.stroke();
    X.beginPath(); X.moveTo(10,-7); X.lineTo(14,-7); X.stroke();
  }

  // Nose
  X.fillStyle='#331100';
  X.beginPath(); X.ellipse(15,-4,2,1.5,0,0,6.28); X.fill();

  // Mouth
  X.strokeStyle='#553300'; X.lineWidth=1;
  X.beginPath(); X.arc(14,-2,2,0,Math.PI*.6); X.stroke();

  // Whiskers
  X.strokeStyle='rgba(100,60,20,.3)'; X.lineWidth=.8;
  X.beginPath(); X.moveTo(15,-5); X.lineTo(22,-7); X.stroke();
  X.beginPath(); X.moveTo(15,-3); X.lineTo(22,-2); X.stroke();

  X.restore();
}

// ── Game flow ──
function die(){
  lives--;
  updateUI();
  if(lives<=0){
    running=false;
    spawn(player.x+player.w/2,player.y+player.h/2,20,'#e44060','collect');
    document.getElementById('death-info').textContent=`Collected ${berries}/${totalBerries} berries`;
    document.getElementById('death-screen').style.display='flex';
  } else {
    spawn(player.x+player.w/2,player.y+player.h/2,12,'#e44060','collect');
    player.x=startPos.x; player.y=startPos.y; player.vx=0; player.vy=0;
  }
}

function win(){
  running=false;
  document.getElementById('win-info').textContent=`${berries}/${totalBerries} berries collected!`;
  document.getElementById('win-screen').style.display='flex';
}

function startLv(idx){
  currentLv=idx;
  parseLv(idx);
  player=mkPlayer();
  cam={x:0,y:0};
  berries=0; particles=[]; frame=0; running=true;
  updateUI();
  document.getElementById('death-screen').style.display='none';
  document.getElementById('win-screen').style.display='none';
}

function startGame(){
  lives=3;
  document.getElementById('start-screen').style.display='none';
  startLv(0);
}

function updateUI(){
  document.getElementById('ui-level').textContent=currentLv+1;
  document.getElementById('ui-berries').textContent=berries;
  document.getElementById('ui-total').textContent=totalBerries;
  document.getElementById('ui-lives').textContent=lives;
}

// ── Resize ──
function resize(){
  W=Math.min(innerWidth,960); H=Math.min(innerHeight,640);
  C.width=W; C.height=H; C.style.width=W+'px'; C.style.height=H+'px';
}
onresize=resize; resize();

// ── Loop ──
function loop(){
  if(running){update();updateCam();updatePart();frame++}
  draw();
  requestAnimationFrame(loop);
}

// ── Events ──
document.getElementById('start-btn').onclick=startGame;
document.getElementById('retry-btn').onclick=()=>{lives=3;startLv(currentLv)};
document.getElementById('next-btn').onclick=()=>{
  if(currentLv+1<LVS.length)startLv(currentLv+1);
  else{lives=3;startLv(0)}
};

// Init
running=false; currentLv=0; lives=3; berries=0; totalBerries=0;
parseLv(0); player=mkPlayer(); cam={x:0,y:0};
loop();
</script>
