<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fox Quest — Berry Platformer</title>
<link rel="icon" href="https://emojicdn.elk.sh/🦊">
<meta property="og:title" content="Fox Quest">
<meta property="og:description" content="Guide a fluffy fox through forests and caves collecting berries. WASD platformer with coyote jumps and particle effects.">
<meta property="og:url" content="https://sloppy.live/fox-quest">
<meta property="og:image" content="https://sloppy.live/fox-quest/og-image.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0a0e0a;overflow:hidden;
  display:flex;align-items:center;justify-content:center;
  min-height:100vh;
}
canvas{display:block}
#ui{
  position:fixed;top:0;left:0;right:0;z-index:10;
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 16px;background:rgba(10,14,10,.85);
  font-family:'Segoe UI',system-ui,sans-serif;font-size:13px;color:#c8d8c0;
  border-bottom:1px solid #1a2a1a;
}
#ui .title{font-weight:800;font-size:17px;color:#ff9944;letter-spacing:2px}
#ui .stats{display:flex;gap:18px}
#ui .stats b{color:#ffcc44}
#ui .berry-icon{color:#e44060}
#start-screen,#death-screen,#win-screen{
  position:fixed;inset:0;z-index:20;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:#0a0e0a;gap:12px;font-family:'Segoe UI',system-ui,sans-serif;color:#c8d8c0;
}
#start-screen h1,#win-screen h2{font-size:42px;font-weight:900;color:#ff9944;letter-spacing:4px}
#death-screen h2{font-size:34px;color:#e44060}
.sub-text{font-size:12px;color:#6a8a5a;letter-spacing:2px}
.info-text{font-size:13px;color:#8aaa7a}
.controls-text{font-size:11px;color:#5a7a4a;line-height:2;text-align:center}
.controls-text kbd{
  background:#1a2a1a;border:1px solid #2a4a2a;border-radius:3px;
  padding:2px 8px;color:#aaccaa;font-size:12px;
}
.btn{
  margin-top:6px;padding:12px 36px;border:none;border-radius:8px;
  background:#ff9944;color:#1a0a00;font-size:17px;font-weight:700;
  cursor:pointer;font-family:inherit;transition:all .15s;
}
.btn:hover{background:#ffbb66;transform:scale(1.05)}
.btn-retry{background:#e44060;color:#fff}
.btn-retry:hover{background:#ff6080}
#skin-picker{display:flex;gap:14px;margin:10px 0 4px}
.skin-card{
  width:90px;padding:8px 6px 6px;border-radius:10px;cursor:pointer;
  border:2px solid #2a4a2a;background:rgba(20,30,20,.7);
  text-align:center;transition:all .15s;position:relative;
}
.skin-card:hover{border-color:#ff9944;transform:scale(1.06)}
.skin-card.selected{border-color:#ff9944;background:rgba(255,153,68,.12);box-shadow:0 0 12px rgba(255,153,68,.25)}
.skin-card canvas{display:block;margin:0 auto 4px;image-rendering:pixelated}
.skin-name{font-size:10px;color:#aaccaa;font-weight:700;letter-spacing:1px;text-transform:uppercase}
#touch-controls{
  position:fixed;bottom:12px;left:0;right:0;z-index:15;
  display:none;justify-content:space-between;padding:0 16px;
}
.touch-zone{display:flex;gap:8px}
.touch-btn{
  width:56px;height:56px;border-radius:14px;
  background:rgba(255,153,68,.15);border:2px solid rgba(255,153,68,.3);
  color:#ff9944;font-size:18px;font-weight:700;
  display:flex;align-items:center;justify-content:center;
  user-select:none;-webkit-user-select:none;touch-action:manipulation;
  font-family:inherit;
}
.touch-btn:active{background:rgba(255,153,68,.35)}
.bl{position:fixed;bottom:4px;left:50%;transform:translateX(-50%);font-size:9px;opacity:.15;z-index:5}
.bl a{color:#6a8a5a;text-decoration:none;font-family:'Segoe UI',sans-serif}
@media(pointer:coarse){#touch-controls{display:flex}}
#death-screen{display:none}
#win-screen{display:none}
</style>
</head>
<body>
<div id="ui">
  <span class="title">FOX QUEST</span>
  <div class="stats">
    <span><span class="berry-icon">●</span> <b id="ui-berries">0</b>/<b id="ui-total">0</b></span>
    <span>Level <b id="ui-level">1</b></span>
    <span>Lives <b id="ui-lives">3</b></span>
  </div>
</div>

<div id="start-screen">
  <h1>FOX QUEST</h1>
  <div class="sub-text">A BERRY-COLLECTING ADVENTURE</div>
  <div class="controls-text">
    <kbd>W</kbd> / <kbd>↑</kbd> / <kbd>Space</kbd> Jump (press again to double jump!)<br>
    <kbd>A</kbd> / <kbd>←</kbd> Left &nbsp; <kbd>D</kbd> / <kbd>→</kbd> Right<br>
    <kbd>Shift</kbd> + direction = Dash
  </div>
  <div id="skin-picker"></div>
  <button class="btn" id="start-btn">PLAY</button>
</div>

<div id="death-screen">
  <h2>OH NO!</h2>
  <div class="info-text" id="death-info"></div>
  <button class="btn btn-retry" id="retry-btn">TRY AGAIN</button>
</div>

<div id="win-screen">
  <h2>LEVEL COMPLETE!</h2>
  <div class="info-text" id="win-info"></div>
  <button class="btn" id="next-btn">NEXT LEVEL</button>
</div>

<div id="touch-controls">
  <div class="touch-zone">
    <button class="touch-btn" id="tb-left">◀</button>
    <button class="touch-btn" id="tb-right">▶</button>
  </div>
  <div class="touch-zone">
    <button class="touch-btn" id="tb-dash">⚡</button>

<canvas id="c"></canvas>
<div class="bl"><a href="https://sloppy.live">sloppy.live</a></div>

<script>
const C = document.getElementById('c');
const X = C.getContext('2d');

// ── Skins ──
const SKINS = [
  {
    id:'classic', name:'Classic',
    fur:'#ee8833', furDark:'#dd7722', furLight:'#cc6600',
    belly:'#ffcc88', nose:'#331100', eyeRim:'#553300',

    earInner:'#ffbb88', whiskerCol:'rgba(100,60,20,.3)',

  },
  {

    fur:'#cc22ff', furDark:'#aa00dd', furLight:'#9900bb',
    belly:'#ff66cc', nose:'#220033', eyeRim:'#440066',
    pawCol:'#ff88dd', tailTip:'#00ffff',
    vestMain:'#ff0066', vestDark:'#cc0044', vestNeck:'#ff66cc',
    bootMain:'#220044', bootTrim:'#00ffff',
    earInner:'#ff44aa', whiskerCol:'rgba(0,255,255,.4)',
    glow:'#ff00ff', hatType:null, eyePatch:false, monocle:false,
  },
  {
    id:'pirate', name:'Cyber-Pirate',
    fur:'#aa6633', furDark:'#885522', furLight:'#774411',
    belly:'#ddbb88', nose:'#221100', eyeRim:'#332200',
    pawCol:'#ddbb88', tailTip:'#ccaa77',
    vestMain:'#222222', vestDark:'#111111', vestNeck:'#ddbb88',
    bootMain:'#111111', bootTrim:'#cc3333',
    earInner:'#cc9966', whiskerCol:'rgba(80,50,20,.3)',
    glow:null, hatType:'pirate', eyePatch:true, monocle:false,
  },
  {
    id:'detective', name:'Detective',
    fur:'#cc8844', furDark:'#bb7733', furLight:'#aa6622',
    belly:'#ffe8cc', nose:'#2a1500', eyeRim:'#443300',
    pawCol:'#ffe8cc', tailTip:'#fff5e6',
    vestMain:'#5a4a3a', vestDark:'#3a2a1a', vestNeck:'#ffe8cc',
    bootMain:'#2a2a2a', bootTrim:'#8a7a6a',
    earInner:'#ddaa77', whiskerCol:'rgba(90,60,30,.35)',
    glow:null, hatType:null, eyePatch:false, monocle:true,
  },
  {
    id:'arctic', name:'Arctic Fox',
    fur:'#eef4ff', furDark:'#d0ddef', furLight:'#bccce0',
    belly:'#ffffff', nose:'#334455', eyeRim:'#556677',
    pawCol:'#ffffff', tailTip:'#ffffff',
    vestMain:'#5599cc', vestDark:'#3377aa', vestNeck:'#ffffff',
    bootMain:'#445566', bootTrim:'#5599cc',
    earInner:'#ddeeff', whiskerCol:'rgba(100,140,180,.3)',
    glow:null, hatType:null, eyePatch:false, monocle:false,
  },
];
let currentSkin=0;

// ── Constants ──
const T = 32; // tile size
const G = 0.52;
const JUMP = -10.8;
const SPD = 4.5;
const FRIC = 0.82;
const MAXF = 12;

// ── State ──
let W, H, cols, rows, player, cam, keys={}, particles=[], frame=0;
let berries, totalBerries, lives, currentLv, running;

// ── Levels ──
const LVS = [
  { name:'Mossy Hollow', sky1:'#0a1a0a', sky2:'#0a0e14', map:[
    '................................',
    '................................',
    '..........B.....B...............',
    '.......####...####..............',
    '...B........................B..F',
    '..####...B..B.......B..########',
    '.........####.....####.........',
    '....B...........................',
    '...####....B........B..........',
    '..........####....####.........',
    '.P..B...........................',
    '####..####....####....####.....',
    '................................',
    'SSSSSSSSSSSSSSSSSSSSSSSSSSSSSSSS',
  ]},
  { name:'Bramble Ridge', sky1:'#141008', sky2:'#0a0e0a', map:[
    '................................',
    '......................F.........',
    '.....................####.......',
    '..................B.............',
    '...............####..B.........',
    '...........B.......####........',
    '..........####..................',
    '.......B.........B..............',
    '......####....####.............',
    '...B........B...................',
    '..####...####...................',
    '.P.............................B',
    '####..S...####..S...####..####.',
    'SSSSSSSSSSSSSSSSSSSSSSSSSSSSSSSS',
  ]},
  { name:'Thorn Cavern', sky1:'#0e0814', sky2:'#060410', map:[
    '..F.............................',
    '.####...........................',
    '......B.....B...................',
    '....####..####..................',
    '..........S...B.................',
    '.............####..B............',
    '...B.............####..........',
    '..####..S.......................',
    '........B......B..B............',
    '.....####...####..####.........',
    '..........S.....................',
    '.P......B.......................',
    '####.S..####.S..####.S..####...',
    'SSSSSSSSSSSSSSSSSSSSSSSSSSSSSSSS',
  ]},
  { name:'Crimson Falls', sky1:'#1a0808', sky2:'#0e0606', map:[
    '................................',
    '....................F...........',
    '...................####.........',
    '...............B..S.............',
    '.............####...............',
    '..........B......B..............',
    '.........####.####..............',
    '......S........S................',
    '.....B.....B....................',
    '....####.####...................',
    '..S..........S..................',
    '.P...B..B.......................',
    '####.S.####.S..####.S...####...',
    'SSSSSSSSSSSSSSSSSSSSSSSSSSSSSSSS',
  ]},
  { name:'Frozen Thicket', sky1:'#081018', sky2:'#040810', map:[
    '.............................F..',
    '............................####',
    '........................B.......',
    '.....................S.####.....',
    '...................B............',
    '................####.S..........',
    '..............B.................',
    '...........####.................',
    '........B.......B...............',
    '......####.S.####...............',
    '....B......B....................',
    '..####..####.S..................',
    '.P..............................',
    '####.S...####.S...####.S..####.',
    'SSSSSSSSSSSSSSSSSSSSSSSSSSSSSSSS',
  ]},
  { name:'The Den', sky1:'#100614', sky2:'#06020a', map:[
    '..............F.................',
    '.............####...............',
    '...........B....................',
    '..........####..................',
    '........S....S..................',
    '.......B......B.................',
    '......####..####................',
    '....S.............S.............',
    '...B........B...................',
    '..####.S..####.S................',
    '.........S......................',
    '......B.......B....B............',
    '.P...####..####..####...........',
    '####.S.........S.......S..####.',
    'SSSSSSSSSSSSSSSSSSSSSSSSSSSSSSSS',
  ]},
];

// ── Parse ──
let tiles, spikes, berryList, flag, startPos;

function parseLv(idx) {
  const lv = LVS[idx % LVS.length];
  tiles=[]; spikes=[]; berryList=[]; flag=null; startPos={x:64,y:320};
  const map = lv.map;
  rows = map.length; cols = map[0].length;
  for (let r=0; r<rows; r++) {
    for (let c=0; c<cols; c++) {
      const ch = map[r][c];
      const x=c*T, y=r*T;
      if (ch==='#') tiles.push({x,y,w:T,h:T});
      else if (ch==='S') spikes.push({x,y,w:T,h:T});
      else if (ch==='B') berryList.push({x:x+T/2,y:y+T/2,taken:false,bob:Math.random()*6.28});
      else if (ch==='F') flag={x,y:y-T/2};
      else if (ch==='P') startPos={x,y:y-T};
    }
  }
  totalBerries = berryList.length;
}

// ── Player ──
function mkPlayer() {
  return {
    x:startPos.x, y:startPos.y, vx:0, vy:0,
    w:20, h:34, grnd:false, face:1,
    jBuf:0, coyote:0, squash:1, legT:0, tailT:0,
    jumps:0, maxJumps:2, // double jump
    dashCD:0, dashing:0, dashDir:0, // dash
  };
}

// ── Input ──
onkeydown = e => { keys[e.key.toLowerCase()]=true; if([32,37,38,39,40].includes(e.keyCode))e.preventDefault(); };
onkeyup = e => keys[e.key.toLowerCase()]=false;
function bindTouch(id,k){
  const el=document.getElementById(id);
  el.ontouchstart=e=>{e.preventDefault();keys[k]=true};
  el.ontouchend=e=>{e.preventDefault();keys[k]=false};
  el.onmousedown=()=>keys[k]=true;
  el.onmouseup=()=>keys[k]=false;
}
bindTouch('tb-left','a'); bindTouch('tb-right','d'); bindTouch('tb-jump','w'); bindTouch('tb-dash','shift');

// ── Physics ──
function update() {
  const p = player;
  p.legT += 0.15; p.tailT += 0.08;

  // Dash
  if (p.dashing>0) {
    p.vx = p.dashDir * 12;
    p.vy = 0;
    p.dashing--;
    if (frame%2===0) spawn(p.x+p.w/2,p.y+p.h/2,2,'#ffcc88','jump');
  }

  let mx=0;
  if (keys.a||keys.arrowleft){mx=-1;p.face=-1}
  if (keys.d||keys.arrowright){mx=1;p.face=1}

  // Dash trigger: double-tap direction (or shift+direction)
  if (p.dashCD>0) p.dashCD--;
  if ((keys.shift) && mx!==0 && p.dashCD<=0 && p.dashing<=0) {
    p.dashing=6; p.dashDir=mx; p.dashCD=30; p.squash=.6;
    spawn(p.x+p.w/2,p.y+p.h,6,'#ffaa44','collect');
  }

  if (p.dashing<=0) {
    p.vx += mx*1.3;
    p.vx *= FRIC;
    if (Math.abs(p.vx)>SPD) p.vx=Math.sign(p.vx)*SPD;
    if (Math.abs(p.vx)<.1) p.vx=0;
  }

  const wj = keys.w||keys.arrowup||keys[' '];
  if (wj) p.jBuf=6;
  // Ground jump (coyote time)
  if (p.jBuf>0 && p.coyote>0){
    p.vy=JUMP; p.jBuf=0; p.coyote=0; p.squash=.7; p.jumps=1;
    spawn(p.x+p.w/2,p.y+p.h,4,'#aa8866','jump');
  }
  // Double jump (air)
  else if (p.jBuf>0 && p.coyote<=0 && p.jumps<p.maxJumps && !p.grnd){
    p.vy=JUMP*0.85; p.jBuf=0; p.squash=.75; p.jumps++;
    spawn(p.x+p.w/2,p.y+p.h,6,'#ffcc44','collect');
  }
  if (p.jBuf>0) p.jBuf--;

  p.vy+=G;
  if (p.vy>MAXF) p.vy=MAXF;

  p.x+=p.vx; collide('x');
  const wasG=p.grnd; p.grnd=false;
  p.y+=p.vy; collide('y');

  if (p.grnd){
    if (!wasG){p.squash=1.3;spawn(p.x+p.w/2,p.y+p.h,3,'#aa8866','land')}
    p.coyote=6; p.jumps=0;
  } else { if(p.coyote>0)p.coyote--; }
  p.squash+=(1-p.squash)*.2;

  if(p.x<0){p.x=0;p.vx=0}
  if(p.x+p.w>cols*T){p.x=cols*T-p.w;p.vx=0}

  // Spikes
  for (const s of spikes){
    if(boxHit(p.x+3,p.y+3,p.w-6,p.h-6,s.x+4,s.y+8,s.w-8,s.h-12)){die();return}
  }

  // Berries
  for (const b of berryList){
    if(b.taken) continue;
    const dx=(p.x+p.w/2)-b.x, dy=(p.y+p.h/2)-b.y;
    if(Math.sqrt(dx*dx+dy*dy)<20){
      b.taken=true; berries++;
      spawn(b.x,b.y,10,'#e44060','collect');
      spawn(b.x,b.y,4,'#ff88aa','collect');
      updateUI();
    }
  }

  // Flag
  if(flag){
    const dx=(p.x+p.w/2)-(flag.x+T/2), dy=(p.y+p.h/2)-(flag.y+T/2);
    if(Math.sqrt(dx*dx+dy*dy)<28) win();
  }

  if(p.y>rows*T+100) die();
}

function collide(axis){
  const p=player;
  for(const t of tiles){
    if(!boxHit(p.x,p.y,p.w,p.h,t.x,t.y,t.w,t.h)) continue;
    if(axis==='x'){
      if(p.vx>0)p.x=t.x-p.w; else if(p.vx<0)p.x=t.x+t.w;
      p.vx=0;
    } else {
      if(p.vy>0){p.y=t.y-p.h;p.vy=0;p.grnd=true}
      else if(p.vy<0){p.y=t.y+t.h;p.vy=0}
    }
  }
}

function boxHit(a,b,c,d,e,f,g,h){return a<e+g&&a+c>e&&b<f+h&&b+d>f}

// ── Particles ──
function spawn(x,y,n,col,type){
  for(let i=0;i<n;i++){
    particles.push({
      x,y,
      vx:(Math.random()-.5)*(type==='collect'?5:3),
      vy:-Math.random()*(type==='collect'?5:type==='jump'?3:1.5)-1,
      life:1, decay:.025+Math.random()*.03,
      size:type==='collect'?2+Math.random()*3:2+Math.random()*2,
      col,
    });
  }
}
function updatePart(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=.15;p.life-=p.decay;
    if(p.life<=0)particles.splice(i,1);
  }
}

// ── Camera ──
function updateCam(){
  const tx=player.x+player.w/2-W/2, ty=player.y+player.h/2-H/2;
  cam.x+=(tx-cam.x)*.1; cam.y+=(ty-cam.y)*.1;
  cam.x=Math.max(0,Math.min(cam.x,cols*T-W));
  cam.y=Math.max(0,Math.min(cam.y,rows*T-H));
}

// ── Draw ──
function draw(){
  const lv=LVS[currentLv%LVS.length];
  // Sky
  const grd=X.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,lv.sky1); grd.addColorStop(1,lv.sky2);
  X.fillStyle=grd; X.fillRect(0,0,W,H);

  // Stars
  X.fillStyle='rgba(255,255,255,.1)';
  const sd=currentLv*999;
  for(let i=0;i<35;i++){
    const sx=((sd+i*137)%1000)/1000*(cols*T)-cam.x*.3;
    const sy=((sd+i*251)%1000)/1000*(rows*T)-cam.y*.3;
    X.fillRect(((sx%W)+W)%W,((sy%H)+H)%H,1+((sd+i*73)%2),1+((sd+i*73)%2));
  }

  // Background trees (parallax)
  X.fillStyle='rgba(20,40,20,.4)';
  for(let i=0;i<8;i++){
    const tx=i*130-cam.x*.2;
    const bx=((tx%W)+W)%W;
    X.beginPath();
    X.moveTo(bx,H-40); X.lineTo(bx+15,H-120-i*8); X.lineTo(bx+30,H-40);
    X.fill();
  }

  X.save();
  X.translate(-Math.round(cam.x),-Math.round(cam.y));

  // Platforms
  for(const t of tiles){
    // Grass top
    X.fillStyle='#2a5a2a'; X.fillRect(t.x,t.y,t.w,t.h);
    X.fillStyle='#3a7a3a'; X.fillRect(t.x,t.y,t.w,5);
    X.fillStyle='rgba(255,255,255,.03)'; X.fillRect(t.x,t.y,2,t.h);
    // Grass blades
    X.strokeStyle='#4a9a4a'; X.lineWidth=1;
    for(let g=0;g<3;g++){
      const gx=t.x+4+g*10;
      X.beginPath(); X.moveTo(gx,t.y); X.lineTo(gx+2,t.y-4-g); X.stroke();
    }
  }

  // Spikes
  for(const s of spikes){
    X.fillStyle='#aa3030';
    X.beginPath(); X.moveTo(s.x+4,s.y+T); X.lineTo(s.x+T/2,s.y+6); X.lineTo(s.x+T-4,s.y+T); X.fill();
    X.fillStyle='#dd5050';
    X.beginPath(); X.moveTo(s.x+8,s.y+T); X.lineTo(s.x+T/2,s.y+12); X.lineTo(s.x+T-8,s.y+T); X.fill();
  }

  // Berries
  for(const b of berryList){
    if(b.taken) continue;
    const bob=Math.sin(frame*.06+b.bob)*3;
    const glow=.25+Math.sin(frame*.08+b.bob)*.15;
    // Glow
    X.fillStyle=`rgba(228,64,96,${glow})`;
    X.beginPath(); X.arc(b.x,b.y+bob,10,0,6.28); X.fill();
    // Berry body
    X.fillStyle='#e44060';
    X.beginPath(); X.arc(b.x,b.y+bob,6,0,6.28); X.fill();
    // Highlight
    X.fillStyle='rgba(255,180,200,.5)';
    X.beginPath(); X.arc(b.x-2,b.y+bob-2,2,0,6.28); X.fill();
    // Stem
    X.strokeStyle='#2a6a2a'; X.lineWidth=1.5; X.lineCap='round';
    X.beginPath(); X.moveTo(b.x,b.y+bob-6); X.lineTo(b.x+2,b.y+bob-10); X.stroke();
    // Leaf
    X.fillStyle='#3a8a3a';
    X.beginPath(); X.ellipse(b.x+3,b.y+bob-9,3,1.5,-.5,0,6.28); X.fill();
  }

  // Flag
  if(flag){
    const wv=Math.sin(frame*.08)*3;
    X.fillStyle='#888'; X.fillRect(flag.x+T/2-2,flag.y,4,T*1.5);
    X.fillStyle='#ff9944';
    X.beginPath();
    X.moveTo(flag.x+T/2+2,flag.y);
    X.lineTo(flag.x+T/2+22,flag.y+10+wv);
    X.lineTo(flag.x+T/2+2,flag.y+22);
    X.fill();
  }

  // Dash afterimage
  if(player.dashing>0){
    X.globalAlpha=.2;
    X.save();
    X.translate(player.x+player.w/2-player.dashDir*8, player.y+player.h/2);
    X.fillStyle='#ffaa44';
    X.beginPath(); X.ellipse(0,0,16,12,0,0,6.28); X.fill();
    X.restore();
    X.globalAlpha=1;
  }

  // Fox
  drawFox();

  // Particles
  for(const p of particles){
    X.globalAlpha=p.life;
    X.fillStyle=p.col;
    X.beginPath(); X.arc(p.x,p.y,p.size/2,0,6.28); X.fill();
  }
  X.globalAlpha=1;

  X.restore();

  // Berry count HUD at bottom
  if(running){
    const hudY=H-32, hudX=W/2;
    const collected=berries, total=totalBerries;
    X.fillStyle='rgba(10,14,10,.7)';
    X.beginPath(); X.roundRect(hudX-50,hudY-8,100,24,6); X.fill();
    X.fillStyle='#e44060'; X.font='bold 13px system-ui';
    X.textAlign='center'; X.textBaseline='middle';
    X.fillText('● '.repeat(Math.min(collected,10)).trim() + (collected>10?' +':''),hudX-10,hudY+4);
    X.fillStyle='#aaccaa'; X.font='12px system-ui';
    X.fillText(collected+'/'+total,hudX+30,hudY+4);
  }
}

function drawFox(ctx,faceDir,fr,lT,tT,sq){
  // Can be called from game or preview. If no ctx, use game context.
  const isPreview=!!ctx;
  const p=isPreview?null:player;
  const sk=SKINS[currentSkin];
  if(!isPreview){
    ctx=X;
    faceDir=p.face; fr=frame; lT=p.legT; tT=p.tailT; sq=p.squash;
    ctx.save();
    ctx.translate(p.x+p.w/2,p.y+p.h/2);
  } else {
    ctx.save();
  }
  const sy=sq||1, sx=2-sy;
  ctx.scale(sx*(faceDir||1),sy);

  const run=isPreview?false:(Math.abs(p.vx)>1);
  const legSwing=run?Math.sin((lT||0)*3)*5:0;
  const tailWag=Math.sin((tT||0)*2)*(run?12:5);
  const earWag=Math.sin((tT||0)*2.5)*(run?4:2);
  const armSwing=run?Math.sin((lT||0)*3)*4:0;

  // Synthwave glow
  if(sk.glow){
    ctx.shadowColor=sk.glow; ctx.shadowBlur=8;
  }

  // Tail
  ctx.strokeStyle=sk.furDark; ctx.lineWidth=5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-4,2);
  ctx.quadraticCurveTo(-14,-4+tailWag,-18,-10+tailWag); ctx.stroke();
  ctx.strokeStyle=sk.tailTip; ctx.lineWidth=4;
  ctx.beginPath(); ctx.moveTo(-16,-8+tailWag); ctx.lineTo(-20,-13+tailWag); ctx.stroke();

  // Left leg
  ctx.strokeStyle=sk.furLight; ctx.lineWidth=3.5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-3,8); ctx.lineTo(-4,14-legSwing); ctx.stroke();
  ctx.fillStyle=sk.bootMain;
  ctx.beginPath(); ctx.roundRect(-7,13-legSwing,6,4,1.5); ctx.fill();
  ctx.fillStyle=sk.bootTrim;
  ctx.fillRect(-7,13-legSwing,6,1.5);

  // Body
  ctx.fillStyle=sk.fur;
  ctx.beginPath(); ctx.ellipse(0,0,8,11,0,0,6.28); ctx.fill();
  ctx.fillStyle=sk.belly;
  ctx.beginPath(); ctx.ellipse(1,2,5,7,0,0,6.28); ctx.fill();

  // Vest
  ctx.fillStyle=sk.vestMain;
  ctx.beginPath();
  ctx.moveTo(-6,-8); ctx.lineTo(-8,-4); ctx.lineTo(-7,5);
  ctx.lineTo(-3,7); ctx.lineTo(0,4);
  ctx.lineTo(3,7); ctx.lineTo(7,5);
  ctx.lineTo(8,-4); ctx.lineTo(6,-8);
  ctx.lineTo(3,-9); ctx.lineTo(0,-7); ctx.lineTo(-3,-9);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle=sk.vestNeck;
  ctx.beginPath(); ctx.moveTo(0,-7); ctx.lineTo(-2,3); ctx.lineTo(2,3); ctx.closePath(); ctx.fill();
  ctx.fillStyle=sk.vestDark;
  ctx.beginPath(); ctx.arc(2,-2,1,0,6.28); ctx.fill();
  ctx.beginPath(); ctx.arc(2,2,1,0,6.28); ctx.fill();
  ctx.strokeStyle=sk.vestDark; ctx.lineWidth=.8;
  ctx.beginPath(); ctx.moveTo(-6,-8); ctx.lineTo(-8,-4); ctx.lineTo(-7,5); ctx.lineTo(-3,7); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(6,-8); ctx.lineTo(8,-4); ctx.lineTo(7,5); ctx.lineTo(3,7); ctx.stroke();

  // Pirate skull-and-crossbones on vest
  if(sk.id==='pirate'){
    ctx.fillStyle='#cc3333'; ctx.font='bold 6px sans-serif'; ctx.textAlign='center';
    ctx.fillText('☠',1,-1);
  }

  // Arms
  ctx.shadowBlur=0;
  ctx.strokeStyle=sk.furDark; ctx.lineWidth=3; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(-7,-2); ctx.lineTo(-10,4+armSwing); ctx.stroke();
  ctx.fillStyle=sk.pawCol;
  ctx.beginPath(); ctx.arc(-10,5+armSwing,2,0,6.28); ctx.fill();
  ctx.strokeStyle=sk.furDark; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(7,-2); ctx.lineTo(10,4-armSwing); ctx.stroke();
  ctx.fillStyle=sk.pawCol;
  ctx.beginPath(); ctx.arc(10,5-armSwing,2,0,6.28); ctx.fill();

  // Right leg
  ctx.strokeStyle=sk.furDark; ctx.lineWidth=3.5; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(3,8); ctx.lineTo(4,14+legSwing); ctx.stroke();
  ctx.fillStyle=sk.bootMain;
  ctx.beginPath(); ctx.roundRect(1,13+legSwing,6,4,1.5); ctx.fill();
  ctx.fillStyle=sk.bootTrim;
  ctx.fillRect(1,13+legSwing,6,1.5);

  // Head
  if(sk.glow){ctx.shadowColor=sk.glow;ctx.shadowBlur=6}
  ctx.fillStyle=sk.fur;
  ctx.beginPath(); ctx.ellipse(2,-14,8,7,0,0,6.28); ctx.fill();
  ctx.fillStyle=sk.belly;
  ctx.beginPath(); ctx.ellipse(5,-12,4,3.5,0,0,6.28); ctx.fill();
  ctx.shadowBlur=0;

  // Ears
  ctx.fillStyle=sk.furDark;
  ctx.beginPath(); ctx.moveTo(-3,-18); ctx.lineTo(-5+earWag,-28); ctx.lineTo(2,-19); ctx.fill();
  ctx.beginPath(); ctx.moveTo(5,-18); ctx.lineTo(8+earWag*.7,-28); ctx.lineTo(9,-19); ctx.fill();
  ctx.fillStyle=sk.earInner;
  ctx.beginPath(); ctx.moveTo(-2,-19); ctx.lineTo(-3+earWag,-26); ctx.lineTo(1,-19); ctx.fill();
  ctx.beginPath(); ctx.moveTo(6,-19); ctx.lineTo(7+earWag*.7,-26); ctx.lineTo(8,-19); ctx.fill();

  // Eye patch (pirate)
  if(sk.eyePatch){
    ctx.fillStyle='#111';
    ctx.beginPath(); ctx.ellipse(-1,-15,3.5,3.5,0,0,6.28); ctx.fill();
    ctx.strokeStyle='#333'; ctx.lineWidth=1;
    ctx.beginPath(); ctx.moveTo(-3,-18); ctx.lineTo(-1,-15); ctx.lineTo(4,-18); ctx.stroke();
  }

  // Eyes
  const blink=((fr||0)%200<4);
  const fDir=(faceDir||1);
  if(!blink){
    // Left eye (hidden by patch for pirate)
    if(!sk.eyePatch){
      ctx.fillStyle='#fff';
      ctx.beginPath(); ctx.ellipse(-1,-15,2.5,2.8,.1,0,6.28); ctx.fill();
      ctx.fillStyle=sk.id==='synthwave'?'#ff00ff':'#221100';
      ctx.beginPath(); ctx.arc(-.5+fDir*.5,-15,1.3,0,6.28); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.6)';
      ctx.beginPath(); ctx.arc(-1.5,-16,.7,0,6.28); ctx.fill();
    }
    // Right eye
    ctx.fillStyle='#fff';
    ctx.beginPath(); ctx.ellipse(5,-15,2.5,2.8,.1,0,6.28); ctx.fill();
    ctx.fillStyle=sk.id==='synthwave'?'#ff00ff':'#221100';
    ctx.beginPath(); ctx.arc(5.5+fDir*.5,-15,1.3,0,6.28); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.6)';
    ctx.beginPath(); ctx.arc(4.5,-16,.7,0,6.28); ctx.fill();
  } else {
    if(!sk.eyePatch){
      ctx.strokeStyle=sk.eyeRim; ctx.lineWidth=1.5;
      ctx.beginPath(); ctx.moveTo(-3,-15); ctx.lineTo(1,-15); ctx.stroke();
    }
    ctx.strokeStyle=sk.eyeRim; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.moveTo(3,-15); ctx.lineTo(7,-15); ctx.stroke();
  }

  // Monocle (detective)
  if(sk.monocle){
    ctx.strokeStyle='#c8a860'; ctx.lineWidth=1.2;
    ctx.beginPath(); ctx.arc(5,-15,3.8,0,6.28); ctx.stroke();
    // Chain
    ctx.strokeStyle='#c8a860'; ctx.lineWidth=.6;
    ctx.beginPath(); ctx.moveTo(5,-11.2); ctx.quadraticCurveTo(6,-6,3,0); ctx.stroke();
    // Lens glint
    ctx.fillStyle='rgba(200,168,96,.15)';
    ctx.beginPath(); ctx.arc(5,-15,3.2,0,6.28); ctx.fill();
  }

  // Snout / nose
  ctx.fillStyle=sk.belly;
  ctx.beginPath(); ctx.ellipse(6,-11,3,2.5,0,0,6.28); ctx.fill();
  ctx.fillStyle=sk.nose;
  ctx.beginPath(); ctx.ellipse(8,-11,1.8,1.3,0,0,6.28); ctx.fill();

  // Mouth
  ctx.strokeStyle=sk.eyeRim; ctx.lineWidth=1;
  ctx.beginPath(); ctx.arc(7,-9.5,1.5,0,Math.PI*.6); ctx.stroke();

  // Whiskers
  ctx.strokeStyle=sk.whiskerCol; ctx.lineWidth=.8;
  ctx.beginPath(); ctx.moveTo(8,-12); ctx.lineTo(15,-14); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(8,-10); ctx.lineTo(15,-9); ctx.stroke();

  // Pirate hat
  if(sk.hatType==='pirate'){
    ctx.fillStyle='#1a1a1a';
    ctx.beginPath();
    ctx.moveTo(-8,-19); ctx.lineTo(-4,-20);
    ctx.quadraticCurveTo(2,-30,8,-20);
    ctx.lineTo(12,-19);
    ctx.quadraticCurveTo(10,-17,2,-17);
    ctx.quadraticCurveTo(-6,-17,-8,-19);
    ctx.fill();
    // Brim
    ctx.fillStyle='#2a2a2a';
    ctx.beginPath();
    ctx.ellipse(2,-18.5,11,2.5,0,0,6.28); ctx.fill();
    // Skull on hat
    ctx.fillStyle='#cccccc'; ctx.font='bold 5px sans-serif'; ctx.textAlign='center';
    ctx.fillText('☠',3,-23);
  }

  ctx.restore();
}

// ── Game flow ──
function die(){
  lives--;
  updateUI();
  if(lives<=0){
    running=false;
    spawn(player.x+player.w/2,player.y+player.h/2,20,'#e44060','collect');
    document.getElementById('death-info').textContent=`Collected ${berries}/${totalBerries} berries`;
    document.getElementById('death-screen').style.display='flex';
  } else {
    spawn(player.x+player.w/2,player.y+player.h/2,12,'#e44060','collect');
    player.x=startPos.x; player.y=startPos.y; player.vx=0; player.vy=0;
  }
}

function win(){
  running=false;
  document.getElementById('win-info').textContent=`${berries}/${totalBerries} berries collected!`;
  document.getElementById('win-screen').style.display='flex';
}

function startLv(idx){
  currentLv=idx;
  parseLv(idx);
  player=mkPlayer();
  cam={x:0,y:0};
  berries=0; particles=[]; frame=0; running=true;
  updateUI();
  document.getElementById('death-screen').style.display='none';
  document.getElementById('win-screen').style.display='none';
}

function startGame(){
  lives=3;
  document.getElementById('start-screen').style.display='none';
  startLv(0);
}

function updateUI(){
  document.getElementById('ui-level').textContent=currentLv+1;
  document.getElementById('ui-berries').textContent=berries;
  document.getElementById('ui-total').textContent=totalBerries;
  document.getElementById('ui-lives').textContent=lives;
}

// ── Resize ──
function resize(){
  W=Math.min(innerWidth,960); H=Math.min(innerHeight,640);
  C.width=W; C.height=H; C.style.width=W+'px'; C.style.height=H+'px';
}
onresize=resize; resize();

// ── Loop ──
function loop(){
  if(running){update();updateCam();updatePart();frame++}
  draw();
  requestAnimationFrame(loop);
}

// ── Events ──
document.getElementById('start-btn').onclick=startGame;
document.getElementById('retry-btn').onclick=()=>{lives=3;startLv(currentLv)};
document.getElementById('next-btn').onclick=()=>{
  if(currentLv+1<LVS.length)startLv(currentLv+1);
  else{lives=3;startLv(0)}
};

// ── Skin picker ──
function buildSkinPicker(){
  const wrap=document.getElementById('skin-picker');
  wrap.innerHTML='';
  SKINS.forEach((sk,i)=>{
    const card=document.createElement('div');
    card.className='skin-card'+(i===currentSkin?' selected':'');
    const cvs=document.createElement('canvas');
    cvs.width=60; cvs.height=60;
    const c2=cvs.getContext('2d');
    // Draw preview fox at center
    const prev=currentSkin; currentSkin=i;
    c2.save(); c2.translate(28,38);
    drawFox(c2,1,0,0,0,1);
    c2.restore();
    currentSkin=prev;
    const nm=document.createElement('div');
    nm.className='skin-name'; nm.textContent=sk.name;
    card.appendChild(cvs); card.appendChild(nm);
    card.onclick=()=>{
      currentSkin=i;
      document.querySelectorAll('.skin-card').forEach((c,j)=>c.classList.toggle('selected',j===i));
      try{localStorage.setItem('fox-quest-skin',i)}catch(e){}
    };
    wrap.appendChild(card);
  });
}
try{const s=localStorage.getItem('fox-quest-skin');if(s!==null)currentSkin=+s}catch(e){}

// Init
running=false; currentLv=0; lives=3; berries=0; totalBerries=0;
parseLv(0); player=mkPlayer(); cam={x:0,y:0};
buildSkinPicker();
loop();
</script>
