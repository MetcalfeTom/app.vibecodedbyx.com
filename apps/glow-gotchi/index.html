<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Glow-Gotchi</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0314">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%92%9C">
<meta name="description" content="A luminous neon blob. Pet it, feed it, let it nap. It remembers you between visits.">
<meta property="og:title" content="Glow-Gotchi">
<meta property="og:description" content="A luminous neon blob. Pet it, feed it, let it nap. It remembers you between visits.">
<meta property="og:url" content="https://sloppy.live/glow-gotchi">
<meta property="og:image" content="https://image.pollinations.ai/prompt/neon%20glowing%20cyan%20magenta%20slime%20blob%20creature%20with%20big%20cute%20eyes%2C%20synthwave%2C%20dark%20void%20background%2C%20Tamagotchi%20pet?width=1200&height=630&model=flux&seed=2727&nologo=true">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Major+Mono+Display&family=Fredoka:wght@400;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0a0314;
    --void-2:#15052a;
    --cyan:#5ce6ff;
    --pink:#ff5cc4;
    --gold:#ffd454;
    --violet:#9b5bff;
    --ink:#fff7ff;
    --silver:#a0a8c0;
    --silver-dim:#5a627a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  html,body{height:100%;overflow:hidden;background:var(--void);color:var(--ink);font-family:'Space Mono', monospace;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:manipulation}
  body{
    background:
      radial-gradient(ellipse 80% 60% at 50% 30%, rgba(155,91,255,0.16), transparent 60%),
      radial-gradient(ellipse 70% 50% at 50% 100%, rgba(255,92,196,0.12), transparent 60%),
      radial-gradient(ellipse 50% 30% at 50% 0%, rgba(92,230,255,0.10), transparent 60%),
      var(--void);
    display:flex;flex-direction:column;align-items:center;
  }
  /* synth-wave horizon grid */
  body::after{
    content:'';position:fixed;left:0;right:0;bottom:0;height:32vh;z-index:0;pointer-events:none;
    background:
      linear-gradient(to bottom, transparent, rgba(255,92,196,0.10) 50%, rgba(255,92,196,0.18) 100%),
      repeating-linear-gradient(90deg, transparent 0 6.9%, rgba(255,92,196,0.32) 6.9% 7.1%),
      repeating-linear-gradient(to bottom, transparent 0 22%, rgba(92,230,255,0.32) 22% 22.4%);
    transform:perspective(560px) rotateX(58deg);
    transform-origin:50% 0;
    mask-image:linear-gradient(to top, black, transparent);
    -webkit-mask-image:linear-gradient(to top, black, transparent);
  }
  header{
    text-align:center;padding:1rem 1rem 0.4rem;position:relative;z-index:3;width:100%;
  }
  h1{
    font-family:'Audiowide', monospace;
    font-size:clamp(1.8rem, 5vw, 3.2rem);
    letter-spacing:0.06em;
    background:linear-gradient(180deg, var(--cyan), var(--pink) 70%, var(--gold));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 10px rgba(255,92,196,0.4));
    line-height:1;
  }
  .tag{
    font-family:'Major Mono Display', monospace;font-size:clamp(0.7rem, 1.4vw, 0.9rem);
    letter-spacing:0.35em;color:var(--silver);margin-top:0.35rem;text-transform:lowercase;
  }
  main{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    width:100%;padding:0.5rem 1rem 7rem;position:relative;z-index:2;
  }
  /* Stat bars */
  .stats{
    position:fixed;top:5.5rem;left:50%;transform:translateX(-50%);
    display:flex;gap:0.7rem;flex-wrap:wrap;justify-content:center;
    z-index:5;background:rgba(10,3,20,0.72);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    padding:0.55rem 0.9rem;border:1px solid rgba(155,91,255,0.32);border-radius:0.5rem;
    box-shadow:0 0 18px rgba(155,91,255,0.18);
  }
  .stat{
    display:flex;flex-direction:column;align-items:flex-start;gap:0.2rem;min-width:6rem;
  }
  .stat-label{
    font-family:'Major Mono Display', monospace;font-size:0.6rem;letter-spacing:0.2em;
    color:var(--silver);text-transform:lowercase;display:flex;align-items:center;gap:0.3rem;
  }
  .stat-bar{
    width:6rem;height:0.55rem;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);
    border-radius:0.3rem;overflow:hidden;position:relative;
  }
  .stat-fill{
    height:100%;width:0;border-radius:0.3rem;transition:width 0.32s ease-out, background 0.35s;
    box-shadow:0 0 10px currentColor;
  }
  .stat[data-key="hunger"] .stat-fill{background:var(--cyan);color:var(--cyan)}
  .stat[data-key="love"] .stat-fill{background:var(--pink);color:var(--pink)}
  .stat[data-key="energy"] .stat-fill{background:var(--gold);color:var(--gold)}

  canvas{
    display:block;
    cursor:grab;
    touch-action:none;
  }
  canvas:active{cursor:grabbing}

  .speech{
    position:absolute;
    background:rgba(255,247,255,0.96);color:#1a0030;
    font-family:'Fredoka', sans-serif;font-weight:600;
    font-size:0.95rem;letter-spacing:0.01em;
    padding:0.5rem 0.85rem;border-radius:0.9rem;
    box-shadow:0 0 14px rgba(155,91,255,0.6), 0 0 28px rgba(255,92,196,0.35);
    pointer-events:none;z-index:4;
    opacity:0;transform:translate(-50%, 0) scale(0.85);
    transition:opacity 0.3s ease, transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
    white-space:nowrap;max-width:18rem;
  }
  .speech.show{opacity:1;transform:translate(-50%, -6px) scale(1)}
  .speech::after{
    content:'';position:absolute;left:50%;bottom:-7px;transform:translateX(-50%);
    width:0;height:0;border-left:9px solid transparent;border-right:9px solid transparent;
    border-top:9px solid rgba(255,247,255,0.96);
    filter:drop-shadow(0 1px 6px rgba(155,91,255,0.5));
  }

  .actions{
    position:fixed;bottom:1.4rem;left:50%;transform:translateX(-50%);
    display:flex;gap:0.7rem;flex-wrap:wrap;justify-content:center;
    z-index:6;
  }
  .action{
    background:linear-gradient(180deg, rgba(155,91,255,0.18), rgba(10,3,20,0.85));
    color:var(--ink);
    border:2px solid var(--violet);
    font-family:'Audiowide', monospace;font-size:0.95rem;letter-spacing:0.08em;
    padding:0.85rem 1.4rem;cursor:pointer;border-radius:0.6rem;
    min-height:2.75rem;min-width:2.75rem;
    box-shadow:0 0 14px rgba(155,91,255,0.35), inset 0 0 10px rgba(255,255,255,0.05);
    text-shadow:0 0 8px currentColor;
    transition:all 0.18s;
    display:flex;align-items:center;gap:0.5rem;
  }
  .action:hover{
    transform:translateY(-2px);
    box-shadow:0 4px 22px rgba(155,91,255,0.5), inset 0 0 12px rgba(255,255,255,0.1);
  }
  .action:active{transform:translateY(0) scale(0.96)}
  .action:focus-visible{outline:3px solid var(--ink);outline-offset:2px}
  .action[data-action="feed"]{border-color:var(--cyan);color:var(--cyan)}
  .action[data-action="pet"]{border-color:var(--pink);color:var(--pink)}
  .action[data-action="nap"]{border-color:var(--gold);color:var(--gold)}
  .action .emoji{font-family:initial}

  .hud-corner{
    position:fixed;top:0.6rem;right:0.6rem;display:flex;gap:0.4rem;z-index:5;
  }
  .hud-corner button{
    background:rgba(10,3,20,0.72);color:var(--silver);
    border:1px solid rgba(155,91,255,0.3);
    font-family:'Space Mono', monospace;font-size:0.65rem;letter-spacing:0.15em;text-transform:uppercase;
    padding:0.45rem 0.6rem;border-radius:0.3rem;cursor:pointer;min-height:2.5rem;min-width:2.5rem;
  }
  .hud-corner button:hover{border-color:var(--pink);color:var(--pink)}
  .hud-corner button:focus-visible{outline:2px solid var(--ink);outline-offset:2px}
  .hud-corner .pill{
    background:rgba(255,212,84,0.12);color:var(--gold);border-color:var(--gold);
    font-family:'Major Mono Display', monospace;font-size:0.7rem;
    padding:0.45rem 0.6rem;border-radius:0.3rem;border:1px solid;
  }

  @media (max-width: 540px){
    main{padding-top:1rem}
    .stats{top:5rem;gap:0.4rem;padding:0.4rem 0.6rem}
    .stat-bar{width:4.4rem}
    .stat-label{font-size:0.55rem}
    .action{padding:0.7rem 1rem;font-size:0.85rem}
    .speech{font-size:0.85rem;padding:0.4rem 0.7rem}
  }
  @media (prefers-reduced-motion: reduce){
    .stat-fill{transition:none}
    .speech{transition:opacity 0.2s linear}
    body::after{display:none}
  }
</style>
</head>
<body>
  <header>
    <h1>GLOW · GOTCHI</h1>
    <div class="tag">your luminous little friend</div>
  </header>

  <div class="stats" role="group" aria-label="Pet vitals">
    <div class="stat" data-key="hunger">
      <span class="stat-label">⌬ hunger</span>
      <div class="stat-bar"><div class="stat-fill" id="hungerBar"></div></div>
    </div>
    <div class="stat" data-key="love">
      <span class="stat-label">♡ love</span>
      <div class="stat-bar"><div class="stat-fill" id="loveBar"></div></div>
    </div>
    <div class="stat" data-key="energy">
      <span class="stat-label">⚡ energy</span>
      <div class="stat-bar"><div class="stat-fill" id="energyBar"></div></div>
    </div>
  </div>

  <main>
    <canvas id="petCanvas" role="img" aria-label="A glowing neon blob pet. Click and drag to squish. Use the buttons to feed, pet, or let it nap."></canvas>
    <div class="speech" id="speech" aria-live="polite" aria-atomic="true"></div>
  </main>

  <div class="hud-corner">
    <span class="pill" id="agePill">age 0</span>
    <button id="muteBtn" type="button" aria-pressed="false" aria-label="Toggle sound">♪ on</button>
    <button id="resetBtn" type="button" aria-label="Forget current pet and start fresh">↻</button>
  </div>

  <div class="actions" role="group" aria-label="Pet actions">
    <button class="action" data-action="feed" type="button"><span class="emoji">🍓</span>FEED</button>
    <button class="action" data-action="pet" type="button"><span class="emoji">✨</span>PET</button>
    <button class="action" data-action="nap" type="button"><span class="emoji">💤</span>NAP</button>
  </div>

<script>
(function(){
  'use strict';

  function showError(msg){
    try {
      var t = document.getElementById('errToast');
      if (!t){
        t = document.createElement('div');
        t.id = 'errToast';
        t.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#3a0610;color:#ffb6c1;font-family:monospace;font-size:11px;padding:8px 12px;border-bottom:1px solid #ff2bd6;white-space:pre-wrap';
        document.body.appendChild(t);
      }
      t.textContent = '⚠ ' + msg;
    } catch(_){}
  }
  window.addEventListener('error', function(ev){
    showError((ev.message || 'error') + ' @ ' + (ev.filename ? ev.filename.split('/').pop() : '?') + ':' + (ev.lineno || '?'));
  });

  var prefersReducedMotion = false;
  try { prefersReducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch(_){}

  var canvas = document.getElementById('petCanvas');
  var ctx;
  try { ctx = canvas.getContext('2d'); } catch(e){ showError('canvas init: ' + e.message); return; }
  if (!ctx){ showError('canvas 2d unavailable'); return; }

  var DPR = Math.min(window.devicePixelRatio || 1, 2);
  var W = 0, H = 0;

  function resize(){
    try {
      var cssW = Math.min(window.innerWidth - 32, 620);
      var cssH = Math.min(window.innerHeight - 240, 500);
      cssH = Math.max(280, cssH);
      cssW = Math.max(280, cssW);
      canvas.style.width = cssW + 'px';
      canvas.style.height = cssH + 'px';
      canvas.width = Math.floor(cssW * DPR);
      canvas.height = Math.floor(cssH * DPR);
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      W = cssW; H = cssH;
    } catch(e){ showError('resize: ' + e.message); }
  }
  resize();
  window.addEventListener('resize', resize);

  // ── State ──
  var STORAGE_KEY = 'glow-gotchi-v1';
  var STAT_DECAY_PER_S = { hunger: 0.0042, love: 0.0034, energy: 0.0028 };
  var ACTION_GAIN     = { feed: 0.32, pet: 0.22, nap: 0.36 };
  var pet = {
    hunger: 0.85, love: 0.80, energy: 0.85,
    age: 0, born: Date.now(),
    mood: 0.8,
    hue: 290,
    targetHue: 290,
    bounce: 0, squish: 0,
    squishX: 0, squishY: 0,
    sleeping: false, sleepUntil: 0,
    blink: 0, blinkUntil: 0,
    eyeTargetX: 0, eyeTargetY: 0, eyeX: 0, eyeY: 0,
    chompT: 0,
    petPulseT: 0,
    points: [],
    dragX: null, dragY: null
  };

  // perimeter spring points
  var POINTS = 16;
  for (var i = 0; i < POINTS; i++){
    pet.points.push({ angle: (i / POINTS) * Math.PI * 2, offset: 0, vel: 0 });
  }

  function saveState(){
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify({
        hunger: pet.hunger, love: pet.love, energy: pet.energy,
        age: pet.age, born: pet.born, last: Date.now()
      }));
    } catch(_){}
  }
  function loadState(){
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return false;
      var s = JSON.parse(raw);
      var elapsed = Math.min(60 * 60 * 24, (Date.now() - (s.last || Date.now())) / 1000);
      pet.hunger = Math.max(0, Math.min(1, (s.hunger || 0.5) - elapsed * STAT_DECAY_PER_S.hunger));
      pet.love   = Math.max(0, Math.min(1, (s.love || 0.5)   - elapsed * STAT_DECAY_PER_S.love));
      pet.energy = Math.max(0, Math.min(1, (s.energy || 0.5) - elapsed * STAT_DECAY_PER_S.energy));
      pet.age = (s.age || 0) + elapsed;
      pet.born = s.born || Date.now();
      return true;
    } catch(_){ return false; }
  }
  loadState();

  // ── Audio ──
  var audioCtx = null;
  var muted = false;
  function ensureAudio(){
    if (audioCtx){ if (audioCtx.state === 'suspended') audioCtx.resume(); return audioCtx; }
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(_){ audioCtx = null; }
    return audioCtx;
  }
  function tone(type, freq, dur, gain, slideTo, t0){
    var c = ensureAudio(); if (!c || muted) return;
    var o = c.createOscillator(); o.type = type;
    var t = t0 || c.currentTime;
    o.frequency.setValueAtTime(freq, t);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20, slideTo), t + dur);
    var g = c.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(gain, t + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g).connect(c.destination);
    o.start(t); o.stop(t + dur + 0.02);
  }
  function sndPet(){ tone('triangle', 880, 0.10, 0.16, 1320); tone('sine', 1320, 0.14, 0.10, 1660, ensureAudio() && audioCtx.currentTime + 0.05); }
  function sndFeed(){ tone('square', 320, 0.08, 0.10, 220); tone('triangle', 660, 0.12, 0.16, 980, ensureAudio() && audioCtx.currentTime + 0.06); tone('triangle', 980, 0.14, 0.14, 1320, ensureAudio() && audioCtx.currentTime + 0.13); }
  function sndNap(){ tone('sine', 480, 0.4, 0.10, 220); }
  function sndWake(){ tone('triangle', 440, 0.18, 0.14, 660); tone('triangle', 660, 0.18, 0.14, 880, ensureAudio() && audioCtx.currentTime + 0.10); }
  function sndSquish(){
    var c = ensureAudio(); if (!c || muted) return;
    var t = c.currentTime;
    var o = c.createOscillator(); o.type = 'sine';
    o.frequency.setValueAtTime(140, t);
    o.frequency.exponentialRampToValueAtTime(440, t + 0.06);
    o.frequency.exponentialRampToValueAtTime(220, t + 0.18);
    var g = c.createGain(); g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.10, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
    o.connect(g).connect(c.destination); o.start(t); o.stop(t + 0.25);
  }
  function sndSad(){ tone('sawtooth', 220, 0.34, 0.10, 90); }

  // ── Particles ──
  var particles = [];
  function spawnSparkles(x, y, hue, n){
    n = n || 12;
    for (var i = 0; i < n; i++){
      var ang = Math.random() * Math.PI * 2;
      var sp = 50 + Math.random() * 140;
      particles.push({
        x: x, y: y,
        vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp - 30,
        life: 0, ttl: 0.6 + Math.random() * 0.5,
        size: 2 + Math.random() * 3,
        hue: hue + (Math.random() - 0.5) * 40,
        type: 'sparkle'
      });
    }
  }
  function spawnFood(){
    // a few food bits that fall from top toward the blob
    var hues = [10, 320, 50];
    for (var i = 0; i < 3; i++){
      particles.push({
        x: W / 2 + (Math.random() - 0.5) * 30,
        y: 20 + i * 8,
        vx: (Math.random() - 0.5) * 30,
        vy: 60 + Math.random() * 40,
        life: 0, ttl: 1.4,
        size: 6 + Math.random() * 3,
        hue: hues[i % hues.length],
        type: 'food'
      });
    }
  }
  function spawnZ(){
    particles.push({
      x: W / 2 + 40 + (Math.random() - 0.5) * 12,
      y: H / 2 - 70,
      vx: 10 + Math.random() * 8, vy: -22,
      life: 0, ttl: 1.6,
      size: 18,
      type: 'zzz'
    });
  }

  // ── Actions ──
  var lastQuipT = 0;
  function showSpeech(text, dur){
    var sp = document.getElementById('speech');
    sp.textContent = text;
    sp.classList.add('show');
    var cssRect = canvas.getBoundingClientRect();
    var mainRect = document.querySelector('main').getBoundingClientRect();
    sp.style.left = (cssRect.left - mainRect.left + cssRect.width / 2) + 'px';
    sp.style.top = (cssRect.top - mainRect.top + cssRect.height * 0.18) + 'px';
    clearTimeout(showSpeech._t);
    showSpeech._t = setTimeout(function(){ sp.classList.remove('show'); }, dur || 2200);
  }

  function feed(){
    ensureAudio();
    if (pet.sleeping){ wake(); }
    var was = pet.hunger;
    pet.hunger = Math.min(1, pet.hunger + ACTION_GAIN.feed);
    pet.chompT = 0.4;
    pet.squish = 1.0;
    pet.bounce = 1.0;
    spawnFood();
    sndFeed();
    showSpeech(pickQuip('feed', was, pet.hunger));
    saveState();
  }
  function pet_(){
    ensureAudio();
    if (pet.sleeping){ wake(); }
    var was = pet.love;
    pet.love = Math.min(1, pet.love + ACTION_GAIN.pet);
    pet.petPulseT = 0.5;
    pet.squish = 0.6;
    spawnSparkles(W/2, H/2, pet.hue, 14);
    // squish points outward briefly
    for (var i = 0; i < pet.points.length; i++){
      pet.points[i].vel += (Math.random() * 2 - 0.5) * 4;
    }
    sndPet();
    showSpeech(pickQuip('pet', was, pet.love));
    saveState();
  }
  function nap(){
    ensureAudio();
    var was = pet.energy;
    pet.energy = Math.min(1, pet.energy + ACTION_GAIN.nap);
    pet.sleeping = true;
    pet.sleepUntil = performance.now() + 4500;
    sndNap();
    showSpeech('zzz...');
    saveState();
  }
  function wake(){
    pet.sleeping = false;
    sndWake();
  }

  // Quip pools — different by stat trend & current level
  var QUIPS = {
    feedHigh: ['mmm hot pixels', 'stuffed and shimmery', 'so chunky', 'thank you, light-mom', 'fed and feral'],
    feedLow:  ['FINALLY a snack', 'i was eating myself', 'food food food', 'crisis averted', 'rebooting tummy'],
    petHigh:  ['warm', 'electric purr', 'i love you back', '✨ vibes ✨', 'soft photons'],
    petLow:   ['needed that', 'okay maybe i was sad', 'sssssssssssssooft', 'less dim already', 'pet me again'],
    napHigh:  ['short blink', 'micro-snooze', 'rebooted', 'powernap engaged', 'dream complete'],
    napLow:   ['ahhh sleep', 'finally', 'zzzz fix', 'energy +'],
    idleHappy:['humming', '*glows*', 'good in here', 'all systems neon', 'love this light'],
    idleMid:  ['hm', 'pet?', 'snack?', '?', 'curious'],
    idleSad:  ['dimming...', 'cold pixels', 'tired', 'where r u', 'hello?', 'please'],
    sleeping: ['zzz', 'mmm dreams', 'soft static', 'zZz']
  };
  function pickQuip(action, was, now){
    var pool;
    if (action === 'feed') pool = (was < 0.3) ? QUIPS.feedLow : QUIPS.feedHigh;
    else if (action === 'pet') pool = (was < 0.3) ? QUIPS.petLow : QUIPS.petHigh;
    else if (action === 'nap') pool = (was < 0.3) ? QUIPS.napLow : QUIPS.napHigh;
    else pool = QUIPS.idleMid;
    return pool[Math.floor(Math.random() * pool.length)];
  }
  function pickIdleQuip(){
    if (pet.sleeping) return QUIPS.sleeping[Math.floor(Math.random() * QUIPS.sleeping.length)];
    var m = pet.mood;
    var pool;
    if (m > 0.75) pool = QUIPS.idleHappy;
    else if (m > 0.4) pool = QUIPS.idleMid;
    else pool = QUIPS.idleSad;
    return pool[Math.floor(Math.random() * pool.length)];
  }

  // ── Update ──
  var lastT = performance.now();
  var idleQuipNext = lastT + 5000;

  function update(now){
    var dt = Math.min(0.05, (now - lastT) / 1000);
    lastT = now;

    // age
    pet.age += dt;

    // stat decay
    var hungerLoss = STAT_DECAY_PER_S.hunger * (pet.sleeping ? 0.4 : 1) * dt;
    var loveLoss   = STAT_DECAY_PER_S.love   * (pet.sleeping ? 0.4 : 1) * dt;
    var energyLoss = STAT_DECAY_PER_S.energy * (pet.sleeping ? -2.0 : 1) * dt; // recover energy while sleeping
    pet.hunger = Math.max(0, Math.min(1, pet.hunger - hungerLoss));
    pet.love   = Math.max(0, Math.min(1, pet.love   - loveLoss));
    pet.energy = Math.max(0, Math.min(1, pet.energy - energyLoss));

    // mood = weighted composite
    pet.mood = (pet.hunger * 0.32 + pet.love * 0.42 + pet.energy * 0.26);

    // sleeping wake?
    if (pet.sleeping && now > pet.sleepUntil){ wake(); }

    // target hue from mood
    if (pet.mood > 0.75) pet.targetHue = 195;       // happy cyan-blue
    else if (pet.mood > 0.5) pet.targetHue = 285;   // contented violet
    else if (pet.mood > 0.25) pet.targetHue = 320;  // worried magenta
    else pet.targetHue = 210;                       // sad cool grey-blue
    var dh = ((pet.targetHue - pet.hue + 540) % 360) - 180;
    pet.hue += dh * Math.min(1, dt * 0.4);

    // decay action pulses
    pet.bounce = Math.max(0, pet.bounce - dt * 2.4);
    pet.squish = Math.max(0, pet.squish - dt * 2.2);
    pet.petPulseT = Math.max(0, pet.petPulseT - dt);
    pet.chompT = Math.max(0, pet.chompT - dt);

    // eye target — track cursor / drag
    var eyeTX, eyeTY;
    if (pet.dragX !== null && pet.dragY !== null){
      eyeTX = pet.dragX - W / 2;
      eyeTY = pet.dragY - H / 2;
    } else {
      eyeTX = (mouseX - W / 2);
      eyeTY = (mouseY - H / 2);
    }
    var emag = Math.hypot(eyeTX, eyeTY) || 1;
    var emax = 4;
    eyeTX = (eyeTX / emag) * Math.min(emax, emag / 8);
    eyeTY = (eyeTY / emag) * Math.min(emax, emag / 8);
    pet.eyeX += (eyeTX - pet.eyeX) * Math.min(1, dt * 6);
    pet.eyeY += (eyeTY - pet.eyeY) * Math.min(1, dt * 6);

    // blink scheduling
    if (now > pet.blinkUntil && !pet.sleeping){
      pet.blink = 0.12;
      pet.blinkUntil = now + 1800 + Math.random() * 3200;
    }
    pet.blink = Math.max(0, pet.blink - dt * 6);

    // perimeter spring update
    var breath = (pet.sleeping ? 4 : 6) * Math.sin(now * 0.0028 + 0.5) + (pet.sleeping ? Math.sin(now * 0.0018) * 3 : 0);
    for (var i = 0; i < pet.points.length; i++){
      var p = pet.points[i];
      p.vel += (-p.offset) * 0.06;
      p.vel *= 0.84;
      p.offset += p.vel * dt * 60;
    }

    // drag squish — push nearest perimeter point outward
    if (pet.dragX !== null){
      var ddx = pet.dragX - W / 2;
      var ddy = pet.dragY - H / 2;
      var dragAngle = Math.atan2(ddy, ddx);
      for (var j = 0; j < pet.points.length; j++){
        var pp = pet.points[j];
        var diff = Math.abs(((pp.angle - dragAngle + Math.PI * 3) % (Math.PI * 2)) - Math.PI);
        var influence = Math.max(0, 1 - diff / (Math.PI / 3));
        pp.vel += influence * 1.2;
      }
    }

    // particles
    for (var k = particles.length - 1; k >= 0; k--){
      var pa = particles[k];
      pa.life += dt;
      if (pa.life >= pa.ttl){ particles.splice(k, 1); continue; }
      if (pa.type === 'food'){
        pa.vy += 320 * dt;
        pa.x += pa.vx * dt; pa.y += pa.vy * dt;
        // consumed when reaches blob
        var ddx2 = pa.x - W/2, ddy2 = pa.y - H/2;
        var bod = Math.hypot(ddx2, ddy2);
        if (bod < pet.baseR + 6){
          spawnSparkles(pa.x, pa.y, pa.hue, 6);
          particles.splice(k, 1);
          // chomp twitch
          for (var pi = 0; pi < pet.points.length; pi++) pet.points[pi].vel += (Math.random()-0.5) * 1.2;
        }
      } else if (pa.type === 'zzz'){
        pa.x += pa.vx * dt;
        pa.y += pa.vy * dt;
        pa.vy += -20 * dt; // rise faster
      } else {
        pa.vx *= Math.pow(0.92, dt * 60);
        pa.vy += 220 * dt;
        pa.x += pa.vx * dt; pa.y += pa.vy * dt;
      }
    }

    // sleeping Z spawner
    if (pet.sleeping){
      if (Math.random() < dt * 1.6) spawnZ();
    }

    // dim-based sad alert — pulse a sad quip occasionally
    if (now > idleQuipNext){
      showSpeech(pickIdleQuip(), 2400);
      idleQuipNext = now + 7000 + Math.random() * 6000;
    }

    // save periodically
    if (now - (saveState._last || 0) > 4000){
      saveState();
      saveState._last = now;
    }
  }

  // ── Rendering ──
  function fillBars(){
    document.getElementById('hungerBar').style.width = (pet.hunger * 100).toFixed(1) + '%';
    document.getElementById('loveBar').style.width   = (pet.love * 100).toFixed(1) + '%';
    document.getElementById('energyBar').style.width = (pet.energy * 100).toFixed(1) + '%';
    document.getElementById('agePill').textContent = 'age ' + Math.floor(pet.age / 60) + 'm';
  }

  function drawBlob(now){
    var cx = W / 2;
    var cy = H / 2 + 14 + (pet.bounce * 12);
    var baseR = Math.min(W, H) * 0.30;
    pet.baseR = baseR;
    var squashY = 1 + pet.squish * 0.25 - pet.bounce * 0.10;
    var squashX = 1 - pet.squish * 0.15 + pet.bounce * 0.08;

    var breath = 6 * Math.sin(now * 0.0028) + (pet.sleeping ? 3 * Math.sin(now * 0.0018) : 0);

    // compute perimeter points
    var pts = [];
    for (var i = 0; i < pet.points.length; i++){
      var p = pet.points[i];
      var r = baseR + breath + p.offset * 4;
      pts.push({
        x: cx + Math.cos(p.angle) * r * squashX,
        y: cy + Math.sin(p.angle) * r * squashY
      });
    }

    // build smooth closed path via midpoint quadratic curves
    function tracePath(scale, dx, dy){
      var n = pts.length;
      ctx.beginPath();
      var p0 = pts[0], p1 = pts[1];
      var sx = cx + (p0.x - cx) * scale + dx, sy = cy + (p0.y - cy) * scale + dy;
      var ex = cx + (p1.x - cx) * scale + dx, ey = cy + (p1.y - cy) * scale + dy;
      ctx.moveTo((sx + ex) / 2, (sy + ey) / 2);
      for (var k = 0; k < n; k++){
        var a = pts[k], b = pts[(k + 1) % n];
        var ax = cx + (a.x - cx) * scale + dx, ay = cy + (a.y - cy) * scale + dy;
        var bx = cx + (b.x - cx) * scale + dx, by = cy + (b.y - cy) * scale + dy;
        var mx = (ax + bx) / 2, my = (ay + by) / 2;
        ctx.quadraticCurveTo(ax, ay, mx, my);
      }
      ctx.closePath();
    }

    // outer glow halos
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    var glowAlpha = 0.18 + pet.mood * 0.20 + pet.petPulseT * 0.4;
    for (var g = 4; g >= 1; g--){
      tracePath(1 + g * 0.06, 0, 0);
      ctx.fillStyle = 'hsla(' + pet.hue + ', 95%, 60%, ' + (glowAlpha * 0.18 / g) + ')';
      ctx.fill();
    }
    ctx.restore();

    // shadow under blob
    ctx.fillStyle = 'rgba(155,91,255,0.18)';
    ctx.beginPath();
    ctx.ellipse(cx, cy + baseR * squashY + 14, baseR * 0.85, baseR * 0.18, 0, 0, Math.PI * 2);
    ctx.fill();

    // body — radial gradient
    tracePath(1, 0, 0);
    var grad = ctx.createRadialGradient(cx - baseR * 0.3, cy - baseR * 0.4, baseR * 0.15, cx, cy, baseR * 1.3);
    var hue2 = (pet.hue + 50) % 360;
    grad.addColorStop(0, 'hsla(' + hue2 + ', 100%, 78%, 0.96)');
    grad.addColorStop(0.4, 'hsla(' + pet.hue + ', 95%, 58%, 0.95)');
    grad.addColorStop(1, 'hsla(' + ((pet.hue + 340) % 360) + ', 90%, 28%, 0.95)');
    ctx.fillStyle = grad;
    ctx.fill();

    // inner highlight
    ctx.save();
    tracePath(1, 0, 0);
    ctx.clip();
    var hi = ctx.createRadialGradient(cx - baseR * 0.4, cy - baseR * 0.5, 4, cx - baseR * 0.4, cy - baseR * 0.5, baseR * 0.7);
    hi.addColorStop(0, 'rgba(255,255,255,0.55)');
    hi.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = hi;
    ctx.fillRect(0, 0, W, H);
    // smaller specular dot
    var hi2 = ctx.createRadialGradient(cx - baseR * 0.55, cy - baseR * 0.55, 1, cx - baseR * 0.55, cy - baseR * 0.55, 14);
    hi2.addColorStop(0, 'rgba(255,255,255,0.95)');
    hi2.addColorStop(1, 'rgba(255,255,255,0)');
    ctx.fillStyle = hi2;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();

    // outline
    tracePath(1, 0, 0);
    ctx.strokeStyle = 'hsla(' + pet.hue + ', 100%, 75%, 0.7)';
    ctx.lineWidth = 2;
    ctx.shadowColor = 'hsla(' + pet.hue + ', 100%, 70%, 1)';
    ctx.shadowBlur = 14;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // ── Face ──
    var eyeSep = baseR * 0.32;
    var eyeY = cy - baseR * 0.10;
    var eyeR = baseR * 0.10;
    var pupilR = eyeR * 0.55;

    if (pet.sleeping){
      // closed eyes — arcs
      ctx.strokeStyle = '#0a0314';
      ctx.lineWidth = 3;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.arc(cx - eyeSep, eyeY, eyeR * 0.85, 0.15 * Math.PI, 0.85 * Math.PI);
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(cx + eyeSep, eyeY, eyeR * 0.85, 0.15 * Math.PI, 0.85 * Math.PI);
      ctx.stroke();
    } else {
      // sclera
      ctx.fillStyle = '#fff7ff';
      ctx.beginPath(); ctx.arc(cx - eyeSep, eyeY, eyeR, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + eyeSep, eyeY, eyeR, 0, Math.PI * 2); ctx.fill();
      // blink shutter
      if (pet.blink > 0){
        var blinkH = eyeR * 2 * (pet.blink / 0.12);
        ctx.fillStyle = 'hsla(' + pet.hue + ', 95%, 40%, 1)';
        ctx.fillRect(cx - eyeSep - eyeR, eyeY - eyeR, eyeR * 2, blinkH);
        ctx.fillRect(cx + eyeSep - eyeR, eyeY - eyeR, eyeR * 2, blinkH);
      }
      // pupils
      ctx.fillStyle = '#0a0314';
      ctx.beginPath(); ctx.arc(cx - eyeSep + pet.eyeX, eyeY + pet.eyeY, pupilR, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + eyeSep + pet.eyeX, eyeY + pet.eyeY, pupilR, 0, Math.PI * 2); ctx.fill();
      // catchlight
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(cx - eyeSep + pet.eyeX - pupilR * 0.35, eyeY + pet.eyeY - pupilR * 0.35, pupilR * 0.32, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + eyeSep + pet.eyeX - pupilR * 0.35, eyeY + pet.eyeY - pupilR * 0.35, pupilR * 0.32, 0, Math.PI * 2); ctx.fill();
    }

    // mouth
    var mouthY = cy + baseR * 0.22;
    ctx.lineCap = 'round';
    ctx.lineWidth = 3;
    ctx.strokeStyle = '#0a0314';
    if (pet.chompT > 0){
      // open chomp mouth
      var t = pet.chompT / 0.4;
      var openR = baseR * 0.18 * Math.sin(t * Math.PI);
      ctx.fillStyle = '#3a0a30';
      ctx.beginPath(); ctx.arc(cx, mouthY, openR + 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#ff7fb5';
      ctx.beginPath(); ctx.arc(cx, mouthY + openR * 0.3, openR * 0.6, 0, Math.PI * 2); ctx.fill();
    } else if (pet.sleeping){
      // small "o" mouth
      ctx.beginPath();
      ctx.arc(cx, mouthY, baseR * 0.04, 0, Math.PI * 2);
      ctx.stroke();
    } else if (pet.mood > 0.6){
      // smile
      ctx.beginPath();
      ctx.arc(cx, mouthY - baseR * 0.04, baseR * 0.16, 0.1 * Math.PI, 0.9 * Math.PI);
      ctx.stroke();
    } else if (pet.mood > 0.35){
      // neutral
      ctx.beginPath();
      ctx.moveTo(cx - baseR * 0.10, mouthY);
      ctx.lineTo(cx + baseR * 0.10, mouthY);
      ctx.stroke();
    } else {
      // frown
      ctx.beginPath();
      ctx.arc(cx, mouthY + baseR * 0.14, baseR * 0.14, 1.1 * Math.PI, 1.9 * Math.PI);
      ctx.stroke();
    }

    // cheeks when happy
    if (pet.mood > 0.7){
      ctx.fillStyle = 'hsla(330, 100%, 70%, 0.5)';
      ctx.beginPath(); ctx.arc(cx - eyeSep - 4, eyeY + eyeR * 1.3, baseR * 0.08, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(cx + eyeSep + 4, eyeY + eyeR * 1.3, baseR * 0.08, 0, Math.PI * 2); ctx.fill();
    }
  }

  function drawParticles(){
    for (var i = 0; i < particles.length; i++){
      var p = particles[i];
      var a = 1 - p.life / p.ttl;
      if (p.type === 'sparkle'){
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.fillStyle = 'hsla(' + p.hue + ', 100%, 70%, ' + a + ')';
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size * a + 1, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'hsla(' + p.hue + ', 100%, 85%, ' + (a * 0.7) + ')';
        ctx.fillRect(p.x - 0.5, p.y - p.size * 1.1, 1, p.size * 2.2);
        ctx.fillRect(p.x - p.size * 1.1, p.y - 0.5, p.size * 2.2, 1);
        ctx.restore();
      } else if (p.type === 'food'){
        ctx.save();
        ctx.shadowColor = 'hsl(' + p.hue + ', 100%, 65%)';
        ctx.shadowBlur = 12;
        ctx.fillStyle = 'hsl(' + p.hue + ', 100%, 60%)';
        ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = 'rgba(255,255,255,0.7)';
        ctx.beginPath(); ctx.arc(p.x - p.size * 0.35, p.y - p.size * 0.35, p.size * 0.3, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      } else if (p.type === 'zzz'){
        ctx.save();
        ctx.font = 'bold ' + p.size + 'px "Audiowide", monospace';
        ctx.fillStyle = 'rgba(92,230,255,' + a + ')';
        ctx.shadowColor = '#5ce6ff'; ctx.shadowBlur = 8;
        ctx.fillText('z', p.x, p.y);
        ctx.restore();
      }
    }
  }

  function render(now){
    // clear
    ctx.clearRect(0, 0, W, H);

    drawBlob(now);
    drawParticles();
  }

  // ── Input ──
  var mouseX = 0, mouseY = 0;
  canvas.addEventListener('pointermove', function(e){
    var r = canvas.getBoundingClientRect();
    mouseX = e.clientX - r.left;
    mouseY = e.clientY - r.top;
    if (pet.dragX !== null){
      pet.dragX = mouseX; pet.dragY = mouseY;
    }
  });
  canvas.addEventListener('pointerleave', function(){
    mouseX = W / 2; mouseY = H / 2;
  });
  canvas.addEventListener('pointerdown', function(e){
    canvas.setPointerCapture && canvas.setPointerCapture(e.pointerId);
    var r = canvas.getBoundingClientRect();
    mouseX = e.clientX - r.left; mouseY = e.clientY - r.top;
    // Check if pointer is roughly within blob
    var dx = mouseX - W / 2, dy = mouseY - H / 2;
    var d = Math.hypot(dx, dy);
    if (d < pet.baseR * 1.05){
      pet.dragX = mouseX; pet.dragY = mouseY;
      // tap counts as pet
      ensureAudio();
      pet_();
      sndSquish();
    }
  });
  canvas.addEventListener('pointerup', function(e){
    pet.dragX = null; pet.dragY = null;
    try { canvas.releasePointerCapture && canvas.releasePointerCapture(e.pointerId); } catch(_){}
  });
  canvas.addEventListener('pointercancel', function(){
    pet.dragX = null; pet.dragY = null;
  });

  // ── Buttons ──
  document.querySelector('[data-action="feed"]').addEventListener('click', feed);
  document.querySelector('[data-action="pet"]').addEventListener('click', pet_);
  document.querySelector('[data-action="nap"]').addEventListener('click', nap);

  document.addEventListener('keydown', function(e){
    if (e.target && e.target.tagName === 'INPUT') return;
    if (e.code === 'KeyF') feed();
    else if (e.code === 'KeyP' || e.code === 'Space'){ e.preventDefault(); pet_(); }
    else if (e.code === 'KeyN') nap();
  });

  var muteBtn = document.getElementById('muteBtn');
  muteBtn.addEventListener('click', function(){
    muted = !muted;
    muteBtn.textContent = muted ? '♪ off' : '♪ on';
    muteBtn.setAttribute('aria-pressed', muted ? 'true' : 'false');
    if (!muted) ensureAudio();
  });
  document.getElementById('resetBtn').addEventListener('click', function(){
    if (!confirm('Forget current pet and start over?')) return;
    try { localStorage.removeItem(STORAGE_KEY); } catch(_){}
    pet.hunger = 0.85; pet.love = 0.80; pet.energy = 0.85;
    pet.age = 0; pet.born = Date.now();
    pet.sleeping = false;
    showSpeech('hello world');
  });

  // ── Main loop ──
  function frame(now){
    update(now);
    render(now);
    fillBars();
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // Greet on load
  setTimeout(function(){
    showSpeech(loadState._wasLoaded ? 'you came back' : 'hi! 💜', 2400);
  }, 600);

})();
</script>
</body>
</html>
