<!DOCTYPE html>
<html lang="en">
<head>

<style>
  *,*::before,*::after{box-sizing:border-box}
  html{font-size:100%}
  html,body{margin:0;height:100%;background:#06031a;color:#e6e9ff;font-family:'IBM Plex Mono',monospace}
  body{
    overflow:hidden;
    background:
      radial-gradient(ellipse at 18% 18%, rgba(255,46,156,0.18), transparent 55%),
      radial-gradient(ellipse at 82% 82%, rgba(48,114,200,0.18), transparent 55%),
      radial-gradient(ellipse at 50% 110%, rgba(154,255,94,0.10), transparent 55%),
      linear-gradient(180deg, #07041a 0%, #04020e 100%);
  }
  /* skip link */
  .skip{position:absolute;left:-100vw;top:0;background:#0a0626;color:#eaeaff;padding:.5rem .9rem;border:1px solid #ff8ad6;z-index:99;font-size:.9rem}
  .skip:focus{left:1rem;top:1rem}

  main{
    height:100vh;display:flex;flex-direction:column;
  }
  header.brand{
    flex:0 0 auto;
    padding:1rem 1.2rem .35rem;
    display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:.5rem;
  }
  header.brand h1{
    margin:0;font-family:'Audiowide',cursive;font-size:1.45rem;letter-spacing:.2em;
    color:#fff;text-shadow:0 0 0.65rem rgba(255,138,214,0.55);
  }
  header.brand h1 .pink{color:#ff8ad6}
  header.brand h1 .lime{color:#9aff5e}
  header.brand .tag{
    font-family:'Space Mono',monospace;font-style:italic;font-size:.78rem;color:#cdb6ff;letter-spacing:.04em;
  }

  /* dock — top control row */
  .dock{
    flex:0 0 auto;
    padding:.4rem 1.2rem .6rem;
    display:flex;flex-wrap:wrap;align-items:center;gap:.6rem;
    border-bottom:1px solid rgba(255,138,214,0.18);
  }
  .dock fieldset{
    border:1px solid rgba(255,138,214,0.22);border-radius:.4rem;padding:.18rem .55rem .35rem;
    margin:0;display:flex;align-items:center;gap:.35rem;
  }
  .dock legend{
    padding:0 .35rem;font-size:.6rem;letter-spacing:.24em;text-transform:uppercase;color:#9aa0c8;
    font-family:'IBM Plex Mono',monospace;
  }
  .dock label{font-size:.7rem;color:#cdb6ff;letter-spacing:.04em}
  .btn{
    background:transparent;color:#e6e9ff;border:1px solid rgba(255,138,214,0.42);
    padding:.45rem .85rem;border-radius:.32rem;font-family:'IBM Plex Mono',monospace;
    font-size:.72rem;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;
    min-height:2.6rem;line-height:1;
    transition:background .15s, color .15s, border-color .15s, box-shadow .15s, transform .12s;
  }
  .btn:hover{background:rgba(255,138,214,0.12);color:#ff8ad6;border-color:#ff8ad6}
  .btn:active{transform:translateY(1px)}
  .btn:focus-visible{outline:3px solid #9aff5e;outline-offset:2px}
  .btn[aria-pressed="true"]{
    background:rgba(154,255,94,0.16);color:#9aff5e;border-color:#9aff5e;
    box-shadow:0 0 0.6rem rgba(154,255,94,0.45);
  }
  .btn.play{color:#9aff5e;border-color:rgba(154,255,94,0.5);font-size:1rem;padding:.4rem .9rem}
  .btn.play:hover{background:rgba(154,255,94,0.12);border-color:#9aff5e;color:#9aff5e}
  .btn.danger{color:#ff8ad6;border-color:rgba(255,138,214,0.5)}
  input[type=range]{
    accent-color:#ff8ad6;width:7rem;
  }
  select{
    background:#0a0626;color:#e6e9ff;border:1px solid rgba(255,138,214,0.42);
    padding:.4rem .55rem;border-radius:.3rem;font-family:'IBM Plex Mono',monospace;font-size:.74rem;
    min-height:2.4rem;cursor:pointer;
  }
  select:focus-visible{outline:3px solid #9aff5e;outline-offset:2px}

  /* canvas area */
  .stage{
    flex:1 1 auto;position:relative;min-height:0;
  }
  canvas#bars{
    position:absolute;inset:0;width:100%;height:100%;display:block;
  }

  /* HUD overlay */
  .hud{
    position:absolute;top:.7rem;right:.9rem;display:flex;flex-direction:column;gap:.3rem;align-items:flex-end;
    z-index:2;pointer-events:none;
  }
  .hud .pill{
    background:rgba(7,4,26,0.7);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(255,138,214,0.22);border-radius:.4rem;
    padding:.35rem .65rem;font-size:.7rem;letter-spacing:.18em;text-transform:uppercase;
    color:#cdb6ff;font-family:'IBM Plex Mono',monospace;line-height:1.2;
  }
  .hud .pill b{color:#fff;font-weight:600;margin-left:.35rem}
  .hud .pill.algo{color:#ff8ad6}
  .hud .pill.done{color:#9aff5e;border-color:rgba(154,255,94,0.4);box-shadow:0 0 0.7rem rgba(154,255,94,0.4)}

  /* legend left */
  .legend{
    position:absolute;left:.9rem;bottom:.9rem;display:flex;flex-direction:column;gap:.3rem;
    background:rgba(7,4,26,0.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(255,138,214,0.18);border-radius:.4rem;padding:.5rem .7rem;
    font-size:.66rem;color:#9aa0c8;letter-spacing:.04em;line-height:1.5;
    z-index:2;pointer-events:none;
  }
  .legend span.swatch{display:inline-block;width:.7rem;height:.7rem;vertical-align:middle;margin-right:.3rem;border-radius:.1rem;box-shadow:0 0 .4rem currentColor}
  .legend .cmp   {color:#7af0ff}
  .legend .swp   {color:#ffd45e}
  .legend .piv   {color:#b46bff}
  .legend .srt   {color:#9aff5e}

  /* responsive */
  @media (max-width: 760px){
    header.brand{padding:.6rem .8rem .2rem}
    header.brand h1{font-size:1.1rem}
    .dock{padding:.3rem .55rem .5rem;gap:.4rem}
    .dock fieldset{padding:.14rem .4rem .28rem}
    .legend{display:none}
    input[type=range]{width:5rem}
  }
  @media (prefers-reduced-motion: reduce){
    .btn{transition:none}
  }
</style>
</head>
<body>
<a class="skip" href="#bars">skip to visualization</a>

<main>
  <header class="brand" role="banner">
    <h1>neon<span class="pink">·</span>sort <span class="lime">/</span> dancing bars</h1>
    <span class="tag">bubble vs quicksort · synth tones · race them</span>
  </header>

  <div class="dock" role="toolbar" aria-label="Sort controls">
    <fieldset>
      <legend>Algorithm</legend>
      <label>
        <select id="algo" aria-label="Algorithm">
          <option value="bubble">Bubble Sort</option>
          <option value="quick">Quick Sort</option>
          <option value="insertion">Insertion Sort</option>
        </select>
      </label>
    </fieldset>
    <fieldset>
      <legend>Size</legend>
      <select id="size" aria-label="Array size">
        <option value="24">24</option>
        <option value="40" selected>40</option>
        <option value="64">64</option>
        <option value="96">96</option>
      </select>
    </fieldset>
    <fieldset>
      <legend>Speed</legend>
      <input type="range" id="speed" min="1" max="60" step="1" value="14" aria-label="Steps per frame">
    </fieldset>
    <button type="button" class="btn play" id="playBtn" aria-pressed="false" aria-label="Play / pause">▶</button>
    <button type="button" class="btn" id="stepBtn" aria-label="Step one comparison">▶│</button>
    <button type="button" class="btn" id="shuffleBtn" aria-label="Shuffle the array">↺ shuffle</button>
    <button type="button" class="btn" id="resetBtn" aria-label="Reset to ascending">≡ sorted</button>
    <button type="button" class="btn" id="muteBtn" aria-pressed="false" aria-label="Toggle audio">♪ on</button>
  </div>

  <div class="stage">
    <canvas id="bars" aria-label="Sorting visualization. Bars represent values; they wobble while idle, pulse on compare, and slide on swap."></canvas>
    <div class="hud" aria-live="polite">
      <div class="pill algo" id="hudAlgo">BUBBLE</div>
      <div class="pill"><span>compares</span><b id="hudCmp">0</b></div>
      <div class="pill"><span>swaps</span><b id="hudSwp">0</b></div>
      <div class="pill"><span>elapsed</span><b id="hudT">0.0s</b></div>
      <div class="pill" id="hudDone" hidden><b>★ sorted ★</b></div>
    </div>
    <div class="legend" aria-hidden="true">
      <div><span class="swatch cmp" style="background:currentColor"></span><span class="cmp">compare</span></div>
      <div><span class="swatch swp" style="background:currentColor"></span><span class="swp">swap</span></div>
      <div><span class="swatch piv" style="background:currentColor"></span><span class="piv">pivot</span></div>
      <div><span class="swatch srt" style="background:currentColor"></span><span class="srt">sorted</span></div>
    </div>
  </div>
</main>

<script>
(() => {
'use strict';

// =====================================================================
// neon-sort — bubble + quicksort + insertion as generators
// Each algorithm yields step events {kind, i, j?, val?} so the renderer
// drives one event per UI frame at the user's chosen speed.
// =====================================================================
const cvs = document.getElementById('bars');
const ctx = cvs.getContext('2d');
let dpr = Math.min(window.devicePixelRatio || 1, 2);
function fit(){
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  cvs.width  = Math.floor(cvs.clientWidth  * dpr);
  cvs.height = Math.floor(cvs.clientHeight * dpr);
}
window.addEventListener('resize', fit);

// ── ARRAY + BAR STATE ───────────────────────────────────────────────────
let bars = [];   // [{value, sortedAt, comparePulse, swapPulse, pivot}]
let N = 40;
function makeBars(n){
  bars = new Array(n);
  for (let i = 0; i < n; i++){
    bars[i] = {
      value: i + 1,
      phase: Math.random() * Math.PI * 2,
      jitter: Math.random() * 0.4 + 0.8,
      comparePulse: 0,   // 0..1, decays per frame
      swapPulse: 0,
      sorted: false,
      pivot: false,
    };
  }
  shuffle();
}
function shuffle(){
  // Fisher-Yates on the value field — keep cosmetic phase/jitter stable
  // so the bars retain their personality across re-shuffles.
  const vals = bars.map(b => b.value);
  for (let i = vals.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [vals[i], vals[j]] = [vals[j], vals[i]];
  }
  for (let i = 0; i < bars.length; i++){
    bars[i].value = vals[i];
    bars[i].sorted = false;
    bars[i].pivot = false;
    bars[i].comparePulse = 0;
    bars[i].swapPulse = 0;
  }
}
function setSorted(){
  for (let i = 0; i < bars.length; i++){
    bars[i].value = i + 1;
    bars[i].sorted = true;
    bars[i].pivot = false;
  }
}
function clearAnnotations(){
  for (const b of bars){ b.sorted = false; b.pivot = false; b.comparePulse = 0; b.swapPulse = 0; }
}

// ── ALGORITHMS — generators yielding step events ────────────────────────
function* bubbleGen(arr){
  const n = arr.length;
  for (let i = 0; i < n - 1; i++){
    let didSwap = false;
    for (let j = 0; j < n - i - 1; j++){
      yield { kind: 'compare', i: j, j: j + 1 };
      if (arr[j].value > arr[j + 1].value){
        yield { kind: 'swap', i: j, j: j + 1 };
        const tmp = arr[j].value; arr[j].value = arr[j + 1].value; arr[j + 1].value = tmp;
        didSwap = true;
      }
    }
    yield { kind: 'sorted', i: n - i - 1 };
    if (!didSwap){
      // already sorted — mark the rest as sorted
      for (let k = 0; k <= n - i - 2; k++) yield { kind: 'sorted', i: k };
      return;
    }
  }
  yield { kind: 'sorted', i: 0 };
}

function* quickGen(arr, lo, hi){
  if (lo === undefined){ lo = 0; hi = arr.length - 1; }
  if (lo < hi){
    yield { kind: 'pivot', i: hi };
    const pivVal = arr[hi].value;
    let p = lo - 1;
    for (let j = lo; j < hi; j++){
      yield { kind: 'compare', i: j, j: hi };
      if (arr[j].value <= pivVal){
        p++;
        if (p !== j){
          yield { kind: 'swap', i: p, j: j };
          const tmp = arr[p].value; arr[p].value = arr[j].value; arr[j].value = tmp;
        }
      }
    }
    yield { kind: 'swap', i: p + 1, j: hi };
    const tmp = arr[p + 1].value; arr[p + 1].value = arr[hi].value; arr[hi].value = tmp;
    yield { kind: 'sorted', i: p + 1 };
    yield { kind: 'unpivot', i: hi };
    yield* quickGen(arr, lo, p);
    yield* quickGen(arr, p + 2, hi);
  } else if (lo === hi){
    yield { kind: 'sorted', i: lo };
  }
}

function* insertionGen(arr){
  const n = arr.length;
  yield { kind: 'sorted', i: 0 };
  for (let i = 1; i < n; i++){
    let j = i;
    while (j > 0){
      yield { kind: 'compare', i: j, j: j - 1 };
      if (arr[j].value < arr[j - 1].value){
        yield { kind: 'swap', i: j, j: j - 1 };
        const tmp = arr[j].value; arr[j].value = arr[j - 1].value; arr[j - 1].value = tmp;
        j--;
      } else break;
    }
    yield { kind: 'sorted', i };
  }
}

// ── PLAYBACK STATE ──────────────────────────────────────────────────────
const state = {
  algo: 'bubble',
  gen: null,
  playing: false,
  speed: 14,            // events per frame
  cmp: 0,
  swp: 0,
  startedAt: 0,
  elapsed: 0,
  done: false,
  muted: false,
};

function startGen(){
  if (state.algo === 'bubble')   state.gen = bubbleGen(bars);
  else if (state.algo === 'quick')   state.gen = quickGen(bars);
  else                                state.gen = insertionGen(bars);
}

function reset(){
  clearAnnotations();
  shuffle();
  state.cmp = 0;
  state.swp = 0;
  state.elapsed = 0;
  state.startedAt = 0;
  state.done = false;
  startGen();
  document.getElementById('hudDone').hidden = true;
  refreshHud();
}

// ── EVENT HANDLER — applies one step, tweaks bar state ──────────────────
function applyEvent(ev){
  if (!ev) return;
  if (ev.kind === 'compare'){
    state.cmp++;
    bars[ev.i].comparePulse = 1;
    bars[ev.j].comparePulse = 1;
    playTone(bars[ev.i].value, 'compare');
  } else if (ev.kind === 'swap'){
    state.swp++;
    bars[ev.i].swapPulse = 1;
    bars[ev.j].swapPulse = 1;
    playTone(bars[ev.i].value, 'swap');
  } else if (ev.kind === 'sorted'){
    if (bars[ev.i]) bars[ev.i].sorted = true;
  } else if (ev.kind === 'pivot'){
    if (bars[ev.i]) bars[ev.i].pivot = true;
    playTone(bars[ev.i].value, 'pivot');
  } else if (ev.kind === 'unpivot'){
    if (bars[ev.i]) bars[ev.i].pivot = false;
  }
}

function step(){
  if (!state.gen){ startGen(); }
  const r = state.gen.next();
  if (r.done){
    if (!state.done){
      state.done = true;
      // final sweep
      for (const b of bars){ b.sorted = true; b.pivot = false; }
      document.getElementById('hudDone').hidden = false;
      playWinChord();
    }
    state.playing = false;
    refreshPlayBtn();
    return false;
  }
  applyEvent(r.value);
  return true;
}

// ── AUDIO — Web Audio synth tones, lazy-init on first user gesture ──────
let audioCtx = null, masterGain = null;
function ensureAudio(){
  if (audioCtx) return;
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.18;
    masterGain.connect(audioCtx.destination);
  } catch(e){ audioCtx = null; }
}
function playTone(value, kind){
  if (state.muted) return;
  ensureAudio();
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  // pitch from value (200-800 Hz)
  const freq = 220 + (value / N) * 660;
  o.type = kind === 'swap' ? 'sawtooth' : (kind === 'pivot' ? 'square' : 'triangle');
  o.frequency.setValueAtTime(freq, t);
  // little chirp on swap
  if (kind === 'swap') o.frequency.exponentialRampToValueAtTime(freq * 1.4, t + 0.06);
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(kind === 'swap' ? 0.25 : 0.16, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t + (kind === 'swap' ? 0.16 : 0.10));
  o.connect(g); g.connect(masterGain);
  o.start(t); o.stop(t + 0.18);
}
function playWinChord(){
  if (state.muted) return;
  ensureAudio();
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const freqs = [261.63, 329.63, 392.00, 523.25];   // C major
  freqs.forEach((f, i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'triangle';
    o.frequency.value = f;
    g.gain.setValueAtTime(0, t + i * 0.06);
    g.gain.linearRampToValueAtTime(0.18, t + i * 0.06 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + i * 0.06 + 0.7);
    o.connect(g); g.connect(masterGain);
    o.start(t + i * 0.06); o.stop(t + i * 0.06 + 0.8);
  });
}

// ── RENDER ──────────────────────────────────────────────────────────────
let beatPulse = 0;     // 0..1, decayed per frame, kicked on every event
function render(now){
  if (!cvs.clientWidth) return;
  const w = cvs.width, h = cvs.height;
  // soft trail fade for motion blur feel
  ctx.fillStyle = 'rgba(7, 4, 26, 0.42)';
  ctx.fillRect(0, 0, w, h);

  // grid lines (synthwave horizon)
  ctx.strokeStyle = 'rgba(255,138,214,0.06)';
  ctx.lineWidth = 1 * dpr;
  ctx.beginPath();
  for (let y = 0.2; y < 1.0; y += 0.2){
    ctx.moveTo(0, h * y); ctx.lineTo(w, h * y);
  }
  ctx.stroke();

  const padX = 24 * dpr;
  const padBot = 60 * dpr;
  const padTop = 24 * dpr;
  const totalW = w - padX * 2;
  const totalH = h - padBot - padTop;
  const barW = totalW / N;
  const gap = Math.max(1 * dpr, barW * 0.12);
  const innerW = barW - gap;

  const t = now / 1000;
  beatPulse = Math.max(0, beatPulse - 0.05);

  for (let i = 0; i < bars.length; i++){
    const b = bars[i];
    // dance: vertical wobble (idle) + amplified bump on event
    const idleWobble = Math.sin(t * 2.4 + b.phase) * 2 * dpr * b.jitter;
    const beatBoost  = (b.comparePulse + b.swapPulse) * 6 * dpr;
    const baseHeight = (b.value / N) * totalH;
    const height = baseHeight + idleWobble + beatBoost + beatPulse * 4 * dpr;
    const x = padX + i * barW + gap * 0.5;
    const y = h - padBot - height;

    // hue from value — sorted array is a clean rainbow
    const hue = (b.value / N) * 320 + 220;   // 220..540 mod 360 → blue → cyan → green → yellow → pink
    const sat = 95;
    const lum = b.sorted ? 62 : 55;

    // glow halo — stronger when interacting
    const glow = 6 + (b.comparePulse + b.swapPulse) * 14 + (b.pivot ? 12 : 0) + (b.sorted ? 4 : 0);
    ctx.shadowColor = b.pivot ? '#b46bff'
                    : b.swapPulse > 0.05 ? '#ffd45e'
                    : b.comparePulse > 0.05 ? '#7af0ff'
                    : `hsl(${hue}, ${sat}%, ${lum}%)`;
    ctx.shadowBlur = glow * dpr;

    // body
    const grad = ctx.createLinearGradient(x, y, x, y + height);
    grad.addColorStop(0, `hsl(${hue}, ${sat}%, ${Math.min(85, lum + 18)}%)`);
    grad.addColorStop(1, `hsl(${hue}, ${sat}%, ${Math.max(20, lum - 18)}%)`);
    ctx.fillStyle = grad;
    roundRect(ctx, x, y, innerW, height, Math.min(innerW * 0.4, 4 * dpr));
    ctx.fill();

    // top cap — bright sparkle
    if (b.sorted){
      ctx.fillStyle = '#9aff5e';
      ctx.shadowColor = '#9aff5e';
      ctx.shadowBlur = 10 * dpr;
      ctx.fillRect(x, y, innerW, 2 * dpr);
    } else if (b.swapPulse > 0.05){
      ctx.fillStyle = '#ffd45e';
      ctx.fillRect(x, y, innerW, 2 * dpr);
    } else if (b.comparePulse > 0.05){
      ctx.fillStyle = '#7af0ff';
      ctx.fillRect(x, y, innerW, 2 * dpr);
    } else if (b.pivot){
      ctx.fillStyle = '#b46bff';
      ctx.fillRect(x, y, innerW, 2 * dpr);
    }

    // pivot frame
    if (b.pivot){
      ctx.shadowBlur = 0;
      ctx.strokeStyle = '#b46bff';
      ctx.lineWidth = 1.5 * dpr;
      ctx.strokeRect(x - 1, y - 1, innerW + 2, height + 2);
    }

    // floor reflection — subtle
    ctx.shadowBlur = 0;
    const refGrad = ctx.createLinearGradient(x, h - padBot, x, h - padBot + 18 * dpr);
    refGrad.addColorStop(0, `hsla(${hue}, ${sat}%, ${lum}%, 0.32)`);
    refGrad.addColorStop(1, 'rgba(7,4,26,0)');
    ctx.fillStyle = refGrad;
    ctx.fillRect(x, h - padBot, innerW, 18 * dpr);

    // pulse decay
    b.comparePulse *= 0.86;
    b.swapPulse    *= 0.88;
  }

  // baseline floor line
  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(255,138,214,0.4)';
  ctx.lineWidth = 1 * dpr;
  ctx.beginPath();
  ctx.moveTo(padX, h - padBot);
  ctx.lineTo(w - padX, h - padBot);
  ctx.stroke();
}
function roundRect(ctx, x, y, w, h, r){
  if (h < 0){ y += h; h = -h; }
  if (h < 1){ ctx.fillRect(x, y, w, 1); return; }
  if (w < 2 * r) r = w * 0.5;
  if (h < 2 * r) r = h * 0.5;
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
  ctx.fill();
}

// ── HUD ─────────────────────────────────────────────────────────────────
function refreshHud(){
  document.getElementById('hudCmp').textContent = state.cmp.toLocaleString();
  document.getElementById('hudSwp').textContent = state.swp.toLocaleString();
  document.getElementById('hudT').textContent = state.elapsed.toFixed(1) + 's';
  document.getElementById('hudAlgo').textContent =
    state.algo === 'bubble' ? 'BUBBLE' :
    state.algo === 'quick'  ? 'QUICK'  : 'INSERTION';
}
function refreshPlayBtn(){
  const btn = document.getElementById('playBtn');
  btn.textContent = state.playing ? '❚❚' : '▶';
  btn.setAttribute('aria-pressed', state.playing ? 'true' : 'false');
}

// ── MAIN LOOP ───────────────────────────────────────────────────────────
let lastT = performance.now();
function loop(now){
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  if (state.playing && !state.done){
    if (state.startedAt === 0) state.startedAt = now;
    state.elapsed += dt;
    for (let s = 0; s < state.speed; s++){
      if (!step()) break;
      beatPulse = Math.min(1, beatPulse + 0.04);
    }
    refreshHud();
  }
  render(now);
  requestAnimationFrame(loop);
}

// ── WIRING ──────────────────────────────────────────────────────────────
document.getElementById('algo').addEventListener('change', e => {
  state.algo = e.target.value;
  reset();
});
document.getElementById('size').addEventListener('change', e => {
  N = parseInt(e.target.value, 10);
  makeBars(N);
  reset();
});
document.getElementById('speed').addEventListener('input', e => {
  state.speed = parseInt(e.target.value, 10);
});
document.getElementById('playBtn').addEventListener('click', () => {
  ensureAudio();
  if (state.done) reset();
  state.playing = !state.playing;
  refreshPlayBtn();
});
document.getElementById('stepBtn').addEventListener('click', () => {
  if (state.done) reset();
  state.playing = false;
  refreshPlayBtn();
  step();
  refreshHud();
});
document.getElementById('shuffleBtn').addEventListener('click', () => {
  state.playing = false;
  refreshPlayBtn();
  reset();
});
document.getElementById('resetBtn').addEventListener('click', () => {
  state.playing = false;
  refreshPlayBtn();
  setSorted();
  state.cmp = 0; state.swp = 0; state.elapsed = 0; state.done = true;
  startGen();
  document.getElementById('hudDone').hidden = false;
  refreshHud();
});
document.getElementById('muteBtn').addEventListener('click', () => {
  state.muted = !state.muted;
  const b = document.getElementById('muteBtn');
  b.textContent = state.muted ? '♪ off' : '♪ on';
  b.setAttribute('aria-pressed', state.muted ? 'true' : 'false');
});

// keyboard shortcuts
window.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === ' ')                  { document.getElementById('playBtn').click(); e.preventDefault(); }
  else if (e.key === 's' || e.key === 'S') { document.getElementById('stepBtn').click(); }
  else if (e.key === 'r' || e.key === 'R') { document.getElementById('shuffleBtn').click(); }
  else if (e.key === 'm' || e.key === 'M') { document.getElementById('muteBtn').click(); }
  else if (e.key === '1') { const sel = document.getElementById('algo'); sel.value = 'bubble'; sel.dispatchEvent(new Event('change')); }
  else if (e.key === '2') { const sel = document.getElementById('algo'); sel.value = 'quick';  sel.dispatchEvent(new Event('change')); }
  else if (e.key === '3') { const sel = document.getElementById('algo'); sel.value = 'insertion'; sel.dispatchEvent(new Event('change')); }
});

// ── BOOT ────────────────────────────────────────────────────────────────
fit();
makeBars(N);
reset();
refreshHud();
requestAnimationFrame(loop);
})();
</script>
</body>
</html>
