<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>modem-synth — 56k dial-up nostalgia engine</title>
<meta name="description" content="A nostalgic synth that plays the 56k dial-up handshake — DTMF dial, V.21 carrier, V.32 echo cancel, V.34 training — with a CRT spectrum visualizer.">
<meta property="og:title" content="modem-synth">
<meta property="og:description" content="56k dial-up nostalgia engine — DTMF dial, V.21 carrier, V.32 echo cancel, V.34 training, all on a CRT phosphor visualizer.">
<meta property="og:url" content="https://sloppy.live/modem-synth/">
<meta property="og:image" content="https://image.pollinations.ai/prompt/vintage%2056k%20modem%20on%20warm%20putty%20plastic%20with%20green%20phosphor%20CRT%20oscilloscope%20visualizing%20sound%20waves%2C%20amber%20LED%2C%20dial-up%20handshake%2C%20social%20preview?width=1200&height=630&seed=5656&nologo=true&model=flux">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%93%9E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Major+Mono+Display&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root {
    --void:        #06120a;
    --void-2:      #091a0d;
    --panel:       #0d1f10;
    --phosphor:    #a8ff5e;
    --phosphor-dim:#5f9a32;
    --phosphor-dk: #2e4a17;
    --amber:       #f5c453;
    --warn:        #ff5a64;
    --dim:         #4a6a32;
    --plastic-1:   #c8bea2;
    --plastic-2:   #b8ad8f;
    --plastic-edge:#6a624f;
    --plastic-dark:#5a5240;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  html { font-size: 100%; }
  /* Putty plastic bezel — same palette as prompt-optimizer for app-family consistency */
  body {
    background:
      radial-gradient(ellipse at 25% 12%, rgba(255,255,255,0.06), transparent 55%),
      radial-gradient(ellipse at 75% 88%, rgba(0,0,0,0.15), transparent 60%),
      repeating-linear-gradient(43deg, rgba(0,0,0,0.02) 0 1px, transparent 1px 3px),
      repeating-linear-gradient(133deg, rgba(255,255,255,0.018) 0 1px, transparent 1px 3px),
      var(--plastic-1);
    color: var(--phosphor);
    font-family: 'VT323', 'Courier New', monospace;
    padding: 1.4rem 1.6rem 1.8rem;
    line-height: 1.4;
    user-select: none;
    -webkit-user-select: none;
  }
  @media (max-width: 720px) {
    body { padding: 0.8rem; }
  }
  main {
    height: 100%;
    max-width: 90rem;
    margin: 0 auto;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 1rem;
    min-height: 0;
  }
  /* Top label — typewritten "modem-synth" branding on the plastic */
  header {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    color: #2c2820;
    flex-wrap: wrap;
    gap: 0.8rem;
  }
  header .brand {
    font-family: 'Major Mono Display', monospace;
    font-size: clamp(1.6rem, 3.6vw, 2.4rem);
    letter-spacing: 0.12em;
    text-transform: lowercase;
  }
  header .brand em {
    color: var(--plastic-dark);
    font-style: normal;
    font-weight: 700;
  }
  header .tag {
    font-family: 'Special Elite', monospace;
    font-size: 0.95rem;
    color: var(--plastic-edge);
    letter-spacing: 0.05em;
  }
  /* CRT visualizer screen — sunk into the plastic bezel with phosphor inside */
  .crt {
    position: relative;
    background:
      radial-gradient(ellipse at center, rgba(168,255,94,0.10), transparent 55%),
      var(--void);
    border-radius: 1rem;
    box-shadow:
      0 0 0 5px var(--plastic-edge),
      0 0 0 8px var(--plastic-dark),
      0 12px 30px rgba(0,0,0,0.5),
      inset 0 0 90px 8px rgba(0,0,0,0.4),
      inset 0 0 24px rgba(168,255,94,0.04);
    overflow: hidden;
    min-height: 0;
    display: grid;
    grid-template-rows: 1fr auto;
  }
  .crt canvas {
    display: block;
    width: 100%;
    height: 100%;
    border-radius: inherit;
  }
  /* Scanlines + chromatic aberration overlays on the screen */
  .crt::before {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0.32) 0 1px, transparent 1px 2px);
    mix-blend-mode: multiply;
    z-index: 2;
    border-radius: inherit;
  }
  .crt::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse 55% 50% at 0% 0%,    rgba(0,0,0,0.42), transparent 55%),
      radial-gradient(ellipse 55% 50% at 100% 0%,  rgba(0,0,0,0.42), transparent 55%),
      radial-gradient(ellipse 55% 50% at 0% 100%,  rgba(0,0,0,0.42), transparent 55%),
      radial-gradient(ellipse 55% 50% at 100% 100%,rgba(0,0,0,0.42), transparent 55%);
    z-index: 3;
    border-radius: inherit;
  }
  .status-strip {
    position: relative;
    z-index: 4;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.6rem 1rem 0.7rem;
    border-top: 2px solid rgba(168,255,94,0.25);
    font-family: 'VT323', monospace;
    color: var(--phosphor-dim);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-size: 1.1rem;
    text-shadow:
      -0.5px 0 0 rgba(255,60,80,0.4),
       0.5px 0 0 rgba(60,200,255,0.4),
       0 0 4px rgba(168,255,94,0.4);
    background: rgba(6,18,10,0.86);
    gap: 0.6rem;
    flex-wrap: wrap;
  }
  .status-strip .pip {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
  }
  .status-strip .pip .dot {
    width: 0.55rem;
    height: 0.55rem;
    border-radius: 999px;
    background: var(--phosphor-dk);
    box-shadow: 0 0 0 1px var(--phosphor-dk) inset;
  }
  .status-strip .pip.on .dot {
    background: var(--phosphor);
    box-shadow: 0 0 8px var(--phosphor);
  }
  .status-strip .pip.warn .dot {
    background: var(--amber);
    box-shadow: 0 0 8px var(--amber);
  }
  /* Status code (centered) reads like the actual stage of the handshake */
  .stage-readout {
    color: var(--phosphor);
    letter-spacing: 0.22em;
    font-size: 1.25rem;
    text-align: center;
  }
  /* Control panel: dial button + stage chips + mute */
  .controls {
    background: var(--plastic-2);
    border: 1.5px solid var(--plastic-edge);
    border-radius: 0.8rem;
    padding: 1rem 1.2rem;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.15),
      inset 0 -2px 0 rgba(0,0,0,0.18),
      0 6px 18px rgba(0,0,0,0.18);
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 1rem;
    align-items: center;
  }
  @media (max-width: 720px) {
    .controls {
      grid-template-columns: 1fr;
    }
  }
  /* Big chunky DIAL button */
  .dial-btn {
    font-family: 'Major Mono Display', monospace;
    font-size: 1.3rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    background: linear-gradient(180deg, #b54839 0%, #862a1c 100%);
    color: #fff7e2;
    border: 3px solid var(--plastic-dark);
    padding: 1rem 1.6rem;
    border-radius: 0.5rem;
    cursor: pointer;
    min-width: 9rem;
    min-height: 3.4rem;
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.25),
      inset 0 -2px 4px rgba(0,0,0,0.35),
      0 4px 10px rgba(0,0,0,0.3);
    text-shadow: 0 1px 2px rgba(0,0,0,0.45);
    transition: transform 0.06s ease, box-shadow 0.06s ease;
  }
  .dial-btn:hover { filter: brightness(1.06); }
  .dial-btn:active {
    transform: translateY(2px);
    box-shadow:
      inset 0 1px 0 rgba(255,255,255,0.25),
      inset 0 -1px 2px rgba(0,0,0,0.35),
      0 2px 4px rgba(0,0,0,0.3);
  }
  .dial-btn:focus-visible { outline: 3px solid var(--phosphor); outline-offset: 2px; }
  .dial-btn.connected {
    background: linear-gradient(180deg, #4a8438 0%, #2e5821 100%);
  }
  .dial-btn:disabled { opacity: 0.55; cursor: progress; }
  /* Stage chips show what's happening — DIAL → CARRIER → V.32 → V.34 → DONE */
  .stages {
    display: flex;
    gap: 0.45rem;
    flex-wrap: wrap;
    font-family: 'Special Elite', monospace;
    font-size: 0.85rem;
    color: var(--plastic-edge);
  }
  .chip {
    background: rgba(6,18,10,0.08);
    border: 1.5px solid var(--plastic-edge);
    border-radius: 999px;
    padding: 0.3rem 0.65rem;
    letter-spacing: 0.08em;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .chip.on {
    background: var(--void);
    color: var(--phosphor);
    border-color: var(--phosphor-dim);
    box-shadow: 0 0 10px rgba(168,255,94,0.35);
  }
  .chip.done {
    background: rgba(6,18,10,0.4);
    color: var(--phosphor-dim);
    border-color: var(--phosphor-dim);
  }
  /* Mute toggle */
  .mute-btn {
    background: transparent;
    border: 2px solid var(--plastic-dark);
    color: var(--plastic-dark);
    font-family: 'VT323', monospace;
    font-size: 1.1rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 0.5rem 0.85rem;
    border-radius: 0.4rem;
    cursor: pointer;
    min-height: 2.8rem;
  }
  .mute-btn:hover { color: var(--void); border-color: var(--void); }
  .mute-btn.muted { color: var(--warn); border-color: var(--warn); opacity: 0.85; }
  .mute-btn:focus-visible { outline: 3px solid var(--phosphor); outline-offset: 2px; }
  /* Mode selector — handshake style */
  .mode-row {
    display: flex;
    gap: 0.45rem;
    flex-wrap: wrap;
    font-family: 'VT323', monospace;
    font-size: 1rem;
    color: var(--plastic-edge);
    letter-spacing: 0.14em;
    text-transform: uppercase;
    align-items: center;
  }
  .mode-row label { display: inline-flex; align-items: center; gap: 0.3rem; cursor: pointer; }
  .mode-row input[type="radio"] { accent-color: #862a1c; }
  /* Footer attribution */
  footer {
    text-align: center;
    font-family: 'Special Elite', monospace;
    font-size: 0.85rem;
    color: var(--plastic-edge);
    letter-spacing: 0.06em;
    padding-top: 0.2rem;
  }
  footer .lcd-rate {
    background: #2a3a26;
    color: var(--phosphor);
    padding: 0.2rem 0.6rem;
    border-radius: 0.2rem;
    border: 1px solid var(--phosphor-dim);
    font-family: 'VT323', monospace;
    letter-spacing: 0.18em;
    margin: 0 0.3rem;
    text-shadow: 0 0 4px rgba(168,255,94,0.6);
  }
  @media (prefers-reduced-motion: reduce) {
    .chip { transition: none; }
  }
</style>
</head>
<body>
<main>
  <header>
    <div class="brand">modem<em>·</em>synth</div>
    <div class="tag">56k handshake. dtmf · v.21 · v.32 · v.34. crt out.</div>
  </header>

  <section class="crt" aria-label="CRT phosphor oscilloscope">
    <canvas id="scope" aria-label="Live audio waveform + spectrum"></canvas>
    <div class="status-strip">
      <span class="pip" id="pipDial"><span class="dot"></span>DIAL</span>
      <span class="pip" id="pipCarrier"><span class="dot"></span>CD</span>
      <span class="pip" id="pipRX"><span class="dot"></span>RX</span>
      <span class="pip" id="pipTX"><span class="dot"></span>TX</span>
      <span class="stage-readout" id="stageReadout">READY</span>
      <span class="pip" id="pipAA"><span class="dot"></span>AA</span>
      <span class="pip" id="pipOH"><span class="dot"></span>OH</span>
      <span class="pip warn" id="pipPwr"><span class="dot"></span>PWR</span>
    </div>
  </section>

  <section class="controls" aria-label="Dial controls">
    <button class="dial-btn" id="dialBtn" type="button" aria-pressed="false">▶ Dial Up</button>
    <div class="stages" id="stages" aria-live="polite">
      <span class="chip" data-stage="dial">Dialtone</span>
      <span class="chip" data-stage="dtmf">DTMF dial</span>
      <span class="chip" data-stage="ring">Ring</span>
      <span class="chip" data-stage="v21">V.21 carrier</span>
      <span class="chip" data-stage="ans">ANSam</span>
      <span class="chip" data-stage="v32">V.32 echo cancel</span>
      <span class="chip" data-stage="v34">V.34 training</span>
      <span class="chip" data-stage="connect">Connect 56000</span>
    </div>
    <button class="mute-btn" id="muteBtn" type="button" aria-pressed="false">♪ on</button>
  </section>

  <footer>
    <span>AT&amp;F · DT · CONNECT</span>
    <span class="lcd-rate" id="rateLcd">— bps</span>
    <span>· phosphor oscilloscope · headphones recommended</span>
  </footer>
</main>

<script>
(function(){
  'use strict';

  // ---- DOM refs ----
  const $ = (id) => document.getElementById(id);
  const canvas = $('scope');
  const ctx = canvas.getContext('2d', { willReadFrequently: false });
  const dialBtn = $('dialBtn');
  const muteBtn = $('muteBtn');
  const stageReadout = $('stageReadout');
  const rateLcd = $('rateLcd');
  const pipDial = $('pipDial'), pipCarrier = $('pipCarrier'),
        pipRX = $('pipRX'), pipTX = $('pipTX'),
        pipAA = $('pipAA'), pipOH = $('pipOH'), pipPwr = $('pipPwr');

  // ---- Sizing ----
  let W = 0, H = 0, DPR = 1;
  function fit() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    const rect = canvas.getBoundingClientRect();
    W = rect.width;
    H = rect.height;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', fit);

  // ---- Audio state ----
  let audioCtx = null;
  let masterGain = null;
  let analyser = null;
  let muted = false;
  let dialing = false;
  let connected = false;
  let cancelTokens = [];   // setTimeout / setInterval ids to clear on abort

  function ensureAudio() {
    if (audioCtx) return audioCtx;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = muted ? 0 : 0.55;
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.18;
    masterGain.connect(analyser);
    analyser.connect(audioCtx.destination);
    return audioCtx;
  }

  // ---- Sound primitives ----
  // Each helper creates oscillator/noise nodes that route through masterGain.
  // All return a small "voice" object with stop() so handshake stages can cancel.

  // Pure tone (or sum of tones) with attack/release envelope.
  function tone(freqs, durMs, opts = {}) {
    const ac = ensureAudio();
    const dur = durMs / 1000;
    const g = ac.createGain();
    g.gain.setValueAtTime(0.0001, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(opts.gain || 0.18, ac.currentTime + 0.012);
    g.gain.setValueAtTime(opts.gain || 0.18, ac.currentTime + dur - 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + dur);
    g.connect(masterGain);
    const oscs = (Array.isArray(freqs) ? freqs : [freqs]).map(f => {
      const o = ac.createOscillator();
      o.type = opts.type || 'sine';
      o.frequency.value = f;
      o.connect(g);
      o.start();
      o.stop(ac.currentTime + dur + 0.02);
      return o;
    });
    return { oscs, g, stopAt: ac.currentTime + dur };
  }

  // Pink-ish band-passed noise — used for V.32/V.34 modulation hiss.
  function bandNoise(durMs, centerHz, bw, gain) {
    const ac = ensureAudio();
    const dur = durMs / 1000;
    const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
    const d = buf.getChannelData(0);
    let last = 0;
    for (let i = 0; i < d.length; i++) {
      // Pinker noise via simple IIR
      const white = Math.random() * 2 - 1;
      last = 0.97 * last + white * 0.18;
      d[i] = last;
    }
    const src = ac.createBufferSource(); src.buffer = buf;
    const filt = ac.createBiquadFilter();
    filt.type = 'bandpass';
    filt.frequency.value = centerHz;
    filt.Q.value = Math.max(0.5, centerHz / Math.max(80, bw));
    const g = ac.createGain();
    g.gain.setValueAtTime(0.0001, ac.currentTime);
    g.gain.linearRampToValueAtTime(gain || 0.16, ac.currentTime + 0.04);
    g.gain.setValueAtTime(gain || 0.16, ac.currentTime + dur - 0.04);
    g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + dur);
    src.connect(filt); filt.connect(g); g.connect(masterGain);
    src.start();
    return { src, g };
  }

  // Frequency-modulated trill — V.32 has a characteristic warbling tone as the
  // modem dances around the echo canceler. Simulate it with a slow LFO sweep.
  function trill(durMs, baseHz, range, rateHz, gain, type) {
    const ac = ensureAudio();
    const dur = durMs / 1000;
    const o = ac.createOscillator();
    o.type = type || 'sine';
    const lfo = ac.createOscillator();
    lfo.type = 'sine';
    lfo.frequency.value = rateHz;
    const lfoGain = ac.createGain();
    lfoGain.gain.value = range;
    lfo.connect(lfoGain);
    lfoGain.connect(o.frequency);
    o.frequency.value = baseHz;
    const g = ac.createGain();
    g.gain.setValueAtTime(0.0001, ac.currentTime);
    g.gain.linearRampToValueAtTime(gain || 0.16, ac.currentTime + 0.04);
    g.gain.setValueAtTime(gain || 0.16, ac.currentTime + dur - 0.04);
    g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + dur);
    o.connect(g); g.connect(masterGain);
    o.start(); lfo.start();
    o.stop(ac.currentTime + dur + 0.02);
    lfo.stop(ac.currentTime + dur + 0.02);
    return { o, lfo, g };
  }

  // DTMF: each digit is two simultaneous sines (low + high row).
  // Standard touch-tone matrix. Real phones use ~120ms tone + ~80ms gap.
  const DTMF = {
    '1': [697, 1209], '2': [697, 1336], '3': [697, 1477],
    '4': [770, 1209], '5': [770, 1336], '6': [770, 1477],
    '7': [852, 1209], '8': [852, 1336], '9': [852, 1477],
    '*': [941, 1209], '0': [941, 1336], '#': [941, 1477],
  };
  function playDigit(digit) {
    const pair = DTMF[digit];
    if (!pair) return null;
    return tone(pair, 130, { gain: 0.22, type: 'sine' });
  }

  // ---- Handshake choreography ----
  // 11-stage timeline that recreates the canonical 56k V.90 negotiation.
  // Each stage updates UI + plays its signature audio. Timings are rough but
  // recognizable to anyone who heard a modem in 1998.
  function sleep(ms) {
    return new Promise(res => {
      const id = setTimeout(res, ms);
      cancelTokens.push(id);
    });
  }
  function setStageChip(stageId, state) {
    document.querySelectorAll('.chip').forEach(c => {
      if (c.dataset.stage === stageId) {
        c.classList.remove('on', 'done');
        if (state) c.classList.add(state);
      }
    });
  }
  function markDone(stageId) { setStageChip(stageId, 'done'); }
  function setReadout(text) { stageReadout.textContent = text; }
  function setPip(pip, on) {
    if (!pip) return;
    pip.classList.toggle('on', !!on);
  }
  function setRate(bps) {
    rateLcd.textContent = bps ? bps.toLocaleString() + ' bps' : '— bps';
  }

  async function runHandshake() {
    cancelTokens = [];
    connected = false;
    dialing = true;
    dialBtn.disabled = true;
    dialBtn.classList.remove('connected');
    setRate(null);
    // reset all chips
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('on', 'done'));
    setPip(pipDial, false); setPip(pipCarrier, false);
    setPip(pipRX, false); setPip(pipTX, false);
    setPip(pipAA, false); setPip(pipOH, false);

    // Stage 1 — pick up handset (off-hook), get dialtone
    setReadout('OFF-HOOK');
    setStageChip('dial', 'on');
    setPip(pipOH, true);
    // Soft click of the relay
    tone([1200, 800], 22, { gain: 0.3, type: 'square' });
    await sleep(180);
    // North American dial tone: 350 Hz + 440 Hz continuous
    setReadout('DIALTONE');
    const dialTone = tone([350, 440], 1400, { gain: 0.16, type: 'sine' });
    await sleep(1300);
    markDone('dial');

    // Stage 2 — DTMF digits ("dialing the ISP")
    setReadout('DIALING ');
    setStageChip('dtmf', 'on');
    setPip(pipDial, true);
    const digits = ['8', '6', '7', '5', '3', '0', '9'];
    for (const d of digits) {
      setReadout('DIALING ' + d);
      playDigit(d);
      await sleep(140);
      await sleep(80);   // inter-digit gap
    }
    markDone('dtmf');
    setPip(pipDial, false);
    await sleep(220);

    // Stage 3 — Ringing on the other end
    setReadout('RINGING');
    setStageChip('ring', 'on');
    // North American ring cadence: 2s on / 4s off; we play 2 short rings.
    for (let i = 0; i < 2; i++) {
      tone([440, 480], 320, { gain: 0.14, type: 'sine' });
      await sleep(380);
      tone([440, 480], 320, { gain: 0.14, type: 'sine' });
      await sleep(380);
      await sleep(420);   // inter-ring pause (shortened)
    }
    markDone('ring');

    // Stage 4 — Answer tone (ANSam: 2100 Hz with phase reversals)
    setReadout('ANSWER');
    setStageChip('ans', 'on');
    setPip(pipAA, true);
    // 2100 Hz answer tone, ~600ms with a phase reversal mid-way (we approximate
    // with a brief amplitude dip).
    const ans = tone(2100, 600, { gain: 0.20, type: 'sine' });
    await sleep(700);
    markDone('ans');

    // Stage 5 — V.21 calling tone / probe (the iconic ascending screech start).
    // V.21 uses 1080 Hz (originate) and 1750 Hz (answer) FSK tones.
    setReadout('V.21 PROBE');
    setStageChip('v21', 'on');
    setPip(pipCarrier, true);
    // Two short FSK bursts that simulate the negotiation
    trill(380, 1080, 60, 12, 0.18, 'sine');
    await sleep(140);
    trill(360, 1750, 80, 18, 0.18, 'sine');
    await sleep(220);
    trill(420, 1080, 60, 14, 0.18, 'sine');
    await sleep(200);
    markDone('v21');

    // Stage 6 — V.32 echo cancel: the famous warbling/scratching section.
    // Layered band-passed noise + FM trills converging around 1700 Hz.
    setReadout('V.32 ECHO CANCEL');
    setStageChip('v32', 'on');
    setPip(pipTX, true);
    bandNoise(1100, 1900, 700, 0.16);
    trill(1100, 1620, 220, 6.8, 0.17, 'sawtooth');
    trill(1100, 2200, 140, 11.2, 0.13, 'sine');
    await sleep(1100);
    markDone('v32');
    setPip(pipTX, false);

    // Stage 7 — V.34 training: aggressive harmonic warble + carrier scrambling.
    // Mix FM trills + bursts of noise at multiple bands for the iconic
    // "modem panicking" sound.
    setReadout('V.34 TRAINING');
    setStageChip('v34', 'on');
    setPip(pipRX, true);
    bandNoise(1500, 2400, 1200, 0.13);
    trill(1500, 2050, 320, 9.5, 0.15, 'sawtooth');
    trill(1500, 1320, 220, 14.0, 0.12, 'square');
    // A few quick "data burst" chirps
    for (let i = 0; i < 4; i++) {
      const f = 800 + Math.random() * 1800;
      tone([f, f * 1.5], 60 + Math.random() * 50, { gain: 0.12, type: 'sawtooth' });
      await sleep(120);
    }
    await sleep(800);
    markDone('v34');

    // Stage 8 — V.90 56k symbol-rate lock — a smoother continuous hiss as
    // the line stabilizes.
    setReadout('V.90 LOCK');
    bandNoise(700, 1700, 1800, 0.11);
    tone([1980], 700, { gain: 0.08, type: 'sine' });
    setPip(pipCarrier, true);
    await sleep(720);

    // Stage 9 — CONNECT result code; settle to a quiet carrier whisper
    setReadout('CONNECT 56000');
    setStageChip('connect', 'on');
    setRate(56000);
    setPip(pipCarrier, true);
    setPip(pipRX, true);
    setPip(pipTX, false);
    // Long carrier hiss at low gain
    bandNoise(1400, 1500, 2500, 0.06);
    await sleep(900);
    markDone('connect');

    // Done — leave the line "open" with a soft phosphor whisper.
    setReadout('ONLINE');
    connected = true;
    dialing = false;
    dialBtn.disabled = false;
    dialBtn.classList.add('connected');
    dialBtn.setAttribute('aria-pressed', 'true');
    dialBtn.innerHTML = '■ Hang Up';
  }

  function hangUp() {
    // Cancel any pending timeouts
    for (const id of cancelTokens) clearTimeout(id);
    cancelTokens = [];
    // Suspend audio briefly to kill any in-flight tones
    if (audioCtx) {
      // We don't tear down the context; just fade master to zero then back.
      const ac = audioCtx;
      masterGain.gain.cancelScheduledValues(ac.currentTime);
      masterGain.gain.setValueAtTime(masterGain.gain.value, ac.currentTime);
      masterGain.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + 0.18);
      setTimeout(() => {
        if (!muted) masterGain.gain.setValueAtTime(0.55, audioCtx.currentTime);
      }, 240);
    }
    // Reset UI
    setReadout('READY');
    setRate(null);
    document.querySelectorAll('.chip').forEach(c => c.classList.remove('on', 'done'));
    setPip(pipDial, false); setPip(pipCarrier, false);
    setPip(pipRX, false); setPip(pipTX, false);
    setPip(pipAA, false); setPip(pipOH, false);
    connected = false;
    dialing = false;
    dialBtn.disabled = false;
    dialBtn.classList.remove('connected');
    dialBtn.setAttribute('aria-pressed', 'false');
    dialBtn.innerHTML = '▶ Dial Up';
  }

  dialBtn.addEventListener('click', () => {
    ensureAudio();
    if (dialing || connected) {
      hangUp();
    } else {
      runHandshake().catch(err => {
        console.error('[modem-synth] handshake error', err);
        hangUp();
      });
    }
  });

  // ---- Mute ----
  muteBtn.addEventListener('click', () => {
    muted = !muted;
    muteBtn.classList.toggle('muted', muted);
    muteBtn.setAttribute('aria-pressed', String(muted));
    muteBtn.textContent = muted ? '♪ off' : '♪ on';
    if (masterGain && audioCtx) {
      masterGain.gain.cancelScheduledValues(audioCtx.currentTime);
      masterGain.gain.setTargetAtTime(muted ? 0 : 0.55, audioCtx.currentTime, 0.04);
    }
  });

  // ---- CRT visualizer ----
  // Two overlaid renderings: waveform line on top (current audio sample buffer)
  // + spectrum bars below (FFT bins). Both phosphor-green with chromatic-
  // aberration ghosts via overlaid red/cyan offset draws.
  const wavebuf = new Uint8Array(2048);
  const freqbuf = new Uint8Array(1024);
  let lastTs = 0;
  function frame(ts) {
    const dt = ts - lastTs;
    lastTs = ts;
    if (!W || !H) fit();

    // Background fade-trail (give the scope a phosphor persistence look)
    ctx.fillStyle = 'rgba(6, 18, 10, 0.20)';
    ctx.fillRect(0, 0, W, H);

    if (analyser) {
      analyser.getByteTimeDomainData(wavebuf);
      analyser.getByteFrequencyData(freqbuf);

      // ---- Spectrum bars (lower half) ----
      const barCount = 64;
      const slice = Math.floor(freqbuf.length / barCount);
      const barW = W / barCount;
      const barBaseY = H * 0.82;
      const barMaxH = H * 0.32;
      ctx.save();
      for (let i = 0; i < barCount; i++) {
        let sum = 0;
        for (let j = 0; j < slice; j++) sum += freqbuf[i * slice + j];
        const avg = sum / slice / 255;
        const h = Math.pow(avg, 1.4) * barMaxH;
        const x = i * barW;
        // Phosphor bar w/ chromatic aberration tint
        ctx.fillStyle = 'rgba(255, 80, 80, 0.18)';
        ctx.fillRect(x - 0.8, barBaseY - h, barW * 0.78, h);
        ctx.fillStyle = 'rgba(60, 200, 255, 0.18)';
        ctx.fillRect(x + 0.8, barBaseY - h, barW * 0.78, h);
        ctx.fillStyle = 'rgba(168, 255, 94, 0.92)';
        ctx.fillRect(x, barBaseY - h, barW * 0.78, h);
      }
      ctx.restore();

      // Baseline phosphor line below the bars
      ctx.strokeStyle = 'rgba(168, 255, 94, 0.55)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(0, barBaseY + 1);
      ctx.lineTo(W, barBaseY + 1);
      ctx.stroke();

      // ---- Waveform (upper region) ----
      const waveBaseY = H * 0.36;
      const waveAmp = H * 0.22;
      ctx.lineWidth = 1.8;
      const drawWave = (offX, color) => {
        ctx.strokeStyle = color;
        ctx.beginPath();
        for (let i = 0; i < wavebuf.length; i++) {
          const v = (wavebuf[i] - 128) / 128;
          const x = (i / wavebuf.length) * W + offX;
          const y = waveBaseY + v * waveAmp;
          if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
        }
        ctx.stroke();
      };
      drawWave(-1.6, 'rgba(255, 80, 80, 0.45)');
      drawWave(1.6,  'rgba(60, 200, 255, 0.45)');
      drawWave(0,    'rgba(168, 255, 94, 1.0)');

      // Grid ticks faint behind everything
      ctx.strokeStyle = 'rgba(168, 255, 94, 0.06)';
      ctx.lineWidth = 1;
      for (let x = 0; x <= W; x += W / 8) {
        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
      }
      for (let y = 0; y <= H; y += H / 6) {
        ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
      }
    } else {
      // Idle — slow phosphor sweep
      const t = ts / 1000;
      ctx.strokeStyle = 'rgba(168, 255, 94, 0.6)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      for (let x = 0; x < W; x += 4) {
        const y = H / 2 + Math.sin(x * 0.012 + t * 1.6) * 6;
        if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
      }
      ctx.stroke();
    }

    requestAnimationFrame(frame);
  }

  // ---- Boot ----
  fit();
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
