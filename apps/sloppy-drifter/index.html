<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>sloppy drifter</title>
<meta name="description" content="Side-scrolling neon drift — slide the back end, spin in the air, chain ramps. Physics car against an endless ribbon of synthwave hills." />
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8F%8E%EF%B8%8F" />
<meta property="og:title" content="sloppy drifter" />
<meta property="og:description" content="Side-scrolling neon drift — slide the back end, spin in the air, chain ramps." />
<meta property="og:url" content="https://sloppy.live/sloppy-drifter/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/side%20scrolling%20neon%20synthwave%20drift%20car%20on%20glowing%20hilly%20track%20pink%20cyan%20smoke%20trail%20pixel%20art?width=1200&height=630&nologo=true" />
<meta property="og:type" content="website" />

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

<style>
  :root {
    --bg-deep: #0b0220;
    --bg-mid: #1c0540;
    --magenta: #ff2dc7;
    --pink: #ff5ea1;
    --cyan: #00f6ff;
    --violet: #b07cff;
    --amber: #ffb35a;
    --yellow: #ffe156;
    --bone: #fff4f6;
    --ink: #ece4f8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg-deep);
    color: var(--ink);
    font-family: 'Share Tech Mono', monospace;
    user-select: none;
    touch-action: none;
  }
  #stage { position: fixed; inset: 0; }
  canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    display: block;
  }
  #bgCanvas { z-index: 1; }
  #gameCanvas { z-index: 2; }

  .ui { position: fixed; z-index: 5; pointer-events: none; }
  .ui > * { pointer-events: auto; }

  header.ui {
    top: 1rem; left: 1.4rem;
    line-height: 0.95;
  }
  h1 {
    font-family: 'Russo One', sans-serif;
    font-size: clamp(1.4rem, 3.4vw, 2.2rem);
    letter-spacing: 0.04em;
    color: var(--bone);
    text-shadow:
      0 0 12px rgba(255, 45, 199, 0.7),
      0 0 24px rgba(0, 246, 255, 0.45),
      2px 2px 0 rgba(0, 0, 0, 0.4);
  }
  h1 .sloppy { color: var(--magenta); }
  h1 .drift { color: var(--cyan); }
  .sub {
    font-family: 'Major Mono Display', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.32em;
    text-transform: lowercase;
    color: rgba(236, 228, 248, 0.6);
    margin-top: 0.4rem;
    text-shadow: 0 0 8px rgba(255, 94, 161, 0.4);
  }

  .hud {
    position: fixed;
    top: 1rem; right: 1.4rem;
    text-align: right;
    z-index: 5;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.66rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(236, 228, 248, 0.65);
    line-height: 1.6;
    text-shadow: 0 1px 3px rgba(0,0,0,0.7);
  }
  .hud .val {
    display: block;
    font-family: 'Audiowide', cursive;
    font-size: 1.5rem;
    letter-spacing: 0.02em;
    color: var(--bone);
    text-shadow: 0 0 10px rgba(0, 246, 255, 0.7);
    margin-top: 0.1rem;
    line-height: 1;
  }
  .hud .val.combo { color: var(--yellow); text-shadow: 0 0 10px rgba(255, 225, 86, 0.85); }
  .hud .val.dist { color: var(--magenta); text-shadow: 0 0 10px rgba(255, 45, 199, 0.85); }

  .driftbar {
    position: fixed;
    bottom: 1.2rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 4;
    width: min(24rem, calc(100vw - 2rem));
    pointer-events: none;
  }
  .driftbar .label {
    text-align: center;
    font-family: 'Major Mono Display', monospace;
    font-size: 0.66rem;
    letter-spacing: 0.32em;
    color: rgba(236, 228, 248, 0.55);
    margin-bottom: 0.3rem;
    text-shadow: 0 0 8px rgba(255, 45, 199, 0.5);
  }
  .driftbar .track {
    height: 0.6rem;
    background: rgba(20, 8, 40, 0.8);
    border: 1px solid rgba(255, 94, 161, 0.4);
    border-radius: 999px;
    overflow: hidden;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.7);
  }
  .driftbar .fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--magenta), var(--yellow), var(--cyan));
    transition: width 0.12s linear;
    box-shadow: 0 0 12px rgba(255, 225, 86, 0.6);
  }

  .toast {
    position: fixed;
    top: 32%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 6;
    font-family: 'Audiowide', cursive;
    font-size: clamp(1.6rem, 4.6vw, 2.6rem);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--bone);
    text-shadow: 0 0 18px currentColor, 0 0 36px currentColor;
    opacity: 0;
    pointer-events: none;
  }
  .toast.flash { animation: tflash 1.2s ease-out forwards; color: var(--yellow); }
  @keyframes tflash {
    0% { transform: translate(-50%, 10px) scale(0.9); opacity: 0; }
    20% { transform: translate(-50%, 0) scale(1.12); opacity: 1; }
    100% { transform: translate(-50%, -20px) scale(1); opacity: 0; }
  }

  .start-overlay {
    position: fixed; inset: 0;
    z-index: 10;
    background: radial-gradient(ellipse at 50% 70%, rgba(40,12,80,0.85), rgba(8,2,18,0.96));
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    text-align: center; padding: 2rem;
  }
  .start-overlay.hide { display: none; }
  .start-overlay h2 {
    font-family: 'Russo One', sans-serif;
    font-size: clamp(2rem, 6vw, 3.4rem);
    color: var(--bone);
    text-shadow:
      0 0 20px rgba(255, 45, 199, 0.9),
      0 0 40px rgba(0, 246, 255, 0.55);
    letter-spacing: 0.04em;
    margin-bottom: 0.4rem;
  }
  .start-overlay .pitch {
    font-family: 'Major Mono Display', monospace;
    font-size: 0.82rem;
    letter-spacing: 0.32em;
    color: rgba(236, 228, 248, 0.55);
    margin-bottom: 1.8rem;
  }
  .start-overlay .controls-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 0.45rem 0.9rem;
    margin: 1rem 0 1.6rem;
    color: rgba(236, 228, 248, 0.85);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.78rem;
    text-align: left;
    align-items: center;
  }
  .kbd {
    display: inline-block;
    border: 1.5px solid var(--cyan);
    border-radius: 4px;
    color: var(--cyan);
    padding: 0.32rem 0.6rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    box-shadow: 0 0 10px rgba(0, 246, 255, 0.45);
    min-width: 2rem;
    text-align: center;
  }
  .start-overlay button {
    appearance: none;
    background: linear-gradient(135deg, var(--magenta), var(--violet));
    border: 2px solid var(--bone);
    color: var(--bone);
    font-family: 'Russo One', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.18em;
    padding: 0.85rem 2.2rem;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    box-shadow:
      0 0 22px rgba(255, 45, 199, 0.7),
      inset 0 0 4px var(--bone);
    transition: transform 0.08s, box-shadow 0.12s;
    margin-top: 0.6rem;
  }
  .start-overlay button:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 36px rgba(255, 45, 199, 0.95), inset 0 0 6px var(--bone);
  }
  .start-overlay button:active { transform: translateY(1px); }
  .start-overlay button:focus-visible { outline: 3px solid var(--yellow); outline-offset: 4px; }

  .end-overlay {
    position: fixed; inset: 0;
    z-index: 10;
    background: radial-gradient(ellipse at 50% 50%, rgba(80,8,40,0.8), rgba(8,2,18,0.95));
    display: none;
    align-items: center; justify-content: center;
    flex-direction: column;
    text-align: center; padding: 2rem;
  }
  .end-overlay.show { display: flex; }
  .end-overlay .title {
    font-family: 'Russo One', sans-serif;
    font-size: clamp(2.4rem, 7vw, 4rem);
    color: var(--magenta);
    text-shadow: 0 0 22px rgba(255, 45, 199, 0.95);
    letter-spacing: 0.04em;
    margin-bottom: 1.2rem;
  }
  .end-overlay .stats {
    display: flex;
    gap: 2rem;
    margin-bottom: 1.8rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .end-overlay .stat {
    color: rgba(236, 228, 248, 0.6);
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .end-overlay .stat .v {
    display: block;
    font-family: 'Audiowide', cursive;
    font-size: 2rem;
    color: var(--bone);
    text-shadow: 0 0 14px rgba(0, 246, 255, 0.7);
    margin-top: 0.2rem;
  }
  .end-overlay button {
    appearance: none;
    background: transparent;
    border: 2px solid var(--cyan);
    color: var(--cyan);
    font-family: 'Russo One', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.18em;
    padding: 0.75rem 2rem;
    cursor: pointer;
    border-radius: 4px;
    box-shadow: 0 0 14px rgba(0, 246, 255, 0.5);
  }
  .end-overlay button:hover { background: rgba(0, 246, 255, 0.12); }

  .touchpad {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 7;
    display: none;
    justify-content: space-between;
    padding: 0.6rem;
    pointer-events: none;
  }
  .touchpad.show { display: flex; }
  .touchpad .pad {
    pointer-events: auto;
    width: 5rem; height: 5rem;
    border-radius: 50%;
    border: 2px solid rgba(255, 94, 161, 0.55);
    background: rgba(20, 8, 40, 0.55);
    color: var(--bone);
    font-family: 'Russo One', sans-serif;
    font-size: 0.78rem;
    letter-spacing: 0.16em;
    display: grid;
    place-items: center;
    box-shadow: 0 0 18px rgba(255, 45, 199, 0.5);
  }
  .touchpad .pad.cyan { border-color: var(--cyan); box-shadow: 0 0 18px rgba(0, 246, 255, 0.5); color: var(--cyan); }
  .touchpad .pad.yellow { border-color: var(--yellow); box-shadow: 0 0 18px rgba(255, 225, 86, 0.55); color: var(--yellow); }
  .touchpad .pad.pressed { background: rgba(0, 246, 255, 0.2); }
  .touchpad .gap { width: 0.6rem; }

  @media (hover: none) and (pointer: coarse) {
    .touchpad { display: flex; }
    .driftbar { bottom: 6rem; }
  }
  @media (max-width: 720px) {
    header.ui { top: 0.7rem; left: 0.9rem; }
    .hud { top: 0.7rem; right: 0.9rem; font-size: 0.6rem; }
    .hud .val { font-size: 1.15rem; }
    .sub { display: none; }
  }
  @media (prefers-reduced-motion: reduce) {
    .toast.flash { animation: none; opacity: 0; }
  }
</style>

<body>

<div id="stage" role="application" aria-label="Side-scrolling drift game. Arrow Right or D throttles, Left or A brakes, Space holds the handbrake to drift, Up or W jumps off ramps. Chain drifts and rotations for combo.">
  <canvas id="bgCanvas"></canvas>
  <canvas id="gameCanvas"></canvas>
</div>

<header class="ui">
  <h1><span class="sloppy">sloppy</span> <span class="drift">drifter</span></h1>
  <p class="sub">·· side · scroll · slide ··</p>
</header>

<div class="hud" aria-live="polite">
  <div>speed <span class="val" id="speed">0</span></div>
  <div>score <span class="val combo" id="score">0</span></div>
  <div>distance <span class="val dist" id="dist">0m</span></div>
</div>

<div class="driftbar">
  <div class="label">drift · meter</div>
  <div class="track"><div class="fill" id="driftFill"></div></div>
</div>

<div class="toast" id="toast"></div>

<div class="start-overlay" id="startOverlay">
  <h2>sloppy · drifter</h2>
  <div class="pitch">slide the back end · spin in the air · chain ramps</div>
  <div class="controls-grid">
    <span class="kbd">→</span><span>throttle</span>
    <span class="kbd">←</span><span>brake</span>
    <span class="kbd">↑</span><span>boost · pump</span>
    <span class="kbd">Space</span><span>handbrake · drift</span>
  </div>
  <button id="startBtn" type="button">start engine</button>
</div>

<div class="end-overlay" id="endOverlay" role="dialog" aria-modal="true" aria-hidden="true">
  <div class="title">wipeout</div>
  <div class="stats">
    <div class="stat">distance<span class="v" id="endDist">0m</span></div>
    <div class="stat">score<span class="v" id="endScore">0</span></div>
    <div class="stat">best drift<span class="v" id="endDrift">0m</span></div>
    <div class="stat">rotations<span class="v" id="endRot">0</span></div>
    <div class="stat">big airs<span class="v" id="endAir">0</span></div>
  </div>
  <button id="restartBtn" type="button">drive again</button>
</div>

<div class="touchpad" id="touchpad" aria-hidden="true">
  <button class="pad" id="padBrake">◀</button>
  <div class="gap"></div>
  <button class="pad yellow" id="padDrift">DRIFT</button>
  <div class="gap"></div>
  <button class="pad cyan" id="padBoost">↑</button>
  <div class="gap"></div>
  <button class="pad" id="padGo">▶</button>
</div>

<script>
'use strict';

// ═════════════════════════════════════════════════════════════════════════
// sloppy drifter — side-scrolling neon drift physics
// car has a simple 2-wheel spring model on a procedural sin+noise heightmap
// drifting reduces wheel grip → car slides + rotates → smoke + score
// ═════════════════════════════════════════════════════════════════════════

const bg = document.getElementById('bgCanvas').getContext('2d');
const ctx = document.getElementById('gameCanvas').getContext('2d');

let W = 0, H = 0, DPR = 1;
function fit(){
  DPR = Math.min(2, window.devicePixelRatio || 1);
  W = window.innerWidth; H = window.innerHeight;
  for (const c of [bg.canvas, ctx.canvas]){
    c.width = Math.floor(W * DPR);
    c.height = Math.floor(H * DPR);
    c.style.width = W + 'px';
    c.style.height = H + 'px';
  }
  bg.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  rebuildStarfield();
}

// ─────────────────────────────────────────────────────────────────────────
// terrain — procedural sin + noise height profile, sampled by x in world
// space. y grows downward (canvas convention). worldHeight returns the
// ground y at a given world x. We add a slow rolling sin, a medium hump
// sin, and per-bucket "ramps" so the player can launch off jumps.
// ─────────────────────────────────────────────────────────────────────────
const GROUND_BASE = 480;   // px from top of game canvas in WORLD units (camera baseline)
const RAMPS = [];           // each {x, w, h} bump on top of the base profile

function seedRamps(){
  RAMPS.length = 0;
  let x = 900;
  for (let i = 0; i < 220; i++){
    const gap = 280 + Math.random() * 420;
    x += gap;
    RAMPS.push({
      x,
      w: 180 + Math.random() * 260,
      h: 60 + Math.random() * 100,
      phase: Math.random() * Math.PI * 2,
    });
  }
}

function bump(rx, w){
  // smooth bell: 0 outside |rx| > w/2, 1 at rx=0
  const k = rx / (w / 2);
  if (k <= -1 || k >= 1) return 0;
  return 0.5 + 0.5 * Math.cos(k * Math.PI);
}

function worldGroundY(x){
  // base baseline + slow rolling sine + medium hump
  let y = GROUND_BASE
    + Math.sin(x * 0.0028) * 40
    + Math.sin(x * 0.012 + 1.3) * 18;
  // add nearby ramp contributions (lookup only ramps near x)
  for (const r of RAMPS){
    const dx = x - r.x;
    if (dx < -r.w || dx > r.w) continue;
    y -= bump(dx, r.w) * r.h;
  }
  return y;
}

function worldGroundSlope(x){
  const e = 4;
  return (worldGroundY(x + e) - worldGroundY(x - e)) / (2 * e);
}

// ─────────────────────────────────────────────────────────────────────────
// car model — two-wheel side-view spring car
// state: x (rear-axle target), y (chassis center), vx, vy, angle, angVel
// wheels are virtual offsets from the chassis center; their compression
// against the ground is converted into a spring force on the chassis.
// ─────────────────────────────────────────────────────────────────────────
const CAR = {
  // dimensions
  bodyLen: 76, bodyHei: 22,
  wheelR: 14,
  axleX: 28,        // distance from chassis center to each wheel along body x
  axleY: 8,         // wheels sit slightly below chassis center
  // physics
  mass: 1,
  springK: 38,      // spring stiffness  (N/m, tuned for our scale)
  springD: 4.4,     // spring damping
  thrust: 480,      // px/s² when full throttle on ground
  brake: 620,       // px/s² when braking
  grip: 0.86,       // rotation-pull factor when grounded
  driftGrip: 0.28,  // reduced grip while handbrake held
  airTorque: 4.2,   // induced spin while in air w/ throttle/brake
};

let car = null;
function resetCar(){
  car = {
    x: 200, y: GROUND_BASE - 80,
    vx: 0, vy: 0,
    angle: 0, angVel: 0,
    wFrontRot: 0, wBackRot: 0,   // wheel visual rotation
    onGround: false,
    inAir: 0,                    // current airborne time (s)
    spinAccum: 0,                // radians accumulated mid-air
    landingCleanRot: 0,          // landed rotations to credit
    alive: true,
  };
}

// ─────────────────────────────────────────────────────────────────────────
// input
// ─────────────────────────────────────────────────────────────────────────
const input = { throttle: 0, brake: 0, drift: 0, boost: 0 };

function bindKey(code, set){
  return (e) => {
    if (e.code === code){ set(e.type === 'keydown' ? 1 : 0); if (e.preventDefault) e.preventDefault(); }
  };
}
// We use multiple key codes per action; collect into a single keydown.
document.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  switch (e.code){
    case 'ArrowRight': case 'KeyD': input.throttle = 1; break;
    case 'ArrowLeft':  case 'KeyA': input.brake = 1; break;
    case 'ArrowUp':    case 'KeyW': input.boost = 1; break;
    case 'Space':                    input.drift = 1; e.preventDefault(); break;
  }
});
document.addEventListener('keyup', (e) => {
  switch (e.code){
    case 'ArrowRight': case 'KeyD': input.throttle = 0; break;
    case 'ArrowLeft':  case 'KeyA': input.brake = 0; break;
    case 'ArrowUp':    case 'KeyW': input.boost = 0; break;
    case 'Space':                    input.drift = 0; break;
  }
});

function bindTouch(el, set){
  if (!el) return;
  el.addEventListener('touchstart', (e) => { e.preventDefault(); set(1); el.classList.add('pressed'); }, {passive:false});
  el.addEventListener('touchend',   (e) => { e.preventDefault(); set(0); el.classList.remove('pressed'); }, {passive:false});
  el.addEventListener('mousedown',  (e) => { e.preventDefault(); set(1); el.classList.add('pressed'); });
  el.addEventListener('mouseup',    (e) => { e.preventDefault(); set(0); el.classList.remove('pressed'); });
  el.addEventListener('mouseleave', () => { set(0); el.classList.remove('pressed'); });
}
bindTouch(document.getElementById('padGo'),    (v) => input.throttle = v);
bindTouch(document.getElementById('padBrake'), (v) => input.brake = v);
bindTouch(document.getElementById('padDrift'), (v) => input.drift = v);
bindTouch(document.getElementById('padBoost'), (v) => input.boost = v);

// ─────────────────────────────────────────────────────────────────────────
// audio — engine drone + drift screech + jump whoosh + crash
// ─────────────────────────────────────────────────────────────────────────
let actx = null, masterGain = null;
let engineOsc = null, engineGain = null, engineFilter = null;
let driftSrc = null, driftGain = null;
let muted = false;

function ensureAudio(){
  if (actx) return actx;
  try { actx = new (window.AudioContext || window.webkitAudioContext)(); }
  catch(e){ return null; }
  masterGain = actx.createGain(); masterGain.gain.value = 0.6;
  masterGain.connect(actx.destination);
  // engine: continuous sawtooth + sub through a lowpass
  engineOsc = actx.createOscillator();
  engineOsc.type = 'sawtooth';
  engineOsc.frequency.value = 80;
  const eSub = actx.createOscillator();
  eSub.type = 'square';
  eSub.frequency.value = 60;
  engineFilter = actx.createBiquadFilter();
  engineFilter.type = 'lowpass';
  engineFilter.frequency.value = 700;
  engineFilter.Q.value = 1.4;
  engineGain = actx.createGain();
  engineGain.gain.value = 0;
  engineOsc.connect(engineFilter);
  eSub.connect(engineFilter);
  engineFilter.connect(engineGain);
  engineGain.connect(masterGain);
  engineOsc.start(); eSub.start();
  // drift screech — bandpass-filtered noise loop
  const len = Math.floor(actx.sampleRate * 1.0);
  const buf = actx.createBuffer(1, len, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  driftSrc = actx.createBufferSource();
  driftSrc.buffer = buf;
  driftSrc.loop = true;
  const driftBp = actx.createBiquadFilter();
  driftBp.type = 'bandpass';
  driftBp.frequency.value = 2200;
  driftBp.Q.value = 6;
  driftGain = actx.createGain();
  driftGain.gain.value = 0;
  driftSrc.connect(driftBp);
  driftBp.connect(driftGain);
  driftGain.connect(masterGain);
  driftSrc.start();
  return actx;
}
function updateEngineAudio(speed, throttling){
  if (!actx || muted) return;
  const targetFreq = 70 + Math.min(360, Math.abs(speed) * 1.6);
  engineOsc.frequency.setTargetAtTime(targetFreq, actx.currentTime, 0.05);
  const targetCutoff = 500 + Math.min(2400, Math.abs(speed) * 6);
  engineFilter.frequency.setTargetAtTime(targetCutoff, actx.currentTime, 0.1);
  const baseGain = throttling ? 0.16 : 0.08;
  engineGain.gain.setTargetAtTime(baseGain, actx.currentTime, 0.1);
}
function updateDriftAudio(intensity){
  if (!actx || muted) return;
  driftGain.gain.setTargetAtTime(intensity * 0.18, actx.currentTime, 0.08);
}
function sfxJump(){
  if (!actx || muted) return;
  const t = actx.currentTime;
  const o = actx.createOscillator();
  const g = actx.createGain();
  o.type = 'triangle';
  o.frequency.setValueAtTime(240, t);
  o.frequency.exponentialRampToValueAtTime(620, t + 0.18);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.18, t + 0.01);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
  o.connect(g); g.connect(masterGain);
  o.start(t); o.stop(t + 0.24);
}
function sfxLand(intensity){
  if (!actx || muted) return;
  const t = actx.currentTime;
  const len = Math.floor(actx.sampleRate * 0.3);
  const buf = actx.createBuffer(1, len, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/len, 2);
  const src = actx.createBufferSource();
  src.buffer = buf;
  const lp = actx.createBiquadFilter();
  lp.type = 'lowpass';
  lp.frequency.value = 280;
  const g = actx.createGain(); g.gain.value = 0.18 + intensity * 0.18;
  src.connect(lp); lp.connect(g); g.connect(masterGain);
  src.start(t); src.stop(t + 0.32);
  // sub thump
  const o = actx.createOscillator();
  const og = actx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(120, t);
  o.frequency.exponentialRampToValueAtTime(36, t + 0.18);
  og.gain.setValueAtTime(0.0001, t);
  og.gain.exponentialRampToValueAtTime(0.22 + intensity * 0.18, t + 0.01);
  og.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
  o.connect(og); og.connect(masterGain);
  o.start(t); o.stop(t + 0.25);
}
function sfxCrash(){
  if (!actx || muted) return;
  const t = actx.currentTime;
  const len = Math.floor(actx.sampleRate * 0.6);
  const buf = actx.createBuffer(1, len, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/len, 1.3);
  const src = actx.createBufferSource(); src.buffer = buf;
  const lp = actx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 1100;
  const g = actx.createGain(); g.gain.value = 0.4;
  src.connect(lp); lp.connect(g); g.connect(masterGain);
  src.start(t); src.stop(t + 0.62);
}

// ─────────────────────────────────────────────────────────────────────────
// game state
// ─────────────────────────────────────────────────────────────────────────
let camX = 0;          // world x of the center-left baseline of the camera
let cameraOffsetX = 0; // car appears at this fraction of W
let gameState = 'menu';
let score = 0;
let driftMeter = 0;    // 0..1
let driftDistance = 0;
let bestDriftRun = 0;
let driftRun = 0;
let totalRotations = 0;
let bigAirs = 0;
let startedAt = 0;

const smoke = [];       // {x,y,vx,vy,r,life,age,hue}
const sparks = [];

function resetState(){
  resetCar();
  camX = 0;
  score = 0;
  driftMeter = 0;
  driftDistance = 0;
  bestDriftRun = 0;
  driftRun = 0;
  totalRotations = 0;
  bigAirs = 0;
  smoke.length = 0;
  sparks.length = 0;
  startedAt = performance.now();
  cameraOffsetX = 0.34;
  document.getElementById('endOverlay').classList.remove('show');
  document.getElementById('endOverlay').setAttribute('aria-hidden','true');
}

function startGame(){
  ensureAudio();
  if (actx && actx.state === 'suspended') actx.resume();
  resetState();
  seedRamps();
  gameState = 'playing';
  document.getElementById('startOverlay').classList.add('hide');
}

function endGame(){
  gameState = 'ended';
  sfxCrash();
  document.getElementById('endDist').textContent = Math.floor(car.x / 10) + 'm';
  document.getElementById('endScore').textContent = score.toLocaleString();
  document.getElementById('endDrift').textContent = Math.floor(bestDriftRun / 10) + 'm';
  document.getElementById('endRot').textContent = totalRotations;
  document.getElementById('endAir').textContent = bigAirs;
  const eo = document.getElementById('endOverlay');
  eo.classList.add('show');
  eo.setAttribute('aria-hidden','false');
}

function showToast(text, color){
  const t = document.getElementById('toast');
  t.textContent = text;
  t.style.color = color || '#ffe156';
  t.classList.remove('flash');
  void t.offsetWidth;
  t.classList.add('flash');
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);
document.addEventListener('keydown', (e) => {
  if (e.code === 'KeyM'){ muted = !muted; }
  if (e.code === 'Escape' && gameState !== 'menu'){
    gameState = 'menu';
    document.getElementById('startOverlay').classList.remove('hide');
    document.getElementById('endOverlay').classList.remove('show');
  }
});

// ─────────────────────────────────────────────────────────────────────────
// background — parallax synthwave layers + starfield
// ─────────────────────────────────────────────────────────────────────────
let stars = [];
function rebuildStarfield(){
  stars = [];
  const target = Math.floor((W * H) / 12000);
  for (let i = 0; i < target; i++){
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H * 0.55,
      r: 0.4 + Math.random() * 1.2,
      h: 200 + Math.random() * 140,
      phase: Math.random() * Math.PI * 2,
    });
  }
}

function drawBackground(now){
  bg.clearRect(0, 0, W, H);
  const horizonY = H * 0.55;

  // sky gradient
  const skyG = bg.createLinearGradient(0, 0, 0, horizonY);
  skyG.addColorStop(0, '#190348');
  skyG.addColorStop(0.6, '#3a0a78');
  skyG.addColorStop(1, '#ff2a82');
  bg.fillStyle = skyG;
  bg.fillRect(0, 0, W, horizonY);

  // sun
  const sx = W * 0.66, sy = horizonY - H * 0.06;
  const sr = Math.min(W, H) * 0.16;
  const sg = bg.createLinearGradient(sx, sy - sr, sx, sy + sr);
  sg.addColorStop(0, '#ffe156');
  sg.addColorStop(0.55, '#ff7a59');
  sg.addColorStop(1, '#c92e7e');
  bg.fillStyle = sg;
  bg.beginPath();
  bg.arc(sx, sy, sr, 0, Math.PI * 2);
  bg.fill();
  bg.fillStyle = '#190348';
  for (let i = 1; i < 6; i++){
    const yy = sy + sr - (i / 6) * sr * 0.95;
    bg.fillRect(sx - sr, yy, sr * 2, 2 + i * 1.4);
  }

  // stars
  for (const s of stars){
    s.phase += 0.015;
    const a = 0.4 + Math.sin(s.phase) * 0.45;
    bg.fillStyle = `hsla(${s.h}, 90%, 80%, ${a.toFixed(2)})`;
    bg.beginPath();
    bg.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    bg.fill();
  }

  // distant parallax mountains
  drawParallaxRange(0.08, horizonY - 24, 50, 'rgba(80, 16, 96, 0.6)');
  drawParallaxRange(0.18, horizonY - 6, 80, 'rgba(46, 8, 70, 0.85)');

  // ground gradient
  const groundG = bg.createLinearGradient(0, horizonY, 0, H);
  groundG.addColorStop(0, '#0b0220');
  groundG.addColorStop(1, '#08020e');
  bg.fillStyle = groundG;
  bg.fillRect(0, horizonY, W, H - horizonY);

  // perspective grid
  const grid = bg;
  grid.lineWidth = 1;
  const horizonX = W / 2;
  // horizontal lines receding
  for (let i = 0; i < 18; i++){
    const phase = ((now * 0.0006) + i / 18) % 1;
    const k = Math.pow(phase, 1.7);
    const y = horizonY + k * (H - horizonY);
    const a = 0.5 * (1 - k);
    grid.strokeStyle = `rgba(255, 45, 199, ${(0.18 + a * 0.55).toFixed(3)})`;
    grid.beginPath();
    grid.moveTo(0, y);
    grid.lineTo(W, y);
    grid.stroke();
  }
  // vertical perspective lines
  for (let i = -8; i <= 8; i++){
    const xb = horizonX + (i / 8) * W * 0.9;
    const lg = grid.createLinearGradient(horizonX, horizonY, xb, H);
    lg.addColorStop(0, 'rgba(255, 45, 199, 0)');
    lg.addColorStop(1, 'rgba(0, 246, 255, 0.45)');
    grid.strokeStyle = lg;
    grid.lineWidth = 1;
    grid.beginPath();
    grid.moveTo(horizonX, horizonY);
    grid.lineTo(xb, H);
    grid.stroke();
  }

  // horizon line glow
  bg.strokeStyle = 'rgba(255, 122, 89, 0.85)';
  bg.lineWidth = 1.5;
  bg.shadowColor = 'rgba(255, 122, 89, 0.85)';
  bg.shadowBlur = 12;
  bg.beginPath(); bg.moveTo(0, horizonY); bg.lineTo(W, horizonY); bg.stroke();
  bg.shadowBlur = 0;
}

function drawParallaxRange(parallax, baseY, amp, color){
  const scrollX = -camX * parallax;
  bg.fillStyle = color;
  bg.beginPath();
  bg.moveTo(0, baseY + amp);
  const step = 80;
  for (let x = -step; x <= W + step; x += step){
    const wx = x + (scrollX % (step * 2));
    const h = Math.abs(Math.sin(wx * 0.01) * 0.5 + Math.sin(wx * 0.027 + 1.4) * 0.5) * amp;
    bg.lineTo(x, baseY - h);
  }
  bg.lineTo(W, baseY + amp);
  bg.closePath();
  bg.fill();
}

// ─────────────────────────────────────────────────────────────────────────
// world → screen helpers
// ─────────────────────────────────────────────────────────────────────────
const WORLD_TO_SCREEN_X = (wx) => wx - camX + W * cameraOffsetX;
const WORLD_TO_SCREEN_Y = (wy) => wy + H * 0.35;   // ground baseline anchored

// ─────────────────────────────────────────────────────────────────────────
// physics step
// ─────────────────────────────────────────────────────────────────────────
function step(dt){
  if (!car.alive) return;

  // current wheel world positions
  const c = Math.cos(car.angle), s = Math.sin(car.angle);
  const frontWx = car.x + c * CAR.axleX - s * CAR.axleY;
  const frontWy = car.y + s * CAR.axleX + c * CAR.axleY;
  const backWx  = car.x + c * (-CAR.axleX) - s * CAR.axleY;
  const backWy  = car.y + s * (-CAR.axleX) + c * CAR.axleY;
  const gFront = worldGroundY(frontWx);
  const gBack  = worldGroundY(backWx);

  const wheelRestY = 0;  // we want wheel center to sit just above ground
  // compression = how far wheel-bottom is INTO the ground (positive when penetrating)
  const frontPen = (frontWy + CAR.wheelR) - gFront;
  const backPen  = (backWy  + CAR.wheelR) - gBack;

  let fx = 0, fy = 0, torque = 0;
  let frontGrounded = false, backGrounded = false;
  if (frontPen > 0){
    frontGrounded = true;
    // spring up
    const v = -car.vy + car.angVel * (c * CAR.axleX); // approximate vertical wheel velocity
    const force = frontPen * CAR.springK - v * CAR.springD;
    fy -= force;
    torque -= force * (CAR.axleX) * 0.018;  // pitches nose up
  }
  if (backPen > 0){
    backGrounded = true;
    const v = -car.vy + car.angVel * (c * -CAR.axleX);
    const force = backPen * CAR.springK - v * CAR.springD;
    fy -= force;
    torque -= force * (-CAR.axleX) * 0.018;
  }
  car.onGround = frontGrounded || backGrounded;

  // gravity
  fy += 980;
  // air drag
  fx -= car.vx * 0.18;
  fy -= car.vy * 0.18;

  // throttle / brake
  const throttle = input.throttle;
  const brake = input.brake;
  if (car.onGround){
    // longitudinal force aligned with the ground slope direction
    const slope = worldGroundSlope((frontWx + backWx) / 2);
    const dir = 1 / Math.sqrt(1 + slope * slope);
    if (throttle){
      fx += CAR.thrust * dir * throttle;
      fy += CAR.thrust * slope * dir * throttle;
    }
    if (brake){
      const sign = car.vx > 0 ? -1 : (car.vx < -2 ? 1 : 0);
      fx += CAR.brake * dir * sign * brake;
      fy += CAR.brake * slope * dir * sign * brake;
    }
    // boost pump — like pumping suspension; brief upward kick + small forward
    if (input.boost){
      fy -= 320;
      fx += 80;
    }
  } else {
    // air control — throttle/brake torque to spin the car
    if (throttle) torque += CAR.airTorque;
    if (brake) torque -= CAR.airTorque;
  }

  // drift / handbrake: lock rear wheel, drop grip
  const isDrifting = input.drift && car.onGround && Math.abs(car.vx) > 60;
  if (isDrifting){
    // pull the car body angle toward velocity direction with reduced grip
    const desiredAngle = Math.atan2(0, 1);  // flat (since we're side-view)
    const target = -worldGroundSlope(car.x);
    // soft angular correction
    torque += (target - car.angle) * 30 - car.angVel * 6;
    // reduce horizontal velocity slowly (drift slows car)
    fx -= car.vx * 0.55;
    // micro lateral wobble — visual only
    fy += Math.sin(performance.now() * 0.02) * 8;
  } else if (car.onGround){
    // strong grip — body angle follows ground slope
    const target = -worldGroundSlope(car.x);
    torque += (target - car.angle) * 90 - car.angVel * 11;
  }

  // integrate
  car.vx += (fx / CAR.mass) * dt;
  car.vy += (fy / CAR.mass) * dt;
  car.angVel += (torque / CAR.mass) * dt;
  // angular damping
  car.angVel *= Math.pow(0.92, dt * 60);

  car.x += car.vx * dt;
  car.y += car.vy * dt;
  car.angle += car.angVel * dt;

  // backward speed clamp (prevent going past start)
  if (car.x < 80){ car.x = 80; if (car.vx < 0) car.vx = 0; }

  // detect take-off / landing
  if (!car.onGround){
    car.inAir += dt;
    car.spinAccum += car.angVel * dt;
  } else {
    if (car.inAir > 0.45){
      // landed
      const intensity = Math.min(1, car.inAir / 1.5);
      sfxLand(intensity);
      // big air bonus
      if (car.inAir > 0.9){
        bigAirs++;
        const bonus = Math.floor(200 + car.inAir * 240);
        score += bonus;
        showToast('big air +' + bonus, '#00f6ff');
      }
      // rotation bonus
      const turns = Math.floor(Math.abs(car.spinAccum) / (Math.PI * 2));
      if (turns > 0){
        totalRotations += turns;
        const bonus = turns * 500;
        score += bonus;
        showToast(turns + (turns > 1 ? ' rotations ' : ' rotation ') + '+' + bonus, '#ffe156');
      }
      // crash if landing angle is way off from ground slope
      const target = -worldGroundSlope(car.x);
      const angleErr = Math.abs(normAngle(car.angle - target));
      if (angleErr > Math.PI * 0.55 && car.inAir > 0.4){
        endGame();
        return;
      }
    }
    car.inAir = 0;
    car.spinAccum = 0;
  }

  // drift scoring
  if (isDrifting){
    driftRun += Math.abs(car.vx) * dt;
    driftDistance += Math.abs(car.vx) * dt;
    if (driftRun > bestDriftRun) bestDriftRun = driftRun;
    driftMeter = Math.min(1, driftMeter + dt * 0.6);
    score += Math.floor(Math.abs(car.vx) * dt * 0.4);
    // smoke
    if (Math.random() < 0.4){
      smoke.push({
        x: backWx + (Math.random() - 0.5) * 8,
        y: backWy + CAR.wheelR,
        vx: -50 - Math.random() * 60,
        vy: -20 - Math.random() * 40,
        r: 5 + Math.random() * 6,
        life: 0.9 + Math.random() * 0.5,
        age: 0,
        hue: 280 + Math.random() * 60,
      });
    }
  } else {
    if (driftRun > 80){
      // ended a drift run — bonus
      const bonus = Math.floor(driftRun * 0.2);
      score += bonus;
      if (driftRun > 200){
        showToast('drift +' + bonus, '#ff5ea1');
      }
    }
    driftRun = 0;
    driftMeter = Math.max(0, driftMeter - dt * 0.4);
  }

  // visual wheel spin
  const groundSpeed = Math.abs(car.vx);
  const wheelOmega = groundSpeed / CAR.wheelR;
  car.wFrontRot += wheelOmega * dt * (car.vx >= 0 ? 1 : -1);
  car.wBackRot  += wheelOmega * dt * (car.vx >= 0 ? 1 : -1);

  // smoke + sparks update
  for (let i = smoke.length - 1; i >= 0; i--){
    const p = smoke[i];
    p.age += dt;
    if (p.age >= p.life){ smoke.splice(i, 1); continue; }
    p.vy -= 30 * dt;   // smoke rises
    p.vx *= 0.985;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.r += 18 * dt;
  }

  // camera follow
  const targetCamX = car.x - W * cameraOffsetX;
  camX += (targetCamX - camX) * Math.min(1, dt * 4);

  // crash if vehicle yeets off the bottom or rolls upside down for too long
  if (car.y > GROUND_BASE + 320){
    endGame();
  }
}

function normAngle(a){
  while (a > Math.PI) a -= Math.PI * 2;
  while (a < -Math.PI) a += Math.PI * 2;
  return a;
}

// ─────────────────────────────────────────────────────────────────────────
// rendering
// ─────────────────────────────────────────────────────────────────────────
function drawTerrain(){
  // sample world x across the visible range, draw an outline ribbon
  const samples = 220;
  const xLeft = camX - 80;
  const xRight = camX + W + 80;
  const step = (xRight - xLeft) / samples;
  ctx.beginPath();
  for (let i = 0; i <= samples; i++){
    const wx = xLeft + i * step;
    const wy = worldGroundY(wx);
    const sx = WORLD_TO_SCREEN_X(wx);
    const sy = WORLD_TO_SCREEN_Y(wy);
    if (i === 0) ctx.moveTo(sx, sy);
    else ctx.lineTo(sx, sy);
  }
  // fill down to bottom
  ctx.lineTo(WORLD_TO_SCREEN_X(xRight), H);
  ctx.lineTo(WORLD_TO_SCREEN_X(xLeft), H);
  ctx.closePath();
  // fill — dark gradient with neon glow band at top
  const grad = ctx.createLinearGradient(0, H * 0.5, 0, H);
  grad.addColorStop(0, 'rgba(35, 5, 80, 0.85)');
  grad.addColorStop(1, 'rgba(6, 0, 18, 0.98)');
  ctx.fillStyle = grad;
  ctx.fill();

  // outline glow ribbon
  ctx.beginPath();
  for (let i = 0; i <= samples; i++){
    const wx = xLeft + i * step;
    const wy = worldGroundY(wx);
    const sx = WORLD_TO_SCREEN_X(wx);
    const sy = WORLD_TO_SCREEN_Y(wy);
    if (i === 0) ctx.moveTo(sx, sy);
    else ctx.lineTo(sx, sy);
  }
  ctx.strokeStyle = '#ff5ea1';
  ctx.lineWidth = 3;
  ctx.shadowColor = '#ff2dc7';
  ctx.shadowBlur = 16;
  ctx.stroke();
  // inner cyan
  ctx.strokeStyle = 'rgba(0, 246, 255, 0.85)';
  ctx.lineWidth = 1.2;
  ctx.shadowBlur = 6;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // distance markers — pulse with each 100m
  ctx.font = "10px 'Share Tech Mono', monospace";
  ctx.fillStyle = 'rgba(255, 244, 246, 0.45)';
  ctx.textAlign = 'center';
  const start = Math.floor(xLeft / 1000) * 1000;
  for (let mx = start; mx < xRight; mx += 1000){
    const sx = WORLD_TO_SCREEN_X(mx);
    if (sx < -20 || sx > W + 20) continue;
    const sy = WORLD_TO_SCREEN_Y(worldGroundY(mx));
    ctx.fillText(Math.floor(mx / 10) + 'm', sx, sy + 18);
    // tiny pole
    ctx.strokeStyle = 'rgba(0, 246, 255, 0.35)';
    ctx.beginPath();
    ctx.moveTo(sx, sy);
    ctx.lineTo(sx, sy - 24);
    ctx.stroke();
  }
}

function drawCar(){
  const sx = WORLD_TO_SCREEN_X(car.x);
  const sy = WORLD_TO_SCREEN_Y(car.y);
  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(car.angle);

  // body shadow
  ctx.fillStyle = 'rgba(0, 0, 0, 0.45)';
  ctx.beginPath();
  ctx.ellipse(0, 18, CAR.bodyLen * 0.45, 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // chassis (chunky pixel-art-ish sportscar silhouette)
  // lower body
  const bodyW = CAR.bodyLen;
  const bodyH = CAR.bodyHei;
  // main body gradient
  const bodyGrad = ctx.createLinearGradient(0, -bodyH, 0, bodyH * 0.6);
  bodyGrad.addColorStop(0, '#ffe156');
  bodyGrad.addColorStop(0.4, '#ff2dc7');
  bodyGrad.addColorStop(1, '#7a0e6e');
  ctx.fillStyle = bodyGrad;
  ctx.strokeStyle = '#fff4f6';
  ctx.lineWidth = 1.2;
  // car silhouette path — sloped wedge with roof
  ctx.beginPath();
  ctx.moveTo(-bodyW/2 + 8, 4);
  ctx.lineTo(-bodyW/2, -2);
  ctx.lineTo(-bodyW/2 + 6, -bodyH/2);
  ctx.lineTo(-bodyW/2 + 18, -bodyH * 1.05);
  ctx.lineTo(bodyW/2 - 22, -bodyH * 1.05);
  ctx.lineTo(bodyW/2 - 4, -bodyH/2);
  ctx.lineTo(bodyW/2, 0);
  ctx.lineTo(bodyW/2 - 4, 6);
  ctx.lineTo(-bodyW/2 + 6, 6);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // window glow
  ctx.fillStyle = 'rgba(0, 246, 255, 0.75)';
  ctx.beginPath();
  ctx.moveTo(-bodyW/2 + 22, -bodyH * 0.96);
  ctx.lineTo(bodyW/2 - 24, -bodyH * 0.96);
  ctx.lineTo(bodyW/2 - 14, -bodyH * 0.55);
  ctx.lineTo(-bodyW/2 + 14, -bodyH * 0.55);
  ctx.closePath();
  ctx.fill();
  // window scanline
  ctx.strokeStyle = 'rgba(255, 244, 246, 0.55)';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(-bodyW/2 + 18, -bodyH * 0.78);
  ctx.lineTo(bodyW/2 - 22, -bodyH * 0.78);
  ctx.stroke();

  // side stripe
  ctx.strokeStyle = 'rgba(255, 244, 246, 0.85)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-bodyW/2 + 8, -2);
  ctx.lineTo(bodyW/2 - 6, -2);
  ctx.stroke();

  // headlight
  ctx.fillStyle = '#ffe156';
  ctx.shadowColor = 'rgba(255, 225, 86, 0.9)';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.arc(bodyW/2 - 3, -2, 2.4, 0, Math.PI * 2);
  ctx.fill();
  // taillight
  ctx.fillStyle = '#ff2dc7';
  ctx.shadowColor = 'rgba(255, 45, 199, 0.9)';
  ctx.beginPath();
  ctx.arc(-bodyW/2 + 3, -2, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // wheels
  drawWheel(-CAR.axleX, CAR.axleY, car.wBackRot);
  drawWheel( CAR.axleX, CAR.axleY, car.wFrontRot);

  ctx.restore();
}

function drawWheel(ox, oy, rot){
  ctx.save();
  ctx.translate(ox, oy);
  // tire
  ctx.fillStyle = '#0c0820';
  ctx.beginPath();
  ctx.arc(0, 0, CAR.wheelR, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(0, 246, 255, 0.6)';
  ctx.lineWidth = 1.2;
  ctx.stroke();
  // rim spokes
  ctx.save();
  ctx.rotate(rot);
  ctx.strokeStyle = '#fff4f6';
  ctx.lineWidth = 1.4;
  for (let i = 0; i < 4; i++){
    const a = (i / 4) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * (CAR.wheelR - 3), Math.sin(a) * (CAR.wheelR - 3));
    ctx.lineTo(-Math.cos(a) * (CAR.wheelR - 3), -Math.sin(a) * (CAR.wheelR - 3));
    ctx.stroke();
  }
  ctx.restore();
  // hub
  ctx.fillStyle = '#ff2dc7';
  ctx.beginPath();
  ctx.arc(0, 0, 3, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawSmoke(){
  ctx.globalCompositeOperation = 'lighter';
  for (const p of smoke){
    const k = p.age / p.life;
    const sx = WORLD_TO_SCREEN_X(p.x);
    const sy = WORLD_TO_SCREEN_Y(p.y);
    const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, p.r);
    grad.addColorStop(0, `hsla(${p.hue}, 90%, 70%, ${(1 - k) * 0.4})`);
    grad.addColorStop(1, `hsla(${p.hue}, 90%, 70%, 0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(sx, sy, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalCompositeOperation = 'source-over';
}

// ─────────────────────────────────────────────────────────────────────────
// HUD
// ─────────────────────────────────────────────────────────────────────────
function updateHud(){
  document.getElementById('speed').textContent = Math.abs(Math.round(car.vx));
  document.getElementById('score').textContent = score.toLocaleString();
  document.getElementById('dist').textContent = Math.floor(car.x / 10) + 'm';
  document.getElementById('driftFill').style.width = (driftMeter * 100).toFixed(1) + '%';
}

// ─────────────────────────────────────────────────────────────────────────
// main loop
// ─────────────────────────────────────────────────────────────────────────
let lastFrame = performance.now();
function frame(now){
  const dt = Math.min(0.04, (now - lastFrame) / 1000);
  lastFrame = now;
  drawBackground(now);
  if (gameState === 'playing'){
    step(dt);
    updateEngineAudio(car.vx, input.throttle);
    updateDriftAudio(input.drift && car.onGround ? Math.min(1, Math.abs(car.vx) / 200) : 0);
  } else {
    updateEngineAudio(0, 0);
    updateDriftAudio(0);
  }
  if (car){
    ctx.clearRect(0, 0, W, H);
    drawSmoke();
    drawTerrain();
    drawCar();
    updateHud();
  }
  requestAnimationFrame(frame);
}

window.addEventListener('resize', fit);
fit();
seedRamps();
resetCar();
requestAnimationFrame(frame);
</script>
</body>
</html>
