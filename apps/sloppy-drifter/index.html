<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>sloppy drifter</title>
<meta name="description" content="Top-down neon drift — accelerate, weave through cones, handbrake into long drifts on a glowing grid." />
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8F%8E%EF%B8%8F" />
<meta property="og:title" content="sloppy drifter" />
<meta property="og:description" content="Top-down neon drift — accelerate, weave through cones, handbrake into long drifts on a glowing grid." />
<meta property="og:url" content="https://sloppy.live/sloppy-drifter/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/top%20down%20neon%20synthwave%20drift%20car%20pink%20cyan%20grid%20arcade%20long%20tire%20trails?width=1200&height=630&nologo=true" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Audiowide&family=Share+Tech+Mono&family=Russo+One&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-deep: #050019;
    --magenta: #ff2dc7;
    --pink: #ff5ea1;
    --cyan: #00f6ff;
    --violet: #b07cff;
    --amber: #ffb35a;
    --yellow: #ffe156;
    --bone: #fff4f6;
    --ink: #ece4f8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg-deep);
    color: var(--ink);
    font-family: 'Share Tech Mono', monospace;
    user-select: none;
    touch-action: none;
  }
  #stage { position: fixed; inset: 0; }
  canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    display: block;
  }
  #bgCanvas { z-index: 1; }
  #gameCanvas { z-index: 2; }

  .ui { position: fixed; z-index: 5; pointer-events: none; }
  .ui > * { pointer-events: auto; }

  header.ui {
    top: 1rem; left: 1.4rem;
    line-height: 0.95;
  }
  h1 {
    font-family: 'Russo One', sans-serif;
    font-size: clamp(1.4rem, 3.4vw, 2.2rem);
    letter-spacing: 0.04em;
    color: var(--bone);
    text-shadow:
      0 0 12px rgba(255, 45, 199, 0.7),
      0 0 24px rgba(0, 246, 255, 0.45),
      2px 2px 0 rgba(0, 0, 0, 0.4);
  }
  h1 .sloppy { color: var(--magenta); }
  h1 .drift { color: var(--cyan); }
  .sub {
    font-family: 'Major Mono Display', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.32em;
    text-transform: lowercase;
    color: rgba(236, 228, 248, 0.6);
    margin-top: 0.4rem;
    text-shadow: 0 0 8px rgba(255, 94, 161, 0.4);
  }

  .hud {
    position: fixed;
    top: 1rem; right: 1.4rem;
    text-align: right;
    z-index: 5;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.66rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(236, 228, 248, 0.65);
    line-height: 1.6;
    text-shadow: 0 1px 3px rgba(0,0,0,0.7);
  }
  .hud .val {
    display: block;
    font-family: 'Audiowide', cursive;
    font-size: 1.5rem;
    letter-spacing: 0.02em;
    color: var(--bone);
    text-shadow: 0 0 10px rgba(0, 246, 255, 0.7);
    margin-top: 0.1rem;
    line-height: 1;
  }
  .hud .val.combo { color: var(--yellow); text-shadow: 0 0 10px rgba(255, 225, 86, 0.85); }
  .hud .val.dist { color: var(--magenta); text-shadow: 0 0 10px rgba(255, 45, 199, 0.85); }

  .driftbar {
    position: fixed;
    bottom: 1.2rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 4;
    width: min(24rem, calc(100vw - 2rem));
    pointer-events: none;
  }
  .driftbar .label {
    text-align: center;
    font-family: 'Major Mono Display', monospace;
    font-size: 0.66rem;
    letter-spacing: 0.32em;
    color: rgba(236, 228, 248, 0.55);
    margin-bottom: 0.3rem;
    text-shadow: 0 0 8px rgba(255, 45, 199, 0.5);
  }
  .driftbar .track {
    height: 0.6rem;
    background: rgba(20, 8, 40, 0.8);
    border: 1px solid rgba(255, 94, 161, 0.4);
    border-radius: 999px;
    overflow: hidden;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.7);
  }
  .driftbar .fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--magenta), var(--yellow), var(--cyan));
    transition: width 0.12s linear;
    box-shadow: 0 0 12px rgba(255, 225, 86, 0.6);
  }

  .toast {
    position: fixed;
    top: 32%;
    left: 50%;
    transform: translateX(-50%);
    z-index: 6;
    font-family: 'Audiowide', cursive;
    font-size: clamp(1.6rem, 4.6vw, 2.6rem);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--yellow);
    text-shadow: 0 0 18px currentColor, 0 0 36px currentColor;
    opacity: 0;
    pointer-events: none;
  }
  .toast.flash { animation: tflash 1.2s ease-out forwards; }
  @keyframes tflash {
    0% { transform: translate(-50%, 10px) scale(0.9); opacity: 0; }
    20% { transform: translate(-50%, 0) scale(1.12); opacity: 1; }
    100% { transform: translate(-50%, -20px) scale(1); opacity: 0; }
  }

  .start-overlay, .end-overlay {
    position: fixed; inset: 0;
    z-index: 10;
    background: radial-gradient(ellipse at 50% 50%, rgba(40,12,80,0.85), rgba(8,2,18,0.96));
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    text-align: center; padding: 2rem;
  }
  .end-overlay { display: none; }
  .end-overlay.show { display: flex; }
  .start-overlay.hide { display: none; }
  .start-overlay h2, .end-overlay .title {
    font-family: 'Russo One', sans-serif;
    font-size: clamp(2rem, 6vw, 3.4rem);
    color: var(--bone);
    text-shadow:
      0 0 20px rgba(255, 45, 199, 0.9),
      0 0 40px rgba(0, 246, 255, 0.55);
    letter-spacing: 0.04em;
    margin-bottom: 0.4rem;
  }
  .start-overlay .pitch {
    font-family: 'Major Mono Display', monospace;
    font-size: 0.82rem;
    letter-spacing: 0.32em;
    color: rgba(236, 228, 248, 0.55);
    margin-bottom: 1.8rem;
  }
  .controls-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 0.45rem 0.9rem;
    margin: 1rem 0 1.6rem;
    color: rgba(236, 228, 248, 0.85);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.78rem;
    text-align: left;
    align-items: center;
  }
  .kbd {
    display: inline-block;
    border: 1.5px solid var(--cyan);
    border-radius: 4px;
    color: var(--cyan);
    padding: 0.32rem 0.6rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.8rem;
    letter-spacing: 0.1em;
    box-shadow: 0 0 10px rgba(0, 246, 255, 0.45);
    min-width: 2rem;
    text-align: center;
  }
  .start-overlay button, .end-overlay button {
    appearance: none;
    background: linear-gradient(135deg, var(--magenta), var(--violet));
    border: 2px solid var(--bone);
    color: var(--bone);
    font-family: 'Russo One', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 0.18em;
    padding: 0.85rem 2.2rem;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 4px;
    box-shadow:
      0 0 22px rgba(255, 45, 199, 0.7),
      inset 0 0 4px var(--bone);
    transition: transform 0.08s, box-shadow 0.12s;
    margin-top: 0.6rem;
  }
  .start-overlay button:hover, .end-overlay button:hover {
    transform: translateY(-2px);
    box-shadow: 0 0 36px rgba(255, 45, 199, 0.95), inset 0 0 6px var(--bone);
  }
  .start-overlay button:focus-visible, .end-overlay button:focus-visible {
    outline: 3px solid var(--yellow); outline-offset: 4px;
  }
  .end-overlay .title { color: var(--cyan); text-shadow: 0 0 22px rgba(0, 246, 255, 0.95); margin-bottom: 1rem; }
  .end-overlay .stats {
    display: flex; gap: 2rem; margin-bottom: 1.8rem;
    flex-wrap: wrap; justify-content: center;
  }
  .end-overlay .stat {
    color: rgba(236, 228, 248, 0.6);
    font-size: 0.7rem; letter-spacing: 0.18em; text-transform: uppercase;
  }
  .end-overlay .stat .v {
    display: block;
    font-family: 'Audiowide', cursive;
    font-size: 2rem;
    color: var(--bone);
    text-shadow: 0 0 14px rgba(0, 246, 255, 0.7);
    margin-top: 0.2rem;
  }

  .touchpad {
    position: fixed;
    inset: auto 0 0 0;
    z-index: 7;
    display: none;
    justify-content: space-between;
    align-items: flex-end;
    padding: 0 1.2rem 1.2rem;
    pointer-events: none;
  }
  .touchpad.show { display: flex; }
  .touchpad .cluster {
    pointer-events: none;
    display: flex;
    gap: 0.7rem;
  }
  .touchpad .pad {
    pointer-events: auto;
    width: 6.4rem;
    height: 6.4rem;
    border-radius: 50%;
    border: 3px solid rgba(255, 94, 161, 0.7);
    background: rgba(20, 8, 40, 0.7);
    color: var(--bone);
    font-family: 'Russo One', sans-serif;
    font-size: 2.2rem;
    letter-spacing: 0.05em;
    display: grid;
    place-items: center;
    box-shadow: 0 0 24px rgba(255, 45, 199, 0.55), inset 0 0 14px rgba(255, 94, 161, 0.18);
    -webkit-tap-highlight-color: transparent;
    transition: transform 0.06s, background 0.06s, box-shadow 0.06s;
  }
  .touchpad .pad.cyan {
    border-color: var(--cyan);
    box-shadow: 0 0 28px rgba(0, 246, 255, 0.65), inset 0 0 16px rgba(0, 246, 255, 0.22);
    color: var(--cyan);
  }
  .touchpad .pad.yellow {
    border-color: var(--yellow);
    box-shadow: 0 0 28px rgba(255, 225, 86, 0.7), inset 0 0 16px rgba(255, 225, 86, 0.22);
    color: var(--yellow);
    font-size: 1.05rem;
    letter-spacing: 0.18em;
  }
  .touchpad .pad.pressed {
    background: rgba(0, 246, 255, 0.32);
    transform: scale(0.94);
    box-shadow: 0 0 36px currentColor, inset 0 0 22px rgba(255, 244, 246, 0.18);
  }
  .touchpad .pad-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.18em;
    color: rgba(236, 228, 248, 0.6);
    margin-top: 0.3rem;
    text-align: center;
    pointer-events: none;
  }
  .touchpad .col {
    pointer-events: none;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.2rem;
  }

  @media (hover: none) and (pointer: coarse) {
    .touchpad { display: flex; }
    .driftbar { bottom: 8.2rem; }
    .hud { font-size: 0.56rem; }
    .hud .val { font-size: 1rem; }
  }
  /* small phones — keep pads thumb-friendly but shrink a touch */
  @media (hover: none) and (pointer: coarse) and (max-width: 380px) {
    .touchpad .pad { width: 5.6rem; height: 5.6rem; font-size: 1.9rem; }
    .touchpad .pad.yellow { font-size: 0.9rem; }
  }
  /* landscape — keep pads larger and pinned to the outer edges */
  @media (hover: none) and (pointer: coarse) and (orientation: landscape) {
    .touchpad .pad { width: 7rem; height: 7rem; font-size: 2.4rem; }
    .touchpad { padding: 0 1.6rem 1.4rem; }
  }
  @media (max-width: 720px) {
    header.ui { top: 0.7rem; left: 0.9rem; }
    .hud { top: 0.7rem; right: 0.9rem; font-size: 0.6rem; }
    .hud .val { font-size: 1.15rem; }
    .sub { display: none; }
  }
  @media (prefers-reduced-motion: reduce) {
    .toast.flash { animation: none; opacity: 0; }
  }
</style>
</head>
<body>

<div id="stage" role="application" aria-label="Top-down drift game. Up arrow or W accelerates, Left and Right or A and D steer, Space holds the handbrake for drifts. Hit cones for sparks, collect glowing diamonds.">
  <canvas id="bgCanvas"></canvas>
  <canvas id="gameCanvas"></canvas>
</div>

<header class="ui">
  <h1><span class="sloppy">sloppy</span> <span class="drift">drifter</span></h1>
  <p class="sub">·· top · down · drift ··</p>
</header>

<div class="hud" aria-live="polite">
  <div>speed <span class="val" id="speed">0</span></div>
  <div>score <span class="val combo" id="score">0</span></div>
  <div>distance <span class="val dist" id="dist">0m</span></div>
</div>

<div class="driftbar">
  <div class="label">drift · meter</div>
  <div class="track"><div class="fill" id="driftFill"></div></div>
</div>

<div class="toast" id="toast"></div>

<div class="start-overlay" id="startOverlay">
  <h2>sloppy · drifter</h2>
  <div class="pitch">accelerate · steer · handbrake the long ones</div>
  <div class="controls-grid">
    <span class="kbd">↑</span><span>accelerate</span>
    <span class="kbd">← →</span><span>steer</span>
    <span class="kbd">Space</span><span>handbrake · drift</span>
    <span class="kbd">↓</span><span>reverse</span>
  </div>
  <button id="startBtn" type="button">start engine</button>
</div>

<div class="end-overlay" id="endOverlay" role="dialog" aria-modal="true" aria-hidden="true">
  <div class="title">session ended</div>
  <div class="stats">
    <div class="stat">score<span class="v" id="endScore">0</span></div>
    <div class="stat">distance<span class="v" id="endDist">0m</span></div>
    <div class="stat">best drift<span class="v" id="endDrift">0m</span></div>
    <div class="stat">cones<span class="v" id="endCones">0</span></div>
    <div class="stat">pickups<span class="v" id="endPickups">0</span></div>
  </div>
  <button id="restartBtn" type="button">drive again</button>
</div>

<div class="touchpad" id="touchpad" aria-hidden="true">
  <div class="cluster" aria-label="steering">
    <div class="col">
      <button class="pad" id="padLeft" aria-label="steer left">◀</button>
      <span class="pad-label">left</span>
    </div>
    <div class="col">
      <button class="pad" id="padRight" aria-label="steer right">▶</button>
      <span class="pad-label">right</span>
    </div>
  </div>
  <div class="cluster" aria-label="pedals">
    <div class="col">
      <button class="pad yellow" id="padDrift" aria-label="handbrake drift">DRIFT</button>
      <span class="pad-label">space</span>
    </div>
    <div class="col">
      <button class="pad cyan" id="padAccel" aria-label="accelerate">↑</button>
      <span class="pad-label">gas</span>
    </div>
  </div>
</div>

<script>
'use strict';

// ═════════════════════════════════════════════════════════════════════════
// sloppy drifter — top-down drift physics
// up arrow / W → accelerate
// left/right arrows or A/D → steer
// space → handbrake (drop grip → drift)
// down arrow / S → reverse
// ═════════════════════════════════════════════════════════════════════════

const bg = document.getElementById('bgCanvas').getContext('2d');
const ctx = document.getElementById('gameCanvas').getContext('2d');

let W = 0, H = 0, DPR = 1;
function fit(){
  DPR = Math.min(2, window.devicePixelRatio || 1);
  W = window.innerWidth; H = window.innerHeight;
  for (const c of [bg.canvas, ctx.canvas]){
    c.width = Math.floor(W * DPR);
    c.height = Math.floor(H * DPR);
    c.style.width = W + 'px';
    c.style.height = H + 'px';
  }
  bg.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}

// ─────────────────────────────────────────────────────────────────────────
// input
// ─────────────────────────────────────────────────────────────────────────
const input = { up: 0, down: 0, left: 0, right: 0, brake: 0 };

document.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  switch (e.code){
    case 'ArrowUp': case 'KeyW':    input.up = 1; break;
    case 'ArrowDown': case 'KeyS':  input.down = 1; break;
    case 'ArrowLeft': case 'KeyA':  input.left = 1; break;
    case 'ArrowRight': case 'KeyD': input.right = 1; break;
    case 'Space':                   input.brake = 1; e.preventDefault(); break;
  }
});
document.addEventListener('keyup', (e) => {
  switch (e.code){
    case 'ArrowUp': case 'KeyW':    input.up = 0; break;
    case 'ArrowDown': case 'KeyS':  input.down = 0; break;
    case 'ArrowLeft': case 'KeyA':  input.left = 0; break;
    case 'ArrowRight': case 'KeyD': input.right = 0; break;
    case 'Space':                   input.brake = 0; break;
  }
});

function bindTouch(el, set){
  if (!el) return;
  el.addEventListener('touchstart', (e) => { e.preventDefault(); set(1); el.classList.add('pressed'); }, {passive:false});
  el.addEventListener('touchend',   (e) => { e.preventDefault(); set(0); el.classList.remove('pressed'); }, {passive:false});
  el.addEventListener('mousedown',  (e) => { e.preventDefault(); set(1); el.classList.add('pressed'); });
  el.addEventListener('mouseup',    (e) => { e.preventDefault(); set(0); el.classList.remove('pressed'); });
  el.addEventListener('mouseleave', () => { set(0); el.classList.remove('pressed'); });
}
bindTouch(document.getElementById('padAccel'), (v) => input.up = v);
bindTouch(document.getElementById('padLeft'),  (v) => input.left = v);
bindTouch(document.getElementById('padRight'), (v) => input.right = v);
bindTouch(document.getElementById('padDrift'), (v) => input.brake = v);

// ─────────────────────────────────────────────────────────────────────────
// audio (lazy, user-gesture)
// ─────────────────────────────────────────────────────────────────────────
let actx = null, masterGain = null;
let engineOsc = null, engineSub = null, engineGain = null, engineFilter = null;
let driftSrc = null, driftGain = null;
let muted = false;

function ensureAudio(){
  if (actx) return actx;
  try { actx = new (window.AudioContext || window.webkitAudioContext)(); }
  catch(e){ return null; }
  masterGain = actx.createGain(); masterGain.gain.value = 0.6;
  masterGain.connect(actx.destination);

  engineOsc = actx.createOscillator();
  engineOsc.type = 'sawtooth';
  engineOsc.frequency.value = 80;
  engineSub = actx.createOscillator();
  engineSub.type = 'square';
  engineSub.frequency.value = 60;
  engineFilter = actx.createBiquadFilter();
  engineFilter.type = 'lowpass';
  engineFilter.frequency.value = 700;
  engineFilter.Q.value = 1.4;
  engineGain = actx.createGain();
  engineGain.gain.value = 0;
  engineOsc.connect(engineFilter);
  engineSub.connect(engineFilter);
  engineFilter.connect(engineGain);
  engineGain.connect(masterGain);
  engineOsc.start(); engineSub.start();

  const len = Math.floor(actx.sampleRate * 1.0);
  const buf = actx.createBuffer(1, len, actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
  driftSrc = actx.createBufferSource();
  driftSrc.buffer = buf;
  driftSrc.loop = true;
  const dbp = actx.createBiquadFilter();
  dbp.type = 'bandpass';
  dbp.frequency.value = 2400;
  dbp.Q.value = 7;
  driftGain = actx.createGain();
  driftGain.gain.value = 0;
  driftSrc.connect(dbp); dbp.connect(driftGain); driftGain.connect(masterGain);
  driftSrc.start();

  return actx;
}
function updateEngineAudio(speed, throttling){
  if (!actx || muted) return;
  const t = actx.currentTime;
  const sp = Math.abs(speed);
  const targetFreq = 70 + Math.min(360, sp * 1.4);
  engineOsc.frequency.setTargetAtTime(targetFreq, t, 0.05);
  engineSub.frequency.setTargetAtTime(targetFreq * 0.5, t, 0.05);
  const cutoff = 500 + Math.min(2400, sp * 5);
  engineFilter.frequency.setTargetAtTime(cutoff, t, 0.08);
  const g = throttling ? 0.15 : 0.08;
  engineGain.gain.setTargetAtTime(g, t, 0.1);
}
function updateDriftAudio(intensity){
  if (!actx || muted) return;
  driftGain.gain.setTargetAtTime(intensity * 0.18, actx.currentTime, 0.06);
}
function sfxCone(){
  if (!actx || muted) return;
  const t = actx.currentTime;
  const o = actx.createOscillator();
  const g = actx.createGain();
  o.type = 'triangle';
  o.frequency.setValueAtTime(640, t);
  o.frequency.exponentialRampToValueAtTime(220, t + 0.18);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.18, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
  o.connect(g); g.connect(masterGain);
  o.start(t); o.stop(t + 0.24);
}
function sfxPickup(){
  if (!actx || muted) return;
  const t = actx.currentTime;
  for (const [f, dt] of [[660, 0], [880, 0.06], [1320, 0.12]]){
    const o = actx.createOscillator();
    const g = actx.createGain();
    o.type = 'sine';
    o.frequency.value = f;
    g.gain.setValueAtTime(0.0001, t + dt);
    g.gain.exponentialRampToValueAtTime(0.16, t + dt + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dt + 0.2);
    o.connect(g); g.connect(masterGain);
    o.start(t + dt); o.stop(t + dt + 0.22);
  }
}

// ─────────────────────────────────────────────────────────────────────────
// car — top-down 2-state model
// pos (x, y), heading θ (radians), velocity vector (vx, vy) independent of θ
//
// each frame:
//   forward = (cos θ, sin θ)
//   forwardSpeed = vx*cos + vy*sin            (signed scalar speed along heading)
//   lateral velocity = v - forward * forwardSpeed
//   if grounded (always, top-down): lateral *= gripDecay^dt
//     gripDecay tight (0.05) when not drifting → lateral velocity dies fast
//     gripDecay loose (0.7) when drifting → lateral persists → slide visible
//   forwardSpeed *= rollingFriction^dt
//   apply throttle / brake along forward
//   heading += steer * turnRate * speedFactor(forwardSpeed)
//   v = forward * forwardSpeed + lateral
//   pos += v * dt
// ─────────────────────────────────────────────────────────────────────────
const CAR = {
  width: 22, length: 38,
  maxSpeed: 480,
  reverseSpeed: 220,
  thrust: 360,
  brakeForce: 580,        // forward brake on space (when moving forward)
  reverseThrust: 220,
  rollFric: 0.36,         // per-second linear-velocity coefficient (low → rolls forever)
  baseGripDecay: 4.6,     // higher = more lateral grip (lateral dies faster)
  driftGripDecay: 0.55,   // very low = handbrake drift
  turnRate: 2.5,          // rad/s base
};

let car = null;
function newCar(){
  return {
    x: 0, y: 0,
    vx: 0, vy: 0,
    heading: -Math.PI / 2,   // pointing up by default
    steer: 0,                 // smoothed steer input (-1..1)
    wheelSpin: 0,             // for visual rotation of wheels
    alive: true,
    isDrifting: false,
    driftIntensity: 0,
  };
}

// ─────────────────────────────────────────────────────────────────────────
// world — sparse infinite open plain with cones + pickups
// items live in world coords; spawn ahead of the player's direction of travel
// ─────────────────────────────────────────────────────────────────────────
const cones = [];     // { x, y, hit: bool, sparks: 0 }
const pickups = [];   // { x, y, taken: bool, phase }
const SCATTER_R = 1100;    // spawn radius around the car
let coneCount = 0;
let pickupCount = 0;

function maintainItems(){
  // ensure ~30 cones and ~14 pickups within SCATTER_R of the car
  while (cones.filter(c => !c.hit).length < 30){
    spawnConeNear();
  }
  while (pickups.filter(p => !p.taken).length < 14){
    spawnPickupNear();
  }
  // cull items far behind/ahead
  for (let i = cones.length - 1; i >= 0; i--){
    const c = cones[i];
    if (Math.hypot(c.x - car.x, c.y - car.y) > SCATTER_R * 1.6){
      cones.splice(i, 1);
    }
  }
  for (let i = pickups.length - 1; i >= 0; i--){
    const p = pickups[i];
    if (Math.hypot(p.x - car.x, p.y - car.y) > SCATTER_R * 1.6){
      pickups.splice(i, 1);
    }
  }
}

function spawnConeNear(){
  // bias toward where the player is heading; ring distance 250..SCATTER_R
  const ang = Math.atan2(car.vy, car.vx);
  const speed = Math.hypot(car.vx, car.vy);
  const biasAngle = speed > 30 ? ang : Math.random() * Math.PI * 2;
  const off = (Math.random() - 0.5) * Math.PI * 1.4;
  const a = biasAngle + off;
  const r = 320 + Math.random() * (SCATTER_R - 320);
  cones.push({ x: car.x + Math.cos(a) * r, y: car.y + Math.sin(a) * r, hit: false, sparkPhase: Math.random() });
}

function spawnPickupNear(){
  const ang = Math.atan2(car.vy, car.vx);
  const speed = Math.hypot(car.vx, car.vy);
  const biasAngle = speed > 30 ? ang : Math.random() * Math.PI * 2;
  const off = (Math.random() - 0.5) * Math.PI * 1.2;
  const a = biasAngle + off;
  const r = 280 + Math.random() * (SCATTER_R - 280);
  pickups.push({ x: car.x + Math.cos(a) * r, y: car.y + Math.sin(a) * r, taken: false, phase: Math.random() * Math.PI * 2 });
}

// ─────────────────────────────────────────────────────────────────────────
// trails / smoke / sparks
// ─────────────────────────────────────────────────────────────────────────
const trails = [];   // {x, y, angle, life, age, intensity} per-wheel skid marks
const smoke = [];    // {x, y, vx, vy, r, life, age, hue}
const sparks = [];   // {x, y, vx, vy, life, age, color}

// ─────────────────────────────────────────────────────────────────────────
// game state
// ─────────────────────────────────────────────────────────────────────────
let camX = 0, camY = 0;
let score = 0;
let totalDistance = 0;
let driftMeter = 0;
let driftRun = 0;       // current drift segment distance
let bestDriftRun = 0;
let totalDriftDistance = 0;
let gameState = 'menu';
let lastFrame = performance.now();

function resetGame(){
  car = newCar();
  cones.length = 0;
  pickups.length = 0;
  trails.length = 0;
  smoke.length = 0;
  sparks.length = 0;
  camX = 0; camY = 0;
  score = 0;
  totalDistance = 0;
  driftMeter = 0;
  driftRun = 0;
  bestDriftRun = 0;
  totalDriftDistance = 0;
  coneCount = 0;
  pickupCount = 0;
  maintainItems();
  document.getElementById('endOverlay').classList.remove('show');
  document.getElementById('endOverlay').setAttribute('aria-hidden','true');
}

function startGame(){
  ensureAudio();
  if (actx && actx.state === 'suspended') actx.resume();
  resetGame();
  gameState = 'playing';
  document.getElementById('startOverlay').classList.add('hide');
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', () => {
  document.getElementById('endOverlay').classList.remove('show');
  startGame();
});
document.addEventListener('keydown', (e) => {
  if (e.code === 'KeyM'){ muted = !muted; }
  if (e.code === 'Escape' && gameState !== 'menu'){
    gameState = 'menu';
    document.getElementById('startOverlay').classList.remove('hide');
    document.getElementById('endOverlay').classList.remove('show');
  }
});

function showToast(text, color){
  const t = document.getElementById('toast');
  t.textContent = text;
  if (color) t.style.color = color;
  t.classList.remove('flash');
  void t.offsetWidth;
  t.classList.add('flash');
}

// ─────────────────────────────────────────────────────────────────────────
// physics step
// ─────────────────────────────────────────────────────────────────────────
function step(dt){
  if (!car.alive) return;

  // ── steer ──
  // smooth steer input toward target
  const steerInput = (input.right - input.left);
  const steerTarget = steerInput;
  car.steer += (steerTarget - car.steer) * Math.min(1, dt * 8);

  // forward / lateral decomposition
  const fcos = Math.cos(car.heading);
  const fsin = Math.sin(car.heading);
  const forwardSpeed = car.vx * fcos + car.vy * fsin;          // along heading
  const latVx = car.vx - fcos * forwardSpeed;
  const latVy = car.vy - fsin * forwardSpeed;
  const latSpeed = Math.hypot(latVx, latVy);

  // ── grip ──
  // drifting is engaged either by handbrake or by hard turn at speed
  const speed = Math.hypot(car.vx, car.vy);
  const wantsDrift = input.brake > 0.5;
  // implicit drift if turning hard at high speed (small extra slide)
  const implicitDrift = Math.abs(car.steer) > 0.7 && Math.abs(forwardSpeed) > 280 ? 0.4 : 0;
  car.isDrifting = wantsDrift || implicitDrift > 0;
  car.driftIntensity = wantsDrift ? 1 : implicitDrift;
  const gripDecay = wantsDrift ? CAR.driftGripDecay : CAR.baseGripDecay;
  const gripFactor = Math.pow(0.05, gripDecay * dt);   // approaches 0 quickly when decay is high
  const newLatVx = latVx * gripFactor;
  const newLatVy = latVy * gripFactor;

  // ── thrust / brake ──
  let newForwardSpeed = forwardSpeed;
  // rolling friction
  const rollK = Math.pow(0.05, CAR.rollFric * dt);
  newForwardSpeed *= rollK;
  if (input.up){
    newForwardSpeed += CAR.thrust * dt;
  }
  if (input.down){
    // reverse: brake then push backwards
    if (newForwardSpeed > 5) newForwardSpeed -= CAR.brakeForce * dt;
    else newForwardSpeed -= CAR.reverseThrust * dt;
  }
  if (wantsDrift){
    // handbrake — strong forward brake but doesn't kill lateral
    if (newForwardSpeed > 0) newForwardSpeed -= CAR.brakeForce * 0.6 * dt;
    else newForwardSpeed *= 0.96;
  }
  // clamp to ±maxSpeed
  if (newForwardSpeed > CAR.maxSpeed) newForwardSpeed = CAR.maxSpeed;
  if (newForwardSpeed < -CAR.reverseSpeed) newForwardSpeed = -CAR.reverseSpeed;

  // ── steering: turn rate scales with forward speed and direction ──
  // at zero forward speed you can't turn (realistic); at max speed turn rate is reduced for stability
  const turnFactor = (() => {
    const s = Math.abs(newForwardSpeed);
    if (s < 20) return 0;
    // small reduction at very high speed for stability, more reduction when not drifting
    const speedFraction = Math.min(1, s / CAR.maxSpeed);
    const reduction = wantsDrift ? 0.05 : 0.35;
    return 1 - reduction * speedFraction;
  })();
  const direction = newForwardSpeed >= 0 ? 1 : -1;
  car.heading += car.steer * CAR.turnRate * turnFactor * direction * dt;

  // ── reassemble velocity ──
  const fcos2 = Math.cos(car.heading);
  const fsin2 = Math.sin(car.heading);
  car.vx = fcos2 * newForwardSpeed + newLatVx;
  car.vy = fsin2 * newForwardSpeed + newLatVy;

  // integrate position
  car.x += car.vx * dt;
  car.y += car.vy * dt;

  // visual wheel spin
  car.wheelSpin += newForwardSpeed * dt * 0.06;

  // total distance covered (forward+lateral)
  const moved = Math.hypot(car.vx, car.vy) * dt;
  totalDistance += moved;

  // ── drift scoring ──
  if (car.isDrifting && Math.abs(newForwardSpeed) > 80 && latSpeed > 30){
    driftMeter = Math.min(1, driftMeter + dt * 0.55);
    driftRun += moved;
    if (driftRun > bestDriftRun) bestDriftRun = driftRun;
    totalDriftDistance += moved;
    score += Math.floor(latSpeed * dt * 0.5);
    // smoke
    if (Math.random() < 0.55){
      // emit at rear wheels
      const rcos = Math.cos(car.heading), rsin = Math.sin(car.heading);
      const offFx = -rcos * CAR.length * 0.32;
      const offFy = -rsin * CAR.length * 0.32;
      const offSx = -rsin * CAR.width * 0.45;
      const offSy =  rcos * CAR.width * 0.45;
      for (const side of [1, -1]){
        smoke.push({
          x: car.x + offFx + offSx * side,
          y: car.y + offFy + offSy * side,
          vx: (Math.random() - 0.5) * 30 - car.vx * 0.1,
          vy: (Math.random() - 0.5) * 30 - car.vy * 0.1,
          r: 6 + Math.random() * 6,
          life: 0.9 + Math.random() * 0.5,
          age: 0,
          hue: 280 + Math.random() * 60,
        });
      }
      // skid trail
      const angle = Math.atan2(latVy, latVx);
      const rcos2 = Math.cos(car.heading), rsin2 = Math.sin(car.heading);
      for (const side of [1, -1]){
        const tx = car.x + (-rcos2) * CAR.length * 0.32 + (-rsin2) * CAR.width * 0.45 * side;
        const ty = car.y + (-rsin2) * CAR.length * 0.32 + ( rcos2) * CAR.width * 0.45 * side;
        trails.push({ x: tx, y: ty, angle: car.heading, life: 4.5, age: 0,
                      intensity: Math.min(1, latSpeed / 200) });
      }
    }
  } else {
    if (driftRun > 80){
      const bonus = Math.floor(driftRun * 0.4);
      score += bonus;
      if (driftRun > 220){
        showToast('drift +' + bonus, '#ffe156');
      }
    }
    driftRun = 0;
    driftMeter = Math.max(0, driftMeter - dt * 0.42);
  }

  // ── cone collisions ──
  for (const c of cones){
    if (c.hit) continue;
    const dx = c.x - car.x, dy = c.y - car.y;
    const d2 = dx * dx + dy * dy;
    if (d2 < 26 * 26){
      c.hit = true;
      coneCount++;
      score += 40;
      sfxCone();
      // sparks
      for (let i = 0; i < 14; i++){
        const a = Math.random() * Math.PI * 2;
        const s = 80 + Math.random() * 200;
        sparks.push({
          x: c.x, y: c.y,
          vx: Math.cos(a) * s + car.vx * 0.3,
          vy: Math.sin(a) * s + car.vy * 0.3,
          r: 1.6 + Math.random() * 1.6,
          life: 0.5 + Math.random() * 0.4,
          age: 0,
          color: ['#ffe156','#ff7a59','#fff4f6'][Math.floor(Math.random()*3)],
        });
      }
    }
  }

  // ── pickup collisions ──
  for (const p of pickups){
    if (p.taken) continue;
    const dx = p.x - car.x, dy = p.y - car.y;
    if (dx * dx + dy * dy < 28 * 28){
      p.taken = true;
      pickupCount++;
      score += 150;
      sfxPickup();
      for (let i = 0; i < 12; i++){
        const a = (i / 12) * Math.PI * 2;
        sparks.push({
          x: p.x, y: p.y,
          vx: Math.cos(a) * 220, vy: Math.sin(a) * 220,
          r: 2, life: 0.6, age: 0, color: '#00f6ff',
        });
      }
      showToast('+150', '#00f6ff');
    }
  }

  // update particles
  for (let i = smoke.length - 1; i >= 0; i--){
    const p = smoke[i]; p.age += dt;
    if (p.age >= p.life){ smoke.splice(i, 1); continue; }
    p.vx *= 0.985; p.vy *= 0.985;
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.r += 18 * dt;
  }
  for (let i = sparks.length - 1; i >= 0; i--){
    const p = sparks[i]; p.age += dt;
    if (p.age >= p.life){ sparks.splice(i, 1); continue; }
    p.vx *= 0.96; p.vy *= 0.96;
    p.x += p.vx * dt; p.y += p.vy * dt;
  }
  for (let i = trails.length - 1; i >= 0; i--){
    const t = trails[i]; t.age += dt;
    if (t.age >= t.life){ trails.splice(i, 1); continue; }
  }

  // cull / spawn items
  maintainItems();

  // camera follow
  const camLerp = Math.min(1, dt * 4);
  const lookX = car.x + car.vx * 0.35;
  const lookY = car.y + car.vy * 0.35;
  camX += (lookX - camX) * camLerp;
  camY += (lookY - camY) * camLerp;

  // pickup phase tick (visual)
  for (const p of pickups) if (!p.taken) p.phase += dt * 2.5;

  // HUD
  document.getElementById('speed').textContent = Math.round(Math.abs(newForwardSpeed));
  document.getElementById('score').textContent = score.toLocaleString();
  document.getElementById('dist').textContent = Math.floor(totalDistance / 10) + 'm';
  document.getElementById('driftFill').style.width = (driftMeter * 100).toFixed(1) + '%';
}

// ─────────────────────────────────────────────────────────────────────────
// rendering
// ─────────────────────────────────────────────────────────────────────────
const W2S = (wx, wy) => [wx - camX + W / 2, wy - camY + H / 2];

function drawBackground(now){
  bg.clearRect(0, 0, W, H);
  // dark base
  const baseG = bg.createLinearGradient(0, 0, 0, H);
  baseG.addColorStop(0, '#0c0228');
  baseG.addColorStop(1, '#04001a');
  bg.fillStyle = baseG;
  bg.fillRect(0, 0, W, H);

  // radial neon halo behind car position (subtle vignette of magenta)
  const cx = W / 2, cy = H / 2;
  const halo = bg.createRadialGradient(cx, cy, 40, cx, cy, Math.max(W, H) * 0.8);
  halo.addColorStop(0, 'rgba(255, 45, 199, 0.10)');
  halo.addColorStop(1, 'rgba(0, 0, 0, 0.5)');
  bg.fillStyle = halo;
  bg.fillRect(0, 0, W, H);

  // ── neon grid that scrolls with camera ──
  const GRID = 120;
  const ox = ((camX % GRID) + GRID) % GRID;
  const oy = ((camY % GRID) + GRID) % GRID;
  bg.strokeStyle = 'rgba(255, 45, 199, 0.35)';
  bg.lineWidth = 1;
  bg.beginPath();
  for (let x = -ox; x < W + GRID; x += GRID){
    bg.moveTo(x, 0); bg.lineTo(x, H);
  }
  for (let y = -oy; y < H + GRID; y += GRID){
    bg.moveTo(0, y); bg.lineTo(W, y);
  }
  bg.stroke();
  // brighter major lines every 5 cells
  bg.strokeStyle = 'rgba(0, 246, 255, 0.55)';
  bg.lineWidth = 1.5;
  bg.shadowColor = 'rgba(0, 246, 255, 0.6)';
  bg.shadowBlur = 8;
  bg.beginPath();
  for (let x = -ox; x < W + GRID; x += GRID){
    const wx = Math.round((x + camX - W/2) / GRID);
    if (wx % 5 === 0){ bg.moveTo(x, 0); bg.lineTo(x, H); }
  }
  for (let y = -oy; y < H + GRID; y += GRID){
    const wy = Math.round((y + camY - H/2) / GRID);
    if (wy % 5 === 0){ bg.moveTo(0, y); bg.lineTo(W, y); }
  }
  bg.stroke();
  bg.shadowBlur = 0;

  // sparse stars / dots at grid intersections (twinkle)
  const t = now * 0.001;
  bg.fillStyle = 'rgba(255, 244, 246, 0.6)';
  for (let x = -ox; x < W + GRID; x += GRID){
    for (let y = -oy; y < H + GRID; y += GRID){
      const wx = Math.round((x + camX - W/2) / GRID);
      const wy = Math.round((y + camY - H/2) / GRID);
      if ((wx + wy) % 7 === 0){
        const tw = 0.4 + 0.4 * Math.sin(t + wx * 0.7 + wy * 0.3);
        bg.globalAlpha = tw;
        bg.beginPath();
        bg.arc(x, y, 1.4, 0, Math.PI * 2);
        bg.fill();
      }
    }
  }
  bg.globalAlpha = 1;
}

function drawWorld(){
  ctx.clearRect(0, 0, W, H);

  // skid trails (under everything else)
  for (const t of trails){
    const k = t.age / t.life;
    const [sx, sy] = W2S(t.x, t.y);
    if (sx < -20 || sx > W + 20 || sy < -20 || sy > H + 20) continue;
    const a = (1 - k) * 0.45 * t.intensity;
    ctx.fillStyle = `rgba(20, 4, 30, ${a.toFixed(3)})`;
    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(t.angle);
    ctx.fillRect(-5, -2, 10, 4);
    ctx.restore();
  }

  // smoke
  ctx.globalCompositeOperation = 'lighter';
  for (const p of smoke){
    const k = p.age / p.life;
    const [sx, sy] = W2S(p.x, p.y);
    if (sx < -50 || sx > W + 50 || sy < -50 || sy > H + 50) continue;
    const grad = ctx.createRadialGradient(sx, sy, 0, sx, sy, p.r);
    grad.addColorStop(0, `hsla(${p.hue}, 90%, 70%, ${(1 - k) * 0.55})`);
    grad.addColorStop(1, `hsla(${p.hue}, 90%, 70%, 0)`);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(sx, sy, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalCompositeOperation = 'source-over';

  // sparks
  for (const p of sparks){
    const k = p.age / p.life;
    const [sx, sy] = W2S(p.x, p.y);
    if (sx < -20 || sx > W + 20 || sy < -20 || sy > H + 20) continue;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = 1 - k;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(sx, sy, p.r * (1 - k * 0.5), 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;

  // cones
  for (const c of cones){
    const [sx, sy] = W2S(c.x, c.y);
    if (sx < -40 || sx > W + 40 || sy < -40 || sy > H + 40) continue;
    if (!c.hit){
      // cone body — orange triangle on black base with white stripe (top-down view: rings)
      ctx.shadowColor = 'rgba(255, 122, 89, 0.85)';
      ctx.shadowBlur = 10;
      ctx.fillStyle = '#ff7a59';
      ctx.beginPath();
      ctx.arc(sx, sy, 9, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#ffe156';
      ctx.beginPath();
      ctx.arc(sx, sy, 5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#1a040f';
      ctx.beginPath();
      ctx.arc(sx, sy, 2.2, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // squashed remnant
      ctx.fillStyle = 'rgba(120, 60, 30, 0.5)';
      ctx.beginPath();
      ctx.ellipse(sx, sy, 9, 4, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // pickups — pulsing diamonds
  for (const p of pickups){
    if (p.taken) continue;
    const [sx, sy] = W2S(p.x, p.y);
    if (sx < -40 || sx > W + 40 || sy < -40 || sy > H + 40) continue;
    const pulse = 1 + Math.sin(p.phase) * 0.18;
    ctx.save();
    ctx.translate(sx, sy);
    ctx.rotate(Math.PI / 4 + p.phase * 0.4);
    ctx.shadowColor = 'rgba(0, 246, 255, 0.95)';
    ctx.shadowBlur = 16;
    ctx.fillStyle = '#00f6ff';
    const s = 9 * pulse;
    ctx.beginPath();
    ctx.moveTo(0, -s);
    ctx.lineTo(s, 0);
    ctx.lineTo(0, s);
    ctx.lineTo(-s, 0);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#fff4f6';
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.moveTo(0, -s * 0.55);
    ctx.lineTo(s * 0.55, 0);
    ctx.lineTo(0, s * 0.55);
    ctx.lineTo(-s * 0.55, 0);
    ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // car
  drawCar();
}

function drawCar(){
  const [sx, sy] = W2S(car.x, car.y);
  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(car.heading);

  // ground shadow
  ctx.fillStyle = 'rgba(0, 0, 0, 0.35)';
  ctx.beginPath();
  ctx.ellipse(0, 0, CAR.length * 0.55, CAR.width * 0.55, 0, 0, Math.PI * 2);
  ctx.fill();

  // body
  const grad = ctx.createLinearGradient(-CAR.length/2, 0, CAR.length/2, 0);
  grad.addColorStop(0, '#7a0e6e');
  grad.addColorStop(0.5, '#ff2dc7');
  grad.addColorStop(1, '#ffe156');
  ctx.fillStyle = grad;
  ctx.strokeStyle = '#fff4f6';
  ctx.lineWidth = 1.2;
  // sportscar silhouette top-down (rounded rectangle with pointed nose)
  const L = CAR.length, Wd = CAR.width;
  ctx.beginPath();
  ctx.moveTo(-L/2 + 2, -Wd/2);
  ctx.lineTo(L/2 - 7, -Wd/2);
  ctx.lineTo(L/2, -Wd/2 + 4);
  ctx.lineTo(L/2, Wd/2 - 4);
  ctx.lineTo(L/2 - 7, Wd/2);
  ctx.lineTo(-L/2 + 2, Wd/2);
  ctx.lineTo(-L/2, Wd/2 - 4);
  ctx.lineTo(-L/2, -Wd/2 + 4);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // windshield + roof — cyan glass cabin
  ctx.fillStyle = 'rgba(0, 246, 255, 0.75)';
  ctx.beginPath();
  ctx.moveTo(-L/2 + 6, -Wd/2 + 3);
  ctx.lineTo(L/2 - 12, -Wd/2 + 3);
  ctx.lineTo(L/2 - 14, Wd/2 - 3);
  ctx.lineTo(-L/2 + 6, Wd/2 - 3);
  ctx.closePath();
  ctx.fill();
  // canopy reflection
  ctx.fillStyle = 'rgba(255, 244, 246, 0.42)';
  ctx.beginPath();
  ctx.moveTo(-L/2 + 6, -Wd/2 + 3);
  ctx.lineTo(L/2 - 12, -Wd/2 + 3);
  ctx.lineTo(L/2 - 14, -1);
  ctx.lineTo(-L/2 + 6, -1);
  ctx.closePath();
  ctx.fill();

  // headlights — front, yellow
  ctx.fillStyle = '#ffe156';
  ctx.shadowColor = 'rgba(255, 225, 86, 0.95)';
  ctx.shadowBlur = 14;
  ctx.beginPath();
  ctx.arc(L/2 - 2, -Wd/2 + 4, 2.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(L/2 - 2, Wd/2 - 4, 2.4, 0, Math.PI * 2);
  ctx.fill();
  // taillights — rear, magenta
  ctx.fillStyle = '#ff2dc7';
  ctx.shadowColor = 'rgba(255, 45, 199, 0.95)';
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.arc(-L/2 + 2, -Wd/2 + 4, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(-L/2 + 2, Wd/2 - 4, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // wheels — front pair rotates with steer
  drawWheelTop(-L/2 + 9, -Wd/2 - 1, 0);
  drawWheelTop(-L/2 + 9,  Wd/2 + 1, 0);
  drawWheelTop( L/2 - 11, -Wd/2 - 1, car.steer * 0.42);
  drawWheelTop( L/2 - 11,  Wd/2 + 1, car.steer * 0.42);

  // motion blur / glow when fast
  const speed = Math.hypot(car.vx, car.vy);
  if (speed > 320){
    ctx.globalAlpha = Math.min(0.6, (speed - 320) / 200);
    ctx.strokeStyle = '#00f6ff';
    ctx.lineWidth = 1;
    ctx.shadowColor = '#00f6ff';
    ctx.shadowBlur = 14;
    ctx.beginPath();
    ctx.rect(-L/2 - 2, -Wd/2 - 2, L + 4, Wd + 4);
    ctx.stroke();
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }

  ctx.restore();
}

function drawWheelTop(x, y, rot){
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(rot);
  ctx.fillStyle = '#0a0214';
  ctx.fillRect(-3.4, -4, 6.8, 8);
  ctx.strokeStyle = 'rgba(0, 246, 255, 0.55)';
  ctx.lineWidth = 0.8;
  ctx.strokeRect(-3.4, -4, 6.8, 8);
  ctx.restore();
}

// ─────────────────────────────────────────────────────────────────────────
// main loop
// ─────────────────────────────────────────────────────────────────────────
function frame(now){
  const dt = Math.min(0.04, (now - lastFrame) / 1000);
  lastFrame = now;
  drawBackground(now);
  if (gameState === 'playing'){
    step(dt);
    const fwd = car.vx * Math.cos(car.heading) + car.vy * Math.sin(car.heading);
    updateEngineAudio(fwd, input.up);
    const latVx = car.vx - Math.cos(car.heading) * fwd;
    const latVy = car.vy - Math.sin(car.heading) * fwd;
    const latSp = Math.hypot(latVx, latVy);
    updateDriftAudio(car.isDrifting && Math.abs(fwd) > 80 ? Math.min(1, latSp / 200) : 0);
  } else {
    updateEngineAudio(0, 0);
    updateDriftAudio(0);
  }
  if (car){
    drawWorld();
  }
  requestAnimationFrame(frame);
}

window.addEventListener('resize', fit);
fit();
car = newCar();
maintainItems();
requestAnimationFrame(frame);
</script>
</body>
</html>
