<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>hello, forth</title>
<meta name="description" content="A minimal Forth hello-world. Stack-based. Words push and pop. Watch the stack live." />
<meta property="og:title" content="hello, forth" />
<meta property="og:description" content="A minimal Forth hello-world. Stack-based. Words push and pop. Watch the stack live." />
<meta property="og:url" content="https://sloppy.live/hello-forth" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/forth%20programming%20language%20stack%20amber%20phosphor%20terminal%20vintage%20serial%20console%20rpn%20chuck%20moore?width=1200&height=630&nologo=true" />
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%A7%B1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Major+Mono+Display&family=IM+Fell+English:ital@1&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0a0703;
    --panel:#100a04;
    --amber:#ffb340;
    --amber-bright:#ffd690;
    --amber-dim:#7d5826;
    --ink:#f5dca5;
    --dim:#6c5430;
    --green:#9adb6a;
    --line:rgba(255,179,64,0.16);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(1100px 700px at 50% -10%, rgba(255,179,64,0.08), transparent 60%),
      radial-gradient(900px 600px at 50% 110%, rgba(255,179,64,0.04), transparent 60%),
      var(--bg);
    color:var(--ink);
    font-family:'VT323', monospace;
    min-height:100vh;
    display:grid;
    place-items:start center;
    padding:32px 18px;
  }
  body::before{
    content:'';
    position:fixed;
    inset:0;
    background:repeating-linear-gradient(0deg, rgba(255,179,64,0.02), rgba(255,179,64,0.02) 1px, transparent 1px, transparent 4px);
    pointer-events:none;
    z-index:1;
  }
  .stage{
    width:min(820px, 100%);
    display:flex;
    flex-direction:column;
    gap:18px;
    position:relative;
    z-index:2;
  }
  header{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    gap:14px;
    flex-wrap:wrap;
  }
  .brand{
    font-family:'Major Mono Display', monospace;
    font-size:clamp(28px, 5vw, 44px);
    color:var(--amber-bright);
    text-shadow:0 0 18px rgba(255,179,64,0.3);
    letter-spacing:0.04em;
  }
  .brand em{font-style:normal;color:var(--amber)}
  .tag{
    font-size:14px;
    letter-spacing:0.32em;
    color:var(--dim);
    text-transform:uppercase;
  }
  .grid{
    display:grid;
    grid-template-columns:1.4fr 1fr;
    gap:14px;
  }
  @media (max-width:680px){
    .grid{grid-template-columns:1fr}
  }
  .panel{
    background:var(--panel);
    border:1px solid var(--line);
    padding:14px 16px;
  }
  .panel-head{
    font-size:14px;
    letter-spacing:0.28em;
    color:var(--amber-dim);
    text-transform:uppercase;
    margin-bottom:10px;
  }
  .program{
    font-size:22px;
    line-height:1.6;
    color:var(--ink);
    word-break:break-word;
  }
  .program .word{color:var(--amber)}
  .program .str{color:var(--green)}
  .program .cmt{color:var(--dim);font-style:italic;font-family:'IM Fell English', serif;font-size:18px}
  .program .cur{
    background:var(--amber);
    color:#100a04;
    padding:0 4px;
  }
  .stack{
    display:flex;
    flex-direction:column-reverse;
    gap:4px;
    min-height:240px;
    padding:10px 0;
    border-bottom:1px dashed var(--amber-dim);
    position:relative;
  }
  .stack::after{
    content:'↑ TOP';
    position:absolute;
    top:-2px;
    right:0;
    font-size:11px;
    letter-spacing:0.2em;
    color:var(--amber-dim);
  }
  .frame{
    background:var(--bg);
    border:1px solid var(--line);
    padding:8px 12px;
    font-size:18px;
    color:var(--amber-bright);
    animation:push 0.32s ease-out;
  }
  @keyframes push{
    from{transform:translateY(-12px);opacity:0}
    to{transform:translateY(0);opacity:1}
  }
  .stack-empty{
    color:var(--dim);
    font-size:14px;
    letter-spacing:0.2em;
    text-transform:uppercase;
    padding:30px 0;
    text-align:center;
  }
  .controls{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  button{
    background:transparent;
    border:1px solid var(--amber-dim);
    color:var(--amber);
    font-family:'VT323', monospace;
    font-size:16px;
    padding:6px 16px;
    cursor:pointer;
    letter-spacing:0.1em;
    text-transform:uppercase;
    transition:all 0.15s;
  }
  button:hover{
    background:rgba(255,179,64,0.06);
    border-color:var(--amber);
    box-shadow:0 0 12px rgba(255,179,64,0.18);
  }
  button:disabled{opacity:0.4;cursor:not-allowed}
  .out{
    background:var(--bg);
    border:1px solid var(--line);
    padding:14px 16px;
    font-size:24px;
    color:var(--amber-bright);
    text-shadow:0 0 14px rgba(255,179,64,0.32);
    min-height:60px;
    word-break:break-word;
    line-height:1.4;
  }
  .out::after{
    content:' ok';
    color:var(--green);
    font-size:18px;
  }
  .out.empty{color:var(--dim);text-shadow:none}
  .out.empty::after{content:''}
  .footer{
    display:flex;
    justify-content:space-between;
    flex-wrap:wrap;
    gap:14px;
    color:var(--dim);
    font-size:13px;
    letter-spacing:0.2em;
    text-transform:uppercase;
    align-items:baseline;
  }
  .footer em{
    font-family:'IM Fell English', serif;
    font-style:italic;
    text-transform:none;
    letter-spacing:0;
    font-size:16px;
    color:var(--amber);
  }
</style>
</head>
<body>
<div class="stage">
  <header>
    <div class="brand">hello,<em>·forth</em></div>
    <div class="tag">№ 05 · stack dispatch</div>
  </header>

  <div class="panel">
    <div class="panel-head">Source</div>
    <div class="program" id="program"></div>
  </div>

  <div class="grid">
    <div class="panel">
      <div class="panel-head">Trace</div>
      <div id="trace" style="font-size:18px;line-height:1.6;color:var(--dim);min-height:240px"></div>
    </div>
    <div class="panel">
      <div class="panel-head">Data Stack</div>
      <div class="stack" id="stack">
        <div class="stack-empty">∅ empty</div>
      </div>
    </div>
  </div>

  <div class="controls">
    <button id="run">▸ interpret</button>
    <button id="step">step</button>
    <button id="reset">reset</button>
  </div>

  <div class="panel">
    <div class="panel-head">Stdout</div>
    <div class="out empty" id="out">_</div>
  </div>

  <div class="footer">
    <span>FORTH · 1970 · CHUCK MOORE · POSTFIX</span>
    <em>the compiler fits on a postcard. the language fills a lifetime.</em>
  </div>
</div>

<script>
'use strict';
// Forth program: classic hello world via ." word
// Tokens we'll trace step-by-step (annotated)
const TOKENS = [
  { tok:': greet', desc:'begin colon-definition for new word "greet"', kind:'def' },
  { tok:'."', desc:'string-output word — push following text to output', kind:'word' },
  { tok:'Hello, world!', desc:'string literal (terminated by ")', kind:'str' },
  { tok:'"', desc:'close string', kind:'word' },
  { tok:'cr', desc:'print carriage-return (newline)', kind:'word' },
  { tok:';', desc:'end definition. "greet" is now a word', kind:'def' },
  { tok:'greet', desc:'invoke our new word', kind:'call' },
];

const COLORED = `<span class="word">:</span> greet <span class="word">."</span> <span class="str">Hello, world!"</span> <span class="word">cr</span> <span class="word">;</span>
greet <span class="cmt">\\ → Hello, world!</span>`;

const programEl = document.getElementById('program');
const stackEl = document.getElementById('stack');
const traceEl = document.getElementById('trace');
const outEl = document.getElementById('out');
const runBtn = document.getElementById('run');
const stepBtn = document.getElementById('step');
const resetBtn = document.getElementById('reset');

let stack = [];
let trace = [];
let output = '';
let stage = 0;
let running = false;
let timer = null;
let definedGreet = false;

function renderProgram(){
  programEl.innerHTML = COLORED;
}

function renderStack(){
  if(stack.length === 0){
    stackEl.innerHTML = '<div class="stack-empty">∅ empty</div>';
    return;
  }
  stackEl.innerHTML = stack.map(v => `<div class="frame">${v}</div>`).join('');
}

function renderTrace(){
  traceEl.innerHTML = trace.map((t, i) => {
    const colorMap = {def:'var(--amber)', word:'var(--amber-bright)', str:'var(--green)', call:'var(--amber)'};
    const c = colorMap[t.kind] || 'var(--ink)';
    return `<div style="margin-bottom:6px"><span style="color:${c}">${t.tok}</span> <span style="color:var(--dim)">— ${t.desc}</span></div>`;
  }).join('');
}

function renderOut(){
  if(!output){
    outEl.classList.add('empty');
    outEl.textContent = '_';
  } else {
    outEl.classList.remove('empty');
    outEl.textContent = output;
  }
}

function step(){
  if(stage >= TOKENS.length){
    stop();
    return false;
  }
  const t = TOKENS[stage];
  trace.push(t);
  // Simulate Forth-y stack behavior: ." pushes string addr, " consumes + emits
  if(t.tok === ':') stack.push('[def]');
  if(t.tok === '."') stack.push('"…"');
  if(t.tok === '"'){
    stack.pop(); // consume the string addr
    // string is "printed" at compile time inside the word body — actual emit happens on call
  }
  if(t.tok === ';'){
    stack.pop(); // close def, pop the [def] marker
    definedGreet = true;
  }
  if(t.tok === 'greet' && definedGreet){
    output += 'Hello, world!\n';
  }
  stage++;
  renderAll();
  return true;
}

function loop(){
  if(!step()) return;
  timer = setTimeout(loop, 620);
}

function start(){
  if(running) return;
  running = true;
  runBtn.textContent = '∥ pause';
  loop();
}

function stop(){
  running = false;
  if(timer){clearTimeout(timer);timer=null}
  runBtn.textContent = '▸ interpret';
}

function reset(){
  stop();
  stack = [];
  trace = [];
  output = '';
  stage = 0;
  definedGreet = false;
  renderAll();
}

function renderAll(){
  renderStack();
  renderTrace();
  renderOut();
}

runBtn.addEventListener('click', () => {
  if(running) stop();
  else start();
});
stepBtn.addEventListener('click', () => {
  if(running) stop();
  step();
});
resetBtn.addEventListener('click', reset);

renderProgram();
renderAll();
</script>
</body>
</html>
