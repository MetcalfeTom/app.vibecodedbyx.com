<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Cyber Aquarium</title>
  <meta name="description" content="Neon fish swim through a digital sea, trailing streams of data. Click one. It explodes into confetti.">
  <link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%90%9F">
  <meta property="og:title" content="Cyber Aquarium">
  <meta property="og:description" content="Neon fish trail binary, hex, and glyphs through a digital sea. Click them. Watch them shatter into confetti.">
  <meta property="og:url" content="https://sloppy.live/cyber-aquarium">
  <meta property="og:image" content="https://image.pollinations.ai/prompt/neon%20cyber%20aquarium%20with%20glowing%20fish%20leaving%20binary%20code%20trails%20in%20deep%20violet%20digital%20water%2C%20holographic%2C%20synthwave%2C%20particle%20confetti%20explosion%2C%20cyberpunk%20screensaver?width=1200&height=630&model=flux&nologo=true&seed=1010">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Share+Tech+Mono&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">

  <style>
    :root {
      --void: #02030f;
      --void-deep: #00000a;
      --cyan: #5effff;
      --magenta: #ff5dc4;
      --violet: #a26dff;
      --lime: #5eff8a;
      --gold: #ffd066;
      --rose: #ff5d6c;
      --ink: #e0e6ff;
      --ink-dim: rgba(224, 230, 255, 0.6);
    }
    * { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; font-size: 100%; }
    body {
      margin: 0;
      font-family: 'Share Tech Mono', monospace;
      color: var(--ink);
      background: var(--void-deep);
      min-height: 100vh;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    main {
      position: fixed;
      inset: 0;
      display: grid;
      grid-template-rows: auto 1fr auto;
    }

    /* ============ HEADER ============ */
    header {
      padding: 0.7rem 1rem 0.4rem;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 1rem;
      flex-wrap: wrap;
      position: relative;
      z-index: 5;
      background: linear-gradient(180deg, rgba(2,3,15,0.85) 0%, rgba(2,3,15,0) 100%);
    }
    .brand {
      display: flex;
      align-items: baseline;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    h1 {
      font-family: 'Major Mono Display', monospace;
      font-weight: 400;
      font-size: clamp(1.3rem, 4vw, 1.9rem);
      letter-spacing: 0.12em;
      margin: 0;
      line-height: 1;
      color: var(--ink);
      text-shadow: 0 0 12px rgba(94, 255, 255, 0.55);
    }
    h1 em {
      font-style: normal;
      color: var(--magenta);
      text-shadow: 0 0 12px rgba(255, 93, 196, 0.55);
    }
    .tag {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(0.85rem, 1.8vw, 1.05rem);
      color: var(--ink-dim);
      letter-spacing: 0.02em;
    }
    .stats {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem;
      color: var(--ink-dim);
      display: flex;
      gap: 0.85rem;
      flex-wrap: wrap;
      letter-spacing: 0.04em;
    }
    .stats strong {
      color: var(--cyan);
      font-weight: 400;
      text-shadow: 0 0 6px rgba(94, 255, 255, 0.4);
    }

    /* ============ STAGE ============ */
    .stage {
      position: relative;
      margin: 0 0.5rem;
      overflow: hidden;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(94, 255, 255, 0.08) 0, transparent 45%),
        radial-gradient(ellipse at 70% 80%, rgba(255, 93, 196, 0.08) 0, transparent 45%),
        radial-gradient(ellipse at center, #050a30 0%, #02030f 60%, #00000a 100%);
      border: 1px solid rgba(94, 255, 255, 0.18);
      border-radius: 8px;
      box-shadow:
        0 0 40px rgba(94, 255, 255, 0.06) inset,
        0 0 60px rgba(255, 93, 196, 0.04) inset,
        0 8px 30px rgba(0, 0, 0, 0.5);
      cursor: crosshair;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
      touch-action: none;
    }
    .stage::before {
      /* scanlines for CRT-aquarium feel */
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(0deg, rgba(0,0,0,0.12) 0 1px, transparent 1px 4px);
      z-index: 3;
      mix-blend-mode: multiply;
    }
    .stage::after {
      /* subtle screen curvature vignette */
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.55) 100%);
      z-index: 4;
    }
    .stage-label {
      position: absolute;
      top: 14px;
      left: 18px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.65rem;
      color: var(--ink-dim);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      pointer-events: none;
      z-index: 5;
    }
    .stage-readout {
      position: absolute;
      top: 14px;
      right: 18px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: var(--ink-dim);
      letter-spacing: 0.05em;
      pointer-events: none;
      z-index: 5;
      text-align: right;
    }
    .stage-readout strong { color: var(--cyan); text-shadow: 0 0 4px rgba(94,255,255,0.4); }
    .stage-hint {
      position: absolute;
      bottom: 14px;
      left: 50%;
      transform: translateX(-50%);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: var(--cyan);
      background: rgba(2, 3, 15, 0.65);
      padding: 0.3rem 0.75rem;
      border-radius: 999px;
      border: 1px solid rgba(94, 255, 255, 0.3);
      pointer-events: none;
      z-index: 5;
      transition: opacity 0.6s ease;
      text-align: center;
      letter-spacing: 0.04em;
      text-shadow: 0 0 6px rgba(94, 255, 255, 0.4);
      max-width: calc(100% - 32px);
    }
    .stage-hint.fade { opacity: 0; }

    /* ============ FOOTER CONTROLS ============ */
    footer {
      padding: 0.55rem 1rem 0.85rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      align-items: center;
      background: linear-gradient(0deg, rgba(2,3,15,0.85) 0%, rgba(2,3,15,0) 100%);
    }
    .group {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.25rem 0.55rem;
      background: rgba(94, 255, 255, 0.04);
      border: 1px solid rgba(94, 255, 255, 0.2);
      border-radius: 6px;
    }
    .group-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.6rem;
      letter-spacing: 0.16em;
      color: var(--ink-dim);
      margin-right: 0.2rem;
      text-transform: uppercase;
    }
    button {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      letter-spacing: 0.06em;
      padding: 0.4rem 0.7rem;
      min-height: 2.75rem;
      min-width: 2.75rem;
      border: 1px solid rgba(94, 255, 255, 0.4);
      background: transparent;
      color: var(--cyan);
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.13s;
      text-transform: uppercase;
      text-shadow: 0 0 4px rgba(94, 255, 255, 0.4);
    }
    button:hover {
      background: rgba(94, 255, 255, 0.08);
      box-shadow: 0 0 10px rgba(94, 255, 255, 0.25);
    }
    button:active { transform: translate(1px, 1px); }
    button:focus-visible {
      outline: 2px solid var(--magenta);
      outline-offset: 2px;
    }
    button[aria-pressed="true"] {
      background: var(--cyan);
      color: var(--void-deep);
      border-color: var(--cyan);
      text-shadow: none;
      box-shadow: 0 0 15px rgba(94, 255, 255, 0.55);
    }
    button.danger {
      color: var(--magenta);
      border-color: rgba(255, 93, 196, 0.4);
      text-shadow: 0 0 4px rgba(255, 93, 196, 0.4);
    }
    button.danger:hover { background: rgba(255, 93, 196, 0.1); box-shadow: 0 0 10px rgba(255, 93, 196, 0.3); }

    .sr-only {
      position: absolute; width: 1px; height: 1px;
      padding: 0; margin: -1px; overflow: hidden;
      clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }

    @media (max-width: 640px) {
      header { padding: 0.5rem 0.7rem 0.3rem; }
      .stats { gap: 0.5rem; font-size: 0.62rem; }
      .stage { margin: 0 0.3rem; }
      footer { padding: 0.4rem 0.6rem 0.7rem; gap: 0.4rem; }
      .group { padding: 0.2rem 0.4rem; }
      button { font-size: 0.7rem; padding: 0.3rem 0.55rem; }
      .stage-label, .stage-readout { font-size: 0.6rem; top: 10px; }
      .stage-label { left: 12px; }
      .stage-readout { right: 12px; }
    }
    @media (prefers-reduced-motion: reduce) {
      .stage::before { display: none; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="brand">
        <h1>cyber<em>┬╖</em>aquarium</h1>
        <span class="tag">they trail data ┬╖ they shatter on contact</span>
      </div>
      <div class="stats" role="status" aria-live="polite" aria-atomic="true">
        <div>fish <strong id="stat-fish">0</strong></div>
        <div>popped <strong id="stat-popped">0</strong></div>
        <div>data shed <strong id="stat-data">0</strong>B</div>
      </div>
    </header>

    <section class="stage" aria-label="Cyber aquarium">
      <span class="stage-label">tank чеЮ//001 ┬╖ port 8080</span>
      <span class="stage-readout"><strong id="stat-readout">tcp//swim</strong></span>
      <canvas id="canvas" role="application" aria-label="Aquarium canvas. Click any neon fish to make it explode into confetti. Right-click empty water to spawn a new fish."></canvas>
      <div class="stage-hint" id="hint">click a fish to pop it ┬╖ right-click water to spawn ┬╖ they trail data</div>
    </section>

    <footer>
      <div class="group" role="group" aria-label="Population controls">
        <span class="group-label">tank</span>
        <button type="button" id="btn-add">+ spawn</button>
        <button type="button" id="btn-add-many">+ school of 8</button>
        <button type="button" id="btn-clear" class="danger">тЬХ empty tank</button>
      </div>
      <div class="group" role="group" aria-label="Display options">
        <span class="group-label">vis</span>
        <button type="button" id="btn-trails" aria-pressed="true">data trails</button>
        <button type="button" id="btn-caustics" aria-pressed="true">caustics</button>
        <button type="button" id="btn-bubbles" aria-pressed="true">bubbles</button>
      </div>
      <div class="group" role="group" aria-label="Audio">
        <span class="group-label">audio</span>
        <button type="button" id="btn-mute" aria-pressed="false">ЁЯФК chimes on</button>
      </div>
    </footer>
  </main>

  <p class="sr-only" id="sr-status" aria-live="polite"></p>

  <script>
  (function(){
    'use strict';

    // ============================================================
    // Setup
    // ============================================================
    const stage = document.querySelector('.stage');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d', { alpha: true });
    const statFish = document.getElementById('stat-fish');
    const statPopped = document.getElementById('stat-popped');
    const statData = document.getElementById('stat-data');
    const statReadout = document.getElementById('stat-readout');
    const hintEl = document.getElementById('hint');

    let DPR = Math.min(window.devicePixelRatio || 1, 2);
    let W = 0, H = 0;
    function resize() {
      const r = stage.getBoundingClientRect();
      W = Math.max(320, r.width);
      H = Math.max(280, r.height);
      canvas.width = Math.floor(W * DPR);
      canvas.height = Math.floor(H * DPR);
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }
    window.addEventListener('resize', resize, { passive: true });

    // ============================================================
    // Species
    // ============================================================
    const SPECIES = [
      {
        name: 'packet',
        color: '#5effff',
        bodyLen: 38,
        bodyHi: 14,
        speed: 95,
        trail: 'binary',
        weight: 4
      },
      {
        name: 'router',
        color: '#ff5dc4',
        bodyLen: 52,
        bodyHi: 18,
        speed: 70,
        trail: 'hex',
        weight: 3
      },
      {
        name: 'crawler',
        color: '#ffd066',
        bodyLen: 44,
        bodyHi: 16,
        speed: 55,
        trail: 'path',
        weight: 2
      },
      {
        name: 'phantom',
        color: '#a26dff',
        bodyLen: 62,
        bodyHi: 22,
        speed: 50,
        trail: 'glyph',
        weight: 2
      },
      {
        name: 'phish',
        color: '#5eff8a',
        bodyLen: 70,
        bodyHi: 24,
        speed: 85,
        trail: 'word',
        weight: 1
      }
    ];
    const SPECIES_TOTAL_WEIGHT = SPECIES.reduce((s, sp) => s + sp.weight, 0);
    function pickSpecies() {
      let r = Math.random() * SPECIES_TOTAL_WEIGHT;
      for (const sp of SPECIES) { if ((r -= sp.weight) <= 0) return sp; }
      return SPECIES[0];
    }

    const TRAIL_CHARS = {
      binary: ['0', '1', '0', '1', '00', '11', '01', '10', '0x', '/0'],
      hex:    ['A1', 'FF', '2A', '9C', 'E0', 'B7', '04', 'D3', '6E', '8F'],
      path:   ['/api', '/v1', '/get', '/0', '/?', '//', '#:', ':80', '0x', '~/'],
      glyph:  ['тЧЖ', 'тШ░', 'тЬж', 'тЧЗ', 'тЧИ', 'тМм', 'тЧЙ', 'тЬз', 'тМЦ', 'тЪп'],
      word:   ['phish', 'bait', 'hook', 'lure', 'NULL', '?>', 'XSS', 'pwn3d', 'r00t', '404']
    };

    // ============================================================
    // State
    // ============================================================
    const fishes = [];
    const trails = []; // text glyphs left behind
    const confetti = [];
    const sparks = [];
    const bubbles = [];
    let poppedCount = parseInt(localStorage.getItem('cyber_aq_popped') || '0', 10);
    let dataShedBytes = parseInt(localStorage.getItem('cyber_aq_data') || '0', 10);
    statPopped.textContent = poppedCount;
    statData.textContent = humanBytes(dataShedBytes);

    let showTrails = true;
    let showCaustics = true;
    let showBubbles = true;
    let muted = false;

    function humanBytes(n) {
      if (n < 1024) return n;
      if (n < 1048576) return (n / 1024).toFixed(1) + 'K';
      return (n / 1048576).toFixed(2) + 'M';
    }

    // ============================================================
    // Fish factory
    // ============================================================
    function spawnFish(opts) {
      opts = opts || {};
      const sp = opts.species || pickSpecies();
      const fromEdge = Math.random() < 0.6;
      let x, y;
      if (opts.x != null) { x = opts.x; y = opts.y; }
      else if (fromEdge && W > 0) {
        // enter from left or right
        const fromLeft = Math.random() < 0.5;
        x = fromLeft ? -40 : W + 40;
        y = 40 + Math.random() * (H - 80);
      } else {
        x = 40 + Math.random() * (W - 80);
        y = 40 + Math.random() * (H - 80);
      }
      const dir = (x < W / 2) ? 1 : -1; // face into the tank
      const f = {
        id: 'f' + Math.random().toString(36).slice(2, 7),
        sp,
        x, y,
        vx: dir * sp.speed * (0.7 + Math.random() * 0.6),
        vy: (Math.random() - 0.5) * 16,
        wanderT: Math.random() * 3,
        bob: Math.random() * Math.PI * 2,
        nextTrailAt: 0,
        trailEvery: 100 + Math.random() * 220,  // ms between glyphs
        hueShift: (Math.random() - 0.5) * 22,
        age: 0
      };
      fishes.push(f);
      statFish.textContent = fishes.length;
      return f;
    }

    function spawnSchool(n) {
      for (let i = 0; i < n; i++) {
        setTimeout(() => spawnFish(), i * 60);
      }
    }

    // ============================================================
    // Confetti + sparks on pop
    // ============================================================
    const CONFETTI_PALETTE = ['#5effff', '#ff5dc4', '#a26dff', '#ffd066', '#5eff8a', '#ff5d6c', '#ffffff'];
    function popFish(idx) {
      const f = fishes[idx];
      if (!f) return;
      const sp = f.sp;
      const n = 20 + (Math.random() * 14 | 0);
      for (let i = 0; i < n; i++) {
        const angle = (i / n) * Math.PI * 2 + Math.random() * 0.4;
        const v = 140 + Math.random() * 180;
        confetti.push({
          x: f.x, y: f.y,
          vx: Math.cos(angle) * v,
          vy: Math.sin(angle) * v - 60,
          rot: Math.random() * Math.PI,
          vrot: (Math.random() - 0.5) * 12,
          life: 1.4 + Math.random() * 0.8,
          age: 0,
          w: 3 + Math.random() * 7,
          h: 4 + Math.random() * 11,
          color: CONFETTI_PALETTE[(Math.random() * CONFETTI_PALETTE.length) | 0]
        });
      }
      // sparks (white-hot core)
      for (let i = 0; i < 14; i++) {
        const a = Math.random() * Math.PI * 2;
        const v = 250 + Math.random() * 200;
        sparks.push({
          x: f.x, y: f.y,
          vx: Math.cos(a) * v,
          vy: Math.sin(a) * v,
          life: 0.4 + Math.random() * 0.3,
          age: 0,
          color: sp.color
        });
      }
      // shock ring
      sparks.push({ ring: true, x: f.x, y: f.y, r: 4, vr: 380, life: 0.55, age: 0, color: sp.color });
      // remove fish
      fishes.splice(idx, 1);
      statFish.textContent = fishes.length;
      // score + data shed
      poppedCount++;
      const bytes = sp.bodyLen * sp.bodyHi * (1 + Math.random() * 0.4) | 0;
      dataShedBytes += bytes;
      try {
        localStorage.setItem('cyber_aq_popped', poppedCount);
        localStorage.setItem('cyber_aq_data', dataShedBytes);
      } catch {}
      statPopped.textContent = poppedCount;
      statData.textContent = humanBytes(dataShedBytes);
      // readout flavor
      statReadout.textContent = '!! ' + sp.name + '_drop';
      setTimeout(() => { statReadout.textContent = 'tcp//swim'; }, 1100);
      // sound
      playPop(sp.color);
    }

    // ============================================================
    // Audio
    // ============================================================
    let audioCtx = null;
    function ensureAudio() {
      if (!audioCtx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (!AC) return null;
        audioCtx = new AC();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }
    function playPop(color) {
      if (muted) return;
      const ac = ensureAudio();
      if (!ac) return;
      const now = ac.currentTime;
      // crackly digital pop: noise burst through hipass + decaying square chord
      const len = Math.floor(ac.sampleRate * 0.18);
      const buf = ac.createBuffer(1, len, ac.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < len; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 1.6);
      const src = ac.createBufferSource();
      src.buffer = buf;
      const bp = ac.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = 1800 + Math.random() * 1200;
      bp.Q.value = 2.1;
      const g = ac.createGain();
      g.gain.value = 0.12;
      src.connect(bp).connect(g).connect(ac.destination);
      src.start(now);
      // chime arpeggio
      const baseHz = 520 + Math.random() * 180;
      [1, 1.5, 2].forEach((mult, i) => {
        const o = ac.createOscillator();
        const gg = ac.createGain();
        o.type = 'square';
        o.frequency.setValueAtTime(baseHz * mult, now + i * 0.04);
        o.frequency.exponentialRampToValueAtTime(baseHz * mult * 0.6, now + i * 0.04 + 0.18);
        gg.gain.setValueAtTime(0.06, now + i * 0.04);
        gg.gain.exponentialRampToValueAtTime(0.001, now + i * 0.04 + 0.2);
        o.connect(gg).connect(ac.destination);
        o.start(now + i * 0.04);
        o.stop(now + i * 0.04 + 0.22);
      });
    }

    // ============================================================
    // Update loop
    // ============================================================
    let lastT = performance.now();
    let lastBubbleAt = 0;

    function loop(now) {
      const dt = Math.min(0.05, (now - lastT) / 1000);
      lastT = now;

      // background fade тАФ preserves trail glyphs slightly
      ctx.fillStyle = 'rgba(2, 3, 15, 0.18)';
      ctx.fillRect(0, 0, W, H);

      drawCaustics(now);
      drawBubbles(dt);
      drawTrails(dt);
      drawFishes(now, dt);
      drawConfetti(dt);
      drawSparks(dt);

      // spawn ambient bubble
      if (showBubbles && now - lastBubbleAt > 240 + Math.random() * 380) {
        bubbles.push({
          x: 20 + Math.random() * (W - 40),
          y: H + 8,
          vy: -(40 + Math.random() * 50),
          r: 2 + Math.random() * 5,
          phase: Math.random() * Math.PI * 2,
          life: 1
        });
        lastBubbleAt = now;
      }

      // ensure tank is never empty for too long
      if (fishes.length === 0 && now - (loop._lastEmptyAt || 0) > 600) {
        loop._lastEmptyAt = now;
      }

      requestAnimationFrame(loop);
    }

    function drawCaustics(now) {
      if (!showCaustics) return;
      // simulated caustic light bands at top
      ctx.save();
      ctx.globalCompositeOperation = 'lighter';
      const t = now / 1000;
      for (let i = 0; i < 4; i++) {
        const phase = t * 0.35 + i * 1.2;
        const x = (Math.sin(phase) * 0.5 + 0.5) * W;
        const y = 8 + Math.sin(phase * 1.3) * 10;
        const r = 100 + Math.sin(phase * 2) * 30;
        const g = ctx.createRadialGradient(x, y, 0, x, y, r);
        g.addColorStop(0, 'rgba(94, 255, 255, 0.08)');
        g.addColorStop(1, 'rgba(94, 255, 255, 0)');
        ctx.fillStyle = g;
        ctx.fillRect(x - r, y - r, r * 2, r * 2);
      }
      ctx.restore();
    }

    function drawBubbles(dt) {
      if (!showBubbles) { bubbles.length = 0; return; }
      for (let i = bubbles.length - 1; i >= 0; i--) {
        const b = bubbles[i];
        b.y += b.vy * dt;
        b.x += Math.sin(b.phase + b.y * 0.02) * 0.6;
        b.life -= dt * 0.15;
        if (b.y < -10 || b.life <= 0) { bubbles.splice(i, 1); continue; }
        ctx.save();
        ctx.strokeStyle = `rgba(180, 220, 255, ${0.25 * b.life})`;
        ctx.fillStyle = `rgba(94, 255, 255, ${0.05 * b.life})`;
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
        // tiny highlight
        ctx.fillStyle = `rgba(255, 255, 255, ${0.3 * b.life})`;
        ctx.beginPath();
        ctx.arc(b.x - b.r * 0.35, b.y - b.r * 0.35, b.r * 0.25, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }

    function drawTrails(dt) {
      for (let i = trails.length - 1; i >= 0; i--) {
        const t = trails[i];
        t.age += dt;
        if (t.age > t.life) { trails.splice(i, 1); continue; }
        const alpha = (1 - t.age / t.life) * 0.85;
        ctx.save();
        ctx.font = t.font;
        ctx.fillStyle = t.color;
        ctx.globalAlpha = alpha;
        ctx.shadowBlur = 8;
        ctx.shadowColor = t.color;
        ctx.fillText(t.glyph, t.x, t.y);
        ctx.restore();
      }
    }

    function drawFishes(now, dt) {
      for (let i = 0; i < fishes.length; i++) {
        const f = fishes[i];
        const sp = f.sp;
        f.age += dt;
        f.wanderT -= dt;
        if (f.wanderT <= 0) {
          // pick a new wander vector
          f.wanderT = 1.5 + Math.random() * 3.5;
          // gentle vertical change, occasional speed up
          const desiredVy = (Math.random() - 0.5) * 60;
          f.vy = f.vy * 0.5 + desiredVy * 0.5;
          // slight speed jitter
          const dir = Math.sign(f.vx) || 1;
          f.vx = dir * sp.speed * (0.65 + Math.random() * 0.65);
        }
        // gentle bob
        f.bob += dt * 6;
        const bobY = Math.sin(f.bob) * 1.2;
        f.x += f.vx * dt;
        f.y += (f.vy + bobY) * dt;
        // wall bouncing (vertical)
        if (f.y < 30) { f.y = 30; f.vy = Math.abs(f.vy); }
        if (f.y > H - 30) { f.y = H - 30; f.vy = -Math.abs(f.vy); }
        // off-screen wrap (re-enter on opposite side, slight chance to despawn)
        if (f.x < -60) {
          if (Math.random() < 0.18) { fishes.splice(i--, 1); statFish.textContent = fishes.length; continue; }
          f.x = W + 40; f.vx = -Math.abs(f.vx);
        } else if (f.x > W + 60) {
          if (Math.random() < 0.18) { fishes.splice(i--, 1); statFish.textContent = fishes.length; continue; }
          f.x = -40; f.vx = Math.abs(f.vx);
        }

        // emit a trail glyph?
        if (showTrails && now > f.nextTrailAt) {
          f.nextTrailAt = now + f.trailEvery;
          const pool = TRAIL_CHARS[sp.trail];
          const glyph = pool[(Math.random() * pool.length) | 0];
          const isLarge = sp.trail === 'glyph' || sp.trail === 'word';
          const fontSize = isLarge ? 13 : 11;
          trails.push({
            x: f.x - Math.sign(f.vx) * (sp.bodyLen * 0.45) + (Math.random() - 0.5) * 6,
            y: f.y + (Math.random() - 0.5) * 8,
            glyph,
            color: sp.color,
            font: fontSize + 'px "Share Tech Mono", monospace',
            age: 0,
            life: 1.6 + Math.random() * 1.4
          });
        }

        drawFish(f);
      }
    }

    function drawFish(f) {
      const sp = f.sp;
      const dir = Math.sign(f.vx) || 1;
      const len = sp.bodyLen;
      const ht = sp.bodyHi;
      ctx.save();
      ctx.translate(f.x, f.y);
      ctx.scale(dir, 1);

      // outer glow halo
      ctx.shadowBlur = 16;
      ctx.shadowColor = sp.color;

      // body тАФ neon-outlined elongated diamond/lens
      const body = ctx.createLinearGradient(-len * 0.5, 0, len * 0.5, 0);
      body.addColorStop(0, withAlpha(sp.color, 0.55));
      body.addColorStop(0.5, withAlpha(sp.color, 0.95));
      body.addColorStop(1, withAlpha(sp.color, 0.4));
      ctx.fillStyle = body;
      ctx.beginPath();
      ctx.moveTo(-len * 0.5, 0);
      ctx.quadraticCurveTo(-len * 0.2, -ht, len * 0.45, -ht * 0.3);
      ctx.quadraticCurveTo(len * 0.6, 0, len * 0.45, ht * 0.3);
      ctx.quadraticCurveTo(-len * 0.2, ht, -len * 0.5, 0);
      ctx.closePath();
      ctx.fill();

      // body outline
      ctx.strokeStyle = sp.color;
      ctx.lineWidth = 1.4;
      ctx.stroke();

      // dorsal accent line (inside body)
      ctx.shadowBlur = 0;
      ctx.strokeStyle = withAlpha('#ffffff', 0.4);
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(-len * 0.35, -ht * 0.15);
      ctx.lineTo(len * 0.35, -ht * 0.05);
      ctx.stroke();

      // tail (triangle, slight flap)
      const flap = Math.sin(f.bob * 1.4) * 0.4;
      ctx.shadowBlur = 12;
      ctx.shadowColor = sp.color;
      ctx.fillStyle = withAlpha(sp.color, 0.85);
      ctx.beginPath();
      ctx.moveTo(-len * 0.5, 0);
      ctx.lineTo(-len * 0.85, -ht * (0.7 + flap));
      ctx.lineTo(-len * 0.7, 0);
      ctx.lineTo(-len * 0.85, ht * (0.7 - flap));
      ctx.closePath();
      ctx.fill();

      // fin (top)
      ctx.beginPath();
      ctx.moveTo(0, -ht * 0.5);
      ctx.quadraticCurveTo(-len * 0.05, -ht * 1.2, len * 0.15, -ht * 0.7);
      ctx.closePath();
      ctx.fill();

      // eye тАФ bright dot
      ctx.shadowBlur = 6;
      ctx.shadowColor = '#ffffff';
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(len * 0.32, -ht * 0.05, 2.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#000000';
      ctx.shadowBlur = 0;
      ctx.beginPath();
      ctx.arc(len * 0.34, -ht * 0.05, 1.2, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    function drawConfetti(dt) {
      const g = 380; // gravity
      for (let i = confetti.length - 1; i >= 0; i--) {
        const p = confetti[i];
        p.age += dt;
        if (p.age >= p.life) { confetti.splice(i, 1); continue; }
        p.vy += g * dt;
        // water drag
        p.vx *= Math.pow(0.92, dt * 60);
        p.vy *= Math.pow(0.92, dt * 60);
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        p.rot += p.vrot * dt;
        const alpha = Math.min(1, 1 - p.age / p.life);
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.scale(Math.cos(p.rot * 1.4) * 0.4 + 0.6, 1); // flutter
        ctx.fillStyle = p.color;
        ctx.globalAlpha = alpha;
        ctx.shadowBlur = 8;
        ctx.shadowColor = p.color;
        ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
        ctx.restore();
      }
    }

    function drawSparks(dt) {
      for (let i = sparks.length - 1; i >= 0; i--) {
        const s = sparks[i];
        s.age += dt;
        if (s.age >= s.life) { sparks.splice(i, 1); continue; }
        if (s.ring) {
          s.r += s.vr * dt;
          const alpha = 1 - s.age / s.life;
          ctx.save();
          ctx.strokeStyle = s.color;
          ctx.globalAlpha = alpha;
          ctx.shadowBlur = 14;
          ctx.shadowColor = s.color;
          ctx.lineWidth = 2;
          ctx.beginPath();
          ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        } else {
          s.vx *= 0.96; s.vy *= 0.96;
          s.x += s.vx * dt;
          s.y += s.vy * dt;
          const alpha = 1 - s.age / s.life;
          ctx.save();
          ctx.fillStyle = s.color;
          ctx.globalAlpha = alpha;
          ctx.shadowBlur = 8;
          ctx.shadowColor = s.color;
          ctx.beginPath();
          ctx.arc(s.x, s.y, 2.2, 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        }
      }
    }

    function withAlpha(hex, a) {
      // hex "#rrggbb" тЖТ "rgba(...)"
      if (hex[0] !== '#') return hex;
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
    }

    // ============================================================
    // Input
    // ============================================================
    function findFishAt(x, y) {
      // search from top of draw order (last drawn = front)
      for (let i = fishes.length - 1; i >= 0; i--) {
        const f = fishes[i];
        const sp = f.sp;
        // approximate hit: oriented bbox
        const dir = Math.sign(f.vx) || 1;
        const lx = (x - f.x) * dir;
        const ly = y - f.y;
        if (lx > -sp.bodyLen * 0.55 && lx < sp.bodyLen * 0.55 && Math.abs(ly) < sp.bodyHi * 1.05) return i;
      }
      return -1;
    }

    canvas.addEventListener('pointerdown', (e) => {
      const r = canvas.getBoundingClientRect();
      const x = e.clientX - r.left;
      const y = e.clientY - r.top;
      // right-click тЖТ spawn at click point
      if (e.button === 2) {
        spawnFish({ x, y });
        hideHint();
        e.preventDefault();
        return;
      }
      const idx = findFishAt(x, y);
      if (idx >= 0) {
        ensureAudio();
        popFish(idx);
      } else {
        // gentle hint: small ripple
        sparks.push({ ring: true, x, y, r: 4, vr: 140, life: 0.4, age: 0, color: '#5effff' });
      }
      hideHint();
    });
    canvas.addEventListener('contextmenu', (e) => {
      // prevent default browser menu so right-click can spawn
      e.preventDefault();
    });

    // ============================================================
    // Controls
    // ============================================================
    document.getElementById('btn-add').addEventListener('click', () => { spawnFish(); });
    document.getElementById('btn-add-many').addEventListener('click', () => spawnSchool(8));
    document.getElementById('btn-clear').addEventListener('click', () => {
      fishes.length = 0; trails.length = 0; statFish.textContent = 0;
      announce('tank emptied');
    });
    function bindToggle(id, getter, setter, onLabel, offLabel) {
      const b = document.getElementById(id);
      b.addEventListener('click', () => {
        setter(!getter());
        b.setAttribute('aria-pressed', String(getter()));
        b.textContent = getter() ? onLabel : offLabel;
      });
    }
    bindToggle('btn-trails',   () => showTrails,   v => showTrails = v,   'data trails', 'trails off');
    bindToggle('btn-caustics', () => showCaustics, v => showCaustics = v, 'caustics',    'caustics off');
    bindToggle('btn-bubbles',  () => showBubbles,  v => showBubbles = v,  'bubbles',     'bubbles off');
    const muteBtn = document.getElementById('btn-mute');
    muteBtn.addEventListener('click', () => {
      muted = !muted;
      muteBtn.setAttribute('aria-pressed', String(muted));
      muteBtn.textContent = muted ? 'ЁЯФЗ chimes off' : 'ЁЯФК chimes on';
      if (!muted) ensureAudio();
    });

    // Hint fade
    let hintTimer = setTimeout(hideHint, 7000);
    function hideHint() { hintEl.classList.add('fade'); clearTimeout(hintTimer); }

    function announce(msg) { document.getElementById('sr-status').textContent = msg; }

    // Keyboard
    window.addEventListener('keydown', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      const k = e.key.toLowerCase();
      if (k === 's' || k === '+') spawnFish();
      else if (k === 'd' || k === 'k') spawnSchool(8);
      else if (k === 'c') { fishes.length = 0; trails.length = 0; statFish.textContent = 0; }
      else if (k === 't') document.getElementById('btn-trails').click();
      else if (k === 'b') document.getElementById('btn-bubbles').click();
      else if (k === 'm') muteBtn.click();
    });

    // ============================================================
    // Boot
    // ============================================================
    resize();
    spawnSchool(10);
    requestAnimationFrame(loop);
  })();
  </script>
</body>
</html>
