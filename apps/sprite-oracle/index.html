<style>
:root{
  --bg:#0d0b1f;
  --bg2:#1a1236;
  --panel:#150f2b;
  --panel-2:#221845;
  --ink:#e6e1ff;
  --ink-dim:#8b82c8;
  --accent:#ff5ad6;
  --accent-2:#5ae0ff;
  --accent-3:#ffd84a;
  --border:#3d2d7a;
  --glow:0 0 0 2px rgba(255,90,214,.25), 0 0 36px rgba(90,224,255,.15);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--ink);font-family:'VT323',monospace;font-size:20px;min-height:100vh}
body{
  background:
    radial-gradient(1200px 600px at 10% -10%, rgba(255,90,214,.12), transparent 70%),

    linear-gradient(180deg, #0d0b1f 0%, #130b26 60%, #0b0818 100%);
  background-attachment: fixed;
  overflow-x:hidden;
}
body::before{
  content:"";
  position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    repeating-linear-gradient(0deg, rgba(255,255,255,.015) 0 1px, transparent 1px 3px);
  mix-blend-mode:overlay;
}
header{
  position:relative;z-index:1;
  padding:28px 24px 10px;
  text-align:center;
}
header h1{
  font-family:'Silkscreen',monospace;
  font-weight:700;
  font-size:clamp(28px, 5vw, 52px);
  margin:0;
  letter-spacing:.04em;
  background:linear-gradient(90deg, var(--accent) 0%, var(--accent-3) 50%, var(--accent-2) 100%);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;
  text-shadow:0 0 20px rgba(255,90,214,.2);
}
header .sub{
  font-family:'Share Tech Mono',monospace;
  color:var(--ink-dim);
  font-size:14px;
  letter-spacing:.3em;
  text-transform:uppercase;
  margin-top:6px;
}

main{
  position:relative;z-index:1;
  display:grid;
  grid-template-columns: 1fr;
  gap:24px;
  padding:20px;
  max-width:1100px;

}
@media (min-width: 900px){

}

.hero{
  background:var(--panel);
  border:2px solid var(--border);
  border-radius:8px;
  padding:18px;

  overflow:hidden;
}
.hero::before{
  content:"";position:absolute;inset:0;
  background:linear-gradient(135deg, rgba(255,90,214,.08), transparent 40%, rgba(90,224,255,.05));

}

  background:
    linear-gradient(180deg, #0a0818 0%, #1b1340 100%);
  border:1px solid var(--border);
  border-radius:4px;
  aspect-ratio: 1/1;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  image-rendering:pixelated;
}
.hero-stage::before{
  content:"";position:absolute;inset:0;
  background:
    radial-gradient(circle at 50% 55%, rgba(255,216,74,.12) 0%, transparent 50%),

  pointer-events:none;
}
canvas.hero-canvas{
  image-rendering:pixelated;
  width:86%;height:86%;
  background:transparent;
  filter:drop-shadow(0 0 22px rgba(255,90,214,.3));
}

.hero-info{
  margin-top:14px;

.tag{

  padding:3px 8px;border-radius:99px;

  color:var(--ink-dim);

.tag.pal{color:var(--accent-2);border-color:rgba(90,224,255,.4)}

.controls{
  margin-top:14px;
  display:grid;gap:10px;
}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
button, select, input[type=text]{
  font-family:'VT323',monospace;
  font-size:18px;
  color:var(--ink);
  background:var(--panel-2);
  border:1px solid var(--border);
  border-radius:4px;
  padding:7px 12px;
  cursor:pointer;
  letter-spacing:.04em;
  transition:all .15s ease;
}
button:hover, select:hover{
  background:#2c1f58;border-color:var(--accent);
  color:#fff;
  box-shadow:0 0 0 2px rgba(255,90,214,.2);
}
button.primary{

  font-family:'Silkscreen',monospace;
  font-size:14px;letter-spacing:.1em;

}
button.primary:hover{
  background:linear-gradient(90deg, var(--accent-3), var(--accent));

  border-color:var(--accent-3);
}
input[type=text]{min-width:90px;width:130px}
label{
  font-family:'Share Tech Mono',monospace;
  font-size:12px;letter-spacing:.2em;
  color:var(--ink-dim);
  text-transform:uppercase;
}

.gallery{
  background:var(--panel);
  border:2px solid var(--border);
  border-radius:8px;
  padding:14px;
  box-shadow:var(--glow);
}
.gallery h2{
  font-family:'Silkscreen',monospace;
  font-size:14px;letter-spacing:.2em;
  color:var(--ink-dim);
  text-transform:uppercase;
  margin:0 0 10px 0;
  padding-left:4px;
}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(96px, 1fr));
  gap:10px;
}
.cell{
  background:linear-gradient(180deg, #0a0818 0%, #1b1340 100%);
  border:1px solid var(--border);
  border-radius:4px;
  aspect-ratio:1/1;
  cursor:pointer;
  position:relative;
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;
  transition:all .15s ease;
}
.cell canvas{
  image-rendering:pixelated;
  width:80%;height:80%;
}
.cell:hover{
  border-color:var(--accent);
  transform:translateY(-2px);
  box-shadow:0 4px 14px rgba(255,90,214,.2);

.cell.active{

  box-shadow:0 0 0 2px rgba(255,216,74,.3);
}
.cell .cell-tag{
  position:absolute;
  bottom:3px;left:0;right:0;
  text-align:center;

  font-size:10px;letter-spacing:.15em;
  color:var(--ink-dim);
  text-transform:uppercase;
  pointer-events:none;
  opacity:.85;

footer{

  text-align:center;
  font-family:'Share Tech Mono',monospace;

  font-size:12px;
  letter-spacing:.2em;
  text-transform:uppercase;
  padding:20px;
  opacity:.8;
}
footer span{color:var(--accent-2)}
.kbd{
  font-family:'Share Tech Mono',monospace;
  background:var(--panel-2);
  border:1px solid var(--border);
  border-bottom-width:2px;
  border-radius:3px;
  padding:1px 6px;
  font-size:11px;
  color:var(--ink);
}

<script>
/* ============================================================
   SPRITE ORACLE — 32×32 pixel character generator
   ============================================================ */

const SIZE = 32;

/* --------------- seeded PRNG (mulberry32) --------------- */
function mulberry32(seed){
  return function(){
    let t = seed += 0x6D2B79F5;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function hashSeed(str){
  let h = 2166136261 >>> 0;
  for (let i=0; i<str.length; i++){
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 16777619);
  }
  return h >>> 0;
}
function makeSeed(){
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s = '';
  for (let i=0; i<6; i++) s += chars[Math.floor(Math.random()*chars.length)];
  return s;
}

/* --------------- palettes --------------- */
const PALETTES = {
  gameboy: {
    outline: '#0f1a1b',
    skin:    '#8bac0f',
    body:    '#306230',
    detail:  '#e0f8d0',
    accent:  '#9bbc0f',
    metal:   '#444',
  },
  sunset: {
    outline: '#2a1028',
    skin:    '#ffcc8a',
    body:    '#e26b5d',
    detail:  '#ffe7a8',
    accent:  '#ffba4a',
    metal:   '#7a2a3c',
  },
  forest: {
    outline: '#121a10',
    skin:    '#c9b68a',
    body:    '#3e5a2c',
    detail:  '#a8ca70',
    accent:  '#d9a54a',
    metal:   '#5b4632',
  },
  ice: {
    outline: '#0b1f33',
    skin:    '#e6f0ff',
    body:    '#6ac7e0',
    detail:  '#bde8ff',
    accent:  '#3a80c2',
    metal:   '#8fa7c9',
  },
  neon: {
    outline: '#0a0216',
    skin:    '#ff5ad6',
    body:    '#5ae0ff',
    detail:  '#ffe94a',
    accent:  '#c870ff',
    metal:   '#3a2a5a',
  },
  rose: {
    outline: '#2a101d',
    skin:    '#ffd3e0',
    body:    '#d94b7a',
    detail:  '#ffe2ef',
    accent:  '#ff8bb4',
    metal:   '#5b2a3c',
  },
  dusk: {
    outline: '#0f0d2b',
    skin:    '#a99ad6',
    body:    '#4b3b87',
    detail:  '#e0d2ff',
    accent:  '#ffb84a',
    metal:   '#2a2050',
  },
  fire: {
    outline: '#1d0a05',
    skin:    '#ffba8a',
    body:    '#c13c1a',
    detail:  '#ffcd3a',
    accent:  '#ff6b1a',
    metal:   '#4a1d0a',
  },
};
const PALETTE_KEYS = Object.keys(PALETTES);

/* --------------- Sprite grid class --------------- */
class Sprite {
  constructor(size = SIZE){
    this.size = size;
    this.grid = new Array(size*size).fill(null);
  }
  inBounds(x,y){ return x>=0 && y>=0 && x<this.size && y<this.size; }
  set(x,y,c){
    if (!this.inBounds(x,y)) return;
    this.grid[y*this.size + x] = c;
  }
  get(x,y){
    if (!this.inBounds(x,y)) return null;
    return this.grid[y*this.size + x];
  }
  setSym(x,y,c){
    // mirror horizontally across center (x' = size-1-x)
    this.set(x,y,c);
    this.set(this.size-1-x, y, c);
  }
  fillRect(x1,y1,x2,y2,c){
    const [xa,xb] = [Math.min(x1,x2), Math.max(x1,x2)];
    const [ya,yb] = [Math.min(y1,y2), Math.max(y1,y2)];
    for (let y=ya; y<=yb; y++) for (let x=xa; x<=xb; x++) this.set(x,y,c);
  }
  fillRectSym(x1,y1,x2,y2,c){
    this.fillRect(x1,y1,x2,y2,c);
    this.fillRect(this.size-1-x1, y1, this.size-1-x2, y2, c);
  }
  /* post-pass: wherever a transparent cell is orthogonally adjacent to a filled
     cell, fill it with the outline color */
  outline(outlineColor){
    const neighbors = [[-1,0],[1,0],[0,-1],[0,1]];
    const toFill = [];
    for (let y=0; y<this.size; y++){
      for (let x=0; x<this.size; x++){
        if (this.get(x,y) !== null) continue;
        for (const [dx,dy] of neighbors){
          const c = this.get(x+dx, y+dy);
          if (c !== null && c !== outlineColor){
            toFill.push([x,y]);
            break;
          }
        }
      }
    }
    for (const [x,y] of toFill) this.set(x,y,outlineColor);
  }
  render(ctx, targetW, targetH){
    ctx.clearRect(0,0,targetW,targetH);
    const cw = targetW / this.size;
    const ch = targetH / this.size;
    for (let y=0; y<this.size; y++){
      for (let x=0; x<this.size; x++){
        const c = this.grid[y*this.size + x];
        if (!c) continue;
        ctx.fillStyle = c;
        ctx.fillRect(Math.floor(x*cw), Math.floor(y*ch), Math.ceil(cw), Math.ceil(ch));
      }
    }
  }
}

/* --------------- helper: pick --------------- */
function pick(rng, arr){ return arr[Math.floor(rng()*arr.length)]; }
function chance(rng, p){ return rng() < p; }

/* ======================================================
   ARCHETYPE BUILDERS
   ====================================================== */

/* ---- HERO: humanoid with hat, cape, weapon ---- */
function buildHero(rng, pal){
  const s = new Sprite();
  const body = pal.body;
  const skin = pal.skin;
  const detail = pal.detail;
  const accent = pal.accent;
  const metal = pal.metal;

  // feet
  s.fillRectSym(12, 30, 14, 31, body);
  // legs
  s.fillRectSym(12, 24, 14, 29, body);
  // torso
  s.fillRectSym(10, 17, 14, 23, body);
  // belt
  s.fillRectSym(10, 21, 14, 21, accent);
  // chest detail
  if (chance(rng,.6)) s.set(15, 19, detail), s.set(16, 19, detail);
  // arms (sides of torso)
  s.fillRectSym(8, 18, 9, 23, body);
  // hands
  s.fillRectSym(7, 22, 8, 24, skin);
  // head
  s.fillRectSym(11, 11, 14, 16, skin);
  // ears
  s.fillRectSym(10, 13, 10, 14, skin);
  // eyes
  s.setSym(12, 13, pal.outline);
  // mouth
  if (chance(rng,.4)){
    s.setSym(13, 15, pal.outline);
  }
  // hat style
  const hat = Math.floor(rng()*4);
  if (hat === 0){
    // wizard cap
    s.fillRectSym(11, 9, 14, 10, accent);
    s.fillRectSym(13, 6, 14, 8, accent);
    s.set(16, 5, accent); s.set(15, 4, accent);
  } else if (hat === 1){
    // helmet
    s.fillRectSym(11, 8, 14, 11, metal);
    s.fillRectSym(11, 12, 12, 13, metal); // visor sides
    s.fillRectSym(13, 12, 14, 12, accent); // visor slit
    if (chance(rng,.5)){
      s.set(15, 7, detail); s.set(16, 7, detail); // horn nub
    }
  } else if (hat === 2){
    // adventurer hat (wide brim)
    s.fillRectSym(9, 10, 16, 10, detail);
    s.fillRectSym(11, 8, 14, 9, detail);
  } else {
    // hair tuft
    s.fillRectSym(11, 9, 14, 10, metal);
    s.setSym(12, 8, metal);
  }
  // cape?
  if (chance(rng,.55)){
    s.fillRectSym(15, 17, 16, 26, accent);
    s.fillRectSym(14, 16, 14, 17, accent);
  }
  // weapon — sword right side
  if (chance(rng,.7)){
    // grip
    s.set(7, 20, metal); s.set(7, 21, metal);
    // guard
    s.set(6, 19, accent); s.set(7, 19, accent); s.set(8, 19, accent);
    // blade
    s.fillRect(7, 12, 7, 18, detail);
    s.set(7, 11, detail);
  } else {
    // staff
    s.fillRect(7, 12, 7, 22, metal);
    s.set(7, 10, accent); s.set(6, 11, accent); s.set(8, 11, accent);
    s.set(7, 11, detail);
  }

  s.outline(pal.outline);
  return s;
}

/* ---- MAGE: robed, orb, tall hat ---- */
function buildMage(rng, pal){
  const s = new Sprite();
  const robe = pal.body;
  const trim = pal.accent;
  const skin = pal.skin;
  const detail = pal.detail;
  const metal = pal.metal;

  // robe bell
  for (let y=20; y<=31; y++){
    const w = Math.min(7, 2 + Math.floor((y-18)*0.6));
    s.fillRectSym(15 - w, y, 15, y, robe);
  }
  // feet nubs
  s.fillRectSym(13, 30, 14, 31, metal);
  // sleeves
  s.fillRectSym(7, 19, 9, 23, robe);
  s.fillRectSym(7, 23, 8, 24, trim);
  // hands
  s.fillRectSym(7, 24, 8, 25, skin);
  // torso/neck
  s.fillRectSym(11, 17, 14, 19, robe);
  s.fillRectSym(12, 16, 14, 16, skin);
  // head
  s.fillRectSym(11, 11, 14, 15, skin);
  // eyes glowy
  s.setSym(12, 13, trim);
  // beard?
  if (chance(rng,.6)){
    s.fillRectSym(11, 15, 14, 16, detail);
    s.setSym(12, 14, detail);
  }
  // tall pointed hat
  const hatColor = chance(rng,.5) ? trim : robe;
  s.fillRectSym(10, 9, 15, 10, hatColor);
  s.fillRectSym(11, 7, 14, 8, hatColor);
  s.fillRectSym(13, 5, 14, 6, hatColor);
  s.set(15, 3, hatColor); s.set(15, 4, hatColor);
  // hat brim / band
  s.fillRectSym(10, 11, 15, 11, detail);
  if (chance(rng,.5)){
    // stars on hat
    s.setSym(13, 8, detail);
  }
  // orb / staff
  s.fillRect(22, 14, 22, 28, metal);
  // orb colors rotate
  const orbColor = pal.accent;
  s.fillRect(21, 11, 23, 13, orbColor);
  s.set(20, 12, orbColor); s.set(24, 12, orbColor);
  s.set(22, 10, detail); // highlight
  s.set(21, 11, detail);
  // robe trim hem
  s.fillRectSym(8, 29, 15, 29, trim);

  s.outline(pal.outline);
  return s;
}

/* ---- ROBOT: boxy with antenna and lights ---- */
function buildRobot(rng, pal){
  const s = new Sprite();
  const chassis = pal.metal;
  const panel = pal.body;
  const light = pal.accent;
  const glow = pal.detail;

  // legs
  s.fillRectSym(10, 24, 11, 29, chassis);
  s.fillRectSym(9, 30, 12, 31, chassis);
  // hip joint
  s.fillRectSym(9, 23, 12, 23, light);
  // torso
  s.fillRectSym(8, 16, 14, 23, panel);
  // chest plate
  s.fillRectSym(10, 18, 13, 21, chassis);
  // core light
  s.fillRectSym(12, 19, 13, 20, light);
  s.setSym(12, 19, glow);
  // bolts
  if (chance(rng,.6)){
    s.setSym(9, 17, light);
    s.setSym(9, 22, light);
  }
  // arms
  s.fillRectSym(5, 17, 7, 19, chassis);
  s.fillRectSym(5, 20, 7, 24, panel);
  // hand / claw
  const claw = Math.floor(rng()*3);
  if (claw === 0){
    s.fillRectSym(4, 23, 5, 26, chassis);
    s.setSym(4, 25, light);
  } else if (claw === 1){
    // pincer
    s.set(5, 25, chassis); s.set(4, 25, chassis);
    s.set(5, 26, chassis); s.set(4, 27, chassis);
    s.set(26, 25, chassis); s.set(27, 25, chassis);
    s.set(26, 26, chassis); s.set(27, 27, chassis);
  } else {
    // blaster on right hand
    s.fillRect(3, 23, 6, 25, chassis);
    s.fillRect(2, 24, 3, 24, light);
    // left side pincer mirrored
    s.fillRect(25, 23, 28, 25, chassis);
    s.fillRect(28, 24, 29, 24, light);
  }
  // head
  s.fillRectSym(9, 9, 14, 14, chassis);
  // eye screen
  s.fillRectSym(10, 10, 13, 12, pal.outline);
  // eye dots
  s.setSym(11, 11, light);
  if (chance(rng,.5)) s.setSym(10, 11, glow);
  // antenna
  const ant = Math.floor(rng()*3);
  if (ant === 0){
    s.fillRect(15, 6, 15, 8, chassis);
    s.fillRect(14, 4, 16, 5, light);
  } else if (ant === 1){
    s.fillRectSym(11, 6, 11, 8, chassis);
    s.setSym(11, 5, light);
  } else {
    s.fillRect(15, 4, 15, 8, chassis);
    s.set(15, 3, glow);
  }
  // vents / mouth grille
  if (chance(rng,.7)){
    s.fillRectSym(11, 13, 13, 13, pal.outline);
    s.setSym(11, 13, light);
  }

  s.outline(pal.outline);
  return s;
}

/* ---- SLIME: blob with eyes, drips ---- */
function buildSlime(rng, pal){
  const s = new Sprite();
  const body = pal.body;
  const shine = pal.detail;
  const accent = pal.accent;

  // rough blob: rows with varying half-widths to give droplet silhouette
  const heights = [
    // [y, halfWidth]
    [11, 1], [12, 2], [13, 3], [14, 4],
    [15, 5], [16, 6], [17, 7],
    [18, 7], [19, 7], [20, 7], [21, 7],
    [22, 6], [23, 6], [24, 6],
    [25, 7], [26, 7], [27, 6],
    [28, 5], [29, 4], [30, 3]
  ];
  for (const [y, hw] of heights){
    s.fillRectSym(15 - hw, y, 15, y, body);
  }
  // wobble — chance of extra bulge
  if (chance(rng,.5)){
    s.fillRectSym(6, 23, 8, 25, body);
  }
  // shine highlight on top-left
  s.fillRectSym(10, 13, 11, 14, shine);
  s.set(9, 15, shine);
  // eyes
  const eyeCount = chance(rng,.3) ? 4 : 2;
  if (eyeCount === 2){
    s.fillRectSym(11, 19, 12, 21, pal.outline);
    s.setSym(12, 20, shine);
  } else {
    s.fillRectSym(10, 18, 11, 19, pal.outline);
    s.fillRectSym(11, 22, 12, 23, pal.outline);
    s.setSym(11, 18, shine);
    s.setSym(12, 22, shine);
  }
  // mouth
  if (chance(rng,.5)){
    s.fillRectSym(12, 24, 14, 24, pal.outline);
    // tongue
    if (chance(rng,.4)) s.setSym(13, 25, accent);
  }
  // floating drip above
  if (chance(rng,.6)){
    s.setSym(8, 7, body);
    s.setSym(8, 8, body);
  }
  // spots
  if (chance(rng,.5)){
    s.setSym(9, 26, accent);
    s.setSym(7, 22, accent);
    s.setSym(12, 28, accent);
  }

  s.outline(pal.outline);
  return s;
}

/* ---- BEAST: 4-legged creature ---- */
function buildBeast(rng, pal){
  const s = new Sprite();
  const fur = pal.body;
  const belly = pal.skin;
  const claws = pal.metal;
  const accent = pal.accent;

  // body — horizontal oval roughly rows 16-22
  s.fillRect(8, 17, 24, 22, fur);
  s.fillRect(9, 16, 23, 16, fur);
  s.fillRect(9, 23, 22, 23, fur);
  // belly
  s.fillRect(11, 20, 20, 22, belly);
  // legs (4)
  s.fillRect(9, 23, 10, 28, fur);
  s.fillRect(13, 23, 14, 28, fur);
  s.fillRect(17, 23, 18, 28, fur);
  s.fillRect(21, 23, 22, 28, fur);
  // paws
  s.fillRect(9, 29, 10, 30, claws);
  s.fillRect(13, 29, 14, 30, claws);
  s.fillRect(17, 29, 18, 30, claws);
  s.fillRect(21, 29, 22, 30, claws);
  // head on left side
  s.fillRect(4, 13, 9, 18, fur);
  s.fillRect(3, 14, 3, 17, fur);
  // ears
  const earStyle = Math.floor(rng()*3);
  if (earStyle === 0){
    // pointy
    s.fillRect(5, 10, 5, 12, fur);
    s.fillRect(8, 10, 8, 12, fur);
    s.set(6, 11, fur); s.set(7, 11, fur);
  } else if (earStyle === 1){
    // floppy
    s.fillRect(3, 12, 4, 16, fur);
    s.fillRect(9, 12, 10, 16, fur);
  } else {
    // round
    s.fillRect(5, 11, 6, 12, fur);
    s.fillRect(8, 11, 9, 12, fur);
  }
  // inner ear
  if (earStyle === 0){
    s.set(5, 11, accent); s.set(8, 11, accent);
  }
  // eyes
  s.set(5, 15, pal.outline);
  s.set(8, 15, pal.outline);
  if (chance(rng,.6)){
    s.set(5, 14, pal.detail);
    s.set(8, 14, pal.detail);
  }
  // snout
  s.fillRect(3, 16, 4, 17, belly);
  s.set(3, 16, pal.outline);
  // mouth
  s.set(4, 18, pal.outline);
  s.set(5, 18, pal.outline);
  // fangs
  if (chance(rng,.5)){
    s.set(4, 19, pal.detail);
  }
  // tail — right side
  const tailStyle = Math.floor(rng()*3);
  if (tailStyle === 0){
    // upright curl
    s.fillRect(25, 16, 25, 20, fur);
    s.fillRect(26, 14, 27, 16, fur);
    s.set(28, 15, fur);
  } else if (tailStyle === 1){
    // straight sweep
    s.fillRect(25, 18, 28, 19, fur);
    s.set(29, 18, fur);
  } else {
    // tuft
    s.fillRect(25, 19, 26, 20, fur);
    s.set(27, 18, accent);
    s.set(28, 19, accent);
  }
  // back stripes / spots
  const pattern = Math.floor(rng()*3);
  if (pattern === 0){
    for (let x=11; x<22; x+=3){
      s.set(x, 16, accent); s.set(x, 17, accent);
    }
  } else if (pattern === 1){
    s.set(13, 18, accent); s.set(17, 18, accent);
    s.set(15, 19, accent); s.set(19, 19, accent);
  }

  s.outline(pal.outline);
  return s;
}

/* --------------- archetypes index --------------- */
const ARCHETYPES = {
  hero:  { name: 'Hero',  build: buildHero  },
  mage:  { name: 'Mage',  build: buildMage  },
  robot: { name: 'Robot', build: buildRobot },
  slime: { name: 'Slime', build: buildSlime },
  beast: { name: 'Beast', build: buildBeast },
};
const ARCH_KEYS = Object.keys(ARCHETYPES);

/* ======================================================
   CHARACTER FACTORY
   ====================================================== */
function makeCharacter(seed, archPref='any', palPref='any'){
  const rng = mulberry32(hashSeed(seed));
  // burn a few so distribution feels fresh
  for (let i=0; i<4; i++) rng();

  let archKey = archPref === 'any'
    ? ARCH_KEYS[Math.floor(rng()*ARCH_KEYS.length)]
    : archPref;
  let palKey = palPref === 'any'
    ? PALETTE_KEYS[Math.floor(rng()*PALETTE_KEYS.length)]
    : palPref;

  const arch = ARCHETYPES[archKey];
  const palette = PALETTES[palKey];
  const sprite = arch.build(rng, palette);
  return {
    seed,
    archKey,
    archName: arch.name,
    palKey,
    palette,
    sprite,
  };
}

/* ======================================================
   UI WIRING
   ====================================================== */
const heroCanvas = document.getElementById('hero-canvas');
const heroCtx = heroCanvas.getContext('2d');
heroCtx.imageSmoothingEnabled = false;

const gridEl = document.getElementById('grid');
const heroName = document.getElementById('hero-name');
const heroSeed = document.getElementById('hero-seed');
const heroArch = document.getElementById('hero-arch');
const heroPal  = document.getElementById('hero-pal');
const seedInput = document.getElementById('seed-input');
const archSelect = document.getElementById('archetype');
const palSelect = document.getElementById('palette');

let currentRoster = []; // array of character objects
let activeIndex = 0;

function renderHero(ch){
  ch.sprite.render(heroCtx, heroCanvas.width, heroCanvas.height);
  heroName.textContent = ch.archName + ' of ' + ch.seed;
  heroSeed.textContent = 'seed: ' + ch.seed;
  heroArch.textContent = ch.archName;
  heroPal.textContent = ch.palKey;
}

function renderGrid(){
  gridEl.innerHTML = '';
  currentRoster.forEach((ch, i) => {
    const cell = document.createElement('div');
    cell.className = 'cell' + (i === activeIndex ? ' active' : '');
    const cv = document.createElement('canvas');
    cv.width = 128; cv.height = 128;
    const cctx = cv.getContext('2d');
    cctx.imageSmoothingEnabled = false;
    ch.sprite.render(cctx, cv.width, cv.height);
    cell.appendChild(cv);
    const tag = document.createElement('div');
    tag.className = 'cell-tag';
    tag.textContent = ch.archName;
    cell.appendChild(tag);
    cell.addEventListener('click', (e) => {
      if (e.shiftKey){
        const seed = makeSeed();
        currentRoster[i] = makeCharacter(seed, archSelect.value, palSelect.value);
        renderGrid();
      } else {
        activeIndex = i;
        renderHero(currentRoster[i]);
        renderGrid(); // to update active outline
      }
    });
    gridEl.appendChild(cell);
  });
}

function generateRoster(n=12){
  currentRoster = [];
  for (let i=0; i<n; i++){
    currentRoster.push(makeCharacter(makeSeed(), archSelect.value, palSelect.value));
  }
  activeIndex = 0;
  renderHero(currentRoster[0]);
  renderGrid();
}

function rerollHero(){
  const seed = seedInput.value.trim() || makeSeed();
  seedInput.value = '';
  const ch = makeCharacter(seed, archSelect.value, palSelect.value);
  currentRoster[activeIndex] = ch;
  renderHero(ch);
  renderGrid();
}

function applySeed(){
  const seed = seedInput.value.trim();
  if (!seed) { rerollHero(); return; }
  const ch = makeCharacter(seed, archSelect.value, palSelect.value);
  currentRoster[activeIndex] = ch;
  renderHero(ch);
  renderGrid();
}

function downloadPng(scaled=true){
  const ch = currentRoster[activeIndex];
  if (!ch) return;
  const cv = document.createElement('canvas');
  const size = scaled ? 512 : 32;
  cv.width = size; cv.height = size;
  const cctx = cv.getContext('2d');
  cctx.imageSmoothingEnabled = false;
  ch.sprite.render(cctx, size, size);
  const link = document.createElement('a');
  link.download = `sprite-${ch.archKey}-${ch.seed}${scaled?'-512':''}.png`;
  link.href = cv.toDataURL('image/png');
  link.click();
}

/* events */
document.getElementById('btn-generate').addEventListener('click', () => generateRoster(12));
document.getElementById('btn-reroll-hero').addEventListener('click', rerollHero);
document.getElementById('btn-apply-seed').addEventListener('click', applySeed);
document.getElementById('btn-download').addEventListener('click', () => downloadPng(true));
document.getElementById('btn-download-native').addEventListener('click', () => downloadPng(false));
archSelect.addEventListener('change', () => {
  // reapply current seed with new type
  const ch = currentRoster[activeIndex];
  if (!ch) return;
  const updated = makeCharacter(ch.seed, archSelect.value, palSelect.value);
  currentRoster[activeIndex] = updated;
  renderHero(updated);
  renderGrid();
});
palSelect.addEventListener('change', () => {
  const ch = currentRoster[activeIndex];
  if (!ch) return;
  const updated = makeCharacter(ch.seed, archSelect.value, palSelect.value);
  currentRoster[activeIndex] = updated;
  renderHero(updated);
  renderGrid();
});
seedInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter'){ applySeed(); }
});
document.addEventListener('keydown', (e) => {
  if (e.target === seedInput) return;
  if (e.code === 'Space'){ e.preventDefault(); generateRoster(12); }
  if (e.key === 'd' || e.key === 'D'){ downloadPng(true); }
  if (e.key === 'r' || e.key === 'R'){ rerollHero(); }
});

/* boot */
generateRoster(12);
</script>
