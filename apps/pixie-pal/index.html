<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixie Pal — Retro Virtual Pet</title>
<link rel="icon" href="https://emojicdn.elk.sh/🧚">
<meta property="og:title" content="Pixie Pal">
<meta property="og:description" content="Hatch and raise your own pixel fairy through 5 evolutions!">
<meta property="og:url" content="https://sloppy.live/pixie-pal">
<meta property="og:image" content="https://sloppy.live/pixie-pal/og-image.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#1a0a2e;--shell:#2d1b4e;--screen:#0a1628;
  --pink:#ff6bc1;--cyan:#5cffe8;--gold:#ffd646;
  --lavender:#c4a1ff;--mint:#7dffb3;--coral:#ff7b7b;
}
body{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;background:var(--bg);color:#eee;
  font-family:'Pixelify Sans',sans-serif;overflow:hidden;
  background-image:
    radial-gradient(ellipse at 20% 80%,rgba(255,107,193,.08) 0%,transparent 50%),
    radial-gradient(ellipse at 80% 20%,rgba(92,255,232,.06) 0%,transparent 50%);
}
.stars{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.star{position:absolute;width:2px;height:2px;background:#fff;border-radius:50%;animation:twinkle var(--d,3s) ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:.2}50%{opacity:.9}}
.device{
  position:relative;z-index:1;
  width:340px;background:var(--shell);border-radius:28px;
  padding:18px;
  box-shadow:0 0 60px rgba(196,161,255,.15),inset 0 1px 0 rgba(255,255,255,.08);
  border:1px solid rgba(196,161,255,.2);
}
.screen-frame{
  background:#060d1a;border-radius:14px;padding:6px;
  border:2px solid rgba(92,255,232,.15);
  box-shadow:inset 0 0 20px rgba(0,0,0,.8);
}
canvas{display:block;width:100%;border-radius:10px;image-rendering:pixelated}
.status-bar{
  display:flex;justify-content:space-around;padding:8px 4px 4px;gap:4px;
}
.stat{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  font-size:11px;color:var(--lavender);
}
.stat-label{font-size:9px;opacity:.7;font-family:'Press Start 2P',monospace;letter-spacing:-.5px}
.stat-bar{width:40px;height:6px;background:rgba(255,255,255,.1);border-radius:3px;overflow:hidden}
.stat-fill{height:100%;border-radius:3px;transition:width .5s}
.stat-fill.hunger{background:var(--coral)}
.stat-fill.happy{background:var(--gold)}
.stat-fill.energy{background:var(--mint)}
.stat-fill.xp{background:var(--cyan)}
.controls{
  display:grid;grid-template-columns:repeat(4,1fr);gap:8px;
  padding:14px 6px 8px;
}
.btn{
  background:rgba(255,255,255,.06);border:1px solid rgba(196,161,255,.25);
  border-radius:10px;padding:10px 4px;color:var(--pink);
  font-family:'Press Start 2P',monospace;font-size:8px;
  cursor:pointer;transition:all .15s;text-align:center;
  text-shadow:0 0 8px rgba(255,107,193,.4);
}
.btn:hover{background:rgba(255,107,193,.12);transform:translateY(-1px)}
.btn:active{transform:translateY(1px)}
.btn:disabled{opacity:.3;cursor:not-allowed;transform:none}
.btn .icon{font-size:18px;display:block;margin-bottom:3px}
.info-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 10px 2px;font-size:13px;color:var(--cyan);
}
.evo-label{font-size:10px;font-family:'Press Start 2P',monospace;color:var(--gold);letter-spacing:-.5px}
.pet-name{font-weight:700;font-size:15px}
.age{font-size:10px;opacity:.6}
.backlink{
  margin-top:14px;z-index:1;position:relative;
  font-size:11px;opacity:.4;
}
.backlink a{color:var(--lavender);text-decoration:none}
.backlink a:hover{opacity:1}
/* Hatch screen */
.hatch-overlay{
  position:absolute;top:0;left:0;right:0;bottom:0;z-index:10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:var(--shell);border-radius:28px;gap:14px;padding:20px;
}
.hatch-overlay h2{
  font-family:'Press Start 2P',monospace;font-size:12px;
  color:var(--pink);text-shadow:0 0 12px rgba(255,107,193,.5);
}
.egg-pick{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.egg-opt{
  width:64px;height:78px;background:rgba(255,255,255,.04);
  border:2px solid rgba(196,161,255,.2);border-radius:12px;
  cursor:pointer;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px;
  transition:all .2s;
}
.egg-opt:hover{border-color:var(--pink);background:rgba(255,107,193,.08)}
.egg-opt.sel{border-color:var(--cyan);background:rgba(92,255,232,.1);box-shadow:0 0 12px rgba(92,255,232,.2)}
.egg-opt .emoji{font-size:28px}
.egg-opt .lbl{font-size:9px;font-family:'Press Start 2P',monospace;color:var(--lavender)}
.hatch-btn{
  margin-top:8px;padding:10px 28px;
  background:linear-gradient(135deg,var(--pink),var(--lavender));
  border:none;border-radius:10px;color:#1a0a2e;
  font-family:'Press Start 2P',monospace;font-size:10px;
  cursor:pointer;transition:all .2s;
}
.hatch-btn:hover{transform:scale(1.05);box-shadow:0 0 20px rgba(255,107,193,.4)}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="stars" id="stars"></div>
<div class="device" id="device">
  <!-- Hatch overlay -->
  <div class="hatch-overlay" id="hatchOverlay">
    <h2>🧚 Choose Your Egg</h2>
    <div class="egg-pick" id="eggPick"></div>
    <button class="hatch-btn" id="hatchBtn">HATCH!</button>
  </div>
  <!-- Main UI -->
  <div class="info-row">
    <span class="pet-name" id="petName">???</span>
    <span class="evo-label" id="evoLabel">Egg</span>
    <span class="age" id="ageLabel">0h</span>
  </div>
  <div class="screen-frame">
    <canvas id="c" width="200" height="200"></canvas>
  </div>
  <div class="status-bar">
    <div class="stat">
      <span class="stat-label">FOOD</span>
      <div class="stat-bar"><div class="stat-fill hunger" id="hungerBar"></div></div>
    </div>
    <div class="stat">
      <span class="stat-label">JOY</span>
      <div class="stat-bar"><div class="stat-fill happy" id="happyBar"></div></div>
    </div>
    <div class="stat">
      <span class="stat-label">ZZZ</span>
      <div class="stat-bar"><div class="stat-fill energy" id="energyBar"></div></div>
    </div>
    <div class="stat">
      <span class="stat-label">XP</span>
      <div class="stat-bar"><div class="stat-fill xp" id="xpBar"></div></div>
    </div>
  </div>
  <div class="controls">
    <button class="btn" id="feedBtn"><span class="icon">🍰</span>FEED</button>
    <button class="btn" id="playBtn"><span class="icon">🎾</span>PLAY</button>
    <button class="btn" id="sleepBtn"><span class="icon">💤</span>SLEEP</button>
    <button class="btn" id="healBtn"><span class="icon">✨</span>HEAL</button>
  </div>
</div>
<div class="backlink"><a href="https://sloppy.live">sloppy.live</a></div>

<script>
// ── Stars ──
(function(){
  const c=document.getElementById('stars');
  for(let i=0;i<50;i++){
    const s=document.createElement('div');s.className='star';
    s.style.left=Math.random()*100+'%';s.style.top=Math.random()*100+'%';
    s.style.setProperty('--d',(2+Math.random()*4)+'s');
    s.style.animationDelay=Math.random()*4+'s';
    c.appendChild(s);
  }
})();

// ── Constants ──
const SPECIES = [
  {id:'fae',    name:'Fae',    emoji:'🧚', hue:300, baseColor:'#ff6bc1'},
  {id:'wisp',   name:'Wisp',   emoji:'🔮', hue:260, baseColor:'#c4a1ff'},
  {id:'sprout', name:'Sprout', emoji:'🌿', hue:140, baseColor:'#7dffb3'},
  {id:'ember',  name:'Ember',  emoji:'🔥', hue:20,  baseColor:'#ff9b5c'},
  {id:'frost',  name:'Frost',  emoji:'❄️', hue:190, baseColor:'#5cffe8'},
];

const EVOLUTIONS = [
  {name:'Egg',     xp:0,    size:1.0, label:'Egg'},
  {name:'Hatchling',xp:30,  size:1.0, label:'Hatchling'},
  {name:'Sprite',  xp:100,  size:1.15,label:'Sprite'},
  {name:'Pixie',   xp:250,  size:1.3, label:'Pixie'},
  {name:'Fairy',   xp:500,  size:1.5, label:'Fairy'},
  {name:'Monarch', xp:1000, size:1.7, label:'✦ Monarch ✦'},
];

const FOODS = [
  {name:'Berry',   emoji:'🫐', hunger:20, xp:3,  color:'#7b5ea7'},
  {name:'Nectar',  emoji:'🍯', hunger:30, xp:5,  color:'#ffd646'},
  {name:'Cake',    emoji:'🍰', hunger:40, xp:8,  color:'#ff9bbb'},
  {name:'Stardust',emoji:'✨', hunger:15, xp:15, color:'#5cffe8'},
];

const SAVE_KEY = 'pixie_pal_save';
const TICK_MS = 2000;
const DECAY_RATE = 0.12; // per tick

// ── State ──
let pet = null;
let animState = {frame:0, action:null, actionTimer:0, bounceY:0, particles:[], sleeping:false};
let foodIdx = 0;

// ── Canvas ──
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// ── Save / Load ──
function save(){
  if(!pet) return;
  localStorage.setItem(SAVE_KEY, JSON.stringify(pet));
}
function load(){
  try{
    const d = JSON.parse(localStorage.getItem(SAVE_KEY));
    if(d && d.species) return d;
  }catch(e){}
  return null;
}

// ── Hatch UI ──
const hatchOverlay = document.getElementById('hatchOverlay');
const eggPick = document.getElementById('eggPick');
const hatchBtn = document.getElementById('hatchBtn');
let selectedSpecies = 0;

function buildHatchUI(){
  eggPick.innerHTML='';
  SPECIES.forEach((sp,i)=>{
    const d=document.createElement('div');
    d.className='egg-opt'+(i===selectedSpecies?' sel':'');
    d.innerHTML=`<span class="emoji">${sp.emoji}</span><span class="lbl">${sp.name}</span>`;
    d.onclick=()=>{selectedSpecies=i;buildHatchUI()};
    eggPick.appendChild(d);
  });
}

hatchBtn.onclick=()=>{
  const sp=SPECIES[selectedSpecies];
  pet={
    species:sp.id, speciesIdx:selectedSpecies,
    hunger:80, happy:80, energy:80,
    xp:0, evo:0, age:0, sick:false,
    bornAt:Date.now(), lastTick:Date.now(),
  };
  hatchOverlay.classList.add('hidden');
  animState.action='hatch';animState.actionTimer=60;
  save();
};

// ── Evolution ──
function getEvo(){return EVOLUTIONS[pet.evo]}
function checkEvolve(){
  if(pet.evo < EVOLUTIONS.length-1 && pet.xp >= EVOLUTIONS[pet.evo+1].xp){
    pet.evo++;
    animState.action='evolve';animState.actionTimer=90;
    // burst particles
    for(let i=0;i<20;i++){
      animState.particles.push({
        x:100,y:100,
        vx:(Math.random()-.5)*4,vy:(Math.random()-.5)*4,
        life:40+Math.random()*30,maxLife:70,
        color:['#ff6bc1','#5cffe8','#ffd646','#c4a1ff'][i%4],
        size:2+Math.random()*3,
      });
    }
    save();
  }
}

// ── Actions ──
function doFeed(){
  if(!pet||pet.evo===0||animState.sleeping) return;
  const food = FOODS[foodIdx];
  foodIdx=(foodIdx+1)%FOODS.length;
  pet.hunger=Math.min(100,pet.hunger+food.hunger);
  pet.xp+=food.xp;
  animState.action='eat';animState.actionTimer=30;
  // food particle
  animState.particles.push({
    x:100,y:70,vx:0,vy:-0.5,life:30,maxLife:30,
    color:food.color,size:8,text:food.emoji,
  });
  checkEvolve();save();
}

function doPlay(){
  if(!pet||pet.evo===0||animState.sleeping) return;
  if(pet.energy<10) return; // too tired
  pet.happy=Math.min(100,pet.happy+25);
  pet.energy=Math.max(0,pet.energy-15);
  pet.xp+=5;
  animState.action='play';animState.actionTimer=40;
  // sparkle particles
  for(let i=0;i<8;i++){
    animState.particles.push({
      x:80+Math.random()*40,y:80+Math.random()*40,
      vx:(Math.random()-.5)*2,vy:-1-Math.random(),
      life:25+Math.random()*15,maxLife:40,
      color:['#ffd646','#ff6bc1','#5cffe8'][i%3],size:3,
    });
  }
  checkEvolve();save();
}

function doSleep(){
  if(!pet||pet.evo===0) return;
  animState.sleeping=!animState.sleeping;
  if(animState.sleeping){
    animState.action='sleep';animState.actionTimer=999;
    document.getElementById('sleepBtn').innerHTML='<span class="icon">☀️</span>WAKE';
  } else {
    animState.action=null;animState.actionTimer=0;
    document.getElementById('sleepBtn').innerHTML='<span class="icon">💤</span>SLEEP';
  }
}

function doHeal(){
  if(!pet||pet.evo===0||!pet.sick) return;
  pet.sick=false;
  pet.happy=Math.min(100,pet.happy+10);
  pet.xp+=10;
  animState.action='heal';animState.actionTimer=35;
  for(let i=0;i<12;i++){
    animState.particles.push({
      x:100+Math.cos(i/12*Math.PI*2)*20,
      y:100+Math.sin(i/12*Math.PI*2)*20,
      vx:Math.cos(i/12*Math.PI*2)*1.5,
      vy:Math.sin(i/12*Math.PI*2)*1.5,
      life:30,maxLife:30,
      color:'#5cffe8',size:2.5,
    });
  }
  checkEvolve();save();
}

// ── Button wiring ──
document.getElementById('feedBtn').onclick=doFeed;
document.getElementById('playBtn').onclick=doPlay;
document.getElementById('sleepBtn').onclick=doSleep;
document.getElementById('healBtn').onclick=doHeal;

// ── Tick (stat decay + sleep recovery) ──
function tick(){
  if(!pet||pet.evo===0) return;
  const now=Date.now();
  const elapsed=Math.floor((now-pet.lastTick)/TICK_MS);
  if(elapsed<1) return;
  pet.lastTick=now;
  for(let i=0;i<elapsed;i++){
    if(animState.sleeping){
      pet.energy=Math.min(100,pet.energy+1.5);
      pet.hunger=Math.max(0,pet.hunger-DECAY_RATE*0.3);
    } else {
      pet.hunger=Math.max(0,pet.hunger-DECAY_RATE);
      pet.happy=Math.max(0,pet.happy-DECAY_RATE*0.7);
      pet.energy=Math.max(0,pet.energy-DECAY_RATE*0.5);
    }
    pet.age++;
    // sickness from neglect
    if(pet.hunger<15 && pet.happy<15 && !pet.sick && Math.random()<0.1){
      pet.sick=true;
    }
  }
  save();
}

// ── Rendering ──
function hslToRgb(h,s,l){
  s/=100;l/=100;
  const k=n=>(n+h/30)%12;
  const a=s*Math.min(l,1-l);
  const f=n=>l-a*Math.max(-1,Math.min(k(n)-3,9-k(n),1));
  return[Math.round(f(0)*255),Math.round(f(8)*255),Math.round(f(4)*255)];
}

function drawPixel(x,y,w,h,color){
  ctx.fillStyle=color;
  ctx.fillRect(Math.floor(x),Math.floor(y),w,h);
}

function drawEgg(cx,cy,hue,frame){
  const wobble=Math.sin(frame*0.1)*2;
  const s=1+Math.sin(frame*0.05)*0.03;
  ctx.save();
  ctx.translate(cx,cy);ctx.scale(s,s);ctx.rotate(wobble*Math.PI/180);
  // egg body
  const [r,g,b]=hslToRgb(hue,60,75);
  ctx.fillStyle=`rgb(${r},${g},${b})`;
  ctx.beginPath();
  ctx.ellipse(0,0,16,20,0,0,Math.PI*2);
  ctx.fill();
  // highlight
  ctx.fillStyle=`rgba(255,255,255,0.3)`;
  ctx.beginPath();
  ctx.ellipse(-5,-6,5,8,-.3,0,Math.PI*2);
  ctx.fill();
  // crack marks (if close to hatching)
  if(pet && pet.xp>15){
    ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(-3,2);ctx.lineTo(2,-4);ctx.lineTo(6,1);ctx.stroke();
  }
  ctx.restore();
}

function drawCreature(cx,cy,species,evo,frame,action,sick){
  const sp=SPECIES[species];
  const ev=EVOLUTIONS[evo];
  const scale=ev.size;
  const bounce=action==='play'?Math.abs(Math.sin(frame*0.2))*8:Math.sin(frame*0.06)*2;
  const [r,g,b]=hslToRgb(sp.hue,65,65);
  const [r2,g2,b2]=hslToRgb(sp.hue,55,80);

  ctx.save();
  ctx.translate(cx,cy-bounce);
  ctx.scale(scale,scale);

  // shadow
  ctx.fillStyle='rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(0,22+bounce*0.3,14,4,0,0,Math.PI*2);
  ctx.fill();

  // body
  const bodyH = evo>=3 ? 22 : evo>=1 ? 18 : 15;
  const bodyW = evo>=3 ? 16 : evo>=1 ? 14 : 12;
  ctx.fillStyle=`rgb(${r},${g},${b})`;
  ctx.beginPath();
  ctx.ellipse(0,0,bodyW,bodyH,0,0,Math.PI*2);
  ctx.fill();

  // belly
  ctx.fillStyle=`rgb(${r2},${g2},${b2})`;
  ctx.beginPath();
  ctx.ellipse(0,4,bodyW*0.6,bodyH*0.5,0,0,Math.PI*2);
  ctx.fill();

  // wings (Sprite+)
  if(evo>=2){
    const wingFlap=Math.sin(frame*0.15)*15;
    ctx.save();
    ctx.globalAlpha=0.5;
    ctx.fillStyle=`rgb(${r2},${g2},${b2})`;
    // left wing
    ctx.save();ctx.rotate((-30+wingFlap)*Math.PI/180);
    ctx.beginPath();ctx.ellipse(-bodyW-4,-6,8+evo*2,14+evo*2,-.4,0,Math.PI*2);ctx.fill();
    ctx.restore();
    // right wing
    ctx.save();ctx.rotate((30-wingFlap)*Math.PI/180);
    ctx.beginPath();ctx.ellipse(bodyW+4,-6,8+evo*2,14+evo*2,.4,0,Math.PI*2);ctx.fill();
    ctx.restore();
    ctx.restore();
  }

  // crown (Monarch)
  if(evo>=5){
    ctx.fillStyle='#ffd646';
    ctx.beginPath();
    ctx.moveTo(-8,-bodyH-2);ctx.lineTo(-6,-bodyH-10);
    ctx.lineTo(-2,-bodyH-5);ctx.lineTo(0,-bodyH-12);
    ctx.lineTo(2,-bodyH-5);ctx.lineTo(6,-bodyH-10);
    ctx.lineTo(8,-bodyH-2);ctx.closePath();ctx.fill();
  }

  // antenna (Fairy+)
  if(evo>=4){
    ctx.strokeStyle=`rgb(${r},${g},${b})`;ctx.lineWidth=1.5;
    const aw=Math.sin(frame*0.08)*3;
    ctx.beginPath();ctx.moveTo(-4,-bodyH+2);ctx.quadraticCurveTo(-8-aw,-bodyH-8,-6-aw,-bodyH-12);ctx.stroke();
    ctx.beginPath();ctx.moveTo(4,-bodyH+2);ctx.quadraticCurveTo(8+aw,-bodyH-8,6+aw,-bodyH-12);ctx.stroke();
    ctx.fillStyle='#ffd646';
    ctx.beginPath();ctx.arc(-6-aw,-bodyH-12,2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(6+aw,-bodyH-12,2,0,Math.PI*2);ctx.fill();
  }

  // eyes
  const eyeY=-5;const eyeSpread=evo>=3?6:5;
  const blink=frame%120<3;
  if(animState.sleeping){
    // closed eyes
    ctx.strokeStyle='#222';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(-eyeSpread-2,eyeY);ctx.lineTo(-eyeSpread+2,eyeY);ctx.stroke();
    ctx.beginPath();ctx.moveTo(eyeSpread-2,eyeY);ctx.lineTo(eyeSpread+2,eyeY);ctx.stroke();
  } else if(blink){
    ctx.strokeStyle='#222';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(-eyeSpread-2,eyeY);ctx.lineTo(-eyeSpread+2,eyeY);ctx.stroke();
    ctx.beginPath();ctx.moveTo(eyeSpread-2,eyeY);ctx.lineTo(eyeSpread+2,eyeY);ctx.stroke();
  } else {
    ctx.fillStyle='#1a0a2e';
    ctx.beginPath();ctx.arc(-eyeSpread,eyeY,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(eyeSpread,eyeY,2.5,0,Math.PI*2);ctx.fill();
    // eye shine
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(-eyeSpread+1,eyeY-1,1,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(eyeSpread+1,eyeY-1,1,0,Math.PI*2);ctx.fill();
  }

  // mouth
  if(sick){
    ctx.strokeStyle='#222';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.arc(0,4,3,0.2,Math.PI-0.2);ctx.stroke();
  } else if(action==='eat'){
    ctx.fillStyle='#222';
    ctx.beginPath();ctx.arc(0,4,3,0,Math.PI*2);ctx.fill();
  } else if(pet.happy>50){
    ctx.strokeStyle='#222';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.arc(0,2,3,0.2,Math.PI-0.2);ctx.stroke();
  } else {
    ctx.strokeStyle='#222';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(-2,4);ctx.lineTo(2,4);ctx.stroke();
  }

  // blush if happy
  if(pet.happy>70 && !sick){
    ctx.fillStyle='rgba(255,130,160,0.3)';
    ctx.beginPath();ctx.ellipse(-eyeSpread-3,eyeY+5,3,2,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(eyeSpread+3,eyeY+5,3,2,0,0,Math.PI*2);ctx.fill();
  }

  // sick indicator
  if(sick){
    ctx.fillStyle='rgba(120,255,120,0.6)';
    const sw=Math.sin(frame*0.1)*2;
    ctx.beginPath();ctx.arc(bodyW+2,-bodyH+5+sw,3,0,Math.PI*2);ctx.fill();
  }

  // feet (Sprite+)
  if(evo>=2){
    ctx.fillStyle=`rgb(${r},${g},${b})`;
    ctx.beginPath();ctx.ellipse(-5,bodyH-2,4,3,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(5,bodyH-2,4,3,0,0,Math.PI*2);ctx.fill();
  }

  ctx.restore();
}

function drawSleepZs(cx,cy,frame){
  const zs=['z','Z','z'];
  ctx.font='bold 12px "Press Start 2P"';
  ctx.fillStyle='rgba(196,161,255,0.6)';
  zs.forEach((z,i)=>{
    const t=(frame*0.03+i*0.8)%3;
    const x=cx+15+t*8;
    const y=cy-20-t*15;
    const alpha=1-t/3;
    ctx.globalAlpha=alpha*0.7;
    ctx.fillText(z,x,y);
  });
  ctx.globalAlpha=1;
}

function drawParticles(){
  animState.particles=animState.particles.filter(p=>{
    p.x+=p.vx;p.y+=p.vy;p.life--;
    const alpha=p.life/p.maxLife;
    if(p.text){
      ctx.globalAlpha=alpha;
      ctx.font='16px serif';
      ctx.fillText(p.text,p.x-8,p.y);
      ctx.globalAlpha=1;
    } else {
      ctx.globalAlpha=alpha;
      ctx.fillStyle=p.color;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size*alpha,0,Math.PI*2);ctx.fill();
      ctx.globalAlpha=1;
    }
    return p.life>0;
  });
}

function drawBackground(frame){
  // dark gradient
  const grd=ctx.createRadialGradient(100,100,20,100,100,120);
  grd.addColorStop(0,'#0f1a2e');
  grd.addColorStop(1,'#060d1a');
  ctx.fillStyle=grd;
  ctx.fillRect(0,0,200,200);

  // ambient floating dots
  for(let i=0;i<6;i++){
    const x=(Math.sin(frame*0.01+i*1.2)*60)+100;
    const y=(Math.cos(frame*0.008+i*1.7)*50)+100;
    const a=0.08+Math.sin(frame*0.02+i)*0.04;
    ctx.fillStyle=`rgba(196,161,255,${a})`;
    ctx.beginPath();ctx.arc(x,y,1.5,0,Math.PI*2);ctx.fill();
  }

  // ground line
  ctx.strokeStyle='rgba(92,255,232,0.1)';
  ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(20,165);ctx.lineTo(180,165);ctx.stroke();
}

function updateUI(){
  if(!pet) return;
  document.getElementById('hungerBar').style.width=pet.hunger+'%';
  document.getElementById('happyBar').style.width=pet.happy+'%';
  document.getElementById('energyBar').style.width=pet.energy+'%';
  const ev=getEvo();
  const nextXp=pet.evo<EVOLUTIONS.length-1?EVOLUTIONS[pet.evo+1].xp:pet.xp;
  const prevXp=EVOLUTIONS[pet.evo].xp;
  const pct=pet.evo>=EVOLUTIONS.length-1?100:Math.min(100,((pet.xp-prevXp)/(nextXp-prevXp))*100);
  document.getElementById('xpBar').style.width=pct+'%';
  document.getElementById('evoLabel').textContent=ev.label;
  document.getElementById('petName').textContent=SPECIES[pet.speciesIdx].name;
  const ageHours=Math.floor(pet.age*TICK_MS/3600000);
  document.getElementById('ageLabel').textContent=ageHours<1?Math.floor(pet.age*TICK_MS/60000)+'m':ageHours+'h';

  // button states
  document.getElementById('feedBtn').disabled=pet.evo===0||animState.sleeping;
  document.getElementById('playBtn').disabled=pet.evo===0||pet.energy<10||animState.sleeping;
  document.getElementById('healBtn').disabled=pet.evo===0||!pet.sick;
}

function render(){
  animState.frame++;

  if(animState.actionTimer>0) animState.actionTimer--;
  if(animState.actionTimer===0 && animState.action && animState.action!=='sleep'){
    animState.action=null;
  }

  drawBackground(animState.frame);

  if(!pet){
    // no pet yet, draw sparkle
    ctx.font='24px serif';
    ctx.fillText('🧚',85,105);
    return;
  }

  const cx=100, cy=pet.evo===0?110:120;

  if(pet.evo===0){
    drawEgg(cx,cy,SPECIES[pet.speciesIdx].hue,animState.frame);
    // check auto-hatch at 30xp
    if(pet.xp>=30){
      pet.evo=1;
      animState.action='evolve';animState.actionTimer=60;
      for(let i=0;i<15;i++){
        animState.particles.push({
          x:cx,y:cy,vx:(Math.random()-.5)*3,vy:(Math.random()-.5)*3,
          life:30+Math.random()*20,maxLife:50,
          color:['#ff6bc1','#5cffe8','#ffd646'][i%3],size:3,
        });
      }
      save();
    }
  } else {
    drawCreature(cx,cy,pet.speciesIdx,pet.evo,animState.frame,animState.action,pet.sick);
    if(animState.sleeping) drawSleepZs(cx,cy,animState.frame);
  }

  // evolve flash
  if(animState.action==='evolve' && animState.actionTimer>60){
    const a=(animState.actionTimer-60)/30;
    ctx.fillStyle=`rgba(255,255,255,${a*0.4})`;
    ctx.fillRect(0,0,200,200);
  }

  drawParticles();
  tick();
  updateUI();
}

// ── Init ──
function init(){
  const saved=load();
  if(saved){
    pet=saved;
    pet.lastTick=Date.now();
    hatchOverlay.classList.add('hidden');
    if(animState.sleeping){
      document.getElementById('sleepBtn').innerHTML='<span class="icon">☀️</span>WAKE';
    }
  } else {
    buildHatchUI();
  }
  // auto-grant XP to egg over time
  setInterval(()=>{
    if(pet && pet.evo===0){
      pet.xp+=2;save();
    }
  },3000);

  function loop(){render();requestAnimationFrame(loop)}
  loop();
}

init();
</script>
