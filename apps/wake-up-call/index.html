<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wake Up Call</title>
<link rel="icon" href="https://emojicdn.elk.sh/⏰">
<meta property="og:title" content="Wake Up Call">
<meta property="og:description" content="A brutal alarm that won't stop until you type 'hello'. Good luck.">
<meta property="og:url" content="https://sloppy.live/wake-up-call">
<meta property="og:image" content="https://sloppy.live/wake-up-call/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'IBM Plex Mono',monospace;overflow:hidden;transition:background 0.15s}
body.alarming{background:#1a0000}
body.peaceful{background:#0a1a0a}

.flash-overlay{position:fixed;inset:0;background:rgba(255,0,0,0.5);pointer-events:none;opacity:0;z-index:1;transition:opacity 0.08s}
.flash-overlay.on{opacity:1}

.container{position:relative;z-index:2;text-align:center;padding:20px}
.alarm-title{font-family:'Bungee Shade',cursive;font-size:clamp(28px,7vw,64px);color:#ff2200;text-shadow:0 0 20px #ff000088,0 0 60px #ff000044;letter-spacing:2px;margin-bottom:8px;line-height:1.1}
.alarm-title.off{color:#22cc44;text-shadow:0 0 20px #22cc4488}
.subtitle{font-size:13px;color:#aa4444;margin-bottom:40px;letter-spacing:1px}
.subtitle.off{color:#44aa66}

.clock-icon{font-size:clamp(60px,15vw,120px);margin-bottom:20px;display:inline-block}
.clock-icon.shaking{animation:alarm-shake 0.1s linear infinite}
@keyframes alarm-shake{0%{transform:rotate(-8deg)}25%{transform:rotate(8deg)}50%{transform:rotate(-6deg)}75%{transform:rotate(6deg)}100%{transform:rotate(-8deg)}}

.prompt{font-size:16px;color:#ff6644;margin-bottom:16px;min-height:24px}
.prompt.off{color:#44cc66}

.input-wrap{position:relative;display:inline-block}
.input-field{background:rgba(255,255,255,0.06);border:2px solid #ff3322;border-radius:8px;padding:14px 24px;font-family:'IBM Plex Mono',monospace;font-size:clamp(20px,5vw,32px);color:#ff4433;text-align:center;outline:none;width:min(320px,80vw);letter-spacing:4px;caret-color:#ff4433;transition:all 0.3s}
.input-field::placeholder{color:#552222;letter-spacing:2px}
.input-field.success{border-color:#22cc44;color:#22cc44;caret-color:#22cc44}

.status{margin-top:20px;font-size:12px;color:#663333;min-height:18px}
.status.off{color:#336633}

.elapsed{font-size:11px;color:#442222;margin-top:6px}
.elapsed.off{color:#224422}

.arm-btn{margin-top:40px;padding:14px 32px;font-family:'IBM Plex Mono',monospace;font-size:16px;font-weight:700;border:2px solid #ff3322;border-radius:8px;background:rgba(255,0,0,0.08);color:#ff4433;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;transition:all 0.2s;display:none}
.arm-btn:hover{background:rgba(255,0,0,0.15)}
.arm-btn.show{display:inline-block}
.arm-btn.rearm{border-color:#22cc44;color:#22cc44;background:rgba(0,255,0,0.05)}
.arm-btn.rearm:hover{background:rgba(0,255,0,0.1)}

.victory{display:none;font-size:18px;color:#22cc44;margin-top:16px;animation:fadeIn 0.5s}
.victory.show{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

body.peaceful </style>
</head>
<body class="alarming">
<div class="flash-overlay" id="flash"></div>
<div class="container">
<div class="clock-icon shaking" id="icon">⏰</div>
<div class="alarm-title" id="title">WAKE UP</div>
<div class="subtitle" id="sub">type <strong>hello</strong> to make it stop</div>
<div class="prompt" id="prompt">⚠ ALARM ACTIVE ⚠</div>
<div class="input-wrap">
<input class="input-field" id="inp" type="text" placeholder="hello" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" maxlength="5" autofocus>
</div>
<div class="status" id="status">listening...</div>
<div class="elapsed" id="elapsed"></div>
<div class="victory" id="victory">☀ Good morning. The nightmare is over.</div>
<button class="arm-btn" id="armBtn" onclick="rearm()">ARM AGAIN</button>
</div>

<script>
var inp=document.getElementById('inp');
var flashEl=document.getElementById('flash');
var titleEl=document.getElementById('title');
var subEl=document.getElementById('sub');
var promptEl=document.getElementById('prompt');
var statusEl=document.getElementById('status');
var elapsedEl=document.getElementById('elapsed');
var victoryEl=document.getElementById('victory');
var armBtn=document.getElementById('armBtn');
var iconEl=document.getElementById('icon');

var audioCtx=null;
var buzzerNode=null;
var buzzerGain=null;
var alarming=false;
var startTime=0;
var flashInterval=null;
var elapsedInterval=null;
var flashOn=false;
var solved=false;

function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
}

function startBuzzer(){
  initAudio();
  if(audioCtx.state==='suspended')audioCtx.resume();

  // Harsh buzzer: square wave + distortion
  var osc1=audioCtx.createOscillator();
  osc1.type='square';
  osc1.frequency.value=220;

  var osc2=audioCtx.createOscillator();
  osc2.type='sawtooth';
  osc2.frequency.value=223;

  // LFO for warble
  var lfo=audioCtx.createOscillator();
  lfo.type='square';
  lfo.frequency.value=4;
  var lfoGain=audioCtx.createGain();
  lfoGain.gain.value=60;
  lfo.connect(lfoGain);
  lfoGain.connect(osc1.frequency);

  var merger=audioCtx.createGain();
  merger.gain.value=0.5;

  buzzerGain=audioCtx.createGain();
  buzzerGain.gain.value=0.35;

  osc1.connect(merger);
  osc2.connect(merger);
  merger.connect(buzzerGain);
  buzzerGain.connect(audioCtx.destination);

  osc1.start();osc2.start();lfo.start();

  buzzerNode={osc1:osc1,osc2:osc2,lfo:lfo,lfoGain:lfoGain,merger:merger};
}

function stopBuzzer(){
  if(!buzzerNode)return;
  try{
    buzzerNode.osc1.stop();
    buzzerNode.osc2.stop();
    buzzerNode.lfo.stop();
  }catch(e){}
  buzzerNode=null;buzzerGain=null;
}

function startAlarm(){
  alarming=true;solved=false;
  startTime=Date.now();
  document.body.className='alarming';
  titleEl.className='alarm-title';
  subEl.className='subtitle';
  promptEl.className='prompt';
  promptEl.textContent='⚠ ALARM ACTIVE ⚠';
  statusEl.className='status';
  statusEl.textContent='listening...';
  elapsedEl.className='elapsed';
  iconEl.className='clock-icon shaking';
  victoryEl.className='victory';
  armBtn.className='arm-btn';
  inp.className='input-field';
  inp.value='';
  inp.disabled=false;
  inp.focus();

  startBuzzer();

  // Flash
  flashInterval=setInterval(function(){
    flashOn=!flashOn;
    flashEl.classList.toggle('on',flashOn);
  },150);

  // Elapsed timer
  elapsedInterval=setInterval(function(){
    if(!alarming)return;
    var s=Math.floor((Date.now()-startTime)/1000);
    var m=Math.floor(s/60);
    s=s%60;
    elapsedEl.textContent=(m>0?m+'m ':'')+s+'s of suffering';
  },1000);
}

function stopAlarm(){
  alarming=false;solved=true;
  stopBuzzer();
  clearInterval(flashInterval);
  clearInterval(elapsedInterval);
  flashEl.classList.remove('on');

  document.body.className='peaceful';
  titleEl.className='alarm-title off';
  titleEl.textContent='GOOD MORNING';
  subEl.className='subtitle off';
  subEl.textContent='alarm dismissed';
  promptEl.className='prompt off';
  promptEl.textContent='✓ hello received';
  statusEl.className='status off';
  var s=Math.floor((Date.now()-startTime)/1000);
  statusEl.textContent='silenced in '+s+' second'+(s!==1?'s':'');
  elapsedEl.className='elapsed off';
  elapsedEl.textContent='';
  iconEl.className='clock-icon';
  iconEl.textContent='☀';
  victoryEl.className='victory show';
  inp.className='input-field success';
  inp.disabled=true;
  armBtn.className='arm-btn show rearm';
  armBtn.textContent='ARM AGAIN';

  // Victory chime
  playChime();
}

function playChime(){
  initAudio();
  if(audioCtx.state==='suspended')audioCtx.resume();
  var notes=[523.25,659.25,783.99];
  notes.forEach(function(freq,i){
    setTimeout(function(){
      var osc=audioCtx.createOscillator();
      osc.type='sine';
      osc.frequency.value=freq;
      var g=audioCtx.createGain();
      g.gain.value=0.15;
      g.gain.setTargetAtTime(0,audioCtx.currentTime+0.3,0.1);
      osc.connect(g);g.connect(audioCtx.destination);
      osc.start();osc.stop(audioCtx.currentTime+0.5);
    },i*150);
  });
}

function rearm(){
  titleEl.textContent='WAKE UP';
  iconEl.textContent='⏰';
  startAlarm();
}

// Check input
inp.addEventListener('input',function(){
  if(!alarming)return;
  var val=inp.value.toLowerCase().trim();
  statusEl.textContent='you typed: "'+inp.value+'"';

  if(val==='hello'){
    stopAlarm();
  }else if(val.length>=5){
    // Wrong word, shake and clear
    inp.style.animation='none';
    void inp.offsetWidth;
    inp.style.animation='alarm-shake 0.2s linear 2';
    setTimeout(function(){
      inp.value='';
      inp.style.animation='none';
      statusEl.textContent='wrong! type hello';
    },400);
  }
});

// Start on first interaction (needed for audio)
var started=false;
function firstInteraction(){
  if(started)return;
  started=true;
  startAlarm();
}

// Auto-start alarm immediately; audio needs gesture
inp.addEventListener('focus',firstInteraction);
inp.addEventListener('click',firstInteraction);
inp.addEventListener('touchstart',firstInteraction);
document.addEventListener('click',function(){
  if(alarming&&!buzzerNode)startBuzzer();
  if(alarming)inp.focus();
});

// Start visual alarm immediately, audio on gesture
(function(){
  alarming=true;
  startTime=Date.now();
  flashInterval=setInterval(function(){
    flashOn=!flashOn;
    flashEl.classList.toggle('on',flashOn);
  },150);
  elapsedInterval=setInterval(function(){
    if(!alarming)return;
    var s=Math.floor((Date.now()-startTime)/1000);
    var m=Math.floor(s/60);
    s=s%60;
    elapsedEl.textContent=(m>0?m+'m ':'')+s+'s of suffering';
  },1000);
})();
</script>
</body>
</html>
