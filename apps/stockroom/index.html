<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stockroom — inventory suite with roles, branches & sales charts</title>
<meta name="description" content="A clean inventory management demo: admin, manager and cashier roles, multi-branch stock, a POS screen, and hand-drawn sales charts. Runs entirely in your browser.">
<link rel="icon" href="https://emojicdn.elk.sh/📦">
<meta property="og:title" content="Stockroom — inventory suite">
<meta property="og:description" content="Admin, manager & cashier roles · branches · POS · sales charts. Clean vanilla-JS inventory demo.">
<meta property="og:url" content="https://sloppy.live/stockroom">
<meta property="og:image" content="https://image.pollinations.ai/prompt/clean%20modern%20inventory%20dashboard%20UI%20on%20a%20laptop%2C%20teal%20and%20cream%2C%20sales%20line%20chart%2C%20neat%20product%20table%2C%20minimal%20design%2C%20soft%20light?width=1200&height=630&seed=9090&nologo=true&model=flux&image=.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{ --bg:#f4f2ec; --card:#ffffff; --ink:#1c2a28; --dim:#6e7d78; --line:#e2ded2;
  --teal:#0e6e5c; --teal-soft:#e0efe9; --amber:#e8a13c; --red:#c4442e; --focus:#1446c8; }
*{box-sizing:border-box;}
html{font-size:100%;}
body{margin:0; min-height:100vh; background:var(--bg); color:var(--ink); font-family:'Sora',sans-serif; font-size:.85rem;}
.mono{font-family:'IBM Plex Mono',monospace;}
/* ── login ── */
#login{position:fixed; inset:0; z-index:30; display:flex; align-items:center; justify-content:center; flex-direction:column;
  background:linear-gradient(150deg,#f4f2ec 55%, #e0efe9); padding:1rem;}
#login h1{font-weight:800; font-size:clamp(1.9rem,6vw,2.8rem); margin:0; letter-spacing:-.03em;}
#login h1 span{color:var(--teal);}
#login .sub{color:var(--dim); margin:.4rem 0 1.6rem; font-size:.8rem;}
.role-cards{display:flex; gap:1rem; flex-wrap:wrap; justify-content:center;}
.role-card{width:13rem; background:var(--card); border:1px solid var(--line); border-radius:16px; padding:1.2rem 1rem;
  cursor:pointer; text-align:left; font-family:'Sora',sans-serif; transition:transform .12s, box-shadow .12s;}
.role-card:hover{transform:translateY(-3px); box-shadow:0 10px 24px rgba(20,40,35,.12);}
.role-card:focus-visible{outline:3px solid var(--focus); outline-offset:3px;}
.role-card .av{font-size:1.8rem;}
.role-card .nm{font-weight:800; margin:.4rem 0 .1rem;}
.role-card .rl{font-size:.62rem; letter-spacing:.14em; text-transform:uppercase; font-weight:600;}
.role-card .desc{color:var(--dim); font-size:.68rem; line-height:1.55; margin-top:.5rem;}
.rl.admin{color:var(--red);} .rl.manager{color:var(--teal);} .rl.cashier{color:var(--amber);}
#login .note{margin-top:1.4rem; font-size:.66rem; color:var(--dim); max-width:26rem; text-align:center; line-height:1.6;}
.login-box{width:min(20rem,90vw); background:var(--card); border:1px solid var(--line); border-radius:16px;
  padding:1.1rem 1.2rem 1.3rem; margin-bottom:1.4rem; box-shadow:0 10px 24px rgba(20,40,35,.08);}
.login-box label{display:block; font-size:.62rem; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); margin:.6rem 0 .25rem;}
.login-box input{width:100%;}
#lg-err{min-height:1rem; font-size:.7rem; color:var(--red); font-weight:600; margin:.5rem 0 .4rem;}
.login-box.shake{animation:lgshake .3s;}
@keyframes lgshake{25%{transform:translateX(-7px);}50%{transform:translateX(6px);}75%{transform:translateX(-3px);}}
.role-card .cred{font-size:.64rem; color:var(--teal); margin:.45rem 0 0; background:var(--teal-soft); border-radius:6px; padding:.15rem .4rem; display:inline-block;}
@media (prefers-reduced-motion:reduce){ .login-box.shake{animation:none;} }
/* ── app shell ── */
#app{display:none; min-height:100vh;}
#app.on{display:grid; grid-template-columns:13.5rem 1fr;}
aside{background:#12201d; color:#cfe0d8; padding:1rem .8rem; display:flex; flex-direction:column; gap:.2rem;}
aside .logo{font-weight:800; font-size:1.05rem; color:#fff; padding:.4rem .6rem 1rem; letter-spacing:-.02em;}
aside .logo span{color:#5ecfae;}
aside button.nav{display:flex; gap:.6rem; align-items:center; width:100%; text-align:left; background:none; border:0; color:#cfe0d8;
  font-family:'Sora',sans-serif; font-size:.8rem; padding:.6rem .7rem; border-radius:10px; cursor:pointer; min-height:2.75rem;}
aside button.nav:hover{background:rgba(255,255,255,.07);}
aside button.nav.on{background:var(--teal); color:#fff; font-weight:600;}
aside button.nav:focus-visible{outline:3px solid #8fd4ff; outline-offset:2px;}
aside .spacer{flex:1;}
aside .whoami{font-size:.68rem; padding:.6rem .7rem; border-top:1px solid rgba(255,255,255,.12);}
aside .whoami b{display:block; color:#fff;}
aside button.out{margin:.3rem .4rem 0; font-size:.68rem; background:none; border:1px solid rgba(255,255,255,.25); color:#cfe0d8;
  border-radius:8px; padding:.35rem; cursor:pointer; min-height:2.4rem;}
main{padding:1.2rem 1.4rem 3rem; min-width:0;}
.topbar{display:flex; align-items:center; gap:.8rem; flex-wrap:wrap; margin-bottom:1.1rem;}
.topbar h2{margin:0; font-size:1.25rem; font-weight:800; letter-spacing:-.02em;}
.topbar .grow{flex:1;}
select,input[type=text],input[type=number]{font-family:'Sora',sans-serif; font-size:.8rem; padding:.5rem .6rem; min-height:2.75rem;
  border:1px solid var(--line); border-radius:10px; background:var(--card); color:var(--ink);}
select:focus-visible,input:focus-visible{outline:3px solid var(--focus); outline-offset:1px;}
button.act{font-family:'Sora',sans-serif; font-weight:600; font-size:.78rem; cursor:pointer; min-height:2.75rem;
  padding:.5rem 1rem; border-radius:10px; border:0; background:var(--teal); color:#fff;}
button.act:hover{filter:brightness(1.1);}
button.act.ghost{background:var(--card); color:var(--ink); border:1px solid var(--line);}
button.act.danger{background:var(--red);}
button.act:focus-visible{outline:3px solid var(--focus); outline-offset:2px;}
/* tiles + cards */
.tiles{display:grid; grid-template-columns:repeat(auto-fit,minmax(10rem,1fr)); gap:.8rem; margin-bottom:1rem;}
.tile{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:.9rem 1rem;}
.tile .k{font-size:.62rem; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); font-weight:600;}
.tile .v{font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:1.45rem; margin-top:.2rem;}
.tile .v small{font-size:.7rem; color:var(--dim);}
.tile.warn .v{color:var(--red);}
.card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:1rem; margin-bottom:1rem;}
.card h3{margin:0 0 .7rem; font-size:.9rem; font-weight:800;}
.two-col{display:grid; grid-template-columns:3fr 2fr; gap:1rem;}
canvas.chart{width:100%; height:220px; display:block;}
/* tables */
table{width:100%; border-collapse:collapse; font-size:.78rem;}
th{font-size:.6rem; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); text-align:left; padding:.45rem .6rem; border-bottom:2px solid var(--line);}
td{padding:.55rem .6rem; border-bottom:1px solid var(--line); vertical-align:middle;}
tr:hover td{background:#faf8f2;}
.badge{display:inline-block; font-size:.62rem; font-weight:600; border-radius:99px; padding:.15rem .55rem;}
.badge.low{background:#fbe4de; color:var(--red);}
.badge.ok{background:var(--teal-soft); color:var(--teal);}
.badge.role{background:#eee9dc; color:#6a5a30;}
.badge.pend{background:#fdf0d8; color:#9a6a18;}
#appr-badge{color:#ffd8a0; font-size:.68rem;}
body.compact td{padding:.28rem .5rem;}
body.compact th{padding:.3rem .5rem;}
.p-lbl{display:block; font-size:.62rem; font-weight:600; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); margin:.8rem 0 .25rem;}
.card input[type=text]{width:100%; max-width:24rem;}
.av-pick{font-size:1.1rem;}
.av-pick.sel{border-color:var(--teal); background:var(--teal-soft);}
td .mini{font-size:.62rem; color:var(--dim);}
button.icon{background:none; border:1px solid var(--line); border-radius:8px; cursor:pointer; min-width:2.4rem; min-height:2.4rem; font-size:.85rem;}
button.icon:hover{border-color:var(--teal);}
button.icon:focus-visible{outline:3px solid var(--focus);}
/* POS */
.pos{display:grid; grid-template-columns:1fr 17rem; gap:1rem;}
.pgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(8.5rem,1fr)); gap:.6rem;}
button.pcard{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:.7rem .6rem; cursor:pointer;
  text-align:left; font-family:'Sora',sans-serif; min-height:2.75rem;}
button.pcard:hover{border-color:var(--teal);}
button.pcard:disabled{opacity:.4; cursor:not-allowed;}
button.pcard .pn{font-weight:600; font-size:.76rem;}
button.pcard .pp{font-family:'IBM Plex Mono',monospace; color:var(--teal); margin-top:.2rem;}
button.pcard .ps{font-size:.62rem; color:var(--dim);}
#cart-box{position:sticky; top:1rem; align-self:start;}
#cart-lines{max-height:16rem; overflow:auto; margin:.4rem 0;}
.cline{display:flex; align-items:center; gap:.4rem; padding:.3rem 0; border-bottom:1px dashed var(--line); font-size:.75rem;}
.cline .n{flex:1;}
#cart-total{font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:1.2rem; text-align:right; margin:.5rem 0;}
/* modal + toast */
#modal{position:fixed; inset:0; z-index:40; display:none; align-items:center; justify-content:center; background:rgba(18,32,29,.45);}
#modal.on{display:flex;}
#modal .m-card{background:var(--card); border-radius:16px; padding:1.2rem; width:min(24rem,92vw); box-shadow:0 20px 50px rgba(0,0,0,.25);}
#modal h3{margin:0 0 .8rem;}
#modal label{display:block; font-size:.66rem; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--dim); margin:.6rem 0 .2rem;}
#modal input,#modal select{width:100%;}
#modal .m-row{display:flex; gap:.6rem; justify-content:flex-end; margin-top:1rem;}
#toast{position:fixed; bottom:1rem; left:50%; transform:translateX(-50%); z-index:50; background:#12201d; color:#fff;
  border-radius:10px; padding:.6rem 1.1rem; font-size:.78rem; opacity:0; transition:opacity .25s; pointer-events:none;}
#toast.on{opacity:1;}
@media (max-width:900px){
  #app.on{grid-template-columns:1fr;}
  aside{flex-direction:row; align-items:center; overflow-x:auto; gap:.3rem; position:sticky; top:0; z-index:10;}
  aside .logo{padding:.2rem .4rem; font-size:.9rem;}
  aside .whoami,aside .spacer{display:none;}
  aside button.out{margin:0;}
  .two-col,.pos{grid-template-columns:1fr;}
  #cart-box{position:static;}
}
</style>
</head>
<body>
<div id="login">
  <h1>Stock<span>room</span></h1>
  <p class="sub">inventory · branches · roles · charts — all in your browser</p>
  <form id="login-form" class="login-box" novalidate>
    <label for="lg-user">username</label>
    <input id="lg-user" type="text" autocomplete="username" autocapitalize="none" spellcheck="false">
    <label for="lg-pass">password</label>
    <input id="lg-pass" type="password" autocomplete="current-password">
    <p id="lg-err" role="alert"></p>
    <button class="act" type="submit" style="width:100%;">sign in</button>
  </form>
  <div class="role-cards">
    <button class="role-card" type="button" data-user="u-admin" data-u="ada" data-p="stock123">
      <span class="av" aria-hidden="true">🗝️</span>
      <div class="nm">Ada Okafor</div><div class="rl admin">admin</div>
      <p class="desc">Full control: branches, users, products, all sales, delete rights.</p>
      <p class="cred mono">ada · stock123</p>
    </button>
    <button class="role-card" type="button" data-user="u-manager" data-u="mia" data-p="harbor123">
      <span class="av" aria-hidden="true">📋</span>
      <div class="nm">Mia Reyes</div><div class="rl manager">manager · Harbor</div>
      <p class="desc">Branch view: Harbor stock, restock, dashboard &amp; sales.</p>
      <p class="cred mono">mia · harbor123</p>
    </button>
    <button class="role-card" type="button" data-user="u-cashier" data-u="cash" data-p="till123">
      <span class="av" aria-hidden="true">🧾</span>
      <div class="nm">Cash Novak</div><div class="rl cashier">cashier · Harbor</div>
      <p class="desc">Lands on the POS: ring up sales, read-only stock, own receipts.</p>
      <p class="cred mono">cash · till123</p>
    </button>
  </div>
  <p class="note">Demo suite — data &amp; session live in <b>your</b> browser. Click a card to fill its credentials, then sign in. Each role routes to its own home screen.</p>
</div>

<div id="app">
  <aside aria-label="Navigation">
    <div class="logo">Stock<span>room</span></div>
    <button class="nav" data-page="dash" type="button">📈 Dashboard</button>
    <button class="nav" data-page="products" type="button">🏷 Products</button>
    <button class="nav" data-page="inv" type="button">📦 Inventory</button>
    <button class="nav" data-page="pos" type="button">🧾 New Sale</button>
    <button class="nav" data-page="sales" type="button">🗂 Sales Log</button>
    <button class="nav" data-page="requests" type="button">📮 Restock</button>
    <button class="nav" data-page="approvals" type="button">✅ HQ Approvals <span id="appr-badge"></span></button>
    <button class="nav" data-page="suppliers" type="button">🚚 Suppliers</button>
    <button class="nav" data-page="categories" type="button">🗃 Categories</button>
    <button class="nav" data-page="branches" type="button">🏬 Branches</button>
    <button class="nav" data-page="users" type="button">👥 Users</button>
    <button class="nav" data-page="profile" type="button">⚙ Profile</button>
    <div class="spacer"></div>
    <div class="whoami"><b id="who-name">—</b><span id="who-role">—</span></div>
    <button class="out" id="logout-btn" type="button">log out</button>
    <button class="out" id="reset-btn" type="button">reset demo data</button>
  </aside>
  <main>
    <div class="topbar">
      <h2 id="page-title">Dashboard</h2>
      <div class="grow"></div>
      <label for="branch-sel" style="font-size:.66rem; color:var(--dim); font-weight:600;">BRANCH</label>
      <select id="branch-sel"></select>
    </div>
    <div id="content"></div>
  </main>
</div>

<div id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="m-card">
    <h3 id="modal-title">—</h3>
    <div id="modal-body"></div>
    <div class="m-row">
      <button class="act ghost" id="modal-cancel" type="button">cancel</button>
      <button class="act" id="modal-ok" type="button">save</button>
    </div>
  </div>
</div>
<div id="toast" role="status" aria-live="polite"></div>

<script>
(function(){
"use strict";
var $=function(id){ return document.getElementById(id); };

/* ═══════════ seed & storage ═══════════ */
function mulberry(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; var t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
var KEY='stockroom-v1';
function defaultUsers(){
  return [
    {id:'u-admin', name:'Ada Okafor', email:'ada@stockroom.demo', role:'admin', branch:null, username:'ada', password:'stock123', avatar:'🗝️', prefs:{home:'', compact:false}},
    {id:'u-manager', name:'Mia Reyes', email:'mia@stockroom.demo', role:'manager', branch:'b1', username:'mia', password:'harbor123', avatar:'📋', prefs:{home:'', compact:false}},
    {id:'u-cashier', name:'Cash Novak', email:'cash@stockroom.demo', role:'cashier', branch:'b1', username:'cash', password:'till123', avatar:'🧾', prefs:{home:'', compact:false}}
  ];
}
var USERS=[];   /* bound to DB.users in load() */
var AVATARS=['🗝️','📋','🧾','🦊','🌵','🛼','🫐','🚀'];
var HOME={admin:'dash', manager:'dash', cashier:'pos'};
function authenticate(username,password){
  var u=USERS.find(function(x){ return x.username===String(username||'').trim().toLowerCase(); });
  return (u&&u.password===password)?u:null;
}
var DEFAULT_CATS=['Produce','Bakery','Drinks','Household','Snacks'];
function defaultSuppliers(){
  return [
    {id:'s1', store:'Greenline Wholesale', cell:'+1 555 0142', addr:'14 Dock Road'},
    {id:'s2', store:'Bakers Union Co-op', cell:'+1 555 0198', addr:'3 Mill Street'},
    {id:'s3', store:'Casa Import & Dry Goods', cell:'+1 555 0177', addr:'90 Freight Yard'}
  ];
}
function catNames(){ return DB.categories.map(function(c){ return c.name; }); }
function seed(){
  var r=mulberry(4242);
  var branches=[
    {id:'b1', name:'Harbor', addr:'2 Quay Lane'},
    {id:'b2', name:'Midtown', addr:'118 Elm Ave'},
    {id:'b3', name:'Airport', addr:'Terminal 2'}
  ];
  var names=[['Avocado (each)','Produce',1.8],['Sourdough Loaf','Bakery',4.2],['Cold Brew 330ml','Drinks',3.5],
    ['Bananas 1kg','Produce',1.6],['Croissant','Bakery',2.1],['Sparkling Water','Drinks',1.2],
    ['Dish Soap','Household',2.9],['Paper Towels','Household',3.4],['Tortilla Chips','Snacks',2.5],
    ['Dark Chocolate','Snacks',3.1],['Oat Milk 1L','Drinks',2.4],['Cherry Tomatoes','Produce',2.7],
    ['Bagel 4-pack','Bakery',3.8],['Trail Mix','Snacks',4.5],['Laundry Pods','Household',7.9],
    ['Green Tea 20ct','Drinks',3.2],['Rye Crackers','Snacks',2.2],['Lemons 500g','Produce',1.9]];
  var products=names.map(function(n,i){
    var stock={}, prices={};
    branches.forEach(function(b){ stock[b.id]=Math.floor(r()*40)+4; prices[b.id]=n[2]; });
    return {id:'p'+(i+1), name:n[0], cat:n[1], price:n[2], prices:prices, low:8, stock:stock, supplier:'s'+(i%3+1)};
  });
  var categories=DEFAULT_CATS.map(function(c,i){ return {id:'c'+(i+1), name:c}; });
  /* 14 days of sales history */
  var sales=[], now=Date.now(), day=86400000;
  for(var d=13;d>=0;d--){
    var n=4+Math.floor(r()*9);
    for(var s=0;s<n;s++){
      var br=branches[Math.floor(r()*3)].id;
      var lines=[], total=0, ln=1+Math.floor(r()*3);
      for(var li=0;li<ln;li++){
        var p=products[Math.floor(r()*products.length)];
        var qty=1+Math.floor(r()*3);
        lines.push({pid:p.id, name:p.name, qty:qty, price:p.price});
        total+=qty*p.price;
      }
      sales.push({id:'s'+d+'-'+s, at:now-d*day-Math.floor(r()*8)*3600000, branch:br,
        by:d%3===0?'u-cashier':'u-manager', lines:lines, total:Math.round(total*100)/100});
    }
  }
  /* a couple of restock requests so HQ has something to review */
  var requests=[
    {id:'r-seed1', at:now-3*3600000, pid:products[2].id, name:products[2].name, branch:'b1', qty:24,
     note:'cold brew flying off the shelf', by:'u-cashier', status:'pending', decidedBy:null, decidedAt:null, reason:''},
    {id:'r-seed2', at:now-26*3600000, pid:products[14].id, name:products[14].name, branch:'b2', qty:12,
     note:'', by:'u-manager', status:'pending', decidedBy:null, decidedAt:null, reason:''},
    {id:'r-seed0', at:now-2*86400000, pid:products[7].id, name:products[7].name, branch:'b1', qty:20,
     note:'', by:'u-cashier', status:'approved', decidedBy:'u-admin', decidedAt:now-86400000*1.8, reason:''}
  ];
  return {branches:branches, products:products, sales:sales, requests:requests, users:defaultUsers(),
    categories:categories, suppliers:defaultSuppliers(), seededAt:now};
}
var DB=null;
function load(){
  try{
    var raw=localStorage.getItem(KEY);
    if(raw){
      DB=JSON.parse(raw);
      if(!DB.requests) DB.requests=[];        /* migrate pre-v1.2 saves */
      if(!DB.users) DB.users=defaultUsers();  /* migrate pre-v1.3 saves */
      DB.users.forEach(function(u){ if(!u.prefs) u.prefs={home:'',compact:false}; if(!u.avatar) u.avatar='👤'; if(!u.email) u.email=u.username+'@stockroom.demo'; });
      USERS=DB.users;
      if(!DB.categories){                     /* migrate pre-v1.4: categories from whatever products use */
        var seen={}; DB.products.forEach(function(p){ seen[p.cat]=1; });
        DEFAULT_CATS.forEach(function(c){ seen[c]=1; });
        DB.categories=Object.keys(seen).map(function(c,i){ return {id:'c'+(i+1), name:c}; });
      }
      if(!DB.suppliers){
        DB.suppliers=defaultSuppliers();
        DB.products.forEach(function(p,i){ if(!p.supplier) p.supplier='s'+(i%3+1); });
      }
      DB.products.forEach(function(p){    /* migrate pre-v1.5: per-branch selling prices */
        if(!p.prices){
          p.prices={};
          DB.branches.forEach(function(b){ p.prices[b.id]=p.price; });
        }
      });
      return;
    }
  }catch(e){}
  DB=seed(); USERS=DB.users; save();
}
function save(){ try{ localStorage.setItem(KEY,JSON.stringify(DB)); }catch(e){} }

/* ═══════════ roles & session ═══════════ */
var PERM={
  admin:  {pages:['dash','products','inv','pos','sales','approvals','suppliers','categories','branches','users','profile'], editProducts:true, deleteProducts:true, editBranches:true, allBranches:true, approve:true, request:false, manageUsers:true, manageCatalog:true},
  manager:{pages:['dash','products','inv','pos','sales','requests','profile'], editProducts:true, deleteProducts:false, editBranches:false, allBranches:false, approve:false, request:true, manageUsers:false, manageCatalog:false},

/* ═══════════ aggregates (pure, testable) ═══════════ */
function salesFiltered(){
  var u=me();
  return DB.sales.filter(function(s){
    if(u.role==='cashier') return s.by===u.id||true /* cashier sees own; but simple: own only ↓ */;
    return true;
  }).filter(function(s){
    if(u.role==='cashier') return s.by===u.id;
    if(curBranch!=='all') return s.branch===curBranch;
    return true;
  });
}
function salesByDay(sales,days){
  var out=[], now=new Date(); now.setHours(0,0,0,0);
  for(var d=days-1;d>=0;d--){
    var t0=now.getTime()-d*86400000, t1=t0+86400000, sum=0;
    sales.forEach(function(s){ if(s.at>=t0&&s.at<t1) sum+=s.total; });
    out.push({day:new Date(t0), total:Math.round(sum*100)/100});
  }
  return out;
}
function revenueByBranch(sales){
  var m={};
  DB.branches.forEach(function(b){ m[b.id]=0; });
  sales.forEach(function(s){ m[s.branch]=(m[s.branch]||0)+s.total; });
  return DB.branches.map(function(b){ return {name:b.name, total:Math.round(m[b.id]*100)/100}; });
}
function topProducts(sales,n){
  var m={};
  sales.forEach(function(s){ s.lines.forEach(function(l){ m[l.name]=(m[l.name]||0)+l.qty; }); });
  return Object.keys(m).map(function(k){ return {name:k, qty:m[k]}; })
    .sort(function(a,b){ return b.qty-a.qty; }).slice(0,n||5);
}
function stockOf(p){
  if(curBranch==='all'){ var t=0; DB.branches.forEach(function(b){ t+=p.stock[b.id]||0; }); return t; }
  return p.stock[curBranch]||0;
}
function lowStockCount(){
  return DB.products.filter(function(p){
    if(curBranch==='all') return DB.branches.some(function(b){ return (p.stock[b.id]||0)<=p.low; });
    return stockOf(p)<=p.low;
  }).length;
}

/* ═══════════ charts (hand-drawn) ═══════════ */
function lineChart(cv,data){
  var dpr=Math.min(devicePixelRatio||1,2);
  var w=cv.clientWidth||600, h=220;
  cv.width=w*dpr; cv.height=h*dpr;
  var c=cv.getContext('2d'); c.scale(dpr,dpr);
  var max=Math.max(10,Math.max.apply(null,data.map(function(d){return d.total;})))*1.15;
  var L=42,R=10,T=14,B=26, pw=w-L-R, ph=h-T-B;
  c.clearRect(0,0,w,h);
  c.strokeStyle='#e2ded2'; c.fillStyle='#6e7d78'; c.font='10px IBM Plex Mono'; c.lineWidth=1;
  for(var gy=0;gy<=4;gy++){
    var y=T+ph-ph*gy/4;
    c.beginPath(); c.moveTo(L,y); c.lineTo(w-R,y); c.stroke();
    c.fillText('$'+Math.round(max*gy/4),4,y+3);
  }
  c.strokeStyle='#0e6e5c'; c.lineWidth=2; c.lineJoin='round';
  c.beginPath();
  data.forEach(function(d,i){
    var x=L+pw*i/(data.length-1), y=T+ph-ph*(d.total/max);
    if(i===0) c.moveTo(x,y); else c.lineTo(x,y);
  });
  c.stroke();
  /* soft fill */
  c.lineTo(L+pw,T+ph); c.lineTo(L,T+ph); c.closePath();
  c.fillStyle='rgba(14,110,92,.09)'; c.fill();
  c.fillStyle='#0e6e5c';
  data.forEach(function(d,i){
    var x=L+pw*i/(data.length-1), y=T+ph-ph*(d.total/max);
    c.beginPath(); c.arc(x,y,2.6,0,7); c.fill();
    if(i%2===0){ c.fillStyle='#6e7d78'; c.fillText((d.day.getMonth()+1)+'/'+d.day.getDate(),x-12,h-8); c.fillStyle='#0e6e5c'; }
  });
}
function barChart(cv,data){
  var dpr=Math.min(devicePixelRatio||1,2);
  var w=cv.clientWidth||400, h=220;
  cv.width=w*dpr; cv.height=h*dpr;
  var c=cv.getContext('2d'); c.scale(dpr,dpr);
  var max=Math.max(10,Math.max.apply(null,data.map(function(d){return d.total;})))*1.15;
  var L=42,R=10,T=14,B=30, pw=w-L-R, ph=h-T-B;
  c.clearRect(0,0,w,h);
  c.strokeStyle='#e2ded2'; c.fillStyle='#6e7d78'; c.font='10px IBM Plex Mono';
  for(var gy=0;gy<=4;gy++){
    var y=T+ph-ph*gy/4;
    c.beginPath(); c.moveTo(L,y); c.lineTo(w-R,y); c.stroke();
    c.fillText('$'+Math.round(max*gy/4),4,y+3);
  }
  var bw=Math.min(64,pw/data.length*.55);
  data.forEach(function(d,i){
    var x=L+pw*(i+.5)/data.length-bw/2, bh=ph*(d.total/max);
    c.fillStyle=['#0e6e5c','#e8a13c','#4a7ab8','#a05aa0'][i%4];
    c.fillRect(x,T+ph-bh,bw,bh);
    c.fillStyle='#1c2a28'; c.font='600 11px Sora';
    c.fillText(d.name,x,h-10);
  });
}

/* ── catalog actions (pure, testable) ── */
function supplierName(id){ var s=DB.suppliers.find(function(x){ return x.id===id; }); return s?s.store:'—'; }
function addCategory(name){
  if(!can('manageCatalog')) return {ok:false, err:'admins only'};
  name=String(name||'').trim();
  if(!name) return {ok:false, err:'name required'};
  if(DB.categories.some(function(c){ return c.name.toLowerCase()===name.toLowerCase(); })) return {ok:false, err:'category exists'};
  DB.categories.push({id:'c'+Date.now(), name:name}); save();
  return {ok:true};
}
function renameCategory(id,name){
  if(!can('manageCatalog')) return {ok:false, err:'admins only'};
  var c=DB.categories.find(function(x){ return x.id===id; });
  name=String(name||'').trim();
  if(!c||!name) return {ok:false, err:'bad rename'};
  if(DB.categories.some(function(x){ return x.id!==id&&x.name.toLowerCase()===name.toLowerCase(); })) return {ok:false, err:'category exists'};
  var old=c.name; c.name=name;
  DB.products.forEach(function(p){ if(p.cat===old) p.cat=name; });   /* propagate */
  save();
  return {ok:true};
}
function deleteCategory(id){
  if(!can('manageCatalog')) return {ok:false, err:'admins only'};
  var c=DB.categories.find(function(x){ return x.id===id; });
  if(!c) return {ok:false, err:'no such category'};
  var used=DB.products.filter(function(p){ return p.cat===c.name; }).length;
  if(used) return {ok:false, err:used+' product(s) still use “'+c.name+'”'};
  DB.categories=DB.categories.filter(function(x){ return x.id!==id; }); save();
  return {ok:true};
}
function addSupplier(d){
  if(!can('manageCatalog')) return {ok:false, err:'admins only'};
  var store=String(d.store||'').trim();
  if(!store) return {ok:false, err:'store name required'};
  if(!/^[+()0-9 .-]{7,}$/.test(String(d.cell||''))) return {ok:false, err:'cell phone looks wrong'};
  var s={id:'s'+Date.now(), store:store, cell:String(d.cell).trim(), addr:String(d.addr||'').trim()};
  DB.suppliers.push(s); save();
  return {ok:true, supplier:s};
}
function updateSupplier(id,d){
  if(!can('manageCatalog')) return {ok:false, err:'admins only'};
  var s=DB.suppliers.find(function(x){ return x.id===id; });
  if(!s) return {ok:false, err:'no such supplier'};
  if(d.store!==undefined){ var st=String(d.store).trim(); if(!st) return {ok:false, err:'store name required'}; s.store=st; }
  if(d.cell!==undefined){ if(!/^[+()0-9 .-]{7,}$/.test(String(d.cell))) return {ok:false, err:'cell phone looks wrong'}; s.cell=String(d.cell).trim(); }
  if(d.addr!==undefined) s.addr=String(d.addr).trim();
  save();
  return {ok:true};
}
function deleteSupplier(id){
  if(!can('manageCatalog')) return {ok:false, err:'admins only'};
  var used=DB.products.filter(function(p){ return p.supplier===id; }).length;
  if(used) return {ok:false, err:used+' product(s) still sourced from this supplier'};
  DB.suppliers=DB.suppliers.filter(function(x){ return x.id!==id; }); save();
  return {ok:true};
}
function setLow(pid,val){
  if(!can('editProducts')) return {ok:false, err:'no permission'};
  var p=DB.products.find(function(x){ return x.id===pid; });
  if(!p) return {ok:false, err:'no such product'};
  p.low=Math.max(0,Math.floor(+val||0)); save();
  return {ok:true};
}
/* per-branch selling price — the price the POS actually charges */
function priceAt(p,branch){
  if(p.prices&&typeof p.prices[branch]==='number') return p.prices[branch];
  return p.price;
}
function setPrice(pid,branch,val){
  if(!can('editProducts')) return {ok:false, err:'no permission'};
  var p=DB.products.find(function(x){ return x.id===pid; });
  if(!p) return {ok:false, err:'no such product'};
  var v=Math.max(0,Math.round((+val||0)*100)/100);
  if(!p.prices) p.prices={};
  p.prices[branch]=v; save();
  return {ok:true, price:v};
}
function priceRange(p){
  var vals=DB.branches.map(function(b){ return priceAt(p,b.id); });
  var mn=Math.min.apply(null,vals), mx=Math.max.apply(null,vals);
  return mn===mx?('$'+mn.toFixed(2)):('$'+mn.toFixed(2)+'–$'+mx.toFixed(2));
}
/* create-or-merge: same product name = combine quantities, never duplicate rows */
function createProduct(d){
  if(!can('editProducts')) return {ok:false, err:'no permission'};
  var name=String(d.name||'').trim();
  if(!name) return {ok:false, err:'name required'};
  var qtys=d.qtys||{};
  var existing=DB.products.find(function(p){ return p.name.toLowerCase()===name.toLowerCase(); });
  if(existing){
    DB.branches.forEach(function(b){
      var q=Math.max(0,Math.floor(+qtys[b.id]||0));
      existing.stock[b.id]=(existing.stock[b.id]||0)+q;
    });
    save();
    return {ok:true, merged:true, product:existing};
  }
  var base=Math.max(0,parseFloat(d.price)||0);
  var stock={}, prices={};
  DB.branches.forEach(function(b){
    stock[b.id]=Math.max(0,Math.floor(+qtys[b.id]||0));
    prices[b.id]=base;
  });
  var p={id:'p'+Date.now(), name:name, cat:d.cat||catNames()[0], price:base, prices:prices, low:8, stock:stock, supplier:d.supplier||DB.suppliers[0].id};
  DB.products.push(p); save();
  return {ok:true, merged:false, product:p};
}

    });

  function drawCart(){
    $('cart-lines').innerHTML=cart.length?cart.map(function(c,i){
      return '<div class="cline"><span class="n">'+esc(c.name)+'</span><span class="mono">×'+c.qty+'</span>'+

    }).join(''):'<p style="color:var(--dim);font-size:.72rem;">tap products to add</p>';
    $('cart-total').textContent='$'+cartTotal().toFixed(2);
    $('cart-lines').querySelectorAll('[data-rm]').forEach(function(b){

        drawGrid(); drawCart();
      });
    });
  }

    var r=checkout(posBranch);
    if(r.ok){ toast('sale recorded — $'+r.total.toFixed(2)); drawGrid(); drawCart(); }
    else toast(r.err);
  });

function addToCart(pid,branch){
  var p=DB.products.find(function(x){ return x.id===pid; });
  var st=p.stock[branch]||0;
  var line=cart.find(function(c){ return c.pid===pid; });
  var have=line?line.qty:0;
  if(have+1>st) return false;
  if(line) line.qty++;
  else cart.push({pid:pid, name:p.name, qty:1, price:priceAt(p,branch)});
  return true;
}
function cartTotal(){ return Math.round(cart.reduce(function(a,c){ return a+c.qty*c.price; },0)*100)/100; }
function checkout(branch){
  if(!cart.length) return {ok:false, err:'cart is empty'};
  /* validate stock */
  for(var i=0;i<cart.length;i++){
    var p=DB.products.find(function(x){ return x.id===cart[i].pid; });
    if((p.stock[branch]||0)<cart[i].qty) return {ok:false, err:'not enough '+p.name};
  }
  cart.forEach(function(c){
    var p=DB.products.find(function(x){ return x.id===c.pid; });
    p.stock[branch]-=c.qty;
  });
  var total=cartTotal();
  DB.sales.push({id:'s'+Date.now()+'-'+Math.floor(Math.random()*999), at:Date.now(), branch:branch,
    by:session, lines:cart.slice(), total:total});
  cart=[];
  save();
  return {ok:true, total:total};
}

/* ── restock requests (cashier + manager) ── */
function createRequest(pid,qty,note){
  if(!PERM[me().role].request) return {ok:false, err:'your role cannot file requests'};
  qty=Math.floor(+qty||0);
  if(qty<1) return {ok:false, err:'quantity must be at least 1'};
  var p=DB.products.find(function(x){ return x.id===pid; });
  if(!p) return {ok:false, err:'pick a product'};
  var br=myBranch();
  var dup=DB.requests.find(function(r){ return r.status==='pending'&&r.pid===pid&&r.branch===br; });
  if(dup) return {ok:false, err:'already a pending request for '+p.name};
  DB.requests.push({id:'r'+Date.now()+'-'+Math.floor(Math.random()*999), at:Date.now(), pid:pid, name:p.name,
    branch:br, qty:qty, note:String(note||'').slice(0,120), by:session, status:'pending', decidedBy:null, decidedAt:null, reason:''});
  save(); updateApprBadge();
  return {ok:true};
}
function decideRequest(id,approve,reason){
  if(!PERM[me().role].approve) return {ok:false, err:'admins only'};
  var r=DB.requests.find(function(x){ return x.id===id; });
  if(!r||r.status!=='pending') return {ok:false, err:'request not pending'};
  r.status=approve?'approved':'denied';
  r.decidedBy=session; r.decidedAt=Date.now(); r.reason=String(reason||'').slice(0,120);
  if(approve){
    var p=DB.products.find(function(x){ return x.id===r.pid; });
    if(p) p.stock[r.branch]=(p.stock[r.branch]||0)+r.qty;
  }
  save(); updateApprBadge();
  return {ok:true};
}
function fmtWhen(t){
  var d=new Date(t);
  return (d.getMonth()+1)+'/'+d.getDate()+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');
}

/* ── user management (admin) ── */
function validEmail(e){ return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(String(e||'')); }
function adminCount(){ return USERS.filter(function(u){ return u.role==='admin'; }).length; }
function addUser(data){
  if(!PERM[me().role].manageUsers) return {ok:false, err:'admins only'};
  var name=String(data.name||'').trim(), uname=String(data.username||'').trim().toLowerCase();
  if(!name) return {ok:false, err:'name required'};
  if(!/^[a-z0-9_.-]{2,20}$/.test(uname)) return {ok:false, err:'username: 2–20 chars, letters/numbers/._-'};
  if(USERS.some(function(u){ return u.username===uname; })) return {ok:false, err:'username taken'};
  if(!validEmail(data.email)) return {ok:false, err:'enter a (dummy) email like name@store.demo'};
  if(!data.password||data.password.length<4) return {ok:false, err:'password: 4+ characters'};
  var role=['admin','manager','cashier'].indexOf(data.role)>=0?data.role:'cashier';
  var u={id:'u'+Date.now()+'-'+Math.floor(Math.random()*999), name:name, email:String(data.email).trim(),
    username:uname, password:data.password, role:role,
    branch:role==='admin'?null:(data.branch||DB.branches[0].id),
    avatar:data.avatar||'👤', prefs:{home:'',compact:false}};
  USERS.push(u); save();
  return {ok:true, user:u};
}
function updateUser(id,patch){
  var u=USERS.find(function(x){ return x.id===id; });
  if(!u) return {ok:false, err:'no such user'};
  var isSelf=id===session;
  if(!isSelf&&!PERM[me().role].manageUsers) return {ok:false, err:'admins only'};
  if(patch.username!==undefined){
    var un=String(patch.username).trim().toLowerCase();
    if(!/^[a-z0-9_.-]{2,20}$/.test(un)) return {ok:false, err:'bad username'};
    if(USERS.some(function(x){ return x.username===un&&x.id!==id; })) return {ok:false, err:'username taken'};
    u.username=un;
  }
  if(patch.name!==undefined){ var nm=String(patch.name).trim(); if(!nm) return {ok:false, err:'name required'}; u.name=nm; }
  if(patch.email!==undefined){ if(!validEmail(patch.email)) return {ok:false, err:'bad email'}; u.email=String(patch.email).trim(); }
  if(patch.password!==undefined&&patch.password!==''){ if(patch.password.length<4) return {ok:false, err:'password: 4+ chars'}; u.password=patch.password; }
  if(patch.avatar!==undefined) u.avatar=patch.avatar;
  if(patch.prefs!==undefined) u.prefs=Object.assign(u.prefs||{},patch.prefs);
  save();
  return {ok:true};
}
function setRole(id,role,branch){
  if(!PERM[me().role].manageUsers) return {ok:false, err:'admins only'};
  var u=USERS.find(function(x){ return x.id===id; });
  if(!u) return {ok:false, err:'no such user'};
  if(u.role==='admin'&&role!=='admin'&&adminCount()<=1) return {ok:false, err:'cannot demote the last admin'};
  u.role=role;
  u.branch=role==='admin'?null:(branch||u.branch||DB.branches[0].id);
  save();
  return {ok:true};
}
function deleteUser(id){
  if(!PERM[me().role].manageUsers) return {ok:false, err:'admins only'};
  if(id===session) return {ok:false, err:'you cannot delete yourself'};
  var u=USERS.find(function(x){ return x.id===id; });
  if(!u) return {ok:false, err:'no such user'};
  if(u.role==='admin'&&adminCount()<=1) return {ok:false, err:'cannot delete the last admin'};
  DB.users=DB.users.filter(function(x){ return x.id!==id; });
  USERS=DB.users; save();
  return {ok:true};
}
function renderUsers(C){
  if(!PERM[me().role].manageUsers){ C.innerHTML='<div class="card">admin only.</div>'; return; }
  C.innerHTML='<div class="card"><div class="topbar" style="margin-bottom:.6rem;">'+
   '<p style="font-size:.7rem;color:var(--dim);margin:0;">dummy-email accounts — every user here can log in at the gate</p>'+
   '<div class="grow"></div><button class="act" id="add-user" type="button">+ user</button></div>'+
   '<table><thead><tr><th>user</th><th>email</th><th>username</th><th>role</th><th>branch</th><th>actions</th></tr></thead><tbody>'+
   USERS.map(function(u){
     var self=u.id===session;
     var roleSel='<select data-role="'+u.id+'" aria-label="Role for '+esc(u.name)+'">'+
       ['admin','manager','cashier'].map(function(r){ return '<option'+(u.role===r?' selected':'')+'>'+r+'</option>'; }).join('')+'</select>';
     var brSel=u.role==='admin'?'<span class="mini">all branches</span>':
       '<select data-ub="'+u.id+'" aria-label="Branch for '+esc(u.name)+'">'+DB.branches.map(function(b){
         return '<option value="'+b.id+'"'+(u.branch===b.id?' selected':'')+'>'+esc(b.name)+'</option>'; }).join('')+'</select>';
     return '<tr><td>'+(u.avatar||'👤')+' <b>'+esc(u.name)+'</b>'+(self?' <span class="mini">(you)</span>':'')+'</td>'+
       '<td class="mini">'+esc(u.email)+'</td><td class="mono">'+esc(u.username)+'</td>'+
       '<td>'+roleSel+'</td><td>'+brSel+'</td>'+
       '<td><button class="icon" data-eu="'+u.id+'" aria-label="Edit '+esc(u.name)+'">✏️</button> '+
       '<button class="icon" data-du="'+u.id+'" aria-label="Delete '+esc(u.name)+'" '+(self?'disabled':'')+'>🗑</button></td></tr>';
   }).join('')+'</tbody></table></div>';
  $('add-user').addEventListener('click',function(){ userModal(null); });
  C.querySelectorAll('[data-role]').forEach(function(s){
    s.addEventListener('change',function(){
      var r=setRole(s.dataset.role,s.value);
      if(r.ok){ toast('role updated'); go('users'); } else { toast(r.err); go('users'); }
    });
  });
  C.querySelectorAll('[data-ub]').forEach(function(s){
    s.addEventListener('change',function(){
      var u=USERS.find(function(x){ return x.id===s.dataset.ub; });
      u.branch=s.value; save(); toast(u.name.split(' ')[0]+' → '+branchName(s.value));
    });
  });
  C.querySelectorAll('[data-eu]').forEach(function(b){ b.addEventListener('click',function(){ userModal(b.dataset.eu); }); });
  C.querySelectorAll('[data-du]').forEach(function(b){
    b.addEventListener('click',function(){
      var u=USERS.find(function(x){ return x.id===b.dataset.du; });
      openModal('Delete '+u.name+'?','<p style="font-size:.78rem;">Their sales history keeps their name. This cannot be undone.</p>',
        function(){
          var r=deleteUser(b.dataset.du);
          if(r.ok){ toast('user deleted'); go('users'); } else toast(r.err);
        });
      $('modal-ok').textContent='delete';
    });
  });
}
function userModal(uid){
  var u=uid?USERS.find(function(x){ return x.id===uid; }):null;
  openModal(u?'Edit user':'New user',
    '<label for="mu-name">full name</label><input id="mu-name" type="text" value="'+(u?esc(u.name):'')+'">'+
    '<label for="mu-email">email (dummy)</label><input id="mu-email" type="text" value="'+(u?esc(u.email):'')+'" placeholder="name@store.demo">'+
    '<label for="mu-uname">username</label><input id="mu-uname" type="text" value="'+(u?esc(u.username):'')+'">'+
    '<label for="mu-pass">'+(u?'new password (blank = keep)':'password')+'</label><input id="mu-pass" type="text" value="">'+
    (u?'':'<label for="mu-role">role</label><select id="mu-role"><option>cashier</option><option>manager</option><option>admin</option></select>'+
    '<label for="mu-br">branch</label><select id="mu-br">'+DB.branches.map(function(b){ return '<option value="'+b.id+'">'+esc(b.name)+'</option>'; }).join('')+'</select>'),
    function(){
      var r;
      if(u) r=updateUser(u.id,{name:$('mu-name').value, email:$('mu-email').value, username:$('mu-uname').value, password:$('mu-pass').value});
      else r=addUser({name:$('mu-name').value, email:$('mu-email').value, username:$('mu-uname').value,
        password:$('mu-pass').value, role:$('mu-role').value, branch:$('mu-br').value});
      if(!r.ok){ toast(r.err); return false; }
      toast(u?'user updated':'user added — they can log in now');
      go('users');
    });
}
/* ── profile settings (every role) ── */
function renderProfile(C){
  var u=me();
  C.innerHTML='<div class="card" style="max-width:30rem;"><h3>'+(u.avatar||'👤')+' '+esc(u.name)+' <span class="badge role">'+u.role+'</span></h3>'+
   '<label class="p-lbl" for="pf-name">display name</label><input id="pf-name" type="text" value="'+esc(u.name)+'">'+
   '<label class="p-lbl" for="pf-email">email (dummy)</label><input id="pf-email" type="text" value="'+esc(u.email)+'">'+
   '<label class="p-lbl" for="pf-pass">new password <span class="mini">(blank = keep current)</span></label><input id="pf-pass" type="text" value="">'+
   '<label class="p-lbl">avatar</label><div id="pf-avatars" role="radiogroup" aria-label="Avatar">'+
     AVATARS.map(function(a){ return '<button type="button" class="icon av-pick'+(u.avatar===a?' sel':'')+'" data-av="'+a+'" role="radio" aria-checked="'+(u.avatar===a)+'">'+a+'</button>'; }).join(' ')+'</div>'+
   '<label class="p-lbl" for="pf-home">landing page after login</label><select id="pf-home">'+
     '<option value="">role default</option>'+
     PERM[u.role].pages.filter(function(p){ return p!=='profile'; }).map(function(p){
       return '<option value="'+p+'"'+((u.prefs&&u.prefs.home)===p?' selected':'')+'>'+PAGES[p]+'</option>'; }).join('')+'</select>'+
   '<label class="p-lbl" style="display:flex;align-items:center;gap:.5rem;cursor:pointer;margin-top:.8rem;">'+
     '<input id="pf-compact" type="checkbox" style="min-height:1.1rem;width:1.1rem;" '+((u.prefs&&u.prefs.compact)?'checked':'')+'> compact tables</label>'+
   '<div style="margin-top:1rem;"><button class="act" id="pf-save" type="button">save profile</button></div>'+
   '<p class="mini" style="margin-top:.8rem;">username: <b class="mono">'+esc(u.username)+'</b> — changeable by an admin on the Users panel.</p></div>';
  var picked=u.avatar;
  C.querySelectorAll('.av-pick').forEach(function(b){
    b.addEventListener('click',function(){
      picked=b.dataset.av;
      C.querySelectorAll('.av-pick').forEach(function(x){ x.classList.toggle('sel',x===b); x.setAttribute('aria-checked',x===b?'true':'false'); });
    });
  });
  $('pf-save').addEventListener('click',function(){
    var r=updateUser(u.id,{name:$('pf-name').value, email:$('pf-email').value, password:$('pf-pass').value,
      avatar:picked, prefs:{home:$('pf-home').value, compact:$('pf-compact').checked}});
    if(!r.ok){ toast(r.err); return; }
    document.body.classList.toggle('compact',$('pf-compact').checked);
    $('who-name').textContent=picked+' '+$('pf-name').value.trim();
    toast('profile saved');
    go('profile');
  });
}

/* ═══════════ modals ═══════════ */
var modalOK=null;
function openModal(title,bodyHTML,onOK){
  $('modal-ok').textContent='save';
  $('modal-title').textContent=title;
  $('modal-body').innerHTML=bodyHTML;
  $('modal').classList.add('on');
  modalOK=onOK;
  var f=$('modal-body').querySelector('input,select'); if(f) f.focus();
}
$('modal-cancel').addEventListener('click',function(){ $('modal').classList.remove('on'); });
$('modal-ok').addEventListener('click',function(){ if(modalOK&&modalOK()!==false){ $('modal').classList.remove('on'); } });
addEventListener('keydown',function(e){ if(e.key==='Escape') $('modal').classList.remove('on'); });
function productModal(pid){
  var p=pid?DB.products.find(function(x){ return x.id===pid; }):null;
  openModal(p?'Edit product':'New product',
    '<label for="m-name">name</label><input id="m-name" type="text" value="'+(p?esc(p.name):'')+'">'+
    '<label for="m-cat">category</label><select id="m-cat">'+catNames().map(function(c){ return '<option'+(p&&p.cat===c?' selected':'')+'>'+esc(c)+'</option>'; }).join('')+'</select>'+
    '<label for="m-price">base price ($) <span class="mini">— selling price per branch lives on Inventory</span></label>'+
    '<input id="m-price" type="number" step="0.1" min="0" value="'+(p?p.price:'2.00')+'" '+(p?'disabled':'')+'>'+
    '<label for="m-sup">supplier</label><select id="m-sup">'+DB.suppliers.map(function(s){ return '<option value="'+s.id+'"'+(p&&p.supplier===s.id?' selected':'')+'>'+esc(s.store)+'</option>'; }).join('')+'</select>'+
    (p?'':'<label>initial quantity per branch</label>'+DB.branches.map(function(b){
      return '<div style="display:flex;align-items:center;gap:.5rem;margin:.25rem 0;"><span style="width:7rem;font-size:.72rem;">'+esc(b.name)+'</span>'+
        '<input id="m-q-'+b.id+'" type="number" min="0" value="0" style="width:6rem;" aria-label="Initial quantity at '+esc(b.name)+'"></div>'; }).join('')+
      '<p class="mini" style="margin:.4rem 0 0;">same name as an existing product? quantities get combined into it instead of duplicating.</p>'),
    function(){
      var name=$('m-name').value.trim(); if(!name){ toast('name required'); return false; }
      if(p){
        p.name=name; p.cat=$('m-cat').value; p.supplier=$('m-sup').value;
        save(); go('products'); toast('product updated');
      }else{
        var qtys={};
        DB.branches.forEach(function(b){ qtys[b.id]=$('m-q-'+b.id).value; });
        var r=createProduct({name:name, cat:$('m-cat').value, price:$('m-price').value, supplier:$('m-sup').value, qtys:qtys});
        if(!r.ok){ toast(r.err); return false; }
        go('products');
        toast(r.merged?'existing product — quantities combined':'product added');
      }
    });
}
/* price-only editor: every branch's selling price for one product, one modal */
function priceModal(pid){
  var p=DB.products.find(function(x){ return x.id===pid; });
  if(!p||!can('editProducts')) return;
  openModal('Prices — '+p.name,
    DB.branches.map(function(b){
      return '<label for="mp-'+b.id+'">'+esc(b.name)+'</label>'+
        '<input id="mp-'+b.id+'" type="number" min="0" step="0.1" value="'+priceAt(p,b.id).toFixed(2)+'">';
    }).join('')+
    '<p class="mini" style="margin-top:.5rem;">these are the prices the POS charges at each branch.</p>',
    function(){
      var bad=false;
      DB.branches.forEach(function(b){
        var r=setPrice(pid,b.id,$('mp-'+b.id).value);
        if(!r.ok) bad=true;
      });
      if(bad){ toast('some prices not saved'); return false; }
      toast('prices updated'); go(curPage);
    });
}
function restockModal(pid){
  var p=DB.products.find(function(x){ return x.id===pid; });
  var br=can('allBranches')?(curBranch==='all'?DB.branches[0].id:curBranch):myBranch();
  openModal('Restock — '+p.name,
    '<label for="m-br">branch</label><select id="m-br" '+(can('allBranches')?'':'disabled')+'>'+
      DB.branches.map(function(b){ return '<option value="'+b.id+'"'+(b.id===br?' selected':'')+'>'+esc(b.name)+' (has '+(p.stock[b.id]||0)+')</option>'; }).join('')+'</select>'+
    '<label for="m-qty">add units</label><input id="m-qty" type="number" min="1" value="12">',
    function(){
      var q=Math.max(1,parseInt($('m-qty').value,10)||0);
      var bid=$('m-br').value;
      p.stock[bid]=(p.stock[bid]||0)+q;
      save(); go('inv'); toast('+'+q+' '+p.name+' @ '+branchName(bid));
    });
}
function branchModal(bid){
  var b=bid?DB.branches.find(function(x){ return x.id===bid; }):null;
  openModal(b?'Edit branch':'New branch',
    '<label for="m-bname">name</label><input id="m-bname" type="text" value="'+(b?esc(b.name):'')+'">'+
    '<label for="m-baddr">address</label><input id="m-baddr" type="text" value="'+(b?esc(b.addr):'')+'">',
    function(){
      var name=$('m-bname').value.trim(); if(!name){ toast('name required'); return false; }
      if(b){ b.name=name; b.addr=$('m-baddr').value.trim(); }
      else{
        var nb={id:'b'+Date.now(), name:name, addr:$('m-baddr').value.trim()};
        DB.branches.push(nb);
        DB.products.forEach(function(p){ p.stock[nb.id]=0; });
      }
      save(); buildBranchSel(); go('branches'); toast('branch saved');
    });
}
function delProduct(pid){
  if(!can('deleteProducts')) return;
  var p=DB.products.find(function(x){ return x.id===pid; });
  openModal('Delete '+p.name+'?','<p style="font-size:.78rem;">This removes the product everywhere. Sales history keeps its name.</p>',
    function(){
      DB.products=DB.products.filter(function(x){ return x.id!==pid; });
      save(); go('products'); toast('deleted');
    });
  $('modal-ok').textContent='delete';
}
$('modal-cancel').addEventListener('click',function(){ $('modal-ok').textContent='save'; });

var toastT=null;
function toast(msg){
  var t=$('toast'); t.textContent=msg; t.classList.add('on');
  clearTimeout(toastT); toastT=setTimeout(function(){ t.classList.remove('on'); },2200);
}

load();
/* resume session across refreshes */
(function(){
  try{
    var s=localStorage.getItem('stockroom-session');
    if(s&&USERS.some(function(u){ return u.id===s; })) login(s);
  }catch(e){}
})();

/* debug hook */
window.__stk={
  db:function(){ return DB; }, seed:seed, login:login, logout:logout, me:function(){ return me(); },
  authenticate:authenticate, home:HOME, page:function(){ return curPage; },
  can:can, perm:PERM, go:go,
  setBranch:function(b){ curBranch=b; },
  addToCart:addToCart, cartTotal:cartTotal, checkout:checkout, cartRef:function(){ return cart; },
  salesByDay:salesByDay, revenueByBranch:revenueByBranch, topProducts:topProducts,
  lowStockCount:lowStockCount, stockOf:stockOf,
  createRequest:createRequest, decideRequest:decideRequest,
  requests:function(){ return DB.requests; }, pendingCount:pendingCount,
  users:function(){ return USERS; }, addUser:addUser, updateUser:updateUser, deleteUser:deleteUser, setRole:setRole,
  addCategory:addCategory, renameCategory:renameCategory, deleteCategory:deleteCategory,
  addSupplier:addSupplier, updateSupplier:updateSupplier, deleteSupplier:deleteSupplier, setLow:setLow,
  createProduct:createProduct, priceAt:priceAt, setPrice:setPrice, priceRange:priceRange
};
})();
</script>
