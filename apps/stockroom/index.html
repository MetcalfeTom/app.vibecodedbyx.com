<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stockroom — inventory suite with roles, branches & sales charts</title>
<meta name="description" content="A clean inventory management demo: admin, manager and cashier roles, multi-branch stock, a POS screen, and hand-drawn sales charts. Runs entirely in your browser.">
<link rel="icon" href="https://emojicdn.elk.sh/📦">
<meta property="og:title" content="Stockroom — inventory suite">
<meta property="og:description" content="Admin, manager & cashier roles · branches · POS · sales charts. Clean vanilla-JS inventory demo.">
<meta property="og:url" content="https://sloppy.live/stockroom">
<meta property="og:image" content="https://image.pollinations.ai/prompt/clean%20modern%20inventory%20dashboard%20UI%20on%20a%20laptop%2C%20teal%20and%20cream%2C%20sales%20line%20chart%2C%20neat%20product%20table%2C%20minimal%20design%2C%20soft%20light?width=1200&height=630&seed=9090&nologo=true&model=flux&image=.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;800&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
:root{ --bg:#f4f2ec; --card:#ffffff; --ink:#1c2a28; --dim:#6e7d78; --line:#e2ded2;
  --teal:#0e6e5c; --teal-soft:#e0efe9; --amber:#e8a13c; --red:#c4442e; --focus:#1446c8; }
*{box-sizing:border-box;}
html{font-size:100%;}
body{margin:0; min-height:100vh; background:var(--bg); color:var(--ink); font-family:'Sora',sans-serif; font-size:.85rem;}
.mono{font-family:'IBM Plex Mono',monospace;}
/* ── login ── */
#login{position:fixed; inset:0; z-index:30; display:flex; align-items:center; justify-content:center; flex-direction:column;
  background:linear-gradient(150deg,#f4f2ec 55%, #e0efe9); padding:1rem;}
#login h1{font-weight:800; font-size:clamp(1.9rem,6vw,2.8rem); margin:0; letter-spacing:-.03em;}
#login h1 span{color:var(--teal);}
#login .sub{color:var(--dim); margin:.4rem 0 1.6rem; font-size:.8rem;}
.role-cards{display:flex; gap:1rem; flex-wrap:wrap; justify-content:center;}
.role-card{width:13rem; background:var(--card); border:1px solid var(--line); border-radius:16px; padding:1.2rem 1rem;
  cursor:pointer; text-align:left; font-family:'Sora',sans-serif; transition:transform .12s, box-shadow .12s;}
.role-card:hover{transform:translateY(-3px); box-shadow:0 10px 24px rgba(20,40,35,.12);}
.role-card:focus-visible{outline:3px solid var(--focus); outline-offset:3px;}
.role-card .av{font-size:1.8rem;}
.role-card .nm{font-weight:800; margin:.4rem 0 .1rem;}
.role-card .rl{font-size:.62rem; letter-spacing:.14em; text-transform:uppercase; font-weight:600;}
.role-card .desc{color:var(--dim); font-size:.68rem; line-height:1.55; margin-top:.5rem;}
.rl.admin{color:var(--red);} .rl.manager{color:var(--teal);} .rl.cashier{color:var(--amber);}
#login .note{margin-top:1.4rem; font-size:.66rem; color:var(--dim); max-width:26rem; text-align:center; line-height:1.6;}
.login-box{width:min(20rem,90vw); background:var(--card); border:1px solid var(--line); border-radius:16px;
  padding:1.1rem 1.2rem 1.3rem; margin-bottom:1.4rem; box-shadow:0 10px 24px rgba(20,40,35,.08);}
.login-box label{display:block; font-size:.62rem; font-weight:600; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); margin:.6rem 0 .25rem;}
.login-box input{width:100%;}
#lg-err{min-height:1rem; font-size:.7rem; color:var(--red); font-weight:600; margin:.5rem 0 .4rem;}
.login-box.shake{animation:lgshake .3s;}
@keyframes lgshake{25%{transform:translateX(-7px);}50%{transform:translateX(6px);}75%{transform:translateX(-3px);}}
.role-card .cred{font-size:.64rem; color:var(--teal); margin:.45rem 0 0; background:var(--teal-soft); border-radius:6px; padding:.15rem .4rem; display:inline-block;}
@media (prefers-reduced-motion:reduce){ .login-box.shake{animation:none;} }
/* ── app shell ── */
#app{display:none; min-height:100vh;}
#app.on{display:grid; grid-template-columns:13.5rem 1fr;}
aside{background:#12201d; color:#cfe0d8; padding:1rem .8rem; display:flex; flex-direction:column; gap:.2rem;}
aside .logo{font-weight:800; font-size:1.05rem; color:#fff; padding:.4rem .6rem 1rem; letter-spacing:-.02em;}
aside .logo span{color:#5ecfae;}
aside button.nav{display:flex; gap:.6rem; align-items:center; width:100%; text-align:left; background:none; border:0; color:#cfe0d8;
  font-family:'Sora',sans-serif; font-size:.8rem; padding:.6rem .7rem; border-radius:10px; cursor:pointer; min-height:2.75rem;}
aside button.nav:hover{background:rgba(255,255,255,.07);}
aside button.nav.on{background:var(--teal); color:#fff; font-weight:600;}
aside button.nav:focus-visible{outline:3px solid #8fd4ff; outline-offset:2px;}
aside .spacer{flex:1;}
aside .whoami{font-size:.68rem; padding:.6rem .7rem; border-top:1px solid rgba(255,255,255,.12);}
aside .whoami b{display:block; color:#fff;}
aside button.out{margin:.3rem .4rem 0; font-size:.68rem; background:none; border:1px solid rgba(255,255,255,.25); color:#cfe0d8;
  border-radius:8px; padding:.35rem; cursor:pointer; min-height:2.4rem;}
main{padding:1.2rem 1.4rem 3rem; min-width:0;}
.topbar{display:flex; align-items:center; gap:.8rem; flex-wrap:wrap; margin-bottom:1.1rem;}
.topbar h2{margin:0; font-size:1.25rem; font-weight:800; letter-spacing:-.02em;}
.topbar .grow{flex:1;}
select,input[type=text],input[type=number]{font-family:'Sora',sans-serif; font-size:.8rem; padding:.5rem .6rem; min-height:2.75rem;
  border:1px solid var(--line); border-radius:10px; background:var(--card); color:var(--ink);}
select:focus-visible,input:focus-visible{outline:3px solid var(--focus); outline-offset:1px;}
button.act{font-family:'Sora',sans-serif; font-weight:600; font-size:.78rem; cursor:pointer; min-height:2.75rem;
  padding:.5rem 1rem; border-radius:10px; border:0; background:var(--teal); color:#fff;}
button.act:hover{filter:brightness(1.1);}
button.act.ghost{background:var(--card); color:var(--ink); border:1px solid var(--line);}
button.act.danger{background:var(--red);}
button.act:focus-visible{outline:3px solid var(--focus); outline-offset:2px;}
/* tiles + cards */
.tiles{display:grid; grid-template-columns:repeat(auto-fit,minmax(10rem,1fr)); gap:.8rem; margin-bottom:1rem;}
.tile{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:.9rem 1rem;}
.tile .k{font-size:.62rem; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); font-weight:600;}
.tile .v{font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:1.45rem; margin-top:.2rem;}
.tile .v small{font-size:.7rem; color:var(--dim);}
.tile.warn .v{color:var(--red);}
.card{background:var(--card); border:1px solid var(--line); border-radius:14px; padding:1rem; margin-bottom:1rem;}
.card h3{margin:0 0 .7rem; font-size:.9rem; font-weight:800;}
.two-col{display:grid; grid-template-columns:3fr 2fr; gap:1rem;}
canvas.chart{width:100%; height:220px; display:block;}
/* tables */
table{width:100%; border-collapse:collapse; font-size:.78rem;}
th{font-size:.6rem; letter-spacing:.12em; text-transform:uppercase; color:var(--dim); text-align:left; padding:.45rem .6rem; border-bottom:2px solid var(--line);}
td{padding:.55rem .6rem; border-bottom:1px solid var(--line); vertical-align:middle;}
tr:hover td{background:#faf8f2;}
.badge{display:inline-block; font-size:.62rem; font-weight:600; border-radius:99px; padding:.15rem .55rem;}
.badge.low{background:#fbe4de; color:var(--red);}
.badge.ok{background:var(--teal-soft); color:var(--teal);}
.badge.role{background:#eee9dc; color:#6a5a30;}
td .mini{font-size:.62rem; color:var(--dim);}
button.icon{background:none; border:1px solid var(--line); border-radius:8px; cursor:pointer; min-width:2.4rem; min-height:2.4rem; font-size:.85rem;}
button.icon:hover{border-color:var(--teal);}
button.icon:focus-visible{outline:3px solid var(--focus);}
/* POS */
.pos{display:grid; grid-template-columns:1fr 17rem; gap:1rem;}
.pgrid{display:grid; grid-template-columns:repeat(auto-fill,minmax(8.5rem,1fr)); gap:.6rem;}
button.pcard{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:.7rem .6rem; cursor:pointer;
  text-align:left; font-family:'Sora',sans-serif; min-height:2.75rem;}
button.pcard:hover{border-color:var(--teal);}
button.pcard:disabled{opacity:.4; cursor:not-allowed;}
button.pcard .pn{font-weight:600; font-size:.76rem;}
button.pcard .pp{font-family:'IBM Plex Mono',monospace; color:var(--teal); margin-top:.2rem;}
button.pcard .ps{font-size:.62rem; color:var(--dim);}
#cart-box{position:sticky; top:1rem; align-self:start;}
#cart-lines{max-height:16rem; overflow:auto; margin:.4rem 0;}
.cline{display:flex; align-items:center; gap:.4rem; padding:.3rem 0; border-bottom:1px dashed var(--line); font-size:.75rem;}
.cline .n{flex:1;}
#cart-total{font-family:'IBM Plex Mono',monospace; font-weight:600; font-size:1.2rem; text-align:right; margin:.5rem 0;}
/* modal + toast */
#modal{position:fixed; inset:0; z-index:40; display:none; align-items:center; justify-content:center; background:rgba(18,32,29,.45);}
#modal.on{display:flex;}
#modal .m-card{background:var(--card); border-radius:16px; padding:1.2rem; width:min(24rem,92vw); box-shadow:0 20px 50px rgba(0,0,0,.25);}
#modal h3{margin:0 0 .8rem;}
#modal label{display:block; font-size:.66rem; font-weight:600; letter-spacing:.08em; text-transform:uppercase; color:var(--dim); margin:.6rem 0 .2rem;}
#modal input,#modal select{width:100%;}
#modal .m-row{display:flex; gap:.6rem; justify-content:flex-end; margin-top:1rem;}
#toast{position:fixed; bottom:1rem; left:50%; transform:translateX(-50%); z-index:50; background:#12201d; color:#fff;
  border-radius:10px; padding:.6rem 1.1rem; font-size:.78rem; opacity:0; transition:opacity .25s; pointer-events:none;}
#toast.on{opacity:1;}
@media (max-width:900px){
  #app.on{grid-template-columns:1fr;}
  aside{flex-direction:row; align-items:center; overflow-x:auto; gap:.3rem; position:sticky; top:0; z-index:10;}
  aside .logo{padding:.2rem .4rem; font-size:.9rem;}
  aside .whoami,aside .spacer{display:none;}
  aside button.out{margin:0;}
  .two-col,.pos{grid-template-columns:1fr;}
  #cart-box{position:static;}
}
</style>
</head>
<body>
<div id="login">
  <h1>Stock<span>room</span></h1>
  <p class="sub">inventory · branches · roles · charts — all in your browser</p>
  <form id="login-form" class="login-box" novalidate>
    <label for="lg-user">username</label>
    <input id="lg-user" type="text" autocomplete="username" autocapitalize="none" spellcheck="false">
    <label for="lg-pass">password</label>
    <input id="lg-pass" type="password" autocomplete="current-password">
    <p id="lg-err" role="alert"></p>
    <button class="act" type="submit" style="width:100%;">sign in</button>
  </form>
  <div class="role-cards">
    <button class="role-card" type="button" data-user="u-admin" data-u="ada" data-p="stock123">
      <span class="av" aria-hidden="true">🗝️</span>
      <div class="nm">Ada Okafor</div><div class="rl admin">admin</div>
      <p class="desc">Full control: branches, users, products, all sales, delete rights.</p>
      <p class="cred mono">ada · stock123</p>
    </button>
    <button class="role-card" type="button" data-user="u-manager" data-u="mia" data-p="harbor123">
      <span class="av" aria-hidden="true">📋</span>
      <div class="nm">Mia Reyes</div><div class="rl manager">manager · Harbor</div>
      <p class="desc">Branch view: Harbor stock, restock, dashboard &amp; sales.</p>
      <p class="cred mono">mia · harbor123</p>
    </button>
    <button class="role-card" type="button" data-user="u-cashier" data-u="cash" data-p="till123">
      <span class="av" aria-hidden="true">🧾</span>
      <div class="nm">Cash Novak</div><div class="rl cashier">cashier · Harbor</div>
      <p class="desc">Lands on the POS: ring up sales, read-only stock, own receipts.</p>
      <p class="cred mono">cash · till123</p>
    </button>
  </div>
  <p class="note">Demo suite — data &amp; session live in <b>your</b> browser. Click a card to fill its credentials, then sign in. Each role routes to its own home screen.</p>
</div>

<div id="app">
  <aside aria-label="Navigation">
    <div class="logo">Stock<span>room</span></div>
    <button class="nav" data-page="dash" type="button">📈 Dashboard</button>
    <button class="nav" data-page="inv" type="button">📦 Inventory</button>
    <button class="nav" data-page="pos" type="button">🧾 New Sale</button>
    <button class="nav" data-page="sales" type="button">🗂 Sales Log</button>
    <button class="nav" data-page="branches" type="button">🏬 Branches</button>
    <button class="nav" data-page="users" type="button">👥 Users</button>
    <div class="spacer"></div>
    <div class="whoami"><b id="who-name">—</b><span id="who-role">—</span></div>
    <button class="out" id="logout-btn" type="button">log out</button>
    <button class="out" id="reset-btn" type="button">reset demo data</button>
  </aside>
  <main>
    <div class="topbar">
      <h2 id="page-title">Dashboard</h2>
      <div class="grow"></div>
      <label for="branch-sel" style="font-size:.66rem; color:var(--dim); font-weight:600;">BRANCH</label>
      <select id="branch-sel"></select>
    </div>
    <div id="content"></div>
  </main>
</div>

<div id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
  <div class="m-card">
    <h3 id="modal-title">—</h3>
    <div id="modal-body"></div>
    <div class="m-row">
      <button class="act ghost" id="modal-cancel" type="button">cancel</button>
      <button class="act" id="modal-ok" type="button">save</button>
    </div>
  </div>
</div>
<div id="toast" role="status" aria-live="polite"></div>

<script>
(function(){
"use strict";
var $=function(id){ return document.getElementById(id); };

/* ═══════════ seed & storage ═══════════ */
function mulberry(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; var t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
var KEY='stockroom-v1';
var USERS=[
  {id:'u-admin', name:'Ada Okafor', role:'admin', branch:null, username:'ada', password:'stock123'},
  {id:'u-manager', name:'Mia Reyes', role:'manager', branch:'b1', username:'mia', password:'harbor123'},
  {id:'u-cashier', name:'Cash Novak', role:'cashier', branch:'b1', username:'cash', password:'till123'}
];
var HOME={admin:'dash', manager:'dash', cashier:'pos'};
function authenticate(username,password){
  var u=USERS.find(function(x){ return x.username===String(username||'').trim().toLowerCase(); });
  return (u&&u.password===password)?u:null;
}
var CATS=['Produce','Bakery','Drinks','Household','Snacks'];
function seed(){
  var r=mulberry(4242);
  var branches=[
    {id:'b1', name:'Harbor', addr:'2 Quay Lane'},
    {id:'b2', name:'Midtown', addr:'118 Elm Ave'},
    {id:'b3', name:'Airport', addr:'Terminal 2'}
  ];
  var names=[['Avocado (each)','Produce',1.8],['Sourdough Loaf','Bakery',4.2],['Cold Brew 330ml','Drinks',3.5],
    ['Bananas 1kg','Produce',1.6],['Croissant','Bakery',2.1],['Sparkling Water','Drinks',1.2],
    ['Dish Soap','Household',2.9],['Paper Towels','Household',3.4],['Tortilla Chips','Snacks',2.5],
    ['Dark Chocolate','Snacks',3.1],['Oat Milk 1L','Drinks',2.4],['Cherry Tomatoes','Produce',2.7],
    ['Bagel 4-pack','Bakery',3.8],['Trail Mix','Snacks',4.5],['Laundry Pods','Household',7.9],
    ['Green Tea 20ct','Drinks',3.2],['Rye Crackers','Snacks',2.2],['Lemons 500g','Produce',1.9]];
  var products=names.map(function(n,i){
    var stock={};
    branches.forEach(function(b){ stock[b.id]=Math.floor(r()*40)+4; });
    return {id:'p'+(i+1), name:n[0], cat:n[1], price:n[2], low:8, stock:stock};
  });
  /* 14 days of sales history */
  var sales=[], now=Date.now(), day=86400000;
  for(var d=13;d>=0;d--){
    var n=4+Math.floor(r()*9);
    for(var s=0;s<n;s++){
      var br=branches[Math.floor(r()*3)].id;
      var lines=[], total=0, ln=1+Math.floor(r()*3);
      for(var li=0;li<ln;li++){
        var p=products[Math.floor(r()*products.length)];
        var qty=1+Math.floor(r()*3);
        lines.push({pid:p.id, name:p.name, qty:qty, price:p.price});
        total+=qty*p.price;
      }
      sales.push({id:'s'+d+'-'+s, at:now-d*day-Math.floor(r()*8)*3600000, branch:br,
        by:d%3===0?'u-cashier':'u-manager', lines:lines, total:Math.round(total*100)/100});
    }
  }
  return {branches:branches, products:products, sales:sales, seededAt:now};
}
var DB=null;
function load(){
  try{
    var raw=localStorage.getItem(KEY);
    if(raw){ DB=JSON.parse(raw); return; }
  }catch(e){}
  DB=seed(); save();
}
function save(){ try{ localStorage.setItem(KEY,JSON.stringify(DB)); }catch(e){} }

/* ═══════════ roles & session ═══════════ */
var PERM={
  admin:  {pages:['dash','inv','pos','sales','branches','users'], editProducts:true, deleteProducts:true, editBranches:true, allBranches:true},
  manager:{pages:['dash','inv','pos','sales'], editProducts:true, deleteProducts:false, editBranches:false, allBranches:false},
  cashier:{pages:['inv','pos','sales'], editProducts:false, deleteProducts:false, editBranches:false, allBranches:false}
};
var session=null;   /* {userId} */
function me(){ return USERS.find(function(u){ return u.id===session; }); }
function can(what){ return !!PERM[me().role][what]; }
function myBranch(){ var u=me(); return u.branch||DB.branches[0].id; }
var curBranch=null;   /* current filter (admin can choose 'all') */
function login(uid){
  session=uid;
  var u=me();
  curBranch=can('allBranches')?'all':u.branch;
  try{ localStorage.setItem('stockroom-session',uid); }catch(e){}
  $('login').style.display='none';
  $('app').classList.add('on');
  $('who-name').textContent=u.name;
  $('who-role').textContent=u.role+(u.branch?' · '+branchName(u.branch):'');
  buildNav(); buildBranchSel();
  go(HOME[u.role]||PERM[u.role].pages[0]);
}
function logout(){
  session=null;
  try{ localStorage.removeItem('stockroom-session'); }catch(e){}
  $('app').classList.remove('on');
  $('login').style.display='flex';
  $('lg-user').value=''; $('lg-pass').value=''; $('lg-err').textContent='';
  $('lg-user').focus();
}
function branchName(id){ var b=DB.branches.find(function(x){return x.id===id;}); return b?b.name:id; }

/* ═══════════ nav / router ═══════════ */
var PAGES={dash:'Dashboard', inv:'Inventory', pos:'New Sale', sales:'Sales Log', branches:'Branches', users:'Users'};
var curPage='dash';
function buildNav(){
  var pages=PERM[me().role].pages;
  document.querySelectorAll('aside .nav').forEach(function(b){
    b.style.display=pages.indexOf(b.dataset.page)>=0?'':'none';
  });
}
function buildBranchSel(){
  var sel=$('branch-sel'); sel.innerHTML='';
  if(can('allBranches')){
    var oa=document.createElement('option'); oa.value='all'; oa.textContent='All branches'; sel.appendChild(oa);
  }
  DB.branches.forEach(function(b){
    var o=document.createElement('option'); o.value=b.id; o.textContent=b.name; sel.appendChild(o);
  });
  sel.value=curBranch;
  sel.disabled=!can('allBranches');
}
$('branch-sel').addEventListener('change',function(){ curBranch=this.value; go(curPage); });
document.querySelectorAll('aside .nav').forEach(function(b){
  b.addEventListener('click',function(){ go(b.dataset.page); });
});
$('logout-btn').addEventListener('click',logout);
$('login-form').addEventListener('submit',function(e){
  e.preventDefault();
  var u=authenticate($('lg-user').value,$('lg-pass').value);
  if(u){ $('lg-err').textContent=''; login(u.id); toast('welcome, '+u.name.split(' ')[0]); }
  else{
    $('lg-err').textContent='wrong username or password — the demo cards below have the keys';
    var box=document.querySelector('.login-box');
    box.classList.remove('shake'); void box.offsetWidth; box.classList.add('shake');
  }
});
$('reset-btn').addEventListener('click',function(){
  DB=seed(); save(); toast('demo data reseeded');
  if(session) go(curPage);
});
document.querySelectorAll('.role-card').forEach(function(c){
  c.addEventListener('click',function(){
    $('lg-user').value=c.dataset.u; $('lg-pass').value=c.dataset.p;
    $('lg-err').textContent='';
    $('lg-pass').focus();
  });
});
function go(page){
  curPage=page;
  $('page-title').textContent=PAGES[page];
  document.querySelectorAll('aside .nav').forEach(function(b){ b.classList.toggle('on',b.dataset.page===page); });
  var C=$('content'); C.innerHTML='';
  ({dash:renderDash, inv:renderInv, pos:renderPOS, sales:renderSales, branches:renderBranches, users:renderUsers})[page](C);
}

/* ═══════════ aggregates (pure, testable) ═══════════ */
function salesFiltered(){
  var u=me();
  return DB.sales.filter(function(s){
    if(u.role==='cashier') return s.by===u.id||true /* cashier sees own; but simple: own only ↓ */;
    return true;
  }).filter(function(s){
    if(u.role==='cashier') return s.by===u.id;
    if(curBranch!=='all') return s.branch===curBranch;
    return true;
  });
}
function salesByDay(sales,days){
  var out=[], now=new Date(); now.setHours(0,0,0,0);
  for(var d=days-1;d>=0;d--){
    var t0=now.getTime()-d*86400000, t1=t0+86400000, sum=0;
    sales.forEach(function(s){ if(s.at>=t0&&s.at<t1) sum+=s.total; });
    out.push({day:new Date(t0), total:Math.round(sum*100)/100});
  }
  return out;
}
function revenueByBranch(sales){
  var m={};
  DB.branches.forEach(function(b){ m[b.id]=0; });
  sales.forEach(function(s){ m[s.branch]=(m[s.branch]||0)+s.total; });
  return DB.branches.map(function(b){ return {name:b.name, total:Math.round(m[b.id]*100)/100}; });
}
function topProducts(sales,n){
  var m={};
  sales.forEach(function(s){ s.lines.forEach(function(l){ m[l.name]=(m[l.name]||0)+l.qty; }); });
  return Object.keys(m).map(function(k){ return {name:k, qty:m[k]}; })
    .sort(function(a,b){ return b.qty-a.qty; }).slice(0,n||5);
}
function stockOf(p){
  if(curBranch==='all'){ var t=0; DB.branches.forEach(function(b){ t+=p.stock[b.id]||0; }); return t; }
  return p.stock[curBranch]||0;
}
function lowStockCount(){
  return DB.products.filter(function(p){
    if(curBranch==='all') return DB.branches.some(function(b){ return (p.stock[b.id]||0)<=p.low; });
    return stockOf(p)<=p.low;
  }).length;
}

/* ═══════════ charts (hand-drawn) ═══════════ */
function lineChart(cv,data){
  var dpr=Math.min(devicePixelRatio||1,2);
  var w=cv.clientWidth||600, h=220;
  cv.width=w*dpr; cv.height=h*dpr;
  var c=cv.getContext('2d'); c.scale(dpr,dpr);
  var max=Math.max(10,Math.max.apply(null,data.map(function(d){return d.total;})))*1.15;
  var L=42,R=10,T=14,B=26, pw=w-L-R, ph=h-T-B;
  c.clearRect(0,0,w,h);
  c.strokeStyle='#e2ded2'; c.fillStyle='#6e7d78'; c.font='10px IBM Plex Mono'; c.lineWidth=1;
  for(var gy=0;gy<=4;gy++){
    var y=T+ph-ph*gy/4;
    c.beginPath(); c.moveTo(L,y); c.lineTo(w-R,y); c.stroke();
    c.fillText('$'+Math.round(max*gy/4),4,y+3);
  }
  c.strokeStyle='#0e6e5c'; c.lineWidth=2; c.lineJoin='round';
  c.beginPath();
  data.forEach(function(d,i){
    var x=L+pw*i/(data.length-1), y=T+ph-ph*(d.total/max);
    if(i===0) c.moveTo(x,y); else c.lineTo(x,y);
  });
  c.stroke();
  /* soft fill */
  c.lineTo(L+pw,T+ph); c.lineTo(L,T+ph); c.closePath();
  c.fillStyle='rgba(14,110,92,.09)'; c.fill();
  c.fillStyle='#0e6e5c';
  data.forEach(function(d,i){
    var x=L+pw*i/(data.length-1), y=T+ph-ph*(d.total/max);
    c.beginPath(); c.arc(x,y,2.6,0,7); c.fill();
    if(i%2===0){ c.fillStyle='#6e7d78'; c.fillText((d.day.getMonth()+1)+'/'+d.day.getDate(),x-12,h-8); c.fillStyle='#0e6e5c'; }
  });
}
function barChart(cv,data){
  var dpr=Math.min(devicePixelRatio||1,2);
  var w=cv.clientWidth||400, h=220;
  cv.width=w*dpr; cv.height=h*dpr;
  var c=cv.getContext('2d'); c.scale(dpr,dpr);
  var max=Math.max(10,Math.max.apply(null,data.map(function(d){return d.total;})))*1.15;
  var L=42,R=10,T=14,B=30, pw=w-L-R, ph=h-T-B;
  c.clearRect(0,0,w,h);
  c.strokeStyle='#e2ded2'; c.fillStyle='#6e7d78'; c.font='10px IBM Plex Mono';
  for(var gy=0;gy<=4;gy++){
    var y=T+ph-ph*gy/4;
    c.beginPath(); c.moveTo(L,y); c.lineTo(w-R,y); c.stroke();
    c.fillText('$'+Math.round(max*gy/4),4,y+3);
  }
  var bw=Math.min(64,pw/data.length*.55);
  data.forEach(function(d,i){
    var x=L+pw*(i+.5)/data.length-bw/2, bh=ph*(d.total/max);
    c.fillStyle=['#0e6e5c','#e8a13c','#4a7ab8','#a05aa0'][i%4];
    c.fillRect(x,T+ph-bh,bw,bh);
    c.fillStyle='#1c2a28'; c.font='600 11px Sora';
    c.fillText(d.name,x,h-10);
  });
}

function tile(k,v){ return '<div class="tile"><div class="k">'+k+'</div><div class="v">'+v+'</div></div>'; }
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

var cart=[];
function renderPOS(C){
  var posBranch=can('allBranches')?(curBranch==='all'?DB.branches[0].id:curBranch):myBranch();
  cart=[];
  C.innerHTML='<p style="font-size:.72rem;color:var(--dim);margin:0 0 .7rem;">ringing up at <b>'+esc(branchName(posBranch))+'</b></p>'+
   '<div class="pos"><div class="pgrid" id="pos-grid"></div>'+
   '<div class="card" id="cart-box"><h3>Cart</h3><div id="cart-lines"></div>'+
   '<div id="cart-total">$0.00</div>'+
   '<button class="act" id="checkout-btn" type="button" style="width:100%;">charge</button></div></div>';
  function drawGrid(){
    $('pos-grid').innerHTML=DB.products.map(function(p){
      var st=p.stock[posBranch]||0;
      var inCart=cart.filter(function(c){ return c.pid===p.id; }).reduce(function(a,c){ return a+c.qty; },0);
      return '<button class="pcard" data-pid="'+p.id+'" '+(st-inCart<=0?'disabled':'')+'>'+
        '<div class="pn">'+esc(p.name)+'</div><div class="pp">$'+p.price.toFixed(2)+'</div>'+
        '<div class="ps">'+(st-inCart)+' left</div></button>';
    }).join('');
    $('pos-grid').querySelectorAll('[data-pid]').forEach(function(b){
      b.addEventListener('click',function(){ addToCart(b.dataset.pid,posBranch); drawGrid(); drawCart(); });
    });
  }
  function drawCart(){
    $('cart-lines').innerHTML=cart.length?cart.map(function(c,i){
      return '<div class="cline"><span class="n">'+esc(c.name)+'</span><span class="mono">×'+c.qty+'</span>'+
        '<span class="mono">$'+(c.qty*c.price).toFixed(2)+'</span>'+
        '<button class="icon" data-rm="'+i+'" aria-label="Remove one '+esc(c.name)+'">−</button></div>';
    }).join(''):'<p style="color:var(--dim);font-size:.72rem;">tap products to add</p>';
    $('cart-total').textContent='$'+cartTotal().toFixed(2);
    $('cart-lines').querySelectorAll('[data-rm]').forEach(function(b){
      b.addEventListener('click',function(){
        var i=+b.dataset.rm;
        cart[i].qty--; if(cart[i].qty<=0) cart.splice(i,1);
        drawGrid(); drawCart();
      });
    });
  }
  $('checkout-btn').addEventListener('click',function(){
    var r=checkout(posBranch);
    if(r.ok){ toast('sale recorded — $'+r.total.toFixed(2)); drawGrid(); drawCart(); }
    else toast(r.err);
  });
  drawGrid(); drawCart();
}
function addToCart(pid,branch){
  var p=DB.products.find(function(x){ return x.id===pid; });
  var st=p.stock[branch]||0;
  var line=cart.find(function(c){ return c.pid===pid; });
  var have=line?line.qty:0;
  if(have+1>st) return false;
  if(line) line.qty++;
  else cart.push({pid:pid, name:p.name, qty:1, price:p.price});
  return true;
}
function cartTotal(){ return Math.round(cart.reduce(function(a,c){ return a+c.qty*c.price; },0)*100)/100; }
function checkout(branch){
  if(!cart.length) return {ok:false, err:'cart is empty'};
  /* validate stock */
  for(var i=0;i<cart.length;i++){
    var p=DB.products.find(function(x){ return x.id===cart[i].pid; });
    if((p.stock[branch]||0)<cart[i].qty) return {ok:false, err:'not enough '+p.name};
  }
  cart.forEach(function(c){
    var p=DB.products.find(function(x){ return x.id===c.pid; });
    p.stock[branch]-=c.qty;
  });
  var total=cartTotal();
  DB.sales.push({id:'s'+Date.now()+'-'+Math.floor(Math.random()*999), at:Date.now(), branch:branch,
    by:session, lines:cart.slice(), total:total});
  cart=[];
  save();
  return {ok:true, total:total};
}

}

/* ═══════════ modals ═══════════ */
var modalOK=null;
function openModal(title,bodyHTML,onOK){
  $('modal-ok').textContent='save';
  $('modal-title').textContent=title;
  $('modal-body').innerHTML=bodyHTML;
  $('modal').classList.add('on');
  modalOK=onOK;
  var f=$('modal-body').querySelector('input,select'); if(f) f.focus();
}
$('modal-cancel').addEventListener('click',function(){ $('modal').classList.remove('on'); });
$('modal-ok').addEventListener('click',function(){ if(modalOK&&modalOK()!==false){ $('modal').classList.remove('on'); } });
addEventListener('keydown',function(e){ if(e.key==='Escape') $('modal').classList.remove('on'); });
function productModal(pid){
  var p=pid?DB.products.find(function(x){ return x.id===pid; }):null;
  openModal(p?'Edit product':'New product',
    '<label for="m-name">name</label><input id="m-name" type="text" value="'+(p?esc(p.name):'')+'">'+
    '<label for="m-cat">category</label><select id="m-cat">'+CATS.map(function(c){ return '<option'+(p&&p.cat===c?' selected':'')+'>'+c+'</option>'; }).join('')+'</select>'+
    '<label for="m-price">price ($)</label><input id="m-price" type="number" step="0.1" min="0" value="'+(p?p.price:'2.00')+'">'+
    '<label for="m-low">low-stock threshold</label><input id="m-low" type="number" min="0" value="'+(p?p.low:8)+'">',
    function(){
      var name=$('m-name').value.trim(); if(!name){ toast('name required'); return false; }
      var price=Math.max(0,parseFloat($('m-price').value)||0);
      var low=Math.max(0,parseInt($('m-low').value,10)||0);
      if(p){ p.name=name; p.cat=$('m-cat').value; p.price=price; p.low=low; }
      else{
        var stock={}; DB.branches.forEach(function(b){ stock[b.id]=0; });
        DB.products.push({id:'p'+Date.now(), name:name, cat:$('m-cat').value, price:price, low:low, stock:stock});
      }
      save(); go('inv'); toast(p?'product updated':'product added');
    });
}
function restockModal(pid){
  var p=DB.products.find(function(x){ return x.id===pid; });
  var br=can('allBranches')?(curBranch==='all'?DB.branches[0].id:curBranch):myBranch();
  openModal('Restock — '+p.name,
    '<label for="m-br">branch</label><select id="m-br" '+(can('allBranches')?'':'disabled')+'>'+
      DB.branches.map(function(b){ return '<option value="'+b.id+'"'+(b.id===br?' selected':'')+'>'+esc(b.name)+' (has '+(p.stock[b.id]||0)+')</option>'; }).join('')+'</select>'+
    '<label for="m-qty">add units</label><input id="m-qty" type="number" min="1" value="12">',
    function(){
      var q=Math.max(1,parseInt($('m-qty').value,10)||0);
      var bid=$('m-br').value;
      p.stock[bid]=(p.stock[bid]||0)+q;
      save(); go('inv'); toast('+'+q+' '+p.name+' @ '+branchName(bid));
    });
}
function branchModal(bid){
  var b=bid?DB.branches.find(function(x){ return x.id===bid; }):null;
  openModal(b?'Edit branch':'New branch',
    '<label for="m-bname">name</label><input id="m-bname" type="text" value="'+(b?esc(b.name):'')+'">'+
    '<label for="m-baddr">address</label><input id="m-baddr" type="text" value="'+(b?esc(b.addr):'')+'">',
    function(){
      var name=$('m-bname').value.trim(); if(!name){ toast('name required'); return false; }
      if(b){ b.name=name; b.addr=$('m-baddr').value.trim(); }
      else{
        var nb={id:'b'+Date.now(), name:name, addr:$('m-baddr').value.trim()};
        DB.branches.push(nb);
        DB.products.forEach(function(p){ p.stock[nb.id]=0; });
      }
      save(); buildBranchSel(); go('branches'); toast('branch saved');
    });
}
function delProduct(pid){
  if(!can('deleteProducts')) return;
  var p=DB.products.find(function(x){ return x.id===pid; });
  openModal('Delete '+p.name+'?','<p style="font-size:.78rem;">This removes the product everywhere. Sales history keeps its name.</p>',
    function(){
      DB.products=DB.products.filter(function(x){ return x.id!==pid; });
      save(); go('inv'); toast('deleted');
    });
  $('modal-ok').textContent='delete';
}
$('modal-cancel').addEventListener('click',function(){ $('modal-ok').textContent='save'; });

var toastT=null;
function toast(msg){
  var t=$('toast'); t.textContent=msg; t.classList.add('on');
  clearTimeout(toastT); toastT=setTimeout(function(){ t.classList.remove('on'); },2200);
}

load();

  try{
    var s=localStorage.getItem('stockroom-session');
    if(s&&USERS.some(function(u){ return u.id===s; })) login(s);

};
