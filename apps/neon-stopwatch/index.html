<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Stopwatch</title>
<link rel="icon" href="https://emojicdn.elk.sh/⏱️">
<meta property="og:title" content="Neon Stopwatch">
<meta property="og:description" content="A clean neon stopwatch. Start. Stop. Lap. That's it.">
<meta property="og:url" content="https://app.sloppy.live/neon-stopwatch/">
<meta property="og:image" content="https://emojicdn.elk.sh/⏱️?style=google">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
:root{--cyan:#00ffe0;--magenta:#ff0080;--bg:#08080f;--card:#0e0e18;--dim:#2a2a3a}
html,body{height:100%;overflow:hidden}
body{
background:var(--bg);
font-family:'JetBrains Mono',monospace;
display:flex;flex-direction:column;
align-items:center;justify-content:center;
color:#fff;
}
body::before{
content:'';position:fixed;inset:0;pointer-events:none;
background:radial-gradient(ellipse at 50% 40%,rgba(0,255,224,0.04),transparent 60%);
}
.time{
font-size:clamp(48px,14vw,88px);
font-weight:700;
color:var(--cyan);
text-shadow:0 0 20px rgba(0,255,224,0.5),0 0 50px rgba(0,255,224,0.2);
letter-spacing:2px;
margin-bottom:4px;
transition:color 0.15s,text-shadow 0.15s;
}
.time.running{
animation:pulse 1s ease infinite;
}
@keyframes pulse{0%,100%{text-shadow:0 0 20px rgba(0,255,224,0.5),0 0 50px rgba(0,255,224,0.2)}50%{text-shadow:0 0 30px rgba(0,255,224,0.7),0 0 60px rgba(0,255,224,0.3)}}
.ms{
font-size:clamp(20px,5vw,32px);
color:rgba(0,255,224,0.4);
letter-spacing:1px;
margin-bottom:24px;
}
.buttons{
display:flex;gap:12px;
margin-bottom:24px;
}
.btn{
width:clamp(80px,22vw,100px);
height:clamp(80px,22vw,100px);
border-radius:50%;
border:2px solid;
background:transparent;
font-family:'JetBrains Mono',monospace;
font-size:12px;font-weight:700;
letter-spacing:2px;
cursor:pointer;
transition:all 0.15s;
display:flex;align-items:center;justify-content:center;
}
.btn:active{transform:scale(0.93)}
#btn-start{
border-color:var(--cyan);color:var(--cyan);
box-shadow:0 0 15px rgba(0,255,224,0.15),inset 0 0 15px rgba(0,255,224,0.05);
}
#btn-start:hover{box-shadow:0 0 25px rgba(0,255,224,0.25),inset 0 0 20px rgba(0,255,224,0.08)}
#btn-start.stop{
border-color:var(--magenta);color:var(--magenta);
box-shadow:0 0 15px rgba(255,0,128,0.15),inset 0 0 15px rgba(255,0,128,0.05);
}
#btn-start.stop:hover{box-shadow:0 0 25px rgba(255,0,128,0.25),inset 0 0 20px rgba(255,0,128,0.08)}
#btn-lap{
border-color:var(--dim);color:#555;
}
#btn-lap.active{
border-color:rgba(0,255,224,0.3);color:rgba(0,255,224,0.5);
box-shadow:0 0 10px rgba(0,255,224,0.08);
}
#btn-lap.active:hover{box-shadow:0 0 18px rgba(0,255,224,0.15)}
.laps{
width:min(360px,90vw);
max-height:35vh;
overflow-y:auto;
scrollbar-width:thin;
scrollbar-color:#1a1a28 transparent;
}
.laps::-webkit-scrollbar{width:4px}
.laps::-webkit-scrollbar-thumb{background:#1a1a28;border-radius:2px}
.lap-item{
display:flex;justify-content:space-between;
padding:8px 14px;
border-bottom:1px solid #111118;
font-size:12px;
animation:fade-in 0.2s ease;
}
@keyframes fade-in{from{opacity:0;transform:translateY(-4px)}to{opacity:1;transform:translateY(0)}}
.lap-item .lap-num{color:#333;width:50px}
.lap-item .lap-split{color:rgba(0,255,224,0.6)}
.lap-item .lap-time{color:rgba(0,255,224,0.35);width:100px;text-align:right}
.lap-item.best .lap-split{color:var(--cyan);text-shadow:0 0 6px rgba(0,255,224,0.3)}
.lap-item.worst .lap-split{color:var(--magenta)}
.back-link{
position:fixed;bottom:8px;left:50%;transform:translateX(-50%);
font-size:8px;color:#1a1a28;text-decoration:none;letter-spacing:2px;
}
.back-link:hover{color:#333}
</style>
</head>
<body>
<div class="time" id="time">00:00</div>
<div class="ms" id="ms">.000</div>
<div class="buttons">
<button class="btn" id="btn-lap" onclick="lapReset()">LAP</button>
<button class="btn" id="btn-start" onclick="startStop()">START</button>
</div>
<div class="laps" id="laps"></div>
<a href="https://sloppy.live" class="back-link" target="_blank">sloppy.live</a>
<script>
let running=false,startTime=0,elapsed=0,lapStart=0;
let laps=[],rafId=null;
const timeEl=document.getElementById('time');
const msEl=document.getElementById('ms');
const startBtn=document.getElementById('btn-start');
const lapBtn=document.getElementById('btn-lap');
const lapsEl=document.getElementById('laps');
let audioCtx;

function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function beep(freq,dur){
  initAudio();const t=audioCtx.currentTime;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type='triangle';o.frequency.value=freq;
  g.gain.setValueAtTime(0.04,t);g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+dur);
}

function fmt(ms){
  const totalSec=Math.floor(ms/1000);
  const min=Math.floor(totalSec/60);
  const sec=totalSec%60;
  const millis=ms%1000;
  return{
    main:String(min).padStart(2,'0')+':'+String(sec).padStart(2,'0'),
    ms:'.'+String(millis).padStart(3,'0'),
  };
}

function tick(){
  const now=performance.now();
  const total=elapsed+(now-startTime);
  const f=fmt(Math.floor(total));
  timeEl.textContent=f.main;
  msEl.textContent=f.ms;
  rafId=requestAnimationFrame(tick);
}

function startStop(){
  if(!running){
    // Start
    running=true;
    startTime=performance.now();
    if(elapsed===0)lapStart=0;
    tick();
    startBtn.textContent='STOP';
    startBtn.classList.add('stop');
    timeEl.classList.add('running');
    lapBtn.classList.add('active');
    lapBtn.textContent='LAP';
    beep(880,0.08);
  }else{
    // Stop
    running=false;
    elapsed+=performance.now()-startTime;
    cancelAnimationFrame(rafId);
    startBtn.textContent='START';
    startBtn.classList.remove('stop');
    timeEl.classList.remove('running');
    lapBtn.textContent='RESET';
    beep(440,0.1);
  }
}

function lapReset(){
  if(running){
    // Lap
    const total=elapsed+(performance.now()-startTime);
    const split=total-lapStart;
    lapStart=total;
    laps.push({split,total});
    renderLaps();
    beep(660,0.06);
  }else if(elapsed>0){
    // Reset
    elapsed=0;lapStart=0;laps=[];
    timeEl.textContent='00:00';
    msEl.textContent='.000';
    lapsEl.innerHTML='';
    lapBtn.classList.remove('active');
    lapBtn.textContent='LAP';
    beep(330,0.1);
  }
}

function renderLaps(){
  // Find best/worst splits
  let bestI=-1,worstI=-1,bestV=Infinity,worstV=0;
  if(laps.length>1){
    laps.forEach((l,i)=>{
      if(l.split<bestV){bestV=l.split;bestI=i}
      if(l.split>worstV){worstV=l.split;worstI=i}
    });
  }
  lapsEl.innerHTML='';
  for(let i=laps.length-1;i>=0;i--){
    const l=laps[i];
    const fs=fmt(Math.floor(l.split));
    const ft=fmt(Math.floor(l.total));
    let cls='lap-item';
    if(i===bestI&&laps.length>1)cls+=' best';
    else if(i===worstI&&laps.length>1)cls+=' worst';
    lapsEl.innerHTML+=`<div class="${cls}"><span class="lap-num">#${i+1}</span><span class="lap-split">${fs.main}${fs.ms}</span><span class="lap-time">${ft.main}${ft.ms}</span></div>`;
  }
}

// Keyboard
document.addEventListener('keydown',e=>{
  if(e.key===' '||e.key==='Enter'){e.preventDefault();startStop()}
  else if(e.key==='l'||e.key==='L')lapReset();
});
</script>
</body>
</html>
