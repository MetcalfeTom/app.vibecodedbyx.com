<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Quiet Calculator</title>
  <meta name="description" content="A minimal, keyboard-friendly calculator. Calm typography. No clutter.">
  <meta property="og:title" content="Quiet Calculator">
  <meta property="og:description" content="A clean, elegant calculator. Just the number, nothing else.">
  <meta property="og:url" content="https://sloppy.live/quiet-calculator">
  <meta property="og:image" content="https://image.pollinations.ai/prompt/A%20minimal%20warm-cream%20calculator%20on%20a%20stone%20surface,%20single%20muted%20terracotta%20equals%20key,%20editorial%20still%20life,%20soft%20natural%20light?model=flux&seed=1042&width=1200&height=630&nologo=true">
  <link rel="icon" href="https://emojicdn.elk.sh/%E2%9C%92%EF%B8%8F">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@200;300;500&family=Newsreader:ital,wght@1,300;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --paper:    #f4efe6;
      --paper-2:  #ede5d2;
      --ink:      #1c1814;
      --ink-soft: #5a5249;
      --line:     rgba(28,24,20,0.10);
      --key:      #fff9ee;
      --key-h:    #f1ead7;
      --key-sh:   rgba(28,24,20,0.06);
      --accent:   #c46a45;
      --accent-d: #a04d2c;
      --ghost:    #a89a82;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 100%; }
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 1.4rem 1rem;
      background:
        radial-gradient(ellipse at 30% 0%, rgba(255,240,210,0.5), transparent 65%),
        radial-gradient(ellipse at 100% 100%, rgba(196,106,69,0.10), transparent 60%),
        var(--paper);
      color: var(--ink);
      font-family: 'JetBrains Mono', monospace;
      font-weight: 300;
    }

    main {
      width: 100%;
      max-width: 22rem;
    }

    /* ============ MASTHEAD ============ */
    header.mast {
      display: flex; align-items: baseline; justify-content: space-between;
      padding: 0 0.25rem 0.5rem;
      border-bottom: 1px solid var(--line);
      margin-bottom: 1.1rem;
    }
    header.mast .brand {
      font-family: 'Newsreader', serif;
      font-style: italic;
      font-weight: 300;
      font-size: 1.45rem;
      color: var(--ink);
      letter-spacing: 0.005em;
    }
    header.mast .ver {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.65rem;
      color: var(--ghost);
      letter-spacing: 0.16em;
      text-transform: uppercase;
    }

    /* ============ DISPLAY ============ */
    .display {
      padding: 1.3rem 0.4rem 1.1rem;
      min-height: 8.5rem;
      display: flex; flex-direction: column; justify-content: flex-end;
      text-align: right;
    }
    .display .history {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 300;
      font-size: 0.9rem;
      color: var(--ghost);
      line-height: 1.3;
      letter-spacing: 0.02em;
      min-height: 1.3em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .display .number {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 200;
      font-size: clamp(2.4rem, 8vw, 3.6rem);
      color: var(--ink);
      line-height: 1;
      letter-spacing: -0.01em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      transition: color 0.18s;
    }
    .display.error .number { color: var(--accent-d); }
    .display .number .pulse {
      display: inline-block;
      animation: glow 0.18s ease-out;
    }
    @keyframes glow {
      0%   { transform: translateY(2px); opacity: 0.7; }
      100% { transform: translateY(0); opacity: 1; }
    }

    /* ============ KEYPAD ============ */
    .pad {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.55rem;
      margin-top: 0.5rem;
    }
    .key {
      appearance: none;
      -webkit-appearance: none;
      background: var(--key);
      border: none;
      color: var(--ink);
      font-family: 'JetBrains Mono', monospace;
      font-weight: 300;
      font-size: 1.35rem;
      padding: 1.05rem 0.6rem;
      border-radius: 14px;
      cursor: pointer;
      min-height: 3.4rem;
      box-shadow:
        0 1px 0 var(--key-sh),
        0 4px 12px -8px rgba(28,24,20,0.18);
      transition: transform 0.08s, background 0.12s, box-shadow 0.12s, color 0.12s;
      letter-spacing: -0.01em;
    }
    .key:hover  { background: var(--key-h); }
    .key:active { transform: translateY(1px); box-shadow: 0 0 0 var(--key-sh); }
    .key:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
    .key.op {
      color: var(--accent-d);
      font-weight: 500;
      font-size: 1.55rem;
    }
    .key.op.active {
      background: var(--accent);
      color: #fff9ee;
      font-weight: 500;
    }
    .key.fn {
      color: var(--ink-soft);
      font-size: 1.05rem;
      font-weight: 500;
      letter-spacing: 0.04em;
    }
    .key.equals {
      background: var(--accent);
      color: #fff9ee;
      font-weight: 500;
      font-size: 1.55rem;
      box-shadow:
        0 1px 0 rgba(0,0,0,0.12),
        0 6px 16px -8px rgba(196,106,69,0.55);
    }
    .key.equals:hover { background: var(--accent-d); }
    .key.zero { grid-column: span 2; text-align: center; }

    /* ============ FOOTER NOTE ============ */
    .foot {
      text-align: center;
      font-family: 'Newsreader', serif;
      font-style: italic;
      font-size: 0.92rem;
      color: var(--ghost);
      margin-top: 1.4rem;
      letter-spacing: 0.01em;
    }
    .foot kbd {
      font-family: 'JetBrains Mono', monospace;
      font-style: normal;
      font-size: 0.62rem;
      padding: 0.14rem 0.36rem;
      border: 1px solid var(--line);
      border-radius: 3px;
      background: var(--key);
      color: var(--ink-soft);
      margin: 0 0.1rem;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --paper:    #131210;
        --paper-2:  #1a1815;
        --ink:      #f0e6d4;
        --ink-soft: #b7ad9e;
        --line:     rgba(240,230,212,0.12);
        --key:      #1f1c18;
        --key-h:    #2a2620;
        --key-sh:   rgba(0,0,0,0.4);
        --accent:   #d97755;
        --accent-d: #ec8d6c;
        --ghost:    #6a6256;
      }
      .key.equals { color: #1a1815; }
      .key.op.active { color: #1a1815; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition: none !important; }
    }
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
  </style>
</head>
<body>
  <main>
    <header class="mast">
      <span class="brand">quiet <em>calculator</em></span>
      <span class="ver">v · 01</span>
    </header>

    <section class="display" id="display" role="status" aria-live="polite" aria-atomic="true">
      <div class="history" id="display-history">&nbsp;</div>
      <div class="number" id="display-number">0</div>
    </section>

    <section class="pad" id="pad" aria-label="Calculator keypad">
      <button type="button" class="key fn" data-act="ac">AC</button>
      <button type="button" class="key fn" data-act="neg">±</button>
      <button type="button" class="key fn" data-act="pct">%</button>
      <button type="button" class="key op" data-op="/">÷</button>

      <button type="button" class="key" data-num="7">7</button>
      <button type="button" class="key" data-num="8">8</button>
      <button type="button" class="key" data-num="9">9</button>
      <button type="button" class="key op" data-op="*">×</button>

      <button type="button" class="key" data-num="4">4</button>
      <button type="button" class="key" data-num="5">5</button>
      <button type="button" class="key" data-num="6">6</button>
      <button type="button" class="key op" data-op="-">−</button>

      <button type="button" class="key" data-num="1">1</button>
      <button type="button" class="key" data-num="2">2</button>
      <button type="button" class="key" data-num="3">3</button>
      <button type="button" class="key op" data-op="+">+</button>

      <button type="button" class="key zero" data-num="0">0</button>
      <button type="button" class="key" data-act="dot">.</button>
      <button type="button" class="key equals" data-act="eq">=</button>
    </section>

    <p class="foot">
      <kbd>0–9</kbd> <kbd>+ − × ÷</kbd> <kbd>Enter</kbd> <kbd>⌫</kbd>
    </p>
  </main>

  <script>
  (function(){
    'use strict';

    // ============================================================
    // STATE — a tiny finite machine:
    //   current = the number the user is currently typing/just produced
    //   stored  = the operand on the left side of a pending operation
    //   op      = the pending operator ('+','-','*','/') or null
    //   justEvaluated = true right after '=' so the next digit starts fresh
    // ============================================================
    const state = {
      current: '0',
      stored: null,
      op: null,
      justEvaluated: false
    };
    const display = document.getElementById('display');
    const numEl   = document.getElementById('display-number');
    const histEl  = document.getElementById('display-history');

    // ============================================================
    // NUMBER FORMATTING — group thousands with thin space, trim trailing
    // zeros after a decimal, handle infinity / NaN, cap to fit display.
    // ============================================================
    function formatNumber(s) {
      if (s === 'Error') return s;
      const n = Number(s);
      if (!isFinite(n)) return 'Error';
      // Detect "in-progress" entry (ends with '.' or has trailing zeros after decimal)
      const inProgress = /[.]/.test(s) && /[.]\d*0+$|[.]$/.test(s);
      if (inProgress) {
        // Just thousands-group the integer part
        const [intPart, fracPart] = s.split('.');
        const neg = intPart.startsWith('-');
        const digits = neg ? intPart.slice(1) : intPart;
        const grouped = digits.replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
        return (neg ? '-' : '') + grouped + '.' + (fracPart || '');
      }
      // Standard format — up to 10 significant digits, grouped
      let out;
      if (Math.abs(n) >= 1e15 || (n !== 0 && Math.abs(n) < 1e-6)) {
        out = n.toExponential(6).replace('e+', 'e');
      } else {
        // Up to 12 fractional digits, then trim trailing zeros + dot
        out = n.toFixed(12).replace(/0+$/, '').replace(/\.$/, '');
        const neg = out.startsWith('-');
        const dotI = out.indexOf('.');
        const intPart = dotI === -1 ? out : out.slice(0, dotI);
        const fracPart = dotI === -1 ? '' : out.slice(dotI);
        const digits = neg ? intPart.slice(1) : intPart;
        out = (neg ? '-' : '') + digits.replace(/\B(?=(\d{3})+(?!\d))/g, ' ') + fracPart;
      }
      return out;
    }
    function renderDisplay(animate) {
      display.classList.toggle('error', state.current === 'Error');
      const text = formatNumber(state.current);
      if (animate) {
        numEl.innerHTML = '<span class="pulse">' + text + '</span>';
      } else {
        numEl.textContent = text;
      }
      // History line — show "stored op" pending pattern
      if (state.op && state.stored !== null) {
        const opSym = { '+': '+', '-': '−', '*': '×', '/': '÷' }[state.op] || state.op;
        histEl.textContent = formatNumber(String(state.stored)) + ' ' + opSym;
      } else {
        histEl.innerHTML = '&nbsp;';
      }
    }
    renderDisplay();

    // ============================================================
    // OPERATIONS — float-precision-safe basic ops
    // ============================================================
    function compute(a, op, b) {
      a = Number(a); b = Number(b);
      let r;
      switch (op) {
        case '+': r = a + b; break;
        case '-': r = a - b; break;
        case '*': r = a * b; break;
        case '/':
          if (b === 0) return 'Error';
          r = a / b; break;
        default: return String(b);
      }
      if (!isFinite(r)) return 'Error';
      // Floating-point cleanup: round to 12 significant figures
      const rounded = Number(r.toPrecision(12));
      return String(rounded);
    }

    // ============================================================
    // HANDLERS
    // ============================================================
    function inputDigit(d) {
      if (state.current === 'Error') resetAll();
      if (state.justEvaluated) {
        // Start a fresh entry after = (also clear pending op chain)
        state.current = d;
        state.stored = null;
        state.op = null;
        state.justEvaluated = false;
      } else if (state.current === '0') {
        state.current = d;
      } else {
        // Cap length to keep display sane
        if (state.current.replace(/[-.]/, '').length >= 14) return;
        state.current += d;
      }
      renderDisplay(true);
    }
    function inputDot() {
      if (state.current === 'Error') resetAll();
      if (state.justEvaluated) {
        state.current = '0';
        state.stored = null;
        state.op = null;
        state.justEvaluated = false;
      }
      if (!state.current.includes('.')) {
        state.current += '.';
        renderDisplay();
      }
    }
    function inputOp(op) {
      if (state.current === 'Error') return;
      if (state.stored !== null && state.op && !state.justEvaluated) {
        // Chain — apply pending op first
        const result = compute(state.stored, state.op, state.current);
        state.stored = result;
        state.current = result;
      } else {
        state.stored = state.current;
      }
      state.op = op;
      state.justEvaluated = false;
      // After picking an op, the next digit should overwrite current
      state._awaitingOperand = true;
      // We flag by setting justEvaluated-like flow: actually simpler to
      // re-implement here by storing current and letting inputDigit see
      // justEvaluated. Reuse that flag.
      state.justEvaluated = true;
      highlightOp(op);
      renderDisplay();
    }
    function highlightOp(op) {
      document.querySelectorAll('.key.op').forEach(k => k.classList.remove('active'));
      if (!op) return;
      const el = document.querySelector('.key.op[data-op="' + op + '"]');
      if (el) el.classList.add('active');
    }
    function evaluate() {
      if (state.current === 'Error') return;
      if (state.op && state.stored !== null) {
        const result = compute(state.stored, state.op, state.current);
        // History line shows the full expression for one beat
        const opSym = { '+': '+', '-': '−', '*': '×', '/': '÷' }[state.op] || state.op;
        const expr  = formatNumber(state.stored) + ' ' + opSym + ' ' + formatNumber(state.current) + ' =';
        state.current = result;
        state.stored = null;
        state.op = null;
        state.justEvaluated = true;
        highlightOp(null);
        renderDisplay(true);
        histEl.textContent = expr;
      }
    }
    function negate() {
      if (state.current === 'Error') return;
      if (state.current === '0') return;
      if (state.current.startsWith('-')) state.current = state.current.slice(1);
      else state.current = '-' + state.current;
      renderDisplay();
    }
    function percent() {
      if (state.current === 'Error') return;
      const n = Number(state.current);
      if (!isFinite(n)) return;
      state.current = String(Number((n / 100).toPrecision(12)));
      renderDisplay(true);
    }
    function backspace() {
      if (state.current === 'Error') { resetAll(); return; }
      if (state.justEvaluated) return;
      if (state.current.length <= 1 || (state.current.length === 2 && state.current.startsWith('-'))) {
        state.current = '0';
      } else {
        state.current = state.current.slice(0, -1);
      }
      renderDisplay();
    }
    function resetAll() {
      state.current = '0';
      state.stored = null;
      state.op = null;
      state.justEvaluated = false;
      highlightOp(null);
      renderDisplay();
    }

    // ============================================================
    // EVENT WIRING
    // ============================================================
    document.getElementById('pad').addEventListener('click', e => {
      const k = e.target.closest('.key');
      if (!k) return;
      if (k.dataset.num) inputDigit(k.dataset.num);
      else if (k.dataset.op) inputOp(k.dataset.op);
      else if (k.dataset.act === 'dot') inputDot();
      else if (k.dataset.act === 'eq')  evaluate();
      else if (k.dataset.act === 'ac')  resetAll();
      else if (k.dataset.act === 'neg') negate();
      else if (k.dataset.act === 'pct') percent();
    });

    // Keyboard
    window.addEventListener('keydown', e => {
      // Avoid hijacking inputs
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      const k = e.key;
      if (/^[0-9]$/.test(k)) { inputDigit(k); flashKey('[data-num="' + k + '"]'); }
      else if (k === '.' || k === ',') { inputDot(); flashKey('[data-act="dot"]'); }
      else if (k === '+') { inputOp('+'); flashKey('[data-op="+"]'); }
      else if (k === '-') { inputOp('-'); flashKey('[data-op="-"]'); }
      else if (k === '*' || k === 'x' || k === 'X') { inputOp('*'); flashKey('[data-op="*"]'); }
      else if (k === '/') { e.preventDefault(); inputOp('/'); flashKey('[data-op="/"]'); }
      else if (k === 'Enter' || k === '=') { e.preventDefault(); evaluate(); flashKey('[data-act="eq"]'); }
      else if (k === 'Backspace') { backspace(); }
      else if (k === 'Escape' || k.toLowerCase() === 'c') { resetAll(); flashKey('[data-act="ac"]'); }
      else if (k === '%') { percent(); flashKey('[data-act="pct"]'); }
    });
    function flashKey(sel) {
      const el = document.querySelector(sel);
      if (!el) return;
      el.style.transition = 'background 0.06s';
      el.style.background = 'var(--key-h)';
      setTimeout(() => { el.style.background = ''; }, 90);
    }
  })();
  </script>
</body>
</html>
