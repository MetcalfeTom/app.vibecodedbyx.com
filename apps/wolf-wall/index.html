<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wolf Wall</title>
<link rel="icon" href="https://emojicdn.elk.sh/🐺">
<meta property="og:title" content="Wolf Wall">
<meta property="og:description" content="Generative firewall art — digital wolves patrol logic gates in a living security mesh.">
<meta property="og:url" content="https://app.sloppy.live/wolf-wall/">
<meta property="og:image" content="https://emojicdn.elk.sh/🐺?style=google">
<link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=IBM+Plex+Mono:wght@200;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#04060c;overflow:hidden;cursor:crosshair}
canvas{display:block;width:100vw;height:100vh}
#hud{
  position:fixed;top:12px;left:50%;transform:translateX(-50%);
  font-family:'Major Mono Display',monospace;font-size:clamp(0.6rem,1.5vw,0.85rem);
  color:rgba(0,200,255,0.5);letter-spacing:0.2em;text-align:center;
  pointer-events:none;z-index:2;text-transform:uppercase;
}
#hud .title{font-size:clamp(0.9rem,2.5vw,1.4rem);color:rgba(0,200,255,0.7);margin-bottom:2px}
#threat{
  position:fixed;top:50px;left:50%;transform:translateX(-50%);
  font-family:'IBM Plex Mono',monospace;font-size:0.5rem;font-weight:200;
  color:rgba(0,200,255,0.25);letter-spacing:0.15em;pointer-events:none;z-index:2;
}
#back{
  position:fixed;bottom:10px;left:50%;transform:translateX(-50%);z-index:2;
}
#back a{color:rgba(0,200,255,0.2);text-decoration:none;font-family:'IBM Plex Mono',monospace;font-size:0.5rem}
#back a:hover{color:rgba(0,200,255,0.5)}
</style>
</head>
<body>
<div id="hud"><div class="title">wolf wall</div>firewall status: active</div>
<div id="threat">threat level: scanning... | packets filtered: <span id="pkt">0</span> | wolves deployed: <span id="wc">0</span></div>
<canvas id="c"></canvas>
<div id="back"><a href="https://sloppy.live">sloppy.live</a></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, frame = 0, packets = 0;

function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// === LOGIC GATES ===
const gates = [];
function initGates() {
  gates.length = 0;
  const cols = Math.floor(W / 90);
  const rows = Math.floor(H / 90);
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (Math.random() < 0.55) {
        gates.push({
          x: 45 + c * 90 + (Math.random() - 0.5) * 20,
          y: 45 + r * 90 + (Math.random() - 0.5) * 20,
          type: ['AND','OR','XOR','NOT','NAND','NOR'][Math.floor(Math.random() * 6)],
          active: Math.random() < 0.3,
          pulse: 0,
          connections: [],
          threatLevel: 0
        });
      }
    }
  }
  // Connect nearby gates
  gates.forEach((g, i) => {
    gates.forEach((g2, j) => {
      if (i >= j) return;
      const d = Math.hypot(g2.x - g.x, g2.y - g.y);
      if (d < 150 && Math.random() < 0.6) {
        g.connections.push(j);
        g2.connections.push(i);
      }
    });
  });
}
initGates();

// === WOLVES ===
const wolves = [];
function spawnWolf() {
  const startGate = Math.floor(Math.random() * gates.length);
  const g = gates[startGate];
  if (!g) return;
  wolves.push({
    x: g.x, y: g.y,
    targetGate: startGate,
    nextGate: -1,
    speed: 0.8 + Math.random() * 0.6,
    phase: Math.random() * Math.PI * 2,
    alertLevel: 0,
    trail: [],
    howlTimer: 0,
    dir: 1,
    // Body segments for fluid movement
    segments: Array.from({length: 8}, () => ({x: g.x, y: g.y})),
    earPerk: 0,
    jawOpen: 0
  });
}
for (let i = 0; i < Math.max(3, Math.floor(gates.length / 12)); i++) spawnWolf();
document.getElementById('wc').textContent = wolves.length;

function drawWolf(w) {
  const segs = w.segments;
  const headX = segs[0].x, headY = segs[0].y;
  const s1x = segs[1].x, s1y = segs[1].y;
  const angle = Math.atan2(headY - s1y, headX - s1x);

  ctx.save();
  ctx.translate(headX, headY);
  ctx.rotate(angle);

  const alert = w.alertLevel;
  const baseColor = alert > 0.5 ? [255, 80, 40] : [0, 180, 255];
  const glowColor = alert > 0.5 ? 'rgba(255,80,40,' : 'rgba(0,180,255,';

  // Trail glow
  ctx.shadowColor = `rgb(${baseColor[0]},${baseColor[1]},${baseColor[2]})`;
  ctx.shadowBlur = 8 + alert * 12;

  // Body (segments as connected shapes)
  ctx.strokeStyle = glowColor + (0.3 + alert * 0.3) + ')';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  for (let i = 1; i < segs.length; i++) {
    const dx = segs[i].x - headX, dy = segs[i].y - headY;
    const lx = dx * Math.cos(-angle) - dy * Math.sin(-angle);
    const ly = dx * Math.sin(-angle) + dy * Math.cos(-angle);
    ctx.lineTo(lx, ly);
  }
  ctx.stroke();

  // Body fill (tapered)
  for (let i = 0; i < segs.length - 1; i++) {
    const dx = segs[i + 1].x - headX, dy = segs[i + 1].y - headY;
    const lx = dx * Math.cos(-angle) - dy * Math.sin(-angle);
    const ly = dx * Math.sin(-angle) + dy * Math.cos(-angle);
    const dx0 = (i === 0 ? 0 : segs[i].x - headX);
    const dy0 = (i === 0 ? 0 : segs[i].y - headY);
    const lx0 = dx0 * Math.cos(-angle) - dy0 * Math.sin(-angle);
    const ly0 = dx0 * Math.sin(-angle) + dy0 * Math.cos(-angle);
    const w1 = 4 - i * 0.35;
    const w2 = 4 - (i + 1) * 0.35;
    ctx.fillStyle = glowColor + (0.1 + (1 - i / segs.length) * 0.15) + ')';
    ctx.beginPath();
    ctx.moveTo(lx0, ly0 - w1);
    ctx.lineTo(lx, ly - w2);
    ctx.lineTo(lx, ly + w2);
    ctx.lineTo(lx0, ly0 + w1);
    ctx.closePath();
    ctx.fill();
  }

  // Head shape
  ctx.fillStyle = glowColor + '0.25)';
  ctx.beginPath();
  ctx.moveTo(10, 0);
  ctx.lineTo(2, -5);
  ctx.lineTo(-4, -4);
  ctx.lineTo(-4, 4);
  ctx.lineTo(2, 5);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = glowColor + '0.6)';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Ears
  const earPerk = 1 + w.earPerk * 2;
  ctx.strokeStyle = glowColor + '0.5)';
  ctx.lineWidth = 1.2;
  // Left ear
  ctx.beginPath();
  ctx.moveTo(0, -4);
  ctx.lineTo(-3, -4 - 5 * earPerk);
  ctx.lineTo(2, -5);
  ctx.stroke();
  // Right ear
  ctx.beginPath();
  ctx.moveTo(0, 4);
  ctx.lineTo(-3, 4 + 5 * earPerk);
  ctx.lineTo(2, 5);
  ctx.stroke();

  // Eyes
  ctx.fillStyle = alert > 0.5 ? '#ff4020' : '#00e8ff';
  ctx.shadowColor = alert > 0.5 ? '#ff4020' : '#00e8ff';
  ctx.shadowBlur = 6;
  ctx.beginPath();
  ctx.arc(4, -2.5, 1.2, 0, Math.PI * 2);
  ctx.arc(4, 2.5, 1.2, 0, Math.PI * 2);
  ctx.fill();

  // Jaw (open when howling)
  if (w.jawOpen > 0.1) {
    ctx.strokeStyle = glowColor + '0.4)';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(6, 0);
    ctx.lineTo(10 + w.jawOpen * 3, w.jawOpen * 4);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(6, 0);
    ctx.lineTo(10 + w.jawOpen * 3, -w.jawOpen * 2);
    ctx.stroke();
  }

  // Snout
  ctx.fillStyle = glowColor + '0.15)';
  ctx.beginPath();
  ctx.moveTo(4, -2);
  ctx.lineTo(10, 0);
  ctx.lineTo(4, 2);
  ctx.closePath();
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.restore();

  // Howl effect — concentric rings
  if (w.howlTimer > 0) {
    const hr = (30 - w.howlTimer) * 3;
    ctx.strokeStyle = glowColor + (w.howlTimer / 30 * 0.3) + ')';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(headX, headY, hr, 0, Math.PI * 2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(headX, headY, hr * 0.6, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Paw prints trail
  w.trail.forEach((t, i) => {
    const a = (1 - i / w.trail.length) * 0.08;
    ctx.fillStyle = glowColor + a + ')';
    ctx.fillRect(t.x - 1, t.y - 1, 2, 2);
  });
}

function updateWolf(w) {
  // Pick next gate to patrol
  if (w.nextGate < 0 || (Math.abs(w.x - gates[w.nextGate]?.x) < 5 && Math.abs(w.y - gates[w.nextGate]?.y) < 5)) {
    w.targetGate = w.nextGate >= 0 ? w.nextGate : w.targetGate;
    const g = gates[w.targetGate];
    if (g && g.connections.length > 0) {
      w.nextGate = g.connections[Math.floor(Math.random() * g.connections.length)];
    } else {
      w.nextGate = Math.floor(Math.random() * gates.length);
    }
    // Activate gate when wolf passes
    if (g) {
      g.pulse = 1;
      g.active = true;
      setTimeout(() => { g.active = Math.random() < 0.3; }, 2000);
    }
  }

  // Move toward next gate
  const target = gates[w.nextGate];
  if (target) {
    const dx = target.x - w.x, dy = target.y - w.y;
    const d = Math.hypot(dx, dy);
    if (d > 1) {
      w.x += (dx / d) * w.speed;
      w.y += (dy / d) * w.speed;
      w.dir = dx > 0 ? 1 : -1;
    }

    // Check for threat packets nearby
    w.alertLevel *= 0.95;
    threatPackets.forEach(tp => {
      const td = Math.hypot(tp.x - w.x, tp.y - w.y);
      if (td < 80) {
        w.alertLevel = Math.min(1, w.alertLevel + 0.1);
        w.earPerk = 1;
        tp.life -= 2; // wolves destroy threats
        if (td < 25) {
          tp.life = 0;
          w.howlTimer = 30;
          w.jawOpen = 1;
          gates.forEach(g => { if (Math.hypot(g.x - w.x, g.y - w.y) < 100) g.threatLevel = 0.8; });
        }
      }
    });
  }

  // Ear/jaw animation decay
  w.earPerk *= 0.95;
  w.jawOpen *= 0.93;
  if (w.howlTimer > 0) w.howlTimer--;

  // Random howl
  if (Math.random() < 0.0005) { w.howlTimer = 30; w.jawOpen = 1; }

  // Segments follow head
  w.segments[0] = { x: w.x, y: w.y };
  for (let i = 1; i < w.segments.length; i++) {
    const prev = w.segments[i - 1];
    const dx = prev.x - w.segments[i].x;
    const dy = prev.y - w.segments[i].y;
    const d = Math.hypot(dx, dy);
    const segDist = 4;
    if (d > segDist) {
      w.segments[i].x += (dx / d) * (d - segDist) * 0.5;
      w.segments[i].y += (dy / d) * (d - segDist) * 0.5;
    }
  }

  // Trail
  if (frame % 4 === 0) w.trail.push({ x: w.x, y: w.y });
  if (w.trail.length > 20) w.trail.shift();
}

// === THREAT PACKETS ===
let threatPackets = [];
function spawnThreat() {
  const side = Math.floor(Math.random() * 4);
  let x, y, vx, vy;
  if (side === 0) { x = 0; y = Math.random() * H; vx = 0.5 + Math.random(); vy = (Math.random() - 0.5) * 0.5; }
  else if (side === 1) { x = W; y = Math.random() * H; vx = -(0.5 + Math.random()); vy = (Math.random() - 0.5) * 0.5; }
  else if (side === 2) { x = Math.random() * W; y = 0; vx = (Math.random() - 0.5) * 0.5; vy = 0.5 + Math.random(); }
  else { x = Math.random() * W; y = H; vx = (Math.random() - 0.5) * 0.5; vy = -(0.5 + Math.random()); }

  threatPackets.push({
    x, y, vx, vy,
    life: 200 + Math.random() * 200,
    maxLife: 400,
    size: 2 + Math.random() * 3,
    type: Math.random() < 0.2 ? 'malware' : 'probe'
  });
}

function drawThreat(t) {
  const a = Math.min(1, t.life / 50);
  if (t.type === 'malware') {
    ctx.fillStyle = `rgba(255,40,40,${a * 0.6})`;
    ctx.shadowColor = '#ff2020';
    ctx.shadowBlur = 8;
    // Spiky shape
    ctx.beginPath();
    for (let i = 0; i < 6; i++) {
      const ang = (i / 6) * Math.PI * 2 + frame * 0.05;
      const r = i % 2 === 0 ? t.size * 2 : t.size;
      ctx.lineTo(t.x + Math.cos(ang) * r, t.y + Math.sin(ang) * r);
    }
    ctx.closePath();
    ctx.fill();
  } else {
    ctx.fillStyle = `rgba(255,180,0,${a * 0.4})`;
    ctx.shadowColor = '#ffaa00';
    ctx.shadowBlur = 4;
    ctx.fillRect(t.x - t.size / 2, t.y - t.size / 2, t.size, t.size);
  }
  ctx.shadowBlur = 0;
}

// === DATA STREAMS (background decoration) ===
const streams = [];
for (let i = 0; i < 15; i++) {
  streams.push({
    x: Math.random() * 2000,
    y: Math.random() * 2000,
    speed: 0.3 + Math.random() * 0.8,
    angle: Math.random() * Math.PI * 2,
    chars: Array.from({length: 8 + Math.floor(Math.random() * 12)}, () =>
      '01▪▫═║╔╗╚╝├┤┬┴┼'[Math.floor(Math.random() * 16)]
    ).join('')
  });
}

// === DRAW ===
function drawGate(g) {
  const glow = g.active ? 0.5 + g.pulse * 0.5 : 0.1;
  const threat = g.threatLevel;
  const baseR = threat > 0.3 ? 255 : 0;
  const baseG = threat > 0.3 ? 60 : 180;
  const baseB = threat > 0.3 ? 30 : 255;

  // Connection lines
  ctx.strokeStyle = `rgba(${baseR},${baseG},${baseB},${0.04 + glow * 0.06})`;
  ctx.lineWidth = 0.5;
  g.connections.forEach(ci => {
    const g2 = gates[ci];
    if (!g2) return;
    ctx.beginPath();
    ctx.moveTo(g.x, g.y);
    ctx.lineTo(g2.x, g2.y);
    ctx.stroke();

    // Data flow dots
    if (g.active && Math.random() < 0.02) {
      const t = (frame * 0.01) % 1;
      const fx = g.x + (g2.x - g.x) * t;
      const fy = g.y + (g2.y - g.y) * t;
      ctx.fillStyle = `rgba(${baseR},${baseG},${baseB},0.3)`;
      ctx.fillRect(fx - 1, fy - 1, 2, 2);
    }
  });

  // Gate node
  ctx.fillStyle = `rgba(${baseR},${baseG},${baseB},${0.05 + glow * 0.15})`;
  ctx.strokeStyle = `rgba(${baseR},${baseG},${baseB},${0.1 + glow * 0.3})`;
  ctx.lineWidth = 1;

  // Gate shape based on type
  const s = 8;
  ctx.beginPath();
  if (g.type === 'AND' || g.type === 'NAND') {
    ctx.moveTo(g.x - s, g.y - s);
    ctx.lineTo(g.x - s, g.y + s);
    ctx.arc(g.x - s, g.y, s, Math.PI * 0.5, -Math.PI * 0.5, true);
  } else if (g.type === 'OR' || g.type === 'NOR') {
    ctx.moveTo(g.x - s, g.y - s);
    ctx.quadraticCurveTo(g.x + s, g.y, g.x - s, g.y + s);
    ctx.quadraticCurveTo(g.x - s * 0.5, g.y, g.x - s, g.y - s);
  } else if (g.type === 'XOR') {
    ctx.arc(g.x, g.y, s, 0, Math.PI * 2);
  } else {
    // NOT — triangle
    ctx.moveTo(g.x - s, g.y - s);
    ctx.lineTo(g.x + s, g.y);
    ctx.lineTo(g.x - s, g.y + s);
    ctx.closePath();
  }
  ctx.fill();
  ctx.stroke();

  // NOT/NAND/NOR bubble
  if (g.type === 'NOT' || g.type === 'NAND' || g.type === 'NOR') {
    ctx.beginPath();
    ctx.arc(g.x + s + 3, g.y, 2.5, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Label
  ctx.fillStyle = `rgba(${baseR},${baseG},${baseB},${0.15 + glow * 0.2})`;
  ctx.font = '200 7px "IBM Plex Mono"';
  ctx.textAlign = 'center';
  ctx.fillText(g.type, g.x, g.y + s + 10);

  // Pulse ring
  if (g.pulse > 0.01) {
    ctx.strokeStyle = `rgba(${baseR},${baseG},${baseB},${g.pulse * 0.3})`;
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.arc(g.x, g.y, s + (1 - g.pulse) * 20, 0, Math.PI * 2);
    ctx.stroke();
    g.pulse *= 0.96;
  }

  g.threatLevel *= 0.995;
}

function drawScene() {
  // Dark background with subtle grid
  ctx.fillStyle = '#04060c';
  ctx.fillRect(0, 0, W, H);

  // Grid
  ctx.strokeStyle = 'rgba(0,180,255,0.015)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < W; x += 45) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 45) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Data streams (background)
  ctx.font = '200 8px "IBM Plex Mono"';
  ctx.textAlign = 'left';
  streams.forEach(s => {
    s.x += Math.cos(s.angle) * s.speed;
    s.y += Math.sin(s.angle) * s.speed;
    if (s.x > W + 100) s.x = -100;
    if (s.x < -100) s.x = W + 100;
    if (s.y > H + 100) s.y = -100;
    if (s.y < -100) s.y = H + 100;
    ctx.fillStyle = 'rgba(0,180,255,0.04)';
    ctx.save();
    ctx.translate(s.x, s.y);
    ctx.rotate(s.angle);
    ctx.fillText(s.chars, 0, 0);
    ctx.restore();
  });

  // Gates
  gates.forEach(drawGate);

  // Threats
  threatPackets.forEach(t => {
    t.x += t.vx;
    t.y += t.vy;
    t.life--;
    drawThreat(t);
  });
  const prevCount = threatPackets.length;
  threatPackets = threatPackets.filter(t => t.life > 0 && t.x > -50 && t.x < W + 50 && t.y > -50 && t.y < H + 50);
  packets += prevCount - threatPackets.length;

  // Wolves
  wolves.forEach(w => {
    updateWolf(w);
    drawWolf(w);
  });

  // Periodic gate toggling
  if (frame % 60 === 0) {
    const rg = gates[Math.floor(Math.random() * gates.length)];
    if (rg) { rg.active = !rg.active; rg.pulse = 0.8; }
  }

  // Spawn threats
  if (Math.random() < 0.02 + frame * 0.000001) spawnThreat();

  // Update HUD
  if (frame % 30 === 0) {
    document.getElementById('pkt').textContent = packets;
    const threats = ['scanning...', 'nominal', 'low activity', 'perimeter secure', 'monitoring', 'all clear'];
    if (threatPackets.length > 5) document.getElementById('threat').querySelector('span').parentElement.style.color = 'rgba(255,80,40,0.4)';
    else document.getElementById('threat').style.color = 'rgba(0,200,255,0.25)';
  }
}

// === MOUSE INTERACTION — place threat on click ===
canvas.addEventListener('click', e => {
  const r = canvas.getBoundingClientRect();
  const x = (e.clientX - r.left) * (W / r.width);
  const y = (e.clientY - r.top) * (H / r.height);
  // Spawn a threat at click position
  for (let i = 0; i < 3; i++) {
    threatPackets.push({
      x: x + (Math.random() - 0.5) * 20,
      y: y + (Math.random() - 0.5) * 20,
      vx: (Math.random() - 0.5) * 2,
      vy: (Math.random() - 0.5) * 2,
      life: 150, maxLife: 300,
      size: 3 + Math.random() * 3,
      type: Math.random() < 0.4 ? 'malware' : 'probe'
    });
  }
  // Nearby wolves react
  wolves.forEach(w => {
    const d = Math.hypot(w.x - x, w.y - y);
    if (d < 200) {
      w.alertLevel = 1;
      w.earPerk = 1;
      w.howlTimer = 25;
      w.jawOpen = 1;
    }
  });
});

function loop() {
  frame++;
  drawScene();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
