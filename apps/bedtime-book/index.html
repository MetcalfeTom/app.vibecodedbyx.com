<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bedtime Book</title>
  <meta name="description" content="A cozy bedtime story generator. Pick a name, an animal, and a mood — get a gentle illustrated story to read before sleep.">
  <meta property="og:title" content="Bedtime Book">
  <meta property="og:description" content="Type a name, choose an animal, pick a mood — and a cozy illustrated bedtime story appears, page by page, under a sky of twinkling stars.">
  <meta property="og:url" content="https://sloppy.live/bedtime-book">
  <meta property="og:image" content="https://image.pollinations.ai/prompt/A%20cozy%20open%20storybook%20at%20night%20with%20a%20glowing%20moon,%20twinkling%20stars,%20and%20a%20sleepy%20cartoon%20dog,%20warm%20lamplight,%20editorial%20childrens-book%20illustration?model=flux&seed=2211&width=1200&height=630&nologo=true">
  <link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8C%99">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;1,9..144,400&family=Caveat:wght@500;700&family=Quicksand:wght@500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --night-0: #1a1840;
      --night-1: #241c52;
      --night-2: #3a2c6e;
      --moon:    #fdf0c8;
      --star:    #fff4d6;
      --paper:   #fbf1d8;
      --paper-2: #f4e6c4;
      --ink:     #3a2a18;
      --ink-soft:#7a5f3a;
      --rose:    #e88aa0;
      --gold:    #f4c45a;
      --sage:    #8fc08a;
      --line:    rgba(58,42,24,0.16);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 100%; }
    body {
      min-height: 100vh;
      background:
        radial-gradient(ellipse at 50% -10%, #4a3a8a 0%, var(--night-1) 38%, var(--night-0) 80%),
        var(--night-0);
      color: var(--paper);
      font-family: 'Quicksand', sans-serif;
      display: flex; align-items: center; justify-content: center;
      padding: 1.2rem 1rem 2rem;
      position: relative;
      overflow-x: hidden;
    }
    /* ============ TWINKLING STAR SKY ============ */
    #stars {
      position: fixed; inset: 0;
      z-index: 0; pointer-events: none;
    }
    .shooting {
      position: fixed; width: 2px; height: 2px;
      background: linear-gradient(90deg, var(--star), transparent);
      border-radius: 50%; z-index: 0; pointer-events: none;
      opacity: 0;
    }

    main { position: relative; z-index: 1; width: 100%; max-width: 34rem; }

    /* ============ SETUP CARD ============ */
    .setup {
      background:
        radial-gradient(ellipse at 50% 0%, rgba(253,240,200,0.06), transparent 60%),
        var(--night-1);
      border: 1px solid rgba(253,240,200,0.14);
      border-radius: 22px;
      padding: 1.6rem 1.4rem 1.5rem;
      box-shadow: 0 30px 80px rgba(0,0,0,0.45), 0 0 60px rgba(74,58,138,0.3);
      text-align: center;
    }
    .setup .moon-badge { font-size: 2.6rem; filter: drop-shadow(0 0 18px rgba(253,240,200,0.6)); }
    .setup h1 {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: clamp(2rem, 7vw, 2.8rem);
      line-height: 1; margin: 0.3rem 0 0.2rem;
      color: var(--moon);
      letter-spacing: -0.01em;
    }
    .setup .sub {
      font-family: 'Caveat', cursive;
      font-size: 1.2rem; color: rgba(253,240,200,0.7);
      margin-bottom: 1.2rem;
    }
    .field { text-align: left; margin-bottom: 0.9rem; }
    .field label {
      display: block;
      font-family: 'Quicksand', sans-serif; font-weight: 600;
      font-size: 0.72rem; letter-spacing: 0.14em; text-transform: uppercase;
      color: rgba(253,240,200,0.6); margin-bottom: 0.35rem;
    }
    .field input[type=text] {
      width: 100%;
      background: var(--night-2); border: 1.5px solid rgba(253,240,200,0.18);
      color: var(--paper); border-radius: 12px;
      padding: 0.7rem 0.9rem; font-family: 'Fraunces', serif; font-size: 1.1rem;
      outline: none; transition: border-color 0.15s;
    }
    .field input[type=text]:focus { border-color: var(--gold); }
    .chips { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .chip {
      background: var(--night-2); border: 1.5px solid rgba(253,240,200,0.16);
      color: rgba(253,240,200,0.8); border-radius: 999px;
      padding: 0.5rem 0.8rem; cursor: pointer;
      font-family: 'Quicksand', sans-serif; font-weight: 600; font-size: 0.85rem;
      transition: all 0.14s; min-height: 2.4rem;
      display: inline-flex; align-items: center; gap: 0.3rem;
    }
    .chip:hover { filter: brightness(1.15); }
    .chip.active {
      background: rgba(244,196,90,0.18); border-color: var(--gold); color: var(--moon);
      box-shadow: 0 0 14px rgba(244,196,90,0.3);
    }
    .chip:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
    .begin {
      width: 100%; margin-top: 1rem;
      font-family: 'Fraunces', serif; font-weight: 600; font-size: 1.2rem;
      padding: 0.85rem; border-radius: 14px; border: none;
      background: linear-gradient(135deg, var(--gold), var(--rose));
      color: var(--night-0); cursor: pointer;
      box-shadow: 0 0 26px rgba(244,196,90,0.4);
      transition: transform 0.1s, filter 0.12s;
      min-height: 2.75rem;
    }
    .begin:hover { filter: brightness(1.06); transform: translateY(-1px); }
    .begin:active { transform: translateY(1px); }
    .begin:focus-visible { outline: 3px solid var(--moon); outline-offset: 3px; }

    /* ============ STORY BOOK ============ */
    .book { display: none; }
    .book.show { display: block; animation: book-in 0.6s ease-out; }
    @keyframes book-in { from { opacity: 0; transform: scale(0.96) translateY(10px); } to { opacity: 1; } }
    .page {
      background:
        repeating-linear-gradient(8deg, rgba(122,95,58,0.04) 0 2px, transparent 2px 8px),
        linear-gradient(180deg, var(--paper), var(--paper-2));
      border-radius: 18px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.5), inset 0 0 40px rgba(122,95,58,0.06);
      overflow: hidden;
      color: var(--ink);
    }
    /* illustration */
    .illo {
      position: relative;
      height: 13rem;
      background: radial-gradient(ellipse at 50% 20%, #4a3a8a 0%, var(--night-1) 55%, var(--night-0) 100%);
      overflow: hidden;
      display: flex; align-items: flex-end; justify-content: center;
    }
    .illo .moon {
      position: absolute; top: 1.1rem; right: 1.4rem;
      width: 3rem; height: 3rem; border-radius: 50%;
      background: radial-gradient(circle at 38% 36%, #fffbe8, var(--moon) 60%, #e8d49a);
      box-shadow: 0 0 30px rgba(253,240,200,0.55), inset -6px -4px 0 rgba(0,0,0,0.06);
    }
    .illo .il-star {
      position: absolute; width: 3px; height: 3px; border-radius: 50%;
      background: var(--star);
      animation: tw 3s ease-in-out infinite;
    }
    @keyframes tw { 0%,100% { opacity: 0.3; transform: scale(0.8); } 50% { opacity: 1; transform: scale(1.3); } }
    .illo .cloud {
      position: absolute;
      font-size: 2.4rem; opacity: 0.35;
      animation: drift linear infinite;
    }
    @keyframes drift { from { transform: translateX(-25vw); } to { transform: translateX(120vw); } }
    .illo .hills {
      position: absolute; bottom: 0; left: 0; right: 0; height: 3.4rem;
      background:
        radial-gradient(ellipse 60% 100% at 20% 100%, #2e2456 0 70%, transparent 71%),
        radial-gradient(ellipse 70% 100% at 75% 100%, #261e48 0 70%, transparent 71%),
        linear-gradient(180deg, transparent, #1e1840);
    }
    .illo .hero {
      position: relative; z-index: 2;
      font-size: 4.6rem; line-height: 1;
      margin-bottom: 1.2rem;
      filter: drop-shadow(0 6px 10px rgba(0,0,0,0.4));
      animation: bob 3.4s ease-in-out infinite;
    }
    @keyframes bob { 0%,100% { transform: translateY(0) rotate(-2deg); } 50% { transform: translateY(-8px) rotate(2deg); } }
    .illo .hero.sleeping { animation: snooze 4s ease-in-out infinite; }
    @keyframes snooze { 0%,100% { transform: translateY(0) rotate(-3deg) scale(1); } 50% { transform: translateY(-2px) rotate(-3deg) scale(1.02); } }
    .illo .zzz {
      position: absolute; z-index: 3;
      right: 30%; bottom: 3.5rem;
      font-family: 'Caveat', cursive; font-weight: 700;
      color: var(--moon); font-size: 1.6rem;
      opacity: 0; display: none;
    }
    .illo .zzz.on { display: block; animation: zzz 3s ease-in-out infinite; }
    @keyframes zzz {
      0% { opacity: 0; transform: translateY(0) scale(0.8); }
      40% { opacity: 1; }
      100% { opacity: 0; transform: translateY(-30px) scale(1.2); }
    }
    .illo .prop {
      position: absolute; z-index: 2; bottom: 1rem;
      font-size: 1.8rem; filter: drop-shadow(0 3px 5px rgba(0,0,0,0.3));
    }

    /* story text */
    .story-body {
      padding: 1.3rem 1.4rem 0.6rem;
    }
    .pagenum {
      font-family: 'Caveat', cursive; font-size: 1.1rem;
      color: var(--ink-soft); text-align: right; margin-bottom: 0.3rem;
    }
    .story-text {
      font-family: 'Fraunces', serif;
      font-size: clamp(1.1rem, 3.2vw, 1.3rem);
      line-height: 1.65;
      color: var(--ink);
      min-height: 6.5rem;
    }
    .story-text .nm { color: var(--rose); font-weight: 600; font-style: italic; }
    .story-text .em { color: var(--ink-soft); font-style: italic; }

    /* nav */
    .nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0.8rem 1.4rem 1.2rem;
    }
    .nav button {
      font-family: 'Quicksand', sans-serif; font-weight: 600; font-size: 0.9rem;
      background: var(--paper-2); border: 1.5px solid var(--line); color: var(--ink);
      border-radius: 999px; padding: 0.55rem 1.1rem; cursor: pointer;
      transition: filter 0.12s, transform 0.1s; min-height: 2.6rem;
    }
    .nav button:hover { filter: brightness(0.97); }
    .nav button:active { transform: translateY(1px); }
    .nav button:disabled { opacity: 0.35; cursor: default; }
    .nav button:focus-visible { outline: 3px solid var(--rose); outline-offset: 2px; }
    .nav .prev { background: var(--paper-2); }
    .nav .next { background: linear-gradient(135deg, var(--gold), var(--rose)); color: var(--night-0); border: none; }
    .dots { display: flex; gap: 0.35rem; }
    .dots .d { width: 8px; height: 8px; border-radius: 50%; background: var(--line); transition: background 0.2s, transform 0.2s; }
    .dots .d.on { background: var(--rose); transform: scale(1.3); }

    .again {
      display: block; width: calc(100% - 2.8rem); margin: 0 1.4rem 1.2rem;
      font-family: 'Fraunces', serif; font-style: italic; font-size: 1.05rem;
      background: none; border: 1.5px dashed var(--ink-soft); color: var(--ink-soft);
      border-radius: 12px; padding: 0.7rem; cursor: pointer;
    }
    .again:hover { background: rgba(122,95,58,0.06); }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition: none !important; }
    }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
  </style>
</head>
<body>
  <canvas id="stars" aria-hidden="true"></canvas>

  <main>
    <!-- SETUP -->
    <section class="setup" id="setup">
      <div class="moon-badge" aria-hidden="true">🌙</div>
      <h1>Bedtime Book</h1>
      <div class="sub">a little story before sleep</div>

      <div class="field">
        <label for="name-in">who is the story about?</label>
        <input type="text" id="name-in" value="Frank" maxlength="18" placeholder="a name" aria-label="Story character name">
      </div>

      <div class="field">
        <label>what kind of creature?</label>
        <div class="chips" id="animal-chips" role="radiogroup" aria-label="Animal"></div>
      </div>

      <div class="field">
        <label>what's their mood tonight?</label>
        <div class="chips" id="mood-chips" role="radiogroup" aria-label="Mood"></div>
      </div>

      <button type="button" class="begin" id="begin">✨ tuck in &amp; begin</button>
    </section>

    <!-- BOOK -->
    <section class="book" id="book" aria-label="Story book">
      <div class="page">
        <div class="illo" id="illo" aria-hidden="true">
          <div class="moon"></div>
          <div class="hills"></div>
          <div class="hero" id="hero">🐶</div>
          <div class="zzz" id="zzz">z z Z</div>
        </div>
        <div class="story-body">
          <div class="pagenum" id="pagenum">page 1</div>
          <div class="story-text" id="story-text" role="status" aria-live="polite"></div>
        </div>
        <div class="nav">
          <button type="button" class="prev" id="prev" aria-label="Previous page">← back</button>
          <div class="dots" id="dots" aria-hidden="true"></div>
          <button type="button" class="next" id="next" aria-label="Next page">turn →</button>
        </div>
        <button type="button" class="again" id="again" hidden>🌟 tell another story</button>
      </div>
    </section>
  </main>

  <script>
  (function(){
    'use strict';

    // ============================================================
    // TWINKLING STAR SKY (canvas)
    // ============================================================
    const sky = document.getElementById('stars');
    const sctx = sky.getContext('2d');
    let SW = 0, SH = 0, stars = [];
    function resizeSky() {
      SW = window.innerWidth; SH = window.innerHeight;
      const dpr = Math.min(2, window.devicePixelRatio || 1);
      sky.width = SW * dpr; sky.height = SH * dpr;
      sky.style.width = SW + 'px'; sky.style.height = SH + 'px';
      sctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      stars = [];
      const n = Math.round((SW * SH) / 9000);
      for (let i = 0; i < n; i++) {
        stars.push({
          x: Math.random() * SW, y: Math.random() * SH,
          r: 0.5 + Math.random() * 1.6,
          base: 0.2 + Math.random() * 0.5,
          amp: 0.3 + Math.random() * 0.5,
          ph: Math.random() * Math.PI * 2,
          sp: 0.4 + Math.random() * 1.2,
          hue: Math.random() < 0.2 ? '253,196,90' : Math.random() < 0.5 ? '255,244,214' : '232,222,255'
        });
      }
    }
    window.addEventListener('resize', resizeSky, { passive: true });
    resizeSky();
    // occasional shooting star
    let shoot = null;
    function maybeShoot(t) {
      if (!shoot && Math.random() < 0.002) {
        shoot = { x: Math.random() * SW * 0.6, y: Math.random() * SH * 0.4, life: 0, dur: 0.8 + Math.random() * 0.5,
                  vx: 380 + Math.random() * 240, vy: 160 + Math.random() * 120 };
      }
    }
    let lastT = performance.now();
    function skyLoop(now) {
      const dt = Math.min(0.05, (now - lastT) / 1000); lastT = now;
      sctx.clearRect(0, 0, SW, SH);
      const t = now / 1000;
      for (const s of stars) {
        const a = s.base + Math.sin(t * s.sp + s.ph) * s.amp;
        sctx.fillStyle = 'rgba(' + s.hue + ',' + Math.max(0, Math.min(1, a)).toFixed(3) + ')';
        sctx.beginPath();
        sctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        sctx.fill();
        // sparkle cross on the brighter ones
        if (s.r > 1.3 && a > 0.7) {
          sctx.strokeStyle = 'rgba(' + s.hue + ',' + (a * 0.5).toFixed(3) + ')';
          sctx.lineWidth = 0.6;
          sctx.beginPath();
          sctx.moveTo(s.x - s.r * 2.4, s.y); sctx.lineTo(s.x + s.r * 2.4, s.y);
          sctx.moveTo(s.x, s.y - s.r * 2.4); sctx.lineTo(s.x, s.y + s.r * 2.4);
          sctx.stroke();
        }
      }
      maybeShoot(t);
      if (shoot) {
        shoot.life += dt;
        const p = shoot.life / shoot.dur;
        if (p >= 1) shoot = null;
        else {
          const x = shoot.x + shoot.vx * shoot.life;
          const y = shoot.y + shoot.vy * shoot.life;
          const grad = sctx.createLinearGradient(x, y, x - shoot.vx * 0.08, y - shoot.vy * 0.08);
          grad.addColorStop(0, 'rgba(255,244,214,' + (1 - p).toFixed(2) + ')');
          grad.addColorStop(1, 'rgba(255,244,214,0)');
          sctx.strokeStyle = grad; sctx.lineWidth = 2; sctx.lineCap = 'round';
          sctx.beginPath();
          sctx.moveTo(x, y); sctx.lineTo(x - shoot.vx * 0.08, y - shoot.vy * 0.08);
          sctx.stroke();
        }
      }
      requestAnimationFrame(skyLoop);
    }
    requestAnimationFrame(skyLoop);

    // ============================================================
    // ANIMALS + MOODS
    // ============================================================
    const ANIMALS = [
      { id: 'dog',      emoji: '🐶', word: 'dog',      sound: 'woof',   trait: 'wagged its tail' },
      { id: 'cat',      emoji: '🐱', word: 'cat',      sound: 'mew',    trait: 'curled into a loaf' },
      { id: 'bunny',    emoji: '🐰', word: 'bunny',    sound: 'sniff',  trait: 'wiggled its nose' },
      { id: 'bear',     emoji: '🐻', word: 'bear',     sound: 'grumf',  trait: 'gave a big stretch' },
      { id: 'fox',      emoji: '🦊', word: 'fox',      sound: 'yip',    trait: 'flicked its bushy tail' },
      { id: 'owl',      emoji: '🦉', word: 'owl',      sound: 'hoo',    trait: 'blinked two round eyes' },
      { id: 'frog',     emoji: '🐸', word: 'frog',     sound: 'ribbit', trait: 'did a little hop' },
      { id: 'penguin',  emoji: '🐧', word: 'penguin',  sound: 'honk',   trait: 'waddled in a circle' },
      { id: 'hedgehog', emoji: '🦔', word: 'hedgehog', sound: 'snuffle',trait: 'rolled into a ball' }
    ];
    const MOODS = [
      { id: 'silly',   emoji: '🤪', word: 'silly',   adj: ['silly', 'goofy', 'giggly'],
        opener: ['who loved telling jokes to the moon', 'who could not stop doing little dances', 'who wore mismatched socks on every paw'] },
      { id: 'sleepy',  emoji: '😴', word: 'sleepy',  adj: ['sleepy', 'cozy', 'yawny'],
        opener: ['who collected the softest blankets in the whole forest', 'who knew the best napping spots for miles', 'who could fall asleep mid-sentence'] },
      { id: 'creepy',  emoji: '👻', word: 'creepy',  adj: ['delightfully spooky', 'pleasantly eerie', 'gently ghostly'],
        opener: ['who kept a jar of friendly fireflies for a nightlight', 'who knew every gentle ghost in the old mossy graveyard by name', 'who liked the cozy shadows better than the bright lights'] },
      { id: 'brave',   emoji: '🦁', word: 'brave',   adj: ['brave', 'bold', 'fearless'],
        opener: ['who was not afraid of the dark', 'who always helped a friend in need', 'who climbed the tallest hill just to wave at the stars'] },
      { id: 'curious', emoji: '🔍', word: 'curious', adj: ['curious', 'wondering', 'inquisitive'],
        opener: ['who asked a hundred questions a day', 'who wanted to know what was behind every door', 'who followed every interesting smell'] },
      { id: 'kind',    emoji: '💛', word: 'kind',    adj: ['kind', 'gentle', 'caring'],
        opener: ['who shared every snack they ever found', 'who tucked in all the littlest creatures at night', 'who always knew exactly what to say'] },
      { id: 'dreamy',  emoji: '🌈', word: 'dreamy',  adj: ['dreamy', 'wandering', 'starry-eyed'],
        opener: ['who liked to imagine castles made of clouds', 'who named all the stars one by one', 'who painted pictures only they could see'] }
    ];
    const PLACES = ['a cozy little burrow under an old oak tree', 'a snug cottage at the edge of a quiet wood',
      'a warm nook beneath a hill of soft moss', 'a tiny house with a round yellow door',
      'a hollow log filled with feathers and leaves', 'a treehouse just big enough for one'];
    const PROPS = ['🍪', '🧸', '🍂', '🌼', '🪁', '🎈', '🐚', '⭐', '🍄'];

    function pick(a){ return a[Math.floor(Math.random() * a.length)]; }

    // ============================================================
    // STORY GENERATOR — 5 gentle pages, ending in sleep
    // ============================================================
    function buildStory(name, animal, mood) {
      const A = animal, M = mood;
      const place = pick(PLACES);
      const opener = pick(M.opener);
      const adj = pick(M.adj);
      const friend = pick(ANIMALS.filter(x => x.id !== A.id));
      const prop = pick(PROPS);
      const N = '<span class="nm">' + name + '</span>';

      // Mood-flavoured middle adventures
      const ADVENTURES = {
        silly: 'That night, ' + N + ' tried to count sheep — but the sheep kept telling jokes, and soon the whole meadow was giggling so hard the grass shook.',
        brave: 'That night, a tiny ' + friend.word + ' got lost in the dark. Without a second thought, ' + N + ' set off with a little lantern to bring them safely home.',
        sleepy: 'That night, ' + N + ' fluffed up every pillow in ' + place.split(' ').slice(-3).join(' ') + ', built the softest nest anyone had ever seen, and sank right in.',
        creepy: 'That night, a soft <span class="em">whoooo</span> drifted down the chimney — but it was only a shy little ghost named Boo, who had lost their way and just wanted somebody to read them a story too.',
        curious: 'That night, ' + N + ' found a glowing little door in the roots of the oak tree. Behind it was a room full of ' + prop + ' — and a sleepy ' + friend.word + ' who waved hello.',
        kind: 'That night, ' + N + ' noticed a small ' + friend.word + ' shivering in the cold, so they shared a blanket, a warm cup of cocoa, and a very long hug.',
        dreamy: 'That night, ' + N + ' lay back in the grass and watched the stars swirl into the shapes of whales and sailboats and one very friendly cloud.'
      };
      const middle = ADVENTURES[M.id] || ADVENTURES.silly;

      const RESOLUTIONS = [
        'And do you know what? Everything turned out just right. ' + N + ' ' + A.trait + ' and smiled a soft, happy smile.',
        'When it was all done, ' + N + ' felt warm all the way to the tips of their toes. "' + A.sound + '," they whispered, which meant <span class="em">thank you, goodnight</span>.',
        'The moon peeked through the window, proud of ' + name + ', and the stars winked one by one as if to say <span class="em">well done, little one</span>.'
      ];
      const resolution = pick(RESOLUTIONS);

      return [
        {
          text: 'Once upon a time, in ' + place + ', there lived a ' + adj + ' little ' + A.word + ' named ' + N + ' — ' + opener + '.',
          hero: A.emoji, sleeping: false, zzz: false, prop: prop
        },
        {
          text: 'Every day was an adventure for ' + N + ' the ' + A.word + '. But the very best part of any day was always, <span class="em">always</span>, the quiet hush of bedtime.',
          hero: A.emoji, sleeping: false, zzz: false, prop: '🌼'
        },
        {
          text: middle,
          hero: A.emoji, sleeping: false, zzz: false, prop: prop
        },
        {
          text: resolution,
          hero: A.emoji, sleeping: false, zzz: false, prop: '⭐'
        },
        {
          text: 'And so ' + N + ' the ' + A.word + ' curled up beneath a blanket of stars, gave one last little yawn, and drifted off to the softest of dreams. <br><br>Goodnight, ' + N + '. 🌙',
          hero: A.emoji, sleeping: true, zzz: true, prop: '🌙'
        }
      ];
    }

    // ============================================================
    // SETUP UI
    // ============================================================
    let chosenAnimal = ANIMALS[0];   // dog
    let chosenMood = MOODS[0];       // silly

    const animalChips = document.getElementById('animal-chips');
    ANIMALS.forEach((a, i) => {
      const b = document.createElement('button');
      b.type = 'button'; b.className = 'chip' + (i === 0 ? ' active' : '');
      b.setAttribute('role', 'radio'); b.setAttribute('aria-checked', i === 0 ? 'true' : 'false');
      b.innerHTML = a.emoji + ' ' + a.word;
      b.addEventListener('click', () => {
        chosenAnimal = a;
        animalChips.querySelectorAll('.chip').forEach((c, j) => { c.classList.toggle('active', j === i); c.setAttribute('aria-checked', j === i ? 'true' : 'false'); });
      });
      animalChips.appendChild(b);
    });

    const moodChips = document.getElementById('mood-chips');
    MOODS.forEach((m, i) => {
      const b = document.createElement('button');
      b.type = 'button'; b.className = 'chip' + (i === 0 ? ' active' : '');
      b.setAttribute('role', 'radio'); b.setAttribute('aria-checked', i === 0 ? 'true' : 'false');
      b.innerHTML = m.emoji + ' ' + m.word;
      b.addEventListener('click', () => {
        chosenMood = m;
        moodChips.querySelectorAll('.chip').forEach((c, j) => { c.classList.toggle('active', j === i); c.setAttribute('aria-checked', j === i ? 'true' : 'false'); });
      });
      moodChips.appendChild(b);
    });

    // ============================================================
    // BOOK NAVIGATION
    // ============================================================
    const setupEl = document.getElementById('setup');
    const bookEl = document.getElementById('book');
    const storyText = document.getElementById('story-text');
    const pagenum = document.getElementById('pagenum');
    const hero = document.getElementById('hero');
    const zzz = document.getElementById('zzz');
    const illo = document.getElementById('illo');
    const dotsEl = document.getElementById('dots');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    const againBtn = document.getElementById('again');

    let pages = [], cur = 0;

    function seedIlloStars() {
      // sprinkle a few twinkling stars + a drifting cloud into the illustration
      illo.querySelectorAll('.il-star, .cloud').forEach(e => e.remove());
      for (let i = 0; i < 9; i++) {
        const s = document.createElement('div');
        s.className = 'il-star';
        s.style.left = (8 + Math.random() * 84) + '%';
        s.style.top = (8 + Math.random() * 48) + '%';
        s.style.animationDelay = (-Math.random() * 3) + 's';
        s.style.animationDuration = (2 + Math.random() * 2.5) + 's';
        illo.insertBefore(s, illo.firstChild);
      }
      const cloud = document.createElement('div');
      cloud.className = 'cloud'; cloud.textContent = '☁️';
      cloud.style.top = (12 + Math.random() * 20) + '%';
      cloud.style.animationDuration = (40 + Math.random() * 30) + 's';
      cloud.style.animationDelay = (-Math.random() * 40) + 's';
      illo.insertBefore(cloud, illo.firstChild);
    }

    function renderPage() {
      const p = pages[cur];
      storyText.innerHTML = p.text;
      pagenum.textContent = 'page ' + (cur + 1) + ' of ' + pages.length;
      hero.textContent = p.hero;
      hero.classList.toggle('sleeping', !!p.sleeping);
      zzz.classList.toggle('on', !!p.zzz);
      // props
      illo.querySelectorAll('.prop').forEach(e => e.remove());
      if (p.prop) {
        const pr = document.createElement('div'); pr.className = 'prop'; pr.textContent = p.prop;
        pr.style.left = (cur % 2 === 0 ? '18%' : '70%');
        illo.appendChild(pr);
      }
      // dots
      dotsEl.querySelectorAll('.d').forEach((d, i) => d.classList.toggle('on', i === cur));
      prevBtn.disabled = cur === 0;
      const last = cur === pages.length - 1;
      nextBtn.style.visibility = last ? 'hidden' : 'visible';
      againBtn.hidden = !last;
    }

    function buildDots() {
      dotsEl.innerHTML = '';
      pages.forEach(() => { const d = document.createElement('div'); d.className = 'd'; dotsEl.appendChild(d); });
    }

    function startStory() {
      const name = (document.getElementById('name-in').value || '').trim().slice(0, 18) || 'Friend';
      pages = buildStory(name, chosenAnimal, chosenMood);
      cur = 0;
      setupEl.style.display = 'none';
      bookEl.classList.add('show');
      seedIlloStars();
      buildDots();
      renderPage();
    }
    document.getElementById('begin').addEventListener('click', startStory);
    nextBtn.addEventListener('click', () => { if (cur < pages.length - 1) { cur++; renderPage(); } });
    prevBtn.addEventListener('click', () => { if (cur > 0) { cur--; renderPage(); } });
    againBtn.addEventListener('click', () => {
      bookEl.classList.remove('show');
      setupEl.style.display = '';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    // keyboard page-turn
    window.addEventListener('keydown', e => {
      if (!bookEl.classList.contains('show')) return;
      if (e.key === 'ArrowRight' && cur < pages.length - 1) { cur++; renderPage(); }
      else if (e.key === 'ArrowLeft' && cur > 0) { cur--; renderPage(); }
    });
  })();
  </script>
</body>
</html>
