<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Barnyard Calc</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%90%84" />
<meta name="description" content="A neon calculator where every key moos, oinks, or quacks. Big red fart button included." />
<meta property="og:title" content="Barnyard Calc" />
<meta property="og:description" content="Neon calculator. Every key moos, oinks, or quacks. The big red FART button is its own kind of math." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://sloppy.live/barnyard-calc/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/Neon%20synthwave%20pocket%20calculator%20glowing%20hot%20pink%20cyan%20and%20yellow%20on%20a%20dark%20barn-wood%20background%2C%20digital%20display%20says%20MOO%2C%20a%20big%20red%20fart%20button%20at%20the%20bottom%2C%20pixel%20art%20farm%20animals%20peeking%20behind%20the%20keys%2C%20cow%20pig%20chicken%2C%20cyberpunk%20barn.png?width=1200&height=630&nologo=true" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=VT323&family=Fredoka:wght@500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0212;
    --bg-2: #1a0626;
    --hay: #2a1a08;
    --neon-pink: #ff3da3;
    --neon-cyan: #5ee0ff;
    --neon-lime: #b6ff3a;
    --neon-yellow: #ffe14a;
    --neon-orange: #ff8a3a;
    --neon-violet: #c47bff;
    --neon-red: #ff3a3a;
    --display: #b6ff3a;
    --display-dim: rgba(182,255,58,0.32);
    --shadow-pink: rgba(255,61,163, 0.5);
    --shadow-cyan: rgba(94,224,255, 0.5);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; }
  body {
    min-height: 100vh;
    background:
      radial-gradient(800px 600px at 30% 0%, rgba(255,61,163,0.16), transparent 65%),
      radial-gradient(700px 500px at 80% 100%, rgba(94,224,255,0.12), transparent 60%),
      linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 70%, #04020a 100%);
    color: #f3e9ff;
    font-family: 'Space Mono', monospace;
    user-select: none;
    -webkit-user-select: none;
    overflow-x: hidden;
    padding: 28px 18px 80px;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,61,163,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(94,224,255,0.04) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(180deg, rgba(0,0,0,0.14) 0 1px, transparent 1px 3px);
    pointer-events: none;
    mix-blend-mode: multiply;
    z-index: 1;
  }

  header {
    position: relative;
    z-index: 2;
    text-align: center;
    margin-bottom: 22px;
  }
  h1 {
    font-family: 'Bungee', sans-serif;
    font-size: clamp(38px, 7vw, 76px);
    line-height: 1;
    letter-spacing: 0.04em;
    color: var(--neon-pink);
    text-shadow:
      0 0 4px var(--neon-pink),
      0 0 18px var(--neon-pink),
      4px 4px 0 var(--bg-2),
      6px 6px 0 var(--neon-cyan);
  }
  h1 em {
    font-style: normal;
    color: var(--neon-cyan);
    text-shadow:
      0 0 4px var(--neon-cyan),
      0 0 18px var(--neon-cyan),
      4px 4px 0 var(--bg-2),
      6px 6px 0 var(--neon-pink);
  }
  .tag {
    margin-top: 10px;
    font-family: 'Fredoka', sans-serif;
    font-style: italic;
    font-weight: 500;
    color: var(--neon-yellow);
    letter-spacing: 0.18em;
    font-size: clamp(11px, 1.6vw, 13px);
    text-shadow: 0 0 8px rgba(255,225,74,0.5);
  }

  .frame {
    position: relative;
    z-index: 2;
    max-width: 460px;
    margin: 0 auto;
    background: linear-gradient(180deg, #1d0726, #110318);
    border: 2px solid var(--neon-pink);
    border-radius: 28px;
    padding: 22px;
    box-shadow:
      0 0 0 4px #1d0726,
      0 0 24px var(--shadow-pink),
      0 0 60px rgba(94,224,255,0.18),
      inset 0 0 36px rgba(0,0,0,0.45);
  }

  .display-wrap {
    background: #050108;
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 18px;
    border: 1px solid #2a0a3a;
    box-shadow: inset 0 0 22px rgba(0,0,0,0.65), 0 0 12px rgba(255,61,163,0.14);
    position: relative;
    overflow: hidden;
  }
  .display-wrap::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(180deg, rgba(0,0,0,0.18) 0 1px, transparent 1px 3px);
    mix-blend-mode: multiply;
    opacity: 0.55;
  }
  .expr {
    font-family: 'VT323', monospace;
    font-size: 18px;
    letter-spacing: 0.12em;
    color: var(--display-dim);
    text-align: right;
    min-height: 22px;
    word-break: break-all;
  }
  .display {
    font-family: 'VT323', monospace;
    font-size: 56px;
    line-height: 1;
    color: var(--display);
    text-align: right;
    text-shadow: 0 0 8px rgba(182,255,58,0.7), 0 0 22px rgba(182,255,58,0.4);
    word-break: break-all;
    margin-top: 6px;
    transition: color 0.2s;
  }
  .display.error {
    color: var(--neon-red);
    text-shadow: 0 0 10px var(--neon-red);
    font-size: 38px;
  }
  .display.farm {
    color: var(--neon-yellow);
    text-shadow: 0 0 10px var(--neon-yellow);
  }
  .anim-tag {
    position: absolute;
    bottom: 8px;
    left: 14px;
    font-family: 'Fredoka', sans-serif;
    font-size: 11px;
    color: var(--neon-cyan);
    text-shadow: 0 0 8px rgba(94,224,255,0.6);
    letter-spacing: 0.14em;
    opacity: 0;
    transition: opacity 0.4s;
  }
  .anim-tag.show {
    opacity: 0.9;
  }

  .keys {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .key {
    aspect-ratio: 1.05 / 1;
    background: linear-gradient(180deg, #220a30, #14041e);
    border: 1px solid rgba(255,61,163,0.32);
    color: #fff;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 26px;
    cursor: pointer;
    border-radius: 14px;
    position: relative;
    overflow: hidden;
    transition: transform 0.08s ease, box-shadow 0.18s ease, border-color 0.18s;
    text-shadow: 0 1px 0 rgba(0,0,0,0.6);
    box-shadow: 0 4px 0 #08010f, inset 0 1px 0 rgba(255,255,255,0.08);
  }
  .key:hover {
    border-color: var(--neon-pink);
    box-shadow: 0 4px 0 #08010f, 0 0 16px rgba(255,61,163,0.5), inset 0 1px 0 rgba(255,255,255,0.12);
  }
  .key:active, .key.pressed {
    transform: translateY(2px);
    box-shadow: 0 2px 0 #08010f, 0 0 22px rgba(255,61,163,0.65), inset 0 0 14px rgba(255,61,163,0.3);
  }
  .key .anim {
    position: absolute;
    bottom: 4px;
    left: 0; right: 0;
    text-align: center;
    font-family: 'VT323', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: rgba(94,224,255,0.6);
    pointer-events: none;
  }
  .key.op {
    color: var(--neon-cyan);
    text-shadow: 0 0 6px var(--shadow-cyan);
    border-color: rgba(94,224,255,0.45);
    background: linear-gradient(180deg, #0a1a26, #06101a);
  }
  .key.op:hover {
    border-color: var(--neon-cyan);
    box-shadow: 0 4px 0 #03060a, 0 0 16px rgba(94,224,255,0.55), inset 0 1px 0 rgba(255,255,255,0.12);
  }
  .key.op:active, .key.op.pressed {
    box-shadow: 0 2px 0 #03060a, 0 0 22px rgba(94,224,255,0.7), inset 0 0 14px rgba(94,224,255,0.35);
  }
  .key.fn {
    color: var(--neon-yellow);
    text-shadow: 0 0 6px rgba(255,225,74,0.6);
    border-color: rgba(255,225,74,0.4);
    background: linear-gradient(180deg, #2a1a04, #18100a);
    font-size: 22px;
  }
  .key.fn:hover {
    border-color: var(--neon-yellow);
    box-shadow: 0 4px 0 #08050a, 0 0 18px rgba(255,225,74,0.55), inset 0 1px 0 rgba(255,255,255,0.12);
  }
  .key.eq {
    color: #fff;
    background: linear-gradient(180deg, #ff3da3, #b8166f);
    border-color: var(--neon-pink);
    text-shadow: 0 0 8px rgba(255,255,255,0.5), 0 1px 0 #6b0a3a;
    box-shadow: 0 4px 0 #5a0e30, 0 0 22px rgba(255,61,163,0.6), inset 0 1px 0 rgba(255,255,255,0.18);
  }
  .key.eq:hover {
    box-shadow: 0 4px 0 #5a0e30, 0 0 30px rgba(255,61,163,0.85), inset 0 1px 0 rgba(255,255,255,0.22);
  }
  .key.eq:active, .key.eq.pressed {
    transform: translateY(2px);
    box-shadow: 0 2px 0 #5a0e30, 0 0 30px rgba(255,61,163,0.9), inset 0 0 16px rgba(255,255,255,0.2);
  }

  /* fart button — separate row, full width and big */
  .fart-row {
    margin-top: 14px;
  }
  .fart-btn {
    width: 100%;
    height: 76px;
    background: linear-gradient(180deg, #ff5a3a, #c8240e);
    border: 2px solid #ff8a3a;
    border-radius: 16px;
    color: #fff;
    font-family: 'Bungee', sans-serif;
    font-size: 32px;
    letter-spacing: 0.16em;
    cursor: pointer;
    text-shadow: 0 0 10px rgba(255,255,255,0.55), 2px 2px 0 #6a0d04;
    box-shadow:
      0 5px 0 #5a0a04,
      0 0 24px rgba(255,138,58,0.55),
      inset 0 1px 0 rgba(255,255,255,0.22);
    transition: transform 0.08s ease, box-shadow 0.2s ease;
    position: relative;
    overflow: hidden;
  }
  .fart-btn::before {
    content: '💨';
    position: absolute;
    left: 18px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 36px;
    filter: grayscale(0.2);
    opacity: 0.85;
  }
  .fart-btn::after {
    content: '💨';
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%) scaleX(-1);
    font-size: 36px;
    opacity: 0.85;
  }
  .fart-btn:hover {
    box-shadow:
      0 5px 0 #5a0a04,
      0 0 36px rgba(255,138,58,0.85),
      inset 0 1px 0 rgba(255,255,255,0.28);
  }
  .fart-btn:active, .fart-btn.pressed {
    transform: translateY(3px);
    box-shadow:
      0 2px 0 #5a0a04,
      0 0 36px rgba(255,138,58,0.85),
      inset 0 0 18px rgba(255,255,255,0.22);
  }

  .legend {
    margin-top: 18px;
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: rgba(243,233,255,0.4);
  }
  .legend span {
    color: var(--neon-yellow);
  }
  .mute {
    position: absolute;
    top: 12px;
    right: 14px;
    background: transparent;
    color: rgba(243,233,255,0.55);
    border: 1px solid rgba(243,233,255,0.18);
    border-radius: 6px;
    padding: 4px 8px;
    font-family: 'VT323', monospace;
    font-size: 13px;
    letter-spacing: 0.18em;
    cursor: pointer;
    transition: all 0.15s;
    z-index: 3;
  }
  .mute:hover {
    color: var(--neon-pink);
    border-color: var(--neon-pink);
  }

  /* hovering animals around the frame for vibe */
  .creatures {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }
  .crit {
    position: absolute;
    font-size: 28px;
    opacity: 0.42;
    animation: critFloat 7s ease-in-out infinite;
  }
  .crit:nth-child(1) { top: 10%; left: -32px; animation-delay: 0s; }
  .crit:nth-child(2) { top: 60%; right: -30px; animation-delay: 1.2s; font-size: 32px; }
  .crit:nth-child(3) { bottom: 10%; left: -28px; animation-delay: 2.4s; font-size: 24px; }
  .crit:nth-child(4) { top: 18%; right: -24px; animation-delay: 3.6s; font-size: 22px; }
  @keyframes critFloat {
    0%, 100% { transform: translateY(0) rotate(-4deg); }
    50%      { transform: translateY(-14px) rotate(4deg); }
  }

  /* burst when an animal sound plays */
  .burst {
    position: absolute;
    pointer-events: none;
    font-family: 'Bungee', sans-serif;
    font-size: 22px;
    color: var(--neon-yellow);
    text-shadow: 0 0 12px var(--neon-yellow), 2px 2px 0 var(--bg-2);
    z-index: 12;
    animation: burst 1.05s ease-out forwards;
    letter-spacing: 0.1em;
  }
  @keyframes burst {
    0%   { transform: translate(-50%, 0) scale(0.5); opacity: 0; }
    20%  { transform: translate(-50%, -8px) scale(1.18); opacity: 1; }
    100% { transform: translate(-50%, -88px) scale(0.85); opacity: 0; }
  }

  @media (max-width: 460px) {
    .frame { padding: 16px; }
    .key { font-size: 22px; border-radius: 12px; gap: 6px; }
    .display { font-size: 44px; }
    h1 { font-size: 38px; text-shadow: 0 0 4px var(--neon-pink), 0 0 14px var(--neon-pink), 3px 3px 0 var(--bg-2), 5px 5px 0 var(--neon-cyan); }
    h1 em { text-shadow: 0 0 4px var(--neon-cyan), 0 0 14px var(--neon-cyan), 3px 3px 0 var(--bg-2), 5px 5px 0 var(--neon-pink); }
    .fart-btn { font-size: 26px; height: 68px; }
    .key .anim { font-size: 9px; }
  }

</style>
</head>
<body>

<header>
  <h1>Barn<em>·</em>yard<em>·</em>Calc</h1>
  <div class="tag">— EVERY KEY MOOS · FART BUTTON IS NON-NEGOTIABLE —</div>
</header>

<div class="frame">
  <div class="creatures">
    <div class="crit">🐄</div>
    <div class="crit">🐖</div>
    <div class="crit">🐔</div>
    <div class="crit">🐑</div>
  </div>
  <button class="mute" id="muteBtn">♪ ON</button>

  <div class="display-wrap">
    <div class="expr" id="expr">&nbsp;</div>
    <div class="display" id="disp">0</div>
    <div class="anim-tag" id="animTag"></div>
  </div>

  <div class="keys" id="keys">
    <button class="key fn" data-k="AC">AC<span class="anim">rooster</span></button>
    <button class="key fn" data-k="±">±<span class="anim">goat</span></button>
    <button class="key fn" data-k="%">%<span class="anim">sheep</span></button>
    <button class="key op" data-k="/">÷<span class="anim">duck</span></button>

    <button class="key" data-k="7">7<span class="anim">rooster</span></button>
    <button class="key" data-k="8">8<span class="anim">donkey</span></button>
    <button class="key" data-k="9">9<span class="anim">cow²</span></button>
    <button class="key op" data-k="*">×<span class="anim">pig</span></button>

    <button class="key" data-k="4">4<span class="anim">cow</span></button>
    <button class="key" data-k="5">5<span class="anim">horse</span></button>
    <button class="key" data-k="6">6<span class="anim">goat</span></button>
    <button class="key op" data-k="-">−<span class="anim">sheep</span></button>

    <button class="key" data-k="1">1<span class="anim">chicken</span></button>
    <button class="key" data-k="2">2<span class="anim">duck</span></button>
    <button class="key" data-k="3">3<span class="anim">sheep</span></button>
    <button class="key op" data-k="+">+<span class="anim">cow</span></button>

    <button class="key" data-k="0" style="grid-column: span 2; aspect-ratio: 2.18 / 1;">0<span class="anim">pig</span></button>
    <button class="key" data-k=".">.<span class="anim">peep</span></button>
    <button class="key eq" data-k="=">=<span class="anim">moo!</span></button>
  </div>

  <div class="fart-row">
    <button class="fart-btn" id="fartBtn">FART</button>
  </div>

  <div class="legend">
    keyboard works · <span>F</span> fart · <span>ENTER</span> = · <span>BACKSPACE</span> del
  </div>
</div>

<script>
(() => {
  const $ = id => document.getElementById(id);
  const expr = $('expr'), disp = $('disp'), animTag = $('animTag');
  const fartBtn = $('fartBtn'), muteBtn = $('muteBtn');
  let buffer = '';
  let last = null;
  let resultShown = false;
  let muted = false;

  // ============ AUDIO ============
  let actx = null;
  function ac(){
    if(!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    return actx;
  }

  // helper: simple gain envelope
  function envGain(a, attack, sustain, release, peak){
    const g = a.createGain();
    g.gain.value = 0;
    const t0 = a.currentTime;
    g.gain.linearRampToValueAtTime(peak, t0 + attack);
    g.gain.linearRampToValueAtTime(peak, t0 + attack + sustain);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + attack + sustain + release);
    return g;
  }

  // ============ ANIMAL SYNTHS ============
  function playMoo(variant=0){
    if(muted) return;
    const a = ac();
    const t0 = a.currentTime;
    const o = a.createOscillator();
    o.type = 'sawtooth';
    const baseFreq = variant === 0 ? 96 : 124;
    o.frequency.setValueAtTime(baseFreq * 0.85, t0);
    o.frequency.linearRampToValueAtTime(baseFreq, t0 + 0.1);
    o.frequency.linearRampToValueAtTime(baseFreq * 0.92, t0 + 0.7);
    // vibrato
    const lfo = a.createOscillator();
    lfo.frequency.value = 5.5;
    const lfoG = a.createGain();
    lfoG.gain.value = 4;
    lfo.connect(lfoG);
    lfoG.connect(o.frequency);
    lfo.start();
    lfo.stop(t0 + 0.85);
    const lp = a.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = 800;
    lp.Q.value = 1.4;
    const g = envGain(a, 0.05, 0.55, 0.25, 0.22);
    o.connect(lp).connect(g).connect(a.destination);
    o.start();
    o.stop(t0 + 0.9);
  }
  function playOink(){
    if(muted) return;
    const a = ac();
    const t0 = a.currentTime;
    // 2 short bursts
    for(let n=0; n<2; n++){
      const start = t0 + n * 0.13;
      const o = a.createOscillator();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(220, start);
      o.frequency.exponentialRampToValueAtTime(420, start + 0.04);
      o.frequency.exponentialRampToValueAtTime(140, start + 0.1);
      const bp = a.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = 900;
      bp.Q.value = 4;
      const g = a.createGain();
      g.gain.setValueAtTime(0, start);
      g.gain.linearRampToValueAtTime(0.18, start + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, start + 0.12);
      o.connect(bp).connect(g).connect(a.destination);
      o.start(start);
      o.stop(start + 0.13);
    }
  }
  function playBawk(){
    if(muted) return;
    const a = ac();
    const t0 = a.currentTime;
    const beats = [0, 0.08, 0.18];
    beats.forEach((dt, i) => {
      const o = a.createOscillator();
      o.type = 'square';
      const f = 800 + i * 60;
      o.frequency.setValueAtTime(f, t0 + dt);
      o.frequency.exponentialRampToValueAtTime(420, t0 + dt + 0.06);
      const bp = a.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = 1400;
      bp.Q.value = 2.5;
      const g = a.createGain();
      g.gain.setValueAtTime(0, t0 + dt);
      g.gain.linearRampToValueAtTime(0.13, t0 + dt + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, t0 + dt + 0.07);
      o.connect(bp).connect(g).connect(a.destination);
      o.start(t0 + dt);
      o.stop(t0 + dt + 0.08);
    });
  }
  function playQuack(){
    if(muted) return;
    const a = ac();
    const t0 = a.currentTime;
    const o = a.createOscillator();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(280, t0);
    o.frequency.linearRampToValueAtTime(180, t0 + 0.16);
    const bp = a.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = 1500;
    bp.Q.value = 5;
    const g = envGain(a, 0.005, 0.12, 0.06, 0.2);
    o.connect(bp).connect(g).connect(a.destination);
    o.start();
    o.stop(t0 + 0.2);
  }
  function playBaa(quick=false){
    if(muted) return;
    const a = ac();
    const t0 = a.currentTime;
    const dur = quick ? 0.4 : 0.65;
    const o = a.createOscillator();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(quick ? 320 : 220, t0);
    o.frequency.linearRampToValueAtTime(quick ? 280 : 200, t0 + dur);
    const lfo = a.createOscillator();
    lfo.frequency.value = quick ? 18 : 12;
    const lfoG = a.createGain();
    lfoG.gain.value = quick ? 14 : 9;
    lfo.connect(lfoG);
    lfoG.connect(o.frequency);
    lfo.start();
    lfo.stop(t0 + dur);
    const lp = a.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = 1200;
    const g = envGain(a, 0.04, dur - 0.18, 0.14, 0.18);
    o.connect(lp).connect(g).connect(a.destination);
    o.start();
    o.stop(t0 + dur + 0.2);
  }
  function playNeigh(){
    if(muted) return;
    const a = ac();
    const t0 = a.currentTime;
    const o = a.createOscillator();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(420, t0);
    o.frequency.linearRampToValueAtTime(700, t0 + 0.15);
    o.frequency.linearRampToValueAtTime(380, t0 + 0.55);
    o.frequency.linearRampToValueAtTime(180, t0 + 0.9);
    const lfo = a.createOscillator();
    lfo.frequency.value = 16;
    const lfoG = a.createGain();
    lfoG.gain.value = 22;
    lfo.connect(lfoG);
    lfoG.connect(o.frequency);
    lfo.start();
    lfo.stop(t0 + 0.95);
    const lp = a.createBiquadFilter();
    lp.type = 'lowpass';
    lp.frequency.value = 1600;
    lp.Q.value = 2;
    const g = envGain(a, 0.03, 0.7, 0.2, 0.16);
    o.connect(lp).connect(g).connect(a.destination);
    o.start();
    o.stop(t0 + 1);
  }
  function playCrow(){
    if(muted) return;
    const a = ac();
    const t0 = a.currentTime;
    // cock-a-doodle-doo: 4 notes
    const notes = [
      { f: 520, dt: 0,    dur: 0.13, type: 'sawtooth' },
      { f: 720, dt: 0.16, dur: 0.13, type: 'sawtooth' },
      { f: 460, dt: 0.34, dur: 0.18, type: 'sawtooth' },
      { f: 380, dt: 0.55, dur: 0.34, type: 'sawtooth' },
    ];
    notes.forEach(n => {
      const o = a.createOscillator();
      o.type = n.type;
      o.frequency.setValueAtTime(n.f, t0 + n.dt);
      o.frequency.linearRampToValueAtTime(n.f * 0.9, t0 + n.dt + n.dur);
      const lp = a.createBiquadFilter();
      lp.type = 'bandpass';
      lp.frequency.value = 1200;
      lp.Q.value = 2;
      const g = a.createGain();
      g.gain.setValueAtTime(0, t0 + n.dt);
      g.gain.linearRampToValueAtTime(0.17, t0 + n.dt + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t0 + n.dt + n.dur);
      o.connect(lp).connect(g).connect(a.destination);
      o.start(t0 + n.dt);
      o.stop(t0 + n.dt + n.dur);
    });
  }
  function playHeeHaw(){
    if(muted) return;
    const a = ac();
    const t0 = a.currentTime;
    // hee
    const o1 = a.createOscillator();
    o1.type = 'sawtooth';
    o1.frequency.setValueAtTime(540, t0);
    o1.frequency.linearRampToValueAtTime(420, t0 + 0.3);
    const g1 = envGain(a, 0.02, 0.26, 0.1, 0.18);
    const lp1 = a.createBiquadFilter();
    lp1.type = 'lowpass';
    lp1.frequency.value = 1500;
    o1.connect(lp1).connect(g1).connect(a.destination);
    o1.start();
    o1.stop(t0 + 0.4);
    // haw
    const o2 = a.createOscillator();
    o2.type = 'sawtooth';
    o2.frequency.setValueAtTime(220, t0 + 0.32);
    o2.frequency.linearRampToValueAtTime(140, t0 + 0.7);
    const g2 = a.createGain();
    g2.gain.setValueAtTime(0, t0 + 0.32);
    g2.gain.linearRampToValueAtTime(0.2, t0 + 0.36);
    g2.gain.linearRampToValueAtTime(0.18, t0 + 0.6);
    g2.gain.exponentialRampToValueAtTime(0.001, t0 + 0.78);
    const lp2 = a.createBiquadFilter();
    lp2.type = 'lowpass';
    lp2.frequency.value = 900;
    o2.connect(lp2).connect(g2).connect(a.destination);
    o2.start(t0 + 0.32);
    o2.stop(t0 + 0.8);
  }
  function playPeep(){
    if(muted) return;
    const a = ac();
    const t0 = a.currentTime;
    // baby chick peep
    const o = a.createOscillator();
    o.type = 'sine';
    o.frequency.setValueAtTime(1400, t0);
    o.frequency.linearRampToValueAtTime(1900, t0 + 0.06);
    o.frequency.linearRampToValueAtTime(1500, t0 + 0.12);
    const g = envGain(a, 0.01, 0.07, 0.04, 0.15);
    o.connect(g).connect(a.destination);
    o.start();
    o.stop(t0 + 0.14);
  }

  // FART (the main attraction)
  function playFart(level=1){
    if(muted) return;
    const a = ac();
    const t0 = a.currentTime;
    // bandpass-noise rumble with pitch wobble
    const dur = 0.45 + Math.random() * 0.5 + level*0.15;
    const buf = a.createBuffer(1, Math.floor(a.sampleRate * dur), a.sampleRate);
    const data = buf.getChannelData(0);
    for(let i=0; i<data.length; i++){
      const t = i / a.sampleRate;
      // wobble: lfo amplitude
      const wobble = 0.7 + Math.sin(t * 28 + Math.sin(t*8)*1.4) * 0.3;
      data[i] = (Math.random()*2-1) * wobble * Math.pow(1 - i/data.length, 0.6);
    }
    const src = a.createBufferSource();
    src.buffer = buf;
    const bp = a.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.setValueAtTime(220, t0);
    bp.frequency.linearRampToValueAtTime(380, t0 + dur*0.4);
    bp.frequency.linearRampToValueAtTime(140, t0 + dur);
    bp.Q.value = 3.4;
    const g = a.createGain();
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(0.3, t0 + 0.02);
    g.gain.linearRampToValueAtTime(0.22, t0 + dur*0.5);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    src.connect(bp).connect(g).connect(a.destination);
    src.start();

    // sub thump for body
    const sub = a.createOscillator();
    sub.type = 'sawtooth';
    sub.frequency.setValueAtTime(70, t0);
    sub.frequency.linearRampToValueAtTime(40, t0 + dur);
    // tremolo
    const lfo = a.createOscillator();
    lfo.frequency.value = 14 + Math.random()*8;
    const lfoG = a.createGain();
    lfoG.gain.value = 12;
    lfo.connect(lfoG);
    lfoG.connect(sub.frequency);
    lfo.start();
    lfo.stop(t0 + dur);
    const sg = a.createGain();
    sg.gain.setValueAtTime(0, t0);
    sg.gain.linearRampToValueAtTime(0.18, t0 + 0.04);
    sg.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    sub.connect(sg).connect(a.destination);
    sub.start();
    sub.stop(t0 + dur);
  }

  // map digit keys to animal sounds
  const KEY_ANIMAL = {
    '0': () => playOink(),
    '1': () => playBawk(),
    '2': () => playQuack(),
    '3': () => playBaa(false),
    '4': () => playMoo(0),
    '5': () => playNeigh(),
    '6': () => playBaa(true),       // goat = quick baa
    '7': () => playCrow(),
    '8': () => playHeeHaw(),
    '9': () => playMoo(1),
    '.': () => playPeep(),
    '+': () => playMoo(0),
    '-': () => playBaa(false),
    '*': () => playOink(),
    '/': () => playQuack(),
    '=': () => playMoo(1),
    'AC': () => playCrow(),
    '±': () => playBaa(true),
    '%': () => playBaa(false),
  };
  const KEY_NAME = {
    '0': 'PIG · OINK',
    '1': 'CHICKEN · BAWK',
    '2': 'DUCK · QUACK',
    '3': 'SHEEP · BAAA',
    '4': 'COW · MOOO',
    '5': 'HORSE · NEIGH',
    '6': 'GOAT · BLEAT',
    '7': 'ROOSTER · CROW',
    '8': 'DONKEY · HEE-HAW',
    '9': 'COW · MOOO!',
    '.': 'CHICK · PEEP',
    '+': 'COW · MOOO',
    '-': 'SHEEP · BAAA',
    '*': 'PIG · OINK',
    '/': 'DUCK · QUACK',
    '=': 'COW · MOOO!',
    'AC': 'ROOSTER · CROW',
    '±': 'GOAT · BLEAT',
    '%': 'SHEEP · BAAA',
  };

  // ============ UI: speech bursts ============
  function critterBurst(text, x, y, color){
    const b = document.createElement('div');
    b.className = 'burst';
    b.textContent = text;
    b.style.left = x + 'px';
    b.style.top = y + 'px';
    b.style.color = color || '';
    document.body.appendChild(b);
    setTimeout(() => b.remove(), 1100);
  }

  function showAnim(label){
    animTag.textContent = '※ ' + label;
    animTag.classList.add('show');
    clearTimeout(animTag._t);
    animTag._t = setTimeout(() => animTag.classList.remove('show'), 900);
  }

  // burst text dictionary per key
  const BURSTS = {
    '0': ['oink!', 'oinkoink', 'snort'],
    '1': ['bawk!', 'cluck'],
    '2': ['quack!', 'quack-quack'],
    '3': ['baaaa', 'baa-baa'],
    '4': ['mooooo', 'MOO!'],
    '5': ['neeeigh', 'neigh!'],
    '6': ['baa!', 'meeeh'],
    '7': ['cock-a-doodle-DOO!', 'cocka-doo'],
    '8': ['hee-HAW!', 'EEE-OOR'],
    '9': ['MOOO!', 'mooo-uh'],
    '.': ['peep', 'peep!'],
    '+': ['mooo', '+ moo'],
    '-': ['baaa-', '- baa'],
    '*': ['oink×oink', '× oink'],
    '/': ['quack÷quack', '÷ quack'],
    '=': ['MOOO!', '= moo!'],
    'AC': ['COCK·A·DOODLE!', 'cleared!'],
    '±': ['flippity-baa', '± baa'],
    '%': ['baa%baa', 'percenti-baa'],
  };
  const FART_LINES = [
    'PFFFRRT', 'PHWWWWP', 'BLBLBLBLBL',
    'PRRRRT', 'thbbbbpp', 'TOOT!', 'PHHHH',
    'BUUUURP no wait', 'pppppttt',
  ];

  // ============ CALCULATOR LOGIC ============
  function safeEval(s){
    if(!/^[\d+\-*/().% \s]*$/.test(s)) throw new Error('bad chars');
    if(/[*/+\-%.]{3,}/.test(s)) throw new Error('runaway op');
    if(s.trim() === '') return 0;
    // Replace bare % with /100 for percent semantics like x% = x/100
    // But keep mod-style "a%b" by checking left side has digits and right is ws
    // Simpler approach: if expression ends with %, treat as /100
    let work = s.replace(/(\d+(?:\.\d+)?)%/g, '($1/100)');
    return Function('"use strict"; return (' + work + ')')();
  }
  function fmt(n){
    if(typeof n !== 'number' || !isFinite(n)) return 'BAA?';
    if(Number.isInteger(n)) return String(n);
    // limit precision
    return parseFloat(n.toFixed(8)).toString();
  }

  function setDisp(text, kind){
    disp.classList.remove('error', 'farm');
    if(kind === 'err') disp.classList.add('error');
    if(kind === 'farm') disp.classList.add('farm');
    disp.textContent = text;
  }

  function press(k){
    if(k === 'AC'){
      buffer = '';
      expr.textContent = '\u00a0';
      setDisp('0');
      resultShown = false;
    } else if(k === '='){
      if(!buffer){
        setDisp('moo?', 'farm');
        return;
      }
      try {
        const v = safeEval(buffer);
        expr.textContent = buffer + ' =';
        setDisp(fmt(v));
        resultShown = true;
        buffer = isFinite(v) ? String(v) : '';
      } catch(e){
        setDisp('SYNTAX MOO', 'err');
        resultShown = true;
      }
    } else if(k === '±'){
      // negate the current number
      if(resultShown){
        const v = parseFloat(buffer);
        if(!isNaN(v)){
          buffer = String(-v);
          setDisp(buffer);
        }
        resultShown = false;
      } else {
        // toggle a leading minus on the latest number token
        const m = buffer.match(/(.*?)(-?\d*\.?\d*)$/);
        if(m){
          const head = m[1], num = m[2];
          if(num.startsWith('-')) buffer = head + num.slice(1);
          else buffer = head + '-' + num;
          updateLive();
        }
      }
    } else if(k === '%'){
      // append %
      if(resultShown){
        buffer = buffer + '%';
        resultShown = false;
      } else if(buffer.length){
        buffer = buffer + '%';
      }
      updateLive();
    } else if(/[\d.]/.test(k)){
      if(resultShown){
        buffer = '';
        resultShown = false;
      }
      // prevent multiple dots in current number
      if(k === '.'){
        const m = buffer.match(/(\d+\.?\d*)$/);
        if(m && m[1].includes('.')) return;
        if(!buffer.length || /[+\-*/]$/.test(buffer)) buffer += '0';
      }
      buffer += k;
      updateLive();
    } else if(/[+\-*/]/.test(k)){
      // operator
      if(resultShown){
        resultShown = false;
      }
      if(buffer.length === 0){
        if(k === '-') { buffer = '-'; updateLive(); }
        return;
      }
      // collapse consecutive operators (replace last)
      if(/[+\-*/]$/.test(buffer)){
        buffer = buffer.slice(0, -1) + k;
      } else {
        buffer += k;
      }
      updateLive();
    }
  }

  function updateLive(){
    expr.textContent = (buffer || '').replace(/\*/g, '×').replace(/\//g, '÷').replace(/-/g, '−') || '\u00a0';
    // try live preview if expression parses
    try {
      // strip trailing operator
      const trimmed = buffer.replace(/[+\-*/.]+$/, '');
      if(trimmed.length){
        const v = safeEval(trimmed);
        if(isFinite(v)) setDisp(fmt(v));
      } else {
        setDisp('0');
      }
    } catch(e){
      // keep last display
    }
  }

  function pressKey(k){
    // unlock audio
    try { ac().resume(); } catch(e){}
    press(k);
    // sound + burst
    const fn = KEY_ANIMAL[k];
    if(fn) fn();
    const name = KEY_NAME[k];
    if(name) showAnim(name);
    const lines = BURSTS[k];
    if(lines){
      const word = lines[Math.floor(Math.random()*lines.length)];
      // burst near the key element
      const btn = document.querySelector(`.key[data-k="${cssEscape(k)}"]`);
      if(btn){
        const r = btn.getBoundingClientRect();
        critterBurst(word, r.left + r.width/2, r.top - 8 + window.scrollY,
          k === '=' ? '#ff3da3' : (KEY_NAME[k] && KEY_NAME[k].includes('COW') ? '#ffe14a' : '#5ee0ff'));
      }
    }
    // visual press flash
    const btn = document.querySelector(`.key[data-k="${cssEscape(k)}"]`);
    if(btn){
      btn.classList.add('pressed');
      setTimeout(() => btn.classList.remove('pressed'), 130);
    }
  }
  function cssEscape(s){
    return s.replace(/(["\\])/g, '\\$1');
  }

  // wire up keys
  document.querySelectorAll('.key').forEach(btn => {
    btn.addEventListener('click', () => pressKey(btn.dataset.k));
  });

  // FART
  function fart(){
    try { ac().resume(); } catch(e){}
    const intensity = 0.6 + Math.random() * 1.0;
    playFart(intensity);
    const word = FART_LINES[Math.floor(Math.random()*FART_LINES.length)];
    const r = fartBtn.getBoundingClientRect();
    critterBurst(word, r.left + r.width/2, r.top + window.scrollY - 4, '#ff8a3a');
    // sometimes the calculator gets a "fart math" event
    const r2 = Math.random();
    if(r2 < 0.18){
      // replace display with funny non-number
      const fartAns = ['💨', 'FART', 'POOT', 'MOO?!', '∞', 'HOT', 'NaH'];
      setDisp(fartAns[Math.floor(Math.random()*fartAns.length)], 'farm');
      buffer = '';
      resultShown = true;
      expr.textContent = 'fart override';
    } else if(r2 < 0.45){
      // append a random digit (the fart "thinks" of a number)
      const d = Math.floor(Math.random()*10);
      press(String(d));
      // play that digit's animal too — the fart provoked a chorus
      const fn = KEY_ANIMAL[String(d)];
      if(fn) setTimeout(fn, 220);
    }
    fartBtn.classList.add('pressed');
    setTimeout(() => fartBtn.classList.remove('pressed'), 180);
    // shake the frame slightly
    const frame = document.querySelector('.frame');
    frame.animate([
      { transform: 'translate(0, 0) rotate(0)' },
      { transform: 'translate(-3px, 1px) rotate(-0.3deg)' },
      { transform: 'translate(3px, -2px) rotate(0.4deg)' },
      { transform: 'translate(-2px, 2px) rotate(-0.2deg)' },
      { transform: 'translate(0, 0) rotate(0)' },
    ], { duration: 360, easing: 'ease-out' });
  }
  fartBtn.addEventListener('click', fart);

  // mute
  muteBtn.addEventListener('click', () => {
    muted = !muted;
    muteBtn.textContent = muted ? '♪ OFF' : '♪ ON';
  });

  // keyboard
  document.addEventListener('keydown', e => {
    let k = e.key;
    if(k >= '0' && k <= '9') { pressKey(k); return; }
    if(k === '.' || k === ',') { pressKey('.'); return; }
    if(k === '+' || k === '-' || k === '*' || k === '/') { pressKey(k); return; }
    if(k === '%') { pressKey('%'); return; }
    if(k === '=' || k === 'Enter') { pressKey('='); e.preventDefault(); return; }
    if(k === 'Escape' || k === 'Delete') { pressKey('AC'); return; }
    if(k === 'Backspace'){
      if(buffer.length){
        buffer = buffer.slice(0, -1);
        updateLive();
      }
      return;
    }
    if(k === 'f' || k === 'F'){ fart(); return; }
  });

  // initial
  setDisp('0');
  expr.textContent = '\u00a0';
})();
</script>
</body>
</html>
