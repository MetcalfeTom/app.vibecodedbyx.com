<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Hover Rush</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#060218">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%9A%80">
<meta name="description" content="Wipeout-style hover-craft racer rendered in pseudo-3D segments. Bank into neon-rimmed curves, hit boost pads, chase your best lap across 3 laps of the synthwave grid.">
<meta property="og:title" content="Hover Rush">
<meta property="og:description" content="Wipeout-style hover-craft racer rendered in pseudo-3D segments. Bank into neon-rimmed curves, hit boost pads, chase your best lap across 3 laps of the synthwave grid.">
<meta property="og:url" content="https://sloppy.live/hover-rush">
<meta property="og:image" content="https://image.pollinations.ai/prompt/wipeout%20style%20hovercraft%20racing%20on%20neon%20synthwave%20grid%20track%2C%20pink%20cyan%20sun%2C%20chrome%20ship%2C%20arcade%20perspective%2C%20banking%20curve?width=1200&height=630&model=flux&seed=8888&nologo=true">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=JetBrains+Mono:wght@400;500;700&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#060218;
    --pink:#ff2bd6;
    --cyan:#5ce6ff;
    --lime:#a5ff52;
    --amber:#ffd454;
    --magenta:#ff2bd6;
    --silver:#a89cc8;
    --ink:#f5ecff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{
    height:100%;background:var(--void);color:var(--ink);
    font-family:'JetBrains Mono', monospace;
    -webkit-tap-highlight-color:transparent;user-select:none;overflow:hidden;
  }
  body{
    display:flex;flex-direction:column;
    background:
      radial-gradient(ellipse 50% 30% at 50% 100%, rgba(255,43,214,0.18), transparent 70%),
      var(--void);
  }
  #game{
    position:relative;flex:1;width:100%;
    display:flex;align-items:stretch;justify-content:center;
    overflow:hidden;
  }
  canvas#scene{
    width:100%;height:100%;display:block;
    image-rendering:pixelated;image-rendering:crisp-edges;
  }

  /* HUD */
  .hud{
    position:absolute;inset:0;pointer-events:none;
    font-family:'Audiowide', sans-serif;
  }
  .hud-top{
    position:absolute;top:0.8rem;left:0.8rem;right:0.8rem;
    display:flex;justify-content:space-between;align-items:flex-start;gap:1rem;flex-wrap:wrap;
    text-shadow:0 0 8px currentColor;
  }
  .hud-card{
    background:rgba(6,2,24,0.55);
    border:1px solid rgba(92,230,255,0.45);
    border-radius:0.25rem;
    padding:0.4rem 0.7rem;
    backdrop-filter:blur(4px);
    color:var(--cyan);
    display:flex;flex-direction:column;gap:0.1rem;
    box-shadow:0 0 12px rgba(92,230,255,0.25) inset;
    pointer-events:auto;
  }
  .hud-card .k{
    font-family:'JetBrains Mono', monospace;
    font-size:0.58rem;letter-spacing:0.18em;color:var(--silver);
    text-transform:uppercase;text-shadow:none;
  }
  .hud-card .v{
    font-family:'VT323', monospace;font-size:1.4rem;line-height:1;color:var(--cyan);
    text-shadow:0 0 6px var(--cyan);
  }
  .hud-card.lap .v{color:var(--lime);text-shadow:0 0 6px var(--lime)}
  .hud-card.speed .v{color:var(--pink);text-shadow:0 0 6px var(--pink);font-size:1.9rem}
  .hud-card.time .v{color:var(--amber);text-shadow:0 0 6px var(--amber)}
  .hud-card.best .v{color:var(--lime);text-shadow:0 0 6px var(--lime);font-size:1.1rem}

  .hud-bottom{
    position:absolute;bottom:0.8rem;left:0.8rem;right:0.8rem;
    display:flex;justify-content:space-between;align-items:flex-end;gap:0.6rem;
    flex-wrap:wrap;
  }
  .controls-hint{
    background:rgba(6,2,24,0.55);
    border:1px solid rgba(255,43,214,0.4);border-radius:0.25rem;
    padding:0.35rem 0.6rem;
    color:var(--pink);font-family:'JetBrains Mono', monospace;font-size:0.62rem;
    letter-spacing:0.08em;text-transform:uppercase;
    backdrop-filter:blur(4px);
  }
  .controls-hint kbd{
    background:rgba(255,43,214,0.18);border:1px solid var(--pink);
    color:var(--ink);
    padding:0.05rem 0.3rem;border-radius:0.18rem;
    font-family:inherit;text-shadow:none;
  }

  /* Mobile touch pad */
  .touch-row{
    display:none;gap:0.5rem;
    pointer-events:auto;
  }
  .touch-btn{
    background:rgba(6,2,24,0.6);
    border:2px solid var(--cyan);color:var(--cyan);
    font-family:'Audiowide', sans-serif;font-size:1rem;
    width:3.4rem;height:3.4rem;border-radius:50%;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    box-shadow:0 0 12px rgba(92,230,255,0.4);
    backdrop-filter:blur(4px);
    -webkit-tap-highlight-color:transparent;
  }
  .touch-btn.fire{border-color:var(--lime);color:var(--lime);box-shadow:0 0 12px rgba(165,255,82,0.4)}
  .touch-btn.brake{border-color:var(--pink);color:var(--pink);box-shadow:0 0 12px rgba(255,43,214,0.4)}
  .touch-btn:active{transform:scale(0.92)}
  @media (max-width: 860px), (pointer:coarse){
    .touch-row{display:flex}
    .controls-hint{display:none}
  }

  /* Start / end overlay */
  .overlay{
    position:absolute;inset:0;display:none;flex-direction:column;
    align-items:center;justify-content:center;gap:1rem;
    background:rgba(6,2,24,0.85);backdrop-filter:blur(6px);
    z-index:10;text-align:center;padding:2rem 1rem;pointer-events:auto;
  }
  .overlay.show{display:flex}
  .overlay h2{
    font-family:'Audiowide', sans-serif;
    font-size:clamp(2rem, 7vw, 4rem);
    color:var(--cyan);letter-spacing:0.1em;line-height:0.9;
    text-shadow:0 0 16px var(--cyan), 0 0 32px rgba(92,230,255,0.5);
  }
  .overlay h2 .accent{color:var(--pink);text-shadow:0 0 16px var(--pink), 0 0 32px rgba(255,43,214,0.5)}
  .overlay .sub{
    font-family:'JetBrains Mono', monospace;color:var(--silver);
    font-size:0.85rem;letter-spacing:0.16em;text-transform:uppercase;
    max-width:32rem;line-height:1.5;
  }
  .overlay .results{
    font-family:'VT323', monospace;color:var(--amber);font-size:1.4rem;
    text-shadow:0 0 8px var(--amber);
    display:grid;grid-template-columns:auto auto;gap:0.3rem 1.2rem;
    text-align:left;
  }
  .overlay .results .k{color:var(--silver);font-family:'JetBrains Mono', monospace;font-size:0.75rem;letter-spacing:0.12em;text-transform:uppercase;text-shadow:none}
  .start-btn{
    background:linear-gradient(180deg, var(--pink), #c01b9e);
    color:#fff;border:2px solid var(--pink);
    font-family:'Audiowide', sans-serif;font-size:1.2rem;
    padding:0.85rem 2.4rem;border-radius:0.3rem;cursor:pointer;
    letter-spacing:0.2em;text-transform:uppercase;
    box-shadow:0 0 22px rgba(255,43,214,0.55);
    transition:transform 0.15s;
  }
  .start-btn:hover{transform:translateY(-2px);box-shadow:0 0 32px rgba(255,43,214,0.75)}
  .start-btn:focus-visible{outline:3px solid var(--cyan);outline-offset:3px}

  .countdown{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    font-family:'Audiowide', sans-serif;font-size:clamp(5rem, 18vw, 12rem);
    color:var(--lime);
    text-shadow:0 0 24px var(--lime), 0 0 48px rgba(165,255,82,0.6);
    pointer-events:none;z-index:20;
    animation:countPop 1s ease-out forwards;
  }
  @keyframes countPop{
    0%{transform:translate(-50%,-50%) scale(0.6);opacity:0}
    25%{transform:translate(-50%,-50%) scale(1.2);opacity:1}
    100%{transform:translate(-50%,-50%) scale(1.4);opacity:0}
  }

  @media (prefers-reduced-motion: reduce){
    .countdown{animation:none;opacity:1}
  }
</style>
</head>
<body>
  <div id="game">
    <canvas id="scene" width="1280" height="720"></canvas>

    <div class="hud" aria-hidden="false">
      <div class="hud-top">
        <div style="display:flex;gap:0.5rem;flex-wrap:wrap">
          <div class="hud-card lap">
            <span class="k">lap</span>
            <span class="v" id="lapDisplay">1 / 3</span>
          </div>
          <div class="hud-card time">
            <span class="k">lap time</span>
            <span class="v" id="lapTimeDisplay">0:00.00</span>
          </div>
          <div class="hud-card best">
            <span class="k">best lap</span>
            <span class="v" id="bestLapDisplay">—</span>
          </div>
        </div>
        <div class="hud-card speed">
          <span class="k">km/h</span>
          <span class="v" id="speedDisplay">0</span>
        </div>
      </div>

      <div class="hud-bottom">
        <div class="controls-hint">
          <kbd>← →</kbd> bank · <kbd>↑</kbd> throttle · <kbd>↓</kbd> brake · <kbd>SPACE</kbd> boost · <kbd>R</kbd> reset
        </div>
        <div class="touch-row" id="touchRow">
          <button class="touch-btn brake" type="button" id="btnLeft" aria-label="Bank left">◀</button>
          <button class="touch-btn brake" type="button" id="btnBrake" aria-label="Brake">▼</button>
          <button class="touch-btn fire" type="button" id="btnThrottle" aria-label="Throttle">▲</button>
          <button class="touch-btn" type="button" id="btnRight" aria-label="Bank right">▶</button>
        </div>
      </div>
    </div>

    <div class="overlay show" id="startOverlay">
      <h2>HOVER <span class="accent">RUSH</span></h2>
      <div class="sub">
        3 laps · neon grid circuit · boost pads light you up · don't ride the rumble strips<br>
        wipeout-style pseudo-3D · synthwave horizon · no engine downloads required
      </div>
      <button class="start-btn" id="startBtn" type="button">▶ Engage</button>
    </div>

    <div class="overlay" id="endOverlay">
      <h2 id="endTitle">RACE <span class="accent">COMPLETE</span></h2>
      <div class="results" id="endResults"></div>
      <button class="start-btn" id="restartBtn" type="button">↻ Run Again</button>
    </div>
  </div>

<script>
'use strict';
(function(){
  function showError(msg){
    try{
      var t = document.getElementById('errToast');
      if (!t){
        t = document.createElement('div');
        t.id = 'errToast';
        t.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#3a061f;color:#ffb6c1;font-family:monospace;font-size:11px;padding:8px 12px;border-bottom:1px solid #ff8ac0;white-space:pre-wrap';
        document.body.appendChild(t);
      }
      t.textContent = '⚠ ' + msg;
    }catch(_){}
  }
  window.addEventListener('error', function(ev){
    showError((ev.message || 'error') + ' @ ' + (ev.filename ? ev.filename.split('/').pop() : '?') + ':' + (ev.lineno || '?'));
  });

  // ══════════════════════════════════════════════════════════════════════
  // PSEUDO-3D TRACK RENDERER
  // Based on the classic segment-based projection used in Outrun / Lotus /
  // early Wipeout-era home conversions. Each track segment has a world
  // (x, y, z) position; we walk segments from camera outward and project
  // them to screen via scale = depth / (segZ - cameraZ).
  // ══════════════════════════════════════════════════════════════════════

  const canvas = document.getElementById('scene');
  const ctx = canvas.getContext('2d', { alpha: false });
  function resize(){
    const r = canvas.getBoundingClientRect();
    const dpr = Math.min(2, window.devicePixelRatio || 1);
    const w = Math.floor(r.width * dpr);
    const h = Math.floor(r.height * dpr);
    if (canvas.width !== w || canvas.height !== h){
      canvas.width = w; canvas.height = h;
    }
  }
  window.addEventListener('resize', resize);

  // ── Constants ──
  const SEG_LEN     = 200;     // length of one segment in world units
  const ROAD_WIDTH  = 2200;    // half-width of road
  const RUMBLE_W    = 0.16;    // rumble strip width fraction
  const LANE_W      = 0.013;
  const FIELD_DEPTH = 220;     // segments drawn ahead
  const CAM_HEIGHT  = 1300;
  const CAM_DEPTH   = 1 / Math.tan((100/2) * Math.PI/180); // fov 100°
  const DRAW_DIST   = FIELD_DEPTH * SEG_LEN;
  const TOTAL_LAPS  = 3;
  const MAX_SPEED   = SEG_LEN * 80;    // 80 segments/sec
  const ACCEL       = MAX_SPEED / 5;   // 5 seconds to top speed
  const BRAKE       = -MAX_SPEED;      // brake hard
  const DECEL       = -MAX_SPEED / 10; // coast
  const OFFROAD     = -MAX_SPEED / 2.5;
  const OFFROAD_LIMIT = MAX_SPEED / 4;

  // Track segments + colour pattern
  const COL = {
    LIGHT:  { road:'#1a0e3a', grass:'#13042e', rumble:'#ff2bd6', lane:'#5ce6ff' },
    DARK:   { road:'#150825', grass:'#0d0220', rumble:'#a5ff52', lane:'#5ce6ff' },
    START:  { road:'#ffffff', grass:'#13042e', rumble:'#ffd454', lane:'#0a0518' },
    FINISH: { road:'#000000', grass:'#13042e', rumble:'#ffd454', lane:'#ffffff' },
    BOOST:  { road:'#3a0e5c', grass:'#13042e', rumble:'#ffd454', lane:'#ffd454', boost:true }
  };

  // ── Track ──
  let segs = [];
  let trackLength = 0;
  function lastY(){ return segs.length ? segs[segs.length-1].p2.world.y : 0; }
  function addSegment(curve, y){
    const n = segs.length;
    const seg = {
      index: n,
      p1: { world: { y: lastY(), z: n * SEG_LEN }, camera: {}, screen: {} },
      p2: { world: { y: y,        z: (n+1) * SEG_LEN }, camera: {}, screen: {} },
      curve: curve,
      colors: ((n / 4) | 0) % 2 ? COL.DARK : COL.LIGHT,
      sprite: null
    };
    segs.push(seg);
  }
  function easeIn(a, b, p){ return a + (b - a) * Math.pow(p, 2); }
  function easeInOut(a, b, p){ return a + (b - a) * ((-Math.cos(p * Math.PI) / 2) + 0.5); }
  function addRoad(enter, hold, leave, curve, height){
    const startY = lastY();
    const endY = startY + height;
    for (let n = 0; n < enter; n++) addSegment(easeIn(0, curve, n/enter), easeInOut(startY, endY, n/(enter+hold+leave)));
    for (let n = 0; n < hold;  n++) addSegment(curve,                       easeInOut(startY, endY, (enter+n)/(enter+hold+leave)));
    for (let n = 0; n < leave; n++) addSegment(easeIn(curve, 0, n/leave),  easeInOut(startY, endY, (enter+hold+n)/(enter+hold+leave)));
  }
  function addStraight(n){ addRoad(n, n, n, 0, 0); }
  function addCurve(n, c){ addRoad(n, n, n, c, 0); }
  function addHill(n, h){ addRoad(n, n, n, 0, h); }
  function addCurveHill(n, c, h){ addRoad(n, n, n, c, h); }

  function buildTrack(){
    segs = [];
    // Start grid — 4 white-stripe segments
    for (let i = 0; i < 4; i++){
      addSegment(0, 0);
      segs[segs.length - 1].colors = COL.START;
    }
    addStraight(40);
    addCurve(60, 2);
    addStraight(20);
    addHill(40, 1200);
    addCurve(60, -2.5);
    addStraight(15);
    // boost zone
    for (let i = 0; i < 8; i++){
      addSegment(0, lastY());
      segs[segs.length - 1].colors = COL.BOOST;
    }
    addStraight(30);
    addCurve(80, 3);
    addCurveHill(60, -1.5, -800);
    addStraight(25);
    addCurve(80, -3);
    addStraight(20);
    // mid-track boost
    for (let i = 0; i < 6; i++){
      addSegment(0, lastY());
      segs[segs.length - 1].colors = COL.BOOST;
    }
    addStraight(15);
    addCurve(60, 2);
    addCurveHill(60, 0, 1500);
    addStraight(40);
    addCurve(50, -1.2);
    addStraight(40);
    addCurve(70, 2.5);
    addStraight(60);
    // Finish line — 4 black/white stripes
    for (let i = 0; i < 4; i++){
      addSegment(0, lastY());
      segs[segs.length - 1].colors = (i % 2) ? COL.FINISH : COL.START;
    }
    addStraight(40);
    trackLength = segs.length * SEG_LEN;
  }
  buildTrack();
  function findSeg(z){
    const idx = Math.floor(z / SEG_LEN) % segs.length;
    return segs[((idx % segs.length) + segs.length) % segs.length];
  }

  // ── Projection ──
  function project(p, camX, camY, camZ, camDepth, w, h, rw){
    p.camera.x = (p.world.x || 0) - camX;
    p.camera.y = (p.world.y || 0) - camY;
    p.camera.z = (p.world.z || 0) - camZ;
    p.screen.scale = camDepth / p.camera.z;
    p.screen.x = Math.round((w / 2) + (p.screen.scale * p.camera.x * w / 2));
    p.screen.y = Math.round((h / 2) - (p.screen.scale * p.camera.y * h / 2));
    p.screen.w = Math.round(p.screen.scale * rw * w / 2);
  }

  // ── Ship state ──
  const ship = {
    z: 0,                  // position along track
    x: 0,                  // -1..1 lateral (relative to road width)
    speed: 0,
    bankAngle: 0
  };
  let raceState = 'idle';  // idle | countdown | racing | finished | crashed
  let countdownN = 0;
  let countdownStart = 0;
  let raceStart = 0;
  let lap = 1;
  let lapStart = 0;
  let bestLap = null;
  let lastZ = 0;
  let boostFrames = 0;
  let crashFrames = 0;

  const keys = {};
  function setKey(k, v){ keys[k] = v; }
  document.addEventListener('keydown', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') setKey('left', true);
    else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') setKey('right', true);
    else if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') setKey('throttle', true);
    else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') setKey('brake', true);
    else if (e.key === ' ') setKey('boost', true);
    else if (e.key === 'r' || e.key === 'R') resetRace();
    else return;
    e.preventDefault();
  });
  document.addEventListener('keyup', e => {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') setKey('left', false);
    else if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') setKey('right', false);
    else if (e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') setKey('throttle', false);
    else if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') setKey('brake', false);
    else if (e.key === ' ') setKey('boost', false);
  });
  // Touch buttons
  function bindTouchBtn(id, key){
    const el = document.getElementById(id);
    if (!el) return;
    ['pointerdown', 'touchstart'].forEach(ev =>
      el.addEventListener(ev, e => { e.preventDefault(); setKey(key, true); }));
    ['pointerup', 'pointercancel', 'pointerleave', 'touchend', 'touchcancel'].forEach(ev =>
      el.addEventListener(ev, e => { e.preventDefault(); setKey(key, false); }));
  }
  bindTouchBtn('btnLeft',     'left');
  bindTouchBtn('btnRight',    'right');
  bindTouchBtn('btnThrottle', 'throttle');
  bindTouchBtn('btnBrake',    'brake');

  // ── Audio (Web Audio synthwave) ──
  let actx = null;
  let engineOsc = null, engineGain = null;
  let musicPlaying = false;
  function ensureAudio(){
    if (actx) return actx;
    try {
      actx = new (window.AudioContext || window.webkitAudioContext)();
    } catch(_){}
    return actx;
  }
  function startEngine(){
    ensureAudio(); if (!actx) return;
    if (actx.state === 'suspended') actx.resume();
    if (engineOsc) return;
    engineOsc = actx.createOscillator();
    engineGain = actx.createGain();
    engineOsc.type = 'sawtooth';
    engineOsc.frequency.value = 80;
    engineGain.gain.value = 0;
    const filt = actx.createBiquadFilter();
    filt.type = 'lowpass';
    filt.frequency.value = 800;
    filt.Q.value = 1.6;
    engineOsc.connect(filt);
    filt.connect(engineGain);
    engineGain.connect(actx.destination);
    engineOsc.start();
  }
  function updateEngineSound(){
    if (!engineOsc) return;
    const t = actx.currentTime;
    const speedNorm = ship.speed / MAX_SPEED;
    engineOsc.frequency.setTargetAtTime(80 + speedNorm * 280, t, 0.06);
    engineGain.gain.setTargetAtTime(0.02 + speedNorm * 0.1, t, 0.06);
  }
  function blip(freq, type, dur, vol){
    ensureAudio(); if (!actx) return;
    const t = actx.currentTime;
    const o = actx.createOscillator(); const g = actx.createGain();
    o.type = type || 'square';
    o.frequency.setValueAtTime(freq, t);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(vol || 0.15, t + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, t + (dur || 0.15));
    o.connect(g); g.connect(actx.destination);
    o.start(t); o.stop(t + (dur || 0.15) + 0.02);
  }
  function startMusic(){
    if (musicPlaying) return;
    musicPlaying = true;
    // Simple synthwave bass + arp loop
    const BASS = [55, 55, 49, 55, 65.4, 55, 49, 73.4];
    const ARP  = [220, 277, 330, 277, 392, 277, 330, 277];
    let step = 0;
    function tick(){
      if (!musicPlaying) return;
      blip(BASS[step % BASS.length], 'sawtooth', 0.32, 0.06);
      blip(ARP[step % ARP.length] * 2, 'triangle', 0.22, 0.045);
      step++;
      setTimeout(tick, 235);
    }
    tick();
  }
  function stopMusic(){ musicPlaying = false; }

  // ── Race state ──
  function resetRace(){
    raceState = 'idle';
    ship.z = 0; ship.x = 0; ship.speed = 0; ship.bankAngle = 0;
    lap = 1; bestLap = null; boostFrames = 0; crashFrames = 0;
    raceStart = lapStart = performance.now();
    document.getElementById('startOverlay').classList.add('show');
    document.getElementById('endOverlay').classList.remove('show');
    updateHUD();
  }
  function startRace(){
    document.getElementById('startOverlay').classList.remove('show');
    document.getElementById('endOverlay').classList.remove('show');
    raceState = 'countdown';
    countdownN = 3;
    countdownStart = performance.now();
    ensureAudio();
    if (actx && actx.state === 'suspended') actx.resume();
    startEngine();
    blip(440, 'square', 0.18, 0.18);
  }
  function finishRace(){
    raceState = 'finished';
    stopMusic();
    if (engineGain) engineGain.gain.setTargetAtTime(0, actx.currentTime, 0.5);
    const totalTime = (performance.now() - raceStart) / 1000;
    document.getElementById('endTitle').innerHTML = 'RACE <span class="accent">COMPLETE</span>';
    document.getElementById('endResults').innerHTML =
      `<span class="k">total</span><span>${fmtTime(totalTime)}</span>` +
      `<span class="k">best lap</span><span>${bestLap != null ? fmtTime(bestLap) : '—'}</span>` +
      `<span class="k">laps</span><span>${TOTAL_LAPS}</span>`;
    document.getElementById('endOverlay').classList.add('show');
    // Save best lap to localStorage
    try {
      const stored = parseFloat(localStorage.getItem('hover-rush-best') || '999');
      if (bestLap != null && bestLap < stored){
        localStorage.setItem('hover-rush-best', String(bestLap));
      }
    } catch(_){}
    // Victory chime
    [523, 659, 784, 1047].forEach((f, i) =>
      setTimeout(() => blip(f, 'triangle', 0.4, 0.16), i * 90));
  }
  function fmtTime(s){
    if (s == null || !isFinite(s)) return '—';
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return m + ':' + sec.toFixed(2).padStart(5, '0');
  }
  document.getElementById('startBtn').addEventListener('click', startRace);
  document.getElementById('restartBtn').addEventListener('click', () => { resetRace(); startRace(); });

  // Load stored best
  try {
    const stored = parseFloat(localStorage.getItem('hover-rush-best') || '');
    if (isFinite(stored)) bestLap = stored;
  } catch(_){}

  // ── HUD ──
  function updateHUD(){
    document.getElementById('lapDisplay').textContent = lap + ' / ' + TOTAL_LAPS;
    const kmh = Math.round((ship.speed / MAX_SPEED) * 480);
    document.getElementById('speedDisplay').textContent = String(kmh).padStart(3, '0');
    let lt = 0;
    if (raceState === 'racing') lt = (performance.now() - lapStart) / 1000;
    document.getElementById('lapTimeDisplay').textContent = fmtTime(lt);
    document.getElementById('bestLapDisplay').textContent = bestLap != null ? fmtTime(bestLap) : '—';
  }

  // ── Update ──
  let lastTime = 0;
  function update(dt){
    if (raceState !== 'racing') return;
    // Steering
    const dx = dt * 1.4;
    if (keys.left) { ship.x -= dx; ship.bankAngle = Math.max(ship.bankAngle - dt * 3, -0.7); }
    else if (keys.right) { ship.x += dx; ship.bankAngle = Math.min(ship.bankAngle + dt * 3, 0.7); }
    else { ship.bankAngle *= Math.pow(0.001, dt); }

    // Throttle / brake
    const onRoad = Math.abs(ship.x) < 1;
    let accel = DECEL;
    if (keys.throttle || keys.boost) accel = ACCEL;
    if (keys.brake) accel = BRAKE;
    if (keys.boost && onRoad){
      accel = ACCEL * 1.6;
      boostFrames = 6;
    }
    // Off-road: drag
    if (!onRoad){
      accel = OFFROAD;
      ship.speed = Math.min(ship.speed, OFFROAD_LIMIT);
    }
    ship.speed = Math.max(0, Math.min(MAX_SPEED, ship.speed + accel * dt));

    // Curve push — ship gets pushed away from inside of the curve when fast
    const playerSeg = findSeg(ship.z);
    const speedNorm = ship.speed / MAX_SPEED;
    ship.x -= dx * speedNorm * playerSeg.curve * 0.6;

    // Boost pad pickup
    if (playerSeg.colors === COL.BOOST && Math.abs(ship.x) < 0.6){
      ship.speed = Math.min(MAX_SPEED * 1.05, ship.speed + 220 * dt * 60);
      boostFrames = 10;
      if (boostFrames === 10) blip(880, 'square', 0.12, 0.15);
    }

    // Advance along track
    ship.z += ship.speed * dt;

    // Lap detect
    const newLapZ = Math.floor(ship.z / trackLength);
    const oldLapZ = Math.floor(lastZ / trackLength);
    if (newLapZ > oldLapZ){
      const lapTime = (performance.now() - lapStart) / 1000;
      if (bestLap == null || lapTime < bestLap) bestLap = lapTime;
      lap++;
      lapStart = performance.now();
      blip(660, 'sine', 0.18, 0.18);
      if (lap > TOTAL_LAPS){ finishRace(); }
    }
    lastZ = ship.z;

    // Engine pitch
    updateEngineSound();
    if (boostFrames > 0) boostFrames--;
  }

  // ── Render ──
  function clearCanvas(){
    const W = canvas.width, H = canvas.height;
    // Synthwave sky gradient
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0.00, '#06021e');
    g.addColorStop(0.45, '#1a0a3a');
    g.addColorStop(0.62, '#5a1858');
    g.addColorStop(0.75, '#ff2bd6');
    g.addColorStop(0.78, '#ffaa3a');
    g.addColorStop(0.81, '#ffd454');
    g.addColorStop(0.82, '#1a0a3a');
    g.addColorStop(1.00, '#06021e');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
    // Sun
    const sunR = Math.min(W, H) * 0.16;
    const sunCx = W / 2;
    const sunCy = H * 0.62 - sunR * 0.4;
    const sunG = ctx.createRadialGradient(sunCx, sunCy, sunR * 0.2, sunCx, sunCy, sunR);
    sunG.addColorStop(0, '#ffd454');
    sunG.addColorStop(0.5, '#ff8a3a');
    sunG.addColorStop(1, 'rgba(255,43,214,0)');
    ctx.fillStyle = sunG;
    ctx.fillRect(sunCx - sunR, sunCy - sunR, sunR * 2, sunR * 2);
    // Sun bands
    ctx.fillStyle = '#06021e';
    for (let i = 0; i < 5; i++){
      const y = sunCy + sunR * 0.55 + i * 6;
      ctx.fillRect(sunCx - sunR, y, sunR * 2, 4);
    }
    // Horizon grid below sun (decorative parallax ground)
    const horizonY = H * 0.55;
    ctx.strokeStyle = 'rgba(255,43,214,0.4)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, horizonY); ctx.lineTo(W, horizonY);
    ctx.stroke();
  }

  function drawSegment(W, H, w1, w2, x1, x2, y1, y2, fog, colors){
    // Grass — left
    ctx.fillStyle = colors.grass;
    ctx.fillRect(0, y2, W, y1 - y2);
    // Road quad
    drawQuad(x1 - w1, y1, x2 - w2, y2, x2 + w2, y2, x1 + w1, y1, colors.road);
    // Rumble strips
    const r1 = w1 * RUMBLE_W, r2 = w2 * RUMBLE_W;
    drawQuad(x1 - w1 - r1, y1, x2 - w2 - r2, y2, x2 - w2, y2, x1 - w1, y1, colors.rumble);
    drawQuad(x1 + w1 + r1, y1, x2 + w2 + r2, y2, x2 + w2, y2, x1 + w1, y1, colors.rumble);
    // Lane stripe (center)
    const l1 = w1 * LANE_W, l2 = w2 * LANE_W;
    drawQuad(x1 - l1, y1, x2 - l2, y2, x2 + l2, y2, x1 + l1, y1, colors.lane);
    // Boost pad shimmer
    if (colors.boost){
      const flick = (Math.sin(performance.now() / 60) + 1) * 0.5;
      ctx.fillStyle = `rgba(255,212,74,${0.18 + flick * 0.25})`;
      drawQuad(x1 - w1*0.7, y1, x2 - w2*0.7, y2, x2 + w2*0.7, y2, x1 + w1*0.7, y1, ctx.fillStyle);
    }
  }
  function drawQuad(x1, y1, x2, y2, x3, y3, x4, y4, fill){
    ctx.fillStyle = fill;
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.lineTo(x3, y3);
    ctx.lineTo(x4, y4);
    ctx.closePath();
    ctx.fill();
  }

  function renderTrack(){
    const W = canvas.width, H = canvas.height;
    const baseSeg = findSeg(ship.z);
    const basePercent = (ship.z % SEG_LEN) / SEG_LEN;
    const playerY = easeInOut(baseSeg.p1.world.y, baseSeg.p2.world.y, basePercent);
    let camX = ship.x * ROAD_WIDTH;
    let camY = playerY + CAM_HEIGHT;
    let camZ = ship.z - SEG_LEN * 0.5;
    let x = 0, dx = 0;
    let maxY = H;
    for (let n = 0; n < FIELD_DEPTH; n++){
      const i = (baseSeg.index + n) % segs.length;
      const seg = segs[i];
      const loop = i < baseSeg.index;
      project(seg.p1, camX - x,      camY, camZ - (loop ? trackLength : 0), CAM_DEPTH, W, H, ROAD_WIDTH);
      project(seg.p2, camX - x - dx, camY, camZ - (loop ? trackLength : 0), CAM_DEPTH, W, H, ROAD_WIDTH);
      x += dx;
      dx += seg.curve;
      if (seg.p1.camera.z <= CAM_DEPTH ||  // behind cam
          seg.p2.screen.y >= seg.p1.screen.y || // back-facing
          seg.p2.screen.y >= maxY){
        continue;
      }
      drawSegment(W, H,
        seg.p1.screen.w, seg.p2.screen.w,
        seg.p1.screen.x, seg.p2.screen.x,
        seg.p1.screen.y, seg.p2.screen.y,
        0, seg.colors);
      maxY = seg.p2.screen.y;
    }
    // Draw ship
    drawShip(W, H);
    // Boost flash overlay
    if (boostFrames > 0){
      ctx.fillStyle = `rgba(255,212,74,${0.15 * boostFrames / 10})`;
      ctx.fillRect(0, 0, W, H);
    }
  }
  function drawShip(W, H){
    const cx = W / 2;
    const cy = H * 0.78;
    const s = Math.min(W, H) * 0.0015;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(ship.bankAngle * 0.25);
    // Hover plume
    const speedNorm = ship.speed / MAX_SPEED;
    const plumeH = 80 + speedNorm * 60;
    const plumeG = ctx.createLinearGradient(0, 80*s, 0, (80 + plumeH)*s);
    plumeG.addColorStop(0, `rgba(92,230,255,${0.5 + speedNorm * 0.4})`);
    plumeG.addColorStop(0.5, `rgba(255,43,214,${0.4})`);
    plumeG.addColorStop(1, `rgba(255,43,214,0)`);
    ctx.fillStyle = plumeG;
    ctx.beginPath();
    ctx.moveTo(-50*s, 80*s);
    ctx.lineTo(50*s, 80*s);
    ctx.lineTo(30*s, (80+plumeH)*s);
    ctx.lineTo(-30*s, (80+plumeH)*s);
    ctx.closePath();
    ctx.fill();
    // Ship body (top-down chevron, slightly perspective-skewed)
    ctx.shadowColor = '#5ce6ff';
    ctx.shadowBlur = 24 * s;
    ctx.fillStyle = '#1a0e3a';
    ctx.strokeStyle = '#5ce6ff';
    ctx.lineWidth = 4 * s;
    ctx.beginPath();
    ctx.moveTo(0, -100*s);
    ctx.lineTo(80*s, 60*s);
    ctx.lineTo(40*s, 80*s);
    ctx.lineTo(-40*s, 80*s);
    ctx.lineTo(-80*s, 60*s);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    // Cockpit
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ff2bd6';
    ctx.beginPath();
    ctx.moveTo(0, -60*s);
    ctx.lineTo(30*s, 20*s);
    ctx.lineTo(-30*s, 20*s);
    ctx.closePath();
    ctx.fill();
    // Center stripe
    ctx.fillStyle = '#ffd454';
    ctx.fillRect(-4*s, -90*s, 8*s, 50*s);
    ctx.restore();
  }

  // ── Main loop ──
  function loop(now){
    requestAnimationFrame(loop);
    resize();
    const dt = Math.min(0.06, (now - lastTime) / 1000 || 0);
    lastTime = now;

    // Countdown
    if (raceState === 'countdown'){
      const elapsed = (now - countdownStart) / 1000;
      const remaining = 3 - Math.floor(elapsed);
      if (countdownN !== remaining){
        countdownN = remaining;
        if (countdownN > 0){
          spawnCountdownNumber(String(countdownN));
          blip(440, 'square', 0.18, 0.16);
        } else {
          spawnCountdownNumber('GO!');
          blip(880, 'square', 0.28, 0.22);
          raceState = 'racing';
          raceStart = lapStart = performance.now();
          startMusic();
        }
      }
    }

    update(dt);
    clearCanvas();
    renderTrack();
    updateHUD();
  }
  function spawnCountdownNumber(text){
    const old = document.querySelector('.countdown');
    if (old) old.remove();
    const div = document.createElement('div');
    div.className = 'countdown';
    div.textContent = text;
    document.getElementById('game').appendChild(div);
    setTimeout(() => { try { div.remove(); } catch(_){} }, 1000);
  }

  // Boot
  resize();
  resetRace();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
