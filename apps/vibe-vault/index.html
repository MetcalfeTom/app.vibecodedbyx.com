<style>
:root{
  --mahog:#2b120b; --mahog-hi:#47200f; --leather:#4a3320; --leather-hi:#5c4028;
  --iron:#33363b; --iron-hi:#42464c; --copper:#c47a3d; --brass:#c9a648; --brass-hi:#efd98a;
  --parch:#efe3c8; --ink:#140a06; --line:rgba(201,166,72,.34);
}
*{ box-sizing:border-box; margin:0; padding:0; }
html{ font-size:100%; }
body{
  background:
    radial-gradient(50rem 26rem at 50% -8%, rgba(255,176,84,.16), transparent 62%),   /* the lamp */
    repeating-linear-gradient(92deg, transparent 0 .35rem, rgba(0,0,0,.16) .35rem .42rem),
    repeating-linear-gradient(2deg, transparent 0 6rem, rgba(255,190,120,.03) 6rem 6.2rem),
    linear-gradient(180deg, var(--mahog-hi), var(--mahog) 40%, #1d0c06);
  color:var(--parch);
  font-family:'IM Fell English', serif;
  min-height:100vh;
}
/* vintage lamp flicker layer */
.lamp{
  position:fixed; inset:0; pointer-events:none; z-index:0;
  background:radial-gradient(46rem 24rem at 50% -6%, rgba(255,166,64,.13), transparent 60%);
  animation:flicker 7s infinite;
}
@keyframes flicker{
  0%,100%{opacity:1} 87%{opacity:1} 88%{opacity:.72} 89%{opacity:.96}
  91%{opacity:.8} 92%{opacity:1} 96%{opacity:.9} 97%{opacity:1}
}
/* exposed gears */
.gear{
  position:fixed; border-radius:50%; pointer-events:none; z-index:0; opacity:.14;
  background:repeating-conic-gradient(var(--copper) 0 13deg, transparent 13deg 30deg);
  -webkit-mask:radial-gradient(circle, #000 0 14%, transparent 15% 52%, #000 53% 100%);
  mask:radial-gradient(circle, #000 0 14%, transparent 15% 52%, #000 53% 100%);
  animation:spin 70s linear infinite;
}
.gear.g1{ width:22rem; height:22rem; top:-8rem; right:-7rem; }
.gear.g2{ width:14rem; height:14rem; bottom:-5rem; left:-4rem; animation-direction:reverse; animation-duration:50s;
  background:repeating-conic-gradient(var(--brass) 0 16deg, transparent 16deg 36deg); opacity:.11; }
@keyframes spin{ to{ transform:rotate(360deg); } }
main{ max-width:46rem; margin:0 auto; padding:2.5rem 1rem 4rem; position:relative; z-index:1; }
header{ text-align:center; margin-bottom:2.2rem; }
h1{
  font-family:'Rye', serif; font-weight:400;
  font-size:clamp(2.3rem, 8vw, 4.2rem); letter-spacing:.04em; color:var(--brass);
  text-shadow:0 0 2.4rem rgba(255,166,64,.4), 0 .12rem 0 #3d2c08;
}
.tag{ font-style:italic; font-size:1.2rem; opacity:.9; }
.plate{
  display:inline-block; margin-top:.7rem; font-family:'IBM Plex Mono', monospace; font-weight:300;
  font-size:.62rem; letter-spacing:.3em; text-transform:uppercase; color:var(--copper);
  border:1px solid var(--line); padding:.3rem .9rem; border-radius:2px;
  background:linear-gradient(180deg, rgba(0,0,0,.35), rgba(0,0,0,.15));
}
/* ── riveted leather drawers on iron plate ── */
.vault{ display:flex; flex-direction:column; gap:.7rem; }
.drawer{
  position:relative;
  border:2px solid var(--brass); outline:1px solid #6e5a26; border-radius:.25rem; overflow:hidden;
  background:
    repeating-linear-gradient(84deg, transparent 0 .5rem, rgba(0,0,0,.12) .5rem .58rem),
    linear-gradient(180deg, var(--leather-hi), var(--leather));
  box-shadow:0 .35rem 1.6rem rgba(0,0,0,.62), inset 0 1px 0 rgba(255,220,150,.12);
}
/* brass rivets — corners + mid edges, dome-lit from upper left */
.drawer::after{
  content:""; position:absolute; inset:0; pointer-events:none; z-index:1;
  background:
    radial-gradient(circle at .6rem .6rem,                              var(--brass-hi) 0, var(--brass) .07rem, #4a3c16 .15rem, transparent .19rem),
    radial-gradient(circle at calc(100% - .6rem) .6rem,                 var(--brass-hi) 0, var(--brass) .07rem, #4a3c16 .15rem, transparent .19rem),
    radial-gradient(circle at .6rem calc(100% - .6rem),                 var(--brass-hi) 0, var(--brass) .07rem, #4a3c16 .15rem, transparent .19rem),
    radial-gradient(circle at calc(100% - .6rem) calc(100% - .6rem),    var(--brass-hi) 0, var(--brass) .07rem, #4a3c16 .15rem, transparent .19rem),
    radial-gradient(circle at 50% .55rem,                               var(--brass-hi) 0, var(--brass) .06rem, #4a3c16 .13rem, transparent .17rem),
    radial-gradient(circle at 50% calc(100% - .55rem),                  var(--brass-hi) 0, var(--brass) .06rem, #4a3c16 .13rem, transparent .17rem);
}
.drawer-btn{
  position:relative; z-index:2;
  width:100%; min-height:3.4rem; display:flex; align-items:center; gap:.9rem;
  padding:.7rem 1.5rem; background:none; border:0; cursor:pointer; color:var(--parch);
  font-family:'IM Fell English', serif; text-align:left;
}
.drawer-btn:focus-visible{ outline:3px solid var(--brass-hi); outline-offset:-4px; }
.d-emoji{ font-size:1.5rem; width:2.2rem; text-align:center; filter:drop-shadow(0 0 .4rem var(--dc, var(--brass))) sepia(.3); }
.d-name{ font-size:1.4rem; flex:1; letter-spacing:.02em; }
.d-name small{ display:block; font-size:.92rem; font-style:italic; opacity:.68; }
.d-dial{
  font-size:1.15rem; color:var(--brass); flex:none; width:2.2rem; height:2.2rem;
  border:1px solid var(--line); border-radius:50%; display:grid; place-items:center;
  background:radial-gradient(circle at 35% 30%, var(--iron-hi), var(--iron));
  transition:transform .6s cubic-bezier(.6,-0.3,.3,1.4);
}
.drawer.open .d-dial{ transform:rotate(180deg); }
.d-body{ max-height:0; overflow:hidden; transition:max-height .5s ease; position:relative; z-index:2; }
.drawer.open .d-body{ max-height:52rem; }
.d-inner{
  margin:.2rem .7rem .7rem; padding:.4rem 1rem 1.1rem; border:1px solid rgba(255,255,255,.07); border-radius:2px;
  background:
    repeating-linear-gradient(0deg, transparent 0 .22rem, rgba(255,255,255,.015) .22rem .26rem),
    linear-gradient(180deg, var(--iron-hi), var(--iron));  /* iron plate behind the leather face */
  box-shadow:inset 0 .2rem .8rem rgba(0,0,0,.5);
}
.d-mono{ font-family:'IBM Plex Mono', monospace; font-weight:300; font-size:.62rem; letter-spacing:.24em; text-transform:uppercase; color:var(--copper); margin:.9rem 0 .45rem; }
/* three-layer blueprint controls */
.layers{ display:flex; gap:.45rem; flex-wrap:wrap; }
.layer-btn{
  min-height:2.75rem; padding:.35rem .9rem; cursor:pointer; border-radius:2px;
  background:linear-gradient(180deg, #56390f, #3d2a0c); color:var(--parch);
  border:1px solid var(--brass); border-bottom-width:3px;
  font-family:'IBM Plex Mono', monospace; font-weight:600; font-size:.68rem; letter-spacing:.14em; text-transform:uppercase;
}
.layer-btn[aria-pressed="true"]{
  background:linear-gradient(180deg, var(--brass-hi), var(--brass)); color:var(--ink);
  border-color:var(--brass-hi); box-shadow:0 0 .8rem rgba(201,166,72,.4);
}
.layer-btn:focus-visible{ outline:3px solid var(--brass-hi); outline-offset:2px; }
.arts{ list-style:none; min-height:6.4rem; }
.arts li{ font-size:1.14rem; font-style:italic; padding:.3rem 0; opacity:.94; }
.arts li::before{ content:"⚙ "; color:var(--dc, var(--copper)); font-style:normal; font-size:.85em; }
.duck-btn{
  min-width:2.75rem; min-height:2.75rem; margin-left:.15rem; cursor:pointer; vertical-align:middle;
  background:radial-gradient(circle at 35% 30%, var(--iron-hi), var(--iron)); border:1px solid var(--brass); border-radius:50%;
  font-size:1.05rem; line-height:1;
}
.duck-btn[aria-expanded="true"]{ background:linear-gradient(180deg, var(--brass-hi), var(--brass)); box-shadow:0 0 .8rem rgba(201,166,72,.45); }
.duck-btn:focus-visible{ outline:3px solid var(--brass-hi); outline-offset:2px; }
.duck-full{
  display:block; margin:.45rem 0 .2rem .4rem; padding:.5rem .8rem;
  border-left:3px solid var(--copper); background:rgba(0,0,0,.32); border-radius:2px;
  font-size:1.02rem; color:var(--brass-hi);
}
.duck-full[hidden]{ display:none; }
.dep-row{ display:flex; gap:.5rem; margin-top:.3rem; }
.dep-row input{
  flex:1; min-height:2.75rem; background:rgba(0,0,0,.4); color:var(--parch); border:1px solid var(--line);
  border-radius:2px; padding:0 .8rem; font-family:'IM Fell English', serif; font-size:1.05rem; font-style:italic;
}
.dep-row input:focus-visible{ outline:3px solid var(--brass-hi); outline-offset:1px; }
.dep-btn{
  min-height:2.75rem; padding:.4rem 1.1rem; cursor:pointer;
  background:linear-gradient(180deg, #d98c4a, var(--copper)); color:var(--ink); border:1px solid var(--brass-hi); border-radius:2px;
  font-family:'IBM Plex Mono', monospace; font-weight:600; font-size:.72rem; letter-spacing:.18em; text-transform:uppercase;
}
.dep-btn:focus-visible{ outline:3px solid var(--parch); outline-offset:2px; }
.deps{ list-style:none; margin-top:.5rem; }
.deps li{
  font-size:1.02rem; font-style:italic; opacity:.85; padding:.2rem 0 .2rem .9rem;
  border-left:2px solid var(--dc, var(--copper)); margin:.25rem 0;
}
footer{
  text-align:center; margin-top:2.6rem; font-family:'IBM Plex Mono', monospace; font-weight:300;
  font-size:.66rem; letter-spacing:.14em; color:var(--copper);
}
footer em{ display:block; font-family:'IM Fell English', serif; font-size:1.05rem; letter-spacing:0; color:var(--parch); opacity:.75; margin-bottom:.5rem; }
#toast{
  position:fixed; bottom:1.2rem; left:50%; transform:translateX(-50%) translateY(200%); z-index:3;
  background:var(--brass); color:var(--ink); font-family:'IBM Plex Mono', monospace; font-weight:600;
  font-size:.72rem; letter-spacing:.12em; padding:.55rem 1.1rem; border-radius:2px; transition:transform .3s ease;
}
#toast.show{ transform:translateX(-50%) translateY(0); }
@media (prefers-reduced-motion: reduce){
  .d-body, .d-dial, #toast{ transition:none; }
  .gear, .lamp{ animation:none; }
}
</style>
</head>
<body>
<div class="lamp" aria-hidden="true"></div>
<div class="gear g1" aria-hidden="true"></div>
<div class="gear g2" aria-hidden="true"></div>
<main>
<header>
  <h1>Vibe Vault</h1>
  <p class="tag">nine pillars of the craft — three blueprint layers deep, riveted shut</p>
  <p class="plate">EST. 2026 · BLUEPRINT: MARCIPOPSIS · NINE PILLARS × THREE LAYERS</p>
</header>

<div class="vault" id="vault"></div>

<footer>
  <em>Engraved to MarciPopsis’s blueprint. Foundation → Practice → Mastery. Deposits stay in your browser.</em>
  <span id="build-info">build <b>v3.3</b> · 2026-07-14 · commit <code id="build-hash">cc8106967</code></span>
</footer>
</main>
<div id="toast" role="status" aria-live="polite"></div>

<script>
var LAYER_NAMES=['Ⅰ · Foundation','Ⅱ · Practice','Ⅲ · Mastery'];
var VIBES=[
 {id:'mindset', emoji:'🧠', name:'Mindset', sub:'the bug is never where you are sure it is', c:'#a98be0',
  layers:[
   ['read the error message. all of it. twice.','the computer is doing exactly what someone told it to','slow is smooth, smooth is fast'],
   ['reproduce first, theorize second','stuck thirty minutes? explain it to the duck, out loud','write the angry comment, delete it, fix the code',
    {t:'if you didn’t test the edge case, the user will', duck:true,
     full:'“if you didn’t test the edge case, the user will — in production, at 4:58 on a Friday, with the CEO watching over their shoulder. the duck knew. the duck always knew.” — Marci’s rubber duck'},
    {t:'don’t ask why it doesn’t work — ask why it works', icon:'🔍',
     full:'“don’t ask why it doesn’t work — ask why it works. code that works for reasons nobody can name is the most dangerous code in the building: it is one refactor away from revealing what it always was.”'}],
   ['the senior move is saying “I don’t know” faster','boring technology is a love language','optimize for the reader you’ll be in six months']],
  dep:'deposit a hard-won lesson…'},
 {id:'blueprint', emoji:'📐', name:'Blueprint', sub:'two weeks of coding saves an hour of planning', c:'#6aa9d8',
  layers:[
   ['two weeks of coding saves an hour of planning','if it’s not on paper, it’s a hallucination','the architectural diagram is always a work of fiction'],
   ['design the deletion path before the feature','every arrow in the diagram is a failure mode','prototype the scary part first'],
   ['architecture is the set of decisions expensive to change','leave load-bearing comments at the load-bearing walls','a good blueprint survives the intern’s first week',
    {t:'what happens if 1000 people use my app', icon:'📏',
     full:'“what happens if 1000 people use my app? — the question that turns a sketch into a blueprint. ask it before the first commit; the thousand will not schedule an appointment.” — Marci’s blueprint, Scale'}]],
  dep:'deposit a plan that survived contact…'},
 {id:'cursed', emoji:'😈', name:'Cursed Patterns', sub:'it works. do not touch it. do not ask why.', c:'#a4d84a',
  layers:[
   ['if you can’t explain the fix, you didn’t fix it','copy-paste is inheritance with extra grief','flag2 means flag1 already lied'],
   ['the util that knows too much must be split','never patch the symptom inside the catch block','a TODO older than a year is a tombstone'],
   ['some curses are load-bearing — schedule the exorcism','document the haunted wing for the next owner','you may keep ONE cursed thing, and you must name it']],
  dep:'confess a cursed pattern you shipped…'},
 {id:'testing', emoji:'🧪', name:'Testing', sub:'tested in production is still tested', c:'#e0b558',
  layers:[
   ['a test you don’t trust is worse than no test','test the behavior, not the furniture','red first, or the green means nothing'],
   ['flaky tests get fixed or deleted, never ignored','one assertion per story, one story per test','the edge case IS the case'],
   ['the suite is documentation that cannot lie','mutation-proof the money paths','delete the tests that only test the mock']],
  dep:'deposit a test that lied to you…'},
 {id:'git', emoji:'⛏', name:'Git Archaeology', sub:'git blame always finds you', c:'#d8874a',
  layers:[
   ['commit messages are letters to future strangers','small commits, honest verbs','“fix” is not a message, it’s a shrug'],
   ['bisect beats intuition every single time','blame the line, read the PR, apologize','history rewritten in public is history lost'],
   ['the log tells you WHY when the code can’t','every revert-of-a-revert marks a buried war','dig gently — some strata hold survivors']],
  dep:'deposit an infamous commit message…'},
 {id:'cicd', emoji:'🔁', name:'CI/CD', sub:'green on retry is green', c:'#5ac8d4',
  layers:[
   ['green must mean deployable, or it means nothing','the pipeline is code — review it like code','retry-until-green is lying with machines'],
   ['fail in seconds on the cheap checks first','staging drift is the silent killer — diff it weekly','deploys should be boring enough for 9am Monday'],
   ['rollback rehearsed is rollback that works','ship dark, toggle light','the Friday deploy is fine IF the pipeline earned it']],
  dep:'deposit a pipeline sin…'},
 {id:'logs', emoji:'📡', name:'Observability Logs', sub:'console.log(“here 7”) in production', c:'#5ed48e',
  layers:[
   ['log for the 3am stranger, not for yourself now','ERROR means a human should wake up','“here 7” ships with your name on it'],
   ['structured logs, or grep-archaeology forever','every alert must have exactly one owner','a dashboard nobody checks is wall art'],
   ['trace the request, not the server','measure what users feel, alert on what breaks it','silence is a signal — monitor the absence']],
  dep:'deposit a log line you’ll never forget…'},
 {id:'horror', emoji:'🩸', name:'Production Horror Stories', sub:'and the backup? also on that server.', c:'#e05a6c',
  layers:[
   ['a backup you haven’t restored is a rumor','prod credentials don’t belong in terminal history','read-only Fridays for the new blood'],
   ['practice the outage before the outage','the postmortem blames the system, never the human','every horror story starts with “it was a small change”'],
   ['chaos-test the thing you’re proudest of','write the runbook WHILE it burns, edit after','the scar tissue IS the seniority']],
  dep:'tell your production horror story…'},
 {id:'security', emoji:'🔐', name:'Security', sub:'the password was “password” — rotated quarterly to “password2”', c:'#d4b45a',
  layers:[
   ['secrets live in vaults — not code, not screenshots','admin/admin is an unlocked door with a welcome mat','HTTPS everywhere. no exceptions, no “internal”'],
   ['rotate keys like you mean it — dates on the calendar','least privilege hurts exactly once','dependencies are doors — audit who holds keys'],
   ['threat-model the boring parts; attackers love boring','assume breach, design the blast radius','the best security review happens before the code']],
  dep:'deposit a near-miss — no real secrets!…'}
];

function $(id){ return document.getElementById(id); }
function esc(s){ var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }

var DEPS_KEY='vibe-vault-deposits-v2';   /* unchanged since v2 — existing deposits survive the re-theme */
function loadDeps(){ try{ return JSON.parse(localStorage.getItem(DEPS_KEY))||{}; }catch(e){ return {}; } }
function saveDeps(d){ try{ localStorage.setItem(DEPS_KEY, JSON.stringify(d)); }catch(e){} }
var deps=loadDeps();
var activeLayer={};   /* drawer id -> 0|1|2 */

function layerHtml(v, li){
  return v.layers[li].map(function(a, idx){
    if(typeof a==='string') return '<li>'+a+'</li>';
    var did='duck-'+v.id+'-'+li+'-'+idx;
    return '<li>'+a.t+' <button type="button" class="duck-btn" aria-expanded="false" aria-controls="'+did+'" title="the full quote">'+(a.icon||'🦆')+'</button>'+
      '<span class="duck-full" id="'+did+'" hidden>'+a.full+'</span></li>';
  }).join('');
}

/* build the nine drawers */
var vault=$('vault');
VIBES.forEach(function(v,i){
  activeLayer[v.id]=0;
  var d=document.createElement('section');
  d.className='drawer'+(i===0?' open':'');
  d.id='drawer-'+v.id;
  d.style.setProperty('--dc', v.c);
  var depList=(deps[v.id]||[]).map(function(t){ return '<li>'+esc(t)+'</li>'; }).join('');
  d.innerHTML=
    '<h2><button type="button" class="drawer-btn" id="btn-'+v.id+'" aria-expanded="'+(i===0?'true':'false')+'" aria-controls="body-'+v.id+'">'+
      '<span class="d-emoji" aria-hidden="true">'+v.emoji+'</span>'+
      '<span class="d-name">'+v.name+'<small>'+v.sub+'</small></span>'+
      '<span class="d-dial" aria-hidden="true">⚙</span>'+
    '</button></h2>'+
    '<div class="d-body" id="body-'+v.id+'" role="region" aria-label="'+v.name+' drawer">'+
      '<div class="d-inner">'+
        '<p class="d-mono">the blueprint · three layers</p>'+
        '<div class="layers" role="group" aria-label="'+v.name+' blueprint layers">'+LAYER_NAMES.map(function(n,k){
          return '<button type="button" class="layer-btn" data-pillar="'+v.id+'" data-layer="'+k+'" aria-pressed="'+(k===0?'true':'false')+'">'+n+'</button>';
        }).join('')+'</div>'+
        '<ul class="arts" id="arts-'+v.id+'" aria-live="polite">'+layerHtml(v,0)+'</ul>'+
        '<p class="d-mono">deposit a vibe · stored in this browser only</p>'+
        '<div class="dep-row">'+
          '<input type="text" id="dep-in-'+v.id+'" maxlength="90" placeholder="'+v.dep+'" aria-label="deposit into '+v.name+'">'+
          '<button type="button" class="dep-btn" data-dep="'+v.id+'">deposit</button>'+
        '</div>'+
        '<ul class="deps" id="deps-'+v.id+'">'+depList+'</ul>'+
      '</div>'+
    '</div>';
  vault.appendChild(d);
});

/* one delegated handler: accordion, layer switch, deposit */
vault.addEventListener('click', function(e){
  var btn=e.target.closest('.drawer-btn');
  if(btn){
    var drawer=btn.closest('.drawer');
    var open=drawer.classList.toggle('open');
    btn.setAttribute('aria-expanded', open?'true':'false');
    return;
  }
  var lb=e.target.closest('[data-layer]');
  if(lb){
    var pid=lb.getAttribute('data-pillar'), li=+lb.getAttribute('data-layer');
    activeLayer[pid]=li;
    var v=null; for(var k=0;k<VIBES.length;k++){ if(VIBES[k].id===pid) v=VIBES[k]; }
    $('arts-'+pid).innerHTML=layerHtml(v, li);
    var sibs=lb.parentNode.children;
    for(var s=0;s<sibs.length;s++){ sibs[s].setAttribute('aria-pressed', sibs[s]===lb?'true':'false'); }
    return;
  }
  var duck=e.target.closest('.duck-btn');
  if(duck){
    var full=$(duck.getAttribute('aria-controls'));
    var show=full.hidden;
    full.hidden=!show;
    duck.setAttribute('aria-expanded', show?'true':'false');
    return;
  }
  var dep=e.target.closest('[data-dep]');
  if(dep){ deposit(dep.getAttribute('data-dep')); return; }
});
vault.addEventListener('keydown', function(e){
  if(e.key==='Enter'){
    var inp=e.target.closest('input[id^="dep-in-"]');
    if(inp){ deposit(inp.id.replace('dep-in-','')); }
  }
});

function deposit(id){
  var inp=$('dep-in-'+id);
  var t=(inp.value||'').trim();
  if(!t){ toast('an empty vault stays empty'); return; }
  deps[id]=(deps[id]||[]).concat(t).slice(-12);
  saveDeps(deps);
  var li=document.createElement('li'); li.textContent=t;
  $('deps-'+id).appendChild(li);
  inp.value='';
  toast('deposited ✓');
}

var toastT=null;
function toast(msg){
  var t=$('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(function(){ t.classList.remove('show'); }, 1600);
}
</script>
