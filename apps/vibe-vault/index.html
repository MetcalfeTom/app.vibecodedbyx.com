<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vibe Vault — seven drawers of pure mood</title>
<meta name="description" content="A bank vault for moods. Seven brass drawers, each holding a vibe: palettes, artifacts, a tone to strike, and room to deposit your own.">
<meta property="og:title" content="Vibe Vault">
<meta property="og:description" content="Seven brass drawers, each holding a vibe. Open one. Strike its tone. Deposit your own.">
<meta property="og:url" content="https://sloppy.live/vibe-vault">
<meta property="og:image" content="https://image.pollinations.ai/prompt/art%20deco%20bank%20vault%20door%20brass%20and%20charcoal%20steel%2C%20seven%20glowing%20drawers%2C%20golden%20sunburst%2C%20dramatic%20lighting%2C%20elegant%20poster?width=1200&height=630&nologo=true&seed=7707&model=flux">
<meta property="og:type" content="website">
<link rel="icon" href="https://emojicdn.elk.sh/💠">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Limelight&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=IBM+Plex+Mono:wght@300;600&display=swap" rel="stylesheet">
<style>
:root{
  --steel:#16181d; --steel-hi:#22252d; --brass:#c9a648; --brass-dim:#8a7433;
  --bone:#e8e0cc; --ink:#0b0c10; --line:rgba(201,166,72,.28);
}
*{ box-sizing:border-box; margin:0; padding:0; }
html{ font-size:100%; }
body{
  background:
    radial-gradient(60rem 30rem at 50% -10%, rgba(201,166,72,.09), transparent 60%),
    repeating-linear-gradient(90deg, transparent 0 7rem, rgba(255,255,255,.012) 7rem 7.1rem),
    var(--ink);
  color:var(--bone);
  font-family:'Cormorant Garamond', serif;
  min-height:100vh;
}
main{ max-width:46rem; margin:0 auto; padding:2.5rem 1rem 4rem; }
header{ text-align:center; margin-bottom:2.2rem; position:relative; }
.sunburst{
  position:absolute; inset:-2rem 0 auto; height:9rem; pointer-events:none; opacity:.5;
  background:repeating-conic-gradient(from -90deg at 50% 100%, transparent 0 7deg, rgba(201,166,72,.06) 7deg 8deg);
  -webkit-mask-image:linear-gradient(#000, transparent); mask-image:linear-gradient(#000, transparent);
}
h1{
  font-family:'Limelight', cursive; font-weight:400;
  font-size:clamp(2.6rem, 9vw, 4.6rem); letter-spacing:.06em; color:var(--brass);
  text-shadow:0 0 2.2rem rgba(201,166,72,.35);
}
.tag{ font-style:italic; font-size:1.15rem; color:var(--bone); opacity:.85; }
.plate{
  display:inline-block; margin-top:.7rem; font-family:'IBM Plex Mono', monospace; font-weight:300;
  font-size:.62rem; letter-spacing:.3em; text-transform:uppercase; color:var(--brass-dim);
  border:1px solid var(--line); padding:.3rem .9rem; border-radius:2px;
}
/* ── vault drawers ── */
.vault{ display:flex; flex-direction:column; gap:.65rem; }
.drawer{
  border:1px solid var(--line); border-radius:.3rem; overflow:hidden;
  background:linear-gradient(180deg, var(--steel-hi), var(--steel));
  box-shadow:0 .3rem 1.4rem rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.05);
}
.drawer-btn{
  width:100%; min-height:3.4rem; display:flex; align-items:center; gap:.9rem;
  padding:.7rem 1rem; background:none; border:0; cursor:pointer; color:var(--bone);
  font-family:'Cormorant Garamond', serif; text-align:left;
}
.drawer-btn:focus-visible{ outline:3px solid var(--brass); outline-offset:-3px; }
.d-emoji{ font-size:1.5rem; width:2.2rem; text-align:center; filter:drop-shadow(0 0 .4rem var(--dc, var(--brass))); }
.d-name{ font-size:1.45rem; font-weight:600; letter-spacing:.03em; flex:1; }
.d-name small{ display:block; font-size:.9rem; font-weight:400; font-style:italic; opacity:.65; }
.d-dial{
  font-family:'IBM Plex Mono', monospace; font-weight:300; font-size:.85rem; color:var(--brass);
  border:1px solid var(--line); border-radius:50%; width:2.2rem; height:2.2rem; flex:none;
  display:grid; place-items:center; transition:transform .45s cubic-bezier(.6,-0.3,.3,1.4);
}
.drawer.open .d-dial{ transform:rotate(135deg); }
.d-body{ max-height:0; overflow:hidden; transition:max-height .5s ease; }
.drawer.open .d-body{ max-height:46rem; }
.d-inner{ padding:.4rem 1.1rem 1.2rem; border-top:1px dashed var(--line); }
.d-mono{ font-family:'IBM Plex Mono', monospace; font-weight:300; font-size:.62rem; letter-spacing:.24em; text-transform:uppercase; color:var(--brass-dim); margin:.9rem 0 .4rem; }
.chips{ display:flex; gap:.5rem; flex-wrap:wrap; }
.chip{
  min-height:2.75rem; min-width:2.75rem; padding:0 .6rem; border-radius:.25rem; border:1px solid rgba(255,255,255,.14);
  cursor:pointer; font-family:'IBM Plex Mono', monospace; font-weight:600; font-size:.68rem;
  display:flex; align-items:center; justify-content:center;
}
.chip:focus-visible{ outline:3px solid var(--bone); outline-offset:2px; }
.arts{ list-style:none; }
.arts li{ font-size:1.12rem; font-style:italic; padding:.28rem 0; opacity:.92; }
.arts li::before{ content:"❧ "; color:var(--dc, var(--brass)); font-style:normal; }
.tone-btn{
  min-height:2.75rem; margin-top:.2rem; padding:.4rem 1.1rem; cursor:pointer;
  background:transparent; color:var(--brass); border:1px solid var(--brass-dim); border-radius:2px;
  font-family:'IBM Plex Mono', monospace; font-weight:600; font-size:.72rem; letter-spacing:.18em; text-transform:uppercase;
}
.tone-btn:hover{ background:rgba(201,166,72,.12); }
.tone-btn:focus-visible{ outline:3px solid var(--brass); outline-offset:2px; }
.dep-row{ display:flex; gap:.5rem; margin-top:.3rem; }
.dep-row input{
  flex:1; min-height:2.75rem; background:var(--ink); color:var(--bone); border:1px solid var(--line);
  border-radius:2px; padding:0 .8rem; font-family:'Cormorant Garamond', serif; font-size:1.05rem; font-style:italic;
}
.dep-row input:focus-visible{ outline:3px solid var(--brass); outline-offset:1px; }
.deps{ list-style:none; margin-top:.5rem; }
.deps li{
  font-size:1.02rem; font-style:italic; opacity:.8; padding:.2rem 0 .2rem .9rem;
  border-left:2px solid var(--dc, var(--brass));
  margin:.25rem 0;
}
footer{
  text-align:center; margin-top:2.6rem; font-family:'IBM Plex Mono', monospace; font-weight:300;
  font-size:.66rem; letter-spacing:.14em; color:var(--brass-dim);
}
footer em{ display:block; font-family:'Cormorant Garamond', serif; font-size:1rem; letter-spacing:0; color:var(--bone); opacity:.7; margin-bottom:.5rem; }
#toast{
  position:fixed; bottom:1.2rem; left:50%; transform:translateX(-50%) translateY(200%);
  background:var(--brass); color:var(--ink); font-family:'IBM Plex Mono', monospace; font-weight:600;
  font-size:.72rem; letter-spacing:.12em; padding:.55rem 1.1rem; border-radius:2px; transition:transform .3s ease;
}
#toast.show{ transform:translateX(-50%) translateY(0); }
@media (prefers-reduced-motion: reduce){
  .d-body, .d-dial, #toast{ transition:none; }
}
</style>
</head>
<body>
<main>
<header>
  <div class="sunburst" aria-hidden="true"></div>
  <h1>Vibe Vault</h1>
  <p class="tag">seven drawers of pure mood — open one, strike its tone, deposit your own</p>
  <p class="plate">EST. 2026 · BLUEPRINT: MARCIPOPSIS · INTERPRETED</p>
</header>

<div class="vault" id="vault"></div>

<footer>
  <em>MarciPopsis — if your blueprint named the seven differently, say the words and the drawers get re-engraved.</em>
  <span id="build-info">build <b>v1.0</b> · 2026-07-14 · commit <code id="build-hash">0000000</code></span>
</footer>
</main>
<div id="toast" role="status" aria-live="polite"></div>

<script>
var VIBES=[
 {id:'chill', emoji:'🌊', name:'Chill', sub:'the water is exactly body temperature', c:'#5fb8d4',
  pal:['#0d2b36','#155a70','#5fb8d4','#bfe8f2','#e8f6f9'],
  arts:['a fan you can hear but not feel','the third hour of an album on loop','condensation on a glass nobody is rushing to drink'],
  chord:[220, 277.18, 329.63, 415.30], wave:'sine'},
 {id:'hype', emoji:'🔥', name:'Hype', sub:'the drop is always four bars away', c:'#ff5a3c',
  pal:['#2b0a05','#8a1e0d','#ff5a3c','#ffb03c','#ffe8c2'],
  arts:['friends counting down from three for no reason','the smell of asphalt after the confetti cannon','a group chat that scrolls faster than you can read'],
  chord:[146.83, 220, 293.66, 440], wave:'sawtooth'},
 {id:'melancholy', emoji:'🌧', name:'Melancholy', sub:'beautiful, and a little bit blue about it', c:'#8f86c9',
  pal:['#14121f','#3a3357','#8f86c9','#c5bede','#eae7f2'],
  arts:['a train window doing the cinematography for you','songs you loved with someone you don’t talk to','rain that starts exactly when the chorus does'],
  chord:[196, 233.08, 293.66, 349.23], wave:'triangle'},
 {id:'cozy', emoji:'🕯', name:'Cozy', sub:'the radius of one lamp', c:'#e0a458',
  pal:['#241505','#6e4515','#e0a458','#f2d5a0','#faf0dc'],
  arts:['socks that have never touched shoes','soup that took the whole afternoon on purpose','a book heavy enough to pin the blanket down'],
  chord:[174.61, 220, 261.63, 329.63], wave:'sine'},
 {id:'chaos', emoji:'⚡', name:'Chaos', sub:'seventeen tabs, all of them load-bearing', c:'#d4ff3c',
  pal:['#1a0526','#ff3cb4','#d4ff3c','#3cf2ff','#ffffff'],
  arts:['a plan made entirely of the word “okay so”','the good kind of unhinged group project','music too fast to have feelings to'],
  chord:[185, 246.94, 311.13, 466.16], wave:'square'},
 {id:'focus', emoji:'🎯', name:'Focus', sub:'the cursor blinks and the world does not', c:'#57d98a',
  pal:['#04120a','#0c3d22','#57d98a','#a8ecc4','#eafcf1'],
  arts:['one task, one window, one glass of water','the silence after you silence the phone','flow state discovered at minute forty, lost at the doorbell'],
  chord:[164.81, 196, 246.94, 329.63], wave:'triangle'},
 {id:'dream', emoji:'🌙', name:'Dream', sub:'logic optional, feelings canonical', c:'#e3b8ff',
  pal:['#160d24','#4a2a70','#a06ee0','#e3b8ff','#f7ecff'],
  arts:['a staircase that was also your childhood kitchen','remembering a color that might not exist','waking up fluent in something you can’t name'],
  chord:[207.65, 261.63, 311.13, 392], wave:'sine'}
];

function $(id){ return document.getElementById(id); }
function esc(s){ var d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
function luma(hex){ var n=parseInt(hex.slice(1),16); return (0.299*(n>>16)+0.587*((n>>8)&255)+0.114*(n&255))/255; }

var DEPS_KEY='vibe-vault-deposits-v1';
function loadDeps(){ try{ return JSON.parse(localStorage.getItem(DEPS_KEY))||{}; }catch(e){ return {}; } }
function saveDeps(d){ try{ localStorage.setItem(DEPS_KEY, JSON.stringify(d)); }catch(e){} }
var deps=loadDeps();

/* build the seven drawers */
var vault=$('vault');
VIBES.forEach(function(v,i){
  var d=document.createElement('section');
  d.className='drawer'+(i===0?' open':'');
  d.id='drawer-'+v.id;
  d.style.setProperty('--dc', v.c);
  var depList=(deps[v.id]||[]).map(function(t){ return '<li>'+esc(t)+'</li>'; }).join('');
  d.innerHTML=
    '<h2><button type="button" class="drawer-btn" id="btn-'+v.id+'" aria-expanded="'+(i===0?'true':'false')+'" aria-controls="body-'+v.id+'">'+
      '<span class="d-emoji" aria-hidden="true">'+v.emoji+'</span>'+
      '<span class="d-name">'+v.name+'<small>'+v.sub+'</small></span>'+
      '<span class="d-dial" aria-hidden="true">◈</span>'+
    '</button></h2>'+
    '<div class="d-body" id="body-'+v.id+'" role="region" aria-label="'+v.name+' drawer">'+
      '<div class="d-inner">'+
        '<p class="d-mono">palette · tap to copy</p>'+
        '<div class="chips">'+v.pal.map(function(h){
          return '<button type="button" class="chip" data-hex="'+h+'" style="background:'+h+'; color:'+(luma(h)>0.55?'#0b0c10':'#e8e0cc')+'">'+h+'</button>';
        }).join('')+'</div>'+
        '<p class="d-mono">artifacts</p>'+
        '<ul class="arts">'+v.arts.map(function(a){ return '<li>'+a+'</li>'; }).join('')+'</ul>'+
        '<p class="d-mono">the tone</p>'+
        '<button type="button" class="tone-btn" data-vibe="'+i+'">♪ strike the '+v.name.toLowerCase()+' chord</button>'+
        '<p class="d-mono">deposit a vibe · stored in this browser only</p>'+
        '<div class="dep-row">'+
          '<input type="text" id="dep-in-'+v.id+'" maxlength="90" placeholder="describe a '+v.name.toLowerCase()+' moment…" aria-label="deposit a '+v.name+' vibe">'+
          '<button type="button" class="tone-btn" data-dep="'+v.id+'">deposit</button>'+
        '</div>'+
        '<ul class="deps" id="deps-'+v.id+'">'+depList+'</ul>'+
      '</div>'+
    '</div>';
  vault.appendChild(d);
});

/* accordion */
vault.addEventListener('click', function(e){
  var btn=e.target.closest('.drawer-btn');
  if(btn){
    var drawer=btn.closest('.drawer');
    var open=drawer.classList.toggle('open');
    btn.setAttribute('aria-expanded', open?'true':'false');
    return;
  }
  var chip=e.target.closest('.chip');
  if(chip){
    var hex=chip.getAttribute('data-hex');
    try{ navigator.clipboard.writeText(hex); toast(hex+' copied'); }catch(err){ toast(hex); }
    return;
  }
  var tone=e.target.closest('[data-vibe]');
  if(tone){ strike(VIBES[+tone.getAttribute('data-vibe')]); return; }
  var dep=e.target.closest('[data-dep]');
  if(dep){ deposit(dep.getAttribute('data-dep')); return; }
});
vault.addEventListener('keydown', function(e){
  if(e.key==='Enter'){
    var inp=e.target.closest('input[id^="dep-in-"]');
    if(inp){ deposit(inp.id.replace('dep-in-','')); }
  }
});

function deposit(id){
  var inp=$('dep-in-'+id);
  var t=(inp.value||'').trim();
  if(!t){ toast('an empty vault stays empty'); return; }
  deps[id]=(deps[id]||[]).concat(t).slice(-12);
  saveDeps(deps);
  var li=document.createElement('li'); li.textContent=t;
  $('deps-'+id).appendChild(li);
  inp.value='';
  toast('deposited ✓');
}

/* one soft chord per vibe — WebAudio, gesture-unlocked by the click itself */
var actx=null;
function strike(v){
  try{
    actx=actx||new (window.AudioContext||window.webkitAudioContext)();
    if(actx.state==='suspended') actx.resume();
    var now=actx.currentTime;
    var master=actx.createGain(); master.gain.value=0.0001; master.connect(actx.destination);
    master.gain.linearRampToValueAtTime(0.16, now+0.06);
    master.gain.exponentialRampToValueAtTime(0.0001, now+2.6);
    v.chord.forEach(function(f,k){
      var o=actx.createOscillator(); o.type=v.wave; o.frequency.value=f;
      var g=actx.createGain(); g.gain.value=0.28/(k+1);
      var lp=actx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=v.wave==='sawtooth'||v.wave==='square'?1400:4200;
      o.connect(g); g.connect(lp); lp.connect(master);
      o.start(now+k*0.04); o.stop(now+2.7);
    });
    toast('♪ '+v.name.toLowerCase());
  }catch(e){}
}

var toastT=null;
function toast(msg){
  var t=$('toast'); t.textContent=msg; t.classList.add('show');
  clearTimeout(toastT); toastT=setTimeout(function(){ t.classList.remove('show'); }, 1600);
}
</script>
</body>
</html>
