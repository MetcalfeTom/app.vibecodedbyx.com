<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>memory arcade</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%95%B9%EF%B8%8F" />
<meta name="description" content="A synthwave arcade hub. Earn tokens, unlock new rooms, prove your memory." />
<meta property="og:title" content="memory arcade" />
<meta property="og:description" content="A synthwave arcade hub. Earn tokens, unlock new rooms, prove your memory." />
<meta property="og:url" content="https://sloppy.live/memory-arcade/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/synthwave%20arcade%20interior%20neon%20pink%20cyan%20perspective%20grid%20glowing%20doors%2080s%20sunset%2C%201200x630?width=1200&height=630&nofeed=true&format=png" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Monoton&family=Audiowide&family=Rubik+Mono+One&family=Space+Mono:wght@400;700&family=VT323&display=swap" rel="stylesheet" />
<style>
:root{
  --pink:#ff37c8;
  --cyan:#3affff;
  --magenta:#ff5ea1;
  --violet:#a455ff;
  --amber:#ffce4a;
  --hot:#ff5070;
  --green:#7dff8a;
  --bg:#0a0420;
  --bg-2:#1a0840;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:#fff;font-family:'Space Mono', monospace;overflow:hidden}
body{
  background:
    radial-gradient(ellipse at 50% 95%, rgba(255,55,200,0.30), transparent 55%),
    radial-gradient(ellipse at 50% 110%, rgba(58,255,255,0.20), transparent 60%),
    radial-gradient(ellipse at 50% 0%, rgba(164,85,255,0.14), transparent 70%),
    linear-gradient(180deg, #1a0840 0%, #0a0420 65%, #050010 100%);
}
canvas{position:fixed;inset:0;width:100%;height:100%;z-index:1}

/* ===== HUD ===== */
.hud{
  position:fixed;top:0;left:0;right:0;z-index:10;
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 22px;pointer-events:none;
}
.brand{
  font-family:'Monoton', cursive;font-size:34px;letter-spacing:0.10em;line-height:1;
  color:#fff;text-shadow:
    0 0 1px var(--pink),
    0 0 14px var(--pink),
    0 2px 0 var(--cyan),
    0 4px 0 #000;
  pointer-events:none;
}
.brand small{
  display:block;font-family:'Audiowide', sans-serif;font-size:11px;letter-spacing:0.32em;
  color:var(--cyan);margin-top:4px;text-shadow:0 0 8px rgba(58,255,255,0.6);
}
.tokens{
  pointer-events:auto;
  background:linear-gradient(180deg, rgba(0,0,0,0.55), rgba(0,0,0,0.35));
  border:2px solid var(--cyan);
  padding:8px 14px;border-radius:3px;
  box-shadow:0 0 16px rgba(58,255,255,0.45), inset 0 0 16px rgba(58,255,255,0.10);
  font-family:'Audiowide', sans-serif;letter-spacing:0.18em;font-size:14px;color:var(--cyan);
  display:flex;gap:10px;align-items:baseline;
}
.tokens b{font-family:'Rubik Mono One', sans-serif;font-size:24px;color:#fff;text-shadow:0 0 12px var(--cyan)}

.back{
  pointer-events:auto;display:none;
  background:linear-gradient(180deg, rgba(255,55,200,0.18), rgba(255,55,200,0.04));
  border:2px solid var(--pink);
  padding:8px 14px;border-radius:3px;
  font-family:'Audiowide', sans-serif;letter-spacing:0.18em;font-size:11px;color:#fff;
  cursor:pointer;text-transform:uppercase;
  box-shadow:0 0 14px rgba(255,55,200,0.45);
  transition:all 0.15s;
}
.back:hover{background:rgba(255,55,200,0.35);box-shadow:0 0 22px rgba(255,55,200,0.7)}
.back.show{display:inline-block}

/* ===== SCENE PANELS ===== */
.scene{
  position:fixed;inset:0;z-index:5;
  display:none;align-items:center;justify-content:center;
  padding:90px 24px 40px;
}
.scene.active{display:flex}

/* ===== HUB ===== */
.hub{
  position:relative;width:100%;height:100%;
  display:flex;align-items:flex-end;justify-content:center;
  padding-bottom:60px;
}
.doors{
  display:flex;gap:18px;flex-wrap:wrap;justify-content:center;
  max-width:1080px;width:100%;
}
.door{
  position:relative;
  flex:1 1 180px;max-width:200px;min-width:160px;
  height:240px;
  border:2px solid;border-radius:6px 6px 2px 2px;
  background:linear-gradient(180deg, rgba(0,0,0,0.45) 0%, rgba(0,0,0,0.85) 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:flex-end;
  padding:18px 12px;cursor:pointer;
  font-family:'Audiowide', sans-serif;letter-spacing:0.18em;font-size:13px;
  text-transform:uppercase;color:#fff;text-align:center;
  transition:all 0.20s cubic-bezier(.4,0,.2,1);
  box-shadow:0 0 0 0 transparent, inset 0 -50px 80px -10px rgba(0,0,0,0.4);
  overflow:hidden;
}
.door::before{
  /* arch top glow + light strip */
  content:'';position:absolute;top:0;left:0;right:0;height:10px;
  background:currentColor;opacity:0.85;
  filter:blur(3px);
}
.door::after{
  /* corridor floor reflection inside */
  content:'';position:absolute;bottom:0;left:0;right:0;height:60%;
  background:linear-gradient(180deg, transparent 0%, currentColor 200%);
  opacity:0.18;mix-blend-mode:screen;
}
.door:hover:not(.locked){
  transform:translateY(-6px);
  box-shadow:0 0 32px currentColor, 0 0 60px currentColor, inset 0 -50px 80px -10px rgba(0,0,0,0.3);
}
.door.pink   {color:var(--pink);   border-color:var(--pink);   text-shadow:0 0 10px var(--pink)}
.door.cyan   {color:var(--cyan);   border-color:var(--cyan);   text-shadow:0 0 10px var(--cyan)}
.door.violet {color:var(--violet); border-color:var(--violet); text-shadow:0 0 10px var(--violet)}
.door.amber  {color:var(--amber);  border-color:var(--amber);  text-shadow:0 0 10px var(--amber)}
.door.green  {color:var(--green);  border-color:var(--green);  text-shadow:0 0 10px var(--green)}
.door .icon{
  font-size:64px;line-height:1;margin-bottom:14px;
  filter:drop-shadow(0 0 10px currentColor) drop-shadow(0 0 22px currentColor);
}
.door .name{font-size:16px;font-family:'Rubik Mono One', sans-serif;color:#fff;margin-bottom:4px;letter-spacing:0.06em}
.door .meta{font-size:9px;letter-spacing:0.30em;opacity:0.7}
.door .best{font-family:'VT323', monospace;font-size:18px;color:#fff;margin-top:6px}
.door.locked{cursor:not-allowed;opacity:0.55;filter:grayscale(0.5)}
.door.locked .icon{filter:drop-shadow(0 0 4px currentColor) grayscale(0.5)}
.door.locked::before{opacity:0.35}
.door.locked .lock{
  position:absolute;top:8px;right:8px;
  font-size:14px;color:var(--hot);text-shadow:0 0 6px var(--hot);
}
.door.locked .req{
  position:absolute;top:50%;left:0;right:0;
  font-family:'VT323', monospace;font-size:14px;color:var(--hot);
  letter-spacing:0;background:rgba(0,0,0,0.7);padding:6px 0;
  transform:translateY(-50%);text-shadow:0 0 6px var(--hot);
}

/* ===== minigame card ===== */
.game-card{
  background:linear-gradient(180deg, rgba(20,5,55,0.92) 0%, rgba(10,4,32,0.96) 100%);
  border:2px solid var(--cyan);border-radius:4px;
  padding:24px;max-width:760px;width:100%;
  box-shadow:0 0 32px rgba(58,255,255,0.30), inset 0 0 32px rgba(255,55,200,0.06);
  display:flex;flex-direction:column;align-items:center;gap:14px;
}
.game-card.violet{border-color:var(--violet);box-shadow:0 0 32px rgba(164,85,255,0.30), inset 0 0 32px rgba(255,55,200,0.06)}
.game-card.amber {border-color:var(--amber); box-shadow:0 0 32px rgba(255,206,74,0.30), inset 0 0 32px rgba(255,55,200,0.06)}
.game-card.pink  {border-color:var(--pink);  box-shadow:0 0 32px rgba(255,55,200,0.30), inset 0 0 32px rgba(58,255,255,0.06)}
.game-card.green {border-color:var(--green); box-shadow:0 0 32px rgba(125,255,138,0.30), inset 0 0 32px rgba(58,255,255,0.06)}
.game-title{font-family:'Audiowide', sans-serif;font-size:22px;letter-spacing:0.30em;color:#fff;text-shadow:0 0 12px currentColor;text-transform:uppercase}
.game-status{
  font-family:'VT323', monospace;font-size:18px;color:var(--cyan);
  letter-spacing:0.10em;text-align:center;min-height:24px;
}
.game-status.win{color:var(--green);text-shadow:0 0 10px var(--green)}
.game-status.lose{color:var(--hot);text-shadow:0 0 10px var(--hot)}

/* ===== MATCH ===== */
.match-grid{display:grid;grid-template-columns:repeat(4, 96px);gap:10px}
.card{
  width:96px;height:120px;border-radius:4px;cursor:pointer;
  background:linear-gradient(180deg, rgba(255,55,200,0.18), rgba(58,255,255,0.10));
  border:2px solid var(--pink);
  display:flex;align-items:center;justify-content:center;
  font-size:48px;
  perspective:800px;transition:transform 0.3s, opacity 0.3s;
  text-shadow:0 0 14px currentColor;
  box-shadow:0 0 12px rgba(255,55,200,0.20);
  user-select:none;
}
.card.flipped{
  background:linear-gradient(180deg, rgba(58,255,255,0.20), rgba(164,85,255,0.10));
  border-color:var(--cyan);
}
.card .face{display:none}
.card.flipped .face{display:block}
.card.matched{opacity:0.45;border-color:var(--green);box-shadow:0 0 16px var(--green)}

/* ===== SIMON ===== */
.simon-rig{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;
  width:340px;height:340px;
}
.simon-pad{
  border-radius:6px;cursor:pointer;
  border:3px solid currentColor;
  background:linear-gradient(180deg, rgba(0,0,0,0.4), rgba(0,0,0,0.7));
  transition:all 0.12s ease;
  box-shadow:inset 0 0 16px rgba(0,0,0,0.5);
  display:flex;align-items:center;justify-content:center;
  font-family:'Rubik Mono One', sans-serif;font-size:28px;color:transparent;
}
.simon-pad.lit{
  background:linear-gradient(180deg, currentColor, rgba(0,0,0,0.4));
  box-shadow:0 0 28px currentColor, inset 0 0 36px rgba(255,255,255,0.5);
  filter:saturate(1.5) brightness(1.2);
}
.simon-pad.p1{color:var(--pink)}
.simon-pad.p2{color:var(--cyan)}
.simon-pad.p3{color:var(--amber)}
.simon-pad.p4{color:var(--green)}

/* ===== DIGITS ===== */
.digits-display{
  font-family:'Rubik Mono One', sans-serif;font-size:72px;letter-spacing:0.16em;
  color:var(--cyan);text-shadow:0 0 22px var(--cyan);
  min-height:96px;display:flex;align-items:center;justify-content:center;
}
.digits-input{
  background:rgba(0,0,0,0.5);border:2px solid var(--cyan);border-radius:4px;
  color:#fff;font-family:'Rubik Mono One', sans-serif;font-size:36px;
  padding:12px 20px;letter-spacing:0.16em;text-align:center;width:280px;outline:none;
  text-shadow:0 0 10px var(--cyan);
}
.digits-input:focus{box-shadow:0 0 20px rgba(58,255,255,0.5)}

/* ===== PATH ===== */
.path-grid{display:grid;grid-template-columns:repeat(5, 60px);grid-template-rows:repeat(5, 60px);gap:8px}
.path-cell{
  border:2px solid var(--violet);border-radius:4px;cursor:pointer;
  background:rgba(20,5,55,0.6);
  display:flex;align-items:center;justify-content:center;
  font-family:'Rubik Mono One', sans-serif;font-size:14px;color:transparent;
  transition:all 0.12s;
}
.path-cell.lit{
  background:var(--violet);color:#fff;
  box-shadow:0 0 22px var(--violet);
}
.path-cell.player{
  background:var(--cyan);color:#fff;box-shadow:0 0 14px var(--cyan);
  border-color:var(--cyan);
}
.path-cell.wrong{background:var(--hot);box-shadow:0 0 14px var(--hot);border-color:var(--hot)}

/* ===== ICONS ===== */
.icons-grid{display:grid;grid-template-columns:repeat(4, 80px);gap:8px}
.icon-cell{
  width:80px;height:80px;border:2px solid var(--amber);border-radius:4px;
  background:rgba(0,0,0,0.5);
  display:flex;align-items:center;justify-content:center;
  font-size:42px;cursor:pointer;
  transition:all 0.12s;
}
.icon-cell.hidden{font-size:0;color:transparent}
.icon-cell.target{box-shadow:0 0 18px var(--amber);border-color:#fff}
.icon-cell.right{background:var(--green);box-shadow:0 0 18px var(--green)}
.icon-cell.wrong{background:var(--hot);box-shadow:0 0 18px var(--hot)}
.icon-prompt{
  font-family:'Audiowide', sans-serif;font-size:22px;color:#fff;letter-spacing:0.14em;
  text-shadow:0 0 12px var(--amber);
}

/* ===== BUTTONS ===== */
.btn{
  background:linear-gradient(180deg, rgba(58,255,255,0.18), rgba(58,255,255,0.04));
  border:2px solid var(--cyan);border-radius:3px;
  padding:10px 22px;font-family:'Audiowide', sans-serif;font-size:13px;letter-spacing:0.22em;
  color:#fff;text-transform:uppercase;cursor:pointer;
  box-shadow:0 0 14px rgba(58,255,255,0.30);transition:all 0.15s;
}
.btn:hover{background:rgba(58,255,255,0.35);box-shadow:0 0 22px rgba(58,255,255,0.6)}
.btn.pink{border-color:var(--pink);background:linear-gradient(180deg, rgba(255,55,200,0.20), rgba(255,55,200,0.04));box-shadow:0 0 14px rgba(255,55,200,0.30)}
.btn.pink:hover{background:rgba(255,55,200,0.40);box-shadow:0 0 22px rgba(255,55,200,0.6)}

.audio-toggle{
  position:fixed;bottom:14px;right:14px;z-index:11;
  background:rgba(0,0,0,0.5);border:1px solid var(--cyan);border-radius:50%;
  width:36px;height:36px;cursor:pointer;color:var(--cyan);
  font-size:14px;font-family:'Audiowide', sans-serif;
  box-shadow:0 0 10px rgba(58,255,255,0.40);
}

@media (max-width:680px){
  .brand{font-size:24px}
  .brand small{font-size:9px}
  .door{flex-basis:140px;max-width:160px;min-width:120px;height:200px}
  .door .icon{font-size:44px;margin-bottom:8px}
  .door .name{font-size:13px}
  .match-grid{grid-template-columns:repeat(4, 64px);gap:6px}
  .card{width:64px;height:80px;font-size:32px}
  .simon-rig{width:260px;height:260px}
  .digits-display{font-size:48px}
  .path-grid{grid-template-columns:repeat(5, 44px);grid-template-rows:repeat(5, 44px);gap:5px}
  .icons-grid{grid-template-columns:repeat(4, 60px)}
  .icon-cell{width:60px;height:60px;font-size:30px}
}
</style>
</head>
<body>
<canvas id="bg"></canvas>

<div class="hud">
  <div class="brand">MEMORY ARCADE<small>VOL · 1989</small></div>
  <div style="display:flex;gap:10px;align-items:center">
    <button class="back" id="btnBack">◀ HUB</button>
    <div class="tokens">TOKENS<b id="tokens">0</b></div>
  </div>
</div>

<!-- HUB -->
<div class="scene active" id="scene-hub">
  <div class="hub">
    <div class="doors" id="doorRack"></div>
  </div>
</div>

<!-- MATCH -->
<div class="scene" id="scene-match">
  <div class="game-card pink">
    <div class="game-title" style="color:var(--pink)">★ MATCH ROOM</div>
    <div class="game-status" id="matchStatus">find every pair</div>
    <div class="match-grid" id="matchGrid"></div>
    <button class="btn pink" id="matchRestart">NEW DECK</button>
  </div>
</div>

<!-- SIMON -->
<div class="scene" id="scene-simon">
  <div class="game-card violet">
    <div class="game-title" style="color:var(--violet)">▲ SEQUENCE ROOM</div>
    <div class="game-status" id="simonStatus">click START to begin</div>
    <div class="simon-rig" id="simonRig">
      <div class="simon-pad p1" data-pad="1">1</div>
      <div class="simon-pad p2" data-pad="2">2</div>
      <div class="simon-pad p3" data-pad="3">3</div>
      <div class="simon-pad p4" data-pad="4">4</div>
    </div>
    <button class="btn" id="simonStart">START</button>
  </div>
</div>

<!-- DIGITS -->
<div class="scene" id="scene-digits">
  <div class="game-card">
    <div class="game-title" style="color:var(--cyan)">◇ DIGIT ROOM</div>
    <div class="game-status" id="digitsStatus">memorize the number</div>
    <div class="digits-display" id="digitsDisplay">—</div>
    <input class="digits-input" id="digitsInput" placeholder="recall…" inputmode="numeric" maxlength="14" />
    <button class="btn" id="digitsStart">START</button>
  </div>
</div>

<!-- PATH -->
<div class="scene" id="scene-path">
  <div class="game-card violet">
    <div class="game-title" style="color:var(--violet)">↯ PATH ROOM</div>
    <div class="game-status" id="pathStatus">watch the trail, then walk it</div>
    <div class="path-grid" id="pathGrid"></div>
    <button class="btn" id="pathStart">START</button>
  </div>
</div>

<!-- ICONS -->
<div class="scene" id="scene-icons">
  <div class="game-card amber">
    <div class="game-title" style="color:var(--amber)">☼ ICON ROOM</div>
    <div class="game-status" id="iconsStatus">memorize the layout</div>
    <div class="icons-grid" id="iconsGrid"></div>
    <div class="icon-prompt" id="iconsPrompt">&nbsp;</div>
    <button class="btn" id="iconsStart">START</button>
  </div>
</div>

<button class="audio-toggle" id="audioToggle" title="toggle audio">♪</button>

<script>
(() => {
  // ===== state =====
  const state = {
    tokens: parseInt(localStorage.getItem('memarc-tokens') || '0', 10),
    bests: JSON.parse(localStorage.getItem('memarc-bests') || '{}'),
    audio: localStorage.getItem('memarc-audio') !== '0',
    scene: 'hub',
  };
  function saveTokens() { localStorage.setItem('memarc-tokens', state.tokens); }
  function saveBests() { localStorage.setItem('memarc-bests', JSON.stringify(state.bests)); }

  function awardTokens(n, reason) {
    state.tokens += n;
    saveTokens();
    document.getElementById('tokens').textContent = state.tokens;
    bumpToken();
  }
  function bumpToken() {
    const el = document.getElementById('tokens');
    el.style.transition = 'transform 0.18s ease';
    el.style.transform = 'scale(1.4)';
    setTimeout(() => el.style.transform = 'scale(1)', 200);
  }
  document.getElementById('tokens').textContent = state.tokens;

  // ===== rooms config =====
  const ROOMS = [
    { id: 'match',  name: 'MATCH',    icon: '★', color: 'pink',   meta: 'pair finder',     unlock: 0  },
    { id: 'simon',  name: 'SEQUENCE', icon: '▲', color: 'violet', meta: 'echo the chain',  unlock: 1  },
    { id: 'digits', name: 'DIGITS',   icon: '◇', color: 'cyan',   meta: 'recall the code', unlock: 3  },
    { id: 'path',   name: 'PATH',     icon: '↯', color: 'green',  meta: 'walk the trail',  unlock: 6  },
    { id: 'icons',  name: 'ICONS',    icon: '☼', color: 'amber',  meta: 'where was it',    unlock: 10 },
  ];

  // ===== scene management =====
  const sceneEls = {};
  document.querySelectorAll('.scene').forEach(s => sceneEls[s.id.replace('scene-','')] = s);

  function gotoScene(id) {
    state.scene = id;
    Object.entries(sceneEls).forEach(([k, el]) => el.classList.toggle('active', k === id));
    document.getElementById('btnBack').classList.toggle('show', id !== 'hub');
    if (id === 'hub') renderDoors();
  }
  document.getElementById('btnBack').addEventListener('click', () => {
    // tear down active game's loops
    if (state.scene === 'simon') simon.abort();
    if (state.scene === 'path')  path.abort();
    gotoScene('hub');
  });

  // ===== doors =====
  function renderDoors() {
    const rack = document.getElementById('doorRack');
    rack.innerHTML = '';
    for (const r of ROOMS) {
      const locked = state.tokens < r.unlock;
      const div = document.createElement('div');
      div.className = `door ${r.color}${locked ? ' locked' : ''}`;
      const best = state.bests[r.id];
      div.innerHTML = `
        ${locked ? '<span class="lock">⌧ LOCKED</span>' : ''}
        ${locked ? `<div class="req">NEED ${r.unlock} TOKENS</div>` : ''}
        <div class="icon">${r.icon}</div>
        <div class="name">${r.name}</div>
        <div class="meta">${r.meta}</div>
        <div class="best">${best != null ? 'BEST · ' + best : 'NEW'}</div>
      `;
      div.addEventListener('click', () => {
        if (locked) { wobble(div); sfx.deny(); return; }
        sfx.enter();
        gotoScene(r.id);
        startRoom(r.id);
      });
      rack.appendChild(div);
    }
  }
  function wobble(el) {
    el.animate(
      [{ transform: 'translateX(0)' }, { transform: 'translateX(-6px)' }, { transform: 'translateX(6px)' }, { transform: 'translateX(0)' }],
      { duration: 240, easing: 'ease-in-out' }
    );
  }

  function startRoom(id) {
    if (id === 'match')  match.start();
    if (id === 'simon')  simon.reset();
    if (id === 'digits') digits.start();
    if (id === 'path')   path.reset();
    if (id === 'icons')  icons.start();
  }

  // ===== synthwave background canvas =====
  const canvas = document.getElementById('bg');
  const ctx = canvas.getContext('2d');
  let W = 0, H = 0;
  function resize() {
    const dpr = Math.min(2, window.devicePixelRatio || 1);
    W = window.innerWidth; H = window.innerHeight;
    canvas.width  = W * dpr;
    canvas.height = H * dpr;
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  function drawBg(t) {
    ctx.clearRect(0, 0, W, H);
    // sky → ground gradient
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#1a0840');
    g.addColorStop(0.55, '#3a0850');
    g.addColorStop(0.65, '#5e1844');
    g.addColorStop(1, '#0a0420');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

    // sun
    const sunY = H * 0.62, sunR = Math.min(W, H) * 0.18;
    const sg = ctx.createRadialGradient(W/2, sunY, sunR*0.2, W/2, sunY, sunR);
    sg.addColorStop(0, 'rgba(255,206,74,1)');
    sg.addColorStop(0.5, 'rgba(255,55,200,0.92)');
    sg.addColorStop(1, 'rgba(255,55,200,0)');
    ctx.fillStyle = sg;
    ctx.beginPath(); ctx.arc(W/2, sunY, sunR, 0, Math.PI * 2); ctx.fill();
    // sun bands (horizontal cuts)
    ctx.fillStyle = 'rgba(20,5,55,0.85)';
    for (let i = 0; i < 6; i++) {
      const y = sunY + sunR * 0.35 + i * 8 + (Math.sin(t*0.8 + i) * 2);
      ctx.fillRect(W/2 - sunR, y, sunR * 2, 3 + i);
    }

    // stars (fixed)
    ctx.fillStyle = 'rgba(255,255,255,0.7)';
    for (let i = 0; i < 80; i++) {
      const sx = ((i * 73) % W);
      const sy = ((i * 137) % (H * 0.55));
      const tw = 0.4 + (Math.sin(t*1.5 + i) * 0.4 + 0.4) * 0.6;
      ctx.globalAlpha = tw;
      ctx.fillRect(sx, sy, 1.2, 1.2);
    }
    ctx.globalAlpha = 1;

    // mountains silhouette
    ctx.fillStyle = '#0a0420';
    ctx.beginPath(); ctx.moveTo(0, H * 0.7);
    for (let x = 0; x <= W + 10; x += 60) {
      const y = H * 0.7 - Math.abs(Math.sin(x * 0.013) + Math.sin(x * 0.041) * 0.6) * (H * 0.07);
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W, H); ctx.lineTo(0, H); ctx.closePath(); ctx.fill();

    // perspective grid floor
    const horizon = H * 0.7;
    const lineCount = 18;
    ctx.strokeStyle = 'rgba(58,255,255,0.55)';
    ctx.lineWidth = 1.2;
    // horizontal lines (z-depth)
    for (let i = 1; i <= lineCount; i++) {
      let z = ((t * 0.35 + i / lineCount) % 1);
      z = Math.pow(z, 1.6);
      const y = horizon + (H - horizon) * z;
      const alpha = (1 - z) * 0.85;
      ctx.strokeStyle = `rgba(58,255,255,${alpha})`;
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }
    // vertical lines (vanishing point)
    const vp = W / 2;
    for (let i = -10; i <= 10; i++) {
      const xEnd = vp + i * (W / 10);
      ctx.strokeStyle = `rgba(255,55,200,0.40)`;
      ctx.beginPath(); ctx.moveTo(vp, horizon); ctx.lineTo(xEnd, H); ctx.stroke();
    }
    // glow strip at horizon
    const gh = ctx.createLinearGradient(0, horizon - 4, 0, horizon + 4);
    gh.addColorStop(0, 'rgba(255,55,200,0)');
    gh.addColorStop(0.5, 'rgba(255,55,200,0.95)');
    gh.addColorStop(1, 'rgba(255,55,200,0)');
    ctx.fillStyle = gh; ctx.fillRect(0, horizon - 4, W, 8);
  }
  let bgT = 0;
  function tickBg(now) {
    bgT = now / 1000;
    drawBg(bgT);
    requestAnimationFrame(tickBg);
  }
  requestAnimationFrame(tickBg);

  // ===== audio =====
  let actx = null;
  function ensureAudio() {
    if (!actx && state.audio) {
      try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    }
    return actx;
  }
  function tone(freq, dur, type = 'triangle', gain = 0.15) {
    if (!state.audio) return;
    const ac = ensureAudio(); if (!ac) return;
    const o = ac.createOscillator(), g = ac.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.value = 0;
    g.gain.setValueAtTime(0, ac.currentTime);
    g.gain.linearRampToValueAtTime(gain, ac.currentTime + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    o.connect(g); g.connect(ac.destination);
    o.start(); o.stop(ac.currentTime + dur + 0.05);
  }
  const sfx = {
    enter:   () => tone(280, 0.20, 'sawtooth', 0.18),
    deny:    () => { tone(120, 0.18, 'square', 0.22); setTimeout(() => tone(80, 0.12, 'square', 0.18), 120); },
    flip:    () => tone(560, 0.10, 'triangle', 0.10),
    match:   () => { tone(660, 0.10, 'triangle', 0.14); setTimeout(() => tone(990, 0.16, 'triangle', 0.14), 80); },
    nomatch: () => tone(180, 0.20, 'sawtooth', 0.14),
    win:     () => { [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => tone(f, 0.18, 'triangle', 0.18), i * 90)); },
    lose:    () => { [330, 250, 180].forEach((f, i) => setTimeout(() => tone(f, 0.22, 'sawtooth', 0.16), i * 130)); },
    blip:    (f) => tone(f, 0.18, 'triangle', 0.18),
  };
  document.getElementById('audioToggle').addEventListener('click', () => {
    state.audio = !state.audio;
    localStorage.setItem('memarc-audio', state.audio ? '1' : '0');
    document.getElementById('audioToggle').style.opacity = state.audio ? 1 : 0.4;
    if (state.audio) sfx.flip();
  });
  document.getElementById('audioToggle').style.opacity = state.audio ? 1 : 0.4;

  function endRoomWin(roomId, score, tokens) {
    state.bests[roomId] = Math.max(state.bests[roomId] || 0, score);
    saveBests();
    awardTokens(tokens, roomId);
    sfx.win();
  }

  // ============================================
  // ===== MATCH ===============================
  // ============================================
  const FACES = ['🌴','🚗','🦩','🌙','🎷','📼','💾','🕹️','🪩','🌵','💎','🦊','🛼','🌈','🥥','🌊'];
  const match = {
    deck: [],
    flipped: [],
    matched: 0,
    moves: 0,
    locked: false,
    start() {
      const grid = document.getElementById('matchGrid');
      grid.innerHTML = '';
      this.matched = 0; this.moves = 0; this.locked = false; this.flipped = [];
      const pool = FACES.slice().sort(() => Math.random() - 0.5).slice(0, 8);
      this.deck = [...pool, ...pool].sort(() => Math.random() - 0.5);
      this.deck.forEach((face, i) => {
        const c = document.createElement('div');
        c.className = 'card'; c.dataset.idx = i;
        c.innerHTML = `<span class="face">${face}</span>`;
        c.addEventListener('click', () => match.flip(i));
        grid.appendChild(c);
      });
      this.updateStatus();
    },
    flip(i) {
      if (this.locked) return;
      const cards = document.querySelectorAll('#matchGrid .card');
      const c = cards[i];
      if (c.classList.contains('flipped') || c.classList.contains('matched')) return;
      c.classList.add('flipped'); sfx.flip();
      this.flipped.push(i);
      if (this.flipped.length === 2) {
        this.moves++;
        const [a, b] = this.flipped;
        if (this.deck[a] === this.deck[b]) {
          setTimeout(() => {
            cards[a].classList.add('matched');
            cards[b].classList.add('matched');
            this.flipped = []; this.matched++;
            sfx.match();
            if (this.matched === 8) this.win();
            this.updateStatus();
          }, 280);
        } else {
          this.locked = true;
          setTimeout(() => {
            cards[a].classList.remove('flipped');
            cards[b].classList.remove('flipped');
            this.flipped = []; this.locked = false;
            sfx.nomatch();
            this.updateStatus();
          }, 700);
        }
      }
    },
    updateStatus() {
      const s = document.getElementById('matchStatus');
      s.className = 'game-status';
      s.textContent = `pairs ${this.matched} / 8  ·  moves ${this.moves}`;
    },
    win() {
      const s = document.getElementById('matchStatus');
      s.className = 'game-status win';
      const score = Math.max(8, 32 - this.moves);
      s.textContent = `solved in ${this.moves} moves · score ${score} · +2 tokens`;
      endRoomWin('match', score, 2);
    },
  };
  document.getElementById('matchRestart').addEventListener('click', () => match.start());

  // ============================================
  // ===== SIMON ===============================
  // ============================================
  const SIMON_FREQS = { 1: 330, 2: 440, 3: 587, 4: 783 };
  const simon = {
    seq: [], inputIdx: 0, playing: false, level: 0, locking: false, aborted: false,
    reset() {
      this.seq = []; this.inputIdx = 0; this.playing = false; this.level = 0; this.locking = false; this.aborted = false;
      const s = document.getElementById('simonStatus');
      s.className = 'game-status';
      s.textContent = 'click START to begin';
    },
    abort() { this.aborted = true; this.locking = true; },
    async start() {
      this.reset(); this.aborted = false;
      await new Promise(r => setTimeout(r, 400));
      this.next();
    },
    async next() {
      if (this.aborted) return;
      this.level++;
      this.seq.push(1 + Math.floor(Math.random() * 4));
      this.inputIdx = 0;
      this.playing = true; this.locking = true;
      const s = document.getElementById('simonStatus');
      s.className = 'game-status'; s.textContent = `level ${this.level} · watch`;
      await new Promise(r => setTimeout(r, 600));
      for (const p of this.seq) {
        if (this.aborted) return;
        await this.flash(p, 350);
        await new Promise(r => setTimeout(r, 180));
      }
      if (this.aborted) return;
      this.locking = false;
      s.textContent = `level ${this.level} · your turn`;
    },
    async flash(p, ms = 220) {
      const pad = document.querySelector(`.simon-pad[data-pad="${p}"]`);
      if (!pad) return;
      pad.classList.add('lit'); sfx.blip(SIMON_FREQS[p]);
      await new Promise(r => setTimeout(r, ms));
      pad.classList.remove('lit');
    },
    press(p) {
      if (this.locking || this.aborted) return;
      this.flash(p, 200);
      if (this.seq[this.inputIdx] === p) {
        this.inputIdx++;
        if (this.inputIdx === this.seq.length) {
          this.locking = true;
          if (this.level >= 12) { this.win(); return; }
          setTimeout(() => this.next(), 600);
        }
      } else {
        this.lose();
      }
    },
    lose() {
      this.locking = true;
      const s = document.getElementById('simonStatus');
      s.className = 'game-status lose'; s.textContent = `wrong · reached level ${this.level} · score ${Math.max(0, this.level - 1)}`;
      sfx.lose();
      const score = Math.max(0, this.level - 1);
      if (score > 0) {
        state.bests.simon = Math.max(state.bests.simon || 0, score);
        saveBests();
        if (score >= 4) awardTokens(1, 'simon');
        if (score >= 7) awardTokens(1, 'simon');
        if (score >= 10) awardTokens(2, 'simon');
      }
    },
    win() {
      const s = document.getElementById('simonStatus');
      s.className = 'game-status win';
      s.textContent = `MASTERED · level ${this.level} · +5 tokens`;
      endRoomWin('simon', this.level, 5);
    },
  };
  document.querySelectorAll('.simon-pad').forEach(p => {
    p.addEventListener('click', () => simon.press(parseInt(p.dataset.pad, 10)));
  });
  document.getElementById('simonStart').addEventListener('click', () => simon.start());

  // ============================================
  // ===== DIGITS ==============================
  // ============================================
  const digits = {
    target: '', round: 0, len: 4,
    start() {
      this.round = 1; this.len = 4; this.next();
    },
    next() {
      const display = document.getElementById('digitsDisplay');
      const inp = document.getElementById('digitsInput');
      const s = document.getElementById('digitsStatus');
      this.target = '';
      for (let i = 0; i < this.len; i++) this.target += Math.floor(Math.random() * 10);
      display.textContent = this.target;
      display.style.color = 'var(--cyan)';
      inp.value = ''; inp.disabled = true;
      s.className = 'game-status'; s.textContent = `round ${this.round} · memorize ${this.len} digits`;
      const showMs = 900 + this.len * 250;
      setTimeout(() => {
        display.textContent = '·'.repeat(this.len);
        display.style.color = 'var(--violet)';
        inp.disabled = false;
        inp.focus();
        s.textContent = `recall ${this.len} digits`;
      }, showMs);
    },
    submit() {
      const inp = document.getElementById('digitsInput');
      const s = document.getElementById('digitsStatus');
      if (inp.value === this.target) {
        sfx.match();
        this.round++; this.len++;
        if (this.len > 10) { this.win(); return; }
        s.className = 'game-status win'; s.textContent = `correct · level up to ${this.len}`;
        setTimeout(() => this.next(), 900);
      } else {
        const score = Math.max(0, this.round - 1);
        s.className = 'game-status lose';
        s.textContent = `wrong · target was ${this.target} · score ${score}`;
        sfx.lose();
        if (score > 0) {
          state.bests.digits = Math.max(state.bests.digits || 0, score);
          saveBests();
          if (score >= 2) awardTokens(2, 'digits');
          if (score >= 4) awardTokens(2, 'digits');
        }
        document.getElementById('digitsInput').disabled = true;
      }
    },
    win() {
      endRoomWin('digits', this.round, 8);
      const s = document.getElementById('digitsStatus');
      s.className = 'game-status win'; s.textContent = `MASTERED · 10 digits · +8 tokens`;
    },
  };
  document.getElementById('digitsInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') digits.submit();
  });
  document.getElementById('digitsStart').addEventListener('click', () => digits.start());

  // ============================================
  // ===== PATH ================================
  // ============================================
  const path = {
    pathCells: [], playerIdx: 0, level: 0, locking: false, aborted: false,
    reset() {
      this.pathCells = []; this.playerIdx = 0; this.level = 0; this.locking = false; this.aborted = false;
      this.buildGrid();
      const s = document.getElementById('pathStatus');
      s.className = 'game-status';
      s.textContent = 'click START to begin';
    },
    abort() { this.aborted = true; this.locking = true; },
    buildGrid() {
      const grid = document.getElementById('pathGrid');
      grid.innerHTML = '';
      for (let i = 0; i < 25; i++) {
        const c = document.createElement('div');
        c.className = 'path-cell'; c.dataset.idx = i;
        c.addEventListener('click', () => path.click(i));
        grid.appendChild(c);
      }
    },
    async start() {
      this.reset(); this.aborted = false;
      await new Promise(r => setTimeout(r, 400));
      this.next();
    },
    async next() {
      if (this.aborted) return;
      this.level++;
      const len = 3 + this.level;
      this.pathCells = [];
      let cur = Math.floor(Math.random() * 25);
      this.pathCells.push(cur);
      for (let i = 1; i < len; i++) {
        const x = cur % 5, y = (cur / 5) | 0;
        const dirs = [];
        if (x > 0) dirs.push(cur - 1);
        if (x < 4) dirs.push(cur + 1);
        if (y > 0) dirs.push(cur - 5);
        if (y < 4) dirs.push(cur + 5);
        const open = dirs.filter(d => !this.pathCells.includes(d));
        if (!open.length) break;
        cur = open[Math.floor(Math.random() * open.length)];
        this.pathCells.push(cur);
      }
      this.playerIdx = 0; this.locking = true;
      const s = document.getElementById('pathStatus');
      s.className = 'game-status'; s.textContent = `level ${this.level} · watch (${this.pathCells.length} steps)`;
      await new Promise(r => setTimeout(r, 600));
      for (const idx of this.pathCells) {
        if (this.aborted) return;
        const c = document.querySelector(`.path-cell[data-idx="${idx}"]`);
        c.classList.add('lit'); sfx.blip(440 + (idx % 7) * 60);
        await new Promise(r => setTimeout(r, 350));
        c.classList.remove('lit');
        await new Promise(r => setTimeout(r, 110));
      }
      if (this.aborted) return;
      s.textContent = `level ${this.level} · retrace the path`;
      this.locking = false;
    },
    click(idx) {
      if (this.locking || this.aborted) return;
      const c = document.querySelector(`.path-cell[data-idx="${idx}"]`);
      if (idx === this.pathCells[this.playerIdx]) {
        c.classList.add('player'); sfx.blip(440 + (idx % 7) * 60);
        this.playerIdx++;
        if (this.playerIdx === this.pathCells.length) {
          this.locking = true;
          if (this.level >= 8) { this.win(); return; }
          setTimeout(() => {
            document.querySelectorAll('.path-cell').forEach(x => x.classList.remove('player','lit','wrong'));
            this.next();
          }, 600);
        }
      } else {
        c.classList.add('wrong'); sfx.lose();
        this.locking = true;
        const score = Math.max(0, this.level - 1);
        const s = document.getElementById('pathStatus');
        s.className = 'game-status lose'; s.textContent = `wrong step · level ${this.level} · score ${score}`;
        if (score > 0) {
          state.bests.path = Math.max(state.bests.path || 0, score);
          saveBests();
          if (score >= 2) awardTokens(2, 'path');
          if (score >= 5) awardTokens(3, 'path');
        }
      }
    },
    win() {
      endRoomWin('path', this.level, 12);
      const s = document.getElementById('pathStatus');
      s.className = 'game-status win'; s.textContent = `MASTERED · 8 levels · +12 tokens`;
    },
  };
  path.buildGrid();
  document.getElementById('pathStart').addEventListener('click', () => path.start());

  // ============================================
  // ===== ICONS ===============================
  // ============================================
  const ICON_POOL = ['🦊','🌴','🪩','🎷','📼','💾','🕹️','🌙','🌵','🚗','🥥','🍓','🌊','🎸','🍕','💎'];
  const icons = {
    layout: [], target: 0, locked: false, round: 0, score: 0,
    start() {
      this.score = 0; this.round = 1; this.next();
    },
    next() {
      const grid = document.getElementById('iconsGrid');
      const prompt = document.getElementById('iconsPrompt');
      const s = document.getElementById('iconsStatus');
      grid.innerHTML = '';
      this.layout = ICON_POOL.slice().sort(() => Math.random() - 0.5).slice(0, 12);
      this.layout.forEach((face, i) => {
        const c = document.createElement('div');
        c.className = 'icon-cell'; c.dataset.idx = i;
        c.textContent = face;
        c.addEventListener('click', () => icons.click(i));
        grid.appendChild(c);
      });
      prompt.innerHTML = '&nbsp;';
      s.className = 'game-status'; s.textContent = `round ${this.round} · memorize the layout`;
      this.locked = true;
      const showMs = 2200 + Math.max(0, 500 - this.round * 100);
      setTimeout(() => {
        document.querySelectorAll('.icon-cell').forEach(c => c.classList.add('hidden'));
        this.target = Math.floor(Math.random() * 12);
        prompt.innerHTML = `where was <span style="font-size:32px">${this.layout[this.target]}</span>?`;
        s.textContent = `recall · round ${this.round}`;
        this.locked = false;
      }, showMs);
    },
    click(i) {
      if (this.locked) return;
      const c = document.querySelectorAll('.icon-cell')[i];
      if (i === this.target) {
        c.classList.remove('hidden'); c.classList.add('right');
        sfx.match();
        this.score++;
        const s = document.getElementById('iconsStatus');
        s.className = 'game-status win'; s.textContent = `right! score ${this.score}`;
        this.round++;
        if (this.round > 6) { this.win(); return; }
        this.locked = true;
        setTimeout(() => this.next(), 900);
      } else {
        c.classList.remove('hidden'); c.classList.add('wrong');
        sfx.lose();
        this.locked = true;
        const correct = document.querySelectorAll('.icon-cell')[this.target];
        correct.classList.remove('hidden'); correct.classList.add('target');
        const s = document.getElementById('iconsStatus');
        s.className = 'game-status lose'; s.textContent = `wrong · score ${this.score}`;
        if (this.score > 0) {
          state.bests.icons = Math.max(state.bests.icons || 0, this.score);
          saveBests();
          if (this.score >= 2) awardTokens(2, 'icons');
          if (this.score >= 4) awardTokens(3, 'icons');
        }
      }
    },
    win() {
      endRoomWin('icons', this.score, 16);
      const s = document.getElementById('iconsStatus');
      s.className = 'game-status win'; s.textContent = `MASTERED · 6 rounds · +16 tokens`;
    },
  };
  document.getElementById('iconsStart').addEventListener('click', () => icons.start());

  // ===== BOOT =====
  renderDoors();
})();
</script>
</body>
</html>
