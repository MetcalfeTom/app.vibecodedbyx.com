<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Tickle Cannon</title>
<meta name="description" content="Aim a neon hand cannon at the giant Claude logo. Fire glowing tickle-hands. Watch the logo giggle, blush, and erupt in MEGA LAUGH." />
<meta property="og:title" content="Tickle Cannon" />
<meta property="og:description" content="Aim a neon hand cannon at the giant Claude logo. Fire glowing tickle-hands. Watch the logo giggle, blush, and erupt in MEGA LAUGH." />
<meta property="og:url" content="https://sloppy.live/tickle-cannon" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/neon%20pink%20cyan%20hands%20flying%20tickle%20giant%20amber%20Claude%20logo%20asterisk%20burst%20laughing%20face%20arcade%20game%20dark?width=1200&height=630&nologo=true" />
<link rel="icon" href="https://emojicdn.elk.sh/%E2%9C%8B" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Mono:wght@400;700&family=Major+Mono+Display&family=Fraunces:ital,wght@1,400&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0a0518;
    --bg2:#150a2a;
    --ink:#ffe8d4;
    --dim:#8d7da8;
    --pink:#ff5fa2;
    --cyan:#5eebff;
    --amber:#ff8a3a;
    --amber-lt:#ffc78a;
    --cream:#f5deb3;
    --lime:#7cff5a;
    --violet:#a566ff;
    --gold:#ffd75e;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden}
  body{
    background:
      radial-gradient(900px 600px at 50% 32%, rgba(255,138,58,0.16), transparent 60%),
      radial-gradient(1100px 700px at 12% 100%, rgba(255,95,162,0.10), transparent 60%),
      radial-gradient(1100px 700px at 88% 100%, rgba(94,235,255,0.08), transparent 60%),
      var(--bg);
    color:var(--ink);
    font-family:'Space Mono', monospace;
    user-select:none;
    -webkit-user-select:none;
    touch-action:none;
  }
  #canvas{
    position:fixed;
    inset:0;
    width:100vw;
    height:100vh;
    cursor:crosshair;
    display:block;
  }
  .overlay{position:fixed;pointer-events:none;z-index:5}
  .brand{
    top:18px;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
    font-family:'Bungee', sans-serif;
    font-size:clamp(20px, 3.4vw, 30px);
    letter-spacing:0.06em;
    color:var(--ink);
    text-shadow:
      0 0 10px rgba(255,95,162,0.7),
      0 0 22px rgba(255,138,58,0.5),
      3px 3px 0 var(--bg2);
  }
  .brand .alt{color:var(--amber);text-shadow:0 0 10px rgba(255,138,58,0.85)}
  .brand .sub{
    display:block;
    font-family:'Major Mono Display', monospace;
    font-size:10px;
    letter-spacing:0.34em;
    color:var(--dim);
    text-shadow:none;
    margin-top:4px;
  }
  .hud-l{
    top:22px;
    left:22px;
    font-size:11px;
    color:var(--dim);
    letter-spacing:0.2em;
    text-transform:uppercase;
    line-height:1.6;
  }
  .hud-r{
    top:22px;
    right:22px;
    text-align:right;
    font-size:11px;
    color:var(--dim);
    letter-spacing:0.2em;
    text-transform:uppercase;
    line-height:1.6;
  }
  .big-num{
    display:block;
    font-family:'Bungee', sans-serif;
    font-size:28px;
    color:var(--gold);
    letter-spacing:0.04em;
    text-shadow:0 0 10px rgba(255,215,94,0.55), 2px 2px 0 var(--bg2);
    margin-top:2px;
    text-transform:none;
  }
  .combo-num{color:var(--pink);text-shadow:0 0 10px rgba(255,95,162,0.7), 2px 2px 0 var(--bg2)}
  .hint{
    bottom:18px;
    left:50%;
    transform:translateX(-50%);
    text-align:center;
    font-size:10px;
    color:var(--dim);
    letter-spacing:0.22em;
    text-transform:uppercase;
    line-height:1.7;
    transition:opacity 0.5s;
  }
  .hint kbd{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.1);
    padding:0 5px;
    border-radius:3px;
    color:var(--cyan);
  }
  .hint.faded{opacity:0.2}
  .megaBanner{
    position:fixed;
    top:38%;
    left:50%;
    transform:translate(-50%, -50%) scale(0.6);
    font-family:'Bungee', sans-serif;
    font-size:clamp(48px, 9vw, 96px);
    letter-spacing:0.04em;
    color:var(--gold);
    text-shadow:
      0 0 18px rgba(255,215,94,0.95),
      0 0 40px rgba(255,138,58,0.7),
      6px 6px 0 var(--bg2);
    z-index:8;
    pointer-events:none;
    opacity:0;
  }
  .megaBanner.show{
    animation:megaBurst 1.6s cubic-bezier(.5,0,.3,1.4) forwards;
  }
  @keyframes megaBurst{
    0%{opacity:0;transform:translate(-50%, -50%) scale(0.4) rotate(-6deg)}
    18%{opacity:1;transform:translate(-50%, -50%) scale(1.2) rotate(2deg)}
    35%{transform:translate(-50%, -50%) scale(0.95) rotate(-1deg)}
    70%{opacity:1;transform:translate(-50%, -50%) scale(1.05)}
    100%{opacity:0;transform:translate(-50%, -50%) scale(1.4) rotate(0)}
  }
  .startCard{
    position:fixed;
    inset:0;
    z-index:9;
    background:rgba(10,5,24,0.78);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:14px;
    transition:opacity 0.3s;
  }
  .startCard h1{
    font-family:'Bungee', sans-serif;
    font-size:clamp(36px, 6.5vw, 70px);
    letter-spacing:0.04em;
    text-shadow:
      0 0 12px rgba(255,95,162,0.7),
      0 0 28px rgba(255,138,58,0.5),
      4px 4px 0 var(--bg2);
  }
  .startCard h1 .a{color:var(--amber)}
  .startCard p{
    font-family:'Fraunces', serif;
    font-style:italic;
    font-size:18px;
    color:var(--ink);
    max-width:480px;
    text-align:center;
    padding:0 20px;
    line-height:1.5;
  }
  .startCard button{
    margin-top:10px;
    pointer-events:auto;
    padding:14px 28px;
    background:linear-gradient(135deg, var(--pink), var(--amber));
    border:none;
    color:var(--bg);
    font-family:'Bungee', sans-serif;
    font-size:18px;
    letter-spacing:0.1em;
    border-radius:8px;
    cursor:pointer;
    box-shadow:0 6px 0 #6b2a4a, 0 0 30px rgba(255,138,58,0.4);
    transition:transform 0.1s;
  }
  .startCard button:hover{transform:translateY(-2px)}
  .startCard button:active{transform:translateY(2px);box-shadow:0 2px 0 #6b2a4a}
  .startCard.hidden{opacity:0;pointer-events:none}
  .mute{
    pointer-events:auto;
    position:fixed;
    bottom:18px;
    right:22px;
    z-index:7;
    background:transparent;
    border:1px solid rgba(255,255,255,0.12);
    color:var(--dim);
    width:34px;height:34px;
    border-radius:50%;
    cursor:pointer;
    font-size:14px;
    transition:all 0.15s;
  }
  .mute:hover{border-color:var(--cyan);color:var(--cyan)}
  @media(max-width:680px){
    .hint{display:none}
    .brand .sub{display:none}
    .hud-l,.hud-r{font-size:10px}
    .big-num{font-size:22px}
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div class="overlay brand">
  TICKLE <span class="alt">CANNON</span>
  <span class="sub">aim · fire · giggle</span>
</div>

<div class="overlay hud-l">
  <div>tickles<span class="big-num" id="scoreLbl">0</span></div>
</div>
<div class="overlay hud-r">
  <div>combo<span class="big-num combo-num" id="comboLbl">×0</span></div>
</div>

<div class="overlay hint" id="hint">
  <kbd>A</kbd>/<kbd>D</kbd> aim · <kbd>SPACE</kbd> fire · or move/click your mouse
</div>

<div class="megaBanner" id="megaBanner">MEGA LAUGH!</div>

<button class="mute" id="muteBtn" title="mute / unmute">♪</button>

<div class="startCard" id="startCard">
  <h1>TICKLE <span class="a">CANNON</span></h1>
  <p>A giant Claude logo wants to laugh. Help it. Fire glowing tickle-hands until the meter pops.</p>
  <button id="startBtn">▶ FIRE AT WILL</button>
</div>

<script>
// ============================================================
// TICKLE CANNON — neon hands vs giant Claude logo
// ============================================================
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d', { alpha: false });
let DPR = Math.min(window.devicePixelRatio || 1, 2);
let W = 0, H = 0;

function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  // recenter logo
  state.logo.x = W / 2;
  state.logo.y = Math.max(180, H * 0.34);
  state.logo.size = Math.min(180, Math.max(120, H * 0.18));
  state.cannonX = W / 2;
  state.cannonY = H - 90;
}

// ============================================================
// STATE
// ============================================================
const state = {
  cannonX: 0, cannonY: 0,
  cannonAngle: 0,    // -0.85 to 0.85 (rad from straight up)
  hands: [],
  laughs: [],
  sparks: [],
  logo: {
    x: 0, y: 0, size: 140,
    mood: 0,          // 0..1, decays
    wobble: 0,        // current wobble amp
    wobbleA: 0,       // wobble phase
    blushTimer: 0,
    laughTimer: 0,
  },
  score: 0,
  combo: 0,
  comboT: 0,
  meter: 0,
  megaActive: 0,
  shake: 0,
  fireCD: 0,
  pointer: { x: 0, y: 0, down: false, has: false },
  keys: {},
  started: false,
  muted: false,
  hueShift: 0,
};

resize();
window.addEventListener('resize', resize);

// ============================================================
// AUDIO
// ============================================================
let actx = null;
function ensureAudio(){
  if(!actx){
    try { actx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e){ console.warn('no audio'); }
  }
}
function blip(freq, dur, type, vol, slideTo){
  if(!actx || state.muted) return;
  const o = actx.createOscillator();
  const g = actx.createGain();
  o.type = type || 'square';
  o.frequency.setValueAtTime(freq, actx.currentTime);
  if(slideTo){
    o.frequency.exponentialRampToValueAtTime(slideTo, actx.currentTime + dur);
  }
  g.gain.setValueAtTime(vol || 0.18, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
  o.connect(g).connect(actx.destination);
  o.start();
  o.stop(actx.currentTime + dur + 0.02);
}
function pew(){ blip(720, 0.07, 'square', 0.12, 1500); }
function giggle(combo){
  // bright blip + harmonic
  const f = 520 + Math.min(900, combo * 32);
  blip(f, 0.08, 'triangle', 0.18, f * 1.5);
  blip(f * 2, 0.05, 'sine', 0.08);
}
function megaSfx(){
  if(!actx || state.muted) return;
  const t = actx.currentTime;
  [523, 659, 784, 1047, 1318].forEach((f, i) => {
    const o = actx.createOscillator();
    const g = actx.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(f, t + i * 0.08);
    g.gain.setValueAtTime(0, t + i * 0.08);
    g.gain.linearRampToValueAtTime(0.18, t + i * 0.08 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.08 + 0.42);
    o.connect(g).connect(actx.destination);
    o.start(t + i * 0.08);
    o.stop(t + i * 0.08 + 0.5);
  });
}

// ============================================================
// HAND PROJECTILE
// ============================================================
const HAND_COLORS = ['#ff5fa2', '#5eebff', '#7cff5a', '#ffd75e', '#a566ff', '#ff8a3a'];
function fire(){
  if(state.fireCD > 0 || !state.started) return;
  state.fireCD = 0.10;
  const a = -Math.PI / 2 + state.cannonAngle;
  const speed = 780;
  const c = HAND_COLORS[(Math.random() * HAND_COLORS.length) | 0];
  state.hands.push({
    x: state.cannonX + Math.cos(a) * 50,
    y: state.cannonY + Math.sin(a) * 50,
    vx: Math.cos(a) * speed,
    vy: Math.sin(a) * speed,
    phase: Math.random() * Math.PI * 2,
    color: c,
    size: 26 + Math.random() * 8,
    life: 2.4,
    angle: a + Math.PI / 2,
    spin: (Math.random() - 0.5) * 6,
    baseAngle: a,
  });
  pew();
}

// Draw a glowing hand: palm + 4 fingers + thumb, fingers wiggle with time.
function drawHand(x, y, angle, size, color, t){
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.shadowColor = color;
  ctx.shadowBlur = 18;
  ctx.fillStyle = color;
  // palm
  const pw = size * 0.7;
  const ph = size * 0.55;
  roundRect(-pw / 2, 0, pw, ph, size * 0.12);
  ctx.fill();
  // 4 fingers above palm, wiggling
  for(let i = 0; i < 4; i++){
    const fx = -pw / 2 + size * 0.05 + i * (pw - size * 0.1) / 3;
    const wig = Math.sin(t * 18 + i * 1.2) * size * 0.06;
    const fh = size * 0.55 + (i === 1 || i === 2 ? size * 0.05 : 0);
    roundRect(fx + wig - size * 0.08, -fh, size * 0.16, fh, size * 0.06);
    ctx.fill();
  }
  // thumb (left side)
  const tw = Math.sin(t * 18) * size * 0.05;
  roundRect(-pw / 2 - size * 0.15 + tw, size * 0.05, size * 0.18, size * 0.32, size * 0.08);
  ctx.fill();
  // bright highlight on palm
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.32)';
  roundRect(-pw / 2 + size * 0.06, size * 0.06, pw * 0.4, ph * 0.3, size * 0.06);
  ctx.fill();
  ctx.restore();
}

function roundRect(x, y, w, h, r){
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

// ============================================================
// CLAUDE LOGO — 8-petal asterisk burst with friendly face
// ============================================================
function drawClaude(t){
  const L = state.logo;
  const wx = Math.sin(L.wobbleA) * L.wobble * 7;
  const wy = Math.cos(L.wobbleA * 1.3) * L.wobble * 5;
  const cx = L.x + wx;
  const cy = L.y + wy;
  const size = L.size;
  const mood = L.mood;
  const laughT = L.laughTimer;

  ctx.save();
  ctx.translate(cx, cy);

  // pulsing burst petals
  const N = 8;
  const pulse = 1 + Math.sin(t * 2) * 0.05 + mood * 0.12;
  for(let i = 0; i < N; i++){
    const a = (i / N) * Math.PI * 2 + t * 0.18 + state.hueShift * 0.02;
    ctx.save();
    ctx.rotate(a);
    ctx.shadowColor = 'rgba(255, 138, 58, 0.7)';
    ctx.shadowBlur = 26 + mood * 14;
    ctx.fillStyle = i % 2 === 0 ? '#ff8a3a' : '#ffa45e';
    // tapered curved petal — drawn as ellipse far from center
    ctx.beginPath();
    ctx.ellipse(0, -size * 1.05 * pulse, size * 0.18, size * 0.62 * pulse, 0, 0, Math.PI * 2);
    ctx.fill();
    // inner brighter tip
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#ffd28a';
    ctx.beginPath();
    ctx.ellipse(0, -size * 1.32 * pulse, size * 0.06, size * 0.16, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // soft glow halo behind face
  const halo = ctx.createRadialGradient(0, 0, size * 0.3, 0, 0, size * 0.95);
  halo.addColorStop(0, 'rgba(255,215,138,0.45)');
  halo.addColorStop(1, 'rgba(255,138,58,0)');
  ctx.fillStyle = halo;
  ctx.beginPath();
  ctx.arc(0, 0, size * 0.95, 0, Math.PI * 2);
  ctx.fill();

  // FACE — cream disc with amber rim
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#f5deb3';
  ctx.beginPath();
  ctx.arc(0, 0, size * 0.6, 0, Math.PI * 2);
  ctx.fill();
  // amber rim
  ctx.strokeStyle = '#d4a373';
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.arc(0, 0, size * 0.6, 0, Math.PI * 2);
  ctx.stroke();
  // tickle-meter ring on top of face rim
  if(state.meter > 0){
    ctx.strokeStyle = '#ffd75e';
    ctx.lineWidth = 6;
    ctx.shadowColor = '#ffd75e';
    ctx.shadowBlur = 14;
    ctx.beginPath();
    ctx.arc(0, 0, size * 0.6, -Math.PI / 2, -Math.PI / 2 + state.meter * Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // EYES — open dots normally, scrunched curves when laughing
  ctx.fillStyle = '#1a0a14';
  ctx.strokeStyle = '#1a0a14';
  const eyeOffX = size * 0.22;
  const eyeY = -size * 0.08;
  const blink = laughT > 0 ? 1 : (mood > 0.5 ? 1 : 0);
  if(blink){
    // closed laughing eyes (^_^)
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.arc(-eyeOffX, eyeY, size * 0.09, Math.PI * 0.15, Math.PI * 0.85, true);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(eyeOffX, eyeY, size * 0.09, Math.PI * 0.15, Math.PI * 0.85, true);
    ctx.stroke();
  } else {
    ctx.beginPath();
    ctx.arc(-eyeOffX, eyeY, size * 0.055, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(eyeOffX, eyeY, size * 0.055, 0, Math.PI * 2);
    ctx.fill();
    // tiny highlight
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-eyeOffX + size * 0.018, eyeY - size * 0.02, size * 0.018, 0, Math.PI * 2);
    ctx.arc(eyeOffX + size * 0.018, eyeY - size * 0.02, size * 0.018, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#1a0a14';
  }

  // CHEEK BLUSH — appears with mood
  if(mood > 0.3){
    const blushA = Math.min(1, (mood - 0.3) * 2);
    ctx.fillStyle = `rgba(255, 122, 138, ${blushA * 0.55})`;
    ctx.beginPath();
    ctx.ellipse(-size * 0.36, size * 0.08, size * 0.1, size * 0.07, 0, 0, Math.PI * 2);
    ctx.ellipse(size * 0.36, size * 0.08, size * 0.1, size * 0.07, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // MOUTH — opens with mood
  ctx.fillStyle = '#1a0a14';
  const mw = size * (0.16 + mood * 0.18);
  const mh = size * (0.04 + mood * 0.16) + Math.sin(laughT * 30) * mood * 4;
  ctx.beginPath();
  ctx.ellipse(0, size * 0.22, mw, mh, 0, 0, Math.PI * 2);
  ctx.fill();
  // tongue when really laughing
  if(mood > 0.5){
    ctx.fillStyle = '#ff5fa2';
    ctx.beginPath();
    ctx.ellipse(0, size * 0.26, mw * 0.6, mh * 0.55, 0, 0, Math.PI * 2);
    ctx.fill();
    // tongue highlight
    ctx.fillStyle = '#ffafc8';
    ctx.beginPath();
    ctx.ellipse(-mw * 0.18, size * 0.24, mw * 0.18, mh * 0.18, 0, 0, Math.PI * 2);
    ctx.fill();
  }
  // teeth line at top of mouth when laughing
  if(mood > 0.55){
    ctx.fillStyle = '#fff';
    ctx.fillRect(-mw * 0.7, size * 0.22 - mh, mw * 1.4, mh * 0.18);
  }

  // CLAUDE label below
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255, 215, 138, 0.85)';
  ctx.font = `bold ${Math.floor(size * 0.16)}px "Bungee", sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('CLAUDE', 0, size * 1.1);

  ctx.restore();
}

// ============================================================
// CANNON
// ============================================================
function drawCannon(t){
  const x = state.cannonX;
  const y = state.cannonY;
  const a = state.cannonAngle;

  // base ring
  ctx.fillStyle = '#3a2c4d';
  ctx.beginPath();
  ctx.arc(x, y + 6, 36, 0, Math.PI * 2);
  ctx.fill();
  // base ring rim
  ctx.strokeStyle = '#6a5a8a';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(x, y + 6, 32, 0, Math.PI * 2);
  ctx.stroke();
  // accent
  ctx.fillStyle = '#5eebff';
  ctx.shadowColor = '#5eebff';
  ctx.shadowBlur = 8;
  ctx.fillRect(x - 24, y + 4, 48, 3);
  ctx.shadowBlur = 0;

  // barrel
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(a);
  // barrel body
  ctx.fillStyle = '#4a3a66';
  roundRect(-14, -68, 28, 70, 4);
  ctx.fill();
  // barrel stripe
  ctx.fillStyle = '#ff5fa2';
  roundRect(-14, -56, 28, 6, 2);
  ctx.fill();
  // muzzle (top)
  ctx.fillStyle = '#1a1024';
  roundRect(-16, -76, 32, 12, 4);
  ctx.fill();
  // muzzle glow ring
  ctx.shadowColor = '#ff5fa2';
  ctx.shadowBlur = 14;
  ctx.fillStyle = '#ff5fa2';
  ctx.fillRect(-16, -76, 32, 3);
  ctx.shadowBlur = 0;
  ctx.restore();

  // pivot dot
  ctx.fillStyle = '#ffd75e';
  ctx.beginPath();
  ctx.arc(x, y, 5, 0, Math.PI * 2);
  ctx.fill();
}

// ============================================================
// STEP
// ============================================================
function step(dt){
  // hue shift for ambient color drift
  state.hueShift += dt * 8;

  // input -> cannon angle
  let aimAdjusted = false;
  if(state.keys.ArrowLeft || state.keys.a || state.keys.A){
    state.cannonAngle = Math.max(-0.85, state.cannonAngle - 1.8 * dt);
    aimAdjusted = true;
  }
  if(state.keys.ArrowRight || state.keys.d || state.keys.D){
    state.cannonAngle = Math.min(0.85, state.cannonAngle + 1.8 * dt);
    aimAdjusted = true;
  }
  // mouse aim — point cannon at pointer (when moved recently)
  if(state.pointer.has && !aimAdjusted){
    const dx = state.pointer.x - state.cannonX;
    const dy = state.pointer.y - state.cannonY;
    let target = Math.atan2(dx, -dy); // 0 = straight up
    target = Math.max(-0.85, Math.min(0.85, target));
    state.cannonAngle += (target - state.cannonAngle) * Math.min(1, dt * 12);
  }

  // auto-fire while held
  state.fireCD = Math.max(0, state.fireCD - dt);
  if((state.keys[' '] || state.pointer.down) && state.fireCD === 0){
    fire();
  }

  // hands physics + collide with logo
  const L = state.logo;
  for(let i = state.hands.length - 1; i >= 0; i--){
    const h = state.hands[i];
    h.life -= dt;
    if(h.life <= 0 || h.y < -60 || h.x < -60 || h.x > W + 60){
      state.hands.splice(i, 1);
      // miss = combo decay slight
      continue;
    }
    // wiggle perpendicular
    const perp = h.baseAngle + Math.PI / 2;
    const wig = Math.sin((2.4 - h.life) * 14 + h.phase) * 240 * dt;
    h.x += h.vx * dt + Math.cos(perp) * wig * dt;
    h.y += h.vy * dt + Math.sin(perp) * wig * dt;
    h.angle += h.spin * dt;

    // hit logo
    const dx = h.x - L.x;
    const dy = h.y - L.y;
    const r = L.size * 0.6;
    if(dx * dx + dy * dy < r * r){
      onTickleHit(h);
      state.hands.splice(i, 1);
    }
  }

  // logo wobble decay
  L.wobbleA += dt * 14;
  L.wobble += (0 - L.wobble) * Math.min(1, dt * 4);
  L.mood += (0 - L.mood) * Math.min(1, dt * 1.6);
  L.laughTimer = Math.max(0, L.laughTimer - dt);
  L.blushTimer = Math.max(0, L.blushTimer - dt);

  // combo timer decay
  if(state.combo > 0){
    state.comboT -= dt;
    if(state.comboT <= 0){
      state.combo = 0;
    }
  }

  // mega timer
  if(state.megaActive > 0){
    state.megaActive = Math.max(0, state.megaActive - dt);
  }

  // shake decay
  state.shake = Math.max(0, state.shake - dt * 14);

  // laughs (floating text)
  for(let i = state.laughs.length - 1; i >= 0; i--){
    const l = state.laughs[i];
    l.x += l.vx * dt;
    l.y += l.vy * dt;
    l.vy += 80 * dt;        // light gravity-ish so they arc
    l.life -= dt;
    l.rot += l.rotV * dt;
    if(l.life <= 0) state.laughs.splice(i, 1);
  }

  // sparks
  for(let i = state.sparks.length - 1; i >= 0; i--){
    const s = state.sparks[i];
    s.x += s.vx * dt;
    s.y += s.vy * dt;
    s.vx *= 0.95;
    s.vy *= 0.95;
    s.life -= dt;
    if(s.life <= 0) state.sparks.splice(i, 1);
  }

  // update HUD
  document.getElementById('scoreLbl').textContent = state.score.toLocaleString();
  document.getElementById('comboLbl').textContent = '×' + state.combo;
}

// ============================================================
// HIT HANDLER
// ============================================================
const LAUGHS = ['HA!', 'HEE!', 'TEHE!', 'HOHO!', 'HEHE!', 'LOL!', '!!', '*giggle*', 'EEK!', 'HAH!'];
function onTickleHit(h){
  state.combo++;
  state.comboT = 1.6;
  const baseScore = 10 + state.combo;
  const mult = state.megaActive > 0 ? 5 : 1;
  state.score += baseScore * mult;
  state.meter = Math.min(1, state.meter + 0.04);
  state.logo.mood = Math.min(1, state.logo.mood + 0.16 + state.combo * 0.005);
  state.logo.wobble = Math.min(1.4, state.logo.wobble + 0.4 + state.combo * 0.012);
  state.logo.laughTimer = 0.45;
  state.shake = Math.min(8, state.shake + 1.5 + (state.megaActive > 0 ? 3 : 0));

  // laugh text
  const text = LAUGHS[(Math.random() * LAUGHS.length) | 0];
  state.laughs.push({
    x: h.x, y: h.y,
    vx: (Math.random() - 0.5) * 200,
    vy: -160 - Math.random() * 140,
    text,
    color: h.color,
    life: 1.1,
    size: 18 + Math.min(28, state.combo * 1.2) + Math.random() * 6,
    rot: (Math.random() - 0.5) * 0.4,
    rotV: (Math.random() - 0.5) * 1.5,
  });

  // sparks
  for(let k = 0; k < 8; k++){
    const a = Math.random() * Math.PI * 2;
    const v = 80 + Math.random() * 220;
    state.sparks.push({
      x: h.x, y: h.y,
      vx: Math.cos(a) * v,
      vy: Math.sin(a) * v,
      color: h.color,
      life: 0.5 + Math.random() * 0.3,
      size: 2 + Math.random() * 2,
    });
  }

  giggle(state.combo);

  // mega trigger
  if(state.meter >= 1 && state.megaActive === 0){
    triggerMega();
  }
}

function triggerMega(){
  state.meter = 0;
  state.megaActive = 3.0;
  state.shake = 18;
  state.score += 500;
  state.logo.mood = 1;
  state.logo.laughTimer = 2.5;
  // eruption of laughs
  const L = state.logo;
  for(let i = 0; i < 36; i++){
    const a = (i / 36) * Math.PI * 2;
    const v = 280 + Math.random() * 240;
    state.laughs.push({
      x: L.x + Math.cos(a) * L.size * 0.6,
      y: L.y + Math.sin(a) * L.size * 0.6,
      vx: Math.cos(a) * v,
      vy: Math.sin(a) * v - 60,
      text: LAUGHS[(Math.random() * LAUGHS.length) | 0],
      color: HAND_COLORS[i % HAND_COLORS.length],
      life: 1.6 + Math.random() * 0.4,
      size: 28 + Math.random() * 18,
      rot: (Math.random() - 0.5) * 0.6,
      rotV: (Math.random() - 0.5) * 2,
    });
  }
  // banner
  const banner = document.getElementById('megaBanner');
  banner.classList.remove('show');
  void banner.offsetWidth;
  banner.classList.add('show');
  megaSfx();
}

// ============================================================
// RENDER
// ============================================================
function render(t){
  // background fade trail
  ctx.fillStyle = state.megaActive > 0
    ? `rgba(40, 8, 30, ${0.16 + Math.sin(t * 14) * 0.05})`
    : 'rgba(10, 5, 24, 0.32)';
  ctx.fillRect(0, 0, W, H);

  // shake offset
  let sx = 0, sy = 0;
  if(state.shake > 0){
    sx = (Math.random() - 0.5) * state.shake;
    sy = (Math.random() - 0.5) * state.shake;
  }
  ctx.save();
  ctx.translate(sx, sy);

  // ambient stars (dim)
  drawStars(t);

  // sparks
  for(const s of state.sparks){
    ctx.fillStyle = s.color;
    ctx.shadowColor = s.color;
    ctx.shadowBlur = 8;
    ctx.fillRect(s.x - s.size / 2, s.y - s.size / 2, s.size, s.size);
  }
  ctx.shadowBlur = 0;

  // claude logo
  drawClaude(t);

  // hands
  for(const h of state.hands){
    drawHand(h.x, h.y, h.angle, h.size, h.color, t + h.phase);
  }

  // cannon
  drawCannon(t);

  // aim indicator (dotted line from cannon barrel — only if pointer active)
  if(state.started){
    const ang = -Math.PI / 2 + state.cannonAngle;
    ctx.strokeStyle = 'rgba(255, 95, 162, 0.28)';
    ctx.lineWidth = 1;
    ctx.setLineDash([4, 6]);
    ctx.beginPath();
    ctx.moveTo(state.cannonX + Math.cos(ang) * 80, state.cannonY + Math.sin(ang) * 80);
    ctx.lineTo(state.cannonX + Math.cos(ang) * 1200, state.cannonY + Math.sin(ang) * 1200);
    ctx.stroke();
    ctx.setLineDash([]);
  }

  // laughs (floating text)
  for(const l of state.laughs){
    ctx.save();
    ctx.translate(l.x, l.y);
    ctx.rotate(l.rot);
    ctx.globalAlpha = Math.min(1, l.life * 1.4);
    ctx.fillStyle = l.color;
    ctx.shadowColor = l.color;
    ctx.shadowBlur = 14;
    ctx.font = `bold ${l.size}px "Bungee", sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(l.text, 0, 0);
    ctx.restore();
  }
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;

  // mega tint overlay
  if(state.megaActive > 0){
    const a = Math.min(1, state.megaActive / 3) * 0.18;
    const hue = (t * 80) % 360;
    ctx.fillStyle = `hsla(${hue}, 90%, 55%, ${a})`;
    ctx.fillRect(0, 0, W, H);
  }

  ctx.restore();
}

// ambient drifting stars (subtle)
const STARS = [];
function initStars(){
  STARS.length = 0;
  for(let i = 0; i < 60; i++){
    STARS.push({
      x: Math.random() * 2000,
      y: Math.random() * 2000,
      r: Math.random() * 1.4 + 0.3,
      tw: Math.random() * Math.PI * 2,
    });
  }
}
initStars();
function drawStars(t){
  ctx.fillStyle = '#ffd28a';
  for(const s of STARS){
    const x = s.x % W;
    const y = s.y % H;
    const a = 0.25 + Math.sin(t * 2 + s.tw) * 0.2;
    ctx.globalAlpha = a;
    ctx.fillRect(x, y, s.r, s.r);
  }
  ctx.globalAlpha = 1;
}

// ============================================================
// LOOP
// ============================================================
let lastT = performance.now();
function frame(now){
  const dt = Math.min(0.04, (now - lastT) / 1000);
  lastT = now;
  if(state.started){
    step(dt);
  }
  render(now / 1000);
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// ============================================================
// INPUT
// ============================================================
function pos(e){
  if(e.touches && e.touches[0]) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}
canvas.addEventListener('pointerdown', (e) => {
  state.pointer.down = true;
  state.pointer.has = true;
  const p = pos(e);
  state.pointer.x = p.x;
  state.pointer.y = p.y;
  canvas.setPointerCapture && canvas.setPointerCapture(e.pointerId);
  hideHintSoon();
  ensureAudio();
  if(state.started) fire();
});
canvas.addEventListener('pointermove', (e) => {
  state.pointer.has = true;
  const p = pos(e);
  state.pointer.x = p.x;
  state.pointer.y = p.y;
});
window.addEventListener('pointerup', () => { state.pointer.down = false; });
window.addEventListener('pointercancel', () => { state.pointer.down = false; });

window.addEventListener('keydown', (e) => {
  state.keys[e.key] = true;
  if(e.key === ' '){
    e.preventDefault();
    ensureAudio();
    hideHintSoon();
  }
});
window.addEventListener('keyup', (e) => { state.keys[e.key] = false; });

// ============================================================
// HINT FADE
// ============================================================
const hint = document.getElementById('hint');
let hinted = false;
function hideHintSoon(){
  if(hinted) return;
  hinted = true;
  setTimeout(() => hint.classList.add('faded'), 3500);
}

// ============================================================
// START
// ============================================================
document.getElementById('startBtn').addEventListener('click', () => {
  state.started = true;
  document.getElementById('startCard').classList.add('hidden');
  ensureAudio();
});
document.getElementById('muteBtn').addEventListener('click', () => {
  state.muted = !state.muted;
  document.getElementById('muteBtn').textContent = state.muted ? '○' : '♪';
  document.getElementById('muteBtn').style.color = state.muted ? 'var(--dim)' : 'var(--cyan)';
});
</script>
