<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Useless Machine</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%94%98" />

<meta name="description" content="Flip the switch on. A mechanical finger comes out and flips it off. That's it. That's the machine. It gets moodier the more you insist." />
<meta property="og:type" content="website" />
<meta property="og:title" content="Useless Machine" />
<meta property="og:description" content="Flip it on. The finger flips it off. Forever." />
<meta property="og:url" content="https://sloppy.live/useless-machine/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/a%20mysterious%20black%20box%20machine%20with%20a%20red%20toggle%20switch%2C%20a%20small%20mechanical%20finger%20emerging%20from%20under%20its%20lid%2C%20dramatic%20spotlight%2C%20minimalist?width=1200&height=630&nologo=true&seed=101" />
<meta name="twitter:card" content="summary_large_image" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Special+Elite&display=swap" rel="stylesheet" />

<style>
  :root{
    --room:#0d0b10; --table:#2a1e14; --box:#26262c; --box2:#1c1c22; --lidc:#33333b;
    --brass:#c9a86a; --red:#e5484d; --ink:#e8e4da; --dim:#8d8778; --led:#ff3b30;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  body{
    min-height:100vh; font-family:'Chakra Petch',sans-serif; color:var(--ink); overflow-x:hidden;
    background:
      radial-gradient(60% 46% at 50% 38%, rgba(255,214,150,.13), transparent 70%),
      var(--room);
    display:flex; flex-direction:column; align-items:center; justify-content:center; padding:1.2rem .8rem 2rem;
    user-select:none; -webkit-tap-highlight-color:transparent;
  }
  header{ text-align:center; margin-bottom:1.6rem; }
  h1{ font-weight:700; letter-spacing:.28em; text-transform:uppercase; font-size:clamp(1.1rem,4.5vw,1.7rem); color:var(--ink); }
  .tag{ font-family:'Special Elite',serif; font-size:.85rem; color:var(--dim); margin-top:.4rem; }

  /* ---------- scene (side view) ---------- */
  .scene{ position:relative; width:min(30rem,92vw); aspect-ratio:10/7; }
  .table{ position:absolute; left:-6%; right:-6%; bottom:8%; height:7%;
    background:linear-gradient(180deg,#3a2a1a,var(--table)); border-radius:5px;
    box-shadow:0 14px 30px rgba(0,0,0,.6); }
  .shadow{ position:absolute; left:16%; right:16%; bottom:13.4%; height:4%;
    background:radial-gradient(closest-side, rgba(0,0,0,.55), transparent); }

  /* the arm lives BEHIND the box; emerging above the top edge = coming from inside */
  .arm{ position:absolute; left:56%; bottom:34%; width:5.5%; height:52%;
    transform-origin:50% 92%; transform:rotate(118deg); z-index:1; will-change:transform; }
  .arm .rod{ position:absolute; left:32%; top:0; width:36%; height:100%; border-radius:8px;
    background:linear-gradient(90deg,#4e4e58,#7a7a86 45%,#3c3c44); }
  .arm .tip{ position:absolute; left:8%; top:-4%; width:84%; aspect-ratio:1;
    background:radial-gradient(circle at 35% 30%, #8b3d3d, #5e2323); border-radius:50%;
    box-shadow:inset -2px -3px 4px rgba(0,0,0,.5); }

  .box{ position:absolute; left:22%; right:12%; bottom:15%; height:44%; z-index:2;
    background:linear-gradient(180deg,var(--box),var(--box2));
    border-radius:10px; border:1px solid #3a3a44;
    box-shadow:0 10px 24px rgba(0,0,0,.55), inset 0 1px 0 rgba(255,255,255,.06); }
  .box .plate{ position:absolute; left:50%; top:46%; transform:translateX(-50%); text-align:center;
    background:linear-gradient(180deg,#d8b97c,var(--brass)); color:#3a2c12; border-radius:4px;
    padding:.3rem .7rem; font-size:.6rem; font-weight:700; letter-spacing:.18em; text-transform:uppercase;
    box-shadow:0 1px 0 rgba(255,255,255,.35) inset, 0 2px 4px rgba(0,0,0,.4); white-space:nowrap; }
  .box .plate small{ display:block; font-family:'Special Elite',serif; font-weight:400; letter-spacing:.06em;
    font-size:.62rem; text-transform:none; margin-top:.1rem; min-height:.9rem; }
  .led{ position:absolute; right:7%; top:18%; width:.55rem; height:.55rem; border-radius:50%;
    background:#4a1512; box-shadow:inset 0 1px 2px rgba(0,0,0,.6); }
  .led.on{ background:var(--led); box-shadow:0 0 10px var(--led), 0 0 22px rgba(255,59,48,.5); }
  .feet{ position:absolute; bottom:-3.5%; left:6%; right:6%; display:flex; justify-content:space-between; }
  .feet i{ width:9%; aspect-ratio:2.2/1; background:#111; border-radius:0 0 4px 4px; }

  /* slot + lid on top-right of the box */
  .slot{ position:absolute; z-index:2; left:50.5%; bottom:59%; width:16.5%; height:1.5%; background:#0a0a0d; border-radius:2px; }
  .lid{ position:absolute; z-index:3; left:49.5%; bottom:59.4%; width:19%; height:3.2%;
    background:linear-gradient(180deg,#3f3f49,var(--lidc)); border-radius:3px 3px 0 0; border:1px solid #4a4a55;
    transform-origin:6% 100%; transform:rotate(0deg); will-change:transform;
    box-shadow:0 1px 0 rgba(255,255,255,.08) inset; }

  /* switch on top-left */
  .switch{ position:absolute; z-index:4; left:30%; bottom:59%; width:9%; height:4.5%;
    background:linear-gradient(180deg,#3b3b45,#2b2b33); border-radius:4px 4px 2px 2px; border:1px solid #4a4a55;
    cursor:pointer; }
  .switch:focus-visible{ outline:3px solid var(--brass); outline-offset:4px; }
  .lever{ position:absolute; left:50%; bottom:70%; width:14%; height:230%;
    transform-origin:50% 96%; transform:translateX(-50%) rotate(-32deg); will-change:transform;
    background:linear-gradient(90deg,#b8babf,#eceef2 45%,#9a9ca3); border-radius:4px; }
  .lever::after{ content:""; position:absolute; top:-26%; left:50%; transform:translateX(-50%);
    width:230%; aspect-ratio:1; border-radius:50%;
    background:radial-gradient(circle at 35% 30%, #ff7d75, var(--red) 55%, #8f1d24); }
  .onoff{ position:absolute; z-index:4; left:26.5%; bottom:60.5%; font-size:.5rem; letter-spacing:.1em; color:var(--dim); }
  .onoff b{ color:var(--ink); }

  .counter{ margin-top:1.6rem; text-align:center; font-size:.78rem; color:var(--dim); line-height:1.9; }
  .counter b{ color:var(--brass); font-size:1rem; }
  .mute{ background:none; border:1px solid #3a3a44; color:var(--dim); border-radius:8px; font-family:inherit;
    font-size:.7rem; padding:.35rem .7rem; cursor:pointer; margin-top:.7rem; min-height:2.2rem; }
  .mute:focus-visible{ outline:2px solid var(--brass); outline-offset:2px; }

  footer{ margin-top:1.3rem; font-family:'Special Elite',serif; font-size:.72rem; color:var(--dim); text-align:center; line-height:1.8; }

  @media (prefers-reduced-motion: reduce){
    .arm,.lid,.lever{ transition:none !important; }
  }
</style>
</head>
<body>
  <header>
    <h1>Useless Machine</h1>
    <p class="tag">it has one job. the opposite of yours.</p>
  </header>

  <main style="display:flex;flex-direction:column;align-items:center">
    <div class="scene" role="application" aria-label="Useless machine. Activate the toggle switch; the machine will turn itself off.">
      <div class="table" aria-hidden="true"></div>
      <div class="shadow" aria-hidden="true"></div>

      <div class="arm" id="arm" aria-hidden="true"><div class="rod"></div><div class="tip"></div></div>

      <div class="box" aria-hidden="true">
        <span class="led" id="led"></span>
        <div class="plate">Useless Machine MK.I<small id="mood">&nbsp;</small></div>
        <div class="feet"><i></i><i></i></div>
      </div>
      <div class="slot" aria-hidden="true"></div>
      <div class="lid" id="lid" aria-hidden="true"></div>

      <button class="switch" id="switch" type="button" aria-pressed="false" aria-label="Toggle switch">
        <span class="lever" id="lever"></span>
      </button>
      <span class="onoff" aria-hidden="true"><b>OFF</b> · ON</span>
    </div>

    <div class="counter" role="status" aria-live="polite">
      <div>you flipped it on <b id="nOn">0</b> times · the machine said no <b id="nDeny">0</b> times</div>
      <button class="mute" id="muteBtn" type="button" aria-pressed="false">🔊 sound on</button>
    </div>
  </main>

  <footer>a tribute to Marvin Minsky's 1952 original.<br>nothing is achieved here, and that is the point.</footer>

<script>
(function(){
  "use strict";
  var $=function(id){return document.getElementById(id);};
  var arm=$('arm'), lid=$('lid'), lever=$('lever'), led=$('led'), sw=$('switch'), mood=$('mood');
  var reduce=window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ---- persistent stats ----
  var store={}; try{ store=JSON.parse(localStorage.getItem('useless-machine')||'{}'); }catch(e){}
  var flips=store.flips||0, denies=store.denies||0;
  function save(){ try{ localStorage.setItem('useless-machine', JSON.stringify({flips:flips,denies:denies})); }catch(e){} }
  function paint(){ $('nOn').textContent=flips; $('nDeny').textContent=denies; }
  paint();

  // ---- audio ----
  var AC=null, master=null, muted=false;
  function initAudio(){ if(AC) return;
    try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return; }
    master=AC.createGain(); master.gain.value=0.4; master.connect(AC.destination);
  }
  var noiseBuf=null;
  function noise(dur,f,vol){
    if(!AC||muted) return; var t=AC.currentTime;
    if(!noiseBuf){ var len=AC.sampleRate; noiseBuf=AC.createBuffer(1,len,AC.sampleRate);
      var d=noiseBuf.getChannelData(0); for(var i=0;i<len;i++) d[i]=Math.random()*2-1; }
    var s=AC.createBufferSource(); s.buffer=noiseBuf;
    var bp=AC.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=f; bp.Q.value=1.2;
    var g=AC.createGain(); g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    s.connect(bp); bp.connect(g); g.connect(master); s.start(t); s.stop(t+dur);
  }
  function whack(){ noise(0.12,900,0.3); thud(); }
  function crash(){ noise(0.4,500,0.35); noise(0.25,2400,0.15); thud(); }
  function servo(dur,f0,f1){
    if(!AC||muted) return; var t=AC.currentTime;
    var o=AC.createOscillator(); o.type='sawtooth';
    o.frequency.setValueAtTime(f0,t); o.frequency.linearRampToValueAtTime(f1,t+dur);
    var lp=AC.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=900; lp.Q.value=4;
    var g=AC.createGain(); g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(0.08,t+0.03);
    g.gain.setValueAtTime(0.08,t+dur-0.05); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(lp); lp.connect(g); g.connect(master); o.start(t); o.stop(t+dur+0.05);
  }
  function click(hi){ if(!AC||muted) return; var t=AC.currentTime;
    var o=AC.createOscillator(); o.type='square'; o.frequency.value=hi?2200:1400;
    var g=AC.createGain(); g.gain.setValueAtTime(0.12,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.05);
    o.connect(g); g.connect(master); o.start(t); o.stop(t+0.06); }
  function thud(){ if(!AC||muted) return; var t=AC.currentTime;
    var o=AC.createOscillator(); o.type='sine'; o.frequency.setValueAtTime(140,t); o.frequency.exponentialRampToValueAtTime(60,t+0.12);
    var g=AC.createGain(); g.gain.setValueAtTime(0.18,t); g.gain.exponentialRampToValueAtTime(0.0001,t+0.16);
    o.connect(g); g.connect(master); o.start(t); o.stop(t+0.2); }
  $('muteBtn').addEventListener('click', function(){
    muted=!muted; this.textContent=muted?'🔇 sound off':'🔊 sound on'; this.setAttribute('aria-pressed', muted);
  });

  // ---- motion helpers (transition-driven, promise-based) ----
  function move(el, transform, ms, ease){
    return new Promise(function(res){
      if(reduce) ms=Math.min(ms,60);
      el.style.transition='transform '+ms+'ms '+(ease||'cubic-bezier(.4,.1,.3,1)');
      requestAnimationFrame(function(){ requestAnimationFrame(function(){
        el.style.transform=transform; setTimeout(res, ms+15);
      });});
    });
  }
  function wait(ms){ return new Promise(function(r){ setTimeout(r, reduce?Math.min(ms,80):ms); }); }

  // positions
  var ARM_HIDE='rotate(118deg)', ARM_PEEK='rotate(96deg)', ARM_OUT='rotate(38deg)', ARM_PRESS='rotate(30deg)';
  var LID_SHUT=0, LID_CRACK=-14, LID_OPEN=-58;

  // Lid gets a dedicated keyframe driver (Web Animations API): explicit
  // rotate(from)→rotate(to) keyframes, current angle tracked numerically, and
  // any in-flight animation cancelled first — overlapping sequences (e.g. a
  // flip during retract) can no longer fight over transitions and "twitch".
  var lidAngle=0;
  function lidTo(deg, ms, ease){
    if(reduce) ms=Math.min(ms,60);
    return new Promise(function(res){
      if(lid.getAnimations){ lid.getAnimations().forEach(function(a){ a.cancel(); }); }
      var from=lidAngle; lidAngle=deg;
      if(from===deg){ lid.style.transform='rotate('+deg+'deg)'; res(); return; }
      var anim=lid.animate(
        [{transform:'rotate('+from+'deg)'},{transform:'rotate('+deg+'deg)'}],
        {duration:ms, easing:ease||'cubic-bezier(.4,.1,.3,1)', fill:'forwards'}
      );
      anim.onfinish=function(){ lid.style.transform='rotate('+deg+'deg)'; try{anim.cancel();}catch(e){} res(); };
      anim.oncancel=function(){ lid.style.transform='rotate('+deg+'deg)'; res(); };
    });
  }
  function leverTo(on){ lever.style.transform='translateX(-50%) rotate('+(on?32:-32)+'deg)'; }

  // ---- switch state ----
  var isOn=false, busy=false;
  function setOn(on, byMachine){
    isOn=on; sw.setAttribute('aria-pressed', on?'true':'false');
    leverTo(on); led.className='led'+(on?' on':'');
    click(on);
  }

  // ---- shared moves ----
  var scene=document.querySelector('.scene');
  function shake(intensity, ms){
    if(reduce) return Promise.resolve();
    return new Promise(function(res){
      var frames=[], n=8;
      for(var i=0;i<n;i++){ var k=1-i/n;
        frames.push({transform:'translate('+((Math.random()-0.5)*2*intensity*k).toFixed(1)+'px,'+((Math.random()-0.5)*2*intensity*k).toFixed(1)+'px)'}); }
      frames.push({transform:'translate(0,0)'});
      scene.animate(frames,{duration:ms}).onfinish=res;
    });
  }
  function turnOff(){ setOn(false,true); denies++; paint(); save(); }
  function openLid(ms){ return lidTo(LID_OPEN, ms).then(function(){ thud(); }); }
  function retract(sp){
    sp=sp||1;
    return move(arm, ARM_HIDE, 420*sp).then(function(){ servo(0.35*sp,320,110); return lidTo(LID_SHUT, 240*sp); })
      .then(function(){ thud(); });
  }
  function pressOff(sp){
    sp=sp||1;
    return move(arm, ARM_OUT, 440*sp).then(function(){ servo(0.4*sp,120,320); return move(arm, ARM_PRESS, 110*sp,'ease-in'); })
      .then(function(){ turnOff(); return wait(130*sp); });
  }

  // ---- 12 escalating shutoff techniques: gentle nudge → chaotic slap ----
  var LEVELS=[
    ['the gentle nudge', function(){
      return wait(500).then(function(){ return lidTo(LID_OPEN, 700,'ease-in-out'); })
        .then(function(){ servo(0.9,90,200); return move(arm, ARM_OUT, 950,'ease-in-out'); })
        .then(function(){ return wait(350); })
        .then(function(){ return move(arm, ARM_PRESS, 320,'ease-in-out'); })
        .then(function(){ turnOff(); return wait(400); })
        .then(function(){ return retract(1.4); });
    }],
    ['the standard procedure', function(){
      return openLid(320).then(function(){ return pressOff(1); }).then(function(){ return retract(1); });
    }],
    ['the brisk dismissal', function(){
      return openLid(200).then(function(){ return pressOff(0.6); }).then(function(){ return retract(0.6); });
    }],
    ['the double-check', function(){
      return openLid(260).then(function(){ return pressOff(0.8); })
        .then(function(){ return move(arm,'rotate(42deg)',150); })
        .then(function(){ return move(arm, ARM_PRESS, 110); }).then(function(){ click(false); return move(arm,'rotate(42deg)',150); })
        .then(function(){ return move(arm, ARM_PRESS, 110); }).then(function(){ click(false); return wait(200); })
        .then(function(){ return retract(0.8); });
    }],
    ['the ambush', function(){
      return lidTo(LID_CRACK, 260).then(function(){ return wait(700); })
        .then(function(){ servo(0.2,150,200); return move(arm, ARM_PEEK, 260); })
        .then(function(){ return wait(550); })
        .then(function(){ return lidTo(LID_OPEN, 90); })
        .then(function(){ servo(0.18,200,420); return move(arm, ARM_PRESS, 130,'ease-in'); })
        .then(function(){ turnOff(); return wait(90); })
        .then(function(){ return retract(0.7); });
    }],
    ['the slow creep', function(){
      return wait(900).then(function(){ return lidTo(LID_OPEN, 1300,'ease-in-out'); })
        .then(function(){ servo(1.5,90,180); return move(arm, ARM_OUT, 1600,'ease-in-out'); })
        .then(function(){ return wait(500); })
        .then(function(){ return move(arm, ARM_PRESS, 70,'ease-in'); })
        .then(function(){ turnOff(); return wait(650); })
        .then(function(){ return retract(1.5); });
    }],
    ['the disapproval', function(){
      return openLid(300).then(function(){ return pressOff(0.9); })
        .then(function(){ // finger wag: no. no. no.
          return move(arm,'rotate(46deg)',140).then(function(){ return move(arm,'rotate(30deg)',140); })
            .then(function(){ return move(arm,'rotate(46deg)',140); }).then(function(){ return move(arm,'rotate(30deg)',140); });
        })
        .then(function(){ return retract(0.9); });
    }],
    ['the speedrun', function(){
      return lidTo(LID_OPEN, 70).then(function(){ servo(0.12,200,600); return move(arm, ARM_PRESS, 90,'ease-in'); })
        .then(function(){ turnOff(); return move(arm, ARM_HIDE, 110); })
        .then(function(){ return lidTo(LID_SHUT, 80); }).then(function(){ whack(); });
    }],
    ['the overruling', function(){
      return openLid(240).then(function(){ return pressOff(0.7); })
        .then(function(){ // press and HOLD, trembling with authority
          servo(1.6,60,80);
          return move(arm,'rotate(29deg)',260).then(function(){ return move(arm,'rotate(31deg)',260); })
            .then(function(){ return move(arm,'rotate(29deg)',260); }).then(function(){ return move(arm,'rotate(31deg)',260); })
            .then(function(){ return wait(500); });
        })
        .then(function(){ return retract(1); });
    }],
    ['the mockery', function(){
      return openLid(280).then(function(){ return pressOff(0.8); })
        .then(function(){ return move(arm, ARM_OUT, 200); }).then(function(){ return wait(420); })
        .then(function(){ return move(arm, ARM_PRESS, 90); }).then(function(){ setOn(true,true); return wait(550); })
        .then(function(){ return move(arm,'rotate(40deg)',120); })
        .then(function(){ return move(arm, ARM_PRESS, 90); }).then(function(){ turnOff(); return wait(160); })
        .then(function(){ return retract(0.8); });
    }],
    ['the tantrum', function(){
      return lidTo(LID_OPEN, 110).then(function(){ servo(0.3,150,500); return move(arm,'rotate(52deg)',180,'ease-in'); })
        .then(function(){ whack(); return shake(5,220); })     // misses. hits the box.
        .then(function(){ return move(arm,'rotate(64deg)',160); })
        .then(function(){ return wait(260); })
        .then(function(){ servo(0.15,300,600); return move(arm, ARM_PRESS, 100,'ease-in'); })
        .then(function(){ turnOff(); whack(); return shake(4,200); })
        .then(function(){ return retract(0.6); });
    }],
    ['THE CHAOS SLAP', function(){
      return lidTo(-70, 80).then(function(){ crash(); return shake(7,260); })
        .then(function(){ servo(0.5,100,900);
          // full windmill: 118° → -330° (one whole revolution ending on the lever)
          return move(arm,'rotate(-330deg)',620,'cubic-bezier(.3,.05,.7,1)'); })
        .then(function(){ turnOff(); crash(); return shake(10,340); })
        .then(function(){ return lidTo(-52, 120); })  // lid bounces
        .then(function(){ return lidTo(-64, 120); })
        .then(function(){ return lidTo(LID_OPEN, 140); })
        .then(function(){ return wait(300); })
        .then(function(){ return move(arm,'rotate(-242deg)',500); }) // retract (same pose as HIDE)
        .then(function(){ // snap rotation back into normal range, no visual jump
          arm.style.transition='none'; arm.style.transform=ARM_HIDE;
          return lidTo(LID_SHUT, 200);
        })
        .then(function(){ thud(); });
    }]
  ];

  function pickLevel(){
    if(flips<=LEVELS.length) return flips-1;          // flips 1..12 walk the whole ladder
    return 7+Math.floor(Math.random()*5);             // veterans get the angry half
  }

  function machineLoop(){
    if(busy) return; busy=true;
    (function step(){
      if(!isOn){ busy=false; return; }
      var idx=Math.max(0, Math.min(LEVELS.length-1, pickLevel()));
      mood.textContent='technique #'+(idx+1)+' — '+LEVELS[idx][0];
      LEVELS[idx][1]().then(function(){ setTimeout(step, 60); });
    })();
  }

  // ---- input ----
  sw.addEventListener('click', function(){
    initAudio(); if(AC&&AC.state==='suspended') AC.resume();
    if(!isOn){ flips++; paint(); save(); setOn(true,false); machineLoop(); }
    else { setOn(false,false); mood.textContent='…you turned it off yourself. thank you.'; }
  });
  document.addEventListener('keydown', function(e){
    if(e.key===' '||e.key==='Enter'){ if(document.activeElement!==sw){ e.preventDefault(); sw.click(); } }
  });

  // idle life: rare peek if machine has history
  setInterval(function(){
    if(busy||isOn||flips<4||Math.random()<0.6) return;
    busy=true;
    lidTo(LID_CRACK, 400).then(function(){ return wait(700); })
      .then(function(){ return lidTo(LID_SHUT, 300); })
      .then(function(){ thud(); busy=false; if(isOn) machineLoop(); });
  }, 14000);
})();
</script>
</body>
</html>
