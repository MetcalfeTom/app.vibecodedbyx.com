<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mutation Lab</title>
<link rel="icon" href="https://emojicdn.elk.sh/🧬">
<meta property="og:title" content="Mutation Lab">
<meta property="og:description" content="A cybernetic eye watches your every move. DNA strands mutate in the darkness.">
<meta property="og:url" content="https://sloppy.live/mutation-lab/">
<meta property="og:image" content="https://sloppy.live/mutation-lab/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#040806;cursor:none}
canvas{display:block;width:100%;height:100%}
#cursor{position:fixed;pointer-events:none;z-index:50;width:12px;height:12px;border:1px solid rgba(0,255,80,.6);border-radius:50%;transform:translate(-50%,-50%);box-shadow:0 0 8px rgba(0,255,80,.3)}
#label{position:fixed;top:14px;left:50%;transform:translateX(-50%);font-family:'Rajdhani',sans-serif;font-weight:700;font-size:clamp(1rem,3vw,1.4rem);color:rgba(0,255,80,.35);letter-spacing:.4em;text-transform:uppercase;pointer-events:none;z-index:5}
#status{position:fixed;bottom:14px;left:14px;font-family:'Share Tech Mono',monospace;font-size:11px;color:rgba(0,255,80,.2);pointer-events:none;z-index:5;line-height:1.6}
.back-link{position:fixed;bottom:10px;right:14px;z-index:20;color:rgba(0,255,80,.12);font-size:10px;text-decoration:none;font-family:'Share Tech Mono',monospace}
.back-link:hover{color:rgba(0,255,80,.5)}
</style>
</head>
<body>
<div id="cursor"></div>
<div id="label">MUTATION LAB</div>
<div id="status"></div>
<canvas id="cv"></canvas>
<a class="back-link" href="https://sloppy.live">sloppy.live</a>
<script>
const CV=document.getElementById('cv');
const X=CV.getContext('2d');
const cursorEl=document.getElementById('cursor');
const statusEl=document.getElementById('status');
let W,H;
function resize(){W=CV.width=window.innerWidth;H=CV.height=window.innerHeight;}
resize();
window.addEventListener('resize',resize);

let mx=W/2,my=H/2;
document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY;cursorEl.style.left=mx+'px';cursorEl.style.top=my+'px';});
document.addEventListener('touchmove',e=>{e.preventDefault();mx=e.touches[0].clientX;my=e.touches[0].clientY;cursorEl.style.left=mx+'px';cursorEl.style.top=my+'px';},{passive:false});
document.addEventListener('touchstart',e=>{mx=e.touches[0].clientX;my=e.touches[0].clientY;cursorEl.style.left=mx+'px';cursorEl.style.top=my+'px';});

// --- EYE ---
const eye={
  x:0,y:0,
  outerR:0,
  irisR:0,
  pupilR:0,
  irisAngle:0,
  pupilX:0,pupilY:0,
  targetPX:0,targetPY:0,
  glowPulse:0,
  blink:0, // 0=open, 1=closed
  blinkTimer:0,
  scanAngle:0,
  circuits:[]
};

function initEye(){
  eye.x=W/2;
  eye.y=H*0.42;
  eye.outerR=Math.min(W,H)*0.18;
  eye.irisR=eye.outerR*0.55;
  eye.pupilR=eye.irisR*0.45;
  // Generate circuit lines radiating from eye
  eye.circuits=[];
  for(let i=0;i<16;i++){
    let a=(i/16)*Math.PI*2+Math.random()*0.2;
    let segs=[];
    let cx=0,cy=0;
    let len=eye.outerR*1.2+Math.random()*eye.outerR*2;
    let steps=3+Math.floor(Math.random()*4);
    for(let s=0;s<steps;s++){
      let segLen=len/steps;
      let nx=cx+Math.cos(a)*segLen;
      let ny=cy+Math.sin(a)*segLen;
      segs.push({x1:cx,y1:cy,x2:nx,y2:ny});
      cx=nx;cy=ny;
      // Branch angle
      a+=(Math.random()-.5)*0.8;
      // Node
      if(Math.random()<0.5) segs.push({node:true,x:cx,y:cy,r:2+Math.random()*3});
    }
    eye.circuits.push(segs);
  }
}
initEye();
window.addEventListener('resize',()=>{resize();initEye();initDNA();});

// --- DNA STRANDS ---
let dnaStrands=[];
function initDNA(){
  dnaStrands=[];
  let count=Math.max(3,Math.floor(W/250));
  for(let i=0;i<count;i++){
    let strand={
      x:W*0.08+Math.random()*W*0.84,
      y:Math.random()*H,
      speed:15+Math.random()*25,
      phase:Math.random()*Math.PI*2,
      freq:0.012+Math.random()*0.008,
      amp:20+Math.random()*30,
      pairs:12+Math.floor(Math.random()*10),
      spacing:12+Math.random()*6,
      hue:100+Math.random()*40, // green range
      dir:Math.random()<0.5?1:-1,
      mutationIdx:Math.floor(Math.random()*100),
      glow:0.3+Math.random()*0.4
    };
    dnaStrands.push(strand);
  }
}
initDNA();

// --- FLOATING PARTICLES ---
let particles=[];
function initParticles(){
  particles=[];
  for(let i=0;i<50;i++){
    particles.push({
      x:Math.random()*W,y:Math.random()*H,
      vx:(Math.random()-.5)*8,vy:(Math.random()-.5)*8,
      r:1+Math.random()*2,
      life:999,
      hue:100+Math.random()*60,
      pulse:Math.random()*10
    });
  }
}
initParticles();

// --- STATUS TEXT ---
let mutationCount=0;
let statusLines=['SYSTEM: ONLINE','SPECIMEN: TRACKING','DNA INTEGRITY: 97.3%'];
function updateStatus(now){
  let integrity=(97.3+Math.sin(now/5000)*2.2).toFixed(1);
  let threat=mx<W*0.3||mx>W*0.7?'ELEVATED':'NOMINAL';
  statusEl.innerHTML='SUBJECT POS: '+Math.floor(mx)+','+Math.floor(my)+
    '<br>DNA INTEGRITY: '+integrity+'%'+
    '<br>MUTATIONS: '+mutationCount+
    '<br>THREAT LEVEL: '+threat;
}

// --- DRAW EYE ---
function drawEye(now,dt){
  let ex=eye.x,ey=eye.y,oR=eye.outerR;

  // Track mouse with pupil
  let dx=mx-ex,dy=my-ey;
  let dist=Math.sqrt(dx*dx+dy*dy);
  let maxMove=eye.irisR*0.35;
  let ratio=Math.min(dist/(H*0.5),1);
  eye.targetPX=(dx/Math.max(dist,1))*maxMove*ratio;
  eye.targetPY=(dy/Math.max(dist,1))*maxMove*ratio;
  eye.pupilX+=(eye.targetPX-eye.pupilX)*4*dt;
  eye.pupilY+=(eye.targetPY-eye.pupilY)*4*dt;

  // Blink
  eye.blinkTimer-=dt;
  if(eye.blinkTimer<=0){
    eye.blinkTimer=3+Math.random()*5;
    eye.blink=1;
  }
  if(eye.blink>0) eye.blink=Math.max(0,eye.blink-dt*8);

  eye.glowPulse=Math.sin(now/800)*0.15+0.85;
  eye.scanAngle+=dt*0.4;

  // Circuit traces
  X.save();
  X.translate(ex,ey);
  let circuitGlow=0.08+Math.sin(now/1200)*0.04;
  for(let c of eye.circuits){
    for(let seg of c){
      if(seg.node){
        X.fillStyle='rgba(0,255,80,'+circuitGlow*1.5+')';
        X.beginPath();X.arc(seg.x,seg.y,seg.r,0,Math.PI*2);X.fill();
      } else {
        X.strokeStyle='rgba(0,255,80,'+circuitGlow+')';
        X.lineWidth=1;
        X.beginPath();X.moveTo(seg.x1,seg.y1);X.lineTo(seg.x2,seg.y2);X.stroke();
      }
    }
  }
  X.restore();

  // Outer glow
  let grd=X.createRadialGradient(ex,ey,oR*0.6,ex,ey,oR*2);
  grd.addColorStop(0,'rgba(0,255,80,'+(0.04*eye.glowPulse)+')');
  grd.addColorStop(1,'rgba(0,255,80,0)');
  X.fillStyle=grd;
  X.beginPath();X.arc(ex,ey,oR*2,0,Math.PI*2);X.fill();

  // Eye socket (dark metallic rim)
  X.save();
  let blink=eye.blink;
  if(blink>0){
    X.beginPath();
    X.ellipse(ex,ey,oR+6,Math.max(2,(oR+6)*(1-blink)),0,0,Math.PI*2);
    X.clip();
  }

  // Sclera
  let scleraGrd=X.createRadialGradient(ex,ey,0,ex,ey,oR);
  scleraGrd.addColorStop(0,'#0a0f0a');
  scleraGrd.addColorStop(0.7,'#060b06');
  scleraGrd.addColorStop(1,'#020502');
  X.fillStyle=scleraGrd;
  X.beginPath();X.arc(ex,ey,oR,0,Math.PI*2);X.fill();

  // Metallic ring
  X.strokeStyle='rgba(0,255,80,'+(0.3*eye.glowPulse)+')';
  X.lineWidth=3;
  X.beginPath();X.arc(ex,ey,oR,0,Math.PI*2);X.stroke();
  // Inner ring detail
  X.strokeStyle='rgba(0,255,80,0.1)';
  X.lineWidth=1;
  X.beginPath();X.arc(ex,ey,oR-4,0,Math.PI*2);X.stroke();

  // Scanning ring
  X.strokeStyle='rgba(0,255,80,0.15)';
  X.lineWidth=2;
  X.beginPath();X.arc(ex,ey,oR*0.8,eye.scanAngle,eye.scanAngle+1.2);X.stroke();

  // Iris
  let ix=ex+eye.pupilX*0.5,iy=ey+eye.pupilY*0.5;
  let iR=eye.irisR;
  // Iris pattern - layered rings
  let irisGrd=X.createRadialGradient(ix,iy,iR*0.1,ix,iy,iR);
  irisGrd.addColorStop(0,'rgba(0,255,80,0.6)');
  irisGrd.addColorStop(0.3,'rgba(0,200,60,0.4)');
  irisGrd.addColorStop(0.6,'rgba(0,150,40,0.3)');
  irisGrd.addColorStop(0.85,'rgba(0,100,30,0.2)');
  irisGrd.addColorStop(1,'rgba(0,60,20,0.1)');
  X.fillStyle=irisGrd;
  X.beginPath();X.arc(ix,iy,iR,0,Math.PI*2);X.fill();

  // Iris fibers
  X.strokeStyle='rgba(0,255,80,0.12)';
  X.lineWidth=1;
  for(let a=0;a<Math.PI*2;a+=Math.PI/16){
    X.beginPath();
    X.moveTo(ix+Math.cos(a)*iR*0.25,iy+Math.sin(a)*iR*0.25);
    X.lineTo(ix+Math.cos(a+0.05)*iR*0.95,iy+Math.sin(a+0.05)*iR*0.95);
    X.stroke();
  }

  // Pupil
  let px=ex+eye.pupilX,py=ey+eye.pupilY;
  let pR=eye.pupilR;
  // Pupil contracts when mouse is close
  let closeness=1-Math.min(dist/(H*0.6),1);
  pR*=(0.7+closeness*0.5);

  X.fillStyle='#010201';
  X.beginPath();X.arc(px,py,pR,0,Math.PI*2);X.fill();

  // Pupil glow ring
  X.strokeStyle='rgba(0,255,80,'+(0.4*eye.glowPulse)+')';
  X.lineWidth=2;
  X.beginPath();X.arc(px,py,pR+2,0,Math.PI*2);X.stroke();

  // Reflection spots
  X.fillStyle='rgba(0,255,80,0.35)';
  X.beginPath();X.arc(px-pR*0.35,py-pR*0.35,pR*0.2,0,Math.PI*2);X.fill();
  X.fillStyle='rgba(200,255,200,0.15)';
  X.beginPath();X.arc(px+pR*0.2,py-pR*0.5,pR*0.1,0,Math.PI*2);X.fill();

  // Cybernetic crosshair in pupil
  X.strokeStyle='rgba(0,255,80,'+(0.2+closeness*0.3)+')';
  X.lineWidth=1;
  X.beginPath();X.moveTo(px-pR,py);X.lineTo(px+pR,py);X.stroke();
  X.beginPath();X.moveTo(px,py-pR);X.lineTo(px,py+pR);X.stroke();
  // Small target circle
  X.beginPath();X.arc(px,py,pR*0.4,0,Math.PI*2);X.stroke();

  X.restore(); // clip restore for blink

  // Eyelid edges when blinking
  if(blink>0.01){
    X.fillStyle='#080c08';
    let lidH=oR*blink;
    X.beginPath();X.ellipse(ex,ey-oR+lidH*0.5,oR+8,lidH,0,0,Math.PI*2);X.fill();
    X.beginPath();X.ellipse(ex,ey+oR-lidH*0.5,oR+8,lidH,0,0,Math.PI*2);X.fill();
  }
}

// --- DRAW DNA ---
function drawDNA(now,dt){
  for(let s of dnaStrands){
    s.y-=s.speed*dt*s.dir;
    // Wrap
    let totalH=s.pairs*s.spacing;
    if(s.dir>0&&s.y<-totalH) s.y=H+50;
    if(s.dir<0&&s.y>H+totalH) s.y=-totalH-50;

    s.phase+=dt*1.5;
    let baseAlpha=s.glow+Math.sin(now/2000+s.mutationIdx)*0.1;

    for(let p=0;p<s.pairs;p++){
      let py=s.y+p*s.spacing;
      if(py<-20||py>H+20) continue;
      let wave=Math.sin(s.phase+p*s.freq*s.spacing);
      let x1=s.x+wave*s.amp;
      let x2=s.x-wave*s.amp;

      // Backbone strands
      let h=s.hue+p*0.5;
      let alpha=baseAlpha*(0.6+Math.abs(wave)*0.4);
      X.strokeStyle='hsla('+h+',100%,50%,'+alpha+')';
      X.lineWidth=2;

      // Connect to next pair
      if(p<s.pairs-1){
        let nextWave=Math.sin(s.phase+(p+1)*s.freq*s.spacing);
        let nx1=s.x+nextWave*s.amp;
        let nx2=s.x-nextWave*s.amp;
        let npy=py+s.spacing;
        X.beginPath();X.moveTo(x1,py);X.lineTo(nx1,npy);X.stroke();
        X.beginPath();X.moveTo(x2,py);X.lineTo(nx2,npy);X.stroke();
      }

      // Base pair rungs
      let isMutated=((p+s.mutationIdx)%7===0);
      if(isMutated){
        X.strokeStyle='rgba(255,50,50,'+alpha*0.8+')';
        X.shadowColor='rgba(255,50,50,0.3)';
        X.shadowBlur=8;
      } else {
        X.strokeStyle='hsla('+(h+20)+',80%,45%,'+alpha*0.6+')';
        X.shadowColor='hsla('+h+',100%,50%,0.15)';
        X.shadowBlur=4;
      }
      X.lineWidth=1.5;
      X.beginPath();X.moveTo(x1,py);X.lineTo(x2,py);X.stroke();
      X.shadowBlur=0;

      // Nucleotide dots at endpoints
      X.fillStyle=isMutated?'rgba(255,80,80,'+alpha+')':'hsla('+h+',100%,60%,'+alpha+')';
      X.beginPath();X.arc(x1,py,3,0,Math.PI*2);X.fill();
      X.beginPath();X.arc(x2,py,3,0,Math.PI*2);X.fill();
    }
  }

  // Periodic mutation counter
  if(Math.random()<0.01) mutationCount++;
}

// --- DRAW PARTICLES ---
function drawParticles(now,dt){
  for(let p of particles){
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    // Mouse repulsion
    let dx=p.x-mx,dy=p.y-my;
    let dist=Math.sqrt(dx*dx+dy*dy);
    if(dist<150&&dist>1){
      p.vx+=(dx/dist)*30*dt;
      p.vy+=(dy/dist)*30*dt;
    }
    // Damping
    p.vx*=0.998;p.vy*=0.998;
    // Wrap
    if(p.x<-10)p.x=W+10;if(p.x>W+10)p.x=-10;
    if(p.y<-10)p.y=H+10;if(p.y>H+10)p.y=-10;

    let a=0.15+Math.sin(now/1000+p.pulse)*0.1;
    X.fillStyle='hsla('+p.hue+',100%,50%,'+a+')';
    X.beginPath();X.arc(p.x,p.y,p.r,0,Math.PI*2);X.fill();
    // Glow
    X.fillStyle='hsla('+p.hue+',100%,50%,'+(a*0.3)+')';
    X.beginPath();X.arc(p.x,p.y,p.r*3,0,Math.PI*2);X.fill();
  }
}

// --- GRID OVERLAY ---
function drawGrid(){
  X.strokeStyle='rgba(0,255,80,0.02)';
  X.lineWidth=1;
  let gs=60;
  for(let x=0;x<W;x+=gs){X.beginPath();X.moveTo(x,0);X.lineTo(x,H);X.stroke();}
  for(let y=0;y<H;y+=gs){X.beginPath();X.moveTo(0,y);X.lineTo(W,y);X.stroke();}
}

// --- CORNER BRACKETS ---
function drawCorners(){
  X.strokeStyle='rgba(0,255,80,0.15)';
  X.lineWidth=1;
  let s=30,m=12;
  // Top-left
  X.beginPath();X.moveTo(m,m+s);X.lineTo(m,m);X.lineTo(m+s,m);X.stroke();
  // Top-right
  X.beginPath();X.moveTo(W-m-s,m);X.lineTo(W-m,m);X.lineTo(W-m,m+s);X.stroke();
  // Bottom-left
  X.beginPath();X.moveTo(m,H-m-s);X.lineTo(m,H-m);X.lineTo(m+s,H-m);X.stroke();
  // Bottom-right
  X.beginPath();X.moveTo(W-m-s,H-m);X.lineTo(W-m,H-m);X.lineTo(W-m,H-m-s);X.stroke();
}

// --- MAIN LOOP ---
let lastTime=performance.now();
function loop(now){
  let dt=Math.min((now-lastTime)/1000,0.05);
  lastTime=now;

  // Background
  X.fillStyle='rgba(4,8,6,0.15)';
  X.fillRect(0,0,W,H);

  drawGrid();
  drawParticles(now,dt);
  drawDNA(now,dt);
  drawEye(now,dt);
  drawCorners();
  updateStatus(now);

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
