<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Terminal — synthetic newsroom wire</title>
<meta name="description" content="A neon AI news terminal. Scrolling ticker. Synthetic dispatches. Labs, policy, silicon, research." />
<meta property="og:title" content="AI Terminal" />
<meta property="og:description" content="A neon AI news terminal. Scrolling ticker. Synthetic dispatches. Labs, policy, silicon, research." />
<meta property="og:url" content="https://sloppy.live/ai-terminal" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/dark%20neon%20cyberpunk%20newsroom%20terminal%20phosphor%20green%20magenta%20cyan%20news%20ticker%20bloomberg%20interface%20glitch%20art%20deco%20synthetic%20wire?width=1200&height=630&nologo=true" />
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%93%A1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=VT323&family=Newsreader:ital,wght@1,300;1,400&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#050608;
    --panel:#0a0e15;
    --panel2:#10161f;
    --ink:#d8e2ee;
    --dim:#5a6b85;
    --line:rgba(95,255,140,0.10);
    --line2:rgba(95,240,255,0.10);
    --green:#5fff8c;
    --magenta:#ff3d8a;
    --cyan:#5ff0ff;
    --amber:#ffaf3d;
    --violet:#b88dff;
    --red:#ff2046;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{
    background: var(--bg);
    color: var(--ink);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    position: relative;
  }
  body::before{
    content:'';
    position:fixed;
    inset:0;
    background:
      radial-gradient(1100px 800px at 0% 0%, rgba(95,255,140,0.05), transparent 60%),
      radial-gradient(900px 700px at 100% 100%, rgba(255,61,138,0.04), transparent 60%),
      radial-gradient(700px 700px at 50% 50%, rgba(95,240,255,0.025), transparent 70%);
    pointer-events:none;
    z-index:0;
  }
  body::after{
    content:'';
    position:fixed;
    inset:0;
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0 1px, transparent 1px 3px),
      url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='60' height='60'><path d='M0 30h60M30 0v60' stroke='rgba(95,255,140,0.025)' stroke-width='1'/></svg>");
    background-size: auto, 60px 60px;
    pointer-events:none;
    z-index:0;
    mix-blend-mode: screen;
  }

  .app{
    position:relative;
    z-index:1;
    display:grid;
    grid-template-rows: 56px 36px 1fr 28px;
    height:100vh;
  }

  /* HEADER */
  header{
    display:flex;
    align-items:center;
    gap:18px;
    padding:0 22px;
    border-bottom:1px solid var(--line);
    background:linear-gradient(180deg, rgba(10,14,21,0.95), rgba(5,6,8,0.95));
    backdrop-filter: blur(8px);
    position:relative;
  }
  .brand{
    font-family: 'Major Mono Display', monospace;
    font-size: 22px;
    color: var(--green);
    letter-spacing: 0.04em;
    text-shadow: 0 0 12px rgba(95,255,140,0.45);
    position: relative;
    cursor: default;
    user-select: none;
  }
  .brand::before, .brand::after{
    content: 'ai//terminal';
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    opacity: 0;
  }
  .brand::before{ color: var(--magenta); transform: translate(-1.5px, 0); }
  .brand::after{ color: var(--cyan); transform: translate(1.5px, 0); }
  .brand.glitch::before{ animation: glitch1 0.32s linear; }
  .brand.glitch::after{ animation: glitch2 0.32s linear; }
  @keyframes glitch1{
    0%, 100%{ opacity: 0; transform: translate(0,0); }
    20%{ opacity: 0.9; transform: translate(-2px, -1px); }
    40%{ opacity: 0.7; transform: translate(-3px, 1px); }
    60%{ opacity: 0.85; transform: translate(-1px, 0); }
    80%{ opacity: 0; }
  }
  @keyframes glitch2{
    0%, 100%{ opacity: 0; transform: translate(0,0); }
    25%{ opacity: 0.9; transform: translate(2px, 1px); }
    45%{ opacity: 0.6; transform: translate(3px, -1px); }
    70%{ opacity: 0.85; transform: translate(1px, 0); }
    90%{ opacity: 0; }
  }

  .tag-pill{
    font-family: 'VT323', monospace;
    font-size: 14px;
    padding: 2px 10px;
    border: 1px solid var(--line);
    color: var(--dim);
    letter-spacing: 0.14em;
    border-radius: 1px;
    text-transform: uppercase;
  }
  .tag-pill.synth{
    color: var(--magenta);
    border-color: rgba(255,61,138,0.3);
    background: rgba(255,61,138,0.04);
  }

  .header-spacer{ flex:1 }

  .clock{
    display:flex;
    align-items:center;
    gap:14px;
    font-family: 'VT323', monospace;
    font-size: 18px;
    letter-spacing: 0.06em;
    color: var(--ink);
  }
  .clock .lbl{ color: var(--dim); font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; }
  .clock .val{ color: var(--cyan); text-shadow: 0 0 8px rgba(95,240,255,0.4); }
  .live{
    display:flex;
    align-items:center;
    gap:8px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--green);
  }
  .live .dot{
    width:8px; height:8px; border-radius:50%;
    background: var(--green);
    box-shadow: 0 0 10px var(--green);
    animation: pulse 1.8s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:0.35} }

  /* TICKER */
  .ticker-bar{
    overflow:hidden;
    background: var(--panel);
    border-bottom:1px solid var(--line);
    position:relative;
    display:flex;
    align-items:center;
  }
  .ticker-bar::before{
    content: 'WIRE >>';
    background: var(--green);
    color: var(--bg);
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.16em;
    padding: 8px 14px;
    height: 100%;
    display: flex;
    align-items: center;
    box-shadow: 0 0 16px rgba(95,255,140,0.4);
    z-index: 2;
    flex-shrink: 0;
  }
  .ticker-track{
    display: flex;
    white-space: nowrap;
    animation: tickerSlide 90s linear infinite;
    will-change: transform;
  }
  .ticker-track.paused{ animation-play-state: paused; }
  .ticker-item{
    padding: 0 28px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    letter-spacing: 0.04em;
    color: var(--ink);
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .ticker-item .ttag{
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.16em;
    padding: 1px 8px;
    border-radius: 1px;
  }
  .ttag.t-breaking{ color: #fff; background: var(--red); animation: blink 1s step-end infinite; }
  @keyframes blink{ 50%{ opacity: 0.5 } }
  .ttag.t-tech{ color: var(--cyan); background: rgba(95,240,255,0.1); }
  .ttag.t-policy{ color: var(--green); background: rgba(95,255,140,0.1); }
  .ttag.t-research{ color: var(--violet); background: rgba(184,141,255,0.1); }
  .ttag.t-markets{ color: var(--amber); background: rgba(255,175,61,0.1); }
  .ttag.t-labs{ color: var(--magenta); background: rgba(255,61,138,0.1); }
  .ttag.t-hardware{ color: var(--cyan); background: rgba(95,240,255,0.1); }
  .ttag.t-security{ color: var(--red); background: rgba(255,32,70,0.1); }
  .ttag.t-startups{ color: var(--amber); background: rgba(255,175,61,0.1); }
  .ttag.t-ethics{ color: var(--violet); background: rgba(184,141,255,0.1); }
  .ticker-item .sep{ color: var(--dim); margin: 0 8px; }
  @keyframes tickerSlide{
    0%{ transform: translateX(0) }
    100%{ transform: translateX(-50%) }
  }

  /* MAIN */
  main{
    display:grid;
    grid-template-columns: 1fr 320px;
    overflow: hidden;
    background: var(--bg);
  }
  .stories{
    display:flex;
    flex-direction:column;
    overflow: hidden;
    border-right: 1px solid var(--line);
  }
  .filter-bar{
    display:flex;
    gap: 6px;
    padding: 12px 22px;
    overflow-x: auto;
    border-bottom: 1px solid var(--line);
    background: rgba(10,14,21,0.5);
    align-items: center;
    flex-shrink: 0;
  }
  .filter-bar::-webkit-scrollbar{ height: 4px; }
  .filter-bar::-webkit-scrollbar-thumb{ background: rgba(95,240,255,0.3); }
  .chip{
    background: transparent;
    border: 1px solid var(--line);
    color: var(--dim);
    padding: 5px 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 1px;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .chip:hover{ color: var(--ink); border-color: var(--line2); }
  .chip.active{
    color: var(--bg);
    background: var(--green);
    border-color: var(--green);
    box-shadow: 0 0 12px rgba(95,255,140,0.4);
  }
  .search{
    flex: 1;
    min-width: 140px;
    background: transparent;
    border: 1px solid var(--line);
    border-bottom: 1px solid var(--cyan);
    color: var(--ink);
    padding: 5px 10px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.04em;
    border-radius: 0;
    margin-left: auto;
  }
  .search:focus{ outline: none; border-color: var(--cyan); box-shadow: 0 0 0 2px rgba(95,240,255,0.16); }
  .search::placeholder{ color: var(--dim); font-style: italic; }
  .pause-btn{
    background: transparent;
    border: 1px solid var(--line);
    color: var(--amber);
    padding: 5px 12px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 1px;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .pause-btn:hover{ border-color: var(--amber); }
  .pause-btn.active{
    color: var(--bg);
    background: var(--amber);
    border-color: var(--amber);
  }

  .grid{
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 18px 22px 28px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
    align-content: start;
  }
  .grid::-webkit-scrollbar{ width: 8px; }
  .grid::-webkit-scrollbar-track{ background: transparent; }
  .grid::-webkit-scrollbar-thumb{ background: rgba(95,240,255,0.18); border-radius: 4px; }

  .card{
    background: var(--panel);
    border: 1px solid var(--line);
    border-left: 2px solid var(--green);
    padding: 12px 14px 14px;
    border-radius: 1px;
    cursor: pointer;
    position: relative;
    transition: border-color 0.18s, transform 0.18s, box-shadow 0.18s;
    animation: cardIn 0.4s ease-out backwards;
  }
  @keyframes cardIn{
    from{ opacity: 0; transform: translateY(8px); }
    to{ opacity: 1; transform: translateY(0); }
  }
  .card:hover{
    border-color: var(--cyan);
    border-left-color: var(--cyan);
    box-shadow: 0 0 20px rgba(95,240,255,0.08);
    transform: translateY(-1px);
  }
  .card.t-breaking{ border-left-color: var(--red); }
  .card.t-policy{ border-left-color: var(--green); }
  .card.t-tech, .card.t-hardware{ border-left-color: var(--cyan); }
  .card.t-research{ border-left-color: var(--violet); }
  .card.t-labs, .card.t-markets, .card.t-startups{ border-left-color: var(--amber); }
  .card.t-security{ border-left-color: var(--red); }
  .card.t-ethics{ border-left-color: var(--magenta); }

  .card .meta{
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    font-family: 'VT323', monospace;
    font-size: 13px;
    letter-spacing: 0.06em;
    color: var(--dim);
  }
  .card .meta .src{ color: var(--ink); }
  .card .meta .ts{ margin-left: auto; color: var(--cyan); }
  .card .meta .breaking{
    color: #fff;
    background: var(--red);
    padding: 1px 6px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 9.5px;
    letter-spacing: 0.18em;
    font-weight: 700;
    animation: blink 1s step-end infinite;
  }
  .card h3{
    font-family: 'Orbitron', sans-serif;
    font-weight: 700;
    font-size: 15px;
    line-height: 1.32;
    color: var(--ink);
    margin-bottom: 8px;
    letter-spacing: 0.005em;
  }
  .card p{
    font-family: 'Share Tech Mono', monospace;
    font-size: 12.5px;
    line-height: 1.55;
    color: var(--dim);
  }
  .card .corner{
    position: absolute;
    top: 8px;
    right: 8px;
    width: 8px;
    height: 8px;
    border-top: 1px solid var(--line2);
    border-right: 1px solid var(--line2);
    opacity: 0.6;
  }

  /* SIDE LOG */
  aside.log{
    display: flex;
    flex-direction: column;
    background: var(--panel);
    overflow: hidden;
  }
  .log-head{
    padding: 10px 16px;
    border-bottom: 1px solid var(--line);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.22em;
    color: var(--magenta);
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .log-head .ld{
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--magenta);
    box-shadow: 0 0 8px var(--magenta);
    animation: pulse 1.4s ease-in-out infinite;
  }
  .log-head .lt{ flex: 1; }
  .log-head .lcount{ color: var(--dim); font-size: 10px; letter-spacing: 0.16em; }
  .log-list{
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 8px 0;
  }
  .log-list::-webkit-scrollbar{ width: 6px; }
  .log-list::-webkit-scrollbar-thumb{ background: rgba(255,61,138,0.25); }
  .log-line{
    padding: 6px 16px;
    font-family: 'VT323', monospace;
    font-size: 14px;
    letter-spacing: 0.04em;
    line-height: 1.4;
    color: var(--ink);
    border-left: 2px solid transparent;
    animation: logIn 0.45s ease-out;
  }
  @keyframes logIn{
    from{ opacity: 0; transform: translateX(-12px); }
    to{ opacity: 1; transform: translateX(0); }
  }
  .log-line.l-breaking{ border-left-color: var(--red); color: var(--red); }
  .log-line.l-tech, .log-line.l-hardware{ border-left-color: var(--cyan); }
  .log-line.l-policy{ border-left-color: var(--green); }
  .log-line.l-research{ border-left-color: var(--violet); }
  .log-line.l-labs{ border-left-color: var(--magenta); }
  .log-line.l-markets, .log-line.l-startups{ border-left-color: var(--amber); }
  .log-line.l-security{ border-left-color: var(--red); }
  .log-line.l-ethics{ border-left-color: var(--magenta); }
  .log-line .lts{ color: var(--dim); margin-right: 8px; }
  .log-line .ltt{
    color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.14em;
    margin-right: 6px;
    text-transform: uppercase;
  }
  .log-line.l-breaking .ltt{ color: var(--red); }
  .log-line.l-policy .ltt{ color: var(--green); }
  .log-line.l-research .ltt{ color: var(--violet); }
  .log-line.l-labs .ltt{ color: var(--magenta); }
  .log-line.l-markets .ltt, .log-line.l-startups .ltt{ color: var(--amber); }
  .log-line.l-ethics .ltt{ color: var(--magenta); }

  /* BREAKING BANNER */
  .breaking-banner{
    position: fixed;
    top: 56px;
    left: 0;
    right: 0;
    background: var(--red);
    color: #fff;
    padding: 10px 24px;
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 14px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    text-align: center;
    z-index: 50;
    box-shadow: 0 6px 24px rgba(255,32,70,0.5);
    transform: translateY(-100%);
    transition: transform 0.45s cubic-bezier(0.2, 0.8, 0.2, 1);
    pointer-events: none;
  }
  .breaking-banner.show{ transform: translateY(0); }
  .breaking-banner span{ animation: blink 1s step-end infinite; margin-right: 12px; }

  /* FOOTER STATUS */
  footer{
    background: rgba(10,14,21,0.95);
    border-top: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 0 22px;
    font-family: 'VT323', monospace;
    font-size: 13px;
    letter-spacing: 0.08em;
    color: var(--dim);
  }
  footer .stat{ display: flex; align-items: center; gap: 6px; }
  footer .stat .k{ color: var(--dim); font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; font-family: 'Share Tech Mono', monospace; }
  footer .stat .v{ color: var(--green); }
  footer .stat .v.warn{ color: var(--amber); }
  footer .stat .v.cy{ color: var(--cyan); }
  footer .creed{
    font-family: 'Newsreader', serif;
    font-style: italic;
    font-size: 11.5px;
    letter-spacing: 0;
    color: var(--dim);
    margin-left: auto;
  }

  /* MODAL */
  .modal{
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 30px;
  }
  .modal.show{ display: flex; }
  .modal-card{
    background: var(--panel);
    border: 1px solid var(--cyan);
    border-radius: 1px;
    padding: 24px 28px 28px;
    width: 600px;
    max-width: 100%;
    max-height: 80vh;
    overflow-y: auto;
    box-shadow: 0 0 50px rgba(95,240,255,0.18);
    position: relative;
  }
  .modal-card .x{
    position: absolute;
    top: 10px; right: 14px;
    background: transparent;
    border: none;
    color: var(--dim);
    font-size: 22px;
    cursor: pointer;
    transition: color 0.15s;
  }
  .modal-card .x:hover{ color: var(--magenta); }
  .modal-card .mmeta{
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 14px;
    font-family: 'VT323', monospace;
    font-size: 14px;
    letter-spacing: 0.06em;
    color: var(--dim);
  }
  .modal-card h2{
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 22px;
    line-height: 1.25;
    color: var(--ink);
    margin-bottom: 16px;
    letter-spacing: 0.005em;
  }
  .modal-card .body{
    font-family: 'Newsreader', serif;
    font-style: normal;
    font-size: 15px;
    line-height: 1.65;
    color: #c8d2de;
  }
  .modal-card .body p{ margin-bottom: 11px; }
  .modal-card .footer-line{
    margin-top: 22px;
    padding-top: 14px;
    border-top: 1px dashed var(--line);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.16em;
    color: var(--dim);
    text-transform: uppercase;
    display: flex;
    gap: 14px;
  }
  .modal-card .footer-line span{ color: var(--green); }
  .modal-card .wireid{ color: var(--cyan); font-family: 'VT323', monospace; font-size: 14px; letter-spacing: 0.06em; }

  /* RESPONSIVE */
  @media (max-width: 980px){
    main{ grid-template-columns: 1fr; }
    aside.log{ display: none; }
    .grid{ grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); }
  }
  @media (max-width: 640px){
    header{ padding: 0 14px; gap: 10px; }
    .brand{ font-size: 16px; }
    .clock{ font-size: 14px; gap: 8px; }
    .clock .lbl{ display: none; }
    footer .creed{ display: none; }
    .filter-bar{ padding: 10px 14px; }
    .grid{ padding: 14px; }
  }
</style>
</head>
<body>

<div class="app">

  <header>
    <div class="brand" id="brand">ai//terminal</div>
    <div class="tag-pill synth">SYNTHETIC</div>
    <div class="tag-pill" id="versionPill">v1·wire</div>
    <div class="header-spacer"></div>
    <div class="clock">
      <div><span class="lbl">UTC</span> <span class="val" id="clockUtc">--:--:--</span></div>
      <div><span class="lbl">DAY</span> <span class="val" id="clockDay">---</span></div>
    </div>
    <div class="live"><span class="dot"></span><span>LIVE FEED</span></div>
  </header>

  <div class="ticker-bar">
    <div class="ticker-track" id="tickerTrack"></div>
  </div>

  <main>
    <section class="stories">
      <div class="filter-bar" id="filterBar">
        <button class="chip active" data-tag="ALL">All</button>
        <button class="chip" data-tag="LABS">Labs</button>

function tickClock(){
  const d = new Date();
  const utc = d.toISOString().slice(11, 19);
  const day = d.toUTCString().slice(0, 3).toUpperCase() + ' ' + d.getUTCDate();
  $('#clockUtc').textContent = utc;
  $('#clockDay').textContent = day;
}
setInterval(tickClock, 1000);

  const track = $('#tickerTrack');
  // Build a long enough sequence and duplicate for seamless loop
  const items = [...STORIES].sort(() => Math.random() - 0.5).slice(0, 28);
  const html = items.map(s => `
    <div class="ticker-item">
      <span class="ttag t-${s.tag.toLowerCase()}">${s.tag}</span>
      <span>${escapeHtml(s.h)}</span>
      <span class="sep">·</span>
      <span style="color:var(--dim)">${s.src}</span>
    </div>
  `).join('');
  // Duplicate for seamless infinite scroll (50% translateX)
  track.innerHTML = html + html;
}
function setTickerPaused(paused){
  state.paused = paused;
  $('#tickerTrack').classList.toggle('paused', paused);
  $('#pauseBtn').classList.toggle('active', paused);
  $('#pauseBtn').textContent = paused ? '▶ Resume' : '⏸ Hold';
  $('#statTick').textContent = paused ? 'paused' : 'running';
  $('#statTick').className = paused ? 'v warn' : 'v warn';
}

// ============================================================
// STORY GRID
// ============================================================
function randomTime(){
  const d = new Date();
  const offsetMin = Math.floor(Math.random() * 240);
  d.setMinutes(d.getMinutes() - offsetMin);
  return d.toISOString().slice(11, 16);
}
function wireId(){
  return 'WX-' + Math.random().toString(36).slice(2, 6).toUpperCase() + '-' + Math.random().toString(36).slice(2, 6).toUpperCase();
}

const annotated = STORIES.map((s, i) => {
  const isBreaking = i < 2 || (Math.random() < 0.07);
  return { ...s, t: randomTime(), id: i, breaking: isBreaking, wireId: wireId() };
});

function renderGrid(){
  const grid = $('#grid');
  const q = state.search.toLowerCase();
  const filtered = annotated.filter(s => {
    if (state.filterTag !== 'ALL' && s.tag !== state.filterTag) return false;
    if (q && !(s.h.toLowerCase().includes(q) || s.b.toLowerCase().includes(q) || s.tag.toLowerCase().includes(q))) return false;
    return true;
  });
  grid.innerHTML = '';
  if (!filtered.length){
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px 20px;font-family:Newsreader,serif;font-style:italic;color:var(--dim)">no matching dispatches on the wire</div>';
    return;
  }
  filtered.forEach((s, idx) => {
    const card = document.createElement('div');
    card.className = 'card t-' + s.tag.toLowerCase() + (s.breaking ? ' t-breaking' : '');
    card.style.animationDelay = (idx * 30) + 'ms';
    card.innerHTML = `
      <span class="corner"></span>
      <div class="meta">
        ${s.breaking ? '<span class="breaking">◉ BRK</span>' : ''}
        <span>${s.tag}</span>
        <span>·</span>
        <span class="src">${s.src}</span>
        <span class="ts">${s.t}</span>
      </div>
      <h3>${escapeHtml(s.h)}</h3>
      <p>${escapeHtml(s.b)}</p>
    `;
    card.addEventListener('click', () => openStory(s));
    grid.appendChild(card);
  });
  $('#statStories').textContent = annotated.length;
  $('#statFeed').textContent = filtered.length;
}

// ============================================================
// LOG STREAM
// ============================================================
function logTime(){
  const d = new Date();
  return d.toISOString().slice(11, 19);
}
function appendLog(line){
  state.log.unshift(line);
  if (state.log.length > 60) state.log.pop();
  const list = $('#logList');
  const div = document.createElement('div');
  div.className = 'log-line l-' + line.tag.toLowerCase();
  div.innerHTML = `<span class="lts">[${line.ts}]</span><span class="ltt">${line.tag}</span>${escapeHtml(line.text)}`;
  list.insertBefore(div, list.firstChild);
  // Trim oldest
  while (list.children.length > 60) list.removeChild(list.lastChild);
  $('#logCount').textContent = state.log.length + ' lines';
}
function logFromStory(s){
  appendLog({ ts: logTime(), tag: s.tag, text: s.h });
}
function startLogStream(){
  // Seed with 8 lines
  for (let i = 0; i < 8; i++){
    const s = annotated[Math.floor(Math.random() * annotated.length)];
    state.log.push({ ts: logTime(), tag: s.tag, text: s.h });
  }
  // Render seed
  state.log.forEach(line => {
    const div = document.createElement('div');
    div.className = 'log-line l-' + line.tag.toLowerCase();
    div.innerHTML = `<span class="lts">[${line.ts}]</span><span class="ltt">${line.tag}</span>${escapeHtml(line.text)}`;
    $('#logList').appendChild(div);
  });
  $('#logCount').textContent = state.log.length + ' lines';

  // Schedule new dispatches at 5-12s intervals
  function scheduleNext(){
    const wait = 5000 + Math.random() * 7000;
    setTimeout(() => {
      const s = annotated[Math.floor(Math.random() * annotated.length)];
      logFromStory(s);
      scheduleNext();
    }, wait);
  }
  scheduleNext();
}

// ============================================================
// BREAKING BANNER
// ============================================================
function showBreaking(text){
  const banner = $('#breakingBanner');
  $('#breakingText').textContent = text;
  banner.classList.add('show');
  setTimeout(() => banner.classList.remove('show'), 8000);
  appendLog({ ts: logTime(), tag: 'BREAKING', text });
}
function scheduleBreaking(){
  const wait = 35000 + Math.random() * 50000;
  setTimeout(() => {
    showBreaking(BREAKING_POOL[Math.floor(Math.random() * BREAKING_POOL.length)]);
    scheduleBreaking();
  }, wait);
}

// ============================================================
// MODAL
// ============================================================
function openStory(s){
  $('#modal').classList.add('show');
  $('#modalMeta').innerHTML = `
    ${s.breaking ? '<span class="breaking" style="color:#fff;background:var(--red);padding:1px 6px;font-family:Share Tech Mono,monospace;font-size:9.5px;letter-spacing:0.18em;font-weight:700">◉ BRK</span>' : ''}
    <span style="color:var(--cyan)">${s.tag}</span>
    <span>·</span>
    <span style="color:var(--ink)">${s.src}</span>
    <span style="margin-left:auto;color:var(--cyan)">${s.t} UTC</span>
  `;
  $('#modalTitle').textContent = s.h;
  const bodyHtml = (s.full || s.b).split('\n\n').map(p => `<p>${escapeHtml(p)}</p>`).join('');
  $('#modalBody').innerHTML = bodyHtml;
  $('#modalWire').textContent = '◇ ' + s.wireId;
}
function closeModal(){ $('#modal').classList.remove('show'); }

// ============================================================
// HELPERS
// ============================================================
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

// ============================================================
// EVENT WIRING
// ============================================================
function init(){
  buildTicker();
  renderGrid();
  startLogStream();
  scheduleBreaking();

  // Filter chips
  $$('.chip').forEach(c => c.addEventListener('click', () => {
    $$('.chip').forEach(x => x.classList.remove('active'));
    c.classList.add('active');
    state.filterTag = c.dataset.tag;
    renderGrid();
  }));

  // Search
  let searchT = null;
  $('#search').addEventListener('input', e => {
    clearTimeout(searchT);
    searchT = setTimeout(() => {
      state.search = e.target.value.trim();
      renderGrid();
    }, 120);
  });

  // Pause
  $('#pauseBtn').addEventListener('click', () => setTickerPaused(!state.paused));

  // Modal
  $('#modalX').addEventListener('click', closeModal);
  $('#modal').addEventListener('click', e => { if (e.target.id === 'modal') closeModal(); });

  // Brand glitch
  setInterval(() => {
    const b = $('#brand');
    b.classList.remove('glitch');
    void b.offsetWidth;
    b.classList.add('glitch');
  }, 4500 + Math.random() * 3500);

  // Ping simulator
  setInterval(() => {
    state.pingMs = Math.floor(2 + Math.random() * 14);
    $('#statPing').textContent = state.pingMs + ' ms';
  }, 2000);

  // Hotkeys
  document.addEventListener('keydown', e => {
    if (e.key === 'Escape'){ closeModal(); }
    if (e.key === ' ' && document.activeElement.tagName !== 'INPUT'){
      e.preventDefault();
      setTickerPaused(!state.paused);
    }
    if (e.key === '/' && document.activeElement.tagName !== 'INPUT'){
      e.preventDefault();
      $('#search').focus();
    }
  });
}

document.addEventListener('DOMContentLoaded', init);
</script>

</body>
</html>
