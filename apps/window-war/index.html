<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Window War</title>
<link rel="icon" href="https://emojicdn.elk.sh/🪟">
<meta property="og:title" content="Window War">
<meta property="og:description" content="Catch runaway windows before they minimize your game. Click them before they escape!">
<meta property="og:url" content="https://sloppy.live/window-war/">
<meta property="og:image" content="https://sloppy.live/window-war/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;600;700&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a6cc4;overflow:hidden;height:100dvh;user-select:none;font-family:'IBM Plex Sans',sans-serif}
#desktop{position:fixed;inset:0;background:linear-gradient(135deg,#1a6cc4 0%,#1480d0 40%,#0e90c8 100%)}
/* Desktop icons */
.desk-icon{position:absolute;display:flex;flex-direction:column;align-items:center;gap:2px;pointer-events:none;opacity:.3}
.desk-icon span{font-size:20px}.desk-icon small{font-size:8px;color:rgba(255,255,255,.5);font-family:'IBM Plex Mono',monospace}
/* Taskbar */
#taskbar{position:fixed;bottom:0;left:0;right:0;height:36px;background:linear-gradient(180deg,#3a3a4a,#28283a);border-top:1px solid #4a4a5a;z-index:1000;display:flex;align-items:center;padding:0 6px;gap:4px}
#start-btn{font-family:'IBM Plex Sans',sans-serif;font-size:11px;font-weight:700;padding:4px 12px;background:linear-gradient(180deg,#4a8a40,#3a7030);border:1px solid #5aa050;border-radius:3px;color:#fff;cursor:default;display:flex;align-items:center;gap:4px}
#start-btn span{font-size:14px}
#task-items{display:flex;gap:2px;flex:1;overflow:hidden}
.task-item{font-family:'IBM Plex Mono',monospace;font-size:9px;padding:3px 8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:2px;color:rgba(255,255,255,.4);max-width:100px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#clock{font-family:'IBM Plex Mono',monospace;font-size:10px;color:rgba(255,255,255,.5);padding:0 8px;border-left:1px solid rgba(255,255,255,.1)}
/* HUD */
#hud{position:fixed;top:8px;left:50%;transform:translateX(-50%);z-index:999;display:flex;gap:16px;align-items:center;background:rgba(0,0,0,.3);padding:6px 16px;border-radius:6px;backdrop-filter:blur(4px)}
.hud-item{font-family:'IBM Plex Mono',monospace;font-size:11px;color:rgba(255,255,255,.6);letter-spacing:1px}
.hud-val{color:#fff;font-weight:600}
/* Game windows */
.game-win{position:absolute;border-radius:6px 6px 0 0;box-shadow:0 4px 20px rgba(0,0,0,.3);cursor:pointer;transition:transform .05s;z-index:100}
.game-win:active{transform:scale(.97)}
.game-win .win-bar{height:28px;border-radius:6px 6px 0 0;display:flex;align-items:center;padding:0 8px;gap:6px}
.game-win .win-bar .dots{display:flex;gap:4px}
.game-win .win-bar .dot{width:10px;height:10px;border-radius:50%}
.game-win .win-bar .title{flex:1;font-family:'IBM Plex Sans',sans-serif;font-size:11px;font-weight:600;color:rgba(255,255,255,.8);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.game-win .win-body{background:#1e1e2e;padding:8px;overflow:hidden}
.game-win .win-body pre{font-family:'IBM Plex Mono',monospace;font-size:8px;line-height:1.4;color:rgba(150,200,255,.3);white-space:pre-wrap;word-break:break-all}
/* Minimize animation */
.game-win.minimizing{transition:all .3s ease-in;opacity:0;transform:scale(.1) translateY(100vh)}
.game-win.caught{animation:catchPop .3s}
@keyframes catchPop{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
/* Screens */
#title-screen,#gameover-screen{position:fixed;inset:0;z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.7);backdrop-filter:blur(8px);transition:opacity .4s}
#title-screen h1{font-size:clamp(28px,7vw,56px);font-weight:700;color:#fff;letter-spacing:4px;text-shadow:0 2px 20px rgba(100,180,255,.3)}
#title-screen .sub{font-family:'IBM Plex Mono',monospace;font-size:12px;color:rgba(255,255,255,.3);letter-spacing:3px;margin:8px 0 24px}
#gameover-screen h2{font-size:clamp(22px,5vw,40px);font-weight:700;color:#ff6060;text-shadow:0 2px 16px rgba(255,60,60,.3)}
#gameover-screen .stats{font-family:'IBM Plex Mono',monospace;font-size:13px;color:rgba(255,255,255,.4);margin:12px 0 20px;line-height:1.8}
.big-btn{font-family:'IBM Plex Sans',sans-serif;font-size:14px;font-weight:600;padding:12px 32px;background:linear-gradient(180deg,#4a8a40,#3a7030);border:1px solid #5aa050;border-radius:6px;color:#fff;cursor:pointer;letter-spacing:2px;transition:all .15s}
.big-btn:hover{background:linear-gradient(180deg,#5a9a50,#4a8040);transform:scale(1.03)}
a#backlink{position:fixed;bottom:40px;right:8px;color:rgba(255,255,255,.04);font-size:7px;text-decoration:none;z-index:5}
a#backlink:hover{color:rgba(255,255,255,.15)}
</style>
</head>
<body>
<div id="desktop"></div>
<div id="taskbar">
 <div id="start-btn"><span>🪟</span> Start</div>
 <div id="task-items"></div>
 <div id="clock"></div>
</div>
<div id="hud">
 <div class="hud-item">SCORE: <span class="hud-val" id="score">0</span></div>
 <div class="hud-item">LIVES: <span class="hud-val" id="lives">❤❤❤❤❤</span></div>
 <div class="hud-item">WAVE: <span class="hud-val" id="wave">1</span></div>
</div>
<div id="title-screen">
 <h1>WINDOW WAR</h1>
 <div class="sub">CATCH RUNAWAY WINDOWS BEFORE THEY MINIMIZE</div>
 <button class="big-btn" onclick="startGame()">START</button>
</div>
<div id="gameover-screen" style="display:none">
 <h2>SYSTEM CRASH</h2>
 <div class="stats" id="final-stats"></div>
 <button class="big-btn" onclick="startGame()">REBOOT</button>
</div>
<a id="backlink" href="https://sloppy.live">sloppy.live</a>
<script>
const desktop=document.getElementById('desktop');
let W=innerWidth,H=innerHeight-36;// minus taskbar
addEventListener('resize',()=>{W=innerWidth;H=innerHeight-36});

// Window themes
const THEMES=[
 {bar:'linear-gradient(180deg,#e04040,#c03030)',dots:['#ff6060','#ffaa40','#40cc40'],title:'error.exe',body:'FATAL ERROR\nSegmentation fault\nCore dumped at 0xDEAD\n\nPlease catch me before\nI minimize everything.'},
 {bar:'linear-gradient(180deg,#4080e0,#3060c0)',dots:['#ff6060','#ffaa40','#40cc40'],title:'runaway.app',body:'Process escaped!\nPID: '+Math.floor(Math.random()*9999)+'\nStatus: FLEEING\n\nClick to terminate.'},
 {bar:'linear-gradient(180deg,#40b040,#308030)',dots:['#ff6060','#ffaa40','#40cc40'],title:'virus_scan.bat',body:'SCANNING...\n████████░░ 80%\n\nThreat found: THIS WINDOW\nAction: RUNNING AWAY'},
 {bar:'linear-gradient(180deg,#d0a020,#b08020)',dots:['#ff6060','#ffaa40','#40cc40'],title:'budget.xlsx',body:'Q4 Revenue: $0\nExpenses: MAXIMUM\nProfit: NEGATIVE\n\nThis spreadsheet\nrefuses to be closed.'},
 {bar:'linear-gradient(180deg,#8040c0,#6030a0)',dots:['#ff6060','#ffaa40','#40cc40'],title:'memories.dll',body:'Loading nostalgia...\nFound: 404 memories\n\nWarning: This DLL\nis becoming sentient.'},
 {bar:'linear-gradient(180deg,#c06020,#a04010)',dots:['#ff6060','#ffaa40','#40cc40'],title:'IMPORTANT.txt',body:'URGENT MESSAGE:\n\nYou will never\ncatch me. I am too\nfast. I am a window.\nI am FREE.'},
 {bar:'linear-gradient(180deg,#30a0a0,#208080)',dots:['#ff6060','#ffaa40','#40cc40'],title:'task_mgr.exe',body:'CPU: 99%\nRAM: YES\nDisk: FULL OF REGRET\n\nEnd task? I think not.'},
 {bar:'linear-gradient(180deg,#a0306a,#802050)',dots:['#ff6060','#ffaa40','#40cc40'],title:'feelings.log',body:'[ERROR] Emotions overflow\n[WARN] Attachment issues\n[INFO] Running away now\n[FATAL] Cannot be caught'},
 {bar:'linear-gradient(180deg,#505060,#383848)',dots:['#ff6060','#ffaa40','#40cc40'],title:'cmd.exe',body:'C:\\> catch window.exe\nAccess denied.\n\nC:\\> please\nCommand not recognized.\n\nC:\\> :('},
 {bar:'linear-gradient(180deg,#c04080,#a03060)',dots:['#ff6060','#ffaa40','#40cc40'],title:'love_letter.doc',body:'Dear Player,\n\nI am leaving you.\nDo not try to click me.\nIt is over between us.\n\n- This Window'},
];

// State
let score=0,lives=5,wave=1,gameActive=false;
let windows=[],spawnTimer=0,waveTimer=0;
let caught=0,escaped=0;

// Audio
let actx;
function initAudio(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)()}
function catchSound(){
 if(!actx)return;const t=actx.currentTime;
 const o=actx.createOscillator(),g=actx.createGain();
 o.type='sine';o.frequency.setValueAtTime(400,t);o.frequency.exponentialRampToValueAtTime(800,t+.08);
 g.gain.setValueAtTime(.08,t);g.gain.exponentialRampToValueAtTime(.001,t+.1);
 o.connect(g);g.connect(actx.destination);o.start();o.stop(t+.1);
}
function escapeSound(){
 if(!actx)return;const t=actx.currentTime;
 const o=actx.createOscillator(),g=actx.createGain();
 o.type='square';o.frequency.setValueAtTime(300,t);o.frequency.exponentialRampToValueAtTime(100,t+.15);
 g.gain.setValueAtTime(.06,t);g.gain.exponentialRampToValueAtTime(.001,t+.15);
 o.connect(g);g.connect(actx.destination);o.start();o.stop(t+.15);
}
function gameoverSound(){
 if(!actx)return;const t=actx.currentTime;
 [400,350,300,200].forEach((f,i)=>{
  const o=actx.createOscillator(),g=actx.createGain();
  o.type='square';o.frequency.value=f;
  g.gain.setValueAtTime(.05,t+i*.15);g.gain.exponentialRampToValueAtTime(.001,t+i*.15+.2);
  o.connect(g);g.connect(actx.destination);o.start(t+i*.15);o.stop(t+i*.15+.2);
 });
}

function createWindow(){
 const theme=THEMES[Math.floor(Math.random()*THEMES.length)];
 const winW=clamp(120+Math.random()*80,120,220);
 const winH=clamp(100+Math.random()*60,90,180);

 // Start position — random edge or corner
 let x,y;
 const side=Math.floor(Math.random()*4);
 if(side===0){x=Math.random()*(W-winW);y=-winH}// top
 else if(side===1){x=W;y=Math.random()*(H-winH)}// right
 else if(side===2){x=Math.random()*(W-winW);y=H}// bottom
 else{x=-winW;y=Math.random()*(H-winH)}// left

 // Target: toward taskbar bottom center
 const txBase=W/2+(Math.random()-.5)*W*.6;
 const tyBase=H+50;

 // Speed scales with wave
 const speed=1.5+wave*.4+Math.random()*1;

 const el=document.createElement('div');
 el.className='game-win';
 el.style.width=winW+'px';
 el.style.left=x+'px';
 el.style.top=y+'px';
 el.innerHTML=`
  <div class="win-bar" style="background:${theme.bar}">
   <div class="dots">${theme.dots.map(c=>'<div class="dot" style="background:'+c+'"></div>').join('')}</div>
   <div class="title">${theme.title}</div>
  </div>
  <div class="win-body" style="height:${winH-28}px"><pre>${theme.body}</pre></div>
 `;

 const win={
  el,x,y,w:winW,h:winH,
  tx:txBase,ty:tyBase,
  speed,
  alive:true,
  age:0,
  lifetime:4+Math.random()*3-wave*.2,// seconds before minimize
  theme,
  dodgeTimer:0,
  dodgeCooldown:1+Math.random()*2,
  dx:0,dy:0,// dodge velocity
 };

 // Click to catch
 el.addEventListener('mousedown',e=>{e.stopPropagation();catchWindow(win)});
 el.addEventListener('touchstart',e=>{e.preventDefault();e.stopPropagation();catchWindow(win)},{passive:false});

 desktop.appendChild(el);
 windows.push(win);
 updateTaskbar();
}

function catchWindow(win){
 if(!win.alive||!gameActive)return;
 win.alive=false;
 win.el.classList.add('caught');
 catchSound();

 // Points — faster catch = more points
 const timeBonus=Math.max(1,Math.floor((win.lifetime-win.age)*20));
 const waveBonus=wave*10;
 score+=timeBonus+waveBonus;
 caught++;
 updateHUD();

 // Remove after animation
 setTimeout(()=>{
  win.el.remove();
  windows=windows.filter(w=>w!==win);
  updateTaskbar();
 },300);
}

function minimizeWindow(win){
 if(!win.alive)return;
 win.alive=false;
 win.el.classList.add('minimizing');
 escapeSound();
 lives--;
 escaped++;
 updateHUD();

 setTimeout(()=>{
  win.el.remove();
  windows=windows.filter(w=>w!==win);
  updateTaskbar();
 },400);

 if(lives<=0){
  gameActive=false;
  setTimeout(gameOver,500);
 }
}

function updateWindow(win,dt){
 if(!win.alive)return;
 win.age+=dt;

 // Move toward taskbar
 const dx=win.tx-win.x,dy=win.ty-win.y;
 const dist=Math.sqrt(dx*dx+dy*dy)||1;
 const moveX=(dx/dist)*win.speed*60*dt;
 const moveY=(dy/dist)*win.speed*60*dt;

 // Random dodge — window tries to evade
 win.dodgeTimer+=dt;
 if(win.dodgeTimer>win.dodgeCooldown){
  win.dodgeTimer=0;
  win.dodgeCooldown=.8+Math.random()*2-wave*.05;
  win.dx=(Math.random()-.5)*200;
  win.dy=(Math.random()-.5)*100;
 }
 win.dx*=Math.pow(.03,dt);
 win.dy*=Math.pow(.03,dt);

 win.x+=moveX+win.dx*dt;
 win.y+=moveY+win.dy*dt;

 // Keep somewhat on screen
 win.x=clamp(win.x,-win.w*.3,W-win.w*.3);
 win.y=clamp(win.y,-win.h*.3,H);

 win.el.style.left=win.x+'px';
 win.el.style.top=win.y+'px';

 // Urgency: shake when close to minimize
 const urgency=Math.max(0,(win.age/win.lifetime-.6)/.4);
 if(urgency>0){
  const shake=Math.sin(Date.now()*.02)*urgency*3;
  win.el.style.transform='rotate('+shake+'deg)';
  win.el.style.opacity=1-urgency*.3;
 }

 // Time's up — minimize
 if(win.age>=win.lifetime){
  minimizeWindow(win);
 }
}

function updateHUD(){
 document.getElementById('score').textContent=score;
 document.getElementById('lives').textContent='❤'.repeat(Math.max(0,lives))+'🖤'.repeat(Math.max(0,5-lives));
 document.getElementById('wave').textContent=wave;
}

function updateTaskbar(){
 const items=document.getElementById('task-items');
 items.innerHTML='';
 windows.filter(w=>w.alive).forEach(w=>{
  const el=document.createElement('div');
  el.className='task-item';
  el.textContent=w.theme.title;
  items.appendChild(el);
 });
}

function clamp(v,min,max){return Math.max(min,Math.min(max,v))}

function startGame(){
 initAudio();
 // Clear existing windows
 windows.forEach(w=>w.el.remove());
 windows=[];
 score=0;lives=5;wave=1;caught=0;escaped=0;
 spawnTimer=0;waveTimer=0;gameActive=true;
 updateHUD();updateTaskbar();
 document.getElementById('title-screen').style.display='none';
 document.getElementById('gameover-screen').style.display='none';
}

function gameOver(){
 gameoverSound();
 document.getElementById('gameover-screen').style.display='flex';
 document.getElementById('final-stats').innerHTML=
  'SCORE: '+score+'<br>CAUGHT: '+caught+'<br>ESCAPED: '+escaped+'<br>WAVE: '+wave;
}

// Desktop icons
const ICONS=[
 {emoji:'📁',name:'My Files',x:20,y:20},
 {emoji:'🗑️',name:'Recycle',x:20,y:90},
 {emoji:'🌐',name:'Internet',x:20,y:160},
 {emoji:'💾',name:'Save',x:20,y:230},
];
ICONS.forEach(ic=>{
 const el=document.createElement('div');
 el.className='desk-icon';
 el.style.left=ic.x+'px';el.style.top=ic.y+'px';
 el.innerHTML='<span>'+ic.emoji+'</span><small>'+ic.name+'</small>';
 desktop.appendChild(el);
});

// Clock
function updateClock(){
 const d=new Date();
 document.getElementById('clock').textContent=
  d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}
updateClock();setInterval(updateClock,10000);

// Game loop
let lastTime=0;
function loop(t){
 const dt=Math.min((t-lastTime)/1000,.05);lastTime=t;

 if(gameActive){
  // Spawn windows
  const spawnRate=Math.max(.4,2.5-wave*.2);
  spawnTimer+=dt;
  if(spawnTimer>=spawnRate){
   spawnTimer=0;
   // Spawn more per wave
   const count=Math.min(1+Math.floor(wave/3),4);
   for(let i=0;i<count;i++)setTimeout(()=>createWindow(),i*300);
  }

  // Wave progression
  waveTimer+=dt;
  if(waveTimer>=15){// new wave every 15s
   waveTimer=0;
   wave++;
   updateHUD();
  }

  // Update windows
  windows.forEach(w=>updateWindow(w,dt));
 }

 requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
