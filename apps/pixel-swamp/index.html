<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pixel Swamp · feed the snappy alligator</title>
<meta name="description" content="A pixel art swamp at dusk. A half-submerged alligator snaps at the flies you flick its way.">
<meta property="og:title" content="Pixel Swamp">
<meta property="og:description" content="A pixel art swamp at dusk. A half-submerged alligator snaps at flies. Cypress trees. Fireflies. Mostly fine.">
<meta property="og:image" content="https://image.pollinations.ai/prompt/Pixel%20art%20swamp%20at%20dusk%2C%20half-submerged%20alligator%20with%20glowing%20yellow%20eyes%2C%20cypress%20trees%2C%20fireflies%2C%20lily%20pads%2C%20deep%20greens%20and%20violets%2C%20low-fi%2032-bit%20palette?width=1200&height=630&model=flux&nologo=true&seed=2424">
<meta property="og:url" content="https://sloppy.live/pixel-swamp">
<meta property="og:type" content="website">
<link rel="icon" href="https://emojicdn.elk.sh/🐊">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Press+Start+2P&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-deep: #0a0814;
    --frame:   #1a1422;
    --text:    #d4e0c0;
    --text-dim:#7a8a6a;
    --moss:    #6a8a3a;
    --amber:   #f5c026;
    --tooth:   #f0e4c2;
    --blood:   #c93020;
  }
  *{ box-sizing: border-box; margin: 0; padding: 0; }
  html, body{ background: var(--bg-deep); color: var(--text); overflow: hidden; height: 100vh; }
  body{
    font-family: 'VT323', 'Silkscreen', monospace;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background:
      radial-gradient(ellipse 70% 60% at 50% 40%, rgba(60,30,80,0.35), transparent 70%),
      radial-gradient(ellipse 50% 40% at 50% 90%, rgba(20,60,50,0.30), transparent 70%),
      var(--bg-deep);
    position: relative;
    padding: 8px;
  }
  /* Title bar (top) */
  .title-bar{
    width: 100%;
    max-width: 960px;
    margin-bottom: 8px;
    display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap;
    padding: 0 4px;
  }
  .title-bar h1{
    font-family: 'Press Start 2P', monospace;
    font-size: 16px;
    color: var(--moss);
    letter-spacing: 0.04em;
    line-height: 1.2;
    text-shadow:
      0 0 6px rgba(106,138,58,0.4),
      2px 2px 0 rgba(0,0,0,0.6);
  }
  .title-bar h1 em{
    color: var(--amber);
    font-style: normal;
    margin-left: 4px;
  }
  .title-bar .sub{
    font-size: 18px;
    color: var(--text-dim);
    font-family: 'VT323', monospace;
    letter-spacing: 0.04em;
  }
  .title-bar .stats{
    margin-left: auto;
    display: flex; gap: 12px;
    font: 18px 'VT323', monospace;
    color: var(--text);
  }
  .title-bar .stats .val{ color: var(--amber); }
  .title-bar .stats .val.combo{ color: var(--blood); }
  /* Canvas frame */
  .stage{
    position: relative;
    width: min(960px, calc(100vw - 16px));
    aspect-ratio: 16 / 9;
    border: 4px solid var(--frame);
    border-radius: 4px;
    background: #000;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.04),
      0 12px 28px rgba(0,0,0,0.8),
      inset 0 0 0 1px rgba(0,0,0,0.6);
    overflow: hidden;
  }
  canvas{
    display: block;
    width: 100%; height: 100%;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    -ms-interpolation-mode: nearest-neighbor;
    cursor: crosshair;
  }
  /* HUD overlays on the canvas */
  .hud-msg{
    position: absolute;
    pointer-events: none;
    font: 16px 'VT323', monospace;
    color: var(--amber);
    text-shadow: 1px 1px 0 #000, -1px 1px 0 #000, 1px -1px 0 #000, -1px -1px 0 #000;
    transform: translate(-50%, -50%);
    animation: hudFloat 1.1s ease-out forwards;
    z-index: 4;
  }
  .hud-msg.crit{ color: var(--blood); font-weight: 700; font-size: 20px; }
  @keyframes hudFloat{
    0%   { opacity: 0; transform: translate(-50%, -30%) scale(0.6); }
    20%  { opacity: 1; transform: translate(-50%, -60%) scale(1.1); }
    100% { opacity: 0; transform: translate(-50%, -180%) scale(1); }
  }
  /* Footer hint */
  .hint{
    width: min(960px, calc(100vw - 16px));
    margin-top: 8px;
    padding: 6px 12px;
    text-align: center;
    font: 18px 'VT323', monospace;
    color: var(--text-dim);
    background: rgba(20,16,40,0.4);
    border: 1px solid rgba(106,138,58,0.18);
    border-radius: 3px;
  }
  .hint b{ color: var(--amber); }
  .hint kbd{
    background: rgba(245,192,38,0.12);
    border: 1px solid rgba(245,192,38,0.4);
    padding: 0 6px;
    border-radius: 2px;
    color: var(--amber);
    font: 14px 'Silkscreen', monospace;
  }
  .toggle-btn{
    background: rgba(20,16,40,0.4);
    border: 1px solid rgba(106,138,58,0.35);
    color: var(--text);
    padding: 4px 10px;
    font: 16px 'VT323', monospace;
    letter-spacing: 0.04em;
    border-radius: 3px;
    cursor: pointer;
    transition: background 80ms;
  }
  .toggle-btn:hover{ background: rgba(106,138,58,0.18); }
  .toggle-btn.on{ background: rgba(245,192,38,0.18); border-color: var(--amber); color: var(--amber); }
  /* Reduced motion */
  @media (prefers-reduced-motion: reduce){
    .hud-msg{ animation-duration: 0.4s; }
  }
  /* Focus */
  button:focus-visible{ outline: 2px solid var(--amber); outline-offset: 2px; }
</style>
</head>
<body>

<div class="title-bar">
  <h1>PIXEL <em>SWAMP</em></h1>
  <div class="sub">a swamp · a snappy gator · some unlucky flies</div>
  <div class="stats">
    fed: <span class="val" id="stat-fed">0</span>
    · combo: <span class="val combo" id="stat-combo">×1</span>
    · best: <span class="val" id="stat-best">0</span>
  </div>
</div>

<div class="stage" id="stage">
  <canvas id="cv" width="320" height="180"></canvas>
</div>

<div class="hint">
  <b>click</b> the water or press <kbd>space</kbd> to snap · flies near the snout get eaten ·
  <button type="button" class="toggle-btn" id="btn-night">🌙 night</button>
</div>

<script>
'use strict';

/* ── Canvas + scaling ────────────────────────────────────────── */
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
ctx.imageSmoothingEnabled = false;
const W = cv.width, H = cv.height;

/* ── Palette (32-bit-ish, hand-picked) ──────────────────────── */
const C = {
  // Sky (day vs night)
  skyDay1:  '#3a4a6a', skyDay2:  '#5a6a8a', skyDay3:  '#8a7a8a',
  skyNight1:'#0a0820', skyNight2:'#1a1240', skyNight3:'#2a1850',
  starColor:'#f0e8c0',
  // Mist
  mistDay:  'rgba(180,200,160,0.18)',
  mistNight:'rgba(60,80,100,0.28)',
  // Trees (silhouette)
  treeDark: '#0a0a14',
  treeMid:  '#1a1820',
  // Tree highlights at night
  treeAccent:'#2a1a40',
  // Water (3 layers)
  waterDeep:'#0a1a1a',
  water:    '#152838',
  waterMid: '#1c3438',
  waterHi:  '#2a4848',
  waterRefl:'#3a5a5a',
  // Lily pads
  lily:     '#3a6028',
  lilyDark: '#1a3818',
  lilyHi:   '#5a8a3a',
  flower:   '#e8a8d0',
  flowerCore:'#fff080',
  // Reeds/cattails
  reed:     '#1a3018',
  cattail:  '#5a3818',
  // Gator
  gatorBack:'#1a2818',
  gatorMid: '#283a20',
  gatorHi:  '#3a5a28',
  gatorBelly:'#5a4a28',
  gatorTeeth:'#f0e4c2',
  gatorMouth:'#8a1818',
  gatorEye:  '#f5c026',
  gatorPupil:'#0a0a0a',
  // Insects
  dragonfly:'#7aeaf0',
  dragonWing:'#a0fff0',
  mosquito: '#806040',
  firefly:  '#fff080',
  fireflyGlow:'#ffd040',
  // Frog
  frogBack: '#3a6018',
  frogBelly:'#a0c068',
  frogEye:  '#f5c026',
};

let isNight = false;

/* ── Pixel helpers ──────────────────────────────────────────── */
function px(x, y, color){ ctx.fillStyle = color; ctx.fillRect(x|0, y|0, 1, 1); }
function rect(x, y, w, h, color){ ctx.fillStyle = color; ctx.fillRect(x|0, y|0, w|0, h|0); }

/* ── Background (offscreen, redrawn on day/night flip) ─────── */
const bgCanvas = document.createElement('canvas');
bgCanvas.width = W; bgCanvas.height = H;
const bgCtx = bgCanvas.getContext('2d');
bgCtx.imageSmoothingEnabled = false;

function paintBG(){
  bgCtx.fillStyle = '#000';
  bgCtx.fillRect(0, 0, W, H);
  // Sky gradient (using horizontal stripes for pixel feel)
  const skyTop  = isNight ? C.skyNight1 : C.skyDay1;
  const skyMid  = isNight ? C.skyNight2 : C.skyDay2;
  const skyBot  = isNight ? C.skyNight3 : C.skyDay3;
  for (let y = 0; y < 80; y++){
    const t = y / 80;
    let col;
    if (t < 0.5)      col = mix(skyTop, skyMid, t * 2);
    else              col = mix(skyMid, skyBot, (t - 0.5) * 2);
    bgCtx.fillStyle = col;
    bgCtx.fillRect(0, y, W, 1);
  }
  // Moon or sun
  if (isNight){
    // moon
    bgCtx.fillStyle = '#f0e8c0';
    bgFillCircle(258, 28, 9);
    bgCtx.fillStyle = '#1a1240';
    bgFillCircle(262, 24, 8); // crescent cutout
    // stars
    const starCount = 50;
    for (let i = 0; i < starCount; i++){
      const sx = (i * 47) % W;
      const sy = (i * 31) % 70 + 4;
      bgCtx.fillStyle = i % 5 === 0 ? '#fff' : C.starColor;
      bgCtx.fillRect(sx, sy, 1, 1);
    }
  } else {
    // sun (subtle, behind mist)
    bgCtx.fillStyle = '#f5d878';
    bgFillCircle(252, 32, 10);
    bgCtx.fillStyle = 'rgba(245,216,120,0.4)';
    bgFillCircle(252, 32, 14);
  }

  // Distant misty band
  bgCtx.fillStyle = isNight ? C.mistNight : C.mistDay;
  bgCtx.fillRect(0, 70, W, 22);
  // sparser mist line
  bgCtx.fillStyle = isNight ? 'rgba(60,80,100,0.18)' : 'rgba(200,210,180,0.12)';
  bgCtx.fillRect(0, 85, W, 14);

  // Cypress trees in background (silhouettes)
  drawCypress(bgCtx, 16, 50, 50, true);
  drawCypress(bgCtx, 60, 38, 64, false);
  drawCypress(bgCtx, 116, 44, 58, true);
  drawCypress(bgCtx, 160, 30, 72, false);
  drawCypress(bgCtx, 216, 42, 60, true);
  drawCypress(bgCtx, 264, 50, 50, false);
  drawCypress(bgCtx, 296, 46, 56, true);

  // hanging moss (vine) from a few branches
  for (let i = 0; i < 6; i++){
    const vx = 20 + i * 50 + ((i * 13) % 10);
    const vy = 36 + (i % 3) * 6;
    const vh = 8 + (i % 4) * 3;
    bgCtx.fillStyle = isNight ? '#1a3a18' : '#3a5028';
    for (let k = 0; k < vh; k++){
      bgCtx.fillRect(vx + (k % 2), vy + k, 1, 1);
    }
  }

  // Water — top reflection band
  for (let y = 100; y < H; y++){
    const t = (y - 100) / (H - 100);
    let col = mix(C.water, C.waterDeep, t);
    bgCtx.fillStyle = col;
    bgCtx.fillRect(0, y, W, 1);
  }
  // Bank silhouette (left + right edges)
  bgCtx.fillStyle = '#0a0a08';
  bgCtx.fillRect(0, 96, 22, 6);
  bgCtx.fillRect(W - 30, 100, 30, 6);
  // Cypress knees (little knobs in the water)
  bgCtx.fillStyle = '#1a1208';
  bgCtx.fillRect(8, 104, 4, 6);
  bgCtx.fillRect(14, 106, 3, 4);
  bgCtx.fillRect(W - 18, 105, 4, 5);
  // Cattails
  for (let i = 0; i < 3; i++){
    const cx = 4 + i * 5;
    drawCattail(bgCtx, cx, 102, 8 + i);
  }
  for (let i = 0; i < 4; i++){
    const cx = W - 20 + i * 4;
    drawCattail(bgCtx, cx, 102, 7 + (i % 3));
  }

  // Lily pads (3-4, scattered, in water)
  drawLily(bgCtx, 36,  130, 0);
  drawLily(bgCtx, 90,  148, 1);
  drawLily(bgCtx, 230, 138, 2);
  drawLily(bgCtx, 280, 156, 0);

  // water highlights (horizontal dashes near pads/banks)
  bgCtx.fillStyle = isNight ? 'rgba(120,200,200,0.18)' : 'rgba(180,220,200,0.18)';
  for (let i = 0; i < 18; i++){
    const wx = (i * 21 + 12) % W;
    const wy = 110 + (i % 5) * 12;
    bgCtx.fillRect(wx, wy, 4, 1);
  }
  bgCtx.fillStyle = isNight ? 'rgba(160,220,220,0.12)' : 'rgba(220,240,220,0.12)';
  for (let i = 0; i < 12; i++){
    const wx = (i * 27 + 5) % W;
    const wy = 132 + (i % 4) * 10;
    bgCtx.fillRect(wx, wy, 3, 1);
  }
}
function bgFillCircle(cx, cy, r){
  for (let y = -r; y <= r; y++){
    for (let x = -r; x <= r; x++){
      if (x*x + y*y <= r*r) bgCtx.fillRect(cx + x, cy + y, 1, 1);
    }
  }
}
function mix(a, b, t){
  const ah = parseHex(a), bh = parseHex(b);
  const r = Math.round(ah[0] + (bh[0] - ah[0]) * t);
  const g = Math.round(ah[1] + (bh[1] - ah[1]) * t);
  const bl = Math.round(ah[2] + (bh[2] - ah[2]) * t);
  return 'rgb(' + r + ',' + g + ',' + bl + ')';
}
function parseHex(h){
  if (h.startsWith('rgb')) return [0, 0, 0]; // not used for rgb input here
  return [parseInt(h.slice(1,3),16), parseInt(h.slice(3,5),16), parseInt(h.slice(5,7),16)];
}

function drawCypress(g, x, top, height, mirror){
  // Trunk
  const trunkW = 4 + (height / 20)|0;
  const trunkX = x - (trunkW / 2)|0;
  g.fillStyle = C.treeDark;
  g.fillRect(trunkX, top, trunkW, 110 - top);
  // Foliage clusters (irregular blobs)
  const colorMid = isNight ? C.treeAccent : '#2a3a1a';
  const colorTop = C.treeMid;
  // top cluster
  for (let i = 0; i < 4; i++){
    const cx = x + (mirror ? -1 : 1) * ((i * 3) - 4);
    const cy = top + i * 4;
    const r = 8 - i;
    g.fillStyle = i % 2 === 0 ? colorTop : colorMid;
    fillBlob(g, cx, cy, r);
  }
  // mid + low cluster
  for (let i = 0; i < 5; i++){
    const cx = x + (mirror ? 1 : -1) * ((i * 4) - 8);
    const cy = top + 18 + i * 6;
    g.fillStyle = i % 2 === 0 ? colorMid : colorTop;
    fillBlob(g, cx, cy, 6 - i);
  }
}
function fillBlob(g, cx, cy, r){
  if (r < 1) return;
  for (let y = -r; y <= r; y++){
    for (let x = -r; x <= r; x++){
      const d = x*x + y*y;
      if (d <= r*r) g.fillRect(cx + x, cy + y, 1, 1);
    }
  }
}

function drawCattail(g, x, y, height){
  // stalk
  g.fillStyle = C.reed;
  g.fillRect(x, y - height, 1, height);
  // head (brown puff)
  g.fillStyle = C.cattail;
  g.fillRect(x, y - height - 3, 1, 3);
  g.fillRect(x - 1, y - height - 2, 3, 1);
}

function drawLily(g, x, y, variant){
  // shadow under
  g.fillStyle = 'rgba(0,0,0,0.45)';
  g.fillRect(x - 8, y + 2, 18, 1);
  // pad body — flat oval
  g.fillStyle = C.lily;
  g.fillRect(x - 8, y, 18, 3);
  g.fillRect(x - 6, y - 1, 14, 1);
  g.fillRect(x - 6, y + 3, 14, 1);
  // dark wedge (notch)
  g.fillStyle = C.lilyDark;
  g.fillRect(x + 2, y, 4, 2);
  // highlight
  g.fillStyle = C.lilyHi;
  g.fillRect(x - 6, y, 3, 1);
  g.fillRect(x - 5, y + 1, 5, 1);
  // flower on some lilies
  if (variant === 0 || variant === 2){
    g.fillStyle = C.flower;
    g.fillRect(x - 2, y - 3, 4, 2);
    g.fillRect(x - 1, y - 4, 2, 1);
    g.fillStyle = C.flowerCore;
    g.fillRect(x, y - 3, 1, 1);
  }
}

paintBG();

/* ── Alligator state ─────────────────────────────────────────── */
const gator = {
  baseX: 110, baseY: 108,
  facing: 1,        // 1 = facing right (snout on right side), -1 = facing left
  jaw: 0,           // 0 = closed, 1 = fully open
  jawTarget: 0,
  snapping: false,
  snapEndAt: 0,
  bob: 0,
  eyeTargetX: 160, eyeTargetY: 80,
};
let lastSnap = 0;

function drawGator(){
  const t = performance.now() * 0.001;
  // gentle bob
  gator.bob = Math.sin(t * 1.4) * 0.5;
  const gx = gator.baseX|0;
  const gy = (gator.baseY + gator.bob)|0;
  const f = gator.facing;

  // jaw lerp
  gator.jaw += (gator.jawTarget - gator.jaw) * 0.35;
  if (gator.snapping && performance.now() > gator.snapEndAt){
    gator.snapping = false;
    gator.jawTarget = 0;
  }

  // Back ridge — long horizontal bumpy strip going RIGHT from gx (tail to the right)
  // Body is mostly submerged, just the spine + eyes + snout above
  // tail bumps (zigzag triangles on the right)
  for (let i = 0; i < 6; i++){
    const tx = gx + f * (24 + i * 6);
    const ty = gy + 1 - (i % 2 === 0 ? 1 : 0);
    ctx.fillStyle = C.gatorBack;
    ctx.fillRect(tx, ty, 4, 2);
    // dorsal triangle bump
    ctx.fillStyle = C.gatorHi;
    ctx.fillRect(tx + 1, ty - 1, 2, 1);
  }
  // mid-back spine ridge (continuous bump strip)
  for (let i = 0; i < 4; i++){
    const sx = gx + f * (10 + i * 4);
    const sy = gy;
    ctx.fillStyle = C.gatorBack;
    ctx.fillRect(sx, sy, 3, 2);
    ctx.fillStyle = C.gatorMid;
    ctx.fillRect(sx, sy - 1, 3, 1);
    ctx.fillStyle = C.gatorHi;
    ctx.fillRect(sx + 1, sy - 1, 1, 1);
  }

  // Head — extends to the LEFT of gx (snout end at gx - 22)
  // The snout is a horizontal bar with two halves (top + bottom jaw)
  const jawOpen = gator.jaw;
  const snoutLen = 22;
  const snoutEndX = gx + f * -snoutLen;
  const snoutY   = gy;
  // top jaw — slight upward rotation when open
  const topYOff = -Math.round(jawOpen * 4);
  // bottom jaw — downward rotation when open
  const botYOff =  Math.round(jawOpen * 3);

  // pink mouth interior (drawn between jaws when open)
  if (jawOpen > 0.1){
    ctx.fillStyle = C.gatorMouth;
    for (let i = 0; i < snoutLen - 4; i++){
      const x = gx + f * -(4 + i);
      const yTop = snoutY - 1 + Math.round((i / snoutLen) * topYOff);
      const yBot = snoutY + 1 + Math.round((i / snoutLen) * botYOff);
      ctx.fillRect(x, yTop + 1, 1, Math.max(0, yBot - yTop - 1));
    }
  }

  // top jaw
  for (let i = 0; i < snoutLen; i++){
    const x = gx + f * -i;
    const tilt = Math.round((i / snoutLen) * topYOff);
    const ty = snoutY - 2 + tilt;
    // outline (dark)
    ctx.fillStyle = C.gatorBack;
    ctx.fillRect(x, ty, 1, 1);
    // mid-tone
    ctx.fillStyle = C.gatorMid;
    ctx.fillRect(x, ty + 1, 1, 1);
    // highlight ridge along upper edge
    if (i > 1 && i < snoutLen - 2 && i % 3 === 0){
      ctx.fillStyle = C.gatorHi;
      ctx.fillRect(x, ty, 1, 1);
    }
  }
  // nostril (two dots near snout tip)
  ctx.fillStyle = C.gatorBack;
  const nostX1 = gx + f * -(snoutLen - 3);
  ctx.fillRect(nostX1, snoutY - 1 + Math.round(topYOff * 0.85), 1, 1);
  ctx.fillRect(nostX1 + f * 1, snoutY - 1 + Math.round(topYOff * 0.85), 1, 1);
  // teeth (top row) — small triangles dropping from the underside of the top jaw
  for (let i = 3; i < snoutLen - 3; i += 3){
    const x = gx + f * -i;
    const tilt = Math.round((i / snoutLen) * topYOff);
    ctx.fillStyle = C.gatorTeeth;
    ctx.fillRect(x, snoutY + tilt, 1, 1);
  }

  // bottom jaw — only visible when open (otherwise hidden by water/top jaw)
  if (jawOpen > 0.05){
    for (let i = 0; i < snoutLen - 2; i++){
      const x = gx + f * -i;
      const tilt = Math.round((i / snoutLen) * botYOff);
      ctx.fillStyle = C.gatorMid;
      ctx.fillRect(x, snoutY + 2 + tilt, 1, 1);
      ctx.fillStyle = C.gatorBack;
      ctx.fillRect(x, snoutY + 3 + tilt, 1, 1);
    }
    // bottom teeth (sticking up)
    for (let i = 3; i < snoutLen - 3; i += 3){
      const x = gx + f * -i;
      const tilt = Math.round((i / snoutLen) * botYOff);
      ctx.fillStyle = C.gatorTeeth;
      ctx.fillRect(x, snoutY + 1 + tilt, 1, 1);
    }
  }

  // Eyes — two raised bumps just above the snout base, near gx
  for (let e = 0; e < 2; e++){
    const ex = gx + f * (-2 - e * 4);
    const ey = snoutY - 4;
    // eye bump dark base
    ctx.fillStyle = C.gatorBack;
    ctx.fillRect(ex - 1, ey + 2, 3, 1);
    ctx.fillStyle = C.gatorMid;
    ctx.fillRect(ex, ey + 1, 2, 1);
    // sclera (yellow)
    ctx.fillStyle = C.gatorEye;
    ctx.fillRect(ex, ey, 2, 1);
    // pupil — slit aimed at cursor
    const dx = gator.eyeTargetX - ex, dy = gator.eyeTargetY - ey;
    const len = Math.hypot(dx, dy) || 1;
    const px2 = ex + Math.round(dx / len * 0.5);
    const py2 = ey + Math.round(dy / len * 0.5);
    ctx.fillStyle = C.gatorPupil;
    ctx.fillRect(px2 + Math.max(0, Math.min(1, Math.round(dx / len))), py2, 1, 1);
  }
}

/* ── Insects ──────────────────────────────────────────────── */
const insects = [];
function spawnInsect(){
  // 70% dragonfly, 30% mosquito
  const dragonfly = Math.random() < 0.7;
  const fromLeft = Math.random() < 0.5;
  const x = fromLeft ? -8 : W + 8;
  const y = 30 + Math.random() * 65;
  const baseVx = (fromLeft ? 1 : -1) * (0.35 + Math.random() * 0.45);
  insects.push({
    kind: dragonfly ? 'dragonfly' : 'mosquito',
    x, y,
    vx: baseVx,
    vy: 0,
    wingPhase: Math.random() * Math.PI * 2,
    targetY: y,
    nextTurnAt: performance.now() + 600 + Math.random() * 1200,
    alive: true,
  });
}
function updateInsects(dt){
  const now = performance.now();
  for (const f of insects){
    if (!f.alive) continue;
    // gentle vertical wobble + occasional dip toward water
    f.wingPhase += dt * (f.kind === 'dragonfly' ? 28 : 38);
    f.x += f.vx * dt * 60;
    f.y += (f.targetY - f.y) * 0.06 + Math.sin(f.wingPhase * 0.5) * 0.2;
    if (now > f.nextTurnAt){
      // change target Y (sometimes dip toward gator)
      const dipTowardGator = Math.random() < 0.45;
      f.targetY = dipTowardGator
        ? 90 + Math.random() * 12
        : 30 + Math.random() * 60;
      f.nextTurnAt = now + 700 + Math.random() * 1400;
    }
    // remove if off-screen
    if (f.x < -12 || f.x > W + 12) f.alive = false;
  }
  // prune
  for (let i = insects.length - 1; i >= 0; i--){
    if (!insects[i].alive) insects.splice(i, 1);
  }
}
function drawInsect(f){
  const x = f.x|0, y = f.y|0;
  if (f.kind === 'dragonfly'){
    // body (cyan)
    ctx.fillStyle = C.dragonfly;
    ctx.fillRect(x, y, 3, 1);
    ctx.fillRect(x + 1, y - 1, 1, 1);
    ctx.fillStyle = '#0a2030';
    ctx.fillRect(x + 3, y, 1, 1);
    // wings flap
    const flap = Math.sin(f.wingPhase) > 0;
    ctx.fillStyle = C.dragonWing;
    if (flap){
      ctx.fillRect(x, y - 1, 1, 1);
      ctx.fillRect(x + 2, y - 1, 1, 1);
    } else {
      ctx.fillRect(x, y - 2, 1, 1);
      ctx.fillRect(x + 2, y - 2, 1, 1);
    }
  } else {
    // mosquito — tiny brown speck
    ctx.fillStyle = C.mosquito;
    ctx.fillRect(x, y, 2, 1);
    // wing pulse
    if (Math.sin(f.wingPhase) > 0){
      ctx.fillStyle = 'rgba(200,200,200,0.6)';
      ctx.fillRect(x - 1, y - 1, 1, 1);
      ctx.fillRect(x + 2, y - 1, 1, 1);
    }
  }
}

/* ── Fireflies (decorative) ──────────────────────────────────── */
const fireflies = [];
for (let i = 0; i < 18; i++){
  fireflies.push({
    x: Math.random() * W,
    y: 30 + Math.random() * 60,
    vx: (Math.random() - 0.5) * 0.3,
    vy: (Math.random() - 0.5) * 0.2,
    phase: Math.random() * Math.PI * 2,
    speed: 1.5 + Math.random() * 1.5,
  });
}
function updateFireflies(dt){
  for (const f of fireflies){
    f.x += f.vx * dt * 60;
    f.y += f.vy * dt * 60;
    f.phase += dt * f.speed;
    if (Math.random() < 0.005){
      f.vx = (Math.random() - 0.5) * 0.3;
      f.vy = (Math.random() - 0.5) * 0.2;
    }
    if (f.x < 0) f.x = W; if (f.x > W) f.x = 0;
    if (f.y < 30) f.y = 30; if (f.y > 95) f.y = 95;
  }
}
function drawFireflies(){
  // day: very faint. night: glowing
  const baseAlpha = isNight ? 1.0 : 0.25;
  for (const f of fireflies){
    const a = (Math.sin(f.phase) * 0.5 + 0.5) * baseAlpha;
    if (a < 0.1) continue;
    ctx.fillStyle = 'rgba(255,240,128,' + (a * 0.4).toFixed(2) + ')';
    ctx.fillRect((f.x|0) - 1, (f.y|0) - 1, 3, 3);
    ctx.fillStyle = 'rgba(255,224,80,' + a.toFixed(2) + ')';
    ctx.fillRect(f.x|0, f.y|0, 1, 1);
  }
}

/* ── Ripples ────────────────────────────────────────────────── */
const ripples = [];
function ripple(x, y){
  ripples.push({ x, y, r: 1, alpha: 1, t: 0 });
}
function updateRipples(dt){
  for (let i = ripples.length - 1; i >= 0; i--){
    const r = ripples[i];
    r.t += dt;
    r.r += dt * 22;
    r.alpha = Math.max(0, 1 - r.t / 1.2);
    if (r.alpha <= 0) ripples.splice(i, 1);
  }
}
function drawRipples(){
  for (const r of ripples){
    ctx.strokeStyle = 'rgba(180,220,200,' + r.alpha.toFixed(2) + ')';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.ellipse(r.x, r.y, r.r, r.r * 0.4, 0, 0, Math.PI * 2);
    ctx.stroke();
  }
}

/* ── Bubble particles when fly is eaten ─────────────────── */
const particles = [];
function burst(x, y, color, count){
  for (let i = 0; i < count; i++){
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 60,
      vy: -30 - Math.random() * 40,
      life: 0.6,
      color,
    });
  }
}
function updateParticles(dt){
  for (let i = particles.length - 1; i >= 0; i--){
    const p = particles[i];
    p.life -= dt;
    if (p.life <= 0){ particles.splice(i, 1); continue; }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 120 * dt;
  }
}
function drawParticles(){
  for (const p of particles){
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x|0, p.y|0, 1, 1);
  }
}

/* ── Snap mechanic ──────────────────────────────────────── */
let score = 0;
let combo = 1;
let comboResetAt = 0;
let best = +localStorage.getItem('pixel-swamp-best') || 0;
document.getElementById('stat-best').textContent = best;

function snap(){
  const now = performance.now();
  if (now - lastSnap < 320) return; // can't spam
  lastSnap = now;
  gator.snapping = true;
  gator.jawTarget = 1;
  gator.snapEndAt = now + 220;
  // check insects in snap zone
  // snap zone = a small rectangle in front of snout
  const snoutTip = { x: gator.baseX + gator.facing * -22, y: gator.baseY };
  const zoneR = 8;
  let caughtSomething = false;
  for (const f of insects){
    if (!f.alive) continue;
    const d = Math.hypot(f.x - snoutTip.x, f.y - snoutTip.y);
    if (d < zoneR + 4){
      f.alive = false;
      caughtSomething = true;
      score++;
      // combo: if caught within 1.4s of last catch, combo grows
      if (now < comboResetAt) combo = Math.min(8, combo + 1);
      else combo = 1;
      comboResetAt = now + 1400;
      // particles
      const pcol = f.kind === 'dragonfly' ? C.dragonWing : '#c0a070';
      burst(f.x, f.y, pcol, 6);
      burst(snoutTip.x, snoutTip.y, C.gatorMouth, 4);
      ripple(snoutTip.x, snoutTip.y + 4);
      showFloatText(f.x, f.y, '+' + combo, combo >= 3);
      if (score > best){
        best = score;
        localStorage.setItem('pixel-swamp-best', best);
      }
      updateHud();
    }
  }
  // also: empty snap = small ripple, combo drops
  if (!caughtSomething){
    ripple(snoutTip.x, snoutTip.y + 4);
    if (combo > 1) combo = Math.max(1, combo - 1);
    updateHud();
  }
}
function updateHud(){
  document.getElementById('stat-fed').textContent = score;
  document.getElementById('stat-combo').textContent = '×' + combo;
  document.getElementById('stat-best').textContent = best;
}
function showFloatText(x, y, txt, crit){
  // place a DOM element above the canvas at the scaled position
  const stage = document.getElementById('stage');
  const rect = stage.getBoundingClientRect();
  const cssX = (x / W) * rect.width;
  const cssY = (y / H) * rect.height;
  const el = document.createElement('div');
  el.className = 'hud-msg' + (crit ? ' crit' : '');
  el.textContent = txt;
  el.style.left = cssX + 'px';
  el.style.top  = cssY + 'px';
  stage.appendChild(el);
  setTimeout(() => el.remove(), 1200);
}

/* ── Click / key handlers ───────────────────────────────────── */
const stage = document.getElementById('stage');
stage.addEventListener('pointermove', e => {
  const rect = stage.getBoundingClientRect();
  const x = ((e.clientX - rect.left) / rect.width) * W;
  const y = ((e.clientY - rect.top)  / rect.height) * H;
  gator.eyeTargetX = x;
  gator.eyeTargetY = y;
  // face the cursor
  gator.facing = x < gator.baseX ? -1 : 1;
});
stage.addEventListener('pointerdown', e => {
  const rect = stage.getBoundingClientRect();
  const x = ((e.clientX - rect.left) / rect.width) * W;
  const y = ((e.clientY - rect.top)  / rect.height) * H;
  // click in water → ripple + snap
  if (y > 95){ ripple(x, y); }
  snap();
});
document.addEventListener('keydown', e => {
  if (e.code === 'Space'){
    e.preventDefault();
    snap();
  } else if (e.key.toLowerCase() === 'n'){
    toggleNight();
  }
});

/* ── Day/night toggle ───────────────────────────────────────── */
function toggleNight(){
  isNight = !isNight;
  document.getElementById('btn-night').classList.toggle('on', isNight);
  document.getElementById('btn-night').textContent = isNight ? '☀️ day' : '🌙 night';
  paintBG();
}
document.getElementById('btn-night').addEventListener('click', toggleNight);

/* ── Auto-spawn insects ─────────────────────────────────────── */
let nextInsectAt = performance.now() + 800;
function maybeSpawn(now){
  if (now > nextInsectAt && insects.length < 5){
    spawnInsect();
    nextInsectAt = now + 900 + Math.random() * 1400;
  }
}

/* ── Combo decay ────────────────────────────────────────────── */
function checkCombo(now){
  if (combo > 1 && now > comboResetAt){
    combo = 1;
    updateHud();
  }
}

/* ── Main loop ──────────────────────────────────────────────── */
let lastT = performance.now();
function frame(now){
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;

  // blit background
  ctx.drawImage(bgCanvas, 0, 0);

  // ripples (below the gator)
  drawRipples();

  // gator
  drawGator();

  // insects (in front of trees, in front of gator visually)
  for (const f of insects) drawInsect(f);

  // fireflies (top layer for night glow)
  drawFireflies();

  // particles on top
  drawParticles();

  // update sim
  updateInsects(dt);
  updateFireflies(dt);
  updateRipples(dt);
  updateParticles(dt);
  maybeSpawn(now);
  checkCombo(now);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
