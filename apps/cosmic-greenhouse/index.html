<style>
  :root{
    --void:#070418;
    --void-2:#15083a;
    --cyan:#5ce6ff;
    --magenta:#ff2bd6;
    --pink:#ff6ec0;
    --gold:#ffd454;
    --lime:#a5ff52;
    --jade:#3affb0;
    --violet:#9b5bff;
    --ink:#f4f0ff;
    --silver:#a3a8c2;
    --silver-dim:#5e637a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  html,body{height:100%;overflow:hidden;background:var(--void);color:var(--ink);font-family:'Share Tech Mono', monospace;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:manipulation}
  body{
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(155,91,255,0.15), transparent 60%),
      radial-gradient(ellipse 70% 40% at 50% 100%, rgba(58,255,176,0.10), transparent 70%),
      var(--void);
    display:flex;flex-direction:column;align-items:center;
  }
  header{
    width:100%;text-align:center;padding:0.7rem 1rem 0.2rem;position:relative;z-index:3;
  }
  h1{
    font-family:'Audiowide', monospace;
    font-size:clamp(1.4rem, 3.4vw, 2.2rem);letter-spacing:0.08em;
    background:linear-gradient(180deg, var(--jade), var(--magenta) 60%, var(--gold));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 12px rgba(58,255,176,0.4));line-height:1;
  }
  .tag{
    font-family:'Major Mono Display', monospace;font-size:clamp(0.6rem, 1.2vw, 0.85rem);
    letter-spacing:0.35em;color:var(--silver);margin-top:0.2rem;text-transform:lowercase;
  }
  main{
    flex:1;display:flex;align-items:center;justify-content:center;
    width:100%;padding:0.3rem 0.4rem 6rem;position:relative;
  }
  canvas{
    display:block;background:#02011a;
    border:1px solid rgba(58,255,176,0.18);border-radius:0.4rem;
    box-shadow:0 0 36px rgba(155,91,255,0.18), inset 0 0 22px rgba(0,0,0,0.6);
    max-width:100%;max-height:100%;
  }

  .hud-top{
    position:fixed;top:3.4rem;left:0.6rem;right:0.6rem;
    display:flex;justify-content:center;gap:0.6rem;flex-wrap:wrap;
    z-index:5;pointer-events:none;font-family:'Share Tech Mono', monospace;
  }
  .hud-top .card{
    background:rgba(7,4,24,0.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(58,255,176,0.32);
    padding:0.45rem 0.85rem;border-radius:0.4rem;
    display:flex;flex-direction:column;gap:0.15rem;
    box-shadow:0 0 12px rgba(58,255,176,0.12);min-width:5.5rem;
    text-align:center;
  }
  .hud-top .label{font-size:0.55rem;letter-spacing:0.22em;color:var(--silver);text-transform:uppercase}
  .hud-top .val{font-family:'Audiowide', monospace;font-size:1.2rem;color:var(--jade);letter-spacing:0.04em;line-height:1}
  .hud-top .card.viewers .val{color:var(--cyan)}
  .hud-top .card.blooms .val{color:var(--gold)}
  .hud-top .card.species .val{color:var(--magenta);font-size:0.85rem}
  .hud-top .conn-dot{
    display:inline-block;width:0.45rem;height:0.45rem;border-radius:50%;
    background:var(--silver-dim);margin-right:0.32rem;vertical-align:middle;
    transition:background 0.4s;
  }
  .hud-top .conn-dot.live{background:var(--lime);box-shadow:0 0 8px var(--lime);animation:livePulse 2s ease-in-out infinite}
  .hud-top .conn-dot.fail{background:var(--magenta)}
  @keyframes livePulse{0%,100%{opacity:1}50%{opacity:0.45}}

  .bottom-strip{
    position:fixed;bottom:0.8rem;left:50%;transform:translateX(-50%);
    display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;justify-content:center;
    background:rgba(7,4,24,0.86);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(155,91,255,0.32);
    padding:0.55rem 0.85rem;border-radius:0.4rem;
    z-index:5;font-size:0.65rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--silver);
    max-width:calc(100% - 1rem);
    box-shadow:0 0 20px rgba(155,91,255,0.18);
  }
  .bottom-strip .quote{
    font-family:'Cormorant Garamond', serif;font-style:italic;
    font-size:0.95rem;color:var(--jade);letter-spacing:0.02em;text-transform:none;
    text-shadow:0 0 8px rgba(58,255,176,0.4);max-width:22rem;
  }
  .bottom-strip button{
    background:transparent;color:var(--cyan);border:1px solid var(--cyan);
    font-family:'Share Tech Mono', monospace;font-size:0.62rem;letter-spacing:0.15em;text-transform:uppercase;
    padding:0.4rem 0.6rem;border-radius:0.22rem;cursor:pointer;min-height:2.5rem;
  }
  .bottom-strip button:hover{background:rgba(92,230,255,0.14)}
  .bottom-strip button:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
  .bottom-strip button[aria-pressed="true"]{background:rgba(92,230,255,0.22);box-shadow:0 0 8px rgba(92,230,255,0.4)}

  @media (max-width: 540px){
    .hud-top{top:2.8rem;gap:0.35rem}
    .hud-top .card{padding:0.3rem 0.55rem;min-width:4rem}
    .hud-top .val{font-size:0.9rem}
    .hud-top .card.species .val{font-size:0.7rem}
    .bottom-strip{font-size:0.55rem;padding:0.4rem 0.55rem}
    .bottom-strip .quote{font-size:0.8rem;max-width:14rem}
  }
  @media (prefers-reduced-motion: reduce){
    canvas{filter:none}
    .hud-top .conn-dot.live{animation:none}
  }
</style>
</head>
<body>
  <header>
    <h1>COSMIC GREENHOUSE</h1>
    <div class="tag">alien flora · grows with the crowd</div>
  </header>

  <div class="hud-top">
    <div class="card viewers"><div class="label"><span class="conn-dot" id="connDot"></span>viewers</div><div class="val"><span id="viewerVal">1</span></div></div>
    <div class="card blooms"><div class="label">blooms</div><div class="val"><span id="bloomVal">0</span></div></div>
    <div class="card species"><div class="label">tallest</div><div class="val"><span id="speciesVal">—</span></div></div>
  </div>

  <main>
    <canvas id="garden" role="img" aria-label="A cosmic greenhouse with six glowing alien plants. Plants grow taller and bloom faster the more viewers are connected. Each plant cycles through six growth stages and blooms with a particle burst before reseeding as a new species."></canvas>
  </main>

  <div class="bottom-strip" role="group" aria-label="Status">
    <span class="quote" id="quote" aria-live="polite">the garden waits.</span>
    <button id="droneBtn" type="button" aria-pressed="false" aria-label="Toggle ambient drone">~ drone</button>
    <button id="muteBtn" type="button" aria-pressed="false" aria-label="Toggle sound effects">♪ on</button>
  </div>

<script type="module">
'use strict';

function showError(msg){
  try {
    let t = document.getElementById('errToast');
    if (!t){
      t = document.createElement('div');
      t.id = 'errToast';
      t.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#3a0610;color:#ffb6c1;font-family:monospace;font-size:11px;padding:8px 12px;border-bottom:1px solid #ff2bd6;white-space:pre-wrap';
      document.body.appendChild(t);
    }
    t.textContent = '⚠ ' + msg;
  } catch(_){}
}
window.addEventListener('error', function(ev){
  showError((ev.message || 'error') + ' @ ' + (ev.filename ? ev.filename.split('/').pop() : '?') + ':' + (ev.lineno || '?'));
});
window.addEventListener('unhandledrejection', function(ev){
  console.warn('unhandled rejection:', ev.reason);
});

let prefersReducedMotion = false;
try { prefersReducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch(_){}

const canvas = document.getElementById('garden');
let ctx;
try { ctx = canvas.getContext('2d'); } catch(e){ showError('canvas init: ' + e.message); }
if (!ctx) showError('canvas 2d unavailable');

const DPR = Math.min(window.devicePixelRatio || 1, 2);
let W = 900, H = 540;
function resize(){
  try {
    const maxW = Math.min(window.innerWidth - 16, 1100);
    const maxH = Math.max(360, window.innerHeight - 200);
    const ratio = 5/3;
    let w = Math.min(maxW, maxH * ratio);
    let h = w / ratio;
    if (h > maxH){ h = maxH; w = h * ratio; }
    W = Math.floor(w); H = Math.floor(h);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  } catch(e){ showError('resize: ' + e.message); }
}
resize();
window.addEventListener('resize', resize);

const SPECIES = [
  { id: 'pulsewort',   name: 'PULSEWORT',    hue: 145,
    quotes: ['the pulse begins.', 'a bulb breathes.', 'photons gather.', 'the bulb hums.', 'sap thickens.', 'fully aglow.'] },
  { id: 'spiral',      name: 'SPIRAL FROND', hue: 195,
    quotes: ['the spiral unwinds.', 'a tendril curls.', 'helix climbs.', 'arms extend.', 'crown of fractals.', 'fully unspooled.'] },
  { id: 'lumencap',    name: 'LUMEN CAP',    hue: 50,
    quotes: ['a cap pushes up.', 'gills of light form.', 'spores stir.', 'dome widens.', 'glowdrops bead.', 'fully lit.'] },
  { id: 'trumpet',     name: 'TRUMPET VINE', hue: 320,
    quotes: ['a horn shyly tips.', 'the bell unfolds.', 'mouth opens.', 'petals spread.', 'song begins.', 'fully crowned.'] },
  { id: 'starbramble', name: 'STAR BRAMBLE', hue: 280,
    quotes: ['a thorn pushes out.', 'branches fork.', 'starpoints kindle.', 'constellation forming.', 'sky in miniature.', 'fully starlit.'] },
  { id: 'biocoral',    name: 'BIO-CORAL',    hue: 340,
    quotes: ['a polyp pulses.', 'tips light up.', 'branches stack.', 'cluster forms.', 'reef of glow.', 'fully cascading.'] }
];

const NUM_SLOTS = 6;
const STAGES = 6;
const BLOOM_HOLD = 8.0;
const STORAGE_KEY = 'cosmic-greenhouse-v1';

const state = {
  plants: [],
  viewerCount: 1,
  blooms: 0,
  particles: [],
  driftSpores: [],
  lastBloomT: 0
};

try {
  const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || 'null');
  if (saved && typeof saved.blooms === 'number') state.blooms = saved.blooms;
} catch(_){}
function saveState(){
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ blooms: state.blooms })); } catch(_){}
}

function newPlant(slotIdx, speciesIdx){
  if (speciesIdx == null) speciesIdx = Math.floor(Math.random() * SPECIES.length);
  return {
    speciesIdx,
    stage: 0,
    accum: 0,
    slot: slotIdx,
    hueJitter: (Math.random() - 0.5) * 20,
    bloomHoldT: 0,
    age: 0,
    sway: Math.random() * Math.PI * 2
  };
}
function seedGarden(){
  state.plants = [];
  const shuffled = SPECIES.map((_, i) => i).sort(() => Math.random() - 0.5);
  for (let i = 0; i < NUM_SLOTS; i++){
    state.plants.push(newPlant(i, shuffled[i % shuffled.length]));
  }
}
seedGarden();

function seedSpores(){
  state.driftSpores = [];
  for (let i = 0; i < 36; i++){
    state.driftSpores.push({
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * 8,
      vy: -5 - Math.random() * 14,
      r: 1 + Math.random() * 2.5,
      hue: 140 + Math.random() * 240,
      tw: Math.random() * Math.PI * 2
    });
  }
}
seedSpores();

// ── Audio ──
let audioCtx = null;
let muted = false;
let droneOn = false;
let droneNodes = null;
function ensureAudio(){
  if (audioCtx){ if (audioCtx.state === 'suspended') audioCtx.resume(); return audioCtx; }
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(_){ audioCtx = null; }
  return audioCtx;
}
function tone(type, freq, dur, gain, slideTo, t0){
  const c = ensureAudio(); if (!c || muted) return;
  const o = c.createOscillator(); o.type = type;
  const t = t0 || c.currentTime;
  o.frequency.setValueAtTime(freq, t);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20, slideTo), t + dur);
  const g = c.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(gain, t + 0.008);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g).connect(c.destination);
  o.start(t); o.stop(t + dur + 0.02);
}
function sndStageChime(stage){
  const base = 440 + stage * 110;
  tone('triangle', base, 0.30, 0.10, base * 1.5);
}
function sndBloomChord(){
  const root = 330;
  [1, 1.25, 1.5, 1.875, 2.25].forEach((mul, i) => {
    tone('triangle', root * mul, 0.55, 0.14, null, ensureAudio() && audioCtx.currentTime + i * 0.06);
  });
}
function toggleDrone(){
  droneOn = !droneOn;
  const c = ensureAudio(); if (!c){ droneOn = false; return; }
  if (droneOn){
    const t = c.currentTime;
    const freqs = [55, 73.42, 110, 138.59];
    droneNodes = freqs.map((f, i) => {
      const o1 = c.createOscillator(); o1.type = 'sine'; o1.frequency.value = f;
      const o2 = c.createOscillator(); o2.type = 'triangle'; o2.frequency.value = f * 1.005;
      const g = c.createGain(); g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(0.022, t + 2.4);
      const lp = c.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 380; lp.Q.value = 0.7;
      const lfo = c.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 0.04 + i * 0.03;
      const lfoG = c.createGain(); lfoG.gain.value = 160;
      lfo.connect(lfoG).connect(lp.frequency);
      o1.connect(g); o2.connect(g);
      g.connect(lp).connect(c.destination);
      o1.start(t); o2.start(t); lfo.start(t);
      return { o1, o2, g, lfo };
    });
  } else if (droneNodes){
    const t2 = c.currentTime;
    droneNodes.forEach(n => {
      n.g.gain.cancelScheduledValues(t2);
      n.g.gain.setValueAtTime(n.g.gain.value, t2);
      n.g.gain.exponentialRampToValueAtTime(0.0001, t2 + 1.6);
      n.o1.stop(t2 + 1.8); n.o2.stop(t2 + 1.8); n.lfo.stop(t2 + 1.8);
    });
    droneNodes = null;
  }
}

// ── Growth ──
function growthRate(){
  // 1 viewer = 0.09/s = ~11s/stage = ~66s total bloom
  // 10 viewers = 0.54/s = ~1.85s/stage = ~11s total bloom
  return 0.04 + 0.05 * Math.max(1, state.viewerCount);
}
function updatePlants(dt){
  for (let i = 0; i < state.plants.length; i++){
    const p = state.plants[i];
    p.age += dt;
    p.sway += dt * (0.6 + 0.05 * i);
    if (p.stage >= STAGES - 1){
      p.bloomHoldT += dt;
      if (p.bloomHoldT > BLOOM_HOLD){
        const exclude = new Set();
        if (state.plants[i-1]) exclude.add(state.plants[i-1].speciesIdx);
        if (state.plants[i+1]) exclude.add(state.plants[i+1].speciesIdx);
        let newSpec, attempts = 0;
        do {
          newSpec = Math.floor(Math.random() * SPECIES.length);
          attempts++;
        } while (exclude.has(newSpec) && attempts < 5);
        state.plants[i] = newPlant(i, newSpec);
      }
      continue;
    }
    p.accum += growthRate() * dt;
    while (p.accum >= 1 && p.stage < STAGES - 1){
      p.accum -= 1;
      p.stage++;
      const justBloomed = (p.stage === STAGES - 1);
      const sp = SPECIES[p.speciesIdx];
      const slotXVal = slotX_(i);
      const burstY = soilY() - plantHeightAt(p.stage, p.speciesIdx);
      const burstCount = justBloomed ? 28 : 8;
      for (let b = 0; b < burstCount; b++){
        const ang = -Math.PI / 2 + (Math.random() - 0.5) * Math.PI;
        const sp2 = 40 + Math.random() * 140;
        state.particles.push({
          x: slotXVal + (Math.random() - 0.5) * 12,
          y: burstY,
          vx: Math.cos(ang) * sp2,
          vy: Math.sin(ang) * sp2 - 30,
          ttl: 0.7 + Math.random() * 0.8,
          life: 0,
          r: 1.5 + Math.random() * 2.5,
          hue: (sp.hue + (Math.random() - 0.5) * 30 + 360) % 360
        });
      }
      if (justBloomed){
        state.blooms++;
        state.lastBloomT = performance.now();
        document.getElementById('bloomVal').textContent = state.blooms;
        saveState();
        sndBloomChord();
        updateQuote(sp.quotes[5] + ' · ' + sp.name.toLowerCase() + ' has bloomed.', '#3affb0');
      } else {
        sndStageChime(p.stage);
      }
    }
  }
}
function updateParticles(dt){
  for (let i = state.particles.length - 1; i >= 0; i--){
    const p = state.particles[i];
    p.life += dt;
    if (p.life >= p.ttl){ state.particles.splice(i, 1); continue; }
    p.vy += 60 * dt;
    p.vx *= Math.pow(0.95, dt * 60);
    p.x += p.vx * dt;
    p.y += p.vy * dt;
  }
}
function updateSpores(dt){
  for (let i = 0; i < state.driftSpores.length; i++){
    const s = state.driftSpores[i];
    s.x += s.vx * dt;
    s.y += s.vy * dt;
    s.tw += dt * 1.4;
    if (s.y < -10){ s.y = H + 10; s.x = Math.random() * W; }
    if (s.x < -10) s.x = W + 10;
    if (s.x > W + 10) s.x = -10;
  }
}

function slotX_(idx){
  const margin = W * 0.10;
  const usable = W - margin * 2;
  return margin + (idx + 0.5) * (usable / NUM_SLOTS);
}
function soilY(){ return H - Math.max(60, H * 0.13); }
function plantMaxHeight(speciesIdx){
  const sizes = { pulsewort: 140, spiral: 160, lumencap: 110, trumpet: 150, starbramble: 165, biocoral: 130 };
  return sizes[SPECIES[speciesIdx].id] || 140;
}
function plantHeightAt(stage, speciesIdx){
  const maxH = plantMaxHeight(speciesIdx);
  const t = stage / (STAGES - 1);
  return 14 + (maxH - 14) * (0.15 + 0.85 * t);
}

function drawBackground(){
  ctx.fillStyle = '#02011a';
  ctx.fillRect(0, 0, W, H);
  const g1 = ctx.createRadialGradient(W * 0.2, H * 0.3, 30, W * 0.2, H * 0.3, W * 0.55);
  g1.addColorStop(0, 'rgba(155,91,255,0.30)');
  g1.addColorStop(1, 'rgba(155,91,255,0)');
  ctx.fillStyle = g1; ctx.fillRect(0, 0, W, H);
  const g2 = ctx.createRadialGradient(W * 0.78, H * 0.5, 20, W * 0.78, H * 0.5, W * 0.5);
  g2.addColorStop(0, 'rgba(58,255,176,0.20)');
  g2.addColorStop(1, 'rgba(58,255,176,0)');
  ctx.fillStyle = g2; ctx.fillRect(0, 0, W, H);
  const g3 = ctx.createRadialGradient(W * 0.5, H * 0.85, 60, W * 0.5, H * 0.85, W * 0.7);
  g3.addColorStop(0, 'rgba(255,43,214,0.20)');
  g3.addColorStop(1, 'rgba(255,43,214,0)');
  ctx.fillStyle = g3; ctx.fillRect(0, 0, W, H);
  for (let i = 0; i < 90; i++){
    const sx = (i * 137.5) % W;
    const sy = (i * 73.3) % (H * 0.85);
    const sa = 0.3 + ((i * 31) % 7) / 10;
    ctx.fillStyle = 'rgba(255,255,255,' + sa + ')';
    ctx.fillRect(sx, sy, 1.4, 1.4);
  }
  // dome curve
  ctx.strokeStyle = 'rgba(58,255,176,0.25)';
  ctx.lineWidth = 1.5;
  ctx.shadowColor = 'rgba(58,255,176,0.6)';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.moveTo(20, soilY() - 40);
  ctx.quadraticCurveTo(W / 2, 18, W - 20, soilY() - 40);
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.moveTo(60, soilY() - 60);
  ctx.quadraticCurveTo(W / 2, 36, W - 60, soilY() - 60);
  ctx.stroke();
}
function drawSoil(){
  const y = soilY();
  const grad = ctx.createLinearGradient(0, y, 0, H);
  grad.addColorStop(0, '#150924');
  grad.addColorStop(1, '#02010a');
  ctx.fillStyle = grad;
  ctx.fillRect(0, y, W, H - y);
  ctx.fillStyle = '#2a1840';
  ctx.fillRect(0, y - 2, W, 2);
  for (let i = 0; i < 26; i++){
    const sx = (i * 73.3 + 5) % W;
    const sy = y + 6 + (i * 13) % (H - y - 10);
    const hue = ((i * 47) % 360);
    ctx.fillStyle = 'hsla(' + hue + ',95%,65%,0.55)';
    ctx.beginPath(); ctx.arc(sx, sy, 1.2, 0, Math.PI * 2); ctx.fill();
  }
  ctx.fillStyle = 'rgba(58,255,176,0.30)';
  ctx.shadowColor = '#3affb0'; ctx.shadowBlur = 12;
  ctx.fillRect(0, y - 3, W, 1);
  ctx.shadowBlur = 0;
}
function drawDrift(){
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < state.driftSpores.length; i++){
    const s = state.driftSpores[i];
    const a = 0.4 + Math.sin(s.tw) * 0.35;
    ctx.fillStyle = 'hsla(' + s.hue + ',100%,75%,' + Math.max(0, a) + ')';
    ctx.shadowColor = 'hsl(' + s.hue + ',100%,65%)'; ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
  ctx.shadowBlur = 0;
}

function drawPlant(p, x, baseY, now){
  const sp = SPECIES[p.speciesIdx];
  const hue = (sp.hue + p.hueJitter + 360) % 360;
  const stageFrac = p.stage + p.accum;
  const sway = Math.sin(now * 0.0014 + p.sway) * (1 + p.stage * 0.5);
  switch (sp.id){
    case 'pulsewort':    drawPulsewort(x, baseY, stageFrac, hue, sway, now, p); break;
    case 'spiral':       drawSpiral(x, baseY, stageFrac, hue, sway, now, p); break;
    case 'lumencap':     drawLumenCap(x, baseY, stageFrac, hue, sway, now, p); break;
    case 'trumpet':      drawTrumpet(x, baseY, stageFrac, hue, sway, now, p); break;
    case 'starbramble':  drawStarBramble(x, baseY, stageFrac, hue, sway, now, p); break;
    case 'biocoral':     drawBioCoral(x, baseY, stageFrac, hue, sway, now, p); break;
  }
}
function neonStroke(color, blur, width){
  ctx.strokeStyle = color; ctx.shadowColor = color; ctx.shadowBlur = blur;
  ctx.lineWidth = width; ctx.lineCap = 'round';
}
function neonFill(color, blur){
  ctx.fillStyle = color; ctx.shadowColor = color; ctx.shadowBlur = blur;
}

function drawPulsewort(x, y, sf, hue, sway, now){
  const t = sf / (STAGES - 1);
  const stemH = (10 + t * 110);
  const topX = x + sway * 0.6;
  const topY = y - stemH;
  neonStroke('hsl(' + hue + ',90%,55%)', 6, 3);
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.quadraticCurveTo(x + sway * 0.4, y - stemH * 0.5, topX, topY);
  ctx.stroke();
  if (sf >= 1){
    const leafCount = Math.min(3, Math.floor(sf));
    for (let i = 0; i < leafCount; i++){
      const lt = (i + 0.5) / 3;
      const lx = x + sway * 0.4 * lt;
      const ly = y - stemH * lt;
      const leafW = 6 + sf * 2;
      const dir = i % 2 === 0 ? 1 : -1;
      neonFill('hsla(' + hue + ',85%,52%,0.85)', 10);
      ctx.beginPath();
      ctx.ellipse(lx + dir * leafW, ly, leafW, leafW * 0.4, dir * 0.4, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  if (sf >= 2){
    const bulbR = Math.min(18, (sf - 2) * 6 + 4);
    const pulse = 0.7 + Math.sin(now * 0.005) * 0.3;
    const grad = ctx.createRadialGradient(topX, topY - bulbR * 0.4, 1, topX, topY - bulbR * 0.4, bulbR * 2.5);
    grad.addColorStop(0, 'hsla(' + hue + ',100%,75%,' + (0.7 * pulse) + ')');
    grad.addColorStop(0.5, 'hsla(' + hue + ',100%,55%,' + (0.4 * pulse) + ')');
    grad.addColorStop(1, 'hsla(' + hue + ',100%,40%,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(topX - bulbR * 3, topY - bulbR * 3, bulbR * 6, bulbR * 6);
    neonFill('hsla(' + hue + ',100%,72%,0.95)', 16);
    ctx.beginPath(); ctx.arc(topX, topY - bulbR * 0.4, bulbR, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,' + (0.6 * pulse) + ')';
    ctx.beginPath(); ctx.arc(topX, topY - bulbR * 0.4, bulbR * 0.4, 0, Math.PI * 2); ctx.fill();
  }
  ctx.shadowBlur = 0;
}
function drawSpiral(x, y, sf, hue, sway, now){
  const t = sf / (STAGES - 1);
  const totalH = 12 + t * 140;
  const turns = 1 + t * 3.2;
  const radius = 5 + t * 18;
  const startA = now * 0.0008;
  neonStroke('hsl(' + hue + ',90%,60%)', 8, 2.4);
  ctx.beginPath();
  let first = true;
  const segments = 60;
  for (let i = 0; i <= segments; i++){
    const u = i / segments;
    const ang = startA + u * turns * Math.PI * 2;
    const rr = radius * (0.3 + 0.7 * u);
    const sx = x + Math.cos(ang) * rr + sway * 0.4 * u;
    const sy = y - totalH * u;
    if (first){ ctx.moveTo(sx, sy); first = false; }
    else ctx.lineTo(sx, sy);
  }
  ctx.stroke();
  const tipAng = startA + turns * Math.PI * 2;
  const tipX = x + Math.cos(tipAng) * radius + sway * 0.4;
  const tipY = y - totalH;
  if (sf >= 1.5){
    const tipS = 3 + t * 6;
    neonFill('hsla(' + hue + ',100%,72%,0.95)', 18);
    ctx.beginPath(); ctx.arc(tipX, tipY, tipS, 0, Math.PI * 2); ctx.fill();
  }
  if (sf >= 3.5){
    for (let i = 0; i < 5; i++){
      const ang2 = startA + (i / 5) * Math.PI * 2;
      const sx2 = tipX + Math.cos(ang2) * (12 + Math.sin(now * 0.005 + i) * 4);
      const sy2 = tipY + Math.sin(ang2) * (12 + Math.sin(now * 0.005 + i) * 4);
      neonFill('hsla(' + ((hue + 50) % 360) + ',100%,80%,0.85)', 8);
      ctx.beginPath(); ctx.arc(sx2, sy2, 1.6, 0, Math.PI * 2); ctx.fill();
    }
  }
  ctx.shadowBlur = 0;
}
function drawLumenCap(x, y, sf, hue, sway, now){
  const t = sf / (STAGES - 1);
  const stemH = 6 + t * 36;
  const stemW = 4 + t * 8;
  const capW = 8 + t * 56;
  const capH = 4 + t * 18;
  const cx = x + sway * 0.3;
  const cy = y - stemH;
  neonFill('hsl(' + hue + ',60%,55%)', 8);
  ctx.beginPath();
  ctx.moveTo(cx - stemW / 2, y);
  ctx.lineTo(cx - stemW * 0.35, cy);
  ctx.lineTo(cx + stemW * 0.35, cy);
  ctx.lineTo(cx + stemW / 2, y);
  ctx.closePath();
  ctx.fill();
  if (sf >= 0.4){
    neonFill('hsl(' + hue + ',95%,55%)', 14);
    ctx.beginPath();
    ctx.moveTo(cx - capW / 2, cy);
    ctx.quadraticCurveTo(cx, cy - capH * 2.2, cx + capW / 2, cy);
    ctx.lineTo(cx + capW * 0.45, cy + 2);
    ctx.lineTo(cx - capW * 0.45, cy + 2);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = 'hsla(' + hue + ',100%,80%,0.55)';
    ctx.beginPath();
    ctx.moveTo(cx - capW / 2, cy);
    ctx.quadraticCurveTo(cx, cy - capH * 0.6, cx + capW / 2, cy);
    ctx.lineTo(cx + capW * 0.45, cy - 1);
    ctx.lineTo(cx - capW * 0.45, cy - 1);
    ctx.closePath();
    ctx.fill();
  }
  if (sf >= 1.5){
    const dotCount = Math.floor(3 + sf);
    for (let i = 0; i < dotCount; i++){
      const dt2 = (i + 0.5) / dotCount;
      const dx = cx - capW * 0.4 + capW * 0.8 * dt2;
      const pulse = 0.6 + Math.sin(now * 0.004 + i) * 0.4;
      neonFill('hsla(' + ((hue + 40) % 360) + ',100%,75%,' + pulse + ')', 8);
      ctx.beginPath(); ctx.arc(dx, cy + 4, 1.4, 0, Math.PI * 2); ctx.fill();
    }
  }
  if (sf >= 4.5){
    for (let i = 0; i < 6; i++){
      const ang = (i / 6) * Math.PI * 2;
      const r2 = capW * 0.4 + Math.sin(now * 0.003 + i) * 4;
      const sx = cx + Math.cos(ang) * r2;
      const sy = cy - capH + Math.sin(ang) * r2 * 0.4;
      neonFill('hsla(' + hue + ',100%,85%,0.7)', 6);
      ctx.beginPath(); ctx.arc(sx, sy, 1.6, 0, Math.PI * 2); ctx.fill();
    }
  }
  ctx.shadowBlur = 0;
}
function drawTrumpet(x, y, sf, hue, sway, now){
  const t = sf / (STAGES - 1);
  const stemH = 10 + t * 110;
  const topX = x + sway * 0.6;
  const topY = y - stemH;
  neonStroke('hsl(' + ((hue + 120) % 360) + ',75%,45%)', 6, 3);
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.quadraticCurveTo(x + sway * 0.4, y - stemH * 0.5, topX, topY);
  ctx.stroke();
  if (sf >= 0.8){
    neonFill('hsla(' + ((hue + 120) % 360) + ',75%,50%,0.85)', 8);
    ctx.beginPath();
    ctx.ellipse(x + 8 + sway * 0.4, y - stemH * 0.45, 10, 4, 0.35, 0, Math.PI * 2);
    ctx.fill();
  }
  if (sf >= 2){
    const bellH = Math.min(40, (sf - 2) * 12 + 6);
    const bellW = Math.min(44, (sf - 2) * 14 + 8);
    const openness = Math.min(1, (sf - 2) / 3);
    neonFill('hsl(' + hue + ',95%,55%)', 14);
    ctx.beginPath();
    ctx.moveTo(topX - bellW * 0.15 * (1 - openness * 0.7), topY);
    ctx.bezierCurveTo(
      topX - bellW * 0.5, topY - bellH * 0.4,
      topX - bellW * 0.5 * openness, topY - bellH * 0.9,
      topX, topY - bellH
    );
    ctx.bezierCurveTo(
      topX + bellW * 0.5 * openness, topY - bellH * 0.9,
      topX + bellW * 0.5, topY - bellH * 0.4,
      topX + bellW * 0.15 * (1 - openness * 0.7), topY
    );
    ctx.closePath();
    ctx.fill();
    if (openness > 0.5){
      neonFill('hsla(' + ((hue + 320) % 360) + ',90%,40%,0.7)', 8);
      ctx.beginPath();
      ctx.ellipse(topX, topY - bellH * 0.85, bellW * 0.42 * openness, bellH * 0.18 * openness, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    if (sf >= 4.5){
      ctx.strokeStyle = 'hsla(' + ((hue + 40) % 360) + ',100%,75%,0.9)';
      ctx.lineWidth = 1.5;
      ctx.shadowColor = 'hsl(' + ((hue + 40) % 360) + ',100%,75%)'; ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.moveTo(topX, topY - bellH * 0.85);
      ctx.lineTo(topX + Math.sin(now * 0.004) * 6, topY - bellH * 0.4);
      ctx.stroke();
      neonFill('hsla(' + ((hue + 40) % 360) + ',100%,80%,0.95)', 10);
      ctx.beginPath();
      ctx.arc(topX + Math.sin(now * 0.004) * 6, topY - bellH * 0.4, 3, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.shadowBlur = 0;
}
function drawStarBramble(x, y, sf, hue, sway, now){
  const t = sf / (STAGES - 1);
  const totalH = 14 + t * 140;
  const branches = Math.min(6, Math.floor(sf + 1));
  neonStroke('hsl(' + ((hue + 30) % 360) + ',80%,45%)', 6, 2.6);
  ctx.beginPath();
  ctx.moveTo(x, y);
  ctx.lineTo(x + sway * 0.5, y - totalH);
  ctx.stroke();
  for (let i = 0; i < branches; i++){
    const bt = (i + 0.5) / branches;
    const by = y - totalH * bt;
    const bx = x + sway * 0.5 * bt;
    const branchLen = 10 + sf * 8;
    const dir = (i % 2 === 0) ? 1 : -1;
    neonStroke('hsl(' + ((hue + 30) % 360) + ',80%,50%)', 6, 2);
    const tipX = bx + dir * branchLen;
    const tipY = by - branchLen * 0.4;
    ctx.beginPath();
    ctx.moveTo(bx, by);
    ctx.lineTo(tipX, tipY);
    ctx.stroke();
    if (sf >= i + 1){
      drawStar(tipX, tipY, 4 + Math.min(4, sf - i), hue, now + i);
    }
  }
  drawStar(x + sway * 0.5, y - totalH, 5 + sf * 1.2, hue, now);
  ctx.shadowBlur = 0;
}
function drawStar(sx, sy, r, hue, t){
  const points = 5;
  const inner = r * 0.45;
  const rot = t * 0.0008;
  const grad = ctx.createRadialGradient(sx, sy, 1, sx, sy, r * 2.5);
  grad.addColorStop(0, 'hsla(' + hue + ',100%,80%,0.8)');
  grad.addColorStop(0.5, 'hsla(' + hue + ',100%,60%,0.35)');
  grad.addColorStop(1, 'hsla(' + hue + ',100%,50%,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(sx - r * 3, sy - r * 3, r * 6, r * 6);
  ctx.fillStyle = 'hsla(' + hue + ',100%,80%,0.95)';
  ctx.shadowColor = 'hsl(' + hue + ',100%,70%)'; ctx.shadowBlur = 10;
  ctx.beginPath();
  for (let i = 0; i < points * 2; i++){
    const ang = rot + i * Math.PI / points;
    const rr = i % 2 === 0 ? r : inner;
    const px = sx + Math.cos(ang - Math.PI / 2) * rr;
    const py = sy + Math.sin(ang - Math.PI / 2) * rr;
    if (i === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
  }
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.beginPath(); ctx.arc(sx, sy, Math.max(1, r * 0.18), 0, Math.PI * 2); ctx.fill();
}
function drawBioCoral(x, y, sf, hue, sway, now, p){
  const t = sf / (STAGES - 1);
  const totalH = 12 + t * 110;
  function branch(bx, by, len, ang, depth){
    if (depth <= 0 || len < 2) return;
    const ex = bx + Math.cos(ang) * len;
    const ey = by + Math.sin(ang) * len;
    neonStroke('hsl(' + hue + ',95%,' + (45 + depth * 4) + '%)', 8, 1 + depth * 0.8);
    ctx.beginPath();
    ctx.moveTo(bx, by);
    ctx.lineTo(ex, ey);
    ctx.stroke();
    if (depth === 1){
      const tipPulse = 0.6 + Math.sin(now * 0.005 + ex + ey) * 0.4;
      neonFill('hsla(' + ((hue + 40) % 360) + ',100%,80%,' + tipPulse + ')', 10);
      ctx.beginPath(); ctx.arc(ex, ey, 2 + sf * 0.4, 0, Math.PI * 2); ctx.fill();
    }
    if (depth > 1){
      const da = 0.4 + Math.sin(ex * 0.13) * 0.18;
      const ll = len * 0.62;
      branch(ex, ey, ll, ang - da, depth - 1);
      branch(ex, ey, ll, ang + da, depth - 1);
      if (depth > 2 && Math.random() < 0.3){
        branch(ex, ey, ll * 0.7, ang, depth - 1);
      }
    }
  }
  const depth = Math.max(2, Math.floor(2 + sf));
  const oldRand = Math.random;
  let seed = (p.slot * 31 + p.speciesIdx * 7 + 1) >>> 0;
  Math.random = function(){ seed = (seed * 1664525 + 1013904223) >>> 0; return (seed & 0xffffff) / 0xffffff; };
  branch(x + sway * 0.4, y, totalH * 0.7, -Math.PI / 2, depth);
  Math.random = oldRand;
  ctx.shadowBlur = 0;
}

function drawParticles(){
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < state.particles.length; i++){
    const p = state.particles[i];
    const a = 1 - p.life / p.ttl;
    ctx.fillStyle = 'hsla(' + p.hue + ',100%,72%,' + a + ')';
    ctx.shadowColor = 'hsl(' + p.hue + ',100%,65%)'; ctx.shadowBlur = 12;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * (0.4 + 0.6 * a), 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
  ctx.shadowBlur = 0;
}
function drawStageBars(){
  const y = soilY() + 8;
  for (let i = 0; i < state.plants.length; i++){
    const p = state.plants[i];
    const x = slotX_(i);
    const barW = 32;
    const totalSteps = STAGES - 1;
    for (let s = 0; s < totalSteps; s++){
      const sx = x - barW / 2 + s * (barW / totalSteps);
      const sw = barW / totalSteps - 2;
      ctx.fillStyle = s < p.stage
        ? 'hsla(' + SPECIES[p.speciesIdx].hue + ',100%,65%,0.7)'
        : 'hsla(' + SPECIES[p.speciesIdx].hue + ',60%,30%,0.4)';
      ctx.fillRect(sx, y, sw, 2);
      if (s === p.stage){
        ctx.fillStyle = 'hsla(' + SPECIES[p.speciesIdx].hue + ',100%,72%,0.85)';
        ctx.fillRect(sx, y, sw * p.accum, 2);
      }
    }
  }
}

let lastT = performance.now();
function render(now){
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  updatePlants(prefersReducedMotion ? dt * 0.65 : dt);
  updateParticles(dt);
  updateSpores(dt);
  if (ctx){
    drawBackground();
    drawSoil();
    drawDrift();
    drawStageBars();
    const y = soilY();
    for (let i = 0; i < state.plants.length; i++){
      drawPlant(state.plants[i], slotX_(i), y, now);
    }
    drawParticles();
  }
  requestAnimationFrame(render);
}
requestAnimationFrame(render);

const viewerVal = document.getElementById('viewerVal');
const speciesVal = document.getElementById('speciesVal');
const connDot = document.getElementById('connDot');
const quoteEl = document.getElementById('quote');
let quoteIdx = 0;
const idleQuotes = [
  'the garden breathes.',
  'spore drift.',
  'a faint hum from the dome.',
  'photosynthesis under starlight.',
  'glass condenses dew.',
  'roots find purchase.',
  'the soil glows where no one looks.',
  'something stirs in slot four.'
];
function updateQuote(text, color){
  quoteEl.textContent = text;
  quoteEl.style.color = color || '#3affb0';
  quoteEl.style.textShadow = '0 0 8px ' + (color || '#3affb0') + ', 0 0 16px ' + (color || 'rgba(58,255,176,0.4)');
}
function periodicQuote(){
  if (performance.now() - state.lastBloomT < 5500){
    setTimeout(periodicQuote, 6000);
    return;
  }
  updateQuote(idleQuotes[quoteIdx % idleQuotes.length]);
  quoteIdx++;
  setTimeout(periodicQuote, 10000);
}
setTimeout(periodicQuote, 5000);

function refreshSpeciesPill(){
  let best = state.plants[0];
  let bestProgress = best ? best.stage + best.accum : 0;
  for (let i = 1; i < state.plants.length; i++){
    const p = state.plants[i];
    const prog = p.stage + p.accum;
    if (prog > bestProgress){ bestProgress = prog; best = p; }
  }
  speciesVal.textContent = best ? SPECIES[best.speciesIdx].name : '—';
}
setInterval(refreshSpeciesPill, 1500);
refreshSpeciesPill();

document.getElementById('muteBtn').addEventListener('click', function(){
  muted = !muted;
  this.textContent = muted ? '♪ off' : '♪ on';
  this.setAttribute('aria-pressed', muted ? 'true' : 'false');
});
document.getElementById('droneBtn').addEventListener('click', function(){
  ensureAudio();
  toggleDrone();
  this.setAttribute('aria-pressed', droneOn ? 'true' : 'false');
});
['pointerdown', 'keydown'].forEach(function(ev){
  window.addEventListener(ev, function once(){ ensureAudio(); window.removeEventListener(ev, once); });
});
document.getElementById('bloomVal').textContent = state.blooms;

// ── Supabase Realtime presence for viewer_count ──
// Falls back to viewerCount=1 if Supabase is unavailable
let sb = null;
try {
  const mod = await import('/supabase-config-fixed.js');
  sb = mod.default || mod.supabase;
} catch(e){
  console.warn('supabase config import failed:', e);
}
if (!sb){
  connDot.classList.remove('live');
  state.viewerCount = 1;
  viewerVal.textContent = '1';
} else {
  try {
    const clientId = 'gardener-' + Math.random().toString(36).slice(2, 8);
    const channel = sb.channel('cosmic-greenhouse:room', {
      config: { presence: { key: clientId } }
    });
    channel.on('presence', { event: 'sync' }, function(){
      const presState = channel.presenceState();
      const n = Math.max(1, Object.keys(presState).length);
      state.viewerCount = n;
      viewerVal.textContent = n;
    });
    channel.subscribe(async function(status){
      if (status === 'SUBSCRIBED'){
        connDot.classList.add('live');
        try { await channel.track({ joined_at: Date.now() }); } catch(_){}
      } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT'){
        connDot.classList.remove('live');
        connDot.classList.add('fail');
      }
    });
  } catch(e){
    console.warn('presence setup failed:', e);
    connDot.classList.add('fail');
    state.viewerCount = 1;
    viewerVal.textContent = '1';
  }
}
