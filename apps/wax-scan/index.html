<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Wax Scan</title>
<link rel="icon" href="https://emojicdn.elk.sh/🍎" />
<meta name="description" content="Point your camera at fruit. Is it real or wax? Find out." />
<meta property="og:title" content="Wax Scan" />
<meta property="og:description" content="Point your camera at fruit. Is it real or wax? Find out." />
<meta property="og:url" content="https://sloppy.live/wax-scan" />
<meta property="og:image" content="https://sloppy.live/screenshots/wax-scan.jpg" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Instrument+Serif&display=swap" rel="stylesheet" />
<style>
:root{--bg:#0a0c10;--surface:#12151c;--border:#222838;--dim:#5a6080;--text:#c8cce0;--real:#20e070;--wax:#ff5040;--mid:#e0a020;--accent:#40a0ff}
body.neon{--bg:#0c0015;--surface:#180028;--border:#3a1060;--dim:#9060c0;--text:#e0c0ff;--real:#00ffcc;--wax:#ff00aa;--mid:#ffcc00;--accent:#ff40ff}
body.radioactive{--bg:#0a1000;--surface:#142000;--border:#2a4010;--dim:#608030;--text:#c0e080;--real:#00ff40;--wax:#ff3000;--mid:#c0ff00;--accent:#40ff40}
*{margin:0;padding:0;box-sizing:border-box;scrollbar-width:none}
*::-webkit-scrollbar{display:none}
html,body{height:100vh;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;user-select:none;overflow:hidden;position:fixed;width:100%;touch-action:none}
body{display:flex;flex-direction:column;align-items:center;height:100vh}
body>*{width:100%;max-width:480px}

header{padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border);flex-shrink:0}
header h1{font-family:'Instrument Serif',serif;font-size:22px;color:var(--accent);letter-spacing:0.02em}
header a{color:var(--dim);font-size:10px;text-decoration:none}

.cam-wrap{flex:1;position:relative;background:#000;display:flex;align-items:center;justify-content:center;min-height:0;overflow:hidden}
video{width:100%;height:100%;object-fit:cover}
canvas{display:none}
.no-cam{font-size:13px;color:var(--dim);text-align:center;padding:20px;line-height:1.7}

.scan-ring{position:absolute;width:180px;height:180px;border:3px solid var(--accent);border-radius:50%;opacity:0.5;pointer-events:none;transition:all .4s}
.scan-ring.scanning{border-color:var(--mid);animation:ringPulse 1s ease-in-out infinite}
.scan-ring.real{border-color:var(--real);opacity:0.8}
.scan-ring.wax{border-color:var(--wax);opacity:0.8}
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:0.5}50%{transform:scale(1.05);opacity:0.8}}

.scan-label{position:absolute;top:12px;left:50%;transform:translateX(-50%);font-size:10px;color:var(--accent);letter-spacing:0.1em;background:rgba(10,12,16,0.7);padding:4px 12px;border-radius:4px;pointer-events:none}

.corner{position:absolute;width:20px;height:20px;pointer-events:none}
.corner.tl{top:calc(50% - 92px);left:calc(50% - 92px);border-top:2px solid var(--accent);border-left:2px solid var(--accent)}
.corner.tr{top:calc(50% - 92px);right:calc(50% - 92px);border-top:2px solid var(--accent);border-right:2px solid var(--accent)}
.corner.corner.br{bottom:calc(50% - 92px);right:calc(50% - 92px);border-bottom:2px solid var(--accent);border-right:2px solid var(--accent)}

.panel{border-top:1px solid var(--border);padding:12px 16px;flex-shrink:0;min-height:140px}
.verdict{font-family:'Instrument Serif',serif;font-size:26px;text-align:center;margin-bottom:6px;transition:color .3s}
.verdict.real{color:var(--real)}
.verdict.wax{color:var(--wax)}
.verdict.mid{color:var(--mid)}
.verdict.idle{color:var(--dim)}

.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:8px 0}
.metric{text-align:center;padding:6px;background:var(--surface);border:1px solid var(--border);border-radius:6px}
.metric .m-label{font-size:8px;color:var(--dim);letter-spacing:0.08em;text-transform:uppercase}
.metric .m-val{font-size:16px;font-weight:500;margin-top:2px}

.scan-btn{width:100%;font-family:'DM Mono',monospace;font-size:12px;font-weight:500;padding:10px;background:var(--surface);border:1px solid var(--accent);color:var(--accent);border-radius:6px;cursor:pointer;letter-spacing:0.06em;transition:all .15s;margin-top:6px}
.scan-btn:hover{background:rgba(64,160,255,0.08)}
.scan-btn:active{transform:scale(0.98)}
.scan-btn:disabled{opacity:0.3;cursor:default}

.history{font-size:10px;color:var(--dim);margin-top:6px;text-align:center}

.mode-bar{display:flex;gap:4px;padding:6px 16px 0;flex-shrink:0}
.mode-btn{flex:1;font-family:'DM Mono',monospace;font-size:9px;font-weight:500;padding:6px 0;background:var(--surface);border:1px solid var(--border);color:var(--dim);border-radius:4px;cursor:pointer;letter-spacing:0.08em;transition:all .2s;text-transform:uppercase}
.mode-btn.active{color:var(--accent);border-color:var(--accent);background:rgba(64,160,255,0.06)}
body.neon .mode-btn.active{background:rgba(255,64,255,0.08)}
body.radioactive .mode-btn.active{background:rgba(64,255,64,0.06)}

body.neon .cam-wrap{box-shadow:inset 0 0 60px rgba(255,0,170,0.15)}
body.radioactive .cam-wrap{box-shadow:inset 0 0 60px rgba(64,255,64,0.1)}
body.neon .scan-ring{box-shadow:0 0 20px var(--accent),inset 0 0 20px rgba(255,0,170,0.2)}
body.radioactive .scan-ring{box-shadow:0 0 20px var(--accent),inset 0 0 20px rgba(64,255,64,0.2)}
body.radioactive .scan-label{font-family:'DM Mono',monospace;text-transform:uppercase}
@keyframes geigerFlicker{0%,90%{opacity:1}92%{opacity:0.4}94%{opacity:1}96%{opacity:0.6}100%{opacity:1}}
body.radioactive .verdict{animation:geigerFlicker 2s infinite}
</style>
</head>
<body>

<header>
  <h1>Wax Scan</h1>
</header>

<div class="mode-bar">
  <button class="mode-btn active" data-mode="lab">🔬 Lab</button>
  <button class="mode-btn" data-mode="neon">💜 Neon</button>
  <button class="mode-btn" data-mode="radioactive">☢️ Radioactive</button>
</div>

<div class="cam-wrap" id="camWrap">
  <video id="video" autoplay playsinline muted></video>
  <canvas id="snapCanvas"></canvas>
  <div class="scan-ring" id="ring"></div>
  <div class="corner tl"></div><div class="corner tr"></div>
  <div class="corner bl"></div><div class="corner br"></div>
  <div class="scan-label" id="scanLabel">POINT AT FRUIT</div>
  <div class="no-cam" id="noCam" style="display:none">
    Camera access required.<br/>Allow camera permission to scan fruit.<br/><br/>
    <button class="scan-btn" onclick="initCam()">RETRY CAMERA</button>
  </div>
</div>

<div class="panel">
  <div class="verdict idle" id="verdict">Awaiting scan...</div>
  <div class="metrics">
    <div class="metric"><div class="m-label">Shine</div><div class="m-val" id="mShine">—</div></div>
    <div class="metric"><div class="m-label">Color</div><div class="m-val" id="mColor">—</div></div>
    <div class="metric"><div class="m-label">Texture</div><div class="m-val" id="mTexture">—</div></div>
  </div>
  <button class="scan-btn" id="scanBtn">SCAN FRUIT</button>
  <div class="history" id="history"></div>
</div>

<script>
(function(){
'use strict';

const video = document.getElementById('video');
const snapCanvas = document.getElementById('snapCanvas');
const snapCtx = snapCanvas.getContext('2d', { willReadFrequently: true });
const ring = document.getElementById('ring');
const scanLabel = document.getElementById('scanLabel');
const verdictEl = document.getElementById('verdict');
const scanBtn = document.getElementById('scanBtn');
const historyEl = document.getElementById('history');
let camReady = false;
let scanning = false;
let scanHistory = [];

// Audio
let actx;
function au(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx}
function sfx(f,d,t,v){try{const c=au();if(c.state==='suspended')c.resume();const o=c.createOscillator(),g=c.createGain();o.type=t||'sine';o.frequency.setValueAtTime(f,c.currentTime);o.frequency.exponentialRampToValueAtTime(f*0.5,c.currentTime+d);g.gain.setValueAtTime(v||0.02,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.connect(g).connect(c.destination);o.start();o.stop(c.currentTime+d)}catch(e){}}

// === CAMERA ===
window.initCam = async function(){
  try{
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width:{ideal:640}, height:{ideal:480} },
      audio: false
    });
    video.srcObject = stream;
    video.style.display = 'block';
    document.getElementById('noCam').style.display = 'none';
    camReady = true;
  } catch(e){
    video.style.display = 'none';
    document.getElementById('noCam').style.display = 'block';
    camReady = false;
  }
};
initCam();

// === ANALYSIS ===
// Sample center region of video and compute pseudo-metrics
function analyzeFrame(){
  if(!camReady) return null;
  const vw = video.videoWidth || 320;
  const vh = video.videoHeight || 240;
  snapCanvas.width = vw;
  snapCanvas.height = vh;
  snapCtx.drawImage(video, 0, 0, vw, vh);

  // Sample center circle region (~25% of frame)
  const cx = vw / 2, cy = vh / 2;
  const radius = Math.min(vw, vh) * 0.2;
  const samples = [];

  for(let i = 0; i < 300; i++){
    const angle = Math.random() * Math.PI * 2;
    const dist = Math.random() * radius;
    const px = Math.floor(cx + Math.cos(angle) * dist);
    const py = Math.floor(cy + Math.sin(angle) * dist);
    if(px < 0 || py < 0 || px >= vw || py >= vh) continue;
    const d = snapCtx.getImageData(px, py, 1, 1).data;
    samples.push({ r: d[0], g: d[1], b: d[2] });
  }

  if(samples.length < 50) return null;

  // Compute metrics
  let totalBright = 0, totalSat = 0, brightVariance = 0;
  const brights = [];

  for(const s of samples){
    const bright = (s.r + s.g + s.b) / 3;
    brights.push(bright);
    totalBright += bright;
    const max = Math.max(s.r, s.g, s.b);
    const min = Math.min(s.r, s.g, s.b);
    totalSat += max > 0 ? (max - min) / max : 0;
  }

  const avgBright = totalBright / samples.length;
  const avgSat = totalSat / samples.length;

  // Brightness variance (texture proxy)
  for(const b of brights) brightVariance += (b - avgBright) ** 2;
  brightVariance = Math.sqrt(brightVariance / brights.length);

  // Dominant hue
  let totalR = 0, totalG = 0, totalB = 0;
  for(const s of samples){ totalR += s.r; totalG += s.g; totalB += s.b; }
  const avgR = totalR / samples.length;
  const avgG = totalG / samples.length;
  const avgB = totalB / samples.length;

  // High shine spots (specular highlights)
  let hotspots = 0;
  for(const b of brights) if(b > 220) hotspots++;
  const shineRatio = hotspots / brights.length;

  return {
    brightness: avgBright,
    saturation: avgSat,
    variance: brightVariance,
    shineRatio,
    avgR, avgG, avgB,
  };
}

function computeVerdict(m){
  // Pseudo-science scoring (it's entertainment!)
  // Wax tends to be: shinier, more uniform color, higher saturation sometimes
  // Real tends to be: more texture variance, natural imperfections

  let waxScore = 0;

  // Shine analysis: high specular = waxy surface
  if(m.shineRatio > 0.15) waxScore += 30;
  else if(m.shineRatio > 0.08) waxScore += 15;
  else waxScore -= 10;

  // Color uniformity: low variance = suspiciously uniform = wax
  if(m.variance < 15) waxScore += 25;
  else if(m.variance < 25) waxScore += 10;
  else waxScore -= 15;

  // Saturation: overly saturated = might be painted
  if(m.saturation > 0.6) waxScore += 20;
  else if(m.saturation > 0.4) waxScore += 5;
  else waxScore -= 10;

  // Brightness: very bright and uniform = artificial
  if(m.brightness > 180 && m.variance < 20) waxScore += 15;

  // Add some chaos for fun
  waxScore += (Math.random() - 0.5) * 20;

  // Clamp 0-100
  const waxPct = Math.max(0, Math.min(100, 50 + waxScore));

  return {
    waxPct: Math.round(waxPct),
    shine: Math.round(m.shineRatio * 100),
    colorScore: Math.round(m.saturation * 100),
    texture: Math.round(m.variance),
  };
}

// === VERDICTS & COMMENTS ===
let currentMode = 'lab';

const COMMENTS = {
  lab: {
    real: [
      "Organic and authentic. Mother nature approved.",
      "Genuine produce detected. You may eat this.",
      "Natural imperfections confirm real fruit.",
      "Bio-signature valid. This fruit lived a full life.",
      "Texture analysis: real. Contains actual vitamins.",
      "Nature's work. No factory could replicate these blemishes.",
    ],
    wax: [
      "WAX ALERT. Do not consume. Display only.",
      "Suspiciously perfect. This fruit has never seen soil.",
      "Synthetic surface detected. It's decorative.",
      "Too shiny to be real. This came from a mold.",
      "WARNING: Petroleum-based fruit substitute detected.",
      "This fruit will outlive you. That's not natural.",
    ],
    mid: [
      "Inconclusive. Either very good wax or very suspicious fruit.",
      "Borderline reading. Try licking it (not legal advice).",
      "The scanner is confused. So is this fruit.",
      "50/50. Schrödinger's fruit — both real and wax until bitten.",
      "Ambiguous. Could be fruit, could be art. Who can say?",
      "The void stares back. This fruit defies classification.",
    ],
  },
  neon: {
    real: [
      "VIBES CLEAN. This fruit hits different.",
      "Certified organic drip. No cap.",
      "Neon-grade authenticity. It glows from within.",
      "Real fruit energy detected. Absolutely electric.",
      "Bio-luminescent signature confirmed. It's real.",
      "The frequencies don't lie. Nature made this one.",
    ],
    wax: [
      "FAKE DRIP DETECTED. It's giving plastic.",
      "This fruit is cosplaying. Not fooling the neon scanner.",
      "Synthetic aura exposure critical. Pure decoration.",
      "No life force readings. This is a wax impostor.",
      "UV scan reveals: factory-pressed fruit replica.",
      "The neon exposes all lies. This fruit is FABRICATED.",
    ],
    mid: [
      "Mixed frequencies. This fruit is in its experimental era.",
      "The neon can't decide. Quantum fruit situation.",
      "Flickering between real and fake. Trippy.",
      "Chromatic confusion. This fruit broke the scanner.",
      "Signal interference. Possibly from another dimension.",
      "Neither real nor fake — existing in the neon void.",
    ],
  },
  radioactive: {
    real: [
      "RADIATION CLEAR. Organic matter confirmed. Safe to consume.",
      "Geiger counter nominal. Biological specimen authentic.",
      "No synthetic isotopes detected. Fruit is non-irradiated.",
      "CONTAINMENT UNNECESSARY. Natural growth patterns confirmed.",
      "Molecular scan clean. This fruit predates the fallout.",
      "Radiation signature: background levels. Genuinely organic.",
    ],
    wax: [
      "☢️ CONTAMINATION DETECTED. Synthetic polymer fruit.",
      "WARNING: Petroleum compounds in fruit-shaped object.",
      "HAZMAT ALERT. This fruit is weapons-grade fake.",
      "Isotope scan reveals: industrial wax compound.",
      "DO NOT CONSUME. Radiation reveals artificial structure.",
      "DECONTAMINATION REQUIRED. This fruit is 100% fabricated.",
    ],
    mid: [
      "Readings unstable. Geiger counter malfunction possible.",
      "Half-life inconclusive. This fruit defies nuclear physics.",
      "Schrödinger's isotope — simultaneously decayed and fresh.",
      "Background radiation interference. Scan again in the bunker.",
      "Molecular structure ambiguous. Recommend bite test (hazmat suit on).",
      "CLASSIFICATION: UNKNOWN. Even radiation can't explain this fruit.",
    ],
  },
};

// Mode switching
document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentMode = btn.dataset.mode;
    document.body.className = currentMode === 'lab' ? '' : currentMode;
    scanLabel.textContent = currentMode === 'radioactive' ? 'GEIGER SCAN READY' : currentMode === 'neon' ? 'NEON SCAN READY' : 'POINT AT FRUIT';
    sfx(currentMode === 'radioactive' ? 200 : currentMode === 'neon' ? 800 : 500, 0.08, 'sine', 0.02);
  });
});

function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

// === SCAN FLOW ===
scanBtn.addEventListener('click', async ()=>{
  if(scanning) return;
  if(!camReady){ initCam(); return; }

  scanning = true;
  scanBtn.disabled = true;
  ring.className = 'scan-ring scanning';
  scanLabel.textContent = 'SCANNING...';
  verdictEl.textContent = 'Analyzing...';
  verdictEl.className = 'verdict mid';

  sfx(400, 0.1, 'sine', 0.02);

  // Fake multi-step scan for drama
  document.getElementById('mShine').textContent = '...';
  document.getElementById('mColor').textContent = '...';
  document.getElementById('mTexture').textContent = '...';

  await delay(600);
  const metrics = analyzeFrame();
  if(!metrics){
    verdictEl.textContent = 'No image data. Check camera.';
    verdictEl.className = 'verdict idle';
    ring.className = 'scan-ring';
    scanLabel.textContent = 'POINT AT FRUIT';
    scanning = false; scanBtn.disabled = false;
    return;
  }

  const result = computeVerdict(metrics);

  // Reveal metrics one by one
  sfx(600, 0.04, 'sine', 0.015);
  document.getElementById('mShine').textContent = result.shine + '%';
  document.getElementById('mShine').style.color = result.shine > 30 ? 'var(--wax)' : 'var(--real)';
  await delay(400);

  sfx(650, 0.04, 'sine', 0.015);
  document.getElementById('mColor').textContent = result.colorScore + '%';
  document.getElementById('mColor').style.color = result.colorScore > 50 ? 'var(--mid)' : 'var(--real)';
  await delay(400);

  sfx(700, 0.04, 'sine', 0.015);
  document.getElementById('mTexture').textContent = result.texture;
  document.getElementById('mTexture').style.color = result.texture < 20 ? 'var(--wax)' : 'var(--real)';
  await delay(500);

  // Final verdict
  const wax = result.waxPct;
  const theme = COMMENTS[currentMode] || COMMENTS.lab;
  let label, comment, cls;
  if(wax >= 65){
    label = currentMode === 'radioactive' ? `☢️ CONTAMINATED — ${wax}% synthetic` : currentMode === 'neon' ? `FAKE DRIP — ${wax}%` : `WAX — ${wax}% fake`;
    comment = pick(theme.wax);
    cls = 'wax';
    ring.className = 'scan-ring wax';
    sfx(currentMode === 'radioactive' ? 100 : 200, 0.15, 'sawtooth', 0.03);
  } else if(wax <= 35){
    label = currentMode === 'radioactive' ? `CLEAR — ${100-wax}% organic` : currentMode === 'neon' ? `REAL VIBES — ${100-wax}%` : `REAL — ${100-wax}% genuine`;
    comment = pick(theme.real);
    cls = 'real';
    ring.className = 'scan-ring real';
    sfx(500, 0.1, 'sine', 0.03); sfx(700, 0.08, 'sine', 0.02);
  } else {
    label = currentMode === 'radioactive' ? `UNSTABLE — ${wax}% anomalous` : currentMode === 'neon' ? `GLITCHED — ${wax}% ???` : `UNKNOWN — ${wax}% sus`;
    comment = pick(theme.mid);
    cls = 'mid';
    ring.className = 'scan-ring';
    sfx(350, 0.1, 'triangle', 0.02);
  }

  verdictEl.textContent = label;
  verdictEl.className = `verdict ${cls}`;
  scanLabel.textContent = comment;

  // History
  scanHistory.push(label);
  if(scanHistory.length > 5) scanHistory.shift();
  historyEl.textContent = 'Recent: ' + scanHistory.join(' · ');

  scanning = false;
  scanBtn.disabled = false;
});

function delay(ms){ return new Promise(r => setTimeout(r, ms)); }

})();
</script>
</body>
</html>
