<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Pixel Brawl</title>
<link rel="icon" href="https://emojicdn.elk.sh/👊">
<meta property="og:title" content="Pixel Brawl">
<meta property="og:description" content="Pixel-art fighting game — Leon vs Hunk. Punch, kick, and unleash special moves!">
<meta property="og:url" content="https://app.sloppy.live/pixel-brawl/">
<meta property="og:image" content="https://emojicdn.elk.sh/👊?style=google">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0a14;--ring:#1a1a2e;--rope:#8a6a30;
  --leon:#4488cc;--leon-dark:#2a5a8a;
  --hunk:#cc4444;--hunk-dark:#8a2a2a;
  --gold:#ffd700;--text:#aab;--dim:#445;
}
body{
  background:var(--bg);color:var(--text);
  font-family:'Silkscreen',monospace;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  overflow:hidden;touch-action:none;
}
.game-wrap{position:relative;width:100%;max-width:640px;margin:0 auto}
canvas{display:block;width:100%;image-rendering:pixelated;background:var(--ring)}

.hud{
  display:flex;justify-content:space-between;align-items:center;
  padding:6px 8px;max-width:640px;width:100%;gap:8px;
}
.hp-section{flex:1;display:flex;flex-direction:column;gap:2px}
.hp-section.right{align-items:flex-end}
.hp-name{font-family:'Press Start 2P',monospace;font-size:0.45rem;letter-spacing:0.05em}
.hp-bar-outer{
  width:100%;height:14px;background:#1a1a2e;border:1px solid #333;
  border-radius:2px;overflow:hidden;position:relative;
}
.hp-bar{height:100%;transition:width 0.3s;border-radius:1px}
.hp-bar.leon{background:linear-gradient(180deg,#5599dd,#3366aa)}
.hp-bar.hunk{background:linear-gradient(180deg,#dd5555,#aa3333)}
.sp-bar-outer{width:100%;height:6px;background:#111;border:1px solid #222;border-radius:1px;overflow:hidden}
.sp-bar{height:100%;transition:width 0.2s;border-radius:1px}
.sp-bar.leon{background:linear-gradient(180deg,#77ccff,#4488cc)}
.sp-bar.hunk{background:linear-gradient(180deg,#ff7777,#cc4444)}
.vs{font-family:'Press Start 2P',monospace;font-size:0.6rem;color:var(--gold);min-width:30px;text-align:center}

.screen{
  position:absolute;top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(10,10,20,0.92);z-index:10;text-align:center;padding:20px;
}
.screen.hidden{display:none}
.screen h2{font-family:'Press Start 2P',monospace;font-size:clamp(0.8rem,3vw,1.3rem);color:var(--gold);margin-bottom:14px;line-height:1.8}
.screen p{font-size:0.6rem;color:var(--dim);margin-bottom:8px;line-height:2}
.screen .controls-info{font-size:0.5rem;color:#556;line-height:2.2;margin-top:6px}
.play-btn{
  padding:10px 24px;border:2px solid var(--gold);border-radius:4px;
  background:transparent;color:var(--gold);font-family:'Press Start 2P',monospace;
  font-size:0.55rem;cursor:pointer;margin-top:10px;transition:all 0.2s;
}
.play-btn:hover{background:var(--gold);color:var(--bg)}

.mobile-controls{
  display:none;max-width:640px;width:100%;padding:6px;
  justify-content:space-between;align-items:center;
}
.m-group{display:flex;gap:4px;flex-wrap:wrap}
.m-btn{
  width:46px;height:46px;border:2px solid var(--dim);border-radius:6px;
  background:var(--ring);color:var(--dim);font-size:0.6rem;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none;
  font-family:'Silkscreen',monospace;
}
.m-btn:active{border-color:var(--gold);color:var(--gold)}
.m-btn.special{border-color:#a66;color:#a66;font-size:0.45rem}
.m-btn.special:active{border-color:#f84;color:#f84}

@media(max-width:600px){.mobile-controls{display:flex}}
.back-link{text-align:center;padding:6px}
.back-link a{color:var(--dim);text-decoration:none;font-size:0.5rem}
.back-link a:hover{color:var(--gold)}
</style>
</head>
<body>

<div class="hud">
  <div class="hp-section">
    <div class="hp-name" style="color:var(--leon)">LEON</div>
    <div class="hp-bar-outer"><div class="hp-bar leon" id="hp-leon" style="width:100%"></div></div>
    <div class="sp-bar-outer"><div class="sp-bar leon" id="sp-leon" style="width:0%"></div></div>
  </div>
  <div class="vs">VS</div>
  <div class="hp-section right">
    <div class="hp-name" style="color:var(--hunk)">HUNK</div>
    <div class="hp-bar-outer"><div class="hp-bar hunk" id="hp-hunk" style="width:100%"></div></div>
    <div class="sp-bar-outer"><div class="sp-bar hunk" id="sp-hunk" style="width:0%"></div></div>
  </div>
</div>

<div class="game-wrap">
  <canvas id="game"></canvas>

  <div class="screen" id="start-screen">
    <h2>PIXEL BRAWL</h2>
    <p>Leon vs Hunk</p>
    <div class="controls-info">
      P1 (Leon): WASD + F punch + G kick + H special<br>
      P2 (Hunk): Arrows + J punch + K kick + L special<br>
      Or play vs CPU!
    </div>
    <button class="play-btn" onclick="startGame(false)">VS CPU</button>
    <button class="play-btn" onclick="startGame(true)" style="margin-top:6px;border-color:var(--leon);color:var(--leon)">2 PLAYER</button>
  </div>

  <div class="screen hidden" id="win-screen">
    <h2 id="winner-text">WINNER!</h2>
    <button class="play-btn" onclick="document.getElementById('win-screen').classList.add('hidden');document.getElementById('start-screen').classList.remove('hidden')">MENU</button>
  </div>
</div>

<div class="mobile-controls" id="mobile-ctrl">
  <div class="m-group">
    <button class="m-btn" data-key="a">&#9664;</button>
    <button class="m-btn" data-key="d">&#9654;</button>
    <button class="m-btn" data-key="w">&#9650;</button>
  </div>
  <div class="m-group">
    <button class="m-btn" data-key="f">PNC</button>
    <button class="m-btn" data-key="g">KCK</button>
    <button class="m-btn special" data-key="h">SPL</button>
  </div>
</div>

<div class="back-link"><a href="https://sloppy.live">sloppy.live</a></div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const GW = 640, GH = 360;
canvas.width = GW; canvas.height = GH;

let state = 'menu', twoPlayer = false, frame = 0;
let fighters = [], particles = [], shakes = [], announceTimer = 0, announceText = '';

const GRAVITY = 0.5, GROUND = GH - 50;
const MAX_HP = 100, MAX_SP = 100;

// Fighter definition
function createFighter(id, x, dir) {
  return {
    id, x, y: GROUND, vx: 0, vy: 0, dir,
    w: 28, h: 48,
    hp: MAX_HP, sp: 0,
    state: 'idle', stateTimer: 0,
    attackHit: false, comboCount: 0, comboTimer: 0,
    blockTimer: 0, stunTimer: 0, hitstunTimer: 0,
    jumpCooldown: 0,
    // Animation
    animFrame: 0, animTimer: 0,
    // Colors
    bodyColor: id === 'leon' ? '#4488cc' : '#cc4444',
    bodyDark: id === 'leon' ? '#2a5a8a' : '#8a2a2a',
    skinColor: '#e8c8a0',
    hairColor: id === 'leon' ? '#8a6a30' : '#222',
    pantsColor: id === 'leon' ? '#2a3a5a' : '#2a2a2a',
    bootColor: id === 'leon' ? '#5a4a30' : '#333',
  };
}

function drawFighter(f) {
  ctx.save();
  const flip = f.dir;
  ctx.translate(f.x, f.y);
  if (flip < 0) ctx.scale(-1, 1);

  const flash = f.hitstunTimer > 0 && Math.floor(f.hitstunTimer / 2) % 2;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.fillRect(-12, -2, 24, 4);

  const bobY = f.state === 'idle' ? Math.sin(frame * 0.08 + (f.id === 'hunk' ? 2 : 0)) * 1.5 : 0;
  const attacking = f.state === 'punch' || f.state === 'kick' || f.state === 'special';
  const crouching = f.state === 'crouch';

  // Boots
  ctx.fillStyle = flash ? '#fff' : f.bootColor;
  const legSpread = f.state === 'walk' ? Math.sin(frame * 0.15) * 4 : 0;
  const kickExtend = f.state === 'kick' && f.stateTimer < 8 ? 10 : 0;
  ctx.fillRect(-7 + legSpread, -8 + bobY, 6, 8);
  ctx.fillRect(1 - legSpread + kickExtend * 0.3, -8 + bobY, 6 + kickExtend * 0.4, 8);

  // Legs/pants
  ctx.fillStyle = flash ? '#fcc' : f.pantsColor;
  const crouchOff = crouching ? 8 : 0;
  ctx.fillRect(-8 + legSpread, -18 + bobY + crouchOff, 7, 12);
  ctx.fillRect(1 - legSpread, -18 + bobY + crouchOff, 7 + kickExtend * 0.2, 12);

  // Torso
  ctx.fillStyle = flash ? '#fff' : f.bodyColor;
  const torsoY = -36 + bobY + crouchOff;
  ctx.fillRect(-9, torsoY, 18, 20);
  // Shirt detail
  ctx.fillStyle = flash ? '#faa' : f.bodyDark;
  ctx.fillRect(-9, torsoY, 3, 20);
  ctx.fillRect(6, torsoY, 3, 20);

  // Arms
  ctx.fillStyle = flash ? '#fcc' : f.skinColor;
  const punchExtend = f.state === 'punch' && f.stateTimer < 6 ? 14 : 0;
  const specialExtend = f.state === 'special' && f.stateTimer < 10 ? 18 : 0;
  // Back arm
  ctx.fillRect(-13, torsoY + 2, 5, 12);
  // Front arm (punching)
  ctx.fillRect(8, torsoY + 2, 5 + punchExtend + specialExtend, 5);
  if (punchExtend > 0 || specialExtend > 0) {
    // Fist
    ctx.fillStyle = flash ? '#fff' : (specialExtend > 0 ? '#ffd700' : f.skinColor);
    ctx.fillRect(12 + punchExtend + specialExtend, torsoY + 1, 5, 7);
  }

  // Special effect: energy aura
  if (f.state === 'special' && f.stateTimer < 15) {
    ctx.fillStyle = f.id === 'leon' ? 'rgba(68,136,204,0.3)' : 'rgba(204,68,68,0.3)';
    ctx.beginPath();
    ctx.arc(16 + specialExtend, torsoY + 5, 8 + f.stateTimer, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = f.id === 'leon' ? 'rgba(120,200,255,0.5)' : 'rgba(255,120,80,0.5)';
    ctx.beginPath();
    ctx.arc(16 + specialExtend, torsoY + 5, 4 + f.stateTimer * 0.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Head
  ctx.fillStyle = flash ? '#fcc' : f.skinColor;
  ctx.fillRect(-6, torsoY - 12, 12, 12);

  // Hair
  ctx.fillStyle = flash ? '#ddd' : f.hairColor;
  if (f.id === 'leon') {
    // Leon: swept hair
    ctx.fillRect(-7, torsoY - 14, 14, 5);
    ctx.fillRect(-7, torsoY - 14, 4, 8);
  } else {
    // Hunk: helmet/mask look
    ctx.fillRect(-7, torsoY - 14, 14, 6);
    ctx.fillRect(-7, torsoY - 14, 14, 3);
    // Mask
    ctx.fillStyle = flash ? '#aaa' : '#1a1a1a';
    ctx.fillRect(-5, torsoY - 6, 10, 4);
    ctx.fillStyle = flash ? '#fff' : '#444';
    ctx.fillRect(-3, torsoY - 5, 2, 2); // eye slit
    ctx.fillRect(2, torsoY - 5, 2, 2);
  }

  // Eyes (Leon only, Hunk has mask)
  if (f.id === 'leon') {
    ctx.fillStyle = '#fff';
    ctx.fillRect(-3, torsoY - 8, 3, 3);
    ctx.fillRect(2, torsoY - 8, 3, 3);
    ctx.fillStyle = '#234';
    ctx.fillRect(-2, torsoY - 7, 2, 2);
    ctx.fillRect(3, torsoY - 7, 2, 2);
  }

  // Block shield
  if (f.blockTimer > 0) {
    ctx.fillStyle = 'rgba(200,200,255,0.2)';
    ctx.fillRect(-14, torsoY - 4, 4, 24);
    ctx.strokeStyle = 'rgba(200,200,255,0.4)';
    ctx.lineWidth = 1;
    ctx.strokeRect(-14, torsoY - 4, 4, 24);
  }

  ctx.restore();
}

// Particles
function spawnHitParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y, vx: (Math.random() - 0.5) * 6, vy: -2 - Math.random() * 4,
      life: 15 + Math.random() * 10, maxLife: 25,
      color, size: 2 + Math.random() * 3
    });
  }
}

function spawnSpecialParticles(x, y, color) {
  for (let i = 0; i < 20; i++) {
    const a = (i / 20) * Math.PI * 2;
    particles.push({
      x, y, vx: Math.cos(a) * (3 + Math.random() * 4), vy: Math.sin(a) * (3 + Math.random() * 4),
      life: 20 + Math.random() * 15, maxLife: 35,
      color, size: 3 + Math.random() * 3
    });
  }
}

function announce(text, duration) {
  announceText = text;
  announceTimer = duration || 60;
}

// Combat
function tryAttack(attacker, defender, type) {
  if (attacker.attackHit) return;
  let range, dmg, knockback, stunDur;

  if (type === 'punch') {
    range = 35; dmg = 6; knockback = 3; stunDur = 10;
  } else if (type === 'kick') {
    range = 40; dmg = 8; knockback = 5; stunDur = 14;
  } else { // special
    range = 55; dmg = 18; knockback = 10; stunDur = 20;
  }

  const dx = (defender.x - attacker.x) * attacker.dir;
  const dy = Math.abs(defender.y - attacker.y);

  if (dx > 0 && dx < range && dy < 40) {
    // Hit!
    if (defender.blockTimer > 0) {
      dmg = Math.floor(dmg * 0.2);
      knockback *= 0.3;
      stunDur = 3;
      spawnHitParticles(defender.x - defender.dir * 10, defender.y - 30, '#aaf', 4);
    } else {
      spawnHitParticles(defender.x - defender.dir * 5, defender.y - 25, type === 'special' ? '#ffd700' : '#fff', type === 'special' ? 12 : 6);
      if (type === 'special') {
        spawnSpecialParticles(defender.x, defender.y - 25, attacker.id === 'leon' ? '#4488cc' : '#cc4444');
        shakes.push(8);
      } else {
        shakes.push(3);
      }
    }

    defender.hp = Math.max(0, defender.hp - dmg);
    defender.vx = attacker.dir * knockback;
    defender.vy = type === 'special' ? -4 : -1;
    defender.hitstunTimer = stunDur;
    defender.state = 'hitstun';
    defender.stateTimer = stunDur;
    attacker.sp = Math.min(MAX_SP, attacker.sp + (type === 'special' ? 0 : dmg * 1.5));
    attacker.attackHit = true;
    attacker.comboCount++;
    attacker.comboTimer = 40;

    if (attacker.comboCount >= 3) {
      announce(attacker.id.toUpperCase() + ' COMBO x' + attacker.comboCount + '!', 40);
    }
  }
}

// AI for CPU Hunk
function aiUpdate(cpu, opp) {
  const dx = opp.x - cpu.x;
  const dist = Math.abs(dx);

  // Face opponent
  cpu.dir = dx > 0 ? 1 : -1;

  if (cpu.hitstunTimer > 0 || cpu.stunTimer > 0) return {};

  const keys = {};

  // Approach
  if (dist > 60) {
    keys[dx > 0 ? 'ArrowRight' : 'ArrowLeft'] = true;
    if (Math.random() < 0.02 && cpu.y >= GROUND) keys['ArrowUp'] = true;
  }

  // Attack when in range
  if (dist < 50) {
    if (cpu.sp >= MAX_SP && Math.random() < 0.03) {
      keys['l'] = true; // special
    } else if (Math.random() < 0.06) {
      keys[Math.random() < 0.5 ? 'j' : 'k'] = true;
    }
    // Sometimes block
    if (opp.state === 'punch' || opp.state === 'kick' || opp.state === 'special') {
      if (Math.random() < 0.35) keys['ArrowDown'] = true;
    }
  }

  // Jump over projectiles / approach from air
  if (dist > 80 && dist < 150 && Math.random() < 0.01) {
    keys['ArrowUp'] = true;
  }

  // Retreat when low HP
  if (cpu.hp < 20 && dist < 40 && Math.random() < 0.1) {
    keys[dx > 0 ? 'ArrowLeft' : 'ArrowRight'] = true;
  }

  return keys;
}

// Controls mapping
const P1_MAP = { 'a': 'left', 'd': 'right', 'w': 'jump', 's': 'crouch', 'f': 'punch', 'g': 'kick', 'h': 'special' };
const P2_MAP = { 'ArrowLeft': 'left', 'ArrowRight': 'right', 'ArrowUp': 'jump', 'ArrowDown': 'crouch', 'j': 'punch', 'k': 'kick', 'l': 'special' };

let keys = {};

function getActions(fighter, keyMap, rawKeys) {
  const actions = {};
  for (const [key, action] of Object.entries(keyMap)) {
    if (rawKeys[key]) actions[action] = true;
  }
  return actions;
}

function updateFighter(f, actions) {
  // Timers
  if (f.hitstunTimer > 0) { f.hitstunTimer--; if (f.hitstunTimer <= 0) f.state = 'idle'; }
  if (f.stunTimer > 0) f.stunTimer--;
  if (f.stateTimer > 0) f.stateTimer--;
  if (f.jumpCooldown > 0) f.jumpCooldown--;
  if (f.comboTimer > 0) { f.comboTimer--; if (f.comboTimer <= 0) f.comboCount = 0; }
  if (f.blockTimer > 0) f.blockTimer--;

  // Can't act during hitstun
  if (f.hitstunTimer > 0) {
    f.x += f.vx;
    f.vx *= 0.85;
    f.y += f.vy;
    f.vy += GRAVITY;
    if (f.y >= GROUND) { f.y = GROUND; f.vy = 0; }
    f.x = Math.max(20, Math.min(GW - 20, f.x));
    return;
  }

  // State machine
  if (f.state === 'punch' || f.state === 'kick' || f.state === 'special') {
    if (f.stateTimer <= 0) { f.state = 'idle'; f.attackHit = false; }
    else {
      // Check hit on specific frames
      const hitFrame = f.state === 'special' ? 5 : 3;
      if (f.stateTimer === hitFrame) {
        const other = fighters.find(o => o.id !== f.id);
        tryAttack(f, other, f.state);
      }
    }
  } else {
    // Movement
    const onGround = f.y >= GROUND;
    const moveSpeed = 3;

    if (actions.left) { f.vx = -moveSpeed; f.state = 'walk'; }
    else if (actions.right) { f.vx = moveSpeed; f.state = 'walk'; }
    else { f.vx *= 0.7; if (Math.abs(f.vx) < 0.5) f.vx = 0; if (f.state === 'walk') f.state = 'idle'; }

    if (actions.crouch && onGround) {
      f.state = 'crouch';
      f.blockTimer = 5;
      f.vx *= 0.5;
    }

    if (actions.jump && onGround && f.jumpCooldown <= 0) {
      f.vy = -10;
      f.jumpCooldown = 15;
    }

    // Attacks
    if (actions.punch && f.state !== 'punch' && f.state !== 'kick' && f.state !== 'special' && onGround) {
      f.state = 'punch'; f.stateTimer = 10; f.attackHit = false;
    }
    if (actions.kick && f.state !== 'punch' && f.state !== 'kick' && f.state !== 'special' && onGround) {
      f.state = 'kick'; f.stateTimer = 14; f.attackHit = false;
    }
    if (actions.special && f.sp >= MAX_SP && f.state !== 'special' && onGround) {
      f.state = 'special'; f.stateTimer = 20; f.attackHit = false; f.sp = 0;
      announce(f.id.toUpperCase() + ' SPECIAL!', 30);
    }
  }

  // Physics
  f.x += f.vx;
  f.y += f.vy;
  f.vy += GRAVITY;
  if (f.y >= GROUND) { f.y = GROUND; f.vy = 0; }
  f.x = Math.max(20, Math.min(GW - 20, f.x));

  // Face opponent
  const other = fighters.find(o => o.id !== f.id);
  if (other && f.state !== 'punch' && f.state !== 'kick' && f.state !== 'special') {
    f.dir = other.x > f.x ? 1 : -1;
  }
}

// Game
window.startGame = function(tp) {
  twoPlayer = tp;
  fighters = [
    createFighter('leon', GW * 0.3, 1),
    createFighter('hunk', GW * 0.7, -1)
  ];
  particles = [];
  shakes = [];
  state = 'fight';
  announce('FIGHT!', 50);
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('win-screen').classList.add('hidden');
};

function checkWin() {
  const leon = fighters[0], hunk = fighters[1];
  if (leon.hp <= 0) {
    state = 'win';
    document.getElementById('winner-text').textContent = 'HUNK WINS!';
    document.getElementById('winner-text').style.color = 'var(--hunk)';
    document.getElementById('win-screen').classList.remove('hidden');
  } else if (hunk.hp <= 0) {
    state = 'win';
    document.getElementById('winner-text').textContent = 'LEON WINS!';
    document.getElementById('winner-text').style.color = 'var(--leon)';
    document.getElementById('win-screen').classList.remove('hidden');
  }
}

function updateHUD() {
  const leon = fighters[0], hunk = fighters[1];
  document.getElementById('hp-leon').style.width = (leon.hp / MAX_HP * 100) + '%';
  document.getElementById('hp-hunk').style.width = (hunk.hp / MAX_HP * 100) + '%';
  document.getElementById('sp-leon').style.width = (leon.sp / MAX_SP * 100) + '%';
  document.getElementById('sp-hunk').style.width = (hunk.sp / MAX_SP * 100) + '%';
}

function update() {
  if (state !== 'fight') return;
  frame++;

  // P1 (Leon)
  const p1Actions = getActions(fighters[0], P1_MAP, keys);
  updateFighter(fighters[0], p1Actions);

  // P2 (Hunk) or CPU
  let p2Keys = twoPlayer ? keys : aiUpdate(fighters[1], fighters[0]);
  const p2Actions = getActions(fighters[1], P2_MAP, p2Keys);
  updateFighter(fighters[1], p2Actions);

  // Particles
  particles.forEach(p => {
    p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life--;
  });
  particles = particles.filter(p => p.life > 0);

  if (announceTimer > 0) announceTimer--;

  updateHUD();
  checkWin();
}

function draw() {
  // Screen shake
  let shakeX = 0, shakeY = 0;
  if (shakes.length > 0) {
    const s = shakes[0];
    shakeX = (Math.random() - 0.5) * s;
    shakeY = (Math.random() - 0.5) * s;
    shakes[0]--;
    if (shakes[0] <= 0) shakes.shift();
  }

  ctx.save();
  ctx.translate(shakeX, shakeY);

  // Background — arena
  const bgGrad = ctx.createLinearGradient(0, 0, 0, GH);
  bgGrad.addColorStop(0, '#12122a');
  bgGrad.addColorStop(0.6, '#1a1a2e');
  bgGrad.addColorStop(1, '#0e0e1a');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, GW, GH);

  // Arena floor
  ctx.fillStyle = '#1e1e38';
  ctx.fillRect(0, GROUND, GW, GH - GROUND);
  ctx.strokeStyle = '#2a2a4a';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, GROUND);
  ctx.lineTo(GW, GROUND);
  ctx.stroke();

  // Floor markings
  ctx.strokeStyle = '#222240';
  ctx.setLineDash([8, 8]);
  ctx.beginPath();
  ctx.moveTo(GW / 2, GROUND + 5);
  ctx.lineTo(GW / 2, GH);
  ctx.stroke();
  ctx.setLineDash([]);

  // Ropes
  ctx.strokeStyle = 'rgba(138,106,48,0.3)';
  ctx.lineWidth = 2;
  for (let i = 0; i < 3; i++) {
    const ry = 60 + i * 50;
    ctx.beginPath();
    ctx.moveTo(10, ry);
    ctx.lineTo(GW - 10, ry);
    ctx.stroke();
  }

  // Corner posts
  ctx.fillStyle = '#444';
  ctx.fillRect(6, 40, 8, GROUND - 40);
  ctx.fillRect(GW - 14, 40, 8, GROUND - 40);

  if (state === 'menu') { ctx.restore(); return; }

  // Fighters
  fighters.forEach(drawFighter);

  // Particles
  particles.forEach(p => {
    const a = p.life / p.maxLife;
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  });
  ctx.globalAlpha = 1;

  // Combo display
  fighters.forEach(f => {
    if (f.comboCount >= 2 && f.comboTimer > 0) {
      ctx.fillStyle = f.id === 'leon' ? '#4488cc' : '#cc4444';
      ctx.font = '700 10px "Press Start 2P"';
      ctx.textAlign = 'center';
      const comboY = f.y - 65 - Math.sin(f.comboTimer * 0.1) * 3;
      ctx.fillText(f.comboCount + ' HIT', f.x, comboY);
    }
  });

  // Announcement
  if (announceTimer > 0) {
    ctx.fillStyle = `rgba(255,215,0,${Math.min(1, announceTimer / 10)})`;
    ctx.font = '700 20px "Press Start 2P"';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(announceText, GW / 2, GH / 2 - 40);
  }

  ctx.restore();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Input
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// Mobile (controls Leon — P1)
document.querySelectorAll('.m-btn').forEach(btn => {
  const k = btn.dataset.key;
  btn.addEventListener('touchstart', e => { e.preventDefault(); keys[k] = true; });
  btn.addEventListener('touchend', e => { e.preventDefault(); keys[k] = false; });
  btn.addEventListener('mousedown', () => { keys[k] = true; });
  btn.addEventListener('mouseup', () => { keys[k] = false; });
  btn.addEventListener('mouseleave', () => { keys[k] = false; });
});

loop();
</script>
</body>
</html>
