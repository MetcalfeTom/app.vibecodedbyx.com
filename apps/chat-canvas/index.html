<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Chat Canvas</title>
<link rel="icon" href="https://emojicdn.elk.sh/🎨" />
<meta name="description" content="Type words. Watch them become abstract geometric art." />
<meta property="og:title" content="Chat Canvas" />
<meta property="og:description" content="Type words. Watch them become abstract geometric art." />
<meta property="og:url" content="https://sloppy.live/chat-canvas" />
<meta property="og:image" content="https://sloppy.live/screenshots/chat-canvas.jpg" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Geist+Mono:wght@400;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #08070c;
    --surface: #0f0e16;
    --border: #1a1928;
    --dim: #4a4860;
    --text: #d4d0e8;
    --accent: #c084fc;
    --accent2: #38bdf8;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'Geist Mono', monospace;
    overflow: hidden;
    -webkit-tap-highlight-color: transparent;
  }
  body { display: flex; flex-direction: column; }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 10px 16px 8px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
  }
  .top-bar h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
    color: var(--accent);
    font-weight: 400;
    font-style: italic;
  }
  .top-bar a {
    color: var(--dim);
    text-decoration: none;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .top-bar a:hover { color: var(--accent); }

  .canvas-area {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }

  .chat-panel {
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    background: var(--surface);
    display: flex;
    flex-direction: column;
    max-height: 35vh;
  }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 8px 12px;
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-height: 60px;
    max-height: 20vh;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg {
    font-size: 12px;
    line-height: 1.5;
    display: flex;
    gap: 8px;
    align-items: baseline;
  }
  .msg .word-badge {
    display: inline-block;
    padding: 1px 6px;
    border-radius: 3px;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.04em;
  }
  .msg .shape-desc {
    color: var(--dim);
    font-size: 11px;
  }

  .input-row {
    display: flex;
    padding: 8px 12px;
    gap: 8px;
    border-top: 1px solid var(--border);
  }
  .input-row input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Geist Mono', monospace;
    font-size: 13px;
    padding: 8px 12px;
    border-radius: 6px;
    outline: none;
    transition: border-color 0.15s;
  }
  .input-row input::placeholder { color: var(--dim); }
  .input-row input:focus { border-color: var(--accent); }
  .input-row button {
    background: var(--accent);
    border: none;
    color: #fff;
    font-family: 'Geist Mono', monospace;
    font-weight: 600;
    font-size: 12px;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    transition: background 0.15s;
  }
  .input-row button:hover { background: #a855f7; }

  .controls {
    display: flex;
    justify-content: center;
    gap: 8px;
    padding: 6px 12px;
    border-top: 1px solid var(--border);
  }
  .controls button {
    background: none;
    border: 1px solid var(--border);
    color: var(--dim);
    font-family: 'Geist Mono', monospace;
    font-size: 10px;
    padding: 4px 10px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: color 0.15s, border-color 0.15s;
  }
  .controls button:hover { color: var(--accent); border-color: var(--accent); }

  .hint {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
    z-index: 5;
    transition: opacity 0.5s;
  }
  .hint h2 {
    font-family: 'Instrument Serif', serif;
    font-size: 28px;
    color: var(--accent);
    font-weight: 400;
    font-style: italic;
    margin-bottom: 8px;
  }
  .hint p {
    font-size: 12px;
    color: var(--dim);
    letter-spacing: 0.06em;
  }

  @media (max-width: 480px) {
    .top-bar h1 { font-size: 18px; }
    .hint h2 { font-size: 22px; }
  }
</style>
</head>
<body>
  <div class="top-bar">
    <h1>Chat Canvas</h1>
</div>
  <div class="canvas-area">
    <canvas id="canvas"></canvas>
    <div class="hint" id="hint">
      <h2>Type something</h2>
      <p>Each word becomes geometric art</p>
    </div>
  </div>
  <div class="chat-panel">
    <div class="messages" id="messages"></div>
    <div class="input-row">
      <input type="text" id="chatInput" placeholder="Type a word or sentence..." autocomplete="off" maxlength="200" />
      <button id="sendBtn">Send</button>
    </div>
    <div class="controls">
      <button id="btnClear">Clear Canvas</button>
      <button id="btnBg">Cycle BG</button>
      <button id="btnSave">Save PNG</button>
    </div>
  </div>

<script>
(() => {
'use strict';

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const messagesEl = document.getElementById('messages');
const chatInput = document.getElementById('chatInput');
const sendBtn = document.getElementById('sendBtn');
const hintEl = document.getElementById('hint');
const btnClear = document.getElementById('btnClear');
const btnBg = document.getElementById('btnBg');
const btnSave = document.getElementById('btnSave');

let W, H;
const shapes = []; // active animated shapes
const bgStyles = ['#08070c', '#0c0a14', '#0a1018', '#12080a', '#080c0a'];
let bgIdx = 0;
let wordCount = 0;

function resize() {
  const area = canvas.parentElement;
  W = canvas.width = area.clientWidth;
  H = canvas.height = area.clientHeight;
}
resize();
window.addEventListener('resize', resize);

// === Seeded hash from string ===
function hashStr(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = ((h << 5) - h + str.charCodeAt(i)) | 0;
  }
  return h;
}

// Simple seeded PRNG
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// === Color palette from word ===
const PALETTES = [
  ['#c084fc', '#a855f7', '#7c3aed', '#e9d5ff'],  // violet
  ['#38bdf8', '#0ea5e9', '#0284c7', '#bae6fd'],  // sky
  ['#f472b6', '#ec4899', '#db2777', '#fce7f3'],  // pink
  ['#34d399', '#10b981', '#059669', '#d1fae5'],  // emerald
  ['#fb923c', '#f97316', '#ea580c', '#fed7aa'],  // orange
  ['#facc15', '#eab308', '#ca8a04', '#fef9c3'],  // amber
  ['#f87171', '#ef4444', '#dc2626', '#fecaca'],  // red
  ['#a78bfa', '#8b5cf6', '#6d28d9', '#ddd6fe'],  // purple
  ['#2dd4bf', '#14b8a6', '#0d9488', '#ccfbf1'],  // teal
  ['#e879f9', '#d946ef', '#a21caf', '#fae8ff'],  // fuchsia
];

function getPalette(hash) {
  return PALETTES[((hash % PALETTES.length) + PALETTES.length) % PALETTES.length];
}

// === Shape types ===
const SHAPE_TYPES = [
  'circles', 'triangles', 'hexagons', 'stars', 'spirograph',
  'waves', 'diamonds', 'crosshatch', 'burst', 'rings',
  'shards', 'grid', 'petals', 'zigzag', 'constellation',
];

function getShapeType(hash) {
  return SHAPE_TYPES[((hash % SHAPE_TYPES.length) + SHAPE_TYPES.length) % SHAPE_TYPES.length];
}

// === Generate shapes from a word ===
function wordToShapes(word) {
  const hash = hashStr(word);
  const rng = mulberry32(hash);
  const palette = getPalette(hash);
  const shapeType = getShapeType(Math.abs(hash >> 4));
  const cx = rng() * W * 0.7 + W * 0.15;
  const cy = rng() * H * 0.7 + H * 0.15;
  const baseSize = 30 + word.length * 8 + rng() * 40;
  const count = Math.min(3 + Math.floor(word.length * 1.5), 20);
  const rotation = rng() * Math.PI * 2;

  const newShapes = [];

  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2 + rotation;
    const dist = rng() * baseSize * 0.6;
    const x = cx + Math.cos(angle) * dist;
    const y = cy + Math.sin(angle) * dist;
    const size = baseSize * (0.3 + rng() * 0.7);
    const color = palette[Math.floor(rng() * palette.length)];
    const alpha = 0.15 + rng() * 0.5;
    const rotSpeed = (rng() - 0.5) * 0.01;
    const charCode = word.charCodeAt(i % word.length);

    newShapes.push({
      type: shapeType,
      x, y, size,
      color, alpha,
      rot: angle,
      rotSpeed,
      sides: 3 + (charCode % 6),
      phase: rng() * Math.PI * 2,
      birth: performance.now(),
      lifetime: 8000 + rng() * 12000,
      pulseSpeed: 0.5 + rng() * 2,
      innerRatio: 0.3 + rng() * 0.4,
      word,
    });
  }

  return { shapes: newShapes, type: shapeType, palette };
}

// === Draw a single shape ===
function drawShape(s, t) {
  const age = t - s.birth;
  const lifeRatio = age / s.lifetime;
  if (lifeRatio > 1) return false; // dead

  const fadeIn = Math.min(1, age / 600);
  const fadeOut = lifeRatio > 0.8 ? 1 - (lifeRatio - 0.8) / 0.2 : 1;
  const alpha = s.alpha * fadeIn * fadeOut;
  if (alpha <= 0) return false;

  const pulse = 1 + Math.sin(age * 0.001 * s.pulseSpeed + s.phase) * 0.08;
  const size = s.size * pulse;
  const rot = s.rot + age * s.rotSpeed;

  ctx.save();
  ctx.translate(s.x, s.y);
  ctx.rotate(rot);
  ctx.globalAlpha = alpha;

  switch (s.type) {
    case 'circles':
      ctx.beginPath();
      ctx.arc(0, 0, size * 0.4, 0, Math.PI * 2);
      ctx.strokeStyle = s.color;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(0, 0, size * 0.15, 0, Math.PI * 2);
      ctx.fillStyle = s.color;
      ctx.fill();
      break;

    case 'triangles':
      ctx.beginPath();
      for (let i = 0; i < 3; i++) {
        const a = (i / 3) * Math.PI * 2 - Math.PI / 2;
        const px = Math.cos(a) * size * 0.4;
        const py = Math.sin(a) * size * 0.4;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.strokeStyle = s.color;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      break;

    case 'hexagons':
      ctx.beginPath();
      for (let i = 0; i < 6; i++) {
        const a = (i / 6) * Math.PI * 2;
        const px = Math.cos(a) * size * 0.35;
        const py = Math.sin(a) * size * 0.35;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fillStyle = s.color;
      ctx.globalAlpha = alpha * 0.3;
      ctx.fill();
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = s.color;
      ctx.lineWidth = 1;
      ctx.stroke();
      break;

    case 'stars': {
      ctx.beginPath();
      const points = s.sides;
      for (let i = 0; i < points * 2; i++) {
        const a = (i / (points * 2)) * Math.PI * 2 - Math.PI / 2;
        const r = i % 2 === 0 ? size * 0.4 : size * 0.15;
        const px = Math.cos(a) * r;
        const py = Math.sin(a) * r;
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.strokeStyle = s.color;
      ctx.lineWidth = 1;
      ctx.stroke();
      break;
    }

    case 'spirograph': {
      ctx.beginPath();
      const steps = 60;
      const R = size * 0.3;
      const r = size * s.innerRatio * 0.3;
      const d = size * 0.2;
      for (let i = 0; i <= steps; i++) {
        const t2 = (i / steps) * Math.PI * 4;
        const px = (R - r) * Math.cos(t2) + d * Math.cos(((R - r) / r) * t2);
        const py = (R - r) * Math.sin(t2) - d * Math.sin(((R - r) / r) * t2);
        i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
      }
      ctx.strokeStyle = s.color;
      ctx.lineWidth = 1;
      ctx.stroke();
      break;
    }

    case 'waves': {
      ctx.beginPath();
      const wLen = size * 0.8;
      for (let i = 0; i <= 30; i++) {
        const x2 = (i / 30 - 0.5) * wLen;
        const y2 = Math.sin(i * 0.5 + s.phase) * size * 0.15;
        i === 0 ? ctx.moveTo(x2, y2) : ctx.lineTo(x2, y2);
      }
      ctx.strokeStyle = s.color;
      ctx.lineWidth = 2;
      ctx.stroke();
      break;
    }

    case 'diamonds':
      ctx.beginPath();
      const dw = size * 0.25, dh = size * 0.4;
      ctx.moveTo(0, -dh); ctx.lineTo(dw, 0);
      ctx.lineTo(0, dh); ctx.lineTo(-dw, 0);
      ctx.closePath();
      ctx.fillStyle = s.color;
      ctx.globalAlpha = alpha * 0.25;
      ctx.fill();
      ctx.globalAlpha = alpha;
      ctx.strokeStyle = s.color;
      ctx.lineWidth = 1;
      ctx.stroke();
      break;

    case 'crosshatch': {
      const ext = size * 0.3;
      ctx.strokeStyle = s.color;
      ctx.lineWidth = 0.8;
      for (let i = -2; i <= 2; i++) {
        ctx.beginPath();
        ctx.moveTo(-ext, i * ext * 0.4);
        ctx.lineTo(ext, i * ext * 0.4);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(i * ext * 0.4, -ext);
        ctx.lineTo(i * ext * 0.4, ext);
        ctx.stroke();
      }
      break;
    }

    case 'burst': {
      const rays = s.sides + 4;
      ctx.strokeStyle = s.color;
      ctx.lineWidth = 1;
      for (let i = 0; i < rays; i++) {
        const a = (i / rays) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(Math.cos(a) * size * 0.4, Math.sin(a) * size * 0.4);
        ctx.stroke();
      }
      break;
    }

    case 'rings':
      for (let i = 3; i > 0; i--) {
        ctx.beginPath();
        ctx.arc(0, 0, size * 0.12 * i, 0, Math.PI * 2);
        ctx.strokeStyle = s.color;
        ctx.lineWidth = 1;
        ctx.globalAlpha = alpha * (i / 3);
        ctx.stroke();
      }
      break;

    case 'shards': {
      const shardCount = s.sides;
      ctx.fillStyle = s.color;
      for (let i = 0; i < shardCount; i++) {
        const a = (i / shardCount) * Math.PI * 2;
        const len = size * (0.2 + s.innerRatio * 0.3);
        ctx.save();
        ctx.rotate(a);
        ctx.globalAlpha = alpha * 0.4;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(-size * 0.05, len);
        ctx.lineTo(size * 0.05, len);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
      break;
    }

    case 'grid': {
      const gs = 3;
      const cell = size * 0.2;
      ctx.fillStyle = s.color;
      for (let gx = -gs; gx <= gs; gx++) {
        for (let gy = -gs; gy <= gs; gy++) {
          if ((gx + gy) % 2 === 0) {
            ctx.globalAlpha = alpha * 0.3;
            ctx.fillRect(gx * cell - cell * 0.3, gy * cell - cell * 0.3, cell * 0.6, cell * 0.6);
          }
        }
      }
      break;
    }

    case 'petals': {
      const petalCount = s.sides;
      ctx.fillStyle = s.color;
      for (let i = 0; i < petalCount; i++) {
        const a = (i / petalCount) * Math.PI * 2;
        ctx.save();
        ctx.rotate(a);
        ctx.globalAlpha = alpha * 0.35;
        ctx.beginPath();
        ctx.ellipse(0, -size * 0.2, size * 0.06, size * 0.2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
      break;
    }

    case 'zigzag': {
      ctx.beginPath();
      const segs = 8;
      const zw = size * 0.6;
      const zh = size * 0.15;
      for (let i = 0; i <= segs; i++) {
        const zx = (i / segs - 0.5) * zw;
        const zy = (i % 2 === 0 ? -zh : zh);
        i === 0 ? ctx.moveTo(zx, zy) : ctx.lineTo(zx, zy);
      }
      ctx.strokeStyle = s.color;
      ctx.lineWidth = 2;
      ctx.stroke();
      break;
    }

    case 'constellation': {
      const pts = [];
      const rng2 = mulberry32(hashStr(s.word + s.phase));
      for (let i = 0; i < s.sides + 2; i++) {
        pts.push({
          x: (rng2() - 0.5) * size * 0.7,
          y: (rng2() - 0.5) * size * 0.7,
        });
      }
      ctx.strokeStyle = s.color;
      ctx.lineWidth = 0.8;
      ctx.fillStyle = s.color;
      // Lines between nearby points
      for (let i = 0; i < pts.length; i++) {
        for (let j = i + 1; j < pts.length; j++) {
          const dx = pts[i].x - pts[j].x;
          const dy = pts[i].y - pts[j].y;
          if (Math.sqrt(dx*dx + dy*dy) < size * 0.45) {
            ctx.globalAlpha = alpha * 0.3;
            ctx.beginPath();
            ctx.moveTo(pts[i].x, pts[i].y);
            ctx.lineTo(pts[j].x, pts[j].y);
            ctx.stroke();
          }
        }
      }
      // Dots
      ctx.globalAlpha = alpha;
      pts.forEach(p => {
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
        ctx.fill();
      });
      break;
    }
  }

  ctx.restore();
  return true; // still alive
}

// === Glow effect behind shapes ===
function drawGlow(s, t) {
  const age = t - s.birth;
  const lifeRatio = age / s.lifetime;
  if (lifeRatio > 1) return;
  const fadeIn = Math.min(1, age / 800);
  const fadeOut = lifeRatio > 0.7 ? 1 - (lifeRatio - 0.7) / 0.3 : 1;
  const alpha = 0.06 * fadeIn * fadeOut;
  if (alpha <= 0) return;

  const grd = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.size * 0.8);
  grd.addColorStop(0, s.color);
  grd.addColorStop(1, 'transparent');
  ctx.globalAlpha = alpha;
  ctx.fillStyle = grd;
  ctx.fillRect(s.x - s.size, s.y - s.size, s.size * 2, s.size * 2);
}

// === Main render loop ===
function draw() {
  const t = performance.now();

  // Semi-transparent clear for trail effect
  ctx.fillStyle = bgStyles[bgIdx];
  ctx.globalAlpha = 0.08;
  ctx.fillRect(0, 0, W, H);
  ctx.globalAlpha = 1;

  // Draw glows first
  shapes.forEach(s => drawGlow(s, t));

  // Draw shapes, remove dead ones
  for (let i = shapes.length - 1; i >= 0; i--) {
    if (!drawShape(shapes[i], t)) {
      shapes.splice(i, 1);
    }
  }

  requestAnimationFrame(draw);
}

// === Process chat input ===
function processMessage(text) {
  const words = text.trim().split(/\s+/).filter(w => w.length > 0);
  if (!words.length) return;

  hintEl.style.opacity = '0';
  setTimeout(() => { hintEl.style.display = 'none'; }, 500);

  words.forEach((word, i) => {
    setTimeout(() => {
      const clean = word.replace(/[^a-zA-Z0-9]/g, '') || word;
      const result = wordToShapes(clean.toLowerCase());
      shapes.push(...result.shapes);
      wordCount++;

      // Add message to chat
      const msg = document.createElement('div');
      msg.className = 'msg';
      const badge = document.createElement('span');
      badge.className = 'word-badge';
      badge.textContent = word;
      badge.style.background = result.palette[0] + '22';
      badge.style.color = result.palette[0];
      badge.style.border = `1px solid ${result.palette[0]}44`;
      const desc = document.createElement('span');
      desc.className = 'shape-desc';
      desc.textContent = `→ ${result.type} (${result.shapes.length} forms)`;
      msg.appendChild(badge);
      msg.appendChild(desc);
      messagesEl.appendChild(msg);
      messagesEl.scrollTop = messagesEl.scrollHeight;

      // Keep message history manageable
      while (messagesEl.children.length > 50) {
        messagesEl.removeChild(messagesEl.firstChild);
      }
    }, i * 200); // stagger words
  });
}

function send() {
  const text = chatInput.value.trim();
  if (!text) return;
  processMessage(text);
  chatInput.value = '';
  chatInput.focus();
}

sendBtn.addEventListener('click', send);
chatInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') send();
});

btnClear.addEventListener('click', () => {
  shapes.length = 0;
  ctx.fillStyle = bgStyles[bgIdx];
  ctx.globalAlpha = 1;
  ctx.fillRect(0, 0, W, H);
});

btnBg.addEventListener('click', () => {
  bgIdx = (bgIdx + 1) % bgStyles.length;
  ctx.fillStyle = bgStyles[bgIdx];
  ctx.globalAlpha = 1;
  ctx.fillRect(0, 0, W, H);
});

btnSave.addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = 'chat-canvas.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
});

// Initial clear
ctx.fillStyle = bgStyles[bgIdx];
ctx.fillRect(0, 0, W, H);

// Focus input
chatInput.focus();

// Start render
draw();

// Auto-seed with a welcome word
setTimeout(() => {
  if (wordCount === 0) {
    // Don't auto-seed, let user discover
  }
}, 2000);

})();
</script>
</body>
