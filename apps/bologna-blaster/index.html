<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bologna Blaster</title>
<link rel="icon" href="https://emojicdn.elk.sh/🌭">
<meta property="og:title" content="Bologna Blaster">
<meta property="og:description" content="Retro Galaga shooter — pilot a bologna sausage against waves of angry beans.">
<meta property="og:url" content="https://app.sloppy.live/bologna-blaster/">
<meta property="og:image" content="https://emojicdn.elk.sh/🌭?style=google">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0612;--surface:#12091e;--border:#261845;
  --pink:#ff6b9d;--mustard:#ffd93d;--meat:#e8845c;
  --bean-green:#7ec850;--bean-brown:#a0522d;--bean-red:#d44;
  --text:#d0b8e8;--dim:#5a3d7a;
}
body{
  background:var(--bg);color:var(--text);
  font-family:'Silkscreen',monospace;
  min-height:100vh;display:flex;flex-direction:column;
  align-items:center;overflow:hidden;
  touch-action:none;
}
.game-wrap{position:relative;width:100%;max-width:720px;margin:0 auto}
canvas{display:block;width:100%;image-rendering:pixelated;background:#0a0612;border:1px solid var(--border)}

/* HUD overlay */
.hud{
  display:flex;justify-content:space-between;padding:6px 10px;
  font-family:'Press Start 2P',monospace;font-size:0.5rem;
  color:var(--mustard);max-width:720px;width:100%;
}
.hud-lives span{color:var(--meat)}

/* Screens */
.screen{
  position:absolute;top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(10,6,18,0.92);z-index:10;text-align:center;
  padding:20px;
}
.screen.hidden{display:none}
.screen h2{
  font-family:'Press Start 2P',monospace;font-size:clamp(0.9rem,3vw,1.4rem);
  color:var(--pink);margin-bottom:16px;line-height:1.6;
}
.screen p{font-size:0.7rem;color:var(--dim);margin-bottom:12px;line-height:1.8}
.screen .score-display{
  font-family:'Press Start 2P',monospace;font-size:1.2rem;
  color:var(--mustard);margin:12px 0;
}
.play-btn{
  padding:12px 28px;border:2px solid var(--pink);border-radius:4px;
  background:transparent;color:var(--pink);font-family:'Press Start 2P',monospace;
  font-size:0.65rem;cursor:pointer;transition:all 0.2s;margin-top:8px;
}
.play-btn:hover{background:var(--pink);color:var(--bg)}

/* Mobile controls */
.mobile-controls{
  display:none;max-width:720px;width:100%;padding:8px 4px;
  justify-content:space-between;align-items:center;
}
.ctrl-group{display:flex;gap:6px}
.ctrl-btn{
  width:52px;height:52px;border:2px solid var(--border);border-radius:8px;
  background:var(--surface);color:var(--dim);font-size:1.4rem;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  user-select:none;
}
.ctrl-btn:active{border-color:var(--pink);color:var(--pink);background:rgba(255,107,157,0.08)}
.fire-btn{
  width:72px;height:52px;border-color:var(--meat);color:var(--meat);
  font-family:'Silkscreen',monospace;font-size:0.6rem;
}
.fire-btn:active{border-color:var(--mustard);color:var(--mustard);background:rgba(255,217,61,0.08)}

@media(max-width:600px){.mobile-controls{display:flex}}
@media(min-height:700px){canvas{max-height:70vh}}

.back-link{text-align:center;padding:8px;position:relative;z-index:5}
.back-link a{color:var(--dim);text-decoration:none;font-size:0.5rem}
.back-link a:hover{color:var(--pink)}
</style>
</head>
<body>

<div class="hud">
  <div>SCORE <span id="hud-score" style="color:var(--mustard)">0</span></div>
  <div>WAVE <span id="hud-wave" style="color:var(--bean-green)">1</span></div>
  <div class="hud-lives">LIVES <span id="hud-lives">|||</span></div>
</div>

<div class="game-wrap">
  <canvas id="game"></canvas>

  <div class="screen" id="start-screen">
    <h2>BOLOGNA<br>BLASTER</h2>
    <p>Pilot your bologna against<br>waves of angry beans!</p>
    <p>Arrow keys / WASD to move<br>Space / Z to fire</p>
    <button class="play-btn" onclick="startGame()">START</button>
  </div>

  <div class="screen hidden" id="gameover-screen">
    <h2>GAME OVER</h2>
    <div class="score-display" id="final-score">0</div>
    <p id="final-wave">Wave 1</p>
    <button class="play-btn" onclick="startGame()">RETRY</button>
  </div>
</div>

<div class="mobile-controls" id="mobile-ctrl">
  <div class="ctrl-group">
    <button class="ctrl-btn" data-dir="left">&#9664;</button>
    <button class="ctrl-btn" data-dir="right">&#9654;</button>
  </div>
  <button class="ctrl-btn fire-btn" data-dir="fire">FIRE</button>
</div>

<div class="back-link"><a href="https://sloppy.live">sloppy.live</a></div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

// Game dimensions
const GW = 720, GH = 640;
canvas.width = GW; canvas.height = GH;

// State
let state = 'start'; // start, playing, gameover
let score = 0, wave = 1, lives = 3;
let player, bullets, beans, beanBullets, particles, stars;
let beanDir = 1, beanDropTimer = 0, beanShootTimer = 0;
let frameCount = 0, hiScore = 0;
let keys = {};

try {
  const hs = localStorage.getItem('bologna-blaster-hi');
  if (hs) hiScore = parseInt(hs) || 0;
} catch(e) {}

// Stars background
function initStars() {
  stars = [];
  for (let i = 0; i < 60; i++) {
    stars.push({
      x: Math.random() * GW,
      y: Math.random() * GH,
      speed: 0.2 + Math.random() * 0.8,
      size: Math.random() < 0.3 ? 2 : 1,
      brightness: 0.3 + Math.random() * 0.7
    });
  }
}
initStars();

// Player (bologna sausage)
function initPlayer() {
  player = { x: GW / 2, y: GH - 60, w: 36, h: 14, speed: 4.5, cooldown: 0, invincible: 0 };
}

function drawBologna(x, y, w, h, flash) {
  // Main sausage body - oval
  const cx = x, cy = y;
  ctx.save();

  // Shadow
  ctx.fillStyle = 'rgba(180,80,40,0.3)';
  ctx.beginPath();
  ctx.ellipse(cx, cy + 3, w / 2 + 2, h / 2 + 2, 0, 0, Math.PI * 2);
  ctx.fill();

  // Main body
  const grad = ctx.createLinearGradient(cx, cy - h / 2, cx, cy + h / 2);
  grad.addColorStop(0, flash ? '#fff' : '#f0a07a');
  grad.addColorStop(0.3, flash ? '#fcc' : '#e8845c');
  grad.addColorStop(0.7, flash ? '#faa' : '#d06a3c');
  grad.addColorStop(1, flash ? '#f88' : '#b05530');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.ellipse(cx, cy, w / 2, h / 2, 0, 0, Math.PI * 2);
  ctx.fill();

  // Specks (fat spots)
  ctx.fillStyle = 'rgba(255,200,170,0.5)';
  for (let i = 0; i < 5; i++) {
    const sx = cx - w / 3 + (i * w / 4) + Math.sin(i * 2.3) * 3;
    const sy = cy + Math.cos(i * 1.7) * 3;
    ctx.beginPath();
    ctx.arc(sx, sy, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // Casing outline
  ctx.strokeStyle = '#a04520';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.ellipse(cx, cy, w / 2, h / 2, 0, 0, Math.PI * 2);
  ctx.stroke();

  // Shine
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.beginPath();
  ctx.ellipse(cx - w / 6, cy - h / 4, w / 4, h / 6, -0.2, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// Bean types
const BEAN_TYPES = [
  { name: 'green', color: '#7ec850', dark: '#4a8a20', hp: 1, points: 100 },
  { name: 'kidney', color: '#c0392b', dark: '#8b1a1a', hp: 1, points: 150 },
  { name: 'brown', color: '#a0522d', dark: '#6b3410', hp: 2, points: 200 },
  { name: 'black', color: '#2c2c2c', dark: '#111', hp: 3, points: 300 },
  { name: 'golden', color: '#ffd700', dark: '#b8960f', hp: 1, points: 500 },
];

function drawBean(x, y, type, frame, hit) {
  ctx.save();
  const bt = BEAN_TYPES[type];

  // Bean body (kidney shape)
  const wobble = Math.sin(frame * 0.08) * 1.5;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(x, y + 12, 10, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Main bean shape
  ctx.fillStyle = hit ? '#fff' : bt.color;
  ctx.beginPath();
  ctx.moveTo(x - 8, y + wobble);
  ctx.quadraticCurveTo(x - 10, y - 12, x - 2, y - 14 + wobble);
  ctx.quadraticCurveTo(x + 2, y - 8, x + 2, y - 4 + wobble);
  ctx.quadraticCurveTo(x + 2, y - 8, x + 6, y - 12 + wobble);
  ctx.quadraticCurveTo(x + 12, y - 6, x + 8, y + 4 + wobble);
  ctx.quadraticCurveTo(x + 6, y + 12, x, y + 10 + wobble);
  ctx.quadraticCurveTo(x - 6, y + 12, x - 8, y + wobble);
  ctx.fill();

  // Dark side
  ctx.fillStyle = hit ? '#fcc' : bt.dark;
  ctx.globalAlpha = 0.3;
  ctx.beginPath();
  ctx.moveTo(x + 2, y - 4 + wobble);
  ctx.quadraticCurveTo(x + 2, y - 8, x + 6, y - 12 + wobble);
  ctx.quadraticCurveTo(x + 12, y - 6, x + 8, y + 4 + wobble);
  ctx.quadraticCurveTo(x + 6, y + 12, x, y + 10 + wobble);
  ctx.quadraticCurveTo(x - 2, y + 8, x + 2, y - 4 + wobble);
  ctx.fill();
  ctx.globalAlpha = 1;

  // Indentation line
  ctx.strokeStyle = bt.dark;
  ctx.lineWidth = 1;
  ctx.globalAlpha = 0.4;
  ctx.beginPath();
  ctx.moveTo(x - 1, y - 10 + wobble);
  ctx.quadraticCurveTo(x + 1, y, x - 1, y + 8 + wobble);
  ctx.stroke();
  ctx.globalAlpha = 1;

  // Angry eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(x - 3, y - 4 + wobble, 2.5, 0, Math.PI * 2);
  ctx.arc(x + 4, y - 4 + wobble, 2.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#111';
  ctx.beginPath();
  ctx.arc(x - 3, y - 3.5 + wobble, 1.2, 0, Math.PI * 2);
  ctx.arc(x + 4, y - 3.5 + wobble, 1.2, 0, Math.PI * 2);
  ctx.fill();

  // Angry eyebrows
  ctx.strokeStyle = '#111';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(x - 5.5, y - 7 + wobble);
  ctx.lineTo(x - 1, y - 6 + wobble);
  ctx.moveTo(x + 6, y - 7 + wobble);
  ctx.lineTo(x + 2, y - 6 + wobble);
  ctx.stroke();

  ctx.restore();
}

// Spawn wave
function spawnWave() {
  beans = [];
  const rows = Math.min(3 + Math.floor(wave / 2), 6);
  const cols = Math.min(6 + Math.floor(wave / 3), 10);
  const spacing = 42;
  const startX = (GW - (cols - 1) * spacing) / 2;
  const startY = 50;

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      // Choose type based on row and wave
      let type = 0;
      if (wave >= 3 && r === 0) type = 3; // black beans in front row
      else if (wave >= 2 && r <= 1) type = 2; // brown
      else if (r % 2 === 0) type = 1; // kidney
      // Golden bean: rare
      if (wave >= 2 && Math.random() < 0.05) type = 4;

      beans.push({
        x: startX + c * spacing,
        y: startY + r * spacing,
        type,
        hp: BEAN_TYPES[type].hp,
        alive: true,
        hitFlash: 0,
        enterDelay: (r * cols + c) * 2
      });
    }
  }
  beanDir = 1;
  beanDropTimer = 0;
  beanShootTimer = 0;
}

// Bullet (player)
function fireBullet() {
  if (player.cooldown > 0) return;
  bullets.push({ x: player.x, y: player.y - player.h / 2 - 4, speed: 4 });
  player.cooldown = 10;
}

// Particles
function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 5,
      vy: (Math.random() - 0.5) * 5 - 2,
      life: 20 + Math.random() * 20,
      maxLife: 40,
      color,
      size: 1 + Math.random() * 3
    });
  }
}

function spawnBeanExplosion(x, y, type) {
  const bt = BEAN_TYPES[type];
  spawnParticles(x, y, bt.color, 12);
  spawnParticles(x, y, bt.dark, 6);
  spawnParticles(x, y, '#fff', 3);
}

// Init game
window.startGame = function() {
  state = 'playing';
  score = 0;
  wave = 1;
  lives = 3;
  bullets = [];
  beanBullets = [];
  particles = [];
  initPlayer();
  spawnWave();
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('gameover-screen').classList.add('hidden');
  updateHUD();
};

function gameOver() {
  state = 'gameover';
  if (score > hiScore) {
    hiScore = score;
    try { localStorage.setItem('bologna-blaster-hi', hiScore); } catch(e) {}
  }
  document.getElementById('final-score').textContent = score;
  document.getElementById('final-wave').textContent = 'Wave ' + wave + (score >= hiScore && score > 0 ? ' - NEW HI!' : '');
  document.getElementById('gameover-screen').classList.remove('hidden');
}

function updateHUD() {
  document.getElementById('hud-score').textContent = score;
  document.getElementById('hud-wave').textContent = wave;
  document.getElementById('hud-lives').textContent = '|'.repeat(Math.max(0, lives));
}

// Update
function update() {
  if (state !== 'playing') return;
  frameCount++;

  // Player movement
  let dx = 0;
  if (keys['ArrowLeft'] || keys['a'] || keys['A'] || keys['mLeft']) dx = -player.speed;
  if (keys['ArrowRight'] || keys['d'] || keys['D'] || keys['mRight']) dx = player.speed;
  player.x += dx;
  player.x = Math.max(player.w / 2 + 4, Math.min(GW - player.w / 2 - 4, player.x));

  if (player.cooldown > 0) player.cooldown--;
  if (player.invincible > 0) player.invincible--;

  if (keys[' '] || keys['z'] || keys['Z'] || keys['mFire']) fireBullet();

  // Bullets
  bullets.forEach(b => b.y -= b.speed);
  bullets = bullets.filter(b => b.y > -10);

  // Bean bullets
  beanBullets.forEach(b => { b.y += b.speed; b.x += b.vx || 0; });
  beanBullets = beanBullets.filter(b => b.y < GH + 10);

  // Bean movement
  const aliveCount = beans.filter(b => b.alive).length;
  const speedMul = 1 + (wave - 1) * 0.15 + (1 - aliveCount / Math.max(beans.length, 1)) * 1.5;
  const moveSpeed = (0.25 + wave * 0.05) * speedMul;

  let hitEdge = false;
  beans.forEach(b => {
    if (!b.alive || b.enterDelay > 0) { b.enterDelay--; return; }
    b.x += beanDir * moveSpeed;
    if (b.x < 20 || b.x > GW - 20) hitEdge = true;
    if (b.hitFlash > 0) b.hitFlash--;
  });

  if (hitEdge) {
    beanDir *= -1;
    beans.forEach(b => { if (b.alive) b.y += 8; });
  }

  // Bean shooting
  beanShootTimer++;
  const shootInterval = Math.max(20, 60 - wave * 5);
  if (beanShootTimer >= shootInterval) {
    beanShootTimer = 0;
    const shooters = beans.filter(b => b.alive && b.enterDelay <= 0);
    if (shooters.length > 0) {
      const shooter = shooters[Math.floor(Math.random() * shooters.length)];
      const angle = Math.atan2(player.y - shooter.y, player.x - shooter.x);
      const spd = 2.5 + wave * 0.3;
      beanBullets.push({
        x: shooter.x, y: shooter.y + 10,
        speed: Math.sin(angle) * spd,
        vx: Math.cos(angle) * spd * 0.3
      });
    }
  }

  // Bullet-bean collision
  bullets.forEach(b => {
    beans.forEach(bean => {
      if (!bean.alive || bean.enterDelay > 0) return;
      if (Math.abs(b.x - bean.x) < 12 && Math.abs(b.y - bean.y) < 14) {
        bean.hp--;
        bean.hitFlash = 4;
        b.y = -100; // remove
        if (bean.hp <= 0) {
          bean.alive = false;
          score += BEAN_TYPES[bean.type].points;
          spawnBeanExplosion(bean.x, bean.y, bean.type);
          updateHUD();
        } else {
          spawnParticles(bean.x, bean.y, '#fff', 3);
        }
      }
    });
  });

  // Bean bullet-player collision
  if (player.invincible <= 0) {
    beanBullets.forEach(b => {
      if (Math.abs(b.x - player.x) < player.w / 2 && Math.abs(b.y - player.y) < player.h) {
        b.y = GH + 100;
        playerHit();
      }
    });

    // Bean-player collision (beans too close)
    beans.forEach(b => {
      if (!b.alive) return;
      if (Math.abs(b.x - player.x) < 20 && Math.abs(b.y - player.y) < 20) {
        b.alive = false;
        spawnBeanExplosion(b.x, b.y, b.type);
        playerHit();
      }
    });
  }

  // Check beans reached bottom
  const reachedBottom = beans.some(b => b.alive && b.y > GH - 40);
  if (reachedBottom) {
    playerHit();
    beans.forEach(b => { if (b.alive) b.y -= 30; });
  }

  // Particles
  particles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life--;
  });
  particles = particles.filter(p => p.life > 0);

  // Wave cleared?
  if (beans.filter(b => b.alive).length === 0) {
    wave++;
    spawnWave();
    updateHUD();
  }
}

function playerHit() {
  lives--;
  player.invincible = 90;
  spawnParticles(player.x, player.y, '#e8845c', 15);
  spawnParticles(player.x, player.y, '#ffd93d', 8);
  updateHUD();
  if (lives <= 0) gameOver();
}

// Draw
function draw() {
  ctx.fillStyle = '#0a0612';
  ctx.fillRect(0, 0, GW, GH);

  // Stars
  stars.forEach(s => {
    s.y += s.speed;
    if (s.y > GH) { s.y = 0; s.x = Math.random() * GW; }
    ctx.fillStyle = `rgba(180,160,220,${s.brightness * (0.5 + 0.5 * Math.sin(frameCount * 0.02 + s.x))})`;
    ctx.fillRect(s.x, s.y, s.size, s.size);
  });

  if (state === 'start') return;

  // Beans
  beans.forEach(b => {
    if (!b.alive || b.enterDelay > 0) return;
    drawBean(b.x, b.y, b.type, frameCount, b.hitFlash > 0);
  });

  // Player bullets
  ctx.shadowColor = '#ffd93d';
  ctx.shadowBlur = 6;
  bullets.forEach(b => {
    // Mustard shot!
    ctx.fillStyle = '#ffd93d';
    ctx.fillRect(b.x - 2, b.y - 6, 4, 12);
    ctx.fillStyle = '#fff';
    ctx.fillRect(b.x - 1, b.y - 6, 2, 4);
  });
  ctx.shadowBlur = 0;

  // Bean bullets (little bean projectiles)
  beanBullets.forEach(b => {
    ctx.fillStyle = '#7ec850';
    ctx.shadowColor = '#7ec850';
    ctx.shadowBlur = 4;
    ctx.beginPath();
    ctx.ellipse(b.x, b.y, 3, 5, 0, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.shadowBlur = 0;

  // Player
  if (player.invincible > 0 && Math.floor(player.invincible / 4) % 2 === 0) {
    // Flash / blink when invincible
  } else {
    drawBologna(player.x, player.y, player.w, player.h, player.invincible > 0);
  }

  // Particles
  particles.forEach(p => {
    const alpha = p.life / p.maxLife;
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.fillRect(p.x - p.size / 2, p.y - p.size / 2, p.size, p.size);
  });
  ctx.globalAlpha = 1;

  // Wave announcement
  if (beans.length > 0 && beans.every(b => !b.alive || b.enterDelay > 0)) {
    ctx.fillStyle = 'rgba(255,107,157,0.8)';
    ctx.font = '700 18px "Press Start 2P"';
    ctx.textAlign = 'center';
    ctx.fillText('WAVE ' + wave, GW / 2, GH / 2);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Input
document.addEventListener('keydown', e => {
  keys[e.key] = true;
  if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown',' '].includes(e.key)) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.key] = false; });

// Mobile controls
document.querySelectorAll('.ctrl-btn').forEach(btn => {
  const dir = btn.dataset.dir;
  const keyName = 'm' + dir.charAt(0).toUpperCase() + dir.slice(1);

  btn.addEventListener('touchstart', e => { e.preventDefault(); keys[keyName] = true; });
  btn.addEventListener('touchend', e => { e.preventDefault(); keys[keyName] = false; });
  btn.addEventListener('mousedown', e => { keys[keyName] = true; });
  btn.addEventListener('mouseup', e => { keys[keyName] = false; });
  btn.addEventListener('mouseleave', e => { keys[keyName] = false; });
});

loop();
</script>
</body>
</html>
