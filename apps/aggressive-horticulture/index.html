<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Aggressive Horticulture — yell at your plants</title>
<meta name="description" content="A pixelated garden where yelling into the mic makes plants grow. Harvest at peak loudness.">
<meta property="og:title" content="Aggressive Horticulture">
<meta property="og:description" content="A pixelated garden where yelling into the mic makes plants grow. Harvest at peak loudness.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://sloppy.live/aggressive-horticulture/">
<meta property="og:image" content="https://image.pollinations.ai/prompt/pixel%20art%20garden%20with%20angry%20person%20yelling%20at%20plants%20sunflower%20tomato%20mushroom%20carrot%208-bit%20bright%20green%20chunky%20pixels%20centered?width=1200&height=630&model=flux&nologo=true&seed=42420">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8C%B1">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen:wght@400;700&family=VT323&display=swap" rel="stylesheet">
<style>
:root{
  --sky:#7cbef0; --sky2:#a4d6f5;
  --grass:#62a83a; --grass-d:#3d6e22;
  --soil:#7a4a25; --soil-d:#4a2a14;
  --paper:#fcefc7;
  --ink:#1a0e06;
  --red:#e34c4c; --orange:#ff8a3a; --green:#4dd25c;
  --pink:#ff7ad6; --amber:#ffd460; --violet:#a06bff;
  --shout:#ff3b3b;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;overflow:hidden;background:#1a0e06;color:var(--paper);font-family:'Silkscreen', monospace}
canvas{ display:block; image-rendering: pixelated; image-rendering: crisp-edges; }

.app{
  position:fixed; inset:0;
  display:flex; flex-direction:column;
  background: var(--sky);
  background:
    linear-gradient(180deg, #6fb3e8 0%, #7cbef0 30%, #a4d6f5 70%, #c4e6f8 100%);
}
header{
  text-align:center; padding: 10px 1rem 2px;
  color: var(--paper);
  text-shadow: 2px 2px 0 var(--ink), 0 0 0 transparent;
  user-select:none;
}
header h1{
  margin:0; font-family:'Press Start 2P', monospace; font-weight:400;
  font-size: clamp(13px, 2.6vw, 22px);
  letter-spacing: .03em;
  line-height: 1.15;
  color: #fff;
  text-shadow: 3px 3px 0 var(--ink), -1px -1px 0 var(--shout), 1px -1px 0 var(--shout), -1px 1px 0 var(--shout), 1px 1px 0 var(--shout);
}
header h1 .punct{ color: var(--amber); }
header .tag{
  margin-top:6px; font-family:'Silkscreen', monospace;
  font-size: 12px; letter-spacing:.18em;
  color: var(--ink);
  text-shadow: 1px 1px 0 rgba(255,255,255,0.5);
}

.stage{
  position:relative; flex:1;
  display:flex; align-items:center; justify-content:center;
  padding: 0.5rem;
}
#game{
  width: 100%; height: 100%;
  max-width: 100%; max-height: 100%;
  background: transparent;
}

/* HUD */
.hud{
  position:fixed; top: 6px; left: 8px; z-index: 5;
  font-family:'Silkscreen', monospace; font-size: 14px;
  color: var(--ink);
  background: var(--paper);
  border: 2px solid var(--ink);
  padding: 4px 8px;
  box-shadow: 3px 3px 0 var(--ink);
  letter-spacing: .04em;
  pointer-events:none;
  user-select:none;
}
.hud .scr{ color: var(--shout); font-weight: 700; }
.hud b{ color: var(--ink); font-weight: 700; }

/* mic meter — top right */
.mic{
  position:fixed; top: 6px; right: 8px; z-index: 5;
  width: 130px;
  background: var(--paper);
  border: 2px solid var(--ink);
  box-shadow: 3px 3px 0 var(--ink);
  font-family:'Silkscreen', monospace; font-size: 11px;
  color: var(--ink);
  user-select:none;
}
.mic .lab{
  padding: 2px 6px 0;
  letter-spacing: .15em;
  display:flex; justify-content:space-between; align-items:center;
}
.mic .lab .dot{
  display:inline-block; width:7px; height:7px; background: #888;
}
.mic .lab .dot.on{ background: var(--green); animation: pulseDot 1.4s steps(2,end) infinite; }
.mic .lab .dot.err{ background: var(--shout); }
.mic .bar{
  margin: 3px 6px 6px;
  height: 16px;
  border: 2px solid var(--ink);
  background: linear-gradient(90deg, var(--ink) 0%, var(--ink) 100%);
  position: relative;
  overflow: hidden;
}
.mic .bar .fill{
  position:absolute; left:0; top:0; bottom:0; width: 0%;
  background: linear-gradient(90deg, var(--green) 0%, var(--green) 50%, var(--amber) 70%, var(--orange) 85%, var(--shout) 100%);
  transition: width .04s linear;
}
.mic .bar .tick{
  position:absolute; top:0; bottom:0; width:2px; background: var(--ink); opacity:.4;
}
.mic .pct{
  padding: 0 6px 4px;
  text-align: right; letter-spacing:.1em;
  color: var(--ink);
}
@keyframes pulseDot{ 0% { opacity:1 } 50%{ opacity:.35 } }

/* plant palette */
.palette{
  position:fixed; left: 50%; bottom: 10px;
  transform: translateX(-50%);
  z-index: 6;
  display:flex; gap:6px;
  padding: 6px 8px;
  background: var(--paper);
  border: 2px solid var(--ink);
  box-shadow: 3px 3px 0 var(--ink);
  user-select:none;
  flex-wrap: wrap;
  justify-content: center;
  max-width: calc(100vw - 1.5rem);
}
.palette button{
  appearance:none; background: #fff; border: 2px solid var(--ink);
  color: var(--ink); cursor: pointer;
  font-family:'Silkscreen', monospace; font-size: 10px;
  letter-spacing: .1em; text-transform: uppercase;
  padding: 4px 6px 5px;
  min-height: 44px; min-width: 56px;
  display:flex; flex-direction:column; align-items:center; gap:2px;
  box-shadow: 2px 2px 0 var(--ink);
  transition: transform .06s;
}
.palette button .icon{
  width: 24px; height: 24px;
  image-rendering: pixelated; image-rendering: crisp-edges;
}
.palette button:hover{ background: var(--amber); }
.palette button:active{ transform: translate(2px, 2px); box-shadow: 0 0 0 var(--ink); }
.palette button[aria-pressed="true"]{
  background: var(--amber);
  outline: 2px dashed var(--ink);
}
.palette .cost{ font-size: 9px; color: var(--soil-d); }

/* controls */
.controls{
  position:fixed; right: 8px; bottom: 10px;
  z-index: 6;
  display:flex; flex-direction:column; gap:6px;
}
.btn{
  appearance:none; background: var(--shout); border: 2px solid var(--ink);
  color: #fff; cursor: pointer;
  font-family:'Press Start 2P', monospace; font-size: 10px;
  letter-spacing: .04em;
  padding: 8px 12px;
  min-height: 44px;
  box-shadow: 3px 3px 0 var(--ink);
}
.btn:hover{ background: #ff5a5a; }
.btn:active{ transform: translate(3px, 3px); box-shadow: 0 0 0 var(--ink); }
.btn.green{ background: var(--green); }
.btn.green:hover{ background: #5ee06e; }
.btn[aria-pressed="true"]{ background: var(--amber); color: var(--ink); }

/* float labels above plants */
.toast{
  position:absolute; z-index: 7; pointer-events:none;
  font-family:'Press Start 2P', monospace; font-size: 11px;
  color: var(--amber);
  text-shadow: 2px 2px 0 var(--ink);
  animation: toast .9s ease-out forwards;
  user-select:none;
}
@keyframes toast{
  0% { opacity: 0; transform: translateY(0) }
  10%{ opacity: 1; }
  100% { opacity: 0; transform: translateY(-28px) }
}

@media (max-width: 600px){
  .hud{ font-size: 11px; padding: 3px 6px; }
  .mic{ width: 105px; font-size: 10px; }
  .palette button{ min-width: 48px; padding: 3px 4px 4px; font-size: 9px; }
}
@media (prefers-reduced-motion: reduce){
  .mic .lab .dot.on{ animation: none; }
}
</style>
</head>
<body>
<div class="app">
  <header>
    <h1>AGGRESSIVE HORTICULTURE<span class="punct">!!!</span></h1>
    <div class="tag">YELL · AT · THE · PLANTS · THEY · GROW · FASTER</div>
  </header>
  <div class="stage">
    <canvas id="game" role="application" aria-label="Pixel garden. Click an empty tile to plant the selected seed. Yell into the microphone to make plants grow. Click a ripe plant to harvest."></canvas>
  </div>
</div>

<div class="hud" role="status" aria-live="polite">
  <span>SCORE <span class="scr" id="score">000</span></span> ·
  <span>HARVESTED <b id="harvested">0</b></span> ·
  <span>BEST <b id="best">0</b></span>
</div>

<div class="mic" aria-label="Microphone level">
  <div class="lab">
    <span>VOLUME</span>
    <span class="dot" id="mic-dot" aria-hidden="true"></span>
  </div>
  <div class="bar" id="mic-bar">
    <div class="fill" id="mic-fill"></div>
    <div class="tick" style="left:50%"></div>
    <div class="tick" style="left:75%"></div>
  </div>
  <div class="pct"><span id="mic-pct">—</span> DB</div>
</div>

<nav class="palette" id="palette" aria-label="Plant palette"></nav>

<div class="controls">
  <button class="btn" type="button" id="btn-mic">🎤 ENABLE MIC</button>
</div>

<script>
(function(){
  // ---------- pixel-art plant definitions ----------
  // each plant: 5 growth stages, drawn into a 16x16 grid of pixels via a tiny
  // mini-language. Each stage is an array of {x, y, c} blits. c is a palette key.
  const PALETTE = {
    '.': null,                  // transparent
    'k': '#1a0e06',             // ink/outline
    'g': '#4dd25c',             // green
    'G': '#2f8a2c',             // green dark
    'l': '#a5f071',             // light leaf
    'r': '#e34c4c',             // red
    'R': '#9a2828',             // red dark
    'o': '#ff8a3a',             // orange
    'O': '#c45a14',             // orange dark
    'y': '#ffd460',             // yellow
    'Y': '#c49027',             // yellow dark
    'p': '#ff7ad6',             // pink
    'P': '#a04498',             // pink dark
    'w': '#ffffff',             // white
    'b': '#a06bff',             // violet
    'B': '#6a3ec0',             // violet dark
    's': '#7a4a25',             // soil
    'S': '#4a2a14',             // soil dark
    'm': '#dadada',             // mushroom stem
    'h': '#88421a',             // brown
  };

  // helper to expand a 16-row ASCII art string into pixel data
  function px(rows){
    // rows is array of 16 strings each 16 chars; '.' = transparent
    const out = [];
    for (let y = 0; y < rows.length; y++){
      const r = rows[y];
      for (let x = 0; x < r.length; x++){
        const c = r[x];
        if (c !== '.' && c !== ' ') out.push({ x, y, c });
      }
    }
    return out;
  }

  const STAGES = {
    tomato: [
      // stage 0: seed
      px(['................','................','................','................','................','................','................','................','................','................','................','................','................','................','......kk........','.....kssk.......']),
      // 1: sprout
      px(['................','................','................','................','................','................','................','................','................','........g.......','.......gGl......','........g.......','.......kkk......','......kssk......','.....ksssk......','....kssssk......']),
      // 2: bush
      px(['................','................','................','................','................','.......g........','......gGg.......','.....lgGgl......','......gGg.......','......gGg.......','......gGg.......','.....kkkkk......','....kssssssk....','...kssssssk.....','..kssssssk......','.kssssssk.......']),
      // 3: bush with green fruit
      px(['................','................','................','......g.........','.....gGl........','......g.........','....g..g........','...lG..Gl.......','....gGGGg.......','...lGgRgGl......','....gGgGg.......','....kkkkk.......','...kssssssk.....','..kssssssk......','.kssssssk.......','kssssssk........']),
      // 4: ripe
      px(['................','................','......g.........','.....gGl........','......g.........','....g..g........','...lG..Gl.......','....gRrRg.......','...gRRRRRg......','...rRRrRRr......','...rRRRRRr......','....kkkkk.......','...kssssssk.....','..kssssssk......','.kssssssk.......','kssssssk........'])
    ],
    sunflower: [
      px(['................','................','................','................','................','................','................','................','................','................','................','................','................','........g.......','......kssk......','.....kssssk.....']),
      px(['................','................','................','................','................','................','................','........g.......','........g.......','.......gGg......','........g.......','.....l..g.......','........g.......','.......kkk......','......kssk......','.....kssssk.....']),
      px(['................','................','................','........g.......','........G.......','........g.......','.....gG.G.Gg....','........g.......','........G.......','.......gGg......','........g.......','........g.......','........g.......','.......kkk......','......kssk......','.....kssssk.....']),
      px(['................','.......yyy......','......yYwYy.....','......yYwYy.....','.......yyy......','........g.......','........G.......','........g.......','.....gG.G.Gg....','........g.......','........G.......','........g.......','........g.......','.......kkk......','......kssk......','.....kssssk.....']),
      px(['......yyyyy.....','....yyYYYYYyy...','...yYYbbBbbYYy..','...yYbBbbBbYy...','...yYbbbbbbYy...','...yYbBbbBbYy...','...yYYbbBbbYYy..','....yyYYYYYyy...','......yyyyy.....','........g.......','.....gG.G.Gg....','........g.......','........g.......','.......kkk......','......kssk......','.....kssssk.....'])
    ],
    cactus: [
      px(['................','................','................','................','................','................','................','................','................','................','................','................','................','......kk........','......kGk.......','.....kSSk.......']),
      px(['................','................','................','................','................','................','................','................','................','................','........k.......','.......kGk......','.......kGk......','......kkkk......','......kSSk......','.....kSSSk......']),
      px(['................','................','................','................','................','........k.......','.......kGk......','.......kGk......','.......kGk......','.......kGk......','......kGGGk.....','......kGGGk.....','......kGGGk.....','......kkkkk.....','......kSSSk.....','.....kSSSSk.....']),
      px(['................','................','.......k........','......kGk.......','.....kGGGk......','...k.kGGGk.k....','...kGkGGGkGk....','...kGkGGGkGk....','...kGkGGGkGk....','...kGkGGGkGk....','....kkGGGkk.....','.....kGGGk......','.....kGGGk......','.....kkkkk......','......kSSk......','.....kSSSk......']),
      px(['.......yyy......','......yYrYy.....','.......yyy......','......kGk.......','.....kGGGk......','...k.kGGGk.k....','...kGkGGGkGk....','...kGkGGGkGk....','...kGkGGGkGk....','...kGkGGGkGk....','....kkGGGkk.....','.....kGGGk......','.....kGGGk......','.....kkkkk......','......kSSk......','.....kSSSk......'])
    ],
    mushroom: [
      px(['................','................','................','................','................','................','................','................','................','................','................','................','................','................','......kSSk......','.....kSSSSk.....']),
      px(['................','................','................','................','................','................','................','................','................','................','................','........w.......','........m.......','........m.......','......kSSk......','.....kSSSSk.....']),
      px(['................','................','................','................','................','................','................','................','........k.......','.......kwwk.....','......kwwwwk....','......kwwwwk....','........m.......','........m.......','......kSSk......','.....kSSSSk.....']),
      px(['................','................','................','................','......kwwk......','....kkrwwrkk....','...krrwrrwrrk...','...krrwwwwrrk...','...krwwwwwwrk...','....krrrrrrk....','.....kmmmmk.....','......kmmk......','......kmmk......','......kmmk......','......kSSk......','.....kSSSSk.....']),
      px(['................','.....kwwwwwk....','....krrwwwrrk...','...krrrwwwrrrk..','...kRrwwwwwrRk..','...krwrrrrrrwrk.','...krwwwwwwwrk..','...kRrrrrrrrRk..','....kkmmmmmkk...','......kmmk......','......kmmk......','......kmmk......','......kmmk......','......kmmk......','......kSSk......','.....kSSSSk.....'])
    ],
    carrot: [
      px(['................','................','................','................','................','................','................','................','................','................','................','................','................','................','......kk........','.....kssk.......']),
      px(['................','................','................','................','................','................','................','................','................','................','........g.......','.......gGg......','........g.......','.......ksk......','......kssk......','.....kssk.......']),
      px(['................','................','................','................','................','................','........g.......','......g.g.g.....','.......gGg......','........g.......','........g.......','........g.......','........g.......','.......ksk......','......kssk......','.....kssssk.....']),
      px(['................','................','........g.......','.......gGg......','......g.g.g.....','.......gGg......','........g.......','........g.......','........k.......','.......kok......','.......kok......','......koOok.....','......koOok.....','......koOOk.....','......kSSSk.....','.....kSSSSk.....']),
      px(['........g.......','.......gGg......','.....g.g.g.g....','.....G.gGg.G....','.......gGg......','........g.......','......koOok.....','.....koOoOok....','.....koooook....','.....koOoOok....','.....koooook....','......koOok.....','......koook.....','.......kok......','.......kok......','......kssk......'])
    ],
  };

  const PLANT_INFO = {
    tomato:    { color: '#e34c4c', score: 5,  growMs: 18000 },
    sunflower: { color: '#ffd460', score: 8,  growMs: 26000 },
    cactus:    { color: '#3a8a3a', score: 6,  growMs: 30000 },
    mushroom:  { color: '#dadada', score: 4,  growMs: 12000 },
    carrot:    { color: '#ff8a3a', score: 7,  growMs: 22000 },
  };
  const PLANT_KINDS = ['tomato', 'sunflower', 'cactus', 'mushroom', 'carrot'];

  // ---------- canvas ----------
  const $cv = document.getElementById('game');
  const ctx = $cv.getContext('2d');
  ctx.imageSmoothingEnabled = false;

  // Logical pixel size — small grid that we upscale by integer scale to fit viewport.
  const LW = 160, LH = 100;
  let SCALE = 4;     // integer upscale; computed at fit()
  function fit(){
    const rect = $cv.parentElement.getBoundingClientRect();
    const scale = Math.max(1, Math.min(Math.floor(rect.width / LW), Math.floor(rect.height / LH)));
    SCALE = scale;
    $cv.width  = LW * SCALE;
    $cv.height = LH * SCALE;
    $cv.style.width  = (LW * SCALE) + 'px';
    $cv.style.height = (LH * SCALE) + 'px';
    ctx.imageSmoothingEnabled = false;
    ctx.setTransform(SCALE, 0, 0, SCALE, 0, 0);
  }
  window.addEventListener('resize', fit);

  // ---------- garden grid ----------
  // 8 columns × 1 row of plots at the bottom strip.
  const PLOTS_X = 4;           // left margin in logical px
  const PLOT_W = 19;           // plot width
  const PLOT_GAP = 0;
  const PLOT_COUNT = 8;
  const PLOT_Y = 68;           // top of plot strip
  const PLOT_H = 28;
  function plotRect(i){
    return {
      x: PLOTS_X + i * PLOT_W,
      y: PLOT_Y,
      w: PLOT_W,
      h: PLOT_H,
    };
  }
  const plots = Array.from({length: PLOT_COUNT}, () => ({ kind: null, grow: 0, ripe: false }));

  // ---------- state ----------
  const state = {
    selected: 'tomato',
    score: 0,
    harvested: 0,
    best: parseInt(localStorage.getItem('aghort-best') || '0', 10),
    mic: { ctx: null, analyser: null, data: null, level: 0, peak: 0, status: 'idle' /* idle | ok | err | sim */ },
    spaceBoost: 0,
    sun: { x: 130, y: 18, phase: 0 },
    clouds: [
      { x: 20, y: 12, w: 30, v: 5 },
      { x: 80, y: 22, w: 40, v: 3.4 },
      { x: 130, y: 30, w: 22, v: 6.2 },
    ],
    toasts: [],
  };

  // ---------- microphone ----------
  async function enableMic(){
    const $btn = document.getElementById('btn-mic');
    $btn.textContent = '🎤 …LISTENING';
    try{
      const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation:false, autoGainControl:false, noiseSuppression:false } });
      state.mic.ctx = new (window.AudioContext || window.webkitAudioContext)();
      const src = state.mic.ctx.createMediaStreamSource(stream);
      state.mic.analyser = state.mic.ctx.createAnalyser();
      state.mic.analyser.fftSize = 1024;
      src.connect(state.mic.analyser);
      state.mic.data = new Uint8Array(state.mic.analyser.fftSize);
      state.mic.status = 'ok';
      document.getElementById('mic-dot').classList.add('on');
      $btn.textContent = '🎤 LIVE';
      $btn.classList.add('green');
      $btn.classList.remove('shout');
      $btn.disabled = true;
    } catch(e){
      console.warn('mic blocked:', e.message);
      state.mic.status = 'err';
      document.getElementById('mic-dot').classList.add('err');
      $btn.textContent = '🚫 NO MIC · SPACE = YELL';
      // enable space-bar fallback
    }
  }
  document.getElementById('btn-mic').addEventListener('click', () => enableMic());

  // space-bar fallback
  window.addEventListener('keydown', (e) => {
    if (e.key === ' '){
      state.spaceBoost = 1;
      e.preventDefault();
    }
  });
  window.addEventListener('keyup', (e) => {
    if (e.key === ' ') state.spaceBoost = 0;
  });

  function readMicLevel(){
    if (state.mic.status === 'ok' && state.mic.analyser){
      state.mic.analyser.getByteTimeDomainData(state.mic.data);
      let sumSq = 0;
      for (let i = 0; i < state.mic.data.length; i++){
        const v = (state.mic.data[i] - 128) / 128;
        sumSq += v * v;
      }
      const rms = Math.sqrt(sumSq / state.mic.data.length);
      // typical "loud yell" is rms ~ 0.3-0.5. Map [0.04, 0.5] → [0, 1].
      const lvl = Math.max(0, Math.min(1, (rms - 0.04) / 0.46));
      // smooth
      state.mic.level = state.mic.level * 0.55 + lvl * 0.45;
    }
    if (state.spaceBoost > 0){
      // simulated yell: 0.7 with slight bobble
      const sim = 0.7 + Math.sin(performance.now() * 0.022) * 0.15;
      state.mic.level = Math.max(state.mic.level, sim);
    }
    state.mic.peak = Math.max(state.mic.peak * 0.94, state.mic.level);
  }

  // ---------- palette UI ----------
  function paletteIcon(kind){
    // Render the stage-4 sprite into a tiny canvas thumb.
    const c = document.createElement('canvas');
    c.width = 24; c.height = 24;
    const cx = c.getContext('2d');
    cx.imageSmoothingEnabled = false;
    cx.setTransform(1.5, 0, 0, 1.5, 0, 0);
    paintSprite(cx, kind, 4, 0, 0);
    return c.toDataURL();
  }
  function paletteBuild(){
    const $p = document.getElementById('palette');
    for (const kind of PLANT_KINDS){
      const b = document.createElement('button');
      b.type = 'button';
      b.setAttribute('aria-pressed', String(kind === state.selected));
      b.dataset.kind = kind;
      const img = new Image();
      img.className = 'icon';
      img.alt = kind;
      img.src = paletteIcon(kind);
      const lab = document.createElement('div');
      lab.textContent = kind.slice(0, 4);
      const cost = document.createElement('div');
      cost.className = 'cost';
      cost.textContent = '+' + PLANT_INFO[kind].score;
      b.appendChild(img); b.appendChild(lab); b.appendChild(cost);
      b.addEventListener('click', () => {
        state.selected = kind;
        for (const btn of $p.querySelectorAll('button')){
          btn.setAttribute('aria-pressed', String(btn.dataset.kind === kind));
        }
      });
      $p.appendChild(b);
    }
  }

  // ---------- sprite paint ----------
  function paintSprite(c, kind, stageIdx, px, py){
    const stages = STAGES[kind];
    const stage = stages[Math.max(0, Math.min(stages.length - 1, stageIdx))];
    for (const p of stage){
      const col = PALETTE[p.c];
      if (!col) continue;
      c.fillStyle = col;
      c.fillRect(px + p.x, py + p.y, 1, 1);
    }
  }

  // ---------- click handler ----------
  $cv.addEventListener('click', (e) => {
    const rect = $cv.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width * LW;
    const y = (e.clientY - rect.top)  / rect.height * LH;
    // find hit plot
    for (let i = 0; i < PLOT_COUNT; i++){
      const r = plotRect(i);
      if (x >= r.x && x < r.x + r.w && y >= r.y && y < r.y + r.h){
        onPlotClick(i);
        return;
      }
    }
  });
  function onPlotClick(i){
    const plot = plots[i];
    if (plot.kind && plot.ripe){
      // harvest
      const score = PLANT_INFO[plot.kind].score;
      state.score += score;
      state.harvested++;
      pushToast(plot, '+' + score);
      plot.kind = null; plot.grow = 0; plot.ripe = false;
      updateScore();
    } else if (!plot.kind){
      // plant
      plot.kind = state.selected;
      plot.grow = 0;
      plot.ripe = false;
      pushToast(plot, 'PLANTED');
    }
  }
  function updateScore(){
    document.getElementById('score').textContent = String(state.score).padStart(3, '0');
    document.getElementById('harvested').textContent = state.harvested;
    if (state.score > state.best){
      state.best = state.score;
      localStorage.setItem('aghort-best', String(state.best));
    }
    document.getElementById('best').textContent = state.best;
  }
  updateScore();

  function pushToast(plot, text){
    const r = plotRect(plot ? plots.indexOf(plot) : 0);
    state.toasts.push({ x: r.x + r.w/2, y: r.y, text, age: 0 });
  }

  // ---------- update / render ----------
  let lastT = performance.now();
  function loop(now){
    let dt = (now - lastT) / 1000;
    lastT = now;
    if (dt > 0.1) dt = 0.1;
    update(dt, now);
    render(now);
    requestAnimationFrame(loop);
  }

  function update(dt, now){
    readMicLevel();
    // update mic UI
    const fill = state.mic.level * 100;
    document.getElementById('mic-fill').style.width = fill.toFixed(1) + '%';
    document.getElementById('mic-pct').textContent = (Math.round(state.mic.level * 100)).toString().padStart(3, ' ');

    // grow plants
    const v = state.mic.level;
    // base trickle so plants slowly grow even in silence (boring without yelling)
    const baseTrickle = 0.04;
    const yelling = Math.max(baseTrickle, v * 1.6 + (v > 0.5 ? (v - 0.5) * 1.2 : 0));
    for (const plot of plots){
      if (!plot.kind) continue;
      if (plot.ripe) continue;
      const dur = PLANT_INFO[plot.kind].growMs / 1000;
      plot.grow += (yelling / dur) * dt;
      if (plot.grow >= 1){
        plot.grow = 1;
        plot.ripe = true;
        pushToast(plot, 'RIPE!');
      }
    }
    // age toasts
    for (let i = state.toasts.length - 1; i >= 0; i--){
      state.toasts[i].age += dt;
      if (state.toasts[i].age > 0.9) state.toasts.splice(i, 1);
    }
    // clouds drift
    for (const c of state.clouds){
      c.x += c.v * dt;
      if (c.x > LW + c.w) c.x = -c.w;
    }
  }

  function render(now){
    ctx.clearRect(0, 0, LW, LH);
    // sky
    grad(0, 0, 0, 68, [['#7cbef0', 0], ['#a4d6f5', 1]]);
    // sun
    ctx.fillStyle = '#ffd460';
    fillCircle(state.sun.x, state.sun.y, 6);
    ctx.fillStyle = '#fff5b0';
    fillCircle(state.sun.x - 1, state.sun.y - 1, 3);
    // sun rays — angry yelly intensity
    if (state.mic.level > 0.2){
      ctx.fillStyle = '#ffd460';
      for (let i = 0; i < 8; i++){
        const a = i * Math.PI / 4 + now * 0.001;
        const rad = 8 + Math.sin(now * 0.006 + i) * 1.5 + state.mic.level * 3;
        const px2 = state.sun.x + Math.cos(a) * (rad + 3);
        const py2 = state.sun.y + Math.sin(a) * (rad + 3);
        ctx.fillRect(Math.round(px2), Math.round(py2), 2, 2);
      }
    }
    // clouds
    for (const c of state.clouds){
      drawCloud(c.x, c.y, c.w);
    }
    // grass strip (background of plot strip)
    ctx.fillStyle = '#62a83a';
    ctx.fillRect(0, 64, LW, 4);
    ctx.fillStyle = '#3d6e22';
    ctx.fillRect(0, 67, LW, 1);
    // plots
    for (let i = 0; i < PLOT_COUNT; i++){
      const r = plotRect(i);
      // soil
      ctx.fillStyle = '#7a4a25';
      ctx.fillRect(r.x, r.y + 4, r.w - 1, r.h - 6);
      // soil shading
      ctx.fillStyle = '#4a2a14';
      ctx.fillRect(r.x, r.y + r.h - 2, r.w - 1, 2);
      ctx.fillStyle = '#a06a3a';
      ctx.fillRect(r.x, r.y + 4, r.w - 1, 1);
      // plot border (subtle)
      ctx.fillStyle = '#1a0e06';
      ctx.fillRect(r.x + r.w - 1, r.y + 4, 1, r.h - 4);
      // grass tops
      ctx.fillStyle = '#62a83a';
      ctx.fillRect(r.x, r.y, r.w, 4);
      // plant
      const plot = plots[i];
      if (plot.kind){
        const stageIdx = plot.ripe ? 4 : Math.min(4, Math.floor(plot.grow * 4 + 0.001));
        // sprite is 16x16 inside the 19x28 plot. Center horizontally + sit on soil top
        const px2 = r.x + Math.floor((r.w - 16) / 2);
        const py2 = r.y + (r.h - 16) - 2;
        // ripe glow
        if (plot.ripe){
          const c = PLANT_INFO[plot.kind].color;
          ctx.fillStyle = c + '40';
          ctx.fillRect(px2 - 1, py2 - 1, 18, 18);
        }
        paintSprite(ctx, plot.kind, stageIdx, px2, py2);
        // growing wobble lines when yelling hard at near-mature plants
        if (state.mic.level > 0.4 && !plot.ripe && plot.grow > 0.25){
          ctx.fillStyle = '#fff';
          ctx.fillRect(px2 + 2, py2 - 2, 1, 1);
          ctx.fillRect(px2 + 12, py2 - 2, 1, 1);
        }
      } else {
        // hint: small dotted reticle on empty soil
        ctx.fillStyle = '#5a2f15';
        ctx.fillRect(r.x + Math.floor(r.w/2), r.y + 16, 1, 1);
      }
    }
    // mic-driven screen shake / vignette
    if (state.mic.level > 0.7){
      ctx.fillStyle = 'rgba(255, 60, 60, ' + ((state.mic.level - 0.7) * 0.5).toFixed(2) + ')';
      ctx.fillRect(0, 0, LW, LH);
    }
    // toasts (logical position, but rendered to a DOM layer for crisp text)
    renderToasts(now);
  }

  function grad(x, y, w, h, stops){
    const g = ctx.createLinearGradient(x, y, x, y + h);
    for (const s of stops) g.addColorStop(s[1], s[0]);
    ctx.fillStyle = g;
    ctx.fillRect(x, y, LW, h);
  }
  function fillCircle(cx, cy, r){
    // pixel-art circle approximation
    for (let py2 = -r; py2 <= r; py2++){
      for (let px2 = -r; px2 <= r; px2++){
        if (px2 * px2 + py2 * py2 <= r * r){
          ctx.fillRect(Math.round(cx + px2), Math.round(cy + py2), 1, 1);
        }
      }
    }
  }
  function drawCloud(x, y, w){
    ctx.fillStyle = '#fff';
    ctx.fillRect(x, y + 2, w, 4);
    ctx.fillRect(x + 2, y, w - 4, 4);
    ctx.fillRect(x + 5, y - 1, w - 12, 3);
    ctx.fillStyle = '#d6e8f8';
    ctx.fillRect(x, y + 5, w, 1);
  }

  // ---------- toasts (DOM, positioned with logical→screen mapping) ----------
  function renderToasts(now){
    // remove stale DOM
    const layer = ensureToastLayer();
    layer.innerHTML = '';
    for (const t of state.toasts){
      const div = document.createElement('div');
      div.className = 'toast';
      div.textContent = t.text;
      // logical → screen px
      const rect = $cv.getBoundingClientRect();
      const sx = rect.left + (t.x / LW) * rect.width;
      const sy = rect.top  + (t.y / LH) * rect.height;
      div.style.left = sx + 'px';
      div.style.top  = sy + 'px';
      layer.appendChild(div);
    }
  }
  let toastLayer = null;
  function ensureToastLayer(){
    if (toastLayer) return toastLayer;
    toastLayer = document.createElement('div');
    toastLayer.style.position = 'fixed'; toastLayer.style.inset = '0';
    toastLayer.style.pointerEvents = 'none'; toastLayer.style.zIndex = '7';
    document.body.appendChild(toastLayer);
    return toastLayer;
  }

  // ---------- boot ----------
  paletteBuild();
  fit();
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
