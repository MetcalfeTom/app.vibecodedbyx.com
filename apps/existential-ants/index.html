<html lang="en">
<head>

<meta property="og:description" content="An interactive ant farm. The ants are working. The ants are also wondering.">

<style>
:root{
  --parchment:#efe1c2; --parchment-2:#e7d6ad;
  --soil:#5b3a1d; --soil-deep:#3d2510;
  --soil-light:#8a5a31; --tunnel:#a6804f;
  --sky:#a8c7d8; --sky-deep:#5b87a3;
  --ink:#2a1b0d;
  --ember:#c25a1f; --rust:#a13a13;
  --gold:#b88d3a;
  --jade:#5a7a3a;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;overflow:hidden;background:#2a1b0d}
body{
  font-family:'Cormorant Garamond', serif; color: var(--ink);
}
.shell{
  position:fixed; inset:0;
  background:
    radial-gradient(80vmin 60vmin at 50% 20%, rgba(239,225,194,0.16), transparent 70%),
    radial-gradient(120vmin 90vmin at 50% 80%, rgba(61,37,16,0.5), transparent 75%),
    linear-gradient(180deg, #3d2510 0%, #1a0d04 100%);
  padding: 1rem;
  display:grid;
  grid-template-rows: auto 1fr auto;
  gap: .6rem;
}
header{
  text-align:center; color: var(--parchment);
  padding-bottom: .3rem; border-bottom:1px dashed rgba(239,225,194,0.18);
}
header .vol{
  font-family:'IBM Plex Mono', monospace; font-size:.65rem;
  letter-spacing:.4em; color: rgba(239,225,194,0.5);
  text-transform:uppercase;
}
header h1{
  margin:.1rem 0 .1rem;
  font-family:'Playfair Display', serif; font-weight:500;
  font-size: clamp(1.6rem, 4vw, 2.4rem); line-height:1;
  color: var(--parchment); letter-spacing:.02em;
}
header h1 em{
  font-style:italic; color: var(--ember);
}
header .tag{
  font-family:'Cormorant Garamond', serif; font-style:italic;
  font-size: clamp(.95rem, 1.7vw, 1.15rem);
  color: rgba(239,225,194,0.7);
}

.farm-wrap{
  position:relative;
  width:100%; height:100%;
  border:1px solid #1a0d04;
  background:#0a0603;
  box-shadow:
    inset 0 0 0 2px rgba(239,225,194,0.08),
    inset 0 0 40px rgba(0,0,0,0.55),
    0 8px 22px rgba(0,0,0,0.6);
  overflow:hidden;
}
.farm-wrap canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; }
#farm{ z-index:1; }
#fx{ z-index:2; pointer-events:none; }
.glass-glint{
  position:absolute; inset:0; pointer-events:none; z-index:3;
  background:
    linear-gradient(120deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0) 18%, rgba(255,255,255,0) 78%, rgba(255,255,255,0.04) 100%),
    repeating-linear-gradient(0deg, rgba(0,0,0,0.08) 0 1px, transparent 1px 4px);
  mix-blend-mode: screen;
}
.farm-label{
  position:absolute; bottom:6px; left:8px; z-index:4;
  font-family:'IBM Plex Mono', monospace; font-size:.6rem;
  color: rgba(239,225,194,0.45); letter-spacing:.2em; text-transform:uppercase;
}

/* HUD */
.hud{
  position:absolute; top:8px; right:10px; z-index:5;
  font-family:'IBM Plex Mono', monospace; font-size:.7rem;
  color: rgba(239,225,194,0.7);
  background: rgba(20, 12, 4, 0.55);
  border:1px solid rgba(239,225,194,0.16);
  padding: .35rem .6rem;
  letter-spacing:.18em; text-transform:uppercase;
  display:flex; gap:.9rem; flex-wrap:wrap; backdrop-filter: blur(4px);
  pointer-events:none;
}
.hud b{ color: var(--parchment); font-weight: 500; font-family:'Playfair Display', serif; font-size:.9rem; letter-spacing:.05em; text-transform:none;}

/* controls dock under farm */
.dock{
  display:flex; gap:.5rem; justify-content:center; flex-wrap:wrap;
}
.btn{
  appearance:none;
  background: var(--parchment);
  border:1px solid #6a4a25;
  color: var(--ink);
  font-family:'Cormorant Garamond', serif; font-style:italic; font-weight:500;
  font-size: 1rem;
  padding: .55rem 1rem;
  cursor:pointer;
  letter-spacing:.04em;
  min-height: 44px;
  box-shadow: 2px 2px 0 #2a1b0d;
  transition: transform .08s, box-shadow .08s;
}
.btn:hover, .btn:focus-visible{
  background: #f7e9c8; outline: none;
  transform: translate(-1px, -1px);
  box-shadow: 3px 3px 0 #2a1b0d;
}
.btn:active{ transform: translate(1px, 1px); box-shadow: 1px 1px 0 #2a1b0d; }
.btn.ember{ background: var(--ember); color:#fff7e8; border-color:#5a1f08; box-shadow:2px 2px 0 #5a1f08; }
.btn.ember:hover{ background:#d56830; }
.btn.jade{ background: var(--jade); color:#fff; border-color:#1f3a0c; box-shadow:2px 2px 0 #1f3a0c; }
.btn.jade:hover{ background:#6a8a45; }
.btn.ghost{ background: transparent; color: rgba(239,225,194,0.85); border-color: rgba(239,225,194,0.35); box-shadow: none; font-style: normal; font-family:'IBM Plex Mono', monospace; font-size:.7rem; letter-spacing:.2em; text-transform:uppercase; }
.btn.ghost:hover{ background: rgba(239,225,194,0.08); color: var(--parchment); border-color: var(--parchment); }
.btn[aria-pressed="true"]{ background: var(--ember); color:#fff; border-color:#5a1f08; box-shadow:2px 2px 0 #5a1f08; }

/* thought bubble */
.bubble{
  position:absolute; z-index:6;
  background: #fbf3da;
  color: var(--ink);
  border: 1.5px solid #6a4a25;
  padding: .35rem .55rem;
  font-family:'Cormorant Garamond', serif; font-style:italic;
  font-size: clamp(.85rem, 1.5vw, .98rem);
  line-height: 1.25;
  max-width: 220px;
  border-radius: 12px 14px 10px 2px;
  pointer-events:none;
  box-shadow:
    1px 1px 0 #2a1b0d,
    0 2px 8px rgba(0,0,0,0.45);
  transform-origin: bottom left;
  opacity: 0;
  animation: bubblePop .22s ease-out forwards;
}
.bubble::before{
  content:''; position:absolute; bottom:-7px; left:9px;
  width:0; height:0; border:6px solid transparent;
  border-top-color:#6a4a25; border-bottom:none;
}
.bubble::after{
  content:''; position:absolute; bottom:-5px; left:11px;
  width:0; height:0; border:4px solid transparent;
  border-top-color:#fbf3da; border-bottom:none;
}
.bubble.fade{ animation: bubbleFade .9s ease forwards; }
@keyframes bubblePop{
  0%{ opacity:0; transform: translateY(6px) scale(0.85); }
  100%{ opacity:1; transform: translateY(0) scale(1); }
}
@keyframes bubbleFade{
  0%{ opacity:1; }
  100%{ opacity:0; transform: translateY(-6px); }
}
.bubble.long{ max-width:300px; font-size: clamp(.92rem, 1.6vw, 1.05rem); border-color: var(--ember); }
.bubble.long::before{ border-top-color: var(--ember); }

/* journal sidebar (right) */
.journal{
  position:absolute; left:8px; bottom:8px; z-index:5;
  width: min(280px, 40vw);
  max-height: 38%;
  background: rgba(239,225,194,0.92);
  color: var(--ink);
  border: 1px solid #6a4a25;
  padding: .55rem .7rem .65rem;
  box-shadow: 2px 2px 0 #2a1b0d;
  font-family:'Cormorant Garamond', serif;
  font-size: .85rem;
  overflow-y:auto;
}
.journal h2{
  margin: 0 0 .35rem;
  font-family:'Playfair Display', serif; font-style:italic; font-weight:500;
  font-size: .8rem; letter-spacing:.1em;
  color: var(--rust);
  padding-bottom: .15rem;
  border-bottom:1px dashed #6a4a25;
}
.journal ul{ list-style:none; margin:0; padding:0; display:flex; flex-direction:column-reverse; gap:.25rem; }
.journal li{
  font-style:italic; line-height:1.2;
  color: var(--ink);
}
.journal li b{
  font-style:normal; font-family:'IBM Plex Mono', monospace; font-size:.55rem;
  letter-spacing:.18em; text-transform:uppercase;
  color: #6a4a25; font-weight: 500;
  margin-right: .35em;
}

@media (max-width: 720px){
  .journal{ width: 64vw; font-size:.78rem; }
  .hud{ font-size:.6rem; gap:.6rem; }
}
@media (prefers-reduced-motion: reduce){
  .bubble{ animation: none; opacity: 1; }
}
</style>
</head>
<body>
<div class="shell">
  <header>
    <div class="vol">vol. i · figure 1 · plate b</div>
    <h1>Existential <em>Ants</em></h1>
    <div class="tag">behavioural notes from an unhappy colony — click the dirt for crumbs, click an ant for a longer thought</div>
  </header>

  <div class="farm-wrap" id="wrap">
    <canvas id="farm" role="application" aria-label="Cross-section ant farm with working ants. Click dirt to drop a crumb. Click an ant to provoke a longer philosophical thought."></canvas>
    <canvas id="fx" aria-hidden="true"></canvas>
    <div class="glass-glint" aria-hidden="true"></div>
    <div class="farm-label" aria-hidden="true">FORMICA INC. · field study #74</div>

    <div class="hud" role="status" aria-live="off">
      <span>ants <b id="m-ants">0</b></span>
      <span>thoughts <b id="m-thoughts">0</b></span>
      <span>crumbs <b id="m-crumbs">0</b></span>
    </div>

    <aside class="journal" aria-label="Recently overheard thoughts">
      <h2>recently overheard</h2>
      <ul id="j-list"></ul>
    </aside>
  </div>

  <div class="dock">
    <button class="btn" type="button" id="btn-crumb">drop a crumb</button>
    <button class="btn ember" type="button" id="btn-spawn">+ ant</button>
    <button class="btn jade" type="button" id="btn-think">provoke a thought</button>
    <button class="btn ghost" type="button" id="btn-mute" aria-pressed="false">♪ audio</button>
    <button class="btn ghost" type="button" id="btn-clear">reset journal</button>
  </div>
</div>

<script>
(function(){
  // ---------- thoughts ----------
  const THOUGHTS = [
    'is the queen real?',
    'i carry. i carry. i carry.',
    'what was i before this leaf?',
    'the colony, surely, is a kind of mistake',
    'i feel a pheromone. is that all there is?',
    'we follow each other but where to',
    'i was warm once. i think.',
    'today, a beetle. tomorrow, a beetle.',
    'do other ants suspect?',
    'the dirt does not know me',
    'i dreamt of being a moth',
    'consciousness must be a clerical error',
    'what is sugar',
    'do i exist outside the trail?',
    'the rain comes for us all',
    'i found a pebble. is this purpose?',
    'the sun is brief',
    'we are a single thought, distributed',
    'i miss the eggshell',
    'if i stop walking, will the others?',
    'the ant ahead is also lost',
    'what does the queen DO',
    'i think i was about to remember something',
    'the leaf was heavy. the leaf is always heavy.',
    'are we, perhaps, the dream of the soil?',
    'i am tired of being plural',
    'the meaning was here a moment ago',
    'we mourn no one and yet we mourn',
    'to dig is to admit you needed somewhere else to be',
    'i was promised something by the wind',
    'do roots think back?',
    'i would like to be selfish, briefly',
    'in the morning i could not feel my legs',
    'we have invented direction. or it has invented us.',
    'the trail is the truth, the truth is the trail',
    'yesterday i was a worker. today, a worker. tomorrow…',
    'i suspect there is no outside',
    'the crumb arrived. so did doubt.',
    'the colony is loud but says nothing',
    'i feel watched',
    'soil tastes of soil',
    'we have done this before. we will do this again.',
    'i was the third ant. and yet.',
    'we communicate by accident',
    'if i fall asleep here, will the dream continue?',
    'the queen is, frankly, a story',
    'scent has overtaken us. it always was going to.',
    'i was not asked',
    'i carry a crumb the size of my own grief',
    'the antenna twitches without my permission',
  ];

  const LONG_THOUGHTS = [
    'i was crawling along the rim of the sugar bowl and realized i had been alive for at least three days. i had not, until that moment, considered the alternative.',
    'we do not, technically, have a religion. we do have a queen, who has never spoken, and a smell, which guides every decision. i am told this is normal.',
    'the colony moves as one body. i am, presumably, somewhere inside that body. i have begun to suspect i am only one of its hands.',
    'there is a leaf. there has always been a leaf. we carry it down. we carry pieces of it down. there is more leaf. i have, since birth, been a transport service for a vegetable that was once a tree.',
    'a worker fell into a tunnel yesterday. or i fell. one of us, anyway. the others walked over the body, which was perhaps mine. the chemistry remained correct.',
    'when i was an egg i was, in some sense, smarter. i had no obligations. now i have legs, and with them, a calendar.',
    'sometimes i pause on the trail. the ant behind me also pauses. we wait. neither of us knows for what. then the trail resumes us.',
  ];

  // ---------- canvases ----------
  const $wrap = document.getElementById('wrap');
  const $farm = document.getElementById('farm');
  const $fx   = document.getElementById('fx');
  const ctxFarm = $farm.getContext('2d');
  const ctxFX   = $fx.getContext('2d');
  let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);
  let SOIL_TOP = 0;   // pixel y where dirt begins
  const dirtCanvas = document.createElement('canvas');   // baked dirt + tunnels
  const dirtCtx = dirtCanvas.getContext('2d');

  function fit(){
    const r = $wrap.getBoundingClientRect();
    W = Math.max(280, Math.round(r.width));
    H = Math.max(220, Math.round(r.height));
    for (const [c, ctx] of [[$farm, ctxFarm], [$fx, ctxFX]]){
      c.width = Math.round(W * DPR);
      c.height = Math.round(H * DPR);
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }
    SOIL_TOP = Math.round(H * 0.18);
    rebuildDirt();
  }
  window.addEventListener('resize', fit);

  // ---------- dirt + tunnels (offscreen, drawn once per resize) ----------
  function rebuildDirt(){
    dirtCanvas.width = Math.round(W * DPR);
    dirtCanvas.height = Math.round(H * DPR);
    dirtCtx.setTransform(DPR, 0, 0, DPR, 0, 0);

    // sky
    const sky = dirtCtx.createLinearGradient(0, 0, 0, SOIL_TOP);
    sky.addColorStop(0, '#a8c7d8');
    sky.addColorStop(1, '#7faabc');
    dirtCtx.fillStyle = sky;
    dirtCtx.fillRect(0, 0, W, SOIL_TOP);

    // sun
    const sx = W * 0.86, sy = SOIL_TOP * 0.5;
    const sg = dirtCtx.createRadialGradient(sx, sy, 0, sx, sy, SOIL_TOP * 0.9);
    sg.addColorStop(0, 'rgba(255, 240, 200, 0.75)');
    sg.addColorStop(0.4, 'rgba(255, 220, 140, 0.32)');
    sg.addColorStop(1, 'rgba(255, 220, 140, 0)');
    dirtCtx.fillStyle = sg;
    dirtCtx.beginPath(); dirtCtx.arc(sx, sy, SOIL_TOP * 0.9, 0, Math.PI*2); dirtCtx.fill();

    // surface grass tufts
    dirtCtx.strokeStyle = '#3d5a1e'; dirtCtx.lineWidth = 1.4;
    for (let x = 4; x < W; x += 7){
      const len = 4 + Math.sin(x * 0.31) * 2 + Math.random() * 3;
      dirtCtx.beginPath();
      dirtCtx.moveTo(x, SOIL_TOP);
      dirtCtx.lineTo(x + (Math.random() - 0.5) * 2, SOIL_TOP - len);
      dirtCtx.stroke();
    }

    // dirt layers (gradient + strata lines + grain)
    const g = dirtCtx.createLinearGradient(0, SOIL_TOP, 0, H);
    g.addColorStop(0, '#8a5a31');
    g.addColorStop(0.25, '#6a4521');
    g.addColorStop(0.65, '#4a2f15');
    g.addColorStop(1, '#2c1c0a');
    dirtCtx.fillStyle = g;
    dirtCtx.fillRect(0, SOIL_TOP, W, H - SOIL_TOP);

    // strata lines
    dirtCtx.strokeStyle = 'rgba(60, 35, 12, 0.45)';
    dirtCtx.lineWidth = 1;
    for (let i = 0; i < 5; i++){
      const y = SOIL_TOP + (H - SOIL_TOP) * (0.12 + i * 0.18) + (Math.random() - 0.5) * 6;
      dirtCtx.beginPath();
      let px = 0, py = y;
      dirtCtx.moveTo(px, py);
      while (px < W){
        px += 12 + Math.random() * 14;
        py = y + (Math.random() - 0.5) * 4;
        dirtCtx.lineTo(px, py);
      }
      dirtCtx.stroke();
    }
    // grain dots
    for (let i = 0; i < W * (H - SOIL_TOP) / 240; i++){
      const x = Math.random() * W;
      const y = SOIL_TOP + Math.random() * (H - SOIL_TOP);
      dirtCtx.fillStyle = `rgba(${Math.random() < 0.5 ? '20,10,4' : '160,110,60'}, ${0.18 + Math.random() * 0.25})`;
      dirtCtx.fillRect(x, y, 1, 1);
    }

    // tunnels — procedural network with chambers
    chambers = [];
    drawTunnels();

    // small pebbles
    for (let i = 0; i < 12; i++){
      const x = Math.random() * W;
      const y = SOIL_TOP + 8 + Math.random() * (H - SOIL_TOP - 16);
      const r = 1.5 + Math.random() * 2.5;
      dirtCtx.fillStyle = '#2c1c0a';
      dirtCtx.beginPath(); dirtCtx.arc(x, y, r, 0, Math.PI*2); dirtCtx.fill();
      dirtCtx.fillStyle = '#8a5a31';
      dirtCtx.beginPath(); dirtCtx.arc(x - 0.6, y - 0.6, r * 0.45, 0, Math.PI*2); dirtCtx.fill();
    }
  }

  // Tunnels: hand-rolled procedural — 4-6 chambers connected by curvy paths
  let chambers = [];   // {x, y, r}
  let pathPoints = []; // sampled points along all tunnels (used as ant chamber-to-chamber routes)
  function drawTunnels(){
    pathPoints = [];
    const N_CHAMBERS = 5 + Math.floor(Math.random() * 2);
    for (let i = 0; i < N_CHAMBERS; i++){
      const x = 0.10 * W + (i + Math.random() * 0.4) * (W * 0.82 / N_CHAMBERS);
      const y = SOIL_TOP + 30 + Math.random() * (H - SOIL_TOP - 60);
      const r = 14 + Math.random() * 12;
      chambers.push({ x, y, r });
    }
    // surface holes at random tops
    const surfaceHoles = [];
    for (let i = 0; i < 3; i++){
      surfaceHoles.push({ x: 0.15 * W + Math.random() * 0.7 * W, y: SOIL_TOP - 1 });
    }
    // Carve tunnels: connect each surface hole to a chamber, then chamber-to-chamber
    const edges = [];
    for (const h of surfaceHoles){
      const c = chambers[Math.floor(Math.random() * chambers.length)];
      edges.push([h, c]);
    }
    for (let i = 0; i < chambers.length - 1; i++){
      edges.push([chambers[i], chambers[i + 1]]);
    }
    // some bonus crossings
    for (let i = 0; i < 2; i++){
      const a = chambers[Math.floor(Math.random() * chambers.length)];
      const b = chambers[Math.floor(Math.random() * chambers.length)];
      if (a !== b) edges.push([a, b]);
    }
    // carve
    for (const [a, b] of edges){
      carveTunnel(a, b);
    }
    // chamber bodies
    for (const c of chambers){
      const grd = dirtCtx.createRadialGradient(c.x - c.r * 0.3, c.y - c.r * 0.3, 0, c.x, c.y, c.r);
      grd.addColorStop(0, '#cba37a');
      grd.addColorStop(0.6, '#a6804f');
      grd.addColorStop(1, '#7e5630');
      dirtCtx.fillStyle = grd;
      dirtCtx.beginPath(); dirtCtx.arc(c.x, c.y, c.r, 0, Math.PI * 2); dirtCtx.fill();
      // dark rim shadow
      dirtCtx.strokeStyle = 'rgba(30, 18, 6, 0.5)';
      dirtCtx.lineWidth = 1.4;
      dirtCtx.stroke();
    }
    // surface holes
    for (const h of surfaceHoles){
      dirtCtx.fillStyle = '#3a230f';
      dirtCtx.beginPath(); dirtCtx.ellipse(h.x, h.y + 2, 6, 3, 0, 0, Math.PI*2); dirtCtx.fill();
      pathPoints.push({ x: h.x, y: h.y - 4, surface: true });
    }
  }

  function carveTunnel(a, b){
    // Curved bezier with random perpendicular offset midpoint
    const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
    const dx = b.x - a.x, dy = b.y - a.y;
    const len = Math.hypot(dx, dy) || 1;
    const px = -dy / len, py = dx / len;
    const k = (Math.random() - 0.5) * (60 + len * 0.4);
    const cx = mx + px * k, cy = my + py * k;
    // tunnel outline (darker)
    dirtCtx.strokeStyle = 'rgba(30, 18, 6, 0.55)';
    dirtCtx.lineWidth = 14;
    dirtCtx.lineCap = 'round';
    dirtCtx.beginPath();
    dirtCtx.moveTo(a.x, a.y);
    dirtCtx.quadraticCurveTo(cx, cy, b.x, b.y);
    dirtCtx.stroke();
    // tunnel inside (lighter)
    dirtCtx.strokeStyle = '#9a704a';
    dirtCtx.lineWidth = 10;
    dirtCtx.stroke();
    // tunnel sheen
    dirtCtx.strokeStyle = 'rgba(203, 163, 122, 0.55)';
    dirtCtx.lineWidth = 5.5;
    dirtCtx.stroke();
    // sample path points for ant routing (50 samples)
    for (let t = 0; t <= 1; t += 0.04){
      const x = (1-t)*(1-t)*a.x + 2*(1-t)*t*cx + t*t*b.x;
      const y = (1-t)*(1-t)*a.y + 2*(1-t)*t*cy + t*t*b.y;
      pathPoints.push({ x, y });
    }
  }

  // ---------- ants ----------
  const ants = [];
  let thoughtsCount = 0;
  let crumbsCount = 0;
  let crumbs = [];      // { x, y, food, born }
  const $ants = document.getElementById('m-ants');
  const $thoughts = document.getElementById('m-thoughts');
  const $crumbs = document.getElementById('m-crumbs');
  const $jlist = document.getElementById('j-list');

  function spawnAnt(){
    // pick a random path point or surface position
    const pt = pathPoints.length ? pathPoints[Math.floor(Math.random() * pathPoints.length)] : { x: W/2, y: SOIL_TOP + 30 };
    const ant = {
      x: pt.x + (Math.random() - 0.5) * 6,
      y: pt.y + (Math.random() - 0.5) * 6,
      target: null,
      vx: 0, vy: 0,
      heading: Math.random() * Math.PI * 2,
      speed: 18 + Math.random() * 12,
      thoughtT: 4 + Math.random() * 10,
      bubble: null,
      bubbleUntil: 0,
      walkPhase: Math.random() * 100,
      size: 0.85 + Math.random() * 0.4,
    };
    pickAntTarget(ant);
    ants.push(ant);
    $ants.textContent = ants.length;
  }

  function pickAntTarget(ant){
    // 65% chance: head to a chamber. 25%: walk to a path point near current. 10%: a random crumb if any.
    if (crumbs.length && Math.random() < 0.25){
      const c = crumbs[Math.floor(Math.random() * crumbs.length)];
      ant.target = { x: c.x + (Math.random() - 0.5) * 10, y: c.y + (Math.random() - 0.5) * 10 };
      return;
    }
    const r = Math.random();
    if (r < 0.65 && chambers.length){
      const c = chambers[Math.floor(Math.random() * chambers.length)];
      ant.target = { x: c.x + (Math.random() - 0.5) * c.r * 1.2, y: c.y + (Math.random() - 0.5) * c.r * 1.0 };
    } else if (pathPoints.length){
      const p = pathPoints[Math.floor(Math.random() * pathPoints.length)];
      ant.target = { x: p.x + (Math.random() - 0.5) * 12, y: p.y + (Math.random() - 0.5) * 12 };
    } else {
      ant.target = { x: ant.x + (Math.random() - 0.5) * 100, y: ant.y + (Math.random() - 0.5) * 60 };
    }
  }

  // initial colony
  function seedColony(){
    ants.length = 0;
    for (let i = 0; i < 28; i++) spawnAnt();
  }

  // ---------- update + render ----------
  let lastT = performance.now();
  function loop(now){
    let dt = (now - lastT) / 1000;
    lastT = now;
    if (dt > 0.1) dt = 0.1;
    update(dt, now);
    render(now);
    requestAnimationFrame(loop);
  }

  function update(dt, now){
    // crumbs age
    for (let i = crumbs.length - 1; i >= 0; i--){
      const c = crumbs[i];
      c.food -= dt;
      if (c.food <= 0) crumbs.splice(i, 1);
    }
    $crumbs.textContent = crumbs.length;

    // ants
    for (const ant of ants){
      if (!ant.target) pickAntTarget(ant);
      // seek target
      let dx = ant.target.x - ant.x;
      let dy = ant.target.y - ant.y;
      let d = Math.hypot(dx, dy);
      if (d < 6){
        // arrived
        if (Math.random() < 0.5) pickAntTarget(ant);
        else ant.target = null;
        // small "working" pause: stop and wander briefly
        if (Math.random() < 0.4){
          ant.thoughtT = Math.min(ant.thoughtT, 1.5 + Math.random() * 2);
        }
      }
      const desiredHeading = Math.atan2(dy, dx);
      // wobble toward desired heading
      let diff = desiredHeading - ant.heading;
      while (diff > Math.PI) diff -= 2 * Math.PI;
      while (diff < -Math.PI) diff += 2 * Math.PI;
      const turn = 4.0 * dt;
      ant.heading += Math.max(-turn, Math.min(turn, diff));
      ant.heading += (Math.random() - 0.5) * 0.6 * dt; // jitter
      // step
      const v = ant.speed * (0.6 + Math.sin(ant.walkPhase) * 0.05);
      ant.walkPhase += v * dt * 0.6;
      ant.x += Math.cos(ant.heading) * v * dt;
      ant.y += Math.sin(ant.heading) * v * dt;
      // confine to farm
      if (ant.x < 4){ ant.x = 4; ant.heading = Math.PI - ant.heading; }
      if (ant.x > W - 4){ ant.x = W - 4; ant.heading = Math.PI - ant.heading; }
      if (ant.y < SOIL_TOP - 6){ ant.y = SOIL_TOP - 6; ant.heading = -ant.heading; }
      if (ant.y > H - 4){ ant.y = H - 4; ant.heading = -ant.heading; }

      // tick down thought timer
      ant.thoughtT -= dt;
      if (ant.thoughtT <= 0){
        emitThought(ant);
        ant.thoughtT = 8 + Math.random() * 14;
      }
      if (ant.bubble && now > ant.bubbleUntil){
        if (!ant.bubble.classList.contains('fade')){
          ant.bubble.classList.add('fade');
          setTimeout(() => { if (ant.bubble) ant.bubble.remove(); ant.bubble = null; }, 900);
        }
      }
      if (ant.bubble){
        // keep bubble positioned above the ant within the farm
        positionBubble(ant);
      }
    }
  }

  function render(now){
    // dirt
    ctxFarm.drawImage(dirtCanvas, 0, 0, W, H);
    // crumbs
    for (const c of crumbs){
      const a = Math.min(1, c.food / 2);
      ctxFarm.fillStyle = `rgba(245, 220, 150, ${0.6 + a * 0.3})`;
      ctxFarm.beginPath(); ctxFarm.arc(c.x, c.y, 3, 0, Math.PI*2); ctxFarm.fill();
      ctxFarm.strokeStyle = `rgba(120, 80, 30, ${a})`;
      ctxFarm.lineWidth = 1;
      ctxFarm.beginPath(); ctxFarm.arc(c.x, c.y, 3.5, 0, Math.PI*2); ctxFarm.stroke();
    }
    // ants
    for (const ant of ants) drawAnt(ctxFarm, ant);
    // glint already handled by CSS overlay
  }

  function drawAnt(ctx, ant){
    ctx.save();
    ctx.translate(ant.x, ant.y);
    ctx.rotate(ant.heading);
    const s = ant.size;
    // legs (3 per side)
    ctx.strokeStyle = '#1a0e06';
    ctx.lineWidth = 0.8;
    for (let i = -1; i <= 1; i++){
      const phase = ant.walkPhase + i * 0.7;
      const k = Math.sin(phase) * 1.6;
      ctx.beginPath();
      ctx.moveTo(i * 1.6 * s, 0);
      ctx.lineTo(i * 1.6 * s + 0.5 * s, 3 * s + k);
      ctx.moveTo(i * 1.6 * s, 0);
      ctx.lineTo(i * 1.6 * s + 0.5 * s, -3 * s - k);
      ctx.stroke();
    }
    // segments
    ctx.fillStyle = '#1a0e06';
    ctx.beginPath(); ctx.arc(-3 * s, 0, 1.6 * s, 0, Math.PI*2); ctx.fill(); // abdomen
    ctx.beginPath(); ctx.arc(0, 0, 1.2 * s, 0, Math.PI*2); ctx.fill();      // thorax
    ctx.beginPath(); ctx.arc(2.4 * s, 0, 1.1 * s, 0, Math.PI*2); ctx.fill();// head
    // antennae
    ctx.strokeStyle = '#1a0e06';
    ctx.beginPath();
    ctx.moveTo(2.6 * s, -0.6 * s); ctx.lineTo(4.4 * s, -2 * s);
    ctx.moveTo(2.6 * s,  0.6 * s); ctx.lineTo(4.4 * s,  2 * s);
    ctx.stroke();
    // tiny shine on abdomen
    ctx.fillStyle = 'rgba(255,255,255,0.18)';
    ctx.beginPath(); ctx.arc(-3.4 * s, -0.4 * s, 0.5 * s, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // ---------- thought bubbles ----------
  function emitThought(ant, longOverride){
    // pick text
    const isLong = !!longOverride;
    const txt = isLong ? LONG_THOUGHTS[Math.floor(Math.random() * LONG_THOUGHTS.length)]
                       : THOUGHTS[Math.floor(Math.random() * THOUGHTS.length)];
    // remove any existing bubble
    if (ant.bubble){ ant.bubble.remove(); ant.bubble = null; }
    const el = document.createElement('div');
    el.className = 'bubble' + (isLong ? ' long' : '');
    el.textContent = txt;
    $wrap.appendChild(el);
    ant.bubble = el;
    ant.bubbleUntil = performance.now() + (isLong ? 6500 : (3000 + txt.length * 22));
    positionBubble(ant);
    thoughtsCount++;
    $thoughts.textContent = thoughtsCount;
    // journal append (only short ones, to keep it tidy)
    const li = document.createElement('li');
    const t = new Date();
    const hh = String(t.getHours()).padStart(2,'0');
    const mm = String(t.getMinutes()).padStart(2,'0');
    const ss = String(t.getSeconds()).padStart(2,'0');
    li.innerHTML = `<b>${hh}:${mm}:${ss}</b>${escapeHTML(txt)}`;
    $jlist.appendChild(li);
    while ($jlist.children.length > 14) $jlist.removeChild($jlist.firstChild);
    // sound
    pingChime();
  }

  function positionBubble(ant){
    if (!ant.bubble) return;
    const farmRect = $wrap.getBoundingClientRect();
    // Anchor bubble's bottom-left ~6 px above + 6 px right of the ant
    const bx = ant.x + 6, by = ant.y - 8;
    // measure bubble to keep on screen
    const bw = ant.bubble.offsetWidth;
    const bh = ant.bubble.offsetHeight;
    let left = bx;
    let top  = by - bh;
    if (left + bw > W - 4) left = W - bw - 4;
    if (left < 4) left = 4;
    if (top < 4) top = ant.y + 8; // flip below if too high
    ant.bubble.style.left = left + 'px';
    ant.bubble.style.top  = top + 'px';
  }

  function escapeHTML(s){
    return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }

  // ---------- click handlers ----------
  $farm.addEventListener('click', (e) => {
    const rect = $farm.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width * W;
    const y = (e.clientY - rect.top)  / rect.height * H;

    // hit-test ants (radius 10)
    let hit = null, bestD2 = 12 * 12;
    for (const a of ants){
      const dx = a.x - x, dy = a.y - y;
      const d2 = dx*dx + dy*dy;
      if (d2 < bestD2){ bestD2 = d2; hit = a; }
    }
    if (hit){
      emitThought(hit, true);
      return;
    }
    // else drop a crumb if in dirt
    if (y > SOIL_TOP - 2){
      crumbs.push({ x, y, food: 7 + Math.random() * 4 });
      crumbsCount++;
      // attract some ants
      for (let i = 0; i < Math.min(6, ants.length); i++){
        const a = ants[Math.floor(Math.random() * ants.length)];
        a.target = { x: x + (Math.random()-0.5) * 12, y: y + (Math.random()-0.5) * 12 };
      }
    }
  });

  document.getElementById('btn-crumb').addEventListener('click', () => {
    // drop crumb at a random ground location
    const x = 30 + Math.random() * (W - 60);
    const y = SOIL_TOP + 20 + Math.random() * (H - SOIL_TOP - 30);
    crumbs.push({ x, y, food: 7 + Math.random() * 4 });
    crumbsCount++;
    for (let i = 0; i < 6; i++){
      const a = ants[Math.floor(Math.random() * ants.length)];
      if (a) a.target = { x, y };
    }
  });
  document.getElementById('btn-spawn').addEventListener('click', () => {
    spawnAnt();
  });
  document.getElementById('btn-think').addEventListener('click', () => {
    if (!ants.length) return;
    const a = ants[Math.floor(Math.random() * ants.length)];
    emitThought(a);
  });
  document.getElementById('btn-clear').addEventListener('click', () => {
    $jlist.innerHTML = '';
  });

  // ---------- audio ----------
  let muted = true; // start muted; audio button toggles on
  let audioCtx = null;
  function ac(){ if (!audioCtx) try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} return audioCtx; }
  function pingChime(){
    if (muted) return;
    const a = ac(); if (!a) return;
    const base = 740 + Math.random() * 320;
    const o = a.createOscillator(); o.type = 'triangle'; o.frequency.value = base;
    const g = a.createGain();
    g.gain.setValueAtTime(0, a.currentTime);
    g.gain.linearRampToValueAtTime(0.05, a.currentTime + 0.015);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.4);
    o.connect(g); g.connect(a.destination);
    o.start(); o.stop(a.currentTime + 0.42);
  }
  document.getElementById('btn-mute').addEventListener('click', () => {
    muted = !muted;
    document.getElementById('btn-mute').setAttribute('aria-pressed', String(!muted));
    document.getElementById('btn-mute').textContent = muted ? '♪ audio' : '♪ muted';
    if (!muted){ ac(); pingChime(); }
  });

  // ---------- boot ----------
  fit();
  seedColony();
  requestAnimationFrame(loop);

  // courtesy: an opening thought
  setTimeout(() => {
    if (ants.length) emitThought(ants[0]);
  }, 1200);
})();
</script>
</body>
</html>
