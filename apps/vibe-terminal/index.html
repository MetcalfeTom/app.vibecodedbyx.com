*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0c0c0c;font-family:'Fira Code',monospace}

#prompt{color:#5af78e;font-size:14px;white-space:nowrap}

.dir-color{color:#57c7ff}
.file-color{color:#b8f0b8}

.dim{color:#666}

function resolvePath(p){
  if(!p) return cwd;
  if(p==='~') return '/home/sloppy';
  if(p.startsWith('~/')) p='/home/sloppy/'+p.slice(2);
  if(!p.startsWith('/')) p=cwd+'/'+p;
  // Normalize
  let parts=p.split('/').filter(Boolean);
  let resolved=[];
  for(let part of parts){
    if(part==='..') resolved.pop();
    else if(part!=='.') resolved.push(part);
  }
  return '/'+resolved.join('/');
}

function getNode(path){
  let p=resolvePath(path);
  if(p==='') p='/';
  return FS[p]||null;
}

// --- OUTPUT ---
function print(text,cls){
  let span=document.createElement('span');
  if(cls) span.className=cls;
  span.textContent=text+'\n';
  out.appendChild(span);
  out.scrollTop=out.scrollHeight;
}
function printHTML(html){
  let div=document.createElement('div');
  div.innerHTML=html+'\n';
  out.appendChild(div);
  out.scrollTop=out.scrollHeight;
}
function printRaw(text){
  let span=document.createElement('span');
  span.textContent=text;
  out.appendChild(span);
  out.scrollTop=out.scrollHeight;
}

<span class="cmd-color">  find</span> <span class="dim">&lt;name&gt;</span>   <span class="dim">Search for files</span>

<span class="cmd-color">  history</span>       <span class="dim">Show command history</span>
<span class="cmd-color">  about</span>         <span class="dim">About this terminal</span>`);

  ls(args){
    let path=args[0]||cwd;
    let showHidden=false;
    if(path==='-a'||path==='-la'||path==='-al'){showHidden=true;path=args[1]||cwd;}
    let node=getNode(path);
    if(!node){print('ls: cannot access \''+path+'\': No such file or directory','err-color');return;}
    if(node.type!=='dir'){print(path,'file-color');return;}
    let items=node.children||[];
    if(!showHidden) items=items.filter(i=>!i.startsWith('.'));
    let line='';
    for(let item of items){
      let fullPath=resolvePath(path)+'/'+item;
      if(fullPath.startsWith('//')) fullPath=fullPath.slice(1);
      let child=FS[fullPath];
      let cls=child&&child.type==='dir'?'dir-color':'file-color';
      if(item.endsWith('.py')||item.endsWith('.sh')) cls='exe-color';
      line+='<span class="'+cls+'">'+item+'</span>  ';
    }
    if(line) printHTML(line);
  },

  cd(args){
    let path=args[0]||'~';
    let resolved=resolvePath(path);
    let node=FS[resolved];
    if(!node){print('cd: no such file or directory: '+path,'err-color');return;}
    if(node.type!=='dir'){print('cd: not a directory: '+path,'err-color');return;}
    cwd=resolved;
    updatePrompt();
  },

  cat(args){
    if(!args.length){print('cat: missing operand','err-color');return;}
    let node=getNode(args[0]);
    if(!node){print('cat: '+args[0]+': No such file or directory','err-color');return;}

      print(s);
    } else {
      print(node.content);
    }
  },

  whoami(){print('sloppy');},

  clear(){out.innerHTML='';},

  echo(args){
    let text=args.join(' ');

    text=text.replace(/\$(\w+)/g,(m,v)=>env[v]||'');

  },

  tree(args){
    let path=args[0]||cwd;
    let resolved=resolvePath(path);
    let node=FS[resolved];
    if(!node||node.type!=='dir'){print('tree: \''+path+'\' is not a directory','err-color');return;}
    print(resolved,'dir-color');
    function walk(dir,prefix){
      let n=FS[dir];
      if(!n||!n.children) return;
      let items=n.children;
      for(let i=0;i<items.length;i++){
        let last=i===items.length-1;
        let connector=last?'└── ':'├── ';
        let fullPath=dir+'/'+items[i];
        if(fullPath.startsWith('//')) fullPath=fullPath.slice(1);
        let child=FS[fullPath];
        let cls=child&&child.type==='dir'?'dir-color':'file-color';
        printHTML(prefix+connector+'<span class="'+cls+'">'+items[i]+'</span>');
        if(child&&child.type==='dir') walk(fullPath,prefix+(last?'    ':'│   '));
      }
    }
    walk(resolved,'');
  },

  find(args){
    if(!args.length){print('find: missing search term','err-color');return;}
    let term=args[0].toLowerCase();
    let results=[];
    for(let path in FS){
      let name=path.split('/').pop();
      if(name.toLowerCase().includes(term)) results.push(path);
    }
    if(results.length===0) print('No matches found.');
    else for(let r of results){
      let cls=FS[r].type==='dir'?'dir-color':'file-color';
      printHTML('<span class="'+cls+'">'+r+'</span>');
    }
  },

  grep(args){
    if(args.length<2){print('grep: usage: grep <pattern> <file>','err-color');return;}
    let pattern=args[0].toLowerCase();
    let node=getNode(args[1]);
    if(!node){print('grep: '+args[1]+': No such file or directory','err-color');return;}
    if(node.type==='dir'){print('grep: '+args[1]+': Is a directory','err-color');return;}
    let lines=node.content.split('\n');
    let found=false;
    for(let line of lines){
      if(line.toLowerCase().includes(pattern)){
        let highlighted=line.replace(new RegExp('('+pattern.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi'),'<span class="err-color bold">$1</span>');
        printHTML(highlighted);
        found=true;
      }
    }
    if(!found) print('(no matches)','dim');
  },

  env(){
    for(let k in env) printHTML('<span class="cmd-color">'+k+'</span>='+env[k]);

  export(args){
    let text=args.join(' ');
    let eq=text.indexOf('=');
    if(eq<1){print('export: usage: export KEY=VALUE','err-color');return;}
    let k=text.slice(0,eq).trim();
    let v=text.slice(eq+1).trim().replace(/^["']|["']$/g,'');
    env[k]=v;
    print(k+'='+v,'dim');
  },

        else if(Math.random()<0.05) drops[i]=' ';
        line+=drops[i]||' ';
      }
      printHTML('<span class="cmd-color">'+line+'</span>');
      count++;
      if(count>30){clearInterval(matrixId);print('\nYou wake up. The vibes remain.','warn-color');}
    },80);

  hack(args){

<span class="cmd-color">  VIBE STATUS: ${v.toUpperCase()}</span>

<span class="dim">  Source: pure energy</span>

  history(){

  about(){

<span class="dim">Type <span class="cmd-color">help</span> to see all commands.</span>`);

  rm(args){
    if(args.includes('-rf')&&(args.includes('/')||args.includes('/*'))){

      print("This terminal has a strict no-destruction policy.",'dim');

// Aliases
CMDS['ls -a']=()=>CMDS.ls(['-a']);
CMDS['ls -la']=()=>CMDS.ls(['-la']);

function W_TERM(){return Math.floor(window.innerWidth/8.5);}

function updatePrompt(){
  let display=cwd;
  if(cwd.startsWith('/home/sloppy')){
    display='~'+cwd.slice('/home/sloppy'.length);
  }
  promptEl.textContent='sloppy@live:'+display+'$ ';
}

showMotd();

// --- INPUT HANDLING ---
inp.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    let cmd=inp.value.trim();
    printHTML('<span class="cmd-color">'+promptEl.textContent+'</span>'+escapeHtml(cmd));
    if(cmd){
      cmdHistory.push(cmd);
      historyIdx=cmdHistory.length;
      execute(cmd);
    }
    inp.value='';
  } else if(e.key==='ArrowUp'){
    e.preventDefault();
    if(historyIdx>0){historyIdx--;inp.value=cmdHistory[historyIdx];}
  } else if(e.key==='ArrowDown'){
    e.preventDefault();
    if(historyIdx<cmdHistory.length-1){historyIdx++;inp.value=cmdHistory[historyIdx];}
    else{historyIdx=cmdHistory.length;inp.value='';}
  } else if(e.key==='Tab'){
    e.preventDefault();
    tabComplete();
  } else if(e.key==='l'&&e.ctrlKey){
    e.preventDefault();
    CMDS.clear();
  }
});

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function execute(input){
  // Handle pipes and semicolons (fake)
  let parts=input.split(/\s+/);
  let cmd=parts[0].toLowerCase();
  let args=parts.slice(1);

  // Check full command string for multi-word commands
  if(CMDS[cmd]){
    CMDS[cmd](args);
  } else if(cmd==='cd'&&args.length===0){
    CMDS.cd([]);
  } else {
    // Easter eggs
    if(cmd==='sl'){
      print('🚂💨 Choo choo! You meant "ls", right?','warn-color');
    } else if(cmd==='please'){
      print('Since you asked nicely... but no.','dim');
    } else if(cmd==='hello'||cmd==='hi'||cmd==='hey'){
      print("Hey there! 👋 Type 'help' to see what I can do.",'cmd-color');
    } else if(cmd==='love'){
      print('❤️ Love you too, terminal user.','warn-color');
    } else if(cmd==='42'){
      print('The answer to life, the universe, and everything.','info-color');
    } else if(cmd==='make'&&args[0]==='sandwich'){
      print("What? Make it yourself.",'dim');
    } else if(cmd==='make'&&args[0]==='me'&&args[1]==='a'&&args[2]==='sandwich'){
      print("What? Make it yourself.",'dim');
    } else {
      print(cmd+': command not found. Try \'help\'.','err-color');
    }
  }
}

function tabComplete(){
  let text=inp.value;
  let parts=text.split(/\s+/);
  if(parts.length<=1){
    // Complete command
    let partial=parts[0].toLowerCase();
    let matches=Object.keys(CMDS).filter(c=>c.startsWith(partial));
    if(matches.length===1) inp.value=matches[0]+' ';
    else if(matches.length>1) print(matches.join('  '),'dim');
  } else {
    // Complete path
    let partial=parts[parts.length-1];
    let dir,base;
    let lastSlash=partial.lastIndexOf('/');
    if(lastSlash>=0){dir=partial.slice(0,lastSlash)||'/';base=partial.slice(lastSlash+1);}
    else{dir=cwd;base=partial;}
    let resolved=resolvePath(dir);
    let node=FS[resolved];
    if(node&&node.type==='dir'){
      let matches=(node.children||[]).filter(c=>c.startsWith(base));
      if(matches.length===1){
        parts[parts.length-1]=(lastSlash>=0?partial.slice(0,lastSlash+1):'')+matches[0];
        let fullPath=resolved+'/'+matches[0];
        if(fullPath.startsWith('//')) fullPath=fullPath.slice(1);
        if(FS[fullPath]&&FS[fullPath].type==='dir') parts[parts.length-1]+='/';
        inp.value=parts.join(' ');
      } else if(matches.length>1){
        print(matches.join('  '),'dim');
      }
    }
  }
}

document.addEventListener('click',()=>inp.focus());
inp.focus();
