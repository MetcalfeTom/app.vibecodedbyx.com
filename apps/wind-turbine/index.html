<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Wind Turbine Simulator</title>
<link rel="icon" href="https://emojicdn.elk.sh/🌬️">
<meta property="og:title" content="Wind Turbine Simulator">
<meta property="og:description" content="Control wind speed and blade pitch on a realistic turbine. Watch power output change in real time.">
<meta property="og:url" content="https://sloppy.live/wind-turbine">
<meta property="og:image" content="https://sloppy.live/wind-turbine/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a1628;--panel:#0f1d34;--border:#1a2d4a;
  --text:#5a7090;--bright:#c0d4ea;--accent:#40a8ff;
  --green:#40e890;--amber:#f0a030;--red:#e85050;
}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;
  min-height:100vh;display:flex;overflow:hidden;user-select:none}

#scene{flex:1;position:relative;min-width:0}
#scene canvas{display:block;width:100%;height:100%}

#panel{width:clamp(260px,22vw,320px);background:var(--panel);border-left:1px solid var(--border);
  display:flex;flex-direction:column;padding:16px;gap:14px;overflow-y:auto;flex-shrink:0}
.panel-title{font-weight:700;font-size:clamp(14px,1.8vw,18px);color:var(--bright);
  letter-spacing:1px;margin-bottom:2px}

.ctrl-group{display:flex;flex-direction:column;gap:6px}
.ctrl-label{display:flex;justify-content:space-between;font-size:11px;color:var(--text);
  font-family:'JetBrains Mono',monospace}
.ctrl-label .val{color:var(--accent);font-weight:600}
input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;
  background:var(--border);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;
  border-radius:50%;background:var(--accent);border:2px solid var(--bg);cursor:pointer;
  box-shadow:0 0 8px rgba(64,168,255,0.3)}

.gauge{background:rgba(10,22,40,0.6);border:1px solid var(--border);border-radius:6px;padding:10px 12px}
.gauge-title{font-size:10px;color:var(--text);letter-spacing:1px;margin-bottom:6px;
  font-family:'JetBrains Mono',monospace}
.gauge-value{font-family:'JetBrains Mono',monospace;font-size:clamp(22px,3vw,32px);
  font-weight:600;line-height:1}
.gauge-unit{font-size:11px;color:var(--text);margin-left:4px;font-weight:400}
.gauge-bar{height:4px;border-radius:2px;background:var(--border);margin-top:8px;overflow:hidden}
.gauge-bar-fill{height:100%;border-radius:2px;transition:width 0.3s,background 0.3s}
.gauge-sub{font-size:9px;color:var(--text);margin-top:4px;font-family:'JetBrains Mono',monospace;
  display:flex;justify-content:space-between}

#status-dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px;
  vertical-align:middle}
#status-text{font-size:11px;font-family:'JetBrains Mono',monospace}

.btn{background:var(--border);border:1px solid rgba(64,168,255,0.15);color:var(--bright);
  font-family:'JetBrains Mono',monospace;font-size:11px;padding:8px 12px;border-radius:4px;
  cursor:pointer;text-align:center;transition:all .15s}
.btn:hover{background:rgba(64,168,255,0.12);border-color:var(--accent)}
.btn.active{background:rgba(64,168,255,0.15);border-color:var(--accent);color:var(--accent)}

#graph-wrap{flex:1;min-height:80px;position:relative}
#graph-wrap canvas{width:100%;height:100%;display:block;border-radius:4px;
  border:1px solid var(--border)}

.back-link{position:fixed;bottom:8px;left:10px;z-index:10}
.back-link a{color:var(--border);font-size:9px;text-decoration:none;font-family:'JetBrains Mono',monospace}
.back-link a:hover{color:var(--text)}

@media(max-width:700px){
  body{flex-direction:column}
  #scene{height:50vh}
  #panel{width:100%;border-left:none;border-top:1px solid var(--border);max-height:50vh}
}
</style>
</head>
<body>
<div id="scene"><canvas id="turbineCanvas"></canvas></div>
<div id="panel">
  <div class="panel-title">WIND TURBINE SIM</div>
  <div>
    <span id="status-dot" style="background:var(--green)"></span>
    <span id="status-text" style="color:var(--green)">GENERATING</span>
  </div>

  <div class="ctrl-group">
    <div class="ctrl-label"><span>Wind Speed</span><span class="val" id="wind-val">8.0 m/s</span></div>
    <input type="range" id="wind-slider" min="0" max="30" step="0.5" value="8">
  </div>
  <div class="ctrl-group">
    <div class="ctrl-label"><span>Blade Pitch</span><span class="val" id="pitch-val">2.0°</span></div>
    <input type="range" id="pitch-slider" min="0" max="90" step="0.5" value="2">
  </div>
  <div class="ctrl-group">
    <div class="ctrl-label"><span>Yaw Angle</span><span class="val" id="yaw-val">0°</span></div>
    <input type="range" id="yaw-slider" min="-45" max="45" step="1" value="0">
  </div>

  <div class="gauge">
    <div class="gauge-title">POWER OUTPUT</div>
    <div class="gauge-value" id="power-value" style="color:var(--green)">0<span class="gauge-unit">kW</span></div>
    <div class="gauge-bar"><div class="gauge-bar-fill" id="power-bar" style="width:0%;background:var(--green)"></div></div>
    <div class="gauge-sub"><span>0</span><span id="power-max-label">3000 kW</span></div>
  </div>

  <div class="gauge">
    <div class="gauge-title">ROTOR SPEED</div>
    <div class="gauge-value" id="rpm-value" style="color:var(--accent)">0<span class="gauge-unit">RPM</span></div>
    <div class="gauge-bar"><div class="gauge-bar-fill" id="rpm-bar" style="width:0%;background:var(--accent)"></div></div>
    <div class="gauge-sub"><span>0</span><span>25 RPM</span></div>
  </div>

  <div class="gauge">
    <div class="gauge-title">TIP SPEED RATIO</div>
    <div class="gauge-value" id="tsr-value" style="color:var(--bright)">0<span class="gauge-unit">λ</span></div>
  </div>

  <div style="display:flex;gap:6px">
    <div class="btn" id="btn-brake" style="flex:1">⏚ BRAKE</div>
    <div class="btn" id="btn-auto" style="flex:1">AUTO PITCH</div>
  </div>

  <div class="gauge" style="flex:1;min-height:0;padding:6px;display:flex;flex-direction:column">
    <div class="gauge-title">POWER HISTORY</div>
    <div id="graph-wrap"><canvas id="graphCanvas"></canvas></div>
  </div>
</div>
<div class="back-link"><a href="https://sloppy.live">← sloppy.live</a></div>

<script>
// === PHYSICS MODEL ===
const RATED_POWER = 3000; // kW
const ROTOR_RADIUS = 63; // meters (representative of ~3MW turbine)
const AIR_DENSITY = 1.225; // kg/m³
const MAX_RPM = 25;
const ROTOR_AREA = Math.PI * ROTOR_RADIUS * ROTOR_RADIUS;
const CUT_IN = 3; // m/s
const CUT_OUT = 25;
const RATED_WIND = 12;
const ROTOR_INERTIA = 4e7; // kg·m² (approximate)

let windSpeed = 8;
let bladePitch = 2;  // degrees
let yawAngle = 0;
let braking = false;
let autoPitch = false;

let rotorAngle = 0;     // radians
let rotorOmega = 0;     // rad/s
let powerOutput = 0;    // kW
let tsr = 0;            // tip speed ratio

// Cp curve approximation (Heier model simplified)
function calcCp(lambda, pitch){
  const beta = pitch;
  const li = 1 / (1/(lambda + 0.08*beta) - 0.035/(beta*beta*beta + 1));
  const cp = 0.5176 * (116/li - 5 - 0.4*beta) * Math.exp(-21/li) + 0.0068*lambda;
  return Math.max(0, Math.min(0.48, cp));
}

function updatePhysics(dt){
  const effectiveWind = windSpeed * Math.cos(yawAngle * Math.PI/180);

  // Tip speed ratio
  const tipSpeed = rotorOmega * ROTOR_RADIUS;
  tsr = effectiveWind > 0.5 ? tipSpeed / effectiveWind : 0;

  // Power coefficient
  const cp = calcCp(tsr, bladePitch);

  // Aerodynamic torque
  const Paero = 0.5 * AIR_DENSITY * ROTOR_AREA * effectiveWind * effectiveWind * effectiveWind * cp;
  const aeroTorque = rotorOmega > 0.01 ? Paero / rotorOmega : Paero * 100;

  // Generator torque (simplified: extracts power proportional to omega²)
  const rpm = rotorOmega * 30 / Math.PI;
  let genTorque = 0;
  if(rpm > 1 && !braking){
    genTorque = Math.min(aeroTorque * 0.95, RATED_POWER * 1000 / Math.max(rotorOmega, 0.5));
  }

  // Brake torque
  let brakeTorque = 0;
  if(braking) brakeTorque = rotorOmega > 0.01 ? 800000 : 0;

  // Friction
  const friction = rotorOmega * 5000;

  // Net torque
  const netTorque = aeroTorque - genTorque - brakeTorque - friction;

  // Angular acceleration
  const alpha = netTorque / ROTOR_INERTIA;
  rotorOmega = Math.max(0, rotorOmega + alpha * dt);

  // Clamp RPM
  if(rpm > MAX_RPM * 1.1) rotorOmega = MAX_RPM * 1.1 * Math.PI / 30;

  // Power output
  if(effectiveWind < CUT_IN || effectiveWind > CUT_OUT || braking){
    powerOutput = Math.max(0, powerOutput * 0.95);
  } else {
    const rawPower = genTorque * rotorOmega / 1000; // kW
    powerOutput = powerOutput * 0.9 + Math.min(RATED_POWER, Math.max(0, rawPower)) * 0.1;
  }

  // Auto pitch
  if(autoPitch){
    const targetRpm = 15;
    const currentRpm = rotorOmega * 30 / Math.PI;
    if(currentRpm > targetRpm + 1){
      bladePitch = Math.min(90, bladePitch + 8 * dt);
    } else if(currentRpm < targetRpm - 1 && effectiveWind > CUT_IN){
      bladePitch = Math.max(0, bladePitch - 5 * dt);
    }
    document.getElementById('pitch-slider').value = bladePitch;
    document.getElementById('pitch-val').textContent = bladePitch.toFixed(1) + '°';
  }

  // Rotor angle
  rotorAngle += rotorOmega * dt;

  // Turbulence
  if(windSpeed > 1){
    windSpeed += (Math.random()-0.5) * 0.03 * windSpeed * dt;
    windSpeed = Math.max(0, Math.min(30, windSpeed));
    // Sync slider approximately (don't fight user dragging)
    if(!draggingWind){
      document.getElementById('wind-slider').value = windSpeed;
      document.getElementById('wind-val').textContent = windSpeed.toFixed(1) + ' m/s';
    }
  }
}

// === 3D TURBINE RENDERING ===
const tc = document.getElementById('turbineCanvas');
const tctx = tc.getContext('2d');
let TW, TH;

function resizeTurbine(){
  const r = tc.parentElement.getBoundingClientRect();
  TW = tc.width = Math.floor(r.width * 2);
  TH = tc.height = Math.floor(r.height * 2);
}
resizeTurbine();
window.addEventListener('resize', resizeTurbine);

// Wind particles
const windParticles = [];
const WIND_PARTICLE_COUNT = 80;
for(let i = 0; i < WIND_PARTICLE_COUNT; i++){
  windParticles.push({
    x: Math.random() * 2 - 0.2,
    y: Math.random(),
    speed: 0.3 + Math.random() * 0.5,
    alpha: 0.05 + Math.random() * 0.15,
    size: 1 + Math.random() * 3,
  });
}

// Clouds
const clouds = [];
for(let i = 0; i < 6; i++){
  clouds.push({
    x: Math.random() * 2 - 0.3,
    y: 0.05 + Math.random() * 0.2,
    w: 0.08 + Math.random() * 0.12,
    h: 0.015 + Math.random() * 0.02,
    speed: 0.001 + Math.random() * 0.002,
    alpha: 0.03 + Math.random() * 0.05,
  });
}

function drawTurbineScene(t){
  const ctx = tctx;

  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, TH);
  skyGrad.addColorStop(0, '#081830');
  skyGrad.addColorStop(0.4, '#0c2244');
  skyGrad.addColorStop(0.65, '#1a3050');
  skyGrad.addColorStop(0.7, '#1a3828');
  skyGrad.addColorStop(1, '#0a1a10');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, TW, TH);

  // Stars
  ctx.fillStyle = 'rgba(200,220,255,0.3)';
  for(let i = 0; i < 40; i++){
    const sx = ((i*137.5+50)%TW);
    const sy = ((i*73.1+20)%(TH*0.4));
    ctx.fillRect(sx, sy, 1, 1);
  }

  // Moon
  const moonX = TW * 0.15, moonY = TH * 0.12, moonR = TW * 0.025;
  const moonGrad = ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, moonR * 3);
  moonGrad.addColorStop(0, 'rgba(200,220,255,0.15)');
  moonGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = moonGrad;
  ctx.beginPath(); ctx.arc(moonX, moonY, moonR*3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(moonX, moonY, moonR, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(200,215,240,0.8)'; ctx.fill();

  // Clouds
  for(const c of clouds){
    c.x += c.speed * (windSpeed / 8);
    if(c.x > 1.3) c.x = -c.w;
    const cx = c.x * TW, cy = c.y * TH, cw = c.w * TW, ch = c.h * TH;
    ctx.fillStyle = `rgba(100,130,160,${c.alpha})`;
    ctx.beginPath();
    ctx.ellipse(cx, cy, cw, ch, 0, 0, Math.PI*2);
    ctx.fill();
  }

  // Ground
  const groundY = TH * 0.7;
  const groundGrad = ctx.createLinearGradient(0, groundY, 0, TH);
  groundGrad.addColorStop(0, '#152818');
  groundGrad.addColorStop(1, '#0a1a0c');
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, groundY, TW, TH - groundY);

  // Ground texture lines
  ctx.strokeStyle = 'rgba(30,60,35,0.3)';
  ctx.lineWidth = 1;
  for(let i = 0; i < 12; i++){
    const gy = groundY + 10 + i * ((TH - groundY - 10) / 12);
    ctx.beginPath();
    ctx.moveTo(0, gy);
    for(let x = 0; x < TW; x += 40){
      ctx.lineTo(x, gy + Math.sin(x*0.01 + i)*3);
    }
    ctx.stroke();
  }

  // === TURBINE ===
  const baseX = TW * 0.5;
  const baseY = groundY;
  const towerH = TH * 0.48;
  const hubY = baseY - towerH;
  const bladeLen = TH * 0.22;
  const nacelleW = TW * 0.035;
  const nacelleH = TH * 0.022;

  // Tower shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.moveTo(baseX - TW*0.003, baseY);
  ctx.lineTo(baseX + TW*0.05, baseY + TH*0.02);
  ctx.lineTo(baseX + TW*0.15, baseY + TH*0.005);
  ctx.lineTo(baseX + TW*0.003, baseY);
  ctx.fill();

  // Tower
  const towerTopW = TW * 0.008;
  const towerBotW = TW * 0.016;
  const towerGrad = ctx.createLinearGradient(baseX - towerBotW, 0, baseX + towerBotW, 0);
  towerGrad.addColorStop(0, '#4a5565');
  towerGrad.addColorStop(0.3, '#8090a0');
  towerGrad.addColorStop(0.7, '#7a8898');
  towerGrad.addColorStop(1, '#3a4555');
  ctx.fillStyle = towerGrad;
  ctx.beginPath();
  ctx.moveTo(baseX - towerBotW, baseY);
  ctx.lineTo(baseX - towerTopW, hubY + nacelleH/2);
  ctx.lineTo(baseX + towerTopW, hubY + nacelleH/2);
  ctx.lineTo(baseX + towerBotW, baseY);
  ctx.closePath();
  ctx.fill();

  // Tower highlight
  ctx.strokeStyle = 'rgba(140,170,200,0.15)';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(baseX - towerTopW*0.3, hubY + nacelleH/2);
  ctx.lineTo(baseX - towerBotW*0.3, baseY);
  ctx.stroke();

  // Nacelle
  ctx.save();
  ctx.translate(baseX, hubY);
  ctx.rotate(yawAngle * Math.PI / 180 * 0.15); // subtle visual yaw
  const nacGrad = ctx.createLinearGradient(0, -nacelleH, 0, nacelleH);
  nacGrad.addColorStop(0, '#8898a8');
  nacGrad.addColorStop(1, '#5a6878');
  ctx.fillStyle = nacGrad;
  ctx.beginPath();
  ctx.roundRect(-nacelleW*0.4, -nacelleH/2, nacelleW, nacelleH, 4);
  ctx.fill();
  // Nacelle rear
  ctx.fillStyle = '#4a5868';
  ctx.fillRect(-nacelleW*0.5, -nacelleH*0.35, nacelleW*0.15, nacelleH*0.7);

  // Hub
  const hubR = TW * 0.008;
  ctx.beginPath();
  ctx.arc(nacelleW*0.5, 0, hubR, 0, Math.PI*2);
  ctx.fillStyle = '#6a7888';
  ctx.fill();
  ctx.strokeStyle = 'rgba(100,130,160,0.3)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Blades
  const hubCx = nacelleW * 0.5;
  const pitchRad = bladePitch * Math.PI / 180;
  const bladeW = bladeLen * 0.065;

  for(let b = 0; b < 3; b++){
    const angle = rotorAngle + (b * Math.PI * 2 / 3);
    ctx.save();
    ctx.translate(hubCx, 0);
    ctx.rotate(angle);

    // Blade chord varies with pitch
    const chordScale = Math.cos(pitchRad) * 0.7 + 0.3;
    const bw = bladeW * chordScale;

    // Blade shape (tapered)
    ctx.beginPath();
    ctx.moveTo(-bw*0.6, 0);
    ctx.quadraticCurveTo(-bw*0.8, -bladeLen*0.3, -bw*0.3, -bladeLen*0.8);
    ctx.lineTo(0, -bladeLen);
    ctx.lineTo(bw*0.3, -bladeLen*0.8);
    ctx.quadraticCurveTo(bw*0.7, -bladeLen*0.3, bw*0.5, 0);
    ctx.closePath();

    // Blade gradient
    const bg = ctx.createLinearGradient(-bw, 0, bw, 0);
    bg.addColorStop(0, 'rgba(180,195,210,0.85)');
    bg.addColorStop(0.4, 'rgba(220,230,240,0.9)');
    bg.addColorStop(1, 'rgba(150,165,180,0.8)');
    ctx.fillStyle = bg;
    ctx.fill();
    ctx.strokeStyle = 'rgba(100,120,140,0.3)';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    ctx.restore();
  }

  ctx.restore();

  // Aviation light on nacelle
  const lightBlink = Math.sin(t * 3) > 0.8;
  if(lightBlink){
    ctx.beginPath();
    ctx.arc(baseX, hubY - nacelleH/2 - 3, 3, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,40,40,0.9)';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(baseX, hubY - nacelleH/2 - 3, 10, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,40,40,0.15)';
    ctx.fill();
  }

  // Wind particles
  const windAlpha = Math.min(1, windSpeed / 15);
  for(const p of windParticles){
    p.x += p.speed * (windSpeed / 12) * 0.008;
    if(p.x > 1.2){ p.x = -0.1; p.y = Math.random(); }
    const px = p.x * TW, py = p.y * TH * 0.7;
    const len = 8 + windSpeed * 2;
    ctx.strokeStyle = `rgba(150,200,230,${p.alpha * windAlpha})`;
    ctx.lineWidth = p.size * 0.5;
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(px + len, py + Math.sin(px*0.01+t)*2);
    ctx.stroke();
  }

  // Ground turbines (distant)
  const distTurbines = [[0.15, 0.55], [0.25, 0.4], [0.78, 0.45], [0.88, 0.35]];
  for(const [fx, fscale] of distTurbines){
    const dtx = TW * fx;
    const dty = groundY;
    const dth = towerH * fscale;
    const dbl = bladeLen * fscale;
    const dtw = 2;
    ctx.fillStyle = 'rgba(40,55,70,0.5)';
    ctx.fillRect(dtx - dtw/2, dty - dth, dtw, dth);
    // Mini blades
    ctx.save();
    ctx.translate(dtx, dty - dth);
    for(let b = 0; b < 3; b++){
      const a = rotorAngle * 0.9 + b * Math.PI*2/3 + fx*5;
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(Math.cos(a)*dbl*0.4, Math.sin(a)*dbl*0.4);
      ctx.strokeStyle = 'rgba(60,75,90,0.5)';
      ctx.lineWidth = 1.5 * fscale;
      ctx.stroke();
    }
    ctx.restore();
  }
}

// === GRAPH ===
const gc = document.getElementById('graphCanvas');
const gctx = gc.getContext('2d');
const powerHistory = [];
const HISTORY_LEN = 200;

function resizeGraph(){
  const r = gc.parentElement.getBoundingClientRect();
  gc.width = Math.floor(r.width * 2);
  gc.height = Math.floor(r.height * 2);
}
resizeGraph();
window.addEventListener('resize', () => { resizeTurbine(); resizeGraph(); });

function drawGraph(){
  const w = gc.width, h = gc.height;
  gctx.fillStyle = '#0a1628';
  gctx.fillRect(0, 0, w, h);

  // Grid
  gctx.strokeStyle = 'rgba(26,45,74,0.5)';
  gctx.lineWidth = 0.5;
  for(let i = 1; i < 4; i++){
    const gy = h * i / 4;
    gctx.beginPath(); gctx.moveTo(0, gy); gctx.lineTo(w, gy); gctx.stroke();
  }

  if(powerHistory.length < 2) return;

  // Power line
  gctx.beginPath();
  gctx.moveTo(0, h);
  for(let i = 0; i < powerHistory.length; i++){
    const x = (i / (HISTORY_LEN - 1)) * w;
    const y = h - (powerHistory[i] / RATED_POWER) * h * 0.95;
    if(i === 0) gctx.moveTo(x, y);
    else gctx.lineTo(x, y);
  }
  gctx.strokeStyle = 'rgba(64,232,144,0.8)';
  gctx.lineWidth = 2;
  gctx.stroke();

  // Fill under
  gctx.lineTo((powerHistory.length-1)/(HISTORY_LEN-1)*w, h);
  gctx.lineTo(0, h);
  gctx.fillStyle = 'rgba(64,232,144,0.06)';
  gctx.fill();
}

// === UI ===
let draggingWind = false;
const windSlider = document.getElementById('wind-slider');
const pitchSlider = document.getElementById('pitch-slider');
const yawSlider = document.getElementById('yaw-slider');

windSlider.addEventListener('input', e => {
  windSpeed = parseFloat(e.target.value);
  document.getElementById('wind-val').textContent = windSpeed.toFixed(1) + ' m/s';
});
windSlider.addEventListener('mousedown', () => draggingWind = true);
windSlider.addEventListener('touchstart', () => draggingWind = true);
window.addEventListener('mouseup', () => draggingWind = false);
window.addEventListener('touchend', () => draggingWind = false);

pitchSlider.addEventListener('input', e => {
  bladePitch = parseFloat(e.target.value);
  document.getElementById('pitch-val').textContent = bladePitch.toFixed(1) + '°';
  autoPitch = false;
  document.getElementById('btn-auto').classList.remove('active');
});

yawSlider.addEventListener('input', e => {
  yawAngle = parseFloat(e.target.value);
  document.getElementById('yaw-val').textContent = yawAngle + '°';
});

document.getElementById('btn-brake').addEventListener('click', function(){
  braking = !braking;
  this.classList.toggle('active', braking);
});

document.getElementById('btn-auto').addEventListener('click', function(){
  autoPitch = !autoPitch;
  this.classList.toggle('active', autoPitch);
});

function updateGauges(){
  const rpm = rotorOmega * 30 / Math.PI;
  const eff = windSpeed > CUT_IN ? (powerOutput / (0.5 * AIR_DENSITY * ROTOR_AREA * windSpeed*windSpeed*windSpeed / 1000)) * 100 : 0;

  // Power
  const powerEl = document.getElementById('power-value');
  const powerBar = document.getElementById('power-bar');
  const pw = Math.round(powerOutput);
  powerEl.innerHTML = pw + '<span class="gauge-unit">kW</span>';
  const pPct = Math.min(100, (pw / RATED_POWER) * 100);
  powerBar.style.width = pPct + '%';
  const pColor = pw > RATED_POWER*0.9 ? 'var(--amber)' : pw < 100 ? 'var(--red)' : 'var(--green)';
  powerEl.style.color = pColor;
  powerBar.style.background = pColor;

  // RPM
  document.getElementById('rpm-value').innerHTML = rpm.toFixed(1) + '<span class="gauge-unit">RPM</span>';
  document.getElementById('rpm-bar').style.width = Math.min(100, (rpm/MAX_RPM)*100) + '%';

  // TSR
  document.getElementById('tsr-value').innerHTML = tsr.toFixed(2) + '<span class="gauge-unit">λ</span>';

  // Status
  const dot = document.getElementById('status-dot');
  const txt = document.getElementById('status-text');
  const effectiveWind = windSpeed * Math.cos(yawAngle * Math.PI/180);
  if(braking){
    dot.style.background = 'var(--red)';
    txt.style.color = 'var(--red)';
    txt.textContent = 'BRAKING';
  } else if(effectiveWind < CUT_IN){
    dot.style.background = 'var(--text)';
    txt.style.color = 'var(--text)';
    txt.textContent = 'LOW WIND';
  } else if(effectiveWind > CUT_OUT){
    dot.style.background = 'var(--amber)';
    txt.style.color = 'var(--amber)';
    txt.textContent = 'HIGH WIND CUTOUT';
  } else if(powerOutput > RATED_POWER * 0.9){
    dot.style.background = 'var(--amber)';
    txt.style.color = 'var(--amber)';
    txt.textContent = 'RATED POWER';
  } else {
    dot.style.background = 'var(--green)';
    txt.style.color = 'var(--green)';
    txt.textContent = 'GENERATING';
  }
}

// === MAIN LOOP ===
let lastTime = 0;
let graphTimer = 0;

function frame(timestamp){
  const dt = Math.min(0.05, (timestamp - lastTime) / 1000);
  lastTime = timestamp;
  const t = timestamp * 0.001;

  updatePhysics(dt);
  drawTurbineScene(t);
  updateGauges();

  graphTimer += dt;
  if(graphTimer > 0.3){
    graphTimer = 0;
    powerHistory.push(powerOutput);
    if(powerHistory.length > HISTORY_LEN) powerHistory.shift();
    drawGraph();
  }

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
