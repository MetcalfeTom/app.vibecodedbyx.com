<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SketchCAD</title>
<link rel="icon" href="https://emojicdn.elk.sh/📐">
<meta property="og:title" content="SketchCAD">
<meta property="og:description" content="Parametric 2D sketcher with editable dimensions and feature history.">
<meta property="og:url" content="https://sloppy.live/sketch-cad/">
<meta property="og:image" content="https://sloppy.live/sketch-cad/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1a1c22;--panel:#21232b;--border:#2d3040;--text:#c8cad0;
  --dim:#6b7094;--accent:#4a9eff;--accent2:#ff6b4a;--green:#4aff8b;
  --yellow:#ffd04a;--grid:#282a34;--gridMajor:#2d3040;
  --hover:rgba(74,158,255,.08);--selected:rgba(74,158,255,.15);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;overflow:hidden;height:100vh;display:flex;flex-direction:column}
#toolbar{display:flex;align-items:center;height:42px;background:var(--panel);border-bottom:1px solid var(--border);padding:0 8px;gap:2px;flex-shrink:0}
#toolbar button{background:none;border:1px solid transparent;color:var(--dim);padding:6px 10px;font-size:12px;font-family:'IBM Plex Sans',sans-serif;cursor:pointer;border-radius:3px;display:flex;align-items:center;gap:5px;white-space:nowrap}
#toolbar button:hover{background:var(--hover);color:var(--text)}
#toolbar button.active{background:var(--selected);color:var(--accent);border-color:rgba(74,158,255,.3)}
#toolbar .sep{width:1px;height:24px;background:var(--border);margin:0 4px}
#toolbar .title{font-weight:600;color:var(--accent);font-size:13px;margin-right:8px;letter-spacing:.5px}
#main{display:flex;flex:1;overflow:hidden}
#canvas-wrap{flex:1;position:relative;overflow:hidden}
canvas{display:block;cursor:crosshair}
#sidebar{width:260px;background:var(--panel);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
#sidebar-header{padding:10px 12px;font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--dim);border-bottom:1px solid var(--border)}
#history{flex:1;overflow-y:auto;padding:4px 0}
#history::-webkit-scrollbar{width:4px}
#history::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.hist-item{padding:7px 12px;font-size:12px;font-family:'IBM Plex Mono',monospace;cursor:pointer;display:flex;align-items:center;gap:8px;border-left:2px solid transparent}
.hist-item:hover{background:var(--hover)}
.hist-item.selected{background:var(--selected);border-left-color:var(--accent)}
.hist-item .icon{width:16px;text-align:center;font-size:13px;flex-shrink:0}
.hist-item .label{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text)}
.hist-item .dim{font-size:10px;color:var(--dim);font-family:'IBM Plex Mono',monospace}
#props{border-top:1px solid var(--border);padding:10px 12px;max-height:220px;overflow-y:auto}
#props-title{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:8px}
.prop-row{display:flex;align-items:center;gap:6px;margin-bottom:5px;font-size:12px}
.prop-row label{width:30px;color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:11px;text-align:right;flex-shrink:0}
.prop-row input{flex:1;background:var(--bg);border:1px solid var(--border);color:var(--accent);padding:3px 6px;font-family:'IBM Plex Mono',monospace;font-size:11px;border-radius:2px;outline:none;width:60px}
.prop-row input:focus{border-color:var(--accent)}
#status{height:26px;background:var(--panel);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 12px;font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--dim);gap:16px;flex-shrink:0}
#dim-input{position:absolute;background:var(--panel);border:1px solid var(--accent);color:var(--accent);padding:3px 6px;font-family:'IBM Plex Mono',monospace;font-size:12px;border-radius:3px;outline:none;display:none;z-index:50;width:80px;box-shadow:0 2px 8px rgba(0,0,0,.4)}
#backlink{color:var(--dim);text-decoration:none;font-size:10px;margin-left:auto}
#backlink:hover{color:var(--accent)}
.constraint-item{padding:5px 12px;font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--green);display:flex;align-items:center;gap:6px;cursor:pointer}
.constraint-item:hover{background:var(--hover)}
.constraint-item .c-icon{font-size:12px;width:14px;text-align:center}
.constraint-item .c-del{margin-left:auto;color:var(--accent2);opacity:.4;cursor:pointer;font-size:10px}
.constraint-item .c-del:hover{opacity:1}
#constraints-header{padding:8px 12px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--green);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
@media(max-width:700px){#sidebar{width:200px}.hist-item{padding:5px 8px;font-size:11px}}
@media(max-width:500px){#sidebar{display:none}}
</style>
</head>
<body>
<div id="toolbar">
  <span class="title">SketchCAD</span>
  <button id="t-select" class="active" title="Select (V)">▹ Select</button>
  <button id="t-line" title="Line (L)">╱ Line</button>
  <button id="t-rect" title="Rectangle (R)">▭ Rect</button>
  <button id="t-circle" title="Circle (C)">◯ Circle</button>
  <button id="t-arc" title="Arc (A)">◠ Arc</button>
  <span class="sep"></span>
  <button id="t-trim" title="Trim at intersection (T)">✂ Trim</button>
  <button id="t-dim" title="Add dimension (D)">↔ Dim</button>
  <span class="sep"></span>
  <button id="t-horiz" title="Horizontal constraint (H)">— Horiz</button>
  <button id="t-vert" title="Vertical constraint">| Vert</button>
  <button id="t-perp" title="Perpendicular (select 2 lines)">⊥ Perp</button>
  <button id="t-para" title="Parallel (select 2 lines)">∥ Para</button>
  <span class="sep"></span>
  <button id="t-undo" title="Undo (Ctrl+Z)">↩ Undo</button>
  <button id="t-redo" title="Redo (Ctrl+Y)">↪ Redo</button>
  <span class="sep"></span>
  <button id="t-grid" title="Toggle grid snap">⊞ Snap</button>
  <button id="t-clear" title="Clear all">✕ Clear</button>
  <button id="t-export" title="Export SVG">↓ SVG</button>
</div>
<div id="main">
  <div id="canvas-wrap"><canvas id="c"></canvas><input id="dim-input" type="text"></div>
  <div id="sidebar">
    <div id="sidebar-header">Feature History</div>
    <div id="history"></div>
    <div id="constraints-header">Constraints</div>
    <div id="constraints-list"></div>
    <div id="props"><div id="props-title">Properties</div><div id="props-content"></div></div>
  </div>
</div>
<div id="status">
  <span id="s-pos">0, 0</span>
  <span id="s-snap">Snap: 10</span>
  <span id="s-count">0 features</span>
  <span id="s-tool">Select</span>
  <a id="backlink" href="https://sloppy.live">sloppy.live</a>
</div>
<script>
const CV=document.getElementById('c'),X=CV.getContext('2d');
const dimInput=document.getElementById('dim-input');
let W,H,dpr;

// Camera
let camX=0,camY=0,zoom=1;

function resize(){
  const wrap=document.getElementById('canvas-wrap');
  dpr=window.devicePixelRatio||1;
  W=wrap.clientWidth;H=wrap.clientHeight;
  CV.width=W*dpr;CV.height=H*dpr;
  CV.style.width=W+'px';CV.style.height=H+'px';
  X.setTransform(dpr,0,0,dpr,0,0);
  render();
}
window.addEventListener('resize',resize);

// State
let features=[];
let undoStack=[];
let redoStack=[];
let selectedId=null;
let tool='select';
let snapGrid=10;
let snapEnabled=true;
let nextId=1;
let constraints=[];
let constraintNextId=1;
let constraintPickFirst=null; // for 2-feature constraints

// Drawing state
let drawing=false;
let drawStart=null;
let drawCurrent=null;
let arcPhase=0; // 0=center,1=radius,2=angle

// Pan state
let panning=false;
let panStart=null;

// Drag state
let dragging=false;
let dragTarget=null;
let dragHandle=null;
let dragOffset={x:0,y:0};

// World <-> Screen
function toScreen(wx,wy){return{x:(wx-camX)*zoom+W/2,y:(wy-camY)*zoom+H/2};}
function toWorld(sx,sy){return{x:(sx-W/2)/zoom+camX,y:(sy-H/2)/zoom+camY};}
function snap(v){return snapEnabled?Math.round(v/snapGrid)*snapGrid:v;}

// Feature types
function createLine(x1,y1,x2,y2){
  const id=nextId++;
  const len=Math.sqrt((x2-x1)**2+(y2-y1)**2);
  return{id,type:'line',x1,y1,x2,y2,dims:{length:+len.toFixed(2)},color:null};
}
function createRect(x,y,w,h){
  const id=nextId++;
  return{id,type:'rect',x,y,w:Math.abs(w),h:Math.abs(h),dims:{width:Math.abs(+w.toFixed(2)),height:Math.abs(+h.toFixed(2))},color:null};
}
function createCircle(cx,cy,r){
  const id=nextId++;
  return{id,type:'circle',cx,cy,r:Math.abs(r),dims:{radius:Math.abs(+r.toFixed(2))},color:null};
}
function createArc(cx,cy,r,startAngle,endAngle){
  const id=nextId++;
  return{id,type:'arc',cx,cy,r:Math.abs(r),startAngle,endAngle,dims:{radius:Math.abs(+r.toFixed(2)),sweep:+((endAngle-startAngle)*180/Math.PI).toFixed(1)},color:null};
}

function addFeature(f){
  redoStack=[];
  features.push(f);
  undoStack.push({action:'add',feature:JSON.parse(JSON.stringify(f))});
  selectedId=f.id;
  updateUI();
}

function deleteFeature(id){
  const idx=features.findIndex(f=>f.id===id);
  if(idx<0)return;
  const f=features.splice(idx,1)[0];
  undoStack.push({action:'delete',feature:JSON.parse(JSON.stringify(f)),index:idx});
  redoStack=[];
  if(selectedId===id)selectedId=null;
  updateUI();
}

function modifyFeature(id,changes){
  const f=features.find(f=>f.id===id);
  if(!f)return;
  const before=JSON.parse(JSON.stringify(f));
  Object.assign(f,changes);
  recalcDims(f);
  undoStack.push({action:'modify',id,before,after:JSON.parse(JSON.stringify(f))});
  redoStack=[];
  updateUI();
}

function recalcDims(f){
  if(f.type==='line'){
    f.dims.length=+Math.sqrt((f.x2-f.x1)**2+(f.y2-f.y1)**2).toFixed(2);
  } else if(f.type==='rect'){
    f.dims.width=Math.abs(+f.w.toFixed(2));
    f.dims.height=Math.abs(+f.h.toFixed(2));
  } else if(f.type==='circle'){
    f.dims.radius=Math.abs(+f.r.toFixed(2));
  } else if(f.type==='arc'){
    f.dims.radius=Math.abs(+f.r.toFixed(2));
    f.dims.sweep=+((f.endAngle-f.startAngle)*180/Math.PI).toFixed(1);
  }
}

function undo(){
  if(undoStack.length===0)return;
  const op=undoStack.pop();
  if(op.action==='add'){
    const idx=features.findIndex(f=>f.id===op.feature.id);
    if(idx>=0)features.splice(idx,1);
    redoStack.push(op);
  } else if(op.action==='delete'){
    features.splice(op.index,0,JSON.parse(JSON.stringify(op.feature)));
    redoStack.push(op);
  } else if(op.action==='modify'){
    const f=features.find(f=>f.id===op.id);
    if(f)Object.assign(f,JSON.parse(JSON.stringify(op.before)));
    redoStack.push(op);
  }
  updateUI();
}

function redo(){
  if(redoStack.length===0)return;
  const op=redoStack.pop();
  if(op.action==='add'){
    features.push(JSON.parse(JSON.stringify(op.feature)));
    undoStack.push(op);
  } else if(op.action==='delete'){
    const idx=features.findIndex(f=>f.id===op.feature.id);
    if(idx>=0)features.splice(idx,1);
    undoStack.push(op);
  } else if(op.action==='modify'){
    const f=features.find(f=>f.id===op.id);
    if(f)Object.assign(f,JSON.parse(JSON.stringify(op.after)));
    undoStack.push(op);
  }
  updateUI();
}

// Hit testing
function hitTest(wx,wy,threshold){
  const t=threshold||8/zoom;
  for(let i=features.length-1;i>=0;i--){
    const f=features[i];
    if(f.type==='line'){
      const d=distToSegment(wx,wy,f.x1,f.y1,f.x2,f.y2);
      if(d<t)return{feature:f,handle:null};
      if(dist(wx,wy,f.x1,f.y1)<t*1.5)return{feature:f,handle:'p1'};
      if(dist(wx,wy,f.x2,f.y2)<t*1.5)return{feature:f,handle:'p2'};
    } else if(f.type==='rect'){
      const inside=wx>=f.x-t&&wx<=f.x+f.w+t&&wy>=f.y-t&&wy<=f.y+f.h+t;
      const outsideInner=wx<f.x+t||wx>f.x+f.w-t||wy<f.y+t||wy>f.y+f.h-t;
      if(inside&&outsideInner)return{feature:f,handle:null};
      // Corner handles
      if(dist(wx,wy,f.x,f.y)<t*1.5)return{feature:f,handle:'tl'};
      if(dist(wx,wy,f.x+f.w,f.y)<t*1.5)return{feature:f,handle:'tr'};
      if(dist(wx,wy,f.x,f.y+f.h)<t*1.5)return{feature:f,handle:'bl'};
      if(dist(wx,wy,f.x+f.w,f.y+f.h)<t*1.5)return{feature:f,handle:'br'};
    } else if(f.type==='circle'){
      const d=dist(wx,wy,f.cx,f.cy);
      if(Math.abs(d-f.r)<t)return{feature:f,handle:null};
      if(d<t*1.5)return{feature:f,handle:'center'};
    } else if(f.type==='arc'){
      const d=dist(wx,wy,f.cx,f.cy);
      if(Math.abs(d-f.r)<t){
        const angle=Math.atan2(wy-f.cy,wx-f.cx);
        const normA=normalizeAngle(angle-f.startAngle);
        const normSweep=normalizeAngle(f.endAngle-f.startAngle);
        if(normA<=normSweep+0.15)return{feature:f,handle:null};
      }
      if(d<t*1.5)return{feature:f,handle:'center'};
    }
  }
  return null;
}

function dist(x1,y1,x2,y2){return Math.sqrt((x2-x1)**2+(y2-y1)**2);}
function distToSegment(px,py,x1,y1,x2,y2){
  const dx=x2-x1,dy=y2-y1;
  const lenSq=dx*dx+dy*dy;
  if(lenSq===0)return dist(px,py,x1,y1);
  let t=((px-x1)*dx+(py-y1)*dy)/lenSq;
  t=Math.max(0,Math.min(1,t));
  return dist(px,py,x1+t*dx,y1+t*dy);
}
function normalizeAngle(a){a=a%(Math.PI*2);if(a<0)a+=Math.PI*2;return a;}

// Rendering
function render(){
  X.clearRect(0,0,W,H);
  X.fillStyle='var(--bg)';
  X.fillRect(0,0,W,H);

  // Grid
  drawGrid();

  X.save();
  // Features
  for(const f of features){
    const sel=f.id===selectedId;
    const col=sel?'#4a9eff':'#7a8ab0';
    const lw=sel?2/zoom:1.2/zoom;
    drawFeature(f,col,lw,sel);
  }

  // Drawing preview
  if(drawing&&drawStart&&drawCurrent){
    X.setLineDash([4/zoom,4/zoom]);
    if(tool==='line'){
      const s1=toScreen(drawStart.x,drawStart.y),s2=toScreen(drawCurrent.x,drawCurrent.y);
      X.beginPath();X.moveTo(s1.x,s1.y);X.lineTo(s2.x,s2.y);
      X.strokeStyle='#4a9eff';X.lineWidth=1.5;X.stroke();
      drawDimLabel(drawStart.x,drawStart.y,drawCurrent.x,drawCurrent.y,dist(drawStart.x,drawStart.y,drawCurrent.x,drawCurrent.y));
    } else if(tool==='rect'){
      const x=Math.min(drawStart.x,drawCurrent.x),y=Math.min(drawStart.y,drawCurrent.y);
      const w=Math.abs(drawCurrent.x-drawStart.x),h=Math.abs(drawCurrent.y-drawStart.y);
      const s=toScreen(x,y);
      X.strokeStyle='#4a9eff';X.lineWidth=1.5;
      X.strokeRect(s.x,s.y,w*zoom,h*zoom);
      // Width dim
      const midBotS=toScreen(x+w/2,y+h);
      X.fillStyle='rgba(74,158,255,.8)';X.font=(11)+'px "IBM Plex Mono"';X.textAlign='center';
      X.fillText(w.toFixed(1),midBotS.x,midBotS.y+14);
      // Height dim
      const midRightS=toScreen(x+w,y+h/2);
      X.fillText(h.toFixed(1),midRightS.x+20,midRightS.y+4);
    } else if(tool==='circle'){
      const r=dist(drawStart.x,drawStart.y,drawCurrent.x,drawCurrent.y);
      const s=toScreen(drawStart.x,drawStart.y);
      X.beginPath();X.arc(s.x,s.y,r*zoom,0,Math.PI*2);
      X.strokeStyle='#4a9eff';X.lineWidth=1.5;X.stroke();
      const midS=toScreen(drawStart.x+r/2,drawStart.y);
      X.fillStyle='rgba(74,158,255,.8)';X.font='11px "IBM Plex Mono"';X.textAlign='center';
      X.fillText('r='+r.toFixed(1),midS.x,midS.y-8);
    } else if(tool==='arc'&&arcPhase>=1){
      const r=dist(drawStart.x,drawStart.y,drawCurrent.x,drawCurrent.y);
      const s=toScreen(drawStart.x,drawStart.y);
      if(arcPhase===1){
        X.beginPath();X.arc(s.x,s.y,r*zoom,0,Math.PI*2);
        X.strokeStyle='rgba(74,158,255,.3)';X.lineWidth=1;X.stroke();
      } else if(arcPhase===2){
        const startA=Math.atan2(arcRadiusPt.y-drawStart.y,arcRadiusPt.x-drawStart.x);
        const endA=Math.atan2(drawCurrent.y-drawStart.y,drawCurrent.x-drawStart.x);
        X.beginPath();X.arc(s.x,s.y,arcRadius*zoom,startA,endA);
        X.strokeStyle='#4a9eff';X.lineWidth=1.5;X.stroke();
      }
    }
    X.setLineDash([]);
  }

  X.restore();

  // Constraint indicators
  drawConstraintIndicators();
  // Trim preview
  drawTrimPreview(mouseWorldX,mouseWorldY);

  // Origin marker
  const o=toScreen(0,0);
  X.strokeStyle='rgba(255,100,100,.3)';X.lineWidth=1;
  X.beginPath();X.moveTo(o.x-8,o.y);X.lineTo(o.x+8,o.y);X.stroke();
  X.beginPath();X.moveTo(o.x,o.y-8);X.lineTo(o.x,o.y+8);X.stroke();
}

function drawGrid(){
  const step=snapGrid;
  const minW=toWorld(0,0),maxW=toWorld(W,H);
  const startX=Math.floor(minW.x/step)*step;
  const startY=Math.floor(minW.y/step)*step;
  const majorEvery=5;

  X.lineWidth=1;
  for(let gx=startX;gx<=maxW.x;gx+=step){
    const sx=toScreen(gx,0).x;
    const isMajor=(Math.round(gx/step)%majorEvery===0);
    X.strokeStyle=isMajor?'rgba(45,48,64,.8)':'rgba(40,42,52,.5)';
    if(zoom*step<6&&!isMajor)continue;
    X.beginPath();X.moveTo(sx,0);X.lineTo(sx,H);X.stroke();
  }
  for(let gy=startY;gy<=maxW.y;gy+=step){
    const sy=toScreen(0,gy).y;
    const isMajor=(Math.round(gy/step)%majorEvery===0);
    X.strokeStyle=isMajor?'rgba(45,48,64,.8)':'rgba(40,42,52,.5)';
    if(zoom*step<6&&!isMajor)continue;
    X.beginPath();X.moveTo(0,sy);X.lineTo(W,sy);X.stroke();
  }
}

function drawFeature(f,col,lw,sel){
  X.strokeStyle=col;X.lineWidth=lw*zoom;X.fillStyle='none';
  if(f.type==='line'){
    const s1=toScreen(f.x1,f.y1),s2=toScreen(f.x2,f.y2);
    X.beginPath();X.moveTo(s1.x,s1.y);X.lineTo(s2.x,s2.y);X.stroke();
    if(sel){drawHandle(s1.x,s1.y);drawHandle(s2.x,s2.y);}
    drawDimLabel(f.x1,f.y1,f.x2,f.y2,f.dims.length);
  } else if(f.type==='rect'){
    const s=toScreen(f.x,f.y);
    X.strokeRect(s.x,s.y,f.w*zoom,f.h*zoom);
    if(sel){
      drawHandle(s.x,s.y);drawHandle(s.x+f.w*zoom,s.y);
      drawHandle(s.x,s.y+f.h*zoom);drawHandle(s.x+f.w*zoom,s.y+f.h*zoom);
    }
    // Width dim below
    const midBot=toScreen(f.x+f.w/2,f.y+f.h);
    X.fillStyle=sel?'rgba(74,158,255,.7)':'rgba(107,112,148,.5)';
    X.font='10px "IBM Plex Mono"';X.textAlign='center';
    X.fillText(f.dims.width,midBot.x,midBot.y+13);
    // Height dim right
    const midRight=toScreen(f.x+f.w,f.y+f.h/2);
    X.fillText(f.dims.height,midRight.x+18,midRight.y+3);
  } else if(f.type==='circle'){
    const s=toScreen(f.cx,f.cy);
    X.beginPath();X.arc(s.x,s.y,f.r*zoom,0,Math.PI*2);X.stroke();
    if(sel){drawHandle(s.x,s.y);}
    // Radius dim
    const rPt=toScreen(f.cx+f.r*0.7,f.cy-f.r*0.7);
    X.fillStyle=sel?'rgba(74,158,255,.7)':'rgba(107,112,148,.5)';
    X.font='10px "IBM Plex Mono"';X.textAlign='left';
    X.fillText('r='+f.dims.radius,rPt.x,rPt.y);
  } else if(f.type==='arc'){
    const s=toScreen(f.cx,f.cy);
    X.beginPath();X.arc(s.x,s.y,f.r*zoom,f.startAngle,f.endAngle);X.stroke();
    if(sel){drawHandle(s.x,s.y);}
    const midA=(f.startAngle+f.endAngle)/2;
    const lx=f.cx+Math.cos(midA)*(f.r+15/zoom);
    const ly=f.cy+Math.sin(midA)*(f.r+15/zoom);
    const ls=toScreen(lx,ly);
    X.fillStyle=sel?'rgba(74,158,255,.7)':'rgba(107,112,148,.5)';
    X.font='10px "IBM Plex Mono"';X.textAlign='center';
    X.fillText(f.dims.sweep+'°',ls.x,ls.y);
  }
}

function drawHandle(sx,sy){
  X.fillStyle='#4a9eff';
  X.fillRect(sx-3,sy-3,6,6);
  X.strokeStyle='#fff';X.lineWidth=1;
  X.strokeRect(sx-3,sy-3,6,6);
}

function drawDimLabel(x1,y1,x2,y2,val){
  const mx=(x1+x2)/2,my=(y1+y2)/2;
  const dx=x2-x1,dy=y2-y1;
  const len=Math.sqrt(dx*dx+dy*dy)||1;
  const nx=-dy/len*12/zoom,ny=dx/len*12/zoom;
  const ls=toScreen(mx+nx,my+ny);
  X.fillStyle='rgba(74,158,255,.6)';
  X.font='10px "IBM Plex Mono"';X.textAlign='center';
  X.fillText(val,ls.x,ls.y+3);
}

let arcRadius=0,arcRadiusPt=null;
let mouseWorldX=0,mouseWorldY=0;

// Input
function getPos(e){
  const r=CV.getBoundingClientRect();
  return{sx:e.clientX-r.left,sy:e.clientY-r.top};
}

CV.addEventListener('mousedown',e=>{
  const{sx,sy}=getPos(e);
  const w=toWorld(sx,sy);
  const ws=toWorld(sx,sy);
  ws.x=snap(ws.x);ws.y=snap(ws.y);

  // Middle click or space+click = pan
  if(e.button===1||(e.button===0&&e.altKey)){
    panning=true;panStart={x:e.clientX,y:e.clientY,camX,camY};return;
  }

  if(tool==='select'){
    const hit=hitTest(w.x,w.y);
    if(hit){
      selectedId=hit.feature.id;
      dragging=true;
      dragTarget=hit.feature;
      dragHandle=hit.handle;
      dragOffset={x:w.x,y:w.y};
      updateUI();
    } else {
      selectedId=null;
      panning=true;panStart={x:e.clientX,y:e.clientY,camX,camY};
      updateUI();
    }
  } else if(tool==='line'||tool==='rect'||tool==='circle'){
    drawing=true;
    drawStart={x:ws.x,y:ws.y};
    drawCurrent={x:ws.x,y:ws.y};
  } else if(tool==='arc'){
    if(arcPhase===0){
      drawing=true;drawStart={x:ws.x,y:ws.y};drawCurrent={x:ws.x,y:ws.y};arcPhase=1;
    } else if(arcPhase===1){
      arcRadius=dist(drawStart.x,drawStart.y,ws.x,ws.y);
      arcRadiusPt={x:ws.x,y:ws.y};
      arcPhase=2;
    } else if(arcPhase===2){
      const startA=Math.atan2(arcRadiusPt.y-drawStart.y,arcRadiusPt.x-drawStart.x);
      const endA=Math.atan2(ws.y-drawStart.y,ws.x-drawStart.x);
      if(arcRadius>2){
        addFeature(createArc(drawStart.x,drawStart.y,arcRadius,startA,endA));
      }
      drawing=false;arcPhase=0;drawStart=null;drawCurrent=null;
    }
  } else if(tool==='trim'){
    doTrim(w.x,w.y);
  } else if(tool==='dim'){
    const hit=hitTest(w.x,w.y);
    if(hit){
      selectedId=hit.feature.id;
      showDimEditor(hit.feature,sx,sy);
      updateUI();
    }
  } else if(tool==='horiz'||tool==='vert'){
    const hit=hitTest(w.x,w.y);
    if(hit&&hit.feature.type==='line'){
      addConstraint(tool==='horiz'?'horizontal':'vertical',[hit.feature.id]);
      setTool('select');
    }
  } else if(tool==='perp'||tool==='para'){
    const hit=hitTest(w.x,w.y);
    if(hit&&hit.feature.type==='line'){
      if(!constraintPickFirst){
        constraintPickFirst=hit.feature.id;
        selectedId=hit.feature.id;
        document.getElementById('s-tool').textContent=(tool==='perp'?'Perp':'Para')+': pick 2nd line';
        updateUI();
      } else if(hit.feature.id!==constraintPickFirst){
        addConstraint(tool==='perp'?'perpendicular':'parallel',[constraintPickFirst,hit.feature.id]);
        constraintPickFirst=null;
        setTool('select');
      }
    }
  }
  render();
});

CV.addEventListener('mousemove',e=>{
  const{sx,sy}=getPos(e);
  const w=toWorld(sx,sy);
  const ws={x:snap(w.x),y:snap(w.y)};

  mouseWorldX=w.x;mouseWorldY=w.y;
  document.getElementById('s-pos').textContent=ws.x.toFixed(0)+', '+ws.y.toFixed(0);

  if(panning&&panStart){
    camX=panStart.camX-(e.clientX-panStart.x)/zoom;
    camY=panStart.camY-(e.clientY-panStart.y)/zoom;
    render();return;
  }

  if(dragging&&dragTarget){
    const dx=w.x-dragOffset.x,dy=w.y-dragOffset.y;
    const f=dragTarget;
    if(!dragHandle){
      // Move whole feature
      if(f.type==='line'){f.x1+=dx;f.y1+=dy;f.x2+=dx;f.y2+=dy;}
      else if(f.type==='rect'){f.x+=dx;f.y+=dy;}
      else if(f.type==='circle'){f.cx+=dx;f.cy+=dy;}
      else if(f.type==='arc'){f.cx+=dx;f.cy+=dy;}
    } else {
      if(f.type==='line'){
        if(dragHandle==='p1'){f.x1=ws.x;f.y1=ws.y;}
        else{f.x2=ws.x;f.y2=ws.y;}
      } else if(f.type==='rect'){
        if(dragHandle==='br'){f.w=ws.x-f.x;f.h=ws.y-f.y;}
        else if(dragHandle==='bl'){const r=f.x+f.w;f.x=ws.x;f.w=r-ws.x;f.h=ws.y-f.y;}
        else if(dragHandle==='tr'){f.w=ws.x-f.x;const b=f.y+f.h;f.y=ws.y;f.h=b-ws.y;}
        else if(dragHandle==='tl'){const r=f.x+f.w,b=f.y+f.h;f.x=ws.x;f.y=ws.y;f.w=r-ws.x;f.h=b-ws.y;}
      } else if(f.type==='circle'&&dragHandle==='center'){f.cx=ws.x;f.cy=ws.y;}
      else if(f.type==='arc'&&dragHandle==='center'){f.cx=ws.x;f.cy=ws.y;}
    }
    recalcDims(f);
    dragOffset={x:w.x,y:w.y};
    render();updateProps();return;
  }

  if(drawing&&drawStart){
    drawCurrent={x:ws.x,y:ws.y};
    render();
  }
});

CV.addEventListener('mouseup',e=>{
  if(panning){panning=false;panStart=null;return;}

  if(dragging){
    // Record modify
    dragging=false;
    if(dragTarget){
      recalcDims(dragTarget);
      undoStack.push({action:'modify',id:dragTarget.id,before:null,after:JSON.parse(JSON.stringify(dragTarget))});
    }
    dragTarget=null;dragHandle=null;
    applyAllConstraints();
    updateUI();return;
  }

  if(drawing&&drawStart&&drawCurrent&&tool!=='arc'){
    const s=drawStart,c=drawCurrent;
    if(tool==='line'){
      const len=dist(s.x,s.y,c.x,c.y);
      if(len>2)addFeature(createLine(s.x,s.y,c.x,c.y));
    } else if(tool==='rect'){
      const w=Math.abs(c.x-s.x),h=Math.abs(c.y-s.y);
      if(w>2&&h>2)addFeature(createRect(Math.min(s.x,c.x),Math.min(s.y,c.y),w,h));
    } else if(tool==='circle'){
      const r=dist(s.x,s.y,c.x,c.y);
      if(r>2)addFeature(createCircle(s.x,s.y,r));
    }
    drawing=false;drawStart=null;drawCurrent=null;
    render();
  }
});

CV.addEventListener('wheel',e=>{
  e.preventDefault();
  const{sx,sy}=getPos(e);
  const wBefore=toWorld(sx,sy);
  const factor=e.deltaY>0?0.9:1.1;
  zoom=Math.max(0.05,Math.min(50,zoom*factor));
  const wAfter=toWorld(sx,sy);
  camX-=(wAfter.x-wBefore.x);
  camY-=(wAfter.y-wBefore.y);
  render();
},{passive:false});

// Touch support
let lastTouchDist=0;
CV.addEventListener('touchstart',e=>{
  if(e.touches.length===2){
    panning=true;
    const dx=e.touches[1].clientX-e.touches[0].clientX;
    const dy=e.touches[1].clientY-e.touches[0].clientY;
    lastTouchDist=Math.sqrt(dx*dx+dy*dy);
    panStart={x:(e.touches[0].clientX+e.touches[1].clientX)/2,y:(e.touches[0].clientY+e.touches[1].clientY)/2,camX,camY};
    e.preventDefault();return;
  }
  const t=e.touches[0];
  CV.dispatchEvent(new MouseEvent('mousedown',{clientX:t.clientX,clientY:t.clientY,button:0}));
  e.preventDefault();
},{passive:false});
CV.addEventListener('touchmove',e=>{
  if(e.touches.length===2&&panning){
    const dx=e.touches[1].clientX-e.touches[0].clientX;
    const dy=e.touches[1].clientY-e.touches[0].clientY;
    const d=Math.sqrt(dx*dx+dy*dy);
    const scale=d/lastTouchDist;
    zoom=Math.max(0.05,Math.min(50,zoom*scale));
    lastTouchDist=d;
    const mx=(e.touches[0].clientX+e.touches[1].clientX)/2;
    const my=(e.touches[0].clientY+e.touches[1].clientY)/2;
    camX=panStart.camX-(mx-panStart.x)/zoom;
    camY=panStart.camY-(my-panStart.y)/zoom;
    panStart.x=mx;panStart.y=my;panStart.camX=camX;panStart.camY=camY;
    render();e.preventDefault();return;
  }
  const t=e.touches[0];
  CV.dispatchEvent(new MouseEvent('mousemove',{clientX:t.clientX,clientY:t.clientY}));
  e.preventDefault();
},{passive:false});
CV.addEventListener('touchend',e=>{
  if(panning&&e.touches.length<2){panning=false;}
  CV.dispatchEvent(new MouseEvent('mouseup',{clientX:0,clientY:0}));
  e.preventDefault();
},{passive:false});

// Dimension editor
function showDimEditor(f,sx,sy){
  dimInput.style.display='block';
  dimInput.style.left=(sx+10)+'px';
  dimInput.style.top=(sy-10)+'px';
  const keys=Object.keys(f.dims);
  dimInput.value=keys.map(k=>k+'='+f.dims[k]).join(', ');
  dimInput.dataset.featureId=f.id;
  dimInput.focus();
  dimInput.select();
}

dimInput.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    applyDimEdit();
    dimInput.style.display='none';
  } else if(e.key==='Escape'){
    dimInput.style.display='none';
  }
});
dimInput.addEventListener('blur',()=>{dimInput.style.display='none';});

function applyDimEdit(){
  const fId=+dimInput.dataset.featureId;
  const f=features.find(f=>f.id===fId);
  if(!f)return;
  const parts=dimInput.value.split(',');
  const changes={};
  for(const p of parts){
    const [key,val]=p.split('=').map(s=>s.trim());
    const v=parseFloat(val);
    if(isNaN(v)||v<=0)continue;
    if(f.type==='line'&&key==='length'){
      const dx=f.x2-f.x1,dy=f.y2-f.y1;
      const len=Math.sqrt(dx*dx+dy*dy)||1;
      const scale=v/len;
      changes.x2=f.x1+dx*scale;changes.y2=f.y1+dy*scale;
    } else if(f.type==='rect'&&key==='width')changes.w=v;
    else if(f.type==='rect'&&key==='height')changes.h=v;
    else if(f.type==='circle'&&key==='radius')changes.r=v;
    else if(f.type==='arc'&&key==='radius')changes.r=v;
  }
  if(Object.keys(changes).length>0)modifyFeature(fId,changes);
  render();
}

// Keyboard
document.addEventListener('keydown',e=>{
  if(dimInput.style.display==='block')return;
  if(e.key==='v'||e.key==='V')setTool('select');
  else if(e.key==='l'||e.key==='L')setTool('line');
  else if(e.key==='r'||e.key==='R')setTool('rect');
  else if(e.key==='c'&&!e.ctrlKey&&!e.metaKey)setTool('circle');
  else if(e.key==='a'||e.key==='A')setTool('arc');
  else if(e.key==='t'||e.key==='T')setTool('trim');
  else if(e.key==='d'||e.key==='D')setTool('dim');
  else if(e.key==='h'||e.key==='H')setTool('horiz');
  else if((e.ctrlKey||e.metaKey)&&e.key==='z'){e.preventDefault();undo();}
  else if((e.ctrlKey||e.metaKey)&&(e.key==='y'||e.key==='Z')){e.preventDefault();redo();}
  else if(e.key==='Delete'||e.key==='Backspace'){
    if(selectedId){deleteFeature(selectedId);}
  }
  else if(e.key==='Escape'){
    drawing=false;drawStart=null;drawCurrent=null;arcPhase=0;
    dimInput.style.display='none';
    render();
  }
});

// Toolbar
function setTool(t){
  tool=t;
  drawing=false;drawStart=null;drawCurrent=null;arcPhase=0;
  document.querySelectorAll('#toolbar button').forEach(b=>b.classList.remove('active'));
  constraintPickFirst=null;
  const map={select:'t-select',line:'t-line',rect:'t-rect',circle:'t-circle',arc:'t-arc',trim:'t-trim',dim:'t-dim',horiz:'t-horiz',vert:'t-vert',perp:'t-perp',para:'t-para'};
  if(map[t])document.getElementById(map[t]).classList.add('active');
  document.getElementById('s-tool').textContent=t.charAt(0).toUpperCase()+t.slice(1);
  CV.style.cursor=t==='select'?'default':'crosshair';
  render();
}

document.getElementById('t-select').onclick=()=>setTool('select');
document.getElementById('t-line').onclick=()=>setTool('line');
document.getElementById('t-rect').onclick=()=>setTool('rect');
document.getElementById('t-circle').onclick=()=>setTool('circle');
document.getElementById('t-arc').onclick=()=>setTool('arc');
document.getElementById('t-trim').onclick=()=>setTool('trim');
document.getElementById('t-dim').onclick=()=>setTool('dim');
document.getElementById('t-horiz').onclick=()=>setTool('horiz');
document.getElementById('t-vert').onclick=()=>setTool('vert');
document.getElementById('t-perp').onclick=()=>setTool('perp');
document.getElementById('t-para').onclick=()=>setTool('para');
document.getElementById('t-undo').onclick=undo;
document.getElementById('t-redo').onclick=redo;
document.getElementById('t-grid').onclick=()=>{
  snapEnabled=!snapEnabled;
  document.getElementById('t-grid').classList.toggle('active',snapEnabled);
  document.getElementById('s-snap').textContent='Snap: '+(snapEnabled?snapGrid:'off');
};
document.getElementById('t-grid').classList.add('active');
document.getElementById('t-clear').onclick=()=>{
  features=[];undoStack=[];redoStack=[];constraints=[];constraintNextId=1;selectedId=null;nextId=1;updateUI();
};
document.getElementById('t-export').onclick=exportSVG;

// UI updates
function updateUI(){
  renderHistory();
  renderConstraintsList();
  updateProps();
  document.getElementById('s-count').textContent=features.length+' feature'+(features.length!==1?'s':'');
  render();
}

function renderHistory(){
  const el=document.getElementById('history');
  el.innerHTML='';
  const icons={line:'╱',rect:'▭',circle:'◯',arc:'◠'};
  for(const f of features){
    const div=document.createElement('div');
    div.className='hist-item'+(f.id===selectedId?' selected':'');
    const dimStr=Object.entries(f.dims).map(([k,v])=>v).join(' × ');
    div.innerHTML='<span class="icon">'+icons[f.type]+'</span><span class="label">'+f.type.charAt(0).toUpperCase()+f.type.slice(1)+' #'+f.id+'</span><span class="dim">'+dimStr+'</span>';
    div.onclick=()=>{selectedId=f.id;updateUI();};
    div.ondblclick=()=>{
      const s=toScreen(getCenterX(f),getCenterY(f));
      showDimEditor(f,s.x,s.y);
    };
    el.appendChild(div);
  }
  el.scrollTop=el.scrollHeight;
}

function getCenterX(f){
  if(f.type==='line')return(f.x1+f.x2)/2;
  if(f.type==='rect')return f.x+f.w/2;
  if(f.type==='circle'||f.type==='arc')return f.cx;
  return 0;
}
function getCenterY(f){
  if(f.type==='line')return(f.y1+f.y2)/2;
  if(f.type==='rect')return f.y+f.h/2;
  if(f.type==='circle'||f.type==='arc')return f.cy;
  return 0;
}

function updateProps(){
  const el=document.getElementById('props-content');
  el.innerHTML='';
  const f=features.find(f=>f.id===selectedId);
  if(!f){el.innerHTML='<div style="color:var(--dim);font-size:11px">No selection</div>';return;}
  const fields=[];
  if(f.type==='line')fields.push(['X1',f.x1],['Y1',f.y1],['X2',f.x2],['Y2',f.y2],['Len',f.dims.length]);
  else if(f.type==='rect')fields.push(['X',f.x],['Y',f.y],['W',f.w],['H',f.h]);
  else if(f.type==='circle')fields.push(['CX',f.cx],['CY',f.cy],['R',f.r]);
  else if(f.type==='arc')fields.push(['CX',f.cx],['CY',f.cy],['R',f.r],['Sw',f.dims.sweep]);

  for(const [label,val] of fields){
    const row=document.createElement('div');row.className='prop-row';
    const lbl=document.createElement('label');lbl.textContent=label;
    const inp=document.createElement('input');inp.type='text';inp.value=(+val).toFixed(1);
    inp.dataset.field=label;
    inp.addEventListener('change',()=>{
      const v=parseFloat(inp.value);if(isNaN(v))return;
      const changes={};
      if(f.type==='line'){
        if(label==='X1')changes.x1=v;else if(label==='Y1')changes.y1=v;
        else if(label==='X2')changes.x2=v;else if(label==='Y2')changes.y2=v;
        else if(label==='Len'){
          const dx=f.x2-f.x1,dy=f.y2-f.y1,len=Math.sqrt(dx*dx+dy*dy)||1;
          const s=v/len;changes.x2=f.x1+dx*s;changes.y2=f.y1+dy*s;
        }
      } else if(f.type==='rect'){
        if(label==='X')changes.x=v;else if(label==='Y')changes.y=v;
        else if(label==='W')changes.w=v;else if(label==='H')changes.h=v;
      } else if(f.type==='circle'){
        if(label==='CX')changes.cx=v;else if(label==='CY')changes.cy=v;
        else if(label==='R')changes.r=v;
      } else if(f.type==='arc'){
        if(label==='CX')changes.cx=v;else if(label==='CY')changes.cy=v;
        else if(label==='R')changes.r=v;
      }
      modifyFeature(f.id,changes);
      render();
    });
    row.appendChild(lbl);row.appendChild(inp);
    el.appendChild(row);
  }
}

// --- TRIM TOOL ---
function lineLineIntersect(ax1,ay1,ax2,ay2,bx1,by1,bx2,by2){
  const d=(ax1-ax2)*(by1-by2)-(ay1-ay2)*(bx1-bx2);
  if(Math.abs(d)<1e-10)return null;
  const t=((ax1-bx1)*(by1-by2)-(ay1-by1)*(bx1-bx2))/d;
  const u=-((ax1-ax2)*(ay1-by1)-(ay1-ay2)*(ax1-bx1))/d;
  if(t>=0&&t<=1&&u>=0&&u<=1){
    return{x:ax1+t*(ax2-ax1),y:ay1+t*(ay2-ay1),t,u};
  }
  return null;
}

function findIntersectionsOnLine(lineF){
  const pts=[];
  for(const f of features){
    if(f.id===lineF.id)continue;
    if(f.type==='line'){
      const ix=lineLineIntersect(lineF.x1,lineF.y1,lineF.x2,lineF.y2,f.x1,f.y1,f.x2,f.y2);
      if(ix)pts.push({x:ix.x,y:ix.y,t:ix.t});
    } else if(f.type==='circle'){
      const hits=lineCircleIntersect(lineF.x1,lineF.y1,lineF.x2,lineF.y2,f.cx,f.cy,f.r);
      for(const h of hits)pts.push(h);
    }
  }
  pts.sort((a,b)=>a.t-b.t);
  return pts;
}

function lineCircleIntersect(x1,y1,x2,y2,cx,cy,r){
  const dx=x2-x1,dy=y2-y1;
  const fx=x1-cx,fy=y1-cy;
  const a=dx*dx+dy*dy;
  const b=2*(fx*dx+fy*dy);
  const c=fx*fx+fy*fy-r*r;
  let disc=b*b-4*a*c;
  if(disc<0)return[];
  disc=Math.sqrt(disc);
  const results=[];
  for(const sign of[-1,1]){
    const t=(-b+sign*disc)/(2*a);
    if(t>=0&&t<=1)results.push({x:x1+t*dx,y:y1+t*dy,t});
  }
  return results;
}

function doTrim(wx,wy){
  // Find the closest line to click point
  const t=8/zoom;
  let bestLine=null,bestDist=Infinity;
  for(const f of features){
    if(f.type!=='line')continue;
    const d=distToSegment(wx,wy,f.x1,f.y1,f.x2,f.y2);
    if(d<t&&d<bestDist){bestDist=d;bestLine=f;}
  }
  if(!bestLine)return;

  const intersections=findIntersectionsOnLine(bestLine);
  if(intersections.length===0)return; // nothing to trim

  // Find click t-parameter on the line
  const dx=bestLine.x2-bestLine.x1,dy=bestLine.y2-bestLine.y1;
  const lenSq=dx*dx+dy*dy;
  const clickT=lenSq>0?((wx-bestLine.x1)*dx+(wy-bestLine.y1)*dy)/lenSq:0;

  // Find the segment the click falls in
  const allT=[0,...intersections.map(p=>p.t),1];
  let segIdx=0;
  for(let i=0;i<allT.length-1;i++){
    if(clickT>=allT[i]&&clickT<=allT[i+1]){segIdx=i;break;}
  }

  // Remove the clicked segment, keep the others as new lines
  const origId=bestLine.id;
  const idx=features.findIndex(f=>f.id===origId);
  if(idx<0)return;

  const before=JSON.parse(JSON.stringify(bestLine));
  features.splice(idx,1);
  undoStack.push({action:'delete',feature:before,index:idx});

  // Create remaining segments
  for(let i=0;i<allT.length-1;i++){
    if(i===segIdx)continue; // skip the trimmed segment
    const t0=allT[i],t1=allT[i+1];
    if(Math.abs(t1-t0)<0.001)continue;
    const nx1=bestLine.x1+t0*dx,ny1=bestLine.y1+t0*dy;
    const nx2=bestLine.x1+t1*dx,ny2=bestLine.y1+t1*dy;
    addFeature(createLine(nx1,ny1,nx2,ny2));
  }

  if(selectedId===origId)selectedId=null;
  updateUI();
}

// --- CONSTRAINTS ---
function addConstraint(type,featureIds){
  const c={id:constraintNextId++,type,featureIds:[...featureIds]};
  constraints.push(c);
  applyConstraint(c);
  updateUI();
}

function removeConstraint(cid){
  constraints=constraints.filter(c=>c.id!==cid);
  updateUI();
}

function applyConstraint(c){
  if(c.type==='horizontal'){
    const f=features.find(f=>f.id===c.featureIds[0]);
    if(!f||f.type!=='line')return;
    const midY=(f.y1+f.y2)/2;
    f.y1=midY;f.y2=midY;
    recalcDims(f);
  } else if(c.type==='vertical'){
    const f=features.find(f=>f.id===c.featureIds[0]);
    if(!f||f.type!=='line')return;
    const midX=(f.x1+f.x2)/2;
    f.x1=midX;f.x2=midX;
    recalcDims(f);
  } else if(c.type==='perpendicular'){
    const f1=features.find(f=>f.id===c.featureIds[0]);
    const f2=features.find(f=>f.id===c.featureIds[1]);
    if(!f1||!f2||f1.type!=='line'||f2.type!=='line')return;
    // Rotate f2 to be perpendicular to f1
    const dx1=f1.x2-f1.x1,dy1=f1.y2-f1.y1;
    const angle1=Math.atan2(dy1,dx1);
    const targetAngle=angle1+Math.PI/2;
    const len2=dist(f2.x1,f2.y1,f2.x2,f2.y2);
    const mx=(f2.x1+f2.x2)/2,my=(f2.y1+f2.y2)/2;
    f2.x1=mx-Math.cos(targetAngle)*len2/2;
    f2.y1=my-Math.sin(targetAngle)*len2/2;
    f2.x2=mx+Math.cos(targetAngle)*len2/2;
    f2.y2=my+Math.sin(targetAngle)*len2/2;
    recalcDims(f2);
  } else if(c.type==='parallel'){
    const f1=features.find(f=>f.id===c.featureIds[0]);
    const f2=features.find(f=>f.id===c.featureIds[1]);
    if(!f1||!f2||f1.type!=='line'||f2.type!=='line')return;
    // Rotate f2 to be parallel to f1
    const dx1=f1.x2-f1.x1,dy1=f1.y2-f1.y1;
    const angle1=Math.atan2(dy1,dx1);
    const len2=dist(f2.x1,f2.y1,f2.x2,f2.y2);
    const mx=(f2.x1+f2.x2)/2,my=(f2.y1+f2.y2)/2;
    f2.x1=mx-Math.cos(angle1)*len2/2;
    f2.y1=my-Math.sin(angle1)*len2/2;
    f2.x2=mx+Math.cos(angle1)*len2/2;
    f2.y2=my+Math.sin(angle1)*len2/2;
    recalcDims(f2);
  }
}

function applyAllConstraints(){
  for(const c of constraints)applyConstraint(c);
}

function drawConstraintIndicators(){
  for(const c of constraints){
    if(c.type==='horizontal'){
      const f=features.find(f=>f.id===c.featureIds[0]);
      if(!f||f.type!=='line')continue;
      const mx=(f.x1+f.x2)/2,my=(f.y1+f.y2)/2;
      const s=toScreen(mx,my);
      X.fillStyle='rgba(74,255,139,.6)';X.font='bold 10px "IBM Plex Mono"';X.textAlign='center';
      X.fillText('H',s.x,s.y-10);
    } else if(c.type==='vertical'){
      const f=features.find(f=>f.id===c.featureIds[0]);
      if(!f||f.type!=='line')continue;
      const mx=(f.x1+f.x2)/2,my=(f.y1+f.y2)/2;
      const s=toScreen(mx,my);
      X.fillStyle='rgba(74,255,139,.6)';X.font='bold 10px "IBM Plex Mono"';X.textAlign='center';
      X.fillText('V',s.x+10,s.y);
    } else if(c.type==='perpendicular'||c.type==='parallel'){
      const f1=features.find(f=>f.id===c.featureIds[0]);
      const f2=features.find(f=>f.id===c.featureIds[1]);
      if(!f1||!f2)continue;
      const mx1=(f1.type==='line')?(f1.x1+f1.x2)/2:0;
      const my1=(f1.type==='line')?(f1.y1+f1.y2)/2:0;
      const mx2=(f2.type==='line')?(f2.x1+f2.x2)/2:0;
      const my2=(f2.type==='line')?(f2.y1+f2.y2)/2:0;
      const s1=toScreen(mx1,my1),s2=toScreen(mx2,my2);
      X.strokeStyle='rgba(74,255,139,.25)';X.lineWidth=1;X.setLineDash([3,3]);
      X.beginPath();X.moveTo(s1.x,s1.y);X.lineTo(s2.x,s2.y);X.stroke();X.setLineDash([]);
      const ms={x:(s1.x+s2.x)/2,y:(s1.y+s2.y)/2};
      X.fillStyle='rgba(74,255,139,.6)';X.font='bold 10px "IBM Plex Mono"';X.textAlign='center';
      X.fillText(c.type==='perpendicular'?'⊥':'∥',ms.x,ms.y-5);
    }
  }
}

// Draw intersection dots for trim preview
function drawTrimPreview(wx,wy){
  if(tool!=='trim')return;
  const t=8/zoom;
  let bestLine=null,bestDist=Infinity;
  for(const f of features){
    if(f.type!=='line')continue;
    const d=distToSegment(wx,wy,f.x1,f.y1,f.x2,f.y2);
    if(d<t&&d<bestDist){bestDist=d;bestLine=f;}
  }
  if(!bestLine)return;
  // Highlight the line
  const s1=toScreen(bestLine.x1,bestLine.y1),s2=toScreen(bestLine.x2,bestLine.y2);
  X.strokeStyle='rgba(255,107,74,.6)';X.lineWidth=3;X.setLineDash([]);
  X.beginPath();X.moveTo(s1.x,s1.y);X.lineTo(s2.x,s2.y);X.stroke();

  // Show intersection points
  const ixs=findIntersectionsOnLine(bestLine);
  for(const ix of ixs){
    const sp=toScreen(ix.x,ix.y);
    X.beginPath();X.arc(sp.x,sp.y,5,0,Math.PI*2);
    X.fillStyle='#ff6b4a';X.fill();
    X.strokeStyle='#fff';X.lineWidth=1;X.stroke();
  }
}

function renderConstraintsList(){
  const el=document.getElementById('constraints-list');
  el.innerHTML='';
  const icons={horizontal:'—',vertical:'|',perpendicular:'⊥',parallel:'∥'};
  for(const c of constraints){
    const ids=c.featureIds.map(id=>'#'+id).join(', ');
    const div=document.createElement('div');
    div.className='constraint-item';
    div.innerHTML='<span class="c-icon">'+icons[c.type]+'</span>'+
      c.type.charAt(0).toUpperCase()+c.type.slice(1)+' ('+ids+')'+
      '<span class="c-del" title="Remove constraint">✕</span>';
    div.querySelector('.c-del').onclick=(e)=>{e.stopPropagation();removeConstraint(c.id);};
    el.appendChild(div);
  }
}

// SVG Export
function exportSVG(){
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  for(const f of features){
    if(f.type==='line'){
      minX=Math.min(minX,f.x1,f.x2);minY=Math.min(minY,f.y1,f.y2);
      maxX=Math.max(maxX,f.x1,f.x2);maxY=Math.max(maxY,f.y1,f.y2);
    } else if(f.type==='rect'){
      minX=Math.min(minX,f.x);minY=Math.min(minY,f.y);
      maxX=Math.max(maxX,f.x+f.w);maxY=Math.max(maxY,f.y+f.h);
    } else if(f.type==='circle'){
      minX=Math.min(minX,f.cx-f.r);minY=Math.min(minY,f.cy-f.r);
      maxX=Math.max(maxX,f.cx+f.r);maxY=Math.max(maxY,f.cy+f.r);
    } else if(f.type==='arc'){
      minX=Math.min(minX,f.cx-f.r);minY=Math.min(minY,f.cy-f.r);
      maxX=Math.max(maxX,f.cx+f.r);maxY=Math.max(maxY,f.cy+f.r);
    }
  }
  const pad=20;
  minX-=pad;minY-=pad;maxX+=pad;maxY+=pad;
  const w=maxX-minX,h=maxY-minY;
  let svg='<svg xmlns="http://www.w3.org/2000/svg" viewBox="'+minX+' '+minY+' '+w+' '+h+'" width="'+w+'" height="'+h+'">\n';
  svg+='<rect x="'+minX+'" y="'+minY+'" width="'+w+'" height="'+h+'" fill="#1a1c22"/>\n';
  for(const f of features){
    const s='stroke="#7a8ab0" stroke-width="1.5" fill="none"';
    if(f.type==='line')svg+='<line x1="'+f.x1+'" y1="'+f.y1+'" x2="'+f.x2+'" y2="'+f.y2+'" '+s+'/>\n';
    else if(f.type==='rect')svg+='<rect x="'+f.x+'" y="'+f.y+'" width="'+f.w+'" height="'+f.h+'" '+s+'/>\n';
    else if(f.type==='circle')svg+='<circle cx="'+f.cx+'" cy="'+f.cy+'" r="'+f.r+'" '+s+'/>\n';
    else if(f.type==='arc'){
      const x1=f.cx+Math.cos(f.startAngle)*f.r,y1=f.cy+Math.sin(f.startAngle)*f.r;
      const x2=f.cx+Math.cos(f.endAngle)*f.r,y2=f.cy+Math.sin(f.endAngle)*f.r;
      const sweep=f.endAngle-f.startAngle;
      const large=Math.abs(sweep)>Math.PI?1:0;
      const sf=sweep>0?1:0;
      svg+='<path d="M'+x1+' '+y1+' A'+f.r+' '+f.r+' 0 '+large+' '+sf+' '+x2+' '+y2+'" '+s+'/>\n';
    }
  }
  svg+='</svg>';
  const blob=new Blob([svg],{type:'image/svg+xml'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);a.download='sketch.svg';a.click();
}

// Init
resize();
updateUI();
