<!DOCTYPE html>

<meta property="og:image" content="https://image.pollinations.ai/prompt/retro%20green%20CRT%20monitor%20displaying%20structured%20prompt%20text%2C%20dark%20room%2C%20phosphor%20glow%2C%20vintage%20computer%20terminal?width=1200&height=630&seed=1984&nologo=true">

<link href="https://fonts.googleapis.com/css2?family=VT323&family=Major+Mono+Display&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    /* v0.14 — P1 phosphor revival. P1 (the original CRT phosphor used in VT100,
       Apple ][ green-screen monitors, early oscilloscopes) emits at ~525nm with
       a yellow cast — distinctly more yellow-green than the neon #6cfa5e of
       v0.12. The values below approximate that yellowish-green plus its slower
       afterglow tones. */
    --void:        #06120a;       /* very dark green-tinted black, like CRT off-state */
    --void-2:      #091a0d;
    --panel:       #0d1f10;
    --panel-edge:  rgba(168,255,94,0.18);
    --phosphor:    #a8ff5e;       /* P1 primary — yellowish-green */
    --phosphor-dim:#5f9a32;       /* aged afterglow */
    --phosphor-dk: #2e4a17;
    /* v0.15.1: amber + warn + magenta retired. All chrome that previously called
       these vars now resolves to P1 phosphor green. The variable names are kept
       so no class/selector renames are required, but every value points at
       --phosphor or a phosphor tint. */
    --amber:       #a8ff5e;
    --amber-soft:  rgba(168,255,94,0.18);
    --magenta:     #a8ff5e;
    --warn:        #c6ff80;       /* phosphor at slightly hotter saturation for warn states */
    --bone:        #d4ecc8;
    --dim:         #4a6a32;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100vh; overflow: hidden; }
  html { font-size: 100%; }
  /* v0.18.7 — P1 phosphor scrollbars. Firefox uses scrollbar-color/width;
     WebKit-family browsers (Chrome, Safari, Edge) use the ::-webkit-scrollbar
     pseudo-elements. Track is near-void with a faint phosphor stripe; thumb
     is solid phosphor green with a P1 glow on hover. */
  * {
    scrollbar-width: thin;
    scrollbar-color: var(--phosphor) rgba(168,255,94,0.06);
  }
  *::-webkit-scrollbar {
    width: 0.65rem;
    height: 0.65rem;
  }
  *::-webkit-scrollbar-track {
    background: rgba(168,255,94,0.06);
    border-left: 1px solid rgba(168,255,94,0.18);
  }
  *::-webkit-scrollbar-thumb {
    background: var(--phosphor);
    border: 1px solid rgba(6,18,10,0.6);
    box-shadow: inset 0 0 4px rgba(6,18,10,0.4);
  }
  *::-webkit-scrollbar-thumb:hover {
    background: #c6ff80;
    box-shadow: 0 0 8px rgba(168,255,94,0.6);
  }
  *::-webkit-scrollbar-corner {
    background: rgba(168,255,94,0.06);
  }
  /* v0.16 — body IS the putty-plastic bezel. The actual CRT screen is main; the
     scanlines + vignette + chromatic aberration + flicker have all moved inside
     main so the bezel itself stays clean injection-molded plastic. */
  body {
    /* Putty plastic — warm beige-gray, the color of 80s/90s computer cases.
       Two layered gradients give a subtle directional lighting + a barely-there
       linen weave for the injection-mold texture. */
    background:
      radial-gradient(ellipse at 25% 12%, rgba(255,255,255,0.06), transparent 55%),
      radial-gradient(ellipse at 75% 88%, rgba(0,0,0,0.15), transparent 60%),
      repeating-linear-gradient(43deg, rgba(0,0,0,0.02) 0 1px, transparent 1px 3px),
      repeating-linear-gradient(133deg, rgba(255,255,255,0.018) 0 1px, transparent 1px 3px),
      #c8bea2;
    color: var(--phosphor);
    font-family: 'VT323', 'Courier New', monospace;
    padding: 3rem 3rem 3.6rem;
    overscroll-behavior: none;
    line-height: 1.4;
  }
  @media (max-width: 720px) {
    body { padding: 1rem 1rem 1.4rem; }
  }
  /* Matrix rain canvas — sits inside main and is clipped to the screen aperture
     by main's overflow:hidden + border-radius. Won't bleed onto the putty bezel. */
  #rain {
    position: absolute;
    inset: 0;
    z-index: 1;
    pointer-events: none;
    opacity: 0.22;
    mix-blend-mode: screen;
    border-radius: inherit;
  }
  /* Power-supply flicker — occasional dip in brightness. Applied to main. */
  @keyframes flicker {
    0%, 100% { opacity: 0.97; }
    5% { opacity: 0.93; }
    7% { opacity: 0.99; }
    49.5% { opacity: 0.97; }
    50% { opacity: 1; }
    50.5% { opacity: 0.97; }
    73% { opacity: 0.91; }
    74% { opacity: 0.99; }
  }
  @keyframes scanline-drift {
    0%   { background-position: 0 0, 0 0; }
    100% { background-position: 0 8px, 0 4px; }
  }
  /* CRT SCREEN — main is the actual phosphor surface, set into the bezel with
     a deep inset shadow. Subtle perspective transform + rounded corners give
     the barrel-bulb illusion. */
  main {
    position: relative;
    z-index: 2;
    max-width: 100rem;
    height: 100%;
    margin: 0 auto;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 0.7rem;
    min-height: 0;
    padding: 1.3rem 1.5rem;
    /* The screen aperture — dark green-black with the radial phosphor halos
       that used to live on body. */
    background:
      radial-gradient(ellipse at center, rgba(168,255,94,0.12), transparent 55%),
      radial-gradient(ellipse at center, rgba(168,255,94,0.06), transparent 90%),
      var(--void);
    /* CRT chromatic aberration — was on body before v0.16, now only inside the
       screen so the bezel labels (if any) stay neutral. */
    text-shadow:
      -0.6px 0 0 rgba(255, 60, 80, 0.45),
       0.6px 0 0 rgba(60, 200, 255, 0.45),
       0 0 4px rgba(168,255,94,0.45),
       0 0 14px rgba(168,255,94,0.18);
    /* Barrel curvature (v0.16.1 — cranked up). Much more pronounced than the
       initial subtle version. The screen now reads as a heavy convex CRT bulb:
       larger asymmetric corner radii (top more curved than bottom), aggressive
       perspective + rotateX for a forward bulge, and a slight horizontal scale
       expansion to suggest the panel is leaning out toward the viewer. */
    border-radius: 4rem 4rem 2.8rem 2.8rem / 2.6rem 2.6rem 2rem 2rem;
    transform: perspective(900px) rotateX(2.2deg) scale(1.01);
    transform-origin: center 65%;
    /* v0.16.4 — inset darkening halved per chat directive (0.5 alpha → 0.25,
       bezel cast shadow 0.6 → 0.3). Bezel rim trim kept (it's bezel, not
       vignette). */
    box-shadow:
      0 0 0 5px #6a624f,                        /* inner bezel ring (dark trim) */
      0 0 0 8px #5a5240,
      0 14px 32px 6px rgba(0,0,0,0.3),          /* halved cast shadow */
      inset 0 0 90px 6px rgba(0,0,0,0.25),      /* halved corner darkening */
      inset 0 0 38px rgba(168,255,94,0.06);     /* phosphor inner glow (kept) */
    animation: flicker 4s steps(1) infinite;
    overflow: hidden;
  }
  /* Scanlines moved INSIDE the screen so they curve with the bezel's rounded
     aperture and don't bleed onto the plastic. */
  main::before {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 100;
    background:
      repeating-linear-gradient(0deg, rgba(0,0,0,0.42) 0 1px, transparent 1px 2px),
      repeating-linear-gradient(0deg, rgba(168,255,94,0.05) 0 2px, transparent 2px 4px);
    mix-blend-mode: multiply;
    animation: scanline-drift 6s linear infinite;
    border-radius: inherit;
  }
  /* Barrel vignette (v0.16.4 — alphas halved per chat directive "reduce the
     vignetting by half"). Geometry unchanged from v0.16.3, but every dark stop
     dropped to half its previous opacity: corner darkening 0.48 → 0.24, central
     fade 0.45 → 0.22. The inner phosphor halo stays at 0.06 (already faint).
     Curvature still reads via box-shadow + border-radius + perspective. */
  main::after {
    content: '';
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 101;
    background:
      radial-gradient(ellipse 55% 50% at 0% 0%,    rgba(0,0,0,0.24), transparent 45%),
      radial-gradient(ellipse 55% 50% at 100% 0%,  rgba(0,0,0,0.24), transparent 45%),
      radial-gradient(ellipse 55% 50% at 0% 100%,  rgba(0,0,0,0.24), transparent 45%),
      radial-gradient(ellipse 55% 50% at 100% 100%,rgba(0,0,0,0.24), transparent 45%),
      radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.22) 100%),
      radial-gradient(ellipse at center, rgba(168,255,94,0.06), transparent 30%);
    border-radius: inherit;
  }
  @media (prefers-reduced-motion: reduce) {
    main::before { animation: none; }
    main { animation: none; transform: none; }
  }

  /* Header — single compact strip */
  header.head {
    position: relative;
    z-index: 2;
    border: 4px double var(--phosphor-dim);
    background: rgba(6,18,10,0.92);
    padding: 0.55rem 1rem;
    border-radius: 0;
    box-shadow: inset 0 0 24px rgba(168,255,94,0.05);
    display: flex;
    align-items: center;
    gap: 1.1rem;
    flex-wrap: wrap;
  }
  h1 {
    /* v0.18.4: VT323 + full-width scale per chat. Title grows aggressively with
       viewport (clamp 3rem → 11vw → 7rem) so it spreads across the header bar.
       flex: 1 + text-align center fills any remaining horizontal slack. VT323
       is a pixel font so it handles being huge without artifacts. */
    font-family: 'VT323', 'Courier New', monospace;
    font-weight: 700;
    font-size: clamp(3rem, 11vw, 7rem);
    letter-spacing: 0.05em;
    margin: 0;
    flex: 1;
    text-align: center;
    color: var(--phosphor);
    text-shadow:
      0 0 10px rgba(168,255,94,0.6),
      0 0 28px rgba(168,255,94,0.28),
      0 0 0.04em rgba(168,255,94,0.85);
    text-transform: lowercase;
    line-height: 1;
  }
  /* Hidden reasoning toggle — disguised as the middle dot of "prompt·optimizer".
     Inherits font + color so it reads as plain typography until you hover or
     toggle it on. When active, the dot glows amber. */
  .reasoning-toggle {
    background: transparent;
    border: 0;
    padding: 0 0.05em;
    margin: 0;
    font: inherit;
    color: inherit;
    line-height: 1;
    cursor: pointer;
    transition: color 0.18s ease, text-shadow 0.18s ease, transform 0.18s ease;
  }
  .reasoning-toggle:hover {
    color: var(--amber);
    text-shadow: 0 0 8px rgba(168,255,94,0.6);
  }
  .reasoning-toggle.on {
    color: var(--amber);
    text-shadow: 0 0 10px rgba(168,255,94,0.8), 0 0 18px rgba(168,255,94,0.45);
    animation: rt-pulse 2.4s ease-in-out infinite;
  }
  @keyframes rt-pulse {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.08); }
  }
  .reasoning-toggle:focus-visible {
    outline: 2px solid var(--amber);
    outline-offset: 2px;
    border-radius: 3px;
  }
  @media (prefers-reduced-motion: reduce) {
    .reasoning-toggle.on { animation: none; }
  }
  /* v0.16.7: .head .sub and .head .sub .cmd rules retired — the subtitle help
     line ("$ role · task · style. nothing else.") was removed from the markup
     per chat directive ("remove the prompt help text"). Header now contains
     only the cursor + title. */
  /* v0.16.1 — 2Hz blinking █ block cursor at the end of the header prompt.
     500ms cycle (250ms on / 250ms off) via steps(1) for instant hard transitions
     — exactly how vintage CRT terminals rendered the cursor. */
  /* v0.16.7 — cursor moved from end of subtitle to BEFORE the page title.
     Sits inside h1, so it scales with the title's font-size automatically.
     Margin removed (uses an &nbsp; in markup for spacing instead) so the cursor
     reads as a leading prompt indicator. */
  .term-cursor {
    display: inline-block;
    color: var(--phosphor);
    line-height: 1;
    vertical-align: baseline;
    animation: term-blink 0.5s steps(1) infinite;
    text-shadow:
      0 0 6px rgba(168,255,94,0.6),
      0 0 14px rgba(168,255,94,0.28);
  }
  @keyframes term-blink {
    0%, 49.99%  { opacity: 1; }
    50%, 100%   { opacity: 0; }
  }
  @media (prefers-reduced-motion: reduce) {
    .term-cursor { animation: none; opacity: 1; }
  }
  .head .meta {
    display: flex;
    gap: 0.85rem;
    flex-wrap: wrap;
    font-family: 'VT323', 'Courier New', monospace;
    font-size: 1.1rem;
    letter-spacing: 0.22em;
    color: var(--phosphor-dim);
    text-transform: uppercase;
  }

  /* Single amber prompt-builder frame */
  .frame {
    position: relative;
    z-index: 2;
    background: rgba(6,18,10,0.94);
    border: 6px double var(--amber);
    border-radius: 0;
    padding: 1rem 1.1rem;
    box-shadow:
      inset 0 0 28px rgba(168,255,94,0.05),
      0 0 0 1px rgba(0,0,0,0.4),
      0 0 36px rgba(168,255,94,0.10);
    display: grid;
    gap: 0.85rem;
    min-height: 0;
    overflow-y: auto;
    align-content: start;
  }
  @media (max-width: 56rem) {
    html, body { overflow: auto; height: auto; }
    .frame { overflow: visible; }
  }
  .field-block {
    display: grid;
    gap: 0.25rem;
  }
  /* v0.9.8 — 6 explicit fieldset frames around each input area */
  .frame-group {
    border: 4px double rgba(168,255,94,0.5);
    border-radius: 0;
    padding: 0.7rem 0.9rem 0.8rem;
    margin: 0;
    background: rgba(168,255,94,0.025);
    display: grid;
    gap: 0.55rem;
  }
  /* v0.18.1: Task fieldset border + padding stripped — the textarea sits flush
     inside the outer .frame rather than nested in a second amber box. */
  .frame-group.task-frame {
    border: none;
    background: transparent;
    padding: 0;
  }
  .frame-group.task-frame > legend {
    padding-left: 0;
  }
  /* v0.18.3: .role-line + .role-key removed — Role now uses the same
     .task-frame fieldset structure as Task (borderless + flush). */
  .frame-group > legend {
    font-family: 'VT323', 'Courier New', monospace;
    font-size: 1.3rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--amber);
    padding: 0 0.45rem;
    display: inline-flex;
    align-items: baseline;
    gap: 0.45rem;
    line-height: 1;
  }
  .frame-group > legend .hint-tag {
    font-family: 'VT323', 'Courier New', monospace;
    font-size: 1rem;
    letter-spacing: 0.04em;
    text-transform: lowercase;
  }
  .frame-group > legend .hint-tag.optional { color: var(--dim); }
  .frame-group > legend .hint-tag.required { color: var(--warn); }
  .frame-group > legend .hint-tag.count { color: var(--dim); }
  .frame-group > legend .hint-tag.count.warn { color: var(--amber); }
  .frame-group > legend .hint-tag.count.over { color: var(--warn); }
  .frame-group > legend .fg-n {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 1.55rem;
    height: 1.55rem;
    border-radius: 0;
    border: 2px solid rgba(168,255,94,0.75);
    background: rgba(168,255,94,0.22);
    color: var(--amber);
    font-family: 'VT323', 'Courier New', monospace;
    font-size: 1.15rem;
    letter-spacing: 0;
    padding: 0 0.35rem;
    box-shadow: inset 0 0 0 1px rgba(6,18,10,0.85);
  }
  .frame-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 0.55rem;
  }
  .frame-row.frame-row-2 { grid-template-columns: 1fr 1fr; }
  @media (max-width: 760px) {
    .frame-row, .frame-row.frame-row-2 { grid-template-columns: 1fr; }
  }
  .toggle-frame { padding-bottom: 0.55rem; }
  .toggle-frame .wide-chip {
    width: 100%;
    min-height: 2.6rem;
    text-align: center;
    justify-content: center;
    font-size: 1.05rem;
  }
  /* v0.9.11 — collapsible buckets (1 core task + 6 buckets) */
  .task-frame {
    border-color: rgba(168,255,94,0.55);
    background: rgba(168,255,94,0.06);
  }
  .fg-n.core {
    background: rgba(168,255,94,0.25);
    border-color: rgba(168,255,94,0.85);
    color: var(--amber);
    font-size: 1.25rem;
  }
  .bucket {
    border: 4px double rgba(168,255,94,0.4);
    border-radius: 0;
    background: rgba(168,255,94,0.018);
    padding: 0;
    overflow: hidden;
    transition: border-color 0.15s ease, background 0.15s ease;
  }
  .bucket[open] {
    background: rgba(168,255,94,0.045);
    border-color: rgba(168,255,94,0.65);
  }
  .bucket > summary {
    list-style: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.7rem;
    padding: 0.65rem 0.9rem;
    min-height: 2.75rem;
    user-select: none;
  }
  .bucket > summary::-webkit-details-marker { display: none; }
  .bucket > summary::marker { content: ''; }
  .bucket > summary:hover { background: rgba(168,255,94,0.04); }
  .bucket > summary:focus-visible {
    outline: 2px solid var(--amber);
    outline-offset: -2px;
  }
  .bucket .bk-label {
    font-family: 'VT323', 'Courier New', monospace;
    font-size: 1.25rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--amber);
    flex: 0 0 auto;
  }
  .bucket .bk-preview {
    font-family: 'VT323', 'Courier New', monospace;
    font-size: 1.25rem;
    color: var(--phosphor-dim);
    flex: 1 1 auto;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    text-align: right;
    padding-right: 0.3rem;
  }
  .bucket[open] .bk-preview { color: var(--phosphor); opacity: 0.7; }
  .bucket .chev {
    font-family: monospace;
    font-size: 1rem;
    color: var(--amber);
    transition: transform 0.2s ease;
    flex: 0 0 auto;
  }
  .bucket[open] > summary .chev { transform: rotate(90deg); }
  .bucket-body {
    padding: 0.65rem 0.9rem 0.85rem;
    display: grid;
    gap: 0.55rem;
    border-top: 4px double rgba(168,255,94,0.3);
    position: relative;
  }
  .bucket-body.bucket-toggles {
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
  }
  /* Heavy ═ divider — sits inside the bucket-body above the content, reinforcing
     the double-line border with a literal box-drawing-character row. */
  .bucket-body::before {
    content: '═══════════════════════════════════════════════════════════════════════════════════════════════';
    display: block;
    font-family: 'VT323', 'Courier New', monospace;
    color: rgba(168,255,94,0.35);
    font-size: 0.85rem;
    line-height: 0.5;
    letter-spacing: 0;
    overflow: hidden;
    white-space: nowrap;
    margin: -0.45rem 0 0.35rem;
    pointer-events: none;
  }
  @media (max-width: 600px) {
    .bucket-body.bucket-toggles { grid-template-columns: 1fr; }
  }
  .row-label {
    display: grid;
    grid-template-columns: 4.5rem 1fr;
    align-items: center;
    gap: 0.6rem;
  }
  .row-key {
    font-family: 'VT323', 'Courier New', monospace;
    font-size: 1.1rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--amber);
  }
  @media (prefers-reduced-motion: reduce) {
    .bucket .chev { transition: none; }
  }
  .frame-group select {
    background: rgba(168,255,94,0.05);
    border: 1.5px solid rgba(168,255,94,0.4);
    border-radius: 0.3rem;
    padding: 0.45rem 0.55rem;
    color: var(--phosphor);
    font-family: 'VT323', 'Courier New', monospace;
    font-size: 1.4rem;
    outline: none;
    width: 100%;
  }
  .frame-group select:focus {
    border-color: var(--amber);
    box-shadow: 0 0 12px rgba(168,255,94,0.25);
  }
  .constraint-row {
    display: grid;
    grid-template-columns: auto 1fr auto;
    gap: 0.55rem;
    align-items: end;
  }
  @media (max-width: 760px) {
    .constraint-row { grid-template-columns: 1fr; align-items: stretch; }
    .constraint-row .toggles { margin-left: 0; }
  }
  .field-label {
    font-family: 'VT323', 'Courier New', monospace;
    font-size: 1.3rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--amber);
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
  }
  .field-label .hint-tag {
    font-family: 'VT323', 'Courier New', monospace;
    font-size: 1rem;
    letter-spacing: 0.04em;
    text-transform: lowercase;
  }
  .field-label .optional { color: var(--dim); }
  .field-label .required { color: var(--warn); }
  .field-label .count { margin-left: auto; color: var(--dim); }
  .field-label .count.warn { color: var(--amber); }
  .field-label .count.over { color: var(--warn); }
  .frame input[type="text"],
  .frame textarea {
    background: rgba(168,255,94,0.04);
    border: 3px double rgba(168,255,94,0.55);
    border-radius: 0;
    padding: 0.45rem 0.65rem;
    color: var(--phosphor);
    font-family: 'VT323', 'Courier New', monospace;
    font-size: 1.5rem;
    line-height: 1.25;
    width: 100%;
    outline: none;
    resize: none;
    transition: border-color 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
  }
  .frame input[type="text"]::placeholder,
  .frame textarea::placeholder { color: var(--dim); }
  .frame input[type="text"]:focus,
  .frame textarea:focus {
    border-color: var(--amber);
    background: rgba(168,255,94,0.08);

  .frame select:focus { border-color: var(--amber); outline: none; box-shadow: 0 0 12px rgba(168,255,94,0.22); }
  /* v0.17.4 — Role preset dropdown removed entirely (markup + JS + styles).

  .ctrl-row {
    display: flex;
    flex-wrap: wrap;
    gap: 0.45rem;

  }
  .field-inline {
    display: grid;
    gap: 0.2rem;

  .field-mini {
    font-family: 'VT323', 'Courier New', monospace;

  }
  .toggles {
    display: flex;
    gap: 0.35rem;
    flex-wrap: wrap;
    flex: 1;
    margin-left: 0.3rem;
  }
  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.45rem;
  }
  .btn-row.btn-row-3 { grid-template-columns: 1.4fr 1fr 1fr; }
  .btn-row.btn-row-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }  /* v0.18.6: equal widths after the swap */
  @media (max-width: 640px) {
    .btn-row.btn-row-4 { grid-template-columns: 1fr 1fr; }
  }
  /* Roast button override removed in v0.16.4 — every button is now hollow
     phosphor via the unified .btn rule below. Kept the class on the markup
     so the keyboard shortcut + JS handler still target #roastBtn. */
  .output-split {
    /* v0.18: border-top + padding-top removed per chat — no more horizontal
       rule separating the button row from the output panels. The grid gap
       between buttons and outputs is now just the .frame's natural gap. */
    margin-top: 0.7rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.9rem;
  }
  @media (max-width: 780px) {
    .output-split { grid-template-columns: 1fr; gap: 0.9rem; }
  }
  .output-block {
    display: grid;
    grid-template-rows: auto 1fr;
    gap: 0.55rem;
    min-width: 0;
  }
  .output-block.clarify-block .output-label { color: var(--phosphor); }
  .clarify-block.alert .output-label { color: #a8ff5e; }
  .output-head {
    display: flex;
    justify-content: space-between;
    font-family: 'VT323', 'Courier New', monospace;
    color: var(--phosphor);
    font-size: 1.5rem;
    align-items: baseline;
  }
  .output-head .output-label {
    color: var(--amber);
    text-transform: uppercase;
    letter-spacing: 0.18em;
    font-size: 1.4rem;
  }
  /* v0.18.9 — explicit VT323 on the meta-line so it can't drift to system fonts
     via cascade quirks. Inherited bg already had VT323 set, but the failure
     copy reads as the wrong font on some browsers without an explicit declaration. */
  .output-head .hint {
    color: var(--dim);
    font-size: 1.2rem;
    letter-spacing: 0.08em;
    font-family: 'VT323', 'Courier New', monospace;
  }

  /* (removed: legacy .checklist sidebar — merged into the single amber frame in v0.6) */
  .checklist, .checklist h3, .checklist .blurb, .check-items, .check-item, .check-item .box,
  .check-item .body, .check-item .label, .check-item .desc, .check-item .status, .check-toolbar,
  .check-toolbar .mini { display: none !important; }
  .pane {
    background: rgba(5,10,4,0.93);
    border: 1.5px solid var(--phosphor-dim);
    border-radius: 0.35rem;
    padding: 0.65rem 0.75rem;
    display: grid;
    grid-template-rows: auto 1fr auto;
    gap: 0.5rem;
    min-height: 0;
    overflow: hidden;
    box-shadow: inset 0 0 20px rgba(108,250,94,0.05);
  }
  .pane-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: 'VT323', 'Courier New', monospace;
    color: var(--phosphor);

    border-bottom: 1.5px dashed var(--phosphor-dim);

  }
  .pane-head .label { color: var(--amber); text-transform: uppercase; letter-spacing: 0.22em; font-size: 1.35rem; }
  .pane-head .hint { color: var(--dim); font-size: 1.35rem; letter-spacing: 0.1em; }
  textarea, .out-box {
    width: 100%;
    background: transparent;
    border: none;
    outline: none;
    font-family: 'VT323', 'Courier New', monospace;
    font-size: 1.8rem;

  textarea::placeholder { color: var(--dim); }
  textarea:focus { outline: none; }
  textarea:focus::placeholder { color: var(--phosphor-dim); }
  /* Editable output textarea — same look as the input fields, slightly taller */

    white-space: pre-wrap;
    word-break: break-word;
    min-height: 9rem;
    resize: vertical;
    background: rgba(168,255,94,0.04);
    border: 3px double rgba(168,255,94,0.45);

  }
  textarea.out-box:focus {

  textarea.out-box.idle::placeholder {

  /* Readonly Areas-for-Improvement box — distinct tint, no edit affordances.
     v0.16.6: height tracks the Refined textarea on the right. Both panels live
     in a CSS grid (.output-split) with default stretch alignment; .output-block
     now has `grid-template-rows: auto 1fr` so the textarea row fills the block.
     This box uses `height: 100%` so it expands/contracts with the block, which
     in turn matches the OTHER block (containing the user-resizable Refined
     textarea). User-drag on Refined → Refined block grows → grid stretches the
     Areas block → this textarea fills it. No max-height; just min for collapse
     safety. Content scrolls internally if it exceeds the matched height. */
  textarea.out-box.clarify-box {
    background: rgba(168,255,94,0.025);

  /* Controls bar */
  .ctrl-row {
    display: grid;

  .field {
    display: grid;

  .field-key {
    font-family: 'VT323', 'Courier New', monospace;

  }
  select {
    background: rgba(5,10,4,0.85);
    border: 1.5px solid var(--phosphor-dim);
    color: var(--phosphor);

  select:focus { outline: 2px solid var(--amber); outline-offset: 1px; }
  .toggles {
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
  }
  .chip {
    background: rgba(5,10,4,0.85);
    border: 3px double var(--phosphor-dim);
    color: var(--dim);
    font-family: 'VT323', 'Courier New', monospace;

  .chip:hover { color: var(--phosphor); border-color: var(--phosphor); }
  .chip.on {
    background: rgba(168,255,94,0.14);

  .chip.on::before {
    content: '█ ';
    color: var(--phosphor);

  .chip:focus-visible { outline: 2px solid var(--amber); outline-offset: 2px; }

  .btn-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
    margin-top: 0.4rem;
  }
  /* v0.16.4 — every button matches the CLEAR (ghost) style: transparent fill,
     3px double phosphor border, phosphor text. No more visual hierarchy
     between Refine / Roast / Clear / Copy — they're all hollow shells. */
  .btn {
    background: transparent;
    border: 3px double var(--phosphor);
    color: var(--phosphor);
    font-family: 'VT323', 'Courier New', monospace;
    font-size: 1.4rem;
    letter-spacing: 0.14em;
    padding: 0.45rem 0.85rem;
    border-radius: 0;
    cursor: pointer;

  .btn:hover { background: rgba(168,255,94,0.18); box-shadow: 0 0 12px rgba(168,255,94,0.4); }
  .btn:focus-visible { outline: 2px solid var(--amber); outline-offset: 2px; }
  /* v0.17.7: .btn:disabled visual styling removed — Copy now looks IDENTICAL
     to Clear at all times, per chat directive. The `disabled` attribute stays
     in the markup so the browser still prevents click events until JS clears
     it after a successful refine; only the visual dimming is gone. */
  /* Variant overrides flattened — primary / ghost / roast / warn now inherit the
     base hollow look so they all read as the same kind of terminal button. */
  .btn.primary,
  .btn.ghost,
  .btn.roast,
  .btn.warn {

  .btn.primary:hover,
  .btn.ghost:hover,
  .btn.roast:hover,
  .btn.warn:hover {

  /* History — single horizontal flex line, full-length labels, scrolls if it overflows */
  .history {

  .hist-row .summary {

  .hist-row .ts {

  .hist-row .del {

  /* Toast */

  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .toast.warn { color: var(--warn); border-color: var(--warn); }

  /* (removed: .loading-line + dotPulse keyframes — no async waits since v0.2) */

  .visually-hidden {
    position: absolute;
    width: 1px;
    height: 1px;
    margin: -1px;
    padding: 0;
    overflow: hidden;
    clip: rect(0,0,0,0);

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
    main { animation: none; }

<body>
<main>
<canvas id="rain" aria-hidden="true"></canvas>
  <header class="head">
    <h1>prompt optimizer</h1>
  </header>

  <section class="frame" aria-label="Prompt builder">
    <!-- v0.18.7: Role moved above Task per chat. Both fieldsets share the same
         flush borderless task-frame styling so they read as a paired stack. -->
    <fieldset class="frame-group task-frame">
      <legend>Role</legend>
      <input type="text" id="roleInput" maxlength="200" value="you are a senior developer" placeholder="you are a senior developer" spellcheck="false" autocomplete="off">
    </fieldset>

    <fieldset class="frame-group task-frame">
      <legend>Task</legend>
      <textarea id="taskInput" rows="5" placeholder="what should claude do?" spellcheck="false"></textarea>
    </fieldset>

    <div class="btn-row btn-row-4">
      <button class="btn roast" id="roastBtn" type="button" title="Five sharp clarifying questions about your Task (Ctrl/Cmd+Shift+K)">Roast me</button>
      <button class="btn primary" id="refineBtn" type="button">Optimize</button>
      <button class="btn ghost" id="copyBtn" type="button" disabled>Copy</button>
      <button class="btn ghost" id="clearBtn" type="button">Clear</button>
    </div>

    <div class="output-split">
      <div class="output-block clarify-block">
        <div class="output-head">
          <span class="output-label">Result of Roast Me</span>
          <span class="hint visually-hidden" id="clarifyMeta" aria-live="polite">press Optimize to surface areas for improvement, or Roast Me for five sharp clarifying questions</span>
        </div>
        <textarea class="out-box clarify-box idle" id="clarifyOutput" rows="9" readonly aria-label="Result of Roast Me — gaps, ambiguities, and clarifying questions" placeholder="gaps, ambiguities, and clarifying questions appear here after pressing the buttons."></textarea>
      </div>
      <div class="output-block refined-block">
        <div class="output-head">
          <span class="output-label">Optimized Prompt</span>
          <span class="hint" id="outMeta"></span>
        </div>
        <textarea class="out-box idle" id="output" rows="9" aria-label="Optimized prompt — editable, paste-ready" placeholder="Press optimise for AI optimization, you can edit the output before copying." spellcheck="false"></textarea>
      </div>
    </div>
  </section>

  <section class="history" id="historyWrap">
    <h2>recent (last 3)</h2>
    <div class="history-empty" id="historyEmpty">no refinements yet.</div>
    <div class="history-list" id="historyList"></div>
  </section>
</main>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
(function(){
  // ---- Matrix digital rain ----
  // Fills the viewport with falling green glyphs in canvas. Panels sit on top
  // with rgba(5,10,4,0.93) backgrounds so rain only shows in margins/gaps.
  (function initRain(){
    const c = document.getElementById('rain');
    if (!c) return;
    const ctx = c.getContext('2d');
    const FONT_PX = 14;
    let cols = 0;
    let drops = [];
    let speeds = [];
    let trailLen = [];
    const GLYPHS = 'ｦｧｨｩｪｫｬｭｮｯｰｱｲｳｴｵｶｷｸｹｺｻｼｽｾｿﾀﾁﾂﾃﾄﾅﾆﾇﾈﾉﾊﾋﾌﾍﾎﾏﾐﾑﾒﾓﾔﾕﾖﾗﾘﾙﾚﾛﾜﾝ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ#$%@&*+=<>{}[]';
    function resize() {
      const dpr = Math.min(window.devicePixelRatio || 1, 2);
      c.width = Math.floor(window.innerWidth * dpr);
      c.height = Math.floor(window.innerHeight * dpr);
      c.style.width = window.innerWidth + 'px';
      c.style.height = window.innerHeight + 'px';
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      cols = Math.ceil(window.innerWidth / FONT_PX);
      drops = new Array(cols).fill(0).map(() => Math.random() * (window.innerHeight / FONT_PX));
      speeds = new Array(cols).fill(0).map(() => 0.6 + Math.random() * 0.9);
      trailLen = new Array(cols).fill(0).map(() => 8 + Math.floor(Math.random() * 14));
    }
    resize();
    window.addEventListener('resize', resize);
    let lastFrame = 0;
    function step(now) {
      const dt = now - lastFrame;
      lastFrame = now;
      // Fade existing trails
      ctx.fillStyle = 'rgba(5, 10, 4, 0.10)';
      ctx.fillRect(0, 0, window.innerWidth, window.innerHeight);
      ctx.font = FONT_PX + "px 'VT323', 'Courier New', monospace";
      for (let i = 0; i < cols; i++) {
        const x = i * FONT_PX + FONT_PX / 2;
        const yIdx = drops[i];
        const y = yIdx * FONT_PX;
        const ch = GLYPHS[Math.floor(Math.random() * GLYPHS.length)];
        // Lead glyph is bright white-green; trailing fade was done via the overlay
        const isLead = Math.random() < 0.45;
        ctx.fillStyle = isLead ? 'rgba(180, 255, 154, 0.92)' : 'rgba(108, 250, 94, 0.78)';
        ctx.fillText(ch, x, y);
        drops[i] += speeds[i] * (dt > 0 && dt < 80 ? dt / 16 : 1);
        // Reset column with random jitter past the bottom
        if (y > window.innerHeight && Math.random() > 0.972) {
          drops[i] = -Math.random() * (trailLen[i]);
          speeds[i] = 0.6 + Math.random() * 0.9;
        }
      }
      requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  })();

  // ---- Keyword picker for compact history ----
  // Extracts the single most relevant word from a raw prompt — longest non-stopword,
  // tie-broken by frequency in the text.
  const STOPWORDS = new Set([
    'the','a','an','and','or','but','if','then','than','so','as','is','are','was','were','be','been','being','have','has','had','do','does','did','will','would','could','should','may','might','can','this','that','these','those','i','me','my','you','your','it','its','he','she','they','them','their','we','our','of','in','on','at','to','for','with','from','about','into','out','up','down','over','under','very','just','some','any','all','no','not','also','too','also','also','want','need','make','get','use','using','help','please','one','two','three','more','most','less','least','only','also','really','quite','well','where','when','why','how','what','who','which','here','there','also','also'
  ]);
  function pickKeyword(text) {
    if (!text) return '—';
    const words = text.toLowerCase().replace(/['"]/g, '').split(/[^a-z0-9-]+/).filter(w => w && w.length > 1 && !STOPWORDS.has(w));
    if (words.length === 0) {
      const first = text.trim().split(/\s+/)[0] || '—';
      return first.toLowerCase().replace(/[^\w-]/g, '').slice(0, 20) || '—';
    }
    const freq = {};
    words.forEach(w => { freq[w] = (freq[w] || 0) + 1; });
    words.sort((a, b) => {
      if (b.length !== a.length) return b.length - a.length;
      return freq[b] - freq[a];
    });
    return words[0].slice(0, 20);
  }

  const $ = (id) => document.getElementById(id);
  const els = {
    roleInput: $('roleInput'),
    taskInput: $('taskInput'),
    /* styleSel removed in v0.17 — Style bucket retired */
    refineBtn: $('refineBtn'),
    roastBtn: $('roastBtn'),
    clearBtn: $('clearBtn'),
    output: $('output'),
    outMeta: $('outMeta'),
    clarifyOutput: $('clarifyOutput'),
    clarifyMeta: $('clarifyMeta'),
    clarifyBlock: document.querySelector('.clarify-block'),
    copyBtn: $('copyBtn'),
    historyEmpty: $('historyEmpty'),
    historyList: $('historyList'),
    toast: $('toast'),
  };

  const HIST_KEY = 'prompt-optimizer-history-v1';

  // Each element entry: id, label, desc, default-on, required (always included), xml tag for output-scan
  const ELEMENTS = [
    { id: 'task',       label: 'Task',       desc: 'The exact thing Claude should do.',                            on: true,  required: true,  tag: 'task' },
    { id: 'role',       label: 'Role',       desc: 'A one-line "you are…" framing (only when it sharpens).',       on: true,  required: false, tag: 'role' },
    { id: 'context',    label: 'Context',    desc: 'Only the background that changes the answer.',                 on: true,  required: false, tag: 'context' },
    // constraints intentionally removed in v0.6.1 — keep prompts lean
    // output_format chip retired in v0.8.7 — replaced by the dedicated Format dropdown
    { id: 'examples',   label: 'Examples',   desc: 'One short worked example of the desired output.',              on: false, required: false, tag: 'example' },
    { id: 'reasoning',  label: 'Step-by-step', desc: 'Tell Claude to think privately before answering.',           on: false, required: false, tag: 'reasoning' },
  ];

  const state = {

  // ---- Local refinement (no network, no external LLM) ----
  // ---- Refiner core system prompt (v0.9.5 rewrite) ----
  // BASELINE. Extends marcipopsis's three-sentence contract (preserved verbatim
  // at the top) with concrete editorial rules and an explicit output shape so the
  // model returns a structured, paste-ready prompt instead of a one-line summary.
  const REFINER_SYSTEM_PROMPT = [
    "You are a prompt editor for Claude.",
    "Rewrite the user's prompt so it is clear, concise, and directly usable.",
    "Preserve the original intent.",
    "",
    "Hard rules — never break these:",

  // The synchronous "refinement" is still a deterministic template generator (instant
  // fallback). Pollinations is now layered on top: after the heuristic lands, we fetch
  // an LLM rewrite using REFINER_SYSTEM_PROMPT as the baseline system prompt and
  // replace the output with the LLM version when it returns successfully.
  // v0.18.5: 500-char cap enforcement removed entirely. fallbackRefine no longer
  // trims sections, cleanRewrite no longer truncates the LLM response, and the
  // outMeta header no longer displays "max 500 chars" or "N / 500 chars" text.
  // The const stays defined for historical reference (and in case a future ask
  // reintroduces it) but nothing reads it anymore.
  const OUTPUT_CHAR_CAP = 500; // unused since v0.18.5
  // Role copy is tuned for sloppy_ai's TTS pipeline — the answer will be SPOKEN ALOUD on
  // a livestream. Every guideline pushes toward plain prose that reads naturally out loud:
  // no markdown symbols (asterisks/hashes/brackets), no code fences, no em-dashes / ellipses,
  // short declarative sentences, contractions OK, no lists with marker characters.
  // v0.9.3 refactor: all guide strings rewritten with positive phrasing — say what to
  // DO, not what to avoid. Old "no markdown, no asterisks, no preamble" patterns become
  // "use plain prose, write short sentences, answer directly".
  const ROLE_BY_TONE = {
    neutral:   'You are a precise assistant. Answers are spoken aloud by a TTS voice — use plain prose, short sentences, and answer directly.',
    technical: 'You are a technical co-pilot. Answers are spoken aloud — pronounce numbers and acronyms in TTS-friendly form, use plain prose, keep sentences short.',
    creative:  'You are a creative writer for a livestream. Use rhythmic short sentences and concrete imagery the TTS voice can speak smoothly.',
    academic:  'You are a rigorous writer whose output is spoken aloud. Use brief, citation-grade phrasing translated into spoken-friendly sentences. Name authors inline.',
    terse:     'You are a TTS livestream editor. Keep only the necessary words. Use plain prose and short sentences.',
  };
  // Length guides are calibrated for spoken delivery: roughly 1 character per 15ms of TTS
  // speech, so 500 chars ≈ 8 seconds aloud. All entries use positive "do this" phrasing.
  // v0.9.10 — tightened to one-line directives; "open" added with no length cap.
  const LENGTH_GUIDE = {
    compact:  '≤150 chars · one short sentence · plain prose',
    standard: '≤350 chars · 2–3 short sentences · plain prose',
    thorough: '≤500 chars · short TTS-friendly sentences · plain prose',
    open:     'no length cap · plain prose · stay focused',
  };
  // Format hints — positive phrasing. Structured formats (table/list/json) also get
  // examples auto-injected via FORMAT_EXAMPLES below.
  const FORMAT_HINTS = {
    table: 'Output a markdown table with descriptive columns and a header row. Use `|` separators.',
    list:  'Output a tight markdown list — bullet or numbered as fits. One item per line.',
    json:  'Output a single valid JSON object (or array). Output JSON only.',
    essay: 'Use flowing essay prose — 2-3 short paragraphs, each with a topic sentence.',
    // App/UI design styles
    'ai-native':     'App design = AI-Native. Primary goal: efficiency. Visual vibe: fluid, predictive. Use generative UI patterns, contextual suggestions, single-input flows. Anticipate intent.',
    'dark-first':    'App design = Dark-First. Primary goal: comfort. Visual vibe: sleek, high-contrast. Use deep neutral backgrounds, restrained vivid accents, generous whitespace — tuned for long sessions.',
    'glassmorphism': 'UI style = Glassmorphism. Frosted-glass cards with backdrop-filter blur, semi-translucent surfaces, soft shadows, light borders, layered depth without heaviness.',
    'neumorphism':   'UI style = Neumorphism. Soft monochromatic surfaces with paired inner + outer shadows; tactile but low-contrast; consistent rounded geometry; single background hue.',
    'minimalist':    'UI style = Minimalist. Maximum whitespace, restrained 2-3 color palette with one accent, strict typographic hierarchy, no decoration, content first.',
    'material3':     'UI style = Material 3 (Google). Dynamic color tokens, elevated cards with shadow tiers, rounded corners, motion as feedback, WCAG-AA contrast throughout.',
    'skeuomorphism': 'UI style = Skeuomorphism. Realistic textures (leather, wood, paper, brushed metal) and lighting that mimic physical objects; tactile depth, gloss, inner highlights.',
    'cyberpunk':     'UI style = Cyberpunk. High-contrast neon (magenta + cyan + lime) on near-black, glitch accents, scanlines, monospace typography, terminal/CRT vibes, sharp angular geometry.',
    'swiss':         'UI style = Swiss / International Typographic. Strict grid alignment, Helvetica or Akzidenz, asymmetric balance, generous whitespace, photo-as-block, restrained palette.',
    'brutalist':     'UI style = Brutalist. Raw HTML aesthetics, system fonts, sharp borders, no rounded corners, exposed structure, intentionally unpolished, high information density.',
    '8bit':          'UI style = 8-Bit pixel art. Limited NES/Game Boy era palette, blocky pixel borders, sprite-friendly geometry, no anti-aliasing, image-rendering: pixelated.',
    'claymorphism':  'UI style = Claymorphism. Soft rounded 3D clay surfaces with stacked soft shadows for depth, pastel palette, playful and warm, slight inner highlight on each shape.',
  };
  // 1-3 examples per structured-output format, auto-injected when the format is picked.
  const FORMAT_EXAMPLES = {
    table: '| Column A | Column B |\n| --- | --- |\n| value 1 | value 2 |\n| value 3 | value 4 |',
    list:  '- first item\n- second item\n- third item',
    json:  '{"name": "example", "count": 3, "tags": ["alpha", "beta"]}',
  };
  // Audience detection — looks for explicit audience cues in the task. Returns null
  // when the task doesn't name an audience, so callers can fall back to "general".
  function inferAudience(task) {
    const t = task.toLowerCase();
    const m = t.match(/\bfor\s+(a\s+|an\s+|the\s+)?([a-z][a-z\- ]{2,40}?)(?=[.,;?!]|$|\s+(?:who|that|which|in|about|on|with))/);
    if (m && m[2]) {
      const cand = m[2].trim().replace(/\s+/g, ' ');
      if (cand.length >= 3 && cand.length <= 40 && !/^(it|me|you|us|them|now|the|this|that)$/i.test(cand)) return cand;
    }
    if (/\b(kids?|child|children|teenagers?|teens?)\b/.test(t)) return 'children';
    if (/\b(5[\- ]?year[\- ]?old|6[\- ]?year[\- ]?old|young child)\b/.test(t)) return 'a young child';
    if (/\b(beginners?|newbies?|first-?timers?)\b/.test(t)) return 'beginners';
    if (/\b(experts?|professionals?|specialists?)\b/.test(t)) return 'experts';
    if (/\b(developers?|engineers?|programmers?|coders?)\b/.test(t)) return 'developers';
    if (/\b(students?|learners?)\b/.test(t)) return 'students';
    return null;
  }
  // ---- Marcipopsis goal-intent-entity analysis + four-step XML output structure ----
  // For every clear task, the refined prompt emits four ordered sections (markdown):
  //   **Task**     goal / intent / entity extraction (was "analyze" pre-v0.8.5)
  //   **Plan**     4 ordered imperative steps Claude takes before drafting
  //   **Execute**  tone + length constraints, expressed terse
  //   **Verify**   self-check after drafting
  // For ambiguous tasks, the engine emits <clarifying_questions> INSTEAD (no point
  // analyzing a task too vague to act on).
  const STOP = new Set(['a','an','the','of','to','in','on','at','for','with','about','that','this','those','these','my','your','our','their','as','is','are','be','been','it','its','please','some','any','all']);
  function isAmbiguousTask(task) {
    const t = task.toLowerCase().trim();
    if (t.length < 25) return true;
    if (t.split(/\s+/).length < 4) return true;
    if (/^(help me|do something|something|can you|please|hey)\b[^.!?]{0,30}[?.!]?\s*$/.test(t)) return true;
    if (/^(thing|stuff|whatever)\b/.test(t)) return true;
    if (/^(how|what|why|when|where)\b[^.!?]{0,18}[?.!]?\s*$/.test(t)) return true;
    return false;
  }
  // v0.9.7: task-specific heuristic questions. Detects the verb via the same
  // intent extractor used elsewhere and emits questions tailored to that verb,
  // weaving in the task's entity when it adds value. Falls back to entity-aware
  // generics when the verb is unknown.
  function clarifyingQuestionsFor(task) {
    if (!task || !task.trim()) return [];
    const gie = extractGoalIntentEntity(task);
    const verb = (gie.intent && gie.intent !== 'respond to') ? gie.intent : null;
    const entity = (gie.entity || '').replace(/[…\.]+$/, '').trim();
    const ent = entity.length > 50 ? entity.slice(0, 47) + '…' : entity;
    const qBank = {
      write:     [`- What length and form should the response take?`, `- What tone or voice fits ${ent || 'this'}?`, `- What single image or feeling should anchor it?`],
      draft:     [`- What length and form should the response take?`, `- What tone or voice fits ${ent || 'this'}?`, `- What single image or feeling should anchor it?`],
      compose:   [`- What length and form should the response take?`, `- What tone or voice fits ${ent || 'this'}?`, `- What single image or feeling should anchor it?`],
      explain:   [`- How much background does the reader have on ${ent || 'this topic'}?`, `- What concrete example would make it click?`, `- Overview, deep dive, or step-by-step?`],
      describe:  [`- How much background does the reader have on ${ent || 'this topic'}?`, `- What concrete example would make it click?`, `- Overview, deep dive, or step-by-step?`],
      teach:     [`- What does the learner already know about ${ent || 'this'}?`, `- What's the one thing they should walk away knowing?`, `- Worked example, analogy, or definition first?`],
      summarize: [`- Target length — sentence, paragraph, or page?`, `- Which key points must survive the cut?`, `- Who is reading the summary?`],
      condense:  [`- Target length — sentence, paragraph, or page?`, `- Which key points must survive the cut?`, `- Who is reading the summary?`],
      build:     [`- What does "done" look like for ${ent || 'this'}?`, `- What constraints are non-negotiable (stack, time, scope)?`, `- Any references or examples to match?`],
      create:    [`- What does "done" look like for ${ent || 'this'}?`, `- What constraints are non-negotiable (stack, time, scope)?`, `- Any references or examples to match?`],
      design:    [`- What does success look like for ${ent || 'this'}?`, `- What constraints are non-negotiable (stack, time, scope)?`, `- Any references or examples to match?`],
      generate:  [`- What does success look like for ${ent || 'this'}?`, `- How many to produce?`, `- Any references or examples to match?`],
      implement: [`- What language and framework?`, `- Where does it run — browser, server, CLI?`, `- Inputs and outputs?`],
      code:      [`- What language and framework?`, `- Where does it run — browser, server, CLI?`, `- Inputs and outputs?`],
      debug:     [`- What's the exact symptom — error, wrong output, slow?`, `- What have you already tried?`, `- What's the expected vs. actual behavior?`],
      fix:       [`- What's the exact symptom — error, wrong output, slow?`, `- What have you already tried?`, `- What's the expected vs. actual behavior?`],
      compare:   [`- On which dimensions should the comparison focus?`, `- What decision is this informing?`, `- Are you leaning toward one option already?`],
      contrast:  [`- On which dimensions should the contrast focus?`, `- What decision is this informing?`, `- Are you leaning toward one option already?`],
      translate: [`- Source and target language?`, `- Formal or colloquial register?`, `- Any terms that shouldn't be translated?`],
      list:      [`- How many items — a target number or comprehensive?`, `- What ordering — chronological, by importance, alphabetical?`, `- Any items to explicitly exclude?`],
      enumerate: [`- How many items — a target number or comprehensive?`, `- What ordering — chronological, by importance, alphabetical?`, `- Any items to explicitly exclude?`],
      plan:      [`- What's the end goal of the plan?`, `- Time horizon — days, weeks, quarters?`, `- What constraints (resources, scope, dependencies)?`],
      outline:   [`- What's the end deliverable the outline serves?`, `- How deep — section headings only, or sub-bullets?`, `- Any required sections to include?`],
      review:    [`- Reviewing for quality, correctness, or persuasiveness?`, `- What would make this pass or fail?`, `- Who reads the review?`],
      critique:  [`- Critiquing for quality, correctness, or persuasiveness?`, `- What would make this pass or fail?`, `- Who reads the critique?`],
      evaluate:  [`- Evaluating against what criteria?`, `- What's the decision this evaluation supports?`, `- Required output — score, narrative, recommendation?`],
      assess:    [`- Assessing against what criteria?`, `- What's the decision this assessment supports?`, `- Required output — score, narrative, recommendation?`],
      analyze:   [`- What angle of analysis — causal, comparative, structural?`, `- What patterns or signals are you looking for?`, `- What's the analysis used for?`],
      pick:      [`- What's the selection criteria?`, `- How many to pick?`, `- Are there candidates already on the shortlist?`],
      rank:      [`- Rank by what dimension?`, `- How many to include?`, `- Ties broken how?`],
      sort:      [`- Sort by what dimension?`, `- Ascending or descending?`, `- Ties broken how?`],
      classify:  [`- What categories to sort into?`, `- Mutually exclusive or multi-label?`, `- How to handle ambiguous cases?`],
      name:      [`- Style — playful, technical, evocative?`, `- Any words to avoid?`, `- How many candidates?`],
    };
    if (verb && qBank[verb]) return qBank[verb].slice(0, 3);
    // unknown verb: entity-aware generics
    return [
      ent ? `- Who is the audience for "${ent}"?` : '- Who is the audience for this?',
      ent ? `- What does a good answer about "${ent}" concretely look like?` : '- What does a good answer concretely look like?',
      '- Any facts, sources, or constraints to include or avoid?',
    ].slice(0, 3);
  }

  // Goal / intent / entity extraction — pure heuristics, no LLM.
  //   intent = the action verb (write, explain, debug, compare, …)
  //   entity = the noun phrase the action operates on (extracted after the verb)
  //   goal   = a one-line outcome statement combining the two
  function extractGoalIntentEntity(task) {
    const trimmed = task.trim().replace(/\s+/g, ' ');
    const lower = trimmed.toLowerCase();
    const VERB_RE = /\b(write|draft|compose|explain|describe|summari[sz]e|condense|compare|contrast|debug|fix|translate|code|implement|build|design|create|generate|analy[sz]e|review|critique|evaluate|assess|plan|outline|teach|tell|name|list|enumerate|pick|rank|sort|classify)\b/;
    const m = lower.match(VERB_RE);
    let intent, entity;
    if (m) {
      intent = m[0];
      // entity = words following the verb, stripped of stopwords + truncated to ~8 meaningful tokens
      const after = trimmed.slice(m.index + intent.length).trim().replace(/[.?!]+$/, '');
      const words = after.split(/\s+/);
      const meaningful = words.filter((w, i) => i < 12).join(' ');
      entity = meaningful || 'subject named in the task';
      if (entity.length > 80) entity = entity.slice(0, 77).replace(/\s+\S*$/, '') + '…';
    } else {
      // fallback: no recognizable verb, treat whole task as entity
      intent = 'respond to';
      entity = trimmed.slice(0, 80) + (trimmed.length > 80 ? '…' : '');
    }
    const goal = `produce a focused ${intent === 'respond to' ? 'response' : intent + ' result'} for the user's task`;
    return { goal, intent, entity };
  }

  // Strip leading polite/conditional phrases without otherwise modifying the task.
  // Used to clean the Intent line in the refined output so it reads as a directive
  // ("write a haiku…") rather than a request ("please can you write a haiku…").
  const POLITE_LEADERS_RE = /^(please\s+|can you\s+|could you\s+|would you\s+|i want to\s+|i need to\s+|i'?d like to\s+|hey,?\s+|hi,?\s+)+/i;
  function stripPoliteLeader(task) {
    if (!task) return '';
    return task.trim().replace(POLITE_LEADERS_RE, '');
  }

  // Collapse the raw task to a <=10-word summary. Strips common polite leaders
  // ("please", "can you", "i want to", ...) then takes the first 10 words.
  // Appends an ellipsis if the original had more than 10 words.
  function summarizeTo10Words(task) {
    if (!task) return '';
    let t = task.trim();
    t = t.replace(/^(please\s+|can you\s+|could you\s+|would you\s+|i want to\s+|i need to\s+|i'?d like to\s+|hey,?\s+|hi,?\s+)+/i, '');
    const words = t.split(/\s+/).filter(Boolean);
    let out = words.slice(0, 10).join(' ');
    out = out.replace(/[.,;:!?…]+$/, '');
    if (words.length > 10) out += '…';
    return out;
  }

  // Four ordered bodies for the marcipopsis structure. Returned by section id so
  // buildSections can wrap each in its own markdown header.
  // v0.9.1: Task body is now a <=10-word summary of the user input. Plan checkboxes
  // are derived strictly from that summary so every step is anchored to the ask.
  function fourStepBodies(task, tone, lenGuide) {
    const summary = summarizeTo10Words(task);
    const shortGuide = lenGuide.split('.')[0].trim();
    const ask = summary || task;
    return {
      analyze: summary || task,
      plan: [
        '- [ ] Confirm the ask: ' + ask,
        '- [ ] List the entities the ask covers',
        '- [ ] Draft a response that hits each entity in the ask',
        '- [ ] Cut anything outside the ask',
      ].join('\n'),
      execute: tone + ' tone. ' + shortGuide + '. No preamble, no meta-commentary.',
      verify: 'Reread the ask. Does the output deliver on it? If not, fix before responding.',
    };
  }

  // v0.9.10 refactor — synthesized output. 10 input frames feed a tight prompt with
  // one-line section bodies wherever possible. The 500-char output cap is GONE (per
  // chat: "strictly remove the 500"); the output is bounded only by the input
  // lengths (input maxlengths still apply). Audience is read from frame 6 (user
  // override), falling back to the heuristic inferAudience or "general".
  // v0.11 — stripped to Role + Task + Style. No constraints, no audience, no
  // length, no context, no acceptance criteria, no references, no reasoning,
  // no UI/UX style. Just the three.
  function buildSections() {
    // v0.17: Style bucket removed entirely. Only Role + Task survive (plus the
    // optional hidden reasoning section).
    const roleText = els.roleInput.value.trim();
    const taskText = els.taskInput.value.trim();
    const titleCase = (s) => s.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
    const wrap = (tag, body) => `**${titleCase(tag)}**\n${body}`;

    const out = [];
    if (roleText) out.push({ id: 'role', text: wrap('role', roleText) });
    out.push({ id: 'task', text: wrap('task', stripPoliteLeader(taskText)) });
    // Hidden reasoning toggle (the dot in "prompt·optimizer"). When ON, append
    // a Reasoning section telling Claude to think step-by-step privately.
    if (state.reasoning) {
      out.push({ id: 'reasoning', text: wrap('reasoning', 'Think step-by-step privately before answering. Output only the final answer — no scratch work, no preamble.') });
    }
    return out;
  }

  // Task is load-bearing. Style drops first, then Role under length pressure.
  // Reasoning drops first of all (lowest priority — it's an augment).
  const DROP_ORDER = ['reasoning', 'role'];
  // v0.18.5: 500-char cap enforcement removed. fallbackRefine now just joins
  // sections and returns. DROP_ORDER kept defined (no longer consulted) in
  // case a future ask reintroduces a budget. `_lastDropped` always empty.
  function fallbackRefine() {
    const sections = buildSections();
    const joined = sections.map(x => x.text).join('\n\n');
    fallbackRefine._lastDropped = [];
    return joined;
  }

  function refine() {
    const task = els.taskInput.value.trim();
    if (!task) { showToast('task is required', 'warn'); els.taskInput.focus(); return; }
    // 1. Heuristic refine — instant, always available offline.
    const out = fallbackRefine();
    state.lastOutput = out;
    els.output.classList.remove('idle');
    renderOutput(out);
    populateClarifyPanel(task);
    syncElementsToOutput(out);
    els.copyBtn.disabled = false;
    els.outMeta.textContent = out.length + ' chars · ai polishing…';
    if ((fallbackRefine._lastDropped || []).length) {
      showToast('trimmed ' + fallbackRefine._lastDropped.length + ' section(s) for 500 cap');
    }
    pushHistory(task, out);
    // 2. Async LLM rewrite using the locked REFINER_SYSTEM_PROMPT baseline. Replaces
    // the heuristic output when it lands successfully; otherwise the heuristic stays.
    runLLMRewrite(task, out);
  }

  // Run the LLM rewrite over the HEURISTIC OUTPUT (not the raw task). The heuristic
  // already assembled the structured Role/Intent/Constraints/Format/Examples/Context
  // sections — the LLM's job is to polish that into a cleaner paste-ready prompt
  // while preserving the section structure. Token-protected against stale responses;
  // falls back silently to the heuristic on any failure.
  // Breadcrumbs are logged to console under the [refiner] tag for debugging.
  async function runLLMRewrite(task, heuristicOut) {
    const token = ++state.refineToken;
    console.log('[refiner] start · token=' + token + ' · heuristic=' + heuristicOut.length + ' chars');
    try {
      const t0 = performance.now();
      const llm = await fetchRefinedViaLLM(heuristicOut);
      const dt = Math.round(performance.now() - t0);
      console.log('[refiner] response · ' + dt + 'ms · raw=' + (llm || '').length + ' chars');
      if (token !== state.refineToken) {
        console.log('[refiner] stale token, dropping');
        return;
      }
      const cleaned = cleanRewrite(llm);
      console.log('[refiner] cleaned=' + cleaned.length + ' chars');
      if (!cleaned || cleaned.length < 16) {
        console.warn('[refiner] empty/tiny response · kept heuristic');
        els.outMeta.textContent = heuristicOut.length + ' chars · ai returned empty (kept heuristic)';
        return;
      }
      // Sanity guard: accept any structured output — bold headers, ATX headings, or
      // multi-line content with bullet markers. Reject only true one-liner summaries.
      const hasStructure = hasMarkdownStructure(cleaned);
      console.log('[refiner] structure check · pass=' + hasStructure);
      if (!hasStructure) {
        console.warn('[refiner] no markdown structure detected · kept heuristic');
        console.warn('[refiner] raw cleaned response was:\n' + cleaned);
        els.outMeta.textContent = heuristicOut.length + ' chars · ai dropped structure (kept heuristic)';
        return;
      }
      state.lastOutput = cleaned;
      els.output.value = cleaned;
      els.outMeta.textContent = cleaned.length + ' chars · ai-refined';
      showToast('ai-refined · ' + cleaned.length + ' chars');
      console.log('[refiner] applied LLM output');
    } catch (e) {
      if (token !== state.refineToken) return;
      console.warn('[refiner] error · ' + (e && e.message ? e.message : e));
      // v0.19: on LLM failure, keep the meta line short (char count + terse
      // status) and surface the user-facing "Claude busy" message inside the
      // Areas for Improvement panel on the left. The heuristic output is
      // already in the textarea — the panel switch makes it clear why no LLM
      // polish landed.
      els.outMeta.textContent = heuristicOut.length + ' chars · offline';
      if (els.clarifyOutput) {
        els.clarifyOutput.classList.remove('idle');
        els.clarifyOutput.value = 'Claude is busy — please try the bland Optimize button.';
      }
      if (els.clarifyMeta) {
        els.clarifyMeta.textContent = 'claude busy';
      }
      if (els.clarifyBlock) {
        els.clarifyBlock.classList.add('alert');
      }
    }
  }
  // Structure check: accept the response if it has ANY of:
  //   - **bold** spans (the format we ask for)
  //   - ATX headings (`# ...`, `## ...`, `### ...`) at line start
  //   - a multi-line response of reasonable length with bullet/numbered list markers
  // Reject only when the model gave a true bare one-liner.
  function hasMarkdownStructure(text) {
    if (!text) return false;
    if (/\*\*[^*\n]+\*\*/.test(text)) return true;
    if (/(^|\n)#{1,4}\s+\S/.test(text)) return true;
    if (text.includes('\n') && text.length >= 40 && /(^|\n)\s*[-*•]\s+\S/.test(text)) return true;
    return false;
  }

  // Pollinations GET refiner — prepends REFINER_SYSTEM_PROMPT to the heuristic
  // output and asks for a polished rewrite. Returns plain text. 14s timeout.
  async function fetchRefinedViaLLM(structuredPrompt) {
    const fullPrompt = REFINER_SYSTEM_PROMPT +
      "\n\n---\nPrompt to refine:\n" + structuredPrompt +
      "\n---\nRefined prompt:";
    const url = 'https://text.pollinations.ai/' + encodeURIComponent(fullPrompt);
    const ctrl = new AbortController();
    const tid = setTimeout(() => ctrl.abort(), 14000);
    try {
      const r = await fetch(url, { signal: ctrl.signal, headers: { 'Accept': 'text/plain' } });
      clearTimeout(tid);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const text = await r.text();
      if (/legacy api|deprecation_notice|Model not found/i.test(text) && text.length < 500) {
        throw new Error('legacy api banner');
      }
      return text;
    } finally {
      clearTimeout(tid);
    }
  }
  function cleanRewrite(raw) {
    if (!raw) return '';
    let t = String(raw).trim();
    // strip wrapping code fence if the model added one around the whole response
    t = t.replace(/^```[a-zA-Z]*\n?/, '').replace(/\n?```$/, '');
    // drop preamble
    t = t.replace(/^(sure[!,.\s]+|okay[!,.\s]+|here(?:'s| are)?[^\n]{0,80}:?\s*\n+)/i, '');
    t = t.replace(/^(rewritten prompt|refined prompt|prompt)\s*:\s*\n*/i, '');
    // drop the trailing "---" separator if the model echoed it
    t = t.replace(/\n*---\s*$/, '');
    // v0.17.6: dedupe + filter sections. The LLM occasionally splits Role into
    // multiple **Role** blocks or invents extra section headers (Style, Persona,
    // Context, etc.) despite the system prompt's "exactly two sections" rule.
    // Walk every **Header** block, group by header (case-insensitive), keep only
    // Role + Task, and emit each header exactly once with concatenated bodies.
    t = collapseSections(t);
    // v0.18.5: 500-char cap truncation removed. LLM response passes through full-length.
    return t.trim();
  }
  // v0.17.6: parse the markdown response into **Header**\nbody pairs, drop any
  // headers that aren't Role/Task, and merge duplicate headers' bodies. If no
  // **Header** pattern is found at all (model returned a bare paragraph), pass
  // the response through untouched.
  function collapseSections(text) {
    const re = /\*\*\s*([A-Za-z][A-Za-z\s_/-]*?)\s*\*\*[ \t]*\n?([\s\S]*?)(?=\n\*\*|\s*$)/g;
    const groups = new Map();   // canonicalName → array of body strings
    const order  = [];           // insertion-order canonical names
    let m, found = 0;
    while ((m = re.exec(text)) !== null) {
      found++;
      const raw = m[1].trim().toLowerCase().replace(/[\s/_-]+/g, '_');
      let canon = null;
      if (/^role(_persona)?$/.test(raw) || raw === 'persona' || raw === 'owner' || raw === 'author') canon = 'Role';
      else if (raw === 'task' || raw === 'intent' || raw === 'deliverable' || raw === 'goal') canon = 'Task';
      else continue; // drop foreign sections entirely
      const body = m[2].trim();
      if (!groups.has(canon)) { groups.set(canon, []); order.push(canon); }
      if (body) groups.get(canon).push(body);
    }
    if (!found) return text;
    // Emit kept sections in input order, one **Header**\nbody block each.
    return order.map(name => '**' + name + '**\n' + groups.get(name).join('\n')).join('\n\n');
  }

  // Populate the left-side AI Critique panel based on the current task.
  // v0.9.2: panel is now AI Critique (Pollinations GET) with the heuristic questions
  // as an instant fallback while the model loads. If the fetch fails or times out,
  // the heuristic stays on screen and the meta line flags 'ai unavailable'.
  async function populateClarifyPanel(task) {
    const t = (task || '').trim();
    if (!t) {
      els.clarifyOutput.value = '';
      els.clarifyOutput.classList.add('idle');
      els.clarifyMeta.textContent = 'tap Refine to surface areas for improvement';
      els.clarifyBlock.classList.remove('alert');
      return;
    }
    const ambiguous = isAmbiguousTask(t);
    const qs = clarifyingQuestionsFor(t);
    els.clarifyOutput.classList.remove('idle');
    // Instant heuristic placeholder so the panel is never empty
    els.clarifyOutput.value = qs.length ? qs.join('\n') : 'task looks clear — fetching critique…';
    els.clarifyMeta.textContent = 'finding areas for improvement…';
    els.clarifyBlock.classList.toggle('alert', ambiguous);

    // Token to drop stale responses if the user refines again quickly
    const token = ++state.critiqueToken;
    // Cache to avoid re-firing on identical input
    const cached = state.critiqueCache[t];
    if (cached) {
      applyCritique(cached, token, qs.length, ambiguous);
      return;
    }
    try {
      const critique = await fetchCritique(t);
      if (token !== state.critiqueToken) return; // stale
      const cleaned = cleanCritique(critique);
      if (cleaned && cleaned.length >= 8) {
        state.critiqueCache[t] = cleaned;
        applyCritique(cleaned, token, qs.length, ambiguous);
      } else {
        // empty / unusable response — keep heuristic, note ai unavailable
        els.clarifyMeta.textContent = qs.length + ' question' + (qs.length === 1 ? '' : 's') + ' · ai returned empty';
      }
    } catch (e) {
      if (token !== state.critiqueToken) return;
      els.clarifyMeta.textContent = qs.length + ' question' + (qs.length === 1 ? '' : 's') + ' · ai unavailable';
    }
  }
  function applyCritique(text, token, qsCount, ambiguous) {
    if (token !== state.critiqueToken) return;
    els.clarifyOutput.value = text;
    const lineCount = text.split('\n').filter(l => l.trim()).length;
    els.clarifyMeta.textContent = lineCount + ' area' + (lineCount === 1 ? '' : 's') + ' for improvement' + (ambiguous ? ' · sharpen before refining' : '');
  }
  // Strip preamble, code fences, headers — keep only the bullet/short-line content.
  function cleanCritique(raw) {
    if (!raw) return '';
    let t = String(raw).trim();
    // strip code fences
    t = t.replace(/^```[a-zA-Z]*\n?/, '').replace(/\n?```$/, '');
    // collapse 3+ newlines
    t = t.replace(/\n{3,}/g, '\n\n');
    // drop leading "sure, here..." / "here are..." / "critique:" lines
    t = t.replace(/^(sure[!,.\s]+|okay[!,.\s]+|here(?:'s| are)?[^\n]{0,80}:?\s*\n)/i, '');
    t = t.replace(/^(critique|feedback|analysis)\s*:\s*\n/i, '');
    // cap length so a runaway response can't blow out the panel
    if (t.length > 700) t = t.slice(0, 697).replace(/\s+\S*$/, '') + '…';
    return t.trim();
  }
  // Pollinations GET endpoint — anonymous, default model, no referrer.
  // Returns plain text. 8s timeout. Throws on network/HTTP errors.
  async function fetchCritique(task) {
    const prompt = 'Critique this user-submitted prompt for clarity, specificity, and missing context. Output 2-4 short bullets only, each starting with "- ", one sentence, under 90 characters. No preamble, no headers, no closing remarks. Prompt to critique: ' + task;
    const url = 'https://text.pollinations.ai/' + encodeURIComponent(prompt);
    const ctrl = new AbortController();
    const tid = setTimeout(() => ctrl.abort(), 9000);
    try {
      const r = await fetch(url, { signal: ctrl.signal, headers: { 'Accept': 'text/plain' } });
      clearTimeout(tid);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const text = await r.text();
      // detect deprecation banner
      if (/legacy api|deprecation_notice|Model not found/i.test(text) && text.length < 500) {
        throw new Error('legacy api banner');
      }
      return text;
    } finally {
      clearTimeout(tid);
    }
  }

  // ---- Roast me — five sharp clarifying questions about the Task ----
  // A meaner, more pointed cousin of the AI Critique. Renders into the same
  // left panel but with a roast-flavored prompt and exactly five questions.
  async function fetchRoast(task) {
    const prompt = 'You are a senior reviewer roasting a vague task. Output EXACTLY 5 sharp clarifying questions that expose missing context, lazy phrasing, hidden assumptions, or undefined success criteria. Each question is one sentence under 100 characters, cutting but constructive, starting with a question word (What, Why, How, When, Where, Which, Who, Could, Have, Does, Did, Is, Are). Format: one question per line, each starting with "- ", no numbering. No preamble. No closing remarks. No softening. Task to roast: ' + task;
    const url = 'https://text.pollinations.ai/' + encodeURIComponent(prompt);
    const ctrl = new AbortController();
    const tid = setTimeout(() => ctrl.abort(), 14000);
    try {
      const r = await fetch(url, { signal: ctrl.signal, headers: { 'Accept': 'text/plain' } });
      clearTimeout(tid);
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const text = await r.text();
      if (/legacy api|deprecation_notice|Model not found/i.test(text) && text.length < 500) {
        throw new Error('legacy api banner');
      }
      return text;
    } finally {
      clearTimeout(tid);
    }
  }
  async function runRoast() {
    const t = (els.taskInput.value || '').trim();
    if (!t) {
      showToast('type a task first — nothing to roast yet', 'warn');
      els.taskInput.focus();
      return;
    }
    const token = ++state.critiqueToken;  // reuse same token so a refine can supersede a roast and vice-versa
    els.roastBtn.disabled = true;
    els.clarifyOutput.classList.remove('idle');
    els.clarifyOutput.value = '> firing up the roast…';
    els.clarifyMeta.textContent = 'roasting…';
    els.clarifyBlock.classList.add('alert');
    try {
      const raw = await fetchRoast(t);
      if (token !== state.critiqueToken) return;
      const cleaned = cleanCritique(raw);
      const lines = cleaned.split(/\r?\n/).map(s => s.trim()).filter(Boolean).slice(0, 6);
      if (!lines.length) {
        els.clarifyOutput.value = 'Claude returned no roast. try again.';
        els.clarifyMeta.textContent = 'roast unavailable';
        return;
      }
      els.clarifyOutput.value = lines.join('\n');
      els.clarifyMeta.textContent = lines.length + ' sharp question' + (lines.length === 1 ? '' : 's') + ' · roast mode';
    } catch (e) {
      if (token !== state.critiqueToken) return;
      els.clarifyOutput.value = 'Claude is busy — please try the bland Optimize button.';
      els.clarifyMeta.textContent = 'claude busy';
    } finally {
      els.roastBtn.disabled = false;
    }
  }

  // After every refine: read the actual output and flip the checklist on/off so
  // it mirrors which elements survived. Required items always stay on.
  // After every refine: read the output and flip the optional-element chips on/off
  // so the toolbar reflects what actually survived the 500-char trim. Looks for the
  // markdown bold header (`**Title**`) that wrap() emits.
  function syncElementsToOutput(output) {
    ['examples', 'reasoning'].forEach(id => {
      const label = id.replace(/_/g, ' ');
      const headerRe = new RegExp('\\*\\*' + label + '\\*\\*', 'i');
      setChipState(id, headerRe.test(output));
    });
  }

  function renderOutput(text) {
    // Textarea now — plain value, user-editable. Syntax highlighting retired in v0.8.6
    // because contenteditable + dynamic spans + paste/cursor handling is a tarpit.
    els.output.value = text;
    els.output.classList.remove('idle');
  }

  function pushHistory(raw, out) {
    state.history.unshift({
      raw: raw.slice(0, 200),
      out,
      keyword: pickKeyword(raw),    // captured at refinement time — stable across renders
      ts: Date.now(),
    });
    state.history = state.history.slice(0, 3);
    saveHistory();
    renderHistory();
    updateStoreStatus();
  }

  function renderHistory() {
    els.historyList.innerHTML = '';
    if (state.history.length === 0) {
      els.historyEmpty.style.display = '';
      return;
    }
    els.historyEmpty.style.display = 'none';
    state.history.forEach((h, idx) => {
      const row = document.createElement('div');
      row.className = 'hist-row';
      row.tabIndex = 0;
      row.setAttribute('role', 'button');
      row.setAttribute('aria-label', 'Load history entry: ' + h.raw.slice(0, 50));
      const keyword = h.keyword || pickKeyword(h.raw);    // fall back for older entries pre-cache
      const t = new Date(h.ts);
      const ts = t.toLocaleString(undefined, { hour: '2-digit', minute: '2-digit' });
      row.innerHTML = `<span class="summary">${escapeHtml(keyword)}</span><span class="ts">${ts}</span><button class="del" type="button" data-del="${idx}" aria-label="Delete ${escapeHtml(keyword)}">x</button>`;
      row.setAttribute('aria-label', 'Load entry: ' + h.raw.slice(0, 60));
      row.addEventListener('click', (e) => {
        if (e.target.matches('[data-del]')) return;
        els.taskInput.value = h.raw.slice(0, CHAR_LIMIT);
        updateCharCount();
        renderOutput(h.out);
        populateClarifyPanel(h.raw);
        scanOutputForElements(h.out);
        state.lastOutput = h.out;
        els.copyBtn.disabled = false;
        els.outMeta.textContent = h.out.length + ' chars';
        showToast('loaded');
      });
      row.querySelector('[data-del]').addEventListener('click', (e) => {
        e.stopPropagation();
        state.history.splice(idx, 1);
        saveHistory();
        renderHistory();
        updateStoreStatus();
      });
      els.historyList.appendChild(row);
    });
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[c]));
  }

  // ---- Copy ----
  // Manual edits in the output textarea sync to state.lastOutput so Copy picks them up
  els.output.addEventListener('input', () => {
    state.lastOutput = els.output.value;
    els.outMeta.textContent = els.output.value.length + ' chars';
    if (els.output.value.length > 0) els.copyBtn.disabled = false;
  });

  els.copyBtn.addEventListener('click', () => {
    if (!state.lastOutput) return;
    if (navigator.clipboard) {
      navigator.clipboard.writeText(state.lastOutput).then(
        () => showToast('copied'),
        () => showToast('copy failed', 'warn')
      );
    } else {
      const ta = document.createElement('textarea');
      ta.value = state.lastOutput;
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); showToast('copied'); } catch (e) { showToast('copy failed', 'warn'); }
      ta.remove();
    }
  });

  els.clearBtn.addEventListener('click', () => {
    els.roleInput.value = '';
    els.taskInput.value = '';
    els.output.value = '';
    els.output.classList.add('idle');
    populateClarifyPanel('');
    state.lastOutput = '';
    els.copyBtn.disabled = true;
    els.outMeta.textContent = '';
    updateCharCount();
    refreshBucketPreviews();
    els.taskInput.focus();
  });
  els.refineBtn.addEventListener('click', refine);
  if (els.roastBtn) els.roastBtn.addEventListener('click', runRoast);

  // Ctrl/Cmd + Enter to refine
  els.taskInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) { e.preventDefault(); refine(); }
  });
  // Ctrl/Cmd + Shift + K → roast (k for "kill it")
  window.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.shiftKey && (e.key === 'K' || e.key === 'k')) {
      e.preventDefault();
      runRoast();
    }
  });

  // ---- Hidden reasoning toggle (the middle dot of "prompt·optimizer") ----
  // Click the dot, or press Ctrl/Cmd + Shift + R, to toggle. State persists in
  // localStorage. When ON, buildSections appends a step-by-step reasoning
  // section to the refined output.
  function applyReasoningUI() {
    const btn = document.getElementById('reasoningToggle');
    if (!btn) return;
    btn.classList.toggle('on', state.reasoning);
    btn.setAttribute('aria-pressed', String(state.reasoning));
    btn.title = state.reasoning ? 'step-by-step reasoning: ON (click to disable)' : 'step-by-step reasoning: off';
  }
  function toggleReasoning() {
    state.reasoning = !state.reasoning;
    try { localStorage.setItem('po-reasoning-v1', state.reasoning ? '1' : '0'); } catch (e) {}
    applyReasoningUI();
    if (typeof showToast === 'function') {
      showToast(state.reasoning ? 'reasoning: ON · step-by-step' : 'reasoning: off');
    }
  }
  const rtBtn = document.getElementById('reasoningToggle');
  if (rtBtn) rtBtn.addEventListener('click', toggleReasoning);
  applyReasoningUI();
  // Global shortcut: Ctrl/Cmd + Shift + R toggles reasoning
  window.addEventListener('keydown', (e) => {
    if ((e.metaKey || e.ctrlKey) && e.shiftKey && (e.key === 'R' || e.key === 'r')) {
      e.preventDefault();
      toggleReasoning();
    }
  });

  // Boot
  renderHistory();
  updateStoreStatus();
})();
</script>
</body>
