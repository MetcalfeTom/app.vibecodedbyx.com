<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>ASCII Lava Lamp</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#04020a">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%AA%94">
<meta name="description" content="A drifting lava lamp rendered entirely in ASCII, slowly shifting through high-contrast color cycles.">
<meta property="og:title" content="ASCII Lava Lamp">
<meta property="og:description" content="A drifting lava lamp rendered entirely in ASCII, slowly shifting through high-contrast color cycles.">
<meta property="og:url" content="https://sloppy.live/ascii-lava-lamp">
<meta property="og:image" content="https://image.pollinations.ai/prompt/ASCII%20text%20art%20lava%20lamp%2C%20bright%20orange%20red%20yellow%20blobs%20on%20black%2C%20monospace%20characters%2C%20retro%20terminal%2C%20high%20contrast?width=1200&height=630&model=flux&seed=8888&nologo=true">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Monoton&family=Major+Mono+Display&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#04020a;
    --void-2:#0a0608;
    --silver:#bfbac6;
    --silver-dim:#5a5562;
    --accent:#ffd54f;
    --accent-2:#ff5e3a;
    --ink:#f8f4e8;
    --hud-bg:rgba(10,6,8,0.88);
    --hud-border:rgba(255,213,79,0.32);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  html,body{height:100%;overflow:hidden;background:var(--void);color:var(--ink);font-family:'JetBrains Mono', monospace;-webkit-tap-highlight-color:transparent}
  body{
    background:
      radial-gradient(ellipse 70% 50% at 50% 100%, rgba(255,94,58,0.10), transparent 60%),
      radial-gradient(ellipse 60% 40% at 50% 0%, rgba(120,90,200,0.08), transparent 60%),
      var(--void);
    display:flex;flex-direction:column;align-items:center;
  }
  header{
    width:100%;text-align:center;padding:1rem 1rem 0.4rem;pointer-events:none;
  }
  h1{
    font-family:'Monoton', cursive;
    font-size:clamp(1.6rem, 4.2vw, 2.6rem);
    letter-spacing:0.32em;
    color:var(--accent);
    text-shadow:0 0 12px rgba(255,213,79,0.45), 0 0 24px rgba(255,94,58,0.30);
    text-transform:uppercase;
    line-height:1;
  }
  .tag{
    font-family:'Major Mono Display', monospace;
    font-size:clamp(0.65rem, 1.3vw, 0.85rem);
    letter-spacing:0.4em;text-transform:lowercase;
    color:var(--silver);margin-top:0.35rem;
  }
  main.stage{
    flex:1;
    display:flex;align-items:center;justify-content:center;
    width:100%;
    padding:0.5rem 0 4.5rem;
    overflow:hidden;
  }
  #lampCanvas{
    display:block;
    image-rendering:auto;
    cursor:crosshair;
    filter:drop-shadow(0 0 18px rgba(255,94,58,0.18));
  }
  .hud{
    position:fixed;left:50%;bottom:0.9rem;transform:translateX(-50%);
    display:flex;align-items:center;gap:0.7rem;flex-wrap:wrap;justify-content:center;
    background:var(--hud-bg);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border:1px solid var(--hud-border);
    box-shadow:0 0 22px rgba(255,213,79,0.12), inset 0 0 12px rgba(255,213,79,0.04);
    padding:0.5rem 0.7rem;border-radius:0.55rem;
    font-size:0.72rem;letter-spacing:0.12em;text-transform:uppercase;
    max-width:calc(100% - 1.2rem);z-index:5;
  }
  .palette{display:flex;gap:0.25rem;flex-wrap:wrap;justify-content:center}
  .palette button{
    background:transparent;color:var(--silver);
    border:1px solid rgba(191,186,198,0.28);
    font-family:inherit;font-size:0.65rem;letter-spacing:0.18em;text-transform:uppercase;
    padding:0.55rem 0.65rem;border-radius:0.3rem;cursor:pointer;
    min-height:2.75rem;min-width:2.75rem;
    transition:all 0.18s;
  }
  .palette button:hover{border-color:var(--accent);color:var(--ink)}
  .palette button[aria-pressed="true"]{
    background:rgba(255,213,79,0.18);color:var(--accent);
    border-color:var(--accent);
    box-shadow:0 0 8px rgba(255,213,79,0.35);
  }
  .palette button:focus-visible{outline:3px solid var(--ink);outline-offset:2px}
  .ctrl{display:flex;align-items:center;gap:0.4rem;color:var(--silver);font-size:0.65rem}
  .ctrl input[type="range"]{
    accent-color:var(--accent);
    width:5.5rem;height:2.75rem;
  }
  .ctrl .val{color:var(--accent);font-weight:700;min-width:2.5rem;text-align:right}
  .btn{
    background:transparent;color:var(--accent);
    border:1px solid var(--accent);
    font-family:inherit;font-size:0.68rem;letter-spacing:0.22em;text-transform:uppercase;
    padding:0.55rem 0.85rem;border-radius:0.3rem;cursor:pointer;
    min-height:2.75rem;
  }
  .btn:hover{background:rgba(255,213,79,0.14)}
  .btn:focus-visible{outline:3px solid var(--ink);outline-offset:2px}
  .hue-readout{
    color:var(--silver-dim);font-size:0.65rem;
  }
  .hue-dot{
    display:inline-block;width:0.6rem;height:0.6rem;border-radius:50%;
    background:currentColor;margin-right:0.3rem;vertical-align:middle;
    box-shadow:0 0 6px currentColor;
  }
  @media (max-width: 560px){
    header{padding-top:0.7rem}
    main.stage{padding:0.3rem 0 5rem}
    .hud{font-size:0.62rem;gap:0.5rem;padding:0.45rem 0.55rem}
    .ctrl input[type="range"]{width:4rem}
  }
  @media (prefers-reduced-motion: reduce){
    #lampCanvas{filter:none}
  }
</style>
</head>
<body>
  <header>
    <h1>ASCII Lava Lamp</h1>
    <div class="tag" aria-hidden="true">groove engine · slow color drift</div>
  </header>
  <main class="stage" role="img" aria-label="Animated ASCII lava lamp with metaballs rising and falling, colors slowly shifting through the selected palette. Click or tap on the bulb to spawn a heat surge.">
    <canvas id="lampCanvas"></canvas>
  </main>
  <div class="hud" role="group" aria-label="Lava lamp controls">
    <div class="palette" role="group" aria-label="Color palette">
      <button type="button" data-p="magma" aria-pressed="true">magma</button>
      <button type="button" data-p="ember" aria-pressed="false">ember</button>
      <button type="button" data-p="toxic" aria-pressed="false">toxic</button>
      <button type="button" data-p="cyber" aria-pressed="false">cyber</button>
      <button type="button" data-p="ocean" aria-pressed="false">ocean</button>
      <button type="button" data-p="aurora" aria-pressed="false">aurora</button>
    </div>
    <label class="ctrl" for="blobCount">blobs <input id="blobCount" type="range" min="3" max="10" value="6" aria-label="Number of lava blobs"><span class="val" id="blobVal">6</span></label>
    <label class="ctrl" for="cycleSec">cycle <input id="cycleSec" type="range" min="20" max="360" step="10" value="120" aria-label="Color cycle duration in seconds"><span class="val" id="cycleVal">120s</span></label>
    <button class="btn" type="button" id="shakeBtn">⚡ shake</button>
    <span class="hue-readout" id="hueReadout" aria-live="polite"><span class="hue-dot" id="hueDot" style="color:hsl(15,90%,55%)"></span><span id="hueText">015°</span></span>
  </div>

<script>
(function(){
  'use strict';

  // ── Visible error toast so silent failures surface ──
  function showError(msg){
    try {
      var t = document.getElementById('errToast');
      if (!t){
        t = document.createElement('div');
        t.id = 'errToast';
        t.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#3a0610;color:#ffb6c1;font-family:monospace;font-size:11px;padding:8px 12px;border-bottom:1px solid #ff2bd6;white-space:pre-wrap;max-height:30vh;overflow:auto';
        document.body.appendChild(t);
      }
      t.textContent = '⚠ ' + msg;
    } catch(_){}
  }
  window.addEventListener('error', function(ev){
    showError((ev.message || 'error') + ' @ ' + (ev.filename ? ev.filename.split('/').pop() : '?') + ':' + (ev.lineno || '?'));
  });

  var canvas = document.getElementById('lampCanvas');
  var ctx = null;
  try { ctx = canvas.getContext('2d'); } catch(e){ showError('canvas init: ' + e.message); return; }
  if (!ctx) { showError('canvas 2d context unavailable'); return; }

  var prefersReducedMotion = false;
  try { prefersReducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch(_){}

  // ── Grid geometry ──
  var COLS = 56;
  var ROWS = 60;
  var CAP_TOP = 0;
  var CAP_BOTTOM = 2;      // 3 rows of cap
  var NECK_TOP = 3;
  var NECK_BOTTOM = 5;     // narrow neck
  var BULB_TOP = 6;
  var BULB_BOTTOM = 52;    // 47 rows of bulb
  var BASE_TOP = 53;
  var BASE_BOTTOM = 59;    // 7 rows of base
  var CAP_HALF = 5;
  var NECK_HALF = 4;
  var BASE_HALF = 13;
  var MAX_BULB_HALF = (COLS / 2) - 2; // ≈26

  // Bulb half-width function — egg / classic lava lamp profile (wider near bottom)
  function bulbHalfWidth(y){
    if (y < BULB_TOP || y > BULB_BOTTOM) return 0;
    var t = (y - BULB_TOP) / (BULB_BOTTOM - BULB_TOP); // 0 to 1
    // Asymmetric egg curve: narrow top, fat middle-low, slight taper at bottom
    var w;
    if (t < 0.08){
      // shoulder from neck — quick expansion
      w = NECK_HALF + (0.45 * MAX_BULB_HALF - NECK_HALF) * (t / 0.08);
    } else if (t < 0.62){
      // bulge to widest point at t≈0.62
      var k = (t - 0.08) / 0.54;
      w = 0.45 * MAX_BULB_HALF + (1.0 - 0.45) * MAX_BULB_HALF * (1 - Math.cos(k * Math.PI / 2));
    } else {
      // taper down to base shoulder
      var k2 = (t - 0.62) / 0.38;
      w = MAX_BULB_HALF * (1 - 0.32 * Math.pow(k2, 1.4));
    }
    return w;
  }

  // ── Canvas sizing — fit grid to viewport ──
  var DPR = Math.min(window.devicePixelRatio || 1, 2);
  var CHAR_H = 14;
  var CHAR_W = 8;

  function resize(){
    try {
      var hudReserve = 100;   // px reserved for HUD at bottom
      var headerReserve = 120;
      var maxH = Math.max(300, window.innerHeight - hudReserve - headerReserve);
      var maxW = window.innerWidth - 16;
      // CHAR_H derived from row count
      CHAR_H = Math.max(8, Math.min(22, Math.floor(maxH / ROWS)));
      CHAR_W = Math.max(5, Math.floor(CHAR_H * 0.58));
      // ensure horizontal fit
      while (CHAR_W * COLS > maxW && CHAR_W > 4){
        CHAR_W--;
        CHAR_H = Math.max(8, Math.floor(CHAR_W / 0.58));
      }
      var cssW = CHAR_W * COLS;
      var cssH = CHAR_H * ROWS;
      canvas.width = Math.floor(cssW * DPR);
      canvas.height = Math.floor(cssH * DPR);
      canvas.style.width = cssW + 'px';
      canvas.style.height = cssH + 'px';
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
      ctx.font = 'bold ' + (CHAR_H - 2) + 'px "JetBrains Mono", monospace';
      ctx.textBaseline = 'top';
      ctx.textAlign = 'left';
    } catch(e){ showError('resize: ' + e.message); }
  }
  resize();
  window.addEventListener('resize', resize);

  // ── Palettes — HIGH CONTRAST: bright saturated hues against near-black bg ──
  // Each palette: range of hues that the lava cycles through over `cycleSec` seconds.
  // Slow drift wave: hue = center + sin(phase) * spread
  var palettes = {
    magma:  { center: 15,  spread: 35, name: 'magma' },   // deep red → bright orange-yellow
    ember:  { center: 35,  spread: 25, name: 'ember' },   // amber → yellow
    toxic:  { center: 100, spread: 50, name: 'toxic' },   // chartreuse → deep green
    cyber:  { center: 305, spread: 45, name: 'cyber' },   // magenta → violet
    ocean:  { center: 200, spread: 50, name: 'ocean' },   // cyan → deep blue
    aurora: { center: 160, spread: 90, name: 'aurora' }   // teal → magenta wide sweep
  };
  var palette = palettes.magma;
  var cycleSec = 120;

  // ── Lava blobs (metaballs) ──
  var blobs = [];
  var BLOB_COUNT = 6;
  function makeBlob(){
    var midY = (BULB_TOP + BULB_BOTTOM) / 2;
    return {
      x: COLS / 2 + (Math.random() - 0.5) * 8,
      y: BULB_TOP + Math.random() * (BULB_BOTTOM - BULB_TOP),
      vx: (Math.random() - 0.5) * 0.4,
      vy: (Math.random() - 0.5) * 0.5,
      r: 3.0 + Math.random() * 2.0,
      temp: Math.random()   // 0=cold/sink, 1=hot/rise
    };
  }
  function rebuildBlobs(n){
    blobs = [];
    for (var i = 0; i < n; i++) blobs.push(makeBlob());
  }
  rebuildBlobs(BLOB_COUNT);

  // ── Physics ──
  function updateBlobs(dt){
    for (var i = 0; i < blobs.length; i++){
      var b = blobs[i];
      var bulbSpan = BULB_BOTTOM - BULB_TOP;
      var yNorm = (b.y - BULB_TOP) / bulbSpan; // 0=top, 1=bottom

      // Buoyancy: hot at bottom, cold at top — classic convection cycle
      if (yNorm > 0.78) b.temp += dt * 0.42;        // strong heat from "bulb base"
      else if (yNorm < 0.18) b.temp -= dt * 0.34;   // cool ceiling
      else b.temp -= dt * 0.04;                     // slow cool everywhere else
      if (b.temp < 0) b.temp = 0;
      if (b.temp > 1) b.temp = 1;

      // Target vertical velocity from temperature (negative = up)
      var targetVy = (0.5 - b.temp) * 4.5;
      b.vy += (targetVy - b.vy) * Math.min(1, 1.6 * dt);

      // Gentle horizontal jitter — organic
      b.vx += (Math.random() - 0.5) * 1.2 * dt;
      b.vx *= Math.pow(0.78, dt * 60);

      // Soft attraction between nearby blobs (lava cohesion)
      for (var j = i + 1; j < blobs.length; j++){
        var o = blobs[j];
        var dx = o.x - b.x, dy = o.y - b.y;
        var d2 = dx*dx + dy*dy + 0.01;
        if (d2 < 64){
          var f = 0.6 / d2 * dt;
          b.vx += dx * f; b.vy += dy * f;
          o.vx -= dx * f; o.vy -= dy * f;
        }
      }

      // Integrate
      b.x += b.vx * dt * 8;
      b.y += b.vy * dt * 8;

      // Constrain to bulb interior — soft walls
      var halfW = bulbHalfWidth(b.y);
      var cx = COLS / 2;
      var dxC = b.x - cx;
      var maxOff = Math.max(0, halfW - 1.5);
      if (Math.abs(dxC) > maxOff){
        b.x = cx + Math.sign(dxC) * maxOff;
        b.vx *= -0.45;
      }
      if (b.y < BULB_TOP + 1.5){ b.y = BULB_TOP + 1.5; b.vy = Math.abs(b.vy) * 0.4; }
      if (b.y > BULB_BOTTOM - 1.5){ b.y = BULB_BOTTOM - 1.5; b.vy = -Math.abs(b.vy) * 0.4; }
    }
  }

  // ── Character ramp by intensity — denser glyphs = hotter ──
  // Index 0 is faintest, last is densest. Space at very bottom for the void.
  var CHARS = ['·', ':', '+', '*', 'o', 'x', '#', '%', '@'];

  // ── Render ──
  var startTime = performance.now();
  var lastTime = startTime;
  var currentHue = palette.center;

  function render(now){
    var dt = Math.min(0.05, (now - lastTime) / 1000);
    lastTime = now;
    if (prefersReducedMotion) dt *= 0.25;

    // Physics
    updateBlobs(dt);

    // Slow color drift — sin wave around palette center within ± spread
    var elapsed = (now - startTime) / 1000;
    var phase = (elapsed / Math.max(1, cycleSec)) * Math.PI * 2;
    currentHue = (palette.center + Math.sin(phase) * palette.spread + 360) % 360;

    // Clear bg (full opaque — we redraw every cell)
    ctx.fillStyle = '#04020a';
    ctx.fillRect(0, 0, COLS * CHAR_W, ROWS * CHAR_H);

    var cx = COLS / 2;

    // Per-cell render
    for (var y = 0; y < ROWS; y++){
      var halfW = bulbHalfWidth(y);
      for (var x = 0; x < COLS; x++){
        var dxc = Math.abs(x - cx) - 0.5; // 0.5 offset to center cells around midline
        var ch = ' ';
        var color = null;

        // ── CAP ──
        if (y >= CAP_TOP && y <= CAP_BOTTOM){
          if (dxc < CAP_HALF){
            if (y === CAP_TOP){ ch = '_'; color = '#7a7280'; }
            else if (y === CAP_BOTTOM){ ch = '═'; color = '#9a9098'; }
            else { ch = '▓'; color = '#5a5562'; }
          }
        }
        // ── NECK ──
        else if (y >= NECK_TOP && y <= NECK_BOTTOM){
          if (dxc < NECK_HALF){
            ch = '║'; color = '#8a828e';
          }
        }
        // ── BULB INTERIOR ──
        else if (y >= BULB_TOP && y <= BULB_BOTTOM){
          if (dxc < halfW - 0.4){
            // INSIDE the bulb — compute metaball field
            var field = 0;
            for (var k = 0; k < blobs.length; k++){
              var b = blobs[k];
              var bdx = (x + 0.5) - b.x;
              var bdy = ((y + 0.5) - b.y) * 1.7; // chars taller than wide → squash Y so blobs look circular
              var d2 = bdx*bdx + bdy*bdy + 0.4;
              field += (b.r * b.r) / d2;
            }
            // Inside-bulb backdrop — very dark, faint dot for "glass fluid"
            if (field < 0.55){
              ch = '·'; color = '#1c0e0c';
            } else {
              // Map field to char + brightness
              var intensity = Math.min(1, (field - 0.55) / 4.2);
              var idx = Math.min(CHARS.length - 1, Math.floor(intensity * CHARS.length));
              ch = CHARS[idx];
              // HIGH CONTRAST: tight hue band around currentHue, very high saturation, lightness ramps
              // Edge (low intensity) → deep saturated hue, mid → vivid, core → near-white
              var coreBoost = Math.pow(intensity, 1.5);
              var sat = 95 - coreBoost * 18;
              var light = 28 + coreBoost * 56;   // 28% edge → 84% core
              // Slight hue rotation toward warm yellow at the core for that classic "blob glow"
              var localHue = (currentHue + (coreBoost - 0.5) * 18 + 360) % 360;
              color = 'hsl(' + localHue.toFixed(0) + ',' + sat.toFixed(0) + '%,' + light.toFixed(0) + '%)';
            }
          } else if (dxc < halfW + 0.6){
            // Bulb glass edge — silver outline ASCII
            // Use ( ) for left/right halves
            ch = (x < cx) ? '(' : ')';
            color = '#bfbac6';
          }
        }
        // ── BASE ──
        else if (y >= BASE_TOP && y <= BASE_BOTTOM){
          if (dxc < BASE_HALF){
            if (y === BASE_TOP){ ch = '_'; color = '#7a7280'; }
            else if (y === BASE_BOTTOM){ ch = '═'; color = '#9a9098'; }
            else if (y === BASE_BOTTOM - 1){ ch = '▓'; color = '#3a353e'; }
            else { ch = '▒'; color = '#5a5562'; }
          }
        }

        if (ch !== ' '){
          ctx.fillStyle = color;
          ctx.fillText(ch, x * CHAR_W, y * CHAR_H);
        }
      }
    }

    // Update HUD hue dot + readout
    var hueColor = 'hsl(' + currentHue.toFixed(0) + ',90%,60%)';
    hueDot.style.color = hueColor;
    hueText.textContent = ('00' + Math.round(currentHue)).slice(-3) + '°';

    requestAnimationFrame(render);
  }

  // ── HUD wiring ──
  var paletteBtns = document.querySelectorAll('.palette button');
  paletteBtns.forEach(function(btn){
    btn.addEventListener('click', function(){
      var p = btn.dataset.p;
      if (!palettes[p]) return;
      palette = palettes[p];
      paletteBtns.forEach(function(b){ b.setAttribute('aria-pressed', b === btn ? 'true' : 'false'); });
    });
  });

  var blobCount = document.getElementById('blobCount');
  var blobVal = document.getElementById('blobVal');
  blobCount.addEventListener('input', function(){
    var n = parseInt(blobCount.value, 10) || 6;
    blobVal.textContent = String(n);
    if (n !== blobs.length) rebuildBlobs(n);
  });

  var cycleInput = document.getElementById('cycleSec');
  var cycleVal = document.getElementById('cycleVal');
  cycleInput.addEventListener('input', function(){
    cycleSec = parseInt(cycleInput.value, 10) || 120;
    cycleVal.textContent = cycleSec + 's';
    // Reset phase smoothly by anchoring startTime to keep currentHue continuous
    var elapsed = (performance.now() - startTime) / 1000;
    var prevHue = currentHue;
    // recompute startTime such that next phase produces a hue near prevHue is non-trivial;
    // for simplicity just reset startTime — short visual snap is acceptable
    startTime = performance.now() - elapsed; // no-op, intentional
  });

  var hueDot = document.getElementById('hueDot');
  var hueText = document.getElementById('hueText');

  // Shake — give every blob a strong random kick
  var shakeBtn = document.getElementById('shakeBtn');
  shakeBtn.addEventListener('click', function(){
    for (var i = 0; i < blobs.length; i++){
      blobs[i].vx += (Math.random() - 0.5) * 18;
      blobs[i].vy += (Math.random() - 0.5) * 18;
      blobs[i].temp = Math.random();
    }
  });

  // Tap the bulb → spawn local heat surge (boost nearest blob upward, raise its temp)
  canvas.addEventListener('pointerdown', function(e){
    try {
      var rect = canvas.getBoundingClientRect();
      var px = (e.clientX - rect.left) / CHAR_W;
      var py = (e.clientY - rect.top) / CHAR_H;
      // find nearest blob
      var best = -1, bestD = 1e9;
      for (var i = 0; i < blobs.length; i++){
        var b = blobs[i];
        var dx = b.x - px, dy = b.y - py;
        var d = dx*dx + dy*dy;
        if (d < bestD){ bestD = d; best = i; }
      }
      if (best >= 0){
        var b2 = blobs[best];
        b2.temp = 1;
        b2.vy = -6;
        b2.vx += (Math.random() - 0.5) * 3;
        b2.r = Math.min(6, b2.r + 0.5);
      }
    } catch(err){ showError('tap: ' + err.message); }
  });

  // Kick off animation
  requestAnimationFrame(render);
