<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Neon Jet Fighter</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#070418">
<link rel="icon" href="https://emojicdn.elk.sh/%E2%9C%88%EF%B8%8F">
<meta name="description" content="A fast 2D side-scrolling jet shooter. Your jet shifts through the spectrum with every kill — chain enemies fast to ride the rainbow.">
<meta property="og:title" content="Neon Jet Fighter">
<meta property="og:description" content="A fast 2D side-scrolling jet shooter. Your jet shifts through the spectrum with every kill — chain enemies fast to ride the rainbow.">
<meta property="og:url" content="https://sloppy.live/neon-jet-fighter">
<meta property="og:image" content="https://image.pollinations.ai/prompt/neon%20synthwave%20fighter%20jet%20arcade%20game%20side%20scroller%2C%20glowing%20cyan%20magenta%20jet%20shooting%20enemies%2C%20chromatic%20trail%2C%20dark%20space?width=1200&height=630&model=flux&seed=7777&nologo=true">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Bowlby+One+SC&family=Major+Mono+Display&family=Share+Tech+Mono&family=Rubik+Mono+One&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#070418;
    --void-2:#15083a;
    --cyan:#5ce6ff;
    --magenta:#ff2bd6;
    --pink:#ff6ec0;
    --gold:#ffd454;
    --lime:#a5ff52;
    --violet:#9b5bff;
    --orange:#ff8a3a;
    --ink:#f4f0ff;
    --silver:#a3a8c2;
    --silver-dim:#5e637a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  html,body{height:100%;overflow:hidden;background:var(--void);color:var(--ink);font-family:'Share Tech Mono', monospace;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:none}
  body{
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(255,43,214,0.18), transparent 60%),
      radial-gradient(ellipse 70% 40% at 50% 100%, rgba(92,230,255,0.12), transparent 70%),
      var(--void);
    display:flex;flex-direction:column;align-items:center;
  }

  #game{position:fixed;inset:0;display:block;width:100%;height:100%;cursor:crosshair;background:#02011a}

  header{
    position:fixed;top:0.6rem;left:50%;transform:translateX(-50%);
    text-align:center;z-index:5;pointer-events:none;
  }
  h1{
    font-family:'Bowlby One SC', sans-serif;
    font-size:clamp(1.4rem, 3.2vw, 2.2rem);letter-spacing:0.06em;
    background:linear-gradient(180deg, var(--cyan), var(--magenta) 55%, var(--gold));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 12px rgba(255,43,214,0.4));line-height:1;text-transform:uppercase;
  }
  .tag{font-family:'Major Mono Display', monospace;font-size:clamp(0.55rem, 1vw, 0.7rem);letter-spacing:0.3em;color:var(--silver);margin-top:0.2rem;text-transform:lowercase}

  .hud-top{
    position:fixed;top:3.4rem;left:0.6rem;right:0.6rem;
    display:flex;justify-content:space-between;align-items:flex-start;gap:0.4rem;
    z-index:5;pointer-events:none;font-family:'Share Tech Mono', monospace;
  }
  .hud-top .card{
    background:rgba(7,4,24,0.86);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(92,230,255,0.32);
    padding:0.4rem 0.7rem;border-radius:0.35rem;
    display:flex;flex-direction:column;gap:0.15rem;
    box-shadow:0 0 12px rgba(92,230,255,0.16);
    min-width:5rem;text-align:center;
  }
  .hud-top .label{font-size:0.55rem;letter-spacing:0.22em;color:var(--silver);text-transform:uppercase}
  .hud-top .val{font-family:'Rubik Mono One', monospace;font-size:1.15rem;color:var(--cyan);letter-spacing:0.04em;line-height:1}
  .hud-top .card.kills .val{color:var(--lime)}
  .hud-top .card.score .val{color:var(--gold)}
  .hud-top .card.hue .val{font-family:'Audiowide', monospace;font-size:0.95rem}
  .hud-top .hue-swatch{
    display:inline-block;width:0.85rem;height:0.85rem;border-radius:50%;
    background:currentColor;margin-right:0.25rem;vertical-align:middle;
    box-shadow:0 0 8px currentColor;
  }
  .hp-row{display:flex;gap:0.18rem;align-items:center;margin-top:0.15rem}
  .pip{width:0.7rem;height:0.7rem;border-radius:0.14rem;background:#1a1d22;border:1px solid #353a44;box-shadow:inset 0 0 4px rgba(0,0,0,0.5)}
  .pip.full{background:linear-gradient(180deg, #ff5e6b, #b21f2f);border-color:#ff8a92;box-shadow:0 0 7px rgba(255,90,107,0.55), inset 0 0 4px rgba(255,255,255,0.2)}

  .hints{
    position:fixed;bottom:0.7rem;left:50%;transform:translateX(-50%);
    display:flex;gap:0.55rem;align-items:center;flex-wrap:wrap;justify-content:center;
    background:rgba(7,4,24,0.82);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(92,230,255,0.25);
    padding:0.4rem 0.7rem;border-radius:0.4rem;z-index:5;
    font-size:0.62rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--silver);
    max-width:calc(100% - 1rem);
  }
  .hints kbd{
    background:#161035;border:1px solid rgba(92,230,255,0.4);border-radius:0.2rem;
    color:var(--ink);padding:0.25rem 0.4rem;font-family:'Share Tech Mono', monospace;font-size:0.6rem;
    min-width:1.6rem;text-align:center;display:inline-block;
  }
  .hints button{
    background:transparent;color:var(--cyan);border:1px solid var(--cyan);
    font-family:inherit;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;
    padding:0.4rem 0.6rem;border-radius:0.2rem;cursor:pointer;min-height:2.5rem;
  }
  .hints button:hover{background:rgba(92,230,255,0.14)}
  .hints button:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}

  /* Mobile virtual stick + fire button */
  #touch{position:fixed;inset:0;pointer-events:none;z-index:4;display:none}
  #touch .pad{
    position:absolute;left:1rem;bottom:6rem;
    width:9rem;height:9rem;pointer-events:auto;
    background:rgba(7,4,24,0.55);border:1px solid rgba(92,230,255,0.4);border-radius:50%;
    backdrop-filter:blur(6px);
  }
  #touch .pad .stick{
    position:absolute;left:50%;top:50%;width:3rem;height:3rem;margin-left:-1.5rem;margin-top:-1.5rem;
    background:rgba(92,230,255,0.18);border:1px solid var(--cyan);border-radius:50%;
    box-shadow:0 0 12px rgba(92,230,255,0.25);
  }
  #touch .fire{
    position:absolute;right:1rem;bottom:6.5rem;width:5.5rem;height:5.5rem;
    background:rgba(255,43,214,0.20);border:2px solid var(--magenta);border-radius:50%;
    color:var(--magenta);font-family:'Audiowide', monospace;font-size:0.85rem;
    pointer-events:auto;cursor:pointer;
    box-shadow:0 0 18px rgba(255,43,214,0.45);
    display:flex;align-items:center;justify-content:center;letter-spacing:0.08em;
  }
  @media (pointer: coarse), (max-width: 720px){
    #touch{display:block}
  }

  /* Game over */
  .game-over{
    position:fixed;inset:0;display:none;align-items:center;justify-content:center;flex-direction:column;gap:1.2rem;
    background:radial-gradient(circle at center, rgba(255,43,214,0.18), rgba(0,0,0,0.92));
    backdrop-filter:blur(8px);text-align:center;padding:1.5rem;z-index:20;
  }
  .game-over.show{display:flex}
  .game-over h2{font-family:'Bowlby One SC', sans-serif;font-size:clamp(2rem, 5.5vw, 3.4rem);color:var(--magenta);text-shadow:0 0 22px rgba(255,43,214,0.7), 0 2px 8px rgba(0,0,0,0.6);letter-spacing:0.08em;text-transform:uppercase}
  .game-over p{font-family:'Share Tech Mono', monospace;font-size:1rem;color:var(--silver);letter-spacing:0.08em}
  .game-over button{
    margin-top:0.6rem;background:transparent;color:var(--cyan);
    border:2px solid var(--cyan);
    font-family:'Audiowide', monospace;font-size:0.95rem;letter-spacing:0.12em;text-transform:uppercase;
    padding:0.85rem 1.6rem;cursor:pointer;border-radius:0.4rem;min-height:2.75rem;
    box-shadow:0 0 18px rgba(92,230,255,0.35);
  }
  .game-over button:hover{background:rgba(92,230,255,0.14)}
  .game-over button:focus-visible{outline:3px solid var(--ink);outline-offset:3px}

  @media (max-width: 540px){
    .hud-top{top:2.6rem;gap:0.3rem}
    .hud-top .card{padding:0.3rem 0.5rem;min-width:3.6rem}
    .hud-top .val{font-size:0.9rem}
    .hud-top .card.hue .val{font-size:0.78rem}
  }
  @media (prefers-reduced-motion: reduce){
    .game-over.show{animation:none}
  }
</style>
</head>
<body>
  <canvas id="game" role="application" aria-label="A side-scrolling neon jet fighter. WASD or arrow keys to fly. Hold Space or click to fire. Each enemy killed shifts your jet's hue through the spectrum."></canvas>

  <header>
    <h1>NEON JET FIGHTER</h1>
    <div class="tag">shoot · chain · hue · survive</div>
  </header>

  <div class="hud-top">
    <div class="card">
      <div class="label">vitals</div>
      <div class="hp-row" id="hpRow"></div>
    </div>
    <div class="card hue">
      <div class="label"><span class="hue-swatch" id="hueDot" style="color:hsl(195,100%,60%)"></span>hue</div>
      <div class="val"><span id="hueVal">195°</span></div>
    </div>
    <div class="card kills"><div class="label">kills</div><div class="val"><span id="killsVal">0</span></div></div>
    <div class="card score"><div class="label">score</div><div class="val"><span id="scoreVal">0</span></div></div>
  </div>

  <div class="hints">
    <span><kbd>WASD</kbd> fly</span>
    <span><kbd>Space</kbd> fire</span>
    <span><kbd>M</kbd> mute</span>
    <button id="restartBtn" type="button" aria-label="Restart">↻ restart</button>
    <button id="muteBtn" type="button" aria-pressed="false" aria-label="Toggle sound">♪ on</button>
  </div>

  <div id="touch" aria-hidden="true">
    <div class="pad" id="dpad"><div class="stick" id="stick"></div></div>
    <button class="fire" id="fireBtn" type="button" aria-label="Fire">FIRE</button>
  </div>

  <div class="game-over" id="gameOver" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="goTitle">
    <h2 id="goTitle">WRECKED</h2>
    <p id="goStats">final score 0 · 0 kills · hue 195°</p>
    <button id="goRestart" type="button">⟳ Re-launch</button>
  </div>

<script>
(function(){
  'use strict';

  function showError(msg){
    try {
      var t = document.getElementById('errToast');
      if (!t){
        t = document.createElement('div');
        t.id = 'errToast';
        t.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#3a0610;color:#ffb6c1;font-family:monospace;font-size:11px;padding:8px 12px;border-bottom:1px solid #ff2bd6;white-space:pre-wrap';
        document.body.appendChild(t);
      }
      t.textContent = '⚠ ' + msg;
    } catch(_){}
  }
  window.addEventListener('error', function(ev){
    showError((ev.message || 'error') + ' @ ' + (ev.filename ? ev.filename.split('/').pop() : '?') + ':' + (ev.lineno || '?'));
  });

  var prefersReducedMotion = false;
  try { prefersReducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch(_){}

  var canvas = document.getElementById('game');
  var ctx;
  try { ctx = canvas.getContext('2d'); } catch(e){ showError('canvas init: ' + e.message); return; }
  if (!ctx){ showError('canvas 2d unavailable'); return; }

  var DPR = Math.min(window.devicePixelRatio || 1, 2);
  var W = 800, H = 500;
  function resize(){
    try {
      W = window.innerWidth;
      H = window.innerHeight;
      canvas.style.width = W + 'px';
      canvas.style.height = H + 'px';
      canvas.width = Math.floor(W * DPR);
      canvas.height = Math.floor(H * DPR);
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    } catch(e){ showError('resize: ' + e.message); }
  }
  resize();
  window.addEventListener('resize', resize);

  // ── State ──
  var state = {
    player: {
      x: 130, y: 250, vx: 0, vy: 0,
      r: 16,
      hue: 195,          // starts cyan, shifts +18° per kill (cycles every 20)
      hp: 5, maxHp: 5,
      iframes: 0,
      cooldown: 0,
      flashT: 0,
      thrustPhase: 0
    },
    bullets: [],         // player bullets
    enemies: [],
    enemyBullets: [],
    particles: [],
    floaters: [],
    stars: [],           // parallax bg
    score: 0,
    kills: 0,
    over: false,
    spawnT: 1.5,
    waveT: 0,
    difficulty: 0,
    shake: 0,
    chainTimer: 0,       // time since last kill — drives a fleeting "rainbow chain" bonus
    chainCount: 0
  };

  function resetGame(){
    state.player.x = 130; state.player.y = H / 2;
    state.player.vx = 0; state.player.vy = 0;
    state.player.hp = state.player.maxHp;
    state.player.hue = 195;
    state.player.iframes = 0;
    state.player.cooldown = 0;
    state.player.flashT = 0;
    state.bullets = [];
    state.enemies = [];
    state.enemyBullets = [];
    state.particles = [];
    state.floaters = [];
    state.score = 0;
    state.kills = 0;
    state.over = false;
    state.spawnT = 1.5;
    state.waveT = 0;
    state.difficulty = 0;
    state.chainTimer = 0;
    state.chainCount = 0;
    // Re-seed stars across the new viewport size
    state.stars = [];
    for (var i = 0; i < 140; i++){
      state.stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        z: 0.2 + Math.random() * 1.0,
        size: 1 + Math.random() * 1.4
      });
    }
    document.getElementById('gameOver').classList.remove('show');
    document.getElementById('gameOver').setAttribute('aria-hidden', 'true');
    refreshHUD();
  }

  // ── Audio ──
  var audioCtx = null, muted = false;
  function ensureAudio(){
    if (audioCtx){ if (audioCtx.state === 'suspended') audioCtx.resume(); return audioCtx; }
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(_){ audioCtx = null; }
    return audioCtx;
  }
  function tone(type, freq, dur, gain, slideTo, t0){
    var c = ensureAudio(); if (!c || muted) return;
    var o = c.createOscillator(); o.type = type;
    var t = t0 || c.currentTime;
    o.frequency.setValueAtTime(freq, t);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20, slideTo), t + dur);
    var g = c.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(gain, t + 0.006);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g).connect(c.destination);
    o.start(t); o.stop(t + dur + 0.02);
  }
  function noise(dur, freq, Q, gain){
    var c = ensureAudio(); if (!c || muted) return;
    var n = Math.floor(c.sampleRate * dur);
    var buf = c.createBuffer(1, n, c.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < n; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/n, 1.6);
    var s = c.createBufferSource(); s.buffer = buf;
    var bp = c.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = freq; bp.Q.value = Q;
    var g = c.createGain(); g.gain.value = gain;
    s.connect(bp).connect(g).connect(c.destination);
    s.start();
  }
  function sndShoot(){ tone('square', 720, 0.04, 0.06, 1100); }
  function sndKill(hue){ tone('triangle', 320 + (hue % 360) * 1.6, 0.18, 0.14, 80); noise(0.10, 1200, 1.4, 0.10); }
  function sndHit(){ tone('sawtooth', 200, 0.20, 0.20, 60); noise(0.16, 280, 0.8, 0.10); }
  function sndGameOver(){ [220, 174, 138, 110].forEach(function(f, i){ tone('sawtooth', f, 0.35, 0.18, null, ensureAudio() && audioCtx.currentTime + i * 0.12); }); noise(0.5, 220, 0.6, 0.12); }
  function sndHueShift(hue){ tone('triangle', 540 + (hue % 360) * 1.2, 0.08, 0.08, 880); }

  // ── Input ──
  var keys = {};
  var firing = false;
  var stick = { active: false, dx: 0, dy: 0 };
  window.addEventListener('keydown', function(e){
    if (e.target && e.target.tagName === 'INPUT') return;
    keys[e.code] = true;
    if (e.code === 'Space'){ e.preventDefault(); firing = true; ensureAudio(); }
    if (e.code === 'KeyM'){ muted = !muted; var b = document.getElementById('muteBtn'); b.textContent = muted ? '♪ off' : '♪ on'; b.setAttribute('aria-pressed', muted ? 'true' : 'false'); }
  });
  window.addEventListener('keyup', function(e){
    keys[e.code] = false;
    if (e.code === 'Space') firing = false;
  });
  // Mouse: click to fire
  canvas.addEventListener('pointerdown', function(e){
    if (e.button === 0 && !e.target.closest('button')){
      firing = true; ensureAudio();
    }
  });
  window.addEventListener('pointerup', function(){ firing = false; });
  // Touch joystick + fire
  (function bindTouch(){
    var pad = document.getElementById('dpad');
    var stickEl = document.getElementById('stick');
    var fire = document.getElementById('fireBtn');
    var center = null;
    function start(e){
      var t = e.changedTouches ? e.changedTouches[0] : e;
      var r = pad.getBoundingClientRect();
      center = { x: r.left + r.width/2, y: r.top + r.height/2, r: r.width/2 };
      stick.active = true;
      update(t.clientX, t.clientY);
      e.preventDefault();
    }
    function move(e){
      if (!stick.active) return;
      var t = e.changedTouches ? e.changedTouches[0] : e;
      update(t.clientX, t.clientY);
      e.preventDefault();
    }
    function end(e){
      stick.active = false; stick.dx = 0; stick.dy = 0;
      stickEl.style.transform = '';
      e.preventDefault();
    }
    function update(cx, cy){
      var dx = cx - center.x, dy = cy - center.y;
      var d = Math.hypot(dx, dy);
      var max = center.r - 18;
      if (d > max){ dx = dx/d*max; dy = dy/d*max; }
      stick.dx = dx / max; stick.dy = dy / max;
      stickEl.style.transform = 'translate(' + dx + 'px,' + dy + 'px)';
    }
    pad.addEventListener('touchstart', start);
    pad.addEventListener('touchmove', move);
    pad.addEventListener('touchend', end);
    pad.addEventListener('touchcancel', end);
    fire.addEventListener('pointerdown', function(e){ e.preventDefault(); firing = true; ensureAudio(); });
    fire.addEventListener('pointerup', function(){ firing = false; });
    fire.addEventListener('pointercancel', function(){ firing = false; });
  })();

  document.getElementById('restartBtn').addEventListener('click', resetGame);
  document.getElementById('goRestart').addEventListener('click', resetGame);
  document.getElementById('muteBtn').addEventListener('click', function(){
    muted = !muted;
    this.textContent = muted ? '♪ off' : '♪ on';
    this.setAttribute('aria-pressed', muted ? 'true' : 'false');
  });

  // ── Enemy types ──
  // Each enemy gets {type, x, y, vx, vy, r, hp, points, pattern, t}
  function spawnEnemy(){
    var roll = Math.random() + state.difficulty * 0.04;
    var type;
    if (roll < 0.55) type = 'grunt';
    else if (roll < 0.80) type = 'sine';
    else if (roll < 0.93) type = 'diver';
    else type = 'bomber';

    var y = 60 + Math.random() * (H - 120);
    var e = { type: type, x: W + 30, y: y, t: 0, fireT: 0 };
    if (type === 'grunt'){
      e.vx = -130 - state.difficulty * 6; e.vy = 0; e.r = 14; e.hp = 1; e.points = 100; e.hue = 0;
    } else if (type === 'sine'){
      e.vx = -110 - state.difficulty * 5; e.vy = 0; e.r = 14; e.hp = 1; e.points = 200; e.hue = 280; e.amp = 60 + Math.random() * 50; e.freq = 1.4 + Math.random() * 0.8; e.baseY = y;
    } else if (type === 'diver'){
      e.vx = -100 - state.difficulty * 4; e.vy = 0; e.r = 16; e.hp = 2; e.points = 350; e.hue = 50;
    } else { // bomber
      e.vx = -55 - state.difficulty * 2; e.vy = 0; e.r = 24; e.hp = 4; e.points = 700; e.hue = 320; e.fireT = 0.8 + Math.random() * 0.8;
    }
    state.enemies.push(e);
  }

  // ── HUD ──
  var hpRow = document.getElementById('hpRow');
  function refreshHUD(){
    if (hpRow.childElementCount !== state.player.maxHp){
      hpRow.innerHTML = '';
      for (var i = 0; i < state.player.maxHp; i++){
        var d = document.createElement('div'); d.className = 'pip'; hpRow.appendChild(d);
      }
    }
    for (var i = 0; i < state.player.maxHp; i++){
      hpRow.children[i].classList.toggle('full', i < state.player.hp);
    }
    document.getElementById('killsVal').textContent = state.kills;
    document.getElementById('scoreVal').textContent = state.score;
    document.getElementById('hueVal').textContent = Math.round(state.player.hue) + '°';
    document.getElementById('hueDot').style.color = 'hsl(' + state.player.hue + ', 100%, 60%)';
  }

  // ── Player damage ──
  function hurtPlayer(amount){
    if (state.player.iframes > 0 || state.over) return;
    state.player.hp -= amount;
    state.player.iframes = 1.0;
    state.player.flashT = 0.5;
    state.shake = Math.min(28, state.shake + 18);
    sndHit();
    refreshHUD();
    if (state.player.hp <= 0){
      state.player.hp = 0;
      gameOver();
    }
  }

  function gameOver(){
    state.over = true;
    sndGameOver();
    document.getElementById('goStats').textContent =
      'final score ' + state.score + ' · ' + state.kills + ' kills · hue ' + Math.round(state.player.hue) + '°';
    document.getElementById('gameOver').classList.add('show');
    document.getElementById('gameOver').setAttribute('aria-hidden', 'false');
    setTimeout(function(){ document.getElementById('goRestart').focus(); }, 200);
  }

  // ── Kill: shift hue, score, particles ──
  function killEnemy(e, idx){
    state.enemies.splice(idx, 1);
    state.kills++;
    state.score += e.points;
    // The hue shift — the headline mechanic
    state.player.hue = (state.player.hue + 18) % 360;
    state.chainTimer = 1.2;
    state.chainCount = state.chainCount + 1;
    // Bonus on chain: every 5 kills within chain window, extra points
    if (state.chainCount % 5 === 0){
      state.score += 500;
      pushFloater(e.x, e.y - 24, '+500 CHAIN!', 'gold');
    }
    sndKill(state.player.hue);
    sndHueShift(state.player.hue);
    pushExplosion(e.x, e.y, state.player.hue, e.r);
    pushFloater(e.x, e.y, '+' + e.points, 'cyan');
    refreshHUD();
  }

  function pushExplosion(x, y, hue, r){
    var count = Math.min(50, 14 + Math.floor(r * 1.5));
    for (var i = 0; i < count; i++){
      var ang = Math.random() * Math.PI * 2;
      var sp = 60 + Math.random() * 260;
      state.particles.push({
        x: x, y: y,
        vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp,
        ttl: 0.5 + Math.random() * 0.6,
        life: 0,
        size: 2 + Math.random() * 3,
        hue: (hue + (Math.random() - 0.5) * 60 + 360) % 360
      });
    }
    state.shake = Math.min(28, state.shake + 6);
  }

  function pushFloater(x, y, text, color){
    state.floaters.push({
      x: x, y: y, vy: -34,
      ttl: 0.8, life: 0,
      text: text,
      color: color
    });
  }

  // ── Update ──
  function update(dt){
    if (state.over) return;
    state.waveT += dt;
    state.difficulty = Math.min(20, state.waveT / 6);
    state.chainTimer -= dt;
    if (state.chainTimer <= 0) state.chainCount = 0;

    // Player movement
    var ix = 0, iy = 0;
    if (keys['KeyW'] || keys['ArrowUp']) iy -= 1;
    if (keys['KeyS'] || keys['ArrowDown']) iy += 1;
    if (keys['KeyA'] || keys['ArrowLeft']) ix -= 1;
    if (keys['KeyD'] || keys['ArrowRight']) ix += 1;
    if (stick.active){
      if (Math.abs(stick.dx) > 0.15) ix = stick.dx;
      if (Math.abs(stick.dy) > 0.15) iy = stick.dy;
    }
    var m = Math.hypot(ix, iy);
    if (m > 1){ ix /= m; iy /= m; }
    var spd = 380;
    state.player.vx = ix * spd;
    state.player.vy = iy * spd;
    state.player.x += state.player.vx * dt;
    state.player.y += state.player.vy * dt;
    // Clamp to screen
    var pad = 18;
    if (state.player.x < pad) state.player.x = pad;
    if (state.player.x > W - pad) state.player.x = W - pad;
    if (state.player.y < pad + 70) state.player.y = pad + 70;  // leave room for HUD
    if (state.player.y > H - pad) state.player.y = H - pad;

    state.player.iframes = Math.max(0, state.player.iframes - dt);
    state.player.flashT = Math.max(0, state.player.flashT - dt);
    state.player.cooldown = Math.max(0, state.player.cooldown - dt);
    state.player.thrustPhase += dt * 25;

    // Fire bullets
    if (firing && state.player.cooldown <= 0){
      var bx = state.player.x + 26;
      var by = state.player.y;
      state.bullets.push({ x: bx, y: by, vx: 740, vy: 0, r: 4, hue: state.player.hue });
      // Twin-link: small offset 2nd bullet at higher kills count for visible upgrade
      if (state.kills >= 10) state.bullets.push({ x: bx, y: by - 9, vx: 740, vy: 0, r: 3, hue: state.player.hue });
      if (state.kills >= 25) state.bullets.push({ x: bx, y: by + 9, vx: 740, vy: 0, r: 3, hue: state.player.hue });
      state.player.cooldown = 0.105;
      sndShoot();
    }

    // Update bullets
    for (var i = state.bullets.length - 1; i >= 0; i--){
      var b = state.bullets[i];
      b.x += b.vx * dt; b.y += b.vy * dt;
      if (b.x > W + 30) state.bullets.splice(i, 1);
    }

    // Spawn enemies
    state.spawnT -= dt;
    if (state.spawnT <= 0){
      spawnEnemy();
      state.spawnT = Math.max(0.25, 1.4 - state.difficulty * 0.05);
    }

    // Update enemies + collisions
    for (var ei = state.enemies.length - 1; ei >= 0; ei--){
      var e = state.enemies[ei];
      e.t += dt;
      if (e.type === 'sine'){
        e.y = e.baseY + Math.sin(e.t * e.freq) * e.amp;
        e.x += e.vx * dt;
      } else if (e.type === 'diver'){
        // Move toward player
        var dx = state.player.x - e.x;
        var dy = state.player.y - e.y;
        var d = Math.hypot(dx, dy) || 1;
        e.vx += (dx/d) * 120 * dt;
        e.vy += (dy/d) * 90 * dt;
        // Cap speed
        var sp2 = Math.hypot(e.vx, e.vy);
        var max = 280 + state.difficulty * 4;
        if (sp2 > max){ e.vx = e.vx / sp2 * max; e.vy = e.vy / sp2 * max; }
        e.x += e.vx * dt; e.y += e.vy * dt;
      } else if (e.type === 'bomber'){
        e.x += e.vx * dt; e.y += e.vy * dt;
        // Periodic enemy fire toward player
        e.fireT -= dt;
        if (e.fireT <= 0){
          var ddx = state.player.x - e.x, ddy = state.player.y - e.y;
          var dd = Math.hypot(ddx, ddy) || 1;
          var bs = 230;
          state.enemyBullets.push({ x: e.x - 12, y: e.y, vx: (ddx/dd)*bs, vy: (ddy/dd)*bs, r: 5, hue: e.hue });
          e.fireT = 1.2 + Math.random() * 0.6;
        }
      } else {
        e.x += e.vx * dt; e.y += e.vy * dt;
      }
      // Out of screen left → remove (no penalty)
      if (e.x < -40 || e.y < -40 || e.y > H + 40){
        state.enemies.splice(ei, 1);
        continue;
      }
      // Bullet collisions
      var killed = false;
      for (var bi = state.bullets.length - 1; bi >= 0; bi--){
        var bb = state.bullets[bi];
        var ddx2 = bb.x - e.x, ddy2 = bb.y - e.y;
        if (ddx2*ddx2 + ddy2*ddy2 < (e.r + bb.r) * (e.r + bb.r)){
          state.bullets.splice(bi, 1);
          e.hp -= 1;
          // Small impact sparks
          for (var sk = 0; sk < 4; sk++){
            var ang = Math.random() * Math.PI * 2;
            var sp = 60 + Math.random() * 100;
            state.particles.push({
              x: bb.x, y: bb.y, vx: Math.cos(ang)*sp, vy: Math.sin(ang)*sp,
              ttl: 0.18, life: 0, size: 1.5, hue: state.player.hue
            });
          }
          if (e.hp <= 0){
            killEnemy(e, ei);
            killed = true;
            break;
          }
        }
      }
      if (killed) continue;
      // Player collision
      var pdx = state.player.x - e.x, pdy = state.player.y - e.y;
      if (pdx*pdx + pdy*pdy < (state.player.r + e.r) * (state.player.r + e.r)){
        hurtPlayer(1);
        // Destroy enemy on contact too
        state.enemies.splice(ei, 1);
        pushExplosion(e.x, e.y, e.hue, e.r);
      }
    }

    // Update enemy bullets
    for (var ebi = state.enemyBullets.length - 1; ebi >= 0; ebi--){
      var eb = state.enemyBullets[ebi];
      eb.x += eb.vx * dt; eb.y += eb.vy * dt;
      if (eb.x < -20 || eb.x > W + 20 || eb.y < -20 || eb.y > H + 20){ state.enemyBullets.splice(ebi, 1); continue; }
      var pdx2 = state.player.x - eb.x, pdy2 = state.player.y - eb.y;
      if (pdx2*pdx2 + pdy2*pdy2 < (state.player.r + eb.r) * (state.player.r + eb.r)){
        state.enemyBullets.splice(ebi, 1);
        hurtPlayer(1);
      }
    }

    // Particles
    for (var pi = state.particles.length - 1; pi >= 0; pi--){
      var p = state.particles[pi];
      p.life += dt;
      if (p.life >= p.ttl){ state.particles.splice(pi, 1); continue; }
      p.vy += 80 * dt;
      p.vx *= Math.pow(0.95, dt * 60);
      p.x += p.vx * dt; p.y += p.vy * dt;
    }
    // Floaters
    for (var fi = state.floaters.length - 1; fi >= 0; fi--){
      var f = state.floaters[fi];
      f.life += dt;
      if (f.life >= f.ttl){ state.floaters.splice(fi, 1); continue; }
      f.y += f.vy * dt;
    }
    // Stars scroll
    for (var si = 0; si < state.stars.length; si++){
      var s = state.stars[si];
      s.x -= (60 + state.difficulty * 4) * s.z * dt;
      if (s.x < -2){ s.x = W + 5; s.y = Math.random() * H; }
    }

    // Shake decay
    state.shake *= Math.pow(0.86, dt * 60);
  }

  // ── Render ──
  function render(){
    var shakeX = (Math.random() - 0.5) * state.shake;
    var shakeY = (Math.random() - 0.5) * state.shake;
    ctx.save();
    ctx.translate(shakeX, shakeY);

    // Background
    var bg = ctx.createLinearGradient(0, 0, 0, H);
    bg.addColorStop(0, '#070418');
    bg.addColorStop(0.6, '#1d0d4a');
    bg.addColorStop(1, '#3a1450');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    // Stars
    for (var i = 0; i < state.stars.length; i++){
      var s = state.stars[i];
      ctx.fillStyle = 'rgba(255,255,255,' + (0.3 + s.z * 0.5) + ')';
      ctx.fillRect(s.x, s.y, s.size, s.size);
    }

    // Enemy bullets (drawn behind player bullets)
    for (var ebi2 = 0; ebi2 < state.enemyBullets.length; ebi2++){
      var eb = state.enemyBullets[ebi2];
      ctx.fillStyle = 'hsl(' + eb.hue + ',100%,65%)';
      ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.arc(eb.x, eb.y, eb.r, 0, Math.PI*2); ctx.fill();
      ctx.shadowBlur = 0;
    }

    // Enemies
    for (var ei = 0; ei < state.enemies.length; ei++){
      drawEnemy(state.enemies[ei]);
    }

    // Player bullets
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (var bi = 0; bi < state.bullets.length; bi++){
      var b = state.bullets[bi];
      ctx.fillStyle = 'hsl(' + b.hue + ',100%,75%)';
      ctx.shadowColor = ctx.fillStyle; ctx.shadowBlur = 14;
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r, 0, Math.PI*2); ctx.fill();
      // streak behind
      ctx.fillStyle = 'hsla(' + b.hue + ',100%,75%,0.5)';
      ctx.fillRect(b.x - 14, b.y - b.r * 0.55, 14, b.r * 1.1);
    }
    ctx.restore();
    ctx.shadowBlur = 0;

    // Player jet
    if (!state.over) drawPlayer();

    // Particles
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (var pi = 0; pi < state.particles.length; pi++){
      var p = state.particles[pi];
      var a = 1 - p.life / p.ttl;
      ctx.fillStyle = 'hsla(' + p.hue + ',100%,70%,' + a + ')';
      ctx.shadowColor = 'hsl(' + p.hue + ',100%,65%)'; ctx.shadowBlur = 10;
      ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    }
    ctx.restore();
    ctx.shadowBlur = 0;

    // Floaters
    ctx.textAlign = 'center';
    ctx.font = 'bold 13px "Rubik Mono One", monospace';
    for (var fi = 0; fi < state.floaters.length; fi++){
      var f = state.floaters[fi];
      var a = 1 - f.life / f.ttl;
      var color = f.color === 'gold' ? 'rgba(255,212,84,' : f.color === 'cyan' ? 'rgba(92,230,255,' : 'rgba(255,255,255,';
      ctx.fillStyle = color + a + ')';
      ctx.fillText(f.text, f.x, f.y);
    }

    // Chain combo indicator
    if (state.chainCount > 1 && state.chainTimer > 0){
      var ca = Math.min(1, state.chainTimer);
      ctx.font = 'bold 20px "Audiowide", monospace';
      ctx.fillStyle = 'hsla(' + state.player.hue + ',100%,70%,' + ca + ')';
      ctx.textAlign = 'center';
      ctx.fillText('CHAIN ×' + state.chainCount, W / 2, 110);
    }

    ctx.restore();
  }

  function drawEnemy(e){
    ctx.save();
    ctx.translate(e.x, e.y);
    ctx.shadowColor = 'hsl(' + e.hue + ',100%,60%)';
    ctx.shadowBlur = 10;
    var grad = ctx.createLinearGradient(0, -e.r, 0, e.r);
    grad.addColorStop(0, 'hsl(' + e.hue + ',90%,60%)');
    grad.addColorStop(1, 'hsl(' + ((e.hue + 30) % 360) + ',90%,38%)');
    ctx.fillStyle = grad;
    if (e.type === 'grunt'){
      // arrow pointing left
      ctx.beginPath();
      ctx.moveTo(-e.r, 0); ctx.lineTo(e.r * 0.7, -e.r * 0.7); ctx.lineTo(e.r * 0.4, 0); ctx.lineTo(e.r * 0.7, e.r * 0.7); ctx.closePath();
      ctx.fill();
    } else if (e.type === 'sine'){
      // hex
      ctx.beginPath();
      for (var k = 0; k < 6; k++){
        var ang = k * Math.PI / 3 + Math.PI / 6;
        var px = Math.cos(ang) * e.r, py = Math.sin(ang) * e.r;
        if (k === 0) ctx.moveTo(px, py); else ctx.lineTo(px, py);
      }
      ctx.closePath();
      ctx.fill();
    } else if (e.type === 'diver'){
      // diamond
      ctx.beginPath();
      ctx.moveTo(-e.r, 0); ctx.lineTo(0, -e.r); ctx.lineTo(e.r, 0); ctx.lineTo(0, e.r); ctx.closePath();
      ctx.fill();
      // eye
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(-2, 0, 3, 0, Math.PI*2); ctx.fill();
    } else if (e.type === 'bomber'){
      // bigger ship — multiple sections
      ctx.beginPath();
      ctx.ellipse(0, 0, e.r, e.r * 0.7, 0, 0, Math.PI*2);
      ctx.fill();
      // wings
      ctx.fillStyle = 'hsl(' + ((e.hue + 20) % 360) + ',90%,40%)';
      ctx.fillRect(-e.r * 0.4, -e.r * 1.1, e.r * 0.8, 6);
      ctx.fillRect(-e.r * 0.4, e.r * 1.05, e.r * 0.8, 6);
      // cannon glow
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.arc(-e.r * 0.6, 0, 3, 0, Math.PI*2); ctx.fill();
    }
    ctx.shadowBlur = 0;
    // HP pip for >1HP enemies
    if (e.hp > 1){
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.font = 'bold 9px "Share Tech Mono", monospace';
      ctx.textAlign = 'center';
      ctx.fillText(e.hp, 0, -e.r - 5);
    }
    ctx.restore();
  }

  function drawPlayer(){
    var p = state.player;
    var blink = (p.iframes > 0 && Math.floor(p.iframes * 16) % 2 === 0);
    if (blink) return;
    ctx.save();
    ctx.translate(p.x, p.y);
    // thrust flame
    var flameLen = 18 + Math.sin(p.thrustPhase) * 4;
    var flameGrad = ctx.createLinearGradient(-flameLen, 0, 0, 0);
    flameGrad.addColorStop(0, 'rgba(255,255,255,0)');
    flameGrad.addColorStop(0.4, 'hsla(' + p.hue + ',100%,75%,0.8)');
    flameGrad.addColorStop(1, 'hsla(' + p.hue + ',100%,55%,0.95)');
    ctx.fillStyle = flameGrad;
    ctx.beginPath();
    ctx.moveTo(-flameLen, -3); ctx.lineTo(-12, 0); ctx.lineTo(-flameLen, 3); ctx.closePath();
    ctx.fill();
    // body — pentagon-ish jet pointing right
    ctx.shadowColor = 'hsl(' + p.hue + ',100%,65%)';
    ctx.shadowBlur = 16;
    var bodyGrad = ctx.createLinearGradient(0, -16, 0, 16);
    bodyGrad.addColorStop(0, 'hsl(' + p.hue + ',95%,75%)');
    bodyGrad.addColorStop(0.5, 'hsl(' + p.hue + ',95%,55%)');
    bodyGrad.addColorStop(1, 'hsl(' + ((p.hue + 320) % 360) + ',90%,40%)');
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.moveTo(-14, -8); ctx.lineTo(-2, -14); ctx.lineTo(20, 0); ctx.lineTo(-2, 14); ctx.lineTo(-14, 8); ctx.closePath();
    ctx.fill();
    // wing strakes
    ctx.fillStyle = 'hsl(' + ((p.hue + 340) % 360) + ',90%,45%)';
    ctx.fillRect(-8, -14, 6, 4);
    ctx.fillRect(-8, 10, 6, 4);
    // cockpit
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(2, 0, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'hsl(' + p.hue + ',100%,82%)';
    ctx.beginPath(); ctx.arc(1, 0, 1.6, 0, Math.PI*2); ctx.fill();
    // damage flash
    if (p.flashT > 0){
      ctx.fillStyle = 'rgba(255,90,107,' + (p.flashT * 0.6) + ')';
      ctx.fillRect(-18, -16, 40, 32);
    }
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // ── Main loop ──
  var lastT = performance.now();
  function frame(now){
    var dt = Math.min(0.05, (now - lastT) / 1000);
    lastT = now;
    if (prefersReducedMotion) dt *= 0.85;
    try {
      update(dt);
      render();
    } catch(e){ showError('loop: ' + e.message); }
    requestAnimationFrame(frame);
  }
  resetGame();
  refreshHUD();
  requestAnimationFrame(frame);

  // Audio unlock on first interaction
  ['pointerdown', 'keydown'].forEach(function(ev){
    window.addEventListener(ev, function once(){ ensureAudio(); window.removeEventListener(ev, once); });
  });
})();
</script>
</body>
</html>
