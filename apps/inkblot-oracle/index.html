<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Inkblot Oracle</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%A6%8B" />

<meta name="description" content="A Rorschach inkblot generator. It draws a symmetric abstract blot, then a playful AI psychologist tells you what it sees. Generate, share the seed, ask the oracle." />
<meta property="og:type" content="website" />
<meta property="og:title" content="Inkblot Oracle" />
<meta property="og:description" content="Generate a symmetric Rorschach inkblot and let the AI guess what it looks like." />
<meta property="og:url" content="https://sloppy.live/inkblot-oracle/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/a%20symmetric%20black%20rorschach%20inkblot%20on%20a%20cream%20card%2C%20vintage%20psychology%2C%20moody%20dark%20background?width=1200&height=630&nologo=true&seed=1921" />
<meta name="twitter:card" content="summary_large_image" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=Cormorant+Garamond:ital@0;1&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  :root{
    --bg:#0d0e13; --bg2:#15171f; --card:#f1e9d9; --card-edge:#d8cdb6; --ink:#0c0a10;
    --paper-ink:#1a1712; --gold:#b89a5a; --dim:#8b8a96; --text:#e9e6df; --accent:#7e6bb0;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  body{
    min-height:100vh; font-family:'IBM Plex Mono',monospace; color:var(--text);
    background:
      radial-gradient(120% 80% at 50% -10%, #1b1d28 0%, transparent 55%),
      var(--bg);
    display:flex; flex-direction:column; align-items:center; padding:1.1rem .8rem 2rem;
    -webkit-font-smoothing:antialiased;
  }
  header{ text-align:center; margin-bottom:.5rem; }
  h1{ font-family:'Playfair Display',serif; font-weight:700; font-size:clamp(1.9rem,6vw,3rem); letter-spacing:.01em; }
  .tag{ font-family:'Cormorant Garamond',serif; font-style:italic; font-size:1.05rem; color:var(--dim); margin-top:.1rem; }

  .card{ position:relative; background:linear-gradient(160deg,var(--card),#e8ddc6); border:1px solid var(--card-edge);
    border-radius:8px; padding:14px; box-shadow:0 22px 50px rgba(0,0,0,.5), inset 0 0 0 1px rgba(255,255,255,.25);
    margin-top:.8rem; }
  .card::before{ content:"PLATE Nº"; position:absolute; top:8px; left:12px; font-family:'Playfair Display',serif;
    font-size:.56rem; letter-spacing:.2em; color:#9a8f78; }
  .card .seedtag{ position:absolute; top:8px; right:12px; font-family:'IBM Plex Mono',monospace; font-size:.56rem;
    letter-spacing:.14em; color:#9a8f78; }
  canvas{ display:block; border-radius:4px; background:transparent; cursor:crosshair; }

  .controls{ display:flex; gap:.5rem; flex-wrap:wrap; justify-content:center; align-items:center; margin-top:.9rem; }
  .btn{ font-family:'IBM Plex Mono',monospace; font-size:.76rem; letter-spacing:.05em; cursor:pointer; color:var(--text);
    background:var(--bg2); border:1px solid #2c2f3b; border-radius:9px; padding:.55rem .95rem; min-height:2.6rem; transition:border-color .15s; }
  .btn:hover{ border-color:var(--gold); } .btn:focus-visible{ outline:2px solid var(--gold); outline-offset:2px; }
  .btn.primary{ background:linear-gradient(180deg,#6f5da6,#574593); border-color:#4a3a82; color:#fff; }
  .btn.primary:disabled{ opacity:.55; cursor:wait; }
  .seedform{ display:flex; gap:.35rem; align-items:center; }
  .seedform input{ width:6.5rem; font-family:'IBM Plex Mono',monospace; font-size:.8rem; text-transform:uppercase; letter-spacing:.12em;
    color:var(--text); background:var(--bg2); border:1px solid #2c2f3b; border-radius:8px; padding:.45rem .5rem; }
  .seedform input:focus-visible{ outline:2px solid var(--gold); outline-offset:1px; }
  .toggle{ display:inline-flex; align-items:center; gap:.4rem; font-size:.72rem; color:var(--dim); cursor:pointer; }

  .oracle{ width:min(460px,94vw); margin-top:1rem; background:var(--bg2); border:1px solid #2c2f3b; border-radius:12px;
    padding:.9rem 1rem; min-height:5rem; }
  .oracle .who{ font-size:.58rem; letter-spacing:.18em; text-transform:uppercase; color:var(--gold); margin-bottom:.4rem; }
  .oracle .said{ font-family:'Cormorant Garamond',serif; font-style:italic; font-size:1.3rem; line-height:1.4; color:#efe9dd; min-height:1.4em; }
  .oracle .said .caret{ display:inline-block; width:.5ch; background:var(--gold); animation:blink 1s steps(1) infinite; }
  @keyframes blink{ 50%{opacity:0} }
  .oracle .muted{ color:var(--dim); font-style:italic; }

  footer{ margin-top:1.2rem; font-size:.6rem; color:var(--dim); text-align:center; line-height:1.6; }
  .sr-only{ position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); }
  @media (prefers-reduced-motion: reduce){ .said .caret{ animation:blink 1s steps(1) infinite; } }
</style>
</head>
<body>
  <header>
    <h1>Inkblot Oracle</h1>
    <div class="tag">what do <em>you</em> see? — then ask the machine</div>
  </header>

  <div class="card">
    <span class="seedtag" id="seedTag">—</span>
    <canvas id="cv" width="420" height="420" role="img" aria-label="A symmetric abstract Rorschach inkblot"></canvas>
  </div>

  <div class="controls">
    <button class="btn" id="newBtn" type="button">🩸 New blot</button>
    <label class="toggle"><input type="checkbox" id="colourChk"> colour</label>
    <form class="seedform" id="seedForm">
      <label class="sr-only" for="seedIn">Seed</label>
      <input id="seedIn" placeholder="seed" maxlength="6" autocomplete="off" spellcheck="false" />
      <button class="btn" type="submit">go</button>
    </form>
  </div>
  <div class="controls" style="margin-top:.5rem">
    <button class="btn primary" id="askBtn" type="button">🔮 Ask the oracle what it sees</button>
  </div>

  <div class="oracle">
    <div class="who">the oracle sees…</div>
    <div class="said" id="said" role="status" aria-live="polite"><span class="muted">generate a blot, then ask. (it really looks at the image.)</span></div>
  </div>

  <footer>
    A toy, not a diagnosis. The interpretation is an AI being playful about abstract shapes.<br>
    Same seed → same blot. Share yours.
  </footer>

<script>
(function(){
  "use strict";
  var cv=document.getElementById('cv'), X=cv.getContext('2d'), W=cv.width, H=cv.height;
  var seedTag=document.getElementById('seedTag'), seedIn=document.getElementById('seedIn'), seedForm=document.getElementById('seedForm'),
      newBtn=document.getElementById('newBtn'), askBtn=document.getElementById('askBtn'), colourChk=document.getElementById('colourChk'),
      said=document.getElementById('said');
  var reduce=window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // ---- seeded PRNG ----
  function hashSeed(s){ var h=2166136261>>>0; for(var i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619)>>>0; } return h>>>0; }
  function mulberry32(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; var t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
  var ALPH='ABCDEFGHJKLMNPQRSTUVWXYZ23456789', rng=Math.random, curSeed='';
  function randSeed(){ var s=''; for(var i=0;i<5;i++) s+=ALPH[Math.floor(Math.random()*ALPH.length)]; return s; }

  // offscreens for the left half (mirrored to the right): ink = solid silhouette mask, shade = translucent layered ink
  var ink=document.createElement('canvas'); ink.width=W; ink.height=H; var ic=ink.getContext('2d');
  var shade=document.createElement('canvas'); shade.width=W; shade.height=H; var sc=shade.getContext('2d');
  // draw a source canvas onto the display + its mirror (with optional alpha/blur)
  function composite(src, alpha, blur){
    X.save(); X.globalAlpha=alpha; if(blur) X.filter='blur('+blur+'px)'; X.drawImage(src,0,0); X.restore();
    X.save(); X.globalAlpha=alpha; if(blur) X.filter='blur('+blur+'px)'; X.translate(W,0); X.scale(-1,1); X.drawImage(src,0,0); X.restore();
  }

  function smoothBlob(ctx, cx, cy, rBase, points, jitter){
    var pts=[];
    for(var i=0;i<points;i++){ var a=i/points*Math.PI*2; var r=rBase*(0.45 + rng()*jitter); pts.push([cx+Math.cos(a)*r, cy+Math.sin(a)*r]); }
    ctx.beginPath();
    var mx=(pts[points-1][0]+pts[0][0])/2, my=(pts[points-1][1]+pts[0][1])/2; ctx.moveTo(mx,my);
    for(var j=0;j<points;j++){ var c=pts[j], n=pts[(j+1)%points]; var midx=(c[0]+n[0])/2, midy=(c[1]+n[1])/2; ctx.quadraticCurveTo(c[0],c[1],midx,midy); }
    ctx.closePath(); ctx.fill();
  }
  function tendril(ctx, x0, y0){
    ctx.beginPath(); ctx.moveTo(x0,y0); var x=x0,y=y0;
    var segs=2+Math.floor(rng()*3);
    ctx.lineWidth=2+rng()*7; ctx.lineCap='round';
    for(var s=0;s<segs;s++){ var nx=x+(rng()-0.5)*70, ny=y+(rng()*1.0-0.2)*70; ctx.quadraticCurveTo(x+(rng()-0.5)*40, y+(rng()-0.5)*40, nx, ny); x=nx; y=ny; }
    ctx.stroke();
  }

  function generate(seed){
    curSeed=seed; rng=mulberry32(hashSeed(seed)); seedTag.textContent='#'+seed; said.innerHTML='<span class="muted">a fresh blot. ask the oracle.</span>';
    var colour=colourChk.checked, hue=Math.floor(rng()*360), sat=44+Math.floor(rng()*16), lig=20+Math.floor(rng()*8);
    function inkA(a){ return colour ? ('hsla('+hue+','+sat+'%,'+lig+'%,'+a+')') : ('rgba(13,10,16,'+a+')'); }

    // ── 1) SOLID silhouette (used only as a mask) → the single connected mass shape
    ic.clearRect(0,0,W,H);
    ic.save(); ic.beginPath(); ic.rect(0,0,W/2,H); ic.clip();   // left half only; rest is mirrored
    ic.fillStyle='#000'; ic.strokeStyle='#000'; ic.lineJoin='round';
    var nodes=6+Math.floor(rng()*4), cyTop=H*(0.15+rng()*0.04), cyBot=H*(0.82+rng()*0.04), centres=[], lobeC=[];
    for(var k=0;k<nodes;k++){
      var t=k/(nodes-1), bulge=Math.sin(t*Math.PI);
      var cy=cyTop+(cyBot-cyTop)*t + (rng()-0.5)*24;
      var cx=W/2 - (7 + rng()*16) - bulge*W*0.17;
      var r = W*0.085 + rng()*W*0.045 + bulge*W*0.055;
      centres.push({x:cx,y:cy,r:r});
      smoothBlob(ic, cx, cy, r, 10+Math.floor(rng()*4), 0.78);
    }
    var lobes=3+Math.floor(rng()*3);
    for(var l=0;l<lobes;l++){
      var base=centres[1+Math.floor(rng()*(centres.length-2))];
      var ang=Math.PI*(0.55+rng()*0.9), dist=base.r*(0.55+rng()*0.4);
      var lx=Math.max(W*0.05, base.x+Math.cos(ang)*dist), ly=base.y+Math.sin(ang)*dist, lr=base.r*(0.42+rng()*0.4);
      lobeC.push({x:lx,y:ly,r:lr});
      smoothBlob(ic, lx, ly, lr, 9+Math.floor(rng()*4), 0.82);
    }
    if(rng()<0.65){ var anchor=centres[Math.floor(rng()*centres.length)], sp=1+Math.floor(rng()*2);
      for(var s=0;s<sp;s++){ ic.beginPath(); ic.arc(anchor.x-(6+rng()*20), anchor.y+(rng()-0.5)*36, 2+rng()*4, 0,6.283); ic.fill(); } }
    ic.restore();

    // ── 2) TRANSLUCENT LAYERED INK on `shade`: a faint base wash + overlapping radial
    //    "pools" that accumulate darker where they overlap, then masked to the silhouette
    sc.clearRect(0,0,W,H);
    sc.fillStyle=inkA(0.18); sc.fillRect(0,0,W/2,H);                       // thin base wash
    function pool(cx,cy,r,a){ var g=sc.createRadialGradient(cx,cy,r*0.12,cx,cy,r);
      g.addColorStop(0,inkA(a)); g.addColorStop(0.6,inkA(a*0.5)); g.addColorStop(1,inkA(0));
      sc.fillStyle=g; sc.beginPath(); sc.arc(cx,cy,r,0,6.283); sc.fill(); }
    centres.forEach(function(c){ pool(c.x,c.y,c.r*1.25, 0.40); });        // a pool per body node
    lobeC.forEach(function(c){ pool(c.x,c.y,c.r*1.25, 0.36); });
    var deeps=2+Math.floor(rng()*3);                                       // deeper spots where ink collects
    for(var dp=0;dp<deeps;dp++){ var c2=centres[Math.floor(rng()*centres.length)];
      pool(c2.x+(rng()-0.5)*c2.r*0.6, c2.y+(rng()-0.5)*c2.r*0.6, c2.r*(0.35+rng()*0.4), 0.48); }
    sc.globalCompositeOperation='destination-in'; sc.drawImage(ink,0,0); sc.globalCompositeOperation='source-over';  // clip to mass

    // ── 3) composite the symmetric plate: soft bleed halo (blurred) under the crisp pooled mass
    X.clearRect(0,0,W,H);
    if(!reduce) composite(shade, 0.5, 5);    // ink soaking/bleeding into the paper
    composite(shade, 1, 0);                   // the pooled, density-varied mass
    if(!reduce) composite(shade, 0.16, 2);    // extra feathered edge
  }

  function newBlot(){ var s=randSeed(); seedIn.value=s; generate(s); }

  newBtn.addEventListener('click', newBlot);
  colourChk.addEventListener('change', function(){ generate(curSeed||randSeed()); });
  seedForm.addEventListener('submit', function(e){ e.preventDefault();
    var s=(seedIn.value||'').toUpperCase().replace(/[^A-Z0-9]/g,'').slice(0,6) || randSeed(); seedIn.value=s; generate(s); });

  // ---- the oracle: real vision interpretation via Pollinations ----
  var FALLBACK=['moth','seahorse','crab','orchid','wolfpack','lantern','butterfly','grief','dancer','beetle','crown','wishbone','reckoning','vortex'];
  // reduce any reply to a single evocative word, skipping leading filler
  var STOP={a:1,an:1,the:1,i:1,it:1,this:1,that:1,these:1,look:1,looks:1,see:1,seeing:1,seems:1,like:1,resembles:1,
    its:1,of:1,maybe:1,perhaps:1,probably:1,definitely:1,clearly:1,is:1,as:1,or:1,and:1,to:1,me:1,my:1,well:1,hmm:1,oh:1,some:1,kind:1,sort:1};
  function oneWord(t){
    var words=String(t||'').toLowerCase().match(/[a-z][a-z'\-]*/g)||[];
    for(var i=0;i<words.length;i++){ if(!STOP[words[i]]) return words[i]; }
    return words[0]||'';
  }
  function typewrite(text){
    said.innerHTML=''; var span=document.createElement('span'); var caret=document.createElement('span'); caret.className='caret'; caret.innerHTML='&nbsp;';
    said.appendChild(span); said.appendChild(caret);
    if(reduce){ span.textContent=text; caret.remove(); return; }
    var i=0; (function tk(){ if(i>=text.length){ caret.remove(); return; } span.textContent+=text[i++]; setTimeout(tk, 18); })();
  }
  function looksBad(t){ if(!t) return true; var s=t.trim(); return s.length<2 || /deprecated|enter\.pollinations|rate.?limit|error 5\d\d/i.test(s); }

  askBtn.addEventListener('click', function(){
    if(!curSeed) newBlot();
    askBtn.disabled=true; said.innerHTML='<span class="muted">the oracle is squinting…</span>';
    // downscale to keep the payload small
    var small=document.createElement('canvas'); small.width=360; small.height=360; var sc=small.getContext('2d');
    sc.fillStyle='#f1e9d9'; sc.fillRect(0,0,360,360); sc.drawImage(cv,0,0,360,360);
    var dataUrl=small.toDataURL('image/jpeg',0.72);
    var prompt='Look at this Rorschach inkblot and reply with EXACTLY ONE evocative word for what it most resembles — a creature, object, or feeling. Output only that single lowercase word, no punctuation, no explanation. Never use the words inkblot, symmetric, image, or Rorschach.';
    var done=false;
    var timeout=setTimeout(function(){ if(!done){ done=true; finish(null); } }, 22000);
    fetch('https://text.pollinations.ai/openai', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ model:'openai', referrer:'sloppy.live',
        messages:[{ role:'user', content:[ {type:'text', text:prompt}, {type:'image_url', image_url:{url:dataUrl}} ] }] })
    }).then(function(r){ return r.json(); }).then(function(j){
      if(done) return; done=true; clearTimeout(timeout);
      var t = j && j.choices && j.choices[0] && j.choices[0].message && j.choices[0].message.content;
      var word = looksBad(t) ? '' : oneWord(t);
      finish(word || null);
    }).catch(function(){ if(done) return; done=true; clearTimeout(timeout); finish(null); });
  });
  function finish(text){
    askBtn.disabled=false;
    if(!text){ text=FALLBACK[Math.floor(Math.random()*FALLBACK.length)]; }
    typewrite(text);
  }

  // boot
  newBlot();
})();
</script>
</body>
</html>
