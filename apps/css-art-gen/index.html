<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSS Art Generator</title>
<link rel="icon" href="https://emojicdn.elk.sh/🎨">
<meta property="og:title" content="CSS Art Generator">
<meta property="og:description" content="Type any prompt and get a wacky abstract CSS art masterpiece instead of a real image.">
<meta property="og:url" content="https://app.sloppy.live/css-art-gen/">
<meta property="og:image" content="https://emojicdn.elk.sh/🎨?style=apple&size=512">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Instrument+Serif&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#0a0a0f;color:#e0e0e0;font-family:'Space Mono',monospace;
  display:flex;flex-direction:column;align-items:center;padding:20px 16px;
  background-image:radial-gradient(circle at 20% 50%,rgba(40,0,80,0.15),transparent 50%),
    radial-gradient(circle at 80% 30%,rgba(0,40,80,0.1),transparent 50%)}
h1{font-family:'Instrument Serif',serif;font-size:clamp(1.8rem,5vw,3rem);
  margin-bottom:4px;letter-spacing:-0.02em;
  background:linear-gradient(135deg,#ff6b9d,#c084fc,#60a5fa);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent}
#sub{font-size:0.75rem;opacity:0.4;margin-bottom:24px;letter-spacing:0.1em}
#inputArea{display:flex;gap:10px;width:min(600px,95vw);margin-bottom:24px}
#prompt{flex:1;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);
  border-radius:10px;padding:12px 16px;color:#fff;font-family:'Space Mono',monospace;
  font-size:0.9rem;outline:none;transition:border-color 0.3s}
#prompt::placeholder{color:rgba(255,255,255,0.25)}
#prompt:focus{border-color:rgba(192,132,252,0.5)}
#genBtn{background:linear-gradient(135deg,#ff6b9d,#c084fc);border:none;
  border-radius:10px;padding:12px 24px;color:#fff;font-family:'Space Mono',monospace;
  font-size:0.85rem;font-weight:700;cursor:pointer;letter-spacing:0.05em;
  transition:transform 0.15s,box-shadow 0.3s;white-space:nowrap}
#genBtn:hover{transform:scale(1.03);box-shadow:0 0 25px rgba(192,132,252,0.3)}
#genBtn:active{transform:scale(0.97)}
#gallery{display:flex;flex-direction:column;gap:24px;width:min(600px,95vw);align-items:center}
.card{width:100%;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);
  border-radius:16px;overflow:hidden;animation:cardIn 0.5s ease}
@keyframes cardIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.card-header{padding:12px 16px;display:flex;justify-content:space-between;align-items:center;
  border-bottom:1px solid rgba(255,255,255,0.06)}
.card-prompt{font-family:'Instrument Serif',serif;font-size:1.05rem;font-style:italic;opacity:0.8}
.card-label{font-size:0.6rem;opacity:0.3;letter-spacing:0.15em;text-transform:uppercase}
.art-frame{width:100%;aspect-ratio:4/3;position:relative;overflow:hidden;cursor:pointer}
.card-footer{padding:10px 16px;display:flex;justify-content:space-between;align-items:center;
  font-size:0.65rem;opacity:0.35}
.card-footer button{background:none;border:1px solid rgba(255,255,255,0.15);
  color:#e0e0e0;padding:4px 12px;border-radius:6px;font-family:'Space Mono',monospace;
  font-size:0.6rem;cursor:pointer;letter-spacing:0.1em;transition:all 0.2s}
.card-footer button:hover{border-color:rgba(192,132,252,0.5);color:#c084fc}
#backlink{margin-top:30px;font-size:0.65rem;opacity:0.3}
#backlink a{color:#c084fc;text-decoration:none}
</style>
</head>
<body>
<h1>CSS Art Generator</h1>
<div id="sub">TYPE A PROMPT. GET ABSTRACT ART. NO AI NEEDED.</div>
<div id="inputArea">
  <input id="prompt" type="text" placeholder="a sunset over a cyberpunk city..." maxlength="120" autocomplete="off">
  <button id="genBtn">GENERATE</button>
</div>
<div id="gallery"></div>
<div id="backlink"><a href="https://sloppy.live">sloppy.live</a></div>

<script>
const promptInput = document.getElementById('prompt');
const genBtn = document.getElementById('genBtn');
const gallery = document.getElementById('gallery');

// Seeded RNG from string
function seedHash(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) h = ((h << 5) - h + str.charCodeAt(i)) | 0;
  return h;
}
function mulberry32(seed) {
  return function() {
    seed |= 0; seed = seed + 0x6D2B79F5 | 0;
    let t = Math.imul(seed ^ seed >>> 15, 1 | seed);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// Word-to-property mapping
const COLOR_WORDS = {
  red:['#ff2020','#cc0000','#ff6b6b'], blue:['#2060ff','#0044cc','#60a5fa'],
  green:['#20cc40','#00aa20','#4ade80'], yellow:['#ffdd00','#ffaa00','#fde047'],
  purple:['#aa00ff','#7700cc','#c084fc'], pink:['#ff69b4','#ff1493','#f472b6'],
  orange:['#ff6600','#ff8800','#fb923c'], black:['#111','#222','#000'],
  white:['#fff','#eee','#f8f8f8'], gold:['#ffd700','#daa520','#f59e0b'],
  silver:['#c0c0c0','#a0a0a0','#9ca3af'], cyan:['#00ffff','#00ccdd','#22d3ee'],
  dark:['#1a1a2e','#16213e','#0f172a'], neon:['#ff00ff','#00ff00','#ff0066'],
  sunset:['#ff6b35','#f7c59f','#e8505b'], ocean:['#006994','#1a535c','#4ecdc4'],
  forest:['#1b4332','#2d6a4f','#52b788'], fire:['#ff4500','#ff6347','#dc2626'],
  ice:['#b3e5fc','#e1f5fe','#a5f3fc'], blood:['#8b0000','#660000','#991b1b'],
  night:['#0d1b2a','#1b263b','#1e293b'], space:['#0b0c10','#1a1a2e','#020617'],
  rainbow:['#ff0000','#ff8800','#ffff00','#00ff00','#0000ff','#8800ff'],
  love:['#ff1493','#ff69b4','#e11d48'], war:['#8b0000','#555','#b91c1c'],
  happy:['#ffd700','#ff69b4','#facc15'], sad:['#4a5568','#2d3748','#475569'],
  angry:['#ff0000','#cc0000','#dc2626'], calm:['#87ceeb','#b0c4de','#7dd3fc'],
  cosmic:['#2d1b69','#5b21b6','#7c3aed'], lava:['#ff4500','#ff6600','#f97316'],
  dream:['#dda0dd','#da70d6','#d946ef'], toxic:['#39ff14','#7fff00','#a3e635'],
  cyber:['#0ff','#f0f','#ff0'], vintage:['#d4a574','#c4956a','#a16207'],
  pastel:['#ffb3ba','#bae1ff','#baffc9'], metal:['#71797e','#a0a0a0','#6b7280'],
  wood:['#8b5e3c','#a0522d','#92400e'], crystal:['#e0f7fa','#b2ebf2','#67e8f9'],
};

const SHAPE_WORDS = {
  circle:'circle', round:'circle', sun:'circle', moon:'circle', ball:'circle', eye:'circle',
  planet:'circle', bubble:'circle', dot:'circle', orb:'circle', sphere:'circle',
  square:'square', box:'square', cube:'square', block:'square', building:'square',
  city:'square', house:'square', window:'square', door:'square', pixel:'square',
  triangle:'triangle', mountain:'triangle', pyramid:'triangle', arrow:'triangle',
  spike:'triangle', tent:'triangle', peak:'triangle', roof:'triangle',
  star:'star', sparkle:'star', flash:'star', light:'star', diamond:'diamond',
  gem:'diamond', crystal:'diamond', jewel:'diamond',
  line:'line', wave:'line', river:'line', road:'line', path:'line', horizon:'line',
  stripe:'line', beam:'line', ray:'line', bolt:'line', lightning:'line',
  blob:'blob', cloud:'blob', smoke:'blob', fog:'blob', ghost:'blob',
  splat:'blob', slime:'blob', amoeba:'blob', goo:'blob',
};

const MOOD_WORDS = {
  chaos:{ rotate:true, skew:true, layers:20, speed:2 },
  chaotic:{ rotate:true, skew:true, layers:20, speed:2 },
  wild:{ rotate:true, skew:true, layers:18, speed:1.5 },
  crazy:{ rotate:true, skew:true, layers:22, speed:2.5 },
  calm:{ rotate:false, skew:false, layers:6, speed:0.3 },
  peaceful:{ rotate:false, skew:false, layers:5, speed:0.2 },
  minimal:{ rotate:false, skew:false, layers:4, speed:0.1 },
  simple:{ rotate:false, skew:false, layers:3, speed:0.2 },
  complex:{ rotate:true, skew:true, layers:25, speed:1 },
  epic:{ rotate:true, skew:false, layers:18, speed:1.2 },
  dramatic:{ rotate:true, skew:true, layers:15, speed:0.8 },
  psychedelic:{ rotate:true, skew:true, layers:30, speed:3 },
  trippy:{ rotate:true, skew:true, layers:28, speed:2.5 },
  glitch:{ rotate:true, skew:true, layers:20, speed:4 },
  retro:{ rotate:false, skew:false, layers:10, speed:0.5 },
  big:{ rotate:false, skew:false, layers:8, speed:0.5 },
  tiny:{ rotate:false, skew:false, layers:15, speed:0.8 },
  explosion:{ rotate:true, skew:true, layers:25, speed:2 },
  slow:{ rotate:false, skew:false, layers:8, speed:0.15 },
  fast:{ rotate:true, skew:true, layers:12, speed:3 },
};

function extractColors(words, rng) {
  let colors = [];
  for (const w of words) {
    const key = w.toLowerCase();
    if (COLOR_WORDS[key]) colors.push(...COLOR_WORDS[key]);
  }
  if (colors.length === 0) {
    // Generate from hash
    for (let i = 0; i < 4; i++) {
      const h = Math.floor(rng() * 360);
      const s = 50 + Math.floor(rng() * 50);
      const l = 30 + Math.floor(rng() * 40);
      colors.push(`hsl(${h},${s}%,${l}%)`);
    }
  }
  return colors;
}

function extractShapes(words, rng) {
  let shapes = [];
  for (const w of words) {
    const key = w.toLowerCase();
    if (SHAPE_WORDS[key]) shapes.push(SHAPE_WORDS[key]);
  }
  if (shapes.length === 0) {
    const all = ['circle','square','triangle','blob','diamond','line','star'];
    shapes.push(all[Math.floor(rng()*all.length)]);
    shapes.push(all[Math.floor(rng()*all.length)]);
  }
  return shapes;
}

function extractMood(words) {
  for (const w of words) {
    const key = w.toLowerCase();
    if (MOOD_WORDS[key]) return MOOD_WORDS[key];
  }
  return { rotate: true, skew: false, layers: 12, speed: 1 };
}

function generateShape(type, rng, colors, size) {
  const color = colors[Math.floor(rng()*colors.length)];
  const color2 = colors[Math.floor(rng()*colors.length)];
  const x = rng()*100, y = rng()*100;
  const w = size * (0.5 + rng()*1.5);
  const h = size * (0.5 + rng()*1.5);
  const rot = Math.floor(rng()*360);
  const opacity = 0.3 + rng()*0.7;
  const blur = Math.floor(rng()*15);
  const mixBlend = ['normal','multiply','screen','overlay','color-dodge','hard-light'][Math.floor(rng()*6)];

  let el;
  switch(type) {
    case 'circle':
      el = document.createElement('div');
      Object.assign(el.style, {
        position:'absolute', left:x+'%', top:y+'%',
        width:w+'%', height:w+'%',
        borderRadius:'50%',
        background: rng()>0.5
          ? `radial-gradient(circle,${color},${color2} 70%,transparent)`
          : color,
        opacity, filter:`blur(${blur}px)`, mixBlendMode:mixBlend,
        transform:`translate(-50%,-50%) rotate(${rot}deg)`
      });
      break;
    case 'square':
      el = document.createElement('div');
      const br = Math.floor(rng()*20);
      Object.assign(el.style, {
        position:'absolute', left:x+'%', top:y+'%',
        width:w+'%', height:h+'%',
        borderRadius:br+'%',
        background: rng()>0.4
          ? `linear-gradient(${rot}deg,${color},${color2})`
          : color,
        opacity, filter:`blur(${blur}px)`, mixBlendMode:mixBlend,
        transform:`translate(-50%,-50%) rotate(${rot}deg)`
      });
      break;
    case 'triangle':
      el = document.createElement('div');
      const sz = w*3;
      Object.assign(el.style, {
        position:'absolute', left:x+'%', top:y+'%',
        width:'0', height:'0',
        borderLeft:sz+'px solid transparent',
        borderRight:sz+'px solid transparent',
        borderBottom:sz*1.5+'px solid '+color,
        opacity, filter:`blur(${blur*0.5}px)`, mixBlendMode:mixBlend,
        transform:`translate(-50%,-50%) rotate(${rot}deg)`
      });
      break;
    case 'line':
      el = document.createElement('div');
      const lw = 1+Math.floor(rng()*8);
      Object.assign(el.style, {
        position:'absolute', left:x+'%', top:y+'%',
        width: (20+rng()*60)+'%', height:lw+'px',
        background:`linear-gradient(90deg,transparent,${color},${color2},transparent)`,
        opacity, filter:`blur(${Math.floor(blur*0.3)}px)`, mixBlendMode:mixBlend,
        transform:`translate(-50%,-50%) rotate(${rot}deg)`
      });
      break;
    case 'blob':
      el = document.createElement('div');
      const r1=30+Math.floor(rng()*40), r2=30+Math.floor(rng()*40);
      const r3=30+Math.floor(rng()*40), r4=30+Math.floor(rng()*40);
      Object.assign(el.style, {
        position:'absolute', left:x+'%', top:y+'%',
        width:w*1.5+'%', height:h*1.5+'%',
        borderRadius:`${r1}% ${r2}% ${r3}% ${r4}%`,
        background: `radial-gradient(ellipse,${color},${color2},transparent)`,
        opacity, filter:`blur(${blur+3}px)`, mixBlendMode:mixBlend,
        transform:`translate(-50%,-50%) rotate(${rot}deg)`
      });
      break;
    case 'diamond':
      el = document.createElement('div');
      Object.assign(el.style, {
        position:'absolute', left:x+'%', top:y+'%',
        width:w+'%', height:w+'%',
        background: `linear-gradient(135deg,${color},${color2})`,
        opacity, filter:`blur(${blur*0.5}px)`, mixBlendMode:mixBlend,
        transform:`translate(-50%,-50%) rotate(45deg) scale(${0.5+rng()*0.5})`
      });
      break;
    case 'star':
      el = document.createElement('div');
      const starSz = w * 2;
      Object.assign(el.style, {
        position:'absolute', left:x+'%', top:y+'%',
        width:starSz+'px', height:starSz+'px',
        background:color,
        clipPath:'polygon(50% 0%,61% 35%,98% 35%,68% 57%,79% 91%,50% 70%,21% 91%,32% 57%,2% 35%,39% 35%)',
        opacity, filter:`blur(${Math.floor(blur*0.3)}px)`, mixBlendMode:mixBlend,
        transform:`translate(-50%,-50%) rotate(${rot}deg)`
      });
      break;
    default:
      el = document.createElement('div');
      Object.assign(el.style, {
        position:'absolute', left:x+'%', top:y+'%',
        width:w+'%', height:h+'%', borderRadius:'50%',
        background:color, opacity, filter:`blur(${blur}px)`
      });
  }
  return el;
}

function generateArt(text) {
  const seed = seedHash(text);
  const rng = mulberry32(seed);
  const words = text.toLowerCase().replace(/[^a-z0-9\s]/g,'').split(/\s+/).filter(Boolean);

  const colors = extractColors(words, rng);
  const shapes = extractShapes(words, rng);
  const mood = extractMood(words);

  // Background
  const bgAngle = Math.floor(rng()*360);
  const bg1 = colors[0] || '#111';
  const bg2 = colors[Math.min(1,colors.length-1)] || '#222';
  const bg3 = colors[Math.min(2,colors.length-1)] || '#000';

  const frame = document.createElement('div');
  frame.className = 'art-frame';
  frame.style.background = `linear-gradient(${bgAngle}deg,${bg1},${bg2},${bg3})`;

  // Layers
  const layerCount = mood.layers + Math.floor(rng()*5);
  for (let i = 0; i < layerCount; i++) {
    const shapeType = shapes[Math.floor(rng()*shapes.length)];
    const baseSize = 5 + rng()*20;
    const el = generateShape(shapeType, rng, colors, baseSize);

    // Animation
    if (mood.speed > 0) {
      const dur = 3 + rng()*8 / mood.speed;
      const delay = rng()*-dur;
      const animType = Math.floor(rng()*5);
      let anim = '';
      if (animType === 0 && mood.rotate) {
        anim = `spin ${dur}s linear ${delay}s infinite`;
      } else if (animType === 1) {
        anim = `float ${dur}s ease-in-out ${delay}s infinite alternate`;
      } else if (animType === 2) {
        anim = `pulse ${dur}s ease-in-out ${delay}s infinite alternate`;
      } else if (animType === 3 && mood.skew) {
        anim = `warp ${dur}s ease-in-out ${delay}s infinite alternate`;
      } else {
        anim = `drift ${dur}s ease-in-out ${delay}s infinite alternate`;
      }
      el.style.animation = anim;
    }

    frame.appendChild(el);
  }

  // Title overlay
  const titleEl = document.createElement('div');
  Object.assign(titleEl.style, {
    position:'absolute', bottom:'8px', left:'8px', right:'8px',
    fontFamily:'"Instrument Serif",serif', fontSize:'0.75rem',
    color:'rgba(255,255,255,0.5)', textShadow:'0 1px 4px rgba(0,0,0,0.8)',
    pointerEvents:'none', textAlign:'center', fontStyle:'italic'
  });
  const TITLES = [
    `"${text}" — CSS on Canvas, ${2024+Math.floor(rng()*3)}`,
    `Untitled (${text}) — Mixed CSS Media`,
    `Study of ${text} — Digital Abstraction`,
    `${text}, deconstructed — Pure CSS`,
    `Impression: ${text} — Generative Art`,
    `${text} No.${Math.floor(rng()*99)+1} — Browser Gallery`,
  ];
  titleEl.textContent = TITLES[Math.floor(rng()*TITLES.length)];
  frame.appendChild(titleEl);

  return frame;
}

function addToGallery(text) {
  const card = document.createElement('div');
  card.className = 'card';

  const header = document.createElement('div');
  header.className = 'card-header';
  header.innerHTML = `<span class="card-prompt">"${text}"</span><span class="card-label">CSS ART</span>`;

  const art = generateArt(text);

  const footer = document.createElement('div');
  footer.className = 'card-footer';
  const seed = seedHash(text);
  footer.innerHTML = `<span>seed: ${(seed>>>0).toString(16)}</span>`;
  const regenBtn = document.createElement('button');
  regenBtn.textContent = 'REGENERATE';
  regenBtn.addEventListener('click', () => {
    const newArt = generateArt(text + Date.now());
    card.replaceChild(newArt, card.querySelector('.art-frame'));
  });
  footer.appendChild(regenBtn);

  card.appendChild(header);
  card.appendChild(art);
  card.appendChild(footer);
  gallery.prepend(card);

  // Limit gallery
  while (gallery.children.length > 10) gallery.lastChild.remove();
}

function generate() {
  const text = promptInput.value.trim();
  if (!text) return;
  addToGallery(text);
  promptInput.value = '';
  promptInput.focus();
}

genBtn.addEventListener('click', generate);
promptInput.addEventListener('keydown', e => { if(e.key==='Enter') generate(); });

// CSS animations
const style = document.createElement('style');
style.textContent = `
@keyframes spin{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}
@keyframes float{from{transform:translate(-50%,-50%) translateY(-8%)}to{transform:translate(-50%,-50%) translateY(8%)}}
@keyframes pulse{from{transform:translate(-50%,-50%) scale(0.8);opacity:0.3}to{transform:translate(-50%,-50%) scale(1.2);opacity:0.9}}
@keyframes warp{from{transform:translate(-50%,-50%) skew(-10deg,5deg)}to{transform:translate(-50%,-50%) skew(10deg,-5deg)}}
@keyframes drift{from{transform:translate(-55%,-50%)}to{transform:translate(-45%,-50%)}}
`;
document.head.appendChild(style);

// Starter prompts
const STARTERS = [
  'a sunset over a cyberpunk city',
  'calm ocean with golden light',
  'psychedelic forest of crystals',
  'angry red explosion in space',
  'tiny sad robot in the rain',
  'chaotic neon dream party',
];
addToGallery(STARTERS[Math.floor(Math.random()*STARTERS.length)]);
</script>
</body>
</html>
