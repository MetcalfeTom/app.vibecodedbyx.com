<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Neon Explosive Clicker</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#04030a">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%92%A5">
<meta name="description" content="Click. Numbers shatter into glowing fragments. Pick your target.">
<meta property="og:title" content="Neon Explosive Clicker">
<meta property="og:description" content="Click. Numbers shatter into glowing fragments. Pick your target.">
<meta property="og:url" content="https://sloppy.live/neon-explosive-clicker">
<meta property="og:image" content="https://image.pollinations.ai/prompt/neon%20glowing%20cyan%20magenta%20numerals%20shattering%20into%20bright%20sparks%2C%20dark%20void%2C%20arcade%20cabinet%2C%20chromatic%20aberration%2C%20synthwave?width=1200&height=630&model=flux&seed=4242&nologo=true">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik+Mono+One&family=Major+Mono+Display&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#020108;
    --cyan:#00f5ff;
    --magenta:#ff2bd6;
    --amber:#ffb43c;
    --green:#3cff8a;
    --ink:#f6f4ff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:var(--void);color:var(--ink);font-family:'Space Mono', monospace;-webkit-tap-highlight-color:transparent;user-select:none}
  body{
    background:
      radial-gradient(ellipse 80% 60% at 30% 20%, rgba(0,245,255,0.14), transparent 60%),
      radial-gradient(ellipse 60% 80% at 75% 80%, rgba(255,43,214,0.12), transparent 60%),
      var(--void);
  }
  #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;cursor:crosshair;touch-action:manipulation}
  canvas{position:absolute;inset:0;width:100%;height:100%;display:block}
  #fxCanvas{z-index:1;pointer-events:none}
  #scanlines{position:fixed;inset:0;background:repeating-linear-gradient(0deg, transparent 0 2px, rgba(255,255,255,0.025) 2px 3px);pointer-events:none;z-index:5;mix-blend-mode:overlay}

  .number{
    position:relative;z-index:2;
    font-family:'Rubik Mono One', monospace;
    font-size:clamp(6rem, 22vw, 18rem);
    color:var(--ink);
    text-shadow:
      0 0 4px rgba(255,255,255,0.95),
      0 0 20px var(--cyan),
      0 0 40px var(--cyan),
      0 0 80px rgba(0,245,255,0.5);
    line-height:1;
    pointer-events:none;
    letter-spacing:0.02em;
    transition:transform 0.09s ease-out, color 0.25s ease-out, text-shadow 0.25s ease-out;
    will-change:transform, color;
  }
  .number.win{color:var(--green);text-shadow:0 0 4px white, 0 0 30px var(--green), 0 0 80px var(--green)}

  header{
    position:fixed;top:1.25rem;left:50%;transform:translateX(-50%);z-index:6;
    display:flex;flex-direction:column;align-items:center;gap:0.35rem;pointer-events:none;text-align:center;
  }
  h1{
    font-family:'Major Mono Display', monospace;
    font-size:clamp(1rem, 2vw, 1.5rem);
    letter-spacing:0.35em;
    color:var(--magenta);
    text-shadow:0 0 12px rgba(255,43,214,0.7);
    text-transform:lowercase;
  }
  .tag{font-size:0.65rem;letter-spacing:0.3em;color:rgba(246,244,255,0.55);text-transform:uppercase}

  .hud{
    position:fixed;bottom:1.25rem;left:50%;transform:translateX(-50%);
    z-index:7;display:flex;align-items:center;gap:1rem;
    background:rgba(4,3,10,0.82);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border:1px solid rgba(0,245,255,0.35);
    box-shadow:0 0 24px rgba(0,245,255,0.18), inset 0 0 12px rgba(0,245,255,0.05);
    padding:0.7rem 1.1rem;
    border-radius:0.6rem;
    font-family:'Space Mono', monospace;
    font-size:0.85rem;
    max-width:calc(100% - 2rem);
    flex-wrap:wrap;justify-content:center;
  }
  .hud label{color:rgba(246,244,255,0.7);font-size:0.7rem;letter-spacing:0.18em;text-transform:uppercase;display:flex;align-items:center;gap:0.45rem}
  .hud input{
    background:rgba(0,0,0,0.5);border:1px solid rgba(0,245,255,0.45);
    color:var(--cyan);font-family:inherit;font-size:0.95rem;
    width:6rem;padding:0.4rem 0.5rem;border-radius:0.3rem;
    text-align:center;
  }
  .hud input:focus{outline:none;border-color:var(--magenta);box-shadow:0 0 0 3px rgba(255,43,214,0.28)}
  .hud button{
    background:transparent;border:1px solid rgba(255,180,60,0.65);
    color:var(--amber);font-family:inherit;font-size:0.75rem;
    letter-spacing:0.18em;text-transform:uppercase;
    padding:0.55rem 0.9rem;border-radius:0.3rem;cursor:pointer;
    min-height:2.75rem;min-width:2.75rem;
  }
  .hud button:hover{background:rgba(255,180,60,0.14)}
  .hud button:focus-visible{outline:3px solid var(--amber);outline-offset:2px}

  .stats{display:flex;gap:1rem;align-items:center;font-size:0.75rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(246,244,255,0.65)}
  .stat-val{color:var(--ink);font-size:1rem;display:block;text-align:center;font-weight:700}

  .progress{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg, var(--cyan), var(--magenta));box-shadow:0 0 12px var(--cyan);z-index:8;transition:width 0.18s ease-out}

  .combo{
    position:fixed;left:50%;top:62%;transform:translate(-50%, 0);
    z-index:4;pointer-events:none;
    font-family:'Major Mono Display', monospace;
    font-size:clamp(1.3rem, 3.4vw, 2.4rem);
    color:var(--amber);
    text-shadow:0 0 16px rgba(255,180,60,0.85);
    letter-spacing:0.2em;
    opacity:0;
    transition:opacity 0.22s ease-out, transform 0.18s ease-out;
  }
  .combo.live{opacity:1;transform:translate(-50%, -8px)}

  .win-overlay{
    position:fixed;inset:0;z-index:20;display:none;align-items:center;justify-content:center;flex-direction:column;gap:1.2rem;
    background:radial-gradient(circle at center, rgba(60,255,138,0.18), rgba(0,0,0,0.92));
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    text-align:center;padding:1.5rem;
  }
  .win-overlay.show{display:flex}
  .win-overlay h2{
    font-family:'Rubik Mono One', monospace;
    font-size:clamp(2rem, 7vw, 5rem);
    color:var(--green);
    text-shadow:0 0 4px white, 0 0 40px var(--green);
    letter-spacing:0.08em;
  }
  .win-overlay p{font-size:0.95rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(246,244,255,0.85)}
  .win-overlay button{
    margin-top:0.6rem;
    background:transparent;border:2px solid var(--green);color:var(--green);
    font-family:'Major Mono Display', monospace;
    font-size:1rem;letter-spacing:0.3em;text-transform:lowercase;
    padding:0.9rem 2rem;cursor:pointer;border-radius:0.4rem;
    min-height:2.75rem;
    box-shadow:0 0 20px rgba(60,255,138,0.4);
  }
  .win-overlay button:hover{background:rgba(60,255,138,0.15)}
  .win-overlay button:focus-visible{outline:3px solid var(--ink);outline-offset:3px}

  .hint{
    position:fixed;left:50%;top:78%;transform:translateX(-50%);
    z-index:3;font-size:0.75rem;letter-spacing:0.3em;
    color:rgba(246,244,255,0.5);text-transform:uppercase;
    pointer-events:none;
    transition:opacity 0.5s ease-out;
    text-align:center;
  }
  .hint.hide{opacity:0}

  @media (max-width: 540px){
    header{top:0.7rem}
    .combo{top:66%}
    .hint{top:80%;font-size:0.65rem}
    .hud{gap:0.55rem;padding:0.55rem 0.7rem}
    .hud input{width:4.6rem}
  }

  @media (prefers-reduced-motion: reduce){
    .number{transition:color 0.25s linear}
    .progress{transition:none}
    .combo{transition:opacity 0.2s linear}
  }
</style>
</head>
<body>
  <div class="progress" id="progressBar" style="width:0%" aria-hidden="true"></div>
  <header>
    <h1>neon · explosive · clicker</h1>
    <div class="tag">shatter the count</div>
  </header>
  <main id="stage" role="application" aria-label="Click anywhere or press space to increment the counter. Numbers shatter on each click.">
    <canvas id="fxCanvas" aria-hidden="true"></canvas>
    <div class="number" id="numberDisplay" aria-live="polite" aria-atomic="true">0</div>
    <div class="combo" id="combo" aria-hidden="true">x1</div>
    <div class="hint" id="hint">click · tap · space</div>
  </main>
  <div id="scanlines" aria-hidden="true"></div>
  <div class="hud" role="group" aria-label="Game controls">
    <div class="stats">
      <div><span class="stat-val" id="ppsVal">0</span><label>clicks/sec</label></div>
      <div><span class="stat-val" id="bestVal">x1</span><label>best combo</label></div>
    </div>
    <label for="targetInput">target
      <input id="targetInput" type="number" min="1" max="1000000" value="1000" inputmode="numeric">
    </label>
    <button id="resetBtn" type="button" aria-label="Reset count">reset</button>
    <button id="muteBtn" type="button" aria-pressed="false" aria-label="Toggle sound">♪ on</button>
  </div>
  <div class="win-overlay" id="winOverlay" role="dialog" aria-modal="true" aria-hidden="true" aria-labelledby="winTitle">
    <h2 id="winTitle">target crushed</h2>
    <p id="winStats">0 clicks · 0.0s · best combo x1</p>
    <button id="winRestart" type="button">click again</button>
  </div>

<script>
(function(){
  'use strict';

  var state = {
    count: 0,
    target: 1000,
    bestCombo: 1,
    combo: 1,
    lastClickT: 0,
    startT: 0,
    won: false,
    clickWindow: []
  };

  var COMBO_WINDOW_MS = 380;
  var hueWheel = [185, 320, 35, 145, 280, 0, 60, 220];
  var hueIdx = 0;

  var $ = function(id){ return document.getElementById(id); };
  var numDisplay = $('numberDisplay');
  var comboEl = $('combo');
  var hintEl = $('hint');
  var progressBar = $('progressBar');
  var targetInput = $('targetInput');
  var resetBtn = $('resetBtn');
  var muteBtn = $('muteBtn');
  var ppsVal = $('ppsVal');
  var bestVal = $('bestVal');
  var winOverlay = $('winOverlay');
  var winStats = $('winStats');
  var winRestart = $('winRestart');
  var stageEl = $('stage');

  var fxCanvas = $('fxCanvas');
  var fx = fxCanvas.getContext('2d');
  var sampleCanvas = document.createElement('canvas');
  var sampleCtx = sampleCanvas.getContext('2d', { willReadFrequently: true });
  var DPR = Math.min(window.devicePixelRatio || 1, 2);

  function resize(){
    fxCanvas.width = Math.floor(innerWidth * DPR);
    fxCanvas.height = Math.floor(innerHeight * DPR);
    fxCanvas.style.width = innerWidth + 'px';
    fxCanvas.style.height = innerHeight + 'px';
    fx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  resize();
  addEventListener('resize', resize);

  var particles = [];
  var MAX_PARTICLES = 1400;
  var prefersReducedMotion = matchMedia('(prefers-reduced-motion: reduce)').matches;

  function shatterNumber(text, hue, intensity){
    if (prefersReducedMotion) intensity = Math.min(intensity, 0.4);
    var fontSize = Math.min(innerHeight * 0.42, innerWidth * 0.30);
    if (fontSize < 80) fontSize = 80;
    var pad = Math.ceil(fontSize * 0.2);
    sampleCanvas.width = Math.max(120, Math.ceil(fontSize * text.length * 0.85 + pad * 2));
    sampleCanvas.height = Math.ceil(fontSize * 1.2 + pad * 2);
    sampleCtx.clearRect(0, 0, sampleCanvas.width, sampleCanvas.height);
    sampleCtx.fillStyle = '#fff';
    sampleCtx.font = 'normal ' + Math.floor(fontSize) + 'px "Rubik Mono One", monospace';
    sampleCtx.textAlign = 'center';
    sampleCtx.textBaseline = 'middle';
    sampleCtx.fillText(text, sampleCanvas.width / 2, sampleCanvas.height / 2);

    var img;
    try { img = sampleCtx.getImageData(0, 0, sampleCanvas.width, sampleCanvas.height); }
    catch(e){ return; }

    var step = prefersReducedMotion ? 10 : Math.max(5, Math.floor(9 - intensity * 2));
    var cx = innerWidth / 2;
    var cy = innerHeight / 2;
    var ox = cx - sampleCanvas.width / 2;
    var oy = cy - sampleCanvas.height / 2;
    var spawned = 0;
    var cap = Math.floor(260 + intensity * 200);

    outer:
    for (var y = 0; y < sampleCanvas.height; y += step){
      for (var x = 0; x < sampleCanvas.width; x += step){
        var i = (y * sampleCanvas.width + x) * 4;
        if (img.data[i + 3] > 100){
          if (spawned >= cap) break outer;
          var px = ox + x;
          var py = oy + y;
          var dx = px - cx;
          var dy = py - cy;
          var d = Math.sqrt(dx*dx + dy*dy) || 1;
          var ang = Math.atan2(dy, dx) + (Math.random() - 0.5) * 0.7;
          var speed = 180 + Math.random() * 240 + intensity * 180;
          particles.push({
            x: px, y: py,
            vx: Math.cos(ang) * speed,
            vy: Math.sin(ang) * speed - Math.random() * 40,
            life: 0,
            ttl: 0.7 + Math.random() * 0.7,
            size: 2 + Math.random() * 3,
            hue: hue + (Math.random() - 0.5) * 24,
            type: 'frag'
          });
          spawned++;
        }
      }
    }

    var sparkCount = Math.floor(20 + intensity * 28);
    for (var s = 0; s < sparkCount; s++){
      var sang = Math.random() * Math.PI * 2;
      var ssp = 80 + Math.random() * 420;
      particles.push({
        x: cx + (Math.random() - 0.5) * 40,
        y: cy + (Math.random() - 0.5) * 40,
        vx: Math.cos(sang) * ssp,
        vy: Math.sin(sang) * ssp - 60,
        life: 0,
        ttl: 0.5 + Math.random() * 0.6,
        size: 1 + Math.random() * 2,
        hue: (hue + (Math.random() < 0.5 ? -60 : 60) + 360) % 360,
        type: 'spark'
      });
    }

    particles.push({
      x: cx, y: cy,
      r: 8,
      vr: 360 + intensity * 220,
      life: 0,
      ttl: 0.6,
      hue: hue,
      type: 'ring'
    });

    if (particles.length > MAX_PARTICLES){
      particles.splice(0, particles.length - MAX_PARTICLES);
    }
  }

  var last = performance.now();
  function frame(now){
    var dt = Math.min(0.05, (now - last) / 1000);
    last = now;

    fx.globalCompositeOperation = 'source-over';
    fx.fillStyle = 'rgba(2,1,8,0.30)';
    fx.fillRect(0, 0, innerWidth, innerHeight);

    fx.globalCompositeOperation = 'lighter';

    for (var i = particles.length - 1; i >= 0; i--){
      var p = particles[i];
      p.life += dt;
      if (p.life >= p.ttl){
        particles.splice(i, 1);
        continue;
      }
      var t = 1 - p.life / p.ttl;

      if (p.type === 'ring'){
        p.r += p.vr * dt;
        fx.beginPath();
        fx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        fx.lineWidth = 4 * t;
        fx.strokeStyle = 'hsla(' + p.hue + ', 100%, 65%, ' + (t * 0.7) + ')';
        fx.shadowColor = 'hsla(' + p.hue + ', 100%, 70%, ' + t + ')';
        fx.shadowBlur = 22 * t;
        fx.stroke();
        fx.shadowBlur = 0;
      } else {
        p.vx *= 0.985;
        p.vy = p.vy * 0.985 + 110 * dt;
        p.x += p.vx * dt;
        p.y += p.vy * dt;
        var alpha = t * (p.type === 'spark' ? 0.95 : 0.85);
        var rad = p.size * (0.4 + t * 0.6);
        fx.fillStyle = 'hsla(' + p.hue + ', 100%, ' + (60 + t * 20) + '%, ' + alpha + ')';
        fx.shadowColor = 'hsla(' + p.hue + ', 100%, 65%, ' + alpha + ')';
        fx.shadowBlur = 10;
        fx.beginPath();
        fx.arc(p.x, p.y, rad, 0, Math.PI * 2);
        fx.fill();
        fx.shadowBlur = 0;
      }
    }

    fx.globalCompositeOperation = 'source-over';

    while (state.clickWindow.length && now - state.clickWindow[0] > 1000){
      state.clickWindow.shift();
    }
    ppsVal.textContent = state.clickWindow.length;

    if (state.combo > 1 && now - state.lastClickT > COMBO_WINDOW_MS){
      state.combo = 1;
      comboEl.classList.remove('live');
    }

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  var audioCtx = null;
  var muted = false;
  function ensureAudio(){
    if (audioCtx) {
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return audioCtx;
    }
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e){ audioCtx = null; }
    return audioCtx;
  }
  function playClick(combo){
    if (muted) return;
    var ctx = ensureAudio();
    if (!ctx) return;
    var t = ctx.currentTime;
    var f0 = 380 + Math.min(combo, 30) * 28;
    var osc = ctx.createOscillator();
    osc.type = 'triangle';
    osc.frequency.setValueAtTime(f0, t);
    osc.frequency.exponentialRampToValueAtTime(Math.max(80, f0 * 0.5), t + 0.18);
    var g = ctx.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.22, t + 0.005);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
    osc.connect(g).connect(ctx.destination);
    osc.start(t);
    osc.stop(t + 0.25);
    var bufSize = Math.floor(ctx.sampleRate * 0.12);
    var buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    var data = buf.getChannelData(0);
    for (var i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 2.2);
    var noise = ctx.createBufferSource();
    noise.buffer = buf;
    var bp = ctx.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = 2200 + combo * 80;
    bp.Q.value = 1.4;
    var ng = ctx.createGain();
    ng.gain.value = 0.15;
    noise.connect(bp).connect(ng).connect(ctx.destination);
    noise.start(t);
  }
  function playWin(){
    if (muted) return;
    var ctx = ensureAudio();
    if (!ctx) return;
    var notes = [523.25, 659.25, 783.99, 1046.5, 1318.5];
    notes.forEach(function(f, i){
      var t = ctx.currentTime + i * 0.09;
      var osc = ctx.createOscillator();
      osc.type = 'triangle';
      osc.frequency.value = f;
      var g = ctx.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.28, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t + 0.55);
      osc.connect(g).connect(ctx.destination);
      osc.start(t);
      osc.stop(t + 0.6);
    });
    var t = ctx.currentTime;
    var sub = ctx.createOscillator();
    sub.type = 'sine';
    sub.frequency.setValueAtTime(160, t);
    sub.frequency.exponentialRampToValueAtTime(40, t + 0.6);
    var sg = ctx.createGain();
    sg.gain.setValueAtTime(0.0001, t);
    sg.gain.exponentialRampToValueAtTime(0.4, t + 0.02);
    sg.gain.exponentialRampToValueAtTime(0.0001, t + 0.8);
    sub.connect(sg).connect(ctx.destination);
    sub.start(t);
    sub.stop(t + 0.85);
  }

  function doClick(){
    if (state.won) return;
    var now = performance.now();
    if (state.count === 0 && state.startT === 0) state.startT = now;

    if (state.lastClickT > 0 && now - state.lastClickT <= COMBO_WINDOW_MS){
      state.combo++;
      comboEl.classList.add('live');
    } else {
      state.combo = 1;
      comboEl.classList.remove('live');
    }
    if (state.combo > state.bestCombo){
      state.bestCombo = state.combo;
      bestVal.textContent = 'x' + state.bestCombo;
    }
    state.lastClickT = now;
    state.clickWindow.push(now);

    var oldCount = state.count;
    state.count++;
    if (state.count > state.target) state.count = state.target;

    numDisplay.textContent = state.count;
    comboEl.textContent = 'x' + state.combo;
    progressBar.style.width = Math.min(100, (state.count / state.target) * 100) + '%';

    var hue = hueWheel[hueIdx % hueWheel.length];
    hueIdx++;
    var intensity = Math.min(2.5, state.combo * 0.1 + 0.3);

    numDisplay.style.color = 'hsl(' + hue + ', 100%, 75%)';
    numDisplay.style.textShadow =
      '0 0 4px white,' +
      '0 0 20px hsl(' + hue + ', 100%, 65%),' +
      '0 0 40px hsl(' + hue + ', 100%, 60%),' +
      '0 0 80px hsla(' + hue + ', 100%, 55%, 0.5)';
    var scale = 1 + Math.min(0.20, intensity * 0.07);
    numDisplay.style.transform = 'scale(' + scale + ')';
    setTimeout(function(){ numDisplay.style.transform = 'scale(1)'; }, 90);

    shatterNumber(String(oldCount), hue, intensity);
    playClick(state.combo);

    if (!hintEl.classList.contains('hide')){
      hintEl.classList.add('hide');
    }

    if (state.count >= state.target){
      win();
    }
  }

  function win(){
    state.won = true;
    numDisplay.classList.add('win');
    var elapsed = ((performance.now() - state.startT) / 1000).toFixed(1);
    winStats.textContent = state.target.toLocaleString() + ' clicks · ' + elapsed + 's · best combo x' + state.bestCombo;
    winOverlay.classList.add('show');
    winOverlay.setAttribute('aria-hidden', 'false');
    winRestart.focus();
    for (var k = 0; k < 5; k++){
      (function(delay){
        setTimeout(function(){ shatterNumber(String(state.target), 145, 2.4); }, delay);
      })(k * 110);
    }
    playWin();
  }

  function resetGame(){
    state.count = 0;
    state.combo = 1;
    state.bestCombo = 1;
    state.lastClickT = 0;
    state.startT = 0;
    state.won = false;
    state.clickWindow = [];
    numDisplay.textContent = '0';
    numDisplay.classList.remove('win');
    numDisplay.style.color = '';
    numDisplay.style.textShadow = '';
    numDisplay.style.transform = '';
    progressBar.style.width = '0%';
    ppsVal.textContent = '0';
    bestVal.textContent = 'x1';
    comboEl.classList.remove('live');
    winOverlay.classList.remove('show');
    winOverlay.setAttribute('aria-hidden', 'true');
    particles.length = 0;
    hueIdx = 0;
    hintEl.classList.remove('hide');
  }

  stageEl.addEventListener('pointerdown', function(e){
    if (e.target.closest('.hud') || e.target.closest('.win-overlay')) return;
    ensureAudio();
    doClick();
  });

  addEventListener('keydown', function(e){
    if (e.target && e.target.tagName === 'INPUT') return;
    if (e.code === 'Space' || e.code === 'Enter'){
      e.preventDefault();
      ensureAudio();
      doClick();
    } else if (e.code === 'KeyR'){
      resetGame();
    } else if (e.code === 'KeyM'){
      muted = !muted;
      muteBtn.textContent = muted ? '♪ off' : '♪ on';
      muteBtn.setAttribute('aria-pressed', muted ? 'true' : 'false');
    }
  });

  targetInput.addEventListener('change', function(){
    var v = parseInt(targetInput.value, 10);
    if (!v || v < 1) v = 1;
    if (v > 1000000) v = 1000000;
    state.target = v;
    targetInput.value = v;
    progressBar.style.width = Math.min(100, (state.count / state.target) * 100) + '%';
    if (state.won && state.count < state.target){
      state.won = false;
      numDisplay.classList.remove('win');
      winOverlay.classList.remove('show');
      winOverlay.setAttribute('aria-hidden', 'true');
    }
  });

  resetBtn.addEventListener('click', function(e){
    e.stopPropagation();
    resetGame();
  });

  muteBtn.addEventListener('click', function(e){
    e.stopPropagation();
    muted = !muted;
    muteBtn.textContent = muted ? '♪ off' : '♪ on';
    muteBtn.setAttribute('aria-pressed', muted ? 'true' : 'false');
    if (!muted) ensureAudio();
  });

  winRestart.addEventListener('click', function(e){
    e.stopPropagation();
    resetGame();
  });

  ['.hud', '.win-overlay'].forEach(function(sel){
    var el = document.querySelector(sel);
    if (el) el.addEventListener('pointerdown', function(e){ e.stopPropagation(); });
  });
})();
</script>
</body>
</html>
