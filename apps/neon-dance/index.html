<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Neon Dance</title>
<link rel="icon" href="https://emojicdn.elk.sh/💃">
<meta property="og:title" content="Neon Dance">
<meta property="og:description" content="Hit the arrows to the beat. Don't miss a step.">
<meta property="og:url" content="https://sloppy.live/neon-dance">
<meta property="og:image" content="https://sloppy.live/neon-dance/og-image.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08000f;--lane:#0e0618;--border:#1a0e30;
  --left:#ff2d7b;--down:#00e5ff;--up:#76ff03;--right:#ffd740;
  --text:#d8d0e8;--dim:#4a3868;--perfect:#ff2d7b;--great:#ffd740;--good:#00e5ff;--miss:#ff3333;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;overflow:hidden;user-select:none;-webkit-tap-highlight-color:transparent}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at 50% 80%,rgba(255,45,123,0.05),transparent 50%),radial-gradient(ellipse at 50% 20%,rgba(0,229,255,0.04),transparent 50%),var(--bg)}

.game{width:min(420px,96vw);height:min(680px,92vh);position:relative;display:flex;flex-direction:column}

/* HUD */
.hud{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;flex-shrink:0;z-index:5}
.hud-item{text-align:center}
.hud-label{font-size:8px;color:var(--dim);letter-spacing:1px;text-transform:uppercase}
.hud-val{font-family:'Bungee',sans-serif;font-size:16px}
.hud-val.score{color:var(--left)}
.hud-val.combo{color:var(--right)}
.hud-val.multi{color:var(--up)}

/* Song info */
.song-bar{text-align:center;padding:4px 0;flex-shrink:0;z-index:5}
.song-name{font-family:'Bungee',sans-serif;font-size:clamp(11px,2.5vw,14px);color:var(--left);letter-spacing:2px}
.song-bpm{font-size:9px;color:var(--dim)}

/* Play field */
.field{flex:1;position:relative;overflow:hidden;border-left:1px solid var(--border);border-right:1px solid var(--border)}

/* Lane backgrounds */
.lanes{position:absolute;inset:0;display:flex}
.lane{flex:1;border-right:1px solid rgba(255,255,255,0.03)}
.lane:last-child{border-right:none}
.lane:nth-child(1){background:linear-gradient(180deg,transparent 80%,rgba(255,45,123,0.04))}
.lane:nth-child(2){background:linear-gradient(180deg,transparent 80%,rgba(0,229,255,0.04))}
.lane:nth-child(3){background:linear-gradient(180deg,transparent 80%,rgba(118,255,3,0.04))}
.lane:nth-child(4){background:linear-gradient(180deg,transparent 80%,rgba(255,215,64,0.04))}

/* Target zone */
.target-zone{
  position:absolute;bottom:60px;left:0;right:0;height:50px;
  display:flex;z-index:3;
}
.target{
  flex:1;display:flex;align-items:center;justify-content:center;
  font-size:28px;opacity:0.4;transition:all 0.08s;position:relative;
}
.target::before{content:'';position:absolute;inset:0;border-top:2px solid;border-bottom:2px solid;opacity:0.3}
.target:nth-child(1){color:var(--left)}.target:nth-child(1)::before{border-color:var(--left)}
.target:nth-child(2){color:var(--down)}.target:nth-child(2)::before{border-color:var(--down)}
.target:nth-child(3){color:var(--up)}.target:nth-child(3)::before{border-color:var(--up)}
.target:nth-child(4){color:var(--right)}.target:nth-child(4)::before{border-color:var(--right)}
.target.hit{opacity:1;transform:scale(1.2)}

/* Arrows (notes) */
.arrow{
  position:absolute;width:25%;height:44px;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;z-index:2;transition:none;
  filter:drop-shadow(0 0 8px currentColor);
}
.arrow.l0{left:0;color:var(--left)}
.arrow.l1{left:25%;color:var(--down)}
.arrow.l2{left:50%;color:var(--up)}
.arrow.l3{left:75%;color:var(--right)}
.arrow.hit-anim{animation:hitPop 0.2s ease-out forwards}
@keyframes hitPop{to{transform:scale(1.6);opacity:0}}

/* Judgment text */
.judgment{
  position:absolute;bottom:120px;left:50%;transform:translateX(-50%);
  font-family:'Bungee',sans-serif;font-size:clamp(18px,4vw,24px);
  pointer-events:none;z-index:10;opacity:0;
  animation:judgeFade 0.6s ease-out forwards;
  text-shadow:0 0 20px currentColor;letter-spacing:2px;
}
@keyframes judgeFade{0%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}100%{opacity:0;transform:translateX(-50%) translateY(-30px) scale(1.1)}}
.judgment.perfect{color:var(--perfect)}
.judgment.great{color:var(--great)}
.judgment.good{color:var(--good)}
.judgment.miss{color:var(--miss)}

/* Progress bar */
.progress-bar{position:absolute;bottom:0;left:0;right:0;height:4px;background:var(--border);z-index:5}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--left),var(--right));transition:width 0.3s;width:0%}

/* Mobile touch buttons */
.touch-row{display:none;flex-shrink:0;z-index:5}
@media(max-width:768px),(pointer:coarse){
  .touch-row{display:flex;height:80px}
}
.touch-btn{
  flex:1;display:flex;align-items:center;justify-content:center;
  font-size:32px;border:none;cursor:pointer;transition:all 0.08s;
  -webkit-tap-highlight-color:transparent;
}
.touch-btn:nth-child(1){background:rgba(255,45,123,0.12);color:var(--left)}
.touch-btn:nth-child(2){background:rgba(0,229,255,0.12);color:var(--down)}
.touch-btn:nth-child(3){background:rgba(118,255,3,0.12);color:var(--up)}
.touch-btn:nth-child(4){background:rgba(255,215,64,0.12);color:var(--right)}
.touch-btn:active{filter:brightness(2);transform:scale(0.95)}

/* Overlay */
.overlay{position:absolute;inset:0;background:rgba(8,0,15,0.94);display:flex;align-items:center;justify-content:center;z-index:30;backdrop-filter:blur(4px)}
.overlay.hidden{display:none}
.overlay-box{text-align:center;padding:20px;max-width:340px}
.overlay-box h2{font-family:'Bungee',sans-serif;font-size:clamp(22px,5vw,30px);
  background:linear-gradient(135deg,var(--left),var(--down),var(--up),var(--right));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  letter-spacing:3px;margin-bottom:6px}
.overlay-box .sub{color:var(--dim);font-size:12px;margin-bottom:16px;line-height:1.5}
.overlay-box .stats{font-size:13px;color:var(--text);line-height:2;margin-bottom:16px}
.overlay-box .stats span{font-weight:700}
.overlay-box .stats .perfect-c{color:var(--perfect)}
.overlay-box .stats .great-c{color:var(--great)}
.overlay-box .stats .good-c{color:var(--good)}
.overlay-box .stats .miss-c{color:var(--miss)}

.song-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;max-height:240px;overflow-y:auto}
.song-pick{
  background:var(--lane);border:1px solid var(--border);border-radius:8px;
  padding:10px 14px;cursor:pointer;text-align:left;transition:all 0.2s;
  display:flex;justify-content:space-between;align-items:center;
}
.song-pick:hover{border-color:var(--left);background:rgba(255,45,123,0.08)}
.song-pick .s-name{font-family:'Bungee',sans-serif;font-size:12px;color:var(--left);letter-spacing:1px}
.song-pick .s-info{font-size:10px;color:var(--dim)}
.song-pick .s-diff{font-size:9px;padding:2px 8px;border-radius:10px;border:1px solid var(--dim);color:var(--dim)}
.song-pick .s-diff.easy{border-color:var(--up);color:var(--up)}
.song-pick .s-diff.med{border-color:var(--right);color:var(--right)}
.song-pick .s-diff.hard{border-color:var(--left);color:var(--left)}

.backlink{position:fixed;bottom:6px;font-size:10px;color:var(--dim);z-index:1}
.backlink a{color:var(--left);text-decoration:none}
</style>
</head>
<body>
<div class="game" id="game">
  <div class="hud">
    <div class="hud-item"><div class="hud-label">SCORE</div><div class="hud-val score" id="score">0</div></div>
    <div class="hud-item"><div class="hud-label">COMBO</div><div class="hud-val combo" id="combo">0</div></div>
    <div class="hud-item"><div class="hud-label">MULTI</div><div class="hud-val multi" id="multi">×1</div></div>
  </div>
  <div class="song-bar"><div class="song-name" id="songName">—</div><div class="song-bpm" id="songBpm">—</div></div>

  <div class="field" id="field">
    <div class="lanes"><div class="lane"></div><div class="lane"></div><div class="lane"></div><div class="lane"></div></div>
    <div class="target-zone" id="targets">
      <div class="target" id="t0">◄</div>
      <div class="target" id="t1">▼</div>
      <div class="target" id="t2">▲</div>
      <div class="target" id="t3">►</div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>

    <div class="overlay" id="overlay">
      <div class="overlay-box">
        <h2>NEON DANCE</h2>
        <div class="sub">Hit the arrows when they reach the targets.<br>Use ← ↓ ↑ → or WASD. Tap on mobile.</div>
        <div class="song-list" id="songList"></div>
      </div>
    </div>
  </div>

  <div class="touch-row">
    <button class="touch-btn" data-lane="0">◄</button>
    <button class="touch-btn" data-lane="1">▼</button>
    <button class="touch-btn" data-lane="2">▲</button>
    <button class="touch-btn" data-lane="3">►</button>
  </div>
</div>
<div class="backlink"><a href="https://sloppy.live">sloppy.live</a></div>

<script>
(function(){
'use strict';

// ========== SONGS (procedural charts) ==========
const SONGS = [
  { name: 'NEON PULSE',    bpm: 120, dur: 45, diff: 'easy',  desc: 'Warm up' },
  { name: 'CITY LIGHTS',   bpm: 128, dur: 50, diff: 'easy',  desc: 'Steady groove' },
  { name: 'ELECTRIC SLIDE', bpm: 130, dur: 50, diff: 'med',  desc: 'Getting tricky' },
  { name: 'SYNTH RUSH',    bpm: 138, dur: 55, diff: 'med',   desc: 'Double steps' },
  { name: 'LASER STORM',   bpm: 145, dur: 55, diff: 'med',   desc: 'Fast patterns' },
  { name: 'TURBO FUNK',    bpm: 150, dur: 60, diff: 'hard',  desc: 'No mercy' },
  { name: 'CYBER RAVE',    bpm: 160, dur: 60, diff: 'hard',  desc: 'Endurance test' },
  { name: 'VOID BREAKER',  bpm: 170, dur: 65, diff: 'hard',  desc: 'Maximum intensity' },
];

// ========== CHART GENERATOR ==========
function generateChart(song) {
  const bpm = song.bpm;
  const dur = song.dur;
  const beatDur = 60 / bpm;
  const totalBeats = Math.floor(dur / beatDur);
  const notes = [];
  let seed = hashStr(song.name);

  function rng() { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return (seed >> 16) / 32768; }
  function hashStr(s) { let h = 0; for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0; return Math.abs(h); }

  const density = song.diff === 'easy' ? 0.45 : song.diff === 'med' ? 0.6 : 0.75;
  const doubleChance = song.diff === 'easy' ? 0.02 : song.diff === 'med' ? 0.08 : 0.15;
  const holdChance = song.diff === 'easy' ? 0.05 : song.diff === 'med' ? 0.1 : 0.15;
  let lastLane = -1;

  // Generate patterns
  for (let b = 2; b < totalBeats - 2; b++) {
    // Main beats
    if (rng() < density) {
      let lane = Math.floor(rng() * 4);
      // Avoid too many repeats
      if (lane === lastLane && rng() < 0.6) lane = Math.floor(rng() * 4);
      const time = b * beatDur;
      notes.push({ time, lane, type: 'tap' });
      lastLane = lane;

      // Double note chance
      if (rng() < doubleChance) {
        let lane2 = Math.floor(rng() * 4);
        while (lane2 === lane) lane2 = Math.floor(rng() * 4);
        notes.push({ time, lane: lane2, type: 'tap' });
      }
    }

    // Off-beat (8th notes) for harder diffs
    if (song.diff !== 'easy' && rng() < density * 0.3) {
      const time = (b + 0.5) * beatDur;
      const lane = Math.floor(rng() * 4);
      notes.push({ time, lane, type: 'tap' });
    }

    // 16th notes for hard
    if (song.diff === 'hard' && rng() < 0.08) {
      const time = (b + 0.25) * beatDur;
      const lane = Math.floor(rng() * 4);
      notes.push({ time, lane, type: 'tap' });
    }
  }

  // Sort by time
  notes.sort((a, b) => a.time - b.time);
  return notes;
}

// ========== STATE ==========
const S = {
  phase: 'menu', // menu | playing | results
  song: null,
  chart: [],
  noteIdx: 0,
  activeNotes: [], // {time, lane, type, el, hit, missed}
  score: 0,
  combo: 0,
  maxCombo: 0,
  multiplier: 1,
  perfects: 0,
  greats: 0,
  goods: 0,
  misses: 0,
  startTime: 0,
  animFrame: null,
};

// Timing windows (seconds from perfect)
const PERFECT_W = 0.045;
const GREAT_W = 0.09;
const GOOD_W = 0.14;
const MISS_W = 0.20;

// ========== DOM ==========
const $ = id => document.getElementById(id);
const field = $('field');
const overlay = $('overlay');
const songList = $('songList');
const progressFill = $('progressFill');
const ARROWS = ['◄','▼','▲','►'];
const LANE_CLASSES = ['l0','l1','l2','l3'];

// ========== AUDIO ENGINE ==========
let audioCtx = null;
let masterGain = null;
let kickInterval = null;

function audio() {
  if (!audioCtx) {
    try {
      audioCtx = new (window.AudioContext||window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.4;
      masterGain.connect(audioCtx.destination);
    } catch { return null; }
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

function beep(freq, dur, type='sine', vol=0.06) {
  const ctx = audio(); if (!ctx) return;
  const o = ctx.createOscillator();
  const g = ctx.createGain();
  o.type = type; o.frequency.value = freq;
  g.gain.setValueAtTime(vol, ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
  o.connect(g).connect(masterGain);
  o.start(); o.stop(ctx.currentTime + dur);
}

function hitSound(judge) {
  if (judge === 'perfect') { beep(880, 0.06, 'triangle', 0.08); setTimeout(() => beep(1100, 0.04, 'triangle', 0.06), 30); }
  else if (judge === 'great') { beep(660, 0.06, 'triangle', 0.06); }
  else if (judge === 'good') { beep(440, 0.06, 'square', 0.04); }
  else { beep(150, 0.1, 'sawtooth', 0.04); }
}

// Procedural beat track
function startBeatTrack(bpm) {
  const ctx = audio(); if (!ctx) return;
  const beatDur = 60 / bpm;
  let beat = 0;

  function scheduleBeat() {
    const now = ctx.currentTime;
    // Kick
    const kickO = ctx.createOscillator();
    const kickG = ctx.createGain();
    kickO.frequency.setValueAtTime(beat % 4 === 0 ? 160 : 120, now);
    kickO.frequency.exponentialRampToValueAtTime(30, now + 0.08);
    kickG.gain.setValueAtTime(beat % 4 === 0 ? 0.12 : 0.07, now);
    kickG.gain.exponentialRampToValueAtTime(0.001, now + 0.1);
    kickO.connect(kickG).connect(masterGain);
    kickO.start(now); kickO.stop(now + 0.1);

    // Hi-hat
    const hLen = 0.03;
    const hBuf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * hLen), ctx.sampleRate);
    const hd = hBuf.getChannelData(0);
    for (let i = 0; i < hd.length; i++) hd[i] = Math.random() * 2 - 1;
    const hs = ctx.createBufferSource();
    const hg = ctx.createGain();
    const hf = ctx.createBiquadFilter();
    hs.buffer = hBuf;
    hf.type = 'highpass'; hf.frequency.value = 8000;
    hg.gain.setValueAtTime(beat % 2 === 0 ? 0.04 : 0.025, now);
    hg.gain.exponentialRampToValueAtTime(0.001, now + hLen);
    hs.connect(hf).connect(hg).connect(masterGain);
    hs.start(now);

    // Snare on 2 and 4
    if (beat % 4 === 2) {
      const sLen = 0.06;
      const sBuf = ctx.createBuffer(1, Math.floor(ctx.sampleRate * sLen), ctx.sampleRate);
      const sd = sBuf.getChannelData(0);
      for (let i = 0; i < sd.length; i++) sd[i] = Math.random() * 2 - 1;
      const ss = ctx.createBufferSource();
      const sg = ctx.createGain();
      const sf = ctx.createBiquadFilter();
      ss.buffer = sBuf;
      sf.type = 'bandpass'; sf.frequency.value = 3000; sf.Q.value = 1;
      sg.gain.setValueAtTime(0.06, now);
      sg.gain.exponentialRampToValueAtTime(0.001, now + sLen);
      ss.connect(sf).connect(sg).connect(masterGain);
      ss.start(now);
    }

    // Bass note every 4 beats
    if (beat % 4 === 0) {
      const bo = ctx.createOscillator();
      const bg = ctx.createGain();
      bo.type = 'sawtooth';
      const notes = [55, 65.4, 73.4, 82.4];
      bo.frequency.value = notes[Math.floor(beat / 4) % notes.length];
      bg.gain.setValueAtTime(0.05, now);
      bg.gain.exponentialRampToValueAtTime(0.001, now + beatDur * 1.5);
      bo.connect(bg).connect(masterGain);
      bo.start(now); bo.stop(now + beatDur * 1.5);
    }

    beat++;
  }

  kickInterval = setInterval(scheduleBeat, beatDur * 1000);
  scheduleBeat();
}

function stopBeatTrack() {
  if (kickInterval) { clearInterval(kickInterval); kickInterval = null; }
}

// ========== GAME LOGIC ==========
const SCROLL_SPEED = 400; // pixels per second
const TARGET_Y_OFFSET = 60; // from bottom

function getFieldHeight() { return field.clientHeight; }
function getTargetY() { return getFieldHeight() - TARGET_Y_OFFSET - 25; } // center of target zone

function startSong(songIdx) {
  const song = SONGS[songIdx];
  S.song = song;
  S.chart = generateChart(song);
  S.noteIdx = 0;
  S.activeNotes = [];
  S.score = 0; S.combo = 0; S.maxCombo = 0; S.multiplier = 1;
  S.perfects = 0; S.greats = 0; S.goods = 0; S.misses = 0;
  S.phase = 'playing';
  S.startTime = performance.now() / 1000 + 1.5; // 1.5s lead-in

  overlay.classList.add('hidden');
  $('songName').textContent = song.name;
  $('songBpm').textContent = `${song.bpm} BPM — ${song.diff.toUpperCase()}`;
  updateHud();

  startBeatTrack(song.bpm);

  if (S.animFrame) cancelAnimationFrame(S.animFrame);
  gameLoop();
}

function gameLoop() {
  if (S.phase !== 'playing') return;
  const now = performance.now() / 1000;
  const elapsed = now - S.startTime;
  const targetY = getTargetY();
  const fieldH = getFieldHeight();

  // Spawn notes that are approaching
  const lookAhead = fieldH / SCROLL_SPEED + 0.1;
  while (S.noteIdx < S.chart.length && S.chart[S.noteIdx].time < elapsed + lookAhead) {
    const note = S.chart[S.noteIdx];
    const el = document.createElement('div');
    el.className = 'arrow ' + LANE_CLASSES[note.lane];
    el.textContent = ARROWS[note.lane];
    field.appendChild(el);
    S.activeNotes.push({ ...note, el, hit: false, missed: false });
    S.noteIdx++;
  }

  // Update note positions
  for (let i = S.activeNotes.length - 1; i >= 0; i--) {
    const n = S.activeNotes[i];
    if (n.hit) continue;
    const dt = n.time - elapsed;
    const y = targetY - dt * SCROLL_SPEED;
    n.el.style.top = y + 'px';

    // Miss check
    if (dt < -MISS_W && !n.missed) {
      n.missed = true;
      n.el.style.opacity = '0.2';
      registerJudgment('miss', n.lane);
    }

    // Remove if off screen
    if (y > fieldH + 60) {
      n.el.remove();
      S.activeNotes.splice(i, 1);
    }
  }

  // Progress
  const songProgress = Math.min(1, elapsed / S.song.dur);
  progressFill.style.width = (songProgress * 100) + '%';

  // End check
  if (elapsed > S.song.dur + 2) {
    endSong();
    return;
  }

  S.animFrame = requestAnimationFrame(gameLoop);
}

function pressLane(lane) {
  if (S.phase !== 'playing') return;
  const now = performance.now() / 1000;
  const elapsed = now - S.startTime;

  // Flash target
  const t = $('t' + lane);
  t.classList.add('hit');
  setTimeout(() => t.classList.remove('hit'), 100);

  // Find closest unhit note in this lane
  let best = null;
  let bestDt = Infinity;
  for (const n of S.activeNotes) {
    if (n.hit || n.missed || n.lane !== lane) continue;
    const dt = Math.abs(n.time - elapsed);
    if (dt < bestDt) { bestDt = dt; best = n; }
  }

  if (best && bestDt <= MISS_W) {
    best.hit = true;
    best.el.classList.add('hit-anim');
    setTimeout(() => { best.el.remove(); }, 200);

    let judge;
    if (bestDt <= PERFECT_W) judge = 'perfect';
    else if (bestDt <= GREAT_W) judge = 'great';
    else if (bestDt <= GOOD_W) judge = 'good';
    else judge = 'good'; // within MISS_W but beyond GOOD_W treated as good

    registerJudgment(judge, lane);
    hitSound(judge);
  }
}

function registerJudgment(judge, lane) {
  if (judge === 'miss') {
    S.misses++;
    S.combo = 0;
    S.multiplier = 1;
    hitSound('miss');
  } else {
    if (judge === 'perfect') { S.perfects++; S.score += 300 * S.multiplier; }
    else if (judge === 'great') { S.greats++; S.score += 200 * S.multiplier; }
    else { S.goods++; S.score += 100 * S.multiplier; }
    S.combo++;
    if (S.combo > S.maxCombo) S.maxCombo = S.combo;
    if (S.combo >= 40) S.multiplier = 4;
    else if (S.combo >= 20) S.multiplier = 3;
    else if (S.combo >= 10) S.multiplier = 2;
    else S.multiplier = 1;
  }

  updateHud();
  showJudgment(judge);
}

function showJudgment(judge) {
  const el = document.createElement('div');
  el.className = 'judgment ' + judge;
  el.textContent = judge.toUpperCase();
  field.appendChild(el);
  setTimeout(() => el.remove(), 600);
}

function updateHud() {
  $('score').textContent = S.score;
  $('combo').textContent = S.combo;
  $('multi').textContent = '×' + S.multiplier;
}

function endSong() {
  S.phase = 'results';
  stopBeatTrack();
  if (S.animFrame) cancelAnimationFrame(S.animFrame);

  // Clean up arrows
  S.activeNotes.forEach(n => n.el.remove());
  S.activeNotes = [];

  const totalNotes = S.perfects + S.greats + S.goods + S.misses;
  const pct = totalNotes > 0 ? Math.round(((S.perfects + S.greats + S.goods) / totalNotes) * 100) : 0;

  let grade, emoji;
  if (pct >= 95 && S.misses <= 2) { grade = 'S'; emoji = '👑'; }
  else if (pct >= 90) { grade = 'A'; emoji = '🌟'; }
  else if (pct >= 80) { grade = 'B'; emoji = '💃'; }
  else if (pct >= 65) { grade = 'C'; emoji = '🎵'; }
  else { grade = 'D'; emoji = '😅'; }

  overlay.classList.remove('hidden');
  overlay.querySelector('.overlay-box').innerHTML = `
    <h2>${emoji} GRADE ${grade}</h2>
    <div class="sub">${S.song.name} — ${S.song.bpm} BPM</div>
    <div class="stats">
      <div>Score: <span>${S.score}</span></div>
      <div>Max combo: <span>${S.maxCombo}</span></div>
      <div class="perfect-c">Perfect: ${S.perfects}</div>
      <div class="great-c">Great: ${S.greats}</div>
      <div class="good-c">Good: ${S.goods}</div>
      <div class="miss-c">Miss: ${S.misses}</div>
      <div>Accuracy: <span>${pct}%</span></div>
    </div>
    <button class="song-pick" onclick="location.reload()" style="justify-content:center;cursor:pointer">
      <span class="s-name">SONG SELECT</span>
    </button>
  `;

  beep(660, 0.1, 'triangle', 0.06);
  setTimeout(() => beep(880, 0.1, 'triangle', 0.06), 100);
  setTimeout(() => beep(1100, 0.15, 'triangle', 0.06), 200);
}

// ========== SONG SELECT ==========
function buildSongList() {
  songList.innerHTML = '';
  SONGS.forEach((s, i) => {
    const div = document.createElement('div');
    div.className = 'song-pick';
    div.innerHTML = `
      <div><div class="s-name">${s.name}</div><div class="s-info">${s.bpm} BPM — ${s.dur}s — ${s.desc}</div></div>
      <div class="s-diff ${s.diff}">${s.diff.toUpperCase()}</div>
    `;
    div.onclick = () => startSong(i);
    songList.appendChild(div);
  });
}

// ========== INPUT ==========
const KEY_MAP = {
  ArrowLeft: 0, ArrowDown: 1, ArrowUp: 2, ArrowRight: 3,
  a: 0, s: 1, w: 2, d: 3,
  A: 0, S: 1, W: 2, D: 3,
};

document.addEventListener('keydown', e => {
  if (e.repeat) return;
  const lane = KEY_MAP[e.key];
  if (lane !== undefined) { e.preventDefault(); pressLane(lane); }
});

document.querySelectorAll('.touch-btn').forEach(btn => {
  btn.addEventListener('touchstart', e => {
    e.preventDefault();
    pressLane(parseInt(btn.dataset.lane));
  });
  btn.addEventListener('mousedown', e => {
    e.preventDefault();
    pressLane(parseInt(btn.dataset.lane));
  });
});

// ========== INIT ==========
buildSongList();

})();
</script>
</body>
</html>
