<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Neon Defuser</title>
<link rel="icon" href="https://emojicdn.elk.sh/💣" />
<meta name="description" content="One sees the bomb. One reads the manual. Talk fast or it blows." />
<meta property="og:title" content="Neon Defuser" />
<meta property="og:description" content="One sees the bomb. One reads the manual. Talk fast or it blows." />
<meta property="og:url" content="https://sloppy.live/neon-defuser" />
<meta property="og:image" content="https://sloppy.live/screenshots/neon-defuser.jpg" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
<style>
:root{--bg:#06080c;--surface:#0c1018;--border:#1a2238;--dim:#3a4a6a;--text:#b0c4e8;--accent:#ff2060;--cyan:#00e5ff;--green:#40ff90;--gold:#ffe040;--orange:#ff8c00;--purple:#c040ff}
*{margin:0;padding:0;box-sizing:border-box;scrollbar-width:thin;scrollbar-color:var(--border) transparent}
*::-webkit-scrollbar{width:4px}*::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
html,body{min-height:100vh;background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;user-select:none}
body{display:flex;flex-direction:column;align-items:center;min-height:100vh}

header{width:100%;max-width:560px;padding:12px 16px 8px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
header h1{font-family:'Orbitron',sans-serif;font-weight:700;font-size:18px;color:var(--accent);letter-spacing:0.06em;text-shadow:0 0 16px rgba(255,32,96,0.4)}
header a{color:var(--dim);font-size:10px;text-decoration:none}

.main{flex:1;width:100%;max-width:560px;padding:16px;display:flex;flex-direction:column;gap:12px;overflow-y:auto}

/* === LOBBY === */
.lobby{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;flex:1;text-align:center;padding:20px}
.lobby h2{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(26px,5vw,36px);color:var(--accent);text-shadow:0 0 30px rgba(255,32,96,0.4)}
.lobby p{font-size:12px;color:var(--dim);line-height:1.7;max-width:360px}
.lobby-section{width:100%;max-width:320px}
.lobby-label{font-size:10px;color:var(--dim);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:6px}
.code-input{font-family:'Orbitron',sans-serif;font-size:28px;font-weight:700;text-align:center;width:100%;padding:12px;background:var(--surface);border:2px solid var(--border);color:var(--cyan);border-radius:8px;letter-spacing:0.3em;text-transform:uppercase;outline:none}
.code-input:focus{border-color:var(--cyan)}
.code-input::placeholder{color:var(--dim);font-size:16px;letter-spacing:0.1em}
.role-row{display:flex;gap:10px;width:100%;max-width:320px}
.role-btn{flex:1;padding:16px 10px;background:var(--surface);border:2px solid var(--border);border-radius:8px;cursor:pointer;transition:all .2s;text-align:center}
.role-btn:hover{border-color:var(--dim)}
.role-btn:active{transform:scale(0.97)}
.role-btn .role-icon{font-size:32px;display:block;margin-bottom:6px}
.role-btn .role-name{font-family:'Orbitron',sans-serif;font-weight:700;font-size:13px;letter-spacing:0.06em;display:block}
.role-btn .role-desc{font-size:9px;color:var(--dim);display:block;margin-top:4px}
.role-btn.defuser{border-color:rgba(255,32,96,0.3)}.role-btn.defuser .role-name{color:var(--accent)}
.role-btn.defuser:hover{border-color:var(--accent);box-shadow:0 0 20px rgba(255,32,96,0.15)}
.role-btn.expert{border-color:rgba(0,229,255,0.3)}.role-btn.expert .role-name{color:var(--cyan)}
.role-btn.expert:hover{border-color:var(--cyan);box-shadow:0 0 20px rgba(0,229,255,0.15)}
.sub{font-size:10px;color:var(--dim)}

/* === BOMB VIEW === */
.bomb-timer{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(36px,8vw,54px);text-align:center;color:var(--accent);text-shadow:0 0 30px rgba(255,32,96,0.5);letter-spacing:0.1em;padding:8px 0}
.bomb-timer.warn{animation:timerFlash .5s infinite alternate}
@keyframes timerFlash{to{opacity:0.4;text-shadow:0 0 40px rgba(255,32,96,0.8)}}

.module{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px;position:relative}
.module::before{content:attr(data-label);position:absolute;top:-9px;left:14px;font-size:8px;letter-spacing:0.12em;color:var(--dim);background:var(--bg);padding:0 6px;text-transform:uppercase}
.module.solved{border-color:var(--green);opacity:0.5}
.module.solved::after{content:'✓ DEFUSED';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron',sans-serif;font-size:14px;color:var(--green);letter-spacing:0.1em}

/* Wires */
.wire-rack{display:flex;gap:8px;justify-content:center;padding:10px 0}
.wire{width:clamp(36px,10vw,52px);height:80px;border-radius:6px;cursor:pointer;position:relative;transition:all .15s;border:2px solid rgba(255,255,255,0.08)}
.wire:hover{transform:scaleY(1.03);box-shadow:0 0 12px rgba(255,255,255,0.1)}
.wire.cut{opacity:0.2;transform:scaleY(0.3);cursor:default;border-style:dashed}
.wire-label{position:absolute;bottom:-18px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--dim);white-space:nowrap}

/* Buttons */
.btn-panel{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;padding:8px 0}
.bomb-btn{width:64px;height:64px;border-radius:50%;cursor:pointer;border:3px solid rgba(255,255,255,0.15);font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;color:rgba(0,0,0,0.7);transition:all .1s;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.2}
.bomb-btn:active{transform:scale(0.92)}
.bomb-btn.pressed{border-style:dashed;opacity:0.3;cursor:default}

/* Switches */
.switch-row{display:flex;gap:14px;justify-content:center;padding:8px 0}
.switch-unit{display:flex;flex-direction:column;align-items:center;gap:4px}
.switch-label{font-size:9px;color:var(--dim)}
.switch-track{width:36px;height:60px;background:var(--border);border-radius:18px;cursor:pointer;position:relative;transition:background .2s}
.switch-track.on{background:rgba(0,229,255,0.3)}
.switch-handle{width:28px;height:28px;background:var(--text);border-radius:50%;position:absolute;left:4px;bottom:4px;transition:all .2s;box-shadow:0 2px 6px rgba(0,0,0,0.4)}
.switch-track.on .switch-handle{bottom:auto;top:4px;background:var(--cyan)}

/* Keypad */
.keypad-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;max-width:200px;margin:8px auto}
.kp-btn{padding:10px;background:var(--border);border:1px solid rgba(255,255,255,0.06);border-radius:6px;font-size:18px;cursor:pointer;text-align:center;transition:all .1s}
.kp-btn:active{transform:scale(0.92)}
.kp-btn.used{opacity:0.2;cursor:default}
.kp-seq{text-align:center;font-size:11px;color:var(--dim);margin-top:6px;min-height:16px;letter-spacing:0.1em}

.module-feedback{font-size:11px;margin-top:6px;min-height:14px;text-align:center}
.module-feedback.ok{color:var(--green)}
.module-feedback.bad{color:var(--accent)}

.bomb-serial{text-align:center;font-family:'Orbitron',sans-serif;font-size:11px;color:var(--dim);letter-spacing:0.2em;padding:4px 0}

/* === MANUAL VIEW === */
.manual{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:16px}
.manual h3{font-family:'Orbitron',sans-serif;font-weight:700;font-size:14px;color:var(--cyan);margin-bottom:10px;letter-spacing:0.06em}
.manual h4{font-family:'Orbitron',sans-serif;font-weight:500;font-size:12px;color:var(--gold);margin:12px 0 6px;letter-spacing:0.04em}
.manual p,.manual li{font-size:11px;line-height:1.7;color:var(--text)}
.manual ul{padding-left:16px}
.manual li{margin-bottom:4px}
.manual .important{color:var(--accent);font-weight:bold}
.manual .note{color:var(--gold);font-style:italic}
.manual hr{border:none;border-top:1px solid var(--border);margin:14px 0}
.manual-code{font-family:'Orbitron',sans-serif;font-size:10px;color:var(--cyan);letter-spacing:0.15em;text-align:center;padding:6px;background:rgba(0,229,255,0.04);border:1px solid var(--border);border-radius:4px;margin:4px 0}

/* Results */
.result-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;flex:1;text-align:center;padding:30px}
.result-screen h2{font-family:'Orbitron',sans-serif;font-weight:900;font-size:clamp(28px,6vw,42px)}
.result-screen p{font-size:12px;color:var(--dim);line-height:1.7;max-width:320px}
.result-btn{font-family:'Orbitron',sans-serif;font-weight:700;font-size:14px;padding:12px 32px;background:transparent;border:2px solid var(--accent);color:var(--accent);border-radius:8px;cursor:pointer;letter-spacing:0.06em;transition:all .15s}
.result-btn:hover{background:rgba(255,32,96,0.08)}

.hidden{display:none!important}
</style>
</head>
<body>

<header>
  <h1>NEON DEFUSER</h1>
  <a href="https://sloppy.live">&larr; sloppy.live</a>
</header>

<div class="main" id="main"></div>

<script>
(function(){
'use strict';

const main = document.getElementById('main');

// Audio
let actx;
function au(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx}
function sfx(f,d,t,v){try{const c=au();if(c.state==='suspended')c.resume();const o=c.createOscillator(),g=c.createGain();o.type=t||'sine';o.frequency.setValueAtTime(f,c.currentTime);g.gain.setValueAtTime(v||0.03,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.connect(g).connect(c.destination);o.start();o.stop(c.currentTime+d)}catch(e){}}
function tickSfx(){sfx(800,0.02,'square',0.01)}
function cutSfx(){sfx(200,0.1,'sawtooth',0.04);sfx(100,0.15,'sine',0.03)}
function pressSfx(){sfx(500,0.05,'sine',0.03)}
function correctSfx(){sfx(700,0.06,'sine',0.04);sfx(1000,0.08,'triangle',0.03)}
function strikeSfx(){sfx(120,0.2,'sawtooth',0.06);sfx(80,0.3,'square',0.04)}
function boomSfx(){for(let i=0;i<5;i++)setTimeout(()=>sfx(60+Math.random()*80,0.3,'sawtooth',0.06),i*60)}
function winSfx(){[600,800,1000,1200].forEach((f,i)=>setTimeout(()=>sfx(f,0.1,'sine',0.04),i*80))}

// Seeded RNG
function mkRng(seed){
  let s=seed|0;
  return function(){s=(s+0x6D2B79F5)|0;let x=Math.imul(s^(s>>>15),1|s);x=(x+Math.imul(x^(x>>>7),61|x))^x;return((x^(x>>>14))>>>0)/4294967296;};
}

function pick(arr,rng){return arr[Math.floor((rng?rng():Math.random())*arr.length)]}
function shuffle(arr,rng){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor((rng?rng():Math.random())*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

// Seed from code
function codeToSeed(code){
  let h=0;for(let i=0;i<code.length;i++){h=((h<<5)-h)+code.charCodeAt(i);h|=0;}return Math.abs(h);
}

const WIRE_COLORS = ['red','blue','yellow','green','white','purple'];
const WIRE_HEX = {red:'#ff2060',blue:'#2080ff',yellow:'#ffe040',green:'#40ff90',white:'#e0e0e0',purple:'#c040ff'};
const BTN_COLORS = ['red','blue','yellow','white'];
const BTN_HEX = {red:'#ff2060',blue:'#2080ff',yellow:'#ffe040',white:'#e0e0e0'};
const BTN_LABELS = ['ABORT','DETONATE','HOLD','PRESS','CAB','FTW'];
const SYMBOLS = ['☆','♦','Ω','¥','Ψ','λ','☎','✦','Ξ'];

// ====== GENERATE BOMB ======
function generateBomb(code){
  const seed = codeToSeed(code);
  const rng = mkRng(seed);

  // Serial number
  const serialChars='ABCDEFGHJKLMNPQRSTUVWXYZ0123456789';
  let serial='';for(let i=0;i<6;i++)serial+=serialChars[Math.floor(rng()*serialChars.length)];
  const serialLastDigit = parseInt(serial[serial.length-1]);
  const serialOdd = !isNaN(serialLastDigit) && serialLastDigit%2===1;
  const serialHasVowel = /[AEIOU]/.test(serial);

  // Module 1: Wires
  const wireCount = 4 + Math.floor(rng()*3); // 4-6 wires
  const wires = [];
  for(let i=0;i<wireCount;i++) wires.push(pick(WIRE_COLORS,rng));

  // Determine correct wire to cut using rules
  let correctWire = 0;
  const redCount = wires.filter(w=>w==='red').length;
  const blueCount = wires.filter(w=>w==='blue').length;
  const yellowCount = wires.filter(w=>w==='yellow').length;
  const lastWire = wires[wires.length-1];

  if(wireCount<=4){
    if(redCount===0) correctWire = 1; // cut 2nd wire
    else if(lastWire==='white') correctWire = wireCount-1;
    else if(blueCount>1) correctWire = wires.lastIndexOf('blue');
    else correctWire = wireCount-1;
  } else if(wireCount===5){
    if(lastWire==='yellow' && serialOdd) correctWire = 0;
    else if(redCount===1) correctWire = 0;
    else if(yellowCount>1) correctWire = wireCount-1;
    else correctWire = 1;
  } else {
    if(yellowCount===0 && serialOdd) correctWire = 2;
    else if(yellowCount===1 && wires.filter(w=>w==='white').length>1) correctWire = 3;
    else if(redCount===0) correctWire = wireCount-1;
    else correctWire = 3;
  }

  // Module 2: Buttons
  const btnCount = 4;
  const buttons = [];
  for(let i=0;i<btnCount;i++){
    buttons.push({ color: pick(BTN_COLORS,rng), label: pick(BTN_LABELS,rng) });
  }
  // Correct button: rules based on color+label+serial
  let correctBtn = 0;
  if(buttons.some(b=>b.color==='red'&&b.label==='HOLD')) correctBtn = buttons.findIndex(b=>b.color==='red'&&b.label==='HOLD');
  else if(buttons.filter(b=>b.color==='blue').length>1){ for(let i=buttons.length-1;i>=0;i--) if(buttons[i].color==='blue'){correctBtn=i;break;} }
  else if(buttons.some(b=>b.label==='ABORT')) correctBtn = buttons.findIndex(b=>b.label==='ABORT');
  else if(buttons.some(b=>b.color==='yellow'&&b.label==='DETONATE')){ correctBtn = buttons.length-1; }
  else correctBtn = Math.floor(rng()*btnCount);
  correctBtn = Math.max(0,Math.min(btnCount-1,correctBtn));

  // Module 3: Switches (3 switches, need specific pattern)
  const switchCount = 3;
  const switchLabels = shuffle(['α','β','γ','δ','ε'],rng).slice(0,switchCount);
  // Target pattern based on serial
  const targetSwitches = [];
  for(let i=0;i<switchCount;i++) targetSwitches.push(rng()>0.5);

  // Module 4: Keypad (press 4 symbols in correct order from 9)
  const allSyms = shuffle([...SYMBOLS],rng);
  const keypadSymbols = allSyms.slice(0,9);
  const correctOrder = shuffle(keypadSymbols.slice(0,4),rng);

  return {
    serial, serialOdd, serialHasVowel,
    wires, correctWire,
    buttons, correctBtn,
    switchLabels, targetSwitches,
    keypadSymbols, correctOrder,
    timeLimit: 180,
    maxStrikes: 3,
  };
}

// ====== GENERATE MANUAL ======
function generateManual(bomb){
  let html = '';

  // Section 1: Wires
  html += `<h3>MODULE 1 — WIRE CUTTERS</h3>`;
  html += `<p>The defuser will describe the wire colors from left to right. Use these rules:</p>`;
  html += `<h4>4 Wires:</h4><ul>
    <li>If there are <span class="important">no red wires</span>, cut the <span class="important">2nd wire</span>.</li>
    <li>Otherwise, if the <span class="important">last wire is white</span>, cut the <span class="important">last wire</span>.</li>
    <li>Otherwise, if there is <span class="important">more than one blue wire</span>, cut the <span class="important">last blue wire</span>.</li>
    <li>Otherwise, cut the <span class="important">last wire</span>.</li></ul>`;
  html += `<h4>5 Wires:</h4><ul>
    <li>If the <span class="important">last wire is yellow</span> AND the serial number is <span class="important">odd</span>, cut the <span class="important">1st wire</span>.</li>
    <li>Otherwise, if there is <span class="important">exactly one red wire</span>, cut the <span class="important">1st wire</span>.</li>
    <li>Otherwise, if there are <span class="important">multiple yellow wires</span>, cut the <span class="important">last wire</span>.</li>
    <li>Otherwise, cut the <span class="important">2nd wire</span>.</li></ul>`;
  html += `<h4>6 Wires:</h4><ul>
    <li>If there are <span class="important">no yellow wires</span> AND serial is <span class="important">odd</span>, cut the <span class="important">3rd wire</span>.</li>
    <li>Otherwise, if there is <span class="important">exactly one yellow</span> AND <span class="important">more than one white</span>, cut the <span class="important">4th wire</span>.</li>
    <li>Otherwise, if there are <span class="important">no red wires</span>, cut the <span class="important">last wire</span>.</li>
    <li>Otherwise, cut the <span class="important">4th wire</span>.</li></ul>`;
  html += `<p class="note">The defuser must tell you: wire count, colors left-to-right, and serial number.</p>`;
  html += `<hr>`;

  // Section 2: Buttons
  html += `<h3>MODULE 2 — BUTTON PANEL</h3>`;
  html += `<p>The defuser sees 4 colored buttons with labels. Use these rules <span class="important">in order</span>:</p><ul>
    <li>If there is a <span class="important">red button labeled HOLD</span>, press it.</li>
    <li>Otherwise, if there are <span class="important">more than one blue button</span>, press the <span class="important">last blue button</span>.</li>
    <li>Otherwise, if any button says <span class="important">ABORT</span>, press it (the first one).</li>
    <li>Otherwise, if there is a <span class="important">yellow DETONATE</span>, press the <span class="important">last button</span>.</li>
    <li>If none apply, tell the defuser to press <span class="important">any button</span> — it's a wildcard.</li></ul>`;
  html += `<p class="note">The defuser must tell you: each button's color and label.</p>`;
  html += `<hr>`;

  // Section 3: Switches
  html += `<h3>MODULE 3 — SWITCH ARRAY</h3>`;
  html += `<p>Three labeled switches. The correct pattern depends on the <span class="important">serial number</span>:</p><ul>`;
  html += `<li>Take the serial number: <span class="important">${bomb.serial}</span></li>`;
  html += `<li>For each switch position (1st, 2nd, 3rd):</li>`;
  html += `<li>Switch <span class="important">${bomb.switchLabels[0]}</span> → <span class="important">${bomb.targetSwitches[0]?'ON':'OFF'}</span></li>`;
  html += `<li>Switch <span class="important">${bomb.switchLabels[1]}</span> → <span class="important">${bomb.targetSwitches[1]?'ON':'OFF'}</span></li>`;
  html += `<li>Switch <span class="important">${bomb.switchLabels[2]}</span> → <span class="important">${bomb.targetSwitches[2]?'ON':'OFF'}</span></li>`;
  html += `</ul>`;
  html += `<p class="note">The defuser must tell you the switch labels. Tell them which to toggle.</p>`;
  html += `<hr>`;

  // Section 4: Keypad
  html += `<h3>MODULE 4 — SYMBOL KEYPAD</h3>`;
  html += `<p>The defuser sees a 3×3 grid of symbols. They must press exactly 4 in the <span class="important">correct order</span>.</p>`;
  html += `<p>The correct sequence for this bomb:</p>`;
  html += `<div class="manual-code">${bomb.correctOrder.join('  →  ')}</div>`;
  html += `<p class="note">The defuser must read you ALL 9 symbols so you can identify which 4 to press and in what order.</p>`;

  return html;
}

// ====== LOBBY ======
function showLobby(){
  main.innerHTML = `
    <div class="lobby">
      <h2>NEON DEFUSER</h2>
      <p>One player is the <strong style="color:var(--accent)">DEFUSER</strong> — they see the bomb.<br/>
      The other is the <strong style="color:var(--cyan)">EXPERT</strong> — they read the manual.<br/><br/>
      Share the same room code. Talk to each other. Don't explode.</p>
      <div class="lobby-section">
        <div class="lobby-label">Room Code</div>
        <input class="code-input" id="codeInput" maxlength="6" placeholder="ENTER CODE" />
      </div>
      <div class="lobby-label">Choose Your Role</div>
      <div class="role-row">
        <div class="role-btn defuser" id="roleDefuser">
          <span class="role-icon">💣</span>
          <span class="role-name">DEFUSER</span>
          <span class="role-desc">You see the bomb</span>
        </div>
        <div class="role-btn expert" id="roleExpert">
          <span class="role-icon">📖</span>
          <span class="role-name">EXPERT</span>
          <span class="role-desc">You read the manual</span>
        </div>
      </div>
      <div class="sub">Both players must use the same room code</div>
    </div>
  `;

  // Generate random code
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ';
  let defaultCode='';for(let i=0;i<4;i++)defaultCode+=chars[Math.floor(Math.random()*chars.length)];
  const inp=document.getElementById('codeInput');
  inp.value=defaultCode;

  document.getElementById('roleDefuser').addEventListener('click',()=>{
    const code=inp.value.trim().toUpperCase();
    if(code.length<2){inp.focus();return;}
    startDefuser(code);
  });
  document.getElementById('roleExpert').addEventListener('click',()=>{
    const code=inp.value.trim().toUpperCase();
    if(code.length<2){inp.focus();return;}
    startExpert(code);
  });
}

// ====== DEFUSER VIEW ======
function startDefuser(code){
  const bomb = generateBomb(code);
  const manualHTML = generateManual(bomb);
  let timeLeft = bomb.timeLimit;
  let strikes = 0;
  const solved = [false,false,false,false];
  let gameOver = false;
  let showingManual = false;

  function render(){
    let html = `<div class="bomb-serial">SERIAL: ${bomb.serial} &nbsp;|&nbsp; ROOM: ${code} &nbsp;|&nbsp; STRIKES: ${'✕'.repeat(strikes)}${'○'.repeat(bomb.maxStrikes-strikes)}</div>`;
    html += `<div class="bomb-timer" id="timer">${fmtTime(timeLeft)}</div>`;

    // Module 1: Wires
    html += `<div class="module${solved[0]?' solved':''}" data-label="Module 1 — Wires">`;
    if(!solved[0]){
      html += `<div class="wire-rack">`;
      bomb.wires.forEach((c,i)=>{
        html += `<div class="wire" data-idx="${i}" style="background:${WIRE_HEX[c]}"><div class="wire-label">#${i+1}</div></div>`;
      });
      html += `</div><div class="module-feedback" id="fb1"></div>`;
    }
    html += `</div>`;

    // Module 2: Buttons
    html += `<div class="module${solved[1]?' solved':''}" data-label="Module 2 — Buttons">`;
    if(!solved[1]){
      html += `<div class="btn-panel">`;
      bomb.buttons.forEach((b,i)=>{
        html += `<div class="bomb-btn" data-idx="${i}" style="background:${BTN_HEX[b.color]}">${b.label}</div>`;
      });
      html += `</div><div class="module-feedback" id="fb2"></div>`;
    }
    html += `</div>`;

    // Module 3: Switches
    html += `<div class="module${solved[2]?' solved':''}" data-label="Module 3 — Switches">`;
    if(!solved[2]){
      html += `<div class="switch-row">`;
      bomb.switchLabels.forEach((lbl,i)=>{
        const on = switchStates[i];
        html += `<div class="switch-unit"><div class="switch-label">${lbl}</div>
          <div class="switch-track${on?' on':''}" data-idx="${i}"><div class="switch-handle"></div></div></div>`;
      });
      html += `</div><button class="result-btn" id="checkSwitches" style="font-size:11px;padding:8px 16px;margin:8px auto;display:block">CONFIRM</button>`;
      html += `<div class="module-feedback" id="fb3"></div>`;
    }
    html += `</div>`;

    // Module 4: Keypad — rendered as a self-contained widget
    html += `<div class="module${solved[3]?' solved':''}" data-label="Module 4 — Keypad" id="keypadModule">`;
    if(!solved[3]){
      html += `<div class="keypad-grid" id="keypadGrid"></div>`;
      html += `<div class="kp-seq" id="kpSeq">Tap symbols in order...</div>`;
      html += `<div class="module-feedback" id="fb4"></div>`;
    }
    html += `</div>`;

    // Manual toggle
    html += `<button id="manualToggle" style="width:100%;margin-top:6px;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;padding:10px;background:${showingManual?'rgba(0,229,255,0.1)':'var(--surface)'};border:1px solid ${showingManual?'var(--cyan)':'var(--border)'};color:var(--cyan);border-radius:6px;cursor:pointer;letter-spacing:0.08em">${showingManual?'HIDE MANUAL ▲':'SHOW MANUAL ▼'}</button>`;
    if(showingManual){
      html += `<div class="manual" style="margin-top:8px">${manualHTML}</div>`;
    }

    // Preserve scroll position across full re-renders
    const scrollY = main.scrollTop;
    main.innerHTML = html;
    main.scrollTop = scrollY;
    document.getElementById('manualToggle').addEventListener('click',()=>{showingManual=!showingManual;render();});
    bindBombEvents();
  }

  const switchStates = [false,false,false];
  let keypadPressed = [];

  function bindBombEvents(){
    // Wires
    main.querySelectorAll('.wire').forEach(w=>{
      w.addEventListener('click',()=>{
        if(gameOver||solved[0]) return;
        const idx = parseInt(w.dataset.idx);
        cutSfx();
        w.classList.add('cut');
        if(idx === bomb.correctWire){
          solved[0]=true;
          correctSfx();
          checkWin();
        } else {
          strike();
          const fb=document.getElementById('fb1');
          if(fb){fb.textContent='WRONG WIRE — STRIKE!';fb.className='module-feedback bad';}
        }
        setTimeout(render,600);
      });
    });

    // Buttons
    main.querySelectorAll('.bomb-btn').forEach(b=>{
      b.addEventListener('click',()=>{
        if(gameOver||solved[1]) return;
        const idx = parseInt(b.dataset.idx);
        pressSfx();
        if(idx === bomb.correctBtn){
          solved[1]=true;
          correctSfx();
          checkWin();
        } else {
          strike();
          const fb=document.getElementById('fb2');
          if(fb){fb.textContent='WRONG BUTTON — STRIKE!';fb.className='module-feedback bad';}
        }
        setTimeout(render,600);
      });
    });

    // Switches
    main.querySelectorAll('.switch-track').forEach(s=>{
      s.addEventListener('click',()=>{
        if(gameOver||solved[2]) return;
        const idx=parseInt(s.dataset.idx);
        switchStates[idx]=!switchStates[idx];
        pressSfx();
        render();
      });
    });
    const checkBtn=document.getElementById('checkSwitches');
    if(checkBtn) checkBtn.addEventListener('click',()=>{
      if(gameOver||solved[2]) return;
      const correct = switchStates.every((s,i)=>s===bomb.targetSwitches[i]);
      if(correct){
        solved[2]=true;
        correctSfx();
        checkWin();
      } else {
        strike();
        const fb=document.getElementById('fb3');
        if(fb){fb.textContent='WRONG PATTERN — STRIKE!';fb.className='module-feedback bad';}
      }
      setTimeout(render,600);
    });

    // Keypad — fully self-contained render cycle
    renderKeypad();
  }

  // Self-contained keypad: builds grid, binds clicks, handles all state
  function renderKeypad(){
    const grid = document.getElementById('keypadGrid');
    const seqEl = document.getElementById('kpSeq');
    const fbEl = document.getElementById('fb4');
    if(!grid || solved[3]) return;

    // Build fresh grid
    grid.innerHTML = '';
    bomb.keypadSymbols.forEach((sym) => {
      const btn = document.createElement('div');
      btn.className = 'kp-btn';
      btn.textContent = sym;
      // Mark already pressed symbols
      if(keypadPressed.includes(sym)){
        btn.classList.add('used');
      } else {
        btn.addEventListener('click', () => onKeypadPress(sym, btn));
      }
      grid.appendChild(btn);
    });

    // Update sequence display
    if(seqEl) seqEl.textContent = keypadPressed.length > 0 ? keypadPressed.join(' → ') : 'Tap symbols in order...';
  }

  let keypadLocked = false; // prevent clicks during reset animation

  function onKeypadPress(sym, btn){
    if(gameOver || solved[3] || keypadLocked) return;
    tapSfx();

    const correct = bomb.correctOrder;
    const nextIdx = keypadPressed.length;
    const fbEl = document.getElementById('fb4');

    if(sym !== correct[nextIdx]){
      // Wrong symbol
      strike();
      keypadPressed = [];
      keypadLocked = true;
      if(fbEl){ fbEl.textContent = 'WRONG SEQUENCE — STRIKE!'; fbEl.className = 'module-feedback bad'; }
      // Flash red briefly, then rebuild grid
      btn.style.background = 'var(--accent)';
      setTimeout(() => {
        keypadLocked = false;
        if(!gameOver) renderKeypad();
        // Update strike display in header
        const serialEl = main.querySelector('.bomb-serial');
        if(serialEl) serialEl.innerHTML = `SERIAL: ${bomb.serial} &nbsp;|&nbsp; ROOM: ${code} &nbsp;|&nbsp; STRIKES: ${'✕'.repeat(strikes)}${'○'.repeat(bomb.maxStrikes-strikes)}`;
      }, 700);
      return;
    }

    // Correct symbol
    keypadPressed.push(sym);
    btn.classList.add('used');
    correctSfx();

    const seqEl = document.getElementById('kpSeq');
    if(seqEl) seqEl.textContent = keypadPressed.join(' → ');
    if(fbEl){ fbEl.textContent = `${keypadPressed.length}/4 decoded`; fbEl.className = 'module-feedback ok'; }

    if(keypadPressed.length === 4){
      solved[3] = true;
      if(fbEl){ fbEl.textContent = '✓ KEYPAD CRACKED'; fbEl.className = 'module-feedback ok'; }
      checkWin();
      setTimeout(render, 800);
    }
  }

  function strike(){
    strikes++;
    strikeSfx();
    if(strikes>=bomb.maxStrikes) explode();
  }

  function checkWin(){
    if(solved.every(Boolean)){
      gameOver=true;
      clearInterval(timerInterval);
      setTimeout(()=>{
        winSfx();
        main.innerHTML=`<div class="result-screen">
          <h2 style="color:var(--green)">DEFUSED!</h2>
          <p>All 4 modules disarmed with ${fmtTime(timeLeft)} remaining and ${strikes} strike${strikes!==1?'s':''}.</p>
          <button class="result-btn" id="backBtn">BACK TO LOBBY</button></div>`;
        document.getElementById('backBtn').addEventListener('click',showLobby);
      },800);
    }
  }

  function explode(){
    gameOver=true;
    clearInterval(timerInterval);
    boomSfx();
    main.innerHTML=`<div class="result-screen">
      <h2 style="color:var(--accent)">💥 BOOM 💥</h2>
      <p>${strikes>=bomb.maxStrikes?'Too many strikes.':'Time ran out.'} The bomb detonated. Try again.</p>
      <button class="result-btn" id="backBtn">BACK TO LOBBY</button></div>`;
    document.getElementById('backBtn').addEventListener('click',showLobby);
  }

  function fmtTime(s){
    const m=Math.floor(s/60);const sec=s%60;
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  }

  // Timer
  const timerInterval = setInterval(()=>{
    if(gameOver)return;
    timeLeft--;
    if(timeLeft%2===0)tickSfx();
    const el=document.getElementById('timer');
    if(el){
      el.textContent=fmtTime(timeLeft);
      el.classList.toggle('warn',timeLeft<=30);
    }
    if(timeLeft<=0) explode();
  },1000);

  render();
}

// ====== EXPERT VIEW ======
function startExpert(code){
  const bomb = generateBomb(code);
  const manualHTML = generateManual(bomb);

  main.innerHTML=`
    <div style="text-align:center;padding:8px;font-family:'Orbitron',sans-serif;font-size:11px;color:var(--dim);letter-spacing:0.15em">
      BOMB DISPOSAL MANUAL — ROOM: ${code}
    </div>
    <div class="manual">${manualHTML}</div>
    <div style="padding:16px;text-align:center">
      <button class="result-btn" id="backBtn" style="font-size:11px;padding:8px 20px">BACK TO LOBBY</button>
    </div>
  `;
  document.getElementById('backBtn').addEventListener('click',showLobby);
}

showLobby();

})();
</script>
</body>
</html>
