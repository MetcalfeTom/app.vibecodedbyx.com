<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>orbital fling — slingshot planets into suns</title>
<meta name="description" content="Drag, aim, release. Use gravity wells to curve your planet into the sun.">
<meta property="og:title" content="orbital fling">
<meta property="og:description" content="Drag, aim, release. Curve your planet into the sun.">
<meta property="og:url" content="https://sloppy.live/orbital-fling/">
<meta property="og:image" content="https://image.pollinations.ai/prompt/neon%20cosmic%20planet%20slingshot%20into%20glowing%20yellow%20sun%2C%20deep%20purple%20starfield%2C%20synthwave%20vector%20art%2C%20clean%20composition%2C%20social%20preview?width=1200&height=630&seed=9182&nologo=true&model=flux">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%AA%90">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unica+One&family=Major+Mono+Display&family=Space+Mono:wght@400;700&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #060218;
    --void-2: #0d0633;
    --neon-pink: #ff5ea1;
    --neon-cyan: #5ec2ff;
    --neon-violet: #b48dff;
    --sun-core: #fff2a8;
    --sun-edge: #ff9a3c;
    --sun-rim: #ff5e3a;
    --planet: #5ec2ff;
    --planet-rim: #b9eaff;
    --rock: #6a5a82;
    --bh: #0a0214;
    --bh-ring: #ff6b3a;
    --hud: #d6c8ff;
    --hud-dim: #6e63a3;
    --hud-warn: #ffb259;
    --hud-good: #6affb8;
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  html { font-size: 100%; }
  body {
    margin: 0;
    background: radial-gradient(circle at 28% 18%, #1f0d52 0%, transparent 55%),
                radial-gradient(circle at 78% 82%, #14043a 0%, transparent 60%),
                var(--void);
    color: var(--hud);
    font-family: 'Space Mono', ui-monospace, monospace;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }
  /* Header HUD */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 5;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.7rem 1rem 0.5rem;
    pointer-events: none;
    gap: 0.8rem;
    flex-wrap: wrap;
  }
  .brand {
    pointer-events: auto;
    display: flex;
    flex-direction: column;
    line-height: 1;
  }
  .brand h1 {
    font-family: 'Major Mono Display', monospace;
    font-size: clamp(1.4rem, 3.6vw, 2.05rem);
    margin: 0;
    color: #fff;
    letter-spacing: 0.05em;
    text-shadow: 0 0 14px rgba(180,141,255, 0.55);
  }
  .brand h1 em {
    color: var(--neon-pink);
    font-style: normal;
  }
  .brand .tag {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--neon-cyan);
    font-size: 0.95rem;
    margin-top: 0.18rem;
    letter-spacing: 0.02em;
    text-shadow: 0 0 8px rgba(94,194,255, 0.4);
  }
  .stats {
    display: flex;
    gap: 0.55rem;
    pointer-events: auto;
    flex-wrap: wrap;
    justify-content: flex-end;
  }
  .pill {
    background: rgba(20, 4, 58, 0.65);
    border: 1.5px solid rgba(180,141,255, 0.45);
    border-radius: 999px;
    padding: 0.4rem 0.85rem;
    font-size: 0.78rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--hud);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: inline-flex;
    align-items: center;
    gap: 0.4rem;
  }
  .pill .v { color: var(--neon-pink); font-weight: 700; }
  .pill.good .v { color: var(--hud-good); }
  .pill.warn .v { color: var(--hud-warn); }

  /* Canvas stage */
  #stage {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    display: block;
    cursor: grab;
  }
  #stage.dragging { cursor: grabbing; }

  /* Bottom controls */
  footer {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 5;
    padding: 0.8rem 1rem 1.1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    pointer-events: none;
    gap: 0.6rem;
    flex-wrap: wrap;
  }
  .hint {
    pointer-events: auto;
    background: rgba(20, 4, 58, 0.6);
    border: 1.5px solid rgba(94,194,255, 0.35);
    border-radius: 0.5rem;
    padding: 0.5rem 0.85rem;
    font-size: 0.82rem;
    color: var(--hud);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    max-width: 360px;
    line-height: 1.4;
  }
  .hint b { color: var(--neon-pink); font-weight: 700; }
  .actions {
    pointer-events: auto;
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  button.btn {
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    background: rgba(20, 4, 58, 0.75);
    border: 1.5px solid rgba(180,141,255, 0.55);
    color: var(--hud);
    padding: 0.55rem 1rem;
    border-radius: 0.5rem;
    cursor: pointer;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    transition: transform 0.12s ease, box-shadow 0.12s ease, border-color 0.12s ease;
    min-height: 2.75rem;
  }
  button.btn:hover { border-color: var(--neon-pink); box-shadow: 0 0 14px rgba(255,94,161, 0.35); }
  button.btn:active { transform: translateY(1px); }
  button.btn.primary {
    background: rgba(255,94,161, 0.18);
    border-color: var(--neon-pink);
    color: #fff;
  }
  button.btn:focus-visible {
    outline: 3px solid var(--neon-cyan);
    outline-offset: 2px;
  }

  /* Overlay (win / fail / intro) */
  .overlay {
    position: fixed;
    inset: 0;
    z-index: 20;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(6, 2, 24, 0.78);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    padding: 1rem;
  }
  .overlay.show { display: flex; }
  .overlay .panel {
    background: linear-gradient(180deg, rgba(40,12,90,0.88), rgba(12,2,40,0.92));
    border: 1.5px solid rgba(180,141,255, 0.5);
    box-shadow: 0 0 60px rgba(180,141,255, 0.18) inset, 0 12px 60px rgba(0,0,0,0.7);
    padding: 1.6rem 1.6rem 1.3rem;
    border-radius: 0.8rem;
    max-width: 460px;
    width: 100%;
    text-align: center;
  }
  .overlay h2 {
    font-family: 'Major Mono Display', monospace;
    font-size: clamp(1.7rem, 5vw, 2.4rem);
    margin: 0 0 0.5rem;
    color: #fff;
    text-shadow: 0 0 18px rgba(255,94,161, 0.5);
    letter-spacing: 0.04em;
  }
  .overlay h2.win { color: var(--hud-good); text-shadow: 0 0 22px rgba(106,255,184, 0.45); }
  .overlay h2.fail { color: var(--hud-warn); text-shadow: 0 0 22px rgba(255,178,89, 0.45); }
  .overlay p {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.1rem;
    color: var(--neon-cyan);
    margin: 0.3rem 0 1rem;
    line-height: 1.4;
  }
  .overlay .stats-row {
    display: flex;
    justify-content: center;
    gap: 0.6rem;
    margin-bottom: 1rem;
    flex-wrap: wrap;
  }
  .overlay .stats-row .pill { background: rgba(20, 4, 58, 0.85); }
  .overlay .row { display: flex; gap: 0.6rem; justify-content: center; flex-wrap: wrap; }

  /* Level dots */
  .level-dots {
    display: flex;
    gap: 0.32rem;
    margin: 0.6rem 0 0.4rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  .level-dots span {
    width: 0.55rem;
    height: 0.55rem;
    border-radius: 999px;
    background: rgba(180,141,255, 0.22);
    border: 1px solid rgba(180,141,255, 0.4);
  }
  .level-dots span.done { background: var(--hud-good); border-color: var(--hud-good); box-shadow: 0 0 8px rgba(106,255,184, 0.5); }
  .level-dots span.curr { background: var(--neon-pink); border-color: var(--neon-pink); box-shadow: 0 0 10px rgba(255,94,161, 0.7); }

  /* Reduced motion */
  @media (prefers-reduced-motion: reduce) {
    * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
  @media (max-width: 640px) {
    .hint { font-size: 0.78rem; padding: 0.45rem 0.7rem; }
    .brand h1 { font-size: 1.35rem; }
    .brand .tag { font-size: 0.85rem; }
    button.btn { padding: 0.5rem 0.85rem; font-size: 0.72rem; }
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <h1>orbital<em>·</em>fling</h1>
    <div class="tag">drag · release · gravity does the rest</div>
  </div>
  <div class="stats" role="status" aria-live="polite">
    <div class="pill">Level <span class="v" id="levelN">1</span><span class="dim">/<span id="levelMax">10</span></span></div>
    <div class="pill">Tries <span class="v" id="tries">0</span></div>
    <div class="pill good">Solar <span class="v" id="hits">0</span></div>
  </div>
</header>

<canvas id="stage" role="application" aria-label="Drag your planet to aim, release to slingshot it. Use gravity from suns and obstacles to curve your trajectory."></canvas>

<footer>
  <div class="hint" id="hint"><b>drag</b> from your planet, <b>release</b> to fling. <b>R</b> reset · <b>N</b> next.</div>
  <div class="actions">
    <button class="btn" id="resetBtn" type="button" title="Reset level (R)">Reset</button>
    <button class="btn" id="muteBtn" type="button" aria-pressed="false">♪ on</button>
    <button class="btn primary" id="nextBtn" type="button" disabled title="Next level (N)">Next ›</button>
  </div>
</footer>

<div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-hidden="true">
  <div class="panel">
    <h2 id="ovTitle">orbital fling</h2>
    <p id="ovBody">Slingshot the blue planet into the glowing sun. Suns pull you in — use that.</p>
    <div class="stats-row" id="ovStats"></div>
    <div class="level-dots" id="ovDots"></div>
    <div class="row">
      <button class="btn" id="ovRetry" type="button">Retry</button>
      <button class="btn primary" id="ovGo" type="button">Begin</button>
    </div>
  </div>
</div>

<script>
(function(){
  'use strict';
  const $ = (id) => document.getElementById(id);
  const canvas = $('stage');
  const ctx = canvas.getContext('2d');
  let W = 0, H = 0, DPR = 1;

  // ---- Levels (logical coords roughly 1200x800; scaled to viewport) ----
  // Each level: planet start, list of suns (targets), list of rocks (obstacles), list of blackholes (kills).
  const LEVELS = [
    { // 1: straight shot
      planet: { x: 200, y: 400 },
      suns:   [ { x: 1000, y: 400, r: 60 } ],
      rocks:  [],
      blackholes: [],
      par: 1,
      tip: 'aim straight. gentle drag.',
    },
    { // 2: slight gravity curve
      planet: { x: 200, y: 600 },
      suns:   [ { x: 1000, y: 200, r: 55 } ],
      rocks:  [],
      blackholes: [],
      par: 1,
      tip: 'aim above — gravity will pull you in.',
    },
    { // 3: rocks in the middle
      planet: { x: 180, y: 400 },
      suns:   [ { x: 1020, y: 400, r: 55 } ],
      rocks:  [ { x: 600, y: 350, r: 24 }, { x: 600, y: 460, r: 24 } ],
      blackholes: [],
      par: 1,
      tip: 'rocks shatter you on contact. squeeze through.',
    },
    { // 4: two suns, choose one (both count)
      planet: { x: 600, y: 700 },
      suns:   [ { x: 280, y: 180, r: 52 }, { x: 920, y: 180, r: 52 } ],
      rocks:  [],
      blackholes: [],
      par: 1,
      tip: 'two targets. pick a side.',
    },
    { // 5: slingshot around a rock
      planet: { x: 180, y: 200 },
      suns:   [ { x: 1020, y: 600, r: 55 } ],
      rocks:  [ { x: 600, y: 400, r: 60 } ],
      blackholes: [],
      par: 1,
      tip: 'arc over or under. respect the rock.',
    },
    { // 6: black hole in the middle
      planet: { x: 200, y: 400 },
      suns:   [ { x: 1020, y: 400, r: 55 } ],
      rocks:  [],
      blackholes: [ { x: 600, y: 400, r: 32, mass: 1.6 } ],
      par: 1,
      tip: 'the black hole eats anything close. give it room.',
    },
    { // 7: corridor of rocks
      planet: { x: 180, y: 400 },
      suns:   [ { x: 1020, y: 400, r: 50 } ],
      rocks:  [
        { x: 500, y: 280, r: 22 }, { x: 700, y: 280, r: 22 },
        { x: 500, y: 520, r: 22 }, { x: 700, y: 520, r: 22 },
      ],
      blackholes: [],
      par: 1,
      tip: 'thread the needle.',
    },
    { // 8: sun behind a black hole
      planet: { x: 180, y: 400 },
      suns:   [ { x: 950, y: 400, r: 48 } ],
      rocks:  [],
      blackholes: [ { x: 600, y: 400, r: 30, mass: 1.4 } ],
      par: 1,
      tip: 'curve wide. the bh tugs everything inward.',
    },
    { // 9: pair of suns flanking a black hole
      planet: { x: 600, y: 720 },
      suns:   [ { x: 220, y: 180, r: 46 }, { x: 980, y: 180, r: 46 } ],
      rocks:  [],
      blackholes: [ { x: 600, y: 400, r: 28, mass: 1.3 } ],
      par: 1,
      tip: 'sling around the void.',
    },
    { // 10: the gauntlet
      planet: { x: 180, y: 700 },
      suns:   [ { x: 1020, y: 120, r: 50 } ],
      rocks:  [
        { x: 450, y: 500, r: 28 }, { x: 750, y: 320, r: 28 },
      ],
      blackholes: [ { x: 600, y: 410, r: 26, mass: 1.5 } ],
      par: 2,
      tip: 'final test. all weights in play.',
    },
  ];

  $('levelMax').textContent = LEVELS.length;

  // ---- World scale (logical -> screen) ----
  const WORLD_W = 1200, WORLD_H = 800;
  let scale = 1, offX = 0, offY = 0;
  function fitWorld() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    scale = Math.min(W / WORLD_W, H / WORLD_H);
    offX = (W - WORLD_W * scale) / 2;
    offY = (H - WORLD_H * scale) / 2;
  }
  const wx = (x) => offX + x * scale;
  const wy = (y) => offY + y * scale;
  const sx = (x) => (x - offX) / scale;
  const sy = (y) => (y - offY) / scale;

  fitWorld();
  window.addEventListener('resize', fitWorld);

  // ---- Starfield ----
  const stars = [];
  for (let i = 0; i < 220; i++) {
    stars.push({
      x: Math.random() * WORLD_W,
      y: Math.random() * WORLD_H,
      r: Math.random() * 1.2 + 0.2,
      t: Math.random() * Math.PI * 2,
    });
  }

  // ---- Audio ----
  let audioCtx = null;
  let muted = false;
  function audio() {
    if (muted) return null;
    if (!audioCtx) {
      try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) { return null; }
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return audioCtx;
  }
  function tone(freq, dur, type, gain) {
    const ac = audio(); if (!ac) return;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = type || 'triangle';
    o.frequency.value = freq;
    g.gain.value = 0;
    g.gain.linearRampToValueAtTime(gain || 0.2, ac.currentTime + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + dur);
    o.connect(g); g.connect(ac.destination);
    o.start();
    o.stop(ac.currentTime + dur + 0.02);
  }
  function swoosh() {
    const ac = audio(); if (!ac) return;
    const o = ac.createOscillator();
    const f = ac.createBiquadFilter();
    const g = ac.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(200, ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(80, ac.currentTime + 0.4);
    f.type = 'bandpass'; f.frequency.value = 800; f.Q.value = 4;
    g.gain.setValueAtTime(0.0001, ac.currentTime);
    g.gain.linearRampToValueAtTime(0.18, ac.currentTime + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + 0.45);
    o.connect(f); f.connect(g); g.connect(ac.destination);
    o.start(); o.stop(ac.currentTime + 0.5);
  }
  function explode() {
    const ac = audio(); if (!ac) return;
    const bufSize = ac.sampleRate * 0.6;
    const buf = ac.createBuffer(1, bufSize, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 1.8);
    }
    const src = ac.createBufferSource(); src.buffer = buf;
    const f = ac.createBiquadFilter();
    f.type = 'lowpass';
    f.frequency.setValueAtTime(2200, ac.currentTime);
    f.frequency.exponentialRampToValueAtTime(220, ac.currentTime + 0.55);
    const g = ac.createGain(); g.gain.value = 0.32;
    src.connect(f); f.connect(g); g.connect(ac.destination);
    src.start();
    tone(80, 0.45, 'sine', 0.24);
  }
  function win() {
    tone(523.25, 0.18, 'triangle', 0.22);
    setTimeout(() => tone(659.25, 0.18, 'triangle', 0.22), 130);
    setTimeout(() => tone(783.99, 0.22, 'triangle', 0.22), 260);
    setTimeout(() => tone(1046.5, 0.32, 'triangle', 0.22), 400);
  }
  function shatter() {
    tone(380, 0.08, 'square', 0.16);
    setTimeout(() => tone(220, 0.12, 'sawtooth', 0.18), 60);
  }
  function vacuum() {
    const ac = audio(); if (!ac) return;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(420, ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(40, ac.currentTime + 0.5);
    g.gain.value = 0;
    g.gain.linearRampToValueAtTime(0.22, ac.currentTime + 0.04);
    g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + 0.55);
    o.connect(g); g.connect(ac.destination);
    o.start(); o.stop(ac.currentTime + 0.6);
  }

  // ---- Game state ----
  const state = {
    levelIdx: 0,
    tries: 0,
    hits: 0,
    completed: new Array(LEVELS.length).fill(false),
    planet: null,
    aim: null,         // { sx, sy, cx, cy }  (logical world coords)
    launched: false,
    particles: [],
    trail: [],
    settled: false,
    over: false,
  };

  const G = 14000;   // gravitational constant tuned for the play feel
  const BH_KILL_R_MULT = 0.9;  // particle disappears when within BH r * mult

  function loadLevel(i) {
    state.levelIdx = i;
    const L = LEVELS[i];
    state.planet = {
      x: L.planet.x, y: L.planet.y,
      vx: 0, vy: 0,
      r: 16,
      alive: true,
    };
    state.aim = null;
    state.launched = false;
    state.settled = false;
    state.over = false;
    state.particles = [];
    state.trail = [];
    L.suns.forEach(s => s.hit = false);
    $('levelN').textContent = (i + 1);
    $('tries').textContent = state.tries;
    $('hits').textContent = state.hits;
    $('nextBtn').disabled = true;
    setHint(L.tip);
  }

  function setHint(msg) {
    $('hint').innerHTML = msg;
  }

  // ---- Render ----
  function drawStars(t) {
    ctx.save();
    for (let s of stars) {
      const tw = 0.55 + 0.45 * Math.sin(t * 0.0015 + s.t);
      ctx.globalAlpha = 0.45 + tw * 0.55;
      ctx.fillStyle = '#cfd6ff';
      ctx.beginPath();
      ctx.arc(wx(s.x), wy(s.y), s.r * scale, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawSun(s, t) {
    const cx = wx(s.x), cy = wy(s.y);
    const r = s.r * scale;
    const pulse = 1 + 0.05 * Math.sin(t * 0.004);
    // outer halo
    const g1 = ctx.createRadialGradient(cx, cy, r * 0.4, cx, cy, r * 4.5);
    g1.addColorStop(0, 'rgba(255, 200, 90, 0.45)');
    g1.addColorStop(0.35, 'rgba(255, 130, 60, 0.18)');
    g1.addColorStop(1, 'rgba(255, 60, 30, 0)');
    ctx.fillStyle = g1;
    ctx.beginPath(); ctx.arc(cx, cy, r * 4.5, 0, Math.PI * 2); ctx.fill();
    // body
    const g2 = ctx.createRadialGradient(cx - r*0.25, cy - r*0.25, r*0.1, cx, cy, r * 1.2);
    g2.addColorStop(0, '#fff7c2');
    g2.addColorStop(0.45, '#ffd35a');
    g2.addColorStop(0.85, '#ff7a2a');
    g2.addColorStop(1, '#9c2c0e');
    ctx.fillStyle = g2;
    ctx.beginPath(); ctx.arc(cx, cy, r * pulse, 0, Math.PI * 2); ctx.fill();
    // corona spikes
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(t * 0.0003);
    for (let i = 0; i < 12; i++) {
      ctx.rotate(Math.PI * 2 / 12);
      ctx.beginPath();
      ctx.fillStyle = 'rgba(255, 180, 90, 0.25)';
      ctx.moveTo(r * 0.92, 0);
      ctx.lineTo(r * 1.45 * (1 + 0.08 * Math.sin(t * 0.005 + i)), -r * 0.16);
      ctx.lineTo(r * 1.45 * (1 + 0.08 * Math.sin(t * 0.005 + i)), r * 0.16);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
    if (s.hit) {
      ctx.save();
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 3;
      ctx.globalAlpha = 0.85;
      ctx.beginPath(); ctx.arc(cx, cy, r * 1.6, 0, Math.PI * 2); ctx.stroke();
      ctx.restore();
    }
  }

  function drawRock(rk) {
    const cx = wx(rk.x), cy = wy(rk.y);
    const r = rk.r * scale;
    const g = ctx.createRadialGradient(cx - r*0.3, cy - r*0.3, r*0.1, cx, cy, r);
    g.addColorStop(0, '#9a8cb8');
    g.addColorStop(0.5, '#574667');
    g.addColorStop(1, '#2a1d3c');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.08)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(cx, cy, r * 0.62, 0.4, 1.4); ctx.stroke();
  }

  function drawBlackhole(bh, t) {
    const cx = wx(bh.x), cy = wy(bh.y);
    const r = bh.r * scale;
    // accretion glow
    const g = ctx.createRadialGradient(cx, cy, r * 0.5, cx, cy, r * 4);
    g.addColorStop(0, 'rgba(255, 90, 40, 0.0)');
    g.addColorStop(0.3, 'rgba(255, 90, 40, 0.18)');
    g.addColorStop(0.7, 'rgba(120, 30, 200, 0.18)');
    g.addColorStop(1, 'rgba(20, 0, 60, 0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(cx, cy, r * 4, 0, Math.PI * 2); ctx.fill();
    // rings
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(t * 0.0014);
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.strokeStyle = `rgba(255, ${80 + i*40}, ${40 + i*30}, ${0.55 - i*0.15})`;
      ctx.lineWidth = 2 + i;
      ctx.ellipse(0, 0, r * (2.0 + i*0.4), r * (0.45 + i*0.08), t * 0.0005, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.restore();
    // event horizon
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
    ctx.strokeStyle = 'rgba(255,120,60,0.7)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(cx, cy, r * 1.02, 0, Math.PI * 2); ctx.stroke();
  }

  function drawPlanet() {
    const p = state.planet;
    if (!p || !p.alive) return;
    const cx = wx(p.x), cy = wy(p.y);
    const r = p.r * scale;
    // glow
    const g0 = ctx.createRadialGradient(cx, cy, r * 0.5, cx, cy, r * 3);
    g0.addColorStop(0, 'rgba(94,194,255, 0.4)');
    g0.addColorStop(1, 'rgba(94,194,255, 0)');
    ctx.fillStyle = g0;
    ctx.beginPath(); ctx.arc(cx, cy, r * 3, 0, Math.PI * 2); ctx.fill();
    // body
    const g = ctx.createRadialGradient(cx - r*0.3, cy - r*0.3, r*0.1, cx, cy, r);
    g.addColorStop(0, '#d9f1ff');
    g.addColorStop(0.4, '#5ec2ff');
    g.addColorStop(0.85, '#2168a3');
    g.addColorStop(1, '#0c2a4c');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();
    // rim
    ctx.strokeStyle = 'rgba(185, 234, 255, 0.7)';
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(cx, cy, r * 0.98, 0, Math.PI * 2); ctx.stroke();
  }

  function drawTrail() {
    const tr = state.trail;
    if (tr.length < 2) return;
    ctx.save();
    for (let i = 1; i < tr.length; i++) {
      const a = tr[i - 1], b = tr[i];
      const alpha = i / tr.length;
      ctx.strokeStyle = `rgba(255, 94, 161, ${alpha * 0.55})`;
      ctx.lineWidth = 2 * scale * alpha;
      ctx.beginPath();
      ctx.moveTo(wx(a.x), wy(a.y));
      ctx.lineTo(wx(b.x), wy(b.y));
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawAim() {
    if (!state.aim || state.launched) return;
    const a = state.aim;
    const p = state.planet;
    const dx = a.sx - a.cx;
    const dy = a.sy - a.cy;
    const len = Math.hypot(dx, dy);
    if (len < 4) return;
    const px = wx(p.x), py = wy(p.y);
    // dashed pull-line
    ctx.save();
    ctx.strokeStyle = 'rgba(255, 94, 161, 0.85)';
    ctx.lineWidth = 2.4;
    ctx.setLineDash([6, 5]);
    ctx.beginPath();
    ctx.moveTo(px, py);
    ctx.lineTo(wx(a.sx + (a.cx - a.sx)), wy(a.sy + (a.cy - a.sy)));
    ctx.stroke();
    ctx.setLineDash([]);
    // arrow head opposite drag direction (=launch direction)
    const launchVX = dx, launchVY = dy;
    const ang = Math.atan2(launchVY, launchVX);
    const tipX = px + Math.cos(ang) * Math.min(len * scale, 220);
    const tipY = py + Math.sin(ang) * Math.min(len * scale, 220);
    ctx.fillStyle = 'rgba(255, 94, 161, 0.95)';
    ctx.beginPath();
    ctx.moveTo(tipX, tipY);
    ctx.lineTo(tipX - 10 * Math.cos(ang - 0.4), tipY - 10 * Math.sin(ang - 0.4));
    ctx.lineTo(tipX - 10 * Math.cos(ang + 0.4), tipY - 10 * Math.sin(ang + 0.4));
    ctx.closePath();
    ctx.fill();
    // predicted trajectory dots
    simulatePreview(launchVX, launchVY);
    ctx.restore();
  }

  function simulatePreview(launchVX, launchVY) {
    const L = LEVELS[state.levelIdx];
    const VS = 5.5;
    let x = state.planet.x, y = state.planet.y;
    let vx = launchVX * VS, vy = launchVY * VS;
    const dt = 0.045;
    ctx.fillStyle = 'rgba(94, 194, 255, 0.55)';
    for (let i = 0; i < 70; i++) {
      let ax = 0, ay = 0;
      const bodies = L.suns.concat(L.blackholes || []);
      for (const b of bodies) {
        const ddx = b.x - x, ddy = b.y - y;
        const d2 = ddx*ddx + ddy*ddy + 80;
        const d = Math.sqrt(d2);
        const m = b.mass ? b.mass * 900 : (b.r * b.r * 0.34);
        const f = G * m / d2;
        ax += f * ddx / d;
        ay += f * ddy / d;
      }
      vx += ax * dt;
      vy += ay * dt;
      x += vx * dt;
      y += vy * dt;
      if (x < -200 || x > WORLD_W + 200 || y < -200 || y > WORLD_H + 200) break;
      // collisions stop preview
      let stop = false;
      for (const s of L.suns) {
        if ((x - s.x)*(x - s.x) + (y - s.y)*(y - s.y) <= (s.r + 12) * (s.r + 12)) stop = true;
      }
      for (const rk of L.rocks) {
        if ((x - rk.x)*(x - rk.x) + (y - rk.y)*(y - rk.y) <= (rk.r + 12) * (rk.r + 12)) stop = true;
      }
      for (const bh of (L.blackholes || [])) {
        if ((x - bh.x)*(x - bh.x) + (y - bh.y)*(y - bh.y) <= (bh.r + 4) * (bh.r + 4)) stop = true;
      }
      if (i % 3 === 0) {
        ctx.beginPath();
        ctx.arc(wx(x), wy(y), 2.4 * scale, 0, Math.PI * 2);
        ctx.fill();
      }
      if (stop) break;
    }
  }

  // ---- Physics step ----
  let lastT = 0;
  function physics(dt) {
    if (!state.launched) return;
    const p = state.planet;
    if (!p.alive) return;
    const L = LEVELS[state.levelIdx];
    const bodies = L.suns.concat(L.blackholes || []);
    let ax = 0, ay = 0;
    for (const b of bodies) {
      const ddx = b.x - p.x, ddy = b.y - p.y;
      const d2 = ddx*ddx + ddy*ddy + 80;
      const d = Math.sqrt(d2);
      const m = b.mass ? b.mass * 900 : (b.r * b.r * 0.34);
      const f = G * m / d2;
      ax += f * ddx / d;
      ay += f * ddy / d;
    }
    p.vx += ax * dt;
    p.vy += ay * dt;
    p.x  += p.vx * dt;
    p.y  += p.vy * dt;

    // trail
    state.trail.push({ x: p.x, y: p.y });
    if (state.trail.length > 80) state.trail.shift();

    // collisions
    for (const s of L.suns) {
      if (!s.hit && (p.x - s.x)*(p.x - s.x) + (p.y - s.y)*(p.y - s.y) <= (s.r + p.r) * (s.r + p.r)) {
        s.hit = true;
        p.alive = false;
        state.hits++;
        spawnBurst(s.x, s.y, 36, ['#fff2a8', '#ff9a3c', '#ff5e3a', '#ffd35a']);
        explode();
        $('hits').textContent = state.hits;
        // check level clear: all suns hit
        if (L.suns.every(z => z.hit)) {
          state.completed[state.levelIdx] = true;
          state.over = true;
          $('nextBtn').disabled = false;
          setTimeout(() => showOverlay('win'), 700);
          win();
        } else {
          // multi-sun level: respawn planet next tick? simplest: end run, force retry from same setup but with hit suns persisted
          setTimeout(() => {
            // soft respawn near start; existing hit suns remain glowing-hit
            state.planet = {
              x: LEVELS[state.levelIdx].planet.x,
              y: LEVELS[state.levelIdx].planet.y,
              vx: 0, vy: 0, r: 16, alive: true
            };
            state.trail = [];
            state.launched = false;
          }, 500);
        }
        return;
      }
    }
    for (const rk of L.rocks) {
      if ((p.x - rk.x)*(p.x - rk.x) + (p.y - rk.y)*(p.y - rk.y) <= (rk.r + p.r) * (rk.r + p.r)) {
        p.alive = false;
        spawnBurst(p.x, p.y, 22, ['#9a8cb8', '#574667', '#5ec2ff']);
        shatter();
        setTimeout(() => failRun('shattered on a rock.'), 500);
        return;
      }
    }
    for (const bh of (L.blackholes || [])) {
      const d2 = (p.x - bh.x)*(p.x - bh.x) + (p.y - bh.y)*(p.y - bh.y);
      if (d2 <= (bh.r * BH_KILL_R_MULT + p.r) * (bh.r * BH_KILL_R_MULT + p.r)) {
        p.alive = false;
        spawnSwallow(bh.x, bh.y);
        vacuum();
        setTimeout(() => failRun('lost to the void.'), 600);
        return;
      }
    }
    // off-screen?
    if (p.x < -200 || p.x > WORLD_W + 200 || p.y < -200 || p.y > WORLD_H + 200) {
      p.alive = false;
      setTimeout(() => failRun('flung into deep space.'), 400);
    }
  }

  function failRun(msg) {
    if (state.completed[state.levelIdx]) return;
    state.settled = true;
    state.launched = false;
    state.planet = {
      x: LEVELS[state.levelIdx].planet.x,
      y: LEVELS[state.levelIdx].planet.y,
      vx: 0, vy: 0, r: 16, alive: true,
    };
    state.trail = [];
    setHint('<b>missed.</b> ' + msg + ' drag again.');
  }

  function spawnBurst(x, y, n, colors) {
    for (let i = 0; i < n; i++) {
      const ang = Math.random() * Math.PI * 2;
      const sp = 60 + Math.random() * 220;
      state.particles.push({
        x, y,
        vx: Math.cos(ang) * sp,
        vy: Math.sin(ang) * sp,
        life: 0.6 + Math.random() * 0.8,
        age: 0,
        r: 2 + Math.random() * 3,
        color: colors[Math.floor(Math.random() * colors.length)],
      });
    }
  }
  function spawnSwallow(bhx, bhy) {
    for (let i = 0; i < 18; i++) {
      const ang = Math.random() * Math.PI * 2;
      const dist = 80 + Math.random() * 80;
      state.particles.push({
        x: bhx + Math.cos(ang) * dist,
        y: bhy + Math.sin(ang) * dist,
        vx: -Math.cos(ang) * 240,
        vy: -Math.sin(ang) * 240,
        life: 0.7,
        age: 0,
        r: 2.5,
        color: '#b48dff',
        spiral: true,
        cx: bhx, cy: bhy,
      });
    }
  }

  function stepParticles(dt) {
    for (const pt of state.particles) {
      pt.age += dt;
      if (pt.spiral) {
        // pull inward
        const ddx = pt.cx - pt.x, ddy = pt.cy - pt.y;
        const d = Math.sqrt(ddx*ddx + ddy*ddy) + 1;
        pt.vx += (ddx / d) * 400 * dt;
        pt.vy += (ddy / d) * 400 * dt;
      }
      pt.x += pt.vx * dt;
      pt.y += pt.vy * dt;
      pt.vx *= 0.985;
      pt.vy *= 0.985;
    }
    state.particles = state.particles.filter(p => p.age < p.life);
  }
  function drawParticles() {
    for (const pt of state.particles) {
      const a = 1 - pt.age / pt.life;
      ctx.globalAlpha = Math.max(0, a);
      ctx.fillStyle = pt.color;
      ctx.beginPath();
      ctx.arc(wx(pt.x), wy(pt.y), pt.r * scale * (0.6 + a * 0.4), 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  // ---- Main loop ----
  function frame(t) {
    const dt = Math.min(0.045, (t - lastT) / 1000 || 0.016);
    lastT = t;
    ctx.fillStyle = 'rgba(6, 2, 24, 0.55)';
    ctx.fillRect(0, 0, W, H);

    drawStars(t);

    const L = LEVELS[state.levelIdx];
    for (const bh of (L.blackholes || [])) drawBlackhole(bh, t);
    for (const s of L.suns) drawSun(s, t);
    for (const rk of L.rocks) drawRock(rk);

    drawTrail();
    drawParticles();
    drawAim();
    drawPlanet();

    physics(dt);
    stepParticles(dt);

    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // ---- Input ----
  function eventToWorld(ev) {
    const rect = canvas.getBoundingClientRect();
    const px = (ev.clientX || (ev.touches && ev.touches[0].clientX)) - rect.left;
    const py = (ev.clientY || (ev.touches && ev.touches[0].clientY)) - rect.top;
    return { x: sx(px), y: sy(py) };
  }
  function onDown(ev) {
    if (state.launched) return;
    if (state.over) return;
    const p = state.planet; if (!p || !p.alive) return;
    const pos = eventToWorld(ev);
    const dx = pos.x - p.x, dy = pos.y - p.y;
    if (Math.hypot(dx, dy) > 80) return; // must start near planet
    state.aim = { cx: p.x, cy: p.y, sx: pos.x, sy: pos.y };
    canvas.classList.add('dragging');
    ev.preventDefault();
  }
  function onMove(ev) {
    if (!state.aim || state.launched) return;
    const pos = eventToWorld(ev);
    state.aim.sx = pos.x;
    state.aim.sy = pos.y;
    ev.preventDefault();
  }
  function onUp(ev) {
    if (!state.aim || state.launched) { state.aim = null; canvas.classList.remove('dragging'); return; }
    const a = state.aim;
    const dx = a.sx - a.cx;
    const dy = a.sy - a.cy;
    const dist = Math.hypot(dx, dy);
    state.aim = null;
    canvas.classList.remove('dragging');
    if (dist < 12) return;  // too small, abort launch
    const VS = 5.5;
    // launch direction is opposite of drag (pull-back like a slingshot)
    state.planet.vx = dx * VS;
    state.planet.vy = dy * VS;
    state.launched = true;
    state.tries++;
    $('tries').textContent = state.tries;
    swoosh();
    setHint('flying — pray to gravity.');
  }
  canvas.addEventListener('mousedown', onDown);
  canvas.addEventListener('mousemove', onMove);
  window.addEventListener('mouseup', onUp);
  canvas.addEventListener('touchstart', onDown, { passive: false });
  canvas.addEventListener('touchmove', onMove, { passive: false });
  window.addEventListener('touchend', onUp);

  // ---- Buttons ----
  $('resetBtn').addEventListener('click', () => loadLevel(state.levelIdx));
  $('nextBtn').addEventListener('click', () => {
    if (state.levelIdx + 1 < LEVELS.length) {
      loadLevel(state.levelIdx + 1);
      hideOverlay();
    } else {
      showOverlay('done');
    }
  });
  $('muteBtn').addEventListener('click', () => {
    muted = !muted;
    $('muteBtn').textContent = muted ? '♪ off' : '♪ on';
    $('muteBtn').setAttribute('aria-pressed', String(muted));
  });

  // ---- Overlay ----
  function showOverlay(kind) {
    const ov = $('overlay');
    const title = $('ovTitle');
    const body = $('ovBody');
    const stats = $('ovStats');
    const dots = $('ovDots');
    const go = $('ovGo');
    const retry = $('ovRetry');
    title.className = '';
    if (kind === 'intro') {
      title.textContent = 'orbital fling';
      body.textContent = 'Slingshot the blue planet into the glowing sun. Suns pull you in — use that. Watch for rocks (instant shatter) and black holes (instant void).';
      stats.innerHTML = '';
      go.textContent = 'Begin';
      retry.style.display = 'none';
    } else if (kind === 'win') {
      title.className = 'win';
      title.textContent = 'solar contact';
      const L = LEVELS[state.levelIdx];
      const triesTxt = state.tries === 1 ? '1 try' : (state.tries + ' tries');
      body.textContent = (state.tries <= L.par) ? 'clean hit. ' + triesTxt + '.' : 'made it. ' + triesTxt + '.';
      stats.innerHTML = '<div class="pill">Level <span class="v">' + (state.levelIdx + 1) + '</span></div>'
                     + '<div class="pill">Par <span class="v">' + L.par + '</span></div>'
                     + '<div class="pill good">Tries <span class="v">' + state.tries + '</span></div>';
      go.textContent = (state.levelIdx + 1 < LEVELS.length) ? 'Next level ›' : 'Finish';
      retry.style.display = '';
    } else if (kind === 'done') {
      title.className = 'win';
      title.textContent = 'all suns lit';
      body.textContent = 'You cleared every level. The cosmos thanks you.';
      stats.innerHTML = '<div class="pill good">Suns <span class="v">' + state.hits + '</span></div>'
                     + '<div class="pill">Total tries <span class="v">' + state.tries + '</span></div>';
      go.textContent = 'Play again';
      retry.style.display = 'none';
    }
    // dots
    dots.innerHTML = '';
    for (let i = 0; i < LEVELS.length; i++) {
      const d = document.createElement('span');
      if (state.completed[i]) d.className = 'done';
      if (i === state.levelIdx && kind !== 'done') d.className = (d.className ? 'done curr' : 'curr');
      dots.appendChild(d);
    }
    ov.classList.add('show');
    ov.setAttribute('aria-hidden', 'false');
    go.focus();
  }
  function hideOverlay() {
    const ov = $('overlay');
    ov.classList.remove('show');
    ov.setAttribute('aria-hidden', 'true');
  }
  $('ovGo').addEventListener('click', () => {
    if ($('ovTitle').textContent === 'all suns lit') {
      // play again
      state.levelIdx = 0;
      state.tries = 0;
      state.hits = 0;
      state.completed = new Array(LEVELS.length).fill(false);
      $('tries').textContent = 0;
      $('hits').textContent = 0;
      loadLevel(0);
    } else if ($('ovTitle').textContent === 'solar contact') {
      if (state.levelIdx + 1 < LEVELS.length) {
        loadLevel(state.levelIdx + 1);
      } else {
        showOverlay('done');
        return;
      }
    }
    hideOverlay();
  });
  $('ovRetry').addEventListener('click', () => {
    loadLevel(state.levelIdx);
    hideOverlay();
  });

  // ---- Keyboard ----
  window.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === 'r' || e.key === 'R') { loadLevel(state.levelIdx); hideOverlay(); }
    if (e.key === 'n' || e.key === 'N') {
      if (!$('nextBtn').disabled) {
        if (state.levelIdx + 1 < LEVELS.length) loadLevel(state.levelIdx + 1);
        hideOverlay();
      }
    }
    if (e.key === 'Escape') hideOverlay();
  });

  // ---- Boot ----
  loadLevel(0);
  showOverlay('intro');
})();
</script>
</body>
</html>
