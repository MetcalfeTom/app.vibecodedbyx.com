<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>Space Pizza</title>
<link rel="icon" href="https://emojicdn.elk.sh/🍕">
<meta property="og:title" content="Space Pizza">
<meta property="og:description" content="Deliver pizzas across the galaxy while dodging asteroids and aliens.">
<meta property="og:url" content="https://sloppy.live/space-pizza">
<meta property="og:image" content="https://emojicdn.elk.sh/🍕?style=apple&size=512">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#06050e;touch-action:none;user-select:none}
canvas{display:block;position:absolute;top:0;left:0}

#hud{
  position:fixed;top:0;left:0;right:0;z-index:10;
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 16px;pointer-events:none;
}
#hud-score{font-family:'Bungee Shade',sans-serif;font-size:18px;color:#ff8800;text-shadow:0 0 10px rgba(255,136,0,0.4)}
#hud-pizzas{font-family:'Share Tech Mono',monospace;font-size:13px;color:#ffcc00}
#hud-lives{font-family:'Share Tech Mono',monospace;font-size:14px;color:#ff4466}

#overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:20;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(6,5,14,0.9);backdrop-filter:blur(6px);
  transition:opacity .4s;
}
#overlay.hidden{opacity:0;pointer-events:none}
#overlay h1{
  font-family:'Bungee Shade',sans-serif;font-size:clamp(24px,6vw,48px);
  color:#ff8800;letter-spacing:2px;
  text-shadow:0 0 25px rgba(255,136,0,0.4);
  margin-bottom:6px;
}
#overlay .sub{
  font-family:'Share Tech Mono',monospace;font-size:12px;
  color:rgba(255,255,255,0.35);margin-bottom:24px;text-align:center;line-height:1.7;
}
.final-num{
  font-family:'Bungee Shade',sans-serif;font-size:42px;color:#ff8800;
  text-shadow:0 0 20px rgba(255,136,0,0.4);margin-bottom:4px;
}
.final-sub{font-family:'Share Tech Mono',monospace;font-size:11px;color:rgba(255,255,255,0.3);margin-bottom:20px}
#start-btn{
  font-family:'Bungee Shade',sans-serif;font-size:14px;letter-spacing:2px;
  background:none;border:2px solid rgba(255,136,0,0.5);
  color:#ff8800;padding:12px 40px;border-radius:6px;cursor:pointer;
  transition:all .2s;
}
#start-btn:hover{border-color:#ff8800;background:rgba(255,136,0,0.08);transform:scale(1.04)}

#touch-controls{
  position:fixed;bottom:16px;left:50%;transform:translateX(-50%);z-index:10;
  display:none;gap:12px;
}
.touch-btn{
  width:56px;height:56px;border-radius:50%;
  background:rgba(255,136,0,0.1);border:2px solid rgba(255,136,0,0.3);
  color:#ff8800;font-size:20px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;
}
.touch-btn:active{background:rgba(255,136,0,0.3)}
#boost-btn{
  position:fixed;bottom:20px;right:20px;z-index:10;display:none;
  width:60px;height:60px;border-radius:50%;
  background:rgba(255,204,0,0.1);border:2px solid rgba(255,204,0,0.3);
  color:#ffcc00;font-family:'Share Tech Mono',monospace;font-size:10px;
  cursor:pointer;align-items:center;justify-content:center;
}
@media(max-width:768px),(pointer:coarse){
  #touch-controls{display:flex}
  #boost-btn{display:flex}
}

a#back{position:fixed;bottom:8px;left:10px;font-size:9px;opacity:0.15;color:#888;text-decoration:none;z-index:5}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="hud">
  <span id="hud-score">0</span>
  <span id="hud-pizzas"></span>
  <span id="hud-lives"></span>
</div>

<div id="overlay">
  <h1 id="title">SPACE PIZZA</h1>
  <div class="sub" id="sub-text">Arrow keys or WASD to fly<br>Collect pizza orders, deliver to planets<br>Dodge asteroids and alien ships</div>
  <div class="final-num" id="final-score" style="display:none"></div>
  <div class="final-sub" id="final-label" style="display:none"></div>
  <button id="start-btn">LAUNCH</button>
</div>

<div id="touch-controls">
  <button class="touch-btn" data-dir="left">◄</button>
  <button class="touch-btn" data-dir="up">▲</button>
  <button class="touch-btn" data-dir="down">▼</button>
  <button class="touch-btn" data-dir="right">►</button>
</div>
<button id="boost-btn">BOOST</button>

<a id="back" href="https://sloppy.live">sloppy.live</a>

<script>
(function(){
'use strict';

var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
var W,H,dpr;

function resize(){
  dpr=window.devicePixelRatio||1;
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
resize();window.addEventListener('resize',resize);

// Audio
var actx=null;
function initAudio(){if(!actx)try{actx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}
function tone(f,d,v,t){
  if(!actx)return;var now=actx.currentTime;
  var o=actx.createOscillator();var g=actx.createGain();
  o.type=t||'sine';o.frequency.setValueAtTime(f,now);
  g.gain.setValueAtTime(v||0.04,now);g.gain.exponentialRampToValueAtTime(0.001,now+d);
  o.connect(g);g.connect(actx.destination);o.start(now);o.stop(now+d);
}
function sfxPickup(){tone(660,0.08,0.05,'square');setTimeout(function(){tone(880,0.1,0.05,'square')},50)}
function sfxDeliver(){tone(523,0.1,0.06);tone(659,0.1,0.05);setTimeout(function(){tone(784,0.12,0.06)},80);setTimeout(function(){tone(1047,0.2,0.07)},160)}
function sfxHit(){tone(100,0.2,0.07,'sawtooth');tone(70,0.3,0.05,'sawtooth')}
function sfxBoost(){tone(300,0.15,0.04,'triangle');tone(400,0.1,0.03,'triangle')}

var state='menu';
var score=0,lives=3,deliveries=0;
var time=0,screenShake=0;
var bestScore=parseInt(localStorage.getItem('spacepizza_best'))||0;

// Ship
var ship={x:0,y:0,vx:0,vy:0,angle:0,carrying:0,maxCarry:3,boost:100,invuln:0,trail:[]};
var SHIP_ACCEL=0.18;
var SHIP_FRICTION=0.985;
var SHIP_MAX_SPEED=5;
var BOOST_SPEED=8;

// World
var camX=0,camY=0;
var stars=[];
var pizzaOrders=[];
var planets=[];
var asteroids=[];
var aliens=[];
var particles=[];
var WORLD_R=2000;

// Input
var keys={};
var touchDirs={left:false,right:false,up:false,down:false};
var boosting=false;

function initGame(){
  score=0;lives=3;deliveries=0;time=0;screenShake=0;
  ship.x=0;ship.y=0;ship.vx=0;ship.vy=0;ship.angle=0;
  ship.carrying=0;ship.boost=100;ship.invuln=0;ship.trail=[];
  pizzaOrders=[];planets=[];asteroids=[];aliens=[];particles=[];

  // Generate stars
  stars=[];
  for(var i=0;i<200;i++){
    stars.push({x:(Math.random()-0.5)*WORLD_R*2.5,y:(Math.random()-0.5)*WORLD_R*2.5,
      s:Math.random()*1.5+0.5,b:Math.random()});
  }

  // Planets (delivery targets)
  var planetColors=['#4488ff','#44ff88','#ff44aa','#ffaa00','#aa44ff','#ff6644'];
  var planetNames=['Mozzarella Prime','Pepperoni VII','Funghi Station','Anchovy Belt','Olive Moon','Basil World'];
  for(var i=0;i<6;i++){
    var a=Math.PI*2*i/6+Math.random()*0.5;
    var d=400+Math.random()*500;
    planets.push({
      x:Math.cos(a)*d,y:Math.sin(a)*d,
      r:30+Math.random()*15,
      color:planetColors[i],name:planetNames[i],
      demand:0,demandTimer:0,
      ring:Math.random()>0.5,
      phase:Math.random()*Math.PI*2
    });
  }

  // Initial pizza orders
  for(var i=0;i<5;i++)spawnPizza();

  // Asteroids
  for(var i=0;i<25;i++)spawnAsteroid();

  // Aliens
  for(var i=0;i<3;i++)spawnAlien();

  // Set demand on random planets
  for(var i=0;i<2;i++){
    var p=planets[Math.floor(Math.random()*planets.length)];
    p.demand=1+Math.floor(Math.random()*2);
    p.demandTimer=900;
  }

  updateHUD();
}

function spawnPizza(){
  var a=Math.random()*Math.PI*2;
  var d=200+Math.random()*800;
  pizzaOrders.push({x:Math.cos(a)*d,y:Math.sin(a)*d,bob:Math.random()*Math.PI*2});
}

function spawnAsteroid(){
  var a=Math.random()*Math.PI*2;
  var d=150+Math.random()*WORLD_R*0.9;
  var sp=Math.random()*0.5+0.2;
  var dir=Math.random()*Math.PI*2;
  asteroids.push({
    x:Math.cos(a)*d,y:Math.sin(a)*d,
    vx:Math.cos(dir)*sp,vy:Math.sin(dir)*sp,
    r:8+Math.random()*18,rot:0,rv:(Math.random()-0.5)*0.02,
    jagged:[]
  });
  // Generate jagged shape
  var ast=asteroids[asteroids.length-1];
  var pts=6+Math.floor(Math.random()*5);
  for(var i=0;i<pts;i++){
    ast.jagged.push(0.6+Math.random()*0.4);
  }
}

function spawnAlien(){
  var a=Math.random()*Math.PI*2;
  var d=500+Math.random()*600;
  aliens.push({
    x:Math.cos(a)*d,y:Math.sin(a)*d,
    vx:0,vy:0,angle:0,
    shootTimer:120+Math.floor(Math.random()*120),
    hp:2
  });
}

function dist(a,b){return Math.sqrt((a.x-b.x)*(a.x-b.x)+(a.y-b.y)*(a.y-b.y))}

function updateHUD(){
  document.getElementById('hud-score').textContent=score;
  document.getElementById('hud-pizzas').textContent='🍕'.repeat(ship.carrying)+('○'.repeat(ship.maxCarry-ship.carrying));
  document.getElementById('hud-lives').textContent='♥'.repeat(lives);
}

function update(){
  if(state!=='playing')return;
  time+=0.016;

  // Input
  var ax=0,ay=0;
  if(keys.ArrowLeft||keys.a||keys.A||touchDirs.left)ax-=1;
  if(keys.ArrowRight||keys.d||keys.D||touchDirs.right)ax+=1;
  if(keys.ArrowUp||keys.w||keys.W||touchDirs.up)ay-=1;
  if(keys.ArrowDown||keys.s||keys.S||touchDirs.down)ay+=1;

  var maxSpd=SHIP_MAX_SPEED;
  if((keys.Shift||boosting)&&ship.boost>0){
    maxSpd=BOOST_SPEED;ship.boost=Math.max(0,ship.boost-0.5);
  }else{
    ship.boost=Math.min(100,ship.boost+0.15);
  }

  // Normalize diagonal
  if(ax&&ay){ax*=0.707;ay*=0.707}
  ship.vx+=ax*SHIP_ACCEL;ship.vy+=ay*SHIP_ACCEL;
  var spd=Math.sqrt(ship.vx*ship.vx+ship.vy*ship.vy);
  if(spd>maxSpd){ship.vx*=maxSpd/spd;ship.vy*=maxSpd/spd}
  ship.vx*=SHIP_FRICTION;ship.vy*=SHIP_FRICTION;
  ship.x+=ship.vx;ship.y+=ship.vy;

  // Angle
  if(Math.abs(ship.vx)>0.1||Math.abs(ship.vy)>0.1){
    ship.angle=Math.atan2(ship.vy,ship.vx);
  }

  // Trail
  if(spd>0.5){
    ship.trail.push({x:ship.x,y:ship.y,life:1});
    if(ship.trail.length>30)ship.trail.shift();
  }
  for(var i=ship.trail.length-1;i>=0;i--){
    ship.trail[i].life-=0.04;
    if(ship.trail[i].life<=0)ship.trail.splice(i,1);
  }

  // World wrap
  if(ship.x>WORLD_R)ship.x=-WORLD_R;
  if(ship.x<-WORLD_R)ship.x=WORLD_R;
  if(ship.y>WORLD_R)ship.y=-WORLD_R;
  if(ship.y<-WORLD_R)ship.y=WORLD_R;

  if(ship.invuln>0)ship.invuln--;

  // Pickup pizzas
  for(var i=pizzaOrders.length-1;i>=0;i--){
    var pz=pizzaOrders[i];
    pz.bob+=0.03;
    if(dist(ship,pz)<22&&ship.carrying<ship.maxCarry){
      ship.carrying++;sfxPickup();
      for(var j=0;j<6;j++){
        var a=Math.random()*Math.PI*2;
        particles.push({x:pz.x,y:pz.y,vx:Math.cos(a)*2,vy:Math.sin(a)*2,life:1,color:'#ffcc00',size:2});
      }
      pizzaOrders.splice(i,1);
      spawnPizza();
      updateHUD();
    }
  }

  // Deliver to planets
  for(var i=0;i<planets.length;i++){
    var pl=planets[i];
    pl.phase+=0.005;
    if(pl.demandTimer>0){
      pl.demandTimer--;
      if(pl.demandTimer<=0){pl.demand=0}
    }
    if(pl.demand>0&&ship.carrying>0&&dist(ship,pl)<pl.r+20){
      var delivered=Math.min(ship.carrying,pl.demand);
      ship.carrying-=delivered;
      pl.demand-=delivered;
      deliveries+=delivered;
      var bonus=50*delivered+(pl.demandTimer>600?20:0);
      score+=bonus;
      sfxDeliver();
      // Particles
      for(var j=0;j<15;j++){
        var a=Math.random()*Math.PI*2;
        particles.push({x:pl.x,y:pl.y,vx:Math.cos(a)*3,vy:Math.sin(a)*3,life:1,color:pl.color,size:3});
      }
      particles.push({x:pl.x,y:pl.y-pl.r-10,vx:0,vy:-1,life:1,text:'+'+bonus,color:'#ffcc00',size:16});
      screenShake=3;
      updateHUD();

      // New demand after delivery
      if(pl.demand<=0){
        setTimeout(function(){
          if(state!=='playing')return;
          var rp=planets[Math.floor(Math.random()*planets.length)];
          rp.demand=1+Math.floor(Math.random()*3);
          rp.demandTimer=900-deliveries*10;
          if(rp.demandTimer<300)rp.demandTimer=300;
        },2000+Math.random()*3000);
      }
    }
  }

  // Asteroids
  for(var i=0;i<asteroids.length;i++){
    var ast=asteroids[i];
    ast.x+=ast.vx;ast.y+=ast.vy;ast.rot+=ast.rv;
    // Wrap
    if(ast.x>WORLD_R+50)ast.x=-WORLD_R-50;
    if(ast.x<-WORLD_R-50)ast.x=WORLD_R+50;
    if(ast.y>WORLD_R+50)ast.y=-WORLD_R-50;
    if(ast.y<-WORLD_R-50)ast.y=WORLD_R+50;
    // Collision
    if(ship.invuln<=0&&dist(ship,ast)<ast.r+10){
      hitShip();
    }
  }

  // Aliens
  for(var i=aliens.length-1;i>=0;i--){
    var al=aliens[i];
    // Move toward ship slowly
    var dx=ship.x-al.x,dy=ship.y-al.y;
    var dd=Math.sqrt(dx*dx+dy*dy);
    if(dd>150){
      al.vx+=(dx/dd)*0.04;al.vy+=(dy/dd)*0.04;
    }else{
      // Strafe
      al.vx+=(-dy/dd)*0.03;al.vy+=(dx/dd)*0.03;
    }
    var aSpd=Math.sqrt(al.vx*al.vx+al.vy*al.vy);
    if(aSpd>1.5){al.vx*=1.5/aSpd;al.vy*=1.5/aSpd}
    al.x+=al.vx;al.y+=al.vy;
    al.angle=Math.atan2(dy,dx);

    // Collision
    if(ship.invuln<=0&&dist(ship,al)<22){
      hitShip();al.hp--;
      if(al.hp<=0){
        score+=30;
        for(var j=0;j<10;j++){
          var a=Math.random()*Math.PI*2;
          particles.push({x:al.x,y:al.y,vx:Math.cos(a)*3,vy:Math.sin(a)*3,life:1,color:'#44ff88',size:2});
        }
        aliens.splice(i,1);
        setTimeout(function(){if(state==='playing')spawnAlien()},5000);
        updateHUD();
      }
    }
  }

  // Particles
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];
    p.x+=(p.vx||0);p.y+=(p.vy||0);
    if(!p.text&&p.vy!==undefined)p.vy+=0.01;
    p.life-=p.text?0.02:0.025;
    if(p.life<=0)particles.splice(i,1);
  }

  // Shake
  if(screenShake>0){screenShake*=0.9;if(screenShake<0.2)screenShake=0}

  // Spawn more pizzas if needed
  if(pizzaOrders.length<4)spawnPizza();
}

function hitShip(){
  if(ship.invuln>0)return;
  lives--;ship.invuln=120;
  // Drop a pizza
  if(ship.carrying>0){
    ship.carrying--;
    pizzaOrders.push({x:ship.x+(Math.random()-0.5)*40,y:ship.y+(Math.random()-0.5)*40,bob:0});
  }
  sfxHit();screenShake=6;
  for(var i=0;i<8;i++){
    var a=Math.random()*Math.PI*2;
    particles.push({x:ship.x,y:ship.y,vx:Math.cos(a)*3,vy:Math.sin(a)*3,life:1,color:'#ff4466',size:3});
  }
  updateHUD();
  if(lives<=0)gameOver();
}

function gameOver(){
  state='gameover';
  if(score>bestScore){bestScore=score;localStorage.setItem('spacepizza_best',bestScore)}
  setTimeout(function(){
    document.getElementById('title').textContent='GAME OVER';
    document.getElementById('sub-text').textContent=deliveries+' deliveries completed';
    document.getElementById('final-score').textContent=score;
    document.getElementById('final-score').style.display='block';
    document.getElementById('final-label').textContent=score>=bestScore?'NEW BEST!':'BEST: '+bestScore;
    document.getElementById('final-label').style.display='block';
    document.getElementById('start-btn').textContent='RETRY';
    document.getElementById('overlay').classList.remove('hidden');
  },800);
}

// Drawing
function draw(){
  update();
  ctx.clearRect(0,0,W,H);

  // Camera
  camX=ship.x-W/2;camY=ship.y-H/2;
  var shake=screenShake>0?(Math.random()-0.5)*screenShake:0;

  // Background
  ctx.fillStyle='#06050e';ctx.fillRect(0,0,W,H);

  ctx.save();
  ctx.translate(-camX+shake,-camY+shake);

  // Stars (parallax)
  for(var i=0;i<stars.length;i++){
    var st=stars[i];
    var sx=st.x*0.3,sy=st.y*0.3; // parallax
    // Wrap into view
    var vx=((sx-camX*0.3)%W+W)%W;
    var vy=((sy-camY*0.3)%H+H)%H;
    ctx.save();
    ctx.globalAlpha=0.3+st.b*0.4;
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(vx+camX,vy+camY,st.s,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // Ship trail
  for(var i=0;i<ship.trail.length;i++){
    var tr=ship.trail[i];
    ctx.save();
    ctx.globalAlpha=tr.life*0.4;
    ctx.fillStyle='#ff8800';
    ctx.shadowColor='#ff8800';ctx.shadowBlur=6;
    ctx.beginPath();ctx.arc(tr.x,tr.y,2*tr.life,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // Planets
  for(var i=0;i<planets.length;i++){
    var pl=planets[i];
    ctx.save();

    // Glow
    ctx.shadowColor=pl.color;
    ctx.shadowBlur=20;
    ctx.fillStyle=pl.color;
    ctx.globalAlpha=0.15;
    ctx.beginPath();ctx.arc(pl.x,pl.y,pl.r+15,0,Math.PI*2);ctx.fill();

    // Body
    ctx.globalAlpha=0.8;ctx.shadowBlur=10;
    ctx.beginPath();ctx.arc(pl.x,pl.y,pl.r,0,Math.PI*2);ctx.fill();

    // Ring
    if(pl.ring){
      ctx.shadowBlur=0;ctx.globalAlpha=0.3;
      ctx.strokeStyle=pl.color;ctx.lineWidth=2;
      ctx.beginPath();
      ctx.ellipse(pl.x,pl.y,pl.r+12,pl.r*0.3,0.3,0,Math.PI*2);
      ctx.stroke();
    }

    // Demand indicator
    if(pl.demand>0){
      ctx.shadowBlur=0;ctx.globalAlpha=0.6+Math.sin(time*4)*0.3;
      ctx.font='16px serif';ctx.textAlign='center';
      ctx.fillText('🍕'+'×'+pl.demand,pl.x,pl.y-pl.r-12);

      // Urgency ring
      ctx.globalAlpha=0.2+Math.sin(time*3)*0.15;
      ctx.strokeStyle='#ffcc00';ctx.lineWidth=2;
      ctx.setLineDash([4,4]);ctx.lineDashOffset=-time*20;
      ctx.beginPath();ctx.arc(pl.x,pl.y,pl.r+22,0,Math.PI*2);ctx.stroke();
      ctx.setLineDash([]);
    }

    // Name
    ctx.shadowBlur=0;ctx.globalAlpha=0.25;
    ctx.fillStyle='#fff';
    ctx.font='9px Share Tech Mono,monospace';ctx.textAlign='center';
    ctx.fillText(pl.name,pl.x,pl.y+pl.r+14);

    ctx.restore();
  }

  // Pizza orders
  for(var i=0;i<pizzaOrders.length;i++){
    var pz=pizzaOrders[i];
    var by=Math.sin(pz.bob)*4;
    ctx.save();
    ctx.font='20px serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.shadowColor='#ffcc00';ctx.shadowBlur=8;
    ctx.fillText('🍕',pz.x,pz.y+by);
    ctx.restore();
  }

  // Asteroids
  for(var i=0;i<asteroids.length;i++){
    var ast=asteroids[i];
    ctx.save();
    ctx.translate(ast.x,ast.y);ctx.rotate(ast.rot);
    ctx.fillStyle='#3a3a50';
    ctx.strokeStyle='#5a5a70';ctx.lineWidth=1;
    ctx.beginPath();
    var pts=ast.jagged.length;
    for(var j=0;j<pts;j++){
      var a=Math.PI*2*j/pts;
      var r=ast.r*ast.jagged[j];
      if(j===0)ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r);
      else ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
    }
    ctx.closePath();ctx.fill();ctx.stroke();
    ctx.restore();
  }

  // Aliens
  for(var i=0;i<aliens.length;i++){
    var al=aliens[i];
    ctx.save();
    ctx.translate(al.x,al.y);
    // Saucer shape
    ctx.fillStyle='#44ff88';
    ctx.shadowColor='#44ff88';ctx.shadowBlur=10;
    ctx.globalAlpha=0.8;
    ctx.beginPath();
    ctx.ellipse(0,0,14,6,0,0,Math.PI*2);
    ctx.fill();
    // Dome
    ctx.beginPath();
    ctx.arc(0,-3,6,Math.PI,0);
    ctx.fillStyle='#88ffbb';ctx.fill();
    // Eye
    ctx.shadowBlur=0;ctx.globalAlpha=1;
    ctx.fillStyle='#000';
    ctx.beginPath();ctx.arc(0,-3,2,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // Ship
  ctx.save();
  ctx.translate(ship.x,ship.y);
  ctx.rotate(ship.angle);

  if(ship.invuln>0&&Math.floor(ship.invuln/4)%2===0){
    ctx.globalAlpha=0.3;
  }

  // Engine glow
  ctx.shadowColor='#ff8800';ctx.shadowBlur=12;
  ctx.fillStyle='#ff6600';
  ctx.beginPath();ctx.moveTo(-14,-3);ctx.lineTo(-20,0);ctx.lineTo(-14,3);ctx.fill();

  // Body
  ctx.shadowColor='#ffaa00';ctx.shadowBlur=8;
  ctx.fillStyle='#ff8800';
  ctx.beginPath();
  ctx.moveTo(14,0);ctx.lineTo(-8,-8);ctx.lineTo(-6,0);ctx.lineTo(-8,8);
  ctx.closePath();ctx.fill();

  // Cockpit
  ctx.shadowBlur=0;
  ctx.fillStyle='#ffcc66';
  ctx.beginPath();ctx.arc(4,0,3,0,Math.PI*2);ctx.fill();

  ctx.restore();

  // Particles
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    ctx.save();
    ctx.globalAlpha=Math.max(0,p.life);
    if(p.text){
      ctx.font='bold '+p.size+'px Bungee Shade,sans-serif';
      ctx.textAlign='center';ctx.fillStyle=p.color;
      ctx.shadowColor=p.color;ctx.shadowBlur=8;
      ctx.fillText(p.text,p.x,p.y);
    }else{
      ctx.fillStyle=p.color;ctx.shadowColor=p.color;ctx.shadowBlur=4;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  }

  ctx.restore();

  // Minimap
  var mmS=80,mmX=W-mmS-10,mmY=H-mmS-10;
  var mmScale=mmS/(WORLD_R*2);
  ctx.save();
  ctx.globalAlpha=0.4;
  ctx.fillStyle='rgba(0,0,0,0.5)';
  ctx.strokeStyle='rgba(255,136,0,0.2)';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(mmX+mmS/2,mmY+mmS/2,mmS/2,0,Math.PI*2);ctx.fill();ctx.stroke();

  // Planets on minimap
  for(var i=0;i<planets.length;i++){
    var pl=planets[i];
    var mx=mmX+mmS/2+(pl.x*mmScale);
    var my=mmY+mmS/2+(pl.y*mmScale);
    ctx.fillStyle=pl.demand>0?'#ffcc00':pl.color;
    ctx.beginPath();ctx.arc(mx,my,pl.demand>0?3:2,0,Math.PI*2);ctx.fill();
  }

  // Ship on minimap
  ctx.fillStyle='#ff8800';
  ctx.beginPath();ctx.arc(mmX+mmS/2+(ship.x*mmScale),mmY+mmS/2+(ship.y*mmScale),2,0,Math.PI*2);ctx.fill();

  ctx.restore();

  // Boost bar
  if(state==='playing'){
    ctx.save();
    ctx.globalAlpha=0.3;
    ctx.fillStyle='#222';
    ctx.fillRect(10,H-20,80,6);
    ctx.fillStyle=ship.boost>30?'#ffcc00':'#ff4444';
    ctx.fillRect(10,H-20,80*(ship.boost/100),6);
    ctx.restore();
  }

  // Arrow to nearest demand planet
  if(state==='playing'){
    var nearest=null,nearDist=Infinity;
    for(var i=0;i<planets.length;i++){
      if(planets[i].demand>0){
        var d=dist(ship,planets[i]);
        if(d<nearDist){nearDist=d;nearest=planets[i]}
      }
    }
    if(nearest&&nearDist>nearest.r+60){
      var ang=Math.atan2(nearest.y-ship.y,nearest.x-ship.x);
      var ax=W/2+Math.cos(ang)*Math.min(W,H)*0.38;
      var ay=H/2+Math.sin(ang)*Math.min(W,H)*0.38;
      ctx.save();
      ctx.translate(ax,ay);ctx.rotate(ang);
      ctx.globalAlpha=0.3+Math.sin(time*3)*0.15;
      ctx.fillStyle='#ffcc00';
      ctx.beginPath();ctx.moveTo(10,0);ctx.lineTo(-4,-5);ctx.lineTo(-4,5);ctx.closePath();ctx.fill();
      ctx.restore();
    }
  }

  requestAnimationFrame(draw);
}

// Input
document.addEventListener('keydown',function(e){
  keys[e.key]=true;
  if(e.key===' ')e.preventDefault();
  initAudio();
});
document.addEventListener('keyup',function(e){keys[e.key]=false});

var touchBtns=document.querySelectorAll('.touch-btn');
for(var i=0;i<touchBtns.length;i++){
  (function(btn){
    btn.addEventListener('touchstart',function(e){e.preventDefault();touchDirs[btn.dataset.dir]=true;initAudio()},{passive:false});
    btn.addEventListener('touchend',function(e){e.preventDefault();touchDirs[btn.dataset.dir]=false},{passive:false});
    btn.addEventListener('touchcancel',function(){touchDirs[btn.dataset.dir]=false});
  })(touchBtns[i]);
}
var boostBtn=document.getElementById('boost-btn');
boostBtn.addEventListener('touchstart',function(e){e.preventDefault();boosting=true},{passive:false});
boostBtn.addEventListener('touchend',function(e){e.preventDefault();boosting=false},{passive:false});

document.getElementById('start-btn').addEventListener('click',function(e){
  e.stopPropagation();initAudio();
  document.getElementById('title').textContent='SPACE PIZZA';
  document.getElementById('final-score').style.display='none';
  document.getElementById('final-label').style.display='none';
  document.getElementById('start-btn').textContent='LAUNCH';
  document.getElementById('sub-text').textContent='Arrow keys or WASD to fly\nCollect pizza orders, deliver to planets\nDodge asteroids and alien ships';
  document.getElementById('overlay').classList.add('hidden');
  state='playing';
  initGame();
});

draw();

})();
</script>
<script src="/sloppy-header/sloppy-bar.js"></script>
</body>
</html>
