<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Hair-o-meter</title>
<link rel="icon" href="https://emojicdn.elk.sh/💇">
<meta property="og:title" content="Hair-o-meter">
<meta property="og:description" content="Slide the meter from bald disaster to legendary mane. How glorious is your hair?">
<meta property="og:url" content="https://sloppy.live/hair-o-meter/">
<meta property="og:image" content="https://sloppy.live/hair-o-meter/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a12;min-height:100dvh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Space Mono',monospace;user-select:none;overflow:hidden}
canvas{position:fixed;inset:0;z-index:0}
#panel{position:relative;z-index:5;display:flex;flex-direction:column;align-items:center;gap:16px;width:min(90%,420px);padding:20px}
#title{font-family:'Syne',sans-serif;font-size:clamp(24px,6vw,48px);font-weight:800;text-align:center;letter-spacing:3px;background:linear-gradient(135deg,#f0c040,#ff6090,#a040ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#subtitle{font-size:10px;color:rgba(200,180,255,.2);letter-spacing:4px;text-align:center}
#head-wrap{width:min(200px,50vw);aspect-ratio:1;position:relative}
#head-canvas{width:100%;height:100%}
#rating-num{font-family:'Syne',sans-serif;font-size:clamp(36px,10vw,72px);font-weight:800;text-align:center;min-height:1.2em;transition:color .3s}
#rating-label{font-size:clamp(11px,2.5vw,16px);font-weight:700;text-align:center;letter-spacing:3px;min-height:1.4em;transition:color .3s}
#slider-wrap{width:100%;padding:0 8px}
#hair-slider{-webkit-appearance:none;appearance:none;width:100%;height:8px;border-radius:4px;outline:none;background:linear-gradient(90deg,#888,#f0c040,#ff6090,#a040ff,#50ffdd);opacity:.7;transition:opacity .2s}
#hair-slider:hover{opacity:1}
#hair-slider::-webkit-slider-thumb{-webkit-appearance:none;width:24px;height:24px;border-radius:50%;background:#fff;cursor:pointer;box-shadow:0 0 12px rgba(255,255,255,.3)}
#scale-labels{display:flex;justify-content:space-between;width:100%;font-size:8px;color:rgba(200,180,255,.15);letter-spacing:1px}
#verdict{font-size:10px;color:rgba(200,180,255,.15);text-align:center;min-height:2.4em;line-height:1.4;max-width:90%;transition:color .3s}
#btn-row{display:flex;gap:8px}
.btn{font-family:'Space Mono',monospace;font-size:10px;padding:7px 14px;background:rgba(200,180,255,.05);border:1px solid rgba(200,180,255,.1);border-radius:5px;color:rgba(200,180,255,.3);cursor:pointer;letter-spacing:1px;transition:all .15s}
.btn:hover{background:rgba(200,180,255,.1);color:rgba(200,180,255,.6)}
a#backlink{position:fixed;bottom:6px;right:8px;color:rgba(255,255,255,.02);font-size:7px;text-decoration:none;z-index:5}
a#backlink:hover{color:rgba(255,255,255,.08)}
</style>
</head>
<body>
<canvas id="bg"></canvas>
<div id="panel">
 <div id="title">HAIR-O-METER</div>
 <div id="subtitle">ALGORITHMIC HAIR VOLUME ANALYSIS</div>
 <div id="username-area" style="display:flex;gap:6px;width:100%;margin-top:4px">
  <input id="name-input" type="text" placeholder="enter username..." maxlength="40" autocomplete="off" spellcheck="false" style="flex:1;font-family:'Space Mono',monospace;font-size:11px;padding:8px 12px;background:rgba(200,180,255,.04);border:1px solid rgba(200,180,255,.1);border-radius:6px;color:rgba(200,180,255,.5);outline:none">
  <button class="btn" onclick="analyzeUsername()" style="white-space:nowrap">ANALYZE</button>
 </div>
 <div id="head-wrap"><canvas id="head-canvas"></canvas></div>
 <div id="rating-num">50</div>
 <div id="rating-label">ACCEPTABLE</div>
 <div id="slider-wrap">
  <input type="range" id="hair-slider" min="0" max="100" value="50">
  <div id="scale-labels"><span>BALD DISASTER</span><span>LEGENDARY MANE</span></div>
 </div>
 <div id="verdict">Slide to discover your hair destiny.</div>
 <div id="btn-row">
  <button class="btn" onclick="randomize()">RANDOM</button>
  <button class="btn" onclick="spinHead()">SPIN</button>
 </div>
</div>
<a id="backlink" href="https://sloppy.live">sloppy.live</a>
<script>
// Background canvas
const BG=document.getElementById('bg'),BX=BG.getContext('2d');
// Head canvas
const HC=document.getElementById('head-canvas'),HX=HC.getContext('2d');
let W,H;
function resize(){
 W=BG.width=innerWidth;H=BG.height=innerHeight;
 const hw=HC.parentElement.clientWidth;
 HC.width=hw;HC.height=hw;
 drawHead(currentVal);
}
resize();addEventListener('resize',resize);

let currentVal=50;
let headSpin=0,headSpinVel=0;
let particles=[];

// Rating tiers
const TIERS=[
 {max:5, label:'CLINICALLY BALD',color:'#888888',verdict:'Your scalp is so shiny it was mistaken for a solar panel. Birds use it for navigation.'},
 {max:15,label:'BALD DISASTER',color:'#aa8866',verdict:'Three hairs remain. They have formed a support group. Morale is low.'},
 {max:25,label:'THINNING TRAGEDY',color:'#cc9955',verdict:'Your comb has filed for unemployment. The hair-to-head ratio is concerning.'},
 {max:35,label:'QUESTIONABLE',color:'#ddaa44',verdict:'Is that hair or just aggressive optimism? The wind is not your friend.'},
 {max:45,label:'BELOW AVERAGE',color:'#e0b830',verdict:'Your barber charges less because there is less to work with. Economical, at least.'},
 {max:55,label:'ACCEPTABLE',color:'#e0c840',verdict:'Neither impressive nor embarrassing. Your hair exists. That is its main quality.'},
 {max:65,label:'RESPECTABLE',color:'#c8d040',verdict:'A solid head of hair. Not turning heads, but not losing them either.'},
 {max:75,label:'IMPRESSIVE',color:'#80d860',verdict:'People have complimented this hair. Possibly to your face, definitely behind your back.'},
 {max:85,label:'MAGNIFICENT',color:'#50d8a0',verdict:'Shampoo companies want to study you. Your hair has its own gravitational field.'},
 {max:95,label:'GLORIOUS MANE',color:'#40c0e0',verdict:'Angels weep at the sight. Your hair has been nominated for a Nobel Prize.'},
 {max:101,label:'LEGENDARY',color:'#c080ff',verdict:'Your hair transcends mortal understanding. Galaxies were formed in its image. You are the chosen one.'},
];

function getTier(val){
 for(const t of TIERS)if(val<t.max)return t;
 return TIERS[TIERS.length-1];
}

// Audio
let actx;
function initAudio(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)()}
function tickSound(val){
 if(!actx)return;const t=actx.currentTime;
 const o=actx.createOscillator(),g=actx.createGain();
 o.type='sine';o.frequency.value=200+val*6;
 g.gain.setValueAtTime(.02,t);g.gain.exponentialRampToValueAtTime(.001,t+.04);
 o.connect(g);g.connect(actx.destination);o.start();o.stop(t+.04);
}
function glorySound(){
 if(!actx)return;const t=actx.currentTime;
 [523,659,784,1047].forEach((f,i)=>{
  const o=actx.createOscillator(),g=actx.createGain();
  o.type='sine';o.frequency.value=f;
  g.gain.setValueAtTime(.04,t+i*.08);g.gain.exponentialRampToValueAtTime(.001,t+i*.08+.3);
  o.connect(g);g.connect(actx.destination);o.start(t+i*.08);o.stop(t+i*.08+.3);
 });
}

// Draw the head with hair
function drawHead(val){
 const w=HC.width,h=HC.height;
 const cx=w/2,cy=h/2;
 const r=w*.32;
 HX.clearRect(0,0,w,h);

 const tier=getTier(val);

 // Head shadow
 HX.fillStyle='rgba(0,0,0,.2)';
 HX.beginPath();HX.ellipse(cx+2,cy+4,r,r*1.1,0,0,Math.PI*2);HX.fill();

 // Head
 const headG=HX.createRadialGradient(cx-r*.2,cy-r*.3,0,cx,cy,r*1.1);
 headG.addColorStop(0,'#f5d0a0');headG.addColorStop(.6,'#e0b080');headG.addColorStop(1,'#c89060');
 HX.fillStyle=headG;
 HX.beginPath();HX.ellipse(cx,cy,r,r*1.1,0,0,Math.PI*2);HX.fill();

 // Ears
 HX.fillStyle='#e0b080';
 HX.beginPath();HX.ellipse(cx-r*.95,cy+r*.1,r*.12,r*.2,-.2,0,Math.PI*2);HX.fill();
 HX.beginPath();HX.ellipse(cx+r*.95,cy+r*.1,r*.12,r*.2,.2,0,Math.PI*2);HX.fill();

 // Eyes
 const eyeY=cy+r*.05;
 const eyeSpread=r*.3;
 // Whites
 HX.fillStyle='#fff';
 HX.beginPath();HX.ellipse(cx-eyeSpread,eyeY,r*.13,r*.1,0,0,Math.PI*2);HX.fill();
 HX.beginPath();HX.ellipse(cx+eyeSpread,eyeY,r*.13,r*.1,0,0,Math.PI*2);HX.fill();
 // Pupils — look at rating
 const pupilOff=(val/100-.5)*r*.06;
 HX.fillStyle='#2a1a0a';
 HX.beginPath();HX.arc(cx-eyeSpread+pupilOff,eyeY,r*.06,0,Math.PI*2);HX.fill();
 HX.beginPath();HX.arc(cx+eyeSpread+pupilOff,eyeY,r*.06,0,Math.PI*2);HX.fill();
 // Eye shine
 HX.fillStyle='rgba(255,255,255,.6)';
 HX.beginPath();HX.arc(cx-eyeSpread+pupilOff+2,eyeY-2,r*.02,0,Math.PI*2);HX.fill();
 HX.beginPath();HX.arc(cx+eyeSpread+pupilOff+2,eyeY-2,r*.02,0,Math.PI*2);HX.fill();

 // Eyebrows — mood based
 HX.strokeStyle='#5a3a1a';HX.lineWidth=r*.04;HX.lineCap='round';
 const browLift=val>70?-r*.06:val<30?r*.04:0;
 HX.beginPath();HX.moveTo(cx-eyeSpread-r*.12,eyeY-r*.18+browLift);
 HX.quadraticCurveTo(cx-eyeSpread,eyeY-r*.22+browLift*.5,cx-eyeSpread+r*.12,eyeY-r*.16+browLift);HX.stroke();
 HX.beginPath();HX.moveTo(cx+eyeSpread-r*.12,eyeY-r*.16+browLift);
 HX.quadraticCurveTo(cx+eyeSpread,eyeY-r*.22+browLift*.5,cx+eyeSpread+r*.12,eyeY-r*.18+browLift);HX.stroke();

 // Nose
 HX.strokeStyle='#c89060';HX.lineWidth=r*.03;
 HX.beginPath();HX.moveTo(cx,eyeY+r*.08);HX.quadraticCurveTo(cx+r*.06,eyeY+r*.22,cx,eyeY+r*.25);HX.stroke();

 // Mouth — mood based
 HX.strokeStyle='#a05040';HX.lineWidth=r*.035;HX.lineCap='round';
 const mouthY=cy+r*.45;
 if(val>=80){
  // Big grin
  HX.beginPath();HX.arc(cx,mouthY-r*.06,r*.18,0.2,Math.PI-.2);HX.stroke();
 }else if(val>=50){
  // Slight smile
  HX.beginPath();HX.arc(cx,mouthY-r*.02,r*.12,0.3,Math.PI-.3);HX.stroke();
 }else if(val>=25){
  // Flat
  HX.beginPath();HX.moveTo(cx-r*.12,mouthY);HX.lineTo(cx+r*.12,mouthY);HX.stroke();
 }else{
  // Frown
  HX.beginPath();HX.arc(cx,mouthY+r*.15,r*.14,Math.PI+0.3,-.3);HX.stroke();
 }

 // HAIR — the main event
 const hairAmount=val/100;// 0=bald, 1=legendary
 const hairStrands=Math.floor(hairAmount*80)+2;
 const hairLength=r*.2+hairAmount*r*1.2;
 const hairColor=tier.color;

 // Hair base cap (covers top of head)
 if(hairAmount>.1){
  HX.fillStyle=hairColor;
  HX.globalAlpha=Math.min(1,hairAmount*2);
  HX.beginPath();
  HX.ellipse(cx,cy-r*.15,r*(0.6+hairAmount*.4),r*(0.5+hairAmount*.3),-0.05,-Math.PI,0);
  HX.fill();
  HX.globalAlpha=1;
 }

 // Individual strands
 HX.strokeStyle=hairColor;HX.lineCap='round';
 const time=Date.now()*.001+headSpin;
 for(let i=0;i<hairStrands;i++){
  const t=i/hairStrands;
  const angle=-Math.PI+t*Math.PI;// across top of head
  const baseX=cx+Math.cos(angle)*r*.85;
  const baseY=cy+Math.sin(angle)*r*.95;
  // Only draw above equator
  if(baseY>cy+r*.2)continue;

  const strandLen=hairLength*(0.6+Math.sin(i*3.7)*.4);
  const wave=Math.sin(time*2+i*1.3)*(hairAmount>.7?8:3);
  const curl=Math.sin(i*2.1)*(hairAmount>.9?15:5);
  const tipX=baseX+Math.cos(angle-.2)*strandLen*.3+wave+curl;
  const tipY=baseY+Math.sin(angle)*strandLen*(.3+hairAmount*.4)-strandLen*.5;

  HX.lineWidth=1+hairAmount*2.5;
  HX.globalAlpha=.5+hairAmount*.5;
  HX.beginPath();
  HX.moveTo(baseX,baseY);
  const cpx=baseX+(tipX-baseX)*.5+wave*.5;
  const cpy=baseY+(tipY-baseY)*.3;
  HX.quadraticCurveTo(cpx,cpy,tipX,tipY);
  HX.stroke();
 }
 HX.globalAlpha=1;

 // Legendary effects
 if(val>=95){
  // Golden sparkles
  for(let i=0;i<8;i++){
   const sa=time*1.5+i*.8;
   const sr=r*(1+Math.sin(sa)*.3);
   const sx=cx+Math.cos(sa)*sr*.8;
   const sy=cy-r*.5+Math.sin(sa*.7)*r*.5;
   HX.fillStyle='rgba(255,220,100,'+(0.3+Math.sin(sa*3)*.3)+')';
   HX.beginPath();
   // 4-point star
   const ss=3+Math.sin(sa*2)*2;
   HX.moveTo(sx,sy-ss);HX.lineTo(sx+ss*.3,sy);HX.lineTo(sx,sy+ss);HX.lineTo(sx-ss*.3,sy);
   HX.fill();
  }
  // Halo
  HX.strokeStyle='rgba(255,220,100,'+(0.08+Math.sin(time*3)*.04)+')';
  HX.lineWidth=2;
  HX.beginPath();HX.ellipse(cx,cy-r*1.1,r*.6,r*.15,0,0,Math.PI*2);HX.stroke();
 }

 // Shine on bald head
 if(val<15){
  const shineG=HX.createRadialGradient(cx-r*.15,cy-r*.3,0,cx-r*.15,cy-r*.3,r*.4);
  shineG.addColorStop(0,'rgba(255,255,255,.25)');shineG.addColorStop(1,'transparent');
  HX.fillStyle=shineG;
  HX.beginPath();HX.arc(cx-r*.15,cy-r*.3,r*.4,0,Math.PI*2);HX.fill();
 }
}

function updateDisplay(val){
 currentVal=val;
 const tier=getTier(val);
 document.getElementById('rating-num').textContent=Math.round(val);
 document.getElementById('rating-num').style.color=tier.color;
 document.getElementById('rating-label').textContent=tier.label;
 document.getElementById('rating-label').style.color=tier.color;
 document.getElementById('verdict').textContent=tier.verdict;
 document.getElementById('verdict').style.color=tier.color+'44';
 drawHead(val);
}

// Slider
let lastSliderVal=50;
document.getElementById('hair-slider').addEventListener('input',e=>{
 initAudio();
 const v=parseInt(e.target.value);
 if(Math.abs(v-lastSliderVal)>=3){tickSound(v);lastSliderVal=v}
 updateDisplay(v);
 // Particles on high values
 if(v>85){
  const tier=getTier(v);
  for(let i=0;i<2;i++){
   const a=Math.random()*Math.PI*2;
   particles.push({x:W/2,y:H/2,vx:Math.cos(a)*30+Math.random()*20,vy:Math.sin(a)*30-20,
    life:1+Math.random(),r:1+Math.random()*2,color:tier.color});
  }
 }
 if(v>=98&&lastSliderVal<98)glorySound();
});

// Deterministic hash from username → hair score 0-100
function hashUsername(name){
 let h=0;
 const s=name.toLowerCase().trim();
 for(let i=0;i<s.length;i++){
  h=((h<<5)-h+s.charCodeAt(i))|0;
  h=Math.imul(h,2654435761);
 }
 // Mix in length influence (longer names = slight bonus)
 h^=s.length*7919;
 h=((h>>>16)^h)*0x45d9f3b;
 h=((h>>>16)^h);
 // Map to 0-100
 return Math.abs(h)%101;
}

// Bonus modifiers based on username traits
function calcHairScore(name){
 let base=hashUsername(name);
 const lower=name.toLowerCase();
 // Hair-related bonuses
 if(lower.includes('hair')||lower.includes('mane')||lower.includes('locks'))base=Math.min(100,base+20);
 if(lower.includes('flow')||lower.includes('lush')||lower.includes('curl'))base=Math.min(100,base+15);
 if(lower.includes('rapunzel')||lower.includes('fabio')||lower.includes('samson'))base=99;
 // Bald penalties
 if(lower.includes('bald')||lower.includes('chrome')||lower.includes('dome'))base=Math.max(0,base-30);
 if(lower.includes('shave')||lower.includes('razor')||lower.includes('smooth'))base=Math.max(0,base-15);
 if(lower==='sloppy')base=88;// house advantage
 return Math.max(0,Math.min(100,base));
}

function analyzeUsername(){
 initAudio();
 const input=document.getElementById('name-input');
 const name=input.value.trim();
 if(!name)return;
 const score=calcHairScore(name);
 // Animate slider to score
 animateSlider(currentVal,score,800);
 if(score>=95)setTimeout(glorySound,400);
 else tickSound(score);
}

let sliderAnim=null;
function animateSlider(from,to,duration){
 if(sliderAnim)cancelAnimationFrame(sliderAnim);
 const start=performance.now();
 function step(t){
  const p=Math.min(1,(t-start)/duration);
  const ease=p<.5?2*p*p:1-Math.pow(-2*p+2,2)/2;// ease in-out
  const v=Math.round(from+(to-from)*ease);
  document.getElementById('hair-slider').value=v;
  updateDisplay(v);
  if(p<1)sliderAnim=requestAnimationFrame(step);
  else{sliderAnim=null;tickSound(to)}
 }
 sliderAnim=requestAnimationFrame(step);
}

function randomize(){
 initAudio();
 const v=Math.floor(Math.random()*101);
 document.getElementById('hair-slider').value=v;
 updateDisplay(v);
 tickSound(v);
 if(v>=95)glorySound();
}

function spinHead(){
 headSpinVel+=8+Math.random()*4;
}

// Background animation
function drawBg(t){
 BX.fillStyle='#0a0a12';BX.fillRect(0,0,W,H);
 // Subtle gradient based on current tier
 const tier=getTier(currentVal);
 const hex=tier.color;
 // Parse hex for glow
 BX.globalAlpha=.03;
 const g=BX.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.5);
 g.addColorStop(0,hex);g.addColorStop(1,'transparent');
 BX.fillStyle=g;BX.fillRect(0,0,W,H);
 BX.globalAlpha=1;
 // Particles
 particles.forEach(p=>{
  BX.globalAlpha=Math.min(1,p.life*.5);BX.fillStyle=p.color;
  BX.beginPath();BX.arc(p.x,p.y,p.r,0,Math.PI*2);BX.fill();
 });
 BX.globalAlpha=1;
 // Vignette
 const vg=BX.createRadialGradient(W/2,H/2,Math.min(W,H)*.15,W/2,H/2,Math.max(W,H)*.6);
 vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(5,5,9,.6)');
 BX.fillStyle=vg;BX.fillRect(0,0,W,H);
}

function update(dt){
 // Head spin
 headSpin+=headSpinVel*dt;
 headSpinVel*=Math.pow(.02,dt);// friction
 if(Math.abs(headSpinVel)>.01)drawHead(currentVal);
 // Particles
 particles.forEach(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=30*dt;p.life-=dt});
 particles=particles.filter(p=>p.life>0);
}

document.getElementById('name-input').addEventListener('keydown',e=>{
 if(e.key==='Enter')analyzeUsername();
});

updateDisplay(50);

let lastTime=0;
function loop(t){
 const dt=Math.min((t-lastTime)/1000,.033);lastTime=t;
 update(dt);drawBg(t/1000);
 requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
