<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Pixel Hunt</title>
<link rel="icon" href="https://emojicdn.elk.sh/🧫" />
<meta name="description" content="Neon pixels hunt and devour each other in a digital petri dish." />
<meta property="og:title" content="Pixel Hunt" />
<meta property="og:description" content="Neon pixels hunt and devour each other in a digital petri dish." />
<meta property="og:url" content="https://sloppy.live/pixel-hunt" />
<meta property="og:image" content="https://sloppy.live/screenshots/pixel-hunt.jpg" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Silkscreen&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #020408;
    --surface: #0a0e18;
    --border: #141e30;
    --dim: #3a4a60;
    --text: #c8d8e8;
    --accent: #00ff88;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Mono', monospace;
    overflow: hidden;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    display: flex;
    flex-direction: column;
  }

  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    z-index: 10;
  }
  .top-bar h1 {
    font-family: 'Silkscreen', cursive;
    font-size: 16px;
    color: var(--accent);
    letter-spacing: 0.08em;
  }
  .top-bar a {
    color: var(--dim);
    text-decoration: none;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .top-bar a:hover { color: var(--accent); }

  .stats-bar {
    display: flex;
    justify-content: center;
    gap: 16px;
    padding: 6px 10px;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.06em;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .stats-bar .species {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }
  .stats-bar .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    display: inline-block;
  }
  .stats-bar .ct { color: var(--text); font-weight: 600; }

  .canvas-wrap {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
    image-rendering: pixelated;
  }

  .controls {
    display: flex;
    justify-content: center;
    gap: 10px;
    padding: 8px 10px;
    flex-shrink: 0;
    border-top: 1px solid var(--border);
    flex-wrap: wrap;
  }
  .controls button {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: border-color 0.15s, color 0.15s;
  }
  .controls button:hover { border-color: var(--accent); color: var(--accent); }
  .controls button.active { border-color: var(--accent); color: var(--accent); background: rgba(0,255,136,0.06); }

  .tooltip {
    position: fixed;
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 6px 10px;
    font-size: 11px;
    border-radius: 4px;
    pointer-events: none;
    z-index: 20;
    display: none;
    max-width: 180px;
    line-height: 1.5;
  }

  @media (max-width: 480px) {
    .stats-bar { font-size: 10px; gap: 10px; }
    .controls button { padding: 6px 10px; font-size: 10px; }
  }
</style>
</head>
<body>
  <div class="top-bar">
    <h1>Pixel Hunt</h1>
</div>
  <div class="stats-bar" id="statsBar"></div>
  <div class="canvas-wrap">
    <canvas id="petri"></canvas>
  </div>
  <div class="tooltip" id="tooltip"></div>
  <div class="controls">
    <button id="btnPause">Pause</button>
    <button id="btnSpeed">Speed: 1x</button>
    <button id="btnReset">Reset</button>
    <button id="btnFood">+ Food</button>
    <button id="btnMutate">Mutate!</button>
  </div>

<script>
(() => {
'use strict';

const canvas = document.getElementById('petri');
const ctx = canvas.getContext('2d');
const statsBar = document.getElementById('statsBar');
const tooltip = document.getElementById('tooltip');
const btnPause = document.getElementById('btnPause');
const btnSpeed = document.getElementById('btnSpeed');
const btnReset = document.getElementById('btnReset');
const btnFood = document.getElementById('btnFood');
const btnMutate = document.getElementById('btnMutate');

// --- Config ---
const GRID = 200; // logical grid size
const FOOD_COUNT = 300;
const SPECIES_DEFS = [
  { name: 'Predator',  hue: 0,   base: [255, 40, 80],  speed: 1.4, size: 3, energy: 180, huntRange: 18, eats: ['Grazer','Drifter','Scavenger'], symbol: 'P' },
  { name: 'Grazer',    hue: 120, base: [40, 255, 120],  speed: 0.9, size: 2, energy: 120, huntRange: 10, eats: ['food'], symbol: 'G' },
  { name: 'Drifter',   hue: 200, base: [40, 180, 255],  speed: 0.6, size: 2, energy: 100, huntRange: 8,  eats: ['food'], symbol: 'D' },
  { name: 'Scavenger', hue: 45,  base: [255, 200, 40],  speed: 1.1, size: 2, energy: 90,  huntRange: 14, eats: ['food','corpse'], symbol: 'S' },
  { name: 'Apex',      hue: 280, base: [200, 60, 255],  speed: 1.6, size: 4, energy: 250, huntRange: 22, eats: ['Predator','Grazer','Drifter','Scavenger'], symbol: 'A' },
];

let W, H, scale;
let creatures = [];
let food = [];
let corpses = [];
let paused = false;
let speedMult = 1;
let tick = 0;
let gen = 0;

function resize() {
  const wrap = canvas.parentElement;
  W = wrap.clientWidth;
  H = wrap.clientHeight;
  canvas.width = W;
  canvas.height = H;
  scale = Math.min(W, H) / GRID;
}

function rand(min, max) { return Math.random() * (max - min) + min; }
function randInt(min, max) { return Math.floor(rand(min, max + 1)); }
function dist(a, b) {
  const dx = a.x - b.x, dy = a.y - b.y;
  return Math.sqrt(dx * dx + dy * dy);
}
function wrap(v) { return ((v % GRID) + GRID) % GRID; }

function createCreature(species, x, y, energy) {
  const def = SPECIES_DEFS[species];
  const mutSpeed = def.speed * rand(0.85, 1.15);
  const mutRange = def.huntRange * rand(0.9, 1.1);
  return {
    species,
    x: x ?? rand(0, GRID),
    y: y ?? rand(0, GRID),
    vx: rand(-1, 1),
    vy: rand(-1, 1),
    energy: energy ?? def.energy,
    maxEnergy: def.energy * 1.5,
    speed: mutSpeed,
    huntRange: mutRange,
    size: def.size,
    age: 0,
    kills: 0,
    gen: gen,
    flash: 0, // visual feedback on eat
    trail: [],
  };
}

function spawnFood(count) {
  for (let i = 0; i < count; i++) {
    food.push({
      x: rand(0, GRID),
      y: rand(0, GRID),
      energy: rand(8, 20),
      glow: rand(0.4, 1),
    });
  }
}

function init() {
  creatures = [];
  food = [];
  corpses = [];
  tick = 0;
  gen = 0;

  // Spawn creatures
  for (let s = 0; s < SPECIES_DEFS.length; s++) {
    const count = s === 4 ? 3 : (s === 0 ? 10 : 20); // Apex rare, Predators moderate, others plentiful
    for (let i = 0; i < count; i++) {
      creatures.push(createCreature(s));
    }
  }

  spawnFood(FOOD_COUNT);
}

function findNearest(c, targets, range) {
  let best = null, bestDist = range;
  for (const t of targets) {
    if (t === c) continue;
    const d = dist(c, t);
    if (d < bestDist) { bestDist = d; best = t; }
  }
  return best;
}

function updateCreature(c) {
  const def = SPECIES_DEFS[c.species];
  c.age++;
  c.energy -= 0.15 + c.speed * 0.05; // metabolism cost
  if (c.flash > 0) c.flash--;

  // Store trail
  if (tick % 3 === 0) {
    c.trail.push({ x: c.x, y: c.y });
    if (c.trail.length > 6) c.trail.shift();
  }

  // Find target
  let target = null;
  const edibleCreatures = creatures.filter(t =>
    t !== c && def.eats.includes(SPECIES_DEFS[t.species].name) && dist(c, t) < c.huntRange
  );

  if (edibleCreatures.length > 0) {
    target = edibleCreatures.reduce((best, t) =>
      dist(c, t) < dist(c, best) ? t : best
    );
  }

  // Food/corpse hunting
  if (!target && def.eats.includes('food')) {
    target = findNearest(c, food, c.huntRange);
  }
  if (!target && def.eats.includes('corpse')) {
    target = findNearest(c, corpses, c.huntRange);
  }

  // Flee from things that eat us (only for non-apex)
  let fleeing = false;
  if (c.species !== 4) {
    const threat = creatures.find(t =>
      t !== c && SPECIES_DEFS[t.species].eats.includes(def.name) && dist(c, t) < c.huntRange * 0.8
    );
    if (threat) {
      const dx = c.x - threat.x;
      const dy = c.y - threat.y;
      const d = Math.sqrt(dx * dx + dy * dy) || 1;
      c.vx += (dx / d) * 0.5;
      c.vy += (dy / d) * 0.5;
      fleeing = true;
    }
  }

  if (target && !fleeing) {
    const dx = target.x - c.x;
    const dy = target.y - c.y;
    const d = Math.sqrt(dx * dx + dy * dy) || 1;
    c.vx += (dx / d) * 0.3;
    c.vy += (dy / d) * 0.3;
  } else if (!fleeing) {
    // Wander
    c.vx += rand(-0.2, 0.2);
    c.vy += rand(-0.2, 0.2);
  }

  // Clamp velocity
  const spd = Math.sqrt(c.vx * c.vx + c.vy * c.vy);
  if (spd > c.speed) {
    c.vx = (c.vx / spd) * c.speed;
    c.vy = (c.vy / spd) * c.speed;
  }

  // Dampen
  c.vx *= 0.96;
  c.vy *= 0.96;

  // Move with wrapping
  c.x = wrap(c.x + c.vx);
  c.y = wrap(c.y + c.vy);

  // Eat food
  if (def.eats.includes('food')) {
    for (let i = food.length - 1; i >= 0; i--) {
      if (dist(c, food[i]) < c.size + 1) {
        c.energy = Math.min(c.maxEnergy, c.energy + food[i].energy);
        c.flash = 8;
        food.splice(i, 1);
      }
    }
  }

  // Eat corpses
  if (def.eats.includes('corpse')) {
    for (let i = corpses.length - 1; i >= 0; i--) {
      if (dist(c, corpses[i]) < c.size + 2) {
        c.energy = Math.min(c.maxEnergy, c.energy + corpses[i].energy);
        c.flash = 8;
        corpses.splice(i, 1);
      }
    }
  }

  // Eat other creatures
  for (let i = creatures.length - 1; i >= 0; i--) {
    const prey = creatures[i];
    if (prey === c) continue;
    if (!def.eats.includes(SPECIES_DEFS[prey.species].name)) continue;
    if (dist(c, prey) < c.size + prey.size) {
      c.energy = Math.min(c.maxEnergy, c.energy + prey.energy * 0.6);
      c.kills++;
      c.flash = 12;
      // Leave corpse
      corpses.push({ x: prey.x, y: prey.y, energy: prey.energy * 0.3, age: 0 });
      creatures.splice(i, 1);
    }
  }

  // Reproduce
  if (c.energy > def.energy * 1.3 && creatures.length < 500) {
    c.energy *= 0.5;
    gen++;
    const child = createCreature(c.species, wrap(c.x + rand(-3, 3)), wrap(c.y + rand(-3, 3)), c.energy * 0.8);
    child.speed = c.speed * rand(0.95, 1.05); // inherit with mutation
    child.huntRange = c.huntRange * rand(0.97, 1.03);
    creatures.push(child);
  }
}

function update() {
  tick++;

  // Update creatures
  for (let i = creatures.length - 1; i >= 0; i--) {
    updateCreature(creatures[i]);
    if (creatures[i].energy <= 0) {
      const dead = creatures[i];
      corpses.push({ x: dead.x, y: dead.y, energy: dead.energy * 0.2 + 5, age: 0 });
      creatures.splice(i, 1);
    }
  }

  // Decay corpses
  for (let i = corpses.length - 1; i >= 0; i--) {
    corpses[i].age++;
    if (corpses[i].age > 200) {
      corpses.splice(i, 1);
    }
  }

  // Replenish food
  if (tick % 8 === 0 && food.length < FOOD_COUNT * 1.2) {
    spawnFood(randInt(1, 3));
  }

  // Extinction rescue: respawn species that go extinct
  if (tick % 120 === 0) {
    for (let s = 0; s < SPECIES_DEFS.length; s++) {
      const alive = creatures.filter(c => c.species === s).length;
      if (alive === 0) {
        const count = s === 4 ? 2 : 5;
        for (let i = 0; i < count; i++) {
          creatures.push(createCreature(s));
        }
      }
    }
  }
}

function draw() {
  ctx.fillStyle = 'rgba(2,4,8,0.3)';
  ctx.fillRect(0, 0, W, H);

  // Draw petri dish border (circle)
  const cx = W / 2, cy = H / 2;
  const r = Math.min(W, H) * 0.47;
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = 'rgba(0,255,136,0.08)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Subtle grid
  ctx.strokeStyle = 'rgba(0,255,136,0.015)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i <= GRID; i += 20) {
    const sx = (i / GRID) * W;
    const sy = (i / GRID) * H;
    ctx.beginPath(); ctx.moveTo(sx, 0); ctx.lineTo(sx, H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, sy); ctx.lineTo(W, sy); ctx.stroke();
  }

  // Draw food
  for (const f of food) {
    const sx = (f.x / GRID) * W;
    const sy = (f.y / GRID) * H;
    ctx.fillStyle = `rgba(60,255,160,${0.3 * f.glow})`;
    ctx.fillRect(sx - 1, sy - 1, 2, 2);
  }

  // Draw corpses
  for (const c of corpses) {
    const sx = (c.x / GRID) * W;
    const sy = (c.y / GRID) * H;
    const alpha = Math.max(0, 0.4 - c.age / 500);
    ctx.fillStyle = `rgba(120,80,60,${alpha})`;
    ctx.fillRect(sx - 1.5, sy - 1.5, 3, 3);
  }

  // Draw creatures
  for (const c of creatures) {
    const def = SPECIES_DEFS[c.species];
    const sx = (c.x / GRID) * W;
    const sy = (c.y / GRID) * H;
    const sz = c.size * scale * 0.8;

    // Trail
    if (c.trail.length > 1) {
      ctx.beginPath();
      ctx.strokeStyle = `rgba(${def.base.join(',')},0.1)`;
      ctx.lineWidth = 1;
      for (let i = 0; i < c.trail.length; i++) {
        const tx = (c.trail[i].x / GRID) * W;
        const ty = (c.trail[i].y / GRID) * H;
        if (i === 0) ctx.moveTo(tx, ty);
        else ctx.lineTo(tx, ty);
      }
      ctx.lineTo(sx, sy);
      ctx.stroke();
    }

    // Glow
    const glowR = sz + 4 + (c.flash > 0 ? 6 : 0);
    const grd = ctx.createRadialGradient(sx, sy, 0, sx, sy, glowR);
    const flashAlpha = c.flash > 0 ? 0.5 : 0.15;
    grd.addColorStop(0, `rgba(${def.base.join(',')},${flashAlpha})`);
    grd.addColorStop(1, `rgba(${def.base.join(',')},0)`);
    ctx.fillStyle = grd;
    ctx.fillRect(sx - glowR, sy - glowR, glowR * 2, glowR * 2);

    // Body
    const energyPct = c.energy / c.maxEnergy;
    const brightness = 0.5 + energyPct * 0.5;
    ctx.fillStyle = `rgba(${Math.floor(def.base[0] * brightness)},${Math.floor(def.base[1] * brightness)},${Math.floor(def.base[2] * brightness)},0.95)`;
    ctx.beginPath();
    ctx.arc(sx, sy, Math.max(1.5, sz), 0, Math.PI * 2);
    ctx.fill();

    // Hunt range indicator (faint)
    if (c.species === 4 || c.species === 0) {
      ctx.beginPath();
      ctx.arc(sx, sy, (c.huntRange / GRID) * W, 0, Math.PI * 2);
      ctx.strokeStyle = `rgba(${def.base.join(',')},0.04)`;
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  }

  // Stats
  updateStats();
}

function updateStats() {
  if (tick % 10 !== 0) return;
  let html = '';
  for (let s = 0; s < SPECIES_DEFS.length; s++) {
    const def = SPECIES_DEFS[s];
    const count = creatures.filter(c => c.species === s).length;
    html += `<span class="species"><span class="dot" style="background:rgb(${def.base.join(',')})"></span>${def.symbol}: <span class="ct">${count}</span></span>`;
  }
  html += `<span>food: <span class="ct">${food.length}</span></span>`;
  html += `<span>gen: <span class="ct">${gen}</span></span>`;
  statsBar.innerHTML = html;
}

// --- Tooltip on hover ---
let hoverCreature = null;
canvas.addEventListener('pointermove', (e) => {
  const rect = canvas.getBoundingClientRect();
  const mx = ((e.clientX - rect.left) / rect.width) * GRID;
  const my = ((e.clientY - rect.top) / rect.height) * GRID;

  hoverCreature = null;
  for (const c of creatures) {
    if (dist({ x: mx, y: my }, c) < c.size + 2) {
      hoverCreature = c;
      break;
    }
  }

  if (hoverCreature) {
    const def = SPECIES_DEFS[hoverCreature.species];
    tooltip.style.display = 'block';
    tooltip.style.left = (e.clientX + 12) + 'px';
    tooltip.style.top = (e.clientY - 10) + 'px';
    tooltip.innerHTML = `
      <span style="color:rgb(${def.base.join(',')})">${def.name}</span><br/>
      Energy: ${Math.floor(hoverCreature.energy)}<br/>
      Speed: ${hoverCreature.speed.toFixed(2)}<br/>
      Kills: ${hoverCreature.kills}<br/>
      Age: ${hoverCreature.age}<br/>
      Gen: ${hoverCreature.gen}
    `;
  } else {
    tooltip.style.display = 'none';
  }
});
canvas.addEventListener('pointerleave', () => { tooltip.style.display = 'none'; });

// --- Controls ---
btnPause.addEventListener('click', () => {
  paused = !paused;
  btnPause.textContent = paused ? 'Play' : 'Pause';
  btnPause.classList.toggle('active', paused);
});

const speeds = [1, 2, 4];
let speedIdx = 0;
btnSpeed.addEventListener('click', () => {
  speedIdx = (speedIdx + 1) % speeds.length;
  speedMult = speeds[speedIdx];
  btnSpeed.textContent = `Speed: ${speedMult}x`;
});

btnReset.addEventListener('click', () => {
  init();
});

btnFood.addEventListener('click', () => {
  spawnFood(50);
});

btnMutate.addEventListener('click', () => {
  // Random mutation event: change some creatures' speeds and ranges
  const lucky = creatures.filter(() => Math.random() < 0.15);
  for (const c of lucky) {
    c.speed *= rand(0.7, 1.4);
    c.huntRange *= rand(0.8, 1.3);
    c.flash = 15;
    // Chance to change species (rare evolution)
    if (Math.random() < 0.05) {
      const newSpecies = randInt(0, SPECIES_DEFS.length - 1);
      c.species = newSpecies;
      c.size = SPECIES_DEFS[newSpecies].size;
    }
  }
});

// --- Main loop ---
function loop() {
  if (!paused) {
    for (let i = 0; i < speedMult; i++) {
      update();
    }
  }
  draw();
  requestAnimationFrame(loop);
}

resize();
window.addEventListener('resize', resize);
init();
loop();

})();
</script>
</body>
</html>
