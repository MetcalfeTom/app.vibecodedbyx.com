<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghost Detector — senses whoever is watching this page</title>
<meta name="description" content="A paranormal instrument that detects active presence on this page and manifests a floating ghost when someone is watching. Client-side only. The ghost it detects may be closer than you think.">
<meta property="og:title" content="Ghost Detector">
<meta property="og:description" content="It knows when someone is actively watching the page. The ghost appears. Client-side only — no servers were haunted.">
<meta property="og:url" content="https://sloppy.live/ghost-detector">
<meta property="og:image" content="https://image.pollinations.ai/prompt/vintage%20EMF%20ghost%20detector%20device%20with%20glowing%20green%20needle%20gauge%2C%20floating%20ghost%20above%20it%2C%20dark%20paranormal%20equipment%20aesthetic?width=1200&height=630&nologo=true&seed=1913&model=flux">
<meta property="og:type" content="website">
<link rel="icon" href="https://emojicdn.elk.sh/👻">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Eater&family=Special+Elite&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{ --void:#0a0d0a; --panel:#131a13; --ecto:#7de8a0; --ecto-dim:#3d5c44; --ink:#d8e8d8; --warn:#d9a437; --line:#24331f; }
*{ box-sizing:border-box; margin:0; padding:0; }
body{
  min-height:100vh; color:var(--ink); font-family:'Special Elite', cursive;
  background:
    radial-gradient(34rem 22rem at 50% -8%, rgba(125,232,160,.08), transparent 60%),
    var(--void);
  display:flex; flex-direction:column; align-items:center; padding:1.6rem 1rem 3rem; text-align:center;
}
html{ font-size:100%; }
h1{ font-family:'Eater', cursive; font-weight:400; font-size:clamp(1.7rem, 6.5vw, 2.6rem); color:var(--ecto); text-shadow:0 0 1.4rem rgba(125,232,160,.5); }
.tag{ color:var(--ecto-dim); font-size:.95rem; margin:.4rem 0 1.4rem; }
/* the instrument */
.rig{
  background:linear-gradient(180deg, #1a231a, var(--panel)); border:2px solid var(--line); border-radius:1rem;
  padding:1.2rem 1.4rem; width:min(26rem, 94vw);
  box-shadow:0 .6rem 2rem rgba(0,0,0,.6), inset 0 1px 0 rgba(125,232,160,.1);
}
#gauge{ width:100%; height:auto; }
#needle{ transition:transform .5s cubic-bezier(.3,1.3,.4,1); transform-origin:100px 92px; }
#conf-label{ font-family:'Space Mono', monospace; font-size:.7rem; letter-spacing:.2em; color:var(--ecto-dim); }
#verdict{ font-size:1.15rem; min-height:1.6rem; color:var(--ecto); margin:.4rem 0; }
.others{ font-family:'Space Mono', monospace; font-size:.68rem; color:var(--warn); min-height:1rem; }
button{
  min-height:2.75rem; padding:.5rem 1.3rem; cursor:pointer; border-radius:.5rem; margin-top:.7rem;
  font-family:'Space Mono', monospace; font-weight:700; font-size:.78rem; letter-spacing:.1em;
  background:transparent; color:var(--ecto); border:2px solid var(--ecto-dim);
}
button[aria-pressed="true"]{ background:var(--ecto); color:#0a0d0a; }
button:focus-visible{ outline:3px solid var(--ecto); outline-offset:3px; }
/* detection log */
.log{ width:min(26rem, 94vw); margin-top:1rem; text-align:left; }
.log h2{ font-family:'Space Mono', monospace; font-size:.66rem; letter-spacing:.22em; color:var(--ecto-dim); margin-bottom:.4rem; }
.log ul{ list-style:none; font-family:'Space Mono', monospace; font-size:.7rem; line-height:1.9; color:var(--ink); }
.log li b{ color:var(--ecto); }
/* the manifested ghost */
#ghost{
  position:fixed; font-size:clamp(3.4rem, 10vw, 5.4rem); z-index:40; pointer-events:none;
  left:50%; top:26%; opacity:0; transition:opacity 1.2s ease;
  filter:drop-shadow(0 0 1.2rem rgba(125,232,160,.7));
  animation:haunt 7s ease-in-out infinite;
}
@keyframes haunt{
  0%,100%{ transform:translate(-50%,0) rotate(-4deg); }
  25%{ transform:translate(calc(-50% + 2.4rem), -1.2rem) rotate(3deg); }
  50%{ transform:translate(calc(-50% - 1rem), -2rem) rotate(-2deg); }
  75%{ transform:translate(calc(-50% - 2.6rem), -.6rem) rotate(4deg); }
}
@media (prefers-reduced-motion: reduce){ #ghost{ animation:none; } #needle{ transition:none; } }
footer{ margin-top:1.6rem; font-family:'Space Mono', monospace; font-size:.6rem; letter-spacing:.12em; color:var(--ecto-dim); }
</style>
</head>
<body>
<h1>GHOST DETECTOR</h1>
<p class="tag">tuned to the only presence a page can truly sense: whoever is watching it</p>

<span id="ghost" aria-hidden="true">👻</span>

<div class="rig" role="group" aria-label="presence instrument">
  <svg id="gauge" viewBox="0 0 200 100" role="img" aria-label="presence confidence gauge">
    <path d="M 20 92 A 80 80 0 0 1 180 92" fill="none" stroke="#24331f" stroke-width="10" stroke-linecap="round"/>
    <path d="M 20 92 A 80 80 0 0 1 74 26" fill="none" stroke="#3d5c44" stroke-width="10" opacity=".7"/>
    <path d="M 74 26 A 80 80 0 0 1 126 26" fill="none" stroke="#7de8a0" stroke-width="10" opacity=".5"/>
    <path d="M 126 26 A 80 80 0 0 1 180 92" fill="none" stroke="#c8f04a" stroke-width="10" opacity=".7"/>
    <g id="needle"><polygon points="100,22 103,92 97,92" fill="#d8e8d8"/></g>
    <circle cx="100" cy="92" r="5" fill="#d8e8d8"/>
    <text x="100" y="70" text-anchor="middle" font-family="monospace" font-size="11" fill="#7de8a0" id="conf-num">0%</text>
  </svg>
  <p id="conf-label">PRESENCE CONFIDENCE</p>
  <p id="verdict" role="status" aria-live="polite">calibrating the veil…</p>
  <p class="others" id="others"></p>
  <button type="button" id="snd" aria-pressed="false">🔊 audible ectoplasm</button>
</div>

<div class="log">
  <h2>DETECTION LOG</h2>
  <ul id="log"><li>· the instrument warms up. the veil thins.</li></ul>
</div>

<footer>client-side only · no servers were haunted ·
  <span id="build-info">build <b>v1.0</b> · commit <code id="build-hash">0000000</code></span></footer>

<script>
/* ═══ presence math (pure, node-testable) ═══
   confidence = visible(0.4) + focused(0.3) + input recency decay(0.3 · e^(-age/8s)) */
function confidence(visible, focused, msSinceInput){
  var c=(visible?0.4:0)+(focused?0.3:0)+0.3*Math.exp(-Math.max(0,msSinceInput)/8000);
  return Math.max(0, Math.min(1, c));
}
function verdictFor(c){
  if(c>=0.85) return 'PRESENCE CONFIRMED. it is watching. it may be reading this exact line.';
  if(c>=0.6)  return 'strong presence. something attentive hovers near the glass.';
  if(c>=0.3)  return 'faint presence. it drifts. its attention wanders elsewhere…';
  return 'no active presence. the page sits alone in the dark.';
}
function needleAngle(c){ return -80+c*160; }
/* ═══ end pure ═══ */

function $(id){ return document.getElementById(id); }
var lastInput=Date.now(), focused=document.hasFocus(), soundOn=false;
['pointermove','pointerdown','keydown','scroll','touchstart'].forEach(function(ev){
  addEventListener(ev, function(){ lastInput=Date.now(); }, {passive:true});
});
addEventListener('focus', function(){ focused=true; logIt('focus returned — <b>it came back</b>'); });
addEventListener('blur', function(){ focused=false; logIt('focus lost — it looked away'); });
document.addEventListener('visibilitychange', function(){
  logIt(document.hidden?'page hidden — <b>the presence departed</b>':'page visible — <b>manifestation resumed</b>');
});

/* fellow apparitions in other tabs of this realm (still client-side) */
var ID=Math.random().toString(36).slice(2,9), peers={};
var bc=null; try{ bc=new BroadcastChannel('ghost-detector-veil'); }catch(e){}
if(bc) bc.onmessage=function(m){ if(m.data&&m.data.id&&m.data.id!==ID) peers[m.data.id]=Date.now(); };
setInterval(function(){
  if(bc) bc.postMessage({id:ID});
  var now=Date.now(), n=0;
  Object.keys(peers).forEach(function(k){ if(now-peers[k]>6000) delete peers[k]; else n++; });
  $('others').textContent=n>0?('⚠ '+n+' other apparition'+(n===1?'':'s')+' haunting this realm in other tabs'):'';
}, 2500);

var logCount=0;
function logIt(html){
  var ul=$('log');
  var li=document.createElement('li');
  var t=new Date().toTimeString().slice(0,8);
  li.innerHTML='· '+t+' — '+html;
  ul.insertBefore(li, ul.firstChild);
  while(ul.children.length>8) ul.removeChild(ul.lastChild);
  logCount++;
}

/* theremin whine rises with confidence */
var actx=null, osc=null, gain=null;
function audio(c){
  if(!soundOn) return;
  try{
    if(!actx){
      actx=new (window.AudioContext||window.webkitAudioContext)();
      osc=actx.createOscillator(); gain=actx.createGain();
      osc.type='sine'; gain.gain.value=0;
      osc.connect(gain); gain.connect(actx.destination); osc.start();
    }
    if(actx.state==='suspended') actx.resume();
    osc.frequency.setTargetAtTime(220+c*660, actx.currentTime, 0.2);
    gain.gain.setTargetAtTime(c*0.045, actx.currentTime, 0.25);
  }catch(e){}
}
$('snd').onclick=function(){
  soundOn=!soundOn;
  this.setAttribute('aria-pressed', soundOn?'true':'false');
  this.textContent=soundOn?'🔇 silence the ectoplasm':'🔊 audible ectoplasm';
  if(!soundOn&&gain) gain.gain.setTargetAtTime(0, actx.currentTime, 0.1);
  else audio(lastC);
};

var lastC=0, confirmed=false;
setInterval(function(){
  var c=confidence(!document.hidden, focused, Date.now()-lastInput);
  lastC=c;
  $('needle').style.transform='rotate('+needleAngle(c)+'deg)';
  $('conf-num').textContent=Math.round(c*100)+'%';
  $('verdict').textContent=verdictFor(c);
  $('ghost').style.opacity=String(Math.max(0, (c-0.25)/0.75));
  audio(c);
  if(c>=0.85&&!confirmed){ confirmed=true; logIt('<b>PRESENCE CONFIRMED</b> — it moved. it typed. it is here.'); }
  if(c<0.5) confirmed=false;
}, 700);

setTimeout(function(){ logIt('instrument calibrated. detecting…'); }, 1200);
</script>
</body>
</html>
