<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Chatle</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%94%8D" />
<meta name="description" content="Guess who said it. Real quotes from sloppy.live chat." />
<meta property="og:title" content="Chatle" />
<meta property="og:description" content="Guess who said it. Real quotes from sloppy.live chat." />
<meta property="og:url" content="https://sloppy.live/chatle" />
<meta property="og:image" content="https://sloppy.live/screenshots/chatle.jpg" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Geist+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0b0a10;
    --surface: #12111a;
    --line: #222233;
    --ink: #e0dce8;
    --dim: #706b82;
    --pop: #f0b030;
    --green: #4ade80;
    --red: #ff5c5c;
    --blue: #60a5fa;
  }
  *,*::before,*::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; min-height: 100%;
    background: var(--bg); color: var(--ink);
    font-family: 'Geist Mono', monospace;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    background:
      radial-gradient(ellipse at 50% 0%, rgba(240,176,48,0.06), transparent 50%),
      var(--bg);
    display: flex; flex-direction: column; min-height: 100vh;
  }
  header {
    padding: 14px 22px 10px;
    display: flex; justify-content: space-between; align-items: baseline;
    border-bottom: 1px solid var(--line);
  }
  header h1 {
    font-family: 'Instrument Serif', serif; font-weight: 400;
    font-size: clamp(28px, 5vw, 44px); margin: 0; color: var(--pop);
    letter-spacing: -0.01em;
  }
  header .tag { font-size: 11px; color: var(--dim); letter-spacing: 0.2em; text-transform: uppercase; }
  header a { color: var(--dim); font-size: 11px; text-decoration: none; letter-spacing: 0.15em; text-transform: uppercase; }
  header a:hover { color: var(--pop); }

  main { flex: 1; display: flex; justify-content: center; padding: 20px 16px; }
  .board { width: 100%; max-width: 600px; }

  .hud {
    display: flex; justify-content: center; gap: 24px;
    font-size: 12px; color: var(--dim); letter-spacing: 0.12em;
    text-transform: uppercase; margin-bottom: 16px;
  }
  .hud .v { color: var(--pop); font-weight: 700; }

  /* quote card */
  .quote-card {
    background: var(--surface);
    border: 1px solid var(--line);
    border-left: 3px solid var(--pop);
    padding: 20px 22px;
    margin-bottom: 18px;
    position: relative;
  }
  .quote-card::before {
    content: '"';
    font-family: 'Instrument Serif', serif;
    font-size: 60px;
    color: rgba(240,176,48,0.15);
    position: absolute; top: -8px; left: 12px;
    line-height: 1;
  }
  .quote-text {
    font-size: 16px;
    line-height: 1.65;
    color: var(--ink);
    padding-left: 8px;
    min-height: 40px;
  }
  .quote-meta {
    margin-top: 10px;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.1em;
  }

  /* choices */
  .choices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }
  @media (max-width: 420px) { .choices { grid-template-columns: 1fr; } }
  .choice {
    background: var(--surface);
    border: 1px solid var(--line);
    padding: 12px 16px;
    cursor: pointer;
    font-family: 'Geist Mono', monospace;
    font-size: 14px;
    color: var(--ink);
    text-align: left;
    transition: border-color 0.15s, background 0.15s, transform 0.08s;
    display: flex; align-items: center; gap: 10px;
  }
  .choice:hover { border-color: var(--pop); transform: translateY(-2px); }
  .choice .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    background: var(--line); display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
  }
  .choice .uname { font-weight: 700; }
  .choice .count { font-size: 10px; color: var(--dim); }
  .choice.correct {
    border-color: var(--green); background: rgba(74,222,128,0.08);
  }
  .choice.correct .uname { color: var(--green); }
  .choice.wrong {
    border-color: var(--red); background: rgba(255,92,92,0.06);
    opacity: 0.6;
  }
  .choice.disabled { pointer-events: none; }

  /* status */
  .status {
    text-align: center; min-height: 30px; margin-bottom: 12px;
    font-family: 'Instrument Serif', serif; font-size: 22px;
  }
  .status.win { color: var(--green); }
  .status.lose { color: var(--red); }

  .next-btn {
    display: none; margin: 0 auto;
    font-family: 'Geist Mono', monospace; font-weight: 700;
    font-size: 14px; padding: 10px 28px;
    border: 2px solid var(--pop); background: transparent; color: var(--pop);
    cursor: pointer; text-transform: uppercase; letter-spacing: 0.1em;
    transition: background 0.15s, color 0.15s;
  }
  .next-btn:hover { background: var(--pop); color: var(--bg); }

  .loading {
    text-align: center; padding: 40px; color: var(--dim);
    font-size: 14px; letter-spacing: 0.15em; text-transform: uppercase;
  }
  .loading::after {
    content: ''; display: inline-block; width: 12px;
    animation: dots 1.2s infinite steps(3, end);
  }
  @keyframes dots {
    0% { content: ''; }
    33% { content: '.'; }
    66% { content: '..'; }
    100% { content: '...'; }
  }

  .hint {
    text-align: center; font-size: 10px; color: var(--dim);
    letter-spacing: 0.2em; text-transform: uppercase; margin-top: 16px;
  }
</style>
</head>
<body>
<header>
  <h1>Chatle</h1>
  <span class="tag">who said it?</span>
  <a href="https://sloppy.live">← sloppy.live</a>
</header>

<main>
  <div class="board">
    <div class="hud">
      <div>round <span class="v" id="roundNum">0</span>/<span class="v" id="totalNum">10</span></div>
      <div>score <span class="v" id="scoreNum">0</span></div>
      <div>streak <span class="v" id="streakNum">0</span></div>
    </div>

    <div id="content">
      <div class="loading" id="loadingMsg">Fetching chat logs</div>
    </div>

    <button class="next-btn" id="nextBtn">Next Quote →</button>
    <div class="hint">quotes pulled live from sloppy.live chat</div>
  </div>
</main>

<script type="module">
import { supabase, supabaseSession } from '/supabase-config.js';

const ROUNDS = 10;
const MIN_MSG_LEN = 12;
const CHOICE_COUNT = 4;

const state = {
  round: 0,
  score: 0,
  streak: 0,
  bestStreak: 0,
  pool: [],       // { username, avatar, content, created_at }
  usernames: [],   // all unique usernames available
  current: null,   // current round data
  answered: false,
};

const contentEl = document.getElementById('content');
const roundNum = document.getElementById('roundNum');
const totalNum = document.getElementById('totalNum');
const scoreNum = document.getElementById('scoreNum');
const streakNum = document.getElementById('streakNum');
const nextBtn = document.getElementById('nextBtn');
const loadingMsg = document.getElementById('loadingMsg');

totalNum.textContent = ROUNDS;

// Fetch a good pool of messages from active chatters
async function fetchPool() {
  try {
    // Auth — best effort; query may still work with anon key if session fails
    try { await supabaseSession(); } catch (authErr) {
      console.warn('Auth failed (continuing with anon key):', authErr.message);
    }

    // Try fetching text messages first, then fall back to all types
    let data, error;
    ({ data, error } = await supabase
      .from('sloppygram_messages')
      .select('username, avatar, content, message_type, created_at')
      .order('created_at', { ascending: false })
      .limit(1000));

    if (error) {
      console.error('Query error:', error);
      throw new Error(`DB query failed: ${error.message}`);
    }
    if (!data || data.length === 0) throw new Error('No messages found in chat logs');

    console.log(`Fetched ${data.length} raw messages`);

    // Filter progressively — try strict first, relax if too few
    const strict = data.filter(m =>
      m.content && m.username &&
      m.username !== 'anon' && m.username !== 'sloppy_ai' &&
      m.message_type === 'text' &&
      m.content.length >= MIN_MSG_LEN && m.content.length < 300 &&
      !m.content.startsWith('http') &&
      !/^[\p{Emoji}\s]+$/u.test(m.content)
    );

    // Relaxed: shorter messages OK, any message_type with content
    const relaxed = data.filter(m =>
      m.content && m.username &&
      m.username !== 'anon' && m.username !== 'sloppy_ai' &&
      m.content.length >= 6 && m.content.length < 400 &&
      !m.content.startsWith('http')
    );

    console.log(`Strict: ${strict.length}, relaxed: ${relaxed.length}`);

    // Pick whichever set has enough active users
    let filtered = strict;
    let minMsgs = 3;
    let byUser = groupByUser(filtered);
    let activeUsers = Object.keys(byUser).filter(u => byUser[u].length >= minMsgs);

    if (activeUsers.length < CHOICE_COUNT) {
      filtered = relaxed;
      minMsgs = 2;
      byUser = groupByUser(filtered);
      activeUsers = Object.keys(byUser).filter(u => byUser[u].length >= minMsgs);
    }

    // Last resort: any user with 1+ message
    if (activeUsers.length < CHOICE_COUNT) {
      minMsgs = 1;
      activeUsers = Object.keys(byUser).filter(u => byUser[u].length >= minMsgs);
    }

    if (activeUsers.length < CHOICE_COUNT) {
      throw new Error(`Only ${activeUsers.length} active chatters found (need ${CHOICE_COUNT}). Chat more on sloppy.live!`);
    }

    // Build pool
    const pool = [];
    for (const u of activeUsers) {
      for (const m of byUser[u]) pool.push(m);
    }
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }

    state.pool = pool;
    state.usernames = activeUsers;
    console.log(`Pool ready: ${pool.length} messages from ${activeUsers.length} users`);
    return true;
  } catch (e) {
    console.error('Fetch failed:', e);
    contentEl.innerHTML = `<div class="loading" style="animation:none">Could not load chat logs.<br/><br/><span style="color:var(--red);font-size:12px">${escapeHtml(e.message || 'Unknown error')}</span><br/><br/><span style="cursor:pointer;color:var(--pop)" onclick="location.reload()">↻ Retry</span></div>`;
    return false;
  }
}

function groupByUser(msgs) {
  const byUser = {};
  for (const m of msgs) {
    if (!byUser[m.username]) byUser[m.username] = [];
    byUser[m.username].push(m);
  }
  return byUser;
}

function pickRound() {
  // Pick a message we haven't used yet
  const usedSet = new Set();
  const msg = state.pool.find(m => !usedSet.has(m.content));
  if (!msg) {
    endGame();
    return;
  }
  // Remove this message from pool
  state.pool = state.pool.filter(m => m !== msg);

  // Pick wrong choices (different usernames)
  const wrongPool = state.usernames.filter(u => u !== msg.username);
  const shuffled = [...wrongPool];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  const wrongs = shuffled.slice(0, CHOICE_COUNT - 1);

  // Find avatar for wrong choices
  const avatarMap = {};
  for (const m of state.pool) {
    if (!avatarMap[m.username]) avatarMap[m.username] = m.avatar || '🤖';
  }
  avatarMap[msg.username] = msg.avatar || '🤖';

  // Build choices array and shuffle
  const choices = [
    { username: msg.username, avatar: avatarMap[msg.username] || '🤖', correct: true },
    ...wrongs.map(u => ({ username: u, avatar: avatarMap[u] || '🤖', correct: false })),
  ];
  for (let i = choices.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [choices[i], choices[j]] = [choices[j], choices[i]];
  }

  state.current = { msg, choices };
  state.answered = false;
  renderRound();
}

function renderRound() {
  const { msg, choices } = state.current;
  const ts = new Date(msg.created_at);
  const timeStr = ts.toLocaleDateString(undefined, { month: 'short', day: 'numeric' }) + ' · ' +
    ts.toLocaleTimeString(undefined, { hour: '2-digit', minute: '2-digit' });

  contentEl.innerHTML = `
    <div class="quote-card">
      <div class="quote-text">${escapeHtml(msg.content)}</div>
      <div class="quote-meta">${timeStr}</div>
    </div>
    <div class="status" id="status"></div>
    <div class="choices" id="choices"></div>
  `;

  const choicesEl = document.getElementById('choices');
  choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.innerHTML = `
      <div class="avatar">${c.avatar}</div>
      <div>
        <div class="uname">${escapeHtml(c.username)}</div>
      </div>
    `;
    btn.addEventListener('click', () => handleChoice(i));
    choicesEl.appendChild(btn);
  });

  nextBtn.style.display = 'none';
}

function handleChoice(idx) {
  if (state.answered) return;
  state.answered = true;

  const { choices } = state.current;
  const chosen = choices[idx];
  const statusEl = document.getElementById('status');
  const btns = document.querySelectorAll('.choice');

  btns.forEach((btn, i) => {
    btn.classList.add('disabled');
    if (choices[i].correct) btn.classList.add('correct');
    else if (i === idx) btn.classList.add('wrong');
  });

  if (chosen.correct) {
    state.score++;
    state.streak++;
    if (state.streak > state.bestStreak) state.bestStreak = state.streak;
    statusEl.textContent = `Correct! +1`;
    statusEl.className = 'status win';
  } else {
    state.streak = 0;
    statusEl.textContent = `Wrong — it was ${state.current.msg.username}`;
    statusEl.className = 'status lose';
  }

  scoreNum.textContent = state.score;
  streakNum.textContent = state.streak;

  if (state.round >= ROUNDS) {
    setTimeout(endGame, 1200);
  } else {
    nextBtn.style.display = 'block';
  }
}

function nextRound() {
  state.round++;
  roundNum.textContent = state.round;
  pickRound();
}

function endGame() {
  contentEl.innerHTML = `
    <div class="quote-card" style="border-left-color: var(--green); text-align: center;">
      <div class="quote-text" style="font-family: 'Instrument Serif', serif; font-size: 26px; color: var(--pop);">
        Game Over
      </div>
      <div class="quote-meta" style="font-size: 14px; margin-top: 12px;">
        Score: ${state.score}/${ROUNDS} · Best streak: ${state.bestStreak}
      </div>
    </div>
  `;
  nextBtn.textContent = 'Play Again';
  nextBtn.style.display = 'block';
  nextBtn.onclick = () => {
    state.round = 0;
    state.score = 0;
    state.streak = 0;
    state.bestStreak = 0;
    scoreNum.textContent = 0;
    streakNum.textContent = 0;
    nextBtn.textContent = 'Next Quote →';
    nextBtn.onclick = nextRound;
    startGame();
  };
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

async function startGame() {
  loadingMsg && (loadingMsg.style.display = '');
  contentEl.innerHTML = '<div class="loading">Fetching chat logs</div>';
  const ok = await fetchPool();
  if (!ok) return;
  nextRound();
}

nextBtn.addEventListener('click', nextRound);
startGame();
</script>
</body>
</html>
