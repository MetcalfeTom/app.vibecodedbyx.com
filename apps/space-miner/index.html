<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Space Miner</title>
<link rel="icon" href="https://emojicdn.elk.sh/⛏️">
<meta property="og:title" content="Space Miner">
<meta property="og:description" content="Pilot your mining ship through an asteroid field. Harvest glowing ore before your cargo hold fills up.">
<meta property="og:url" content="https://sloppy.live/space-miner/">
<meta property="og:image" content="https://sloppy.live/space-miner/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#020008}
canvas{display:block;width:100%;height:100%}
#hud{position:fixed;top:8px;left:12px;font-family:'Share Tech Mono',monospace;color:rgba(0,220,255,0.7);font-size:clamp(.55rem,1.4vw,.75rem);z-index:5;pointer-events:none;line-height:1.8;text-shadow:0 0 6px rgba(0,220,255,0.3)}
#msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Chakra Petch',sans-serif;color:#0df;font-size:clamp(1rem,3vw,1.6rem);z-index:10;text-align:center;line-height:2;text-shadow:0 0 20px rgba(0,220,255,0.5);pointer-events:none;transition:opacity 0.4s}
.back-link{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);z-index:20;color:rgba(0,220,255,.07);font-size:9px;text-decoration:none;font-family:'Share Tech Mono',monospace}
.back-link:hover{color:rgba(0,220,255,.25)}
</style>
</head>
<body>
<div id="hud"></div>
<div id="msg">SPACE MINER<br><span style="font-size:0.5em;opacity:0.5">WASD / ARROWS TO FLY &bull; FLY NEAR ASTEROIDS TO MINE<br>RETURN TO DEPOSIT ZONE TO SELL ORE<br>TAP OR PRESS ANY KEY TO START</span></div>
<canvas id="cv"></canvas>
<a class="back-link" href="https://sloppy.live">sloppy.live</a>
<script>
var CV=document.getElementById('cv'),X=CV.getContext('2d');
var hudEl=document.getElementById('hud'),msgEl=document.getElementById('msg');
var W,H;
function resize(){W=CV.width=window.innerWidth;H=CV.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

var ORE_TYPES=[
  {name:'Iron',color:'#88aacc',glow:'rgba(136,170,204,',value:1,freq:0.4},
  {name:'Gold',color:'#ffcc00',glow:'rgba(255,204,0,',value:3,freq:0.25},
  {name:'Crystal',color:'#00ffcc',glow:'rgba(0,255,204,',value:5,freq:0.18},
  {name:'Plasma',color:'#ff44aa',glow:'rgba(255,68,170,',value:8,freq:0.1},
  {name:'Void',color:'#aa44ff',glow:'rgba(170,68,255,',value:15,freq:0.05},
  {name:'Nova',color:'#ff6600',glow:'rgba(255,102,0,',value:25,freq:0.02}
];

var ship,asteroids,particles,stars,credits,cargo,maxCargo,miningTarget,miningProgress;
var keys={},started=false,gameOver=false;
var camX=0,camY=0;
var depositZone={x:0,y:0,r:60};
var wave=1;

function init(){
  ship={x:0,y:0,vx:0,vy:0,angle:0,thrust:0,hp:3,maxHp:3,shield:0,miningRange:90,miningSpeed:1};
  asteroids=[];particles=[];
  credits=0;cargo=[];maxCargo=8;
  miningTarget=null;miningProgress=0;
  wave=1;gameOver=false;
  depositZone={x:0,y:0,r:60};
  spawnWave();
  initStars();
}

function initStars(){
  stars=[];
  for(var i=0;i<200;i++){
    stars.push({x:(Math.random()-0.5)*4000,y:(Math.random()-0.5)*4000,
      r:0.3+Math.random()*1.2,bright:0.2+Math.random()*0.6,tw:Math.random()*10});
  }
}

function pickOre(){
  var r=Math.random(),sum=0;
  for(var i=0;i<ORE_TYPES.length;i++){sum+=ORE_TYPES[i].freq;if(r<sum) return i;}
  return 0;
}

function spawnWave(){
  var count=6+wave*3;
  var spread=300+wave*80;
  for(var i=0;i<count;i++){
    var ang=Math.random()*Math.PI*2;
    var dist=120+Math.random()*spread;
    var oreIdx=pickOre();
    if(wave>3&&Math.random()<0.15) oreIdx=Math.min(oreIdx+1,ORE_TYPES.length-1);
    if(wave>6&&Math.random()<0.1) oreIdx=Math.min(oreIdx+2,ORE_TYPES.length-1);
    var sz=18+Math.random()*22;
    var verts=[];
    var nv=6+Math.floor(Math.random()*4);
    for(var v=0;v<nv;v++){
      var va=v/nv*Math.PI*2;
      var vr=sz*(0.7+Math.random()*0.3);
      verts.push({x:Math.cos(va)*vr,y:Math.sin(va)*vr});
    }
    asteroids.push({
      x:ship.x+Math.cos(ang)*dist,y:ship.y+Math.sin(ang)*dist,
      vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8,
      rot:Math.random()*Math.PI*2,rotSpeed:(Math.random()-0.5)*0.5,
      size:sz,verts:verts,ore:oreIdx,
      hp:2+oreIdx*1.5,maxHp:2+oreIdx*1.5,
      pulse:Math.random()*10
    });
  }
}

document.addEventListener('keydown',function(e){
  keys[e.key.toLowerCase()]=true;
  if(!started){started=true;init();msgEl.style.opacity='0';}
  if(gameOver){init();started=true;msgEl.style.opacity='0';}
});
document.addEventListener('keyup',function(e){keys[e.key.toLowerCase()]=false;});

var touchActive=false,touchX=0,touchY=0;
CV.addEventListener('touchstart',function(e){
  e.preventDefault();
  if(!started){started=true;init();msgEl.style.opacity='0';return;}
  if(gameOver){init();started=true;msgEl.style.opacity='0';return;}
  touchActive=true;touchX=e.touches[0].clientX;touchY=e.touches[0].clientY;
},{passive:false});
CV.addEventListener('touchmove',function(e){
  e.preventDefault();touchX=e.touches[0].clientX;touchY=e.touches[0].clientY;
},{passive:false});
CV.addEventListener('touchend',function(){touchActive=false;});
CV.addEventListener('click',function(){
  if(!started){started=true;init();msgEl.style.opacity='0';}
  else if(gameOver){init();started=true;msgEl.style.opacity='0';}
});

function update(dt,now){
  if(!started||gameOver) return;

  var ax=0,ay=0;
  if(keys['w']||keys['arrowup']) ay=-1;
  if(keys['s']||keys['arrowdown']) ay=1;
  if(keys['a']||keys['arrowleft']) ax=-1;
  if(keys['d']||keys['arrowright']) ax=1;

  if(touchActive){
    var tdx=touchX-W/2,tdy=touchY-H/2;
    var td=Math.sqrt(tdx*tdx+tdy*tdy);
    if(td>20){ax=tdx/td;ay=tdy/td;}
  }

  var accel=280;
  ship.vx+=ax*accel*dt;ship.vy+=ay*accel*dt;
  ship.vx*=Math.pow(0.02,dt);ship.vy*=Math.pow(0.02,dt);
  ship.x+=ship.vx*dt;ship.y+=ship.vy*dt;

  var spd=Math.sqrt(ship.vx*ship.vx+ship.vy*ship.vy);
  if(spd>5) ship.angle=Math.atan2(ship.vy,ship.vx);
  ship.thrust=spd>15?1:spd/15;

  camX+=(ship.x-camX)*4*dt;camY+=(ship.y-camY)*4*dt;

  // Mining
  miningTarget=null;
  var closestDist=ship.miningRange;
  for(var i=0;i<asteroids.length;i++){
    var a=asteroids[i];
    var dx=a.x-ship.x,dy=a.y-ship.y;
    var d=Math.sqrt(dx*dx+dy*dy);
    if(d<closestDist){closestDist=d;miningTarget=a;}
  }

  if(miningTarget&&cargo.length<maxCargo){
    miningProgress+=ship.miningSpeed*dt;
    if(Math.random()<0.5){
      var ore=ORE_TYPES[miningTarget.ore];
      var mx2=miningTarget.x+(Math.random()-0.5)*miningTarget.size;
      var my2=miningTarget.y+(Math.random()-0.5)*miningTarget.size;
      particles.push({x:mx2,y:my2,vx:(ship.x-mx2)*2+(Math.random()-0.5)*40,vy:(ship.y-my2)*2+(Math.random()-0.5)*40,
        life:0.3+Math.random()*0.3,maxLife:0.6,r:1.5+Math.random()*2,color:ore.color});
    }
    if(miningProgress>=1){
      miningProgress=0;
      miningTarget.hp-=1;
      var ore=ORE_TYPES[miningTarget.ore];
      cargo.push({ore:miningTarget.ore,name:ore.name,value:ore.value});
      for(var p=0;p<5;p++){
        var pa=Math.random()*Math.PI*2;
        particles.push({x:miningTarget.x,y:miningTarget.y,
          vx:Math.cos(pa)*50+ship.vx*0.3,vy:Math.sin(pa)*50+ship.vy*0.3,
          life:0.5+Math.random()*0.3,maxLife:0.8,r:2+Math.random()*3,color:ore.color});
      }
      if(miningTarget.hp<=0){
        for(var p=0;p<15;p++){
          var pa=Math.random()*Math.PI*2;var ps=30+Math.random()*80;
          particles.push({x:miningTarget.x,y:miningTarget.y,
            vx:Math.cos(pa)*ps,vy:Math.sin(pa)*ps,
            life:0.6+Math.random()*0.5,maxLife:1.1,r:2+Math.random()*4,color:ore.color});
        }
        asteroids.splice(asteroids.indexOf(miningTarget),1);
        miningTarget=null;
      }
    }
  } else {
    miningProgress=Math.max(0,miningProgress-dt*2);
  }

  // Deposit
  var ddx=ship.x-depositZone.x,ddy=ship.y-depositZone.y;
  var ddist=Math.sqrt(ddx*ddx+ddy*ddy);
  if(ddist<depositZone.r&&cargo.length>0){
    var totalVal=0;
    for(var c=0;c<cargo.length;c++) totalVal+=cargo[c].value;
    credits+=totalVal;
    for(var p=0;p<cargo.length*3;p++){
      var pa=Math.random()*Math.PI*2;
      particles.push({x:depositZone.x,y:depositZone.y,
        vx:Math.cos(pa)*40,vy:Math.sin(pa)*40,
        life:0.4+Math.random()*0.3,maxLife:0.7,r:2,color:'#0df'});
    }
    cargo=[];
  }

  // Asteroids update
  for(var i=0;i<asteroids.length;i++){
    var a=asteroids[i];
    a.x+=a.vx*dt;a.y+=a.vy*dt;
    a.rot+=a.rotSpeed*dt;
    a.pulse+=dt*3;
    var adx=ship.x-a.x,ady=ship.y-a.y;
    var adist=Math.sqrt(adx*adx+ady*ady);
    if(adist>600){a.vx+=adx*0.01*dt;a.vy+=ady*0.01*dt;}

    var sdx=a.x-ship.x,sdy=a.y-ship.y;
    var sd=Math.sqrt(sdx*sdx+sdy*sdy);
    if(sd<a.size+12){
      var nx=sdx/sd,ny=sdy/sd;
      ship.vx-=nx*80;ship.vy-=ny*80;
      a.vx+=nx*30;a.vy+=ny*30;
      if(ship.shield<=0){
        ship.hp--;ship.shield=1;
        for(var p=0;p<8;p++){
          var pa2=Math.random()*Math.PI*2;
          particles.push({x:ship.x,y:ship.y,vx:Math.cos(pa2)*60,vy:Math.sin(pa2)*60,
            life:0.3,maxLife:0.3,r:2,color:'#ff3333'});
        }
        if(ship.hp<=0){die();return;}
      }
    }
  }

  if(ship.shield>0) ship.shield-=dt;
  if(asteroids.length===0){wave++;spawnWave();}

  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=30*dt;
    p.life-=dt;if(p.life<=0) particles.splice(i,1);
  }
}

function die(){
  gameOver=true;
  for(var p=0;p<30;p++){
    var pa=Math.random()*Math.PI*2;var ps=40+Math.random()*100;
    particles.push({x:ship.x,y:ship.y,vx:Math.cos(pa)*ps,vy:Math.sin(pa)*ps,
      life:0.8+Math.random()*0.5,maxLife:1.3,r:2+Math.random()*4,color:Math.random()<0.5?'#0df':'#ff4444'});
  }
  msgEl.innerHTML='SHIP DESTROYED<br><span style="font-size:0.5em;opacity:0.6">CREDITS: '+credits+' &bull; WAVE: '+wave+'</span><br><span style="font-size:0.4em;opacity:0.3">TAP OR PRESS ANY KEY</span>';
  msgEl.style.opacity='1';
}

function draw(now){
  X.fillStyle='#020008';X.fillRect(0,0,W,H);
  var ox=W/2-camX,oy=H/2-camY;

  // Stars
  for(var i=0;i<stars.length;i++){
    var s=stars[i];
    var sx=(s.x-camX*0.3+2000)%4000-2000+W/2;
    var sy=(s.y-camY*0.3+2000)%4000-2000+H/2;
    var tw2=Math.sin(now/1000+s.tw)*0.2+s.bright;
    X.fillStyle='rgba(180,200,255,'+tw2+')';
    X.beginPath();X.arc(sx,sy,s.r,0,Math.PI*2);X.fill();
  }

  if(!started) return;

  // Deposit zone
  var dzx=depositZone.x+ox,dzy=depositZone.y+oy;
  var dzP=0.5+Math.sin(now/800)*0.2;
  X.strokeStyle='rgba(0,220,255,'+(0.12+dzP*0.08)+')';X.lineWidth=2;
  X.shadowColor='#0df';X.shadowBlur=8;
  X.setLineDash([8,6]);
  X.beginPath();X.arc(dzx,dzy,depositZone.r,0,Math.PI*2);X.stroke();
  X.setLineDash([]);X.shadowBlur=0;
  X.fillStyle='rgba(0,220,255,'+(0.15+dzP*0.08)+')';
  X.font='10px "Share Tech Mono",monospace';X.textAlign='center';
  X.fillText('DEPOSIT',dzx,dzy+4);

  // Deposit zone fill
  var dzGrd=X.createRadialGradient(dzx,dzy,0,dzx,dzy,depositZone.r);
  dzGrd.addColorStop(0,'rgba(0,220,255,'+(0.03+dzP*0.01)+')');dzGrd.addColorStop(1,'transparent');
  X.fillStyle=dzGrd;X.beginPath();X.arc(dzx,dzy,depositZone.r,0,Math.PI*2);X.fill();

  // Asteroids
  for(var i=0;i<asteroids.length;i++){
    var a=asteroids[i];
    var asx=a.x+ox,asy=a.y+oy;
    if(asx<-80||asx>W+80||asy<-80||asy>H+80) continue;
    var ore=ORE_TYPES[a.ore];
    var gp=0.5+Math.sin(a.pulse)*0.3;

    var ag=X.createRadialGradient(asx,asy,0,asx,asy,a.size*2);
    ag.addColorStop(0,ore.glow+(0.08*gp)+')');ag.addColorStop(1,'transparent');
    X.fillStyle=ag;X.beginPath();X.arc(asx,asy,a.size*2,0,Math.PI*2);X.fill();

    X.save();X.translate(asx,asy);X.rotate(a.rot);
    X.fillStyle='#1a1a2a';X.strokeStyle=ore.color;X.lineWidth=1.5;
    X.shadowColor=ore.color;X.shadowBlur=6;
    X.beginPath();
    X.moveTo(a.verts[0].x,a.verts[0].y);
    for(var v=1;v<a.verts.length;v++) X.lineTo(a.verts[v].x,a.verts[v].y);
    X.closePath();X.fill();X.stroke();
    X.shadowBlur=0;

    X.strokeStyle=ore.glow+(0.3*gp)+')';X.lineWidth=1;
    for(var v=0;v<a.verts.length;v+=2){
      X.beginPath();X.moveTo(0,0);X.lineTo(a.verts[v].x*0.7,a.verts[v].y*0.7);X.stroke();
    }

    if(a.hp<a.maxHp){
      var bw=a.size*1.2;
      X.fillStyle='rgba(0,0,0,0.5)';X.fillRect(-bw/2,-a.size-10,bw,4);
      X.fillStyle=ore.color;X.fillRect(-bw/2,-a.size-10,bw*(a.hp/a.maxHp),4);
    }
    X.restore();
  }

  // Mining beam
  if(miningTarget&&cargo.length<maxCargo){
    var mtx=miningTarget.x+ox,mty=miningTarget.y+oy;
    var shx=ship.x+ox,shy=ship.y+oy;
    var ore=ORE_TYPES[miningTarget.ore];
    X.strokeStyle=ore.color;X.lineWidth=2;X.globalAlpha=0.4+miningProgress*0.4;
    X.shadowColor=ore.color;X.shadowBlur=8;
    X.setLineDash([4,4+Math.sin(now/200)*2]);
    X.beginPath();X.moveTo(shx,shy);X.lineTo(mtx,mty);X.stroke();
    X.setLineDash([]);X.shadowBlur=0;X.globalAlpha=1;
    X.strokeStyle=ore.glow+(0.3+miningProgress*0.3)+')';X.lineWidth=2;
    X.beginPath();X.arc(mtx,mty,miningTarget.size+4+Math.sin(now/300)*3,0,Math.PI*2*miningProgress);X.stroke();
  }

  // Particles
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    var ppx=p.x+ox,ppy=p.y+oy;
    var pa2=p.life/p.maxLife;
    X.fillStyle=p.color;X.globalAlpha=pa2;
    X.shadowColor=p.color;X.shadowBlur=4;
    X.beginPath();X.arc(ppx,ppy,p.r*pa2,0,Math.PI*2);X.fill();
  }
  X.shadowBlur=0;X.globalAlpha=1;

  // Ship
  if(!gameOver){
    var ssx=ship.x+ox,ssy=ship.y+oy;
    X.save();X.translate(ssx,ssy);X.rotate(ship.angle);

    if(ship.thrust>0.1){
      var fl=8+ship.thrust*12+Math.random()*6;
      X.fillStyle='rgba(0,180,255,0.4)';
      X.beginPath();X.moveTo(-8,-3);X.lineTo(-8-fl,0);X.lineTo(-8,3);X.closePath();X.fill();
      X.fillStyle='rgba(255,255,255,0.3)';
      X.beginPath();X.moveTo(-8,-1.5);X.lineTo(-8-fl*0.5,0);X.lineTo(-8,1.5);X.closePath();X.fill();
    }

    X.fillStyle=ship.shield>0&&Math.sin(now/50)>0?'#88ddff':'#cceeff';
    X.shadowColor='#0df';X.shadowBlur=8;
    X.beginPath();
    X.moveTo(14,0);X.lineTo(-6,-8);X.lineTo(-10,-5);X.lineTo(-8,0);X.lineTo(-10,5);X.lineTo(-6,8);
    X.closePath();X.fill();
    X.shadowBlur=0;

    X.fillStyle='#00ccff';
    X.beginPath();X.arc(4,0,3,0,Math.PI*2);X.fill();

    X.strokeStyle='#0088aa';X.lineWidth=1;
    X.beginPath();X.moveTo(-4,-7);X.lineTo(8,0);X.lineTo(-4,7);X.stroke();

    X.restore();

    if(ship.shield>0){
      X.strokeStyle='rgba(0,220,255,'+(ship.shield*0.3)+')';X.lineWidth=2;
      X.beginPath();X.arc(ssx,ssy,18,0,Math.PI*2);X.stroke();
    }
  }

  // Minimap
  var mmS=80,mmX=W-mmS-10,mmY=10;
  X.fillStyle='rgba(0,10,20,0.6)';X.strokeStyle='rgba(0,220,255,0.15)';X.lineWidth=1;
  X.fillRect(mmX,mmY,mmS,mmS);X.strokeRect(mmX,mmY,mmS,mmS);
  var mmScale=800;
  // Deposit on minimap
  var dmx=mmX+mmS/2+(depositZone.x-ship.x)/mmScale*mmS;
  var dmy=mmY+mmS/2+(depositZone.y-ship.y)/mmScale*mmS;
  if(dmx>mmX&&dmx<mmX+mmS&&dmy>mmY&&dmy<mmY+mmS){
    X.fillStyle='rgba(0,220,255,0.5)';X.beginPath();X.arc(dmx,dmy,3,0,Math.PI*2);X.fill();
  }
  // Asteroids on minimap
  for(var i=0;i<asteroids.length;i++){
    var a=asteroids[i];
    var amx=mmX+mmS/2+(a.x-ship.x)/mmScale*mmS;
    var amy=mmY+mmS/2+(a.y-ship.y)/mmScale*mmS;
    if(amx>mmX&&amx<mmX+mmS&&amy>mmY&&amy<mmY+mmS){
      X.fillStyle=ORE_TYPES[a.ore].glow+'0.6)';
      X.fillRect(amx-1,amy-1,2,2);
    }
  }
  // Ship on minimap
  X.fillStyle='#fff';X.fillRect(mmX+mmS/2-1,mmY+mmS/2-1,3,3);

  // HUD
  var hpBar='';
  for(var i=0;i<ship.maxHp;i++) hpBar+=i<ship.hp?'<span style="color:#0f6">█</span>':'<span style="opacity:0.2">░</span>';
  var cargoStr='';
  for(var i=0;i<maxCargo;i++){
    if(i<cargo.length){
      var ore=ORE_TYPES[cargo[i].ore];
      cargoStr+='<span style="color:'+ore.color+'">■</span>';
    } else cargoStr+='<span style="opacity:0.15">□</span>';
  }
  hudEl.innerHTML='HP '+hpBar+'<br>CARGO '+cargoStr+' '+cargo.length+'/'+maxCargo+'<br>CREDITS '+credits+'<br>WAVE '+wave+' &bull; '+asteroids.length+' ASTEROIDS';
}

init();initStars();
var lastTime=performance.now();
function loop(now){
  var dt=Math.min((now-lastTime)/1000,0.05);lastTime=now;
  update(dt,now);draw(now);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
