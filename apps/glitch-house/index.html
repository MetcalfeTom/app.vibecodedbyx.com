<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glitch House — Haunted Rooms</title>
<link rel="icon" href="https://emojicdn.elk.sh/👻">
<meta property="og:title" content="Glitch House">
<meta property="og:description" content="Click rooms in a haunted house. Things break. Reality glitches.">
<meta property="og:url" content="https://app.sloppy.live/glitch-house/">
<meta property="og:image" content="https://emojicdn.elk.sh/👻?style=google">
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=VT323&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08060a;color:#887788;font-family:'VT323',monospace;min-height:100vh;overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center}
canvas{display:block;cursor:pointer;touch-action:none}
.title{font-family:'Creepster',cursive;font-size:clamp(20px,5vw,32px);color:#8844aa;text-shadow:0 0 15px rgba(136,68,170,0.5);letter-spacing:4px;position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:10;pointer-events:none}
.hint{position:fixed;bottom:10px;font-size:14px;color:#443355;letter-spacing:2px;z-index:10;pointer-events:none;text-align:center;width:100%}
.hint a{color:#443355;text-decoration:none}.hint a:hover{color:#8844aa}
.glitch-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:5;mix-blend-mode:screen}
</style>
</head>
<body>
<div class="title" id="title">GLITCH HOUSE</div>
<canvas id="c"></canvas>
<canvas class="glitch-overlay" id="glitch"></canvas>
<div class="hint" id="hint">CLICK A ROOM</div>

<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
const GC = document.getElementById('glitch');
const gctx = GC.getContext('2d');

let W, H;
function resize() {
  W = C.width = GC.width = window.innerWidth;
  H = C.height = GC.height = window.innerHeight;
  buildHouse();
}

let rooms = [];
let shake = { x: 0, y: 0, intensity: 0 };
let frame = 0;
let glitchEffects = [];
let scanLines = [];
let ghostEntities = [];
let flickerRooms = [];
let chromaShift = 0;
let invertTimer = 0;
let corruptionLevel = 0;
let totalClicks = 0;
let staticNoise = 0;
let titleGlitch = 0;

// --- Room layout ---
function buildHouse() {
  rooms = [];
  const houseW = Math.min(W * 0.85, 700);
  const houseH = Math.min(H * 0.7, 500);
  const ox = (W - houseW) / 2;
  const oy = (H - houseH) / 2 + 20;

  const cols = 4, rows = 3;
  const rw = houseW / cols, rh = houseH / rows;
  const ROOM_NAMES = [
    'ATTIC LEFT','ATTIC','ATTIC RIGHT','TOWER',
    'BEDROOM','HALLWAY','LIBRARY','NURSERY',
    'KITCHEN','PARLOR','CELLAR','CRYPT'
  ];
  const ROOM_COLORS = [
    '#2a1a2a','#221822','#2a1a22','#1a1a2a',
    '#221a28','#181418','#1a2228','#281a22',
    '#1a1a18','#201820','#141418','#0e0a10'
  ];

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const i = r * cols + c;
      rooms.push({
        x: ox + c * rw, y: oy + r * rh,
        w: rw, h: rh,
        name: ROOM_NAMES[i],
        baseColor: ROOM_COLORS[i],
        haunted: 0, // 0..1 haunt level
        flickerPhase: Math.random() * Math.PI * 2,
        lastClick: 0,
        eyeAppear: 0,
        symbol: null,
        distortion: 0
      });
    }
  }
}

// --- Audio ---
let audioCtx;
function ensureAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }

function playHaunt(intensity) {
  const ctx = ensureAudio(); const now = ctx.currentTime;
  // Creepy low drone
  const o = ctx.createOscillator(); const g = ctx.createGain();
  o.type = 'sawtooth'; o.frequency.setValueAtTime(40 + Math.random()*30, now);
  o.frequency.linearRampToValueAtTime(20 + Math.random()*20, now + 0.4);
  g.gain.setValueAtTime(0.06 * intensity, now); g.gain.linearRampToValueAtTime(0, now + 0.4);
  o.connect(g); g.connect(ctx.destination); o.start(now); o.stop(now + 0.4);

  // Glitch crackle
  const buf = ctx.createBuffer(1, ctx.sampleRate * 0.2, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) {
    d[i] = Math.random() < 0.05 ? (Math.random()*2-1)*0.8 : (Math.random()*2-1)*0.02;
  }
  const s = ctx.createBufferSource(); const g2 = ctx.createGain();
  s.buffer = buf; g2.gain.setValueAtTime(0.1 * intensity, now);
  s.connect(g2); g2.connect(ctx.destination); s.start(now);

  if (intensity > 0.7) {
    // High pitched screech
    const o2 = ctx.createOscillator(); const g3 = ctx.createGain();
    o2.type = 'square'; o2.frequency.setValueAtTime(2000+Math.random()*2000, now+0.05);
    o2.frequency.linearRampToValueAtTime(100, now + 0.15);
    g3.gain.setValueAtTime(0.04, now+0.05); g3.gain.linearRampToValueAtTime(0, now + 0.15);
    o2.connect(g3); g3.connect(ctx.destination); o2.start(now+0.05); o2.stop(now+0.15);
  }
}

// --- Click handling ---
C.addEventListener('click', e => {
  const rect = C.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;

  for (const room of rooms) {
    if (mx >= room.x && mx <= room.x + room.w && my >= room.y && my <= room.y + room.h) {
      triggerRoom(room);
      break;
    }
  }
});
C.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  const rect = C.getBoundingClientRect();
  const mx = t.clientX - rect.left;
  const my = t.clientY - rect.top;
  for (const room of rooms) {
    if (mx >= room.x && mx <= room.x + room.w && my >= room.y && my <= room.y + room.h) {
      triggerRoom(room);
      break;
    }
  }
}, { passive: false });

const CREEPY_SYMBOLS = ['☠','⛧','∞','⚰','🜏','⛤','◉','△','Ω','ψ','⌀','⍟','☽','♱','⛥','∴'];
const GHOST_TEXTS = ['GET OUT','HELP ME','IT SEES YOU','BEHIND YOU','NOT ALONE','RUN','COME CLOSER','DONT LOOK','THEY KNOW','WE ARE HERE','NO EXIT','FOREVER'];

function triggerRoom(room) {
  totalClicks++;
  room.haunted = Math.min(1, room.haunted + 0.2);
  room.lastClick = frame;
  room.distortion = 15;
  room.eyeAppear = 60 + Math.random() * 60;
  room.symbol = CREEPY_SYMBOLS[Math.floor(Math.random() * CREEPY_SYMBOLS.length)];

  const intensity = 0.3 + corruptionLevel * 0.7;
  shake.intensity = 8 + corruptionLevel * 15;
  chromaShift = 4 + corruptionLevel * 8;
  staticNoise = 0.3 + corruptionLevel * 0.5;
  titleGlitch = 20;
  playHaunt(intensity);

  // Glitch block artifacts
  const count = 3 + Math.floor(corruptionLevel * 10);
  for (let i = 0; i < count; i++) {
    glitchEffects.push({
      x: Math.random() * W,
      y: room.y + Math.random() * room.h,
      w: 20 + Math.random() * 120,
      h: 2 + Math.random() * 8,
      life: 8 + Math.random() * 20,
      maxLife: 28,
      color: Math.random() < 0.5 ? `rgba(${Math.random()*255|0},0,${Math.random()*255|0},` : `rgba(0,${Math.random()*255|0},0,`,
      shiftX: (Math.random() - 0.5) * 30
    });
  }

  // Scan line disruption
  for (let i = 0; i < 5; i++) {
    scanLines.push({
      y: room.y + Math.random() * room.h,
      speed: (Math.random() - 0.5) * 4,
      life: 20 + Math.random() * 30
    });
  }

  // Ghost entity
  if (Math.random() < 0.3 + corruptionLevel * 0.3) {
    ghostEntities.push({
      x: room.x + room.w/2 + (Math.random()-0.5)*room.w*0.5,
      y: room.y + room.h/2 + (Math.random()-0.5)*room.h*0.3,
      text: GHOST_TEXTS[Math.floor(Math.random() * GHOST_TEXTS.length)],
      life: 40 + Math.random() * 60,
      maxLife: 100,
      drift: (Math.random()-0.5)*0.5
    });
  }

  // Inversion flash
  if (Math.random() < corruptionLevel * 0.4) invertTimer = 3 + Math.random() * 5;

  // Increase global corruption
  corruptionLevel = Math.min(1, corruptionLevel + 0.03);

  // Hide hint after first click
  if (totalClicks === 1) document.getElementById('hint').style.opacity = '0.3';
}

// --- Rendering ---
function drawHouse() {
  // Roof
  const houseL = rooms[0].x;
  const houseR = rooms[3].x + rooms[3].w;
  const houseTop = rooms[0].y;
  ctx.beginPath();
  ctx.moveTo(houseL - 10, houseTop);
  ctx.lineTo((houseL + houseR) / 2, houseTop - 50 - Math.sin(frame*0.01)*3*corruptionLevel);
  ctx.lineTo(houseR + 10, houseTop);
  ctx.closePath();
  ctx.fillStyle = '#141018';
  ctx.fill();
  ctx.strokeStyle = '#332244';
  ctx.lineWidth = 1;
  ctx.stroke();

  // House outline
  ctx.strokeStyle = `rgba(80,50,100,${0.4 + Math.sin(frame*0.02)*0.1})`;
  ctx.strokeRect(houseL, houseTop, houseR - houseL, rooms[8].y + rooms[8].h - houseTop);
}

function drawRoom(room) {
  const timeSinceClick = frame - room.lastClick;
  const clickFlash = Math.max(0, 1 - timeSinceClick / 20);
  const dist = Math.max(0, room.distortion * (1 - timeSinceClick / 40));

  // Room distortion offset
  const dx = Math.sin(frame * 0.1 + room.flickerPhase) * dist;
  const dy = Math.cos(frame * 0.13 + room.flickerPhase) * dist * 0.5;

  ctx.save();
  ctx.translate(dx, dy);

  // Room fill
  const hauntBright = room.haunted * 0.15;
  ctx.fillStyle = room.baseColor;
  ctx.fillRect(room.x, room.y, room.w, room.h);

  // Haunt overlay
  if (room.haunted > 0) {
    ctx.fillStyle = `rgba(100,20,60,${room.haunted * 0.15 + clickFlash * 0.2})`;
    ctx.fillRect(room.x, room.y, room.w, room.h);
  }

  // Click flash
  if (clickFlash > 0) {
    ctx.fillStyle = `rgba(180,80,200,${clickFlash * 0.15})`;
    ctx.fillRect(room.x, room.y, room.w, room.h);
  }

  // Room border
  ctx.strokeStyle = `rgba(80,50,100,${0.3 + room.haunted * 0.3})`;
  ctx.lineWidth = 1;
  ctx.strokeRect(room.x + 0.5, room.y + 0.5, room.w - 1, room.h - 1);

  // Room name
  ctx.font = '12px VT323';
  ctx.fillStyle = `rgba(100,70,110,${0.4 + room.haunted * 0.3})`;
  ctx.textAlign = 'center';
  ctx.fillText(room.name, room.x + room.w/2, room.y + 14);

  // Window
  const winW = room.w * 0.25, winH = room.h * 0.3;
  const winX = room.x + room.w/2 - winW/2;
  const winY = room.y + room.h * 0.3;
  ctx.fillStyle = '#060408';
  ctx.fillRect(winX, winY, winW, winH);
  ctx.strokeStyle = '#332244';
  ctx.lineWidth = 1;
  ctx.strokeRect(winX, winY, winW, winH);
  // Cross pane
  ctx.beginPath();
  ctx.moveTo(winX + winW/2, winY); ctx.lineTo(winX + winW/2, winY + winH);
  ctx.moveTo(winX, winY + winH/2); ctx.lineTo(winX + winW, winY + winH/2);
  ctx.stroke();

  // Flickering light in window
  const flicker = Math.sin(frame * 0.05 + room.flickerPhase) > 0.7 - room.haunted * 0.3;
  if (flicker && room.haunted > 0.1) {
    ctx.fillStyle = `rgba(200,150,50,${0.05 + room.haunted * 0.1})`;
    ctx.fillRect(winX + 1, winY + 1, winW - 2, winH - 2);
  }

  // Eyes in window
  if (room.eyeAppear > 0 && timeSinceClick > 10 && timeSinceClick < 10 + room.eyeAppear) {
    const eyeA = Math.min(1, (timeSinceClick - 10) / 15) * Math.min(1, (10 + room.eyeAppear - timeSinceClick) / 15);
    const ecx = winX + winW/2, ecy = winY + winH/2;
    ctx.shadowColor = '#ff2020';
    ctx.shadowBlur = 6;
    ctx.fillStyle = `rgba(255,30,30,${eyeA * 0.8})`;
    ctx.beginPath(); ctx.arc(ecx - 5, ecy, 2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(ecx + 5, ecy, 2, 0, Math.PI*2); ctx.fill();
    // Pupils
    ctx.fillStyle = `rgba(0,0,0,${eyeA})`;
    ctx.beginPath(); ctx.arc(ecx - 5, ecy, 0.8, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(ecx + 5, ecy, 0.8, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }

  // Creepy symbol
  if (room.symbol && room.haunted > 0.3 && Math.sin(frame * 0.03 + room.flickerPhase) > 0) {
    ctx.font = `${14 + room.haunted * 10}px serif`;
    ctx.fillStyle = `rgba(180,40,80,${room.haunted * 0.4})`;
    ctx.textAlign = 'center';
    ctx.fillText(room.symbol, room.x + room.w * 0.75, room.y + room.h * 0.7);
  }

  ctx.restore();
}

function drawGlitchLayer() {
  gctx.clearRect(0, 0, W, H);

  // Chromatic aberration
  if (chromaShift > 0.5) {
    gctx.globalCompositeOperation = 'lighter';
    gctx.drawImage(C, chromaShift, 0, W, H, 0, 0, W, H);
    gctx.globalAlpha = 0.08;
    gctx.fillStyle = '#ff0000';
    gctx.fillRect(0, 0, W, H);
    gctx.globalAlpha = 1;
    gctx.globalCompositeOperation = 'source-over';
    chromaShift *= 0.9;
  }

  // Glitch blocks
  glitchEffects.forEach(g => {
    const a = g.life / g.maxLife;
    gctx.fillStyle = g.color + (a * 0.6) + ')';
    gctx.fillRect(g.x + g.shiftX * (1-a), g.y, g.w, g.h);
    g.life--;
    g.y += (Math.random()-0.5) * 2;
  });
  glitchEffects = glitchEffects.filter(g => g.life > 0);

  // Scan line disruptions
  scanLines.forEach(s => {
    s.y += s.speed;
    s.life--;
    const a = s.life / 50;
    gctx.fillStyle = `rgba(120,60,150,${a * 0.15})`;
    gctx.fillRect(0, s.y, W, 1);
    gctx.fillStyle = `rgba(0,0,0,${a * 0.3})`;
    gctx.fillRect(0, s.y + 1, W, 1);
  });
  scanLines = scanLines.filter(s => s.life > 0);

  // Ghost text entities
  ghostEntities.forEach(g => {
    g.y += g.drift;
    g.life--;
    const a = g.life / g.maxLife;
    const glitchOff = Math.sin(frame * 0.2) * 3 * (1-a);
    gctx.font = `${16 + (1-a)*8}px Creepster`;
    gctx.textAlign = 'center';
    gctx.shadowColor = 'rgba(200,30,60,0.6)';
    gctx.shadowBlur = 8;
    gctx.fillStyle = `rgba(200,60,80,${a * 0.7})`;
    gctx.fillText(g.text, g.x + glitchOff, g.y);
    // Double ghost
    gctx.fillStyle = `rgba(100,200,200,${a * 0.2})`;
    gctx.fillText(g.text, g.x - glitchOff * 2, g.y + 2);
    gctx.shadowBlur = 0;
  });
  ghostEntities = ghostEntities.filter(g => g.life > 0);

  // Static noise
  if (staticNoise > 0.05) {
    const imgData = gctx.createImageData(W, H);
    const d = imgData.data;
    const density = staticNoise * 0.02;
    for (let i = 0; i < d.length; i += 4) {
      if (Math.random() < density) {
        const v = Math.random() * 180;
        d[i] = v; d[i+1] = v * 0.6; d[i+2] = v * 0.8; d[i+3] = Math.random() * 80;
      }
    }
    gctx.putImageData(imgData, 0, 0);
    staticNoise *= 0.95;
  }

  // Inversion flash
  if (invertTimer > 0) {
    gctx.globalCompositeOperation = 'difference';
    gctx.fillStyle = '#ffffff';
    gctx.globalAlpha = 0.7;
    gctx.fillRect(0, 0, W, H);
    gctx.globalAlpha = 1;
    gctx.globalCompositeOperation = 'source-over';
    invertTimer--;
  }

  // Persistent CRT scan lines (subtle)
  gctx.fillStyle = 'rgba(0,0,0,0.06)';
  for (let y = 0; y < H; y += 3) {
    gctx.fillRect(0, y, W, 1);
  }
}

// --- Title glitch ---
function updateTitle() {
  const el = document.getElementById('title');
  if (titleGlitch > 0) {
    titleGlitch--;
    if (Math.random() < 0.3) {
      const chars = 'GLITCH HOUSE'.split('');
      const glitchChars = '▓░▒█╗╚╔╝╬║═┼¤×÷±';
      for (let i = 0; i < 2 + corruptionLevel * 3; i++) {
        const idx = Math.floor(Math.random() * chars.length);
        chars[idx] = glitchChars[Math.floor(Math.random() * glitchChars.length)];
      }
      el.textContent = chars.join('');
      el.style.transform = `translateX(calc(-50% + ${(Math.random()-0.5)*10}px))`;
    }
  } else {
    el.textContent = 'GLITCH HOUSE';
    el.style.transform = 'translateX(-50%)';
  }
}

// --- Loop ---
function loop() {
  frame++;

  // Shake decay
  if (shake.intensity > 0.3) {
    shake.x = (Math.random()-0.5) * shake.intensity;
    shake.y = (Math.random()-0.5) * shake.intensity;
    shake.intensity *= 0.9;
  } else {
    shake.x = shake.y = 0;
    shake.intensity = 0;
  }

  // Corruption slowly fades
  corruptionLevel *= 0.9995;

  ctx.save();
  ctx.translate(shake.x, shake.y);

  // Background
  ctx.fillStyle = '#08060a';
  ctx.fillRect(-10, -10, W+20, H+20);

  // Ambient fog
  const fogGrad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.6);
  fogGrad.addColorStop(0, `rgba(30,15,40,${0.1 + corruptionLevel * 0.1})`);
  fogGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = fogGrad;
  ctx.fillRect(0, 0, W, H);

  drawHouse();
  rooms.forEach(drawRoom);

  // Ground
  const groundY = rooms[8].y + rooms[8].h;
  ctx.fillStyle = '#0c0a0e';
  ctx.fillRect(0, groundY, W, H - groundY);
  // Dead grass
  for (let x = 10; x < W; x += 6 + Math.random()*4) {
    const gh = 4 + Math.random() * 8;
    const sway = Math.sin(frame * 0.01 + x * 0.1) * 2;
    ctx.strokeStyle = `rgba(40,50,30,${0.3 + Math.random()*0.2})`;
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.moveTo(x, groundY);
    ctx.lineTo(x + sway, groundY - gh);
    ctx.stroke();
  }

  ctx.restore();

  drawGlitchLayer();
  updateTitle();

  requestAnimationFrame(loop);
}

resize();
window.addEventListener('resize', resize);
loop();
</script>
</body>
</html>
