<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Duo Chroma Wordle — Solve Two at Once</title>
<link rel="icon" href="https://emojicdn.elk.sh/🟪">
<meta property="og:title" content="Duo Chroma Wordle">
<meta property="og:description" content="Two Wordle grids, one guess. Solve both words with 5 feedback colors.">
<meta property="og:url" content="https://sloppy.live/duo-chroma-wordle">
<meta property="og:image" content="https://sloppy.live/duo-chroma-wordle/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&family=Fira+Code:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0c0a14;--card:#14121e;--border:#2a2838;
  --exact:#22c55e;--close:#eab308;--present:#8b5cf6;
  --warm:#e8713a;--absent:#333040;--text:#e8e4f0;--muted:#6b6580;
  --glow1:#22c55e33;--glow2:#8b5cf633;
}
body{
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;
  overflow-x:hidden;
}
.wrap{max-width:860px;width:100%;padding:12px}
header{text-align:center;padding:14px 0 6px}
header h1{font-size:24px;font-weight:800;letter-spacing:2px;
  background:linear-gradient(90deg,var(--exact),var(--close),var(--present),var(--warm));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
header .sub{font-size:11px;color:var(--muted);font-family:'Fira Code',monospace;margin-top:2px}
#mode-bar{display:flex;justify-content:center;gap:6px;margin:8px 0}
.mode-btn{
  padding:5px 12px;border-radius:6px;border:1px solid var(--border);
  background:transparent;color:var(--muted);font-family:'Outfit',sans-serif;
  font-size:12px;cursor:pointer;transition:all .15s;
}
.mode-btn.active{border-color:var(--close);color:var(--close);background:rgba(234,179,8,.08)}
#legend{
  display:flex;justify-content:center;gap:10px;margin:4px 0 10px;flex-wrap:wrap;
  font-size:10px;font-family:'Fira Code',monospace;color:var(--muted);
}
.leg-item{display:flex;align-items:center;gap:3px}
.leg-dot{width:10px;height:10px;border-radius:3px}

/* Dual grid layout */
#duo-wrap{
  display:flex;justify-content:center;gap:20px;margin-bottom:10px;flex-wrap:wrap;
}
.grid-col{display:flex;flex-direction:column;align-items:center}
.grid-label{
  font-family:'Fira Code',monospace;font-size:11px;color:var(--muted);
  margin-bottom:6px;letter-spacing:1px;
}
.grid-label.solved{color:var(--exact)}
.grid{display:grid;gap:4px}
.cell{
  width:44px;height:44px;display:flex;align-items:center;justify-content:center;
  border:2px solid var(--border);border-radius:5px;
  font-size:20px;font-weight:800;text-transform:uppercase;
  transition:all .3s;font-family:'Outfit',sans-serif;
}
.cell.filled{border-color:#4a4660;animation:pop .1s}
.cell.exact{background:var(--exact);border-color:var(--exact);color:#fff}
.cell.close{background:var(--close);border-color:var(--close);color:#111}
.cell.present{background:var(--present);border-color:var(--present);color:#fff}
.cell.warm{background:var(--warm);border-color:var(--warm);color:#fff}
.cell.absent{background:var(--absent);border-color:var(--absent);color:#666}
.cell.dim{opacity:.35}
@keyframes pop{50%{transform:scale(1.1)}}
@keyframes flip{0%{transform:rotateX(0)}50%{transform:rotateX(90deg)}100%{transform:rotateX(0)}}
.cell.flip{animation:flip .4s ease-in-out}
@keyframes solvedGlow{
  0%,100%{box-shadow:0 0 8px var(--glow1)}
  50%{box-shadow:0 0 16px var(--glow1)}
}
.grid-col.solved .grid{animation:solvedGlow 2s infinite}

#keyboard{display:flex;flex-direction:column;gap:4px;align-items:center;margin-bottom:8px}
.kb-row{display:flex;gap:3px}
.key{
  min-width:28px;height:40px;display:flex;align-items:center;justify-content:center;
  border-radius:5px;border:none;background:#28253a;color:var(--text);
  font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;
  cursor:pointer;transition:all .15s;padding:0 5px;
}
.key:hover{background:#3a3650}
.key:active{transform:scale(.95)}
.key.wide{min-width:48px;font-size:10px;font-family:'Fira Code',monospace}
.key.exact{background:var(--exact);color:#fff}
.key.close{background:var(--close);color:#111}
.key.present{background:var(--present);color:#fff}
.key.warm{background:var(--warm);color:#fff}
.key.absent{background:var(--absent);color:#555}
#msg{
  text-align:center;min-height:22px;font-size:13px;
  font-family:'Fira Code',monospace;margin-bottom:6px;
}
#msg.win{color:var(--exact)}
#msg.lose{color:#cc5566}
#stats{
  background:var(--card);border:1px solid var(--border);border-radius:10px;
  padding:10px;text-align:center;font-family:'Fira Code',monospace;
  font-size:11px;color:var(--muted);margin-bottom:8px;
}
#stats b{color:var(--text);font-size:13px}
@media(max-width:520px){
  .cell{width:36px;height:36px;font-size:16px}
  #duo-wrap{gap:10px}
  .key{min-width:24px;height:36px;font-size:12px}
  .key.wide{min-width:40px;font-size:9px}
  header h1{font-size:20px}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>DUO CHROMA WORDLE</h1>
    <div class="sub">two grids • one guess • 5 colors</div>
  </header>
  <div id="mode-bar">
    <button class="mode-btn active" data-len="5">5 letters</button>
    <button class="mode-btn" data-len="6">6 letters</button>
    <button class="mode-btn" data-len="7">7 letters</button>
  </div>
  <div id="legend">
    <div class="leg-item"><div class="leg-dot" style="background:var(--exact)"></div>exact</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--close)"></div>in word</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--present)"></div>±1 spot</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--warm)"></div>±3 abc</div>
    <div class="leg-item"><div class="leg-dot" style="background:var(--absent)"></div>absent</div>
  </div>
  <div id="duo-wrap">
    <div class="grid-col" id="col-left">
      <div class="grid-label" id="label-left">GRID 1</div>
      <div class="grid" id="grid-left"></div>
    </div>
    <div class="grid-col" id="col-right">
      <div class="grid-label" id="label-right">GRID 2</div>
      <div class="grid" id="grid-right"></div>
    </div>
  </div>
  <div id="msg"></div>
  <div id="keyboard"></div>
  <div id="stats">
    Played: <b id="st-played">0</b> &nbsp; Won: <b id="st-won">0</b> &nbsp; Streak: <b id="st-streak">0</b>

</div>

const LISTS={5:WORDS_5,6:WORDS_6,7:WORDS_7};

// ── State ──
let wordLen=5, maxGuesses=7, gameActive=false;
let targetL='', targetR='';
let guesses=[], currentInput='';
let solvedL=false, solvedR=false;
let stats={played:0,won:0,streak:0};

function loadStats(){try{const s=JSON.parse(localStorage.getItem('duo_chroma_stats'));if(s)stats=s}catch(e){}}
function saveStats(){localStorage.setItem('duo_chroma_stats',JSON.stringify(stats))}

// ── Color logic (same 5-color system as Chroma Wordle) ──
function getColors(guess,answer){
  const len=guess.length;
  const result=new Array(len).fill('absent');
  const ansArr=[...answer];
  const used=new Array(len).fill(false);
  const guessArr=[...guess];
  for(let i=0;i<len;i++){
    if(guessArr[i]===ansArr[i]){result[i]='exact';used[i]=true;guessArr[i]=null}
  }
  for(let i=0;i<len;i++){
    if(guessArr[i]===null) continue;
    let foundPresent=false;
    for(const offset of[-1,1]){
      const j=i+offset;
      if(j>=0&&j<len&&!used[j]&&ansArr[j]===guessArr[i]){
        result[i]='present';used[j]=true;guessArr[i]=null;foundPresent=true;break;
      }
    }
    if(foundPresent) continue;
    for(let j=0;j<len;j++){
      if(!used[j]&&ansArr[j]===guessArr[i]){
        result[i]='close';used[j]=true;guessArr[i]=null;break;
      }
    }
  }
  for(let i=0;i<len;i++){
    if(result[i]!=='absent') continue;
    const g=guess.charCodeAt(i), a=answer.charCodeAt(i);
    if(Math.abs(g-a)<=3&&g!==a) result[i]='warm';
  }
  return result;
}

// ── Build Grids ──
function buildGrid(id){
  const grid=document.getElementById(id);
  grid.style.gridTemplateColumns=`repeat(${wordLen},44px)`;
  grid.innerHTML='';
  for(let r=0;r<maxGuesses;r++){
    for(let c=0;c<wordLen;c++){
      const cell=document.createElement('div');
      cell.className='cell';
      cell.id=`${id}-${r}-${c}`;
      grid.appendChild(cell);
    }
  }
}

function updateGrid(id,target,solved){
  guesses.forEach((g,r)=>{
    const colors=getColors(g,target);
    const wasSolved=r>0&&getColors(guesses[r-1],target).every(c=>c==='exact');
    for(let c=0;c<wordLen;c++){
      const cell=document.getElementById(`${id}-${r}-${c}`);
      if(solved&&wasSolved){
        // After this grid was solved, dim subsequent rows
        cell.textContent=g[c];
        cell.className='cell absent dim';
      } else {
        cell.textContent=g[c];
        cell.className='cell '+colors[c];
      }
    }
  });
  // current input row
  const row=guesses.length;
  if(row<maxGuesses&&gameActive){
    for(let c=0;c<wordLen;c++){
      const cell=document.getElementById(`${id}-${row}-${c}`);
      cell.textContent=c<currentInput.length?currentInput[c]:'';
      cell.className='cell'+(c<currentInput.length?' filled':'');
    }
  }
  // clear remaining
  const startClear=gameActive?guesses.length+1:guesses.length;
  for(let r=startClear;r<maxGuesses;r++){
    for(let c=0;c<wordLen;c++){
      const cell=document.getElementById(`${id}-${r}-${c}`);
      if(cell){cell.textContent='';cell.className='cell'}
    }
  }
}

function updateBothGrids(){
  updateGrid('grid-left',targetL,solvedL);
  updateGrid('grid-right',targetR,solvedR);
  // Label states
  const ll=document.getElementById('label-left');
  const lr=document.getElementById('label-right');
  const cl=document.getElementById('col-left');
  const cr=document.getElementById('col-right');
  if(solvedL){ll.textContent='SOLVED';ll.classList.add('solved');cl.classList.add('solved')}
  else{ll.textContent='GRID 1';ll.classList.remove('solved');cl.classList.remove('solved')}
  if(solvedR){lr.textContent='SOLVED';lr.classList.add('solved');cr.classList.add('solved')}
  else{lr.textContent='GRID 2';lr.classList.remove('solved');cr.classList.remove('solved')}
}

// ── Keyboard ──
const KB_ROWS=[
  ['Q','W','E','R','T','Y','U','I','O','P'],
  ['A','S','D','F','G','H','J','K','L'],
  ['ENTER','Z','X','C','V','B','N','M','⌫'],
];
let keyStates={};

function buildKeyboard(){
  const kb=document.getElementById('keyboard');
  kb.innerHTML='';
  KB_ROWS.forEach(row=>{
    const rowDiv=document.createElement('div');
    rowDiv.className='kb-row';
    row.forEach(k=>{
      const btn=document.createElement('button');
      btn.className='key'+(k.length>1?' wide':'');
      const ks=keyStates[k];
      if(ks) btn.classList.add(ks);
      btn.textContent=k;
      btn.addEventListener('click',()=>handleKey(k));
      rowDiv.appendChild(btn);
    });
    kb.appendChild(rowDiv);
  });
}

function updateKeyStates(guess){
  const colorsL=getColors(guess,targetL);
  const colorsR=getColors(guess,targetR);
  const priority={exact:5,present:4,close:3,warm:2,absent:1};
  for(let i=0;i<guess.length;i++){
    const l=guess[i].toUpperCase();
    // Take the better color from either grid
    const bestColor=(priority[colorsL[i]]||0)>=(priority[colorsR[i]]||0)?colorsL[i]:colorsR[i];
    const cur=keyStates[l];
    if(!cur||(priority[bestColor]||0)>(priority[cur]||0)){
      keyStates[l]=bestColor;
    }
  }
  buildKeyboard();
}

// ── Input ──
function handleKey(k){
  if(!gameActive) return;
  if(k==='ENTER'){submitGuess();return}
  if(k==='⌫'){currentInput=currentInput.slice(0,-1);updateBothGrids();return}
  if(currentInput.length<wordLen&&k.length===1){
    currentInput+=k.toLowerCase();updateBothGrids();
  }
}

document.addEventListener('keydown',e=>{
  if(e.ctrlKey||e.metaKey||e.altKey) return;
  if(e.key==='Enter') handleKey('ENTER');
  else if(e.key==='Backspace') handleKey('⌫');
  else if(/^[a-zA-Z]$/.test(e.key)) handleKey(e.key.toUpperCase());
});

// ── Submit ──
function submitGuess(){
  const msg=document.getElementById('msg');
  if(currentInput.length!==wordLen){
    msg.textContent='Not enough letters';msg.className='';return;
  }
  const list=LISTS[wordLen];
  if(!list.includes(currentInput)){
    msg.textContent='Not in word list';msg.className='';return;
  }

  guesses.push(currentInput);
  updateKeyStates(currentInput);
  currentInput='';

  // Check solved states
  const lastGuess=guesses[guesses.length-1];
  if(!solvedL&&getColors(lastGuess,targetL).every(c=>c==='exact')) solvedL=true;
  if(!solvedR&&getColors(lastGuess,targetR).every(c=>c==='exact')) solvedR=true;

  updateBothGrids();

  if(solvedL&&solvedR){
    msg.textContent='🎉 Both solved in '+guesses.length+'/'+maxGuesses+'!';
    msg.className='win';
    gameActive=false;
    stats.played++;stats.won++;stats.streak++;
    saveStats();renderStats();
    return;
  }
  if(guesses.length>=maxGuesses){
    const reveal=[];
    if(!solvedL) reveal.push(targetL.toUpperCase());
    if(!solvedR) reveal.push(targetR.toUpperCase());
    msg.textContent='Words: '+reveal.join(' / ');
    msg.className='lose';
    gameActive=false;
    stats.played++;stats.streak=0;
    saveStats();renderStats();
    return;
  }
  msg.textContent='';msg.className='';
}

// ── Mode switching ──
document.querySelectorAll('.mode-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    wordLen=parseInt(btn.dataset.len);
    maxGuesses=wordLen+2; // extra guess for duo difficulty
    newGame();
  });
});

// ── Game ──
function newGame(){
  const list=LISTS[wordLen];
  // Pick two different words
  targetL=list[Math.floor(Math.random()*list.length)];
  do{ targetR=list[Math.floor(Math.random()*list.length)] }while(targetR===targetL);
  guesses=[];currentInput='';gameActive=true;keyStates={};
  solvedL=false;solvedR=false;
  document.getElementById('msg').textContent='';
  document.getElementById('msg').className='';
  buildGrid('grid-left');buildGrid('grid-right');
  updateBothGrids();buildKeyboard();renderStats();
}

function renderStats(){
  loadStats();
  document.getElementById('st-played').textContent=stats.played;
  document.getElementById('st-won').textContent=stats.won;
  document.getElementById('st-streak').textContent=stats.streak;
}

newGame();
</script>
