<style>
  :root {
    --bg-1:#0a1820;
    --bg-2:#06121a;
    --honey:#ffd14a;
    --honey-deep:#c98a1f;
    --pink:#ff5ea1;
    --cyan:#5ec2ff;
    --lime:#9ef07a;
    --magenta:#d63ad6;
    --violet:#a64dff;
    --paper:#fff7d9;
    --paper-2:#ffe69e;
    --ink:#0a1018;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; }
  html { font-size: 100%; }
  body {
    min-height: 100vh;
    color: var(--paper);
    font-family: 'Fraunces', serif;
    background:
      radial-gradient(circle at 14% 18%, rgba(166,77,255,0.18), transparent 55%),
      radial-gradient(circle at 84% 80%, rgba(94,194,255,0.18), transparent 60%),
      linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
    overflow-x: hidden;
  }
  .skip { position:absolute; left:-1000px; }
  .skip:focus-visible {
    left: 0.5rem; top: 0.5rem;
    background: var(--paper); color: var(--ink);
    padding:0.5rem 0.8rem; z-index:100; text-decoration:none;
  }
  main {
    max-width: 1080px;
    margin: 0 auto;
    padding: 0.7rem 0.9rem 1.4rem 0.9rem;
  }
  header {
    text-align: center;
    padding: 0.5rem 0 0.5rem 0;
  }
  .eyebrow {
    font-family:'JetBrains Mono', monospace;
    font-size: 0.74rem;
    letter-spacing: 0.32em;
    color: var(--honey);
    text-transform: uppercase;
  }
  h1 {
    font-family: 'Bungee', display;
    font-size: clamp(2.4rem, 8vw, 4.4rem);
    line-height: 0.95;
    margin: 0.1rem 0 0 0;
    letter-spacing: 0.02em;
    background: linear-gradient(120deg, var(--pink) 0%, var(--honey) 50%, var(--cyan) 100%);
    -webkit-background-clip: text; background-clip: text;
    -webkit-text-fill-color: transparent;
    text-shadow:
      0 0 24px rgba(255,209,74,0.18),
      4px 4px 0 rgba(0,0,0,0.45);
  }
  .tagline {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 1.05rem;
    color: var(--paper);
    opacity: 0.78;
    margin-top: 0.4rem;
  }
  .hud {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.4rem;
    margin: 0.6rem 0 0.5rem 0;
  }
  .stat {
    background: rgba(8,16,24,0.86);
    border: 2px solid var(--honey);
    border-radius: 10px;
    padding: 0.4rem 0.6rem;
    text-align: center;
    box-shadow: inset 0 0 24px rgba(255,209,74,0.10);
  }
  .stat .lab {
    font-family:'JetBrains Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--paper-2);
    opacity: 0.85;
  }
  .stat .val {
    font-family: 'Bungee', display;
    font-size: 1.3rem;
    line-height: 1.05;
    color: var(--honey);
  }
  .stat.nectar .val { color: var(--honey); }
  .stat.time .val { color: var(--cyan); }
  .stat.bloom .val { color: var(--pink); }
  .stat.buzz .val { color: var(--lime); }
  .stage {
    margin-top: 0.5rem;
    border: 4px solid var(--honey);
    border-radius: 18px;
    box-shadow:
      0 0 60px rgba(255,209,74,0.18),
      0 0 0 2px rgba(255,255,255,0.06) inset;
    background: #000;
    overflow: hidden;
    position: relative;
  }
  canvas#stage {
    display: block;
    width: 100%;
    aspect-ratio: 4 / 3;
  }
  .controls {
    margin-top: 0.7rem;
    display:flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center;
  }
  .btn {
    cursor: pointer;
    font-family: 'Bungee', display;
    font-size: 0.85rem;
    background: var(--paper);
    color: var(--ink);
    border: 3px solid var(--ink);
    padding: 0.55rem 0.9rem;
    border-radius: 12px;
    box-shadow: 3px 3px 0 var(--ink);
    transition: transform 80ms ease, box-shadow 80ms ease;
    min-height: 2.75rem;
    letter-spacing: 0.04em;
  }
  .btn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--ink); }
  .btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--ink); }
  .btn:focus-visible { outline: 3px solid var(--honey); outline-offset: 2px; }
  .help {
    margin-top: 0.5rem;
    text-align: center;
    font-family:'JetBrains Mono', monospace;
    font-size: 0.78rem;
    color: var(--paper);
    opacity: 0.7;
  }
  .help kbd {
    background: rgba(255,209,74,0.14);
    border: 1px solid var(--honey);
    padding: 0.05rem 0.4rem;
    border-radius: 4px;
    color: var(--honey);
  }
  .overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.78);
    display:flex; align-items:center; justify-content:center;
    text-align: center;
    padding: 1rem;
    z-index: 5;
  }
  .overlay[hidden] { display:none !important; }
  .overlay-inner {
    background: var(--paper);
    color: var(--ink);
    border: 4px solid var(--ink);
    border-radius: 18px;
    padding: 1.2rem 1.4rem;
    max-width: 22rem;
    box-shadow: 8px 8px 0 var(--ink);
  }
  .overlay-inner h2 {
    font-family: 'Bungee', display;
    font-size: 1.7rem;
    margin: 0 0 0.5rem 0;
    color: var(--honey-deep);
  }
  .overlay-inner.win h2 { color: #3e9b4f; }
  .overlay-inner.lose h2 { color: #c8312a; }
  .overlay-inner .body {
    font-family: 'Fraunces', serif;
    font-style: italic;
    margin-bottom: 0.7rem;
  }
  .overlay-inner .stats {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.86rem;
    margin-bottom: 0.7rem;
  }
  /* Mobile pad: a single big "BUZZ" button + virtual joystick area
     handled in canvas via touch events. Drag anywhere to fly. */
  @media (pointer: coarse), (max-width: 760px) {
    .help { display: none; }
  }
  @media (prefers-reduced-motion: reduce) {
    canvas#stage { transition: none; }
  }
</style>
</head>
<body>
<a class="skip" href="#stage">skip to game</a>
<main>
  <header>
    <div class="eyebrow">★ macro lens · pollen run ★</div>
    <h1>POLLEN BEE QUEST</h1>
    <div class="tagline">drift through six neon blooms · hum the right note · fill the jar</div>
  </header>

  <section class="hud" role="status" aria-live="polite">
    <div class="stat nectar"><div class="lab">JAR</div><div class="val" id="hudJar">0 / 100</div></div>
    <div class="stat bloom"><div class="lab">BLOOM</div><div class="val" id="hudBloom">100%</div></div>
    <div class="stat buzz"><div class="lab">BUZZ</div><div class="val" id="hudBuzz">OFF</div></div>
    <div class="stat time"><div class="lab">TIME</div><div class="val" id="hudTime">0s</div></div>
  </section>

  <div class="stage">
    <canvas id="stage" role="application" aria-label="A microscopic top-down view of a tiny bee on a field of glowing neon flowers. Use WASD or arrow keys to fly; hold Space to buzz harder and drink nectar faster. Drag on touch devices."></canvas>
    <div class="overlay" id="overlay" hidden>
      <div class="overlay-inner" id="overlayInner">
        <h2 id="ovTitle">·</h2>
        <div class="body" id="ovBody">·</div>
        <div class="stats" id="ovStats">·</div>
        <button class="btn" id="ovBtn" type="button">play</button>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="muteBtn" type="button" aria-pressed="false">♪ on</button>
    <button class="btn" id="resetBtn" type="button">↺ new bloom</button>
  </div>
  <div class="help">
    <kbd>WASD</kbd> · fly · <kbd>SPACE</kbd> · buzz · <kbd>R</kbd> · reseed flowers
  </div>
</main>

<script>
'use strict';
// ──────────────────────────────────────────────────────────────
// POLLEN BEE QUEST — macro-lens bee on a field of neon flowers.
// Fly the bee with WASD/arrows or pointer drag. Hover the pistil
// of a flower to drink its nectar; hold Space to buzz harder and
// drink ~2× faster but burn a bit of stamina. Fill the hive jar
// (100 nectar) before the bloom wilts to win.
// ──────────────────────────────────────────────────────────────

const cv = document.getElementById('stage');
const ctx = cv.getContext('2d');
let W = 960, H = 720;
function resizeCanvas(){
  const r = cv.getBoundingClientRect();
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  cv.width  = Math.round(r.width * dpr);
  cv.height = Math.round(r.height * dpr);
  W = r.width; H = r.height;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resizeCanvas);

// ── FLOWER PALETTES ───────────────────────────────────────────
const FLOWERS = [
  { name: 'pink',    petal: '#ff5ea1', glow: '#ff8fb9', deep: '#a02868', center: '#ffd14a', pistil: '#7a3a14' },
  { name: 'cyan',    petal: '#5ec2ff', glow: '#9ee0ff', deep: '#1f5f8a', center: '#ffd14a', pistil: '#7a3a14' },
  { name: 'lime',    petal: '#9ef07a', glow: '#cdf7b5', deep: '#3e7a2a', center: '#ffd14a', pistil: '#5a3a14' },
  { name: 'magenta', petal: '#d63ad6', glow: '#f08af0', deep: '#7a1f7a', center: '#ffd14a', pistil: '#5a1f5a' },
  { name: 'violet',  petal: '#a64dff', glow: '#cc8fff', deep: '#5a1f9a', center: '#ffd14a', pistil: '#5a1f9a' },
  { name: 'amber',   petal: '#ffb04a', glow: '#ffd28f', deep: '#a87020', center: '#ffe69e', pistil: '#7a3a14' },
];

// ── STATE ─────────────────────────────────────────────────────
const state = {
  ended: false,
  endedWin: false,
  muted: false,
  jar: 0,
  jarMax: 100,
  bloom: 1.0,         // 1 → 0; world-wilt timer
  bloomDuration: 70,  // seconds before bloom is fully wilted
  elapsed: 0,
  bee: null,
  flowers: [],
  pollens: [],         // floating pollen particles
  trails: [],          // trail blobs behind the bee
  ripples: [],         // collection ripples
  buzz: 0,             // 0–1 build-up of buzz intensity
  buzzActive: false,
  pointerDown: false,
  pointer: { x: 0, y: 0 },
  cameraShake: 0,
};

const keys = new Set();

// ── ENTITIES ──────────────────────────────────────────────────
function spawnBee(){
  state.bee = {
    x: W / 2,
    y: H / 2,
    vx: 0, vy: 0,
    r: 12,
    heading: 0,
    wingT: 0,
  };
}

function spawnFlowers(){
  state.flowers = [];
  // 6 flowers in a loose hex grid, randomly jittered + colored
  const cells = [
    { x: 0.18, y: 0.30 }, { x: 0.50, y: 0.22 }, { x: 0.82, y: 0.30 },
    { x: 0.20, y: 0.74 }, { x: 0.52, y: 0.82 }, { x: 0.84, y: 0.72 },
  ];
  const order = [...Array(FLOWERS.length).keys()].sort(() => Math.random() - 0.5);
  cells.forEach((c, i) => {
    const def = FLOWERS[order[i % FLOWERS.length]];
    state.flowers.push({
      def,
      x: c.x * W + (Math.random() * 40 - 20),
      y: c.y * H + (Math.random() * 30 - 15),
      r: 90 + Math.random() * 30,         // big macro flower
      pistilR: 16 + Math.random() * 4,
      petals: 5 + Math.floor(Math.random() * 3),
      petalPhase: Math.random() * Math.PI * 2,
      sway: 0.4 + Math.random() * 0.3,
      nectar: 1.0,                        // 1.0 → 0
      wilt: 0,                            // 0 normal, →1 after harvested
      respawnT: 0,
      bobT: Math.random() * Math.PI * 2,
    });
  });
  // an initial pollen field
  state.pollens = [];
  for (let i = 0; i < 60; i++){
    state.pollens.push(spawnPollen(Math.random() * W, Math.random() * H));
  }
}

function spawnPollen(x, y){
  return {
    x, y,
    vx: (Math.random() - 0.5) * 18,
    vy: (Math.random() - 0.5) * 18 - 6,
    life: 6 + Math.random() * 6,
    max: 12,
    r: 1 + Math.random() * 1.6,
    color: ['#ffd14a', '#ffe69e', '#fff7d9', '#ff8fb9'][Math.floor(Math.random() * 4)],
  };
}

// ── INPUT ─────────────────────────────────────────────────────
window.addEventListener('keydown', (ev) => {
  const k = ev.key.toLowerCase();
  keys.add(k);
  if (ev.repeat) return;
  if (k === ' ') { state.buzzActive = true; ensureAudio(); ev.preventDefault(); }
  if (k === 'r') reset();
  if (k === 'm') toggleMute();
});
window.addEventListener('keyup', (ev) => {
  const k = ev.key.toLowerCase();
  keys.delete(k);
  if (k === ' ') state.buzzActive = false;
});

// pointer / touch — drag anywhere to fly toward the cursor
cv.addEventListener('pointerdown', (ev) => {
  ensureAudio();
  state.pointerDown = true;
  state.buzzActive = true;
  updatePointer(ev);
});
cv.addEventListener('pointermove', (ev) => {
  if (!state.pointerDown) return;
  updatePointer(ev);
});
cv.addEventListener('pointerup',     () => { state.pointerDown = false; state.buzzActive = false; });
cv.addEventListener('pointercancel', () => { state.pointerDown = false; state.buzzActive = false; });
cv.addEventListener('pointerleave',  () => { state.pointerDown = false; state.buzzActive = false; });
function updatePointer(ev){
  const r = cv.getBoundingClientRect();
  state.pointer.x = (ev.clientX - r.left) * (W / r.width);
  state.pointer.y = (ev.clientY - r.top)  * (H / r.height);
}

// ── AUDIO ─────────────────────────────────────────────────────
let actx = null;
let buzzNode = null, buzzGain = null, buzzLfo = null, buzzLfoGain = null;
function ensureAudio(){
  if (state.muted) return null;
  if (!actx){
    try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e){ actx = null; }
  }
  return actx;
}
function blip(freq, dur, type, vol){
  const a = ensureAudio(); if (!a) return;
  const o = a.createOscillator(), g = a.createGain();
  o.type = type || 'square'; o.frequency.value = freq;
  g.gain.value = vol == null ? 0.05 : vol;
  g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + (dur || 0.1));
  o.connect(g).connect(a.destination); o.start(); o.stop(a.currentTime + (dur || 0.1) + 0.02);
}
function startBuzz(){
  const a = ensureAudio(); if (!a) return;
  if (buzzNode) return;
  buzzNode = a.createOscillator();
  buzzNode.type = 'sawtooth';
  buzzNode.frequency.value = 220;
  buzzGain = a.createGain();
  buzzGain.gain.value = 0;
  // tremolo LFO for that "wing flap" sound
  buzzLfo = a.createOscillator();
  buzzLfo.type = 'sine';
  buzzLfo.frequency.value = 28;
  buzzLfoGain = a.createGain();
  buzzLfoGain.gain.value = 0.018;
  buzzLfo.connect(buzzLfoGain).connect(buzzGain.gain);
  buzzNode.connect(buzzGain).connect(a.destination);
  buzzNode.start(); buzzLfo.start();
}
function setBuzz(intensity){
  if (!buzzGain || !buzzNode) { startBuzz(); }
  if (!buzzGain) return;
  const a = ensureAudio(); if (!a) return;
  const target = state.muted ? 0 : 0.012 + intensity * 0.05;
  buzzGain.gain.linearRampToValueAtTime(target, a.currentTime + 0.05);
  buzzNode.frequency.linearRampToValueAtTime(180 + intensity * 220, a.currentTime + 0.05);
  buzzLfo.frequency.linearRampToValueAtTime(20 + intensity * 32, a.currentTime + 0.05);
}
function sfxSlurp(intensity){
  blip(680 + intensity * 120, 0.10, 'triangle', 0.06);
  setTimeout(() => blip(880 + intensity * 200, 0.08, 'triangle', 0.05), 60);
}
function sfxJarTick(){ blip(1200, 0.04, 'square', 0.03); }
function sfxWilt(){ blip(140, 0.4, 'sawtooth', 0.05); }
function sfxWin(){
  for (const f of [523, 659, 784, 1047, 1318]) setTimeout(() => blip(f, 0.18, 'triangle', 0.07), (f - 523) * 0.6);
}
function sfxLose(){
  for (const f of [330, 247, 196, 164]) setTimeout(() => blip(f, 0.5, 'sawtooth', 0.06), (330 - f) * 1.2);
}

// ── HUD ───────────────────────────────────────────────────────
const hudJar = document.getElementById('hudJar');
const hudBloom = document.getElementById('hudBloom');
const hudBuzz = document.getElementById('hudBuzz');
const hudTime = document.getElementById('hudTime');
function refreshHud(){
  hudJar.textContent = Math.floor(state.jar) + ' / ' + state.jarMax;
  hudBloom.textContent = Math.max(0, Math.round(state.bloom * 100)) + '%';
  hudBuzz.textContent = state.buzzActive ? 'ON · ' + Math.round(state.buzz * 100) + '%' : 'OFF';
  hudTime.textContent = Math.floor(state.elapsed) + 's';
}

// ── TICK ──────────────────────────────────────────────────────
const FLY_ACCEL_KEY = 1100;
const FLY_ACCEL_PTR = 900;
const FLY_DRAG = 4.5;
const MAX_SPEED = 380;

function tickBee(dt){
  const b = state.bee;
  let ax = 0, ay = 0;
  // keyboard
  if (keys.has('arrowleft')  || keys.has('a')) ax -= 1;
  if (keys.has('arrowright') || keys.has('d')) ax += 1;
  if (keys.has('arrowup')    || keys.has('w')) ay -= 1;
  if (keys.has('arrowdown')  || keys.has('s')) ay += 1;
  if (ax || ay){
    const len = Math.hypot(ax, ay);
    ax /= len; ay /= len;
    b.vx += ax * FLY_ACCEL_KEY * dt;
    b.vy += ay * FLY_ACCEL_KEY * dt;
  }
  // pointer
  if (state.pointerDown){
    const dx = state.pointer.x - b.x;
    const dy = state.pointer.y - b.y;
    const d = Math.hypot(dx, dy) + 0.1;
    if (d > 12){
      b.vx += (dx / d) * FLY_ACCEL_PTR * dt;
      b.vy += (dy / d) * FLY_ACCEL_PTR * dt;
    }
  }
  // drag
  b.vx *= Math.pow(0.5, FLY_DRAG * dt);
  b.vy *= Math.pow(0.5, FLY_DRAG * dt);
  // clamp
  const sp = Math.hypot(b.vx, b.vy);
  if (sp > MAX_SPEED){ b.vx *= MAX_SPEED / sp; b.vy *= MAX_SPEED / sp; }
  // integrate
  b.x += b.vx * dt;
  b.y += b.vy * dt;
  // bounds
  if (b.x < b.r){ b.x = b.r; b.vx *= -0.4; }
  if (b.x > W - b.r){ b.x = W - b.r; b.vx *= -0.4; }
  if (b.y < b.r){ b.y = b.r; b.vy *= -0.4; }
  if (b.y > H - b.r){ b.y = H - b.r; b.vy *= -0.4; }
  // facing
  if (sp > 8) b.heading = Math.atan2(b.vy, b.vx);
  // wing flap rate scales with buzz
  b.wingT += dt * (38 + state.buzz * 60);
  // buzz build-up
  const target = state.buzzActive ? 1 : 0;
  state.buzz += (target - state.buzz) * Math.min(1, dt * 6);
  // continuous-tone buzz audio
  if (state.buzz > 0.02 || state.buzzActive){
    setBuzz(state.buzz);
  } else {
    setBuzz(0);
  }
}

function tickFlowers(dt){
  const b = state.bee;
  let bestPistilDist = Infinity;
  let activeFlower = null;
  for (const f of state.flowers){
    f.bobT += dt * 0.8;
    if (f.wilt < 1){
      // check pistil hover
      const dx = b.x - f.x, dy = b.y - f.y;
      const d = Math.hypot(dx, dy);
      if (d < f.pistilR + 14 && f.nectar > 0){
        // drink rate scales with buzz (faster when humming) + pistil proximity
        const proximity = 1 - Math.min(1, d / (f.pistilR + 14));
        const rate = (8 + state.buzz * 18) * proximity * dt;
        const drank = Math.min(rate, f.nectar);
        f.nectar -= drank;
        state.jar = Math.min(state.jarMax, state.jar + drank);
        // bloom adds; wilt slows when actively harvesting
        if (drank > 0){
          spawnNectarParticle(f.x, f.y, f.def);
          state.cameraShake = Math.max(state.cameraShake, 1.4);
          if (Math.random() < 0.18) sfxJarTick();
        }
        if (d < bestPistilDist){ bestPistilDist = d; activeFlower = f; }
      }
      // emit gentle ambient pollen from flower center
      if (Math.random() < 0.04 + state.buzz * 0.06){
        state.pollens.push(spawnPollen(f.x + (Math.random() - 0.5) * 30, f.y + (Math.random() - 0.5) * 30));
      }
      // empty flower → wilts (over 4s)
      if (f.nectar <= 0){
        f.wilt = Math.min(1, f.wilt + dt / 4);
        if (f.wilt >= 1){
          // queue respawn
          f.respawnT = 6 + Math.random() * 4;
          sfxWilt();
          spawnRipple(f.x, f.y, '#5a3a14');
        }
      }
    } else {
      // wilted; tick respawn
      f.respawnT -= dt;
      if (f.respawnT <= 0){
        // respawn as a fresh flower with a new color
        const def = FLOWERS[Math.floor(Math.random() * FLOWERS.length)];
        f.def = def;
        f.nectar = 1.0;
        f.wilt = 0;
        f.petals = 5 + Math.floor(Math.random() * 3);
        f.petalPhase = Math.random() * Math.PI * 2;
        spawnRipple(f.x, f.y, def.glow);
      }
    }
  }
}

function spawnNectarParticle(fx, fy, def){
  state.pollens.push({
    x: fx + (Math.random() - 0.5) * 8,
    y: fy + (Math.random() - 0.5) * 8,
    vx: (state.bee.x - fx) * 1.2 / 60 + (Math.random() - 0.5) * 30,
    vy: (state.bee.y - fy) * 1.2 / 60 - 30,
    life: 1.2, max: 1.2,
    r: 2.4, color: def.center || '#ffd14a',
    homing: true,
  });
}
function spawnRipple(x, y, color){
  state.ripples.push({ x, y, life: 0.9, max: 0.9, color });
}

function tickPollens(dt){
  const out = [];
  for (const p of state.pollens){
    p.life -= dt;
    if (p.life <= 0) continue;
    if (p.homing && state.bee){
      // gentle tug toward the bee (collection feedback)
      const dx = state.bee.x - p.x, dy = state.bee.y - p.y;
      const d = Math.hypot(dx, dy) + 0.1;
      p.vx += (dx / d) * 220 * dt;
      p.vy += (dy / d) * 220 * dt;
    }
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vx *= 0.985; p.vy *= 0.985;
    if (!p.homing) p.vy += 16 * dt;
    out.push(p);
  }
  state.pollens = out;
  // ripples
  state.ripples = state.ripples.filter(r => (r.life -= dt) > 0);
}

function tickWorld(dt){
  state.elapsed += dt;
  state.bloom = Math.max(0, state.bloom - dt / state.bloomDuration);
  state.cameraShake = Math.max(0, state.cameraShake - dt * 5);
  // win / lose checks
  if (state.jar >= state.jarMax){
    endRun(true);
  } else if (state.bloom <= 0){
    endRun(false);
  }
}

// ── RENDER ────────────────────────────────────────────────────
function render(){
  // background — soft violet/teal radial
  const grad = ctx.createRadialGradient(W * 0.35, H * 0.4, 50, W * 0.5, H * 0.5, Math.max(W, H) * 0.7);
  grad.addColorStop(0, '#0e2238');
  grad.addColorStop(0.5, '#0a1820');
  grad.addColorStop(1, '#04080d');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);
  // soft starfield (out-of-focus dust particles)
  ctx.globalAlpha = 0.45;
  for (let i = 0; i < 60; i++){
    const x = ((i * 73 + 17) % 1000) / 1000 * W;
    const y = ((i * 41 + 5)  % 1000) / 1000 * H;
    ctx.fillStyle = ['#ffd14a', '#ff5ea1', '#5ec2ff'][i % 3];
    ctx.beginPath(); ctx.arc(x, y, 0.6 + (i % 3) * 0.6, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;

  // shake
  ctx.save();
  if (state.cameraShake > 0){
    const s = state.cameraShake;
    ctx.translate((Math.random() - 0.5) * s, (Math.random() - 0.5) * s);
  }
  // out-of-focus halo blobs (depth-of-field flavor)
  for (const f of state.flowers){
    const alpha = (1 - f.wilt) * 0.32;
    if (alpha <= 0) continue;
    ctx.globalCompositeOperation = 'lighter';
    const haloGrad = ctx.createRadialGradient(f.x, f.y, 4, f.x, f.y, f.r * 1.6);
    haloGrad.addColorStop(0, withAlpha(f.def.glow, alpha));
    haloGrad.addColorStop(1, withAlpha(f.def.glow, 0));
    ctx.fillStyle = haloGrad;
    ctx.beginPath(); ctx.arc(f.x, f.y, f.r * 1.6, 0, Math.PI*2); ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
  }
  // flowers
  for (const f of state.flowers) drawFlower(f);
  // ripples
  for (const r of state.ripples){
    const t = 1 - r.life / r.max;
    ctx.strokeStyle = withAlpha(r.color, r.life / r.max);
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(r.x, r.y, t * 80, 0, Math.PI*2); ctx.stroke();
  }
  // pollen particles (additive)
  ctx.globalCompositeOperation = 'lighter';
  for (const p of state.pollens){
    const a = Math.min(1, p.life / p.max);
    ctx.fillStyle = withAlpha(p.color, a);
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalCompositeOperation = 'source-over';
  // bee
  drawBee();
  ctx.restore();

  // microscope vignette
  const vGrad = ctx.createRadialGradient(W/2, H/2, Math.min(W, H) * 0.35, W/2, H/2, Math.max(W, H) * 0.7);
  vGrad.addColorStop(0, 'rgba(0,0,0,0)');
  vGrad.addColorStop(1, 'rgba(0,0,0,0.6)');
  ctx.fillStyle = vGrad; ctx.fillRect(0, 0, W, H);

  // bloom-low warning tint
  if (state.bloom < 0.25 && !state.ended){
    const t = (state.bloom < 0.1) ? 0.34 : 0.18;
    ctx.fillStyle = 'rgba(160,40,24,' + t + ')';
    ctx.fillRect(0, 0, W, H);
  }
}

function drawFlower(f){
  const wiltK = 1 - f.wilt;
  if (wiltK <= 0) return;
  ctx.save();
  ctx.translate(f.x, f.y);
  ctx.rotate(Math.sin(f.bobT) * 0.04);
  // ─── PETALS — angular crystalline shards, not smooth ovals ─────
  const petalLen = f.r * 0.92 * (0.7 + 0.3 * wiltK);
  const petalWid = f.r * 0.50 * (0.7 + 0.3 * wiltK);
  for (let i = 0; i < f.petals; i++){
    const a = (i / f.petals) * Math.PI * 2 + f.petalPhase;
    ctx.save();
    ctx.rotate(a);
    // angular petal shape — diamond / leaf with notched edge,
    // reads as crystalline pollen-grain plate under a microscope
    const pg = ctx.createRadialGradient(0, -petalLen * 0.4, petalLen * 0.05,
                                         0, -petalLen * 0.4, petalLen * 0.9);
    pg.addColorStop(0,    withAlpha(f.def.glow,  wiltK * 0.95));
    pg.addColorStop(0.55, withAlpha(f.def.petal, wiltK * 0.85));
    pg.addColorStop(1,    withAlpha(f.def.deep,  wiltK * 0.5));
    ctx.fillStyle = pg;
    ctx.beginPath();
    ctx.moveTo(0, -petalLen * 1.1);                    // tip
    ctx.lineTo(petalWid * 0.6, -petalLen * 0.85);      // upper-right shoulder
    ctx.lineTo(petalWid * 1.0, -petalLen * 0.45);      // mid-right (widest)
    ctx.lineTo(petalWid * 0.5, -petalLen * 0.15);      // lower-right notch
    ctx.lineTo(petalWid * 0.15, 0);                    // base-right
    ctx.lineTo(-petalWid * 0.15, 0);                   // base-left
    ctx.lineTo(-petalWid * 0.5, -petalLen * 0.15);     // lower-left notch
    ctx.lineTo(-petalWid * 1.0, -petalLen * 0.45);     // mid-left
    ctx.lineTo(-petalWid * 0.6, -petalLen * 0.85);     // upper-left shoulder
    ctx.closePath();
    ctx.fill();
    // crystalline highlight stripe down the center
    ctx.strokeStyle = withAlpha('#ffffff', wiltK * 0.35);
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, -petalLen * 0.1);
    ctx.lineTo(0, -petalLen * 1.05);
    ctx.stroke();
    // angular crossveins (3 per petal — gives a cell-wall feel)
    ctx.strokeStyle = withAlpha(f.def.deep, wiltK * 0.55);
    ctx.lineWidth = 0.8;
    for (let v = 1; v <= 3; v++){
      const vy = -petalLen * (v / 4 + 0.1);
      const vw = petalWid * (1 - v / 5);
      ctx.beginPath();
      ctx.moveTo(-vw, vy); ctx.lineTo(0, vy - 2); ctx.lineTo(vw, vy);
      ctx.stroke();
    }
    // micro-bristles along the petal edge — alien micro-hairs
    ctx.strokeStyle = withAlpha(f.def.glow, wiltK * 0.7);
    ctx.lineWidth = 0.6;
    for (let h = 0; h < 5; h++){
      const ht = (h + 1) / 6;
      const hy = -petalLen * (1 - ht * 0.85);
      const hxL = -petalWid * (0.55 + ht * 0.4);
      const hxR =  petalWid * (0.55 + ht * 0.4);
      ctx.beginPath();
      ctx.moveTo(hxL, hy); ctx.lineTo(hxL - 4, hy + 1);
      ctx.moveTo(hxR, hy); ctx.lineTo(hxR + 4, hy + 1);
      ctx.stroke();
    }
    ctx.restore();
  }
  // ─── INNER POLLEN-GRAIN SPIKES around pistil ──────────────────
  // (electron-microscope-style radial protrusions — spiky pollen
  // grain texture; the visual "tell" that this is alien biology)
  const spikeR1 = f.pistilR + 6;
  const spikeR2 = f.pistilR + 16;
  ctx.fillStyle = withAlpha(f.def.glow, wiltK * 0.85);
  ctx.beginPath();
  const SPIKES = 18;
  for (let s = 0; s < SPIKES; s++){
    const a0 = (s / SPIKES) * Math.PI * 2 + f.bobT * 0.05;
    const a1 = ((s + 0.5) / SPIKES) * Math.PI * 2 + f.bobT * 0.05;
    const a2 = ((s + 1)   / SPIKES) * Math.PI * 2 + f.bobT * 0.05;
    if (s === 0){
      ctx.moveTo(Math.cos(a0) * spikeR1, Math.sin(a0) * spikeR1);
    }
    ctx.lineTo(Math.cos(a1) * spikeR2, Math.sin(a1) * spikeR2);
    ctx.lineTo(Math.cos(a2) * spikeR1, Math.sin(a2) * spikeR1);
  }
  ctx.closePath();
  ctx.fill();
  // spike outline for definition
  ctx.strokeStyle = withAlpha(f.def.deep, wiltK * 0.8);
  ctx.lineWidth = 0.8;
  ctx.stroke();
  // ─── PISTIL DISC ─────────────────────────────────────────────
  ctx.fillStyle = withAlpha(f.def.pistil, wiltK);
  ctx.beginPath(); ctx.arc(0, 0, f.pistilR + 5, 0, Math.PI*2); ctx.fill();
  // hexagonal cell-pattern overlay on the pistil disc
  ctx.strokeStyle = withAlpha(f.def.deep, wiltK * 0.55);
  ctx.lineWidth = 0.6;
  for (let h = 0; h < 6; h++){
    const a = (h / 6) * Math.PI * 2 + Math.PI / 6;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * (f.pistilR + 4), Math.sin(a) * (f.pistilR + 4));
    ctx.lineTo(Math.cos(a + Math.PI / 3) * (f.pistilR + 4), Math.sin(a + Math.PI / 3) * (f.pistilR + 4));
    ctx.stroke();
  }
  // center anther (radial gradient nectar pool)
  const cg = ctx.createRadialGradient(0, 0, 1, 0, 0, f.pistilR);
  cg.addColorStop(0, withAlpha('#fff7d9', wiltK));
  cg.addColorStop(0.6, withAlpha(f.def.center, wiltK));
  cg.addColorStop(1, withAlpha(f.def.pistil, wiltK));
  ctx.fillStyle = cg;
  ctx.beginPath(); ctx.arc(0, 0, f.pistilR, 0, Math.PI*2); ctx.fill();
  // micro-pollen grains scattered on the center
  for (let i = 0; i < 9; i++){
    const a = (i / 9) * Math.PI * 2 + f.bobT * 0.4;
    const rr = f.pistilR * (0.4 + ((i * 7) % 5) * 0.08);
    const sx = Math.cos(a) * rr;
    const sy = Math.sin(a) * rr;
    ctx.fillStyle = withAlpha('#ffd14a', wiltK);
    ctx.beginPath(); ctx.arc(sx, sy, 1.6, 0, Math.PI*2); ctx.fill();
    // each grain has a tiny rim
    ctx.strokeStyle = withAlpha(f.def.deep, wiltK * 0.5);
    ctx.lineWidth = 0.4;
    ctx.stroke();
  }
  // nectar ring (drains as harvested)
  ctx.strokeStyle = withAlpha('#ffd14a', wiltK * 0.85);
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(0, 0, f.pistilR + 2, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * f.nectar);
  ctx.stroke();
  ctx.restore();
}

function drawBee(){
  const b = state.bee;
  ctx.save();
  ctx.translate(b.x, b.y);
  // shadow on the petal layer
  ctx.fillStyle = 'rgba(0,0,0,0.30)';
  ctx.beginPath(); ctx.ellipse(0, b.r + 6, b.r * 0.9, 3, 0, 0, Math.PI*2); ctx.fill();
  // wings (additive, transparent ovals flapping)
  ctx.globalCompositeOperation = 'lighter';
  const flap = Math.abs(Math.sin(b.wingT)) * (0.6 + state.buzz * 0.5);
  for (const side of [-1, 1]){
    ctx.save();
    ctx.translate(side * 6, -b.r * 0.4);
    ctx.scale(side * (0.7 + flap * 0.3), 1);
    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    ctx.beginPath();
    ctx.ellipse(side * 6, -2, 11, 6, 0, 0, Math.PI*2);
    ctx.fill();
    // shimmer line
    ctx.fillStyle = 'rgba(94,194,255,0.45)';
    ctx.beginPath();
    ctx.ellipse(side * 6, -2, 8, 3, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
  ctx.globalCompositeOperation = 'source-over';
  // body — yellow with black stripes
  ctx.rotate(b.heading);
  // abdomen (rear)
  ctx.fillStyle = '#ffd14a';
  ctx.beginPath();
  ctx.ellipse(-b.r * 0.4, 0, b.r * 0.95, b.r * 0.8, 0, 0, Math.PI*2);
  ctx.fill();
  // stripes
  ctx.fillStyle = '#1a1108';
  for (let i = 0; i < 3; i++){
    ctx.fillRect(-b.r * 0.6 + i * 5, -b.r * 0.7, 2, b.r * 1.4);
  }
  // head
  ctx.fillStyle = '#1f1408';
  ctx.beginPath(); ctx.arc(b.r * 0.5, 0, b.r * 0.55, 0, Math.PI*2); ctx.fill();
  // eyes
  ctx.fillStyle = '#fff7d9';
  ctx.beginPath(); ctx.arc(b.r * 0.7, -b.r * 0.2, 1.4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(b.r * 0.7, b.r * 0.2, 1.4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#1a1108';
  ctx.beginPath(); ctx.arc(b.r * 0.78, -b.r * 0.2, 0.6, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(b.r * 0.78,  b.r * 0.2, 0.6, 0, Math.PI*2); ctx.fill();
  // antennae
  ctx.strokeStyle = '#1a1108'; ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(b.r * 0.7, -b.r * 0.2); ctx.quadraticCurveTo(b.r * 1.0, -b.r * 0.6, b.r * 1.2, -b.r * 0.7);
  ctx.moveTo(b.r * 0.7,  b.r * 0.2); ctx.quadraticCurveTo(b.r * 1.0,  b.r * 0.6, b.r * 1.2,  b.r * 0.7);
  ctx.stroke();
  ctx.fillStyle = '#1a1108';
  ctx.beginPath(); ctx.arc(b.r * 1.2, -b.r * 0.7, 1, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(b.r * 1.2,  b.r * 0.7, 1, 0, Math.PI*2); ctx.fill();
  // stinger
  ctx.fillStyle = '#1a1108';
  ctx.beginPath();
  ctx.moveTo(-b.r * 1.2, 0); ctx.lineTo(-b.r * 1.5, -2); ctx.lineTo(-b.r * 1.5, 2);
  ctx.closePath(); ctx.fill();
  ctx.restore();
  // BUZZ aura ring
  if (state.buzz > 0.05){
    ctx.strokeStyle = withAlpha('#ffd14a', state.buzz * 0.6);
    ctx.lineWidth = 2;
    const r = b.r + 6 + Math.sin(b.wingT * 3) * 2 + state.buzz * 6;
    ctx.beginPath(); ctx.arc(b.x, b.y, r, 0, Math.PI*2); ctx.stroke();
    ctx.strokeStyle = withAlpha('#ff5ea1', state.buzz * 0.35);
    ctx.beginPath(); ctx.arc(b.x, b.y, r + 6, 0, Math.PI*2); ctx.stroke();
  }
}

function withAlpha(color, alpha){
  // assumes #rrggbb input; output is rgba()
  if (color.startsWith('rgba(') || color.startsWith('rgb(')) return color;
  const r = parseInt(color.slice(1, 3), 16);
  const g = parseInt(color.slice(3, 5), 16);
  const b = parseInt(color.slice(5, 7), 16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha.toFixed(3) + ')';
}

// ── END / RESET ───────────────────────────────────────────────
const overlay = document.getElementById('overlay');
const overlayInner = document.getElementById('overlayInner');
const ovTitle = document.getElementById('ovTitle');
const ovBody = document.getElementById('ovBody');
const ovStats = document.getElementById('ovStats');
const ovBtn = document.getElementById('ovBtn');

function endRun(win){
  if (state.ended) return;
  state.ended = true;
  state.endedWin = win;
  if (win){
    overlayInner.className = 'overlay-inner win';
    ovTitle.textContent = 'JAR FILLED';
    ovBody.textContent = 'a glittering pint of neon honey. the hive sings.';
    sfxWin();
  } else {
    overlayInner.className = 'overlay-inner lose';
    ovTitle.textContent = 'BLOOM WILTED';
    ovBody.textContent = 'the field has gone grey before the jar topped out.';
    sfxLose();
  }
  ovStats.textContent = 'jar ' + Math.floor(state.jar) + '/' + state.jarMax + ' · time ' + Math.floor(state.elapsed) + 's';
  ovBtn.textContent = win ? 'play again' : 'try again';
  overlay.hidden = false;
}
ovBtn.addEventListener('click', () => { reset(); ensureAudio(); });

function reset(){
  state.ended = false;
  state.endedWin = false;
  state.jar = 0;
  state.bloom = 1.0;
  state.elapsed = 0;
  state.buzz = 0;
  state.buzzActive = false;
  state.cameraShake = 0;
  state.ripples = [];
  spawnBee();
  spawnFlowers();
  overlay.hidden = true;
}

function toggleMute(){
  state.muted = !state.muted;
  document.getElementById('muteBtn').textContent = '♪ ' + (state.muted ? 'off' : 'on');
  document.getElementById('muteBtn').setAttribute('aria-pressed', String(state.muted));
  if (state.muted && buzzGain){
    const a = ensureAudio(); if (a) buzzGain.gain.linearRampToValueAtTime(0, a.currentTime + 0.05);
  }
}
document.getElementById('muteBtn').addEventListener('click', toggleMute);
document.getElementById('resetBtn').addEventListener('click', () => { reset(); ensureAudio(); });

// ── MAIN LOOP ─────────────────────────────────────────────────
let lastTs = 0;
function loop(ts){
  if (!lastTs) lastTs = ts;
  const dt = Math.min(0.08, (ts - lastTs) / 1000);
  lastTs = ts;
  if (!state.ended){
    tickBee(dt);
    tickFlowers(dt);
    tickPollens(dt);
    tickWorld(dt);
  }
  render();
  refreshHud();
  requestAnimationFrame(loop);
}

// ── BOOT ──────────────────────────────────────────────────────
resizeCanvas();
reset();
requestAnimationFrame(loop);
</script>
