<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Tickle Feather</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#06031a">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%AA%B6">
<meta name="description" content="A neon tickle machine — drag a digital feather across glowing blobs and they wiggle, giggle, and throw sparks on every contact.">
<meta property="og:title" content="Tickle Feather">
<meta property="og:description" content="A neon tickle machine — drag a digital feather across glowing blobs and they wiggle, giggle, and throw sparks on every contact.">
<meta property="og:url" content="https://sloppy.live/tickle-feather">
<meta property="og:image" content="https://image.pollinations.ai/prompt/neon%20glowing%20blobs%20with%20faces%20being%20tickled%20by%20floating%20feather%20cursor%2C%20pink%20cyan%20lime%20sparks%2C%20cyberpunk%20chamber?width=1200&height=630&model=flux&seed=4747&nologo=true">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=JetBrains+Mono:wght@400;500;700&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#06031a;
    --pink:#ff2bd6;
    --cyan:#5ce6ff;
    --lime:#a5ff52;
    --amber:#ffd454;
    --silver:#a89cc8;
    --ink:#f5ecff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{
    width:100%;height:100%;background:var(--void);color:var(--ink);
    font-family:'JetBrains Mono', monospace;
    -webkit-tap-highlight-color:transparent;user-select:none;overflow:hidden;
    cursor:none;
  }
  body{
    background:
      radial-gradient(ellipse 50% 35% at 80% 20%, rgba(255,43,214,0.12), transparent 70%),
      radial-gradient(ellipse 50% 35% at 20% 80%, rgba(92,230,255,0.10), transparent 70%),
      var(--void);
    display:flex;flex-direction:column;
  }
  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:90;
    background:repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0 1px, transparent 1px 3px);
  }

  header{
    padding:0.85rem 1.4rem 0.6rem;
    border-bottom:1px solid rgba(168,156,200,0.18);
    background:rgba(13,7,32,0.6);backdrop-filter:blur(8px);
    display:flex;justify-content:space-between;align-items:flex-end;gap:0.8rem;flex-wrap:wrap;
    z-index:5;position:relative;
  }
  .title{
    font-family:'Audiowide', sans-serif;
    font-size:clamp(1.3rem, 3.4vw, 2rem);letter-spacing:0.05em;line-height:1;
    color:var(--ink);
    text-shadow:0 0 14px var(--pink), 0 0 28px rgba(255,43,214,0.5);
  }
  .title .accent{color:var(--cyan);text-shadow:0 0 14px var(--cyan), 0 0 28px rgba(92,230,255,0.5)}
  .tag{
    font-family:'JetBrains Mono', monospace;font-size:0.66rem;
    color:var(--silver);margin-top:0.3rem;letter-spacing:0.16em;text-transform:uppercase;
  }
  .hud-pills{display:flex;gap:0.4rem;flex-wrap:wrap;align-items:center}
  .pill{
    background:rgba(255,255,255,0.04);border:1px solid rgba(168,156,200,0.25);
    border-radius:999px;padding:0.4rem 0.7rem;
    display:inline-flex;flex-direction:column;line-height:1.2;
    font-family:'JetBrains Mono', monospace;font-size:0.62rem;
    color:var(--silver);letter-spacing:0.14em;text-transform:uppercase;
    min-width:5rem;text-align:center;
  }
  .pill .v{
    font-family:'VT323', monospace;font-size:1.3rem;line-height:1;
    color:var(--ink);font-weight:400;letter-spacing:0.04em;
  }
  .pill.giggles .v{color:var(--lime);text-shadow:0 0 6px var(--lime)}
  .pill.touches .v{color:var(--pink);text-shadow:0 0 6px var(--pink)}
  .pill.objects .v{color:var(--cyan);text-shadow:0 0 6px var(--cyan)}
  .pill.combo .v{color:var(--amber);text-shadow:0 0 6px var(--amber)}

  main{
    flex:1;position:relative;
    overflow:hidden;
    z-index:5;
  }
  canvas{
    position:absolute;inset:0;display:block;width:100%;height:100%;
  }
  /* feather canvas sits on top */
  canvas#feather{pointer-events:none;z-index:6}

  .controls{
    position:absolute;bottom:0.8rem;left:50%;transform:translateX(-50%);
    z-index:8;
    display:flex;gap:0.4rem;
    background:rgba(13,7,32,0.65);
    border:1px solid rgba(168,156,200,0.22);
    border-radius:999px;padding:0.35rem;
    backdrop-filter:blur(8px);
  }
  .ctrl-btn{
    background:transparent;border:1px solid rgba(168,156,200,0.25);
    color:var(--silver);
    font-family:'JetBrains Mono', monospace;font-size:0.68rem;font-weight:700;
    padding:0.5rem 0.95rem;border-radius:999px;cursor:pointer;
    letter-spacing:0.12em;text-transform:uppercase;
    min-height:2.5rem;
  }
  .ctrl-btn:hover{border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 12px rgba(92,230,255,0.35)}
  .ctrl-btn:focus-visible{outline:2px solid var(--pink);outline-offset:2px}
  .ctrl-btn.primary{background:rgba(255,43,214,0.18);color:var(--pink);border-color:var(--pink);box-shadow:0 0 12px rgba(255,43,214,0.4)}
  .ctrl-btn.primary:hover{background:rgba(255,43,214,0.3);box-shadow:0 0 22px rgba(255,43,214,0.6)}
  .ctrl-btn.mute[aria-pressed="true"]{color:var(--amber);border-color:var(--amber)}

  .hint{
    position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
    z-index:7;text-align:center;pointer-events:none;
    font-family:'Audiowide', sans-serif;
    color:var(--silver);
    transition:opacity 0.6s;
  }
  .hint.hidden{opacity:0}
  .hint .big{
    font-size:clamp(1.6rem, 4vw, 2.6rem);
    color:var(--cyan);
    text-shadow:0 0 16px var(--cyan);
    letter-spacing:0.08em;
    margin-bottom:0.4rem;
  }
  .hint .sub{
    font-family:'JetBrains Mono', monospace;font-size:0.8rem;
    color:var(--silver);letter-spacing:0.18em;text-transform:uppercase;
  }
</style>
</head>
<body>
  <header>
    <div>
      <h1 class="title">tickle<span class="accent">·</span>feather</h1>
      <div class="tag">drag the feather · wiggle the blobs · catch the sparks</div>
    </div>
    <div class="hud-pills" role="status" aria-live="polite">
      <span class="pill giggles">giggles<span class="v" id="hudGiggles">0</span></span>
      <span class="pill combo">combo<span class="v" id="hudCombo">×1</span></span>
      <span class="pill touches">touches<span class="v" id="hudTouches">0</span></span>
      <span class="pill objects">blobs<span class="v" id="hudObjects">0</span></span>
    </div>
  </header>

  <main id="stage">
    <canvas id="scene" aria-label="Tickle stage"></canvas>
    <canvas id="feather" aria-hidden="true"></canvas>
    <div class="hint" id="hint">
      <div class="big">move the feather</div>
      <div class="sub">drag across the blobs · tap ＋ to add more · M to mute</div>
    </div>
    <div class="controls">
      <button class="ctrl-btn" type="button" id="addBtn" aria-label="Add more blobs">＋ add</button>
      <button class="ctrl-btn primary" type="button" id="ticketBtn" aria-label="Tickle storm">⚡ storm</button>
      <button class="ctrl-btn" type="button" id="clearBtn" aria-label="Clear blobs">✕ clear</button>
      <button class="ctrl-btn mute" type="button" id="muteBtn" aria-pressed="false" aria-label="Mute">🔊 sound</button>
    </div>
  </main>

<script>
'use strict';
(function(){
  function showError(msg){
    try{
      var t = document.getElementById('errToast');
      if (!t){
        t = document.createElement('div');
        t.id = 'errToast';
        t.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#3a061f;color:#ffb6c1;font-family:monospace;font-size:11px;padding:8px 12px;border-bottom:1px solid #ff8ac0;white-space:pre-wrap';
        document.body.appendChild(t);
      }
      t.textContent = '⚠ ' + msg;
    }catch(_){}
  }
  window.addEventListener('error', function(ev){
    showError((ev.message || 'error') + ' @ ' + (ev.filename ? ev.filename.split('/').pop() : '?') + ':' + (ev.lineno || '?'));
  });

  // ── Canvas + DPI handling ──────────────────────────────────────────────
  const scene = document.getElementById('scene');
  const sctx = scene.getContext('2d');
  const feather = document.getElementById('feather');
  const fctx = feather.getContext('2d');
  const stage = document.getElementById('stage');
  let W = 0, H = 0, dpr = 1;
  function resize(){
    dpr = Math.min(2, window.devicePixelRatio || 1);
    const r = stage.getBoundingClientRect();
    W = Math.floor(r.width);
    H = Math.floor(r.height);
    [scene, feather].forEach(c => {
      c.width = W * dpr; c.height = H * dpr;
      c.style.width = W + 'px'; c.style.height = H + 'px';
      const cx = c.getContext('2d');
      cx.setTransform(dpr, 0, 0, dpr, 0, 0);
    });
  }
  window.addEventListener('resize', resize);

  // ── Neon palette ────────────────────────────────────────────────────────
  const PALETTE = [
    { fg:'#ff2bd6', glow:'rgba(255,43,214,0.5)',  pitch: 523 }, // pink   · C5
    { fg:'#5ce6ff', glow:'rgba(92,230,255,0.5)',  pitch: 587 }, // cyan   · D5
    { fg:'#a5ff52', glow:'rgba(165,255,82,0.5)',  pitch: 659 }, // lime   · E5
    { fg:'#ffd454', glow:'rgba(255,212,74,0.5)',  pitch: 698 }, // amber  · F5
    { fg:'#c44dff', glow:'rgba(196,77,255,0.5)',  pitch: 784 }, // violet · G5
    { fg:'#ff8a3a', glow:'rgba(255,138,58,0.5)',  pitch: 880 }, // orange · A5
    { fg:'#7af8d8', glow:'rgba(122,248,216,0.5)', pitch: 988 }, // mint   · B5
    { fg:'#ffabc8', glow:'rgba(255,171,200,0.5)', pitch:1047 }  // rose   · C6
  ];
  // Cute mouth glyphs that the blobs cycle through when tickled
  const FACES = [':3', ':)', 'uwu', '^_^', ':D', 'XD', '◕‿◕', '◑‿◐'];

  // ── State ──
  const state = {
    blobs: [],
    sparks: [],
    giggleParticles: [], // floating "hehe" / "EEK" / "✨" text
    muted: false,
    giggles: 0,
    touches: 0,
    combo: 1,
    comboDecay: 0
  };

  function rand(min, max){ return min + Math.random() * (max - min); }
  function rndPalette(){ return PALETTE[Math.floor(Math.random() * PALETTE.length)]; }

  function spawnBlob(opts){
    opts = opts || {};
    const pal = opts.palette || rndPalette();
    const r = opts.r || rand(34, 62);
    state.blobs.push({
      x: opts.x != null ? opts.x : rand(r + 20, W - r - 20),
      y: opts.y != null ? opts.y : rand(r + 60, H - r - 80),
      vx: rand(-12, 12), vy: rand(-12, 12),
      r,
      baseR: r,
      pal,
      wiggle: 0,
      wigglePhase: rand(0, Math.PI * 2),
      face: FACES[Math.floor(Math.random() * FACES.length)],
      eyeBlinkT: rand(0, 2),
      // Per-blob deformation for jelly squish
      stretchX: 1, stretchY: 1,
      lastTickleAt: -1e9,
      flashUntil: 0
    });
  }
  function clearBlobs(){
    state.blobs.length = 0;
    state.sparks.length = 0;
    state.giggleParticles.length = 0;
  }
  function spawnPack(n){
    for (let i = 0; i < n; i++) spawnBlob();
    updateHud();
  }

  // ── Sparks (per-touch particle burst) ──
  function emitSparks(x, y, pal, count){
    for (let i = 0; i < count; i++){
      const a = Math.random() * Math.PI * 2;
      const sp = rand(140, 320);
      state.sparks.push({
        x, y,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp - rand(20, 80),
        life: 0,
        maxLife: rand(0.45, 0.9),
        r: rand(1.4, 3.2),
        pal
      });
    }
    // Plus 4 thin "star" rays
    for (let i = 0; i < 4; i++){
      const a = (i * Math.PI / 2) + Math.random() * 0.3;
      state.sparks.push({
        x, y, vx: Math.cos(a) * 280, vy: Math.sin(a) * 280,
        life: 0, maxLife: 0.4, r: 2.4, pal,
        ray: true
      });
    }
  }

  // ── Floating giggle text ──
  const GIGGLE_TEXT = ['hehe', 'hee!', 'eek!', '✨', 'haha', 'tee', 'hihi', 'ihihi', '~!~', 'XD'];
  function emitGiggleText(x, y, pal){
    state.giggleParticles.push({
      x, y, vx: rand(-30, 30), vy: -rand(60, 120),
      text: GIGGLE_TEXT[Math.floor(Math.random() * GIGGLE_TEXT.length)],
      life: 0, maxLife: 1.0, pal,
      angle: rand(-0.3, 0.3)
    });
  }

  // ── Audio ──
  let actx = null;
  function ensureAudio(){
    if (actx) return actx;
    try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(_){}
    return actx;
  }
  // Giggle = 3-note ascending sine burst with light vibrato. Pitch tied to
  // blob colour so each blob has a distinct giggle voice.
  function playGiggle(basePitch, intensity){
    if (state.muted) return;
    ensureAudio(); if (!actx) return;
    if (actx.state === 'suspended') actx.resume();
    const t = actx.currentTime;
    const semis = [0, 3, 7];
    for (let i = 0; i < 3; i++){
      const tt = t + i * 0.045;
      const o = actx.createOscillator();
      const g = actx.createGain();
      const lfo = actx.createOscillator();
      const lfoG = actx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(basePitch * Math.pow(2, semis[i] / 12), tt);
      lfo.frequency.value = 14; lfoG.gain.value = 5;
      lfo.connect(lfoG); lfoG.connect(o.frequency);
      g.gain.setValueAtTime(0, tt);
      g.gain.linearRampToValueAtTime(0.13 * (intensity || 1), tt + 0.008);
      g.gain.exponentialRampToValueAtTime(0.0001, tt + 0.16);
      o.connect(g); g.connect(actx.destination);
      o.start(tt); o.stop(tt + 0.2);
      lfo.start(tt); lfo.stop(tt + 0.2);
    }
  }

  // ── Feather + pointer state ──
  const feath = {
    x: W / 2, y: H / 2,
    tx: W / 2, ty: H / 2, // target (raw pointer)
    px: W / 2, py: H / 2, // previous frame (for velocity)
    vx: 0, vy: 0,
    angle: 0,
    visible: false,
    pressing: false
  };
  function setPointer(x, y){
    feath.tx = x; feath.ty = y;
    feath.visible = true;
    document.getElementById('hint').classList.add('hidden');
  }
  window.addEventListener('pointermove', e => setPointer(e.clientX - stage.getBoundingClientRect().left, e.clientY - stage.getBoundingClientRect().top));
  window.addEventListener('pointerdown', e => {
    feath.pressing = true;
    setPointer(e.clientX - stage.getBoundingClientRect().left, e.clientY - stage.getBoundingClientRect().top);
  });
  window.addEventListener('pointerup', () => { feath.pressing = false; });
  window.addEventListener('pointerleave', () => { feath.visible = false; });

  // ── Update ──
  let lastT = 0;
  function tick(now){
    requestAnimationFrame(tick);
    const dt = Math.min(0.05, (now - lastT) / 1000 || 0);
    lastT = now;

    // Smooth feather toward pointer (lerp)
    feath.px = feath.x; feath.py = feath.y;
    const lerp = 1 - Math.pow(0.001, dt);
    feath.x += (feath.tx - feath.x) * lerp;
    feath.y += (feath.ty - feath.y) * lerp;
    feath.vx = (feath.x - feath.px) / Math.max(dt, 0.001);
    feath.vy = (feath.y - feath.py) / Math.max(dt, 0.001);
    feath.angle = Math.atan2(feath.vy, feath.vx);
    const featherSpeed = Math.hypot(feath.vx, feath.vy);

    // Update blobs
    for (const b of state.blobs){
      // Gentle drift
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      // Soft drag toward 0 velocity
      b.vx *= Math.pow(0.6, dt);
      b.vy *= Math.pow(0.6, dt);
      // Bounce off bounds
      if (b.x - b.r < 4){ b.x = b.r + 4; b.vx = Math.abs(b.vx) + 30; }
      if (b.x + b.r > W - 4){ b.x = W - 4 - b.r; b.vx = -Math.abs(b.vx) - 30; }
      if (b.y - b.r < 60){ b.y = 60 + b.r; b.vy = Math.abs(b.vy) + 30; }
      if (b.y + b.r > H - 70){ b.y = H - 70 - b.r; b.vy = -Math.abs(b.vy) - 30; }
      // Wiggle decay
      b.wiggle *= Math.pow(0.08, dt);
      b.wigglePhase += dt * (10 + b.wiggle * 14);
      // Squish decay
      b.stretchX += (1 - b.stretchX) * 8 * dt;
      b.stretchY += (1 - b.stretchY) * 8 * dt;
      b.eyeBlinkT -= dt;
      if (b.eyeBlinkT < 0) b.eyeBlinkT = rand(2, 5);

      // Collision with feather — only when feather is visible and moving
      if (feath.visible && featherSpeed > 25){
        // Sample 3 points along the recent path so a fast swipe still hits
        const hit = lineCircleHit(feath.px, feath.py, feath.x, feath.y, b.x, b.y, b.r + 4);
        if (hit){
          const dx = b.x - feath.x, dy = b.y - feath.y;
          const d = Math.hypot(dx, dy) || 1;
          // Kick + wiggle
          b.vx += (dx / d) * Math.min(featherSpeed * 0.35, 380);
          b.vy += (dy / d) * Math.min(featherSpeed * 0.35, 380);
          b.wiggle = Math.min(1.5, b.wiggle + 0.5 + featherSpeed * 0.001);
          b.stretchX = 0.78;
          b.stretchY = 1.22;
          b.flashUntil = now + 180;
          // Rate-limit per blob so a slow drag doesn't fire 60 giggles/sec
          if (now - b.lastTickleAt > 180){
            b.lastTickleAt = now;
            state.touches++;
            state.giggles += Math.round(state.combo);
            state.combo = Math.min(9, state.combo + 0.18);
            state.comboDecay = 1.4; // seconds before combo starts decaying
            emitSparks(b.x, b.y, b.pal, 14 + Math.floor(featherSpeed * 0.05));
            emitGiggleText(b.x, b.y - b.r - 4, b.pal);
            playGiggle(b.pal.pitch, 0.6 + Math.min(1.5, featherSpeed * 0.003));
            updateHud();
          }
        }
      }
    }

    // Combo decay
    if (state.comboDecay > 0){
      state.comboDecay -= dt;
    } else if (state.combo > 1){
      state.combo = Math.max(1, state.combo - dt * 1.2);
      updateHud();
    }

    // Update sparks
    for (let i = state.sparks.length - 1; i >= 0; i--){
      const s = state.sparks[i];
      s.life += dt;
      if (s.life >= s.maxLife){ state.sparks.splice(i, 1); continue; }
      s.x += s.vx * dt;
      s.y += s.vy * dt;
      s.vy += 360 * dt; // gravity
      s.vx *= Math.pow(0.4, dt);
    }
    // Giggle text
    for (let i = state.giggleParticles.length - 1; i >= 0; i--){
      const g = state.giggleParticles[i];
      g.life += dt;
      if (g.life >= g.maxLife){ state.giggleParticles.splice(i, 1); continue; }
      g.x += g.vx * dt;
      g.y += g.vy * dt;
      g.vy += 80 * dt;
    }

    render(now);
  }

  // Line-segment vs circle hit test (recent feather path vs blob)
  function lineCircleHit(x1, y1, x2, y2, cx, cy, r){
    const dx = x2 - x1, dy = y2 - y1;
    const fx = x1 - cx, fy = y1 - cy;
    const a = dx*dx + dy*dy;
    if (a < 1){ return (fx*fx + fy*fy) <= r*r; }
    const b = 2 * (fx*dx + fy*dy);
    const c = fx*fx + fy*fy - r*r;
    const disc = b*b - 4*a*c;
    if (disc < 0) return false;
    const sq = Math.sqrt(disc);
    const t1 = (-b - sq) / (2*a);
    const t2 = (-b + sq) / (2*a);
    return (t1 >= 0 && t1 <= 1) || (t2 >= 0 && t2 <= 1) || (t1 < 0 && t2 > 1);
  }

  // ── Render ──
  function render(now){
    // Trail fade for the scene canvas — gives the blobs ghosted halos
    sctx.fillStyle = 'rgba(6,3,26,0.30)';
    sctx.fillRect(0, 0, W, H);

    // Blobs
    sctx.globalCompositeOperation = 'lighter';
    for (const b of state.blobs){
      drawBlob(b, now);
    }
    sctx.globalCompositeOperation = 'source-over';
    // Faces drawn on top in source-over (lighter blends text into glow incorrectly)
    for (const b of state.blobs){
      drawFace(b, now);
    }

    // Sparks (on the scene canvas so they fade nicely)
    sctx.globalCompositeOperation = 'lighter';
    for (const s of state.sparks){
      const k = 1 - (s.life / s.maxLife);
      const alpha = k * (s.ray ? 0.7 : 0.95);
      sctx.beginPath();
      if (s.ray){
        sctx.strokeStyle = s.pal.fg;
        sctx.lineWidth = s.r;
        sctx.shadowColor = s.pal.fg;
        sctx.shadowBlur = 14;
        sctx.globalAlpha = alpha;
        sctx.moveTo(s.x, s.y);
        sctx.lineTo(s.x - s.vx * 0.05, s.y - s.vy * 0.05);
        sctx.stroke();
      } else {
        sctx.fillStyle = s.pal.fg;
        sctx.shadowColor = s.pal.fg;
        sctx.shadowBlur = 14;
        sctx.globalAlpha = alpha;
        sctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        sctx.fill();
      }
    }
    sctx.shadowBlur = 0;
    sctx.globalAlpha = 1;
    sctx.globalCompositeOperation = 'source-over';

    // Giggle text
    for (const g of state.giggleParticles){
      const k = 1 - (g.life / g.maxLife);
      sctx.save();
      sctx.translate(g.x, g.y);
      sctx.rotate(g.angle);
      sctx.globalAlpha = k;
      sctx.shadowColor = g.pal.fg;
      sctx.shadowBlur = 12;
      sctx.fillStyle = g.pal.fg;
      sctx.font = 'bold 18px "Audiowide", sans-serif';
      sctx.textAlign = 'center';
      sctx.fillText(g.text, 0, 0);
      sctx.restore();
    }
    sctx.shadowBlur = 0;
    sctx.globalAlpha = 1;

    // Feather (separate canvas, fully cleared each frame)
    fctx.clearRect(0, 0, W, H);
    if (feath.visible) drawFeather(feath.x, feath.y, feath.angle);
  }

  function drawBlob(b, now){
    const wob = 1 + Math.sin(b.wigglePhase) * 0.04 * (1 + b.wiggle);
    const rx = b.r * b.stretchX * wob;
    const ry = b.r * b.stretchY * wob;
    const flashing = now < b.flashUntil;
    const intensity = flashing ? 1.4 : 1;
    // Outer glow halo
    const halo = sctx.createRadialGradient(b.x, b.y, b.r * 0.3, b.x, b.y, b.r * 1.7);
    halo.addColorStop(0, b.pal.glow);
    halo.addColorStop(0.5, b.pal.glow.replace('0.5', '0.22'));
    halo.addColorStop(1, 'rgba(0,0,0,0)');
    sctx.fillStyle = halo;
    sctx.beginPath();
    sctx.ellipse(b.x, b.y, rx * 1.7 * intensity, ry * 1.7 * intensity, Math.sin(b.wigglePhase * 0.4) * 0.15, 0, Math.PI * 2);
    sctx.fill();
    // Body fill (translucent neon glow)
    const body = sctx.createRadialGradient(b.x - rx*0.3, b.y - ry*0.3, rx * 0.1, b.x, b.y, rx);
    body.addColorStop(0, '#ffffff');
    body.addColorStop(0.35, b.pal.fg);
    body.addColorStop(1, b.pal.fg + '00');
    sctx.fillStyle = body;
    sctx.beginPath();
    sctx.ellipse(b.x, b.y, rx, ry, Math.sin(b.wigglePhase * 0.4) * 0.15, 0, Math.PI * 2);
    sctx.fill();
    // Crisp outline
    sctx.strokeStyle = b.pal.fg;
    sctx.lineWidth = 2;
    sctx.shadowColor = b.pal.fg;
    sctx.shadowBlur = flashing ? 24 : 14;
    sctx.beginPath();
    sctx.ellipse(b.x, b.y, rx, ry, Math.sin(b.wigglePhase * 0.4) * 0.15, 0, Math.PI * 2);
    sctx.stroke();
    sctx.shadowBlur = 0;
  }
  function drawFace(b, now){
    const wob = 1 + Math.sin(b.wigglePhase) * 0.04 * (1 + b.wiggle);
    const rx = b.r * b.stretchX * wob;
    const ry = b.r * b.stretchY * wob;
    const blink = b.eyeBlinkT < 0.12;
    const giggling = b.wiggle > 0.2;
    sctx.save();
    sctx.translate(b.x, b.y);
    // Eyes
    sctx.fillStyle = '#06031a';
    if (!blink){
      sctx.beginPath();
      sctx.ellipse(-rx * 0.32, -ry * 0.15, rx * 0.09, ry * 0.13, 0, 0, Math.PI * 2);
      sctx.ellipse( rx * 0.32, -ry * 0.15, rx * 0.09, ry * 0.13, 0, 0, Math.PI * 2);
      sctx.fill();
    } else {
      sctx.strokeStyle = '#06031a';
      sctx.lineWidth = 2;
      sctx.beginPath();
      sctx.moveTo(-rx * 0.4, -ry * 0.15); sctx.lineTo(-rx * 0.24, -ry * 0.15);
      sctx.moveTo( rx * 0.24, -ry * 0.15); sctx.lineTo( rx * 0.4, -ry * 0.15);
      sctx.stroke();
    }
    // Mouth
    sctx.strokeStyle = '#06031a';
    sctx.lineWidth = 2.2;
    sctx.lineCap = 'round';
    sctx.beginPath();
    if (giggling){
      // Open laughing mouth
      sctx.ellipse(0, ry * 0.18, rx * 0.22, ry * 0.16 * (1 + b.wiggle * 0.5), 0, 0, Math.PI);
    } else {
      sctx.arc(0, ry * 0.1, rx * 0.18, 0.15 * Math.PI, 0.85 * Math.PI);
    }
    sctx.stroke();
    sctx.restore();
  }

  function drawFeather(x, y, angle){
    fctx.save();
    fctx.translate(x, y);
    fctx.rotate(angle + Math.PI / 2 + Math.sin(performance.now() / 200) * 0.1);
    // Shaft
    fctx.strokeStyle = '#a5ff52';
    fctx.shadowColor = '#a5ff52';
    fctx.shadowBlur = 12;
    fctx.lineWidth = 2.5;
    fctx.lineCap = 'round';
    fctx.beginPath();
    fctx.moveTo(0, -38);
    fctx.quadraticCurveTo(2, 0, 0, 36);
    fctx.stroke();
    // Vane (left side)
    fctx.fillStyle = 'rgba(165,255,82,0.18)';
    fctx.strokeStyle = '#5ce6ff';
    fctx.shadowColor = '#5ce6ff';
    fctx.shadowBlur = 10;
    fctx.lineWidth = 1.4;
    for (let side = -1; side <= 1; side += 2){
      fctx.beginPath();
      fctx.moveTo(0, -38);
      for (let i = 1; i <= 14; i++){
        const t = i / 14;
        const y0 = -38 + t * 70;
        const w = Math.sin(t * Math.PI) * 18;
        const wob = Math.sin(performance.now()/250 + t * 4) * 1.5;
        fctx.lineTo(side * (w + wob), y0);
      }
      fctx.lineTo(0, 36);
      fctx.closePath();
      fctx.fill();
      fctx.stroke();
    }
    // Tip glow
    fctx.shadowBlur = 18;
    fctx.fillStyle = '#ff2bd6';
    fctx.shadowColor = '#ff2bd6';
    fctx.beginPath();
    fctx.arc(0, -40, 4, 0, Math.PI * 2);
    fctx.fill();
    fctx.restore();
  }

  // ── HUD ──
  function updateHud(){
    document.getElementById('hudGiggles').textContent = state.giggles;
    document.getElementById('hudTouches').textContent = state.touches;
    document.getElementById('hudObjects').textContent = state.blobs.length;
    document.getElementById('hudCombo').textContent = '×' + Math.floor(state.combo) + (state.combo > 1 ? '+' : '');
  }

  // ── Tickle storm ──
  function tickleStorm(){
    // Briefly tickle every blob from a random direction
    for (const b of state.blobs){
      b.wiggle = 1.4;
      b.stretchX = 0.8; b.stretchY = 1.2;
      b.vx += rand(-260, 260);
      b.vy += rand(-260, 260);
      emitSparks(b.x, b.y, b.pal, 18);
      emitGiggleText(b.x, b.y - b.r - 4, b.pal);
      playGiggle(b.pal.pitch, 0.5);
      b.flashUntil = performance.now() + 220;
      state.touches++;
      state.giggles += 3;
    }
    state.combo = Math.min(9, state.combo + 1.5);
    state.comboDecay = 2.0;
    updateHud();
  }

  // ── Wire controls ──
  document.getElementById('addBtn').addEventListener('click', () => spawnPack(3));
  document.getElementById('clearBtn').addEventListener('click', () => {
    clearBlobs();
    state.combo = 1;
    updateHud();
  });
  document.getElementById('ticketBtn').addEventListener('click', tickleStorm);
  document.getElementById('muteBtn').addEventListener('click', e => {
    state.muted = !state.muted;
    const btn = e.currentTarget;
    btn.setAttribute('aria-pressed', state.muted ? 'true' : 'false');
    btn.textContent = state.muted ? '🔇 muted' : '🔊 sound';
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'm' || e.key === 'M') document.getElementById('muteBtn').click();
    else if (e.key === '+' || e.key === '=') spawnPack(3);
    else if (e.key === 'c' || e.key === 'C') document.getElementById('clearBtn').click();
    else if (e.key === ' '){ e.preventDefault(); tickleStorm(); }
  });

  // ── Boot ──
  resize();
  spawnPack(10);
  feath.x = feath.tx = W / 2;
  feath.y = feath.ty = H / 2;
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
