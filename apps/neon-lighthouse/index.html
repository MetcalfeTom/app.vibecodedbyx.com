<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>Neon Lighthouse</title>
<link rel="icon" href="https://emojicdn.elk.sh/🗼">
<meta property="og:title" content="Neon Lighthouse">
<meta property="og:description" content="A glowing lighthouse sweeps its beam across dark, stormy neon seas.">
<meta property="og:url" content="https://sloppy.live/neon-lighthouse">
<meta property="og:image" content="https://emojicdn.elk.sh/🗼?style=apple&size=512">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;600&family=IBM+Plex+Mono:wght@200&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#060612;user-select:none;touch-action:none}
canvas{display:block;width:100%;height:100%}
#title{
  position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:5;
  font-family:'Cormorant Garamond',serif;font-size:clamp(14px,2.5vw,20px);font-weight:300;
  color:rgba(180,220,255,0.12);letter-spacing:6px;text-transform:uppercase;
  pointer-events:none;transition:opacity 4s;
}
a</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="title">Neon Lighthouse</div>
<script>
(function(){
'use strict';

var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
var W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
resize();
window.addEventListener('resize',resize);

var time=0;

// Lightning
var lightning={active:false,timer:0,x:0,brightness:0,branches:[]};

function triggerLightning(){
  lightning.active=true;
  lightning.timer=8+Math.random()*6;
  lightning.x=W*0.1+Math.random()*W*0.8;
  lightning.brightness=0.8+Math.random()*0.2;
  // Generate bolt
  lightning.branches=[];
  var segs=8+Math.floor(Math.random()*6);
  var pts=[{x:lightning.x,y:0}];
  for(var i=1;i<=segs;i++){
    pts.push({x:lightning.x+(Math.random()-0.5)*120,y:(i/segs)*H*0.55});
  }
  lightning.branches.push(pts);
  // Sub-branch
  if(Math.random()<0.6){
    var branchAt=Math.floor(segs*0.3)+Math.floor(Math.random()*segs*0.4);
    var bp=[{x:pts[branchAt].x,y:pts[branchAt].y}];
    for(var j=0;j<4;j++){
      bp.push({x:bp[j].x+(Math.random()-0.5)*60+(Math.random()<0.5?30:-30),y:bp[j].y+H*0.08});
    }
    lightning.branches.push(bp);
  }
}

// Rain
var raindrops=[];
for(var i=0;i<200;i++){
  raindrops.push({
    x:Math.random()*2000,
    y:Math.random()*2000,
    speed:4+Math.random()*6,
    len:8+Math.random()*16,
    wind:-1.5-Math.random()*1.5
  });
}

// Stars (dim, mostly hidden by clouds)
var stars=[];
for(var i=0;i<40;i++){
  stars.push({x:Math.random(),y:Math.random()*0.3,s:Math.random()*1.2+0.3,twinkle:Math.random()*Math.PI*2});
}

// Sea waves - layered
function drawSea(seaY){
  // Multiple wave layers
  var layers=[
    {amp:12,freq:0.008,speed:0.4,color:'rgba(0,40,80,0.9)',yOff:0},
    {amp:8,freq:0.012,speed:0.6,color:'rgba(0,60,100,0.7)',yOff:10},
    {amp:6,freq:0.018,speed:0.9,color:'rgba(0,80,120,0.5)',yOff:20},
    {amp:4,freq:0.025,speed:1.2,color:'rgba(10,100,140,0.4)',yOff:28},
  ];

  for(var l=0;l<layers.length;l++){
    var layer=layers[l];
    ctx.beginPath();
    ctx.moveTo(0,H);
    for(var x=0;x<=W;x+=3){
      var y=seaY+layer.yOff
        +Math.sin(x*layer.freq+time*layer.speed)*layer.amp
        +Math.sin(x*layer.freq*1.7+time*layer.speed*0.7)*layer.amp*0.5
        +Math.sin(x*0.003+time*0.2)*20;
      ctx.lineTo(x,y);
    }
    ctx.lineTo(W,H);
    ctx.closePath();
    ctx.fillStyle=layer.color;
    ctx.fill();
  }

  // Foam/whitecaps
  ctx.save();
  ctx.globalAlpha=0.15+Math.sin(time*0.5)*0.05;
  for(var i=0;i<12;i++){
    var fx=(i*W/12+time*20+i*37)%W;
    var fy=seaY+8+Math.sin(fx*0.01+time*0.5)*10+Math.sin(time+i)*4;
    ctx.beginPath();
    ctx.ellipse(fx,fy,12+Math.sin(time+i*2)*4,2,0,0,Math.PI*2);
    ctx.fillStyle='rgba(180,220,255,0.3)';
    ctx.fill();
  }
  ctx.restore();
}

// Lighthouse
function drawLighthouse(lx,baseY){
  var towerW=18;
  var towerH=120;
  var topW=26;
  var topH=30;
  var roofH=16;

  // Tower body
  ctx.save();
  var grad=ctx.createLinearGradient(lx-towerW/2,baseY-towerH,lx+towerW/2,baseY);
  grad.addColorStop(0,'#334');
  grad.addColorStop(0.3,'#445');
  grad.addColorStop(1,'#223');
  ctx.fillStyle=grad;
  ctx.beginPath();
  ctx.moveTo(lx-towerW/2-4,baseY);
  ctx.lineTo(lx-towerW/2+2,baseY-towerH);
  ctx.lineTo(lx+towerW/2-2,baseY-towerH);
  ctx.lineTo(lx+towerW/2+4,baseY);
  ctx.closePath();
  ctx.fill();

  // Stripes
  for(var s=0;s<5;s++){
    var sy=baseY-towerH+s*(towerH/5);
    if(s%2===0){
      ctx.fillStyle='rgba(255,50,50,0.15)';
      var wTop=towerW-4+4*(s/5);
      ctx.fillRect(lx-wTop/2,sy,wTop,towerH/5);
    }
  }

  // Lamp room
  var lampY=baseY-towerH-topH;
  ctx.fillStyle='#2a2a3a';
  ctx.fillRect(lx-topW/2,lampY,topW,topH);

  // Glass panes
  ctx.fillStyle='rgba(255,240,180,0.08)';
  ctx.fillRect(lx-topW/2+2,lampY+3,topW-4,topH-6);

  // Lamp glow
  ctx.beginPath();
  ctx.arc(lx,lampY+topH/2,6,0,Math.PI*2);
  ctx.fillStyle='rgba(255,240,150,0.9)';
  ctx.shadowColor='rgba(255,240,150,0.8)';
  ctx.shadowBlur=20;
  ctx.fill();
  ctx.shadowBlur=0;

  // Roof
  ctx.fillStyle='#333';
  ctx.beginPath();
  ctx.moveTo(lx-topW/2-3,lampY);
  ctx.lineTo(lx,lampY-roofH);
  ctx.lineTo(lx+topW/2+3,lampY);
  ctx.closePath();
  ctx.fill();

  // Railing dots
  ctx.fillStyle='rgba(255,255,255,0.15)';
  for(var r=-topW/2;r<=topW/2;r+=4){
    ctx.fillRect(lx+r,lampY+topH-1,1,3);
  }

  // Rock base
  ctx.fillStyle='#1a1a2a';
  ctx.beginPath();
  ctx.ellipse(lx,baseY+4,40,12,0,0,Math.PI*2);
  ctx.fill();
  ctx.fillStyle='#151525';
  ctx.beginPath();
  ctx.ellipse(lx,baseY+8,50,10,0,0,Math.PI*2);
  ctx.fill();

  ctx.restore();

  return {x:lx,y:lampY+topH/2};
}

// Light beam
function drawBeam(ox,oy,angle){
  ctx.save();
  var beamLen=Math.max(W,H)*1.2;
  var spread=0.12; // radians

  // Main beam gradient
  var grd=ctx.createRadialGradient(ox,oy,0,ox,oy,beamLen);
  grd.addColorStop(0,'rgba(255,250,200,0.35)');
  grd.addColorStop(0.1,'rgba(255,250,200,0.15)');
  grd.addColorStop(0.4,'rgba(255,250,200,0.04)');
  grd.addColorStop(1,'rgba(255,250,200,0)');

  ctx.beginPath();
  ctx.moveTo(ox,oy);
  ctx.lineTo(ox+Math.cos(angle-spread)*beamLen,oy+Math.sin(angle-spread)*beamLen);
  ctx.lineTo(ox+Math.cos(angle+spread)*beamLen,oy+Math.sin(angle+spread)*beamLen);
  ctx.closePath();
  ctx.fillStyle=grd;
  ctx.fill();

  // Brighter core
  var innerSpread=0.03;
  var grd2=ctx.createRadialGradient(ox,oy,0,ox,oy,beamLen*0.6);
  grd2.addColorStop(0,'rgba(255,255,230,0.25)');
  grd2.addColorStop(0.3,'rgba(255,255,230,0.06)');
  grd2.addColorStop(1,'rgba(255,255,230,0)');

  ctx.beginPath();
  ctx.moveTo(ox,oy);
  ctx.lineTo(ox+Math.cos(angle-innerSpread)*beamLen,oy+Math.sin(angle-innerSpread)*beamLen);
  ctx.lineTo(ox+Math.cos(angle+innerSpread)*beamLen,oy+Math.sin(angle+innerSpread)*beamLen);
  ctx.closePath();
  ctx.fillStyle=grd2;
  ctx.fill();

  // Lens flare at origin
  ctx.beginPath();
  ctx.arc(ox,oy,10,0,Math.PI*2);
  var flare=ctx.createRadialGradient(ox,oy,0,ox,oy,10);
  flare.addColorStop(0,'rgba(255,255,220,0.6)');
  flare.addColorStop(1,'rgba(255,255,220,0)');
  ctx.fillStyle=flare;
  ctx.fill();

  ctx.restore();
}

// Clouds
var clouds=[];
for(var i=0;i<8;i++){
  clouds.push({
    x:Math.random()*W*2-W*0.5,
    y:Math.random()*H*0.3,
    w:150+Math.random()*250,
    h:40+Math.random()*40,
    speed:0.15+Math.random()*0.3,
    opacity:0.3+Math.random()*0.4
  });
}

function drawClouds(){
  for(var i=0;i<clouds.length;i++){
    var c=clouds[i];
    c.x+=c.speed;
    if(c.x>W+c.w)c.x=-c.w-100;

    ctx.save();
    ctx.globalAlpha=c.opacity;
    var cg=ctx.createRadialGradient(c.x,c.y,0,c.x,c.y,c.w/2);
    cg.addColorStop(0,'rgba(20,20,40,0.8)');
    cg.addColorStop(0.6,'rgba(15,15,35,0.4)');
    cg.addColorStop(1,'rgba(10,10,25,0)');
    ctx.fillStyle=cg;
    ctx.beginPath();
    ctx.ellipse(c.x,c.y,c.w/2,c.h/2,0,0,Math.PI*2);
    ctx.fill();
    // Sub-puffs
    ctx.beginPath();
    ctx.ellipse(c.x-c.w*0.25,c.y+c.h*0.15,c.w*0.3,c.h*0.4,0,0,Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(c.x+c.w*0.2,c.y-c.h*0.1,c.w*0.25,c.h*0.35,0,0,Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
}

function drawRain(){
  ctx.save();
  ctx.strokeStyle='rgba(150,180,220,0.15)';
  ctx.lineWidth=1;
  for(var i=0;i<raindrops.length;i++){
    var r=raindrops[i];
    r.x+=r.wind;
    r.y+=r.speed;
    if(r.y>H+20){r.y=-20;r.x=Math.random()*W*1.3}
    if(r.x<-50)r.x=W+50;
    ctx.beginPath();
    ctx.moveTo(r.x,r.y);
    ctx.lineTo(r.x+r.wind*1.5,r.y+r.len);
    ctx.stroke();
  }
  ctx.restore();
}

function drawStars(){
  for(var i=0;i<stars.length;i++){
    var s=stars[i];
    s.twinkle+=0.02;
    var a=0.1+Math.sin(s.twinkle)*0.08;
    // Clouds dim stars
    a*=0.4;
    ctx.fillStyle='rgba(200,220,255,'+a+')';
    ctx.fillRect(s.x*W,s.y*H,s.s,s.s);
  }
}

function drawLightning(){
  if(!lightning.active)return;
  lightning.timer--;
  if(lightning.timer<=0){lightning.active=false;return}

  var alpha=lightning.brightness*(lightning.timer/14);

  // Sky flash
  ctx.save();
  ctx.fillStyle='rgba(180,200,255,'+alpha*0.08+')';
  ctx.fillRect(0,0,W,H);

  // Bolts
  ctx.strokeStyle='rgba(200,220,255,'+alpha+')';
  ctx.lineWidth=2;
  ctx.shadowColor='rgba(150,180,255,0.8)';
  ctx.shadowBlur=15;
  for(var b=0;b<lightning.branches.length;b++){
    var pts=lightning.branches[b];
    ctx.beginPath();
    ctx.moveTo(pts[0].x,pts[0].y);
    for(var j=1;j<pts.length;j++){
      ctx.lineTo(pts[j].x,pts[j].y);
    }
    ctx.stroke();
  }
  // Thinner bright core
  ctx.strokeStyle='rgba(230,240,255,'+alpha*0.7+')';
  ctx.lineWidth=1;
  ctx.shadowBlur=5;
  for(var b=0;b<lightning.branches.length;b++){
    var pts=lightning.branches[b];
    ctx.beginPath();
    ctx.moveTo(pts[0].x,pts[0].y);
    for(var j=1;j<pts.length;j++){
      ctx.lineTo(pts[j].x,pts[j].y);
    }
    ctx.stroke();
  }
  ctx.restore();
}

// Beam reflection on water
function drawBeamReflection(ox,oy,angle,seaY){
  // Where beam hits sea
  if(angle<0||angle>Math.PI)return; // beam pointing up
  var dx=Math.cos(angle);
  var dy=Math.sin(angle);
  if(dy<=0)return; // beam going up
  var t=(seaY-oy)/dy;
  var hitX=ox+dx*t;

  if(hitX<-100||hitX>W+100)return;

  ctx.save();
  var reflW=60+Math.sin(time*2)*15;
  var reflGrad=ctx.createRadialGradient(hitX,seaY,0,hitX,seaY+40,reflW);
  reflGrad.addColorStop(0,'rgba(255,250,200,0.12)');
  reflGrad.addColorStop(0.5,'rgba(255,250,200,0.04)');
  reflGrad.addColorStop(1,'rgba(255,250,200,0)');
  ctx.fillStyle=reflGrad;
  ctx.beginPath();
  ctx.ellipse(hitX,seaY+20,reflW,30+Math.sin(time*3)*5,0,0,Math.PI*2);
  ctx.fill();

  // Shimmer streaks
  for(var i=0;i<5;i++){
    var sx=hitX+(Math.sin(time*1.5+i*1.3)-0.5)*reflW;
    var sy=seaY+10+i*8+Math.sin(time*2+i)*3;
    ctx.globalAlpha=0.06+Math.sin(time*3+i)*0.03;
    ctx.fillStyle='rgba(255,250,200,1)';
    ctx.fillRect(sx,sy,2+Math.random()*6,1);
  }
  ctx.restore();
}

function frame(){
  time+=0.016;

  // Sky gradient
  var sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#06060f');
  sky.addColorStop(0.4,'#0a0a1a');
  sky.addColorStop(0.6,'#0c1020');
  sky.addColorStop(1,'#081018');
  ctx.fillStyle=sky;
  ctx.fillRect(0,0,W,H);

  drawStars();

  // Lightning (random)
  if(!lightning.active&&Math.random()<0.003){
    triggerLightning();
  }
  drawLightning();

  drawClouds();

  // Sea line
  var seaY=H*0.62;

  // Lighthouse position
  var lx=W*0.7;
  if(W<500)lx=W*0.65;
  var lampPos=drawLighthouse(lx,seaY-2);

  // Beam sweep — sweeps left across the sea, then back
  var sweep=Math.sin(time*0.35)*0.65; // -0.65 to 0.65
  var beamAngle=Math.PI+sweep; // sweeping roughly left

  drawBeam(lampPos.x,lampPos.y,beamAngle);
  drawBeamReflection(lampPos.x,lampPos.y,beamAngle,seaY);

  drawSea(seaY);
  drawRain();

  // Ambient sea glow at horizon
  ctx.save();
  var horizGlow=ctx.createLinearGradient(0,seaY-15,0,seaY+15);
  horizGlow.addColorStop(0,'rgba(0,80,120,0)');
  horizGlow.addColorStop(0.5,'rgba(0,80,120,0.06)');
  horizGlow.addColorStop(1,'rgba(0,80,120,0)');
  ctx.fillStyle=horizGlow;
  ctx.fillRect(0,seaY-15,W,30);
  ctx.restore();

  requestAnimationFrame(frame);
}

frame();

// Fade title
setTimeout(function(){document.getElementById('title').style.opacity='0'},5000);

})();
</script>
<script src="/sloppy-header/sloppy-bar.js"></script>
</body>
</html>
