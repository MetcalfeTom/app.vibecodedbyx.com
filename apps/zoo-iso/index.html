<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tiny Iso Zoo</title>
  <meta name="description" content="A small isometric zoo tycoon. Lay paths, fence habitats, buy elephants and raptors, watch visitors arrive.">
  <meta property="og:title" content="Tiny Iso Zoo">
  <meta property="og:description" content="An isometric mini tycoon. Two starting animals: elephants (gentle, big) and raptors (fast, scary, profitable).">
  <meta property="og:url" content="https://sloppy.live/zoo-iso">
  <meta property="og:image" content="https://image.pollinations.ai/prompt/Isometric%20pixel%20art%20zoo%20with%20an%20elephant%20pen%20and%20a%20raptor%20pen,%20winding%20gravel%20path,%20visitors%20with%20balloons,%20editorial%20still%20life?model=flux&seed=7070&width=1200&height=630&nologo=true">
  <link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%A6%96">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;700&family=JetBrains+Mono:wght@400;500&family=Caveat:wght@500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --sky:    #d8e0c8;
      --sky-2:  #f4e9c8;
      --grass:  #79a850;
      --grass2: #5e8a3e;
      --dirt:   #b88a5a;
      --path:   #d4c08a;
      --fence:  #5a3a1c;
      --bark:   #2a1808;
      --ink:    #1a140a;
      --panel:  #fdf6e2;
      --panel-d:#2a200a;
      --money:  #2a8a3a;
      --money-d:#1a5a24;
      --rose:   #c44a7a;
      --berry:  #8a1d5c;
      --line:   rgba(42,32,10,0.18);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background:
        radial-gradient(ellipse at 50% 0%, var(--sky-2) 0%, var(--sky) 70%);
      color: var(--ink);
      font-family: 'Bricolage Grotesque', sans-serif;
      display: grid;
      grid-template-columns: 1fr 16rem;
      grid-template-rows: 3rem 1fr;
      grid-template-areas: 'top top' 'stage shop';
    }
    @media (max-width: 720px) {
      body { grid-template-columns: 1fr; grid-template-rows: 3rem 1fr auto; grid-template-areas: 'top' 'stage' 'shop'; }
    }

    /* ============ TOP BAR ============ */
    .topbar {
      grid-area: top;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1rem;
      background:
        repeating-linear-gradient(45deg, rgba(42,32,10,0.04) 0 4px, transparent 4px 9px),
        var(--panel);
      border-bottom: 3px solid var(--fence);
      box-shadow: 0 2px 0 var(--bark);
    }
    .topbar .brand {
      font-family: 'Caveat', cursive;
      font-weight: 700;
      font-size: 1.7rem;
      color: var(--berry);
      line-height: 1;
    }
    .topbar .brand em { color: var(--money-d); font-style: italic; }
    .topbar .stats {
      display: flex; gap: 1.2rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      color: var(--ink);
    }
    .topbar .stats b { color: var(--money-d); font-weight: 700; letter-spacing: 0.04em; }
    .topbar .stats .v {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--ink);
    }
    .topbar .stats .v.cash { color: var(--money-d); }
    .topbar .stats .v.vis  { color: var(--rose); }

    /* ============ STAGE (canvas) ============ */
    .stage {
      grid-area: stage;
      position: relative;
      overflow: hidden;
      background: linear-gradient(180deg, #c6d8a8 0%, #98b878 100%);
      border-right: 3px solid var(--fence);
      cursor: crosshair;
    }
    .stage canvas {
      display: block;
      width: 100%; height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }
    .toast {
      position: absolute;
      bottom: 1rem; left: 50%;
      transform: translateX(-50%);
      background: rgba(26,20,10,0.88);
      color: var(--panel);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.85rem;
      letter-spacing: 0.04em;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s;
      z-index: 5;
    }
    .toast.visible { opacity: 1; }

    /* ============ SHOP ============ */
    .shop {
      grid-area: shop;
      background:
        repeating-linear-gradient(45deg, rgba(42,32,10,0.04) 0 4px, transparent 4px 9px),
        var(--panel);
      padding: 0.7rem 0.7rem;
      overflow-y: auto;
      border-top: 3px solid var(--fence);
    }
    .shop h2 {
      font-family: 'Bricolage Grotesque', sans-serif;
      font-weight: 700;
      font-size: 0.78rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--ink);
      margin: 0.4rem 0 0.35rem;
      padding-bottom: 0.25rem;
      border-bottom: 1.5px dashed var(--line);
    }
    .shop h2:first-child { margin-top: 0; }
    .shop .item {
      display: grid;
      grid-template-columns: 2.2rem 1fr auto;
      gap: 0.5rem;
      align-items: center;
      width: 100%;
      padding: 0.5rem 0.6rem;
      margin-bottom: 0.45rem;
      background: var(--panel);
      border: 1.5px solid var(--fence);
      border-radius: 7px;
      box-shadow: 2px 2px 0 var(--bark);
      cursor: pointer;
      text-align: left;
      transition: transform 0.1s, filter 0.12s, box-shadow 0.12s, background 0.15s;
      font-family: 'Bricolage Grotesque', sans-serif;
    }
    .shop .item:hover  { transform: translate(-2px, -2px); box-shadow: 4px 4px 0 var(--bark); filter: brightness(1.02); }
    .shop .item:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0 var(--bark); }
    .shop .item.active {
      background: linear-gradient(180deg, #ffe8a0, var(--panel));
      border-color: var(--money-d);
      box-shadow: 3px 3px 0 var(--money-d);
    }
    .shop .item:focus-visible { outline: 3px solid var(--rose); outline-offset: 2px; }
    .shop .item:disabled { opacity: 0.45; cursor: not-allowed; }
    .shop .item .ico { font-size: 1.6rem; line-height: 1; text-align: center; }
    .shop .item .meta {
      display: flex; flex-direction: column; gap: 0.1rem;
      min-width: 0;
    }
    .shop .item .name {
      font-weight: 700;
      font-size: 0.95rem;
      color: var(--ink);
      line-height: 1.1;
    }
    .shop .item .desc {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.66rem;
      letter-spacing: 0.06em;
      color: rgba(42,32,10,0.6);
    }
    .shop .item .cost {
      font-family: 'JetBrains Mono', monospace;
      font-weight: 500;
      font-size: 0.85rem;
      color: var(--money-d);
    }
    .shop .help {
      font-family: 'Caveat', cursive;
      font-size: 1rem;
      color: rgba(42,32,10,0.65);
      margin-top: 0.5rem;
      line-height: 1.3;
    }
    .shop .actions { display: flex; gap: 0.4rem; margin-top: 0.5rem; }
    .shop .actions button {
      flex: 1;
      font-family: 'Bricolage Grotesque', sans-serif;
      font-size: 0.78rem;
      font-weight: 700;
      padding: 0.45rem 0.5rem;
      background: var(--panel);
      border: 1.5px solid var(--fence);
      border-radius: 5px;
      cursor: pointer;
      box-shadow: 2px 2px 0 var(--bark);
      letter-spacing: 0.04em;
    }
    .shop .actions button:hover { background: #ffe8a0; }
    .shop .actions button.danger { color: var(--berry); }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition: none !important; }
    }
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">tiny <em>iso zoo</em></div>
    <div class="stats" role="status" aria-live="polite">
      <span><b>$</b> <span class="v cash" id="stat-cash">300</span></span>
      <span><b>VIS</b> <span class="v vis" id="stat-vis">0</span></span>
      <span><b>DAY</b> <span class="v" id="stat-day">1</span></span>
    </div>
  </header>

  <section class="stage" id="stage" aria-label="Zoo construction grid. Click a tool in the shop then click the grid to place.">
    <canvas id="zoo"></canvas>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </section>

  <aside class="shop" aria-label="Construction shop">
    <h2>build</h2>
    <button type="button" class="item" data-tool="path">
      <span class="ico">🛤</span>
      <span class="meta"><span class="name">Path</span><span class="desc">visitors walk here</span></span>
      <span class="cost">$5</span>
    </button>
    <button type="button" class="item" data-tool="habitat">
      <span class="ico">🌳</span>
      <span class="meta"><span class="name">Habitat (3×3)</span><span class="desc">fenced floor for animals</span></span>
      <span class="cost">$60</span>
    </button>
    <button type="button" class="item" data-tool="gate">
      <span class="ico">🚪</span>
      <span class="meta"><span class="name">Gate</span><span class="desc">visitors enter here</span></span>
      <span class="cost">$25</span>
    </button>

    <h2>animals</h2>
    <button type="button" class="item" data-tool="elephant">
      <span class="ico">🐘</span>
      <span class="meta"><span class="name">Elephant</span><span class="desc">gentle · big draw</span></span>
      <span class="cost">$250</span>
    </button>
    <button type="button" class="item" data-tool="raptor">
      <span class="ico">🦖</span>
      <span class="meta"><span class="name">Raptor</span><span class="desc">fast · scary · big tips</span></span>
      <span class="cost">$400</span>
    </button>

    <h2>tools</h2>
    <button type="button" class="item" data-tool="erase">
      <span class="ico">⛔</span>
      <span class="meta"><span class="name">Erase</span><span class="desc">remove tile / animal · 50% refund</span></span>
      <span class="cost">free</span>
    </button>
    <div class="actions">
      <button type="button" id="btn-deselect">deselect</button>
      <button type="button" id="btn-reset" class="danger">reset zoo</button>
    </div>
    <p class="help">click a tool, click the grid. animals must sit on a habitat tile. visitors spawn at a gate and walk paths. earn $ when visitors stand next to a populated habitat.</p>
  </aside>

  <script>
  (function(){
    'use strict';

    // ============================================================
    // ISO GRID + CAMERA
    // ============================================================
    const canvas = document.getElementById('zoo');
    const ctx = canvas.getContext('2d');
    const stage = document.getElementById('stage');
    const GRID_W = 22, GRID_H = 22;
    const TILE_W = 56, TILE_H = 28;       // 2:1 iso diamond
    const TILE_DEPTH = 8;                  // raised tile thickness
    let camX = 0, camY = 0;                 // screen offset of (0,0) tile-center
    let W = 800, H = 500;
    function resize() {
      const r = stage.getBoundingClientRect();
      const dpr = Math.min(2, window.devicePixelRatio || 1);
      W = Math.floor(r.width);
      H = Math.floor(r.height);
      canvas.width  = W * dpr;
      canvas.height = H * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.imageSmoothingEnabled = false;
      // Center camera on the grid
      camX = W / 2;
      camY = H * 0.35;
    }
    window.addEventListener('resize', resize, { passive: true });
    resize();

    // World ↔ screen helpers
    function tileToScreen(tx, ty) {
      const cx = (tx - ty) * (TILE_W / 2) + camX;
      const cy = (tx + ty) * (TILE_H / 2) + camY;
      return { x: cx, y: cy };
    }
    function screenToTile(sx, sy) {
      const dx = (sx - camX) / (TILE_W / 2);
      const dy = (sy - camY) / (TILE_H / 2);
      return { tx: Math.floor((dx + dy) / 2), ty: Math.floor((dy - dx) / 2) };
    }

    // ============================================================
    // WORLD STATE
    // ============================================================
    const TILE_GRASS    = 0;
    const TILE_PATH     = 1;
    const TILE_HABITAT  = 2;
    const TILE_GATE     = 3;
    const tiles = [];
    for (let y = 0; y < GRID_H; y++) {
      tiles.push(new Array(GRID_W).fill(TILE_GRASS));
    }
    // Seed a deterministic-but-natural-looking sprinkling of tree/rock decor
    const decor = [];   // {tx, ty, kind: 'tree' | 'rock' | 'bush'}
    function seedDecor() {
      decor.length = 0;
      for (let y = 0; y < GRID_H; y++) {
        for (let x = 0; x < GRID_W; x++) {
          const r = (x * 31 + y * 17) % 100;
          if (r < 6) decor.push({ tx: x, ty: y, kind: 'tree' });
          else if (r < 10) decor.push({ tx: x, ty: y, kind: 'rock' });
          else if (r < 14) decor.push({ tx: x, ty: y, kind: 'bush' });
        }
      }
    }
    seedDecor();
    function decorAt(tx, ty) {
      return decor.find(d => d.tx === tx && d.ty === ty);
    }
    function removeDecorAt(tx, ty) {
      const i = decor.findIndex(d => d.tx === tx && d.ty === ty);
      if (i >= 0) decor.splice(i, 1);
    }

    const animals = [];   // {tx, ty, kind, vx, vy, bob, baseX, baseY}
    const visitors = [];  // {x, y, vx, vy, t, color, lifespan, mood}
    let cash = 300;
    let day = 1;
    let dayProg = 0;       // 0..1 of day
    let nextSpawn = 0;     // ms timestamp
    let selectedTool = null;
    let hoverTile = null;  // {tx, ty}

    // ============================================================
    // TOOL DEFINITIONS
    // ============================================================
    const COSTS = {
      path: 5,
      habitat: 60,
      gate: 25,
      elephant: 250,
      raptor: 400,
      erase: 0
    };
    function canAfford(t) { return cash >= COSTS[t]; }

    // ============================================================
    // PLACEMENT
    // ============================================================
    function inBounds(tx, ty) { return tx >= 0 && ty >= 0 && tx < GRID_W && ty < GRID_H; }
    function isHabitatAt(tx, ty) {
      return inBounds(tx, ty) && tiles[ty][tx] === TILE_HABITAT;
    }
    function animalAt(tx, ty) {
      return animals.find(a => a.tx === tx && a.ty === ty);
    }

    function placeAt(tx, ty) {
      if (!selectedTool || !inBounds(tx, ty)) return;
      const t = selectedTool;
      if (t === 'erase') {
        // Remove animal first if present, else clear tile back to grass.
        // Refund 50% of original cost.
        const an = animalAt(tx, ty);
        if (an) {
          cash += Math.floor(COSTS[an.kind] * 0.5);
          animals.splice(animals.indexOf(an), 1);
          updateStats();
          toast('removed ' + an.kind);
          return;
        }
        const cur = tiles[ty][tx];
        if (cur !== TILE_GRASS) {
          // refund based on tile kind
          let refund = 0;
          if (cur === TILE_PATH) refund = Math.floor(COSTS.path * 0.5);
          else if (cur === TILE_HABITAT) refund = Math.floor(COSTS.habitat * 0.5 / 9);
          else if (cur === TILE_GATE) refund = Math.floor(COSTS.gate * 0.5);
          cash += refund;
          tiles[ty][tx] = TILE_GRASS;
          updateStats();
        }
        return;
      }
      if (t === 'elephant' || t === 'raptor') {
        if (!isHabitatAt(tx, ty)) { toast('animals need a habitat tile'); return; }
        if (animalAt(tx, ty)) { toast('tile occupied'); return; }
        if (!canAfford(t)) { toast('not enough cash'); return; }
        cash -= COSTS[t];
        const baseS = tileToScreen(tx + 0.5, ty + 0.5);
        animals.push({
          tx, ty, kind: t,
          baseX: baseS.x, baseY: baseS.y,
          bob: Math.random() * Math.PI * 2,
          wx: 0, wy: 0,             // pixel offset from base, for wander
          wTarget: { x: 0, y: 0 },
          wT: 0
        });
        updateStats();
        toast('added ' + t);
        return;
      }
      if (t === 'path') {
        if (tiles[ty][tx] === TILE_PATH) return;
        if (tiles[ty][tx] === TILE_HABITAT) { toast('cannot path through habitat'); return; }
        if (!canAfford('path')) { toast('not enough cash'); return; }
        cash -= COSTS.path;
        tiles[ty][tx] = TILE_PATH;
        removeDecorAt(tx, ty);
        updateStats();
        return;
      }
      if (t === 'gate') {
        if (tiles[ty][tx] === TILE_GATE) return;
        if (tiles[ty][tx] === TILE_HABITAT) { toast('cannot place gate on habitat'); return; }
        if (!canAfford('gate')) { toast('not enough cash'); return; }
        cash -= COSTS.gate;
        tiles[ty][tx] = TILE_GATE;
        removeDecorAt(tx, ty);
        updateStats();
        return;
      }
      if (t === 'habitat') {
        // 3x3 area starting at tx,ty (anchor = top-left)
        for (let yy = ty; yy < ty + 3; yy++) {
          for (let xx = tx; xx < tx + 3; xx++) {
            if (!inBounds(xx, yy)) { toast('does not fit'); return; }
          }
        }
        if (!canAfford('habitat')) { toast('not enough cash'); return; }
        cash -= COSTS.habitat;
        for (let yy = ty; yy < ty + 3; yy++) {
          for (let xx = tx; xx < tx + 3; xx++) {
            tiles[yy][xx] = TILE_HABITAT;
            removeDecorAt(xx, yy);
          }
        }
        updateStats();
      }
    }

    // ============================================================
    // VISITOR SPAWN + AI
    // ============================================================
    function nearestGate() {
      for (let y = 0; y < GRID_H; y++) {
        for (let x = 0; x < GRID_W; x++) {
          if (tiles[y][x] === TILE_GATE) return { tx: x, ty: y };
        }
      }
      return null;
    }
    function spawnVisitor() {
      const g = nearestGate();
      if (!g) return;
      const s = tileToScreen(g.tx + 0.5, g.ty + 0.5);
      const colors = ['#e85a78', '#5a8eee', '#f4cb6a', '#7ac874', '#c44ad4', '#f6a23a'];
      visitors.push({
        x: s.x, y: s.y,
        vx: (Math.random() - 0.5) * 30,
        vy: (Math.random() - 0.5) * 30,
        color: colors[Math.floor(Math.random() * colors.length)],
        t: 0, life: 45 + Math.random() * 20,
        mood: 0,
        wanderT: 0,
        target: null
      });
    }
    function updateVisitors(dt) {
      for (let i = visitors.length - 1; i >= 0; i--) {
        const v = visitors[i];
        v.t += dt;
        if (v.t >= v.life) { visitors.splice(i, 1); continue; }
        // Choose a wander target on a path tile every ~3s; otherwise
        // wander toward the nearest path or habitat boundary.
        v.wanderT -= dt;
        if (v.wanderT <= 0 || !v.target) {
          v.target = chooseVisitorTarget();
          v.wanderT = 3 + Math.random() * 4;
        }
        if (v.target) {
          const dx = v.target.x - v.x, dy = v.target.y - v.y;
          const d = Math.hypot(dx, dy);
          if (d > 4) {
            const sp = 24;
            v.vx = (dx / d) * sp;
            v.vy = (dy / d) * sp;
          } else {
            v.vx *= 0.85; v.vy *= 0.85;
          }
        }
        v.x += v.vx * dt;
        v.y += v.vy * dt;
        // Did we just stop next to a populated habitat? Earn $.
        const tile = screenToTile(v.x, v.y);
        const adjAnimal = anyAnimalNearTile(tile.tx, tile.ty, 2);
        if (adjAnimal) {
          v.mood += dt;
          if (v.mood >= 1) {
            v.mood = 0;
            const pay = adjAnimal.kind === 'raptor' ? 4 : 2;
            cash += pay;
            updateStats();
            // pop a tiny + label
            popLabel(v.x, v.y - 18, '+$' + pay, '#2a8a3a');
          }
        }
      }
    }
    function chooseVisitorTarget() {
      // Prefer a tile that's on a path AND adjacent to a habitat with animal.
      const candidates = [];
      for (let y = 0; y < GRID_H; y++) {
        for (let x = 0; x < GRID_W; x++) {
          if (tiles[y][x] !== TILE_PATH) continue;
          if (anyAnimalNearTile(x, y, 1)) candidates.push({ tx: x, ty: y, prio: 2 });
          else candidates.push({ tx: x, ty: y, prio: 1 });
        }
      }
      // Also gate tiles
      for (let y = 0; y < GRID_H; y++) {
        for (let x = 0; x < GRID_W; x++) {
          if (tiles[y][x] === TILE_GATE) candidates.push({ tx: x, ty: y, prio: 0.5 });
        }
      }
      if (!candidates.length) return null;
      // Weighted random pick (prioritize 2× over 1×)
      const totalW = candidates.reduce((s, c) => s + c.prio, 0);
      let r = Math.random() * totalW;
      for (const c of candidates) {
        r -= c.prio;
        if (r <= 0) {
          const s = tileToScreen(c.tx + 0.5, c.ty + 0.5);
          return { x: s.x, y: s.y, tile: c };
        }
      }
      return null;
    }
    function anyAnimalNearTile(tx, ty, range) {
      return animals.find(a => Math.abs(a.tx - tx) <= range && Math.abs(a.ty - ty) <= range);
    }

    // ============================================================
    // RENDER
    // ============================================================
    function drawTile(tx, ty) {
      const s = tileToScreen(tx, ty);
      const kind = tiles[ty][tx];
      // Diamond outline points (with depth)
      const pts = [
        { x: s.x,             y: s.y - TILE_H / 2 },  // top
        { x: s.x + TILE_W / 2, y: s.y },              // right
        { x: s.x,             y: s.y + TILE_H / 2 },  // bottom
        { x: s.x - TILE_W / 2, y: s.y }               // left
      ];
      // Side faces (depth)
      ctx.fillStyle = '#3e6028';
      ctx.beginPath();
      ctx.moveTo(pts[1].x, pts[1].y);
      ctx.lineTo(pts[1].x, pts[1].y + TILE_DEPTH);
      ctx.lineTo(pts[2].x, pts[2].y + TILE_DEPTH);
      ctx.lineTo(pts[2].x, pts[2].y);
      ctx.closePath();
      ctx.fill();
      ctx.fillStyle = '#2e4e1c';
      ctx.beginPath();
      ctx.moveTo(pts[3].x, pts[3].y);
      ctx.lineTo(pts[3].x, pts[3].y + TILE_DEPTH);
      ctx.lineTo(pts[2].x, pts[2].y + TILE_DEPTH);
      ctx.lineTo(pts[2].x, pts[2].y);
      ctx.closePath();
      ctx.fill();
      // Top face — color by tile kind
      let topFill = '#79a850';      // grass
      let altCheck = null;
      if (kind === TILE_PATH)     { topFill = '#d4c08a'; altCheck = '#c4a878'; }
      else if (kind === TILE_HABITAT) { topFill = '#a48050'; altCheck = '#8a6840'; }
      else if (kind === TILE_GATE) { topFill = '#5e8a3e'; }
      // Grass has subtle checker variant
      else if (((tx + ty) % 2) === 0) topFill = '#7eaf55';
      ctx.fillStyle = topFill;
      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      ctx.lineTo(pts[1].x, pts[1].y);
      ctx.lineTo(pts[2].x, pts[2].y);
      ctx.lineTo(pts[3].x, pts[3].y);
      ctx.closePath();
      ctx.fill();
      if (altCheck) {
        // Small darker speck for texture
        ctx.fillStyle = altCheck;
        ctx.fillRect(s.x - 2, s.y - 1, 4, 2);
      }
      // Outline
      ctx.strokeStyle = 'rgba(0,0,0,0.18)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      ctx.lineTo(pts[1].x, pts[1].y);
      ctx.lineTo(pts[2].x, pts[2].y);
      ctx.lineTo(pts[3].x, pts[3].y);
      ctx.closePath();
      ctx.stroke();
      // Gate marker
      if (kind === TILE_GATE) {
        ctx.fillStyle = '#5a3a1c';
        ctx.fillRect(s.x - 8, s.y - 14, 4, 12);
        ctx.fillRect(s.x + 4, s.y - 14, 4, 12);
        ctx.fillStyle = '#c44a4a';
        ctx.fillRect(s.x - 8, s.y - 14, 16, 4);
      }
    }

    function drawDecor() {
      for (const d of decor) {
        const cur = tiles[d.ty][d.tx];
        if (cur !== TILE_GRASS) continue;     // covered by build
        const s = tileToScreen(d.tx + 0.5, d.ty + 0.5);
        if (d.kind === 'tree') {
          // Trunk
          ctx.fillStyle = '#5a3a1c';
          ctx.fillRect(s.x - 2, s.y - 8, 4, 10);
          // Foliage
          ctx.fillStyle = '#3e6e2c';
          ctx.beginPath();
          ctx.arc(s.x, s.y - 14, 10, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#5a8a3e';
          ctx.beginPath();
          ctx.arc(s.x - 3, s.y - 16, 5, 0, Math.PI * 2);
          ctx.fill();
        } else if (d.kind === 'rock') {
          ctx.fillStyle = '#8a8a8a';
          ctx.beginPath();
          ctx.ellipse(s.x, s.y - 2, 6, 4, 0, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = '#aaaaaa';
          ctx.fillRect(s.x - 4, s.y - 3, 2, 1);
        } else { // bush
          ctx.fillStyle = '#4e7a3a';
          ctx.beginPath();
          ctx.arc(s.x - 3, s.y - 4, 4, 0, Math.PI * 2);
          ctx.arc(s.x + 3, s.y - 4, 4, 0, Math.PI * 2);
          ctx.arc(s.x,     s.y - 6, 4, 0, Math.PI * 2);
          ctx.fill();
        }
      }
    }

    function drawAnimal(a, now) {
      const cx = a.baseX + a.wx;
      const cy = a.baseY + a.wy;
      const bob = Math.sin(a.bob + now * 0.004) * 1.5;
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.beginPath();
      ctx.ellipse(cx, cy + 6, 10, 3, 0, 0, Math.PI * 2);
      ctx.fill();
      if (a.kind === 'elephant') {
        // Big gray body
        ctx.fillStyle = '#9aa0a8';
        ctx.beginPath();
        ctx.ellipse(cx, cy - 5 + bob, 11, 8, 0, 0, Math.PI * 2);
        ctx.fill();
        // Head
        ctx.fillStyle = '#b8bcc0';
        ctx.beginPath();
        ctx.ellipse(cx + 8, cy - 6 + bob, 5, 5, 0, 0, Math.PI * 2);
        ctx.fill();
        // Trunk
        ctx.strokeStyle = '#9aa0a8';
        ctx.lineWidth = 2.5;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(cx + 12, cy - 6 + bob);
        ctx.quadraticCurveTo(cx + 16, cy - 2 + bob, cx + 13, cy + 2 + bob);
        ctx.stroke();
        // Ear
        ctx.fillStyle = '#7a8088';
        ctx.beginPath();
        ctx.ellipse(cx + 5, cy - 8 + bob, 3, 4, -0.4, 0, Math.PI * 2);
        ctx.fill();
        // Eye
        ctx.fillStyle = '#1a140a';
        ctx.fillRect(Math.round(cx + 8), Math.round(cy - 7 + bob), 1, 1);
        // Tusk
        ctx.fillStyle = '#fff4dc';
        ctx.fillRect(Math.round(cx + 11), Math.round(cy - 3 + bob), 2, 1);
      } else if (a.kind === 'raptor') {
        // Tail + back
        ctx.strokeStyle = '#c46a3a';
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(cx - 10, cy + bob);
        ctx.lineTo(cx + 5, cy - 4 + bob);
        ctx.stroke();
        // Body
        ctx.fillStyle = '#a85020';
        ctx.beginPath();
        ctx.ellipse(cx, cy - 4 + bob, 7, 4, 0.3, 0, Math.PI * 2);
        ctx.fill();
        // Head
        ctx.fillStyle = '#c46a3a';
        ctx.beginPath();
        ctx.ellipse(cx + 7, cy - 8 + bob, 4, 3, -0.4, 0, Math.PI * 2);
        ctx.fill();
        // Snout
        ctx.fillStyle = '#a85020';
        ctx.fillRect(Math.round(cx + 9), Math.round(cy - 7 + bob), 4, 2);
        // Eye
        ctx.fillStyle = '#ffd44a';
        ctx.fillRect(Math.round(cx + 8), Math.round(cy - 8 + bob), 1, 1);
        // Legs
        ctx.strokeStyle = '#7a3a14';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(cx + 2, cy + bob); ctx.lineTo(cx + 1, cy + 5 + bob);
        ctx.moveTo(cx - 2, cy + bob); ctx.lineTo(cx - 3, cy + 5 + bob);
        ctx.stroke();
        // Claw (foot)
        ctx.fillStyle = '#fff4dc';
        ctx.fillRect(Math.round(cx), Math.round(cy + 5 + bob), 1, 1);
      }
    }

    function drawVisitor(v) {
      const cx = v.x, cy = v.y;
      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.beginPath();
      ctx.ellipse(cx, cy + 4, 4, 1.5, 0, 0, Math.PI * 2);
      ctx.fill();
      // Body
      ctx.fillStyle = v.color;
      ctx.fillRect(Math.round(cx - 2), Math.round(cy - 4), 4, 6);
      // Head
      ctx.fillStyle = '#f4d8b0';
      ctx.fillRect(Math.round(cx - 1.5), Math.round(cy - 8), 3, 3);
      // Hat — small dot of contrasting color
      ctx.fillStyle = '#1a140a';
      ctx.fillRect(Math.round(cx - 1.5), Math.round(cy - 9), 3, 1);
    }

    // Labels (e.g. "+$2") that float up
    const labels = [];
    function popLabel(x, y, text, color) {
      labels.push({ x, y, text, color, age: 0 });
    }
    function tickLabels(dt) {
      for (let i = labels.length - 1; i >= 0; i--) {
        const L = labels[i];
        L.age += dt;
        if (L.age >= 1.2) { labels.splice(i, 1); continue; }
        L.y -= dt * 22;
      }
    }
    function drawLabels() {
      for (const L of labels) {
        const a = Math.max(0, 1 - L.age / 1.2);
        ctx.globalAlpha = a;
        ctx.font = 'bold 12px "Bricolage Grotesque", sans-serif';
        ctx.textAlign = 'center';
        ctx.fillStyle = '#1a140a';
        ctx.fillText(L.text, L.x + 1, L.y + 1);
        ctx.fillStyle = L.color;
        ctx.fillText(L.text, L.x, L.y);
        ctx.globalAlpha = 1;
      }
    }

    // Hover highlight + ghost preview
    function drawHover() {
      if (!hoverTile || !inBounds(hoverTile.tx, hoverTile.ty) || !selectedTool) return;
      const s = tileToScreen(hoverTile.tx, hoverTile.ty);
      // Highlight diamond
      const pts = [
        { x: s.x,             y: s.y - TILE_H / 2 },
        { x: s.x + TILE_W / 2, y: s.y },
        { x: s.x,             y: s.y + TILE_H / 2 },
        { x: s.x - TILE_W / 2, y: s.y }
      ];
      ctx.save();
      let okColor = '#5eff8a';
      let okFill  = 'rgba(94,255,138,0.22)';
      // Disqualify some cases
      if (selectedTool === 'elephant' || selectedTool === 'raptor') {
        if (!isHabitatAt(hoverTile.tx, hoverTile.ty)) {
          okColor = '#e85a78'; okFill = 'rgba(232,90,120,0.22)';
        }
      }
      ctx.fillStyle = okFill;
      ctx.beginPath();
      ctx.moveTo(pts[0].x, pts[0].y);
      ctx.lineTo(pts[1].x, pts[1].y);
      ctx.lineTo(pts[2].x, pts[2].y);
      ctx.lineTo(pts[3].x, pts[3].y);
      ctx.closePath();
      ctx.fill();
      ctx.strokeStyle = okColor;
      ctx.lineWidth = 2;
      ctx.stroke();
      // 3x3 ghost for habitat
      if (selectedTool === 'habitat') {
        for (let yy = hoverTile.ty; yy < hoverTile.ty + 3; yy++) {
          for (let xx = hoverTile.tx; xx < hoverTile.tx + 3; xx++) {
            if (xx === hoverTile.tx && yy === hoverTile.ty) continue;
            if (!inBounds(xx, yy)) continue;
            const s2 = tileToScreen(xx, yy);
            const p2 = [
              { x: s2.x,             y: s2.y - TILE_H / 2 },
              { x: s2.x + TILE_W / 2, y: s2.y },
              { x: s2.x,             y: s2.y + TILE_H / 2 },
              { x: s2.x - TILE_W / 2, y: s2.y }
            ];
            ctx.fillStyle = 'rgba(94,255,138,0.16)';
            ctx.beginPath();
            ctx.moveTo(p2[0].x, p2[0].y);
            ctx.lineTo(p2[1].x, p2[1].y);
            ctx.lineTo(p2[2].x, p2[2].y);
            ctx.lineTo(p2[3].x, p2[3].y);
            ctx.closePath();
            ctx.fill();
          }
        }
      }
      ctx.restore();
    }

    // ============================================================
    // RENDER LOOP
    // ============================================================
    let lastT = performance.now();
    function loop(now) {
      const dt = Math.min(0.05, (now - lastT) / 1000);
      lastT = now;
      // Update
      updateAnimals(dt);
      updateVisitors(dt);
      tickLabels(dt);
      // Day clock + visitor spawn
      dayProg += dt / 30;       // 30s per "day"
      if (dayProg >= 1) {
        dayProg = 0;
        day += 1;
        updateStats();
      }
      if (performance.now() >= nextSpawn) {
        // Only spawn if at least one gate + one path tile exists
        if (nearestGate()) spawnVisitor();
        nextSpawn = performance.now() + 4500 + Math.random() * 3500;
      }
      // Draw
      ctx.fillStyle = '#c6d8a8';
      ctx.fillRect(0, 0, W, H);
      // Tiles back-to-front (y+x sort for iso)
      for (let s = 0; s <= (GRID_W + GRID_H - 2); s++) {
        for (let ty = 0; ty <= s; ty++) {
          const tx = s - ty;
          if (!inBounds(tx, ty)) continue;
          drawTile(tx, ty);
        }
      }
      drawDecor();
      // Animals + visitors mixed and depth-sorted by their world-y
      const sortable = [];
      animals.forEach(a => sortable.push({ s: 'a', y: a.baseY + a.wy, ref: a }));
      visitors.forEach(v => sortable.push({ s: 'v', y: v.y, ref: v }));
      sortable.sort((a, b) => a.y - b.y);
      for (const ent of sortable) {
        if (ent.s === 'a') drawAnimal(ent.ref, now);
        else drawVisitor(ent.ref);
      }
      drawHover();
      drawLabels();
      requestAnimationFrame(loop);
    }
    function updateAnimals(dt) {
      for (const a of animals) {
        a.bob += dt * 1.7;
        a.wT -= dt;
        if (a.wT <= 0) {
          a.wTarget = { x: (Math.random() - 0.5) * 14, y: (Math.random() - 0.5) * 8 };
          a.wT = 2 + Math.random() * 2;
        }
        a.wx += (a.wTarget.x - a.wx) * 0.04;
        a.wy += (a.wTarget.y - a.wy) * 0.04;
      }
    }
    requestAnimationFrame(loop);

    // ============================================================
    // INPUT
    // ============================================================
    function eventToTile(e) {
      const r = canvas.getBoundingClientRect();
      const sx = (e.clientX - r.left) * (W / r.width);
      const sy = (e.clientY - r.top)  * (H / r.height);
      return screenToTile(sx, sy);
    }
    canvas.addEventListener('mousemove', e => { hoverTile = eventToTile(e); });
    canvas.addEventListener('mouseleave', () => { hoverTile = null; });
    canvas.addEventListener('pointerdown', e => {
      const t = eventToTile(e);
      placeAt(t.tx, t.ty);
    });

    // ============================================================
    // SHOP UI
    // ============================================================
    document.querySelectorAll('.shop .item').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.shop .item').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        selectedTool = btn.dataset.tool;
      });
    });
    document.getElementById('btn-deselect').addEventListener('click', () => {
      document.querySelectorAll('.shop .item').forEach(b => b.classList.remove('active'));
      selectedTool = null;
    });
    document.getElementById('btn-reset').addEventListener('click', () => {
      if (!confirm('Bulldoze the entire zoo?')) return;
      for (let y = 0; y < GRID_H; y++) for (let x = 0; x < GRID_W; x++) tiles[y][x] = TILE_GRASS;
      animals.length = 0;
      visitors.length = 0;
      seedDecor();
      cash = 300; day = 1; dayProg = 0;
      updateStats();
      toast('zoo reset');
    });

    // ============================================================
    // HUD
    // ============================================================
    const elCash = document.getElementById('stat-cash');
    const elVis  = document.getElementById('stat-vis');
    const elDay  = document.getElementById('stat-day');
    function updateStats() {
      elCash.textContent = cash;
      elVis.textContent  = visitors.length;
      elDay.textContent  = day;
    }
    setInterval(updateStats, 600);
    updateStats();

    // Toast
    const toastEl = document.getElementById('toast');
    let toastTimer = null;
    function toast(msg) {
      toastEl.textContent = msg;
      toastEl.classList.add('visible');
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toastEl.classList.remove('visible'), 1800);
    }
  })();
  </script>
</body>
</html>
