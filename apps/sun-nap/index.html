<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sun Nap</title>
<link rel="icon" href="https://emojicdn.elk.sh/☀️">
<meta property="og:title" content="Sun Nap">
<meta property="og:description" content="Track sunbeams across a room to find the perfect napping spot.">
<meta property="og:url" content="https://sloppy.live/sun-nap">
<meta property="og:image" content="https://sloppy.live/sun-nap/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Red+Hat+Mono:wght@300;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f8f2e8;--floor:#e8dcc8;--wall:#c8b898;--wood:#8a7050;
  --sun:#f0c830;--beam:rgba(255,220,80,0.18);--shadow:rgba(60,40,20,0.12);
  --text:#5a4a30;--dim:#9a8a68;--accent:#d4a020;--night:#1a1828;
}
body{background:var(--bg);color:var(--text);font-family:'Red Hat Mono',monospace;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  overflow-x:hidden;user-select:none}

#header{padding:14px 20px;text-align:center;width:100%}
#header h1{font-family:'Playfair Display',serif;font-weight:900;
  font-size:clamp(18px,3vw,28px);color:var(--text);letter-spacing:1px}
#header .sub{font-weight:300;font-size:10px;color:var(--dim);letter-spacing:2px;margin-top:2px}

#room-wrap{position:relative;width:clamp(300px,90vw,700px);
  aspect-ratio:1.4/1;margin:8px auto}
canvas{display:block;width:100%;height:100%;border-radius:6px;
  box-shadow:0 4px 20px rgba(60,40,20,0.12);cursor:crosshair}

#controls{display:flex;align-items:center;gap:12px;padding:10px 16px;
  width:clamp(300px,90vw,700px);flex-wrap:wrap;justify-content:center}
#time-display{font-family:'Playfair Display',serif;font-weight:700;
  font-size:clamp(16px,2.5vw,22px);color:var(--accent);min-width:70px;text-align:center}
#time-slider{flex:1;min-width:120px;-webkit-appearance:none;appearance:none;
  height:4px;background:linear-gradient(90deg,#2a2040,#d4a020,#f0c830,#d4a020,#2a2040);
  border-radius:2px;outline:none}
#time-slider::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;
  border-radius:50%;background:var(--sun);border:2px solid #fff;cursor:grab;
  box-shadow:0 0 8px rgba(240,200,48,0.4)}
#play-btn{padding:4px 12px;background:none;border:1px solid var(--dim);
  border-radius:3px;color:var(--text);font-family:'Red Hat Mono',monospace;
  font-size:11px;cursor:pointer;letter-spacing:1px;font-weight:500}
#play-btn:hover{border-color:var(--accent);color:var(--accent)}
#play-btn.playing{background:var(--accent);color:#fff;border-color:var(--accent)}

#info-bar{display:flex;gap:16px;padding:6px 16px;font-size:10px;
  color:var(--dim);letter-spacing:1px;flex-wrap:wrap;justify-content:center;
  width:clamp(300px,90vw,700px)}
#info-bar span{white-space:nowrap}

#score-panel{padding:8px 16px;text-align:center;width:clamp(300px,90vw,700px)}
#nap-score{font-family:'Playfair Display',serif;font-weight:900;
  font-size:clamp(14px,2vw,20px);color:var(--accent)}
#nap-hint{font-weight:300;font-size:10px;color:var(--dim);letter-spacing:1px;margin-top:2px}

#legend{display:flex;gap:10px;padding:4px 16px;font-size:9px;color:var(--dim);
  letter-spacing:1px;flex-wrap:wrap;justify-content:center}
.legend-item{display:flex;align-items:center;gap:3px}
.legend-dot{width:8px;height:8px;border-radius:2px}
</style>
</head>
<body>

<div id="header">
  <h1>☀️ SUN NAP</h1>
  <div class="sub">FIND THE PERFECT SLEEPING SPOT</div>
</div>

<div id="room-wrap"><canvas id="c"></canvas></div>

<div id="controls">
  <div id="time-display">12:00</div>
  <input type="range" id="time-slider" min="0" max="1440" value="720" step="1">
  <button id="play-btn" onclick="togglePlay()">▶ PLAY</button>
</div>

<div id="info-bar">
  <span>☀️ SUN ALT: <b id="sun-alt">45°</b></span>
  <span>🧭 AZIMUTH: <b id="sun-az">180°</b></span>
  <span>💤 NAPS PLACED: <b id="nap-count">0</b></span>
</div>

<div id="score-panel">
  <div id="nap-score">Click the floor to place a nap spot</div>
  <div id="nap-hint">drag the time slider to see sunbeams move</div>
</div>

<div id="legend">
  <div class="legend-item"><div class="legend-dot" style="background:#f0c830"></div> SUNBEAM</div>
  <div class="legend-item"><div class="legend-dot" style="background:rgba(60,40,20,0.3)"></div> SHADOW</div>
  <div class="legend-item"><div class="legend-dot" style="background:#e07878"></div> NAP SPOT</div>
  <div class="legend-item"><div class="legend-dot" style="background:#60a060"></div> HEATMAP</div>
</div>

<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
const DPR = Math.min(window.devicePixelRatio||1, 2);
let W, H, RW, RH;

function resize(){
  const rect = C.parentElement.getBoundingClientRect();
  W = Math.floor(rect.width * DPR);
  H = Math.floor(rect.height * DPR);
  C.width = W; C.height = H;
  RW = W; RH = H;
  draw();
}
resize();
window.addEventListener('resize', resize);

// === ROOM LAYOUT ===
// Room is a rectangle with walls. Coordinates in 0-1 normalized space.
const ROOM = { x:0.05, y:0.05, w:0.9, h:0.9 };

// Windows (on walls) — position along wall, width
const WINDOWS = [
  { wall:'top',    pos:0.15, width:0.25 },  // top-left window
  { wall:'top',    pos:0.6,  width:0.3 },   // top-right window
  { wall:'right',  pos:0.3,  width:0.35 },  // right window
];

// Furniture (rectangles that block light)
const FURNITURE = [
  { x:0.12, y:0.15, w:0.18, h:0.12, label:'Desk',   color:'#7a6040' },
  { x:0.70, y:0.12, w:0.20, h:0.14, label:'Shelf',   color:'#6a5838' },
  { x:0.15, y:0.55, w:0.22, h:0.18, label:'Couch',   color:'#5a6a70' },
  { x:0.55, y:0.60, w:0.12, h:0.12, label:'Table',   color:'#8a7050' },
  { x:0.72, y:0.50, w:0.15, h:0.22, label:'Bed',     color:'#887098' },
  { x:0.38, y:0.30, w:0.08, h:0.08, label:'Plant',   color:'#408840' },
];

// === STATE ===
let timeMinutes = 720; // noon
let playing = false;
let napSpots = [];
let heatmap = null;
let heatmapRes = 40;

function initHeatmap(){
  heatmap = new Float32Array(heatmapRes * heatmapRes);
}
initHeatmap();

// === SUN POSITION ===
function getSunPos(minutes){
  // Simplified sun arc: rises at 6:00 (360), sets at 20:00 (1200)
  const sunrise = 360, sunset = 1200;
  const dayLen = sunset - sunrise;
  const t = Math.max(0, Math.min(1, (minutes - sunrise) / dayLen));

  // Altitude: parabolic arc peaking at solar noon
  const altitude = Math.sin(t * Math.PI) * 72; // max 72°

  // Azimuth: east (90°) to west (270°) through south (180°)
  const azimuth = 90 + t * 180;

  return { altitude: Math.max(0, altitude), azimuth, t, isDark: altitude <= 0 };
}

// === SUNBEAM CASTING ===
function getBeamPolygons(sun){
  if(sun.isDark || sun.altitude <= 0) return [];

  const beams = [];
  const az = sun.azimuth * Math.PI / 180;
  const alt = sun.altitude * Math.PI / 180;

  // Sun direction vector (projected onto floor)
  const dirX = -Math.sin(az) * Math.cos(alt);
  const dirY = -Math.cos(az) * Math.cos(alt);
  // How far light penetrates based on altitude (low sun = long beams)
  const penetration = Math.min(0.6, 0.08 / Math.tan(alt + 0.01));

  for(const win of WINDOWS){
    let wx1, wy1, wx2, wy2; // window endpoints in room coords
    let nx, ny; // inward normal

    if(win.wall === 'top'){
      wx1 = ROOM.x + win.pos * ROOM.w;
      wx2 = wx1 + win.width * ROOM.w;
      wy1 = wy2 = ROOM.y;
      nx = 0; ny = 1;
    } else if(win.wall === 'right'){
      wx1 = wx2 = ROOM.x + ROOM.w;
      wy1 = ROOM.y + win.pos * ROOM.h;
      wy2 = wy1 + win.width * ROOM.h;
      nx = -1; ny = 0;
    } else if(win.wall === 'bottom'){
      wx1 = ROOM.x + win.pos * ROOM.w;
      wx2 = wx1 + win.width * ROOM.w;
      wy1 = wy2 = ROOM.y + ROOM.h;
      nx = 0; ny = -1;
    } else { // left
      wx1 = wx2 = ROOM.x;
      wy1 = ROOM.y + win.pos * ROOM.h;
      wy2 = wy1 + win.width * ROOM.h;
      nx = 1; ny = 0;
    }

    // Check if sun is shining through this window (dot product with normal)
    const dot = dirX * nx + dirY * ny;
    if(dot <= 0) continue; // sun behind wall

    // Project beam polygon
    const pen = penetration * dot * 3;
    const bx1 = wx1 + dirX * pen;
    const by1 = wy1 + dirY * pen;
    const bx2 = wx2 + dirX * pen;
    const by2 = wy2 + dirY * pen;

    beams.push({
      poly: [
        {x:wx1, y:wy1}, {x:wx2, y:wy2},
        {x:bx2, y:by2}, {x:bx1, y:by1},
      ],
      intensity: Math.sin(alt) * 0.8 + 0.2,
    });
  }

  return beams;
}

function pointInPoly(px, py, poly){
  let inside = false;
  for(let i=0, j=poly.length-1; i<poly.length; j=i++){
    const xi=poly[i].x, yi=poly[i].y, xj=poly[j].x, yj=poly[j].y;
    if((yi>py)!==(yj>py) && px<(xj-xi)*(py-yi)/(yj-yi)+xi) inside=!inside;
  }
  return inside;
}

function pointInFurniture(px, py){
  for(const f of FURNITURE){
    if(px>=f.x && px<=f.x+f.w && py>=f.y && py<=f.y+f.h) return true;
  }
  return false;
}

function pointInSunlight(px, py, beams){
  if(pointInFurniture(px, py)) return false;
  for(const b of beams){
    if(pointInPoly(px, py, b.poly)) return true;
  }
  return false;
}

// === HEATMAP ===
function computeHeatmap(){
  heatmap.fill(0);
  const steps = 48; // sample every 30 min
  for(let s=0; s<steps; s++){
    const m = 360 + (s/steps) * 840; // 6:00 to 20:00
    const sun = getSunPos(m);
    if(sun.isDark) continue;
    const beams = getBeamPolygons(sun);

    for(let gy=0; gy<heatmapRes; gy++){
      for(let gx=0; gx<heatmapRes; gx++){
        const px = ROOM.x + (gx+0.5)/heatmapRes * ROOM.w;
        const py = ROOM.y + (gy+0.5)/heatmapRes * ROOM.h;
        if(pointInFurniture(px, py)) continue;
        if(pointInSunlight(px, py, beams)){
          heatmap[gy*heatmapRes+gx] += 1/steps;
        }
      }
    }
  }
}
computeHeatmap();

// === NAP SCORING ===
function scoreNapSpot(nx, ny){
  // Sample sun exposure over the day
  let sunMinutes = 0;
  const steps = 48;
  for(let s=0; s<steps; s++){
    const m = 360 + (s/steps) * 840;
    const sun = getSunPos(m);
    if(sun.isDark) continue;
    const beams = getBeamPolygons(sun);
    if(pointInSunlight(nx, ny, beams)) sunMinutes += 840/steps;
  }
  return { sunMinutes: Math.round(sunMinutes), rating: getNapRating(sunMinutes) };
}

function getNapRating(mins){
  if(mins >= 300) return { text:'SOLAR OVERLOAD', emoji:'🔥', stars:1 };
  if(mins >= 180) return { text:'SUN BATH', emoji:'😎', stars:3 };
  if(mins >= 100) return { text:'PERFECT NAP', emoji:'😴', stars:5 };
  if(mins >= 40)  return { text:'COZY SPOT', emoji:'🐱', stars:4 };
  if(mins >= 10)  return { text:'DAPPLED SHADE', emoji:'🌤️', stars:3 };
  return { text:'SHADOW DWELLER', emoji:'🌑', stars:2 };
}

// === DRAWING ===
function toScreen(nx, ny){ return { x:nx*W, y:ny*H }; }

function draw(){
  const sun = getSunPos(timeMinutes);
  const beams = getBeamPolygons(sun);

  // Sky tint based on time
  const skyBright = sun.isDark ? 0 : Math.sin(sun.t * Math.PI);
  const bgR = Math.floor(248 - (1-skyBright)*200);
  const bgG = Math.floor(242 - (1-skyBright)*200);
  const bgB = Math.floor(232 - (1-skyBright)*200);
  ctx.fillStyle = `rgb(${bgR},${bgG},${bgB})`;
  ctx.fillRect(0,0,W,H);

  // Room floor
  const rx = ROOM.x*W, ry = ROOM.y*H, rw = ROOM.w*W, rh = ROOM.h*H;
  ctx.fillStyle = sun.isDark ? '#2a2420' : '#e8dcc8';
  ctx.fillRect(rx, ry, rw, rh);

  // Floor boards
  ctx.strokeStyle = sun.isDark ? 'rgba(60,50,40,0.15)' : 'rgba(160,140,110,0.15)';
  ctx.lineWidth = 1;
  const boardH = rh / 12;
  for(let i=1; i<12; i++){
    ctx.beginPath();
    ctx.moveTo(rx, ry + i*boardH);
    ctx.lineTo(rx+rw, ry + i*boardH);
    ctx.stroke();
  }

  // Heatmap overlay
  const cellW = rw / heatmapRes, cellH = rh / heatmapRes;
  for(let gy=0; gy<heatmapRes; gy++){
    for(let gx=0; gx<heatmapRes; gx++){
      const val = heatmap[gy*heatmapRes+gx];
      if(val <= 0.01) continue;
      const alpha = Math.min(0.25, val * 0.4);
      const green = Math.floor(100 + val*155);
      ctx.fillStyle = `rgba(${Math.floor(60+val*100)},${green},60,${alpha})`;
      ctx.fillRect(rx + gx*cellW, ry + gy*cellH, cellW+0.5, cellH+0.5);
    }
  }

  // Sunbeams
  if(!sun.isDark){
    for(const b of beams){
      ctx.beginPath();
      const p0 = toScreen(b.poly[0].x, b.poly[0].y);
      ctx.moveTo(p0.x, p0.y);
      for(let i=1; i<b.poly.length; i++){
        const p = toScreen(b.poly[i].x, b.poly[i].y);
        ctx.lineTo(p.x, p.y);
      }
      ctx.closePath();
      // Clip to room
      ctx.save();
      ctx.clip();
      const grad = ctx.createLinearGradient(
        toScreen(b.poly[0].x,b.poly[0].y).x,
        toScreen(b.poly[0].x,b.poly[0].y).y,
        toScreen(b.poly[2].x,b.poly[2].y).x,
        toScreen(b.poly[2].x,b.poly[2].y).y
      );
      const a = b.intensity * 0.35;
      grad.addColorStop(0, `rgba(255,220,60,${a})`);
      grad.addColorStop(1, `rgba(255,200,40,${a*0.3})`);
      ctx.fillStyle = grad;
      ctx.fillRect(rx, ry, rw, rh);
      ctx.restore();
    }
  }

  // Furniture
  for(const f of FURNITURE){
    const fx=f.x*W, fy=f.y*H, fw=f.w*W, fh=f.h*H;
    // Shadow
    if(!sun.isDark){
      const az = sun.azimuth * Math.PI/180;
      const shX = Math.sin(az)*8, shY = Math.cos(az)*8;
      ctx.fillStyle = 'rgba(40,30,15,0.08)';
      ctx.fillRect(fx+shX, fy+shY, fw, fh);
    }
    ctx.fillStyle = sun.isDark ? darken(f.color, 0.4) : f.color;
    ctx.fillRect(fx, fy, fw, fh);
    ctx.strokeStyle = sun.isDark ? 'rgba(80,60,40,0.3)' : 'rgba(100,80,50,0.3)';
    ctx.lineWidth = 1;
    ctx.strokeRect(fx, fy, fw, fh);
    // Label
    ctx.fillStyle = sun.isDark ? 'rgba(200,180,150,0.3)' : 'rgba(255,255,255,0.7)';
    ctx.font = `${Math.max(9,W*0.015)}px 'Red Hat Mono', monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(f.label, fx+fw/2, fy+fh/2+4);
  }

  // Walls
  ctx.strokeStyle = sun.isDark ? '#4a4038' : '#a09078';
  ctx.lineWidth = 3;
  ctx.strokeRect(rx, ry, rw, rh);

  // Windows (gaps in walls)
  for(const win of WINDOWS){
    let wx, wy, ww, wh;
    if(win.wall === 'top'){
      wx = (ROOM.x + win.pos*ROOM.w)*W;
      wy = ROOM.y*H - 2;
      ww = win.width*ROOM.w*W;
      wh = 6;
    } else if(win.wall === 'right'){
      wx = (ROOM.x+ROOM.w)*W - 2;
      wy = (ROOM.y + win.pos*ROOM.h)*H;
      ww = 6;
      wh = win.width*ROOM.h*H;
    }
    ctx.fillStyle = sun.isDark ? '#1a2040' : '#a8d8f0';
    ctx.fillRect(wx, wy, ww, wh);
    ctx.strokeStyle = sun.isDark ? '#3a3830' : '#8aa088';
    ctx.lineWidth = 1;
    ctx.strokeRect(wx, wy, ww, wh);
    // Glass shine
    if(!sun.isDark){
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      if(win.wall==='top') ctx.fillRect(wx+4, wy+1, ww*0.3, 3);
      else ctx.fillRect(wx+1, wy+4, 3, wh*0.3);
    }
  }

  // Nap spots
  for(const nap of napSpots){
    const sx = nap.x*W, sy = nap.y*H;
    const r = Math.max(10, W*0.02);
    const inSun = pointInSunlight(nap.x, nap.y, beams);

    // Glow if in sun
    if(inSun && !sun.isDark){
      ctx.beginPath();
      ctx.arc(sx, sy, r*2, 0, Math.PI*2);
      ctx.fillStyle = 'rgba(255,220,80,0.15)';
      ctx.fill();
    }

    // Pillow
    ctx.beginPath();
    ctx.arc(sx, sy, r, 0, Math.PI*2);
    ctx.fillStyle = inSun && !sun.isDark ? '#f0a0a0' : '#e07878';
    ctx.fill();
    ctx.strokeStyle = 'rgba(180,80,80,0.4)';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Zzz
    ctx.fillStyle = sun.isDark ? 'rgba(150,150,200,0.5)' : 'rgba(100,60,60,0.5)';
    ctx.font = `${Math.max(8,W*0.012)}px 'Playfair Display', serif`;
    ctx.textAlign = 'left';
    ctx.fillText('z', sx+r+2, sy-4);
    ctx.fillText('z', sx+r+6, sy-10);
    ctx.fillText('Z', sx+r+10, sy-18);

    // Score badge
    const rating = nap.rating;
    ctx.fillStyle = sun.isDark ? 'rgba(200,180,150,0.4)' : 'rgba(90,70,40,0.8)';
    ctx.font = `bold ${Math.max(9,W*0.013)}px 'Red Hat Mono', monospace`;
    ctx.textAlign = 'center';
    ctx.fillText(`${rating.emoji} ${nap.sunMinutes}m`, sx, sy+r+14);
  }

  // Sun indicator (top corner)
  if(!sun.isDark){
    const sunScreenX = (sun.t * 0.8 + 0.1) * W;
    const sunScreenY = (1 - Math.sin(sun.t*Math.PI)*0.4) * H * 0.06 + 4;
    ctx.beginPath();
    ctx.arc(sunScreenX, sunScreenY, 8, 0, Math.PI*2);
    ctx.fillStyle = '#f0c830';
    ctx.shadowColor = '#f0c830';
    ctx.shadowBlur = 12;
    ctx.fill();
    ctx.shadowBlur = 0;
    // Rays
    for(let i=0; i<8; i++){
      const a = (i/8)*Math.PI*2 + timeMinutes*0.01;
      ctx.beginPath();
      ctx.moveTo(sunScreenX+Math.cos(a)*11, sunScreenY+Math.sin(a)*11);
      ctx.lineTo(sunScreenX+Math.cos(a)*15, sunScreenY+Math.sin(a)*15);
      ctx.strokeStyle = 'rgba(240,200,48,0.5)';
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  } else {
    // Moon
    ctx.beginPath();
    ctx.arc(W*0.5, 10, 6, 0, Math.PI*2);
    ctx.fillStyle = '#a0a8c0';
    ctx.fill();
  }

  // Update HUD
  updateHUD(sun);
}

function darken(hex, factor){
  const r = Math.floor(parseInt(hex.slice(1,3),16)*factor);
  const g = Math.floor(parseInt(hex.slice(3,5),16)*factor);
  const b = Math.floor(parseInt(hex.slice(5,7),16)*factor);
  return `rgb(${r},${g},${b})`;
}

function updateHUD(sun){
  const h = Math.floor(timeMinutes/60);
  const m = Math.floor(timeMinutes%60);
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h > 12 ? h-12 : h === 0 ? 12 : h;
  document.getElementById('time-display').textContent =
    `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
  document.getElementById('sun-alt').textContent = `${Math.round(sun.altitude)}°`;
  document.getElementById('sun-az').textContent = `${Math.round(sun.azimuth)}°`;
  document.getElementById('nap-count').textContent = napSpots.length;

  // Best nap spot
  if(napSpots.length > 0){
    const best = napSpots.reduce((a,b) => a.rating.stars > b.rating.stars ? a : b);
    document.getElementById('nap-score').innerHTML =
      `Best spot: ${best.rating.emoji} <b>${best.rating.text}</b> — ${best.sunMinutes}min sun`;
    document.getElementById('nap-hint').textContent =
      napSpots.length < 5 ? 'click to add more spots (max 5)' : 'right-click a spot to remove it';
  }
}

// === INPUT ===
const slider = document.getElementById('time-slider');
slider.addEventListener('input', () => {
  timeMinutes = parseInt(slider.value);
  draw();
});

C.addEventListener('click', e => {
  const rect = C.getBoundingClientRect();
  const nx = (e.clientX - rect.left) / rect.width;
  const ny = (e.clientY - rect.top) / rect.height;

  // Check if inside room and not on furniture
  if(nx < ROOM.x || nx > ROOM.x+ROOM.w || ny < ROOM.y || ny > ROOM.y+ROOM.h) return;
  if(pointInFurniture(nx, ny)) return;

  // Check if clicking near existing spot to remove it
  for(let i=0; i<napSpots.length; i++){
    const dx = (napSpots[i].x - nx)*W, dy = (napSpots[i].y - ny)*H;
    if(Math.sqrt(dx*dx+dy*dy) < 20){
      napSpots.splice(i, 1);
      updateNapScoreDisplay();
      draw();
      return;
    }
  }

  if(napSpots.length >= 5) return;

  const result = scoreNapSpot(nx, ny);
  napSpots.push({ x:nx, y:ny, sunMinutes:result.sunMinutes, rating:result.rating });
  draw();
});

C.addEventListener('contextmenu', e => {
  e.preventDefault();
  const rect = C.getBoundingClientRect();
  const nx = (e.clientX - rect.left) / rect.width;
  const ny = (e.clientY - rect.top) / rect.height;
  // Remove nearest spot
  let closest = -1, minDist = Infinity;
  for(let i=0; i<napSpots.length; i++){
    const dx = (napSpots[i].x - nx)*W, dy = (napSpots[i].y - ny)*H;
    const d = Math.sqrt(dx*dx+dy*dy);
    if(d < 30 && d < minDist){ minDist = d; closest = i; }
  }
  if(closest >= 0){
    napSpots.splice(closest, 1);
    draw();
  }
});

function updateNapScoreDisplay(){
  if(napSpots.length === 0){
    document.getElementById('nap-score').textContent = 'Click the floor to place a nap spot';
    document.getElementById('nap-hint').textContent = 'drag the time slider to see sunbeams move';
  }
}

// === PLAYBACK ===
let lastFrame = 0;
function togglePlay(){
  playing = !playing;
  const btn = document.getElementById('play-btn');
  btn.textContent = playing ? '⏸ PAUSE' : '▶ PLAY';
  btn.classList.toggle('playing', playing);
  if(playing) requestAnimationFrame(animate);
}

function animate(ts){
  if(!playing) return;
  const dt = Math.min(50, ts - lastFrame);
  lastFrame = ts;
  timeMinutes += dt * 0.08; // ~5x realtime
  if(timeMinutes > 1440) timeMinutes = 0;
  slider.value = timeMinutes;
  draw();
  requestAnimationFrame(animate);
}

// Touch support for canvas
C.addEventListener('touchstart', e => {
  e.preventDefault();
  const touch = e.touches[0];
  const rect = C.getBoundingClientRect();
  const nx = (touch.clientX - rect.left) / rect.width;
  const ny = (touch.clientY - rect.top) / rect.height;
  if(nx < ROOM.x || nx > ROOM.x+ROOM.w || ny < ROOM.y || ny > ROOM.y+ROOM.h) return;
  if(pointInFurniture(nx, ny)) return;
  for(let i=0; i<napSpots.length; i++){
    const dx = (napSpots[i].x-nx)*W, dy = (napSpots[i].y-ny)*H;
    if(Math.sqrt(dx*dx+dy*dy) < 25){ napSpots.splice(i,1); updateNapScoreDisplay(); draw(); return; }
  }
  if(napSpots.length >= 5) return;
  const result = scoreNapSpot(nx, ny);
  napSpots.push({ x:nx, y:ny, sunMinutes:result.sunMinutes, rating:result.rating });
  draw();
}, {passive:false});

// Initial draw
draw();
</script>
