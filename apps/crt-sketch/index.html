<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRT Sketch — pixel art that lives in the URL</title>
<meta name="description" content="A 16×16 pixel canvas on a scanlined CRT. Every drawing serializes into the URL hash — the link IS the artwork. Minimal by design.">
<meta property="og:title" content="CRT Sketch">
<meta property="og:description" content="Draw 16×16 pixels on a CRT. The URL is the save file. Share the link, share the art.">
<meta property="og:url" content="https://sloppy.live/crt-sketch">
<meta property="og:image" content="https://image.pollinations.ai/prompt/tiny%20pixel%20art%20heart%20on%20old%20CRT%20monitor%20with%20scanlines%2C%20dark%20room%2C%20phosphor%20glow%2C%20minimal?width=1200&height=630&nologo=true&seed=256&model=flux">
<meta property="og:type" content="website">
<link rel="icon" href="https://emojicdn.elk.sh/🖍️">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Silkscreen&display=swap" rel="stylesheet">
<style>
:root{ --bg:#0b0b10; --glow:#9ae05e; --dim:#3d4a33; }
*{ box-sizing:border-box; margin:0; padding:0; }
html{ font-size:100%; }
body{
  background:radial-gradient(60rem 40rem at 50% 30%, #14141c, var(--bg) 75%);
  color:var(--glow); font-family:'Silkscreen', monospace; min-height:100vh;
  display:flex; flex-direction:column; align-items:center; justify-content:center; gap:.9rem; padding:1rem;
}
h1{ font-size:clamp(.9rem, 3.5vw, 1.2rem); font-weight:400; letter-spacing:.2em; }
.crt{
  position:relative; border-radius:.9rem; padding:1rem;
  background:linear-gradient(160deg, #1d1d26, #101016);
  box-shadow:0 0 3rem rgba(154,224,94,.12), inset 0 0 2rem rgba(0,0,0,.8);
}
.crt::after{
  content:""; position:absolute; inset:1rem; pointer-events:none; border-radius:.3rem;
  background:
    repeating-linear-gradient(0deg, rgba(0,0,0,.28) 0 2px, transparent 2px 4px),
    radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,.5));
}
canvas{
  display:block; width:min(74vw, 26rem); height:min(74vw, 26rem);
  image-rendering:pixelated; border-radius:.3rem; touch-action:none; cursor:crosshair;
  background:#111118;
}
.pal{ display:grid; grid-template-columns:repeat(8, 1fr); gap:.35rem; }
.pal button{
  width:2.75rem; height:2.75rem; border-radius:.25rem; cursor:pointer;
  border:2px solid rgba(255,255,255,.12);
}
.pal button[aria-pressed="true"]{ border-color:var(--glow); box-shadow:0 0 .6rem rgba(154,224,94,.6); transform:scale(1.08); }
.pal button:focus-visible{ outline:3px solid var(--glow); outline-offset:2px; }
.row{ display:flex; gap:.6rem; }
.row button{
  min-height:2.75rem; padding:.4rem 1rem; cursor:pointer; border-radius:.25rem;
  font-family:'Silkscreen', monospace; font-size:.7rem; letter-spacing:.1em;
  background:transparent; color:var(--glow); border:2px solid var(--dim);
}
.row button:hover{ border-color:var(--glow); }
.row button:focus-visible{ outline:3px solid var(--glow); outline-offset:2px; }
p.hint{ font-size:.55rem; letter-spacing:.15em; color:var(--dim); text-align:center; }
#status{ min-height:1rem; font-size:.6rem; letter-spacing:.15em; }
footer{ font-size:.5rem; letter-spacing:.12em; color:var(--dim); }
</style>
</head>
<body>
<h1>CRT SKETCH</h1>
<div class="crt"><canvas id="cv" width="16" height="16" role="application" aria-label="16 by 16 pixel drawing canvas. Click or drag to paint with the selected color."></canvas></div>
<div class="pal" id="pal" role="group" aria-label="palette"></div>
<div class="row">
  <button type="button" id="link-btn">COPY LINK</button>
  <button type="button" id="wipe-btn">WIPE</button>
</div>
<p id="status" role="status" aria-live="polite"></p>
<p class="hint">THE URL IS THE SAVE FILE · SHARE IT AND THE PIXELS TRAVEL</p>
<footer><span id="build-info">build <b>v1.0</b> · 2026-07-15 · commit <code id="build-hash">7f5eee9bf</code></span></footer>

<script>
var N=16;
var PALETTE=['#111118','#f2f2e8','#9aa0a8','#3d3d46','#d94a3d','#e08a3c','#e8d44a','#9ae05e',
             '#2e9c5c','#4ad4c0','#4a9ae0','#3d5ad9','#8a5ae0','#d94ab8','#e88aa0','#8a5a3c'];
var grid=new Array(N*N).fill(0), color=7, painting=false, saveT=null;

function $(id){ return document.getElementById(id); }
var cv=$('cv'), ctx=cv.getContext('2d');

/* ── hash codec: 256 hex nibbles; all-zero = empty hash ── */
function encode(g){ return g.map(function(v){ return v.toString(16); }).join(''); }
function decode(s){
  if(!/^[0-9a-f]{256}$/.test(s)) return null;
  return s.split('').map(function(c){ return parseInt(c,16); });
}
function save(){
  clearTimeout(saveT);
  saveT=setTimeout(function(){
    var s=encode(grid);
    history.replaceState(null,'', grid.some(function(v){ return v; }) ? '#'+s : location.pathname);
  }, 250);
}
function load(){
  var g=decode(location.hash.slice(1));
  if(g){ grid=g; return true; }
  return false;
}

function draw(){
  for(var i=0;i<grid.length;i++){
    ctx.fillStyle=PALETTE[grid[i]];
    ctx.fillRect(i%N, (i/N)|0, 1, 1);
  }
}
function paintAt(e){
  var r=cv.getBoundingClientRect();
  var x=Math.floor((e.clientX-r.left)/r.width*N);
  var y=Math.floor((e.clientY-r.top)/r.height*N);
  if(x<0||y<0||x>=N||y>=N) return;
  var i=y*N+x;
  if(grid[i]===color) return;
  grid[i]=color;
  draw(); save();
}
cv.addEventListener('pointerdown', function(e){ painting=true; cv.setPointerCapture(e.pointerId); paintAt(e); });
cv.addEventListener('pointermove', function(e){ if(painting) paintAt(e); });
addEventListener('pointerup', function(){ painting=false; });

/* palette */
PALETTE.forEach(function(c,i){
  var b=document.createElement('button');
  b.type='button'; b.style.background=c;
  b.setAttribute('aria-label','color '+(i+1)+(i===0?' (background / eraser)':''));
  b.setAttribute('aria-pressed', i===color?'true':'false');
  b.onclick=function(){
    color=i;
    Array.prototype.forEach.call($('pal').children, function(x,k){ x.setAttribute('aria-pressed', k===i?'true':'false'); });
  };
  $('pal').appendChild(b);
});

$('wipe-btn').onclick=function(){ grid.fill(0); draw(); save(); say('WIPED'); };
$('link-btn').onclick=function(){
  var url=location.origin+location.pathname+(grid.some(function(v){ return v; })?'#'+encode(grid):'');
  try{ navigator.clipboard.writeText(url); say('LINK COPIED · THE ART IS IN IT'); }
  catch(e){ say('COPY THE ADDRESS BAR — THAT IS THE FILE'); }
};
var sayT=null;
function say(m){ $('status').textContent=m; clearTimeout(sayT); sayT=setTimeout(function(){ $('status').textContent=''; }, 2200); }

addEventListener('hashchange', function(){ if(load()) draw(); });
if(load()) say('LOADED FROM THE LINK');
draw();
</script>
</body>
</html>
