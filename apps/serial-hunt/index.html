<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Serial Hunt</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%A4%96" />
<meta name="description" content="Pilot a combat drone against waves of glitching robots. Survive. Upgrade. Repeat." />
<meta property="og:title" content="Serial Hunt" />
<meta property="og:description" content="Pilot a combat drone against waves of glitching robots. Survive. Upgrade. Repeat." />
<meta property="og:url" content="https://sloppy.live/serial-hunt" />
<meta property="og:image" content="https://sloppy.live/screenshots/serial-hunt.jpg" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; background: #060610; }
  canvas { display: block; width: 100vw; height: 100vh; cursor: crosshair; }
  #ui {
    position: fixed; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    padding: 10px 16px; pointer-events: none; z-index: 10;
    font-family: 'Share Tech Mono', monospace; color: #c0e0ff;
    text-shadow: 0 0 8px rgba(100,180,255,0.6);
  }
  #ui .col { display: flex; flex-direction: column; gap: 4px; }
  .stat { font-size: 12px; letter-spacing: 0.15em; text-transform: uppercase; }
  .stat .v { color: #5ef8ff; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 16px; }
  .xp-bar { width: 160px; height: 6px; background: #1a1a30; border: 1px solid #2a2a50; margin-top: 2px; }
  .xp-bar > span { display: block; height: 100%; background: linear-gradient(90deg, #5ef8ff, #a78bfa); transition: width 0.2s; }

  #overlay {
    position: fixed; inset: 0; background: rgba(6,6,16,0.92);
    display: flex; align-items: center; justify-content: center;
    z-index: 20; font-family: 'Rajdhani', sans-serif;
  }
  #overlay.hidden { display: none; }
  .card {
    background: #0c0c20; border: 2px solid #2a2a60; padding: 28px 24px;
    max-width: 400px; text-align: center; color: #c0e0ff;
    box-shadow: 0 0 60px rgba(94,248,255,0.15);
  }
  .card h2 { font-size: 36px; font-weight: 700; margin-bottom: 8px; color: #5ef8ff; letter-spacing: 0.06em; }
  .card p { font-family: 'Share Tech Mono', monospace; font-size: 13px; color: #8888aa; line-height: 1.5; margin-bottom: 16px; }
  .card .stats { display: flex; gap: 18px; justify-content: center; margin-bottom: 18px; }
  .card .stats div { font-size: 22px; font-weight: 700; color: #a78bfa; }
  .card .stats div span { display: block; font-size: 10px; color: #6666aa; font-family: 'Share Tech Mono', monospace; letter-spacing: 0.2em; }
  .card button {
    font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 18px;
    padding: 10px 30px; border: 2px solid #5ef8ff; background: transparent;
    color: #5ef8ff; cursor: pointer; text-transform: uppercase; letter-spacing: 0.1em;
    transition: background 0.15s, color 0.15s;
  }
  .card button:hover { background: #5ef8ff; color: #060610; }

  /* upgrade picker */
  #upgrades {
    position: fixed; inset: 0; background: rgba(6,6,16,0.88);
    display: none; align-items: center; justify-content: center;
    z-index: 30; font-family: 'Rajdhani', sans-serif;
  }
  #upgrades.show { display: flex; }
  .upg-row { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .upg {
    background: #0c0c20; border: 2px solid #2a2a60; padding: 18px 16px;
    width: 150px; text-align: center; cursor: pointer; color: #c0e0ff;
    transition: border-color 0.15s, transform 0.1s;
  }
  .upg:hover { border-color: #5ef8ff; transform: translateY(-4px); }
  .upg .icon { font-size: 28px; margin-bottom: 6px; }
  .upg .name { font-weight: 700; font-size: 15px; letter-spacing: 0.06em; color: #5ef8ff; }
  .upg .desc { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: #6666aa; margin-top: 4px; letter-spacing: 0.08em; }

    
  /* mobile joystick */
  #mobileControls {
    position: fixed; bottom: 20px; left: 20px; z-index: 15;
    display: none; pointer-events: auto;
  }
  .joy-ring {
    width: 120px; height: 120px; border-radius: 50%;
    border: 2px solid rgba(94,248,255,0.3); background: rgba(94,248,255,0.05);
    position: relative;
  }
  .joy-knob {
    width: 44px; height: 44px; border-radius: 50%;
    background: rgba(94,248,255,0.25); border: 2px solid rgba(94,248,255,0.5);
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
  }
  @media (hover: none) and (pointer: coarse) {
    #mobileControls { display: block; }
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
  <div class="col">
    <div class="stat">hull <span class="v" id="hpVal">100</span></div>
    <div class="stat">kills <span class="v" id="killVal">0</span></div>
    <div class="stat">wave <span class="v" id="waveVal">1</span></div>
  </div>
  <div class="col" style="align-items:flex-end;">
    <div class="stat">lvl <span class="v" id="lvlVal">1</span></div>
    <div class="xp-bar"><span id="xpBar" style="width:0%"></span></div>
    <div class="stat">time <span class="v" id="timeVal">0:00</span></div>
  </div>
</div>

<div id="overlay">
  <div class="card">
    <h2 id="overlayTitle">Serial Hunt</h2>
    <p id="overlayMsg">Pilot a combat drone. Auto-fire at the nearest glitch-bot.<br/>WASD / arrows to move. Survive as long as you can.</p>
    <div class="stats" id="overlayStats" style="display:none"></div>
    <button id="overlayBtn">Deploy</button>
  </div>
</div>

<div id="upgrades">
  <div class="upg-row" id="upgRow"></div>
</div>

<div id="mobileControls">
  <div class="joy-ring" id="joyRing">
    <div class="joy-knob" id="joyKnob"></div>
  </div>
</div>
<script>
(() => {
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  let W, H;
  function resize() {
    W = canvas.width = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }
  window.addEventListener('resize', resize);
  resize();

  // audio
  let actx = null;
  function audio() {
    if (!actx) try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch { return null; }
    return actx;
  }
  function beep(freq, dur, type = 'square', gain = 0.06) {
    const c = audio(); if (!c) return;
    const o = c.createOscillator(), g = c.createGain();
    o.type = type; o.frequency.value = freq;
    g.gain.setValueAtTime(gain, c.currentTime);
    g.gain.exponentialRampToValueAtTime(0.0001, c.currentTime + dur);
    o.connect(g).connect(c.destination); o.start(); o.stop(c.currentTime + dur);
  }

  // state
  const keys = {};
  window.addEventListener('keydown', e => { keys[e.code] = true; });
  window.addEventListener('keyup', e => { keys[e.code] = false; });

  const UPGRADES = [
    { id: 'fireRate',  icon: '⚡', name: 'Fire Rate',     desc: 'shoot 15% faster',      apply: s => { s.fireDelay *= 0.85; } },
    { id: 'damage',    icon: '💥', name: 'Damage',        desc: '+25% bullet damage',     apply: s => { s.bulletDmg *= 1.25; } },
    { id: 'speed',     icon: '🏃', name: 'Thruster',      desc: '+12% move speed',        apply: s => { s.speed *= 1.12; } },
    { id: 'piercing',  icon: '🔩', name: 'Piercing',      desc: 'bullets pierce +1 enemy',apply: s => { s.pierce += 1; } },
    { id: 'multishot', icon: '🔱', name: 'Multi-shot',    desc: '+1 bullet per volley',   apply: s => { s.bullets += 1; } },
    { id: 'armor',     icon: '🛡', name: 'Armor',         desc: '-20% incoming damage',   apply: s => { s.armor = 1 - (1 - s.armor) * 0.8; } },
    { id: 'regen',     icon: '💚', name: 'Regen',         desc: 'heal 0.3 hp/sec',        apply: s => { s.regen += 0.3; } },
    { id: 'magnet',    icon: '🧲', name: 'Magnet',        desc: '+30% XP pickup range',   apply: s => { s.magnetRange *= 1.3; } },
  ];

  let player, enemies, bullets, particles, xpOrbs, oilSplatters, wave, spawnTimer, gameTime, phase, startTime;

  function initGame() {
    player = {
      x: W / 2, y: H / 2, r: 14,
      hp: 100, maxHp: 100, speed: 2.8,
      fireDelay: 280, bulletDmg: 12, pierce: 0, bullets: 1,
      armor: 0, regen: 0, magnetRange: 60,
      fireCd: 0, level: 1, xp: 0, xpToNext: 8,
      kills: 0, angle: 0, invuln: 0,
    };
    enemies = [];
    bullets = [];
    particles = [];
    xpOrbs = [];
    oilSplatters = [];
    wave = 1;
    spawnTimer = 0;
    gameTime = 0;
    phase = 'playing';
    startTime = Date.now();
  }

  // Enemies
  const ENEMY_TYPES = [
    { name: 'Scout',   hp: 18,  speed: 1.6, r: 10, dmg: 8,  xp: 2, color: '#ff4466', glitch: 0.15 },
    { name: 'Brute',   hp: 55,  speed: 0.9, r: 18, dmg: 18, xp: 5, color: '#ff8844', glitch: 0.25 },
    { name: 'Zapper',  hp: 30,  speed: 1.3, r: 12, dmg: 12, xp: 3, color: '#44eeff', glitch: 0.35 },
    { name: 'Phantom', hp: 22,  speed: 2.2, r: 9,  dmg: 10, xp: 4, color: '#cc66ff', glitch: 0.55 },
    { name: 'Tank',    hp: 120, speed: 0.55,r: 24, dmg: 28, xp: 10,color: '#ffcc22', glitch: 0.2 },
  ];

  function spawnEnemy() {
    // pick tier based on wave
    const maxTier = Math.min(ENEMY_TYPES.length - 1, Math.floor(wave / 3));
    const tier = Math.floor(Math.random() * (maxTier + 1));
    const base = ENEMY_TYPES[tier];
    const hpMul = 1 + (wave - 1) * 0.12;
    const spdMul = 1 + (wave - 1) * 0.02;
    // spawn at screen edge
    const side = Math.floor(Math.random() * 4);
    let x, y;
    if (side === 0) { x = -30; y = Math.random() * H; }
    else if (side === 1) { x = W + 30; y = Math.random() * H; }
    else if (side === 2) { x = Math.random() * W; y = -30; }
    else { x = Math.random() * W; y = H + 30; }
    enemies.push({
      x, y, r: base.r, hp: Math.round(base.hp * hpMul), maxHp: Math.round(base.hp * hpMul),
      speed: base.speed * spdMul, dmg: base.dmg, xp: base.xp,
      color: base.color, glitch: base.glitch, glitchOff: { x: 0, y: 0 },
      hitFlash: 0, tier,
    });
  }

  function spawnWave() {
    const count = 4 + wave * 2 + Math.floor(wave * wave * 0.1);
    for (let i = 0; i < count; i++) {
      setTimeout(() => { if (phase === 'playing') spawnEnemy(); }, i * (600 / Math.sqrt(wave)));
    }
    wave++;
  }

  // Bullets
  function fireBullets() {
    if (player.fireCd > 0) return;
    player.fireCd = player.fireDelay;
    // find nearest
    let nearest = null, nearDist = Infinity;
    for (const e of enemies) {
      const d = Math.hypot(e.x - player.x, e.y - player.y);
      if (d < nearDist) { nearDist = d; nearest = e; }
    }
    if (!nearest) return;
    const baseAngle = Math.atan2(nearest.y - player.y, nearest.x - player.x);
    player.angle = baseAngle;
    const count = player.bullets;
    const spread = count > 1 ? 0.15 : 0;
    for (let i = 0; i < count; i++) {
      const a = baseAngle + (i - (count - 1) / 2) * spread;
      bullets.push({
        x: player.x + Math.cos(a) * 18, y: player.y + Math.sin(a) * 18,
        vx: Math.cos(a) * 7, vy: Math.sin(a) * 7,
        dmg: player.bulletDmg, pierce: player.pierce, life: 80,
      });
    }
    beep(1200, 0.04, 'square', 0.04);
  }

  // Particles
  function addParticle(x, y, color, count, speed) {
    for (let i = 0; i < count; i++) {
      const a = Math.random() * Math.PI * 2;
      const s = 0.5 + Math.random() * speed;
      particles.push({
        x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s,
        life: 20 + Math.random() * 20, maxLife: 40, color, r: 1.5 + Math.random() * 2,
      });
    }
  }

  function addOilSplatter(x, y) {
    const count = 3 + Math.floor(Math.random() * 4);
    for (let i = 0; i < count; i++) {
      oilSplatters.push({
        x: x + (Math.random() - 0.5) * 20,
        y: y + (Math.random() - 0.5) * 20,
        r: 4 + Math.random() * 10,
        alpha: 0.4 + Math.random() * 0.3,
        life: 300 + Math.random() * 200,
      });
    }
  }

  // Mobile joystick
  const joyRing = document.getElementById('joyRing');
  const joyKnob = document.getElementById('joyKnob');
  let joyVec = { x: 0, y: 0 };
  let joyActive = false;

  function joyStart(cx, cy) {
    joyActive = true;
    joyMove(cx, cy);
  }
  function joyMove(cx, cy) {
    if (!joyActive) return;
    const rect = joyRing.getBoundingClientRect();
    const ox = rect.left + rect.width / 2;
    const oy = rect.top + rect.height / 2;
    let dx = cx - ox, dy = cy - oy;
    const dist = Math.hypot(dx, dy);
    const maxR = rect.width / 2 - 22;
    if (dist > maxR) { dx *= maxR / dist; dy *= maxR / dist; }
    joyKnob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
    joyVec.x = dx / maxR;
    joyVec.y = dy / maxR;
  }
  function joyEnd() {
    joyActive = false;
    joyKnob.style.transform = 'translate(-50%, -50%)';
    joyVec.x = 0; joyVec.y = 0;
  }
  joyRing.addEventListener('touchstart', e => { e.preventDefault(); const t = e.touches[0]; joyStart(t.clientX, t.clientY); });
  joyRing.addEventListener('touchmove', e => { e.preventDefault(); const t = e.touches[0]; joyMove(t.clientX, t.clientY); });
  joyRing.addEventListener('touchend', joyEnd);

  // XP / leveling
  function addXp(amount) {
    player.xp += amount;
    while (player.xp >= player.xpToNext) {
      player.xp -= player.xpToNext;
      player.level++;
      player.xpToNext = Math.round(player.xpToNext * 1.4);
      showUpgrades();
    }
  }

  function showUpgrades() {
    phase = 'upgrade';
    const el = document.getElementById('upgrades');
    const row = document.getElementById('upgRow');
    row.innerHTML = '';
    // pick 3 random
    const picks = [];
    const pool = [...UPGRADES];
    while (picks.length < 3 && pool.length) {
      const i = Math.floor(Math.random() * pool.length);
      picks.push(pool.splice(i, 1)[0]);
    }
    picks.forEach(upg => {
      const div = document.createElement('div');
      div.className = 'upg';
      div.innerHTML = `<div class="icon">${upg.icon}</div><div class="name">${upg.name}</div><div class="desc">${upg.desc}</div>`;
      div.addEventListener('click', () => {
        upg.apply(player);
        el.classList.remove('show');
        phase = 'playing';
        beep(660, 0.06, 'square', 0.06);
      });
      row.appendChild(div);
    });
    el.classList.add('show');
  }

  // HUD
  function updateHud() {
    document.getElementById('hpVal').textContent = Math.max(0, Math.ceil(player.hp));
    document.getElementById('killVal').textContent = player.kills;
    document.getElementById('waveVal').textContent = wave;
    document.getElementById('lvlVal').textContent = player.level;
    document.getElementById('xpBar').style.width = (player.xp / player.xpToNext * 100) + '%';
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const m = Math.floor(elapsed / 60), s = elapsed % 60;
    document.getElementById('timeVal').textContent = `${m}:${String(s).padStart(2, '0')}`;
  }

  // Update
  function update(dt) {
    if (phase !== 'playing') return;
    gameTime += dt;

    // player move
    let dx = 0, dy = 0;
    if (keys['ArrowLeft'] || keys['KeyA']) dx -= 1;
    if (keys['ArrowRight'] || keys['KeyD']) dx += 1;
    if (keys['ArrowUp'] || keys['KeyW']) dy -= 1;
    if (keys['ArrowDown'] || keys['KeyS']) dy += 1;
    if (joyActive) { dx += joyVec.x; dy += joyVec.y; }
    const len = Math.hypot(dx, dy);
    if (len > 0) {
      player.x += (dx / len) * player.speed;
      player.y += (dy / len) * player.speed;
    }
    player.x = Math.max(player.r, Math.min(W - player.r, player.x));
    player.y = Math.max(player.r, Math.min(H - player.r, player.y));

    // regen
    if (player.regen > 0) {
      player.hp = Math.min(player.maxHp, player.hp + player.regen * dt / 1000);
    }
    if (player.invuln > 0) player.invuln -= dt;

    // fire
    player.fireCd = Math.max(0, player.fireCd - dt);
    fireBullets();

    // spawn waves
    spawnTimer -= dt;
    if (spawnTimer <= 0) {
      spawnWave();
      spawnTimer = Math.max(4000, 12000 - wave * 600);
    }

    // bullets
    for (let i = bullets.length - 1; i >= 0; i--) {
      const b = bullets[i];
      b.x += b.vx; b.y += b.vy; b.life--;
      if (b.life <= 0 || b.x < -20 || b.x > W + 20 || b.y < -20 || b.y > H + 20) {
        bullets.splice(i, 1); continue;
      }
      for (let j = enemies.length - 1; j >= 0; j--) {
        const e = enemies[j];
        if (Math.hypot(b.x - e.x, b.y - e.y) < e.r + 3) {
          e.hp -= b.dmg;
          e.hitFlash = 6;
          addParticle(b.x, b.y, e.color, 4, 2);
          beep(300, 0.03, 'sawtooth', 0.03);
          if (b.pierce > 0) { b.pierce--; b.dmg *= 0.7; }
          else { bullets.splice(i, 1); }
          if (e.hp <= 0) {
            addParticle(e.x, e.y, e.color, 12, 3);
            addOilSplatter(e.x, e.y);
            xpOrbs.push({ x: e.x, y: e.y, xp: e.xp, r: 4, life: 400 });
            player.kills++;
            enemies.splice(j, 1);
            beep(180, 0.12, 'sawtooth', 0.06);
          }
          break;
        }
      }
    }

    // enemies move + collide player
    for (let i = enemies.length - 1; i >= 0; i--) {
      const e = enemies[i];
      const dx = player.x - e.x, dy = player.y - e.y;
      const dist = Math.hypot(dx, dy);
      if (dist > 0) { e.x += (dx / dist) * e.speed; e.y += (dy / dist) * e.speed; }
      // glitch offset
      if (Math.random() < e.glitch) {
        e.glitchOff.x = (Math.random() - 0.5) * 8;
        e.glitchOff.y = (Math.random() - 0.5) * 8;
      } else {
        e.glitchOff.x *= 0.7; e.glitchOff.y *= 0.7;
      }
      if (e.hitFlash > 0) e.hitFlash--;
      // hit player
      if (dist < player.r + e.r && player.invuln <= 0) {
        const dmg = e.dmg * (1 - player.armor);
        player.hp -= dmg;
        player.invuln = 400;
        addParticle(player.x, player.y, '#ff4444', 8, 3);
        beep(100, 0.15, 'sawtooth', 0.1);
        if (player.hp <= 0) { gameOver(); return; }
      }
    }

    // xp orbs
    for (let i = xpOrbs.length - 1; i >= 0; i--) {
      const o = xpOrbs[i];
      o.life--;
      const d = Math.hypot(o.x - player.x, o.y - player.y);
      if (d < player.magnetRange) {
        const pull = Math.min(4, player.magnetRange / Math.max(1, d) * 1.5);
        o.x += (player.x - o.x) / d * pull;
        o.y += (player.y - o.y) / d * pull;
      }
      if (d < player.r + o.r) {
        addXp(o.xp);
        xpOrbs.splice(i, 1);
        beep(880, 0.03, 'triangle', 0.04);
      } else if (o.life <= 0) {
        xpOrbs.splice(i, 1);
      }
    }

    // particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx; p.y += p.vy; p.life--;
      p.vx *= 0.96; p.vy *= 0.96;
      if (p.life <= 0) particles.splice(i, 1);
    }

    // oil splatters fade
    for (let i = oilSplatters.length - 1; i >= 0; i--) {
      const s = oilSplatters[i];
      s.life--;
      if (s.life <= 0) oilSplatters.splice(i, 1);
    }

    updateHud();
  }

  function gameOver() {
    phase = 'dead';
    beep(60, 0.6, 'sawtooth', 0.15);
    const elapsed = Math.floor((Date.now() - startTime) / 1000);
    const m = Math.floor(elapsed / 60), s = elapsed % 60;
    document.getElementById('overlayTitle').textContent = 'System Offline';
    document.getElementById('overlayMsg').textContent = `Hull breached. ${player.kills} hostiles terminated.`;
    document.getElementById('overlayStats').style.display = 'flex';
    document.getElementById('overlayStats').innerHTML = `
      <div>${player.kills}<span>kills</span></div>
      <div>${m}:${String(s).padStart(2, '0')}<span>survived</span></div>
      <div>${player.level}<span>level</span></div>
      <div>${wave}<span>wave</span></div>
    `;
    document.getElementById('overlayBtn').textContent = 'Redeploy';
    document.getElementById('overlay').classList.remove('hidden');
  }

  // Draw
  function draw() {
    ctx.fillStyle = '#060610';
    ctx.fillRect(0, 0, W, H);

    // grid
    ctx.strokeStyle = 'rgba(40,40,80,0.35)';
    ctx.lineWidth = 1;
    const gridSize = 50;
    const ox = player.x % gridSize, oy = player.y % gridSize;
    for (let x = -ox; x < W; x += gridSize) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
    for (let y = -oy; y < H; y += gridSize) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

    // oil splatters (under everything)
    for (const s of oilSplatters) {
      const a = s.alpha * Math.min(1, s.life / 60);
      ctx.fillStyle = `rgba(20,18,30,${a})`;
      ctx.beginPath();
      ctx.ellipse(s.x, s.y, s.r * 1.2, s.r, Math.random() * 0.2, 0, Math.PI * 2);
      ctx.fill();
      // oily rainbow sheen
      ctx.fillStyle = `rgba(80,60,120,${a * 0.35})`;
      ctx.beginPath();
      ctx.ellipse(s.x + 2, s.y - 1, s.r * 0.7, s.r * 0.5, 0.3, 0, Math.PI * 2);
      ctx.fill();
    }

    // xp orbs
    for (const o of xpOrbs) {
      const pulse = 1 + Math.sin(Date.now() * 0.008 + o.x) * 0.2;
      ctx.fillStyle = '#a78bfa';
      ctx.shadowColor = '#a78bfa'; ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.arc(o.x, o.y, o.r * pulse, 0, Math.PI * 2); ctx.fill();
      ctx.shadowBlur = 0;
    }

    // enemies
    for (const e of enemies) {
      const gx = e.x + e.glitchOff.x, gy = e.y + e.glitchOff.y;
      ctx.save();
      if (e.hitFlash > 0) { ctx.fillStyle = '#ffffff'; }
      else { ctx.fillStyle = e.color; }
      ctx.shadowColor = e.color; ctx.shadowBlur = 12;
      // draw robot body
      ctx.beginPath();
      if (e.tier === 0) {
        // triangle scout
        ctx.moveTo(gx, gy - e.r);
        ctx.lineTo(gx - e.r * 0.8, gy + e.r * 0.6);
        ctx.lineTo(gx + e.r * 0.8, gy + e.r * 0.6);
        ctx.closePath();
      } else if (e.tier === 1 || e.tier === 4) {
        // square brute/tank
        ctx.rect(gx - e.r, gy - e.r, e.r * 2, e.r * 2);
      } else if (e.tier === 2) {
        // hex zapper
        for (let i = 0; i < 6; i++) {
          const a = i * Math.PI / 3 - Math.PI / 6;
          const px = gx + Math.cos(a) * e.r, py = gy + Math.sin(a) * e.r;
          i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
        }
        ctx.closePath();
      } else {
        // circle phantom
        ctx.arc(gx, gy, e.r, 0, Math.PI * 2);
      }
      ctx.fill();
      ctx.shadowBlur = 0;
      // glitch scan lines
      if (e.glitchOff.x !== 0) {
        ctx.fillStyle = `rgba(255,255,255,0.12)`;
        for (let y = gy - e.r; y < gy + e.r; y += 4) {
          ctx.fillRect(gx - e.r, y, e.r * 2, 1);
        }
      }
      // eye
      ctx.fillStyle = '#ffffff';
      ctx.beginPath();
      ctx.arc(gx, gy - 2, Math.max(2, e.r * 0.2), 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(gx, gy - 2, Math.max(1, e.r * 0.1), 0, Math.PI * 2);
      ctx.fill();
      // HP bar
      if (e.hp < e.maxHp) {
        const bw = e.r * 2;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(gx - bw / 2, gy - e.r - 8, bw, 3);
        ctx.fillStyle = e.color;
        ctx.fillRect(gx - bw / 2, gy - e.r - 8, bw * (e.hp / e.maxHp), 3);
      }
      ctx.restore();
    }

    // bullets
    ctx.fillStyle = '#5ef8ff';
    ctx.shadowColor = '#5ef8ff'; ctx.shadowBlur = 8;
    for (const b of bullets) {
      ctx.beginPath();
      ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;

    // particles
    for (const p of particles) {
      const a = p.life / p.maxLife;
      ctx.globalAlpha = a;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * a, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // player drone
    ctx.save();
    ctx.translate(player.x, player.y);
    ctx.rotate(player.angle);
    // body
    const flash = player.invuln > 0 && Math.floor(player.invuln / 60) % 2;
    ctx.fillStyle = flash ? '#ffffff' : '#5ef8ff';
    ctx.shadowColor = '#5ef8ff'; ctx.shadowBlur = 16;
    ctx.beginPath();
    ctx.moveTo(18, 0);
    ctx.lineTo(-10, -11);
    ctx.lineTo(-6, 0);
    ctx.lineTo(-10, 11);
    ctx.closePath();
    ctx.fill();
    // engine glow
    ctx.fillStyle = '#a78bfa';
    ctx.shadowColor = '#a78bfa'; ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(-9, 0, 3 + Math.random() * 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  // Loop
  let lastTime = 0;
  function loop(ts) {
    const dt = Math.min(33, ts - lastTime);
    lastTime = ts;
    if (phase === 'playing') update(dt);
    draw();
    requestAnimationFrame(loop);
  }

  // Overlay
  const overlayEl = document.getElementById('overlay');
  document.getElementById('overlayBtn').addEventListener('click', () => {
    audio(); // unlock
    overlayEl.classList.add('hidden');
    initGame();
  });

  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
