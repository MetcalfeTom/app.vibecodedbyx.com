<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Ayrton Pong — neon paddle, smooth ball</title>
<meta name="description" content="A simple neon pong for @ayrtonalexis. Smooth mouse and keyboard controls. First to 7.">
<meta property="og:title" content="Ayrton Pong">
<meta property="og:description" content="A simple neon pong for @ayrtonalexis. Smooth mouse and keyboard controls. First to 7.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://sloppy.live/ayrton-pong/">
<meta property="og:image" content="https://image.pollinations.ai/prompt/synthwave%20neon%20pong%20game%20glowing%20pink%20paddle%20vs%20cyan%20paddle%20dark%20violet%20void%20bright%20bouncing%20ball%20centered%20clean?width=1200&height=630&model=flux&nologo=true&seed=20140">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8F%93">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Major+Mono+Display&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#ff3fa8; --cyan:#3ff0ff; --violet:#a86bff; --gold:#ffdf5e;
  --paper:#f6e7ff; --void:#08031c;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;overflow:hidden;background:var(--void);color:var(--paper);font-family:'Space Mono', monospace}
body{
  background:
    radial-gradient(60vmin 60vmin at 25% 18%, rgba(255,63,168,0.22), transparent 60%),
    radial-gradient(60vmin 60vmin at 75% 82%, rgba(63,240,255,0.22), transparent 60%),
    radial-gradient(80vmin 80vmin at 50% 50%, rgba(168,107,255,0.10), transparent 70%),
    linear-gradient(180deg, #0d0322 0%, var(--void) 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding: .8rem;
}
body::before{
  content:''; position:fixed; inset:0; z-index:30; pointer-events:none;
  background: repeating-linear-gradient(0deg, rgba(255,255,255,0.025) 0 1px, transparent 1px 3px);
  mix-blend-mode: overlay;
}

.shell{
  width:min(96vw, 960px);
  display:flex; flex-direction:column; gap:.7rem; align-items:center;
  position:relative; z-index:1;
}

header{ text-align:center; }
.eyebrow{
  font-family:'Space Mono', monospace; font-weight:700;
  font-size:.65rem; letter-spacing:.5em; color:var(--cyan);
  text-transform:uppercase; text-shadow:0 0 6px rgba(63,240,255,.5);
  margin-bottom:.25rem;
}
h1{
  margin:0;
  font-family:'Audiowide', sans-serif; font-weight:400;
  font-size: clamp(2rem, 6vw, 3.4rem); line-height:1;
  background: linear-gradient(90deg, var(--pink), var(--violet), var(--cyan), var(--pink));
  background-size: 250% 100%;
  -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent; color:transparent;
  animation: shimmer 7s linear infinite;
}
@keyframes shimmer{ 0%{background-position:0 0} 100%{background-position:200% 0} }
.dedication{
  font-family:'Major Mono Display', monospace;
  font-size: .7rem; letter-spacing:.18em; color: rgba(246,231,255,0.55);
  margin-top: .25rem;
}
.dedication b{ color: var(--gold); text-shadow: 0 0 8px rgba(255,223,94,0.6); font-weight: 400; }

.score-row{
  display:flex; gap: 2.2rem; justify-content:center; align-items:baseline;
  font-family:'Major Mono Display', monospace;
  font-size: clamp(2rem, 5vw, 3rem);
}
.score-row .l{ color:var(--pink); text-shadow: 0 0 14px rgba(255,63,168,0.7); }
.score-row .r{ color:var(--cyan); text-shadow: 0 0 14px rgba(63,240,255,0.7); }
.score-row .sep{ color: rgba(246,231,255,0.25); font-size:.65em; align-self:center; }

.stage{
  position:relative;
  width: 100%;
  aspect-ratio: 16/9;
  border: 2px solid var(--violet);
  border-radius: 6px;
  background: #04020f;
  overflow:hidden;
  box-shadow:
    0 0 24px rgba(168,107,255,0.45),
    0 0 56px rgba(168,107,255,0.18),
    inset 0 0 40px rgba(0,0,0,0.55);
}
.stage canvas{ position:absolute; inset:0; width:100%; height:100%; display:block; }

.overlay{
  position:absolute; inset:0; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:.7rem;
  background: rgba(8,3,28,0.78);
  backdrop-filter: blur(1px);
  -webkit-backdrop-filter: blur(1px);
  text-align:center; padding: 1rem;
  transition: opacity .25s;
  pointer-events: none;
  opacity: 0;
}
.overlay.show{ opacity: 1; pointer-events: auto; }
.overlay .big{
  font-family:'Audiowide', sans-serif;
  font-size: clamp(1.7rem, 5vw, 2.6rem);
  background: linear-gradient(90deg, var(--pink), var(--cyan));
  -webkit-background-clip:text; background-clip:text;
  -webkit-text-fill-color:transparent; color: transparent;
  text-shadow: 0 0 22px rgba(168,107,255,0.4);
  letter-spacing: .12em;
}
.overlay .sub{
  font-family:'Space Mono', monospace; font-size:.92rem;
  color: rgba(246,231,255,0.75); letter-spacing:.08em;
  max-width: 36ch;
}
.btn{
  appearance:none; background: transparent;
  border:1px solid var(--cyan); color: var(--cyan);
  font-family:'Space Mono', monospace; font-weight:700;
  font-size:.78rem; letter-spacing:.2em; text-transform:uppercase;
  padding: .75rem 1.4rem; cursor:pointer; border-radius:4px;
  min-height: 44px;
  transition: all .15s;
}
.btn:hover, .btn:focus-visible{
  background: rgba(63,240,255,0.16);
  box-shadow: 0 0 14px rgba(63,240,255,0.6);
  outline: none;
}
.btn:focus-visible{ outline:2px solid var(--pink); outline-offset:3px; }
.btn.pink{ border-color: var(--pink); color: var(--pink); }
.btn.pink:hover{ background: rgba(255,63,168,0.16); box-shadow: 0 0 14px rgba(255,63,168,0.6); }

.controls{
  display:flex; gap:.5rem; flex-wrap:wrap; justify-content:center;
  font-family:'Space Mono', monospace; font-size:.7rem;
  letter-spacing:.15em; color: rgba(246,231,255,0.6);
}
.controls .pill{
  display:inline-flex; align-items:center; gap:.3em;
  background: rgba(168,107,255,0.10);
  border:1px solid rgba(168,107,255,0.3);
  padding: .3rem .55rem;
  border-radius: 999px;
  text-transform: uppercase;
}
.controls kbd{
  display:inline-block; padding:.05rem .35rem;
  border:1px solid rgba(168,107,255,0.4);
  background: rgba(168,107,255,0.06);
  border-radius: 3px;
  font-family:'Space Mono', monospace; font-size:.7rem;
  color: var(--paper);
  letter-spacing:0;
}
.controls button{
  appearance:none; background: transparent;
  border: 1px solid rgba(246,231,255,0.25);
  color: rgba(246,231,255,0.7);
  font-family: inherit; font-size:.7rem;
  letter-spacing:.18em; text-transform:uppercase;
  padding: .3rem .6rem; border-radius: 999px;
  cursor: pointer;
}
.controls button:hover{ color: var(--gold); border-color: var(--gold); }
.controls button[aria-pressed="true"]{ background: rgba(255,223,94,0.12); color: var(--gold); border-color: var(--gold); }

@media (max-width: 540px){
  .controls{ font-size:.6rem; }
  .dedication{ font-size:.6rem; }
}
@media (prefers-reduced-motion: reduce){
  h1{ animation: none; }
}
</style>
</head>
<body>
<div class="shell">
  <header>
    <div class="eyebrow">▮ ▮ ▯ ▮ neon · classic · for the chat</div>
    <h1>Ayrton Pong</h1>
    <div class="dedication">a quick neon pong · made for <b>@ayrtonalexis</b></div>
  </header>

  <div class="score-row" aria-live="polite">
    <span class="l" id="score-l">0</span>
    <span class="sep">·</span>
    <span class="r" id="score-r">0</span>
  </div>

  <div class="stage">
    <canvas id="c" role="application" aria-label="Pong court. Move the pink paddle with mouse, W/S, or arrow keys."></canvas>
    <div class="overlay show" id="overlay">
      <div class="big" id="o-title">Ayrton Pong</div>
      <div class="sub" id="o-sub">Move with mouse · W/S · ↑/↓ &nbsp;·&nbsp; first to 7</div>
      <button class="btn" type="button" id="o-btn">Start</button>
    </div>
  </div>

  <div class="controls">
    <span class="pill"><span style="color:var(--pink)">●</span> you</span>
    <span class="pill"><kbd>W</kbd><kbd>S</kbd> or <kbd>↑</kbd><kbd>↓</kbd> · mouse · <kbd>P</kbd> pause</span>
    <button type="button" id="btn-mute" aria-pressed="false">♪ sound</button>
    <span class="pill"><span style="color:var(--cyan)">●</span> bot</span>
  </div>
</div>

<script>
'use strict';
(function(){
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');
  const $overlay = document.getElementById('overlay');
  const $oTitle  = document.getElementById('o-title');
  const $oSub    = document.getElementById('o-sub');
  const $oBtn    = document.getElementById('o-btn');
  const $sL      = document.getElementById('score-l');
  const $sR      = document.getElementById('score-r');
  const $muteBtn = document.getElementById('btn-mute');

  // Logical 800×450 court (16:9). All physics in logical coords.
  const W = 800, H = 450;
  function fit(){
    const r = canvas.getBoundingClientRect();
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    canvas.width = Math.round(r.width * dpr);
    canvas.height = Math.round(r.height * dpr);
    ctx.setTransform(canvas.width / W, 0, 0, canvas.height / H, 0, 0);
  }
  window.addEventListener('resize', fit);
  fit();

  // ── audio ──
  let audioCtx = null, muted = false;
  function ac(){ if (!audioCtx) try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(_){} return audioCtx; }
  function blip(freq, dur, type, gain){
    if (muted) return;
    const a = ac(); if (!a) return;
    const o = a.createOscillator(), g = a.createGain();
    o.type = type || 'square';
    o.frequency.setValueAtTime(freq, a.currentTime);
    g.gain.setValueAtTime(0, a.currentTime);
    g.gain.linearRampToValueAtTime(gain || 0.18, a.currentTime + 0.005);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + dur);
    o.connect(g).connect(a.destination);
    o.start(); o.stop(a.currentTime + dur + 0.02);
  }
  function chord(){
    if (muted) return;
    [523, 659, 784].forEach((f, i) => setTimeout(() => blip(f, 0.45, 'triangle', 0.16), i * 110));
  }
  $muteBtn.addEventListener('click', () => {
    muted = !muted;
    $muteBtn.textContent = muted ? '♪ muted' : '♪ sound';
    $muteBtn.setAttribute('aria-pressed', String(muted));
  });

  // ── game state ──
  const PADDLE_W = 12, PADDLE_H = 84, BALL_R = 8;
  const MAX_PADDLE_SPEED = 680;
  const BALL_BASE = 360, BALL_BUMP = 28, BALL_MAX = 800;
  const AI_REACT = 0.085, AI_MISS = 24;
  const WIN_SCORE = 7;

  const state = {
    running: false,
    paused: false,
    leftY: H/2 - PADDLE_H/2,
    leftV: 0,
    leftTarget: null,         // mouse Y target
    rightY: H/2 - PADDLE_H/2,
    rightV: 0,
    ball: { x: W/2, y: H/2, vx: 0, vy: 0 },
    trail: [],
    particles: [],
    scoreL: 0, scoreR: 0,
    serveDelay: 0,
    keys: { up:false, down:false },
    inputMode: 'pointer',    // last active input
    lastT: 0,
  };

  function resetBall(dir){
    state.ball.x = W/2; state.ball.y = H/2;
    const angle = (Math.random() * 0.6 - 0.3);
    const speed = BALL_BASE;
    state.ball.vx = Math.cos(angle) * speed * dir;
    state.ball.vy = Math.sin(angle) * speed;
    state.serveDelay = 0.7;
    state.trail.length = 0;
  }

  function startGame(){
    state.scoreL = 0; state.scoreR = 0; $sL.textContent = 0; $sR.textContent = 0;
    state.leftY = state.rightY = H/2 - PADDLE_H/2;
    state.leftV = state.rightV = 0;
    state.leftTarget = null;
    state.particles.length = 0;
    state.running = true; state.paused = false;
    hideOverlay();
    resetBall(Math.random() < 0.5 ? -1 : 1);
    ac();
  }

  function showOverlay(t, s, btn){
    $oTitle.textContent = t;
    $oSub.textContent = s;
    $oBtn.textContent = btn || 'Start';
    $overlay.classList.add('show');
  }
  function hideOverlay(){ $overlay.classList.remove('show'); }

  // ── input ──
  $oBtn.addEventListener('click', () => {
    if (!state.running || state.scoreL >= WIN_SCORE || state.scoreR >= WIN_SCORE) startGame();
    else togglePause();
  });
  function togglePause(){
    if (!state.running) return;
    state.paused = !state.paused;
    if (state.paused) showOverlay('Paused', 'press P or click to resume', 'Resume');
    else hideOverlay();
  }
  window.addEventListener('keydown', (e) => {
    const k = e.key;
    if (k === 'w' || k === 'W' || k === 'ArrowUp')   { state.keys.up = true; state.inputMode = 'keyboard'; state.leftTarget = null; e.preventDefault(); }
    if (k === 's' || k === 'S' || k === 'ArrowDown') { state.keys.down = true; state.inputMode = 'keyboard'; state.leftTarget = null; e.preventDefault(); }
    if (k === 'p' || k === 'P') togglePause();
    if (k === ' ' && !state.running) { startGame(); e.preventDefault(); }
  });
  window.addEventListener('keyup', (e) => {
    if (e.key === 'w' || e.key === 'W' || e.key === 'ArrowUp')   state.keys.up = false;
    if (e.key === 's' || e.key === 'S' || e.key === 'ArrowDown') state.keys.down = false;
  });

  function ptToLogicalY(clientY){
    const r = canvas.getBoundingClientRect();
    const y = (clientY - r.top) / r.height * H;
    return Math.max(0, Math.min(H, y));
  }
  let lastClientY = null;
  canvas.addEventListener('mousedown', e => { state.inputMode = 'pointer'; state.leftTarget = ptToLogicalY(e.clientY) - PADDLE_H/2; });
  canvas.addEventListener('mousemove', e => {
    if (!state.running) return;
    if (state.inputMode === 'keyboard'){
      // only steal control on a real move (>16 px)
      if (lastClientY != null && Math.abs(e.clientY - lastClientY) > 16) state.inputMode = 'pointer';
      lastClientY = e.clientY;
      if (state.inputMode === 'keyboard') return;
    }
    state.leftTarget = ptToLogicalY(e.clientY) - PADDLE_H/2;
  });
  canvas.addEventListener('touchstart', e => {
    if (!state.running) return;
    const t = e.touches[0]; if (!t) return;
    state.inputMode = 'pointer';
    state.leftTarget = ptToLogicalY(t.clientY) - PADDLE_H/2;
    e.preventDefault();
  }, { passive: false });
  canvas.addEventListener('touchmove', e => {
    if (!state.running) return;
    const t = e.touches[0]; if (!t) return;
    state.inputMode = 'pointer';
    state.leftTarget = ptToLogicalY(t.clientY) - PADDLE_H/2;
    e.preventDefault();
  }, { passive: false });

  // ── physics ──
  function update(dt){
    // Left paddle (player)
    if (state.inputMode === 'pointer' && state.leftTarget != null){
      // critically damped follow toward mouse target
      const target = state.leftTarget + PADDLE_H/2;
      const cur = state.leftY + PADDLE_H/2;
      const diff = target - cur;
      const desired = Math.sign(diff) * Math.min(Math.abs(diff) * 14, MAX_PADDLE_SPEED);
      state.leftV += (desired - state.leftV) * Math.min(1, dt * 12);
    } else {
      // keyboard accel + drag
      let accel = 0;
      if (state.keys.up)   accel -= 3800;
      if (state.keys.down) accel += 3800;
      state.leftV += accel * dt;
      if (!state.keys.up && !state.keys.down){
        state.leftV *= Math.max(0, 1 - dt * 7);
      }
    }
    state.leftV = Math.max(-MAX_PADDLE_SPEED, Math.min(MAX_PADDLE_SPEED, state.leftV));
    state.leftY += state.leftV * dt;
    if (state.leftY < 0){ state.leftY = 0; state.leftV = 0; }
    if (state.leftY > H - PADDLE_H){ state.leftY = H - PADDLE_H; state.leftV = 0; }

    // AI paddle — smoothed tracking; idles drifting when ball moves away
    let aiTarget;
    if (state.ball.vx > 0){
      aiTarget = state.ball.y - PADDLE_H/2 + Math.sin(performance.now() * 0.003) * AI_MISS;
    } else {
      aiTarget = H/2 - PADDLE_H/2 + Math.sin(performance.now() * 0.0007) * 32;
    }
    state.rightV = (aiTarget - state.rightY) * AI_REACT * 60;
    const aiMax = MAX_PADDLE_SPEED * 0.78;
    if (state.rightV >  aiMax) state.rightV =  aiMax;
    if (state.rightV < -aiMax) state.rightV = -aiMax;
    state.rightY += state.rightV * dt;
    if (state.rightY < 0) state.rightY = 0;
    if (state.rightY > H - PADDLE_H) state.rightY = H - PADDLE_H;

    // Ball
    if (state.serveDelay > 0){ state.serveDelay -= dt; return; }
    state.trail.push({ x: state.ball.x, y: state.ball.y });
    if (state.trail.length > 14) state.trail.shift();
    state.ball.x += state.ball.vx * dt;
    state.ball.y += state.ball.vy * dt;

    // Walls
    if (state.ball.y - BALL_R < 0){ state.ball.y = BALL_R; state.ball.vy = Math.abs(state.ball.vy); blip(290, 0.05, 'square', 0.12); spawnParticles(state.ball.x, 0, 280, 5); }
    if (state.ball.y + BALL_R > H){ state.ball.y = H - BALL_R; state.ball.vy = -Math.abs(state.ball.vy); blip(290, 0.05, 'square', 0.12); spawnParticles(state.ball.x, H, 280, 5); }

    // Left paddle hit
    const lx = 24, lxr = lx + PADDLE_W;
    if (state.ball.vx < 0 && state.ball.x - BALL_R <= lxr && state.ball.x + BALL_R >= lx){
      if (state.ball.y >= state.leftY && state.ball.y <= state.leftY + PADDLE_H){
        state.ball.x = lxr + BALL_R;
        const hit = (state.ball.y - (state.leftY + PADDLE_H/2)) / (PADDLE_H/2);
        const speed = Math.min(Math.hypot(state.ball.vx, state.ball.vy) + BALL_BUMP, BALL_MAX);
        const ang = hit * 0.85;
        state.ball.vx = Math.cos(ang) * speed;
        state.ball.vy = Math.sin(ang) * speed + state.leftV * 0.18;
        blip(520, 0.06, 'square', 0.18);
        spawnParticles(state.ball.x, state.ball.y, 320, 8);
      }
    }
    // Right paddle hit
    const rx = W - 24 - PADDLE_W, rxr = rx + PADDLE_W;
    if (state.ball.vx > 0 && state.ball.x + BALL_R >= rx && state.ball.x - BALL_R <= rxr){
      if (state.ball.y >= state.rightY && state.ball.y <= state.rightY + PADDLE_H){
        state.ball.x = rx - BALL_R;
        const hit = (state.ball.y - (state.rightY + PADDLE_H/2)) / (PADDLE_H/2);
        const speed = Math.min(Math.hypot(state.ball.vx, state.ball.vy) + BALL_BUMP, BALL_MAX);
        const ang = hit * 0.85;
        state.ball.vx = -Math.cos(ang) * speed;
        state.ball.vy = Math.sin(ang) * speed + state.rightV * 0.18;
        blip(440, 0.06, 'square', 0.18);
        spawnParticles(state.ball.x, state.ball.y, 190, 8);
      }
    }
    // Out of bounds → score
    if (state.ball.x < -BALL_R){
      state.scoreR++; $sR.textContent = state.scoreR;
      blipDown(); spawnParticles(0, state.ball.y, 190, 18);
      if (state.scoreR >= WIN_SCORE) endGame(false);
      else resetBall(-1);
    } else if (state.ball.x > W + BALL_R){
      state.scoreL++; $sL.textContent = state.scoreL;
      blipUp(); spawnParticles(W, state.ball.y, 320, 18);
      if (state.scoreL >= WIN_SCORE) endGame(true);
      else resetBall(1);
    }

    // Particles
    for (let i = state.particles.length - 1; i >= 0; i--){
      const p = state.particles[i];
      p.age += dt;
      p.x += p.vx * dt; p.y += p.vy * dt;
      p.vx *= Math.max(0, 1 - 1.2 * dt);
      p.vy *= Math.max(0, 1 - 1.2 * dt);
      if (p.age >= p.life) state.particles.splice(i, 1);
    }
  }

  function spawnParticles(x, y, hue, n){
    for (let i = 0; i < n; i++){
      const a = Math.random() * Math.PI * 2;
      const s = 40 + Math.random() * 120;
      state.particles.push({ x, y, vx: Math.cos(a)*s, vy: Math.sin(a)*s, life: 0.45 + Math.random()*0.35, age: 0, hue, size: 2 + Math.random()*2 });
    }
  }
  function blipDown(){ if (muted) return; const a = ac(); if (!a) return;
    const o = a.createOscillator(), g = a.createGain();
    o.type='sawtooth'; o.frequency.setValueAtTime(440, a.currentTime); o.frequency.exponentialRampToValueAtTime(140, a.currentTime + 0.32);
    g.gain.setValueAtTime(0.18, a.currentTime); g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.35);
    o.connect(g).connect(a.destination); o.start(); o.stop(a.currentTime + 0.38);
  }
  function blipUp(){ if (muted) return; const a = ac(); if (!a) return;
    const o = a.createOscillator(), g = a.createGain();
    o.type='triangle'; o.frequency.setValueAtTime(440, a.currentTime); o.frequency.exponentialRampToValueAtTime(880, a.currentTime + 0.22);
    g.gain.setValueAtTime(0.16, a.currentTime); g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.28);
    o.connect(g).connect(a.destination); o.start(); o.stop(a.currentTime + 0.3);
  }

  function endGame(won){
    state.running = false;
    state.particles.length = 0;
    if (won){
      showOverlay('You win', 'first to 7 · gg, ayrton', 'Play again');
      chord();
    } else {
      showOverlay('Bot wins', 'first to 7 · rematch?', 'Rematch');
      blipDown();
    }
  }

  // ── render ──
  function render(){
    ctx.fillStyle = 'rgba(4, 2, 15, 0.42)';
    ctx.fillRect(0, 0, W, H);

    // midline
    ctx.save();
    ctx.strokeStyle = 'rgba(168, 107, 255, 0.55)';
    ctx.lineWidth = 2;
    ctx.setLineDash([10, 12]);
    ctx.shadowColor = 'rgba(168, 107, 255, 0.6)';
    ctx.shadowBlur = 12;
    ctx.beginPath(); ctx.moveTo(W/2, 8); ctx.lineTo(W/2, H - 8); ctx.stroke();
    ctx.restore();

    // particles
    for (const p of state.particles){
      const a = 1 - (p.age / p.life);
      ctx.fillStyle = `hsla(${p.hue}, 100%, 65%, ${a})`;
      ctx.shadowColor = `hsl(${p.hue}, 100%, 70%)`;
      ctx.shadowBlur = 10;
      ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
    }
    ctx.shadowBlur = 0;

    // trail
    for (let i = 0; i < state.trail.length; i++){
      const t = state.trail[i];
      const k = i / state.trail.length;
      ctx.fillStyle = `rgba(255, 223, 94, ${0.05 + k * 0.32})`;
      ctx.beginPath(); ctx.arc(t.x, t.y, BALL_R * (0.4 + k*0.7), 0, Math.PI*2); ctx.fill();
    }

    drawPaddle(24, state.leftY, '#ff3fa8', 'rgba(255,63,168,0.7)');
    drawPaddle(W - 24 - PADDLE_W, state.rightY, '#3ff0ff', 'rgba(63,240,255,0.7)');

    // ball
    ctx.save();
    ctx.shadowColor = '#ffdf5e'; ctx.shadowBlur = 22;
    ctx.fillStyle = '#fff7c8';
    ctx.beginPath(); ctx.arc(state.ball.x, state.ball.y, BALL_R, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffdf5e'; ctx.shadowBlur = 0;
    ctx.beginPath(); ctx.arc(state.ball.x, state.ball.y, BALL_R*0.55, 0, Math.PI*2); ctx.fill();
    ctx.restore();
  }
  function drawPaddle(x, y, color, glow){
    ctx.save();
    ctx.shadowColor = glow; ctx.shadowBlur = 20;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(x, y, PADDLE_W, PADDLE_H);
    ctx.fillStyle = color;
    ctx.fillRect(x, y, PADDLE_W, PADDLE_H);
    ctx.shadowBlur = 0;
    ctx.fillStyle = 'rgba(255,255,255,0.35)';
    ctx.fillRect(x + 3, y + 5, 2, PADDLE_H - 10);
    ctx.restore();
  }

  // ── loop ──
  function frame(now){
    const dt = state.lastT ? Math.min(0.033, (now - state.lastT) / 1000) : 0.016;
    state.lastT = now;
    if (state.running && !state.paused) update(dt);
    render();
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);
})();
</script>
</body>
</html>
