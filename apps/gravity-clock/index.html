<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gravity Clock</title>
<link rel="icon" href="https://emojicdn.elk.sh/%E2%8F%B3">
<meta name="description" content="A mechanical clock powered by falling weights, grinding gears, and an escapement that actually ticks.">
<meta property="og:title" content="Gravity Clock">
<meta property="og:description" content="A mechanical clock powered by falling weights, grinding gears, and an escapement that actually ticks.">
<meta property="og:url" content="https://sloppy.live/gravity-clock">
<meta property="og:image" content="https://sloppy.live/gravity-clock/og-image.png">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1410;
    --wood: #2a1d14;
    --brass: #c9a35a;
    --brass-dark: #7a5f2e;
    --brass-light: #efd591;
    --ink: #f5e9cd;
    --dim: #8a7a60;
    --shadow: rgba(0,0,0,0.6);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'Cormorant Garamond', serif;
    height: 100%;
    overflow: hidden;
  }
  body {
    background:
      radial-gradient(ellipse at 50% 30%, #3a2a1d 0%, #120c08 80%),
      #120c08;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  canvas {
    display: block;
    max-width: 100vw;
    max-height: 100vh;
  }
  #header {
    position: fixed;
    top: 20px;
    left: 0; right: 0;
    text-align: center;
    z-index: 10;
    pointer-events: none;
  }
  h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 600;
    font-size: 38px;
    letter-spacing: 12px;
    color: var(--brass-light);
    text-shadow: 0 2px 12px rgba(201, 163, 90, 0.3);
    text-transform: uppercase;
  }
  #subtitle {
    font-family: 'Special Elite', monospace;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 4px;
    margin-top: 2px;
    text-transform: uppercase;
  }
  #digital {
    position: fixed;
    bottom: 80px;
    left: 0; right: 0;
    text-align: center;
    font-family: 'Special Elite', monospace;
    font-size: 14px;
    color: var(--brass);
    letter-spacing: 4px;
    pointer-events: none;
    z-index: 10;
  }
  #backlink {
    position: fixed;
    bottom: 18px;
    left: 0; right: 0;
    text-align: center;
    font-family: 'Special Elite', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--dim);
    text-decoration: none;
    text-transform: uppercase;
    z-index: 10;
  }
  #backlink:hover { color: var(--brass-light); }
  #wind {
    position: fixed;
    top: 20px;
    right: 24px;
    z-index: 10;
    background: linear-gradient(#3a2a1d, #1f1610);
    color: var(--brass-light);
    font-family: 'Special Elite', monospace;
    border: 1px solid var(--brass-dark);
    padding: 10px 16px;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
  }
  #wind:hover { background: linear-gradient(#4a382a, #2a1d14); }
  @media (max-width: 640px) {
    h1 { font-size: 22px; letter-spacing: 6px; }
    #digital { bottom: 60px; font-size: 11px; }
    #wind { top: 12px; right: 12px; padding: 6px 10px; font-size: 9px; }
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="header">
  <h1>Gravity Clock</h1>
  <div id="subtitle">mechanical movement · est. 2026</div>
</div>
<div id="digital"><span id="time">00:00:00</span></div>
<button id="wind">↑ Wind</button>
<a id="backlink" href="https://sloppy.live">← sloppy.live</a>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const DPR = Math.min(window.devicePixelRatio || 1, 2);

let W = 0, H = 0, S = 1;
const BASE_W = 720, BASE_H = 900;

function resize() {
  const vw = window.innerWidth, vh = window.innerHeight;
  S = Math.min(vw / BASE_W, vh / BASE_H);
  W = BASE_W * S;
  H = BASE_H * S;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR * S, 0, 0, DPR * S, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// Weights: two falling weights provide energy. When "wound", they pull up to the top.
const weights = [
  { x: 150, y: 200, label: 'HOURS', color: '#c9a35a' },
  { x: 570, y: 250, label: 'STRIKE', color: '#a8864a' }
];
const weightFallSpeed = 0.05; // px/ms

function drawGear(cx, cy, r, teeth, rotation, fill, stroke) {
  const inner = r * 0.82;
  const toothDepth = r * 0.15;
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(rotation);

  ctx.beginPath();
  for (let i = 0; i < teeth; i++) {
    const a0 = (i / teeth) * Math.PI * 2;
    const a1 = ((i + 0.35) / teeth) * Math.PI * 2;
    const a2 = ((i + 0.65) / teeth) * Math.PI * 2;
    const a3 = ((i + 1) / teeth) * Math.PI * 2;
    if (i === 0) ctx.moveTo(Math.cos(a0) * inner, Math.sin(a0) * inner);
    else ctx.lineTo(Math.cos(a0) * inner, Math.sin(a0) * inner);
    ctx.lineTo(Math.cos(a0) * (r + toothDepth), Math.sin(a0) * (r + toothDepth));
    ctx.lineTo(Math.cos(a1) * (r + toothDepth), Math.sin(a1) * (r + toothDepth));
    ctx.lineTo(Math.cos(a2) * inner, Math.sin(a2) * inner);
    ctx.lineTo(Math.cos(a3) * inner, Math.sin(a3) * inner);
  }
  ctx.closePath();

  const grad = ctx.createRadialGradient(-r*0.3, -r*0.3, 0, 0, 0, r * 1.2);
  grad.addColorStop(0, fill[0]);
  grad.addColorStop(1, fill[1]);
  ctx.fillStyle = grad;
  ctx.fill();
  ctx.strokeStyle = stroke;
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Spokes
  ctx.strokeStyle = stroke;
  ctx.lineWidth = 3;
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * r * 0.15, Math.sin(a) * r * 0.15);
    ctx.lineTo(Math.cos(a) * inner * 0.9, Math.sin(a) * inner * 0.9);
    ctx.stroke();
  }

  // Hub
  ctx.beginPath();
  ctx.arc(0, 0, r * 0.16, 0, Math.PI * 2);
  ctx.fillStyle = '#3a2a1d';
  ctx.fill();
  ctx.strokeStyle = stroke;
  ctx.lineWidth = 1.5;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(0, 0, r * 0.05, 0, Math.PI * 2);
  ctx.fillStyle = '#1a0f08';
  ctx.fill();

  ctx.restore();
}

function drawWeight(w) {
  ctx.save();
  ctx.translate(w.x, w.y);

  // Chain
  ctx.strokeStyle = '#5a4a32';
  ctx.lineWidth = 2;
  ctx.setLineDash([4, 3]);
  ctx.beginPath();
  ctx.moveTo(0, -w.y);
  ctx.lineTo(0, 0);
  ctx.stroke();
  ctx.setLineDash([]);

  // Chain links (more detailed)
  for (let y = -w.y + 6; y < 0; y += 10) {
    ctx.beginPath();
    ctx.ellipse(0, y, 3, 2, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#7a5f2e';
    ctx.fill();
    ctx.strokeStyle = '#3a2a1d';
    ctx.lineWidth = 0.8;
    ctx.stroke();
  }

  // Weight cylinder
  const wd = 44, ht = 80;
  const grad = ctx.createLinearGradient(-wd/2, 0, wd/2, 0);
  grad.addColorStop(0, '#4a3820');
  grad.addColorStop(0.4, w.color);
  grad.addColorStop(0.5, '#efd591');
  grad.addColorStop(0.6, w.color);
  grad.addColorStop(1, '#2a1d14');
  ctx.fillStyle = grad;
  ctx.fillRect(-wd/2, 0, wd, ht);
  ctx.strokeStyle = '#1a0f08';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(-wd/2, 0, wd, ht);

  // Top cap
  ctx.fillStyle = '#efd591';
  ctx.fillRect(-wd/2 - 3, -4, wd + 6, 8);
  ctx.strokeRect(-wd/2 - 3, -4, wd + 6, 8);

  // Bottom cap
  ctx.fillStyle = '#7a5f2e';
  ctx.fillRect(-wd/2 - 3, ht - 4, wd + 6, 8);
  ctx.strokeRect(-wd/2 - 3, ht - 4, wd + 6, 8);

  // Decorative band
  ctx.strokeStyle = '#efd591';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-wd/2, ht/2);
  ctx.lineTo(wd/2, ht/2);
  ctx.stroke();

  // Label
  ctx.fillStyle = '#1a0f08';
  ctx.font = '9px "Special Elite", monospace';
  ctx.textAlign = 'center';
  ctx.fillText(w.label, 0, ht/2 + 3);

  ctx.restore();
}

// Clock face center
const faceX = 360, faceY = 480, faceR = 170;

function drawFace() {
  ctx.save();
  ctx.translate(faceX, faceY);

  // Outer brass rim
  const rimGrad = ctx.createRadialGradient(0, 0, faceR, 0, 0, faceR + 20);
  rimGrad.addColorStop(0, '#c9a35a');
  rimGrad.addColorStop(1, '#5a4020');
  ctx.fillStyle = rimGrad;
  ctx.beginPath();
  ctx.arc(0, 0, faceR + 18, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#3a2a1d';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Inner ring
  ctx.beginPath();
  ctx.arc(0, 0, faceR + 6, 0, Math.PI * 2);
  ctx.strokeStyle = '#efd591';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Face background
  const faceGrad = ctx.createRadialGradient(0, -faceR * 0.3, 10, 0, 0, faceR);
  faceGrad.addColorStop(0, '#f5e9cd');
  faceGrad.addColorStop(1, '#c9a880');
  ctx.fillStyle = faceGrad;
  ctx.beginPath();
  ctx.arc(0, 0, faceR, 0, Math.PI * 2);
  ctx.fill();

  // Age stains
  ctx.fillStyle = 'rgba(90, 60, 30, 0.12)';
  for (let i = 0; i < 8; i++) {
    const a = (i / 8) * Math.PI * 2 + 0.3;
    const r = faceR * 0.6 + (i % 3) * 10;
    ctx.beginPath();
    ctx.arc(Math.cos(a) * r, Math.sin(a) * r, 8 + (i%3)*2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Hour markers (Roman numerals)
  const romans = ['XII','I','II','III','IV','V','VI','VII','VIII','IX','X','XI'];
  ctx.fillStyle = '#1a0f08';
  ctx.font = 'bold 22px "Cormorant Garamond", serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  for (let i = 0; i < 12; i++) {
    const a = (i / 12) * Math.PI * 2 - Math.PI / 2;
    const rx = Math.cos(a) * (faceR * 0.82);
    const ry = Math.sin(a) * (faceR * 0.82);
    ctx.fillText(romans[i], rx, ry);
  }

  // Minute ticks
  ctx.strokeStyle = '#3a2a1d';
  for (let i = 0; i < 60; i++) {
    const a = (i / 60) * Math.PI * 2;
    const r1 = faceR * 0.93;
    const r2 = i % 5 === 0 ? faceR * 0.86 : faceR * 0.9;
    ctx.lineWidth = i % 5 === 0 ? 2 : 1;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * r1, Math.sin(a) * r1);
    ctx.lineTo(Math.cos(a) * r2, Math.sin(a) * r2);
    ctx.stroke();
  }

  // Maker's mark
  ctx.font = 'italic 10px "Cormorant Garamond", serif';
  ctx.fillStyle = '#5a4020';
  ctx.fillText('SLOPPY & CO.', 0, 50);
  ctx.font = '8px "Special Elite", monospace';
  ctx.fillText('GRAVITY MVMT', 0, 64);

  ctx.restore();
}

function drawHands(hours, minutes, seconds) {
  ctx.save();
  ctx.translate(faceX, faceY);

  const hourA  = ((hours % 12) + minutes / 60) / 12 * Math.PI * 2 - Math.PI / 2;
  const minA   = (minutes + seconds / 60) / 60 * Math.PI * 2 - Math.PI / 2;
  const secA   = seconds / 60 * Math.PI * 2 - Math.PI / 2;

  // Hour hand
  ctx.strokeStyle = '#1a0f08';
  ctx.lineWidth = 7;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(Math.cos(hourA) * faceR * 0.5, Math.sin(hourA) * faceR * 0.5);
  ctx.stroke();

  // Minute hand
  ctx.lineWidth = 5;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(Math.cos(minA) * faceR * 0.75, Math.sin(minA) * faceR * 0.75);
  ctx.stroke();

  // Second hand
  ctx.strokeStyle = '#a82020';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-Math.cos(secA) * 15, -Math.sin(secA) * 15);
  ctx.lineTo(Math.cos(secA) * faceR * 0.85, Math.sin(secA) * faceR * 0.85);
  ctx.stroke();

  // Center hub
  ctx.beginPath();
  ctx.arc(0, 0, 6, 0, Math.PI * 2);
  ctx.fillStyle = '#1a0f08';
  ctx.fill();
  ctx.strokeStyle = '#efd591';
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.restore();
}

function drawPendulum(t) {
  // Pendulum swings below the face
  const px = faceX;
  const py = faceY + faceR + 40;
  const length = 160;
  const maxAngle = 0.28;
  const angle = Math.sin(t * Math.PI * 2 * 0.5) * maxAngle; // 0.5 Hz = 1s period full cycle, 0.5s each way
  const bobX = px + Math.sin(angle) * length;
  const bobY = py + Math.cos(angle) * length;

  // Rod
  ctx.save();
  ctx.strokeStyle = '#8a6d3a';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(px, py);
  ctx.lineTo(bobX, bobY);
  ctx.stroke();

  // Bob
  const bobR = 26;
  const grad = ctx.createRadialGradient(bobX - 6, bobY - 8, 2, bobX, bobY, bobR);
  grad.addColorStop(0, '#efd591');
  grad.addColorStop(0.6, '#c9a35a');
  grad.addColorStop(1, '#5a4020');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(bobX, bobY, bobR, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#1a0f08';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Inner ring
  ctx.beginPath();
  ctx.arc(bobX, bobY, bobR * 0.55, 0, Math.PI * 2);
  ctx.strokeStyle = '#8a6d3a';
  ctx.lineWidth = 1;
  ctx.stroke();

  // Pivot screw
  ctx.beginPath();
  ctx.arc(px, py, 5, 0, Math.PI * 2);
  ctx.fillStyle = '#8a6d3a';
  ctx.fill();
  ctx.strokeStyle = '#1a0f08';
  ctx.stroke();
  ctx.restore();
}

function drawCase() {
  // Wooden case background
  ctx.save();

  // Case body
  const caseGrad = ctx.createLinearGradient(0, 0, 0, BASE_H);
  caseGrad.addColorStop(0, '#3a2818');
  caseGrad.addColorStop(0.5, '#2a1d10');
  caseGrad.addColorStop(1, '#1a1008');
  ctx.fillStyle = caseGrad;
  ctx.fillRect(60, 110, BASE_W - 120, BASE_H - 180);

  // Inner wood panel
  ctx.fillStyle = '#1a1008';
  ctx.fillRect(80, 130, BASE_W - 160, BASE_H - 220);

  // Wood grain lines
  ctx.strokeStyle = 'rgba(90, 60, 30, 0.25)';
  ctx.lineWidth = 0.5;
  for (let i = 0; i < 40; i++) {
    const y = 130 + (i * 20) + Math.sin(i) * 6;
    ctx.beginPath();
    ctx.moveTo(80, y);
    ctx.bezierCurveTo(250, y + 4, 400, y - 4, BASE_W - 80, y + 2);
    ctx.stroke();
  }

  // Top molding
  ctx.fillStyle = '#4a3020';
  ctx.beginPath();
  ctx.moveTo(40, 130);
  ctx.lineTo(BASE_W - 40, 130);
  ctx.lineTo(BASE_W - 60, 110);
  ctx.lineTo(60, 110);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#1a0f08';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Bottom molding
  ctx.fillStyle = '#4a3020';
  ctx.beginPath();
  ctx.moveTo(40, BASE_H - 70);
  ctx.lineTo(BASE_W - 40, BASE_H - 70);
  ctx.lineTo(BASE_W - 60, BASE_H - 50);
  ctx.lineTo(60, BASE_H - 50);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  ctx.restore();
}

// Gear positions (spinning cogs visible in the case)
const gears = [
  { x: 180, y: 460, r: 50, teeth: 18, speed: -0.6, fill: ['#efd591','#7a5f2e'] },
  { x: 120, y: 600, r: 38, teeth: 14, speed:  1.2, fill: ['#c9a35a','#5a4020'] },
  { x: 560, y: 440, r: 44, teeth: 16, speed:  0.8, fill: ['#efd591','#7a5f2e'] },
  { x: 620, y: 580, r: 32, teeth: 12, speed: -1.6, fill: ['#c9a35a','#5a4020'] },
  { x: 200, y: 730, r: 60, teeth: 22, speed:  0.4, fill: ['#c9a35a','#4a3020'] },
  { x: 540, y: 720, r: 42, teeth: 16, speed: -0.9, fill: ['#efd591','#7a5f2e'] }
];

function drawGears(t) {
  for (const g of gears) {
    drawGear(g.x, g.y, g.r, g.teeth, t * g.speed, g.fill, '#1a0f08');
  }
}

let startMs = performance.now();
let lastTick = -1;

function tickSound() {
  try {
    const ac = tickSound.ac || (tickSound.ac = new (window.AudioContext || window.webkitAudioContext)());
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.frequency.value = 1200 + Math.random() * 200;
    o.type = 'square';
    g.gain.value = 0.02;
    o.connect(g).connect(ac.destination);
    o.start();
    g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + 0.04);
    o.stop(ac.currentTime + 0.05);
  } catch (e) {}
}

let soundEnabled = false;
document.addEventListener('click', () => { soundEnabled = true; }, { once: true });

function frame(nowMs) {
  const t = (nowMs - startMs) / 1000;
  const now = new Date();
  const h = now.getHours();
  const m = now.getMinutes();
  const s = now.getSeconds();
  const ms = now.getMilliseconds();
  const smooth = s + ms / 1000;

  // Update weights (fall slowly — "discharging" the spring)
  for (const w of weights) {
    w.y += weightFallSpeed * 16;
    if (w.y > 380) w.y = 380;
  }

  ctx.clearRect(0, 0, BASE_W, BASE_H);
  drawCase();
  drawGears(t);
  for (const w of weights) drawWeight(w);
  drawFace();
  drawHands(h, m, smooth);
  drawPendulum(t);

  // Tick sound on each second
  if (Math.floor(smooth) !== lastTick) {
    lastTick = Math.floor(smooth);
    if (soundEnabled) tickSound();
  }

  // Digital readout
  document.getElementById('time').textContent =
    String(h).padStart(2,'0') + ':' + String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

document.getElementById('wind').addEventListener('click', () => {
  soundEnabled = true;
  // Animate weights back up
  const step = () => {
    let done = true;
    for (const w of weights) {
      const target = w.label === 'HOURS' ? 180 : 200;
      if (w.y > target) { w.y -= 6; done = false; }
    }
    if (!done) requestAnimationFrame(step);
  };
  step();
});
</script>
</body>
</html>
