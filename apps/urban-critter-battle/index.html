<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Urban Critter Battle</title>
<meta name="description" content="Pick your alley champion. Raccoon. Pigeon. Opossum. Turn-based scraps in a pixelated alleyway." />
<meta property="og:title" content="Urban Critter Battle" />
<meta property="og:description" content="Pick your alley champion. Raccoon. Pigeon. Opossum. Turn-based scraps in a pixelated alleyway." />
<meta property="og:url" content="https://sloppy.live/urban-critter-battle/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/pixel%20art%20raccoon%20pigeon%20opossum%20fighting%20in%20a%20dingy%20alleyway%2C%20sodium%20streetlight%2C%20gritty%20urban%2C%20chunky%208-bit%2C%201200x630?width=1200&height=630&nofeed=true&format=png" />
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%A6%9D" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Special+Elite&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --concrete:#1a1a1d;
  --concrete-mid:#2a2a30;
  --concrete-up:#3d3d44;
  --sodium:#ffaa3c;
  --sodium-soft:#ffd58a;
  --neon-pink:#ff3c8a;
  --grime:#7d8a5b;
  --toxic:#9eff5e;
  --hp-good:#4ce864;
  --hp-warn:#ffd24a;
  --hp-bad:#ff4a4a;
  --rust:#a85f3d;
  --paper:#d6cfb8;
  --raccoon:#8a8a92;
  --pigeon:#7a8694;
  --possum:#cfc8b8;
  --ink:#0a0a0c;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;overscroll-behavior:none}
body{
  font-family:'Special Elite', cursive;
  color:var(--paper);
  background:
    radial-gradient(ellipse at 50% 0%, rgba(255,170,60,0.20), transparent 55%),
    radial-gradient(ellipse at 80% 100%, rgba(126,108,52,0.10), transparent 60%),
    linear-gradient(180deg, #0e0e10 0%, #15151a 50%, #0a0a0c 100%);
  min-height:100vh;
  position:relative;overflow-x:hidden;
}
/* gritty paper trash + dust drift */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    repeating-linear-gradient(
      4deg,
      rgba(255,255,255,0.02) 0px,
      rgba(255,255,255,0.02) 1px,
      transparent 1px,
      transparent 4px
    );
  mix-blend-mode:overlay;opacity:0.6;
}
/* film grain layer */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:1;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(255,255,255,0.03) 1px, transparent 1.4px),
    radial-gradient(circle at 60% 70%, rgba(255,255,255,0.025) 0.8px, transparent 1.2px),
    radial-gradient(circle at 78% 18%, rgba(255,255,255,0.02) 0.7px, transparent 1.0px);
  background-size:140px 140px, 200px 200px, 260px 260px;
  mix-blend-mode:screen;opacity:0.7;
}

.wrap{
  position:relative;z-index:2;
  max-width:920px;margin:0 auto;padding:24px 18px 40px;
}

.title{
  font-family:'Press Start 2P', monospace;
  font-size:clamp(20px, 4.5vw, 36px);
  letter-spacing:0.04em;line-height:1.25;text-align:center;
  color:var(--sodium);
  text-shadow:
    0 0 16px rgba(255,170,60,0.55),
    3px 3px 0 var(--ink),
    -1px -1px 0 var(--rust);
  margin-bottom:6px;
}
.tagline{
  text-align:center;font-family:'JetBrains Mono', monospace;font-weight:400;
  font-size:11px;letter-spacing:0.42em;color:rgba(214,207,184,0.55);
  text-transform:uppercase;margin-bottom:24px;
}

/* ===== select screen ===== */
.select-grid{
  display:grid;grid-template-columns:repeat(3, 1fr);gap:14px;
  margin:18px 0 26px;
}
@media (max-width:620px){
  .select-grid{grid-template-columns:1fr;gap:10px}
}
.crit-card{
  background:linear-gradient(180deg, var(--concrete-mid), var(--concrete));
  border:3px solid var(--concrete-up);
  border-radius:6px;padding:14px 12px 12px;
  cursor:pointer;transition:all 0.16s ease;
  position:relative;overflow:hidden;
  box-shadow:
    0 4px 0 var(--ink),
    inset 0 1px 0 rgba(255,255,255,0.08);
}
.crit-card:hover{
  border-color:var(--sodium);
  transform:translateY(-2px);
  box-shadow:
    0 6px 0 var(--ink),
    0 6px 14px rgba(255,170,60,0.20),
    inset 0 1px 0 rgba(255,255,255,0.10);
}
.crit-card::after{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:repeating-linear-gradient(
    0deg,
    transparent 0px, transparent 2px,
    rgba(0,0,0,0.20) 2px, rgba(0,0,0,0.20) 3px
  );
  mix-blend-mode:multiply;opacity:0.4;
}
.crit-card canvas{
  display:block;margin:0 auto 8px;
  image-rendering:pixelated;image-rendering:crisp-edges;
  background:linear-gradient(180deg, #1f1f24, #0e0e12);
  border:2px solid var(--ink);
  width:96px;height:96px;
}
.crit-name{
  font-family:'Press Start 2P', monospace;font-size:11px;
  text-align:center;color:var(--paper);
  letter-spacing:0.04em;margin-bottom:6px;
  text-shadow:1px 1px 0 var(--ink);
}
.crit-type{
  text-align:center;font-family:'JetBrains Mono', monospace;
  font-size:9px;letter-spacing:0.24em;text-transform:uppercase;
  margin-bottom:8px;
}
.crit-stats{
  font-family:'VT323', monospace;font-size:14px;line-height:1.3;
  display:grid;grid-template-columns:1fr auto;gap:1px 8px;
  color:rgba(214,207,184,0.85);
}
.crit-stats b{color:var(--sodium-soft);font-weight:normal}

/* ===== battle stage ===== */
.stage{
  background:
    /* sodium streetlight halo top */
    radial-gradient(ellipse at 50% -20%, rgba(255,170,60,0.30), transparent 55%),
    /* brick wall back */
    repeating-linear-gradient(
      0deg,
      #2a2226 0px, #2a2226 18px,
      #1d1819 18px, #1d1819 20px
    ),
    repeating-linear-gradient(
      90deg,
      #2a2226 0px, #2a2226 38px,
      #1d1819 38px, #1d1819 40px
    );
  background-blend-mode:multiply;
  border:4px solid var(--ink);border-radius:6px;
  position:relative;overflow:hidden;
  min-height:280px;padding:14px;
  box-shadow:
    0 0 0 2px var(--concrete-up),
    inset 0 0 0 2px rgba(0,0,0,0.6),
    0 6px 0 var(--ink),
    0 8px 24px rgba(0,0,0,0.6);
  margin-bottom:14px;
}
/* cracked pavement floor */
.stage::after{
  content:'';position:absolute;left:0;right:0;bottom:0;height:48px;
  background:
    linear-gradient(180deg, #1c1a18 0%, #0e0c0a 100%),
    repeating-linear-gradient(
      90deg,
      transparent 0px, transparent 60px,
      rgba(0,0,0,0.4) 60px, rgba(0,0,0,0.4) 62px
    );
  background-blend-mode:multiply;
  border-top:2px solid #2a2520;
  pointer-events:none;
}
.fight-row{
  display:flex;justify-content:space-between;align-items:flex-end;
  position:relative;z-index:2;min-height:240px;padding-bottom:30px;gap:8px;
}
.combatant{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  flex:1;min-width:0;
}
.combatant .nameplate{
  font-family:'Press Start 2P', monospace;font-size:10px;
  color:var(--paper);text-shadow:1px 1px 0 var(--ink);
  letter-spacing:0.04em;
}
.combatant .hpbar-wrap{
  width:100%;max-width:160px;
}
.hpbar{
  height:14px;background:var(--ink);border:2px solid var(--concrete-up);
  position:relative;overflow:hidden;
}
.hpbar .fill{
  height:100%;background:var(--hp-good);
  transition:width 0.4s ease, background-color 0.4s ease;
  box-shadow:inset 0 -3px 0 rgba(0,0,0,0.30);
}
.hpbar .ticks{
  position:absolute;inset:0;background:repeating-linear-gradient(
    90deg, transparent 0 19px, rgba(0,0,0,0.40) 19px 20px
  );pointer-events:none;
}
.hp-label{
  font-family:'VT323', monospace;font-size:14px;color:var(--paper);
  letter-spacing:0.04em;text-align:center;line-height:1;
  text-shadow:1px 1px 0 var(--ink);
}
.statuses{
  display:flex;gap:4px;flex-wrap:wrap;justify-content:center;min-height:14px;
}
.status-pill{
  font-family:'VT323', monospace;font-size:11px;letter-spacing:0.10em;
  background:rgba(0,0,0,0.55);border:1px solid currentColor;
  padding:1px 5px;border-radius:3px;text-transform:uppercase;
}
.status-pill.poison{color:var(--toxic)}
.status-pill.stun{color:var(--sodium)}
.status-pill.atkdown{color:var(--neon-pink)}
.status-pill.defdown{color:var(--neon-pink)}
.status-pill.accdown{color:var(--neon-pink)}
.status-pill.charge{color:var(--sodium-soft)}

.crit-canvas{
  width:140px;height:140px;
  image-rendering:pixelated;image-rendering:crisp-edges;
  filter:drop-shadow(0 6px 0 rgba(0,0,0,0.5));
  transition:transform 0.18s ease;
}
.crit-canvas.hit{ animation: hitShake 0.3s ease-out; }
@keyframes hitShake{
  0%{transform:translateX(0)}
  25%{transform:translateX(-6px) rotate(-2deg)}
  50%{transform:translateX(6px) rotate(2deg)}
  75%{transform:translateX(-3px)}
  100%{transform:translateX(0)}
}

.vs-divider{
  font-family:'Press Start 2P', monospace;font-size:18px;color:var(--sodium);
  text-shadow:0 0 12px rgba(255,170,60,0.7), 2px 2px 0 var(--ink);
  align-self:center;flex:0 0 auto;
}

/* ===== move buttons ===== */
.action-bar{
  display:grid;grid-template-columns:repeat(3, 1fr) auto;gap:8px;
  margin-bottom:14px;
}
@media (max-width:620px){
  .action-bar{grid-template-columns:repeat(2, 1fr);grid-auto-flow:row dense}
}
.move-btn{
  background:linear-gradient(180deg, var(--concrete-mid), var(--concrete));
  border:3px solid var(--concrete-up);
  color:var(--paper);
  font-family:'Press Start 2P', monospace;font-size:9px;letter-spacing:0.06em;
  padding:10px 8px;cursor:pointer;text-align:left;
  transition:all 0.12s ease;
  box-shadow:0 3px 0 var(--ink);
  display:flex;flex-direction:column;gap:3px;
  text-transform:uppercase;
  position:relative;
}
.move-btn:hover{
  border-color:var(--sodium);transform:translateY(-1px);
  box-shadow:0 4px 0 var(--ink), 0 0 12px rgba(255,170,60,0.25);
}
.move-btn:active{transform:translateY(2px);box-shadow:0 1px 0 var(--ink)}
.move-btn:disabled{
  filter:saturate(0.4) brightness(0.6);cursor:not-allowed;
  transform:translateY(0);box-shadow:0 3px 0 var(--ink);
}
.move-btn .move-meta{
  font-family:'VT323', monospace;font-size:13px;letter-spacing:0.08em;
  color:rgba(214,207,184,0.65);text-transform:none;
}
.run-btn{
  background:linear-gradient(180deg, #50221c, #2a100c);
  border-color:#7a3a32;color:var(--neon-pink);
}
.run-btn:hover{border-color:var(--neon-pink);box-shadow:0 4px 0 var(--ink), 0 0 14px rgba(255,60,138,0.3)}

/* ===== battle log ===== */
.log{
  background:linear-gradient(180deg, #18181c, #0e0e10);
  border:3px solid var(--concrete-up);border-radius:4px;
  padding:10px 12px;height:120px;overflow-y:auto;
  font-family:'VT323', monospace;font-size:16px;line-height:1.35;
  color:rgba(214,207,184,0.85);letter-spacing:0.02em;
  box-shadow:inset 0 2px 6px rgba(0,0,0,0.6);
}
.log .line{ display:block;padding:2px 0;animation: logIn 0.3s ease-out; }
.log .line.you{color:var(--sodium-soft)}
.log .line.foe{color:var(--neon-pink)}
.log .line.crit{color:var(--toxic);font-weight:bold}
.log .line.sys{color:rgba(214,207,184,0.5);font-style:italic}
@keyframes logIn{
  from{opacity:0;transform:translateY(-4px)}
  to{opacity:1;transform:translateY(0)}
}

/* ===== result overlay ===== */
.result{
  position:fixed;inset:0;background:rgba(0,0,0,0.85);
  display:none;align-items:center;justify-content:center;z-index:50;
  padding:24px;
}
.result.show{display:flex}
.result-card{
  background:linear-gradient(180deg, var(--concrete-mid), var(--concrete));
  border:4px solid var(--sodium);border-radius:6px;
  padding:28px 28px 22px;text-align:center;max-width:420px;width:100%;
  box-shadow:
    0 0 30px rgba(255,170,60,0.30),
    0 8px 0 var(--ink);
}
.result-card h2{
  font-family:'Press Start 2P', monospace;font-size:22px;
  color:var(--sodium);text-shadow:2px 2px 0 var(--ink);
  margin-bottom:14px;letter-spacing:0.04em;
}
.result-card.lose{border-color:var(--neon-pink)}
.result-card.lose h2{color:var(--neon-pink)}
.result-card p{
  font-family:'VT323', monospace;font-size:18px;
  color:var(--paper);margin-bottom:20px;line-height:1.4;
}
.result-card button{
  background:linear-gradient(180deg, var(--sodium), var(--rust));
  border:3px solid var(--ink);color:var(--ink);
  font-family:'Press Start 2P', monospace;font-size:10px;letter-spacing:0.08em;
  padding:12px 22px;border-radius:4px;cursor:pointer;
  text-transform:uppercase;box-shadow:0 4px 0 var(--ink);
  transition:transform 0.12s ease;
}
.result-card button:hover{transform:translateY(-1px);box-shadow:0 5px 0 var(--ink)}
.result-card button:active{transform:translateY(2px);box-shadow:0 2px 0 var(--ink)}

/* mute toggle */
.mute{
  position:fixed;top:14px;right:14px;z-index:10;
  background:rgba(10,10,12,0.6);border:2px solid var(--concrete-up);
  color:var(--paper);font-family:'JetBrains Mono', monospace;font-size:11px;
  padding:6px 10px;border-radius:4px;cursor:pointer;
}
.mute:hover{border-color:var(--sodium)}

/* CRT scanlines over the battle stage */
.stage::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:3;
  background:repeating-linear-gradient(
    0deg,
    rgba(0,0,0,0.18) 0px,
    rgba(0,0,0,0.18) 1.5px,
    transparent 1.5px,
    transparent 3px
  );
  mix-blend-mode:multiply;opacity:0.55;
}
</style>
</head>
<body>

<button class="mute" id="muteBtn">♪ on</button>

<div class="wrap">
  <h1 class="title">URBAN CRITTER<br>BATTLE</h1>
  <div class="tagline">· raccoon · pigeon · opossum ·</div>

  <!-- SELECT SCREEN -->
  <section id="selectScreen">
    <div class="tagline" style="margin-bottom:8px;letter-spacing:0.18em">CHOOSE YOUR ALLEY CHAMPION</div>
    <div class="select-grid" id="critterGrid"></div>
  </section>

  <!-- BATTLE SCREEN -->
  <section id="battleScreen" style="display:none">
    <div class="stage">
      <div class="fight-row">
        <div class="combatant" id="youSide">
          <div class="nameplate" id="youName">YOU</div>
          <canvas class="crit-canvas" id="youCanvas" width="64" height="64"></canvas>
          <div class="hpbar-wrap">
            <div class="hpbar"><div class="fill" id="youHpFill"></div><div class="ticks"></div></div>
            <div class="hp-label" id="youHpLabel">HP 100/100</div>
          </div>
          <div class="statuses" id="youStatuses"></div>
        </div>
        <div class="vs-divider">VS</div>
        <div class="combatant" id="foeSide">
          <div class="nameplate" id="foeName">FOE</div>
          <canvas class="crit-canvas" id="foeCanvas" width="64" height="64"></canvas>
          <div class="hpbar-wrap">
            <div class="hpbar"><div class="fill" id="foeHpFill"></div><div class="ticks"></div></div>
            <div class="hp-label" id="foeHpLabel">HP 100/100</div>
          </div>
          <div class="statuses" id="foeStatuses"></div>
        </div>
      </div>
    </div>

    <div class="action-bar" id="actionBar"></div>
    <div class="log" id="logBox"></div>
  </section>

  <!-- RESULT OVERLAY -->
  <div class="result" id="resultOverlay">
    <div class="result-card" id="resultCard">
      <h2 id="resultTitle">VICTORY</h2>
      <p id="resultText">The alley is yours.</p>
      <button id="resultBtn">REMATCH</button>
    </div>
  </div>
</div>

<script>
(() => {
  // ===== CRITTER ROSTER =====
  // Three urban critters with rock-paper-scissors typing:
  //   Trickster > Aerial > Spectral > Trickster
  // (raccoons grab pigeons; pigeons swoop possums; possums spook raccoons)
  // Each move: dmg base, accuracy 0..1, optional status, optional self-cost,
  // optional charge requirement (multi-turn windup).
  const CRITTERS = {
    raccoon: {
      key: 'raccoon', name: 'RACCOON', type: 'TRICKSTER',
      hp: 110, atk: 18, def: 14, spd: 9,
      flavor: 'Hands like little surgeon\'s. Heart of a bandit.',
      moves: [
        { id: 'claw',   nm: 'CLAW SLASH',   dmg: 14, acc: 1.00, desc: 'Sharp claws.' },
        { id: 'panic',  nm: 'TRASH PANIC',  dmg: 18, acc: 0.85, status: 'stun', desc: 'May stun.' },
        { id: 'dive',   nm: 'DUMPSTER DIVE', dmg: 26, acc: 0.75, charge: 1, desc: 'Charge 1 turn.' },
      ],
    },
    pigeon: {
      key: 'pigeon', name: 'PIGEON', type: 'AERIAL',
      hp: 80, atk: 16, def: 8, spd: 18,
      flavor: 'Sky rat. Ten thousand miles of cement under those wings.',
      moves: [
        { id: 'peck',   nm: 'PECK',         dmg: 11, acc: 1.00, desc: 'Quick & reliable.' },
        { id: 'bomb',   nm: 'DIVE BOMB',    dmg: 24, acc: 0.65, recoil: 4, desc: 'Recoil 4.' },
        { id: 'buffet', nm: 'WING BUFFET',  dmg: 13, acc: 0.95, status: 'accdown', desc: 'Lower foe ACC.' },
      ],
    },
    opossum: {
      key: 'opossum', name: 'OPOSSUM', type: 'SPECTRAL',
      hp: 130, atk: 14, def: 16, spd: 6,
      flavor: 'Just chillin\'. Until you\'re too close. Then teeth.',
      moves: [
        { id: 'hiss',   nm: 'HISS',         dmg: 9,  acc: 1.00, status: 'atkdown', desc: 'Lower foe ATK.' },
        { id: 'play',   nm: 'PLAY DEAD',    dmg: 0,  acc: 1.00, heal: 28, desc: 'Heal 28 HP.' },
        { id: 'tail',   nm: 'TAIL STRIKE',  dmg: 18, acc: 0.90, desc: 'Solid hit.' },
      ],
    },
  };
  // Type matchup: attacker → defender → multiplier
  // Trickster beats Aerial; Aerial beats Spectral; Spectral beats Trickster
  const TYPE_CHART = {
    'TRICKSTER': { 'AERIAL': 1.30, 'SPECTRAL': 0.80, 'TRICKSTER': 1.00 },
    'AERIAL':    { 'SPECTRAL': 1.30, 'TRICKSTER': 0.80, 'AERIAL': 1.00 },
    'SPECTRAL':  { 'TRICKSTER': 1.30, 'AERIAL': 0.80, 'SPECTRAL': 1.00 },
  };

  // ===== PIXEL SPRITE RENDERERS =====
  // Each critter is drawn flat-fill on a small canvas with chunky NES-style
  // tile-art. Drawing is purely procedural (no images) so the file stays
  // self-contained. All sprites are drawn at 32×32 logical and the canvas
  // is sized via image-rendering: pixelated to scale up blocky.
  function drawRaccoon(ctx, w, h, facing) {
    facing = facing || 1;
    ctx.save();
    if (facing < 0) { ctx.translate(w, 0); ctx.scale(-1, 1); }
    const sx = w / 32, sy = h / 32;
    ctx.imageSmoothingEnabled = false;
    // body (grey-brown)
    ctx.fillStyle = '#8a7e6e';
    ctx.fillRect(8 * sx, 14 * sy, 16 * sx, 12 * sy);
    // belly highlight (lighter)
    ctx.fillStyle = '#b0a596';
    ctx.fillRect(11 * sx, 18 * sy, 10 * sx, 7 * sy);
    // head
    ctx.fillStyle = '#8a7e6e';
    ctx.fillRect(18 * sx, 9 * sy, 11 * sx, 9 * sy);
    // ears
    ctx.fillRect(19 * sx, 7 * sy, 3 * sx, 3 * sy);
    ctx.fillRect(25 * sx, 7 * sy, 3 * sx, 3 * sy);
    // black mask
    ctx.fillStyle = '#1a1410';
    ctx.fillRect(18 * sx, 11 * sy, 11 * sx, 4 * sy);
    // eyes (sodium yellow)
    ctx.fillStyle = '#ffd24a';
    ctx.fillRect(20 * sx, 12 * sy, 2 * sx, 2 * sy);
    ctx.fillRect(25 * sx, 12 * sy, 2 * sx, 2 * sy);
    // pupils
    ctx.fillStyle = '#0a0a0c';
    ctx.fillRect(21 * sx, 12 * sy, 1 * sx, 1 * sy);
    ctx.fillRect(26 * sx, 12 * sy, 1 * sx, 1 * sy);
    // pink nose
    ctx.fillStyle = '#d97a8a';
    ctx.fillRect(24 * sx, 16 * sy, 2 * sx, 1 * sy);
    // ringed tail (3 bands behind body)
    ctx.fillStyle = '#1a1410';
    ctx.fillRect(2 * sx, 16 * sy, 7 * sx, 3 * sy);
    ctx.fillStyle = '#8a7e6e';
    ctx.fillRect(2 * sx, 19 * sy, 7 * sx, 3 * sy);
    ctx.fillStyle = '#1a1410';
    ctx.fillRect(2 * sx, 22 * sy, 7 * sx, 2 * sy);
    // legs
    ctx.fillStyle = '#1a1410';
    ctx.fillRect(10 * sx, 25 * sy, 3 * sx, 4 * sy);
    ctx.fillRect(19 * sx, 25 * sy, 3 * sx, 4 * sy);
    // claw hands (front paws)
    ctx.fillStyle = '#1a1410';
    ctx.fillRect(13 * sx, 22 * sy, 2 * sx, 4 * sy);
    ctx.fillRect(17 * sx, 22 * sy, 2 * sx, 4 * sy);
    ctx.restore();
  }
  function drawPigeon(ctx, w, h, facing) {
    facing = facing || 1;
    ctx.save();
    if (facing < 0) { ctx.translate(w, 0); ctx.scale(-1, 1); }
    const sx = w / 32, sy = h / 32;
    ctx.imageSmoothingEnabled = false;
    // body (cool grey)
    ctx.fillStyle = '#7d8a98';
    ctx.fillRect(10 * sx, 13 * sy, 14 * sx, 11 * sy);
    // wing fold (darker)
    ctx.fillStyle = '#4a5560';
    ctx.fillRect(13 * sx, 15 * sy, 9 * sx, 7 * sy);
    // wing tip outline
    ctx.fillStyle = '#1a1410';
    ctx.fillRect(13 * sx, 21 * sy, 9 * sx, 1 * sy);
    // iridescent neck (purple/teal)
    ctx.fillStyle = '#6a4a7a';
    ctx.fillRect(20 * sx, 11 * sy, 4 * sx, 4 * sy);
    ctx.fillStyle = '#3a8a8a';
    ctx.fillRect(20 * sx, 13 * sy, 4 * sx, 1 * sy);
    // head
    ctx.fillStyle = '#7d8a98';
    ctx.fillRect(22 * sx, 8 * sy, 7 * sx, 6 * sy);
    // beady red eye
    ctx.fillStyle = '#ff4a4a';
    ctx.fillRect(26 * sx, 10 * sy, 2 * sx, 2 * sy);
    ctx.fillStyle = '#ffd24a';
    ctx.fillRect(26 * sx, 10 * sy, 1 * sx, 1 * sy);
    // beak (orange)
    ctx.fillStyle = '#d97a3a';
    ctx.fillRect(28 * sx, 11 * sy, 3 * sx, 2 * sy);
    // tail feathers
    ctx.fillStyle = '#5a6a78';
    ctx.fillRect(4 * sx, 16 * sy, 6 * sx, 5 * sy);
    ctx.fillStyle = '#1a1410';
    ctx.fillRect(4 * sx, 20 * sy, 6 * sx, 1 * sy);
    // orange feet
    ctx.fillStyle = '#d97a3a';
    ctx.fillRect(13 * sx, 24 * sy, 2 * sx, 4 * sy);
    ctx.fillRect(18 * sx, 24 * sy, 2 * sx, 4 * sy);
    // toes
    ctx.fillStyle = '#1a1410';
    ctx.fillRect(12 * sx, 27 * sy, 5 * sx, 1 * sy);
    ctx.fillRect(17 * sx, 27 * sy, 5 * sx, 1 * sy);
    ctx.restore();
  }
  function drawOpossum(ctx, w, h, facing) {
    facing = facing || 1;
    ctx.save();
    if (facing < 0) { ctx.translate(w, 0); ctx.scale(-1, 1); }
    const sx = w / 32, sy = h / 32;
    ctx.imageSmoothingEnabled = false;
    // body (pale grey-white shaggy)
    ctx.fillStyle = '#cfc8b8';
    ctx.fillRect(7 * sx, 14 * sy, 18 * sx, 12 * sy);
    // shaggy fur shadow patches
    ctx.fillStyle = '#9c9685';
    ctx.fillRect(9 * sx, 17 * sy, 3 * sx, 2 * sy);
    ctx.fillRect(14 * sx, 19 * sy, 3 * sx, 2 * sy);
    ctx.fillRect(19 * sx, 16 * sy, 3 * sx, 2 * sy);
    // head (pointed snout)
    ctx.fillStyle = '#e8e1d0';
    ctx.fillRect(20 * sx, 10 * sy, 9 * sx, 8 * sy);
    // pointed snout
    ctx.fillStyle = '#cfc8b8';
    ctx.fillRect(28 * sx, 13 * sy, 3 * sx, 3 * sy);
    // pink nose tip
    ctx.fillStyle = '#d97a8a';
    ctx.fillRect(30 * sx, 14 * sy, 1 * sx, 1 * sy);
    // black ears (tall pointed)
    ctx.fillStyle = '#0a0a0c';
    ctx.fillRect(20 * sx, 7 * sy, 3 * sx, 4 * sy);
    ctx.fillRect(25 * sx, 7 * sy, 3 * sx, 4 * sy);
    // beady eyes (dead-black)
    ctx.fillStyle = '#0a0a0c';
    ctx.fillRect(23 * sx, 12 * sy, 2 * sx, 2 * sy);
    ctx.fillRect(26 * sx, 12 * sy, 2 * sx, 2 * sy);
    // tiny eye glint
    ctx.fillStyle = '#ffd24a';
    ctx.fillRect(23 * sx, 12 * sy, 1 * sx, 1 * sy);
    ctx.fillRect(26 * sx, 12 * sy, 1 * sx, 1 * sy);
    // hairless tail (pink)
    ctx.fillStyle = '#a85f55';
    ctx.fillRect(2 * sx, 18 * sy, 6 * sx, 2 * sy);
    // legs
    ctx.fillStyle = '#9c9685';
    ctx.fillRect(10 * sx, 25 * sy, 3 * sx, 4 * sy);
    ctx.fillRect(20 * sx, 25 * sy, 3 * sx, 4 * sy);
    // teeth (snarl) — 2 tiny white pixels at mouth
    ctx.fillStyle = '#ffffff';
    ctx.fillRect(28 * sx, 16 * sy, 1 * sx, 1 * sy);
    ctx.fillRect(29 * sx, 16 * sy, 1 * sx, 1 * sy);
    ctx.restore();
  }
  const SPRITE_FN = {
    raccoon: drawRaccoon,
    pigeon: drawPigeon,
    opossum: drawOpossum,
  };
  function drawCritter(canvas, key, facing) {
    const ctx = canvas.getContext('2d');
    ctx.imageSmoothingEnabled = false;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    SPRITE_FN[key](ctx, canvas.width, canvas.height, facing);
  }

  // ===== AUDIO =====
  let actx = null;
  let muted = false;
  function ctx() {
    if (!actx) { try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} }
    if (actx && actx.state === 'suspended') actx.resume();
    return actx;
  }
  function tone(freq, dur, type='square', vol=0.06) {
    if (muted) return;
    const a = ctx(); if (!a) return;
    const o = a.createOscillator(), g = a.createGain();
    o.type = type; o.frequency.value = freq;
    o.connect(g); g.connect(a.destination);
    const t = a.currentTime;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.start(t); o.stop(t + dur + 0.02);
  }
  const sfx = {
    select:  () => { tone(440, 0.05, 'square', 0.06); setTimeout(() => tone(660, 0.06, 'square', 0.06), 40); },
    hit:     () => { tone(180, 0.10, 'sawtooth', 0.10); },
    crit:    () => { tone(120, 0.12, 'square', 0.12); setTimeout(() => tone(240, 0.10, 'square', 0.10), 60); },
    miss:    () => { tone(380, 0.10, 'triangle', 0.05); },
    heal:    () => { [392, 494, 587].forEach((f, i) => setTimeout(() => tone(f, 0.10, 'triangle', 0.07), i * 60)); },
    win:     () => { [523, 659, 784, 1047, 1318].forEach((f, i) => setTimeout(() => tone(f, 0.14, 'square', 0.08), i * 90)); },
    lose:    () => { [392, 330, 262, 196].forEach((f, i) => setTimeout(() => tone(f, 0.18, 'sawtooth', 0.09), i * 130)); },
  };

  // ===== BATTLE STATE =====
  const state = {
    youKey: null, foeKey: null,
    you: null,    foe: null,    // { hp, max, atk, def, spd, statuses: {...} }
    log: [],
    turn: 0,                    // increments each round
    inputLocked: true,
    chargingMove: null,         // { side: 'you'|'foe', moveId } when a multi-turn move is pending
  };
  function makeCombatant(key) {
    const c = CRITTERS[key];
    return {
      key, ref: c,
      hp: c.hp, max: c.hp,
      atk: c.atk, def: c.def, spd: c.spd,
      statuses: { stun: 0, atkdown: 0, defdown: 0, accdown: 0, poison: 0, charge: 0 },
    };
  }

  function logLine(text, kind) {
    const box = document.getElementById('logBox');
    const div = document.createElement('div');
    div.className = 'line ' + (kind || '');
    div.textContent = text;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }
  function clearLog() { document.getElementById('logBox').innerHTML = ''; }

  function refreshHud() {
    const you = state.you, foe = state.foe;
    document.getElementById('youName').textContent = you.ref.name;
    document.getElementById('foeName').textContent = foe.ref.name;
    setHp('you', you);
    setHp('foe', foe);
    setStatuses('you', you);
    setStatuses('foe', foe);
  }
  function setHp(side, c) {
    const fill = document.getElementById(side + 'HpFill');
    const lbl  = document.getElementById(side + 'HpLabel');
    const pct = Math.max(0, c.hp / c.max);
    fill.style.width = (pct * 100).toFixed(1) + '%';
    fill.style.background = pct > 0.5 ? 'var(--hp-good)' : pct > 0.20 ? 'var(--hp-warn)' : 'var(--hp-bad)';
    lbl.textContent = 'HP ' + Math.max(0, Math.floor(c.hp)) + '/' + c.max;
  }
  function setStatuses(side, c) {
    const el = document.getElementById(side + 'Statuses');
    el.innerHTML = '';
    const map = [
      ['poison', 'POISON'], ['stun', 'STUN'], ['atkdown', 'ATK↓'],
      ['defdown', 'DEF↓'], ['accdown', 'ACC↓'], ['charge', 'CHARGING'],
    ];
    for (const [k, label] of map) {
      if (c.statuses[k] > 0) {
        const sp = document.createElement('span');
        sp.className = 'status-pill ' + k;
        sp.textContent = label + (c.statuses[k] > 1 ? ' ' + c.statuses[k] : '');
        el.appendChild(sp);
      }
    }
  }

  // ===== SELECT SCREEN =====
  function buildSelect() {
    const grid = document.getElementById('critterGrid');
    grid.innerHTML = '';
    Object.values(CRITTERS).forEach(c => {
      const card = document.createElement('div');
      card.className = 'crit-card';
      card.innerHTML = `
        <canvas width="64" height="64"></canvas>
        <div class="crit-name">${c.name}</div>
        <div class="crit-type" style="color:${typeColor(c.type)}">${c.type}</div>
        <div class="crit-stats">
          <span>HP</span><b>${c.hp}</b>
          <span>ATK</span><b>${c.atk}</b>
          <span>DEF</span><b>${c.def}</b>
          <span>SPD</span><b>${c.spd}</b>
        </div>
        <div style="font-family:'VT323',monospace;font-size:13px;color:rgba(214,207,184,0.55);margin-top:8px;line-height:1.25;letter-spacing:0.02em">${c.flavor}</div>
      `;
      const cv = card.querySelector('canvas');
      drawCritter(cv, c.key, 1);
      card.addEventListener('click', () => startBattle(c.key));
      grid.appendChild(card);
    });
  }
  function typeColor(t) {
    return t === 'TRICKSTER' ? 'var(--sodium)'
         : t === 'AERIAL'    ? 'var(--neon-pink)'
         : t === 'SPECTRAL'  ? 'var(--toxic)'
         : 'var(--paper)';
  }

  function startBattle(youKey) {
    sfx.select();
    state.youKey = youKey;
    // Foe is a random critter that's NOT the same as you, weighted
    // toward the type that beats you for a satisfying scrap (50%
    // counter, 30% mirror-of-mirror, 20% same as you for a duel).
    const counter = Object.values(CRITTERS).find(c => TYPE_CHART[c.type][CRITTERS[youKey].type] === 1.30);
    const others = Object.keys(CRITTERS).filter(k => k !== youKey);
    const r = Math.random();
    state.foeKey = r < 0.55 ? counter.key
                 : r < 0.85 ? others[Math.floor(Math.random() * others.length)]
                 : youKey;
    state.you = makeCombatant(state.youKey);
    state.foe = makeCombatant(state.foeKey);
    state.log = [];
    state.turn = 1;
    state.chargingMove = null;
    state.inputLocked = false;
    document.getElementById('selectScreen').style.display = 'none';
    document.getElementById('battleScreen').style.display = '';
    drawCritter(document.getElementById('youCanvas'), state.youKey, 1);
    drawCritter(document.getElementById('foeCanvas'), state.foeKey, -1);
    clearLog();
    logLine(state.you.ref.name + ' vs ' + state.foe.ref.name + ' — alley scrap!', 'sys');
    logLine('Type: ' + state.you.ref.type + ' vs ' + state.foe.ref.type, 'sys');
    refreshHud();
    buildActions();
  }

  function buildActions() {
    const bar = document.getElementById('actionBar');
    bar.innerHTML = '';
    const moves = state.you.ref.moves;
    moves.forEach(m => {
      const btn = document.createElement('button');
      btn.className = 'move-btn';
      btn.disabled = state.inputLocked || state.you.statuses.stun > 0 || state.you.statuses.charge > 0;
      btn.innerHTML = `<div>${m.nm}</div><div class="move-meta">DMG ${m.dmg} · ACC ${Math.round(m.acc * 100)}%</div>`;
      btn.title = m.desc;
      btn.addEventListener('click', () => playerMove(m));
      bar.appendChild(btn);
    });
    // run button
    const run = document.createElement('button');
    run.className = 'move-btn run-btn';
    run.disabled = state.inputLocked;
    run.innerHTML = `<div>RUN</div><div class="move-meta">flee back to alley</div>`;
    run.addEventListener('click', () => endBattle('lose', 'You scampered off into the night.'));
    bar.appendChild(run);
  }

  // ===== MOVE RESOLUTION =====
  function rollDamage(attacker, defender, move) {
    // base + (atk - def/2) scaled, with variance, type, crit
    const baseAtk = attacker.atk * (attacker.statuses.atkdown > 0 ? 0.75 : 1);
    const baseDef = defender.def * (defender.statuses.defdown > 0 ? 0.75 : 1);
    let dmg = move.dmg + Math.max(0, baseAtk - baseDef * 0.45);
    dmg *= 0.85 + Math.random() * 0.30;          // ±15% variance
    const tm = TYPE_CHART[attacker.ref.type][defender.ref.type] || 1.0;
    dmg *= tm;
    const isCrit = Math.random() < 0.10;
    if (isCrit) dmg *= 1.6;
    return { dmg: Math.max(1, Math.round(dmg)), tm, isCrit };
  }

  function applyMove(attacker, defender, move, sideLabel, victimLabel) {
    // accuracy with ACC-DOWN status
    const accMod = attacker.statuses.accdown > 0 ? 0.70 : 1.0;
    const acc = move.acc * accMod;
    if (Math.random() > acc) {
      logLine(sideLabel + '\'s ' + move.nm + ' missed!', 'sys');
      sfx.miss();
      return false;
    }
    // healing move
    if (move.heal) {
      attacker.hp = Math.min(attacker.max, attacker.hp + move.heal);
      logLine(sideLabel + ' healed ' + move.heal + ' HP.', sideLabel === 'You' ? 'you' : 'foe');
      sfx.heal();
      return true;
    }
    // damage
    const { dmg, tm, isCrit } = rollDamage(attacker, defender, move);
    defender.hp -= dmg;
    let line = sideLabel + ' used ' + move.nm + '. ' + victimLabel + ' took ' + dmg + ' damage.';
    if (isCrit) line += ' CRIT!';
    if (tm > 1.05) line += ' (Super effective)';
    else if (tm < 0.95) line += ' (Not very effective)';
    logLine(line, isCrit ? 'crit' : (sideLabel === 'You' ? 'you' : 'foe'));
    if (isCrit) sfx.crit(); else sfx.hit();
    // hit shake animation
    const targetSide = sideLabel === 'You' ? 'foe' : 'you';
    const cv = document.getElementById(targetSide + 'Canvas');
    cv.classList.remove('hit'); void cv.offsetWidth; cv.classList.add('hit');
    // recoil
    if (move.recoil) {
      attacker.hp -= move.recoil;
      logLine(sideLabel + ' took ' + move.recoil + ' recoil damage.', 'sys');
    }
    // status effect application (50% chance unless guaranteed)
    if (move.status && Math.random() < 0.55) {
      switch (move.status) {
        case 'stun':    defender.statuses.stun    = 1; logLine(victimLabel + ' was stunned!', 'sys'); break;
        case 'atkdown': defender.statuses.atkdown = 2; logLine(victimLabel + '\'s attack dropped!', 'sys'); break;
        case 'defdown': defender.statuses.defdown = 2; logLine(victimLabel + '\'s defense dropped!', 'sys'); break;
        case 'accdown': defender.statuses.accdown = 2; logLine(victimLabel + '\'s accuracy dropped!', 'sys'); break;
        case 'poison':  defender.statuses.poison  = 3; logLine(victimLabel + ' was poisoned!', 'sys'); break;
      }
    }
    return true;
  }

  function tickEndOfTurn(c, label) {
    // poison damage
    if (c.statuses.poison > 0) {
      c.hp -= 5;
      logLine(label + ' lost 5 HP from poison.', 'sys');
      c.statuses.poison--;
    }
    // status countdowns
    for (const k of ['stun', 'atkdown', 'defdown', 'accdown', 'charge']) {
      if (c.statuses[k] > 0) c.statuses[k]--;
    }
  }

  function chooseFoeMove() {
    // Simple AI: prefer high-damage moves at high HP, safer moves at low HP.
    // Possum prioritizes Play Dead when HP < 50%. If charging, must use the
    // charged move next turn.
    const foe = state.foe;
    if (state.chargingMove && state.chargingMove.side === 'foe') {
      const m = foe.ref.moves.find(x => x.id === state.chargingMove.moveId);
      state.chargingMove = null;
      foe.statuses.charge = 0;
      return m;
    }
    const moves = foe.ref.moves;
    // Possum heal logic
    if (foe.key === 'opossum' && foe.hp < foe.max * 0.5 && Math.random() < 0.55) {
      const heal = moves.find(m => m.heal);
      if (heal) return heal;
    }
    // Score moves by expected damage * accuracy
    const scored = moves.filter(m => !m.heal).map(m => ({
      m, score: m.dmg * m.acc * (foe.hp < foe.max * 0.30 ? m.acc : 1.0),
    }));
    scored.sort((a, b) => b.score - a.score);
    // Top 2 with weighted random pick
    const topN = Math.min(2, scored.length);
    const r = Math.random();
    return scored[r < 0.65 ? 0 : 1 % topN].m;
  }

  // ===== TURN ORCHESTRATION =====
  function playerMove(move) {
    if (state.inputLocked) return;
    state.inputLocked = true;
    document.querySelectorAll('.move-btn').forEach(b => b.disabled = true);
    // charge handling — first turn announces, second turn fires
    if (move.charge && (!state.chargingMove || state.chargingMove.side !== 'you')) {
      state.chargingMove = { side: 'you', moveId: move.id };
      state.you.statuses.charge = 1;
      logLine('You wind up for ' + move.nm + '...', 'you');
      refreshHud();
      // foe acts during your charge
      setTimeout(() => {
        const fm = chooseFoeMove();
        applyMove(state.foe, state.you, fm, 'Foe', 'You');
        if (checkEnd()) return;
        endRound();
      }, 600);
      return;
    }
    if (state.chargingMove && state.chargingMove.side === 'you') {
      // resolve charged move
      move = state.you.ref.moves.find(m => m.id === state.chargingMove.moveId);
      state.chargingMove = null;
    }
    runRound(move);
  }

  function runRound(playerMv) {
    // determine order by SPD (ties → random)
    const youFirst = state.you.spd >= state.foe.spd
      ? (state.you.spd === state.foe.spd ? Math.random() < 0.5 : true)
      : false;
    const foeMv = chooseFoeMove();
    if (foeMv.charge && (!state.chargingMove || state.chargingMove.side !== 'foe')) {
      state.chargingMove = { side: 'foe', moveId: foeMv.id };
      state.foe.statuses.charge = 1;
      logLine('Foe winds up for ' + foeMv.nm + '...', 'foe');
    }

    function youAct() {
      if (state.you.statuses.stun > 0) {
        logLine('You are stunned!', 'sys');
      } else {
        applyMove(state.you, state.foe, playerMv, 'You', 'Foe');
      }
    }
    function foeAct() {
      if (state.foe.statuses.stun > 0) {
        logLine('Foe is stunned!', 'sys');
      } else if (foeMv.charge && state.foe.statuses.charge > 0 && state.chargingMove) {
        // already announced wind-up; do nothing
      } else {
        applyMove(state.foe, state.you, foeMv, 'Foe', 'You');
      }
    }

    if (youFirst) {
      youAct();
      if (!checkEnd()) setTimeout(() => { foeAct(); if (!checkEnd()) endRound(); }, 600);
    } else {
      foeAct();
      if (!checkEnd()) setTimeout(() => { youAct(); if (!checkEnd()) endRound(); }, 600);
    }
  }

  function endRound() {
    tickEndOfTurn(state.you, 'You');
    tickEndOfTurn(state.foe, 'Foe');
    if (checkEnd()) return;
    state.turn++;
    state.inputLocked = false;
    refreshHud();
    buildActions();
  }

  function checkEnd() {
    if (state.you.hp <= 0) {
      state.you.hp = 0; refreshHud();
      endBattle('lose', state.foe.ref.name + ' stands tall in the alley.');
      return true;
    }
    if (state.foe.hp <= 0) {
      state.foe.hp = 0; refreshHud();
      endBattle('win', 'You claim the dumpster as your own.');
      return true;
    }
    refreshHud();
    return false;
  }

  function endBattle(outcome, msg) {
    state.inputLocked = true;
    document.querySelectorAll('.move-btn').forEach(b => b.disabled = true);
    setTimeout(() => {
      const ov = document.getElementById('resultOverlay');
      const card = document.getElementById('resultCard');
      const title = document.getElementById('resultTitle');
      const text = document.getElementById('resultText');
      card.classList.toggle('lose', outcome === 'lose');
      title.textContent = outcome === 'win' ? 'VICTORY' : 'DEFEAT';
      text.textContent = msg;
      ov.classList.add('show');
      if (outcome === 'win') sfx.win(); else sfx.lose();
    }, 600);
  }

  document.getElementById('resultBtn').addEventListener('click', () => {
    document.getElementById('resultOverlay').classList.remove('show');
    document.getElementById('battleScreen').style.display = 'none';
    document.getElementById('selectScreen').style.display = '';
  });

  document.getElementById('muteBtn').addEventListener('click', (e) => {
    muted = !muted;
    e.target.textContent = muted ? '♪ off' : '♪ on';
  });

  // ===== INIT =====
  buildSelect();
})();
</script>
</body>
</html>
