<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Glitch Clock</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%95%92" />
<meta name="description" content="A neon analog clock that glitches every minute. Side calendar lights up like a circuit." />
<meta property="og:title" content="Glitch Clock" />
<meta property="og:description" content="A neon analog clock that glitches every minute next to a side calendar that flickers like a CRT." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://sloppy.live/glitch-clock/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/Cinematic%20neon%20analog%20clock%20face%20glowing%20magenta%20and%20cyan%20on%20a%20deep%20purple%20void%20background%2C%20chromatic%20aberration%2C%20glitch%20RGB%20split%20effect%2C%20a%20small%20pixel%20calendar%20grid%20glowing%20violet%20on%20the%20side%2C%20synthwave%20cyberpunk%20aesthetic%2C%20dark%20moody.png?width=1200&height=630&nologo=true" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=VT323&family=Audiowide&family=Space+Mono:wght@400;700&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0b0518;
    --bg-2: #14082c;
    --void: #050310;
    --neon: #c47bff;       /* primary purple */
    --neon-hot: #e0a5ff;
    --neon-deep: #6a2cb0;
    --magenta: #ff5ea1;
    --cyan: #5ee0ff;
    --amber: #ffd25e;
    --grid: rgba(196, 123, 255, 0.08);
    --line: rgba(196, 123, 255, 0.45);
    --ink: #1a0a2c;
    --paper: #f3eaff;
    --dim: rgba(243, 234, 255, 0.45);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background:
      radial-gradient(900px 700px at 25% 30%, rgba(196,123,255,0.15), transparent 65%),
      radial-gradient(700px 600px at 80% 70%, rgba(94,224,255,0.10), transparent 70%),
      radial-gradient(60% 70% at 50% 80%, rgba(255,94,161,0.08), transparent 70%),
      linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 60%, var(--void) 100%);
    color: var(--paper);
    font-family: 'Space Mono', monospace;
    -webkit-font-smoothing: antialiased;
    user-select: none;
  }
  /* perpetual subtle grid */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 36px 36px;
    pointer-events: none;
    z-index: 0;
    mask-image: radial-gradient(120% 90% at 50% 50%, #000 20%, transparent 80%);
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(180deg, rgba(0,0,0,0.12) 0 1px, transparent 1px 3px);
    pointer-events: none;
    z-index: 1;
    mix-blend-mode: multiply;
    opacity: 0.55;
  }
  #app {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: grid;
    grid-template-columns: 1fr 360px;
    gap: 0;
  }
  /* CLOCK SIDE */
  #clockSide {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  #clockHud {
    position: absolute;
    top: 26px;
    left: 30px;
    font-family: 'Syne Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.34em;
    color: var(--dim);
    text-transform: uppercase;
  }
  #clockHud b {
    color: var(--neon-hot);
    font-weight: normal;
    text-shadow: 0 0 12px var(--neon);
  }
  #brand {
    position: absolute;
    bottom: 22px;
    left: 30px;
    font-family: 'Major Mono Display', monospace;
    font-size: 13px;
    letter-spacing: 0.4em;
    color: var(--neon-hot);
    text-shadow: 0 0 14px var(--neon), 0 0 4px var(--magenta);
  }
  #brand em {
    color: var(--cyan);
    font-style: normal;
    text-shadow: 0 0 10px var(--cyan);
  }
  #digital {
    position: absolute;
    bottom: 22px;
    right: 30px;
    font-family: 'VT323', monospace;
    font-size: 22px;
    letter-spacing: 0.18em;
    color: var(--neon-hot);
    text-shadow: 0 0 12px var(--neon), 0 0 2px var(--magenta);
  }
  #digital small {
    color: var(--dim);
    font-size: 11px;
    letter-spacing: 0.3em;
    margin-right: 8px;
  }

  .clock-stage {
    position: relative;
    width: min(82vh, 82vmin, 720px);
    aspect-ratio: 1 / 1;
    max-width: calc(100vw - 380px - 80px);
  }
  .clock-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    overflow: visible;
  }
  /* RGB split layers */
  .clock-svg.layer {
    mix-blend-mode: screen;
    pointer-events: none;
  }
  .clock-svg.layer-r { filter: drop-shadow(0 0 0 #ff2d6b); opacity: 0.92; }
  .clock-svg.layer-g { filter: drop-shadow(0 0 0 #43ffaa); opacity: 0.92; }
  .clock-svg.layer-b { filter: drop-shadow(0 0 0 #4ed4ff); opacity: 0.92; }

  .clock-svg .ring-outer { fill: none; stroke: rgba(196,123,255,0.18); stroke-width: 1.4; }
  .clock-svg .ring-mid   { fill: none; stroke: rgba(196,123,255,0.55); stroke-width: 0.6; stroke-dasharray: 1 5; }
  .clock-svg .ring-inner { fill: none; stroke: rgba(94,224,255,0.18); stroke-width: 0.5; }
  .clock-svg .face-fill  { fill: rgba(13, 6, 28, 0.55); }
  .clock-svg .tick-h     { stroke: var(--neon-hot); stroke-width: 1.6; stroke-linecap: round; }
  .clock-svg .tick-m     { stroke: rgba(196,123,255,0.36); stroke-width: 0.6; stroke-linecap: round; }
  .clock-svg .num        { fill: var(--paper); font-family: 'Major Mono Display', monospace; font-size: 8px; letter-spacing: 0.1em; }
  .clock-svg .hand-h     { stroke: var(--neon-hot); stroke-width: 4.4; stroke-linecap: round; }
  .clock-svg .hand-m     { stroke: var(--cyan); stroke-width: 2.6; stroke-linecap: round; }
  .clock-svg .hand-s     { stroke: var(--magenta); stroke-width: 1.2; stroke-linecap: round; }
  .clock-svg .hub        { fill: var(--neon-hot); }
  .clock-svg .hub-core   { fill: var(--magenta); }

  /* glow filter via filter element on root svg */

  /* GLITCH overlay */
  #glitchVeil {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      repeating-linear-gradient(180deg, rgba(196,123,255,0.0) 0 4px, rgba(196,123,255,0.06) 4px 5px);
    opacity: 0;
    transition: opacity 120ms linear;
    mix-blend-mode: screen;
    z-index: 5;
  }
  #glitchVeil.on { opacity: 1; }
  #glitchScan {
    position: absolute;
    inset: 0;
    pointer-events: none;
    background: linear-gradient(180deg, transparent, rgba(196,123,255,0.6), transparent);
    height: 12%;
    top: -20%;
    z-index: 6;
    box-shadow: 0 0 30px var(--neon);
    opacity: 0;
  }
  #glitchScan.swipe {
    animation: scanSwipe 0.55s ease-in;
  }
  @keyframes scanSwipe {
    0%   { top: -20%; opacity: 0; }
    20%  { opacity: 0.85; }
    100% { top: 110%; opacity: 0; }
  }

  /* CALENDAR SIDE */
  #calSide {
    position: relative;
    background:
      linear-gradient(180deg, rgba(106,44,176,0.16), rgba(106,44,176,0.04)),
      linear-gradient(180deg, var(--bg-2), var(--bg));
    border-left: 1px solid rgba(196,123,255,0.18);
    box-shadow: inset 22px 0 60px -30px rgba(196,123,255,0.18);
    padding: 28px 26px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  #calHeader {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    margin-bottom: 22px;
  }
  #calMonth {
    font-family: 'Major Mono Display', monospace;
    font-size: 22px;
    letter-spacing: 0.18em;
    color: var(--neon-hot);
    text-shadow: 0 0 14px var(--neon);
    line-height: 1;
  }
  #calMonth small {
    display: block;
    font-family: 'Syne Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.4em;
    color: var(--dim);
    margin-top: 6px;
    text-shadow: none;
  }
  .nav {
    display: flex;
    gap: 8px;
  }
  .nav button {
    width: 28px; height: 28px;
    background: rgba(196,123,255,0.06);
    border: 1px solid rgba(196,123,255,0.32);
    color: var(--neon-hot);
    font-family: 'Major Mono Display', monospace;
    font-size: 11px;
    cursor: pointer;
    border-radius: 0;
    transition: all 0.18s ease;
    text-shadow: 0 0 8px var(--neon);
  }
  .nav button:hover {
    background: rgba(196,123,255,0.18);
    border-color: var(--neon-hot);
    color: var(--paper);
    box-shadow: 0 0 14px rgba(196,123,255,0.5);
  }

  #dowRow {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-bottom: 8px;
  }
  #dowRow div {
    text-align: center;
    font-family: 'Syne Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: rgba(196,123,255,0.55);
    padding: 6px 0;
    border-bottom: 1px dashed rgba(196,123,255,0.18);
  }

  #grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    flex: 0 0 auto;
  }
  .cell {
    aspect-ratio: 1 / 1;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'VT323', monospace;
    font-size: 17px;
    color: var(--paper);
    background: rgba(196,123,255,0.04);
    border: 1px solid rgba(196,123,255,0.12);
    cursor: pointer;
    position: relative;
    transition: all 0.18s ease;
    overflow: hidden;
  }
  .cell.muted {
    color: rgba(243,234,255,0.22);
    background: rgba(196,123,255,0.015);
    border-color: rgba(196,123,255,0.05);
  }
  .cell:not(.muted):hover {
    background: rgba(196,123,255,0.18);
    border-color: var(--neon-hot);
    color: var(--neon-hot);
    text-shadow: 0 0 8px var(--neon);
  }
  .cell.today {
    background: linear-gradient(180deg, rgba(196,123,255,0.45), rgba(106,44,176,0.6));
    border-color: var(--neon-hot);
    color: var(--paper);
    text-shadow: 0 0 12px var(--neon-hot);
    box-shadow: 0 0 20px rgba(196,123,255,0.6), inset 0 0 12px rgba(255,94,161,0.32);
    animation: todayPulse 2.4s ease-in-out infinite;
  }
  .cell.today::after {
    content: '';
    position: absolute;
    inset: 2px;
    border: 1px dashed rgba(243,234,255,0.55);
    pointer-events: none;
  }
  .cell.selected:not(.today) {
    background: rgba(196,123,255,0.28);
    border-color: var(--magenta);
    color: var(--magenta);
    text-shadow: 0 0 8px var(--magenta);
  }
  .cell.weekend {
    color: rgba(94,224,255,0.85);
  }
  @keyframes todayPulse {
    0%, 100% { box-shadow: 0 0 16px rgba(196,123,255,0.55), inset 0 0 10px rgba(255,94,161,0.25); }
    50%      { box-shadow: 0 0 32px rgba(196,123,255,0.85), inset 0 0 16px rgba(255,94,161,0.45); }
  }

  /* glitching cell */
  .cell.glitch::before {
    content: attr(data-d);
    position: absolute;
    inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--magenta);
    text-shadow: 0 0 6px var(--magenta);
    transform: translateX(2px);
    mix-blend-mode: screen;
  }
  .cell.glitch::after {
    content: attr(data-d);
    position: absolute;
    inset: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--cyan);
    text-shadow: 0 0 6px var(--cyan);
    transform: translateX(-2px);
    mix-blend-mode: screen;
  }

  #calFoot {
    margin-top: auto;
    padding-top: 18px;
    border-top: 1px dashed rgba(196,123,255,0.18);
  }
  #selInfo {
    font-family: 'Syne Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.22em;
    color: var(--dim);
  }
  #selInfo b {
    color: var(--neon-hot);
    font-weight: normal;
    text-shadow: 0 0 10px var(--neon);
    letter-spacing: 0.1em;
    font-family: 'Major Mono Display', monospace;
  }
  #selDist {
    margin-top: 6px;
    font-family: 'VT323', monospace;
    font-size: 18px;
    color: var(--paper);
    letter-spacing: 0.06em;
  }
  #selDist em {
    font-style: normal;
    color: var(--magenta);
    text-shadow: 0 0 10px var(--magenta);
  }
  #notes {
    margin-top: 14px;
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.18em;
    color: var(--dim);
    text-transform: uppercase;
  }

  /* mobile */
  @media (max-width: 820px) {
    #app {
      grid-template-columns: 1fr;
      grid-template-rows: 1fr auto;
      height: auto;
      min-height: 100vh;
    }
    #clockSide {
      min-height: 70vh;
    }
    .clock-stage {
      max-width: 88vw;
      width: 88vw;
    }
    #calSide {
      border-left: none;
      border-top: 1px solid rgba(196,123,255,0.18);
      padding: 22px 18px;
    }
    #brand, #digital, #clockHud {
      font-size: 10px;
    }
    #digital { font-size: 18px; }
  }

  /* glitch impact for whole clock body */
  .glitch-burst {
    animation: clockShake 0.55s ease-out;
  }
  @keyframes clockShake {
    0%   { transform: translate(0, 0) rotate(0); filter: hue-rotate(0); }
    10%  { transform: translate(-6px, 2px) rotate(-0.6deg); filter: hue-rotate(-12deg); }
    25%  { transform: translate(5px, -1px) rotate(0.4deg); filter: hue-rotate(20deg); }
    40%  { transform: translate(-3px, -2px); filter: hue-rotate(-8deg); }
    65%  { transform: translate(2px, 3px); filter: hue-rotate(6deg); }
    100% { transform: translate(0, 0) rotate(0); filter: hue-rotate(0); }
  }

  .layer-r.shifted { transform: translateX(3px); }
  .layer-b.shifted { transform: translateX(-3px); }
  .layer-g.shifted { transform: translateY(-2px); }

</style>
</head>
<body>

<div id="app">
  <section id="clockSide">
    <div id="clockHud"><span>local · <b id="tz">—</b></span></div>
    <div class="clock-stage" id="stage">
      <!-- 3 layers for chromatic split -->
      <svg class="clock-svg layer layer-b" viewBox="0 0 100 100" id="svg-b" preserveAspectRatio="xMidYMid meet"></svg>
      <svg class="clock-svg layer layer-g" viewBox="0 0 100 100" id="svg-g" preserveAspectRatio="xMidYMid meet"></svg>
      <svg class="clock-svg layer layer-r" viewBox="0 0 100 100" id="svg-r" preserveAspectRatio="xMidYMid meet"></svg>
      <svg class="clock-svg" viewBox="0 0 100 100" id="svg" preserveAspectRatio="xMidYMid meet">
        <defs>
          <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="0.6" result="blur" />
            <feMerge>
              <feMergeNode in="blur"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
          <filter id="hot-glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="1.4" result="b1" />
            <feGaussianBlur stdDeviation="3" in="SourceGraphic" result="b2" />
            <feMerge>
              <feMergeNode in="b2"/>
              <feMergeNode in="b1"/>
              <feMergeNode in="SourceGraphic"/>
            </feMerge>
          </filter>
          <radialGradient id="face-grad" cx="50%" cy="50%" r="50%">
            <stop offset="0%"  stop-color="#1c0a3c" stop-opacity="0.5"/>
            <stop offset="60%" stop-color="#0c041e" stop-opacity="0.7"/>
            <stop offset="100%" stop-color="#06031a" stop-opacity="0.95"/>
          </radialGradient>
        </defs>
        <!-- face -->
        <circle class="ring-outer" cx="50" cy="50" r="48"/>
        <circle cx="50" cy="50" r="46.5" fill="url(#face-grad)"/>
        <circle class="ring-mid"   cx="50" cy="50" r="44.5"/>
        <circle class="ring-inner" cx="50" cy="50" r="36"/>
        <g id="ticks" filter="url(#glow)"></g>
        <g id="numerals" filter="url(#glow)"></g>
        <g filter="url(#hot-glow)">
          <line id="hand-h" class="hand-h" x1="50" y1="50" x2="50" y2="30"/>
          <line id="hand-m" class="hand-m" x1="50" y1="50" x2="50" y2="20"/>
          <line id="hand-s" class="hand-s" x1="50" y1="50" x2="50" y2="14"/>
          <circle class="hub" cx="50" cy="50" r="2.4"/>
          <circle class="hub-core" cx="50" cy="50" r="0.9"/>
        </g>
      </svg>
      <div id="glitchVeil"></div>
      <div id="glitchScan"></div>
    </div>
    <div id="brand">glitch<em>·</em>clock</div>
    <div id="digital"><small>NOW</small><span id="digTxt">--:--:--</span></div>
  </section>

  <aside id="calSide">
    <div id="calHeader">
      <div id="calMonth">—<small>—</small></div>
      <div class="nav">
        <button id="prev" title="prev month">‹</button>
        <button id="today" title="today">●</button>
        <button id="next" title="next month">›</button>
      </div>
    </div>
    <div id="dowRow"></div>
    <div id="grid"></div>
    <div id="calFoot">
      <div id="selInfo"><b id="selDate">—</b></div>
      <div id="selDist"><em id="selDelta">—</em> from today</div>
      <div id="notes">click a date · arrows nav · g triggers glitch</div>
    </div>
  </aside>
</div>

<script>
(() => {
  const $ = id => document.getElementById(id);
  const layers = [$('svg-r'), $('svg-g'), $('svg-b')];
  const svg = $('svg');
  const ticks = $('ticks');
  const numerals = $('numerals');
  const handH = $('hand-h');
  const handM = $('hand-m');
  const handS = $('hand-s');
  const stage = $('stage');
  const veil = $('glitchVeil');
  const scan = $('glitchScan');
  const digTxt = $('digTxt');
  const tz = $('tz');

  // ============ BUILD CLOCK FACE ============
  function buildFace(){
    // ticks
    for(let i=0; i<60; i++){
      const a = (i/60) * Math.PI * 2 - Math.PI/2;
      const isHour = i % 5 === 0;
      const r1 = isHour ? 36 : 39;
      const r2 = isHour ? 42 : 41;
      const x1 = 50 + Math.cos(a) * r1;
      const y1 = 50 + Math.sin(a) * r1;
      const x2 = 50 + Math.cos(a) * r2;
      const y2 = 50 + Math.sin(a) * r2;
      const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
      line.setAttribute('x1', x1.toFixed(2));
      line.setAttribute('y1', y1.toFixed(2));
      line.setAttribute('x2', x2.toFixed(2));
      line.setAttribute('y2', y2.toFixed(2));
      line.setAttribute('class', isHour ? 'tick-h' : 'tick-m');
      ticks.appendChild(line);
    }
    // numerals
    const nums = ['XII','I','II','III','IV','V','VI','VII','VIII','IX','X','XI'];
    for(let i=0; i<12; i++){
      const a = (i/12) * Math.PI * 2 - Math.PI/2;
      const r = 31;
      const x = 50 + Math.cos(a) * r;
      const y = 50 + Math.sin(a) * r;
      const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
      t.setAttribute('x', x.toFixed(2));
      t.setAttribute('y', (y + 2.6).toFixed(2));
      t.setAttribute('text-anchor', 'middle');
      t.setAttribute('class', 'num');
      t.textContent = nums[i];
      numerals.appendChild(t);
    }

    // mirror into RGB layers (just clone the svg's children)
    layers.forEach(L => {
      L.innerHTML = svg.innerHTML;
    });
  }

  // ============ TICK ============
  let lastMinute = -1;
  let lastHour = -1;
  function tick(){
    const now = new Date();
    const ms = now.getMilliseconds();
    const s = now.getSeconds() + ms/1000;
    const m = now.getMinutes() + s/60;
    const h = (now.getHours() % 12) + m/60;
    // hour rotation: -90deg start... but we set hands originally pointing UP (y2 < y1). So angle 0 = up.
    // SVG rotate is clockwise. We need to rotate by -90 + (angle*360) where 12 = 0deg, 3 = 90deg, etc.
    setHand(handH, h * 30);
    setHand(handM, m * 6);
    setHand(handS, s * 6);
    layers.forEach(L => {
      L.querySelectorAll('line').forEach((line, idx) => {
        // children of the cloned svg correspond to the same children of the original svg.
        // The hand lines are the last 3 line elements before circles.
      });
    });
    // mirror hand rotations to RGB layers
    mirrorHands();

    // digital
    const pad = n => n.toString().padStart(2, '0');
    digTxt.textContent = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;

    // glitch every minute (when minute rolls over)
    if(now.getMinutes() !== lastMinute){
      if(lastMinute !== -1){
        runGlitch(now.getMinutes() === 0 ? 1.0 : 0.6);
      }
      lastMinute = now.getMinutes();
      // tag a calendar cell to glitch briefly
      glitchRandomCell();
    }
    if(now.getHours() !== lastHour){
      lastHour = now.getHours();
      // bigger glitch on the hour
      // (already triggered above as minute=0)
    }
    requestAnimationFrame(tick);
  }
  function setHand(el, deg){
    el.setAttribute('transform', `rotate(${deg.toFixed(3)} 50 50)`);
  }
  function mirrorHands(){
    layers.forEach(L => {
      const hands = L.querySelectorAll('line.hand-h, line.hand-m, line.hand-s');
      hands[0]?.setAttribute('transform', handH.getAttribute('transform'));
      hands[1]?.setAttribute('transform', handM.getAttribute('transform'));
      hands[2]?.setAttribute('transform', handS.getAttribute('transform'));
    });
  }

  // ============ GLITCH ============
  function runGlitch(intensity = 0.7){
    // 1. shake stage with hue-rotate
    stage.classList.remove('glitch-burst');
    void stage.offsetWidth;
    stage.classList.add('glitch-burst');

    // 2. shift RGB layers visibly
    const r = $('svg-r'), g = $('svg-g'), b = $('svg-b');
    r.classList.add('shifted'); g.classList.add('shifted'); b.classList.add('shifted');
    setTimeout(() => {
      r.classList.remove('shifted'); g.classList.remove('shifted'); b.classList.remove('shifted');
    }, 380 + intensity*200);

    // 3. veil
    veil.classList.add('on');
    setTimeout(() => veil.classList.remove('on'), 320);

    // 4. scan swipe
    scan.classList.remove('swipe');
    void scan.offsetWidth;
    scan.classList.add('swipe');

    // 5. audio click
    glitchSound(intensity);

    // 6. random brief block-shift on layer-r (transient skew)
    setTimeout(() => {
      r.style.transform = `translateX(${(Math.random()*8-4).toFixed(1)}px) translateY(${(Math.random()*4-2).toFixed(1)}px)`;
      setTimeout(() => { r.style.transform = ''; }, 70 + Math.random()*40);
    }, 50);
  }

  // ============ AUDIO ============
  let actx = null;
  function ac(){
    if(actx) return actx;
    actx = new (window.AudioContext || window.webkitAudioContext)();
    return actx;
  }
  let muted = false;
  function glitchSound(intensity){
    if(muted) return;
    try {
      const a = ac();
      // bandpass noise sweep
      const buf = a.createBuffer(1, a.sampleRate * 0.18, a.sampleRate);
      const data = buf.getChannelData(0);
      for(let i=0; i<data.length; i++) data[i] = (Math.random()*2-1) * Math.pow(1 - i/data.length, 1.6);
      const src = a.createBufferSource();
      src.buffer = buf;
      const bp = a.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = 1800;
      bp.frequency.exponentialRampToValueAtTime(620, a.currentTime + 0.18);
      bp.Q.value = 4;
      const g = a.createGain();
      g.gain.value = 0;
      g.gain.linearRampToValueAtTime(0.06 * intensity, a.currentTime + 0.005);
      g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.18);
      src.connect(bp).connect(g).connect(a.destination);
      src.start();

      // square blip
      const o = a.createOscillator();
      o.type = 'square';
      o.frequency.value = 440;
      o.frequency.exponentialRampToValueAtTime(80, a.currentTime + 0.12);
      const og = a.createGain();
      og.gain.value = 0;
      og.gain.linearRampToValueAtTime(0.04 * intensity, a.currentTime + 0.005);
      og.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.14);
      o.connect(og).connect(a.destination);
      o.start();
      o.stop(a.currentTime + 0.16);
    } catch(e){}
  }

  // unlock audio on first user interaction
  function unlockAudio(){
    try { ac().resume(); } catch(e){}
    document.removeEventListener('pointerdown', unlockAudio);
  }
  document.addEventListener('pointerdown', unlockAudio);

  // ============ CALENDAR ============
  let viewYear, viewMonth; // 0-indexed
  let selectedDate = null;
  const calMonthEl = $('calMonth');
  const grid = $('grid');
  const dowRow = $('dowRow');
  const selDateEl = $('selDate');
  const selDeltaEl = $('selDelta');

  const MONTHS = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
  const DOW = ['MON','TUE','WED','THU','FRI','SAT','SUN'];

  function buildDow(){
    DOW.forEach(d => {
      const el = document.createElement('div');
      el.textContent = d;
      dowRow.appendChild(el);
    });
  }

  function renderCal(){
    grid.innerHTML = '';
    const first = new Date(viewYear, viewMonth, 1);
    const last = new Date(viewYear, viewMonth + 1, 0);
    const dim = last.getDate();
    // Monday-first: getDay returns 0=Sun, 1=Mon, ... ; we want offset where Monday=0
    let offset = first.getDay() - 1;
    if(offset < 0) offset = 6;
    const today = new Date();
    today.setHours(0,0,0,0);
    const sel = selectedDate ? new Date(selectedDate.getFullYear(), selectedDate.getMonth(), selectedDate.getDate()) : null;

    // previous-month tail
    const prevDim = new Date(viewYear, viewMonth, 0).getDate();
    for(let i=0; i<offset; i++){
      const d = prevDim - offset + 1 + i;
      const cell = document.createElement('div');
      cell.className = 'cell muted';
      cell.textContent = d;
      cell.dataset.d = d;
      cell.dataset.y = viewYear;
      cell.dataset.m = viewMonth - 1;
      cell.dataset.day = d;
      cell.addEventListener('click', () => navTo(viewYear, viewMonth - 1, d));
      grid.appendChild(cell);
    }
    for(let d=1; d<=dim; d++){
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.textContent = d;
      cell.dataset.d = d;
      cell.dataset.y = viewYear;
      cell.dataset.m = viewMonth;
      cell.dataset.day = d;
      const dt = new Date(viewYear, viewMonth, d);
      const dow = dt.getDay();
      if(dow === 0 || dow === 6) cell.classList.add('weekend');
      if(dt.getTime() === today.getTime()) cell.classList.add('today');
      if(sel && dt.getTime() === sel.getTime()) cell.classList.add('selected');
      cell.addEventListener('click', () => selectDate(viewYear, viewMonth, d));
      grid.appendChild(cell);
    }
    // next-month head to fill grid (multiples of 7, up to 6 rows max)
    const totalSoFar = offset + dim;
    const need = 42 - totalSoFar; // 6 rows × 7
    for(let i=1; i<=need; i++){
      const cell = document.createElement('div');
      cell.className = 'cell muted';
      cell.textContent = i;
      cell.dataset.d = i;
      cell.dataset.y = viewYear;
      cell.dataset.m = viewMonth + 1;
      cell.dataset.day = i;
      cell.addEventListener('click', () => navTo(viewYear, viewMonth + 1, i));
      grid.appendChild(cell);
    }

    calMonthEl.innerHTML = `${MONTHS[viewMonth]}<small>${viewYear}</small>`;
    updateSel();
  }

  function navTo(y, m, d){
    let date = new Date(y, m, d);
    viewYear = date.getFullYear();
    viewMonth = date.getMonth();
    selectedDate = date;
    renderCal();
  }

  function selectDate(y, m, d){
    selectedDate = new Date(y, m, d);
    renderCal();
  }

  function updateSel(){
    if(!selectedDate){
      const now = new Date();
      selectedDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    }
    const day = selectedDate.toLocaleDateString(undefined, { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
    selDateEl.textContent = day.toUpperCase();
    const today = new Date();
    today.setHours(0,0,0,0);
    const days = Math.round((selectedDate - today) / 86400000);
    if(days === 0) selDeltaEl.textContent = 'today';
    else if(days === 1) selDeltaEl.textContent = '+1 day';
    else if(days === -1) selDeltaEl.textContent = '-1 day';
    else if(days > 0) selDeltaEl.textContent = `+${days} days`;
    else selDeltaEl.textContent = `${days} days`;
  }

  function glitchRandomCell(){
    const cells = grid.querySelectorAll('.cell:not(.muted)');
    if(!cells.length) return;
    const cell = cells[Math.floor(Math.random() * cells.length)];
    cell.classList.add('glitch');
    setTimeout(() => cell.classList.remove('glitch'), 280 + Math.random()*200);
  }

  // calendar nav
  $('prev').addEventListener('click', () => {
    viewMonth--;
    if(viewMonth < 0){ viewMonth = 11; viewYear--; }
    renderCal();
  });
  $('next').addEventListener('click', () => {
    viewMonth++;
    if(viewMonth > 11){ viewMonth = 0; viewYear++; }
    renderCal();
  });
  $('today').addEventListener('click', () => {
    const now = new Date();
    viewYear = now.getFullYear();
    viewMonth = now.getMonth();
    selectedDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    renderCal();
    runGlitch(0.5);
  });

  // keyboard
  document.addEventListener('keydown', e => {
    if(e.key === 'g' || e.key === 'G'){ runGlitch(0.9); }
    else if(e.key === 'ArrowLeft'){ if(selectedDate){ const d = new Date(selectedDate); d.setDate(d.getDate()-1); navTo(d.getFullYear(), d.getMonth(), d.getDate()); } }
    else if(e.key === 'ArrowRight'){ if(selectedDate){ const d = new Date(selectedDate); d.setDate(d.getDate()+1); navTo(d.getFullYear(), d.getMonth(), d.getDate()); } }
    else if(e.key === 'ArrowUp'){ if(selectedDate){ const d = new Date(selectedDate); d.setDate(d.getDate()-7); navTo(d.getFullYear(), d.getMonth(), d.getDate()); } }
    else if(e.key === 'ArrowDown'){ if(selectedDate){ const d = new Date(selectedDate); d.setDate(d.getDate()+7); navTo(d.getFullYear(), d.getMonth(), d.getDate()); } }
  });

  // ============ INIT ============
  function init(){
    buildFace();
    buildDow();
    const now = new Date();
    viewYear = now.getFullYear();
    viewMonth = now.getMonth();
    selectedDate = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    renderCal();
    try { tz.textContent = Intl.DateTimeFormat().resolvedOptions().timeZone || '—'; } catch(e){ tz.textContent = '—'; }
    requestAnimationFrame(tick);
    // first-load glitch hello
    setTimeout(() => runGlitch(0.85), 600);
  }
  init();
})();
</script>
</body>
