<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ABC Mysteries — Find the Hidden Letters</title>
<link rel="icon" href="https://emojicdn.elk.sh/🔍">
<meta property="og:title" content="ABC Mysteries">
<meta property="og:description" content="Sharp eyes only. Find hidden letters buried in visual chaos.">
<meta property="og:url" content="https://sloppy.live/abc-mysteries">
<meta property="og:image" content="https://sloppy.live/abc-mysteries/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Anybody:wght@700;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#1a1520;--panel:#221d2a;--border:#352e40;
  --accent:#e8b84a;--found:#5ae07a;--miss:#e05a5a;
  --text:#8a7f96;--bright:#ddd0ee;--dim:#3a3248;
}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
#header{font-family:'Anybody',sans-serif;font-size:clamp(20px,4vw,32px);font-weight:900;
  color:var(--accent);padding:12px 0 2px;text-align:center;letter-spacing:2px}
#sub{font-size:10px;color:var(--dim);margin-bottom:6px;text-align:center}
#hud{display:flex;gap:14px;justify-content:center;padding:6px;font-size:11px;flex-wrap:wrap}
.hud-item .val{color:var(--accent);font-weight:700}
#scene-wrap{position:relative;width:min(600px,95vw);aspect-ratio:4/3;margin:0 auto;
  border:2px solid var(--border);border-radius:6px;overflow:hidden;cursor:crosshair;
  background:var(--panel)}
canvas{width:100%;height:100%;display:block}
#letters-bar{width:min(600px,95vw);margin:8px auto;display:flex;flex-wrap:wrap;
  gap:4px;justify-content:center;padding:4px}
.ltr{width:28px;height:28px;display:flex;align-items:center;justify-content:center;
  font-family:'Anybody',sans-serif;font-weight:900;font-size:14px;
  border:2px solid var(--border);border-radius:4px;color:var(--dim);
  background:var(--bg);transition:all .3s}
.ltr.target{border-color:var(--accent);color:var(--accent);animation:pulse 1.5s infinite}
.ltr.found{border-color:var(--found);color:var(--found);background:rgba(90,224,122,.08)}
@keyframes pulse{0%,100%{box-shadow:0 0 0 rgba(232,184,74,0)}50%{box-shadow:0 0 8px rgba(232,184,74,.4)}}
#msg{text-align:center;font-size:12px;color:var(--dim);padding:4px;min-height:20px}
#msg.good{color:var(--found)}
#msg.bad{color:var(--miss)}
#actions{display:flex;gap:8px;justify-content:center;padding:6px}
#actions button{background:var(--panel);border:2px solid var(--border);color:var(--bright);
  font-family:'DM Mono',monospace;font-size:11px;padding:8px 16px;border-radius:4px;
  cursor:pointer;transition:all .15s}
#actions button:hover{border-color:var(--accent);background:var(--border)}
.back-link{padding:8px;text-align:center;margin-top:auto}
.back-link a{color:var(--dim);font-size:9px;text-decoration:none}
.back-link a:hover{color:var(--bright)}
#click-fx{position:absolute;pointer-events:none;border-radius:50%;border:2px solid var(--found);
  width:30px;height:30px;transform:translate(-50%,-50%) scale(0);opacity:0;transition:none}
#click-fx.pop{transition:transform .3s ease-out,opacity .3s ease-out;transform:translate(-50%,-50%) scale(1.5);opacity:0}
#click-fx.miss-pop{border-color:var(--miss);transition:transform .3s ease-out,opacity .3s ease-out;transform:translate(-50%,-50%) scale(1.5);opacity:0}
#hint-btn{font-size:10px;padding:4px 10px}
</style>
</head>
<body>
<div id="header">🔍 ABC MYSTERIES</div>
<div id="sub">find the hidden letters in the scene</div>
<div id="hud">
  <div class="hud-item">Found: <span class="val" id="foundVal">0</span>/<span id="totalVal">8</span></div>
  <div class="hud-item">⏱ <span class="val" id="timeVal">0:00</span></div>
  <div class="hud-item">Level <span class="val" id="levelVal">1</span></div>
  <div class="hud-item">Score: <span class="val" id="scoreVal">0</span></div>
</div>
<div id="scene-wrap">
  <canvas id="c"></canvas>
  <div id="click-fx"></div>
</div>
<div id="letters-bar"></div>
<div id="msg">Click on hidden letters in the scene above</div>
<div id="actions">
  <button id="hint-btn">💡 Hint</button>
  <button id="new-btn" style="display:none">🔄 Next Level</button>
</div>
<div class="back-link"><a href="https://sloppy.live">← sloppy.live</a></div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const wrap = document.getElementById('scene-wrap');

const CW = 800, CH = 600;
canvas.width = CW; canvas.height = CH;

const ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';

// Scene palettes
const PALETTES = [
  {bg:'#2a1f35',shapes:['#4a3060','#3d2650','#5a3d75','#352848','#6a4d90','#2e2040'],accent:['#e8b84a','#c47830','#d4a040']},
  {bg:'#1a2a1f',shapes:['#2a4a30','#1f3d26','#3d6a45','#284835','#4d7a55','#203a28'],accent:['#4ae8b8','#30c478','#40d4a0']},
  {bg:'#2a1f1f',shapes:['#4a3030','#3d2626','#6a4040','#482828','#7a5050','#3a2020'],accent:['#e84a4a','#c43030','#d46040']},
  {bg:'#1f1f2a',shapes:['#30304a','#26263d','#40406a','#282848','#50507a','#20203a'],accent:['#4a8ae8','#3070c4','#4080d4']},
  {bg:'#2a2a1a',shapes:['#4a4a2a','#3d3d1f','#5a5a30','#484828','#6a6a3d','#3a3a18'],accent:['#e8e84a','#c4c430','#d4b440']},
];

let level = 1;
let score = 0;
let targetLetters = [];
let placedLetters = []; // {letter, x, y, size, angle, color, found, font}
let foundCount = 0;
let totalTarget = 0;
let timerStart = 0;
let timerInterval = null;
let hintsUsed = 0;
let sceneDecorations = [];

// Fonts used to disguise letters
const SCENE_FONTS = [
  'Anybody','Georgia','Courier New','Times New Roman','Impact',
  'Comic Sans MS','Trebuchet MS','Verdana','Arial Black','Palatino'
];

function pick(a){ return a[Math.floor(Math.random()*a.length)]; }
function rand(a,b){ return a+Math.random()*(b-a); }
function randInt(a,b){ return Math.floor(rand(a,b+1)); }

function generateScene(){
  const pal = PALETTES[level % PALETTES.length];
  sceneDecorations = [];

  // Background
  ctx.fillStyle = pal.bg;
  ctx.fillRect(0,0,CW,CH);

  // Background texture - lots of shapes to create visual noise
  const numShapes = 80 + level * 10;
  for(let i=0;i<numShapes;i++){
    const x = rand(0,CW), y = rand(0,CH);
    const type = randInt(0,5);
    ctx.globalAlpha = rand(0.15,0.5);
    ctx.fillStyle = pick(pal.shapes);
    ctx.strokeStyle = pick(pal.shapes);
    ctx.lineWidth = rand(1,3);

    if(type===0){
      // Circle
      const r = rand(5,50);
      ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2);
      Math.random()>0.5 ? ctx.fill() : ctx.stroke();
    } else if(type===1){
      // Rectangle
      const w=rand(10,80),h=rand(10,60);
      ctx.save(); ctx.translate(x,y); ctx.rotate(rand(0,Math.PI));
      Math.random()>0.5 ? ctx.fillRect(-w/2,-h/2,w,h) : ctx.strokeRect(-w/2,-h/2,w,h);
      ctx.restore();
    } else if(type===2){
      // Triangle
      ctx.beginPath();
      ctx.moveTo(x,y-rand(10,30));
      ctx.lineTo(x-rand(10,30),y+rand(10,30));
      ctx.lineTo(x+rand(10,30),y+rand(10,30));
      ctx.closePath();
      Math.random()>0.5 ? ctx.fill() : ctx.stroke();
    } else if(type===3){
      // Lines
      ctx.beginPath();
      ctx.moveTo(x,y);
      ctx.lineTo(x+rand(-60,60),y+rand(-60,60));
      ctx.stroke();
    } else if(type===4){
      // Dots cluster
      for(let j=0;j<randInt(3,8);j++){
        ctx.beginPath();
        ctx.arc(x+rand(-20,20),y+rand(-20,20),rand(1,4),0,Math.PI*2);
        ctx.fill();
      }
    } else {
      // Arc/curve
      ctx.beginPath();
      ctx.arc(x,y,rand(15,50),rand(0,Math.PI),rand(Math.PI,Math.PI*2));
      ctx.stroke();
    }
  }

  // Decorative text (non-target letters as noise)
  ctx.globalAlpha = 1;
  const noiseLetterCount = 40 + level * 8;
  for(let i=0;i<noiseLetterCount;i++){
    const letter = ALPHABET[randInt(0,25)];
    // Skip if it's one of our targets (we place those separately)
    if(targetLetters.includes(letter) && Math.random() < 0.7) continue;
    const x = rand(10,CW-10), y = rand(20,CH-10);
    const size = rand(10,35);
    const angle = rand(-0.5,0.5);
    ctx.save();
    ctx.translate(x,y);
    ctx.rotate(angle);
    ctx.globalAlpha = rand(0.06,0.2);
    ctx.fillStyle = pick(pal.shapes);
    ctx.font = `${Math.random()>0.5?'bold':''} ${size}px ${pick(SCENE_FONTS)}`;
    ctx.fillText(letter,0,0);
    ctx.restore();
  }

  // More visual clutter: symbols and shapes that look letter-like
  const clutterSymbols = '◯△□◇♦●▲■◆⬟⬡⬢∆∇⊕⊗';
  for(let i=0;i<20+level*3;i++){
    const x = rand(10,CW-10), y = rand(20,CH-10);
    const size = rand(14,40);
    ctx.save();
    ctx.translate(x,y); ctx.rotate(rand(-0.4,0.4));
    ctx.globalAlpha = rand(0.1,0.35);
    ctx.fillStyle = pick([...pal.shapes,...pal.accent]);
    ctx.font = `${size}px serif`;
    ctx.fillText(clutterSymbols[randInt(0,clutterSymbols.length-1)],0,0);
    ctx.restore();
  }

  ctx.globalAlpha = 1;
}

function placeTargetLetters(){
  placedLetters = [];
  const pal = PALETTES[level % PALETTES.length];
  const padding = 40;
  const minDist = 60;

  for(const letter of targetLetters){
    let x, y, attempts = 0;
    // Find non-overlapping position
    do {
      x = rand(padding, CW-padding);
      y = rand(padding+20, CH-padding);
      attempts++;
    } while(attempts < 100 && placedLetters.some(p =>
      Math.abs(p.x-x)<minDist && Math.abs(p.y-y)<minDist));

    const size = rand(22,42) - Math.min(level,8)*1;
    const angle = rand(-0.4,0.4);
    // Blend color between scene shapes and accent (harder to spot)
    const blendChance = Math.min(0.6 + level*0.03, 0.85);
    const color = Math.random() < blendChance ? pick(pal.shapes) : pick(pal.accent);
    const alpha = Math.max(0.2, 0.55 - level*0.02);
    const font = pick(SCENE_FONTS);

    placedLetters.push({letter, x, y, size, angle, color, alpha, font, found:false});

    // Draw the hidden letter
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(angle);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = color;
    ctx.font = `bold ${size}px ${font}`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(letter, 0, 0);
    ctx.restore();
  }
  ctx.globalAlpha = 1;
}

function selectTargetLetters(){
  const count = Math.min(8 + Math.floor(level/2), 14);
  const shuffled = ALPHABET.split('').sort(() => Math.random()-0.5);
  targetLetters = shuffled.slice(0, count);
  totalTarget = count;
}

function renderLettersBar(){
  const bar = document.getElementById('letters-bar');
  bar.innerHTML = '';
  ALPHABET.split('').forEach(letter => {
    const div = document.createElement('div');
    div.className = 'ltr';
    div.textContent = letter;
    const placed = placedLetters.find(p => p.letter === letter);
    if(targetLetters.includes(letter)){
      if(placed && placed.found){
        div.classList.add('found');
      } else {
        div.classList.add('target');
      }
    }
    bar.appendChild(div);
  });
}

function startLevel(){
  foundCount = 0;
  hintsUsed = 0;
  selectTargetLetters();
  generateScene();
  placeTargetLetters();
  renderLettersBar();
  updateHUD();
  setMsg('Find the glowing letters!','');
  document.getElementById('new-btn').style.display = 'none';
  document.getElementById('hint-btn').style.display = 'inline-block';

  timerStart = Date.now();
  clearInterval(timerInterval);
  timerInterval = setInterval(updateTimer, 100);
}

function updateTimer(){
  const elapsed = Math.floor((Date.now()-timerStart)/1000);
  const m = Math.floor(elapsed/60);
  const s = elapsed%60;
  document.getElementById('timeVal').textContent = m+':'+(s<10?'0':'')+s;
}

function updateHUD(){
  document.getElementById('foundVal').textContent = foundCount;
  document.getElementById('totalVal').textContent = totalTarget;
  document.getElementById('levelVal').textContent = level;
  document.getElementById('scoreVal').textContent = score;
}

function setMsg(text, cls){
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = cls || '';
}

function clickFx(cx, cy, isHit){
  const fx = document.getElementById('click-fx');
  fx.className = '';
  fx.style.left = cx+'px';
  fx.style.top = cy+'px';
  void fx.offsetWidth; // reflow
  fx.className = isHit ? 'pop' : 'miss-pop';
}

function handleClick(e){
  const rect = wrap.getBoundingClientRect();
  const scaleX = CW / rect.width;
  const scaleY = CH / rect.height;
  const cx = (e.clientX - rect.left);
  const cy = (e.clientY - rect.top);
  const sx = cx * scaleX;
  const sy = cy * scaleY;

  let hit = false;
  for(const p of placedLetters){
    if(p.found) continue;
    const hitRadius = p.size * 0.7;
    if(Math.abs(sx - p.x) < hitRadius && Math.abs(sy - p.y) < hitRadius){
      p.found = true;
      foundCount++;
      hit = true;

      // Draw found indicator
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.beginPath();
      ctx.arc(0, 0, p.size*0.6, 0, Math.PI*2);
      ctx.strokeStyle = '#5ae07a';
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.8;
      ctx.stroke();
      // Redraw letter brightly
      ctx.rotate(p.angle);
      ctx.globalAlpha = 1;
      ctx.fillStyle = '#5ae07a';
      ctx.font = `bold ${p.size}px ${p.font}`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(p.letter, 0, 0);
      ctx.restore();

      const elapsed = (Date.now()-timerStart)/1000;
      const timeBonus = Math.max(1, Math.floor(50 - elapsed*0.5));
      const hintPenalty = hintsUsed * 5;
      const pts = Math.max(5, timeBonus * (level) - hintPenalty);
      score += pts;

      setMsg(`Found ${p.letter}! +${pts} pts`, 'good');
      clickFx(cx, cy, true);
      renderLettersBar();
      updateHUD();

      if(foundCount >= totalTarget){
        levelComplete();
      }
      break;
    }
  }

  if(!hit){
    score = Math.max(0, score - 3);
    setMsg('Miss! -3 pts', 'bad');
    clickFx(cx, cy, false);
    updateHUD();
  }
}

function levelComplete(){
  clearInterval(timerInterval);
  const elapsed = Math.floor((Date.now()-timerStart)/1000);
  const bonus = Math.max(0, (100 - elapsed) * level);
  score += bonus;
  updateHUD();
  setMsg(`Level ${level} complete! Time bonus: +${bonus}`, 'good');
  level++;
  document.getElementById('new-btn').style.display = 'inline-block';
  document.getElementById('hint-btn').style.display = 'none';
}

function giveHint(){
  const unfound = placedLetters.filter(p => !p.found);
  if(unfound.length === 0) return;
  hintsUsed++;
  const target = pick(unfound);

  // Flash a circle around the letter
  let flashes = 0;
  const iv = setInterval(() => {
    ctx.save();
    ctx.translate(target.x, target.y);
    ctx.beginPath();
    ctx.arc(0, 0, target.size + 8, 0, Math.PI*2);
    ctx.strokeStyle = flashes%2===0 ? '#e8b84a' : 'transparent';
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.7;
    ctx.stroke();
    ctx.restore();
    flashes++;
    if(flashes >= 6) clearInterval(iv);
  }, 200);

  score = Math.max(0, score - 10);
  setMsg(`Hint: look near the glow! -10 pts`, '');
  updateHUD();
}

wrap.addEventListener('click', handleClick);
wrap.addEventListener('touchend', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  handleClick({clientX:t.clientX, clientY:t.clientY});
});

document.getElementById('hint-btn').onclick = giveHint;
document.getElementById('new-btn').onclick = startLevel;

startLevel();
</script>
</body>
</html>
