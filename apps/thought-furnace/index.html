<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thought Furnace</title>
<link rel="icon" href="https://emojicdn.elk.sh/🔥">
<meta property="og:title" content="Thought Furnace">
<meta property="og:description" content="Write your bad thoughts. Crumple them. Toss them in. Watch them burn.">
<meta property="og:url" content="https://app.sloppy.live/thought-furnace/">
<meta property="og:image" content="https://emojicdn.elk.sh/🔥?style=google">
<link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:ital,wght@0,400;1,400&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#0c0a08;--fire:#ff4400;--ember:#ff8800;--ash:#444;--paper:#f0e8d8}
html,body{height:100%;overflow:hidden}
body{
background:var(--bg);
display:flex;flex-direction:column;
font-family:'JetBrains Mono',monospace;
color:#a09080;
}
header{
text-align:center;padding:14px 16px 10px;z-index:5;
flex-shrink:0;
}
header h1{
font-family:'Crimson Pro',serif;font-style:italic;
font-size:clamp(24px,6vw,36px);font-weight:400;
color:#c8a880;
letter-spacing:2px;
}
header .sub{font-size:9px;color:#4a3828;letter-spacing:3px;margin-top:2px}
.write-area{
flex-shrink:0;padding:0 16px 12px;
display:flex;gap:8px;max-width:500px;
margin:0 auto;width:100%;
}
#thought-input{
flex:1;padding:12px 14px;
background:#1a1510;
border:1px solid #2a2018;
color:var(--paper);
font-family:'Crimson Pro',serif;font-style:italic;
font-size:16px;
outline:none;resize:none;
min-height:48px;max-height:80px;
}
#thought-input::placeholder{color:#3a2a1a}
#thought-input:focus{border-color:#4a3020}
#toss-btn{
padding:0 20px;
background:#2a1808;border:1px solid #4a2810;
color:var(--fire);
font-family:'JetBrains Mono',monospace;
font-size:12px;font-weight:700;
cursor:pointer;letter-spacing:2px;
transition:all 0.15s;
align-self:stretch;
}
#toss-btn:hover{background:#3a2010;border-color:var(--fire);box-shadow:0 0 12px rgba(255,68,0,0.2)}
#toss-btn:active{transform:scale(0.95)}
canvas{flex:1;display:block;cursor:default}
.counter{
position:fixed;bottom:8px;left:50%;transform:translateX(-50%);
font-size:9px;color:#2a1a10;letter-spacing:3px;z-index:5;
}
.counter span{color:#5a3020}
.back-link{
position:fixed;bottom:8px;right:12px;
font-size:8px;color:#1a1208;text-decoration:none;z-index:5;letter-spacing:2px;
}
.back-link:hover{color:#3a2818}
</style>
</head>
<body>
<header>
<h1>Thought Furnace</h1>
<div class="sub">WRITE IT DOWN. BURN IT UP. LET IT GO.</div>
</header>
<div class="write-area">
<textarea id="thought-input" placeholder="type a bad thought..." rows="2"></textarea>
<button id="toss-btn" onclick="tossThought()">BURN</button>
</div>
<canvas id="c"></canvas>
<div class="counter">BURNED: <span id="burn-count">0</span></div>
<a href="https://sloppy.live" class="back-link" target="_blank">sloppy.live</a>

<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H;
let papers=[],fireParticles=[],embers=[],ashPile=[];
let burnCount=0;
let audioCtx;
const furnaceY=()=>H*0.75;

function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}

function sfx(type){
  initAudio();const t=audioCtx.currentTime;
  if(type==='crumple'){
    for(let i=0;i<4;i++){
      const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.04,audioCtx.sampleRate);
      const d=buf.getChannelData(0);for(let j=0;j<d.length;j++)d[j]=(Math.random()*2-1)*0.6;
      const s=audioCtx.createBufferSource();s.buffer=buf;
      const g=audioCtx.createGain();g.gain.setValueAtTime(0.05,t+i*0.05);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.05+0.04);
      const f=audioCtx.createBiquadFilter();f.type='highpass';f.frequency.value=2000+Math.random()*2000;
      s.connect(f);f.connect(g);g.connect(audioCtx.destination);s.start(t+i*0.05);
    }
  }else if(type==='ignite'){
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='sawtooth';o.frequency.setValueAtTime(100,t);o.frequency.exponentialRampToValueAtTime(400,t+0.2);
    g.gain.setValueAtTime(0.08,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
    const f=audioCtx.createBiquadFilter();f.type='bandpass';f.frequency.value=300;f.Q.value=1;
    o.connect(f);f.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+0.4);
    // Crackle
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.5,audioCtx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++){d[i]=Math.random()<0.02?(Math.random()*2-1):d[i-1]*0.99||0}
    const s=audioCtx.createBufferSource();s.buffer=buf;
    const g2=audioCtx.createGain();g2.gain.setValueAtTime(0.1,t);g2.gain.exponentialRampToValueAtTime(0.001,t+0.5);
    s.connect(g2);g2.connect(audioCtx.destination);s.start(t);
  }else if(type==='whoosh'){
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.15,audioCtx.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.4));
    const s=audioCtx.createBufferSource();s.buffer=buf;
    const g=audioCtx.createGain();g.gain.value=0.06;
    const f=audioCtx.createBiquadFilter();f.type='bandpass';f.frequency.setValueAtTime(200,t);f.frequency.exponentialRampToValueAtTime(800,t+0.1);f.Q.value=1;
    s.connect(f);f.connect(g);g.connect(audioCtx.destination);s.start(t);
  }
}

function resize(){
  W=C.width=C.offsetWidth;
  H=C.height=C.offsetHeight;
}
window.addEventListener('resize',resize);

function tossThought(){
  const input=document.getElementById('thought-input');
  const text=input.value.trim();
  if(!text)return;
  input.value='';

  sfx('crumple');

  // Create paper ball
  const paper={
    text:text.substring(0,60),
    x:W/2+(Math.random()-0.5)*60,
    y:-20,
    vx:(Math.random()-0.5)*2,
    vy:2+Math.random()*2,
    rot:Math.random()*Math.PI*2,
    rotV:(Math.random()-0.5)*0.1,
    size:28+Math.min(text.length,40)*0.4,
    crumple:0, // 0=flat note, 1=crumpled ball
    phase:'falling', // falling -> burning -> gone
    burnTimer:0,
    burnDuration:120+Math.random()*60,
    color:'#f0e8d8',
    alpha:1,
    textAlpha:1,
  };
  papers.push(paper);
}

function update(){
  const fy=furnaceY();

  for(let i=papers.length-1;i>=0;i--){
    const p=papers[i];

    if(p.phase==='falling'){
      p.vy+=0.12; // gravity
      p.vy*=0.99;
      p.x+=p.vx;
      p.y+=p.vy;
      p.rot+=p.rotV;
      // Crumple as it falls
      p.crumple=Math.min(1,p.crumple+0.03);

      // Hit the furnace zone
      if(p.y>fy-10){
        p.y=fy-10;
        p.vy=0;p.vx=0;p.rotV=0;
        p.phase='burning';
        sfx('ignite');
      }
    }else if(p.phase==='burning'){
      p.burnTimer++;
      const t=p.burnTimer/p.burnDuration;

      // Darken paper
      const r=Math.floor(240-t*200);
      const g=Math.floor(232-t*220);
      const b=Math.floor(216-t*216);
      p.color=`rgb(${Math.max(0,r)},${Math.max(0,g)},${Math.max(0,b)})`;
      p.textAlpha=Math.max(0,1-t*2);
      p.size*=0.998;

      // Spawn fire particles
      if(Math.random()<0.4){
        const fx=p.x+(Math.random()-0.5)*p.size;
        const fy2=p.y+(Math.random()-0.5)*p.size*0.5;
        fireParticles.push({
          x:fx,y:fy2,
          vx:(Math.random()-0.5)*1.5,
          vy:-1.5-Math.random()*3,
          life:15+Math.random()*20,
          maxLife:35,
          size:3+Math.random()*4,
        });
      }
      // Embers
      if(Math.random()<0.15){
        embers.push({
          x:p.x+(Math.random()-0.5)*p.size,
          y:p.y,
          vx:(Math.random()-0.5)*3,
          vy:-2-Math.random()*4,
          life:30+Math.random()*40,
          size:1+Math.random()*2,
        });
      }

      // Shrink and curl
      if(t>0.8){
        p.alpha=1-(t-0.8)*5;
      }
      if(t>=1){
        // Add to ash pile
        for(let a=0;a<3;a++){
          ashPile.push({
            x:p.x+(Math.random()-0.5)*20,
            y:fy+Math.random()*10,
            size:2+Math.random()*3,
            alpha:0.3+Math.random()*0.2,
          });
        }
        papers.splice(i,1);
        burnCount++;
        document.getElementById('burn-count').textContent=burnCount;
      }
    }
  }

  // Update fire particles
  for(let i=fireParticles.length-1;i>=0;i--){
    const p=fireParticles[i];
    p.x+=p.vx;p.y+=p.vy;
    p.vy-=0.02; // fire rises
    p.vx*=0.98;
    p.life--;
    if(p.life<=0)fireParticles.splice(i,1);
  }

  // Update embers
  for(let i=embers.length-1;i>=0;i--){
    const e=embers[i];
    e.x+=e.vx;e.y+=e.vy;
    e.vy+=0.03;e.vx*=0.99;
    e.life--;
    if(e.life<=0)embers.splice(i,1);
  }

  // Trim ash pile
  if(ashPile.length>200)ashPile.splice(0,ashPile.length-200);

  // Ambient fire (always a small fire in the furnace)
  if(Math.random()<0.2){
    fireParticles.push({
      x:W/2+(Math.random()-0.5)*80,
      y:fy+5,
      vx:(Math.random()-0.5)*0.8,
      vy:-0.8-Math.random()*1.5,
      life:10+Math.random()*15,
      maxLife:25,
      size:2+Math.random()*3,
    });
  }
}

function draw(){
  X.clearRect(0,0,W,H);
  const fy=furnaceY();

  // Background glow from furnace
  const bgGrad=X.createRadialGradient(W/2,fy,10,W/2,fy,H*0.5);
  bgGrad.addColorStop(0,'rgba(255,68,0,0.06)');
  bgGrad.addColorStop(0.5,'rgba(255,68,0,0.02)');
  bgGrad.addColorStop(1,'transparent');
  X.fillStyle=bgGrad;
  X.fillRect(0,0,W,H);

  // Furnace/bin
  drawFurnace(fy);

  // Ash pile
  for(const a of ashPile){
    X.fillStyle=`rgba(60,50,40,${a.alpha})`;
    X.fillRect(a.x,a.y,a.size,a.size*0.5);
  }

  // Papers
  for(const p of papers){
    X.save();
    X.translate(p.x,p.y);
    X.rotate(p.rot);
    X.globalAlpha=p.alpha;

    if(p.crumple<0.5){
      // Flat note
      const s=p.size;
      X.fillStyle=p.color;
      X.fillRect(-s/2,-s*0.6/2,s,s*0.6);
      // Lines
      X.fillStyle=`rgba(180,160,140,${p.textAlpha*0.3})`;
      for(let l=0;l<3;l++){
        X.fillRect(-s/2+4,-s*0.6/2+6+l*6,s-8,1);
      }
      // Text
      if(p.textAlpha>0){
        X.fillStyle=`rgba(60,40,30,${p.textAlpha})`;
        X.font=`italic ${Math.max(7,s*0.22)}px 'Crimson Pro',serif`;
        X.textAlign='center';
        const display=p.text.length>25?p.text.substring(0,22)+'...':p.text;
        X.fillText(display,0,2);
      }
    }else{
      // Crumpled ball
      const s=p.size*0.7;
      X.fillStyle=p.color;
      X.beginPath();
      for(let a=0;a<12;a++){
        const angle=a*Math.PI*2/12;
        const r=s/2*(0.7+0.3*Math.sin(a*3.7+p.rot));
        if(a===0)X.moveTo(Math.cos(angle)*r,Math.sin(angle)*r);
        else X.lineTo(Math.cos(angle)*r,Math.sin(angle)*r);
      }
      X.closePath();X.fill();
      // Crumple lines
      X.strokeStyle=`rgba(0,0,0,${0.08*p.alpha})`;X.lineWidth=0.5;
      for(let l=0;l<4;l++){
        X.beginPath();
        X.moveTo(-s/3+l*s/6+Math.sin(l)*3,-s/3);
        X.quadraticCurveTo(Math.sin(l*2)*5,0,-s/4+l*s/5,s/3);
        X.stroke();
      }
      // Fading text
      if(p.textAlpha>0.1){
        X.fillStyle=`rgba(60,40,30,${p.textAlpha*0.5})`;
        X.font=`italic ${Math.max(6,s*0.2)}px 'Crimson Pro',serif`;
        X.textAlign='center';
        X.fillText(p.text.substring(0,15),0,3);
      }
    }
    X.restore();
  }

  // Fire particles
  for(const p of fireParticles){
    const t=p.life/p.maxLife;
    let r,g,b;
    if(t>0.6){r=255;g=Math.floor(100+t*100);b=0}
    else if(t>0.3){r=255;g=Math.floor(t*180);b=0}
    else{r=Math.floor(200+t*55);g=Math.floor(t*100);b=0}
    X.fillStyle=`rgba(${r},${g},${b},${t*0.8})`;
    X.shadowColor=`rgba(${r},${g},0,${t*0.3})`;
    X.shadowBlur=p.size*2;
    X.beginPath();
    X.arc(p.x,p.y,p.size*t,0,Math.PI*2);
    X.fill();
  }
  X.shadowBlur=0;

  // Embers
  for(const e of embers){
    const t=e.life/70;
    X.fillStyle=`rgba(255,${Math.floor(100+t*80)},0,${t})`;
    X.fillRect(e.x,e.y,e.size,e.size);
  }

  // Vignette
  X.fillStyle='rgba(0,0,0,0)';
  const vig=X.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.8);
  vig.addColorStop(0,'rgba(0,0,0,0)');
  vig.addColorStop(1,'rgba(0,0,0,0.3)');
  X.fillStyle=vig;
  X.fillRect(0,0,W,H);
}

function drawFurnace(fy){
  const fw=Math.min(200,W*0.5);
  const fh=H-fy+20;
  const fx=W/2-fw/2;

  // Furnace body (dark metal)
  X.fillStyle='#141210';
  X.fillRect(fx,fy-5,fw,fh);

  // Inner glow
  const grd=X.createLinearGradient(fx,fy,fx,fy+60);
  grd.addColorStop(0,'rgba(255,68,0,0.12)');
  grd.addColorStop(1,'rgba(255,68,0,0)');
  X.fillStyle=grd;
  X.fillRect(fx+4,fy-3,fw-8,60);

  // Furnace rim
  X.fillStyle='#2a2220';
  X.fillRect(fx-6,fy-8,fw+12,8);
  // Rim highlight
  X.fillStyle='#3a3230';
  X.fillRect(fx-6,fy-8,fw+12,2);

  // Rivets
  [fx+8,fx+fw-8].forEach(rx=>{
    X.beginPath();X.arc(rx,fy-4,3,0,Math.PI*2);
    X.fillStyle='#3a3230';X.fill();
  });

  // Grate lines
  X.strokeStyle='#1a1816';X.lineWidth=2;
  for(let i=0;i<6;i++){
    const gx=fx+20+i*(fw-40)/5;
    X.beginPath();X.moveTo(gx,fy);X.lineTo(gx,fy+30);X.stroke();
  }

  // Text on furnace
  X.fillStyle='rgba(255,68,0,0.08)';
  X.font="9px 'JetBrains Mono',monospace";
  X.textAlign='center';
  X.fillText('LET IT GO',W/2,fy+50);
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

// Enter key to toss
document.getElementById('thought-input').addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();tossThought()}
});

// Resize and start
function init(){
  resize();
  // Ensure canvas fills available space
  const rect=C.getBoundingClientRect();
  C.width=rect.width;C.height=rect.height;
  W=C.width;H=C.height;
  loop();
}
// Wait for layout
requestAnimationFrame(init);
window.addEventListener('resize',()=>{
  const rect=C.getBoundingClientRect();
  C.width=rect.width;C.height=rect.height;
  W=C.width;H=C.height;
});
</script>
</body>
</html>
