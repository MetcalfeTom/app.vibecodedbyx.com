<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>lulu</title>
<meta name="description" content="Type a topic. Lulu draws herself and tells you a sharp one-liner about it. A minimalist black-and-white wit generator." />
<link rel="icon" href="https://emojicdn.elk.sh/%E2%9C%8F%EF%B8%8F" />
<meta property="og:title" content="Lulu — minimalist witty one-liner generator" />
<meta property="og:description" content="Black-and-white hand-drawn line art + sharp one-liners about any topic. Tell Lulu a subject and she writes the joke." />
<meta property="og:url" content="https://sloppy.live/lulu/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/minimalist%20black%20ink%20line%20art%20woman%20thinking%20cream%20paper%20single%20stroke%20drawing?width=1200&height=630&nologo=true" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,700;1,400;1,500&family=Caveat:wght@400;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper:    #f9f1de;
    --paper-d:  #ede2c5;
    --ink:      #18130d;
    --ink-2:    #4a3e2c;
    --pencil:   #7d6f55;
    --rule:     rgba(24, 19, 13, 0.16);
    --rule-d:   rgba(24, 19, 13, 0.32);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100%;
    background:
      radial-gradient(ellipse at 50% 18%, rgba(0,0,0,0.04) 0%, transparent 65%),
      radial-gradient(ellipse at 18% 92%, rgba(24,19,13,0.05) 0%, transparent 55%),
      var(--paper);
    color: var(--ink);
    font-family: 'Cormorant Garamond', serif;
    font-size: 18px;
    line-height: 1.45;
  }
  /* faint paper texture */
  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    background:
      repeating-linear-gradient(9deg, transparent 0 3px, rgba(24,19,13,0.018) 3px 4px),
      repeating-linear-gradient(101deg, transparent 0 5px, rgba(24,19,13,0.012) 5px 6px);
    z-index: 1;
    mix-blend-mode: multiply;
  }

  .wrap {
    max-width: 720px;
    margin: 0 auto;
    padding: 1.8rem 1.4rem 4rem;
    position: relative;
    z-index: 2;
  }

  /* ── HEADER ─────────────────────────────────────────────────── */
  header.brand {
    text-align: center;
    margin-bottom: 1.4rem;
  }
  h1.logo {
    font-family: 'Caveat', cursive;
    font-size: clamp(4.2rem, 11vw, 6.4rem);
    font-weight: 600;
    line-height: 1;
    color: var(--ink);
    letter-spacing: -0.02em;
    transform: rotate(-1.4deg);
    display: inline-block;
  }
  h1.logo::after {
    content: '';
    display: block;
    width: 64%;
    height: 4px;
    margin: 0.1em auto 0;
    background:
      radial-gradient(ellipse 100% 60% at 0% 50%, var(--ink), transparent 80%),
      radial-gradient(ellipse 100% 60% at 100% 50%, var(--ink), transparent 80%);
    border-radius: 50%;
    opacity: 0.85;
    transform: rotate(0.6deg) translateY(-4px) skewX(-3deg);
  }
  .strap {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    color: var(--pencil);
    text-transform: uppercase;
    margin-top: 0.6rem;
  }
  .strap .dot { color: var(--ink); }

  /* ── COMPOSER ───────────────────────────────────────────────── */
  .composer {
    margin: 1.4rem auto 0;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 0.4rem;
    align-items: stretch;
    max-width: 560px;
  }
  .composer input {
    appearance: none;
    background: transparent;
    border: none;
    border-bottom: 2px solid var(--ink);
    color: var(--ink);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.45rem;
    padding: 0.4rem 0.5rem 0.4rem 0.2rem;
    outline: none;
    width: 100%;
  }
  .composer input::placeholder { color: var(--pencil); opacity: 0.7; }
  .composer input:focus { border-bottom-color: var(--ink); border-bottom-width: 3px; }
  .composer button.go {
    appearance: none;
    background: var(--ink);
    color: var(--paper);
    border: none;
    font-family: 'Caveat', cursive;
    font-weight: 600;
    font-size: 1.5rem;
    padding: 0.2rem 1.3rem 0.3rem;
    cursor: pointer;
    border-radius: 0;
    transition: transform 0.06s, background 0.12s, color 0.12s;
    letter-spacing: 0.02em;
    line-height: 1;
  }
  .composer button.go:hover { background: var(--paper); color: var(--ink); box-shadow: inset 0 0 0 2px var(--ink); }
  .composer button.go:active { transform: translateY(1px); }
  .composer button.go:disabled { background: var(--paper-d); color: var(--pencil); cursor: progress; }

  .technique-row {
    margin: 1rem auto 0;
    max-width: 560px;
    display: flex;
    flex-wrap: wrap;
    gap: 0.35rem 0.7rem;
    justify-content: center;
    align-items: baseline;
  }
  .technique-row .lbl {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--pencil);
    margin-right: 0.2rem;
  }
  .technique-row .chip {
    appearance: none;
    background: transparent;
    border: none;
    color: var(--ink-2);
    font-family: 'Caveat', cursive;
    font-size: 1.1rem;
    padding: 0 0.1rem;
    cursor: pointer;
    position: relative;
    transition: color 0.12s;
  }
  .technique-row .chip:hover { color: var(--ink); }
  .technique-row .chip.active {
    color: var(--ink);
    font-weight: 600;
  }
  .technique-row .chip.active::after {
    content: '';
    position: absolute;
    left: 0; right: 0;
    bottom: -3px;
    height: 2px;
    background: var(--ink);
    border-radius: 2px;
    transform: scaleX(0.9);
  }

  /* ── RESULT CARD ────────────────────────────────────────────── */
  .card {
    margin: 2rem auto 0;
    text-align: center;
    position: relative;
    min-height: 380px;
  }

  /* Lulu illustration frame — invisible box; the SVG itself is the art */
  .lulu-art {
    margin: 0 auto;
    width: 260px;
    height: 280px;
    position: relative;
  }
  .lulu-art svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }
  /* hand-drawn stroke styles, applied to all SVG paths */
  .lulu-art svg .stroke {
    fill: none;
    stroke: var(--ink);
    stroke-width: 1.7;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
  .lulu-art svg .thin {
    stroke-width: 1.1;
  }
  .lulu-art svg .dot {
    fill: var(--ink);
    stroke: none;
  }
  .lulu-art svg .lighter {
    stroke: var(--ink-2);
    stroke-width: 1.2;
    opacity: 0.7;
  }
  /* SVG draw-in animation */
  .lulu-art.drawing svg .stroke {
    stroke-dasharray: 1000;
    stroke-dashoffset: 1000;
    animation: draw 1.4s ease-out forwards;
  }
  .lulu-art.drawing svg .dot {
    opacity: 0;
    animation: dotIn 0.4s ease-out forwards;
    animation-delay: 1.2s;
  }
  @keyframes draw   { to { stroke-dashoffset: 0; } }
  @keyframes dotIn  { to { opacity: 1; } }

  /* The one-liner — big italic serif quote */
  .line-wrap {
    margin-top: 1.4rem;
    padding: 0 0.4rem;
  }
  blockquote.line {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.5rem, 4vw, 2.05rem);
    line-height: 1.32;
    font-style: italic;
    font-weight: 500;
    color: var(--ink);
    max-width: 32em;
    margin: 0 auto;
    min-height: 2.5em;
    padding: 0.4rem 0;
    position: relative;
  }
  blockquote.line::before,
  blockquote.line::after {
    font-family: 'Cormorant Garamond', serif;
    color: var(--ink);
    opacity: 0.5;
    font-style: normal;
  }
  blockquote.line::before { content: '“'; margin-right: 0.05em; }
  blockquote.line::after  { content: '”'; margin-left: 0.05em; }
  blockquote.line .technique-meta {
    display: block;
    font-family: 'IBM Plex Mono', monospace;
    font-style: normal;
    font-size: 0.72rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--pencil);
    margin-top: 0.7rem;
  }
  blockquote.line .technique-meta::before { content: '— '; opacity: 0.5; }
  blockquote.line.loading {
    color: var(--pencil);
    font-style: italic;
    opacity: 0.6;
  }
  blockquote.line.loading::before, blockquote.line.loading::after { content: ''; }
  blockquote.line.error { color: var(--ink-2); }

  /* type-in animation */
  .typing {
    display: inline-block;
  }
  .typing .char {
    opacity: 0;
    animation: charIn 0.5s ease-out forwards;
  }
  @keyframes charIn { to { opacity: 1; } }

  /* ── ACTIONS ────────────────────────────────────────────────── */
  .actions {
    margin: 1.6rem auto 0;
    display: flex;
    gap: 0.6rem;
    justify-content: center;
    flex-wrap: wrap;
  }
  .actions button {
    appearance: none;
    background: transparent;
    border: 1px solid var(--ink);
    color: var(--ink);
    font-family: 'Caveat', cursive;
    font-size: 1.15rem;
    padding: 0.32rem 1rem 0.4rem;
    border-radius: 999px;
    cursor: pointer;
    transition: background 0.12s, color 0.12s, transform 0.06s;
    letter-spacing: 0.01em;
  }
  .actions button:hover { background: var(--ink); color: var(--paper); }
  .actions button:active { transform: translateY(1px); }
  .actions button.saved { background: var(--ink); color: var(--paper); }
  .actions button:disabled { opacity: 0.4; cursor: not-allowed; }

  /* ── SAVED ──────────────────────────────────────────────────── */
  .saved {
    margin: 3.5rem auto 0;
    max-width: 600px;
    border-top: 1px dashed var(--rule);
    padding-top: 1.4rem;
  }
  .saved h2 {
    font-family: 'Caveat', cursive;
    font-size: 1.8rem;
    color: var(--ink);
    margin-bottom: 0.5rem;
    text-align: center;
    transform: rotate(-0.8deg);
  }
  .saved .count {
    text-align: center;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--pencil);
    margin-bottom: 1rem;
  }
  .saved ul {
    list-style: none;
    padding: 0;
  }
  .saved li {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 1.08rem;
    line-height: 1.4;
    color: var(--ink);
    padding: 0.5rem 0.4rem;
    border-bottom: 1px dashed var(--rule);
    display: flex;
    gap: 0.6rem;
    align-items: baseline;
  }
  .saved li:hover { background: rgba(24,19,13,0.02); }
  .saved li .quote { flex: 1; }
  .saved li .meta {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.65rem;
    letter-spacing: 0.14em;
    color: var(--pencil);
    text-transform: uppercase;
    font-style: normal;
    white-space: nowrap;
  }
  .saved li .x {
    color: var(--pencil);
    cursor: pointer;
    padding: 0 0.3em;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.85rem;
  }
  .saved li .x:hover { color: var(--ink); }
  .saved .empty {
    text-align: center;
    color: var(--pencil);
    font-family: 'Caveat', cursive;
    font-size: 1.3rem;
    padding: 0.6rem;
  }

  footer.foot {
    text-align: center;
    margin-top: 2.6rem;
    font-family: 'Caveat', cursive;
    color: var(--pencil);
    font-size: 1.1rem;
  }
  footer.foot .heart { color: var(--ink); }

  @media (max-width: 540px) {
    .composer { grid-template-columns: 1fr; }
    .composer button.go { width: 100%; padding: 0.5rem; }
    .lulu-art { width: 200px; height: 220px; }
    blockquote.line { font-size: 1.4rem; }
  }
</style>
</head>
<body>
<main class="wrap">
  <header class="brand">
    <h1 class="logo">lulu</h1>
    <div class="strap">tells the joke <span class="dot">·</span> draws herself <span class="dot">·</span> ink only</div>
  </header>

  <form class="composer" id="composer" onsubmit="return false;">
    <input type="text" id="topicInput" maxlength="120" autocomplete="off"
           placeholder="type a topic and Lulu will think of something…" />
    <button class="go" id="goBtn" type="submit">→ think</button>
  </form>

  <div class="technique-row" id="techRow">
    <span class="lbl">technique</span>
  </div>

  <article class="card">
    <div class="lulu-art" id="luluArt"></div>
    <div class="line-wrap">
      <blockquote class="line loading" id="lineEl">
        <span class="line-text">type a topic — anything. Lulu will draw and think.</span>
        <span class="technique-meta" id="techMeta"></span>
      </blockquote>
    </div>
    <div class="actions">
      <button id="anotherBtn" type="button">↻ another</button>
      <button id="saveBtn" type="button">♡ save</button>
      <button id="copyBtn" type="button">📋 copy</button>
    </div>
  </article>

  <section class="saved">
    <h2>kept thoughts</h2>
    <div class="count" id="savedCount">0 saved</div>
    <ul id="savedList">
      <li class="empty">save a line and it'll live here, just for you.</li>
    </ul>
  </section>

  <footer class="foot">drawn in ink <span class="heart">♥</span></footer>
</main>

<script>
'use strict';

// ════════════════════════════════════════════════════════════════════════
// LULU — minimalist one-liner app. Each technique pairs with a hand-
// drawn SVG pose. User types a topic, picks a technique (or RANDOM),
// hits THINK. Pollinations text API (jsonMode) returns { line, technique }
// matching the requested comedic style. The SVG draws in over 1.4s while
// the line types in character-by-character below. Saved lines persist
// to localStorage.
// ════════════════════════════════════════════════════════════════════════

const $ = (id) => document.getElementById(id);

// ── COMEDY TECHNIQUES ──────────────────────────────────────────────────
const TECHNIQUES = [
  { id: 'random',  label: 'random',
    hint: 'pick the technique yourself — surprise me' },
  { id: 'obs',     label: 'observation',
    hint: 'observational humor in the style of Seinfeld — point out something everyone notices but never says' },
  { id: 'pun',     label: 'pun',
    hint: 'wordplay or pun — clever double meaning, owns the groan' },
  { id: 'absurd',  label: 'absurdist',
    hint: 'absurdist non-sequitur in the style of Mitch Hedberg — surreal logic stated calmly' },
  { id: 'sd',      label: 'self-deprecating',
    hint: 'self-deprecating — turn the punchline back on the narrator' },
  { id: 'misdir',  label: 'misdirection',
    hint: 'paraprosdokian — setup leads one way, last few words flip it sharply' },
  { id: 'anti',    label: 'anti-joke',
    hint: 'anti-joke — deliberately subverts the expectation of being funny, deadpan' },
];

let activeTechnique = 'random';

// ── HAND-DRAWN SVG POSES ───────────────────────────────────────────────
// 7 poses, one per technique (random uses any). All viewBox 0 0 200 220
// for consistent framing. Single-stroke style with .stroke + .dot classes.
const POSES = {
  obs: `<svg viewBox="0 0 200 220" aria-hidden="true">
    <!-- standing, hand to chin, observing -->
    <path class="stroke" d="M82 38 q-4 -14 6 -22 q12 -10 26 -2 q14 8 8 28 q-2 8 -6 12 q-6 6 -16 6 q-12 0 -18 -8 q-4 -6 0 -14 Z"/>
    <!-- hair tufts -->
    <path class="stroke thin" d="M82 30 q-2 -8 6 -14 M118 32 q4 -6 10 -10"/>
    <circle class="dot" cx="92" cy="50" r="1.4"/>
    <circle class="dot" cx="108" cy="50" r="1.4"/>
    <path class="stroke thin" d="M98 60 q4 3 8 0"/>
    <!-- neck + body curve -->
    <path class="stroke" d="M100 70 q-2 12 -6 24 q-6 22 -2 50 q4 24 0 50"/>
    <!-- left arm bent up to chin -->
    <path class="stroke" d="M96 96 q-14 8 -8 22 q4 8 14 4"/>
    <!-- right arm down -->
    <path class="stroke" d="M104 96 q12 16 6 38"/>
    <!-- skirt -->
    <path class="stroke" d="M86 144 q14 4 28 -2"/>
    <!-- legs -->
    <path class="stroke" d="M96 146 q-2 28 -4 56"/>
    <path class="stroke" d="M104 146 q4 26 8 56"/>
    <!-- ground line -->
    <path class="stroke lighter" d="M70 206 q34 4 70 -2"/>
  </svg>`,

  pun: `<svg viewBox="0 0 200 220" aria-hidden="true">
    <!-- finger gun pose, winking -->
    <path class="stroke" d="M82 40 q-4 -14 6 -22 q12 -10 26 -2 q14 8 8 28 q-2 8 -6 12 q-6 6 -16 6 q-12 0 -18 -8 q-4 -6 0 -14 Z"/>
    <path class="stroke thin" d="M80 30 q4 -6 12 -10 M118 30 q2 -6 8 -8"/>
    <!-- wink (closed left eye) + open right -->
    <path class="stroke thin" d="M88 50 q4 -2 8 0"/>
    <circle class="dot" cx="108" cy="50" r="1.4"/>
    <!-- smirk -->
    <path class="stroke thin" d="M96 60 q6 5 12 -2"/>
    <path class="stroke" d="M100 70 q-2 14 -6 28 q-4 22 0 48 q2 22 -2 48"/>
    <!-- right arm out, finger pointing as 'gun' -->
    <path class="stroke" d="M104 96 q22 -6 32 -2"/>
    <path class="stroke thin" d="M136 96 q4 -2 10 0 M136 96 q4 4 8 8"/>
    <!-- left arm down -->
    <path class="stroke" d="M96 100 q-10 16 -4 40"/>
    <path class="stroke" d="M86 142 q14 4 30 -2"/>
    <path class="stroke" d="M96 144 q-4 26 -6 54"/>
    <path class="stroke" d="M104 146 q4 26 8 54"/>
    <path class="stroke lighter" d="M70 206 q34 4 70 -2"/>
  </svg>`,

  absurd: `<svg viewBox="0 0 200 220" aria-hidden="true">
    <!-- upside down, sort of -->
    <path class="stroke" d="M82 180 q-4 14 6 22 q12 10 26 2 q14 -8 8 -28 q-2 -8 -6 -12 q-6 -6 -16 -6 q-12 0 -18 8 q-4 6 0 14 Z"/>
    <!-- hair dangling down -->
    <path class="stroke thin" d="M82 196 q-4 12 0 24 M118 196 q6 8 12 22"/>
    <circle class="dot" cx="92" cy="174" r="1.4"/>
    <circle class="dot" cx="108" cy="174" r="1.4"/>
    <!-- mouth (upside-down so still smiling-ish) -->
    <path class="stroke thin" d="M96 164 q5 -3 10 1"/>
    <!-- inverted body going UP -->
    <path class="stroke" d="M100 152 q-3 -16 -2 -34 q-2 -18 4 -36 q4 -16 0 -36"/>
    <!-- arms dangling (which is up here) -->
    <path class="stroke" d="M94 132 q-12 -10 -14 -28"/>
    <path class="stroke" d="M106 132 q14 -8 16 -28"/>
    <!-- legs going up to top (which is down) -->
    <path class="stroke" d="M98 80 q-4 -22 -6 -42"/>
    <path class="stroke" d="M104 80 q6 -22 10 -42"/>
    <!-- ground at top -->
    <path class="stroke lighter" d="M64 36 q36 -4 70 2"/>
  </svg>`,

  sd: `<svg viewBox="0 0 200 220" aria-hidden="true">
    <!-- slumped sitting, shoulders forward -->
    <path class="stroke" d="M82 38 q-4 -14 6 -22 q12 -10 26 -2 q14 8 8 28 q-2 8 -6 12 q-6 6 -16 6 q-12 0 -18 -8 q-4 -6 0 -14 Z"/>
    <path class="stroke thin" d="M84 28 q6 -8 14 -10 M120 30 q-2 -6 4 -8"/>
    <!-- droopy eyes -->
    <path class="stroke thin" d="M88 52 q4 1 8 0 M104 52 q4 1 8 0"/>
    <path class="stroke thin" d="M96 62 q4 -2 8 0"/>
    <!-- slumped body -->
    <path class="stroke" d="M98 72 q-12 14 -16 30 q-6 18 0 36"/>
    <!-- arms wrapped/crossed -->
    <path class="stroke" d="M92 96 q14 18 28 8"/>
    <path class="stroke" d="M108 96 q-14 18 -22 14"/>
    <!-- sitting body widens -->
    <path class="stroke" d="M82 134 q22 6 44 -2"/>
    <!-- legs folded sitting cross-legged -->
    <path class="stroke" d="M82 138 q-8 26 18 38 q26 8 32 -22"/>
    <!-- sigh swirl above head -->
    <path class="stroke lighter" d="M130 24 q8 -4 10 4 q-2 6 -8 4"/>
    <path class="stroke lighter" d="M70 206 q34 4 70 -2"/>
  </svg>`,

  misdir: `<svg viewBox="0 0 200 220" aria-hidden="true">
    <!-- looking left, pointing right (misdirection) -->
    <path class="stroke" d="M82 38 q-6 -14 4 -22 q12 -10 26 -2 q14 8 10 28 q-2 8 -6 12 q-6 6 -16 6 q-12 0 -18 -8 q-4 -6 0 -14 Z"/>
    <path class="stroke thin" d="M84 28 q-2 -8 8 -12 M118 32 q4 -6 12 -8"/>
    <!-- eyes glance left -->
    <circle class="dot" cx="88" cy="50" r="1.4"/>
    <circle class="dot" cx="104" cy="50" r="1.4"/>
    <path class="stroke thin" d="M96 60 q4 2 8 0"/>
    <!-- straight body -->
    <path class="stroke" d="M100 70 q-2 12 -4 24 q-4 22 0 50 q2 22 -2 50"/>
    <!-- right arm pointing far right -->
    <path class="stroke" d="M104 100 q30 -6 50 4"/>
    <path class="stroke thin" d="M154 104 q6 -2 10 2 M154 104 q4 4 6 8"/>
    <!-- left arm hidden behind body -->
    <path class="stroke" d="M96 100 q-10 18 -4 38"/>
    <path class="stroke" d="M86 142 q14 4 30 -2"/>
    <path class="stroke" d="M96 144 q-2 28 -4 56"/>
    <path class="stroke" d="M104 146 q4 26 8 56"/>
    <path class="stroke lighter" d="M70 206 q34 4 70 -2"/>
  </svg>`,

  anti: `<svg viewBox="0 0 200 220" aria-hidden="true">
    <!-- deadpan stare straight ahead -->
    <path class="stroke" d="M82 38 q-4 -14 6 -22 q12 -10 26 -2 q14 8 8 28 q-2 8 -6 12 q-6 6 -16 6 q-12 0 -18 -8 q-4 -6 0 -14 Z"/>
    <path class="stroke thin" d="M84 28 q4 -6 12 -8 M118 32 q4 -6 10 -10"/>
    <!-- two flat-line eyes -->
    <path class="stroke thin" d="M88 50 q4 0 8 0"/>
    <path class="stroke thin" d="M104 50 q4 0 8 0"/>
    <!-- straight mouth -->
    <path class="stroke thin" d="M96 62 l8 0"/>
    <!-- arms straight at sides -->
    <path class="stroke" d="M100 70 q-2 14 -6 28 q-4 22 0 50 q2 22 -2 50"/>
    <path class="stroke" d="M94 96 q-6 24 -2 46"/>
    <path class="stroke" d="M106 96 q6 24 2 46"/>
    <path class="stroke" d="M86 142 q14 4 30 -2"/>
    <path class="stroke" d="M96 144 q-2 28 -4 56"/>
    <path class="stroke" d="M104 146 q4 26 8 56"/>
    <path class="stroke lighter" d="M70 206 q34 4 70 -2"/>
  </svg>`,
};

// Default fallback pose used when 'random' picks something we don't have
function getPose(id){ return POSES[id] || POSES.obs; }

// ── BUILD TECHNIQUE CHIPS ──────────────────────────────────────────────
function buildChips(){
  const row = $('techRow');
  for (const t of TECHNIQUES){
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'chip' + (t.id === activeTechnique ? ' active' : '');
    b.dataset.id = t.id;
    b.textContent = t.label;
    b.addEventListener('click', () => {
      activeTechnique = t.id;
      row.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.id === activeTechnique));
    });
    row.appendChild(b);
  }
}
buildChips();

// ── POLLINATIONS FETCH ─────────────────────────────────────────────────
async function fetchLine(topic, techniqueId){
  // resolve random
  let t = techniqueId === 'random'
    ? TECHNIQUES[Math.floor(Math.random() * (TECHNIQUES.length - 1)) + 1]
    : (TECHNIQUES.find(x => x.id === techniqueId) || TECHNIQUES[1]);
  const sysPrompt = [
    'You are Lulu, a quiet observational humorist with a sharp pen.',
    'You write ONE single-line joke per response. The line must be:',
    '  - exactly ONE sentence',
    '  - at most 140 characters',
    '  - witty and specific — never crude, never sweary',
    '  - in the style of the requested TECHNIQUE',
    'Reply with JSON ONLY, no prose, no fences:',
    '  { "line": "single sentence", "technique": "' + t.id + '" }',
  ].join('\n');
  const userPrompt = [
    'topic: ' + topic,
    'technique: ' + t.label + ' — ' + t.hint,
    'Write a sharp one-liner about the topic using this technique. JSON only.',
  ].join('\n');

  const ctrl = new AbortController();
  const tId = setTimeout(() => ctrl.abort(), 12000);
  try {
    const res = await fetch('https://text.pollinations.ai/openai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'openai',
        messages: [
          { role: 'system', content: sysPrompt },
          { role: 'user',   content: userPrompt },
        ],
      }),
      signal: ctrl.signal,
    });
    clearTimeout(tId);
    const text = await res.text();
    const parsed = extractJson(text);
    if (parsed && parsed.line){
      return { line: String(parsed.line).slice(0, 200).trim(), technique: t };
    }
    // fallback if the model returned plain text
    const plain = (text || '').replace(/```[\s\S]*?```/g, '').trim();
    if (plain && plain.length < 240 && !plain.startsWith('{')){
      return { line: plain.replace(/^["'`]|["'`]$/g, ''), technique: t };
    }
  } catch (e){
    clearTimeout(tId);
    console.warn('pollinations error', e);
  }
  // local fallback
  return { line: localFallback(topic, t), technique: t };
}

function localFallback(topic, t){
  // small canned table — used when pollinations is unreachable
  const stubs = {
    obs:    'You ever notice ' + topic + " is just three weird decisions in a trench coat?",
    pun:    "I told a joke about " + topic + " — it didn't land, but neither does anything in life.",
    absurd: topic + ' is mostly water. So am I. We are basically the same animal.',
    sd:     "I'd say I have strong opinions on " + topic + ', but I don\'t trust me.',
    misdir: 'My favorite thing about ' + topic + " is that I don't have to think about it — until I do.",
    anti:   topic + ' exists. That is the joke.',
  };
  return stubs[t.id] || stubs.obs;
}

function extractJson(text){
  try {
    const o = JSON.parse(text);
    if (o.choices && o.choices[0] && o.choices[0].message){
      const inner = o.choices[0].message.content;
      try { return JSON.parse(inner); } catch(e){}
      const m = inner.match(/\{[\s\S]*\}/);
      if (m){ try { return JSON.parse(m[0]); } catch(e){} }
      return { line: String(inner).trim() };
    }
    if (typeof o === 'object') return o;
  } catch(e){}
  const stripped = (text || '').replace(/```(?:json)?/g, '').trim();
  try { return JSON.parse(stripped); } catch(e){}
  const m = stripped.match(/\{[\s\S]*\}/);
  if (m){ try { return JSON.parse(m[0]); } catch(e){} }
  return null;
}

// ── RENDER ─────────────────────────────────────────────────────────────
let currentLine = null;     // { line, technique, topic }
let currentRequestId = 0;

async function think(){
  const topic = $('topicInput').value.trim();
  if (!topic){
    flashInput();
    return;
  }
  const reqId = ++currentRequestId;
  $('goBtn').disabled = true;
  $('goBtn').textContent = '…';
  $('saveBtn').classList.remove('saved');

  // immediately swap the pose to match (random -> random pose)
  const targetTechId = activeTechnique === 'random'
    ? TECHNIQUES[Math.floor(Math.random() * (TECHNIQUES.length - 1)) + 1].id
    : activeTechnique;
  drawPose(targetTechId);

  // show loading state
  const lineEl = $('lineEl');
  lineEl.classList.add('loading');
  lineEl.classList.remove('error');
  lineEl.querySelector('.line-text').textContent = 'thinking about ' + topic + '…';
  $('techMeta').textContent = '';

  const result = await fetchLine(topic, activeTechnique);
  // ignore stale responses (user already hit Think again)
  if (reqId !== currentRequestId) return;

  currentLine = { line: result.line, technique: result.technique, topic };

  // type the line in
  lineEl.classList.remove('loading');
  typeLine(result.line);
  $('techMeta').textContent = result.technique.label;

  // restore button
  $('goBtn').disabled = false;
  $('goBtn').textContent = '→ think';
}

function drawPose(techId){
  const art = $('luluArt');
  art.classList.remove('drawing');
  art.innerHTML = getPose(techId);
  // force reflow so the animation restarts
  void art.offsetWidth;
  art.classList.add('drawing');
}

function typeLine(text){
  const target = $('lineEl').querySelector('.line-text');
  target.innerHTML = '';
  const safe = (text || '').slice(0, 240);
  for (let i = 0; i < safe.length; i++){
    const span = document.createElement('span');
    span.className = 'char';
    span.style.animationDelay = (i * 18) + 'ms';
    span.textContent = safe[i];
    target.appendChild(span);
  }
}

function flashInput(){
  const input = $('topicInput');
  input.style.borderBottomColor = '#a55';
  input.placeholder = 'tell me what to think about first…';
  setTimeout(() => {
    input.style.borderBottomColor = '';
    input.placeholder = 'type a topic and Lulu will think of something…';
  }, 1600);
  input.focus();
}

// ── WIRING ─────────────────────────────────────────────────────────────
$('composer').addEventListener('submit', (e) => { e.preventDefault(); think(); });
$('goBtn').addEventListener('click', () => think());
$('anotherBtn').addEventListener('click', () => {
  if (!$('topicInput').value.trim() && currentLine) $('topicInput').value = currentLine.topic;
  think();
});
$('saveBtn').addEventListener('click', () => {
  if (!currentLine) return;
  const dup = saved.findIndex(s => s.line === currentLine.line);
  if (dup >= 0){
    saved.splice(dup, 1);
    $('saveBtn').classList.remove('saved');
    $('saveBtn').textContent = '♡ save';
  } else {
    saved.unshift({ ...currentLine, _ts: Date.now() });
    if (saved.length > 80) saved = saved.slice(0, 80);
    $('saveBtn').classList.add('saved');
    $('saveBtn').textContent = '♥ saved';
  }
  persistSaved();
  renderSaved();
});
$('copyBtn').addEventListener('click', () => {
  if (!currentLine) return;
  const txt = '"' + currentLine.line + '" — Lulu (' + currentLine.technique.label + ')';
  navigator.clipboard.writeText(txt).then(() => {
    const b = $('copyBtn');
    const old = b.textContent;
    b.textContent = '✓ copied';
    setTimeout(() => { b.textContent = old; }, 1300);
  }).catch(() => {});
});

// ── SAVED LIST ─────────────────────────────────────────────────────────
let saved = [];
try { saved = JSON.parse(localStorage.getItem('lulu-saved-v1') || '[]'); } catch(e){ saved = []; }
function persistSaved(){
  try { localStorage.setItem('lulu-saved-v1', JSON.stringify(saved)); } catch(e){}
}
function renderSaved(){
  const list = $('savedList');
  const count = $('savedCount');
  count.textContent = saved.length + ' saved';
  if (!saved.length){
    list.innerHTML = '<li class="empty">save a line and it&rsquo;ll live here, just for you.</li>';
    return;
  }
  list.innerHTML = '';
  for (const s of saved){
    const li = document.createElement('li');
    const techLabel = s.technique && s.technique.label ? s.technique.label : 'unknown';
    li.innerHTML = `
      <span class="quote">&ldquo;${esc(s.line)}&rdquo;</span>
      <span class="meta">${esc(techLabel)}</span>
      <span class="x" title="forget">✕</span>
    `;
    li.querySelector('.x').addEventListener('click', () => {
      saved = saved.filter(x => x.line !== s.line);
      persistSaved();
      renderSaved();
    });
    li.addEventListener('click', (e) => {
      if (e.target.classList.contains('x')) return;
      currentLine = { line: s.line, technique: s.technique || { id: 'obs', label: techLabel }, topic: s.topic || '—' };
      drawPose((s.technique && s.technique.id) || 'obs');
      typeLine(s.line);
      $('techMeta').textContent = techLabel;
      $('saveBtn').classList.add('saved');
      $('saveBtn').textContent = '♥ saved';
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
    list.appendChild(li);
  }
}
renderSaved();

function esc(s){ const d = document.createElement('div'); d.textContent = s == null ? '' : String(s); return d.innerHTML; }

// boot — draw a default pose for first visit so the page isn't empty
drawPose('obs');
</script>
