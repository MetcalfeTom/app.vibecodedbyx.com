<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Glitch Canvas</title>
  <link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%92%BE">
  <meta name="description" content="A painterly canvas where every brush is a corrupted texture — datamosh, scanlines, pixel sort and more.">
  <meta property="og:title" content="Glitch Canvas">
  <meta property="og:description" content="Paint with corrupted pixel textures. Datamosh, scanlines, pixel-sort, chromatic aberration — export your glitch art as PNG.">
  <meta property="og:url" content="https://sloppy.live/glitch-canvas">
  <meta property="og:image" content="https://image.pollinations.ai/prompt/glitch%20art%20datamosh%20chromatic%20aberration%20corrupted%20pixels%20neon%20magenta%20cyan%20black%20CRT?width=1200&height=630&nologo=true">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Silkscreen:wght@400;700&family=JetBrains+Mono:wght@300;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-0: #000000;
      --bg-1: #0a0012;
      --ink: #e8ffea;
      --muted: rgba(232, 255, 234, 0.5);
      --mag: #ff2ea6;
      --cyan: #00f0ff;
      --lime: #a7ff3f;
      --amber: #ffcb36;
      --line: rgba(232, 255, 234, 0.14);
      --panel: rgba(10, 0, 18, 0.82);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      color: var(--ink);
      background:
        repeating-linear-gradient(0deg, rgba(255, 46, 166, 0.04) 0 1px, transparent 1px 3px),
        radial-gradient(ellipse at 50% 100%, rgba(0, 240, 255, 0.09), transparent 60%),
        linear-gradient(180deg, var(--bg-0), var(--bg-1));
      min-height: 100vh;
      -webkit-user-select: none;
      user-select: none;
    }
    #app {
      position: fixed; inset: 0;
      display: grid;
      grid-template-columns: 260px minmax(0, 1fr);
      grid-template-rows: auto 1fr;
    }
    header {
      grid-column: 1 / -1;
      padding: 14px 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      backdrop-filter: blur(8px);
      z-index: 5;
      flex-wrap: wrap;
    }
    h1 {
      font-family: 'Major Mono Display', monospace;
      font-weight: 400;
      font-size: clamp(22px, 2.4vw, 30px);
      letter-spacing: 0.04em;
      line-height: 1;
      color: var(--mag);
      text-shadow:
        1px 0 0 var(--cyan),
        -1px 0 0 var(--lime),
        0 0 18px rgba(255, 46, 166, 0.55);
      position: relative;
    }
    h1::after {
      content: '_';
      color: var(--lime);
      animation: blink 1s steps(1) infinite;
    }
    @keyframes blink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
    .sub {
      font-family: 'Silkscreen', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
    }
    .actions { display: flex; gap: 8px; flex-wrap: wrap; }
    .btn {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      background: rgba(232, 255, 234, 0.04);
      color: var(--ink);
      border: 1px solid var(--line);
      padding: 8px 14px;
      cursor: pointer;
      transition: all 0.15s ease;
    }
    .btn:hover { border-color: var(--mag); box-shadow: 0 0 12px rgba(255, 46, 166, 0.3); }
    .btn.alt { color: var(--cyan); border-color: rgba(0, 240, 255, 0.35); }
    .btn.alt:hover { border-color: var(--cyan); box-shadow: 0 0 14px rgba(0, 240, 255, 0.4); }
    .btn.danger { color: var(--mag); border-color: rgba(255, 46, 166, 0.35); }

    aside {
      background: var(--panel);
      border-right: 1px solid var(--line);
      padding: 16px 14px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 18px;
      z-index: 4;
    }
    aside::-webkit-scrollbar { width: 6px; }
    aside::-webkit-scrollbar-thumb { background: rgba(232, 255, 234, 0.15); }

    .section .label {
      font-family: 'Silkscreen', monospace;
      font-size: 10px;
      letter-spacing: 0.25em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
      display: block;
    }
    .brush-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 6px;
    }
    .brush {
      position: relative;
      aspect-ratio: 1.15 / 1;
      border: 1px solid var(--line);
      background: #000;
      cursor: pointer;
      overflow: hidden;
      transition: all 0.15s ease;
    }
    .brush canvas { width: 100%; height: 100%; display: block; image-rendering: pixelated; }
    .brush .name {
      position: absolute;
      bottom: 2px; left: 0; right: 0;
      font-family: 'Silkscreen', monospace;
      font-size: 8px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      text-align: center;
      color: var(--ink);
      background: rgba(0, 0, 0, 0.6);
      padding: 2px 0;
    }
    .brush.active {
      border-color: var(--mag);
      box-shadow: 0 0 12px rgba(255, 46, 166, 0.45), inset 0 0 20px rgba(255, 46, 166, 0.12);
    }
    .brush.active .name { color: var(--mag); }

    .swatches {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 4px;
    }
    .swatch {
      aspect-ratio: 1;
      border: 1px solid transparent;
      cursor: pointer;
      position: relative;
    }
    .swatch.active {
      border-color: var(--ink);
      box-shadow: 0 0 0 2px rgba(0, 0, 0, 0.8), 0 0 10px currentColor;
    }

    .slider-row { display: flex; align-items: center; gap: 8px; }
    .slider-row .label { margin-bottom: 0; flex: 1; }
    .slider-row .val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      color: var(--cyan);
      min-width: 30px;
      text-align: right;
    }
    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 3px;
      background: var(--line);
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 12px; height: 12px;
      background: var(--mag);
      border: 1px solid #000;
      cursor: pointer;
      box-shadow: 0 0 8px var(--mag);
    }
    input[type="range"]::-moz-range-thumb {
      width: 12px; height: 12px;
      background: var(--mag);
      border: 1px solid #000;
      cursor: pointer;
      box-shadow: 0 0 8px var(--mag);
    }

    #stage {
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        repeating-linear-gradient(45deg, rgba(255, 255, 255, 0.02) 0 10px, transparent 10px 20px),
        linear-gradient(135deg, #0a0012, #1a0028);
    }
    #canvasHost {
      position: relative;
      box-shadow:
        0 0 0 1px rgba(232, 255, 234, 0.1),
        0 0 28px rgba(255, 46, 166, 0.25),
        0 20px 60px rgba(0, 0, 0, 0.6);
    }
    canvas#paper {
      display: block;
      image-rendering: pixelated;
      background: #000;
      cursor: crosshair;
    }
    .scanline-overlay {
      position: absolute; inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        0deg,
        rgba(255, 255, 255, 0.03) 0 1px,
        transparent 1px 3px);
      mix-blend-mode: overlay;
    }
    .cursor-ring {
      position: absolute;
      pointer-events: none;
      border: 1px solid rgba(255, 46, 166, 0.8);
      border-radius: 0;
      transform: translate(-50%, -50%);
      box-shadow: 0 0 10px rgba(255, 46, 166, 0.4);
      mix-blend-mode: difference;
      z-index: 10;
    }
    .status {
      position: absolute;
      bottom: 10px; left: 14px;
      font-family: 'Silkscreen', monospace;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      pointer-events: none;
    }

    @media (max-width: 820px) {
      #app { grid-template-columns: 1fr; grid-template-rows: auto auto 1fr; }
      aside { border-right: 0; border-bottom: 1px solid var(--line); max-height: 40vh; }
      .brush-grid { grid-template-columns: repeat(4, 1fr); }
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div>
        <h1>GL1TCH CANVAS</h1>
        <div class="sub">paint with broken data</div>
      </div>
      <div class="actions">
        <button class="btn" id="undoBtn">↶ Undo</button>
        <button class="btn alt" id="saveBtn">⬇ Save PNG</button>
        <button class="btn danger" id="clearBtn">✕ Wipe</button>
      </div>
    </header>

    <aside>
      <div class="section">
        <span class="label">brush</span>
        <div class="brush-grid" id="brushGrid"></div>
      </div>

      <div class="section">
        <span class="label">palette</span>
        <div class="swatches" id="swatches"></div>
      </div>

      <div class="section">
        <div class="slider-row">
          <span class="label">size</span>
          <span class="val" id="sizeVal">60</span>
        </div>
        <input type="range" id="sizeSlider" min="16" max="200" value="60">
      </div>

      <div class="section">
        <div class="slider-row">
          <span class="label">chaos</span>
          <span class="val" id="chaosVal">0.6</span>
        </div>
        <input type="range" id="chaosSlider" min="0" max="100" value="60">
      </div>

      <div class="section">
        <div class="slider-row">
          <span class="label">spacing</span>
          <span class="val" id="spaceVal">10</span>
        </div>
        <input type="range" id="spaceSlider" min="1" max="40" value="10">
      </div>

      <div class="section">
        <span class="label">canvas bg</span>
        <div class="actions" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:4px;">
          <button class="btn" data-bg="black" style="padding:6px 4px; font-size:10px;">BLACK</button>
          <button class="btn" data-bg="white" style="padding:6px 4px; font-size:10px;">WHITE</button>
          <button class="btn" data-bg="noise" style="padding:6px 4px; font-size:10px;">NOISE</button>
        </div>
      </div>
    </aside>

    <div id="stage">
      <div id="canvasHost">
        <canvas id="paper"></canvas>
        <div class="scanline-overlay"></div>
      </div>
      <div class="cursor-ring" id="cursor" style="display:none"></div>
      <div class="status" id="status">pointer:— | brush:datamosh</div>
    </div>
  </div>

<script>
(() => {
  const paper = document.getElementById('paper');
  const host = document.getElementById('canvasHost');
  const stage = document.getElementById('stage');
  const pctx = paper.getContext('2d', { willReadFrequently: true });
  const brushGrid = document.getElementById('brushGrid');
  const swatchesEl = document.getElementById('swatches');
  const sizeSlider = document.getElementById('sizeSlider');
  const sizeVal = document.getElementById('sizeVal');
  const chaosSlider = document.getElementById('chaosSlider');
  const chaosVal = document.getElementById('chaosVal');
  const spaceSlider = document.getElementById('spaceSlider');
  const spaceVal = document.getElementById('spaceVal');
  const cursor = document.getElementById('cursor');
  const status = document.getElementById('status');
  const undoBtn = document.getElementById('undoBtn');
  const saveBtn = document.getElementById('saveBtn');
  const clearBtn = document.getElementById('clearBtn');

  const PALETTE = [
    '#000000', '#ffffff', '#ff2ea6', '#00f0ff',
    '#a7ff3f', '#ffcb36', '#ff7043', '#b84dff',
    '#00ff88', '#ff3366', '#9effff', '#2effac',
  ];

  // ---- State ----
  const state = {
    brush: 'datamosh',
    color: '#ff2ea6',
    size: 60,
    chaos: 0.6,
    spacing: 10,
    bg: 'black',
    drawing: false,
    lastX: -999, lastY: -999,
    distAccum: 0,
    undo: [],
    MAX_UNDO: 6,
    rngSeed: Math.random() * 1e9 | 0,
  };

  // ---- Canvas sizing ----
  function fitCanvas() {
    const sr = stage.getBoundingClientRect();
    const pad = 20;
    const maxW = sr.width - pad * 2;
    const maxH = sr.height - pad * 2;
    // keep a decent pixel density
    const ratio = 4 / 3;
    let w = Math.min(maxW, Math.floor(maxH * ratio));
    let h = Math.floor(w / ratio);
    if (h > maxH) { h = maxH; w = Math.floor(h * ratio); }
    // actual canvas buffer at 2× of display for sharpness but still chunky
    const bufW = Math.min(1200, Math.floor(w));
    const bufH = Math.min(900, Math.floor(h));
    if (paper.width !== bufW || paper.height !== bufH) {
      // preserve current content
      const off = document.createElement('canvas');
      off.width = paper.width; off.height = paper.height;
      if (paper.width) off.getContext('2d').drawImage(paper, 0, 0);
      paper.width = bufW;
      paper.height = bufH;
      paintBackground();
      pctx.drawImage(off, 0, 0, bufW, bufH);
    }
    paper.style.width = w + 'px';
    paper.style.height = h + 'px';
    host.style.width = w + 'px';
    host.style.height = h + 'px';
  }
  window.addEventListener('resize', fitCanvas);

  function paintBackground() {
    if (state.bg === 'black') {
      pctx.fillStyle = '#000'; pctx.fillRect(0, 0, paper.width, paper.height);
    } else if (state.bg === 'white') {
      pctx.fillStyle = '#f6f6f6'; pctx.fillRect(0, 0, paper.width, paper.height);
    } else {
      // noise
      const img = pctx.createImageData(paper.width, paper.height);
      const d = img.data;
      for (let i = 0; i < d.length; i += 4) {
        const v = 10 + (Math.random() * 40) | 0;
        d[i] = v; d[i + 1] = v; d[i + 2] = v; d[i + 3] = 255;
      }
      pctx.putImageData(img, 0, 0);
    }
  }

  function pushUndo() {
    try {
      state.undo.push(pctx.getImageData(0, 0, paper.width, paper.height));
      if (state.undo.length > state.MAX_UNDO) state.undo.shift();
    } catch (_) {}
  }
  function popUndo() {
    const d = state.undo.pop();
    if (d) pctx.putImageData(d, 0, 0);
  }

  // ---- Brushes ----
  // Each brush stamps a roughly `size`×`size` corrupted texture centered at x, y.
  // They draw directly onto pctx. Use small offscreen ImageData for fast pixel ops.

  function hexToRgb(hex) {
    const h = hex.replace('#', '');
    return [
      parseInt(h.substring(0, 2), 16),
      parseInt(h.substring(2, 4), 16),
      parseInt(h.substring(4, 6), 16),
    ];
  }

  function mix(c1, c2, t) {
    return [c1[0] + (c2[0] - c1[0]) * t, c1[1] + (c2[1] - c1[1]) * t, c1[2] + (c2[2] - c1[2]) * t];
  }

  const brushes = {
    datamosh: {
      name: 'DATAMOSH',
      stamp(x, y, size, chaos, color) {
        const half = size / 2;
        const rgb = hexToRgb(color);
        const strips = 6 + Math.floor(chaos * 14);
        for (let i = 0; i < strips; i++) {
          const sy = y - half + Math.random() * size;
          const sh = 2 + Math.random() * (size / 3);
          const sx = x - half + (Math.random() - 0.5) * size * 0.4;
          const sw = (0.6 + Math.random() * 0.5) * size * (0.6 + chaos);
          const off = (Math.random() - 0.5) * size * chaos;
          const channel = Math.floor(Math.random() * 3);
          const c = [0, 0, 0];
          c[channel] = rgb[channel];
          c[(channel + 1) % 3] = Math.random() < 0.5 ? rgb[(channel + 1) % 3] : 0;
          pctx.fillStyle = `rgba(${c[0]|0}, ${c[1]|0}, ${c[2]|0}, ${0.55 + Math.random() * 0.4})`;
          pctx.fillRect(sx + off, sy, sw, sh);
        }
        // small core block
        pctx.fillStyle = color;
        pctx.fillRect(x - 4, y - 4, 8, 8);
      }
    },
    scanlines: {
      name: 'SCANLINE',
      stamp(x, y, size, chaos, color) {
        const half = size / 2;
        const rows = Math.floor(size / 2);
        const rgb = hexToRgb(color);
        for (let i = 0; i < rows; i++) {
          const yy = y - half + i * 2;
          if (Math.random() > chaos) continue;
          const jitter = (Math.random() - 0.5) * size * chaos;
          const w = size * (0.7 + Math.random() * 0.3);
          pctx.fillStyle = `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, ${0.55 + Math.random() * 0.45})`;
          pctx.fillRect(x - w / 2 + jitter, yy, w, 1);
          if (Math.random() < 0.3) {
            pctx.fillStyle = 'rgba(255,255,255,0.7)';
            pctx.fillRect(x - w / 2 + jitter + Math.random() * w, yy, 1 + Math.random() * 4, 1);
          }
        }
      }
    },
    pixelsort: {
      name: 'PX SORT',
      stamp(x, y, size, chaos, color) {
        const half = size / 2;
        const rgb = hexToRgb(color);
        const strips = 8 + Math.floor(chaos * 12);
        for (let i = 0; i < strips; i++) {
          const col = x - half + Math.random() * size;
          const len = size * (0.3 + Math.random() * 0.8);
          const steps = Math.max(4, len / 3);
          for (let j = 0; j < steps; j++) {
            const t = j / steps;
            // sorted from dark to bright (or inverse)
            const brightness = (j % 2 === 0) ? t : 1 - t;
            const mixed = mix([10, 10, 10], rgb, brightness * (0.7 + chaos * 0.3));
            pctx.fillStyle = `rgba(${mixed[0]|0}, ${mixed[1]|0}, ${mixed[2]|0}, ${0.85})`;
            const w = 1 + Math.random() * 2;
            pctx.fillRect(col, y - len / 2 + j * (len / steps), w, len / steps + 1);
          }
        }
      }
    },
    static: {
      name: 'STATIC',
      stamp(x, y, size, chaos, color) {
        const half = size / 2;
        const w = size, h = size;
        const img = pctx.createImageData(w, h);
        const d = img.data;
        const rgb = hexToRgb(color);
        const alphaBias = 0.3 + chaos * 0.6;
        // circular mask for soft edge
        const cx = w / 2, cy = h / 2;
        const rad = Math.min(w, h) / 2;
        for (let j = 0; j < h; j++) {
          for (let i = 0; i < w; i++) {
            const dx = i - cx, dy = j - cy;
            const r = Math.sqrt(dx * dx + dy * dy) / rad;
            if (r > 1 + (Math.random() - 0.5) * 0.2) continue;
            const p = (j * w + i) * 4;
            const shouldFill = Math.random() < alphaBias * (1 - r * 0.6);
            if (!shouldFill) continue;
            const useColor = Math.random() < 0.35;
            const n = Math.floor(Math.random() * 256);
            const col = useColor ? rgb : [n, n, n];
            d[p] = col[0];
            d[p + 1] = col[1];
            d[p + 2] = col[2];
            d[p + 3] = 220 + Math.random() * 35;
          }
        }
        pctx.putImageData(img, x - half, y - half);
      }
    },
    rgbshift: {
      name: 'RGB SHIFT',
      stamp(x, y, size, chaos, color) {
        const half = size / 2;
        const offset = Math.max(2, size * 0.08 * (0.5 + chaos));
        // three translucent blocks, one per channel
        const channels = [
          { col: '255, 46, 166', dx: -offset, dy: -offset * 0.5 },
          { col: '0, 240, 255',  dx: offset,  dy: offset * 0.5 },
          { col: '167, 255, 63', dx: 0,       dy: offset * 0.8 },
        ];
        for (const c of channels) {
          pctx.fillStyle = `rgba(${c.col}, ${0.35 + chaos * 0.35})`;
          const w = size * (0.7 + Math.random() * 0.2);
          const h = size * (0.7 + Math.random() * 0.2);
          pctx.fillRect(x - w / 2 + c.dx, y - h / 2 + c.dy, w, h);
        }
        // noisy speckles
        const rgb = hexToRgb(color);
        for (let i = 0; i < size * 0.7; i++) {
          pctx.fillStyle = `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, ${0.4 + Math.random() * 0.5})`;
          pctx.fillRect(x - half + Math.random() * size, y - half + Math.random() * size, 1, 1);
        }
      }
    },
    jpeg: {
      name: 'JPEG',
      stamp(x, y, size, chaos, color) {
        const half = size / 2;
        const block = 8;
        const rgb = hexToRgb(color);
        const cols = Math.ceil(size / block);
        const rows = Math.ceil(size / block);
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            const bx = x - half + c * block;
            const by = y - half + r * block;
            const dx = (c - cols / 2) / (cols / 2);
            const dy = (r - rows / 2) / (rows / 2);
            const rr = Math.sqrt(dx * dx + dy * dy);
            if (rr > 1.1) continue;
            const posterize = Math.floor(Math.random() * 4) * 0.25;
            const mixed = mix([0, 0, 0], rgb, 0.25 + posterize * 0.75);
            const alpha = (1 - rr * 0.7) * (0.7 + chaos * 0.3);
            pctx.fillStyle = `rgba(${mixed[0]|0}, ${mixed[1]|0}, ${mixed[2]|0}, ${alpha})`;
            pctx.fillRect(bx, by, block - 1, block - 1);
            // block edge artifact
            if (Math.random() < chaos * 0.4) {
              pctx.fillStyle = `rgba(255, 255, 255, 0.2)`;
              pctx.fillRect(bx, by, block, 1);
            }
          }
        }
      }
    },
    crt: {
      name: 'CRT',
      stamp(x, y, size, chaos, color) {
        const half = size / 2;
        const rgb = hexToRgb(color);
        // phosphor triads on a grid of 3×3 cells
        const cell = 3;
        const cols = Math.floor(size / cell);
        const rows = Math.floor(size / cell);
        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            const bx = x - half + c * cell;
            const by = y - half + r * cell;
            const dx = (c - cols / 2) / (cols / 2);
            const dy = (r - rows / 2) / (rows / 2);
            const rr = Math.sqrt(dx * dx + dy * dy);
            if (rr > 1) continue;
            const sub = c % 3;
            const alpha = (1 - rr) * (0.7 + chaos * 0.3);
            let col;
            if (sub === 0) col = `rgba(255, 46, 102, ${alpha})`;
            else if (sub === 1) col = `rgba(60, 255, 120, ${alpha})`;
            else col = `rgba(80, 120, 255, ${alpha})`;
            pctx.fillStyle = col;
            pctx.fillRect(bx, by, 1, cell - 1);
            if (Math.random() < chaos * 0.1) {
              pctx.fillStyle = `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, ${alpha})`;
              pctx.fillRect(bx, by, cell - 1, 1);
            }
          }
        }
      }
    },
    smear: {
      name: 'SMEAR',
      stamp(x, y, size, chaos, color) {
        const half = size / 2;
        const rgb = hexToRgb(color);
        // sample nearby canvas pixel and smear it horizontally
        try {
          const sx = Math.max(0, x - 4);
          const sy = Math.max(0, y - half);
          const sw = Math.min(8, paper.width - sx);
          const sh = Math.min(size, paper.height - sy);
          if (sw > 0 && sh > 0) {
            const data = pctx.getImageData(sx, sy, sw, sh);
            // draw repeatedly offset
            const off = document.createElement('canvas');
            off.width = sw; off.height = sh;
            off.getContext('2d').putImageData(data, 0, 0);
            const reps = 5 + Math.floor(chaos * 16);
            for (let i = 0; i < reps; i++) {
              const ox = (Math.random() - 0.5) * size * chaos;
              const oy = (Math.random() - 0.5) * size * 0.4;
              pctx.globalAlpha = 0.28;
              pctx.drawImage(off, x - sw / 2 + ox, y - sh / 2 + oy, sw * (2 + Math.random() * 3), sh);
            }
            pctx.globalAlpha = 1;
          }
        } catch (_) {}
        // seed dot
        pctx.fillStyle = `rgba(${rgb[0]}, ${rgb[1]}, ${rgb[2]}, 0.9)`;
        pctx.fillRect(x - 2, y - 2, 4, 4);
      }
    },
    void: {
      name: 'VOID',
      stamp(x, y, size, chaos, color) {
        const half = size / 2;
        // erase in jagged rectangles
        pctx.save();
        pctx.globalCompositeOperation = 'destination-out';
        const rects = 5 + Math.floor(chaos * 10);
        for (let i = 0; i < rects; i++) {
          const w = size * (0.3 + Math.random() * 0.5);
          const h = size * (0.1 + Math.random() * 0.3);
          const ox = (Math.random() - 0.5) * size * chaos;
          const oy = (Math.random() - 0.5) * size * 0.6;
          pctx.fillStyle = 'rgba(0,0,0,1)';
          pctx.fillRect(x - w / 2 + ox, y - h / 2 + oy, w, h);
        }
        pctx.restore();
      }
    },
  };

  // ---- Build UI ----
  const BRUSH_ORDER = ['datamosh', 'scanlines', 'pixelsort', 'static', 'rgbshift', 'jpeg', 'crt', 'smear', 'void'];

  function buildBrushes() {
    BRUSH_ORDER.forEach(key => {
      const b = brushes[key];
      const el = document.createElement('div');
      el.className = 'brush' + (key === state.brush ? ' active' : '');
      el.dataset.key = key;
      el.innerHTML = `<canvas width="70" height="60"></canvas><span class="name">${b.name}</span>`;
      const previewCtx = el.querySelector('canvas').getContext('2d');
      previewCtx.fillStyle = '#000';
      previewCtx.fillRect(0, 0, 70, 60);
      // render preview by invoking brush once on this offscreen-ish ctx
      const origCtx = pctx.__tempOrig = pctx;
      // not easy to repoint — instead draw with the same function on the preview
      (function renderPreview() {
        // temp swap: we'll reimplement using previewCtx path by calling the brush's stamp
        // to avoid code duplication, run a minimal version based on the brush key
        const pctx2 = previewCtx;
        const saved = { pctx };
        // monkeypatch for preview: save real pctx reference and replace with preview
        // Instead, we'll just paint a stylized icon manually for the preview
        drawBrushIcon(previewCtx, key);
      })();
      el.addEventListener('click', () => {
        state.brush = key;
        document.querySelectorAll('.brush').forEach(x => x.classList.toggle('active', x.dataset.key === key));
        updateStatus();
      });
      brushGrid.appendChild(el);
    });
  }

  function drawBrushIcon(ctx, key) {
    const w = ctx.canvas.width, h = ctx.canvas.height;
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, w, h);
    if (key === 'datamosh') {
      for (let i = 0; i < 12; i++) {
        ctx.fillStyle = ['#ff2ea6', '#00f0ff', '#a7ff3f', '#ffffff'][i % 4];
        ctx.globalAlpha = 0.5 + Math.random() * 0.5;
        ctx.fillRect(Math.random() * w, Math.random() * h, 10 + Math.random() * 20, 3);
      }
      ctx.globalAlpha = 1;
    } else if (key === 'scanlines') {
      for (let y = 0; y < h; y += 3) {
        ctx.fillStyle = `rgba(255, 46, 166, ${0.5 + Math.random() * 0.5})`;
        ctx.fillRect(Math.random() * 15, y, w - Math.random() * 20, 1);
      }
    } else if (key === 'pixelsort') {
      for (let x = 8; x < w - 8; x += 2) {
        for (let j = 0; j < 20; j++) {
          const b = j / 20;
          ctx.fillStyle = `rgba(${255 * b|0}, ${46 + 200 * b|0}, ${166 * b|0}, 1)`;
          ctx.fillRect(x, 10 + j * 2, 2, 2);
        }
      }
    } else if (key === 'static') {
      for (let i = 0; i < 300; i++) {
        const v = Math.random() * 255 | 0;
        ctx.fillStyle = Math.random() < 0.3 ? '#ff2ea6' : `rgb(${v},${v},${v})`;
        ctx.fillRect(Math.random() * w, Math.random() * h, 1, 1);
      }
    } else if (key === 'rgbshift') {
      ctx.fillStyle = 'rgba(255, 46, 166, 0.6)';
      ctx.fillRect(10, 10, 40, 40);
      ctx.fillStyle = 'rgba(0, 240, 255, 0.6)';
      ctx.fillRect(16, 14, 40, 40);
      ctx.fillStyle = 'rgba(167, 255, 63, 0.5)';
      ctx.fillRect(22, 18, 40, 40);
    } else if (key === 'jpeg') {
      for (let y = 0; y < h; y += 8) {
        for (let x = 0; x < w; x += 8) {
          const b = Math.floor(Math.random() * 4) * 0.25;
          ctx.fillStyle = `rgba(255, 46, 166, ${b})`;
          ctx.fillRect(x, y, 7, 7);
        }
      }
    } else if (key === 'crt') {
      for (let x = 0; x < w; x += 3) {
        ctx.fillStyle = 'rgba(255, 46, 102, 0.9)';
        ctx.fillRect(x, 0, 1, h);
        ctx.fillStyle = 'rgba(60, 255, 120, 0.9)';
        ctx.fillRect(x + 1, 0, 1, h);
        ctx.fillStyle = 'rgba(80, 120, 255, 0.9)';
        ctx.fillRect(x + 2, 0, 1, h);
      }
      for (let y = 0; y < h; y += 2) {
        ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
        ctx.fillRect(0, y, w, 1);
      }
    } else if (key === 'smear') {
      ctx.fillStyle = '#ff2ea6';
      for (let i = 0; i < 6; i++) {
        ctx.globalAlpha = 0.35;
        ctx.fillRect(10 + i * 8, 20, 18, 20);
      }
      ctx.globalAlpha = 1;
    } else if (key === 'void') {
      ctx.fillStyle = '#0c0010';
      ctx.fillRect(0, 0, w, h);
      ctx.strokeStyle = 'rgba(255, 46, 166, 0.6)';
      ctx.lineWidth = 1;
      for (let i = 0; i < 5; i++) {
        ctx.strokeRect(Math.random() * w * 0.5, Math.random() * h * 0.5, 10 + Math.random() * 20, 6 + Math.random() * 10);
      }
    }
  }

  function buildSwatches() {
    PALETTE.forEach(c => {
      const el = document.createElement('div');
      el.className = 'swatch' + (c === state.color ? ' active' : '');
      el.style.background = c;
      el.style.color = c;
      el.addEventListener('click', () => {
        state.color = c;
        document.querySelectorAll('.swatch').forEach(x => x.classList.toggle('active', x.style.background === c));
        updateStatus();
      });
      swatchesEl.appendChild(el);
    });
  }

  function updateStatus() {
    status.textContent = `brush:${state.brush} · color:${state.color} · size:${state.size} · chaos:${state.chaos.toFixed(2)}`;
  }

  // ---- Drawing ----
  function stampAt(x, y) {
    const b = brushes[state.brush];
    b.stamp(x, y, state.size, state.chaos, state.color);
  }

  function drawLine(x0, y0, x1, y1) {
    const dx = x1 - x0, dy = y1 - y0;
    const dist = Math.hypot(dx, dy);
    const spacing = Math.max(1, state.spacing);
    state.distAccum += dist;
    if (state.distAccum < spacing) return;
    const steps = Math.max(1, Math.floor(state.distAccum / spacing));
    for (let i = 0; i < steps; i++) {
      const t = (i + 1) / steps;
      stampAt(x0 + dx * t, y0 + dy * t);
    }
    state.distAccum = 0;
  }

  // Convert page coords to canvas buffer coords
  function toCanvas(e) {
    const r = paper.getBoundingClientRect();
    const cx = (e.clientX - r.left) / r.width * paper.width;
    const cy = (e.clientY - r.top) / r.height * paper.height;
    return { x: cx, y: cy };
  }

  paper.addEventListener('pointerdown', e => {
    paper.setPointerCapture(e.pointerId);
    state.drawing = true;
    pushUndo();
    const { x, y } = toCanvas(e);
    state.lastX = x; state.lastY = y;
    state.distAccum = 9999; // force immediate stamp
    stampAt(x, y);
  });
  paper.addEventListener('pointermove', e => {
    const { x, y } = toCanvas(e);
    const r = paper.getBoundingClientRect();
    cursor.style.display = 'block';
    cursor.style.left = e.clientX + 'px';
    cursor.style.top = e.clientY + 'px';
    const displayScale = r.width / paper.width;
    cursor.style.width = (state.size * displayScale) + 'px';
    cursor.style.height = (state.size * displayScale) + 'px';
    if (state.drawing) {
      drawLine(state.lastX, state.lastY, x, y);
      state.lastX = x; state.lastY = y;
    }
  });
  paper.addEventListener('pointerleave', () => { cursor.style.display = 'none'; });
  const endDraw = () => { state.drawing = false; };
  paper.addEventListener('pointerup', endDraw);
  paper.addEventListener('pointercancel', endDraw);

  // ---- Controls ----
  sizeSlider.addEventListener('input', e => {
    state.size = +e.target.value;
    sizeVal.textContent = state.size;
    updateStatus();
  });
  chaosSlider.addEventListener('input', e => {
    state.chaos = +e.target.value / 100;
    chaosVal.textContent = state.chaos.toFixed(2);
    updateStatus();
  });
  spaceSlider.addEventListener('input', e => {
    state.spacing = +e.target.value;
    spaceVal.textContent = state.spacing;
  });

  undoBtn.addEventListener('click', popUndo);
  clearBtn.addEventListener('click', () => {
    pushUndo();
    paintBackground();
  });
  saveBtn.addEventListener('click', () => {
    const link = document.createElement('a');
    link.download = `glitch-canvas-${Date.now()}.png`;
    link.href = paper.toDataURL('image/png');
    link.click();
  });
  document.querySelectorAll('[data-bg]').forEach(b => {
    b.addEventListener('click', () => {
      state.bg = b.dataset.bg;
      pushUndo();
      paintBackground();
    });
  });
  window.addEventListener('keydown', e => {
    if (e.ctrlKey || e.metaKey) {
      if (e.key === 'z' || e.key === 'Z') { e.preventDefault(); popUndo(); }
      if (e.key === 's' || e.key === 'S') { e.preventDefault(); saveBtn.click(); }
    }
    if (e.key === '[') { sizeSlider.value = Math.max(16, state.size - 8); sizeSlider.dispatchEvent(new Event('input')); }
    if (e.key === ']') { sizeSlider.value = Math.min(200, state.size + 8); sizeSlider.dispatchEvent(new Event('input')); }
  });

  // ---- Init ----
  buildBrushes();
  buildSwatches();
  fitCanvas();
  paintBackground();
  updateStatus();
})();
</script>
</body>
</html>
