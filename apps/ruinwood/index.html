<style>
  :root{
    --night:#0d1410;
    --ink:#e8f0dc;
    --dim:#7a8f74;
    --leaf:#5fae52;
    --moss:#8fc46a;
    --stone:#b8b0a0;
    --glow:#ffd98a;
  }
  html{ font-size:100%; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    font-family:"VT323", monospace;
    background:
      radial-gradient(ellipse 80% 60% at 50% 20%, #16241a 0%, var(--night) 70%);
    color:var(--ink);
    height:100dvh;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #stage{
    position:relative;
    width:min(100vw, calc(100dvh * 1.5));
    height:min(100dvh, calc(100vw / 1.5));
  }
  canvas#world{
    position:absolute; inset:0;
    width:100%; height:100%;
    image-rendering:pixelated;
    touch-action:none;
  }
  /* depth: edge vignette over the forest, under all UI */
  #stage::after{
    content:'';
    position:absolute; inset:0;
    pointer-events:none;
    z-index:4;
    background:radial-gradient(ellipse at 50% 46%, transparent 52%, rgba(0,0,0,0.38) 100%);

    position:absolute; top:2.5%; left:3%; right:3%;

    pointer-events:none;
    z-index:5;
  }
  .topbar h1{
    font-family:"Pixelify Sans", "VT323", monospace;
    font-weight:600;
    font-size:clamp(1.1rem, 3.4vw, 1.7rem);
    color:var(--moss);
    text-shadow:2px 2px 0 rgba(0,0,0,0.6);
    letter-spacing:0.04em;
  }
  .seedpill{
    font-size:clamp(0.85rem, 2vw, 1.05rem);
    color:var(--dim);
    background:rgba(10,18,12,0.65);
    border:1px solid rgba(143,196,106,0.35);

    font-family:inherit;
    font-size:1rem;

    background:rgba(10,18,12,0.75);
    color:var(--ink);
    border:1px solid rgba(143,196,106,0.45);

    background:rgba(95,174,82,0.85);
    color:#0c1a0c;
    border:none;

    box-shadow:inset 1px 1px 0 rgba(255,255,255,0.3), inset -2px -2px 0 rgba(0,0,0,0.3), 3px 3px 0 rgba(0,0,0,0.5);

<body>
<div id="stage">

  <div class="topbar">

<script>
(function(){
'use strict';

/* ── tiles ── */
var T_WATER=0, T_SHORE=1, T_GRASS=2, T_TREE=3, T_ROCK=4, T_FLOWER=5, T_SHROOM=6, T_TGRASS=7,
    T_SLAB=8, T_WALL=9, T_PILLAR=10, T_RUBBLE=11, T_ALTAR=12, T_PORTAL=13, T_HUT=14, T_WELL=15, T_SWORD=16;
var SOLID = {};
[T_WATER, T_TREE, T_ROCK, T_WALL, T_PILLAR, T_HUT, T_WELL].forEach(function(t){ SOLID[t] = true; });

var TILE = 8, VW = 30, VH = 20, MW = 96, MH = 68;
var canvas = document.getElementById('world');
var ctx = canvas.getContext('2d');
canvas.width = VW * TILE;   /* 240 */
canvas.height = VH * TILE;  /* 160 */
ctx.imageSmoothingEnabled = false;

var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
var coarse = window.matchMedia('(pointer: coarse)').matches;
var drownEl = document.getElementById('drown');

/* ── rng / noise ── */
function fnv(str){
  var h = 2166136261;
  for(var i = 0; i < str.length; i++){ h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); }
  return h >>> 0;
}
function mulberry(a){
  return function(){
    a |= 0; a = a + 0x6D2B79F5 | 0;
    var t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function hash2(seed, x, y){
  var n = Math.imul(x, 374761393) + Math.imul(y, 668265263) + Math.imul(seed, 974634321);
  n = Math.imul(n ^ (n >>> 13), 1274126177);
  return ((n ^ (n >>> 16)) >>> 0) / 4294967296;
}
function vnoise(seed, x, y){
  var ix = Math.floor(x), iy = Math.floor(y);
  var fx = x - ix, fy = y - iy;
  var ux = fx*fx*(3-2*fx), uy = fy*fy*(3-2*fy);
  var a = hash2(seed, ix, iy), b = hash2(seed, ix+1, iy);
  var c = hash2(seed, ix, iy+1), d = hash2(seed, ix+1, iy+1);
  return a + (b-a)*ux + (c-a)*uy + (a-b-c+d)*ux*uy;
}
function fbm(seed, x, y, oct){
  var s = 0, amp = 0.5, f = 1, norm = 0;
  for(var i = 0; i < oct; i++){
    s += amp * vnoise(seed + i*7, x*f, y*f);
    norm += amp; f *= 2.03; amp *= 0.5;
  }
  return s / norm;
}

/* ── biomes: every portal world grows a different wood ── */
var BIOMES = [
  { name:'the green wood', shape:0, sky:['#16241a','#0d1410'],
    foe:{ name:'shades', body:'#2a3a24', core:'#35482c', eye:'#ffd98a', hp:2, spd:0 },
    grass:'#436b3c', dot:'#527f49',
    tDark:'#2b5a30', tMid:'#43843f', tLite:'#5fae52', trunk:'#5a432a',
    water:'#1f5f6b', glint:'#3d8f9a', shore:'#7a6a48', shoreDot:'#8f7e5c',
    tg1:'#5c9a52', tg2:'#66a959',
    lore:['an old pine. it was here first.','the bark is rough. something scratched it once.','needles whisper overhead.'] },
  { name:'the ember wood', shape:0, sky:['#2a1a10','#140c06'],
    foe:{ name:'cinder wisps', body:'#5a2a10', core:'#7a3a14', eye:'#ffb060', hp:2, spd:4 },
    grass:'#6b5530', dot:'#7d6538',
    tDark:'#7a3618', tMid:'#a24f1e', tLite:'#c9752a', trunk:'#4a3220',
    water:'#1f4a5e', glint:'#3d7a92', shore:'#7a6444', shoreDot:'#8f7852',
    tg1:'#a8842f', tg2:'#b8923a',
    lore:['leaves like embers. autumn never ends here.','the canopy crackles in a wind you cannot feel.'] },
  { name:'the pale wood', shape:1, sky:['#142230','#0a1018'],
    foe:{ name:'frost wraiths', body:'#3a5a66', core:'#4c7280', eye:'#dff2f8', hp:3, spd:-5 },
    grass:'#7d948c', dot:'#8fa69e',
    tDark:'#23423e', tMid:'#35625c', tLite:'#dfe8e4', trunk:'#3a3028',
    water:'#2a4a6a', glint:'#7fb8d8', shore:'#8a8878', shoreDot:'#9c9a8a',
    tg1:'#93aaa2', tg2:'#a2b8b0',
    lore:['snow rests on the boughs. it never falls, never melts.','a pine holding its breath under the frost.'] },
  { name:'the violet wood', shape:5, sky:['#1c1228','#0d0816'],
    foe:{ name:'moth shades', body:'#241a44', core:'#38285e', eye:'#d0b8ff', hp:1, spd:9 },
    grass:'#3f3a5a', dot:'#4c4670',
    tDark:'#2e2350', tMid:'#4a3a7a', tLite:'#8a6fbe', trunk:'#2a2038',
    water:'#181838', glint:'#5a5a9e', shore:'#55486a', shoreDot:'#645678',
    tg1:'#5c5288', tg2:'#6a5f9a',
    lore:['the willow hums a note too low to hear. the moss leans in anyway.','violet leaves. they turn to watch you pass.'] },
  { name:'the sporeling wood', shape:4, sky:['#20121a','#10080e'],
    foe:{ name:'spore drifters', body:'#6a3040', core:'#86404e', eye:'#ffd0da', hp:3, spd:-7 },
    grass:'#52424a', dot:'#61505a',
    tDark:'#8a3a50', tMid:'#c05a70', tLite:'#e896a4', trunk:'#d8cbb8',
    water:'#2e2440', glint:'#6a4a7a', shore:'#5e4c50', shoreDot:'#6e5a5e',

    tDark:'#8a6a24', tMid:'#c9a13a', tLite:'#e0bc50', trunk:'#e0d8c8',

var INSCRIPTIONS = [
  'WE PLANTED THE FOREST TO FORGET. IT GREW TO REMEMBER.',
  'EVERY GATE IS A ROOT. EVERY ROOT REMEMBERS THE FIRST TREE.',

  'LIGHT A FIRE HERE AND SOMETHING WILL WARM ITS HANDS.',

function drawTree(B, sx, sy, h){
  switch(B.shape){
    case 1: /* frost pine: snow-tipped spire */
      pr(sx+1, sy+3, 6, 4, B.tDark);
      pr(sx+2, sy+1, 4, 3, B.tMid);
      pr(sx+3, sy, 2, 2, B.tLite);
      pr(sx+3, sy+7, 2, 1, B.trunk);
      break;
    case 2: /* birch: pale notched trunk, small gold canopy */
      pr(sx+1, sy, 6, 3, B.tDark);
      pr(sx+2, sy+1, 4, 2, B.tMid);
      if(h < 0.6) pr(sx+3, sy+1, 2, 1, B.tLite);
      pr(sx+3, sy+3, 2, 5, B.trunk);
      pr(sx+3 + (h*2|0)%2, sy+4 + (h*8|0)%3, 1, 1, '#4a4438');
      break;
    case 3: /* dead snag: bare trunk + branches, rare ember */
      pr(sx+3, sy+1, 2, 7, B.tMid);
      pr(sx+1, sy+2, 2, 1, B.tMid); pr(sx+1, sy+1, 1, 1, B.tMid);
      pr(sx+5, sy+3, 2, 1, B.tMid); pr(sx+6, sy+2, 1, 1, B.tMid);
      if(h < 0.3) pr(sx+3 + (h*10|0)%2, sy+5, 1, 1, B.tLite);
      break;
    case 4: /* giant fungus: pale stem, spotted cap */
      pr(sx+3, sy+4, 2, 4, B.trunk);
      pr(sx+1, sy+1, 6, 3, B.tMid);
      pr(sx+1, sy+3, 6, 1, B.tDark);
      pr(sx+2 + (h*4|0)%3, sy+1, 1, 1, B.tLite);
      pr(sx+5, sy+2, 1, 1, B.tLite);
      break;
    case 5: /* willow: tall crown with drooping strands */
      pr(sx+1, sy+1, 6, 4, B.tDark);
      pr(sx+2, sy+2, 4, 2, B.tMid);
      pr(sx+1, sy+5, 1, 2, B.tMid);
      pr(sx+6, sy+5, 1, 2, B.tMid);
      pr(sx+3 + (h*3|0)%2, sy+5, 1, 2, B.tLite);
      pr(sx+3, sy+6, 2, 2, B.trunk);
      break;
    default: /* round canopy — fills the tile so forests read as one mass */
      pr(sx, sy, 8, 8, B.tDark);
      pr(sx+1, sy+1, 6, 5, B.tMid);
      pr(sx+2 + (h*2|0), sy+2, 3, 2, B.tLite);
      pr(sx+3, sy+6, 2, 2, B.trunk);
  }
}

/* ── world gen ── */
var map, seedStr, seedNum, ruin, spawn, altarFound, portal, depth = 0, enemies = [], poofs = [], travelCd = 0,
    biome = BIOMES[0], inscription = INSCRIPTIONS[0], prevBi = -1, villages = [], sword = null;
function randSeed(){
  var A = 'ABCDEFGHJKMNPRTUVWXYZ2346789', out = '';
  for(var i = 0; i < 5; i++) out += A[Math.floor(Math.random()*A.length)];
  return out;
}
function generate(str, d, atPortal){
  seedStr = str;
  depth = d || 0;
  seedNum = fnv(str + '#' + depth);
  var rng = mulberry(seedNum);
  map = new Uint8Array(MW * MH);
  altarFound = false;

  /* pick this world's biome: home is always the green wood, every gate rolls a new one
     (never the same as the world you just left) */
  var bi;
  if(depth === 0) bi = 0;
  else {
    bi = 1 + Math.floor(hash2(seedNum, 3, 11) * (BIOMES.length - 1));
    if(bi === prevBi) bi = 1 + (bi % (BIOMES.length - 1));
  }
  prevBi = bi;
  biome = BIOMES[bi];
  inscription = INSCRIPTIONS[Math.floor(hash2(seedNum, 7, 13) * INSCRIPTIONS.length)];
  /* sky: the void around the stage takes this world's color */
  document.body.style.background =
    'radial-gradient(ellipse 80% 60% at 50% 20%, ' + biome.sky[0] + ' 0%, ' + biome.sky[1] + ' 70%)';

  for(var y = 0; y < MH; y++){
    for(var x = 0; x < MW; x++){
      var e = fbm(seedNum, x*0.085, y*0.085, 4);
      /* soft island edge so the woods feel enclosed */
      var dx = (x/MW - 0.5)*2, dy = (y/MH - 0.5)*2;
      e -= Math.max(0, Math.sqrt(dx*dx + dy*dy) - 0.72) * 0.9;
      var t;
      if(e < 0.34) t = T_WATER;
      else if(e < 0.385) t = T_SHORE;
      else {
        var d = fbm(seedNum + 99, x*0.16, y*0.16, 4);
        if(d > 0.6) t = T_TREE;
        else {
          t = T_GRASS;
          var r = hash2(seedNum + 5, x, y);
          if(r < 0.02) t = T_ROCK;
          else if(r < 0.055) t = T_FLOWER;
          else if(r < 0.068) t = T_SHROOM;
          else if(r < 0.16) t = T_TGRASS;
        }
      }
      map[y*MW + x] = t;
    }
  }

  /* the one ruin: find a landlocked clearing candidate */
  ruin = null;
  for(var attempt = 0; attempt < 400 && !ruin; attempt++){
    var rx = 6 + Math.floor(rng() * (MW - 12));
    var ry = 5 + Math.floor(rng() * (MH - 11));
    var ok = true;
    for(var yy = -1; yy <= 6 && ok; yy++)
      for(var xx = -1; xx <= 8 && ok; xx++){
        var t2 = map[(ry+yy)*MW + rx+xx];
        if(t2 === T_WATER || t2 === T_SHORE) ok = false;
      }
    if(ok) ruin = { x: rx, y: ry };
  }
  if(!ruin) ruin = { x: MW >> 1, y: MH >> 1 };
  stampRuin(rng);

  /* abandoned villages: 1–2 hut clearings, whoever raised the ruin lived somewhere */
  villages = [];
  var vWant = 1 + Math.floor(hash2(seedNum, 17, 23) * 2);
  for(var vt = 0; vt < 300 && villages.length < vWant; vt++){
    var vx = 4 + Math.floor(rng() * (MW - 12));
    var vy = 4 + Math.floor(rng() * (MH - 10));
    var vok = Math.hypot(vx - ruin.x, vy - ruin.y) >= 14;
    for(var wy = -1; wy <= 5 && vok; wy++)
      for(var wx = -1; wx <= 7 && vok; wx++){
        var t4 = map[(vy+wy)*MW + vx+wx];
        if(t4 === T_WATER || t4 === T_SHORE || t4 >= T_SLAB) vok = false;
      }
    for(var vv = 0; vv < villages.length && vok; vv++)
      if(Math.hypot(vx - villages[vv].x, vy - villages[vv].y) < 16) vok = false;
    if(!vok) continue;
    stampVillage(vx, vy, rng);
    villages.push({ x: vx, y: vy });
  }

  /* spawn: walkable tile, far-ish from the ruin so it must be found */
  spawn = null;
  for(var s = 0; s < 600; s++){
    var sx = 3 + Math.floor(rng() * (MW - 6));
    var sy = 3 + Math.floor(rng() * (MH - 6));
    if(SOLID[map[sy*MW + sx]]) continue;
    var far = Math.hypot(sx - (ruin.x + 4), sy - (ruin.y + 2.5));
    if(far > 22){ spawn = { x: sx, y: sy }; break; }
    if(!spawn && far > 12) spawn = { x: sx, y: sy };
  }
  if(!spawn) spawn = { x: MW >> 1, y: 4 };

  /* one sword stands near the spawn — you start this world unarmed */
  sword = null;
  for(var sw = 0; sw < 500 && !sword; sw++){
    var swx = 2 + Math.floor(rng() * (MW - 4));
    var swy = 2 + Math.floor(rng() * (MH - 4));
    var swt = map[swy*MW + swx];
    if(swt !== T_GRASS && swt !== T_TGRASS && swt !== T_FLOWER) continue;
    var swd = Math.hypot(swx - spawn.x, swy - spawn.y);
    if(swd < 5 || swd > 14) continue;
    map[swy*MW + swx] = T_SWORD;
    sword = { x: swx, y: swy };
  }
  if(!sword){
    /* dense ring around spawn: exhaustively take the eligible tile nearest ~9 out */
    var bestSw = null, bestScore = 1e9;
    for(var by2 = 2; by2 < MH - 2; by2++)
      for(var bx2 = 2; bx2 < MW - 2; bx2++){
        var bt = map[by2*MW + bx2];
        if(bt !== T_GRASS && bt !== T_TGRASS && bt !== T_FLOWER) continue;
        var bsc = Math.abs(Math.hypot(bx2 - spawn.x, by2 - spawn.y) - 9);
        if(bsc < bestScore){ bestScore = bsc; bestSw = { x: bx2, y: by2 }; }
      }
    if(bestSw){ map[bestSw.y*MW + bestSw.x] = T_SWORD; sword = bestSw; }
  }

  /* roaming shades — more (and quicker) the deeper you go */
  enemies = [];
  poofs = [];
  /* two-thirds the old count, in a ~75% larger world — the woods breathe now */
  var wantN = Math.min(16, 8 + depth);
  for(var en = 0; en < 900 && enemies.length < wantN; en++){
    var ex = 2 + Math.floor(rng() * (MW - 4));
    var ey = 2 + Math.floor(rng() * (MH - 4));
    if(SOLID[map[ey*MW + ex]]) continue;
    if(ex >= ruin.x - 1 && ex <= ruin.x + 8 && ey >= ruin.y - 1 && ey <= ruin.y + 6) continue;
    if(Math.hypot(ex - spawn.x, ey - spawn.y) < 9) continue;
    /* three kinds walk these woods: shades roam, stalkers lunge, brutes crush */
    var roll = rng();
    var etype = roll < 0.6 ? 'shade' : roll < 0.85 ? 'stalker' : 'brute';
    enemies.push({
      x: (ex + 0.5) * TILE, y: (ey + 0.5) * TILE,
      type: etype,
      hp: etype === 'stalker' ? 1 : etype === 'brute' ? biome.foe.hp + 2 : biome.foe.hp,
      vx: 0, vy: 0, wanderT: rng() * 2,
      hurtUntil: 0, kx: 0, ky: 0, dead: false, deadT: 0,
      lungeUntil: 0, lungeCd: 0,
      ph: rng() * 6.28
    });
  }

  if(atPortal){
    player.x = (portal.x + 0.5) * TILE;
    player.y = (portal.y + 1.5) * TILE;
    player.fx = 0; player.fy = 1;
  } else {
    player.x = (spawn.x + 0.5) * TILE;
    player.y = (spawn.y + 0.5) * TILE;
    player.fx = 0; player.fy = 1;
  }
  player.hp = 3;
  player.hurtUntil = 0;
  heartsUi();
  document.getElementById('seedShow').textContent = seedStr + (depth > 0 ? ' · world ' + (depth + 1) : '');
  try{ localStorage.setItem('ruinwood-seed', seedStr); }catch(e){}
}
function stampRuin(rng){
  var W2 = 8, H2 = 6;
  for(var y = 0; y < H2; y++){
    for(var x = 0; x < W2; x++){
      var gx = ruin.x + x, gy = ruin.y + y;
      var edge = x === 0 || y === 0 || x === W2-1 || y === H2-1;
      var corner = (x === 0 || x === W2-1) && (y === 0 || y === H2-1);
      var t;
      if(corner) t = rng() < 0.75 ? T_PILLAR : T_RUBBLE;
      else if(edge){
        if(y === H2-1 && (x === 3 || x === 4)) t = T_SLAB;          /* the doorway, facing south */
        else t = rng() < 0.62 ? T_WALL : (rng() < 0.5 ? T_RUBBLE : T_SLAB);
      }
      else t = rng() < 0.12 ? T_RUBBLE : T_SLAB;
      map[gy*MW + gx] = t;
    }
  }
  map[(ruin.y + 2)*MW + ruin.x + 3] = T_ALTAR;
  portal = { x: ruin.x + 5, y: ruin.y + 2 };
  map[portal.y*MW + portal.x] = T_PORTAL;
  /* clear a small approach outside the door */
  for(var ay = 1; ay <= 2; ay++)
    for(var ax = 3; ax <= 4; ax++){
      var t3 = map[(ruin.y + H2 - 1 + ay)*MW + ruin.x + ax];
      if(SOLID[t3]) map[(ruin.y + H2 - 1 + ay)*MW + ruin.x + ax] = T_GRASS;
    }
}
function stampVillage(vx, vy, rng){
  for(var y = 0; y < 5; y++)
    for(var x = 0; x < 7; x++)
      map[(vy+y)*MW + vx+x] = T_GRASS;
  var spots = [[1,1],[4,1],[2,3],[5,3]];
  var n = 3 + (rng() < 0.4 ? 1 : 0);
  for(var i = 0; i < n && i < spots.length; i++)
    map[(vy+spots[i][1])*MW + vx+spots[i][0]] = T_HUT;
  map[(vy+2)*MW + vx+3] = T_WELL;
}

var player = { x: 0, y: 0, fx: 0, fy: 1, walkT: 0, moving: false, hp: 3, hurtUntil: 0, swingT: -9999, atkCd: 0, hasSword: false, inWater: false };

/* ── keys (remappable) ── */
var DEF_BINDS = { up:'w', down:'s', left:'a', right:'d', use:'e', attack:' ' };
var ACTIONS = ['up','down','left','right','use','attack'];
var LABELS = { up:'walk up', down:'walk down', left:'walk left', right:'walk right', use:'examine (E)', attack:'attack (fist / sword)' };
var binds;
try{ binds = JSON.parse(localStorage.getItem('ruinwood-keys-v1')); }catch(e){}
if(!binds || ACTIONS.some(function(a){ return typeof (binds||{})[a] !== 'string'; })){
  binds = JSON.parse(JSON.stringify(DEF_BINDS));
}
function saveBinds(){ try{ localStorage.setItem('ruinwood-keys-v1', JSON.stringify(binds)); }catch(e){} }
function keyLabel(k){
  var sp = { arrowleft:'◀', arrowright:'▶', arrowup:'▲', arrowdown:'▼', ' ':'SPACE', shift:'SHIFT', enter:'ENTER' };
  return sp[k] || k.toUpperCase();
}
var keys = {};
var listening = null;
document.addEventListener('keydown', function(e){
  if(e.repeat) return;
  var k = e.key.toLowerCase();
  if(listening){
    e.preventDefault();
    if(k !== 'escape'){
      ACTIONS.forEach(function(a){ if(binds[a] === k && a !== listening.a) binds[a] = ''; });
      binds[listening.a] = k;
      saveBinds();
    }
    listening = null;
    refreshBinds();
    return;
  }
  /* let the seed field type freely (seeds can contain W/A/S/D) */
  var tag = (e.target && e.target.tagName || '').toLowerCase();
  if(tag === 'input' || tag === 'textarea') return;
  /* swallow every bound key + space/arrows so the browser's find-as-you-type
     bar (Waterfox / Firefox) can't steal WASD when the game has focus */
  var isBound = ACTIONS.some(function(a){ return binds[a] === k; });
  if(isBound || k === ' ' || k.indexOf('arrow') === 0 || k === "'" || k === '/') e.preventDefault();
  keys[k] = true;
  if(isBound) fadeHints();   /* first real input: the hints have done their job */
  if(k === binds.use) use();
  if(k === binds.attack) attack();
});
document.addEventListener('keyup', function(e){ keys[e.key.toLowerCase()] = false; });

/* ── audio ── */
var ac = null;
function snd(fn){
  try{
    if(!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
    fn(ac, ac.currentTime);
  }catch(e){}
}
var lastStep = 0;
function sndStep(water){
  var now = performance.now();
  if(now - lastStep < (water ? 340 : 230)) return;
  lastStep = now;
  snd(function(a, t){
    var o = a.createOscillator(), g = a.createGain();
    o.type = water ? 'sine' : 'triangle';
    o.frequency.setValueAtTime(water ? 90 + Math.random()*35 : 140 + Math.random()*50, t);
    g.gain.setValueAtTime(water ? 0.07 : 0.05, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + (water ? 0.13 : 0.07));
    o.connect(g); g.connect(a.destination);
    o.start(t); o.stop(t + 0.15);
  });
}
function sndSwing(fist){
  snd(function(a, t){
    var len = a.sampleRate * (fist ? 0.12 : 0.09) | 0, buf = a.createBuffer(1, len, a.sampleRate), dd = buf.getChannelData(0);
    for(var i = 0; i < len; i++) dd[i] = Math.random()*2 - 1;
    var n = a.createBufferSource(); n.buffer = buf;
    var f = a.createBiquadFilter(); f.type = 'bandpass'; f.Q.value = 1.2;
    f.frequency.setValueAtTime(fist ? 320 : 900, t);
    f.frequency.exponentialRampToValueAtTime(fist ? 700 : 2600, t + 0.08);
    var g = a.createGain();
    g.gain.setValueAtTime(fist ? 0.09 : 0.12, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + (fist ? 0.12 : 0.09));
    n.connect(f); f.connect(g); g.connect(a.destination);
    n.start(t); n.stop(t + 0.13);
  });
}
function sndThud(low){
  snd(function(a, t){
    var op = a.createOscillator(), g = a.createGain();
    op.type = 'square';
    op.frequency.setValueAtTime(low ? 110 : 240, t);
    op.frequency.exponentialRampToValueAtTime(low ? 55 : 120, t + 0.09);
    g.gain.setValueAtTime(0.09, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.11);
    op.connect(g); g.connect(a.destination);
    op.start(t); op.stop(t + 0.12);
  });
}
function sndPortal(){
  snd(function(a, t){
    var op = a.createOscillator(), g = a.createGain();
    op.type = 'triangle';
    op.frequency.setValueAtTime(180, t);
    op.frequency.exponentialRampToValueAtTime(1400, t + 0.55);
    g.gain.setValueAtTime(0.12, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
    op.connect(g); g.connect(a.destination);
    op.start(t); op.stop(t + 0.62);
  });
}
function sndChime(deep){
  snd(function(a, t){
    [0, 4, 7].forEach(function(st, i){
      var o = a.createOscillator(), g = a.createGain();
      o.type = 'triangle';
      o.frequency.value = (deep ? 220 : 440) * Math.pow(2, st/12);
      g.gain.setValueAtTime(0.0001, t + i*0.09);
      g.gain.linearRampToValueAtTime(0.07, t + i*0.09 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t + i*0.09 + 0.8);
      o.connect(g); g.connect(a.destination);
      o.start(t + i*0.09); o.stop(t + i*0.09 + 0.85);
    });
  });
}

var LORE = {};

LORE[T_WATER] = ['dark water. the reflection blinks after you do.', 'cold, clear, patient.'];
LORE[T_SHORE] = ['soft mud. old footprints — not yours.'];
LORE[T_FLOWER] = ['small white flowers. they lean toward the ruin.', 'petals like paper. you leave them be.'];
LORE[T_SHROOM] = ['a fat red mushroom. absolutely do not.', 'it smells like rain and bad ideas.'];
LORE[T_ROCK] = ['a mossy boulder. warm on one side.'];
LORE[T_TGRASS] = ['tall grass. something small hurries away.'];
LORE[T_WALL] = ['ruined stonework. the joints were cut by hands.', 'moss holds the wall together now.'];
LORE[T_PILLAR] = ['a broken pillar. the top is missing — look around?'];
LORE[T_RUBBLE] = ['collapsed stone. carvings, worn to hints.'];
LORE[T_SLAB] = ['a paved slab. someone swept this floor, once, for years.'];
LORE[T_GRASS] = ['grass. honest, ordinary grass.'];
LORE[T_PORTAL] = ['a torn seam in the world. the other side smells like a different forest.', 'step in. the next wood is already growing.'];

function use(){
  if(dialogEl.classList.contains('show')){ nextLine(); return; }
  if(document.getElementById('menu').classList.contains('show')) return;
  if(remapEl.classList.contains('show')) return;
  var tx = Math.floor(player.x / TILE) + player.fx;
  var ty = Math.floor(player.y / TILE) + player.fy;
  if(tx < 0 || ty < 0 || tx >= MW || ty >= MH) return;
  var t = map[ty*MW + tx];
  if(t === T_SWORD){
    map[ty*MW + tx] = T_GRASS;
    if(player.hasSword){
      sndChime(false);
      say('another blade, point-down in the moss. yours is better. you leave it standing in memory.');
    } else {
      player.hasSword = true;
      sndChime(true);
      heartsUi();
      saveState();
      say(['a sword, point-down in the earth. rust only on the guard.',
           'you draw it. the woods go quiet for one breath.',
           'the shades will mind you now. (' + keyLabel(binds.attack) + ' to swing)']);
    }

  }
  if(t === T_ALTAR){
    if(!altarFound){
      altarFound = true;

    } else {
      sndChime(false);
      say('the altar. it remembers you now.');
    }
    return;
  }
  var pool = t === T_TREE ? biome.lore : LORE[t];
  if(pool){
    sndChime(false);
    say(pool[Math.floor(hash2(seedNum, tx, ty) * pool.length)]);
  }
}

/* ── combat ── */
function frozen(){
  /* only true modal layers halt the world — the status dialog is non-blocking,
     so walking with a line of moss-lore still on screen works fine */
  return document.getElementById('menu').classList.contains('show') ||
         remapEl.classList.contains('show');
}
function attack(){
  if(frozen() || !map) return;
  var now = performance.now();
  if(now < player.atkCd) return;
  /* no blade yet? you still have fists: slow, feeble, but they stagger */
  var armed = player.hasSword;
  player.atkCd = now + (armed ? 300 : 750);
  player.swingT = now;
  player.swingFist = !armed;
  sndSwing(!armed);
  if(!armed && !player._fistNoted){
    player._fistNoted = true;
    say('bare knuckles. they will do — barely. the woods hold a better answer.');
  }
  for(var i = 0; i < enemies.length; i++){
    var e = enemies[i];
    if(e.dead) continue;
    var dx = e.x - player.x, dy = e.y - player.y;
    var dist = Math.hypot(dx, dy);
    if(dist > (armed ? 12 : 9)) continue;
    if(dx * player.fx + dy * player.fy < -1) continue;   /* only in front */
    e.hp -= armed ? 1 : 0.5;
    e.hurtUntil = now + (armed ? 260 : 520);   /* the punch stuns longer than it hurts */
    var kn = (armed ? (e.type === 'brute' ? 10 : 26) : (e.type === 'brute' ? 5 : 13)) / Math.max(1, dist);
    e.kx = dx * kn; e.ky = dy * kn;
    if(e.hp <= 0){
      e.dead = true; e.deadT = 0;
      for(var pp = 0; pp < 6; pp++) poofs.push({ x: e.x, y: e.y, vx: (Math.random()-0.5)*30, vy: (Math.random()-0.5)*30 - 10, life: 0.5 });
      sndThud(true);
    } else {
      sndThud(false);
    }
  }
}
function hurtPlayer(now){
  if(now < player.hurtUntil) return false;
  player.hp--;
  player.hurtUntil = now + 1100;
  heartsUi();
  sndThud(true);
  if(player.hp <= 0){
    player.x = (spawn.x + 0.5) * TILE;
    player.y = (spawn.y + 0.5) * TILE;
    player.hp = 3;
    player.hurtUntil = now + 1600;
    heartsUi();
    say(['the forest closes over you.', 'you wake at the edge of the woods. it kept your footsteps.']);
  }
  return true;
}
function updateEnemies(dt, now){
  for(var i = enemies.length - 1; i >= 0; i--){
    var e = enemies[i];
    if(e.dead){
      e.deadT += dt;
      if(e.deadT > 0.4) enemies.splice(i, 1);
      continue;
    }
    if(now < e.hurtUntil){
      var nx2 = e.x + e.kx * dt * 8, ny2 = e.y + e.ky * dt * 8;
      if(!solidAt(nx2, e.y)) e.x = nx2;
      if(!solidAt(e.x, ny2)) e.y = ny2;
      continue;
    }
    var dx = player.x - e.x, dy = player.y - e.y;
    var dist = Math.hypot(dx, dy);
    var sp;
    if(dist < (e.type === 'stalker' ? 60 : 46) && dist > 0.1){
      sp = 26 + depth * 2 + biome.foe.spd;
      if(e.type === 'stalker'){
        if(dist < 30 && now > e.lungeCd){ e.lungeUntil = now + 700; e.lungeCd = now + 2400; }
        sp = now < e.lungeUntil ? sp * 2.4 : sp * 0.72;
      } else if(e.type === 'brute'){
        sp = sp * 0.55;
      }
      e.vx = dx / dist * sp; e.vy = dy / dist * sp;
    } else {
      e.wanderT -= dt;
      if(e.wanderT <= 0){
        e.wanderT = 1 + Math.random() * 2.2;
        var a2 = Math.random() * 6.28;
        sp = Math.random() < 0.3 ? 0 : 13;
        e.vx = Math.cos(a2) * sp; e.vy = Math.sin(a2) * sp;
      }
    }
    var nx = e.x + e.vx * dt, ny = e.y + e.vy * dt;
    if(!solidAt(nx, e.y - 2) && !solidAt(nx, e.y + 2)) e.x = nx; else e.vx *= -1;
    if(!solidAt(e.x - 2, ny) && !solidAt(e.x + 2, ny)) e.y = ny; else e.vy *= -1;
    /* keep shades out of the ruin — old stones, old rules */
    var tx = Math.floor(e.x / TILE), ty = Math.floor(e.y / TILE);
    if(tx >= ruin.x && tx < ruin.x + 8 && ty >= ruin.y && ty < ruin.y + 6){ e.vx *= -1; e.vy *= -1; }
    if(dist < (e.type === 'brute' ? 7 : 5.5)){
      var landed = hurtPlayer(now);
      /* a lunge that connects rattles the whole forest */
      if(landed && e.type === 'stalker' && now < e.lungeUntil && !reduceMotion) shakeUntil = now + 280;
      if(e.type === 'brute' && dist > 0.1){
        /* brutes shove — thrown back a full stride if the ground allows it */
        var shx = player.x + dx / dist * 22, shy = player.y + dy / dist * 22;
        if(!wadeAt(shx, shy)){ player.x = shx; player.y = shy; }
      }
    }
  }
}

/* ── touch ── */
var tc = { up:false, down:false, left:false, right:false };
function hold(id, prop){
  var el = document.getElementById(id);
  el.addEventListener('pointerdown', function(e){ e.preventDefault(); tc[prop] = true; });
  ['pointerup','pointercancel','pointerleave'].forEach(function(ev){
    el.addEventListener(ev, function(){ tc[prop] = false; });
  });
}
hold('dU','up'); hold('dD','down'); hold('dL','left'); hold('dR','right');
document.getElementById('tcE').addEventListener('pointerdown', function(e){ e.preventDefault(); use(); });
document.getElementById('tcA').addEventListener('pointerdown', function(e){ e.preventDefault(); attack(); });

/* ── movement / collision ── */
function solidAt(px, py){
  var tx = Math.floor(px / TILE), ty = Math.floor(py / TILE);
  if(tx < 0 || ty < 0 || tx >= MW || ty >= MH) return true;
  return !!SOLID[map[ty*MW + tx]];
}
/* the player can swim: water blocks shades, not you */
function wadeAt(px, py){
  var tx = Math.floor(px / TILE), ty = Math.floor(py / TILE);
  if(tx < 0 || ty < 0 || tx >= MW || ty >= MH) return true;
  var t = map[ty*MW + tx];
  return !!SOLID[t] && t !== T_WATER;
}
function tryMove(dx, dy, dt){
  var mult = player.inWater ? 0.45 : 1;
  var nx = player.x + dx * SPEED * mult * dt;
  var ny = player.y + dy * SPEED * mult * dt;
  var r = 2.6;
  if(!wadeAt(nx - r, player.y - r) && !wadeAt(nx + r, player.y - r) &&
     !wadeAt(nx - r, player.y + r) && !wadeAt(nx + r, player.y + r)) player.x = nx;
  if(!wadeAt(player.x - r, ny - r) && !wadeAt(player.x + r, ny - r) &&
     !wadeAt(player.x - r, ny + r) && !wadeAt(player.x + r, ny + r)) player.y = ny;
}

/* ── tile painters ── */
function pr(x, y, w, h, col){ ctx.fillStyle = col; ctx.fillRect(x, y, w, h); }
function drawTile(t, sx, sy, gx, gy, time){
  var h = hash2(seedNum + 31, gx, gy);
  var B = biome;
  switch(t){
    case T_WATER:
      pr(sx, sy, 8, 8, B.water);
      if(((gx + gy + Math.floor(time*0.0016)) % 5) === 0) pr(sx + (gx%4), sy + (gy%5), 2, 1, B.glint);
      break;
    case T_SHORE:
      pr(sx, sy, 8, 8, B.shore);
      pr(sx + 1 + (h*4|0), sy + 3, 1, 1, B.shoreDot);
      break;
    case T_TREE:
      pr(sx, sy, 8, 8, B.grass);
      drawTree(B, sx, sy, h);
      break;
    case T_ROCK:
      pr(sx, sy, 8, 8, B.grass);
      pr(sx + 1, sy + 2, 6, 5, '#928d7d');
      pr(sx + 2, sy + 3, 3, 2, '#b0aa98');
      pr(sx + 2, sy + 6, 4, 1, '#6a6456');
      break;
    case T_FLOWER:
      pr(sx, sy, 8, 8, B.grass);
      pr(sx + 2, sy + 2, 1, 1, '#e8e0d0'); pr(sx + 5, sy + 4, 1, 1, '#f4c9dc');
      pr(sx + 3, sy + 5, 1, 1, '#e8e0d0'); pr(sx + 5, sy + 1, 1, 1, '#ffd98a');
      break;
    case T_SHROOM:
      pr(sx, sy, 8, 8, B.grass);
      pr(sx + 3, sy + 4, 2, 2, '#e3d8bd');
      pr(sx + 2, sy + 2, 4, 2, '#cc5340');
      pr(sx + 3, sy + 2, 1, 1, '#e8e0d0');
      break;
    case T_TGRASS:
      pr(sx, sy, 8, 8, B.grass);
      pr(sx + 1, sy + 3, 1, 4, B.tg1); pr(sx + 4, sy + 2, 1, 5, B.tg2); pr(sx + 6, sy + 4, 1, 3, B.tg1);
      break;
    case T_HUT:
      pr(sx, sy, 8, 8, B.grass);
      pr(sx + 1, sy + 3, 6, 4, '#7a5c3a');
      pr(sx + 3, sy + 4, 2, 3, '#3a2a18');
      pr(sx, sy + 1, 8, 3, B.tDark);
      pr(sx + 1, sy + 1, 6, 1, B.tMid);
      break;
    case T_WELL:
      pr(sx, sy, 8, 8, B.grass);
      pr(sx + 1, sy + 2, 6, 5, '#928d7d');
      pr(sx + 2, sy + 3, 4, 3, '#14141a');
      pr(sx + 1, sy + 1, 1, 2, '#5a432a'); pr(sx + 6, sy + 1, 1, 2, '#5a432a');
      pr(sx + 1, sy + 1, 6, 1, '#6a4a2a');
      break;
    case T_SWORD:
      pr(sx, sy, 8, 8, B.grass);
      pr(sx + 2, sy + 6, 4, 2, '#928d7d');           /* stone it stands in */
      pr(sx + 3, sy + 6, 2, 1, '#b0aa98');
      pr(sx + 3, sy + 1, 1, 5, '#c8d0d8');           /* blade */
      pr(sx + 4, sy + 1, 1, 5, '#8a949e');
      pr(sx + 2, sy + 4, 4, 1, '#6a4a2a');           /* guard */
      pr(sx + 3, sy + 3, 2, 1, '#5a432a');
      var swPulse = 0.4 + 0.5 * Math.sin(time * 0.004 + gx);
      ctx.globalAlpha = Math.max(0, swPulse);
      pr(sx + 3, sy, 2, 1, '#e8f0dc');               /* the glint that calls you */
      ctx.globalAlpha = 1;
      break;
    case T_SLAB:
      pr(sx, sy, 8, 8, '#9b9584');
      pr(sx, sy, 8, 1, '#b0aa98');
      pr(sx + (gx%2)*4, sy + 4, 1, 3, '#847e6f');
      if(h < 0.25) pr(sx + 2, sy + 2, 2, 1, '#77985f');
      break;
    case T_WALL:
      pr(sx, sy, 8, 8, '#726d61');
      pr(sx, sy, 8, 2, '#928d7d');
      pr(sx + 1, sy + 3, 2, 1, '#575249'); pr(sx + 5, sy + 5, 2, 1, '#575249');
      if(h < 0.4) pr(sx, sy + 6, 3, 2, '#5f8850');
      break;
    case T_PILLAR:
      pr(sx, sy, 8, 8, B.grass);
      pr(sx + 2, sy, 4, 8, '#9b9584');
      pr(sx + 1, sy, 6, 2, '#b0aa98');
      pr(sx + 3, sy + 4, 1, 3, '#787265');
      break;
    case T_RUBBLE:
      pr(sx, sy, 8, 8, B.grass);
      pr(sx + 1, sy + 4, 3, 3, '#928d7d');
      pr(sx + 5, sy + 2, 2, 2, '#9b9584');
      pr(sx + 4, sy + 6, 2, 1, '#726d61');
      break;
    case T_ALTAR:
      pr(sx, sy, 8, 8, '#9b9584');
      pr(sx + 1, sy + 2, 6, 4, '#b3ac96');
      pr(sx + 2, sy + 3, 4, 2, '#c6bca0');
      if(!altarFound){
        var pulse = 0.5 + 0.5*Math.sin(time*0.004);
        ctx.globalAlpha = 0.35 + pulse*0.4;
        pr(sx + 3, sy + 1, 2, 1, '#ffd98a');
        ctx.globalAlpha = 1;
      }
      break;
    case T_PORTAL:
      pr(sx, sy, 8, 8, '#9b9584');
      pr(sx + 1, sy + 1, 6, 6, '#241a3d');
      for(var pk = 0; pk < 4; pk++){
        var pa = time*0.003 + pk*1.57;
        pr(sx + 4 + Math.round(Math.cos(pa)*2), sy + 4 + Math.round(Math.sin(pa)*2), 1, 1, pk % 2 ? '#b48aff' : '#e8d0ff');
      }
      pr(sx + 3, sy + 3, 2, 2, '#4a2a8a');
      break;
    default: /* grass */
      pr(sx, sy, 8, 8, B.grass);
      if(h < 0.3) pr(sx + (h*20|0)%6 + 1, sy + (h*40|0)%6 + 1, 1, 1, B.dot);
  }
}

/* ── render ── */
function render(time){
  var shaking = time < shakeUntil;
  if(shaking){
    pr(0, 0, VW*TILE, VH*TILE, '#0a120c');   /* backfill so shake gaps stay dark */
    var sa = 3.5 * (shakeUntil - time) / 280;
    ctx.save();
    ctx.translate(Math.round((Math.random()*2 - 1) * sa), Math.round((Math.random()*2 - 1) * sa));
  }
  var camX = Math.max(0, Math.min(MW - VW, player.x/TILE - VW/2));
  var camY = Math.max(0, Math.min(MH - VH, player.y/TILE - VH/2));
  var ox = Math.floor(camX), oy = Math.floor(camY);
  var fx = (camX - ox) * TILE, fy = (camY - oy) * TILE;
  for(var y = 0; y <= VH; y++){
    for(var x = 0; x <= VW; x++){
      var gx = ox + x, gy = oy + y;
      if(gx >= MW || gy >= MH) continue;
      drawTile(map[gy*MW + gx], Math.round(x*TILE - fx), Math.round(y*TILE - fy), gx, gy, time);
    }
  }
  /* enemies: forest shades */
  var nowT = time;
  for(var ei = 0; ei < enemies.length; ei++){
    var e = enemies[ei];
    var ex = Math.round(e.x - camX*TILE), ey = Math.round(e.y - camY*TILE);
    if(ex < -8 || ey < -8 || ex > VW*TILE + 8 || ey > VH*TILE + 8) continue;
    if(e.dead){
      ctx.globalAlpha = Math.max(0, 1 - e.deadT/0.4);
      pr(ex - 1, ey - 1, 3, 3, biome.foe.core);
      ctx.globalAlpha = 1;
      continue;
    }
    var hurt = nowT < e.hurtUntil && (Math.floor(nowT/60) % 2 === 0);
    var eb = Math.round(Math.sin(nowT*0.004 + e.ph));
    var bodyC = hurt ? '#e8f0dc' : biome.foe.body;
    var coreC = hurt ? '#e8f0dc' : biome.foe.core;
    if(e.type === 'brute'){
      /* wide, horned, unhurried */
      pr(ex - 3, ey + 3, 7, 1, 'rgba(0,0,0,0.35)');
      pr(ex - 3, ey - 2 + eb, 7, 5, bodyC);
      pr(ex - 2, ey - 4 + eb, 5, 3, coreC);
      pr(ex - 3, ey - 5 + eb, 1, 2, bodyC); pr(ex + 3, ey - 5 + eb, 1, 2, bodyC);   /* horns */
      if(!hurt){
        pr(ex - 1, ey - 3 + eb, 1, 1, biome.foe.eye);
        pr(ex + 1, ey - 3 + eb, 1, 1, biome.foe.eye);
      }
    } else if(e.type === 'stalker'){
      /* thin, tall, one bright eye — freezes then lunges */
      var lunging = nowT < e.lungeUntil;
      pr(ex - 1, ey + 3, 3, 1, 'rgba(0,0,0,0.3)');
      pr(ex - 1, ey - 4 + eb, 3, 7, bodyC);
      pr(ex - 1, ey - 5 + eb, 3, 2, coreC);
      if(!hurt) pr(ex, ey - 4 + eb, 1, 1, lunging ? '#ffffff' : biome.foe.eye);
    } else {
      pr(ex - 2, ey + 2, 5, 1, 'rgba(0,0,0,0.3)');
      pr(ex - 2, ey - 2 + eb, 5, 4, bodyC);
      pr(ex - 1, ey - 3 + eb, 3, 2, coreC);
      if(!hurt){
        pr(ex - 1, ey - 1 + eb, 1, 1, biome.foe.eye);
        pr(ex + 1, ey - 1 + eb, 1, 1, biome.foe.eye);
      }
    }
  }
  /* poofs */
  for(var qi = poofs.length - 1; qi >= 0; qi--){
    var q = poofs[qi];
    q.x += q.vx * 0.016; q.y += q.vy * 0.016;
    q.life -= 0.016;
    if(q.life <= 0){ poofs.splice(qi, 1); continue; }
    ctx.globalAlpha = q.life * 2;
    pr(Math.round(q.x - camX*TILE), Math.round(q.y - camY*TILE), 1, 1, biome.foe.eye);
    ctx.globalAlpha = 1;
  }
  /* player sprite */
  var px = Math.round(player.x - camX*TILE), py = Math.round(player.y - camY*TILE);
  var invuln = nowT < player.hurtUntil && (Math.floor(nowT/90) % 2 === 0);
  if(invuln){ ctx.globalAlpha = 0.35; }
  var bob = player.moving ? (Math.floor(player.walkT*6) % 2) : 0;
  if(player.inWater){
    /* swimming: half-submerged, ripple rings instead of a shadow */
    var rp = 0.5 + 0.5 * Math.sin(nowT * 0.006);
    ctx.globalAlpha = (invuln ? 0.35 : 1) * (0.35 + rp * 0.3);
    pr(px - 4, py + 1, 9, 1, '#3d8f9a');
    pr(px - 3, py + 2, 7, 1, 'rgba(232,240,220,0.4)');
    ctx.globalAlpha = invuln ? 0.35 : 1;
    pr(px - 2, py - 2 - bob, 5, 2, '#c46a3a');        /* shoulders above the water */
    pr(px - 1, py - 4 - bob, 3, 3, '#e8c49a');        /* head */
    pr(px - 2, py - 5 - bob, 5, 2, '#6a4a2a');        /* hood */
  } else {
    pr(px - 2, py + 3, 5, 2, 'rgba(0,0,0,0.35)');
    pr(px - 2, py - 3 - bob, 5, 4, '#c46a3a');          /* cloak */
    pr(px - 1, py - 5 - bob, 3, 3, '#e8c49a');          /* head */
    pr(px - 2, py - 6 - bob, 5, 2, '#6a4a2a');          /* hood */
    pr(px + (player.fx >= 0 ? 1 : -2), py - 1 - bob, 1, 2, '#8a4a28');  /* satchel hints facing */
  }
  ctx.globalAlpha = 1;
  /* swing arc: blade sweep, or a stubby fist jab */
  var swp = (nowT - player.swingT) / (player.swingFist ? 220 : 140);
  if(swp >= 0 && swp <= 1){
    var baseA = Math.atan2(player.fy, player.fx);
    if(player.swingFist){
      var jab = Math.sin(swp * Math.PI) * 6;
      pr(Math.round(px + Math.cos(baseA)*jab) - 1, Math.round(py - 2 + Math.sin(baseA)*jab) - 1, 2, 2, '#e8c49a');
    } else {
      var sa = baseA + (swp - 0.5) * 1.7;
      pr(Math.round(px + Math.cos(sa)*7) - 1, Math.round(py - 2 + Math.sin(sa)*7) - 1, 2, 2, '#e8f0dc');
      pr(Math.round(px + Math.cos(sa)*5), Math.round(py - 2 + Math.sin(sa)*5), 1, 1, '#b8c8a8');
    }
  }
  /* pulsing E-prompt when facing something worth touching */
  var ftx = Math.floor(player.x / TILE) + player.fx;
  var fty = Math.floor(player.y / TILE) + player.fy;
  if(ftx >= 0 && fty >= 0 && ftx < MW && fty < MH){
    var ft = map[fty*MW + ftx];
    if(ft === T_ALTAR || ft === T_SWORD || ft === T_PORTAL || ft === T_WELL || ft === T_HUT){
      var bx = Math.round((ftx + 0.5) * TILE - camX * TILE);
      var by = Math.round(fty * TILE - camY * TILE) - 4;
      ctx.globalAlpha = reduceMotion ? 0.9 : 0.5 + 0.45 * Math.sin(time * 0.007);
      var lab = keyLabel(binds.use).slice(0, 3);
      var bw = 4 + lab.length * 4;
      pr(bx - (bw >> 1) - 1, by - 8, bw + 2, 9, '#0a120c');          /* square badge */
      pr(bx - (bw >> 1), by - 7, bw, 7, '#1c2e1e');
      ctx.fillStyle = '#ffd98a';
      ctx.font = '7px "VT323", monospace';
      ctx.textAlign = 'center';
      ctx.fillText(lab, bx, by - 1);
      ctx.globalAlpha = 1;
    }
  }
  /* fireflies at the ruin */
  if(!reduceMotion && ruin){
    for(var i = 0; i < 3; i++){
      var flx = (ruin.x + 4 + Math.sin(time*0.001 + i*2.1)*3) * TILE - camX*TILE;
      var fly = (ruin.y + 2.5 + Math.cos(time*0.0013 + i*1.7)*2) * TILE - camY*TILE;
      if(flx > 0 && flx < VW*TILE && fly > 0 && fly < VH*TILE){
        ctx.globalAlpha = 0.4 + 0.4*Math.sin(time*0.006 + i*3);
        pr(Math.round(flx), Math.round(fly), 1, 1, '#ffd98a');
        ctx.globalAlpha = 1;
      }
    }
  }
  if(shaking) ctx.restore();
}

/* ── loop ── */
var last = performance.now();
function frame(now){
  requestAnimationFrame(frame);
  var dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  if(map && !frozen()){
    var dx = (keys[binds.right] || tc.right ? 1 : 0) - (keys[binds.left] || tc.left ? 1 : 0);
    var dy = (keys[binds.down] || tc.down ? 1 : 0) - (keys[binds.up] || tc.up ? 1 : 0);
    player.moving = !!(dx || dy);
    if(player.moving){
      if(dx || dy){ player.fx = dx !== 0 ? dx : 0; player.fy = dx !== 0 ? 0 : dy; }
      var m = dx && dy ? 0.7071 : 1;
      tryMove(dx*m, dy*m, dt);
      player.walkT += dt;
      sndStep(player.inWater);
    }
    /* swimming: slow, and the cold drains a heart every few seconds */
    var wasInWater = player.inWater;
    player.inWater = map[Math.floor(player.y/TILE)*MW + Math.floor(player.x/TILE)] === T_WATER;
    if(player.inWater){
      if(!wasInWater && !player._coldWarned){
        player._coldWarned = true;
        say('the water takes you. it is colder than it looks — do not linger.');
      }
      player.swimAcc = (player.swimAcc || 0) + dt;
      if(player.swimAcc >= 4.5){
        player.swimAcc = 0;
        player.hurtUntil = 0;           /* the cold ignores i-frames */
        hurtPlayer(now);
      }
      /* the red climbs with the cold: swim progress + hearts already lost */
      var prog = Math.min(1, player.swimAcc / 4.5);
      var missing = (3 - player.hp) / 3;
      drownEl.style.setProperty('--climb', Math.min(95, 18 + prog * 48 + missing * 28) + '%');
      drownEl.style.opacity = String(Math.min(0.95, 0.3 + prog * 0.5 + missing * 0.2));
    } else {
      player.swimAcc = 0;
      drownEl.style.opacity = '0';
    }
    updateEnemies(dt, now);
    /* stepping into the portal */
    var ut = map[Math.floor(player.y/TILE)*MW + Math.floor(player.x/TILE)];
    if(ut === T_PORTAL && now > travelCd){
      travelCd = now + 1500;
      sndPortal();
      generate(seedStr, depth + 1, true);
      saveState();
      say('world ' + (depth + 1) + ' — ' + biome.name + '. ' + biome.foe.name + ' move between the trees.');
    }
  } else {
    player.moving = false;
  }
  if(map) render(now);
}
requestAnimationFrame(frame);

/* ── save-state: the woods remember where you stood ── */
function saveState(){
  if(!map) return;
  try{
    localStorage.setItem('ruinwood-save-v1', JSON.stringify({
      seed: seedStr, depth: depth,
      x: Math.round(player.x), y: Math.round(player.y),
      hp: player.hp, sword: player.hasSword, altar: altarFound
    }));
  }catch(e){}
}
function loadSave(){
  try{
    var s = JSON.parse(localStorage.getItem('ruinwood-save-v1'));
    if(s && typeof s.seed === 'string' && s.seed && typeof s.depth === 'number' &&
       s.depth >= 0 && s.depth < 60 && typeof s.x === 'number' && typeof s.y === 'number') return s;
  }catch(e){}
  return null;
}
setInterval(function(){ if(map && !frozen()) saveState(); }, 5000);

/* ── fading keyboard hints ── */
var hintbar = document.getElementById('hintbar');
var hintT = 0;
function showHints(){
  hintbar.textContent =
    keyLabel(binds.up) + keyLabel(binds.left) + keyLabel(binds.down) + keyLabel(binds.right) +
    ' wander · ' + keyLabel(binds.use) + ' examine · ' + keyLabel(binds.attack) + ' strike';
  hintbar.hidden = false;
  hintbar.classList.remove('gone');
  clearTimeout(hintT);
  hintT = setTimeout(fadeHints, 8000);
}
function fadeHints(){
  clearTimeout(hintT);
  hintbar.classList.add('gone');
}

/* ── menu wiring ── */
var menuEl = document.getElementById('menu');
function showTouch(){
  if(!coarse) return;
  document.getElementById('dpad').classList.add('show');
  document.getElementById('tcE').classList.add('show');
  document.getElementById('tcA').classList.add('show');
}
function grow(str){
  player.hasSword = false;   /* a new world means a new blade to find */
  player.swimAcc = 0;
  generate((str || randSeed()).toUpperCase());
  menuEl.classList.remove('show');
  showTouch();
  showHints();
  saveState();
  say('the woods of ' + seedStr + '. something old waits inside.');
}
function continueGame(){
  var s = loadSave();
  if(!s) return;
  player.hasSword = false;
  player.swimAcc = 0;
  /* replay the portal chain so deep worlds regrow exactly (biome pick
     depends on the previous world's roll) */
  for(var d = 0; d <= s.depth; d++) generate(s.seed, d, d > 0);
  if(!wadeAt(s.x, s.y)){ player.x = s.x; player.y = s.y; }
  player.hp = Math.min(3, Math.max(1, s.hp | 0));
  player.hasSword = !!s.sword;
  altarFound = !!s.altar;
  heartsUi();
  menuEl.classList.remove('show');
  showTouch();
  showHints();
  say('the woods of ' + seedStr + (depth > 0 ? ', world ' + (depth + 1) : '') + '. they remember where you stood.');
}
function refreshContinue(){
  var s = loadSave();
  var row = document.getElementById('continueRow');
  row.hidden = !s;
  if(s) document.getElementById('btnContinue').textContent =
    '↩ continue ' + s.seed + (s.depth > 0 ? ' · world ' + (s.depth + 1) : '');
}
document.getElementById('btnContinue').addEventListener('click', continueGame);
document.getElementById('btnGrow').addEventListener('click', function(){
  grow(document.getElementById('seedIn').value.trim());
});
document.getElementById('btnLucky').addEventListener('click', function(){ grow(); });
document.getElementById('btnNew').addEventListener('click', function(){
  document.getElementById('seedIn').value = '';
  refreshContinue();
  menuEl.classList.add('show');
});
document.getElementById('seedIn').addEventListener('keydown', function(e){
  if(e.key === 'Enter') grow(e.target.value.trim());
});
try{
  var lastSeed = localStorage.getItem('ruinwood-seed');
  if(lastSeed) document.getElementById('seedIn').value = lastSeed;
}catch(e){}
(function(){
  var ua = navigator.userAgent || '';
  var note = document.getElementById('browserNote');
  if(/Firefox|Waterfox/i.test(ua)){
    note.textContent = 'Firefox / Waterfox: click the forest once when it loads so movement keys go to the game, not the find-bar.';
    note.hidden = false;
  }
})();
refreshBinds();
refreshContinue();
})();
</script>
