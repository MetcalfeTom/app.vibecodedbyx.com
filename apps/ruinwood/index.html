<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ruinwood</title>
<meta name="description" content="A pixel forest grown from a seed — wander the woods, find the one ruin, read what the moss remembers.">
<link rel="icon" href="https://emojicdn.elk.sh/🌲">
<meta property="og:title" content="Ruinwood">
<meta property="og:description" content="Every seed grows a different pixel forest. Somewhere in each one: a single ruin. WASD to wander, E to touch.">
<meta property="og:url" content="https://sloppy.live/ruinwood/">
<meta property="og:type" content="website">
<meta property="og:image" content="https://image.pollinations.ai/prompt/cozy%20pixel%20art%20forest%20from%20above%2C%20dense%20green%20trees%2C%20small%20mossy%20stone%20ruin%20clearing%2C%20tiny%20adventurer%20sprite%2C%20warm%20light%2C%20retro%20game%20aesthetic.png?width=1200&height=630&seed=4816&model=flux&nologo=true">
<style>
  :root{
    --night:#0d1410;
    --ink:#e8f0dc;
    --dim:#7a8f74;
    --leaf:#5fae52;
    --moss:#8fc46a;
    --stone:#b8b0a0;
    --glow:#ffd98a;
  }
  html{ font-size:100%; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    font-family:"VT323", monospace;
    background:
      radial-gradient(ellipse 80% 60% at 50% 20%, #16241a 0%, var(--night) 70%);
    color:var(--ink);
    height:100dvh;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  #stage{
    position:relative;
    width:min(100vw, calc(100dvh * 1.5));
    height:min(100dvh, calc(100vw / 1.5));
  }
  canvas#world{
    position:absolute; inset:0;
    width:100%; height:100%;
    image-rendering:pixelated;
    touch-action:none;
  }
  .topbar{
    position:absolute; top:2.5%; left:3%; right:3%;
    display:flex; align-items:center; gap:0.8rem;
    pointer-events:none;
    z-index:5;
  }
  .topbar h1{
    font-family:"Pixelify Sans", "VT323", monospace;
    font-weight:600;
    font-size:clamp(1.1rem, 3.4vw, 1.7rem);
    color:var(--moss);
    text-shadow:2px 2px 0 rgba(0,0,0,0.6);
    letter-spacing:0.04em;
  }
  .seedpill{
    font-size:clamp(0.85rem, 2vw, 1.05rem);
    color:var(--dim);
    background:rgba(10,18,12,0.65);
    border:1px solid rgba(143,196,106,0.35);
    padding:0.15rem 0.7rem;
    border-radius:999px;
  }
  .seedpill b{ color:var(--glow); font-weight:400; }
  .topbtns{ margin-left:auto; display:flex; gap:0.5rem; pointer-events:auto; }
  .topbtns button{
    font-family:inherit;
    font-size:1rem;
    min-height:2.75rem; min-width:2.75rem;
    padding:0.2rem 0.9rem;
    background:rgba(10,18,12,0.75);
    color:var(--ink);
    border:1px solid rgba(143,196,106,0.45);
    border-radius:0.4rem;
    cursor:pointer;
  }
  .topbtns button:hover{ border-color:var(--moss); }
  .topbtns button:focus-visible{ outline:3px solid var(--glow); outline-offset:2px; }
  #dialog{
    position:absolute; left:50%; bottom:4%;
    transform:translateX(-50%);
    width:min(34rem, 92%);
    background:rgba(8,14,10,0.88);
    border:2px solid var(--moss);
    border-radius:0.3rem;
    padding:0.7rem 1rem 0.8rem;
    font-size:clamp(1.05rem, 2.6vw, 1.35rem);
    line-height:1.45;
    display:none;
    z-index:6;
    box-shadow:4px 4px 0 rgba(0,0,0,0.5);
  }
  #dialog.show{ display:block; }
  #dialog .cue{
    text-align:right;
    color:var(--dim);
    font-size:0.85em;
    margin-top:0.2rem;
  }
  .overlay{
    position:absolute; inset:0;
    display:none;
    flex-direction:column;
    align-items:center; justify-content:center;
    text-align:center;
    background:rgba(8,13,9,0.88);
    z-index:10;
    padding:1rem;
  }
  .overlay.show{ display:flex; }
  .overlay h2{
    font-family:"Pixelify Sans", monospace;
    font-weight:700;
    font-size:clamp(2rem, 7vw, 3.6rem);
    color:var(--moss);
    text-shadow:3px 3px 0 rgba(0,0,0,0.6);
  }
  .overlay .tag{
    font-size:clamp(1rem, 2.6vw, 1.3rem);
    color:var(--dim);
    margin:0.4rem 0 1.6rem;
  }
  .row{ display:flex; gap:0.6rem; flex-wrap:wrap; justify-content:center; align-items:center; }
  .overlay input{
    font-family:inherit;
    font-size:1.15rem;
    width:9rem;
    min-height:2.75rem;
    text-align:center;
    background:rgba(232,240,220,0.08);
    border:2px solid rgba(143,196,106,0.5);
    color:var(--glow);
    border-radius:0.3rem;
    text-transform:uppercase;
    letter-spacing:0.15em;
  }
  .overlay input:focus-visible{ outline:3px solid var(--glow); }
  .overlay button{
    font-family:inherit;
    font-size:1.1rem;
    min-height:2.75rem;
    padding:0.3rem 1.4rem;
    background:var(--leaf);
    color:#0c1a0c;
    border:none;
    border-radius:0.3rem;
    cursor:pointer;
    box-shadow:3px 3px 0 rgba(0,0,0,0.5);
  }
  .overlay button.ghost{ background:transparent; color:var(--ink); border:2px solid rgba(232,240,220,0.4); box-shadow:none; }
  .overlay button:focus-visible{ outline:3px solid var(--glow); outline-offset:2px; }
  .overlay .keys-note{
    margin-top:1.6rem;
    font-size:1rem;
    color:var(--dim);
    line-height:1.8;
  }
  kbd{
    display:inline-block;
    border:1px solid var(--dim);
    border-radius:0.2rem;
    padding:0 0.4rem;
    background:rgba(232,240,220,0.08);
    font-family:inherit;
    color:var(--ink);
  }
  .bind-row{
    display:flex; align-items:center; justify-content:space-between;
    gap:1.4rem; margin-bottom:0.5rem;
    width:min(18rem, 90%);
  }
  .bind-row span{ color:var(--dim); font-size:1.05rem; }
  .bindBtn{
    font-family:inherit;
    min-width:6rem; min-height:2.75rem;
    background:rgba(232,240,220,0.08) !important;
    color:var(--ink) !important;
    border:2px solid rgba(143,196,106,0.5) !important;
    box-shadow:none !important;
  }
  .bindBtn.listening{ color:var(--glow) !important; border-color:var(--glow) !important; }
  .tc{ position:absolute; z-index:7; display:none; }
  .tc.show{ display:block; }
  #dpad{ left:4%; bottom:5%; width:9.5rem; height:9.5rem; }
  #dpad button{
    position:absolute;
    width:3rem; height:3rem;
    font-size:1.2rem;
    background:rgba(10,18,12,0.8);
    color:var(--ink);
    border:1px solid rgba(143,196,106,0.5);
    border-radius:0.5rem;
    touch-action:none;
    user-select:none; -webkit-user-select:none;
  }
  #tcE{
    right:5%; bottom:7%;
    width:4.4rem; height:4.4rem;
    border-radius:50%;
    font-family:inherit;
    font-size:1.6rem;
    background:rgba(95,174,82,0.85);
    color:#0c1a0c;
    border:none;
    touch-action:none;
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;600;700&family=VT323&display=swap" rel="stylesheet">
</head>
<body>
<div id="stage">
  <canvas id="world" role="application" aria-label="Ruinwood: a procedurally generated pixel forest. Walk with W A S D, press E to examine what is in front of you. Somewhere in the forest stands a single ruin. Keys can be remapped from the keys button."></canvas>

  <div class="topbar">
    <h1>RUINWOOD</h1>
    <p class="seedpill">seed <b id="seedShow">———</b></p>
    <p class="seedpill" id="hearts" aria-label="Health"></p>
    <div class="topbtns">
      <button type="button" id="btnNew" title="Grow a new world">✦ new world</button>
      <button type="button" id="btnKeys" title="Remap keys">keys</button>
    </div>
  </div>

  <p id="dialog" role="status" aria-live="polite"><span id="dialogText"></span><span class="cue" id="dialogCue"></span></p>

  <div class="overlay show" id="menu" role="dialog" aria-label="World generator">
    <h2>RUINWOOD</h2>
    <p class="tag">every seed grows a different forest.<br>somewhere in each one: a single ruin.</p>
    <div class="row">
      <input id="seedIn" maxlength="8" placeholder="SEED" autocomplete="off" spellcheck="false" aria-label="World seed">
      <button type="button" id="btnGrow">grow world</button>
      <button type="button" id="btnLucky" class="ghost">random seed</button>
    </div>
    <p class="keys-note" id="menuKeys"></p>
  </div>

  <div class="overlay" id="remap" role="dialog" aria-label="Remap keys">
    <h2 style="font-size:clamp(1.4rem,4vw,2.2rem);">KEYS</h2>
    <p class="tag">click a key, press the new binding</p>
    <div id="bindRows"></div>
    <div class="row" style="margin-top:1rem;">
      <button type="button" id="bindDone">done</button>
      <button type="button" id="bindReset" class="ghost">reset defaults</button>
    </div>
  </div>

  <div class="tc" id="dpad" aria-hidden="true">
    <button type="button" id="dU" style="left:3.25rem;top:0;">▲</button>
    <button type="button" id="dL" style="left:0;top:3.25rem;">◀</button>
    <button type="button" id="dR" style="right:0;top:3.25rem;">▶</button>
    <button type="button" id="dD" style="left:3.25rem;bottom:0;">▼</button>
  </div>
  <button type="button" class="tc" id="tcE" aria-label="Examine">E</button>
  <button type="button" class="tc" id="tcA" aria-label="Sword swing" style="right:5%;bottom:24%;width:4.4rem;height:4.4rem;border-radius:50%;font-family:inherit;font-size:1.5rem;background:rgba(196,106,58,0.85);color:#1a0e06;border:none;touch-action:none;">⚔</button>
</div>

<script>
(function(){
'use strict';

/* ── tiles ── */
var T_WATER=0, T_SHORE=1, T_GRASS=2, T_TREE=3, T_ROCK=4, T_FLOWER=5, T_SHROOM=6, T_TGRASS=7,
    T_SLAB=8, T_WALL=9, T_PILLAR=10, T_RUBBLE=11, T_ALTAR=12, T_PORTAL=13;
var SOLID = {};
[T_WATER, T_TREE, T_ROCK, T_WALL, T_PILLAR].forEach(function(t){ SOLID[t] = true; });

var TILE = 8, VW = 30, VH = 20, MW = 72, MH = 52;
var canvas = document.getElementById('world');
var ctx = canvas.getContext('2d');
canvas.width = VW * TILE;   /* 240 */
canvas.height = VH * TILE;  /* 160 */
ctx.imageSmoothingEnabled = false;

var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
var coarse = window.matchMedia('(pointer: coarse)').matches;

/* ── rng / noise ── */
function fnv(str){
  var h = 2166136261;
  for(var i = 0; i < str.length; i++){ h ^= str.charCodeAt(i); h = Math.imul(h, 16777619); }
  return h >>> 0;
}
function mulberry(a){
  return function(){
    a |= 0; a = a + 0x6D2B79F5 | 0;
    var t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function hash2(seed, x, y){
  var n = Math.imul(x, 374761393) + Math.imul(y, 668265263) + Math.imul(seed, 974634321);
  n = Math.imul(n ^ (n >>> 13), 1274126177);
  return ((n ^ (n >>> 16)) >>> 0) / 4294967296;
}
function vnoise(seed, x, y){
  var ix = Math.floor(x), iy = Math.floor(y);
  var fx = x - ix, fy = y - iy;
  var ux = fx*fx*(3-2*fx), uy = fy*fy*(3-2*fy);
  var a = hash2(seed, ix, iy), b = hash2(seed, ix+1, iy);
  var c = hash2(seed, ix, iy+1), d = hash2(seed, ix+1, iy+1);
  return a + (b-a)*ux + (c-a)*uy + (a-b-c+d)*ux*uy;
}
function fbm(seed, x, y, oct){
  var s = 0, amp = 0.5, f = 1, norm = 0;
  for(var i = 0; i < oct; i++){
    s += amp * vnoise(seed + i*7, x*f, y*f);
    norm += amp; f *= 2.03; amp *= 0.5;
  }
  return s / norm;
}

/* ── world gen ── */
var map, seedStr, seedNum, ruin, spawn, altarFound, portal, depth = 0, enemies = [], poofs = [], travelCd = 0;
function randSeed(){
  var A = 'ABCDEFGHJKMNPRTUVWXYZ2346789', out = '';
  for(var i = 0; i < 5; i++) out += A[Math.floor(Math.random()*A.length)];
  return out;
}
function generate(str, d, atPortal){
  seedStr = str;
  depth = d || 0;
  seedNum = fnv(str + '#' + depth);
  var rng = mulberry(seedNum);
  map = new Uint8Array(MW * MH);
  altarFound = false;

  for(var y = 0; y < MH; y++){
    for(var x = 0; x < MW; x++){
      var e = fbm(seedNum, x*0.085, y*0.085, 4);
      /* soft island edge so the woods feel enclosed */
      var dx = (x/MW - 0.5)*2, dy = (y/MH - 0.5)*2;
      e -= Math.max(0, Math.sqrt(dx*dx + dy*dy) - 0.72) * 0.9;
      var t;
      if(e < 0.34) t = T_WATER;
      else if(e < 0.385) t = T_SHORE;
      else {
        var d = fbm(seedNum + 99, x*0.16, y*0.16, 4);
        if(d > 0.6) t = T_TREE;
        else {
          t = T_GRASS;
          var r = hash2(seedNum + 5, x, y);
          if(r < 0.02) t = T_ROCK;
          else if(r < 0.055) t = T_FLOWER;
          else if(r < 0.068) t = T_SHROOM;
          else if(r < 0.16) t = T_TGRASS;
        }
      }
      map[y*MW + x] = t;
    }
  }

  /* the one ruin: find a landlocked clearing candidate */
  ruin = null;
  for(var attempt = 0; attempt < 400 && !ruin; attempt++){
    var rx = 6 + Math.floor(rng() * (MW - 12));
    var ry = 5 + Math.floor(rng() * (MH - 11));
    var ok = true;
    for(var yy = -1; yy <= 6 && ok; yy++)
      for(var xx = -1; xx <= 8 && ok; xx++){
        var t2 = map[(ry+yy)*MW + rx+xx];
        if(t2 === T_WATER || t2 === T_SHORE) ok = false;
      }
    if(ok) ruin = { x: rx, y: ry };
  }
  if(!ruin) ruin = { x: MW >> 1, y: MH >> 1 };
  stampRuin(rng);

  /* spawn: walkable tile, far-ish from the ruin so it must be found */
  spawn = null;
  for(var s = 0; s < 600; s++){
    var sx = 3 + Math.floor(rng() * (MW - 6));
    var sy = 3 + Math.floor(rng() * (MH - 6));
    if(SOLID[map[sy*MW + sx]]) continue;
    var far = Math.hypot(sx - (ruin.x + 4), sy - (ruin.y + 2.5));
    if(far > 22){ spawn = { x: sx, y: sy }; break; }
    if(!spawn && far > 12) spawn = { x: sx, y: sy };
  }
  if(!spawn) spawn = { x: MW >> 1, y: 4 };

  /* roaming shades — more (and quicker) the deeper you go */
  enemies = [];
  poofs = [];
  var wantN = Math.min(24, 12 + depth * 2);
  for(var en = 0; en < 900 && enemies.length < wantN; en++){
    var ex = 2 + Math.floor(rng() * (MW - 4));
    var ey = 2 + Math.floor(rng() * (MH - 4));
    if(SOLID[map[ey*MW + ex]]) continue;
    if(ex >= ruin.x - 1 && ex <= ruin.x + 8 && ey >= ruin.y - 1 && ey <= ruin.y + 6) continue;
    if(Math.hypot(ex - spawn.x, ey - spawn.y) < 9) continue;
    enemies.push({
      x: (ex + 0.5) * TILE, y: (ey + 0.5) * TILE,
      hp: 2, vx: 0, vy: 0, wanderT: rng() * 2,
      hurtUntil: 0, kx: 0, ky: 0, dead: false, deadT: 0,
      ph: rng() * 6.28
    });
  }

  if(atPortal){
    player.x = (portal.x + 0.5) * TILE;
    player.y = (portal.y + 1.5) * TILE;
    player.fx = 0; player.fy = 1;
  } else {
    player.x = (spawn.x + 0.5) * TILE;
    player.y = (spawn.y + 0.5) * TILE;
    player.fx = 0; player.fy = 1;
  }
  player.hp = 3;
  player.hurtUntil = 0;
  heartsUi();
  document.getElementById('seedShow').textContent = seedStr + (depth > 0 ? ' · world ' + (depth + 1) : '');
  try{ localStorage.setItem('ruinwood-seed', seedStr); }catch(e){}
}
function stampRuin(rng){
  var W2 = 8, H2 = 6;
  for(var y = 0; y < H2; y++){
    for(var x = 0; x < W2; x++){
      var gx = ruin.x + x, gy = ruin.y + y;
      var edge = x === 0 || y === 0 || x === W2-1 || y === H2-1;
      var corner = (x === 0 || x === W2-1) && (y === 0 || y === H2-1);
      var t;
      if(corner) t = rng() < 0.75 ? T_PILLAR : T_RUBBLE;
      else if(edge){
        if(y === H2-1 && (x === 3 || x === 4)) t = T_SLAB;          /* the doorway, facing south */
        else t = rng() < 0.62 ? T_WALL : (rng() < 0.5 ? T_RUBBLE : T_SLAB);
      }
      else t = rng() < 0.12 ? T_RUBBLE : T_SLAB;
      map[gy*MW + gx] = t;
    }
  }
  map[(ruin.y + 2)*MW + ruin.x + 3] = T_ALTAR;
  portal = { x: ruin.x + 5, y: ruin.y + 2 };
  map[portal.y*MW + portal.x] = T_PORTAL;
  /* clear a small approach outside the door */
  for(var ay = 1; ay <= 2; ay++)
    for(var ax = 3; ax <= 4; ax++){
      var t3 = map[(ruin.y + H2 - 1 + ay)*MW + ruin.x + ax];
      if(SOLID[t3]) map[(ruin.y + H2 - 1 + ay)*MW + ruin.x + ax] = T_GRASS;
    }
}

/* ── player ── */
var player = { x: 0, y: 0, fx: 0, fy: 1, walkT: 0, moving: false, hp: 3, hurtUntil: 0, swingT: -9999, atkCd: 0 };
var SPEED = 42;

/* ── keys (remappable) ── */
var DEF_BINDS = { up:'w', down:'s', left:'a', right:'d', use:'e', attack:' ' };
var ACTIONS = ['up','down','left','right','use','attack'];
var LABELS = { up:'walk up', down:'walk down', left:'walk left', right:'walk right', use:'examine (E)', attack:'sword swing' };
var binds;
try{ binds = JSON.parse(localStorage.getItem('ruinwood-keys-v1')); }catch(e){}
if(!binds || ACTIONS.some(function(a){ return typeof (binds||{})[a] !== 'string'; })){
  binds = JSON.parse(JSON.stringify(DEF_BINDS));
}
function saveBinds(){ try{ localStorage.setItem('ruinwood-keys-v1', JSON.stringify(binds)); }catch(e){} }
function keyLabel(k){
  var sp = { arrowleft:'◀', arrowright:'▶', arrowup:'▲', arrowdown:'▼', ' ':'SPACE', shift:'SHIFT', enter:'ENTER' };
  return sp[k] || k.toUpperCase();
}
var keys = {};
var listening = null;
document.addEventListener('keydown', function(e){
  if(e.repeat) return;
  var k = e.key.toLowerCase();
  if(listening){
    e.preventDefault();
    if(k !== 'escape'){
      ACTIONS.forEach(function(a){ if(binds[a] === k && a !== listening.a) binds[a] = ''; });
      binds[listening.a] = k;
      saveBinds();
    }
    listening = null;
    refreshBinds();
    return;
  }
  if(['arrowup','arrowdown','arrowleft','arrowright',' '].indexOf(k) >= 0) e.preventDefault();
  keys[k] = true;
  if(k === binds.use) use();
  if(k === binds.attack) attack();
});
document.addEventListener('keyup', function(e){ keys[e.key.toLowerCase()] = false; });
window.addEventListener('blur', function(){ keys = {}; });

/* remap UI */
var remapEl = document.getElementById('remap');
var bindRows = document.getElementById('bindRows');
function refreshBinds(){
  bindRows.querySelectorAll('.bindBtn').forEach(function(b){
    b.classList.remove('listening');
    b.textContent = binds[b.dataset.a] ? keyLabel(binds[b.dataset.a]) : '—';
  });
  document.getElementById('menuKeys').innerHTML =
    '<kbd>' + keyLabel(binds.up) + keyLabel(binds.left) + keyLabel(binds.down) + keyLabel(binds.right) +
    '</kbd> wander · <kbd>' + keyLabel(binds.use) + '</kbd> examine · <kbd>' + keyLabel(binds.attack) + '</kbd> slash · remappable';
}
ACTIONS.forEach(function(a){
  var row = document.createElement('div');
  row.className = 'bind-row';
  var lab = document.createElement('span');
  lab.textContent = LABELS[a];
  var btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'bindBtn';
  btn.dataset.a = a;
  btn.setAttribute('aria-label', 'Rebind ' + LABELS[a]);
  btn.addEventListener('click', function(){
    if(listening && listening.btn) listening.btn.classList.remove('listening');
    listening = { a: a, btn: btn };
    refreshBinds();
    btn.textContent = 'press…';
    btn.classList.add('listening');
  });
  row.appendChild(lab); row.appendChild(btn);
  bindRows.appendChild(row);
});
document.getElementById('btnKeys').addEventListener('click', function(){
  remapEl.classList.add('show');
  refreshBinds();
});
document.getElementById('bindDone').addEventListener('click', function(){ listening = null; remapEl.classList.remove('show'); });
document.getElementById('bindReset').addEventListener('click', function(){
  binds = JSON.parse(JSON.stringify(DEF_BINDS));
  saveBinds(); refreshBinds();
});

function heartsUi(){
  var h = '';
  for(var i = 0; i < 3; i++) h += i < player.hp ? '<span style="color:#e0503a">♥</span>' : '<span style="color:#4a5a44">♡</span>';
  document.getElementById('hearts').innerHTML = h;
}

/* ── audio ── */
var ac = null;
function snd(fn){
  try{
    if(!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
    fn(ac, ac.currentTime);
  }catch(e){}
}
var lastStep = 0;
function sndStep(){
  var now = performance.now();
  if(now - lastStep < 230) return;
  lastStep = now;
  snd(function(a, t){
    var o = a.createOscillator(), g = a.createGain();
    o.type = 'triangle';
    o.frequency.setValueAtTime(140 + Math.random()*50, t);
    g.gain.setValueAtTime(0.05, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.07);
    o.connect(g); g.connect(a.destination);
    o.start(t); o.stop(t + 0.08);
  });
}
function sndSwing(){
  snd(function(a, t){
    var len = a.sampleRate * 0.09 | 0, buf = a.createBuffer(1, len, a.sampleRate), dd = buf.getChannelData(0);
    for(var i = 0; i < len; i++) dd[i] = Math.random()*2 - 1;
    var n = a.createBufferSource(); n.buffer = buf;
    var f = a.createBiquadFilter(); f.type = 'bandpass'; f.Q.value = 1.2;
    f.frequency.setValueAtTime(900, t);
    f.frequency.exponentialRampToValueAtTime(2600, t + 0.08);
    var g = a.createGain();
    g.gain.setValueAtTime(0.12, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.09);
    n.connect(f); f.connect(g); g.connect(a.destination);
    n.start(t); n.stop(t + 0.09);
  });
}
function sndThud(low){
  snd(function(a, t){
    var op = a.createOscillator(), g = a.createGain();
    op.type = 'square';
    op.frequency.setValueAtTime(low ? 110 : 240, t);
    op.frequency.exponentialRampToValueAtTime(low ? 55 : 120, t + 0.09);
    g.gain.setValueAtTime(0.09, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.11);
    op.connect(g); g.connect(a.destination);
    op.start(t); op.stop(t + 0.12);
  });
}
function sndPortal(){
  snd(function(a, t){
    var op = a.createOscillator(), g = a.createGain();
    op.type = 'triangle';
    op.frequency.setValueAtTime(180, t);
    op.frequency.exponentialRampToValueAtTime(1400, t + 0.55);
    g.gain.setValueAtTime(0.12, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
    op.connect(g); g.connect(a.destination);
    op.start(t); op.stop(t + 0.62);
  });
}
function sndChime(deep){
  snd(function(a, t){
    [0, 4, 7].forEach(function(st, i){
      var o = a.createOscillator(), g = a.createGain();
      o.type = 'triangle';
      o.frequency.value = (deep ? 220 : 440) * Math.pow(2, st/12);
      g.gain.setValueAtTime(0.0001, t + i*0.09);
      g.gain.linearRampToValueAtTime(0.07, t + i*0.09 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t + i*0.09 + 0.8);
      o.connect(g); g.connect(a.destination);
      o.start(t + i*0.09); o.stop(t + i*0.09 + 0.85);
    });
  });
}

/* ── dialog ── */
var dialogEl = document.getElementById('dialog');
var dialogQueue = [];
function say(lines){
  dialogQueue = Array.isArray(lines) ? lines.slice() : [lines];
  nextLine();
}
function nextLine(){
  if(!dialogQueue.length){
    dialogEl.classList.remove('show');
    return;
  }
  document.getElementById('dialogText').textContent = dialogQueue.shift();
  document.getElementById('dialogCue').textContent = dialogQueue.length ? '▼ ' + keyLabel(binds.use) : '· ' + keyLabel(binds.use);
  dialogEl.classList.add('show');
}
dialogEl.addEventListener('click', nextLine);

/* ── examine ── */
var LORE = {};
LORE[T_TREE] = ['an old pine. it was here first.', 'the bark is rough. something scratched it once.', 'needles whisper overhead.'];
LORE[T_WATER] = ['dark water. the reflection blinks after you do.', 'cold, clear, patient.'];
LORE[T_SHORE] = ['soft mud. old footprints — not yours.'];
LORE[T_FLOWER] = ['small white flowers. they lean toward the ruin.', 'petals like paper. you leave them be.'];
LORE[T_SHROOM] = ['a fat red mushroom. absolutely do not.', 'it smells like rain and bad ideas.'];
LORE[T_ROCK] = ['a mossy boulder. warm on one side.'];
LORE[T_TGRASS] = ['tall grass. something small hurries away.'];
LORE[T_WALL] = ['ruined stonework. the joints were cut by hands.', 'moss holds the wall together now.'];
LORE[T_PILLAR] = ['a broken pillar. the top is missing — look around?'];
LORE[T_RUBBLE] = ['collapsed stone. carvings, worn to hints.'];
LORE[T_SLAB] = ['a paved slab. someone swept this floor, once, for years.'];
LORE[T_GRASS] = ['grass. honest, ordinary grass.'];
LORE[T_PORTAL] = ['a torn seam in the world. the other side smells like a different forest.', 'step in. the next wood is already growing.'];
function use(){
  if(dialogEl.classList.contains('show')){ nextLine(); return; }
  if(document.getElementById('menu').classList.contains('show')) return;
  if(remapEl.classList.contains('show')) return;
  var tx = Math.floor(player.x / TILE) + player.fx;
  var ty = Math.floor(player.y / TILE) + player.fy;
  if(tx < 0 || ty < 0 || tx >= MW || ty >= MH) return;
  var t = map[ty*MW + tx];
  if(t === T_ALTAR){
    if(!altarFound){
      altarFound = true;
      sndChime(true);
      say([
        'a low stone altar, swept clean by wind.',
        'letters survive on its face:',
        '"WE PLANTED THE FOREST TO FORGET. IT GREW TO REMEMBER."',
        'seed ' + seedStr + ' will grow this exact wood again — the ruin will wait for you.'
      ]);
    } else {
      sndChime(false);
      say('the altar. it remembers you now.');
    }
    return;
  }
  var pool = LORE[t];
  if(pool){
    sndChime(false);
    say(pool[Math.floor(hash2(seedNum, tx, ty) * pool.length)]);
  }
}

/* ── combat ── */
function frozen(){
  /* only true modal layers halt the world — the status dialog is non-blocking,
     so walking with a line of moss-lore still on screen works fine */
  return document.getElementById('menu').classList.contains('show') ||
         remapEl.classList.contains('show');
}
function attack(){
  if(frozen() || !map) return;
  var now = performance.now();
  if(now < player.atkCd) return;
  player.atkCd = now + 300;
  player.swingT = now;
  sndSwing();
  for(var i = 0; i < enemies.length; i++){
    var e = enemies[i];
    if(e.dead) continue;
    var dx = e.x - player.x, dy = e.y - player.y;
    var dist = Math.hypot(dx, dy);
    if(dist > 12) continue;
    if(dx * player.fx + dy * player.fy < -1) continue;   /* only in front */
    e.hp--;
    e.hurtUntil = now + 260;
    var kn = 26 / Math.max(1, dist);
    e.kx = dx * kn; e.ky = dy * kn;
    if(e.hp <= 0){
      e.dead = true; e.deadT = 0;
      for(var pp = 0; pp < 6; pp++) poofs.push({ x: e.x, y: e.y, vx: (Math.random()-0.5)*30, vy: (Math.random()-0.5)*30 - 10, life: 0.5 });
      sndThud(true);
    } else {
      sndThud(false);
    }
  }
}
function hurtPlayer(now){
  if(now < player.hurtUntil) return;
  player.hp--;
  player.hurtUntil = now + 1100;
  heartsUi();
  sndThud(true);
  if(player.hp <= 0){
    player.x = (spawn.x + 0.5) * TILE;
    player.y = (spawn.y + 0.5) * TILE;
    player.hp = 3;
    player.hurtUntil = now + 1600;
    heartsUi();
    say(['the forest closes over you.', 'you wake at the edge of the woods. it kept your footsteps.']);
  }
}
function updateEnemies(dt, now){
  for(var i = enemies.length - 1; i >= 0; i--){
    var e = enemies[i];
    if(e.dead){
      e.deadT += dt;
      if(e.deadT > 0.4) enemies.splice(i, 1);
      continue;
    }
    if(now < e.hurtUntil){
      var nx2 = e.x + e.kx * dt * 8, ny2 = e.y + e.ky * dt * 8;
      if(!solidAt(nx2, e.y)) e.x = nx2;
      if(!solidAt(e.x, ny2)) e.y = ny2;
      continue;
    }
    var dx = player.x - e.x, dy = player.y - e.y;
    var dist = Math.hypot(dx, dy);
    var sp;
    if(dist < 46 && dist > 0.1){
      sp = 26 + depth * 2;
      e.vx = dx / dist * sp; e.vy = dy / dist * sp;
    } else {
      e.wanderT -= dt;
      if(e.wanderT <= 0){
        e.wanderT = 1 + Math.random() * 2.2;
        var a2 = Math.random() * 6.28;
        sp = Math.random() < 0.3 ? 0 : 13;
        e.vx = Math.cos(a2) * sp; e.vy = Math.sin(a2) * sp;
      }
    }
    var nx = e.x + e.vx * dt, ny = e.y + e.vy * dt;
    if(!solidAt(nx, e.y - 2) && !solidAt(nx, e.y + 2)) e.x = nx; else e.vx *= -1;
    if(!solidAt(e.x - 2, ny) && !solidAt(e.x + 2, ny)) e.y = ny; else e.vy *= -1;
    /* keep shades out of the ruin — old stones, old rules */
    var tx = Math.floor(e.x / TILE), ty = Math.floor(e.y / TILE);
    if(tx >= ruin.x && tx < ruin.x + 8 && ty >= ruin.y && ty < ruin.y + 6){ e.vx *= -1; e.vy *= -1; }
    if(dist < 5.5) hurtPlayer(now);
  }
}

/* ── touch ── */
var tc = { up:false, down:false, left:false, right:false };
function hold(id, prop){
  var el = document.getElementById(id);
  el.addEventListener('pointerdown', function(e){ e.preventDefault(); tc[prop] = true; });
  ['pointerup','pointercancel','pointerleave'].forEach(function(ev){
    el.addEventListener(ev, function(){ tc[prop] = false; });
  });
}
hold('dU','up'); hold('dD','down'); hold('dL','left'); hold('dR','right');
document.getElementById('tcE').addEventListener('pointerdown', function(e){ e.preventDefault(); use(); });
document.getElementById('tcA').addEventListener('pointerdown', function(e){ e.preventDefault(); attack(); });

/* ── movement / collision ── */
function solidAt(px, py){
  var tx = Math.floor(px / TILE), ty = Math.floor(py / TILE);
  if(tx < 0 || ty < 0 || tx >= MW || ty >= MH) return true;
  return !!SOLID[map[ty*MW + tx]];
}
function tryMove(dx, dy, dt){
  var nx = player.x + dx * SPEED * dt;
  var ny = player.y + dy * SPEED * dt;
  var r = 2.6;
  if(!solidAt(nx - r, player.y - r) && !solidAt(nx + r, player.y - r) &&
     !solidAt(nx - r, player.y + r) && !solidAt(nx + r, player.y + r)) player.x = nx;
  if(!solidAt(player.x - r, ny - r) && !solidAt(player.x + r, ny - r) &&
     !solidAt(player.x - r, ny + r) && !solidAt(player.x + r, ny + r)) player.y = ny;
}

/* ── tile painters ── */
function pr(x, y, w, h, col){ ctx.fillStyle = col; ctx.fillRect(x, y, w, h); }
function drawTile(t, sx, sy, gx, gy, time){
  var h = hash2(seedNum + 31, gx, gy);
  switch(t){
    case T_WATER:
      pr(sx, sy, 8, 8, '#1f5f6b');
      if(((gx + gy + Math.floor(time*0.0016)) % 5) === 0) pr(sx + (gx%4), sy + (gy%5), 2, 1, '#3d8f9a');
      break;
    case T_SHORE:
      pr(sx, sy, 8, 8, '#7a6a48');
      pr(sx + 1 + (h*4|0), sy + 3, 1, 1, '#8f7e5c');
      break;
    case T_TREE:
      pr(sx, sy, 8, 8, h < 0.5 ? '#2b5a30' : '#31672f');
      pr(sx + 1, sy + 1, 6, 5, h < 0.5 ? '#43843f' : '#4c934e');
      pr(sx + 2, sy + 2, 3, 2, h < 0.5 ? '#5aa752' : '#63b85f');
      pr(sx + 3, sy + 6, 2, 2, '#5a432a');
      break;
    case T_ROCK:
      pr(sx, sy, 8, 8, '#436b3c');
      pr(sx + 1, sy + 2, 6, 5, '#928d7d');
      pr(sx + 2, sy + 3, 3, 2, '#b0aa98');
      pr(sx + 2, sy + 6, 4, 1, '#6a6456');
      break;
    case T_FLOWER:
      pr(sx, sy, 8, 8, '#436b3c');
      pr(sx + 2, sy + 2, 1, 1, '#e8e0d0'); pr(sx + 5, sy + 4, 1, 1, '#f4c9dc');
      pr(sx + 3, sy + 5, 1, 1, '#e8e0d0'); pr(sx + 5, sy + 1, 1, 1, '#ffd98a');
      break;
    case T_SHROOM:
      pr(sx, sy, 8, 8, '#436b3c');
      pr(sx + 3, sy + 4, 2, 2, '#e3d8bd');
      pr(sx + 2, sy + 2, 4, 2, '#cc5340');
      pr(sx + 3, sy + 2, 1, 1, '#e8e0d0');
      break;
    case T_TGRASS:
      pr(sx, sy, 8, 8, '#436b3c');
      pr(sx + 1, sy + 3, 1, 4, '#5c9a52'); pr(sx + 4, sy + 2, 1, 5, '#66a959'); pr(sx + 6, sy + 4, 1, 3, '#5c9a52');
      break;
    case T_SLAB:
      pr(sx, sy, 8, 8, '#9b9584');
      pr(sx, sy, 8, 1, '#b0aa98');
      pr(sx + (gx%2)*4, sy + 4, 1, 3, '#847e6f');
      if(h < 0.25) pr(sx + 2, sy + 2, 2, 1, '#77985f');
      break;
    case T_WALL:
      pr(sx, sy, 8, 8, '#726d61');
      pr(sx, sy, 8, 2, '#928d7d');
      pr(sx + 1, sy + 3, 2, 1, '#575249'); pr(sx + 5, sy + 5, 2, 1, '#575249');
      if(h < 0.4) pr(sx, sy + 6, 3, 2, '#5f8850');
      break;
    case T_PILLAR:
      pr(sx, sy, 8, 8, '#436b3c');
      pr(sx + 2, sy, 4, 8, '#9b9584');
      pr(sx + 1, sy, 6, 2, '#b0aa98');
      pr(sx + 3, sy + 4, 1, 3, '#787265');
      break;
    case T_RUBBLE:
      pr(sx, sy, 8, 8, '#4e6045');
      pr(sx + 1, sy + 4, 3, 3, '#928d7d');
      pr(sx + 5, sy + 2, 2, 2, '#9b9584');
      pr(sx + 4, sy + 6, 2, 1, '#726d61');
      break;
    case T_ALTAR:
      pr(sx, sy, 8, 8, '#9b9584');
      pr(sx + 1, sy + 2, 6, 4, '#b3ac96');
      pr(sx + 2, sy + 3, 4, 2, '#c6bca0');
      if(!altarFound){
        var pulse = 0.5 + 0.5*Math.sin(time*0.004);
        ctx.globalAlpha = 0.35 + pulse*0.4;
        pr(sx + 3, sy + 1, 2, 1, '#ffd98a');
        ctx.globalAlpha = 1;
      }
      break;
    case T_PORTAL:
      pr(sx, sy, 8, 8, '#9b9584');
      pr(sx + 1, sy + 1, 6, 6, '#241a3d');
      for(var pk = 0; pk < 4; pk++){
        var pa = time*0.003 + pk*1.57;
        pr(sx + 4 + Math.round(Math.cos(pa)*2), sy + 4 + Math.round(Math.sin(pa)*2), 1, 1, pk % 2 ? '#b48aff' : '#e8d0ff');
      }
      pr(sx + 3, sy + 3, 2, 2, '#4a2a8a');
      break;
    default: /* grass */
      pr(sx, sy, 8, 8, '#436b3c');
      if(h < 0.3) pr(sx + (h*20|0)%6 + 1, sy + (h*40|0)%6 + 1, 1, 1, '#527f49');
  }
}

/* ── render ── */
function render(time){
  var camX = Math.max(0, Math.min(MW - VW, player.x/TILE - VW/2));
  var camY = Math.max(0, Math.min(MH - VH, player.y/TILE - VH/2));
  var ox = Math.floor(camX), oy = Math.floor(camY);
  var fx = (camX - ox) * TILE, fy = (camY - oy) * TILE;
  for(var y = 0; y <= VH; y++){
    for(var x = 0; x <= VW; x++){
      var gx = ox + x, gy = oy + y;
      if(gx >= MW || gy >= MH) continue;
      drawTile(map[gy*MW + gx], Math.round(x*TILE - fx), Math.round(y*TILE - fy), gx, gy, time);
    }
  }
  /* enemies: forest shades */
  var nowT = time;
  for(var ei = 0; ei < enemies.length; ei++){
    var e = enemies[ei];
    var ex = Math.round(e.x - camX*TILE), ey = Math.round(e.y - camY*TILE);
    if(ex < -8 || ey < -8 || ex > VW*TILE + 8 || ey > VH*TILE + 8) continue;
    if(e.dead){
      ctx.globalAlpha = Math.max(0, 1 - e.deadT/0.4);
      pr(ex - 1, ey - 1, 3, 3, '#35482c');
      ctx.globalAlpha = 1;
      continue;
    }
    var hurt = nowT < e.hurtUntil && (Math.floor(nowT/60) % 2 === 0);
    var eb = Math.round(Math.sin(nowT*0.004 + e.ph));
    pr(ex - 2, ey + 2, 5, 1, 'rgba(0,0,0,0.3)');
    pr(ex - 2, ey - 2 + eb, 5, 4, hurt ? '#e8f0dc' : '#2a3a24');
    pr(ex - 1, ey - 3 + eb, 3, 2, hurt ? '#e8f0dc' : '#35482c');
    if(!hurt){
      pr(ex - 1, ey - 1 + eb, 1, 1, '#ffd98a');
      pr(ex + 1, ey - 1 + eb, 1, 1, '#ffd98a');
    }
  }
  /* poofs */
  for(var qi = poofs.length - 1; qi >= 0; qi--){
    var q = poofs[qi];
    q.x += q.vx * 0.016; q.y += q.vy * 0.016;
    q.life -= 0.016;
    if(q.life <= 0){ poofs.splice(qi, 1); continue; }
    ctx.globalAlpha = q.life * 2;
    pr(Math.round(q.x - camX*TILE), Math.round(q.y - camY*TILE), 1, 1, '#8fc46a');
    ctx.globalAlpha = 1;
  }
  /* player sprite */
  var px = Math.round(player.x - camX*TILE), py = Math.round(player.y - camY*TILE);
  var invuln = nowT < player.hurtUntil && (Math.floor(nowT/90) % 2 === 0);
  if(invuln){ ctx.globalAlpha = 0.35; }
  var bob = player.moving ? (Math.floor(player.walkT*6) % 2) : 0;
  pr(px - 2, py + 3, 5, 2, 'rgba(0,0,0,0.35)');
  pr(px - 2, py - 3 - bob, 5, 4, '#c46a3a');          /* cloak */
  pr(px - 1, py - 5 - bob, 3, 3, '#e8c49a');          /* head */
  pr(px - 2, py - 6 - bob, 5, 2, '#6a4a2a');          /* hood */
  pr(px + (player.fx >= 0 ? 1 : -2), py - 1 - bob, 1, 2, '#8a4a28');  /* satchel hints facing */
  ctx.globalAlpha = 1;
  /* sword swing arc */
  var swp = (nowT - player.swingT) / 140;
  if(swp >= 0 && swp <= 1){
    var baseA = Math.atan2(player.fy, player.fx);
    var sa = baseA + (swp - 0.5) * 1.7;
    pr(Math.round(px + Math.cos(sa)*7) - 1, Math.round(py - 2 + Math.sin(sa)*7) - 1, 2, 2, '#e8f0dc');
    pr(Math.round(px + Math.cos(sa)*5), Math.round(py - 2 + Math.sin(sa)*5), 1, 1, '#b8c8a8');
  }
  /* fireflies at the ruin */
  if(!reduceMotion && ruin){
    for(var i = 0; i < 3; i++){
      var flx = (ruin.x + 4 + Math.sin(time*0.001 + i*2.1)*3) * TILE - camX*TILE;
      var fly = (ruin.y + 2.5 + Math.cos(time*0.0013 + i*1.7)*2) * TILE - camY*TILE;
      if(flx > 0 && flx < VW*TILE && fly > 0 && fly < VH*TILE){
        ctx.globalAlpha = 0.4 + 0.4*Math.sin(time*0.006 + i*3);
        pr(Math.round(flx), Math.round(fly), 1, 1, '#ffd98a');
        ctx.globalAlpha = 1;
      }
    }
  }
}

/* ── loop ── */
var last = performance.now();
function frame(now){
  requestAnimationFrame(frame);
  var dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  if(map && !frozen()){
    var dx = (keys[binds.right] || tc.right ? 1 : 0) - (keys[binds.left] || tc.left ? 1 : 0);
    var dy = (keys[binds.down] || tc.down ? 1 : 0) - (keys[binds.up] || tc.up ? 1 : 0);
    player.moving = !!(dx || dy);
    if(player.moving){
      if(dx || dy){ player.fx = dx !== 0 ? dx : 0; player.fy = dx !== 0 ? 0 : dy; }
      var m = dx && dy ? 0.7071 : 1;
      tryMove(dx*m, dy*m, dt);
      player.walkT += dt;
      sndStep();
    }
    updateEnemies(dt, now);
    /* stepping into the portal */
    var ut = map[Math.floor(player.y/TILE)*MW + Math.floor(player.x/TILE)];
    if(ut === T_PORTAL && now > travelCd){
      travelCd = now + 1500;
      sndPortal();
      generate(seedStr, depth + 1, true);
      say('world ' + (depth + 1) + '. a different forest grew from the same name.');
    }
  } else {
    player.moving = false;
  }
  if(map) render(now);
}
requestAnimationFrame(frame);

/* ── menu wiring ── */
var menuEl = document.getElementById('menu');
function grow(str){
  generate((str || randSeed()).toUpperCase());
  menuEl.classList.remove('show');
  if(coarse){
    document.getElementById('dpad').classList.add('show');
    document.getElementById('tcE').classList.add('show');
    document.getElementById('tcA').classList.add('show');
  }
  say('the woods of ' + seedStr + '. something old waits inside.');
}
document.getElementById('btnGrow').addEventListener('click', function(){
  grow(document.getElementById('seedIn').value.trim());
});
document.getElementById('btnLucky').addEventListener('click', function(){ grow(); });
document.getElementById('btnNew').addEventListener('click', function(){
  document.getElementById('seedIn').value = '';
  menuEl.classList.add('show');
});
document.getElementById('seedIn').addEventListener('keydown', function(e){
  if(e.key === 'Enter') grow(e.target.value.trim());
});
try{
  var lastSeed = localStorage.getItem('ruinwood-seed');
  if(lastSeed) document.getElementById('seedIn').value = lastSeed;
}catch(e){}
refreshBinds();
})();
