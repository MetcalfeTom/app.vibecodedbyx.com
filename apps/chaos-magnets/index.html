<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Chaos Magnets</title>
  <link rel="icon" href="https://emojicdn.elk.sh/🧲">
  <meta property="og:title" content="Chaos Magnets">
  <meta property="og:description" content="Neon particles swarm, cluster, and explode by magnetic polarity. Click to spawn chaos.">
  <meta property="og:url" content="https://sloppy.live/chaos-magnets">
  <meta property="og:image" content="https://sloppy.live/chaos-magnets/og-image.png">
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;700&family=Azeret+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #06060e;
      overflow: hidden;
      height: 100dvh;
      font-family: 'Azeret Mono', monospace;
      color: #aab;
      touch-action: none;
      user-select: none;
    }
    canvas { display: block; position: fixed; inset: 0; }
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      z-index: 10;
      pointer-events: none;
      font-size: 12px;
    }
    #hud > div { pointer-events: all; }
    .stat { display: inline-flex; gap: 4px; margin-right: 14px; }
    .stat .label { color: #556; }
    .pos-count { color: #ff3366; text-shadow: 0 0 6px #ff336644; }
    .neg-count { color: #3388ff; text-shadow: 0 0 6px #3388ff44; }
    .neut-count { color: #aabb44; text-shadow: 0 0 6px #aabb4444; }
    .col-count { color: #ff8844; text-shadow: 0 0 6px #ff884444; }
    #controls {
      display: flex; gap: 8px; align-items: center;
    }
    .btn {
      font-family: 'Chakra Petch', sans-serif;
      font-size: 11px; font-weight: 700;
      padding: 5px 12px;
      border: 1px solid #334;
      background: rgba(20,20,35,0.8);
      color: #99a;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all .15s;
    }
    .btn:hover { border-color: #ff3366; color: #ff3366; }
    .btn.active { border-color: #ff3366; color: #ff3366; background: rgba(255,51,102,0.1); }
    .btn.neg.active { border-color: #3388ff; color: #3388ff; background: rgba(51,136,255,0.1); }
    .btn.neg:hover { border-color: #3388ff; color: #3388ff; }
    .btn.neut.active { border-color: #aabb44; color: #aabb44; background: rgba(170,187,68,0.1); }
    .btn.neut:hover { border-color: #aabb44; color: #aabb44; }
    .btn.chaos { border-color: #ff8844; }
    .btn.chaos:hover { border-color: #ff8844; color: #ff8844; }
    #instructions {
      position: fixed;
      bottom: 40px;
      left: 0; right: 0;
      text-align: center;
      font-size: 11px;
      color: #334;
      z-index: 10;
      pointer-events: none;
      transition: opacity .5s;
    }
          </style>
</head>
<body>
  <canvas id="c"></canvas>

  <div id="hud">
    <div id="stats">
      <span class="stat"><span class="label">+</span><span class="pos-count" id="s-pos">0</span></span>
      <span class="stat"><span class="label">−</span><span class="neg-count" id="s-neg">0</span></span>
      <span class="stat"><span class="label">○</span><span class="neut-count" id="s-neut">0</span></span>
      <span class="stat"><span class="label">💥</span><span class="col-count" id="s-col">0</span></span>
    </div>
    <div id="controls">
      <button class="btn active" id="btn-pos" title="Spawn positive">+ POS</button>
      <button class="btn neg" id="btn-neg" title="Spawn negative">− NEG</button>
      <button class="btn neut" id="btn-neut" title="Spawn neutral">○ NEU</button>
      <button class="btn chaos" id="btn-chaos" title="Explode all!">CHAOS</button>
      <button class="btn" id="btn-clear" title="Clear all">CLEAR</button>
    </div>
  </div>

  <div id="instructions">click or drag to spawn · opposite polarities attract · same polarities repel</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

/* ── Config ── */
const MAX_PARTICLES = 500;
const ATTRACT_FORCE = 800;
const REPEL_FORCE = 600;
const DAMPING = 0.985;
const MIN_DIST = 12;
const COLLISION_DIST = 10;
const MERGE_CHANCE = 0.02;

/* ── State ── */
let particles = [];
let sparks = [];
let fieldLines = [];
let collisionCount = 0;
let spawnPolarity = 1; // 1=positive, -1=negative, 0=neutral
let frame = 0;
let instructionTimer = 300;

/* ── Polarity colors ── */
function polarityColor(p, alpha) {
  if (p > 0) return `rgba(255,51,102,${alpha})`;
  if (p < 0) return `rgba(51,136,255,${alpha})`;
  return `rgba(170,187,68,${alpha})`;
}
function polarityHue(p) {
  if (p > 0) return 345;
  if (p < 0) return 215;
  return 65;
}

/* ── Particle ── */
function createParticle(x, y, polarity) {
  return {
    x, y,
    vx: (Math.random() - 0.5) * 3,
    vy: (Math.random() - 0.5) * 3,
    polarity, // +1, -1, or 0
    charge: 1, // accumulated merges
    radius: 3 + Math.random() * 2,
    life: 1,
    age: 0
  };
}

/* ── Input ── */
let mouseDown = false;
let spawnCooldown = 0;

function spawnAt(x, y) {
  if (particles.length >= MAX_PARTICLES) return;
  particles.push(createParticle(
    x + (Math.random() - 0.5) * 10,
    y + (Math.random() - 0.5) * 10,
    spawnPolarity
  ));
}

canvas.addEventListener('pointerdown', e => {
  mouseDown = true;
  spawnAt(e.clientX, e.clientY);
  instructionTimer = 0;
});
canvas.addEventListener('pointermove', e => {
  if (!mouseDown) return;
  spawnCooldown--;
  if (spawnCooldown <= 0) {
    spawnAt(e.clientX, e.clientY);
    spawnCooldown = 3;
  }
});
canvas.addEventListener('pointerup', () => mouseDown = false);
canvas.addEventListener('pointercancel', () => mouseDown = false);

// Buttons
document.getElementById('btn-pos').onclick = function() {
  spawnPolarity = 1;
  updateButtons();
};
document.getElementById('btn-neg').onclick = function() {
  spawnPolarity = -1;
  updateButtons();
};
document.getElementById('btn-neut').onclick = function() {
  spawnPolarity = 0;
  updateButtons();
};
document.getElementById('btn-chaos').onclick = function() {
  // Explode everything outward from center
  for (const p of particles) {
    const dx = p.x - W / 2, dy = p.y - H / 2;
    const d = Math.sqrt(dx * dx + dy * dy) + 1;
    p.vx += (dx / d) * 15;
    p.vy += (dy / d) * 15;
    // Randomly flip some polarities
    if (Math.random() < 0.3) p.polarity *= -1;
  }
  // Big spark burst
  for (let i = 0; i < 30; i++) {
    sparks.push({
      x: W / 2, y: H / 2,
      vx: (Math.random() - 0.5) * 20,
      vy: (Math.random() - 0.5) * 20,
      life: 30 + Math.random() * 20,
      maxLife: 50,
      hue: Math.random() * 360
    });
  }
};
document.getElementById('btn-clear').onclick = function() {
  particles = [];
  sparks = [];
  fieldLines = [];
  collisionCount = 0;
};

function updateButtons() {
  document.getElementById('btn-pos').className = 'btn' + (spawnPolarity === 1 ? ' active' : '');
  document.getElementById('btn-neg').className = 'btn neg' + (spawnPolarity === -1 ? ' active' : '');
  document.getElementById('btn-neut').className = 'btn neut' + (spawnPolarity === 0 ? ' active' : '');
}

/* ── Physics ── */
function update() {
  frame++;

  // Instruction fade
  if (instructionTimer > 0) {
    instructionTimer--;
  } else {
    document.getElementById('instructions').style.opacity = '0';
  }

  const len = particles.length;

  // Particle-particle forces
  for (let i = 0; i < len; i++) {
    const a = particles[i];
    for (let j = i + 1; j < len; j++) {
      const b = particles[j];
      let dx = b.x - a.x;
      let dy = b.y - a.y;
      let distSq = dx * dx + dy * dy;
      if (distSq < 1) distSq = 1;
      let dist = Math.sqrt(distSq);

      // Skip if too far
      if (dist > 350) continue;

      // Magnetic force: opposite attract, same repel
      // Neutral particles are weakly attracted to everything
      let forceMag = 0;
      if (a.polarity === 0 || b.polarity === 0) {
        // Neutral: weak universal attraction
        forceMag = ATTRACT_FORCE * 0.15 / distSq;
      } else if (a.polarity !== b.polarity) {
        // Opposites attract
        forceMag = ATTRACT_FORCE * a.charge * b.charge / distSq;
      } else {
        // Same polarity repels
        forceMag = -REPEL_FORCE * a.charge * b.charge / distSq;
      }

      // Soft collision repulsion
      if (dist < MIN_DIST) {
        forceMag -= 2.0 / (dist * dist) * 50;
      }

      const fx = (dx / dist) * forceMag;
      const fy = (dy / dist) * forceMag;
      a.vx += fx; a.vy += fy;
      b.vx -= fx; b.vy -= fy;

      // Collision detection
      const cr = (a.radius + b.radius) * 0.8;
      if (dist < cr) {
        collisionCount++;

        // Spark on collision
        if (a.polarity !== 0 && b.polarity !== 0 && a.polarity !== b.polarity) {
          // Opposite collision — bright annihilation spark
          for (let s = 0; s < 4; s++) {
            sparks.push({
              x: (a.x + b.x) / 2, y: (a.y + b.y) / 2,
              vx: (Math.random() - 0.5) * 8,
              vy: (Math.random() - 0.5) * 8,
              life: 15 + Math.random() * 15,
              maxLife: 30,
              hue: 30 + Math.random() * 30 // orange/gold
            });
          }

          // Field line between them
          if (Math.random() < 0.3) {
            fieldLines.push({
              x1: a.x, y1: a.y, x2: b.x, y2: b.y,
              life: 12, maxLife: 12,
              hue: 280
            });
          }

          // Merge chance
          if (Math.random() < MERGE_CHANCE && particles.length > 10) {
            a.charge += b.charge * 0.5;
            a.radius = Math.min(a.radius + 0.5, 12);
            a.polarity = 0; // annihilation → neutral
            particles.splice(j, 1);
            break;
          }
        } else if (a.polarity === b.polarity && a.polarity !== 0) {
          // Same polarity collision — electric repulsion sparks
          for (let s = 0; s < 2; s++) {
            sparks.push({
              x: (a.x + b.x) / 2, y: (a.y + b.y) / 2,
              vx: (Math.random() - 0.5) * 5,
              vy: (Math.random() - 0.5) * 5,
              life: 8 + Math.random() * 8,
              maxLife: 16,
              hue: polarityHue(a.polarity)
            });
          }
        }

        // Bounce
        const overlap = cr - dist;
        const nx = dx / dist, ny = dy / dist;
        a.x -= nx * overlap * 0.5;
        a.y -= ny * overlap * 0.5;
        b.x += nx * overlap * 0.5;
        b.y += ny * overlap * 0.5;
        // Exchange some velocity
        const relV = (a.vx - b.vx) * nx + (a.vy - b.vy) * ny;
        a.vx -= relV * nx * 0.5;
        a.vy -= relV * ny * 0.5;
        b.vx += relV * nx * 0.5;
        b.vy += relV * ny * 0.5;
      }
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.vx *= DAMPING;
    p.vy *= DAMPING;

    // Speed cap
    const spd = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
    if (spd > 12) { p.vx *= 12 / spd; p.vy *= 12 / spd; }

    p.x += p.vx;
    p.y += p.vy;
    p.age++;

    // Soft boundary (bounce off walls with energy loss)
    const margin = 20;
    if (p.x < margin) { p.x = margin; p.vx = Math.abs(p.vx) * 0.6; }
    if (p.x > W - margin) { p.x = W - margin; p.vx = -Math.abs(p.vx) * 0.6; }
    if (p.y < margin) { p.y = margin; p.vy = Math.abs(p.vy) * 0.6; }
    if (p.y > H - margin) { p.y = H - margin; p.vy = -Math.abs(p.vy) * 0.6; }
  }

  // Update sparks
  for (let i = sparks.length - 1; i >= 0; i--) {
    const s = sparks[i];
    s.x += s.vx; s.y += s.vy;
    s.vx *= 0.95; s.vy *= 0.95;
    s.life--;
    if (s.life <= 0) sparks.splice(i, 1);
  }

  // Update field lines
  for (let i = fieldLines.length - 1; i >= 0; i--) {
    fieldLines[i].life--;
    if (fieldLines[i].life <= 0) fieldLines.splice(i, 1);
  }

  // Cap sparks
  if (sparks.length > 400) sparks.splice(0, sparks.length - 400);

  // HUD
  let posC = 0, negC = 0, neutC = 0;
  for (const p of particles) {
    if (p.polarity > 0) posC++;
    else if (p.polarity < 0) negC++;
    else neutC++;
  }
  document.getElementById('s-pos').textContent = posC;
  document.getElementById('s-neg').textContent = negC;
  document.getElementById('s-neut').textContent = neutC;
  document.getElementById('s-col').textContent = collisionCount;
}

/* ── Render ── */
function draw() {
  // Fade trail
  ctx.fillStyle = 'rgba(6,6,14,0.25)';
  ctx.fillRect(0, 0, W, H);

  // Field lines
  for (const fl of fieldLines) {
    const alpha = fl.life / fl.maxLife;
    ctx.strokeStyle = `hsla(${fl.hue}, 80%, 60%, ${alpha * 0.5})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(fl.x1, fl.y1);
    // Curved field line
    const mx = (fl.x1 + fl.x2) / 2 + (Math.random() - 0.5) * 20;
    const my = (fl.y1 + fl.y2) / 2 + (Math.random() - 0.5) * 20;
    ctx.quadraticCurveTo(mx, my, fl.x2, fl.y2);
    ctx.stroke();
  }

  // Connection lines between nearby opposite-polarity particles
  const len = particles.length;
  if (len < 200) { // perf guard
    ctx.lineWidth = 0.5;
    for (let i = 0; i < len; i++) {
      const a = particles[i];
      if (a.polarity === 0) continue;
      for (let j = i + 1; j < len; j++) {
        const b = particles[j];
        if (b.polarity === 0 || a.polarity === b.polarity) continue;
        const dx = b.x - a.x, dy = b.y - a.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < 80) {
          const alpha = (1 - dist / 80) * 0.15;
          ctx.strokeStyle = `rgba(200,150,255,${alpha})`;
          ctx.beginPath();
          ctx.moveTo(a.x, a.y);
          ctx.lineTo(b.x, b.y);
          ctx.stroke();
        }
      }
    }
  }

  // Particles
  for (const p of particles) {
    const hue = polarityHue(p.polarity);
    const spd = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
    const glow = Math.min(spd * 2 + 4, 20);

    // Outer glow
    ctx.shadowColor = `hsla(${hue}, 100%, 60%, 0.8)`;
    ctx.shadowBlur = glow;

    // Core
    ctx.fillStyle = `hsla(${hue}, 100%, ${65 + spd * 3}%, ${0.8 + spd * 0.02})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.radius * (1 + p.charge * 0.1), 0, Math.PI * 2);
    ctx.fill();

    // Polarity marker
    ctx.shadowBlur = 0;
    ctx.fillStyle = `hsla(${hue}, 100%, 90%, 0.9)`;
    ctx.font = `bold ${Math.max(7, p.radius * 1.4)}px "Azeret Mono", monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    if (p.polarity > 0) ctx.fillText('+', p.x, p.y);
    else if (p.polarity < 0) ctx.fillText('−', p.x, p.y);
    else ctx.fillText('○', p.x, p.y);
  }
  ctx.shadowBlur = 0;

  // Sparks
  for (const s of sparks) {
    const alpha = s.life / s.maxLife;
    ctx.fillStyle = `hsla(${s.hue}, 100%, 70%, ${alpha})`;
    ctx.shadowColor = `hsla(${s.hue}, 100%, 60%, ${alpha * 0.6})`;
    ctx.shadowBlur = 6;
    const sz = 1.5 * alpha;
    ctx.fillRect(s.x - sz, s.y - sz, sz * 2, sz * 2);
  }
  ctx.shadowBlur = 0;
}

/* ── Loop ── */
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
