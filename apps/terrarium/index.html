<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Digital Terrarium</title>
<link rel="icon" href="https://emojicdn.elk.sh/🌿">
<meta property="og:title" content="Digital Terrarium">
<meta property="og:description" content="A living terrarium where plants grow from community activity. Plant, water, watch it thrive.">
<meta property="og:url" content="https://app.sloppy.live/terrarium/">
<meta property="og:image" content="https://emojicdn.elk.sh/🌿?style=google">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,300;6..72,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0c1a0f;--glass:#1a2e1c;--glass-edge:#2a4a2c;
  --soil:#3b2412;--soil-light:#5a3a20;
  --green:#4a9e3a;--leaf:#6bc95b;--flower-pink:#e87fa0;--flower-gold:#f0d060;
  --mist:rgba(180,220,180,0.06);--text:#8aaa80;--dim:#3a5a35;
  --water:#5ab8e8;--water-dim:#2a7aaa;
}
body{
  background:var(--bg);color:var(--text);
  font-family:'DM Mono',monospace;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  overflow-x:hidden;
}
h1{
  font-family:'Newsreader',serif;font-size:clamp(1.3rem,4vw,2rem);
  font-weight:300;color:var(--leaf);letter-spacing:0.06em;
  text-align:center;margin:14px 0 4px;
  text-shadow:0 0 30px rgba(106,201,91,0.15);
}
.sub{text-align:center;font-size:0.55rem;color:var(--dim);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:12px}

.container{max-width:800px;width:100%;padding:0 12px}

/* Terrarium glass */
.terrarium{
  position:relative;width:100%;aspect-ratio:16/10;
  border-radius:20px 20px 8px 8px;overflow:hidden;
  border:2px solid var(--glass-edge);
  background:linear-gradient(180deg,#0e1e12 0%,#142018 40%,var(--soil) 85%,#2a1a08 100%);
  box-shadow:
    inset 0 0 40px rgba(106,201,91,0.04),
    inset 0 -20px 30px rgba(59,36,18,0.3),
    0 4px 30px rgba(0,0,0,0.4);
}
canvas{position:absolute;top:0;left:0;width:100%;height:100%}

/* Glass reflection overlay */
.glass-reflection{
  position:absolute;top:0;left:0;right:0;bottom:0;
  pointer-events:none;z-index:3;
  background:linear-gradient(135deg,rgba(255,255,255,0.04) 0%,transparent 40%,transparent 80%,rgba(255,255,255,0.02) 100%);
  border-radius:20px 20px 8px 8px;
}

/* Controls */
.controls{
  display:flex;gap:6px;justify-content:center;flex-wrap:wrap;
  margin:12px 0 8px;
}
.ctrl-btn{
  padding:7px 14px;border:1px solid var(--dim);border-radius:6px;
  background:transparent;color:var(--text);font-family:'DM Mono',monospace;
  font-size:0.65rem;cursor:pointer;transition:all 0.2s;
}
.ctrl-btn:hover{border-color:var(--leaf);color:var(--leaf)}
.ctrl-btn.active{border-color:var(--leaf);color:var(--leaf);background:rgba(106,201,91,0.08)}
.ctrl-btn.water-btn:hover,.ctrl-btn.water-btn.active{border-color:var(--water);color:var(--water);background:rgba(90,184,232,0.08)}

/* Stats */
.stats{
  display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin:8px 0;
}
.stat{text-align:center;min-width:70px}
.stat-val{font-size:0.9rem;font-weight:400;color:var(--leaf)}
.stat-label{font-size:0.45rem;color:var(--dim);text-transform:uppercase;letter-spacing:0.1em}

/* Plant palette */
.palette{
  display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:10px;
}
.palette-item{
  padding:5px 10px;border:1px solid var(--dim);border-radius:4px;
  background:transparent;color:var(--dim);font-size:0.6rem;cursor:pointer;
  font-family:'DM Mono',monospace;transition:all 0.15s;
}
.palette-item:hover{border-color:var(--green);color:var(--green)}
.palette-item.selected{border-color:var(--leaf);color:var(--leaf);background:rgba(106,201,91,0.06)}

.info{text-align:center;font-size:0.5rem;color:var(--dim);margin:4px 0;font-style:italic;min-height:1em}

@media(max-width:500px){
  .terrarium{aspect-ratio:4/3}
}
</style>
</head>
<body>

<h1>Digital Terrarium</h1>
<div class="sub">a living ecosystem grown by community</div>

<div class="container">
  <div class="stats">
    <div class="stat"><div class="stat-val" id="s-plants">0</div><div class="stat-label">Plants</div></div>
    <div class="stat"><div class="stat-val" id="s-waters">0</div><div class="stat-label">Waters</div></div>
    <div class="stat"><div class="stat-val" id="s-growth">0</div><div class="stat-label">Total Growth</div></div>
    <div class="stat"><div class="stat-val" id="s-gardeners">0</div><div class="stat-label">Gardeners</div></div>
  </div>

  <div class="terrarium" id="terrarium">
    <canvas id="tc"></canvas>
    <div class="glass-reflection"></div>
  </div>

  <div class="controls">
    <button class="ctrl-btn active" id="btn-plant" onclick="setMode('plant')">Plant Seed</button>
    <button class="ctrl-btn water-btn" id="btn-water" onclick="setMode('water')">Water</button>
  </div>

  <div class="palette" id="palette"></div>
  <div class="info" id="info">Click inside the terrarium to plant a seed</div>
</div>

<div id="loading" style="position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:100;color:var(--dim);font-family:'DM Mono',monospace;font-size:0.8rem">Growing terrarium...</div>

<script type="module">
import supabase, { supabaseSession } from './supabase-config.js';

const canvas = document.getElementById('tc');
const ctx = canvas.getContext('2d');
const terr = document.getElementById('terrarium');

let W, H, dpr;
function resize() {
  dpr = window.devicePixelRatio || 1;
  const r = terr.getBoundingClientRect();
  W = r.width; H = r.height;
  canvas.width = W * dpr; canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// Plant types
const PLANT_TYPES = [
  { id: 'fern', label: 'Fern', color: '#4a9e3a', dark: '#2a6a20', stages: ['seed','sprout','small','bush','lush'] },
  { id: 'succulent', label: 'Succulent', color: '#7ec878', dark: '#4a8a55', stages: ['seed','bud','rosette','thick','bloom'] },
  { id: 'mushroom', label: 'Mushroom', color: '#c8a070', dark: '#8a6840', stages: ['spore','bump','cap','tall','cluster'] },
  { id: 'flower', label: 'Flower', color: '#e87fa0', dark: '#aa4a6a', stages: ['seed','stem','bud','bloom','garden'] },
  { id: 'cactus', label: 'Cactus', color: '#5aaa50', dark: '#3a7a30', stages: ['seed','nub','small','tall','saguaro'] },
  { id: 'vine', label: 'Vine', color: '#6bc95b', dark: '#3a8a2a', stages: ['seed','tendril','climb','spread','canopy'] },
  { id: 'moss', label: 'Moss', color: '#5a8a4a', dark: '#3a6a2a', stages: ['spore','patch','carpet','thick','glow'] },
];

let userId, plants = [], mode = 'plant', selectedType = 'fern';
let particles = [], motes = [], frame = 0;
let username = 'Anon';

// Build palette
const palette = document.getElementById('palette');
PLANT_TYPES.forEach((pt, i) => {
  const btn = document.createElement('button');
  btn.className = 'palette-item' + (i === 0 ? ' selected' : '');
  btn.textContent = pt.label;
  btn.onclick = () => {
    document.querySelectorAll('.palette-item').forEach(b => b.classList.remove('selected'));
    btn.classList.add('selected');
    selectedType = pt.id;
  };
  palette.appendChild(btn);
});

// Ambient motes
for (let i = 0; i < 20; i++) {
  motes.push({
    x: Math.random(), y: 0.1 + Math.random() * 0.7,
    vx: (Math.random() - 0.5) * 0.0003,
    vy: -0.0001 - Math.random() * 0.0002,
    size: 1 + Math.random() * 2,
    alpha: 0.1 + Math.random() * 0.2,
    phase: Math.random() * Math.PI * 2
  });
}

function getStage(growth) {
  if (growth < 5) return 0;
  if (growth < 15) return 1;
  if (growth < 35) return 2;
  if (growth < 70) return 3;
  return 4;
}

function drawPlant(p) {
  const pt = PLANT_TYPES.find(t => t.id === p.plant_type) || PLANT_TYPES[0];
  const x = (p.x_pos / 1000) * W;
  const soilY = H * 0.82;
  const stage = getStage(p.growth || 0);
  const h = 8 + stage * 12 + (p.growth || 0) * 0.3;
  const baseY = soilY;

  ctx.save();

  if (p.plant_type === 'mushroom') {
    // Stem
    ctx.fillStyle = '#c8b898';
    const sw = 2 + stage * 1.5;
    ctx.fillRect(x - sw / 2, baseY - h * 0.6, sw, h * 0.6);
    // Cap
    ctx.fillStyle = pt.color;
    ctx.beginPath();
    const capR = 4 + stage * 5 + (p.growth || 0) * 0.1;
    ctx.ellipse(x, baseY - h * 0.6, capR, capR * 0.6, 0, Math.PI, 0);
    ctx.fill();
    // Spots
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    for (let i = 0; i < stage + 1; i++) {
      ctx.beginPath();
      ctx.arc(x - capR * 0.4 + i * capR * 0.3, baseY - h * 0.65 - i * 2, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (p.plant_type === 'flower') {
    // Stem
    ctx.strokeStyle = '#3a8a2a';
    ctx.lineWidth = 1.5 + stage * 0.3;
    ctx.beginPath();
    ctx.moveTo(x, baseY);
    const sway = Math.sin(frame * 0.015 + x) * (2 + stage);
    ctx.quadraticCurveTo(x + sway, baseY - h / 2, x + sway * 0.5, baseY - h);
    ctx.stroke();
    // Leaves
    if (stage >= 1) {
      ctx.fillStyle = '#5aaa3a';
      for (let s = -1; s <= 1; s += 2) {
        ctx.beginPath();
        const ly = baseY - h * 0.4;
        ctx.ellipse(x + sway * 0.3 + s * 6, ly, 5, 2.5, s * 0.4, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    // Flower head
    if (stage >= 2) {
      const fx = x + sway * 0.5, fy = baseY - h;
      const petals = 5 + stage;
      const petalR = 3 + stage * 2;
      ctx.fillStyle = pt.color;
      for (let i = 0; i < petals; i++) {
        const a = (i / petals) * Math.PI * 2 + frame * 0.005;
        ctx.beginPath();
        ctx.ellipse(fx + Math.cos(a) * petalR, fy + Math.sin(a) * petalR, petalR * 0.6, petalR * 0.3, a, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.fillStyle = '#f0d060';
      ctx.beginPath();
      ctx.arc(fx, fy, 2 + stage, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (p.plant_type === 'cactus') {
    // Body
    ctx.fillStyle = pt.color;
    const cw = 5 + stage * 3;
    ctx.beginPath();
    ctx.roundRect(x - cw / 2, baseY - h, cw, h, [cw / 2, cw / 2, 2, 2]);
    ctx.fill();
    // Ridges
    ctx.strokeStyle = pt.dark;
    ctx.lineWidth = 0.5;
    for (let i = -1; i <= 1; i++) {
      ctx.beginPath();
      ctx.moveTo(x + i * cw * 0.25, baseY);
      ctx.lineTo(x + i * cw * 0.25, baseY - h + cw / 2);
      ctx.stroke();
    }
    // Arms at higher stages
    if (stage >= 3) {
      for (let s = -1; s <= 1; s += 2) {
        ctx.fillStyle = pt.color;
        const ay = baseY - h * 0.6;
        ctx.beginPath();
        ctx.roundRect(x + s * cw / 2, ay, s * 12, 5, 3);
        ctx.fill();
        ctx.beginPath();
        ctx.roundRect(x + s * (cw / 2 + 10), ay - 10, 5, 12, 3);
        ctx.fill();
      }
    }
    // Flower on top
    if (stage >= 4) {
      ctx.fillStyle = '#f06080';
      for (let i = 0; i < 5; i++) {
        const a = (i / 5) * Math.PI * 2;
        ctx.beginPath();
        ctx.ellipse(x + Math.cos(a) * 4, baseY - h - 2 + Math.sin(a) * 4, 3, 2, a, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  } else if (p.plant_type === 'vine') {
    const sway = Math.sin(frame * 0.01 + x * 0.1) * 3;
    ctx.strokeStyle = pt.color;
    ctx.lineWidth = 1.5 + stage * 0.4;
    // Main vine
    ctx.beginPath();
    ctx.moveTo(x, baseY);
    const cp1x = x - 15 + sway, cp1y = baseY - h * 0.4;
    const cp2x = x + 15 + sway, cp2y = baseY - h * 0.7;
    ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, x + sway, baseY - h);
    ctx.stroke();
    // Leaves along vine
    ctx.fillStyle = pt.color;
    for (let i = 0; i < stage + 1; i++) {
      const t = (i + 1) / (stage + 2);
      const lx = x + sway * t + Math.sin(t * 4) * 8;
      const ly = baseY - h * t;
      ctx.beginPath();
      ctx.ellipse(lx + (i % 2 === 0 ? 5 : -5), ly, 4 + stage, 2 + stage * 0.5, (i % 2 === 0 ? 0.3 : -0.3), 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (p.plant_type === 'moss') {
    const spread = 8 + stage * 8 + (p.growth || 0) * 0.2;
    for (let i = 0; i < 6 + stage * 4; i++) {
      const mx = x - spread + Math.random() * spread * 2;
      const my = baseY - Math.random() * (3 + stage * 2);
      const ms = 1.5 + Math.random() * (1 + stage * 0.8);
      ctx.fillStyle = `rgba(${90 + Math.random() * 30},${138 + Math.random() * 40},${74 + Math.random() * 20},${0.5 + Math.random() * 0.3})`;
      ctx.beginPath();
      ctx.arc(mx, my, ms, 0, Math.PI * 2);
      ctx.fill();
    }
    // Glow at max stage
    if (stage >= 4) {
      ctx.fillStyle = 'rgba(150,255,100,0.06)';
      ctx.beginPath();
      ctx.ellipse(x, baseY - 4, spread, 10, 0, 0, Math.PI * 2);
      ctx.fill();
    }
  } else if (p.plant_type === 'succulent') {
    // Rosette pattern
    const leaves = 3 + stage * 2;
    const r = 4 + stage * 4 + (p.growth || 0) * 0.08;
    for (let i = 0; i < leaves; i++) {
      const a = (i / leaves) * Math.PI * 2 - Math.PI / 2;
      ctx.fillStyle = i % 2 === 0 ? pt.color : '#8ad88a';
      ctx.beginPath();
      ctx.ellipse(
        x + Math.cos(a) * r * 0.5,
        baseY - 4 - h * 0.3 + Math.sin(a) * r * 0.3,
        r * 0.45, r * 0.2, a, 0, Math.PI * 2
      );
      ctx.fill();
    }
    // Center
    ctx.fillStyle = '#aaeaaa';
    ctx.beginPath();
    ctx.arc(x, baseY - 4 - h * 0.3, 2 + stage, 0, Math.PI * 2);
    ctx.fill();
  } else {
    // Fern (default)
    const sway = Math.sin(frame * 0.012 + x * 0.1) * (1 + stage);
    ctx.strokeStyle = pt.color;
    ctx.lineWidth = 1 + stage * 0.4;
    // Main stem
    ctx.beginPath();
    ctx.moveTo(x, baseY);
    ctx.quadraticCurveTo(x + sway, baseY - h / 2, x + sway * 0.7, baseY - h);
    ctx.stroke();
    // Fronds
    const fronds = stage + 2;
    for (let i = 0; i < fronds; i++) {
      const t = (i + 1) / (fronds + 1);
      const fx = x + sway * t;
      const fy = baseY - h * t;
      for (let s = -1; s <= 1; s += 2) {
        ctx.fillStyle = pt.color;
        ctx.beginPath();
        const fl = 5 + stage * 4 + (1 - t) * 8;
        ctx.ellipse(fx + s * fl * 0.5, fy, fl * 0.5, 2, s * 0.3 - 0.2, 0, Math.PI * 2);
        ctx.fill();
      }
    }
    // Curled tip
    if (stage < 3) {
      ctx.strokeStyle = '#6bc95b';
      ctx.lineWidth = 1;
      ctx.beginPath();
      const tx = x + sway * 0.7, ty = baseY - h;
      ctx.arc(tx + 3, ty - 3, 3, 0.5, Math.PI * 1.5);
      ctx.stroke();
    }
  }

  // Growth shimmer for recently watered
  if (p._shimmer > 0) {
    ctx.fillStyle = `rgba(180,255,180,${p._shimmer * 0.15})`;
    ctx.beginPath();
    ctx.ellipse(x, baseY - h / 2, 10 + stage * 5, h / 2 + 5, 0, 0, Math.PI * 2);
    ctx.fill();
    p._shimmer -= 0.02;
  }

  // Name tag on hover
  if (p._hover) {
    ctx.fillStyle = 'rgba(10,26,15,0.85)';
    const tw = ctx.measureText(p.plant_name || 'Sprout').width + 10;
    ctx.fillRect(x - tw / 2, baseY - h - 22, tw, 16);
    ctx.fillStyle = '#8aaa80';
    ctx.font = '300 9px "DM Mono"';
    ctx.textAlign = 'center';
    ctx.fillText(p.plant_name || 'Sprout', x, baseY - h - 10);
    ctx.fillStyle = '#5a8a50';
    ctx.font = '300 7px "DM Mono"';
    ctx.fillText(`Lv${getStage(p.growth || 0) + 1} · ${p.growth || 0}g · by ${p.username || 'Anon'}`, x, baseY - h - 1);
  }

  ctx.restore();
}

function drawScene() {
  ctx.clearRect(0, 0, W, H);

  // Sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H * 0.82);
  sky.addColorStop(0, '#0e1e12');
  sky.addColorStop(0.6, '#142018');
  sky.addColorStop(1, '#1a2818');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H * 0.82);

  // Soil
  const soilY = H * 0.82;
  const soil = ctx.createLinearGradient(0, soilY, 0, H);
  soil.addColorStop(0, '#3b2412');
  soil.addColorStop(0.3, '#2a1a0c');
  soil.addColorStop(1, '#1a0e06');
  ctx.fillStyle = soil;
  ctx.fillRect(0, soilY, W, H - soilY);

  // Soil texture
  ctx.fillStyle = 'rgba(90,58,32,0.15)';
  for (let i = 0; i < 30; i++) {
    ctx.fillRect(
      (i * 137 + 23) % W, soilY + ((i * 97 + 11) % (H - soilY)) * 0.5,
      2 + (i % 3), 1
    );
  }

  // Soil line
  ctx.strokeStyle = 'rgba(90,58,32,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, soilY);
  for (let x = 0; x <= W; x += 10) {
    ctx.lineTo(x, soilY + Math.sin(x * 0.05) * 2);
  }
  ctx.stroke();

  // Plants (sorted by growth for depth)
  const sorted = [...plants].sort((a, b) => (a.growth || 0) - (b.growth || 0));
  sorted.forEach(drawPlant);

  // Ambient motes (moisture particles)
  motes.forEach(m => {
    m.x += m.vx + Math.sin(frame * 0.008 + m.phase) * 0.0002;
    m.y += m.vy;
    if (m.y < 0.05) { m.y = 0.78; m.x = Math.random(); }
    if (m.x < 0 || m.x > 1) m.vx *= -1;
    const a = m.alpha * (0.5 + 0.5 * Math.sin(frame * 0.02 + m.phase));
    ctx.fillStyle = `rgba(180,220,180,${a})`;
    ctx.beginPath();
    ctx.arc(m.x * W, m.y * H, m.size, 0, Math.PI * 2);
    ctx.fill();
  });

  // Water particles
  particles = particles.filter(p => {
    p.y += p.vy;
    p.vy += 0.06;
    p.x += p.vx;
    p.life--;
    const a = p.life / p.maxLife;
    ctx.fillStyle = `rgba(90,184,232,${a * 0.6})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * a, 0, Math.PI * 2);
    ctx.fill();
    return p.life > 0;
  });

  // Mist at soil level
  ctx.fillStyle = 'rgba(180,220,180,0.025)';
  for (let i = 0; i < 5; i++) {
    const mx = (frame * 0.3 + i * 200) % (W + 200) - 100;
    ctx.beginPath();
    ctx.ellipse(mx, soilY - 5, 60 + i * 20, 8, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

function spawnWaterDrops(x, y) {
  for (let i = 0; i < 12; i++) {
    particles.push({
      x, y: y - 5,
      vx: (Math.random() - 0.5) * 2,
      vy: -1 - Math.random() * 2,
      size: 1.5 + Math.random() * 2,
      life: 25 + Math.random() * 15,
      maxLife: 40
    });
  }
}

// Hover detection
let hoverX = -1, hoverY = -1;
terr.addEventListener('mousemove', e => {
  const r = terr.getBoundingClientRect();
  hoverX = e.clientX - r.left;
  hoverY = e.clientY - r.top;
  plants.forEach(p => {
    const px = (p.x_pos / 1000) * W;
    const py = H * 0.82 - (8 + getStage(p.growth || 0) * 12 + (p.growth || 0) * 0.3) / 2;
    p._hover = Math.abs(hoverX - px) < 25 && Math.abs(hoverY - py) < 30;
  });
});
terr.addEventListener('mouseleave', () => { plants.forEach(p => p._hover = false); });

// Click handler
terr.addEventListener('click', async e => {
  const r = terr.getBoundingClientRect();
  const cx = e.clientX - r.left;
  const cy = e.clientY - r.top;
  const xPos = Math.round((cx / W) * 1000);

  if (mode === 'plant') {
    // Check not too close to existing plant
    const tooClose = plants.some(p => Math.abs(p.x_pos - xPos) < 30);
    if (tooClose) {
      document.getElementById('info').textContent = 'Too close to another plant! Try elsewhere.';
      return;
    }
    if (cy < H * 0.5) {
      document.getElementById('info').textContent = 'Plant in the soil area (lower half)';
      return;
    }

    const name = selectedType.charAt(0).toUpperCase() + selectedType.slice(1) + ' #' + (plants.length + 1);
    const { error } = await supabase.from('terrarium_plants').insert({
      user_id: userId, plant_type: selectedType, plant_name: name,
      x_pos: xPos, growth: 1, waters: 0, username
    });
    if (error) { console.error('Plant error:', error.message); return; }
    document.getElementById('info').textContent = `Planted a ${selectedType}!`;
    await loadPlants();

  } else if (mode === 'water') {
    // Find closest plant
    let closest = null, closestDist = Infinity;
    plants.forEach(p => {
      const px = (p.x_pos / 1000) * W;
      const d = Math.abs(cx - px);
      if (d < closestDist && d < 40) { closest = p; closestDist = d; }
    });
    if (!closest) {
      document.getElementById('info').textContent = 'Click near a plant to water it';
      return;
    }
    // Can only water own plants
    if (closest.user_id !== userId) {
      // Water others — just add growth visually and give feedback
      // RLS won't let us update, so we add a growth point to our own...
      // Actually let's track watering as a community action by bumping growth
      document.getElementById('info').textContent = `You watered ${closest.plant_name}! (owner must be online to save)`;
      closest._shimmer = 1;
      spawnWaterDrops((closest.x_pos / 1000) * W, H * 0.82);
      return;
    }
    const newGrowth = (closest.growth || 0) + 2;
    const newWaters = (closest.waters || 0) + 1;
    await supabase.from('terrarium_plants').update({ growth: newGrowth, waters: newWaters })
      .eq('created_at', closest.created_at).eq('user_id', userId);
    closest._shimmer = 1;
    spawnWaterDrops((closest.x_pos / 1000) * W, H * 0.82);
    document.getElementById('info').textContent = `Watered ${closest.plant_name}! Growth +2`;
    await loadPlants();
  }
});

window.setMode = function(m) {
  mode = m;
  document.getElementById('btn-plant').classList.toggle('active', m === 'plant');
  document.getElementById('btn-water').classList.toggle('active', m === 'water');
  document.getElementById('palette').style.display = m === 'plant' ? 'flex' : 'none';
  document.getElementById('info').textContent = m === 'plant'
    ? 'Click inside the terrarium to plant a seed'
    : 'Click near a plant to water it';
};

async function loadPlants() {
  const { data, error } = await supabase.from('terrarium_plants').select('*');
  if (error) { console.error('Load error:', error.message); return; }
  plants = (data || []).map(p => ({ ...p, _shimmer: 0, _hover: false }));
  updateStats();
}

function updateStats() {
  document.getElementById('s-plants').textContent = plants.length;
  document.getElementById('s-waters').textContent = plants.reduce((s, p) => s + (p.waters || 0), 0);
  document.getElementById('s-growth').textContent = plants.reduce((s, p) => s + (p.growth || 0), 0);
  const gardeners = new Set(plants.map(p => p.user_id)).size;
  document.getElementById('s-gardeners').textContent = gardeners;
}

async function init() {
  try {
    const { user } = await supabaseSession();
    userId = user.id;

    try {
      const stored = localStorage.getItem('sloppy-profile');
      if (stored) { const p = JSON.parse(stored); if (p.username) username = p.username; }
    } catch(e) {}
    if (username === 'Anon') {
      try {
        const { data: prof } = await supabase.from('sloppygram_profiles').select('username').eq('user_id', userId).limit(1);
        if (prof && prof[0]?.username) username = prof[0].username;
      } catch(e) {}
    }

    await loadPlants();
    document.getElementById('loading').style.display = 'none';

    // Auto-refresh
    setInterval(loadPlants, 20000);

    // Animation loop
    function loop() {
      frame++;
      drawScene();
      requestAnimationFrame(loop);
    }
    loop();
  } catch(e) {
    document.getElementById('loading').textContent = 'Error: ' + e.message;
  }
}

init();
</script>
