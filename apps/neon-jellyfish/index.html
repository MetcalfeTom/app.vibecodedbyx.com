<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Neon Jellyfish</title>
<link rel="icon" href="https://emojicdn.elk.sh/🪼">
<meta property="og:title" content="Neon Jellyfish">
<meta property="og:description" content="A glowing 3D jellyfish that pulses and shifts color to the sound around you.">
<meta property="og:url" content="https://app.sloppy.live/neon-jellyfish/">
<meta property="og:image" content="https://emojicdn.elk.sh/🪼?style=apple&size=512">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Megrim&family=Rajdhani:wght@300;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#020012;font-family:'Rajdhani',sans-serif;color:#fff}
canvas{display:block}
#ui{position:fixed;top:0;left:0;width:100%;pointer-events:none;z-index:10;padding:20px}
h1{font-family:'Megrim',cursive;font-size:clamp(1.4rem,4vw,2.4rem);text-align:center;
  text-shadow:0 0 20px rgba(0,255,200,0.6),0 0 60px rgba(0,200,255,0.3);letter-spacing:0.15em;opacity:0.85}
#startBtn{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  pointer-events:all;cursor:pointer;z-index:20;
  background:rgba(0,255,200,0.12);border:1px solid rgba(0,255,200,0.4);
  color:#aafff0;font-family:'Megrim',cursive;font-size:1.6rem;
  padding:18px 48px;border-radius:60px;letter-spacing:0.2em;
  text-shadow:0 0 15px rgba(0,255,200,0.5);transition:all 0.3s}
#startBtn:hover{background:rgba(0,255,200,0.25);box-shadow:0 0 40px rgba(0,255,200,0.3)}
#freqLabel{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  font-size:0.85rem;font-weight:300;opacity:0.5;letter-spacing:0.1em;pointer-events:none;z-index:10}
#backlink a{color:#aafff0;text-decoration:none}
#backlink a:hover{opacity:1}
.hide{display:none!important}
</style>
</head>
<body>
<div id="ui"><h1>NEON JELLYFISH</h1></div>
<button id="startBtn">TAP TO LISTEN</button>
<div id="freqLabel">listening to your world...</div>

<script type="importmap">
{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js"}}
</script>
<script type="module">
import * as THREE from 'three';

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x020012, 0.06);
const camera = new THREE.PerspectiveCamera(60, innerWidth/innerHeight, 0.1, 100);
camera.position.set(0, 1, 6);
camera.lookAt(0, 0, 0);
const renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

// Audio
let analyser, dataArray, audioReady = false;
const startBtn = document.getElementById('startBtn');
const freqLabel = document.getElementById('freqLabel');
freqLabel.classList.add('hide');

startBtn.addEventListener('click', async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio:true});
    const actx = new AudioContext();
    const src = actx.createMediaStreamSource(stream);
    analyser = actx.createAnalyser();
    analyser.fftSize = 512;
    analyser.smoothingTimeConstant = 0.8;
    src.connect(analyser);
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    audioReady = true;
    startBtn.classList.add('hide');
    freqLabel.classList.remove('hide');
  } catch(e) {
    startBtn.textContent = 'MIC BLOCKED — TAP AGAIN';
    console.warn('Mic access denied:', e);
  }
});

// Lighting
const ambient = new THREE.AmbientLight(0x111122, 0.3);
scene.add(ambient);

const jellyGlow = new THREE.PointLight(0x00ffc8, 3, 15);
jellyGlow.position.set(0, 0, 0);
scene.add(jellyGlow);

const rimLight = new THREE.PointLight(0x4400ff, 1.5, 20);
rimLight.position.set(-3, 3, -2);
scene.add(rimLight);

// Jellyfish group
const jelly = new THREE.Group();
scene.add(jelly);

// Bell (dome)
const bellGeo = new THREE.SphereGeometry(1.2, 48, 32, 0, Math.PI*2, 0, Math.PI*0.55);
const bellMat = new THREE.MeshPhysicalMaterial({
  color: 0x00ffc8,
  emissive: 0x00ffc8,
  emissiveIntensity: 0.4,
  transparent: true,
  opacity: 0.55,
  roughness: 0.1,
  metalness: 0.0,
  transmission: 0.6,
  thickness: 0.8,
  side: THREE.DoubleSide
});
const bell = new THREE.Mesh(bellGeo, bellMat);
jelly.add(bell);

// Inner bell glow
const innerGeo = new THREE.SphereGeometry(1.0, 32, 24, 0, Math.PI*2, 0, Math.PI*0.5);
const innerMat = new THREE.MeshBasicMaterial({
  color: 0x00ffc8,
  transparent: true,
  opacity: 0.15,
  side: THREE.BackSide
});
const innerBell = new THREE.Mesh(innerGeo, innerMat);
jelly.add(innerBell);

// Oral arms (thick center tentacles)
const armCount = 4;
const arms = [];
for (let i = 0; i < armCount; i++) {
  const pts = [];
  const segments = 20;
  for (let j = 0; j <= segments; j++) {
    const t = j / segments;
    pts.push(new THREE.Vector3(0, -t * 3.5, 0));
  }
  const curve = new THREE.CatmullRomCurve3(pts);
  const tubeGeo = new THREE.TubeGeometry(curve, 20, 0.08 - 0.03 * 0, 8, false);
  const tubeMat = new THREE.MeshPhysicalMaterial({
    color: 0x00ffc8,
    emissive: 0x00ffc8,
    emissiveIntensity: 0.6,
    transparent: true,
    opacity: 0.7,
    roughness: 0.3
  });
  const arm = new THREE.Mesh(tubeGeo, tubeMat);
  const angle = (i / armCount) * Math.PI * 2;
  arm.position.set(Math.cos(angle)*0.3, -0.6, Math.sin(angle)*0.3);
  arm.userData = { angle, segments, baseY: -0.6, pts };
  jelly.add(arm);
  arms.push(arm);
}

// Trailing tentacles (thin, long)
const tentCount = 12;
const tentacles = [];
for (let i = 0; i < tentCount; i++) {
  const segments = 30;
  const pts = [];
  for (let j = 0; j <= segments; j++) {
    pts.push(new THREE.Vector3(0, -j * 0.2, 0));
  }
  const curve = new THREE.CatmullRomCurve3(pts);
  const geo = new THREE.TubeGeometry(curve, segments, 0.02, 5, false);
  const mat = new THREE.MeshBasicMaterial({
    color: 0x00ffc8,
    transparent: true,
    opacity: 0.4 + Math.random()*0.2
  });
  const tent = new THREE.Mesh(geo, mat);
  const angle = (i / tentCount) * Math.PI * 2 + Math.random()*0.3;
  const radius = 0.5 + Math.random()*0.5;
  tent.position.set(Math.cos(angle)*radius, -0.5, Math.sin(angle)*radius);
  tent.userData = { angle, radius, segments, pts };
  jelly.add(tent);
  tentacles.push(tent);
}

// Particles (plankton / ambient)
const particleCount = 600;
const pGeo = new THREE.BufferGeometry();
const pPos = new Float32Array(particleCount * 3);
const pSizes = new Float32Array(particleCount);
for (let i = 0; i < particleCount; i++) {
  pPos[i*3] = (Math.random()-0.5)*20;
  pPos[i*3+1] = (Math.random()-0.5)*16;
  pPos[i*3+2] = (Math.random()-0.5)*20;
  pSizes[i] = Math.random()*3+1;
}
pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
pGeo.setAttribute('size', new THREE.BufferAttribute(pSizes, 1));
const pMat = new THREE.PointsMaterial({
  color: 0x00ffc8,
  size: 0.04,
  transparent: true,
  opacity: 0.3,
  blending: THREE.AdditiveBlending,
  depthWrite: false
});
const particles = new THREE.Points(pGeo, pMat);
scene.add(particles);

// Audio analysis helpers
function getFrequencyBands() {
  if (!audioReady) return { bass: 0, mid: 0, high: 0, overall: 0, peak: 0 };
  analyser.getByteFrequencyData(dataArray);
  const len = dataArray.length;
  let bass = 0, mid = 0, high = 0, sum = 0, peak = 0;
  const bassEnd = Math.floor(len * 0.15);
  const midEnd = Math.floor(len * 0.5);
  for (let i = 0; i < len; i++) {
    const v = dataArray[i] / 255;
    sum += v;
    if (v > peak) peak = v;
    if (i < bassEnd) bass += v;
    else if (i < midEnd) mid += v;
    else high += v;
  }
  bass /= bassEnd;
  mid /= (midEnd - bassEnd);
  high /= (len - midEnd);
  return { bass, mid, high, overall: sum / len, peak };
}

// Color mapping: frequency bands -> hue
// bass = warm (magenta/red), mid = cool (cyan/green), high = electric (blue/violet)
function freqToColor(bass, mid, high) {
  const r = 0.2 + bass * 0.8;
  const g = 0.8 + mid * 0.2 - bass * 0.3;
  const b = 0.7 + high * 0.3;
  return new THREE.Color(r, g, b);
}

// Smooth values
let sBass = 0, sMid = 0, sHigh = 0, sOverall = 0, sPeak = 0;
const smoothing = 0.12;

// Animation
const clock = new THREE.Clock();
let mouseX = 0, mouseY = 0;
document.addEventListener('mousemove', e => {
  mouseX = (e.clientX / innerWidth - 0.5) * 2;
  mouseY = (e.clientY / innerHeight - 0.5) * 2;
});

function rebuildTentacle(tent, time, audioMult) {
  const ud = tent.userData;
  const newPts = [];
  for (let j = 0; j <= ud.segments; j++) {
    const t = j / ud.segments;
    const wave = Math.sin(time * 1.5 + j * 0.3 + ud.angle) * (0.15 + audioMult * 0.3) * t;
    const wave2 = Math.cos(time * 0.8 + j * 0.2) * 0.08 * t;
    newPts.push(new THREE.Vector3(wave, -j * 0.2, wave2));
  }
  const curve = new THREE.CatmullRomCurve3(newPts);
  const newGeo = new THREE.TubeGeometry(curve, ud.segments, 0.02, 5, false);
  tent.geometry.dispose();
  tent.geometry = newGeo;
}

function rebuildArm(arm, time, audioMult) {
  const ud = arm.userData;
  const newPts = [];
  for (let j = 0; j <= ud.segments; j++) {
    const t = j / ud.segments;
    const sway = Math.sin(time * 1.2 + j * 0.4 + ud.angle * 2) * (0.2 + audioMult * 0.5) * t;
    const sway2 = Math.cos(time * 0.7 + j * 0.3) * 0.12 * t;
    newPts.push(new THREE.Vector3(sway, -t * 3.5, sway2));
  }
  const curve = new THREE.CatmullRomCurve3(newPts);
  const newGeo = new THREE.TubeGeometry(curve, 20, 0.08 * (1 - 0.5 * (newPts.length > 0 ? 0 : 0)), 8, false);
  arm.geometry.dispose();
  arm.geometry = newGeo;
}

// Throttle tentacle rebuilds
let rebuildFrame = 0;

function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  const dt = clock.getDelta();
  rebuildFrame++;

  // Audio
  const freq = getFrequencyBands();
  sBass += (freq.bass - sBass) * smoothing;
  sMid += (freq.mid - sMid) * smoothing;
  sHigh += (freq.high - sHigh) * smoothing;
  sOverall += (freq.overall - sOverall) * smoothing;
  sPeak += (freq.peak - sPeak) * 0.2;

  const audioMult = audioReady ? sOverall * 2 : 0.15 + Math.sin(t * 0.5) * 0.1;

  // Color from frequency
  const col = audioReady
    ? freqToColor(sBass, sMid, sHigh)
    : new THREE.Color().setHSL((Math.sin(t * 0.15) * 0.5 + 0.5) * 0.3 + 0.4, 0.9, 0.6);

  // Apply color to jellyfish
  bellMat.color.lerp(col, 0.08);
  bellMat.emissive.lerp(col, 0.08);
  bellMat.emissiveIntensity = 0.3 + audioMult * 1.5;
  bellMat.opacity = 0.4 + audioMult * 0.3;
  innerMat.color.lerp(col, 0.08);
  innerMat.opacity = 0.1 + audioMult * 0.25;

  jellyGlow.color.lerp(col, 0.08);
  jellyGlow.intensity = 2 + audioMult * 6;
  jellyGlow.distance = 10 + audioMult * 10;

  pMat.color.lerp(col, 0.05);
  pMat.opacity = 0.15 + audioMult * 0.25;

  // Bell pulsing
  const pulse = 1 + Math.sin(t * 2) * 0.05 + (audioReady ? sBass * 0.15 : 0);
  const squish = 1 - (audioReady ? sBass * 0.08 : Math.sin(t * 2) * 0.03);
  bell.scale.set(pulse, squish, pulse);
  innerBell.scale.set(pulse * 0.95, squish * 0.95, pulse * 0.95);

  // Jellyfish bob
  jelly.position.y = Math.sin(t * 0.6) * 0.3;
  jelly.rotation.y += 0.003;
  jelly.rotation.x = mouseY * 0.1;
  jelly.rotation.z = -mouseX * 0.08;

  // Tentacles and arms (rebuild every 2 frames for perf)
  if (rebuildFrame % 2 === 0) {
    for (const tent of tentacles) {
      rebuildTentacle(tent, t, audioMult);
      tent.material.color.lerp(col, 0.06);
      tent.material.opacity = 0.3 + audioMult * 0.3;
    }
    for (const arm of arms) {
      rebuildArm(arm, t, audioMult);
      arm.material.color.lerp(col, 0.06);
      arm.material.emissive.lerp(col, 0.06);
      arm.material.emissiveIntensity = 0.4 + audioMult * 1.0;
    }
  }

  // Particles drift
  const pos = particles.geometry.attributes.position;
  for (let i = 0; i < particleCount; i++) {
    pos.array[i*3+1] += 0.003 + audioMult * 0.005;
    if (pos.array[i*3+1] > 8) pos.array[i*3+1] = -8;
    pos.array[i*3] += Math.sin(t + i) * 0.001;
  }
  pos.needsUpdate = true;

  // Camera subtle movement
  camera.position.x += (mouseX * 1.5 - camera.position.x) * 0.02;
  camera.position.y += (1 + mouseY * 0.5 - camera.position.y) * 0.02;
  camera.lookAt(0, jelly.position.y, 0);

  renderer.render(scene, camera);
}

animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

// Hide title after a few seconds
setTimeout(() => {
  document.querySelector('h1').style.transition = 'opacity 3s';
  document.querySelector('h1').style.opacity = '0';
}, 6000);
</script>
</body>
</html>
