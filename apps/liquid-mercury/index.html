<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Liquid Mercury — chrome blobs, satisfying physics</title>
<meta name="description" content="A dark-mode liquid-mercury simulation. Drag, push, shake. Watch the chrome blobs coalesce.">
<meta property="og:title" content="Liquid Mercury">
<meta property="og:description" content="A dark-mode liquid-mercury simulation. Drag, push, shake. Watch the chrome blobs coalesce.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://sloppy.live/liquid-mercury/">
<meta property="og:image" content="https://image.pollinations.ai/prompt/liquid%20mercury%20metallic%20chrome%20blobs%20on%20deep%20black%20background%20physics%20coalescing%20silver%20droplets%20studio%20lighting%20macro%20photography%20satisfying?width=1200&height=630&model=flux&nologo=true&seed=80212">
<link rel="icon" href="https://emojicdn.elk.sh/%E2%9A%AB">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=IBM+Plex+Mono:wght@400;500&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">
<style>
:root{
  --void:#04040a;
  --jet:#0a0a12;
  --silver:#d2d2dc;
  --mist:#7d818b;
  --faint:rgba(210,210,220,0.32);
  --dim:rgba(210,210,220,0.55);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{height:100%; margin:0; overflow:hidden}
body{
  font-family:'IBM Plex Mono', monospace; color:var(--silver);
  background:
    radial-gradient(60vmin 60vmin at 30% 25%, rgba(70,80,110,0.18), transparent 65%),
    radial-gradient(50vmin 50vmin at 75% 75%, rgba(40,50,70,0.20), transparent 60%),
    radial-gradient(80vmin 80vmin at 50% 50%, #0e0e1a 0%, var(--void) 70%);
  background-attachment: fixed;
}
.stage{ position:fixed; inset:0; overflow:hidden; }

/* canvases stacked */
canvas{
  position:absolute; inset:0; width:100%; height:100%;
  display:block;
}
#meta{
  /* the metaball trick: soft radial gradients become a sharp chrome surface */
  filter: blur(7px) contrast(24) brightness(1.05) saturate(0.6);
  -webkit-filter: blur(7px) contrast(24) brightness(1.05) saturate(0.6);
}
#sheen{ mix-blend-mode: screen; opacity:0.85; }
#shadow{ mix-blend-mode: multiply; opacity:0.85; pointer-events:none; }
#scene{ pointer-events:none; mix-blend-mode: overlay; opacity:0.45; }

/* faint vignette + grain */
.stage::before{
  content:''; position:absolute; inset:0; pointer-events:none; z-index:6;
  background:
    radial-gradient(140vmin 140vmin at 50% 50%, transparent 55%, rgba(0,0,0,0.55) 100%),
    repeating-linear-gradient(0deg, rgba(255,255,255,0.012) 0 1px, transparent 1px 4px);
  mix-blend-mode: overlay;
}

/* HUD */
.hud{
  position:fixed; left:1.2rem; top:1.2rem; z-index:10;
  display:flex; flex-direction:column; gap:.3rem;
  pointer-events:none;
}
.hud h1{
  font-family:'Major Mono Display', monospace; font-weight:400;
  font-size:clamp(1.4rem, 3.4vw, 2.2rem); line-height:1; margin:0;
  letter-spacing:.04em; color:var(--silver);
  text-shadow: 0 0 18px rgba(180,180,200,0.35);
}
.hud .tag{
  font-family:'Cormorant Garamond', serif; font-style:italic;
  font-size: clamp(0.95rem, 1.6vw, 1.15rem);
  color: var(--dim); letter-spacing: .03em;
}
.hud .meta{
  display:flex; gap:.9rem; flex-wrap:wrap;
  font-size:.7rem; letter-spacing:.22em; text-transform:uppercase;
  color: var(--faint); margin-top:.2rem;
}
.hud .meta span{ display:inline-flex; align-items:center; gap:.3em; }
.hud .meta b{ color:var(--silver); font-weight:500; }

/* controls dock */
.dock{
  position:fixed; bottom:1rem; left:50%; transform:translateX(-50%);
  z-index:10;
  display:flex; gap:.5rem; padding:.55rem .7rem;
  background:rgba(10,10,18,0.55);
  border:1px solid rgba(210,210,220,0.10);
  border-radius: 22px;
  backdrop-filter: blur(12px) saturate(140%);
  -webkit-backdrop-filter: blur(12px) saturate(140%);
  flex-wrap: wrap; justify-content:center;
  max-width: calc(100vw - 2rem);
}
.btn{
  appearance:none; background:rgba(210,210,220,0.04);
  border:1px solid rgba(210,210,220,0.18);
  color: var(--silver);
  font-family:'IBM Plex Mono', monospace; font-size:.7rem;
  letter-spacing:.18em; text-transform:uppercase;
  padding:.55rem .8rem; border-radius:14px; cursor:pointer;
  min-height: 44px;
  transition: all .15s;
  display:inline-flex; align-items:center; gap:.4em;
}
.btn:hover, .btn:focus-visible{
  background: rgba(210,210,220,0.12);
  border-color: rgba(210,210,220,0.45);
  outline:none;
}
.btn:focus-visible{ box-shadow: 0 0 0 2px rgba(210,210,220,0.5); }
.btn[aria-pressed="true"]{
  background: rgba(210,210,220,0.20);
  border-color: rgba(210,210,220,0.6);
  color: #fff;
}
.btn.danger{ color: #ffb0b8; border-color: rgba(255, 176, 184, 0.25); }
.btn.danger:hover{ background: rgba(255, 176, 184, 0.08); border-color: rgba(255, 176, 184, 0.55); }
.sld{
  display:inline-flex; align-items:center; gap:.5em;
  background: rgba(210,210,220,0.04);
  border:1px solid rgba(210,210,220,0.18);
  padding:0 .6rem; border-radius:14px;
  font-family:'IBM Plex Mono', monospace; font-size:.65rem;
  letter-spacing:.15em; text-transform:uppercase;
  color: var(--dim); min-height:44px;
}
.sld input[type=range]{
  -webkit-appearance:none; appearance:none;
  width:90px; height:6px; border-radius:3px;
  background: linear-gradient(90deg, var(--silver) var(--v, 50%), rgba(210,210,220,0.10) var(--v, 50%));
  outline:none; cursor:pointer;
}
.sld input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none; appearance:none;
  width:14px; height:14px; border-radius:50%;
  background: radial-gradient(circle at 35% 35%, #fff, var(--silver) 60%, #777 100%);
  border:none; cursor:pointer;
  box-shadow: 0 0 0 2px rgba(0,0,0,0.4);
}
.sld input[type=range]::-moz-range-thumb{
  width:14px; height:14px; border-radius:50%; border:none;
  background: radial-gradient(circle at 35% 35%, #fff, var(--silver) 60%, #777 100%);
  cursor:pointer;
}
.sld b{ color:var(--silver); font-weight:500; min-width:1.8em; text-align:right; }

/* fps tag */
.fps{
  position:fixed; right:1.2rem; top:1.2rem; z-index:10;
  font-family:'IBM Plex Mono', monospace; font-size:.65rem;
  letter-spacing:.22em; text-transform:uppercase;
  color:var(--faint);
}
.fps b{ color: var(--silver); font-weight:500; }

/* intro hint */
.hint{
  position:fixed; left:50%; top:50%; transform:translate(-50%,-50%);
  z-index:9; pointer-events:none;
  font-family:'Cormorant Garamond', serif; font-style:italic;
  color: rgba(210,210,220, 0.5);
  font-size: clamp(0.95rem, 1.8vw, 1.25rem);
  letter-spacing:.04em; text-align:center;
  opacity:1; transition: opacity 1.2s 0.4s;
  text-shadow: 0 0 18px rgba(0,0,0,0.6);
}
.hint.gone{ opacity:0; }

@media (max-width: 640px){
  .hud{ left:.8rem; top:.7rem; }
  .fps{ right:.8rem; top:.7rem; }
  .dock{ padding:.4rem .5rem; gap:.35rem; }
  .btn, .sld{ font-size:.6rem; padding-left:.55rem; padding-right:.55rem; }
  .sld input[type=range]{ width:64px; }
}
@media (prefers-reduced-motion: reduce){
  .hint{ transition:none; }
}
</style>
</head>
<body>
<div class="stage" role="application" aria-label="Liquid mercury simulation. Drag to swirl. Press shake or splash to disturb the surface.">
  <canvas id="shadow" aria-hidden="true"></canvas>
  <canvas id="meta" aria-hidden="true"></canvas>
  <canvas id="sheen" aria-hidden="true"></canvas>
  <canvas id="scene" aria-hidden="true"></canvas>
</div>

<header class="hud" aria-label="App title">
  <h1>Liquid Mercury</h1>
  <div class="tag">chrome drops, viscous &amp; cold</div>
  <div class="meta">
    <span>drops <b id="m-count">96</b></span>
    <span>g <b id="m-grav">1.0</b></span>
    <span>impulses <b id="m-imp">0</b></span>
  </div>
</header>

<div class="fps">fps <b id="m-fps">—</b></div>

<div class="hint" id="hint">drag the silver — shake the room</div>

<nav class="dock" aria-label="Controls">
  <button class="btn" type="button" id="btn-shake" aria-label="Shake — apply a random impulse to every drop">⌖ Shake</button>
  <button class="btn" type="button" id="btn-splash" aria-label="Splash — split the largest droplets into smaller ones">◌ Splash</button>
  <button class="btn" type="button" id="btn-attract" aria-pressed="false" aria-label="Toggle cursor attractor — drops follow the pointer">⌬ Magnet</button>
  <label class="sld" aria-label="Gravity slider">grav<input id="sl-grav" type="range" min="0" max="180" value="100"><b id="v-grav">1.0</b></label>
  <label class="sld" aria-label="Drop count slider">drops<input id="sl-count" type="range" min="20" max="160" value="96"><b id="v-count">96</b></label>
  <button class="btn danger" type="button" id="btn-reset" aria-label="Reset the simulation">↺ Reset</button>
</nav>

<script>
(function(){
  const $shadow = document.getElementById('shadow');
  const $meta   = document.getElementById('meta');
  const $sheen  = document.getElementById('sheen');
  const $scene  = document.getElementById('scene');
  const ctxShadow = $shadow.getContext('2d');
  const ctxMeta   = $meta.getContext('2d');
  const ctxSheen  = $sheen.getContext('2d');
  const ctxScene  = $scene.getContext('2d');

  let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);

  function resize(){
    const r = document.querySelector('.stage').getBoundingClientRect();
    W = Math.round(r.width); H = Math.round(r.height);
    for (const [c, ctx] of [[$shadow, ctxShadow], [$meta, ctxMeta], [$sheen, ctxSheen], [$scene, ctxScene]]){
      c.width  = Math.round(W * DPR);
      c.height = Math.round(H * DPR);
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }
  }
  window.addEventListener('resize', resize);
  resize();

  // --- physics ---
  const state = {
    particles: [],
    count: 96,
    gravity: 600,          // baseline px/s², scaled by slider
    gravScale: 1.0,
    damping: 0.985,        // per frame
    bounceLoss: 0.55,
    pointer: { x: -9999, y: -9999, down: false, vx: 0, vy: 0, lx: 0, ly: 0, lt: 0 },
    attract: false,
    impulses: 0,
    lastT: 0,
    accFps: 0, fpsFrames: 0, fpsLastT: 0,
  };

  function makeParticle(){
    return {
      x: W * (0.15 + Math.random() * 0.7),
      y: H * (0.10 + Math.random() * 0.35),
      vx: (Math.random() - 0.5) * 60,
      vy: (Math.random() - 0.5) * 40,
      r: 10 + Math.random() * 6,
    };
  }
  function rebuild(n){
    state.count = n;
    state.particles = [];
    for (let i = 0; i < n; i++) state.particles.push(makeParticle());
  }
  rebuild(state.count);

  // --- input ---
  const stage = document.querySelector('.stage');
  function ptr(e){
    const r = stage.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }
  stage.addEventListener('pointerdown', e => {
    const p = ptr(e);
    state.pointer.down = true;
    state.pointer.x = p.x; state.pointer.y = p.y;
    state.pointer.lx = p.x; state.pointer.ly = p.y;
    state.pointer.lt = performance.now();
    state.pointer.vx = 0; state.pointer.vy = 0;
    e.preventDefault();
    document.getElementById('hint').classList.add('gone');
  });
  stage.addEventListener('pointermove', e => {
    const p = ptr(e);
    const now = performance.now();
    const dt = (now - state.pointer.lt) / 1000;
    if (dt > 0){
      state.pointer.vx = (p.x - state.pointer.lx) / dt;
      state.pointer.vy = (p.y - state.pointer.ly) / dt;
    }
    state.pointer.x = p.x; state.pointer.y = p.y;
    state.pointer.lx = p.x; state.pointer.ly = p.y;
    state.pointer.lt = now;
  });
  stage.addEventListener('pointerup',   () => { state.pointer.down = false; });
  stage.addEventListener('pointerleave',() => { state.pointer.down = false; state.pointer.x = state.pointer.y = -9999; });

  // controls
  const $count = document.getElementById('sl-count');
  const $grav  = document.getElementById('sl-grav');
  const $vCount= document.getElementById('v-count');
  const $vGrav = document.getElementById('v-grav');
  const $mCount= document.getElementById('m-count');
  const $mGrav = document.getElementById('m-grav');
  const $mImp  = document.getElementById('m-imp');
  const $mFps  = document.getElementById('m-fps');
  $count.style.setProperty('--v', '50%');
  $grav.style.setProperty('--v', '55%');

  $count.addEventListener('input', () => {
    const n = +$count.value;
    $vCount.textContent = n;
    $mCount.textContent = n;
    $count.style.setProperty('--v', ((n - 20) / 140 * 100).toFixed(1) + '%');
    rebuild(n);
  });
  $grav.addEventListener('input', () => {
    const v = +$grav.value / 100;
    state.gravScale = v;
    $vGrav.textContent = v.toFixed(1);
    $mGrav.textContent = v.toFixed(1);
    $grav.style.setProperty('--v', (+$grav.value / 180 * 100).toFixed(1) + '%');
  });

  document.getElementById('btn-shake').addEventListener('click', () => {
    state.impulses++; $mImp.textContent = state.impulses;
    for (const p of state.particles){
      const a = Math.random() * Math.PI * 2;
      const m = 180 + Math.random() * 380;
      p.vx += Math.cos(a) * m;
      p.vy += Math.sin(a) * m * 0.6 - 60; // slight upward bias
    }
    document.getElementById('hint').classList.add('gone');
  });

  document.getElementById('btn-splash').addEventListener('click', () => {
    state.impulses++; $mImp.textContent = state.impulses;
    // Push every particle outward from screen center
    const cx = W/2, cy = H/2;
    for (const p of state.particles){
      const dx = p.x - cx, dy = p.y - cy;
      const d = Math.hypot(dx, dy) || 1;
      const m = 280;
      p.vx += dx/d * m + (Math.random() - 0.5) * 60;
      p.vy += dy/d * m - 80;
    }
    document.getElementById('hint').classList.add('gone');
  });

  const $btnAttract = document.getElementById('btn-attract');
  $btnAttract.addEventListener('click', () => {
    state.attract = !state.attract;
    $btnAttract.setAttribute('aria-pressed', String(state.attract));
  });

  document.getElementById('btn-reset').addEventListener('click', () => {
    rebuild(state.count);
    state.impulses = 0;
    $mImp.textContent = '0';
  });

  // --- main loop ---
  function step(dt){
    const ps = state.particles;
    const g = state.gravity * state.gravScale;
    const dragHard = state.pointer.down;
    const attract  = state.attract;

    // gravity + pointer interaction
    for (const p of ps){
      p.vy += g * dt;
      // air resistance / viscosity (mercury feels heavy AND damped)
      p.vx *= state.damping;
      p.vy *= state.damping;

      if (state.pointer.x > -1000){
        const dx = state.pointer.x - p.x, dy = state.pointer.y - p.y;
        const d2 = dx*dx + dy*dy;
        const reachR = dragHard ? 170 : (attract ? 240 : 0);
        if (reachR > 0 && d2 < reachR * reachR && d2 > 1){
          const d = Math.sqrt(d2);
          const f = (1 - d / reachR);
          if (dragHard){
            // strong attract + drag the pointer's velocity into the drop
            const pull = 1200 * f * dt;
            p.vx += (dx / d) * pull;
            p.vy += (dy / d) * pull;
            p.vx += state.pointer.vx * 0.08 * f;
            p.vy += state.pointer.vy * 0.08 * f;
          } else if (attract){
            const pull = 380 * f * dt;
            p.vx += (dx / d) * pull;
            p.vy += (dy / d) * pull;
          }
        }
      }

      p.x += p.vx * dt;
      p.y += p.vy * dt;

      // walls
      if (p.x < p.r){ p.x = p.r; p.vx = -p.vx * state.bounceLoss; }
      if (p.x > W - p.r){ p.x = W - p.r; p.vx = -p.vx * state.bounceLoss; }
      if (p.y < p.r){ p.y = p.r; p.vy = -p.vy * state.bounceLoss; }
      if (p.y > H - p.r){
        p.y = H - p.r;
        p.vy = -p.vy * state.bounceLoss;
        p.vx *= 0.85;
      }
    }

    // soft collisions — mercury sticks together but doesn't overlap
    for (let i = 0; i < ps.length; i++){
      const a = ps[i];
      for (let j = i + 1; j < ps.length; j++){
        const b = ps[j];
        const dx = b.x - a.x, dy = b.y - a.y;
        const d2 = dx*dx + dy*dy;
        const minD = (a.r + b.r) * 0.84;        // a touch of overlap allowed so metaballs merge visually
        if (d2 > 0 && d2 < minD*minD){
          const d = Math.sqrt(d2);
          const overlap = (minD - d) * 0.5;
          const nx = dx / d, ny = dy / d;
          a.x -= nx * overlap;
          a.y -= ny * overlap;
          b.x += nx * overlap;
          b.y += ny * overlap;
          // small velocity exchange (mercury is cohesive so we kill some relative velocity)
          const rvx = b.vx - a.vx, rvy = b.vy - a.vy;
          const dotN = rvx * nx + rvy * ny;
          if (dotN < 0){
            const imp = dotN * 0.5;
            a.vx += nx * imp; a.vy += ny * imp;
            b.vx -= nx * imp; b.vy -= ny * imp;
          }
        }
      }
    }

    // decay pointer velocity when idle
    state.pointer.vx *= 0.85;
    state.pointer.vy *= 0.85;
  }

  function render(){
    // 1) metaball pass — soft radial gradients (cheap chrome surface via filter)
    ctxMeta.clearRect(0, 0, W, H);
    for (const p of state.particles){
      const rr = p.r * 3;
      const g = ctxMeta.createRadialGradient(p.x, p.y, 0, p.x, p.y, rr);
      g.addColorStop(0.0, 'rgba(228,228,236,0.95)');
      g.addColorStop(0.30, 'rgba(190,190,205,0.55)');
      g.addColorStop(0.65, 'rgba(110,110,130,0.18)');
      g.addColorStop(1.00, 'rgba(0,0,0,0)');
      ctxMeta.fillStyle = g;
      ctxMeta.beginPath();
      ctxMeta.arc(p.x, p.y, rr, 0, Math.PI*2);
      ctxMeta.fill();
    }

    // 2) sheen — bright specular dots at upper-left of each drop
    ctxSheen.clearRect(0, 0, W, H);
    for (const p of state.particles){
      const sx = p.x - p.r * 0.32;
      const sy = p.y - p.r * 0.38;
      const sr = p.r * 0.55;
      const g = ctxSheen.createRadialGradient(sx, sy, 0, sx, sy, sr);
      g.addColorStop(0, 'rgba(255,255,255,0.85)');
      g.addColorStop(0.5, 'rgba(255,255,255,0.25)');
      g.addColorStop(1, 'rgba(255,255,255,0)');
      ctxSheen.fillStyle = g;
      ctxSheen.beginPath();
      ctxSheen.arc(sx, sy, sr, 0, Math.PI*2);
      ctxSheen.fill();
    }

    // 3) shadow — soft dark blob under each drop (subtle depth)
    ctxShadow.clearRect(0, 0, W, H);
    for (const p of state.particles){
      const sy = p.y + p.r * 0.5;
      const sr = p.r * 1.8;
      const g = ctxShadow.createRadialGradient(p.x, sy, 0, p.x, sy, sr);
      g.addColorStop(0, 'rgba(0,0,0,0.45)');
      g.addColorStop(0.6, 'rgba(0,0,0,0.18)');
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctxShadow.fillStyle = g;
      ctxShadow.beginPath();
      ctxShadow.arc(p.x, sy, sr, 0, Math.PI*2);
      ctxShadow.fill();
    }

    // 4) scene — subtle cool/warm environment reflection (gives mercury color depth)
    ctxScene.clearRect(0, 0, W, H);
    const g1 = ctxScene.createLinearGradient(0, 0, 0, H);
    g1.addColorStop(0, 'rgba(180, 200, 240, 0.45)');
    g1.addColorStop(0.5, 'rgba(40, 40, 60, 0.0)');
    g1.addColorStop(1, 'rgba(180, 150, 110, 0.18)');
    ctxScene.fillStyle = g1;
    ctxScene.fillRect(0, 0, W, H);
  }

  function loop(t){
    if (!state.lastT) state.lastT = t;
    let dt = (t - state.lastT) / 1000;
    state.lastT = t;
    if (dt > 0.05) dt = 0.05;  // clamp huge frame gaps (tab returning)

    step(dt);
    render();

    // fps tag
    state.fpsFrames++;
    if (t - state.fpsLastT > 800){
      const fps = state.fpsFrames * 1000 / (t - state.fpsLastT);
      $mFps.textContent = fps.toFixed(0);
      state.fpsLastT = t;
      state.fpsFrames = 0;
    }
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  // welcome shake so the first frame isn't a sad puddle
  setTimeout(() => document.getElementById('btn-shake').click(), 220);
})();
</script>
</body>
</html>
