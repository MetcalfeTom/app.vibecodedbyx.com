<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Fart Pad</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%92%A8" />
<meta name="description" content="A pad of 12 farts. Each one different. Hold for a sustained brrrt." />
<meta property="og:title" content="Fart Pad" />
<meta property="og:description" content="Twelve perfectly engineered fart buttons. Each a distinct synth recipe. Hold for a sustained brrrt." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://sloppy.live/fart-pad/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/Cinematic%20product%20shot%20of%20a%20glowing%20neon%20pink%20and%20cyan%20futuristic%20fart%20soundboard%20with%2012%20chunky%20rubber%20buttons%2C%20each%20labeled%20with%20a%20different%20fart%20style%2C%20on%20a%20dark%20studio%20background%2C%20synthwave%20vibes%2C%20comedy%20product%20photography.png?width=1200&height=630&nologo=true" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee+Inline&family=Bungee&family=VT323&family=Fredoka:wght@500;600&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0c0418;
    --bg-2: #1a072b;
    --pink: #ff3da3;
    --cyan: #5ee0ff;
    --yellow: #ffe14a;
    --lime: #b6ff3a;
    --orange: #ff8a3a;
    --violet: #c47bff;
    --red: #ff3a3a;
    --paper: #f3eaff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { min-height: 100%; }
  body {
    min-height: 100vh;
    background:
      radial-gradient(900px 700px at 25% 25%, rgba(255,61,163,0.18), transparent 65%),
      radial-gradient(700px 600px at 80% 80%, rgba(94,224,255,0.13), transparent 60%),
      radial-gradient(60% 70% at 50% 100%, rgba(255,138,58,0.1), transparent 70%),
      linear-gradient(180deg, var(--bg-2) 0%, var(--bg) 70%, #04020a 100%);
    color: var(--paper);
    font-family: 'Space Mono', monospace;
    user-select: none;
    -webkit-user-select: none;
    overflow-x: hidden;
    padding: 28px 18px 80px;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,61,163,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(94,224,255,0.04) 1px, transparent 1px);
    background-size: 36px 36px;
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(180deg, rgba(0,0,0,0.14) 0 1px, transparent 1px 3px);
    pointer-events: none;
    mix-blend-mode: multiply;
    z-index: 1;
  }

  header {
    position: relative;
    z-index: 2;
    text-align: center;
    margin-bottom: 18px;
  }
  h1 {
    font-family: 'Bungee Inline', sans-serif;
    font-size: clamp(46px, 8vw, 96px);
    line-height: 0.95;
    letter-spacing: 0.02em;
    color: var(--pink);
    text-shadow:
      0 0 6px var(--pink),
      0 0 22px var(--pink),
      4px 4px 0 var(--bg-2),
      8px 8px 0 var(--cyan);
  }
  .tag {
    margin-top: 12px;
    font-family: 'Fredoka', sans-serif;
    font-style: italic;
    font-weight: 500;
    color: var(--yellow);
    letter-spacing: 0.18em;
    font-size: clamp(11px, 1.6vw, 13px);
    text-shadow: 0 0 8px rgba(255,225,74,0.5);
  }
  .stats {
    margin-top: 10px;
    font-family: 'VT323', monospace;
    font-size: 18px;
    color: var(--cyan);
    letter-spacing: 0.16em;
    text-shadow: 0 0 8px var(--cyan);
  }
  .stats .num {
    color: var(--lime);
    text-shadow: 0 0 10px var(--lime);
  }

  .pad {
    position: relative;
    z-index: 2;
    max-width: 760px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
  }
  .btn {
    position: relative;
    aspect-ratio: 1.05 / 1;
    background: linear-gradient(180deg, #2a0e3c, #16041e);
    border: 2px solid rgba(255,61,163,0.35);
    border-radius: 18px;
    color: var(--paper);
    font-family: 'Bungee', sans-serif;
    font-size: clamp(14px, 1.8vw, 20px);
    letter-spacing: 0.04em;
    cursor: pointer;
    overflow: hidden;
    transition: transform 0.08s ease, border-color 0.18s, box-shadow 0.2s;
    text-shadow: 0 0 6px var(--pink), 0 1px 0 #000;
    box-shadow: 0 6px 0 #060108, inset 0 1px 0 rgba(255,255,255,0.08);
    padding: 12px 10px 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 6px;
  }
  .btn .emoji {
    font-size: clamp(28px, 4.4vw, 42px);
    text-shadow: 0 0 12px rgba(255,61,163,0.4);
    line-height: 1;
  }
  .btn .num {
    position: absolute;
    top: 8px;
    left: 10px;
    font-family: 'VT323', monospace;
    font-size: 14px;
    color: rgba(243,234,255,0.45);
    letter-spacing: 0.18em;
  }
  .btn .desc {
    position: absolute;
    bottom: 6px;
    left: 0; right: 0;
    text-align: center;
    font-family: 'VT323', monospace;
    font-size: 12px;
    letter-spacing: 0.16em;
    color: rgba(94,224,255,0.6);
    pointer-events: none;
    text-shadow: 0 0 4px rgba(94,224,255,0.4);
  }
  .btn[data-color="cyan"] { color: var(--cyan); border-color: rgba(94,224,255,0.4); text-shadow: 0 0 6px var(--cyan), 0 1px 0 #000; background: linear-gradient(180deg, #082030, #04101c); }
  .btn[data-color="cyan"] .emoji { text-shadow: 0 0 12px rgba(94,224,255,0.5); }
  .btn[data-color="yellow"] { color: var(--yellow); border-color: rgba(255,225,74,0.4); text-shadow: 0 0 6px var(--yellow), 0 1px 0 #000; background: linear-gradient(180deg, #2a1d04, #18120a); }
  .btn[data-color="yellow"] .emoji { text-shadow: 0 0 12px rgba(255,225,74,0.5); }
  .btn[data-color="lime"] { color: var(--lime); border-color: rgba(182,255,58,0.4); text-shadow: 0 0 6px var(--lime), 0 1px 0 #000; background: linear-gradient(180deg, #1c2806, #0c160a); }
  .btn[data-color="lime"] .emoji { text-shadow: 0 0 12px rgba(182,255,58,0.5); }
  .btn[data-color="orange"] { color: var(--orange); border-color: rgba(255,138,58,0.4); text-shadow: 0 0 6px var(--orange), 0 1px 0 #000; background: linear-gradient(180deg, #2a1604, #1a0a04); }
  .btn[data-color="orange"] .emoji { text-shadow: 0 0 12px rgba(255,138,58,0.5); }
  .btn[data-color="violet"] { color: var(--violet); border-color: rgba(196,123,255,0.4); text-shadow: 0 0 6px var(--violet), 0 1px 0 #000; background: linear-gradient(180deg, #200a30, #100418); }
  .btn[data-color="violet"] .emoji { text-shadow: 0 0 12px rgba(196,123,255,0.5); }
  .btn[data-color="red"] { color: var(--red); border-color: rgba(255,58,58,0.4); text-shadow: 0 0 6px var(--red), 0 1px 0 #000; background: linear-gradient(180deg, #2a0606, #1a0202); }
  .btn[data-color="red"] .emoji { text-shadow: 0 0 12px rgba(255,58,58,0.5); }
  .btn:hover { box-shadow: 0 6px 0 #060108, 0 0 24px currentColor, inset 0 1px 0 rgba(255,255,255,0.12); }
  .btn:active, .btn.pressed {
    transform: translateY(3px);
    box-shadow: 0 3px 0 #060108, 0 0 32px currentColor, inset 0 0 18px rgba(255,255,255,0.18);
  }
  .btn .key {
    position: absolute;
    top: 8px; right: 10px;
    font-family: 'VT323', monospace;
    font-size: 12px;
    color: rgba(243,234,255,0.5);
    letter-spacing: 0.14em;
    border: 1px solid rgba(255,255,255,0.16);
    padding: 1px 5px;
    border-radius: 3px;
  }

  /* big hold-to-fart button */
  .longpress-row {
    margin-top: 24px;
    max-width: 760px;
    margin-left: auto;
    margin-right: auto;
  }
  .longpress {
    width: 100%;
    height: 96px;
    background: linear-gradient(180deg, #ff5a3a, #c8240e);
    border: 2px solid #ff8a3a;
    border-radius: 18px;
    color: #fff;
    font-family: 'Bungee', sans-serif;
    font-size: clamp(22px, 3vw, 34px);
    letter-spacing: 0.16em;
    cursor: pointer;
    text-shadow: 0 0 12px rgba(255,255,255,0.6), 2px 2px 0 #6a0d04;
    box-shadow:
      0 6px 0 #5a0a04,
      0 0 30px rgba(255,138,58,0.5),
      inset 0 1px 0 rgba(255,255,255,0.22);
    transition: transform 0.08s ease, box-shadow 0.18s;
    position: relative;
    overflow: hidden;
  }
  .longpress::before, .longpress::after {
    content: '💨';
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-size: 44px;
  }
  .longpress::before { left: 22px; }
  .longpress::after  { right: 22px; transform: translateY(-50%) scaleX(-1); }
  .longpress.held {
    transform: translateY(4px);
    box-shadow:
      0 2px 0 #5a0a04,
      0 0 50px rgba(255,138,58,0.95),
      inset 0 0 24px rgba(255,255,255,0.28);
    animation: holdRumble 0.18s linear infinite;
  }
  @keyframes holdRumble {
    0% { transform: translate(0, 4px); }
    25% { transform: translate(-1px, 5px); }
    50% { transform: translate(1px, 3px); }
    75% { transform: translate(-1px, 4px); }
    100% { transform: translate(0, 4px); }
  }

  .legend {
    margin-top: 18px;
    text-align: center;
    font-family: 'VT323', monospace;
    font-size: 14px;
    letter-spacing: 0.18em;
    color: rgba(243,234,255,0.45);
  }
  .legend kbd {
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.18);
    padding: 1px 6px;
    border-radius: 4px;
    font-family: 'VT323', monospace;
    color: var(--yellow);
  }
  .mute {
    background: transparent;
    color: rgba(243,233,255,0.55);
    border: 1px solid rgba(243,233,255,0.22);
    border-radius: 6px;
    padding: 5px 10px;
    font-family: 'VT323', monospace;
    font-size: 14px;
    letter-spacing: 0.18em;
    cursor: pointer;
    margin-left: 10px;
  }
  .mute:hover { color: var(--pink); border-color: var(--pink); }

  .burst {
    position: absolute;
    pointer-events: none;
    font-family: 'Bungee', sans-serif;
    font-size: 22px;
    color: var(--yellow);
    text-shadow: 0 0 14px var(--yellow), 2px 2px 0 var(--bg-2);
    z-index: 12;
    animation: burst 1.2s ease-out forwards;
    letter-spacing: 0.08em;
    white-space: nowrap;
  }
  @keyframes burst {
    0%   { transform: translate(-50%, 0) scale(0.5) rotate(-3deg); opacity: 0; }
    20%  { transform: translate(-50%, -10px) scale(1.18) rotate(2deg); opacity: 1; }
    100% { transform: translate(-50%, -120px) scale(0.85) rotate(-2deg); opacity: 0; }
  }
  /* puff cloud emoji that floats up too */
  .puff {
    position: absolute;
    pointer-events: none;
    font-size: 36px;
    z-index: 11;
    animation: puff 1.4s ease-out forwards;
    opacity: 0.85;
  }
  @keyframes puff {
    0%   { transform: translate(-50%, 0) scale(0.4); opacity: 0; }
    25%  { opacity: 1; }
    100% { transform: translate(-50%, -180px) scale(1.6) rotate(20deg); opacity: 0; }
  }

  @media (max-width: 540px) {
    .pad { grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .btn { font-size: 12px; padding: 8px 6px 18px; }
    .btn .emoji { font-size: 28px; }
    .btn .desc { font-size: 10px; }
    .btn .num, .btn .key { font-size: 11px; }
    .longpress { height: 80px; }
  }
  @media (max-width: 380px) {
    .pad { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<header>
  <h1>FART · PAD</h1>
  <div class="tag">— TWELVE BUTTONS · TWELVE FARTS · ONE BIG HOLD-TO-RUMBLE —</div>
  <div class="stats">total farts <span class="num" id="cnt">0</span> <button class="mute" id="muteBtn">♪ ON</button></div>
</header>

<div class="pad" id="pad"></div>

<div class="longpress-row">
  <button class="longpress" id="hold">HOLD TO BRRRRRT</button>
</div>

<div class="legend">
  press <kbd>1</kbd>–<kbd>9</kbd>·<kbd>0</kbd>·<kbd>Q</kbd>·<kbd>W</kbd> for the pad · hold <kbd>SPACE</kbd> for sustained
</div>

<script>
(() => {
  const $ = id => document.getElementById(id);
  const pad = $('pad');
  const cntEl = $('cnt');
  const holdBtn = $('hold');
  const muteBtn = $('muteBtn');
  let muted = false;
  let count = 0;
  try { count = parseInt(localStorage.getItem('fartpad-count')) || 0; } catch(e){}
  cntEl.textContent = count;

  // ============ AUDIO ============
  let actx = null;
  function ac(){
    if(!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    return actx;
  }

  // === Fart recipe library — each is a different style ===
  // All take `level` 0..1+ as intensity multiplier.

  function fartClassic(level=1){
    const a = ac();
    const t0 = a.currentTime;
    const dur = 0.42 + Math.random() * 0.4 + level*0.15;
    const buf = a.createBuffer(1, Math.floor(a.sampleRate * dur), a.sampleRate);
    const data = buf.getChannelData(0);
    for(let i=0; i<data.length; i++){
      const t = i / a.sampleRate;
      const wob = 0.7 + Math.sin(t*28 + Math.sin(t*8)*1.3)*0.3;
      data[i] = (Math.random()*2-1) * wob * Math.pow(1 - i/data.length, 0.6);
    }
    const src = a.createBufferSource(); src.buffer = buf;
    const bp = a.createBiquadFilter(); bp.type='bandpass'; bp.Q.value=3.6;
    bp.frequency.setValueAtTime(220, t0);
    bp.frequency.linearRampToValueAtTime(380, t0+dur*0.4);
    bp.frequency.linearRampToValueAtTime(140, t0+dur);
    const g = gainEnv(a, t0, 0.02, 0.18*level + 0.16, dur);
    const sub = subThump(a, t0, 70, 40, dur, 14);
    src.connect(bp).connect(g).connect(a.destination);
    src.start();
  }

  function fartSqueaker(level=1){
    const a = ac(); const t0 = a.currentTime;
    // High-pitched mouse-squeak fart
    const dur = 0.32 + level*0.1;
    const o = a.createOscillator();
    o.type = 'sawtooth';
    o.frequency.setValueAtTime(680, t0);
    // wiggle up and down
    const lfo = a.createOscillator();
    lfo.type = 'sine'; lfo.frequency.value = 22;
    const lfoG = a.createGain(); lfoG.gain.value = 280;
    lfo.connect(lfoG); lfoG.connect(o.frequency);
    lfo.start(); lfo.stop(t0+dur);
    o.frequency.linearRampToValueAtTime(420, t0+dur);
    const bp = a.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1400; bp.Q.value=4;
    const g = gainEnv(a, t0, 0.005, 0.12*level + 0.1, dur);
    o.connect(bp).connect(g).connect(a.destination);
    o.start(); o.stop(t0+dur+0.05);
  }

  function fartWetSlap(level=1){
    const a = ac(); const t0 = a.currentTime;
    // Single short, wet, slappy
    const dur = 0.18 + level*0.06;
    const buf = a.createBuffer(1, Math.floor(a.sampleRate*dur), a.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<d.length;i++){
      d[i] = (Math.random()*2-1) * Math.pow(1-i/d.length, 0.4);
    }
    const src = a.createBufferSource(); src.buffer=buf;
    const lp = a.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=600; lp.Q.value=3;
    const g = a.createGain(); g.gain.setValueAtTime(0,t0);
    g.gain.linearRampToValueAtTime(0.32*level + 0.18, t0+0.005);
    g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
    src.connect(lp).connect(g).connect(a.destination);
    src.start();
    // body thump
    const sub = a.createOscillator(); sub.type='sine'; sub.frequency.setValueAtTime(80,t0);
    sub.frequency.exponentialRampToValueAtTime(35, t0+dur);
    const sg = a.createGain(); sg.gain.setValueAtTime(0,t0);
    sg.gain.linearRampToValueAtTime(0.22, t0+0.01);
    sg.gain.exponentialRampToValueAtTime(0.001, t0+dur);
    sub.connect(sg).connect(a.destination);
    sub.start(); sub.stop(t0+dur+0.05);
  }

  function fartTrumpet(level=1){
    const a = ac(); const t0 = a.currentTime;
    // Sad-trombone descending fart
    const notes = [330, 280, 240, 180];
    notes.forEach((f, i) => {
      const dt = i * 0.16;
      const o = a.createOscillator(); o.type='sawtooth';
      o.frequency.setValueAtTime(f, t0+dt);
      o.frequency.linearRampToValueAtTime(f*0.9, t0+dt+0.16);
      const lfo = a.createOscillator(); lfo.frequency.value = 12;
      const lfoG = a.createGain(); lfoG.gain.value = 8;
      lfo.connect(lfoG); lfoG.connect(o.frequency);
      lfo.start(t0+dt); lfo.stop(t0+dt+0.18);
      const bp = a.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=900; bp.Q.value=5;
      const g = gainEnv(a, t0+dt, 0.02, 0.08*level + 0.08, 0.18);
      o.connect(bp).connect(g).connect(a.destination);
      o.start(t0+dt); o.stop(t0+dt+0.2);
    });
  }

  function fartBubbly(level=1){
    const a = ac(); const t0 = a.currentTime;
    // Bubbly underwater fart — multiple short pops
    for(let i=0;i<11;i++){
      const dt = i * 0.045 + Math.random()*0.02;
      const o = a.createOscillator(); o.type='sine';
      const f = 120 + Math.random()*220;
      o.frequency.setValueAtTime(f*1.6, t0+dt);
      o.frequency.exponentialRampToValueAtTime(f*0.7, t0+dt+0.06);
      const g = a.createGain(); g.gain.setValueAtTime(0,t0+dt);
      g.gain.linearRampToValueAtTime(0.16*level + 0.08, t0+dt+0.005);
      g.gain.exponentialRampToValueAtTime(0.001, t0+dt+0.07);
      o.connect(g).connect(a.destination);
      o.start(t0+dt); o.stop(t0+dt+0.08);
    }
  }

  function fartMachine(level=1){
    const a = ac(); const t0 = a.currentTime;
    // Rapid-fire machine-gun toots
    const dur = 0.05;
    for(let i=0;i<12;i++){
      const dt = i * 0.07;
      const o = a.createOscillator(); o.type='square';
      o.frequency.setValueAtTime(180 + Math.random()*60, t0+dt);
      const bp = a.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=560; bp.Q.value=4;
      const g = a.createGain(); g.gain.setValueAtTime(0,t0+dt);
      g.gain.linearRampToValueAtTime(0.14*level + 0.08, t0+dt+0.003);
      g.gain.exponentialRampToValueAtTime(0.001, t0+dt+dur);
      o.connect(bp).connect(g).connect(a.destination);
      o.start(t0+dt); o.stop(t0+dt+dur);
    }
  }

  function fartElephant(level=1){
    const a = ac(); const t0 = a.currentTime;
    // Big deep elephant-trumpet
    const dur = 1.2;
    const o = a.createOscillator(); o.type='sawtooth';
    o.frequency.setValueAtTime(110, t0);
    o.frequency.linearRampToValueAtTime(220, t0+0.3);
    o.frequency.linearRampToValueAtTime(60, t0+dur);
    const lfo = a.createOscillator(); lfo.frequency.value=8;
    const lfoG = a.createGain(); lfoG.gain.value = 18;
    lfo.connect(lfoG); lfoG.connect(o.frequency);
    lfo.start(); lfo.stop(t0+dur);
    const lp = a.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value=600; lp.Q.value=3;
    const g = gainEnv(a, t0, 0.05, 0.22*level + 0.12, dur);
    o.connect(lp).connect(g).connect(a.destination);
    o.start(); o.stop(t0+dur+0.1);
  }

  function fartMicro(level=1){
    const a = ac(); const t0 = a.currentTime;
    // Tiny pft
    const dur = 0.08;
    const buf = a.createBuffer(1, Math.floor(a.sampleRate*dur), a.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<d.length;i++) d[i] = (Math.random()*2-1)*Math.pow(1-i/d.length, 1.2);
    const src = a.createBufferSource(); src.buffer=buf;
    const bp = a.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=2200; bp.Q.value=6;
    const g = a.createGain(); g.gain.setValueAtTime(0,t0);
    g.gain.linearRampToValueAtTime(0.2*level + 0.1, t0+0.003);
    g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
    src.connect(bp).connect(g).connect(a.destination);
    src.start();
  }

  function fartChord(level=1){
    const a = ac(); const t0 = a.currentTime;
    // 3-voice fart chord
    const freqs = [120, 180, 240];
    const dur = 0.9;
    freqs.forEach((f, i) => {
      const o = a.createOscillator(); o.type='sawtooth';
      o.frequency.setValueAtTime(f, t0);
      o.frequency.linearRampToValueAtTime(f*0.85, t0+dur);
      const lfo = a.createOscillator(); lfo.frequency.value = 14 + i*3;
      const lfoG = a.createGain(); lfoG.gain.value = 8;
      lfo.connect(lfoG); lfoG.connect(o.frequency);
      lfo.start(); lfo.stop(t0+dur);
      const bp = a.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=400+i*150; bp.Q.value=4;
      const g = gainEnv(a, t0, 0.03, 0.07*level + 0.06, dur);
      o.connect(bp).connect(g).connect(a.destination);
      o.start(); o.stop(t0+dur+0.1);
    });
  }

  function fartGhost(level=1){
    const a = ac(); const t0 = a.currentTime;
    // Spooky high-pitch warbling fart-ghost
    const dur = 1.5;
    const o = a.createOscillator(); o.type='sawtooth';
    o.frequency.setValueAtTime(420, t0);
    const lfo = a.createOscillator(); lfo.type='sine'; lfo.frequency.value = 4.6;
    const lfoG = a.createGain(); lfoG.gain.value = 90;
    lfo.connect(lfoG); lfoG.connect(o.frequency);
    lfo.start(); lfo.stop(t0+dur);
    const bp = a.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1200; bp.Q.value=5;
    const g = gainEnv(a, t0, 0.1, 0.12*level + 0.08, dur);
    o.connect(bp).connect(g).connect(a.destination);
    o.start(); o.stop(t0+dur+0.1);
  }

  function fartLaser(level=1){
    const a = ac(); const t0 = a.currentTime;
    // Sci-fi descending zap fart
    const dur = 0.45;
    const o = a.createOscillator(); o.type='sawtooth';
    o.frequency.setValueAtTime(1200, t0);
    o.frequency.exponentialRampToValueAtTime(80, t0+dur);
    const bp = a.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=1800;
    bp.frequency.exponentialRampToValueAtTime(300, t0+dur);
    bp.Q.value=6;
    const g = gainEnv(a, t0, 0.005, 0.1*level + 0.06, dur);
    o.connect(bp).connect(g).connect(a.destination);
    o.start(); o.stop(t0+dur+0.1);
  }

  function fartCough(level=1){
    const a = ac(); const t0 = a.currentTime;
    // Awkward cough-fart hybrid
    const dur = 0.32;
    const buf = a.createBuffer(1, Math.floor(a.sampleRate*dur), a.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0;i<d.length;i++){
      const t = i/a.sampleRate;
      // burst at 0 and at 0.18s
      const env1 = i < a.sampleRate*0.06 ? 1 : 0;
      const env2 = (i > a.sampleRate*0.16 && i < a.sampleRate*0.28) ? 1 : 0;
      d[i] = (Math.random()*2-1) * (env1 + env2*0.7);
    }
    const src = a.createBufferSource(); src.buffer=buf;
    const bp = a.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=620; bp.Q.value=2.5;
    const g = a.createGain(); g.gain.setValueAtTime(0,t0);
    g.gain.linearRampToValueAtTime(0.22*level + 0.12, t0+0.005);
    g.gain.exponentialRampToValueAtTime(0.001, t0+dur);
    src.connect(bp).connect(g).connect(a.destination);
    src.start();
  }

  function gainEnv(a, t0, attack, sustain, total){
    const g = a.createGain();
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(sustain, t0+attack);
    g.gain.linearRampToValueAtTime(sustain*0.7, t0+total*0.6);
    g.gain.exponentialRampToValueAtTime(0.001, t0+total);
    return g;
  }
  function subThump(a, t0, fStart, fEnd, dur, lfoRate){
    const sub = a.createOscillator(); sub.type='sawtooth';
    sub.frequency.setValueAtTime(fStart, t0);
    sub.frequency.linearRampToValueAtTime(fEnd, t0+dur);
    const lfo = a.createOscillator(); lfo.frequency.value = lfoRate;
    const lfoG = a.createGain(); lfoG.gain.value = 12;
    lfo.connect(lfoG); lfoG.connect(sub.frequency);
    lfo.start(); lfo.stop(t0+dur);
    const sg = a.createGain(); sg.gain.setValueAtTime(0,t0);
    sg.gain.linearRampToValueAtTime(0.18, t0+0.04);
    sg.gain.exponentialRampToValueAtTime(0.001, t0+dur);
    sub.connect(sg).connect(a.destination);
    sub.start(); sub.stop(t0+dur+0.05);
  }

  // ============ FART CATALOG ============
  const FARTS = [
    { name: 'CLASSIC',   emoji: '💨', desc: 'the og',           color: 'cyan',   key: '1', play: fartClassic,  burst: ['PFFFRT', 'phwwp'] },
    { name: 'SQUEAKER',  emoji: '🐭', desc: 'mouse mode',       color: 'yellow', key: '2', play: fartSqueaker, burst: ['eep', 'sqweep!', 'eeeeeeee'] },
    { name: 'WET SLAP',  emoji: '💦', desc: 'concerning',       color: 'lime',   key: '3', play: fartWetSlap,  burst: ['SPLAT', 'thbblp', 'mhh'] },
    { name: 'TRUMPET',   emoji: '🎺', desc: 'sad horn',         color: 'orange', key: '4', play: fartTrumpet,  burst: ['wahh-wahhh', 'tooot…'] },
    { name: 'BUBBLY',    emoji: '🫧', desc: 'underwater',       color: 'cyan',   key: '5', play: fartBubbly,   burst: ['blub blub', 'bobloblob'] },
    { name: 'MACHINE',   emoji: '🔫', desc: 'rapid fire',       color: 'red',    key: '6', play: fartMachine,  burst: ['BBBRRRRRRT', 'bbbbbb'] },
    { name: 'ELEPHANT',  emoji: '🐘', desc: 'big trumpet',      color: 'violet', key: '7', play: fartElephant, burst: ['BRRRAAAAA', 'BWAAAH'] },
    { name: 'MICRO',     emoji: '🐜', desc: 'sneaky tiny',      color: 'yellow', key: '8', play: fartMicro,    burst: ['pft.', 'pip', '*'] },
    { name: 'CHORD',     emoji: '🎹', desc: 'three voices',     color: 'lime',   key: '9', play: fartChord,    burst: ['BWAAAA', 'symphony!'] },
    { name: 'GHOST',     emoji: '👻', desc: 'spooky',           color: 'violet', key: '0', play: fartGhost,    burst: ['ooooooooh', 'wooooop'] },
    { name: 'LASER',     emoji: '⚡', desc: 'sci-fi',            color: 'cyan',   key: 'q', play: fartLaser,    burst: ['PEW.', 'zooop'] },
    { name: 'COUGH',     emoji: '😶', desc: 'awkward',          color: 'orange', key: 'w', play: fartCough,    burst: ['ahem-prrt', 'oh god'] },
  ];

  // ============ BUILD PAD ============
  FARTS.forEach((f, i) => {
    const btn = document.createElement('button');
    btn.className = 'btn';
    btn.dataset.color = f.color;
    btn.dataset.idx = i;
    btn.innerHTML = `
      <span class="num">${(i+1).toString().padStart(2,'0')}</span>
      <span class="key">${f.key.toUpperCase()}</span>
      <span class="emoji">${f.emoji}</span>
      <span>${f.name}</span>
      <span class="desc">${f.desc}</span>
    `;
    btn.addEventListener('click', () => press(i, btn));
    pad.appendChild(btn);
  });

  function press(idx, btn){
    try { ac().resume(); } catch(e){}
    const f = FARTS[idx];
    if(!muted) f.play(0.7 + Math.random()*0.6);
    count++;
    cntEl.textContent = count;
    try { localStorage.setItem('fartpad-count', count); } catch(e){}
    btn.classList.add('pressed');
    setTimeout(() => btn.classList.remove('pressed'), 160);
    // burst caption
    const r = btn.getBoundingClientRect();
    const word = f.burst[Math.floor(Math.random()*f.burst.length)];
    const wb = document.createElement('div');
    wb.className = 'burst';
    wb.textContent = word;
    wb.style.left = (r.left + r.width/2) + 'px';
    wb.style.top  = (r.top + window.scrollY - 4) + 'px';
    wb.style.color = getCol(f.color);
    document.body.appendChild(wb);
    setTimeout(() => wb.remove(), 1300);
    // puff emoji
    const puff = document.createElement('div');
    puff.className = 'puff';
    puff.textContent = '💨';
    puff.style.left = (r.left + r.width/2 + (Math.random()*40-20)) + 'px';
    puff.style.top  = (r.top + window.scrollY + r.height*0.3) + 'px';
    document.body.appendChild(puff);
    setTimeout(() => puff.remove(), 1500);
  }

  function getCol(name){
    return ({
      cyan:'var(--cyan)', yellow:'var(--yellow)', lime:'var(--lime)',
      orange:'var(--orange)', violet:'var(--violet)', red:'var(--red)',
      pink:'var(--pink)'
    })[name] || 'var(--paper)';
  }

  // ============ HOLD-TO-FART ============
  let holdInterval = null;
  let holdLevel = 0;
  function holdStart(){
    try { ac().resume(); } catch(e){}
    if(holdInterval) return;
    holdLevel = 0.5;
    holdBtn.classList.add('held');
    // start a continuous noise rumble
    if(!muted) holdRumbleStart();
    // floating burst
    const r = holdBtn.getBoundingClientRect();
    holdInterval = setInterval(() => {
      holdLevel = Math.min(2.5, holdLevel + 0.05);
      const burst = ['BRRRRRRRRT', 'PFFFFFRT', 'BBBBBBBBB', 'phhhhh', 'BWAAAA'][Math.floor(Math.random()*5)];
      const wb = document.createElement('div');
      wb.className = 'burst';
      wb.textContent = burst;
      const r2 = holdBtn.getBoundingClientRect();
      wb.style.left = (r2.left + r2.width*(0.2 + Math.random()*0.6)) + 'px';
      wb.style.top  = (r2.top + window.scrollY - 4) + 'px';
      wb.style.color = ['var(--orange)', 'var(--yellow)', 'var(--red)'][Math.floor(Math.random()*3)];
      wb.style.fontSize = (16 + holdLevel*10) + 'px';
      document.body.appendChild(wb);
      setTimeout(() => wb.remove(), 1200);
      count++;
      cntEl.textContent = count;
    }, 220);
  }
  function holdEnd(){
    if(!holdInterval) return;
    clearInterval(holdInterval); holdInterval = null;
    holdBtn.classList.remove('held');
    holdRumbleStop(holdLevel);
    try { localStorage.setItem('fartpad-count', count); } catch(e){}
    holdLevel = 0;
  }

  let rumbleSrc = null, rumbleGain = null, rumbleBp = null, rumbleLfo = null;
  function holdRumbleStart(){
    const a = ac();
    const t0 = a.currentTime;
    // continuous noise loop
    const buf = a.createBuffer(1, a.sampleRate * 2, a.sampleRate);
    const d = buf.getChannelData(0);
    for(let i=0; i<d.length; i++){
      const t = i / a.sampleRate;
      const wob = 0.7 + Math.sin(t*22 + Math.sin(t*5)*1.2)*0.3;
      d[i] = (Math.random()*2-1) * wob;
    }
    const src = a.createBufferSource();
    src.buffer = buf; src.loop = true;
    const bp = a.createBiquadFilter();
    bp.type = 'bandpass'; bp.Q.value = 4.5;
    bp.frequency.value = 280;
    // wobble lfo
    const lfo = a.createOscillator(); lfo.frequency.value = 6.5;
    const lfoG = a.createGain(); lfoG.gain.value = 80;
    lfo.connect(lfoG); lfoG.connect(bp.frequency);
    lfo.start();
    const g = a.createGain();
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(0.32, t0 + 0.06);
    src.connect(bp).connect(g).connect(a.destination);
    src.start();
    rumbleSrc = src; rumbleGain = g; rumbleBp = bp; rumbleLfo = lfo;
  }
  function holdRumbleStop(){
    if(!rumbleSrc) return;
    const a = ac();
    const t0 = a.currentTime;
    rumbleGain.gain.cancelScheduledValues(t0);
    rumbleGain.gain.setValueAtTime(rumbleGain.gain.value, t0);
    rumbleGain.gain.exponentialRampToValueAtTime(0.001, t0 + 0.18);
    setTimeout(() => {
      try { rumbleSrc.stop(); rumbleLfo.stop(); } catch(e){}
      rumbleSrc = null; rumbleGain = null; rumbleBp = null; rumbleLfo = null;
    }, 240);
  }

  holdBtn.addEventListener('pointerdown', e => { holdStart(); e.preventDefault(); });
  holdBtn.addEventListener('pointerup', holdEnd);
  holdBtn.addEventListener('pointerleave', holdEnd);
  holdBtn.addEventListener('pointercancel', holdEnd);

  // mute
  muteBtn.addEventListener('click', () => {
    muted = !muted;
    muteBtn.textContent = muted ? '♪ OFF' : '♪ ON';
    if(muted) holdRumbleStop();
  });

  // keyboard
  document.addEventListener('keydown', e => {
    if(e.repeat) return;
    if(e.key === ' '){
      holdStart(); e.preventDefault(); return;
    }
    const k = e.key.toLowerCase();
    const idx = FARTS.findIndex(f => f.key === k);
    if(idx >= 0){
      const btn = pad.querySelector(`.btn[data-idx="${idx}"]`);
      if(btn) press(idx, btn);
    }
  });
  document.addEventListener('keyup', e => {
    if(e.key === ' '){ holdEnd(); }
  });

})();
</script>
</body>
