<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Piano Orbit</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#06031a">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8E%B9">
<meta name="description" content="Multiplayer neon piano with real-time synchronized notes and glowing waves. Every player gets a colour, every key press ripples out to everyone in the room.">
<meta property="og:title" content="Piano Orbit">
<meta property="og:description" content="Multiplayer neon piano with real-time synchronized notes and glowing waves. Every player gets a colour, every key press ripples out to everyone in the room.">
<meta property="og:url" content="https://sloppy.live/piano-orbit">
<meta property="og:image" content="https://image.pollinations.ai/prompt/neon%20piano%20keys%20with%20concentric%20glowing%20colour%20waves%20rippling%20across%20deep%20void%2C%20cyberpunk%20multiplayer%20music%20room%2C%20cyan%20magenta%20lime?width=1200&height=630&model=flux&seed=2112&nologo=true">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=JetBrains+Mono:wght@400;500;700&family=Space+Mono:wght@400;700&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#06031a;
    --void-2:#0d0728;
    --panel:#170c3c;
    --border:#3a1f6e;
    --ink:#f5ecff;
    --silver:#a89cc8;
    --silver-dim:#6b5d8c;
    --cyan:#5ce6ff;
    --pink:#ff2bd6;
    --lime:#a5ff52;
    --amber:#ffd454;
    --red:#ff4848;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  html,body{
    min-height:100%;background:var(--void);color:var(--ink);
    font-family:'Space Mono', monospace;
    -webkit-tap-highlight-color:transparent;user-select:none;
  }
  body{
    background:
      radial-gradient(ellipse 60% 40% at 80% 0%, rgba(255,43,214,0.12), transparent 65%),
      radial-gradient(ellipse 60% 40% at 20% 100%, rgba(92,230,255,0.10), transparent 65%),
      var(--void);
    min-height:100vh;
    display:flex;flex-direction:column;
    position:relative;overflow:hidden;
  }
  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:90;
    background:repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0 1px, transparent 1px 3px);
  }

  /* Wave canvas full-screen background */
  #waveCanvas{
    position:fixed;inset:0;width:100%;height:100%;z-index:1;
    pointer-events:none;mix-blend-mode:screen;
  }

  header{
    padding:1.1rem 1.5rem 0.9rem;
    border-bottom:1px solid var(--border);
    background:rgba(13,7,40,0.6);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;flex-wrap:wrap;
    z-index:5;position:relative;
  }
  .title{
    font-family:'Audiowide', sans-serif;
    font-size:clamp(1.5rem, 4vw, 2.4rem);letter-spacing:0.06em;line-height:1;
    color:var(--ink);
    text-shadow:0 0 14px var(--pink), 0 0 28px rgba(255,43,214,0.5);
  }
  .title .accent{color:var(--cyan);text-shadow:0 0 14px var(--cyan)}
  .tag{
    font-family:'JetBrains Mono', monospace;font-size:0.72rem;
    color:var(--silver);margin-top:0.35rem;letter-spacing:0.14em;text-transform:uppercase;
  }

  .room-controls{
    display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;
  }
  .room-pill{
    background:var(--panel);border:1px solid var(--border);
    color:var(--silver);
    font-family:'JetBrains Mono', monospace;font-size:0.7rem;
    padding:0.45rem 0.7rem;border-radius:0.3rem;
    display:inline-flex;align-items:center;gap:0.4rem;letter-spacing:0.14em;text-transform:uppercase;
    min-height:2.5rem;
  }
  .room-pill .label{color:var(--silver-dim);font-size:0.6rem}
  .room-pill input{
    background:transparent;border:none;color:var(--cyan);
    font-family:'JetBrains Mono', monospace;font-weight:700;font-size:0.85rem;
    width:5rem;text-transform:uppercase;letter-spacing:0.1em;
    text-shadow:0 0 6px rgba(92,230,255,0.4);
  }
  .room-pill input:focus{outline:none}
  .room-pill .dot{
    display:inline-block;width:0.6rem;height:0.6rem;border-radius:50%;
    background:var(--silver-dim);transition:all 0.2s;
  }
  .room-pill.live .dot{background:var(--lime);box-shadow:0 0 8px var(--lime);animation:livePulse 1.1s ease-in-out infinite}
  .room-pill.live .label{color:var(--lime)}
  .room-pill.error .dot{background:var(--red);box-shadow:0 0 8px var(--red)}
  @keyframes livePulse{0%,100%{opacity:1}50%{opacity:0.4}}

  .players-panel{
    position:absolute;top:5.5rem;right:1.5rem;z-index:6;
    background:var(--panel);border:1px solid var(--border);border-radius:0.4rem;
    padding:0.65rem 0.8rem;
    min-width:11rem;max-width:14rem;
    backdrop-filter:blur(8px);
    box-shadow:0 0 24px rgba(107,62,184,0.18) inset;
  }
  .players-panel h2{
    font-family:'Audiowide', sans-serif;font-size:0.65rem;
    color:var(--silver);letter-spacing:0.2em;text-transform:uppercase;
    padding-bottom:0.35rem;border-bottom:1px solid var(--border);margin-bottom:0.45rem;
    display:flex;justify-content:space-between;
  }
  .players-panel h2 .ct{color:var(--cyan)}
  .player-row{
    display:flex;align-items:center;gap:0.45rem;padding:0.2rem 0;
    font-family:'JetBrains Mono', monospace;font-size:0.72rem;
  }
  .player-row .swatch{
    width:0.85rem;height:0.85rem;border-radius:50%;
    box-shadow:0 0 6px currentColor;
    flex:0 0 auto;
  }
  .player-row .name{color:var(--ink);letter-spacing:0.04em}
  .player-row.self .name::after{content:' (you)';color:var(--silver-dim);font-size:0.85em}
  .player-row .last{
    margin-left:auto;color:var(--silver-dim);font-size:0.6rem;
    font-family:'VT323', monospace;font-size:0.85rem;
  }

  main{
    flex:1;
    position:relative;
    display:flex;align-items:flex-end;justify-content:center;
    padding:1rem 1.5rem 2rem;z-index:5;
    min-height:18rem;
  }

  .piano-wrap{
    width:100%;max-width:60rem;
    background:linear-gradient(180deg, rgba(23,12,60,0.6), rgba(13,7,40,0.4));
    border:1px solid var(--border);border-radius:0.6rem;
    padding:1.1rem 1.2rem 1.4rem;
    box-shadow:
      0 8px 32px rgba(0,0,0,0.5),
      0 0 32px rgba(255,43,214,0.15);
    backdrop-filter:blur(4px);
  }
  .piano-info{
    display:flex;justify-content:space-between;align-items:center;gap:0.5rem;flex-wrap:wrap;
    margin-bottom:0.6rem;
  }
  .piano-info .note-display{
    font-family:'VT323', monospace;font-size:1.6rem;line-height:1;color:var(--cyan);
    text-shadow:0 0 6px rgba(92,230,255,0.5);letter-spacing:0.06em;
    min-width:5rem;
  }
  .piano-info .ctrls{display:flex;gap:0.4rem;flex-wrap:wrap}
  .octave-btn{
    background:transparent;border:1px solid var(--border);color:var(--silver);
    font-family:'JetBrains Mono', monospace;font-size:0.7rem;font-weight:700;
    padding:0.4rem 0.7rem;border-radius:0.3rem;cursor:pointer;
    letter-spacing:0.12em;text-transform:uppercase;
    min-height:2.25rem;
  }
  .octave-btn:hover{border-color:var(--cyan);color:var(--cyan)}
  .octave-btn:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}

  .keyboard{
    position:relative;display:flex;
    height:12rem;background:#04020e;
    border-radius:0.3rem;overflow:hidden;
    box-shadow:inset 0 2px 8px rgba(0,0,0,0.7);
  }
  .key-white{
    flex:1;height:100%;
    background:linear-gradient(180deg, #1a1230 0%, #0f0822 92%, #050310 100%);
    border-right:1px solid #2a1f48;cursor:pointer;
    position:relative;transition:background 0.06s;
  }
  .key-white:last-child{border-right:none}
  .key-white.active{background:linear-gradient(180deg, var(--keyColor), #6b3eb8)}
  .key-white::after{
    content:'';position:absolute;inset:0;pointer-events:none;
    box-shadow:inset 0 0 14px var(--keyColor);opacity:0;
    transition:opacity 0.15s;
  }
  .key-white.active::after{opacity:0.9}
  .key-white .note{
    position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);
    font-family:'JetBrains Mono', monospace;font-size:0.6rem;
    color:rgba(255,255,255,0.25);letter-spacing:0.05em;
  }
  .key-white .kbd{
    position:absolute;bottom:0.5rem;left:50%;transform:translateX(-50%);
    font-family:'JetBrains Mono', monospace;font-size:0.7rem;
    color:rgba(255,255,255,0.5);letter-spacing:0.05em;
  }
  .key-black{
    position:absolute;width:5.5%;height:62%;
    background:linear-gradient(180deg, #1a0a2c 0%, #050310 92%, #2a1f48 100%);
    border:1px solid #000;border-radius:0 0 0.2rem 0.2rem;
    box-shadow:0 3px 0 rgba(0,0,0,0.6);
    cursor:pointer;z-index:2;
    transition:background 0.06s;
  }
  .key-black.active{background:linear-gradient(180deg, var(--keyColor), #c01b9e);box-shadow:0 1px 0 rgba(0,0,0,0.5), 0 0 16px var(--keyColor)}
  .key-black .kbd{
    position:absolute;bottom:0.4rem;left:50%;transform:translateX(-50%);
    font-family:'JetBrains Mono', monospace;font-size:0.62rem;
    color:rgba(255,255,255,0.55);letter-spacing:0.05em;
  }

  .pulses{
    position:absolute;left:0;right:0;top:-1.5rem;height:1rem;
    display:flex;justify-content:center;
    pointer-events:none;
  }
  .pulse{
    width:0.5rem;height:0.5rem;border-radius:50%;
    background:currentColor;box-shadow:0 0 10px currentColor;
    margin:0 0.25rem;animation:pulseFade 1s ease-out forwards;
  }
  @keyframes pulseFade{
    0%{transform:scale(0.6);opacity:1}
    100%{transform:scale(2);opacity:0}
  }

  .recent-feed{
    margin-top:0.8rem;
    font-family:'JetBrains Mono', monospace;font-size:0.65rem;
    color:var(--silver-dim);letter-spacing:0.05em;
    min-height:1.4rem;
    display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center;
    overflow:hidden;
  }
  .recent-feed .lab{font-size:0.55rem;letter-spacing:0.18em;text-transform:uppercase;color:var(--silver-dim)}
  .recent-feed .note-bit{
    display:inline-flex;align-items:center;gap:0.25rem;
    background:rgba(255,255,255,0.04);padding:0.18rem 0.4rem;border-radius:0.18rem;
    color:var(--ink);animation:noteBitIn 0.35s ease-out;
  }
  @keyframes noteBitIn{from{opacity:0;transform:translateX(-6px)}to{opacity:1;transform:translateX(0)}}
  .recent-feed .note-bit .swatch{
    width:0.5rem;height:0.5rem;border-radius:50%;background:currentColor;
    box-shadow:0 0 4px currentColor;
  }

  footer{
    border-top:1px solid var(--border);
    padding:0.55rem 1.5rem;
    font-family:'JetBrains Mono', monospace;font-size:0.65rem;
    color:var(--silver-dim);letter-spacing:0.04em;text-align:center;
    background:rgba(6,3,26,0.65);z-index:5;position:relative;
  }
  footer .accent{color:var(--cyan)}

  @media (max-width: 540px){
    header{padding:0.85rem 0.9rem 0.6rem}
    main{padding:0.85rem 0.9rem 1.4rem}
    .piano-wrap{padding:0.85rem 0.95rem 1.1rem}
    .keyboard{height:9rem}
    .players-panel{top:7rem;right:0.9rem;min-width:9rem;max-width:11rem}
  }
  @media (prefers-reduced-motion: reduce){
    .room-pill.live .dot{animation:none}
    .pulse{animation:none;opacity:0}
    .recent-feed .note-bit{animation:none}
  }
</style>
</head>
<body>
  <canvas id="waveCanvas" aria-hidden="true"></canvas>

  <header>
    <div>
      <h1 class="title">piano <span class="accent">orbit</span></h1>
      <div class="tag">multiplayer neon piano · real-time synced notes · glowing waves across the room</div>
    </div>
    <div class="room-controls">
      <span class="room-pill" id="roomPill"><span class="dot" aria-hidden="true"></span>
        <span class="label">room</span>
        <input type="text" id="roomInput" value="MAIN" maxlength="12" autocomplete="off" aria-label="Room code">
      </span>
      <button class="octave-btn" id="copyLinkBtn" type="button">⎘ share</button>
    </div>
  </header>

  <aside class="players-panel" aria-label="Connected players">
    <h2>orbit <span class="ct" id="playerCount">— online</span></h2>
    <div id="playerList"></div>
  </aside>

  <main>
    <section class="piano-wrap" aria-label="Piano">
      <div class="piano-info">
        <div class="note-display" id="noteDisplay">—</div>
        <div class="ctrls">
          <button class="octave-btn" type="button" id="octDown" aria-label="Octave down">◀ oct</button>
          <button class="octave-btn" type="button" id="octUp" aria-label="Octave up">oct ▶</button>
        </div>
      </div>
      <div class="pulses" id="pulses" aria-hidden="true"></div>
      <div class="keyboard" id="keyboard" role="group" aria-label="On-screen keyboard"></div>
      <div class="recent-feed" id="recentFeed">
        <span class="lab">orbit feed</span>
      </div>
    </section>
  </main>

  <footer>
    everyone in the same room hears every press · <span class="accent">A-J/W-U-O-P</span> = white/black keys · <span class="accent">Z/X</span> = octave shift · pure browser, no login
  </footer>

<script type="module">
'use strict';

  function showError(msg){
    try{
      var t = document.getElementById('errToast');
      if (!t){
        t = document.createElement('div');
        t.id = 'errToast';
        t.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#3a061f;color:#ffb6c1;font-family:monospace;font-size:11px;padding:8px 12px;border-bottom:1px solid #ff8ac0;white-space:pre-wrap';
        document.body.appendChild(t);
      }
      t.textContent = '⚠ ' + msg;
    }catch(_){}
  }
  window.addEventListener('error', function(ev){
    showError((ev.message || 'error') + ' @ ' + (ev.filename ? ev.filename.split('/').pop() : '?') + ':' + (ev.lineno || '?'));
  });

  // ── Constants ──
  // 2-octave keyboard starting at C4 (midi 60). The kbd shortcut row mirrors
  // the classic synth layout so muscle memory carries from other apps.
  const KEY_MAP = [
    { midi: 0,  black:false, kbd:'a' },
    { midi: 1,  black:true,  kbd:'w' },
    { midi: 2,  black:false, kbd:'s' },
    { midi: 3,  black:true,  kbd:'e' },
    { midi: 4,  black:false, kbd:'d' },
    { midi: 5,  black:false, kbd:'f' },
    { midi: 6,  black:true,  kbd:'t' },
    { midi: 7,  black:false, kbd:'g' },
    { midi: 8,  black:true,  kbd:'y' },
    { midi: 9,  black:false, kbd:'h' },
    { midi: 10, black:true,  kbd:'u' },
    { midi: 11, black:false, kbd:'j' },
    { midi: 12, black:false, kbd:'k' },
    { midi: 13, black:true,  kbd:'o' },
    { midi: 14, black:false, kbd:'l' },
    { midi: 15, black:true,  kbd:'p' },
    { midi: 16, black:false, kbd:';' }
  ];
  const NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];
  const PALETTE = [
    '#ff2bd6','#5ce6ff','#a5ff52','#ffd454','#ff8a3a',
    '#c44dff','#5cffb0','#ff5fa8','#a8a0ff','#48b2e8',
    '#f1c40f','#ff6b3a','#7af8d8','#ffabc8'
  ];

  let baseOctave = 4;
  const state = {
    sb: null,
    channel: null,
    connected: false,
    clientId: Math.random().toString(36).slice(2, 8).toUpperCase(),
    color: null,
    presence: new Map(),   // clientId → { color, name, lastNote, lastMidi }
    waves: [],             // active wave ripples
    recent: [],            // last 12 played notes for the feed
    room: ''
  };
  // Pick a deterministic colour from the clientId
  function colorFor(id){
    let h = 5381;
    for (let i = 0; i < id.length; i++){ h = ((h << 5) + h + id.charCodeAt(i)) >>> 0; }
    return PALETTE[h % PALETTE.length];
  }
  state.color = colorFor(state.clientId);
  state.name = state.clientId;

  // ── DOM refs ──
  const keyboardEl = document.getElementById('keyboard');
  const noteDisplay = document.getElementById('noteDisplay');
  const playerList = document.getElementById('playerList');
  const playerCount = document.getElementById('playerCount');
  const pulsesEl = document.getElementById('pulses');
  const recentFeed = document.getElementById('recentFeed');
  const roomPill = document.getElementById('roomPill');
  const roomInput = document.getElementById('roomInput');

  // ── Audio (Web Audio synth piano-ish) ──
  let actx = null;
  let master = null;
  let convolver = null;
  function ensureAudio(){
    if (actx) return actx;
    try {
      actx = new (window.AudioContext || window.webkitAudioContext)();
      master = actx.createGain();
      master.gain.value = 0.4;
      // Light reverb via noise impulse
      convolver = actx.createConvolver();
      const sr = actx.sampleRate;
      const len = sr * 1.4;
      const buf = actx.createBuffer(2, len, sr);
      for (let ch = 0; ch < 2; ch++){
        const d = buf.getChannelData(ch);
        for (let i = 0; i < len; i++){
          d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/len, 2.6);
        }
      }
      convolver.buffer = buf;
      const wet = actx.createGain();
      wet.gain.value = 0.22;
      master.connect(actx.destination);
      master.connect(convolver);
      convolver.connect(wet);
      wet.connect(actx.destination);
    } catch(e){ showError('audio init: ' + e.message); }
    return actx;
  }
  function playNote(midi, vel){
    ensureAudio();
    if (!actx) return;
    if (actx.state === 'suspended') actx.resume();
    const t = actx.currentTime;
    const freq = 440 * Math.pow(2, (midi - 69) / 12);
    const v = vel == null ? 0.5 : vel;
    // Two oscillators (sine + soft triangle harmonic) → biquad LP → gain envelope
    const o1 = actx.createOscillator();
    const o2 = actx.createOscillator();
    o1.type = 'triangle'; o2.type = 'sine';
    o1.frequency.value = freq;
    o2.frequency.value = freq * 2;
    const g1 = actx.createGain(); const g2 = actx.createGain();
    g1.gain.value = 0.65 * v; g2.gain.value = 0.18 * v;
    const env = actx.createGain();
    env.gain.setValueAtTime(0, t);
    env.gain.linearRampToValueAtTime(1, t + 0.005);
    env.gain.exponentialRampToValueAtTime(0.0008, t + 1.4);
    const filt = actx.createBiquadFilter();
    filt.type = 'lowpass';
    filt.frequency.value = Math.min(8000, freq * 6);
    filt.Q.value = 0.7;
    o1.connect(g1); o2.connect(g2);
    g1.connect(env); g2.connect(env);
    env.connect(filt); filt.connect(master);
    o1.start(t); o2.start(t);
    o1.stop(t + 1.5); o2.stop(t + 1.5);
  }

  // ── Wave canvas (full-screen, additive blend) ──
  const waveCanvas = document.getElementById('waveCanvas');
  const wctx = waveCanvas.getContext('2d');
  function resizeWave(){
    const dpr = Math.min(2, window.devicePixelRatio || 1);
    waveCanvas.width = window.innerWidth * dpr;
    waveCanvas.height = window.innerHeight * dpr;
    wctx.scale(dpr, dpr);
  }
  window.addEventListener('resize', resizeWave);
  resizeWave();
  function spawnWave(color, midi){
    // Position: pitch maps from left (low) to right (high) along the bottom 70% of the screen
    const W = window.innerWidth, H = window.innerHeight;
    const lo = 48, hi = 84;
    const t = Math.max(0, Math.min(1, (midi - lo) / (hi - lo)));
    const x = W * (0.1 + 0.8 * t);
    const y = H * 0.45 + (Math.random() - 0.5) * 60;
    state.waves.push({ x, y, r: 0, maxR: 320 + Math.random() * 180, life: 0, maxLife: 1.7, color });
  }
  function animWaves(){
    requestAnimationFrame(animWaves);
    const W = window.innerWidth, H = window.innerHeight;
    // Trail fade
    wctx.fillStyle = 'rgba(6, 3, 26, 0.16)';
    wctx.fillRect(0, 0, W, H);
    // Draw + update waves
    const dt = 1/60;
    state.waves = state.waves.filter(w => {
      w.life += dt;
      const k = w.life / w.maxLife;
      if (k >= 1) return false;
      w.r = w.maxR * Math.pow(k, 0.55);
      const alpha = (1 - k) * 0.85;
      // Outer ring
      wctx.beginPath();
      wctx.arc(w.x, w.y, w.r, 0, Math.PI * 2);
      wctx.strokeStyle = w.color;
      wctx.lineWidth = 3;
      wctx.globalAlpha = alpha;
      wctx.shadowColor = w.color;
      wctx.shadowBlur = 22;
      wctx.stroke();
      // Inner ring
      wctx.beginPath();
      wctx.arc(w.x, w.y, w.r * 0.62, 0, Math.PI * 2);
      wctx.lineWidth = 1.5;
      wctx.globalAlpha = alpha * 0.55;
      wctx.stroke();
      wctx.shadowBlur = 0;
      wctx.globalAlpha = 1;
      return true;
    });
  }
  animWaves();

  // ── Render keyboard ──
  function midiToName(m){
    return NAMES[m % 12] + (Math.floor(m / 12) - 1);
  }
  function renderKeyboard(){
    keyboardEl.innerHTML = '';
    const whites = KEY_MAP.filter(k => !k.black);
    whites.forEach(wk => {
      const div = document.createElement('div');
      div.className = 'key-white';
      const midi = (baseOctave + 1) * 12 + wk.midi;
      div.dataset.midi = midi;
      div.style.setProperty('--keyColor', state.color);
      div.innerHTML = `<span class="note">${midiToName(midi)}</span><span class="kbd">${wk.kbd.toUpperCase()}</span>`;
      div.addEventListener('pointerdown', e => {
        e.preventDefault();
        onLocalNoteOn(midi, div);
      });
      keyboardEl.appendChild(div);
    });
    const blacks = KEY_MAP.filter(k => k.black);
    const whiteW = 100 / whites.length;
    blacks.forEach(bk => {
      const midi = (baseOctave + 1) * 12 + bk.midi;
      let leftWhiteIdx = -1;
      for (let i = 0; i < whites.length; i++){
        if (whites[i].midi < bk.midi) leftWhiteIdx = i;
        else break;
      }
      if (leftWhiteIdx < 0) return;
      const leftPct = (leftWhiteIdx + 1) * whiteW;
      const bw = 5.5;
      const bdiv = document.createElement('div');
      bdiv.className = 'key-black';
      bdiv.style.left = (leftPct - bw / 2) + '%';
      bdiv.dataset.midi = midi;
      bdiv.style.setProperty('--keyColor', state.color);
      bdiv.innerHTML = `<span class="kbd">${bk.kbd.toUpperCase()}</span>`;
      bdiv.addEventListener('pointerdown', e => {
        e.preventDefault();
        onLocalNoteOn(midi, bdiv);
      });
      keyboardEl.appendChild(bdiv);
    });
  }

  function onLocalNoteOn(midi, el){
    triggerNote(midi, state.color, el, true);
    broadcastNote(midi);
    noteDisplay.textContent = midiToName(midi);
  }
  function triggerNote(midi, color, el, isLocal){
    playNote(midi, 0.7);
    spawnWave(color, midi);
    if (el){
      el.style.setProperty('--keyColor', color);
      el.classList.add('active');
      setTimeout(() => el.classList.remove('active'), 320);
    } else {
      // Remote note — light the matching key on our piano
      const k = keyboardEl.querySelector(`[data-midi="${midi}"]`);
      if (k){
        k.style.setProperty('--keyColor', color);
        k.classList.add('active');
        setTimeout(() => k.classList.remove('active'), 320);
      }
    }
    // Add a centred pulse dot
    const dot = document.createElement('span');
    dot.className = 'pulse';
    dot.style.color = color;
    pulsesEl.appendChild(dot);
    setTimeout(() => dot.remove(), 1000);
    // Feed
    state.recent.unshift({ midi, color, isLocal, at: Date.now() });
    if (state.recent.length > 12) state.recent.pop();
    renderFeed();
  }
  function renderFeed(){
    const html = ['<span class="lab">orbit feed</span>'];
    for (const n of state.recent){
      html.push(`<span class="note-bit" style="color:${n.color}"><span class="swatch"></span>${midiToName(n.midi)}</span>`);
    }
    recentFeed.innerHTML = html.join('');
  }

  // ── Computer keyboard ──
  const pressed = new Set();
  document.addEventListener('keydown', e => {
    if (e.repeat) return;
    if (e.target.tagName === 'INPUT') return;
    const k = e.key.toLowerCase();
    if (k === 'z'){ baseOctave = Math.max(1, baseOctave - 1); renderKeyboard(); return; }
    if (k === 'x'){ baseOctave = Math.min(7, baseOctave + 1); renderKeyboard(); return; }
    const entry = KEY_MAP.find(km => km.kbd === k);
    if (!entry || pressed.has(k)) return;
    pressed.add(k);
    const midi = (baseOctave + 1) * 12 + entry.midi;
    const el = keyboardEl.querySelector(`[data-midi="${midi}"]`);
    onLocalNoteOn(midi, el);
  });
  document.addEventListener('keyup', e => {
    pressed.delete(e.key.toLowerCase());
  });
  document.getElementById('octDown').addEventListener('click', () => {
    baseOctave = Math.max(1, baseOctave - 1);
    renderKeyboard();
  });
  document.getElementById('octUp').addEventListener('click', () => {
    baseOctave = Math.min(7, baseOctave + 1);
    renderKeyboard();
  });

  // ── Player list render ──
  function renderPlayers(){
    const players = Array.from(state.presence.values());
    players.sort((a, b) => (a.name || '').localeCompare(b.name || ''));
    playerCount.textContent = players.length + (players.length === 1 ? ' online' : ' online');
    if (players.length === 0){
      playerList.innerHTML = '<div style="color:var(--silver-dim);font-style:italic;font-size:0.7rem;padding:0.2rem 0">connecting…</div>';
      return;
    }
    playerList.innerHTML = players.map(p => {
      const isSelf = p.clientId === state.clientId;
      const lastNoteText = p.lastMidi != null ? midiToName(p.lastMidi) : '—';
      return `<div class="player-row ${isSelf?'self':''}" style="color:${p.color}">
        <span class="swatch"></span>
        <span class="name">${escapeHtml(p.name || p.clientId)}</span>
        <span class="last">${lastNoteText}</span>
      </div>`;
    }).join('');
  }
  function escapeHtml(s){
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c]);
  }

  // ── Supabase Realtime ──
  function broadcastNote(midi){
    if (!state.channel || !state.connected) return;
    try {
      state.channel.send({
        type: 'broadcast',
        event: 'note',
        payload: { midi, from: state.clientId, color: state.color }
      });
    } catch(_){}
  }
  function setRoomState(s){
    if (s === 'live'){ roomPill.classList.add('live'); roomPill.classList.remove('error'); }
    else if (s === 'error'){ roomPill.classList.add('error'); roomPill.classList.remove('live'); }
    else { roomPill.classList.remove('live', 'error'); }
  }
  async function joinRoom(room){
    setRoomState('connecting');
    state.room = room;
    // Unsubscribe old channel
    if (state.channel){
      try { await state.channel.unsubscribe(); } catch(_){}
      state.channel = null;
      state.connected = false;
      state.presence.clear();
      renderPlayers();
    }
    if (!state.sb) return;
    const channelName = 'piano-orbit:' + (room || 'MAIN').toUpperCase();
    const channel = state.sb.channel(channelName, {
      config: { broadcast: { self: false }, presence: { key: state.clientId } }
    });
    channel.on('broadcast', { event: 'note' }, ({ payload }) => {
      if (!payload || payload.from === state.clientId) return;
      const midi = payload.midi;
      const color = payload.color || colorFor(payload.from);
      // Update presence last-note for the sender
      const p = state.presence.get(payload.from);
      if (p){ p.lastMidi = midi; renderPlayers(); }
      triggerNote(midi, color, null, false);
    });
    channel.on('presence', { event: 'sync' }, () => {
      const newState = channel.presenceState();
      state.presence.clear();
      Object.entries(newState).forEach(([key, metas]) => {
        const meta = metas[0] || {};
        state.presence.set(key, {
          clientId: key,
          color: meta.color || colorFor(key),
          name: meta.name || key,
          lastMidi: meta.lastMidi
        });
      });
      renderPlayers();
    });
    channel.subscribe(async (status) => {
      if (status === 'SUBSCRIBED'){
        state.channel = channel;
        state.connected = true;
        setRoomState('live');
        await channel.track({ color: state.color, name: state.name });
      } else if (status === 'CHANNEL_ERROR' || status === 'CLOSED'){
        state.connected = false;
        setRoomState('error');
      }
    });
  }

  // Wire room input — change room on Enter or blur
  function commitRoomChange(){
    const v = (roomInput.value || 'MAIN').toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 12) || 'MAIN';
    roomInput.value = v;
    if (v === state.room) return;
    joinRoom(v);
    // Update URL hash so it's shareable
    try { window.location.hash = '#' + v; } catch(_){}
  }
  roomInput.addEventListener('keydown', e => {
    if (e.key === 'Enter'){ e.preventDefault(); roomInput.blur(); }
  });
  roomInput.addEventListener('blur', commitRoomChange);

  document.getElementById('copyLinkBtn').addEventListener('click', () => {
    const url = window.location.origin + window.location.pathname + '#' + (state.room || 'MAIN');
    const btn = document.getElementById('copyLinkBtn');
    const done = () => {
      const orig = btn.textContent;
      btn.textContent = '✓ link copied';
      btn.style.borderColor = 'var(--lime)';
      btn.style.color = 'var(--lime)';
      setTimeout(() => { btn.textContent = orig; btn.style.borderColor = ''; btn.style.color = ''; }, 1500);
    };
    if (navigator.clipboard) navigator.clipboard.writeText(url).then(done).catch(fallback);
    else fallback();
    function fallback(){
      const ta = document.createElement('textarea');
      ta.value = url; ta.style.position='fixed'; ta.style.opacity='0';
      document.body.appendChild(ta); ta.select();
      try { document.execCommand('copy'); done(); } catch(_){}
      document.body.removeChild(ta);
    }
  });

  // ── Boot ──
  renderKeyboard();
  renderPlayers();
  // Initial room from URL hash, fallback MAIN
  const hashRoom = (window.location.hash || '').replace('#', '').toUpperCase().replace(/[^A-Z0-9]/g, '').slice(0, 12);
  const initialRoom = hashRoom || 'MAIN';
  roomInput.value = initialRoom;

  (async function bootSupabase(){
    try {
      const mod = await import('./supabase-config-fixed.js');
      state.sb = mod.default;
      joinRoom(initialRoom);
    } catch(e){
      showError('supabase import failed: ' + (e && e.message || e));
      setRoomState('error');
    }
  })();
</script>
</body>
</html>
