<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Neon Drums</title>
<link rel="icon" href="https://emojicdn.elk.sh/🥁">
<meta property="og:title" content="Neon Drums">
<meta property="og:description" content="16-step drum sequencer with neon glow. Tap beats, hit play.">
<meta property="og:url" content="https://sloppy.live/neon-drums">
<meta property="og:image" content="https://emojicdn.elk.sh/🥁?style=apple&size=512">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100dvh;background:#06060e;font-family:'Share Tech Mono',monospace;color:#c0c0d0;overflow-x:hidden}
body{display:flex;flex-direction:column;align-items:center;padding:12px 8px 60px}

h1{font-family:'Oxanium',sans-serif;font-weight:700;font-size:2rem;color:#00ffaa;text-shadow:0 0 25px rgba(0,255,170,0.4),0 0 50px rgba(0,255,170,0.12);letter-spacing:8px;margin-bottom:2px;text-align:center}
.sub{font-size:9px;color:rgba(0,255,170,0.2);letter-spacing:3px;margin-bottom:14px}

#controls{display:flex;align-items:center;gap:12px;margin-bottom:14px;flex-wrap:wrap;justify-content:center}
#controls button{
  font-family:'Oxanium',sans-serif;font-weight:700;font-size:13px;letter-spacing:2px;
  border:2px solid #00ffaa;background:transparent;color:#00ffaa;
  padding:8px 20px;border-radius:6px;cursor:pointer;
  transition:all .15s;-webkit-tap-highlight-color:transparent;
}
#controls button:hover,#controls button.active{background:#00ffaa;color:#06060e}
#controls button#clear-btn{border-color:#ff4060;color:#ff4060}
#controls button#clear-btn:hover{background:#ff4060;color:#06060e}
#bpm-wrap{display:flex;align-items:center;gap:6px}
#bpm-wrap label{font-size:10px;color:rgba(0,255,170,0.3)}
#bpm-wrap input{width:70px;accent-color:#00ffaa}
#bpm-val{font-size:12px;color:#00ffaa;min-width:36px;text-align:center}

#grid-wrap{width:100%;max-width:720px;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:4px}
#grid{display:grid;grid-template-columns:100px repeat(16,1fr);gap:2px;min-width:580px}

.row-label{
  display:flex;align-items:center;justify-content:flex-end;padding-right:8px;
  font-family:'Oxanium',sans-serif;font-weight:700;font-size:11px;letter-spacing:1px;
  color:var(--clr);height:36px;white-space:nowrap;cursor:pointer;
  -webkit-tap-highlight-color:transparent;
}
.row-label:hover{text-shadow:0 0 10px var(--clr)}

.cell{
  width:100%;height:36px;
  border:1px solid rgba(255,255,255,0.06);
  border-radius:3px;
  background:rgba(255,255,255,0.02);
  cursor:pointer;
  transition:background .08s,box-shadow .08s;
  -webkit-tap-highlight-color:transparent;
  position:relative;
}
.cell:nth-child(4n+2){border-left:1px solid rgba(255,255,255,0.1)}
.cell.on{
  background:var(--clr);
  box-shadow:0 0 12px color-mix(in srgb,var(--clr) 50%,transparent),inset 0 0 6px rgba(0,0,0,0.3);
}
.cell.playing{
  box-shadow:0 0 20px var(--clr),0 0 40px color-mix(in srgb,var(--clr) 30%,transparent);
}
/* beat column highlight */
.cell.beat-col{background:rgba(255,255,255,0.04)}
.cell.on.beat-col{filter:brightness(1.3)}

#step-row{display:grid;grid-template-columns:100px repeat(16,1fr);gap:2px;min-width:580px;margin-top:2px}
.step-num{font-size:8px;color:rgba(255,255,255,0.1);text-align:center;height:14px;line-height:14px}
.step-num.current{color:#00ffaa;font-weight:bold}

#vol-row{display:flex;align-items:center;gap:8px;margin-top:12px;width:100%;max-width:720px}
#vol-row label{font-size:9px;color:rgba(0,255,170,0.2);letter-spacing:1px}
#vol-row input{flex:1;accent-color:#00ffaa}

#swing-row{display:flex;align-items:center;gap:8px;margin-top:6px;width:100%;max-width:720px}
#swing-row label{font-size:9px;color:rgba(0,255,170,0.2);letter-spacing:1px}
#swing-row input{flex:1;accent-color:#00ffaa}
#swing-val{font-size:10px;color:rgba(0,255,170,0.4);min-width:28px}

a#back{position:fixed;bottom:8px;left:10px;font-size:9px;opacity:0.15;color:#064;text-decoration:none;z-index:5}

@media(max-width:500px){
  h1{font-size:1.5rem;letter-spacing:4px}
  .row-label{font-size:9px;padding-right:4px}
  #grid,#step-row{min-width:480px}
  .cell{height:30px}
  #controls button{font-size:11px;padding:6px 14px}
}
</style>
</head>
<body>

<h1>NEON DRUMS</h1>
<div class="sub">16-STEP SEQUENCER</div>

<div id="controls">
  <button id="play-btn">PLAY</button>
  <button id="clear-btn">CLEAR</button>
  <div id="bpm-wrap">
    <label>BPM</label>
    <input type="range" id="bpm" min="60" max="200" value="120">
    <span id="bpm-val">120</span>
  </div>
</div>

<div id="grid-wrap">
  <div id="grid"></div>
  <div id="step-row"><div></div></div>
</div>

<div id="vol-row">
  <label>VOL</label>
  <input type="range" id="vol" min="0" max="100" value="80">
</div>
<div id="swing-row">
  <label>SWING</label>
  <input type="range" id="swing" min="0" max="80" value="0">
  <span id="swing-val">0%</span>
</div>

<a id="back" href="https://sloppy.live">sloppy.live</a>

<script>
(function(){

var actx=null;
function ensureAudio(){
  if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended')actx.resume();
  return actx;
}

var masterVol=0.8;
document.getElementById('vol').addEventListener('input',function(){masterVol=parseInt(this.value)/100});

var bpm=120;
var swing=0;
document.getElementById('bpm').addEventListener('input',function(){
  bpm=parseInt(this.value);
  document.getElementById('bpm-val').textContent=bpm;
});
document.getElementById('swing').addEventListener('input',function(){
  swing=parseInt(this.value)/100;
  document.getElementById('swing-val').textContent=Math.round(swing*100)+'%';
});

// --- DRUM VOICES ---
var DRUMS=[
  {name:'KICK',color:'#ff3060'},
  {name:'SNARE',color:'#ffaa20'},
  {name:'HI-HAT',color:'#00ddff'},
  {name:'OPEN HH',color:'#20ffcc'},
  {name:'CLAP',color:'#ff60ff'},
  {name:'TOM HI',color:'#80ff40'},
  {name:'TOM LO',color:'#ff8020'},
  {name:'RIMSHOT',color:'#c0c0ff'}
];

function playKick(){
  var ctx=ensureAudio();var t=ctx.currentTime;
  var o=ctx.createOscillator();o.type='sine';
  o.frequency.setValueAtTime(160,t);
  o.frequency.exponentialRampToValueAtTime(40,t+0.12);
  var g=ctx.createGain();g.gain.setValueAtTime(0.9*masterVol,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
  o.connect(g);g.connect(ctx.destination);
  o.start(t);o.stop(t+0.4);
  // click layer
  var b=ctx.createBuffer(1,ctx.sampleRate*0.02,ctx.sampleRate);
  var d=b.getChannelData(0);for(var i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/200);
  var n=ctx.createBufferSource();n.buffer=b;
  var ng=ctx.createGain();ng.gain.setValueAtTime(0.4*masterVol,t);ng.gain.exponentialRampToValueAtTime(0.001,t+0.02);
  n.connect(ng);ng.connect(ctx.destination);n.start(t);n.stop(t+0.03);
}

function playSnare(){
  var ctx=ensureAudio();var t=ctx.currentTime;
  // tone
  var o=ctx.createOscillator();o.type='triangle';
  o.frequency.setValueAtTime(200,t);o.frequency.exponentialRampToValueAtTime(100,t+0.1);
  var og=ctx.createGain();og.gain.setValueAtTime(0.5*masterVol,t);og.gain.exponentialRampToValueAtTime(0.001,t+0.15);
  o.connect(og);og.connect(ctx.destination);o.start(t);o.stop(t+0.15);
  // noise
  var bs=ctx.sampleRate*0.15;var buf=ctx.createBuffer(1,bs,ctx.sampleRate);
  var d=buf.getChannelData(0);for(var i=0;i<bs;i++)d[i]=(Math.random()*2-1);
  var n=ctx.createBufferSource();n.buffer=buf;
  var hp=ctx.createBiquadFilter();hp.type='highpass';hp.frequency.value=2000;
  var ng=ctx.createGain();ng.gain.setValueAtTime(0.6*masterVol,t);ng.gain.exponentialRampToValueAtTime(0.001,t+0.15);
  n.connect(hp);hp.connect(ng);ng.connect(ctx.destination);n.start(t);n.stop(t+0.15);
}

function playHihat(){
  var ctx=ensureAudio();var t=ctx.currentTime;
  var bs=ctx.sampleRate*0.06;var buf=ctx.createBuffer(1,bs,ctx.sampleRate);
  var d=buf.getChannelData(0);for(var i=0;i<bs;i++)d[i]=(Math.random()*2-1);
  var n=ctx.createBufferSource();n.buffer=buf;
  var hp=ctx.createBiquadFilter();hp.type='highpass';hp.frequency.value=7000;
  var g=ctx.createGain();g.gain.setValueAtTime(0.4*masterVol,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.06);
  n.connect(hp);hp.connect(g);g.connect(ctx.destination);n.start(t);n.stop(t+0.07);
}

function playOpenHH(){
  var ctx=ensureAudio();var t=ctx.currentTime;
  var bs=ctx.sampleRate*0.25;var buf=ctx.createBuffer(1,bs,ctx.sampleRate);
  var d=buf.getChannelData(0);for(var i=0;i<bs;i++)d[i]=(Math.random()*2-1);
  var n=ctx.createBufferSource();n.buffer=buf;
  var bp=ctx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=8000;bp.Q.value=2;
  var g=ctx.createGain();g.gain.setValueAtTime(0.35*masterVol,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.25);
  n.connect(bp);bp.connect(g);g.connect(ctx.destination);n.start(t);n.stop(t+0.26);
}

function playClap(){
  var ctx=ensureAudio();var t=ctx.currentTime;
  for(var c=0;c<3;c++){
    var bs=ctx.sampleRate*0.02;var buf=ctx.createBuffer(1,bs,ctx.sampleRate);
    var d=buf.getChannelData(0);for(var i=0;i<bs;i++)d[i]=(Math.random()*2-1);
    var n=ctx.createBufferSource();n.buffer=buf;
    var bp=ctx.createBiquadFilter();bp.type='bandpass';bp.frequency.value=1200;bp.Q.value=1;
    var g=ctx.createGain();var off=c*0.012;
    g.gain.setValueAtTime(0.5*masterVol,t+off);g.gain.exponentialRampToValueAtTime(0.001,t+off+0.08);
    n.connect(bp);bp.connect(g);g.connect(ctx.destination);n.start(t+off);n.stop(t+off+0.09);
  }
  // tail
  var bs2=ctx.sampleRate*0.15;var buf2=ctx.createBuffer(1,bs2,ctx.sampleRate);
  var d2=buf2.getChannelData(0);for(var i=0;i<bs2;i++)d2[i]=(Math.random()*2-1);
  var n2=ctx.createBufferSource();n2.buffer=buf2;
  var bp2=ctx.createBiquadFilter();bp2.type='bandpass';bp2.frequency.value=1000;bp2.Q.value=0.8;
  var g2=ctx.createGain();g2.gain.setValueAtTime(0.4*masterVol,t+0.04);g2.gain.exponentialRampToValueAtTime(0.001,t+0.18);
  n2.connect(bp2);bp2.connect(g2);g2.connect(ctx.destination);n2.start(t+0.04);n2.stop(t+0.19);
}

function playTomHi(){
  var ctx=ensureAudio();var t=ctx.currentTime;
  var o=ctx.createOscillator();o.type='sine';
  o.frequency.setValueAtTime(280,t);o.frequency.exponentialRampToValueAtTime(140,t+0.2);
  var g=ctx.createGain();g.gain.setValueAtTime(0.6*masterVol,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.25);
  o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+0.25);
}

function playTomLo(){
  var ctx=ensureAudio();var t=ctx.currentTime;
  var o=ctx.createOscillator();o.type='sine';
  o.frequency.setValueAtTime(160,t);o.frequency.exponentialRampToValueAtTime(70,t+0.3);
  var g=ctx.createGain();g.gain.setValueAtTime(0.65*masterVol,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.35);
  o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+0.35);
}

function playRimshot(){
  var ctx=ensureAudio();var t=ctx.currentTime;
  var o=ctx.createOscillator();o.type='triangle';
  o.frequency.setValueAtTime(800,t);o.frequency.exponentialRampToValueAtTime(400,t+0.03);
  var g=ctx.createGain();g.gain.setValueAtTime(0.5*masterVol,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.08);
  o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+0.08);
  // click
  var bs=ctx.sampleRate*0.01;var buf=ctx.createBuffer(1,bs,ctx.sampleRate);
  var d=buf.getChannelData(0);for(var i=0;i<bs;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/50);
  var n=ctx.createBufferSource();n.buffer=buf;
  var ng=ctx.createGain();ng.gain.setValueAtTime(0.6*masterVol,t);ng.gain.exponentialRampToValueAtTime(0.001,t+0.02);
  n.connect(ng);ng.connect(ctx.destination);n.start(t);n.stop(t+0.02);
}

var drumFns=[playKick,playSnare,playHihat,playOpenHH,playClap,playTomHi,playTomLo,playRimshot];

// --- SEQUENCER STATE ---
var STEPS=16;
var ROWS=DRUMS.length;
var pattern=[];
for(var r=0;r<ROWS;r++){
  pattern[r]=[];
  for(var s=0;s<STEPS;s++)pattern[r][s]=0;
}

// --- BUILD GRID ---
var gridEl=document.getElementById('grid');
var cellEls=[];
var stepRow=document.getElementById('step-row');
var stepNums=[];

for(var r=0;r<ROWS;r++){
  // row label
  var lbl=document.createElement('div');
  lbl.className='row-label';
  lbl.style.setProperty('--clr',DRUMS[r].color);
  lbl.textContent=DRUMS[r].name;
  // preview sound on label click
  (function(idx){
    lbl.addEventListener('click',function(){ensureAudio();drumFns[idx]()});
    lbl.addEventListener('touchstart',function(e){e.preventDefault();ensureAudio();drumFns[idx]()});
  })(r);
  gridEl.appendChild(lbl);

  cellEls[r]=[];
  for(var s=0;s<STEPS;s++){
    var cell=document.createElement('div');
    cell.className='cell';
    cell.style.setProperty('--clr',DRUMS[r].color);
    cell.dataset.r=r;
    cell.dataset.s=s;
    cellEls[r][s]=cell;
    gridEl.appendChild(cell);
  }
}

// step numbers
var spacer=document.createElement('div');
stepRow.appendChild(spacer);
for(var s=0;s<STEPS;s++){
  var sn=document.createElement('div');
  sn.className='step-num';
  sn.textContent=s+1;
  stepNums.push(sn);
  stepRow.appendChild(sn);
}

// --- CLICK/TOUCH HANDLING (with drag toggling) ---
var painting=false;
var paintValue=-1;

function toggleCell(r,s){
  pattern[r][s]=pattern[r][s]?0:1;
  cellEls[r][s].classList.toggle('on',!!pattern[r][s]);
  savePattern();
}

function setCell(r,s,val){
  pattern[r][s]=val;
  cellEls[r][s].classList.toggle('on',!!val);
}

gridEl.addEventListener('pointerdown',function(e){
  var cell=e.target.closest('.cell');
  if(!cell)return;
  e.preventDefault();
  ensureAudio();
  var r=parseInt(cell.dataset.r),s=parseInt(cell.dataset.s);
  painting=true;
  paintValue=pattern[r][s]?0:1;
  setCell(r,s,paintValue);
  if(paintValue)drumFns[r]();
});

gridEl.addEventListener('pointermove',function(e){
  if(!painting)return;
  var el=document.elementFromPoint(e.clientX,e.clientY);
  if(!el)return;
  var cell=el.closest('.cell');
  if(!cell)return;
  var r=parseInt(cell.dataset.r),s=parseInt(cell.dataset.s);
  if(pattern[r][s]!==paintValue){
    setCell(r,s,paintValue);
  }
});

document.addEventListener('pointerup',function(){
  if(painting){painting=false;savePattern()}
});

// --- TRANSPORT ---
var playing=false;
var currentStep=-1;
var timerID=null;

var playBtn=document.getElementById('play-btn');
playBtn.addEventListener('click',function(){
  ensureAudio();
  if(playing){stopSeq()}else{startSeq()}
});
playBtn.addEventListener('touchstart',function(e){e.preventDefault();this.click()});

function startSeq(){
  playing=true;
  playBtn.textContent='STOP';
  playBtn.classList.add('active');
  currentStep=-1;
  scheduleNext();
}

function stopSeq(){
  playing=false;
  playBtn.textContent='PLAY';
  playBtn.classList.remove('active');
  if(timerID){clearTimeout(timerID);timerID=null}
  // clear highlights
  for(var r=0;r<ROWS;r++)for(var s=0;s<STEPS;s++)cellEls[r][s].classList.remove('playing','beat-col');
  stepNums.forEach(function(sn){sn.classList.remove('current')});
  currentStep=-1;
}

function scheduleNext(){
  if(!playing)return;
  currentStep=(currentStep+1)%STEPS;
  var step=currentStep;

  // play drums for this step
  for(var r=0;r<ROWS;r++){
    if(pattern[r][step])drumFns[r]();
  }

  // highlight
  for(var s=0;s<STEPS;s++){
    for(var r=0;r<ROWS;r++){
      cellEls[r][s].classList.toggle('beat-col',s===step);
      cellEls[r][s].classList.toggle('playing',s===step&&pattern[r][s]);
    }
    stepNums[s].classList.toggle('current',s===step);
  }

  // schedule next with swing
  var beatMs=60000/bpm/4; // 16th note
  var delay=beatMs;
  if(step%2===0){
    delay=beatMs*(1+swing*0.33);
  }else{
    delay=beatMs*(1-swing*0.33);
  }
  timerID=setTimeout(scheduleNext,Math.max(delay,20));
}

// --- CLEAR ---
document.getElementById('clear-btn').addEventListener('click',function(){
  for(var r=0;r<ROWS;r++)for(var s=0;s<STEPS;s++){
    pattern[r][s]=0;
    cellEls[r][s].classList.remove('on');
  }
  savePattern();
});

// --- LOCALSTORAGE ---
function savePattern(){
  try{localStorage.setItem('neon-drums-pattern',JSON.stringify(pattern))}catch(e){}
}
function loadPattern(){
  try{
    var d=localStorage.getItem('neon-drums-pattern');
    if(!d)return;
    var p=JSON.parse(d);
    if(!Array.isArray(p)||p.length!==ROWS)return;
    for(var r=0;r<ROWS;r++){
      if(!Array.isArray(p[r])||p[r].length!==STEPS)continue;
      for(var s=0;s<STEPS;s++){
        pattern[r][s]=p[r][s]?1:0;
        cellEls[r][s].classList.toggle('on',!!pattern[r][s]);
      }
    }
  }catch(e){}
}
loadPattern();

})();
</script>
<script src="/sloppy-header/sloppy-bar.js"></script>
</body>
</html>
