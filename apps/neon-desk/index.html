<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Desk</title>
<link rel="icon" href="https://emojicdn.elk.sh/🖥️">
<meta property="og:title" content="Neon Desk">
<meta property="og:description" content="A neon-lit mini desktop with draggable icons and floating windows. Your cyberpunk workspace.">
<meta property="og:url" content="https://app.sloppy.live/neon-desk/">
<meta property="og:image" content="https://emojicdn.elk.sh/🖥️?style=google">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#06080e;--surface:#0c1018;--surface2:#101420;
  --border:#1a2040;--border-hi:#2a3a6a;
  --cyan:#00e8ff;--magenta:#ff00aa;--green:#00ff88;
  --amber:#ffaa00;--violet:#aa66ff;--pink:#ff66aa;
  --text:#8899bb;--dim:#334;
}
html,body{width:100%;height:100%;overflow:hidden;font-family:'Share Tech Mono',monospace}
body{background:var(--bg);color:var(--text);position:relative}

/* Desktop wallpaper */
#desktop{
  position:absolute;top:0;left:0;right:0;bottom:36px;overflow:hidden;
  background:
    radial-gradient(ellipse at 30% 70%,rgba(0,232,255,0.03) 0%,transparent 50%),
    radial-gradient(ellipse at 70% 30%,rgba(255,0,170,0.03) 0%,transparent 50%),
    linear-gradient(180deg,#06080e,#0a0e18);
}

/* Grid wallpaper lines */
#desktop::before{
  content:'';position:absolute;top:0;left:0;right:0;bottom:0;
  background:
    repeating-linear-gradient(90deg,rgba(0,232,255,0.015) 0px,rgba(0,232,255,0.015) 1px,transparent 1px,transparent 60px),
    repeating-linear-gradient(0deg,rgba(0,232,255,0.015) 0px,rgba(0,232,255,0.015) 1px,transparent 1px,transparent 60px);
  pointer-events:none;
}

/* Desktop icons */
.desk-icon{
  position:absolute;width:68px;text-align:center;cursor:pointer;
  user-select:none;-webkit-user-select:none;z-index:1;
  padding:6px 2px;border-radius:6px;transition:background 0.15s;
}
.desk-icon:hover{background:rgba(0,232,255,0.06)}
.desk-icon.selected{background:rgba(0,232,255,0.1);outline:1px solid rgba(0,232,255,0.2);outline-offset:-1px}
.icon-glyph{
  font-size:2rem;display:block;margin-bottom:3px;
  filter:drop-shadow(0 0 6px currentColor);
  transition:transform 0.15s;
}
.desk-icon:hover .icon-glyph{transform:scale(1.1)}
.icon-label{
  font-size:0.5rem;color:var(--text);text-shadow:0 1px 3px rgba(0,0,0,0.8);
  word-break:break-word;line-height:1.3;
}

/* Windows */
.window{
  position:absolute;min-width:200px;min-height:120px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;overflow:hidden;display:flex;flex-direction:column;
  box-shadow:0 8px 32px rgba(0,0,0,0.5),0 0 1px var(--border-hi);
}
.window.focused{z-index:100;border-color:var(--border-hi);box-shadow:0 8px 40px rgba(0,0,0,0.6),0 0 20px rgba(0,232,255,0.05)}
.window.minimized{display:none}

.win-titlebar{
  display:flex;align-items:center;padding:0 8px;height:28px;
  background:var(--surface2);border-bottom:1px solid var(--border);
  cursor:grab;flex-shrink:0;gap:6px;
}
.win-titlebar:active{cursor:grabbing}
.win-dot{width:8px;height:8px;border-radius:50%;cursor:pointer;flex-shrink:0}
.win-dot.close{background:#ff4455}
.win-dot.close:hover{background:#ff6677}
.win-dot.min{background:#ffaa00}
.win-dot.min:hover{background:#ffcc44}
.win-dot.max{background:#00cc66}
.win-dot.max:hover{background:#00ee88}
.win-title{
  flex:1;font-family:'Orbitron',monospace;font-size:0.5rem;
  color:var(--dim);letter-spacing:0.08em;overflow:hidden;
  white-space:nowrap;text-overflow:ellipsis;
}
.window.focused .win-title{color:var(--text)}

.win-body{flex:1;overflow:auto;padding:10px;font-size:0.7rem;line-height:1.6}
.win-body::-webkit-scrollbar{width:4px}
.win-body::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Resize handle */
.win-resize{
  position:absolute;bottom:0;right:0;width:14px;height:14px;cursor:nwse-resize;
}
.win-resize::after{
  content:'';position:absolute;bottom:3px;right:3px;
  width:6px;height:6px;border-right:2px solid var(--border-hi);
  border-bottom:2px solid var(--border-hi);
}

/* Taskbar */
#taskbar{
  position:absolute;bottom:0;left:0;right:0;height:36px;
  background:var(--surface);border-top:1px solid var(--border);
  display:flex;align-items:center;padding:0 8px;gap:4px;z-index:200;
}
.task-start{
  padding:4px 10px;border:1px solid var(--border-hi);border-radius:4px;
  background:transparent;color:var(--cyan);font-family:'Orbitron',monospace;
  font-size:0.45rem;font-weight:700;cursor:pointer;letter-spacing:0.08em;
  transition:all 0.15s;
}
.task-start:hover{background:rgba(0,232,255,0.08);box-shadow:0 0 8px rgba(0,232,255,0.1)}
.task-sep{width:1px;height:20px;background:var(--border);margin:0 4px}
.task-items{display:flex;gap:3px;flex:1;overflow-x:auto;overflow-y:hidden}
.task-item{
  padding:4px 8px;border:1px solid transparent;border-radius:3px;
  background:transparent;color:var(--dim);font-family:'Share Tech Mono',monospace;
  font-size:0.5rem;cursor:pointer;white-space:nowrap;max-width:120px;
  overflow:hidden;text-overflow:ellipsis;transition:all 0.15s;
}
.task-item:hover{background:rgba(0,232,255,0.04)}
.task-item.active{border-color:var(--border-hi);color:var(--text);background:rgba(0,232,255,0.06)}
.task-clock{
  font-family:'Orbitron',monospace;font-size:0.5rem;color:var(--dim);
  min-width:44px;text-align:right;
}

/* App-specific styles */
.terminal-line{margin-bottom:4px}
.terminal-prompt{color:var(--green)}
.terminal-input{
  background:transparent;border:none;color:var(--green);
  font-family:'Share Tech Mono',monospace;font-size:0.7rem;
  outline:none;width:calc(100% - 20px);
}
.notepad-area{
  width:100%;height:100%;background:transparent;border:none;
  color:var(--text);font-family:'Share Tech Mono',monospace;
  font-size:0.7rem;outline:none;resize:none;line-height:1.6;
}
.calc-display{
  background:var(--bg);border:1px solid var(--border);border-radius:4px;
  padding:8px;margin-bottom:8px;text-align:right;
  font-family:'Orbitron',monospace;font-size:1rem;color:var(--cyan);
  min-height:30px;word-break:break-all;
}
.calc-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.calc-btn{
  padding:8px;border:1px solid var(--border);border-radius:4px;
  background:var(--surface2);color:var(--text);font-family:'Share Tech Mono',monospace;
  font-size:0.7rem;cursor:pointer;transition:all 0.1s;text-align:center;
}
.calc-btn:hover{border-color:var(--cyan);color:var(--cyan)}
.calc-btn.op{color:var(--amber)}
.calc-btn.op:hover{border-color:var(--amber);color:var(--amber)}
.clock-face{text-align:center;padding:10px}
.clock-time{font-family:'Orbitron',monospace;font-size:clamp(1.5rem,4vw,2.2rem);color:var(--cyan);font-weight:700}
.clock-date{font-size:0.6rem;color:var(--dim);margin-top:4px}
.about-logo{font-size:2.5rem;text-align:center;margin:8px 0;filter:drop-shadow(0 0 10px var(--cyan))}
.file-item{
  padding:4px 6px;border-radius:3px;cursor:pointer;display:flex;
  align-items:center;gap:6px;font-size:0.65rem;
}
.file-item:hover{background:rgba(0,232,255,0.06)}
.file-icon{font-size:1rem}
</style>
</head>
<body>

<div id="desktop"></div>
<div id="taskbar">
  <button class="task-start" onclick="toggleStartMenu()">NEON</button>
  <div class="task-sep"></div>
  <div class="task-items" id="task-items"></div>
  <div class="task-clock" id="task-clock">00:00</div>
</div>

<script>
// === State ===
let windows = [];
let winIdCounter = 0;
let focusedWin = null;
let zCounter = 10;
let dragState = null; // { winId, type:'move'|'resize', offX, offY }
let selectedIcon = null;

const desktop = document.getElementById('desktop');
const taskItems = document.getElementById('task-items');

// === Icon definitions ===
const ICONS = [
  { id: 'terminal', label: 'Terminal', glyph: '>', color: 'var(--green)', x: 20, y: 20 },
  { id: 'notepad', label: 'Notepad', glyph: '📝', color: 'var(--text)', x: 20, y: 110 },
  { id: 'calc', label: 'Calculator', glyph: '🔢', color: 'var(--amber)', x: 20, y: 200 },
  { id: 'clock', label: 'Clock', glyph: '⏰', color: 'var(--cyan)', x: 20, y: 290 },
  { id: 'files', label: 'Files', glyph: '📁', color: 'var(--violet)', x: 20, y: 380 },
  { id: 'about', label: 'About', glyph: '💠', color: 'var(--magenta)', x: 100, y: 20 },
  { id: 'colors', label: 'Colors', glyph: '🎨', color: 'var(--pink)', x: 100, y: 110 },
  { id: 'music', label: 'Beats', glyph: '🎵', color: 'var(--green)', x: 100, y: 200 },
];

// === Render icons ===
function renderIcons() {
  ICONS.forEach(ic => {
    const el = document.createElement('div');
    el.className = 'desk-icon';
    el.style.left = ic.x + 'px';
    el.style.top = ic.y + 'px';
    el.dataset.id = ic.id;
    el.innerHTML = `<span class="icon-glyph" style="color:${ic.color}">${ic.glyph}</span><span class="icon-label">${ic.label}</span>`;
    el.addEventListener('dblclick', () => openApp(ic.id));
    el.addEventListener('click', () => {
      document.querySelectorAll('.desk-icon').forEach(i => i.classList.remove('selected'));
      el.classList.add('selected');
    });
    // Make icons draggable
    el.addEventListener('mousedown', e => {
      if (e.detail >= 2) return;
      const rect = el.getBoundingClientRect();
      const dRect = desktop.getBoundingClientRect();
      let startX = e.clientX, startY = e.clientY;
      let moved = false;
      const onMove = ev => {
        const dx = ev.clientX - startX, dy = ev.clientY - startY;
        if (!moved && Math.abs(dx) + Math.abs(dy) < 5) return;
        moved = true;
        el.style.left = (rect.left - dRect.left + dx) + 'px';
        el.style.top = (rect.top - dRect.top + dy) + 'px';
      };
      const onUp = () => { document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onUp); };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
    desktop.appendChild(el);
  });
}
renderIcons();

// === Window management ===
function createWindow(title, width, height, content, appId) {
  const id = ++winIdCounter;
  const dRect = desktop.getBoundingClientRect();
  const x = 80 + Math.random() * (dRect.width - width - 120);
  const y = 40 + Math.random() * (dRect.height - height - 80);

  const win = document.createElement('div');
  win.className = 'window focused';
  win.style.left = x + 'px';
  win.style.top = y + 'px';
  win.style.width = width + 'px';
  win.style.height = height + 'px';
  win.style.zIndex = ++zCounter;
  win.dataset.winId = id;
  win.dataset.appId = appId || '';

  win.innerHTML = `
    <div class="win-titlebar">
      <div class="win-dot close" onclick="closeWindow(${id})"></div>
      <div class="win-dot min" onclick="minimizeWindow(${id})"></div>
      <div class="win-dot max" onclick="maximizeWindow(${id})"></div>
      <div class="win-title">${esc(title)}</div>
    </div>
    <div class="win-body" id="win-body-${id}">${content}</div>
    <div class="win-resize"></div>
  `;

  // Focus on click
  win.addEventListener('mousedown', () => focusWindow(id));

  // Titlebar drag
  const titlebar = win.querySelector('.win-titlebar');
  titlebar.addEventListener('mousedown', e => {
    if (e.target.classList.contains('win-dot')) return;
    const rect = win.getBoundingClientRect();
    dragState = { winId: id, type: 'move', offX: e.clientX - rect.left, offY: e.clientY - rect.top, el: win };
    e.preventDefault();
  });

  // Resize handle
  const resizeHandle = win.querySelector('.win-resize');
  resizeHandle.addEventListener('mousedown', e => {
    const rect = win.getBoundingClientRect();
    dragState = { winId: id, type: 'resize', startW: rect.width, startH: rect.height, startX: e.clientX, startY: e.clientY, el: win };
    e.preventDefault();
  });

  desktop.appendChild(win);
  windows.push({ id, title, el: win, minimized: false, maximized: false, prevRect: null, appId });
  focusWindow(id);
  updateTaskbar();
  return id;
}

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

window.closeWindow = function(id) {
  const idx = windows.findIndex(w => w.id === id);
  if (idx < 0) return;
  windows[idx].el.remove();
  windows.splice(idx, 1);
  updateTaskbar();
};

window.minimizeWindow = function(id) {
  const w = windows.find(w => w.id === id);
  if (!w) return;
  w.minimized = true;
  w.el.classList.add('minimized');
  updateTaskbar();
};

window.maximizeWindow = function(id) {
  const w = windows.find(w => w.id === id);
  if (!w) return;
  const dRect = desktop.getBoundingClientRect();
  if (w.maximized) {
    if (w.prevRect) {
      w.el.style.left = w.prevRect.x + 'px';
      w.el.style.top = w.prevRect.y + 'px';
      w.el.style.width = w.prevRect.w + 'px';
      w.el.style.height = w.prevRect.h + 'px';
    }
    w.maximized = false;
  } else {
    const r = w.el.getBoundingClientRect();
    w.prevRect = { x: parseInt(w.el.style.left), y: parseInt(w.el.style.top), w: r.width, h: r.height };
    w.el.style.left = '0px';
    w.el.style.top = '0px';
    w.el.style.width = dRect.width + 'px';
    w.el.style.height = dRect.height + 'px';
    w.maximized = true;
  }
};

function focusWindow(id) {
  windows.forEach(w => w.el.classList.remove('focused'));
  const w = windows.find(w => w.id === id);
  if (w) {
    w.el.classList.add('focused');
    w.el.style.zIndex = ++zCounter;
    if (w.minimized) {
      w.minimized = false;
      w.el.classList.remove('minimized');
    }
    focusedWin = id;
    updateTaskbar();
  }
}

// Global mouse handling for drag/resize
document.addEventListener('mousemove', e => {
  if (!dragState) return;
  const dRect = desktop.getBoundingClientRect();
  if (dragState.type === 'move') {
    let x = e.clientX - dragState.offX - dRect.left;
    let y = e.clientY - dragState.offY - dRect.top;
    x = Math.max(-50, Math.min(dRect.width - 50, x));
    y = Math.max(0, Math.min(dRect.height - 28, y));
    dragState.el.style.left = x + 'px';
    dragState.el.style.top = y + 'px';
  } else if (dragState.type === 'resize') {
    const dw = e.clientX - dragState.startX;
    const dh = e.clientY - dragState.startY;
    dragState.el.style.width = Math.max(200, dragState.startW + dw) + 'px';
    dragState.el.style.height = Math.max(120, dragState.startH + dh) + 'px';
  }
});
document.addEventListener('mouseup', () => { dragState = null; });

// Touch support for mobile
document.addEventListener('touchmove', e => {
  if (!dragState) return;
  const t = e.touches[0];
  const dRect = desktop.getBoundingClientRect();
  if (dragState.type === 'move') {
    let x = t.clientX - dragState.offX - dRect.left;
    let y = t.clientY - dragState.offY - dRect.top;
    dragState.el.style.left = Math.max(-50, Math.min(dRect.width - 50, x)) + 'px';
    dragState.el.style.top = Math.max(0, Math.min(dRect.height - 28, y)) + 'px';
  }
}, { passive: true });
document.addEventListener('touchend', () => { dragState = null; });

// Taskbar
function updateTaskbar() {
  taskItems.innerHTML = windows.map(w => {
    const active = w.id === focusedWin && !w.minimized;
    return `<button class="task-item${active ? ' active' : ''}" onclick="focusWindow(${w.id})">${esc(w.title)}</button>`;
  }).join('');
}

// Clock
function updateClock() {
  const now = new Date();
  document.getElementById('task-clock').textContent =
    now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
}
setInterval(updateClock, 5000);
updateClock();

// Click desktop to deselect
desktop.addEventListener('click', e => {
  if (e.target === desktop) {
    document.querySelectorAll('.desk-icon').forEach(i => i.classList.remove('selected'));
  }
});

// === Apps ===
function openApp(appId) {
  // Don't open duplicate (except notepad/terminal)
  if (!['notepad', 'terminal'].includes(appId)) {
    const existing = windows.find(w => w.appId === appId);
    if (existing) { focusWindow(existing.id); return; }
  }

  switch (appId) {
    case 'terminal': openTerminal(); break;
    case 'notepad': openNotepad(); break;
    case 'calc': openCalc(); break;
    case 'clock': openClock(); break;
    case 'files': openFiles(); break;
    case 'about': openAbout(); break;
    case 'colors': openColors(); break;
    case 'music': openBeats(); break;
  }
}

function openTerminal() {
  const id = createWindow('Terminal', 360, 240, `
    <div id="term-out-${winIdCounter}" style="color:var(--green)">
      <div class="terminal-line"><span class="terminal-prompt">neon@desk:~$</span> welcome to neon terminal</div>
      <div class="terminal-line" style="color:var(--dim)">type 'help' for commands</div>
    </div>
    <div style="display:flex;align-items:center;margin-top:4px">
      <span class="terminal-prompt">neon@desk:~$&nbsp;</span>
      <input class="terminal-input" id="term-in-${winIdCounter}" onkeydown="if(event.key==='Enter')termExec(this)" autofocus>
    </div>
  `, 'terminal');
}

window.termExec = function(input) {
  const cmd = input.value.trim().toLowerCase();
  input.value = '';
  const outId = input.id.replace('in', 'out');
  const out = document.getElementById(outId);
  if (!out) return;

  let response = '';
  if (cmd === 'help') response = 'commands: help, date, whoami, ls, clear, cowsay, matrix, uptime';
  else if (cmd === 'date') response = new Date().toString();
  else if (cmd === 'whoami') response = 'neon_user@desk.cyber';
  else if (cmd === 'ls') response = 'Desktop/  Documents/  Downloads/  .config/  .secret';
  else if (cmd === 'clear') { out.innerHTML = ''; return; }
  else if (cmd.startsWith('cowsay')) {
    const msg = cmd.slice(7) || 'moo';
    response = `<pre style="font-size:0.55rem"> ${'_'.repeat(msg.length+2)}\n< ${msg} >\n ${'‾'.repeat(msg.length+2)}\n   \\   ^__^\n    \\  (oo)\\_______\n       (__)\\       )\\/\\\n           ||----w |\n           ||     ||</pre>`;
  }
  else if (cmd === 'matrix') response = '<span style="color:var(--green)">'+Array.from({length:5},()=>Array.from({length:30},()=>Math.random()<0.5?'0':'1').join('')).join('<br>')+'</span>';
  else if (cmd === 'uptime') response = `up ${Math.floor(performance.now()/1000)}s, 1 user, load: ${(Math.random()*2).toFixed(2)}`;
  else if (cmd) response = `<span style="color:var(--amber)">command not found: ${esc(cmd)}</span>`;
  else return;

  out.innerHTML += `<div class="terminal-line"><span class="terminal-prompt">neon@desk:~$</span> ${esc(cmd)}</div>`;
  out.innerHTML += `<div class="terminal-line">${response}</div>`;
  out.parentElement.scrollTop = out.parentElement.scrollHeight;
};

function openNotepad() {
  createWindow('Notepad', 320, 260, `<textarea class="notepad-area" placeholder="Start typing..."></textarea>`, 'notepad');
}

function openCalc() {
  const cid = winIdCounter + 1;
  createWindow('Calculator', 220, 300, `
    <div class="calc-display" id="calc-disp-${cid}">0</div>
    <div class="calc-grid">
      ${['C','±','%','÷','7','8','9','×','4','5','6','−','1','2','3','+','0','0','.','='].map(b => {
        const isOp = '÷×−+='.includes(b);
        return `<div class="calc-btn${isOp ? ' op' : ''}" onclick="calcPress('${b}',${cid})">${b}</div>`;
      }).join('')}
    </div>
  `, 'calc');
}

let calcState = {};
window.calcPress = function(b, cid) {
  if (!calcState[cid]) calcState[cid] = { display: '0', prev: null, op: null, fresh: true };
  const s = calcState[cid];
  const disp = document.getElementById('calc-disp-' + cid);
  if (!disp) return;

  if ('0123456789'.includes(b)) {
    s.display = s.fresh ? b : s.display + b;
    s.fresh = false;
  } else if (b === '.') {
    if (!s.display.includes('.')) s.display += '.';
    s.fresh = false;
  } else if (b === 'C') {
    s.display = '0'; s.prev = null; s.op = null; s.fresh = true;
  } else if (b === '±') {
    s.display = String(-parseFloat(s.display));
  } else if (b === '%') {
    s.display = String(parseFloat(s.display) / 100);
  } else if ('÷×−+'.includes(b)) {
    if (s.prev !== null && s.op && !s.fresh) {
      s.display = String(calcEval(s.prev, parseFloat(s.display), s.op));
    }
    s.prev = parseFloat(s.display);
    s.op = b; s.fresh = true;
  } else if (b === '=') {
    if (s.prev !== null && s.op) {
      s.display = String(calcEval(s.prev, parseFloat(s.display), s.op));
      s.prev = null; s.op = null;
    }
    s.fresh = true;
  }
  disp.textContent = s.display.length > 12 ? parseFloat(s.display).toPrecision(10) : s.display;
};

function calcEval(a, b, op) {
  if (op === '+') return a + b;
  if (op === '−') return a - b;
  if (op === '×') return a * b;
  if (op === '÷') return b !== 0 ? a / b : 'ERR';
  return b;
}

function openClock() {

  createWindow('Clock', 240, 160, `<div class="clock-face"><div class="clock-time" id="clk-${cid}">--:--:--</div><div class="clock-date" id="clk-d-${cid}"></div></div>`, 'clock');
  const upd = () => {
    const now = new Date();

}

function openBeats() {
  const cid = winIdCounter + 1;
  createWindow('Beats', 300, 180, `
    <div style="text-align:center;font-size:0.55rem;color:var(--dim);margin-bottom:8px">8-step beat sequencer</div>
    <div style="display:flex;gap:3px;justify-content:center;margin-bottom:8px" id="beats-${cid}">
      ${Array.from({length:8},(_,i)=>`<div style="width:28px;height:28px;border:1px solid var(--border);border-radius:3px;cursor:pointer;background:var(--surface2);transition:all 0.1s" data-on="0" onclick="toggleBeat(this)"></div>`).join('')}
    </div>
    <div style="text-align:center">
      <button onclick="playBeats(${cid})" style="padding:5px 14px;border:1px solid var(--green);border-radius:4px;background:transparent;color:var(--green);font-family:Orbitron;font-size:0.5rem;cursor:pointer">PLAY</button>
    </div>
    <div style="text-align:center;font-size:0.45rem;color:var(--dim);margin-top:6px" id="beat-status-${cid}">click pads to toggle</div>
  `, 'music');

window.toggleBeat = function(el) {
  const on = el.dataset.on === '1';
  el.dataset.on = on ? '0' : '1';
  el.style.background = on ? 'var(--surface2)' : 'var(--green)';
  el.style.borderColor = on ? 'var(--border)' : 'var(--green)';
  el.style.boxShadow = on ? 'none' : '0 0 8px var(--green)';
};

window.playBeats = function(cid) {
  const container = document.getElementById('beats-' + cid);
  const status = document.getElementById('beat-status-' + cid);
  if (!container) return;
  const pads = container.children;
  let step = 0;

  // Simple AudioContext beep
  let audioCtx;
  try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}

  function tick() {
    if (!document.getElementById('beats-' + cid)) return; // window closed
    Array.from(pads).forEach((p, i) => {
      p.style.outline = i === step ? '2px solid var(--cyan)' : 'none';
    });
    if (pads[step]?.dataset.on === '1' && audioCtx) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain); gain.connect(audioCtx.destination);
      osc.frequency.value = 220 + step * 50;
      osc.type = 'square';
      gain.gain.value = 0.08;
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
      osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }
    if (status) status.textContent = `step ${step + 1}/8`;
    step = (step + 1) % 8;
    setTimeout(tick, 200);
  }
  tick();
};

// Start menu (simple)
window.toggleStartMenu = function() {
  let menu = document.getElementById('start-menu');
  if (menu) { menu.remove(); return; }
  menu = document.createElement('div');
  menu.id = 'start-menu';
  menu.style.cssText = 'position:absolute;bottom:38px;left:8px;background:var(--surface);border:1px solid var(--border-hi);border-radius:6px;padding:6px;z-index:300;min-width:140px';
  ICONS.forEach(ic => {
    const item = document.createElement('div');
    item.className = 'file-item';
    item.innerHTML = `<span class="file-icon">${ic.glyph}</span>${ic.label}`;
    item.onclick = () => { openApp(ic.id); menu.remove(); };
    menu.appendChild(item);
  });
  document.body.appendChild(menu);
  setTimeout(() => {
    const close = e => { if (!menu.contains(e.target)) { menu.remove(); document.removeEventListener('click', close); }};
    document.addEventListener('click', close);
  }, 10);
};
