<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>voronoi shader · live cellular noise designer</title>
<link rel="icon" href="https://emojicdn.elk.sh/🔬">
<meta name="description" content="A live WebGL2 sandbox for cellular noise — drag sliders, watch the cells, palette and metric switch on the fly. Save the result as PNG or copy the GLSL.">
<meta property="og:title" content="voronoi shader · live cellular noise designer">
<meta property="og:description" content="A live WebGL2 sandbox for cellular noise. Drag sliders. Watch the cells. Save the result.">
<meta property="og:url" content="https://sloppy.live/voronoi-shader">
<meta property="og:image" content="https://image.pollinations.ai/prompt/glowing%20cellular%20voronoi%20pattern%20sharp%20edges%20stained%20glass%20magenta%20cyan%20deep%20blue%20backdrop%20studio%20lighting%20procedural%20art?width=1200&height=630&nologo=true">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Cormorant+Garamond:ital,wght@1,400;1,600&family=JetBrains+Mono:wght@400;500;700&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #050810;
    --panel-bg: rgba(7, 12, 26, 0.78);
    --panel-border: rgba(255, 110, 255, 0.22);
    --ink: #e9e7ff;
    --dim: #7d8fb7;
    --cyan: #7af0ff;
    --pink: #ff6ee0;
    --amber: #ffba5e;
    --green: #80f0a5;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{font-size:100%}
  body{
    min-height:100vh; overflow:hidden;
    background: var(--bg);
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
  }
  canvas#stage{
    position: fixed; inset: 0;
    width: 100vw; height: 100vh;
    display: block;
    z-index: 0;
  }
  /* subtle vignette so the canvas reads as a 'piece' */
  .vignette{
    position: fixed; inset: 0;
    pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.45) 100%);
    z-index: 1;
  }

  /* ── floating control panel ───────────────────────────── */
  .panel{
    position: fixed;
    top: 1rem; right: 1rem;
    width: 22rem; max-width: calc(100vw - 2rem);
    max-height: calc(100vh - 2rem);
    overflow-y: auto;
    background: var(--panel-bg);
    backdrop-filter: blur(14px) saturate(140%);
    -webkit-backdrop-filter: blur(14px) saturate(140%);
    border: 1px solid var(--panel-border);
    border-radius: 0.5rem;
    padding: 1rem 1.1rem 1.1rem;
    z-index: 10;
    box-shadow: 0 1.4rem 3rem rgba(0,0,0,0.55), 0 0 1rem rgba(255,110,255,0.08);
    transition: transform 0.28s cubic-bezier(.34,1.16,.64,1), opacity 0.22s;
  }
  .panel.collapsed{
    transform: translateX(calc(100% - 3.4rem));
  }
  .panel.collapsed > *:not(.toggle){ opacity: 0; pointer-events: none; }
  .panel .toggle{
    position: absolute; top: 0.6rem; left: 0.55rem;
    background: transparent; border: 0; cursor: pointer;
    color: var(--cyan); font-family: 'Syne Mono', monospace;
    font-size: 1.15rem; padding: 0.4rem 0.5rem; line-height: 1;
  }
  .panel .toggle:focus-visible{ outline: 2px solid var(--cyan); outline-offset: 2px; }

  .panel h1{
    font-family: 'Major Mono Display', monospace;
    font-size: 1.05rem;
    color: var(--cyan);
    letter-spacing: 0.1em;
    margin-left: 2rem;
    text-shadow: 0 0 10px rgba(122,240,255,0.35);
  }
  .panel h1 .accent{ color: var(--pink); }
  .panel .tag{
    margin: 0.2rem 0 0.85rem 2rem;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--dim);
    font-size: 0.82rem;
  }

  /* control rows */
  .ctl{
    display: grid; gap: 0.3rem;
    margin: 0.45rem 0;
    padding: 0.5rem 0.6rem;
    border-radius: 0.3rem;
    background: rgba(255,255,255,0.025);
    border: 1px solid rgba(255,255,255,0.04);
  }
  .ctl .lab{
    display: flex; align-items: center; justify-content: space-between;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--dim);
  }
  .ctl .lab .val{
    font-family: 'JetBrains Mono', monospace;
    color: var(--amber);
    font-size: 0.78rem;
    letter-spacing: 0.04em;
    text-transform: none;
  }
  .ctl input[type=range]{
    appearance: none;
    width: 100%;
    height: 1.4rem;
    background: transparent;
    cursor: pointer;
  }
  .ctl input[type=range]::-webkit-slider-runnable-track{
    height: 0.22rem; background: rgba(255,255,255,0.1); border-radius: 1rem;
  }
  .ctl input[type=range]::-moz-range-track{
    height: 0.22rem; background: rgba(255,255,255,0.1); border-radius: 1rem;
  }
  .ctl input[type=range]::-webkit-slider-thumb{
    appearance: none; width: 0.95rem; height: 0.95rem;
    background: var(--pink); border-radius: 50%;
    margin-top: -0.36rem;
    box-shadow: 0 0 8px rgba(255,110,255,0.65);
    transition: transform 0.1s;
  }
  .ctl input[type=range]::-moz-range-thumb{
    width: 0.95rem; height: 0.95rem; border: 0;
    background: var(--pink); border-radius: 50%;
    box-shadow: 0 0 8px rgba(255,110,255,0.65);
  }
  .ctl input[type=range]:active::-webkit-slider-thumb{ transform: scale(1.18); }
  .ctl input[type=range]:focus-visible{ outline: 2px solid var(--cyan); outline-offset: 4px; border-radius: 0.6rem; }

  /* segmented chip groups */
  .chips{
    display: flex; flex-wrap: wrap; gap: 0.25rem;
    margin: 0.45rem 0;
  }
  .chip{
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    color: var(--dim);
    font: inherit;
    font-size: 0.66rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 0.4rem 0.6rem;
    cursor: pointer;
    border-radius: 0.22rem;
    min-height: 2.2rem;
    transition: all 0.12s;
  }
  .chip:hover{ color: var(--cyan); border-color: rgba(122,240,255,0.4); }
  .chip[aria-pressed="true"]{
    background: rgba(255,110,255,0.18);
    color: var(--pink);
    border-color: var(--pink);
    box-shadow: 0 0 8px rgba(255,110,255,0.3);
  }
  .chip:focus-visible{ outline: 2px solid var(--cyan); outline-offset: 2px; }

  .grouphead{
    margin-top: 0.85rem;
    font-family: 'Syne Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.32em;
    color: var(--cyan);
    text-transform: uppercase;
    border-bottom: 1px dashed rgba(122,240,255,0.18);
    padding-bottom: 0.25rem;
  }

  /* bottom action bar */
  .actions{
    display: flex; gap: 0.4rem; margin-top: 0.85rem;
    flex-wrap: wrap;
  }
  .btn{
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.12);
    color: var(--ink);
    font: inherit;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    padding: 0.55rem 0.6rem;
    cursor: pointer;
    border-radius: 0.25rem;
    min-height: 2.4rem;
    transition: all 0.12s;
  }
  .btn:hover{ color: var(--amber); border-color: var(--amber); }
  .btn.primary{ background: rgba(128,240,165,0.10); color: var(--green); border-color: rgba(128,240,165,0.4); }
  .btn.primary:hover{ background: rgba(128,240,165,0.22); }
  .btn:focus-visible{ outline: 2px solid var(--cyan); outline-offset: 2px; }

  /* HUD readout: fps + mouse */
  .hud{
    position: fixed;
    bottom: 0.85rem; left: 0.85rem;
    font-family: 'Syne Mono', monospace;
    font-size: 0.7rem;
    color: var(--dim);
    letter-spacing: 0.14em;
    background: var(--panel-bg);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.06);
    padding: 0.4rem 0.6rem;
    border-radius: 0.22rem;
    z-index: 10;
    pointer-events: none;
  }
  .hud b{ color: var(--cyan); font-weight: 500; }

  /* compile error overlay */
  .err{
    position: fixed; inset: 1rem;
    background: rgba(8,0,8,0.92);
    border: 1px solid #ff5555;
    color: #ffaaaa;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    padding: 1rem;
    z-index: 50;
    overflow: auto;
    white-space: pre-wrap;
    display: none;
  }
  .err.show{ display: block; }
  .err h2{ color: #ff7878; margin-bottom: 0.5rem; font-size: 0.95rem; letter-spacing: 0.1em; }

  /* glsl viewer modal */
  .modal-back{
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(6px);
    z-index: 40;
    display: none;
    align-items: center; justify-content: center;
    padding: 1rem;
  }
  .modal-back.show{ display: flex; }
  .modal{
    background: var(--panel-bg);
    border: 1px solid var(--panel-border);
    border-radius: 0.5rem;
    padding: 1rem;
    max-width: 70rem; max-height: 80vh;
    width: 100%;
    display: flex; flex-direction: column;
    gap: 0.6rem;
  }
  .modal h2{
    font-family: 'Major Mono Display', monospace;
    color: var(--pink);
    font-size: 0.9rem;
    letter-spacing: 0.1em;
  }
  .modal pre{
    background: #04060e;
    border: 1px solid rgba(255,110,255,0.18);
    border-radius: 0.25rem;
    padding: 0.85rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    line-height: 1.5;
    color: #c2d1e8;
    overflow: auto;
    flex: 1;
    white-space: pre;
  }
  .modal .row{ display: flex; gap: 0.4rem; justify-content: flex-end; }

  @media (max-width: 540px){
    .panel{ width: calc(100vw - 1rem); top: 0.5rem; right: 0.5rem; padding: 0.85rem; }
    .hud{ font-size: 0.65rem; }
  }
  @media (prefers-reduced-motion: reduce){
    * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
  }
</style>

<body>
  <canvas id="stage" role="img" aria-label="Live cellular noise pattern"></canvas>
  <div class="vignette" aria-hidden="true"></div>

  <aside class="panel" id="panel" aria-label="Shader controls">
    <button class="toggle" id="toggle" title="collapse / expand" aria-label="toggle panel">≡</button>
    <h1>voronoi <span class="accent">·</span> studio</h1>
    <p class="tag">cellular noise · live · drag a slider, watch the cells.</p>

    <div class="grouphead">geometry</div>

    <div class="ctl">
      <div class="lab"><span>density</span><span class="val" id="vDensity">12</span></div>
      <input id="density" type="range" min="3" max="80" step="1" value="12">
    </div>
    <div class="ctl">
      <div class="lab"><span>jitter</span><span class="val" id="vJitter">1.00</span></div>
      <input id="jitter" type="range" min="0" max="1" step="0.01" value="1">
    </div>
    <div class="ctl">
      <div class="lab"><span>warp</span><span class="val" id="vWarp">0.00</span></div>
      <input id="warp" type="range" min="0" max="1.5" step="0.01" value="0">
    </div>

    <div class="chips" role="group" aria-label="distance metric">
      <button class="chip" data-metric="0" aria-pressed="true">euclidean</button>
      <button class="chip" data-metric="1" aria-pressed="false">manhattan</button>
      <button class="chip" data-metric="2" aria-pressed="false">chebyshev</button>
      <button class="chip" data-metric="3" aria-pressed="false">mink·3</button>
    </div>

    <div class="grouphead">style</div>

    <div class="chips" role="group" aria-label="output style">
      <button class="chip" data-style="0" aria-pressed="true">cells</button>
      <button class="chip" data-style="1" aria-pressed="false">edges</button>
      <button class="chip" data-style="2" aria-pressed="false">f2−f1</button>
      <button class="chip" data-style="3" aria-pressed="false">dots</button>
      <button class="chip" data-style="4" aria-pressed="false">cracks</button>
    </div>

    <div class="ctl">
      <div class="lab"><span>edge thickness</span><span class="val" id="vEdge">0.06</span></div>
      <input id="edge" type="range" min="0.005" max="0.4" step="0.005" value="0.06">
    </div>
    <div class="ctl">
      <div class="lab"><span>contrast</span><span class="val" id="vContrast">1.00</span></div>
      <input id="contrast" type="range" min="0.2" max="3" step="0.05" value="1">
    </div>

    <div class="grouphead">motion</div>

    <div class="ctl">
      <div class="lab"><span>animation</span><span class="val" id="vSpeed">0.40</span></div>
      <input id="speed" type="range" min="0" max="2" step="0.02" value="0.4">
    </div>
    <div class="ctl">
      <div class="lab"><span>scale</span><span class="val" id="vScale">1.00</span></div>
      <input id="scale" type="range" min="0.3" max="3" step="0.05" value="1">
    </div>

    <div class="grouphead">colour</div>

    <div class="chips" role="group" aria-label="palette">
      <button class="chip" data-palette="0" aria-pressed="true">stained</button>
      <button class="chip" data-palette="1" aria-pressed="false">frost</button>
      <button class="chip" data-palette="2" aria-pressed="false">magma</button>
      <button class="chip" data-palette="3" aria-pressed="false">biofilm</button>
      <button class="chip" data-palette="4" aria-pressed="false">void</button>
      <button class="chip" data-palette="5" aria-pressed="false">ink</button>
      <button class="chip" data-palette="6" aria-pressed="false">custom ↓</button>
    </div>

    <!-- Custom-palette colour pickers · feed a 3-stop gradient into the
         shader when 'custom' is active. -->
    <div class="ctl" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:.45rem;padding:.55rem">
      <div>
        <div class="lab" style="margin-bottom:.25rem"><span>core</span></div>
        <input type="color" id="colA" value="#1a0420" style="width:100%;height:2rem;border:1px solid rgba(255,255,255,0.15);background:transparent;cursor:pointer;border-radius:.18rem">
      </div>
      <div>
        <div class="lab" style="margin-bottom:.25rem"><span>mid</span></div>
        <input type="color" id="colB" value="#ff4dc8" style="width:100%;height:2rem;border:1px solid rgba(255,255,255,0.15);background:transparent;cursor:pointer;border-radius:.18rem">
      </div>
      <div>
        <div class="lab" style="margin-bottom:.25rem"><span>edge</span></div>
        <input type="color" id="colC" value="#7af0ff" style="width:100%;height:2rem;border:1px solid rgba(255,255,255,0.15);background:transparent;cursor:pointer;border-radius:.18rem">
      </div>
    </div>

    <div class="ctl">
      <div class="lab"><span>palette shift</span><span class="val" id="vShift">0.00</span></div>
      <input id="shift" type="range" min="0" max="1" step="0.01" value="0">
    </div>

    <div class="grouphead">presets</div>

    <div class="chips" role="group" aria-label="presets">
      <button class="chip" data-preset="stained-glass">stained glass</button>
      <button class="chip" data-preset="biofilm">biofilm</button>
      <button class="chip" data-preset="magma">magma cracks</button>
      <button class="chip" data-preset="frost">frosted</button>
      <button class="chip" data-preset="circuit">circuit</button>
      <button class="chip" data-preset="dust">dust</button>
    </div>

    <div class="actions">
      <button class="btn primary" id="randomBtn">⚂ random</button>
      <button class="btn" id="pauseBtn" aria-pressed="false">▶ pause</button>
    </div>
    <div class="actions">
      <button class="btn" id="saveBtn">⤓ png</button>
      <button class="btn" id="glslBtn">{ } glsl</button>
    </div>
  </aside>

  <div class="hud" id="hud" aria-hidden="true">
    <span>fps <b id="hudFps">—</b></span> ·
    <span>cells ≈ <b id="hudCells">144</b></span> ·
    <span><b id="hudPaused" style="display:none">PAUSED</b></span>
  </div>

  <div class="err" id="err" role="alert"></div>

  <div class="modal-back" id="glslModal" role="dialog" aria-modal="true" aria-labelledby="glslTitle">
    <div class="modal">
      <h2 id="glslTitle">fragment shader source</h2>
      <div class="chips" role="group" aria-label="shader dialect">
        <button class="chip" data-dialect="glsl" aria-pressed="true">GLSL ES 3.00 (web)</button>
        <button class="chip" data-dialect="godot" aria-pressed="false">Godot 4 (.gdshader)</button>
      </div>
      <pre id="glslSource"></pre>
      <div class="row">
        <button class="btn" id="copyGlsl">⎘ copy</button>
        <button class="btn" id="downloadGlsl">⤓ download</button>
        <button class="btn" id="closeGlsl">close</button>
      </div>
    </div>
  </div>

<script>
/* ─────────────────────────────────────────────────────────────────
   voronoi-shader · live cellular noise designer
   WebGL2 fragment shader with hot-swap uniforms; UI updates feed
   directly into uniforms on the next frame, no shader recompile.
   ───────────────────────────────────────────────────────────── */

const VS = `#version 300 es
in vec2 a_pos;
out vec2 v_uv;
void main(){
  v_uv = a_pos * 0.5 + 0.5;
  gl_Position = vec4(a_pos, 0.0, 1.0);
}`;

const FS = `#version 300 es
precision highp float;
in vec2 v_uv;
out vec4 outColor;

uniform vec2  u_res;
uniform float u_time;
uniform vec2  u_mouse;        // 0..1 normalised cursor (also: pan)

uniform float u_density;
uniform float u_jitter;
uniform float u_warp;
uniform float u_speed;
uniform float u_scale;
uniform float u_edge;
uniform float u_contrast;
uniform float u_shift;
uniform int   u_metric;       // 0 euclid, 1 manh, 2 cheby, 3 mink-3
uniform int   u_style;        // 0 cells, 1 edges, 2 f2-f1, 3 dots, 4 cracks
uniform int   u_palette;      // 0..5 = cosine presets, 6 = custom 3-stop
uniform vec3  u_colA;         // custom core colour
uniform vec3  u_colB;         // custom mid colour
uniform vec3  u_colC;         // custom edge colour

// ── hashes ────────────────────────────────────────────────────────
vec2 hash2(vec2 p){
  p = vec2(dot(p, vec2(127.1, 311.7)), dot(p, vec2(269.5, 183.3)));
  return fract(sin(p) * 43758.5453);
}
float hash1(vec2 p){
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
}

// ── value noise for the warp field ────────────────────────────────
float vnoise(vec2 p){
  vec2 i = floor(p), f = fract(p);
  vec2 u = f * f * (3.0 - 2.0 * f);
  return mix(
    mix(hash1(i + vec2(0,0)), hash1(i + vec2(1,0)), u.x),
    mix(hash1(i + vec2(0,1)), hash1(i + vec2(1,1)), u.x),
    u.y);
}

// ── distance metrics ──────────────────────────────────────────────
float metricDist(vec2 r){
  if (u_metric == 0) return length(r);
  if (u_metric == 1) return abs(r.x) + abs(r.y);
  if (u_metric == 2) return max(abs(r.x), abs(r.y));
  return pow(pow(abs(r.x), 3.0) + pow(abs(r.y), 3.0), 1.0 / 3.0);
}

// ── voronoi (returns F1, F2, and the integer-cell-id) ─────────────
vec3 voronoi(vec2 uv){
  vec2 ip = floor(uv);
  vec2 fp = fract(uv);
  float f1 = 1e10, f2 = 1e10;
  vec2 idClosest = vec2(0.0);
  for (int j = -1; j <= 1; j++){
    for (int i = -1; i <= 1; i++){
      vec2 g = vec2(float(i), float(j));
      vec2 cellId = ip + g;
      vec2 o = hash2(cellId);
      // animate cell points along their own random orbit
      o = 0.5 + (o - 0.5) * u_jitter;
      o += 0.32 * u_jitter * vec2(sin(u_time * (0.6 + o.x)), cos(u_time * (0.55 + o.y)));
      vec2 r = g + o - fp;
      float d = metricDist(r);
      if (d < f1){ f2 = f1; f1 = d; idClosest = cellId; }
      else if (d < f2){ f2 = d; }
    }
  }
  // pack a per-cell scalar id into the third channel
  float idScalar = fract(sin(dot(idClosest, vec2(91.3, 47.7))) * 1234.5);
  return vec3(f1, f2, idScalar);
}

// ── iq cosine palette ────────────────────────────────────────────
vec3 palette(float t){
  // shift the input
  t = fract(t + u_shift);
  vec3 a, b, c, d;
  if (u_palette == 0){       // stained · red/yellow/orange
    a = vec3(0.6, 0.3, 0.2); b = vec3(0.6, 0.5, 0.4);
    c = vec3(1.0, 1.0, 1.0); d = vec3(0.0, 0.15, 0.3);
  } else if (u_palette == 1){ // frost · cool blue/cyan
    a = vec3(0.3, 0.5, 0.7); b = vec3(0.3, 0.4, 0.5);
    c = vec3(1.0, 1.0, 0.6); d = vec3(0.0, 0.25, 0.5);
  } else if (u_palette == 2){ // magma · black/red/yellow
    a = vec3(0.5, 0.2, 0.05); b = vec3(0.6, 0.4, 0.2);
    c = vec3(2.0, 1.5, 0.6); d = vec3(0.0, 0.25, 0.4);
  } else if (u_palette == 3){ // biofilm · green/mint/cream
    a = vec3(0.4, 0.55, 0.4); b = vec3(0.4, 0.45, 0.35);
    c = vec3(0.8, 0.8, 1.0); d = vec3(0.0, 0.1, 0.2);
  } else if (u_palette == 4){ // void · purple/pink/cyan
    a = vec3(0.5, 0.3, 0.7); b = vec3(0.4, 0.5, 0.5);
    c = vec3(1.0, 1.0, 1.0); d = vec3(0.3, 0.0, 0.5);
  } else if (u_palette == 5){ // ink · monochrome
    a = vec3(0.5); b = vec3(0.5); c = vec3(1.0, 1.0, 1.0); d = vec3(0.0);
  } else {
    // u_palette == 6 — CUSTOM 3-stop gradient driven by colour pickers.
    // smoothly interpolates core → mid → edge across t∈[0,1].
    if (t < 0.5) return mix(u_colA, u_colB, smoothstep(0.0, 1.0, t * 2.0));
    return mix(u_colB, u_colC, smoothstep(0.0, 1.0, (t - 0.5) * 2.0));
  }
  return a + b * cos(6.28318 * (c * t + d));
}

void main(){
  vec2 res = u_res;
  vec2 uv = (v_uv * 2.0 - 1.0) * vec2(res.x / res.y, 1.0) * u_scale;
  uv -= (u_mouse - 0.5) * 2.0 * u_scale;
  uv *= u_density * 0.5;

  // domain warp via 2-octave value noise
  if (u_warp > 0.001){
    float t = u_time * 0.25 * u_speed;
    vec2 w = vec2(
      vnoise(uv * 0.6 + vec2(0.0, t)),
      vnoise(uv * 0.6 + vec2(t, 0.0))
    );
    w = w * 2.0 - 1.0;
    uv += w * u_warp;
  }

  vec3 v = voronoi(uv);
  float f1 = v.x, f2 = v.y, id = v.z;

  float val = 0.0;
  if (u_style == 0){          // cells: per-cell flat colour by id
    val = id;
  } else if (u_style == 1){   // edges: dark interior, bright cell walls
    float edge = smoothstep(u_edge, 0.0, f2 - f1);
    val = mix(id, 1.0 - edge * 0.85, 0.5);
  } else if (u_style == 2){   // f2-f1 raw heatmap
    val = clamp((f2 - f1) * 1.4, 0.0, 1.0);
  } else if (u_style == 3){   // dots: bright at cell centre, fading out
    val = 1.0 - smoothstep(0.0, 0.5 - u_edge, f1);
    val = mix(val, id * 0.6, 0.3);
  } else {                    // cracks: thin bright edges on dark
    float w = smoothstep(u_edge, u_edge * 0.4, f2 - f1);
    val = 1.0 - w;
  }
  // contrast tweak
  val = pow(clamp(val, 0.0, 1.0), 1.0 / u_contrast);

  vec3 col = palette(val);
  outColor = vec4(col, 1.0);
}`;

function compile(type, src){
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS)){
    const log = gl.getShaderInfoLog(s);
    errEl.classList.add('show');
    errEl.innerHTML = '<h2>shader compile failed</h2>' + log.replace(/</g,'&lt;');
    throw new Error(log);
  }
  return s;
}

const fs = compile(gl.FRAGMENT_SHADER, FS);
const prog = gl.createProgram();
gl.attachShader(prog, vs); gl.attachShader(prog, fs);
gl.bindAttribLocation(prog, 0, 'a_pos');
gl.linkProgram(prog);

  errEl.classList.add('show');

}

// hex string '#rrggbb' → [r,g,b] in 0..1
function hex2rgb(h){
  const m = /^#?([0-9a-f]{6})$/i.exec(h);
  if (!m) return [1, 0, 1];
  const n = parseInt(m[1], 16);
  return [((n >> 16) & 255) / 255, ((n >> 8) & 255) / 255, (n & 255) / 255];
}

/* ── shader source viewer (GLSL ES + Godot 4 .gdshader) ──
   Godot 4's shading language is GLSL-like but has its own type names
   and entry points. The transpile below targets a Godot CanvasItem
   shader so users can paste the result directly into a Material in
   the engine. The Voronoi math is the same — only the boilerplate +
   uniform syntax + entry function changes. */
function godotTranspile(){
  // current uniform values, embedded so the shader runs standalone
  // without needing a Material-set step in Godot.
  const s = state;
  const cur = (v) => Number(v).toFixed(5);
  const v3 = ([r,g,b]) => `vec3(${cur(r)}, ${cur(g)}, ${cur(b)})`;
  return `shader_type canvas_item;
// Voronoi cellular-noise shader · exported from sloppy.live/voronoi-shader
// Drop on a ColorRect or TextureRect with full-rect anchor preset.
// Uniforms are pre-baked from the studio state — tweak in inspector
// after dropping the file, or wire from GDScript via set_shader_parameter.

uniform float density   : hint_range(3.0, 80.0)  = ${cur(s.density)};
uniform float jitter    : hint_range(0.0, 1.0)   = ${cur(s.jitter)};
uniform float warp      : hint_range(0.0, 1.5)   = ${cur(s.warp)};
uniform float speed     : hint_range(0.0, 2.0)   = ${cur(s.speed)};
uniform float scale_v   : hint_range(0.3, 3.0)   = ${cur(s.scale)};
uniform float edge      : hint_range(0.005, 0.4) = ${cur(s.edge)};
uniform float contrast  : hint_range(0.2, 3.0)   = ${cur(s.contrast)};
uniform float shift_v   : hint_range(0.0, 1.0)   = ${cur(s.shift)};
uniform int   metric    : hint_range(0, 3)       = ${s.metric};   // 0 euclid · 1 manh · 2 cheby · 3 mink-3
uniform int   style_v   : hint_range(0, 4)       = ${s.style};    // 0 cells · 1 edges · 2 f2-f1 · 3 dots · 4 cracks
uniform int   palette_v : hint_range(0, 6)       = ${s.palette};  // 0..5 presets · 6 custom 3-stop
uniform vec3  col_a     : source_color           = ${v3(s.colA)};
uniform vec3  col_b     : source_color           = ${v3(s.colB)};
uniform vec3  col_c     : source_color           = ${v3(s.colC)};

vec2 hash2(vec2 p){
    p = vec2(dot(p, vec2(127.1, 311.7)), dot(p, vec2(269.5, 183.3)));
    return fract(sin(p) * 43758.5453);
}
float hash1(vec2 p){
    return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
}
float vnoise(vec2 p){
    vec2 i = floor(p); vec2 f = fract(p);
    vec2 u = f * f * (3.0 - 2.0 * f);
    return mix(
        mix(hash1(i + vec2(0,0)), hash1(i + vec2(1,0)), u.x),
        mix(hash1(i + vec2(0,1)), hash1(i + vec2(1,1)), u.x),
        u.y);
}
float metric_dist(vec2 r){
    if (metric == 0) return length(r);
    if (metric == 1) return abs(r.x) + abs(r.y);
    if (metric == 2) return max(abs(r.x), abs(r.y));
    return pow(pow(abs(r.x), 3.0) + pow(abs(r.y), 3.0), 1.0 / 3.0);
}
vec3 voronoi_(vec2 uv){
    vec2 ip = floor(uv); vec2 fp = fract(uv);
    float f1 = 1e10; float f2 = 1e10;
    vec2 id_closest = vec2(0.0);
    for (int j = -1; j <= 1; j++){
        for (int i = -1; i <= 1; i++){
            vec2 g = vec2(float(i), float(j));
            vec2 cell_id = ip + g;
            vec2 o = hash2(cell_id);
            o = 0.5 + (o - 0.5) * jitter;
            o += 0.32 * jitter * vec2(sin(TIME * (0.6 + o.x)), cos(TIME * (0.55 + o.y)));
            vec2 r = g + o - fp;
            float d = metric_dist(r);
            if (d < f1){ f2 = f1; f1 = d; id_closest = cell_id; }
            else if (d < f2){ f2 = d; }
        }
    }
    float id_scalar = fract(sin(dot(id_closest, vec2(91.3, 47.7))) * 1234.5);
    return vec3(f1, f2, id_scalar);
}
vec3 palette_(float t){
    t = fract(t + shift_v);
    vec3 a; vec3 b; vec3 c; vec3 d;
    if (palette_v == 0){ a = vec3(0.6,0.3,0.2); b = vec3(0.6,0.5,0.4); c = vec3(1.0); d = vec3(0.0,0.15,0.3); }
    else if (palette_v == 1){ a = vec3(0.3,0.5,0.7); b = vec3(0.3,0.4,0.5); c = vec3(1.0,1.0,0.6); d = vec3(0.0,0.25,0.5); }
    else if (palette_v == 2){ a = vec3(0.5,0.2,0.05); b = vec3(0.6,0.4,0.2); c = vec3(2.0,1.5,0.6); d = vec3(0.0,0.25,0.4); }
    else if (palette_v == 3){ a = vec3(0.4,0.55,0.4); b = vec3(0.4,0.45,0.35); c = vec3(0.8,0.8,1.0); d = vec3(0.0,0.1,0.2); }
    else if (palette_v == 4){ a = vec3(0.5,0.3,0.7); b = vec3(0.4,0.5,0.5); c = vec3(1.0); d = vec3(0.3,0.0,0.5); }
    else if (palette_v == 5){ a = vec3(0.5); b = vec3(0.5); c = vec3(1.0); d = vec3(0.0); }
    else {
        if (t < 0.5) return mix(col_a, col_b, smoothstep(0.0, 1.0, t * 2.0));
        return mix(col_b, col_c, smoothstep(0.0, 1.0, (t - 0.5) * 2.0));
    }
    return a + b * cos(6.28318 * (c * t + d));
}
void fragment(){
    // SCREEN_PIXEL_SIZE = 1.0 / SCREEN texture size; use UV directly.
    vec2 uv = (UV * 2.0 - 1.0);
    uv.x *= 1.0 / TEXTURE_PIXEL_SIZE.y * TEXTURE_PIXEL_SIZE.x;   // aspect
    uv *= scale_v;
    uv *= density * 0.5;
    if (warp > 0.001){
        float t = TIME * 0.25 * speed;
        vec2 w = vec2(
            vnoise(uv * 0.6 + vec2(0.0, t)),
            vnoise(uv * 0.6 + vec2(t, 0.0))
        );
        w = w * 2.0 - 1.0;
        uv += w * warp;
    }
    vec3 v = voronoi_(uv);
    float f1 = v.x; float f2 = v.y; float id = v.z;
    float val = 0.0;
    if (style_v == 0){ val = id; }
    else if (style_v == 1){ float ed = smoothstep(edge, 0.0, f2 - f1); val = mix(id, 1.0 - ed * 0.85, 0.5); }
    else if (style_v == 2){ val = clamp((f2 - f1) * 1.4, 0.0, 1.0); }
    else if (style_v == 3){ val = 1.0 - smoothstep(0.0, 0.5 - edge, f1); val = mix(val, id * 0.6, 0.3); }
    else { float w = smoothstep(edge, edge * 0.4, f2 - f1); val = 1.0 - w; }
    val = pow(clamp(val, 0.0, 1.0), 1.0 / contrast);
    COLOR = vec4(palette_(val), 1.0);
}
`;
}

/* ──────────────────────────────────────────────────────────────
   Resize / render loop
   ────────────────────────────────────────────────────────────── */
function resize(){
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  const w = Math.floor(window.innerWidth  * dpr);
  const h = Math.floor(window.innerHeight * dpr);
  if (canvas.width !== w || canvas.height !== h){
    canvas.width = w; canvas.height = h;
    gl.viewport(0, 0, w, h);
  }
}
window.addEventListener('resize', resize);
resize();

const tStart = performance.now();
let frameTimes = [];
let lastT = 0;
const hudFps = document.getElementById('hudFps');

function pushUniforms(time){
  gl.uniform2f(U.res, canvas.width, canvas.height);
  gl.uniform1f(U.time, time);
  gl.uniform2f(U.mouse, state.mouse[0], state.mouse[1]);
  gl.uniform1f(U.density,  state.density);
  gl.uniform1f(U.jitter,   state.jitter);
  gl.uniform1f(U.warp,     state.warp);
  gl.uniform1f(U.speed,    state.speed);
  gl.uniform1f(U.scale,    state.scale);
  gl.uniform1f(U.edge,     state.edge);
  gl.uniform1f(U.contrast, state.contrast);
  gl.uniform1f(U.shift,    state.shift);
  gl.uniform1i(U.metric,   state.metric);
  gl.uniform1i(U.style,    state.style);
  gl.uniform1i(U.palette,  state.palette);
  gl.uniform3fv(U.colA, state.colA);
  gl.uniform3fv(U.colB, state.colB);
  gl.uniform3fv(U.colC, state.colC);
}

function drawOnce(){
  pushUniforms(lastT);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

function frame(now){
  resize();
  if (!state.paused){
    lastT = ((now - tStart) / 1000) * state.speed;
  }
  pushUniforms(lastT);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  // fps
  frameTimes.push(now);
  while (frameTimes.length && now - frameTimes[0] > 1000) frameTimes.shift();
  hudFps.textContent = frameTimes.length;
  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// Keyboard: space = pause, p = panel, r = random
window.addEventListener('keydown', (e) => {
  if (e.target.matches('input, textarea')) return;
  if (e.key === ' ' || e.code === 'Space'){
    e.preventDefault();
    document.getElementById('pauseBtn').click();
  } else if (e.key === 'p'){
    document.getElementById('toggle').click();
  } else if (e.key === 'r'){
    document.getElementById('randomBtn').click();
  } else if (e.key === 'Escape'){
    document.getElementById('glslModal').classList.remove('show');
  }
});

// boot with a flattering preset
applyPreset('stained-glass');
</script>
<script src="/sloppy-header/sloppy-bar.js"></script>
</body>
