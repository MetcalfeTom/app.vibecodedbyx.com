<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Neon Fluid Simulator · glowing trails react to cursor</title>
<meta name="description" content="Curl-noise neon ribbons. Move your cursor to bend the field; click to pulse. Long glowing trails respond in real time." />
<meta property="og:title" content="Neon Fluid Simulator" />
<meta property="og:description" content="Curl-noise neon ribbons. Move your cursor to bend the field; click to pulse." />
<meta property="og:url" content="https://sloppy.live/neon-fluid-simulator/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/neon%20fluid%20simulator%20glowing%20cyan%20magenta%20violet%20curl%20noise%20ribbons%20on%20black%2C%201200x630?width=1200&height=630&nofeed=true&format=png" />
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8C%80" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Syne+Mono&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#000;color:#e8eaf2;font-family:'Syne Mono', monospace;cursor:none}
canvas{position:absolute;inset:0;display:block;touch-action:none}
.title{
  position:fixed;top:18px;left:22px;z-index:5;pointer-events:none;
  font-family:'Major Mono Display', monospace;
  font-size:clamp(20px, 3.5vw, 30px);letter-spacing:0.06em;line-height:1;
  color:rgba(232,234,242,0.92);
  text-shadow:0 0 18px rgba(123,228,255,0.7), 0 0 38px rgba(180,140,255,0.4);
  mix-blend-mode:screen;
}
.title small{
  display:block;font-family:'Syne Mono', monospace;font-size:11px;
  letter-spacing:0.36em;color:rgba(232,234,242,0.55);
  text-shadow:none;margin-top:8px;text-transform:uppercase;
}
.controls{
  position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
  z-index:5;display:flex;gap:6px;flex-wrap:wrap;justify-content:center;
}
.controls button{
  background:rgba(8,7,16,0.65);
  border:1px solid rgba(123,228,255,0.30);
  color:rgba(232,234,242,0.85);
  font-family:'Syne Mono', monospace;font-size:10px;letter-spacing:0.18em;
  padding:6px 14px;border-radius:999px;cursor:pointer;
  text-transform:uppercase;
  backdrop-filter:blur(8px);
  transition:border-color 0.15s, color 0.15s, background 0.15s;
}
.controls button:hover{
  border-color:rgba(123,228,255,0.7);
  color:rgba(123,228,255,1);
  background:rgba(123,228,255,0.10);
}
.controls button.on{
  border-color:rgba(255,94,161,0.7);
  color:rgba(255,94,161,1);
  background:rgba(255,94,161,0.10);
}
.controls .sep{
  width:1px;background:rgba(220,228,240,0.18);align-self:stretch;
  margin:0 4px;
}
.hint{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  z-index:4;pointer-events:none;
  font-family:'Syne Mono', monospace;font-size:13px;
  color:rgba(232,234,242,0.45);letter-spacing:0.18em;text-transform:uppercase;
  text-align:center;line-height:1.6;
  text-shadow:0 0 12px rgba(0,0,0,0.7);
  opacity:1;transition:opacity 0.8s ease;
}
.hint.fade{opacity:0}
</style>
</head>
<body>

<canvas id="bg"></canvas>
<canvas id="fluid"></canvas>

<div class="title">
  Neon · Fluid
  <small>· move to bend · click to pulse ·</small>
</div>

<div class="hint" id="hint">
  drag the cursor anywhere<br>
  · click to pulse the field ·<br>
  hold <kbd style="font-family:inherit;background:rgba(123,228,255,0.15);border:1px solid rgba(123,228,255,0.4);padding:1px 7px;border-radius:3px">SPACE</kbd> to freeze
</div>

<div class="controls">
  <button id="paletteBtn">palette · neon</button>
  <button id="trailLenBtn">trail · 28</button>
  <button id="countBtn">ribbons · 400</button>
  <span class="sep"></span>
  <button id="freezeBtn">▶ flow</button>
  <button id="resetBtn">↻ reset</button>
</div>

<script>
(() => {
  // ===== CANVAS =====
  // Two layered canvases: bg (custom cursor + faint vignette grid) and
  // fluid (the ribbons + click pulses). Resized + DPR-aware.
  const bgCanvas    = document.getElementById('bg');
  const fluidCanvas = document.getElementById('fluid');
  const bg = bgCanvas.getContext('2d');
  const fx = fluidCanvas.getContext('2d');
  let W, H, DPR;
  function resize() {
    DPR = Math.min(2, window.devicePixelRatio || 1);
    W = window.innerWidth; H = window.innerHeight;
    for (const c of [bgCanvas, fluidCanvas]) {
      c.width  = W * DPR;
      c.height = H * DPR;
      c.style.width  = W + 'px';
      c.style.height = H + 'px';
    }
    bg.setTransform(DPR, 0, 0, DPR, 0, 0);
    fx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  // ===== CURSOR =====
  const cursor = { x: W / 2, y: H / 2, vx: 0, vy: 0, lx: W / 2, ly: H / 2, down: false, in: true, t: 0 };
  function setCursor(x, y) {
    cursor.lx = cursor.x; cursor.ly = cursor.y;
    cursor.x = x; cursor.y = y;
    cursor.vx = cursor.x - cursor.lx;
    cursor.vy = cursor.y - cursor.ly;
    cursor.t = performance.now();
    cursor.in = true;
    if (hint && !hintFaded) { hint.classList.add('fade'); hintFaded = true; }
  }
  window.addEventListener('mousemove', (e) => setCursor(e.clientX, e.clientY));
  window.addEventListener('mouseleave', () => { cursor.in = false; });
  window.addEventListener('mousedown',  () => { cursor.down = true;  pulse(); });
  window.addEventListener('mouseup',    () => { cursor.down = false; });
  window.addEventListener('touchstart', (e) => {
    const t = e.touches[0]; setCursor(t.clientX, t.clientY); cursor.down = true; pulse();
  }, { passive: true });
  window.addEventListener('touchmove', (e) => {
    const t = e.touches[0]; setCursor(t.clientX, t.clientY);
  }, { passive: true });
  window.addEventListener('touchend',  () => { cursor.down = false; });

  // ===== PARAMETERS =====
  // PARTICLE_COUNT: ribbons in flight. TRAIL_LEN: positions stashed per
  // ribbon for the glowing tail. CURSOR_PULL: how strongly the cursor
  // bends the field. NOISE_SCALE: spatial frequency of the curl noise.
  const config = {
    count: 400,
    trail: 28,
    palette: 0,
    frozen: false,
    pullR: 240,        // cursor influence radius
    pullK: 0.50,       // cursor pull strength
    spinK: 0.42,       // perpendicular spin strength (the "fluid" feel)
    noiseScale: 0.0028,
    noiseTime:  0.00018,
    drag: 0.96,        // velocity damping per frame
    speedCap: 6.0,
  };

  // ===== PALETTES =====
  // Each palette is an array of base hues (0-360). Per-particle hue is
  // base + a velocity-modulated shift, so faster ribbons skew warmer.
  const PALETTES = [
    { name: 'NEON',    hues: [185, 200, 285, 320, 345], glow: 0.85 },
    { name: 'EMBER',   hues: [10, 26, 40, 320, 340],     glow: 0.90 },
    { name: 'AURORA',  hues: [120, 160, 195, 230, 280], glow: 0.75 },
    { name: 'BIOLUM',  hues: [150, 175, 195, 240, 290], glow: 0.95 },
    { name: 'CANDY',   hues: [310, 330, 0, 35, 200],     glow: 0.85 },
  ];

  // ===== CURL NOISE =====
  // Pseudo-curl-noise vector field via cheap layered sin/cos. Returns a
  // unit-ish (vx, vy) for any (x, y, t). Cheap = good — we sample once
  // per particle per frame.
  function curl(x, y, t) {
    const s = config.noiseScale;
    // two sin layers for variation
    const a = Math.sin((x +  43) * s        + Math.cos(y * s * 1.3 + t) * 1.6 + t * 0.7);
    const b = Math.cos((y + 199) * s * 1.13 + Math.sin(x * s * 0.9 + t * 0.6) * 1.2 + t * 0.5);
    // perpendicular pair → curl-ish
    return { x: a + Math.cos(t * 0.3 + x * s * 0.5) * 0.4,
             y: b + Math.sin(t * 0.2 + y * s * 0.5) * 0.4 };
  }

  // ===== PARTICLES =====
  // Each particle carries: position, velocity, hue offset, trail buffer
  // (a ring of past positions for the glowing tail render).
  const particles = [];
  function spawnParticle() {
    const x = Math.random() * W, y = Math.random() * H;
    const trail = new Array(config.trail);
    for (let i = 0; i < config.trail; i++) trail[i] = { x, y };
    return {
      x, y, vx: 0, vy: 0,
      hueOff: Math.random() * 50 - 25,
      trail, head: 0, life: 0,
    };
  }
  function rebuildParticles() {
    particles.length = 0;
    for (let i = 0; i < config.count; i++) particles.push(spawnParticle());
  }
  rebuildParticles();

  // ===== RADIAL PULSES =====
  // On click/tap, push every particle outward from the cursor briefly.
  const pulses = [];     // { x, y, t0, life }
  function pulse() {
    pulses.push({ x: cursor.x, y: cursor.y, t0: performance.now(), life: 0.7 });
    if (pulses.length > 8) pulses.shift();
  }

  // ===== STEP / RENDER =====
  let last = 0;
  function step(now) {
    const dt = Math.min(0.05, (now - last) / 1000) || 0.016;
    last = now;
    // ===== fade-trail wash on the fluid canvas =====
    // A low-alpha black rect each frame fades old trail samples while
    // additive-blended new samples are painted on top — this is what
    // makes the trails feel like glowing fluid rather than chalk lines.
    fx.globalCompositeOperation = 'source-over';
    fx.fillStyle = 'rgba(0, 0, 0, 0.18)';
    fx.fillRect(0, 0, W, H);

    if (!config.frozen) {
      const t = now * config.noiseTime;
      const pal = PALETTES[config.palette];
      const palLen = pal.hues.length;
      // ===== particle update =====
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        // base curl-noise field
        const c = curl(p.x, p.y, t);
        p.vx += c.x * 0.18;
        p.vy += c.y * 0.18;
        // cursor influence (radial pull + perpendicular spin)
        if (cursor.in) {
          const dx = cursor.x - p.x, dy = cursor.y - p.y;
          const d2 = dx * dx + dy * dy;
          const r2 = config.pullR * config.pullR;
          if (d2 < r2 && d2 > 1) {
            const fall = 1 - Math.sqrt(d2) / config.pullR;   // 1 at center, 0 at edge
            const inv = 1 / Math.sqrt(d2);
            const nx = dx * inv, ny = dy * inv;
            // pull toward cursor
            const pullStrength = (cursor.down ? 1.8 : 1.0) * config.pullK * fall;
            p.vx += nx * pullStrength * 1.2;
            p.vy += ny * pullStrength * 1.2;
            // perpendicular spin (the "fluid" curl feel)
            const spinStrength = config.spinK * fall;
            p.vx += -ny * spinStrength * 1.4;
            p.vy +=  nx * spinStrength * 1.4;
            // cursor's own velocity drags particles along
            p.vx += cursor.vx * 0.02 * fall;
            p.vy += cursor.vy * 0.02 * fall;
          }
        }
        // pulses (radial impulse outward)
        for (let pIdx = 0; pIdx < pulses.length; pIdx++) {
          const pl = pulses[pIdx];
          const age = (now - pl.t0) / 1000;
          if (age > pl.life) continue;
          const ageFrac = age / pl.life;       // 0..1
          const ring = ageFrac * 380;          // ring radius growing
          const dx = p.x - pl.x, dy = p.y - pl.y;
          const d  = Math.sqrt(dx * dx + dy * dy) || 0.001;
          const distToRing = Math.abs(d - ring);
          if (distToRing < 80) {
            const force = (1 - distToRing / 80) * (1 - ageFrac) * 6;
            p.vx += (dx / d) * force;
            p.vy += (dy / d) * force;
          }
        }
        // damping + speed cap
        p.vx *= config.drag; p.vy *= config.drag;
        const sp = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
        if (sp > config.speedCap) {
          p.vx *= config.speedCap / sp;
          p.vy *= config.speedCap / sp;
        }
        // integrate
        p.x += p.vx; p.y += p.vy;
        // wrap edges
        if (p.x < -10) p.x += W + 20;
        if (p.x > W + 10) p.x -= W + 20;
        if (p.y < -10) p.y += H + 20;
        if (p.y > H + 10) p.y -= H + 20;
        // stash trail
        p.head = (p.head + 1) % p.trail.length;
        p.trail[p.head].x = p.x;
        p.trail[p.head].y = p.y;
        p.life++;
      }
      // GC expired pulses
      for (let i = pulses.length - 1; i >= 0; i--) {
        if ((now - pulses[i].t0) / 1000 > pulses[i].life) pulses.splice(i, 1);
      }

      // ===== draw ribbons =====
      // Additive blend = neon glow. Each ribbon is a polyline through
      // its trail buffer in chronological order; line width tapers from
      // tail to head; hue shifts with speed.
      fx.globalCompositeOperation = 'lighter';
      const trailN = config.trail;
      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        const sp = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
        const hueIdx = (i % palLen);
        const hue = pal.hues[hueIdx] + p.hueOff + sp * 6;
        // Iterate trail oldest-to-newest and stroke segment-by-segment
        // so we can taper width per-segment.
        let prev = null;
        for (let k = 0; k < trailN; k++) {
          const idx = (p.head + 1 + k) % trailN;
          const pt = p.trail[idx];
          if (!pt) continue;
          if (prev) {
            // skip rendering across screen-wrap teleports
            const dx = pt.x - prev.x, dy = pt.y - prev.y;
            if (Math.abs(dx) < W * 0.5 && Math.abs(dy) < H * 0.5) {
              const tNorm = k / trailN;          // 0 = oldest, 1 = newest
              const a = tNorm * pal.glow;
              const w = 0.5 + tNorm * 2.4;
              fx.strokeStyle = `hsla(${hue}, 95%, 65%, ${a})`;
              fx.lineWidth = w;
              fx.beginPath();
              fx.moveTo(prev.x, prev.y);
              fx.lineTo(pt.x, pt.y);
              fx.stroke();
            }
          }
          prev = pt;
        }
        // hot core dot at the head — extra glow
        const head = p.trail[p.head];
        fx.fillStyle = `hsla(${hue}, 100%, 78%, 0.85)`;
        fx.beginPath();
        fx.arc(head.x, head.y, 1.5, 0, Math.PI * 2);
        fx.fill();
      }
      fx.globalCompositeOperation = 'source-over';

      // ===== draw radial pulse rings =====
      for (const pl of pulses) {
        const age = (now - pl.t0) / 1000;
        if (age > pl.life) continue;
        const ageFrac = age / pl.life;
        const ring = ageFrac * 380;
        const alpha = (1 - ageFrac) * 0.4;
        fx.strokeStyle = `hsla(${PALETTES[config.palette].hues[0]}, 95%, 70%, ${alpha})`;
        fx.lineWidth = 1.5 + (1 - ageFrac) * 2;
        fx.beginPath();
        fx.arc(pl.x, pl.y, ring, 0, Math.PI * 2);
        fx.stroke();
      }
    }

    // ===== bg cursor halo =====
    bg.clearRect(0, 0, W, H);
    if (cursor.in) {
      const haloR = cursor.down ? 70 : 30;
      const haloA = cursor.down ? 0.55 : 0.30;
      const halo = bg.createRadialGradient(cursor.x, cursor.y, 0, cursor.x, cursor.y, haloR);
      halo.addColorStop(0, `hsla(${PALETTES[config.palette].hues[0]}, 95%, 75%, ${haloA})`);
      halo.addColorStop(1, 'hsla(0, 0%, 0%, 0)');
      bg.fillStyle = halo;
      bg.fillRect(cursor.x - haloR, cursor.y - haloR, haloR * 2, haloR * 2);
      // crosshair ring
      bg.strokeStyle = `hsla(${PALETTES[config.palette].hues[1]}, 95%, 75%, 0.65)`;
      bg.lineWidth = 1.4;
      bg.beginPath();
      bg.arc(cursor.x, cursor.y, cursor.down ? 12 : 8, 0, Math.PI * 2);
      bg.stroke();
      // mini-cross
      bg.strokeStyle = 'rgba(232, 234, 242, 0.7)';
      bg.lineWidth = 1;
      bg.beginPath();
      bg.moveTo(cursor.x - 4, cursor.y); bg.lineTo(cursor.x + 4, cursor.y);
      bg.moveTo(cursor.x, cursor.y - 4); bg.lineTo(cursor.x, cursor.y + 4);
      bg.stroke();
    }

    requestAnimationFrame(step);
  }
  requestAnimationFrame(step);

  // ===== UI WIRES =====
  const hint = document.getElementById('hint');
  let hintFaded = false;
  document.getElementById('paletteBtn').addEventListener('click', (e) => {
    config.palette = (config.palette + 1) % PALETTES.length;
    e.target.textContent = 'palette · ' + PALETTES[config.palette].name.toLowerCase();
  });
  document.getElementById('trailLenBtn').addEventListener('click', (e) => {
    const opts = [16, 28, 44, 64];
    const idx = (opts.indexOf(config.trail) + 1) % opts.length;
    config.trail = opts[idx];
    e.target.textContent = 'trail · ' + config.trail;
    rebuildParticles();
  });
  document.getElementById('countBtn').addEventListener('click', (e) => {
    const opts = [200, 400, 700, 1000];
    const idx = (opts.indexOf(config.count) + 1) % opts.length;
    config.count = opts[idx];
    e.target.textContent = 'ribbons · ' + config.count;
    rebuildParticles();
  });
  const freezeBtn = document.getElementById('freezeBtn');
  freezeBtn.addEventListener('click', () => {
    config.frozen = !config.frozen;
    freezeBtn.textContent = config.frozen ? '❄ frozen' : '▶ flow';
    freezeBtn.classList.toggle('on', config.frozen);
  });
  document.getElementById('resetBtn').addEventListener('click', () => {
    fx.fillStyle = '#000'; fx.fillRect(0, 0, W, H);
    pulses.length = 0;
    rebuildParticles();
  });
  // SPACE = freeze toggle (via keydown)
  window.addEventListener('keydown', (e) => {
    if (e.key === ' ') {
      e.preventDefault();
      freezeBtn.click();
    } else if (e.key === 'p' || e.key === 'P') {
      document.getElementById('paletteBtn').click();
    }
  });
})();
</script>
</body>
</html>
