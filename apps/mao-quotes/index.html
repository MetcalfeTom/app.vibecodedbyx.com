<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>猫猫语录 — 猫式人生哲理生成器</title>
<meta name="description" content="一个按钮，一句猫式人生哲理。睡觉、晒太阳、推杯子——猫早就把人生想明白了。">
<meta property="og:title" content="猫猫语录">
<meta property="og:description" content="点一下，获得一句猫式人生哲理。猫早就把人生想明白了。">
<meta property="og:url" content="https://sloppy.live/mao-quotes">
<meta property="og:image" content="https://image.pollinations.ai/prompt/elegant%20chinese%20ink%20wash%20painting%20of%20a%20cat%20sitting%20on%20rice%20paper%2C%20red%20seal%20stamp%2C%20calligraphy%2C%20minimal%20zen?width=1200&height=630&nologo=true&seed=888&model=flux">
<meta property="og:type" content="website">
<link rel="icon" href="https://emojicdn.elk.sh/🐱">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Serif+SC:wght@300;600&display=swap" rel="stylesheet">
<style>
:root{ --paper:#f5efe0; --paper2:#efe6d0; --ink:#2b2620; --dim:#8a7f6a; --seal:#c0392b; --gold:#a8853c; }
*{ box-sizing:border-box; margin:0; padding:0; }
html{ font-size:100%; }
body{
  min-height:100vh; color:var(--ink); font-family:'Noto Serif SC', serif;
  background:
    radial-gradient(28rem 20rem at 82% 12%, rgba(192,57,43,.05), transparent 60%),
    radial-gradient(30rem 22rem at 12% 90%, rgba(168,133,60,.07), transparent 60%),
    repeating-linear-gradient(6deg, transparent 0 3px, rgba(140,120,90,.025) 3px 4px),
    linear-gradient(160deg, var(--paper), var(--paper2));
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:1.5rem 1rem 3rem; text-align:center;
}
h1{
  font-family:'Ma Shan Zheng', cursive; font-weight:400;
  font-size:clamp(2.4rem, 9vw, 3.8rem); letter-spacing:.12em;
}
.sub{ font-weight:300; font-size:.95rem; color:var(--dim); letter-spacing:.3em; margin:.3rem 0 2rem; }
/* the scroll card */
.scroll{
  position:relative; width:min(34rem, 94vw); min-height:15rem;
  background:linear-gradient(175deg, #fbf6e8, #f2ead4);
  border:1px solid rgba(140,120,90,.35); border-radius:4px;
  box-shadow:0 .8rem 2rem rgba(60,50,35,.18), inset 0 0 3rem rgba(168,133,60,.06);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding:2.4rem 2rem; margin-bottom:1.8rem;
}
.scroll::before, .scroll::after{
  content:""; position:absolute; left:0; right:0; height:.55rem; background:var(--gold); opacity:.75;
}
.scroll::before{ top:0; border-radius:4px 4px 0 0; }
.scroll::after{ bottom:0; border-radius:0 0 4px 4px; }
#cat{ font-size:2.6rem; line-height:1; margin-bottom:1rem; transition:transform .5s cubic-bezier(.4,1.6,.4,1); }
#quote{
  font-family:'Ma Shan Zheng', cursive; font-weight:400;
  font-size:clamp(1.5rem, 5.2vw, 2.2rem); line-height:1.8; letter-spacing:.08em;
  opacity:0; transform:translateY(8px); transition:opacity .7s ease, transform .7s ease;
  max-width:26rem;
}
#quote.show{ opacity:1; transform:translateY(0); }
/* seal */
.seal{
  position:absolute; right:1.1rem; bottom:1rem; width:2.6rem; height:2.6rem;
  background:var(--seal); color:#fbf3e4; border-radius:4px;
  display:grid; place-items:center; font-family:'Ma Shan Zheng', cursive; font-size:1.5rem;
  transform:rotate(-4deg); box-shadow:0 1px 4px rgba(120,30,20,.4); opacity:.92;
}
#count{ position:absolute; left:1.2rem; bottom:1.1rem; font-size:.66rem; color:var(--dim); letter-spacing:.2em; }
/* the one button */
button{
  min-height:3.2rem; padding:.7rem 2.6rem; cursor:pointer; border-radius:99px;
  font-family:'Ma Shan Zheng', cursive; font-size:1.4rem; letter-spacing:.2em;
  color:#fbf3e4; background:var(--seal); border:0;
  box-shadow:0 .35rem 0 #8a2a20, 0 .6rem 1.2rem rgba(140,45,35,.35);
  transition:transform .12s;
}
button:hover{ transform:translateY(-2px); }
button:active{ transform:translateY(.2rem); box-shadow:0 .1rem 0 #8a2a20; }
button:focus-visible{ outline:3px solid var(--gold); outline-offset:4px; }
footer{ margin-top:2rem; font-size:.62rem; letter-spacing:.18em; color:var(--dim); }
@media (prefers-reduced-motion: reduce){
  #quote{ transition:none; } #cat{ transition:none; } button{ transition:none; }
}
</style>
</head>
<body>
<h1>猫猫语录</h1>
<p class="sub">猫 早 就 把 人 生 想 明 白 了</p>

<div class="scroll">
  <div id="cat" aria-hidden="true">🐱</div>
  <p id="quote" role="status" aria-live="polite">点下面的按钮，领取今日猫生智慧。</p>
  <span class="seal" aria-hidden="true">猫</span>
  <span id="count" aria-hidden="true"></span>
</div>

<button type="button" id="go">再来一句</button>

<footer>猫式哲学 · 概不负责 · <span id="build-info">build <b>v1.0</b> · commit <code id="build-hash">0000000</code></span></footer>

<script>
/* ═══ 语录库（洗牌袋：抽完一轮才重复）═══ */
var QUOTES=[
  ['睡觉不是浪费时间，是给梦想充电。','😴'],
  ['把杯子推下桌之前，先确认有人在看。','😼'],
  ['世界那么大，不如窝里暖。','🐱'],
  ['阳光是免费的，所以我每天都躺在最贵的位置。','😽'],
  ['饿了就叫，困了就睡，人类想太多了。','🙀'],
  ['好奇害不死猫，犹豫才会。','😾'],
  ['优雅地摔倒，然后假装是故意的。','😹'],
  ['纸箱越小，幸福越满。','📦'],
  ['别人递来的手，先闻一闻，再决定给不给面子。','🐈'],
  ['凌晨三点的跑酷，是灵魂的自由。','🌙'],
  ['先舔好自己的毛，再管别人的闲事。','😸'],
  ['高处不胜寒？可是高处视野好。','🐈‍⬛'],
  ['今天的烦恼，睡一觉就成了昨天的事。','💤'],
  ['不是我不理你，是我在思考宇宙。','🌌'],
  ['键盘那么暖，工作可以等。','⌨️'],
  ['先吃饭，再谈理想。','🍚'],
  ['遇事不决，先眯一会儿。','😌'],
  ['真正的强者，敢在任何地方睡着。','🛋️'],
  ['我不追激光笔了——追不到的东西，要学会放下。','🔴'],
  ['与其讨好所有人，不如蹭一个真心人。','💞'],
  ['门开着我不出去，门关着我必须出去，人生就是这样。','🚪'],
  ['每天留一点时间发呆，那是灵魂在晒太阳。','☀️'],
  ['打碎的花瓶已经碎了，何必回头看。','🏺'],
  ['被摸得舒服就眯眼，不舒服就走开，就这么简单。','🤲'],
  ['杯子里的水，永远比碗里的香。别问，这是哲学。','🥛'],
  ['三分之一的猫生用来睡觉，剩下的用来找睡觉的地方。','🗺️'],
  ['爱要主动：想被摸，就把头递过去。','🫶'],
  ['冷了就挨着暖的，饿了就找有饭的，猫生没那么复杂。','🔥'],
  ['优先占领刚放下的东西：报纸、键盘、和人心。','📰'],
  ['不高兴就甩尾巴，憋着会掉毛。','〰️'],
  ['慢慢走，反正沙发不会跑。','🛋️'],
  ['面对水，保持敬畏。','💧'],
  ['别人家的碗，永远值得闻一下。','🍜'],
  ['九条命，也要一条一条地过。','9️⃣'],
  ['真正重要的东西，用胡须就能感觉到。','✨'],
  ['守住自己的纸箱，就是守住自己的江山。','👑']
];
function mkBag(n, rng){
  rng=rng||Math.random;
  var idx=[]; for(var i=0;i<n;i++) idx.push(i);
  for(var j=n-1;j>0;j--){ var k=Math.floor(rng()*(j+1)); var t=idx[j]; idx[j]=idx[k]; idx[k]=t; }
  return idx;
}
/* ═══ end ═══ */

function $(id){ return document.getElementById(id); }
var bag=[], drawn=0, lastIdx=-1;
function draw(){
  if(!bag.length){
    bag=mkBag(QUOTES.length);
    if(bag[bag.length-1]===lastIdx&&bag.length>1){ bag.unshift(bag.pop()); }   /* 新一轮不接着上一句重复 */
  }
  var i=bag.pop(); lastIdx=i; drawn++;
  var q=QUOTES[i];
  var el=$('quote');
  el.classList.remove('show');
  setTimeout(function(){
    el.textContent=q[0];
    $('cat').textContent=q[1];
    $('cat').style.transform='rotate('+((Math.random()*10)-5)+'deg) scale(1.08)';
    setTimeout(function(){ $('cat').style.transform='none'; }, 400);
    el.classList.add('show');
    $('count').textContent='第 '+drawn+' 句';
  }, 180);
}
$('go').onclick=draw;
document.addEventListener('keydown', function(e){ if(e.code==='Space'||e.code==='Enter'){ if(document.activeElement.tagName!=='BUTTON'){ e.preventDefault(); draw(); } } });
</script>
</body>
</html>
