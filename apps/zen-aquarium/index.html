<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Zen Aquarium</title>
  <link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%AA%BC">
  <meta name="description" content="A slow-drifting aquarium of procedurally generated neon jellyfish. Breathe, watch, float.">
  <meta property="og:title" content="Zen Aquarium">
  <meta property="og:description" content="Procedurally generated neon jellyfish pulse and drift through a deep glowing sea. A little peace in a browser tab.">
  <meta property="og:url" content="https://sloppy.live/zen-aquarium">
  <meta property="og:image" content="https://image.pollinations.ai/prompt/bioluminescent%20jellyfish%20deep%20ocean%20neon%20cyan%20magenta%20violet%20zen%20minimalist%20glowing?width=1200&height=630&nologo=true">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;500&family=Space+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink: #e8f4ff;
      --muted: rgba(232, 244, 255, 0.55);
      --line: rgba(120, 230, 255, 0.22);
      --accent: #7adfff;
      --deep-0: #020414;
      --deep-1: #04102b;
      --deep-2: #001c3a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Space Mono', ui-monospace, monospace;
      color: var(--ink);
      background:
        radial-gradient(ellipse at 20% 0%, rgba(122, 223, 255, 0.10), transparent 55%),
        radial-gradient(ellipse at 80% 100%, rgba(200, 80, 240, 0.10), transparent 55%),
        linear-gradient(180deg, var(--deep-0) 0%, var(--deep-1) 40%, var(--deep-2) 100%);
      min-height: 100vh;
      user-select: none;
      -webkit-user-select: none;
    }
    canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      display: block;
    }
    .title {
      position: fixed;
      top: 26px; left: 36px;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(28px, 3.6vw, 46px);
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: rgba(232, 244, 255, 0.82);
      text-shadow: 0 0 18px rgba(122, 223, 255, 0.35);
      pointer-events: none;
      z-index: 3;
    }
    .title::after {
      content: '';
      display: block;
      width: 56px;
      height: 1px;
      margin-top: 14px;
      background: linear-gradient(90deg, rgba(122, 223, 255, 0.8), transparent);
    }
    .panel {
      position: fixed;
      bottom: 26px; left: 36px;
      display: flex;
      gap: 16px;
      align-items: center;
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      z-index: 3;
    }
    .panel .count {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Space Mono', monospace;
    }
    .count .n {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
      font-size: 30px;
      line-height: 1;
      color: var(--accent);
      letter-spacing: 0;
      text-shadow: 0 0 12px rgba(122, 223, 255, 0.5);
    }
    .btns {
      position: fixed;
      bottom: 26px; right: 36px;
      display: flex; gap: 10px;
      z-index: 3;
    }
    button {
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--muted);
      background: rgba(8, 20, 45, 0.45);
      border: 1px solid var(--line);
      padding: 10px 16px;
      border-radius: 2px;
      cursor: pointer;
      backdrop-filter: blur(6px);
      transition: all 0.2s ease;
    }
    button:hover {
      color: var(--ink);
      border-color: rgba(122, 223, 255, 0.6);
      box-shadow: 0 0 18px rgba(122, 223, 255, 0.2);
    }
    button.on {
      color: var(--accent);
      border-color: rgba(122, 223, 255, 0.7);
      box-shadow: inset 0 0 12px rgba(122, 223, 255, 0.15);
    }
    .hint {
      position: fixed;
      top: 32px; right: 36px;
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(232, 244, 255, 0.35);
      text-align: right;
      z-index: 3;
      line-height: 1.8;
    }
    .hint .key {
      color: var(--accent);
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
      letter-spacing: 0;
    }
    .vignette {
      position: fixed; inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at 50% 50%, transparent 45%, rgba(2, 4, 20, 0.85) 100%);
      z-index: 2;
    }
    @media (max-width: 640px) {
      .title { top: 18px; left: 18px; }
      .panel { bottom: 18px; left: 18px; }
      .btns { bottom: 18px; right: 18px; }
      .hint { display: none; }
    }
    @media (prefers-reduced-motion: reduce) {
      body { scroll-behavior: auto; }
    }
  </style>
</head>
<body>
  <canvas id="tank"></canvas>
  <div class="vignette"></div>
  <div class="title">Zen Aquarium</div>
  <div class="hint">
    <div><span class="key">Click</span> summon jelly</div>
    <div><span class="key">Space</span> ripple</div>
    <div><span class="key">R</span> reseed tank</div>
  </div>
  <div class="panel">
    <div class="count"><span class="n" id="count">0</span><span>drifting</span></div>
  </div>
  <div class="btns">
    <button id="audioBtn">◎ Ambience</button>
    <button id="reseedBtn">↻ Reseed</button>
  </div>

<script>
(() => {
  const canvas = document.getElementById('tank');
  const ctx = canvas.getContext('2d');
  const countEl = document.getElementById('count');
  const audioBtn = document.getElementById('audioBtn');
  const reseedBtn = document.getElementById('reseedBtn');

  let W = 0, H = 0, DPR = 1;
  function resize() {
    DPR = Math.min(2, window.devicePixelRatio || 1);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // Audio: ambient drone + sparse jelly bell chimes
  let ac = null, masterGain = null, drone = null;
  let audioOn = false;
  function initAudio() {
    if (ac) return;
    ac = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = ac.createGain();
    masterGain.gain.value = 0;
    masterGain.connect(ac.destination);

    // slow drone chord (root, fifth, octave-ish)
    const chord = [55, 82.4, 110, 164.8];
    drone = chord.map((f, i) => {
      const o = ac.createOscillator();
      o.type = i === 0 ? 'sine' : (i === 3 ? 'triangle' : 'sine');
      o.frequency.value = f;
      const g = ac.createGain();
      g.gain.value = 0.12 / (i + 1);
      const lfo = ac.createOscillator();
      const lfoG = ac.createGain();
      lfo.frequency.value = 0.05 + i * 0.03;
      lfoG.gain.value = 0.6;
      lfo.connect(lfoG).connect(o.detune);
      const filt = ac.createBiquadFilter();
      filt.type = 'lowpass';
      filt.frequency.value = 420;
      o.connect(filt).connect(g).connect(masterGain);
      o.start();
      lfo.start();
      return { o, g, lfo };
    });
  }
  function toggleAudio() {
    initAudio();
    audioOn = !audioOn;
    if (audioOn) {
      audioBtn.classList.add('on');
      masterGain.gain.cancelScheduledValues(ac.currentTime);
      masterGain.gain.linearRampToValueAtTime(0.35, ac.currentTime + 1.2);
    } else {
      audioBtn.classList.remove('on');
      masterGain.gain.cancelScheduledValues(ac.currentTime);
      masterGain.gain.linearRampToValueAtTime(0, ac.currentTime + 0.8);
    }
  }
  function chime(freq, vol = 0.08, dur = 2.4) {
    if (!audioOn || !ac) return;
    const o = ac.createOscillator();
    const g = ac.createGain();
    o.type = 'sine';
    o.frequency.value = freq;
    g.gain.setValueAtTime(0, ac.currentTime);
    g.gain.linearRampToValueAtTime(vol, ac.currentTime + 0.05);
    g.gain.exponentialRampToValueAtTime(0.0001, ac.currentTime + dur);
    o.connect(g).connect(masterGain);
    o.start();
    o.stop(ac.currentTime + dur + 0.05);
  }

  // Procedural jellyfish
  const HUES = [
    { h: 190, name: 'cyan' },
    { h: 300, name: 'magenta' },
    { h: 270, name: 'violet' },
    { h: 170, name: 'aqua' },
    { h: 340, name: 'rose' },
    { h: 220, name: 'cobalt' },
    { h: 130, name: 'jade' },
  ];

  function makeJelly(x, y) {
    const hue = HUES[Math.floor(Math.random() * HUES.length)];
    const size = 34 + Math.random() * 70;
    const bellWidthRatio = 1.1 + Math.random() * 0.6;
    const bellHeightRatio = 0.7 + Math.random() * 0.4;
    const tentacleCount = 4 + Math.floor(Math.random() * 5);
    const frillCount = 6 + Math.floor(Math.random() * 8);
    return {
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: -8 - Math.random() * 6,
      size,
      bellW: bellWidthRatio,
      bellH: bellHeightRatio,
      tentacles: tentacleCount,
      frills: frillCount,
      tentaclePhase: Math.random() * 6.28,
      hue: hue.h,
      hueShift: (Math.random() - 0.5) * 30,
      sat: 80 + Math.random() * 20,
      light: 58 + Math.random() * 10,
      pulse: 0,
      pulseRate: 0.24 + Math.random() * 0.14, // slow
      pulseSince: Math.random() * 3,
      phase: Math.random() * 6.28,
      targetX: x + (Math.random() - 0.5) * 200,
      driftT: Math.random() * 10,
      glowBoost: 0,
      chimeFreq: [220, 261.6, 329.6, 392, 440, 523.2][Math.floor(Math.random() * 6)] * (Math.random() < 0.4 ? 2 : 1),
    };
  }

  const state = {
    jellies: [],
    particles: [], // plankton
    ripples: [],
    bubbles: [],
    t: 0,
    mouseX: -1, mouseY: -1,
  };

  function seedTank() {
    state.jellies = [];
    const n = Math.min(9, Math.max(5, Math.floor((W * H) / 120000)));
    for (let i = 0; i < n; i++) {
      const j = makeJelly(Math.random() * W, Math.random() * H);
      j.vy = -2 - Math.random() * 3;
      state.jellies.push(j);
    }
    updateCount();
  }
  function addJelly(x, y) {
    if (state.jellies.length >= 18) {
      // remove oldest
      state.jellies.shift();
    }
    const j = makeJelly(x, y);
    j.glowBoost = 1.2;
    state.jellies.push(j);
    updateCount();
  }
  function updateCount() {
    countEl.textContent = state.jellies.length.toString().padStart(2, '0');
  }

  function seedParticles() {
    state.particles = [];
    const n = Math.floor(Math.min(W, H) * 0.25);
    for (let i = 0; i < n; i++) {
      state.particles.push({
        x: Math.random() * W,
        y: Math.random() * H,
        vy: -0.15 - Math.random() * 0.25,
        vx: (Math.random() - 0.5) * 0.2,
        r: 0.5 + Math.random() * 1.8,
        a: 0.1 + Math.random() * 0.35,
        wobble: Math.random() * 6.28,
      });
    }
  }

  seedTank();
  seedParticles();

  // Interactions
  canvas.addEventListener('pointerdown', e => {
    const x = e.clientX, y = e.clientY;
    addJelly(x, y);
    ripple(x, y, 6);
    if (audioOn) chime(state.jellies[state.jellies.length - 1].chimeFreq, 0.06, 2.2);
  });
  canvas.addEventListener('pointermove', e => {
    state.mouseX = e.clientX; state.mouseY = e.clientY;
  });
  canvas.addEventListener('pointerleave', () => { state.mouseX = -1; state.mouseY = -1; });

  window.addEventListener('keydown', e => {
    if (e.key === ' ') {
      e.preventDefault();
      ripple(W / 2, H / 2, 12);
      for (const j of state.jellies) { j.pulseSince = 1 / j.pulseRate; j.glowBoost = 0.8; }
    } else if (e.key === 'r' || e.key === 'R') {
      seedTank();
    }
  });

  reseedBtn.addEventListener('click', () => { seedTank(); });
  audioBtn.addEventListener('click', toggleAudio);

  function ripple(x, y, strength = 4) {
    state.ripples.push({ x, y, r: 4, age: 0, life: 1.8, strength });
    for (let i = 0; i < 12; i++) {
      state.bubbles.push({
        x: x + (Math.random() - 0.5) * 20,
        y: y + (Math.random() - 0.5) * 10,
        vx: (Math.random() - 0.5) * 40,
        vy: -60 - Math.random() * 60,
        r: 1 + Math.random() * 2.5,
        age: 0, life: 1.6 + Math.random(),
      });
    }
  }

  // Step
  function step(dt) {
    state.t += dt;

    // jellies
    for (const j of state.jellies) {
      j.phase += dt * 0.4;
      j.driftT += dt;
      j.pulseSince += dt;
      const pulseDur = 1 / j.pulseRate;
      if (j.pulseSince >= pulseDur) {
        j.pulseSince = 0;
        // kick upward thrust
        j.vy -= 10 + j.size * 0.16;
        j.vx += (Math.random() - 0.5) * 6;
        // subtle chime, very rare to avoid noise
        if (Math.random() < 0.06 && audioOn) chime(j.chimeFreq, 0.04, 2.0);
      }
      // pulse animation 0..1 (contracted near 0, relaxed near end)
      j.pulse = j.pulseSince / pulseDur;

      // drift toward targetX, re-pick occasionally
      if (Math.random() < 0.004 || Math.abs(j.x - j.targetX) < 10) {
        j.targetX = 40 + Math.random() * (W - 80);
      }
      const horizNudge = (j.targetX - j.x) * 0.04 + Math.sin(j.driftT * 0.4) * 2;
      j.vx += horizNudge * dt * 0.6;

      // gravity counter — jellies should gently sink between pulses
      j.vy += 3.4 * dt;

      // mouse repel (gentle)
      if (state.mouseX >= 0) {
        const dx = j.x - state.mouseX;
        const dy = j.y - state.mouseY;
        const d = Math.hypot(dx, dy);
        if (d < 140) {
          const f = (1 - d / 140) * 60;
          j.vx += (dx / d) * f * dt;
          j.vy += (dy / d) * f * dt;
        }
      }

      // dampen
      j.vx *= Math.pow(0.35, dt);
      j.vy *= Math.pow(0.42, dt);

      j.x += j.vx * dt;
      j.y += j.vy * dt;

      // wrap horizontally
      if (j.x < -j.size) j.x = W + j.size;
      if (j.x > W + j.size) j.x = -j.size;
      // loop vertically (drift up, respawn at bottom)
      if (j.y < -j.size * 2) {
        j.y = H + j.size * 2;
        j.x = Math.random() * W;
      }
      if (j.y > H + j.size * 3) {
        j.y = -j.size * 2;
        j.x = Math.random() * W;
      }

      j.glowBoost = Math.max(0, j.glowBoost - dt * 0.6);
      j.tentaclePhase += dt * (0.8 + j.pulseRate * 0.6);
    }

    // plankton
    for (const p of state.particles) {
      p.wobble += dt;
      p.x += (p.vx + Math.sin(p.wobble) * 0.3) * dt * 60;
      p.y += p.vy * dt * 60;
      if (p.y < -4) { p.y = H + 4; p.x = Math.random() * W; }
      if (p.x < -4) p.x = W + 4;
      if (p.x > W + 4) p.x = -4;
    }

    // ripples
    for (let i = state.ripples.length - 1; i >= 0; i--) {
      const r = state.ripples[i];
      r.age += dt;
      r.r += (120 + r.strength * 8) * dt;
      if (r.age >= r.life) state.ripples.splice(i, 1);
    }
    // bubbles
    for (let i = state.bubbles.length - 1; i >= 0; i--) {
      const b = state.bubbles[i];
      b.age += dt;
      b.x += b.vx * dt;
      b.y += b.vy * dt;
      b.vy += -20 * dt; // keep rising
      b.vx *= Math.pow(0.4, dt);
      if (b.age >= b.life) state.bubbles.splice(i, 1);
    }
  }

  // Drawing
  function drawBackdrop() {
    // subtle caustics — moving radial highlights
    for (let i = 0; i < 3; i++) {
      const cx = (W * (0.2 + i * 0.3)) + Math.sin(state.t * 0.12 + i) * 80;
      const cy = H * 0.2 + Math.cos(state.t * 0.09 + i) * 60;
      const g = ctx.createRadialGradient(cx, cy, 0, cx, cy, 260);
      g.addColorStop(0, 'rgba(120, 230, 255, 0.08)');
      g.addColorStop(1, 'rgba(120, 230, 255, 0)');
      ctx.fillStyle = g;
      ctx.fillRect(0, 0, W, H);
    }
  }

  function drawParticles() {
    for (const p of state.particles) {
      ctx.fillStyle = `rgba(170, 230, 255, ${p.a * (0.6 + Math.sin(p.wobble * 2) * 0.4)})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawJelly(j) {
    const pulse = j.pulse;
    // pulse shape: squash = 1 near start, rebound over time
    const squash = 1 - Math.exp(-pulse * 4); // 0 → 1
    const contract = Math.max(0, Math.min(1, 1 - (1 - pulse) * (1 - pulse) * 1.4));
    const bellWidth = j.size * j.bellW * (1 + contract * 0.18 - squash * 0.12);
    const bellHeight = j.size * j.bellH * (1 - contract * 0.22 + squash * 0.16);
    const glow = 0.4 + contract * 0.7 + j.glowBoost;

    ctx.save();
    ctx.translate(j.x, j.y);

    // soft underglow
    const underR = bellWidth * 1.6;
    const underG = ctx.createRadialGradient(0, 0, 0, 0, 0, underR);
    underG.addColorStop(0, `hsla(${j.hue + j.hueShift}, ${j.sat}%, ${j.light}%, ${0.35 * glow})`);
    underG.addColorStop(0.5, `hsla(${j.hue + j.hueShift + 20}, ${j.sat}%, ${j.light - 10}%, ${0.12 * glow})`);
    underG.addColorStop(1, `hsla(${j.hue}, ${j.sat}%, ${j.light}%, 0)`);
    ctx.fillStyle = underG;
    ctx.beginPath();
    ctx.arc(0, 0, underR, 0, Math.PI * 2);
    ctx.fill();

    // tentacles — draw below
    drawTentacles(j, bellWidth, bellHeight, glow);

    // bell body
    ctx.shadowColor = `hsla(${j.hue + j.hueShift}, ${j.sat}%, ${j.light + 5}%, 0.8)`;
    ctx.shadowBlur = 24 + glow * 12;

    const bellGrad = ctx.createRadialGradient(0, -bellHeight * 0.2, 0, 0, 0, bellWidth);
    bellGrad.addColorStop(0, `hsla(${j.hue + j.hueShift}, ${j.sat}%, ${Math.min(92, j.light + 22)}%, ${0.9 * glow})`);
    bellGrad.addColorStop(0.55, `hsla(${j.hue + j.hueShift - 10}, ${j.sat}%, ${j.light}%, ${0.55 * glow})`);
    bellGrad.addColorStop(1, `hsla(${j.hue + j.hueShift}, ${j.sat}%, ${j.light - 15}%, 0.0)`);
    ctx.fillStyle = bellGrad;
    ctx.beginPath();
    // top half of a teardrop / dome
    ctx.ellipse(0, 0, bellWidth, bellHeight, 0, Math.PI, Math.PI * 2);
    // flat-ish underside with slight wave
    const seg = 12;
    for (let i = 0; i <= seg; i++) {
      const t = i / seg;
      const a = Math.PI * 2 + t * Math.PI - Math.PI; // 0 → PI going through bottom
      const x = Math.cos(a) * bellWidth;
      const wobble = Math.sin(state.t * 3 + t * 6 + j.phase) * 2;
      const y = Math.sin(a) * bellHeight * 0.28 + wobble;
      ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.fill();

    // highlight arc
    ctx.shadowBlur = 0;
    ctx.strokeStyle = `hsla(${j.hue + j.hueShift}, 100%, 90%, ${0.5 * glow})`;
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.ellipse(0, -bellHeight * 0.15, bellWidth * 0.55, bellHeight * 0.4, 0, Math.PI * 1.1, Math.PI * 1.9);
    ctx.stroke();

    // inner organs — 4 vertical ribbons
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.strokeStyle = `hsla(${j.hue + j.hueShift + 20}, 100%, 75%, ${0.5 * glow})`;
    ctx.lineWidth = 1.5;
    for (let i = 0; i < 4; i++) {
      const x = ((i / 3) - 0.5) * bellWidth * 0.7;
      ctx.beginPath();
      ctx.moveTo(x, -bellHeight * 0.9);
      ctx.quadraticCurveTo(x * 0.6, -bellHeight * 0.3, x, bellHeight * 0.15);
      ctx.stroke();
    }
    ctx.restore();

    // frill along underside
    ctx.strokeStyle = `hsla(${j.hue + j.hueShift}, ${j.sat}%, 80%, ${0.5 * glow})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    for (let i = 0; i < j.frills; i++) {
      const t = i / (j.frills - 1);
      const x = (t - 0.5) * bellWidth * 1.95;
      const y = bellHeight * 0.2 + Math.sin(state.t * 4 + i + j.phase) * 3;
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();

    ctx.restore();
  }

  function drawTentacles(j, bellW, bellH, glow) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (let t = 0; t < j.tentacles; t++) {
      const off = ((t / (j.tentacles - 1)) - 0.5) * bellW * 1.5;
      const baseY = bellH * 0.2;
      const len = j.size * (1.6 + Math.random() * 0.01 + t * 0.02);
      const wavePhase = j.tentaclePhase + t * 0.6;
      ctx.strokeStyle = `hsla(${j.hue + j.hueShift + t * 4}, ${j.sat}%, ${j.light + 5}%, ${0.55 * glow})`;
      ctx.lineWidth = 1 + (t % 3 === 0 ? 1 : 0);
      ctx.shadowColor = `hsla(${j.hue + j.hueShift}, 100%, 75%, 0.7)`;
      ctx.shadowBlur = 8 + glow * 6;
      ctx.beginPath();
      ctx.moveTo(off, baseY);
      const segments = 14;
      for (let i = 1; i <= segments; i++) {
        const k = i / segments;
        const sway = Math.sin(wavePhase + k * 3.4) * (10 + k * 20) * (1 - k * 0.3);
        const x = off + sway + Math.sin(wavePhase * 0.7 + k * 6 + t) * 3;
        const y = baseY + k * len * (1 + (j.pulse < 0.4 ? j.pulse * 0.2 : 0));
        ctx.lineTo(x, y);
      }
      ctx.stroke();
    }
    // a few oral arms: thicker, frilly
    const arms = 3 + (j.tentacles % 3);
    for (let a = 0; a < arms; a++) {
      const off = ((a / (arms - 1)) - 0.5) * bellW * 0.7;
      ctx.strokeStyle = `hsla(${j.hue + j.hueShift - 15}, ${j.sat}%, 70%, ${0.45 * glow})`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(off, bellH * 0.15);
      const segs = 8;
      for (let i = 1; i <= segs; i++) {
        const k = i / segs;
        const sway = Math.sin(j.tentaclePhase * 0.6 + k * 2 + a) * 14 * k;
        ctx.lineTo(off + sway, bellH * 0.15 + k * j.size * 0.9);
      }
      ctx.stroke();
    }
    ctx.restore();
  }

  function drawRipples() {
    for (const r of state.ripples) {
      const a = 1 - r.age / r.life;
      ctx.strokeStyle = `rgba(180, 240, 255, ${a * 0.35})`;
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  function drawBubbles() {
    for (const b of state.bubbles) {
      const a = 1 - b.age / b.life;
      ctx.fillStyle = `rgba(200, 240, 255, ${a * 0.5})`;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = `rgba(255,255,255,${a * 0.4})`;
      ctx.lineWidth = 0.6;
      ctx.stroke();
    }
  }

  function draw() {
    // trail effect: translucent overlay for slight motion smear
    ctx.fillStyle = 'rgba(2, 4, 20, 0.22)';
    ctx.fillRect(0, 0, W, H);
    drawBackdrop();
    drawParticles();
    drawRipples();
    drawBubbles();
    // sort jellies by y for depth
    const sorted = [...state.jellies].sort((a, b) => a.size - b.size);
    for (const j of sorted) drawJelly(j);
  }

  // Loop
  let last = performance.now();
  function loop(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    step(dt);
    draw();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
