<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hall of Fame · sloppy.live</title>
  <link rel="icon" href="https://emojicdn.elk.sh/🏆">
  <meta name="description" content="Lifetime leaderboard of every chatter, contributor and ghost who shaped sloppy.live.">
  <meta property="og:title" content="Hall of Fame · sloppy.live">
  <meta property="og:description" content="Lifetime leaderboard of every chatter, contributor and ghost who shaped sloppy.live.">
  <meta property="og:image" content="https://image.pollinations.ai/prompt/marble%20trophy%20hall%20brutalist%20gold%20laurels%20black%20pedestal%20dramatic%20rim%20light%20stone%20engraved%20names?width=1200&height=630&nologo=true">
  <meta property="og:url" content="https://sloppy.live/hall-of-fame">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&family=Cormorant+Garamond:ital,wght@1,400;1,600&family=JetBrains+Mono:wght@400;500;700&display=swap');

    :root {
      --bg: #0a0908;
      --slab: #1a1714;
      --slab-2: #221d18;
      --marble: #f1e9d7;
      --ink: #f5edd9;
      --dim: #8a7f6e;
      --line: #2c2620;
      --gold: #e9c46a;
      --gold-bright: #ffd97e;
      --gold-deep: #b3853f;
      --laurel: #6e8b58;
      --decay: #c44545;
      --hot: #ff7a5e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 100%; }
    body {
      min-height: 100vh;
      background:
        radial-gradient(900px 600px at 50% -120px, rgba(233,196,106,0.10), transparent 70%),
        radial-gradient(700px 500px at 8% 100%, rgba(110,139,88,0.04), transparent 70%),
        var(--bg);
      color: var(--ink);
      font-family: 'JetBrains Mono', monospace;
    }

    .shell {
      max-width: 80rem;
      margin: 0 auto;
      padding: 3.5rem 1.4rem 6rem;
    }

    .masthead {
      position: relative;
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(233,196,106,0.06), transparent 60%),
        linear-gradient(165deg, var(--slab), var(--slab-2));
      padding: 2.2rem 1.8rem 1.8rem;
      box-shadow: 0 22px 60px rgba(0,0,0,0.45), inset 0 1px 0 rgba(233,196,106,0.05);
    }
    .masthead::before, .masthead::after {
      content: '';
      position: absolute;
      width: 88px;
      height: 88px;
      top: 8px;
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      opacity: 0.45;
      pointer-events: none;
      filter: drop-shadow(0 0 8px rgba(233,196,106,0.4));
    }
    .masthead::before { left: 16px;  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><path fill='%23e9c46a' d='M32 5 L36 22 L54 22 L40 32 L46 50 L32 39 L18 50 L24 32 L10 22 L28 22 Z'/></svg>"); }
    .masthead::after  { right: 16px; background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><path fill='%23e9c46a' d='M32 5 L36 22 L54 22 L40 32 L46 50 L32 39 L18 50 L24 32 L10 22 L28 22 Z'/></svg>"); }

    .crumbs {
      font-size: 0.7rem;
      letter-spacing: 0.3em;
      color: var(--dim);
      text-transform: uppercase;
      margin-bottom: 0.85rem;
      text-align: center;
    }
    .crumbs .now { color: var(--gold); }

    h1.title {
      font-family: 'Cinzel', serif;
      font-weight: 900;
      font-size: clamp(2.4rem, 7vw, 4.4rem);
      letter-spacing: 0.12em;
      text-align: center;
      color: var(--gold);
      text-shadow:
        0 0 30px rgba(233,196,106,0.25),
        0 2px 0 #6a4f1c,
        0 4px 0 #3b2a0c;
      line-height: 1.05;
    }
    h1.title .dot { color: var(--marble); }
    .tag {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      text-align: center;
      color: var(--marble);
      opacity: 0.78;
      margin-top: 0.5rem;
      font-size: clamp(1rem, 2.4vw, 1.3rem);
    }
    .ribbon {
      margin-top: 1.4rem;
      text-align: center;
      color: var(--dim);
      font-size: 0.68rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
    }
    .ribbon b { color: var(--gold); font-weight: 700; }
    .ribbon .sep { margin: 0 0.6rem; color: var(--line); }

    /* search + sort */
    .toolbar {
      margin-top: 1.6rem;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.6rem;
    }
    .searchbox {
      display: flex;
      align-items: center;
      background: #050403;
      border: 1px solid var(--line);
      transition: border-color 140ms, box-shadow 140ms;
    }
    .searchbox:focus-within {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(233,196,106,0.15), 0 0 24px rgba(233,196,106,0.18);
    }
    .searchbox .icon {
      width: 2.6rem;
      text-align: center;
      color: var(--gold);
      font-size: 1rem;
    }
    #search {
      flex: 1;
      min-width: 0;
      padding: 0.95rem 0.8rem 0.95rem 0;
      background: transparent;
      border: 0;
      color: var(--ink);
      font: inherit;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
      outline: none;
      min-height: 2.75rem;
    }
    #search::placeholder { color: #4a4338; }
    .clearbtn {
      background: transparent;
      border: 0;
      color: var(--dim);
      font: inherit;
      font-size: 0.95rem;
      padding: 0 0.85rem;
      cursor: pointer;
    }
    .clearbtn:hover { color: var(--gold); }
    .clearbtn:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }

    .sortbox {
      display: inline-flex;
      align-items: stretch;
      border: 1px solid var(--line);
      background: #050403;
    }
    .sortbox label {
      display: inline-flex;
      align-items: center;
      padding: 0 0.85rem;
      color: var(--dim);
      font-size: 0.7rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      border-right: 1px solid var(--line);
    }
    .sortbox select {
      background: transparent;
      border: 0;
      color: var(--gold);
      font: inherit;
      font-size: 0.85rem;
      padding: 0 1.6rem 0 0.8rem;
      cursor: pointer;
      appearance: none;
      min-height: 2.75rem;
    }
    .sortbox::after {
      content: '▾';
      color: var(--gold);
      padding-right: 0.8rem;
      align-self: center;
      pointer-events: none;
      margin-left: -1.4rem;
    }
    .sortbox:focus-within {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(233,196,106,0.15);
    }

    .source-pills {
      margin-top: 0.8rem;
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }
    .source-pills button {
      background: transparent;
      border: 1px solid var(--line);
      color: var(--dim);
      font: inherit;
      font-size: 0.7rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      padding: 0.45rem 0.85rem;
      cursor: pointer;
      min-height: 2.4rem;
      transition: color 140ms, border-color 140ms, background 140ms;
    }
    .source-pills button:hover { color: var(--gold); border-color: var(--gold-deep); }
    .source-pills button[aria-pressed="true"] {
      color: var(--gold);
      border-color: var(--gold);
      background: rgba(233,196,106,0.06);
    }
    .source-pills button:focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 2px;
    }

    /* leaderboard */
    .legend {
      margin-top: 1.6rem;
      font-size: 0.66rem;
      letter-spacing: 0.18em;
      color: var(--dim);
      text-transform: uppercase;
      display: grid;
      grid-template-columns: 4rem 1fr 7rem 7rem 9rem 5rem 7rem;
      gap: 0.8rem;
      padding: 0 0.6rem;
    }
    .legend span:nth-child(n+3) { text-align: right; }
    .legend span.spark { text-align: center; }

    .board {
      margin-top: 0.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
    }

    .row {
      display: grid;
      grid-template-columns: 4rem 1fr 7rem 7rem 9rem 5rem 7rem;
      gap: 0.8rem;
      align-items: center;
      padding: 0.85rem 0.95rem;
      background: linear-gradient(180deg, rgba(233,196,106,0.02), rgba(0,0,0,0.20));
      border: 1px solid var(--line);
      transition: background 120ms, border-color 120ms, transform 120ms;
      position: relative;
    }
    .row:hover {
      background: linear-gradient(180deg, rgba(233,196,106,0.08), rgba(0,0,0,0.22));
      border-color: var(--gold-deep);
    }
    .row.gold {
      background:
        linear-gradient(180deg, rgba(233,196,106,0.14), rgba(0,0,0,0.20)),
        linear-gradient(90deg, rgba(255,217,126,0.06), transparent 80%);
      border-color: var(--gold);
      box-shadow: 0 0 22px rgba(233,196,106,0.18), inset 0 1px 0 rgba(255,217,126,0.18);
    }
    .row.silver { border-color: rgba(220,220,220,0.55); }
    .row.bronze { border-color: rgba(196,118,62,0.55); }

    .rank {
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 1.5rem;
      color: var(--gold);
      text-align: center;
      letter-spacing: 0.02em;
    }
    .rank.crown { font-size: 2rem; }
    .rank.crown .ord { display: block; font-size: 0.55rem; color: var(--dim); letter-spacing: 0.16em; margin-top: 0.1rem;}

    .who { min-width: 0; }
    .who .name {
      font-family: 'Cinzel', serif;
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--marble);
      letter-spacing: 0.04em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .row.gold .who .name { color: var(--gold-bright); text-shadow: 0 0 12px rgba(255,217,126,0.45); }
    .who .meta {
      margin-top: 0.25rem;
      font-size: 0.66rem;
      letter-spacing: 0.16em;
      color: var(--dim);
      text-transform: uppercase;
      display: flex;
      gap: 0.6rem;
      flex-wrap: wrap;
      align-items: center;
    }
    .badge {
      display: inline-block;
      padding: 0.1rem 0.45rem;
      font-size: 0.6rem;
      letter-spacing: 0.18em;
      border: 1px solid var(--line);
      color: var(--dim);
    }
    .badge.chat { color: #ff8fb8; border-color: rgba(255,143,184,0.4); background: rgba(255,143,184,0.08); }
    .badge.git  { color: var(--gold); border-color: rgba(233,196,106,0.4); background: rgba(233,196,106,0.08); }
    .badge.both { color: var(--marble); border-color: rgba(241,233,215,0.35); background: rgba(241,233,215,0.06); }

    .num {
      font-family: 'JetBrains Mono', monospace;
      font-variant-numeric: tabular-nums;
      text-align: right;
      font-weight: 500;
    }
    .num.lifetime { font-size: 1.6rem; color: var(--gold); letter-spacing: 0.02em; }
    .row.gold .num.lifetime { color: var(--gold-bright); text-shadow: 0 0 10px rgba(255,217,126,0.4); }
    .num.current  { font-size: 1.2rem; color: var(--marble); }
    .num.current  .pct { font-size: 0.6rem; color: var(--dim); margin-left: 0.3rem; letter-spacing: 0.08em; }
    .num.apps { font-size: 0.95rem; color: var(--laurel); }

    .spark {
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      height: 36px;
      gap: 1px;
    }
    .spark .bar {
      width: 4px;
      background: var(--gold-deep);
      opacity: 0.55;
      border-radius: 1px 1px 0 0;
      transition: background 120ms, opacity 120ms;
    }
    .spark .bar.recent { background: var(--gold-bright); opacity: 0.95; }
    .spark .bar.zero { background: var(--line); height: 1px !important; opacity: 0.4; }

    .when {
      text-align: right;
      font-size: 0.75rem;
      color: var(--dim);
      letter-spacing: 0.04em;
    }
    .when b { color: var(--marble); font-weight: 500; }
    .when.cold b { color: var(--decay); }

    /* expanded detail under each row */
    .detail {
      grid-column: 1 / -1;
      margin-top: 0.6rem;
      padding-top: 0.85rem;
      border-top: 1px dashed var(--line);
      display: none;
      font-size: 0.78rem;
      color: var(--dim);
      letter-spacing: 0.06em;
    }
    .row.open .detail { display: block; }
    .row .openBtn {
      position: absolute;
      top: 0.4rem;
      right: 0.4rem;
      background: transparent;
      border: 0;
      color: var(--dim);
      cursor: pointer;
      font: inherit;
      font-size: 0.7rem;
      letter-spacing: 0.18em;
      padding: 0.3rem 0.5rem;
    }
    .row .openBtn:hover { color: var(--gold); }
    .row.open .openBtn { color: var(--gold); }

    .detail h4 {
      font-family: 'Cinzel', serif;
      font-size: 0.85rem;
      color: var(--gold);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 0.6rem;
    }
    .detail .appchips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.3rem;
    }
    .detail .appchips a {
      background: rgba(110,139,88,0.10);
      border: 1px solid rgba(110,139,88,0.3);
      color: var(--laurel);
      padding: 0.18rem 0.55rem;
      font-size: 0.7rem;
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: background 120ms, color 120ms;
    }
    .detail .appchips a:hover {
      background: rgba(110,139,88,0.25);
      color: #b9d49f;
    }
    .detail .weeks {
      margin-top: 0.85rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.68rem;
      color: var(--dim);
    }
    .detail .weeks code { color: var(--marble); }

    mark {
      background: rgba(233,196,106,0.25);
      color: var(--gold-bright);
      padding: 0 1px;
    }

    .empty {
      padding: 4rem 1rem;
      text-align: center;
      color: var(--dim);
      border: 1px dashed var(--line);
      margin-top: 2rem;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.15rem;
    }

    .errbox {
      margin-top: 2rem;
      padding: 1rem;
      border: 1px solid var(--hot);
      color: var(--hot);
      background: rgba(255,122,94,0.08);
      font-size: 0.82rem;
    }

    .footer {
      margin-top: 3rem;
      text-align: center;
      color: var(--dim);
      font-size: 0.62rem;
      letter-spacing: 0.32em;
      text-transform: uppercase;
    }
    .footer b { color: var(--gold); font-weight: 500; }

    @media (max-width: 820px) {
      .shell { padding: 1.8rem 0.8rem 4rem; }
      .masthead { padding: 1.6rem 1rem 1.2rem; }
      .masthead::before, .masthead::after { display: none; }
      .toolbar { grid-template-columns: 1fr; }
      .legend { display: none; }
      .row {
        grid-template-columns: 3rem 1fr;
        gap: 0.5rem 0.8rem;
      }
      .rank { grid-row: span 4; }
      .num, .spark, .when {
        text-align: left;
        justify-content: flex-start;
      }
      .num.lifetime::before { content: 'LIFETIME · '; font-size: 0.55rem; color: var(--dim); letter-spacing: 0.18em; text-transform: uppercase; margin-right: 0.3rem; }
      .num.current::before  { content: 'CURRENT · ';  font-size: 0.55rem; color: var(--dim); letter-spacing: 0.18em; text-transform: uppercase; margin-right: 0.3rem; }
      .num.apps::before     { content: 'APPS · ';     font-size: 0.55rem; color: var(--dim); letter-spacing: 0.18em; text-transform: uppercase; margin-right: 0.3rem; }
      .when::before         { content: 'LAST · ';     font-size: 0.55rem; color: var(--dim); letter-spacing: 0.18em; text-transform: uppercase; margin-right: 0.3rem; }
      .spark::before        { content: 'TREND · ';    font-size: 0.55rem; color: var(--dim); letter-spacing: 0.18em; text-transform: uppercase; margin-right: 0.3rem; align-self: center; }
      .spark { height: 28px; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="masthead" role="banner">
      <div class="crumbs">sloppy.live <span class="now">/ hall-of-fame</span></div>
      <h1 class="title">HALL <span class="dot">·</span> OF <span class="dot">·</span> FAME</h1>
      <p class="tag">the legends behind every weird little app on this site</p>
      <div class="ribbon" id="ribbon">loading…</div>

      <div class="toolbar" role="search">
        <label for="search" style="position:absolute;left:-9999px">Search the hall</label>
        <div class="searchbox">
          <span class="icon" aria-hidden="true">⌕</span>
          <input id="search" type="search" placeholder="search the hall by name… (try `zennlogic`)" autocomplete="off" spellcheck="false" autofocus>
          <button id="clearbtn" class="clearbtn" type="button" title="clear">esc</button>
        </div>
        <div class="sortbox">
          <label for="sortSel">sort</label>
          <select id="sortSel">
            <option value="lifetime">Lifetime points</option>
            <option value="current">Current (decayed)</option>
            <option value="decay">Decay rate</option>
            <option value="apps">Apps touched</option>
            <option value="last">Most recent</option>
          </select>
        </div>
      </div>

      <div class="source-pills" id="sourcePills" role="group" aria-label="Filter by source">
        <button type="button" data-src="all"  aria-pressed="true">All</button>
        <button type="button" data-src="chat" aria-pressed="false">Chat handles</button>
        <button type="button" data-src="git"  aria-pressed="false">Git authors</button>
        <button type="button" data-src="both" aria-pressed="false">Both</button>
      </div>
    </header>

    <div class="legend" aria-hidden="true">
      <span>RANK</span>
      <span>HONOREE</span>
      <span>LIFETIME</span>
      <span>CURRENT</span>
      <span class="spark">26-WEEK TREND</span>
      <span>APPS</span>
      <span>LAST</span>
    </div>

    <section class="board" id="board" role="list">
      <div class="empty">loading the hall…</div>
    </section>

    <div class="footer">
      <span>scored over the last <b id="window">365</b> days</span>
      <span style="margin:0 .8rem;color:var(--line)">·</span>
      <span>half-life · <b id="hlife">21</b> days</span>
      <span style="margin:0 .8rem;color:var(--line)">·</span>
      <span>baked <b id="generated">—</b></span>
    </div>
  </main>

  <script>
    const $ = (s, el = document) => el.querySelector(s);
    const els = {
      ribbon: $('#ribbon'),
      board: $('#board'),
      search: $('#search'),
      clearbtn: $('#clearbtn'),
      sortSel: $('#sortSel'),
      sourcePills: $('#sourcePills'),
      hlife: $('#hlife'),
      window: $('#window'),
      generated: $('#generated'),
    };

    let DATA = null;
    let STATE = { q: '', sort: 'lifetime', source: 'all' };

    function esc(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
      }[c]));
    }
    function highlight(text, q) {
      if (!q) return esc(text);
      const safe = esc(text);
      const re = new RegExp('(' + q.replace(/[-/\\^$*+?.()|[\]{}]/g,'\\$&') + ')', 'ig');
      return safe.replace(re, '<mark>$1</mark>');
    }
    function relTime(iso) {
      if (!iso) return '—';
      const t = new Date(iso).getTime();
      if (!isFinite(t)) return '—';
      const diff = (Date.now() - t) / 1000;
      if (diff < 60) return 'just now';
      if (diff < 3600) return Math.floor(diff/60) + 'm ago';
      if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
      if (diff < 86400*30) return Math.floor(diff/86400) + 'd ago';
      if (diff < 86400*365) return Math.floor(diff/(86400*30)) + 'mo ago';
      return Math.floor(diff/(86400*365)) + 'y ago';
    }

    function sortFn(sort) {
      switch (sort) {
        case 'current': return (a,b) => b.current - a.current || b.lifetime - a.lifetime;
        case 'decay':   return (a,b) => b.decay_pct - a.decay_pct || a.current - b.current;
        case 'apps':    return (a,b) => b.apps_count - a.apps_count || b.lifetime - a.lifetime;
        case 'last':    return (a,b) => new Date(b.last_active_iso) - new Date(a.last_active_iso);
        default:        return (a,b) => b.lifetime - a.lifetime || b.current - a.current;
      }
    }

    function matches(u, q, source) {
      if (source !== 'all' && u.source !== source) return false;
      if (!q) return true;
      const hay = (u.name + ' ' + (u.apps || []).join(' ')).toLowerCase();
      return hay.includes(q);
    }

    function spark(weeks) {
      // weeks[0] = this week (newest); render oldest → newest, left → right
      const w = weeks.slice().reverse();
      const peak = Math.max(1, ...w);
      const N = w.length;
      return '<span class="spark" aria-hidden="true">' + w.map((v, i) => {
        const h = v <= 0 ? 1 : Math.max(3, Math.round((v / peak) * 32));
        const cls = (i >= N - 4) ? 'bar recent' : (v <= 0 ? 'bar zero' : 'bar');
        return `<span class="${cls}" style="height:${h}px" title="week -${N-1-i}: ${v}"></span>`;
      }).join('') + '</span>';
    }

    function render() {
      if (!DATA) return;
      const q = STATE.q.trim().toLowerCase();
      const rows = DATA.users
        .filter(u => matches(u, q, STATE.source))
        .sort(sortFn(STATE.sort));

      // Stats ribbon
      els.ribbon.innerHTML = `
        <b>${DATA.total_users.toLocaleString()}</b> honorees
        <span class="sep">·</span>
        <b>${DATA.total_commits.toLocaleString()}</b> lifetime points
        <span class="sep">·</span>
        ${q ? `<b>${rows.length.toLocaleString()}</b> shown ${q ? `for "${esc(q)}"` : ''}` : `showing all`}
      `;

      if (rows.length === 0) {
        els.board.innerHTML = `<div class="empty">no one matches "${esc(q)}". the marble is silent.</div>`;
        return;
      }

      els.board.innerHTML = rows.map((u, i) => {
        const rank = i + 1;
        const rankCls = rank === 1 ? 'gold' : rank === 2 ? 'silver' : rank === 3 ? 'bronze' : '';
        const medal = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : '';
        const rankHtml = medal
          ? `<div class="rank crown">${medal}<span class="ord">#${rank}</span></div>`
          : `<div class="rank">#${rank}</div>`;
        const apps = (u.apps || []).slice(0, 30);
        const cold = (u.days_since_last !== null && u.days_since_last > 60);
        return `
          <article class="row ${rankCls}" role="listitem" data-i="${i}">
            ${rankHtml}
            <div class="who">
              <div class="name">${highlight(u.name, q)}</div>
              <div class="meta">
                <span class="badge ${u.source}">${u.source}</span>
                <span>${u.lifetime} pts · ${u.apps_count} apps</span>
              </div>
            </div>
            <div class="num lifetime" title="total credits over the last ${DATA.window_days} days">${u.lifetime}</div>
            <div class="num current" title="lifetime × exp(-λ × days_since_last), λ from half-life ${DATA.half_life_days}d">${u.current.toFixed(2)}<span class="pct">−${u.decay_pct}%</span></div>
            ${spark(u.weeks)}
            <div class="num apps">${u.apps_count}</div>
            <div class="when ${cold ? 'cold' : ''}"><b>${relTime(u.last_active_iso)}</b></div>
            <button class="openBtn" type="button" data-toggle aria-label="toggle detail">▾</button>
            <div class="detail">
              <h4>apps touched · ${u.apps_count}</h4>
              <div class="appchips">
                ${apps.map(s => `<a href="/${encodeURIComponent(s)}/" target="_blank" rel="noopener">${esc(s)}</a>`).join('')}
                ${u.apps_count > 30 ? `<span style="align-self:center;color:var(--dim);font-size:0.7rem">… +${u.apps_count - 30} more</span>` : ''}
              </div>
              <div class="weeks">
                weekly buckets (newest → oldest, ${DATA.week_buckets} weeks):
                <br><code>${u.weeks.join(' ')}</code>
              </div>
            </div>
          </article>`;
      }).join('');
    }

    els.board.addEventListener('click', (e) => {
      const btn = e.target.closest('[data-toggle]');
      if (!btn) return;
      const row = btn.closest('.row');
      row.classList.toggle('open');
      btn.textContent = row.classList.contains('open') ? '▴' : '▾';
    });

    let renderTimer;
    els.search.addEventListener('input', () => {
      STATE.q = els.search.value;
      clearTimeout(renderTimer);
      renderTimer = setTimeout(render, 60);
    });
    els.clearbtn.addEventListener('click', () => {
      els.search.value = '';
      STATE.q = '';
      els.search.focus();
      render();
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === '/' && document.activeElement !== els.search) {
        e.preventDefault();
        els.search.focus();
        els.search.select();
      } else if (e.key === 'Escape' && document.activeElement === els.search) {
        els.search.value = '';
        STATE.q = '';
        render();
      }
    });

    els.sortSel.addEventListener('change', () => {
      STATE.sort = els.sortSel.value;
      render();
    });

    els.sourcePills.addEventListener('click', (e) => {
      const b = e.target.closest('button[data-src]');
      if (!b) return;
      STATE.source = b.dataset.src;
      for (const x of els.sourcePills.querySelectorAll('button')) {
        x.setAttribute('aria-pressed', x === b ? 'true' : 'false');
      }
      render();
    });

    async function load() {
      try {
        const res = await fetch('/hall-of-fame/data.json', { cache: 'no-cache' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        DATA = await res.json();
        els.hlife.textContent = DATA.half_life_days;
        els.window.textContent = DATA.window_days;
        els.generated.textContent = relTime(DATA.generated_iso);
        render();
      } catch (err) {
        els.board.innerHTML = `<div class="errbox">
          <strong>the hall is dark.</strong><br>
          <span style="color:#aaa;font-size:.78rem">${esc(err.message || String(err))}</span><br>
          <span style="color:#aaa;font-size:.78rem">tried: <code>/hall-of-fame/data.json</code></span>
        </div>`;
      }
    }

    load();
  </script>
  <script src="/sloppy-header/sloppy-bar.js"></script>
</body>
</html>
