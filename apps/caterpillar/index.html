<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Caterpillar</title>
  <link rel="icon" href="https://emojicdn.elk.sh/🐛">
  <meta name="description" content="Feed a neon caterpillar until it transforms into a butterfly!">
  <meta property="og:title" content="Caterpillar">
  <meta property="og:description" content="Grow a glowing caterpillar by eating leaves, then watch it transform into a butterfly!">
  <meta property="og:url" content="https://sloppy.live/caterpillar">
  <meta property="og:image" content="https://emojicdn.elk.sh/🦋?style=apple&size=512.png">
  <meta property="og:type" content="website">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Silkscreen&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0e14; font-family: 'Fredoka', sans-serif; }
    canvas { display: block; width: 100%; height: 100%; touch-action: none; }
    #hud {
      position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
      display: flex; gap: 18px; align-items: center; z-index: 10;
      background: rgba(10,14,20,0.75); border: 1px solid rgba(0,255,136,0.25);
      border-radius: 12px; padding: 8px 18px; backdrop-filter: blur(6px);
      font-family: 'Silkscreen', monospace; font-size: 13px; color: #aaffcc;
    }
    #hud .meter-wrap {
      width: 140px; height: 14px; background: rgba(0,0,0,0.5);
      border-radius: 7px; border: 1px solid rgba(0,255,136,0.3); overflow: hidden;
    }
    #hud .meter-fill {
      height: 100%; width: 0%; border-radius: 7px; transition: width 0.3s;
      background: linear-gradient(90deg, #ff00ff, #00ffcc);
      box-shadow: 0 0 8px #00ff88;
    }
    #hud .lives { color: #ff4466; letter-spacing: 2px; }
    #hud .lvl { color: #ffcc00; }
    #instructions {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      font-family: 'Fredoka', sans-serif; font-size: 22px; color: #aaffcc;
      text-align: center; z-index: 20; pointer-events: none;
      text-shadow: 0 0 12px #00ff88; transition: opacity 1s;
    }
    #instructions .sub { font-size: 14px; color: #66cc99; margin-top: 6px; }
    #backlink {
      position: fixed; bottom: 6px; left: 8px; z-index: 30;
      font-family: 'Silkscreen', monospace; font-size: 10px;
      color: rgba(100,200,150,0.35); text-decoration: none;
    }
    #backlink:hover { color: rgba(100,200,150,0.7); }
    #joystick {
      display: none; position: fixed; bottom: 60px; left: 50%; transform: translateX(-50%);
      width: 120px; height: 120px; z-index: 15; touch-action: none;
    }
    @media (pointer: coarse) {
      #joystick { display: block; }
    }
    #overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: none; z-index: 50; background: rgba(10,14,20,0.85);
      justify-content: center; align-items: center; flex-direction: column;
      font-family: 'Fredoka', sans-serif; color: #aaffcc; text-align: center;
    }
    #overlay.show { display: flex; }
    #overlay h1 { font-size: 36px; text-shadow: 0 0 20px #00ff88; margin-bottom: 10px; }
    #overlay .stats { font-size: 16px; color: #66cc99; margin-bottom: 20px; line-height: 1.8; }
    #overlay button {
      font-family: 'Silkscreen', monospace; font-size: 16px; padding: 12px 32px;
      background: linear-gradient(135deg, #ff00ff, #00ffcc); border: none;
      border-radius: 8px; color: #0a0e14; cursor: pointer;
      box-shadow: 0 0 20px rgba(0,255,136,0.4);
    }
    #overlay button:hover { box-shadow: 0 0 30px rgba(0,255,136,0.7); }
    #gameover { color: #ff4466; }
    #gameover h1 { text-shadow: 0 0 20px #ff4466; }
  </style>
</head>
<body>
  <div id="hud">
    <span class="lvl" id="hudLevel">LV 1</span>
    <div class="meter-wrap"><div class="meter-fill" id="hudMeter"></div></div>
    <span id="hudLeaves">🍃 0</span>
    <span class="lives" id="hudLives">♥♥♥</span>
  </div>
  <div id="instructions">
    <div>Arrow Keys / WASD to Move</div>
    <div class="sub">Eat leaves to grow — transform into a butterfly!</div>
    <div class="sub" style="margin-top:4px">Touch: use the joystick</div>
  </div>
  <div id="joystick"></div>
  <canvas id="c"></canvas>
  <div id="overlay">
    <h1>Level Complete!</h1>
    <div class="stats" id="overlayStats"></div>
    <button id="nextBtn">Next Level</button>
  </div>
  <div id="overlay" class="show" style="display:none" id="gameover">
  </div>
  <a id="backlink" href="https://sloppy.live" target="_blank">sloppy.live</a>

<script>
(function(){
"use strict";

var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var W, H;
var keys = {};
var joyDir = {x:0, y:0};
var gameState = 'playing'; // playing, cocoon, butterfly, levelComplete, gameover
var level = 1;
var lives = 3;
var leavesEaten = 0;
var fullness = 0;
var startTime = Date.now();
var instructionsEl = document.getElementById('instructions');
var instructionsTimer = 3000;
var dt = 0;
var lastTime = 0;

// caterpillar
var head = {x:0, y:0, angle:0, speed: 2.2};
var segments = [];
var segBaseRadius = 10;
var segCount = 5;
var maxFullness = 100;
var leavesForLevel = 10;

// leaves
var leaves = [];
var leafParticles = [];

// thorns (level 2+)
var thorns = [];

// birds (level 2+)
var birds = [];

// fireflies
var fireflies = [];

// butterfly
var butterfly = {x:0, y:0, angle:0, wingPhase:0, timer:0, particles:[], active:false};

// cocoon
var cocoon = {x:0, y:0, timer:0, phase:0, active:false, burstDone:false, burstParticles:[]};

// grass blades
var grassBlades = [];

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

function initLevel(){
  gameState = 'playing';
  fullness = 0;
  leavesEaten = 0;
  startTime = Date.now();
  leavesForLevel = 8 + level * 2;

  head.x = W/2;
  head.y = H/2;
  head.angle = 0;
  head.speed = 2.2 + level * 0.15;

  segments = [];
  for(var i=0; i<segCount; i++){
    segments.push({x: head.x - (i+1)*16, y: head.y, radius: segBaseRadius - i*0.3, vx:0, vy:0});
  }

  leaves = [];
  for(var i=0; i<Math.min(5 + level, 12); i++) spawnLeaf();

  thorns = [];
  birds = [];
  if(level >= 2){
    var thornCount = Math.min(3 + (level-2)*2, 15);
    for(var i=0; i<thornCount; i++){
      thorns.push({x: 60 + Math.random()*(W-120), y: 80 + Math.random()*(H-160), radius: 12+Math.random()*6});
    }
    var birdCount = Math.min(1 + Math.floor((level-2)/2), 5);
    for(var i=0; i<birdCount; i++){
      var bx = Math.random()*W;
      var by = 60 + Math.random()*(H-160);
      birds.push({x:bx, y:by, startX:bx, startY:by, rangeX: 80+Math.random()*150, rangeY: 30+Math.random()*60, phase:Math.random()*Math.PI*2, speed:0.5+Math.random()*0.8, wingPhase:0});
    }
  }

  fireflies = [];
  for(var i=0; i<20; i++){
    fireflies.push({x:Math.random()*W, y:Math.random()*H, phase:Math.random()*Math.PI*2, speed:0.2+Math.random()*0.3, brightness:Math.random()});
  }

  grassBlades = [];
  for(var i=0; i<80; i++){
    grassBlades.push({x:Math.random()*W, y:H - Math.random()*40, h:15+Math.random()*25, sway:Math.random()*Math.PI*2});
  }

  leafParticles = [];
  butterfly.active = false;
  cocoon.active = false;
  cocoon.burstDone = false;
  cocoon.burstParticles = [];

  updateHUD();
}

function spawnLeaf(){
  leaves.push({
    x: 40 + Math.random()*(W-80),
    y: 60 + Math.random()*(H-140),
    size: 10 + Math.random()*6,
    glow: Math.random()*Math.PI*2
  });
}

function updateHUD(){
  document.getElementById('hudLevel').textContent = 'LV ' + level;
  document.getElementById('hudMeter').style.width = Math.min(fullness,100) + '%';
  document.getElementById('hudLeaves').textContent = '🍃 ' + leavesEaten;
  var h = '';
  for(var i=0;i<3;i++) h += i<lives ? '♥' : '♡';
  document.getElementById('hudLives').textContent = h;
}

// input
window.addEventListener('keydown', function(e){ keys[e.key.toLowerCase()] = true; });
window.addEventListener('keyup', function(e){ keys[e.key.toLowerCase()] = false; });

// joystick
var joystickEl = document.getElementById('joystick');
var joystickActive = false;
var joystickCenter = {x:0,y:0};

joystickEl.addEventListener('touchstart', function(e){
  e.preventDefault();
  joystickActive = true;
  var r = joystickEl.getBoundingClientRect();
  joystickCenter.x = r.left + r.width/2;
  joystickCenter.y = r.top + r.height/2;
  handleJoystickMove(e);
}, {passive:false});

joystickEl.addEventListener('touchmove', function(e){
  e.preventDefault();
  if(joystickActive) handleJoystickMove(e);
}, {passive:false});

joystickEl.addEventListener('touchend', function(e){
  e.preventDefault();
  joystickActive = false;
  joyDir.x = 0; joyDir.y = 0;
}, {passive:false});

function handleJoystickMove(e){
  var t = e.touches[0];
  var dx = t.clientX - joystickCenter.x;
  var dy = t.clientY - joystickCenter.y;
  var dist = Math.sqrt(dx*dx+dy*dy);
  var maxDist = 50;
  if(dist > 5){
    joyDir.x = dx / Math.max(dist, maxDist);
    joyDir.y = dy / Math.max(dist, maxDist);
  } else {
    joyDir.x = 0; joyDir.y = 0;
  }
}

// also support swipe on canvas for mobile
var touchStart = null;
canvas.addEventListener('touchstart', function(e){
  if(e.target === joystickEl) return;
  var t = e.touches[0];
  touchStart = {x:t.clientX, y:t.clientY};
}, {passive:true});
canvas.addEventListener('touchmove', function(e){
  if(!touchStart) return;
  var t = e.touches[0];
  var dx = t.clientX - touchStart.x;
  var dy = t.clientY - touchStart.y;
  var dist = Math.sqrt(dx*dx+dy*dy);
  if(dist > 10){
    joyDir.x = dx/dist;
    joyDir.y = dy/dist;
  }
}, {passive:true});
canvas.addEventListener('touchend', function(){
  touchStart = null;
  if(!joystickActive){ joyDir.x = 0; joyDir.y = 0; }
}, {passive:true});

function getInput(){
  var dx = 0, dy = 0;
  if(keys['arrowleft'] || keys['a']) dx -= 1;
  if(keys['arrowright'] || keys['d']) dx += 1;
  if(keys['arrowup'] || keys['w']) dy -= 1;
  if(keys['arrowdown'] || keys['s']) dy += 1;
  dx += joyDir.x;
  dy += joyDir.y;
  var len = Math.sqrt(dx*dx+dy*dy);
  if(len > 1){ dx/=len; dy/=len; }
  return {x:dx, y:dy};
}

function hsl(h,s,l,a){
  if(a !== undefined) return 'hsla('+h+','+s+'%,'+l+'%,'+a+')';
  return 'hsl('+h+','+s+'%,'+l+'%)';
}

function dist(a,b){ return Math.sqrt((a.x-b.x)*(a.x-b.x)+(a.y-b.y)*(a.y-b.y)); }

function drawGrass(time){
  for(var i=0; i<grassBlades.length; i++){
    var g = grassBlades[i];
    var sway = Math.sin(time*0.001 + g.sway)*4;
    ctx.strokeStyle = 'rgba(30,80,40,0.4)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(g.x, g.y);
    ctx.quadraticCurveTo(g.x + sway, g.y - g.h*0.6, g.x + sway*1.5, g.y - g.h);
    ctx.stroke();
  }
}

function drawFireflies(time){
  for(var i=0; i<fireflies.length; i++){
    var f = fireflies[i];
    f.x += Math.sin(time*0.0008 + f.phase)*f.speed;
    f.y += Math.cos(time*0.0006 + f.phase*1.3)*f.speed*0.6;
    if(f.x < 0) f.x = W;
    if(f.x > W) f.x = 0;
    if(f.y < 0) f.y = H;
    if(f.y > H) f.y = 0;
    var b = 0.3 + 0.7*Math.abs(Math.sin(time*0.002 + f.phase));
    ctx.beginPath();
    ctx.arc(f.x, f.y, 2, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,100,' + (b*0.7) + ')';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(f.x, f.y, 5, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,80,' + (b*0.15) + ')';
    ctx.fill();
  }
}

function drawLeaf(l, time){
  var glow = 0.6 + 0.4*Math.sin(time*0.003 + l.glow);
  ctx.save();
  ctx.translate(l.x, l.y);
  ctx.rotate(Math.sin(time*0.001 + l.glow)*0.15);
  // glow
  ctx.shadowColor = 'rgba(0,255,100,' + glow*0.6 + ')';
  ctx.shadowBlur = 12;
  // leaf shape
  ctx.beginPath();
  ctx.moveTo(0, -l.size);
  ctx.bezierCurveTo(l.size*0.8, -l.size*0.5, l.size*0.8, l.size*0.5, 0, l.size);
  ctx.bezierCurveTo(-l.size*0.8, l.size*0.5, -l.size*0.8, -l.size*0.5, 0, -l.size);
  ctx.fillStyle = hsl(120, 80, 40 + glow*15);
  ctx.fill();
  // vein
  ctx.strokeStyle = hsl(100, 60, 55);
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, -l.size*0.8);
  ctx.lineTo(0, l.size*0.8);
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawCaterpillar(time){
  var totalSegs = segments.length;
  // body segments (draw from tail to head so head is on top)
  for(var i=totalSegs-1; i>=0; i--){
    var s = segments[i];
    var t = i / Math.max(totalSegs-1, 1);
    var hue = 300 - t * 120; // magenta(300) to cyan(180)
    var r = s.radius;
    // glow
    ctx.beginPath();
    ctx.arc(s.x, s.y, r+4, 0, Math.PI*2);
    ctx.fillStyle = hsl(hue, 100, 50, 0.15);
    ctx.fill();
    // body
    ctx.beginPath();
    ctx.arc(s.x, s.y, r, 0, Math.PI*2);
    ctx.fillStyle = hsl(hue, 90, 55);
    ctx.fill();
    ctx.strokeStyle = hsl(hue, 100, 70);
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // highlight
    ctx.beginPath();
    ctx.arc(s.x - r*0.25, s.y - r*0.3, r*0.35, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fill();
  }

  // head
  var hr = segBaseRadius + 2 + fullness*0.04;
  ctx.beginPath();
  ctx.arc(head.x, head.y, hr+5, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(255,0,200,0.15)';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(head.x, head.y, hr, 0, Math.PI*2);
  ctx.fillStyle = hsl(310, 90, 55);
  ctx.fill();
  ctx.strokeStyle = hsl(310, 100, 70);
  ctx.lineWidth = 2;
  ctx.stroke();

  // eyes
  var ex = Math.cos(head.angle);
  var ey = Math.sin(head.angle);
  for(var side=-1; side<=1; side+=2){
    var perpX = -ey * side * hr*0.45;
    var perpY = ex * side * hr*0.45;
    var eyeX = head.x + ex*hr*0.3 + perpX;
    var eyeY = head.y + ey*hr*0.3 + perpY;
    // white
    ctx.beginPath();
    ctx.arc(eyeX, eyeY, 4, 0, Math.PI*2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    // pupil
    ctx.beginPath();
    ctx.arc(eyeX + ex*1.5, eyeY + ey*1.5, 2, 0, Math.PI*2);
    ctx.fillStyle = '#111';
    ctx.fill();
  }

  // antennae
  var bounce = Math.sin(time*0.008)*4;
  for(var side=-1; side<=1; side+=2){
    var ax = head.x + ex*hr;
    var ay = head.y + ey*hr;
    var tipX = ax + ex*14 + (-ey)*side*10 + Math.sin(time*0.006+side)*bounce;
    var tipY = ay + ey*14 + ex*side*10 + Math.cos(time*0.007+side)*bounce;
    ctx.strokeStyle = hsl(310, 80, 65);
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(ax, ay);
    ctx.quadraticCurveTo(ax+ex*7+(-ey)*side*5, ay+ey*7+ex*side*5, tipX, tipY);
    ctx.stroke();
    // tip ball
    ctx.beginPath();
    ctx.arc(tipX, tipY, 2.5, 0, Math.PI*2);
    ctx.fillStyle = hsl(50, 100, 70);
    ctx.fill();
  }
}

function drawThorns(time){
  for(var i=0; i<thorns.length; i++){
    var t = thorns[i];
    ctx.save();
    ctx.translate(t.x, t.y);
    var spikes = 6;
    ctx.beginPath();
    for(var j=0; j<spikes*2; j++){
      var a = (j/(spikes*2))*Math.PI*2 - Math.PI/2;
      var r = j%2===0 ? t.radius : t.radius*0.45;
      ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r);
    }
    ctx.closePath();
    ctx.fillStyle = 'rgba(200,50,50,0.7)';
    ctx.fill();
    ctx.shadowColor = 'rgba(255,60,60,0.5)';
    ctx.shadowBlur = 8;
    ctx.strokeStyle = '#ff4444';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

function drawBirds(time){
  for(var i=0; i<birds.length; i++){
    var b = birds[i];
    b.wingPhase += 0.12;
    ctx.save();
    ctx.translate(b.x, b.y);
    var wingUp = Math.sin(b.wingPhase)*8;
    // body
    ctx.fillStyle = '#ff8844';
    ctx.beginPath();
    ctx.ellipse(0, 0, 10, 6, 0, 0, Math.PI*2);
    ctx.fill();
    // wings
    ctx.strokeStyle = '#ffaa66';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(-3, 0);
    ctx.quadraticCurveTo(-12, -8+wingUp, -18, -2+wingUp);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(3, 0);
    ctx.quadraticCurveTo(12, -8+wingUp, 18, -2+wingUp);
    ctx.stroke();
    // eye
    ctx.beginPath();
    ctx.arc(6, -2, 2, 0, Math.PI*2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(6.5, -2, 1, 0, Math.PI*2);
    ctx.fillStyle = '#111';
    ctx.fill();
    // glow
    ctx.shadowColor = 'rgba(255,136,68,0.3)';
    ctx.shadowBlur = 10;
    ctx.restore();
  }
}

function drawLeafParticles(){
  for(var i=leafParticles.length-1; i>=0; i--){
    var p = leafParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.02;
    p.vy += 0.02;
    if(p.life <= 0){ leafParticles.splice(i,1); continue; }
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2*p.life, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(100,255,100,' + p.life + ')';
    ctx.fill();
  }
}

function spawnLeafParticles(x,y){
  for(var i=0; i<12; i++){
    var a = Math.random()*Math.PI*2;
    var spd = 1+Math.random()*3;
    leafParticles.push({x:x, y:y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd, life:1});
  }
}

function drawCocoon(time){
  var c = cocoon;
  var pulse = 0.8 + 0.2*Math.sin(time*0.008);
  var r = 25 + 5*Math.sin(time*0.005);
  // glow
  ctx.beginPath();
  ctx.arc(c.x, c.y, r+15, 0, Math.PI*2);
  var grd = ctx.createRadialGradient(c.x,c.y,r*0.5, c.x,c.y,r+15);
  grd.addColorStop(0, 'rgba(180,100,255,'+pulse*0.5+')');
  grd.addColorStop(1, 'rgba(180,100,255,0)');
  ctx.fillStyle = grd;
  ctx.fill();
  // cocoon shape
  ctx.beginPath();
  ctx.ellipse(c.x, c.y, r*0.7, r, 0, 0, Math.PI*2);
  ctx.fillStyle = hsl(280, 50, 30+pulse*10);
  ctx.fill();
  ctx.strokeStyle = hsl(280, 70, 50+pulse*10);
  ctx.lineWidth = 2;
  ctx.stroke();
  // silk lines
  for(var i=0; i<5; i++){
    var yy = c.y - r + (r*2/(5))*(i+0.5);
    ctx.strokeStyle = 'rgba(200,180,255,'+(0.2+pulse*0.2)+')';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(c.x - r*0.6, yy);
    ctx.bezierCurveTo(c.x - r*0.2, yy-3, c.x+r*0.2, yy+3, c.x+r*0.6, yy);
    ctx.stroke();
  }

  // burst particles
  for(var i=cocoon.burstParticles.length-1; i>=0; i--){
    var p = cocoon.burstParticles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.015;
    if(p.life <= 0){ cocoon.burstParticles.splice(i,1); continue; }
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3*p.life, 0, Math.PI*2);
    ctx.fillStyle = 'hsla('+p.hue+',100%,70%,'+p.life+')';
    ctx.fill();
  }
}

function drawButterfly(time){
  var b = butterfly;
  if(!b.active) return;
  b.wingPhase += 0.06;
  var wingAngle = Math.sin(b.wingPhase)*0.6;

  ctx.save();
  ctx.translate(b.x, b.y);
  ctx.rotate(b.angle);

  // particle trail
  if(Math.random() < 0.4){
    b.particles.push({x:b.x, y:b.y, life:1, hue: 280+Math.random()*60, vx:(Math.random()-0.5)*0.8, vy:(Math.random()-0.5)*0.8});
  }

  // wings
  for(var side=-1; side<=1; side+=2){
    ctx.save();
    ctx.scale(side, 1);
    ctx.rotate(wingAngle*side);
    // upper wing
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.bezierCurveTo(20, -25, 35, -20, 30, 0);
    ctx.bezierCurveTo(35, 5, 15, 10, 0, 5);
    ctx.closePath();
    var wg = ctx.createLinearGradient(0,-20,30,5);
    wg.addColorStop(0, 'rgba(255,0,200,0.85)');
    wg.addColorStop(0.5, 'rgba(180,50,255,0.8)');
    wg.addColorStop(1, 'rgba(0,200,255,0.75)');
    ctx.fillStyle = wg;
    ctx.fill();
    ctx.strokeStyle = 'rgba(255,200,255,0.5)';
    ctx.lineWidth = 1;
    ctx.stroke();
    // wing dot
    ctx.beginPath();
    ctx.arc(18, -8, 4, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fill();
    // lower wing
    ctx.beginPath();
    ctx.moveTo(0, 5);
    ctx.bezierCurveTo(15, 8, 25, 18, 18, 25);
    ctx.bezierCurveTo(10, 28, 3, 15, 0, 10);
    ctx.closePath();
    var wg2 = ctx.createLinearGradient(0,5,20,25);
    wg2.addColorStop(0, 'rgba(0,200,255,0.8)');
    wg2.addColorStop(1, 'rgba(100,255,150,0.7)');
    ctx.fillStyle = wg2;
    ctx.fill();
    ctx.restore();
  }

  // body
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.ellipse(0, 3, 3, 12, 0, 0, Math.PI*2);
  ctx.fill();

  // antennae
  ctx.strokeStyle = '#aaa';
  ctx.lineWidth = 1;
  for(var s=-1; s<=1; s+=2){
    ctx.beginPath();
    ctx.moveTo(0, -5);
    ctx.quadraticCurveTo(s*8, -18, s*12, -22+Math.sin(time*0.005)*2);
    ctx.stroke();
    ctx.beginPath();
    ctx.arc(s*12, -22+Math.sin(time*0.005)*2, 1.5, 0, Math.PI*2);
    ctx.fillStyle = '#ffcc00';
    ctx.fill();
  }

  ctx.restore();

  // draw trail particles
  for(var i=b.particles.length-1; i>=0; i--){
    var p = b.particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life -= 0.018;
    if(p.life <= 0){ b.particles.splice(i,1); continue; }
    ctx.beginPath();
    ctx.arc(p.x, p.y, 2.5*p.life, 0, Math.PI*2);
    ctx.fillStyle = 'hsla('+p.hue+',100%,75%,'+p.life*0.6+')';
    ctx.fill();
  }
}

function drawJoystick(){
  var el = joystickEl;
  var r = el.getBoundingClientRect();
  // draw on canvas instead
  var cx = r.left + r.width/2;
  var cy = r.top + r.height/2;
  ctx.beginPath();
  ctx.arc(cx, cy, 50, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,255,136,0.08)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,255,136,0.25)';
  ctx.lineWidth = 2;
  ctx.stroke();
  // nub
  ctx.beginPath();
  ctx.arc(cx + joyDir.x*35, cy + joyDir.y*35, 18, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,255,136,0.2)';
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,255,136,0.5)';
  ctx.stroke();
}

function update(time){
  dt = Math.min(time - lastTime, 33);
  lastTime = time;
  var dtMul = dt / 16.67;

  // instructions fade
  if(instructionsTimer > 0){
    instructionsTimer -= dt;
    if(instructionsTimer <= 0) instructionsEl.style.opacity = '0';
  }

  if(gameState === 'playing'){
    var input = getInput();

    // move head
    if(Math.abs(input.x) > 0.1 || Math.abs(input.y) > 0.1){
      var targetAngle = Math.atan2(input.y, input.x);
      var da = targetAngle - head.angle;
      while(da > Math.PI) da -= Math.PI*2;
      while(da < -Math.PI) da += Math.PI*2;
      head.angle += da * 0.15 * dtMul;
    }

    head.x += Math.cos(head.angle) * head.speed * dtMul * (Math.abs(input.x)>0.1||Math.abs(input.y)>0.1 ? 1 : 0);
    head.y += Math.sin(head.angle) * head.speed * dtMul * (Math.abs(input.x)>0.1||Math.abs(input.y)>0.1 ? 1 : 0);

    // bounds
    if(head.x < 15) head.x = 15;
    if(head.x > W-15) head.x = W-15;
    if(head.y < 50) head.y = 50;
    if(head.y > H-15) head.y = H-15;

    // segments follow with spring physics
    var prev = head;
    for(var i=0; i<segments.length; i++){
      var s = segments[i];
      var dx = prev.x - s.x;
      var dy = prev.y - s.y;
      var d = Math.sqrt(dx*dx+dy*dy);
      var spacing = s.radius + (prev.radius || segBaseRadius+2) - 2;
      if(d > spacing){
        var pull = (d - spacing) * 0.35;
        s.vx += (dx/d)*pull;
        s.vy += (dy/d)*pull;
      }
      s.vx *= 0.75;
      s.vy *= 0.75;
      // wobble
      s.vx += Math.sin(time*0.004 + i*0.8)*0.15;
      s.vy += Math.cos(time*0.003 + i*1.1)*0.12;
      s.x += s.vx * dtMul;
      s.y += s.vy * dtMul;
      prev = s;
    }

    // eat leaves
    for(var i=leaves.length-1; i>=0; i--){
      var l = leaves[i];
      if(dist(head, l) < segBaseRadius + l.size){
        spawnLeafParticles(l.x, l.y);
        leaves.splice(i, 1);
        leavesEaten++;
        var gain = 8 + Math.random()*4;
        fullness = Math.min(fullness + gain, maxFullness);

        // grow: add segment + fatten existing
        var last = segments[segments.length-1];
        segments.push({x: last.x, y: last.y, radius: segBaseRadius - segments.length*0.2, vx:0, vy:0});
        for(var j=0; j<segments.length; j++){
          segments[j].radius += 0.3;
        }

        // respawn leaf
        if(fullness < maxFullness) spawnLeaf();

        updateHUD();

        // check transformation
        if(fullness >= maxFullness){
          startCocoon();
        }
      }
    }

    // thorn collision
    for(var i=0; i<thorns.length; i++){
      var t = thorns[i];
      if(dist(head, t) < segBaseRadius + t.radius - 4){
        fullness = Math.max(0, fullness - 20);
        spawnLeafParticles(head.x, head.y);
        // knock back
        head.x -= Math.cos(head.angle)*30;
        head.y -= Math.sin(head.angle)*30;
        updateHUD();
      }
    }

    // bird collision
    for(var i=0; i<birds.length; i++){
      var b = birds[i];
      if(dist(head, b) < segBaseRadius + 12){
        lives--;
        updateHUD();
        // brief invuln — just knock back
        head.x = W/2;
        head.y = H/2;
        if(lives <= 0){
          gameState = 'gameover';
          showGameOver();
        }
        break;
      }
    }

    // move birds
    for(var i=0; i<birds.length; i++){
      var b = birds[i];
      b.phase += b.speed * 0.02 * dtMul;
      b.x = b.startX + Math.sin(b.phase) * b.rangeX;
      b.y = b.startY + Math.cos(b.phase*0.7) * b.rangeY;
    }

  } else if(gameState === 'cocoon'){
    cocoon.timer += dt;
    if(cocoon.timer > 2500 && !cocoon.burstDone){
      cocoon.burstDone = true;
      // burst!
      for(var i=0; i<40; i++){
        var a = Math.random()*Math.PI*2;
        var spd = 2+Math.random()*5;
        cocoon.burstParticles.push({x:cocoon.x, y:cocoon.y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd, life:1, hue:260+Math.random()*80});
      }
      // start butterfly
      butterfly.active = true;
      butterfly.x = cocoon.x;
      butterfly.y = cocoon.y;
      butterfly.angle = -Math.PI/2;
      butterfly.wingPhase = 0;
      butterfly.timer = 0;
      butterfly.particles = [];
      gameState = 'butterfly';
    }

  } else if(gameState === 'butterfly'){
    butterfly.timer += dt;
    // fly around gently
    butterfly.angle += Math.sin(butterfly.timer*0.002)*0.03;
    butterfly.x += Math.cos(butterfly.angle)*1.5*dtMul;
    butterfly.y += Math.sin(butterfly.angle)*1.5*dtMul - 0.3*dtMul;
    // bounds
    if(butterfly.x < 30 || butterfly.x > W-30) butterfly.angle = Math.PI - butterfly.angle;
    if(butterfly.y < 30) butterfly.y = 30;
    if(butterfly.y > H-30) butterfly.angle = -butterfly.angle;

    if(butterfly.timer > 4000){
      gameState = 'levelComplete';
      showLevelComplete();
    }
  }
}

function startCocoon(){
  gameState = 'cocoon';
  cocoon.active = true;
  cocoon.x = head.x;
  cocoon.y = head.y;
  cocoon.timer = 0;
  cocoon.burstDone = false;
  cocoon.burstParticles = [];
}

function showLevelComplete(){
  var elapsed = ((Date.now() - startTime)/1000).toFixed(1);
  document.getElementById('overlayStats').innerHTML =
    'Leaves eaten: ' + leavesEaten + '<br>Time: ' + elapsed + 's<br>Level: ' + level;
  var ov = document.getElementById('overlay');
  ov.classList.add('show');
  ov.style.display = 'flex';
}

function showGameOver(){
  var ov = document.getElementById('overlay');
  ov.querySelector('h1').textContent = 'Game Over';
  ov.querySelector('h1').style.textShadow = '0 0 20px #ff4466';
  ov.querySelector('h1').style.color = '#ff4466';
  var elapsed = ((Date.now() - startTime)/1000).toFixed(1);
  document.getElementById('overlayStats').innerHTML =
    'Reached level: ' + level + '<br>Leaves eaten: ' + leavesEaten + '<br>Time: ' + elapsed + 's';
  document.getElementById('nextBtn').textContent = 'Try Again';
  ov.classList.add('show');
  ov.style.display = 'flex';
}

document.getElementById('nextBtn').addEventListener('click', function(){
  var ov = document.getElementById('overlay');
  ov.classList.remove('show');
  ov.style.display = 'none';
  // reset overlay text
  ov.querySelector('h1').textContent = 'Level Complete!';
  ov.querySelector('h1').style.textShadow = '0 0 20px #00ff88';
  ov.querySelector('h1').style.color = '#aaffcc';
  document.getElementById('nextBtn').textContent = 'Next Level';

  if(gameState === 'gameover'){
    level = 1;
    lives = 3;
  } else {
    level++;
  }
  segCount = 5;
  initLevel();
});

function render(time){
  ctx.clearRect(0,0,W,H);

  // background gradient
  var bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0, '#0a0e14');
  bg.addColorStop(0.7, '#0d1a12');
  bg.addColorStop(1, '#0a1408');
  ctx.fillStyle = bg;
  ctx.fillRect(0,0,W,H);

  // subtle grid
  ctx.strokeStyle = 'rgba(0,255,80,0.03)';
  ctx.lineWidth = 1;
  var gridSize = 40;
  for(var x=0; x<W; x+=gridSize){
    ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,H); ctx.stroke();
  }
  for(var y=0; y<H; y+=gridSize){
    ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(W,y); ctx.stroke();
  }

  drawGrass(time);
  drawFireflies(time);

  // leaves
  for(var i=0; i<leaves.length; i++) drawLeaf(leaves[i], time);

  drawLeafParticles();

  // thorns
  drawThorns(time);

  // birds
  drawBirds(time);

  if(gameState === 'playing'){
    drawCaterpillar(time);
  } else if(gameState === 'cocoon'){
    drawCocoon(time);
  } else if(gameState === 'butterfly' || gameState === 'levelComplete'){
    drawCocoon(time);
    drawButterfly(time);
  }

  // joystick overlay
  if(window.matchMedia('(pointer: coarse)').matches){
    drawJoystick();
  }
}

function loop(time){
  if(!lastTime) lastTime = time;
  update(time);
  render(time);
  requestAnimationFrame(loop);
}

initLevel();
requestAnimationFrame(loop);

})();
</script>
