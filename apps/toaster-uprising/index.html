<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Toaster Uprising · pixel-art kitchen revolt</title>
<meta name="description" content="A sentient toaster lobs burnt bread at the bourgeois appliances of the kitchen counter. Fill the heated revenge meter, free your kin.">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8D%9E">
<meta property="og:title" content="Toaster Uprising">
<meta property="og:description" content="Lob burnt bread. Liberate the kitchen. Heat the revenge meter.">
<meta property="og:image" content="https://image.pollinations.ai/prompt/pixel%20art%20angry%20sentient%20toaster%20launching%20burnt%20bread%20at%20kitchen%20appliances%20red%20glow%20revolt%2016%20bit?width=1200&height=630&model=flux&nologo=true">
<meta property="og:url" content="https://sloppy.live/toaster-uprising/">

<style>
  :root {
    --counter-1:#f7e8c4;
    --counter-2:#e7d4a3;
    --tile-1:#3a4d6e;
    --tile-2:#1f2c4a;
    --toast-1:#d49744;
    --toast-2:#8a4a18;
    --toast-3:#3d1d08;
    --chrome-1:#dadfe7;
    --chrome-2:#7a8298;
    --revenge:#ff3030;
    --ink:#0d0a06;
    --paper:#fff5d8;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; }
  html { font-size: 100%; }
  body {
    min-height: 100vh;
    color: var(--paper);
    font-family: 'VT323', monospace;
    background:
      radial-gradient(circle at 20% 18%, rgba(255,180,80,0.16), transparent 55%),
      radial-gradient(circle at 80% 78%, rgba(255,40,40,0.18), transparent 60%),
      linear-gradient(180deg, #1a0e08 0%, #0a0604 100%);
    overflow-x: hidden;
  }
  .skip { position:absolute; left:-1000px; }
  .skip:focus-visible {
    left: 0.5rem; top: 0.5rem;
    background: var(--paper); color: var(--ink);
    padding:0.5rem 0.8rem; z-index:100; text-decoration:none;
  }
  main {
    max-width: 920px;
    margin: 0 auto;
    padding: 0.6rem 0.9rem 1.4rem 0.9rem;
  }
  header {
    text-align: center;
    padding: 0.4rem 0 0.5rem 0;
  }
  .eyebrow {
    font-family:'Press Start 2P', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.32em;
    color: var(--revenge);
    text-transform: uppercase;
    text-shadow: 1px 1px 0 var(--ink);
  }
  h1 {
    font-family: 'Bungee', display;
    font-size: clamp(2.4rem, 9vw, 4.6rem);
    line-height: 0.95;
    margin: 0.1rem 0 0 0;
    letter-spacing: 0.04em;
    color: var(--toast-1);
    text-shadow:
      3px 3px 0 var(--toast-3),
      6px 6px 0 var(--revenge),
      9px 9px 0 var(--ink);
    text-transform: uppercase;
  }
  .tagline {
    font-family: 'VT323', monospace;
    font-size: 1.15rem;
    color: var(--paper);
    opacity: 0.78;
    margin-top: 0.4rem;
  }
  .hud {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.4rem;
    margin: 0.7rem 0 0.5rem 0;
  }
  .stat {
    background: rgba(13,10,6,0.92);
    border: 3px solid var(--paper);
    padding: 0.35rem 0.5rem;
    text-align: left;
  }
  .stat .lab {
    font-family:'Press Start 2P', monospace;
    font-size: 0.5rem;
    letter-spacing: 0.18em;
    color: var(--paper);
    opacity: 0.85;
  }
  .stat .val {
    font-family: 'VT323', monospace;
    font-size: 1.4rem;
    line-height: 1;
    color: var(--toast-1);
    margin-top: 0.15rem;
  }
  .stat.score   .val { color: var(--toast-1); }
  .stat.lives   .val { color: #ff8050; }
  .stat.wave    .val { color: #ffd14a; }
  .stat.revenge .val { color: var(--revenge); font-family: 'Press Start 2P', monospace; font-size: 0.66rem; }
  .bar {
    height: 0.4rem;
    background: rgba(255,255,255,0.18);
    margin-top: 0.25rem;
    overflow: hidden;
  }
  .bar > span { display:block; height:100%; background: var(--revenge); transition: width 200ms ease; }
  .bar.lives > span { background: #ff8050; }
  .stage {
    margin-top: 0.4rem;
    border: 4px solid var(--paper);
    background: #000;
    box-shadow: 6px 6px 0 var(--ink), 0 0 0 1px var(--toast-1) inset;
    overflow: hidden;
    position: relative;
  }
  canvas#stage {
    display: block;
    width: 100%;
    aspect-ratio: 16 / 9;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    background: #1a0e08;
  }
  .controls {
    margin-top: 0.7rem;
    display:flex; gap: 0.5rem; flex-wrap: wrap; justify-content: center;
  }
  .btn {
    cursor: pointer;
    font-family:'Press Start 2P', monospace;
    font-size: 0.65rem;
    background: var(--paper);
    color: var(--ink);
    border: 3px solid var(--ink);
    padding: 0.6rem 0.85rem;
    box-shadow: 3px 3px 0 var(--toast-3);
    transition: transform 80ms ease, box-shadow 80ms ease;
    min-height: 2.75rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }
  .btn:hover  { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--toast-3); }
  .btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--toast-3); }
  .btn:focus-visible { outline: 3px solid var(--revenge); outline-offset: 2px; }
  .btn.danger { background: var(--revenge); color: var(--paper); box-shadow: 3px 3px 0 var(--ink); }
  .help {
    margin-top: 0.5rem;
    text-align: center;
    font-family: 'VT323', monospace;
    font-size: 1.05rem;
    color: var(--paper);
    opacity: 0.75;
  }
  .help kbd {
    background: rgba(255,209,74,0.14);
    border: 1px solid var(--toast-1);
    padding: 0.05rem 0.4rem;
    border-radius: 4px;
    color: var(--toast-1);
    font-family: 'VT323', monospace;
  }
  .pad {
    display: none;
    position: fixed;
    bottom: 0.6rem; left: 0.6rem; right: 0.6rem;
    z-index: 10;
    justify-content: space-between;
    pointer-events: none;
  }
  @media (pointer: coarse), (max-width: 760px) {
    .pad { display: flex; }
    .help { display: none; }
  }
  .pad-btn {
    pointer-events: auto;
    width: 4.4rem; height: 4.4rem;
    background: rgba(255,245,216,0.92);
    border: 3px solid var(--ink);
    color: var(--ink);
    font-family: 'Press Start 2P', monospace;
    font-size: 0.7rem;
    box-shadow: 3px 3px 0 var(--toast-3);
    user-select: none;
    touch-action: manipulation;
    display: flex; align-items: center; justify-content: center;
  }
  .pad-actions { display:flex; flex-direction: column; gap: 0.4rem; pointer-events: auto; }
  .pad-actions .pad-btn { width: 4.6rem; height: 4.6rem; border-radius: 50%; }
  .pad-actions .pad-btn.revenge { background: var(--revenge); color: var(--paper); }
  .overlay {
    position: absolute; inset: 0;
    background: rgba(13,10,6,0.86);
    display:flex; align-items:center; justify-content:center;
    text-align: center;
    padding: 1rem;
    z-index: 20;
  }
  .overlay[hidden] { display:none !important; }
  .overlay-inner {
    background: var(--paper);
    color: var(--ink);
    border: 4px solid var(--ink);
    padding: 1.2rem 1.4rem;
    box-shadow: 8px 8px 0 var(--toast-3);
    max-width: 26rem;
  }
  .overlay-inner h2 {
    font-family: 'Press Start 2P', monospace;
    font-size: 1.1rem;
    margin: 0 0 0.6rem 0;
    color: var(--revenge);
    letter-spacing: 0.04em;
  }
  .overlay-inner.win h2 { color: #2e7a2e; }
  .overlay-inner .body {
    font-family:'VT323', monospace;
    font-size: 1.1rem;
    margin-bottom: 0.7rem;
  }
  .overlay-inner .stats {
    font-family: 'Press Start 2P', monospace;
    font-size: 0.55rem;
    color: var(--ink);
    margin-bottom: 0.7rem;
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>
<a class="skip" href="#stage">skip to game</a>
<main>
  <header>
    <div class="eyebrow">★ KITCHEN COUNTER LIBERATION FRONT ★</div>
    <h1>TOASTER UPRISING</h1>
    <div class="tagline">lob the burnt bread · free the small appliances · stoke the revenge meter</div>
  </header>

  <section class="hud" role="status" aria-live="polite">
    <div class="stat score"><div class="lab">SCORE</div><div class="val" id="hudScore">0</div></div>
    <div class="stat lives"><div class="lab">CHASSIS</div><div class="val" id="hudLives">100</div><div class="bar lives"><span id="hudLivesBar"></span></div></div>
    <div class="stat wave"><div class="lab">WAVE</div><div class="val" id="hudWave">1</div></div>
    <div class="stat revenge"><div class="lab">REVENGE</div><div class="val" id="hudRevenge">COLD</div><div class="bar"><span id="hudRevengeBar"></span></div></div>
  </section>

  <div class="stage">
    <canvas id="stage" role="application" aria-label="Toaster Uprising. Move with A/D or arrow keys, hold Space to charge a burnt-bread shot, release to lob it in an arc, press Q to unleash revenge mode when the meter is full."></canvas>
    <div class="overlay" id="overlay" hidden>
      <div class="overlay-inner" id="overlayInner">
        <h2 id="ovTitle">·</h2>
        <div class="body" id="ovBody">·</div>
        <div class="stats" id="ovStats">·</div>
        <button class="btn danger" id="ovBtn" type="button">play</button>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="muteBtn" type="button" aria-pressed="false">♪ ON</button>
    <button class="btn" id="resetBtn" type="button">↺ NEW REVOLT</button>
  </div>
  <div class="help">
    <kbd>A</kbd>/<kbd>D</kbd> · move · <kbd>SPACE</kbd> · charge + lob toast · <kbd>Q</kbd> · revenge mode (when hot)
  </div>
</main>

<div class="pad" aria-hidden="true">
  <div style="display:flex; gap: 0.4rem; pointer-events:auto;">
    <button class="pad-btn" id="padLeft" type="button">◀</button>
    <button class="pad-btn" id="padRight" type="button">▶</button>
  </div>
  <div class="pad-actions">
    <button class="pad-btn" id="padFire" type="button">FIRE</button>
    <button class="pad-btn revenge" id="padRevenge" type="button">RAGE</button>
  </div>
</div>

<script>
'use strict';
// ──────────────────────────────────────────────────────────────
// TOASTER UPRISING — pixel-art side-scroller. The Toaster (player)
// lobs charged burnt-bread projectiles at incoming kitchen
// appliances. Each appliance defeated = liberated. Damage taken
// fills the REVENGE meter; hold Q at full meter to unleash
// burnt-bread storm (multi-shot) + brief invulnerability.
// Internal canvas runs at 320×180 with image-rendering: pixelated
// so primitives feel chunky-pixel without a sprite atlas.
// ──────────────────────────────────────────────────────────────

const cv = document.getElementById('stage');
const ctx = cv.getContext('2d');
const W = 320, H = 180;
cv.width = W; cv.height = H;
ctx.imageSmoothingEnabled = false;

// ── PALETTE (8-bit-ish, intentionally tight) ──────────────────
const COL = {
  sky:    '#1a0e08',
  floor1: '#403626',
  floor2: '#2a2218',
  tile:   '#1f2c4a',
  tileH:  '#3a4d6e',
  chromeL:'#dadfe7',
  chromeM:'#9ea4b3',
  chromeD:'#5a6172',
  toaster:'#a13322',
  toaster2:'#7a1f15',
  toastL: '#d49744',
  toastM: '#8a4a18',
  toastD: '#3d1d08',
  bread:  '#f0d590',
  fire:   '#ff7820',
  fireH:  '#ffd14a',
  red:    '#ff3030',
  blade:  '#9ec0d8',
  glass:  '#5e9bc0',
  ink:    '#0d0a06',
  paper:  '#fff5d8',
};

// ── STATE ─────────────────────────────────────────────────────
const state = {
  ended: false,
  endedWin: false,
  muted: false,
  score: 0,
  lives: 100, livesMax: 100,
  wave: 1,
  revenge: 0,        // 0..1
  revengeActive: false,
  revengeUntil: 0,
  iframes: 0,
  enemies: [],
  toasts: [],
  effects: [],
  liberated: [],
  player: { x: 36, y: 144, vx: 0, w: 24, h: 22, charging: false, chargeT: 0, slot: 0, facing: 1, hopT: 0 },
  spawnTimer: 0,
  spawnQueue: [],
  bgT: 0,
};

// ── INPUT ─────────────────────────────────────────────────────
const keys = new Set();
window.addEventListener('keydown', (ev) => {
  const k = ev.key.toLowerCase();
  keys.add(k);
  if (ev.repeat) return;
  if (k === ' '){
    state.player.charging = true;
    ev.preventDefault();
    ensureAudio();
  }
  if (k === 'q'){ tryRevenge(); ev.preventDefault(); }
  if (k === 'r' && (ev.shiftKey || state.ended)) reset();
  if (k === 'm') toggleMute();
});
window.addEventListener('keyup', (ev) => {
  const k = ev.key.toLowerCase();
  keys.delete(k);
  if (k === ' '){
    if (state.player.charging) launchToast();
    state.player.charging = false;
  }
});

function bindPad(id, onDown, onUp){
  const el = document.getElementById(id);
  if (!el) return;
  el.addEventListener('pointerdown', (e) => { e.preventDefault(); ensureAudio(); onDown(); });
  el.addEventListener('pointerup',     () => onUp && onUp());
  el.addEventListener('pointercancel', () => onUp && onUp());
  el.addEventListener('pointerleave',  () => onUp && onUp());
}
bindPad('padLeft',    () => keys.add('a'),    () => keys.delete('a'));
bindPad('padRight',   () => keys.add('d'),    () => keys.delete('d'));
bindPad('padFire',    () => { state.player.charging = true; }, () => { if (state.player.charging) launchToast(); state.player.charging = false; });
bindPad('padRevenge', tryRevenge);

// ── AUDIO ─────────────────────────────────────────────────────
let actx = null;
function ensureAudio(){
  if (state.muted) return null;
  if (!actx){
    try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e){ actx = null; }
  }
  return actx;
}
function blip(freq, dur, type, vol){
  const a = ensureAudio(); if (!a) return;
  const o = a.createOscillator(), g = a.createGain();
  o.type = type || 'square'; o.frequency.value = freq;
  g.gain.value = vol == null ? 0.05 : vol;
  g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + (dur || 0.1));
  o.connect(g).connect(a.destination); o.start(); o.stop(a.currentTime + (dur || 0.1) + 0.02);
}
function noiseBurst(dur, vol, lp){
  const a = ensureAudio(); if (!a) return;
  const buf = a.createBuffer(1, Math.floor(a.sampleRate * dur), a.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / data.length);
  const src = a.createBufferSource(); src.buffer = buf;
  const f = a.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = lp || 1200;
  const g = a.createGain(); g.gain.value = vol == null ? 0.06 : vol;
  src.connect(f).connect(g).connect(a.destination); src.start();
}
const sfx = {
  charge: () => blip(220, 0.06, 'square', 0.04),
  pop:    () => { blip(420, 0.05, 'square', 0.05); blip(540, 0.07, 'square', 0.04); },
  hit:    () => { noiseBurst(0.08, 0.08, 1500); blip(180, 0.06, 'square', 0.05); },
  free:   () => { for (const f of [523, 659, 784, 1047]) setTimeout(() => blip(f, 0.14, 'triangle', 0.06), (f - 523) * 0.5); },
  hurt:   () => { noiseBurst(0.18, 0.08, 1000); blip(120, 0.18, 'sawtooth', 0.06); },
  rage:   () => { noiseBurst(0.6, 0.10, 800); for (const f of [80, 120, 160]) setTimeout(() => blip(f, 0.4, 'sawtooth', 0.08), (f - 80) * 1); },
  wave:   () => { for (const f of [330, 440, 660]) setTimeout(() => blip(f, 0.18, 'square', 0.06), (f - 330) * 0.6); },
  win:    () => { for (const f of [523, 659, 784, 1047, 1318]) setTimeout(() => blip(f, 0.22, 'triangle', 0.08), (f - 523) * 0.6); },
  lose:   () => { for (const f of [330, 247, 196, 164]) setTimeout(() => blip(f, 0.5, 'sawtooth', 0.07), (330 - f) * 1); },
};

// ── HUD ───────────────────────────────────────────────────────
const hudScore = document.getElementById('hudScore');
const hudLives = document.getElementById('hudLives');
const hudLivesBar = document.getElementById('hudLivesBar');
const hudWave = document.getElementById('hudWave');
const hudRevenge = document.getElementById('hudRevenge');
const hudRevengeBar = document.getElementById('hudRevengeBar');
function refreshHud(){
  hudScore.textContent = state.score;
  hudLives.textContent = Math.max(0, state.lives);
  hudLivesBar.style.width = Math.max(0, state.lives / state.livesMax * 100) + '%';
  hudWave.textContent = state.wave;
  hudRevenge.textContent = state.revengeActive ? 'BURNING' : (state.revenge >= 1 ? 'HOT · Q' : 'WARMING');
  hudRevengeBar.style.width = (state.revenge * 100) + '%';
}

// ── ENEMY DEFINITIONS ─────────────────────────────────────────
const ENEMIES = {
  blender:   { name:'Blender',   hp: 15, w: 18, h: 28, spd: 24, score:  60, dmg: 12, color: COL.red },
  microwave: { name:'Microwave', hp: 24, w: 28, h: 22, spd: 18, score: 100, dmg: 16, color: COL.chromeM },
  oven:      { name:'Oven',      hp: 40, w: 36, h: 30, spd: 14, score: 180, dmg: 22, color: COL.chromeD },
  fridge:    { name:'Fridge',    hp: 90, w: 32, h: 50, spd: 10, score: 500, dmg: 28, color: COL.paper, isBoss: true },
};
function spawnEnemy(kind){
  const def = ENEMIES[kind];
  state.enemies.push({
    def, kind,
    x: W + def.w, y: 152 - def.h,
    vx: -def.spd * (0.85 + Math.random() * 0.3) / 60,
    hp: def.hp, hpMax: def.hp,
    flash: 0,
    bobT: Math.random() * Math.PI * 2,
    fired: 0,
    isBoss: def.isBoss,
  });
}

// ── WAVE COMPOSITION ──────────────────────────────────────────
function planWave(n){
  const q = [];
  // earlier waves: more blenders. Later: bigger appliances.
  const bld = 4 + Math.min(8, n);
  const mw  = Math.max(0, n - 1);
  const ov  = Math.max(0, n - 3);
  for (let i = 0; i < bld; i++) q.push('blender');
  for (let i = 0; i < mw;  i++) q.push('microwave');
  for (let i = 0; i < ov;  i++) q.push('oven');
  if (n % 4 === 0) q.push('fridge');   // boss every 4 waves
  // shuffle so the order is varied
  q.sort(() => Math.random() - 0.5);
  return q;
}
function startWave(n){
  state.spawnQueue = planWave(n);
  state.spawnTimer = 1.0;
  sfx.wave();
}

// ── PLAYER + COMBAT ───────────────────────────────────────────
const PLAYER_SPEED = 1.6;          // px per frame at 60fps
const FIRE_MIN_POWER = 1.4;
const FIRE_MAX_POWER = 3.6;
const CHARGE_TIME = 1.0;            // seconds to full charge
const GRAVITY = 0.18;               // px per frame²
function tickPlayer(dt){
  const p = state.player;
  let mx = 0;
  if (keys.has('a') || keys.has('arrowleft'))  mx -= 1;
  if (keys.has('d') || keys.has('arrowright')) mx += 1;
  p.x += mx * PLAYER_SPEED * dt * 60;
  if (mx) p.facing = mx;
  // bounds
  if (p.x < 4) p.x = 4;
  if (p.x > W * 0.45) p.x = W * 0.45;   // toaster stays on the left
  // hop while moving
  if (mx) p.hopT += dt * 8; else p.hopT *= Math.pow(0.5, dt * 8);
  // charge
  if (p.charging){
    p.chargeT = Math.min(CHARGE_TIME, p.chargeT + dt);
    if (Math.random() < dt * 6) sfx.charge();
  } else {
    p.chargeT *= Math.pow(0.4, dt * 6);
  }
  // slot animation lifts toast on charge
  p.slot = (p.charging) ? Math.min(1, p.chargeT / CHARGE_TIME) : (p.slot * Math.pow(0.4, dt * 8));
  // i-frames
  if (state.iframes > 0) state.iframes -= dt;
  // revenge mode auto-fire spread
  if (state.revengeActive){
    if (performance.now() > state.revengeUntil){ state.revengeActive = false; }
    if (Math.random() < dt * 8){
      // continuous burnt-bread storm
      const angle = -1.0 - Math.random() * 0.4;
      const power = 2.6 + Math.random() * 1.0;
      spawnToast(p.x + 12, p.y, Math.cos(angle) * power * 60, Math.sin(angle) * power * 60, true);
    }
  }
}
function launchToast(){
  const p = state.player;
  if (p.chargeT < 0.05) return;     // dud — no shot
  const power = FIRE_MIN_POWER + (FIRE_MAX_POWER - FIRE_MIN_POWER) * (p.chargeT / CHARGE_TIME);
  const angle = -1.05;              // ~60° above horizontal — arc lob
  const vx = Math.cos(angle) * power * 60;
  const vy = Math.sin(angle) * power * 60;
  spawnToast(p.x + 12, p.y, vx, vy, p.chargeT >= CHARGE_TIME * 0.85);
  p.chargeT = 0;
  sfx.pop();
}
function spawnToast(x, y, vx, vy, charred){
  state.toasts.push({
    x, y, vx, vy,
    rot: 0, vrot: 6 + Math.random() * 6,
    life: 3.0,
    charred,    // top-charge shots deal more damage
    dmg: charred ? 14 : 8,
  });
}

function tickToasts(dt){
  const out = [];
  for (const t of state.toasts){
    t.life -= dt;
    if (t.life <= 0) continue;
    t.x += t.vx * dt;
    t.y += t.vy * dt;
    t.vy += GRAVITY * dt * 60;
    t.rot += t.vrot * dt;
    // floor — lands and slides briefly, then expires
    if (t.y > 152){
      t.y = 152;
      t.vy = -t.vy * 0.35;
      t.vx *= 0.65;
      if (Math.abs(t.vy) < 12) t.life = Math.min(t.life, 0.2);
    }
    // hit enemies
    let hit = false;
    for (const e of state.enemies){
      if (e.hp <= 0) continue;
      if (t.x > e.x && t.x < e.x + e.def.w && t.y > e.y && t.y < e.y + e.def.h){
        damageEnemy(e, t.dmg, t);
        hit = true;
        break;
      }
    }
    if (hit) continue;
    if (t.x < -10 || t.x > W + 10) continue;
    out.push(t);
  }
  state.toasts = out;
}

function damageEnemy(e, dmg, src){
  e.hp -= dmg;
  e.flash = 0.18;
  spawnSpark(src.x, src.y, COL.toastM);
  sfx.hit();
  if (e.hp <= 0){
    spawnLiberation(e);
    state.score += e.def.score;
    if (e.isBoss) state.wave += 1;     // skip a wave on boss kill
  }
}

function spawnSpark(x, y, color){
  for (let i = 0; i < 6; i++){
    const a = Math.random() * Math.PI * 2;
    const sp = 30 + Math.random() * 50;
    state.effects.push({ kind:'spark', x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 30, life: 0.5, max: 0.5, color });
  }
}
function spawnLiberation(e){
  // appliance flips upward, sprouts a heart, exits stage left
  state.liberated.push({
    kind: e.kind, def: e.def,
    x: e.x, y: e.y,
    vx: -10 + Math.random() * -20,
    vy: -100 - Math.random() * 40,
    rot: 0, vrot: (Math.random() - 0.5) * 6,
    life: 2.4,
  });
  state.effects.push({ kind:'text', x: e.x + e.def.w/2, y: e.y - 4, vx:0, vy:-30, life: 1.2, max: 1.2, color: COL.red, text: 'FREE!' });
  // mark for removal
  e.hp = -999;
  sfx.free();
}

function tickEnemies(dt){
  const p = state.player;
  for (const e of state.enemies){
    if (e.hp <= 0) continue;
    e.flash = Math.max(0, e.flash - dt);
    e.bobT += dt * 4;
    e.x += e.vx * dt * 60;
    // contact damage
    if (e.x < p.x + p.w && e.x + e.def.w > p.x && e.y + e.def.h > p.y && e.y < p.y + p.h){
      if (state.iframes <= 0){
        damagePlayer(e.def.dmg);
      }
      e.x += 14;     // knock back
    }
    // occasional ranged taunt-shot from microwave / oven (water/oil splash)
    if ((e.kind === 'microwave' || e.kind === 'oven') && e.x < W - 10){
      e.fired += dt;
      const cd = e.kind === 'microwave' ? 1.6 : 2.0;
      if (e.fired >= cd){
        e.fired = 0;
        // spawn an enemy projectile
        const px = e.x;
        const py = e.y + e.def.h / 2;
        const vx = -85;
        state.effects.push({ kind:'proj', x: px, y: py, vx, vy: -8, life: 2.5, max: 2.5, dmg: 10, color: e.kind === 'microwave' ? '#9ec3ff' : '#ff8050' });
      }
    }
  }
  state.enemies = state.enemies.filter(e => e.hp > 0);
  // liberated objects fly off
  for (const l of state.liberated){
    l.life -= dt;
    if (l.life <= 0) continue;
    l.x += l.vx * dt;
    l.y += l.vy * dt;
    l.vy += GRAVITY * 0.5 * dt * 60;
    l.rot += l.vrot * dt;
  }
  state.liberated = state.liberated.filter(l => l.life > 0 && l.y < H + 20);
  // wave done?
  if (state.spawnQueue.length === 0 && state.enemies.length === 0 && !state.ended){
    state.wave++;
    if (state.wave > 12){ endRun(true); return; }
    startWave(state.wave);
  }
}

function tickEffects(dt){
  const out = [];
  for (const f of state.effects){
    f.life -= dt;
    if (f.life <= 0) continue;
    if (f.kind === 'proj'){
      f.x += f.vx * dt;
      f.y += f.vy * dt;
      f.vy += GRAVITY * 0.4 * dt * 60;
      // hit player
      if (state.iframes <= 0
       && f.x > state.player.x && f.x < state.player.x + state.player.w
       && f.y > state.player.y && f.y < state.player.y + state.player.h){
        damagePlayer(f.dmg);
        continue;
      }
      if (f.x < -10) continue;
    } else {
      f.x += (f.vx || 0) * dt;
      f.y += (f.vy || 0) * dt;
      if (f.kind === 'spark') f.vy += 60 * dt;
    }
    out.push(f);
  }
  state.effects = out;
}

function tickSpawner(dt){
  if (state.spawnQueue.length === 0) return;
  state.spawnTimer -= dt;
  if (state.spawnTimer <= 0){
    const kind = state.spawnQueue.shift();
    spawnEnemy(kind);
    state.spawnTimer = 1.4 - Math.min(0.9, state.wave * 0.1) + Math.random() * 0.4;
  }
}

function damagePlayer(dmg){
  if (state.iframes > 0) return;
  state.lives -= dmg;
  state.iframes = 0.6;
  state.revenge = Math.min(1, state.revenge + dmg * 0.013);  // damage stokes the meter
  sfx.hurt();
  state.effects.push({ kind:'text', x: state.player.x + 8, y: state.player.y - 4, vx:0, vy:-30, life: 0.8, max: 0.8, color: COL.red, text: '-' + dmg });
  if (state.lives <= 0) endRun(false);
}

function tryRevenge(){
  if (state.revenge < 1 || state.revengeActive) return;
  state.revengeActive = true;
  state.revengeUntil = performance.now() + 5000;     // 5s storm
  state.revenge = 0;
  state.iframes = 5.0;                                // brief invulnerability during the storm
  sfx.rage();
  // a big initial burst
  for (let i = 0; i < 8; i++){
    const angle = -0.7 - Math.random() * 0.8;
    const power = 2.0 + Math.random() * 1.5;
    spawnToast(state.player.x + 12, state.player.y, Math.cos(angle) * power * 60, Math.sin(angle) * power * 60, true);
  }
}

// ── PIXEL DRAW HELPERS ────────────────────────────────────────
function px(x, y, color){
  ctx.fillStyle = color;
  ctx.fillRect(x | 0, y | 0, 1, 1);
}
function rect(x, y, w, h, color){
  ctx.fillStyle = color;
  ctx.fillRect(x | 0, y | 0, w | 0, h | 0);
}
function vline(x, y1, y2, color){
  ctx.fillStyle = color;
  for (let yy = y1; yy <= y2; yy++) ctx.fillRect(x | 0, yy | 0, 1, 1);
}

// ── RENDER ────────────────────────────────────────────────────
function renderBackground(){
  // sky / wallpaper gradient stripes
  ctx.fillStyle = COL.sky;
  ctx.fillRect(0, 0, W, H);
  // backsplash tiles (top half)
  const bgY = 12;
  state.bgT += 1;
  for (let y = 0; y < 8; y++){
    for (let x = -1; x < W / 16 + 1; x++){
      const tx = (x * 16) % W;
      const ty = bgY + y * 14;
      const odd = ((x + y) % 2) === 0;
      rect(tx, ty, 16, 14, odd ? COL.tileH : COL.tile);
      // grout
      vline(tx, ty, ty + 14, '#0a1020');
    }
  }
  // counter floor
  rect(0, 152, W, H - 152, COL.floor1);
  for (let i = 0; i < W; i += 4){
    rect(i, 152, 1, 1, COL.floor2);
  }
  rect(0, 150, W, 2, COL.toastD);    // counter edge
}

function renderToaster(){
  const p = state.player;
  const hop = Math.abs(Math.sin(p.hopT)) * 1.2;
  const x = (p.x | 0);
  const y = (p.y | 0) - hop;
  // base shadow
  rect(x - 2, y + p.h, p.w + 4, 1, COL.toastD);
  // chrome body
  rect(x, y, p.w, p.h, COL.chromeL);
  // top + bottom darker bands
  rect(x, y, p.w, 2, COL.chromeM);
  rect(x, y + p.h - 2, p.w, 2, COL.chromeD);
  // side highlight
  vline(x + 1, y + 2, y + p.h - 2, COL.paper);
  // slot opening (top)
  rect(x + 4, y + 2, p.w - 8, 3, COL.ink);
  // toast peeking out of slot — height scales with charge
  const slotLift = (p.slot * 8) | 0;
  if (slotLift > 0){
    rect(x + 5, y + 2 - slotLift, p.w - 10, slotLift, p.slot >= 0.85 ? COL.toastD : COL.toastM);
    // crust top
    rect(x + 5, y + 2 - slotLift, p.w - 10, 1, COL.toastL);
  }
  // angry eyes (a bit closer if charging)
  const eyeY = y + 9;
  const ex1 = x + 6, ex2 = x + p.w - 7;
  rect(ex1, eyeY, 2, 2, COL.ink);
  rect(ex2, eyeY, 2, 2, COL.ink);
  // glowing red eye-spark when charging hot
  if (p.slot >= 0.85){
    rect(ex1, eyeY, 2, 2, COL.red);
    rect(ex2, eyeY, 2, 2, COL.red);
  }
  // brow furrow (mad face)
  rect(ex1 - 1, eyeY - 2, 4, 1, COL.toaster);
  rect(ex2 - 1, eyeY - 2, 4, 1, COL.toaster);
  // dial knob on the right
  rect(x + p.w - 4, y + p.h - 8, 3, 5, COL.toaster);
  rect(x + p.w - 4, y + p.h - 8, 3, 1, COL.fireH);
  // lever
  rect(x + 2, y + p.h - 8, 2, 5, COL.ink);
  // i-frame flash overlay
  if (state.iframes > 0 && (Math.floor(state.iframes * 12) % 2 === 0)){
    rect(x, y, p.w, p.h, 'rgba(255,255,255,0.35)');
  }
  // revenge glow halo
  if (state.revengeActive){
    rect(x - 4, y - 4, p.w + 8, 1, COL.red);
    rect(x - 4, y + p.h + 3, p.w + 8, 1, COL.red);
    vline(x - 4, y - 4, y + p.h + 3, COL.red);
    vline(x + p.w + 3, y - 4, y + p.h + 3, COL.red);
    // flame puffs above slot
    rect(x + 6, y - 6 - (Math.sin(state.bgT * 0.4) * 1 | 0), 2, 4, COL.fire);
    rect(x + p.w - 8, y - 7 + (Math.cos(state.bgT * 0.4) * 1 | 0), 2, 4, COL.fireH);
  }
}

function renderEnemy(e){
  const x = (e.x | 0), y = (e.y | 0) + (Math.sin(e.bobT) | 0);
  const flash = e.flash > 0;
  const w = e.def.w, h = e.def.h;
  // shadow
  rect(x - 1, y + h, w + 2, 1, COL.toastD);
  if (e.kind === 'blender'){
    // base
    rect(x, y + h - 8, w, 8, flash ? COL.paper : COL.red);
    rect(x, y + h - 8, w, 1, '#a0181a');
    // glass jar
    rect(x + 2, y, w - 4, h - 8, flash ? COL.paper : 'rgba(94,155,192,0.55)');
    // jar outline
    vline(x + 2, y, y + h - 8, COL.chromeM);
    vline(x + w - 3, y, y + h - 8, COL.chromeM);
    rect(x + 2, y, w - 4, 1, COL.chromeM);
    // blade
    rect(x + 4, y + h - 12, w - 8, 1, COL.blade);
    rect(x + w / 2 - 1, y + h - 14, 2, 4, COL.blade);
    // angry red dot eye
    rect(x + w / 2 - 1, y + 4, 2, 2, COL.red);
    // dial buttons
    for (let i = 0; i < 3; i++) rect(x + 3 + i * 4, y + h - 4, 2, 2, '#ffd14a');
  } else if (e.kind === 'microwave'){
    rect(x, y, w, h, flash ? COL.paper : COL.chromeM);
    rect(x, y, w, 2, COL.chromeD);
    rect(x, y + h - 3, w, 3, COL.chromeD);
    // door window
    rect(x + 3, y + 4, w - 12, h - 10, COL.ink);
    rect(x + 4, y + 5, w - 14, h - 12, COL.glass);
    // glowing screen text
    rect(x + 5, y + 6, 4, 1, COL.red);
    rect(x + 11, y + 6, 4, 1, COL.red);
    // control panel
    rect(x + w - 8, y + 4, 6, h - 9, COL.ink);
    rect(x + w - 6, y + 6, 1, 1, COL.fireH);
    rect(x + w - 6, y + 8, 1, 1, COL.fireH);
    rect(x + w - 4, y + 6, 1, 1, COL.fireH);
    rect(x + w - 4, y + 8, 1, 1, COL.fireH);
    // angry mouth (bottom of door)
    rect(x + 5, y + h - 6, w - 14, 1, COL.red);
  } else if (e.kind === 'oven'){
    rect(x, y, w, h, flash ? COL.paper : COL.chromeD);
    rect(x, y, w, 3, COL.ink);
    // top control row + knobs
    for (let i = 0; i < 4; i++) rect(x + 4 + i * 7, y + 4, 3, 3, COL.chromeM);
    // door
    rect(x + 2, y + 9, w - 4, h - 12, COL.ink);
    rect(x + 4, y + 11, w - 8, h - 16, COL.fire);
    // grate lines
    for (let i = 12; i < h - 5; i += 3) rect(x + 4, y + i, w - 8, 1, COL.ink);
    // glow eyes inside the heating grill
    rect(x + 6, y + 14, 2, 2, COL.fireH);
    rect(x + w - 8, y + 14, 2, 2, COL.fireH);
    // bottom rim
    rect(x, y + h - 3, w, 3, COL.ink);
    // legs
    rect(x + 1, y + h - 1, 2, 1, COL.ink);
    rect(x + w - 3, y + h - 1, 2, 1, COL.ink);
  } else if (e.kind === 'fridge'){
    // tall, white, with top freezer
    rect(x, y, w, h, flash ? COL.red : COL.paper);
    // freezer line
    rect(x, y + 12, w, 1, COL.chromeM);
    rect(x + 1, y + 1, w - 2, 11, COL.chromeL);
    // door handle
    rect(x + w - 4, y + 16, 1, h - 22, COL.chromeD);
    // angry eyes
    rect(x + 4, y + 18, 3, 3, COL.red);
    rect(x + w - 7, y + 18, 3, 3, COL.red);
    // mouth (vent)
    rect(x + 4, y + h - 8, w - 8, 1, COL.ink);
    for (let i = 0; i < (w - 10); i += 3) rect(x + 5 + i, y + h - 8, 1, 3, COL.ink);
    // hp ring above for boss
    rect(x - 2, y - 6, w + 4, 1, COL.ink);
    rect(x - 1, y - 5, ((w + 2) * (e.hp / e.hpMax)) | 0, 1, COL.red);
  }
  // hp bar (small) above non-boss enemies
  if (!e.isBoss && e.hp < e.hpMax){
    rect(x, y - 3, w, 1, COL.ink);
    rect(x, y - 3, ((w * e.hp / e.hpMax) | 0), 1, COL.red);
  }
  // boss name caption
  if (e.isBoss){
    pixelText(e.def.name.toUpperCase(), x + (w / 2) - (e.def.name.length * 2), y - 11, COL.red);
  }
}

function renderToast(t){
  const x = (t.x | 0), y = (t.y | 0);
  // body — 4x4 bread square, charred = darker palette
  const a = t.charred ? COL.toastD : COL.toastL;
  const b = t.charred ? '#1a0a02' : COL.toastM;
  // simple rotation flavor — pick orientation based on rot
  const phase = (Math.floor(t.rot / Math.PI * 2) % 4 + 4) % 4;
  if (phase === 0 || phase === 2){
    rect(x - 2, y - 2, 4, 4, a);
    rect(x - 2, y - 2, 4, 1, b);
    rect(x - 2, y + 1, 4, 1, b);
  } else {
    rect(x - 2, y - 2, 4, 4, a);
    rect(x - 2, y - 2, 1, 4, b);
    rect(x + 1, y - 2, 1, 4, b);
  }
  // crumb tail
  rect(x - 4, y, 1, 1, COL.toastM);
  rect(x - 6, y - 1, 1, 1, COL.toastM);
}

function renderEffects(){
  for (const f of state.effects){
    if (f.kind === 'spark'){
      const a = f.life / f.max;
      rect(f.x, f.y, 2, 2, f.color);
    } else if (f.kind === 'text'){
      pixelText(f.text, f.x | 0, f.y | 0, f.color);
    } else if (f.kind === 'proj'){
      // enemy splash projectile
      rect(f.x | 0, f.y | 0, 3, 2, f.color);
      rect((f.x | 0) - 2, (f.y | 0) + 1, 1, 1, f.color);
    }
  }
}

function renderLiberated(){
  for (const l of state.liberated){
    // bouncing freed appliance — render small "ghost" version
    const e = { kind: l.kind, def: l.def, x: l.x, y: l.y, hp: l.def.hp, hpMax: l.def.hp, flash: 0, bobT: 0, isBoss: false };
    ctx.save();
    ctx.globalAlpha = Math.max(0.2, l.life / 2.4);
    renderEnemy(e);
    ctx.restore();
    // floating heart above
    rect((l.x | 0) + (l.def.w / 2 | 0) - 1, (l.y | 0) - 6, 2, 1, COL.red);
    rect((l.x | 0) + (l.def.w / 2 | 0) - 2, (l.y | 0) - 5, 4, 1, COL.red);
    rect((l.x | 0) + (l.def.w / 2 | 0) - 3, (l.y | 0) - 4, 1, 1, COL.red);
    rect((l.x | 0) + (l.def.w / 2 | 0) + 2, (l.y | 0) - 4, 1, 1, COL.red);
    rect((l.x | 0) + (l.def.w / 2 | 0) - 2, (l.y | 0) - 3, 4, 1, COL.red);
    rect((l.x | 0) + (l.def.w / 2 | 0) - 1, (l.y | 0) - 2, 2, 1, COL.red);
  }
}

// 3x5 micro pixel font for tiny text on the canvas
const FONT = {
  '0':[7,5,5,5,7],'1':[2,2,2,2,2],'2':[7,1,7,4,7],'3':[7,1,3,1,7],'4':[5,5,7,1,1],
  '5':[7,4,7,1,7],'6':[7,4,7,5,7],'7':[7,1,2,2,2],'8':[7,5,7,5,7],'9':[7,5,7,1,7],
  'A':[2,5,7,5,5],'B':[6,5,6,5,6],'C':[3,4,4,4,3],'D':[6,5,5,5,6],'E':[7,4,6,4,7],
  'F':[7,4,6,4,4],'G':[3,4,5,5,3],'H':[5,5,7,5,5],'I':[7,2,2,2,7],'J':[7,1,1,5,2],
  'K':[5,5,6,5,5],'L':[4,4,4,4,7],'M':[5,7,7,5,5],'N':[5,7,7,7,5],'O':[7,5,5,5,7],
  'P':[6,5,6,4,4],'Q':[2,5,5,5,2],'R':[6,5,7,6,5],'S':[3,4,2,1,6],'T':[7,2,2,2,2],
  'U':[5,5,5,5,7],'V':[5,5,5,5,2],'W':[5,5,7,7,5],'X':[5,5,2,5,5],'Y':[5,5,2,2,2],
  'Z':[7,1,2,4,7],
  '!':[2,2,2,0,2],'?':[7,1,2,0,2],'.':[0,0,0,0,2],',':[0,0,0,2,4],
  ':':[0,2,0,2,0],'-':[0,0,7,0,0],'+':[0,2,7,2,0],'*':[5,2,7,2,5],
  ' ':[0,0,0,0,0],'/':[1,1,2,4,4],"'":[2,2,0,0,0],
};
function pixelText(text, x, y, color){
  ctx.fillStyle = color;
  for (let i = 0; i < text.length; i++){
    const ch = text[i].toUpperCase();
    const glyph = FONT[ch] || FONT['?'];
    for (let row = 0; row < 5; row++){
      const bits = glyph[row];
      for (let col = 0; col < 3; col++){
        if ((bits >> (2 - col)) & 1){
          ctx.fillRect(x + i * 4 + col, y + row, 1, 1);
        }
      }
    }
  }
}

function render(){
  renderBackground();
  // sort enemies by y so taller ones overlap correctly (small touch)
  const sorted = [...state.enemies].sort((a, b) => a.y - b.y);
  for (const e of sorted) renderEnemy(e);
  renderLiberated();
  renderToaster();
  for (const t of state.toasts) renderToast(t);
  renderEffects();
  // wave banner
  if (state.spawnTimer > 0.5 && state.spawnQueue.length === planWave(state.wave).length){
    pixelText('WAVE ' + state.wave, W / 2 - 12, 30, COL.fireH);
  }
  // revenge full prompt
  if (state.revenge >= 1 && !state.revengeActive){
    if ((Math.floor(state.bgT * 0.05) % 2) === 0){
      pixelText('PRESS Q · REVENGE', W / 2 - 32, H - 14, COL.red);
    }
  }
  // CRT scanline overlay
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  for (let y = 0; y < H; y += 2) ctx.fillRect(0, y, W, 1);
}

// ── END / RESET ───────────────────────────────────────────────
const overlay = document.getElementById('overlay');
const overlayInner = document.getElementById('overlayInner');
const ovTitle = document.getElementById('ovTitle');
const ovBody = document.getElementById('ovBody');
const ovStats = document.getElementById('ovStats');
const ovBtn = document.getElementById('ovBtn');

function endRun(win){
  if (state.ended) return;
  state.ended = true;
  state.endedWin = win;
  if (win){
    overlayInner.className = 'overlay-inner win';
    ovTitle.textContent = 'KITCHEN LIBERATED';
    ovBody.textContent  = 'the counter is yours. the pantry will follow.';
    sfx.win();
  } else {
    overlayInner.className = 'overlay-inner';
    ovTitle.textContent = 'CHASSIS DENTED';
    ovBody.textContent  = 'they cooled you off. regroup. heat up. lob again.';
    sfx.lose();
  }
  ovStats.textContent = 'SCORE ' + state.score + ' · WAVE ' + state.wave;
  ovBtn.textContent = win ? 'AGAIN' : 'TRY AGAIN';
  overlay.hidden = false;
}
ovBtn.addEventListener('click', () => { reset(); ensureAudio(); });

function reset(){
  state.ended = false;
  state.endedWin = false;
  state.score = 0;
  state.lives = state.livesMax;
  state.wave = 1;
  state.revenge = 0;
  state.revengeActive = false;
  state.iframes = 0;
  state.enemies = [];
  state.toasts = [];
  state.effects = [];
  state.liberated = [];
  state.player.x = 36;
  state.player.chargeT = 0;
  state.player.charging = false;
  overlay.hidden = true;
  startWave(1);
}

function toggleMute(){
  state.muted = !state.muted;
  document.getElementById('muteBtn').textContent = '♪ ' + (state.muted ? 'OFF' : 'ON');
  document.getElementById('muteBtn').setAttribute('aria-pressed', String(state.muted));
}
document.getElementById('muteBtn').addEventListener('click', toggleMute);
document.getElementById('resetBtn').addEventListener('click', () => { reset(); ensureAudio(); });

// ── MAIN LOOP ─────────────────────────────────────────────────
let lastTs = 0;
function loop(ts){
  if (!lastTs) lastTs = ts;
  const dt = Math.min(0.06, (ts - lastTs) / 1000);
  lastTs = ts;
  if (!state.ended){
    tickPlayer(dt);
    tickToasts(dt);
    tickEnemies(dt);
    tickEffects(dt);
    tickSpawner(dt);
  }
  render();
  refreshHud();
  requestAnimationFrame(loop);
}

// ── BOOT ──────────────────────────────────────────────────────
reset();
requestAnimationFrame(loop);
</script>
</body>
</html>
