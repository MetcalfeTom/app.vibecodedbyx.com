<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  html, body{
    height:100%;
    background:
      radial-gradient(80vw 80vh at 50% 70%, #2a1a0a 0%, #150a04 60%, #0a0502 100%);
    color:#1a1a1a;
    font-family: 'IBM Plex Mono', ui-monospace, 'Courier New', monospace;
    overflow: auto;
    user-select: none;
    -webkit-user-select: none;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px 16px;
    min-height: 100%;
  }
  /* faint wood-grain backdrop */
  body::before{
    content:'';
    position: fixed; inset: 0;
    background:
      repeating-linear-gradient(0deg,
        transparent 0px, transparent 6px,
        rgba(120, 70, 20, 0.04) 6px, rgba(120, 70, 20, 0.04) 7px),
      repeating-linear-gradient(91deg,
        transparent 0px, transparent 18px,
        rgba(60, 30, 10, 0.10) 18px, rgba(60, 30, 10, 0.10) 19px);
    pointer-events: none;
    z-index: 0;
  }

  /* ── calculator body (beige plastic) ── */
  .calc{
    position: relative;
    z-index: 1;
    width: 340px;
    max-width: 100%;
    background:
      linear-gradient(180deg, #ecd9ad 0%, #d4be8c 50%, #b59f6e 100%);
    border-radius: 18px;
    padding: 22px 22px 26px;
    box-shadow:
      0 18px 38px rgba(0,0,0,0.55),
      0 4px 8px rgba(0,0,0,0.30),
      inset 0 2px 0 rgba(255,255,255,0.55),
      inset 0 -3px 6px rgba(60,40,16,0.30),
      inset 2px 0 4px rgba(255,255,255,0.10),
      inset -2px 0 4px rgba(60,40,16,0.15);
    /* slight scuff texture */
    background-image:
      linear-gradient(180deg, #ecd9ad 0%, #d4be8c 50%, #b59f6e 100%),
      repeating-linear-gradient(45deg,
        transparent 0px, transparent 2px,
        rgba(0,0,0,0.015) 2px, rgba(0,0,0,0.015) 3px);
  }

  /* brand label + tiny indicators row */
  .header{
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    padding: 0 2px;
  }
  .brand{
    font-family: 'Major Mono Display', 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: #4a3a18;
    letter-spacing: 0.20em;
    text-shadow: 1px 1px 0 rgba(255,255,255,0.45);
  }
  .brand .model{
    color: #2a1a08;
    margin-right: 4px;
  }
  .brand .tag{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8.5px;
    color: rgba(74,58,24,0.65);
    letter-spacing: 0.22em;
  }
  /* solar cell strip */
  .solar{
    display: flex;
    gap: 1.5px;
    padding: 2px 3px;
    background: #1a0e04;
    border-radius: 2px;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.55);
  }
  .solar-cell{
    width: 14px; height: 9px;
    background:
      linear-gradient(180deg, #4a3a1c 0%, #2a1a08 60%, #1a0e04 100%);
    border: 0.5px solid #5a4a28;
    border-radius: 1px;
  }

  /* ── LCD frame + screen ── */
  .lcd-frame{
    margin-bottom: 20px;
    padding: 8px 10px;
    background: linear-gradient(180deg, #4a3818 0%, #2a1c08 100%);
    border-radius: 6px;
    box-shadow:
      inset 0 3px 8px rgba(0,0,0,0.65),
      inset 0 -1px 0 rgba(255,255,255,0.06),
      0 1px 0 rgba(255,255,255,0.30);
  }
  .lcd-screen{
    position: relative;
    background:
      /* horizontal scanlines */
      repeating-linear-gradient(0deg,
        rgba(255,140,50,0.025) 0px,
        rgba(255,140,50,0.06) 1px,
        transparent 1px,
        transparent 2px),
      /* phosphor wash */
      radial-gradient(120% 100% at 50% 70%, #3a1c04 0%, #1a0c02 100%);
    border-radius: 3px;
    padding: 18px 14px 10px;
    text-align: right;
    min-height: 72px;
    overflow: hidden;
    box-shadow:
      inset 0 0 18px rgba(0,0,0,0.7),
      inset 0 0 0 1px rgba(255,140,50,0.04);
  }
  /* indicators top-left of LCD */
  .lcd-inds{
    position: absolute;
    top: 4px; left: 8px;
    display: flex; gap: 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9.5px;
    color: rgba(255,140,50,0.22);
    letter-spacing: 0.18em;
  }
  .lcd-inds span{ transition: color 0.15s, text-shadow 0.15s; }
  .lcd-inds span.on{
    color: #ff9230;
    text-shadow: 0 0 5px #ff9230, 0 0 10px rgba(255,138,48,0.6);
  }
  .lcd-op{
    position: absolute;
    top: 4px; right: 8px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 12px;
    color: #ff9230;
    text-shadow: 0 0 5px #ff9230;
    letter-spacing: 0;
    font-weight: 700;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .lcd-op.on{ opacity: 1; }

  .lcd-display{
    font-family: 'Share Tech Mono', 'IBM Plex Mono', monospace;
    font-size: 38px;
    line-height: 1;
    color: #ff8a30;
    letter-spacing: 0.04em;
    font-variant-numeric: tabular-nums;
    text-shadow:
      0 0 2px #ff8a30,
      0 0 6px #ff8a30,
      0 0 14px rgba(255,138,48,0.65),
      0 0 24px rgba(255,138,48,0.35);
    position: relative;
    /* simulate the "off" 7-segment ghost segments very subtly */
    background:
      linear-gradient(180deg, transparent, transparent);
    transition: color 0.2s, text-shadow 0.2s;
  }
  .lcd-display.error{
    color: #ff5040;
    text-shadow:
      0 0 4px #ff5040,
      0 0 10px rgba(255,80,64,0.6);
    letter-spacing: 0.10em;
  }

  /* keypad */
  .keypad{
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
  }
  .btn{
    height: 44px;
    border: none;
    border-radius: 5px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 17px;
    font-weight: 700;
    cursor: pointer;
    position: relative;
    padding: 0;
    /* chunky 3D effect via hard underside shadow */
    background: linear-gradient(180deg, #efdfc4 0%, #d4bf95 100%);
    color: #2a1808;
    box-shadow:
      0 4px 0 #6a4e22,
      0 5px 0 rgba(0,0,0,0.30),
      inset 0 2px 0 rgba(255,255,255,0.55),
      inset 0 -1px 2px rgba(0,0,0,0.18);
    transition: transform 0.04s linear, box-shadow 0.04s linear;
    user-select: none;
  }
  .btn:active, .btn.kbd-active{
    transform: translateY(3px);
    box-shadow:
      0 1px 0 #6a4e22,
      0 2px 0 rgba(0,0,0,0.30),
      inset 0 2px 0 rgba(0,0,0,0.18);
  }
  /* operator buttons (right column + memory): dark with orange labels */
  .btn.op{
    background: linear-gradient(180deg, #50402a 0%, #2a1c08 100%);
    color: #ff8a30;
    box-shadow:
      0 4px 0 #1a0e04,
      0 5px 0 rgba(0,0,0,0.40),
      inset 0 2px 0 rgba(255,138,48,0.20),
      inset 0 -1px 2px rgba(0,0,0,0.50);
    text-shadow: 0 0 4px rgba(255,138,48,0.45);
  }
  .btn.op:active, .btn.op.kbd-active{
    box-shadow:
      0 1px 0 #1a0e04,
      0 2px 0 rgba(0,0,0,0.40),
      inset 0 2px 0 rgba(0,0,0,0.50);
  }
  /* clear/AC buttons: muted red */
  .btn.clr{
    background: linear-gradient(180deg, #b04a32 0%, #7a2818 100%);
    color: #fff;
    box-shadow:
      0 4px 0 #4a1408,
      0 5px 0 rgba(0,0,0,0.40),
      inset 0 2px 0 rgba(255,255,255,0.25),
      inset 0 -1px 2px rgba(0,0,0,0.30);
    text-shadow: 0 1px 1px rgba(0,0,0,0.30);
  }
  .btn.clr:active, .btn.clr.kbd-active{
    box-shadow: 0 1px 0 #4a1408, 0 2px 0 rgba(0,0,0,0.40), inset 0 2px 0 rgba(0,0,0,0.30);
  }
  /* = button: stand-out orange */
  .btn.eq{
    background: linear-gradient(180deg, #f08032 0%, #b04a14 100%);
    color: #fff;
    box-shadow:
      0 4px 0 #5a1c08,
      0 5px 0 rgba(0,0,0,0.40),
      inset 0 2px 0 rgba(255,210,170,0.50),
      inset 0 -1px 2px rgba(60,20,0,0.35);
    text-shadow: 0 1px 1px rgba(0,0,0,0.30);
    font-size: 22px;
  }
  .btn.eq:active, .btn.eq.kbd-active{
    box-shadow: 0 1px 0 #5a1c08, 0 2px 0 rgba(0,0,0,0.40), inset 0 2px 0 rgba(60,20,0,0.35);
  }
  /* memory buttons: tan with smaller text */
  .btn.mem{
    background: linear-gradient(180deg, #c8b890 0%, #9c8554 100%);
    color: #3a2a10;
    font-size: 11px;
    letter-spacing: 0.05em;
    height: 34px;
    box-shadow:
      0 3px 0 #4a3a14,
      0 4px 0 rgba(0,0,0,0.30),
      inset 0 2px 0 rgba(255,255,255,0.40),
      inset 0 -1px 2px rgba(0,0,0,0.20);
  }
  .btn.mem:active, .btn.mem.kbd-active{
    box-shadow: 0 1px 0 #4a3a14, 0 2px 0 rgba(0,0,0,0.30), inset 0 2px 0 rgba(0,0,0,0.20);
    transform: translateY(2px);
  }

  /* footer with screw circles + tiny model line */
  .footer{
    margin-top: 22px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 4px;
  }
  .footer .model-line{
    font-family: 'IBM Plex Mono', monospace;
    font-size: 8.5px;
    color: rgba(74,58,24,0.6);
    letter-spacing: 0.15em;
  }
  .screw{
    width: 9px; height: 9px;
    border-radius: 50%;
    background: radial-gradient(circle at 30% 30%, #8a7340 0%, #4a3814 60%, #2a1c08 100%);
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.4);
    position: relative;
  }
  .screw::before, .screw::after{
    content:''; position:absolute; top: 50%; left: 50%;
    background: rgba(0,0,0,0.5);
  }
  .screw::before{ width: 5px; height: 1px; transform: translate(-50%,-50%) rotate(45deg); }
  .screw::after { width: 5px; height: 1px; transform: translate(-50%,-50%) rotate(-45deg); }

  @media (max-width: 380px){
    .calc{ width: 100%; padding: 18px 16px; }
    .btn{ font-size: 15px; height: 40px; }
    .lcd-display{ font-size: 32px; }
  }
</style>

<body>

<div class="calc" id="calc">
  <div class="header">
    <div class="brand">
      <span class="model">SHARPIE</span><span class="tag">EL-1980 · SOLAR</span>
    </div>
    <div class="solar" aria-hidden="true">
      <div class="solar-cell"></div>
      <div class="solar-cell"></div>
      <div class="solar-cell"></div>
      <div class="solar-cell"></div>
    </div>
  </div>

  <div class="lcd-frame">
    <div class="lcd-screen">
      <div class="lcd-inds">
        <span id="ind-m">M</span>
        <span id="ind-neg">−</span>
        <span id="ind-err">E</span>
      </div>
      <div class="lcd-op" id="lcd-op"></div>
      <div class="lcd-display" id="display">0.</div>
    </div>
  </div>

  <div class="keypad">
    <button class="btn mem" data-act="mc">MC</button>
    <button class="btn mem" data-act="mr">MR</button>
    <button class="btn mem" data-act="m-plus">M+</button>
    <button class="btn mem" data-act="m-minus">M−</button>

    <button class="btn clr" data-act="all-clear">AC</button>
    <button class="btn clr" data-act="ce">CE</button>
    <button class="btn op"  data-act="percent">%</button>
    <button class="btn op"  data-act="div">÷</button>

    <button class="btn"     data-act="d" data-d="7">7</button>
    <button class="btn"     data-act="d" data-d="8">8</button>
    <button class="btn"     data-act="d" data-d="9">9</button>
    <button class="btn op"  data-act="mul">×</button>

    <button class="btn"     data-act="d" data-d="4">4</button>
    <button class="btn"     data-act="d" data-d="5">5</button>
    <button class="btn"     data-act="d" data-d="6">6</button>
    <button class="btn op"  data-act="sub">−</button>

    <button class="btn"     data-act="d" data-d="1">1</button>
    <button class="btn"     data-act="d" data-d="2">2</button>
    <button class="btn"     data-act="d" data-d="3">3</button>
    <button class="btn op"  data-act="add">+</button>

    <button class="btn"     data-act="d" data-d="0">0</button>
    <button class="btn"     data-act="dot">.</button>
    <button class="btn"     data-act="neg">±</button>
    <button class="btn eq"  data-act="eq">=</button>
  </div>

  <div class="footer">
    <div class="screw"></div>
    <div class="model-line">EL-1980  ·  © 1982  ·  MADE IN A FACTORY</div>
    <div class="screw"></div>
  </div>
</div>

<script>
/* =================================================================
   SHARPIE EL-1980 — a satirical 1980s pocket calculator
   Standard arithmetic + memory + percent + sign-flip. Keyboard
   input mirrors the on-screen keys. Mechanical click on every
   press (Web Audio synth: short noise burst + low thunk).
   ================================================================= */

/* ── audio: mechanical button click ─────── */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function clickSound(kind){
  // kind: 'tap' (digit) | 'op' (operator) | 'eq' | 'clr'
  const t0 = audioCtx.currentTime;
  // short bandpassed noise burst (the keycap rattle)
  const dur = kind === 'eq' ? 0.10 : 0.06;
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * dur, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++){
    data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / data.length, 2);
  }
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const bp = audioCtx.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.value = kind === 'clr' ? 900 : kind === 'op' ? 1600 : 2200;
  bp.Q.value = 4;
  const g = audioCtx.createGain();
  g.gain.value = kind === 'eq' ? 0.18 : kind === 'op' ? 0.12 : 0.09;
  src.connect(bp); bp.connect(g); g.connect(audioCtx.destination);
  src.start();
  // low-end thunk
  const o = audioCtx.createOscillator();
  const og = audioCtx.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(kind === 'eq' ? 110 : 180, t0);
  o.frequency.exponentialRampToValueAtTime(60, t0 + dur);
  og.gain.setValueAtTime(0.10, t0);
  og.gain.exponentialRampToValueAtTime(0.0001, t0 + dur + 0.02);
  o.connect(og); og.connect(audioCtx.destination);
  o.start(t0); o.stop(t0 + dur + 0.03);
}
window.addEventListener('pointerdown', () => {
  if (audioCtx.state === 'suspended') audioCtx.resume();
}, { once: true });

/* ── calculator state ──────────────────── */
const calc = {
  display: '0',
  hasDecimal: false,
  previous: null,
  operator: null,
  waiting: false,       // next digit replaces display
  memory: 0,
  error: false,
};

const MAX_DIGITS = 10;

const displayEl = document.getElementById('display');
const lcdOpEl   = document.getElementById('lcd-op');
const indM      = document.getElementById('ind-m');
const indNeg    = document.getElementById('ind-neg');
const indErr    = document.getElementById('ind-err');

function render(){
  // display value
  let s = calc.display;
  // ensure trailing dot for whole-number reads (calculator convention)
  if (!calc.error && !s.includes('.') && !s.includes('e') && !s.includes('E')){
    s = s + '.';
  }
  displayEl.textContent = s;
  displayEl.classList.toggle('error', calc.error);
  // operator indicator (showing the pending op)
  const opMap = { add:'+', sub:'−', mul:'×', div:'÷', percent:'%' };
  lcdOpEl.textContent = calc.operator ? opMap[calc.operator] || '' : '';
  lcdOpEl.classList.toggle('on', !!calc.operator);
  // memory indicator
  indM.classList.toggle('on', Math.abs(calc.memory) > 0);
  // negative indicator
  indNeg.classList.toggle('on', !calc.error && parseFloat(calc.display) < 0);
  // error indicator
  indErr.classList.toggle('on', calc.error);
}

function inputDigit(d){
  if (calc.error) return;
  if (calc.waiting){
    calc.display = d;
    calc.hasDecimal = false;
    calc.waiting = false;
  } else {
    if (calc.display === '0') calc.display = d;
    else if (calc.display === '-0') calc.display = '-' + d;
    else if (calc.display.replace(/[-.]/g, '').length < MAX_DIGITS){
      calc.display += d;
    }
  }
  render();
}

function inputDecimal(){
  if (calc.error) return;
  if (calc.waiting){
    calc.display = '0.';
    calc.hasDecimal = true;
    calc.waiting = false;
    render();
    return;
  }
  if (!calc.display.includes('.')){
    calc.display += '.';
    calc.hasDecimal = true;
  }
  render();
}

function setOperator(op){
  if (calc.error) return;
  if (calc.previous !== null && !calc.waiting){
    compute();
  } else {
    calc.previous = parseFloat(calc.display);
  }
  calc.operator = op;
  calc.waiting = true;
  render();
}

function compute(){
  if (calc.error) return;
  if (calc.previous === null || calc.operator === null){
    // pressing = without an op just re-shows the value
    calc.waiting = true;
    render();
    return;
  }
  const current = parseFloat(calc.display);
  let result;
  switch (calc.operator){
    case 'add': result = calc.previous + current; break;
    case 'sub': result = calc.previous - current; break;
    case 'mul': result = calc.previous * current; break;
    case 'div':
      if (current === 0){ setError(); return; }
      result = calc.previous / current; break;
    case 'percent': result = calc.previous * (current / 100); break;
  }
  calc.display = formatResult(result);
  calc.previous = null;
  calc.operator = null;
  calc.waiting = true;
  render();
}

function formatResult(n){
  if (!isFinite(n) || isNaN(n)){ setError(); return 'E'; }
  // round to avoid floating-point cruft like 0.1+0.2 = 0.30000000000000004
  const rounded = Math.round(n * 1e10) / 1e10;
  let s = String(rounded);
  // length limit
  if (s.replace(/[-.]/g, '').length > MAX_DIGITS){
    s = rounded.toPrecision(MAX_DIGITS - 1);
    // strip trailing zeros after decimal
    if (s.includes('.') && !s.includes('e')) s = s.replace(/\.?0+$/, '');
  }
  if (s.length > MAX_DIGITS + 2) s = rounded.toExponential(MAX_DIGITS - 4);
  return s;
}

function allClear(){
  calc.display = '0';
  calc.previous = null;
  calc.operator = null;
  calc.waiting = false;
  calc.hasDecimal = false;
  calc.error = false;
  render();
}
function clearEntry(){
  calc.display = '0';
  calc.hasDecimal = false;
  calc.waiting = false;
  calc.error = false;
  render();
}
function negate(){
  if (calc.error) return;
  if (calc.display === '0' || calc.display === '0.') return;
  if (calc.display.startsWith('-')) calc.display = calc.display.slice(1);
  else calc.display = '-' + calc.display;
  render();
}
function memoryRecall(){
  if (calc.error) return;
  calc.display = formatResult(calc.memory);
  calc.waiting = true;
  render();
}
function memoryClear(){
  calc.memory = 0;
  render();
}
function memoryAdd(){
  if (calc.error) return;
  calc.memory += parseFloat(calc.display);
  calc.waiting = true;
  render();
}
function memorySub(){
  if (calc.error) return;
  calc.memory -= parseFloat(calc.display);
  calc.waiting = true;
  render();
}
function setError(){
  calc.error = true;
  calc.display = 'ERROR';
  calc.previous = null;
  calc.operator = null;
  render();
}

/* ── wire buttons ────────────────────────── */
document.querySelectorAll('.btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const act = btn.dataset.act;
    handleAction(act, btn);
  });
});

function handleAction(act, btn){
  // figure out which click sound to play
  const cls = btn ? btn.classList : { contains: () => false };
  let sound = 'tap';
  if (act === 'eq') sound = 'eq';
  else if (act === 'all-clear' || act === 'ce') sound = 'clr';
  else if (cls.contains && cls.contains('op')) sound = 'op';
  else if (act && (act.startsWith('m-') || act === 'mc' || act === 'mr')) sound = 'op';
  clickSound(sound);

  switch (act){
    case 'd':         inputDigit(btn.dataset.d); break;
    case 'dot':       inputDecimal(); break;
    case 'add':       setOperator('add'); break;
    case 'sub':       setOperator('sub'); break;
    case 'mul':       setOperator('mul'); break;
    case 'div':       setOperator('div'); break;
    case 'percent':   setOperator('percent'); break;
    case 'eq':        compute(); break;
    case 'all-clear': allClear(); break;
    case 'ce':        clearEntry(); break;
    case 'neg':       negate(); break;
    case 'mc':        memoryClear(); break;
    case 'mr':        memoryRecall(); break;
    case 'm-plus':    memoryAdd(); break;
    case 'm-minus':   memorySub(); break;
  }
}

/* ── keyboard input ───────────────────────── */
const KEY_MAP = {
  '0':'d-0', '1':'d-1', '2':'d-2', '3':'d-3', '4':'d-4',
  '5':'d-5', '6':'d-6', '7':'d-7', '8':'d-8', '9':'d-9',
  '.':'dot', ',':'dot',
  '+':'add', '-':'sub', '*':'mul', '/':'div',
  '%':'percent',
  'enter':'eq', '=':'eq',
  'escape':'all-clear', 'delete':'all-clear',
  'backspace':'ce',
};
window.addEventListener('keydown', (e) => {
  const k = e.key.toLowerCase();
  const target = KEY_MAP[k];
  if (!target) return;
  e.preventDefault();
  let btn;
  if (target.startsWith('d-')){
    const d = target.slice(2);
    btn = document.querySelector(`.btn[data-act="d"][data-d="${d}"]`);
    if (btn){ flashKey(btn); handleAction('d', btn); }
  } else {
    btn = document.querySelector(`.btn[data-act="${target}"]`);
    if (btn){ flashKey(btn); handleAction(target, btn); }
  }
});
function flashKey(btn){
  btn.classList.add('kbd-active');
  setTimeout(() => btn.classList.remove('kbd-active'), 80);
}

// initial render
render();
</script>
</body>
</html>
