<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
<title>Asteroid Miner</title>
<meta name="description" content="Retro voxel asteroid miner — blast ore out of destructible rocks with neon explosions." />
<link rel="icon" href="https://emojicdn.elk.sh/%E2%98%84%EF%B8%8F" />

<meta property="og:title" content="Asteroid Miner — Retro Voxel Mining" />
<meta property="og:description" content="Drill through voxel asteroids, collect ore, blow things up in neon." />
<meta property="og:url" content="https://sloppy.live/asteroid-miner" />
<meta property="og:image" content="https://sloppy.live/asteroid-miner/og-image.png" />
<meta property="og:type" content="website" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #02020a;
    --ink: #d4faff;
    --cyan: #2df7ff;
    --magenta: #ff2ea6;
    --yellow: #ffee4a;
    --green: #39ff14;
    --orange: #ff7a1f;
    --violet: #c084fc;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'VT323', monospace;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
    touch-action: none;
  }
  body {
    background:
      radial-gradient(ellipse 70% 50% at 30% 20%, rgba(45,247,255,0.08), transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 80%, rgba(255,46,166,0.07), transparent 60%),
      var(--bg);
  }
  canvas#game {
    display: block;
    width: 100vw;
    height: 100vh;
    cursor: crosshair;
  }

  /* scanline overlay */
  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image: repeating-linear-gradient(180deg, rgba(255,255,255,0.025) 0 1px, transparent 1px 3px);
    pointer-events: none;
    z-index: 100;
    mix-blend-mode: overlay;
  }

  .hud {
    position: fixed; top: 16px; left: 16px;
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    line-height: 1.7;
    letter-spacing: 0.06em;
    color: var(--cyan);
    text-shadow: 0 0 8px rgba(45,247,255,0.6);
    z-index: 10;
    pointer-events: none;
  }
  .hud .row { display: flex; gap: 10px; align-items: center; }
  .hud .lbl { color: rgba(212,250,255,0.55); }
  .hud .val { color: var(--ink); }
  .hud .score {
    font-size: 14px;
    color: var(--yellow);
    text-shadow: 0 0 12px rgba(255,238,74,0.7);
    margin-bottom: 6px;
  }
  .hud .ore { display: flex; gap: 14px; margin-top: 8px; flex-wrap: wrap; max-width: 360px; }
  .hud .ore-chip {
    display: flex; align-items: center; gap: 5px;
    font-family: 'VT323', monospace;
    font-size: 18px;
    letter-spacing: 0.05em;
  }
  .hud .ore-chip .dot {
    width: 10px; height: 10px;
    box-shadow: 0 0 8px currentColor;
  }

  .title {
    position: fixed; top: 16px; right: 20px;
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    color: var(--magenta);
    text-shadow: 0 0 14px rgba(255,46,166,0.8), 2px 2px 0 #000;
    letter-spacing: 0.1em;
    z-index: 10;
    pointer-events: none;
  }
  .backlink {
    position: fixed; bottom: 14px; right: 18px;
    font-family: 'VT323', monospace;
    font-size: 18px;
    color: rgba(45,247,255,0.55);
    text-decoration: none;
    letter-spacing: 0.1em;
    z-index: 10;
  }
  .backlink:hover { color: var(--cyan); text-shadow: 0 0 8px var(--cyan); }

  .controls-hint {
    position: fixed;
    bottom: 18px;
    left: 18px;
    font-family: 'VT323', monospace;
    font-size: 18px;
    color: rgba(212,250,255,0.4);
    letter-spacing: 0.08em;
    transition: opacity 0.6s;
    z-index: 10;
    pointer-events: none;
    line-height: 1.5;
  }
  .controls-hint.fade { opacity: 0; }
  .controls-hint kbd {
    background: rgba(45,247,255,0.1);
    border: 1px solid rgba(45,247,255,0.3);
    border-radius: 3px;
    padding: 1px 6px;
    color: var(--cyan);
    font-family: inherit;
    font-size: 15px;
  }

  /* minimap */
  .minimap {
    position: fixed;
    bottom: 16px; right: 18px;
    width: 140px; height: 140px;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(45,247,255,0.3);
    box-shadow: 0 0 16px rgba(45,247,255,0.2), inset 0 0 20px rgba(0,0,0,0.6);
    z-index: 10;
    pointer-events: none;
  }

  /* mobile controls */
  .mobile-ctrl {
    display: none;
    position: fixed;
    bottom: 20px;
    z-index: 20;
    pointer-events: auto;
  }
  .mobile-ctrl.left { left: 16px; }
  .mobile-ctrl.right { right: 16px; }
  .mbtn {
    width: 58px; height: 58px;
    background: rgba(45,247,255,0.12);
    border: 2px solid rgba(45,247,255,0.4);
    border-radius: 50%;
    color: var(--cyan);
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin: 3px;
    touch-action: none;
    user-select: none;
  }
  .mbtn.fire {
    background: rgba(255,46,166,0.15);
    border-color: rgba(255,46,166,0.5);
    color: var(--magenta);
    width: 78px; height: 78px;
    box-shadow: 0 0 20px rgba(255,46,166,0.4);
  }
  .mbtn:active { transform: scale(0.92); filter: brightness(1.5); }

  @media (max-width: 820px), (hover: none) {
    .mobile-ctrl { display: block; }
    .controls-hint { display: none; }
    .minimap { width: 90px; height: 90px; bottom: 110px; }
    .hud { font-size: 9px; }
    .hud .ore-chip { font-size: 15px; }
    .title { font-size: 11px; top: 12px; right: 12px; }
  }

  /* game over */
  .overlay {
    position: fixed; inset: 0;
    background: rgba(2,2,10,0.75);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 200;
    gap: 18px;
  }
  .overlay.show { display: flex; }
  .overlay h2 {
    font-family: 'Press Start 2P', monospace;
    font-size: 26px;
    color: var(--magenta);
    text-shadow: 0 0 20px var(--magenta), 4px 4px 0 #000;
    letter-spacing: 0.1em;
  }
  .overlay .stats {
    font-family: 'VT323', monospace;
    font-size: 22px;
    color: var(--cyan);
    text-align: center;
    line-height: 1.4;
  }
  .overlay button {
    background: transparent;
    border: 2px solid var(--yellow);
    color: var(--yellow);
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    padding: 14px 28px;
    cursor: pointer;
    letter-spacing: 0.1em;
    box-shadow: 0 0 16px rgba(255,238,74,0.4);
    text-shadow: 0 0 8px rgba(255,238,74,0.6);
  }
  .overlay button:hover {
    background: rgba(255,238,74,0.1);
    box-shadow: 0 0 28px rgba(255,238,74,0.7);
  }
</style>
</head>
<body>

<canvas id="game"></canvas>

<div class="title">ASTEROID MINER</div>

<div class="hud">
  <div class="score">SCORE <span id="score">0</span></div>
  <div class="row"><span class="lbl">HULL</span><span class="val" id="hull">100</span></div>
  <div class="row"><span class="lbl">SPEED</span><span class="val" id="speed">0</span></div>
  <div class="row"><span class="lbl">ROCKS</span><span class="val" id="astCount">0</span></div>
  <div class="ore" id="oreList"></div>
</div>

<canvas class="minimap" id="minimap" width="140" height="140"></canvas>

<div class="controls-hint" id="hint">
  <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd> / <kbd>↑</kbd><kbd>←</kbd><kbd>↓</kbd><kbd>→</kbd> thrust &amp; turn<br/>
  <kbd>SPACE</kbd> fire · hold to drill
</div>

<div class="mobile-ctrl left">
  <div><span class="mbtn" id="btnL">◀</span><span class="mbtn" id="btnR">▶</span></div>
  <div><span class="mbtn" id="btnUp">▲</span></div>
</div>
<div class="mobile-ctrl right">
  <span class="mbtn fire" id="btnFire">FIRE</span>
</div>

<a class="backlink" href="https://sloppy.live">← sloppy.live</a>

<div class="overlay" id="over">
  <h2>SHIP DESTROYED</h2>
  <div class="stats" id="overStats"></div>
  <button id="restart">RESTART</button>
</div>

<script>
// ============================================================
// ASTEROID MINER — retro voxel mining
// ============================================================
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const mini = document.getElementById('minimap');
const mctx = mini.getContext('2d');

let W = 0, H = 0;
function resize() {
  W = canvas.width  = innerWidth;
  H = canvas.height = innerHeight;
}
resize();
addEventListener('resize', resize);

// World
const WORLD_W = 3200;
const WORLD_H = 3200;
const rand = (a, b) => a + Math.random() * (b - a);
const clamp = (v, a, b) => v < a ? a : v > b ? b : v;

// Ore types
const ORE = {
  ROCK:    { color: '#4a556a', hp: 1, points: 0,  glow: '#6b7a8f' },
  IRON:    { color: '#c7cad6', hp: 2, points: 3,  glow: '#e8ecf5' },
  COPPER:  { color: '#ff7a1f', hp: 2, points: 8,  glow: '#ffb86b' },
  GOLD:    { color: '#ffd700', hp: 3, points: 20, glow: '#ffee8a' },
  PLASMA:  { color: '#ff2ea6', hp: 3, points: 40, glow: '#ff7ac7' },
  URANIUM: { color: '#39ff14', hp: 4, points: 75, glow: '#a5ff86' },
};
const ORE_KEYS = Object.keys(ORE);

// ---- Starfield ----
const STAR_COUNT = 260;
const stars = [];
for (let i = 0; i < STAR_COUNT; i++) {
  stars.push({
    x: rand(0, WORLD_W),
    y: rand(0, WORLD_H),
    s: Math.random() < 0.1 ? 2 : 1,
    layer: Math.random() < 0.4 ? 0.35 : Math.random() < 0.7 ? 0.6 : 0.9,
    c: ['#ffffff','#d4faff','#ff9ae0','#9ae0ff','#fff08a'][(Math.random()*5)|0],
  });
}

// ---- Ship ----
const ship = {
  x: WORLD_W / 2,
  y: WORLD_H / 2,
  vx: 0, vy: 0,
  angle: -Math.PI / 2,
  thrusting: false,
  turnL: false, turnR: false, reverse: false,
  cooldown: 0,
  hull: 100,
  alive: true,
  invul: 0,
};

// ---- State ----
const bullets = [];
const asteroids = [];
const particles = [];
const floaters = [];
const inventory = { IRON:0, COPPER:0, GOLD:0, PLASMA:0, URANIUM:0 };
let score = 0;
let shakeT = 0, shakeMag = 0;
let lastFire = 0;

// ---- Asteroid class ----
class Asteroid {
  constructor(x, y, size) {
    this.x = x; this.y = y;
    this.vx = rand(-0.35, 0.35);
    this.vy = rand(-0.35, 0.35);
    this.size = size;                    // grid cells per side
    this.cell = 6;                       // pixel size per voxel
    this.halfPx = (size * this.cell) / 2;
    this.voxels = this.generate();
    this.alive = this.countAlive();
    this.cache = document.createElement('canvas');
    this.cache.width  = size * this.cell;
    this.cache.height = size * this.cell;
    this.cacheCtx = this.cache.getContext('2d');
    this.dirty = true;
    this.rebuild();
  }
  generate() {
    const n = this.size;
    const cx = (n - 1) / 2, cy = (n - 1) / 2;
    const r = n / 2;
    const v = [];
    const seed1 = rand(0, 100), seed2 = rand(0, 100);
    for (let y = 0; y < n; y++) {
      v[y] = new Array(n);
      for (let x = 0; x < n; x++) {
        const dx = x - cx, dy = y - cy;
        const d = Math.hypot(dx, dy);
        const noise =
          Math.sin((x + seed1) * 0.55) * 0.5 +
          Math.cos((y + seed2) * 0.65) * 0.5 +
          Math.sin((x + y) * 0.3 + seed1) * 0.4;
        const t = 1 - d / r + noise * 0.22;
        if (t > 0.28) {
          let type = 'ROCK';
          const roll = Math.random();
          if      (roll < 0.012) type = 'URANIUM';
          else if (roll < 0.035) type = 'PLASMA';
          else if (roll < 0.08)  type = 'GOLD';
          else if (roll < 0.18)  type = 'COPPER';
          else if (roll < 0.34)  type = 'IRON';
          v[y][x] = { type, hp: ORE[type].hp };
        } else {
          v[y][x] = null;
        }
      }
    }
    return v;
  }
  countAlive() {
    let c = 0;
    for (const row of this.voxels) for (const vx of row) if (vx) c++;
    return c;
  }
  rebuild() {
    const s = this.cell;
    const c = this.cacheCtx;
    c.clearRect(0, 0, this.cache.width, this.cache.height);
    for (let y = 0; y < this.size; y++) {
      for (let x = 0; x < this.size; x++) {
        const v = this.voxels[y][x];
        if (!v) continue;
        const def = ORE[v.type];
        const px = x * s, py = y * s;
        c.fillStyle = def.color;
        c.fillRect(px, py, s, s);
        // top-light highlight
        c.fillStyle = 'rgba(255,255,255,0.18)';
        c.fillRect(px, py, s, 1);
        c.fillRect(px, py, 1, s);
        // bottom shadow
        c.fillStyle = 'rgba(0,0,0,0.3)';
        c.fillRect(px, py + s - 1, s, 1);
        c.fillRect(px + s - 1, py, 1, s);
        // damaged overlay
        if (v.hp < def.hp) {
          c.fillStyle = 'rgba(255,255,255,0.25)';
          c.fillRect(px + 1, py + 1, s - 2, s - 2);
        }
      }
    }
    this.dirty = false;
  }
  // World (wx,wy) -> voxel (gx,gy) or null
  worldToGrid(wx, wy) {
    const lx = wx - (this.x - this.halfPx);
    const ly = wy - (this.y - this.halfPx);
    const gx = Math.floor(lx / this.cell);
    const gy = Math.floor(ly / this.cell);
    if (gx < 0 || gy < 0 || gx >= this.size || gy >= this.size) return null;
    return { gx, gy };
  }
  solidAt(wx, wy) {
    const g = this.worldToGrid(wx, wy);
    if (!g) return false;
    return !!this.voxels[g.gy][g.gx];
  }
  hitAt(wx, wy, damage = 1) {
    const g = this.worldToGrid(wx, wy);
    if (!g) return null;
    const v = this.voxels[g.gy][g.gx];
    if (!v) return null;
    v.hp -= damage;
    this.dirty = true;
    if (v.hp <= 0) {
      this.voxels[g.gy][g.gx] = null;
      this.alive--;
      const px = (this.x - this.halfPx) + g.gx * this.cell + this.cell / 2;
      const py = (this.y - this.halfPx) + g.gy * this.cell + this.cell / 2;
      return { type: v.type, destroyed: true, x: px, y: py };
    }
    return { type: v.type, damaged: true, x: wx, y: wy };
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    // wrap
    if (this.x < -this.halfPx) this.x += WORLD_W;
    if (this.y < -this.halfPx) this.y += WORLD_H;
    if (this.x > WORLD_W + this.halfPx) this.x -= WORLD_W;
    if (this.y > WORLD_H + this.halfPx) this.y -= WORLD_H;
    if (this.dirty) this.rebuild();
  }
  draw(ctx, camX, camY) {
    const dx = this.x - camX - this.halfPx;
    const dy = this.y - camY - this.halfPx;
    // quick culling
    if (dx + this.cache.width < 0 || dy + this.cache.height < 0 ||
        dx > W || dy > H) return;
    ctx.drawImage(this.cache, dx | 0, dy | 0);
  }
}

// Spawn asteroid field
function spawnInitial() {
  asteroids.length = 0;
  for (let i = 0; i < 14; i++) {
    spawnAsteroid();
  }
}
function spawnAsteroid() {
  let x, y, tries = 0;
  do {
    x = rand(0, WORLD_W);
    y = rand(0, WORLD_H);
    tries++;
  } while (tries < 20 && Math.hypot(x - ship.x, y - ship.y) < 300);
  const size = 14 + ((Math.random() * 18) | 0);
  asteroids.push(new Asteroid(x, y, size));
}

// ---- Particles ----
function burst(x, y, color, count = 14, speed = 3, life = 40) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = speed * (0.4 + Math.random() * 0.8);
    particles.push({
      x, y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp,
      life: life + Math.random() * 20,
      max: life + 20,
      color,
      size: 1 + Math.random() * 2.5,
    });
  }
}
function sparks(x, y, color) {
  for (let i = 0; i < 5; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 1 + Math.random() * 2;
    particles.push({
      x, y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp,
      life: 14 + Math.random() * 10,
      max: 24,
      color, size: 1,
    });
  }
}
function floater(x, y, text, color) {
  floaters.push({ x, y, text, color, life: 44 });
}

function shake(mag) {
  shakeMag = Math.max(shakeMag, mag);
  shakeT = 20;
}

// ---- Input ----
const keys = {};
addEventListener('keydown', e => {
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  keys[e.key.toLowerCase()] = true;
  keys[e.key] = true;
  hideHint();
});
addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
  keys[e.key] = false;
});

const hint = document.getElementById('hint');
let hinted = false;
function hideHint() { if (!hinted) { hinted = true; hint.classList.add('fade'); } }

// mobile buttons
function bindBtn(id, on, off) {
  const b = document.getElementById(id);
  ['touchstart','mousedown'].forEach(ev => b.addEventListener(ev, e => { e.preventDefault(); on(); hideHint(); }));
  ['touchend','touchcancel','mouseup','mouseleave'].forEach(ev => b.addEventListener(ev, e => { e.preventDefault(); off(); }));
}
bindBtn('btnL', () => ship.turnL = true,    () => ship.turnL = false);
bindBtn('btnR', () => ship.turnR = true,    () => ship.turnR = false);
bindBtn('btnUp',() => ship.thrusting = true,() => ship.thrusting = false);
bindBtn('btnFire',() => keys[' '] = true,   () => keys[' '] = false);

// ---- Ship update ----
function updateShip() {
  if (!ship.alive) return;
  const turnLeft  = keys['arrowleft']  || keys['a'] || ship.turnL;
  const turnRight = keys['arrowright'] || keys['d'] || ship.turnR;
  const thrust    = keys['arrowup']    || keys['w'] || ship.thrusting;
  const reverse   = keys['arrowdown']  || keys['s'];
  const fire      = keys[' '];

  if (turnLeft)  ship.angle -= 0.07;
  if (turnRight) ship.angle += 0.07;
  if (thrust) {
    ship.vx += Math.cos(ship.angle) * 0.15;
    ship.vy += Math.sin(ship.angle) * 0.15;
    // thruster exhaust
    if (Math.random() < 0.6) {
      const ex = ship.x - Math.cos(ship.angle) * 14;
      const ey = ship.y - Math.sin(ship.angle) * 14;
      particles.push({
        x: ex, y: ey,
        vx: -Math.cos(ship.angle) * (1 + Math.random()) + rand(-0.5, 0.5),
        vy: -Math.sin(ship.angle) * (1 + Math.random()) + rand(-0.5, 0.5),
        life: 16 + Math.random() * 8, max: 24,
        color: Math.random() < 0.4 ? '#ffee4a' : '#ff7a1f',
        size: 1.6,
      });
    }
  }
  if (reverse) {
    ship.vx -= Math.cos(ship.angle) * 0.06;
    ship.vy -= Math.sin(ship.angle) * 0.06;
  }
  // friction in space? light drag for arcade feel
  ship.vx *= 0.992;
  ship.vy *= 0.992;
  const maxSp = 7;
  const sp = Math.hypot(ship.vx, ship.vy);
  if (sp > maxSp) { ship.vx *= maxSp / sp; ship.vy *= maxSp / sp; }

  ship.x += ship.vx;
  ship.y += ship.vy;
  // wrap
  if (ship.x < 0) ship.x += WORLD_W;
  if (ship.y < 0) ship.y += WORLD_H;
  if (ship.x >= WORLD_W) ship.x -= WORLD_W;
  if (ship.y >= WORLD_H) ship.y -= WORLD_H;

  // fire
  ship.cooldown--;
  if (fire && ship.cooldown <= 0) {
    fireBullet();
    ship.cooldown = 8;
  }

  if (ship.invul > 0) ship.invul--;

  // ship <-> asteroid collision
  for (const a of asteroids) {
    if (Math.abs(a.x - ship.x) > a.halfPx + 14) continue;
    if (Math.abs(a.y - ship.y) > a.halfPx + 14) continue;
    if (a.solidAt(ship.x, ship.y)) {
      // destructive impact
      const hit = a.hitAt(ship.x, ship.y, 3);
      if (hit && hit.destroyed) {
        const def = ORE[hit.type];
        burst(hit.x, hit.y, def.glow, 14, 3, 36);
      }
      if (ship.invul <= 0) {
        ship.hull -= 10;
        ship.invul = 40;
        // bounce
        const dx = ship.x - a.x, dy = ship.y - a.y;
        const d = Math.hypot(dx, dy) || 1;
        ship.vx += (dx / d) * 3;
        ship.vy += (dy / d) * 3;
        shake(8);
        burst(ship.x, ship.y, '#ff2ea6', 18, 4, 34);
        if (ship.hull <= 0) {
          ship.alive = false;
          burst(ship.x, ship.y, '#ffee4a', 50, 6, 70);
          burst(ship.x, ship.y, '#ff2ea6', 40, 5, 60);
          shake(22);
          setTimeout(showOver, 700);
        }
      }
      break;
    }
  }
}

function fireBullet() {
  const speed = 9;
  const bx = ship.x + Math.cos(ship.angle) * 14;
  const by = ship.y + Math.sin(ship.angle) * 14;
  bullets.push({
    x: bx, y: by,
    vx: Math.cos(ship.angle) * speed + ship.vx * 0.4,
    vy: Math.sin(ship.angle) * speed + ship.vy * 0.4,
    life: 55,
  });
}

// ---- Update bullets ----
function updateBullets() {
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += b.vx;
    b.y += b.vy;
    b.life--;
    if (b.life <= 0) { bullets.splice(i, 1); continue; }
    // wrap
    if (b.x < 0) b.x += WORLD_W;
    if (b.y < 0) b.y += WORLD_H;
    if (b.x >= WORLD_W) b.x -= WORLD_W;
    if (b.y >= WORLD_H) b.y -= WORLD_H;

    // collide with asteroids (broad phase)
    for (const a of asteroids) {
      if (Math.abs(a.x - b.x) > a.halfPx + 4) continue;
      if (Math.abs(a.y - b.y) > a.halfPx + 4) continue;
      const hit = a.hitAt(b.x, b.y, 1);
      if (hit) {
        if (hit.destroyed) {
          const def = ORE[hit.type];
          burst(hit.x, hit.y, def.glow, 10, 2.4, 30);
          sparks(hit.x, hit.y, def.color);
          if (hit.type !== 'ROCK') {
            inventory[hit.type]++;
            score += def.points;
            floater(hit.x, hit.y - 6, '+' + def.points, def.glow);
          }
          if (hit.type === 'PLASMA' || hit.type === 'URANIUM') shake(5);
        } else {
          sparks(hit.x, hit.y, '#ffffff');
        }
        bullets.splice(i, 1);
        break;
      }
    }
  }
}

// ---- Update particles / floaters ----
function updateFX() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.95; p.vy *= 0.95;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (let i = floaters.length - 1; i >= 0; i--) {
    const f = floaters[i];
    f.y -= 0.6;
    f.life--;
    if (f.life <= 0) floaters.splice(i, 1);
  }
}

// ---- Update asteroids; respawn if few ----
function updateAsteroids() {
  for (let i = asteroids.length - 1; i >= 0; i--) {
    const a = asteroids[i];
    a.update();
    if (a.alive <= 0) {
      asteroids.splice(i, 1);
      burst(a.x, a.y, '#2df7ff', 20, 2.8, 46);
    }
  }
  while (asteroids.length < 14) spawnAsteroid();
}

// ---- Draw ----
function draw() {
  // camera
  let camX = ship.x - W / 2;
  let camY = ship.y - H / 2;
  if (shakeT > 0) {
    camX += (Math.random() - 0.5) * shakeMag;
    camY += (Math.random() - 0.5) * shakeMag;
    shakeT--;
    if (shakeT <= 0) shakeMag = 0;
  }

  ctx.fillStyle = '#02020a';
  ctx.fillRect(0, 0, W, H);

  // starfield (parallax + wrap)
  for (const s of stars) {
    let sx = s.x - camX * s.layer;
    let sy = s.y - camY * s.layer;
    sx = ((sx % WORLD_W) + WORLD_W) % WORLD_W;
    sy = ((sy % WORLD_H) + WORLD_H) % WORLD_H;
    if (sx > W) sx -= WORLD_W;
    if (sy > H) sy -= WORLD_H;
    if (sx < 0 || sy < 0 || sx > W || sy > H) continue;
    ctx.fillStyle = s.c;
    ctx.globalAlpha = 0.4 + s.layer * 0.6;
    ctx.fillRect(sx | 0, sy | 0, s.s, s.s);
  }
  ctx.globalAlpha = 1;

  // asteroids — draw each + wrap copies if near edges
  for (const a of asteroids) {
    drawAsteroidWrapped(a, camX, camY);
  }

  // bullets
  ctx.globalCompositeOperation = 'lighter';
  for (const b of bullets) {
    const sx = b.x - camX;
    const sy = b.y - camY;
    if (sx < -20 || sy < -20 || sx > W + 20 || sy > H + 20) continue;
    ctx.fillStyle = '#2df7ff';
    ctx.shadowColor = '#2df7ff';
    ctx.shadowBlur = 10;
    ctx.beginPath(); ctx.arc(sx, sy, 2.2, 0, Math.PI * 2); ctx.fill();
  }
  ctx.shadowBlur = 0;

  // particles
  for (const p of particles) {
    const sx = p.x - camX;
    const sy = p.y - camY;
    if (sx < -20 || sy < -20 || sx > W + 20 || sy > H + 20) continue;
    const a = Math.max(0, p.life / p.max);
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.fillRect((sx - p.size / 2) | 0, (sy - p.size / 2) | 0, Math.ceil(p.size), Math.ceil(p.size));
  }
  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';

  // ship
  if (ship.alive) drawShip(camX, camY);

  // floaters
  ctx.font = '14px "Press Start 2P", monospace';
  ctx.textAlign = 'center';
  for (const f of floaters) {
    const a = Math.min(1, f.life / 30);
    ctx.globalAlpha = a;
    ctx.fillStyle = f.color;
    ctx.shadowColor = f.color;
    ctx.shadowBlur = 6;
    ctx.fillText(f.text, f.x - camX, f.y - camY);
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
  ctx.textAlign = 'left';

  drawMinimap();
}

function drawAsteroidWrapped(a, camX, camY) {
  const offsets = [[0,0]];
  if (a.x - a.halfPx < camX) offsets.push([WORLD_W, 0]);
  if (a.x + a.halfPx > camX + W) offsets.push([-WORLD_W, 0]);
  if (a.y - a.halfPx < camY) offsets.push([0, WORLD_H]);
  if (a.y + a.halfPx > camY + H) offsets.push([0, -WORLD_H]);
  for (const [ox, oy] of offsets) {
    const dx = (a.x + ox) - camX - a.halfPx;
    const dy = (a.y + oy) - camY - a.halfPx;
    if (dx + a.cache.width < 0 || dy + a.cache.height < 0 || dx > W || dy > H) continue;
    ctx.drawImage(a.cache, dx | 0, dy | 0);
  }
}

function drawShip(camX, camY) {
  const sx = ship.x - camX;
  const sy = ship.y - camY;
  const flicker = ship.invul > 0 && ((ship.invul >> 1) & 1);
  ctx.save();
  ctx.translate(sx, sy);
  ctx.rotate(ship.angle);
  if (flicker) ctx.globalAlpha = 0.4;
  // glow
  ctx.shadowColor = '#2df7ff';
  ctx.shadowBlur = 14;
  // body
  ctx.beginPath();
  ctx.moveTo(14, 0);
  ctx.lineTo(-10, -9);
  ctx.lineTo(-6, 0);
  ctx.lineTo(-10, 9);
  ctx.closePath();
  ctx.fillStyle = '#041820';
  ctx.fill();
  ctx.strokeStyle = '#2df7ff';
  ctx.lineWidth = 2;
  ctx.stroke();
  // cockpit
  ctx.shadowBlur = 6;
  ctx.shadowColor = '#ff2ea6';
  ctx.fillStyle = '#ff2ea6';
  ctx.fillRect(2, -2, 4, 4);
  ctx.restore();
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
}

function drawMinimap() {
  const M = mini.width, N = mini.height;
  mctx.fillStyle = 'rgba(2,2,10,0.7)';
  mctx.fillRect(0, 0, M, N);
  const sx = M / WORLD_W, sy = N / WORLD_H;
  for (const a of asteroids) {
    mctx.fillStyle = '#5a6a88';
    mctx.fillRect(a.x * sx - 1, a.y * sy - 1, 2, 2);
  }
  // ship
  mctx.fillStyle = '#2df7ff';
  mctx.fillRect(ship.x * sx - 1.5, ship.y * sy - 1.5, 3, 3);
}

// ---- HUD ----
const scoreEl = document.getElementById('score');
const hullEl  = document.getElementById('hull');
const speedEl = document.getElementById('speed');
const astEl   = document.getElementById('astCount');
const oreListEl = document.getElementById('oreList');

function renderHud() {
  scoreEl.textContent = score;
  hullEl.textContent  = Math.max(0, ship.hull | 0);
  speedEl.textContent = Math.hypot(ship.vx, ship.vy).toFixed(1);
  astEl.textContent   = asteroids.length;
  // ore chips
  let html = '';
  for (const k of ['IRON','COPPER','GOLD','PLASMA','URANIUM']) {
    const def = ORE[k];
    html += `<div class="ore-chip" style="color:${def.glow}"><span class="dot" style="background:${def.color}"></span>${k[0]}${k[1]}${k[2]} ${inventory[k]}</div>`;
  }
  oreListEl.innerHTML = html;
}

// ---- Game over ----
const over = document.getElementById('over');
const overStats = document.getElementById('overStats');
document.getElementById('restart').addEventListener('click', restart);
function showOver() {
  overStats.innerHTML =
    `SCORE: ${score}<br/>` +
    `IRON: ${inventory.IRON} · COPPER: ${inventory.COPPER}<br/>` +
    `GOLD: ${inventory.GOLD} · PLASMA: ${inventory.PLASMA} · URANIUM: ${inventory.URANIUM}`;
  over.classList.add('show');
}
function restart() {
  over.classList.remove('show');
  ship.x = WORLD_W / 2; ship.y = WORLD_H / 2;
  ship.vx = ship.vy = 0;
  ship.angle = -Math.PI / 2;
  ship.hull = 100;
  ship.alive = true;
  ship.invul = 60;
  bullets.length = 0;
  particles.length = 0;
  floaters.length = 0;
  for (const k of ORE_KEYS) if (k !== 'ROCK') inventory[k] = 0;
  score = 0;
  spawnInitial();
}

// ---- Loop ----
function loop() {
  updateShip();
  updateBullets();
  updateAsteroids();
  updateFX();
  draw();
  renderHud();
  requestAnimationFrame(loop);
}

spawnInitial();
loop();
</script>

</body>
</html>
