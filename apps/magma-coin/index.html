<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MagmaCoin — Crypto Ticker</title>
<link rel="icon" href="https://emojicdn.elk.sh/🔥">
<meta property="og:title" content="MagmaCoin">
<meta property="og:description" content="Live crypto prices. When coins dump, they burn.">
<meta property="og:url" content="https://app.sloppy.live/magma-coin/">
<meta property="og:image" content="https://emojicdn.elk.sh/🔥?style=google">
<link href="https://fonts.googleapis.com/css2?family=Permanent+Marker&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0806;color:#d4c4a0;font-family:'Fira Code',monospace;min-height:100vh;overflow-x:hidden}
.app{max-width:860px;margin:0 auto;padding:16px}
h1{font-family:'Permanent Marker',cursive;font-size:clamp(28px,7vw,48px);text-align:center;color:#ff5010;text-shadow:0 0 30px rgba(255,80,16,0.6),0 2px 0 #801000;letter-spacing:2px;margin-bottom:2px}
.tagline{text-align:center;font-size:10px;color:#664820;letter-spacing:3px;margin-bottom:16px}
canvas#fireBg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0;transition:opacity 0.8s}
canvas#fireBg.burning{opacity:1}
.content{position:relative;z-index:1}
.ticker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;margin-bottom:16px}
.coin-card{background:#0e0c08;border:1px solid #1a1408;border-radius:8px;padding:14px;position:relative;overflow:hidden;transition:border-color 0.5s,box-shadow 0.5s}
.coin-card.burning{border-color:#ff3000;box-shadow:0 0 20px rgba(255,48,0,0.3)}
.coin-card.pumping{border-color:#22d68a;box-shadow:0 0 12px rgba(34,214,138,0.2)}
.coin-header{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.coin-symbol{font-family:'Permanent Marker',cursive;font-size:20px;color:#e8d8b0}
.coin-name{font-size:10px;color:#665830;letter-spacing:1px}
.coin-price{font-size:clamp(22px,4vw,30px);font-weight:700;margin-bottom:4px}
.coin-change{font-size:14px;font-weight:700;display:inline-flex;align-items:center;gap:4px}
.coin-change.down{color:#ff4020}
.coin-change.up{color:#22d68a}
.coin-details{display:flex;gap:12px;margin-top:8px;font-size:10px;color:#665830;flex-wrap:wrap}
.coin-detail span{color:#998860}
.sparkline{margin-top:8px}
.sparkline canvas{width:100%;height:40px;border-radius:4px}
.fire-overlay{position:absolute;bottom:0;left:0;right:0;height:0;background:linear-gradient(to top,rgba(255,48,0,0.15),transparent);transition:height 0.5s;pointer-events:none}
.coin-card.burning .fire-overlay{height:100%}
.status-bar{display:flex;justify-content:space-between;font-size:10px;color:#443820;padding:8px 0;border-top:1px solid #1a1408;flex-wrap:wrap;gap:4px}
.status-bar a{color:#443820;text-decoration:none}
.status-bar a:hover{color:#ff5010}
.market-summary{text-align:center;margin-bottom:16px;padding:10px;background:#0e0c08;border:1px solid #1a1408;border-radius:8px}
.market-label{font-size:10px;color:#665830;letter-spacing:2px;margin-bottom:4px}
.market-mood{font-family:'Permanent Marker',cursive;font-size:24px}
.mood-fire{color:#ff4020;text-shadow:0 0 15px rgba(255,64,32,0.5)}
.mood-lava{color:#ff8020;text-shadow:0 0 15px rgba(255,128,32,0.4)}
.mood-cool{color:#998860}
.mood-green{color:#22d68a;text-shadow:0 0 10px rgba(34,214,138,0.3)}
.refresh-note{text-align:center;font-size:9px;color:#332810;margin-top:6px}
</style>
</head>
<body>
<canvas id="fireBg"></canvas>
<div class="content app">
<h1>MAGMACOIN</h1>
<p class="tagline">WHEN COINS DUMP, THEY BURN</p>

<div class="market-summary">
<div class="market-label">MARKET MOOD</div>
<div class="market-mood" id="marketMood">LOADING...</div>
</div>

<div class="ticker-grid" id="tickerGrid"></div>

<div class="status-bar">
<span id="lastUpdate">FETCHING...</span>
<span>DATA: COINGECKO</span>
<span><a href="https://sloppy.live">SLOPPY.LIVE</a></span>
</div>
<div class="refresh-note">Auto-refreshes every 60s</div>
</div>

<script>
const COINS = ['bitcoin','ethereum','solana','dogecoin','cardano','ripple','polkadot','avalanche-2','chainlink','litecoin','uniswap','near'];
const SYMBOLS = {bitcoin:'BTC',ethereum:'ETH',solana:'SOL',dogecoin:'DOGE',cardano:'ADA',ripple:'XRP',polkadot:'DOT','avalanche-2':'AVAX',chainlink:'LINK',litecoin:'LTC',uniswap:'UNI',near:'NEAR'};
const NAMES = {bitcoin:'Bitcoin',ethereum:'Ethereum',solana:'Solana',dogecoin:'Dogecoin',cardano:'Cardano',ripple:'Ripple',polkadot:'Polkadot','avalanche-2':'Avalanche',chainlink:'Chainlink',litecoin:'Litecoin',uniswap:'Uniswap',near:'NEAR Protocol'};

let coinData = {};
let priceHistory = {};
let fireParticles = [];
let globalBurning = false;

// --- Fire canvas ---
const FC = document.getElementById('fireBg');
const fctx = FC.getContext('2d');
function resizeFire() { FC.width = window.innerWidth; FC.height = window.innerHeight; }
resizeFire();
window.addEventListener('resize', resizeFire);

function spawnFireParticles(count) {
  for (let i = 0; i < count; i++) {
    fireParticles.push({
      x: Math.random() * FC.width,
      y: FC.height + Math.random() * 40,
      vx: (Math.random() - 0.5) * 2,
      vy: -1.5 - Math.random() * 3,
      size: 2 + Math.random() * 4,
      life: 60 + Math.random() * 80,
      maxLife: 140,
      hue: Math.random() * 40 // 0=red, 40=yellow
    });
  }
}

function renderFire() {
  fctx.clearRect(0, 0, FC.width, FC.height);
  if (!globalBurning && fireParticles.length === 0) return;

  // Bottom glow
  if (globalBurning) {
    const grad = fctx.createLinearGradient(0, FC.height, 0, FC.height - 200);
    grad.addColorStop(0, 'rgba(255,48,0,0.08)');
    grad.addColorStop(1, 'transparent');
    fctx.fillStyle = grad;
    fctx.fillRect(0, FC.height - 200, FC.width, 200);
  }

  fireParticles.forEach(p => {
    p.x += p.vx;
    p.y += p.vy;
    p.vx += (Math.random() - 0.5) * 0.3;
    p.life--;
    const a = p.life / p.maxLife;
    const s = p.size * a;
    fctx.beginPath();
    fctx.arc(p.x, p.y, s, 0, Math.PI * 2);
    fctx.fillStyle = `hsla(${p.hue},100%,${50 + (1-a)*20}%,${a * 0.6})`;
    fctx.shadowColor = `hsla(${p.hue},100%,50%,${a * 0.4})`;
    fctx.shadowBlur = 10;
    fctx.fill();
  });
  fctx.shadowBlur = 0;

  fireParticles = fireParticles.filter(p => p.life > 0);

  if (globalBurning) spawnFireParticles(3);
}

// --- Audio ---
let audioCtx;
function ensureAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); return audioCtx; }
function playBurn() {
  const ctx = ensureAudio(); const now = ctx.currentTime;
  const buf = ctx.createBuffer(1, ctx.sampleRate * 0.4, ctx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) {
    d[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.15)) * 0.3;
    if (i % 200 < 10) d[i] *= 3;
  }
  const s = ctx.createBufferSource(); const g = ctx.createGain();
  const f = ctx.createBiquadFilter(); f.type = 'lowpass'; f.frequency.value = 600;
  s.buffer = buf; g.gain.setValueAtTime(0.08, now);
  s.connect(f); f.connect(g); g.connect(ctx.destination); s.start(now);
}

// --- Sparkline ---
function drawSparkline(canvas, history, change) {
  const ctx = canvas.getContext('2d');
  const w = canvas.width = canvas.parentElement.clientWidth;
  const h = canvas.height = 40;
  ctx.clearRect(0, 0, w, h);

  if (history.length < 2) return;

  const min = Math.min(...history);
  const max = Math.max(...history);
  const range = max - min || 1;

  ctx.beginPath();
  history.forEach((v, i) => {
    const x = (i / (history.length - 1)) * w;
    const y = h - ((v - min) / range) * (h - 4) - 2;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });

  const isDown = change < 0;
  ctx.strokeStyle = isDown ? '#ff4020' : '#22d68a';
  ctx.lineWidth = 1.5;
  ctx.shadowColor = isDown ? 'rgba(255,64,32,0.4)' : 'rgba(34,214,138,0.3)';
  ctx.shadowBlur = 4;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Fill under
  const lastX = w, lastY = h;
  ctx.lineTo(w, h); ctx.lineTo(0, h); ctx.closePath();
  ctx.fillStyle = isDown ? 'rgba(255,64,32,0.06)' : 'rgba(34,214,138,0.04)';
  ctx.fill();
}

// --- Format ---
function fmtPrice(p) {
  if (p >= 1000) return '$' + p.toLocaleString('en-US', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
  if (p >= 1) return '$' + p.toFixed(2);
  if (p >= 0.01) return '$' + p.toFixed(4);
  return '$' + p.toFixed(6);
}
function fmtMcap(m) {
  if (m >= 1e12) return '$' + (m/1e12).toFixed(1) + 'T';
  if (m >= 1e9) return '$' + (m/1e9).toFixed(1) + 'B';
  if (m >= 1e6) return '$' + (m/1e6).toFixed(1) + 'M';
  return '$' + m.toLocaleString();
}

// --- Fetch ---
async function fetchPrices() {
  try {
    const ids = COINS.join(',');
    const res = await fetch(`https://api.coingecko.com/api/v3/coins/markets?vs_currency=usd&ids=${ids}&order=market_cap_desc&sparkline=true&price_change_percentage=1h,24h,7d`);
    if (!res.ok) throw new Error('API error');
    const data = await res.json();

    let totalChange = 0;
    let burnCount = 0;

    const grid = document.getElementById('tickerGrid');
    grid.innerHTML = '';

    data.forEach(coin => {
      coinData[coin.id] = coin;
      const change24 = coin.price_change_percentage_24h || 0;
      totalChange += change24;
      const isBurning = change24 < -2;
      const isPumping = change24 > 3;
      if (isBurning) burnCount++;

      // Track history
      if (!priceHistory[coin.id]) priceHistory[coin.id] = [];
      priceHistory[coin.id].push(coin.current_price);
      if (priceHistory[coin.id].length > 60) priceHistory[coin.id].shift();

      const card = document.createElement('div');
      card.className = 'coin-card' + (isBurning ? ' burning' : '') + (isPumping ? ' pumping' : '');

      const sparkData = coin.sparkline_in_7d && coin.sparkline_in_7d.price ? coin.sparkline_in_7d.price : priceHistory[coin.id];
      const change1h = coin.price_change_percentage_1h_in_currency || 0;
      const change7d = coin.price_change_percentage_7d_in_currency || 0;

      card.innerHTML = `
        <div class="fire-overlay"></div>
        <div class="coin-header">
          <span class="coin-symbol">${SYMBOLS[coin.id] || coin.symbol.toUpperCase()}</span>
          <span class="coin-name">${NAMES[coin.id] || coin.name}</span>
        </div>
        <div class="coin-price">${fmtPrice(coin.current_price)}</div>
        <div class="coin-change ${change24 < 0 ? 'down' : 'up'}">
          ${change24 < 0 ? '▼' : '▲'} ${Math.abs(change24).toFixed(2)}% 24h
        </div>
        <div class="coin-details">
          <span class="coin-detail">1h <span style="color:${change1h<0?'#ff4020':'#22d68a'}">${change1h>=0?'+':''}${change1h.toFixed(1)}%</span></span>
          <span class="coin-detail">7d <span style="color:${change7d<0?'#ff4020':'#22d68a'}">${change7d>=0?'+':''}${change7d.toFixed(1)}%</span></span>
          <span class="coin-detail">MCap <span>${fmtMcap(coin.market_cap)}</span></span>
        </div>
        <div class="sparkline"><canvas></canvas></div>
      `;
      grid.appendChild(card);

      // Draw sparkline after DOM insert
      requestAnimationFrame(() => {
        const sc = card.querySelector('.sparkline canvas');
        if (sc && sparkData.length > 1) drawSparkline(sc, sparkData, change24);
      });
    });

    // Market mood
    const avgChange = totalChange / data.length;
    const moodEl = document.getElementById('marketMood');
    if (avgChange < -3) {
      moodEl.textContent = 'EVERYTHING IS ON FIRE';
      moodEl.className = 'market-mood mood-fire';
    } else if (avgChange < -1) {
      moodEl.textContent = 'MELTING DOWN';
      moodEl.className = 'market-mood mood-lava';
    } else if (avgChange < 1) {
      moodEl.textContent = 'COOLING OFF';
      moodEl.className = 'market-mood mood-cool';
    } else {
      moodEl.textContent = 'PUMPING';
      moodEl.className = 'market-mood mood-green';
    }

    // Global fire
    globalBurning = burnCount >= 3;
    FC.classList.toggle('burning', globalBurning);
    if (globalBurning) { spawnFireParticles(50); playBurn(); }

    // Per-card fire bursts for burning coins
    document.querySelectorAll('.coin-card.burning').forEach(() => spawnFireParticles(10));

    document.getElementById('lastUpdate').textContent = 'UPDATED: ' + new Date().toLocaleTimeString([], { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false });

  } catch (err) {
    document.getElementById('lastUpdate').textContent = 'FETCH FAILED — RETRYING...';
    console.error(err);
  }
}

// --- Render loop ---
function animate() {
  renderFire();
  requestAnimationFrame(animate);
}

// --- Init ---
fetchPrices();
setInterval(fetchPrices, 60000);
animate();
</script>
</body>
</html>
