<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maki-mura 巻村 — roll the sushi ball, swallow the izakaya</title>
<meta name="description" content="Roll a growing maki ball through a dark izakaya. Swallow everything smaller than you, dodge what's bigger, ride the conveyor belts. Two minutes. Get huge.">
<link rel="icon" href="https://emojicdn.elk.sh/🍣">
<meta property="og:title" content="Maki-mura 巻村 — sushi ball roller">
<meta property="og:description" content="Katamari but sushi: roll, swallow, grow. Everything you eat sticks to the ball.">
<meta property="og:url" content="https://sloppy.live/maki-mura">
<meta property="og:image" content="https://image.pollinations.ai/prompt/a%20giant%20sushi%20roll%20ball%20covered%20in%20stuck%20food%20items%20rolling%20through%20a%20dark%20cozy%20izakaya%20with%20glowing%20conveyor%20belts%2C%20katamari%20style%2C%20top%20down%20game%20art%2C%20moody%20lantern%20light?width=1200&height=630&seed=8181&nologo=true&model=flux&image=.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Rubik+Mono+One&display=swap" rel="stylesheet">
<style>
:root{ --ink:#0e0c14; --fg:#f2ead8; --nori:#1c2416; --salmon:#ff8a66; --wasabi:#9ac25a; --lantern:#ffb454; --focus:#7fd0ff; }
*{box-sizing:border-box;}
html{font-size:100%;}
html,body{height:100%; margin:0;}
body{background:var(--ink); color:var(--fg); font-family:'DotGothic16',monospace; overflow:hidden; user-select:none;}
canvas#game{position:fixed; inset:0; display:block;}
#hud{position:fixed; inset:0; z-index:5; pointer-events:none;}
.pill{position:absolute; background:rgba(14,12,20,.82); border:2px solid #3a3448; border-radius:12px; padding:.4rem .9rem;}
#p-score{top:.7rem; left:.7rem;}
#p-score b{font-family:'Rubik Mono One',monospace; font-size:1.3rem; color:var(--salmon);}
#p-score span{font-size:.7rem; color:#9a92a8;}
#p-size{top:.7rem; right:.7rem; text-align:right;}
#p-size b{font-family:'Rubik Mono One',monospace; font-size:1.3rem; color:var(--wasabi);}
#p-size span{font-size:.7rem; color:#9a92a8;}
#p-time{top:.7rem; left:50%; transform:translateX(-50%);}
#p-time b{font-family:'Rubik Mono One',monospace; font-size:1.5rem; color:var(--lantern);}
#p-time b.hot{color:var(--salmon); animation:pulse .5s infinite;}
@keyframes pulse{50%{opacity:.5;}}
#toast{position:fixed; top:5rem; left:50%; transform:translateX(-50%); z-index:6; font-family:'Rubik Mono One',monospace;
  font-size:1.1rem; color:var(--lantern); text-shadow:0 2px 0 #000; opacity:0; pointer-events:none;}
#toast.on{animation:tpop 1.4s ease-out;}
@keyframes tpop{0%{opacity:0; transform:translate(-50%,12px) scale(.8);}20%{opacity:1; transform:translate(-50%,0) scale(1);}80%{opacity:1;}100%{opacity:0;}}
#hint{position:fixed; bottom:.6rem; left:50%; transform:translateX(-50%); z-index:5; font-size:.72rem; color:#9a92a8;
  background:rgba(14,12,20,.8); border-radius:99px; padding:.25rem 1rem; pointer-events:none;}
.ov{position:fixed; inset:0; z-index:20; display:none; align-items:center; justify-content:center; background:rgba(8,6,14,.88);}
.ov.on{display:flex;}
.card{max-width:26rem; text-align:center; padding:1.8rem 1.4rem;}
/* cosmic diner menu */
.diner{max-width:24rem; width:92vw; background:#f2ead8; color:#241a10; border-radius:14px; padding:1.3rem 1.2rem 1.5rem;
  box-shadow:0 0 0 4px #c04a3a, 0 0 0 7px #f2ead8, 0 24px 60px rgba(0,0,0,.7); text-align:center;}
.diner h1{color:#241a10; font-size:clamp(1.5rem,6vw,2.1rem);}
.diner h1 .jp{color:#c04a3a;}
.diner .est{font-size:.62rem; letter-spacing:.3em; text-transform:uppercase; color:#8a7a62; margin:.2rem 0 .6rem;}
.diner .rule{border:0; border-top:2px dashed #c8b898; margin:.7rem 0;}
.diner .sect{font-size:.7rem; letter-spacing:.24em; text-transform:uppercase; color:#c04a3a; margin:.6rem 0 .4rem; font-family:'Rubik Mono One',monospace;}
.entree{display:flex; gap:.7rem; align-items:center; width:100%; text-align:left; background:transparent; border:3px solid transparent;
  border-radius:10px; padding:.55rem .6rem; cursor:pointer; font-family:'DotGothic16',monospace; color:#241a10; min-height:2.75rem;}
.entree:hover{background:rgba(192,74,58,.08);}
.entree[aria-checked="true"]{border-color:#c04a3a; background:rgba(192,74,58,.1);}
.entree:focus-visible{outline:3px solid var(--focus); outline-offset:2px;}
.entree .ico{font-size:1.5rem;}
.entree .nm{font-weight:700; font-size:.92rem;}
.entree .desc{font-size:.68rem; color:#6a5a45; line-height:1.45;}
.entree .prix{margin-left:auto; font-family:'Rubik Mono One',monospace; color:#c04a3a; font-size:.8rem; white-space:nowrap;}
.diner .bests{font-size:.68rem; color:#6a5a45; margin-top:.6rem;}
h1{font-family:'Rubik Mono One',monospace; font-size:clamp(1.9rem,7vw,3rem); margin:0; line-height:1.15;}
h1 .jp{display:block; font-family:'DotGothic16',monospace; font-size:1.4rem; color:var(--salmon); letter-spacing:.4em; margin-top:.2rem;}
.card p{font-size:.9rem; line-height:1.8; color:#c8c0d4; margin:1rem 0;}
.card p b{color:var(--fg);}
button{font-family:'Rubik Mono One',monospace; font-size:1rem; cursor:pointer; min-height:2.75rem;
  padding:.6rem 1.8rem; border:0; border-radius:12px; background:var(--salmon); color:#2a1006; box-shadow:0 5px 0 #a04a2e;}
button:hover{filter:brightness(1.07);}
button:active{transform:translateY(3px); box-shadow:0 2px 0 #a04a2e;}
button:focus-visible{outline:3px solid var(--focus); outline-offset:3px;}
#joy{position:fixed; left:1rem; bottom:1rem; width:8rem; height:8rem; z-index:8; display:none; touch-action:none;}
#joy .ring{position:absolute; inset:0; border-radius:50%; border:2px solid #fff3; background:#fff1;}
#joy .nub{position:absolute; left:50%; top:50%; width:3rem; height:3rem; margin:-1.5rem; border-radius:50%; background:rgba(255,138,102,.4); border:2px solid var(--salmon);}
@media (pointer:coarse){ #joy{display:block;} #hint{display:none;} }
#sr-status{position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0);}
@media (prefers-reduced-motion:reduce){ #p-time b.hot{animation:none;} #toast.on{animation-duration:.01s;} }
</style>
</head>
<body>
<canvas id="game" role="application" aria-label="Maki-mura. A and D to move, W or space to jump. Swallow smaller food, avoid larger."></canvas>
<div id="hud">
  <div class="pill" id="p-score"><span>swallowed</span><br><b id="score">0</b></div>
  <div class="pill" id="p-time"><b id="time">120</b></div>
  <div class="pill" id="p-size"><span>maki size</span><br><b id="size">12.0 cm</b></div>
</div>
<p id="toast" aria-hidden="true"></p>
<p id="hint">A/D move · W or space jump · eat smaller · bounce off bigger · M mute</p>

<div class="ov on" id="menu-ov" role="dialog" aria-modal="true" aria-labelledby="m-h">
  <div class="diner">
    <h1 id="m-h">MAKI-MURA<span class="jp">巻村 · COSMIC DINER</span></h1>
    <p class="est">est. tier 0 · open all night · you are the entrée that eats</p>
    <hr class="rule">
    <p class="sect">choose your physics</p>
    <div role="radiogroup" aria-label="Cosmic Buffet physics">
      <button class="entree" id="phys-plat" role="radio" aria-checked="true" type="button">
        <span class="ico" aria-hidden="true">🦵</span>
        <span><span class="nm">The Platformer</span><br><span class="desc">gravity · jumps scale with size · nori shelves &amp; belts</span></span>
        <span class="prix">¥ jump</span>
      </button>
      <button class="entree" id="phys-float" role="radio" aria-checked="false" type="button">
        <span class="ico" aria-hidden="true">🫧</span>
        <span><span class="nm">The Floater</span><br><span class="desc">agar-style · glide anywhere · eat everything smaller</span></span>
        <span class="prix">¥ drift</span>
      </button>
    </div>
    <hr class="rule">
    <button id="cosmic-btn" type="button" style="background:#8a5ae0; color:#fff; box-shadow:0 5px 0 #5a34a0; width:100%;">COSMIC BUFFET <span style="font-size:.7rem;">sesame → moon</span></button>
    <button id="plat-btn" type="button" style="background:var(--wasabi); box-shadow:0 5px 0 #5a7a2e; width:100%; margin-top:.5rem;">IZAKAYA QUICKIE <span style="font-size:.7rem;">2 min · always platformer</span></button>
    <p class="bests">best jump: <span id="best-plat">—</span> · cosmic: <span id="best-cosmic">—</span></p>
  </div>
</div>
<div class="ov" id="end-ov" role="dialog" aria-modal="true" aria-labelledby="e-h">
  <div class="card">
    <h1 id="e-h">TIME!</h1>
    <p id="end-txt"></p>
    <button id="again-btn" type="button">AGAIN</button>
  </div>
</div>

<div id="joy" aria-hidden="true"><div class="ring"></div><div class="nub" id="nub"></div></div>
<p id="sr-status" role="status" aria-live="polite"></p>

<script>
(function(){
"use strict";
var $=function(id){ return document.getElementById(id); };
var canvas=$('game'), ctx=canvas.getContext('2d');
function resize(){ canvas.width=innerWidth; canvas.height=innerHeight; }
addEventListener('resize',resize); resize();
var reduceMotion=false;
try{ reduceMotion=matchMedia('(prefers-reduced-motion: reduce)').matches; }catch(e){}

/* ═══════════ world ═══════════ */
var W=2400, H=1600;
/* (top-down ROLL mode retired by chat vote 2026-07-13 — code lives in git history ≤472329c99) */
/* food types: r = base radius, tiers small→large */
var FOODS=[
  {t:'sesame', r:4,  c:'#e8d9b0'},
  {t:'edamame',r:7,  c:'#9ac25a'},
  {t:'ginger', r:9,  c:'#ffb8a8'},
  {t:'tamago', r:13, c:'#f5c453'},
  {t:'nigiri', r:17, c:'#ff8a66'},
  {t:'gunkan', r:22, c:'#4a5c3a'},
  {t:'bowl',   r:34, c:'#c04a4a'},
  {t:'teapot', r:46, c:'#5a7a8a'},
  {t:'crate',  r:64, c:'#8a6a42'},
  {t:'barrel', r:92, c:'#6a4a2e'}
];
var state={mode:'menu', variant:'cosmic', t:0, time:120, count:0, bestPlat:0};
state.bestCosmic='';
try{
  state.bestPlat=parseFloat(localStorage.getItem('maki-best-plat')||'0')||0;
  state.bestCosmic=localStorage.getItem('maki-best-cosmic')||'';
}catch(e){}
$('best-plat').textContent=state.bestPlat?state.bestPlat.toFixed(1)+' cm':'—';
$('best-cosmic').textContent=state.bestCosmic||'—';

/* ═══ cosmic buffet: floating-origin rebase + content tiers ═══ */
var COSMIC={tier:0, elapsed:0, factor:8, rebases:0, moonEaten:false, physics:'plat'};
try{ if(localStorage.getItem('maki-physics')==='float') COSMIC.physics='float'; }catch(e){}
var TIER_DEFS=[
 {name:'the counter', floor:'#16121e', glow:'rgba(255,180,84,.07)', items:[
   ['sesame',4,'#e8d9b0'],['edamame',7,'#9ac25a'],['ginger',9,'#ffb8a8'],['tamago',13,'#f5c453'],
   ['nigiri',17,'#ff8a66'],['gunkan',22,'#4a5c3a'],['bowl',34,'#c04a4a'],['teapot',46,'#5a7a8a']]},
 {name:'the restaurant', floor:'#1a1410', glow:'rgba(255,180,84,.08)', items:[
   ['bowl',7,'#c04a4a'],['teapot',11,'#5a7a8a'],['lantern',16,'#c04a3a'],['stool',24,'#8a6a42'],
   ['crate',36,'#8a6a42'],['table',54,'#6a4a2e'],['barrel',80,'#6a4a2e']]},
 {name:'the street', floor:'#141416', glow:'rgba(140,180,255,.06)', items:[
   ['crate',7,'#8a6a42'],['lantern',11,'#c04a3a'],['bike',18,'#4a7ab8'],['stall',32,'#b0563a'],
   ['car',50,'#d05a5a'],['truck',78,'#6a8ab0']]},
 {name:'the city', floor:'#101820', glow:'rgba(140,180,255,.07)', items:[
   ['car',8,'#d05a5a'],['bus',16,'#d0a03a'],['house',30,'#b08a5a'],['building',52,'#7a8a9a'],
   ['tower',84,'#5a6a8a']]},
 {name:'the islands', floor:'#0a1a28', glow:'rgba(120,220,200,.06)', items:[
   ['house',7,'#b08a5a'],['ship',15,'#8a5a3a'],['hill',28,'#5a8a4a'],['cloud',44,'#e8e8f0'],
   ['island',72,'#4a7a5a']]},
 {name:'the planets', floor:'#070810', glow:'rgba(200,140,255,.07)', items:[
   ['island',7,'#4a7a5a'],['satellite',14,'#9aa8b8'],['moonlet',26,'#b8b8a8'],['ringed',46,'#c8a878'],
   ['gasgiant',78,'#b06a4a']]},
 {name:'open space', floor:'#05060f', glow:'rgba(180,160,255,.06)', items:[
   ['moonlet',8,'#b8b8a8'],['satellite',15,'#9aa8b8'],['asteroid',28,'#7a7268'],['comet',44,'#b8d8e8']]}
];
function sizeAbsMeters(){ return ball.r*0.9*Math.pow(COSMIC.factor,COSMIC.tier)/100; }
function fmtSize(m){
  if(m<1) return (m*100).toFixed(1)+' cm';
  if(m<1000) return m.toFixed(1)+' m';
  if(m<1e6) return (m/1000).toFixed(1)+' km';
  return (m/1e6).toFixed(2)+' Mm';
}
/* cosmic platformer stage: regenerated each tier — geometry lives at one scale,
   the FICTION scales via 8^tier (that's the floating-origin trick) */
var CPLATS=[];
function genCosmicPlats(tier){
  CPLATS=[{x:0, y:1480, w:W, h:60}];   /* ground of the current world */
  var rows=[1280,1080,880,680,480,300];
  rows.forEach(function(y,ri){
    var x=80+Math.random()*180;
    while(x<W-260){
      var w=220+Math.random()*320;
      if(Math.random()<0.78){
        var p={x:x, y:y+(Math.random()-.5)*40, w:Math.min(w,W-40-x), h:24};
        if(Math.random()<0.25){ p.belt=Math.random()<.5?1:-1; p.speed=36+Math.random()*28; }
        CPLATS.push(p);
      }
      x+=w+140+Math.random()*220;
    }
  });
}
function cosmicJumpV(){
  /* arc height ∝ ball size (capped by the world) → jump LOOKS the same at every
     scale because zoom ∝ 1/r; in absolute units it grows 8× per tier */
  var h=Math.min(19*ball.r, 840);
  return -Math.sqrt(2*GRAV*h);
}
function seedCosmicTier(tier){
  var def=TIER_DEFS[Math.min(tier,TIER_DEFS.length-1)];
  var floaty=COSMIC.physics==='float';
  def.items.forEach(function(spec,idx){
    var n=Math.max(3,Math.round(52/(idx+1.5)));
    for(var i=0;i<n;i++){
      var r=spec[1]*(0.85+Math.random()*0.3), x, y;
      if(floaty){
        var tries=0;
        do{ x=60+Math.random()*(W-120); y=60+Math.random()*(H-120); tries++; }
        while(tries<20&&Math.hypot(x-ball.x,y-ball.y)<ball.r+r+220);
      }else{
        var p=CPLATS[Math.floor(Math.random()*CPLATS.length)];
        x=p.x+20+Math.random()*Math.max(20,p.w-40);
        y=p.y-r*.9;
      }
      items.push({type:spec[0], tier:tier, r:r, c:spec[2], x:x, y:y, belt:null, plat:null, wob:Math.random()*6.28});
    }
  });
  if(tier>=TIER_DEFS.length-1&&!items.some(function(i2){ return i2.type==='moon'; })&&!COSMIC.moonEaten){
    if(floaty){
      var mx,my;
      do{ mx=200+Math.random()*(W-400); my=200+Math.random()*(H-400); }
      while(Math.hypot(mx-ball.x,my-ball.y)<600);
      items.push({type:'moon', tier:tier, r:66, c:'#d8d8c8', x:mx, y:my, belt:null, plat:null, wob:0});
    }else{
      var hp=CPLATS.reduce(function(a,b){ return b.y<a.y?b:a; },CPLATS[0]);
      items.push({type:'moon', tier:tier, r:66, c:'#d8d8c8', x:hp.x+hp.w/2, y:hp.y-60, belt:null, plat:null, wob:0});
    }
  }
}
function rebase(){
  if(COSMIC.physics==='float'){ rebaseFloat(); return; }
  rebaseStage();
}
function rebaseFloat(){
  /* the v3 invariant: recenter on the ball, divide the universe — screen-space seamless */
  var f=COSMIC.factor;
  COSMIC.tier++; COSMIC.rebases++;
  items.forEach(function(it){
    it.x=(it.x-ball.x)/f+W/2;
    it.y=(it.y-ball.y)/f+H/2;
    it.r/=f;
  });
  ball.stuck.forEach(function(s){ s.r/=f; });
  ball.vx/=f; ball.vy/=f;
  ball.r/=f;
  ball.x=W/2; ball.y=H/2;
  cam.x=W/2; cam.y=H/2;
  parts.length=0;
  items=items.filter(function(it){ return it.r>=Math.max(2,ball.r*0.06)&&it.x>-40&&it.x<W+40&&it.y>-40&&it.y<H+40&&it.type!=='moon'; });
  seedCosmicTier(COSMIC.tier);
  var def=TIER_DEFS[Math.min(COSMIC.tier,TIER_DEFS.length-1)];
  toastMsg('TIER UP — '+def.name+'!');
  jingle([392,523,659,784,1047]);
  announce('tier up: '+def.name+'. current size '+fmtSize(sizeAbsMeters()));
}
function rebaseStage(){
  var f=COSMIC.factor;
  COSMIC.tier++; COSMIC.rebases++;
  ball.r/=f;
  ball.stuck.forEach(function(s){ s.r/=f; });
  /* edible leftovers cross over: the old world's giants are the new world's snacks */
  var keep=items.filter(function(it){ return it.r/f>=Math.max(2,ball.r*0.1)&&it.type!=='moon'; }).slice(0,14);
  genCosmicPlats(COSMIC.tier);
  items=[];
  keep.forEach(function(it){
    it.r/=f;
    var p=CPLATS[Math.floor(Math.random()*CPLATS.length)];
    it.x=p.x+20+Math.random()*Math.max(20,p.w-40);
    it.y=p.y-it.r*.9;
    items.push(it);
  });
  seedCosmicTier(COSMIC.tier);
  /* land on the new world: ball at ground center, camera pulls in as zoom re-derives from r */
  ball.x=W/2; ball.y=1480-ball.r; ball.vx=0; ball.vy=0; ball.grounded=true;
  cam.x=ball.x; cam.y=ball.y-120;
  parts.length=0;
  state.flash=1;
  var def=TIER_DEFS[Math.min(COSMIC.tier,TIER_DEFS.length-1)];
  toastMsg('TIER UP — '+def.name+'!');
  jingle([392,523,659,784,1047]);
  announce('tier up: '+def.name+'. current size '+fmtSize(sizeAbsMeters()));
}
function stepCosmic(dt){
  if(COSMIC.physics==='float'){ stepCosmicFloat(dt); return; }
  stepCosmicPlat(dt);
}
function cosmicHUD(dt){
  state.t+=dt;
  COSMIC.elapsed+=dt;
  state.flash=Math.max(0,(state.flash||0)-dt*1.6);
  var mm=Math.floor(COSMIC.elapsed/60), ss=Math.floor(COSMIC.elapsed%60);
  $('time').textContent=mm+':'+String(ss).padStart(2,'0');
}
function stepCosmicFloat(dt){
  cosmicHUD(dt);
  /* agar-style: full 2D glide, no gravity */
  var ax=0, ay=0;
  if(keys.w||keys.arrowup) ay-=1;
  if(keys.s||keys.arrowdown) ay+=1;
  if(keys.a||keys.arrowleft) ax-=1;
  if(keys.d||keys.arrowright) ax+=1;
  if(joy.on){ ax+=joy.x; ay+=joy.y; }
  var m=Math.hypot(ax,ay);
  if(m>0){ ax/=m; ay/=m; }
  var accel=420+ball.r*1.2;
  ball.vx+=ax*accel*dt; ball.vy+=ay*accel*dt;
  ball.vx*=Math.max(0,1-2.2*dt); ball.vy*=Math.max(0,1-2.2*dt);
  var maxSp=200+ball.r*1.4;
  var sp=Math.hypot(ball.vx,ball.vy);
  if(sp>maxSp){ ball.vx*=maxSp/sp; ball.vy*=maxSp/sp; }
  ball.x+=ball.vx*dt; ball.y+=ball.vy*dt;
  ball.x=Math.max(ball.r,Math.min(W-ball.r,ball.x));
  ball.y=Math.max(ball.r,Math.min(H-ball.r,ball.y));
  ball.roll+=sp*dt/ball.r;
  if(sp>1) ball.rollAng=Math.atan2(ball.vy,ball.vx);
  state.lastEaten=null;
  collideItems();
  if(state.lastEaten){ $('size').textContent=fmtSize(sizeAbsMeters()); }
  if(state.moonSwallowed){ state.moonSwallowed=false; COSMIC.moonEaten=true; cosmicWin(); return; }
  if(ball.r>=112) rebase();
  var noRestockF=window.__maki&&window.__maki.noRestock;
  if(!noRestockF&&items.length<70) seedCosmicTier(COSMIC.tier);
  stepParticles(dt);
  cam.z+=(Math.min(3.4,Math.max(.36, 46/ball.r))-cam.z)*Math.min(1,dt*2);
  cam.x+=(ball.x-cam.x)*Math.min(1,dt*5);
  cam.y+=(ball.y-cam.y)*Math.min(1,dt*5);
}
function stepCosmicPlat(dt){
  cosmicHUD(dt);
  /* platformer physics, merged from JUMP mode */
  var ax=0;
  if(keys.a||keys.arrowleft) ax-=1;
  if(keys.d||keys.arrowright) ax+=1;
  if(joy.on) ax+=joy.x;
  ball.vx+=ax*(900+ball.r*1.5)*dt;
  ball.vx*=Math.max(0,1-3*dt);
  var maxvx=240+ball.r*1.2;
  if(Math.abs(ball.vx)>maxvx) ball.vx=Math.sign(ball.vx)*maxvx;
  ball.vy+=GRAV*dt;
  var wantJump=keys.w||keys.arrowup||keys[' ']||(joy.on&&joy.y<-0.55);

  ball.x+=ball.vx*dt;
  ball.y+=ball.vy*dt;
  ball.x=Math.max(ball.r,Math.min(W-ball.r,ball.x));
  ball.roll+=ball.vx*dt/ball.r;
  ball.rollAng=0;
  ball.grounded=false;
  for(var pi2=0;pi2<CPLATS.length;pi2++){
    var p=CPLATS[pi2];
    if(ball.vy>=0 && prevY+ball.r<=p.y+2 && ball.y+ball.r>=p.y &&
       ball.x>p.x-ball.r*.4 && ball.x<p.x+p.w+ball.r*.4){
      ball.y=p.y-ball.r; ball.vy=0; ball.grounded=true;

/* ═══════════ update ═══════════ */
function step(dt){
  if(state.mode!=='play'){
    state.t+=dt;
    state.flash=Math.max(0,(state.flash||0)-dt*1.6);
    return;
  }
  if(state.variant==='plat') stepPlat(dt);
  else stepCosmic(dt);
}
function jumpV(){ return -(880+ball.r*1.5); }
function stepPlat(dt){
  state.t+=dt;
  state.time-=dt;
  if(state.time<=0){ endGame(); return; }
  $('time').textContent=Math.ceil(state.time);
  $('time').classList.toggle('hot',state.time<=15);
  var ax=0;
  if(keys.a||keys.arrowleft) ax-=1;
  if(keys.d||keys.arrowright) ax+=1;
  if(joy.on) ax+=joy.x;
  ball.vx+=ax*(900+ball.r*1.5)*dt;
  ball.vx*=Math.max(0,1-3*dt);
  var maxvx=240+ball.r*1.2;
  if(Math.abs(ball.vx)>maxvx) ball.vx=Math.sign(ball.vx)*maxvx;
  /* gravity — yes, it is live */
  ball.vy+=GRAV*dt;
  var wantJump=keys.w||keys.arrowup||keys[' ']||(joy.on&&joy.y<-0.55);
  if(wantJump&&(ball.grounded||ball.coyote>0)){
    ball.vy=jumpV(); ball.grounded=false; ball.coyote=0;
    thud();
  }
  var prevY=ball.y;
  ball.x+=ball.vx*dt;
  ball.y+=ball.vy*dt;
  ball.x=Math.max(ball.r,Math.min(W-ball.r,ball.x));
  ball.roll+=ball.vx*dt/ball.r;
  ball.rollAng=0;
  /* one-way platform landings */
  ball.grounded=false;
  for(var pi2=0;pi2<PLATS.length;pi2++){
    var p=PLATS[pi2];
    if(ball.vy>=0 && prevY+ball.r<=p.y+2 && ball.y+ball.r>=p.y &&
       ball.x>p.x-ball.r*.4 && ball.x<p.x+p.w+ball.r*.4){
      ball.y=p.y-ball.r; ball.vy=0; ball.grounded=true;
      if(typeof p.belt==='number') ball.x+=p.belt*p.speed*.55*dt;
      break;
    }
  }
  if(ball.grounded) ball.coyote=.12; else ball.coyote=Math.max(0,ball.coyote-dt);
  if(ball.y>H+200){ ball.x=200; ball.y=1100; ball.vx=0; ball.vy=0; }  /* safety net */
  /* chopstick railings: solid sideways, never from above */
  CHOPSTICKS.forEach(function(c){
    if(ball.y-ball.r<c.y1 && ball.y+ball.r>c.y0 && Math.abs(ball.x-c.x)<ball.r+8){
      var side=ball.x<c.x?-1:1;
      ball.x=c.x+side*(ball.r+8);
      if(Math.sign(ball.vx)!==side){
        ball.vx=side*Math.max(160,Math.abs(ball.vx)*.9);
        thud(); burst(c.x,ball.y,'#d8b078',5);
      }
    }
  });
  /* belt items drift within their platform */
  items.forEach(function(it){
    if(it.plat===undefined||it.plat===null) return;
    var bp=PLATS[it.plat];
    if(bp&&typeof bp.belt==='number'){
      it.x+=bp.belt*bp.speed*dt;
      if(it.x>bp.x+bp.w+20) it.x=bp.x-20;
      if(it.x<bp.x-20) it.x=bp.x+bp.w+20;
    }
  });
  /* drip-feed small items onto belts */
  beltSpawnT-=dt;
  var noRestockP=window.__maki&&window.__maki.noRestock;
  if(!noRestockP&&beltSpawnT<=0&&items.length<380){
    beltSpawnT=1.4;
    var beltPlats=[]; PLATS.forEach(function(p2,i2){ if(typeof p2.belt==='number') beltPlats.push(i2); });
    var bi2=beltPlats[Math.floor(Math.random()*beltPlats.length)];
    var bp2=PLATS[bi2], tier=Math.floor(Math.random()*5), f=FOODS[tier];
    items.push({type:f.t, tier:tier, r:f.r*(0.85+Math.random()*.3), c:f.c,
      x:bp2.belt>0?bp2.x-18:bp2.x+bp2.w+18, y:bp2.y-f.r*.9, belt:bi2, plat:bi2, wob:Math.random()*6.28});
  }
  collideItems();
  stepParticles(dt);
  cam.z+=(Math.min(1.4,Math.max(.4, 44/ball.r))-cam.z)*Math.min(1,dt*2);
  cam.x+=(ball.x-cam.x)*Math.min(1,dt*5);
  cam.y+=((ball.y-80)-cam.y)*Math.min(1,dt*5);
}
function collideItems(){
  for(var i=items.length-1;i>=0;i--){
    var it=items[i];
    var d=Math.hypot(it.x-ball.x,it.y-ball.y);
    if(d>ball.r+it.r) continue;
    if(it.r<ball.r*0.8){
      ball.r=Math.sqrt(ball.r*ball.r+it.r*it.r*0.55);
      state.count++;
      state.lastEaten=it.type;
      if(it.type==='moon') state.moonSwallowed=true;   /* dedicated flag — lastEaten can be overwritten same frame */
      $('score').textContent=state.count;
      if(state.variant!=='cosmic') $('size').textContent=sizeCm().toFixed(1)+' cm';
      ball.stuck.push({type:it.type, c:it.c, ang:Math.random()*6.283, r:it.r, phase:ball.roll});
      if(ball.stuck.length>26) ball.stuck.shift();
      nom(); burst(it.x,it.y,it.c,6);
      if(state.count%25===0){ toastMsg(state.count+' items! まだまだ!'); jingle([523,659,784]); }
      items.splice(i,1);
    }else{
      var nx=(ball.x-it.x)/(d||1), ny=(ball.y-it.y)/(d||1);
      ball.x=it.x+nx*(ball.r+it.r);
      ball.y=it.y+ny*(ball.r+it.r);
      var dot=ball.vx*nx+ball.vy*ny;
      if(dot<0){
        ball.vx-=1.7*dot*nx; ball.vy-=1.7*dot*ny;
        ball.vx*=.75; ball.vy*=.75;
        if(Math.abs(dot)>60){ thud(); burst(ball.x-nx*ball.r,ball.y-ny*ball.r,'#f2ead8',4); }
      }
    }
  }
}
function stepParticles(dt){
  for(var pi=parts.length-1;pi>=0;pi--){
    var p=parts[pi];
    p.x+=p.vx*dt; p.y+=p.vy*dt; p.life-=dt;
    if(p.life<=0) parts.splice(pi,1);
  }
}
function burst(x,y,c,n){
  if(reduceMotion) return;
  for(var i=0;i<n;i++){
    var a=Math.random()*6.283, s=40+Math.random()*90;
    parts.push({x:x,y:y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:.4,c:c,r:2+Math.random()*2});
  }
}
function toastMsg(t){
  var el=$('toast'); el.textContent=t;
  el.classList.remove('on'); void el.offsetWidth; el.classList.add('on');
}

/* ═══════════ render ═══════════ */
function render(){
  var cw=canvas.width, ch=canvas.height;
  ctx.fillStyle='#0e0c14'; ctx.fillRect(0,0,cw,ch);
  ctx.save();
  ctx.translate(cw/2,ch/2);
  ctx.scale(cam.z,cam.z);
  ctx.translate(-cam.x,-cam.y);
  if(state.variant==='plat'&&state.mode!=='menu'){ drawPlatScene(); }
  else if(state.variant==='cosmic'&&state.mode!=='menu'){ drawCosmicScene(); }
  else drawCosmicScene();   /* menu backdrop = tier-0 izakaya */
  /* items (cull offscreen) */
  var vw=cw/cam.z/2+80, vh=ch/cam.z/2+80;
  items.forEach(function(it){
    if(Math.abs(it.x-cam.x)>vw||Math.abs(it.y-cam.y)>vh) return;
    drawFood(it.type,it.x,it.y,it.r,it.c,state.t+it.wob, it.r<ball.r*0.8);
  });
  parts.forEach(function(p){
    ctx.globalAlpha=Math.min(1,p.life*3);
    ctx.fillStyle=p.c;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,6.283); ctx.fill();
    ctx.globalAlpha=1;
  });
  drawBall();
  ctx.restore();
  if(state.flash>0){
    ctx.fillStyle='rgba(255,248,230,'+(state.flash*(reduceMotion?.25:.85))+')';
    ctx.fillRect(0,0,cw,ch);
  }
}
function drawPlatScene(){
  /* izakaya back wall */

  g.addColorStop(0,'#141020'); g.addColorStop(.7,'#181226'); g.addColorStop(1,'#100c18');
  ctx.fillStyle=g; ctx.fillRect(0,0,W,H+300);
  /* hanging lanterns */
  [[300,120],[900,90],[1500,130],[2100,100]].forEach(function(L,i){
    ctx.strokeStyle='rgba(255,255,255,.12)'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(L[0],0); ctx.lineTo(L[0],L[1]); ctx.stroke();
    var gl=ctx.createRadialGradient(L[0],L[1]+26,8,L[0],L[1]+26,300);
    gl.addColorStop(0,'rgba(255,180,84,.14)'); gl.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=gl; ctx.fillRect(L[0]-300,L[1]-274,600,600);
    ctx.fillStyle='#c04a3a';
    ctx.beginPath(); ctx.ellipse(L[0],L[1]+26,20,26,0,0,6.283); ctx.fill();
    ctx.fillStyle='rgba(255,200,120,.7)';

  });
  /* platforms: wooden shelves + belts */
  PLATS.forEach(function(p){
    if(typeof p.belt==='number'){
      ctx.fillStyle='#221e2e';
      ctx.fillRect(p.x,p.y,p.w,p.h);
      ctx.strokeStyle='#3a3448'; ctx.lineWidth=3;

      for(var x2=-48;x2<p.w+48;x2+=48){
        var xx=p.x+((x2+off)%(p.w+48)+(p.w+48))%(p.w+48)-24;
        ctx.beginPath();
        ctx.moveTo(xx,p.y+5); ctx.lineTo(xx+p.belt*12,p.y+p.h/2); ctx.lineTo(xx,p.y+p.h-5);
        ctx.lineTo(xx+6,p.y+p.h-5); ctx.lineTo(xx+6+p.belt*12,p.y+p.h/2); ctx.lineTo(xx+6,p.y+5);
        ctx.closePath(); ctx.fill();
      }
    }else{
      /* nori sheet platform: seaweed green, glossy top, ragged speckle */
      ctx.fillStyle='#1c2416';
      ctx.fillRect(p.x,p.y,p.w,p.h);
      ctx.fillStyle='#2e3c22';
      ctx.fillRect(p.x,p.y,p.w,5);
      ctx.fillStyle='rgba(154,194,90,.16)';
      for(var nx2=p.x+8;nx2<p.x+p.w-4;nx2+=26)
        ctx.fillRect(nx2+((nx2*7)%3),p.y+8+((nx2*13)%(p.h-12)),4,2);
      ctx.strokeStyle='rgba(0,0,0,.5)'; ctx.lineWidth=2;
      ctx.strokeRect(p.x+.5,p.y+.5,p.w-1,p.h-1);

  });
  /* dangling chopsticks (hazard railings) */
  CHOPSTICKS.forEach(function(c,ci){
    var sway=reduceMotion?0:Math.sin(state.t*1.2+ci*2)*4;

      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(c.x+off+2,c.y0);

      ctx.stroke();
    });
    /* red binding cord at top */

    ctx.beginPath(); ctx.moveTo(c.x-10,c.y0+14); ctx.lineTo(c.x+10,c.y0+14); ctx.stroke();
  });
}

function drawFood(type,x,y,r,c,t,edible){
  ctx.save(); ctx.translate(x,y);
  if(edible&&!reduceMotion) ctx.translate(0,Math.sin(t*3)*1.5);
  ctx.fillStyle='rgba(0,0,0,.4)';
  ctx.beginPath(); ctx.ellipse(0,r*.5,r*.9,r*.32,0,0,6.283); ctx.fill();
  if(type==='nigiri'){
    ctx.fillStyle='#f2ead8'; rr2(-r,-r*.4,r*2,r*.9,r*.3);
    ctx.fillStyle=c; rr2(-r*.9,-r*.75,r*1.8,r*.62,r*.3);
  }else if(type==='tamago'){
    ctx.fillStyle='#f2ead8'; rr2(-r,-r*.35,r*2,r*.8,r*.25);
    ctx.fillStyle=c; rr2(-r*.9,-r*.8,r*1.8,r*.7,r*.2);
    ctx.fillStyle='#1c2416'; ctx.fillRect(-r*.18,-r*.85,r*.36,r*1.3);
  }else if(type==='gunkan'){
    ctx.fillStyle='#1c2416';
    ctx.beginPath(); ctx.arc(0,0,r,0,6.283); ctx.fill();
    ctx.fillStyle=c;
    ctx.beginPath(); ctx.arc(0,-r*.15,r*.7,0,6.283); ctx.fill();
    ctx.fillStyle='#ffb454';
    ctx.beginPath(); ctx.arc(-r*.2,-r*.25,r*.16,0,6.283); ctx.fill();
  }else if(type==='bowl'){
    ctx.fillStyle=c;
    ctx.beginPath(); ctx.arc(0,0,r,0,6.283); ctx.fill();
    ctx.fillStyle='#f2ead8';
    ctx.beginPath(); ctx.arc(0,-r*.1,r*.72,0,6.283); ctx.fill();
    ctx.strokeStyle=c; ctx.lineWidth=r*.09;
    ctx.beginPath(); ctx.arc(0,-r*.1,r*.45,.6,2.5); ctx.stroke();
  }else if(type==='teapot'){
    ctx.fillStyle=c;
    ctx.beginPath(); ctx.arc(0,0,r*.85,0,6.283); ctx.fill();
    ctx.fillRect(r*.6,-r*.3,r*.5,r*.22);
    ctx.beginPath(); ctx.arc(0,-r*.85,r*.28,0,6.283); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.18)';
    ctx.beginPath(); ctx.arc(-r*.3,-r*.3,r*.25,0,6.283); ctx.fill();
  }else if(type==='crate'){
    ctx.fillStyle=c; rr2(-r*.9,-r*.9,r*1.8,r*1.8,r*.12);
    ctx.strokeStyle='rgba(0,0,0,.35)'; ctx.lineWidth=r*.08;
    ctx.strokeRect(-r*.9,-r*.9,r*1.8,r*1.8);
    ctx.beginPath(); ctx.moveTo(-r*.9,-r*.9); ctx.lineTo(r*.9,r*.9); ctx.stroke();
  }else if(type==='barrel'){
    ctx.fillStyle=c;
    ctx.beginPath(); ctx.arc(0,0,r,0,6.283); ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.3)'; ctx.lineWidth=r*.1;
    ctx.beginPath(); ctx.arc(0,0,r*.66,0,6.283); ctx.stroke();
    ctx.beginPath(); ctx.arc(0,0,r*.3,0,6.283); ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.1)';
    ctx.beginPath(); ctx.arc(-r*.3,-r*.35,r*.28,0,6.283); ctx.fill();
  }else if(type==='edamame'){
    ctx.fillStyle=c;
    ctx.beginPath(); ctx.ellipse(0,0,r*1.3,r*.62,.5,0,6.283); ctx.fill();
    ctx.fillStyle='rgba(0,0,0,.2)';
    ctx.beginPath(); ctx.arc(-r*.5,-r*.1,r*.28,0,6.283); ctx.fill();
    ctx.beginPath(); ctx.arc(r*.3,r*.15,r*.28,0,6.283); ctx.fill();
  }else if(type==='ginger'){
    ctx.fillStyle=c;
    ctx.beginPath(); ctx.ellipse(0,0,r,r*.6,-.5,0,6.283); ctx.fill();
    ctx.fillStyle='rgba(255,255,255,.25)';
    ctx.beginPath(); ctx.ellipse(-r*.2,-r*.15,r*.5,r*.25,-.5,0,6.283); ctx.fill();
  }else if(type==='lantern'){
    ctx.fillStyle=c;
    ctx.beginPath(); ctx.ellipse(0,0,r*.75,r,0,0,6.283); ctx.fill();
    ctx.fillStyle='rgba(255,220,150,.6)';
    ctx.beginPath(); ctx.ellipse(0,0,r*.4,r*.6,0,0,6.283); ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.35)'; ctx.lineWidth=r*.08;
    ctx.beginPath(); ctx.moveTo(-r*.6,0); ctx.lineTo(r*.6,0); ctx.stroke();
  }else if(type==='ringed'){
    ctx.fillStyle=c;
    ctx.beginPath(); ctx.arc(0,0,r*.72,0,6.283); ctx.fill();
    ctx.strokeStyle='rgba(232,224,200,.75)'; ctx.lineWidth=r*.12;
    ctx.beginPath(); ctx.ellipse(0,0,r*1.15,r*.32,-.4,0,6.283); ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,.14)';
    ctx.beginPath(); ctx.arc(-r*.22,-r*.22,r*.3,0,6.283); ctx.fill();
  }else if(type==='gasgiant'){
    ctx.fillStyle=c;
    ctx.beginPath(); ctx.arc(0,0,r,0,6.283); ctx.fill();
    ctx.save(); ctx.beginPath(); ctx.arc(0,0,r,0,6.283); ctx.clip();
    ctx.fillStyle='rgba(255,255,255,.14)';
    ctx.fillRect(-r,-r*.5,r*2,r*.2); ctx.fillRect(-r,r*.1,r*2,r*.14);
    ctx.fillStyle='rgba(0,0,0,.18)';
    ctx.fillRect(-r,-r*.15,r*2,r*.16); ctx.fillRect(-r,r*.45,r*2,r*.2);
    ctx.fillStyle='rgba(255,230,200,.3)';
    ctx.beginPath(); ctx.ellipse(r*.3,-r*.3,r*.22,r*.13,-.3,0,6.283); ctx.fill();
    ctx.restore();
  }else if(type==='stool'||type==='hill'||type==='island'||type==='asteroid'||type==='moonlet'){
    ctx.fillStyle=c;
    ctx.beginPath(); ctx.arc(0,0,r,0,6.283); ctx.fill();
    ctx.fillStyle='rgba(0,0,0,.18)';
    ctx.beginPath(); ctx.arc(-r*.3,r*.2,r*.28,0,6.283); ctx.fill();
    ctx.beginPath(); ctx.arc(r*.35,-r*.25,r*.2,0,6.283); ctx.fill();
    if(type==='island'){ ctx.fillStyle='#d8c890'; ctx.beginPath(); ctx.arc(0,0,r,.4,1.8); ctx.lineTo(0,0); ctx.fill(); }
  }else if(type==='table'||type==='stall'||type==='house'||type==='building'||type==='tower'||type==='bus'||type==='truck'){
    ctx.fillStyle=c; rr2(-r*.9,-r*.7,r*1.8,r*1.4,r*.12);
    if(type==='house'||type==='stall'){
      ctx.fillStyle='rgba(0,0,0,.3)';
      ctx.beginPath(); ctx.moveTo(-r,-r*.7); ctx.lineTo(0,-r*1.2); ctx.lineTo(r,-r*.7); ctx.closePath(); ctx.fill();
    }else if(type==='building'||type==='tower'){
      ctx.fillStyle='rgba(255,230,160,.5)';
      for(var wx3=-r*.6;wx3<r*.6;wx3+=r*.4)
        for(var wy3=-r*.45;wy3<r*.55;wy3+=r*.42) ctx.fillRect(wx3,wy3,r*.18,r*.18);
    }else if(type==='bus'||type==='truck'){
      ctx.fillStyle='rgba(220,240,255,.55)';
      ctx.fillRect(-r*.7,-r*.5,r*1.4,r*.4);
      ctx.fillStyle='#1a1a1a';
      ctx.beginPath(); ctx.arc(-r*.5,r*.7,r*.22,0,6.283); ctx.fill();
      ctx.beginPath(); ctx.arc(r*.5,r*.7,r*.22,0,6.283); ctx.fill();
    }
  }else if(type==='car'){
    ctx.fillStyle=c; rr2(-r,-r*.45,r*2,r*.9,r*.3);
    ctx.fillStyle='rgba(220,240,255,.55)'; rr2(-r*.4,-r*.7,r*.9,r*.5,r*.2);
    ctx.fillStyle='#1a1a1a';
    ctx.beginPath(); ctx.arc(-r*.55,r*.45,r*.2,0,6.283); ctx.fill();
    ctx.beginPath(); ctx.arc(r*.55,r*.45,r*.2,0,6.283); ctx.fill();
  }else if(type==='bike'){
    ctx.strokeStyle=c; ctx.lineWidth=r*.14;
    ctx.beginPath(); ctx.arc(-r*.55,r*.2,r*.42,0,6.283); ctx.stroke();
    ctx.beginPath(); ctx.arc(r*.55,r*.2,r*.42,0,6.283); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-r*.55,r*.2); ctx.lineTo(0,-r*.5); ctx.lineTo(r*.55,r*.2); ctx.stroke();
  }else if(type==='ship'){
    ctx.fillStyle=c;
    ctx.beginPath(); ctx.moveTo(-r,0); ctx.quadraticCurveTo(0,r*.8,r,0); ctx.closePath(); ctx.fill();
    ctx.strokeStyle=c; ctx.lineWidth=r*.1;
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-r*.9); ctx.stroke();
    ctx.fillStyle='#e8e0d0';
    ctx.beginPath(); ctx.moveTo(0,-r*.9); ctx.lineTo(r*.6,-r*.3); ctx.lineTo(0,-r*.3); ctx.closePath(); ctx.fill();
  }else if(type==='cloud'){
    ctx.fillStyle=c; ctx.globalAlpha=.85;
    ctx.beginPath(); ctx.arc(-r*.45,0,r*.5,0,6.283); ctx.fill();
    ctx.beginPath(); ctx.arc(r*.4,0,r*.55,0,6.283); ctx.fill();
    ctx.beginPath(); ctx.arc(0,-r*.3,r*.55,0,6.283); ctx.fill();
    ctx.globalAlpha=1;
  }else if(type==='satellite'){
    ctx.fillStyle='#3a4a5a'; ctx.fillRect(-r*1.1,-r*.25,r*.7,r*.5);

    ctx.fillStyle=c; rr2(-r*.35,-r*.35,r*.7,r*.7,r*.1);
  }else if(type==='comet'){
    ctx.fillStyle='rgba(184,216,232,.25)';
    ctx.beginPath(); ctx.moveTo(r*.2,0); ctx.lineTo(r*2.2,-r*.5); ctx.lineTo(r*2.2,r*.5); ctx.closePath(); ctx.fill();
    ctx.fillStyle=c;

  }else if(type==='moon'){
    ctx.shadowColor='rgba(216,216,200,.7)'; ctx.shadowBlur=r*.4;
    ctx.fillStyle=c;
    ctx.beginPath(); ctx.arc(0,0,r,0,6.283); ctx.fill();
    ctx.shadowBlur=0;
    ctx.fillStyle='rgba(0,0,0,.15)';
    [[-.3,-.2,.24],[.35,.15,.16],[.05,.45,.13],[-.15,.3,.1]].forEach(function(cr){

    ctx.fillStyle=c;

function rr2(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); ctx.fill();
}
function drawBall(){
  ctx.save(); ctx.translate(ball.x,ball.y);
  ctx.fillStyle='rgba(0,0,0,.45)';
  ctx.beginPath(); ctx.ellipse(0,ball.r*.55,ball.r*1.05,ball.r*.4,0,0,6.283); ctx.fill();
  ctx.rotate(ball.rollAng);
  ctx.rotate(0); /* orientation base */
  /* the maki: nori ring, rice, filling — spins via stuck-item ring + seam */
  ctx.fillStyle='#1c2416';
  ctx.beginPath(); ctx.arc(0,0,ball.r,0,6.283); ctx.fill();
  ctx.fillStyle='#f2ead8';
  ctx.beginPath(); ctx.arc(0,0,ball.r*.8,0,6.283); ctx.fill();
  ctx.fillStyle='#ff8a66';
  ctx.beginPath(); ctx.arc(0,0,ball.r*.34,0,6.283); ctx.fill();
  ctx.fillStyle='#9ac25a';
  ctx.beginPath(); ctx.arc(ball.r*.12,-ball.r*.1,ball.r*.15,0,6.283); ctx.fill();
  /* rice grain specks rotate with roll */
  ctx.save(); ctx.rotate(ball.roll);
  ctx.fillStyle='rgba(255,255,255,.5)';
  for(var g2=0;g2<8;g2++){
    var ga=g2*.785, gr=ball.r*.58;
    ctx.beginPath(); ctx.ellipse(Math.cos(ga)*gr,Math.sin(ga)*gr,ball.r*.07,ball.r*.04,ga,0,6.283); ctx.fill();
  }
  ctx.restore();
  /* stuck items ride the rim */
  ctx.save(); ctx.rotate(ball.roll*.8);
  ball.stuck.forEach(function(s){
    var sr=Math.min(s.r,ball.r*.4);
    var d2=ball.r*.92;
    ctx.save();
    ctx.translate(Math.cos(s.ang)*d2,Math.sin(s.ang)*d2);
    ctx.fillStyle=s.c;
    ctx.beginPath(); ctx.arc(0,0,sr*.8,0,6.283); ctx.fill();
    ctx.strokeStyle='rgba(0,0,0,.3)'; ctx.lineWidth=1.5;
    ctx.stroke();
    ctx.restore();
  });
  ctx.restore();
  ctx.restore();
}

/* ═══════════ loop ═══════════ */
var last=0;
function frame(ts){
  requestAnimationFrame(frame);
  var dt=Math.min(.04,(ts-last)/1000||.016); last=ts;
  step(dt);
  render();
}

/* ═══════════ audio ═══════════ */
var AC=null, master=null, muted=false;
function ensureAC(){
  if(AC) return AC;
  try{ AC=new (window.AudioContext||window.webkitAudioContext)();
    master=AC.createGain(); master.gain.value=1; master.connect(AC.destination);
  }catch(e){}
  return AC;
}
function nom(){
  if(!AC||muted) return;
  var t=AC.currentTime;
  /* pitch sinks as the maki grows — big ball, deep gulp */
  var f=Math.max(160, 900-ball.r*6);
  var o=AC.createOscillator(), g=AC.createGain();
  o.type='triangle';
  o.frequency.setValueAtTime(f,t);
  o.frequency.exponentialRampToValueAtTime(f*1.6,t+.07);
  g.gain.setValueAtTime(.12,t); g.gain.exponentialRampToValueAtTime(.0001,t+.12);
  o.connect(g).connect(master); o.start(t); o.stop(t+.13);
}
function thud(){
  if(!AC||muted) return;
  var t=AC.currentTime, o=AC.createOscillator(), g=AC.createGain();
  o.type='sine';
  o.frequency.setValueAtTime(110,t);
  o.frequency.exponentialRampToValueAtTime(50,t+.12);
  g.gain.setValueAtTime(.18,t); g.gain.exponentialRampToValueAtTime(.0001,t+.15);
  o.connect(g).connect(master); o.start(t); o.stop(t+.16);
}
function jingle(fs){
  if(!AC||muted) return;
  fs.forEach(function(f,i){
    var t=AC.currentTime+i*.09, o=AC.createOscillator(), g=AC.createGain();
    o.type='triangle'; o.frequency.value=f;
    g.gain.setValueAtTime(.1,t); g.gain.exponentialRampToValueAtTime(.0001,t+.15);
    o.connect(g).connect(master); o.start(t); o.stop(t+.16);
  });
}

/* ═══════════ input ═══════════ */
addEventListener('keydown',function(e){
  var k=e.key.toLowerCase(); keys[k]=true;
  if(k==='m'){ muted=!muted; }
  if(state.mode==='play'&&['w','a','s','d',' ','arrowup','arrowdown','arrowleft','arrowright'].indexOf(k)>=0) e.preventDefault();
});
addEventListener('keyup',function(e){ keys[e.key.toLowerCase()]=false; });
function setPhysics(p){
  COSMIC.physics=p==='float'?'float':'plat';
  try{ localStorage.setItem('maki-physics',COSMIC.physics); }catch(e){}
  $('phys-plat').setAttribute('aria-checked',COSMIC.physics==='plat'?'true':'false');
  $('phys-float').setAttribute('aria-checked',COSMIC.physics==='float'?'true':'false');
}
$('phys-plat').addEventListener('click',function(){ setPhysics('plat'); });
$('phys-float').addEventListener('click',function(){ setPhysics('float'); });
setPhysics(COSMIC.physics);   /* reflect persisted choice on the menu */
$('plat-btn').addEventListener('click',function(){ startGame('plat'); });
$('cosmic-btn').addEventListener('click',function(){ startGame('cosmic'); });
$('again-btn').addEventListener('click',function(){
  $('end-ov').classList.remove('on');
  $('best-plat').textContent=state.bestPlat?state.bestPlat.toFixed(1)+' cm':'—';
  $('best-cosmic').textContent=state.bestCosmic||'—';
  startGame(state.variant);
});
var joyEl=$('joy'), nub=$('nub'), joyId=null;
function jUpd(e){
  var r=joyEl.getBoundingClientRect(),t=null;
  for(var i=0;i<e.touches.length;i++) if(e.touches[i].identifier===joyId) t=e.touches[i];
  if(!t) return;
  var dx=t.clientX-(r.left+r.width/2), dy=t.clientY-(r.top+r.height/2), mx=r.width/2;
  var m2=Math.hypot(dx,dy); if(m2>mx){ dx=dx/m2*mx; dy=dy/m2*mx; }
  joy.x=dx/mx; joy.y=dy/mx; joy.on=true;
  nub.style.left='calc(50% + '+dx+'px)'; nub.style.top='calc(50% + '+dy+'px)';
}
joyEl.addEventListener('touchstart',function(e){ e.preventDefault(); joyId=e.changedTouches[0].identifier; jUpd(e); },{passive:false});
joyEl.addEventListener('touchmove',function(e){ e.preventDefault(); jUpd(e); },{passive:false});
joyEl.addEventListener('touchend',function(e){ e.preventDefault(); joyId=null; joy.on=false; joy.x=joy.y=0; nub.style.left='50%'; nub.style.top='50%'; },{passive:false});
function announce(t){ $('sr-status').textContent=t; }

requestAnimationFrame(frame);

/* debug hook */
window.__maki={
  state:function(){ return {mode:state.mode, variant:state.variant, count:state.count, time:state.time, r:ball.r, cm:sizeCm(),
    items:items.length, stuck:ball.stuck.length, zoom:cam.z, grounded:ball.grounded, vy:ball.vy}; },
  plats:PLATS, chopsticks:CHOPSTICKS,
  cosmic:COSMIC, rebase:rebase, seedTier:seedCosmicTier, fmtSize:fmtSize, sizeAbs:sizeAbsMeters,
  cplats:function(){ return CPLATS; }, cosmicJumpV:cosmicJumpV, setPhysics:setPhysics,
  start:startGame, step:step,
  ballRef:function(){ return ball; },   /* live accessor — startGame reassigns ball */
  key:function(k,v){ keys[k]=v; },
  tp:function(x,y){ ball.x=x; ball.y=y; ball.vx=0; ball.vy=0; },
  items:function(){ return items; },
  spawn:spawnItem, noRestock:false,
  end:endGame
};
})();
