<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOOM 3D - First Person Shooter</title>
    <link rel="icon" href="https://emojicdn.elk.sh/💀">

    <meta property="og:title" content="DOOM 3D">
    <meta property="og:description" content="Survive waves of enemies in a 3D arena shooter">
    <meta property="og:url" content="https://app.sloppy.live/doom-3d">
    <meta property="og:image" content="https://app.sloppy.live/doom-3d/og-image.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #000;
            color: #0f0;
            overflow: hidden;
        }

        #gameContainer {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        .hud {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        .hud-item {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            color: #0f0;
        }

        .hud-item.low {
            color: #f00;
            animation: blink 0.5s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }

        .crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            pointer-events: none;
            z-index: 99;
        }

        .crosshair::before,
        .crosshair::after {
            content: '';
            position: absolute;
            background: #0f0;
        }

        .crosshair::before {
            width: 2px;
            height: 20px;
            left: 9px;
            top: 0;
        }

        .crosshair::after {
            width: 20px;
            height: 2px;
            left: 0;
            top: 9px;
        }

        .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .start-screen h1 {
            font-size: 72px;
            color: #f00;
            margin-bottom: 30px;
            text-shadow: 0 0 20px #f00;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .start-btn {
            padding: 20px 60px;
            background: #8b0000;
            border: 3px solid #f00;
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: all 0.3s;
        }

        .start-btn:hover {
            background: #f00;
            box-shadow: 0 0 30px #f00;
        }

        .instructions {
            margin-top: 40px;
            color: #ff6666;
            text-align: center;
            line-height: 2;
            font-size: 18px;
        }

        .game-over {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(139, 0, 0, 0.95);
            padding: 60px;
            border: 5px solid #f00;
            text-align: center;
            z-index: 1000;
        }

        .game-over.show {
            display: block;
        }

        .game-over h2 {
            font-size: 64px;
            color: #f00;
            margin-bottom: 30px;
            text-shadow: 0 0 20px #f00;
        }

        
            </style>
</head>
<body>
<a href="https://app.sloppy.live/overview" style="color:#4ecdc4;text-decoration:none;margin-left:10px">🎨 View All Apps</a>

    <div id="gameContainer"></div>

    <div class="crosshair"></div>

    <div class="hud">
        <div class="hud-item" id="health">HEALTH: 100</div>
        <div class="hud-item armor" id="armor" style="color:#4ec9d6;text-shadow:2px 2px 4px #000;">ARMOR: 0</div>
        <div class="hud-item" id="ammo">AMMO: 50</div>
        <div class="hud-item" id="kills">KILLS: 0</div>
    </div>

    <div class="start-screen" id="startScreen">
        <h1>💀 DOOM 3D 💀</h1>
        <button class="start-btn" onclick="startGame()">START GAME</button>
        <div class="instructions">
            <div>WASD - MOVE</div>
            <div>MOUSE - LOOK AROUND</div>
            <div>CLICK - SHOOT</div>
            <div>RIP AND TEAR</div>
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <h2>YOU DIED</h2>
        <div style="color: #ff6666; margin-bottom: 30px; font-size: 28px;">
            KILLS: <span id="finalKills">0</span>
        </div>
        <button class="start-btn" onclick="restartGame()">RESTART</button>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer, clock;
        let gameRunning = false;
        let player = {
            health: 100,
            maxHealth: 100,
            armor: 0,
            maxArmor: 100,
            ammo: 50,
            bfgAmmo: 3,         // BFG-9000 starts loaded with 3 shots
            speed: 0.15,
            height: 1.6,
            lastHitT: 0,        // performance.now() of last enemy contact damage
            damageCooldown: 600 // ms — prevents instant-death from per-frame contact
        };
        let enemies = [];
        let bullets = [];
        let pickups = [];       // armor packs scattered in corridors
        let bfgOrbs = [];       // active BFG plasma orbs
        let kills = 0;
        let keys = {};
        let mouseX = 0, mouseY = 0;
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        let enemySpawnTimer = 0;

        // Initialize Three.js scene
        function initScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a0000);
            scene.fog = new THREE.Fog(0x1a0000, 0, 50);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, player.height, 0);
            // YXZ Euler order = yaw-then-pitch — without this, modifying
            // rotation.x and .y separately produces gimbal-lock-style roll
            // when looking up/down. Restores normal FPS mouse-look feel.
            camera.rotation.order = 'YXZ';

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('gameContainer').appendChild(renderer.domElement);

            clock = new THREE.Clock();

            // Lighting — original setup was effectively black (ambient
            // 0x330000 × 0.5 with PBR materials painted #1a0000–#3d0000
            // → near-zero luminance). Bumped ambient + added a sky/floor
            // hemisphere light so the room reads as "moody red" instead
            // of flat black, then doubled the point light to keep the
            // central glow obvious.
            const ambientLight = new THREE.AmbientLight(0x553311, 1.0);
            scene.add(ambientLight);

            const hemiLight = new THREE.HemisphereLight(0xff5544, 0x1a0808, 0.6);
            scene.add(hemiLight);

            const pointLight = new THREE.PointLight(0xff5530, 2.0, 60);
            pointLight.position.set(0, 10, 0);
            pointLight.castShadow = true;
            scene.add(pointLight);

            // Floor
            const floorGeometry = new THREE.PlaneGeometry(100, 100, 20, 20);
            const floorTexture = createCheckerTexture();
            const floorMaterial = new THREE.MeshStandardMaterial({
                map: floorTexture,
                roughness: 0.8,
                metalness: 0.2
            });
            const floor = new THREE.Mesh(floorGeometry, floorMaterial);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // Walls
            createWalls();
            // Player weapon model + escape-portal goal + armor pickups
            createWeaponModel();
            createGoal();
            createArmorPickups();
            // Camera needs to be in the scene graph so its child weapon
            // mesh actually renders.
            scene.add(camera);

            window.addEventListener('resize', onWindowResize);
        }

        // ===== LASER BLASTER MODEL =====
        // A chunky neon sidearm parented to the camera so it follows
        // every move/look. Lives in screen space (positions in metres
        // relative to the camera frame).
        let weaponGroup = null;
        let weaponBobT = 0;
        let weaponRecoilT = 0;
        function createWeaponModel() {
            weaponGroup = new THREE.Group();
            const bodyMat = new THREE.MeshStandardMaterial({
                color: 0x261c40, emissive: 0x110820, metalness: 0.85, roughness: 0.25,
            });
            const accentMat = new THREE.MeshStandardMaterial({
                color: 0xb94dff, emissive: 0xb94dff, emissiveIntensity: 0.9, metalness: 0.4, roughness: 0.3,
            });
            const tipMat = new THREE.MeshBasicMaterial({ color: 0xffe5ff });
            // body (held in right hand)
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.20, 0.20, 0.50), bodyMat);
            body.position.set(0.30, -0.30, -0.55);
            weaponGroup.add(body);
            // grip
            const grip = new THREE.Mesh(new THREE.BoxGeometry(0.10, 0.30, 0.14), bodyMat);
            grip.position.set(0.30, -0.46, -0.40);
            grip.rotation.x = -0.25;
            weaponGroup.add(grip);
            // accent rail along the body
            const rail = new THREE.Mesh(new THREE.BoxGeometry(0.04, 0.06, 0.45), accentMat);
            rail.position.set(0.30, -0.20, -0.55);
            weaponGroup.add(rail);
            // barrel — the actual emitter
            const barrel = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.55, 14), bodyMat);
            barrel.rotation.x = Math.PI / 2;
            barrel.position.set(0.30, -0.28, -0.95);
            weaponGroup.add(barrel);
            // glowing tip
            const tip = new THREE.Mesh(new THREE.SphereGeometry(0.07, 12, 10), tipMat);
            tip.position.set(0.30, -0.28, -1.22);
            weaponGroup.add(tip);
            // sight at the back
            const sight = new THREE.Mesh(new THREE.BoxGeometry(0.05, 0.08, 0.04), accentMat);
            sight.position.set(0.30, -0.18, -0.36);
            weaponGroup.add(sight);
            camera.add(weaponGroup);
        }

        // ===== ESCAPE GOAL =====
        // A pulsing neon-green portal at the far corner of the arena.
        // Reaching it triggers the win condition (handled in animate()
        // by calling levelComplete()). Rotates each frame for life.
        let goalGroup = null;
        function createGoal() {
            goalGroup = new THREE.Group();
            const ringMat = new THREE.MeshBasicMaterial({ color: 0x55ffaa });
            const ring = new THREE.Mesh(new THREE.TorusGeometry(0.95, 0.10, 14, 36), ringMat);
            ring.rotation.x = Math.PI / 2;
            goalGroup.add(ring);
            ring.castShadow = false;
            // inner disc — a glowing portal "wall"
            const discMat = new THREE.MeshBasicMaterial({
                color: 0x00ff88, transparent: true, opacity: 0.55, side: THREE.DoubleSide,
            });
            const disc = new THREE.Mesh(new THREE.CircleGeometry(0.85, 32), discMat);
            disc.rotation.x = Math.PI / 2;
            goalGroup.add(disc);
            // vertical pillar so it reads from far away
            const pillarMat = new THREE.MeshBasicMaterial({ color: 0x00ff88, transparent: true, opacity: 0.32 });
            const pillar = new THREE.Mesh(new THREE.CylinderGeometry(0.85, 0.85, 4, 24, 1, true), pillarMat);
            pillar.position.y = 2;
            goalGroup.add(pillar);
            // park it at the far corner of the new arena layout
            goalGroup.position.set(20, 0.15, 20);
            scene.add(goalGroup);
        }

        function createCheckerTexture() {
            const size = 512;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            const tileSize = size / 8;
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    ctx.fillStyle = (i + j) % 2 === 0 ? '#2a0000' : '#1a0000';
                    ctx.fillRect(i * tileSize, j * tileSize, tileSize, tileSize);
                }
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(10, 10);
            return texture;
        }

        function createBrickTexture() {
            const size = 512;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#3d0000';
            ctx.fillRect(0, 0, size, size);

            ctx.strokeStyle = '#1a0000';
            ctx.lineWidth = 4;

            const brickWidth = size / 8;
            const brickHeight = size / 16;

            for (let row = 0; row < 16; row++) {
                for (let col = 0; col < 8; col++) {
                    const offset = row % 2 === 0 ? 0 : brickWidth / 2;
                    ctx.strokeRect(col * brickWidth + offset, row * brickHeight, brickWidth, brickHeight);
                }
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(5, 5);
            return texture;
        }

        // Wall AABBs collected for collision queries. Each entry is
        // {x1, z1, x2, z2} (axis-aligned bounding box on the floor plane).
        const wallAABBs = [];
        function spawnWall(cx, cz, sx, sz, mat, h) {
            const wallHeight = h || 5;
            const m = new THREE.Mesh(new THREE.BoxGeometry(sx, wallHeight, sz), mat);
            m.position.set(cx, wallHeight / 2, cz);
            m.castShadow = true;
            m.receiveShadow = true;
            scene.add(m);
            wallAABBs.push({
                x1: cx - sx / 2, x2: cx + sx / 2,
                z1: cz - sz / 2, z2: cz + sz / 2,
            });
        }
        function createWalls() {
            const wallTexture = createBrickTexture();
            const wallMaterial = new THREE.MeshStandardMaterial({
                map: wallTexture,
                roughness: 0.9,
                metalness: 0.1
            });

            const wallThickness = 1;
            const arenaSize = 50;
            const half = arenaSize / 2;
            // Perimeter
            spawnWall(0,     -half, arenaSize, wallThickness, wallMaterial);
            spawnWall(0,      half, arenaSize, wallThickness, wallMaterial);
            spawnWall(-half, 0,     wallThickness, arenaSize, wallMaterial);
            spawnWall( half, 0,     wallThickness, arenaSize, wallMaterial);

            // Interior layout — non-square per chat. A staggered grid of
            // partial walls + a few pillars carves the arena into rooms
            // and corridors so combat isn't a flat box.
            //   ┌── short walls running E–W ──┐
            spawnWall(-12, -10, 14, wallThickness, wallMaterial);
            spawnWall( 14, -10, 16, wallThickness, wallMaterial);
            spawnWall(-16,  10, 12, wallThickness, wallMaterial);
            spawnWall( 12,  10, 14, wallThickness, wallMaterial);
            //   short walls running N–S
            spawnWall( -8,  -2, wallThickness, 8,  wallMaterial);
            spawnWall(  8,   2, wallThickness, 8,  wallMaterial);
            spawnWall(  0,  -8, wallThickness, 6,  wallMaterial);
            spawnWall(  0,   8, wallThickness, 6,  wallMaterial);
            //   pillars (3×3 bricks). The previous central pillar at
            //   (0, 0, 0) overlapped the player spawn — every WASD step
            //   was rejected by the new wall-AABB collision because
            //   the camera was already inside that box. Dropped the
            //   central one + relocated the corner pillars away from
            //   the (0,0) spawn radius.
            spawnWall(-18, -18, 3, 3, wallMaterial);
            spawnWall( 18, -18, 3, 3, wallMaterial);
            spawnWall(-18,  18, 3, 3, wallMaterial);
            spawnWall( 18,  18, 3, 3, wallMaterial);
        }

        // Circle-vs-AABB step: tries to move the camera by (dx, dz). If
        // the move would penetrate any wall AABB (with `radius` clearance
        // around the player), the move is rejected on that axis. Called
        // separately for X and Z so the player can slide along walls.
        function tryAxisStep(dx, dz, radius) {
            const nx = camera.position.x + dx;
            const nz = camera.position.z + dz;
            for (let i = 0; i < wallAABBs.length; i++) {
                const w = wallAABBs[i];
                // closest point on the AABB to the proposed centre
                const cx = Math.max(w.x1, Math.min(nx, w.x2));
                const cz = Math.max(w.z1, Math.min(nz, w.z2));
                const ddx = nx - cx, ddz = nz - cz;
                if (ddx * ddx + ddz * ddz < radius * radius) return;   // blocked
            }
            camera.position.x = nx;
            camera.position.z = nz;
        }

        // Anthropomorphic neon enemy — humanoid silhouette built from a
        // few primitives so it reads as a "figure" rather than a ball.
        // Standing height ~1.7u with the feet planted on y=0 so the
        // group's transform translates the whole body together.
        function createEnemy() {
            const group = new THREE.Group();
            // legs (cylinders, dark crimson, slightly metallic)
            const legMat = new THREE.MeshStandardMaterial({ color: 0x6a0d0d, emissive: 0x440000, roughness: 0.5, metalness: 0.55 });
            const legL = new THREE.Mesh(new THREE.CylinderGeometry(0.13, 0.15, 0.75, 10), legMat);
            legL.position.set(-0.17, 0.38, 0);
            legL.castShadow = true;
            const legR = legL.clone(); legR.position.x = 0.17;
            group.add(legL); group.add(legR);
            // torso (bright magenta-red emissive)
            const torsoMat = new THREE.MeshStandardMaterial({ color: 0xff1a3a, emissive: 0xaa1010, roughness: 0.45, metalness: 0.7 });
            const torso = new THREE.Mesh(new THREE.BoxGeometry(0.55, 0.75, 0.32), torsoMat);
            torso.position.y = 1.10;
            torso.castShadow = true;
            group.add(torso);
            // arms (cylinders pinned to shoulders)
            const armMat = new THREE.MeshStandardMaterial({ color: 0xaa1818, emissive: 0x661010, roughness: 0.5, metalness: 0.5 });
            const armL = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.10, 0.65, 10), armMat);
            armL.position.set(-0.36, 1.05, 0);
            const armR = armL.clone(); armR.position.x = 0.36;
            group.add(armL); group.add(armR);
            // head (glowing orange sphere)
            const headMat = new THREE.MeshStandardMaterial({ color: 0xff6622, emissive: 0xff3300, roughness: 0.4, metalness: 0.4 });
            const head = new THREE.Mesh(new THREE.SphereGeometry(0.22, 14, 12), headMat);
            head.position.y = 1.62;
            head.castShadow = true;
            group.add(head);
            // pinprick eyes (basic, full-bright cyan-green for "alive" pop)
            const eyeMat = new THREE.MeshBasicMaterial({ color: 0x6affe0 });
            const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.045, 8, 6), eyeMat);
            eyeL.position.set(-0.08, 1.66, 0.19);
            const eyeR = eyeL.clone(); eyeR.position.x = 0.08;
            group.add(eyeL); group.add(eyeR);
            // emissive chest "core" — visual focal point + obvious hit area
            const coreMat = new THREE.MeshBasicMaterial({ color: 0xffffaa });
            const core = new THREE.Mesh(new THREE.SphereGeometry(0.08, 10, 8), coreMat);
            core.position.set(0, 1.20, 0.18);
            group.add(core);

            // Spawn at one of the inner ring positions, shifted in from
            // the walls (now at ±25) so the enemy doesn't pop inside one.
            const side = Math.floor(Math.random() * 4);
            const range = 16;
            const dist = 18;
            switch (side) {
                case 0: group.position.set((Math.random() * 2 - 1) * range, 0, -dist); break;
                case 1: group.position.set( dist, 0, (Math.random() * 2 - 1) * range); break;
                case 2: group.position.set((Math.random() * 2 - 1) * range, 0,  dist); break;
                case 3: group.position.set(-dist, 0, (Math.random() * 2 - 1) * range); break;
            }
            scene.add(group);

            enemies.push({
                mesh: group,                  // keep field name for compat
                health: 3,
                speed: 0.05 + Math.random() * 0.03,
                bobPhase: Math.random() * Math.PI * 2,
            });
        }

        function spawnEnemies() {
            enemySpawnTimer++;
            const spawnRate = 60 - Math.min(kills, 40);
            if (enemySpawnTimer > spawnRate) {
                createEnemy();
                enemySpawnTimer = 0;
            }
        }

        function shoot() {
            if (player.ammo <= 0) return;

            player.ammo--;
            updateHUD();

            // neon-purple plasma bolt instead of yellow ball
            const bulletGeometry = new THREE.SphereGeometry(0.12, 10, 10);
            const bulletMaterial = new THREE.MeshBasicMaterial({ color: 0xe5b3ff });
            const bulletMesh = new THREE.Mesh(bulletGeometry, bulletMaterial);
            // spawn from the gun's barrel tip, not the camera centre —
            // weapon is parented to camera so we resolve world position
            // through the local offset that matches createWeaponModel().
            const muzzleLocal = new THREE.Vector3(0.30, -0.28, -1.22);
            const muzzleWorld = muzzleLocal.clone();
            camera.localToWorld(muzzleWorld);
            bulletMesh.position.copy(muzzleWorld);

            const direction = new THREE.Vector3();
            camera.getWorldDirection(direction);

            scene.add(bulletMesh);

            bullets.push({
                mesh: bulletMesh,
                direction: direction.clone(),
                speed: 0.8,
                life: 100
            });
            // kick the weapon back briefly
            weaponRecoilT = 1.0;
        }

        function updateBullets() {
            for (let i = bullets.length - 1; i >= 0; i--) {
                const bullet = bullets[i];
                bullet.mesh.position.addScaledVector(bullet.direction, bullet.speed);
                bullet.life--;

                if (bullet.life <= 0) {
                    scene.remove(bullet.mesh);
                    bullets.splice(i, 1);
                    continue;
                }

                // Check collision with enemies. Use XZ distance + a
                // body-height window so the bullet treats the figure as
                // an upright capsule rather than a single point at the
                // feet (which is where group.position lives).
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const enemy = enemies[j];
                    const dx = bullet.mesh.position.x - enemy.mesh.position.x;
                    const dz = bullet.mesh.position.z - enemy.mesh.position.z;
                    const dist2D = Math.hypot(dx, dz);
                    const inHeight = bullet.mesh.position.y > 0.2 && bullet.mesh.position.y < 1.9;
                    if (dist2D < 0.55 && inHeight) {
                        enemy.health--;
                        scene.remove(bullet.mesh);
                        bullets.splice(i, 1);

                        if (enemy.health <= 0) {
                            scene.remove(enemy.mesh);
                            enemies.splice(j, 1);
                            kills++;
                            player.ammo += 5;
                            updateHUD();
                        }
                        break;
                    }
                }
            }
        }

        function updateEnemies() {
            const now = performance.now();
            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                const dx = camera.position.x - enemy.mesh.position.x;
                const dz = camera.position.z - enemy.mesh.position.z;
                const len = Math.hypot(dx, dz) || 1;
                enemy.mesh.position.x += (dx / len) * enemy.speed;
                enemy.mesh.position.z += (dz / len) * enemy.speed;
                enemy.mesh.rotation.y = Math.atan2(dx, dz);
                const t = now * 0.006 + enemy.bobPhase;
                enemy.mesh.position.y = Math.abs(Math.sin(t)) * 0.06;

                // Damage on contact — gated by player.damageCooldown so
                // standing next to an enemy doesn't drain HP at 60fps
                // (the original "instant-death" complaint per chat).
                // Each contact deals a chunky hit (12 dmg) but only
                // once every 600ms, giving the player time to back off
                // or fire back. This is the "fair fight" pacing.
                const dist2D = Math.hypot(dx, dz);
                if (dist2D < 1.4 && now - player.lastHitT >= player.damageCooldown) {
                    player.lastHitT = now;
                    applyDamage(12);
                }
            }
        }

        // Damage flow: armor absorbs 2/3 of the hit first, HP takes
        // whatever's left. Once armor hits 0, HP eats the full damage.
        function applyDamage(dmg) {
            if (player.armor > 0) {
                const absorbed = Math.min(player.armor, Math.ceil(dmg * 0.66));
                player.armor -= absorbed;
                dmg -= absorbed;
            }
            if (dmg > 0) player.health = Math.max(0, player.health - dmg);
            updateHUD();
            if (player.health <= 0) gameOver();
        }

        // ===== ARMOR PICKUPS =====
        // Spawn a fixed set of armor packs at hand-placed positions
        // tucked into the new non-square corridor layout. Each grants
        // +25 armor and despawns on pickup. Players have to actually
        // walk to them to get the boost.
        const ARMOR_SPAWNS = [
            [-15, 0, -5], [15, 0,  0], [0, 0, 12], [-10, 0, 14], [8, 0, -15],
        ];
        function createArmorPickups() {
            for (const [x, y, z] of ARMOR_SPAWNS) {
                const group = new THREE.Group();
                const shellMat = new THREE.MeshStandardMaterial({
                    color: 0x4ec9d6, emissive: 0x1a8090, emissiveIntensity: 0.8,
                    metalness: 0.7, roughness: 0.25, transparent: true, opacity: 0.85,
                });
                const shell = new THREE.Mesh(new THREE.IcosahedronGeometry(0.35, 0), shellMat);
                shell.position.y = 1.0;
                group.add(shell);
                // wireframe overlay reads as a "pickup" through walls
                const wf = new THREE.LineSegments(
                    new THREE.WireframeGeometry(new THREE.IcosahedronGeometry(0.36, 0)),
                    new THREE.LineBasicMaterial({ color: 0xa0e8f0 })
                );
                wf.position.y = 1.0;
                group.add(wf);
                // glowing pedestal core
                const coreMat = new THREE.MeshBasicMaterial({ color: 0x6affe0 });
                const core = new THREE.Mesh(new THREE.SphereGeometry(0.10, 10, 8), coreMat);
                core.position.y = 0.3;
                group.add(core);
                group.position.set(x, y, z);
                scene.add(group);
                pickups.push({ group, shell, kind: 'armor', amount: 25, taken: false });
            }
        }
        function updatePickups(dt) {
            const now = performance.now();
            for (let i = pickups.length - 1; i >= 0; i--) {
                const p = pickups[i];
                if (p.taken) continue;
                // float + spin
                p.group.rotation.y += dt * 1.4;
                p.shell.position.y = 1.0 + Math.sin(now * 0.003 + i) * 0.10;
                // proximity grab
                const dx = camera.position.x - p.group.position.x;
                const dz = camera.position.z - p.group.position.z;
                if (Math.hypot(dx, dz) < 1.2) {
                    p.taken = true;
                    scene.remove(p.group);
                    pickups.splice(i, 1);
                    if (p.kind === 'armor') {
                        player.armor = Math.min(player.maxArmor, player.armor + p.amount);
                        updateHUD();
                    }
                }
            }
        }

        // ===== BFG-9000 =====
        // Massive slow-moving green plasma orb. AOE damage on impact
        // (radius 4u, deals 5 to every enemy in range — usually a wipe).
        // Limited ammo + 0.9s cooldown so it's a panic button, not the
        // default fire.
        let bfgCooldownT = 0;
        function fireBFG() {
            if (player.bfgAmmo <= 0 || bfgCooldownT > 0) return;
            player.bfgAmmo--;
            bfgCooldownT = 0.9;
            updateHUD();

            const muzzleLocal = new THREE.Vector3(0.30, -0.28, -1.22);
            const muzzleWorld = muzzleLocal.clone();
            camera.localToWorld(muzzleWorld);

            const direction = new THREE.Vector3();
            camera.getWorldDirection(direction);

            // Big glowing orb made of two layers — bright core + softer
            // outer halo (transparent additive-ish).
            const orb = new THREE.Group();
            const coreMat = new THREE.MeshBasicMaterial({ color: 0xc6ffb6 });
            const core = new THREE.Mesh(new THREE.SphereGeometry(0.32, 18, 14), coreMat);
            orb.add(core);
            const haloMat = new THREE.MeshBasicMaterial({ color: 0x55ff88, transparent: true, opacity: 0.45 });
            const halo = new THREE.Mesh(new THREE.SphereGeometry(0.55, 18, 14), haloMat);
            orb.add(halo);
            const wfMat = new THREE.LineBasicMaterial({ color: 0x00ff66 });
            const wf = new THREE.LineSegments(new THREE.WireframeGeometry(new THREE.IcosahedronGeometry(0.65, 1)), wfMat);
            orb.add(wf);
            orb.position.copy(muzzleWorld);
            scene.add(orb);
            bfgOrbs.push({ orb, direction: direction.clone(), speed: 0.35, life: 200 });
        }
        function updateBFGOrbs(dt) {
            if (bfgCooldownT > 0) bfgCooldownT = Math.max(0, bfgCooldownT - dt);
            for (let i = bfgOrbs.length - 1; i >= 0; i--) {
                const o = bfgOrbs[i];
                o.orb.position.addScaledVector(o.direction, o.speed);
                o.life--;
                // spin the wireframe so it reads as alive
                o.orb.rotation.x += dt * 4;
                o.orb.rotation.y += dt * 5;
                // detonate on wall hit OR life expiring OR enemy contact
                let hit = (o.life <= 0);
                if (!hit) {
                    for (let j = 0; j < wallAABBs.length; j++) {
                        const w = wallAABBs[j];
                        const px = o.orb.position.x, pz = o.orb.position.z;
                        if (px > w.x1 - 0.5 && px < w.x2 + 0.5 && pz > w.z1 - 0.5 && pz < w.z2 + 0.5) { hit = true; break; }
                    }
                }
                if (!hit) {
                    for (const e of enemies) {
                        const dx = o.orb.position.x - e.mesh.position.x;
                        const dz = o.orb.position.z - e.mesh.position.z;
                        if (Math.hypot(dx, dz) < 1.0) { hit = true; break; }
                    }
                }
                if (hit) {
                    detonateBFG(o.orb.position);
                    scene.remove(o.orb);
                    bfgOrbs.splice(i, 1);
                }
            }
        }
        function detonateBFG(pos) {
            // AOE — 4u radius, 5 dmg per enemy hit (3 hits with default
            // enemy HP = clean wipe).
            for (let j = enemies.length - 1; j >= 0; j--) {
                const e = enemies[j];
                const dx = pos.x - e.mesh.position.x;
                const dz = pos.z - e.mesh.position.z;
                if (Math.hypot(dx, dz) < 4.0) {
                    e.health -= 5;
                    if (e.health <= 0) {
                        scene.remove(e.mesh);
                        enemies.splice(j, 1);
                        kills++;
                        player.ammo += 5;
                    }
                }
            }
            updateHUD();
            // brief expanding-ring fx
            const ringMat = new THREE.MeshBasicMaterial({ color: 0x55ff88, transparent: true, opacity: 0.7, side: THREE.DoubleSide });
            const ring = new THREE.Mesh(new THREE.RingGeometry(0.5, 0.7, 32), ringMat);
            ring.rotation.x = Math.PI / 2;
            ring.position.copy(pos);
            scene.add(ring);
            const start = performance.now();
            const fade = () => {
                const k = (performance.now() - start) / 400;
                if (k >= 1) { scene.remove(ring); return; }
                ring.scale.setScalar(1 + k * 5);
                ringMat.opacity = 0.7 * (1 - k);
                requestAnimationFrame(fade);
            };
            fade();
        }

        function updateHUD() {
            document.getElementById('health').textContent = `HEALTH: ${player.health}`;
            document.getElementById('health').className = player.health < 30 ? 'hud-item low' : 'hud-item';
            document.getElementById('armor').textContent = `ARMOR: ${player.armor}`;
            document.getElementById('ammo').textContent = `AMMO: ${player.ammo}  ·  BFG: ${player.bfgAmmo}`;
            document.getElementById('kills').textContent = `KILLS: ${kills}`;
        }

        // Gamepad API support — left stick moves, right stick looks,
        // right trigger fires. Per chat: implement for movement +
        // looking in doom-3d. Reads navigator.getGamepads()[0] each
        // frame; deadzone 0.15 to ignore drift.
        let _lastTriggerPressed = false;
        function applyGamepad(dt) {
            const pads = navigator.getGamepads ? navigator.getGamepads() : [];
            let gp = null;
            for (let i = 0; i < pads.length; i++) {
                if (pads[i] && pads[i].connected) { gp = pads[i]; break; }
            }
            if (!gp) return;
            const dz = 0.15;
            const lx = Math.abs(gp.axes[0]) > dz ? gp.axes[0] : 0;
            const ly = Math.abs(gp.axes[1]) > dz ? gp.axes[1] : 0;
            const rx = Math.abs(gp.axes[2]) > dz ? gp.axes[2] : 0;
            const ry = Math.abs(gp.axes[3]) > dz ? gp.axes[3] : 0;
            // Move — translate stick into existing velocity vector so
            // wall collision + EulerApplied rotation handle it the
            // same as WASD. dt-scaled so faster framerates don't
            // amplify gamepad input.
            const moveScale = player.speed * 60 * dt;
            velocity.x += lx * moveScale;
            velocity.z += ly * moveScale;
            // Look — right-stick yaw/pitch with the same clamp the
            // mouse handler uses.
            const lookSens = 1.6 * dt;
            camera.rotation.y -= rx * lookSens;
            camera.rotation.x -= ry * lookSens;
            camera.rotation.x = Math.max(-Math.PI / 2 + 0.05, Math.min(Math.PI / 2 - 0.05, camera.rotation.x));
            // Right trigger fires — edge-triggered so each press = 1 shot.
            const rt = gp.buttons[7];
            const pressed = !!(rt && (rt.pressed || rt.value > 0.5));
            if (pressed && !_lastTriggerPressed) shoot();
            _lastTriggerPressed = pressed;
        }

        function animate() {
            if (!gameRunning) return;

            requestAnimationFrame(animate);

            const delta = clock.getDelta();

            // Movement
            velocity.x = 0;
            velocity.z = 0;

            direction.z = Number(keys['w']) - Number(keys['s']);
            direction.x = Number(keys['d']) - Number(keys['a']);
            direction.normalize();

            if (keys['w']) velocity.z -= player.speed;
            if (keys['s']) velocity.z += player.speed;
            if (keys['a']) velocity.x -= player.speed;
            if (keys['d']) velocity.x += player.speed;

            // gamepad augments the velocity + rotation in the same units
            applyGamepad(delta);

            // YAW-ONLY movement transform. Original code did
            //   camera.position.add(velocity.applyEuler(camera.rotation))
            // which factored in pitch — looking down then pressing W
            // tilted the velocity DOWN through the floor (the "falling
            // through the floor" bug). Use rotation.y only so movement
            // stays in the XZ plane regardless of where the camera looks.
            const yaw = camera.rotation.y;
            const cosY = Math.cos(yaw), sinY = Math.sin(yaw);
            const moveX =  velocity.x * cosY + velocity.z * sinY;
            const moveZ = -velocity.x * sinY + velocity.z * cosY;

            // Axis-decoupled wall collision against every wall AABB.
            const PR = 0.6;          // player radius
            tryAxisStep(moveX, 0, PR);
            tryAxisStep(0, moveZ, PR);

            // Lock eye-height so head-bob / pitch tilt can't drift the
            // camera below the floor.
            camera.position.y = player.height;

            spawnEnemies();
            updateBullets();
            updateEnemies();
            updatePickups(delta);
            updateBFGOrbs(delta);
            updateWeapon(delta);
            updateGoal(delta);
            checkLevelComplete();

            renderer.render(scene, camera);
        }

        // Weapon idle bob + recoil decay, parented to camera so it
        // moves with the view.
        function updateWeapon(dt) {
            if (!weaponGroup) return;
            // bob accelerates while moving (any axis non-zero)
            const moving = Math.abs(velocity.x) + Math.abs(velocity.z) > 0.001;
            weaponBobT += dt * (moving ? 8 : 2);
            const bobX = Math.sin(weaponBobT) * (moving ? 0.012 : 0.004);
            const bobY = Math.abs(Math.sin(weaponBobT * 2)) * (moving ? 0.012 : 0.003);
            weaponGroup.position.x = bobX;
            weaponGroup.position.y = bobY;
            // recoil decays toward 0
            if (weaponRecoilT > 0) {
                weaponRecoilT = Math.max(0, weaponRecoilT - dt * 6);
                weaponGroup.position.z = -weaponRecoilT * 0.08;
                weaponGroup.rotation.x = -weaponRecoilT * 0.10;
            } else {
                weaponGroup.position.z = 0;
                weaponGroup.rotation.x = 0;
            }
        }

        function updateGoal(dt) {
            if (!goalGroup) return;
            goalGroup.rotation.y += dt * 1.4;
            // portal disc throbs alpha
            goalGroup.children.forEach(child => {
                if (child.material && child.material.opacity !== undefined && child.material.opacity < 0.9) {
                    const base = (child.geometry instanceof THREE.CircleGeometry) ? 0.55 : 0.32;
                    child.material.opacity = base + Math.sin(performance.now() * 0.005) * 0.15;
                }
            });
        }

        let _levelDone = false;
        function checkLevelComplete() {
            if (_levelDone || !goalGroup) return;
            const dx = camera.position.x - goalGroup.position.x;
            const dz = camera.position.z - goalGroup.position.z;
            if (dx * dx + dz * dz < 1.6 * 1.6) {
                _levelDone = true;
                levelComplete();
            }
        }
        function levelComplete() {
            gameRunning = false;
            // exit the lock so the game-over card is interactive
            if (document.exitPointerLock) document.exitPointerLock();
            const overEl = document.getElementById('gameOver');
            const titleEl = overEl ? overEl.querySelector('h2') : null;
            const finalEl = document.getElementById('finalKills');
            if (titleEl) titleEl.textContent = 'YOU ESCAPED';
            if (finalEl) finalEl.textContent = kills;
            if (overEl)  overEl.classList.add('show');
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameRunning = true;
            player.health = 100;
            player.armor = 0;
            player.ammo = 50;
            player.bfgAmmo = 3;
            player.lastHitT = 0;
            kills = 0;
            enemySpawnTimer = 0;
            _levelDone = false;
            // wipe any stray BFG orbs from prior round
            for (const o of bfgOrbs) scene && scene.remove(o.orb);
            bfgOrbs.length = 0;
            // re-spawn pickups if scene already exists (PLAY AGAIN path)
            if (scene && pickups.length === 0) createArmorPickups();
            updateHUD();

            if (!scene) {
                initScene();
            }

            // Clear enemies and bullets
            enemies.forEach(e => scene.remove(e.mesh));
            bullets.forEach(b => scene.remove(b.mesh));
            enemies = [];
            bullets = [];

            camera.position.set(0, player.height, 0);
            camera.rotation.set(0, 0, 0);

            // Lock the canvas (renderer.domElement), NOT the body — the
            // mousemove handler explicitly checks `pointerLockElement
            // === renderer.domElement`. Locking body left the check
            // mismatched and mouse-look silently did nothing.
            requestLock();
            animate();
        }

        // ===== POINTER-LOCK PLUMBING =====
        // Centralised so the title screen, restart, and post-Esc click
        // all flow through the same path. Tracks whether a lock is
        // active so we can re-request it from the click handler if the
        // user previously bailed via Esc.
        let _pointerLocked = false;
        function requestLock() {
            if (!renderer) return;
            const el = renderer.domElement;
            const fn = el.requestPointerLock || el.mozRequestPointerLock || el.webkitRequestPointerLock;
            if (!fn) return;
            try {
                // The 'unadjustedMovement' option (Chromium) gives raw
                // mouse delta without OS-level acceleration — feels
                // more consistent across systems. Older browsers ignore
                // the options bag and fall back to the basic call.
                const p = fn.call(el, { unadjustedMovement: true });
                if (p && typeof p.catch === 'function') {
                    p.catch(() => {});   // silently swallow — error event also fires
                }
            } catch (e) { /* fn(el) already attempted */ }
        }
        document.addEventListener('pointerlockchange',  pointerLockChanged);
        document.addEventListener('mozpointerlockchange', pointerLockChanged);
        document.addEventListener('webkitpointerlockchange', pointerLockChanged);
        document.addEventListener('pointerlockerror', () => {
            console.warn('[pointerlock] request failed (user gesture missing or browser cooldown). Click again to retry.');
            _pointerLocked = false;
        });
        function pointerLockChanged() {
            const locked = lockedElement();
            _pointerLocked = (locked === (renderer && renderer.domElement));
            // If gameplay is in progress and the user popped the lock
            // (Esc), keep the world running but show a subtle hint —
            // a click anywhere reacquires it via the existing handler.
            if (gameRunning && !_pointerLocked) {
                // visible cue could go here later; for now just log.
            }
        }

        function restartGame() {
            document.getElementById('gameOver').classList.remove('show');
            startGame();
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('finalKills').textContent = kills;
            document.getElementById('gameOver').classList.add('show');
            document.exitPointerLock();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Controls
        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        // Cross-browser pointer-lock + movement helpers. Some older
        // builds expose `webkitMovementX/Y` and `webkitPointerLockElement`
        // instead of the standard properties; reading both keeps Safari
        // / older Edge / Firefox consistent with Chrome.
        function lockedElement() {
            return document.pointerLockElement
                || document.mozPointerLockElement
                || document.webkitPointerLockElement
                || null;
        }
        document.addEventListener('mousemove', (e) => {
            // Guard: renderer (+ camera) only exist after initScene runs
            // on first start. Without this, moving the mouse on the
            // title screen threw "Cannot read properties of undefined
            // (reading 'domElement')" and broke later interactions.
            if (!renderer || !camera) return;
            const locked = lockedElement();
            if (locked !== renderer.domElement) return;
            const mx = (typeof e.movementX === 'number') ? e.movementX : (e.webkitMovementX || e.mozMovementX || 0);
            const my = (typeof e.movementY === 'number') ? e.movementY : (e.webkitMovementY || e.mozMovementY || 0);
            // Sensitivity tuned per chat — 0.0022 reads natural across
            // 60–144Hz mice without making Safari (which can deliver
            // larger movement deltas) feel twitchy.
            const SENS = 0.0022;
            camera.rotation.y -= mx * SENS;
            camera.rotation.x -= my * SENS;
            camera.rotation.x = Math.max(-Math.PI / 2 + 0.05, Math.min(Math.PI / 2 - 0.05, camera.rotation.x));
        });

        document.addEventListener('click', (e) => {
            if (!gameRunning) return;
            // If the lock was dropped (Esc, alt-tab, etc.), the click
            // request must come from a fresh user gesture — re-lock
            // before / instead of shooting so mouse-look re-engages.
            if (!_pointerLocked) {
                requestLock();
                return;
            }
            shoot();
        });
        // Right-click and F-key fire the BFG-9000.
        document.addEventListener('contextmenu', (e) => {
            if (!gameRunning) return;
            e.preventDefault();
            if (!_pointerLocked) { requestLock(); return; }
            fireBFG();
        });
        document.addEventListener('keydown', (e) => {
            if (!gameRunning) return;
            if (e.key && (e.key.toLowerCase() === 'f')) fireBFG();
        });

        window.startGame = startGame;
        window.restartGame = restartGame;
    </script>
<script src="/sloppy-header/sloppy-bar.js"></script>
</body>
</html>
