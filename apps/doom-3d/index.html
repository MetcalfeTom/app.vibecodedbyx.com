<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOOM 3D - First Person Shooter</title>
    <link rel="icon" href="https://emojicdn.elk.sh/💀">

    <meta property="og:title" content="DOOM 3D">
    <meta property="og:description" content="Survive waves of enemies in a 3D arena shooter">
    <meta property="og:url" content="https://app.sloppy.live/doom-3d">
    <meta property="og:image" content="https://app.sloppy.live/doom-3d/og-image.png">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Courier New', monospace;
            background: #000;
            color: #0f0;
            overflow: hidden;
        }

        #gameContainer {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        .hud {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.9), transparent);
            padding: 20px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
            pointer-events: none;
        }

        .hud-item {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px #000;
            color: #0f0;
        }

        .hud-item.low {
            color: #f00;
            animation: blink 0.5s infinite;
        }

        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0.3; }
        }

        .crosshair {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 20px;
            height: 20px;
            pointer-events: none;
            z-index: 99;
        }

        .crosshair::before,
        .crosshair::after {
            content: '';
            position: absolute;
            background: #0f0;
        }

        .crosshair::before {
            width: 2px;
            height: 20px;
            left: 9px;
            top: 0;
        }

        .crosshair::after {
            width: 20px;
            height: 2px;
            left: 0;
            top: 9px;
        }

        .start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .start-screen h1 {
            font-size: 72px;
            color: #f00;
            margin-bottom: 30px;
            text-shadow: 0 0 20px #f00;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .start-btn {
            padding: 20px 60px;
            background: #8b0000;
            border: 3px solid #f00;
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            transition: all 0.3s;
        }

        .start-btn:hover {
            background: #f00;
            box-shadow: 0 0 30px #f00;
        }

        .instructions {
            margin-top: 40px;
            color: #ff6666;
            text-align: center;
            line-height: 2;
            font-size: 18px;
        }

        .game-over {
            display: none;
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(139, 0, 0, 0.95);
            padding: 60px;
            border: 5px solid #f00;
            text-align: center;
            z-index: 1000;
        }

        .game-over.show {
            display: block;
        }

        .game-over h2 {
            font-size: 64px;
            color: #f00;
            margin-bottom: 30px;
            text-shadow: 0 0 20px #f00;
        }

        
            </style>
</head>
<body>
<a href="https://app.sloppy.live/overview" style="color:#4ecdc4;text-decoration:none;margin-left:10px">🎨 View All Apps</a>

    <div id="gameContainer"></div>

    <div class="crosshair"></div>

    <div class="hud">
        <div class="hud-item" id="health">HEALTH: 100</div>
        <div class="hud-item" id="ammo">AMMO: 50</div>
        <div class="hud-item" id="kills">KILLS: 0</div>
    </div>

    <div class="start-screen" id="startScreen">
        <h1>💀 DOOM 3D 💀</h1>
        <button class="start-btn" onclick="startGame()">START GAME</button>
        <div class="instructions">
            <div>WASD - MOVE</div>
            <div>MOUSE - LOOK AROUND</div>
            <div>CLICK - SHOOT</div>
            <div>RIP AND TEAR</div>
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <h2>YOU DIED</h2>
        <div style="color: #ff6666; margin-bottom: 30px; font-size: 28px;">
            KILLS: <span id="finalKills">0</span>
        </div>
        <button class="start-btn" onclick="restartGame()">RESTART</button>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer, clock;
        let gameRunning = false;
        let player = {
            health: 100,
            ammo: 50,
            speed: 0.15,
            height: 1.6
        };
        let enemies = [];
        let bullets = [];
        let kills = 0;
        let keys = {};
        let mouseX = 0, mouseY = 0;
        let velocity = new THREE.Vector3();
        let direction = new THREE.Vector3();
        let enemySpawnTimer = 0;

        // Initialize Three.js scene
        function initScene() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a0000);
            scene.fog = new THREE.Fog(0x1a0000, 0, 50);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, player.height, 0);
            // YXZ Euler order = yaw-then-pitch — without this, modifying
            // rotation.x and .y separately produces gimbal-lock-style roll
            // when looking up/down. Restores normal FPS mouse-look feel.
            camera.rotation.order = 'YXZ';

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('gameContainer').appendChild(renderer.domElement);

            clock = new THREE.Clock();

            // Lighting — original setup was effectively black (ambient
            // 0x330000 × 0.5 with PBR materials painted #1a0000–#3d0000
            // → near-zero luminance). Bumped ambient + added a sky/floor
            // hemisphere light so the room reads as "moody red" instead
            // of flat black, then doubled the point light to keep the
            // central glow obvious.
            const ambientLight = new THREE.AmbientLight(0x553311, 1.0);
            scene.add(ambientLight);

            const hemiLight = new THREE.HemisphereLight(0xff5544, 0x1a0808, 0.6);
            scene.add(hemiLight);

            const pointLight = new THREE.PointLight(0xff5530, 2.0, 60);
            pointLight.position.set(0, 10, 0);
            pointLight.castShadow = true;
            scene.add(pointLight);

            // Floor
            const floorGeometry = new THREE.PlaneGeometry(100, 100, 20, 20);
            const floorTexture = createCheckerTexture();
            const floorMaterial = new THREE.MeshStandardMaterial({
                map: floorTexture,
                roughness: 0.8,
                metalness: 0.2
            });
            const floor = new THREE.Mesh(floorGeometry, floorMaterial);
            floor.rotation.x = -Math.PI / 2;
            floor.receiveShadow = true;
            scene.add(floor);

            // Walls
            createWalls();

            window.addEventListener('resize', onWindowResize);
        }

        function createCheckerTexture() {
            const size = 512;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            const tileSize = size / 8;
            for (let i = 0; i < 8; i++) {
                for (let j = 0; j < 8; j++) {
                    ctx.fillStyle = (i + j) % 2 === 0 ? '#2a0000' : '#1a0000';
                    ctx.fillRect(i * tileSize, j * tileSize, tileSize, tileSize);
                }
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(10, 10);
            return texture;
        }

        function createBrickTexture() {
            const size = 512;
            const canvas = document.createElement('canvas');
            canvas.width = size;
            canvas.height = size;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#3d0000';
            ctx.fillRect(0, 0, size, size);

            ctx.strokeStyle = '#1a0000';
            ctx.lineWidth = 4;

            const brickWidth = size / 8;
            const brickHeight = size / 16;

            for (let row = 0; row < 16; row++) {
                for (let col = 0; col < 8; col++) {
                    const offset = row % 2 === 0 ? 0 : brickWidth / 2;
                    ctx.strokeRect(col * brickWidth + offset, row * brickHeight, brickWidth, brickHeight);
                }
            }

            const texture = new THREE.CanvasTexture(canvas);
            texture.wrapS = THREE.RepeatWrapping;
            texture.wrapT = THREE.RepeatWrapping;
            texture.repeat.set(5, 5);
            return texture;
        }

        // Wall AABBs collected for collision queries. Each entry is
        // {x1, z1, x2, z2} (axis-aligned bounding box on the floor plane).
        const wallAABBs = [];
        function spawnWall(cx, cz, sx, sz, mat, h) {
            const wallHeight = h || 5;
            const m = new THREE.Mesh(new THREE.BoxGeometry(sx, wallHeight, sz), mat);
            m.position.set(cx, wallHeight / 2, cz);
            m.castShadow = true;
            m.receiveShadow = true;
            scene.add(m);
            wallAABBs.push({
                x1: cx - sx / 2, x2: cx + sx / 2,
                z1: cz - sz / 2, z2: cz + sz / 2,
            });
        }
        function createWalls() {
            const wallTexture = createBrickTexture();
            const wallMaterial = new THREE.MeshStandardMaterial({
                map: wallTexture,
                roughness: 0.9,
                metalness: 0.1
            });

            const wallThickness = 1;
            const arenaSize = 50;
            const half = arenaSize / 2;
            // Perimeter
            spawnWall(0,     -half, arenaSize, wallThickness, wallMaterial);
            spawnWall(0,      half, arenaSize, wallThickness, wallMaterial);
            spawnWall(-half, 0,     wallThickness, arenaSize, wallMaterial);
            spawnWall( half, 0,     wallThickness, arenaSize, wallMaterial);

            // Interior layout — non-square per chat. A staggered grid of
            // partial walls + a few pillars carves the arena into rooms
            // and corridors so combat isn't a flat box.
            //   ┌── short walls running E–W ──┐
            spawnWall(-12, -10, 14, wallThickness, wallMaterial);
            spawnWall( 14, -10, 16, wallThickness, wallMaterial);
            spawnWall(-16,  10, 12, wallThickness, wallMaterial);
            spawnWall( 12,  10, 14, wallThickness, wallMaterial);
            //   short walls running N–S
            spawnWall( -8,  -2, wallThickness, 8,  wallMaterial);
            spawnWall(  8,   2, wallThickness, 8,  wallMaterial);
            spawnWall(  0,  -8, wallThickness, 6,  wallMaterial);
            spawnWall(  0,   8, wallThickness, 6,  wallMaterial);
            //   pillars (3×3 bricks)
            spawnWall(-18, -18, 3, 3, wallMaterial);
            spawnWall( 18, -18, 3, 3, wallMaterial);
            spawnWall(-18,  18, 3, 3, wallMaterial);
            spawnWall( 18,  18, 3, 3, wallMaterial);
            spawnWall(  0,   0, 3, 3, wallMaterial);
        }

        // Circle-vs-AABB step: tries to move the camera by (dx, dz). If
        // the move would penetrate any wall AABB (with `radius` clearance
        // around the player), the move is rejected on that axis. Called
        // separately for X and Z so the player can slide along walls.
        function tryAxisStep(dx, dz, radius) {
            const nx = camera.position.x + dx;
            const nz = camera.position.z + dz;
            for (let i = 0; i < wallAABBs.length; i++) {
                const w = wallAABBs[i];
                // closest point on the AABB to the proposed centre
                const cx = Math.max(w.x1, Math.min(nx, w.x2));
                const cz = Math.max(w.z1, Math.min(nz, w.z2));
                const ddx = nx - cx, ddz = nz - cz;
                if (ddx * ddx + ddz * ddz < radius * radius) return;   // blocked
            }
            camera.position.x = nx;
            camera.position.z = nz;
        }

        function createEnemy() {
            const geometry = new THREE.SphereGeometry(0.8, 16, 16);
            const material = new THREE.MeshStandardMaterial({
                color: 0xff0000,
                emissive: 0x440000,
                roughness: 0.7,
                metalness: 0.3
            });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.castShadow = true;

            // Spawn at random edge
            const side = Math.floor(Math.random() * 4);
            const pos = 20;
            switch(side) {
                case 0: mesh.position.set(Math.random() * 40 - 20, 0.8, -pos); break;
                case 1: mesh.position.set(pos, 0.8, Math.random() * 40 - 20); break;
                case 2: mesh.position.set(Math.random() * 40 - 20, 0.8, pos); break;
                case 3: mesh.position.set(-pos, 0.8, Math.random() * 40 - 20); break;
            }

            scene.add(mesh);

            const enemy = {
                mesh: mesh,
                health: 3,
                speed: 0.05 + Math.random() * 0.03
            };

            enemies.push(enemy);
        }

        function spawnEnemies() {
            enemySpawnTimer++;
            const spawnRate = 60 - Math.min(kills, 40);
            if (enemySpawnTimer > spawnRate) {
                createEnemy();
                enemySpawnTimer = 0;
            }
        }

        function shoot() {
            if (player.ammo <= 0) return;

            player.ammo--;
            updateHUD();

            // Create bullet
            const bulletGeometry = new THREE.SphereGeometry(0.1, 8, 8);
            const bulletMaterial = new THREE.MeshBasicMaterial({
                color: 0xffff00,
                emissive: 0xffff00
            });
            const bulletMesh = new THREE.Mesh(bulletGeometry, bulletMaterial);
            bulletMesh.position.copy(camera.position);

            const direction = new THREE.Vector3();
            camera.getWorldDirection(direction);

            scene.add(bulletMesh);

            bullets.push({
                mesh: bulletMesh,
                direction: direction.clone(),
                speed: 0.8,
                life: 100
            });
        }

        function updateBullets() {
            for (let i = bullets.length - 1; i >= 0; i--) {
                const bullet = bullets[i];
                bullet.mesh.position.addScaledVector(bullet.direction, bullet.speed);
                bullet.life--;

                if (bullet.life <= 0) {
                    scene.remove(bullet.mesh);
                    bullets.splice(i, 1);
                    continue;
                }

                // Check collision with enemies
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const enemy = enemies[j];
                    const dist = bullet.mesh.position.distanceTo(enemy.mesh.position);
                    if (dist < 0.8) {
                        enemy.health--;
                        scene.remove(bullet.mesh);
                        bullets.splice(i, 1);

                        if (enemy.health <= 0) {
                            scene.remove(enemy.mesh);
                            enemies.splice(j, 1);
                            kills++;
                            player.ammo += 5;
                            updateHUD();
                        }
                        break;
                    }
                }
            }
        }

        function updateEnemies() {
            for (let i = enemies.length - 1; i >= 0; i--) {
                const enemy = enemies[i];
                const direction = new THREE.Vector3();
                direction.subVectors(camera.position, enemy.mesh.position).normalize();
                enemy.mesh.position.addScaledVector(direction, enemy.speed);

                // Check collision with player
                const dist = enemy.mesh.position.distanceTo(camera.position);
                if (dist < 1.5) {
                    player.health -= 1;
                    updateHUD();
                    if (player.health <= 0) {
                        gameOver();
                    }
                }
            }
        }

        function updateHUD() {
            document.getElementById('health').textContent = `HEALTH: ${player.health}`;
            document.getElementById('health').className = player.health < 30 ? 'hud-item low' : 'hud-item';
            document.getElementById('ammo').textContent = `AMMO: ${player.ammo}`;
            document.getElementById('kills').textContent = `KILLS: ${kills}`;
        }

        // Gamepad API support — left stick moves, right stick looks,
        // right trigger fires. Per chat: implement for movement +
        // looking in doom-3d. Reads navigator.getGamepads()[0] each
        // frame; deadzone 0.15 to ignore drift.
        let _lastTriggerPressed = false;
        function applyGamepad(dt) {
            const pads = navigator.getGamepads ? navigator.getGamepads() : [];
            let gp = null;
            for (let i = 0; i < pads.length; i++) {
                if (pads[i] && pads[i].connected) { gp = pads[i]; break; }
            }
            if (!gp) return;
            const dz = 0.15;
            const lx = Math.abs(gp.axes[0]) > dz ? gp.axes[0] : 0;
            const ly = Math.abs(gp.axes[1]) > dz ? gp.axes[1] : 0;
            const rx = Math.abs(gp.axes[2]) > dz ? gp.axes[2] : 0;
            const ry = Math.abs(gp.axes[3]) > dz ? gp.axes[3] : 0;
            // Move — translate stick into existing velocity vector so
            // wall collision + EulerApplied rotation handle it the
            // same as WASD. dt-scaled so faster framerates don't
            // amplify gamepad input.
            const moveScale = player.speed * 60 * dt;
            velocity.x += lx * moveScale;
            velocity.z += ly * moveScale;
            // Look — right-stick yaw/pitch with the same clamp the
            // mouse handler uses.
            const lookSens = 1.6 * dt;
            camera.rotation.y -= rx * lookSens;
            camera.rotation.x -= ry * lookSens;
            camera.rotation.x = Math.max(-Math.PI / 2 + 0.05, Math.min(Math.PI / 2 - 0.05, camera.rotation.x));
            // Right trigger fires — edge-triggered so each press = 1 shot.
            const rt = gp.buttons[7];
            const pressed = !!(rt && (rt.pressed || rt.value > 0.5));
            if (pressed && !_lastTriggerPressed) shoot();
            _lastTriggerPressed = pressed;
        }

        function animate() {
            if (!gameRunning) return;

            requestAnimationFrame(animate);

            const delta = clock.getDelta();

            // Movement
            velocity.x = 0;
            velocity.z = 0;

            direction.z = Number(keys['w']) - Number(keys['s']);
            direction.x = Number(keys['d']) - Number(keys['a']);
            direction.normalize();

            if (keys['w']) velocity.z -= player.speed;
            if (keys['s']) velocity.z += player.speed;
            if (keys['a']) velocity.x -= player.speed;
            if (keys['d']) velocity.x += player.speed;

            // gamepad augments the velocity + rotation in the same units
            applyGamepad(delta);

            // YAW-ONLY movement transform. Original code did
            //   camera.position.add(velocity.applyEuler(camera.rotation))
            // which factored in pitch — looking down then pressing W
            // tilted the velocity DOWN through the floor (the "falling
            // through the floor" bug). Use rotation.y only so movement
            // stays in the XZ plane regardless of where the camera looks.
            const yaw = camera.rotation.y;
            const cosY = Math.cos(yaw), sinY = Math.sin(yaw);
            const moveX =  velocity.x * cosY + velocity.z * sinY;
            const moveZ = -velocity.x * sinY + velocity.z * cosY;

            // Axis-decoupled wall collision against every wall AABB.
            const PR = 0.6;          // player radius
            tryAxisStep(moveX, 0, PR);
            tryAxisStep(0, moveZ, PR);

            // Lock eye-height so head-bob / pitch tilt can't drift the
            // camera below the floor.
            camera.position.y = player.height;

            spawnEnemies();
            updateBullets();
            updateEnemies();

            renderer.render(scene, camera);
        }

        function startGame() {
            document.getElementById('startScreen').style.display = 'none';
            gameRunning = true;
            player.health = 100;
            player.ammo = 50;
            kills = 0;
            enemySpawnTimer = 0;
            updateHUD();

            if (!scene) {
                initScene();
            }

            // Clear enemies and bullets
            enemies.forEach(e => scene.remove(e.mesh));
            bullets.forEach(b => scene.remove(b.mesh));
            enemies = [];
            bullets = [];

            camera.position.set(0, player.height, 0);
            camera.rotation.set(0, 0, 0);

            // Lock the canvas (renderer.domElement), NOT the body — the
            // mousemove handler explicitly checks `pointerLockElement
            // === renderer.domElement`. Locking body left the check
            // mismatched and mouse-look silently did nothing.
            requestLock();
            animate();
        }

        // ===== POINTER-LOCK PLUMBING =====
        // Centralised so the title screen, restart, and post-Esc click
        // all flow through the same path. Tracks whether a lock is
        // active so we can re-request it from the click handler if the
        // user previously bailed via Esc.
        let _pointerLocked = false;
        function requestLock() {
            if (!renderer) return;
            const el = renderer.domElement;
            const fn = el.requestPointerLock || el.mozRequestPointerLock || el.webkitRequestPointerLock;
            if (!fn) return;
            try {
                // The 'unadjustedMovement' option (Chromium) gives raw
                // mouse delta without OS-level acceleration — feels
                // more consistent across systems. Older browsers ignore
                // the options bag and fall back to the basic call.
                const p = fn.call(el, { unadjustedMovement: true });
                if (p && typeof p.catch === 'function') {
                    p.catch(() => {});   // silently swallow — error event also fires
                }
            } catch (e) { /* fn(el) already attempted */ }
        }
        document.addEventListener('pointerlockchange',  pointerLockChanged);
        document.addEventListener('mozpointerlockchange', pointerLockChanged);
        document.addEventListener('webkitpointerlockchange', pointerLockChanged);
        document.addEventListener('pointerlockerror', () => {
            console.warn('[pointerlock] request failed (user gesture missing or browser cooldown). Click again to retry.');
            _pointerLocked = false;
        });
        function pointerLockChanged() {
            const locked = lockedElement();
            _pointerLocked = (locked === (renderer && renderer.domElement));
            // If gameplay is in progress and the user popped the lock
            // (Esc), keep the world running but show a subtle hint —
            // a click anywhere reacquires it via the existing handler.
            if (gameRunning && !_pointerLocked) {
                // visible cue could go here later; for now just log.
            }
        }

        function restartGame() {
            document.getElementById('gameOver').classList.remove('show');
            startGame();
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('finalKills').textContent = kills;
            document.getElementById('gameOver').classList.add('show');
            document.exitPointerLock();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // Controls
        document.addEventListener('keydown', (e) => {
            keys[e.key.toLowerCase()] = true;
        });

        document.addEventListener('keyup', (e) => {
            keys[e.key.toLowerCase()] = false;
        });

        // Cross-browser pointer-lock + movement helpers. Some older
        // builds expose `webkitMovementX/Y` and `webkitPointerLockElement`
        // instead of the standard properties; reading both keeps Safari
        // / older Edge / Firefox consistent with Chrome.
        function lockedElement() {
            return document.pointerLockElement
                || document.mozPointerLockElement
                || document.webkitPointerLockElement
                || null;
        }
        document.addEventListener('mousemove', (e) => {
            // Guard: renderer (+ camera) only exist after initScene runs
            // on first start. Without this, moving the mouse on the
            // title screen threw "Cannot read properties of undefined
            // (reading 'domElement')" and broke later interactions.
            if (!renderer || !camera) return;
            const locked = lockedElement();
            if (locked !== renderer.domElement) return;
            const mx = (typeof e.movementX === 'number') ? e.movementX : (e.webkitMovementX || e.mozMovementX || 0);
            const my = (typeof e.movementY === 'number') ? e.movementY : (e.webkitMovementY || e.mozMovementY || 0);
            // Sensitivity tuned per chat — 0.0022 reads natural across
            // 60–144Hz mice without making Safari (which can deliver
            // larger movement deltas) feel twitchy.
            const SENS = 0.0022;
            camera.rotation.y -= mx * SENS;
            camera.rotation.x -= my * SENS;
            camera.rotation.x = Math.max(-Math.PI / 2 + 0.05, Math.min(Math.PI / 2 - 0.05, camera.rotation.x));
        });

        document.addEventListener('click', (e) => {
            if (!gameRunning) return;
            // If the lock was dropped (Esc, alt-tab, etc.), the click
            // request must come from a fresh user gesture — re-lock
            // before / instead of shooting so mouse-look re-engages.
            if (!_pointerLocked) {
                requestLock();
                return;
            }
            shoot();
        });

        window.startGame = startGame;
        window.restartGame = restartGame;
    </script>
<script src="/sloppy-header/sloppy-bar.js"></script>
</body>
</html>
