<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Jelly Sandbox</title>
  <meta name="description" content="Drop wobbly jelly shapes into a sandbox. They squish and bounce. Pick a shape, click to drop. Soft-body physics.">
  <meta property="og:title" content="Jelly Sandbox">
  <meta property="og:description" content="A wobbly soft-body sandbox. Squishy circles, stars, hearts and hexagons in a pastel rainbow. Drop them, watch them jiggle.">
  <meta property="og:url" content="https://sloppy.live/jelly-sandbox">
  <meta property="og:image" content="https://image.pollinations.ai/prompt/A%20pile%20of%20wobbly%20pastel%20jelly%20shapes%20with%20faces%20bouncing%20in%20a%20soft%20glass%20tank,%20editorial%20still%20life,%20vibrant%20gradients?model=flux&seed=9090&width=1200&height=630&nologo=true">
  <link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8D%AE">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@500;700&family=Fredoka:wght@500;600;700&family=Silkscreen&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg:       #fff4e6;
      --bg-2:     #fee0c0;
      --tank:     #e9ddc0;
      --tank-d:   #b89870;
      --ink:      #1a1208;
      --ink-d:    #5a4828;
      --rose:     #f598b0;
      --berry:    #c44a78;
      --mint:     #6cd0a0;
      --gold:     #f4c068;
      --line:     rgba(26,18,8,0.16);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      background:
        radial-gradient(ellipse at 50% 0%, var(--bg-2) 0%, var(--bg) 70%);
      color: var(--ink);
      font-family: 'Fredoka', sans-serif;
      display: grid;
      grid-template-rows: 3rem 1fr auto;
    }

    /* ============ TOP BAR ============ */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 1rem;
      border-bottom: 3px solid var(--ink);
      background: #fdf6e2;
      box-shadow: 0 2px 0 var(--ink-d);
    }
    .topbar .brand {
      font-family: 'Caveat', cursive;
      font-weight: 700;
      font-size: 1.8rem;
      color: var(--berry);
      line-height: 1;
    }
    .topbar .brand em { color: var(--mint); font-style: italic; }
    .topbar .stat {
      font-family: 'Silkscreen', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.16em;
      color: var(--ink-d);
    }
    .topbar .stat b { color: var(--berry); font-size: 0.85rem; }

    /* ============ STAGE ============ */
    .stage {
      position: relative;
      overflow: hidden;
      background:
        repeating-linear-gradient(45deg, rgba(184,152,112,0.08) 0 6px, transparent 6px 12px),
        linear-gradient(180deg, #fff4dc 0%, var(--tank) 100%);
      border-left: 4px solid var(--ink);
      border-right: 4px solid var(--ink);
    }
    .stage canvas {
      display: block;
      width: 100%; height: 100%;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: crosshair;
    }
    /* Subtle scene glow */
    .stage::before {
      content: '';
      position: absolute; inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at 50% 30%, rgba(255,255,255,0.35), transparent 55%);
    }

    /* ============ SHAPE TRAY ============ */
    .tray {
      padding: 0.6rem 0.8rem;
      background: #fdf6e2;
      border-top: 3px solid var(--ink);
      box-shadow: 0 -2px 0 var(--ink-d);
      display: flex; gap: 0.5rem;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }
    .shape-btn {
      width: 3rem; height: 3rem;
      border-radius: 12px;
      border: 2px solid var(--ink);
      background: var(--bg);
      cursor: pointer;
      box-shadow: 2px 2px 0 var(--ink);
      display: flex; align-items: center; justify-content: center;
      transition: transform 0.1s, filter 0.12s, box-shadow 0.12s;
      padding: 0;
    }
    .shape-btn:hover  { transform: translate(-2px, -2px); box-shadow: 4px 4px 0 var(--ink); filter: brightness(1.05); }
    .shape-btn:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0 var(--ink); }
    .shape-btn.active {
      box-shadow: 0 0 0 3px var(--gold), 3px 3px 0 var(--ink);
      filter: drop-shadow(0 0 6px rgba(244,192,104,0.5));
    }
    .shape-btn:focus-visible { outline: 3px solid var(--gold); outline-offset: 3px; }
    .shape-btn svg { width: 24px; height: 24px; }

    .tray .gap { width: 0.6rem; }
    .tray .ctl {
      font-family: 'Fredoka', sans-serif;
      font-weight: 700;
      font-size: 0.78rem;
      padding: 0.45rem 0.8rem 0.5rem;
      background: var(--bg);
      border: 2px solid var(--ink);
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 2px 2px 0 var(--ink);
      color: var(--ink);
      letter-spacing: 0.04em;
      min-height: 2.4rem;
      transition: transform 0.1s, filter 0.12s, box-shadow 0.12s;
    }
    .tray .ctl:hover  { transform: translate(-2px, -2px); box-shadow: 4px 4px 0 var(--ink); }
    .tray .ctl:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0 var(--ink); }
    .tray .ctl:focus-visible { outline: 3px solid var(--gold); outline-offset: 3px; }
    .tray .ctl.warn { background: var(--rose); color: #fff; }
    .tray .sliders {
      display: flex; gap: 0.6rem; align-items: center;
      font-family: 'Silkscreen', monospace;
      font-size: 0.62rem;
      letter-spacing: 0.14em;
      color: var(--ink-d);
      text-transform: uppercase;
    }
    .tray input[type=range] {
      -webkit-appearance: none; appearance: none;
      width: 6rem; background: transparent; cursor: pointer;
    }
    .tray input[type=range]::-webkit-slider-runnable-track {
      height: 5px; border-radius: 3px;
      background: linear-gradient(90deg, var(--mint), var(--rose));
      border: 1px solid var(--ink);
    }
    .tray input[type=range]::-moz-range-track {
      height: 5px; border-radius: 3px;
      background: linear-gradient(90deg, var(--mint), var(--rose));
      border: 1px solid var(--ink);
    }
    .tray input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 18px; height: 18px; margin-top: -7px;
      border-radius: 50%;
      background: var(--gold);
      border: 2px solid var(--ink);
      cursor: pointer;
    }
    .tray input[type=range]::-moz-range-thumb {
      width: 18px; height: 18px; border-radius: 50%;
      background: var(--gold);
      border: 2px solid var(--ink);
      cursor: pointer;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: 0.01ms !important; transition: none !important; }
    }
    .sr-only {
      position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">jelly <em>sandbox</em></div>
    <div class="stat"><b id="stat-count">0</b> jellies wobbling</div>
  </header>

  <section class="stage" id="stage" aria-label="Jelly sandbox — pick a shape from the tray, click the stage to drop a wobbly jelly.">
    <canvas id="jellies"></canvas>
  </section>

  <footer class="tray" aria-label="Shape tray">
    <button type="button" class="shape-btn active" data-shape="circle" aria-label="Drop circle"  style="background:#ffd6e0">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9" fill="#f598b0" stroke="#1a1208" stroke-width="1.5"/></svg>
    </button>
    <button type="button" class="shape-btn" data-shape="square" aria-label="Drop square"  style="background:#fff4c8">
      <svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2" fill="#f4c068" stroke="#1a1208" stroke-width="1.5"/></svg>
    </button>
    <button type="button" class="shape-btn" data-shape="triangle" aria-label="Drop triangle"  style="background:#d4ffd4">
      <svg viewBox="0 0 24 24"><polygon points="12,3 21,21 3,21" fill="#6cd0a0" stroke="#1a1208" stroke-width="1.5" stroke-linejoin="round"/></svg>
    </button>
    <button type="button" class="shape-btn" data-shape="hex" aria-label="Drop hexagon"  style="background:#d4ecff">
      <svg viewBox="0 0 24 24"><polygon points="12,3 21,8 21,16 12,21 3,16 3,8" fill="#6cb4ec" stroke="#1a1208" stroke-width="1.5" stroke-linejoin="round"/></svg>
    </button>
    <button type="button" class="shape-btn" data-shape="star" aria-label="Drop star"  style="background:#fff0c0">
      <svg viewBox="0 0 24 24"><polygon points="12,2 14.7,9.2 22,9.7 16.3,14.4 18.3,21.4 12,17.4 5.7,21.4 7.7,14.4 2,9.7 9.3,9.2" fill="#f4c068" stroke="#1a1208" stroke-width="1.4" stroke-linejoin="round"/></svg>
    </button>
    <button type="button" class="shape-btn" data-shape="heart" aria-label="Drop heart"  style="background:#ffd6e0">
      <svg viewBox="0 0 24 24"><path d="M12 21s-7-4.5-7-10a4 4 0 0 1 7-2.65A4 4 0 0 1 19 11c0 5.5-7 10-7 10z" fill="#f598b0" stroke="#1a1208" stroke-width="1.5" stroke-linejoin="round"/></svg>
    </button>
    <button type="button" class="shape-btn" data-shape="blob" aria-label="Drop blob"  style="background:#e0d4ff">
      <svg viewBox="0 0 24 24"><path d="M5 12 Q5 5 12 5 Q19 5 19 11 Q21 18 13 19 Q5 20 5 12 Z" fill="#b89aff" stroke="#1a1208" stroke-width="1.5" stroke-linejoin="round"/></svg>
    </button>
    <span class="gap"></span>
    <button type="button" class="ctl" id="btn-shake">🌀 shake</button>
    <button type="button" class="ctl warn" id="btn-clear">🧹 clear</button>
    <span class="gap"></span>
    <div class="sliders">
      <label>grav <input type="range" id="grav" min="100" max="1800" value="900" aria-label="Gravity"></label>
      <label>bouncy <input type="range" id="bnc" min="0" max="100" value="55" aria-label="Bounciness"></label>
    </div>
  </footer>

  <script>
  (function(){
    'use strict';

    // ============================================================
    // CANVAS
    // ============================================================
    const canvas = document.getElementById('jellies');
    const ctx = canvas.getContext('2d');
    const stage = document.getElementById('stage');
    let W = 800, H = 500;
    function resize() {
      const r = stage.getBoundingClientRect();
      const dpr = Math.min(2, window.devicePixelRatio || 1);
      W = Math.floor(r.width);
      H = Math.floor(r.height);
      canvas.width  = W * dpr;
      canvas.height = H * dpr;
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      ctx.imageSmoothingEnabled = false;
    }
    window.addEventListener('resize', resize, { passive: true });
    resize();

    // ============================================================
    // SHAPE PALETTE — color schemes per shape (body / highlight / face)
    // ============================================================
    const SHAPES = {
      circle:   { body: '#f598b0', hi: '#fcb7c8', sh: '#c44a78', face: '#1a1208', size: 36 },
      square:   { body: '#f4c068', hi: '#fcd28a', sh: '#a87a30', face: '#1a1208', size: 40 },
      triangle: { body: '#6cd0a0', hi: '#a4e8c4', sh: '#3a8a64', face: '#1a1208', size: 42 },
      hex:      { body: '#6cb4ec', hi: '#a0d0f4', sh: '#3a7ab0', face: '#1a1208', size: 38 },
      star:     { body: '#f4d068', hi: '#fce0a0', sh: '#a87a18', face: '#1a1208', size: 40 },
      heart:    { body: '#e85a8a', hi: '#f598b0', sh: '#a02050', face: '#1a1208', size: 40 },
      blob:     { body: '#b89aff', hi: '#d6c4ff', sh: '#6a3aa8', face: '#1a1208', size: 40 }
    };

    // ============================================================
    // JELLY FACTORY — soft-body perimeter ring + center spring rig
    // ============================================================
    // Each jelly has:
    //   pts:     array of {x,y, ox,oy, vx,vy, restAng, restR}
    //   center:  {x, y, vx, vy} — pseudo center mass
    //   radius:  base radius
    //   kind:    shape key for color
    //   springs: implicit (neighbor + radial)
    //   eyeOff:  pixel offsets for two eye dots, in local space
    //   face:    "mood" — happy / squish (drives mouth shape)
    function makeJelly(x, y, kind) {
      const cfg = SHAPES[kind] || SHAPES.circle;
      const N = kind === 'star' ? 20 : kind === 'heart' ? 18 : 16;
      const baseR = cfg.size;
      const pts = [];
      for (let i = 0; i < N; i++) {
        const a = (i / N) * Math.PI * 2 - Math.PI / 2;
        let r = baseR;
        // Shape-specific perimeter deformation
        if (kind === 'star') {
          r = baseR * (i % 2 === 0 ? 1 : 0.55);
        } else if (kind === 'heart') {
          // Classic heart parametric (scaled to baseR)
          const t = (i / N) * Math.PI * 2;
          const hx = 16 * Math.pow(Math.sin(t), 3);
          const hy = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
          r = Math.hypot(hx, hy) * (baseR / 18);
        } else if (kind === 'triangle') {
          // Sample a triangle's edge by angle: 3-fold symmetry
          const sectAng = ((a % (Math.PI * 2 / 3)) + Math.PI * 2 / 3) % (Math.PI * 2 / 3);
          r = baseR * (0.7 + 0.5 * Math.cos(sectAng - Math.PI / 3));
        } else if (kind === 'square') {
          // Bound to a square: distance to nearest side
          const cs = Math.cos(a), sn = Math.sin(a);
          r = baseR * 0.95 / Math.max(Math.abs(cs), Math.abs(sn));
        } else if (kind === 'hex') {
          // 6-fold lobes
          const sectAng = ((a % (Math.PI / 3)) + Math.PI / 3) % (Math.PI / 3);
          r = baseR * (0.85 / Math.cos(sectAng - Math.PI / 6));
        } else if (kind === 'blob') {
          r = baseR * (0.78 + 0.22 * Math.sin(a * 3 + 1.4));
        }
        const px = x + Math.cos(a) * r;
        const py = y + Math.sin(a) * r;
        pts.push({
          x: px, y: py,
          ox: Math.cos(a) * r, oy: Math.sin(a) * r,
          vx: 0, vy: 0,
          restAng: a, restR: r
        });
      }
      return {
        pts,
        center: { x, y, vx: 0, vy: 0 },
        radius: baseR,
        kind,
        cfg,
        eyeOff: [ { x: -baseR * 0.32, y: -baseR * 0.15 }, { x: baseR * 0.32, y: -baseR * 0.15 } ],
        squashT: 0,
        mood: 1,
        born: performance.now()
      };
    }

    // ============================================================
    // STATE + INPUT
    // ============================================================
    const jellies = [];
    let selectedShape = 'circle';
    let gravity = 900;
    let bouncy  = 0.55;
    const FRICTION = 0.985;
    const SPRING_K = 240;      // perimeter spring stiffness
    const RADIAL_K = 100;      // radial-to-center spring stiffness
    const DAMP_K   = 0.86;     // velocity damping per frame
    const MAX_JELLIES = 38;

    document.querySelectorAll('.shape-btn').forEach(b => {
      b.addEventListener('click', () => {
        document.querySelectorAll('.shape-btn').forEach(o => o.classList.remove('active'));
        b.classList.add('active');
        selectedShape = b.dataset.shape;
      });
    });
    canvas.addEventListener('pointerdown', e => {
      const r = canvas.getBoundingClientRect();
      const sx = (e.clientX - r.left) * (W / r.width);
      const sy = (e.clientY - r.top)  * (H / r.height);
      if (jellies.length >= MAX_JELLIES) {
        // Cull the oldest
        jellies.shift();
      }
      jellies.push(makeJelly(sx, sy, selectedShape));
      updateCount();
    });
    document.getElementById('btn-clear').addEventListener('click', () => {
      jellies.length = 0; updateCount();
    });
    document.getElementById('btn-shake').addEventListener('click', () => {
      for (const j of jellies) {
        for (const p of j.pts) {
          p.vx += (Math.random() - 0.5) * 540;
          p.vy += -180 - Math.random() * 320;
        }
        j.center.vy += -120;
        j.squashT = 0.35;
      }
    });
    const gravIn = document.getElementById('grav');
    const bncIn  = document.getElementById('bnc');
    gravIn.addEventListener('input', () => { gravity = +gravIn.value; });
    bncIn.addEventListener('input',  () => { bouncy = +bncIn.value / 100; });

    // ============================================================
    // PHYSICS
    // ============================================================
    function step(dt) {
      const g = gravity * dt;
      for (const j of jellies) {
        // Apply gravity to each perimeter particle
        for (const p of j.pts) {
          p.vy += g;
        }
        // Solve PERIMETER springs (neighbor i ↔ i+1)
        const N = j.pts.length;
        for (let iter = 0; iter < 2; iter++) {
          for (let i = 0; i < N; i++) {
            const a = j.pts[i];
            const b = j.pts[(i + 1) % N];
            const dx = b.x - a.x, dy = b.y - a.y;
            const d = Math.hypot(dx, dy) || 0.001;
            const rest = perimeterRest(j, i);
            const f = (d - rest) * SPRING_K * dt;
            const nx = dx / d, ny = dy / d;
            a.vx += nx * f; a.vy += ny * f;
            b.vx -= nx * f; b.vy -= ny * f;
          }
        }
        // Solve RADIAL springs to the (target) center each particle should
        // sit a `restR` from. The center itself drifts based on its own vy
        // (gravity); particles pull/push it via these springs.
        for (const p of j.pts) {
          const dx = p.x - j.center.x;
          const dy = p.y - j.center.y;
          const d = Math.hypot(dx, dy) || 0.001;
          const f = (d - p.restR) * RADIAL_K * dt;
          const nx = dx / d, ny = dy / d;
          p.vx -= nx * f; p.vy -= ny * f;
          j.center.vx += nx * f * 0.4;
          j.center.vy += ny * f * 0.4;
        }
        // Velocity damping
        const damp = Math.pow(DAMP_K, dt * 60);
        for (const p of j.pts) { p.vx *= damp; p.vy *= damp; }
        j.center.vx *= damp;
        j.center.vy *= damp;
        // Integrate positions
        for (const p of j.pts) {
          p.x += p.vx * dt;
          p.y += p.vy * dt;
        }
        j.center.x += j.center.vx * dt;
        j.center.y += j.center.vy * dt;
        // Squash timer decay
        if (j.squashT > 0) j.squashT = Math.max(0, j.squashT - dt);
      }
      // === Inter-jelly collision: particle-vs-particle ===
      for (let i = 0; i < jellies.length; i++) {
        for (let k = i + 1; k < jellies.length; k++) {
          const A = jellies[i], B = jellies[k];
          // Quick reject: center-center distance > sum of radii * 1.4
          const dC = Math.hypot(A.center.x - B.center.x, A.center.y - B.center.y);
          if (dC > (A.radius + B.radius) * 1.4) continue;
          for (const a of A.pts) {
            for (const b of B.pts) {
              const dx = b.x - a.x, dy = b.y - a.y;
              const d = Math.hypot(dx, dy);
              const r = 6;     // particle "radius"
              if (d > 0 && d < r * 2) {
                const overlap = r * 2 - d;
                const nx = dx / d, ny = dy / d;
                // Separate
                a.x -= nx * overlap * 0.5;
                a.y -= ny * overlap * 0.5;
                b.x += nx * overlap * 0.5;
                b.y += ny * overlap * 0.5;
                // Velocity exchange
                const av = a.vx * nx + a.vy * ny;
                const bv = b.vx * nx + b.vy * ny;
                if (bv - av < 0) {
                  const m = (av - bv) * 0.5;
                  a.vx -= nx * m; a.vy -= ny * m;
                  b.vx += nx * m; b.vy += ny * m;
                }
                A.squashT = 0.25;
                B.squashT = 0.25;
              }
            }
          }
        }
      }
      // === Walls + floor ===
      for (const j of jellies) {
        for (const p of j.pts) {
          if (p.y > H - 6) {
            const v = p.vy;
            p.y = H - 6;
            if (v > 0) {
              p.vy = -v * bouncy;
              p.vx *= 0.92;
              if (Math.abs(v) > 120) j.squashT = 0.4;
            }
          }
          if (p.y < 6) {
            p.y = 6; if (p.vy < 0) p.vy = -p.vy * bouncy;
          }
          if (p.x < 6)      { p.x = 6;     if (p.vx < 0) p.vx = -p.vx * bouncy; }
          if (p.x > W - 6)  { p.x = W - 6; if (p.vx > 0) p.vx = -p.vx * bouncy; }
        }
      }
    }
    function perimeterRest(j, i) {
      // Chord length between rest positions of i and i+1 around the center
      const N = j.pts.length;
      const a = j.pts[i], b = j.pts[(i + 1) % N];
      const ax = a.restR * Math.cos(a.restAng);
      const ay = a.restR * Math.sin(a.restAng);
      const bx = b.restR * Math.cos(b.restAng);
      const by = b.restR * Math.sin(b.restAng);
      return Math.hypot(bx - ax, by - ay);
    }

    // ============================================================
    // RENDER
    // ============================================================
    function smoothPath(pts, close) {
      // Catmull-Rom-ish smooth path through perimeter particles
      ctx.beginPath();
      const n = pts.length;
      for (let i = 0; i < n; i++) {
        const p0 = pts[(i - 1 + n) % n];
        const p1 = pts[i];
        const p2 = pts[(i + 1) % n];
        const mid1x = (p1.x + p2.x) / 2;
        const mid1y = (p1.y + p2.y) / 2;
        if (i === 0) ctx.moveTo((p0.x + p1.x) / 2, (p0.y + p1.y) / 2);
        ctx.quadraticCurveTo(p1.x, p1.y, mid1x, mid1y);
      }
      if (close) ctx.closePath();
    }
    function drawJelly(j) {
      // Body fill — radial gradient from upper-left highlight
      const c = j.center;
      const grad = ctx.createRadialGradient(c.x - j.radius * 0.45, c.y - j.radius * 0.5, 2, c.x, c.y, j.radius * 1.3);
      grad.addColorStop(0, j.cfg.hi);
      grad.addColorStop(0.55, j.cfg.body);
      grad.addColorStop(1, j.cfg.sh);
      ctx.fillStyle = grad;
      smoothPath(j.pts, true);
      ctx.fill();
      // Outline
      ctx.strokeStyle = '#1a1208';
      ctx.lineWidth = 2;
      smoothPath(j.pts, true);
      ctx.stroke();
      // Specular highlight blob
      ctx.fillStyle = 'rgba(255,255,255,0.55)';
      ctx.beginPath();
      ctx.ellipse(c.x - j.radius * 0.35, c.y - j.radius * 0.4, j.radius * 0.18, j.radius * 0.1, -0.35, 0, Math.PI * 2);
      ctx.fill();
      // Eyes (offset relative to center, with slight inertia from velocity)
      const eyeBob = Math.min(2, Math.abs(j.center.vy) * 0.01);
      for (const off of j.eyeOff) {
        const ex = c.x + off.x;
        const ey = c.y + off.y + eyeBob;
        ctx.fillStyle = '#fff7e6';
        ctx.beginPath();
        ctx.ellipse(ex, ey, 4, 5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = j.cfg.face;
        ctx.beginPath();
        ctx.ellipse(ex + 0.5, ey + 0.5, 1.7, 2, 0, 0, Math.PI * 2);
        ctx.fill();
        // Tiny shine
        ctx.fillStyle = '#fff';
        ctx.fillRect(Math.round(ex - 1), Math.round(ey - 2), 1, 1);
      }
      // Mouth — happy (oscillates with squashT)
      const mouthY = c.y + j.radius * 0.18;
      const mouthW = j.radius * 0.32;
      ctx.strokeStyle = j.cfg.face;
      ctx.lineWidth = 1.8;
      ctx.lineCap = 'round';
      ctx.beginPath();
      if (j.squashT > 0.05) {
        // O-mouth on impact
        ctx.ellipse(c.x, mouthY + 2, mouthW * 0.5, mouthW * 0.4, 0, 0, Math.PI * 2);
      } else {
        ctx.moveTo(c.x - mouthW, mouthY);
        ctx.quadraticCurveTo(c.x, mouthY + 5, c.x + mouthW, mouthY);
      }
      ctx.stroke();
    }

    // ============================================================
    // LOOP
    // ============================================================
    let lastT = performance.now();
    function loop(now) {
      const dt = Math.min(0.04, (now - lastT) / 1000);
      lastT = now;
      // Run the physics in 2 sub-steps for stability
      step(dt * 0.5);
      step(dt * 0.5);
      // Clear + draw
      ctx.clearRect(0, 0, W, H);
      // Soft floor shadow strip
      const grad = ctx.createLinearGradient(0, H - 16, 0, H);
      grad.addColorStop(0, 'rgba(0,0,0,0)');
      grad.addColorStop(1, 'rgba(0,0,0,0.18)');
      ctx.fillStyle = grad;
      ctx.fillRect(0, H - 16, W, 16);
      // Sort by lowest particle y so taller jellies render in front
      jellies.sort((a, b) => a.center.y - b.center.y);
      for (const j of jellies) drawJelly(j);
      requestAnimationFrame(loop);
    }
    requestAnimationFrame(loop);

    // ============================================================
    // HUD
    // ============================================================
    const elCount = document.getElementById('stat-count');
    function updateCount() { elCount.textContent = jellies.length; }
    updateCount();

    // Seed one jelly so the empty tank doesn't feel barren
    jellies.push(makeJelly(W / 2, 80, 'heart'));
    updateCount();
  })();
  </script>
</body>
</html>
