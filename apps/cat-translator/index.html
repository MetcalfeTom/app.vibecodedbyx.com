<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cat Translator</title>
<link rel="icon" href="https://emojicdn.elk.sh/🐱">
<meta property="og:title" content="Cat Translator">
<meta property="og:description" content="Record your cat's meow. Receive their absurd demands. They own you.">
<meta property="og:url" content="https://app.sloppy.live/cat-translator/">
<meta property="og:image" content="https://emojicdn.elk.sh/🐱?style=google">
<link href="https://fonts.googleapis.com/css2?family=Anybody:wght@400;700;900&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
--bg:#0e0b16;--card:#1a1525;--accent:#ff6b9d;--accent2:#c084fc;
--text:#e8e0f0;--dim:#7a7090;
}
html,body{min-height:100%;overflow-x:hidden}
body{
background:var(--bg);
color:var(--text);
font-family:'Anybody',sans-serif;
display:flex;flex-direction:column;align-items:center;
padding:20px 16px 40px;
}
body::before{
content:'';position:fixed;inset:0;pointer-events:none;
background:radial-gradient(ellipse at 30% 20%,rgba(192,132,252,0.06) 0%,transparent 60%),
radial-gradient(ellipse at 70% 80%,rgba(255,107,157,0.05) 0%,transparent 60%);
}
h1{
font-size:clamp(32px,8vw,52px);font-weight:900;
letter-spacing:-1px;
background:linear-gradient(135deg,var(--accent),var(--accent2));
-webkit-background-clip:text;-webkit-text-fill-color:transparent;
background-clip:text;
margin-bottom:4px;
}
.subtitle{
font-family:'Caveat',cursive;font-size:clamp(16px,4vw,22px);
color:var(--dim);margin-bottom:24px;
}
.cat-face{
font-size:80px;margin:12px 0 20px;
filter:drop-shadow(0 0 20px rgba(255,107,157,0.3));
transition:transform 0.3s;
}
.cat-face.listening{animation:cat-bounce 0.4s ease infinite alternate}
@keyframes cat-bounce{0%{transform:scale(1) rotate(-3deg)}100%{transform:scale(1.08) rotate(3deg)}}
.cat-face.translating{animation:cat-think 0.6s ease infinite}
@keyframes cat-think{0%,100%{transform:rotate(0)}25%{transform:rotate(-8deg)}75%{transform:rotate(8deg)}}
#record-btn{
width:140px;height:140px;border-radius:50%;
border:4px solid var(--accent);
background:radial-gradient(circle,rgba(255,107,157,0.2),rgba(255,107,157,0.05));
cursor:pointer;
display:flex;align-items:center;justify-content:center;flex-direction:column;
font-family:'Anybody',sans-serif;font-size:14px;font-weight:700;
color:var(--accent);letter-spacing:2px;text-transform:uppercase;
transition:all 0.2s;
position:relative;
margin:8px 0 20px;
}
#record-btn:hover{
border-color:#ff8db5;
box-shadow:0 0 30px rgba(255,107,157,0.3),inset 0 0 30px rgba(255,107,157,0.1);
}
#record-btn.recording{
border-color:#ff3366;
background:radial-gradient(circle,rgba(255,51,102,0.3),rgba(255,51,102,0.1));
animation:pulse-record 1s ease infinite;
}
@keyframes pulse-record{0%,100%{box-shadow:0 0 20px rgba(255,51,102,0.3)}50%{box-shadow:0 0 50px rgba(255,51,102,0.5)}}
#record-btn .mic-icon{font-size:36px;margin-bottom:4px}
.visualizer{
width:min(320px,90vw);height:60px;
margin:0 0 16px;
opacity:0;transition:opacity 0.3s;
}
.visualizer.active{opacity:1}
#wave-canvas{width:100%;height:100%;display:block}
.hint{
font-size:12px;color:var(--dim);
margin-bottom:20px;
}
.translation-card{
max-width:440px;width:100%;
background:var(--card);
border:2px solid rgba(192,132,252,0.2);
border-radius:16px;
padding:24px;
opacity:0;transform:translateY(20px);
transition:all 0.5s cubic-bezier(0.16,1,0.3,1);
position:relative;overflow:hidden;
margin-bottom:16px;
}
.translation-card.show{opacity:1;transform:translateY(0)}
.translation-card::before{
content:'';position:absolute;top:0;left:0;right:0;height:3px;
background:linear-gradient(90deg,var(--accent),var(--accent2));
}
.meow-type{
font-family:'Caveat',cursive;font-size:14px;
color:var(--accent2);margin-bottom:6px;
letter-spacing:1px;
}
.translation-text{
font-size:clamp(20px,5vw,28px);font-weight:900;
line-height:1.3;margin-bottom:12px;
}
.cat-mood{
display:inline-flex;align-items:center;gap:6px;
background:rgba(255,107,157,0.1);
border:1px solid rgba(255,107,157,0.2);
border-radius:20px;padding:4px 12px;
font-size:12px;color:var(--accent);
}
.history{
max-width:440px;width:100%;
margin-top:8px;
}
.history-title{
font-size:11px;font-weight:700;letter-spacing:3px;
color:var(--dim);text-transform:uppercase;
margin-bottom:8px;
}
.history-item{
background:rgba(26,21,37,0.6);
border:1px solid rgba(120,112,144,0.15);
border-radius:10px;
padding:14px 16px;
margin-bottom:8px;
}
.history-item .h-type{font-family:'Caveat',cursive;font-size:12px;color:var(--accent2)}
.history-item .h-text{font-size:16px;font-weight:700;margin:4px 0}
.history-item .h-mood{font-size:11px;color:var(--dim)}
.or-text{font-size:12px;color:var(--dim);margin:12px 0}
#meow-btn{
padding:12px 28px;
background:linear-gradient(135deg,var(--accent2),var(--accent));
border:none;border-radius:24px;
color:#fff;font-family:'Anybody',sans-serif;
font-size:14px;font-weight:700;
letter-spacing:1px;cursor:pointer;
transition:transform 0.2s,box-shadow 0.2s;
box-shadow:0 4px 20px rgba(255,107,157,0.3);
}
#meow-btn:hover{transform:scale(1.05);box-shadow:0 6px 30px rgba(255,107,157,0.4)}
#meow-btn:active{transform:scale(0.97)}
@media(max-width:420px){
#record-btn{width:120px;height:120px}
.translation-card{padding:18px}
}
</style>
</head>
<body>
<h1>Cat Translator</h1>
<div class="subtitle">Decoding feline demands since... just now</div>
<div class="cat-face" id="cat-face">🐱</div>
<button id="record-btn" onclick="toggleRecord()">
<span class="mic-icon">🎤</span>
<span id="btn-label">Listen</span>
</button>
<div class="visualizer" id="visualizer">
<canvas id="wave-canvas"></canvas>
</div>
<div class="hint" id="hint">Hold to listen to your cat, or just tap the button below</div>
<div class="or-text">— or just generate a translation —</div>
<button id="meow-btn" onclick="instantTranslate()">🐾 What did my cat say?</button>
<div class="translation-card" id="translation-card">
<div class="meow-type" id="meow-type"></div>
<div class="translation-text" id="translation-text"></div>
<div class="cat-mood" id="cat-mood"></div>
</div>
<div class="history" id="history-section" style="display:none">
<div class="history-title">Previous Demands</div>
<div id="history-list"></div>
</div>
<script>
const MEOW_TYPES = [
  {type:'Short Meow',emoji:'😺',desc:'A polite greeting'},
  {type:'Long Mrooow',emoji:'😾',desc:'An impatient demand'},
  {type:'Rapid Mew Mew Mew',emoji:'🙀',desc:'Urgent complaint'},
  {type:'Deep Growly Meow',emoji:'😼',desc:'A stern warning'},
  {type:'Silent Mouth Open',emoji:'😸',desc:'A psychic command'},
  {type:'Chirping Trill',emoji:'😻',desc:'Excited about prey'},
  {type:'Yowling Wail',emoji:'😿',desc:'Dramatic suffering'},
  {type:'Purr-Meow Combo',emoji:'😽',desc:'Manipulative sweetness'},
  {type:'High-Pitched Squeak',emoji:'🐱',desc:'Surprised commentary'},
  {type:'Breathy Huff',emoji:'😾',desc:'Profound disappointment'},
];

const DEMANDS = [
  "I require the finest tuna, served at precisely room temperature. You have 30 seconds.",
  "The red dot. Bring it. NOW. I will not ask again.",
  "I have knocked your water glass off the table. This is not an accident. This is a warning.",
  "You sat in MY spot. I have been sitting there for 4,000 years. Move.",
  "I demand to go outside. Actually no. Actually yes. No wait. Open the door and I'll decide.",
  "The other cat looked at me. I need you to uninvent the other cat.",
  "My food bowl is HALF EMPTY. I can see the bottom. I am STARVING. Call the authorities.",
  "Pet me. No, not there. Not there either. HOW DO YOU NOT KNOW WHERE.",
  "I am going to sprint through the house at 3 AM and there is nothing you can do about it.",
  "That plant? Gone. I ate it. No regrets. Actually I might throw up later. On your pillow.",
  "I brought you a dead moth. You're welcome. Where is my parade?",
  "The bathroom door is closed. This is a VIOLATION of my constitutional rights.",
  "I need to sit on your laptop keyboard RIGHT NOW. The fate of the universe depends on it.",
  "You've been gone for 8 hours. I assumed you were dead. I've already divided your belongings.",
  "The dog exists and I find that personally offensive.",
  "I would like to be picked up. I would also like to be put down. Simultaneously.",
  "My litter box has been used ONCE. It is now uninhabitable. Clean it or face the consequences.",
  "I see a bird outside the window. I am making that weird clicking noise. Do not judge me.",
  "You gave me the WRONG flavor of wet food. I wanted fish. No wait, chicken. Actually fish.",
  "I am going to stare at that corner of the ceiling for 45 minutes. Something is there. Trust me.",
  "The bag is not for sitting in. Okay fine, the bag is for sitting in. Leave me alone.",
  "I demand a box. Any box. Actually not that box. A DIFFERENT box.",
  "Why did you sneeze. I was sleeping. This is assault.",
  "I have decided that 4:47 AM is breakfast time. This is non-negotiable.",
  "The blanket is arranged wrong. Fix it so I can lie on it and immediately mess it up again.",
  "You closed a drawer somewhere in this house and the NOISE was unacceptable.",
  "I need to lie directly on your face while you sleep. For security purposes.",
  "Belly is exposed. This is a trap. Touch it and face the claws of justice.",
  "I knocked the pen off your desk. Then the pencil. Then the eraser. Physics research.",
  "The vacuum cleaner is my mortal enemy. I will hide under the bed until it is vanquished.",
  "I have claimed this Amazon box as my fortress. Bring me tribute or face siege.",
  "You're eating something. I don't know what it is but I want it. Give it to me.",
  "The ceiling fan is spinning and I don't trust it. I need you to fight it.",
  "I just ran into the glass door at full speed. We will NEVER speak of this.",
  "That stranger touched me without my consent. I need 3 hours of alone time and a treat.",
  "I've been meowing at the wall for 10 minutes. I know what I'm doing. Mind your business.",
  "The new furniture smells wrong. I'm going to scratch it until it smells right.",
  "I require chin scratches. But only for exactly 4.7 seconds. You'll know when to stop. Or else.",
  "There's a cucumber behind me, isn't there. DON'T. EVEN.",
  "I am going to push this glass VERY slowly toward the edge of the table. Maintain eye contact.",
];

const MOODS = [
  {mood:'Entitled',icon:'👑'},{mood:'Hangry',icon:'🍽️'},{mood:'Suspicious',icon:'👀'},
  {mood:'Chaotic',icon:'🌪️'},{mood:'Dramatic',icon:'🎭'},{mood:'Plotting',icon:'🧠'},
  {mood:'Judging You',icon:'😒'},{mood:'Unhinged',icon:'⚡'},{mood:'Regal',icon:'🏛️'},
  {mood:'Disappointed',icon:'😤'},{mood:'Vengeful',icon:'🔥'},{mood:'Smug',icon:'😏'},
];

let isRecording=false, mediaStream=null, analyser=null, animFrame=null;
let audioCtx=null;
let history=[];
const catFace=document.getElementById('cat-face');
const card=document.getElementById('translation-card');
const canvas=document.getElementById('wave-canvas');
const ctx=canvas.getContext('2d');

function initAudio(){
  if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
}

function playMeow(){
  initAudio();
  const t=audioCtx.currentTime;
  // Synth meow: sine sweep with vibrato
  const o=audioCtx.createOscillator();
  const g=audioCtx.createGain();
  const lfo=audioCtx.createOscillator();
  const lfoG=audioCtx.createGain();
  o.type='sine';
  const baseFreq=300+Math.random()*400;
  o.frequency.setValueAtTime(baseFreq*1.5,t);
  o.frequency.exponentialRampToValueAtTime(baseFreq,t+0.15);
  o.frequency.exponentialRampToValueAtTime(baseFreq*0.7,t+0.4);
  lfo.type='sine';lfo.frequency.value=5+Math.random()*3;
  lfoG.gain.value=20;
  lfo.connect(lfoG);lfoG.connect(o.frequency);
  g.gain.setValueAtTime(0.001,t);
  g.gain.exponentialRampToValueAtTime(0.12,t+0.05);
  g.gain.setValueAtTime(0.12,t+0.2);
  g.gain.exponentialRampToValueAtTime(0.001,t+0.45);
  o.connect(g);g.connect(audioCtx.destination);
  lfo.start(t);o.start(t);o.stop(t+0.45);lfo.stop(t+0.45);
}

function playTranslateChime(){
  initAudio();
  const t=audioCtx.currentTime;
  [660,880,1100].forEach((f,i)=>{
    const o=audioCtx.createOscillator();const g=audioCtx.createGain();
    o.type='triangle';o.frequency.value=f;
    g.gain.setValueAtTime(0.05,t+i*0.1);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.1+0.2);
    o.connect(g);g.connect(audioCtx.destination);o.start(t+i*0.1);o.stop(t+i*0.1+0.2);
  });
}

async function toggleRecord(){
  if(isRecording){
    stopRecording();
    return;
  }
  try{
    mediaStream=await navigator.mediaDevices.getUserMedia({audio:true});
    startRecording();
  }catch(e){
    // No mic? Just do instant translate
    instantTranslate();
  }
}

function startRecording(){
  isRecording=true;
  initAudio();
  const source=audioCtx.createMediaStreamSource(mediaStream);
  analyser=audioCtx.createAnalyser();
  analyser.fftSize=256;
  source.connect(analyser);

  document.getElementById('record-btn').classList.add('recording');
  document.getElementById('btn-label').textContent='Listening...';
  document.getElementById('visualizer').classList.add('active');
  catFace.classList.add('listening');
  catFace.textContent='😺';

  // Size canvas
  canvas.width=canvas.offsetWidth*2;
  canvas.height=canvas.offsetHeight*2;
  drawWave();

  // Auto-stop after 4 seconds
  setTimeout(()=>{if(isRecording)stopRecording()},4000);
}

function stopRecording(){
  isRecording=false;
  if(mediaStream){mediaStream.getTracks().forEach(t=>t.stop());mediaStream=null}
  if(animFrame){cancelAnimationFrame(animFrame);animFrame=null}

  document.getElementById('record-btn').classList.remove('recording');
  document.getElementById('btn-label').textContent='Listen';
  document.getElementById('visualizer').classList.remove('active');

  catFace.classList.remove('listening');
  catFace.classList.add('translating');
  catFace.textContent='🤔';

  // "Translating" delay
  setTimeout(()=>{
    catFace.classList.remove('translating');
    catFace.textContent='😼';
    showTranslation();
  },1200);
}

function drawWave(){
  if(!analyser||!isRecording)return;
  const data=new Uint8Array(analyser.frequencyBinCount);
  analyser.getByteTimeDomainData(data);
  const w=canvas.width,h=canvas.height;
  ctx.clearRect(0,0,w,h);
  ctx.beginPath();
  ctx.strokeStyle='rgba(255,107,157,0.6)';
  ctx.lineWidth=2;
  const sliceW=w/data.length;
  let x=0;
  for(let i=0;i<data.length;i++){
    const v=data[i]/128.0;
    const y=(v*h)/2;
    if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
    x+=sliceW;
  }
  ctx.stroke();
  // Glow layer
  ctx.strokeStyle='rgba(192,132,252,0.3)';
  ctx.lineWidth=6;
  ctx.stroke();
  animFrame=requestAnimationFrame(drawWave);
}

function instantTranslate(){
  playMeow();
  catFace.classList.add('translating');
  catFace.textContent='🤔';
  setTimeout(()=>{
    catFace.classList.remove('translating');
    catFace.textContent='😼';
    showTranslation();
  },800);
}

function showTranslation(){
  const meowType=MEOW_TYPES[Math.floor(Math.random()*MEOW_TYPES.length)];
  const demand=DEMANDS[Math.floor(Math.random()*DEMANDS.length)];
  const mood=MOODS[Math.floor(Math.random()*MOODS.length)];

  playTranslateChime();

  document.getElementById('meow-type').textContent=`${meowType.emoji} Detected: ${meowType.type} — ${meowType.desc}`;
  document.getElementById('translation-text').textContent=`"${demand}"`;
  document.getElementById('cat-mood').innerHTML=`${mood.icon} Mood: ${mood.mood}`;

  card.classList.remove('show');
  void card.offsetWidth;
  card.classList.add('show');

  // Add to history
  history.unshift({meowType,demand,mood});
  if(history.length>10)history.pop();
  renderHistory();
}

function renderHistory(){
  if(history.length<2)return;
  const section=document.getElementById('history-section');
  section.style.display='block';
  const list=document.getElementById('history-list');
  list.innerHTML='';
  // Skip first (it's the current card)
  for(let i=1;i<history.length;i++){
    const h=history[i];
    const div=document.createElement('div');
    div.className='history-item';
    div.innerHTML=`<div class="h-type">${h.meowType.emoji} ${h.meowType.type}</div><div class="h-text">"${h.demand}"</div><div class="h-mood">${h.mood.icon} ${h.mood.mood}</div>`;
    list.appendChild(div);
  }
}
</script>
</body>
</html>
