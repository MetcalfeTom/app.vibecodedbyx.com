<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Sketch Date</title>
<link rel="icon" href="https://emojicdn.elk.sh/✏️">
<meta property="og:title" content="Sketch Date">
<meta property="og:description" content="Pencil-sketch dating sim. Tune charcoal sliders, watch the chemistry unfold.">
<meta property="og:url" content="https://sloppy.live/sketch-date">
<meta property="og:image" content="https://emojicdn.elk.sh/✏️?style=apple&size=512">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Special+Elite&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--paper:#f4efe6;--ink:#2a2520;--pencil:#5a5248;--faint:#b0a898;--blush:#c87070;--accent:#8b6e4e}
html,body{min-height:100dvh;background:var(--paper);color:var(--ink);font-family:'Special Elite',monospace}
body{display:flex;flex-direction:column;align-items:center;padding:24px 16px 60px;
  background-image:url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.65' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='200' height='200' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
}
h1{font-family:'Caveat',cursive;font-size:clamp(32px,7vw,52px);font-weight:700;color:var(--ink);text-align:center;margin-bottom:4px;
  text-shadow:1px 1px 0 var(--paper),-1px -1px 0 var(--paper);
  transform:rotate(-1deg)}
.sub{font-size:12px;color:var(--faint);margin-bottom:20px;text-align:center;transform:rotate(0.5deg)}
#main{display:flex;gap:24px;max-width:760px;width:100%;flex-wrap:wrap;justify-content:center;align-items:flex-start}
#scene{position:relative;width:320px;height:360px;border:2px solid var(--faint);border-radius:2px;background:var(--paper);overflow:hidden;flex-shrink:0;
  box-shadow:2px 3px 8px rgba(0,0,0,0.08)}
canvas{display:block;width:100%;height:100%}
#controls{flex:1;min-width:260px;max-width:360px}
.slider-group{margin-bottom:16px;position:relative}
.slider-label{display:flex;justify-content:space-between;font-size:13px;color:var(--pencil);margin-bottom:4px}
.slider-label span{font-family:'Caveat',cursive;font-size:16px}
.slider-val{color:var(--accent);font-weight:600}
input[type=range]{-webkit-appearance:none;width:100%;height:8px;background:linear-gradient(to right,#c8c0b4,#8a7e70);border-radius:4px;outline:none;cursor:pointer;position:relative;box-shadow:inset 0 1px 2px rgba(0,0,0,0.15),0 1px 0 rgba(255,255,255,0.3)}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#5a5248,#2a2520);border:2px solid var(--paper);cursor:pointer;box-shadow:1px 2px 4px rgba(0,0,0,0.35),inset 0 1px 1px rgba(255,255,255,0.15);transition:transform 0.1s}
input[type=range]::-webkit-slider-thumb:active{transform:scale(1.15)}
input[type=range]::-moz-range-thumb{width:20px;height:20px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#5a5248,#2a2520);border:2px solid var(--paper);cursor:pointer;box-shadow:1px 2px 4px rgba(0,0,0,0.35)}
input[type=range]::-moz-range-track{height:8px;background:linear-gradient(to right,#c8c0b4,#8a7e70);border-radius:4px}
#dialogue{background:rgba(255,255,255,0.5);border:1px dashed var(--faint);border-radius:4px;padding:12px 14px;min-height:80px;font-family:'Caveat',cursive;font-size:18px;color:var(--ink);line-height:1.5;margin-top:16px;position:relative;transform:rotate(-0.3deg)}
#dialogue::before{content:'"';font-size:32px;color:var(--faint);position:absolute;top:4px;left:6px}
#status{display:flex;gap:12px;margin-top:12px;justify-content:center;flex-wrap:wrap}
.badge{font-family:'Caveat',cursive;font-size:15px;padding:4px 12px;border:1px solid var(--faint);border-radius:12px;color:var(--pencil);background:rgba(255,255,255,0.4)}
.badge.active{border-color:var(--blush);color:var(--blush);background:rgba(200,112,112,0.08)}
#compat{font-family:'Caveat',cursive;font-size:28px;font-weight:700;text-align:center;margin-top:12px;color:var(--accent)}
#reset-btn{font-family:'Special Elite',monospace;font-size:12px;padding:6px 16px;background:transparent;border:1px solid var(--faint);color:var(--faint);border-radius:4px;cursor:pointer;margin-top:12px;transition:all 0.2s}
#reset-btn:hover{border-color:var(--ink);color:var(--ink)}
#back{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);font-size:11px;opacity:0.3;color:var(--faint);text-decoration:none;font-family:'Special Elite',monospace}
#back:hover{opacity:0.6}
@media(max-width:620px){
  #main{flex-direction:column;align-items:center}
  #scene{width:100%;max-width:320px;height:320px}
  #controls{max-width:320px}
}
</style>
</head>
<body>
<h1>Sketch Date</h1>
<p class="sub">tune the dynamics, watch the chemistry</p>
<div id="main">
<div id="scene"><canvas id="c"></canvas></div>
<div id="controls">
<div class="slider-group">
<div class="slider-label"><span>Confidence</span><span class="slider-val" id="v-conf">50</span></div>
<input type="range" min="0" max="100" value="50" id="s-conf">
</div>
<div class="slider-group">
<div class="slider-label"><span>Humor</span><span class="slider-val" id="v-humor">50</span></div>
<input type="range" min="0" max="100" value="50" id="s-humor">
</div>
<div class="slider-group">
<div class="slider-label"><span>Mystery</span><span class="slider-val" id="v-myst">50</span></div>
<input type="range" min="0" max="100" value="50" id="s-myst">
</div>
<div class="slider-group">
<div class="slider-label"><span>Warmth</span><span class="slider-val" id="v-warm">50</span></div>
<input type="range" min="0" max="100" value="50" id="s-warm">
</div>
<div class="slider-group">
<div class="slider-label"><span>Intellect</span><span class="slider-val" id="v-intel">40</span></div>
<input type="range" min="0" max="100" value="40" id="s-intel">
</div>
<div class="slider-group">
<div class="slider-label"><span>Vulnerability</span><span class="slider-val" id="v-vuln">30</span></div>
<input type="range" min="0" max="100" value="30" id="s-vuln">
</div>
<div class="slider-group">
<div class="slider-label"><span>Intensity</span><span class="slider-val" id="v-inten">40</span></div>
<input type="range" min="0" max="100" value="40" id="s-inten">
</div>
<div class="slider-group">
<div class="slider-label"><span>Awkwardness</span><span class="slider-val" id="v-awk">30</span></div>
<input type="range" min="0" max="100" value="30" id="s-awk">
</div>
<div id="compat">Chemistry: 50%</div>
<div id="status">
<span class="badge" id="b-spark">Spark</span>
<span class="badge" id="b-laugh">Laughter</span>
<span class="badge" id="b-blush">Blushing</span>
<span class="badge" id="b-silence">Silence</span>
<span class="badge" id="b-deep">Deep Talk</span>
<span class="badge" id="b-tension">Tension</span>
<span class="badge" id="b-love">In Love</span>
</div>
<div id="dialogue">&nbsp;</div>
<div style="text-align:center"><button id="reset-btn">new date</button></div>
</div>
</div>
<a id="back" href="https://sloppy.live">sloppy.live</a>
<script>
(function(){
var C=document.getElementById('c'),X=C.getContext('2d');
C.width=320;C.height=360;

var sliders={
  conf:document.getElementById('s-conf'),
  humor:document.getElementById('s-humor'),
  myst:document.getElementById('s-myst'),
  warm:document.getElementById('s-warm'),
  intel:document.getElementById('s-intel'),
  vuln:document.getElementById('s-vuln'),
  inten:document.getElementById('s-inten'),
  awk:document.getElementById('s-awk')
};
var vals={
  conf:document.getElementById('v-conf'),
  humor:document.getElementById('v-humor'),
  myst:document.getElementById('v-myst'),
  warm:document.getElementById('v-warm'),
  intel:document.getElementById('v-intel'),
  vuln:document.getElementById('v-vuln'),
  inten:document.getElementById('v-inten'),
  awk:document.getElementById('v-awk')
};
var compatEl=document.getElementById('compat');
var dialogueEl=document.getElementById('dialogue');
var badges={spark:document.getElementById('b-spark'),laugh:document.getElementById('b-laugh'),blush:document.getElementById('b-blush'),silence:document.getElementById('b-silence'),deep:document.getElementById('b-deep'),tension:document.getElementById('b-tension'),love:document.getElementById('b-love')};

var t=0,dialogueTimer=0,lastDialogue='';
var blinkTimer1=2+Math.random()*3,blinkTimer2=3+Math.random()*2;
var blink1=0,blink2=0;
var fidgetPhase=0;
var breathe1=0,breathe2=0;

var DIALOGUES_LOW=[
  "So... nice weather, huh?",
  "*stares at menu intensely*",
  "I forgot what I was going to say...",
  "*phone buzzes* Sorry, one sec...",
  "Do you... come here often?",
  "*long uncomfortable pause*",
  "I think I have something in my teeth.",
  "My ex used to love this place...",
  "*accidentally knocks over water glass*"
];
var DIALOGUES_MID=[
  "Wait, you like that band too?!",
  "Okay that story was actually hilarious",
  "I can't tell if you're joking or serious",
  "You have really nice... uh... eyes?",
  "*nervous laughter that's actually genuine*",
  "Tell me something nobody knows about you",
  "This is way better than my last date",
  "I like how weird you are. Good weird."
];
var DIALOGUES_HIGH=[
  "I haven't laughed this hard in months",
  "Don't look at me like that, I'll blush",
  "Can we just... stay here a bit longer?",
  "You're trouble. I can tell. I love it.",
  "I'm already thinking about date two...",
  "This feels like a movie, honestly",
  "*reaches across the table for your hand*",
  "I think I forgot how to breathe for a second"
];
var DIALOGUES_AWK=[
  "*spills drink everywhere*",
  "Wait, that came out wrong—",
  "I just snorted. Please forget that.",
  "*trips on literally nothing*",
  "My brain and my mouth aren't connected rn",
  "I'm going to pretend I didn't just say that"
];
var DIALOGUES_DEEP=[
  "What's the thing you're most afraid of?",
  "I think people hide their best parts...",
  "Do you ever feel like you're performing?",
  "I read this thing about parallel lives...",
  "Honestly? I don't think I've been this real in ages",
  "What would you do if nothing could fail?"
];
var DIALOGUES_INTENSE=[
  "*holds eye contact a beat too long*",
  "I'm not going to pretend I'm not fascinated by you",
  "Something about tonight feels... inevitable?",
  "I don't usually do this. Whatever this is.",
  "You're looking at me like you know something I don't"
];
var DIALOGUES_VULN=[
  "I'm actually kind of terrified right now",
  "I haven't told anyone this before but...",
  "*voice cracks slightly* Sorry, this is real for me",
  "I think I like you. That scares me.",
  "Can I be honest? I almost cancelled tonight."
];

function getVals(){
  return{
    conf:+sliders.conf.value,
    humor:+sliders.humor.value,
    myst:+sliders.myst.value,
    warm:+sliders.warm.value,
    intel:+sliders.intel.value,
    vuln:+sliders.vuln.value,
    inten:+sliders.inten.value,
    awk:+sliders.awk.value
  };
}

function chemistry(v){
  var base=(v.conf*0.18+v.humor*0.18+v.warm*0.22+v.myst*0.1+v.intel*0.12+v.vuln*0.1+v.inten*0.1);
  var awkPenalty=v.awk>60?(v.awk-60)*0.4:0;
  var mystBonus=v.myst>40&&v.myst<75?6:0;
  var confBonus=v.conf>70&&v.conf<90?4:0;
  var overconf=v.conf>90?(v.conf-90)*0.5:0;
  var vulnBonus=v.vuln>40&&v.vuln<70&&v.warm>45?5:0;
  var intenBonus=v.inten>60&&v.inten<85?4:0;
  var overInten=v.inten>85?(v.inten-85)*0.4:0;
  var intelBonus=v.intel>50&&v.intel<80?3:0;
  return Math.max(0,Math.min(100,Math.round(base-awkPenalty+mystBonus+confBonus-overconf+vulnBonus+intenBonus-overInten+intelBonus)));
}

function updateUI(){
  var v=getVals();
  for(var k in vals)vals[k].textContent=v[k];
  var chem=chemistry(v);
  compatEl.textContent='Chemistry: '+chem+'%';

  badges.spark.classList.toggle('active',chem>35&&v.myst>40);
  badges.laugh.classList.toggle('active',v.humor>55);
  badges.blush.classList.toggle('active',v.warm>60&&chem>50);
  badges.silence.classList.toggle('active',v.awk>65||chem<25);
  badges.deep.classList.toggle('active',v.intel>55&&v.vuln>40);
  badges.tension.classList.toggle('active',v.inten>65&&chem>40);
  badges.love.classList.toggle('active',chem>80);
}

function pickDialogue(){
  var v=getVals();
  var chem=chemistry(v);
  var pool;
  if(v.awk>70&&Math.random()<0.35)pool=DIALOGUES_AWK;
  else if(v.vuln>60&&Math.random()<0.4)pool=DIALOGUES_VULN;
  else if(v.inten>65&&Math.random()<0.4)pool=DIALOGUES_INTENSE;
  else if(v.intel>55&&v.vuln>35&&Math.random()<0.35)pool=DIALOGUES_DEEP;
  else if(chem>70)pool=DIALOGUES_HIGH;
  else if(chem>40)pool=DIALOGUES_MID;
  else pool=DIALOGUES_LOW;
  var pick=pool[Math.floor(Math.random()*pool.length)];
  if(pick===lastDialogue)pick=pool[(pool.indexOf(pick)+1)%pool.length];
  lastDialogue=pick;
  dialogueEl.textContent=pick;
}

// pencil stroke helper
function pencilLine(x1,y1,x2,y2,weight,alpha){
  X.save();
  X.globalAlpha=alpha||0.7;
  X.strokeStyle='#2a2520';
  X.lineWidth=weight||1.5;
  X.lineCap='round';
  X.beginPath();
  // jitter for pencil feel
  var steps=Math.max(3,Math.floor(Math.sqrt((x2-x1)*(x2-x1)+(y2-y1)*(y2-y1))/4));
  X.moveTo(x1+(Math.random()-0.5)*1.5,y1+(Math.random()-0.5)*1.5);
  for(var i=1;i<=steps;i++){
    var t=i/steps;
    var px=x1+(x2-x1)*t+(Math.random()-0.5)*2;
    var py=y1+(y2-y1)*t+(Math.random()-0.5)*2;
    X.lineTo(px,py);
  }
  X.stroke();
  X.restore();
}

function pencilCircle(cx,cy,r,weight,alpha){
  X.save();
  X.globalAlpha=alpha||0.6;
  X.strokeStyle='#2a2520';
  X.lineWidth=weight||1.5;
  X.lineCap='round';
  X.beginPath();
  var steps=24;
  for(var i=0;i<=steps;i++){
    var a=i/steps*Math.PI*2;
    var jx=(Math.random()-0.5)*2;
    var jy=(Math.random()-0.5)*2;
    var px=cx+Math.cos(a)*r+jx;
    var py=cy+Math.sin(a)*r+jy;
    if(i===0)X.moveTo(px,py);else X.lineTo(px,py);
  }
  X.stroke();
  X.restore();
}

function pencilFill(cx,cy,r,color,alpha){
  X.save();
  X.globalAlpha=alpha||0.15;
  X.fillStyle=color;
  X.beginPath();
  X.arc(cx,cy,r,0,Math.PI*2);
  X.fill();
  X.restore();
}

function drawFigure(cx,cy,flip,v,chem){
  var lean=0;
  if(chem>60)lean=flip?-3:3;
  if(v.inten>70)lean+=(flip?-2:2);
  if(v.awk>70)lean=flip?4:-4;

  // breathing
  var br=flip?breathe2:breathe1;
  var breathAmp=v.awk>60?1.5:0.8;

  var headY=cy-50+Math.sin(t*1.2+(flip?1:0))*2;
  var bodyY=cy+10+Math.sin(br)*breathAmp;

  // torso
  pencilLine(cx+lean,headY+22,cx+lean,bodyY+30,2,0.5);
  // legs
  pencilLine(cx+lean,bodyY+30,cx-12+lean,bodyY+70,1.8,0.45);
  pencilLine(cx+lean,bodyY+30,cx+12+lean,bodyY+70,1.8,0.45);

  // arms — fidgeting when awkward
  var armAngle=chem>50?0.3:-0.2;
  if(v.awk>70)armAngle=-0.5;
  var armX=flip?-1:1;
  var fidget=v.awk>50?Math.sin(t*4+(flip?2:0))*3:0;
  pencilLine(cx+lean,headY+30,cx+lean+armX*22,headY+40+Math.sin(t*2)*3*armAngle+fidget,1.5,0.45);
  // other arm — reaches toward partner at high vulnerability
  var reachExtra=v.vuln>55&&chem>50?(flip?-4:4):0;
  pencilLine(cx+lean,headY+30,cx+lean-armX*18+reachExtra,headY+38,1.5,0.45);

  // head
  pencilCircle(cx+lean,headY,18,2,0.6);

  // hair
  var hairDir=flip?-1:1;
  for(var i=0;i<5;i++){
    var ha=-0.5+i*0.25;
    var hx=cx+lean+Math.cos(ha)*18*hairDir;
    var hy=headY-12+Math.sin(ha)*6;
    pencilLine(hx,hy,hx+hairDir*(4+Math.random()*6),hy-8-Math.random()*6,1.2,0.35);
  }

  // eyes — with blink
  var isBlinking=flip?blink2>0:blink1>0;
  var eyeOff=flip?-6:6;
  var lookDir=chem>40?eyeOff*0.5:0;
  // intense stare
  if(v.inten>65)lookDir=eyeOff*0.8;
  if(isBlinking){
    // closed eyes — short lines
    pencilLine(cx+lean-8,headY-3,cx+lean-4,headY-3,1.2,0.5);
    pencilLine(cx+lean+4,headY-3,cx+lean+8,headY-3,1.2,0.5);
  }else{
    var eyeSize=v.inten>70?2.5:2;
    X.fillStyle='#2a2520';X.globalAlpha=0.7;
    X.beginPath();X.arc(cx+lean-6+lookDir,headY-3,eyeSize,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(cx+lean+6+lookDir,headY-3,eyeSize,0,Math.PI*2);X.fill();
    X.globalAlpha=1;
    // eyebrows — raised when surprised/vulnerable
    if(v.vuln>55){
      pencilLine(cx+lean-9,headY-9,cx+lean-3,headY-10,1,0.3);
      pencilLine(cx+lean+3,headY-10,cx+lean+9,headY-9,1,0.3);
    }
  }

  // mouth
  if(v.humor>60||chem>65){
    X.save();X.globalAlpha=0.5;X.strokeStyle='#2a2520';X.lineWidth=1.2;X.lineCap='round';
    X.beginPath();X.arc(cx+lean,headY+6,6,-0.1,Math.PI+0.1);X.stroke();X.restore();
  }else if(v.vuln>65){
    // slightly parted/open
    pencilCircle(cx+lean,headY+7,3,1,0.3);
  }else if(v.awk>65){
    pencilLine(cx+lean-5,headY+7,cx+lean+5,headY+6,1.2,0.4);
  }else{
    pencilLine(cx+lean-4,headY+6,cx+lean+4,headY+6,1,0.35);
  }

  // blush — stronger with vulnerability
  if((v.warm>55&&chem>45)||(v.vuln>60&&chem>35)){
    var blushA=0.12+chem*0.002+(v.vuln>60?0.06:0);
    pencilFill(cx+lean-12,headY+2,5,'#c87070',blushA);
    pencilFill(cx+lean+12,headY+2,5,'#c87070',blushA);
  }

  // hearts
  if(chem>75){
    var hx2=cx+lean+(flip?-28:28);
    var hy2=headY-20+Math.sin(t*3)*5;
    X.save();X.globalAlpha=0.3+Math.sin(t*4)*0.15;X.fillStyle='#c87070';X.font='16px Caveat';
    X.fillText('\u2665',hx2,hy2);X.restore();
    if(chem>90){
      X.save();X.globalAlpha=0.2;X.fillStyle='#c87070';X.font='12px Caveat';
      X.fillText('\u2665',hx2+(flip?-12:12),hy2-8+Math.sin(t*5)*3);X.restore();
    }
  }

  // thought bubble for intellect
  if(v.intel>65){
    var tx=cx+lean+(flip?-30:30);
    var ty2=headY-30+Math.sin(t*2)*2;
    pencilCircle(tx,ty2,8,0.8,0.15);
    pencilCircle(tx+(flip?-4:4),ty2+10,3,0.8,0.12);
    X.save();X.globalAlpha=0.2;X.fillStyle='#2a2520';X.font='9px Special Elite';X.textAlign='center';
    X.fillText('?',tx,ty2+3);X.restore();
  }

  // intensity — glow/aura
  if(v.inten>70){
    pencilFill(cx+lean,headY,24,'#8b6e4e',0.04+v.inten*0.0005);
  }

  // sweat drop if awkward
  if(v.awk>60){
    var sx=cx+lean+(flip?16:-16);
    var sy=headY-10+Math.sin(t*5)*3;
    X.save();X.globalAlpha=0.3;X.fillStyle='#6688aa';X.font='12px Caveat';
    X.fillText('\u2741',sx,sy);X.restore();
  }
}

function drawTable(){
  // table surface
  var ty=240;
  pencilLine(80,ty,240,ty,2,0.4);
  // legs
  pencilLine(100,ty,95,ty+50,1.5,0.3);
  pencilLine(220,ty,225,ty+50,1.5,0.3);
  // candle
  var cx=160,candleY=ty-20;
  pencilLine(cx,ty,cx,candleY,2,0.4);
  // flame
  X.save();X.globalAlpha=0.2+Math.sin(t*6)*0.1;
  X.fillStyle='#d4a030';
  X.beginPath();
  X.ellipse(cx,candleY-6,3+Math.sin(t*8),7+Math.sin(t*5)*2,0,0,Math.PI*2);
  X.fill();X.restore();
  // glow
  pencilFill(cx,candleY-4,18,'#d4a030',0.04+Math.sin(t*4)*0.02);
  // glasses
  pencilCircle(130,ty-6,6,1,0.25);
  pencilCircle(190,ty-6,6,1,0.25);
}

function drawScene(){
  // paper bg
  X.fillStyle='#f4efe6';
  X.fillRect(0,0,320,360);
  // paper grain
  X.save();X.globalAlpha=0.03;
  for(var i=0;i<60;i++){
    var gx=Math.random()*320,gy=Math.random()*360;
    X.fillStyle=Math.random()>0.5?'#000':'#8a7a6a';
    X.fillRect(gx,gy,Math.random()*3,Math.random()*2);
  }
  X.restore();

  var v=getVals();
  var chem=chemistry(v);

  // figures
  drawFigure(110,160,false,v,chem);
  drawFigure(210,160,true,v,chem);

  drawTable();

  // connection line (visible at high chemistry)
  if(chem>55){
    X.save();X.globalAlpha=(chem-55)*0.006;
    X.setLineDash([4,6]);X.strokeStyle='#c87070';X.lineWidth=1;
    X.beginPath();X.moveTo(128,115);X.lineTo(192,115);X.stroke();
    X.setLineDash([]);X.restore();
  }

  // notebook margin line
  X.save();X.globalAlpha=0.08;X.strokeStyle='#cc6666';X.lineWidth=1;
  X.beginPath();X.moveTo(40,0);X.lineTo(40,360);X.stroke();X.restore();

  // ruled lines
  X.save();X.globalAlpha=0.04;X.strokeStyle='#6688aa';X.lineWidth=0.5;
  for(var ly=30;ly<360;ly+=24){
    X.beginPath();X.moveTo(0,ly);X.lineTo(320,ly);X.stroke();
  }
  X.restore();

  // margin doodles — little hearts/stars that appear with chemistry
  if(chem>30){
    X.save();X.globalAlpha=0.08+chem*0.001;X.fillStyle='#5a5248';X.font='10px Caveat';
    var doodleY=80+Math.sin(t*0.3)*20;
    X.fillText(chem>60?'\u2665':'\u2606',12,doodleY);
    if(chem>50)X.fillText('\u2605',18,doodleY+30);
    if(chem>70)X.fillText('\u2665',8,doodleY+55);
    if(chem>85){X.fillText('\u2665\u2665',6,doodleY+80);X.fillText('!',22,doodleY+95);}
    X.restore();
  }

  // coffee ring stain
  X.save();X.globalAlpha=0.025;X.strokeStyle='#8a6a40';X.lineWidth=3;
  X.beginPath();X.arc(270,320,16,0,Math.PI*2);X.stroke();X.restore();
}

for(var k in sliders){
  sliders[k].addEventListener('input',function(){updateUI();});
}

document.getElementById('reset-btn').addEventListener('click',function(){
  for(var k in sliders)sliders[k].value=50;
  sliders.awk.value=30;sliders.intel.value=40;sliders.vuln.value=30;sliders.inten.value=40;
  updateUI();pickDialogue();
});

function loop(){
  t+=0.016;
  dialogueTimer+=0.016;
  breathe1+=0.04;breathe2+=0.035;
  fidgetPhase+=0.016;

  // blink timers
  blinkTimer1-=0.016;blinkTimer2-=0.016;
  if(blinkTimer1<=0){blink1=0.12;blinkTimer1=2.5+Math.random()*3;}
  if(blinkTimer2<=0){blink2=0.12;blinkTimer2=2+Math.random()*4;}
  if(blink1>0)blink1-=0.016;
  if(blink2>0)blink2-=0.016;

  if(dialogueTimer>4){dialogueTimer=0;pickDialogue();}
  drawScene();
  requestAnimationFrame(loop);
}

updateUI();pickDialogue();loop();
})();
</script>
</body>
</html>
