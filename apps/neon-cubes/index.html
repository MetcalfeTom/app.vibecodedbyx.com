<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Neon Cubes</title>
<meta name="description" content="A high-speed physics sandbox. Cubes streak trails through the void and detonate into light on impact.">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%92%A0">
<meta property="og:title" content="Neon Cubes">
<meta property="og:description" content="Drag, fling, watch them explode. A high-speed physics sandbox with glowing trails.">
<meta property="og:url" content="https://sloppy.live/neon-cubes">
<meta property="og:image" content="https://image.pollinations.ai/prompt/glowing%20neon%20cubes%20flying%20through%20black%20void%20with%20bright%20light%20trails%20colliding%20into%20explosions%2C%20cyberpunk%2C%20long%20exposure?width=1200&height=630&seed=12345&nologo=true">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Rubik+Mono+One&family=Space+Mono:wght@400;700&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">
<style>
  :root {
    --void: #04050a;
    --void-2: #080a14;
    --cyan: #5dfaff;
    --magenta: #ff2bd6;
    --lime: #6cfa5e;
    --gold: #ffd54a;
    --hot: #ff3a4a;
    --bone: #e5e0f0;
    --dim: #6d7290;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 100%; }
  body {
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 18% 12%, rgba(93,250,255,0.12), transparent 55%),
      radial-gradient(ellipse at 82% 88%, rgba(255,43,214,0.12), transparent 55%),
      linear-gradient(180deg, var(--void-2), var(--void) 70%);
    color: var(--bone);
    font-family: 'Space Mono', ui-monospace, monospace;
    overflow-x: hidden;
    overscroll-behavior: none;
    padding: 1rem 0.85rem 1.5rem;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 1;
    background:
      repeating-linear-gradient(0deg, rgba(93,250,255,0.025) 0 1px, transparent 1px 3px),
      repeating-linear-gradient(90deg, rgba(0,0,0,0.18) 0 1px, transparent 1px 80px);
  }
  main {
    position: relative;
    z-index: 2;
    max-width: 70rem;
    margin: 0 auto;
    display: grid;
    gap: 0.85rem;
  }
  header.head {
    display: flex;
    align-items: baseline;
    gap: 1rem;
    flex-wrap: wrap;
    padding: 0.1rem 0.2rem 0.55rem;
    border-bottom: 1px dashed rgba(93,250,255,0.2);
  }
  .stamp {
    font-family: 'Space Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--cyan);
    padding: 0.25rem 0.55rem;
    border: 1px solid rgba(93,250,255,0.4);
    border-radius: 0.2rem;
    background: rgba(93,250,255,0.05);
  }
  h1 {
    font-family: 'Audiowide', sans-serif;
    font-weight: 400;
    font-size: clamp(2.4rem, 6.5vw, 4rem);
    line-height: 1;
    margin: 0;
    letter-spacing: 0.04em;
    color: var(--bone);
    text-shadow:
      0 0 24px rgba(93,250,255,0.35),
      0 0 60px rgba(255,43,214,0.25);
    background: linear-gradient(90deg, var(--cyan), var(--bone) 50%, var(--magenta));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(0.95rem, 2vw, 1.2rem);
    color: var(--dim);
    margin-left: auto;
  }
  .tagline em { color: var(--magenta); }

  .stage-wrap {
    position: relative;
    background: linear-gradient(180deg, var(--void), #02020a);
    border: 1.5px solid rgba(93,250,255,0.25);
    border-radius: 0.6rem;
    overflow: hidden;
    box-shadow:
      inset 0 0 0 1px rgba(0,0,0,0.7),
      inset 0 0 80px rgba(0,0,0,0.6),
      0 14px 40px rgba(0,0,0,0.6),
      0 0 24px rgba(93,250,255,0.18);
    touch-action: none;
  }
  canvas#stage {
    display: block;
    width: 100%;
    height: 72vh;
    min-height: 24rem;
    max-height: 40rem;
    cursor: crosshair;
  }
  .hud {
    position: absolute;
    top: 0.6rem;
    left: 0.7rem;
    right: 0.7rem;
    display: flex;
    justify-content: space-between;
    pointer-events: none;
    z-index: 3;
    gap: 0.5rem;
    flex-wrap: wrap;
  }
  .hud-cell {
    background: rgba(4,5,10,0.7);
    border: 1px solid rgba(93,250,255,0.3);
    color: var(--bone);
    font-family: 'Space Mono', monospace;
    font-size: 0.7rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 0.3rem 0.55rem;
    border-radius: 0.3rem;
    display: flex;
    gap: 0.4rem;
    align-items: center;
    backdrop-filter: blur(4px);
  }
  .hud-cell strong {
    color: var(--cyan);
    font-family: 'Rubik Mono One', sans-serif;
    font-size: 1.2rem;
    font-variant-numeric: tabular-nums;
  }
  .hud-cell.boom strong { color: var(--magenta); }
  .hud-cell.fps strong { color: var(--lime); font-size: 1rem; }

  .ctrls {
    display: grid;
    grid-template-columns: 1fr;
    gap: 0.7rem;
    padding: 0.85rem;
    background: linear-gradient(180deg, rgba(8,10,20,0.7), rgba(4,5,10,0.85));
    border: 1px solid rgba(93,250,255,0.22);
    border-radius: 0.6rem;
  }
  @media (min-width: 44rem) {
    .ctrls { grid-template-columns: 2fr 1fr; align-items: end; }
  }
  .sliders {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.5rem 0.9rem;
  }
  @media (min-width: 36rem) {
    .sliders { grid-template-columns: repeat(4, 1fr); }
  }
  .slider {
    display: grid;
    gap: 0.25rem;
  }
  .slider-top {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--dim);
  }
  .slider-top .val {
    font-family: 'Audiowide', sans-serif;
    font-size: 0.85rem;
    color: var(--cyan);
  }
  input[type="range"] {
    appearance: none;
    -webkit-appearance: none;
    width: 100%;
    height: 0.45rem;
    background: rgba(93,250,255,0.08);
    border: 1px solid rgba(93,250,255,0.3);
    border-radius: 0.25rem;
    outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 1.2rem;
    height: 1.2rem;
    border-radius: 0.2rem;
    background: linear-gradient(180deg, var(--cyan), #2a9fae);
    border: 1px solid #052a2e;
    cursor: grab;
    box-shadow: 0 0 8px rgba(93,250,255,0.6);
  }
  input[type="range"]::-moz-range-thumb {
    width: 1.2rem;
    height: 1.2rem;
    border-radius: 0.2rem;
    background: linear-gradient(180deg, var(--cyan), #2a9fae);
    border: 1px solid #052a2e;
    cursor: grab;
  }
  input[type="range"]:focus-visible { outline: 3px solid var(--gold); outline-offset: 2px; }

  .actions {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.4rem;
  }
  .btn {
    font-family: 'Audiowide', sans-serif;
    font-size: 0.78rem;
    letter-spacing: 0.16em;
    padding: 0.7rem 0.5rem;
    border-radius: 0.4rem;
    border: 1.5px solid var(--cyan);
    background: rgba(93,250,255,0.1);
    color: var(--cyan);
    text-transform: uppercase;
    cursor: pointer;
    min-height: 2.75rem;
    transition: all 0.15s ease;
  }
  .btn:hover { background: rgba(93,250,255,0.2); box-shadow: 0 0 14px rgba(93,250,255,0.4); }
  .btn:focus-visible { outline: 3px solid var(--gold); outline-offset: 2px; }
  .btn.primary { background: rgba(255,43,214,0.16); border-color: var(--magenta); color: var(--magenta); }
  .btn.primary:hover { background: rgba(255,43,214,0.3); box-shadow: 0 0 14px rgba(255,43,214,0.5); }
  .btn.hot { border-color: var(--hot); color: var(--hot); background: rgba(255,58,74,0.1); }
  .btn.hot:hover { background: rgba(255,58,74,0.22); box-shadow: 0 0 14px rgba(255,58,74,0.45); }

  .toggle-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0.45rem 0.6rem;
    background: rgba(4,5,10,0.5);
    border: 1px solid rgba(93,250,255,0.2);
    border-radius: 0.35rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--dim);
    cursor: pointer;
    min-height: 2.5rem;
  }
  .toggle-row:hover { color: var(--bone); }
  .toggle-row input { display: none; }
  .toggle-row .pill {
    width: 2rem;
    height: 1rem;
    border-radius: 1rem;
    background: rgba(4,5,10,0.8);
    border: 1px solid rgba(93,250,255,0.3);
    position: relative;
    flex-shrink: 0;
  }
  .toggle-row .pill::after {
    content: '';
    position: absolute;
    top: 1px;
    left: 1px;
    width: 0.75rem;
    height: 0.75rem;
    border-radius: 50%;
    background: var(--dim);
    transition: all 0.2s ease;
  }
  .toggle-row input:checked + .pill { background: rgba(93,250,255,0.2); border-color: var(--cyan); }
  .toggle-row input:checked + .pill::after { left: 1rem; background: var(--cyan); box-shadow: 0 0 8px rgba(93,250,255,0.7); }

  .panel-col {
    display: grid;
    gap: 0.4rem;
  }
  .legend {
    font-size: 0.65rem;
    letter-spacing: 0.06em;
    color: var(--dim);
    text-align: center;
    padding-top: 0.3rem;
    border-top: 1px dashed rgba(93,250,255,0.15);
    margin-top: 0.3rem;
  }
  .legend kbd {
    background: rgba(4,5,10,0.6);
    border: 1px solid rgba(93,250,255,0.3);
    border-radius: 0.2rem;
    padding: 0.05rem 0.35rem;
    color: var(--bone);
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
  }
</style>
</head>
<body>
<main>
  <header class="head">
    <span class="stamp">SANDBOX · NO RULES</span>
    <h1>NEON·CUBES</h1>
    <p class="tagline">tap, drag, fling. <em>watch them shatter.</em></p>
  </header>

  <div class="stage-wrap">
    <div class="hud">
      <div class="hud-cell" aria-label="Cubes alive">CUBES <strong id="cubeCount" aria-live="polite">0</strong></div>
      <div class="hud-cell boom" aria-label="Explosions">BOOMS <strong id="boomCount">0</strong></div>
      <div class="hud-cell fps" aria-label="Frames per second">FPS <strong id="fps">60</strong></div>
    </div>
    <canvas id="stage" role="application" aria-label="Neon cubes sandbox. Click or drag to spawn cubes."></canvas>
  </div>

  <section class="ctrls">
    <div class="sliders">
      <div class="slider">
        <div class="slider-top"><span>Gravity</span><span class="val" id="gVal">0.5g</span></div>
        <input type="range" id="gravity" min="-0.5" max="2.4" step="0.05" value="0.5" aria-label="Gravity">
      </div>
      <div class="slider">
        <div class="slider-top"><span>Trails</span><span class="val" id="tVal">0.20</span></div>
        <input type="range" id="trails" min="0.05" max="0.5" step="0.01" value="0.20" aria-label="Trail fade alpha (lower = longer trails)">
      </div>
      <div class="slider">
        <div class="slider-top"><span>Bounce</span><span class="val" id="bVal">0.78</span></div>
        <input type="range" id="bounce" min="0.2" max="0.98" step="0.01" value="0.78" aria-label="Wall bounce restitution">
      </div>
      <div class="slider">
        <div class="slider-top"><span>Speed</span><span class="val" id="sVal">1.0×</span></div>
        <input type="range" id="speed" min="0.3" max="3" step="0.05" value="1" aria-label="Spawn velocity multiplier">
      </div>
    </div>
    <div class="panel-col">
      <div class="actions">
        <button class="btn primary" id="burstBtn" type="button">✦ Burst 12</button>
        <button class="btn" id="autoBtn" type="button">⏵ Auto</button>
        <button class="btn hot" id="detonateBtn" type="button">⚡ Detonate</button>
        <button class="btn" id="clearBtn" type="button">↻ Clear</button>
      </div>
      <label class="toggle-row" for="soundToggle"><span>Sound</span><input type="checkbox" id="soundToggle" checked><span class="pill" aria-hidden="true"></span></label>
      <div class="legend"><kbd>Click</kbd> spawn · <kbd>Drag</kbd> fling · <kbd>Space</kbd> burst · <kbd>D</kbd> detonate · <kbd>A</kbd> auto · <kbd>C</kbd> clear</div>
    </div>
  </section>
</main>

<script>
(function(){
  const canvas = document.getElementById('stage');
  const ctx = canvas.getContext('2d');
  const wrap = canvas.parentElement;

  const els = {
    cubeCount: document.getElementById('cubeCount'),
    boomCount: document.getElementById('boomCount'),
    fps: document.getElementById('fps'),
    gravity: document.getElementById('gravity'),
    trails: document.getElementById('trails'),
    bounce: document.getElementById('bounce'),
    speed: document.getElementById('speed'),
    gVal: document.getElementById('gVal'),
    tVal: document.getElementById('tVal'),
    bVal: document.getElementById('bVal'),
    sVal: document.getElementById('sVal'),
    burstBtn: document.getElementById('burstBtn'),
    autoBtn: document.getElementById('autoBtn'),
    detonateBtn: document.getElementById('detonateBtn'),
    clearBtn: document.getElementById('clearBtn'),
    soundToggle: document.getElementById('soundToggle'),
  };

  const state = {
    W: 0, H: 0,
    dpr: Math.min(window.devicePixelRatio || 1, 2),
    cubes: [],
    particles: [],
    rings: [],
    flashes: [],
    gravity: 0.5,
    trailAlpha: 0.20,
    bounce: 0.78,
    speed: 1.0,
    sound: true,
    auto: false,
    autoTimer: 0,
    shake: 0,
    booms: 0,
    fps: 60,
    fpsAcc: 0,
    fpsFrames: 0,
    fpsLast: 0,
    MAX_CUBES: 110,
  };

  function resize() {
    const r = wrap.getBoundingClientRect();
    state.W = Math.floor(r.width);
    state.H = Math.floor(r.height);
    canvas.width = state.W * state.dpr;
    canvas.height = state.H * state.dpr;
    canvas.style.width = state.W + 'px';
    canvas.style.height = state.H + 'px';
    ctx.setTransform(state.dpr, 0, 0, state.dpr, 0, 0);
  }
  resize();
  window.addEventListener('resize', resize);

  // ---- Audio ----
  let audioCtx = null, master = null;
  function ensureAudio() {
    if (audioCtx) return;
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    audioCtx = new Ctx();
    master = audioCtx.createGain();
    master.gain.value = 0.45;
    const comp = audioCtx.createDynamicsCompressor();
    comp.threshold.value = -14; comp.ratio.value = 4;
    master.connect(comp); comp.connect(audioCtx.destination);
  }
  function withSound(fn) {
    if (!state.sound) return;
    ensureAudio(); if (!audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    fn(audioCtx.currentTime);
  }
  let lastBoom = 0;
  function playBoom(intensity) {
    const now = performance.now();
    if (now - lastBoom < 28) return;
    lastBoom = now;
    withSound(t => {
      const I = Math.min(1.5, intensity);
      // Crack noise
      const len = Math.floor(0.16 * audioCtx.sampleRate);
      const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, 0.55);
      const src = audioCtx.createBufferSource(); src.buffer = buf;
      const f = audioCtx.createBiquadFilter();
      f.type = 'bandpass'; f.frequency.value = 1400 + I*900; f.Q.value = 1.6;
      const g = audioCtx.createGain(); g.gain.value = 0.18 * I;
      src.connect(f); f.connect(g); g.connect(master);
      src.start(t);
      // Sub thump
      const o = audioCtx.createOscillator();
      o.type = 'sine';
      o.frequency.setValueAtTime(160, t);
      o.frequency.exponentialRampToValueAtTime(36, t + 0.22);
      const og = audioCtx.createGain();
      og.gain.setValueAtTime(0.22 * I, t);
      og.gain.exponentialRampToValueAtTime(0.001, t + 0.26);
      o.connect(og); og.connect(master);
      o.start(t); o.stop(t + 0.28);
      // Bright sparkle
      const o2 = audioCtx.createOscillator();
      o2.type = 'square'; o2.frequency.value = 1200 + I*400;
      const o2g = audioCtx.createGain();
      o2g.gain.setValueAtTime(0.08 * I, t);
      o2g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
      o2.connect(o2g); o2g.connect(master);
      o2.start(t); o2.stop(t + 0.07);
    });
  }
  function playSpawn() {
    withSound(t => {
      const o = audioCtx.createOscillator();
      o.type = 'triangle';
      o.frequency.setValueAtTime(220, t);
      o.frequency.exponentialRampToValueAtTime(440, t + 0.04);
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.05, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
      o.connect(g); g.connect(master);
      o.start(t); o.stop(t + 0.06);
    });
  }
  function playWallTick() {
    withSound(t => {
      const o = audioCtx.createOscillator();
      o.type = 'square'; o.frequency.value = 380;
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.03, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.025);
      o.connect(g); g.connect(master);
      o.start(t); o.stop(t + 0.03);
    });
  }

  // ---- Cubes / particles ----
  function spawnCube(x, y, vx, vy) {
    if (state.cubes.length >= state.MAX_CUBES) {
      // Recycle oldest
      const old = state.cubes.shift();
      explodeAt(old.x, old.y, old.hue, 0.5);
    }
    const size = 14 + Math.random() * 16;
    const hue = Math.floor(Math.random() * 360);
    state.cubes.push({
      x, y,
      vx: (vx || 0) * state.speed,
      vy: (vy || 0) * state.speed,
      size,
      angle: Math.random() * Math.PI * 2,
      va: (Math.random() - 0.5) * 6,
      hue,
      age: 0,
    });
    playSpawn();
  }

  function explodeAt(x, y, hue, intensity) {
    intensity = Math.max(0.4, Math.min(2, intensity));
    state.booms += 1;
    els.boomCount.textContent = state.booms;
    const n = 12 + Math.floor(intensity * 22);
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 120 + Math.random() * 460 * intensity;
      state.particles.push({
        x, y,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp,
        life: 0.6 + Math.random() * 0.55,
        maxLife: 1.15,
        hue: (hue + (Math.random()-0.5)*40 + 360) % 360,
        size: 1.6 + Math.random() * 2.6,
      });
    }
    // Shockwave ring (cyan→white core, hue accent)
    state.rings.push({
      x, y, life: 0.45, maxLife: 0.45,
      r: 10, hue,
    });
    state.rings.push({
      x, y, life: 0.6, maxLife: 0.6,
      r: 6, hue: (hue + 180) % 360, slow: true,
    });
    // Flash
    state.flashes.push({ x, y, life: 0.18, maxLife: 0.18, r: 60 * intensity });
    state.shake = Math.min(22, state.shake + intensity * 7);
    playBoom(intensity);
  }

  function collideCubes(a, b) {
    const dx = b.x - a.x, dy = b.y - a.y;
    const rsum = (a.size + b.size) * 0.5;
    const d2 = dx*dx + dy*dy;
    if (d2 < rsum * rsum) {
      const cx = (a.x + b.x) / 2;
      const cy = (a.y + b.y) / 2;
      // Hue inherits both — blended
      const mixHue = (a.hue + b.hue) / 2;
      const rv = Math.sqrt((a.vx - b.vx)**2 + (a.vy - b.vy)**2);
      const intensity = 0.45 + Math.min(1.6, rv / 350);
      explodeAt(cx, cy, mixHue, intensity);
      return true;
    }
    return false;
  }

  // ---- Update ----
  function update(dt) {
    const g = state.gravity * 1100;
    // Auto-spawn
    if (state.auto) {
      state.autoTimer -= dt;
      if (state.autoTimer <= 0) {
        state.autoTimer = 0.18 + Math.random() * 0.25;
        spawnFromEdge();
      }
    }
    // Cube physics
    for (let i = state.cubes.length - 1; i >= 0; i--) {
      const c = state.cubes[i];
      c.age += dt;
      c.vy += g * dt;
      c.vx *= Math.pow(0.998, dt * 60);
      c.va *= Math.pow(0.99, dt * 60);
      c.x += c.vx * dt;
      c.y += c.vy * dt;
      c.angle += c.va * dt;
      // Walls
      const r = c.size * 0.55;
      let bounced = false;
      if (c.x - r < 0) { c.x = r; c.vx = -c.vx * state.bounce; bounced = true; }
      if (c.x + r > state.W) { c.x = state.W - r; c.vx = -c.vx * state.bounce; bounced = true; }
      if (c.y - r < 0) { c.y = r; c.vy = -c.vy * state.bounce; bounced = true; }
      if (c.y + r > state.H) { c.y = state.H - r; c.vy = -c.vy * state.bounce; bounced = true; }
      if (bounced) {
        c.va += (Math.random() - 0.5) * 3;
        if (Math.abs(c.vx) + Math.abs(c.vy) > 150) playWallTick();
      }
    }
    // Cube-cube collisions (explode + remove both)
    outer: for (let i = state.cubes.length - 1; i >= 0; i--) {
      for (let j = i - 1; j >= 0; j--) {
        const a = state.cubes[i];
        const b = state.cubes[j];
        if (!a || !b) continue;
        if (collideCubes(a, b)) {
          // Remove both
          if (i > j) {
            state.cubes.splice(i, 1);
            state.cubes.splice(j, 1);
          } else {
            state.cubes.splice(j, 1);
            state.cubes.splice(i, 1);
          }
          continue outer;
        }
      }
    }
    // Particles
    for (let i = state.particles.length - 1; i >= 0; i--) {
      const p = state.particles[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vx *= 0.94;
      p.vy *= 0.94;
      p.vy += 120 * dt; // mild gravity on particles
      p.life -= dt;
      if (p.life <= 0) state.particles.splice(i, 1);
    }
    // Rings
    for (let i = state.rings.length - 1; i >= 0; i--) {
      const r = state.rings[i];
      r.life -= dt;
      r.r += (r.slow ? 360 : 520) * dt;
      if (r.life <= 0) state.rings.splice(i, 1);
    }
    // Flashes
    for (let i = state.flashes.length - 1; i >= 0; i--) {
      const f = state.flashes[i];
      f.life -= dt;
      if (f.life <= 0) state.flashes.splice(i, 1);
    }
    state.shake *= Math.pow(0.85, dt * 60);
    if (state.shake < 0.15) state.shake = 0;
  }

  function spawnFromEdge() {
    const side = Math.floor(Math.random() * 4);
    let x, y, vx, vy;
    const sp = 200 + Math.random() * 500;
    if (side === 0) { x = -10; y = Math.random() * state.H; vx = sp; vy = (Math.random()-0.5) * 200; }
    else if (side === 1) { x = state.W + 10; y = Math.random() * state.H; vx = -sp; vy = (Math.random()-0.5) * 200; }
    else if (side === 2) { x = Math.random() * state.W; y = -10; vx = (Math.random()-0.5) * 200; vy = sp; }
    else { x = Math.random() * state.W; y = state.H + 10; vx = (Math.random()-0.5) * 200; vy = -sp; }
    spawnCube(x, y, vx, vy);
  }

  function burstAt(x, y, n) {
    for (let i = 0; i < n; i++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 200 + Math.random() * 480;
      spawnCube(x, y, Math.cos(a) * sp, Math.sin(a) * sp);
    }
  }

  function detonateAll() {
    for (let i = state.cubes.length - 1; i >= 0; i--) {
      const c = state.cubes[i];
      explodeAt(c.x, c.y, c.hue, 1.2);
    }
    state.cubes.length = 0;
  }

  function clearAll() {
    state.cubes.length = 0;
    state.particles.length = 0;
    state.rings.length = 0;
    state.flashes.length = 0;
    state.shake = 0;
  }

  // ---- Render ----
  function draw() {
    const W = state.W, H = state.H;
    const sx = state.shake > 0 ? (Math.random() - 0.5) * state.shake : 0;
    const sy = state.shake > 0 ? (Math.random() - 0.5) * state.shake : 0;

    // Trail fade overlay
    ctx.save();
    ctx.fillStyle = `rgba(4, 5, 10, ${state.trailAlpha})`;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();

    ctx.save();
    ctx.translate(sx, sy);

    // Use additive blending for cubes / particles / rings so they layer brightly
    ctx.globalCompositeOperation = 'lighter';

    // Particles
    for (const p of state.particles) {
      const a = Math.max(0, p.life / p.maxLife);
      ctx.fillStyle = `hsla(${p.hue}, 100%, 65%, ${a})`;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * (0.5 + a * 0.5), 0, Math.PI * 2);
      ctx.fill();
    }

    // Rings (shockwaves)
    for (const r of state.rings) {
      const a = Math.max(0, r.life / r.maxLife);
      ctx.lineWidth = 2 + a * 3;
      ctx.strokeStyle = `hsla(${r.hue}, 100%, 70%, ${a})`;
      ctx.shadowColor = `hsla(${r.hue}, 100%, 70%, ${a * 0.9})`;
      ctx.shadowBlur = 18;
      ctx.beginPath();
      ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.shadowBlur = 0;

    // Flashes — bright white core
    for (const f of state.flashes) {
      const a = Math.max(0, f.life / f.maxLife);
      const grad = ctx.createRadialGradient(f.x, f.y, 0, f.x, f.y, f.r);
      grad.addColorStop(0, `rgba(255,255,255,${a * 0.85})`);
      grad.addColorStop(1, 'rgba(255,255,255,0)');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
      ctx.fill();
    }

    // Cubes
    for (const c of state.cubes) {
      const s = c.size;
      const hue = c.hue;
      ctx.save();
      ctx.translate(c.x, c.y);
      ctx.rotate(c.angle);
      // Glow halo
      ctx.shadowColor = `hsl(${hue}, 100%, 65%)`;
      ctx.shadowBlur = 24;
      ctx.fillStyle = `hsl(${hue}, 100%, 55%)`;
      ctx.fillRect(-s/2, -s/2, s, s);
      // White-hot core
      ctx.shadowBlur = 0;
      ctx.fillStyle = `hsla(${hue}, 100%, 88%, 0.65)`;
      ctx.fillRect(-s/3, -s/3, s*2/3, s*2/3);
      // Speed streak — small line behind the cube based on velocity
      const speed = Math.sqrt(c.vx*c.vx + c.vy*c.vy);
      if (speed > 80) {
        const len = Math.min(s * 1.6, speed * 0.02);
        ctx.strokeStyle = `hsla(${hue}, 100%, 75%, 0.5)`;
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        // streak is anti-rotation of velocity, but we're already rotated by c.angle...
        // simplest: world-space streak — break out of rotation
      }
      ctx.restore();
    }

    // World-space velocity streaks (head/tail line)
    ctx.globalCompositeOperation = 'lighter';
    for (const c of state.cubes) {
      const sp = Math.sqrt(c.vx*c.vx + c.vy*c.vy);
      if (sp < 90) continue;
      const len = Math.min(c.size * 2, sp * 0.012);
      const ux = -c.vx / sp, uy = -c.vy / sp;
      ctx.strokeStyle = `hsla(${c.hue}, 100%, 72%, 0.42)`;
      ctx.lineWidth = c.size * 0.45;
      ctx.lineCap = 'round';
      ctx.shadowColor = `hsl(${c.hue}, 100%, 65%)`;
      ctx.shadowBlur = 12;
      ctx.beginPath();
      ctx.moveTo(c.x, c.y);
      ctx.lineTo(c.x + ux * len, c.y + uy * len);
      ctx.stroke();
    }
    ctx.shadowBlur = 0;
    ctx.globalCompositeOperation = 'source-over';

    ctx.restore();
  }

  // ---- Input ----
  let drag = null;
  function pointerPos(e) {
    const r = canvas.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }
  canvas.addEventListener('pointerdown', (e) => {
    ensureAudio();
    canvas.setPointerCapture(e.pointerId);
    const p = pointerPos(e);
    drag = { startX: p.x, startY: p.y, startT: performance.now(), x: p.x, y: p.y };
  });
  canvas.addEventListener('pointermove', (e) => {
    if (!drag) return;
    const p = pointerPos(e);
    drag.x = p.x; drag.y = p.y;
  });
  canvas.addEventListener('pointerup', (e) => {
    if (!drag) return;
    const p = pointerPos(e);
    const dt = (performance.now() - drag.startT) / 1000;
    const dx = p.x - drag.startX;
    const dy = p.y - drag.startY;
    let vx = 0, vy = 0;
    if (dt > 0.04 && (Math.abs(dx) > 12 || Math.abs(dy) > 12)) {
      vx = dx / Math.max(0.06, dt) * 0.65;
      vy = dy / Math.max(0.06, dt) * 0.65;
    } else {
      // tap: small random spawn
      const a = Math.random() * Math.PI * 2;
      vx = Math.cos(a) * 220;
      vy = Math.sin(a) * 220;
    }
    spawnCube(drag.startX, drag.startY, vx, vy);
    drag = null;
  });
  canvas.addEventListener('pointercancel', () => { drag = null; });

  // ---- Slider handlers ----
  function updateLabels() {
    els.gVal.textContent = state.gravity.toFixed(2) + 'g';
    els.tVal.textContent = state.trailAlpha.toFixed(2);
    els.bVal.textContent = state.bounce.toFixed(2);
    els.sVal.textContent = state.speed.toFixed(2) + '×';
  }
  els.gravity.addEventListener('input', () => { state.gravity = +els.gravity.value; updateLabels(); });
  els.trails.addEventListener('input', () => { state.trailAlpha = +els.trails.value; updateLabels(); });
  els.bounce.addEventListener('input', () => { state.bounce = +els.bounce.value; updateLabels(); });
  els.speed.addEventListener('input', () => { state.speed = +els.speed.value; updateLabels(); });
  els.soundToggle.addEventListener('change', () => {
    state.sound = els.soundToggle.checked;
    if (state.sound) ensureAudio();
  });
  els.burstBtn.addEventListener('click', () => { ensureAudio(); burstAt(state.W/2, state.H/2, 12); });
  els.autoBtn.addEventListener('click', () => {
    state.auto = !state.auto;
    els.autoBtn.textContent = state.auto ? '⏸ Auto' : '⏵ Auto';
    if (state.auto) ensureAudio();
  });
  els.detonateBtn.addEventListener('click', () => { ensureAudio(); detonateAll(); });
  els.clearBtn.addEventListener('click', clearAll);

  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT') return;
    if (e.key === ' ') { e.preventDefault(); ensureAudio(); burstAt(state.W/2, state.H/2, 12); }
    else if (e.key === 'a' || e.key === 'A') els.autoBtn.click();
    else if (e.key === 'd' || e.key === 'D') els.detonateBtn.click();
    else if (e.key === 'c' || e.key === 'C') els.clearBtn.click();
  });

  // ---- Main loop ----
  let lastNow = performance.now();
  function loop(now) {
    let dt = (now - lastNow) / 1000;
    lastNow = now;
    if (dt > 1/12) dt = 1/12; // clamp on lag
    update(dt);
    draw();
    els.cubeCount.textContent = state.cubes.length;
    // FPS
    state.fpsAcc += dt;
    state.fpsFrames += 1;
    if (state.fpsAcc >= 0.5) {
      state.fps = Math.round(state.fpsFrames / state.fpsAcc);
      els.fps.textContent = state.fps;
      state.fpsAcc = 0;
      state.fpsFrames = 0;
    }
    requestAnimationFrame(loop);
  }

  // Boot — seed a couple cubes so the canvas isn't empty
  resize();
  updateLabels();
  setTimeout(() => {
    spawnCube(state.W * 0.3, state.H * 0.3, 220, 0);
    spawnCube(state.W * 0.7, state.H * 0.3, -220, 0);
  }, 200);
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
