<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>F</title>
<link rel="icon" href="https://emojicdn.elk.sh/🇫">
<meta property="og:title" content="F">
<meta property="og:description" content="F">
<meta property="og:url" content="https://sloppy.live/f">
<meta property="og:image" content="https://sloppy.live/f/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,200&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#111;min-height:100vh;display:flex;align-items:center;justify-content:center;
  flex-direction:column;overflow:hidden}
.letter{font-family:'Newsreader',serif;font-weight:200;font-size:min(80vw,85vh);
  color:#e8e4de;line-height:1;user-select:text;cursor:default;
  text-shadow:0 0 80px rgba(232,228,222,.04)}
.copied{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Newsreader',serif;font-size:14px;color:#2a2a2a;
  opacity:0;transition:opacity .4s;pointer-events:none;letter-spacing:1px}
</style>
</head>
<body>
<div class="letter">F</div>
<div class="copied" id="copied">10,000 F's copied to clipboard</div>
<script>
document.addEventListener('copy', e => {
  e.preventDefault();
  e.clipboardData.setData('text/plain', 'F'.repeat(10000));
  const msg = document.getElementById('copied');
  msg.style.opacity = '1';
  setTimeout(() => msg.style.opacity = '0', 1500);
});
</script>
</body>
</html>
