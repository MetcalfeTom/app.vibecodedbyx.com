<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Grinder</title>
<link rel="icon" href="https://emojicdn.elk.sh/⚙️">
<meta name="description" content="Industrial 16-step drum machine with metallic WebAudio synthesis.">
<meta property="og:title" content="The Grinder">
<meta property="og:description" content="Industrial drum machine. Forge metallic beats from raw oscillators.">
<meta property="og:url" content="https://sloppy.live/the-grinder">
<meta property="og:image" content="https://sloppy.live/the-grinder/og-image.png">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bungee+Inline&family=Bungee&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --rust: #c14a1c;
  --rust-deep: #7a2a0c;
  --rust-light: #e87141;
  --steel: #4a4a4a;
  --steel-light: #6b6b6b;
  --steel-dark: #2a2a2a;
  --black: #0d0d0d;
  --bone: #d8c8a8;
  --hot: #ffb347;
  --ink: #1a1612;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body {
  background: var(--ink);
  color: var(--bone);
  font-family: 'Share Tech Mono', monospace;
  min-height: 100vh;
  overflow-x: hidden;
}
body {
  background:
    radial-gradient(ellipse at top, #2a1810 0%, #0d0908 60%) fixed,
    repeating-linear-gradient(0deg, transparent 0 3px, rgba(0,0,0,0.18) 3px 4px),
    repeating-linear-gradient(90deg, transparent 0 80px, rgba(193,74,28,0.04) 80px 81px);
  background-blend-mode: normal, multiply, normal;
  padding: 18px 12px 60px;
}
.frame {
  max-width: 1100px;
  margin: 0 auto;
  background:
    linear-gradient(180deg, #2c2622 0%, #1a1512 100%);
  border: 3px solid #000;
  border-radius: 8px;
  box-shadow:
    inset 0 2px 0 rgba(255,255,255,0.07),
    inset 0 -2px 0 rgba(0,0,0,0.6),
    0 0 0 1px #c14a1c33,
    0 30px 60px rgba(0,0,0,0.7);
  padding: 22px 22px 26px;
  position: relative;
}
.frame::before, .frame::after {
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #999 0%, #444 50%, #1a1a1a 100%);
  box-shadow: 0 0 0 1px #000, inset 0 -1px 1px rgba(0,0,0,0.6);
}
.frame::before { top: 8px; left: 8px; }
.frame::after { top: 8px; right: 8px; }
.rivets-bot::before, .rivets-bot::after {
  content: '';
  position: absolute;
  width: 14px; height: 14px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #999 0%, #444 50%, #1a1a1a 100%);
  box-shadow: 0 0 0 1px #000, inset 0 -1px 1px rgba(0,0,0,0.6);
  bottom: 8px;
}
.rivets-bot::before { left: 8px; }
.rivets-bot::after { right: 8px; }
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 12px;
  padding-bottom: 16px;
  border-bottom: 2px dashed #c14a1c44;
  margin-bottom: 16px;
}
h1 {
  font-family: 'Bungee Inline', cursive;
  font-size: clamp(28px, 6vw, 52px);
  color: var(--rust-light);
  letter-spacing: 2px;
  text-shadow:
    0 0 1px #000,
    2px 2px 0 var(--rust-deep),
    4px 4px 0 #000,
    0 0 30px rgba(232,113,65,0.4);
  line-height: 1;
}
.tag {
  font-family: 'Bungee', cursive;
  font-size: 11px;
  color: var(--bone);
  background: var(--rust-deep);
  padding: 6px 10px;
  border: 1px solid #000;
  letter-spacing: 1.5px;
  display: inline-block;
  transform: skewX(-8deg);
  box-shadow: 2px 2px 0 #000;
}
.controls {
  display: flex;
  flex-wrap: wrap;
  gap: 10px 14px;
  align-items: center;
  padding: 12px;
  background: linear-gradient(180deg, #1f1a17 0%, #14110f 100%);
  border: 2px solid #000;
  border-radius: 4px;
  margin-bottom: 14px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.05), inset 0 -1px 0 rgba(0,0,0,0.6);
}
button {
  font-family: 'Bungee', cursive;
  font-size: 12px;
  letter-spacing: 1.5px;
  background: linear-gradient(180deg, #5a3020 0%, #3a1c10 100%);
  color: var(--bone);
  border: 2px solid #000;
  padding: 10px 16px;
  cursor: pointer;
  transition: transform 0.05s, box-shadow 0.05s;
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.15),
    inset 0 -2px 0 rgba(0,0,0,0.5),
    2px 2px 0 #000;
  text-shadow: 1px 1px 0 #000;
}
button:hover { background: linear-gradient(180deg, #6a3825 0%, #4a2415 100%); }
button:active { transform: translate(2px, 2px); box-shadow: inset 0 1px 0 rgba(255,255,255,0.15), inset 0 -1px 0 rgba(0,0,0,0.5), 0 0 0 #000; }
button.play {
  background: linear-gradient(180deg, #d6541e 0%, #8c2c0a 100%);
  color: #fff;
  font-size: 14px;
  padding: 10px 22px;
}
button.play.on {
  background: linear-gradient(180deg, #ffb347 0%, #c14a1c 100%);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.3),
    inset 0 -2px 0 rgba(0,0,0,0.5),
    2px 2px 0 #000,
    0 0 22px #ffb34788;
  animation: pulse 0.6s infinite alternate;
}
@keyframes pulse { from { filter: brightness(1); } to { filter: brightness(1.2); } }
.slider-group {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 130px;
}
.slider-group label {
  font-size: 10px;
  letter-spacing: 1px;
  color: var(--rust-light);
  text-transform: uppercase;
  font-family: 'Bungee', cursive;
}
.val { color: var(--bone); margin-left: 6px; }
input[type=range] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  height: 6px;
  background: linear-gradient(90deg, var(--rust) 0%, var(--rust-deep) 100%);
  border: 1px solid #000;
  outline: none;
  border-radius: 0;
}
input[type=range]::-webkit-slider-thumb {
  -webkit-appearance: none;
  appearance: none;
  width: 18px;
  height: 22px;
  background: linear-gradient(180deg, #888 0%, #333 100%);
  border: 1px solid #000;
  cursor: pointer;
  box-shadow: 0 0 0 1px #c14a1c, inset 0 1px 0 rgba(255,255,255,0.4);
}
input[type=range]::-moz-range-thumb {
  width: 18px;
  height: 22px;
  background: linear-gradient(180deg, #888 0%, #333 100%);
  border: 1px solid #000;
  cursor: pointer;
}

.grid-wrap {
  overflow-x: auto;
  border: 2px solid #000;
  background: #0a0807;
  padding: 10px;
  box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
}
.grid {
  display: grid;
  grid-template-columns: 110px repeat(16, 1fr);
  gap: 4px;
  min-width: 760px;
}
.head-cell {
  font-family: 'Bungee', cursive;
  font-size: 10px;
  text-align: center;
  color: var(--steel-light);
  padding: 4px 0;
  letter-spacing: 1px;
}
.head-cell.beat { color: var(--rust-light); }
.head-cell.cur { color: var(--hot); text-shadow: 0 0 8px var(--hot); }

.track-name {
  font-family: 'Bungee', cursive;
  font-size: 11px;
  color: var(--bone);
  background: linear-gradient(180deg, #3a2418 0%, #1f130c 100%);
  border: 1px solid #000;
  padding: 0 8px;
  display: flex;
  align-items: center;
  gap: 6px;
  letter-spacing: 1px;
  text-shadow: 1px 1px 0 #000;
  position: relative;
  overflow: hidden;
}
.track-name::before {
  content: '';
  position: absolute;
  left: 2px; top: 50%;
  width: 4px; height: 4px;
  border-radius: 50%;
  background: var(--rust-light);
  box-shadow: 0 0 6px var(--rust-light);
  transform: translateY(-50%);
}
.track-name span.tn { padding-left: 10px; flex: 1; }
.track-name button.solo {
  background: #1a1a1a;
  border: 1px solid #444;
  color: #888;
  font-size: 9px;
  padding: 2px 5px;
  box-shadow: none;
  text-shadow: none;
  font-family: 'Bungee', cursive;
}
.cell {
  aspect-ratio: 1;
  min-height: 32px;
  background: linear-gradient(180deg, #2a2420 0%, #15110e 100%);
  border: 1px solid #000;
  cursor: pointer;
  position: relative;
  transition: background 0.08s, box-shadow 0.08s;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.05);
}
.cell:hover { background: linear-gradient(180deg, #3a3028 0%, #20180f 100%); }
.cell.beat { background: linear-gradient(180deg, #2e2620 0%, #1a140e 100%); }
.cell.beat::after {
  content: '';
  position: absolute; inset: 0;
  border-left: 1px dashed #c14a1c33;
}
.cell.on {
  background: linear-gradient(180deg, var(--rust-light) 0%, var(--rust-deep) 100%);
  box-shadow:
    inset 0 1px 0 rgba(255,255,255,0.4),
    inset 0 -1px 0 rgba(0,0,0,0.5),
    0 0 8px rgba(232,113,65,0.5);
}
.cell.on::before {
  content: '';
  position: absolute;
  inset: 4px;
  background: radial-gradient(circle at 35% 30%, rgba(255,255,255,0.6) 0%, transparent 60%);
  pointer-events: none;
}
.cell.cur {
  outline: 2px solid var(--hot);
  outline-offset: -2px;
  box-shadow: 0 0 14px var(--hot), inset 0 0 10px rgba(255,179,71,0.3);
}
.cell.on.cur {
  background: linear-gradient(180deg, #fff5d0 0%, #ffb347 100%);
}

footer {
  margin-top: 20px;
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
  align-items: center;
  font-size: 11px;
  color: var(--steel-light);
}
footer a {
  color: var(--rust-light);
  text-decoration: none;
  border-bottom: 1px dashed var(--rust);
}
footer a:hover { color: var(--hot); }

.stamp {
  font-family: 'Bungee', cursive;
  color: var(--rust-deep);
  border: 2px solid var(--rust-deep);
  padding: 4px 8px;
  font-size: 10px;
  transform: rotate(-3deg);
  letter-spacing: 1px;
  opacity: 0.8;
}

@media (max-width: 640px) {
  .frame { padding: 16px 12px 20px; }
  h1 { font-size: 32px; }
  .grid { grid-template-columns: 86px repeat(16, minmax(28px, 1fr)); }
  .track-name { font-size: 9px; padding: 0 4px; }
  .track-name span.tn { padding-left: 8px; }
  .head-cell { font-size: 9px; }
  button { padding: 8px 12px; font-size: 11px; }
  .slider-group { min-width: 110px; }
}
</style>
</head>
<body>
<div class="frame rivets-bot">
  <header>
    <div>
      <h1>THE GRINDER</h1>
      <div class="tag">// HEAVY DUTY DRUM FORGE</div>
    </div>
    <div class="stamp">MODEL G-16 // SECTOR 7</div>
  </header>

  <div class="controls">
    <button id="playBtn" class="play">▶ START</button>
    <button id="clearBtn">CLEAR</button>
    <button id="randBtn">RANDOMIZE</button>
    <div class="slider-group">
      <label>BPM <span class="val" id="bpmVal">120</span></label>
      <input type="range" id="bpm" min="60" max="200" value="120">
    </div>
    <div class="slider-group">
      <label>MASTER <span class="val" id="volVal">70</span></label>
      <input type="range" id="vol" min="0" max="100" value="70">
    </div>
    <div class="slider-group">
      <label>SWING <span class="val" id="swingVal">0</span></label>
      <input type="range" id="swing" min="0" max="50" value="0">
    </div>
  </div>

  <div class="grid-wrap">
    <div class="grid" id="grid"></div>
  </div>

  <footer>
    <div>FORGED IN THE FOUNDRY :: TAP CELLS // FEEL THE GRIND</div>
    <div>← <a href="https://sloppy.live">sloppy.live</a></div>
  </footer>
</div>

<script>
(function(){
  const TRACKS = [
    { name: 'KICK',   synth: 'kick' },
    { name: 'SNARE',  synth: 'snare' },
    { name: 'HAT-CL', synth: 'hatC' },
    { name: 'HAT-OP', synth: 'hatO' },
    { name: 'ANVIL',  synth: 'anvil' },
    { name: 'CLANG',  synth: 'clang' },
    { name: 'GRIND',  synth: 'grind' },
    { name: 'STEAM',  synth: 'steam' }
  ];
  const STEPS = 16;
  const grid = document.getElementById('grid');
  const playBtn = document.getElementById('playBtn');
  const clearBtn = document.getElementById('clearBtn');
  const randBtn = document.getElementById('randBtn');
  const bpmIn = document.getElementById('bpm');
  const bpmVal = document.getElementById('bpmVal');
  const volIn = document.getElementById('vol');
  const volVal = document.getElementById('volVal');
  const swingIn = document.getElementById('swing');
  const swingVal = document.getElementById('swingVal');

  // pattern[track][step] = bool
  const pattern = TRACKS.map(()=> new Array(STEPS).fill(false));
  let bpm = 120;
  let swing = 0;
  let masterVolume = 0.7;
  let isPlaying = false;
  let currentStep = 0;

  // ---- BUILD GRID ----
  function buildGrid(){
    grid.innerHTML = '';
    // header row: empty + step nums
    const empty = document.createElement('div');
    empty.className = 'head-cell';
    empty.textContent = '';
    grid.appendChild(empty);
    for (let s=0; s<STEPS; s++){
      const h = document.createElement('div');
      h.className = 'head-cell' + ((s%4===0)?' beat':'');
      h.dataset.head = s;
      h.textContent = (s+1);
      grid.appendChild(h);
    }
    // tracks
    TRACKS.forEach((tr, ti) => {
      const tn = document.createElement('div');
      tn.className = 'track-name';
      tn.innerHTML = '<span class="tn">'+tr.name+'</span>';
      grid.appendChild(tn);
      for (let s=0; s<STEPS; s++){
        const c = document.createElement('div');
        c.className = 'cell' + ((s%4===0)?' beat':'');
        c.dataset.t = ti;
        c.dataset.s = s;
        const toggle = (e) => {
          e.preventDefault();
          ensureAudio();
          pattern[ti][s] = !pattern[ti][s];
          c.classList.toggle('on', pattern[ti][s]);
          if (pattern[ti][s]) playSound(tr.synth, audioCtx.currentTime, 1);
        };
        c.addEventListener('click', toggle);
        c.addEventListener('touchstart', toggle, {passive:false});
        grid.appendChild(c);
      }
    });
  }

  function refreshGrid(){
    document.querySelectorAll('.cell').forEach(c => {
      const t = +c.dataset.t, s = +c.dataset.s;
      c.classList.toggle('on', pattern[t][s]);
    });
  }

  // ---- AUDIO ----
  let audioCtx = null;
  let masterGain = null;
  let distortionShaper = null;
  function ensureAudio(){
    if (audioCtx) return;
    const AC = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AC();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = masterVolume;
    // mild compressor for glue
    const comp = audioCtx.createDynamicsCompressor();
    comp.threshold.value = -18;
    comp.knee.value = 8;
    comp.ratio.value = 4;
    comp.attack.value = 0.003;
    comp.release.value = 0.18;
    masterGain.connect(comp);
    comp.connect(audioCtx.destination);
  }

  function makeDistCurve(amount){
    const k = amount;
    const n = 1024;
    const c = new Float32Array(n);
    for (let i=0; i<n; i++){
      const x = i*2/n - 1;
      c[i] = (Math.PI + k) * x / (Math.PI + k * Math.abs(x));
    }
    return c;
  }

  function noiseBuffer(seconds){
    const len = Math.floor(audioCtx.sampleRate * seconds);
    const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i=0; i<len; i++) d[i] = Math.random()*2 - 1;
    return buf;
  }

  function playSound(name, when, vel){
    if (!audioCtx) return;
    const t = when;
    const out = audioCtx.createGain();
    out.gain.value = vel;
    out.connect(masterGain);

    if (name === 'kick'){
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(140, t);
      o.frequency.exponentialRampToValueAtTime(40, t+0.12);
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(1, t+0.005);
      g.gain.exponentialRampToValueAtTime(0.0001, t+0.4);
      o.connect(g); g.connect(out);
      // click
      const click = audioCtx.createOscillator();
      const cg = audioCtx.createGain();
      click.type = 'triangle';
      click.frequency.value = 1200;
      cg.gain.setValueAtTime(0.4, t);
      cg.gain.exponentialRampToValueAtTime(0.0001, t+0.03);
      click.connect(cg); cg.connect(out);
      o.start(t); o.stop(t+0.45);
      click.start(t); click.stop(t+0.05);
    }
    else if (name === 'snare'){
      const buf = noiseBuffer(0.3);
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      const bp = audioCtx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = 1800;
      bp.Q.value = 0.8;
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.9, t+0.005);
      g.gain.exponentialRampToValueAtTime(0.0001, t+0.18);
      src.connect(bp); bp.connect(g); g.connect(out);
      // tonal body
      const o = audioCtx.createOscillator();
      const og = audioCtx.createGain();
      o.type = 'triangle';
      o.frequency.setValueAtTime(220, t);
      o.frequency.exponentialRampToValueAtTime(140, t+0.1);
      og.gain.setValueAtTime(0.0001, t);
      og.gain.exponentialRampToValueAtTime(0.4, t+0.005);
      og.gain.exponentialRampToValueAtTime(0.0001, t+0.12);
      o.connect(og); og.connect(out);
      src.start(t); o.start(t); o.stop(t+0.15);
    }
    else if (name === 'hatC'){
      const buf = noiseBuffer(0.1);
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      const hp = audioCtx.createBiquadFilter();
      hp.type = 'highpass';
      hp.frequency.value = 7000;
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.4, t+0.002);
      g.gain.exponentialRampToValueAtTime(0.0001, t+0.05);
      src.connect(hp); hp.connect(g); g.connect(out);
      src.start(t);
    }
    else if (name === 'hatO'){
      const buf = noiseBuffer(0.4);
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      const hp = audioCtx.createBiquadFilter();
      hp.type = 'highpass';
      hp.frequency.value = 6500;
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.35, t+0.003);
      g.gain.exponentialRampToValueAtTime(0.0001, t+0.32);
      src.connect(hp); hp.connect(g); g.connect(out);
      src.start(t);
    }
    else if (name === 'anvil'){
      // FM synthesis: detuned ratios for metallic ring
      const ratios = [1, 1.732, 2.413, 3.14];
      const base = 380;
      ratios.forEach((r, i) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = i===0 ? 'square' : 'sine';
        o.frequency.value = base * r;
        const peak = 0.25 / (i+1);
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(peak, t+0.002);
        g.gain.exponentialRampToValueAtTime(0.0001, t+0.6);
        o.connect(g); g.connect(out);
        o.start(t); o.stop(t+0.65);
      });
      // bandpass for ring
      // (already going through out -> master)
    }
    else if (name === 'clang'){
      const freqs = [180, 273, 419, 587, 851];
      const bp = audioCtx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.value = 900;
      bp.Q.value = 1.2;
      bp.connect(out);
      freqs.forEach((f, i) => {
        const o = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        o.type = 'square';
        o.frequency.value = f;
        const peak = 0.18 / Math.sqrt(i+1);
        g.gain.setValueAtTime(0.0001, t);
        g.gain.exponentialRampToValueAtTime(peak, t+0.003);
        g.gain.exponentialRampToValueAtTime(0.0001, t+0.5);
        o.connect(g); g.connect(bp);
        o.start(t); o.stop(t+0.55);
      });
    }
    else if (name === 'grind'){
      const o1 = audioCtx.createOscillator();
      const o2 = audioCtx.createOscillator();
      o1.type = 'sawtooth';
      o2.type = 'sawtooth';
      o1.frequency.value = 78;
      o2.frequency.value = 82; // beating
      const shaper = audioCtx.createWaveShaper();
      shaper.curve = makeDistCurve(40);
      shaper.oversample = '4x';
      const lp = audioCtx.createBiquadFilter();
      lp.type = 'lowpass';
      lp.frequency.value = 1500;
      lp.Q.value = 4;
      // Slowly sweep filter for grinding
      lp.frequency.setValueAtTime(2200, t);
      lp.frequency.exponentialRampToValueAtTime(400, t+0.3);
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.5, t+0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t+0.35);
      o1.connect(shaper); o2.connect(shaper);
      shaper.connect(lp); lp.connect(g); g.connect(out);
      o1.start(t); o2.start(t);
      o1.stop(t+0.4); o2.stop(t+0.4);
    }
    else if (name === 'steam'){
      const buf = noiseBuffer(0.8);
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      const bp = audioCtx.createBiquadFilter();
      bp.type = 'bandpass';
      bp.frequency.setValueAtTime(2400, t);
      bp.frequency.linearRampToValueAtTime(3200, t+0.3);
      bp.Q.value = 2;
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.35, t+0.04);
      g.gain.linearRampToValueAtTime(0.18, t+0.4);
      g.gain.exponentialRampToValueAtTime(0.0001, t+0.7);
      src.connect(bp); bp.connect(g); g.connect(out);
      src.start(t);
    }
  }

  // ---- SCHEDULER ----
  const lookahead = 25.0; // ms
  const scheduleAhead = 0.1; // sec
  let nextNoteTime = 0;
  let timerId = null;

  function nextStep(){
    const secondsPerBeat = 60.0 / bpm;
    const stepTime = secondsPerBeat / 4; // 16th
    // swing on odd 16ths
    let delay = stepTime;
    if (currentStep % 2 === 1) delay = stepTime * (1 + swing/100);
    else delay = stepTime * (1 - swing/100);
    nextNoteTime += delay;
    currentStep = (currentStep + 1) % STEPS;
  }

  function scheduleNote(stepIdx, time){
    TRACKS.forEach((tr, ti) => {
      if (pattern[ti][stepIdx]) playSound(tr.synth, time, 1);
    });
    // visual highlight
    const visualTime = (time - audioCtx.currentTime) * 1000;
    setTimeout(() => highlightStep(stepIdx), Math.max(0, visualTime));
  }

  function highlightStep(s){
    document.querySelectorAll('.cell.cur').forEach(c => c.classList.remove('cur'));
    document.querySelectorAll('.head-cell.cur').forEach(c => c.classList.remove('cur'));
    if (!isPlaying) return;
    document.querySelectorAll('.cell[data-s="'+s+'"]').forEach(c => c.classList.add('cur'));
    const h = document.querySelector('.head-cell[data-head="'+s+'"]');
    if (h) h.classList.add('cur');
  }

  function scheduler(){
    while (nextNoteTime < audioCtx.currentTime + scheduleAhead){
      scheduleNote(currentStep, nextNoteTime);
      nextStep();
    }
    timerId = setTimeout(scheduler, lookahead);
  }

  function start(){
    ensureAudio();
    if (audioCtx.state === 'suspended') audioCtx.resume();
    isPlaying = true;
    currentStep = 0;
    nextNoteTime = audioCtx.currentTime + 0.05;
    scheduler();
    playBtn.textContent = '■ STOP';
    playBtn.classList.add('on');
  }
  function stop(){
    isPlaying = false;
    if (timerId) clearTimeout(timerId);
    timerId = null;
    document.querySelectorAll('.cell.cur').forEach(c => c.classList.remove('cur'));
    document.querySelectorAll('.head-cell.cur').forEach(c => c.classList.remove('cur'));
    playBtn.textContent = '▶ START';
    playBtn.classList.remove('on');
  }

  playBtn.addEventListener('click', () => {
    if (isPlaying) stop(); else start();
  });
  clearBtn.addEventListener('click', () => {
    pattern.forEach(row => row.fill(false));
    refreshGrid();
  });
  randBtn.addEventListener('click', () => {
    // densities per track for industrial groove
    const density = [0.35, 0.18, 0.55, 0.12, 0.15, 0.1, 0.18, 0.1];
    pattern.forEach((row, ti) => {
      for (let s=0; s<STEPS; s++){
        // Bias kick to downbeats
        if (ti === 0){
          row[s] = (s % 4 === 0) ? Math.random() < 0.85 : Math.random() < 0.1;
        } else if (ti === 1){
          row[s] = (s === 4 || s === 12) ? true : Math.random() < 0.06;
        } else {
          row[s] = Math.random() < density[ti];
        }
      }
    });
    refreshGrid();
  });
  bpmIn.addEventListener('input', e => {
    bpm = +e.target.value;
    bpmVal.textContent = bpm;
  });
  volIn.addEventListener('input', e => {
    masterVolume = (+e.target.value) / 100;
    volVal.textContent = e.target.value;
    if (masterGain) masterGain.gain.value = masterVolume;
  });
  swingIn.addEventListener('input', e => {
    swing = +e.target.value;
    swingVal.textContent = swing;
  });

  buildGrid();
  // Start with a default groove
  pattern[0][0] = pattern[0][4] = pattern[0][8] = pattern[0][12] = true;
  pattern[1][4] = pattern[1][12] = true;
  pattern[2][0] = pattern[2][2] = pattern[2][4] = pattern[2][6] = pattern[2][8] = pattern[2][10] = pattern[2][12] = pattern[2][14] = true;
  pattern[4][6] = pattern[4][14] = true;
  pattern[6][10] = true;
  refreshGrid();
})();
</script>
</body>
</html>
