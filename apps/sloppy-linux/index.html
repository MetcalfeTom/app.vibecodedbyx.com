<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SloppyOS Installer</title>
<link rel="icon" href="https://emojicdn.elk.sh/🐧">
<meta property="og:title" content="SloppyOS Installer">
<meta property="og:description" content="Install SloppyOS — the world's most questionable Linux distribution.">
<meta property="og:url" content="https://app.sloppy.live/sloppy-linux/">
<meta property="og:image" content="https://app.sloppy.live/sloppy-linux/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0c0c14;--surface:#12121e;--border:#1e1e32;--accent:#6c5ce7;--accent2:#00cec9;--text:#ccd6e0;--dim:#5a6070;--success:#00b894;--warn:#fdcb6e;--error:#e17055;--white:#f0f2f5}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden}
#installer{display:flex;flex-direction:column;height:100vh;max-width:960px;width:100%;margin:0 auto;padding:16px;gap:12px}
header{display:flex;align-items:center;gap:12px;padding:8px 0;flex-shrink:0}
header .logo{font-family:'JetBrains Mono',monospace;font-weight:700;font-size:18px;color:var(--accent);letter-spacing:1px}
header .logo span{color:var(--accent2)}
header .ver{font-size:11px;color:var(--dim);font-family:'JetBrains Mono',monospace}
.steps-bar{display:flex;gap:2px;flex-shrink:0}
.step-pill{flex:1;height:32px;background:var(--surface);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;color:var(--dim);transition:all .3s;position:relative;overflow:hidden}
.step-pill:first-child{border-radius:6px 0 0 6px}
.step-pill:last-child{border-radius:0 6px 6px 0}
.step-pill.active{background:var(--accent);border-color:var(--accent);color:#fff}
.step-pill.done{background:rgba(0,190,148,.15);border-color:var(--success);color:var(--success)}
.step-pill .num{font-family:'JetBrains Mono',monospace;margin-right:6px;font-size:10px;opacity:.7}
.main-area{flex:1;display:flex;gap:12px;min-height:0;overflow:hidden}
.content-panel{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;overflow-y:auto;display:flex;flex-direction:column}
.content-panel h2{font-size:16px;font-weight:600;margin-bottom:4px;color:var(--white)}
.content-panel .sub{font-size:12px;color:var(--dim);margin-bottom:16px}
.terminal{flex:1;background:#08080f;border:1px solid var(--border);border-radius:8px;font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.6;padding:12px;overflow-y:auto;color:#7a8a7a;min-width:0;max-width:340px;position:relative}
.terminal .t-line{white-space:pre-wrap;word-break:break-all}
.terminal .t-line.ok{color:var(--success)}
.terminal .t-line.warn{color:var(--warn)}
.terminal .t-line.err{color:var(--error)}
.terminal .t-line.info{color:var(--accent2)}
.terminal .t-line.cmd{color:var(--accent)}
.terminal .cursor{display:inline-block;width:7px;height:13px;background:var(--accent2);animation:blink 1s step-end infinite;vertical-align:middle}
@keyframes blink{50%{opacity:0}}
.term-header{font-size:10px;color:var(--dim);border-bottom:1px solid var(--border);padding-bottom:6px;margin-bottom:8px;display:flex;justify-content:space-between}
.btn{padding:10px 20px;background:var(--accent);border:none;color:#fff;font-family:'IBM Plex Sans',sans-serif;font-size:13px;font-weight:500;border-radius:6px;cursor:pointer;transition:all .2s}
.btn:hover{filter:brightness(1.15)}
.btn:disabled{opacity:.3;cursor:default;filter:none}
.btn.outline{background:transparent;border:1px solid var(--border);color:var(--dim)}
.btn.outline:hover{border-color:var(--accent);color:var(--accent)}
.btn.success{background:var(--success)}
.btn-row{display:flex;gap:8px;margin-top:auto;padding-top:16px;justify-content:flex-end}
/* Disk partitioning */
.disk-bar{height:40px;background:#1a1a2e;border-radius:6px;display:flex;overflow:hidden;margin:8px 0;border:1px solid var(--border)}
.disk-seg{display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;transition:all .3s;min-width:20px}
.part-table{width:100%;border-collapse:collapse;font-size:12px;margin:8px 0}
.part-table th{text-align:left;color:var(--dim);font-weight:500;padding:6px 8px;border-bottom:1px solid var(--border);font-size:10px;text-transform:uppercase;letter-spacing:1px}
.part-table td{padding:6px 8px;border-bottom:1px solid rgba(30,30,50,.5)}
.part-table .label{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:6px;vertical-align:middle}
select,input[type=text],input[type=password]{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:4px;font-family:'IBM Plex Sans',sans-serif;font-size:13px;width:100%}
select:focus,input:focus{outline:none;border-color:var(--accent)}
.form-group{margin-bottom:12px}
.form-group label{display:block;font-size:11px;font-weight:500;color:var(--dim);margin-bottom:4px;text-transform:uppercase;letter-spacing:.5px}
.radio-row{display:flex;gap:8px;flex-wrap:wrap}
.radio-card{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:10px 14px;cursor:pointer;transition:all .2s;flex:1;min-width:120px;text-align:center}
.radio-card:hover{border-color:var(--accent)}
.radio-card.selected{border-color:var(--accent);background:rgba(108,92,231,.1)}
.radio-card .rc-title{font-size:13px;font-weight:500;color:var(--white)}
.radio-card .rc-sub{font-size:10px;color:var(--dim);margin-top:2px}
.progress-wrap{margin:12px 0}
.progress-bar{height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .3s;width:0}
.progress-label{display:flex;justify-content:space-between;font-size:11px;color:var(--dim);margin-top:4px}
.pkg-item{display:flex;justify-content:space-between;padding:3px 0;font-size:12px}
.pkg-item .name{color:var(--text)}
.pkg-item .size{color:var(--dim);font-family:'JetBrains Mono',monospace;font-size:11px}
.check-item{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:12px}
.check-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.check-item .dot.ok{background:var(--success)}
.check-item .dot.pending{background:var(--dim)}
.check-item .dot.running{background:var(--warn);animation:pulse .8s infinite}
@keyframes pulse{50%{opacity:.4}}
.slider-wrap{display:flex;align-items:center;gap:10px}
.slider-wrap input[type=range]{flex:1;accent-color:var(--accent)}
.slider-val{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--accent2);min-width:50px}
.back-link{position:fixed;bottom:6px;right:8px;font-size:10px;color:#222;text-decoration:none;z-index:10}
.back-link:hover{color:#444}
@media(max-width:700px){
  .main-area{flex-direction:column}
  .terminal{max-width:none;max-height:200px}
  .step-pill .s-label{display:none}
  #installer{padding:8px}
}
</style>
</head>
<body>
<div id="installer">
  <header>
    <div class="logo">sloppy<span>OS</span></div>
    <div class="ver">v4.20.69 "Chaotic Capybara"</div>
  </header>
  <div class="steps-bar" id="steps-bar"></div>
  <div class="main-area">
    <div class="content-panel" id="content"></div>
    <div class="terminal" id="terminal">
      <div class="term-header"><span>installer.log</span><span id="term-time"></span></div>
      <div id="term-lines"></div>
    </div>
  </div>
</div>
<a href="https://sloppy.live" class="back-link" target="_blank">sloppy.live</a>

<script>
const STEPS=['Welcome','Disk Setup','Packages','User Setup','Install','Done'];
let currentStep=0;
const termLines=document.getElementById('term-lines');
const content=document.getElementById('content');
const stepsBar=document.getElementById('steps-bar');
let termCount=0;

// State
let diskScheme='auto';
let rootSize=60;
let desktopEnv='sloppy-wm';
let extraPkgs={browsers:true,dev:false,media:true,gaming:false};
let username='';
let hostname='sloppy-box';
let passwd='';

function renderSteps(){
  stepsBar.innerHTML='';
  STEPS.forEach((s,i)=>{
    let pill=document.createElement('div');
    pill.className='step-pill'+(i===currentStep?' active':'')+(i<currentStep?' done':'');
    pill.innerHTML='<span class="num">'+(i+1)+'</span><span class="s-label">'+s+'</span>';
    stepsBar.appendChild(pill);
  });
}

function log(text,cls){
  let line=document.createElement('div');
  line.className='t-line'+(cls?' '+cls:'');
  line.textContent=text;
  termLines.appendChild(line);
  termLines.scrollTop=termLines.scrollHeight;
  termCount++;
}

function logCmd(cmd){log('$ '+cmd,'cmd')}
function logOk(t){log('  '+t,'ok')}
function logWarn(t){log('  '+t,'warn')}
function logErr(t){log('  '+t,'err')}
function logInfo(t){log('  '+t,'info')}

function updateTime(){
  document.getElementById('term-time').textContent=new Date().toLocaleTimeString();
}
setInterval(updateTime,1000);updateTime();

// --- STEP RENDERERS ---
function renderWelcome(){
  content.innerHTML=`
    <h2>Welcome to SloppyOS</h2>
    <div class="sub">The world's most vibes-based Linux distribution</div>
    <div style="margin:12px 0;padding:16px;background:var(--bg);border-radius:6px;border:1px solid var(--border)">
      <div style="font-size:20px;margin-bottom:8px">🐧</div>
      <div style="font-size:13px;line-height:1.7;color:var(--dim)">
        <b style="color:var(--white)">SloppyOS 4.20 "Chaotic Capybara"</b><br>
        Built for vibes, powered by chaos.<br><br>
        Kernel: 6.9.420-sloppy<br>
        Init: systemd-but-worse<br>
        Package Manager: spkg (sloppy-pkg)<br>
        Display Server: Wayland (sometimes X11, we're not sure)
      </div>
    </div>
    <div style="font-size:12px;color:var(--dim);margin:8px 0">
      This installer will guide you through setting up SloppyOS on your system.
      No actual disks will be harmed in the making of this installation.
    </div>
    <div class="btn-row">
      <button class="btn" onclick="nextStep()">Begin Installation</button>
    </div>`;
  logCmd('sloppyos-installer --start');
  logOk('SloppyOS Installer v4.20.69');
  logInfo('Codename: Chaotic Capybara');
  log('  Detecting hardware...','');
  setTimeout(()=>{logOk('CPU: Whatever You\'ve Got x86_64');logOk('RAM: Probably Enough MB');logOk('GPU: It Displays Things');logOk('Disk: /dev/sda - 512GB SSD');logOk('Hardware check passed');},400);
}

function renderDiskSetup(){
  content.innerHTML=`
    <h2>Disk Partitioning</h2>
    <div class="sub">Configure how SloppyOS uses your disk space</div>
    <div class="form-group">
      <label>Detected Disks</label>
      <div style="background:var(--bg);padding:10px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:12px;border:1px solid var(--border)">
        <div>/dev/sda — 512 GB SSD (Samsung EVO 870)</div>
        <div style="color:var(--dim);font-size:11px">/dev/sdb — 2 TB HDD (Seagate Barracuda) [unmounted]</div>
      </div>
    </div>
    <div class="form-group">
      <label>Partition Scheme</label>
      <div class="radio-row">
        <div class="radio-card ${diskScheme==='auto'?'selected':''}" onclick="setDisk('auto')">
          <div class="rc-title">Automatic</div>
          <div class="rc-sub">Guided partitioning</div>
        </div>
        <div class="radio-card ${diskScheme==='manual'?'selected':''}" onclick="setDisk('manual')">
          <div class="rc-title">Manual</div>
          <div class="rc-sub">Custom layout</div>
        </div>
        <div class="radio-card ${diskScheme==='encrypt'?'selected':''}" onclick="setDisk('encrypt')">
          <div class="rc-title">Encrypted</div>
          <div class="rc-sub">LUKS + LVM</div>
        </div>
      </div>
    </div>
    <div class="form-group">
      <label>Root Partition Size</label>
      <div class="slider-wrap">
        <input type="range" min="30" max="100" value="${rootSize}" oninput="updateRootSize(this.value)">
        <span class="slider-val" id="root-val">${rootSize}%</span>
      </div>
    </div>
    <div class="disk-bar" id="disk-bar"></div>
    <table class="part-table">
      <tr><th>Partition</th><th>Mount</th><th>Size</th><th>Type</th></tr>
      <tr><td><span class="label" style="background:var(--accent)"></span>EFI</td><td>/boot/efi</td><td>512 MB</td><td>FAT32</td></tr>
      <tr><td><span class="label" style="background:var(--accent2)"></span>Root</td><td>/</td><td id="root-size-td">${Math.round(512*rootSize/100)} GB</td><td>ext4${diskScheme==='encrypt'?' (LUKS)':''}</td></tr>
      <tr><td><span class="label" style="background:var(--warn)"></span>Home</td><td>/home</td><td id="home-size-td">${Math.round(512*(100-rootSize)/100)-8} GB</td><td>ext4${diskScheme==='encrypt'?' (LUKS)':''}</td></tr>
      <tr><td><span class="label" style="background:var(--error)"></span>Swap</td><td>[SWAP]</td><td>8 GB</td><td>linux-swap</td></tr>
    </table>
    <div class="btn-row">
      <button class="btn outline" onclick="prevStep()">Back</button>
      <button class="btn" onclick="nextStep()">Continue</button>
    </div>`;
  updateDiskBar();
  logCmd('fdisk -l /dev/sda');
  logOk('Disk /dev/sda: 512 GB');
  log('  Sector size: 512 bytes','');
  log('  Disklabel type: gpt','');
  logInfo('Partition scheme: '+diskScheme);
}

function setDisk(s){diskScheme=s;renderDiskSetup();}
function updateRootSize(v){
  rootSize=parseInt(v);
  document.getElementById('root-val').textContent=v+'%';
  document.getElementById('root-size-td').textContent=Math.round(512*rootSize/100)+' GB';
  document.getElementById('home-size-td').textContent=(Math.round(512*(100-rootSize)/100)-8)+' GB';
  updateDiskBar();
}
function updateDiskBar(){
  let bar=document.getElementById('disk-bar');
  if(!bar)return;
  let efi=1,swap=2,root=rootSize*.97,home=(100-rootSize)*.97-2;
  bar.innerHTML=`
    <div class="disk-seg" style="width:${efi}%;background:var(--accent)"></div>
    <div class="disk-seg" style="width:${root}%;background:var(--accent2)">/ (${Math.round(512*rootSize/100)}G)</div>
    <div class="disk-seg" style="width:${home}%;background:var(--warn)">/home</div>
    <div class="disk-seg" style="width:${swap}%;background:var(--error)">sw</div>`;
}

function renderPackages(){
  content.innerHTML=`
    <h2>Package Selection</h2>
    <div class="sub">Choose your desktop environment and additional packages</div>
    <div class="form-group">
      <label>Desktop Environment</label>
      <div class="radio-row">
        ${['sloppy-wm','gnome','kde','none'].map(de=>`
          <div class="radio-card ${desktopEnv===de?'selected':''}" onclick="setDE('${de}')">
            <div class="rc-title">${de==='sloppy-wm'?'SloppyWM':de==='gnome'?'GNOME':de==='kde'?'KDE Plasma':'TTY Only'}</div>
            <div class="rc-sub">${de==='sloppy-wm'?'Tiling + vibes':de==='gnome'?'Classic desktop':de==='kde'?'Customizable':'No GUI'}</div>
          </div>`).join('')}
      </div>
    </div>
    <div class="form-group">
      <label>Package Groups</label>
      ${Object.entries({browsers:'Web Browsers (Firefox, Chromium)',dev:'Development Tools (gcc, python, node, git)',media:'Media & Codecs (vlc, ffmpeg, imagemagick)',gaming:'Gaming (Steam, Lutris, wine)'}).map(([k,v])=>`
        <div style="display:flex;align-items:center;gap:8px;padding:6px 0;cursor:pointer" onclick="togglePkg('${k}')">
          <div style="width:16px;height:16px;border-radius:3px;border:1px solid var(--border);background:${extraPkgs[k]?'var(--accent)':'transparent'};display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;flex-shrink:0">${extraPkgs[k]?'✓':''}</div>
          <span style="font-size:13px">${v}</span>
        </div>`).join('')}
    </div>
    <div style="background:var(--bg);padding:10px;border-radius:4px;border:1px solid var(--border)">
      <div style="font-size:11px;color:var(--dim);margin-bottom:6px">ESTIMATED INSTALL SIZE</div>
      <div style="font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--accent2)" id="pkg-size">${calcPkgSize()}</div>
    </div>
    <div class="btn-row">
      <button class="btn outline" onclick="prevStep()">Back</button>
      <button class="btn" onclick="nextStep()">Continue</button>
    </div>`;
  logCmd('spkg query --available');
  logOk('Package database synced (14,289 packages)');
  logInfo('Desktop: '+desktopEnv);
}

function setDE(de){desktopEnv=de;renderPackages();}
function togglePkg(k){extraPkgs[k]=!extraPkgs[k];renderPackages();}
function calcPkgSize(){
  let base=2.8;
  if(desktopEnv==='sloppy-wm')base+=1.2;
  if(desktopEnv==='gnome')base+=2.4;
  if(desktopEnv==='kde')base+=2.8;
  if(extraPkgs.browsers)base+=0.6;
  if(extraPkgs.dev)base+=1.8;
  if(extraPkgs.media)base+=0.4;
  if(extraPkgs.gaming)base+=3.2;
  return base.toFixed(1)+' GB';
}

function renderUserSetup(){
  content.innerHTML=`
    <h2>User Configuration</h2>
    <div class="sub">Set up your account and hostname</div>
    <div class="form-group">
      <label>Hostname</label>
      <input type="text" value="${hostname}" placeholder="my-pc" oninput="hostname=this.value">
    </div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" value="${username}" placeholder="sloppy" oninput="username=this.value" id="user-input">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" value="${passwd}" placeholder="hunter2" oninput="passwd=this.value">
    </div>
    <div class="form-group">
      <label>Timezone</label>
      <select>
        <option>UTC</option>
        <option>America/New_York</option>
        <option>America/Los_Angeles</option>
        <option>Europe/London</option>
        <option>Europe/Berlin</option>
        <option>Asia/Tokyo</option>
        <option selected>Auto-detect (vibes-based)</option>
      </select>
    </div>
    <div class="form-group">
      <label>Locale</label>
      <select>
        <option selected>en_US.UTF-8</option>
        <option>en_GB.UTF-8</option>
        <option>de_DE.UTF-8</option>
        <option>ja_JP.UTF-8</option>
        <option>C.UTF-8 (hacker mode)</option>
      </select>
    </div>
    <div class="btn-row">
      <button class="btn outline" onclick="prevStep()">Back</button>
      <button class="btn" onclick="validateUser()">Continue</button>
    </div>`;
  logCmd('useradd --create-home');
  log('  Waiting for user configuration...','');
}

function validateUser(){
  if(!username.trim()){
    username='sloppy';
    document.getElementById('user-input').value='sloppy';
    logWarn('No username provided, defaulting to "sloppy"');
  }
  if(!passwd){passwd='hunter2';logWarn('No password set, using "hunter2" (very secure)');}
  nextStep();
}

function renderInstall(){
  content.innerHTML=`
    <h2>Installing SloppyOS</h2>
    <div class="sub">Please wait while we install your system</div>
    <div id="install-checks"></div>
    <div class="progress-wrap">
      <div class="progress-bar"><div class="progress-fill" id="install-progress"></div></div>
      <div class="progress-label"><span id="install-status">Preparing...</span><span id="install-pct">0%</span></div>
    </div>
    <div id="install-pkg-list" style="max-height:180px;overflow-y:auto;margin-top:8px"></div>
    <div class="btn-row">
      <button class="btn" id="install-next-btn" onclick="nextStep()" disabled>Continue</button>
    </div>`;
  runInstall();
}

async function runInstall(){
  const checks=[
    'Formatting partitions','Writing filesystem','Installing base system',
    'Configuring kernel','Installing '+desktopEnv,'Installing packages',
    'Setting up user account','Configuring bootloader','Generating initramfs',
    'Running post-install hooks','Cleaning up'
  ];
  const funnyPkgs=[
    'sloppy-core','libvibes','chaos-engine','not-a-virus','kernel-panic-preventer',
    'sudo-but-nicer','wifi-prayer','bluetooth-maybe','font-comic-sans','desktop-rice-toolkit',
    'procrastination-daemon','coffee-maker-driver','rgb-everything','hackerman-tools',
    'cat-picture-downloader','stackoverflow-offline','npm-node-modules','yolo-compiler',
    'bug-factory','spaghetti-code-formatter','ctrl-z-insurance','git-blame-deflector',
    'dark-mode-enforcer','cookie-clicker-engine','meme-generator-cli','screensaver-3d-pipes',
    'clippy-revival','login-sound-mlg-airhorn','wallpaper-shuffler-pro','systemd-questionmark',
    desktopEnv+'-base',desktopEnv+'-plugins',desktopEnv+'-themes','xorg-maybe','wayland-probably',
    'grub-customizer','plymouth-sloppy-theme','network-manager','pulseaudio-or-pipewire'
  ];

  let checkDiv=document.getElementById('install-checks');
  let progress=document.getElementById('install-progress');
  let status=document.getElementById('install-status');
  let pctEl=document.getElementById('install-pct');
  let pkgList=document.getElementById('install-pkg-list');

  logCmd('spkg install sloppyos-'+desktopEnv+' --yes');
  logInfo('Starting installation...');

  for(let i=0;i<checks.length;i++){
    // Update check marks
    checkDiv.innerHTML=checks.map((c,ci)=>`
      <div class="check-item">
        <div class="dot ${ci<i?'ok':ci===i?'running':'pending'}"></div>
        <span style="color:${ci<i?'var(--success)':ci===i?'var(--white)':'var(--dim)'}">${c}</span>
      </div>`).join('');

    status.textContent=checks[i];
    logInfo(checks[i]+'...');

    // Simulate package installs
    let pkgCount=Math.floor(Math.random()*4)+2;
    for(let j=0;j<pkgCount;j++){
      let pct=Math.round(((i*pkgCount+j)/(checks.length*pkgCount))*100);
      progress.style.width=pct+'%';
      pctEl.textContent=pct+'%';
      let pkg=funnyPkgs[Math.floor(Math.random()*funnyPkgs.length)];
      let size=(Math.random()*12+0.1).toFixed(1);
      pkgList.innerHTML=`<div class="pkg-item"><span class="name">Installing ${pkg}</span><span class="size">${size} MB</span></div>`+pkgList.innerHTML;
      pkgList.scrollTop=0;
      log('  '+pkg+' ('+size+' MB)','');
      await sleep(200+Math.random()*400);
    }
    logOk(checks[i]+' complete');
    await sleep(300);
  }

  progress.style.width='100%';
  pctEl.textContent='100%';
  status.textContent='Installation complete!';
  status.style.color='var(--success)';

  // Final check marks
  checkDiv.innerHTML=checks.map(c=>`
    <div class="check-item">
      <div class="dot ok"></div>
      <span style="color:var(--success)">${c}</span>
    </div>`).join('');

  logOk('Installation complete!');
  logCmd('sync && umount -R /mnt');
  logOk('Filesystems synced');
  document.getElementById('install-next-btn').disabled=false;
}

function renderDone(){
  content.innerHTML=`
    <h2>Installation Complete!</h2>
    <div class="sub">SloppyOS has been successfully installed</div>
    <div style="text-align:center;padding:24px 0">
      <div style="font-size:48px;margin-bottom:12px">🐧</div>
      <div style="font-size:18px;font-weight:600;color:var(--white);margin-bottom:4px">SloppyOS is ready</div>
      <div style="font-size:13px;color:var(--dim)">Your system is configured and ready to boot</div>
    </div>
    <div style="background:var(--bg);padding:14px;border-radius:6px;border:1px solid var(--border);font-family:'JetBrains Mono',monospace;font-size:12px;line-height:1.8">
      <div><span style="color:var(--dim)">User:</span> <span style="color:var(--accent2)">${username||'sloppy'}</span></div>
      <div><span style="color:var(--dim)">Host:</span> <span style="color:var(--accent2)">${hostname}</span></div>
      <div><span style="color:var(--dim)">Desktop:</span> <span style="color:var(--accent2)">${desktopEnv}</span></div>
      <div><span style="color:var(--dim)">Disk:</span> <span style="color:var(--accent2)">/dev/sda (${diskScheme})</span></div>
      <div><span style="color:var(--dim)">Kernel:</span> <span style="color:var(--accent2)">6.9.420-sloppy</span></div>
    </div>
    <div class="btn-row">
      <button class="btn outline" onclick="location.reload()">New Install</button>
      <button class="btn success" onclick="reboot()">Reboot Now</button>
    </div>`;
  logCmd('echo "Installation complete. Welcome to SloppyOS!"');
  logOk('System ready for reboot');
  logInfo('Thank you for choosing SloppyOS');
  log('','');
  log('  "It probably works." — SloppyOS Team','warn');
}

function reboot(){
  content.innerHTML=`
    <div style="display:flex;align-items:center;justify-content:center;height:100%;flex-direction:column">
      <div style="font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--accent2);text-align:center;line-height:2">
        <div>Rebooting...</div>
        <div style="color:var(--dim);font-size:12px;margin-top:12px">
          [  OK  ] Reached target Shutdown.<br>
          [  OK  ] Stopped target Multi-User System.<br>
          [  OK  ] Stopped SloppyOS Vibes Daemon.<br>
          [  OK  ] Unmounted /home.<br>
          [  OK  ] Unmounted /.<br>
          <br>
          <span style="color:var(--success)">GRUB 2.12 — SloppyOS</span><br>
          Loading kernel 6.9.420-sloppy...<br>
          Loading initial ramdisk...<br>
          <br>
          <span style="color:var(--white)">Welcome to SloppyOS 4.20 "Chaotic Capybara"</span><br>
          <span style="color:var(--accent)">${hostname} login: </span><span class="cursor"></span>
        </div>
      </div>
    </div>`;
  logCmd('systemctl reboot');
  log('','');
  log('  System rebooting...','info');
}

function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

const STEP_RENDERERS=[renderWelcome,renderDiskSetup,renderPackages,renderUserSetup,renderInstall,renderDone];

function nextStep(){
  if(currentStep<STEPS.length-1){currentStep++;renderSteps();STEP_RENDERERS[currentStep]();}
}
function prevStep(){
  if(currentStep>0){currentStep--;renderSteps();STEP_RENDERERS[currentStep]();}
}

// Init
renderSteps();
STEP_RENDERERS[0]();

// Make functions global
window.setDisk=setDisk;
window.updateRootSize=updateRootSize;
window.setDE=setDE;
window.togglePkg=togglePkg;
window.validateUser=validateUser;
window.nextStep=nextStep;
window.prevStep=prevStep;
window.reboot=reboot;
</script>
