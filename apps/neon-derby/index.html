<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Neon Derby</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#080318">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%90%8E">
<meta name="description" content="3D neon horse race in third-person chase cam. Bet on your steed, mash Space to gallop, manage stamina to the finish line.">
<meta property="og:title" content="Neon Derby">
<meta property="og:description" content="3D neon horse race in third-person chase cam. Bet on your steed, mash Space to gallop, manage stamina to the finish line.">
<meta property="og:url" content="https://sloppy.live/neon-derby">
<meta property="og:image" content="https://image.pollinations.ai/prompt/3D%20synthwave%20neon%20horse%20galloping%20on%20glowing%20grid%20track%2C%20third%20person%20chase%20cam%2C%20cyan%20magenta%20gold%2C%20arcade%20derby%20race?width=1200&height=630&model=flux&seed=4567&nologo=true">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Major+Mono+Display&family=Bowlby+One+SC&family=Share+Tech+Mono&family=Rubik+Mono+One&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#080318;
    --void-2:#1a0735;
    --cyan:#5ce6ff;
    --magenta:#ff2bd6;
    --pink:#ff6ec0;
    --gold:#ffd454;
    --lime:#a5ff52;
    --violet:#9b5bff;
    --ink:#f4f0ff;
    --silver:#a3a8c2;
    --silver-dim:#5e637a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  html,body{height:100%;overflow:hidden;background:var(--void);color:var(--ink);font-family:'Share Tech Mono', monospace;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:none}

  #gameCanvas{position:fixed;inset:0;display:block;width:100%;height:100%}

  /* Title strip */
  header{
    position:fixed;top:0.7rem;left:50%;transform:translateX(-50%);
    text-align:center;z-index:5;pointer-events:none;
  }
  h1{
    font-family:'Bowlby One SC', sans-serif;
    font-size:clamp(1.4rem, 3.2vw, 2.2rem);letter-spacing:0.06em;
    background:linear-gradient(180deg, var(--cyan), var(--magenta) 55%, var(--gold));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 12px rgba(255,43,214,0.4));text-transform:uppercase;line-height:1;
  }
  .tag{
    font-family:'Major Mono Display', monospace;font-size:clamp(0.55rem, 1vw, 0.7rem);
    letter-spacing:0.32em;color:var(--silver);margin-top:0.2rem;text-transform:lowercase;
  }

  /* Bet panel */
  .panel{
    position:fixed;left:50%;top:50%;transform:translate(-50%, -50%);
    width:min(90vw, 36rem);max-height:88vh;overflow:auto;
    background:rgba(8,3,24,0.94);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border:2px solid var(--magenta);border-radius:0.8rem;
    padding:1.2rem 1.4rem;z-index:10;
    box-shadow:0 0 50px rgba(255,43,214,0.35);
    display:none;
  }
  .panel.show{display:block;animation:popIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)}
  @keyframes popIn{from{opacity:0;transform:translate(-50%, -50%) scale(0.85)}to{opacity:1;transform:translate(-50%, -50%) scale(1)}}
  .panel h2{
    font-family:'Audiowide', monospace;font-size:1.1rem;letter-spacing:0.14em;
    color:var(--cyan);margin-bottom:0.8rem;text-shadow:0 0 10px var(--cyan);text-transform:uppercase;text-align:center;
  }
  .panel .bank{
    text-align:center;font-family:'Rubik Mono One', monospace;
    color:var(--gold);font-size:1.4rem;letter-spacing:0.06em;
    margin-bottom:0.8rem;text-shadow:0 0 12px rgba(255,212,84,0.5);
  }

  .horse-list{display:flex;flex-direction:column;gap:0.5rem;margin-bottom:1rem}
  .horse-card{
    display:flex;align-items:center;gap:0.7rem;
    background:rgba(20,8,50,0.6);border:1.5px solid rgba(155,91,255,0.35);
    border-radius:0.5rem;padding:0.55rem 0.7rem;cursor:pointer;
    transition:all 0.18s;
  }
  .horse-card:hover{border-color:var(--ink);background:rgba(40,15,80,0.6)}
  .horse-card.selected{
    border-color:var(--lime);background:rgba(165,255,82,0.10);
    box-shadow:0 0 18px rgba(165,255,82,0.4);
  }
  .horse-card:focus-visible{outline:3px solid var(--cyan);outline-offset:2px}
  .horse-swatch{
    width:2.5rem;height:2.5rem;flex-shrink:0;
    border-radius:50%;border:2px solid currentColor;
    background:radial-gradient(circle at 30% 30%, currentColor 0%, rgba(0,0,0,0.4) 70%);
    box-shadow:0 0 14px currentColor;
  }
  .horse-info{flex:1;min-width:0}
  .horse-name{
    font-family:'Audiowide', monospace;font-size:0.85rem;letter-spacing:0.05em;
    color:var(--ink);margin-bottom:0.18rem;
  }
  .horse-stats{
    font-family:'Share Tech Mono', monospace;font-size:0.62rem;color:var(--silver);
    letter-spacing:0.08em;text-transform:uppercase;
    display:flex;gap:0.7rem;
  }
  .horse-stats .s b{color:var(--cyan);font-weight:700;margin-left:0.18rem}
  .horse-odds{
    font-family:'Rubik Mono One', monospace;font-size:1.1rem;
    color:var(--gold);text-shadow:0 0 8px rgba(255,212,84,0.5);
    min-width:3rem;text-align:right;letter-spacing:0.04em;
  }

  .bet-row{display:flex;align-items:center;gap:0.7rem;margin-bottom:0.8rem;flex-wrap:wrap;justify-content:center}
  .bet-row label{font-family:'Share Tech Mono', monospace;font-size:0.7rem;color:var(--silver);letter-spacing:0.18em;text-transform:uppercase}
  .bet-row input[type="range"]{accent-color:var(--magenta);width:10rem;height:2.4rem}
  .bet-row .amt{
    font-family:'Rubik Mono One', monospace;color:var(--gold);font-size:1.4rem;letter-spacing:0.04em;
    min-width:4rem;text-align:center;text-shadow:0 0 10px rgba(255,212,84,0.4);
  }
  .bet-row .payout{
    font-family:'Share Tech Mono', monospace;color:var(--lime);font-size:0.78rem;
    letter-spacing:0.12em;
  }

  .btn{
    background:transparent;color:var(--cyan);border:2px solid var(--cyan);
    font-family:'Audiowide', monospace;font-size:0.9rem;letter-spacing:0.12em;text-transform:uppercase;
    padding:0.8rem 1.4rem;cursor:pointer;border-radius:0.4rem;min-height:2.75rem;
    box-shadow:0 0 16px rgba(92,230,255,0.3);
    display:inline-flex;align-items:center;justify-content:center;gap:0.4rem;
  }
  .btn:hover{background:rgba(92,230,255,0.14);transform:translateY(-1px)}
  .btn:focus-visible{outline:3px solid var(--ink);outline-offset:3px}
  .btn.primary{
    color:var(--lime);border-color:var(--lime);
    box-shadow:0 0 22px rgba(165,255,82,0.45);
  }
  .btn.primary:hover{background:rgba(165,255,82,0.16)}
  .btn-row{display:flex;gap:0.6rem;justify-content:center;flex-wrap:wrap}

  /* Racing HUD */
  .race-hud{
    position:fixed;top:0;left:0;right:0;
    display:none;justify-content:space-between;align-items:flex-start;
    padding:3.5rem 1rem 0;z-index:6;pointer-events:none;
  }
  .race-hud.show{display:flex}
  .race-hud .card{
    background:rgba(8,3,24,0.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(92,230,255,0.32);padding:0.5rem 0.8rem;border-radius:0.4rem;
    box-shadow:0 0 14px rgba(92,230,255,0.15);
    display:flex;flex-direction:column;gap:0.2rem;text-align:center;min-width:5rem;
  }
  .race-hud .label{font-size:0.55rem;letter-spacing:0.22em;color:var(--silver);text-transform:uppercase}
  .race-hud .val{font-family:'Rubik Mono One', monospace;font-size:1.3rem;color:var(--cyan);letter-spacing:0.04em;line-height:1}
  .race-hud .val .unit{font-size:0.6rem;color:var(--silver-dim);margin-left:0.18rem}
  .race-hud .card.bank .val{color:var(--gold)}
  .race-hud .card.pos .val{color:var(--magenta)}
  .race-hud .card.time .val{color:var(--lime)}

  /* stamina bar */
  .stamina-wrap{
    position:fixed;bottom:5.5rem;left:50%;transform:translateX(-50%);
    display:none;align-items:center;gap:0.5rem;z-index:6;pointer-events:none;
    font-family:'Share Tech Mono', monospace;font-size:0.7rem;color:var(--silver);letter-spacing:0.15em;text-transform:uppercase;
  }
  .stamina-wrap.show{display:flex}
  .stamina-bar{
    width:14rem;height:0.85rem;background:rgba(8,3,24,0.8);
    border:1px solid rgba(92,230,255,0.4);border-radius:0.4rem;overflow:hidden;
    box-shadow:inset 0 0 6px rgba(0,0,0,0.5);
  }
  .stamina-fill{
    height:100%;background:linear-gradient(90deg, var(--lime), var(--gold));
    width:100%;border-radius:0.4rem;
    box-shadow:0 0 12px var(--lime);
    transition:width 0.1s linear, background 0.2s;
  }
  .stamina-fill.low{background:linear-gradient(90deg, #ff5a5a, var(--magenta));box-shadow:0 0 12px #ff5a5a}

  /* mash button (mobile) */
  .mash-btn{
    position:fixed;bottom:1.2rem;left:50%;transform:translateX(-50%);
    display:none;width:8rem;height:8rem;border-radius:50%;
    background:radial-gradient(circle at 30% 30%, rgba(165,255,82,0.3), rgba(8,3,24,0.95));
    border:3px solid var(--lime);color:var(--lime);
    font-family:'Bowlby One SC', sans-serif;font-size:1.2rem;letter-spacing:0.08em;
    box-shadow:0 0 28px rgba(165,255,82,0.55);
    align-items:center;justify-content:center;cursor:pointer;
    z-index:7;
  }
  .mash-btn.show{display:flex}
  .mash-btn:active{transform:translateX(-50%) scale(0.94);background:radial-gradient(circle at 30% 30%, rgba(165,255,82,0.5), rgba(8,3,24,0.95))}

  /* phase-prompt at top of race */
  .race-prompt{
    position:fixed;top:42%;left:50%;transform:translate(-50%, -50%);
    font-family:'Bowlby One SC', sans-serif;
    font-size:clamp(3rem, 12vw, 7rem);
    color:var(--gold);letter-spacing:0.08em;text-transform:uppercase;
    text-shadow:0 0 22px var(--gold), 0 0 44px rgba(255,212,84,0.5);
    pointer-events:none;z-index:9;opacity:0;
  }
  .race-prompt.show{opacity:1;animation:promptPop 0.7s ease-out}
  @keyframes promptPop{from{transform:translate(-50%, -50%) scale(1.8);opacity:0}40%{opacity:1}100%{opacity:1;transform:translate(-50%, -50%) scale(1)}}

  /* result panel */
  .result-list{display:flex;flex-direction:column;gap:0.35rem;margin-bottom:1rem}
  .result-row{
    display:flex;align-items:center;gap:0.6rem;
    background:rgba(20,8,50,0.5);border-left:3px solid currentColor;
    padding:0.4rem 0.6rem;border-radius:0.25rem;
  }
  .result-row.player{background:rgba(165,255,82,0.10);border-left-color:var(--lime)}
  .result-row .pos{
    font-family:'Bowlby One SC', sans-serif;font-size:1.4rem;
    color:currentColor;min-width:2.4rem;
  }
  .result-row.first .pos{color:var(--gold)}
  .result-row .name{flex:1;font-family:'Audiowide', monospace;font-size:0.8rem;color:var(--ink);letter-spacing:0.04em}
  .result-row .time{font-family:'Share Tech Mono', monospace;font-size:0.7rem;color:var(--silver);letter-spacing:0.1em}
  .result-payout{
    text-align:center;font-family:'Bowlby One SC', sans-serif;font-size:1.6rem;
    margin:0.6rem 0 0.4rem;letter-spacing:0.06em;
  }
  .result-payout.win{color:var(--lime);text-shadow:0 0 14px var(--lime)}
  .result-payout.lose{color:var(--magenta);text-shadow:0 0 14px var(--magenta)}

  /* helper text on bet panel */
  .blurb{font-size:0.7rem;color:var(--silver);text-align:center;margin-bottom:0.7rem;letter-spacing:0.05em}

  /* mute button always visible */
  .mute-btn{
    position:fixed;top:0.6rem;right:0.6rem;
    background:rgba(8,3,24,0.85);color:var(--silver);
    border:1px solid rgba(92,230,255,0.4);
    font-family:'Share Tech Mono', monospace;font-size:0.62rem;letter-spacing:0.15em;text-transform:uppercase;
    padding:0.45rem 0.6rem;border-radius:0.25rem;cursor:pointer;min-height:2.5rem;z-index:8;
  }
  .mute-btn:hover{border-color:var(--cyan);color:var(--cyan)}
  .mute-btn:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}

  @media (pointer: coarse), (max-width: 720px){
    .mash-btn.race-on{display:flex}
  }
  @media (max-width: 640px){
    .panel{padding:0.9rem 1rem}
    .race-hud{padding-top:3rem}
    .race-hud .card{padding:0.35rem 0.55rem;min-width:4rem}
    .race-hud .val{font-size:0.95rem}
  }
  @media (prefers-reduced-motion: reduce){
    .panel.show{animation:none}
    .race-prompt.show{animation:none}
  }
</style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>

  <header>
    <h1>NEON DERBY</h1>
    <div class="tag">third-person · gallop · bet</div>
  </header>

  <button class="mute-btn" id="muteBtn" type="button" aria-pressed="false" aria-label="Toggle sound">♪ on</button>

  <!-- Bet Panel -->
  <section class="panel show" id="betPanel" role="dialog" aria-modal="true" aria-labelledby="betPanelTitle">
    <h2 id="betPanelTitle">Place Your Wager</h2>
    <div class="bank">BANK $<span id="bankVal">100</span></div>
    <div class="blurb">Pick a steed. Smaller odds = safer bet. Mash <kbd>Space</kbd> at the start of the race to gallop.</div>
    <div class="horse-list" id="horseList" role="radiogroup" aria-label="Select horse to bet on"></div>
    <div class="bet-row">
      <label for="betSlider">Bet</label>
      <input id="betSlider" type="range" min="5" max="100" step="5" value="20" aria-label="Bet amount in dollars">
      <span class="amt">$<span id="betAmtVal">20</span></span>
      <span class="payout">→ <span id="payoutVal">$40</span> on win</span>
    </div>
    <div class="btn-row">
      <button class="btn primary" id="placeBetBtn" type="button">▶ Place Bet & Race</button>
    </div>
  </section>

  <!-- Racing HUD -->
  <div class="race-hud" id="raceHud">
    <div class="card bank"><div class="label">bank</div><div class="val">$<span id="hudBank">100</span></div></div>
    <div class="card pos"><div class="label">position</div><div class="val"><span id="hudPos">—</span><span class="unit">/5</span></div></div>
    <div class="card time"><div class="label">time</div><div class="val"><span id="hudTime">0.0</span><span class="unit">s</span></div></div>
  </div>

  <div class="stamina-wrap" id="stamWrap">
    <span>STAM</span>
    <div class="stamina-bar"><div class="stamina-fill" id="stamFill"></div></div>
  </div>

  <button class="mash-btn" id="mashBtn" type="button" aria-label="Mash to gallop">GALLOP</button>

  <div class="race-prompt" id="racePrompt" aria-live="assertive"></div>

  <!-- Result Panel -->
  <section class="panel" id="resultPanel" role="dialog" aria-modal="true" aria-labelledby="resultPanelTitle">
    <h2 id="resultPanelTitle">Race Results</h2>
    <div class="result-list" id="resultList"></div>
    <div class="result-payout" id="resultPayout"></div>
    <div class="bank">BANK $<span id="resultBankVal">100</span></div>
    <div class="btn-row">
      <button class="btn primary" id="nextRaceBtn" type="button">Next Race</button>
    </div>
  </section>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function(){
  'use strict';

  function showError(msg){
    try {
      var t = document.getElementById('errToast');
      if (!t){
        t = document.createElement('div');
        t.id = 'errToast';
        t.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#3a0610;color:#ffb6c1;font-family:monospace;font-size:11px;padding:8px 12px;border-bottom:1px solid #ff2bd6;white-space:pre-wrap';
        document.body.appendChild(t);
      }
      t.textContent = '⚠ ' + msg;
    } catch(_){}
  }
  window.addEventListener('error', function(ev){
    showError((ev.message || 'error') + ' @ ' + (ev.filename ? ev.filename.split('/').pop() : '?') + ':' + (ev.lineno || '?'));
  });

  if (typeof THREE === 'undefined'){
    showError('three.js failed to load');
    return;
  }

  var prefersReducedMotion = false;
  try { prefersReducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch(_){}

  // ── three.js setup ──
  var canvas = document.getElementById('gameCanvas');
  var renderer = new THREE.WebGLRenderer({ canvas: canvas, antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  renderer.setSize(window.innerWidth, window.innerHeight, false);
  renderer.setClearColor(0x080318);

  var scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0x1a0735, 35, 220);

  var camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 600);
  camera.position.set(0, 6, -12);

  function resize(){
    renderer.setSize(window.innerWidth, window.innerHeight, false);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  }
  window.addEventListener('resize', resize);

  // ── Lighting ──
  var ambient = new THREE.AmbientLight(0x222244, 0.5);
  scene.add(ambient);
  var keyLight = new THREE.DirectionalLight(0xff5ec0, 0.6);
  keyLight.position.set(10, 20, 5);
  scene.add(keyLight);
  var fillLight = new THREE.DirectionalLight(0x5ce6ff, 0.4);
  fillLight.position.set(-10, 8, -10);
  scene.add(fillLight);

  // ── Track / Ground ──
  var TRACK_LEN = 1200;
  var LANE_WIDTH = 4;
  var NUM_LANES = 5;

  // Ground: large dark plane
  var groundGeom = new THREE.PlaneGeometry(80, TRACK_LEN + 200);
  var groundMat = new THREE.MeshBasicMaterial({ color: 0x0a0420 });
  var ground = new THREE.Mesh(groundGeom, groundMat);
  ground.rotation.x = -Math.PI / 2;
  ground.position.z = TRACK_LEN / 2 - 50;
  scene.add(ground);

  // Grid floor (synthwave) — use GridHelper
  var grid = new THREE.GridHelper(400, 80, 0xff2bd6, 0x5ce6ff);
  grid.position.set(0, 0.01, TRACK_LEN / 2 - 50);
  grid.material.transparent = true;
  grid.material.opacity = 0.45;
  scene.add(grid);

  // Lane separator lines (thin glowing strips between lanes)
  for (var li = 0; li <= NUM_LANES; li++){
    var lineX = (li - NUM_LANES / 2) * LANE_WIDTH;
    var lineGeom = new THREE.PlaneGeometry(0.18, TRACK_LEN + 100);
    var lineMat = new THREE.MeshBasicMaterial({ color: 0x5ce6ff, transparent: true, opacity: 0.7 });
    var line = new THREE.Mesh(lineGeom, lineMat);
    line.rotation.x = -Math.PI / 2;
    line.position.set(lineX, 0.02, TRACK_LEN / 2);
    scene.add(line);
  }

  // Distance markers (cones on left + right side)
  for (var d = 50; d < TRACK_LEN; d += 50){
    for (var side = -1; side <= 1; side += 2){
      var coneGeom = new THREE.ConeGeometry(0.4, 1.4, 5);
      var coneMat = new THREE.MeshBasicMaterial({ color: 0xff8a3a });
      var cone = new THREE.Mesh(coneGeom, coneMat);
      cone.position.set(side * (NUM_LANES * LANE_WIDTH / 2 + 1.2), 0.7, d);
      scene.add(cone);
      // glow halo
      var haloGeom = new THREE.SphereGeometry(0.5, 8, 8);
      var haloMat = new THREE.MeshBasicMaterial({ color: 0xffd454, transparent: true, opacity: 0.4 });
      var halo = new THREE.Mesh(haloGeom, haloMat);
      halo.position.set(side * (NUM_LANES * LANE_WIDTH / 2 + 1.2), 1.5, d);
      scene.add(halo);
    }
  }

  // Finish line: a banner gate
  var bannerGeom = new THREE.PlaneGeometry(NUM_LANES * LANE_WIDTH + 4, 2);
  var bannerMat = new THREE.MeshBasicMaterial({ color: 0xffd454, side: THREE.DoubleSide, transparent: true, opacity: 0.85 });
  var banner = new THREE.Mesh(bannerGeom, bannerMat);
  banner.position.set(0, 5, TRACK_LEN);
  scene.add(banner);
  // pillars
  for (var p = -1; p <= 1; p += 2){
    var pillarGeom = new THREE.BoxGeometry(0.4, 6, 0.4);
    var pillarMat = new THREE.MeshBasicMaterial({ color: 0xff2bd6 });
    var pillar = new THREE.Mesh(pillarGeom, pillarMat);
    pillar.position.set(p * (NUM_LANES * LANE_WIDTH / 2 + 2), 3, TRACK_LEN);
    scene.add(pillar);
  }
  // Finish line strip on ground
  var finishLineGeom = new THREE.PlaneGeometry(NUM_LANES * LANE_WIDTH + 4, 1.5);
  var finishLineMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
  var finishLine = new THREE.Mesh(finishLineGeom, finishLineMat);
  finishLine.rotation.x = -Math.PI / 2;
  finishLine.position.set(0, 0.05, TRACK_LEN);
  scene.add(finishLine);

  // Skybox: large gradient sphere using vertex colors
  var skyGeom = new THREE.SphereGeometry(400, 32, 16);
  var skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    uniforms: {
      topColor: { value: new THREE.Color(0x080318) },
      midColor: { value: new THREE.Color(0x4a0e6a) },
      botColor: { value: new THREE.Color(0xff2bd6) }
    },

  function buildHorseModel(hex, hue){
    var g = new THREE.Group();
    var bodyMat = new THREE.MeshLambertMaterial({ color: hex, emissive: hex, emissiveIntensity: 0.45 });
    var darkMat = new THREE.MeshBasicMaterial({ color: hex, transparent: true, opacity: 0.85 });

    // Torso group — pivots around horse base for forward lean (legs stay at root)
    var torso = new THREE.Group();
    g.add(torso);
    g.userData.torso = torso;

    // body
    var body = new THREE.Mesh(new THREE.BoxGeometry(1.4, 0.9, 2.6), bodyMat);
    body.position.y = 1.4;
    torso.add(body);
    // chest/neck base
    var chest = new THREE.Mesh(new THREE.BoxGeometry(1.1, 1.0, 1.0), bodyMat);
    chest.position.set(0, 1.6, 1.3);
    torso.add(chest);
    // Neck group — pivots at the chest joint so it can swing during gallop
    var neckPivot = new THREE.Group();
    neckPivot.position.set(0, 1.85, 1.55);
    torso.add(neckPivot);
    g.userData.neckPivot = neckPivot;
    var neckGeom = new THREE.BoxGeometry(0.6, 1.5, 0.6);
    var neck = new THREE.Mesh(neckGeom, bodyMat);
    neck.position.set(0, 0.45, 0.15);    // relative to neckPivot
    neck.rotation.x = -0.5;
    neckPivot.add(neck);

    // Head group — pivots at the top of the neck so head can bob/pitch
    var headPivot = new THREE.Group();
    headPivot.position.set(0, 0.75, 0.45); // relative to neckPivot (top of neck)
    neckPivot.add(headPivot);
    g.userData.headPivot = headPivot;
    // head
    var head = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.7, 1.1), bodyMat);
    head.position.set(0, 0.30, 0.40);    // relative to headPivot
    head.rotation.x = -0.2;
    headPivot.add(head);
    // muzzle
    var muzzle = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.4, 0.4), darkMat);
    muzzle.position.set(0, 0.15, 0.95);
    headPivot.add(muzzle);
    // ears
    var earGeom = new THREE.ConeGeometry(0.18, 0.4, 4);
    var earL = new THREE.Mesh(earGeom, bodyMat);
    earL.position.set(-0.25, 0.72, 0.25);
    headPivot.add(earL);
    var earR = new THREE.Mesh(earGeom, bodyMat);
    earR.position.set(0.25, 0.72, 0.25);
    headPivot.add(earR);
    // eye spots
    var eyeGeom = new THREE.SphereGeometry(0.06, 6, 4);
    var eyeL = new THREE.Mesh(eyeGeom, accentMat);
    eyeL.position.set(-0.28, 0.38, 0.78);
    headPivot.add(eyeL);
    var eyeR = new THREE.Mesh(eyeGeom, accentMat);
    eyeR.position.set(0.28, 0.38, 0.78);
    headPivot.add(eyeR);

    // mane along neck top (taller hue-shifted strip) — attached to neckPivot so it sways with the neck
    var maneColor = new THREE.Color('hsl(' + ((hue + 30) % 360) + ', 100%, 70%)');
    var maneMat = new THREE.MeshBasicMaterial({ color: maneColor });
    var maneArr = [];
    for (var m = 0; m < 6; m++){
      var mh = 0.18 + Math.random() * 0.08;
      var mane = new THREE.Mesh(new THREE.BoxGeometry(0.14, mh, 0.20), maneMat);
      var t = m / 5;
      // relative to neckPivot
      mane.position.set(0, 0.15 + t * 0.6, 0.65 - t * 0.65);
      mane.rotation.x = -0.3 - t * 0.15;
      mane.userData.baseX = mane.position.x;
      neckPivot.add(mane);
      maneArr.push(mane);
    }
    g.userData.mane = maneArr;
    // tail — attached to torso so it sways with the body lean
    var tailMat = new THREE.MeshBasicMaterial({ color: maneColor });
    var tail = new THREE.Mesh(new THREE.BoxGeometry(0.2, 0.2, 1.6), tailMat);
    tail.position.set(0, 1.2, -1.6);
    tail.rotation.x = 0.4;
    torso.add(tail);
    g.userData.tail = tail;

    // legs (4) — references stored for animation
    var legGeom = new THREE.BoxGeometry(0.28, 1.4, 0.28);
    var legPositions = [
      { x: -0.42, z:  0.9 },  // front-left
      { x:  0.42, z:  0.9 },  // front-right
      { x: -0.42, z: -0.9 },  // back-left
      { x:  0.42, z: -0.9 }   // back-right
    ];
    var legs = [];
    for (var i = 0; i < 4; i++){
      var leg = new THREE.Mesh(legGeom, bodyMat);
      leg.position.set(legPositions[i].x, 0.7, legPositions[i].z);
      g.add(leg);

    g.userData.legs = legs;

    var hoofGeom = new THREE.SphereGeometry(0.18, 6, 4);

    var hooves = [];
    for (var j = 0; j < 4; j++){
      var hoof = new THREE.Mesh(hoofGeom, hoofMat);
      hoof.position.set(legPositions[j].x, 0.05, legPositions[j].z);
      g.add(hoof);
      hooves.push(hoof);
    }
    g.userData.hooves = hooves;

    // emissive aura — large transparent sphere around horse for the neon halo (attached to torso so it tilts with body)
    var auraGeom = new THREE.SphereGeometry(2.2, 12, 8);
    var auraMat = new THREE.MeshBasicMaterial({ color: hex, transparent: true, opacity: 0.10, blending: THREE.AdditiveBlending });
    var aura = new THREE.Mesh(auraGeom, auraMat);
    aura.position.y = 1.6;
    torso.add(aura);
    g.userData.aura = aura;

    return g;

  // ── Mash input ──
  function mash(){
    if (state.phase !== 'racing') return;
    var p = state.horses[state.pickIdx];
    if (p.finished) return;
    state.mashTimes.push(performance.now());
    // boost — scaled by remaining stamina
    if (p.stam > 0.06){
      p.vel += p.def.accel * 8 * Math.max(0.4, p.stam);
      p.vel = Math.min(p.def.top, p.vel);
      p.stam = Math.max(0, p.stam - 0.045);

  // ── Audio ──
  var audioCtx = null;
  var muted = false;
  function ensureAudio(){
    if (audioCtx){ if (audioCtx.state === 'suspended') audioCtx.resume(); return audioCtx; }
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(_){ audioCtx = null; }
    return audioCtx;
  }
  function tone(type, freq, dur, gain, slideTo, t0){
    var c = ensureAudio(); if (!c || muted) return;
    var o = c.createOscillator(); o.type = type;
    var t = t0 || c.currentTime;
    o.frequency.setValueAtTime(freq, t);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20, slideTo), t + dur);
    var g = c.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(gain, t + 0.006);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g).connect(c.destination);
    o.start(t); o.stop(t + dur + 0.02);
  }
  function noise(dur, freq, Q, gain){
    var c = ensureAudio(); if (!c || muted) return;
    var n = Math.floor(c.sampleRate * dur);
    var buf = c.createBuffer(1, n, c.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < n; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/n, 1.6);
    var s = c.createBufferSource(); s.buffer = buf;
    var bp = c.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = freq; bp.Q.value = Q;
    var g = c.createGain(); g.gain.value = gain;
    s.connect(bp).connect(g).connect(c.destination);
    s.start();
  }
  function sndHoof(){
    tone('sine', 110, 0.06, 0.12, 50);
    noise(0.03, 1200, 1.5, 0.06);
  }
  function sndCountBeep(high){

  function sndStartBell(){
    [440, 660, 880, 1320].forEach(function(f, i){
      tone('triangle', f, 0.40, 0.20, null, ensureAudio() && audioCtx.currentTime + i * 0.05);
    });
    noise(0.4, 3000, 1.2, 0.08);
  }
  function sndWin(){
    [523, 659, 784, 1047, 1318].forEach(function(f, i){
      tone('triangle', f, 0.25, 0.20, null, ensureAudio() && audioCtx.currentTime + i * 0.10);
    });
  }
  function sndLose(){

  // ── Race-prompt helper ──

  // ── Update loop ──
  function updateCountdown(dt){
    state.countdownT -= dt;
    var sec = Math.ceil(state.countdownT);
    if (state.countdownT < 0){
      state.phase = 'racing';
      flashPrompt('GO!', '#a5ff52');
      sndStartBell();
      return;
    }
    // beeps at integer transitions
    if (!updateCountdown._lastSec) updateCountdown._lastSec = sec + 1;
    if (sec < updateCountdown._lastSec){
      updateCountdown._lastSec = sec;
      if (sec > 0){
        flashPrompt(String(sec), sec === 3 ? '#5ce6ff' : sec === 2 ? '#ffd454' : '#ff8a3a');
        sndCountBeep(false);
      }
    }
  }

  function updateRace(dt){
    state.raceTime += dt;
    var player = state.horses[state.pickIdx];

    // Stamina regen for player when not pressing (always slight, but slower while still moving fast)
    if (player.stam < 1){
      player.stam = Math.min(1, player.stam + dt * 0.10);
    }

    for (var i = 0; i < state.horses.length; i++){
      var h = state.horses[i];
      if (h.finished) continue;
      var isPlayer = (i === state.pickIdx);

      if (isPlayer){
        // Player velocity gently decays toward base
        var decay = (h.vel - h.def.base * 0.85);
        h.vel -= decay * dt * 0.9;
        // If stam exhausted, decay faster
        if (h.stam < 0.05){
          h.vel -= h.vel * dt * 0.25;
        }
      } else {
        // AI: target a personality-driven base + sin variation
        var targetVel = h.def.base + Math.sin(state.raceTime * 1.3 + h.laneX) * 1.4;
        // bias toward top for high-accel horses (rubberband subtle)
        var laneNoise = (Math.random() - 0.5) * 0.4;
        h.vel += dt * h.def.accel * (targetVel + laneNoise - h.vel);
        // occasional burst
        h.burstCD -= dt;
        if (h.burstCD <= 0){
          h.vel += 2 + Math.random() * 3;
          h.burstCD = 1.5 + Math.random() * 2.5;
        }
        // weak horses occasionally trip / slow
        if (Math.random() < dt * 0.04 * (1 - h.def.stam)){
          h.vel *= 0.85;
        }
      }
      h.vel = Math.max(8, Math.min(h.def.top, h.vel));

      h.x += h.vel * dt;
      h.legPhase += h.vel * 0.35 * dt;

      // Update mesh position
      h.mesh.position.z = h.x;
      h.mesh.position.x = h.laneX;
      // subtle body bob
      h.mesh.position.y = Math.abs(Math.sin(h.legPhase * 2)) * 0.08;

      // Animate legs (front pair vs back pair gallop cycle)
      var legs = h.mesh.userData.legs;
      var hooves = h.mesh.userData.hooves;
      if (legs && legs.length === 4){
        // gallop: front-left + back-right swing together; front-right + back-left other phase
        var phaseA = Math.sin(h.legPhase * 4);
        var phaseB = Math.sin(h.legPhase * 4 + Math.PI);
        var swingMag = 0.5 + Math.min(1, h.vel / 30) * 0.3;
        legs[0].rotation.x = phaseA * swingMag;
        legs[3].rotation.x = phaseA * swingMag;
        legs[1].rotation.x = phaseB * swingMag;
        legs[2].rotation.x = phaseB * swingMag;
        // hooves track leg tips loosely (raise on lift)
        hooves[0].position.y = 0.05 + Math.max(0, Math.sin(h.legPhase * 4)) * 0.4;
        hooves[3].position.y = 0.05 + Math.max(0, Math.sin(h.legPhase * 4)) * 0.4;
        hooves[1].position.y = 0.05 + Math.max(0, Math.sin(h.legPhase * 4 + Math.PI)) * 0.4;
        hooves[2].position.y = 0.05 + Math.max(0, Math.sin(h.legPhase * 4 + Math.PI)) * 0.4;
      }
      // tail flow
      var tail = h.mesh.userData.tail;
      if (tail) tail.rotation.x = 0.4 + Math.sin(h.legPhase * 2) * 0.18;

      // Aura pulses with speed
      if (h.mesh.userData.aura){
        h.mesh.userData.aura.material.opacity = 0.08 + Math.min(0.20, h.vel / h.def.top * 0.18);
      }

      // ── Stylized motion pass (option B): forward lean + head/neck bob + mane flutter ──
      var velRatio = Math.min(1, Math.max(0, h.vel / h.def.top));
      var torso = h.mesh.userData.torso;
      var headPivot = h.mesh.userData.headPivot;
      var neckPivot = h.mesh.userData.neckPivot;
      var maneArr = h.mesh.userData.mane;

      if (torso){
        // Body leans forward (-X rotation pitches the front down) — proportional to speed
        // At top speed: ~12° forward lean; at rest: 0
        var leanTarget = -velRatio * 0.21;
        // Add a tiny stride-synced bob in the body pitch (very subtle)
        leanTarget += Math.sin(h.legPhase * 4) * 0.015 * velRatio;
        torso.rotation.x += (leanTarget - torso.rotation.x) * Math.min(1, dt * 5);
        // Slight side-to-side bank at the gallop's lateral phase
        var bank = Math.sin(h.legPhase * 2) * 0.04 * velRatio;
        torso.rotation.z += (bank - torso.rotation.z) * Math.min(1, dt * 4);
      }

      if (neckPivot){
        // Neck swings DOWN-and-FORWARD on stride extension, UP-and-BACK on recovery
        // (the classic horse gallop head-pump). Pitch sweep is in opposite phase to body bob
        // so the head reaches lowest just as front hooves plant.
        var neckPitchBase = -velRatio * 0.18;  // when sprinting, neck stretches forward+down
        var neckPump = Math.sin(h.legPhase * 4 + Math.PI * 0.3) * (0.10 + velRatio * 0.10);
        neckPivot.rotation.x += ((neckPitchBase + neckPump) - neckPivot.rotation.x) * Math.min(1, dt * 8);
        // Tiny lateral neck sway (looks alive)
        neckPivot.rotation.y = Math.sin(h.legPhase * 2 + 0.7) * 0.04 * velRatio;
      }

      if (headPivot){
        // Head adds an extra micro-bob on top of the neck motion, slightly out of phase
        // — creates the "head wobble" without a knee rig
        var headBob = Math.sin(h.legPhase * 4 + Math.PI * 0.55) * (0.08 + velRatio * 0.08);
        var headTilt = Math.sin(h.legPhase * 2 + 1.2) * 0.05 * velRatio;
        headPivot.rotation.x += (headBob - headPivot.rotation.x) * Math.min(1, dt * 10);
        headPivot.rotation.z = headTilt;
      }

      if (maneArr && maneArr.length){
        // Mane ridges flutter sideways in a traveling wave from neck base to head
        for (var mi = 0; mi < maneArr.length; mi++){
          var ridge = maneArr[mi];
          var travel = Math.sin(h.legPhase * 5 - mi * 0.6) * 0.07 * velRatio;
          ridge.position.x = ridge.userData.baseX + travel;
        }
      }

      // Cross finish line?
      if (h.x >= TRACK_LEN && !h.finished){
        h.finished = true;
        h.finishTime = state.raceTime;
        state.finishedOrder.push(h);
        if (h === player){
          flashPrompt('FINISH!', '#ffd454');
        }
      }
    }

    // All finished? Or 8s after the player finished and others still slow?
    var aliveCount = state.horses.filter(function(h){ return !h.finished; }).length;
    if (aliveCount === 0 || (player.finished && state.raceTime > player.finishTime + 6)){
      // For any non-finishers, push them in order of remaining distance
      var remaining = state.horses.filter(function(h){ return !h.finished; });
      remaining.sort(function(a, b){ return b.x - a.x; });
      remaining.forEach(function(h){
        h.finished = true;
        h.finishTime = state.raceTime;
        state.finishedOrder.push(h);
      });
      finishRace();
    }
  }

  function updateCamera(dt){
    var player = state.horses[state.pickIdx];
    if (!player){
      camera.position.set(0, 6, -12);
      camera.lookAt(0, 1.5, 0);
      return;
    }
    // chase cam: 12 behind, 5 above
    var targetX = player.laneX * 0.4; // smooth toward lane
    var targetZ = player.x - 11;
    var targetY = 5.5;
    // shake when mashing fast
    var nowMs = performance.now();
    var recentMashes = state.mashTimes.filter(function(t){ return nowMs - t < 700; });
    state.mashTimes = recentMashes;
    var mashRate = recentMashes.length / 0.7;
    var shake = state.cameraShake + Math.min(0.25, mashRate * 0.04);
    var sx = (Math.random() - 0.5) * shake;
    var sy = (Math.random() - 0.5) * shake;
    state.cameraShake *= 0.9;

    camera.position.x += (targetX + sx - camera.position.x) * Math.min(1, dt * 4);
    camera.position.y += (targetY + sy - camera.position.y) * Math.min(1, dt * 3);
    camera.position.z += (targetZ - camera.position.z) * Math.min(1, dt * 6);
    // look slightly ahead
    camera.lookAt(player.laneX, 1.8, player.x + 6);
  }

  // ── HUD updates ──
  function updateHUD(){
    if (state.phase === 'racing' || state.phase === 'countdown'){
      document.getElementById('hudBank').textContent = state.bank;
      // position of player among horses by x desc
      var sorted = state.horses.slice().sort(function(a, b){ return b.x - a.x; });
      var pos = sorted.indexOf(state.horses[state.pickIdx]) + 1;
      document.getElementById('hudPos').textContent = pos;
      document.getElementById('hudTime').textContent = state.raceTime.toFixed(1);
      var stam = state.horses[state.pickIdx].stam;
      var fill = document.getElementById('stamFill');
      fill.style.width = (stam * 100) + '%';
      fill.classList.toggle('low', stam < 0.3);
    }
  }

  // ── Main loop ──
  var lastT = performance.now();
  function frame(now){
    var dt = Math.min(0.05, (now - lastT) / 1000);
    lastT = now;
    if (prefersReducedMotion) dt *= 0.85;

    try {
      if (state.phase === 'countdown') updateCountdown(dt);
      if (state.phase === 'racing') updateRace(dt);
      updateCamera(dt);
      updateHUD();
      // slowly drift skybox color
      // (skip for now to keep it stable)
      renderer.render(scene, camera);
    } catch(e){ showError('loop: ' + e.message); }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // Initial camera: aimed at starting line for the bet panel backdrop
  buildRunners();
  camera.position.set(0, 7, -14);
  camera.lookAt(0, 1.8, 4);

})();
</script>
</body>
