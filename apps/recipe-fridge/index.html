<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Recipe Fridge</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%A7%8A" />

<meta name="description" content="Tap what's in your fridge and instantly see the dishes you can actually cook right now — no camera, no sign-up, just your ingredients." />
<meta property="og:type" content="website" />
<meta property="og:title" content="Recipe Fridge" />
<meta property="og:description" content="Toggle your ingredients, get dishes you can make right now." />
<meta property="og:url" content="https://sloppy.live/recipe-fridge/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/an%20open%20fridge%20full%20of%20fresh%20ingredients%20with%20recipe%20cards%2C%20warm%20cozy%20kitchen%2C%20editorial%20food%20photography?width=1200&height=630&nologo=true&seed=321" />
<meta name="twitter:card" content="summary_large_image" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,600;1,9..144,500;1,9..144,600&family=Hanken+Grotesk:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

<style>
  :root{
    --cream:#f6efe1; --paper:#fffaf0; --ink:#2c241c; --dim:#7a6e5e; --line:#e3d6bf;
    --tomato:#df5337; --tomato-d:#b53c25; --green:#4f9d5d; --green-d:#3a7a45; --amber:#d9982f;
    --steel1:#eef2f4; --steel2:#dde6ea; --steel-line:#c3d0d6;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  body{
    font-family:'Hanken Grotesk',sans-serif; color:var(--ink); line-height:1.5;
    background:
      radial-gradient(80% 50% at 100% 0%, #fbe9d6 0%, transparent 55%),
      radial-gradient(70% 50% at 0% 100%, #eef3df 0%, transparent 55%),
      var(--cream);
    min-height:100vh; -webkit-font-smoothing:antialiased; padding:1.2rem .8rem 3rem;
  }
  .wrap{ max-width:64rem; margin:0 auto; }
  header{ text-align:center; margin-bottom:1.4rem; }
  h1{ font-family:'Fraunces',serif; font-weight:600; font-size:clamp(2rem,7vw,3.2rem); line-height:1; letter-spacing:-.01em; }
  h1 em{ font-style:italic; color:var(--tomato); }
  .tag{ font-size:.95rem; color:var(--dim); margin-top:.55rem; }
  .tag b{ color:var(--green-d); }

  /* ---- fridge door (ingredient panel) ---- */
  .fridge{ background:linear-gradient(160deg,var(--steel1),var(--steel2)); border:1px solid var(--steel-line);
    border-radius:18px; padding:1rem 1rem 1.2rem; box-shadow:0 1px 0 #fff inset, 0 18px 40px rgba(60,50,40,.12);
    position:relative; }
  .fridge::before{ content:""; position:absolute; top:14px; right:14px; width:9px; height:46px; border-radius:6px;
    background:linear-gradient(180deg,#b9c6cc,#8fa0a8); box-shadow:inset 0 0 3px rgba(0,0,0,.3); }
  .fridge-h{ display:flex; align-items:center; gap:.6rem; margin-bottom:.5rem; flex-wrap:wrap; }
  .fridge-h .lbl{ font-family:'Fraunces',serif; font-style:italic; font-size:1.15rem; }
  .fridge-h .cnt{ font-weight:700; font-size:.8rem; color:var(--green-d); background:#e7f1e3; padding:.15rem .5rem; border-radius:20px; }
  .fridge-h .sp{ flex:1; }
  .mini{ border:1px solid var(--steel-line); background:#fff; color:var(--ink); font-weight:600; font-size:.78rem;
    border-radius:8px; padding:.4rem .7rem; cursor:pointer; min-height:2.3rem; }
  .mini:hover{ border-color:var(--tomato); }
  .mini:focus-visible,.chip:focus-visible{ outline:2px solid var(--tomato); outline-offset:2px; }
  .basics{ display:inline-flex; align-items:center; gap:.4rem; font-size:.78rem; color:var(--dim); cursor:pointer; user-select:none; }
  .basics input{ width:1.1rem; height:1.1rem; accent-color:var(--green); }

  .cat{ font-size:.68rem; letter-spacing:.14em; text-transform:uppercase; color:var(--dim); margin:.8rem 0 .45rem; font-weight:700; }
  .chips{ display:flex; flex-wrap:wrap; gap:.45rem; }
  .chip{ display:inline-flex; align-items:center; gap:.4rem; background:#fff; border:1.5px solid var(--steel-line);
    border-radius:11px; padding:.42rem .62rem; font-size:.86rem; font-weight:600; cursor:pointer; color:var(--ink);
    transition:transform .08s, background .12s, border-color .12s; min-height:2.4rem; }
  .chip .em{ font-size:1.05rem; line-height:1; }
  .chip:hover{ transform:translateY(-1px); }
  .chip[aria-pressed="true"]{ background:var(--green); border-color:var(--green-d); color:#fff;
    box-shadow:0 3px 0 var(--green-d); }
  .chip.basic::after{ content:"basic"; font-size:.55rem; font-weight:700; letter-spacing:.06em; color:var(--amber);
    background:#fbf0d6; padding:.05rem .25rem; border-radius:5px; }
  .chip.basic[aria-pressed="true"]::after{ color:#fff; background:rgba(255,255,255,.25); }

  /* ---- results ---- */
  .results{ margin-top:1.6rem; }
  .res-h{ font-family:'Fraunces',serif; font-style:italic; font-size:1.4rem; display:flex; align-items:baseline; gap:.5rem; margin:1.2rem 0 .7rem; }
  .res-h .n{ font-family:'Hanken Grotesk'; font-style:normal; font-weight:800; font-size:.8rem; color:#fff; background:var(--green);
    padding:.1rem .5rem; border-radius:20px; }
  .res-h.almost .n{ background:var(--amber); }
  .cards{ display:grid; grid-template-columns:repeat(auto-fill,minmax(15rem,1fr)); gap:.8rem; }
  .card{ background:var(--paper); border:1px solid var(--line); border-radius:14px; padding:.9rem 1rem;
    box-shadow:0 6px 16px rgba(80,60,40,.06); position:relative; overflow:hidden; }
  .card.ready{ border-left:5px solid var(--green); }
  .card.almost{ border-left:5px solid var(--amber); }
  .card .top{ display:flex; align-items:flex-start; gap:.55rem; }
  .card .ico{ font-size:1.7rem; line-height:1; }
  .card h3{ font-family:'Fraunces',serif; font-weight:600; font-size:1.12rem; line-height:1.1; flex:1; }
  .card .mins{ font-size:.72rem; color:var(--dim); font-weight:700; white-space:nowrap; padding-top:.2rem; }
  .card .blurb{ font-size:.83rem; color:var(--dim); margin:.45rem 0 .6rem; }
  .ings{ display:flex; flex-wrap:wrap; gap:.3rem; }
  .ing{ font-size:.72rem; font-weight:600; padding:.18rem .45rem; border-radius:7px; display:inline-flex; align-items:center; gap:.25rem; }
  .ing.have{ background:#e7f1e3; color:var(--green-d); }
  .ing.miss{ background:#fbe6e0; color:var(--tomato-d); }
  .ing.miss .em{ filter:grayscale(.6) opacity(.7); }
  .miss-line{ font-size:.76rem; color:var(--tomato-d); margin-top:.5rem; font-weight:600; }

  .empty{ text-align:center; color:var(--dim); padding:2.4rem 1rem; font-family:'Fraunces',serif; font-style:italic; font-size:1.2rem; }
  .empty span{ display:block; font-family:'Hanken Grotesk'; font-style:normal; font-size:.9rem; margin-top:.5rem; }

  footer{ text-align:center; font-size:.74rem; color:var(--dim); margin-top:2.2rem; line-height:1.7; }
  .sr-only{ position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); }
  @media (prefers-reduced-motion:reduce){ .chip{ transition:none; } }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Recipe <em>Fridge</em></h1>
    <p class="tag">Tap what you've got — get dishes you can cook <b>right now</b>. No camera, no login.</p>
  </header>

  <main>
    <section class="fridge" aria-label="Your ingredients">
      <div class="fridge-h">
        <span class="lbl">What's in your fridge?</span>
        <span class="cnt" id="selCount">0 selected</span>
        <span class="sp"></span>
        <label class="basics"><input type="checkbox" id="basicsChk" checked> Assume basics (oil, butter, salt)</label>
        <button class="mini" id="clearBtn" type="button">Clear</button>
        <button class="mini" id="surpriseBtn" type="button">🎲 Surprise me</button>
      </div>
      <div id="grid"></div>
    </section>

    <section class="results" aria-live="polite">
      <div id="resultArea"></div>
    </section>
  </main>

  <footer>
    Recipes are curated guides, not exact measurements — season to taste. 🧂<br>
    <span id="recipeCount"></span>
  </footer>
</div>

<script>
(function(){
  "use strict";
  var $=function(id){return document.getElementById(id);};

  // ---- ingredient grid ----
  var BASICS=['butter','olive_oil'];
  var GRID=[
    {cat:'Proteins', items:[
      ['egg','Egg','🥚'],['chicken','Chicken','🍗'],['beef','Ground Beef','🥩'],['bacon','Bacon','🥓'],
      ['ham','Ham','🍖'],['salmon','Salmon','🐟'],['shrimp','Shrimp','🦐'],['tofu','Tofu','⬜']
    ]},
    {cat:'Vegetables', items:[
      ['tomato','Tomato','🍅'],['onion','Onion','🧅'],['garlic','Garlic','🧄'],['potato','Potato','🥔'],
      ['carrot','Carrot','🥕'],['pepper','Bell Pepper','🫑'],['broccoli','Broccoli','🥦'],['spinach','Spinach','🥬'],
      ['mushroom','Mushroom','🍄'],['avocado','Avocado','🥑'],['lettuce','Lettuce','🥗'],['corn','Corn','🌽'],
      ['cucumber','Cucumber','🥒'],['peas','Peas','🟢']
    ]},
    {cat:'Dairy & Eggs', items:[
      ['milk','Milk','🥛'],['cheese','Cheese','🧀'],['butter','Butter','🧈']
    ]},
    {cat:'Pantry', items:[
      ['rice','Rice','🍚'],['pasta','Pasta','🍝'],['noodles','Noodles','🍜'],['bread','Bread','🍞'],
      ['tortilla','Tortilla','🌯'],['flour','Flour','🌾'],['beans','Beans','🫘'],['oats','Oats','🥣'],
      ['olive_oil','Olive Oil','🫒'],['soy_sauce','Soy Sauce','🍶']
    ]},
    {cat:'Fruit & Extras', items:[
      ['lemon','Lemon','🍋'],['apple','Apple','🍎'],['banana','Banana','🍌'],['basil','Basil','🌿']
    ]}
  ];
  var LABEL={}, EMOJI={};
  GRID.forEach(function(g){ g.items.forEach(function(it){ LABEL[it[0]]=it[1]; EMOJI[it[0]]=it[2]; }); });

  // ---- recipes (each ingredient id exists in the grid) ----
  var RECIPES=[
    ['Scrambled Eggs','🍳',['egg'],'Whisk, low heat, gentle curds.',5],
    ['Cheese Omelette','🍳',['egg','cheese'],'Fold molten cheese into fluffy egg.',8],
    ['Veggie Frittata','🍳',['egg','spinach','mushroom','onion','cheese'],'Oven-finished open omelette.',20],
    ['French Toast','🍞',['bread','egg','milk'],'Soak, pan-fry golden, dust sugar.',12],
    ['Fluffy Pancakes','🥞',['flour','egg','milk','butter'],'Batter, bubbles, flip, stack.',15],
    ['Banana Pancakes','🥞',['banana','egg','flour','milk'],'Mashed banana in the batter.',15],
    ['Creamy Oatmeal','🥣',['oats','milk'],'Simmer soft, top to taste.',6],
    ['Apple Cinnamon Oats','🥣',['oats','milk','apple'],'Grated apple, warm spice.',8],
    ['Avocado Toast','🥑',['bread','avocado','lemon'],'Smash, squeeze, crunch.',7],
    ['Avo & Egg Toast','🥑',['bread','avocado','egg'],'Smash + a jammy egg on top.',10],
    ['Grilled Cheese','🧀',['bread','cheese','butter'],'Buttered, pressed, oozy.',8],
    ['Garlic Bread','🥖',['bread','garlic','butter'],'Garlicky butter, crisp edges.',12],
    ['BLT Sandwich','🥪',['bread','bacon','lettuce','tomato'],'The classic three-layer stack.',12],
    ['Ham & Cheese Melt','🥪',['bread','ham','cheese','butter'],'Griddled until gooey.',10],
    ['Caprese Salad','🍅',['tomato','cheese','basil','olive_oil'],'Tomato, cheese, basil, drizzle.',8],
    ['Greek-ish Salad','🥗',['tomato','cucumber','onion','cheese','olive_oil'],'Crunchy, briny, fresh.',10],
    ['Garden Salad','🥗',['lettuce','tomato','cucumber','carrot'],'Toss it all, dress it light.',7],
    ['Guacamole','🥑',['avocado','tomato','onion','garlic','lemon'],'Smash and fold, big flavor.',10],
    ['Corn & Bean Salad','🌽',['corn','beans','tomato','onion','lemon'],'Zesty no-cook bowl.',12],
    ['Tomato Pasta','🍝',['pasta','tomato','garlic','onion','olive_oil'],'Simple simmered red sauce.',20],
    ['Spaghetti Bolognese','🍝',['pasta','beef','tomato','onion','garlic'],'Slow-simmered meat ragu.',30],
    ['Carbonara','🍝',['pasta','egg','bacon','cheese','garlic'],'Silky egg-and-cheese coat.',22],
    ['Mac & Cheese','🧀',['pasta','cheese','milk','butter'],'Cheesy baked comfort.',20],
    ['Shrimp Scampi Pasta','🍤',['pasta','shrimp','garlic','lemon','butter'],'Garlic-butter shrimp twirl.',20],
    ['Fried Rice','🍚',['rice','egg','onion','carrot','peas','soy_sauce'],'Hot wok, day-old rice.',18],
    ['Chicken Stir Fry','🍗',['chicken','pepper','broccoli','garlic','soy_sauce','rice'],'Fast, glossy, over rice.',25],
    ['Tofu Stir Fry','🍜',['tofu','broccoli','pepper','garlic','soy_sauce','rice'],'Crisp tofu, snappy veg.',22],
    ['Mushroom Risotto','🍄',['rice','mushroom','onion','garlic','cheese','butter'],'Stir slow, creamy reward.',35],
    ['Chicken Quesadilla','🌯',['tortilla','cheese','chicken','pepper','onion'],'Crisp, folded, melty.',15],
    ['Veggie Quesadilla','🌯',['tortilla','cheese','mushroom','spinach','onion'],'Meat-free and melty.',14],
    ['Bean Burrito','🌯',['tortilla','beans','cheese','rice','tomato'],'Wrap it, toast the seam.',16],
    ['Beef Tacos','🌮',['tortilla','beef','cheese','tomato','lettuce','onion'],'Pile high, fold, devour.',20],
    ['Loaded Baked Potato','🥔',['potato','cheese','bacon','butter'],'Fluffy inside, loaded top.',45],
    ['Mashed Potatoes','🥔',['potato','milk','butter'],'Buttery cloud of mash.',25],
    ['Potato Soup','🍲',['potato','onion','garlic','milk'],'Creamy, cozy, blended.',30],
    ['Tomato Soup','🍅',['tomato','onion','garlic','milk'],'Smooth and comforting.',25],
    ['Veggie Soup','🍲',['carrot','potato','onion','tomato','peas'],'Clean-out-the-crisper pot.',30],
    ['Chicken Noodle Soup','🍜',['chicken','carrot','onion','noodles'],'The feel-better classic.',30],
    ['Upgraded Ramen','🍜',['noodles','egg','soy_sauce','mushroom','spinach'],'Jazz up the instant pack.',15],
    ['Baked Salmon & Veg','🐟',['salmon','lemon','broccoli','potato'],'One-tray, lemony, easy.',30],
    ['Salmon Rice Bowl','🍣',['salmon','rice','avocado','soy_sauce','cucumber'],'Poke-style at home.',20],
    ['Stuffed Peppers','🫑',['pepper','rice','beef','tomato','onion','cheese'],'Baked, filled, bubbling.',45],
    ['Chicken Caesar-ish','🥗',['lettuce','chicken','cheese','bread'],'Crunchy croutons, big bowl.',18],
    ['Banana Oat Smoothie','🍌',['banana','oats','milk'],'Blend, sip, go.',5]
  ];

  // ---- state ----
  var selected={}, basicsOn=true;
  var grid=$('grid'), resultArea=$('resultArea');

  function buildGrid(){
    GRID.forEach(function(g){
      var h=document.createElement('div'); h.className='cat'; h.textContent=g.cat; grid.appendChild(h);
      var row=document.createElement('div'); row.className='chips';
      g.items.forEach(function(it){
        var b=document.createElement('button'); b.type='button'; b.className='chip'+(BASICS.indexOf(it[0])>=0?' basic':'');
        b.setAttribute('aria-pressed','false'); b.dataset.id=it[0];
        b.innerHTML='<span class="em" aria-hidden="true">'+it[2]+'</span>'+it[1];
        b.addEventListener('click', function(){ toggle(it[0], b); });
        row.appendChild(b);
      });
      grid.appendChild(row);
    });
  }
  function toggle(id,btn){
    selected[id]=!selected[id];
    btn.setAttribute('aria-pressed', selected[id]?'true':'false');
    render();
  }
  function selectedList(){ return Object.keys(selected).filter(function(k){return selected[k];}); }

  function available(){
    var a={}; selectedList().forEach(function(k){a[k]=1;});
    if(basicsOn) BASICS.forEach(function(k){a[k]=1;});
    return a;
  }

  function render(){
    var sel=selectedList();
    $('selCount').textContent=sel.length+' selected';
    var avail=available();

    var ready=[], almost=[];
    RECIPES.forEach(function(r){
      var ing=r[2];
      var missing=ing.filter(function(i){ return !avail[i]; });
      var matchedReal=ing.filter(function(i){ return selected[i]; }).length; // ignores basics for relevance
      var rec={name:r[0],ico:r[1],ing:ing,blurb:r[3],mins:r[4],missing:missing,matched:matchedReal};
      if(missing.length===0){ ready.push(rec); }
      else if(missing.length<=2 && matchedReal>=1){ almost.push(rec); }
    });
    // sort: ready = use the most of your fridge first, then quicker
    ready.sort(function(a,b){ return (b.matched-a.matched)||(a.mins-b.mins); });
    almost.sort(function(a,b){ return (a.missing.length-b.missing.length)||(b.matched-a.matched); });

    resultArea.innerHTML='';
    if(sel.length===0){
      resultArea.innerHTML='<div class="empty">Your fridge is empty 🤔<span>Tap the ingredients above to start cooking.</span></div>';
      return;
    }
    if(ready.length===0 && almost.length===0){
      resultArea.innerHTML='<div class="empty">No matches yet 🧐<span>Add a few more staples — try eggs, bread, pasta or rice.</span></div>';
      return;
    }
    if(ready.length) renderSection('You can make now', ready, 'ready');
    if(almost.length) renderSection('Almost — grab one or two more', almost.slice(0,12), 'almost');
  }

  function renderSection(title, list, kind){
    var h=document.createElement('div'); h.className='res-h'+(kind==='almost'?' almost':'');
    h.innerHTML=title+' <span class="n">'+list.length+'</span>';
    resultArea.appendChild(h);
    var cards=document.createElement('div'); cards.className='cards';
    list.forEach(function(r){
      var c=document.createElement('div'); c.className='card '+kind;
      var ingHtml=r.ing.map(function(i){
        var have=r.missing.indexOf(i)<0;
        return '<span class="ing '+(have?'have':'miss')+'"><span class="em" aria-hidden="true">'+(EMOJI[i]||'•')+'</span>'+(LABEL[i]||i)+'</span>';
      }).join('');
      var missLine = r.missing.length ? '<div class="miss-line">need: '+r.missing.map(function(i){return LABEL[i]||i;}).join(', ')+'</div>' : '';
      c.innerHTML='<div class="top"><span class="ico" aria-hidden="true">'+r.ico+'</span>'+
        '<h3>'+r.name+'</h3><span class="mins">⏱ '+r.mins+'m</span></div>'+
        '<div class="blurb">'+r.blurb+'</div><div class="ings">'+ingHtml+'</div>'+missLine;
      cards.appendChild(c);
    });
    resultArea.appendChild(cards);
  }

  // ---- controls ----
  $('basicsChk').addEventListener('change', function(e){ basicsOn=e.target.checked; render(); });
  $('clearBtn').addEventListener('click', function(){
    selected={}; document.querySelectorAll('.chip[aria-pressed="true"]').forEach(function(b){ b.setAttribute('aria-pressed','false'); });
    render();
  });
  $('surpriseBtn').addEventListener('click', function(){
    // pick a random recipe, select its (non-basic) ingredients
    var r=RECIPES[Math.floor(Math.random()*RECIPES.length)];
    selected={}; r[2].forEach(function(i){ if(BASICS.indexOf(i)<0) selected[i]=true; });
    document.querySelectorAll('.chip').forEach(function(b){ b.setAttribute('aria-pressed', selected[b.dataset.id]?'true':'false'); });
    render();
  });

  buildGrid();
  $('recipeCount').textContent=RECIPES.length+' recipes · '+Object.keys(LABEL).length+' ingredients';
  render();
})();
</script>
</body>
</html>
