<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Phantasm Finder</title>
<link rel="icon" href="https://emojicdn.elk.sh/👻">
<meta property="og:title" content="Phantasm Finder">
<meta property="og:description" content="Hunt glitchy ghosts and trap them in neon containment fields. Don't let them escape.">
<meta property="og:url" content="https://app.sloppy.live/phantasm-finder/">
<meta property="og:image" content="https://emojicdn.elk.sh/👻?style=google">
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#04060c;overflow:hidden;touch-action:none;cursor:crosshair}
canvas{display:block;position:fixed;top:0;left:0}
#hud{
  position:fixed;top:8px;left:0;right:0;
  display:flex;justify-content:center;gap:24px;
  font-family:'Share Tech Mono',monospace;font-size:0.6rem;
  color:rgba(0,255,170,0.5);pointer-events:none;z-index:2;
}
.hud-block{text-align:center}
.hud-val{font-family:'Creepster',cursive;font-size:1.1rem}
.hud-val.score{color:rgba(0,255,170,0.7)}
.hud-val.ghosts{color:rgba(170,100,255,0.7)}
.hud-val.energy{color:rgba(0,200,255,0.7)}
.hud-label{font-size:0.4rem;letter-spacing:0.1em;color:rgba(0,255,170,0.3)}
#screen{
  position:fixed;top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(4,6,12,0.94);z-index:10;text-align:center;padding:20px;
}
#screen.hidden{display:none}
#screen h1{font-family:'Creepster',cursive;font-size:clamp(2rem,6vw,3.5rem);color:#aa66ff;margin-bottom:6px;letter-spacing:0.05em}
#screen p{font-family:'Share Tech Mono',monospace;font-size:0.55rem;color:#445;margin-bottom:6px;line-height:1.8}
.play-btn{
  padding:12px 28px;border:2px solid #aa66ff;border-radius:4px;
  background:transparent;color:#aa66ff;font-family:'Creepster',cursive;
  font-size:1rem;cursor:pointer;transition:all 0.2s;margin-top:10px;letter-spacing:0.05em;
}
.play-btn:hover{background:#aa66ff;color:#04060c}
#final{font-family:'Creepster',cursive;font-size:2rem;color:#00ffaa;margin:8px 0}
#back a{color:#223;text-decoration:none;font-family:'Share Tech Mono',monospace;font-size:0.45rem}
</style>
</head>
<body>
<div id="hud">
  <div class="hud-block"><div class="hud-val score" id="h-score">0</div><div class="hud-label">Captured</div></div>
  <div class="hud-block"><div class="hud-val ghosts" id="h-ghosts">0</div><div class="hud-label">Roaming</div></div>
  <div class="hud-block"><div class="hud-val energy" id="h-energy">100</div><div class="hud-label">Energy</div></div>
</div>
<canvas id="c"></canvas>
<div id="screen">
  <h1>Phantasm Finder</h1>
  <p>Click & hold to deploy neon traps.<br>Catch ghosts before they phase out.<br>Each ghost drains energy — manage wisely.</p>
  <button class="play-btn" onclick="startGame()">Hunt Ghosts</button>
</div>
<div id="screen2" class="hidden">
  <h1 style="color:#ff4466">Game Over</h1>
  <div id="final">0</div>
  <p id="final-msg"></p>
  <button class="play-btn" onclick="startGame()">Hunt Again</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

let state = 'menu', frame = 0;
let score = 0, energy = 100, escaped = 0;
let ghosts = [], traps = [], particles = [], glitchLines = [];
let mouseX = 0, mouseY = 0, mouseDown = false;
let spawnTimer = 0, difficulty = 1, wave = 1;

const GHOST_TYPES = [
  { name: 'wisp', color: [170,100,255], speed: 1.5, hp: 1, points: 100, size: 18, jitter: 3 },
  { name: 'shade', color: [100,200,255], speed: 1, hp: 2, points: 200, size: 24, jitter: 2 },
  { name: 'wraith', color: [255,100,150], speed: 2, hp: 1, points: 150, size: 16, jitter: 5 },
  { name: 'phantom', color: [0,255,170], speed: 0.8, hp: 3, points: 350, size: 30, jitter: 1 },
  { name: 'glitch', color: [255,255,100], speed: 2.5, hp: 1, points: 250, size: 14, jitter: 8 },
];

function createGhost() {
  const type = GHOST_TYPES[Math.floor(Math.random() * Math.min(2 + Math.floor(difficulty), GHOST_TYPES.length))];
  const side = Math.floor(Math.random() * 4);
  let x, y;
  if (side === 0) { x = -30; y = Math.random() * H; }
  else if (side === 1) { x = W + 30; y = Math.random() * H; }
  else if (side === 2) { x = Math.random() * W; y = -30; }
  else { x = Math.random() * W; y = H + 30; }

  return {
    x, y, type,
    vx: (Math.random() - 0.5) * type.speed,
    vy: (Math.random() - 0.5) * type.speed,
    hp: type.hp,
    phase: Math.random() * Math.PI * 2,
    glitchTimer: 0,
    opacity: 0,
    fadeIn: true,
    alive: true,
    lifetime: 300 + Math.random() * 300,
    trail: [],
    wobble: Math.random() * Math.PI * 2
  };
}

function drawGhost(g) {
  const t = g.type;
  const c = t.color;
  const glitch = g.glitchTimer > 0;
  const a = g.opacity * (0.5 + Math.sin(frame * 0.05 + g.phase) * 0.15);

  ctx.save();

  // Ghost trail
  g.trail.forEach((tr, i) => {
    const ta = (i / g.trail.length) * a * 0.15;
    ctx.fillStyle = `rgba(${c[0]},${c[1]},${c[2]},${ta})`;
    ctx.beginPath();
    ctx.arc(tr.x, tr.y, t.size * 0.4 * (i / g.trail.length), 0, Math.PI * 2);
    ctx.fill();
  });

  const gx = glitch ? (Math.random() - 0.5) * t.jitter * 3 : 0;
  const gy = glitch ? (Math.random() - 0.5) * t.jitter * 3 : 0;
  ctx.translate(g.x + gx, g.y + gy);

  // Glow
  ctx.shadowColor = `rgba(${c[0]},${c[1]},${c[2]},0.5)`;
  ctx.shadowBlur = 15 + (glitch ? 10 : 0);

  // Body
  const wobble = Math.sin(frame * 0.04 + g.wobble) * 3;
  ctx.fillStyle = `rgba(${c[0]},${c[1]},${c[2]},${a * 0.2})`;
  ctx.strokeStyle = `rgba(${c[0]},${c[1]},${c[2]},${a * 0.7})`;
  ctx.lineWidth = 1.5;

  ctx.beginPath();
  ctx.moveTo(0, -t.size);
  ctx.quadraticCurveTo(t.size + wobble, -t.size * 0.5, t.size, t.size * 0.3);
  // Wavy bottom
  const waves = 4;
  for (let i = 0; i < waves; i++) {
    const wx = t.size - (i * 2 * t.size / waves);
    const wy = t.size * 0.3 + Math.sin(frame * 0.08 + i + g.phase) * 4 + 6;
    const cx = t.size - ((i + 0.5) * 2 * t.size / waves);
    ctx.quadraticCurveTo(cx, wy + 4, wx - 2 * t.size / waves, wy);
  }
  ctx.quadraticCurveTo(-t.size - wobble, -t.size * 0.5, 0, -t.size);
  ctx.fill();
  ctx.stroke();

  // Eyes
  const eyeY = -t.size * 0.2;
  const eyeSpread = t.size * 0.3;
  ctx.fillStyle = `rgba(${c[0]},${c[1]},${c[2]},${a})`;
  ctx.beginPath();
  ctx.arc(-eyeSpread, eyeY, t.size * 0.15, 0, Math.PI * 2);
  ctx.arc(eyeSpread, eyeY, t.size * 0.15, 0, Math.PI * 2);
  ctx.fill();

  // Pupils (follow trap direction if nearby)
  ctx.fillStyle = `rgba(${Math.min(255, c[0] + 80)},${Math.min(255, c[1] + 80)},${Math.min(255, c[2] + 80)},${a})`;
  ctx.beginPath();
  ctx.arc(-eyeSpread + Math.sin(frame * 0.02) * 1.5, eyeY, t.size * 0.06, 0, Math.PI * 2);
  ctx.arc(eyeSpread + Math.sin(frame * 0.02) * 1.5, eyeY, t.size * 0.06, 0, Math.PI * 2);
  ctx.fill();

  // RGB split glitch
  if (glitch) {
    ctx.globalAlpha = 0.2;
    ctx.fillStyle = `rgba(255,0,0,0.15)`;
    ctx.beginPath();
    ctx.arc(gx * 2, gy, t.size * 0.7, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = `rgba(0,0,255,0.15)`;
    ctx.beginPath();
    ctx.arc(-gx * 2, -gy, t.size * 0.7, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Scanlines
    for (let i = 0; i < 3; i++) {
      ctx.fillStyle = `rgba(${c[0]},${c[1]},${c[2]},0.3)`;
      ctx.fillRect(-t.size, -t.size + Math.random() * t.size * 2, t.size * 2, 1);
    }
  }

  ctx.shadowBlur = 0;
  ctx.restore();
}

// Traps
function createTrap(x, y) {
  return {
    x, y,
    radius: 0,
    maxRadius: 60,
    growSpeed: 2,
    life: 40,
    maxLife: 40,
    active: true,
    color: [0 + Math.random() * 50, 200 + Math.random() * 55, 200 + Math.random() * 55]
  };
}

function drawTrap(trap) {
  const a = trap.life / trap.maxLife;
  const c = trap.color;
  const pulse = Math.sin(frame * 0.15) * 0.15;

  ctx.save();

  // Outer ring
  ctx.strokeStyle = `rgba(${c[0]},${c[1]},${c[2]},${a * (0.4 + pulse)})`;
  ctx.lineWidth = 2;
  ctx.shadowColor = `rgba(${c[0]},${c[1]},${c[2]},0.5)`;
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.arc(trap.x, trap.y, trap.radius, 0, Math.PI * 2);
  ctx.stroke();

  // Inner ring
  ctx.strokeStyle = `rgba(${c[0]},${c[1]},${c[2]},${a * 0.2})`;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(trap.x, trap.y, trap.radius * 0.6, 0, Math.PI * 2);
  ctx.stroke();

  // Cross pattern
  ctx.strokeStyle = `rgba(${c[0]},${c[1]},${c[2]},${a * 0.15})`;
  ctx.lineWidth = 0.5;
  for (let i = 0; i < 4; i++) {
    const ang = (i / 4) * Math.PI * 2 + frame * 0.02;
    ctx.beginPath();
    ctx.moveTo(trap.x, trap.y);
    ctx.lineTo(trap.x + Math.cos(ang) * trap.radius, trap.y + Math.sin(ang) * trap.radius);
    ctx.stroke();
  }

  // Fill glow
  const grad = ctx.createRadialGradient(trap.x, trap.y, 0, trap.x, trap.y, trap.radius);
  grad.addColorStop(0, `rgba(${c[0]},${c[1]},${c[2]},${a * 0.06})`);
  grad.addColorStop(1, `rgba(${c[0]},${c[1]},${c[2]},0)`);
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(trap.x, trap.y, trap.radius, 0, Math.PI * 2);
  ctx.fill();

  // Electric arcs
  if (a > 0.3) {
    ctx.strokeStyle = `rgba(${c[0]},${c[1]},${c[2]},${a * 0.5})`;
    ctx.lineWidth = 1;
    for (let i = 0; i < 3; i++) {
      const ang = Math.random() * Math.PI * 2;
      const r1 = trap.radius * 0.3;
      const r2 = trap.radius * 0.9;
      ctx.beginPath();
      ctx.moveTo(trap.x + Math.cos(ang) * r1, trap.y + Math.sin(ang) * r1);
      const mid = ang + (Math.random() - 0.5) * 0.5;
      ctx.quadraticCurveTo(
        trap.x + Math.cos(mid) * (r1 + r2) / 2 + (Math.random() - 0.5) * 15,
        trap.y + Math.sin(mid) * (r1 + r2) / 2 + (Math.random() - 0.5) * 15,
        trap.x + Math.cos(ang + (Math.random() - 0.5) * 0.8) * r2,
        trap.y + Math.sin(ang + (Math.random() - 0.5) * 0.8) * r2
      );
      ctx.stroke();
    }
  }

  ctx.shadowBlur = 0;
  ctx.restore();
}

function spawnCaptureEffect(x, y, color) {
  for (let i = 0; i < 20; i++) {
    const a = (i / 20) * Math.PI * 2;
    particles.push({
      x, y,
      vx: Math.cos(a) * (2 + Math.random() * 3),
      vy: Math.sin(a) * (2 + Math.random() * 3),
      life: 25 + Math.random() * 15,
      maxLife: 40,
      size: 2 + Math.random() * 3,
      color
    });
  }
  // Glitch lines
  for (let i = 0; i < 6; i++) {
    glitchLines.push({
      y: y - 30 + Math.random() * 60,
      w: 30 + Math.random() * 80,
      x: x - 40 + Math.random() * 80,
      life: 8,
      color
    });
  }
}

window.startGame = function() {
  state = 'playing';
  score = 0; energy = 100; escaped = 0; frame = 0; difficulty = 1; wave = 1;
  ghosts = []; traps = []; particles = []; glitchLines = []; spawnTimer = 0;
  document.getElementById('screen').classList.add('hidden');
  document.getElementById('screen2').classList.add('hidden');
  updateHUD();
};

function gameOver() {
  state = 'over';
  document.getElementById('final').textContent = score + ' ghosts';
  const msgs = ['The spirits rest... for now.', 'Not bad, hunter.', 'Impressive haul!', 'Master ghostbuster!', 'LEGENDARY HUNTER!'];
  document.getElementById('final-msg').textContent = msgs[Math.min(msgs.length - 1, Math.floor(score / 5))];
  document.getElementById('screen2').classList.remove('hidden');
}

function updateHUD() {
  document.getElementById('h-score').textContent = score;
  document.getElementById('h-ghosts').textContent = ghosts.filter(g => g.alive).length;
  document.getElementById('h-energy').textContent = Math.floor(energy);
}

function update() {
  if (state !== 'playing') return;
  frame++;
  difficulty = 1 + frame * 0.0004;

  // Spawn ghosts
  spawnTimer++;
  const rate = Math.max(40, 120 - difficulty * 8);
  if (spawnTimer >= rate) {
    spawnTimer = 0;
    ghosts.push(createGhost());
    if (difficulty > 3 && Math.random() < 0.3) ghosts.push(createGhost());
  }

  // Energy regen
  if (!mouseDown) energy = Math.min(100, energy + 0.08);

  // Deploy trap on click
  if (mouseDown && energy >= 2) {
    if (frame % 6 === 0) {
      traps.push(createTrap(mouseX, mouseY));
      energy -= 2;
    }
  }

  // Update ghosts
  ghosts.forEach(g => {
    if (!g.alive) return;

    // Fade in
    if (g.fadeIn) {
      g.opacity = Math.min(1, g.opacity + 0.03);
      if (g.opacity >= 1) g.fadeIn = false;
    }

    // Movement with jitter
    g.phase += 0.02;
    g.x += g.vx + Math.sin(g.phase) * g.type.jitter * 0.3;
    g.y += g.vy + Math.cos(g.phase * 0.7) * g.type.jitter * 0.3;

    // Wander toward center-ish
    const cx = W / 2 + Math.sin(frame * 0.003 + g.phase) * W * 0.3;
    const cy = H / 2 + Math.cos(frame * 0.004 + g.phase) * H * 0.3;
    g.vx += (cx - g.x) * 0.0003;
    g.vy += (cy - g.y) * 0.0003;
    g.vx *= 0.99;
    g.vy *= 0.99;

    // Trail
    if (frame % 3 === 0) g.trail.push({ x: g.x, y: g.y });
    if (g.trail.length > 12) g.trail.shift();

    // Glitch timer decay
    if (g.glitchTimer > 0) g.glitchTimer--;

    // Lifetime — ghost phases out
    g.lifetime--;
    if (g.lifetime < 40) g.opacity = g.lifetime / 40;
    if (g.lifetime <= 0) {
      g.alive = false;
      escaped++;
      if (escaped >= 10) gameOver();
    }
  });

  // Update traps
  traps.forEach(trap => {
    if (trap.radius < trap.maxRadius) trap.radius += trap.growSpeed;
    trap.life--;
    if (trap.life <= 0) trap.active = false;

    // Check ghost capture
    ghosts.forEach(g => {
      if (!g.alive || !trap.active) return;
      const d = Math.hypot(g.x - trap.x, g.y - trap.y);
      if (d < trap.radius) {
        g.hp--;
        g.glitchTimer = 10;
        if (g.hp <= 0) {
          g.alive = false;
          score++;
          spawnCaptureEffect(g.x, g.y, g.type.color);
          // Bonus energy
          energy = Math.min(100, energy + 5);
        }
      }
    });
  });
  traps = traps.filter(t => t.active);

  // Clean dead ghosts
  ghosts = ghosts.filter(g => g.alive || g.opacity > 0);

  // Particles
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vx *= 0.96; p.vy *= 0.96; p.life--; });
  particles = particles.filter(p => p.life > 0);

  // Glitch lines
  glitchLines.forEach(g => g.life--);
  glitchLines = glitchLines.filter(g => g.life > 0);

  if (frame % 10 === 0) updateHUD();
}

function draw() {
  ctx.fillStyle = '#04060c';
  ctx.fillRect(0, 0, W, H);

  // Subtle grid
  ctx.strokeStyle = 'rgba(170,100,255,0.012)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x < W; x += 50) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }
  for (let y = 0; y < H; y += 50) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }

  if (state === 'menu') return;

  // Traps
  traps.forEach(drawTrap);

  // Ghosts
  ghosts.forEach(g => { if (g.alive || g.opacity > 0.01) drawGhost(g); });

  // Particles
  particles.forEach(p => {
    const a = p.life / p.maxLife;
    ctx.fillStyle = `rgba(${p.color[0]},${p.color[1]},${p.color[2]},${a * 0.7})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * a, 0, Math.PI * 2);
    ctx.fill();
  });

  // Glitch lines
  glitchLines.forEach(g => {
    const a = g.life / 8;
    ctx.fillStyle = `rgba(${g.color[0]},${g.color[1]},${g.color[2]},${a * 0.3})`;
    ctx.fillRect(g.x, g.y, g.w, 2);
  });

  // Energy bar (bottom)
  const barW = 150, barH = 4;
  const bx = W / 2 - barW / 2, by = H - 20;
  ctx.fillStyle = 'rgba(0,200,255,0.1)';
  ctx.fillRect(bx, by, barW, barH);
  ctx.fillStyle = energy > 20 ? 'rgba(0,200,255,0.4)' : 'rgba(255,60,60,0.5)';
  ctx.fillRect(bx, by, barW * (energy / 100), barH);

  // Crosshair
  ctx.strokeStyle = mouseDown ? 'rgba(0,255,170,0.6)' : 'rgba(170,100,255,0.3)';
  ctx.lineWidth = 1;
  const ch = 12;
  ctx.beginPath();
  ctx.moveTo(mouseX - ch, mouseY); ctx.lineTo(mouseX - ch / 3, mouseY);
  ctx.moveTo(mouseX + ch / 3, mouseY); ctx.lineTo(mouseX + ch, mouseY);
  ctx.moveTo(mouseX, mouseY - ch); ctx.lineTo(mouseX, mouseY - ch / 3);
  ctx.moveTo(mouseX, mouseY + ch / 3); ctx.lineTo(mouseX, mouseY + ch);
  ctx.stroke();
  if (mouseDown) {
    ctx.strokeStyle = 'rgba(0,255,170,0.15)';
    ctx.beginPath();
    ctx.arc(mouseX, mouseY, 20 + Math.sin(frame * 0.1) * 3, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Escaped warning
  if (escaped > 0) {
    ctx.fillStyle = `rgba(255,60,60,${0.3 + Math.sin(frame * 0.05) * 0.1})`;
    ctx.font = '10px "Share Tech Mono"';
    ctx.textAlign = 'center';
    ctx.fillText(`${escaped}/10 escaped`, W / 2, H - 30);
  }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }

canvas.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
canvas.addEventListener('mousedown', () => { mouseDown = true; });
canvas.addEventListener('mouseup', () => { mouseDown = false; });
canvas.addEventListener('touchstart', e => { mouseDown = true; mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; }, { passive: true });
canvas.addEventListener('touchmove', e => { e.preventDefault(); mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; }, { passive: false });
canvas.addEventListener('touchend', () => { mouseDown = false; });

loop();
</script>
</body>
</html>
