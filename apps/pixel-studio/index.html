<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pixel Studio</title>
<link rel="icon" href="https://emojicdn.elk.sh/🎨">
<meta property="og:title" content="Pixel Studio">
<meta property="og:description" content="Quick image editor — upload, crop, adjust brightness, and apply filters.">
<meta property="og:url" content="https://sloppy.live/pixel-studio/">
<meta property="og:image" content="https://sloppy.live/pixel-studio/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:#111116;color:#e0e0e0;font-family:'DM Sans',sans-serif}

#app{display:flex;height:100vh;flex-direction:column}

/* Toolbar */
#toolbar{display:flex;align-items:center;gap:6px;padding:6px 12px;background:#1a1a22;border-bottom:1px solid #2a2a35;flex-shrink:0;flex-wrap:wrap}
#toolbar button{background:#25253a;border:1px solid #35354a;color:#c0c0d0;padding:6px 14px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap}
#toolbar button:hover{background:#33335a;border-color:#5050aa}
#toolbar button.active{background:#4040aa;border-color:#6060cc;color:#fff}
#toolbar .sep{width:1px;height:24px;background:#2a2a35;margin:0 4px}
#toolbar .spacer{flex:1}

/* Canvas area */
#canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;background:#0a0a0f}
#canvas-wrap canvas{max-width:95%;max-height:95%;object-fit:contain;image-rendering:auto}
#preview{display:block}

/* Crop overlay */
#crop-overlay{position:absolute;inset:0;display:none;cursor:crosshair;z-index:5}
#crop-overlay.show{display:block}
#crop-box{position:absolute;border:2px dashed rgba(100,150,255,.8);background:rgba(100,150,255,.08);pointer-events:none}
#crop-dimmer-top,#crop-dimmer-bottom,#crop-dimmer-left,#crop-dimmer-right{position:absolute;background:rgba(0,0,0,.55);pointer-events:none}

/* Sidebar / panels */
#sidebar{position:fixed;right:0;top:0;bottom:0;width:240px;background:#15151e;border-left:1px solid #2a2a35;transform:translateX(100%);transition:transform .2s;z-index:20;display:flex;flex-direction:column;overflow-y:auto}
#sidebar.open{transform:translateX(0)}
#sidebar h3{font-size:13px;color:#888;text-transform:uppercase;letter-spacing:1px;padding:14px 14px 8px;font-family:'DM Mono',monospace;font-weight:500}
.slider-row{padding:4px 14px 10px;display:flex;flex-direction:column;gap:4px}
.slider-row label{font-size:11px;color:#999;display:flex;justify-content:space-between;font-family:'DM Mono',monospace}
.slider-row input[type=range]{width:100%;accent-color:#6060cc}
.filter-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;padding:6px 14px 14px}
.filter-btn{background:#1e1e2e;border:1px solid #2a2a40;border-radius:6px;padding:8px 6px;color:#bbb;font-size:11px;font-family:'DM Mono',monospace;cursor:pointer;text-align:center}
.filter-btn:hover{background:#2a2a45;border-color:#5050aa}
.filter-btn.active{background:#35358a;border-color:#6060cc;color:#fff}

/* Upload zone */
#upload-zone{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;color:#555;cursor:pointer}
#upload-zone.has-image{display:none}
#upload-zone .icon{font-size:48px;opacity:.3}
#upload-zone p{font-size:13px;font-family:'DM Mono',monospace}
#file-input{display:none}

/* Download bar */
#dl-bar{padding:8px 14px}
#dl-bar button{width:100%;background:#4040aa;border:none;color:#fff;padding:8px;border-radius:6px;font-family:'DM Sans',sans-serif;font-size:13px;cursor:pointer}
#dl-bar button:hover{background:#5050cc}

@media(max-width:600px){
  #toolbar{gap:4px;padding:4px 8px}
  #toolbar button{padding:6px 10px;font-size:11px}
  #sidebar{width:200px}
}
</style>
</head>
<body>
<div id="app">
  <div id="toolbar">
    <button id="upload-btn" title="Upload image">📂 Upload</button>
    <div class="sep"></div>
    <button id="crop-btn" title="Crop tool">✂️ Crop</button>
    <button id="adjust-btn" title="Adjustments">🔆 Adjust</button>
    <button id="filter-btn" title="Filters">🎭 Filters</button>
    <div class="sep"></div>
    <button id="undo-btn" title="Undo">↩ Undo</button>
    <button id="reset-btn" title="Reset to original">🔄 Reset</button>
    <span class="spacer"></span>
    <button id="save-btn" title="Download edited image">💾 Save</button>
  </div>
  <div id="canvas-wrap">
    <div id="upload-zone" onclick="document.getElementById('file-input').click()">
      <div class="icon">📷</div>
      <p>Click or drop an image to start editing</p>
    </div>
    <canvas id="preview"></canvas>
    <div id="crop-overlay">
      <div id="crop-dimmer-top"></div>
      <div id="crop-dimmer-bottom"></div>
      <div id="crop-dimmer-left"></div>
      <div id="crop-dimmer-right"></div>
      <div id="crop-box"></div>
    </div>
  </div>
  <input type="file" id="file-input" accept="image/*">
</div>

<div id="sidebar">
  <div id="adjust-panel" style="display:none">
    <h3>Adjustments</h3>
    <div class="slider-row">
      <label>Brightness <span id="bright-val">0</span></label>
      <input type="range" id="sl-brightness" min="-100" max="100" value="0">
    </div>
    <div class="slider-row">
      <label>Contrast <span id="contrast-val">0</span></label>
      <input type="range" id="sl-contrast" min="-100" max="100" value="0">
    </div>
    <div class="slider-row">
      <label>Saturation <span id="sat-val">0</span></label>
      <input type="range" id="sl-saturation" min="-100" max="100" value="0">
    </div>
  </div>
  <div id="filter-panel" style="display:none">
    <h3>Filters</h3>
    <div class="filter-grid">
      <div class="filter-btn active" data-filter="none">None</div>
      <div class="filter-btn" data-filter="grayscale">Grayscale</div>
      <div class="filter-btn" data-filter="sepia">Sepia</div>
      <div class="filter-btn" data-filter="invert">Invert</div>
      <div class="filter-btn" data-filter="vintage">Vintage</div>
      <div class="filter-btn" data-filter="cool">Cool</div>
      <div class="filter-btn" data-filter="warm">Warm</div>
      <div class="filter-btn" data-filter="noir">Noir</div>
    </div>
  </div>
  <div id="dl-bar">
    <button id="dl-btn">⬇ Download PNG</button>
  </div>
</div>
<script>
const CV=document.getElementById('preview'),X=CV.getContext('2d',{willReadFrequently:true});
let origImg=null; // original Image element
let origData=null; // original ImageData (after crop)
let currentFilter='none';
let brightness=0,contrast=0,saturation=0;
let undoStack=[];
let hasImage=false;

// Upload
document.getElementById('file-input').addEventListener('change',e=>{
  let file=e.target.files[0];
  if(!file) return;
  loadImageFile(file);
});

// Drag and drop
const cw=document.getElementById('canvas-wrap');
cw.addEventListener('dragover',e=>{e.preventDefault();e.dataTransfer.dropEffect='copy';});
cw.addEventListener('drop',e=>{
  e.preventDefault();
  let file=e.dataTransfer.files[0];
  if(file&&file.type.startsWith('image/')) loadImageFile(file);
});

function loadImageFile(file){
  let reader=new FileReader();
  reader.onload=ev=>{
    let img=new Image();
    img.onload=()=>{
      origImg=img;
      // Fit to reasonable size
      let maxW=1600,maxH=1200;
      let w=img.width,h=img.height;
      if(w>maxW){h=h*(maxW/w);w=maxW;}
      if(h>maxH){w=w*(maxH/h);h=maxH;}
      CV.width=Math.round(w);CV.height=Math.round(h);
      X.drawImage(img,0,0,CV.width,CV.height);
      origData=X.getImageData(0,0,CV.width,CV.height);
      undoStack=[cloneImageData(origData)];
      hasImage=true;
      document.getElementById('upload-zone').classList.add('has-image');
      CV.style.display='block';
      resetAdjustments();
      applyAll();
    };
    img.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

function cloneImageData(imgData){
  return new ImageData(new Uint8ClampedArray(imgData.data),imgData.width,imgData.height);
}

// Adjustments
function resetAdjustments(){
  brightness=0;contrast=0;saturation=0;currentFilter='none';
  document.getElementById('sl-brightness').value=0;
  document.getElementById('sl-contrast').value=0;
  document.getElementById('sl-saturation').value=0;
  document.getElementById('bright-val').textContent='0';
  document.getElementById('contrast-val').textContent='0';
  document.getElementById('sat-val').textContent='0';
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.toggle('active',b.dataset.filter==='none'));
}

function applyAll(){
  if(!origData) return;
  let src=origData.data;
  let out=X.createImageData(origData.width,origData.height);
  let dst=out.data;
  let bri=brightness/100;
  let con=contrast/100;
  let conF=(1+con)/(1-con+0.01);
  let sat=1+saturation/100;

  for(let i=0;i<src.length;i+=4){
    let r=src[i],g=src[i+1],b=src[i+2];

    // Brightness
    r+=bri*255; g+=bri*255; b+=bri*255;

    // Contrast
    r=conF*(r-128)+128;
    g=conF*(g-128)+128;
    b=conF*(b-128)+128;

    // Saturation
    let gray=0.299*r+0.587*g+0.114*b;
    r=gray+(r-gray)*sat;
    g=gray+(g-gray)*sat;
    b=gray+(b-gray)*sat;

    // Filters
    if(currentFilter==='grayscale'){
      let v=0.299*r+0.587*g+0.114*b;
      r=g=b=v;
    } else if(currentFilter==='sepia'){
      let tr=r*0.393+g*0.769+b*0.189;
      let tg=r*0.349+g*0.686+b*0.168;
      let tb=r*0.272+g*0.534+b*0.131;
      r=tr;g=tg;b=tb;
    } else if(currentFilter==='invert'){
      r=255-r;g=255-g;b=255-b;
    } else if(currentFilter==='vintage'){
      let v=0.299*r+0.587*g+0.114*b;
      r=v*1.1+20;g=v*0.9+10;b=v*0.7;
    } else if(currentFilter==='cool'){
      r*=0.9;b*=1.15;
    } else if(currentFilter==='warm'){
      r*=1.15;g*=1.05;b*=0.85;
    } else if(currentFilter==='noir'){
      let v=0.299*r+0.587*g+0.114*b;
      v=v<128?v*0.7:v*1.1;
      r=g=b=v;
    }

    dst[i]=Math.max(0,Math.min(255,r));
    dst[i+1]=Math.max(0,Math.min(255,g));
    dst[i+2]=Math.max(0,Math.min(255,b));
    dst[i+3]=src[i+3];
  }
  X.putImageData(out,0,0);
}

// Slider events
['brightness','contrast','saturation'].forEach(name=>{
  let sl=document.getElementById('sl-'+name);
  let val=document.getElementById(name==='brightness'?'bright-val':name==='contrast'?'contrast-val':'sat-val');
  sl.addEventListener('input',()=>{
    let v=parseInt(sl.value);
    val.textContent=v;
    if(name==='brightness') brightness=v;
    else if(name==='contrast') contrast=v;
    else saturation=v;
    applyAll();
  });
});

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter=btn.dataset.filter;
    applyAll();
  });
});

// Crop tool
let cropMode=false;
let cropStart=null,cropEnd=null,cropping=false;
const cropOverlay=document.getElementById('crop-overlay');
const cropBox=document.getElementById('crop-box');

function getCanvasRect(){return CV.getBoundingClientRect();}

function screenToCanvas(sx,sy){
  let r=getCanvasRect();
  let x=(sx-r.left)/r.width*CV.width;
  let y=(sy-r.top)/r.height*CV.height;
  return{x:Math.max(0,Math.min(CV.width,x)),y:Math.max(0,Math.min(CV.height,y))};
}

function updateCropVisuals(){
  if(!cropStart||!cropEnd) return;
  let r=getCanvasRect();
  let x1=Math.min(cropStart.x,cropEnd.x)/CV.width*r.width+r.left;
  let y1=Math.min(cropStart.y,cropEnd.y)/CV.height*r.height+r.top;
  let x2=Math.max(cropStart.x,cropEnd.x)/CV.width*r.width+r.left;
  let y2=Math.max(cropStart.y,cropEnd.y)/CV.height*r.height+r.top;

  // Offset relative to crop overlay parent (canvas-wrap)
  let pr=document.getElementById('canvas-wrap').getBoundingClientRect();
  x1-=pr.left;y1-=pr.top;x2-=pr.left;y2-=pr.top;

  cropBox.style.left=x1+'px';cropBox.style.top=y1+'px';
  cropBox.style.width=(x2-x1)+'px';cropBox.style.height=(y2-y1)+'px';

  let dt=document.getElementById('crop-dimmer-top');
  let db=document.getElementById('crop-dimmer-bottom');
  let dl=document.getElementById('crop-dimmer-left');
  let dr=document.getElementById('crop-dimmer-right');
  dt.style.left='0';dt.style.top='0';dt.style.right='0';dt.style.height=y1+'px';
  db.style.left='0';db.style.bottom='0';db.style.right='0';db.style.top=y2+'px';
  dl.style.left='0';dl.style.top=y1+'px';dl.style.width=x1+'px';dl.style.height=(y2-y1)+'px';
  dr.style.right='0';dr.style.top=y1+'px';dr.style.left=x2+'px';dr.style.height=(y2-y1)+'px';
}

cropOverlay.addEventListener('mousedown',e=>{
  cropStart=screenToCanvas(e.clientX,e.clientY);
  cropEnd={...cropStart};
  cropping=true;
  updateCropVisuals();
});
cropOverlay.addEventListener('mousemove',e=>{
  if(!cropping) return;
  cropEnd=screenToCanvas(e.clientX,e.clientY);
  updateCropVisuals();
});
cropOverlay.addEventListener('mouseup',e=>{
  if(!cropping) return;
  cropping=false;
  cropEnd=screenToCanvas(e.clientX,e.clientY);
  updateCropVisuals();
  applyCrop();
});

// Touch crop
cropOverlay.addEventListener('touchstart',e=>{
  e.preventDefault();let t=e.touches[0];
  cropStart=screenToCanvas(t.clientX,t.clientY);
  cropEnd={...cropStart};cropping=true;updateCropVisuals();
},{passive:false});
cropOverlay.addEventListener('touchmove',e=>{
  e.preventDefault();if(!cropping)return;let t=e.touches[0];
  cropEnd=screenToCanvas(t.clientX,t.clientY);updateCropVisuals();
},{passive:false});
cropOverlay.addEventListener('touchend',e=>{
  e.preventDefault();if(!cropping)return;cropping=false;
  updateCropVisuals();applyCrop();
},{passive:false});

function applyCrop(){
  if(!cropStart||!cropEnd) return;
  let x1=Math.round(Math.min(cropStart.x,cropEnd.x));
  let y1=Math.round(Math.min(cropStart.y,cropEnd.y));
  let x2=Math.round(Math.max(cropStart.x,cropEnd.x));
  let y2=Math.round(Math.max(cropStart.y,cropEnd.y));
  let cw=x2-x1,ch=y2-y1;
  if(cw<10||ch<10){
    exitCropMode();
    return;
  }
  // Push undo
  undoStack.push(cloneImageData(origData));
  if(undoStack.length>20) undoStack.shift();
  // Get cropped data from current render
  let cropped=X.getImageData(x1,y1,cw,ch);
  CV.width=cw;CV.height=ch;
  origData=cropped;
  applyAll();
  exitCropMode();
}

function exitCropMode(){
  cropMode=false;
  cropStart=null;cropEnd=null;
  cropOverlay.classList.remove('show');
  document.getElementById('crop-btn').classList.remove('active');
  cropBox.style.width='0';cropBox.style.height='0';
}

// Toolbar buttons
document.getElementById('upload-btn').onclick=()=>document.getElementById('file-input').click();

document.getElementById('crop-btn').onclick=()=>{
  if(!hasImage) return;
  cropMode=!cropMode;
  if(cropMode){
    cropOverlay.classList.add('show');
    document.getElementById('crop-btn').classList.add('active');
    closeSidebar();
  } else {
    exitCropMode();
  }
};

let sidebarOpen=null;
function openSidebar(panel){
  document.getElementById('adjust-panel').style.display=panel==='adjust'?'block':'none';
  document.getElementById('filter-panel').style.display=panel==='filter'?'block':'none';
  document.getElementById('sidebar').classList.add('open');
  sidebarOpen=panel;
  document.getElementById('adjust-btn').classList.toggle('active',panel==='adjust');
  document.getElementById('filter-btn').classList.toggle('active',panel==='filter');
  if(cropMode) exitCropMode();
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  sidebarOpen=null;
  document.getElementById('adjust-btn').classList.remove('active');
  document.getElementById('filter-btn').classList.remove('active');
}

document.getElementById('adjust-btn').onclick=()=>{
  if(!hasImage) return;
  if(sidebarOpen==='adjust') closeSidebar();
  else openSidebar('adjust');
};
document.getElementById('filter-btn').onclick=()=>{
  if(!hasImage) return;
  if(sidebarOpen==='filter') closeSidebar();
  else openSidebar('filter');
};

document.getElementById('undo-btn').onclick=()=>{
  if(undoStack.length>1){
    undoStack.pop();
    origData=cloneImageData(undoStack[undoStack.length-1]);
    CV.width=origData.width;CV.height=origData.height;
    applyAll();
  }
};

document.getElementById('reset-btn').onclick=()=>{
  if(!origImg) return;
  let maxW=1600,maxH=1200;
  let w=origImg.width,h=origImg.height;
  if(w>maxW){h=h*(maxW/w);w=maxW;}
  if(h>maxH){w=w*(maxH/h);h=maxH;}
  CV.width=Math.round(w);CV.height=Math.round(h);
  X.drawImage(origImg,0,0,CV.width,CV.height);
  origData=X.getImageData(0,0,CV.width,CV.height);
  undoStack=[cloneImageData(origData)];
  resetAdjustments();
  applyAll();
};

// Save / Download
function downloadImage(){
  if(!hasImage) return;
  let link=document.createElement('a');
  link.download='pixel-studio-edit.png';
  link.href=CV.toDataURL('image/png');
  link.click();
}
document.getElementById('save-btn').onclick=downloadImage;
document.getElementById('dl-btn').onclick=downloadImage;

// Hide preview canvas if no image
CV.style.display='none';
</script>
</body>
</html>
