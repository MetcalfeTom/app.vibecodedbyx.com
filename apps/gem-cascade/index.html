<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gem Cascade</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%92%8E" />

<meta name="description" content="A calm, dark match-3. Swap faceted gems to line up three or more, trigger cascading chains, and unlock achievements. No flashing neon — just jewels on slate." />
<meta property="og:type" content="website" />
<meta property="og:title" content="Gem Cascade" />
<meta property="og:description" content="Swap gems, chain cascades, unlock achievements. A dark, elegant match-3." />
<meta property="og:url" content="https://sloppy.live/gem-cascade/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/faceted%20gemstones%20on%20dark%20slate%2C%20match%20three%20grid%2C%20deep%20jewel%20tones%2C%20moody%20elegant%2C%20no%20neon?width=1200&height=630&nologo=true&seed=808" />
<meta name="twitter:card" content="summary_large_image" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=IBM+Plex+Mono:wght@400;500&family=Cormorant+Garamond:ital@0;1&display=swap" rel="stylesheet" />

<style>
  :root{
    --bg:#14161b; --panel:#1c1f27; --panel2:#23262f; --line:#33384400; --line2:#3a404d;
    --ink:#e7e3da; --dim:#8b909c; --gold:#c9a44c; --gold-d:#9c7c2f; --rose:#b06a5e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  body{
    min-height:100vh; font-family:'IBM Plex Mono',monospace; color:var(--ink);
    background:
      radial-gradient(120% 80% at 50% -20%, #20242d 0%, transparent 55%),
      var(--bg);
    display:flex; flex-direction:column; align-items:center; padding:1.1rem .8rem 2rem;
    -webkit-font-smoothing:antialiased;
  }
  header{ text-align:center; margin-bottom:.4rem; }
  h1{ font-family:'Cinzel',serif; font-weight:700; font-size:clamp(1.8rem,6vw,2.9rem); letter-spacing:.08em;
    color:var(--gold); text-shadow:0 2px 8px rgba(0,0,0,.5); }
  .tag{ font-family:'Cormorant Garamond',serif; font-style:italic; font-size:1rem; color:var(--dim); margin-top:.15rem; }

  .wrap{ display:grid; grid-template-columns:auto 220px; gap:1rem; align-items:start; margin-top:.8rem; }
  @media (max-width:760px){ .wrap{ grid-template-columns:1fr; } }

  .game{ display:flex; flex-direction:column; align-items:center; gap:.7rem; }
  .hud{ display:flex; gap:.5rem; width:100%; }
  .stat{ flex:1; background:var(--panel); border:1px solid var(--line2); border-radius:10px; padding:.45rem .6rem; text-align:center; }
  .stat .k{ font-size:.54rem; letter-spacing:.16em; text-transform:uppercase; color:var(--dim); }
  .stat .v{ font-family:'Cinzel',serif; font-weight:700; font-size:1.3rem; color:var(--ink); line-height:1.1; }
  .stat.combo .v{ color:var(--gold); }

  .board-wrap{ position:relative; background:var(--panel); border:1px solid var(--line2); border-radius:14px;
    padding:9px; box-shadow:0 18px 40px rgba(0,0,0,.45), inset 0 0 0 1px rgba(255,255,255,.02); }
  canvas{ display:block; border-radius:8px; background:#181b21; touch-action:none; cursor:pointer; max-width:100%; height:auto; }   /* phones: board fits the screen */
  .btn{ font-family:'IBM Plex Mono',monospace; font-size:.74rem; letter-spacing:.06em; cursor:pointer; color:var(--ink);
    background:var(--panel2); border:1px solid var(--line2); border-radius:9px; padding:.5rem .9rem; min-height:2.5rem; transition:border-color .15s; }
  .btn:hover{ border-color:var(--gold-d); } .btn:focus-visible{ outline:2px solid var(--gold); outline-offset:2px; }

  .modes{ display:flex; gap:.4rem; width:100%; }
  .mode-btn{ flex:1; font-family:'IBM Plex Mono',monospace; font-size:.72rem; letter-spacing:.03em; cursor:pointer;
    background:var(--panel); color:var(--dim); border:1px solid var(--line2); border-radius:9px; padding:.45rem .3rem; min-height:2.4rem; transition:all .15s; }
  .mode-btn:hover{ color:var(--ink); border-color:var(--gold-d); }
  .mode-btn.active{ color:#16161a; background:var(--gold); border-color:var(--gold); font-weight:500; }
  .mode-btn:focus-visible{ outline:2px solid var(--gold); outline-offset:2px; }
  .goal{ font-family:'Cormorant Garamond',serif; font-style:italic; font-size:.98rem; color:var(--dim); min-height:1.2rem; text-align:center; }
  .surv-meter{ width:100%; height:15px; background:#15161b; border:1px solid var(--line2); border-radius:9px; overflow:hidden; box-shadow:inset 0 1px 3px rgba(0,0,0,.5); }
  .surv-meter[hidden]{ display:none; }
  .surv-meter i{ display:block; height:100%; width:100%; border-radius:9px;
    background:linear-gradient(180deg,#3fa45f,#2d7544);   /* classic green→yellow→red, set per-level by JS */
    box-shadow:inset 0 1px 0 rgba(255,255,255,.22); transition:background .3s ease; }
  .ov{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(10,11,14,.88); border-radius:8px; z-index:5; }
  .ov[hidden]{ display:none; }
  .ov-card{ text-align:center; padding:1.2rem; }
  .ov-title{ font-family:'Cinzel',serif; font-weight:700; font-size:clamp(1.3rem,5vw,1.8rem); color:var(--gold); margin-bottom:.5rem; }
  .ov-stats{ font-family:'IBM Plex Mono',monospace; font-size:.8rem; color:var(--ink); line-height:1.9; margin-bottom:1rem; }
  .ov-stats b{ color:var(--gold); }
  .runflash{ position:absolute; top:8px; left:50%; transform:translateX(-50%); font-family:'Cinzel',serif; font-weight:700;
    font-size:1.15rem; color:var(--gold); opacity:0; pointer-events:none; text-shadow:0 2px 6px #000; z-index:4; }
  .runflash.show{ animation:runf 1s ease; }
  @keyframes runf{ 0%{opacity:0;transform:translateX(-50%) scale(.7)} 20%{opacity:1;transform:translateX(-50%) scale(1.12)} 100%{opacity:0;transform:translate(-50%,-16px) scale(1)} }
  .ov.hints{ background:rgba(10,11,14,.42); align-items:flex-end; padding-bottom:10px; }
  .ov.hints .ov-card{ background:rgba(20,22,28,.9); border:1px solid var(--gold-d); border-radius:10px; padding:.7rem .9rem; }
  .ov-stats .hintnote{ font-family:'Cormorant Garamond',serif; font-style:italic; font-size:.86rem; color:var(--dim); }
  .btnrow{ display:flex; gap:.5rem; }

  .ach{ background:var(--panel); border:1px solid var(--line2); border-radius:12px; padding:.7rem .8rem; }
  .ach h2{ font-family:'Cinzel',serif; font-weight:700; font-size:.95rem; letter-spacing:.06em; color:var(--gold);
    margin-bottom:.5rem; display:flex; justify-content:space-between; align-items:baseline; }
  .ach h2 small{ font-family:'IBM Plex Mono',monospace; font-size:.62rem; color:var(--dim); letter-spacing:.06em; }
  .ach ul{ list-style:none; display:flex; flex-direction:column; gap:.4rem; }
  .ach li{ display:flex; gap:.5rem; align-items:flex-start; opacity:.5; transition:opacity .3s; }
  .ach li.on{ opacity:1; }
  .ach li .ico{ flex:0 0 auto; width:1.5rem; height:1.5rem; border-radius:6px; background:var(--panel2);
    border:1px solid var(--line2); display:grid; place-items:center; font-size:.8rem; }
  .ach li.on .ico{ background:rgba(201,164,76,.16); border-color:var(--gold-d); }
  .ach li .tx b{ display:block; font-size:.72rem; color:var(--ink); }
  .ach li .tx span{ display:block; font-family:'Cormorant Garamond',serif; font-style:italic; font-size:.82rem; color:var(--dim); line-height:1.2; }

  .toast{ position:fixed; left:50%; bottom:1.3rem; transform:translate(-50%,2rem); background:var(--panel2);
    border:1px solid var(--gold-d); border-radius:10px; padding:.55rem .9rem; display:flex; gap:.55rem; align-items:center;
    box-shadow:0 12px 30px rgba(0,0,0,.5); opacity:0; transition:all .3s; z-index:40; max-width:90vw; }
  .toast.show{ opacity:1; transform:translate(-50%,0); }
  .toast .ti{ font-size:1.2rem; } .toast .tt b{ display:block; font-size:.74rem; color:var(--gold); font-family:'Cinzel',serif; }
  .toast .tt span{ display:block; font-size:.66rem; color:var(--dim); }

  footer{ margin-top:1.2rem; font-size:.6rem; color:var(--dim); text-align:center; }
  .sr-only{ position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); }
  .booty{ display:flex; gap:.5rem; margin-top:.55rem; }
  .booty-btn{ flex:1; min-height:2.75rem; font-family:'IBM Plex Mono',monospace; font-size:.72rem; cursor:pointer;
    color:var(--ink); background:#1b1e25; border:1px solid #2a2e37; border-radius:8px; letter-spacing:.02em; }
  .booty-btn:hover:not(:disabled){ border-color:var(--gold); color:var(--gold); }
  .booty-btn:disabled{ opacity:.4; cursor:default; }
  .booty-btn.armed{ background:var(--gold); color:#14161b; border-color:var(--gold); font-weight:700; }
  .booty-btn:focus-visible{ outline:2px solid var(--gold); outline-offset:2px; }
  #vmap{ position:fixed; inset:0; z-index:40; background:rgba(8,9,12,.86); backdrop-filter:blur(3px);
    display:flex; align-items:center; justify-content:center; padding:1rem; }
  #vmap[hidden]{ display:none; }
  .vmap-card{ background:#171a20; border:1px solid #2a2e37; border-radius:14px; padding:1.2rem 1.3rem;
    max-width:34rem; width:100%; max-height:88vh; overflow-y:auto; box-shadow:0 18px 60px rgba(0,0,0,.55); }
  .vmap-card h2{ font-family:'Cinzel',serif; color:var(--gold); margin:0 0 .1rem; font-size:1.4rem; }
  .vmap-sub{ font-family:'Cormorant Garamond',serif; font-style:italic; color:#8a8f98; margin:0 0 .9rem; }
  .isle{ position:relative; margin:0 0 1rem; padding:.75rem .8rem .8rem; border-radius:12px;
    background:
      linear-gradient(#1b1e25,#1b1e25) padding-box,
      linear-gradient(110deg, var(--acc,#c9a44c) 0%, transparent 30%, transparent 70%, var(--acc,#c9a44c) 100%) border-box;
    background-size:100% 100%, 300% 100%;
    border:2px solid transparent;
    animation:borderTide 5s linear infinite;
    overflow:hidden; }
  @keyframes borderTide{ 0%{ background-position:0 0, 0% 0; } 100%{ background-position:0 0, 300% 0; } }
  .isle h3{ font-family:'Cinzel',serif; font-size:.9rem; margin:0 0 .45rem; letter-spacing:.05em; padding-left:2.6rem; }
  .isle.locked{ animation:none; }
  .isle.locked h3{ color:#565b63; }
  .critter{ position:absolute; left:.55rem; top:.35rem; font-size:1.7rem; line-height:1;
    filter:drop-shadow(0 0 8px var(--acc,#c9a44c));
    animation:critterProwl 4.6s ease-in-out infinite; transform-origin:50% 90%; }
  @keyframes critterProwl{
    0%,58%,100%{ transform:translateY(0) rotate(0); }
    30%{ transform:translateY(-3px) rotate(-6deg); }
    64%{ transform:scale(1.22) rotate(7deg); }     /* the FIERCE snap */
    72%{ transform:scale(1) rotate(0); } }
  .landmark{ position:absolute; right:.6rem; top:.4rem; font-size:1.15rem; line-height:1;
    animation:landGlow 2.8s ease-in-out infinite; }
  @keyframes landGlow{ 0%,100%{ filter:drop-shadow(0 0 3px var(--acc,#c9a44c)); opacity:.75; }
    50%{ filter:drop-shadow(0 0 12px var(--acc,#c9a44c)); opacity:1; } }
  .isle.locked .critter,.isle.locked .landmark{ filter:grayscale(1); animation:none; opacity:.35; }
  .isle-nodes{ display:flex; gap:.45rem; flex-wrap:wrap; position:relative; }
  .isle.locked .isle-nodes{ filter:blur(2px) brightness(.6); pointer-events:none; }
  .gate{ position:absolute; inset:0; z-index:2; display:flex; flex-direction:column; align-items:center;
    justify-content:center; gap:.15rem; background:rgba(10,11,15,.55); border-radius:10px;
    font-family:'IBM Plex Mono',monospace; font-size:.68rem; color:#8a8f98; text-align:center; }
  .gate .bars{ font-size:1.25rem; letter-spacing:.28em; }
  .gate.lit{ background:rgba(10,11,15,.35); color:var(--acc,#c9a44c); }
  .gate.lit .bars{ animation:gatePulse 1.6s ease-in-out infinite; }
  @keyframes gatePulse{ 0%,100%{ filter:drop-shadow(0 0 2px var(--acc,#c9a44c)); }
    50%{ filter:drop-shadow(0 0 14px var(--acc,#c9a44c)); transform:scale(1.06); } }
  .isle.cleared{ animation-duration:2.2s;
    box-shadow:0 0 18px rgba(201,164,76,.22), inset 0 0 22px rgba(201,164,76,.06); }
  .isle.cleared .landmark{ font-size:1.5rem; animation-duration:1.4s; }
  .isle.cleared h3::after{ content:' ✨'; }
  .lvl-node{ width:3.4rem; min-height:3.2rem; border-radius:10px; cursor:pointer; font-family:'IBM Plex Mono',monospace;
    background:#1b1e25; border:1.5px solid #2a2e37; color:var(--ink); font-size:.78rem; line-height:1.3; }
  .lvl-node:hover:not(:disabled){ border-color:var(--gold); }
  .lvl-node:disabled{ opacity:.38; cursor:default; }
  .lvl-node .st{ display:block; font-size:.6rem; letter-spacing:.08em; color:var(--gold); }
  .lvl-node.done{ border-color:rgba(201,164,76,.55); }
  .lvl-node:focus-visible{ outline:2px solid var(--gold); outline-offset:2px; }
  @media (prefers-reduced-motion: reduce){ .toast{ transition:opacity .3s; }
    .isle,.critter,.landmark{ animation:none; } }
</style>
</head>
<body>
  <header>
    <h1>Gem Cascade</h1>
    <div class="tag">swap · chain · collect</div>
  </header>

  <div class="wrap">
    <div class="game">
      <div class="modes" role="group" aria-label="Game mode">
        <button class="mode-btn" data-mode="voyage" type="button">🏴‍☠️ Voyage</button>
        <button class="mode-btn active" data-mode="endless" type="button">Endless</button>
        <button class="mode-btn" data-mode="gems1000" type="button">1000 Gems</button>
        <button class="mode-btn" data-mode="survival" type="button">Survival</button>
      </div>
      <div class="hud">
        <div class="stat"><div class="k">Score</div><div class="v" id="score">0</div></div>
        <div class="stat combo"><div class="k">Combo</div><div class="v" id="combo">—</div></div>
        <div class="stat"><div class="k">Gems</div><div class="v" id="gems">0</div></div>
      </div>
      <div class="goal" id="goal" aria-live="polite"></div>
      <div class="board-wrap">
        <canvas id="cv" role="application"
          aria-label="Match-3 board. Swipe a gem toward a neighbour, or click a gem then an adjacent gem, to swap them. Line up three or more of the same gem to clear them and trigger cascades. Four in a row scores a multiplier."></canvas>
        <div class="runflash" id="runflash" aria-hidden="true"></div>
        <div class="ov" id="ov" hidden>
          <div class="ov-card">
            <div class="ov-title" id="ovTitle"></div>
            <div class="ov-stats" id="ovStats"></div>
            <button class="btn" id="ovBtn" type="button">Play again</button>
          </div>
        </div>
      </div>
      <div class="surv-meter" id="survMeter" hidden><i id="survFill"></i></div>
      <div class="btnrow">
        <button class="btn" id="hintBtn" type="button">💡 Hint</button>
        <button class="btn" id="newBtn" type="button">New game</button>
      </div>
      <div class="booty" id="booty" role="group" aria-label="Pirate power-ups">
        <button class="booty-btn" id="pw-cannon" type="button" title="Cannonball — blast a 3×3 square where you tap"></button>
        <button class="booty-btn" id="pw-anchor" type="button" title="Anchor — sink an entire column where you tap"></button>
        <button class="booty-btn" id="pw-map" type="button" title="Treasure Map — conjure a rainbow gem on the board"></button>
      </div>
      <div id="vmap" hidden role="dialog" aria-modal="true" aria-label="Voyage map — The Gem Seas">
        <div class="vmap-card">
          <h2>⛵ The Gem Seas</h2>
          <p class="vmap-sub">ten realms · fifty levels · earn ⭐ to press on</p>
          <div id="vmapIsles"></div>
          <button class="btn" id="vmapClose" type="button">✕ free sail instead</button>
        </div>
      </div>
    </div>

    <aside class="ach">
      <h2>Achievements <small id="achCount">0/8</small></h2>
      <ul id="achList"></ul>
    </aside>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite">
    <span class="ti" id="toastIco">🏅</span>
    <div class="tt"><b id="toastName"></b><span id="toastDesc"></span></div>
  </div>

  <p class="sr-only" id="live" role="status" aria-live="polite"></p>
  <footer>An original dark match-3. Click two adjacent gems to swap. Cascades chain automatically.</footer>

<script>
(function(){
  "use strict";
  var ROWS=8, COLS=8, TILE=54;
  var cv=document.getElementById('cv'), X=cv.getContext('2d');
  var DPR=Math.min(2, window.devicePixelRatio||1);
  cv.width=COLS*TILE*DPR; cv.height=ROWS*TILE*DPR; cv.style.width=(COLS*TILE)+'px'; cv.style.height=(ROWS*TILE)+'px';
  X.scale(DPR,DPR);

  var scoreEl=document.getElementById('score'), comboEl=document.getElementById('combo'), gemsEl=document.getElementById('gems'),
      live=document.getElementById('live'), toast=document.getElementById('toast'),
      goalEl=document.getElementById('goal'), survMeter=document.getElementById('survMeter'), survFill=document.getElementById('survFill'),
      ov=document.getElementById('ov'), ovTitle=document.getElementById('ovTitle'), ovStats=document.getElementById('ovStats'),
      ovBtn=document.getElementById('ovBtn'), runflash=document.getElementById('runflash');

  // modes: 'endless' | 'gems1000' | 'survival'
  var gameMode='endless', ended=false, survival=100, survDisplay=100, survivalTime=0, playTime=0, lastSurvSec=0, lastT=performance.now();
  var GEM_GOAL=1000, SURV_DRAIN0=5, SURV_ADD=3.6;

  var GEMS=[
    { base:'#9e2b3a', light:'#d4596a', dark:'#5c1722', shape:'diamond' },  // ruby
    { base:'#2c4f8c', light:'#5f86c6', dark:'#16294e', shape:'circle' },   // sapphire
    { base:'#2f7d52', light:'#5fc189', dark:'#194a31', shape:'rsquare' },  // emerald
    { base:'#6b3f8e', light:'#a273c4', dark:'#3d2152', shape:'hex' },      // amethyst
    { base:'#b07d22', light:'#e4b85f', dark:'#6e4c10', shape:'triangle' }, // topaz
    { base:'#8a8f98', light:'#d4d8de', dark:'#565b63', shape:'oval' }      // quartz
  ];
  var NTYPES=GEMS.length;

  // each cell: { type, dx, dy, clearing, clearT }
  var cells=[], mode='idle', sel=null, swapPair=null, hintMoves=[], liveHint=null, liveHintUntil=0;
  var stats={ score:0, gemsCleared:0, maxCombo:0, bestMatch:0, survivalBest:0, completed1000:0, diedWithMoves:0 }, combo=0;

  function mk(){ return { type:0, dx:0, dy:0, clearing:false, clearT:0, special:null }; }
  var RAINBOW_T=6;   // typeless wildcard — matches nothing, clears everything
  function randType(){ return Math.floor(Math.random()*NTYPES); }

  function fillNoMatch(){
    for(var r=0;r<ROWS;r++) for(var c=0;c<COLS;c++){
      var t, tries=0;
      do{ t=randType(); tries++; }
      while(tries<30 && (
        (c>=2 && cells[r][c-1].type===t && cells[r][c-2].type===t) ||
        (r>=2 && cells[r-1][c].type===t && cells[r-2][c].type===t) ));
      cells[r][c].type=t; cells[r][c].dx=0; cells[r][c].dy=0; cells[r][c].clearing=false; cells[r][c].clearT=0; cells[r][c].special=null;
    }
  }
  function newGame(m){
    if(m) gameMode=m;
    cells=[]; for(var r=0;r<ROWS;r++){ cells[r]=[]; for(var c=0;c<COLS;c++) cells[r][c]=mk(); }
    fillNoMatch(); while(!hasMoves()) fillNoMatch();
    mode='idle'; sel=null; combo=0; ended=false;
    stats.score=0; stats.gemsCleared=0; stats.maxCombo=0; stats.bestMatch=0;
    survival=100; survDisplay=100; survivalTime=0; playTime=0; lastSurvSec=0; lastT=performance.now();
    if(survFill) survFill.style.background = heatColor(100);
    hintMoves=[]; liveHint=null; liveHintUntil=0; if(ov){ ov.hidden=true; ov.classList.remove('hints'); }
    survMeter.hidden = (gameMode!=='survival');
    if(gameMode==='voyage'&&voy.lvl>=0){ cv.style.background=voyBiome().tint; applyBiomePalette(voyBiome()); }
    else { cv.style.background='#181b21'; if(typeof applyBiomePalette==='function') applyBiomePalette(null); }
    if(typeof paintBooty==='function') paintBooty();
    setGoal(); updHUD();
  }
  function setGoal(){
    if(gameMode==='gems1000'){ var left=Math.max(0, GEM_GOAL-stats.gemsCleared); goalEl.textContent = left>0 ? ('clear 1,000 gems · '+left.toLocaleString()+' to go') : 'goal reached!'; }
    else if(gameMode==='survival'){ goalEl.textContent = 'survive · clear gems to refill the meter'; }
    else if(gameMode==='voyage'){
      if(voy.lvl<0){ goalEl.textContent='🏴‍☠️ voyage · choose an isle on the map'; }
      else { var L2=VOY_LEVELS[voy.lvl], B2=voyBiome();
        goalEl.textContent=B2.emo+' '+B2.name+' · lv '+(voy.lvl+1)+' · '+stats.score.toLocaleString()+' / '+L2.target.toLocaleString()+' · ⛵ '+Math.max(0,voy.movesLeft)+' moves'; }
    }
    else goalEl.textContent = 'endless · chase the cascade';
  }
  function updHUD(){ scoreEl.textContent=stats.score.toLocaleString(); gemsEl.textContent=stats.gemsCleared.toLocaleString();
    comboEl.textContent = combo>0 ? ('×'+combo) : '—'; }
  // classic level-based heat colour: full = green, mid = yellow, low = red
  function lerp8(a,b,t){ return Math.round(a+(b-a)*t); }
  function heatColor(v){
    var t=Math.max(0,Math.min(1,v/100)), r,g,b;
    if(t>0.5){ var f=(t-0.5)*2; r=lerp8(0xe8,0x3f,f); g=lerp8(0xc8,0xa4,f); b=lerp8(0x4a,0x5f,f); }   // yellow → green
    else { var f2=t*2; r=lerp8(0xc0,0xe8,f2); g=lerp8(0x39,0xc8,f2); b=lerp8(0x2b,0x4a,f2); }            // red → yellow
    return 'linear-gradient(180deg, rgb('+r+','+g+','+b+'), rgb('+Math.round(r*0.72)+','+Math.round(g*0.72)+','+Math.round(b*0.72)+'))';
  }

  // ---- matches ----
  function findMatches(){
    var set={}, maxRun=0, runs=[], key=function(r,c){return r+','+c;};
    // rows — rainbow (type 6) never equals a real gem, so it can't join a run
    for(var r=0;r<ROWS;r++){ var run=1; for(var c=1;c<=COLS;c++){
      if(c<COLS && cells[r][c].type===cells[r][c-1].type && cells[r][c].type>=0 && cells[r][c].type<NTYPES){ run++; }
      else { if(run>=3){ maxRun=Math.max(maxRun,run); var rw={dir:'h',len:run,cells:[]}; for(var k=0;k<run;k++){ set[key(r,c-1-k)]=1; rw.cells.push({r:r,c:c-1-k}); } runs.push(rw); } run=1; }
    }}
    // cols
    for(var c2=0;c2<COLS;c2++){ var run2=1; for(var r2=1;r2<=ROWS;r2++){
      if(r2<ROWS && cells[r2][c2].type===cells[r2-1][c2].type && cells[r2][c2].type>=0 && cells[r2][c2].type<NTYPES){ run2++; }
      else { if(run2>=3){ maxRun=Math.max(maxRun,run2); var rw2={dir:'v',len:run2,cells:[]}; for(var k2=0;k2<run2;k2++){ set[key(r2-1-k2,c2)]=1; rw2.cells.push({r:r2-1-k2,c:c2}); } runs.push(rw2); } run2=1; }
    }}
    return { set:set, count:Object.keys(set).length, maxRun:maxRun, runs:runs };
  }

  /* ── SPECIALS: rockets · bombs · rainbows ── */
  function keyRC(r,c){ return r+','+c; }
  function computeSpawns(runs, pivots){
    // L/T intersections → bomb at the shared cell; straight 5 → rainbow; 4 → rocket along the run
    var spawns=[], used=[];
    function pivotOf(run){
      if(pivots){ for(var i=0;i<run.cells.length;i++){ var cc=run.cells[i];
        if((pivots.a&&cc.r===pivots.a.r&&cc.c===pivots.a.c)||(pivots.b&&cc.r===pivots.b.r&&cc.c===pivots.b.c)) return cc; } }
      return run.cells[Math.floor(run.cells.length/2)];
    }
    for(var i=0;i<runs.length;i++) for(var j=i+1;j<runs.length;j++){
      if(runs[i].dir===runs[j].dir||used.indexOf(i)>=0||used.indexOf(j)>=0) continue;
      for(var a=0;a<runs[i].cells.length;a++) for(var b=0;b<runs[j].cells.length;b++){
        var p1=runs[i].cells[a], p2=runs[j].cells[b];
        if(p1.r===p2.r&&p1.c===p2.c){ spawns.push({r:p1.r,c:p1.c,kind:'bomb'}); used.push(i,j); a=99;b=99; }
      }
    }
    for(var m2=0;m2<runs.length;m2++){
      if(used.indexOf(m2)>=0) continue;
      var run=runs[m2], p=pivotOf(run);
      if(run.len>=5) spawns.push({r:p.r,c:p.c,kind:'rainbow'});
      else if(run.len===4) spawns.push({r:p.r,c:p.c,kind:run.dir==='h'?'rocketH':'rocketV'});
    }
    return spawns;
  }
  function expandSpecials(set){
    var queue=Object.keys(set), seen={}, boom=0;
    while(queue.length){
      var k=queue.pop(); if(seen[k]) continue; seen[k]=1;
      var p=k.split(','), r=+p[0], c=+p[1];
      if(r<0||r>=ROWS||c<0||c>=COLS) continue;
      var cell=cells[r][c]; if(!cell||cell.type<0||!cell.special) continue;
      var add=[]; boom++;
      if(cell.special==='rocketH'){ for(var i=0;i<COLS;i++) add.push(keyRC(r,i)); }
      else if(cell.special==='rocketV'){ for(var i2=0;i2<ROWS;i2++) add.push(keyRC(i2,c)); }
      else if(cell.special==='bomb'){ for(var dr=-1;dr<=1;dr++) for(var dc=-1;dc<=1;dc++){
        var rr=r+dr, cc2=c+dc; if(rr>=0&&rr<ROWS&&cc2>=0&&cc2<COLS) add.push(keyRC(rr,cc2)); } }
      else if(cell.special==='rainbow'){ var t=randType();   // chain-hit rainbow burns a random colour
        for(var r3=0;r3<ROWS;r3++) for(var c3=0;c3<COLS;c3++) if(cells[r3][c3].type===t) add.push(keyRC(r3,c3)); }
      for(var a2=0;a2<add.length;a2++){ if(!set[add[a2]]){ set[add[a2]]=1; queue.push(add[a2]); } }
    }
    return boom;
  }

  function hasMoves(){
    for(var rh=0;rh<ROWS;rh++) for(var ch=0;ch<COLS;ch++) if(cells[rh][ch].special==='rainbow') return true;
    function swap(a,b){ var t=cells[a[0]][a[1]].type; cells[a[0]][a[1]].type=cells[b[0]][b[1]].type; cells[b[0]][b[1]].type=t; }
    for(var r=0;r<ROWS;r++) for(var c=0;c<COLS;c++){
      if(c<COLS-1){ swap([r,c],[r,c+1]); var m=findMatches().count; swap([r,c],[r,c+1]); if(m) return true; }
      if(r<ROWS-1){ swap([r,c],[r+1,c]); var m2=findMatches().count; swap([r,c],[r+1,c]); if(m2) return true; }
    }
    return false;
  }
  // every legal swap available right now, best (biggest resulting match) first
  function collectMoves(){
    function swap(a,b){ var t=cells[a.r][a.c].type; cells[a.r][a.c].type=cells[b.r][b.c].type; cells[b.r][b.c].type=t; }
    var out=[];
    for(var r=0;r<ROWS;r++) for(var c=0;c<COLS;c++){
      var dirs=[]; if(c<COLS-1) dirs.push({r:r,c:c+1}); if(r<ROWS-1) dirs.push({r:r+1,c:c});
      for(var d=0;d<dirs.length;d++){ var a={r:r,c:c}, b=dirs[d];
        swap(a,b); var g=findMatches(); swap(a,b);
        if(g.count) out.push({ a:a, b:b, gain:g.maxRun }); }
    }
    out.sort(function(x,y){ return y.gain-x.gain; });
    return out;
  }
  function drawHintRing(cell, strong, pulse){
    X.save(); X.globalAlpha=(strong?0.9:0.5)*pulse+0.15; X.strokeStyle=strong?'#ffd86a':'#c9a44c';
    X.lineWidth=strong?3:2; X.strokeRect(cell.c*TILE+4, cell.r*TILE+4, TILE-8, TILE-8); X.restore();
  }

  // ---- swap + resolve ----
  function doSwapVisual(a,b){
    var ca=cells[a.r][a.c], cb=cells[b.r][b.c];
    var t=ca.type; ca.type=cb.type; cb.type=t;          // swap model
    // offsets so they slide from each other's home
    ca.dx=(b.c-a.c)*TILE; ca.dy=(b.r-a.r)*TILE;
    cb.dx=(a.c-b.c)*TILE; cb.dy=(a.r-b.r)*TILE;
  }
  function trySwap(a,b){
    if(mode!=='idle') return;
    liveHint=null;                       // clear any shown hint once a move is made
    swapPair={a:a,b:b}; doSwapVisual(a,b); mode='swap';
  }
  function onSwapSettled(){
    var A=cells[swapPair.a.r][swapPair.a.c], B=cells[swapPair.b.r][swapPair.b.c];
    if(A.special==='rainbow'||B.special==='rainbow'){
      var set={};
      if(A.special==='rainbow'&&B.special==='rainbow'){          // double rainbow: the whole sea burns
        for(var r=0;r<ROWS;r++) for(var c=0;c<COLS;c++) set[keyRC(r,c)]=1;
      } else {
        var rbPos=A.special==='rainbow'?swapPair.a:swapPair.b;
        var otherPos=A.special==='rainbow'?swapPair.b:swapPair.a;
        var t=cells[otherPos.r][otherPos.c].type;
        set[keyRC(rbPos.r,rbPos.c)]=1;
        if(t>=0&&t<NTYPES){ for(var r2=0;r2<ROWS;r2++) for(var c2=0;c2<COLS;c2++) if(cells[r2][c2].type===t) set[keyRC(r2,c2)]=1; }
      }
      combo=0; useVoyMove(); beginClearSet(set); return;
    }
    var m=findMatches();
    if(m.count){ combo=0; useVoyMove(); beginClear(m, swapPair); }
    else { doSwapVisual(swapPair.a, swapPair.b); mode='revert'; }   // illegal → swap back
  }
  function beginClearSet(rawSet){
    expandSpecials(rawSet);
    beginClear({ set:rawSet, count:Object.keys(rawSet).length, maxRun:0, runs:[] }, null, true);
  }
  function beginClear(m, pivots, preExpanded){
    // specials spawn from run geometry BEFORE detonation expansion eats the runs
    var spawns=computeSpawns(m.runs||[], pivots);
    var set=m.set;
    for(var si=0;si<spawns.length;si++) delete set[keyRC(spawns[si].r,spawns[si].c)];
    var boom=preExpanded?0:expandSpecials(set);
    for(var si2=0;si2<spawns.length;si2++) delete set[keyRC(spawns[si2].r,spawns[si2].c)];
    for(var si3=0;si3<spawns.length;si3++){ var sp=spawns[si3], scell=cells[sp.r][sp.c];
      scell.special=sp.kind; scell.clearing=false; scell.clearT=0;
      if(sp.kind==='rainbow') scell.type=RAINBOW_T;
    }
    m.count=Object.keys(set).length;
    if(spawns.length) live.textContent='Special gem forged: '+spawns.map(function(s){return s.kind;}).join(', ')+'!';
    combo++; stats.maxCombo=Math.max(stats.maxCombo,combo); stats.bestMatch=Math.max(stats.bestMatch,m.maxRun);
    // four-in-a-row (or longer) earns a cascade MULTIPLIER on top of the combo
    var runMult = m.maxRun>=5 ? 3 : (m.maxRun>=4 ? 2 : 1);
    var n=m.count; stats.gemsCleared+=n; stats.score += n*10*combo*runMult + boom*60;
    if(runMult>1) showRunFlash(m.maxRun, runMult);
    if(gameMode==='survival') survival=Math.min(100, survival + Math.min(40, n*SURV_ADD));
    for(var kk in m.set){ var p=kk.split(','); var cell=cells[+p[0]][+p[1]]; cell.clearing=true; cell.clearT=0; }
    mode='clear'; updHUD(); setGoal(); checkAch(); checkGoals();
    if(combo>=2) live.textContent='Combo ×'+combo+'!';
  }
  function showRunFlash(run, mult){
    runflash.textContent = (run>=5?'FIVE':'FOUR') + ' IN A ROW · ×' + mult;
    runflash.classList.remove('show'); void runflash.offsetWidth; runflash.classList.add('show');
  }
  function checkGoals(){
    if(ended) return;
    if(gameMode==='gems1000' && stats.gemsCleared>=GEM_GOAL){ stats.completed1000=1; checkAch(); endGame('win1000'); }
  }
  function endGame(kind){
    ended=true; mode='over'; sel=null;
    var t=playTime.toFixed(1);
    if(kind==='voywin'){
      hintMoves=[]; ov.classList.remove('hints');
      var st2=arguments[1]&&arguments[1].stars||1, bw=arguments[1]&&arguments[1].booty;
      ovTitle.textContent='Isle Cleared! '+'★'.repeat(st2)+'☆'.repeat(3-st2);
      ovStats.innerHTML='score <b>'+stats.score.toLocaleString()+'</b> · moves left <b>'+Math.max(0,voy.movesLeft)+'</b>'
        +(bw?('<br>booty found: <b>'+(POW[bw]?POW[bw].ico+' '+POW[bw].name:bw)+'</b>'):'');
      ovBtn.textContent='⛵ back to the map';
      live.textContent='Level cleared with '+st2+' stars!';
      ov.hidden=false; return;
    }
    if(kind==='voylose'){
      hintMoves=[]; ov.classList.remove('hints');
      ovTitle.textContent='Out of Moves';
      ovStats.innerHTML='score <b>'+stats.score.toLocaleString()+'</b> · needed <b>'+VOY_LEVELS[voy.lvl].target.toLocaleString()+'</b><br><span class="hintnote">the isle keeps its gems — for now</span>';
      ovBtn.textContent='⛵ back to the map';
      live.textContent='Out of moves.';
      ov.hidden=false; return;
    }
    ovBtn.textContent='Play again';
    if(kind==='win1000'){
      hintMoves=[]; ov.classList.remove('hints');
      ovTitle.textContent='1,000 Gems!';
      ovStats.innerHTML='time <b>'+t+'s</b><br>score <b>'+stats.score.toLocaleString()+'</b><br>best combo <b>×'+stats.maxCombo+'</b>';
      live.textContent='You cleared 1,000 gems!';
    } else {
      hintMoves=collectMoves(); ov.classList.add('hints');   // missed swaps glow on the board
      var n=hintMoves.length;
      ovTitle.textContent='Game Over';
      ovStats.innerHTML='survived <b>'+survivalTime.toFixed(1)+'s</b> · gems <b>'+stats.gemsCleared.toLocaleString()+'</b> · score <b>'+stats.score.toLocaleString()+'</b>'
        + '<br><span class="hintnote">'+ (n ? ('you had <b>'+n+'</b> swap'+(n===1?'':'s')+' left — your best one is glowing') : 'no swaps were left either') +'</span>';
      live.textContent='Game over. '+(n? (n+' moves were still available.'):'');
      stats.diedWithMoves = (n>=5) ? 1 : 0;
    }
    checkAch();
    ov.hidden=false;
  }
  function onClearDone(){
    for(var r=0;r<ROWS;r++) for(var c=0;c<COLS;c++){ if(cells[r][c].clearing){ cells[r][c].clearing=false; cells[r][c].clearT=0; cells[r][c].type=-1; cells[r][c].special=null; } }
    collapse(); mode='fall';
  }
  function collapse(){
    for(var c=0;c<COLS;c++){
      var write=ROWS-1;
      for(var r=ROWS-1;r>=0;r--){
        if(cells[r][c].type>=0){
          if(write!==r){ cells[write][c].type=cells[r][c].type; cells[write][c].special=cells[r][c].special; cells[write][c].dx=0; cells[write][c].dy=(r-write)*TILE; cells[r][c].type=-1; cells[r][c].special=null; }
          else { cells[write][c].dy=0; }
          write--;
        }
      }
      var empties=write+1;
      for(var rr=write;rr>=0;rr--){ cells[rr][c].type=randType(); cells[rr][c].special=null; cells[rr][c].dx=0; cells[rr][c].dy=-(empties-rr)*TILE; }
    }
  }
  function onFallSettled(){
    var m=findMatches();
    if(m.count){ beginClear(m); }
    else { combo=0; updHUD(); setGoal(); mode='idle';
      voyCheckEnd();
      if(!ended && !hasMoves()){ live.textContent='No moves — reshuffling.'; fillNoMatch(); while(!hasMoves()) fillNoMatch(); }
    }
  }

  // ---- loop ----
  function tick(){
    var now=performance.now(), dt=Math.min((now-lastT)/1000, 0.05); lastT=now;
    if(!ended){
      playTime += dt;
      if(gameMode==='survival'){
        survivalTime += dt;
        survival -= (SURV_DRAIN0 + survivalTime*0.16) * dt;
        stats.survivalBest = Math.max(stats.survivalBest, survivalTime);
        survDisplay += (Math.max(0,survival) - survDisplay) * Math.min(1, dt*7);   // smooth ease (kept)
        survFill.style.width = Math.max(0, survDisplay) + '%';
        survFill.style.background = heatColor(survDisplay);                         // classic green → yellow → red by level
        if(Math.floor(survivalTime)!==lastSurvSec){ lastSurvSec=Math.floor(survivalTime); checkAch(); }
        if(survival<=0){ survival=0; survDisplay=0; survFill.style.width='0%'; endGame('survover'); }
      }
    }
    var moving=false, clearingActive=false;
    for(var r=0;r<ROWS;r++) for(var c=0;c<COLS;c++){
      var cell=cells[r][c];
      if(Math.abs(cell.dx)>0.4 || Math.abs(cell.dy)>0.4){ cell.dx+=(0-cell.dx)*0.30; cell.dy+=(0-cell.dy)*0.30; moving=true; }
      else { cell.dx=0; cell.dy=0; }
      if(cell.clearing){ cell.clearT=Math.min(1,cell.clearT+0.10); if(cell.clearT<1) clearingActive=true; }
    }
    if(mode==='swap' && !moving) onSwapSettled();
    else if(mode==='revert' && !moving){ mode='idle'; }
    else if(mode==='clear' && !clearingActive) onClearDone();
    else if(mode==='fall' && !moving) onFallSettled();
    draw();
    requestAnimationFrame(tick);
  }

  // ---- draw ----
  function shapePath(shape, x, y, s){
    var h=s/2;
    if(shape==='circle'){ X.arc(x,y,h,0,6.283); }
    else if(shape==='oval'){ X.ellipse(x,y,h,h*0.78,0,0,6.283); }
    else if(shape==='diamond'){ X.moveTo(x,y-h); X.lineTo(x+h,y); X.lineTo(x,y+h); X.lineTo(x-h,y); X.closePath(); }
    else if(shape==='triangle'){ X.moveTo(x,y-h); X.lineTo(x+h*0.92,y+h*0.7); X.lineTo(x-h*0.92,y+h*0.7); X.closePath(); }
    else if(shape==='hex'){ for(var i=0;i<6;i++){ var a=Math.PI/6 + i*Math.PI/3; var px=x+Math.cos(a)*h, py=y+Math.sin(a)*h; if(i===0)X.moveTo(px,py); else X.lineTo(px,py);} X.closePath(); }
    else { var rr=s*0.22; var x0=x-h,y0=y-h,w=s; // rounded square
      X.moveTo(x0+rr,y0); X.arcTo(x0+w,y0,x0+w,y0+w,rr); X.arcTo(x0+w,y0+w,x0,y0+w,rr); X.arcTo(x0,y0+w,x0,y0,rr); X.arcTo(x0,y0,x0+w,y0,rr); X.closePath(); }
  }
  function drawGem(cx, cy, gem, scale){
    var s=TILE*0.74*scale;
    X.save();
    // body
    X.beginPath(); shapePath(gem.shape, cx, cy, s);
    var g=X.createLinearGradient(cx, cy-s/2, cx, cy+s/2);
    g.addColorStop(0, gem.light); g.addColorStop(0.5, gem.base); g.addColorStop(1, gem.dark);
    X.fillStyle=g; X.fill();
    X.lineWidth=1.4; X.strokeStyle='rgba(0,0,0,.45)'; X.stroke();
    // facet highlight
    X.beginPath(); shapePath(gem.shape, cx, cy-s*0.06, s*0.6);
    X.fillStyle='rgba(255,255,255,.12)'; X.fill();
    // specular
    X.beginPath(); X.ellipse(cx-s*0.16, cy-s*0.2, s*0.12, s*0.07, -0.5, 0, 6.283);
    X.fillStyle='rgba(255,255,255,.5)'; X.fill();
    X.restore();
  }
  function drawRainbowOrb(cx, cy, scale){
    var s=TILE*0.76*scale, h=s/2;
    X.save();
    for(var i=0;i<6;i++){ X.beginPath(); X.moveTo(cx,cy);
      X.arc(cx,cy,h,i*Math.PI/3-Math.PI/2,(i+1)*Math.PI/3-Math.PI/2); X.closePath();
      X.fillStyle=GEMS[i].base; X.fill(); }
    X.beginPath(); X.arc(cx,cy,h,0,6.283); X.lineWidth=2; X.strokeStyle='#ffd86a'; X.stroke();
    X.beginPath(); X.arc(cx,cy,h*0.34,0,6.283); X.fillStyle='#fff'; X.globalAlpha*=0.85; X.fill();
    X.restore();
  }
  function drawSpecialMark(cx, cy, kind, scale){
    var s=TILE*0.74*scale, h=s/2;
    X.save(); X.strokeStyle='#ffd86a'; X.fillStyle='#ffd86a'; X.lineWidth=2.2; X.globalAlpha*=0.95;
    if(kind==='rocketH'){ X.beginPath();
      X.moveTo(cx-h*0.7,cy); X.lineTo(cx-h*0.3,cy-h*0.3); X.moveTo(cx-h*0.7,cy); X.lineTo(cx-h*0.3,cy+h*0.3);
      X.moveTo(cx+h*0.7,cy); X.lineTo(cx+h*0.3,cy-h*0.3); X.moveTo(cx+h*0.7,cy); X.lineTo(cx+h*0.3,cy+h*0.3);
      X.moveTo(cx-h*0.7,cy); X.lineTo(cx+h*0.7,cy); X.stroke(); }
    else if(kind==='rocketV'){ X.beginPath();
      X.moveTo(cx,cy-h*0.7); X.lineTo(cx-h*0.3,cy-h*0.3); X.moveTo(cx,cy-h*0.7); X.lineTo(cx+h*0.3,cy-h*0.3);
      X.moveTo(cx,cy+h*0.7); X.lineTo(cx-h*0.3,cy+h*0.3); X.moveTo(cx,cy+h*0.7); X.lineTo(cx+h*0.3,cy+h*0.3);
      X.moveTo(cx,cy-h*0.7); X.lineTo(cx,cy+h*0.7); X.stroke(); }
    else if(kind==='bomb'){
      X.beginPath(); X.arc(cx,cy,h*0.34,0,6.283); X.fillStyle='#14161b'; X.fill();
      X.beginPath(); X.arc(cx,cy,h*0.34,0,6.283); X.stroke();
      X.beginPath(); X.moveTo(cx+h*0.2,cy-h*0.28); X.quadraticCurveTo(cx+h*0.5,cy-h*0.55,cx+h*0.34,cy-h*0.62); X.stroke();
      X.beginPath(); X.arc(cx+h*0.34,cy-h*0.62,2.4,0,6.283); X.fillStyle='#ffd86a'; X.fill(); }
    X.restore();
  }
  function draw(){
    X.clearRect(0,0,COLS*TILE,ROWS*TILE);
    // board cells
    for(var r=0;r<ROWS;r++) for(var c=0;c<COLS;c++){
      X.fillStyle=((r+c)&1)? 'rgba(255,255,255,.018)' : 'rgba(0,0,0,.12)';
      X.fillRect(c*TILE+1, r*TILE+1, TILE-2, TILE-2);
    }
    // selection ring
    if(sel){ X.save(); X.strokeStyle='var(--gold)'; X.strokeStyle='#c9a44c'; X.lineWidth=2.5;
      X.strokeRect(sel.c*TILE+3, sel.r*TILE+3, TILE-6, TILE-6); X.restore(); }
    // gems
    for(var r2=0;r2<ROWS;r2++) for(var c2=0;c2<COLS;c2++){
      var cell=cells[r2][c2]; if(cell.type<0) continue;
      var cx=c2*TILE+TILE/2+cell.dx, cy=r2*TILE+TILE/2+cell.dy;
      var sc = cell.clearing ? (1-cell.clearT) : 1;
      if(sc<=0.02) continue;
      X.globalAlpha = cell.clearing ? Math.max(0,1-cell.clearT) : 1;
      if(cell.type===RAINBOW_T) drawRainbowOrb(cx, cy, sc);
      else drawGem(cx, cy, GEMS[cell.type], sc);
      if(cell.special&&cell.special!=='rainbow') drawSpecialMark(cx, cy, cell.special, sc);
      X.globalAlpha=1;
    }
    // post-loss: highlight ONLY the single best missed swap
    if(ended && hintMoves.length){ drawHintPair(hintMoves[0], 0.5+0.5*Math.sin(performance.now()/240)); }
    // live in-game hint: the single best swap, for a few seconds
    if(!ended && liveHint && performance.now()<liveHintUntil){ drawHintPair(liveHint, 0.5+0.5*Math.sin(performance.now()/200)); }
  }
  function drawHintPair(mv, pulse){
    drawHintRing(mv.a, true, pulse); drawHintRing(mv.b, true, pulse);
    X.save(); X.globalAlpha=0.8*pulse+0.1; X.strokeStyle='#ffd86a'; X.lineWidth=2.5;
    X.beginPath(); X.moveTo(mv.a.c*TILE+TILE/2, mv.a.r*TILE+TILE/2); X.lineTo(mv.b.c*TILE+TILE/2, mv.b.r*TILE+TILE/2); X.stroke(); X.restore();
  }

  /* ═══ VOYAGE — The Gem Seas: 5 pirate biomes × 5 levels, stars, booty ═══ */
  var BIOMES=[
    { name:'Coral Cove',      emo:'🐚', tint:'#14262b', accent:'#3fb8a4', critter:'🦀', land:'⚓' },
    { name:'Emerald Jungle',  emo:'🦜', tint:'#142b1c', accent:'#4fae5c', critter:'🐆', land:'🗿' },
    { name:'Sapphire Depths', emo:'🐙', tint:'#131c33', accent:'#5f86c6', critter:'🦑', land:'🔱' },
    { name:'Ruby Volcano',    emo:'🌋', tint:'#2e1516', accent:'#d4596a', critter:'🐉', land:'🌋' },
    { name:'Treasure Isle',   emo:'🏴‍☠️', tint:'#2b2412', accent:'#e4b85f', critter:'🦜', land:'👑' },
    /* v3.0 — five new realms, each re-skinning the six gems (shapes stay: colourblind identity) */
    { name:'Shadow Realm', emo:'🌑', tint:'linear-gradient(180deg,#0b0b12,#1c1026)', accent:'#8a6fc4', critter:'🦇', land:'🕯️', palette:[
      ['#4a2d4e','#7a5580','#241226'],['#2d3a52','#54648a','#141c2e'],['#2d4a3e','#557a68','#12241c'],
      ['#52305e','#825794','#2a1430'],['#5e5230','#948257','#302a14'],['#3e3e46','#6e6e78','#1c1c22']] },
    { name:'Crystal Caverns', emo:'💎', tint:'linear-gradient(180deg,#0e1c26,#13303e)', accent:'#7fd8e8', critter:'🐻‍❄️', land:'❄️', palette:[
      ['#c46f8a','#e8a5ba','#7e3a52'],['#5f9fd8','#a0cbee','#2f6494'],['#6fc4a0','#a8e4cb','#3a8264'],
      ['#a08ad8','#c9baee','#645094'],['#d8c46f','#eee0a5','#94823a'],['#b8ccd8','#e2eef4','#7a8e9c']] },
    { name:'Volcano Ring', emo:'🔥', tint:'linear-gradient(180deg,#1c0c08,#3a1208)', accent:'#e8763f', critter:'🦂', land:'⚒️', palette:[
      ['#c43f2d','#e87a5f','#7a1e12'],['#8a4a2d','#c47f55','#4e2312'],['#d8742d','#eea55f','#8e4412'],
      ['#a02d4a','#d05578','#5e1226'],['#e8b02d','#f4d05f','#946a12'],['#5e5450','#8e847e','#2e2926']] },
    { name:'Sky Kingdom', emo:'☁️', tint:'linear-gradient(180deg,#16243e,#2a4468)', accent:'#e8dfa0', critter:'🦅', land:'🏰', palette:[
      ['#d86f7f','#eea5b0','#943a48'],['#6fa5e8','#a5c9f4','#3a6aa4'],['#7fd88a','#b0eab8','#48944f'],
      ['#c98ae8','#e0baf4','#8250a4'],['#e8d86f','#f4eaa5','#a4943a'],['#e8e8f0','#ffffff','#a0a0b8']] },
    { name:'Neon Jungle', emo:'🌴', tint:'linear-gradient(180deg,#081208,#10240e)', accent:'#5fe85f', critter:'🐸', land:'🗼', palette:[
      ['#ff3f6a','#ff7f9a','#a01235'],['#2da5ff','#6fc4ff','#0f5ea0'],['#2dff8a','#7fffb8','#0fa04e'],
      ['#c42dff','#da6fff','#720fa0'],['#ffd82d','#ffe86f','#a0820f'],['#2dfff0','#8afff8','#0fa096']] },
  ];
  var BASE_GEMS=GEMS.map(function(g2){ return { base:g2.base, light:g2.light, dark:g2.dark }; });
  function applyBiomePalette(biome){
    var pal=biome&&biome.palette;
    for(var gi=0; gi<NTYPES; gi++){
      var src2=pal?{base:pal[gi][0],light:pal[gi][1],dark:pal[gi][2]}:BASE_GEMS[gi];
      GEMS[gi].base=src2.base; GEMS[gi].light=src2.light; GEMS[gi].dark=src2.dark;
    }
  }
  var VOY_LEVELS=[];
  (function(){ for(var i=0;i<50;i++) VOY_LEVELS.push({
    moves: Math.min(28, 16+Math.floor(i/5)*2),         // 16 → 28 across the ten isles
    target: Math.round((700+i*430)*(1+i*0.02)),        // ~700 → ~43k on the final neon shore
  }); })();
  var VOY_KEY='gem-cascade-voyage-v1';
  var voyState=(function(){ try{ return JSON.parse(localStorage.getItem(VOY_KEY))||{stars:{},unlocked:1}; }catch(e){ return {stars:{},unlocked:1}; } })();
  function voySave(){ try{ localStorage.setItem(VOY_KEY, JSON.stringify(voyState)); }catch(e){} }
  var voy={ lvl:-1, movesLeft:0 };
  var vmap=document.getElementById('vmap'), vmapIsles=document.getElementById('vmapIsles');
  function buildMap(){
    vmapIsles.innerHTML='';
    for(var b2=0;b2<10;b2++){
      var isle=document.createElement('div');
      var isleUnlocked=voyState.unlocked>b2*5;
      var isleCleared=true;
      for(var ci=b2*5; ci<b2*5+5; ci++) if(!(voyState.stars[ci]>0)) isleCleared=false;
      isle.className='isle'+(isleUnlocked?'':' locked')+(isleUnlocked&&isleCleared?' cleared':'');
      isle.style.setProperty('--acc', BIOMES[b2].accent);
      isle.setAttribute('aria-label', BIOMES[b2].name+(isleUnlocked?'':' — locked'));
      var cr=document.createElement('span'); cr.className='critter'; cr.setAttribute('aria-hidden','true');
      cr.textContent=BIOMES[b2].critter||BIOMES[b2].emo;
      cr.style.animationDelay=(b2*0.7)+'s';
      isle.appendChild(cr);
      var lm=document.createElement('span'); lm.className='landmark'; lm.setAttribute('aria-hidden','true');
      lm.textContent=BIOMES[b2].land||'✦';
      lm.style.animationDelay=(b2*0.45)+'s';
      isle.appendChild(lm);
      var h3=document.createElement('h3');
      h3.textContent=BIOMES[b2].emo+' '+BIOMES[b2].name;
      h3.style.color=isleUnlocked?BIOMES[b2].accent:'';
      isle.appendChild(h3);
      var row=document.createElement('div'); row.className='isle-nodes';
      for(var li=0;li<5;li++){
        var idx=b2*5+li, node=document.createElement('button');
        node.type='button'; node.className='lvl-node';
        var st=voyState.stars[idx]||0;
        if(st) node.classList.add('done');
        node.innerHTML=(idx<voyState.unlocked ? (idx+1) : '🔒')+'<span class="st">'+(st?'★'.repeat(st):'&nbsp;')+'</span>';
        node.disabled=idx>=voyState.unlocked;
        node.setAttribute('aria-label','Level '+(idx+1)+(node.disabled?' locked':' · '+st+' stars'));
        (function(id){ node.addEventListener('click', function(){ startVoyLevel(id); }); })(idx);
        row.appendChild(node);
      }
      isle.appendChild(row);
      if(!isleUnlocked){
        var gate=document.createElement('div');
        /* the gate LIGHTS UP once the realm before it is fully cleared — one step from opening */
        var prevCleared=b2>0;
        for(var pi=(b2-1)*5; pi<b2*5&&prevCleared; pi++) if(!(voyState.stars[pi]>0)) prevCleared=false;
        gate.className='gate'+(prevCleared?' lit':'');
        gate.innerHTML='<span class="bars" aria-hidden="true">'+(prevCleared?'⛓️✨⛓️':'⛓️🔒⛓️')+'</span>'+
          '<span>the '+(BIOMES[b2].critter||'')+' guards this realm</span>'+
          '<span>'+(prevCleared?'the gate glows — one more win and it opens':'clear level '+(b2*5)+' to raise the gate')+'</span>';
        isle.appendChild(gate);
      }
      vmapIsles.appendChild(isle);
    }
  }
  function openMap(){ buildMap(); vmap.hidden=false; }
  function startVoyLevel(i){
    voy.lvl=i; voy.movesLeft=VOY_LEVELS[i].moves;
    vmap.hidden=true;
    newGame('voyage');
  }
  function voyBiome(){ return BIOMES[Math.floor(voy.lvl/5)]||BIOMES[0]; }
  function useVoyMove(){
    if(gameMode!=='voyage'||ended||voy.lvl<0) return;
    voy.movesLeft--; setGoal();
  }
  function voyCheckEnd(){
    if(gameMode!=='voyage'||ended||voy.lvl<0) return;
    var L=VOY_LEVELS[voy.lvl];
    if(stats.score>=L.target){
      var st=1+(voy.movesLeft>=L.moves*0.25?1:0)+(voy.movesLeft>=L.moves*0.5?1:0);
      voyState.stars[voy.lvl]=Math.max(voyState.stars[voy.lvl]||0, st);
      voyState.unlocked=Math.max(voyState.unlocked, Math.min(50, voy.lvl+2));
      voySave();                                          // progression must survive reloads
      var keys=['cannon','anchor','map'], won=keys[Math.floor(Math.random()*3)];
      BOOTY[won]=(BOOTY[won]||0)+1; bootySave(); paintBooty();
      endGame('voywin', { stars:st, booty:won });
    } else if(voy.movesLeft<=0){
      endGame('voylose');
    }
  }
  /* ═══ PIRATE POWER-UPS — the booty ═══ */
  var BOOTY_KEY='gem-cascade-booty-v1';
  var BOOTY=(function(){ try{ return JSON.parse(localStorage.getItem(BOOTY_KEY))||{cannon:2,anchor:1,map:1}; }catch(e){ return {cannon:2,anchor:1,map:1}; } })();
  function bootySave(){ try{ localStorage.setItem(BOOTY_KEY, JSON.stringify(BOOTY)); }catch(e){} }
  var armed=null;
  var POW={ cannon:{el:document.getElementById('pw-cannon'), ico:'🧨', name:'Cannonball'},
            anchor:{el:document.getElementById('pw-anchor'), ico:'⚓', name:'Anchor'},
            map:{el:document.getElementById('pw-map'), ico:'🗺', name:'Treasure Map'} };
  function paintBooty(){
    for(var k in POW){ var b3=POW[k].el; if(!b3) continue;
      b3.textContent=POW[k].ico+' '+POW[k].name+' ×'+(BOOTY[k]||0);
      b3.disabled=!(BOOTY[k]>0);
      b3.classList.toggle('armed', armed===k);
      b3.setAttribute('aria-pressed', armed===k?'true':'false');
    }
  }
  function firePower(kind, hit){
    var set={};
    if(kind==='cannon'){ for(var dr=-1;dr<=1;dr++) for(var dc=-1;dc<=1;dc++){
      var rr=hit.r+dr, cc=hit.c+dc; if(rr>=0&&rr<ROWS&&cc>=0&&cc<COLS) set[keyRC(rr,cc)]=1; } }
    else if(kind==='anchor'){ for(var r4=0;r4<ROWS;r4++) set[keyRC(r4,hit.c)]=1; }
    BOOTY[kind]--; bootySave(); armed=null; paintBooty();
    combo=0; beginClearSet(set);
    live.textContent=POW[kind].name+' fired!';
  }
  ['cannon','anchor'].forEach(function(k2){
    if(!POW[k2].el) return;
    POW[k2].el.addEventListener('click', function(){
      if(!(BOOTY[k2]>0)||mode!=='idle'||ended) return;
      ensureAudio(); armed=(armed===k2)?null:k2; paintBooty();
      live.textContent=armed?(POW[k2].name+' armed — tap the board'):'stowed.';
    });
  });
  if(POW.map.el) POW.map.el.addEventListener('click', function(){
    if(!(BOOTY.map>0)||mode!=='idle'||ended) return;
    ensureAudio();
    var spots=[];
    for(var r5=0;r5<ROWS;r5++) for(var c5=0;c5<COLS;c5++) if(cells[r5][c5].type>=0&&cells[r5][c5].type<NTYPES&&!cells[r5][c5].special) spots.push({r:r5,c:c5});
    if(!spots.length) return;
    var s2=spots[Math.floor(Math.random()*spots.length)];
    cells[s2.r][s2.c].special='rainbow'; cells[s2.r][s2.c].type=RAINBOW_T;
    BOOTY.map--; bootySave(); paintBooty();
    live.textContent='The map was true — a rainbow gem surfaces!';
  });
  document.getElementById('vmapClose').addEventListener('click', function(){ vmap.hidden=true; if(gameMode==='voyage'&&voy.lvl<0) newGame('endless'); });
  paintBooty();

  // ---- input ----
  function cellAt(px,py){ var c=Math.floor(px/TILE), r=Math.floor(py/TILE); if(r<0||r>=ROWS||c<0||c>=COLS) return null; return {r:r,c:c}; }
  function adjacent(a,b){ return (Math.abs(a.r-b.r)+Math.abs(a.c-b.c))===1; }
  function onPick(px,py){
    if(mode!=='idle') return;
    var hit=cellAt(px,py); if(!hit) return;
    ensureAudio();
    if(armed){ firePower(armed, hit); return; }
    if(!sel){ sel=hit; sndSel(); return; }
    if(sel.r===hit.r && sel.c===hit.c){ sel=null; return; }
    if(adjacent(sel,hit)){ var a=sel; sel=null; trySwap(a,hit); }
    else { sel=hit; sndSel(); }
  }
  /* v1.1 mobile: coords scaled to CSS size (board shrinks on phones), and
     SWIPE = the native match-3 gesture — drag a gem toward its neighbour.
     Tap-tap still works exactly as before. */
  function evCell(e){
    var rect=cv.getBoundingClientRect();
    var sx=(COLS*TILE)/rect.width, sy=(ROWS*TILE)/rect.height;
    return { x:(e.clientX-rect.left)*sx, y:(e.clientY-rect.top)*sy, rect:rect };
  }
  var swipeStart=null;
  cv.addEventListener('pointerdown', function(e){ e.preventDefault();
    var p=evCell(e);
    swipeStart={ cell:cellAt(p.x,p.y), cx:e.clientX, cy:e.clientY, cssCell:p.rect.width/COLS, done:false };
    try{ cv.setPointerCapture(e.pointerId); }catch(err){}
  });
  cv.addEventListener('pointermove', function(e){
    if(!swipeStart||swipeStart.done||!swipeStart.cell) return;
    var dx=e.clientX-swipeStart.cx, dy=e.clientY-swipeStart.cy;
    var th=swipeStart.cssCell*0.4;
    if(Math.abs(dx)<th&&Math.abs(dy)<th) return;
    var a=swipeStart.cell, b;
    if(Math.abs(dx)>Math.abs(dy)) b={ r:a.r, c:a.c+(dx>0?1:-1) };
    else b={ r:a.r+(dy>0?1:-1), c:a.c };
    swipeStart.done=true;
    if(b.r<0||b.r>=ROWS||b.c<0||b.c>=COLS) return;
    sel=null;
    trySwap(a,b);
  });
  cv.addEventListener('pointerup', function(e){
    if(swipeStart&&!swipeStart.done){          /* no swipe happened → it was a tap */
      var p=evCell(e);
      onPick(p.x, p.y);
    }
    swipeStart=null;
  });

  document.getElementById('newBtn').addEventListener('click', function(){ ensureAudio(); newGame(gameMode); });
  document.getElementById('hintBtn').addEventListener('click', function(){
    if(ended || mode!=='idle') return;
    ensureAudio();
    var mv=collectMoves()[0];
    if(mv){ liveHint={a:mv.a,b:mv.b}; liveHintUntil=performance.now()+2600; sndSel(); live.textContent='Hint: try the glowing swap.'; }
    else { live.textContent='No swaps available.'; }
  });
  document.querySelectorAll('.mode-btn').forEach(function(b){
    b.addEventListener('click', function(){
      document.querySelectorAll('.mode-btn').forEach(function(x){ x.classList.toggle('active', x===b); });
      ensureAudio();
      var m3=b.getAttribute('data-mode');
      if(m3==='voyage'){ voy.lvl=-1; gameMode='voyage'; openMap(); setGoal(); return; }
      newGame(m3);
    });
  });
  ovBtn.addEventListener('click', function(){ ensureAudio(); ov.hidden=true;
    if(gameMode==='voyage'){ voy.lvl=-1; openMap(); return; }
    newGame(gameMode); });

  // ---- achievements ----
  var ACH=[
    { id:'first', ico:'✦', name:'First Spark', desc:'Make your first match', t:function(s){return s.gemsCleared>=1;} },
    { id:'four',  ico:'◈', name:'Four-in-a-Row', desc:'Clear four in a line for a multiplier', t:function(s){return s.bestMatch>=4;} },
    { id:'big5',  ico:'◆', name:'Five Aligned', desc:'Match five in a line', t:function(s){return s.bestMatch>=5;} },
    { id:'surv60',ico:'⏳', name:'Survivor', desc:'Survive 60 seconds', t:function(s){return s.survivalBest>=60;} },
    { id:'k1000', ico:'🏆', name:'Millennium', desc:'Finish 1000-gem mode', t:function(s){return s.completed1000;} },
    { id:'c3',    ico:'⛓', name:'Chain Reaction', desc:'Reach a ×3 cascade', t:function(s){return s.maxCombo>=3;} },
    { id:'c5',    ico:'❖', name:'Cascade Master', desc:'Reach a ×5 cascade', t:function(s){return s.maxCombo>=5;} },
    { id:'g100',  ico:'💠', name:'Gem Collector', desc:'Clear 100 gems', t:function(s){return s.gemsCleared>=100;} },
    { id:'g500',  ico:'👑', name:'Vault Keeper', desc:'Clear 500 gems', t:function(s){return s.gemsCleared>=500;} },
    { id:'s5k',   ico:'⚜', name:'Jeweler', desc:'Score 5,000', t:function(s){return s.score>=5000;} },
    { id:'s25k',  ico:'💎', name:'Crown Jewels', desc:'Score 25,000', t:function(s){return s.score>=25000;} },
    { id:'c7',    ico:'🌪', name:'Cascade Storm', desc:'Reach a ×7 cascade', t:function(s){return s.maxCombo>=7;} },
    { id:'surv120',ico:'🛡', name:'Iron Will', desc:'Survive 120 seconds', t:function(s){return s.survivalBest>=120;} },
    { id:'last',  ico:'⌛', name:'Last Stand', desc:'Run out of time with 5+ moves left', t:function(s){return s.diedWithMoves;} }
  ];
  var KEY='gem-cascade-ach-v1', unlocked={};
  try{ unlocked=JSON.parse(localStorage.getItem(KEY))||{}; }catch(e){ unlocked={}; }
  var achList=document.getElementById('achList'), achCount=document.getElementById('achCount');
  function renderAch(){
    achList.innerHTML=''; var n=0;
    ACH.forEach(function(a){ if(unlocked[a.id]) n++;
      var li=document.createElement('li'); li.className='ach-li'+(unlocked[a.id]?' on':'');
      li.innerHTML='<span class="ico">'+a.ico+'</span><span class="tx"><b>'+a.name+'</b><span>'+a.desc+'</span></span>';
      achList.appendChild(li);
    });
    achCount.textContent=n+'/'+ACH.length;
  }
  function checkAch(){
    ACH.forEach(function(a){ if(!unlocked[a.id] && a.t(stats)){ unlocked[a.id]=1;
      try{ localStorage.setItem(KEY, JSON.stringify(unlocked)); }catch(e){}
      renderAch(); showToast(a); sndAch(); } });
  }
  function showToast(a){
    document.getElementById('toastIco').textContent=a.ico;
    document.getElementById('toastName').textContent=a.name;
    document.getElementById('toastDesc').textContent='Achievement · '+a.desc;
    toast.classList.add('show'); clearTimeout(showToast._t); showToast._t=setTimeout(function(){ toast.classList.remove('show'); }, 2600);
    live.textContent='Achievement unlocked: '+a.name;
  }

  // ---- audio (subtle) ----
  var AC=null;
  function ensureAudio(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(AC&&AC.state==='suspended') AC.resume(); }
  function blip(type,f0,f1,dur,vol){ if(!AC) return; var t=AC.currentTime; var o=AC.createOscillator(),g=AC.createGain();
    o.type=type; o.frequency.setValueAtTime(f0,t); o.frequency.exponentialRampToValueAtTime(f1,t+dur);
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.0008,t+dur); o.connect(g); g.connect(AC.destination); o.start(t); o.stop(t+dur+0.02); }
  function sndSel(){ blip('sine',520,560,0.08,0.05); }
  // clear sound pitched by combo
  var _clearOrig=beginClear;
  beginClear=function(m){ _clearOrig(m); blip('triangle', 360+combo*70, 540+combo*90, 0.18, 0.09); };
  function sndAch(){ if(!AC) return; [659,988,1319].forEach(function(f,i){ setTimeout(function(){ blip('triangle',f,f,0.3,0.08); }, i*90); }); }

  renderAch(); newGame(); tick();
})();
