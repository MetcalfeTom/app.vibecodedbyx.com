<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Gem Cascade</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%92%8E" />

<meta name="description" content="A calm, dark match-3. Swap faceted gems to line up three or more, trigger cascading chains, and unlock achievements. No flashing neon — just jewels on slate." />
<meta property="og:type" content="website" />
<meta property="og:title" content="Gem Cascade" />
<meta property="og:description" content="Swap gems, chain cascades, unlock achievements. A dark, elegant match-3." />
<meta property="og:url" content="https://sloppy.live/gem-cascade/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/faceted%20gemstones%20on%20dark%20slate%2C%20match%20three%20grid%2C%20deep%20jewel%20tones%2C%20moody%20elegant%2C%20no%20neon?width=1200&height=630&nologo=true&seed=808" />
<meta name="twitter:card" content="summary_large_image" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=IBM+Plex+Mono:wght@400;500&family=Cormorant+Garamond:ital@0;1&display=swap" rel="stylesheet" />

<style>
  :root{
    --bg:#14161b; --panel:#1c1f27; --panel2:#23262f; --line:#33384400; --line2:#3a404d;
    --ink:#e7e3da; --dim:#8b909c; --gold:#c9a44c; --gold-d:#9c7c2f; --rose:#b06a5e;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  body{
    min-height:100vh; font-family:'IBM Plex Mono',monospace; color:var(--ink);
    background:
      radial-gradient(120% 80% at 50% -20%, #20242d 0%, transparent 55%),
      var(--bg);
    display:flex; flex-direction:column; align-items:center; padding:1.1rem .8rem 2rem;
    -webkit-font-smoothing:antialiased;
  }
  header{ text-align:center; margin-bottom:.4rem; }
  h1{ font-family:'Cinzel',serif; font-weight:700; font-size:clamp(1.8rem,6vw,2.9rem); letter-spacing:.08em;
    color:var(--gold); text-shadow:0 2px 8px rgba(0,0,0,.5); }
  .tag{ font-family:'Cormorant Garamond',serif; font-style:italic; font-size:1rem; color:var(--dim); margin-top:.15rem; }

  .wrap{ display:grid; grid-template-columns:auto 220px; gap:1rem; align-items:start; margin-top:.8rem; }
  @media (max-width:760px){ .wrap{ grid-template-columns:1fr; } }

  .game{ display:flex; flex-direction:column; align-items:center; gap:.7rem; }
  .hud{ display:flex; gap:.5rem; width:100%; }
  .stat{ flex:1; background:var(--panel); border:1px solid var(--line2); border-radius:10px; padding:.45rem .6rem; text-align:center; }
  .stat .k{ font-size:.54rem; letter-spacing:.16em; text-transform:uppercase; color:var(--dim); }
  .stat .v{ font-family:'Cinzel',serif; font-weight:700; font-size:1.3rem; color:var(--ink); line-height:1.1; }
  .stat.combo .v{ color:var(--gold); }

  .board-wrap{ position:relative; background:var(--panel); border:1px solid var(--line2); border-radius:14px;
    padding:9px; box-shadow:0 18px 40px rgba(0,0,0,.45), inset 0 0 0 1px rgba(255,255,255,.02); }
  canvas{ display:block; border-radius:8px; background:#181b21; touch-action:none; cursor:pointer; }
  .btn{ font-family:'IBM Plex Mono',monospace; font-size:.74rem; letter-spacing:.06em; cursor:pointer; color:var(--ink);
    background:var(--panel2); border:1px solid var(--line2); border-radius:9px; padding:.5rem .9rem; min-height:2.5rem; transition:border-color .15s; }
  .btn:hover{ border-color:var(--gold-d); } .btn:focus-visible{ outline:2px solid var(--gold); outline-offset:2px; }

  .modes{ display:flex; gap:.4rem; width:100%; }
  .mode-btn{ flex:1; font-family:'IBM Plex Mono',monospace; font-size:.72rem; letter-spacing:.03em; cursor:pointer;
    background:var(--panel); color:var(--dim); border:1px solid var(--line2); border-radius:9px; padding:.45rem .3rem; min-height:2.4rem; transition:all .15s; }
  .mode-btn:hover{ color:var(--ink); border-color:var(--gold-d); }
  .mode-btn.active{ color:#16161a; background:var(--gold); border-color:var(--gold); font-weight:500; }
  .mode-btn:focus-visible{ outline:2px solid var(--gold); outline-offset:2px; }
  .goal{ font-family:'Cormorant Garamond',serif; font-style:italic; font-size:.98rem; color:var(--dim); min-height:1.2rem; text-align:center; }
  .surv-meter{ width:100%; height:13px; background:var(--panel); border:1px solid var(--line2); border-radius:7px; overflow:hidden; }
  .surv-meter[hidden]{ display:none; }
  .surv-meter i{ display:block; height:100%; width:100%; background:linear-gradient(90deg,#7a3b34,#b07d22,#2f7d52); transition:width .12s linear; }
  .ov{ position:absolute; inset:0; display:flex; align-items:center; justify-content:center; background:rgba(10,11,14,.88); border-radius:8px; z-index:5; }
  .ov[hidden]{ display:none; }
  .ov-card{ text-align:center; padding:1.2rem; }
  .ov-title{ font-family:'Cinzel',serif; font-weight:700; font-size:clamp(1.3rem,5vw,1.8rem); color:var(--gold); margin-bottom:.5rem; }
  .ov-stats{ font-family:'IBM Plex Mono',monospace; font-size:.8rem; color:var(--ink); line-height:1.9; margin-bottom:1rem; }
  .ov-stats b{ color:var(--gold); }
  .runflash{ position:absolute; top:8px; left:50%; transform:translateX(-50%); font-family:'Cinzel',serif; font-weight:700;
    font-size:1.15rem; color:var(--gold); opacity:0; pointer-events:none; text-shadow:0 2px 6px #000; z-index:4; }
  .runflash.show{ animation:runf 1s ease; }
  @keyframes runf{ 0%{opacity:0;transform:translateX(-50%) scale(.7)} 20%{opacity:1;transform:translateX(-50%) scale(1.12)} 100%{opacity:0;transform:translate(-50%,-16px) scale(1)} }

  .ach{ background:var(--panel); border:1px solid var(--line2); border-radius:12px; padding:.7rem .8rem; }
  .ach h2{ font-family:'Cinzel',serif; font-weight:700; font-size:.95rem; letter-spacing:.06em; color:var(--gold);
    margin-bottom:.5rem; display:flex; justify-content:space-between; align-items:baseline; }
  .ach h2 small{ font-family:'IBM Plex Mono',monospace; font-size:.62rem; color:var(--dim); letter-spacing:.06em; }
  .ach ul{ list-style:none; display:flex; flex-direction:column; gap:.4rem; }
  .ach li{ display:flex; gap:.5rem; align-items:flex-start; opacity:.5; transition:opacity .3s; }
  .ach li.on{ opacity:1; }
  .ach li .ico{ flex:0 0 auto; width:1.5rem; height:1.5rem; border-radius:6px; background:var(--panel2);
    border:1px solid var(--line2); display:grid; place-items:center; font-size:.8rem; }
  .ach li.on .ico{ background:rgba(201,164,76,.16); border-color:var(--gold-d); }
  .ach li .tx b{ display:block; font-size:.72rem; color:var(--ink); }
  .ach li .tx span{ display:block; font-family:'Cormorant Garamond',serif; font-style:italic; font-size:.82rem; color:var(--dim); line-height:1.2; }

  .toast{ position:fixed; left:50%; bottom:1.3rem; transform:translate(-50%,2rem); background:var(--panel2);
    border:1px solid var(--gold-d); border-radius:10px; padding:.55rem .9rem; display:flex; gap:.55rem; align-items:center;
    box-shadow:0 12px 30px rgba(0,0,0,.5); opacity:0; transition:all .3s; z-index:40; max-width:90vw; }
  .toast.show{ opacity:1; transform:translate(-50%,0); }
  .toast .ti{ font-size:1.2rem; } .toast .tt b{ display:block; font-size:.74rem; color:var(--gold); font-family:'Cinzel',serif; }
  .toast .tt span{ display:block; font-size:.66rem; color:var(--dim); }

  footer{ margin-top:1.2rem; font-size:.6rem; color:var(--dim); text-align:center; }
  .sr-only{ position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0,0,0,0); }
  @media (prefers-reduced-motion: reduce){ .toast{ transition:opacity .3s; } }
</style>
</head>
<body>
  <header>
    <h1>Gem Cascade</h1>
    <div class="tag">swap · chain · collect</div>
  </header>

  <div class="wrap">
    <div class="game">
      <div class="modes" role="group" aria-label="Game mode">
        <button class="mode-btn active" data-mode="endless" type="button">Endless</button>
        <button class="mode-btn" data-mode="gems1000" type="button">1000 Gems</button>
        <button class="mode-btn" data-mode="survival" type="button">Survival</button>
      </div>
      <div class="hud">
        <div class="stat"><div class="k">Score</div><div class="v" id="score">0</div></div>
        <div class="stat combo"><div class="k">Combo</div><div class="v" id="combo">—</div></div>
        <div class="stat"><div class="k">Gems</div><div class="v" id="gems">0</div></div>
      </div>
      <div class="goal" id="goal" aria-live="polite"></div>
      <div class="board-wrap">
        <canvas id="cv" role="application"
          aria-label="Match-3 board. Click a gem, then click an adjacent gem to swap them. Line up three or more of the same gem to clear them and trigger cascades. Four in a row scores a multiplier."></canvas>
        <div class="runflash" id="runflash" aria-hidden="true"></div>
        <div class="ov" id="ov" hidden>
          <div class="ov-card">
            <div class="ov-title" id="ovTitle"></div>
            <div class="ov-stats" id="ovStats"></div>
            <button class="btn" id="ovBtn" type="button">Play again</button>
          </div>
        </div>
      </div>
      <div class="surv-meter" id="survMeter" hidden><i id="survFill"></i></div>
      <button class="btn" id="newBtn" type="button">New game</button>
    </div>

    <aside class="ach">
      <h2>Achievements <small id="achCount">0/8</small></h2>
      <ul id="achList"></ul>
    </aside>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite">
    <span class="ti" id="toastIco">🏅</span>
    <div class="tt"><b id="toastName"></b><span id="toastDesc"></span></div>
  </div>

  <p class="sr-only" id="live" role="status" aria-live="polite"></p>
  <footer>An original dark match-3. Click two adjacent gems to swap. Cascades chain automatically.</footer>

<script>
(function(){
  "use strict";
  var ROWS=8, COLS=8, TILE=54;
  var cv=document.getElementById('cv'), X=cv.getContext('2d');
  var DPR=Math.min(2, window.devicePixelRatio||1);
  cv.width=COLS*TILE*DPR; cv.height=ROWS*TILE*DPR; cv.style.width=(COLS*TILE)+'px'; cv.style.height=(ROWS*TILE)+'px';
  X.scale(DPR,DPR);

  var scoreEl=document.getElementById('score'), comboEl=document.getElementById('combo'), gemsEl=document.getElementById('gems'),
      live=document.getElementById('live'), toast=document.getElementById('toast'),
      goalEl=document.getElementById('goal'), survMeter=document.getElementById('survMeter'), survFill=document.getElementById('survFill'),
      ov=document.getElementById('ov'), ovTitle=document.getElementById('ovTitle'), ovStats=document.getElementById('ovStats'),
      ovBtn=document.getElementById('ovBtn'), runflash=document.getElementById('runflash');

  // modes: 'endless' | 'gems1000' | 'survival'
  var gameMode='endless', ended=false, survival=100, survivalTime=0, playTime=0, lastSurvSec=0, lastT=performance.now();
  var GEM_GOAL=1000, SURV_DRAIN0=5, SURV_ADD=3.6;

  var GEMS=[
    { base:'#9e2b3a', light:'#d4596a', dark:'#5c1722', shape:'diamond' },  // ruby
    { base:'#2c4f8c', light:'#5f86c6', dark:'#16294e', shape:'circle' },   // sapphire
    { base:'#2f7d52', light:'#5fc189', dark:'#194a31', shape:'rsquare' },  // emerald
    { base:'#6b3f8e', light:'#a273c4', dark:'#3d2152', shape:'hex' },      // amethyst
    { base:'#b07d22', light:'#e4b85f', dark:'#6e4c10', shape:'triangle' }, // topaz
    { base:'#8a8f98', light:'#d4d8de', dark:'#565b63', shape:'oval' }      // quartz
  ];
  var NTYPES=GEMS.length;

  // each cell: { type, dx, dy, clearing, clearT }
  var cells=[], mode='idle', sel=null, swapPair=null;
  var stats={ score:0, gemsCleared:0, maxCombo:0, bestMatch:0, survivalBest:0, completed1000:0 }, combo=0;

  function mk(){ return { type:0, dx:0, dy:0, clearing:false, clearT:0 }; }
  function randType(){ return Math.floor(Math.random()*NTYPES); }

  function fillNoMatch(){
    for(var r=0;r<ROWS;r++) for(var c=0;c<COLS;c++){
      var t, tries=0;
      do{ t=randType(); tries++; }
      while(tries<30 && (
        (c>=2 && cells[r][c-1].type===t && cells[r][c-2].type===t) ||
        (r>=2 && cells[r-1][c].type===t && cells[r-2][c].type===t) ));
      cells[r][c].type=t; cells[r][c].dx=0; cells[r][c].dy=0; cells[r][c].clearing=false; cells[r][c].clearT=0;
    }
  }
  function newGame(m){
    if(m) gameMode=m;
    cells=[]; for(var r=0;r<ROWS;r++){ cells[r]=[]; for(var c=0;c<COLS;c++) cells[r][c]=mk(); }
    fillNoMatch(); while(!hasMoves()) fillNoMatch();
    mode='idle'; sel=null; combo=0; ended=false;
    stats.score=0; stats.gemsCleared=0; stats.maxCombo=0; stats.bestMatch=0;
    survival=100; survivalTime=0; playTime=0; lastSurvSec=0; lastT=performance.now();
    if(ov) ov.hidden=true;
    survMeter.hidden = (gameMode!=='survival');
    setGoal(); updHUD();
  }
  function setGoal(){
    if(gameMode==='gems1000'){ var left=Math.max(0, GEM_GOAL-stats.gemsCleared); goalEl.textContent = left>0 ? ('clear 1,000 gems · '+left.toLocaleString()+' to go') : 'goal reached!'; }
    else if(gameMode==='survival'){ goalEl.textContent = 'survive · clear gems to refill the meter'; }
    else goalEl.textContent = 'endless · chase the cascade';
  }
  function updHUD(){ scoreEl.textContent=stats.score.toLocaleString(); gemsEl.textContent=stats.gemsCleared.toLocaleString();
    comboEl.textContent = combo>0 ? ('×'+combo) : '—'; }

  // ---- matches ----
  function findMatches(){
    var set={}, maxRun=0, key=function(r,c){return r+','+c;};
    // rows
    for(var r=0;r<ROWS;r++){ var run=1; for(var c=1;c<=COLS;c++){
      if(c<COLS && cells[r][c].type===cells[r][c-1].type && cells[r][c].type>=0){ run++; }
      else { if(run>=3){ maxRun=Math.max(maxRun,run); for(var k=0;k<run;k++) set[key(r,c-1-k)]=1; } run=1; }
    }}
    // cols
    for(var c2=0;c2<COLS;c2++){ var run2=1; for(var r2=1;r2<=ROWS;r2++){
      if(r2<ROWS && cells[r2][c2].type===cells[r2-1][c2].type && cells[r2][c2].type>=0){ run2++; }
      else { if(run2>=3){ maxRun=Math.max(maxRun,run2); for(var k2=0;k2<run2;k2++) set[key(r2-1-k2,c2)]=1; } run2=1; }
    }}
    return { set:set, count:Object.keys(set).length, maxRun:maxRun };
  }

  function hasMoves(){
    function swap(a,b){ var t=cells[a[0]][a[1]].type; cells[a[0]][a[1]].type=cells[b[0]][b[1]].type; cells[b[0]][b[1]].type=t; }
    for(var r=0;r<ROWS;r++) for(var c=0;c<COLS;c++){
      if(c<COLS-1){ swap([r,c],[r,c+1]); var m=findMatches().count; swap([r,c],[r,c+1]); if(m) return true; }
      if(r<ROWS-1){ swap([r,c],[r+1,c]); var m2=findMatches().count; swap([r,c],[r+1,c]); if(m2) return true; }
    }
    return false;
  }

  // ---- swap + resolve ----
  function doSwapVisual(a,b){
    var ca=cells[a.r][a.c], cb=cells[b.r][b.c];
    var t=ca.type; ca.type=cb.type; cb.type=t;          // swap model
    // offsets so they slide from each other's home
    ca.dx=(b.c-a.c)*TILE; ca.dy=(b.r-a.r)*TILE;
    cb.dx=(a.c-b.c)*TILE; cb.dy=(a.r-b.r)*TILE;
  }
  function trySwap(a,b){
    if(mode!=='idle') return;
    swapPair={a:a,b:b}; doSwapVisual(a,b); mode='swap';
  }
  function onSwapSettled(){
    var m=findMatches();
    if(m.count){ combo=0; beginClear(m); }
    else { doSwapVisual(swapPair.a, swapPair.b); mode='revert'; }   // illegal → swap back
  }
  function beginClear(m){
    combo++; stats.maxCombo=Math.max(stats.maxCombo,combo); stats.bestMatch=Math.max(stats.bestMatch,m.maxRun);
    // four-in-a-row (or longer) earns a cascade MULTIPLIER on top of the combo
    var runMult = m.maxRun>=5 ? 3 : (m.maxRun>=4 ? 2 : 1);
    var n=m.count; stats.gemsCleared+=n; stats.score += n*10*combo*runMult;
    if(runMult>1) showRunFlash(m.maxRun, runMult);
    if(gameMode==='survival') survival=Math.min(100, survival + Math.min(40, n*SURV_ADD));
    for(var kk in m.set){ var p=kk.split(','); var cell=cells[+p[0]][+p[1]]; cell.clearing=true; cell.clearT=0; }
    mode='clear'; updHUD(); setGoal(); checkAch(); checkGoals();
    if(combo>=2) live.textContent='Combo ×'+combo+'!';
  }
  function showRunFlash(run, mult){
    runflash.textContent = (run>=5?'FIVE':'FOUR') + ' IN A ROW · ×' + mult;
    runflash.classList.remove('show'); void runflash.offsetWidth; runflash.classList.add('show');
  }
  function checkGoals(){
    if(ended) return;
    if(gameMode==='gems1000' && stats.gemsCleared>=GEM_GOAL){ stats.completed1000=1; checkAch(); endGame('win1000'); }
  }
  function endGame(kind){
    if(ended && mode==='over') {} ended=true; mode='over'; sel=null;
    var t=playTime.toFixed(1);
    if(kind==='win1000'){
      ovTitle.textContent='1,000 Gems!';
      ovStats.innerHTML='time <b>'+t+'s</b><br>score <b>'+stats.score.toLocaleString()+'</b><br>best combo <b>×'+stats.maxCombo+'</b>';
      live.textContent='You cleared 1,000 gems!';
    } else {
      ovTitle.textContent='Game Over';
      ovStats.innerHTML='survived <b>'+survivalTime.toFixed(1)+'s</b><br>gems <b>'+stats.gemsCleared.toLocaleString()+'</b><br>score <b>'+stats.score.toLocaleString()+'</b>';
      live.textContent='Game over.';
    }
    ov.hidden=false;
  }
  function onClearDone(){
    for(var r=0;r<ROWS;r++) for(var c=0;c<COLS;c++){ if(cells[r][c].clearing){ cells[r][c].clearing=false; cells[r][c].clearT=0; cells[r][c].type=-1; } }
    collapse(); mode='fall';
  }
  function collapse(){
    for(var c=0;c<COLS;c++){
      var write=ROWS-1;
      for(var r=ROWS-1;r>=0;r--){
        if(cells[r][c].type>=0){
          if(write!==r){ cells[write][c].type=cells[r][c].type; cells[write][c].dx=0; cells[write][c].dy=(r-write)*TILE; cells[r][c].type=-1; }
          else { cells[write][c].dy=0; }
          write--;
        }
      }
      var empties=write+1;
      for(var rr=write;rr>=0;rr--){ cells[rr][c].type=randType(); cells[rr][c].dx=0; cells[rr][c].dy=-(empties-rr)*TILE; }
    }
  }
  function onFallSettled(){
    var m=findMatches();
    if(m.count){ beginClear(m); }
    else { combo=0; updHUD(); mode='idle';
      if(!hasMoves()){ live.textContent='No moves — reshuffling.'; fillNoMatch(); while(!hasMoves()) fillNoMatch(); }
    }
  }

  // ---- loop ----
  function tick(){
    var now=performance.now(), dt=Math.min((now-lastT)/1000, 0.05); lastT=now;
    if(!ended){
      playTime += dt;
      if(gameMode==='survival'){
        survivalTime += dt;
        survival -= (SURV_DRAIN0 + survivalTime*0.16) * dt;
        stats.survivalBest = Math.max(stats.survivalBest, survivalTime);
        survFill.style.width = Math.max(0, survival) + '%';
        if(Math.floor(survivalTime)!==lastSurvSec){ lastSurvSec=Math.floor(survivalTime); checkAch(); }
        if(survival<=0){ survival=0; survFill.style.width='0%'; endGame('survover'); }
      }
    }
    var moving=false, clearingActive=false;
    for(var r=0;r<ROWS;r++) for(var c=0;c<COLS;c++){
      var cell=cells[r][c];
      if(Math.abs(cell.dx)>0.4 || Math.abs(cell.dy)>0.4){ cell.dx+=(0-cell.dx)*0.30; cell.dy+=(0-cell.dy)*0.30; moving=true; }
      else { cell.dx=0; cell.dy=0; }
      if(cell.clearing){ cell.clearT=Math.min(1,cell.clearT+0.10); if(cell.clearT<1) clearingActive=true; }
    }
    if(mode==='swap' && !moving) onSwapSettled();
    else if(mode==='revert' && !moving){ mode='idle'; }
    else if(mode==='clear' && !clearingActive) onClearDone();
    else if(mode==='fall' && !moving) onFallSettled();
    draw();
    requestAnimationFrame(tick);
  }

  // ---- draw ----
  function shapePath(shape, x, y, s){
    var h=s/2;
    if(shape==='circle'){ X.arc(x,y,h,0,6.283); }
    else if(shape==='oval'){ X.ellipse(x,y,h,h*0.78,0,0,6.283); }
    else if(shape==='diamond'){ X.moveTo(x,y-h); X.lineTo(x+h,y); X.lineTo(x,y+h); X.lineTo(x-h,y); X.closePath(); }
    else if(shape==='triangle'){ X.moveTo(x,y-h); X.lineTo(x+h*0.92,y+h*0.7); X.lineTo(x-h*0.92,y+h*0.7); X.closePath(); }
    else if(shape==='hex'){ for(var i=0;i<6;i++){ var a=Math.PI/6 + i*Math.PI/3; var px=x+Math.cos(a)*h, py=y+Math.sin(a)*h; if(i===0)X.moveTo(px,py); else X.lineTo(px,py);} X.closePath(); }
    else { var rr=s*0.22; var x0=x-h,y0=y-h,w=s; // rounded square
      X.moveTo(x0+rr,y0); X.arcTo(x0+w,y0,x0+w,y0+w,rr); X.arcTo(x0+w,y0+w,x0,y0+w,rr); X.arcTo(x0,y0+w,x0,y0,rr); X.arcTo(x0,y0,x0+w,y0,rr); X.closePath(); }
  }
  function drawGem(cx, cy, gem, scale){
    var s=TILE*0.74*scale;
    X.save();
    // body
    X.beginPath(); shapePath(gem.shape, cx, cy, s);
    var g=X.createLinearGradient(cx, cy-s/2, cx, cy+s/2);
    g.addColorStop(0, gem.light); g.addColorStop(0.5, gem.base); g.addColorStop(1, gem.dark);
    X.fillStyle=g; X.fill();
    X.lineWidth=1.4; X.strokeStyle='rgba(0,0,0,.45)'; X.stroke();
    // facet highlight
    X.beginPath(); shapePath(gem.shape, cx, cy-s*0.06, s*0.6);
    X.fillStyle='rgba(255,255,255,.12)'; X.fill();
    // specular
    X.beginPath(); X.ellipse(cx-s*0.16, cy-s*0.2, s*0.12, s*0.07, -0.5, 0, 6.283);
    X.fillStyle='rgba(255,255,255,.5)'; X.fill();
    X.restore();
  }
  function draw(){
    X.clearRect(0,0,COLS*TILE,ROWS*TILE);
    // board cells
    for(var r=0;r<ROWS;r++) for(var c=0;c<COLS;c++){
      X.fillStyle=((r+c)&1)? 'rgba(255,255,255,.018)' : 'rgba(0,0,0,.12)';
      X.fillRect(c*TILE+1, r*TILE+1, TILE-2, TILE-2);
    }
    // selection ring
    if(sel){ X.save(); X.strokeStyle='var(--gold)'; X.strokeStyle='#c9a44c'; X.lineWidth=2.5;
      X.strokeRect(sel.c*TILE+3, sel.r*TILE+3, TILE-6, TILE-6); X.restore(); }
    // gems
    for(var r2=0;r2<ROWS;r2++) for(var c2=0;c2<COLS;c2++){
      var cell=cells[r2][c2]; if(cell.type<0) continue;
      var cx=c2*TILE+TILE/2+cell.dx, cy=r2*TILE+TILE/2+cell.dy;
      var sc = cell.clearing ? (1-cell.clearT) : 1;
      if(sc<=0.02) continue;
      X.globalAlpha = cell.clearing ? Math.max(0,1-cell.clearT) : 1;
      drawGem(cx, cy, GEMS[cell.type], sc);
      X.globalAlpha=1;
    }
  }

  // ---- input ----
  function cellAt(px,py){ var c=Math.floor(px/TILE), r=Math.floor(py/TILE); if(r<0||r>=ROWS||c<0||c>=COLS) return null; return {r:r,c:c}; }
  function adjacent(a,b){ return (Math.abs(a.r-b.r)+Math.abs(a.c-b.c))===1; }
  function onPick(px,py){
    if(mode!=='idle') return;
    var hit=cellAt(px,py); if(!hit) return;
    ensureAudio();
    if(!sel){ sel=hit; sndSel(); return; }
    if(sel.r===hit.r && sel.c===hit.c){ sel=null; return; }
    if(adjacent(sel,hit)){ var a=sel; sel=null; trySwap(a,hit); }
    else { sel=hit; sndSel(); }
  }
  cv.addEventListener('pointerdown', function(e){ e.preventDefault();
    var rect=cv.getBoundingClientRect(); onPick(e.clientX-rect.left, e.clientY-rect.top); });

  document.getElementById('newBtn').addEventListener('click', function(){ ensureAudio(); newGame(gameMode); });
  document.querySelectorAll('.mode-btn').forEach(function(b){
    b.addEventListener('click', function(){
      document.querySelectorAll('.mode-btn').forEach(function(x){ x.classList.toggle('active', x===b); });
      ensureAudio(); newGame(b.getAttribute('data-mode'));
    });
  });
  ovBtn.addEventListener('click', function(){ ensureAudio(); ov.hidden=true; newGame(gameMode); });

  // ---- achievements ----
  var ACH=[
    { id:'first', ico:'✦', name:'First Spark', desc:'Make your first match', t:function(s){return s.gemsCleared>=1;} },
    { id:'four',  ico:'◈', name:'Four-in-a-Row', desc:'Clear four in a line for a multiplier', t:function(s){return s.bestMatch>=4;} },
    { id:'big5',  ico:'◆', name:'Five Aligned', desc:'Match five in a line', t:function(s){return s.bestMatch>=5;} },
    { id:'surv60',ico:'⏳', name:'Survivor', desc:'Survive 60 seconds', t:function(s){return s.survivalBest>=60;} },
    { id:'k1000', ico:'🏆', name:'Millennium', desc:'Finish 1000-gem mode', t:function(s){return s.completed1000;} },
    { id:'c3',    ico:'⛓', name:'Chain Reaction', desc:'Reach a ×3 cascade', t:function(s){return s.maxCombo>=3;} },
    { id:'c5',    ico:'❖', name:'Cascade Master', desc:'Reach a ×5 cascade', t:function(s){return s.maxCombo>=5;} },
    { id:'g100',  ico:'💠', name:'Gem Collector', desc:'Clear 100 gems', t:function(s){return s.gemsCleared>=100;} },
    { id:'g500',  ico:'👑', name:'Vault Keeper', desc:'Clear 500 gems', t:function(s){return s.gemsCleared>=500;} },
    { id:'s5k',   ico:'⚜', name:'Jeweler', desc:'Score 5,000', t:function(s){return s.score>=5000;} },
    { id:'s25k',  ico:'💎', name:'Crown Jewels', desc:'Score 25,000', t:function(s){return s.score>=25000;} }
  ];
  var KEY='gem-cascade-ach-v1', unlocked={};
  try{ unlocked=JSON.parse(localStorage.getItem(KEY))||{}; }catch(e){ unlocked={}; }
  var achList=document.getElementById('achList'), achCount=document.getElementById('achCount');
  function renderAch(){
    achList.innerHTML=''; var n=0;
    ACH.forEach(function(a){ if(unlocked[a.id]) n++;
      var li=document.createElement('li'); li.className='ach-li'+(unlocked[a.id]?' on':'');
      li.innerHTML='<span class="ico">'+a.ico+'</span><span class="tx"><b>'+a.name+'</b><span>'+a.desc+'</span></span>';
      achList.appendChild(li);
    });
    achCount.textContent=n+'/'+ACH.length;
  }
  function checkAch(){
    ACH.forEach(function(a){ if(!unlocked[a.id] && a.t(stats)){ unlocked[a.id]=1;
      try{ localStorage.setItem(KEY, JSON.stringify(unlocked)); }catch(e){}
      renderAch(); showToast(a); sndAch(); } });
  }
  function showToast(a){
    document.getElementById('toastIco').textContent=a.ico;
    document.getElementById('toastName').textContent=a.name;
    document.getElementById('toastDesc').textContent='Achievement · '+a.desc;
    toast.classList.add('show'); clearTimeout(showToast._t); showToast._t=setTimeout(function(){ toast.classList.remove('show'); }, 2600);
    live.textContent='Achievement unlocked: '+a.name;
  }

  // ---- audio (subtle) ----
  var AC=null;
  function ensureAudio(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(AC&&AC.state==='suspended') AC.resume(); }
  function blip(type,f0,f1,dur,vol){ if(!AC) return; var t=AC.currentTime; var o=AC.createOscillator(),g=AC.createGain();
    o.type=type; o.frequency.setValueAtTime(f0,t); o.frequency.exponentialRampToValueAtTime(f1,t+dur);
    g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.0008,t+dur); o.connect(g); g.connect(AC.destination); o.start(t); o.stop(t+dur+0.02); }
  function sndSel(){ blip('sine',520,560,0.08,0.05); }
  // clear sound pitched by combo
  var _clearOrig=beginClear;
  beginClear=function(m){ _clearOrig(m); blip('triangle', 360+combo*70, 540+combo*90, 0.18, 0.09); };
  function sndAch(){ if(!AC) return; [659,988,1319].forEach(function(f,i){ setTimeout(function(){ blip('triangle',f,f,0.3,0.08); }, i*90); }); }

  renderAch(); newGame(); tick();
})();
</script>
