<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Vintage Radio</title>
<link rel="icon" href="https://emojicdn.elk.sh/📻">
<meta property="og:title" content="Vintage Radio">
<meta property="og:description" content="Tune an analog radio through static to find hidden lo-fi stations. Satisfying knobs on warm wood.">
<meta property="og:url" content="https://app.sloppy.live/vintage-radio/">
<meta property="og:image" content="https://image.pollinations.ai/prompt/vintage%20wooden%20radio%20analog%20knobs%20warm%20glow%20retro%20speaker%20grille%20photorealistic?width=1200&height=630&nologo=true&referrer=sloppy.live">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#1a1008;font-family:'IBM Plex Mono',monospace;user-select:none}
body{display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 60%,#2a1a0a,#0a0804)}

#radio{position:relative;width:min(90vw,520px);aspect-ratio:1.4;border-radius:18px;background:linear-gradient(175deg,#8b6940 0%,#6b4f30 20%,#5a4025 50%,#4a3520 80%,#3a2815 100%);box-shadow:0 8px 40px rgba(0,0,0,0.6),0 2px 8px rgba(0,0,0,0.4),inset 0 1px 1px rgba(255,220,160,0.1);overflow:hidden}
#radio::before{content:'';position:absolute;inset:0;background:url("data:image/svg+xml,%3Csvg width='120' height='120' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='w'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.035' numOctaves='6' stitchTiles='stitch'/%3E%3CfeColorMatrix values='0 0 0 0 0.4 0 0 0 0 0.25 0 0 0 0 0.12 0 0 0 0.5 0'/%3E%3C/filter%3E%3Crect width='120' height='120' filter='url(%23w)'/%3E%3C/svg%3E");opacity:0.6;border-radius:18px;pointer-events:none}
#radio::after{content:'';position:absolute;inset:4px;border:1px solid rgba(255,200,120,0.06);border-radius:14px;pointer-events:none}

#speaker-area{position:absolute;top:8%;left:5%;right:5%;height:45%;display:flex;align-items:center;justify-content:center}
#grille{width:85%;height:88%;position:relative;overflow:hidden;border-radius:6px;background:#2a1a0a;box-shadow:inset 0 2px 8px rgba(0,0,0,0.5)}
#grille canvas{width:100%;height:100%}
.grille-slat{position:absolute;left:0;right:0;height:3px;background:linear-gradient(90deg,transparent 2%,rgba(180,140,80,0.15) 10%,rgba(180,140,80,0.2) 50%,rgba(180,140,80,0.15) 90%,transparent 98%)}

#dial-area{position:absolute;top:55%;left:5%;right:5%;height:14%;background:rgba(0,0,0,0.2);border-radius:4px;overflow:hidden;border:1px solid rgba(255,200,120,0.05)}
#dial-canvas{width:100%;height:100%}
#dial-needle{position:absolute;top:10%;width:2px;height:80%;background:#ff6633;box-shadow:0 0 6px rgba(255,100,50,0.6);border-radius:1px;transition:left 0.05s linear;pointer-events:none}
#freq-display{position:absolute;right:8px;top:50%;transform:translateY(-50%);font-family:'Playfair Display',serif;font-size:clamp(11px,2.5vw,16px);color:rgba(255,180,100,0.7);letter-spacing:1px;pointer-events:none}

#controls{position:absolute;bottom:4%;left:0;right:0;display:flex;justify-content:space-around;align-items:center;padding:0 8%}

.knob-container{display:flex;flex-direction:column;align-items:center;gap:4px}
.knob-label{font-size:clamp(7px,1.5vw,9px);color:rgba(200,160,100,0.4);letter-spacing:2px;text-transform:uppercase}
.knob{position:relative;width:clamp(50px,12vw,72px);height:clamp(50px,12vw,72px);border-radius:50%;background:radial-gradient(circle at 40% 35%,#7a6040,#4a3520 60%,#3a2815);box-shadow:0 3px 10px rgba(0,0,0,0.5),0 1px 3px rgba(0,0,0,0.3),inset 0 1px 1px rgba(255,220,160,0.08);cursor:grab;touch-action:none}
.knob::before{content:'';position:absolute;inset:15%;border-radius:50%;background:radial-gradient(circle at 45% 40%,#6a5535,#3a2818);border:1px solid rgba(255,200,120,0.04)}
.knob-indicator{position:absolute;top:8px;left:50%;width:2px;height:30%;background:rgba(255,200,120,0.5);border-radius:1px;transform-origin:bottom center;pointer-events:none}
.knob:active{cursor:grabbing}
.knob.grabbing{cursor:grabbing;box-shadow:0 3px 10px rgba(0,0,0,0.5),0 1px 3px rgba(0,0,0,0.3),inset 0 1px 1px rgba(255,220,160,0.08),0 0 15px rgba(255,160,60,0.1)}

#power-btn{width:clamp(28px,6vw,36px);height:clamp(28px,6vw,36px);border-radius:50%;border:2px solid rgba(200,160,100,0.15);background:radial-gradient(circle at 40% 35%,#5a4530,#2a1a10);cursor:pointer;position:relative;box-shadow:0 2px 6px rgba(0,0,0,0.4)}
#power-led{position:absolute;top:-8px;left:50%;transform:translateX(-50%);width:5px;height:5px;border-radius:50%;background:#331100;transition:all 0.8s}
#power-led.on{background:#ff4400;box-shadow:0 0 8px rgba(255,68,0,0.6)}

#brand{position:absolute;top:8%;right:8%;font-family:'Playfair Display',serif;font-size:clamp(10px,2vw,14px);font-weight:900;color:rgba(200,170,120,0.12);letter-spacing:3px;text-transform:uppercase}
#backlink{position:fixed;bottom:6px;right:10px;font-size:9px;color:#221a0a;text-decoration:none;z-index:10}
#backlink:hover{color:#664}
#station-name{position:absolute;top:52%;left:50%;transform:translateX(-50%);font-family:'Playfair Display',serif;font-size:clamp(9px,1.8vw,12px);color:rgba(255,180,100,0);letter-spacing:2px;transition:color 0.5s;pointer-events:none;white-space:nowrap}
</style>
</head>
<body>
<div id="radio">
  <div id="speaker-area">
    <div id="grille"><canvas id="grille-canvas"></canvas></div>
  </div>
  <div id="dial-area">
    <canvas id="dial-canvas"></canvas>
    <div id="dial-needle"></div>
    <div id="freq-display">88.0</div>
  </div>
  <div id="station-name"></div>
  <div id="controls">
    <div class="knob-container">
      <div class="knob" id="knob-tune"><div class="knob-indicator"></div></div>
      <div class="knob-label">Tune</div>
    </div>
    <div id="power-btn"><div id="power-led"></div></div>
    <div class="knob-container">
      <div class="knob" id="knob-volume"><div class="knob-indicator"></div></div>
      <div class="knob-label">Volume</div>
    </div>
  </div>
  <div id="brand">SLOPPY</div>
</div>
<a id="backlink" href="https://sloppy.live" target="_blank">sloppy.live</a>

<script>
// Audio engine
let audioCtx, masterGain, staticNode, staticGain;
let stationGains = [], stationOscs = [];
let powerOn = false;
let tuneVal = 0; // 0..1
let volumeVal = 0.5;
let warmup = 0;

// Stations - hidden across the dial
const STATIONS = [
  { freq: 0.12, name: 'MIDNIGHT JAZZ', type: 'jazz' },
  { freq: 0.28, name: 'LO-FI DREAMS', type: 'lofi' },
  { freq: 0.45, name: 'DEEP AMBIENT', type: 'ambient' },
  { freq: 0.62, name: 'VINYL BEATS', type: 'beats' },
  { freq: 0.78, name: 'GHOST SIGNAL', type: 'ghost' },
  { freq: 0.91, name: 'WARM STATIC', type: 'warm' },
];

function initAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0;
  masterGain.connect(audioCtx.destination);

  // Static noise
  const bufSize = audioCtx.sampleRate * 2;
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random()*2-1)*0.7;
  staticNode = audioCtx.createBufferSource();
  staticNode.buffer = buf;
  staticNode.loop = true;
  staticGain = audioCtx.createGain();
  staticGain.gain.value = 0.3;
  // Add filter for more realistic static
  const staticFilter = audioCtx.createBiquadFilter();
  staticFilter.type = 'bandpass';
  staticFilter.frequency.value = 2000;
  staticFilter.Q.value = 0.5;
  staticNode.connect(staticFilter);
  staticFilter.connect(staticGain);
  staticGain.connect(masterGain);
  staticNode.start();

  // Create station audio
  STATIONS.forEach((st, si) => {
    const stGain = audioCtx.createGain();
    stGain.gain.value = 0;
    stGain.connect(masterGain);
    stationGains.push(stGain);
    stationOscs.push([]);
    buildStation(st, si);
  });
}

function buildStation(st, si) {
  const g = stationGains[si];
  if (st.type === 'jazz') {
    // Mellow chords cycling
    const notes = [220, 277.18, 329.63, 261.63, 349.23, 293.66];
    notes.forEach((f, i) => {
      const o = audioCtx.createOscillator();
      o.type = 'sine';
      o.frequency.value = f;
      const og = audioCtx.createGain();
      og.gain.value = 0.06;
      // LFO for tremolo
      const lfo = audioCtx.createOscillator();
      lfo.frequency.value = 0.3 + i*0.1;
      const lfoG = audioCtx.createGain();
      lfoG.gain.value = 0.03;
      lfo.connect(lfoG);
      lfoG.connect(og.gain);
      lfo.start();
      o.connect(og);
      og.connect(g);
      o.start();
      stationOscs[si].push(o, lfo);
    });
  } else if (st.type === 'lofi') {
    // Lo-fi beat pattern with filtered square wave
    const bass = audioCtx.createOscillator();
    bass.type = 'triangle';
    bass.frequency.value = 55;
    const bassG = audioCtx.createGain();
    bassG.gain.value = 0.08;
    const lfo = audioCtx.createOscillator();
    lfo.frequency.value = 1.4; // tempo
    const lfoG = audioCtx.createGain();
    lfoG.gain.value = 30;
    lfo.connect(lfoG);
    lfoG.connect(bass.frequency);
    bass.connect(bassG);
    bassG.connect(g);
    bass.start(); lfo.start();
    // Chord pad
    [261.63, 329.63, 392].forEach(f => {
      const o = audioCtx.createOscillator();
      o.type = 'sine';
      o.frequency.value = f;
      const og = audioCtx.createGain();
      og.gain.value = 0.04;
      const flt = audioCtx.createBiquadFilter();
      flt.type = 'lowpass';
      flt.frequency.value = 600;
      o.connect(flt);
      flt.connect(og);
      og.connect(g);
      o.start();
      stationOscs[si].push(o);
    });
    stationOscs[si].push(bass, lfo);
  } else if (st.type === 'ambient') {
    // Deep drone
    [65.41, 98, 130.81].forEach((f, i) => {
      const o = audioCtx.createOscillator();
      o.type = 'sine';
      o.frequency.value = f;
      const og = audioCtx.createGain();
      og.gain.value = 0.07;
      const lfo = audioCtx.createOscillator();
      lfo.frequency.value = 0.05 + i*0.03;
      const lfoG = audioCtx.createGain();
      lfoG.gain.value = f * 0.02;
      lfo.connect(lfoG);
      lfoG.connect(o.frequency);
      o.connect(og);
      og.connect(g);
      o.start(); lfo.start();
      stationOscs[si].push(o, lfo);
    });
  } else if (st.type === 'beats') {
    // Rhythmic pattern
    const kick = audioCtx.createOscillator();
    kick.type = 'square';
    kick.frequency.value = 40;
    const kickG = audioCtx.createGain();
    kickG.gain.value = 0.06;
    const kickLfo = audioCtx.createOscillator();
    kickLfo.frequency.value = 2.2;
    const kickLfoG = audioCtx.createGain();
    kickLfoG.gain.value = 25;
    kickLfo.connect(kickLfoG);
    kickLfoG.connect(kick.frequency);
    kick.connect(kickG);
    const flt = audioCtx.createBiquadFilter();
    flt.type = 'lowpass'; flt.frequency.value = 300;
    kickG.connect(flt); flt.connect(g);
    kick.start(); kickLfo.start();
    // Hi element
    const hi = audioCtx.createOscillator();
    hi.type = 'triangle';
    hi.frequency.value = 880;
    const hiG = audioCtx.createGain();
    hiG.gain.value = 0.02;
    const hiLfo = audioCtx.createOscillator();
    hiLfo.frequency.value = 4.4;
    const hiLfoG = audioCtx.createGain();
    hiLfoG.gain.value = 0.02;
    hiLfo.connect(hiLfoG); hiLfoG.connect(hiG.gain);
    hi.connect(hiG); hiG.connect(g);
    hi.start(); hiLfo.start();
    stationOscs[si].push(kick, kickLfo, hi, hiLfo);
  } else if (st.type === 'ghost') {
    // Eerie tones
    [440, 554.37, 659.25].forEach((f, i) => {
      const o = audioCtx.createOscillator();
      o.type = 'sawtooth';
      o.frequency.value = f;
      const og = audioCtx.createGain();
      og.gain.value = 0.02;
      const flt = audioCtx.createBiquadFilter();
      flt.type = 'lowpass'; flt.frequency.value = 400;
      const lfo = audioCtx.createOscillator();
      lfo.frequency.value = 0.15 + i*0.08;
      const lfoG = audioCtx.createGain();
      lfoG.gain.value = 200;
      lfo.connect(lfoG); lfoG.connect(flt.frequency);
      o.connect(flt); flt.connect(og); og.connect(g);
      o.start(); lfo.start();
      stationOscs[si].push(o, lfo);
    });
  } else if (st.type === 'warm') {
    // Warm filtered noise + tone
    const o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.value = 174.61;
    const og = audioCtx.createGain();
    og.gain.value = 0.06;
    const lfo = audioCtx.createOscillator();
    lfo.frequency.value = 0.2;
    const lfoG = audioCtx.createGain();
    lfoG.gain.value = 10;
    lfo.connect(lfoG); lfoG.connect(o.frequency);
    o.connect(og); og.connect(g);
    o.start(); lfo.start();
    // Warm noise
    const nb = audioCtx.createBuffer(1, audioCtx.sampleRate, audioCtx.sampleRate);
    const nd = nb.getChannelData(0);
    for (let i=0;i<nd.length;i++) nd[i]=(Math.random()*2-1);
    const ns = audioCtx.createBufferSource();
    ns.buffer = nb; ns.loop = true;
    const nf = audioCtx.createBiquadFilter();
    nf.type = 'lowpass'; nf.frequency.value = 200;
    const ng = audioCtx.createGain();
    ng.gain.value = 0.08;
    ns.connect(nf); nf.connect(ng); ng.connect(g);
    ns.start();
    stationOscs[si].push(o, lfo, ns);
  }
}

function updateAudio() {
  if (!audioCtx || !powerOn) return;
  warmup = Math.min(1, warmup + 0.008);
  masterGain.gain.setTargetAtTime(volumeVal * warmup * 0.6, audioCtx.currentTime, 0.05);

  let totalStation = 0;
  STATIONS.forEach((st, i) => {
    const dist = Math.abs(tuneVal - st.freq);
    const width = 0.025;
    const strength = Math.max(0, 1 - dist/width);
    stationGains[i].gain.setTargetAtTime(strength * strength * 0.8, audioCtx.currentTime, 0.05);
    totalStation += strength;
  });

  // Static inversely proportional to station strength
  const staticLevel = Math.max(0.03, 0.3 * (1 - totalStation*0.85));
  staticGain.gain.setTargetAtTime(staticLevel, audioCtx.currentTime, 0.05);
}

// Power
document.getElementById('power-btn').addEventListener('click', () => {
  if (!audioCtx) initAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  powerOn = !powerOn;
  document.getElementById('power-led').classList.toggle('on', powerOn);
  if (!powerOn) {
    warmup = 0;
    masterGain.gain.setTargetAtTime(0, audioCtx.currentTime, 0.1);
  }
});

// Knob interaction
function setupKnob(el, onChange, initial) {
  let dragging = false, startAngle = 0, startVal = initial;
  let currentVal = initial;
  const indicator = el.querySelector('.knob-indicator');

  function updateIndicator() {
    const angle = -135 + currentVal * 270;
    indicator.style.transform = 'rotate('+angle+'deg)';
  }
  updateIndicator();

  function getAngle(e, rect) {
    const cx = rect.left + rect.width/2;
    const cy = rect.top + rect.height/2;
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return Math.atan2(clientY - cy, clientX - cx);
  }

  function start(e) {
    e.preventDefault();
    dragging = true;
    el.classList.add('grabbing');
    const rect = el.getBoundingClientRect();
    startAngle = getAngle(e, rect);
    startVal = currentVal;
  }

  function move(e) {
    if (!dragging) return;
    e.preventDefault();
    const rect = el.getBoundingClientRect();
    const angle = getAngle(e, rect);
    let delta = (angle - startAngle) / (Math.PI * 1.5);
    currentVal = Math.max(0, Math.min(1, startVal + delta));
    updateIndicator();
    onChange(currentVal);
  }

  function end() {
    dragging = false;
    el.classList.remove('grabbing');
  }

  el.addEventListener('mousedown', start);
  el.addEventListener('touchstart', start, {passive:false});
  document.addEventListener('mousemove', move);
  document.addEventListener('touchmove', move, {passive:false});
  document.addEventListener('mouseup', end);
  document.addEventListener('touchend', end);

  // Scroll wheel
  el.addEventListener('wheel', e => {
    e.preventDefault();
    currentVal = Math.max(0, Math.min(1, currentVal - e.deltaY * 0.001));
    updateIndicator();
    onChange(currentVal);
  }, {passive:false});
}

setupKnob(document.getElementById('knob-tune'), val => {
  tuneVal = val;
  const freq = (88 + val * 20).toFixed(1);
  document.getElementById('freq-display').textContent = freq;
  const pct = val * 88 + 5;
  document.getElementById('dial-needle').style.left = pct + '%';
  // Station name
  let closest = null, closestDist = 1;
  STATIONS.forEach(st => {
    const d = Math.abs(val - st.freq);
    if (d < 0.02 && d < closestDist) { closest = st; closestDist = d; }
  });
  const nameEl = document.getElementById('station-name');
  if (closest) {
    nameEl.textContent = '~ ' + closest.name + ' ~';
    nameEl.style.color = 'rgba(255,180,100,'+Math.max(0,(1-closestDist/0.02)*0.6)+')';
  } else {
    nameEl.style.color = 'rgba(255,180,100,0)';
  }
}, 0);

setupKnob(document.getElementById('knob-volume'), val => {
  volumeVal = val;
}, 0.5);

// Grille canvas — speaker visualization
const grilleCanvas = document.getElementById('grille-canvas');
const gCtx = grilleCanvas.getContext('2d');

function resizeGrille() {
  const rect = grilleCanvas.parentElement.getBoundingClientRect();
  grilleCanvas.width = Math.floor(rect.width);
  grilleCanvas.height = Math.floor(rect.height);
}
resizeGrille();
window.addEventListener('resize', resizeGrille);

// Draw grille slats
const grille = document.getElementById('grille');
for (let i = 0; i < 20; i++) {
  const slat = document.createElement('div');
  slat.className = 'grille-slat';
  slat.style.top = (5 + i * 5) + '%';
  grille.appendChild(slat);
}

// Dial canvas
const dialCanvas = document.getElementById('dial-canvas');
const dCtx = dialCanvas.getContext('2d');
function resizeDial() {
  const rect = dialCanvas.parentElement.getBoundingClientRect();
  dialCanvas.width = Math.floor(rect.width);
  dialCanvas.height = Math.floor(rect.height);
  drawDial();
}
function drawDial() {
  const w = dialCanvas.width, h = dialCanvas.height;
  dCtx.clearRect(0,0,w,h);
  // Background
  dCtx.fillStyle = '#1a1208';
  dCtx.fillRect(0,0,w,h);
  // Frequency marks
  dCtx.fillStyle = 'rgba(200,170,120,0.3)';
  dCtx.font = Math.max(8, h*0.25) + 'px IBM Plex Mono';
  dCtx.textAlign = 'center';
  for (let f = 88; f <= 108; f += 2) {
    const t = (f-88)/20;
    const x = w*0.05 + t*w*0.88;
    dCtx.fillRect(x, h*0.1, 1, h*0.35);
    dCtx.fillText(f, x, h*0.75);
  }
  // Minor ticks
  dCtx.fillStyle = 'rgba(200,170,120,0.12)';
  for (let f = 88; f <= 108; f += 0.5) {
    const t = (f-88)/20;
    const x = w*0.05 + t*w*0.88;
    dCtx.fillRect(x, h*0.15, 1, h*0.15);
  }
  // Station indicators (very subtle dots)
  STATIONS.forEach(st => {
    const x = w*0.05 + st.freq*w*0.88;
    dCtx.fillStyle = 'rgba(255,120,60,0.15)';
    dCtx.beginPath(); dCtx.arc(x, h*0.88, 2, 0, Math.PI*2); dCtx.fill();
  });
}
resizeDial();
window.addEventListener('resize', resizeDial);

// Speaker animation
let animFrame = 0;
function drawSpeaker() {
  const w = grilleCanvas.width, h = grilleCanvas.height;
  gCtx.clearRect(0,0,w,h);
  if (!powerOn) return;

  animFrame++;
  const intensity = volumeVal * warmup;
  if (intensity < 0.01) return;

  // Waveform-like visualization through grille
  gCtx.strokeStyle = 'rgba(255,160,80,' + intensity*0.15 + ')';
  gCtx.lineWidth = 1;

  for (let row = 0; row < 18; row++) {
    const y = h*0.05 + row*(h*0.9/18);
    gCtx.beginPath();
    for (let x = 0; x < w; x += 2) {
      const wave = Math.sin(x*0.03 + animFrame*0.05 + row*0.5) *
                   Math.sin(x*0.01 + animFrame*0.02) *
                   intensity * 4;
      const noise = (Math.random()-0.5) * intensity * 2;
      const dy = wave + noise;
      if (x===0) gCtx.moveTo(x, y+dy);
      else gCtx.lineTo(x, y+dy);
    }
    gCtx.stroke();
  }

  // Warm center glow
  const grd = gCtx.createRadialGradient(w/2,h/2,0,w/2,h/2,w*0.4);
  grd.addColorStop(0, 'rgba(255,120,40,'+intensity*0.04+')');
  grd.addColorStop(1, 'rgba(255,120,40,0)');
  gCtx.fillStyle = grd;
  gCtx.fillRect(0,0,w,h);
}

function mainLoop() {
  updateAudio();
  drawSpeaker();
  requestAnimationFrame(mainLoop);
}
mainLoop();
</script>
