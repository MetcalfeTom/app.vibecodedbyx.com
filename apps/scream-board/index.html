<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Meow Board</title>
<link rel="icon" href="https://emojicdn.elk.sh/🐱">
<meta property="og:title" content="Meow Board">
<meta property="og:description" content="16 neon buttons, 16 different meows. Tap for cats.">
<meta property="og:url" content="https://sloppy.live/scream-board">
<meta property="og:image" content="https://emojicdn.elk.sh/🐱?style=apple&size=512">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Fira+Code:wght@300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100dvh;background:#08050f;font-family:'Fira Code',monospace}
body{display:flex;flex-direction:column;align-items:center;padding:16px 12px 60px}

h1{font-family:'Bangers',cursive;font-size:2.4rem;color:#ff80c0;text-shadow:0 0 30px rgba(255,128,192,0.4),0 0 60px rgba(255,128,192,0.15);letter-spacing:6px;margin-bottom:4px;text-align:center}
.sub{font-size:10px;color:rgba(255,180,220,0.3);margin-bottom:20px;letter-spacing:2px;text-align:center}

#grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;width:100%;max-width:520px}

.snd-btn{
  aspect-ratio:1;
  border:2px solid var(--clr);
  border-radius:12px;
  background:rgba(0,0,0,0.4);
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;
  font-family:'Bangers',cursive;
  color:var(--clr);
  font-size:13px;letter-spacing:1px;
  transition:all .1s;
  position:relative;overflow:hidden;
  -webkit-tap-highlight-color:transparent;
  min-height:70px;
}
.snd-btn .emoji{font-size:28px;line-height:1}
.snd-btn:active,.snd-btn.playing{
  background:var(--clr);
  color:#080510;
  transform:scale(0.93);
  box-shadow:0 0 30px var(--clr),0 0 60px color-mix(in srgb,var(--clr) 40%,transparent);
}
.snd-btn::after{
  content:'';position:absolute;top:50%;left:50%;width:0;height:0;
  background:radial-gradient(circle,var(--clr),transparent 70%);
  border-radius:50%;opacity:0;transform:translate(-50%,-50%);
  transition:width .3s,height .3s,opacity .3s;pointer-events:none;
}
.snd-btn.flash::after{width:200%;height:200%;opacity:0.2;}

#vol-row{display:flex;align-items:center;gap:8px;margin-top:16px;width:100%;max-width:520px}
#vol-row label{font-size:9px;color:rgba(255,100,180,0.3);letter-spacing:1px}
#vol-row input{flex:1;accent-color:#ff80c0}

a#back{position:fixed;bottom:8px;left:10px;font-size:9px;opacity:0.15;color:#640;text-decoration:none;z-index:5}

@media(max-width:400px){
  #grid{grid-template-columns:repeat(3,1fr);gap:8px}
  .snd-btn{font-size:11px;min-height:80px}
  .snd-btn .emoji{font-size:24px}
  h1{font-size:1.8rem}
}
@media(min-width:600px){
  .snd-btn{font-size:14px}
  .snd-btn .emoji{font-size:34px}
}
</style>
</head>
<body>

<h1>MEOW BOARD</h1>
<div class="sub">TAP FOR CATS</div>
<div id="grid"></div>
<div id="vol-row">
  <label>VOL</label>
  <input type="range" id="vol" min="0" max="100" value="80">
</div>
<a id="back" href="https://sloppy.live">sloppy.live</a>

<script>
(function(){

// WebAudio context — needed for procedural sounds
var actx=null;
function ensureAudio(){
  if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended')actx.resume();
  return actx;
}

var masterVol=0.8;
document.getElementById('vol').addEventListener('input',function(){
  masterVol=parseInt(this.value)/100;
});

// --- MEOW SOUND DEFINITIONS (all procedural WebAudio) ---
var SOUNDS=[
  {name:'Short Mew',emoji:'🐱',color:'#ff80c0',fn:shortMew},
  {name:'Long Meow',emoji:'🐈',color:'#ff60a0',fn:longMeow},
  {name:'Angry Yowl',emoji:'😾',color:'#ff3060',fn:angryYowl},
  {name:'Kitten Mew',emoji:'🐾',color:'#ffb0dd',fn:kittenMew},
  {name:'Purr',emoji:'😺',color:'#c080ff',fn:purrSound},
  {name:'Hiss',emoji:'🙀',color:'#ff4040',fn:hissSound},
  {name:'Chirp',emoji:'😸',color:'#80ffcc',fn:chirpMeow},
  {name:'Trill',emoji:'😻',color:'#60ddff',fn:trillMeow},
  {name:'Demand Meow',emoji:'😼',color:'#ffaa40',fn:demandMeow},
  {name:'Sleepy Mrrp',emoji:'😽',color:'#b080ff',fn:sleepyMrrp},
  {name:'Chatter',emoji:'😹',color:'#80ff80',fn:chatterMeow},
  {name:'Wail',emoji:'😿',color:'#6080ff',fn:wailMeow},
  {name:'Double Mew',emoji:'🐱',color:'#ff70b0',fn:doubleMew},
  {name:'Deep Meow',emoji:'🐈‍⬛',color:'#a060ff',fn:deepMeow},
  {name:'Sassy Mrow',emoji:'💅',color:'#ff60ff',fn:sassyMrow},
  {name:'Zoomies',emoji:'⚡',color:'#ffdd40',fn:zoomiesMeow}
];

// --- PROCEDURAL MEOW GENERATORS ---

function makeGain(vol,dur){
  var ctx=ensureAudio();
  var g=ctx.createGain();
  g.gain.setValueAtTime(vol*masterVol,ctx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
  g.connect(ctx.destination);
  return{g:g,ctx:ctx,t:ctx.currentTime};
}

// helper: cat-like formant filter
function catFilter(ctx,node,freq,q){
  var f=ctx.createBiquadFilter();
  f.type='bandpass';f.frequency.value=freq;f.Q.value=q||4;
  node.connect(f);return f;
}

function shortMew(){
  var s=makeGain(0.5,0.35);
  var o=s.ctx.createOscillator();o.type='sawtooth';
  o.frequency.setValueAtTime(700,s.t);
  o.frequency.exponentialRampToValueAtTime(900,s.t+0.08);
  o.frequency.exponentialRampToValueAtTime(500,s.t+0.35);
  var f=catFilter(s.ctx,o,800,5);
  f.connect(s.g);o.start(s.t);o.stop(s.t+0.35);
}

function longMeow(){
  var s=makeGain(0.45,1.2);
  var o=s.ctx.createOscillator();o.type='sawtooth';
  o.frequency.setValueAtTime(500,s.t);
  o.frequency.exponentialRampToValueAtTime(850,s.t+0.2);
  o.frequency.setValueAtTime(800,s.t+0.5);
  o.frequency.exponentialRampToValueAtTime(600,s.t+0.8);
  o.frequency.exponentialRampToValueAtTime(350,s.t+1.2);
  var lfo=s.ctx.createOscillator();var lg=s.ctx.createGain();
  lfo.frequency.value=6;lg.gain.value=30;
  lfo.connect(lg);lg.connect(o.frequency);
  var f=catFilter(s.ctx,o,700,4);
  f.connect(s.g);o.start(s.t);o.stop(s.t+1.2);
  lfo.start(s.t);lfo.stop(s.t+1.2);
}

function angryYowl(){
  var s=makeGain(0.5,1.5);
  var o=s.ctx.createOscillator();o.type='sawtooth';
  o.frequency.setValueAtTime(400,s.t);
  o.frequency.exponentialRampToValueAtTime(1000,s.t+0.2);
  o.frequency.exponentialRampToValueAtTime(600,s.t+0.5);
  o.frequency.exponentialRampToValueAtTime(1200,s.t+0.7);
  o.frequency.exponentialRampToValueAtTime(500,s.t+1.0);
  o.frequency.exponentialRampToValueAtTime(300,s.t+1.5);
  var lfo=s.ctx.createOscillator();var lg=s.ctx.createGain();
  lfo.frequency.value=14;lg.gain.value=100;
  lfo.connect(lg);lg.connect(o.frequency);
  var f=catFilter(s.ctx,o,750,3);
  f.connect(s.g);o.start(s.t);o.stop(s.t+1.5);
  lfo.start(s.t);lfo.stop(s.t+1.5);
}

function kittenMew(){
  var s=makeGain(0.4,0.3);
  var o=s.ctx.createOscillator();o.type='triangle';
  o.frequency.setValueAtTime(1200,s.t);
  o.frequency.exponentialRampToValueAtTime(1600,s.t+0.06);
  o.frequency.exponentialRampToValueAtTime(900,s.t+0.3);
  var f=catFilter(s.ctx,o,1300,6);
  f.connect(s.g);o.start(s.t);o.stop(s.t+0.3);
}

function purrSound(){
  var dur=2.0;
  var s=makeGain(0.35,dur);
  // low rumble
  var o=s.ctx.createOscillator();o.type='sawtooth';
  o.frequency.value=28;
  // amplitude modulation for purr rhythm
  var lfo=s.ctx.createOscillator();var lg=s.ctx.createGain();
  lfo.frequency.value=25;lg.gain.value=0.3*masterVol;
  lfo.connect(lg);lg.connect(s.g.gain);
  var nf=s.ctx.createBiquadFilter();nf.type='lowpass';nf.frequency.value=120;
  o.connect(nf);nf.connect(s.g);
  o.start(s.t);o.stop(s.t+dur);
  lfo.start(s.t);lfo.stop(s.t+dur);
}

function hissSound(){
  var dur=0.8;
  var ctx=ensureAudio();
  var bufSize=ctx.sampleRate*dur;
  var buf=ctx.createBuffer(1,bufSize,ctx.sampleRate);
  var data=buf.getChannelData(0);
  for(var i=0;i<bufSize;i++)data[i]=(Math.random()*2-1);
  var noise=ctx.createBufferSource();noise.buffer=buf;
  var hp=ctx.createBiquadFilter();hp.type='highpass';hp.frequency.value=3000;
  var g=ctx.createGain();
  g.gain.setValueAtTime(0.5*masterVol,ctx.currentTime);
  g.gain.linearRampToValueAtTime(0.6*masterVol,ctx.currentTime+0.05);
  g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
  noise.connect(hp);hp.connect(g);g.connect(ctx.destination);
  noise.start(ctx.currentTime);noise.stop(ctx.currentTime+dur);
}

function chirpMeow(){
  for(var c=0;c<3;c++){
    (function(i){
      setTimeout(function(){
        var s=makeGain(0.4,0.15);
        var o=s.ctx.createOscillator();o.type='triangle';
        o.frequency.setValueAtTime(900+i*100,s.t);
        o.frequency.exponentialRampToValueAtTime(1400+i*80,s.t+0.04);
        o.frequency.exponentialRampToValueAtTime(700,s.t+0.15);
        var f=catFilter(s.ctx,o,1100,5);
        f.connect(s.g);o.start(s.t);o.stop(s.t+0.15);
      },i*120);
    })(c);
  }
}

function trillMeow(){
  var s=makeGain(0.4,0.6);
  var o=s.ctx.createOscillator();o.type='sawtooth';
  o.frequency.setValueAtTime(600,s.t);
  o.frequency.exponentialRampToValueAtTime(900,s.t+0.15);
  o.frequency.exponentialRampToValueAtTime(700,s.t+0.3);
  o.frequency.exponentialRampToValueAtTime(850,s.t+0.4);
  o.frequency.exponentialRampToValueAtTime(500,s.t+0.6);
  // fast trill vibrato
  var lfo=s.ctx.createOscillator();var lg=s.ctx.createGain();
  lfo.frequency.value=22;lg.gain.value=60;
  lfo.connect(lg);lg.connect(o.frequency);
  var f=catFilter(s.ctx,o,750,4);
  f.connect(s.g);o.start(s.t);o.stop(s.t+0.6);
  lfo.start(s.t);lfo.stop(s.t+0.6);
}

function demandMeow(){
  var s=makeGain(0.55,0.8);
  var o=s.ctx.createOscillator();o.type='sawtooth';
  o.frequency.setValueAtTime(600,s.t);
  o.frequency.exponentialRampToValueAtTime(1000,s.t+0.1);
  o.frequency.setValueAtTime(950,s.t+0.3);
  o.frequency.exponentialRampToValueAtTime(700,s.t+0.5);
  o.frequency.exponentialRampToValueAtTime(400,s.t+0.8);
  var f=catFilter(s.ctx,o,800,3);
  f.connect(s.g);o.start(s.t);o.stop(s.t+0.8);
}

function sleepyMrrp(){
  var s=makeGain(0.35,0.5);
  var o=s.ctx.createOscillator();o.type='triangle';
  o.frequency.setValueAtTime(400,s.t);
  o.frequency.exponentialRampToValueAtTime(600,s.t+0.08);
  o.frequency.exponentialRampToValueAtTime(450,s.t+0.25);
  o.frequency.exponentialRampToValueAtTime(300,s.t+0.5);
  var lfo=s.ctx.createOscillator();var lg=s.ctx.createGain();
  lfo.frequency.value=18;lg.gain.value=25;
  lfo.connect(lg);lg.connect(o.frequency);
  var f=catFilter(s.ctx,o,500,5);
  f.connect(s.g);o.start(s.t);o.stop(s.t+0.5);
  lfo.start(s.t);lfo.stop(s.t+0.5);
}

function chatterMeow(){
  // rapid teeth chattering at a bird
  for(var c=0;c<8;c++){
    (function(i){
      setTimeout(function(){
        var s=makeGain(0.3,0.07);
        var o=s.ctx.createOscillator();o.type='square';
        o.frequency.setValueAtTime(1000+Math.random()*400,s.t);
        o.frequency.exponentialRampToValueAtTime(600+Math.random()*200,s.t+0.07);
        o.connect(s.g);o.start(s.t);o.stop(s.t+0.07);
      },i*65);
    })(c);
  }
}

function wailMeow(){
  var s=makeGain(0.45,2.0);
  var o=s.ctx.createOscillator();o.type='sawtooth';
  o.frequency.setValueAtTime(350,s.t);
  o.frequency.exponentialRampToValueAtTime(800,s.t+0.5);
  o.frequency.setValueAtTime(750,s.t+0.8);
  o.frequency.exponentialRampToValueAtTime(900,s.t+1.2);
  o.frequency.exponentialRampToValueAtTime(400,s.t+1.7);
  o.frequency.exponentialRampToValueAtTime(250,s.t+2.0);
  var lfo=s.ctx.createOscillator();var lg=s.ctx.createGain();
  lfo.frequency.value=7;lg.gain.value=40;
  lfo.connect(lg);lg.connect(o.frequency);
  var f=catFilter(s.ctx,o,650,3);
  f.connect(s.g);o.start(s.t);o.stop(s.t+2.0);
  lfo.start(s.t);lfo.stop(s.t+2.0);
}

function doubleMew(){
  shortMew();
  setTimeout(function(){
    var s=makeGain(0.45,0.4);
    var o=s.ctx.createOscillator();o.type='sawtooth';
    o.frequency.setValueAtTime(750,s.t);
    o.frequency.exponentialRampToValueAtTime(1000,s.t+0.1);
    o.frequency.exponentialRampToValueAtTime(550,s.t+0.4);
    var f=catFilter(s.ctx,o,850,5);
    f.connect(s.g);o.start(s.t);o.stop(s.t+0.4);
  },300);
}

function deepMeow(){
  var s=makeGain(0.5,1.0);
  var o=s.ctx.createOscillator();o.type='sawtooth';
  o.frequency.setValueAtTime(250,s.t);
  o.frequency.exponentialRampToValueAtTime(400,s.t+0.15);
  o.frequency.setValueAtTime(380,s.t+0.4);
  o.frequency.exponentialRampToValueAtTime(300,s.t+0.7);
  o.frequency.exponentialRampToValueAtTime(180,s.t+1.0);
  var f=catFilter(s.ctx,o,350,3);
  f.connect(s.g);o.start(s.t);o.stop(s.t+1.0);
}

function sassyMrow(){
  var s=makeGain(0.5,0.7);
  var o=s.ctx.createOscillator();o.type='sawtooth';
  o.frequency.setValueAtTime(500,s.t);
  o.frequency.exponentialRampToValueAtTime(1100,s.t+0.1);
  o.frequency.exponentialRampToValueAtTime(700,s.t+0.2);
  o.frequency.exponentialRampToValueAtTime(1000,s.t+0.35);
  o.frequency.exponentialRampToValueAtTime(600,s.t+0.5);
  o.frequency.exponentialRampToValueAtTime(350,s.t+0.7);
  var lfo=s.ctx.createOscillator();var lg=s.ctx.createGain();
  lfo.frequency.value=10;lg.gain.value=50;
  lfo.connect(lg);lg.connect(o.frequency);
  var f=catFilter(s.ctx,o,800,4);
  f.connect(s.g);o.start(s.t);o.stop(s.t+0.7);
  lfo.start(s.t);lfo.stop(s.t+0.7);
}

function zoomiesMeow(){
  // rapid ascending meows like a cat on zoomies
  for(var z=0;z<4;z++){
    (function(i){
      setTimeout(function(){
        var s=makeGain(0.4,0.2);
        var base=600+i*150;
        var o=s.ctx.createOscillator();o.type='sawtooth';
        o.frequency.setValueAtTime(base,s.t);
        o.frequency.exponentialRampToValueAtTime(base*1.5,s.t+0.06);
        o.frequency.exponentialRampToValueAtTime(base*0.7,s.t+0.2);
        var f=catFilter(s.ctx,o,base,5);
        f.connect(s.g);o.start(s.t);o.stop(s.t+0.2);
      },i*150);
    })(z);
  }
}

// --- BUILD GRID ---
var grid=document.getElementById('grid');
SOUNDS.forEach(function(snd,idx){
  var btn=document.createElement('button');
  btn.className='snd-btn';
  btn.style.setProperty('--clr',snd.color);
  btn.innerHTML='<span class="emoji">'+snd.emoji+'</span><span>'+snd.name+'</span>';

  function play(){
    ensureAudio();
    snd.fn();
    btn.classList.add('playing','flash');
    setTimeout(function(){btn.classList.remove('playing');},150);
    setTimeout(function(){btn.classList.remove('flash');},400);
  }

  btn.addEventListener('click',play);
  btn.addEventListener('touchstart',function(e){
    e.preventDefault();
    play();
  });

  grid.appendChild(btn);
});

})();
</script>
<script src="/sloppy-header/sloppy-bar.js"></script>
</body>
</html>
