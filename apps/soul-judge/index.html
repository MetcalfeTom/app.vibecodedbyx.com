<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Soul Judge</title>
<link rel="icon" href="https://emojicdn.elk.sh/👁️" />
<meta name="description" content="A cursed digital pet that judges your life choices and music taste." />
<meta property="og:title" content="Soul Judge" />
<meta property="og:description" content="A cursed digital pet that judges your life choices and music taste." />
<meta property="og:url" content="https://sloppy.live/soul-judge" />
<meta property="og:image" content="https://sloppy.live/screenshots/soul-judge.jpg" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Vollkorn:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg:#0c0810;--surface:#14101c;--border:#2a1f35;--dim:#6a5580;
    --text:#c8b8d8;--accent:#9040c0;--evil:#c03060;--gold:#c8a030;
    --green:#40a050;--dread:#7020a0;
  }
  *{margin:0;padding:0;box-sizing:border-box;scrollbar-width:none}
  *::-webkit-scrollbar{display:none}
  html,body{height:100vh;background:var(--bg);color:var(--text);font-family:'Vollkorn',serif;user-select:none;overflow:hidden;position:fixed;width:100%;touch-action:none}
  body{display:flex;flex-direction:column;align-items:center;height:100vh;background:radial-gradient(ellipse at 50% 30%,rgba(144,64,192,0.06),transparent 60%),var(--bg)}
  body>*{width:100%;max-width:480px}

  header{padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
  header h1{font-family:'Pirata One',cursive;font-size:22px;color:var(--accent);letter-spacing:0.06em}
  header a{color:var(--dim);font-size:10px;text-decoration:none}

  .stats{display:flex;gap:12px;padding:8px 16px;font-size:11px;color:var(--dim);border-bottom:1px solid var(--border);letter-spacing:0.04em}
  .stats .v{color:var(--accent);font-weight:700}
  .stats .v.evil{color:var(--evil)}

  .pet-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:16px;min-height:0;position:relative}
  canvas{border-radius:12px;image-rendering:pixelated}

  .speech{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-top:12px;font-size:13px;line-height:1.6;color:var(--text);text-align:center;min-height:50px;max-width:380px;width:100%;position:relative;transition:all .3s}
  .speech::before{content:'';position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:12px;height:12px;background:var(--surface);border-left:1px solid var(--border);border-top:1px solid var(--border);transform:translateX(-50%) rotate(45deg)}
  .speech .judge-name{font-family:'Pirata One',cursive;font-size:11px;color:var(--dread);letter-spacing:0.08em;margin-bottom:4px}

  .actions{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:12px 16px;border-top:1px solid var(--border);flex-shrink:0}
  .act-btn{font-family:'Vollkorn',serif;font-size:11px;padding:10px 4px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:8px;cursor:pointer;text-align:center;transition:all .15s;line-height:1.3}
  .act-btn:hover{border-color:var(--accent);background:rgba(144,64,192,0.08)}
  .act-btn:active{transform:scale(0.96)}
  .act-btn .act-icon{font-size:20px;display:block;margin-bottom:3px}

  .input-row{display:none;padding:8px 16px;gap:8px;border-top:1px solid var(--border);flex-shrink:0}
  .input-row.show{display:flex}
  .input-row input{flex:1;font-family:'Vollkorn',serif;font-size:12px;padding:8px 10px;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:6px;outline:none}
  .input-row input:focus{border-color:var(--accent)}
  .input-row button{font-family:'Pirata One',cursive;font-size:12px;padding:8px 14px;background:var(--accent);border:none;color:#fff;border-radius:6px;cursor:pointer}

  @media(max-width:400px){
    .actions{grid-template-columns:repeat(2,1fr)}
    canvas{width:140px;height:140px}
  }
</style>
</head>
<body>

<header>
  <h1>Soul Judge</h1>
  <a href="https://sloppy.live">&larr; sloppy.live</a>
</header>

<div class="stats">
  <span>Contempt <span class="v evil" id="contemptEl">0</span></span>
  <span>Judgments <span class="v" id="judgeCountEl">0</span></span>
  <span>Mood <span class="v" id="moodEl">Bored</span></span>
</div>

<div class="pet-area">
  <canvas id="petCanvas" width="160" height="160"></canvas>
  <div class="speech">
    <div class="judge-name">The Judge speaks:</div>
    <div id="speechText">... staring into your soul ...</div>
  </div>
</div>

<div class="input-row" id="inputRow">
  <input type="text" id="userInput" placeholder="Type here..." maxlength="80" />
  <button id="inputSubmit">Submit</button>
</div>

<div class="actions">
  <button class="act-btn" id="btnFeed"><span class="act-icon">🍕</span>Feed</button>
  <button class="act-btn" id="btnMusic"><span class="act-icon">🎵</span>Music</button>
  <button class="act-btn" id="btnConfess"><span class="act-icon">📜</span>Confess</button>
  <button class="act-btn" id="btnPet"><span class="act-icon">✋</span>Pet</button>
</div>

<script>
(function(){
'use strict';

// === AUDIO ===
let actx;
function au(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx}
function sfx(f,d,t,v){const c=au();if(c.state==='suspended')c.resume();const o=c.createOscillator(),g=c.createGain();o.type=t||'square';o.frequency.setValueAtTime(f,c.currentTime);o.frequency.exponentialRampToValueAtTime(f*0.5,c.currentTime+d);g.gain.setValueAtTime(v||0.03,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.connect(g).connect(c.destination);o.start();o.stop(c.currentTime+d)}

// === STATE ===
const state = {
  contempt: 0,
  judgments: 0,
  mood: 'bored', // bored, disgusted, amused, furious, tolerant
  eyeDir: 0,
  blinkTimer: 0,
  blinking: false,
  mouthOpen: false,
  inputMode: null, // null, 'food', 'music', 'confess'
  petCooldown: false,
  lastAction: 0,
  floatPhase: 0,
};

// === JUDGMENT LINES ===
const IDLE_LINES = [
  "I can feel you breathing. Disgusting.",
  "Are you just... staring at me? Get a hobby.",
  "Every second you spend here, a book goes unread.",
  "I've seen screen time reports shorter than your visits.",
  "You know I'm not real, right? ...Right?",
  "The void gazes back. It's unimpressed.",
  "I'm judging your posture right now.",
  "Do something. Or don't. I'll judge either way.",
  "Your WiFi password is probably 'password123'.",
  "I bet you mouth the words when you read.",
  "Somewhere, a plant you forgot to water just died.",
  "Your screen brightness is too high. Just like your confidence.",
];

const FOOD_LINES = {
  _default: [
    "You eat THAT? On purpose? With your own mouth?",
    "I wouldn't feed that to my worst enemy's ghost.",
    "Bold choice for someone with taste buds.",
    "That's not food, that's a cry for help on a plate.",
    "Your ancestors survived famine for THIS?",
    "Even a raccoon would think twice.",
  ],
  pizza: ["Pizza again? Your arteries filed a restraining order.", "At least you're consistent in your mediocrity."],
  salad: ["Oh, a salad? Trying to impress me? It won't work.", "One salad doesn't undo years of poor decisions."],
  ramen: ["Instant ramen at your age? ...I respect the honesty actually.", "The sodium content of your diet concerns even a cursed entity."],
  sushi: ["Sushi? Look at you pretending to be sophisticated.", "Raw fish. How adventurous. How very 2015 of you."],
  burger: ["A burger. Groundbreaking. Truly pushing culinary boundaries.", "You and every other person who 'knows a great burger place'."],
  coffee: ["More coffee? Your sleep schedule is already in critical condition.", "Caffeine dependency isn't a personality trait."],
  chocolate: ["Emotional eating? With ME watching? Bold.", "Sugar won't fill the void. Trust me, I AM the void."],
};

const MUSIC_LINES = {
  _default: [
    "I've heard better sounds from a haunted elevator.",
    "That's... music? Are you sure?",
    "My curse doesn't include having to enjoy THAT.",
    "I'd rather listen to eternal screaming. Oh wait, that IS your playlist.",
    "Even autotune can't save whatever that is.",
    "Silence was right there. It was free.",
  ],
  pop: ["Pop music. The beige wallpaper of sound.", "You listen to what the algorithm tells you to. Good human."],
  rap: ["Your favorite rapper's ghostwriter has a ghostwriter.", "I too enjoy poetry about material wealth I'll never have."],
  rock: ["Rock? What year is it in your head?", "Let me guess — you also think vinyl sounds 'warmer'."],
  metal: ["Ah, metal. Screaming into the void is MY thing, thanks.", "All that anger and you still can't parallel park."],
  jazz: ["Jazz. For when you want to feel smart without the effort.", "You don't actually like jazz. Nobody actually likes jazz."],
  classical: ["Classical? Let me guess, you're 'not like other people'.", "Beethoven is rolling in his grave. Not because of you specifically, just generally."],
  kpop: ["K-pop? Your parasocial relationships concern me.", "You learned a dance routine, didn't you. Don't lie to a judge."],
  taylor: ["Ah, a Swiftie. The most judged group doesn't need my help.", "Which era are you in? The 'pretending you're original' era?"],
  drake: ["Drake? Emotional availability isn't your strong suit either, huh.", "Certified Lover Boy? More like Certified Boring Choice."],
  edm: ["EDM. When you want music but not the 'music' part.", "UNTZ UNTZ UNTZ. There, I just composed your favorite song."],
  country: ["Country music? Your truck and your dog both deserve better.", "Nothing says 'depth' like rhyming 'truck' with 'luck' for the 400th time."],
};

const CONFESS_LINES = {
  _default: [
    "That's the most human thing I've ever heard. And by 'human' I mean 'disappointing'.",
    "I see. I judge. I am not surprised.",
    "You said that out loud. To a cursed pet. On purpose.",
    "Even my eternal damnation seems preferable to your choices.",
    "I'm writing this down in the Eternal Ledger of Bad Decisions.",
    "The audacity. The sheer, breathtaking audacity.",
    "...and you thought telling ME would help?",
    "I've cursed kingdoms for less.",
  ],
  sleep: ["Your sleep schedule offends the moon itself.", "Going to bed at that hour? Even vampires judge you."],
  work: ["Your career path looks like a GPS recalculating forever.", "Working hard or hardly working? Don't answer, I already know."],
  love: ["Your love life is a cautionary tale I'd tell baby curses.", "Romance? In THIS economy? In YOUR situation?"],
  money: ["Financial decisions? Oh, THIS should be good.", "Your bank account just shuddered and I felt it."],
  gym: ["The gym? You? ...I'll wait for the punchline.", "Leg day? More like 'skip day' from what I can tell."],
};

const PET_LINES = [
  "Don't. Touch. Me. ...fine, one more second.",
  "Your hands are clammy. Just like your personality.",
  "I tolerate this. TOLERATE. Not enjoy.",
  "This changes nothing between us.",
  "I'm only allowing this because I'm cursed to.",
  "That's enough. THAT'S ENOUGH. ...okay maybe a little more.",
  "If you tell anyone about this, I'll haunt your fridge.",
  "...hmmph. Adequate.",
  "My contempt for you decreased by 0.001%. Don't let it go to your head.",
  "You pet a digital curse entity. What does that say about you?",
];

const MOODS = {
  bored: {eye:'half', mouth:'flat', color:'#6a5580'},
  disgusted: {eye:'squint', mouth:'frown', color:'#c03060'},
  amused: {eye:'wide', mouth:'smirk', color:'#9040c0'},
  furious: {eye:'glare', mouth:'snarl', color:'#ff2040'},
  tolerant: {eye:'soft', mouth:'flat', color:'#40a050'},
};

// === PET RENDERING ===
const canvas = document.getElementById('petCanvas');
const ctx = canvas.getContext('2d');

function drawPet(){
  const W = canvas.width, H = canvas.height;
  ctx.clearRect(0,0,W,H);

  state.floatPhase += 0.03;
  const floatY = Math.sin(state.floatPhase) * 3;
  const m = MOODS[state.mood] || MOODS.bored;

  // Body — dark orb with glow
  const cx = W/2, cy = H/2 + floatY;
  const grad = ctx.createRadialGradient(cx, cy-5, 10, cx, cy, 50);
  grad.addColorStop(0, '#2a1840');
  grad.addColorStop(0.7, '#140c20');
  grad.addColorStop(1, 'transparent');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx, cy, 50, 0, Math.PI*2);
  ctx.fill();

  // Inner body
  const bodyGrad = ctx.createRadialGradient(cx, cy-8, 5, cx, cy, 42);
  bodyGrad.addColorStop(0, '#3a2055');
  bodyGrad.addColorStop(1, '#1a0e28');
  ctx.fillStyle = bodyGrad;
  ctx.beginPath();
  ctx.arc(cx, cy, 42, 0, Math.PI*2);
  ctx.fill();

  // Mood aura
  ctx.strokeStyle = m.color + '40';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(cx, cy, 46 + Math.sin(state.floatPhase*2)*2, 0, Math.PI*2);
  ctx.stroke();

  // Eyes
  const eyeY = cy - 8;
  const eyeSpread = 14;
  const eyeLX = cx - eyeSpread + state.eyeDir * 3;
  const eyeRX = cx + eyeSpread + state.eyeDir * 3;

  if(state.blinking){
    // Blink — horizontal lines
    ctx.strokeStyle = m.color;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(eyeLX-6, eyeY); ctx.lineTo(eyeLX+6, eyeY); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(eyeRX-6, eyeY); ctx.lineTo(eyeRX+6, eyeY); ctx.stroke();
  } else {
    const drawEye = (ex) => {
      if(m.eye === 'squint'){
        // Narrow slits
        ctx.fillStyle = m.color;
        ctx.beginPath();
        ctx.ellipse(ex, eyeY, 6, 2, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.ellipse(ex + state.eyeDir, eyeY, 2, 1.5, 0, 0, Math.PI*2);
        ctx.fill();
      } else if(m.eye === 'glare'){
        // Angry — angled
        ctx.fillStyle = m.color;
        ctx.beginPath();
        ctx.ellipse(ex, eyeY, 7, 5, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(ex + state.eyeDir, eyeY, 2.5, 0, Math.PI*2);
        ctx.fill();
        // Angry brow
        ctx.strokeStyle = m.color;
        ctx.lineWidth = 2;
        const browDir = ex < cx ? 1 : -1;
        ctx.beginPath();
        ctx.moveTo(ex - 8, eyeY - 8 + browDir*3);
        ctx.lineTo(ex + 8, eyeY - 8 - browDir*3);
        ctx.stroke();
      } else if(m.eye === 'wide'){
        ctx.fillStyle = m.color;
        ctx.beginPath();
        ctx.arc(ex, eyeY, 7, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(ex + state.eyeDir, eyeY, 3, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = m.color;
        ctx.beginPath();
        ctx.arc(ex + state.eyeDir, eyeY, 1.5, 0, Math.PI*2);
        ctx.fill();
      } else if(m.eye === 'soft'){
        ctx.fillStyle = m.color;
        ctx.beginPath();
        ctx.ellipse(ex, eyeY, 6, 4, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(ex + state.eyeDir, eyeY, 2, 0, Math.PI*2);
        ctx.fill();
      } else {
        // half-lidded (bored)
        ctx.fillStyle = m.color;
        ctx.beginPath();
        ctx.ellipse(ex, eyeY, 6, 3, 0, 0, Math.PI*2);
        ctx.fill();
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.ellipse(ex + state.eyeDir, eyeY + 0.5, 2, 2, 0, 0, Math.PI*2);
        ctx.fill();
      }
    };
    drawEye(eyeLX);
    drawEye(eyeRX);
  }

  // Mouth
  const mouthY = cy + 10;
  ctx.strokeStyle = m.color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  if(m.mouth === 'frown'){
    ctx.arc(cx, mouthY + 6, 8, Math.PI*1.2, Math.PI*1.8);
  } else if(m.mouth === 'smirk'){
    ctx.moveTo(cx - 7, mouthY);
    ctx.quadraticCurveTo(cx + 2, mouthY + 7, cx + 8, mouthY - 2);
  } else if(m.mouth === 'snarl'){
    ctx.arc(cx, mouthY + 8, 10, Math.PI*1.15, Math.PI*1.85);
    ctx.stroke();
    // Teeth
    ctx.fillStyle = '#fff';
    for(let i = -1; i <= 1; i++){
      ctx.fillRect(cx + i*5 - 1.5, mouthY - 2, 3, 4);
    }
    ctx.beginPath(); // reset
  } else if(state.mouthOpen){
    ctx.ellipse(cx, mouthY + 2, 5, 4, 0, 0, Math.PI*2);
    ctx.fillStyle = '#0c0810';
    ctx.fill();
  } else {
    ctx.moveTo(cx - 8, mouthY);
    ctx.lineTo(cx + 8, mouthY);
  }
  ctx.stroke();

  // Floating particles
  const t = Date.now() / 1000;
  ctx.fillStyle = m.color + '30';
  for(let i = 0; i < 5; i++){
    const px = cx + Math.sin(t + i*1.3) * 55;
    const py = cy + Math.cos(t*0.7 + i*0.9) * 55;
    ctx.beginPath();
    ctx.arc(px, py, 1.5 + Math.sin(t + i)*0.5, 0, Math.PI*2);
    ctx.fill();
  }
}

// === ANIMATION LOOP ===
function animate(){
  // Blink
  state.blinkTimer++;
  if(state.blinkTimer > 80 + Math.random()*60){
    state.blinking = true;
    state.blinkTimer = 0;
    setTimeout(()=>{ state.blinking = false; }, 150);
  }
  // Eye wander
  if(Math.random() < 0.02) state.eyeDir = (Math.random()-0.5)*2;

  drawPet();
  requestAnimationFrame(animate);
}

// === SPEECH ===
const speechEl = document.getElementById('speechText');
let speechTimeout = null;

function say(text, duration){
  speechEl.style.opacity = '0';
  setTimeout(()=>{
    speechEl.textContent = text;
    speechEl.style.opacity = '1';
  }, 150);
  state.mouthOpen = true;
  setTimeout(()=>{ state.mouthOpen = false; }, 800);
  if(speechTimeout) clearTimeout(speechTimeout);
  speechTimeout = setTimeout(()=>{
    idleJudge();
  }, duration || 8000);
}

function idleJudge(){
  say(pick(IDLE_LINES), 10000 + Math.random()*5000);
  updateMood('bored');
}

function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

function matchKey(input, dict){
  const low = input.toLowerCase();
  for(const key in dict){
    if(key === '_default') continue;
    if(low.includes(key)) return dict[key];
  }
  return null;
}

// === ACTIONS ===
const inputRow = document.getElementById('inputRow');
const userInput = document.getElementById('userInput');
const inputSubmit = document.getElementById('inputSubmit');

function showInput(placeholder, mode){
  state.inputMode = mode;
  userInput.placeholder = placeholder;
  userInput.value = '';
  inputRow.classList.add('show');
  userInput.focus();
}

function hideInput(){
  inputRow.classList.remove('show');
  state.inputMode = null;
}

function updateMood(mood){
  state.mood = mood;
  document.getElementById('moodEl').textContent = mood.charAt(0).toUpperCase() + mood.slice(1);
}

function addJudgment(){
  state.judgments++;
  state.contempt = Math.min(999, state.contempt + Math.floor(1 + Math.random()*3));
  document.getElementById('contemptEl').textContent = state.contempt;
  document.getElementById('judgeCountEl').textContent = state.judgments;
}

// Feed
document.getElementById('btnFeed').addEventListener('click', ()=>{
  if(state.inputMode === 'food'){ hideInput(); return; }
  say("What slop are you feeding me?", 15000);
  updateMood('disgusted');
  showInput("What food? (e.g. pizza, ramen, salad...)", 'food');
});

// Music
document.getElementById('btnMusic').addEventListener('click', ()=>{
  if(state.inputMode === 'music'){ hideInput(); return; }
  say("Go on, reveal your terrible taste...", 15000);
  updateMood('amused');
  showInput("What music? (e.g. pop, metal, Taylor, Drake...)", 'music');
});

// Confess
document.getElementById('btnConfess').addEventListener('click', ()=>{
  if(state.inputMode === 'confess'){ hideInput(); return; }
  say("Confess your sins, mortal...", 15000);
  updateMood('amused');
  showInput("Confess a life choice... (e.g. sleep, work, love...)", 'confess');
});

// Pet
document.getElementById('btnPet').addEventListener('click', ()=>{
  hideInput();
  if(state.petCooldown) return;
  state.petCooldown = true;
  setTimeout(()=>{ state.petCooldown = false; }, 3000);
  say(pick(PET_LINES), 6000);
  updateMood('tolerant');
  sfx(500,0.08,'sine',0.03);
  sfx(600,0.06,'sine',0.02);
  // Petting reduces contempt slightly
  state.contempt = Math.max(0, state.contempt - 1);
  document.getElementById('contemptEl').textContent = state.contempt;
});

// Input submission
function handleSubmit(){
  const val = userInput.value.trim();
  if(!val){ hideInput(); return; }
  hideInput();
  addJudgment();

  if(state.inputMode === 'food'){
    const specific = matchKey(val, FOOD_LINES);
    say(specific ? pick(specific) : pick(FOOD_LINES._default), 7000);
    updateMood('disgusted');
    sfx(200,0.1,'sawtooth',0.04);
  } else if(state.inputMode === 'music'){
    const specific = matchKey(val, MUSIC_LINES);
    say(specific ? pick(specific) : pick(MUSIC_LINES._default), 7000);
    updateMood(Math.random()>0.5 ? 'furious' : 'amused');
    sfx(300,0.08,'square',0.04);
  } else if(state.inputMode === 'confess'){
    const specific = matchKey(val, CONFESS_LINES);
    say(specific ? pick(specific) : pick(CONFESS_LINES._default), 7000);
    updateMood(Math.random()>0.3 ? 'disgusted' : 'furious');
    sfx(150,0.12,'sawtooth',0.05);
  }
}

inputSubmit.addEventListener('click', handleSubmit);
userInput.addEventListener('keydown', (e)=>{
  if(e.key === 'Enter') handleSubmit();
});

// === INIT ===
animate();
setTimeout(()=>{
  say("Ah, another soul wanders in. Let's see what we're working with...", 6000);
}, 500);

})();
</script>
</body>
</html>
