<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Terrarium</title>
<link rel="icon" href="https://emojicdn.elk.sh/🌿">
<meta property="og:title" content="Neon Terrarium">
<meta property="og:description" content="A living pixel terrarium with glowing plants and tiny autonomous creatures. Watch life unfold.">
<meta property="og:url" content="https://app.sloppy.live/neon-terrarium/">
<meta property="og:image" content="https://image.pollinations.ai/prompt/pixel%20art%20terrarium%20neon%20glowing%20plants%20tiny%20creatures%20dark%20glass%20jar?width=1200&height=630&nologo=true&referrer=sloppy.live">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=DotGothic16&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#060612;font-family:'DotGothic16',monospace;color:#aaa;user-select:none}
canvas{display:block;image-rendering:pixelated;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%)}
#ui{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10;flex-wrap:wrap;justify-content:center}
.btn{font-family:'Silkscreen',monospace;font-size:10px;padding:7px 14px;border:1px solid rgba(0,255,150,0.2);background:rgba(0,255,150,0.05);color:#0f8;cursor:pointer;transition:all .2s}
.btn:hover{background:rgba(0,255,150,0.15);border-color:rgba(0,255,150,0.4)}
#stats{position:absolute;top:10px;left:50%;transform:translateX(-50%);font-family:'Silkscreen',monospace;font-size:10px;color:#555;z-index:10;text-align:center;letter-spacing:1px}
#stats span{color:#0f8}
#backlink{position:absolute;bottom:4px;right:8px;font-size:9px;color:#222;text-decoration:none;z-index:10}
#backlink:hover{color:#0f8}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="stats">Plants: <span id="s-plants">0</span> · Creatures: <span id="s-creatures">0</span> · Spores: <span id="s-spores">0</span></div>
<div id="ui">
  <button class="btn" id="btn-plant">🌱 Plant Seed</button>
  <button class="btn" id="btn-creature">🐛 Add Creature</button>
  <button class="btn" id="btn-rain">💧 Rain</button>
  <button class="btn" id="btn-glow">✨ Glow Burst</button>
</div>
<a id="backlink" href="https://sloppy.live" target="_blank">sloppy.live</a>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

const PX = 3;
const CW = 220, CH = 160;
canvas.width = CW; canvas.height = CH;

function resize() {
  const maxW = window.innerWidth * 0.95, maxH = window.innerHeight * 0.85;
  const scale = Math.min(Math.floor(maxW / CW), Math.floor(maxH / CH), 5);
  canvas.style.width = CW * scale + 'px';
  canvas.style.height = CH * scale + 'px';
}
resize();
window.addEventListener('resize', resize);

// Jar shape
const JAR_LEFT = 20, JAR_RIGHT = CW - 20;
const JAR_TOP = 15, JAR_BOTTOM = CH - 12;
const JAR_W = JAR_RIGHT - JAR_LEFT;
const SOIL_TOP = JAR_BOTTOM - 22;
const WATER_LEVEL_MAX = SOIL_TOP - 2;

// State
let plants = [];
let creatures = [];
let spores = [];
let rainDrops = [];
let particles = [];
let waterLevel = 0.5; // 0..1
let frame = 0;
let glowBurst = 0;

// Plant types
const PLANT_TYPES = [
  { name:'fern', color:'#00ff88', stemColor:'#008844', maxH:25, growRate:0.015, branches:true, leafSize:3 },
  { name:'mushroom', color:'#ff44ff', stemColor:'#882288', maxH:14, growRate:0.02, cap:true, leafSize:4 },
  { name:'crystal', color:'#00ffff', stemColor:'#006688', maxH:20, growRate:0.01, angular:true, leafSize:2 },
  { name:'vine', color:'#88ff00', stemColor:'#448800', maxH:30, growRate:0.018, wavy:true, leafSize:2 },
  { name:'bloom', color:'#ff6644', stemColor:'#884422', maxH:18, growRate:0.012, flower:true, leafSize:3 },
  { name:'moss', color:'#44ff88', stemColor:'#228844', maxH:6, growRate:0.025, spread:true, leafSize:1 },
];

function addPlant(x) {
  const type = PLANT_TYPES[Math.floor(Math.random()*PLANT_TYPES.length)];
  x = x || JAR_LEFT + 10 + Math.random()*(JAR_W - 20);
  plants.push({
    type, x, y: SOIL_TOP,
    height: 0, maxHeight: type.maxH * (0.7 + Math.random()*0.6),
    growth: 0, // 0..1
    segments: [], // {x, y, size}
    sporeTimer: 200 + Math.random()*400,
    glow: 0.5 + Math.random()*0.5,
    swayPhase: Math.random()*Math.PI*2,
    alive: true
  });
}

// Creature types
const CREATURE_TYPES = [
  { name:'beetle', w:4, h:3, color:'#ff8800', speed:0.3, legs:true },
  { name:'worm', w:6, h:2, color:'#ff44aa', speed:0.15, segments:3 },
  { name:'snail', w:5, h:4, color:'#aaaaff', speed:0.1, shell:true },
  { name:'firefly', w:2, h:2, color:'#ffff00', speed:0.5, flies:true },
  { name:'spider', w:4, h:3, color:'#cc4444', speed:0.35, legs:true },
];

function addCreature(x) {
  const type = CREATURE_TYPES[Math.floor(Math.random()*CREATURE_TYPES.length)];
  x = x || JAR_LEFT + 10 + Math.random()*(JAR_W - 20);
  const y = type.flies ? SOIL_TOP - 20 - Math.random()*40 : SOIL_TOP - type.h;
  creatures.push({
    type, x, y, vx:(Math.random()-0.5)*type.speed, vy:0,
    targetX: x, animFrame:0, dir:1,
    energy: 80 + Math.random()*20,
    glowPhase: Math.random()*Math.PI*2,
    trail: [], alive: true
  });
}

function addSpore(x, y, color) {
  spores.push({ x, y, vx:(Math.random()-0.5)*0.8, vy:-0.3-Math.random()*0.5, life:1, color, size:1 });
}

function addParticle(x, y, color, vx, vy) {
  particles.push({ x, y, vx:vx||0, vy:vy||0, life:1, color, size:1+Math.random() });
}

// Rain
function doRain() {
  for (let i = 0; i < 40; i++) {
    rainDrops.push({
      x: JAR_LEFT + 5 + Math.random()*(JAR_W - 10),
      y: JAR_TOP + 5,
      vy: 1 + Math.random()*1.5,
      life: 1
    });
  }
  waterLevel = Math.min(1, waterLevel + 0.2);
}

// Grow plants
function growPlants() {
  plants.forEach(p => {
    if (!p.alive) return;
    if (p.growth < 1 && waterLevel > 0.1) {
      const rate = p.type.growRate * (0.5 + waterLevel*0.5) * (0.8 + glowBurst*0.5);
      p.growth = Math.min(1, p.growth + rate);
      p.height = p.growth * p.maxHeight;
      waterLevel = Math.max(0, waterLevel - 0.0001);
    }
    // Rebuild segments
    p.segments = [];
    const segs = Math.floor(p.height / 2);
    const sway = Math.sin(frame*0.02 + p.swayPhase) * 1.5 * p.growth;
    for (let i = 0; i <= segs; i++) {
      const t = i / Math.max(1, segs);
      let sx = p.x + sway * t;
      let sy = p.y - i * 2;
      if (p.type.wavy) sx += Math.sin(i*0.5 + frame*0.03)*3*t;
      if (p.type.angular) sx += (i%2===0?1:-1) * t * 2;
      p.segments.push({ x:sx, y:sy, t });
    }
    // Spore timer
    if (p.growth > 0.7) {
      p.sporeTimer--;
      if (p.sporeTimer <= 0) {
        p.sporeTimer = 150 + Math.random()*300;
        const tip = p.segments[p.segments.length-1];
        if (tip) {
          for (let i = 0; i < 3; i++) addSpore(tip.x, tip.y, p.type.color);
        }
      }
    }
  });
}

// Update creatures
function updateCreatures() {
  creatures.forEach(c => {
    if (!c.alive) return;
    c.animFrame++;
    c.energy -= 0.005;
    if (c.energy <= 0) { c.alive = false; return; }

    if (c.type.flies) {
      // Firefly floats
      if (c.animFrame % 60 === 0) {
        c.targetX = JAR_LEFT + 10 + Math.random()*(JAR_W-20);
        c.vy = (Math.random()-0.5)*0.3;
      }
      c.vx += (c.targetX - c.x) * 0.002;
      c.vx *= 0.97;
      c.vy += (SOIL_TOP - 30 - c.y) * 0.001 + (Math.random()-0.5)*0.05;
      c.vy *= 0.97;
      c.x += c.vx; c.y += c.vy;
      c.y = Math.max(JAR_TOP+8, Math.min(SOIL_TOP-6, c.y));
    } else {
      // Ground creature
      if (c.animFrame % 80 === 0 || Math.abs(c.x - c.targetX) < 2) {
        c.targetX = JAR_LEFT + 10 + Math.random()*(JAR_W-20);
      }
      const dx = c.targetX - c.x;
      c.vx = Math.sign(dx) * c.type.speed * (0.5 + Math.random()*0.5);
      c.dir = c.vx > 0 ? 1 : -1;
      c.x += c.vx;
      c.y = SOIL_TOP - c.type.h;
    }
    c.x = Math.max(JAR_LEFT+4, Math.min(JAR_RIGHT-4-c.type.w, c.x));

    // Eat nearby spores for energy
    spores.forEach(s => {
      if (s.life <= 0) return;
      if (Math.abs(s.x-c.x)<5 && Math.abs(s.y-c.y)<5) {
        c.energy = Math.min(100, c.energy + 15);
        s.life = 0;
        addParticle(s.x, s.y, s.color);
      }
    });

    // Trail for worms
    if (c.type.segments) {
      c.trail.unshift({x:c.x, y:c.y});
      if (c.trail.length > c.type.segments*4) c.trail.pop();
    }
  });
  creatures = creatures.filter(c => c.alive);
}

// Update particles/spores/rain
function updateParticles() {
  spores.forEach(s => {
    s.x += s.vx; s.y += s.vy;
    s.vy += 0.005;
    s.vx *= 0.99;
    s.life -= 0.003;
    if (s.y >= SOIL_TOP - 1) {
      s.y = SOIL_TOP - 1; s.vy = 0; s.vx = 0; s.life -= 0.01;
      // Chance to seed new plant
      if (Math.random() < 0.001 && plants.length < 20) {
        addPlant(s.x);
        s.life = 0;
      }
    }
  });
  spores = spores.filter(s => s.life > 0);

  particles.forEach(p => { p.x+=p.vx; p.y+=p.vy; p.vy+=0.02; p.life-=0.025; });
  particles = particles.filter(p => p.life > 0);

  rainDrops.forEach(r => { r.y += r.vy; r.life -= 0.015; });
  rainDrops = rainDrops.filter(r => r.life > 0 && r.y < SOIL_TOP);

  if (glowBurst > 0) glowBurst *= 0.97;
  waterLevel = Math.max(0, waterLevel - 0.00005);
}

// Drawing
function setPixel(x, y, color) {
  ctx.fillStyle = color;
  ctx.fillRect(Math.floor(x), Math.floor(y), 1, 1);
}

function drawJar() {
  // Glass outline
  ctx.strokeStyle = 'rgba(100,150,200,0.2)';
  ctx.lineWidth = 1;
  // Left wall
  ctx.beginPath(); ctx.moveTo(JAR_LEFT, JAR_TOP+5); ctx.lineTo(JAR_LEFT-3, JAR_TOP);
  ctx.lineTo(JAR_RIGHT+3, JAR_TOP); ctx.lineTo(JAR_RIGHT, JAR_TOP+5); ctx.stroke();
  // Sides
  ctx.beginPath(); ctx.moveTo(JAR_LEFT, JAR_TOP+5); ctx.lineTo(JAR_LEFT, JAR_BOTTOM);
  ctx.lineTo(JAR_RIGHT, JAR_BOTTOM); ctx.lineTo(JAR_RIGHT, JAR_TOP+5); ctx.stroke();
  // Rim
  ctx.strokeStyle = 'rgba(120,180,220,0.25)';
  ctx.beginPath(); ctx.moveTo(JAR_LEFT-4, JAR_TOP); ctx.lineTo(JAR_RIGHT+4, JAR_TOP); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(JAR_LEFT-4, JAR_TOP-1); ctx.lineTo(JAR_RIGHT+4, JAR_TOP-1); ctx.stroke();
  // Glass reflection
  ctx.fillStyle = 'rgba(150,200,255,0.03)';
  ctx.fillRect(JAR_LEFT+2, JAR_TOP+3, 3, JAR_BOTTOM-JAR_TOP-10);
  ctx.fillRect(JAR_RIGHT-5, JAR_TOP+8, 2, 30);
}

function drawSoil() {
  // Soil layers
  for (let y = SOIL_TOP; y < JAR_BOTTOM; y++) {
    const depth = (y - SOIL_TOP) / (JAR_BOTTOM - SOIL_TOP);
    const r = 30 + depth*20, g = 18 + depth*8, b = 10;
    for (let x = JAR_LEFT+1; x < JAR_RIGHT; x++) {
      const noise = Math.random() * 8;
      ctx.fillStyle = 'rgb('+(r+noise)+','+(g+noise)+','+(b+noise)+')';
      ctx.fillRect(x, y, 1, 1);
    }
  }
  // Surface rocks
  for (let i = 0; i < 12; i++) {
    const rx = JAR_LEFT + 5 + (i/12)*(JAR_W-10) + Math.sin(i*7)*3;
    const c = 40 + Math.sin(i*3)*15;
    ctx.fillStyle = 'rgb('+c+','+c+','+(c-5)+')';
    ctx.fillRect(Math.floor(rx), SOIL_TOP, 2+i%2, 1);
  }
  // Water indicator
  if (waterLevel > 0.05) {
    const wAlpha = waterLevel * 0.08;
    ctx.fillStyle = 'rgba(50,120,200,'+wAlpha+')';
    ctx.fillRect(JAR_LEFT+1, SOIL_TOP, JAR_W-2, 2);
  }
}

function drawPlants() {
  plants.forEach(p => {
    if (!p.alive || p.segments.length < 2) return;
    const glow = p.glow * (0.7 + glowBurst*0.5);
    // Stem
    ctx.strokeStyle = p.type.stemColor;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(Math.floor(p.segments[0].x), Math.floor(p.segments[0].y));
    p.segments.forEach(s => ctx.lineTo(Math.floor(s.x), Math.floor(s.y)));
    ctx.stroke();

    // Leaves/features
    const tip = p.segments[p.segments.length-1];
    if (p.type.branches) {
      // Fern branches
      for (let i = 3; i < p.segments.length; i += 2) {
        const s = p.segments[i];
        const dir = i%4===0 ? -1 : 1;
        const len = p.type.leafSize * (1 - s.t*0.3);
        ctx.fillStyle = p.type.color;
        ctx.globalAlpha = 0.6 + glow*0.4;
        ctx.fillRect(Math.floor(s.x + dir), Math.floor(s.y), Math.ceil(len*dir), 1);
        ctx.fillRect(Math.floor(s.x + dir*2), Math.floor(s.y-1), 1, 1);
      }
    }
    if (p.type.cap) {
      // Mushroom cap
      const r = p.type.leafSize + p.growth*2;
      ctx.fillStyle = p.type.color;
      ctx.globalAlpha = 0.7 + glow*0.3;
      ctx.beginPath(); ctx.arc(tip.x, tip.y, r, Math.PI, 0); ctx.fill();
      // Spots
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.fillRect(Math.floor(tip.x-1), Math.floor(tip.y-r*0.5), 1, 1);
      ctx.fillRect(Math.floor(tip.x+1), Math.floor(tip.y-r*0.3), 1, 1);
    }
    if (p.type.flower && p.growth > 0.6) {
      // Bloom petals
      ctx.fillStyle = p.type.color;
      ctx.globalAlpha = 0.7 + glow*0.3;
      const pr = 2 + p.growth;
      for (let a = 0; a < 5; a++) {
        const angle = a*Math.PI*2/5 + frame*0.01;
        const px = tip.x + Math.cos(angle)*pr;
        const py = tip.y + Math.sin(angle)*pr;
        ctx.fillRect(Math.floor(px), Math.floor(py), 2, 2);
      }
      ctx.fillStyle = '#fff';
      ctx.fillRect(Math.floor(tip.x), Math.floor(tip.y), 1, 1);
    }
    if (p.type.angular) {
      // Crystal facets
      p.segments.forEach((s,i) => {
        if (i%2===0 && i>0) {
          ctx.fillStyle = p.type.color;
          ctx.globalAlpha = 0.5 + glow*0.3 + Math.sin(frame*0.05+i)*0.2;
          ctx.fillRect(Math.floor(s.x), Math.floor(s.y), 2, 2);
        }
      });
    }
    if (p.type.spread && p.growth > 0.3) {
      // Moss spreading
      for (let dx = -3; dx <= 3; dx++) {
        if (Math.random() < p.growth*0.5) {
          ctx.fillStyle = p.type.color;
          ctx.globalAlpha = 0.4 + Math.random()*0.3;
          ctx.fillRect(Math.floor(p.x+dx), SOIL_TOP-1-Math.floor(Math.random()*2), 1, 1);
        }
      }
    }
    // Neon glow aura on tip
    if (tip && glow > 0.3) {
      ctx.fillStyle = p.type.color;
      ctx.globalAlpha = glow * 0.15 * (0.7 + Math.sin(frame*0.05+p.swayPhase)*0.3);
      ctx.beginPath();
      ctx.arc(tip.x, tip.y, 4 + p.growth*2, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  });
}

function drawCreatures() {
  creatures.forEach(c => {
    const t = c.type;
    const ix = Math.floor(c.x), iy = Math.floor(c.y);

    if (t.flies) {
      // Firefly - pulsing glow
      const glow = 0.5 + 0.5*Math.sin(frame*0.08 + c.glowPhase);
      ctx.fillStyle = t.color;
      ctx.globalAlpha = glow;
      ctx.fillRect(ix, iy, 2, 2);
      ctx.globalAlpha = glow*0.2;
      ctx.beginPath(); ctx.arc(ix+1, iy+1, 4, 0, Math.PI*2); ctx.fill();
      ctx.globalAlpha = 1;
      return;
    }

    if (t.segments) {
      // Worm with trailing segments
      ctx.fillStyle = t.color;
      ctx.fillRect(ix, iy, 2, 2);
      c.trail.forEach((tr,i) => {
        if (i%4===0) {
          ctx.globalAlpha = 0.7-i*0.1;
          ctx.fillRect(Math.floor(tr.x), Math.floor(tr.y)+1, 2, 1);
        }
      });
      ctx.globalAlpha = 1;
      return;
    }

    // Body
    ctx.fillStyle = t.color;
    ctx.fillRect(ix, iy, t.w, t.h);

    if (t.shell) {
      // Snail shell
      ctx.fillStyle = '#8888cc';
      ctx.beginPath(); ctx.arc(ix+t.w-2, iy, 3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#6666aa';
      ctx.fillRect(ix+t.w-3, iy-1, 1, 1);
    }

    if (t.legs) {
      // Legs animation
      const legPhase = Math.sin(c.animFrame*0.15);
      ctx.fillStyle = t.color;
      ctx.fillRect(ix+1, iy+t.h, 1, 1+Math.round(Math.abs(legPhase)));
      ctx.fillRect(ix+t.w-2, iy+t.h, 1, 1+Math.round(Math.abs(-legPhase)));
    }

    // Eye
    ctx.fillStyle = '#fff';
    const eyeX = c.dir > 0 ? ix+t.w-1 : ix;
    ctx.fillRect(eyeX, iy, 1, 1);
  });
}

function drawSpores() {
  spores.forEach(s => {
    ctx.fillStyle = s.color;
    ctx.globalAlpha = s.life * 0.7;
    ctx.fillRect(Math.floor(s.x), Math.floor(s.y), 1, 1);
  });
  ctx.globalAlpha = 1;
}

function drawRain() {
  ctx.fillStyle = 'rgba(100,180,255,0.6)';
  rainDrops.forEach(r => {
    ctx.fillRect(Math.floor(r.x), Math.floor(r.y), 1, 2);
  });
}

function drawParticles() {
  particles.forEach(p => {
    ctx.fillStyle = p.color;
    ctx.globalAlpha = p.life;
    ctx.fillRect(Math.floor(p.x), Math.floor(p.y), 1, 1);
  });
  ctx.globalAlpha = 1;
}

function drawBackground() {
  // Dark bg with subtle gradient
  ctx.fillStyle = '#060612';
  ctx.fillRect(0, 0, CW, CH);
  // Ambient glow from plants
  if (plants.length > 0 && glowBurst > 0.01) {
    ctx.fillStyle = 'rgba(0,255,120,'+glowBurst*0.03+')';
    ctx.fillRect(JAR_LEFT, JAR_TOP, JAR_W, JAR_BOTTOM-JAR_TOP);
  }
  // Stars outside jar
  if (frame%3===0) {
    for (let i = 0; i < 3; i++) {
      const sx = Math.random()*CW, sy = Math.random()*JAR_TOP;
      ctx.fillStyle = 'rgba(200,200,255,'+Math.random()*0.3+')';
      ctx.fillRect(Math.floor(sx), Math.floor(sy), 1, 1);
    }
  }
}

function draw() {
  drawBackground();
  drawSoil();
  drawRain();
  drawPlants();
  drawSpores();
  drawCreatures();
  drawParticles();
  drawJar();

  // Stats
  document.getElementById('s-plants').textContent = plants.filter(p=>p.alive).length;
  document.getElementById('s-creatures').textContent = creatures.length;
  document.getElementById('s-spores').textContent = spores.length;
}

function update() {
  frame++;
  growPlants();
  updateCreatures();
  updateParticles();
  // Natural spawning
  if (frame%600===0 && plants.length < 15 && waterLevel > 0.2) {
    addPlant();
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Buttons
document.getElementById('btn-plant').addEventListener('click', () => {
  if (plants.length < 25) addPlant();
});
document.getElementById('btn-creature').addEventListener('click', () => {
  if (creatures.length < 15) addCreature();
});
document.getElementById('btn-rain').addEventListener('click', doRain);
document.getElementById('btn-glow').addEventListener('click', () => {
  glowBurst = 1;
  plants.forEach(p => { p.glow = Math.min(1.5, p.glow + 0.3); });
  for (let i = 0; i < 15; i++) {
    const x = JAR_LEFT+5+Math.random()*(JAR_W-10);
    const y = SOIL_TOP-5-Math.random()*50;
    addParticle(x, y, '#ffff88', (Math.random()-0.5)*0.5, -Math.random()*0.5);
  }
});

// Click to add plant at position
canvas.addEventListener('click', e => {
  const rect = canvas.getBoundingClientRect();
  const scaleX = CW / rect.width, scaleY = CH / rect.height;
  const cx = (e.clientX - rect.left) * scaleX;
  const cy = (e.clientY - rect.top) * scaleY;
  if (cx > JAR_LEFT+5 && cx < JAR_RIGHT-5 && cy > SOIL_TOP-5 && cy < SOIL_TOP+5) {
    if (plants.length < 25) addPlant(cx);
  }
});

// Initial state
for (let i = 0; i < 4; i++) addPlant();
for (let i = 0; i < 3; i++) addCreature();
