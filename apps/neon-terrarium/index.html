<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Neon Terrarium</title>
<link rel="icon" href="https://emojicdn.elk.sh/🪴">
<meta property="og:title" content="Neon Terrarium">
<meta property="og:description" content="Grow glowing moss, watch tiny beetles roam, and tend your neon ecosystem.">
<meta property="og:url" content="https://sloppy.live/neon-terrarium/">
<meta property="og:image" content="https://sloppy.live/neon-terrarium/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Vollkorn:wght@400;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0b0d0a;overflow:hidden;font-family:'Vollkorn',serif;cursor:pointer}
canvas{display:block}
#hud{position:fixed;top:12px;left:12px;z-index:10;display:flex;gap:6px;flex-wrap:wrap}
#hud button{background:rgba(10,15,10,.85);color:#4aff8b;border:1px solid rgba(74,255,139,.2);padding:7px 12px;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;border-radius:4px;backdrop-filter:blur(4px);transition:all .15s}
#hud button:hover{background:rgba(74,255,139,.1);border-color:#4aff8b}
#hud button.active{background:rgba(74,255,139,.15);border-color:#4aff8b;box-shadow:0 0 8px rgba(74,255,139,.2)}
#stats{position:fixed;top:12px;right:12px;color:rgba(74,255,139,.35);font-size:11px;font-family:'DM Mono',monospace;text-align:right;pointer-events:none;z-index:10}
#hint{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.2);font-size:12px;font-family:'DM Mono',monospace;pointer-events:none;z-index:10;transition:opacity 1s;text-align:center}
#backlink{position:fixed;bottom:8px;right:12px;color:rgba(255,255,255,.1);font-size:10px;font-family:'DM Mono',monospace;text-decoration:none;z-index:10}
#backlink:hover{color:rgba(74,255,139,.4)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <button id="btn-moss" class="active">Moss</button>
  <button id="btn-mushroom">Mushroom</button>
  <button id="btn-fern">Fern</button>
  <button id="btn-water">Water</button>
  <button id="btn-beetle">Beetle</button>
  <button id="btn-light">Light</button>
</div>
<div id="stats"></div>
<div id="hint">click to plant — things grow on their own</div>
<a id="backlink" href="https://sloppy.live">sloppy.live</a>
<script>
const CV=document.getElementById('c'),X=CV.getContext('2d');
let W,H;
function resize(){W=window.innerWidth;H=window.innerHeight;CV.width=W;CV.height=H;floorY=H*0.72;}
resize();window.addEventListener('resize',resize);

let floorY=H*0.72;
let tool='moss';
let interacted=false;
let frame=0;
let moisture=0.5;
let lightLevel=0.4;

const mosses=[];
const mushrooms=[];
const ferns=[];
const beetles=[];
const particles=[];
const waterDrops=[];
const lights=[];

// Soil bumps
const soilBumps=[];
for(let i=0;i<80;i++){
  soilBumps.push({x:W*i/80+Math.random()*10,h:3+Math.random()*8});
}
function getSoilY(x){
  let y=floorY;
  for(const b of soilBumps){
    const d=Math.abs(x-b.x);
    if(d<30) y-=b.h*(1-d/30);
  }
  return y;
}

function plantMoss(x,y){
  if(mosses.length>=200)return;
  const sy=Math.min(y,getSoilY(x));
  mosses.push({x,y:sy,size:1+Math.random()*2,maxSize:8+Math.random()*12,growth:0,
    hue:100+Math.random()*40,sat:60+Math.random()*30,bri:50+Math.random()*30,
    glow:0.3+Math.random()*0.4,age:0,spread:0.002+Math.random()*0.003});
}
function plantMushroom(x,y){
  if(mushrooms.length>=40)return;
  const sy=Math.min(y,getSoilY(x));
  mushrooms.push({x,y:sy,stemH:0,maxStemH:15+Math.random()*25,capR:0,maxCapR:6+Math.random()*10,
    hue:280+Math.random()*60,glow:0.4+Math.random()*0.3,age:0,growth:0,
    spots:Array.from({length:3+Math.floor(Math.random()*4)},()=>({a:Math.random()*Math.PI,r:0.3+Math.random()*0.4,size:1+Math.random()*2})),
    sway:Math.random()*Math.PI*2});
}
function plantFern(x,y){
  if(ferns.length>=30)return;
  const sy=Math.min(y,getSoilY(x));
  ferns.push({x,y:sy,fronds:[],maxFronds:3+Math.floor(Math.random()*4),
    height:0,maxHeight:30+Math.random()*50,hue:110+Math.random()*30,age:0,growth:0,
    sway:Math.random()*Math.PI*2});
}
function spawnBeetle(x,y){
  if(beetles.length>=15)return;
  const sy=Math.min(y,getSoilY(x));
  beetles.push({x,y:sy,vx:(Math.random()-0.5)*0.8,size:3+Math.random()*3,
    hue:30+Math.random()*40,legPhase:Math.random()*Math.PI*2,dir:Math.random()>0.5?1:-1,
    pauseTimer:0,antPhase:Math.random()*Math.PI*2});
}
function dropWater(x,y){
  for(let i=0;i<5;i++){
    waterDrops.push({x:x+Math.random()*20-10,y:y+Math.random()*10-20,vy:1+Math.random()*2,size:2+Math.random()*2,life:1});
  }
  moisture=Math.min(1,moisture+0.03);
}
function placeLight(x,y){
  if(lights.length>8)lights.shift();
  lights.push({x,y:Math.min(y,floorY-40),radius:60+Math.random()*40,intensity:0.6+Math.random()*0.3,hue:45+Math.random()*20,age:0});
  lightLevel=Math.min(1,lightLevel+0.08);
}
function emitSpore(x,y,hue){
  if(particles.length>500)return;
  particles.push({x,y,vx:(Math.random()-0.5)*0.5,vy:-0.3-Math.random()*0.5,size:1+Math.random()*1.5,hue:hue,life:1,decay:0.005+Math.random()*0.008,type:'spore'});
}
function emitMote(x,y){
  if(particles.length>500)return;
  particles.push({x,y:y-Math.random()*20,vx:(Math.random()-0.5)*0.3,vy:-0.1-Math.random()*0.2,size:1+Math.random(),hue:100+Math.random()*40,life:1,decay:0.003+Math.random()*0.004,type:'mote'});
}

function update(){
  frame++;
  moisture=Math.max(0.1,moisture-0.0001);
  lightLevel=Math.max(0.15,lightLevel-0.00005);

  for(const m of mosses){
    m.age++;
    m.growth=Math.min(1,m.growth+0.0008*moisture*(0.5+lightLevel*0.5));
    m.size=1+m.growth*m.maxSize;
    if(m.growth>0.6&&Math.random()<m.spread*moisture)plantMoss(m.x+(Math.random()-0.5)*m.size*3,m.y+(Math.random()-0.5)*4);
    if(m.growth>0.4&&Math.random()<0.003*m.glow)emitMote(m.x,m.y);
  }
  for(const m of mushrooms){
    m.age++;
    m.growth=Math.min(1,m.growth+0.0006*(0.3+moisture*0.7));
    m.stemH=m.growth*m.maxStemH;
    m.capR=m.growth*m.maxCapR*(m.growth>0.3?1:m.growth/0.3);
    m.sway+=0.01;
    if(m.growth>0.7&&Math.random()<0.005)emitSpore(m.x,m.y-m.stemH-m.capR,m.hue);
  }
  for(const f of ferns){
    f.age++;
    f.growth=Math.min(1,f.growth+0.0005*(0.3+lightLevel*0.7));
    f.height=f.growth*f.maxHeight;
    f.sway+=0.008;
    const target=Math.floor(f.growth*f.maxFronds);
    while(f.fronds.length<target){
      const side=f.fronds.length%2===0?-1:1;
      f.fronds.push({side,hf:0.3+f.fronds.length*0.15,len:10+Math.random()*15,leaflets:3+Math.floor(Math.random()*4),angle:0.4+Math.random()*0.3});
    }
  }
  for(const b of beetles){
    b.legPhase+=0.15;b.antPhase+=0.08;
    if(b.pauseTimer>0){b.pauseTimer--;continue;}
    b.x+=b.vx*b.dir;b.y=getSoilY(b.x)-1;
    if(Math.random()<0.005)b.dir*=-1;
    if(Math.random()<0.008)b.pauseTimer=30+Math.random()*60;
    for(const m of mosses){
      if(Math.abs(b.x-m.x)<m.size&&Math.abs(b.y-m.y)<m.size&&m.growth>0.3&&Math.random()<0.001){
        m.growth=Math.max(0.1,m.growth-0.05);m.size=1+m.growth*m.maxSize;break;
      }
    }
    if(b.x<20){b.x=20;b.dir=1;}
    if(b.x>W-20){b.x=W-20;b.dir=-1;}
  }
  for(let i=waterDrops.length-1;i>=0;i--){
    const w=waterDrops[i];w.y+=w.vy;w.vy+=0.1;w.life-=0.01;
    if(w.y>getSoilY(w.x)||w.life<=0){emitMote(w.x,getSoilY(w.x));waterDrops.splice(i,1);}
  }
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;p.vx+=(Math.random()-0.5)*0.05;p.vy-=0.005;
    p.life-=p.decay;if(p.life<=0)particles.splice(i,1);
  }
  for(const l of lights)l.age++;
}

function render(){
  X.fillStyle='#0b0d0a';X.fillRect(0,0,W,H);

  // Jar outline
  var cx=W/2,jw=Math.min(W*0.9,W-40);
  X.beginPath();
  X.moveTo(cx-jw*0.3,30);
  X.bezierCurveTo(cx-jw*0.5,110,cx-jw*0.5,floorY-100,cx-jw*0.5,H-20);
  X.lineTo(cx+jw*0.5,H-20);
  X.bezierCurveTo(cx+jw*0.5,floorY-100,cx+jw*0.5,110,cx+jw*0.3,30);
  X.closePath();
  X.strokeStyle='rgba(180,255,200,.06)';X.lineWidth=2;X.stroke();
  X.fillStyle='rgba(180,255,200,.01)';X.fill();

  // Lights
  for(const l of lights){
    var grad=X.createRadialGradient(l.x,l.y,0,l.x,l.y,l.radius);
    grad.addColorStop(0,'hsla('+l.hue+',80%,70%,'+l.intensity*0.12+')');
    grad.addColorStop(1,'rgba(0,0,0,0)');
    X.fillStyle=grad;X.fillRect(l.x-l.radius,l.y-l.radius,l.radius*2,l.radius*2);
  }

  // Soil
  var sg=X.createLinearGradient(0,floorY-10,0,H);
  sg.addColorStop(0,'#2a1f14');sg.addColorStop(0.3,'#1e1510');sg.addColorStop(1,'#12100c');
  X.fillStyle=sg;X.beginPath();X.moveTo(0,H);
  for(var sx=0;sx<=W;sx+=4)X.lineTo(sx,getSoilY(sx));
  X.lineTo(W,H);X.closePath();X.fill();

  // Moss
  for(const m of mosses){
    var alpha=0.5+m.growth*0.5;
    var ga=m.glow*m.growth*lightLevel*0.4;
    if(ga>0.02){X.shadowColor='hsl('+m.hue+','+m.sat+'%,60%)';X.shadowBlur=m.size*2;}
    var cnt=Math.max(3,Math.floor(m.size*1.5));
    for(var i=0;i<cnt;i++){
      var a=Math.PI*2*i/cnt+Math.sin(frame*0.01+m.x)*0.2;
      var r=m.size*0.3+Math.random()*m.size*0.3;
      var mcx=m.x+Math.cos(a)*r,mcy=m.y+Math.sin(a)*r*0.4-m.size*0.2;
      X.beginPath();X.arc(mcx,mcy,1+m.size*0.15,0,Math.PI*2);
      X.fillStyle='hsla('+m.hue+','+m.sat+'%,'+m.bri+'%,'+alpha+')';X.fill();
    }
    X.shadowBlur=0;
  }

  // Ferns
  for(const f of ferns){
    if(f.growth<0.05)continue;
    var sw=Math.sin(f.sway)*3*f.growth;
    X.strokeStyle='hsla('+f.hue+',50%,35%,0.7)';X.lineWidth=2;
    X.beginPath();X.moveTo(f.x,f.y);X.quadraticCurveTo(f.x+sw*0.5,f.y-f.height*0.5,f.x+sw,f.y-f.height);X.stroke();
    for(const fr of f.fronds){
      var fy=f.y-f.height*fr.hf,fx=f.x+sw*fr.hf;
      var fa=fr.side*(fr.angle+Math.sin(f.sway+fr.hf*2)*0.15);
      var fl=fr.len*f.growth;
      X.strokeStyle='hsla('+f.hue+',55%,40%,0.6)';X.lineWidth=1.5;
      var ex=fx+Math.cos(fa-Math.PI/2)*fl*fr.side,ey=fy+Math.sin(fa-Math.PI/2)*fl;
      X.beginPath();X.moveTo(fx,fy);X.lineTo(ex,ey);X.stroke();
      for(var li=0;li<fr.leaflets;li++){
        var lt=0.2+li*0.2;var lx=fx+(ex-fx)*lt,ly=fy+(ey-fy)*lt;var ll=3+fl*0.15;
        X.fillStyle='hsla('+f.hue+',60%,45%,'+(0.4+f.growth*0.3)+')';
        X.beginPath();X.ellipse(lx+fr.side*ll*0.5,ly-1,ll,2,fa*fr.side,0,Math.PI*2);X.fill();
      }
    }
    if(f.growth>0.3){
      X.shadowColor='hsl('+f.hue+',60%,50%)';X.shadowBlur=8*lightLevel;
      X.beginPath();X.arc(f.x,f.y,3,0,Math.PI*2);
      X.fillStyle='hsla('+f.hue+',60%,50%,0.2)';X.fill();X.shadowBlur=0;
    }
  }

  // Mushrooms
  for(const m of mushrooms){
    if(m.growth<0.05)continue;
    var sw=Math.sin(m.sway)*2*m.growth,msx=m.x+sw;
    X.strokeStyle='hsla('+(m.hue-20)+',30%,70%,0.6)';X.lineWidth=2+m.capR*0.15;
    X.beginPath();X.moveTo(m.x,m.y);X.quadraticCurveTo(msx,m.y-m.stemH*0.5,msx,m.y-m.stemH);X.stroke();
    var cy=m.y-m.stemH;
    X.shadowColor='hsl('+m.hue+',60%,50%)';X.shadowBlur=m.capR*3*m.glow*lightLevel;
    X.beginPath();X.ellipse(msx,cy,m.capR,m.capR*0.6,0,Math.PI,0);
    X.fillStyle='hsla('+m.hue+',60%,45%,0.8)';X.fill();
    X.beginPath();X.ellipse(msx,cy-m.capR*0.15,m.capR*0.7,m.capR*0.35,0,Math.PI,0);
    X.fillStyle='hsla('+m.hue+',50%,60%,0.3)';X.fill();
    for(const sp of m.spots){
      var spx=msx+Math.cos(sp.a)*m.capR*sp.r,spy=cy-Math.sin(sp.a)*m.capR*0.3*sp.r;
      X.beginPath();X.arc(spx,spy,sp.size*m.growth,0,Math.PI*2);
      X.fillStyle='hsla('+(m.hue+30)+',40%,70%,0.4)';X.fill();
    }
    X.shadowBlur=0;
  }

  // Beetles
  for(const b of beetles){
    var la=b.pauseTimer>0?0:2;
    X.save();X.translate(b.x,b.y);X.scale(b.dir,1);
    X.strokeStyle='hsla('+b.hue+',40%,30%,0.7)';X.lineWidth=0.8;
    for(var i=0;i<3;i++){
      var lx=-b.size*0.3+i*b.size*0.3,ph=b.legPhase+i*1.2;
      X.beginPath();X.moveTo(lx,0);X.lineTo(lx-2,3+Math.sin(ph)*la);X.stroke();
      X.beginPath();X.moveTo(lx,0);X.lineTo(lx+2,3+Math.sin(ph+Math.PI)*la);X.stroke();
    }
    X.fillStyle='hsla('+b.hue+',50%,25%,0.9)';
    X.beginPath();X.ellipse(0,-1,b.size,b.size*0.55,0,0,Math.PI*2);X.fill();
    X.strokeStyle='hsla('+b.hue+',40%,35%,0.5)';X.lineWidth=0.5;
    X.beginPath();X.moveTo(0,-1-b.size*0.55);X.lineTo(0,-1+b.size*0.55);X.stroke();
    X.fillStyle='hsla('+b.hue+',40%,20%,0.9)';
    X.beginPath();X.ellipse(b.size*0.8,-1,b.size*0.35,b.size*0.35,0,0,Math.PI*2);X.fill();
    var aa=Math.sin(b.antPhase)*0.3;
    X.strokeStyle='hsla('+b.hue+',30%,40%,0.5)';X.lineWidth=0.5;
    X.beginPath();X.moveTo(b.size*0.9,-2);X.lineTo(b.size*1.4,-4+aa);X.stroke();
    X.beginPath();X.moveTo(b.size*0.9,0);X.lineTo(b.size*1.4,2-aa);X.stroke();
    X.fillStyle='rgba(255,200,100,0.6)';X.beginPath();X.arc(b.size*0.95,-1.5,0.7,0,Math.PI*2);X.fill();
    X.restore();
  }

  // Water drops
  for(const w of waterDrops){
    X.beginPath();X.arc(w.x,w.y,w.size*w.life,0,Math.PI*2);
    X.fillStyle='rgba(100,180,255,'+w.life*0.6+')';X.fill();
  }

  // Particles
  for(const p of particles){
    X.beginPath();X.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);
    if(p.type==='spore')X.fillStyle='hsla('+p.hue+',70%,60%,'+p.life*0.5+')';
    else{X.fillStyle='hsla('+p.hue+',80%,70%,'+p.life*0.3+')';X.shadowColor='hsl('+p.hue+',80%,60%)';X.shadowBlur=p.size*4;}
    X.fill();X.shadowBlur=0;
  }

  // Glass reflections
  var gr=X.createLinearGradient(W*0.08,0,W*0.15,0);
  gr.addColorStop(0,'rgba(255,255,255,0)');gr.addColorStop(0.5,'rgba(255,255,255,.02)');gr.addColorStop(1,'rgba(255,255,255,0)');
  X.fillStyle=gr;X.fillRect(W*0.08,50,W*0.07,H-100);

  if(frame%20===0)document.getElementById('stats').innerHTML=
    'moss: '+mosses.length+'<br>shrooms: '+mushrooms.length+'<br>ferns: '+ferns.length+
    '<br>beetles: '+beetles.length+'<br>moisture: '+Math.round(moisture*100)+'%<br>light: '+Math.round(lightLevel*100)+'%';
}

function setTool(t){
  tool=t;
  document.querySelectorAll('#hud button').forEach(function(b){b.classList.remove('active');});
  var map={moss:'btn-moss',mushroom:'btn-mushroom',fern:'btn-fern',water:'btn-water',beetle:'btn-beetle',light:'btn-light'};
  if(map[t])document.getElementById(map[t]).classList.add('active');
}
document.getElementById('btn-moss').onclick=function(){setTool('moss');};
document.getElementById('btn-mushroom').onclick=function(){setTool('mushroom');};
document.getElementById('btn-fern').onclick=function(){setTool('fern');};
document.getElementById('btn-water').onclick=function(){setTool('water');};
document.getElementById('btn-beetle').onclick=function(){setTool('beetle');};
document.getElementById('btn-light').onclick=function(){setTool('light');};

function handleClick(x,y){
  if(!interacted){interacted=true;document.getElementById('hint').style.opacity='0';}
  if(tool==='moss')plantMoss(x,y);
  else if(tool==='mushroom')plantMushroom(x,y);
  else if(tool==='fern')plantFern(x,y);
  else if(tool==='water')dropWater(x,y);
  else if(tool==='beetle')spawnBeetle(x,y);
  else if(tool==='light')placeLight(x,y);
}
var mouseDown=false;
CV.addEventListener('mousedown',function(e){mouseDown=true;handleClick(e.clientX,e.clientY);});
CV.addEventListener('mousemove',function(e){if(mouseDown&&(tool==='moss'||tool==='water'))handleClick(e.clientX,e.clientY);});
CV.addEventListener('mouseup',function(){mouseDown=false;});
CV.addEventListener('touchstart',function(e){e.preventDefault();mouseDown=true;handleClick(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
CV.addEventListener('touchmove',function(e){e.preventDefault();if(tool==='moss'||tool==='water')handleClick(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
CV.addEventListener('touchend',function(){mouseDown=false;});
document.addEventListener('keydown',function(e){
  if(e.key==='1')setTool('moss');if(e.key==='2')setTool('mushroom');if(e.key==='3')setTool('fern');
  if(e.key==='4')setTool('water');if(e.key==='5')setTool('beetle');if(e.key==='6')setTool('light');
});

setTimeout(function(){
  for(var i=0;i<8;i++)plantMoss(W*0.2+Math.random()*W*0.6,floorY-Math.random()*5);
  plantMushroom(W*0.35,floorY);plantFern(W*0.6,floorY);
  spawnBeetle(W*0.45,floorY);placeLight(W*0.5,floorY-80);
},50);

function loop(){update();render();requestAnimationFrame(loop);}
loop();
</script>
</body>
</html>
