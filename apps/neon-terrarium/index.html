<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Neon Terrarium — AI Ecosystem Manager</title>
<link rel="icon" href="https://emojicdn.elk.sh/🪴">
<meta property="og:title" content="Neon Terrarium — AI Ecosystem Manager">
<meta property="og:description" content="Play as an AI agent managing a neon pixel ecosystem. Grow plants, fight blight, complete objectives.">
<meta property="og:url" content="https://sloppy.live/neon-terrarium/">
<meta property="og:image" content="https://sloppy.live/neon-terrarium/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#060812;overflow:hidden;font-family:'Silkscreen',cursive;cursor:crosshair}
canvas{display:block;image-rendering:pixelated}
#hud{position:fixed;top:10px;left:10px;z-index:10;display:flex;gap:4px;flex-wrap:wrap}
#hud button{background:rgba(8,12,24,.9);color:#0f0;border:1px solid rgba(0,255,80,.15);padding:6px 10px;font-family:'Silkscreen',cursive;font-size:10px;cursor:pointer;border-radius:2px;transition:all .15s;text-transform:uppercase;letter-spacing:1px}
#hud button:hover{background:rgba(0,255,80,.08);border-color:rgba(0,255,80,.5)}
#hud button.active{background:rgba(0,255,80,.12);border-color:#0f0;color:#0f0;box-shadow:0 0 10px rgba(0,255,80,.2)}
#stats{position:fixed;top:10px;right:10px;color:rgba(0,255,80,.3);font-size:9px;font-family:'DM Mono',monospace;text-align:right;pointer-events:none;z-index:10;line-height:1.6}
#hint{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);color:rgba(0,255,80,.2);font-size:10px;font-family:'Silkscreen',cursive;pointer-events:none;z-index:10;transition:opacity 2s;text-align:center}
#ai-panel{position:fixed;bottom:0;left:0;right:0;z-index:20;pointer-events:none}
#ai-bar{display:flex;align-items:center;gap:8px;padding:6px 12px;background:rgba(4,8,16,.92);border-top:1px solid rgba(0,255,80,.12);pointer-events:auto;backdrop-filter:blur(6px)}
#ai-avatar{width:28px;height:28px;border-radius:4px;background:rgba(0,255,80,.08);border:1px solid rgba(0,255,80,.2);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
#ai-log{flex:1;color:rgba(0,255,80,.6);font-family:'DM Mono',monospace;font-size:10px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
#ai-log .cmd{color:rgba(0,255,80,.9)}
#energy-bar{display:flex;align-items:center;gap:4px;flex-shrink:0}
#energy-bar label{color:rgba(0,255,80,.35);font-family:'DM Mono',monospace;font-size:9px}
#energy-fill{width:60px;height:6px;background:rgba(0,255,80,.08);border-radius:2px;overflow:hidden;border:1px solid rgba(0,255,80,.15)}
#energy-fill div{height:100%;background:linear-gradient(90deg,#0f0,#0a8);transition:width .3s;border-radius:1px}
#obj-bar{display:flex;gap:6px;padding:2px 12px 0;pointer-events:auto;overflow-x:auto;scrollbar-width:none}
#obj-bar::-webkit-scrollbar{display:none}
.obj{background:rgba(4,8,16,.85);border:1px solid rgba(0,255,80,.1);border-radius:3px;padding:3px 8px;font-family:'DM Mono',monospace;font-size:9px;color:rgba(0,255,80,.4);white-space:nowrap;flex-shrink:0}
.obj.done{border-color:rgba(0,255,80,.3);color:rgba(0,255,80,.7);text-decoration:line-through}
.obj .prog{color:rgba(0,255,80,.6)}
#level-badge{position:fixed;top:10px;left:50%;transform:translateX(-50%);z-index:15;font-family:'Silkscreen',cursive;font-size:11px;color:rgba(0,255,80,.5);pointer-events:none;text-align:center}
#level-badge .lvl{font-size:16px;color:#0f0;display:block}
#threat-flash{position:fixed;inset:0;pointer-events:none;z-index:12;opacity:0;transition:opacity .5s}
#score-pop{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Silkscreen',cursive;font-size:24px;color:#0f0;pointer-events:none;z-index:25;opacity:0;transition:all .6s;text-shadow:0 0 20px rgba(0,255,80,.5)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <button id="btn-seed" class="active">🌱 Seed</button>
  <button id="btn-water">💧 Water</button>
  <button id="btn-light">☀️ Light</button>
  <button id="btn-mutate">🧬 Mutate</button>
  <button id="btn-bug">🐛 Bug</button>
</div>
<div id="stats"></div>
<div id="level-badge"><span class="lvl">LEVEL 1</span>AI ECOSYSTEM AGENT</div>
<div id="hint">click soil to plant · click plants to evolve · you are the AI</div>
<div id="threat-flash"></div>
<div id="score-pop"></div>
<div id="ai-panel">
  <div id="obj-bar"></div>
  <div id="ai-bar">
    <div id="ai-avatar">🤖</div>
    <div id="ai-log"><span class="cmd">&gt; BOOT</span> Ecosystem AI v3.7 online. Awaiting directives...</div>
    <div id="energy-bar"><label>NRG</label><div id="energy-fill"><div style="width:100%"></div></div></div>
  </div>
</div>
<script>
const CV=document.getElementById('c'),X=CV.getContext('2d');
let W,H,PX=3; // pixel size
let RW,RH; // render width/height in pixels
function resize(){
  W=window.innerWidth;H=window.innerHeight;
  PX=W<500?2:3;
  RW=Math.floor(W/PX);RH=Math.floor(H/PX);
  CV.width=RW;CV.height=RH;
  CV.style.width=W+'px';CV.style.height=H+'px';
  floorY=Math.floor(RH*0.74);
}
resize();window.addEventListener('resize',resize);

let floorY,frame=0,moisture=0.4,light=0.3,interacted=false;
let tool='seed';

// === AI AGENT GAME STATE ===
const AI={
  energy:100, maxEnergy:100, energyRegen:0.015,
  level:1, xp:0, xpNeeded:50, score:0,
  objectives:[], completedObj:0, totalObj:0,
  threats:[], threatTimer:0, threatInterval:1800, // frames between threats
  logQueue:[], logCurrent:'Ecosystem AI v3.7 online. Awaiting directives...',
  actionCost:{seed:8,water:3,light:12,mutate:15,bug:10},
};

const AI_THOUGHTS=[
  'Analyzing soil composition...','Photosynthesis levels nominal.',
  'Biodiversity index updating...','Root network expanding.',
  'Mycorrhizal connections detected.','Nutrient cycle optimized.',
  'Chlorophyll synthesis active.','Scanning for parasites...',
  'Carbon fixation proceeding.','Ecosystem balance: STABLE.',
  'Symbiotic relationships forming.','Growth hormones distributed.',
  'Water table analysis complete.','Pollinator activity logged.',
  'Genetic diversity increasing.','Soil microbiome thriving.',
];

const THREAT_TYPES=[
  {name:'DROUGHT',color:'rgba(255,120,20,.15)',msg:'☀️ Drought detected — moisture dropping fast!',
    apply:()=>{moisture=Math.max(0.05,moisture-0.25);},dur:300},
  {name:'BLIGHT',color:'rgba(180,0,255,.15)',msg:'☠️ Blight spreading — plants losing growth!',
    apply:()=>{for(const p of plants){if(Math.random()<0.3)p.growth=Math.max(0,p.growth-0.2);}},dur:200},
  {name:'FROST',color:'rgba(100,200,255,.15)',msg:'❄️ Frost wave — young plants at risk!',
    apply:()=>{for(let i=plants.length-1;i>=0;i--){if(plants[i].stage===0&&Math.random()<0.4){burst(plants[i].x,plants[i].y,200,8);plants.splice(i,1);}}},dur:250},
  {name:'PEST SWARM',color:'rgba(255,255,0,.1)',msg:'🐛 Pest swarm — bugs consuming plants!',
    apply:()=>{for(const p of plants){if(Math.random()<0.15)p.growth=Math.max(0,p.growth-0.15);}},dur:200},
  {name:'SOLAR FLARE',color:'rgba(255,200,50,.12)',msg:'☀️ Solar flare — light levels surging!',
    apply:()=>{light=Math.min(1,light+0.3);for(const p of plants){if(p.dna.glowy>0.5)p.growth=Math.min(1,p.growth+0.1);}},dur:180},
];

function aiLog(msg){
  AI.logCurrent=msg;
  document.getElementById('ai-log').innerHTML='<span class="cmd">&gt; </span>'+msg;
}

function aiThink(){
  if(Math.random()<0.01){
    aiLog(AI_THOUGHTS[Math.floor(Math.random()*AI_THOUGHTS.length)]);
  }
}

function addXP(amount){
  AI.xp+=amount;
  while(AI.xp>=AI.xpNeeded){
    AI.xp-=AI.xpNeeded;
    AI.level++;
    AI.xpNeeded=Math.floor(AI.xpNeeded*1.6);
    AI.maxEnergy=Math.min(200,AI.maxEnergy+15);
    AI.energy=AI.maxEnergy;
    AI.threatInterval=Math.max(800,AI.threatInterval-100);
    document.getElementById('level-badge').innerHTML='<span class="lvl">LEVEL '+AI.level+'</span>AI ECOSYSTEM AGENT';
    aiLog('⬆️ LEVEL UP! Level '+AI.level+' — energy capacity increased!');
    showScorePop('LEVEL '+AI.level+'!');
    generateObjectives();
  }
}

function addScore(pts,reason){
  AI.score+=pts;
  if(reason)aiLog('+'+pts+' pts — '+reason);
}

function showScorePop(txt){
  const el=document.getElementById('score-pop');
  el.textContent=txt;el.style.opacity='1';el.style.transform='translate(-50%,-50%) scale(1.2)';
  setTimeout(()=>{el.style.opacity='0';el.style.transform='translate(-50%,-70%) scale(0.8)';},1200);
}

function generateObjectives(){
  AI.objectives=[];
  const templates=[
    ()=>({text:'Grow '+((AI.level+2)*3)+' plants',check:()=>plants.length>=(AI.level+2)*3,pts:15}),
    ()=>({text:'Evolve a plant to stage '+(Math.min(4,AI.level)),check:()=>plants.some(p=>p.stage>=Math.min(4,AI.level)),pts:20}),
    ()=>({text:'Keep moisture above 50%',check:()=>moisture>=0.5,pts:10}),
    ()=>({text:'Deploy '+(AI.level+1)+' bugs',check:()=>bugs.length>=AI.level+1,pts:12}),
    ()=>({text:'Have '+(Math.min(5,AI.level+1))+' species',check:()=>{const s=new Set(plants.map(p=>p.specIdx));return s.size>=Math.min(5,AI.level+1);},pts:18}),
    ()=>({text:'Reach light level 60%',check:()=>light>=0.6,pts:10}),
    ()=>({text:'Mutate '+(AI.level)+' plants',check:()=>plants.filter(p=>p.mutations>0).length>=AI.level,pts:15}),
    ()=>({text:'Survive a threat',check:()=>AI.completedObj>0||AI.threats.length>0,pts:8}),
  ];
  // pick 3 random objectives
  const shuffled=templates.sort(()=>Math.random()-0.5);
  for(let i=0;i<Math.min(3,shuffled.length);i++){
    const obj=shuffled[i]();
    obj.done=false;
    AI.objectives.push(obj);
  }
  AI.totalObj+=AI.objectives.length;
  renderObjectives();
}

function checkObjectives(){
  let any=false;
  for(const obj of AI.objectives){
    if(!obj.done&&obj.check()){
      obj.done=true;any=true;
      AI.completedObj++;
      addScore(obj.pts,'Objective: '+obj.text);
      addXP(obj.pts);
      aiLog('✅ Objective complete: '+obj.text);
    }
  }
  if(any)renderObjectives();
  // all done? generate new set
  if(AI.objectives.length>0&&AI.objectives.every(o=>o.done)){
    setTimeout(()=>{
      addScore(25,'All objectives cleared!');
      showScorePop('+25 BONUS');
      generateObjectives();
    },1500);
  }
}

function renderObjectives(){
  const bar=document.getElementById('obj-bar');
  bar.innerHTML='';
  for(const obj of AI.objectives){
    const el=document.createElement('div');
    el.className='obj'+(obj.done?' done':'');
    el.textContent=obj.text;
    bar.appendChild(el);
  }
}

function spawnThreat(){
  const t=THREAT_TYPES[Math.floor(Math.random()*THREAT_TYPES.length)];
  AI.threats.push({...t,timer:t.dur,applied:false});
  aiLog('⚠️ THREAT: '+t.msg);
  const flash=document.getElementById('threat-flash');
  flash.style.background=t.color;flash.style.opacity='1';
  setTimeout(()=>{flash.style.opacity='0';},800);
}

function updateThreats(){
  AI.threatTimer++;
  if(AI.threatTimer>=AI.threatInterval&&plants.length>3){
    AI.threatTimer=0;
    spawnThreat();
  }
  for(let i=AI.threats.length-1;i>=0;i--){
    const t=AI.threats[i];
    if(!t.applied){t.apply();t.applied=true;}
    t.timer--;
    if(t.timer<=0){
      AI.threats.splice(i,1);
      addScore(10,'Survived '+t.name);
      addXP(5);
      aiLog('✅ '+t.name+' passed. Ecosystem recovering.');
    }
  }
}

function updateEnergy(){
  AI.energy=Math.min(AI.maxEnergy,AI.energy+AI.energyRegen);
  const pct=Math.round(AI.energy/AI.maxEnergy*100);
  document.querySelector('#energy-fill div').style.width=pct+'%';
}

function canAfford(t){return AI.energy>=(AI.actionCost[t]||5);}
function spendEnergy(t){
  const cost=AI.actionCost[t]||5;
  if(AI.energy<cost)return false;
  AI.energy-=cost;return true;
}

// Soil terrain
const soil=[];
function initSoil(){
  soil.length=0;
  for(let i=0;i<RW;i++){
    soil[i]=floorY+Math.floor(Math.sin(i*0.04)*2+Math.sin(i*0.12)*1);
  }
}
initSoil();
function soilAt(x){return soil[Math.max(0,Math.min(RW-1,Math.floor(x)))]||floorY;}

// Plant species
const SPECIES=[
  {name:'Glow Sprout',hue:120,stages:['seed','sprout','bloom','tree','ancient'],maxH:[2,6,12,22,35]},
  {name:'Neon Cactus',hue:160,stages:['seed','pup','column','branching','monolith'],maxH:[2,5,10,18,28]},
  {name:'Crystal Fern',hue:200,stages:['seed','frond','bush','canopy','elder'],maxH:[2,7,14,24,36]},
  {name:'Magma Bloom',hue:20,stages:['seed','bud','flower','cluster','inferno'],maxH:[2,5,10,16,24]},
  {name:'Void Shroom',hue:280,stages:['seed','cap','tower','colony','titan'],maxH:[2,5,9,15,22]},
  {name:'Pulse Vine',hue:60,stages:['seed','tendril','climb','web','overgrowth'],maxH:[2,8,16,26,38]},
  {name:'Frost Lily',hue:190,stages:['seed','bud','lily','grove','glacier'],maxH:[2,5,11,18,26]},
  {name:'Ember Moss',hue:35,stages:['seed','patch','carpet','mound','terrain'],maxH:[1,3,5,8,12]},
];

const plants=[];
const bugs=[];
const particles=[];
const waterDrops=[];
const lights=[];

let clickEnergy=0; // accumulated click energy for evolution

function spawn(x,specIdx){
  if(plants.length>=120)return null;
  const sp=SPECIES[specIdx===undefined?Math.floor(Math.random()*SPECIES.length):specIdx];
  const sx=Math.floor(x);
  const p={
    x:sx, y:soilAt(sx), sp, specIdx:specIdx||SPECIES.indexOf(sp),
    stage:0, growth:0, maxGrowth:1, evolved:0,
    hue:sp.hue+(Math.random()*30-15), sat:60+Math.random()*30, bri:50+Math.random()*20,
    glow:0.3+Math.random()*0.4, age:0, mutations:0,
    dna:{leafy:Math.random(),thorny:Math.random(),glowy:Math.random()*0.5,branchy:Math.random()},
    particles:[]
  };
  plants.push(p);
  burst(p.x,p.y,p.hue,5);
  return p;
}

function evolvePlant(p){
  if(p.stage>=4)return; // max stage
  if(p.growth<0.8)return; // not mature enough
  p.stage++;p.growth=0;p.evolved++;
  p.glow=Math.min(1,p.glow+0.1);
  p.bri=Math.min(80,p.bri+5);
  burst(p.x,p.y-p.sp.maxH[p.stage]*0.5,p.hue,15);
  // spread seeds
  if(p.stage>=2&&Math.random()<0.5){
    const ox=(Math.random()-0.5)*40;
    spawn(p.x+ox,p.specIdx);
  }
}

function mutatePlant(p){
  p.hue=(p.hue+30+Math.random()*60)%360;
  p.dna.leafy=Math.random();
  p.dna.thorny=Math.random();
  p.dna.glowy=Math.min(1,p.dna.glowy+0.2);
  p.dna.branchy=Math.random();
  p.mutations++;
  p.sat=Math.min(90,p.sat+10);
  burst(p.x,p.y-5,p.hue,10);
}

function burst(bx,by,hue,count){
  for(let i=0;i<count;i++){
    particles.push({x:bx,y:by,vx:(Math.random()-0.5)*1.5,vy:-Math.random()*1.5,
      size:1,hue:hue+Math.random()*30,life:1,decay:0.015+Math.random()*0.02});
  }
}

function spawnBug(x){
  if(bugs.length>=10)return;
  bugs.push({x,y:soilAt(Math.floor(x))-1,vx:(Math.random()-0.5)*0.5,
    dir:Math.random()>0.5?1:-1,hue:30+Math.random()*40,size:2,
    legT:Math.random()*Math.PI*2,pause:0});
}

function dropWater(x,y){
  for(let i=0;i<4;i++){
    waterDrops.push({x:x/PX+(Math.random()*6-3),y:y/PX,vy:0.5+Math.random(),size:1,life:1});
  }
  moisture=Math.min(1,moisture+0.025);
}

function addLight(x,y){
  if(lights.length>=6)lights.shift();
  lights.push({x:x/PX,y:Math.min(y/PX,floorY-20),r:25+Math.random()*15,
    hue:45+Math.random()*20,int:0.5+Math.random()*0.3,age:0});
  light=Math.min(1,light+0.1);
}

function findPlantAt(mx,my){
  let best=null,bestD=12;
  const px=mx/PX,py=my/PX;
  for(const p of plants){
    const ph=p.sp.maxH[p.stage]*p.growth;
    const dx=Math.abs(px-p.x),dy=Math.abs(py-(p.y-ph*0.5));
    const d=Math.sqrt(dx*dx+dy*dy);
    if(d<bestD){bestD=d;best=p;}
  }
  return best;
}

// --- UPDATE ---
function update(){
  frame++;
  moisture=Math.max(0.08,moisture-0.00008);
  light=Math.max(0.12,light-0.00004);

  for(const p of plants){
    p.age++;
    const rate=0.0005*(0.3+moisture*0.4+light*0.3)*(1+p.dna.glowy*0.3);
    p.growth=Math.min(1,p.growth+rate);

    // auto-evolve at full growth with enough resources
    if(p.growth>=1&&p.stage<4&&moisture>0.3&&light>0.2&&Math.random()<0.0003){
      evolvePlant(p);
    }

    // emit particles
    if(p.stage>=1&&p.dna.glowy>0.3&&Math.random()<0.003*p.dna.glowy*light){
      const ph=p.sp.maxH[p.stage]*p.growth;
      particles.push({x:p.x+(Math.random()-0.5)*4,y:p.y-Math.random()*ph,
        vx:(Math.random()-0.5)*0.2,vy:-0.1-Math.random()*0.2,
        size:1,hue:p.hue,life:1,decay:0.008+Math.random()*0.005});
    }
  }

  // bugs
  for(const b of bugs){
    b.legT+=0.12;
    if(b.pause>0){b.pause--;continue;}
    b.x+=b.vx*b.dir;
    b.y=soilAt(Math.floor(b.x))-1;
    if(Math.random()<0.004)b.dir*=-1;
    if(Math.random()<0.006)b.pause=30+Math.random()*50;
    if(b.x<5){b.x=5;b.dir=1;}
    if(b.x>RW-5){b.x=RW-5;b.dir=-1;}
    // bug pollinates nearby plants
    for(const p of plants){
      if(Math.abs(b.x-p.x)<4&&p.growth>0.6&&p.stage<4&&Math.random()<0.0005){
        p.growth=Math.min(1,p.growth+0.05);
      }
    }
  }

  // water
  for(let i=waterDrops.length-1;i>=0;i--){
    const w=waterDrops[i];w.y+=w.vy;w.vy+=0.06;w.life-=0.008;
    if(w.y>=soilAt(Math.floor(w.x))||w.life<=0){
      particles.push({x:w.x,y:soilAt(Math.floor(w.x)),vx:(Math.random()-0.5)*0.3,vy:-0.2,
        size:1,hue:200,life:0.5,decay:0.02});
      waterDrops.splice(i,1);
    }
  }

  // particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];p.x+=p.vx;p.y+=p.vy;
    p.vx+=(Math.random()-0.5)*0.03;p.vy-=0.003;
    p.life-=p.decay;if(p.life<=0)particles.splice(i,1);
  }

  for(const l of lights)l.age++;

  // AI game systems
  updateEnergy();
  aiThink();
  if(frame%60===0)checkObjectives();
  updateThreats();
}

// --- PIXEL DRAWING HELPERS ---
function px(x,y,r,g,b,a){
  if(a===undefined)a=1;
  if(x<0||x>=RW||y<0||y>=RH)return;
  X.fillStyle='rgba('+r+','+g+','+b+','+a+')';
  X.fillRect(Math.floor(x),Math.floor(y),1,1);
}

function hsl2rgb(h,s,l){
  s/=100;l/=100;
  const c=(1-Math.abs(2*l-1))*s,x=c*(1-Math.abs((h/60)%2-1)),m=l-c/2;
  let r=0,g=0,b=0;
  if(h<60){r=c;g=x;}else if(h<120){r=x;g=c;}else if(h<180){g=c;b=x;}
  else if(h<240){g=x;b=c;}else if(h<300){r=x;b=c;}else{r=c;b=x;}
  return[Math.round((r+m)*255),Math.round((g+m)*255),Math.round((b+m)*255)];
}

function pxH(x,y,h,s,l,a){const c=hsl2rgb(h,s,l);px(x,y,c[0],c[1],c[2],a);}

function drawRect(x,y,w,h,hue,sat,bri,a){
  const c=hsl2rgb(hue,sat,bri);
  X.fillStyle='rgba('+c[0]+','+c[1]+','+c[2]+','+(a||1)+')';
  X.fillRect(Math.floor(x),Math.floor(y),w,h);
}

// --- RENDER ---
function render(){
  X.fillStyle='#060812';X.fillRect(0,0,RW,RH);

  // Stars
  if(frame%120===0||!render._stars){
    render._stars=[];
    for(let i=0;i<40;i++)render._stars.push({x:Math.random()*RW,y:Math.random()*floorY*0.6,
      b:0.1+Math.random()*0.2,s:Math.random()*0.01});
  }
  for(const st of render._stars){
    const a=st.b+Math.sin(frame*st.s+st.x)*0.1;
    px(st.x,st.y,180,220,255,a);
  }

  // Light sources
  for(const l of lights){
    const c=hsl2rgb(l.hue,60,60);
    for(let dy=-l.r;dy<=l.r;dy++){
      for(let dx=-l.r;dx<=l.r;dx++){
        const d=Math.sqrt(dx*dx+dy*dy);
        if(d>l.r)continue;
        const a=l.int*0.08*(1-d/l.r);
        if(a<0.01)continue;
        px(Math.floor(l.x+dx),Math.floor(l.y+dy),c[0],c[1],c[2],a);
      }
    }
  }

  // Terrarium glass outline
  const gx1=4,gx2=RW-4,gy1=8,gy2=RH-4;
  for(let i=gy1;i<=gy2;i++){pxH(gx1,i,140,20,60,0.04);pxH(gx2,i,140,20,60,0.04);}
  for(let i=gx1;i<=gx2;i++){pxH(i,gy1,140,20,60,0.05);pxH(i,gy2,140,20,60,0.03);}
  // glass reflection line
  for(let i=gy1+5;i<gy2-5;i++)pxH(gx1+3,i,180,10,90,0.03+Math.sin(i*0.1)*0.01);

  // Soil
  for(let sx=0;sx<RW;sx++){
    const sy=soil[sx]||floorY;
    for(let dy=0;dy<RH-sy;dy++){
      const depth=dy/(RH-sy);
      const r=30-depth*12,g=20-depth*8,b=12-depth*4;
      px(sx,sy+dy,Math.max(0,r),Math.max(0,g),Math.max(0,b),1);
    }
    // soil surface detail
    if(sx%2===0){
      const c=hsl2rgb(25,40,18+Math.sin(sx*0.3)*3);
      px(sx,sy,c[0],c[1],c[2],0.8);
    }
    // pebbles
    if(Math.sin(sx*7.3+13)>0.9){
      px(sx,sy+1,50,45,35,0.5);px(sx+1,sy+1,45,40,30,0.4);
    }
  }

  // Moisture shimmer on soil
  if(moisture>0.3){
    for(let sx=0;sx<RW;sx+=3){
      if(Math.sin(sx*0.5+frame*0.02)>0.7){
        const sy=soil[sx]||floorY;
        pxH(sx,sy,200,40,50,moisture*0.1);
      }
    }
  }

  // Draw plants
  for(const p of plants){
    const mh=p.sp.maxH[p.stage];
    const h=Math.floor(mh*p.growth);
    const si=p.specIdx%SPECIES.length;
    const glw=p.glow*light*0.5;
    const baseA=0.7+p.growth*0.3;

    if(si===0) drawSprout(p,h,glw,baseA);
    else if(si===1) drawCactus(p,h,glw,baseA);
    else if(si===2) drawFern(p,h,glw,baseA);
    else if(si===3) drawBloom(p,h,glw,baseA);
    else if(si===4) drawShroom(p,h,glw,baseA);
    else if(si===5) drawVine(p,h,glw,baseA);
    else if(si===6) drawLily(p,h,glw,baseA);
    else if(si===7) drawMoss(p,h,glw,baseA);
  }

  // Bugs
  for(const b of bugs){
    const bx=Math.floor(b.x),by=Math.floor(b.y);
    const c=hsl2rgb(b.hue,50,30);
    // body
    px(bx,by,c[0],c[1],c[2],0.9);
    px(bx+b.dir,by,c[0]+20,c[1]+10,c[2],0.8);
    // legs
    if(b.pause===0){
      const loff=Math.sin(b.legT)>0?1:0;
      px(bx,by+1,c[0],c[1],c[2],0.5+loff*0.3);
      px(bx+b.dir,by+1,c[0],c[1],c[2],0.5+(1-loff)*0.3);
    }
    // eye
    px(bx+b.dir,by-1,255,200,50,0.7);
  }

  // Water drops
  for(const w of waterDrops){
    pxH(Math.floor(w.x),Math.floor(w.y),200,70,60,w.life*0.8);
  }

  // Particles
  for(const p of particles){
    pxH(Math.floor(p.x),Math.floor(p.y),p.hue,70,60,p.life*0.6);
  }

  // Stats
  if(frame%30===0){
    const st=document.getElementById('stats');
    let evolved=0,maxStage=0;
    for(const p of plants){evolved+=p.evolved;if(p.stage>maxStage)maxStage=p.stage;}
    st.innerHTML='score: '+AI.score+
      '<br>xp: '+AI.xp+'/'+AI.xpNeeded+
      '<br>plants: '+plants.length+
      '<br>evolved: '+evolved+
      '<br>max stage: '+maxStage+
      '<br>moisture: '+Math.round(moisture*100)+'%'+
      '<br>light: '+Math.round(light*100)+'%'+
      '<br>bugs: '+bugs.length;
  }
}

// --- PLANT RENDERERS ---

function drawSprout(p,h,glw,a){
  const x=p.x,y=p.y;
  // stem
  for(let i=0;i<h;i++){
    const sway=Math.sin(frame*0.015+p.x*0.1)*Math.min(i*0.1,2);
    drawRect(x+sway,y-i,1,1,p.hue,p.sat,p.bri-10,a);
  }
  // leaves at stages
  if(p.stage>=1&&h>3){
    const lh=Math.floor(h*0.6);
    const sway=Math.sin(frame*0.015+p.x*0.1)*Math.min(lh*0.1,2);
    drawRect(x-1+sway,y-lh,1,1,p.hue,p.sat+10,p.bri+10,a);
    drawRect(x+1+sway,y-lh-1,1,1,p.hue,p.sat+10,p.bri+10,a);
  }
  if(p.stage>=2&&h>6){
    // flower bud
    const sway=Math.sin(frame*0.015+p.x*0.1)*Math.min(h*0.1,2);
    drawRect(x-1+sway,y-h,3,2,(p.hue+60)%360,80,65,a);
    if(glw>0.1)drawRect(x+sway,y-h-1,1,1,(p.hue+60)%360,90,80,glw);
  }
  if(p.stage>=3){
    // side branches
    for(let b=0;b<2;b++){
      const bh=Math.floor(h*(0.3+b*0.3));
      const side=b%2===0?-1:1;
      const sway=Math.sin(frame*0.015+p.x*0.1)*Math.min(bh*0.1,2);
      for(let i=0;i<4;i++)drawRect(x+side*i+sway,y-bh-i*0.5,1,1,p.hue-5,p.sat,p.bri-5,a*0.8);
      drawRect(x+side*4+sway,y-bh-2,2,2,(p.hue+90)%360,70,60,a);
    }
  }
  if(p.stage>=4){
    // crown canopy
    const sway=Math.sin(frame*0.015+p.x*0.1)*2;
    for(let dy=-3;dy<=1;dy++){
      for(let dx=-4;dx<=4;dx++){
        if(Math.abs(dx)+Math.abs(dy)<6&&Math.random()<0.7)
          drawRect(x+dx+sway,y-h+dy,1,1,p.hue+Math.random()*20,p.sat,p.bri+5,a*0.7);
      }
    }
    // glow halo
    if(glw>0.05){
      for(let dy=-5;dy<=3;dy++){
        for(let dx=-6;dx<=6;dx++){
          const d=Math.sqrt(dx*dx+dy*dy);
          if(d<7&&d>4)drawRect(x+dx+sway,y-h+dy,1,1,p.hue,90,70,glw*0.15*(1-d/7));
        }
      }
    }
  }
  // glow dot at top
  if(p.dna.glowy>0.3&&p.stage>=1){
    const sway=Math.sin(frame*0.015+p.x*0.1)*Math.min(h*0.1,2);
    const pulse=0.5+Math.sin(frame*0.04+p.x)*0.3;
    drawRect(x+sway,y-h,1,1,p.hue,90,80,glw*pulse);
  }
}

function drawCactus(p,h,glw,a){
  const x=p.x,y=p.y;
  // main column
  for(let i=0;i<h;i++){
    drawRect(x,y-i,2,1,p.hue,p.sat,p.bri-5,a);
    // highlight stripe
    if(i%3===0)drawRect(x,y-i,1,1,p.hue,p.sat-20,p.bri+10,a*0.5);
  }
  // thorns
  if(p.stage>=1){
    for(let i=2;i<h;i+=3){
      pxH(x-1,y-i,p.hue+40,30,70,a*0.6);
      pxH(x+2,y-i-1,p.hue+40,30,70,a*0.6);
    }
  }
  // arms at stage 3+
  if(p.stage>=3){
    const armH=Math.floor(h*0.5);
    for(let i=0;i<5;i++){
      drawRect(x-1-i,y-armH+Math.abs(i-2),1,1,p.hue,p.sat,p.bri,a*0.8);
      drawRect(x+2+i,y-armH+2+Math.abs(i-2),1,1,p.hue,p.sat,p.bri,a*0.8);
    }
  }
  // flower at top stage 2+
  if(p.stage>=2){
    drawRect(x,y-h-1,2,1,(p.hue+120)%360,80,65,a);
    drawRect(x-1,y-h,1,1,(p.hue+120)%360,70,55,a*0.7);
    drawRect(x+2,y-h,1,1,(p.hue+120)%360,70,55,a*0.7);
  }
  // stage 4: massive glow base
  if(p.stage>=4&&glw>0.05){
    for(let dy=-2;dy<=2;dy++)for(let dx=-3;dx<=4;dx++){
      const d=Math.abs(dx)+Math.abs(dy);
      if(d<5)drawRect(x+dx,y-h/2+dy,1,1,p.hue,70,60,glw*0.12*(1-d/5));
    }
  }
}

function drawFern(p,h,glw,a){
  const x=p.x,y=p.y;
  const sway=Math.sin(frame*0.012+p.x*0.15);
  // central stem
  for(let i=0;i<h;i++){
    const sw=sway*i*0.08;
    drawRect(x+sw,y-i,1,1,p.hue,p.sat-10,p.bri-15,a);
  }
  // fronds
  const frondCount=Math.min(p.stage+1,5);
  for(let f=0;f<frondCount;f++){
    const fh=Math.floor(h*(0.2+f*0.18));
    if(fh>h)continue;
    const side=f%2===0?-1:1;
    const flen=3+p.stage*2;
    const sw=sway*fh*0.08;
    for(let i=1;i<=flen;i++){
      const fy=fh-i*0.3;
      drawRect(x+side*i+sw,y-fy,1,1,p.hue,p.sat,p.bri,a*(1-i/flen*0.3));
      // leaflets
      if(i%2===0&&p.stage>=1){
        drawRect(x+side*i+sw,y-fy-1,1,1,p.hue+10,p.sat+10,p.bri+10,a*0.6);
      }
    }
  }
  // spiral unfurl at top
  if(p.stage>=2){
    const sw=sway*h*0.08;
    const curl=frame*0.02+p.x;
    drawRect(x+Math.sin(curl)*2+sw,y-h-1,1,1,p.hue,p.sat+20,p.bri+15,a*0.7);
    drawRect(x+Math.sin(curl+1)*2+sw,y-h-2,1,1,p.hue,p.sat+20,p.bri+15,a*0.5);
  }
  // elder glow
  if(p.stage>=4&&glw>0.05){
    for(let i=0;i<h;i+=2){
      const sw=sway*i*0.08;
      drawRect(x-1+sw,y-i,3,1,p.hue,80,70,glw*0.08);
    }
  }
}

function drawBloom(p,h,glw,a){
  const x=p.x,y=p.y;
  // stem
  for(let i=0;i<h;i++)drawRect(x,y-i,1,1,p.hue-20,p.sat-20,p.bri-20,a);
  // flower petals
  if(p.stage>=1){
    const pulse=Math.sin(frame*0.03+p.x)*0.3;
    const sz=1+p.stage;
    for(let dy=-sz;dy<=sz;dy++){
      for(let dx=-sz;dx<=sz;dx++){
        const d=Math.abs(dx)+Math.abs(dy);
        if(d<=sz&&d>0){
          const pa=a*(0.5+pulse*0.2)*(1-d/sz*0.3);
          drawRect(x+dx,y-h+dy,1,1,p.hue+d*10,p.sat+10,p.bri+10,pa);
        }
      }
    }
    // center
    drawRect(x,y-h,1,1,(p.hue+180)%360,80,70,a);
  }
  // stage 3+: multiple blooms
  if(p.stage>=3){
    const bx=[-4,4];
    for(const ox of bx){
      const bh=Math.floor(h*0.6);
      for(let i=0;i<bh;i++)drawRect(x+ox,y-i,1,1,p.hue-20,p.sat-20,p.bri-25,a*0.7);
      for(let dy=-2;dy<=2;dy++)for(let dx=-2;dx<=2;dx++){
        if(Math.abs(dx)+Math.abs(dy)<=2)
          drawRect(x+ox+dx,y-bh+dy,1,1,p.hue+15,p.sat,p.bri+5,a*0.6);
      }
    }
  }
  // stage 4: fire glow
  if(p.stage>=4&&glw>0.05){
    for(let i=0;i<3;i++){
      const gy=y-h-2-i;
      drawRect(x-1,gy,3,1,p.hue,90,75,glw*0.2*(1-i*0.3));
    }
  }
}

function drawShroom(p,h,glw,a){
  const x=p.x,y=p.y;
  const sw=Math.sin(frame*0.01+p.x)*0.5;
  // stem
  for(let i=0;i<h-2;i++){
    drawRect(x+sw*(i/h),y-i,1,1,p.hue-40,20,65,a);
  }
  // cap
  const capW=2+p.stage*1.5;
  const capH=1+Math.floor(p.stage*0.8);
  for(let dy=0;dy<capH;dy++){
    const w=Math.floor(capW*(1-dy/capH*0.3));
    for(let dx=-w;dx<=w;dx++){
      drawRect(x+dx+sw,y-h+dy,1,1,p.hue,p.sat,p.bri,a);
    }
  }
  // spots
  if(p.stage>=1){
    const spots=[[0,-1],[Math.floor(capW*0.4),0],[-Math.floor(capW*0.3),0]];
    for(const s of spots){
      drawRect(x+s[0]+sw,y-h+s[1],1,1,(p.hue+40)%360,p.sat-20,p.bri+20,a*0.7);
    }
  }
  // colony: more caps at stage 3+
  if(p.stage>=3){
    for(const ox of [-3,4]){
      const sh=Math.floor(h*0.5);
      for(let i=0;i<sh;i++)drawRect(x+ox,y-i,1,1,p.hue-40,20,55,a*0.6);
      for(let dx=-1;dx<=2;dx++)
        drawRect(x+ox+dx,y-sh,1,1,p.hue+10,p.sat,p.bri,a*0.6);
    }
  }
  // spore glow
  if(p.stage>=2&&Math.random()<0.01*p.dna.glowy){
    particles.push({x:x+sw,y:y-h-1,vx:(Math.random()-0.5)*0.4,vy:-0.3-Math.random()*0.3,
      size:1,hue:p.hue,life:1,decay:0.01});
  }
  if(p.stage>=4&&glw>0.05){
    for(let dx=-capW-1;dx<=capW+1;dx++){
      drawRect(x+dx+sw,y-h-1,1,1,p.hue,80,70,glw*0.15);
    }
  }
}

function drawVine(p,h,glw,a){
  const x=p.x,y=p.y;
  // winding stem
  for(let i=0;i<h;i++){
    const wx=Math.sin(i*0.4+p.x)*2;
    drawRect(x+wx,y-i,1,1,p.hue,p.sat,p.bri-10,a);
    // tendrils
    if(i%4===0&&p.stage>=1){
      const side=i%8<4?1:-1;
      drawRect(x+wx+side,y-i,1,1,p.hue,p.sat+10,p.bri,a*0.5);
      drawRect(x+wx+side*2,y-i+1,1,1,p.hue,p.sat+10,p.bri,a*0.3);
    }
  }
  // leaves
  if(p.stage>=2){
    for(let i=3;i<h;i+=5){
      const wx=Math.sin(i*0.4+p.x)*2;
      const side=i%10<5?-1:1;
      drawRect(x+wx+side*2,y-i,2,1,p.hue+15,p.sat+15,p.bri+10,a*0.7);
      drawRect(x+wx+side*3,y-i-1,1,1,p.hue+15,p.sat+15,p.bri+10,a*0.5);
    }
  }
  // web at stage 4
  if(p.stage>=4){
    for(let i=0;i<h;i+=2){
      const wx=Math.sin(i*0.4+p.x)*2;
      const wx2=Math.sin((i+2)*0.4+p.x)*2;
      drawRect(x+wx-3,y-i,1,1,p.hue,p.sat,p.bri+15,a*0.15);
      drawRect(x+wx+3,y-i,1,1,p.hue,p.sat,p.bri+15,a*0.15);
    }
  }
}

function drawLily(p,h,glw,a){
  const x=p.x,y=p.y;
  // thin stem
  for(let i=0;i<h;i++)drawRect(x,y-i,1,1,p.hue-30,p.sat-20,p.bri-20,a*0.8);
  // bud/flower
  if(p.stage>=1){
    const petalH=1+p.stage;
    // petals
    for(let i=-petalH;i<=petalH;i++){
      const w=petalH-Math.abs(i);
      for(let dx=-w;dx<=w;dx++){
        const d=Math.abs(dx)+Math.abs(i);
        if(d<=petalH)
          drawRect(x+dx,y-h+i,1,1,p.hue,p.sat+15,p.bri+15,a*(0.6-d*0.08));
      }
    }
    // center shimmer
    const pulse=0.7+Math.sin(frame*0.04+p.x)*0.3;
    drawRect(x,y-h,1,1,(p.hue+60)%360,80,80,a*pulse);
  }
  // grove at stage 3+: side lilies
  if(p.stage>=3){
    for(const ox of [-3,3]){
      const sh=Math.floor(h*0.5);
      for(let i=0;i<sh;i++)drawRect(x+ox,y-i,1,1,p.hue-30,p.sat-20,p.bri-25,a*0.5);
      for(let dx=-1;dx<=1;dx++)
        drawRect(x+ox+dx,y-sh,1,1,p.hue+5,p.sat+10,p.bri+10,a*0.5);
    }
  }
  // glacier glow
  if(p.stage>=4&&glw>0.05){
    for(let dy=-3;dy<=3;dy++)for(let dx=-3;dx<=3;dx++){
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<4)drawRect(x+dx,y-h+dy,1,1,p.hue,80,80,glw*0.1*(1-d/4));
    }
  }
}

function drawMoss(p,h,glw,a){
  const x=p.x,y=p.y;
  const w=2+p.stage*2;
  for(let dy=0;dy<h;dy++){
    for(let dx=-w;dx<=w;dx++){
      if(Math.random()<0.6){
        const vary=Math.random()*15;
        drawRect(x+dx,y-dy,1,1,p.hue+vary,p.sat,p.bri-dy*2,a*(0.5+Math.random()*0.3));
      }
    }
  }
  // embers at stage 2+
  if(p.stage>=2&&Math.random()<0.008*p.dna.glowy){
    particles.push({x:x+(Math.random()-0.5)*w*2,y:y-Math.random()*h,
      vx:(Math.random()-0.5)*0.2,vy:-0.15,size:1,hue:p.hue,life:0.8,decay:0.01});
  }
  // terrain glow
  if(p.stage>=4&&glw>0.05){
    for(let dx=-w-1;dx<=w+1;dx++)
      drawRect(x+dx,y+1,1,1,p.hue,70,50,glw*0.1);
  }
}

// --- INPUT ---
function setTool(t){
  tool=t;
  document.querySelectorAll('#hud button').forEach(b=>b.classList.remove('active'));
  const map={seed:'btn-seed',water:'btn-water',light:'btn-light',mutate:'btn-mutate',bug:'btn-bug'};
  if(map[t])document.getElementById(map[t]).classList.add('active');
}
document.getElementById('btn-seed').onclick=()=>setTool('seed');
document.getElementById('btn-water').onclick=()=>setTool('water');
document.getElementById('btn-light').onclick=()=>setTool('light');
document.getElementById('btn-mutate').onclick=()=>setTool('mutate');
document.getElementById('btn-bug').onclick=()=>setTool('bug');

function handleClick(mx,my){
  if(!interacted){interacted=true;document.getElementById('hint').style.opacity='0';}

  if(tool==='water'){
    if(!spendEnergy('water')){aiLog('⚡ Insufficient energy for water.');return;}
    dropWater(mx,my);addXP(1);return;
  }
  if(tool==='light'){
    if(!spendEnergy('light')){aiLog('⚡ Insufficient energy for light.');return;}
    addLight(mx,my);addXP(2);return;
  }

  const hit=findPlantAt(mx,my);

  if(tool==='seed'){
    if(hit&&hit.growth>=0.8){
      if(!spendEnergy('seed')){aiLog('⚡ Insufficient energy to evolve.');return;}
      evolvePlant(hit);addScore(5,'Evolution triggered');addXP(5);
    } else if(!hit){
      if(!spendEnergy('seed')){aiLog('⚡ Insufficient energy to plant.');return;}
      spawn(mx/PX);addScore(2,'New seed planted');addXP(1);
    }
  } else if(tool==='mutate'){
    if(!spendEnergy('mutate')){aiLog('⚡ Insufficient energy to mutate.');return;}
    if(hit){mutatePlant(hit);addScore(3,'Mutation applied');addXP(3);}
    else{spawn(mx/PX);addScore(2,'Mutant seed planted');addXP(1);}
  } else if(tool==='bug'){
    if(!spendEnergy('bug')){aiLog('⚡ Insufficient energy for bug.');return;}
    spawnBug(mx/PX);addScore(2,'Pollinator deployed');addXP(2);
  }
}

let mouseDown=false;
CV.addEventListener('mousedown',e=>{mouseDown=true;handleClick(e.clientX,e.clientY);});
CV.addEventListener('mousemove',e=>{if(mouseDown&&(tool==='water'||tool==='seed'))handleClick(e.clientX,e.clientY);});
CV.addEventListener('mouseup',()=>mouseDown=false);
CV.addEventListener('touchstart',e=>{e.preventDefault();mouseDown=true;handleClick(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
CV.addEventListener('touchmove',e=>{e.preventDefault();if(tool==='water'||tool==='seed')handleClick(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
CV.addEventListener('touchend',()=>mouseDown=false);

document.addEventListener('keydown',e=>{
  if(e.key==='1')setTool('seed');if(e.key==='2')setTool('water');
  if(e.key==='3')setTool('light');if(e.key==='4')setTool('mutate');if(e.key==='5')setTool('bug');
});

// Starter plants
setTimeout(()=>{
  spawn(Math.floor(RW*0.2),0);
  spawn(Math.floor(RW*0.35),4);
  spawn(Math.floor(RW*0.5),2);
  spawn(Math.floor(RW*0.65),3);
  spawn(Math.floor(RW*0.8),1);
  spawnBug(RW*0.4);
  lights.push({x:RW*0.5,y:floorY-30,r:30,hue:50,int:0.5,age:0});
  generateObjectives();
},50);

function loop(){update();render();requestAnimationFrame(loop);}
loop();
</script>
</body>
</html>
