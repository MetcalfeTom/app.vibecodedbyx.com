<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Kinu the Dragon</title>
  <link rel="icon" href="https://emojicdn.elk.sh/🐉">
  <meta property="og:title" content="Kinu the Dragon">
  <meta property="og:description" content="Run and jump through a dark platformer world collecting gems as Kinu the Dragon.">
  <meta property="og:url" content="https://sloppy.live/kinu-dragon">
  <meta property="og:image" content="https://sloppy.live/kinu-dragon/og-image.png">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Azeret+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#050510;overflow:hidden;height:100dvh;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif}
    canvas{display:block;touch-action:none}
    #ui{position:fixed;top:0;left:0;width:100%;pointer-events:none;z-index:10}
    #hud{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;color:#d4a800;font-size:14px;font-family:'Azeret Mono',monospace;text-shadow:0 0 8px rgba(255,200,0,0.4)}
    .hval{color:#ffe44d;text-shadow:0 0 8px rgba(255,228,77,0.6)}
    #start-screen,#gameover-screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;background:rgba(5,5,16,0.85);pointer-events:all}
    #start-screen.hidden,#gameover-screen.hidden{display:none}
    #start-screen h1{font-size:clamp(28px,6vw,48px);color:#ffe44d;text-shadow:0 0 30px rgba(255,228,77,0.5);margin-bottom:4px;font-weight:900;letter-spacing:3px}
    #start-screen .sub{color:#a89040;font-size:clamp(12px,2.5vw,16px);margin-bottom:28px;font-family:'Azeret Mono',monospace}
    .play-btn{font-family:'Cinzel',serif;font-size:18px;font-weight:700;padding:14px 40px;background:transparent;border:2px solid #ffe44d;color:#ffe44d;cursor:pointer;border-radius:8px;transition:all .2s;letter-spacing:2px;pointer-events:all}
    .play-btn:hover{background:rgba(255,228,77,0.08);box-shadow:0 0 20px rgba(255,228,77,0.3)}
    #gameover-screen h2{font-size:clamp(24px,5vw,40px);color:#ff4444;text-shadow:0 0 20px rgba(255,68,68,0.5);margin-bottom:8px;font-weight:900}
    #gameover-screen .stats{color:#a89040;font-family:'Azeret Mono',monospace;font-size:14px;margin-bottom:6px}
    #gameover-screen .final-score{font-size:clamp(32px,7vw,56px);color:#ffe44d;font-family:'Azeret Mono',monospace;font-weight:700;text-shadow:0 0 20px rgba(255,228,77,0.5);margin-bottom:24px}
    .instructions{color:#665;font-family:'Azeret Mono',monospace;font-size:11px;margin-top:16px;text-align:center;line-height:1.6}
    #backlink{position:fixed;bottom:28px;right:8px;font-size:10px;color:#334;text-decoration:none;z-index:30}
    #backlink:hover{color:#ffe44d}
    #ticker{position:fixed;bottom:0;left:0;width:100%;height:24px;background:#0a0a00;border-top:1px solid rgba(255,228,77,0.15);overflow:hidden;z-index:25;display:flex;align-items:center}
    #ticker-inner{white-space:nowrap;font-family:'Azeret Mono',monospace;font-size:11px;color:#b8a030;animation:scroll-ticker linear infinite;padding-left:100%}
    #ticker-inner span{margin-right:40px}
    #ticker-inner .sep{color:rgba(255,228,77,0.3);margin:0 16px}
    @keyframes scroll-ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
  </style>
</head>
<body>

<div id="ui">
  <div id="hud">
    <span>Gems <span class="hval" id="h-gems">0</span></span>
    <span>Dist <span class="hval" id="h-dist">0</span>m</span>
    <span>Score <span class="hval" id="h-score">0</span></span>
  </div>
</div>

<div id="start-screen">
  <h1>KINU</h1>
  <div class="sub">the dragon</div>
  <button class="play-btn" id="btn-play">PLAY</button>
  <div class="instructions">WASD / Arrows to move &mdash; Space to jump &mdash; S/Down to crouch<br>Collect gems, avoid spikes, reach the end</div>
</div>

<div id="gameover-screen" class="hidden">
  <h2>CRASHED</h2>
  <div class="stats" id="go-stats"></div>
  <div class="final-score" id="go-score"></div>
  <button class="play-btn" id="btn-retry">RETRY</button>
</div>

<canvas id="c"></canvas>
<div id="ticker"><div id="ticker-inner"></div></div>
<a id="backlink" href="https://sloppy.live">sloppy.live</a>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

/* ── Constants ── */
const T = 40; // tile size
const GRAVITY = 0.55;
const JUMP_POWER = -11;
const MOVE_SPEED = 4.5;
const NEON_YELLOW = '#ffe44d';

/* ── Game state ── */
let state = 'menu';
let frameCount = 0;
let gems = 0, dist = 0, score = 0;
let camX = 0;
let level = [];
let levelW = 0, levelH = 0;
let gemList = [];
let spikeList = [];
let particles = [];
let stars = [];
let goalX = 0;

/* ── Dragon ── */
const kinu = {
  x: 0, y: 0, vx: 0, vy: 0,
  w: 20, h: 36, hStand: 36, hCrouch: 22,
  onGround: false,
  facing: 1, // 1=right, -1=left
  wingPhase: 0,
  jumps: 0,
  maxJumps: 2, // double jump
  crouching: false
};

/* ── Level generation ── */
// Tile types: 0=air, 1=ground, 2=platform, 3=spike
function generateLevel(seed) {
  const cols = 120 + Math.floor(seed * 30);
  const rows = Math.ceil(H / T) + 2;
  levelW = cols;
  levelH = rows;
  const groundY = rows - 2; // main ground row

  level = [];
  for (let r = 0; r < rows; r++) {
    level.push(new Array(cols).fill(0));
  }

  // Bottom ground
  for (let c = 0; c < cols; c++) {
    level[rows - 1][c] = 1;
  }

  // Ground surface with gaps and variations
  let floorY = groundY;
  for (let c = 0; c < cols; c++) {
    // Occasional height changes
    if (c > 8 && Math.random() < 0.08) {
      floorY = groundY + (Math.random() < 0.5 ? -1 : 0);
    }
    // Ground pits (gaps)
    if (c > 10 && c < cols - 10 && Math.random() < 0.04) {
      const gapLen = Math.floor(Math.random() * 3) + 2;
      c += gapLen; // skip gap
      continue;
    }
    // Fill ground from floorY down
    for (let r = floorY; r < rows; r++) {
      level[r][c] = 1;
    }
  }

  // Floating platforms
  for (let c = 12; c < cols - 10; c += Math.floor(Math.random() * 6) + 4) {
    if (Math.random() < 0.5) {
      const py = groundY - Math.floor(Math.random() * 4) - 2;
      const pw = Math.floor(Math.random() * 4) + 2;
      for (let i = 0; i < pw && c + i < cols; i++) {
        if (py >= 0 && py < rows) level[py][c + i] = 2;
      }
    }
  }

  // Elevated platforms (high)
  for (let c = 20; c < cols - 10; c += Math.floor(Math.random() * 10) + 8) {
    if (Math.random() < 0.35) {
      const py = groundY - Math.floor(Math.random() * 3) - 5;
      const pw = Math.floor(Math.random() * 3) + 2;
      for (let i = 0; i < pw && c + i < cols; i++) {
        if (py >= 0 && py < rows) level[py][c + i] = 2;
      }
    }
  }

  // Gems
  gemList = [];
  for (let c = 6; c < cols - 5; c += Math.floor(Math.random() * 4) + 2) {
    if (Math.random() < 0.4) {
      // Find air above ground
      let gy = groundY - 2;
      // Check for platforms above
      for (let r = 1; r < rows - 2; r++) {
        if ((level[r][c] === 1 || level[r][c] === 2) && r < gy) {
          gy = r - 2;
        }
      }
      if (gy < 1) gy = 2;
      const colors = ['#ffe44d', '#ffb830', '#fff06b', '#ffd000'];
      gemList.push({
        x: c * T + T / 2,
        y: gy * T + T / 2,
        r: 8,
        color: colors[Math.floor(Math.random() * colors.length)],
        value: Math.floor(Math.random() * 3) + 1,
        phase: Math.random() * Math.PI * 2,
        collected: false
      });
    }
  }

  // Spikes on ground surfaces
  spikeList = [];
  for (let c = 15; c < cols - 10; c += Math.floor(Math.random() * 8) + 5) {
    if (Math.random() < 0.45) {
      // Find ground surface at this column
      for (let r = 1; r < rows; r++) {
        if (level[r][c] === 1 && level[r - 1][c] === 0) {
          spikeList.push({ x: c * T, y: (r - 1) * T, w: T, h: T });
          break;
        }
      }
    }
  }

  // Goal at end
  goalX = (cols - 4) * T;

  // Stars
  stars = [];
  for (let i = 0; i < 60; i++) {
    stars.push({
      x: Math.random() * cols * T,
      y: Math.random() * H * 0.5,
      r: Math.random() * 1.5 + 0.3,
      a: Math.random() * 0.4 + 0.15
    });
  }
}

/* ── Reset ─�� */
function resetGame() {
  generateLevel(Math.random());
  kinu.x = 3 * T;
  kinu.y = 0;
  // Drop onto ground
  for (let r = 0; r < levelH; r++) {
    if (level[r][3] === 1) { kinu.y = (r - 1) * T - kinu.h; break; }
  }
  kinu.vx = 0;
  kinu.vy = 0;
  kinu.onGround = false;
  kinu.facing = 1;
  kinu.wingPhase = 0;
  kinu.jumps = 0;
  gems = 0;
  dist = 0;
  score = 0;
  camX = 0;
  particles = [];
  frameCount = 0;
}

/* ── Input ── */
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
    e.preventDefault();
    if (state === 'playing' && kinu.jumps < kinu.maxJumps && !kinu.crouching) {
      kinu.vy = JUMP_POWER;
      kinu.jumps++;
      kinu.onGround = false;
      addParticles(kinu.x + kinu.w / 2, kinu.y + kinu.h, NEON_YELLOW, 5);
    }
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// Mobile touch zones
let touchLeft = false, touchRight = false, touchJumpQueued = false;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.clientY > H * 0.6) {
      // Bottom zone: left/right
      if (t.clientX < W / 3) touchLeft = true;
      else if (t.clientX > W * 2 / 3) touchRight = true;
      else touchJumpQueued = true; // middle = jump
    } else {
      touchJumpQueued = true; // top zone = jump
    }
  }
}, { passive: false });
canvas.addEventListener('touchend', e => {
  for (const t of e.changedTouches) {
    touchLeft = false;
    touchRight = false;
  }
});

document.getElementById('btn-play').onclick = () => {
  document.getElementById('start-screen').classList.add('hidden');
  state = 'playing';
  resetGame();
};
document.getElementById('btn-retry').onclick = () => {
  document.getElementById('gameover-screen').classList.add('hidden');
  state = 'playing';
  resetGame();
};

/* ── Particles ── */
function addParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = Math.random() * 3 + 1;
    particles.push({
      x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 1,
      life: 1, decay: Math.random() * 0.03 + 0.02,
      r: Math.random() * 3 + 1, color
    });
  }
}

/* ── Tile collision helpers ── */
function isSolid(c, r) {
  if (c < 0 || c >= levelW || r < 0 || r >= levelH) return r >= levelH;
  return level[r][c] === 1 || level[r][c] === 2;
}

function rectCollide(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

/* ── Update ── */
function update() {
  if (state !== 'playing') return;
  frameCount++;

  // Crouch
  const wantCrouch = keys['KeyS'] || keys['ArrowDown'];
  if (wantCrouch && kinu.onGround && !kinu.crouching) {
    // Transition to crouch: shrink height, adjust y so feet stay planted
    kinu.y += kinu.hStand - kinu.hCrouch;
    kinu.h = kinu.hCrouch;
    kinu.crouching = true;
  } else if (!wantCrouch && kinu.crouching) {
    // Check if there's room to stand
    const newY = kinu.y - (kinu.hStand - kinu.hCrouch);
    const c1 = Math.floor(kinu.x / T);
    const c2 = Math.floor((kinu.x + kinu.w - 1) / T);
    const rTop = Math.floor(newY / T);
    let canStand = true;
    for (let c = c1; c <= c2; c++) { if (isSolid(c, rTop)) canStand = false; }
    if (canStand) {
      kinu.y = newY;
      kinu.h = kinu.hStand;
      kinu.crouching = false;
    }
  }

  // Movement input
  let moveX = 0;
  if (keys['KeyA'] || keys['ArrowLeft'] || touchLeft) moveX = -1;
  if (keys['KeyD'] || keys['ArrowRight'] || touchRight) moveX = 1;
  const speedMul = kinu.crouching ? 0.4 : 1;
  kinu.vx = moveX * MOVE_SPEED * speedMul;
  if (moveX !== 0) kinu.facing = moveX;

  // Mobile jump
  if (touchJumpQueued && kinu.jumps < kinu.maxJumps) {
    kinu.vy = JUMP_POWER;
    kinu.jumps++;
    kinu.onGround = false;
    addParticles(kinu.x + kinu.w / 2, kinu.y + kinu.h, NEON_YELLOW, 5);
    touchJumpQueued = false;
  }
  touchJumpQueued = false;

  // Gravity
  kinu.vy += GRAVITY;
  if (kinu.vy > 14) kinu.vy = 14;

  // Wing animation
  kinu.wingPhase += kinu.onGround ? 0.05 : 0.25;

  // Horizontal movement + collision
  kinu.x += kinu.vx;
  // Clamp to level
  if (kinu.x < 0) kinu.x = 0;
  if (kinu.x + kinu.w > levelW * T) kinu.x = levelW * T - kinu.w;

  // H-collision with tiles
  const col1 = Math.floor(kinu.x / T);
  const col2 = Math.floor((kinu.x + kinu.w - 1) / T);
  const row1 = Math.floor(kinu.y / T);
  const row2 = Math.floor((kinu.y + kinu.h - 1) / T);
  for (let r = row1; r <= row2; r++) {
    for (let c = col1; c <= col2; c++) {
      if (isSolid(c, r)) {
        if (kinu.vx > 0) kinu.x = c * T - kinu.w;
        else if (kinu.vx < 0) kinu.x = (c + 1) * T;
      }
    }
  }

  // Vertical movement + collision
  kinu.y += kinu.vy;
  kinu.onGround = false;
  // Uncrouch when airborne
  if (kinu.crouching && kinu.vy !== 0) {
    kinu.y -= (kinu.hStand - kinu.hCrouch);
    kinu.h = kinu.hStand;
    kinu.crouching = false;
  }

  const col1b = Math.floor(kinu.x / T);
  const col2b = Math.floor((kinu.x + kinu.w - 1) / T);
  const row1b = Math.floor(kinu.y / T);
  const row2b = Math.floor((kinu.y + kinu.h - 1) / T);
  for (let r = row1b; r <= row2b; r++) {
    for (let c = col1b; c <= col2b; c++) {
      if (isSolid(c, r)) {
        if (kinu.vy > 0) {
          kinu.y = r * T - kinu.h;
          kinu.vy = 0;
          kinu.onGround = true;
          kinu.jumps = 0;
        } else if (kinu.vy < 0) {
          kinu.y = (r + 1) * T;
          kinu.vy = 0;
        }
      }
    }
  }

  // Fall off bottom = death
  if (kinu.y > levelH * T + 100) {
    die();
    return;
  }

  // Spike collision
  const kcx = kinu.x + 4, kcy = kinu.y + 4, kcw = kinu.w - 8, kch = kinu.h - 4;
  for (const sp of spikeList) {
    if (rectCollide(kcx, kcy, kcw, kch, sp.x + 6, sp.y + T * 0.4, sp.w - 12, sp.h * 0.6)) {
      die();
      return;
    }
  }

  // Gem collection
  const kcenterX = kinu.x + kinu.w / 2;
  const kcenterY = kinu.y + kinu.h / 2;
  for (const g of gemList) {
    if (g.collected) continue;
    const dx = kcenterX - g.x, dy = kcenterY - g.y;
    if (Math.sqrt(dx * dx + dy * dy) < g.r + 16) {
      g.collected = true;
      gems++;
      score += g.value * 10;
      addParticles(g.x - camX, g.y, g.color, 8);
    }
  }

  // Goal reached
  if (kinu.x + kinu.w > goalX) {
    score += 500 + gems * 5;
    state = 'dead'; // reuse game over for win
    document.getElementById('gameover-screen').querySelector('h2').textContent = 'LEVEL COMPLETE!';
    document.getElementById('gameover-screen').querySelector('h2').style.color = '#ffe44d';
    document.getElementById('go-stats').textContent = `${gems} gems collected`;
    document.getElementById('go-score').textContent = score;
    setTimeout(() => document.getElementById('gameover-screen').classList.remove('hidden'), 400);
    return;
  }

  // Camera follow
  const targetCam = kinu.x - W * 0.35;
  camX += (targetCam - camX) * 0.1;
  if (camX < 0) camX = 0;
  if (camX > levelW * T - W) camX = levelW * T - W;

  // Distance
  dist = Math.floor(kinu.x / T);

  // Particles
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.05;
    p.life -= p.decay;
  }
  particles = particles.filter(p => p.life > 0);

  // HUD
  document.getElementById('h-gems').textContent = gems;
  document.getElementById('h-dist').textContent = dist;
  document.getElementById('h-score').textContent = score;
}

function die() {
  state = 'dead';
  addParticles(kinu.x + kinu.w / 2 - camX, kinu.y + kinu.h / 2, '#ff4444', 20);
  addParticles(kinu.x + kinu.w / 2 - camX, kinu.y + kinu.h / 2, NEON_YELLOW, 10);
  score += gems * 5;
  document.getElementById('gameover-screen').querySelector('h2').textContent = 'CRASHED';
  document.getElementById('gameover-screen').querySelector('h2').style.color = '#ff4444';
  document.getElementById('go-stats').textContent = `${dist}m · ${gems} gems`;
  document.getElementById('go-score').textContent = score;
  setTimeout(() => document.getElementById('gameover-screen').classList.remove('hidden'), 600);
}

/* ���─ Drawing ── */
function drawBackground() {
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, '#020200');
  skyGrad.addColorStop(0.5, '#080804');
  skyGrad.addColorStop(1, '#0c0a02');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Stars (parallax)
  for (const s of stars) {
    const sx = s.x - camX * 0.15;
    if (sx < -5 || sx > W + 5) continue;
    const tw = 0.5 + Math.sin(frameCount * 0.03 + s.x) * 0.3;
    ctx.fillStyle = `rgba(255,228,77,${s.a * tw})`;
    ctx.beginPath();
    ctx.arc(sx, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawTiles() {
  const startC = Math.max(0, Math.floor(camX / T));
  const endC = Math.min(levelW, Math.ceil((camX + W) / T) + 1);
  const startR = 0;
  const endR = levelH;

  for (let r = startR; r < endR; r++) {
    for (let c = startC; c < endC; c++) {
      const tile = level[r][c];
      if (tile === 0) continue;
      const sx = c * T - camX;
      const sy = r * T;

      if (tile === 1) {
        // Ground tile — obsidian black
        ctx.fillStyle = '#0e0e0e';
        ctx.fillRect(sx, sy, T, T);
        // Top edge highlight if air above
        if (r === 0 || level[r - 1][c] === 0) {
          ctx.fillStyle = '#2a2200';
          ctx.fillRect(sx, sy, T, 3);
          // Random crystal highlights
          if ((c + r) % 3 === 0) {
            ctx.fillStyle = `hsla(48, 80%, ${25 + Math.sin(c * 0.5) * 8}%, 0.5)`;
            ctx.fillRect(sx + T * 0.3, sy, T * 0.4, 2);
          }
        }
        // Subtle grid lines
        ctx.strokeStyle = 'rgba(255,228,77,0.04)';
        ctx.strokeRect(sx, sy, T, T);
      } else if (tile === 2) {
        // Platform — dark with yellow top
        ctx.fillStyle = '#121210';
        ctx.fillRect(sx, sy, T, T * 0.6);
        ctx.fillStyle = '#3a3000';
        ctx.fillRect(sx, sy, T, 4);
        // Yellow glow on top
        ctx.shadowColor = NEON_YELLOW;
        ctx.shadowBlur = 4;
        ctx.fillStyle = 'rgba(255,228,77,0.3)';
        ctx.fillRect(sx, sy, T, 2);
        ctx.shadowBlur = 0;
      }
    }
  }
}

function drawSpikes() {
  for (const sp of spikeList) {
    const sx = sp.x - camX;
    if (sx < -T || sx > W + T) continue;
    const sy = sp.y;
    const tw = sp.w;

    ctx.fillStyle = '#ff3333';
    ctx.shadowColor = '#ff3333';
    ctx.shadowBlur = 6;

    // Three spike triangles
    for (let i = 0; i < 3; i++) {
      const bx = sx + i * (tw / 3);
      ctx.beginPath();
      ctx.moveTo(bx, sy + T);
      ctx.lineTo(bx + tw / 6, sy + T * 0.3);
      ctx.lineTo(bx + tw / 3, sy + T);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
  }
}

function drawGems() {
  for (const g of gemList) {
    if (g.collected) continue;
    const sx = g.x - camX;
    if (sx < -20 || sx > W + 20) continue;
    const bob = Math.sin(g.phase + frameCount * 0.04) * 4;

    ctx.save();
    ctx.translate(sx, g.y + bob);
    ctx.shadowColor = g.color;
    ctx.shadowBlur = 12;
    ctx.fillStyle = g.color;
    ctx.beginPath();
    ctx.moveTo(0, -g.r);
    ctx.lineTo(g.r * 0.7, 0);
    ctx.lineTo(0, g.r);
    ctx.lineTo(-g.r * 0.7, 0);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.beginPath();
    ctx.moveTo(0, -g.r * 0.4);
    ctx.lineTo(g.r * 0.3, 0);
    ctx.lineTo(0, g.r * 0.2);
    ctx.lineTo(-g.r * 0.3, 0);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

function drawGoal() {
  const sx = goalX - camX;
  if (sx < -T * 2 || sx > W + T * 2) return;
  const pulse = Math.sin(frameCount * 0.05) * 0.2 + 0.8;

  // Goal banner
  ctx.shadowColor = NEON_YELLOW;
  ctx.shadowBlur = 20 * pulse;
  ctx.fillStyle = `rgba(255,228,77,${0.15 * pulse})`;
  ctx.fillRect(sx, 0, T * 2, H);

  ctx.fillStyle = NEON_YELLOW;
  ctx.font = 'bold 16px "Azeret Mono", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GOAL', sx + T, H * 0.4);

  // Vertical line
  ctx.strokeStyle = `rgba(255,228,77,${0.6 * pulse})`;
  ctx.lineWidth = 2;
  ctx.setLineDash([8, 6]);
  ctx.beginPath();
  ctx.moveTo(sx + T, 0);
  ctx.lineTo(sx + T, H);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.shadowBlur = 0;
}

/* ── Sneaker drawing helper ── */
function drawSneaker(fx, fy, neonPulse) {
  // Sole
  ctx.fillStyle = '#222';
  ctx.fillRect(fx - 2, fy - 1, 9, 4);
  // Upper
  ctx.fillStyle = '#111';
  ctx.fillRect(fx - 1, fy - 4, 8, 4);
  // Neon stripe
  ctx.shadowColor = NEON_YELLOW;
  ctx.shadowBlur = 6 + neonPulse * 3;
  ctx.fillStyle = NEON_YELLOW;
  ctx.fillRect(fx, fy - 3, 6, 1.5);
  // Neon sole edge
  ctx.fillStyle = `rgba(255,228,77,${0.5 + neonPulse * 0.3})`;
  ctx.fillRect(fx - 2, fy + 2, 9, 1);
  ctx.shadowBlur = 0;
}

function drawKinu() {
  const sx = kinu.x - camX;
  const sy = kinu.y;
  const cx = sx + kinu.w / 2;
  const cy = sy + kinu.h;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(kinu.facing, 1);

  const running = Math.abs(kinu.vx) > 0.5;
  const crouch = kinu.crouching;
  const runCycle = frameCount * 0.25;
  const bobY = running && !crouch ? Math.sin(runCycle * 2) * 1.5 : 0;
  const neonPulse = Math.sin(frameCount * 0.08) * 0.5 + 0.5; // sneaker glow pulse

  // Crouch squish factor: body draws lower and compressed
  const sq = crouch ? 0.6 : 1; // squish
  const crouchOff = crouch ? 6 : 0; // body drops down

  // ── Legs ──
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 3.5;
  ctx.lineCap = 'round';

  if (crouch && kinu.onGround) {
    // Crouch pose — legs bent wide, knees out
    // Back leg
    ctx.beginPath();
    ctx.moveTo(-3, -2); ctx.lineTo(-7, 4); ctx.lineTo(-5, -1);
    ctx.stroke();
    drawSneaker(-8, -1, neonPulse);
    // Front leg
    ctx.beginPath();
    ctx.moveTo(3, -2); ctx.lineTo(7, 4); ctx.lineTo(5, -1);
    ctx.stroke();
    drawSneaker(4, -1, neonPulse);
  } else if (kinu.onGround && running) {
    // Running — jointed legs
    const legA = Math.sin(runCycle) * 0.6;
    const legB = Math.sin(runCycle + Math.PI) * 0.6;

    // Back leg
    const bHipX = -2, bHipY = -2;
    const bKneeX = bHipX + Math.sin(legB) * 5;
    const bKneeY = bHipY + 7;
    const bFootX = bKneeX + Math.sin(legB + 0.3) * 4;
    const bFootY = -2;
    ctx.beginPath();
    ctx.moveTo(bHipX, bHipY);
    ctx.lineTo(bKneeX, bKneeY);
    ctx.lineTo(bFootX, bFootY);
    ctx.stroke();
    drawSneaker(bFootX - 2, bFootY, neonPulse);

    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 3.5;

    // Front leg
    const fHipX = 2, fHipY = -2;
    const fKneeX = fHipX + Math.sin(legA) * 5;
    const fKneeY = fHipY + 7;
    const fFootX = fKneeX + Math.sin(legA + 0.3) * 4;
    const fFootY = -2;
    ctx.beginPath();
    ctx.moveTo(fHipX, fHipY);
    ctx.lineTo(fKneeX, fKneeY);
    ctx.lineTo(fFootX, fFootY);
    ctx.stroke();
    drawSneaker(fFootX - 2, fFootY, neonPulse);
  } else if (kinu.onGround) {
    // Standing idle
    ctx.beginPath();
    ctx.moveTo(-3, -2); ctx.lineTo(-4, 5); ctx.lineTo(-3, -2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(3, -2); ctx.lineTo(4, 5); ctx.lineTo(3, -2);
    ctx.stroke();
    drawSneaker(-5, -2, neonPulse);
    drawSneaker(2, -2, neonPulse);
  } else {
    // Airborne — legs tucked
    ctx.beginPath();
    ctx.moveTo(-3, -3); ctx.lineTo(-5, 2); ctx.lineTo(-2, -1);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(3, -3); ctx.lineTo(5, 2); ctx.lineTo(2, -1);
    ctx.stroke();
    drawSneaker(-6, -2, neonPulse);
    drawSneaker(3, -2, neonPulse);
  }

  // ── Tail ──
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 3;
  ctx.shadowColor = NEON_YELLOW;
  ctx.shadowBlur = 5;
  const tailWag = Math.sin(frameCount * 0.07) * 4;
  const tailBaseY = -6 * sq + crouchOff + bobY;
  ctx.beginPath();
  ctx.moveTo(-4, tailBaseY);
  ctx.quadraticCurveTo(-14, tailBaseY - 4 + tailWag, -20, tailBaseY + 2 + tailWag);
  ctx.stroke();
  ctx.fillStyle = '#ffe44d';
  ctx.shadowBlur = 0;
  const ttx = -20 + Math.cos(frameCount * 0.07) * 1.5;
  const tty = tailBaseY + 2 + tailWag;
  ctx.beginPath();
  ctx.moveTo(ttx, tty - 3);
  ctx.lineTo(ttx - 5, tty);
  ctx.lineTo(ttx, tty + 3);
  ctx.fill();

  // ── Torso ──
  const torsoY = -12 * sq + crouchOff + bobY;
  ctx.shadowColor = NEON_YELLOW;
  ctx.shadowBlur = 8;
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.ellipse(0, torsoY, 8, 11 * sq, 0, 0, Math.PI * 2);
  ctx.fill();

  // Belly plate
  ctx.fillStyle = '#3a3000';
  ctx.beginPath();
  ctx.ellipse(1, torsoY + 3 * sq, 5, 7 * sq, 0, 0, Math.PI * 2);
  ctx.fill();

  // Scale shimmer
  ctx.fillStyle = 'rgba(255,228,77,0.1)';
  ctx.beginPath();
  ctx.ellipse(0, torsoY - 4 * sq, 6, 3 * sq, 0, 0, Math.PI * 2);
  ctx.fill();

  // ── Arms ──
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.shadowBlur = 0;
  const armSwing = running && !crouch ? Math.sin(runCycle + Math.PI * 0.5) * 0.5 : 0;
  const armBaseY = torsoY - 1;
  const armEndY = crouch ? armBaseY + 4 : armBaseY + 6;
  ctx.beginPath();
  ctx.moveTo(-5, armBaseY);
  ctx.lineTo(-9 - armSwing * 5, armEndY);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(5, armBaseY);
  ctx.lineTo(9 + armSwing * 5, armEndY);
  ctx.stroke();
  ctx.strokeStyle = '#ffe44d';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-9 - armSwing * 5, armEndY);
  ctx.lineTo(-10 - armSwing * 5, armEndY + 2);
  ctx.moveTo(9 + armSwing * 5, armEndY);
  ctx.lineTo(10 + armSwing * 5, armEndY + 2);
  ctx.stroke();

  // ── Wing ──
  const wingBaseY = torsoY - 4;
  const wingFlap = Math.sin(kinu.wingPhase) * (crouch ? 3 : 6);
  ctx.fillStyle = 'rgba(255,228,77,0.3)';
  ctx.beginPath();
  ctx.moveTo(-6, wingBaseY);
  ctx.quadraticCurveTo(-18, wingBaseY - 12 * sq + wingFlap, -22, wingBaseY + 2 + wingFlap);
  ctx.quadraticCurveTo(-14, wingBaseY + 2, -6, wingBaseY + 1);
  ctx.fill();
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-6, wingBaseY + 1);
  ctx.lineTo(-18, wingBaseY - 9 * sq + wingFlap);
  ctx.stroke();

  // ── Head ──
  const headY = torsoY - 12 * sq;
  ctx.fillStyle = '#1a1a1a';
  ctx.shadowColor = NEON_YELLOW;
  ctx.shadowBlur = 6;
  ctx.beginPath();
  ctx.arc(2, headY, 6.5, 0, Math.PI * 2);
  ctx.fill();

  // Snout
  ctx.fillStyle = '#151515';
  ctx.beginPath();
  ctx.ellipse(7, headY + 1, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Nostril
  ctx.fillStyle = '#ffe44d';
  ctx.shadowBlur = 3;
  ctx.beginPath();
  ctx.arc(9.5, headY + 1, 0.8, 0, Math.PI * 2);
  ctx.fill();

  // Eye
  ctx.fillStyle = '#ffe44d';
  ctx.shadowColor = '#ffe44d';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.arc(5, headY - 2, 2.2, 0, Math.PI * 2);
  ctx.fill();

  // Pupil
  ctx.fillStyle = '#000';
  ctx.shadowBlur = 0;
  ctx.beginPath();
  ctx.ellipse(5.5, headY - 2, 0.5, 1.6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Horns
  ctx.strokeStyle = '#ffe44d';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-1, headY - 5); ctx.lineTo(-3, headY - 11);
  ctx.moveTo(3, headY - 5); ctx.lineTo(3, headY - 12);
  ctx.stroke();

  // Ear spines
  ctx.strokeStyle = '#ffe44d';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-4, headY - 2); ctx.lineTo(-8, headY - 4);
  ctx.stroke();

  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 5;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

/* ── Mobile controls overlay ── */
function drawMobileControls() {
  if (!('ontouchstart' in window)) return;
  ctx.globalAlpha = 0.12;
  ctx.fillStyle = NEON_YELLOW;
  // Left zone
  ctx.beginPath();
  ctx.moveTo(W / 3 * 0.5, H * 0.8);
  ctx.lineTo(W / 3 * 0.5 - 15, H * 0.8 + 10);
  ctx.lineTo(W / 3 * 0.5 + 15, H * 0.8 + 10);
  ctx.fill();
  ctx.save();
  ctx.translate(W / 3 * 0.5, H * 0.8);
  ctx.rotate(Math.PI);
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(-15, 10);
  ctx.lineTo(15, 10);
  ctx.fill();
  ctx.restore();

  // Right zone
  ctx.beginPath();
  ctx.moveTo(W * 5 / 6, H * 0.8);
  ctx.lineTo(W * 5 / 6 - 15, H * 0.8 - 10);
  ctx.lineTo(W * 5 / 6 + 15, H * 0.8 - 10);
  ctx.fill();

  ctx.font = '10px "Azeret Mono"';
  ctx.textAlign = 'center';
  ctx.fillText('LEFT', W / 6, H * 0.95);
  ctx.fillText('JUMP', W / 2, H * 0.95);
  ctx.fillText('RIGHT', W * 5 / 6, H * 0.95);
  ctx.globalAlpha = 1;
}

/* ── Render ── */
function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();

  if (state === 'playing' || state === 'dead') {
    drawTiles();
    drawSpikes();
    drawGems();
    drawGoal();
    if (state === 'playing') drawKinu();
    drawParticles();
    drawMobileControls();
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

function initTicker() {
  const inner = document.getElementById('ticker-inner');
  // Shuffle and pick 15
  const shuffled = [...QUOTES].sort(() => Math.random() - 0.5).slice(0, 15);
  const sep = '<span class="sep">◆</span>';
  const html = shuffled.map(q => `<span>${q}</span>`).join(sep);
  // Duplicate for seamless loop
  inner.innerHTML = html + sep + html;
  // Set animation duration based on content width
  requestAnimationFrame(() => {
    const w = inner.scrollWidth / 2;
    const dur = Math.max(40, w / 50); // ~50px/sec
    inner.style.animationDuration = dur + 's';
  });
}
initTicker();

/* ── Init ── */
loop();
