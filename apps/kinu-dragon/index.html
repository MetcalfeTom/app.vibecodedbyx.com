<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Kinu the Dragon</title>
  <link rel="icon" href="https://emojicdn.elk.sh/🐉">
  <meta property="og:title" content="Kinu the Dragon">
  <meta property="og:description" content="Fly through a neon forest collecting gems and dodging obsidian pillars.">
  <meta property="og:url" content="https://sloppy.live/kinu-dragon">
  <meta property="og:image" content="https://sloppy.live/kinu-dragon/og-image.png">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Azeret+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#050510;overflow:hidden;height:100dvh;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif}
    canvas{display:block;touch-action:none}
    #ui{position:fixed;top:0;left:0;width:100%;pointer-events:none;z-index:10}
    #hud{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;color:#b8ffc2;font-size:14px;font-family:'Azeret Mono',monospace;text-shadow:0 0 8px rgba(100,255,140,0.5)}
    .hval{color:#ffd866;text-shadow:0 0 8px rgba(255,216,102,0.6)}
    #start-screen,#gameover-screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;background:rgba(5,5,16,0.85);pointer-events:all}
    #start-screen.hidden,#gameover-screen.hidden{display:none}
    #start-screen h1{font-size:clamp(28px,6vw,48px);color:#4fffb0;text-shadow:0 0 30px rgba(79,255,176,0.5);margin-bottom:4px;font-weight:900;letter-spacing:3px}
    #start-screen .sub{color:#7ab89a;font-size:clamp(12px,2.5vw,16px);margin-bottom:28px;font-family:'Azeret Mono',monospace}
    .play-btn{font-family:'Cinzel',serif;font-size:18px;font-weight:700;padding:14px 40px;background:transparent;border:2px solid #4fffb0;color:#4fffb0;cursor:pointer;border-radius:8px;transition:all .2s;letter-spacing:2px;pointer-events:all}
    .play-btn:hover{background:rgba(79,255,176,0.1);box-shadow:0 0 20px rgba(79,255,176,0.3)}
    #gameover-screen h2{font-size:clamp(24px,5vw,40px);color:#ff6b6b;text-shadow:0 0 20px rgba(255,107,107,0.5);margin-bottom:8px;font-weight:900}
    #gameover-screen .stats{color:#7ab89a;font-family:'Azeret Mono',monospace;font-size:14px;margin-bottom:6px}
    #gameover-screen .final-score{font-size:clamp(32px,7vw,56px);color:#ffd866;font-family:'Azeret Mono',monospace;font-weight:700;text-shadow:0 0 20px rgba(255,216,102,0.5);margin-bottom:24px}
    .instructions{color:#556;font-family:'Azeret Mono',monospace;font-size:11px;margin-top:16px;text-align:center;line-height:1.6}
    #backlink{position:fixed;bottom:4px;right:8px;font-size:10px;color:#334;text-decoration:none;z-index:30}
    #backlink:hover{color:#4fffb0}
  </style>
</head>
<body>

<div id="ui">
  <div id="hud">
    <span>Gems <span class="hval" id="h-gems">0</span></span>
    <span>Dist <span class="hval" id="h-dist">0</span>m</span>
    <span>Score <span class="hval" id="h-score">0</span></span>
  </div>
</div>

<div id="start-screen">
  <h1>KINU</h1>
  <div class="sub">the dragon</div>
  <button class="play-btn" id="btn-play">FLY</button>
  <div class="instructions">Tap / Click / Space to flap<br>Collect gems, dodge pillars</div>
</div>

<div id="gameover-screen" class="hidden">
  <h2>CRASHED</h2>
  <div class="stats" id="go-stats"></div>
  <div class="final-score" id="go-score"></div>
  <button class="play-btn" id="btn-retry">RETRY</button>
</div>

<canvas id="c"></canvas>
<a id="backlink" href="https://sloppy.live">sloppy.live</a>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

/* ── Game state ── */
let state = 'menu'; // menu, playing, dead
let frameCount = 0;
let gems = 0, dist = 0, score = 0;
let speed = 3;
let scrollX = 0;

/* ── Dragon (Kinu) ── */
const kinu = {
  x: 0, y: 0, vy: 0, angle: 0,
  w: 36, h: 28,
  flapPower: -6.5,
  gravity: 0.28,
  wingPhase: 0,
  trail: []
};

/* ── World objects ── */
let pillars = [];
let gemList = [];
let particles = [];
let trees = [];
let stars = [];

/* ── Colors ── */
const NEON_GREEN = '#4fffb0';
const NEON_TEAL = '#00e5a0';
const GEM_GOLD = '#ffd866';
const GEM_PINK = '#ff66b2';
const GEM_CYAN = '#66ffee';
const OBSIDIAN = '#1a1a2e';
const OBSIDIAN_EDGE = '#2d1f4e';
const GEM_COLORS = [GEM_GOLD, GEM_PINK, GEM_CYAN, '#b4ff66', '#ff9d66'];

function initStars() {
  stars = [];
  for (let i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * W * 3,
      y: Math.random() * H * 0.6,
      r: Math.random() * 1.5 + 0.3,
      a: Math.random() * 0.5 + 0.2,
      speed: Math.random() * 0.3 + 0.1
    });
  }
}

function initTrees() {
  trees = [];
  for (let i = 0; i < 40; i++) {
    trees.push({
      x: i * 120 + Math.random() * 60,
      h: Math.random() * 100 + 60,
      w: Math.random() * 20 + 12,
      hue: Math.random() * 60 + 120, // greens to teals
      layer: Math.random() < 0.5 ? 0 : 1
    });
  }
}

function spawnPillar(x) {
  const gapH = Math.max(120, 180 - dist * 0.08);
  const minY = 60;
  const maxY = H - gapH - 80;
  const gapY = Math.random() * (maxY - minY) + minY;
  const pw = Math.random() * 20 + 40;

  pillars.push({
    x, w: pw,
    gapY, gapH,
    scored: false,
    glow: Math.random() * 0.3 + 0.1
  });
}

function spawnGem(x) {
  const y = Math.random() * (H - 160) + 80;
  const color = GEM_COLORS[Math.floor(Math.random() * GEM_COLORS.length)];
  const value = color === GEM_GOLD ? 3 : color === GEM_PINK ? 5 : 2;
  gemList.push({ x, y, r: 10, color, value, phase: Math.random() * Math.PI * 2, collected: false });
}

/* ── Reset game ── */
function resetGame() {
  kinu.x = W * 0.2;
  kinu.y = H * 0.4;
  kinu.vy = 0;
  kinu.angle = 0;
  kinu.wingPhase = 0;
  kinu.trail = [];

  pillars = [];
  gemList = [];
  particles = [];
  gems = 0;
  dist = 0;
  score = 0;
  speed = 3;
  scrollX = 0;
  frameCount = 0;

  initStars();
  initTrees();

  // Pre-spawn some pillars and gems ahead
  for (let i = 0; i < 6; i++) {
    spawnPillar(W + i * 280 + 200);
  }
  for (let i = 0; i < 10; i++) {
    spawnGem(W + i * 200 + 100 + Math.random() * 100);
  }
}

/* ── Input ── */
let flapping = false;

function flap() {
  if (state === 'playing') {
    kinu.vy = kinu.flapPower;
    flapping = true;
  }
}

window.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
    e.preventDefault();
    flap();
  }
});
canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  flap();
});

document.getElementById('btn-play').onclick = () => {
  document.getElementById('start-screen').classList.add('hidden');
  state = 'playing';
  resetGame();
};
document.getElementById('btn-retry').onclick = () => {
  document.getElementById('gameover-screen').classList.add('hidden');
  state = 'playing';
  resetGame();
};

/* ── Particles ── */
function addParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = Math.random() * 3 + 1;
    particles.push({
      x, y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp,
      life: 1,
      decay: Math.random() * 0.03 + 0.015,
      r: Math.random() * 3 + 1,
      color
    });
  }
}

/* ── Collision ── */
function rectCollide(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

/* ── Draw helpers ── */
function drawKinu() {
  const { x, y, angle, wingPhase } = kinu;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  // Trail glow
  ctx.shadowColor = NEON_GREEN;
  ctx.shadowBlur = 12;

  // Body
  ctx.fillStyle = '#2ecc71';
  ctx.beginPath();
  ctx.ellipse(0, 0, 18, 11, 0, 0, Math.PI * 2);
  ctx.fill();

  // Belly
  ctx.fillStyle = '#7dffb3';
  ctx.beginPath();
  ctx.ellipse(4, 3, 10, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Wing
  const wingY = Math.sin(wingPhase) * 10;
  ctx.fillStyle = 'rgba(79,255,176,0.5)';
  ctx.beginPath();
  ctx.moveTo(-4, -4);
  ctx.quadraticCurveTo(-12, -20 + wingY, -22, -8 + wingY);
  ctx.quadraticCurveTo(-14, 0, -4, 2);
  ctx.fill();

  // Lower wing
  ctx.fillStyle = 'rgba(79,255,176,0.3)';
  ctx.beginPath();
  ctx.moveTo(-4, 4);
  ctx.quadraticCurveTo(-12, 18 - wingY * 0.5, -18, 8 - wingY * 0.5);
  ctx.quadraticCurveTo(-12, 2, -4, 2);
  ctx.fill();

  // Head
  ctx.fillStyle = '#27ae60';
  ctx.beginPath();
  ctx.arc(16, -3, 8, 0, Math.PI * 2);
  ctx.fill();

  // Eye
  ctx.fillStyle = '#ffd866';
  ctx.shadowColor = '#ffd866';
  ctx.shadowBlur = 6;
  ctx.beginPath();
  ctx.arc(19, -5, 2.5, 0, Math.PI * 2);
  ctx.fill();

  // Pupil
  ctx.fillStyle = '#111';
  ctx.shadowBlur = 0;
  ctx.beginPath();
  ctx.arc(20, -5, 1, 0, Math.PI * 2);
  ctx.fill();

  // Horns
  ctx.strokeStyle = '#ffd866';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(14, -10);
  ctx.lineTo(12, -17);
  ctx.moveTo(18, -9);
  ctx.lineTo(18, -16);
  ctx.stroke();

  // Tail
  ctx.strokeStyle = '#2ecc71';
  ctx.lineWidth = 3;
  ctx.shadowColor = NEON_GREEN;
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.moveTo(-18, 0);
  ctx.quadraticCurveTo(-28, -4 + Math.sin(frameCount * 0.08) * 4, -34, 2 + Math.sin(frameCount * 0.06) * 5);
  ctx.stroke();

  // Tail tip
  ctx.fillStyle = '#4fffb0';
  ctx.beginPath();
  const tx = -34 + Math.cos(frameCount * 0.06) * 2;
  const ty = 2 + Math.sin(frameCount * 0.06) * 5;
  ctx.moveTo(tx, ty - 4);
  ctx.lineTo(tx - 6, ty);
  ctx.lineTo(tx, ty + 4);
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawPillar(p) {
  const sx = p.x - scrollX;

  // Top pillar
  const grad1 = ctx.createLinearGradient(sx, 0, sx + p.w, 0);
  grad1.addColorStop(0, OBSIDIAN);
  grad1.addColorStop(0.5, '#252545');
  grad1.addColorStop(1, OBSIDIAN);
  ctx.fillStyle = grad1;
  ctx.fillRect(sx, 0, p.w, p.gapY);

  // Bottom pillar
  ctx.fillStyle = grad1;
  ctx.fillRect(sx, p.gapY + p.gapH, p.w, H - p.gapY - p.gapH);

  // Obsidian edges - neon glow
  ctx.shadowColor = OBSIDIAN_EDGE;
  ctx.shadowBlur = 10;

  // Top edge crystals
  ctx.fillStyle = '#4a3680';
  const edgeW = p.w + 8;
  ctx.fillRect(sx - 4, p.gapY - 6, edgeW, 6);
  for (let i = 0; i < edgeW; i += 8) {
    ctx.fillStyle = `hsla(270, 60%, ${30 + Math.sin(i + frameCount * 0.02) * 10}%, ${0.4 + p.glow})`;
    ctx.fillRect(sx - 4 + i, p.gapY - 8 - Math.random() * 3, 4, 8 + Math.random() * 3);
  }

  // Bottom edge crystals
  ctx.fillStyle = '#4a3680';
  ctx.fillRect(sx - 4, p.gapY + p.gapH, edgeW, 6);
  for (let i = 0; i < edgeW; i += 8) {
    ctx.fillStyle = `hsla(270, 60%, ${30 + Math.sin(i + frameCount * 0.02) * 10}%, ${0.4 + p.glow})`;
    ctx.fillRect(sx - 4 + i, p.gapY + p.gapH, 4, 8 + Math.random() * 3);
  }

  ctx.shadowBlur = 0;
}

function drawGem(g) {
  if (g.collected) return;
  const sx = g.x - scrollX;
  const bob = Math.sin(g.phase + frameCount * 0.04) * 5;
  const gy = g.y + bob;

  ctx.save();
  ctx.translate(sx, gy);

  // Glow
  ctx.shadowColor = g.color;
  ctx.shadowBlur = 16;

  // Diamond shape
  ctx.fillStyle = g.color;
  ctx.beginPath();
  ctx.moveTo(0, -g.r);
  ctx.lineTo(g.r * 0.7, 0);
  ctx.lineTo(0, g.r);
  ctx.lineTo(-g.r * 0.7, 0);
  ctx.closePath();
  ctx.fill();

  // Inner sparkle
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.beginPath();
  ctx.moveTo(0, -g.r * 0.5);
  ctx.lineTo(g.r * 0.3, 0);
  ctx.lineTo(0, g.r * 0.3);
  ctx.lineTo(-g.r * 0.3, 0);
  ctx.closePath();
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawBackground() {
  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, '#050510');
  skyGrad.addColorStop(0.4, '#0a0a20');
  skyGrad.addColorStop(0.7, '#0d1a15');
  skyGrad.addColorStop(1, '#081510');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (const s of stars) {
    const sx = ((s.x - scrollX * s.speed) % (W * 3) + W * 3) % (W * 3) - W * 0.5;
    if (sx < -5 || sx > W + 5) continue;
    const twinkle = 0.5 + Math.sin(frameCount * 0.03 + s.x) * 0.3;
    ctx.fillStyle = `rgba(180,255,200,${s.a * twinkle})`;
    ctx.beginPath();
    ctx.arc(sx, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }

  // Trees (background layer)
  for (const t of trees) {
    if (t.layer !== 0) continue;
    const sx = ((t.x - scrollX * 0.3) % (40 * 120) + 40 * 120) % (40 * 120) - 60;
    if (sx < -60 || sx > W + 60) continue;
    drawTree(sx, t, 0.4);
  }

  // Trees (foreground layer)
  for (const t of trees) {
    if (t.layer !== 1) continue;
    const sx = ((t.x - scrollX * 0.6) % (40 * 120) + 40 * 120) % (40 * 120) - 60;
    if (sx < -60 || sx > W + 60) continue;
    drawTree(sx, t, 0.7);
  }

  // Ground glow
  ctx.fillStyle = 'rgba(0,40,20,0.4)';
  ctx.fillRect(0, H - 30, W, 30);
  const groundGrad = ctx.createLinearGradient(0, H - 30, 0, H);
  groundGrad.addColorStop(0, 'rgba(79,255,176,0.05)');
  groundGrad.addColorStop(1, 'rgba(79,255,176,0.15)');
  ctx.fillStyle = groundGrad;
  ctx.fillRect(0, H - 30, W, 30);
}

function drawTree(sx, t, alpha) {
  const baseY = H - 20;

  // Trunk
  ctx.fillStyle = `rgba(20,40,30,${alpha})`;
  ctx.fillRect(sx - t.w * 0.15, baseY - t.h, t.w * 0.3, t.h);

  // Canopy layers
  for (let i = 0; i < 3; i++) {
    const cy = baseY - t.h - i * 18 + 10;
    const cw = t.w * (1.4 - i * 0.3);
    const pulse = Math.sin(frameCount * 0.01 + t.x + i) * 0.05;
    ctx.fillStyle = `hsla(${t.hue}, 70%, ${15 + i * 5}%, ${alpha + pulse})`;
    ctx.beginPath();
    ctx.moveTo(sx - cw, cy + 20);
    ctx.quadraticCurveTo(sx, cy - 15, sx + cw, cy + 20);
    ctx.fill();
  }

  // Neon edge glow on top canopy
  ctx.strokeStyle = `hsla(${t.hue}, 80%, 50%, ${alpha * 0.3})`;
  ctx.lineWidth = 1;
  ctx.beginPath();
  const topY = baseY - t.h - 36;
  ctx.moveTo(sx - t.w * 0.8, topY + 20);
  ctx.quadraticCurveTo(sx, topY - 15, sx + t.w * 0.8, topY + 20);
  ctx.stroke();
}

function drawTrail() {
  const trail = kinu.trail;
  if (trail.length < 2) return;
  for (let i = 1; i < trail.length; i++) {
    const t = trail[i];
    const alpha = i / trail.length * 0.4;
    ctx.strokeStyle = `rgba(79,255,176,${alpha})`;
    ctx.lineWidth = (i / trail.length) * 3;
    ctx.beginPath();
    ctx.moveTo(trail[i - 1].x, trail[i - 1].y);
    ctx.lineTo(t.x, t.y);
    ctx.stroke();
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

/* ── Update ── */
function update() {
  if (state !== 'playing') return;
  frameCount++;

  // Speed ramp
  speed = 3 + dist * 0.002;
  if (speed > 8) speed = 8;
  scrollX += speed;
  dist = Math.floor(scrollX / 30);

  // Kinu physics
  kinu.vy += kinu.gravity;
  kinu.y += kinu.vy;
  kinu.angle = Math.max(-0.4, Math.min(0.5, kinu.vy * 0.04));
  kinu.wingPhase += flapping ? 0.5 : 0.15;
  flapping = false;

  // Trail
  kinu.trail.push({ x: kinu.x - 18, y: kinu.y });
  if (kinu.trail.length > 20) kinu.trail.shift();

  // Ceiling / floor
  if (kinu.y < 10) { kinu.y = 10; kinu.vy = 1; }
  if (kinu.y > H - 20) {
    die();
    return;
  }

  // Spawn pillars
  const lastPillarX = pillars.length > 0 ? pillars[pillars.length - 1].x : 0;
  const spacing = Math.max(200, 280 - dist * 0.05);
  if (lastPillarX < scrollX + W + 100) {
    spawnPillar(lastPillarX + spacing + Math.random() * 60);
  }

  // Spawn gems
  const lastGemX = gemList.length > 0 ? gemList[gemList.length - 1].x : 0;
  if (lastGemX < scrollX + W + 200) {
    spawnGem(lastGemX + 100 + Math.random() * 140);
  }

  // Pillar collision + scoring
  const kx = kinu.x - 12, ky = kinu.y - 8, kw = 24, kh = 16;
  for (const p of pillars) {
    const sx = p.x - scrollX;
    // Score for passing
    if (!p.scored && sx + p.w < kinu.x) {
      p.scored = true;
      score += 10;
    }
    // Collision with top
    if (rectCollide(kx, ky, kw, kh, sx, 0, p.w, p.gapY)) { die(); return; }
    // Collision with bottom
    if (rectCollide(kx, ky, kw, kh, sx, p.gapY + p.gapH, p.w, H - p.gapY - p.gapH)) { die(); return; }
  }

  // Gem collection
  for (const g of gemList) {
    if (g.collected) continue;
    const sx = g.x - scrollX;
    const dx = kinu.x - sx, dy = kinu.y - g.y;
    if (Math.sqrt(dx * dx + dy * dy) < g.r + 14) {
      g.collected = true;
      gems++;
      score += g.value * 10;
      addParticles(sx, g.y, g.color, 8);
    }
  }

  // Cleanup offscreen
  pillars = pillars.filter(p => p.x - scrollX > -100);
  gemList = gemList.filter(g => g.x - scrollX > -50);

  // Update particles
  for (const p of particles) {
    p.x += p.vx;
    p.y += p.vy;
    p.life -= p.decay;
  }
  particles = particles.filter(p => p.life > 0);

  // HUD
  document.getElementById('h-gems').textContent = gems;
  document.getElementById('h-dist').textContent = dist;
  document.getElementById('h-score').textContent = score;
}

function die() {
  state = 'dead';
  addParticles(kinu.x, kinu.y, '#ff4444', 20);
  addParticles(kinu.x, kinu.y, NEON_GREEN, 12);

  // Final score with gem bonus
  score += gems * 5;

  document.getElementById('go-stats').textContent = `${dist}m flown · ${gems} gems`;
  document.getElementById('go-score').textContent = score;
  setTimeout(() => {
    document.getElementById('gameover-screen').classList.remove('hidden');
  }, 600);
}

/* ── Render loop ── */
function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();

  if (state === 'playing' || state === 'dead') {
    // Pillars
    for (const p of pillars) drawPillar(p);

    // Gems
    for (const g of gemList) drawGem(g);

    // Trail + Dragon
    drawTrail();
    if (state === 'playing') drawKinu();

    // Particles (always draw for death effect)
    drawParticles();
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

/* ── Init ── */
initStars();
initTrees();
loop();
</script>
</body>
</html>
