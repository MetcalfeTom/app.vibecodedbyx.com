<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Kinu the Dragon</title>
  <link rel="icon" href="https://emojicdn.elk.sh/🐉">
  <meta property="og:title" content="Kinu the Dragon">
  <meta property="og:description" content="Run and jump through a dark platformer world collecting gems as Kinu the Dragon.">
  <meta property="og:url" content="https://sloppy.live/kinu-dragon">

  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Azeret+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#050510;overflow:hidden;height:100dvh;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif}
    canvas{display:block;touch-action:none}
    #ui{position:fixed;top:0;left:0;width:100%;pointer-events:none;z-index:10}
    #hud{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;color:#d4a800;font-size:14px;font-family:'Azeret Mono',monospace;text-shadow:0 0 8px rgba(255,215,0,0.4)}
    .hval{color:#ffd700;text-shadow:0 0 8px rgba(255,215,0,0.6)}
    #start-screen,#gameover-screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20;background:rgba(5,5,16,0.85);pointer-events:all}

    #start-screen .sub{color:#a89040;font-size:clamp(12px,2.5vw,16px);margin-bottom:28px;font-family:'Azeret Mono',monospace}
    .play-btn{font-family:'Cinzel',serif;font-size:18px;font-weight:700;padding:14px 40px;background:transparent;border:2px solid #ffd700;color:#ffd700;cursor:pointer;border-radius:8px;transition:all .2s;letter-spacing:2px;pointer-events:all}
    .play-btn:hover{background:rgba(255,215,0,0.08);box-shadow:0 0 20px rgba(255,215,0,0.3)}
    #gameover-screen h2{font-size:clamp(24px,5vw,40px);color:#ff4444;text-shadow:0 0 20px rgba(255,68,68,0.5);margin-bottom:8px;font-weight:900}
    #gameover-screen .stats{color:#a89040;font-family:'Azeret Mono',monospace;font-size:14px;margin-bottom:6px}
    #gameover-screen .final-score{font-size:clamp(32px,7vw,56px);color:#ffd700;font-family:'Azeret Mono',monospace;font-weight:700;text-shadow:0 0 20px rgba(255,215,0,0.5);margin-bottom:24px}
    .instructions{color:#665;font-family:'Azeret Mono',monospace;font-size:11px;margin-top:16px;text-align:center;line-height:1.6}
    #backlink{position:fixed;bottom:28px;right:8px;font-size:10px;color:#334;text-decoration:none;z-index:30}
    #backlink:hover{color:#ffd700}
    #ticker{position:fixed;bottom:0;left:0;width:100%;height:24px;background:#0a0a00;border-top:1px solid rgba(255,215,0,0.15);overflow:hidden;z-index:25;display:flex;align-items:center}
    #ticker-inner{white-space:nowrap;font-family:'Azeret Mono',monospace;font-size:11px;color:#b8a030;animation:scroll-ticker linear infinite;padding-left:100%}
    #ticker-inner span{margin-right:40px}
    #ticker-inner .sep{color:rgba(255,215,0,0.3);margin:0 16px}
    @keyframes scroll-ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
    /* Achievements */
    #ach-btn{position:fixed;top:10px;right:12px;z-index:15;font-family:'Azeret Mono',monospace;font-size:11px;padding:5px 10px;background:rgba(10,10,0,0.7);border:1px solid rgba(255,215,0,0.2);color:#b8a030;border-radius:6px;cursor:pointer;pointer-events:all;transition:all .15s}
    #ach-btn:hover{border-color:#ffd700;color:#ffd700}
    #ach-btn .cnt{color:#ffd700;font-weight:700}
    #ach-panel{position:fixed;inset:0;z-index:50;background:rgba(2,2,0,0.92);display:none;flex-direction:column;align-items:center;overflow-y:auto;padding:16px 12px 40px}
    #ach-panel.open{display:flex}
    #ach-panel-head{width:100%;max-width:600px;display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;position:sticky;top:0;background:rgba(2,2,0,0.95);padding:8px 0;z-index:2}
    #ach-panel-head h2{font-size:20px;color:#ffd700;font-weight:900;letter-spacing:2px}
    #ach-close{font-family:'Cinzel',serif;font-size:14px;background:none;border:1px solid rgba(255,215,0,0.2);color:#b8a030;padding:4px 14px;border-radius:6px;cursor:pointer}
    #ach-close:hover{color:#ffd700;border-color:#ffd700}
    #ach-progress{width:100%;max-width:600px;height:6px;background:#111;border-radius:3px;margin-bottom:14px;overflow:hidden}
    #ach-progress-fill{height:100%;background:linear-gradient(90deg,#b8a030,#ffd700);border-radius:3px;transition:width .3s}
    #ach-grid{width:100%;max-width:600px;display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:6px}
    .ach-card{background:#0a0a04;border:1px solid #1a1800;border-radius:6px;padding:8px 10px;font-family:'Azeret Mono',monospace;transition:all .15s}
    .ach-card.unlocked{border-color:rgba(255,215,0,0.3);background:#0e0d04}
    .ach-card .ach-icon{font-size:18px;margin-bottom:2px}
    .ach-card .ach-name{font-size:11px;color:#665;font-weight:700}
    .ach-card.unlocked .ach-name{color:#ffd700}
    .ach-card .ach-desc{font-size:9px;color:#443;margin-top:2px;line-height:1.3}
    .ach-card.unlocked .ach-desc{color:#887740}
    /* Toast */
    #ach-toast{position:fixed;top:40px;left:50%;transform:translateX(-50%);z-index:60;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:6px}
    .toast{font-family:'Azeret Mono',monospace;font-size:11px;background:rgba(10,10,0,0.9);border:1px solid rgba(255,215,0,0.4);color:#ffd700;padding:6px 16px;border-radius:6px;animation:toast-in .3s ease-out,toast-out .4s 2.2s ease-in forwards;white-space:nowrap}
    .toast .t-icon{margin-right:6px}
    @keyframes toast-in{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
    @keyframes toast-out{from{opacity:1}to{opacity:0;transform:translateY(-10px)}}
    /* Win overlay */
    #win-screen{position:fixed;inset:0;z-index:55;background:rgba(2,2,0,0.9);display:none;flex-direction:column;align-items:center;justify-content:center}
    #win-screen.open{display:flex}
    #win-screen h1{font-size:clamp(28px,6vw,48px);color:#ffd700;text-shadow:0 0 40px rgba(255,215,0,0.6);margin-bottom:8px;font-weight:900;letter-spacing:3px}
    #win-screen p{color:#b8a030;font-family:'Azeret Mono',monospace;font-size:14px;margin-bottom:20px}
  </style>
</head>
<body>

<div id="ui">
  <div id="hud">
    <span>Gems <span class="hval" id="h-gems">0</span></span>
    <span>Dist <span class="hval" id="h-dist">0</span>m</span>
    <span>Score <span class="hval" id="h-score">0</span></span>
    <span id="h-seed" style="font-size:10px;opacity:0.6;cursor:pointer" title="Click to copy seed"></span>
  </div>
</div>

<div id="start-screen">
  <h1>KINU</h1>
  <div class="sub">the dragon</div>
  <button class="play-btn" id="btn-play">PLAY</button>
  <div class="instructions">WASD / Arrows to move &mdash; Space to jump &mdash; S/Down to crouch<br>Collect gems, avoid spikes, reach the end</div>
</div>

<div id="gameover-screen" class="hidden">
  <h2>CRASHED</h2>
  <div class="stats" id="go-stats"></div>
  <div class="final-score" id="go-score"></div>
  <button class="play-btn" id="btn-retry">RETRY</button>
</div>

<canvas id="c"></canvas>
<button id="ach-btn" onclick="toggleAchPanel()"><span class="cnt" id="ach-count">0</span>/100</button>
<div id="ach-panel"><div id="ach-panel-head"><h2>ACHIEVEMENTS</h2><button id="ach-close" onclick="toggleAchPanel()">CLOSE</button></div><div id="ach-progress"><div id="ach-progress-fill" style="width:0%"></div></div><div id="ach-grid"></div></div>
<div id="ach-toast"></div>
<div id="win-screen"><h1>DRAGON MASTER</h1><p>All 100 achievements unlocked!</p><button class="play-btn" onclick="document.getElementById('win-screen').classList.remove('open')">NICE</button></div>
<div id="ticker"><div id="ticker-inner"></div></div>
<a id="backlink" href="https://sloppy.live">sloppy.live</a>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

/* ── Constants ── */
const T = 40; // tile size
const GRAVITY = 0.55;
const JUMP_POWER = -11;
const MOVE_SPEED = 4.5;
const NEON_YELLOW = '#ffd700';

/* ── Game state ── */
let state = 'menu';
let frameCount = 0;
let gems = 0, dist = 0, score = 0;
let camX = 0;
let level = [];
let levelW = 0, levelH = 0;
let gemList = [];
let spikeList = [];
let movingPlatforms = [];
let portalPairs = [];
let particles = [];
let stars = [];
let goalX = 0;

/* ── Dragon ── */
const kinu = {
  x: 0, y: 0, vx: 0, vy: 0,
  w: 20, h: 36, hStand: 36, hCrouch: 22,
  onGround: false,
  facing: 1, // 1=right, -1=left
  wingPhase: 0,
  jumps: 0,
  maxJumps: 2, // double jump
  crouching: false
};

/* ── Seeded PRNG (mulberry32) ── */
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

function seedToNum(str) {
  let h = 0;
  for (let i = 0; i < str.length; i++) {
    h = ((h << 5) - h + str.charCodeAt(i)) | 0;
  }
  return h;
}

function generateSeedName() {
  const adj = ['Ancient','Blazing','Crystal','Dark','Elder','Frozen','Golden','Hollow','Iron','Jade','Keen','Lost','Mystic','Noble','Onyx','Primal','Quiet','Runic','Shadow','Thunder','Ultra','Violet','Wild','Xeno','Yellow','Zero'];
  const noun = ['Abyss','Bloom','Claw','Dawn','Echo','Fang','Grove','Haze','Isle','Jinx','Keep','Lair','Moon','Nest','Omen','Peak','Quake','Rune','Storm','Thorn','Urge','Void','Wing','Yarn','Zen'];
  const num = Math.floor(Math.random() * 900) + 100;
  return adj[Math.floor(Math.random() * adj.length)] + noun[Math.floor(Math.random() * noun.length)] + num;
}

let currentSeed = '';
let rng = Math.random; // default, replaced per level

/* ── Level generation ── */
// Tile types: 0=air, 1=ground, 2=platform, 3=trampoline
function generateLevel(seed) {
  if (typeof seed === 'string') {
    currentSeed = seed;
  } else {
    currentSeed = generateSeedName();
  }
  rng = mulberry32(seedToNum(currentSeed));
  const cols = 120 + Math.floor(rng() * 30);
  const rows = Math.ceil(H / T);
  levelW = cols;
  levelH = rows;
  const groundY = rows - 2; // main ground row (visible above screen bottom)

  level = [];
  for (let r = 0; r < rows; r++) {
    level.push(new Array(cols).fill(0));
  }

  // Bottom ground
  for (let c = 0; c < cols; c++) {
    level[rows - 1][c] = 1;
  }

  // Ground surface with gaps and variations
  let floorY = groundY;
  for (let c = 0; c < cols; c++) {
    // Occasional height changes
    if (c > 8 && rng() < 0.08) {
      floorY = groundY + (rng() < 0.5 ? -1 : 0);
    }
    // Ground pits (gaps)
    if (c > 10 && c < cols - 10 && rng() < 0.04) {
      const gapLen = Math.floor(rng() * 3) + 2;
      c += gapLen; // skip gap
      continue;
    }
    // Fill ground from floorY down
    for (let r = floorY; r < rows; r++) {
      level[r][c] = 1;
    }
  }

  // Floating platforms
  for (let c = 12; c < cols - 10; c += Math.floor(rng() * 6) + 4) {
    if (rng() < 0.5) {
      const py = groundY - Math.floor(rng() * 4) - 2;
      const pw = Math.floor(rng() * 4) + 2;
      for (let i = 0; i < pw && c + i < cols; i++) {
        if (py >= 0 && py < rows) level[py][c + i] = 2;
      }
    }
  }

  // Elevated platforms (high)
  for (let c = 20; c < cols - 10; c += Math.floor(rng() * 10) + 8) {
    if (rng() < 0.35) {
      const py = groundY - Math.floor(rng() * 3) - 5;
      const pw = Math.floor(rng() * 3) + 2;
      for (let i = 0; i < pw && c + i < cols; i++) {
        if (py >= 0 && py < rows) level[py][c + i] = 2;
      }
    }
  }

  // Trampolines (tile type 3) — placed on ground surfaces
  for (let c = 20; c < cols - 15; c += Math.floor(rng() * 18) + 12) {
    if (rng() < 0.5) {
      for (let r = 1; r < rows; r++) {
        if (level[r][c] === 1 && (r === 0 || level[r - 1][c] === 0)) {
          level[r - 1][c] = 3; // trampoline sits on top of ground
          break;
        }
      }
    }
  }

  // Moving platforms
  movingPlatforms = [];
  for (let c = 25; c < cols - 20; c += Math.floor(rng() * 20) + 15) {
    if (rng() < 0.4) {
      const py = groundY - Math.floor(rng() * 4) - 3;
      const dir = rng() < 0.5 ? 'h' : 'v';
      movingPlatforms.push({
        x: c * T, y: py * T,
        w: T * 3, h: T * 0.6,
        dir: dir,
        range: dir === 'h' ? T * 3 : T * 2.5,
        speed: 0.8 + rng() * 0.6,
        phase: rng() * Math.PI * 2,
        baseX: c * T, baseY: py * T
      });
    }
  }

  // Portals (paired)
  portalPairs = [];
  for (let c = 30; c < cols - 40; c += Math.floor(rng() * 35) + 25) {
    if (rng() < 0.35) {
      const y1 = (groundY - Math.floor(rng() * 3) - 2) * T;
      const c2 = c + Math.floor(rng() * 15) + 8;
      const y2 = (groundY - Math.floor(rng() * 4) - 3) * T;
      if (c2 < cols - 10) {
        portalPairs.push({
          a: { x: c * T, y: y1, hue: 180 },
          b: { x: c2 * T, y: y2, hue: 300 },
          cooldown: 0
        });
      }
    }
  }

  // Gems
  gemList = [];
  for (let c = 6; c < cols - 5; c += Math.floor(rng() * 4) + 2) {
    if (rng() < 0.4) {
      // Find air above ground
      let gy = groundY - 2;
      // Check for platforms above
      for (let r = 1; r < rows - 2; r++) {
        if ((level[r][c] === 1 || level[r][c] === 2) && r < gy) {
          gy = r - 2;
        }
      }
      if (gy < 1) gy = 2;
      const colors = ['#ffd700', '#ffb830', '#fff06b', '#ffd000'];
      gemList.push({
        x: c * T + T / 2,
        y: gy * T + T / 2,
        r: 8,
        color: colors[Math.floor(rng() * colors.length)],
        value: Math.floor(rng() * 3) + 1,
        phase: rng() * Math.PI * 2,
        collected: false
      });
    }
  }

  // Spikes on ground surfaces
  spikeList = [];
  for (let c = 15; c < cols - 10; c += Math.floor(rng() * 8) + 5) {
    if (rng() < 0.45) {
      // Find ground surface at this column
      for (let r = 1; r < rows; r++) {
        if (level[r][c] === 1 && level[r - 1][c] === 0) {
          spikeList.push({ x: c * T, y: (r - 1) * T, w: T, h: T });
          break;
        }
      }
    }
  }

  // Goal at end
  goalX = (cols - 4) * T;

  // Stars
  stars = [];
  for (let i = 0; i < 60; i++) {
    stars.push({
      x: rng() * cols * T,
      y: rng() * H * 0.5,
      r: rng() * 1.5 + 0.3,
      a: rng() * 0.4 + 0.15
    });
  }
}

/* ── Reset ─�� */
function resetGame() {
  stats.totalRuns++;
  runGems = 0; runDist = 0; runDeaths = 0; gemStreak = 0; airFrames = 0;
  runStart = Date.now();
  generateLevel();
  kinu.x = 3 * T;
  kinu.y = 0;
  // Drop onto ground
  for (let r = 0; r < levelH; r++) {
    if (level[r][3] === 1) { kinu.y = (r - 1) * T - kinu.h; break; }
  }
  kinu.vx = 0;
  kinu.vy = 0;
  kinu.onGround = false;
  kinu.facing = 1;
  kinu.wingPhase = 0;
  kinu.jumps = 0;
  gems = 0;
  dist = 0;
  score = 0;
  camX = 0;
  particles = [];
  frameCount = 0;
}

/* ── Input ── */
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
    e.preventDefault();
    if (state === 'playing' && kinu.jumps < kinu.maxJumps && !kinu.crouching) {
      if (kinu.jumps > 0) stats.totalDoubleJumps++;
      stats.totalJumps++;
      kinu.vy = JUMP_POWER;
      kinu.jumps++;
      kinu.onGround = false;
      addParticles(kinu.x + kinu.w / 2 - camX, kinu.y + kinu.h, NEON_YELLOW, 5);
    }
  }
});
window.addEventListener('keyup', e => { keys[e.code] = false; });

// Mobile touch zones
let touchLeft = false, touchRight = false, touchJumpQueued = false;
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  for (const t of e.changedTouches) {
    if (t.clientY > H * 0.6) {
      // Bottom zone: left/right
      if (t.clientX < W / 3) touchLeft = true;
      else if (t.clientX > W * 2 / 3) touchRight = true;
      else touchJumpQueued = true; // middle = jump
    } else {
      touchJumpQueued = true; // top zone = jump
    }
  }
}, { passive: false });
canvas.addEventListener('touchend', e => {
  for (const t of e.changedTouches) {
    touchLeft = false;
    touchRight = false;
  }
});

document.getElementById('btn-play').onclick = () => {
  document.getElementById('start-screen').classList.add('hidden');
  state = 'playing';
  resetGame();
};
document.getElementById('btn-retry').onclick = () => {
  document.getElementById('gameover-screen').classList.add('hidden');
  state = 'playing';
  resetGame();
};

// Click seed to copy
document.getElementById('h-seed').onclick = () => {
  if (currentSeed) {
    navigator.clipboard.writeText(currentSeed).catch(() => {});
    const el = document.getElementById('h-seed');
    el.textContent = 'Copied!';
    setTimeout(() => { el.textContent = currentSeed; }, 800);
  }
};

/* ── Petting mechanic ── */
let petTimer = 0; // frames remaining of pat animation
let petHandX = 0, petHandY = 0; // screen-space hand position

function addHeartParticles(sx, sy, count) {
  for (let i = 0; i < count; i++) {
    const a = -Math.PI / 2 + (Math.random() - 0.5) * 1.4;
    const sp = Math.random() * 2 + 1;
    particles.push({
      x: sx + (Math.random() - 0.5) * 16,
      y: sy - 10 + Math.random() * 6,
      vx: Math.cos(a) * sp * 0.5,
      vy: Math.sin(a) * sp - 1.5,
      life: 1, decay: 0.015 + Math.random() * 0.01,
      r: 4 + Math.random() * 3,
      color: 'heart' // special flag
    });
  }
}

function drawHeart(px, py, size, alpha) {
  ctx.save();
  ctx.translate(px, py);
  ctx.globalAlpha = alpha;
  ctx.fillStyle = '#ff4477';
  ctx.shadowColor = '#ff4477';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  const s = size;
  ctx.moveTo(0, s * 0.3);
  ctx.bezierCurveTo(-s, -s * 0.3, -s * 0.5, -s, 0, -s * 0.4);
  ctx.bezierCurveTo(s * 0.5, -s, s, -s * 0.3, 0, s * 0.3);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawPatHand(sx, sy, progress) {
  // progress: 0-1, hand bobs down then up
  const bob = Math.sin(progress * Math.PI) * 8;
  const hy = sy - 20 + bob;
  ctx.save();
  ctx.translate(sx, hy);
  ctx.fillStyle = '#ffd699';
  ctx.shadowColor = NEON_YELLOW;
  ctx.shadowBlur = 10;
  // Palm
  ctx.beginPath();
  ctx.ellipse(0, 0, 9, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  // Fingers
  for (let i = -2; i <= 2; i++) {
    ctx.fillStyle = '#ffd699';
    ctx.beginPath();
    ctx.ellipse(i * 4, -8 + Math.abs(i) * 1.5, 2.2, 5, i * 0.15, 0, Math.PI * 2);
    ctx.fill();
  }
  // Thumb
  ctx.beginPath();
  ctx.ellipse(-10, -2, 2.5, 4, -0.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
}

canvas.addEventListener('click', e => {
  if (state !== 'playing') return;
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  // Check if click is near Kinu (screen space)
  const kinuSX = kinu.x - camX;
  const kinuSY = kinu.y;
  const dx = mx - (kinuSX + kinu.w / 2);
  const dy = my - (kinuSY + kinu.h / 2);
  // Boop the snoot — small hitbox on nose area (front of face, slightly below center)
  const noseOffX = kinu.facing > 0 ? kinu.w * 0.7 : kinu.w * 0.3;
  const noseDx = mx - (kinuSX + noseOffX);
  const noseDy = my - (kinuSY + kinu.h * 0.25);
  if (Math.abs(noseDx) < 12 && Math.abs(noseDy) < 12) {
    petTimer = 30;
    petHandX = kinuSX + noseOffX;
    petHandY = kinuSY + kinu.h * 0.25;
    addHeartParticles(petHandX, petHandY, 10);
    stats.totalBoops = (stats.totalBoops || 0) + 1;
    stats.totalPets = (stats.totalPets || 0) + 1;
  } else if (Math.abs(dx) < 30 && Math.abs(dy) < 40) {
    petTimer = 30; // half second animation
    petHandX = kinuSX + kinu.w / 2;
    petHandY = kinuSY;
    addHeartParticles(petHandX, petHandY, 6);
    stats.totalPets = (stats.totalPets || 0) + 1;
  }
});

/* ── Particles ── */
function addParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = Math.random() * 3 + 1;
    particles.push({
      x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 1,
      life: 1, decay: Math.random() * 0.03 + 0.02,
      r: Math.random() * 3 + 1, color
    });
  }
}

/* ── Tile collision helpers ── */
function isSolid(c, r) {
  if (c < 0 || c >= levelW || r < 0 || r >= levelH) return r >= levelH;
  return level[r][c] === 1 || level[r][c] === 2 || level[r][c] === 3;
}

function rectCollide(ax, ay, aw, ah, bx, by, bw, bh) {
  return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
}

/* ── Update ── */
function update() {
  if (state !== 'playing') return;
  frameCount++;

  // Crouch
  const wantCrouch = keys['KeyS'] || keys['ArrowDown'];
  if (wantCrouch && kinu.onGround && !kinu.crouching) {
    // Transition to crouch: shrink height, adjust y so feet stay planted
    kinu.y += kinu.hStand - kinu.hCrouch;
    kinu.h = kinu.hCrouch;
    kinu.crouching = true;
  } else if (!wantCrouch && kinu.crouching) {
    // Check if there's room to stand
    const newY = kinu.y - (kinu.hStand - kinu.hCrouch);
    const c1 = Math.floor(kinu.x / T);
    const c2 = Math.floor((kinu.x + kinu.w - 1) / T);
    const rTop = Math.floor(newY / T);
    let canStand = true;
    for (let c = c1; c <= c2; c++) { if (isSolid(c, rTop)) canStand = false; }
    if (canStand) {
      kinu.y = newY;
      kinu.h = kinu.hStand;
      kinu.crouching = false;
    }
  }

  // Movement input
  let moveX = 0;
  if (keys['KeyA'] || keys['ArrowLeft'] || touchLeft) moveX = -1;
  if (keys['KeyD'] || keys['ArrowRight'] || touchRight) moveX = 1;
  const speedMul = kinu.crouching ? 0.4 : 1;
  kinu.vx = moveX * MOVE_SPEED * speedMul;
  if (moveX !== 0) kinu.facing = moveX;

  // Mobile jump
  if (touchJumpQueued && kinu.jumps < kinu.maxJumps) {
    if (kinu.jumps > 0) stats.totalDoubleJumps++;
    stats.totalJumps++;
    kinu.vy = JUMP_POWER;
    kinu.jumps++;
    kinu.onGround = false;
    addParticles(kinu.x + kinu.w / 2 - camX, kinu.y + kinu.h, NEON_YELLOW, 5);
    touchJumpQueued = false;
  }
  touchJumpQueued = false;

  // Gravity
  kinu.vy += GRAVITY;
  if (kinu.vy > 14) kinu.vy = 14;

  // Wing animation
  kinu.wingPhase += kinu.onGround ? 0.05 : 0.25;

  // Horizontal movement + collision
  kinu.x += kinu.vx;
  // Clamp to level
  if (kinu.x < 0) kinu.x = 0;
  if (kinu.x + kinu.w > levelW * T) kinu.x = levelW * T - kinu.w;

  // H-collision with tiles
  const col1 = Math.floor(kinu.x / T);
  const col2 = Math.floor((kinu.x + kinu.w - 1) / T);
  const row1 = Math.floor(kinu.y / T);
  const row2 = Math.floor((kinu.y + kinu.h - 1) / T);
  for (let r = row1; r <= row2; r++) {
    for (let c = col1; c <= col2; c++) {
      if (isSolid(c, r)) {
        if (kinu.vx > 0) kinu.x = c * T - kinu.w;
        else if (kinu.vx < 0) kinu.x = (c + 1) * T;
      }
    }
  }

  // Vertical movement + collision
  kinu.y += kinu.vy;
  kinu.onGround = false;
  // Uncrouch when airborne
  if (kinu.crouching && kinu.vy !== 0) {
    kinu.y -= (kinu.hStand - kinu.hCrouch);
    kinu.h = kinu.hStand;
    kinu.crouching = false;
  }

  const col1b = Math.floor(kinu.x / T);
  const col2b = Math.floor((kinu.x + kinu.w - 1) / T);
  const row1b = Math.floor(kinu.y / T);
  const row2b = Math.floor((kinu.y + kinu.h - 1) / T);
  for (let r = row1b; r <= row2b; r++) {
    for (let c = col1b; c <= col2b; c++) {
      if (isSolid(c, r)) {
        if (kinu.vy > 0) {
          kinu.y = r * T - kinu.h;
          kinu.vy = 0;
          kinu.onGround = true;
          kinu.jumps = 0;
        } else if (kinu.vy < 0) {
          kinu.y = (r + 1) * T;
          kinu.vy = 0;
        }
      }
    }
  }

  // Trampoline bounce — check if Kinu just landed on a trampoline tile
  if (kinu.onGround) {
    const feetR = Math.floor((kinu.y + kinu.h) / T);
    const feetC1 = Math.floor(kinu.x / T);
    const feetC2 = Math.floor((kinu.x + kinu.w - 1) / T);
    for (let c = feetC1; c <= feetC2; c++) {
      if (feetR >= 0 && feetR < levelH && level[feetR][c] === 3) {
        kinu.vy = JUMP_POWER * 1.7; // super bounce!
        kinu.onGround = false;
        kinu.jumps = 0; // reset jumps so you can double-jump after bounce
        addParticles(kinu.x + kinu.w / 2 - camX, kinu.y + kinu.h, '#00ffaa', 10);
        addParticles(kinu.x + kinu.w / 2 - camX, kinu.y + kinu.h, '#ffd700', 5);
        break;
      }
    }
  }

  // Moving platforms
  for (const mp of movingPlatforms) {
    const t = frameCount * 0.02;
    const oldX = mp.x, oldY = mp.y;
    if (mp.dir === 'h') {
      mp.x = mp.baseX + Math.sin(t * mp.speed + mp.phase) * mp.range;
    } else {
      mp.y = mp.baseY + Math.sin(t * mp.speed + mp.phase) * mp.range;
    }
    // Check if Kinu is standing on this platform
    const onPlat = kinu.y + kinu.h >= mp.y && kinu.y + kinu.h <= mp.y + mp.h + 6 &&
                   kinu.x + kinu.w > mp.x && kinu.x < mp.x + mp.w && kinu.vy >= 0;
    if (onPlat) {
      kinu.y = mp.y - kinu.h;
      kinu.vy = 0;
      kinu.onGround = true;
      kinu.jumps = 0;
      // Carry Kinu with platform
      kinu.x += mp.x - oldX;
      kinu.y += mp.y - oldY;
    }
  }

  // Portal teleport
  for (const pp of portalPairs) {
    if (pp.cooldown > 0) { pp.cooldown--; continue; }
    const kcx = kinu.x + kinu.w / 2, kcy = kinu.y + kinu.h / 2;
    const dA = Math.sqrt((kcx - pp.a.x - T/2)**2 + (kcy - pp.a.y - T/2)**2);
    const dB = Math.sqrt((kcx - pp.b.x - T/2)**2 + (kcy - pp.b.y - T/2)**2);
    if (dA < T * 0.8) {
      kinu.x = pp.b.x + T/2 - kinu.w/2;
      kinu.y = pp.b.y - kinu.h;
      pp.cooldown = 45;
      addParticles(pp.a.x + T/2 - camX, pp.a.y + T/2, `hsl(${pp.a.hue},90%,65%)`, 12);
      addParticles(pp.b.x + T/2 - camX, pp.b.y + T/2, `hsl(${pp.b.hue},90%,65%)`, 12);
    } else if (dB < T * 0.8) {
      kinu.x = pp.a.x + T/2 - kinu.w/2;
      kinu.y = pp.a.y - kinu.h;
      pp.cooldown = 45;
      addParticles(pp.b.x + T/2 - camX, pp.b.y + T/2, `hsl(${pp.b.hue},90%,65%)`, 12);
      addParticles(pp.a.x + T/2 - camX, pp.a.y + T/2, `hsl(${pp.a.hue},90%,65%)`, 12);
    }
  }

  // Fall off bottom = death
  if (kinu.y > levelH * T + 100) {
    die();
    return;
  }

  // Spike collision
  const kcx = kinu.x + 4, kcy = kinu.y + 4, kcw = kinu.w - 8, kch = kinu.h - 4;
  for (const sp of spikeList) {
    if (rectCollide(kcx, kcy, kcw, kch, sp.x + 6, sp.y + T * 0.4, sp.w - 12, sp.h * 0.6)) {
      die();
      return;
    }
  }

  // Gem collection
  const kcenterX = kinu.x + kinu.w / 2;
  const kcenterY = kinu.y + kinu.h / 2;
  for (const g of gemList) {
    if (g.collected) continue;
    const dx = kcenterX - g.x, dy = kcenterY - g.y;
    if (Math.sqrt(dx * dx + dy * dy) < g.r + 16) {
      g.collected = true;
      gems++;
      runGems++;
      gemStreak++;
      if (gemStreak > stats.maxGemStreak) stats.maxGemStreak = gemStreak;
      stats.totalGems++;
      score += g.value * 10;
      stats.totalScore += g.value * 10;
      addParticles(g.x - camX, g.y, g.color, 8);
    }
  }

  // Goal reached
  if (kinu.x + kinu.w > goalX) {
    score += 500 + gems * 5;
    stats.totalScore += 500 + gems * 5;
    stats.levelsCompleted++;
    if (runDeaths === 0) stats.deathlessLevels = (stats.deathlessLevels||0) + 1;
    const runSec = (Date.now() - runStart) / 1000;
    if (runSec < 20) stats.fastLevels = (stats.fastLevels||0) + 1;
    const totalGems = gemList.length;
    if (totalGems > 0 && runGems >= totalGems) stats.allGemsLevels = (stats.allGemsLevels||0) + 1;
    checkAchievements();
    saveStats();
    state = 'dead'; // reuse game over for win
    document.getElementById('gameover-screen').querySelector('h2').textContent = 'LEVEL COMPLETE!';
    document.getElementById('gameover-screen').querySelector('h2').style.color = '#ffd700';
    document.getElementById('go-stats').textContent = `${gems} gems collected · seed: ${currentSeed}`;
    document.getElementById('go-score').textContent = score;
    setTimeout(() => document.getElementById('gameover-screen').classList.remove('hidden'), 400);
    return;
  }

  // Camera follow
  const targetCam = kinu.x - W * 0.35;
  camX += (targetCam - camX) * 0.1;
  if (camX < 0) camX = 0;
  if (camX > levelW * T - W) camX = levelW * T - W;

  // Distance
  dist = Math.floor(kinu.x / T);

  // Particles
  for (const p of particles) {
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.05;
    p.life -= p.decay;
  }
  particles = particles.filter(p => p.life > 0);

  // HUD
  document.getElementById('h-gems').textContent = gems;
  document.getElementById('h-dist').textContent = dist;
  document.getElementById('h-score').textContent = score;
  document.getElementById('h-seed').textContent = currentSeed;

  // Achievement tracking
  trackStats();
}

function die() {
  state = 'dead';
  stats.totalDeaths++;
  runDeaths++;
  gemStreak = 0;
  addParticles(kinu.x + kinu.w / 2 - camX, kinu.y + kinu.h / 2, '#ff4444', 20);
  addParticles(kinu.x + kinu.w / 2 - camX, kinu.y + kinu.h / 2, NEON_YELLOW, 10);
  score += gems * 5;
  stats.totalScore += gems * 5;
  document.getElementById('gameover-screen').querySelector('h2').textContent = 'CRASHED';
  document.getElementById('gameover-screen').querySelector('h2').style.color = '#ff4444';
  document.getElementById('go-stats').textContent = `${dist}m · ${gems} gems · seed: ${currentSeed}`;
  document.getElementById('go-score').textContent = score;
  setTimeout(() => document.getElementById('gameover-screen').classList.remove('hidden'), 600);
}

/* ���─ Drawing ── */
function drawBackground() {
  const skyGrad = ctx.createLinearGradient(0, 0, 0, H);
  skyGrad.addColorStop(0, '#020200');
  skyGrad.addColorStop(0.5, '#080804');
  skyGrad.addColorStop(1, '#0c0a02');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, W, H);

  // Stars (parallax)
  for (const s of stars) {
    const sx = s.x - camX * 0.15;
    if (sx < -5 || sx > W + 5) continue;
    const tw = 0.5 + Math.sin(frameCount * 0.03 + s.x) * 0.3;
    ctx.fillStyle = `rgba(255,215,0,${s.a * tw})`;
    ctx.beginPath();
    ctx.arc(sx, s.y, s.r, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawTiles() {
  const startC = Math.max(0, Math.floor(camX / T));
  const endC = Math.min(levelW, Math.ceil((camX + W) / T) + 1);
  const startR = 0;
  const endR = levelH;

  for (let r = startR; r < endR; r++) {
    for (let c = startC; c < endC; c++) {
      const tile = level[r][c];
      if (tile === 0) continue;
      const sx = c * T - camX;
      const sy = r * T;

      if (tile === 1) {
        // Ground tile — dark earth
        ctx.fillStyle = '#181812';
        ctx.fillRect(sx, sy, T, T);
        // Top edge highlight if air above
        if (r === 0 || level[r - 1][c] === 0) {
          ctx.fillStyle = '#4a3d00';
          ctx.fillRect(sx, sy, T, 3);
          // Random crystal highlights
          if ((c + r) % 3 === 0) {
            ctx.fillStyle = `hsla(48, 80%, ${35 + Math.sin(c * 0.5) * 10}%, 0.7)`;
            ctx.fillRect(sx + T * 0.3, sy, T * 0.4, 2);
          }
        }
        // Subtle grid lines
        ctx.strokeStyle = 'rgba(255,215,0,0.07)';
        ctx.strokeRect(sx, sy, T, T);
      } else if (tile === 2) {
        // Platform — dark with yellow top
        ctx.fillStyle = '#1a1a12';
        ctx.fillRect(sx, sy, T, T * 0.6);
        ctx.fillStyle = '#4a3d00';
        ctx.fillRect(sx, sy, T, 4);
        // Yellow glow on top
        ctx.shadowColor = NEON_YELLOW;
        ctx.shadowBlur = 4;
        ctx.fillStyle = 'rgba(255,215,0,0.3)';
        ctx.fillRect(sx, sy, T, 2);
        ctx.shadowBlur = 0;
      } else if (tile === 3) {
        // Trampoline — springy green pad
        const bounce = Math.sin(frameCount * 0.1 + c) * 2;
        ctx.fillStyle = '#0a2a10';
        ctx.fillRect(sx + 2, sy + T * 0.4, T - 4, T * 0.6);
        // Spring coils
        ctx.strokeStyle = '#30a050';
        ctx.lineWidth = 2;
        for (let i = 0; i < 3; i++) {
          const cx = sx + 8 + i * 10;
          ctx.beginPath();
          ctx.moveTo(cx, sy + T);
          ctx.quadraticCurveTo(cx + 5, sy + T * 0.6, cx, sy + T * 0.4 + bounce);
          ctx.stroke();
        }
        // Bouncy pad on top
        ctx.fillStyle = '#00ff88';
        ctx.shadowColor = '#00ff88';
        ctx.shadowBlur = 8;
        ctx.fillRect(sx + 1, sy + T * 0.3 + bounce, T - 2, 6);
        ctx.shadowBlur = 0;
        // Arrow indicator
        ctx.fillStyle = 'rgba(0,255,136,0.4)';
        ctx.beginPath();
        ctx.moveTo(sx + T/2, sy + bounce);
        ctx.lineTo(sx + T/2 - 6, sy + T * 0.25 + bounce);
        ctx.lineTo(sx + T/2 + 6, sy + T * 0.25 + bounce);
        ctx.fill();
      }
    }
  }
}

function drawSpikes() {
  for (const sp of spikeList) {
    const sx = sp.x - camX;
    if (sx < -T || sx > W + T) continue;
    const sy = sp.y;
    const tw = sp.w;

    ctx.fillStyle = '#ff3333';
    ctx.shadowColor = '#ff3333';
    ctx.shadowBlur = 6;

    // Three spike triangles
    for (let i = 0; i < 3; i++) {
      const bx = sx + i * (tw / 3);
      ctx.beginPath();
      ctx.moveTo(bx, sy + T);
      ctx.lineTo(bx + tw / 6, sy + T * 0.3);
      ctx.lineTo(bx + tw / 3, sy + T);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
  }
}

function drawGems() {
  for (const g of gemList) {
    if (g.collected) continue;
    const sx = g.x - camX;
    if (sx < -20 || sx > W + 20) continue;
    const bob = Math.sin(g.phase + frameCount * 0.04) * 4;

    ctx.save();
    ctx.translate(sx, g.y + bob);
    ctx.shadowColor = g.color;
    ctx.shadowBlur = 12;
    ctx.fillStyle = g.color;
    ctx.beginPath();
    ctx.moveTo(0, -g.r);
    ctx.lineTo(g.r * 0.7, 0);
    ctx.lineTo(0, g.r);
    ctx.lineTo(-g.r * 0.7, 0);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.beginPath();
    ctx.moveTo(0, -g.r * 0.4);
    ctx.lineTo(g.r * 0.3, 0);
    ctx.lineTo(0, g.r * 0.2);
    ctx.lineTo(-g.r * 0.3, 0);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;
    ctx.restore();
  }
}

function drawGoal() {
  const sx = goalX - camX;
  if (sx < -T * 2 || sx > W + T * 2) return;
  const pulse = Math.sin(frameCount * 0.05) * 0.2 + 0.8;

  // Goal banner
  ctx.shadowColor = NEON_YELLOW;
  ctx.shadowBlur = 20 * pulse;
  ctx.fillStyle = `rgba(255,215,0,${0.15 * pulse})`;
  ctx.fillRect(sx, 0, T * 2, H);

  ctx.fillStyle = NEON_YELLOW;
  ctx.font = 'bold 16px "Azeret Mono", monospace';
  ctx.textAlign = 'center';
  ctx.fillText('GOAL', sx + T, H * 0.4);

  // Vertical line
  ctx.strokeStyle = `rgba(255,215,0,${0.6 * pulse})`;
  ctx.lineWidth = 2;
  ctx.setLineDash([8, 6]);
  ctx.beginPath();
  ctx.moveTo(sx + T, 0);
  ctx.lineTo(sx + T, H);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.shadowBlur = 0;
}

/* ── Sneaker drawing helper ── */
function drawSneaker(fx, fy, neonPulse) {
  // Sole
  ctx.fillStyle = '#222';
  ctx.fillRect(fx - 2, fy - 1, 9, 4);
  // Upper
  ctx.fillStyle = '#111';
  ctx.fillRect(fx - 1, fy - 4, 8, 4);
  // Neon stripe
  ctx.shadowColor = NEON_YELLOW;
  ctx.shadowBlur = 6 + neonPulse * 3;
  ctx.fillStyle = NEON_YELLOW;
  ctx.fillRect(fx, fy - 3, 6, 1.5);
  // Neon sole edge
  ctx.fillStyle = `rgba(255,215,0,${0.5 + neonPulse * 0.3})`;
  ctx.fillRect(fx - 2, fy + 2, 9, 1);
  ctx.shadowBlur = 0;
}

function drawKinu() {
  const sx = kinu.x - camX;
  const sy = kinu.y;
  const cx = sx + kinu.w / 2;
  const cy = sy + kinu.h;

  ctx.save();
  ctx.translate(cx, cy);
  ctx.scale(kinu.facing, 1);

  const running = Math.abs(kinu.vx) > 0.5;
  const crouch = kinu.crouching;
  const runCycle = frameCount * 0.25;
  const bobY = running && !crouch ? Math.sin(runCycle * 2) * 1.5 : 0;
  const neonPulse = Math.sin(frameCount * 0.08) * 0.5 + 0.5; // sneaker glow pulse

  // Crouch squish factor: body draws lower and compressed
  const sq = crouch ? 0.6 : 1; // squish
  const crouchOff = crouch ? 6 : 0; // body drops down

  // ── Legs ──
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 3.5;
  ctx.lineCap = 'round';

  if (crouch && kinu.onGround) {
    // Crouch pose — legs bent wide, knees out
    // Back leg
    ctx.beginPath();
    ctx.moveTo(-3, -2); ctx.lineTo(-7, 4); ctx.lineTo(-5, -1);
    ctx.stroke();
    drawSneaker(-8, -1, neonPulse);
    // Front leg
    ctx.beginPath();
    ctx.moveTo(3, -2); ctx.lineTo(7, 4); ctx.lineTo(5, -1);
    ctx.stroke();
    drawSneaker(4, -1, neonPulse);
  } else if (kinu.onGround && running) {
    // Running — jointed legs
    const legA = Math.sin(runCycle) * 0.6;
    const legB = Math.sin(runCycle + Math.PI) * 0.6;

    // Back leg
    const bHipX = -2, bHipY = -2;
    const bKneeX = bHipX + Math.sin(legB) * 5;
    const bKneeY = bHipY + 7;
    const bFootX = bKneeX + Math.sin(legB + 0.3) * 4;
    const bFootY = -2;
    ctx.beginPath();
    ctx.moveTo(bHipX, bHipY);
    ctx.lineTo(bKneeX, bKneeY);
    ctx.lineTo(bFootX, bFootY);
    ctx.stroke();
    drawSneaker(bFootX - 2, bFootY, neonPulse);

    ctx.strokeStyle = '#1a1a1a';
    ctx.lineWidth = 3.5;

    // Front leg
    const fHipX = 2, fHipY = -2;
    const fKneeX = fHipX + Math.sin(legA) * 5;
    const fKneeY = fHipY + 7;
    const fFootX = fKneeX + Math.sin(legA + 0.3) * 4;
    const fFootY = -2;
    ctx.beginPath();
    ctx.moveTo(fHipX, fHipY);
    ctx.lineTo(fKneeX, fKneeY);
    ctx.lineTo(fFootX, fFootY);
    ctx.stroke();
    drawSneaker(fFootX - 2, fFootY, neonPulse);
  } else if (kinu.onGround) {
    // Standing idle
    ctx.beginPath();
    ctx.moveTo(-3, -2); ctx.lineTo(-4, 5); ctx.lineTo(-3, -2);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(3, -2); ctx.lineTo(4, 5); ctx.lineTo(3, -2);
    ctx.stroke();
    drawSneaker(-5, -2, neonPulse);
    drawSneaker(2, -2, neonPulse);
  } else {
    // Airborne — legs tucked
    ctx.beginPath();
    ctx.moveTo(-3, -3); ctx.lineTo(-5, 2); ctx.lineTo(-2, -1);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(3, -3); ctx.lineTo(5, 2); ctx.lineTo(2, -1);
    ctx.stroke();
    drawSneaker(-6, -2, neonPulse);
    drawSneaker(3, -2, neonPulse);
  }

  // ── Tail ──
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 3;
  ctx.shadowColor = NEON_YELLOW;
  ctx.shadowBlur = 5;
  const tailWag = Math.sin(frameCount * 0.07) * 4;
  const tailBaseY = -6 * sq + crouchOff + bobY;
  ctx.beginPath();
  ctx.moveTo(-4, tailBaseY);
  ctx.quadraticCurveTo(-14, tailBaseY - 4 + tailWag, -20, tailBaseY + 2 + tailWag);
  ctx.stroke();
  ctx.fillStyle = '#ffd700';
  ctx.shadowBlur = 0;
  const ttx = -20 + Math.cos(frameCount * 0.07) * 1.5;
  const tty = tailBaseY + 2 + tailWag;
  ctx.beginPath();
  ctx.moveTo(ttx, tty - 3);
  ctx.lineTo(ttx - 5, tty);
  ctx.lineTo(ttx, tty + 3);
  ctx.fill();

  // ── Torso ──
  const torsoY = -12 * sq + crouchOff + bobY;
  ctx.shadowColor = NEON_YELLOW;
  ctx.shadowBlur = 8;
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.ellipse(0, torsoY, 8, 11 * sq, 0, 0, Math.PI * 2);
  ctx.fill();

  // Belly plate
  ctx.fillStyle = '#3a3000';
  ctx.beginPath();
  ctx.ellipse(1, torsoY + 3 * sq, 5, 7 * sq, 0, 0, Math.PI * 2);
  ctx.fill();

  // Scale shimmer
  ctx.fillStyle = 'rgba(255,215,0,0.1)';
  ctx.beginPath();
  ctx.ellipse(0, torsoY - 4 * sq, 6, 3 * sq, 0, 0, Math.PI * 2);
  ctx.fill();

  // ── Arms ──
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.shadowBlur = 0;
  const armSwing = running && !crouch ? Math.sin(runCycle + Math.PI * 0.5) * 0.5 : 0;
  const armBaseY = torsoY - 1;
  const armEndY = crouch ? armBaseY + 4 : armBaseY + 6;
  ctx.beginPath();
  ctx.moveTo(-5, armBaseY);
  ctx.lineTo(-9 - armSwing * 5, armEndY);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(5, armBaseY);
  ctx.lineTo(9 + armSwing * 5, armEndY);
  ctx.stroke();
  ctx.strokeStyle = '#ffd700';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-9 - armSwing * 5, armEndY);
  ctx.lineTo(-10 - armSwing * 5, armEndY + 2);
  ctx.moveTo(9 + armSwing * 5, armEndY);
  ctx.lineTo(10 + armSwing * 5, armEndY + 2);
  ctx.stroke();

  // ── Wing ──
  const wingBaseY = torsoY - 4;
  const wingFlap = Math.sin(kinu.wingPhase) * (crouch ? 3 : 6);
  ctx.fillStyle = 'rgba(255,215,0,0.3)';
  ctx.beginPath();
  ctx.moveTo(-6, wingBaseY);
  ctx.quadraticCurveTo(-18, wingBaseY - 12 * sq + wingFlap, -22, wingBaseY + 2 + wingFlap);
  ctx.quadraticCurveTo(-14, wingBaseY + 2, -6, wingBaseY + 1);
  ctx.fill();
  ctx.strokeStyle = '#1a1a1a';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-6, wingBaseY + 1);
  ctx.lineTo(-18, wingBaseY - 9 * sq + wingFlap);
  ctx.stroke();

  // ── Head ──
  const headY = torsoY - 12 * sq;
  ctx.fillStyle = '#1a1a1a';
  ctx.shadowColor = NEON_YELLOW;
  ctx.shadowBlur = 6;
  ctx.beginPath();
  ctx.arc(2, headY, 6.5, 0, Math.PI * 2);
  ctx.fill();

  // Snout
  ctx.fillStyle = '#151515';
  ctx.beginPath();
  ctx.ellipse(7, headY + 1, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Nostril
  ctx.fillStyle = '#ffd700';
  ctx.shadowBlur = 3;
  ctx.beginPath();
  ctx.arc(9.5, headY + 1, 0.8, 0, Math.PI * 2);
  ctx.fill();

  // Eye
  ctx.fillStyle = '#ffd700';
  ctx.shadowColor = '#ffd700';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  ctx.arc(5, headY - 2, 2.2, 0, Math.PI * 2);
  ctx.fill();

  // Pupil
  ctx.fillStyle = '#000';
  ctx.shadowBlur = 0;
  ctx.beginPath();
  ctx.ellipse(5.5, headY - 2, 0.5, 1.6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Horns
  ctx.strokeStyle = '#ffd700';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(-1, headY - 5); ctx.lineTo(-3, headY - 11);
  ctx.moveTo(3, headY - 5); ctx.lineTo(3, headY - 12);
  ctx.stroke();

  // Ear spines
  ctx.strokeStyle = '#ffd700';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(-4, headY - 2); ctx.lineTo(-8, headY - 4);
  ctx.stroke();

  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    if (p.color === 'heart') {
      drawHeart(p.x, p.y, p.r * (0.5 + p.life * 0.5), p.life);
    } else {
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 5;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;

  // Pat hand overlay
  if (petTimer > 0) {
    const progress = 1 - petTimer / 30;
    drawPatHand(petHandX, petHandY, progress);
    petTimer--;
  }
}

/* ── Mobile controls overlay ── */
function drawMobileControls() {
  if (!('ontouchstart' in window)) return;
  ctx.globalAlpha = 0.12;
  ctx.fillStyle = NEON_YELLOW;
  // Left zone
  ctx.beginPath();
  ctx.moveTo(W / 3 * 0.5, H * 0.8);
  ctx.lineTo(W / 3 * 0.5 - 15, H * 0.8 + 10);
  ctx.lineTo(W / 3 * 0.5 + 15, H * 0.8 + 10);
  ctx.fill();
  ctx.save();
  ctx.translate(W / 3 * 0.5, H * 0.8);
  ctx.rotate(Math.PI);
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(-15, 10);
  ctx.lineTo(15, 10);
  ctx.fill();
  ctx.restore();

  // Right zone
  ctx.beginPath();
  ctx.moveTo(W * 5 / 6, H * 0.8);
  ctx.lineTo(W * 5 / 6 - 15, H * 0.8 - 10);
  ctx.lineTo(W * 5 / 6 + 15, H * 0.8 - 10);
  ctx.fill();

  ctx.font = '10px "Azeret Mono"';
  ctx.textAlign = 'center';
  ctx.fillText('LEFT', W / 6, H * 0.95);
  ctx.fillText('JUMP', W / 2, H * 0.95);
  ctx.fillText('RIGHT', W * 5 / 6, H * 0.95);
  ctx.globalAlpha = 1;
}

/* ── Render ── */
function drawMovingPlatforms() {
  for (const mp of movingPlatforms) {
    const sx = mp.x - camX;
    const sy = mp.y;
    if (sx + mp.w < -20 || sx > W + 20) continue;

    // Platform body
    ctx.fillStyle = '#1a1020';
    ctx.fillRect(sx, sy, mp.w, mp.h);
    // Gold top edge
    ctx.fillStyle = '#8a6d20';
    ctx.fillRect(sx, sy, mp.w, 3);
    // Glow
    ctx.shadowColor = '#ffa500';
    ctx.shadowBlur = 6;
    ctx.fillStyle = 'rgba(255,165,0,0.4)';
    ctx.fillRect(sx, sy, mp.w, 2);
    ctx.shadowBlur = 0;
    // Direction indicator arrows
    ctx.fillStyle = 'rgba(255,165,0,0.3)';
    if (mp.dir === 'h') {
      // Left/right arrows
      ctx.beginPath();
      ctx.moveTo(sx + 4, sy + mp.h/2);
      ctx.lineTo(sx + 10, sy + mp.h/2 - 4);
      ctx.lineTo(sx + 10, sy + mp.h/2 + 4);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(sx + mp.w - 4, sy + mp.h/2);
      ctx.lineTo(sx + mp.w - 10, sy + mp.h/2 - 4);
      ctx.lineTo(sx + mp.w - 10, sy + mp.h/2 + 4);
      ctx.fill();
    } else {
      // Up/down arrows
      const cx = sx + mp.w/2;
      ctx.beginPath();
      ctx.moveTo(cx, sy + 2);
      ctx.lineTo(cx - 4, sy + 8);
      ctx.lineTo(cx + 4, sy + 8);
      ctx.fill();
    }
  }
}

function drawPortals() {
  const t = frameCount * 0.04;
  for (const pp of portalPairs) {
    for (const portal of [pp.a, pp.b]) {
      const sx = portal.x - camX + T/2;
      const sy = portal.y + T/2;
      if (sx < -T * 2 || sx > W + T * 2) continue;

      // Outer glow
      const grad = ctx.createRadialGradient(sx, sy, 2, sx, sy, T * 0.8);
      grad.addColorStop(0, `hsla(${portal.hue}, 90%, 65%, 0.6)`);
      grad.addColorStop(0.5, `hsla(${portal.hue}, 80%, 50%, 0.2)`);
      grad.addColorStop(1, `hsla(${portal.hue}, 70%, 40%, 0)`);
      ctx.fillStyle = grad;
      ctx.fillRect(sx - T, sy - T, T * 2, T * 2);

      // Spinning ring
      ctx.strokeStyle = `hsla(${portal.hue}, 90%, 65%, 0.8)`;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.ellipse(sx, sy, T * 0.45, T * 0.45, t, 0, Math.PI * 2);
      ctx.stroke();

      // Inner ring
      ctx.strokeStyle = `hsla(${(portal.hue + 40) % 360}, 85%, 70%, 0.5)`;
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.ellipse(sx, sy, T * 0.3, T * 0.3, -t * 1.5, 0, Math.PI * 2);
      ctx.stroke();

      // Core
      ctx.fillStyle = `hsla(${portal.hue}, 90%, 75%, ${0.5 + Math.sin(t * 3) * 0.3})`;
      ctx.beginPath();
      ctx.arc(sx, sy, T * 0.15, 0, Math.PI * 2);
      ctx.fill();

      // Sparkle particles around edge
      for (let i = 0; i < 4; i++) {
        const a = t * 2 + i * Math.PI / 2;
        const px = sx + Math.cos(a) * T * 0.4;
        const py = sy + Math.sin(a) * T * 0.4;
        ctx.fillStyle = `hsla(${portal.hue}, 90%, 80%, ${0.4 + Math.sin(t * 5 + i) * 0.3})`;
        ctx.beginPath();
        ctx.arc(px, py, 2, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);
  drawBackground();

  if (state === 'playing' || state === 'dead') {
    drawTiles();
    drawMovingPlatforms();
    drawPortals();
    drawSpikes();
    drawGems();
    drawGoal();
    if (state === 'playing') drawKinu();
    drawParticles();
    drawMobileControls();
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

  {id:'p6',name:'Boop Addict',desc:'50 boops. You can\'t stop.',cat:'Petting',check:()=>(stats.totalBoops||0)>=50},
  {id:'p7',name:'Dragon Therapist',desc:'500 pets. Kinu trusts you completely.',cat:'Petting',check:()=>(stats.totalPets||0)>=500},
  {id:'p8',name:'Boop Legend',desc:'200 boops. The snoot fears you.',cat:'Petting',check:()=>(stats.totalBoops||0)>=200},

  {id:'f1',name:'Deathless',desc:'Complete a level without dying',cat:'Feats',check:()=>stats.deathlessLevels>=1},
  {id:'f2',name:'Speed Demon',desc:'Complete level in under 20s',cat:'Feats',check:()=>stats.fastLevels>=1},
  {id:'f3',name:'Gem Sweep',desc:'Collect all gems in a level',cat:'Feats',check:()=>stats.allGemsLevels>=1},

function checkAchievements() {
  let newCount = 0;
  for (const a of ACHIEVEMENTS) {
    if (!unlocked[a.id] && a.check()) {
      unlocked[a.id] = Date.now();
      newCount++;
      showToast(a.name, a.desc);
    }
  }
  if (newCount) {
    updateAchBtn();
    saveStats();
    if (Object.keys(unlocked).length >= 100) {
      setTimeout(() => document.getElementById('win-screen').classList.add('open'), 1200);
    }
  }
}

function showToast(name, desc) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = `<strong>${name}</strong> <span style="opacity:0.7">${desc}</span>`;
  document.getElementById('ach-toast').appendChild(el);
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 400); }, 2500);
}

function updateAchBtn() {
  document.getElementById('ach-count').textContent = Object.keys(unlocked).length;
  const pct = (Object.keys(unlocked).length / 100 * 100).toFixed(0);
  const fill = document.getElementById('ach-progress-fill');
  if (fill) fill.style.width = pct + '%';
}

function toggleAchPanel() {
  const p = document.getElementById('ach-panel');
  p.classList.toggle('open');
  if (p.classList.contains('open')) renderAchPanel();
}

function renderAchPanel() {
  const grid = document.getElementById('ach-grid');
  const cats = {};
  for (const a of ACHIEVEMENTS) {
    if (!cats[a.cat]) cats[a.cat] = [];
    cats[a.cat].push(a);
  }
  let html = '';
  for (const [cat, achs] of Object.entries(cats)) {
    html += `<div style="grid-column:1/-1;color:#b8a030;font-size:11px;margin-top:8px;text-transform:uppercase;letter-spacing:2px">${cat}</div>`;
    for (const a of achs) {
      const done = !!unlocked[a.id];
      html += `<div class="ach-card${done?' done':''}"><div class="ach-icon">${done?'★':'☆'}</div><div class="ach-name">${a.name}</div><div class="ach-desc">${a.desc}</div></div>`;
    }
  }
  grid.innerHTML = html;
}

function trackStats() {
  // Play time
  stats.totalPlaySec = (stats.totalPlaySec || 0) + 1/60;

  // Distance tracking
  const curDist = Math.floor(kinu.x / T);
  if (curDist > runDist) { stats.totalDist += curDist - runDist; }
  if (kinu.vx < 0) stats.leftDist = (stats.leftDist || 0) + Math.abs(kinu.vx) / T;
  runDist = curDist;

  // Air time
  if (!kinu.onGround) { airFrames++; }
  else {
    const airSec = airFrames / 60;
    if (airSec > stats.longestAirSec) stats.longestAirSec = airSec;
    airFrames = 0;
  }

  // Crouch counting
  if (kinu.crouching && !crouchCounted) { stats.totalCrouches++; crouchCounted = true; }
  if (!kinu.crouching) crouchCounted = false;

  // Update single-run maxes
  if (runGems > stats.maxGemsOneRun) stats.maxGemsOneRun = runGems;
  if (curDist > stats.maxDistOneRun) stats.maxDistOneRun = curDist;
  if (score > stats.maxScoreOneRun) stats.maxScoreOneRun = score;

  // Periodic checks
  if (frameCount % 60 === 0) checkAchievements();
  if (frameCount % 300 === 0) saveStats();
}

updateAchBtn();

function initTicker() {
  const inner = document.getElementById('ticker-inner');
  // Shuffle and pick 15
  const shuffled = [...QUOTES].sort(() => Math.random() - 0.5).slice(0, 15);
  const sep = '<span class="sep">◆</span>';
  const html = shuffled.map(q => `<span>${q}</span>`).join(sep);
  // Duplicate for seamless loop
  inner.innerHTML = html + sep + html;
  // Set animation duration based on content width
  requestAnimationFrame(() => {
    const w = inner.scrollWidth / 2;
    const dur = Math.max(40, w / 50); // ~50px/sec
    inner.style.animationDuration = dur + 's';
  });
}
