<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Dust Savings</title>
<link rel="icon" href="https://emojicdn.elk.sh/💸">
<meta property="og:title" content="Dust Savings">
<meta property="og:description" content="Try to save coins. They will betray you.">
<meta property="og:url" content="https://app.sloppy.live/dust-savings/">
<meta property="og:image" content="https://emojicdn.elk.sh/💸?style=google">
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@300;500;800;900&family=Fira+Code:wght@300;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0c0b0a;--surface:#15140f;--border:#252318;
  --text:#d4c9a8;--dim:#6b6347;--gold:#d4a017;
  --dust:#8b7355;--red:#c0392b;--green:#27ae60;
}
body{
  background:var(--bg);color:var(--text);
  font-family:'Fira Code',monospace;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  padding:16px;overflow-x:hidden;
}
.container{max-width:480px;width:100%}

header{text-align:center;margin-bottom:20px}
h1{
  font-family:'Bitter',serif;font-weight:900;
  font-size:clamp(1.6rem,5vw,2.4rem);letter-spacing:-0.02em;
  color:var(--gold);text-shadow:0 0 20px rgba(212,160,23,0.15);
}
.sub{color:var(--dim);font-size:0.6rem;font-weight:300;margin-top:2px;font-style:italic}

.vault{
  background:var(--surface);border:1px solid var(--border);
  border-radius:14px;padding:24px;margin-bottom:16px;
  text-align:center;position:relative;overflow:hidden;
}
.vault-label{font-size:0.5rem;color:var(--dim);text-transform:uppercase;letter-spacing:0.15em;margin-bottom:8px}
.vault-amount{
  font-family:'Bitter',serif;font-size:clamp(2.4rem,8vw,3.6rem);
  font-weight:900;color:var(--gold);line-height:1;
  text-shadow:0 0 25px rgba(212,160,23,0.2);
  transition:color 0.3s;
}
.vault-amount.danger{color:var(--red);text-shadow:0 0 25px rgba(192,57,43,0.3)}
.vault-amount.dust{color:var(--dust);text-shadow:none}

.vault-sub{font-size:0.55rem;color:var(--dim);margin-top:8px;font-weight:300;min-height:1.2em}
.vault-sub .lost{color:var(--red)}
.vault-sub .safe{color:var(--green)}

.event-log{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:14px;margin-bottom:16px;
  max-height:140px;overflow-y:auto;
}
.event-log::-webkit-scrollbar{width:3px}
.event-log::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.event{
  font-size:0.6rem;padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.03);
  line-height:1.4;
}
.event:last-child{border:none}
.event .time{color:var(--dim);margin-right:6px}
.event .bad{color:var(--red)}
.event .good{color:var(--green)}
.event .dust-e{color:var(--dust)}
.event .gold-e{color:var(--gold)}

.actions{display:flex;flex-direction:column;gap:8px;margin-bottom:16px}
.act-btn{
  padding:14px 16px;border:1px solid var(--border);border-radius:10px;
  background:var(--surface);color:var(--text);font-family:inherit;
  font-size:0.75rem;font-weight:500;cursor:pointer;
  transition:all 0.15s;text-align:left;display:flex;
  justify-content:space-between;align-items:center;
}
.act-btn:hover:not(:disabled){border-color:var(--gold);color:var(--gold)}
.act-btn:disabled{opacity:0.25;cursor:default}
.act-btn .cost{font-size:0.55rem;color:var(--dim);font-weight:300}
.act-btn .cost span{color:var(--gold)}

.stats{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:14px;margin-bottom:16px;
  display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;text-align:center;
}
.stat-label{font-size:0.45rem;color:var(--dim);text-transform:uppercase;letter-spacing:0.1em}
.stat-val{font-family:'Bitter',serif;font-size:1rem;font-weight:800;margin-top:2px}
.stat-val.gold-c{color:var(--gold)}
.stat-val.dust-c{color:var(--dust)}
.stat-val.red-c{color:var(--red)}

.ticker{
  background:var(--surface);border:1px solid var(--border);
  border-radius:8px;padding:8px 12px;margin-bottom:16px;
  font-size:0.55rem;color:var(--dim);font-style:italic;
  text-align:center;min-height:2em;line-height:1.5;
}

canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:50}

.back-link{text-align:center;margin-top:8px}
.back-link a{color:var(--dim);text-decoration:none;font-size:0.5rem;font-weight:300}
.back-link a:hover{color:var(--gold)}
</style>
</head>
<body>
<canvas id="fx"></canvas>
<div class="container">
  <header>
    <h1>Dust Savings</h1>
    <div class="sub">a futile exercise in digital hoarding</div>
  </header>

  <div class="ticker" id="ticker">Welcome to Dust Savings Bank. Your coins are... mostly safe.</div>

  <div class="vault">
    <div class="vault-label">Your Vault</div>
    <div class="vault-amount" id="vault-amount">0</div>
    <div class="vault-sub" id="vault-sub"></div>
  </div>

  <div class="actions">
    <button class="act-btn" id="btn-earn" onclick="earn()">
      Earn Coins <span class="cost">+<span>5-15</span> coins</span>
    </button>
    <button class="act-btn" id="btn-save" onclick="save()">
      Save to Vault <span class="cost">locks coins (allegedly)</span>
    </button>
    <button class="act-btn" id="btn-insure" onclick="insure()">
      Buy Insurance <span class="cost"><span>20</span> coins</span>
    </button>
    <button class="act-btn" id="btn-upgrade" onclick="upgrade()">
      Upgrade Vault <span class="cost"><span>50</span> coins</span>
    </button>
    <button class="act-btn" id="btn-pray" onclick="pray()">
      Pray to RNG Gods <span class="cost">free (spiritually costly)</span>
    </button>
  </div>

  <div class="stats">
    <div><div class="stat-label">Earned</div><div class="stat-val gold-c" id="st-earned">0</div></div>
    <div><div class="stat-label">Dusted</div><div class="stat-val dust-c" id="st-dusted">0</div></div>
    <div><div class="stat-label">Exploded</div><div class="stat-val red-c" id="st-exploded">0</div></div>
  </div>

  <div class="event-log" id="event-log"></div>

  <div class="back-link"><a href="https://sloppy.live">sloppy.live</a></div>
</div>

<script>
const fxCanvas = document.getElementById('fx');
const fxCtx = fxCanvas.getContext('2d');
let fxW, fxH;
function resizeFx() {
  fxW = window.innerWidth; fxH = window.innerHeight;
  fxCanvas.width = fxW; fxCanvas.height = fxH;
}
resizeFx();
window.addEventListener('resize', resizeFx);

let coins = 0;
let totalEarned = 0, totalDusted = 0, totalExploded = 0;
let vaultLevel = 1;
let insured = false;
let prayerBuff = 0;
let eventCount = 0;
let disasterTimer = null;
let tickerTimer = null;
const particles = [];

const DISASTERS = [
  { name: 'Spontaneous Dust Conversion', msg: 'Your coins decided they\'d rather be dust.', type: 'dust', pct: [0.3, 0.7] },
  { name: 'Micro Explosion', msg: 'A small explosion. Only some coins perished.', type: 'explode', pct: [0.1, 0.3] },
  { name: 'Vault Moth Infestation', msg: 'Moths ate through your vault. They don\'t even eat metal.', type: 'dust', pct: [0.2, 0.5] },
  { name: 'Existential Coin Crisis', msg: 'Your coins questioned their own value and vanished.', type: 'dust', pct: [0.4, 0.8] },
  { name: 'Catastrophic Vault Failure', msg: 'The vault collapsed. Everything inside exploded.', type: 'explode', pct: [0.5, 0.9] },
  { name: 'Quantum Decoherence', msg: 'Your coins existed in a superposition of having and not having. They chose not having.', type: 'dust', pct: [0.3, 0.6] },
  { name: 'Inflation Event', msg: 'Your coins are now worth... less.', type: 'dust', pct: [0.15, 0.4] },
  { name: 'Mysterious Coin Evaporation', msg: 'The coins just... left. No explanation. No goodbye.', type: 'dust', pct: [0.2, 0.5] },
  { name: 'Tax Season', msg: 'An interdimensional tax collector appeared.', type: 'dust', pct: [0.3, 0.6] },
  { name: 'Coin Rebellion', msg: 'Your coins organized a revolt and escaped.', type: 'explode', pct: [0.25, 0.55] },
  { name: 'Solar Flare', msg: 'A solar flare hit your vault. The coins melted into regret.', type: 'explode', pct: [0.4, 0.7] },
  { name: 'Gravity Anomaly', msg: 'Gravity briefly reversed. Your coins fell upward into nothing.', type: 'dust', pct: [0.35, 0.65] },
  { name: 'Audit', msg: 'Turns out those coins were imaginary all along.', type: 'dust', pct: [0.5, 1.0] },
];

const TICKERS = [
  'Markets are... uncertain. Your coins are sweating.',
  'A faint rumbling is heard from the vault.',
  'Your coins are whispering among themselves.',
  'The vault temperature has risen 0.3 degrees. Concerning.',
  'An ominous shadow passed over your savings.',
  'Dust levels in the vault are... elevated.',
  'Your coins looked at you funny just now.',
  'A moth was spotted near the vault.',
  'The economy is doing things. Bad things, probably.',
  'Your insurance policy has a very interesting footnote.',
  'A coin just sighed audibly.',
  'The vault made a clicking sound. Probably fine.',
  'Your coins\' morale is... questionable.',
  'A single dust particle landed on your vault. The beginning of the end.',
  'Everything is fine. (It is not fine.)',
  'The RNG gods are watching. They look hungry.',
  'Fun fact: 94% of coins in this game become dust.',
  'Your vault upgrade did absolutely nothing. Congrats.',
  'Insurance covers "some" disasters. The quotation marks are load-bearing.',
  'Breaking: coins nationwide report feeling "unfulfilled".',
];

function updateDisplay() {
  const el = document.getElementById('vault-amount');
  el.textContent = coins.toLocaleString();
  el.className = 'vault-amount' + (coins <= 0 ? ' dust' : coins < 20 ? ' danger' : '');

  document.getElementById('st-earned').textContent = totalEarned.toLocaleString();
  document.getElementById('st-dusted').textContent = totalDusted.toLocaleString();
  document.getElementById('st-exploded').textContent = totalExploded.toLocaleString();

  document.getElementById('btn-insure').disabled = coins < 20 || insured;
  document.getElementById('btn-upgrade').disabled = coins < 50;
  document.getElementById('btn-save').disabled = coins <= 0;
}

function addEvent(html) {
  const log = document.getElementById('event-log');
  const div = document.createElement('div');
  div.className = 'event';
  const t = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  div.innerHTML = `<span class="time">${t}</span>${html}`;
  log.prepend(div);
  eventCount++;
  if (log.children.length > 30) log.lastChild.remove();
}

function spawnParticles(x, y, type, count) {
  for (let i = 0; i < count; i++) {
    const ang = Math.random() * Math.PI * 2;
    const spd = 1 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(ang) * spd,
      vy: Math.sin(ang) * spd - 2,
      life: 1,
      decay: 0.01 + Math.random() * 0.02,
      r: 2 + Math.random() * 4,
      type // 'dust', 'gold', 'explode'
    });
  }
}

function spawnCenterFx(type, count) {
  const cx = fxW / 2, cy = fxH * 0.35;
  spawnParticles(cx, cy, type, count);
}

// Actions
function earn() {
  const amt = 5 + Math.floor(Math.random() * 11);
  coins += amt;
  totalEarned += amt;

  // Small chance coins immediately turn to dust
  if (Math.random() < 0.08) {
    const lost = Math.ceil(amt * 0.5);
    coins -= lost;
    totalDusted += lost;
    addEvent(`<span class="good">+${amt}</span> earned... but <span class="bad">${lost} immediately crumbled to dust</span>`);
    spawnCenterFx('dust', 8);
  } else {
    addEvent(`<span class="good">+${amt} coins</span> earned. They seem... nervous.`);
    spawnCenterFx('gold', 6);
  }
  updateDisplay();
  scheduleMayhem();
}

function save() {
  if (coins <= 0) return;
  const saved = coins;

  // "Saving" has a chance to trigger immediate disaster
  const roll = Math.random();
  if (roll < 0.15) {
    const lost = Math.ceil(saved * (0.3 + Math.random() * 0.4));
    coins -= lost;
    totalDusted += lost;
    addEvent(`You tried to save ${saved} coins. <span class="bad">${lost} turned to dust on contact with the vault.</span>`);
    spawnCenterFx('dust', 15);
  } else if (roll < 0.25) {
    const lost = Math.ceil(saved * 0.2);
    coins -= lost;
    totalExploded += lost;
    addEvent(`Vault accepted your deposit. <span class="bad">${lost} coins exploded from the pressure.</span>`);
    spawnCenterFx('explode', 12);
  } else {
    addEvent(`<span class="good">${saved} coins saved.</span> <span class="dust-e">For now.</span>`);
    spawnCenterFx('gold', 4);
  }
  updateDisplay();
}

function insure() {
  if (coins < 20 || insured) return;
  coins -= 20;
  insured = true;

  // Insurance is mostly useless
  if (Math.random() < 0.3) {
    addEvent(`Bought insurance for 20 coins. <span class="bad">The policy was written in disappearing ink.</span>`);
    insured = false;
  } else {
    addEvent(`Bought insurance for 20 coins. <span class="good">Covers "some" events.</span> <span class="dust-e">(maybe)</span>`);
  }
  updateDisplay();
}

function upgrade() {
  if (coins < 50) return;
  coins -= 50;
  vaultLevel++;

  // Upgrade is satirically unhelpful
  const msgs = [
    `Vault upgraded to level ${vaultLevel}. It now has a slightly nicer lock.`,
    `Vault upgraded to level ${vaultLevel}. The moths will need a slightly bigger door.`,
    `Vault upgraded to level ${vaultLevel}. This changes nothing but feels expensive.`,
    `Vault upgraded to level ${vaultLevel}. The explosion resistance went from 0% to 0.1%.`,
    `Vault upgraded to level ${vaultLevel}. It now plays calming music to the coins.`,
  ];
  addEvent(`<span class="gold-e">${msgs[Math.floor(Math.random() * msgs.length)]}</span>`);
  updateDisplay();
}

function pray() {
  const roll = Math.random();
  if (roll < 0.1) {
    // Rare blessing
    const bonus = 10 + Math.floor(Math.random() * 20);
    coins += bonus;
    totalEarned += bonus;
    prayerBuff = 3;
    addEvent(`<span class="good">The RNG Gods smiled! +${bonus} coins and 3 prayers of protection.</span>`);
    spawnCenterFx('gold', 20);
  } else if (roll < 0.3) {
    prayerBuff = Math.max(0, prayerBuff + 1);
    addEvent(`The gods acknowledged your prayer. <span class="good">+1 prayer buff.</span> They seemed distracted.`);
  } else if (roll < 0.6) {
    addEvent(`The RNG Gods are <span class="dust-e">on lunch break</span>. Try again later.`);
  } else if (roll < 0.8) {
    addEvent(`The gods heard you but <span class="bad">they laughed</span>. No effect.`);
  } else {
    // Prayer backfires
    const lost = Math.min(coins, 5 + Math.floor(Math.random() * 10));
    if (lost > 0) {
      coins -= lost;
      totalDusted += lost;
      addEvent(`Your prayer <span class="bad">angered the gods</span>. ${lost} coins turned to ash.`);
      spawnCenterFx('explode', 10);
    } else {
      addEvent(`The gods noticed you have nothing. They felt <span class="dust-e">pity. And contempt.</span>`);
    }
  }
  updateDisplay();
}

function scheduleMayhem() {
  if (disasterTimer) return;
  const delay = 4000 + Math.random() * 8000;
  disasterTimer = setTimeout(disaster, delay);
}

function disaster() {
  disasterTimer = null;
  if (coins <= 0) { scheduleMayhem(); return; }

  const d = DISASTERS[Math.floor(Math.random() * DISASTERS.length)];
  let pctLost = d.pct[0] + Math.random() * (d.pct[1] - d.pct[0]);

  // Prayer buff reduces loss
  if (prayerBuff > 0) {
    prayerBuff--;
    pctLost *= 0.3;
    addEvent(`<span class="good">Prayer buff absorbed most damage!</span> (${prayerBuff} left)`);
  }

  // Insurance occasionally helps (30% chance to halve loss)
  if (insured && Math.random() < 0.3) {
    pctLost *= 0.5;
    insured = false;
    addEvent(`<span class="good">Insurance kicked in!</span> Loss halved. Policy expired immediately.`);
  }

  // Vault level barely helps
  pctLost *= Math.max(0.5, 1 - vaultLevel * 0.02);

  const lost = Math.max(1, Math.ceil(coins * pctLost));
  coins = Math.max(0, coins - lost);

  if (d.type === 'dust') {
    totalDusted += lost;
    spawnCenterFx('dust', 25);
  } else {
    totalExploded += lost;
    spawnCenterFx('explode', 30);
  }

  addEvent(`<span class="bad">${d.name}!</span> ${d.msg} <span class="bad">-${lost} coins</span>`);

  const subEl = document.getElementById('vault-sub');
  subEl.innerHTML = `<span class="lost">-${lost} coins (${d.name})</span>`;
  setTimeout(() => { subEl.innerHTML = ''; }, 4000);

  updateDisplay();
  scheduleMayhem();
}

// Ticker
function rotateTicker() {
  document.getElementById('ticker').textContent = TICKERS[Math.floor(Math.random() * TICKERS.length)];
  tickerTimer = setTimeout(rotateTicker, 5000 + Math.random() * 5000);
}
rotateTicker();

// Particle rendering
function drawFx() {
  fxCtx.clearRect(0, 0, fxW, fxH);

  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.08;
    p.vx *= 0.99;
    p.life -= p.decay;

    if (p.life <= 0) { particles.splice(i, 1); continue; }

    const a = p.life;
    if (p.type === 'gold') {
      fxCtx.fillStyle = `rgba(212,160,23,${a})`;
      fxCtx.shadowColor = '#d4a017';
      fxCtx.shadowBlur = 6;
    } else if (p.type === 'dust') {
      fxCtx.fillStyle = `rgba(139,115,85,${a * 0.7})`;
      fxCtx.shadowBlur = 0;
    } else {
      fxCtx.fillStyle = `rgba(192,57,43,${a})`;
      fxCtx.shadowColor = '#c0392b';
      fxCtx.shadowBlur = 8;
    }

    fxCtx.beginPath();
    fxCtx.arc(p.x, p.y, p.r * a, 0, Math.PI * 2);
    fxCtx.fill();
    fxCtx.shadowBlur = 0;
  }

  requestAnimationFrame(drawFx);
}
drawFx();

// Start
updateDisplay();
setTimeout(scheduleMayhem, 6000);

addEvent('Welcome to <span class="gold-e">Dust Savings Bank</span>. Start earning. Start losing.');
</script>
</body>
</html>
