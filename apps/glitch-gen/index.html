<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Glitch Gen</title>
<link rel="icon" href="https://emojicdn.elk.sh/📟">
<meta property="og:title" content="Glitch Gen">
<meta property="og:description" content="Neon glitch art generator — real-time canvas corruption with 8 effects">
<meta property="og:url" content="https://sloppy.live/glitch-gen">
<meta property="og:image" content="https://sloppy.live/glitch-gen/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;500&family=Anybody:wght@100;800&display=swap" rel="stylesheet">
<style>
:root{--bg:#06060e;--fg:#c0c8d8;--dim:#4a4e5a;--accent:#0ff;--pink:#ff2a8a;--yellow:#ffe04a;--panel:#0c0c18;--border:#1a1a2e}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--fg);font-family:'IBM Plex Mono',monospace;font-weight:300;font-size:12px;min-height:100vh;display:flex;flex-direction:column}
.back-link{position:fixed;top:6px;left:8px;color:var(--dim);font-size:10px;text-decoration:none;z-index:100}
.back-link:hover{color:var(--accent)}
header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.logo{font-family:'Anybody',sans-serif;font-weight:800;font-size:16px;color:var(--accent);letter-spacing:-0.5px}
.logo span{font-weight:100;color:var(--pink);margin-left:2px}
.header-btns{display:flex;gap:6px}
.hbtn{padding:4px 12px;border:1px solid var(--border);background:none;color:var(--fg);font-family:'IBM Plex Mono',monospace;font-size:10px;cursor:pointer;transition:all 0.12s}
.hbtn:hover{border-color:var(--accent);color:var(--accent)}
.main{flex:1;display:flex;overflow:hidden}
@media(max-width:700px){.main{flex-direction:column}}

/* Canvas area */
.canvas-wrap{flex:1;display:flex;align-items:center;justify-content:center;position:relative;background:#000;overflow:hidden;min-height:300px}
canvas{display:block;max-width:100%;max-height:100%;image-rendering:auto}
.canvas-overlay{position:absolute;top:8px;right:8px;display:flex;gap:4px;z-index:5}
.co-btn{width:28px;height:28px;border:1px solid var(--border);background:rgba(6,6,14,0.7);color:var(--fg);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.co-btn:hover{border-color:var(--accent);color:var(--accent)}
.fps{position:absolute;bottom:6px;left:8px;font-size:9px;color:var(--dim);z-index:5}

/* Controls panel */
.panel{width:260px;background:var(--panel);border-left:1px solid var(--border);overflow-y:auto;padding:12px;flex-shrink:0}
@media(max-width:700px){.panel{width:100%;border-left:none;border-top:1px solid var(--border);max-height:50vh}}
.section{margin-bottom:14px}
.section-title{font-family:'Anybody',sans-serif;font-weight:800;font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--dim);margin-bottom:8px}
.ctrl{margin-bottom:8px}
.ctrl label{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px;font-size:10px;color:var(--fg)}
.ctrl label span{color:var(--dim);font-size:9px}
.ctrl input[type=range]{width:100%;height:4px;-webkit-appearance:none;background:var(--border);outline:none;border-radius:0}
.ctrl input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;background:var(--accent);border:none;cursor:pointer}
.ctrl input[type=range]::-moz-range-thumb{width:10px;height:10px;background:var(--accent);border:none;cursor:pointer}
.toggle-row{display:flex;align-items:center;justify-content:space-between;padding:4px 0}
.toggle-row label{font-size:10px;cursor:pointer}
.toggle-row input{accent-color:var(--accent);cursor:pointer}
.preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.preset-btn{padding:6px;border:1px solid var(--border);background:none;color:var(--fg);font-family:'IBM Plex Mono',monospace;font-size:9px;cursor:pointer;text-align:left;transition:all 0.1s}
.preset-btn:hover{border-color:var(--pink);color:var(--pink)}
.color-row{display:flex;gap:4px;flex-wrap:wrap}
.color-swatch{width:24px;height:24px;border:2px solid transparent;cursor:pointer;transition:border-color 0.1s}
.color-swatch.active{border-color:#fff}
select{width:100%;padding:5px;background:var(--bg);border:1px solid var(--border);color:var(--fg);font-family:'IBM Plex Mono',monospace;font-size:10px}
</style>
</head>
<body>
<a class="back-link" href="https://sloppy.live">← sloppy.live</a>
<header>
  <div class="logo">GLITCH<span>GEN</span></div>
  <div class="header-btns">
    <button class="hbtn" onclick="randomize()">Random</button>
    <button class="hbtn" onclick="saveImage()">Save PNG</button>
  </div>
</header>
<div class="main">
  <div class="canvas-wrap">
    <canvas id="cv"></canvas>
    <div class="canvas-overlay">
      <button class="co-btn" onclick="togglePause()" id="pause-btn" title="Pause">⏸</button>
      <button class="co-btn" onclick="glitchNow()" title="Force glitch">⚡</button>
    </div>
    <div class="fps" id="fps">--</div>
  </div>
  <div class="panel">
    <div class="section">
      <div class="section-title">Source</div>
      <select id="source-sel" onchange="changeSource()">
        <option value="gradient">Neon Gradient</option>
        <option value="shapes">Geometric</option>
        <option value="noise">Color Noise</option>
        <option value="grid">Pixel Grid</option>
        <option value="text">Glitch Text</option>
        <option value="upload">Upload Image...</option>
      </select>
    </div>
    <div class="section">
      <div class="section-title">Palette</div>
      <div class="color-row" id="palette-row"></div>
    </div>
    <div class="section">
      <div class="section-title">Effects</div>
      <div class="toggle-row"><label><input type="checkbox" id="fx-shift" checked> Channel Shift</label></div>
      <div class="toggle-row"><label><input type="checkbox" id="fx-scan" checked> Scanlines</label></div>
      <div class="toggle-row"><label><input type="checkbox" id="fx-slice" checked> Pixel Slice</label></div>
      <div class="toggle-row"><label><input type="checkbox" id="fx-corrupt" checked> Data Corrupt</label></div>
      <div class="toggle-row"><label><input type="checkbox" id="fx-rgb"> RGB Split</label></div>
      <div class="toggle-row"><label><input type="checkbox" id="fx-wave"> Wave Distort</label></div>
      <div class="toggle-row"><label><input type="checkbox" id="fx-invert"> Color Invert</label></div>
      <div class="toggle-row"><label><input type="checkbox" id="fx-pixel"> Pixelate</label></div>
    </div>
    <div class="section">
      <div class="section-title">Controls</div>
      <div class="ctrl">
        <label>Intensity <span id="v-intensity">50</span></label>
        <input type="range" id="sl-intensity" min="0" max="100" value="50" oninput="document.getElementById('v-intensity').textContent=this.value">
      </div>
      <div class="ctrl">
        <label>Speed <span id="v-speed">40</span></label>
        <input type="range" id="sl-speed" min="5" max="100" value="40" oninput="document.getElementById('v-speed').textContent=this.value">
      </div>
      <div class="ctrl">
        <label>Slice Width <span id="v-slice">30</span></label>
        <input type="range" id="sl-slice" min="2" max="80" value="30" oninput="document.getElementById('v-slice').textContent=this.value">
      </div>
      <div class="ctrl">
        <label>Corruption <span id="v-corrupt">25</span></label>
        <input type="range" id="sl-corrupt" min="0" max="100" value="25" oninput="document.getElementById('v-corrupt').textContent=this.value">
      </div>
    </div>
    <div class="section">
      <div class="section-title">Presets</div>
      <div class="preset-grid">
        <button class="preset-btn" onclick="loadPreset('vaporwave')">Vaporwave</button>
        <button class="preset-btn" onclick="loadPreset('cyberpunk')">Cyberpunk</button>
        <button class="preset-btn" onclick="loadPreset('corrupted')">Corrupted</button>
        <button class="preset-btn" onclick="loadPreset('minimal')">Minimal</button>
        <button class="preset-btn" onclick="loadPreset('chaos')">Full Chaos</button>
        <button class="preset-btn" onclick="loadPreset('retro')">CRT Retro</button>
      </div>
    </div>
  </div>
</div>

<script>
var C=document.getElementById('cv'),X=C.getContext('2d',{willReadFrequently:true});
var CW=640,CH=480;
C.width=CW;C.height=CH;

var paused=false,frame=0,lastFps=0,fpsCount=0,fpsTime=0;
var sourceImg=null;
var forceGlitch=0;

var PALETTES=[
  {name:'Neon',colors:['#0ff','#ff2a8a','#ffe04a','#8aff8a','#a06aff']},
  {name:'Vapor',colors:['#ff71ce','#01cdfe','#05ffa1','#b967ff','#fffb96']},
  {name:'Cyber',colors:['#f72585','#7209b7','#3a0ca3','#4361ee','#4cc9f0']},
  {name:'Acid',colors:['#00ff41','#ff073a','#fff01f','#ff6ec7','#00d4ff']},
  {name:'Mono',colors:['#ffffff','#aaaaaa','#666666','#333333','#000000']},
  {name:'Blood',colors:['#ff0000','#8b0000','#ff4444','#440000','#ffaaaa']}
];
var currentPalette=0;

function buildPaletteRow(){
  var row=document.getElementById('palette-row');
  row.innerHTML='';
  PALETTES.forEach(function(p,i){
    var sw=document.createElement('div');
    sw.className='color-swatch'+(i===currentPalette?' active':'');
    sw.style.background='linear-gradient(135deg,'+p.colors[0]+','+p.colors[1]+','+p.colors[2]+')';
    sw.title=p.name;
    sw.onclick=function(){currentPalette=i;buildPaletteRow();};
    row.appendChild(sw);
  });
}
buildPaletteRow();

function pal(){return PALETTES[currentPalette].colors;}

// Source generators
function drawSource(){
  var src=document.getElementById('source-sel').value;
  var colors=pal();
  var t=frame*0.02;

  if(src==='gradient'){
    var g=X.createLinearGradient(0,0,CW,CH);
    var shift=Math.sin(t*0.3)*0.2;
    g.addColorStop(0,colors[0]);
    g.addColorStop(0.25+shift,colors[1]);
    g.addColorStop(0.5,colors[2]);
    g.addColorStop(0.75-shift,colors[3%colors.length]);
    g.addColorStop(1,colors[4%colors.length]);
    X.fillStyle=g;
    X.fillRect(0,0,CW,CH);
    // Add some circles
    for(var i=0;i<5;i++){
      var cx=CW*0.2+Math.sin(t+i*1.3)*CW*0.3;
      var cy=CH*0.3+Math.cos(t*0.7+i*0.9)*CH*0.2;
      var r=40+Math.sin(t*0.5+i)*30;
      var cg=X.createRadialGradient(cx,cy,0,cx,cy,r);
      cg.addColorStop(0,colors[i%colors.length]);
      cg.addColorStop(1,'transparent');
      X.fillStyle=cg;
      X.fillRect(cx-r,cy-r,r*2,r*2);
    }
  }else if(src==='shapes'){
    X.fillStyle='#000';X.fillRect(0,0,CW,CH);
    for(var i=0;i<12;i++){
      X.save();
      var cx=CW*(0.15+0.7*(i%4)/3);
      var cy=CH*(0.2+0.6*Math.floor(i/4)/2);
      X.translate(cx,cy);
      X.rotate(t*0.3+i);
      X.fillStyle=colors[i%colors.length];
      var sz=30+Math.sin(t+i)*15;
      if(i%3===0)X.fillRect(-sz,-sz,sz*2,sz*2);
      else if(i%3===1){X.beginPath();X.arc(0,0,sz,0,Math.PI*2);X.fill();}
      else{X.beginPath();X.moveTo(0,-sz);X.lineTo(sz,sz);X.lineTo(-sz,sz);X.closePath();X.fill();}
      X.restore();
    }
  }else if(src==='noise'){
    var id=X.createImageData(CW,CH);
    var d=id.data;
    var seed=Math.floor(t*2);
    for(var i=0;i<d.length;i+=4){
      var px=((i/4)%CW);
      var py=Math.floor((i/4)/CW);
      var ci=Math.floor((Math.sin(px*0.02+seed)+Math.cos(py*0.03+seed))*2.5+2.5)%colors.length;
      var c=hexToRgb(colors[ci]);
      var noise=Math.random()*60-30;
      d[i]=Math.max(0,Math.min(255,c.r+noise));
      d[i+1]=Math.max(0,Math.min(255,c.g+noise));
      d[i+2]=Math.max(0,Math.min(255,c.b+noise));
      d[i+3]=255;
    }
    X.putImageData(id,0,0);
  }else if(src==='grid'){
    X.fillStyle='#000';X.fillRect(0,0,CW,CH);
    var gs=16;
    for(var y=0;y<CH;y+=gs){
      for(var x=0;x<CW;x+=gs){
        if(Math.random()<0.7){
          X.fillStyle=colors[Math.floor(Math.random()*colors.length)];
          X.globalAlpha=0.3+Math.random()*0.7;
          X.fillRect(x,y,gs-1,gs-1);
        }
      }
    }
    X.globalAlpha=1;
  }else if(src==='text'){
    X.fillStyle='#000';X.fillRect(0,0,CW,CH);
    var words=['GLITCH','ERROR','VOID','NULL','CORRUPT','0xFF','SIGNAL','NOISE','BREAK','FAULT'];
    X.textAlign='center';
    for(var i=0;i<8;i++){
      X.fillStyle=colors[i%colors.length];
      X.font=(24+Math.floor(Math.random()*40))+'px "Anybody"';
      X.globalAlpha=0.4+Math.random()*0.6;
      X.fillText(words[Math.floor(Math.random()*words.length)],
        80+Math.random()*(CW-160),60+Math.random()*(CH-120));
    }
    X.globalAlpha=1;X.textAlign='left';
  }else if(src==='upload'&&sourceImg){
    X.fillStyle='#000';X.fillRect(0,0,CW,CH);
    var scale=Math.min(CW/sourceImg.width,CH/sourceImg.height);
    var dw=sourceImg.width*scale,dh=sourceImg.height*scale;
    X.drawImage(sourceImg,(CW-dw)/2,(CH-dh)/2,dw,dh);
  }
}

function hexToRgb(hex){
  var r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return{r:r,g:g,b:b};
}

// Glitch effects
function applyEffects(){
  var intensity=parseInt(document.getElementById('sl-intensity').value)/100;
  var sliceW=parseInt(document.getElementById('sl-slice').value);
  var corrupt=parseInt(document.getElementById('sl-corrupt').value)/100;
  intensity=Math.min(1,intensity+(forceGlitch>0?0.5:0));

  if(document.getElementById('fx-pixel').checked){
    var ps=4+Math.floor((1-intensity)*12);
    var tmp=X.getImageData(0,0,CW,CH);
    X.clearRect(0,0,CW,CH);
    for(var y=0;y<CH;y+=ps){
      for(var x=0;x<CW;x+=ps){
        var idx=((y*CW)+x)*4;
        X.fillStyle='rgb('+tmp.data[idx]+','+tmp.data[idx+1]+','+tmp.data[idx+2]+')';
        X.fillRect(x,y,ps,ps);
      }
    }
  }

  if(document.getElementById('fx-shift').checked){
    var shiftAmt=Math.floor(intensity*40)+2;
    var id=X.getImageData(0,0,CW,CH);
    var d=id.data;
    for(var y=0;y<CH;y++){
      if(Math.random()<intensity*0.3){
        var shift=Math.floor((Math.random()-0.5)*shiftAmt*2);
        for(var x=0;x<CW;x++){
          var si=((y*CW)+x)*4;
          var sx=x+shift;
          if(sx>=0&&sx<CW){
            var di=((y*CW)+sx)*4;
            d[di]=id.data[si]; // shift red only
          }
        }
      }
    }
    X.putImageData(id,0,0);
  }

  if(document.getElementById('fx-slice').checked){
    var numSlices=Math.floor(intensity*8)+1;
    for(var i=0;i<numSlices;i++){
      if(Math.random()>0.6)continue;
      var sy=Math.floor(Math.random()*CH);
      var sh=2+Math.floor(Math.random()*sliceW);
      var sx=Math.floor((Math.random()-0.5)*intensity*100);
      var slice=X.getImageData(0,sy,CW,sh);
      X.putImageData(slice,sx,sy);
    }
  }

  if(document.getElementById('fx-corrupt').checked&&corrupt>0){
    var id2=X.getImageData(0,0,CW,CH);
    var d2=id2.data;
    var numCorrupt=Math.floor(corrupt*CW*CH*0.005);
    for(var i=0;i<numCorrupt;i++){
      var idx=Math.floor(Math.random()*d2.length/4)*4;
      var ch=Math.floor(Math.random()*3);
      d2[idx+ch]=Math.floor(Math.random()*256);
    }
    X.putImageData(id2,0,0);
  }

  if(document.getElementById('fx-rgb').checked){
    var split=Math.floor(intensity*12)+1;
    var orig=X.getImageData(0,0,CW,CH);
    X.clearRect(0,0,CW,CH);
    // Red
    X.globalCompositeOperation='screen';
    var rd=X.createImageData(CW,CH);
    for(var i=0;i<orig.data.length;i+=4){rd.data[i]=orig.data[i];rd.data[i+3]=200;}
    X.putImageData(rd,-split,-split);
    // Green
    var gd=X.createImageData(CW,CH);
    for(var i=0;i<orig.data.length;i+=4){gd.data[i+1]=orig.data[i+1];gd.data[i+3]=200;}
    X.putImageData(gd,0,0);
    // Blue
    var bd=X.createImageData(CW,CH);
    for(var i=0;i<orig.data.length;i+=4){bd.data[i+2]=orig.data[i+2];bd.data[i+3]=200;}
    X.putImageData(bd,split,split);
    X.globalCompositeOperation='source-over';
  }

  if(document.getElementById('fx-wave').checked){
    var img=X.getImageData(0,0,CW,CH);
    var out=X.createImageData(CW,CH);
    var amp=intensity*20;
    var freq=0.02+intensity*0.03;
    for(var y=0;y<CH;y++){
      var offset=Math.floor(Math.sin(y*freq+frame*0.05)*amp);
      for(var x=0;x<CW;x++){
        var sx=x+offset;
        if(sx>=0&&sx<CW){
          var si=(y*CW+sx)*4;
          var di=(y*CW+x)*4;
          out.data[di]=img.data[si];
          out.data[di+1]=img.data[si+1];
          out.data[di+2]=img.data[si+2];
          out.data[di+3]=255;
        }
      }
    }
    X.putImageData(out,0,0);
  }

  if(document.getElementById('fx-scan').checked){
    X.fillStyle='rgba(0,0,0,0.12)';
    for(var y=0;y<CH;y+=3){X.fillRect(0,y,CW,1);}
    // Occasional bright scanline
    if(Math.random()<intensity*0.15){
      var sly=Math.floor(Math.random()*CH);
      X.fillStyle='rgba(255,255,255,0.06)';
      X.fillRect(0,sly,CW,2);
    }
  }

  if(document.getElementById('fx-invert').checked){
    var id3=X.getImageData(0,0,CW,CH);
    var d3=id3.data;
    for(var i=0;i<d3.length;i+=4){
      d3[i]=255-d3[i];d3[i+1]=255-d3[i+1];d3[i+2]=255-d3[i+2];
    }
    X.putImageData(id3,0,0);
  }

  if(forceGlitch>0)forceGlitch--;
}

function changeSource(){
  var sel=document.getElementById('source-sel');
  if(sel.value==='upload'){
    var inp=document.createElement('input');
    inp.type='file';inp.accept='image/*';
    inp.onchange=function(e){
      var f=e.target.files[0];if(!f)return;
      var img=new Image();
      img.onload=function(){sourceImg=img;};
      img.src=URL.createObjectURL(f);
    };
    inp.click();
  }
}

function togglePause(){
  paused=!paused;
  document.getElementById('pause-btn').textContent=paused?'▶':'⏸';
}

function glitchNow(){forceGlitch=20;}

function saveImage(){
  var link=document.createElement('a');
  link.download='glitch-'+Date.now()+'.png';
  link.href=C.toDataURL('image/png');
  link.click();
}

function randomize(){
  currentPalette=Math.floor(Math.random()*PALETTES.length);
  buildPaletteRow();
  var sources=['gradient','shapes','noise','grid','text'];
  document.getElementById('source-sel').value=sources[Math.floor(Math.random()*sources.length)];
  ['fx-shift','fx-scan','fx-slice','fx-corrupt','fx-rgb','fx-wave','fx-invert','fx-pixel'].forEach(function(id){
    document.getElementById(id).checked=Math.random()<0.45;
  });
  document.getElementById('sl-intensity').value=20+Math.floor(Math.random()*60);
  document.getElementById('sl-speed').value=20+Math.floor(Math.random()*60);
  document.getElementById('sl-slice').value=5+Math.floor(Math.random()*50);
  document.getElementById('sl-corrupt').value=Math.floor(Math.random()*50);
  ['v-intensity','v-speed','v-slice','v-corrupt'].forEach(function(id){
    var sl=document.getElementById(id.replace('v-','sl-'));
    document.getElementById(id).textContent=sl.value;
  });
  forceGlitch=15;
}

var PRESETS={
  vaporwave:{pal:1,src:'gradient',fx:{shift:1,scan:1,slice:0,corrupt:0,rgb:1,wave:1,invert:0,pixel:0},int:35,spd:25,sl:20,cor:10},
  cyberpunk:{pal:2,src:'shapes',fx:{shift:1,scan:1,slice:1,corrupt:1,rgb:0,wave:0,invert:0,pixel:0},int:55,spd:50,sl:25,cor:30},
  corrupted:{pal:0,src:'text',fx:{shift:1,scan:0,slice:1,corrupt:1,rgb:1,wave:0,invert:0,pixel:0},int:80,spd:60,sl:50,cor:60},
  minimal:{pal:4,src:'gradient',fx:{shift:0,scan:1,slice:0,corrupt:0,rgb:0,wave:1,invert:0,pixel:0},int:20,spd:20,sl:10,cor:5},
  chaos:{pal:3,src:'noise',fx:{shift:1,scan:1,slice:1,corrupt:1,rgb:1,wave:1,invert:0,pixel:1},int:90,spd:80,sl:60,cor:70},
  retro:{pal:0,src:'grid',fx:{shift:1,scan:1,slice:0,corrupt:0,rgb:0,wave:0,invert:0,pixel:1},int:40,spd:30,sl:15,cor:15}
};

function loadPreset(name){
  var p=PRESETS[name];if(!p)return;
  currentPalette=p.pal;buildPaletteRow();
  document.getElementById('source-sel').value=p.src;
  document.getElementById('fx-shift').checked=!!p.fx.shift;
  document.getElementById('fx-scan').checked=!!p.fx.scan;
  document.getElementById('fx-slice').checked=!!p.fx.slice;
  document.getElementById('fx-corrupt').checked=!!p.fx.corrupt;
  document.getElementById('fx-rgb').checked=!!p.fx.rgb;
  document.getElementById('fx-wave').checked=!!p.fx.wave;
  document.getElementById('fx-invert').checked=!!p.fx.invert;
  document.getElementById('fx-pixel').checked=!!p.fx.pixel;
  document.getElementById('sl-intensity').value=p.int;document.getElementById('v-intensity').textContent=p.int;
  document.getElementById('sl-speed').value=p.spd;document.getElementById('v-speed').textContent=p.spd;
  document.getElementById('sl-slice').value=p.sl;document.getElementById('v-slice').textContent=p.sl;
  document.getElementById('sl-corrupt').value=p.cor;document.getElementById('v-corrupt').textContent=p.cor;
  forceGlitch=10;
}

// Main loop
var lastT=0;
function loop(ts){
  var dt=ts-lastT;
  fpsCount++;
  if(ts-fpsTime>1000){
    lastFps=fpsCount;fpsCount=0;fpsTime=ts;
    document.getElementById('fps').textContent=lastFps+' fps';
  }

  var speed=parseInt(document.getElementById('sl-speed').value);
  if(!paused&&(dt>1000/speed||forceGlitch>0)){
    lastT=ts;frame++;
    drawSource();
    applyEffects();
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
