<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Catweazle — wizard out of his century</title>
<meta name="description" content="An 11th-century wizard wakes up in rural England in 2026, with his toad Touchwood. Find the runes, return to your time, do not be bewildered.">
<meta property="og:title" content="Catweazle">
<meta property="og:description" content="An 11th-century wizard wakes up in rural England, 2026. A whimsical RPG of hexes, lore, and the slow horror of modern plumbing.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://sloppy.live/catweazle/">
<meta property="og:image" content="https://image.pollinations.ai/prompt/medieval%20illuminated%20manuscript%20of%20a%20long-bearded%20wizard%20with%20a%20toad%20familiar%20standing%20in%20a%20modern%20english%20village%20with%20a%20red%20phone%20box%20and%20a%20tractor%20earthy%20parchment%20colors%20centered?width=1200&height=630&model=flux&nologo=true&seed=10662">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%A7%99">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&family=Crimson+Pro:ital,wght@0,400;0,600;1,400;1,500&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<style>
:root{
  --paper: #f0e0bf;
  --paper-2: #e7d3a0;
  --ink: #2c1808;
  --ink-soft: #6a4a25;
  --moss: #4e7a3a;
  --moss-dark: #2e4a22;
  --rose: #a3401a;
  --rose-dark: #6a2810;
  --gold: #8a5a18;
  --line: rgba(44,24,8,0.18);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;min-height:100vh;background:#1a1208;color:var(--ink);font-family:'Crimson Pro', serif;font-size:16px;line-height:1.55}
body{
  background:
    radial-gradient(70vmin 70vmin at 18% 14%, rgba(217,164,58,0.16), transparent 65%),
    radial-gradient(70vmin 60vmin at 82% 86%, rgba(163,64,26,0.10), transparent 65%),
    #1a1208;
  display:flex; justify-content:center; padding: 1rem .8rem 2rem;
  color: var(--paper);
  /* gentle warm-tint filter for 1970s color stock — pulls everything
     toward amber-orange like a faded Kodachrome reel. */
  filter: sepia(0.10) saturate(1.05) contrast(1.02);
}

/* 1970s film grain overlay — SVG fractalNoise tiled, animated with
   stepped transforms so the noise re-positions per frame like real
   16mm grain. Stacks above content but under modals. */
.grain{
  position: fixed; inset: -8vmax;
  z-index: 40; pointer-events: none;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='320' height='320'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.55'/></svg>");
  background-size: 320px 320px;
  mix-blend-mode: overlay;
  opacity: 0.55;
  animation: grainShift 0.45s steps(7) infinite;
}
@keyframes grainShift {
  0%   { transform: translate(0,    0); }
  14%  { transform: translate(-3%, -5%); }
  28%  { transform: translate(-7%,  2%); }
  42%  { transform: translate(2%,  -3%); }
  56%  { transform: translate(5%,   4%); }
  70%  { transform: translate(-4%,  4%); }
  84%  { transform: translate(3%,  -2%); }
  100% { transform: translate(0,    0); }
}
/* horizontal scan-lines + vertical vignette — like watching it on a
   70s wood-cased television set, in your nan's lounge, after dinner */
.scanlines{
  position: fixed; inset: 0; z-index: 41; pointer-events: none;
  background:
    repeating-linear-gradient(0deg,
      rgba(20, 12, 4, 0.18) 0 1px, transparent 1px 4px);
  mix-blend-mode: multiply;
  opacity: 0.55;
}
.vignette{
  position: fixed; inset: 0; z-index: 42; pointer-events: none;
  background:
    radial-gradient(140vmin 110vmin at 50% 50%, transparent 50%, rgba(20, 8, 0, 0.45) 100%);
  mix-blend-mode: multiply;
}
/* a barely-there flicker on the whole body, like a tape that's seen better days */
.flicker{
  position: fixed; inset: 0; z-index: 39; pointer-events: none;
  background: rgba(255, 200, 120, 0.05);
  animation: flickerFrames 4.7s steps(2) infinite;
}
@keyframes flickerFrames {
  0%, 92%, 100% { opacity: 0; }
  93%   { opacity: 0.6; }
  94%   { opacity: 0; }
  96%   { opacity: 0.4; }
  97%   { opacity: 0; }
}
@media (prefers-reduced-motion: reduce){
  .grain, .flicker{ animation: none; }
}

.shell{ width: min(720px, 100%); display:flex; flex-direction:column; gap: 1rem; }

header{
  text-align:center;
  padding-bottom: .7rem;
  border-bottom: 1px dashed rgba(240,224,191,0.18);
}
header .eyebrow{
  font-family:'IM Fell English SC', serif;
  font-size:.85rem; letter-spacing:.15em;
  color: rgba(240,224,191,0.55);
}
h1{
  margin: .1rem 0 .15rem;
  font-family:'IM Fell English', serif; font-weight:400; font-style: italic;
  font-size: clamp(2.4rem, 7vw, 3.8rem); line-height:1;
  color: var(--paper);
  text-shadow: 2px 2px 0 rgba(0,0,0,0.4), 0 0 22px rgba(240,224,191,0.15);
  letter-spacing: .02em;
}
header .tag{
  font-family:'Cormorant Garamond', serif; font-style: italic;
  color: rgba(240,224,191,0.78);
  font-size: clamp(.95rem, 1.7vw, 1.15rem);
}

/* parchment card — main scene */
.parchment{
  background:
    repeating-linear-gradient(7deg,  rgba(44,24,8,0.04) 0 1px, transparent 1px 5px),
    repeating-linear-gradient(101deg, rgba(44,24,8,0.03) 0 1px, transparent 1px 6px),
    radial-gradient(120% 100% at 50% 50%, var(--paper) 0%, var(--paper-2) 100%);
  color: var(--ink);
  border-radius: 4px;
  padding: 1.3rem 1.5rem 1.4rem;
  box-shadow:
    inset 0 0 0 1px rgba(44,24,8,0.10),
    inset 0 0 32px rgba(138,90,24,0.16),
    0 6px 18px rgba(0,0,0,0.45),
    0 0 0 1px rgba(0,0,0,0.4);
  position: relative;
}
.parchment::before, .parchment::after{
  content:''; position: absolute; pointer-events:none;
  width: 60px; height: 60px;
  background: radial-gradient(circle at 50% 50%, rgba(44,24,8,0.25), transparent 75%);
}
.parchment::before{ top: 0; left: 0; }
.parchment::after { bottom: 0; right: 0; }

/* portrait row */
.party{
  display:flex; align-items:center; gap: .9rem;
  margin-bottom: 1rem;
}
.portrait{
  width: 64px; height: 64px;
  flex-shrink: 0;
  background: var(--paper-2);
  border: 1.5px solid var(--ink);
  border-radius: 4px;
  display:grid; place-items:center;
  box-shadow: 2px 2px 0 var(--ink);
}
.portrait svg{ width: 100%; height: 100%; }
.portrait .id{
  font-family:'IM Fell English SC', serif; font-size: .6rem;
  letter-spacing:.18em; color: var(--ink-soft);
}
.party .stats{ flex: 1; display:flex; flex-direction:column; gap: .25rem; min-width: 0; }
.party .extras{ display:flex; flex-direction:column; gap:.35rem; flex-shrink:0; align-items:center; }
.amulet-pill{
  display:inline-flex; align-items:center; gap:.35em;
  background: rgba(138,90,24,0.18);
  border:1.5px solid var(--gold);
  padding: .15rem .45rem;
  border-radius: 999px;
  font-family:'IM Fell English SC', serif; font-size: .58rem;
  letter-spacing:.12em; color: var(--gold);
  text-shadow: 0 0 5px rgba(138,90,24,0.4);
}
.amulet-pill.hidden{ display:none; }
.amulet-pill .charge{
  font-family:'IM Fell English', serif; font-size:.85rem;
  font-style: italic; color: var(--ink); letter-spacing:0;
}
.stat{ display: grid; grid-template-columns: 56px 1fr auto; align-items:center; gap:.4rem;
  font-family:'IM Fell English SC', serif; font-size:.7rem; letter-spacing: .15em; color: var(--ink-soft); }
.stat .bar{
  height: 10px; background: rgba(44,24,8,0.08);
  border: 1px solid var(--ink-soft); border-radius: 1px;
  position: relative; overflow: hidden;
}
.stat .bar .fill{
  position:absolute; left:0; top:0; bottom:0;
  background: var(--moss);
  transition: width .35s ease, background .15s;
}
.stat.hexes .fill { background: var(--rose); }
.stat.lore .fill  { background: var(--gold); }
.stat.bw .fill    { background: var(--moss); }
.stat.bw.warn .fill{ background: #c47a1a; }
.stat.bw.bad .fill { background: var(--rose-dark); }
.stat .v{ font-family:'IM Fell English', serif; font-weight: 400; font-size:.92rem; color: var(--ink); letter-spacing: .04em; min-width: 2.2em; text-align: right; }

/* prose */
/* low-poly diorama (chat ask: Three.js farm / castle environments).
   A small "tv screen" of 3D scenery above the episode plate, swapped
   per scene. Behaves like a portable monitor embedded in the parchment. */
.diorama-frame{
  position: relative;
  margin: 0 -.4rem .8rem;
  height: 152px;
  border: 1.5px solid var(--ink);
  border-bottom-width: 4px;
  border-radius: 4px;
  background: linear-gradient(180deg, #b0c4d8 0%, #cdb986 60%, #8a6a3a 100%);
  overflow: hidden;
  box-shadow: inset 0 0 0 1px rgba(255,255,255,0.18), 2px 3px 0 var(--ink);
}
.diorama-frame canvas{
  display: block; width: 100%; height: 100%;
}
.diorama-frame .label{
  position: absolute; left: 8px; top: 6px; z-index: 2;
  font-family:'IM Fell English SC', serif; font-size: .58rem;
  letter-spacing: .25em; color: rgba(255,255,255,0.85);
  text-shadow: 0 1px 2px rgba(0,0,0,0.45);
}
.diorama-frame::after{
  /* tiny corner crosshairs to give it a 'viewport' feel */
  content: ''; position: absolute; inset: 0;
  background:
    linear-gradient(to right, var(--ink) 1px, transparent 1px) 0 0/8px 100%,
    linear-gradient(to right, var(--ink) 1px, transparent 1px) calc(100% - 7px) 0/8px 100%;
  background-repeat: no-repeat;
  opacity: 0; pointer-events: none;
}

/* episode plate (chat ask: '70s TV episode titles like The Telling Bone').
   A small letterpress-style banner above each scene title. */
.episode-plate{
  display: flex; align-items: baseline; gap: .8rem;
  margin: 0 0 .25rem;
  padding-bottom: .2rem;
  border-bottom: 1px dotted var(--line);
  flex-wrap: wrap;
}
.episode-plate .num{
  font-family:'IM Fell English SC', serif;
  font-size: .68rem; letter-spacing: .25em;
  color: var(--ink-soft);
  background: rgba(138,90,24,0.10);
  border: 1px solid var(--ink-soft);
  padding: .1rem .45rem;
  border-radius: 2px;
}
.episode-plate .title{
  font-family:'IM Fell English', serif; font-style: italic;
  font-size: 1rem; color: var(--ink-soft);
  letter-spacing: .04em;
}
.episode-plate .title::before{ content: '"'; color: var(--gold); margin-right: .15em; }
.episode-plate .title::after { content: '"'; color: var(--gold); margin-left: .15em; }

.scene-title{
  font-family:'IM Fell English', serif; font-style: italic;
  font-size: 1.3rem;
  color: var(--rose-dark);
  margin: 0 0 .55rem;
  letter-spacing: .02em;
}
.scene-title::before{
  content: '☙ '; color: var(--gold);
}
.scene-title::after{
  content: ' ❧'; color: var(--gold);
}
.prose{
  font-family:'Crimson Pro', serif; font-size: 1.05rem;
  color: var(--ink);
  margin-bottom: 1.2rem;
}
.prose p{ margin: .55rem 0; }
.prose p:first-child::first-letter{
  font-family:'IM Fell English', serif;
  font-size: 2.6em; float: left;
  line-height: .85; padding: .15rem .35rem .15rem 0;
  color: var(--rose-dark);
}
.prose .touchwood{
  font-style: italic;
  color: var(--moss-dark);
  background: linear-gradient(transparent 60%, rgba(78,122,58,0.18) 60%);
  font-family:'Cormorant Garamond', serif;
  font-weight: 500;
}
.prose .modern{
  font-family:'IM Fell English SC', serif;
  font-size: .92em;
  letter-spacing: .04em;
  color: var(--ink-soft);
}

/* choices */
.choices{ display: flex; flex-direction: column; gap: .55rem; }
.choice{
  appearance: none;
  background: var(--paper-2);
  border: 1.5px solid var(--ink);
  border-bottom-width: 4px;
  border-radius: 4px;
  padding: .7rem .85rem;
  font-family: 'Crimson Pro', serif; font-size: 1rem;
  color: var(--ink);
  text-align: left; cursor: pointer;
  display: grid; grid-template-columns: 28px 1fr auto; gap: .55rem; align-items: center;
  transition: transform .07s, background .12s;
  min-height: 46px;
}
.choice:hover{ background: #f3e4c2; border-color: var(--rose-dark); }
.choice:active{ transform: translateY(2px); border-bottom-width: 2px; }
.choice:disabled{ opacity:.45; cursor:not-allowed; filter: grayscale(.4); }
.choice .key{
  font-family:'IM Fell English', serif; font-style: italic;
  color: var(--gold);
  font-size: 1.15rem; text-align: center;
}
.choice .note{
  font-family:'IM Fell English SC', serif; font-size: .62rem;
  letter-spacing: .12em; color: var(--ink-soft);
  text-transform: uppercase;
  white-space: nowrap;
}

/* footer card */
.foot{
  display:flex; justify-content: space-between; align-items: center;
  font-family:'IM Fell English SC', serif; font-size:.7rem;
  letter-spacing:.15em; color: rgba(240,224,191,0.6);
}
.foot .btn{
  appearance:none; background: transparent;
  border: 1px solid rgba(240,224,191,0.35); color: rgba(240,224,191,0.7);
  font: inherit; padding: .4rem .7rem; border-radius: 3px;
  cursor: pointer; min-height: 36px;
}
.foot .btn:hover{ color: var(--paper); border-color: var(--paper); }

.runes{
  display:inline-flex; gap: .2rem; align-items:center;
  font-family:'IM Fell English', serif; font-size: 1rem;
  color: var(--paper);
}
.runes .r{
  display:inline-block; width: 1.4em; height: 1.4em; border-radius: 50%;
  border: 1.5px solid rgba(240,224,191,0.45);
  text-align:center; line-height: calc(1.4em - 3px);
  font-style: italic; color: rgba(240,224,191,0.45);
  background: rgba(0,0,0,0.18);
}
.runes .r.have{
  color: var(--gold); border-color: var(--gold); background: rgba(138,90,24,0.18);
  text-shadow: 0 0 6px rgba(255,200,90,0.4);
}

/* dramatic interlude (chat ask: "dramati[c]") — full-bleed letterbox
   that pops a single cinematic line for 3s on key story beats. */
.drama{
  position: fixed; inset: 0; z-index: 50;
  background: rgba(20, 12, 4, 0.92);
  display: flex; align-items: center; justify-content: center;
  pointer-events: none; opacity: 0;
  transition: opacity .35s ease;
}
.drama.show{ opacity: 1; pointer-events: auto; }
.drama .bars{
  position: absolute; left: 0; right: 0;
  background: #000; height: 11vh;
  transition: height .5s ease;
}
.drama .bars.top   { top: 0;    border-bottom: 1px solid var(--gold); }
.drama .bars.bot   { bottom: 0; border-top:    1px solid var(--gold); }
.drama .quote{
  font-family:'IM Fell English', serif; font-style: italic;
  font-size: clamp(1.4rem, 3vw, 2rem);
  color: var(--paper); text-align: center;
  max-width: 36ch; padding: 1rem 1.5rem;
  text-shadow: 0 0 14px rgba(138,90,24,0.6);
  line-height: 1.35;
}
.drama .quote::before{ content:'☙ '; color: var(--gold); }
.drama .quote::after{  content: ' ❧'; color: var(--gold); }
.drama .hint{
  position: absolute; bottom: calc(11vh + 1rem); left: 50%; transform: translateX(-50%);
  font-family:'IM Fell English SC', serif; font-size: .65rem;
  letter-spacing: .25em; color: rgba(240,224,191,0.55);
}

/* end overlay */
.endcard{
  background:
    repeating-linear-gradient(7deg, rgba(44,24,8,0.04) 0 1px, transparent 1px 5px),
    radial-gradient(120% 100% at 50% 50%, var(--paper) 0%, var(--paper-2) 100%);
  color: var(--ink);
  border-radius: 4px;
  padding: 1.5rem 1.4rem;
  text-align: center;
  box-shadow: inset 0 0 0 1px rgba(44,24,8,0.10), inset 0 0 32px rgba(138,90,24,0.16), 0 6px 18px rgba(0,0,0,0.45);
}
.endcard h2{
  margin: 0 0 .4rem;
  font-family:'IM Fell English', serif; font-style: italic; font-weight: 400;
  font-size: clamp(1.6rem, 5vw, 2.2rem);
  color: var(--rose-dark);
}
.endcard .epitaph{
  font-family:'Cormorant Garamond', serif; font-style: italic;
  font-size: 1.1rem; color: var(--ink-soft); margin-bottom: .9rem;
}
.endcard button{
  appearance:none; background: var(--paper-2);
  border: 1.5px solid var(--ink); border-bottom-width: 4px;
  border-radius: 4px; padding: .6rem 1.2rem;
  font: inherit; font-family:'IM Fell English', serif; font-size: 1rem;
  color: var(--ink); cursor: pointer;
}
.endcard button:active{ transform: translateY(2px); border-bottom-width: 2px; }

@media (max-width: 540px){
  .portrait{ width: 52px; height: 52px; }
  .stat{ grid-template-columns: 50px 1fr auto; font-size:.62rem; }
}
@media (prefers-reduced-motion: reduce){
  .stat .bar .fill{ transition: none; }
}
</style>
</head>
<body>
<!-- 1970s film treatment (chat ask): grain → scanlines → vignette → flicker -->
<div class="flicker"   aria-hidden="true"></div>
<div class="grain"     aria-hidden="true"></div>
<div class="scanlines" aria-hidden="true"></div>
<div class="vignette"  aria-hidden="true"></div>

<div class="shell">

  <header>
    <div class="eyebrow">▒ a whimsy · in three days &amp; three nights</div>
    <h1>Catweazle</h1>
    <p class="tag">an eleventh-century wizard wakes in rural england, 2026 &nbsp;·&nbsp; with his toad <em>Touchwood</em></p>
  </header>

  <!-- scene card -->
  <section class="parchment" id="scene-card" role="region" aria-label="Current scene">
    <!-- party portraits + stats -->
    <div class="party">
      <div class="portrait" title="Catweazle">
        <svg viewBox="0 0 64 64" aria-hidden="true">
          <!-- hat -->
          <path d="M32,6 L46,30 L18,30 Z" fill="#2c1808" stroke="#1a0e06" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M16,30 L48,30 L46,33 L18,33 Z" fill="#2c1808" stroke="#1a0e06" stroke-width="1.2"/>
          <circle cx="38" cy="14" r="1.4" fill="#8a5a18"/>
          <circle cx="34" cy="22" r="1" fill="#8a5a18"/>
          <!-- face -->
          <ellipse cx="32" cy="40" rx="11" ry="9" fill="#e8c89a"/>
          <circle cx="28" cy="38" r="1.2" fill="#1a0e06"/>
          <circle cx="36" cy="38" r="1.2" fill="#1a0e06"/>
          <!-- nose -->
          <path d="M32,38 L31,42 L33,42 Z" fill="#c89870" opacity=".8"/>
          <!-- beard -->
          <path d="M22,42 Q24,54 30,58 Q32,60 34,58 Q40,54 42,42 Q40,46 32,47 Q24,46 22,42 Z" fill="#e8e2d3" stroke="#9a9484" stroke-width=".6"/>
          <!-- eyebrow tufts -->
          <path d="M25,35 Q28,33 31,35" stroke="#e8e2d3" stroke-width="1" fill="none" stroke-linecap="round"/>
          <path d="M33,35 Q36,33 39,35" stroke="#e8e2d3" stroke-width="1" fill="none" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="stats">
        <div class="stat hexes"><span>hexes</span><div class="bar"><div class="fill" id="b-hexes" style="width:60%"></div></div><span class="v" id="v-hexes">3</span></div>
        <div class="stat lore"><span>lore</span><div class="bar"><div class="fill" id="b-lore" style="width:30%"></div></div><span class="v" id="v-lore">15</span></div>
        <div class="stat bw" id="bw-stat"><span>bewilder</span><div class="bar"><div class="fill" id="b-bw" style="width:10%"></div></div><span class="v" id="v-bw">10</span></div>
        <div class="stat lore" id="cs-stat" style="display:none"><span>carrot</span><div class="bar"><div class="fill" id="b-cs" style="width:30%"></div></div><span class="v" id="v-cs">15</span></div>
      </div>
      <div class="extras">
        <div class="portrait" id="portrait-carrot" title="Carrot, the farm boy" style="display:none">
          <svg viewBox="0 0 64 64" aria-hidden="true">
            <!-- carrot cap of orange hair -->
            <path d="M14,28 Q18,16 32,14 Q46,16 50,28 Q50,32 46,34 L18,34 Q14,32 14,28 Z" fill="#d3611e" stroke="#7a3508" stroke-width="1"/>
            <path d="M18,30 Q20,22 28,21" stroke="#7a3508" stroke-width=".8" fill="none"/>
            <path d="M44,30 Q42,22 36,21" stroke="#7a3508" stroke-width=".8" fill="none"/>
            <!-- face -->
            <ellipse cx="32" cy="40" rx="13" ry="11" fill="#f3d0a0"/>
            <!-- freckles -->
            <circle cx="26" cy="42" r=".7" fill="#9a5028"/>
            <circle cx="38" cy="42" r=".7" fill="#9a5028"/>
            <circle cx="30" cy="45" r=".5" fill="#9a5028"/>
            <circle cx="34" cy="45" r=".5" fill="#9a5028"/>
            <!-- eyes -->
            <circle cx="27" cy="38" r="1.3" fill="#1a0e06"/>
            <circle cx="37" cy="38" r="1.3" fill="#1a0e06"/>
            <!-- smile -->
            <path d="M27,46 Q32,49 37,46" stroke="#1a0e06" stroke-width="1.1" fill="none" stroke-linecap="round"/>
            <!-- collar (school uniform) -->
            <path d="M18,52 L46,52 L42,60 L22,60 Z" fill="#3a5c2b"/>
            <rect x="30" y="52" width="4" height="8" fill="#8a3a1a"/>
          </svg>
        </div>
        <div class="amulet-pill hidden" id="amulet-pill" title="Amulet of Adamcos · hypnosis charges">
          ✦ amulet <span class="charge" id="amulet-charges">3</span>
        </div>
      </div>
      <div class="portrait" title="Touchwood the toad">
        <svg viewBox="0 0 64 64" aria-hidden="true">
          <ellipse cx="32" cy="44" rx="22" ry="14" fill="#4e7a3a"/>
          <ellipse cx="32" cy="42" rx="20" ry="11" fill="#6c9c54"/>
          <ellipse cx="32" cy="50" rx="14" ry="5" fill="#3a5c2b"/>
          <!-- eyes -->
          <circle cx="22" cy="30" r="6" fill="#6c9c54" stroke="#3a5c2b" stroke-width=".8"/>
          <circle cx="42" cy="30" r="6" fill="#6c9c54" stroke="#3a5c2b" stroke-width=".8"/>
          <circle cx="22" cy="30" r="3" fill="#1a0e06"/>
          <circle cx="42" cy="30" r="3" fill="#1a0e06"/>
          <circle cx="23" cy="29" r="1" fill="#fff"/>
          <circle cx="43" cy="29" r="1" fill="#fff"/>
          <!-- mouth -->
          <path d="M22,44 Q32,49 42,44" stroke="#1a0e06" stroke-width="1" fill="none" stroke-linecap="round"/>
          <!-- warty spots -->
          <circle cx="18" cy="44" r="1.6" fill="#3a5c2b"/>
          <circle cx="46" cy="46" r="1.4" fill="#3a5c2b"/>
          <circle cx="32" cy="48" r="1.2" fill="#3a5c2b"/>
        </svg>
      </div>
    </div>

    <div class="diorama-frame" role="region" aria-label="diorama · click electrical appliances to provoke Catweazle">
      <span class="label" id="diorama-label">EXT. HEXWOOD FARM — DAY</span>
      <canvas id="diorama" aria-label="3D diorama of the current scene — click any electrical appliance to hex it"></canvas>
    </div>
    <div class="episode-plate" id="episode-plate" aria-hidden="true">
      <span class="num" id="episode-num">EPISODE · No. 1</span>
      <span class="title" id="episode-title">The Strange Stables</span>
    </div>
    <h2 class="scene-title" id="scene-title">…</h2>
    <div class="prose" id="scene-prose"></div>

    <div class="choices" id="scene-choices"></div>
  </section>

  <!-- dramatic interlude overlay -->
  <div class="drama" id="drama" aria-hidden="true">
    <div class="bars top"></div>
    <div class="quote" id="drama-quote">…</div>
    <div class="bars bot"></div>
    <div class="hint">click to dispel</div>
  </div>

  <div class="foot">
    <div>day <span id="m-day">1</span> · <span class="runes" id="runes-hud" aria-label="Runes gathered">
      <span class="r" id="rune-1">I</span><span class="r" id="rune-2">II</span><span class="r" id="rune-3">III</span>
    </span></div>
    <button class="btn" type="button" id="btn-restart">↺ restart</button>
  </div>

</div>

<script>
'use strict';

// ── state ────────────────────────────────────────────────────────────
// Episode titles — Catweazle was a 70s LWT show whose episodes were all
// named "The [Object]" with old-English flourish. Each scene gets its
// own episode plate so the adventure plays like a back-to-back marathon.
const EPISODES = {
  s_start:          { n:  1, t: 'The Strange Stables' },
  s_no_hex:         { n:  1, t: 'The Strange Stables' },
  s_lane:           { n:  2, t: 'The Black Road' },
  s_phone:          { n:  3, t: 'The Telling Bone' },
  s_phone_hex:      { n:  3, t: 'The Telling Bone' },
  s_car:            { n:  4, t: 'The Iron-Pony' },
  s_car_hex:        { n:  4, t: 'The Iron-Pony' },
  s_field:          { n:  5, t: 'The Eye of the Sky' },
  s_drone:          { n:  5, t: 'The Eye of the Sky' },
  s_pub:            { n:  6, t: 'The Sign of the Black Bear' },
  s_pub_eject:      { n:  6, t: 'The Sign of the Black Bear' },
  s_village:        { n:  7, t: 'The Lavender Vicar' },
  s_vicar_confess:  { n:  7, t: 'The Lavender Vicar' },
  s_tesco:          { n:  8, t: 'The Hall of Cold Bread' },
  s_tesco_alarm:    { n:  8, t: 'The Hall of Cold Bread' },
  s_amulet:         { n:  9, t: 'The Amulet of Adamcos' },
  s_stones:         { n: 10, t: 'The Sleeping Stones' },
  s_return:         { n: 11, t: 'The Door of Light' },
  s_end_win:        { n: 12, t: 'Homewards' },
  s_end_lose:       { n: 13, t: 'The Wellness Retreat' },
};
const STORE_KEY = 'catweazle-v1';
const start = {
  scene: 's_start',
  hexes: 3,
  lore: 15,
  bw: 10,
  day: 1,
  runes: { iron: false, glass: false, voice: false },
  flags: {},      // arbitrary one-shot flags (e.g. "boots_taken")
  // chat ask v2: Carrot the farm boy joins as a second character.
  carrot: { joined: false, sense: 15 },
  amulet: { has: false, charges: 0 },   // amulet of Adamcos — 3 hypnosis uses
  seenDrama: {},                         // one-shot dramatic interludes
};
let state = load() || JSON.parse(JSON.stringify(start));

function save(){ try { localStorage.setItem(STORE_KEY, JSON.stringify(state)); } catch(_){} }
function load(){
  try { const r = localStorage.getItem(STORE_KEY); return r ? JSON.parse(r) : null; } catch(_){ return null; }
}
function reset(){
  state = JSON.parse(JSON.stringify(start));
  save();
  render();
}

// ── scenes ───────────────────────────────────────────────────────────
// Each scene = { id, title, prose(state) → html, choices: [{ t, cond?, on(state) → newSceneId }] }
// Prose uses <span class="modern"> for modern objects Catweazle is mis-naming,
// <span class="touchwood">…</span> for the toad's commentary, and a leading
// paragraph that gets a drop-cap via CSS.

const SCENES = {
  s_start: {
    title: 'Awakening, beneath the strange straw',
    prose: () => `
      <p>I wake. The light is wrong — too white, too still. Mine bones ache as if I lay these many nights in the bog. Touchwood squats on my chest, ribbiting an opinion.</p>
      <p><span class="touchwood">"Master, you have slept through the harvest. And, I fear, several harvests beyond it."</span></p>
      <p>A great pair of <span class="modern">wellingtons</span> — green, glossy, smelling of new earth — leans against the wall.</p>`,
    choices: [
      { t: 'Try on the green leather boots (heretical comfort?)', on: () => { state.flags.boots = true; state.bw += 5; return 's_lane'; } },
      { t: 'Hex the boots, in case they are demons', on: () => {
          if (state.hexes <= 0) return 's_no_hex';
          state.hexes--; state.bw += 8;
          return 's_lane';
        } },
      { t: 'Ignore them. Walk out barefoot, as the saints did.', on: () => { state.lore += 2; return 's_lane'; } },
    ],
  },

  s_no_hex: {
    title: 'The hex sputters',
    prose: () => `
      <p>I raise my hand. I incant. Nothing. Only a small puff of green smoke and the smell of cucumber.</p>
      <p><span class="touchwood">"You are out of hexes, master. They are not like turnips. They do not grow back overnight."</span></p>`,
    choices: [
      { t: '— rest a moment to remember a hex', on: () => { state.hexes = Math.min(5, state.hexes + 1); state.bw = Math.max(0, state.bw - 5); state.day++; return 's_lane'; } },
      { t: '— go on without them', on: () => 's_lane' },
    ],
  },

  s_lane: {
    title: 'Down the metalled lane',
    prose: () => {
      const carrot = state.carrot.joined
        ? `<p>Carrot trots beside me, hands deep in the pockets of his short trousers. "If you see a sign that says &lsquo;Give Way&rsquo;, master, you give way."</p>`
        : `<p>A barefoot boy is running up the lane — straw hair, grass stains, a green woollen jumper. He stops dead at the sight of me and Touchwood, then grins so widely I see all his teeth. "Are you a real wizard?"</p>`;
      return `
        <p>The path is black as pitch, hard as flint, smooth as a font. Down it I tread, looking for any soul who might tell me what kingdom this is. A <span class="modern">red box of glass and iron</span> stands at the verge — Touchwood says it is a shrine for talking to spirits at distance.</p>
        <p><span class="touchwood">"It is a telephone, master. People shout into it about gardening."</span></p>
        ${carrot}`;
    },
    choices: [
      // Carrot greeting only shows on first encounter (before he joins)
      { t: '"Aye, lad. Walk with me. I shall need a translator."', cond: () => !state.carrot.joined, on: () => {
          state.carrot.joined = true;
          drama('"A wizard! A REAL wizard! Wait \'til I tell Sam at school!"',
                'enter · CARROT the farm boy');
          return 's_lane';
        } },
      { t: 'Approach the telephone shrine', on: () => 's_phone' },
      { t: 'Continue down the lane until something happens', on: () => 's_car' },
      { t: 'Step into the field of yellow flowers', on: () => 's_field' },
      { t: 'Slip behind the Black Bear and rifle through the bins (Carrot\'s idea)', cond: () => state.carrot.joined && !state.amulet.has, on: () => 's_amulet' },
    ],
  },

  s_phone: {
    title: 'The red telephone shrine',
    prose: () => `
      <p>I lift the speaking-bone from its cradle. It hums like a small wasp. I cry "Salamander of Saturn, send mine self to Anno Domini One Thousand Sixty Six!" into the dark holes.</p>
      <p><span class="touchwood">"You have just spent twenty-five pence calling the speaking clock."</span></p>
      <p>A voice answers from within the bone, saying the hour, then the hour, then the hour. Lore is gained from any voice that knows itself.</p>`,
    choices: [
      { t: 'Listen until it stops (study the spirit)', on: () => { state.lore += 5; state.bw += 4; return 's_lane'; } },
      { t: 'Cast a great hex into the speaking-bone', on: () => {
          if (state.hexes <= 0) return 's_no_hex';
          state.hexes--; state.bw += 6; state.runes.voice = true;
          return 's_phone_hex';
        } },
      { t: 'Replace it gently and step away', on: () => { state.bw += 1; return 's_lane'; } },
    ],
  },

  s_phone_hex: {
    title: 'The voice gives up a rune',
    prose: () => `
      <p>I roar the great Latin and the speaking-bone howls back. From its iron mouth a small charge leaps — a <em>rune of voice</em>, glowing like an ember.</p>
      <p><span class="touchwood">"Master, that was British Telecom. They will send you a stern letter."</span></p>`,
    choices: [
      { t: 'Pocket the rune. Onward.', on: () => 's_lane' },
    ],
  },

  s_car: {
    title: 'A thundering iron-pony',
    prose: () => `
      <p>It comes from over the rise — a low <span class="modern">iron pony</span>, painted scarlet, faster than any rider, screaming as it goes. It misses me by a whisker. The wind smells of burned soup.</p>
      <p><span class="touchwood">"They are very common, master. Most people own one and complain about it."</span></p>`,
    choices: [
      { t: 'Hex the iron-pony as it returns', cond: () => state.hexes > 0, on: () => {
          state.hexes--; state.bw += 2; state.lore += 1;
          return 's_car_hex';
        } },
      { t: 'Bow, in case it is a small saint', on: () => { state.bw += 4; return 's_lane'; } },
      { t: 'Hide in the hedge until silence returns', on: () => 's_lane' },
    ],
  },

  s_car_hex: {
    title: 'Hex finds its mark',
    prose: () => `
      <p>I raise both hands. "Salmonberry of pomegranate! <em>Cessat!</em>" The iron-pony stutters, coughs, and stalls at the verge. A man in a sleeveless padded coat climbs out, peers at his bonnet, and curses thoroughly.</p>
      <p><span class="touchwood">"You have just diagnosed an alternator. He thinks you are a mechanic."</span></p>
      <p>He thanks me, tries to press <span class="modern">a paper note</span> into my hand. I drop it. It blows into the hedge. Touchwood eats it for safekeeping.</p>`,
    choices: [
      { t: 'Continue the road', on: () => 's_lane' },
    ],
  },

  s_field: {
    title: 'A field of rapeseed yellow',
    prose: () => `
      <p>The flowers are too yellow. They hum with bees, and bees know me — I lived with them many a winter under the eaves. I gather a handful of bee-blessed herbs; they remember the old names.</p>
      <p><span class="touchwood">"Steady, master. A drone has been watching us for some minutes."</span> A small flying iron-bird buzzes overhead, with no face.</p>`,
    choices: [
      { t: 'Hex the watching iron-bird', cond: () => state.hexes > 0, on: () => {
          state.hexes--; state.lore += 2; state.bw += 3;
          return 's_drone';
        } },
      { t: 'Befriend the bees — drink their wisdom', on: () => { state.lore += 4; state.hexes = Math.min(5, state.hexes + 1); return 's_lane'; } },
      { t: 'Lie among the flowers and let the world pass', on: () => { state.bw = Math.max(0, state.bw - 8); state.day++; return 's_lane'; } },
    ],
  },

  s_drone: {
    title: 'The iron-bird falls',
    prose: () => `
      <p>"Spindlebloom! <em>Cadere!</em>" The iron-bird tilts, whirrs, and falls in a puff of small lights. From its broken centre I pry an <em>iron rune</em>, hot to the touch.</p>
      <p><span class="touchwood">"That was three hundred and fifty pounds, master."</span></p>`,
    choices: [
      { t: 'Pocket the iron rune. Onward.', on: () => { state.runes.iron = true; return 's_lane'; } },
    ],
  },

  s_lane2: { /* shortcut alias */ },

  s_pub: {
    title: 'The Black Bear, by the bridge',
    prose: () => `
      <p>The inn-sign creaks in a wind I cannot feel. Within: low beams, warm dark beer, a fire that is somehow electric and unconvincing. The publican — a vast woman in a cardigan — asks me what I'll have.</p>
      <p><span class="touchwood">"Order the mead, master. Or the ale. Do not order a 'flat white'."</span></p>`,
    choices: [
      { t: 'Mead, two horns', on: () => { state.bw = Math.max(0, state.bw - 12); state.lore += 1; return 's_village'; } },
      { t: 'Demand the runes of the modern world', on: () => { state.bw += 10; return 's_pub_eject'; } },
      { t: 'Glass of milk, like an honest goat', on: () => { state.lore += 2; return 's_village'; } },
    ],
  },

  s_pub_eject: {
    title: 'A polite ejection',
    prose: () => `
      <p>The publican smiles, but firmly. "Out you go, love." Two patrons in muddy boots lift me by the elbows and set me down in the lane. Touchwood is given a saucer of stout and remains under the table for another hour.</p>
      <p><span class="touchwood">"I'll catch up, master. They have a darts board."</span></p>`,
    choices: [
      { t: 'Onward into the village', on: () => 's_village' },
    ],
  },

  s_village: {
    title: 'The village green',
    prose: () => `
      <p>A green square, a war memorial with names I do not recognise, a yew tree older than I am. A vicar in a lavender shirt waves cheerfully and approaches.</p>
      <p>"You must be the new historical re-enactor!" he says, beaming. "We're so glad to have you."</p>
      <p><span class="touchwood">"Just nod, master. Just nod."</span></p>`,
    choices: [
      { t: 'Nod, gravely', on: () => { state.bw = Math.max(0, state.bw - 6); state.lore += 2; return 's_tesco'; } },
      { t: 'Confess: thou art a man of the eleventh century', on: () => { state.bw += 8; return 's_vicar_confess'; } },
      { t: 'Bless him with the rune of the wandering goat', on: () => { state.lore += 1; return 's_tesco'; } },
      { t: '✦ Raise the Amulet — hypnotise the vicar', cond: () => state.amulet.has && state.amulet.charges > 0, on: () => {
          state.amulet.charges--; state.bw = Math.max(0, state.bw - 14); state.lore += 4;
          drama('The vicar\'s pupils widen. He blinks twice. "Of course, of course. You were never here."',
                'amulet · charge spent · ' + state.amulet.charges + ' remaining');
          return 's_tesco';
        } },
    ],
  },

  s_vicar_confess: {
    title: 'The vicar is delighted',
    prose: () => `
      <p>The vicar nods earnestly, as if this is the most natural thing. "Wonderful! We have a folklore evening on Tuesday. You'd be very welcome."</p>
      <p>He hands me a leaflet. Touchwood swallows it.</p>`,
    choices: [
      { t: 'Drift onward', on: () => 's_tesco' },
    ],
  },

  s_tesco: {
    title: 'A great hall of cold bread',
    prose: () => `
      <p>The doors open by themselves. Within: ranks of bright tins, glass walls of cold milk, a young person folding shirts who does not look up. A row of <span class="modern">self-service shrines</span> beeps endlessly.</p>
      <p><span class="touchwood">"It is a Tesco, master. We must trade only — do not invoke the shrines."</span></p>`,
    choices: [
      { t: 'Trade an old silver coin for apples', on: () => { state.bw = Math.max(0, state.bw - 3); state.lore += 1; return 's_stones'; } },
      { t: 'Invoke the self-service shrine, beep at it', on: () => {
          state.bw += 16;
          if (Math.random() < 0.55) state.runes.glass = true;
          return 's_tesco_alarm';
        } },
      { t: 'Steal a cucumber, flee', on: () => { state.bw += 8; state.day++; return 's_stones'; } },
      { t: '✦ Raise the Amulet — hypnotise the till', cond: () => state.amulet.has && state.amulet.charges > 0 && !state.runes.glass, on: () => {
          state.amulet.charges--; state.bw = Math.max(0, state.bw - 5); state.runes.glass = true;
          drama('The till hums. Its glass eye blinks. A small etched chit slides out and falls — the rune of glass.',
                'amulet · charge spent · rune of GLASS acquired');
          return 's_stones';
        } },
    ],
  },

  s_tesco_alarm: {
    title: 'A great alarm, a small mercy',
    prose: () => `
      <p>The shrine howls. Lights flash. A man in a yellow tabard pads over. From the shrine's broken side panel I see — yes — a thin <em>glass rune</em>, etched with bar-lines.</p>
      <p><span class="touchwood">"Take it, master, and walk briskly. Do not run. Briskly."</span></p>`,
    choices: [
      { t: 'Briskly out and onward to the stones', on: () => 's_stones' },
    ],
  },

  s_stones: {
    title: 'The standing stones, beyond the field',
    prose: () => `
      <p>I know them. I know them. These very stones I dedicated as a young apprentice — yes, the leaning one is mine, I always meant to come back and straighten it. Three sockets in the central stone gape, hungry for runes.</p>
      <p><span class="touchwood">"Three runes, master. Iron, glass, voice. The old way."</span></p>`,
    choices: [
      { t: 'Place the runes in the stone', cond: () => (state.runes.iron && state.runes.glass && state.runes.voice), on: () => 's_return' },
      { t: 'Return to the lane — there is more to find', cond: () => !(state.runes.iron && state.runes.glass && state.runes.voice), on: () => 's_lane' },
      { t: 'Sleep here until dawn (rest)', on: () => { state.day++; state.hexes = Math.min(5, state.hexes + 1); state.bw = Math.max(0, state.bw - 10); return 's_stones'; } },
    ],
  },

  s_return: {
    title: 'The ride home',
    prose: () => {
      if (!state.seenDrama.s_return){
        state.seenDrama.s_return = true;
        drama('The stones sing a note last heard in the year of three comets. A door of light opens between them.',
              'finale · the long way home');
      }
      const farewell = state.carrot.joined
        ? `<p>Carrot stands at the edge of the field, hands in his pockets, trying not to cry and absolutely failing. "Catch you later, Mr. Catweazle!" he calls.</p>`
        : '';
      return `
        <p>The runes flare. The stones hum a note I have not heard since the year of three comets. A door of light opens between the leaning ones, and I step toward it. Touchwood is on my shoulder, dignified.</p>
        <p><span class="touchwood">"Master. We were not, in the end, very fond of 2026."</span></p>
        ${farewell}`;
    },
    choices: [
      { t: 'Walk through the door', on: () => 's_end_win' },
    ],
  },

  s_end_win: {
    end: 'win',
    title: 'Anno Domini One Thousand Sixty Six',
    prose: () => `
      <p>The cottage roof I left is still smouldering. The cooking-pot is where I left it. The bees have not gone anywhere.</p>
      <p><span class="touchwood">"Master. The harvest. We must tell no-one of the iron-ponies."</span></p>
      <p>Quite right, Touchwood. Quite right.</p>`,
  },

  // chat ask v2: Carrot finds the Amulet of Adamcos behind the pub.
  // 3 hypnosis charges. Spending a charge in vicar / Tesco / publican
  // scenes resolves them peacefully (+lore, -bewilder, no hex cost).
  s_amulet: {
    title: 'Behind the pub, among the bins',
    prose: () => `
      <p>Carrot crouches by the kitchen door, lifting damp pizza boxes with the seriousness of a knight checking under a stone for a sword. Touchwood approves.</p>
      <p><span class="touchwood">"There, master. By the silver crisp packets. A glint of moon."</span></p>
      <p>And there it lies — the <em>Amulet of Adamcos</em>, on its tarnished chain. The pattern is a spiral within a spiral; mine own apprentice-master gave me one like it long ago. It is warm. It hums of sleep.</p>`,
    choices: [
      { t: 'Take the amulet — pocket it carefully', on: () => {
          state.amulet.has = true; state.amulet.charges = 3; state.lore += 4;
          drama('"With three charges of hypnotic command, I shall lull the strange folk of this future age."',
                'item · AMULET OF ADAMCOS · 3 charges');
          return 's_lane';
        } },
      { t: 'Let the boy have it — it is too dangerous', on: () => {
          state.carrot.sense = Math.min(50, state.carrot.sense + 6);
          drama('"Cor!" Carrot loops the chain twice round his wrist and beams.', 'carrot favors you · +6 common sense');
          return 's_lane';
        } },
      { t: 'Leave it. The bins are not for wizards.', on: () => { state.lore += 1; return 's_lane'; } },
    ],
  },
  s_end_lose: {
    end: 'lose',
    title: 'A wellness retreat in Surrey',
    prose: () => `
      <p>I am offered a beige folder, and asked many questions about my childhood. There are leaflets about <span class="modern">grounding exercises</span> and <span class="modern">peppermint tea</span>. Touchwood has been placed in a clear plastic tub. They have called him 'Kenneth'.</p>
      <p><span class="touchwood">"They mean well, master. They mean well."</span></p>`,
  },
};

// ── render ───────────────────────────────────────────────────────────
const $title   = document.getElementById('scene-title');
const $prose   = document.getElementById('scene-prose');
const $choices = document.getElementById('scene-choices');
const $card    = document.getElementById('scene-card');
const HEX_MAX = 5, LORE_MAX = 50, BW_MAX = 100;

function render(){
  // bewilderment > 100 = lose — but Carrot's common sense softens the edge
  const effectiveBW = state.bw - (state.carrot.joined ? state.carrot.sense * 0.15 : 0);
  if (effectiveBW >= BW_MAX){ state.scene = 's_end_lose'; }
  const sc = SCENES[state.scene] || SCENES.s_start;
  // stats
  document.getElementById('v-hexes').textContent = state.hexes;
  document.getElementById('v-lore').textContent  = Math.min(99, Math.round(state.lore));
  document.getElementById('v-bw').textContent    = Math.min(BW_MAX, Math.round(state.bw));
  document.getElementById('b-hexes').style.width = (state.hexes / HEX_MAX * 100) + '%';
  document.getElementById('b-lore').style.width  = (Math.min(state.lore, LORE_MAX) / LORE_MAX * 100) + '%';
  document.getElementById('b-bw').style.width    = (Math.min(state.bw, BW_MAX) / BW_MAX * 100) + '%';
  const $bw = document.getElementById('bw-stat');
  $bw.classList.toggle('warn', state.bw >= 60 && state.bw < 85);
  $bw.classList.toggle('bad',  state.bw >= 85);
  // Carrot stat + portrait
  document.getElementById('cs-stat').style.display = state.carrot.joined ? '' : 'none';
  document.getElementById('portrait-carrot').style.display = state.carrot.joined ? '' : 'none';
  if (state.carrot.joined){
    document.getElementById('v-cs').textContent = Math.min(99, Math.round(state.carrot.sense));
    document.getElementById('b-cs').style.width = (Math.min(state.carrot.sense, LORE_MAX) / LORE_MAX * 100) + '%';
  }
  // Amulet pill
  const $amu = document.getElementById('amulet-pill');
  $amu.classList.toggle('hidden', !state.amulet.has);
  if (state.amulet.has) document.getElementById('amulet-charges').textContent = state.amulet.charges;
  // Episode plate
  const ep = EPISODES[state.scene] || { n: 0, t: 'Unknown' };
  document.getElementById('episode-num').textContent   = 'EPISODE · No. ' + ep.n;
  document.getElementById('episode-title').textContent = ep.t;
  // runes hud
  document.getElementById('rune-1').classList.toggle('have', state.runes.iron);
  document.getElementById('rune-2').classList.toggle('have', state.runes.glass);
  document.getElementById('rune-3').classList.toggle('have', state.runes.voice);
  document.getElementById('rune-1').title = 'iron rune (from the drone)';
  document.getElementById('rune-2').title = 'glass rune (from the Tesco shrine)';
  document.getElementById('rune-3').title = 'voice rune (from the red telephone)';
  document.getElementById('m-day').textContent = state.day;
  // diorama (3D viewport above the scene title)
  if (typeof Diorama !== 'undefined') Diorama.setScene(state.scene);
  // scene
  if (sc.end){
    renderEnd(sc);
    return;
  }
  $card.style.display = '';
  $title.textContent = sc.title;
  $prose.innerHTML = sc.prose(state);
  $choices.innerHTML = '';
  sc.choices.forEach((c, i) => {
    const enabled = !c.cond || !!c.cond();
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.disabled = !enabled;
    btn.type = 'button';
    btn.innerHTML = `<span class="key">${String.fromCharCode(73 + i).replace('K','III').replace('J','II').replace('I','I')}</span><span>${escapeText(c.t)}</span>` +
      (c.cond && !enabled ? `<span class="note">condition unmet</span>` : '');
    btn.addEventListener('click', () => {
      const next = c.on();
      if (next) state.scene = next;
      // small day creep on actions that don't override
      save();
      render();
    });
    $choices.appendChild(btn);
  });
}

function renderEnd(sc){
  const win = sc.end === 'win';
  $card.style.display = 'none';
  // build end card after the scene card if not present
  let $end = document.getElementById('endcard');
  if (!$end){
    $end = document.createElement('section');
    $end.className = 'endcard';
    $end.id = 'endcard';
    document.querySelector('.shell').insertBefore($end, document.querySelector('.foot'));
  }
  $end.innerHTML = `
    <h2>${escapeText(sc.title)}</h2>
    <div class="epitaph">${sc.prose(state)}</div>
    <p style="font-family:'IM Fell English SC', serif; font-size:.78rem; letter-spacing:.15em; color: var(--ink-soft);">
      ${win ? '☘ ending: HOME ☘' : '☂ ending: WELLNESS ☂'} · day ${state.day} · bewilder ${Math.round(state.bw)}
    </p>
    <button type="button" id="end-restart">begin again</button>
  `;
  document.getElementById('end-restart').addEventListener('click', () => {
    $end.remove();
    reset();
  });
}

function escapeText(s){ return String(s).replace(/[<>&]/g, c => ({'<':'&lt;','>':'&gt;','&':'&amp;'}[c])); }

// dramatic interlude — full-bleed letterbox pop for ~3.4 s on big beats.
// Call drama(quote, hint?). Calling twice in quick succession queues the
// second (we just overwrite the first since these are short).
let dramaTimer = null;
function drama(quote, hint){
  const $d = document.getElementById('drama');
  document.getElementById('drama-quote').textContent = quote;
  if (hint){
    let h = $d.querySelector('.hint');
    if (h) h.textContent = hint;
  }
  $d.classList.add('show');
  $d.setAttribute('aria-hidden', 'false');
  if (dramaTimer) clearTimeout(dramaTimer);
  dramaTimer = setTimeout(dismissDrama, 3400);
}
function dismissDrama(){
  const $d = document.getElementById('drama');
  $d.classList.remove('show');
  $d.setAttribute('aria-hidden', 'true');
}
document.getElementById('drama').addEventListener('click', dismissDrama);

// ── low-poly diorama (chat ask: Three.js for the farm + the castle) ──
// A small 3D scene above the parchment that swaps geometry on every
// scene change. Slow orbit camera. Six themed setups: cottage / lane /
// field / village / supermarket / stones. Built once, group-cleared
// and rebuilt on scene change.
const Diorama = (function(){
  const canvas = document.getElementById('diorama');
  if (!canvas || typeof THREE === 'undefined') return { setScene: () => {}, };
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
  function resize(){
    const r = canvas.getBoundingClientRect();
    renderer.setSize(r.width, r.height, false);
    camera.aspect = r.width / Math.max(1, r.height);
    camera.updateProjectionMatrix();
  }
  const scene = new THREE.Scene();
  scene.fog = new THREE.Fog(0xb5c4d8, 12, 38);
  const camera = new THREE.PerspectiveCamera(40, 4, 0.1, 80);
  camera.position.set(8, 5.5, 8);
  camera.lookAt(0, 1, 0);

  scene.add(new THREE.AmbientLight(0xffffff, 0.45));
  scene.add(new THREE.HemisphereLight(0xfff0c8, 0x6a4a25, 0.55));
  const sun = new THREE.DirectionalLight(0xffe5b0, 0.7);
  sun.position.set(8, 12, 4);
  scene.add(sun);

  // ground plate (recolored per scene)
  const groundMat = new THREE.MeshLambertMaterial({ color: 0x6e8a4a });
  const ground = new THREE.Mesh(new THREE.BoxGeometry(40, 0.5, 40), groundMat);
  ground.position.y = -0.25;
  scene.add(ground);

  // a parent group we wipe + rebuild each scene change
  const stage = new THREE.Group();
  scene.add(stage);

  function box(w, h, d, color, x, y, z, rotY){
    const m = new THREE.Mesh(
      new THREE.BoxGeometry(w, h, d),
      new THREE.MeshLambertMaterial({ color })
    );
    m.position.set(x, y, z);
    if (rotY) m.rotation.y = rotY;
    stage.add(m);
    return m;
  }
  function cone(r, h, color, x, y, z){
    const m = new THREE.Mesh(
      new THREE.ConeGeometry(r, h, 8),
      new THREE.MeshLambertMaterial({ color, flatShading: true })
    );
    m.position.set(x, y, z);
    stage.add(m);
    return m;
  }
  function tree(x, z, scale=1){
    box(0.25*scale, 0.7*scale, 0.25*scale, 0x6a3e1a, x, 0.35*scale, z);
    cone(0.7*scale, 1.1*scale, 0x3a5c1c, x, 1.2*scale, z);
    cone(0.55*scale, 0.9*scale, 0x4a6a22, x, 1.7*scale, z);
  }

  // misty pond — flat blue-grey disc, darker depth ring, low mist plane,
  // a few hovering puff spheres, and short reed clumps at the rim.
  function pond(x, z, r=1.3){
    const water = new THREE.Mesh(
      new THREE.CylinderGeometry(r, r, 0.05, 24),
      new THREE.MeshLambertMaterial({ color: 0x4a5a6e, transparent: true, opacity: 0.92 })
    );
    water.position.set(x, 0.04, z);
    stage.add(water);
    const ring = new THREE.Mesh(
      new THREE.RingGeometry(r * 0.55, r * 0.96, 24),
      new THREE.MeshBasicMaterial({ color: 0x22324a, transparent: true, opacity: 0.45, side: THREE.DoubleSide, depthWrite: false })
    );
    ring.rotation.x = -Math.PI / 2;
    ring.position.set(x, 0.07, z);
    stage.add(ring);
    const mist = new THREE.Mesh(
      new THREE.CircleGeometry(r * 1.4, 20),
      new THREE.MeshBasicMaterial({ color: 0xf6f6f8, transparent: true, opacity: 0.34, side: THREE.DoubleSide, depthWrite: false })
    );
    mist.rotation.x = -Math.PI / 2;
    mist.position.set(x, 0.18, z);
    stage.add(mist);
    for (let i = 0; i < 5; i++){
      const a = (i / 5) * Math.PI * 2;
      const px = x + Math.cos(a) * r * 0.55;
      const pz = z + Math.sin(a) * r * 0.55;
      const puff = new THREE.Mesh(
        new THREE.SphereGeometry(r * 0.38, 8, 6),
        new THREE.MeshBasicMaterial({ color: 0xf0eee8, transparent: true, opacity: 0.22, depthWrite: false })
      );
      puff.position.set(px, 0.45 + (i % 2) * 0.08, pz);
      puff.scale.set(1, 0.45, 1);
      stage.add(puff);
    }
    for (let i = 0; i < 5; i++){
      const a = (i / 5) * Math.PI * 2 + 0.41;
      const rx = x + Math.cos(a) * r * 1.02;
      const rz = z + Math.sin(a) * r * 1.02;
      box(0.05, 0.42, 0.05, 0x4a6a30, rx, 0.21, rz);
      box(0.05, 0.42, 0.05, 0x4a6a30, rx + 0.09, 0.21, rz + 0.04);
      box(0.05, 0.32, 0.05, 0x4a6a30, rx - 0.07, 0.16, rz - 0.05);
    }
  }

  // tag an existing mesh as a clickable appliance (used for the Castle
  // Saburac tank cylinder, which isn't a box).
  function tagAppliance(mesh, opts){
    mesh._baseColor = (mesh.material && mesh.material.color)
      ? mesh.material.color.getHex()
      : 0xffffff;
    mesh.userData = {
      isAppliance: true,
      kind: opts.kind || 'object',
      label: opts.label || 'A STRANGE THING',
      quote: opts.quote || 'A foul implement of elec-trickery!',
      bw: opts.bw == null ? 3 : opts.bw,
    };
    appliances.push(mesh);
  }

  // Castle Saburac — a Ministry of Defence water tower that Catweazle,
  // ever the optimist, mistakes for his own thousand-year-old keep.
  function waterTower(x, z){
    // tapered concrete stem
    const stem = new THREE.Mesh(
      new THREE.CylinderGeometry(0.42, 0.55, 3.4, 10),
      new THREE.MeshLambertMaterial({ color: 0xa8a89e })
    );
    stem.position.set(x, 1.7, z);
    stage.add(stem);
    // bulbous tank — THIS is what he reads as the keep
    const tank = new THREE.Mesh(
      new THREE.CylinderGeometry(1.05, 1.05, 1.15, 14),

    );
    tank.position.set(x, 3.95, z);
    stage.add(tank);
    // capstone
    const cap = new THREE.Mesh(

    cap.position.set(x, 4.78, z);
    stage.add(cap);
    // antenna mast + warning light
    box(0.06, 0.7, 0.06, 0x202024, x, 5.35, z);
    const lamp = new THREE.Mesh(

    // tank's faded stencil ring (a little detail strip)

    band.position.set(x, 3.55, z);

    // chain-link fence (4 thin slats around a square perimeter)
    box(3.2, 1.0, 0.05, 0xc8d0c4, x,        0.5, z - 1.7);

    box(0.05, 1.0, 3.2, 0xc8d0c4, x - 1.7,  0.5, z);
    box(0.05, 1.0, 3.2, 0xc8d0c4, x + 1.7,  0.5, z);
    // fence posts
    for (const [fx, fz] of [[-1.7,-1.7],[ 1.7,-1.7],[-1.7, 1.7],[ 1.7, 1.7]]){
      box(0.08, 1.1, 0.08, 0x6a6a66, x + fx, 0.55, z + fz);

    // clickable red MoD warning sign on the front fence
    appliance({

      bw: 2,
    });
    // tag the tank cylinder itself as clickable — the keep
    tagAppliance(tank, {
      kind: 'castle_saburac',
      label: 'CASTLE SABURAC (his own keep, he is sure of it)',
      quote: 'Touchwood! Touchwood, lookee! There she standeth — Saburac! My castle, smoothed by ten centuries of weather, with a great copper cauldron upon her battlement. Home.',
      bw: 3,
    });
  }

  // clickable appliances (chat ask: toasters + switches in the diorama).
  // Each appliance is a mesh tagged with userData {quote, label, bw}; on
  // click the diorama fires a drama interlude and bumps bewilderment.
  const appliances = [];
  function appliance(opts){
    const m = new THREE.Mesh(
      new THREE.BoxGeometry(opts.w, opts.h, opts.d),
      new THREE.MeshLambertMaterial({ color: opts.color })
    );
    m.position.set(opts.x, opts.y, opts.z);
    if (opts.rotY) m.rotation.y = opts.rotY;
    m._baseColor = opts.color;
    m.userData = {
      isAppliance: true,
      kind: opts.kind || 'object',
      label: opts.label || opts.kind || 'A STRANGE THING',
      quote: opts.quote || 'A foul implement of elec-trickery!',
      bw: opts.bw == null ? 3 : opts.bw,
    };
    stage.add(m);
    appliances.push(m);
    return m;
  }

  function clearStage(){
    appliances.length = 0;
    while (stage.children.length) {
      const c = stage.children.pop();
      if (c.geometry) c.geometry.dispose();

  // Per-scene builders. The chat asked specifically for "farm" + "castle"

      // clickable: a tin parish-notice "tannoy" amplifying voices

      // misty village pond on the green
      pond(-3.6, 2.6, 1.05);
    },
    tesco(){
      groundMat.color.setHex(0x8a8a82);
      scene.background = new THREE.Color(0xc8d6e3);
      // a big flat supermarket
      box(6, 1.6, 2.6, 0xf3f6fa, 0, 0.8, 0);
      box(6, 0.4, 2.7, 0x2b6db4, 0, 1.6, 0);   // blue strip on top
      // tiny "TESCO"-ish dots (we're not actually using the word for brand safety)
      box(1.0, 0.2, 0.1, 0xe6243f, -1.6, 1.6, 1.36);
      box(1.0, 0.2, 0.1, 0xe6243f, 0,    1.6, 1.36);
      box(1.0, 0.2, 0.1, 0xe6243f, 1.6,  1.6, 1.36);
      // glass doors
      box(0.8, 1.4, 0.05, 0x8aa8c0, -0.7, 0.7, 1.31);
      box(0.8, 1.4, 0.05, 0x8aa8c0,  0.7, 0.7, 1.31);
      // car park lines
      for (let x = -4; x <= 4; x += 1){
        box(0.04, 0.02, 1.2, 0xffffff, x, 0.01, 3.4);
      }
      // trollies as small grey cubes
      box(0.3, 0.3, 0.4, 0xc8d0d8, -2.4, 0.15, 3.0);
      box(0.3, 0.3, 0.4, 0xc8d0d8, -2.0, 0.15, 3.4);
      // clickable: a row of small white goods on the shelf at the front
      appliance({
        kind:'toaster', x:-2.0, y:1.78, z:1.34, w:0.42, h:0.26, d:0.26,
        color:0xdcdce0,
        label:'A TOASTER · +5 bewilder',
        quote:'AAARGH! The metal mouth hath leapt at me — and out flew CHARRED BREAD! A devil for sure.',
        bw:5,
      });
      appliance({
        kind:'kettle', x:-1.2, y:1.78, z:1.34, w:0.32, h:0.32, d:0.32,
        color:0xeaeaec,
        label:'A WHISTLING-POT · +4 bewilder',
        quote:'The whistling-pot screams without fire beneath it. Touchwood is unmoved.',
        bw:4,
      });
      appliance({
        kind:'microwave', x:-0.3, y:1.78, z:1.34, w:0.55, h:0.36, d:0.36,
        color:0x18181c,
        label:'A HUMMING-CABINET · +5 bewilder',
        quote:'It hums, and turneth the sausage roll without hand or hearth. Witchcraft most foul!',
        bw:5,
      });
      appliance({
        kind:'till', x:0.7, y:1.78, z:1.34, w:0.45, h:0.36, d:0.32,
        color:0x2a4a8a,
        label:'A SELF-SERVICE SHRINE · +4 bewilder',
        quote:'UNEXPECTED ITEM IN THE BAGGING AREA, the shrine intones. I lack the strength to placate it.',
        bw:4,
      });
      appliance({
        kind:'switch', x:1.7, y:1.78, z:1.34, w:0.18, h:0.18, d:0.04,
        color:0xfff8e0,
        label:'A LIGHT SWITCH · +3 bewilder',
        quote:'A click — and the whole hall darkens! I have stolen the sun. Quick, put it back.',
        bw:3,
      });
    },
    stones(){
      groundMat.color.setHex(0x4e6a3a);
      scene.background = new THREE.Color(0x7a86a0);   // overcast sky
      // 5 standing stones in a partial circle + a leaning capstone
      const R = 2.4;
      const cols = [0x8a8a82, 0x9a9484, 0x7a7672];
      for (let i = 0; i < 5; i++){
        const a = (i / 6) * Math.PI * 2;
        const x = Math.cos(a) * R, z = Math.sin(a) * R;
        const h = 2.2 + Math.random() * 0.8;
        const stone = box(0.7, h, 0.5, cols[i % 3], x, h/2, z, Math.random() * 0.2 - 0.1);
        stone.rotation.z = (Math.random() - 0.5) * 0.18;
      }
      // leaning stone in center-left
      const lean = box(0.6, 2.6, 0.4, 0x808078, -0.8, 1.3, 0);
      lean.rotation.z = -0.42;
      // a capstone resting on two pillars at the back
      box(0.6, 1.6, 0.4, 0x9a9484, -1.4, 0.8, -2.4);
      box(0.6, 1.6, 0.4, 0x9a9484,  1.4, 0.8, -2.4);
      const cap = box(3.4, 0.4, 0.6, 0xb0aa9c, 0, 1.8, -2.4);
      cap.rotation.x = 0.02;
      // soft moss patches as flat green boxes on the ground
      box(2.0, 0.02, 1.6, 0x5a7a30, 0, 0.02, 0);
      // a hint of mist via low-opacity light
    },
    portal(){
      // The door of light between the stones
      groundMat.color.setHex(0x4e6a3a);
      scene.background = new THREE.Color(0x2a3a5a);
      // two stones flanking
      box(0.7, 2.6, 0.5, 0x8a8a82, -1.2, 1.3, 0);
      box(0.7, 2.6, 0.5, 0x8a8a82,  1.2, 1.3, 0);
      // glowing portal
      const glow = new THREE.Mesh(
        new THREE.PlaneGeometry(2.4, 2.6),
        new THREE.MeshBasicMaterial({ color: 0xffe7a0, transparent: true, opacity: 0.85 })
      );
      glow.position.set(0, 1.3, 0);
      stage.add(glow);
      // extra emissive light
      const glowLight = new THREE.PointLight(0xffd770, 1.5, 12);
      glowLight.position.set(0, 1.3, 0);
      stage.add(glowLight);
    },
    wellness(){
      groundMat.color.setHex(0xa6b48a);
      scene.background = new THREE.Color(0xd8dfe5);
      // beige modern building
      box(5, 1.8, 2.2, 0xe7d3a0, 0, 0.9, 0);
      box(5, 0.4, 2.3, 0x8a8a82, 0, 1.8, 0);
      // hedges
      for (let x = -3; x <= 3; x += 0.7){
        box(0.6, 0.45, 0.4, 0x4a6a32, x, 0.22, 1.6);
      }
      // tasteful potted plant
      box(0.4, 0.3, 0.4, 0x8a5a31, -2.0, 0.15, -1.2);
      cone(0.5, 0.8, 0x4a6a32, -2.0, 0.7, -1.2);
      // clickable: a tasteful glass cabinet of crisps & cordial
      appliance({
        kind:'vending', x:-1.8, y:1.0, z:1.18, w:0.65, h:1.5, d:0.4,
        color:0xc63a2e,
        label:'A GLASS CABINET · +5 bewilder',
        quote:'I fed it a hex — and it gave me a bag of CRISPS. Touchwood is appalled.',
        bw:5,
      });
      // clickable: a tannoy intoning "mindfulness in five minutes"
      appliance({
        kind:'tannoy', x:1.8, y:1.6, z:1.18, w:0.4, h:0.3, d:0.18,
        color:0x8a8a82,
        label:'A SHOUTING-BOX · +4 bewilder',
        quote:'Mindfulness in five minutes, the box intones. I shall mind nothing, thank you.',
        bw:4,
      });
    },
  };

  const SCENE_MAP = {
    s_start: 'farm',  s_no_hex: 'farm',
    s_lane: 'lane',   s_phone: 'lane',   s_phone_hex: 'lane',
    s_car:  'lane',   s_car_hex: 'lane',
    s_field: 'field', s_drone: 'field',
    s_pub:  'village', s_pub_eject: 'village', s_amulet: 'village',
    s_village: 'village', s_vicar_confess: 'village',
    s_tesco: 'tesco', s_tesco_alarm: 'tesco',
    s_stones: 'stones',
    s_return: 'portal', s_end_win: 'portal',
    s_end_lose: 'wellness',
  };
  const LABELS = {
    farm:     'EXT. HEXWOOD FARM — DAY',
    lane:     'EXT. METALLED LANE — DAY',
    field:    'EXT. RAPESEED FIELD — DAY',
    village:  'EXT. VILLAGE GREEN — DAY',
    tesco:    'INT. SUPERMARKET — DAY',
    stones:   'EXT. THE STANDING STONES — OVERCAST',
    portal:   'EXT. THE STONES — DOOR OF LIGHT',
    wellness: 'EXT. WELLNESS CENTRE, SURREY — DAY',
  };

  let currentKey = null;
  function setScene(sceneId){
    const key = SCENE_MAP[sceneId] || 'farm';
    if (key === currentKey) return;
    currentKey = key;
    clearStage();
    const b = builders[key];
    if (b) b();
    const $lab = document.getElementById('diorama-label');
    if ($lab) $lab.textContent = LABELS[key] || '';
  }

  // raycaster — chat ask: clickable electrical appliances. Clicking a
  // tagged mesh fires a drama interlude and bumps bewilderment, so the
  // 3D viewport is no longer just decoration — it's a hex-trap.
  const raycaster = new THREE.Raycaster();
  const mouse = new THREE.Vector2();
  let lastClickAt = 0;
  canvas.style.cursor = 'pointer';
  canvas.addEventListener('click', (e) => {
    const now = performance.now();
    if (now - lastClickAt < 250) return;  // debounce double-fires
    const r = canvas.getBoundingClientRect();
    mouse.x = ((e.clientX - r.left) / r.width) * 2 - 1;
    mouse.y = -((e.clientY - r.top) / r.height) * 2 + 1;
    raycaster.setFromCamera(mouse, camera);
    const hits = raycaster.intersectObjects(appliances, false);
    if (!hits.length) return;
    lastClickAt = now;
    const hit = hits[0].object;
    const u = hit.userData;
    // golden flash on hit, then restore
    hit.material.color.setHex(0xffe080);
    setTimeout(() => {
      if (hit.material && hit._baseColor != null) hit.material.color.setHex(hit._baseColor);
    }, 320);
    // shake the frame for a beat
    const frame = canvas.parentElement;
    if (frame){
      frame.style.transition = 'transform 90ms';
      frame.style.transform = 'translateX(-3px)';
      setTimeout(() => { frame.style.transform = 'translateX(3px)'; }, 90);
      setTimeout(() => { frame.style.transform = ''; }, 180);
    }
    // bewilderment + drama interlude. drama() and state/save/render are
    // top-level in the same script; this runs long after they're defined.
    try {
      if (typeof state !== 'undefined' && typeof BW_MAX === 'number'){
        state.bw = Math.min(BW_MAX, state.bw + (u.bw || 3));
        if (typeof save === 'function') save();
        if (typeof render === 'function') render();
      }
      if (typeof drama === 'function') drama(u.quote, u.label);
    } catch (err) { /* swallow — diorama is decorative if anything breaks */ }
  });

  // slow orbit camera
  let t = 0;
  function tick(){
    t += 0.008;
    const r = 8.5;
    camera.position.set(Math.cos(t * 0.35) * r, 5.5, Math.sin(t * 0.35) * r);
    camera.lookAt(0, 1, 0);
    renderer.render(scene, camera);
    requestAnimationFrame(tick);
  }
  window.addEventListener('resize', resize);
  // first paint
  setTimeout(() => { resize(); }, 30);
  requestAnimationFrame(tick);

  return { setScene };
})();


// ── boot ─────────────────────────────────────────────────────────────
document.getElementById('btn-restart').addEventListener('click', () => {
  if (!confirm('Begin the journey again? Bewilderment will be forgotten.')) return;
  const $e = document.getElementById('endcard');
  if ($e) $e.remove();
  reset();
});

render();
</script>
