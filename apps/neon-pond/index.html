<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Neon Pond</title>
  <link rel="icon" href="https://emojicdn.elk.sh/🦆">
  <meta property="og:title" content="Neon Pond">
  <meta property="og:description" content="Herd glowing ducks into the whirlpool with your cursor. Quack quack chaos.">
  <meta property="og:url" content="https://sloppy.live/neon-pond">
  <meta property="og:image" content="https://sloppy.live/neon-pond/og-image.png">
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600;700&family=Cutive+Mono&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #060c18;
      overflow: hidden;
      height: 100dvh;
      font-family: 'Cutive Mono', monospace;
      touch-action: none;
      user-select: none;
    }
    canvas { display: block; position: fixed; inset: 0; cursor: none; }
    #hud {
      position: fixed; top: 10px; left: 0; right: 0;
      display: flex; justify-content: center; gap: 26px;
      font-family: 'Fredoka', sans-serif; font-weight: 600;
      font-size: 15px; z-index: 10; pointer-events: none;
    }
    .hv { color: #44ddff; text-shadow: 0 0 8px #44ddff44; }
    .hv-duck { color: #ffcc00; text-shadow: 0 0 8px #ffcc0044; }
    .hv-time { color: #ff66aa; }
    .hl { color: #2a4a5a; font-size: 11px; font-family: 'Cutive Mono', monospace; }
    #overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 20; background: rgba(6,12,24,0.94);
    }
    #overlay.hidden { display: none; }
    #overlay h1 {
      font-family: 'Fredoka', sans-serif; font-weight: 700;
      font-size: clamp(28px, 7vw, 54px);
      color: #44ddff;
      text-shadow: 0 0 30px #44ddff44;
      margin-bottom: 4px;
    }
    #overlay .sub {
      font-size: clamp(11px, 2.5vw, 14px);
      color: #2a4a5a; margin-bottom: 22px;
      text-align: center; padding: 0 20px; line-height: 1.7;
    }
    #overlay .big { font-family: 'Fredoka', sans-serif; font-size: 40px; color: #ffcc00; margin: 6px 0; }
    #overlay .det { color: #44ddff; font-size: 13px; margin-bottom: 16px; }
    .pbtn {
      font-family: 'Fredoka', sans-serif; font-weight: 600;
      font-size: 16px; padding: 12px 30px;
      background: none; border: 2px solid #44ddff;
      color: #44ddff; cursor: pointer; letter-spacing: 1px;
      border-radius: 30px; transition: all .2s;
    }
    .pbtn:hover { background: #44ddff; color: #060c18; }
    .hint { font-size: 10px; color: #1a3040; margin-top: 14px; text-align: center; }
    #backlink {
      position: fixed; bottom: 6px; right: 10px;
      font-size: 10px; color: #0a1a28; text-decoration: none; z-index: 10;
    }
    #backlink:hover { color: #44ddff; }
  </style>
</head>
<body>

  <canvas id="c"></canvas>

  <div id="hud" style="display:none">
    <span><span class="hl">HERDED</span> <span class="hv" id="h-score">0</span></span>
    <span><span class="hl">DUCKS</span> <span class="hv-duck" id="h-ducks">0</span></span>
    <span><span class="hl">ROUND</span> <span class="hv-time" id="h-round">1</span></span>
  </div>

  <div id="overlay">
    <h1>NEON POND</h1>
    <p class="sub">Glowing ducks roam the pond. Use your cursor to scare them<br>into the whirlpool. Herd them all to advance.</p>
    <button class="pbtn" id="btn-go">START HERDING</button>
    <div class="hint">move cursor near ducks to scare them &middot; guide them into the whirlpool</div>
  </div>

  <a id="backlink" href="https://sloppy.live">sloppy.live</a>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);

/* ── State ── */
let state = 'menu';
let score = 0, round = 1, frame = 0;
let ducks = [];
let ripples = [];
let particles = [];
let quacks = []; // floating quack texts

/* ── Cursor ── */
let mx = W / 2, my = H / 2;
canvas.addEventListener('pointermove', e => { mx = e.clientX; my = e.clientY; });
canvas.addEventListener('pointerdown', e => { mx = e.clientX; my = e.clientY; });

/* ── Whirlpool ── */
const pool = { x: 0, y: 0, radius: 50, angle: 0, pullRadius: 90 };

function placeWhirlpool() {
  // Random position away from edges
  pool.x = W * 0.25 + Math.random() * W * 0.5;
  pool.y = H * 0.25 + Math.random() * H * 0.5;
  pool.radius = 35 + round * 2;
  pool.pullRadius = pool.radius + 55;
}

/* ── Duck colors ── */
const DUCK_HUES = [45, 120, 200, 300, 30, 170, 60, 330, 80, 250];

function createDuck(idx) {
  // Spawn away from whirlpool
  let x, y;
  do {
    x = 60 + Math.random() * (W - 120);
    y = 60 + Math.random() * (H - 120);
  } while (Math.hypot(x - pool.x, y - pool.y) < pool.pullRadius + 80);

  const hue = DUCK_HUES[idx % DUCK_HUES.length];
  return {
    x, y,
    vx: (Math.random() - 0.5) * 1.5,
    vy: (Math.random() - 0.5) * 1.5,
    hue,
    size: 12 + Math.random() * 4,
    angle: Math.random() * Math.PI * 2,
    waddle: Math.random() * Math.PI * 2,
    waddleSpeed: 0.08 + Math.random() * 0.04,
    scared: 0, // 0-1 fear level
    quackTimer: 60 + Math.floor(Math.random() * 200),
    caught: false,
    catchAnim: 0
  };
}

function startRound() {
  const count = 3 + round * 2;
  ducks = [];
  placeWhirlpool();
  for (let i = 0; i < Math.min(count, 20); i++) {
    ducks.push(createDuck(i));
  }
  ripples = [];
}

function startGame() {
  state = 'play';
  score = 0; round = 1; frame = 0;
  particles = []; quacks = [];
  startRound();
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('hud').style.display = 'flex';
}

document.getElementById('btn-go').onclick = startGame;
window.addEventListener('keydown', e => {
  if ((e.code === 'Space' || e.code === 'Enter') && state !== 'play') startGame();
});

/* ── Pond lilypads (decoration) ── */
let lilypads = [];
function genLilypads() {
  lilypads = [];
  for (let i = 0; i < 6 + Math.floor(Math.random() * 4); i++) {
    lilypads.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: 12 + Math.random() * 18,
      rot: Math.random() * Math.PI * 2,
      hue: 130 + Math.random() * 30
    });
  }
}
genLilypads();

/* ── Update ── */
function update() {
  if (state !== 'play') return;
  frame++;

  pool.angle += 0.03;

  const SCARE_RADIUS = 100;
  const SCARE_FORCE = 3.5;
  const WANDER_FORCE = 0.15;
  const DAMPING = 0.96;
  const EDGE_MARGIN = 30;

  let alive = 0;

  for (const d of ducks) {
    if (d.caught) {
      d.catchAnim += 0.05;
      // Spiral into whirlpool
      const a = pool.angle + d.catchAnim * 4;
      const r = pool.radius * (1 - d.catchAnim);
      d.x = pool.x + Math.cos(a) * Math.max(r, 0);
      d.y = pool.y + Math.sin(a) * Math.max(r, 0);
      d.size *= 0.97;
      continue;
    }
    alive++;

    // Distance to cursor
    const dxm = d.x - mx, dym = d.y - my;
    const distM = Math.hypot(dxm, dym);

    // Scare from cursor
    if (distM < SCARE_RADIUS && distM > 1) {
      const force = SCARE_FORCE * (1 - distM / SCARE_RADIUS);
      d.vx += (dxm / distM) * force;
      d.vy += (dym / distM) * force;
      d.scared = Math.min(1, d.scared + 0.15);

      // Quack when first scared
      if (d.scared > 0.3 && d.quackTimer <= 0) {
        d.quackTimer = 40 + Math.floor(Math.random() * 60);
        quacks.push({
          x: d.x, y: d.y - d.size - 5,
          life: 30, maxLife: 30,
          text: Math.random() < 0.3 ? 'QUACK!' : Math.random() < 0.5 ? 'quack' : 'QUAK'
        });
      }
    } else {
      d.scared *= 0.97;
    }

    // Wander when calm
    if (d.scared < 0.2) {
      d.vx += (Math.random() - 0.5) * WANDER_FORCE;
      d.vy += (Math.random() - 0.5) * WANDER_FORCE;
    }

    // Avoid other ducks
    for (const other of ducks) {
      if (other === d || other.caught) continue;
      const ddx = d.x - other.x, ddy = d.y - other.y;
      const dd = Math.hypot(ddx, ddy);
      if (dd < d.size + other.size + 8 && dd > 0) {
        const push = 0.3 / dd;
        d.vx += ddx * push;
        d.vy += ddy * push;
      }
    }

    // Whirlpool pull when close
    const dxp = pool.x - d.x, dyp = pool.y - d.y;
    const distP = Math.hypot(dxp, dyp);
    if (distP < pool.pullRadius && distP > 1) {
      const pull = 0.8 * (1 - distP / pool.pullRadius);
      d.vx += (dxp / distP) * pull;
      d.vy += (dyp / distP) * pull;
      // Tangential swirl
      d.vx += (-dyp / distP) * pull * 0.5;
      d.vy += (dxp / distP) * pull * 0.5;
    }

    // Caught by whirlpool
    if (distP < pool.radius * 0.6) {
      d.caught = true;
      d.catchAnim = 0;
      score++;
      // Celebration particles
      for (let j = 0; j < 15; j++) {
        particles.push({
          x: d.x, y: d.y,
          vx: (Math.random() - 0.5) * 6,
          vy: (Math.random() - 0.5) * 6,
          life: 25 + Math.random() * 20,
          maxLife: 45,
          size: 2 + Math.random() * 3,
          hue: d.hue
        });
      }
      // Splash ripple
      ripples.push({ x: pool.x, y: pool.y, r: 5, maxR: pool.radius + 30, alpha: 0.6 });
    }

    // Apply velocity
    d.vx *= DAMPING; d.vy *= DAMPING;

    // Speed cap
    const spd = Math.hypot(d.vx, d.vy);
    if (spd > 6) { d.vx *= 6 / spd; d.vy *= 6 / spd; }

    d.x += d.vx; d.y += d.vy;

    // Bounce off edges
    if (d.x < EDGE_MARGIN) { d.x = EDGE_MARGIN; d.vx = Math.abs(d.vx) * 0.5; }
    if (d.x > W - EDGE_MARGIN) { d.x = W - EDGE_MARGIN; d.vx = -Math.abs(d.vx) * 0.5; }
    if (d.y < EDGE_MARGIN) { d.y = EDGE_MARGIN; d.vy = Math.abs(d.vy) * 0.5; }
    if (d.y > H - EDGE_MARGIN) { d.y = H - EDGE_MARGIN; d.vy = -Math.abs(d.vy) * 0.5; }

    // Facing direction
    if (Math.abs(d.vx) > 0.3 || Math.abs(d.vy) > 0.3) {
      d.angle = Math.atan2(d.vy, d.vx);
    }
    d.waddle += d.waddleSpeed * (1 + d.scared * 3);
    if (d.quackTimer > 0) d.quackTimer--;

    // Ripples while swimming
    if (frame % 20 === 0 && spd > 0.5) {
      ripples.push({ x: d.x, y: d.y, r: 2, maxR: d.size + 8, alpha: 0.2 });
    }
  }

  // Round complete?
  if (alive === 0 && ducks.some(d => d.caught)) {
    // Check all caught animations done
    const allDone = ducks.every(d => d.catchAnim > 1);
    if (allDone) {
      round++;
      startRound();
      genLilypads();
    }
  }

  // Ripples
  for (let i = ripples.length - 1; i >= 0; i--) {
    const r = ripples[i];
    r.r += 0.8;
    r.alpha *= 0.96;
    if (r.r > r.maxR || r.alpha < 0.01) ripples.splice(i, 1);
  }

  // Particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vy += 0.1;
    p.vx *= 0.98;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
  if (particles.length > 300) particles.splice(0, particles.length - 300);

  // Quacks
  for (let i = quacks.length - 1; i >= 0; i--) {
    quacks[i].y -= 0.8;
    quacks[i].life--;
    if (quacks[i].life <= 0) quacks.splice(i, 1);
  }

  // HUD
  document.getElementById('h-score').textContent = score;
  const aliveCount = ducks.filter(d => !d.caught).length;
  document.getElementById('h-ducks').textContent = aliveCount;
  document.getElementById('h-round').textContent = round;
}

/* ── Draw ── */
function draw() {
  // Dark water background
  ctx.fillStyle = '#060c18';
  ctx.fillRect(0, 0, W, H);

  // Water caustics
  drawCaustics();

  // Lilypads
  for (const lp of lilypads) {
    ctx.save();
    ctx.translate(lp.x, lp.y);
    ctx.rotate(lp.rot + Math.sin(frame * 0.01 + lp.x) * 0.1);
    ctx.fillStyle = `hsla(${lp.hue}, 40%, 20%, 0.3)`;
    ctx.beginPath();
    ctx.arc(0, 0, lp.r, 0.2, Math.PI * 2 - 0.2);
    ctx.lineTo(0, 0);
    ctx.fill();
    ctx.strokeStyle = `hsla(${lp.hue}, 50%, 30%, 0.2)`;
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
  }

  // Ripples
  for (const r of ripples) {
    ctx.strokeStyle = `rgba(68,221,255,${r.alpha})`;
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
    ctx.stroke();
  }

  // Whirlpool
  drawWhirlpool();

  // Ducks
  for (const d of ducks) {
    if (d.caught && d.catchAnim > 1) continue;
    drawDuck(d);
  }

  // Particles
  for (const p of particles) {
    const alpha = p.life / p.maxLife;
    ctx.fillStyle = `hsla(${p.hue}, 90%, 65%, ${alpha})`;
    ctx.shadowColor = `hsla(${p.hue}, 90%, 65%, ${alpha * 0.5})`;
    ctx.shadowBlur = 4;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * alpha, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.shadowBlur = 0;

  // Quack texts
  for (const q of quacks) {
    const alpha = q.life / q.maxLife;
    ctx.fillStyle = `rgba(255,230,100,${alpha})`;
    ctx.font = `bold ${12 + (1 - alpha) * 4}px "Fredoka", sans-serif`;
    ctx.textAlign = 'center';
    ctx.fillText(q.text, q.x, q.y);
  }

  // Cursor — ripple ring
  drawCursor();
}

function drawCaustics() {
  // Subtle moving water pattern
  const t = frame * 0.008;
  ctx.globalAlpha = 0.03;
  ctx.strokeStyle = '#44ddff';
  ctx.lineWidth = 0.5;
  for (let i = 0; i < 15; i++) {
    const baseX = (i * 137 + t * 50) % (W + 200) - 100;
    const baseY = (i * 211) % H;
    ctx.beginPath();
    for (let s = 0; s < 80; s++) {
      const px = baseX + s * 3;
      const py = baseY + Math.sin(s * 0.15 + t + i) * 15;
      s === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
}

function drawWhirlpool() {
  const { x, y, radius, angle } = pool;

  // Outer glow
  const grd = ctx.createRadialGradient(x, y, 0, x, y, radius * 2.5);
  grd.addColorStop(0, 'rgba(68,221,255,0.08)');
  grd.addColorStop(0.5, 'rgba(40,100,180,0.04)');
  grd.addColorStop(1, 'transparent');
  ctx.fillStyle = grd;
  ctx.fillRect(x - radius * 2.5, y - radius * 2.5, radius * 5, radius * 5);

  // Spiral arms
  ctx.lineWidth = 1.5;
  for (let arm = 0; arm < 3; arm++) {
    const startA = angle + arm * (Math.PI * 2 / 3);
    ctx.beginPath();
    for (let s = 0; s < 40; s++) {
      const t = s / 40;
      const a = startA + t * Math.PI * 3;
      const r = radius * (1 - t * 0.85);
      const px = x + Math.cos(a) * r;
      const py = y + Math.sin(a) * r;
      s === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.strokeStyle = `rgba(68,221,255,${0.25 - 0.15 * Math.sin(frame * 0.05 + arm)})`;
    ctx.stroke();
  }

  // Center dot
  ctx.fillStyle = `rgba(68,221,255,${0.4 + Math.sin(frame * 0.08) * 0.2})`;
  ctx.shadowColor = '#44ddff';
  ctx.shadowBlur = 15;
  ctx.beginPath();
  ctx.arc(x, y, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.shadowBlur = 0;

  // Ring
  ctx.strokeStyle = `rgba(68,221,255,${0.15 + Math.sin(frame * 0.06) * 0.05})`;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.arc(x, y, radius, 0, Math.PI * 2);
  ctx.stroke();
}

function drawDuck(d) {
  ctx.save();
  ctx.translate(d.x, d.y);
  ctx.rotate(d.angle);

  const s = d.size;
  const wob = Math.sin(d.waddle) * 0.12;
  ctx.rotate(wob);

  const alpha = d.caught ? Math.max(0, 1 - d.catchAnim) : 1;
  ctx.globalAlpha = alpha;

  const lit = d.scared > 0.3 ? 70 : 55;
  const sat = d.scared > 0.3 ? 100 : 80;

  // Glow
  ctx.shadowColor = `hsla(${d.hue}, ${sat}%, ${lit}%, 0.6)`;
  ctx.shadowBlur = 8 + d.scared * 10;

  // Body (oval)
  ctx.fillStyle = `hsla(${d.hue}, ${sat}%, ${lit}%, 0.85)`;
  ctx.beginPath();
  ctx.ellipse(0, 0, s * 1.1, s * 0.75, 0, 0, Math.PI * 2);
  ctx.fill();

  // Head
  ctx.fillStyle = `hsla(${d.hue}, ${sat}%, ${lit + 10}%, 0.9)`;
  ctx.beginPath();
  ctx.arc(s * 0.8, -s * 0.2, s * 0.45, 0, Math.PI * 2);
  ctx.fill();

  ctx.shadowBlur = 0;

  // Eye
  ctx.fillStyle = '#0a0a14';
  ctx.beginPath();
  ctx.arc(s * 0.95, -s * 0.3, s * 0.1, 0, Math.PI * 2);
  ctx.fill();
  // Eye highlight
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(s * 0.98, -s * 0.34, s * 0.04, 0, Math.PI * 2);
  ctx.fill();

  // Beak
  ctx.fillStyle = '#ff8822';
  ctx.beginPath();
  ctx.moveTo(s * 1.2, -s * 0.15);
  ctx.lineTo(s * 1.55, -s * 0.05);
  ctx.lineTo(s * 1.2, s * 0.05);
  ctx.fill();

  // Tail feathers
  ctx.fillStyle = `hsla(${d.hue}, ${sat}%, ${lit - 10}%, 0.7)`;
  ctx.beginPath();
  ctx.moveTo(-s * 0.9, -s * 0.1);
  ctx.lineTo(-s * 1.4, -s * 0.35);
  ctx.lineTo(-s * 1.1, 0);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(-s * 0.9, 0.05);
  ctx.lineTo(-s * 1.3, s * 0.2);
  ctx.lineTo(-s * 1.0, s * 0.1);
  ctx.fill();

  // Wing
  const wingY = Math.sin(d.waddle * 2) * s * 0.08;
  ctx.fillStyle = `hsla(${d.hue}, ${sat}%, ${lit - 5}%, 0.6)`;
  ctx.beginPath();
  ctx.ellipse(0, s * 0.15 + wingY, s * 0.6, s * 0.3, 0.2, 0, Math.PI * 2);
  ctx.fill();

  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawCursor() {
  // Ripple ring around cursor
  const pulse = Math.sin(frame * 0.1) * 3;
  ctx.strokeStyle = `rgba(200,230,255,${0.2 + Math.sin(frame * 0.08) * 0.1})`;
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(mx, my, 18 + pulse, 0, Math.PI * 2);
  ctx.stroke();

  // Center dot
  ctx.fillStyle = 'rgba(200,230,255,0.5)';
  ctx.beginPath();
  ctx.arc(mx, my, 3, 0, Math.PI * 2);
  ctx.fill();

  // Directional lines
  const lineLen = 6;
  ctx.strokeStyle = 'rgba(200,230,255,0.25)';
  ctx.lineWidth = 1;
  for (let a = 0; a < 4; a++) {
    const ang = a * Math.PI / 2 + frame * 0.02;
    const r1 = 22 + pulse;
    const r2 = r1 + lineLen;
    ctx.beginPath();
    ctx.moveTo(mx + Math.cos(ang) * r1, my + Math.sin(ang) * r1);
    ctx.lineTo(mx + Math.cos(ang) * r2, my + Math.sin(ang) * r2);
    ctx.stroke();
  }
}

/* ── Loop ── */
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
