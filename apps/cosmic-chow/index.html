<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Cosmic Chow</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="Zero-g soup. Click to spawn bouncing neon ingredients that float and collide inside a containment bowl. Stir, salt, scatter.">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8D%B2">
<meta property="og:title" content="Cosmic Chow">
<meta property="og:description" content="Zero-g soup. Click to spawn bouncing neon ingredients that float and collide inside a containment bowl.">
<meta property="og:url" content="https://sloppy.live/cosmic-chow">
<meta property="og:type" content="website">
<meta property="og:image" content="https://image.pollinations.ai/prompt/cosmic%20zero-gravity%20soup%20bowl%20with%20glowing%20neon%20ingredients%20floating%20-%20pink%20shrimp%2C%20green%20peas%2C%20golden%20noodles%2C%20yellow%20stars%2C%20deep%20space%20background%2C%20cinematic?width=1200&height=630&nologo=true">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Major+Mono+Display&family=Space+Mono:wght@400;700&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">
<style>
:root{
  --void:#080418;
  --void-2:#120630;
  --bowl:#1d0f3a;
  --bowl-rim:#7adcff;
  --foam:#dff5fb;
  --cyan:#7adcff;
  --magenta:#ff5ec8;
  --gold:#f5c453;
  --green:#7dba6c;
  --orange:#ff8a4c;
  --rose:#ec7a85;
  --ink:#080418;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:100%;-webkit-text-size-adjust:100%}
body{
  min-height:100vh;background:var(--void);color:var(--foam);
  font-family:'Space Mono',ui-monospace,monospace;
  font-size:1rem;line-height:1.45;overflow:hidden;
}
a.skip-link{position:absolute;left:0.5rem;top:-3rem;z-index:200;
  background:var(--magenta);color:var(--ink);padding:0.5rem 0.75rem;
  text-decoration:none;border-radius:0.25rem;
  font-family:'Audiowide',cursive;font-size:0.875rem}
a.skip-link:focus{top:0.5rem;outline:0.1875rem solid var(--gold);outline-offset:0.125rem}

main{position:fixed;inset:0}
canvas#bowl{
  display:block;width:100%;height:100%;background:transparent;outline:none;
  cursor:crosshair;
}
canvas#bowl:focus-visible{box-shadow:inset 0 0 0 0.1875rem var(--gold)}

/* Brand */
.brand{
  position:absolute;top:1rem;left:1.25rem;z-index:6;
  pointer-events:none;
  text-shadow:0 0.125rem 0.375rem rgba(0,0,0,0.7);
}
h1{
  font-family:'Audiowide',cursive;
  font-size:clamp(1.25rem, 3.4vw, 2.125rem);
  letter-spacing:0.18em;line-height:1;color:var(--foam);text-transform:uppercase;
}
h1 .accent{
  color:var(--magenta);
  text-shadow:0 0 0.5rem rgba(255,94,200,0.7), 0 0 1.25rem rgba(255,94,200,0.4);
}
.tag{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:1.0625rem;color:rgba(223,245,251,0.78);
  margin-top:0.25rem;
}

/* Top-right HUD pills */
.hud{
  position:absolute;top:1rem;right:1rem;z-index:6;
  display:flex;gap:0.4375rem;flex-wrap:wrap;font-size:0.6875rem;
}
.hud .pill{
  background:rgba(8,4,24,0.78);
  border:0.0625rem solid rgba(223,245,251,0.30);
  border-radius:0.25rem;padding:0.4375rem 0.625rem;letter-spacing:0.16em;
  text-transform:uppercase;display:flex;gap:0.4375rem;align-items:center;
  min-height:2.25rem;color:var(--foam);backdrop-filter:blur(3px);
}
.hud b{font-family:'Major Mono Display',monospace;color:var(--cyan);font-size:0.875rem;font-weight:400}
.hud .pill[role="button"]{cursor:pointer}
.hud .pill[role="button"]:hover{border-color:var(--gold)}
.hud .pill:focus-visible{outline:0.1875rem solid var(--gold);outline-offset:0.125rem}

/* Bottom palette dock */
.dock{
  position:absolute;left:50%;bottom:1.25rem;transform:translateX(-50%);z-index:7;
  display:flex;gap:0.375rem;align-items:center;flex-wrap:wrap;
  background:rgba(8,4,24,0.82);
  border:0.0625rem solid rgba(223,245,251,0.30);
  border-radius:1.5rem;
  padding:0.5rem 0.75rem;
  backdrop-filter:blur(4px);
  max-width:96vw;
}
.dock button.ing{
  position:relative;
  width:2.75rem;height:2.75rem;
  border:0.0625rem solid rgba(223,245,251,0.20);
  border-radius:50%;cursor:pointer;background:transparent;
  display:flex;align-items:center;justify-content:center;
  padding:0;
  transition:transform 0.08s, border-color 0.08s, box-shadow 0.08s;
}
.dock button.ing:hover{transform:translateY(-0.125rem)}
.dock button.ing[aria-pressed="true"]{
  border-color:var(--gold);
  box-shadow:0 0 0.5rem rgba(245,196,83,0.55), inset 0 0 0.5rem rgba(245,196,83,0.25);
}
.dock button.ing:focus-visible{outline:0.1875rem solid var(--gold);outline-offset:0.125rem}
.dock button.ing canvas{display:block;width:1.875rem;height:1.875rem;pointer-events:none}
.dock .sep{
  width:1px;height:1.5rem;background:rgba(223,245,251,0.20);margin:0 0.25rem;
}
.dock button.action{
  background:transparent;
  border:0.0625rem solid rgba(223,245,251,0.30);
  color:var(--foam);font-family:'Major Mono Display',monospace;
  padding:0.4375rem 0.75rem;border-radius:1.25rem;cursor:pointer;
  letter-spacing:0.16em;font-size:0.75rem;min-height:2.25rem;
}
.dock button.action:hover{border-color:var(--gold);color:var(--gold)}
.dock button.action:focus-visible{outline:0.1875rem solid var(--gold);outline-offset:0.125rem}

/* Floating hint */
.hint{
  position:absolute;left:50%;top:54%;transform:translateX(-50%);z-index:5;
  font-family:'Cormorant Garamond',serif;font-style:italic;
  color:rgba(223,245,251,0.55);font-size:1rem;
  pointer-events:none;text-align:center;
  text-shadow:0 0.125rem 0.5rem rgba(0,0,0,0.7);
  transition:opacity 0.4s;
}
.hint.fade{opacity:0}

@media (max-width:560px){
  .brand .tag{display:none}
  .dock{gap:0.25rem;padding:0.375rem 0.5rem}
  .dock button.ing{width:2.25rem;height:2.25rem}
  .dock button.ing canvas{width:1.5rem;height:1.5rem}
}

@media (prefers-reduced-motion: reduce){
  .dock button.ing:hover{transform:none}
  .hint{transition:none}
}

.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap}
</style>
</head>
<body>

<a href="#bowl" class="skip-link">Skip to bowl</a>

<main>
  <canvas id="bowl" tabindex="0" role="application"
          aria-label="Cosmic Chow — a zero-gravity neon soup. Click anywhere to spawn an ingredient. Pick an ingredient from the dock at the bottom, or leave it on RANDOM. Use STIR to swirl the bowl, CLEAR to empty it.">
  </canvas>

  <div class="brand">
    <h1>COSMIC <span class="accent">CHOW</span></h1>
    <div class="tag">— a zero-g soup · click to ladle —</div>
  </div>

  <div class="hud" role="status" aria-live="polite">
    <div class="pill" aria-label="Bowl population"><span>BITES</span> <b id="hCount">0</b></div>
    <div class="pill" id="audioPill" role="button" tabindex="0" aria-pressed="false" aria-label="Toggle audio">
      <span>SOUND</span> <b id="hAudio">OFF</b>
    </div>
  </div>

  <div class="dock" id="dock" role="toolbar" aria-label="Ingredients">
    <!-- ingredient buttons injected from JS -->
    <div class="sep" aria-hidden="true"></div>
    <button type="button" class="action" id="stirBtn" aria-label="Stir the bowl">↻ STIR</button>
    <button type="button" class="action" id="clearBtn" aria-label="Clear the bowl">⌫ CLEAR</button>
  </div>

  <div class="hint" id="hint">click to ladle a bite · pick an ingredient below</div>
</main>

<script>
"use strict";

// ============================================================
// COSMIC CHOW — zero-g soup with bouncing neon ingredients
// ============================================================

const cvs = document.getElementById('bowl');
const ctx = cvs.getContext('2d');
let W = 0, H = 0, DPR = 1;
const bowl = { cx: 0, cy: 0, r: 0 };

function fit(){
  DPR = Math.min(window.devicePixelRatio || 1, 1.5);
  const r = cvs.getBoundingClientRect();
  W = Math.max(320, Math.floor(r.width));
  H = Math.max(240, Math.floor(r.height));
  cvs.width  = Math.floor(W * DPR);
  cvs.height = Math.floor(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  bowl.cx = W / 2;
  bowl.cy = H / 2 + Math.min(20, H * 0.02);
  bowl.r  = Math.min(W, H) * 0.42;
}
window.addEventListener('resize', fit);
fit();

// === Ingredient catalogue — each has its own paint fn so the dock
// preview and the bowl render share artwork. All draw at (0,0) with
// rotation already applied; r is the radius in px. Each draws a
// glowing halo + bright core.
const PALETTE = {
  pea:        { color:'#7dba6c', r: 9,  spinSpeed: 1.2 },
  carrot:     { color:'#ff8a4c', r: 14, spinSpeed: 1.6 },
  noodle:     { color:'#f5c453', r: 12, spinSpeed: 1.4, elong: 2.4 },
  shrimp:     { color:'#ff6f9f', r: 13, spinSpeed: 1.0, elong: 1.6 },
  dumpling:   { color:'#ffd896', r: 17, spinSpeed: 0.8 },
  starfruit:  { color:'#fde54a', r: 13, spinSpeed: 1.8, points: 5 },
  tofu:       { color:'#dff5fb', r: 14, spinSpeed: 1.0, square: true },
  egg:        { color:'#fdf6df', r: 16, spinSpeed: 0.9 },
  bok:        { color:'#7adcff', r: 18, spinSpeed: 0.7, leafy: true },
  mushroom:   { color:'#c1f0a9', r: 14, spinSpeed: 1.0, mushroom: true },
};
const INGREDIENT_KEYS = Object.keys(PALETTE);

function drawIngredient(c, key, x, y, r, rot){
  const def = PALETTE[key];
  c.save();
  c.translate(x, y);
  c.rotate(rot);
  // Outer halo via radial gradient (additive feel — 'lighter' applied
  // by caller for the bowl scene; the dock preview uses default blend)
  const haloR = r * 1.9;
  const halo = c.createRadialGradient(0, 0, r * 0.4, 0, 0, haloR);
  halo.addColorStop(0, def.color);
  halo.addColorStop(0.45, def.color.replace(')', ',0.5)').replace('rgb', 'rgba').replace('#', '#'));
  halo.addColorStop(1, 'rgba(0,0,0,0)');
  // For #hex colours, build halo via hsl mapping for the soft fade
  const fade = hexToRgba(def.color, 0.0);
  const inner = hexToRgba(def.color, 0.55);
  const grad = c.createRadialGradient(0, 0, r * 0.3, 0, 0, haloR);
  grad.addColorStop(0, def.color);
  grad.addColorStop(0.5, inner);
  grad.addColorStop(1, fade);
  c.fillStyle = grad;
  c.beginPath(); c.arc(0, 0, haloR, 0, Math.PI*2); c.fill();
  // Body
  if (def.mushroom){
    // cap (semicircle) + stem
    c.fillStyle = def.color;
    c.beginPath(); c.arc(0, -r * 0.1, r * 0.95, Math.PI, 0); c.fill();
    c.fillStyle = '#fdf6df';
    c.fillRect(-r * 0.32, -r * 0.1, r * 0.64, r * 0.65);
    // spots
    c.fillStyle = 'rgba(255,255,255,0.5)';
    c.beginPath(); c.arc(-r * 0.4, -r * 0.4, r * 0.18, 0, Math.PI*2); c.fill();
    c.beginPath(); c.arc( r * 0.3, -r * 0.5, r * 0.12, 0, Math.PI*2); c.fill();
  } else if (def.points){
    // 5-point star
    starPath(c, 0, 0, def.points, r * 1.05, r * 0.45);
    c.fillStyle = def.color;
    c.fill();
    c.strokeStyle = 'rgba(255,255,255,0.55)';
    c.lineWidth = 1;
    c.stroke();
  } else if (def.square){
    // tofu cube
    c.fillStyle = def.color;
    c.beginPath();
    roundRect(c, -r*0.95, -r*0.95, r*1.9, r*1.9, r*0.18);
    c.fill();
    // highlight
    c.fillStyle = 'rgba(255,255,255,0.50)';
    c.beginPath();
    roundRect(c, -r*0.7, -r*0.7, r*0.5, r*0.5, r*0.10);
    c.fill();
  } else if (def.leafy){
    // bok-choy leafy bundle
    c.fillStyle = def.color;
    c.beginPath();
    c.ellipse(0, 0, r * 1.1, r * 0.75, 0, 0, Math.PI*2);
    c.fill();
    c.fillStyle = '#1aff8e';
    for (let i = 0; i < 5; i++){
      const a = (i / 5) * Math.PI*2;
      c.beginPath();
      c.ellipse(Math.cos(a) * r * 0.55, Math.sin(a) * r * 0.45, r * 0.45, r * 0.20, a, 0, Math.PI*2);
      c.fill();
    }
    c.fillStyle = '#fdf6df';
    c.beginPath(); c.arc(0, 0, r * 0.22, 0, Math.PI*2); c.fill();
  } else if (def.elong){
    // elongated shrimp / noodle squiggle
    const e = def.elong;
    c.fillStyle = def.color;
    c.beginPath();
    c.ellipse(0, 0, r * e * 0.5, r * 0.6, 0, 0, Math.PI*2);
    c.fill();
    if (key === 'noodle'){
      // wavy stripes
      c.strokeStyle = 'rgba(255,255,255,0.45)';
      c.lineWidth = 1.5;
      c.beginPath();
      const w = r * e * 0.5;
      for (let xi = -w; xi <= w; xi += 3){
        const yi = Math.sin((xi + r) * 0.6) * 1.5;
        if (xi === -w) c.moveTo(xi, yi); else c.lineTo(xi, yi);
      }
      c.stroke();
    }
    if (key === 'shrimp'){
      // tail fan
      c.fillStyle = '#c4365c';
      c.beginPath();
      c.moveTo(r * e * 0.4, 0);
      c.lineTo(r * e * 0.8, -r * 0.45);
      c.lineTo(r * e * 0.65, 0);
      c.lineTo(r * e * 0.8, r * 0.45);
      c.closePath(); c.fill();
      // segment lines
      c.strokeStyle = '#c4365c';
      c.lineWidth = 1.2;
      for (let i = -1; i <= 1; i++){
        c.beginPath();
        c.moveTo(i * r * 0.4, -r * 0.5);
        c.quadraticCurveTo(i * r * 0.4, 0, i * r * 0.4, r * 0.5);
        c.stroke();
      }
      // eye
      c.fillStyle = '#1a1108';
      c.beginPath(); c.arc(-r * e * 0.45, -r * 0.15, r * 0.10, 0, Math.PI*2); c.fill();
    }
  } else if (key === 'egg'){
    // half-boiled egg
    c.fillStyle = '#fff';
    c.beginPath(); c.arc(0, 0, r, 0, Math.PI*2); c.fill();
    c.fillStyle = '#f5c453';
    c.beginPath(); c.arc(0, 0, r * 0.55, 0, Math.PI*2); c.fill();
    c.strokeStyle = 'rgba(0,0,0,0.18)';
    c.lineWidth = 1;
    c.stroke();
  } else if (key === 'pea'){
    c.fillStyle = def.color;
    c.beginPath(); c.arc(0, 0, r, 0, Math.PI*2); c.fill();
    c.fillStyle = '#a3d68e';
    c.beginPath(); c.arc(-r * 0.35, -r * 0.35, r * 0.30, 0, Math.PI*2); c.fill();
  } else if (key === 'carrot'){
    // carrot disc (cross-section)
    c.fillStyle = def.color;
    c.beginPath(); c.arc(0, 0, r, 0, Math.PI*2); c.fill();
    c.strokeStyle = '#c44a1c';
    c.lineWidth = 1.5;
    c.beginPath(); c.arc(0, 0, r * 0.65, 0, Math.PI*2); c.stroke();
    c.beginPath(); c.arc(0, 0, r * 0.32, 0, Math.PI*2); c.stroke();
  } else if (key === 'dumpling'){
    // crescent dumpling
    c.fillStyle = def.color;
    c.beginPath();
    c.ellipse(0, 0, r * 1.0, r * 0.7, 0, 0, Math.PI*2);
    c.fill();
    c.strokeStyle = '#a87a4c';
    c.lineWidth = 1.5;
    c.beginPath();
    c.moveTo(-r * 0.7, 0);
    c.lineTo( r * 0.7, 0);
    c.stroke();
    // pleats
    for (let i = -1; i <= 1; i++){
      c.beginPath();
      c.moveTo(i * r * 0.35, -r * 0.05);
      c.lineTo(i * r * 0.35,  r * 0.30);
      c.stroke();
    }
  } else {
    // Generic fallback
    c.fillStyle = def.color;
    c.beginPath(); c.arc(0, 0, r, 0, Math.PI*2); c.fill();
  }
  c.restore();
}

function starPath(c, x, y, points, r1, r2){
  const step = Math.PI / points;
  c.beginPath();
  for (let i = 0; i < points * 2; i++){
    const r = (i % 2 === 0) ? r1 : r2;
    const a = i * step - Math.PI / 2;
    if (i === 0) c.moveTo(x + Math.cos(a) * r, y + Math.sin(a) * r);
    else         c.lineTo(x + Math.cos(a) * r, y + Math.sin(a) * r);
  }
  c.closePath();
}
function roundRect(c, x, y, w, h, r){
  c.moveTo(x+r, y);
  c.lineTo(x+w-r, y);
  c.quadraticCurveTo(x+w, y, x+w, y+r);
  c.lineTo(x+w, y+h-r);
  c.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  c.lineTo(x+r, y+h);
  c.quadraticCurveTo(x, y+h, x, y+h-r);
  c.lineTo(x, y+r);
  c.quadraticCurveTo(x, y, x+r, y);
  c.closePath();
}
function hexToRgba(hex, a){
  const m = hex.match(/^#([0-9a-f]{6})$/i);
  if (!m) return `rgba(255,255,255,${a})`;
  const v = parseInt(m[1], 16);
  return `rgba(${(v>>16)&255},${(v>>8)&255},${v&255},${a})`;
}

// === Ingredient state ===
const ingredients = [];   // { kind, x, y, vx, vy, rot, vRot, r, color }
const sparks = [];        // collision FX particles
const stars = [];         // background twinkle

let selectedKind = 'random';   // or one of INGREDIENT_KEYS
let stirT = 0;                  // remaining stir torque time

function buildBackgroundStars(){
  stars.length = 0;
  const n = Math.floor((W * H) / 6000);
  for (let i = 0; i < n; i++){
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: 0.4 + Math.random() * 1.4,
      a: 0.3 + Math.random() * 0.7,
      tw: Math.random() * Math.PI * 2,
      twS: 0.4 + Math.random() * 1.4,
      hue: Math.random() < 0.2 ? 285 : 200,
    });
  }
}
buildBackgroundStars();
window.addEventListener('resize', buildBackgroundStars);

function spawnIngredient(x, y, forcedKind){
  const kind = forcedKind || (selectedKind === 'random'
    ? INGREDIENT_KEYS[Math.floor(Math.random() * INGREDIENT_KEYS.length)]
    : selectedKind);
  const def = PALETTE[kind];
  const ang = Math.random() * Math.PI * 2;
  const sp = 30 + Math.random() * 70;
  ingredients.push({
    kind, x, y,
    vx: Math.cos(ang) * sp,
    vy: Math.sin(ang) * sp,
    rot: Math.random() * Math.PI * 2,
    vRot: (Math.random() - 0.5) * def.spinSpeed * 4,
    r: def.r,
    color: def.color,
  });
  sndPlop();
}

function clearBowl(){
  // Spawn a few sparks per ingredient as they pop out
  for (const ing of ingredients){
    for (let i = 0; i < 4; i++){
      sparks.push({
        x: ing.x, y: ing.y,
        vx: (Math.random() - 0.5) * 200,
        vy: (Math.random() - 0.5) * 200,
        life: 0.4, max: 0.4,
        color: ing.color,
      });
    }
  }
  ingredients.length = 0;
  sndPop();
}

function stir(){
  stirT = 1.5;   // 1.5s of swirl torque
  sndStir();
}

// === Mouse / click ===
let mouseX = -1000, mouseY = -1000, mouseInside = false;
cvs.addEventListener('pointermove', e => {
  const r = cvs.getBoundingClientRect();
  mouseX = e.clientX - r.left;
  mouseY = e.clientY - r.top;
  mouseInside = true;
  fadeHint();
});
cvs.addEventListener('pointerleave', () => { mouseInside = false; });
cvs.addEventListener('pointerdown', e => {
  ensureAudio();
  const r = cvs.getBoundingClientRect();
  const px = e.clientX - r.left, py = e.clientY - r.top;
  // Spawn at the click point even if it's outside the bowl — wall
  // collision will tug it back inside on the next tick.
  spawnIngredient(px, py);
  fadeHint();
});

// === Audio ===
let actx = null, masterGain = null, muted = true;
function ensureAudio(){
  if (actx) return;
  try{
    actx = new (window.AudioContext||window.webkitAudioContext)();
    masterGain = actx.createGain();
    masterGain.gain.value = muted ? 0 : 0.30;
    masterGain.connect(actx.destination);
  } catch(e){}
}
function setAudio(on){
  muted = !on;
  if (masterGain) masterGain.gain.value = muted ? 0 : 0.30;
  document.getElementById('hAudio').textContent = on ? 'ON' : 'OFF';
  document.getElementById('audioPill').setAttribute('aria-pressed', on ? 'true' : 'false');
}
let lastClink = 0;
function blip(freq, dur, type, vol, slide){
  if (!actx || !masterGain || muted) return;
  const o = actx.createOscillator(); o.type = type || 'sine';
  o.frequency.setValueAtTime(freq, actx.currentTime);
  if (slide) o.frequency.exponentialRampToValueAtTime(slide, actx.currentTime + dur);
  const g = actx.createGain(); g.gain.value = 0;
  o.connect(g); g.connect(masterGain);
  const t = actx.currentTime;
  g.gain.linearRampToValueAtTime(vol || 0.10, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.start(t); o.stop(t + dur + 0.05);
}
function noiseBurst(dur, freq, q, vol){
  if (!actx || muted) return;
  const buf = actx.createBuffer(1, Math.floor(actx.sampleRate*dur), actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * (1 - i/d.length);
  const src = actx.createBufferSource(); src.buffer = buf;
  const bp = actx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value = freq||1000; bp.Q.value = q||3;
  const g = actx.createGain(); g.gain.value = vol||0.18;
  src.connect(bp); bp.connect(g); g.connect(masterGain);
  src.start();
}
function sndPlop(){ blip(560, 0.10, 'sine', 0.08, 280); noiseBurst(0.06, 1800, 1.2, 0.05); }
function sndPop(){  for (let i = 0; i < 5; i++) setTimeout(()=>blip(720 - i*60, 0.06, 'square', 0.06), i*30); }
function sndStir(){ noiseBurst(0.6, 600, 0.4, 0.08); blip(140, 0.5, 'triangle', 0.08, 80); }
function sndClink(impact){
  const t = performance.now();
  if (t - lastClink < 25) return;
  lastClink = t;
  const f = 700 + Math.random() * 700;
  blip(f, 0.05, 'triangle', Math.min(0.10, 0.02 + impact * 0.03));
}

document.getElementById('audioPill').addEventListener('click', () => {
  ensureAudio();
  setAudio(muted);
});
document.getElementById('audioPill').addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' '){ e.preventDefault(); ensureAudio(); setAudio(muted); }
});

// === Physics ===
function tick(dt){
  // Stir torque applies a circular velocity push
  if (stirT > 0){
    const k = stirT / 1.5;          // strength fades
    stirT -= dt;
    for (const ing of ingredients){
      const dx = ing.x - bowl.cx;
      const dy = ing.y - bowl.cy;
      const d = Math.hypot(dx, dy) || 1;
      // Tangent vector (counter-clockwise)
      const tx = -dy / d, ty = dx / d;
      ing.vx += tx * 350 * k * dt;
      ing.vy += ty * 350 * k * dt;
    }
  }
  // Integrate + damping
  for (const ing of ingredients){
    ing.x += ing.vx * dt;
    ing.y += ing.vy * dt;
    ing.rot += ing.vRot * dt;
    ing.vx *= Math.pow(0.992, dt * 60);
    ing.vy *= Math.pow(0.992, dt * 60);
    ing.vRot *= Math.pow(0.985, dt * 60);
    // Bowl wall (circular) — bounce inward
    const dx = ing.x - bowl.cx;
    const dy = ing.y - bowl.cy;
    const dist = Math.hypot(dx, dy);
    if (dist + ing.r > bowl.r){
      const overlap = dist + ing.r - bowl.r;
      const nx = dx / (dist || 1), ny = dy / (dist || 1);
      ing.x -= nx * overlap;
      ing.y -= ny * overlap;
      const dot = ing.vx * nx + ing.vy * ny;
      if (dot > 0){
        ing.vx -= 2 * dot * nx * 0.85;
        ing.vy -= 2 * dot * ny * 0.85;
        ing.vRot += (Math.random() - 0.5) * 4;
        sndClink(Math.min(1, Math.abs(dot) / 200));
      }
    }
  }
  // Pairwise collisions — O(N²). For typical bowl populations (≤120)
  // this is maybe 14k pair checks per tick, comfortably fast.
  for (let i = 0; i < ingredients.length; i++){
    const a = ingredients[i];
    for (let j = i + 1; j < ingredients.length; j++){
      const b = ingredients[j];
      const dx = b.x - a.x, dy = b.y - a.y;
      const d2 = dx * dx + dy * dy;
      const minD = a.r + b.r;
      if (d2 < minD * minD && d2 > 0.001){
        const d = Math.sqrt(d2);
        const overlap = minD - d;
        const nx = dx / d, ny = dy / d;
        // Mass = r²
        const ma = a.r * a.r, mb = b.r * b.r;
        const total = ma + mb;
        const wa = mb / total, wb = ma / total;
        a.x -= nx * overlap * wa;
        a.y -= ny * overlap * wa;
        b.x += nx * overlap * wb;
        b.y += ny * overlap * wb;
        // Elastic-ish velocity exchange along the normal
        const aDot = a.vx * nx + a.vy * ny;
        const bDot = b.vx * nx + b.vy * ny;
        const newA = bDot, newB = aDot;
        a.vx += (newA - aDot) * nx * 0.8;
        a.vy += (newA - aDot) * ny * 0.8;
        b.vx += (newB - bDot) * nx * 0.8;
        b.vy += (newB - bDot) * ny * 0.8;
        a.vRot += (Math.random() - 0.5) * 4;
        b.vRot += (Math.random() - 0.5) * 4;
        const impact = Math.abs(aDot - bDot);
        if (impact > 30){
          // Spawn a tiny spark cluster at the contact point
          const cx = (a.x + b.x) / 2, cy = (a.y + b.y) / 2;
          for (let k = 0; k < 3; k++){
            sparks.push({
              x: cx, y: cy,
              vx: (Math.random() - 0.5) * impact * 0.5,
              vy: (Math.random() - 0.5) * impact * 0.5,
              life: 0.30, max: 0.30,
              color: Math.random() < 0.5 ? a.color : b.color,
            });
          }
          sndClink(Math.min(1, impact / 200));
        }
      }
    }
  }
  // Sparks
  for (let i = sparks.length - 1; i >= 0; i--){
    const s = sparks[i];
    s.life -= dt;
    if (s.life <= 0){ sparks.splice(i, 1); continue; }
    s.x += s.vx * dt;
    s.y += s.vy * dt;
    s.vx *= Math.pow(0.92, dt * 60);
    s.vy *= Math.pow(0.92, dt * 60);
  }
  // Background star twinkle phase
  for (const st of stars){ st.tw += st.twS * dt; }
}

// === Render ===
function drawBackground(){
  // Deep cosmic gradient
  const g = ctx.createRadialGradient(W/2, H/2, 30, W/2, H/2, Math.max(W, H) * 0.85);
  g.addColorStop(0,    '#180a3a');
  g.addColorStop(0.55, '#0a0420');
  g.addColorStop(1,    '#020210');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
  // Twinkling stars
  for (const st of stars){
    const a = st.a * (0.55 + 0.45 * Math.sin(st.tw));
    ctx.fillStyle = st.hue === 285
      ? `hsla(285, 80%, 75%, ${a})`
      : `hsla(200, 60%, 85%, ${a})`;
    ctx.beginPath(); ctx.arc(st.x, st.y, st.r, 0, Math.PI*2); ctx.fill();
  }
}

function drawBowl(){
  // Outer rim glow
  const halo = ctx.createRadialGradient(bowl.cx, bowl.cy, bowl.r * 0.85, bowl.cx, bowl.cy, bowl.r * 1.25);
  halo.addColorStop(0, 'rgba(122,220,255,0)');
  halo.addColorStop(0.5, 'rgba(122,220,255,0.18)');
  halo.addColorStop(1, 'rgba(122,220,255,0)');
  ctx.fillStyle = halo;
  ctx.beginPath(); ctx.arc(bowl.cx, bowl.cy, bowl.r * 1.25, 0, Math.PI*2); ctx.fill();
  // Bowl interior fill (deep purple-cyan)
  const inner = ctx.createRadialGradient(bowl.cx, bowl.cy - bowl.r * 0.3, 10, bowl.cx, bowl.cy, bowl.r);
  inner.addColorStop(0, '#23115a');
  inner.addColorStop(0.7, '#0f0530');
  inner.addColorStop(1, '#06021a');
  ctx.fillStyle = inner;
  ctx.beginPath(); ctx.arc(bowl.cx, bowl.cy, bowl.r, 0, Math.PI*2); ctx.fill();
  // Inner liquid wobble — sin-based moving rings give a "broth swirl"
  const t = performance.now() * 0.0005;
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (let i = 0; i < 3; i++){
    const r = bowl.r * (0.50 + i * 0.16) + Math.sin(t * 2 + i) * 6;
    ctx.strokeStyle = `rgba(122,220,255,${0.05 + i * 0.02})`;
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(bowl.cx, bowl.cy, r, 0, Math.PI*2); ctx.stroke();
  }
  ctx.restore();
  // Rim ring (containment field)
  const rimPulse = 1 + Math.sin(performance.now() / 280) * 0.02;
  ctx.strokeStyle = '#7adcff';
  ctx.lineWidth = 3;
  ctx.shadowColor = 'rgba(122,220,255,0.7)';
  ctx.shadowBlur = 16;
  ctx.beginPath(); ctx.arc(bowl.cx, bowl.cy, bowl.r * rimPulse, 0, Math.PI*2); ctx.stroke();
  ctx.shadowBlur = 0;
  // Rim inner shine
  ctx.strokeStyle = 'rgba(255,255,255,0.45)';
  ctx.lineWidth = 1.2;
  ctx.beginPath(); ctx.arc(bowl.cx, bowl.cy, bowl.r * 0.97, 0, Math.PI*2); ctx.stroke();
}

function drawIngredients(){
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (const ing of ingredients){
    drawIngredient(ctx, ing.kind, ing.x, ing.y, ing.r, ing.rot);
  }
  ctx.restore();
  // Ink outline pass without 'lighter' so shapes remain crisp
  for (const ing of ingredients){
    ctx.save();
    ctx.translate(ing.x, ing.y);
    ctx.rotate(ing.rot);
    ctx.strokeStyle = 'rgba(0,0,0,0.45)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.arc(0, 0, ing.r * 0.92, 0, Math.PI*2); ctx.stroke();
    ctx.restore();
  }
}

function drawSparks(){
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (const s of sparks){
    const a = s.life / s.max;
    ctx.fillStyle = s.color + (a < 1 ? '' : '');
    ctx.globalAlpha = a;
    ctx.beginPath(); ctx.arc(s.x, s.y, 2.4, 0, Math.PI*2); ctx.fill();
  }
  ctx.globalAlpha = 1;
  ctx.restore();
}

function drawCursor(){
  if (!mouseInside) return;
  // Preview ring at the cursor showing where the next ingredient lands
  const def = PALETTE[selectedKind === 'random' ? INGREDIENT_KEYS[0] : selectedKind];
  const r = (def ? def.r : 14) * 1.05;
  const t = performance.now() * 0.005;
  ctx.save();
  ctx.strokeStyle = `rgba(255,255,255,${0.20 + 0.20 * Math.sin(t)})`;
  ctx.lineWidth = 1.2;
  ctx.setLineDash([3, 5]);
  ctx.beginPath();
  ctx.arc(mouseX, mouseY, r * 1.35, 0, Math.PI*2);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

// === HUD ===
const hCount = document.getElementById('hCount');
function refreshHud(){
  hCount.textContent = ingredients.length;
}

// === Loop (fixed-step) ===
const FIXED_DT = 1/120;
const MAX_DT = 0.25;
const MAX_STEPS = 8;
let prev = performance.now();
let physAcc = 0;
function loop(now){
  let dt = (now - prev) / 1000;
  prev = now;
  if (dt > MAX_DT) dt = MAX_DT;
  physAcc += dt;
  let steps = 0;
  while (physAcc >= FIXED_DT && steps < MAX_STEPS){
    tick(FIXED_DT);
    physAcc -= FIXED_DT;
    steps++;
  }
  if (steps >= MAX_STEPS) physAcc = 0;
  drawBackground();
  drawBowl();
  drawIngredients();
  drawSparks();
  drawCursor();
  refreshHud();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// === Build the dock ===
const dock = document.getElementById('dock');
function makePreviewBtn(kind){
  const btn = document.createElement('button');
  btn.type = 'button'; btn.className = 'ing';
  btn.dataset.kind = kind;
  btn.setAttribute('aria-pressed', 'false');
  btn.setAttribute('aria-label', kind);
  btn.title = kind;
  const cv = document.createElement('canvas');
  cv.width = 48; cv.height = 48;
  const cc = cv.getContext('2d');
  // Render a static preview of the ingredient
  drawIngredient(cc, kind, 24, 24, PALETTE[kind].r * 0.8, 0);
  btn.appendChild(cv);
  btn.addEventListener('click', () => {
    ensureAudio();
    selectKind(kind);
  });
  return btn;
}
function makeRandomBtn(){
  const btn = document.createElement('button');
  btn.type = 'button'; btn.className = 'ing';
  btn.dataset.kind = 'random';
  btn.setAttribute('aria-pressed', 'true');
  btn.setAttribute('aria-label', 'Random ingredient');
  btn.title = 'random';
  const cv = document.createElement('canvas');
  cv.width = 48; cv.height = 48;
  const cc = cv.getContext('2d');
  cc.font = 'bold 24px "Audiowide", cursive';
  cc.fillStyle = '#7adcff';
  cc.textAlign = 'center';
  cc.textBaseline = 'middle';
  cc.fillText('?', 24, 26);
  btn.appendChild(cv);
  btn.addEventListener('click', () => {
    ensureAudio();
    selectKind('random');
  });
  return btn;
}
const stirBtn  = document.getElementById('stirBtn');
const clearBtn = document.getElementById('clearBtn');
const sepEl = dock.querySelector('.sep');
// Insert: random + each ingredient before the separator
dock.insertBefore(makeRandomBtn(), sepEl);
for (const k of INGREDIENT_KEYS){
  dock.insertBefore(makePreviewBtn(k), sepEl);
}
function selectKind(kind){
  selectedKind = kind;
  for (const b of dock.querySelectorAll('button.ing')){
    b.setAttribute('aria-pressed', b.dataset.kind === kind ? 'true' : 'false');
  }
}
stirBtn.addEventListener('click', () => { ensureAudio(); stir(); });
clearBtn.addEventListener('click', () => { ensureAudio(); clearBowl(); });

// === Keyboard shortcuts ===
window.addEventListener('keydown', e => {
  if (e.code === 'KeyS'){ ensureAudio(); stir(); }
  if (e.code === 'KeyC'){ clearBowl(); }
  if (e.code === 'KeyM'){ ensureAudio(); setAudio(muted); }
  if (e.code === 'KeyR'){ selectKind('random'); }
  // 1-9 selects the ingredient at that dock slot (after random)
  const num = parseInt(e.key, 10);
  if (!isNaN(num) && num >= 1 && num <= INGREDIENT_KEYS.length){
    selectKind(INGREDIENT_KEYS[num - 1]);
  }
});

// === Hint fade ===
let hintFaded = false;
function fadeHint(){
  if (hintFaded) return;
  hintFaded = true;
  const el = document.getElementById('hint');
  el.classList.add('fade');
  setTimeout(() => el.remove(), 800);
}

// === Boot — drop a few ingredients so the bowl isn't empty on load ===
for (let i = 0; i < 6; i++){
  const a = (i / 6) * Math.PI * 2;
  spawnIngredient(
    bowl.cx + Math.cos(a) * bowl.r * 0.3,
    bowl.cy + Math.sin(a) * bowl.r * 0.3
  );
}
</script>
