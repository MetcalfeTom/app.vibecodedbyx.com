<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pants</title>
<link rel="icon" href="https://emojicdn.elk.sh/👖">
<meta property="og:title" content="Pants">
<meta property="og:description" content="A majestic pair of high-waisted denim jeans dancing across your screen.">
<meta property="og:url" content="https://sloppy.live/pants/">
<meta property="og:image" content="https://sloppy.live/pants/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Zilla+Slab:wght@300;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1520;overflow:hidden;height:100dvh;cursor:crosshair}
canvas{position:fixed;inset:0}
#title{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:5;font-family:'Playfair Display',serif;font-size:clamp(18px,4vw,36px);font-weight:900;color:rgba(180,160,220,.15);letter-spacing:12px;text-align:center;pointer-events:none}
#hint{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:5;font-family:'Zilla Slab',serif;font-size:10px;font-weight:300;color:rgba(180,160,220,.12);letter-spacing:3px;pointer-events:none;transition:opacity 1s}
aa</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="title">P A N T S</div>
<div id="hint">CLICK TO SUMMON MORE PANTS</div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H;
function resize(){W=C.width=innerWidth;H=C.height=innerHeight}
resize();addEventListener('resize',resize);

// Denim color palette
const DENIMS=[
 {base:'#2b4570',light:'#3a5a8a',dark:'#1a2e4a',stitch:'#c8a24e',shirt:'#c84040',shirtLight:'#e05555'},// classic indigo + red tee
 {base:'#1a2a3a',light:'#2a3e55',dark:'#0e1a28',stitch:'#e8c86e',shirt:'#e0e0e0',shirtLight:'#ffffff'},// dark wash + white tee
 {base:'#4a6080',light:'#5a7898',dark:'#3a4e68',stitch:'#ddb84e',shirt:'#d4a030',shirtLight:'#e8b840'},// stonewash + mustard
 {base:'#3a3a50',light:'#4e4e68',dark:'#28283a',stitch:'#f0d070',shirt:'#40a060',shirtLight:'#50c070'},// charcoal + green
 {base:'#384878',light:'#4860a0',dark:'#283060',stitch:'#d4a83a',shirt:'#d06020',shirtLight:'#e87030'},// bright indigo + orange
 {base:'#2a2a2a',light:'#3a3a3a',dark:'#1a1a1a',stitch:'#fff',shirt:'#1a1a1a',shirtLight:'#2a2a2a'},// black jeans + black tee
];

// Dance move types
const MOVES=['walk','strut','moonwalk','twist','jump','kick','splits','disco'];

class Pants{
 constructor(x,y){
  this.x=x||Math.random()*W;
  this.y=y||Math.random()*H;
  this.vx=(Math.random()-.5)*3;
  this.vy=(Math.random()-.5)*2;
  this.denim=DENIMS[Math.floor(Math.random()*DENIMS.length)];
  this.scale=.5+Math.random()*.6;
  this.move=MOVES[Math.floor(Math.random()*MOVES.length)];
  this.moveTimer=0;
  this.moveDuration=2+Math.random()*3;
  this.phase=Math.random()*Math.PI*2;
  this.legAngleL=0;this.legAngleR=0;
  this.armAngleL=0;this.armAngleR=0;
  this.shirtStretch=0;// horizontal stretch factor
  this.waistY=0;
  this.rot=0;
  this.sparkle=0;
  this.trail=[];
 }
 update(dt){
  this.moveTimer+=dt;
  if(this.moveTimer>this.moveDuration){
   this.moveTimer=0;
   this.moveDuration=2+Math.random()*3;
   this.move=MOVES[Math.floor(Math.random()*MOVES.length)];
   this.vx=(Math.random()-.5)*3;
   this.vy=(Math.random()-.5)*2;
   this.sparkle=1;
  }
  this.phase+=dt*4;
  const p=this.phase;
  // Dance physics per move
  switch(this.move){
   case'walk':
    this.legAngleL=Math.sin(p)*.4;this.legAngleR=Math.sin(p+Math.PI)*.4;
    this.armAngleL=Math.sin(p+Math.PI)*.35;this.armAngleR=Math.sin(p)*.35;
    this.waistY=Math.abs(Math.sin(p*2))*3;this.rot=Math.sin(p)*.03;this.shirtStretch=0;
    break;
   case'strut':
    this.legAngleL=Math.sin(p*.8)*.5;this.legAngleR=Math.sin(p*.8+Math.PI)*.5;
    this.armAngleL=Math.sin(p*.8+Math.PI)*.5;this.armAngleR=Math.sin(p*.8)*.5;
    this.waistY=Math.abs(Math.sin(p))*6;this.rot=Math.sin(p*.8)*.06;this.shirtStretch=Math.sin(p)*.1;
    this.vx+=(Math.random()-.5)*.1;
    break;
   case'moonwalk':
    this.legAngleL=Math.sin(p*1.2)*.3;this.legAngleR=Math.sin(p*1.2+Math.PI)*.3;
    this.armAngleL=-.2;this.armAngleR=-.2;
    this.waistY=2;this.vx+=-Math.sign(this.vx)*.02;this.rot=0;this.shirtStretch=0;
    break;
   case'twist':
    this.legAngleL=Math.sin(p*2)*.6;this.legAngleR=Math.sin(p*2)*.6;
    this.armAngleL=Math.sin(p*2+.5)*.7;this.armAngleR=Math.sin(p*2-.5)*.7;
    this.waistY=Math.sin(p*4)*4;this.rot=Math.sin(p*2)*.15;this.shirtStretch=Math.sin(p*2)*.15;
    break;
   case'jump':
    this.waistY=Math.abs(Math.sin(p*1.5))*25;
    this.legAngleL=this.waistY>10?-.3:.2;this.legAngleR=this.waistY>10?-.3:.2;
    this.armAngleL=this.waistY>10?-.8:-.1;this.armAngleR=this.waistY>10?-.8:-.1;
    this.rot=Math.sin(p)*.05;this.shirtStretch=this.waistY>10?.12:0;
    break;
   case'kick':
    this.legAngleL=Math.sin(p)*.3;this.legAngleR=Math.max(0,Math.sin(p*1.5))*.9;
    this.armAngleL=-.4;this.armAngleR=Math.sin(p*1.5)*.6;
    this.waistY=4;this.rot=Math.sin(p*1.5)*.04;this.shirtStretch=0;
    break;
   case'splits':{
    const sp=Math.min(1,(this.moveTimer/this.moveDuration)*2);
    this.legAngleL=-sp*.7;this.legAngleR=sp*.7;
    this.armAngleL=-sp*.5;this.armAngleR=-sp*.5;
    this.waistY=-sp*15;this.rot=0;this.shirtStretch=sp*.2;
    break;}
   case'disco':
    this.legAngleL=Math.sin(p*3)*.5;this.legAngleR=Math.cos(p*3)*.5;
    this.armAngleL=Math.sin(p*3+1)*.9;this.armAngleR=Math.cos(p*3+1)*.9;
    this.waistY=Math.abs(Math.sin(p*6))*8;this.rot=Math.sin(p*3)*.1;this.shirtStretch=Math.sin(p*6)*.1;
    break;
  }
  // Movement
  this.x+=this.vx*60*dt;
  this.y+=this.vy*60*dt;
  // Wrap around
  if(this.x<-60)this.x=W+60;
  if(this.x>W+60)this.x=-60;
  if(this.y<-80)this.y=H+80;
  if(this.y>H+80)this.y=-80;
  // Sparkle decay
  this.sparkle=Math.max(0,this.sparkle-dt*2);
  // Trail
  this.trail.push({x:this.x,y:this.y-this.waistY,life:1});
  if(this.trail.length>20)this.trail.shift();
  this.trail.forEach(t=>t.life-=dt*.8);
  this.trail=this.trail.filter(t=>t.life>0);
 }
 draw(){
  const s=this.scale*50;// base unit
  const d=this.denim;
  const px=this.x,py=this.y-this.waistY;
  // Trail shimmer
  this.trail.forEach(t=>{
   X.globalAlpha=t.life*.06;
   X.fillStyle=d.light;
   X.beginPath();X.arc(t.x,t.y,s*.3,0,Math.PI*2);X.fill();
  });
  X.globalAlpha=1;
  X.save();
  X.translate(px,py);
  X.rotate(this.rot);
  const waistW=s*.8,waistH=s*.6;
  // === STRETCHY SHIRT (above pants) ===
  this.drawShirt(s,d,waistW,waistH);
  // === LEATHER BELT WITH BUCKLE ===
  this.drawBelt(waistW);
  // === HIGH WAIST SECTION ===
  // Waistband
  X.fillStyle=d.dark;
  X.beginPath();
  X.moveTo(-waistW/2,0);
  X.lineTo(waistW/2,0);
  X.lineTo(waistW/2,waistH*.15);
  X.lineTo(-waistW/2,waistH*.15);
  X.closePath();X.fill();
  // Belt loops
  X.fillStyle=d.base;
  for(let i=0;i<5;i++){
   const lx=-waistW/2+waistW*(i/4);
   X.fillRect(lx-1.5,-2,3,waistH*.15+4);
  }
  // Button
  X.fillStyle=d.stitch;
  X.beginPath();X.arc(0,waistH*.08,2.5,0,Math.PI*2);X.fill();
  // High waist body
  X.fillStyle=d.base;
  X.beginPath();
  X.moveTo(-waistW/2,waistH*.15);
  X.lineTo(waistW/2,waistH*.15);
  X.lineTo(waistW/2+2,waistH);
  X.lineTo(-waistW/2-2,waistH);
  X.closePath();X.fill();
  // Fly
  X.strokeStyle=d.stitch;X.lineWidth=1;
  X.beginPath();X.moveTo(0,waistH*.15);X.lineTo(0,waistH*.7);X.stroke();
  // Pockets — curved lines
  X.strokeStyle=d.stitch;X.lineWidth=.8;
  X.beginPath();X.moveTo(-waistW/2+3,waistH*.2);
  X.quadraticCurveTo(-waistW/4,waistH*.5,-waistW/4+2,waistH*.15);X.stroke();
  X.beginPath();X.moveTo(waistW/2-3,waistH*.2);
  X.quadraticCurveTo(waistW/4,waistH*.5,waistW/4-2,waistH*.15);X.stroke();
  // Denim texture — horizontal weave lines
  X.strokeStyle='rgba(255,255,255,.03)';X.lineWidth=.5;
  for(let i=0;i<6;i++){
   const ly=waistH*.2+i*waistH*.12;
   X.beginPath();X.moveTo(-waistW/2,ly);X.lineTo(waistW/2,ly);X.stroke();
  }
  // === LEFT LEG ===
  X.save();
  X.translate(-waistW/4,waistH);
  X.rotate(this.legAngleL);
  this.drawLeg(s,d,-1);
  X.restore();
  // === RIGHT LEG ===
  X.save();
  X.translate(waistW/4,waistH);
  X.rotate(this.legAngleR);
  this.drawLeg(s,d,1);
  X.restore();
  // Sparkle on move change
  if(this.sparkle>0){
   X.globalAlpha=this.sparkle;
   for(let i=0;i<6;i++){
    const sa=i/6*Math.PI*2+Date.now()*.005;
    const sr=s*.8+this.sparkle*s*.5;
    X.fillStyle=d.stitch;
    const sx=Math.cos(sa)*sr,sy=Math.sin(sa)*sr+waistH*.5;
    // 4-point star
    X.beginPath();
    X.moveTo(sx,sy-3);X.lineTo(sx+1,sy);X.lineTo(sx,sy+3);X.lineTo(sx-1,sy);X.closePath();
    X.fill();
   }
   X.globalAlpha=1;
  }
  X.restore();
 }
 drawShirt(s,d,waistW,waistH){
  const shW=waistW*(1.05+this.shirtStretch);
  const shH=s*.7;
  const neckW=s*.2;
  // Torso
  X.fillStyle=d.shirt;
  X.beginPath();
  X.moveTo(-shW/2,-shH);// top-left shoulder
  X.lineTo(-neckW/2,-shH-s*.08);// neck left
  X.quadraticCurveTo(0,-shH-s*.12,neckW/2,-shH-s*.08);// neck curve
  X.lineTo(shW/2,-shH);// top-right shoulder
  X.lineTo(shW/2+2,-s*.05);// right side
  X.lineTo(-shW/2-2,-s*.05);// left side
  X.closePath();X.fill();
  // Shirt bottom hem — tucked in, slight wave for stretch
  X.fillStyle=d.shirtLight;
  X.fillRect(-shW/2-2,-s*.08,shW+4,s*.06);
  // Collar — V-neck
  X.strokeStyle=d.shirtLight;X.lineWidth=1.5;
  X.beginPath();
  X.moveTo(-neckW/2-2,-shH-s*.06);
  X.lineTo(0,-shH+s*.12);
  X.lineTo(neckW/2+2,-shH-s*.06);
  X.stroke();
  // Fabric stretch lines (more visible during stretch)
  const stretchVis=Math.abs(this.shirtStretch)*3+.02;
  X.strokeStyle='rgba(255,255,255,'+stretchVis+')';X.lineWidth=.5;
  for(let i=0;i<4;i++){
   const ly=-shH+s*.15+i*s*.12;
   X.beginPath();X.moveTo(-shW/3,ly);X.lineTo(shW/3,ly);X.stroke();
  }
  // Wrinkle at waist
  X.strokeStyle='rgba(0,0,0,.1)';X.lineWidth=.5;
  for(let i=0;i<3;i++){
   const wx=-shW/4+i*shW/3;
   X.beginPath();X.moveTo(wx,-s*.1);
   X.quadraticCurveTo(wx+4,-s*.15,wx+8,-s*.08);X.stroke();
  }
  // === ARMS ===
  const armW=s*.18,armH=s*.55;
  const shoulderY=-shH+s*.05;
  // Left arm
  X.save();
  X.translate(-shW/2,shoulderY);
  X.rotate(this.armAngleL);
  X.fillStyle=d.shirt;
  // Sleeve
  X.fillRect(-armW*.6,0,armW,armH*.4);
  // Forearm — skin-ish or just darker shirt
  X.fillStyle=d.shirtLight;
  X.fillRect(-armW*.5,armH*.35,armW*.8,armH*.6);
  // Sleeve hem
  X.fillStyle=d.shirt;
  X.fillRect(-armW*.65,armH*.33,armW*1.1,s*.04);
  X.restore();
  // Right arm
  X.save();
  X.translate(shW/2,shoulderY);
  X.rotate(this.armAngleR);
  X.fillStyle=d.shirt;
  X.fillRect(-armW*.4,0,armW,armH*.4);
  X.fillStyle=d.shirtLight;
  X.fillRect(-armW*.3,armH*.35,armW*.8,armH*.6);
  X.fillStyle=d.shirt;
  X.fillRect(-armW*.45,armH*.33,armW*1.1,s*.04);
  X.restore();
 }
 drawBelt(waistW){
  const beltH=5,beltY=-1;
  // Leather strap
  X.fillStyle='#3a2010';
  X.fillRect(-waistW/2-3,beltY,waistW+6,beltH);
  // Leather grain — subtle horizontal lines
  X.strokeStyle='rgba(80,50,20,.3)';X.lineWidth=.3;
  for(let i=0;i<3;i++){
   X.beginPath();X.moveTo(-waistW/2-3,beltY+1+i*1.5);X.lineTo(waistW/2+3,beltY+1+i*1.5);X.stroke();
  }
  // Edge stitching
  X.strokeStyle='rgba(200,160,60,.3)';X.lineWidth=.5;
  X.setLineDash([1,2]);
  X.beginPath();X.moveTo(-waistW/2-2,beltY+.8);X.lineTo(waistW/2+2,beltY+.8);X.stroke();
  X.beginPath();X.moveTo(-waistW/2-2,beltY+beltH-.8);X.lineTo(waistW/2+2,beltY+beltH-.8);X.stroke();
  X.setLineDash([]);
  // Buckle — shiny metal rectangle
  const bkW=8,bkH=beltH+4,bkX=-2;
  // Buckle frame
  X.fillStyle='#b0b0b0';
  X.fillRect(bkX-bkW/2,beltY-2,bkW,bkH);
  // Buckle inner
  X.fillStyle='#888';
  X.fillRect(bkX-bkW/2+1.5,beltY-.5,bkW-3,bkH-3);
  // Buckle shine — diagonal highlight
  X.fillStyle='rgba(255,255,255,.35)';
  X.beginPath();
  X.moveTo(bkX-bkW/2+1,beltY-1);
  X.lineTo(bkX-bkW/2+4,beltY-1);
  X.lineTo(bkX-bkW/2+1,beltY+3);
  X.closePath();X.fill();
  // Prong
  X.strokeStyle='#999';X.lineWidth=1;
  X.beginPath();X.moveTo(bkX,beltY-1);X.lineTo(bkX+1,beltY+bkH-3);X.stroke();
  // Belt hole (the one in use)
  X.fillStyle='#2a1508';
  X.beginPath();X.arc(bkX+bkW*.8,beltY+beltH/2,1.2,0,Math.PI*2);X.fill();
 }
 drawLeg(s,d,side){
  const legW=s*.4,legH=s*1.1;
  // Thigh — slightly wider at top
  X.fillStyle=d.base;
  X.beginPath();
  X.moveTo(-legW/2-1,0);
  X.lineTo(legW/2+1,0);
  X.lineTo(legW/2+3,legH*.4);
  X.lineTo(-legW/2-3,legH*.4);
  X.closePath();X.fill();
  // Knee area
  X.fillStyle=d.light;
  X.beginPath();
  X.moveTo(-legW/2-3,legH*.4);
  X.lineTo(legW/2+3,legH*.4);
  X.lineTo(legW/2+2,legH*.55);
  X.lineTo(-legW/2-2,legH*.55);
  X.closePath();X.fill();
  // Shin — tapers or flares
  X.fillStyle=d.base;
  X.beginPath();
  X.moveTo(-legW/2-2,legH*.55);
  X.lineTo(legW/2+2,legH*.55);
  X.lineTo(legW/2+4,legH);// slight flare
  X.lineTo(-legW/2-4,legH);
  X.closePath();X.fill();
  // Hem — cuff
  X.fillStyle=d.dark;
  X.fillRect(-legW/2-4,legH-3,legW+8,5);
  // Outseam stitch
  X.strokeStyle=d.stitch;X.lineWidth=.6;
  X.setLineDash([2,3]);
  X.beginPath();X.moveTo(side*(legW/2+2),0);X.lineTo(side*(legW/2+3),legH);X.stroke();
  X.setLineDash([]);
  // Inseam
  X.strokeStyle=d.stitch;X.lineWidth=.5;
  X.setLineDash([2,3]);
  X.beginPath();X.moveTo(-side*(legW/2),0);X.lineTo(-side*(legW/2-1),legH);X.stroke();
  X.setLineDash([]);
  // Knee fade/whiskers
  X.strokeStyle='rgba(255,255,255,.06)';X.lineWidth=.5;
  for(let i=0;i<3;i++){
   const ky=legH*.42+i*3;
   X.beginPath();X.moveTo(-legW/3,ky);X.lineTo(legW/3,ky);X.stroke();
  }
 }
}

// Start with a few majestic pairs
let allPants=[];
for(let i=0;i<5;i++)allPants.push(new Pants());

// Click to summon
C.addEventListener('click',e=>{
 allPants.push(new Pants(e.clientX,e.clientY));
 // Hide hint after first click
 document.getElementById('hint').style.opacity='0';
});
C.addEventListener('touchstart',e=>{
 e.preventDefault();
 const t=e.touches[0];
 allPants.push(new Pants(t.clientX,t.clientY));
 document.getElementById('hint').style.opacity='0';
},{passive:false});

// Disco floor background
function drawFloor(t){
 // Subtle grid
 X.strokeStyle='rgba(120,80,180,.04)';X.lineWidth=.5;
 const gs=80;
 for(let gx=0;gx<W;gx+=gs){
  X.beginPath();X.moveTo(gx,0);X.lineTo(gx,H);X.stroke();
 }
 for(let gy=0;gy<H;gy+=gs){
  X.beginPath();X.moveTo(0,gy);X.lineTo(W,gy);X.stroke();
 }
 // Occasional colored tiles
 const tilePhase=t*.3;
 for(let i=0;i<6;i++){
  const tx=((Math.sin(i*1.7+tilePhase)*W*.4+W/2)|0);
  const ty=((Math.cos(i*2.3+tilePhase)*H*.4+H/2)|0);
  const sx=Math.floor(tx/gs)*gs,sy=Math.floor(ty/gs)*gs;
  X.fillStyle='rgba('+[
   Math.floor(80+40*Math.sin(i+t)),
   Math.floor(60+30*Math.cos(i*2+t)),
   Math.floor(120+50*Math.sin(i*3+t))
  ].join(',')+',0.04)';
  X.fillRect(sx,sy,gs,gs);
 }
}

// Spotlight
function drawSpotlight(t){
 const sx=W/2+Math.sin(t*.2)*W*.2;
 const sy=H/2+Math.cos(t*.3)*H*.15;
 const sg=X.createRadialGradient(sx,sy,0,sx,sy,Math.min(W,H)*.35);
 sg.addColorStop(0,'rgba(200,180,255,.04)');
 sg.addColorStop(.5,'rgba(140,100,200,.015)');
 sg.addColorStop(1,'transparent');
 X.fillStyle=sg;X.fillRect(0,0,W,H);
}

let lastTime=0;
function loop(t){
 const dt=Math.min((t-lastTime)/1000,.05);lastTime=t;
 // Background
 X.fillStyle='#1a1520';X.fillRect(0,0,W,H);
 drawFloor(t/1000);
 drawSpotlight(t/1000);
 // Update & draw pants
 allPants.forEach(p=>{p.update(dt);p.draw()});
 // Vignette
 const vg=X.createRadialGradient(W/2,H/2,Math.min(W,H)*.2,W/2,H/2,Math.max(W,H)*.7);
 vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(10,8,16,.5)');
 X.fillStyle=vg;X.fillRect(0,0,W,H);
 requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
