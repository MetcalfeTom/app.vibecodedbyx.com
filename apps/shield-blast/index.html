<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>Shield Blast</title>
<link rel="icon" href="https://emojicdn.elk.sh/🛡️">
<meta property="og:title" content="Shield Blast">
<meta property="og:description" content="Defend your core from emoji bugs with a neon shield and plasma blasts.">
<meta property="og:url" content="https://sloppy.live/shield-blast">
<meta property="og:image" content="https://emojicdn.elk.sh/🛡️?style=apple&size=512">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#06060e;touch-action:none;user-select:none}
canvas{display:block;position:absolute;top:0;left:0}

#hud{
  position:fixed;top:0;left:0;right:0;z-index:10;
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 16px;pointer-events:none;
}
#hud-score{font-family:'Audiowide',sans-serif;font-size:20px;color:#0ff;text-shadow:0 0 12px rgba(0,255,255,0.4)}
#hud-wave{font-family:'Share Tech Mono',monospace;font-size:12px;color:rgba(255,255,255,0.35)}
#hud-hp{font-family:'Share Tech Mono',monospace;font-size:12px;color:#0f0}

#overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:20;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(6,6,14,0.9);backdrop-filter:blur(6px);
  transition:opacity .4s;
}
#overlay.hidden{opacity:0;pointer-events:none}
#overlay h1{
  font-family:'Audiowide',sans-serif;font-size:clamp(28px,7vw,56px);
  color:#0ff;letter-spacing:3px;text-shadow:0 0 30px rgba(0,255,255,0.4);
  margin-bottom:6px;
}
#overlay .sub{
  font-family:'Share Tech Mono',monospace;font-size:13px;
  color:rgba(255,255,255,0.35);margin-bottom:28px;text-align:center;line-height:1.6;
}
#overlay .final{
  font-family:'Audiowide',sans-serif;font-size:40px;color:#fff;
  text-shadow:0 0 20px rgba(255,255,255,0.3);margin-bottom:4px;
}
#overlay .final-label{
  font-family:'Share Tech Mono',monospace;font-size:12px;color:rgba(255,255,255,0.3);margin-bottom:20px;
}
#start-btn{
  font-family:'Audiowide',sans-serif;font-size:16px;letter-spacing:3px;
  background:none;border:2px solid rgba(0,255,255,0.5);
  color:#0ff;padding:12px 44px;border-radius:6px;cursor:pointer;
  transition:all .2s;
}
#start-btn:hover{border-color:#0ff;background:rgba(0,255,255,0.08);transform:scale(1.04)}
#start-btn:active{transform:scale(0.97)}
a</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="hud">
  <span id="hud-score">0</span>
  <span id="hud-wave">WAVE 1</span>
  <span id="hud-hp">♥♥♥♥♥</span>
</div>

<div id="overlay">
  <h1 id="title">SHIELD BLAST</h1>
  <div class="sub" id="sub-text">Aim and click to fire plasma bolts<br>Destroy the emoji bugs before they reach your core</div>
  <div class="final" id="final-score" style="display:none"></div>
  <div class="final-label" id="final-label" style="display:none"></div>
  <button id="start-btn">ENGAGE</button>
</div>
<script>
(function(){
'use strict';

var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
var W,H,dpr,cx,cy;

function resize(){
  dpr=window.devicePixelRatio||1;
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  cx=W/2;cy=H/2;
}
resize();
window.addEventListener('resize',resize);

// Audio
var actx=null;
function initAudio(){if(!actx)try{actx=new(window.AudioContext||window.webkitAudioContext)()}catch(e){}}

function playTone(freq,dur,vol,type){
  if(!actx)return;
  var t=actx.currentTime;
  var o=actx.createOscillator();var g=actx.createGain();
  o.type=type||'sine';o.frequency.setValueAtTime(freq,t);
  g.gain.setValueAtTime(vol||0.05,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g);g.connect(actx.destination);
  o.start(t);o.stop(t+dur);
}

function sfxShoot(){playTone(880,0.06,0.04,'square');playTone(1200,0.04,0.03,'square')}
function sfxHit(){playTone(200,0.1,0.06,'sawtooth');playTone(150,0.15,0.04,'triangle')}
function sfxExplode(){
  playTone(100,0.2,0.07,'sawtooth');
  playTone(60,0.3,0.05,'sawtooth');
  if(!actx)return;
  var t=actx.currentTime;var len=Math.ceil(actx.sampleRate*0.15);
  var buf=actx.createBuffer(1,len,actx.sampleRate);
  var d=buf.getChannelData(0);for(var i=0;i<len;i++)d[i]=(Math.random()*2-1);
  var src=actx.createBufferSource();src.buffer=buf;
  var flt=actx.createBiquadFilter();flt.type='bandpass';flt.frequency.value=400;flt.Q.value=1;
  var g=actx.createGain();g.gain.setValueAtTime(0.06,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
  src.connect(flt);flt.connect(g);g.connect(actx.destination);src.start(t);src.stop(t+0.15);
}
function sfxDamage(){playTone(120,0.3,0.08,'sawtooth');playTone(80,0.4,0.06,'square')}
function sfxWave(){
  playTone(440,0.15,0.05);
  setTimeout(function(){playTone(554,0.15,0.05)},80);
  setTimeout(function(){playTone(659,0.2,0.06)},160);
}

// Bug types
var BUG_EMOJIS=['🐛','🪲','🐜','🦟','🪳','🐝','🦗','🕷️','🦂','🐞'];
var BUG_SIZES= [22,  24,  18,  16,  20,  20,  18,  22,  26,  20];
var BUG_HP=    [1,   2,   1,   1,   2,   1,   1,   2,   3,   1];
var BUG_SPEED= [1.2, 0.8, 1.5, 1.8, 1.0, 1.3, 1.6, 0.9, 0.6, 1.4];

// Game state
var state='menu';
var score=0;
var wave=1;
var hp=5;
var maxHp=5;
var bugs=[];
var bolts=[];
var particles=[];
var shieldAngle=0;
var shieldRadius=60;
var coreRadius=20;
var mouseX=0,mouseY=0;
var aimAngle=0;
var shootCooldown=0;
var waveBugsLeft=0;
var waveSpawnTimer=0;
var waveBugsTotal=0;
var waveActive=false;
var time=0;
var screenShake=0;
var bestScore=parseInt(localStorage.getItem('shieldblast_best'))||0;
var bgStars=[];

for(var i=0;i<60;i++){
  bgStars.push({x:Math.random()*2000-500,y:Math.random()*2000-500,s:Math.random()*1.2+0.4,p:Math.random()*Math.PI*2,sp:Math.random()*0.015+0.005});
}

function startGame(){
  document.getElementById('overlay').classList.add('hidden');
  state='playing';
  score=0;wave=1;hp=maxHp;
  bugs=[];bolts=[];particles=[];
  screenShake=0;
  startWave();
  updateHUD();
}

function startWave(){
  waveBugsTotal=4+wave*3;
  waveBugsLeft=waveBugsTotal;
  waveSpawnTimer=0;
  waveActive=true;
  sfxWave();
  document.getElementById('hud-wave').textContent='WAVE '+wave;
}

function spawnBug(){
  var angle=Math.random()*Math.PI*2;
  var dist=Math.max(W,H)*0.7;
  var idx=Math.floor(Math.random()*BUG_EMOJIS.length);
  // Higher waves unlock harder bugs
  if(wave<3)idx=Math.min(idx,4);
  else if(wave<5)idx=Math.min(idx,7);

  var speedMult=1+wave*0.08;
  bugs.push({
    x:cx+Math.cos(angle)*dist,
    y:cy+Math.sin(angle)*dist,
    emoji:BUG_EMOJIS[idx],
    size:BUG_SIZES[idx],
    hp:BUG_HP[idx]+Math.floor(wave/4),
    maxHp:BUG_HP[idx]+Math.floor(wave/4),
    speed:BUG_SPEED[idx]*speedMult,
    wobble:Math.random()*Math.PI*2,
    wobbleSpeed:Math.random()*0.04+0.02,
    wobbleAmp:Math.random()*15+10,
    flash:0
  });
}

function fireBolt(){
  if(shootCooldown>0)return;
  initAudio();
  sfxShoot();
  shootCooldown=8;

  var speed=12;
  bolts.push({
    x:cx+Math.cos(aimAngle)*shieldRadius,
    y:cy+Math.sin(aimAngle)*shieldRadius,
    vx:Math.cos(aimAngle)*speed,
    vy:Math.sin(aimAngle)*speed,
    life:1,
    color:'#0ff'
  });
}

function hitBug(bug,boltIdx){
  bug.hp--;
  bug.flash=6;
  bolts.splice(boltIdx,1);
  sfxHit();

  // Spark particles
  for(var i=0;i<6;i++){
    var a=Math.random()*Math.PI*2;
    particles.push({
      x:bug.x,y:bug.y,
      vx:Math.cos(a)*(Math.random()*3+1),
      vy:Math.sin(a)*(Math.random()*3+1),
      life:1,color:'#0ff',size:Math.random()*2+1
    });
  }

  if(bug.hp<=0){
    killBug(bug);
    return true;
  }
  return false;
}

function killBug(bug){
  sfxExplode();
  score+=10*wave;

  // Explosion particles
  for(var i=0;i<15;i++){
    var a=Math.random()*Math.PI*2;
    var sp=Math.random()*4+1;
    particles.push({
      x:bug.x,y:bug.y,
      vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      life:1,
      color:['#ff0','#f80','#f0f','#0ff','#0f0'][Math.floor(Math.random()*5)],
      size:Math.random()*3+2
    });
  }

  // Text particle
  particles.push({
    x:bug.x,y:bug.y-15,vx:0,vy:-1,
    life:1,text:'+'+10*wave,color:'#ff0',size:14
  });

  var idx=bugs.indexOf(bug);
  if(idx>=0)bugs.splice(idx,1);

  screenShake=3;
  updateHUD();
}

function damageCore(){
  hp--;
  sfxDamage();
  screenShake=6;

  // Red flash particles around core
  for(var i=0;i<10;i++){
    var a=Math.random()*Math.PI*2;
    particles.push({
      x:cx+Math.cos(a)*30,y:cy+Math.sin(a)*30,
      vx:Math.cos(a)*2,vy:Math.sin(a)*2,
      life:1,color:'#f44',size:3
    });
  }

  updateHUD();

  if(hp<=0){
    gameOver();
  }
}

function gameOver(){
  state='gameover';
  if(score>bestScore){
    bestScore=score;
    localStorage.setItem('shieldblast_best',bestScore);
  }
  setTimeout(function(){
    var overlay=document.getElementById('overlay');
    document.getElementById('title').textContent='CORE DESTROYED';
    document.getElementById('title').style.color='#f44';
    document.getElementById('title').style.textShadow='0 0 30px rgba(255,68,68,0.4)';
    document.getElementById('sub-text').textContent='Wave '+wave+' reached';
    document.getElementById('final-score').textContent=score;
    document.getElementById('final-score').style.display='block';
    document.getElementById('final-label').textContent=score>=bestScore?'NEW BEST!':'BEST: '+bestScore;
    document.getElementById('final-label').style.display='block';
    document.getElementById('start-btn').textContent='RETRY';
    overlay.classList.remove('hidden');
  },1000);
}

function updateHUD(){
  document.getElementById('hud-score').textContent=score;
  var hearts='';
  for(var i=0;i<maxHp;i++)hearts+=i<hp?'♥':'♡';
  document.getElementById('hud-hp').textContent=hearts;
  document.getElementById('hud-hp').style.color=hp<=2?'#f44':hp<=3?'#fa0':'#0f0';
}

// Main loop
function update(){
  time+=0.016;
  if(shootCooldown>0)shootCooldown--;

  if(state!=='playing')return;

  // Wave spawning
  if(waveActive&&waveBugsLeft>0){
    waveSpawnTimer--;
    if(waveSpawnTimer<=0){
      spawnBug();
      waveBugsLeft--;
      waveSpawnTimer=Math.max(15,50-wave*3);
    }
  }

  // Check wave complete
  if(waveActive&&waveBugsLeft<=0&&bugs.length===0){
    waveActive=false;
    wave++;
    // Heal 1 hp between waves
    if(hp<maxHp)hp++;
    updateHUD();
    setTimeout(function(){if(state==='playing')startWave()},1500);
  }

  // Update aim
  aimAngle=Math.atan2(mouseY-cy,mouseX-cx);

  // Update bolts
  for(var i=bolts.length-1;i>=0;i--){
    var b=bolts[i];
    b.x+=b.vx;b.y+=b.vy;
    b.life-=0.008;

    // Trail
    if(Math.random()<0.5){
      particles.push({
        x:b.x,y:b.y,vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.5,
        life:0.5,color:'#0ff',size:1.5
      });
    }

    // Off screen or expired
    if(b.life<=0||b.x<-50||b.x>W+50||b.y<-50||b.y>H+50){
      bolts.splice(i,1);continue;
    }

    // Hit test vs bugs
    for(var j=bugs.length-1;j>=0;j--){
      var bug=bugs[j];
      var dx=b.x-bug.x,dy=b.y-bug.y;
      var dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<bug.size+4){
        if(hitBug(bug,i))break;
        else break;
      }
    }
  }

  // Update bugs
  for(var i=bugs.length-1;i>=0;i--){
    var bug=bugs[i];
    var dx=cx-bug.x,dy=cy-bug.y;
    var dist=Math.sqrt(dx*dx+dy*dy);
    var nx=dx/dist,ny=dy/dist;

    // Wobble perpendicular to direction
    bug.wobble+=bug.wobbleSpeed;
    var wx=-ny*Math.sin(bug.wobble)*bug.wobbleAmp*0.02;
    var wy=nx*Math.sin(bug.wobble)*bug.wobbleAmp*0.02;

    bug.x+=(nx+wx)*bug.speed;
    bug.y+=(ny+wy)*bug.speed;

    if(bug.flash>0)bug.flash--;

    // Reached core
    if(dist<coreRadius+bug.size*0.5){
      bugs.splice(i,1);
      damageCore();
    }
  }

  // Update particles
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];
    p.x+=p.vx||0;p.y+=p.vy||0;
    if(p.vy!==undefined&&!p.text)p.vy+=0.03;
    p.life-=p.text?0.025:0.03;
    if(p.life<=0)particles.splice(i,1);
  }

  // Shake decay
  if(screenShake>0){screenShake*=0.9;if(screenShake<0.2)screenShake=0}
}

function draw(){
  update();
  ctx.clearRect(0,0,W,H);

  var shake=0;
  if(screenShake>0)shake=(Math.random()-0.5)*screenShake;

  // Background
  var grad=ctx.createRadialGradient(cx,cy,0,cx,cy,Math.max(W,H)*0.6);
  grad.addColorStop(0,'#0a0a18');grad.addColorStop(1,'#06060e');
  ctx.fillStyle=grad;ctx.fillRect(0,0,W,H);

  // Stars
  for(var i=0;i<bgStars.length;i++){
    var st=bgStars[i];st.p+=st.sp;
    var sx=((st.x%W)+W)%W,sy=((st.y%H)+H)%H;
    ctx.save();ctx.globalAlpha=0.2+Math.sin(st.p)*0.15;
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(sx,sy,st.s,0,Math.PI*2);ctx.fill();ctx.restore();
  }

  ctx.save();
  ctx.translate(shake,shake);

  // Shield radius ring
  ctx.save();
  ctx.strokeStyle='rgba(0,255,255,0.06)';
  ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(cx,cy,shieldRadius,0,Math.PI*2);ctx.stroke();
  ctx.restore();

  // Core
  ctx.save();
  var coreGlow=0.5+Math.sin(time*2)*0.2;
  var coreDamaged=hp<=2;
  var coreColor=coreDamaged?'#f44':'#0ff';
  ctx.shadowColor=coreColor;
  ctx.shadowBlur=20+Math.sin(time*3)*8;
  ctx.fillStyle=coreColor;
  ctx.globalAlpha=coreGlow;
  ctx.beginPath();ctx.arc(cx,cy,coreRadius,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=0.9;
  ctx.fillStyle=coreDamaged?'#f88':'#8ff';
  ctx.beginPath();ctx.arc(cx,cy,coreRadius*0.5,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  ctx.globalAlpha=0.15;
  ctx.strokeStyle=coreColor;
  ctx.lineWidth=1;
  for(var r=coreRadius+10;r<shieldRadius;r+=20){
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.stroke();
  }
  ctx.restore();

  // Shield arc (aim indicator)
  if(state==='playing'){
    ctx.save();
    ctx.strokeStyle='#0ff';
    ctx.lineWidth=3;
    ctx.shadowColor='#0ff';
    ctx.shadowBlur=12;
    ctx.globalAlpha=0.6+Math.sin(time*5)*0.15;
    ctx.beginPath();
    ctx.arc(cx,cy,shieldRadius,aimAngle-0.4,aimAngle+0.4);
    ctx.stroke();
    // Aim dot
    var adx=cx+Math.cos(aimAngle)*shieldRadius;
    var ady=cy+Math.sin(aimAngle)*shieldRadius;
    ctx.beginPath();ctx.arc(adx,ady,4,0,Math.PI*2);
    ctx.fillStyle='#fff';ctx.fill();
    ctx.restore();
  }

  // Bolts
  for(var i=0;i<bolts.length;i++){
    var b=bolts[i];
    ctx.save();
    ctx.globalAlpha=b.life;
    ctx.fillStyle=b.color;
    ctx.shadowColor=b.color;
    ctx.shadowBlur=10;
    ctx.beginPath();ctx.arc(b.x,b.y,3,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // Bugs
  for(var i=0;i<bugs.length;i++){
    var bug=bugs[i];
    ctx.save();
    ctx.font=bug.size+'px serif';
    ctx.textAlign='center';ctx.textBaseline='middle';

    if(bug.flash>0){
      ctx.shadowColor='#fff';
      ctx.shadowBlur=20;
    }

    ctx.fillText(bug.emoji,bug.x,bug.y);

    // HP bar for multi-hp bugs
    if(bug.maxHp>1){
      var bw=bug.size*1.2;
      var bh=3;
      var bx=bug.x-bw/2;
      var by=bug.y-bug.size*0.7;
      ctx.globalAlpha=0.5;
      ctx.fillStyle='#333';
      ctx.fillRect(bx,by,bw,bh);
      ctx.fillStyle=bug.hp>bug.maxHp*0.5?'#0f0':'#f44';
      ctx.fillRect(bx,by,bw*(bug.hp/bug.maxHp),bh);
    }
    ctx.restore();
  }

  // Particles
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    ctx.save();
    ctx.globalAlpha=Math.max(0,p.life);
    if(p.text){
      ctx.font='bold '+p.size+'px Audiowide,sans-serif';
      ctx.textAlign='center';
      ctx.fillStyle=p.color;
      ctx.shadowColor=p.color;
      ctx.shadowBlur=8;
      ctx.fillText(p.text,p.x,p.y);
    }else{
      ctx.fillStyle=p.color;
      ctx.shadowColor=p.color;
      ctx.shadowBlur=4;
      ctx.beginPath();ctx.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  }

  ctx.restore();

  requestAnimationFrame(draw);
}

// Events
canvas.addEventListener('mousemove',function(e){mouseX=e.clientX;mouseY=e.clientY});
canvas.addEventListener('touchmove',function(e){
  e.preventDefault();
  var t=e.touches[0];mouseX=t.clientX;mouseY=t.clientY;
},{passive:false});

canvas.addEventListener('mousedown',function(){if(state==='playing')fireBolt()});
canvas.addEventListener('touchstart',function(e){
  e.preventDefault();
  var t=e.touches[0];mouseX=t.clientX;mouseY=t.clientY;
  if(state==='playing')fireBolt();
},{passive:false});

document.addEventListener('keydown',function(e){
  if(e.key===' '){e.preventDefault();if(state==='playing')fireBolt()}
});

document.getElementById('start-btn').addEventListener('click',function(e){
  e.stopPropagation();
  // Reset title styling for fresh start
  var t=document.getElementById('title');
  t.textContent='SHIELD BLAST';t.style.color='#0ff';t.style.textShadow='0 0 30px rgba(0,255,255,0.4)';
  document.getElementById('final-score').style.display='none';
  document.getElementById('final-label').style.display='none';
  document.getElementById('start-btn').textContent='ENGAGE';
  startGame();
});

draw();

})();
</script>
<script src="/sloppy-header/sloppy-bar.js"></script>
</body>
</html>
