<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Mystic Omen</title>
<link rel="icon" href="https://emojicdn.elk.sh/🔮" />
<meta name="description" content="High-fantasy auto-battler with D&D classes. Choose your fate." />
<meta property="og:title" content="Mystic Omen" />
<meta property="og:description" content="High-fantasy auto-battler with D&D classes. Choose your fate." />
<meta property="og:url" content="https://sloppy.live/mystic-omen" />
<meta property="og:image" content="https://sloppy.live/screenshots/mystic-omen.jpg" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Uncial+Antiqua&family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet" />
<style>
:root {
  --bg:#08070e;--surface:#0f0e18;--border:#1e1a30;--dim:#5a4e78;
  --text:#c8bede;--arcane:#8040e0;--fire:#e05020;--frost:#30a0e0;
  --holy:#e0c040;--nature:#30c060;--shadow:#a030c0;--blood:#c02040;
}
*{margin:0;padding:0;box-sizing:border-box;scrollbar-width:none}
*::-webkit-scrollbar{display:none}
html,body{height:100vh;background:var(--bg);color:var(--text);font-family:'Cormorant Garamond',serif;user-select:none;overflow:hidden;position:fixed;width:100%;touch-action:none}
body{display:flex;flex-direction:column;align-items:center;height:100vh;background:
  radial-gradient(ellipse at 30% 20%,rgba(128,64,224,0.04),transparent 50%),
  radial-gradient(ellipse at 70% 80%,rgba(224,80,32,0.03),transparent 50%),
  var(--bg)}
body>*{width:100%;max-width:600px}

header{padding:10px 16px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
header h1{font-family:'Uncial Antiqua',cursive;font-size:20px;color:var(--arcane);letter-spacing:0.06em;text-shadow:0 0 20px rgba(128,64,224,0.3)}
header a{color:var(--dim);font-size:10px;text-decoration:none}

.bar{display:flex;gap:14px;padding:7px 16px;font-size:11px;color:var(--dim);border-bottom:1px solid var(--border);letter-spacing:0.04em}
.bar .v{font-weight:700}.bar .v.xp{color:var(--arcane)}.bar .v.gp{color:var(--holy)}.bar .v.wv{color:var(--frost)}

.arena{flex:1;display:flex;flex-direction:column;align-items:center;padding:10px 16px;min-height:0;overflow-y:auto;overflow-x:hidden}
.arena-title{font-family:'Uncial Antiqua',cursive;font-size:12px;color:var(--dim);letter-spacing:0.12em;text-transform:uppercase;margin-bottom:6px;opacity:0;animation:fadeSlide .5s forwards}

.battle-row{display:flex;justify-content:center;align-items:center;gap:10px;width:100%;margin-bottom:6px}
.side{display:flex;flex-direction:column;gap:5px;flex:1;min-width:0}
.side.foe{align-items:flex-end}
.vs{font-family:'Uncial Antiqua',cursive;font-size:20px;color:var(--fire);text-shadow:0 0 12px rgba(224,80,32,0.4);flex-shrink:0;opacity:0;animation:fadeScale .4s .2s forwards}

.card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:7px 10px;display:flex;align-items:center;gap:8px;height:48px;width:100%;max-width:220px;position:relative;opacity:0;animation:fadeSlide .4s forwards;transition:border-color .3s,box-shadow .3s}
.card.dead{opacity:0.2;filter:grayscale(1);transition:opacity .5s,filter .5s}
.card.atk-flash{border-color:var(--holy);box-shadow:0 0 12px rgba(224,192,64,0.25)}
.card.hit-flash{animation:hitPulse .3s ease-out}
.card.boss-card{border-color:var(--fire);box-shadow:0 0 10px rgba(224,80,32,0.2)}
@keyframes fadeSlide{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeScale{from{opacity:0;transform:scale(0.5)}to{opacity:1;transform:scale(1)}}
@keyframes hitPulse{0%{transform:translateX(0)}20%{transform:translateX(-3px)}60%{transform:translateX(3px)}100%{transform:translateX(0)}}

.c-icon{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.c-body{flex:1;min-width:0}
.c-name{font-size:11px;font-weight:700;letter-spacing:0.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.c-hp-track{width:100%;height:4px;background:var(--border);border-radius:2px;margin-top:3px;overflow:hidden}
.c-hp-fill{height:100%;border-radius:2px;transition:width .4s ease}
.c-hp-num{font-size:8px;color:var(--dim);margin-top:1px}
.c-atk-track{width:100%;height:2px;background:var(--border);border-radius:1px;margin-top:2px;overflow:hidden}
.c-atk-fill{height:100%;background:var(--arcane);border-radius:1px;transition:width .08s}

.log-box{width:100%;max-height:55px;overflow-y:auto;margin-top:6px;font-size:10px;color:var(--dim);line-height:1.5}
.log-box .ld{color:var(--blood)}.log-box .lh{color:var(--nature)}.log-box .lc{color:var(--holy)}.log-box .ls{color:var(--arcane)}

.hero-panel{border-top:1px solid var(--border);padding:10px 16px;flex-shrink:0;display:flex;gap:12px;align-items:flex-start}
.hp-col{flex:1;min-width:0}
.hp-label{font-family:'Uncial Antiqua',cursive;font-size:11px;color:var(--arcane);letter-spacing:0.08em;margin-bottom:4px}
.hp-stat{font-size:10px;color:var(--dim);margin-bottom:1px}
.hp-stat .sv{color:var(--frost)}
.hp-skill{font-size:9px;color:var(--shadow);margin-top:3px}
.wp-col{flex:1;min-width:0}
.wp-box{padding:6px 8px;border:1px solid var(--border);border-radius:6px;background:rgba(128,64,224,0.03)}
.wp-name{font-family:'Uncial Antiqua',cursive;font-size:11px;color:var(--holy);letter-spacing:0.04em}
.wp-stat{font-size:9px;color:var(--dim);margin-top:2px}
.wp-stat .wv{color:var(--holy)}
.btn{font-family:'Cormorant Garamond',serif;font-size:10px;font-weight:700;padding:5px 12px;border-radius:4px;cursor:pointer;letter-spacing:0.04em;transition:all .15s;margin-top:4px}
.btn-lvl{background:rgba(48,160,224,0.08);border:1px solid var(--frost);color:var(--frost)}
.btn-lvl:hover{background:rgba(48,160,224,0.15)}
.btn-wp{background:rgba(224,192,64,0.08);border:1px solid var(--holy);color:var(--holy)}
.btn-wp:hover{background:rgba(224,192,64,0.15)}
.btn.off{opacity:0.3;cursor:default}

.overlay{position:fixed;inset:0;z-index:20;background:rgba(8,7,14,0.94);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(5px)}
.overlay.hide{display:none}
.ov-box{text-align:center;max-width:520px;width:100%;padding:20px}
.ov-box h1{font-family:'Uncial Antiqua',cursive;font-size:28px;color:var(--arcane);text-shadow:0 0 25px rgba(128,64,224,0.35);letter-spacing:0.06em;margin-bottom:4px}
.ov-box .sub{font-size:12px;color:var(--dim);line-height:1.7;margin-bottom:16px}
.class-grid{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
.cls-card{background:var(--surface);border:2px solid var(--border);border-radius:10px;padding:14px 12px;width:130px;cursor:pointer;text-align:center;transition:all .25s;opacity:0;animation:fadeSlide .4s forwards}
.cls-card:nth-child(1){animation-delay:0s}.cls-card:nth-child(2){animation-delay:.08s}.cls-card:nth-child(3){animation-delay:.16s}.cls-card:nth-child(4){animation-delay:.24s}.cls-card:nth-child(5){animation-delay:.32s}.cls-card:nth-child(6){animation-delay:.4s}
.cls-card:hover{border-color:var(--arcane);transform:translateY(-3px);box-shadow:0 6px 24px rgba(128,64,224,0.15)}
.cls-card .ci{font-size:28px;margin-bottom:4px}
.cls-card .cn{font-family:'Uncial Antiqua',cursive;font-size:13px;color:var(--arcane)}
.cls-card .cw{font-size:10px;color:var(--holy);margin-top:3px}
.cls-card .cd{font-size:9px;color:var(--dim);margin-top:5px;line-height:1.4}

.new-run{font-size:9px;color:var(--dim);cursor:pointer;margin-left:auto;letter-spacing:0.04em}
.new-run:hover{color:var(--arcane)}

@media(max-width:480px){
  .hero-panel{flex-direction:column;gap:8px}
  .battle-row{flex-direction:column;gap:4px}
  .vs{font-size:14px}
  .card{max-width:100%}
  .cls-card{width:110px;padding:10px 8px}
}
</style>
</head>
<body>

<header>
  <h1>Mystic Omen</h1>
  <a href="https://sloppy.live">&larr; sloppy.live</a>
</header>

<div class="bar">
  <span>Wave <span class="v wv" id="waveEl">1</span></span>
  <span>Gold <span class="v gp" id="goldEl">0</span></span>
  <span id="newRun" class="new-run">New Run</span>
</div>

<div class="arena">
  <div class="arena-title" id="arenaTitle">Preparing...</div>
  <div class="battle-row" id="battleRow">
    <div class="side ally" id="allyCol"></div>
    <div class="vs">VS</div>
    <div class="side foe" id="foeCol"></div>
  </div>
  <div class="log-box" id="log"></div>
</div>

<div class="hero-panel">
  <div class="hp-col" id="heroInfo">Choose a class</div>
  <div class="wp-col" id="weapInfo"></div>
</div>

<div class="overlay" id="pickOverlay">
  <div class="ov-box">
    <h1>Mystic Omen</h1>
    <div class="sub">Choose thy class. Battle the omen. Upgrade endlessly.</div>
    <div class="class-grid" id="classGrid"></div>
  </div>
</div>

<script>
(function(){
'use strict';

// Audio
let actx;
function au(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();return actx}
function sfx(f,d,t,v){try{const c=au();if(c.state==='suspended')c.resume();const o=c.createOscillator(),g=c.createGain();o.type=t||'triangle';o.frequency.setValueAtTime(f,c.currentTime);o.frequency.exponentialRampToValueAtTime(f*0.4,c.currentTime+d);g.gain.setValueAtTime(v||0.025,c.currentTime);g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);o.connect(g).connect(c.destination);o.start();o.stop(c.currentTime+d)}catch(e){}}

// === D&D CLASSES ===
const CLASSES = [
  { id:'fighter', name:'Fighter', icon:'⚔️', weapon:'Greatsword', wIcon:'🗡️',
    desc:'Strong and balanced. Greatsword scales raw damage.',
    hp:1.2, atk:1.2, def:1.1, spd:1.0,
    skill:{name:'Power Strike',type:'crit',chance:0.22,mult:2.2,desc:'220% damage crit'},
    wBase:{dmg:5,spd:0}, wGrow:{dmg:2.8,spd:0.005} },
  { id:'wizard', name:'Wizard', icon:'🧙', weapon:'Arcane Orb', wIcon:'🔮',
    desc:'Devastating magic, fragile form. Orb boosts ATK fast.',
    hp:0.65, atk:1.5, def:0.5, spd:1.0,
    skill:{name:'Arcane Blast',type:'aoe',chance:0.18,mult:0.55,desc:'AOE 55% ATK to all'},
    wBase:{dmg:6,spd:0}, wGrow:{dmg:3.2,spd:0.008} },
  { id:'cleric', name:'Cleric', icon:'✝️', weapon:'Holy Scepter', wIcon:'✨',
    desc:'Heals through damage. Scepter strengthens mending.',
    hp:1.1, atk:0.7, def:1.0, spd:0.9,
    skill:{name:'Divine Mend',type:'heal',chance:0.3,pct:0.35,desc:'Heals 35% max HP'},
    wBase:{dmg:3,spd:0}, wGrow:{dmg:2,spd:0.005} },
  { id:'rogue', name:'Rogue', icon:'🗡️', weapon:'Venom Dagger', wIcon:'🐍',
    desc:'Blazing speed, piercing strikes. Dagger boosts both.',
    hp:0.75, atk:1.15, def:0.6, spd:1.5,
    skill:{name:'Assassinate',type:'pierce',chance:0.2,mult:1.6,desc:'Ignores armor, 160% dmg'},
    wBase:{dmg:3,spd:0.08}, wGrow:{dmg:2.2,spd:0.02} },
  { id:'paladin', name:'Paladin', icon:'🛡️', weapon:'Dawn Hammer', wIcon:'🔨',
    desc:'Immovable wall. Hammer hits hard, shields harder.',
    hp:1.5, atk:0.9, def:1.5, spd:0.75,
    skill:{name:'Bulwark',type:'shield',chance:0.3,reduction:0.65,desc:'Blocks 65% next hit'},
    wBase:{dmg:4,spd:0}, wGrow:{dmg:2.5,spd:0.003} },
  { id:'ranger', name:'Ranger', icon:'🏹', weapon:'Longbow', wIcon:'🎯',
    desc:'Drains life with each shot. Bow scales damage and speed.',
    hp:0.8, atk:1.1, def:0.7, spd:1.2,
    skill:{name:'Leech Arrow',type:'drain',chance:0.25,pct:0.18,desc:'Steals 18% target HP'},
    wBase:{dmg:4,spd:0.05}, wGrow:{dmg:2.4,spd:0.015} },
];

// === MONSTERS ===
const MONSTERS = [
  {id:'rat',name:'Giant Rat',icon:'🐀',bg:'#1a1510',hp:35,atk:7,def:1,spd:1.1},
  {id:'goblin',name:'Goblin',icon:'👺',bg:'#1a2010',hp:50,atk:10,def:2,spd:1.0},
  {id:'skeleton',name:'Skeleton',icon:'💀',bg:'#1a1a1a',hp:55,atk:13,def:3,spd:0.9},
  {id:'orc',name:'Orc Brute',icon:'👹',bg:'#201510',hp:80,atk:15,def:4,spd:0.8},
  {id:'wraith',name:'Wraith',icon:'👻',bg:'#18142a',hp:60,atk:20,def:2,spd:1.2},
  {id:'minotaur',name:'Minotaur',icon:'🐂',bg:'#2a1a10',hp:100,atk:18,def:6,spd:0.7},
  {id:'vampire',name:'Vampire',icon:'🧛',bg:'#1a0a1a',hp:70,atk:22,def:3,spd:1.1},
  {id:'beholder',name:'Beholder',icon:'👁️',bg:'#0a1a20',hp:90,atk:25,def:5,spd:0.6},
];

const BOSSES = [
  {id:'b_dragon',name:'Red Dragon',icon:'🐉',bg:'#2a0a0a',hp:450,atk:30,def:10,spd:0.5,
   skill:{name:'Fire Breath',type:'aoe',chance:0.25,mult:0.5}},
  {id:'b_lich',name:'Arch Lich',icon:'🧙‍♂️',bg:'#1a0a2a',hp:380,atk:35,def:7,spd:0.7,
   skill:{name:'Soul Drain',type:'drain',chance:0.3,pct:0.22}},
  {id:'b_kraken',name:'Kraken',icon:'🐙',bg:'#0a1520',hp:550,atk:25,def:12,spd:0.4,
   skill:{name:'Tentacle Slam',type:'crit',chance:0.2,mult:2.5}},
  {id:'b_demon',name:'Pit Fiend',icon:'😈',bg:'#2a0a10',hp:420,atk:40,def:8,spd:0.6,
   skill:{name:'Hellfire',type:'aoe',chance:0.2,mult:0.6}},
  {id:'b_tarrasque',name:'Tarrasque',icon:'🦖',bg:'#1a2010',hp:700,atk:22,def:18,spd:0.3,
   skill:{name:'Fortress Hide',type:'shield',chance:0.35,reduction:0.7}},
];

// === STATE ===
const S = {
  cls:null, wave:1, gold:0, phase:'idle',
  hero:null, enemies:[], selectedUnit:0,
  battleTick:null, logLines:[],
};

const SAVE_KEY = 'mysticomen_save';

// === UNIT ===
function mkUnit(def,lvl,isEnemy,clsMod){
  const wScale = isEnemy ? 1+(S.wave-1)*0.15 : 1;
  const ls = 1+(lvl-1)*0.12;
  const hm=clsMod?clsMod.hp:1, am=clsMod?clsMod.atk:1, dm=clsMod?clsMod.def:1, sm=clsMod?clsMod.spd:1;
  return { def,lvl, maxHp:Math.floor(def.hp*ls*wScale*hm), hp:Math.floor(def.hp*ls*wScale*hm),
    atk:Math.floor(def.atk*ls*wScale*am), defSt:Math.floor(def.def*ls*wScale*dm),
    spd:def.spd*(1+(lvl-1)*0.03)*sm, atkTimer:0, shield:0, buffMult:1,
    alive:true, isEnemy:!!isEnemy, anim:'', weapon:null, invisible:false, isBoss:false };
}

function weapBonus(u){
  if(!u.weapon||!S.cls) return {dmg:0,spd:0};
  const l=u.weapon.lvl;
  return {dmg:Math.floor(S.cls.wBase.dmg+S.cls.wGrow.dmg*(l-1)), spd:S.cls.wBase.spd+S.cls.wGrow.spd*(l-1)};
}
function weapCost(l){ return Math.floor(25+l*18+Math.pow(l,1.4)*5); }
function recalc(u){
  const cm=(u===S.hero&&S.cls)?S.cls:null;
  const ls=1+(u.lvl-1)*0.12;
  const hm=cm?cm.hp:1,am=cm?cm.atk:1,dm=cm?cm.def:1,sm=cm?cm.spd:1;
  const wb=weapBonus(u);
  u.maxHp=Math.floor(u.def.hp*ls*hm); u.hp=u.maxHp;
  u.atk=Math.floor(u.def.atk*ls*am)+wb.dmg;
  u.defSt=Math.floor(u.def.def*ls*dm);
  u.spd=u.def.spd*(1+(u.lvl-1)*0.03)*sm+wb.spd;
}

// === WAVES ===
function genWave(w){
  const enemies=[];
  const isBoss = w%10===0;
  if(isBoss){
    const bi=(Math.floor(w/10)-1)%BOSSES.length;
    const bd=BOSSES[bi];
    const boss=mkUnit(bd,Math.ceil(w*0.6),true);
    boss.isBoss=true;
    enemies.push(boss);
    const mc=Math.min(1+Math.floor(w/20),2);
    const pool=MONSTERS.filter((_,i)=>i<Math.min(3+Math.floor(w/3),MONSTERS.length));
    for(let i=0;i<mc;i++) enemies.push(mkUnit(pool[Math.floor(Math.random()*pool.length)],Math.ceil(w*0.6),true));
  } else {
    const cnt=Math.min(2+Math.floor(w/2),4);
    const pool=MONSTERS.filter((_,i)=>i<Math.min(3+Math.floor(w/3),MONSTERS.length));
    for(let i=0;i<cnt;i++) enemies.push(mkUnit(pool[Math.floor(Math.random()*pool.length)],Math.ceil(w*0.6),true));
  }
  return enemies;
}

// === BATTLE ===
const logEl=document.getElementById('log');
function addLog(h){ S.logLines.push(h); if(S.logLines.length>25)S.logLines.shift(); logEl.innerHTML=S.logLines.join('<br>'); logEl.scrollTop=logEl.scrollHeight; }

function pickTarget(team){const a=team.filter(u=>u.alive);return a.length?a[Math.floor(Math.random()*a.length)]:null;}
function lowestHp(team){let l=null;for(const u of team){if(!u.alive)continue;if(!l||u.hp/u.maxHp<l.hp/l.maxHp)l=u;}return l;}

function applyDmg(u,d){ u.hp=Math.max(0,u.hp-d); if(u.hp<=0){u.alive=false;addLog(`<span class="ld">${u.def.name} slain!</span>`);sfx(150,0.15,'sawtooth',0.05);} }
function trigAnim(u,c){ u.anim=c; setTimeout(()=>{u.anim='';renderCards();},300); }

function doAttack(att,defs,allies){
  if(!att.alive) return;
  const sk=att.def.skill;
  const useSk=sk&&Math.random()<sk.chance;

  if(useSk&&sk.type==='heal'){
    const t=att.isEnemy?lowestHp(allies):lowestHp([S.hero].filter(u=>u));
    if(t){const h=Math.floor(t.maxHp*(sk.pct||0.3)*att.buffMult);t.hp=Math.min(t.maxHp,t.hp+h);
    addLog(`<span class="ls">${att.def.name}</span> casts <span class="lh">${sk.name}</span> → heals <span class="lh">${h}</span>`);
    sfx(600,0.06,'sine',0.03);trigAnim(att,'atk-flash');att.buffMult=1;return;}
  }
  if(useSk&&sk.type==='shield'){att.shield=sk.reduction;addLog(`<span class="ls">${att.def.name}</span> raises <span class="ls">${sk.name}</span>`);sfx(500,0.05,'triangle',0.03);att.buffMult=1;return;}
  if(useSk&&sk.type==='aoe'){
    const alive=defs.filter(u=>u.alive);let tot=0;
    for(const t of alive){let d=Math.max(1,Math.floor(att.atk*sk.mult*att.buffMult-t.defSt*0.3));if(t.shield>0){d=Math.floor(d*(1-t.shield));t.shield=0;}applyDmg(t,d);tot+=d;}
    addLog(`<span class="ls">${att.def.name}</span> casts <span class="ls">${sk.name}</span> → <span class="ld">${tot}</span> total`);
    sfx(300,0.1,'sawtooth',0.04);trigAnim(att,'atk-flash');att.buffMult=1;return;
  }

  const tgt=pickTarget(defs);
  if(!tgt) return;
  let dmg,msg;
  if(useSk&&sk.type==='pierce'){
    dmg=Math.max(1,Math.floor(att.atk*sk.mult*att.buffMult));
    msg=`<span class="ls">${att.def.name}</span> uses <span class="lc">${sk.name}</span> → <span class="ld">${dmg}</span> piercing`;sfx(200,0.1,'sawtooth',0.05);
  }else if(useSk&&sk.type==='crit'){
    dmg=Math.max(1,Math.floor(att.atk*sk.mult*att.buffMult-tgt.defSt*0.5));
    msg=`<span class="lc">${att.def.name} CRITS</span> → <span class="lc">${dmg}</span>!`;sfx(250,0.12,'square',0.06);
  }else if(useSk&&sk.type==='drain'){
    dmg=Math.floor(tgt.hp*(sk.pct||0.15));const hl=Math.floor(dmg*0.5);att.hp=Math.min(att.maxHp,att.hp+hl);
    msg=`<span class="ls">${att.def.name}</span> drains → <span class="ld">${dmg}</span>, <span class="lh">+${hl}</span>`;sfx(400,0.08,'triangle',0.04);
  }else{
    dmg=Math.max(1,Math.floor(att.atk*att.buffMult-tgt.defSt*0.5));
    msg=`${att.def.name} strikes → <span class="ld">${dmg}</span>`;sfx(350,0.05,'square',0.03);
  }
  if(tgt.shield>0){dmg=Math.floor(dmg*(1-tgt.shield));tgt.shield=0;}
  applyDmg(tgt,dmg);addLog(msg);trigAnim(att,'atk-flash');trigAnim(tgt,'hit-flash');att.buffMult=1;
}

function tick(){
  const all=[S.hero,...S.enemies].filter(u=>u&&u.alive);
  if(!all.length) return;
  for(const u of all){
    if(!u.alive) continue;
    u.atkTimer+=u.spd;
    if(u.atkTimer>=10){u.atkTimer-=10;
      if(u.isEnemy) doAttack(u,[S.hero].filter(x=>x&&x.alive),S.enemies);
      else doAttack(u,S.enemies,[S.hero]);
    }
  }
  renderCards(); renderHero();

  const heroAlive=S.hero&&S.hero.alive;
  const foesAlive=S.enemies.some(u=>u.alive);

  if(!foesAlive){
    clearInterval(S.battleTick);S.battleTick=null;
    const isBoss=S.wave%10===0;
    const reward=(20+S.wave*15)*(isBoss?3:1);
    S.gold+=reward;
    addLog(isBoss?`<span style="color:var(--holy);font-weight:700">BOSS VANQUISHED! +${reward} gold</span>`:`<span class="lh">Wave ${S.wave} clear! +${reward} gold</span>`);
    sfx(440,0.1,'sine',0.04);setTimeout(()=>sfx(660,0.08,'sine',0.03),100);setTimeout(()=>sfx(880,0.06,'sine',0.03),200);
    S.wave++;
    S.hero.hp=S.hero.maxHp;S.hero.alive=true;S.hero.atkTimer=0;S.hero.shield=0;S.hero.buffMult=1;
    saveGame();
    setTimeout(startWave,1200);
  }
  if(!heroAlive){
    clearInterval(S.battleTick);S.battleTick=null;
    addLog(`<span class="ld">HERO FALLEN</span>`);sfx(100,0.3,'sawtooth',0.07);
    S.phase='dead';
    setTimeout(()=>{
      S.hero.hp=S.hero.maxHp;S.hero.alive=true;S.hero.atkTimer=0;S.hero.shield=0;S.hero.buffMult=1;
      for(const e of S.enemies) if(e.alive){e.atkTimer=0;e.shield=0;e.buffMult=1;}
      saveGame();
      const rem=S.enemies.filter(u=>u.alive).length;
      addLog(`<span style="color:var(--frost)">You rise again. ${rem} foe${rem!==1?'s':''} remain...</span>`);
      setTimeout(resumeWave,800);
    },1800);
  }
}

function resumeWave(){
  S.phase='battle';
  document.getElementById('arenaTitle').textContent=`Wave ${S.wave}`;
  renderCards();renderHud();renderHero();
  if(S.battleTick) clearInterval(S.battleTick);
  S.battleTick=setInterval(tick,60);
}

function startWave(){
  S.phase='battle'; S.enemies=genWave(S.wave); S.logLines=[];
  const isBoss=S.wave%10===0;
  const bossUnit=isBoss?S.enemies.find(u=>u.isBoss):null;
  addLog(isBoss&&bossUnit?`<span style="color:var(--holy);font-weight:700">⚔ BOSS — ${bossUnit.def.name} ⚔</span>`:`<span style="color:var(--fire)">— Wave ${S.wave} —</span>`);
  document.getElementById('arenaTitle').textContent=isBoss?`Boss — ${bossUnit?bossUnit.def.name:''}`:`Wave ${S.wave}`;
  renderCards();renderHud();renderHero();
  if(S.battleTick) clearInterval(S.battleTick);
  S.battleTick=setInterval(tick,60);
}

// === RENDER ===
function renderCard(u,container,delay){
  const d=document.createElement('div');
  d.className=`card ${u.alive?'':'dead'} ${u.anim} ${u.isBoss?'boss-card':''}`;
  d.style.animationDelay=delay+'s';
  const hpPct=Math.max(0,u.hp/u.maxHp*100);
  const hpCol=hpPct>60?'var(--nature)':hpPct>25?'var(--holy)':'var(--blood)';
  const atkPct=Math.min(100,u.atkTimer/10*100);
  d.innerHTML=`<div class="c-icon" style="background:${u.def.bg||'var(--surface)'}">${u.def.icon}</div>
    <div class="c-body"><div class="c-name" style="color:${u.isEnemy?'var(--blood)':'var(--frost)'}">${u.def.name}${u.lvl>1?' Lv'+u.lvl:''}</div>
    <div class="c-hp-track"><div class="c-hp-fill" style="width:${hpPct}%;background:${hpCol}"></div></div>
    <div class="c-hp-num">${u.hp}/${u.maxHp}</div>
    <div class="c-atk-track"><div class="c-atk-fill" style="width:${atkPct}%"></div></div></div>`;
  container.appendChild(d);
}

function renderCards(){
  const ac=document.getElementById('allyCol'),fc=document.getElementById('foeCol');
  ac.innerHTML='';fc.innerHTML='';
  if(S.hero) renderCard(S.hero,ac,0);
  S.enemies.forEach((e,i)=>renderCard(e,fc,i*0.06));
}

function renderHud(){
  document.getElementById('waveEl').textContent=S.wave;
  document.getElementById('goldEl').textContent=S.gold;
}

function renderHero(){
  const hi=document.getElementById('heroInfo'), wi=document.getElementById('weapInfo');
  if(!S.hero){hi.innerHTML='Choose a class';wi.innerHTML='';return;}
  const u=S.hero, lc=30+u.lvl*20, canL=S.gold>=lc;
  hi.innerHTML=`<div class="hp-label">${u.def.icon} ${u.def.name} Lv${u.lvl}</div>
    <div class="hp-stat">HP <span class="sv">${u.maxHp}</span> · ATK <span class="sv">${u.atk}</span> · DEF <span class="sv">${u.defSt}</span> · SPD <span class="sv">${u.spd.toFixed(2)}</span></div>
    ${u.def.skill?`<div class="hp-skill">⚡ ${u.def.skill.name}: ${u.def.skill.desc} (${Math.round(u.def.skill.chance*100)}%)</div>`:''}
    <button class="btn btn-lvl ${canL?'':'off'}" id="lvlBtn">Level Up (${lc}g)</button>`;
  document.getElementById('lvlBtn').addEventListener('click',()=>{
    if(S.gold<lc) return; S.gold-=lc; u.lvl++; recalc(u); saveGame();
    sfx(500,0.05,'triangle',0.03);sfx(700,0.04,'triangle',0.02);
    renderHero();renderHud();renderCards();
  });

  if(u.weapon&&S.cls){
    const wb=weapBonus(u),wc=weapCost(u.weapon.lvl),canW=S.gold>=wc;
    wi.innerHTML=`<div class="wp-box"><div class="wp-name">${S.cls.wIcon} ${u.weapon.name} +${u.weapon.lvl}</div>
      <div class="wp-stat">DMG <span class="wv">+${wb.dmg}</span> · SPD <span class="wv">+${wb.spd.toFixed(2)}</span></div>
      <button class="btn btn-wp ${canW?'':'off'}" id="wpBtn">Forge (${wc}g)</button></div>`;
    document.getElementById('wpBtn').addEventListener('click',()=>{
      if(S.gold<wc) return; S.gold-=wc; u.weapon.lvl++; recalc(u); saveGame();
      sfx(400,0.06,'triangle',0.04);sfx(600,0.05,'sine',0.03);sfx(800,0.04,'sine',0.02);
      addLog(`<span class="lh">${u.weapon.name} forged to +${u.weapon.lvl}!</span>`);
      renderHero();renderHud();renderCards();
    });
  } else { wi.innerHTML=''; }
}

// === CLASS PICKER ===
function buildPicker(){
  const g=document.getElementById('classGrid'); g.innerHTML='';
  CLASSES.forEach(cls=>{
    const d=document.createElement('div'); d.className='cls-card';
    d.innerHTML=`<div class="ci">${cls.icon}</div><div class="cn">${cls.name}</div><div class="cw">${cls.wIcon} ${cls.weapon}</div><div class="cd">${cls.desc}</div>`;
    d.addEventListener('click',()=>startRun(cls));
    g.appendChild(d);
  });
}

function startRun(cls){
  document.getElementById('pickOverlay').classList.add('hide');
  S.cls=cls; S.wave=1; S.gold=0;
  const hero=mkUnit({name:cls.name,icon:cls.icon,bg:'#101828',hp:cls.hp*80,atk:cls.atk*12,def:cls.def*3,spd:cls.spd*1.2,skill:cls.skill},1,false,cls);
  hero.weapon={name:cls.weapon,lvl:1};
  const wb=weapBonus(hero); hero.atk+=wb.dmg; hero.spd+=wb.spd;
  S.hero=hero; S.selectedUnit=0;
  addLog(`<span class="ls">You chose ${cls.name} — ${cls.wIcon} ${cls.weapon} equipped!</span>`);
  renderHero(); startWave();
}

function showPicker(){
  if(S.battleTick){clearInterval(S.battleTick);S.battleTick=null;}
  S.phase='idle';S.hero=null;S.enemies=[];S.wave=1;S.gold=0;S.cls=null;S.logLines=[];
  clearSave();
  logEl.innerHTML='';
  document.getElementById('allyCol').innerHTML='';
  document.getElementById('foeCol').innerHTML='';
  document.getElementById('heroInfo').innerHTML='Choose a class';
  document.getElementById('weapInfo').innerHTML='';
  document.getElementById('arenaTitle').textContent='Preparing...';
  renderHud();
  document.getElementById('pickOverlay').classList.remove('hide');
  buildPicker();
}

document.getElementById('newRun').addEventListener('click', showPicker);

// === SAVE/LOAD ===
function saveGame(){
  try{localStorage.setItem(SAVE_KEY,JSON.stringify({
    classId:S.cls?S.cls.id:null, wave:S.wave, gold:S.gold,
    heroLvl:S.hero?S.hero.lvl:1, weapLvl:S.hero&&S.hero.weapon?S.hero.weapon.lvl:1
  }));}catch(e){}
}
function loadGame(){
  try{
    const r=localStorage.getItem(SAVE_KEY); if(!r) return false;
    const d=JSON.parse(r); if(!d.classId) return false;
    const cls=CLASSES.find(c=>c.id===d.classId); if(!cls) return false;
    S.cls=cls; S.wave=d.wave||1; S.gold=d.gold||0;
    const hero=mkUnit({name:cls.name,icon:cls.icon,bg:'#101828',hp:cls.hp*80,atk:cls.atk*12,def:cls.def*3,spd:cls.spd*1.2,skill:cls.skill},d.heroLvl||1,false,cls);
    hero.weapon={name:cls.weapon,lvl:d.weapLvl||1}; recalc(hero);
    S.hero=hero; return true;
  }catch(e){return false;}
}
function clearSave(){try{localStorage.removeItem(SAVE_KEY);}catch(e){}}

// === INIT ===
if(loadGame()){
  document.getElementById('pickOverlay').classList.add('hide');
  addLog(`<span class="lh">Progress restored — Wave ${S.wave}, ${S.gold} gold</span>`);
  renderHero(); startWave();
} else { buildPicker(); }

})();
</script>
</body>
</html>
