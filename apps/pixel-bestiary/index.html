<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pixel Bestiary</title>
  <link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%91%B9">
  <meta name="description" content="A bestiary of procedurally generated 32×32 pixel monsters. Roll the dice on your next nightmare.">
  <meta property="og:title" content="Pixel Bestiary">
  <meta property="og:description" content="Summon 32×32 pixel monsters — slimes, demons, imps, spiders — and archive them in your grimoire.">
  <meta property="og:url" content="https://sloppy.live/pixel-bestiary">
  <meta property="og:image" content="https://image.pollinations.ai/prompt/grid%20of%20pixel%20art%20monsters%20demons%20slimes%20imps%20spiders%2032-bit%20retro%20dark%20red%20candlelit%20grimoire?width=1200&height=630&nologo=true">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Creepster&family=VT323&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-0: #0b0607;
      --bg-1: #1a0c0a;
      --ink: #f6e7d9;
      --muted: #8b6356;
      --blood: #c4261d;
      --bone: #e8d9b0;
      --moss: #7a8f42;
      --shadow: #2a1619;
      --line: rgba(196, 38, 29, 0.22);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      min-height: 100vh;
      color: var(--ink);
      font-family: 'VT323', ui-monospace, monospace;
      font-size: 18px;
      background:
        radial-gradient(circle at 20% 0%, rgba(196, 38, 29, 0.18), transparent 50%),
        radial-gradient(circle at 85% 100%, rgba(122, 143, 66, 0.10), transparent 55%),
        linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 100%);
      background-attachment: fixed;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        radial-gradient(circle at 25% 15%, rgba(232, 217, 176, 0.04) 1px, transparent 2px),
        radial-gradient(circle at 75% 45%, rgba(232, 217, 176, 0.03) 1px, transparent 2px),
        radial-gradient(circle at 50% 85%, rgba(232, 217, 176, 0.03) 1px, transparent 2px);
      background-size: 280px 220px, 340px 260px, 300px 240px;
      pointer-events: none;
      z-index: 0;
    }
    main {
      position: relative;
      z-index: 1;
      max-width: 1180px;
      margin: 0 auto;
      padding: 36px 20px 80px;
    }
    h1 {
      font-family: 'Creepster', system-ui, sans-serif;
      font-size: clamp(44px, 9vw, 92px);
      color: var(--blood);
      letter-spacing: 0.06em;
      line-height: 0.95;
      text-shadow:
        0 0 22px rgba(196, 38, 29, 0.6),
        0 4px 0 #000,
        2px 2px 0 var(--shadow);
      margin-bottom: 4px;
    }
    .sub {
      font-family: 'Silkscreen', monospace;
      font-size: 11px;
      color: var(--moss);
      letter-spacing: 0.32em;
      text-transform: uppercase;
      margin-bottom: 28px;
    }
    .sub .dot { color: var(--blood); padding: 0 6px; }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(0, 1.4fr);
      gap: 32px;
      align-items: start;
    }
    @media (max-width: 820px) {
      .layout { grid-template-columns: 1fr; }
    }

    .hero-panel {
      background: linear-gradient(145deg, rgba(42, 22, 25, 0.75), rgba(11, 6, 7, 0.85));
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 24px 70px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255, 220, 190, 0.05);
    }
    .hero-canvas-wrap {
      aspect-ratio: 1;
      background:
        repeating-conic-gradient(#1a0c0a 0% 25%, #120808 0% 50%) 0 0 / 32px 32px;
      border: 2px solid var(--blood);
      border-radius: 10px;
      box-shadow: 0 0 0 1px #000, 0 0 50px rgba(196, 38, 29, 0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      margin-bottom: 18px;
    }
    #hero {
      image-rendering: pixelated;
      image-rendering: -moz-crisp-edges;
      image-rendering: crisp-edges;
      width: 100%;
      height: 100%;
    }
    .hero-info {
      font-family: 'Silkscreen', monospace;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      display: flex;
      flex-wrap: wrap;
      gap: 10px 18px;
      margin-bottom: 18px;
      color: var(--muted);
    }
    .hero-info .v { color: var(--bone); }
    .hero-info .name { color: var(--blood); font-size: 14px; }

    .buttons {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }
    button {
      font-family: 'Silkscreen', monospace;
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      padding: 12px 14px;
      background: #1a0a0c;
      color: var(--bone);
      border: 1px solid var(--blood);
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.14s ease;
    }
    button:hover {
      background: var(--blood);
      color: #1a0a0c;
      transform: translateY(-1px);
      box-shadow: 0 6px 22px rgba(196, 38, 29, 0.48);
    }
    button.alt {
      border-color: var(--moss);
      color: var(--moss);
    }
    button.alt:hover {
      background: var(--moss);
      color: #1a0a0c;
      box-shadow: 0 6px 22px rgba(122, 143, 66, 0.42);
    }
    .big-btn {
      grid-column: span 2;
      font-size: 16px;
      padding: 14px;
      background: var(--blood);
      color: #1a0a0c;
    }
    .big-btn:hover { background: #e04133; box-shadow: 0 8px 30px rgba(196, 38, 29, 0.6); }

    .gallery-panel {
      background: linear-gradient(160deg, rgba(18, 8, 10, 0.78), rgba(11, 6, 7, 0.9));
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.55);
    }
    .section-title {
      font-family: 'Silkscreen', monospace;
      font-size: 12px;
      letter-spacing: 0.26em;
      text-transform: uppercase;
      color: var(--blood);
      margin-bottom: 14px;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .section-title .count {
      color: var(--muted);
      font-size: 10px;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
    }
    @media (max-width: 540px) {
      .gallery { grid-template-columns: repeat(3, 1fr); }
    }
    .tile {
      aspect-ratio: 1;
      background: #120808;
      border: 1px solid #3a1e20;
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.14s ease;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }
    .tile canvas {
      width: 100%;
      aspect-ratio: 1;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      background:
        repeating-conic-gradient(#22111a 0% 25%, #180a0e 0% 50%) 0 0 / 16px 16px;
    }
    .tile:hover {
      border-color: var(--blood);
      transform: translateY(-2px);
      box-shadow: 0 10px 26px rgba(196, 38, 29, 0.35);
    }
    .tile.selected {
      border-color: var(--bone);
      box-shadow: 0 0 0 2px var(--blood), 0 10px 26px rgba(196, 38, 29, 0.45);
    }
    .tile-label {
      position: absolute;
      left: 0; right: 0; bottom: 0;
      font-family: 'Silkscreen', monospace;
      font-size: 9px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--bone);
      background: linear-gradient(180deg, transparent, rgba(0,0,0,0.75) 60%);
      padding: 12px 6px 5px;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
    }

    .legend {
      margin-top: 16px;
      font-family: 'Silkscreen', monospace;
      font-size: 10px;
      letter-spacing: 0.16em;
      color: var(--muted);
      text-transform: uppercase;
      line-height: 1.8;
    }
    .legend kbd {
      display: inline-block;
      padding: 2px 6px;
      background: #1e0c0e;
      border: 1px solid var(--blood);
      border-radius: 3px;
      color: var(--bone);
      margin: 0 2px;
      font-family: 'Silkscreen', monospace;
    }

    .seed-row {
      display: flex;
      gap: 8px;
      margin-top: 14px;
      font-family: 'Silkscreen', monospace;
      font-size: 11px;
    }
    .seed-row input {
      flex: 1;
      background: #120808;
      border: 1px solid var(--line);
      color: var(--bone);
      padding: 9px 10px;
      border-radius: 6px;
      font-family: 'Silkscreen', monospace;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-size: 11px;
      outline: none;
    }
    .seed-row input:focus { border-color: var(--blood); }
    .seed-row button { padding: 9px 14px; font-size: 10px; letter-spacing: 0.14em; }
  </style>
</head>
<body>
  <main>
    <h1>Pixel Bestiary</h1>
    <div class="sub">32×32 procedural monsters <span class="dot">✦</span> Summon &amp; Archive</div>

    <div class="layout">
      <section class="hero-panel">
        <div class="hero-canvas-wrap">
          <canvas id="hero" width="32" height="32"></canvas>
        </div>
        <div class="hero-info">
          <span><span class="v name" id="hArch">—</span></span>
          <span>PALETTE <span class="v" id="hPal">—</span></span>
          <span>SEED <span class="v" id="hSeed">—</span></span>
        </div>
        <div class="buttons">
          <button id="randOne" class="big-btn">◈ Summon New</button>
          <button id="randAll">◈ Reroll All</button>
          <button id="downloadBig" class="alt">⇩ 512px PNG</button>
        </div>
        <div class="seed-row">
          <input id="seedInput" maxlength="8" placeholder="SEED">
          <button id="loadSeed">Conjure</button>
        </div>
        <div class="legend">
          <kbd>R</kbd> reroll hero · <kbd>Space</kbd> reroll all · <kbd>D</kbd> download · shift-click a tile to reroll it
        </div>
      </section>

      <section class="gallery-panel">
        <div class="section-title">
          <span>The Grimoire</span>
          <span class="count" id="galCount">16 bound</span>
        </div>
        <div class="gallery" id="gallery"></div>
      </section>
    </div>
  </main>

  <script>
  (() => {
    // ------------------------------------------------------------------
    // PRNG — mulberry32 with FNV-1a hash
    // ------------------------------------------------------------------
    function fnv1a(str) {
      let h = 0x811c9dc5;
      for (let i = 0; i < str.length; i++) {
        h ^= str.charCodeAt(i);
        h = Math.imul(h, 0x01000193);
      }
      return h >>> 0;
    }
    function mulberry32(seed) {
      let a = seed >>> 0;
      return function() {
        a |= 0; a = a + 0x6D2B79F5 | 0;
        let t = Math.imul(a ^ a >>> 15, 1 | a);
        t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
        return ((t ^ t >>> 14) >>> 0) / 4294967296;
      };
    }
    const ALPHA = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    function randomSeed() {
      let s = '';
      for (let i = 0; i < 6; i++) s += ALPHA[Math.floor(Math.random() * ALPHA.length)];
      return s;
    }

    // ------------------------------------------------------------------
    // Palettes — [outline, shadow, base, light, highlight, eyeWhite, eyePupil, accent]
    // indices match: 1=outline 2=shadow 3=base 4=light 5=highlight 6=eyeW 7=eyeP 8=accent
    // ------------------------------------------------------------------
    const PALETTES = {
      Toxic:   ['#0e1a0b', '#3a5418', '#6b8c24', '#b4d23b', '#e3ff66', '#fff8cf', '#1a0a10', '#ff6ebf'],
      Blood:   ['#1a0608', '#5a141b', '#a82126', '#e84640', '#ffb388', '#fff0db', '#1a0608', '#f6d14a'],
      Void:    ['#0c0615', '#321b4c', '#6d3ba0', '#b062ec', '#e9b5ff', '#fff0ff', '#0c0615', '#5af0d0'],
      Bone:    ['#181210', '#4a3b31', '#8e7b66', '#d0bfa4', '#f1e7d1', '#ffffe6', '#1a0a10', '#c4261d'],
      Abyss:   ['#06111f', '#142b4c', '#285a91', '#5cb0d8', '#b4f0ff', '#ffffff', '#06111f', '#ff88aa'],
      Rot:     ['#100a06', '#3a2a16', '#6b5026', '#9b7b3b', '#c7a957', '#e2e1b0', '#1a0a10', '#7a8f42'],
      Flame:   ['#1a0805', '#5a1c08', '#c4481a', '#f08a2a', '#ffd368', '#fff4bc', '#1a0805', '#4ad6ff'],
      Goblin:  ['#0e0e08', '#2c3b18', '#5a7226', '#8baf3b', '#c1db62', '#ffefc4', '#120804', '#c4261d'],
      Candy:   ['#1a061a', '#5b1f54', '#a8358f', '#ef69c5', '#ffc5ea', '#ffffff', '#1a061a', '#66ffce'],
      Frost:   ['#08121b', '#1c3849', '#3e7184', '#7ab6c8', '#cef4ff', '#ffffff', '#050505', '#c2a0ff']
    };
    const ARCHETYPES = ['Blob', 'Imp', 'Gargoyle', 'Spider', 'Worm', 'Ooze', 'Ghoul', 'Abomination'];

    // Name fragments for monster naming
    const PREFIX = ['Gra', 'Mur', 'Nib', 'Vor', 'Xol', 'Thu', 'Kra', 'Gla', 'Sno', 'Yur', 'Bur', 'Dro', 'Fel', 'Mog'];
    const MIDDLE = ['vak', 'mur', 'thog', 'zul', 'snik', 'brok', 'glum', 'vish', 'mord', 'zok'];
    const SUFFIX = ['lor', 'ath', 'oth', 'ix', 'og', 'ek', 'arn', 'us', 'rok', 'ith'];
    function genName(rng) {
      const pick = (a) => a[Math.floor(rng() * a.length)];
      return pick(PREFIX) + pick(MIDDLE) + pick(SUFFIX);
    }

    // ------------------------------------------------------------------
    // Canvas paint helpers
    // ------------------------------------------------------------------
    const GRID = 32;
    const CX = 15;   // symmetry axis (pixel 15 & 16 are the two center cols)

    function newGrid() {
      return new Uint8Array(GRID * GRID);
    }
    function putPx(g, x, y, v) {
      if (x < 0 || x >= GRID || y < 0 || y >= GRID) return;
      g[y * GRID + x] = v;
    }
    function getPx(g, x, y) {
      if (x < 0 || x >= GRID || y < 0 || y >= GRID) return 0;
      return g[y * GRID + x];
    }
    function putSym(g, x, y, v) {
      putPx(g, x, y, v);
      putPx(g, GRID - 1 - x, y, v);
    }
    function fillEllipseSym(g, cx, cy, rx, ry, v) {
      for (let y = -ry; y <= ry; y++) {
        for (let x = -rx; x <= rx; x++) {
          const ex = x / rx, ey = y / ry;
          if (ex * ex + ey * ey <= 1) putSym(g, cx + x, cy + y, v);
        }
      }
    }
    function fillEllipse(g, cx, cy, rx, ry, v) {
      for (let y = -ry; y <= ry; y++) {
        for (let x = -rx; x <= rx; x++) {
          const ex = x / rx, ey = y / ry;
          if (ex * ex + ey * ey <= 1) putPx(g, cx + x, cy + y, v);
        }
      }
    }
    function fillRectSym(g, x, y, w, h, v) {
      for (let j = 0; j < h; j++) for (let i = 0; i < w; i++) putSym(g, x + i, y + j, v);
    }
    function lineSym(g, x0, y0, x1, y1, v) {
      const dx = Math.abs(x1 - x0), dy = Math.abs(y1 - y0);
      const sx = x0 < x1 ? 1 : -1, sy = y0 < y1 ? 1 : -1;
      let err = dx - dy, x = x0, y = y0;
      while (true) {
        putSym(g, x, y, v);
        if (x === x1 && y === y1) break;
        const e2 = 2 * err;
        if (e2 > -dy) { err -= dy; x += sx; }
        if (e2 < dx) { err += dx; y += sy; }
      }
    }

    // Shading pass — find body-base pixels (3), add lighter (4) on upper-left,
    // darker (2) on lower-right. Also add top highlight (5) on very top.
    function shade(g) {
      for (let y = 0; y < GRID; y++) {
        for (let x = 0; x < GRID; x++) {
          if (getPx(g, x, y) !== 3) continue;
          const above = getPx(g, x, y - 1);
          const aboveLeft = getPx(g, x - 1, y - 1);
          const below = getPx(g, x, y + 1);
          const right = getPx(g, x + 1, y);
          if (above === 0 && aboveLeft === 0) putPx(g, x, y, 5);  // bright highlight
          else if (above === 0 || aboveLeft === 0) putPx(g, x, y, 4);  // light
          else if (below === 0 || right === 0) putPx(g, x, y, 2);  // shadow
        }
      }
    }

    // Outline pass — transparent cells orthogonally adjacent to non-transparent
    // become color 1.
    function outline(g) {
      const out = [];
      for (let y = 0; y < GRID; y++) {
        for (let x = 0; x < GRID; x++) {
          if (getPx(g, x, y) !== 0) continue;
          if (getPx(g, x - 1, y) > 0 || getPx(g, x + 1, y) > 0 ||
              getPx(g, x, y - 1) > 0 || getPx(g, x, y + 1) > 0) {
            out.push([x, y]);
          }
        }
      }
      for (const [x, y] of out) putPx(g, x, y, 1);
    }

    // ------------------------------------------------------------------
    // Archetype draw routines — every one fills with 3 (body base) and
    // places eye markers (color 9 → resolved to 6+7). Symbol 9 = eye socket.
    // Shading pass converts 3 → 2/4/5. Then eyes resolved. Then outline.
    // ------------------------------------------------------------------
    function drawBlob(g, rng) {
      const w = 10 + Math.floor(rng() * 3);  // half-width
      const h = 7 + Math.floor(rng() * 3);
      const cy = 19;
      fillEllipseSym(g, CX, cy, w, h, 3);
      // optional antennae
      if (rng() < 0.5) {
        const ax = CX - (2 + Math.floor(rng() * 3));
        lineSym(g, ax, cy - h - 2, ax, cy - h, 3);
        putSym(g, ax, cy - h - 3, 8); // accent tip
      }
      // drip
      if (rng() < 0.45) {
        const dx = CX - (3 + Math.floor(rng() * 4));
        putSym(g, dx, cy + h + 1, 3);
      }
      placeEyes(g, rng, CX, cy - 1, w);
      placeMouth(g, rng, CX, cy + 3, w - 2);
    }

    function drawImp(g, rng) {
      // head
      const hw = 6 + Math.floor(rng() * 2);
      const hh = 5 + Math.floor(rng() * 2);
      fillEllipseSym(g, CX, 11, hw, hh, 3);
      // body
      const bw = 4 + Math.floor(rng() * 2);
      fillRectSym(g, CX - bw, 17, bw, 7, 3);
      // legs
      fillRectSym(g, CX - bw + 1, 24, 2, 3, 3);
      // arms
      const armY = 18 + Math.floor(rng() * 2);
      lineSym(g, CX - bw, armY, CX - bw - 3, armY + 2, 3);
      // horns
      if (rng() < 0.85) {
        for (let i = 0; i < 3; i++) {
          putSym(g, CX - (hw - 2) + i, 11 - hh - 1 - Math.max(0, 1 - i), 5);
        }
      }
      placeEyes(g, rng, CX, 11, hw - 1);
      if (rng() < 0.7) placeMouth(g, rng, CX, 14, hw - 2);
    }

    function drawGargoyle(g, rng) {
      fillEllipseSym(g, CX, 14, 6, 5, 3);            // head
      fillRectSym(g, CX - 5, 18, 5, 8, 3);           // body
      fillRectSym(g, CX - 5, 26, 2, 4, 3);           // feet
      // wings
      if (rng() < 0.85) {
        for (let i = 0; i < 6; i++) {
          lineSym(g, CX - 5 - i, 17 + Math.floor(i/2), CX - 5 - i, 22 - Math.floor(i/3), 3);
        }
        // wing bones
        lineSym(g, CX - 5, 18, CX - 10, 16, 2);
      }
      // horns
      putSym(g, CX - 5, 9, 5);
      putSym(g, CX - 4, 8, 5);
      putSym(g, CX - 3, 9, 5);
      placeEyes(g, rng, CX, 14, 4);
      if (rng() < 0.6) placeMouth(g, rng, CX, 17, 3);
    }

    function drawSpider(g, rng) {
      // body
      fillEllipseSym(g, CX, 18, 5, 4, 3);
      // head
      fillEllipseSym(g, CX, 13, 3, 3, 3);
      // legs — 3 pairs on each side
      const legs = 3 + Math.floor(rng() * 2);
      for (let i = 0; i < legs; i++) {
        const y1 = 16 + i * 2;
        const reach = 7 + Math.floor(rng() * 3);
        lineSym(g, CX - 5, y1, CX - 5 - Math.floor(reach * 0.4), y1 - 2, 3);
        lineSym(g, CX - 5 - Math.floor(reach * 0.4), y1 - 2, CX - 5 - reach, y1 + 3, 3);
      }
      placeEyes(g, rng, CX, 13, 2);
      // cluster of extra eyes
      if (rng() < 0.6) {
        putSym(g, CX - 2, 14, 9);
        putSym(g, CX - 2, 15, 9);
      }
    }

    function drawWorm(g, rng) {
      const segs = 5 + Math.floor(rng() * 2);
      let cy = 6;
      for (let i = 0; i < segs; i++) {
        const w = 3 + Math.max(0, 2 - Math.abs(i - segs / 2));
        const wobble = (i % 2 === 0 ? -1 : 1) * (i > 0 ? 1 : 0);
        fillEllipseSym(g, CX + wobble, cy, w, 2, 3);
        cy += 4;
      }
      // head fringe
      placeEyes(g, rng, CX, 7, 2);
      if (rng() < 0.8) placeMouth(g, rng, CX, 9, 1);
    }

    function drawOoze(g, rng) {
      // puddly base
      fillEllipseSym(g, CX, 25, 12, 3, 3);
      // body dome
      fillEllipseSym(g, CX, 20, 9, 6, 3);
      // drips hanging off base
      const drips = 2 + Math.floor(rng() * 3);
      for (let i = 0; i < drips; i++) {
        const dx = CX - 4 - Math.floor(rng() * 6);
        putSym(g, dx, 27 + Math.floor(rng() * 2), 3);
      }
      placeEyes(g, rng, CX, 19, 6);
      if (rng() < 0.6) placeMouth(g, rng, CX, 23, 4);
      // bubble accent
      if (rng() < 0.7) putSym(g, CX - (4 + Math.floor(rng() * 4)), 17, 8);
    }

    function drawGhoul(g, rng) {
      // skull head
      fillEllipseSym(g, CX, 11, 5, 5, 3);
      // neck
      fillRectSym(g, CX - 2, 16, 2, 2, 3);
      // torso
      fillRectSym(g, CX - 4, 18, 4, 5, 3);
      // ribcage lines
      for (let i = 0; i < 3; i++) {
        lineSym(g, CX - 3, 19 + i * 2, CX - 1, 19 + i * 2, 2);
      }
      // arms
      lineSym(g, CX - 4, 18, CX - 7, 20, 3);
      lineSym(g, CX - 7, 20, CX - 7, 24, 3);
      // legs
      fillRectSym(g, CX - 3, 23, 2, 5, 3);
      // hollow eyes - force black sockets
      putSym(g, CX - 2, 11, 7);
      putSym(g, CX - 3, 11, 7);
      // jaw
      putSym(g, CX - 2, 14, 1);
    }

    function drawAbomination(g, rng) {
      // lumpy mass
      fillEllipseSym(g, CX, 20, 11, 8, 3);
      // extra lumps
      for (let i = 0; i < 3; i++) {
        const lx = CX - 4 - Math.floor(rng() * 6);
        const ly = 15 + Math.floor(rng() * 10);
        fillEllipse(g, lx, ly, 2 + Math.floor(rng() * 2), 2, 3);
      }
      // tentacle limbs
      const limbs = 2 + Math.floor(rng() * 2);
      for (let i = 0; i < limbs; i++) {
        const sx = CX - 8 - Math.floor(rng() * 3);
        const sy = 22 + Math.floor(rng() * 4);
        lineSym(g, sx, sy, sx - 3, sy + 3, 3);
        putSym(g, sx - 3, sy + 3, 8);
      }
      // many eyes scattered
      const nEyes = 3 + Math.floor(rng() * 3);
      for (let i = 0; i < nEyes; i++) {
        const ex = CX - 1 - Math.floor(rng() * 6);
        const ey = 14 + Math.floor(rng() * 8);
        putSym(g, ex, ey, 9);
      }
    }

    // Placing eyes: marks color 9 pixels that later become 6 (white) + 7 (pupil)
    function placeEyes(g, rng, cx, cy, reach) {
      const style = rng();
      if (style < 0.35) {
        // one cyclops
        putPx(g, cx, cy, 9);
        putPx(g, GRID - 1 - cx, cy, 9);
      } else if (style < 0.75) {
        // two eyes
        const off = Math.max(2, Math.min(reach - 1, 2 + Math.floor(rng() * 2)));
        putSym(g, cx - off, cy, 9);
      } else {
        // three eyes (three spots: symmetric pair + center)
        const off = Math.max(2, Math.min(reach - 1, 2 + Math.floor(rng() * 2)));
        putSym(g, cx - off, cy, 9);
        putPx(g, cx, cy - 1, 9);
        putPx(g, GRID - 1 - cx, cy - 1, 9);
      }
    }

    function placeMouth(g, rng, cx, cy, reach) {
      const style = rng();
      if (style < 0.3) {
        // fangs
        for (let i = 0; i < 3; i++) putSym(g, cx - i, cy, 1);
        putSym(g, cx - 1, cy + 1, 5);
      } else if (style < 0.6) {
        // grin
        for (let i = 0; i <= Math.min(reach, 3); i++) putSym(g, cx - i, cy, 1);
      } else if (style < 0.85) {
        // mouth with teeth
        for (let i = 0; i <= 3; i++) putSym(g, cx - i, cy, 1);
        for (let i = 0; i < 3; i += 2) putSym(g, cx - i, cy + 1, 5);
      } else {
        // straight line
        for (let i = 0; i < 3; i++) putSym(g, cx - i, cy, 1);
      }
    }

    // Resolve eye markers (9) → white ring + pupil, adapting to palette
    function resolveEyes(g, rng) {
      const marks = [];
      for (let y = 0; y < GRID; y++) {
        for (let x = 0; x < GRID; x++) {
          if (getPx(g, x, y) === 9) marks.push([x, y]);
        }
      }
      for (const [x, y] of marks) {
        // surround with white (6), center pupil (7)
        putPx(g, x, y, 6);
        if (rng() < 0.85) {
          const dx = rng() < 0.5 ? -1 : 0;
          const dy = rng() < 0.5 ? 0 : 1;
          putPx(g, x, y, 7);
          putPx(g, x + dx, y + dy, 6);
        } else {
          putPx(g, x, y, 7);
        }
      }
    }

    // Optional horns/spikes/spots post-pass
    function addSpikes(g, rng) {
      // find top-row body pixels, add triangular spikes
      for (let x = 2; x < CX; x++) {
        for (let y = 0; y < GRID; y++) {
          const v = getPx(g, x, y);
          if ((v === 3 || v === 4 || v === 5) && getPx(g, x, y - 1) === 0) {
            if (rng() < 0.28) {
              putSym(g, x, y - 1, 5);
              if (rng() < 0.4) putSym(g, x, y - 2, 5);
            }
            break;
          }
        }
      }
    }

    function addSpots(g, rng) {
      // scatter accent dots on body
      const n = 2 + Math.floor(rng() * 4);
      for (let i = 0; i < n; i++) {
        const x = 4 + Math.floor(rng() * (CX - 4));
        const y = 10 + Math.floor(rng() * 15);
        const cur = getPx(g, x, y);
        if (cur === 3 || cur === 4) putSym(g, x, y, 8);
      }
    }

    // ------------------------------------------------------------------
    // Master generator
    // ------------------------------------------------------------------
    const ARCH_DRAWERS = {
      Blob: drawBlob,
      Imp: drawImp,
      Gargoyle: drawGargoyle,
      Spider: drawSpider,
      Worm: drawWorm,
      Ooze: drawOoze,
      Ghoul: drawGhoul,
      Abomination: drawAbomination
    };

    function generate(seed, forceArch, forcePal) {
      const rng = mulberry32(fnv1a(seed));
      const arch = forceArch || ARCHETYPES[Math.floor(rng() * ARCHETYPES.length)];
      const palName = forcePal || Object.keys(PALETTES)[Math.floor(rng() * Object.keys(PALETTES).length)];
      const palette = PALETTES[palName];
      const g = newGrid();
      ARCH_DRAWERS[arch](g, rng);
      shade(g);
      if (rng() < 0.45) addSpikes(g, rng);
      if (rng() < 0.5) addSpots(g, rng);
      resolveEyes(g, rng);
      outline(g);
      return {
        seed,
        arch,
        palName,
        palette,
        grid: g,
        name: genName(mulberry32(fnv1a(seed + ':n')))
      };
    }

    function renderTo(canvas, monster) {
      const ctx = canvas.getContext('2d');
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      const scaleX = canvas.width / GRID, scaleY = canvas.height / GRID;
      for (let y = 0; y < GRID; y++) {
        for (let x = 0; x < GRID; x++) {
          const v = monster.grid[y * GRID + x];
          if (v === 0) continue;
          ctx.fillStyle = monster.palette[v - 1] || '#ff00ff';
          ctx.fillRect(x * scaleX, y * scaleY, Math.ceil(scaleX), Math.ceil(scaleY));
        }
      }
    }

    // ------------------------------------------------------------------
    // UI wiring
    // ------------------------------------------------------------------
    const heroCanvas = document.getElementById('hero');
    const heroCtx = heroCanvas.getContext('2d');
    const gallery = document.getElementById('gallery');
    const hArch = document.getElementById('hArch');
    const hPal = document.getElementById('hPal');
    const hSeed = document.getElementById('hSeed');
    const seedInput = document.getElementById('seedInput');
    const galCount = document.getElementById('galCount');

    const GALLERY_SIZE = 16;
    let monsters = [];
    let selectedIdx = 0;

    function rollOne() {
      return generate(randomSeed());
    }

    function renderGallery() {
      gallery.innerHTML = '';
      monsters.forEach((m, idx) => {
        const tile = document.createElement('div');
        tile.className = 'tile' + (idx === selectedIdx ? ' selected' : '');
        const cv = document.createElement('canvas');
        cv.width = 96; cv.height = 96;
        renderTo(cv, m);
        tile.appendChild(cv);
        const lbl = document.createElement('div');
        lbl.className = 'tile-label';
        lbl.textContent = m.name;
        tile.appendChild(lbl);
        tile.addEventListener('click', (e) => {
          if (e.shiftKey) {
            monsters[idx] = rollOne();
            renderGallery();
            if (idx === selectedIdx) selectHero(idx);
          } else {
            selectHero(idx);
          }
        });
        gallery.appendChild(tile);
      });
      galCount.textContent = GALLERY_SIZE + ' bound';
    }

    function selectHero(idx) {
      selectedIdx = idx;
      const m = monsters[idx];
      renderTo(heroCanvas, m);
      hArch.textContent = m.name + ' · ' + m.arch;
      hPal.textContent = m.palName;
      hSeed.textContent = m.seed;
      seedInput.value = m.seed;
      // update tile selected styles
      document.querySelectorAll('.tile').forEach((t, i) =>
        t.classList.toggle('selected', i === idx));
    }

    function rerollAll() {
      monsters = Array.from({ length: GALLERY_SIZE }, rollOne);
      renderGallery();
      selectHero(0);
    }

    function rerollHero() {
      monsters[selectedIdx] = rollOne();
      renderGallery();
      selectHero(selectedIdx);
    }

    function downloadHero() {
      const big = document.createElement('canvas');
      big.width = 512; big.height = 512;
      const bctx = big.getContext('2d');
      bctx.imageSmoothingEnabled = false;
      bctx.drawImage(heroCanvas, 0, 0, 512, 512);
      const m = monsters[selectedIdx];
      const a = document.createElement('a');
      a.download = `pixel-bestiary-${m.name}-${m.seed}.png`;
      a.href = big.toDataURL('image/png');
      a.click();
    }

    // Buttons
    document.getElementById('randOne').addEventListener('click', rerollHero);
    document.getElementById('randAll').addEventListener('click', rerollAll);
    document.getElementById('downloadBig').addEventListener('click', downloadHero);
    document.getElementById('loadSeed').addEventListener('click', () => {
      const v = seedInput.value.trim().toUpperCase();
      if (!v) return;
      monsters[selectedIdx] = generate(v);
      renderGallery();
      selectHero(selectedIdx);
    });
    seedInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') document.getElementById('loadSeed').click();
    });

    // Keyboard
    addEventListener('keydown', (e) => {
      if (e.target && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
      if (e.key === 'r' || e.key === 'R') { rerollHero(); e.preventDefault(); }
      else if (e.key === ' ') { rerollAll(); e.preventDefault(); }
      else if (e.key === 'd' || e.key === 'D') { downloadHero(); e.preventDefault(); }
    });

    // Boot
    rerollAll();
  })();
  </script>
</body>
</html>
