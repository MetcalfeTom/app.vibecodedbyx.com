<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Market of Desire</title>
<link rel="icon" href="https://emojicdn.elk.sh/💱">
<meta property="og:title" content="Market of Desire">
<meta property="og:description" content="Watch agents trade traits in a matching market. Supply, demand, and chemistry.">
<meta property="og:url" content="https://sloppy.live/desire-market">
<meta property="og:image" content="https://emojicdn.elk.sh/💱?style=apple&size=512">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,300;0,600;1,300&family=JetBrains+Mono:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#07080e;--panel:#0b0d14;--border:#1a1c2e;--text:#c0c4d0;--dim:#4a4e60;--acc:#e8a040;--match:#44ddaa;--unmatch:#dd4466;--trait1:#4488ff;--trait2:#ff6644;--trait3:#aa44ff;--trait4:#44cc88;--trait5:#ff44aa}
html,body{height:100dvh;overflow:hidden;background:var(--bg);color:var(--text);font-family:'JetBrains Mono',monospace}
body{display:flex;flex-direction:column}
#top{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
#top h1{font-family:'Newsreader',serif;font-size:18px;font-weight:600;color:var(--acc);font-style:italic}
#top .stats{display:flex;gap:14px;font-size:11px;color:var(--dim)}
#top .stats span{color:var(--text)}
#mid{flex:1;display:flex;overflow:hidden}
canvas{flex:1;display:block;cursor:crosshair}
#side{width:240px;border-left:1px solid var(--border);background:var(--panel);padding:12px;overflow-y:auto;flex-shrink:0;font-size:11px}
#side h3{font-size:10px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin:10px 0 6px}
#side h3:first-child{margin-top:0}
.btn{font-family:'JetBrains Mono',monospace;font-size:10px;padding:5px 10px;border:1px solid var(--border);background:transparent;color:var(--dim);border-radius:4px;cursor:pointer;transition:all .15s;margin-right:4px;margin-bottom:4px}
.btn:hover{border-color:var(--acc);color:var(--acc)}
.btn.active{border-color:var(--acc);color:var(--acc);background:rgba(232,160,64,0.08)}
.ctrl{margin-bottom:8px}
.ctrl label{display:flex;justify-content:space-between;color:var(--dim);margin-bottom:2px}
.ctrl label span{color:var(--text)}
.ctrl input[type=range]{-webkit-appearance:none;width:100%;height:4px;background:var(--border);border-radius:2px;outline:none;cursor:pointer}
.ctrl input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--acc);cursor:pointer}
#market-prices{display:flex;flex-direction:column;gap:3px}
.price-row{display:flex;align-items:center;gap:6px}
.price-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.price-name{flex:1;color:var(--dim)}
.price-val{color:var(--text);font-weight:500}
.price-delta{font-size:9px}
.price-delta.up{color:var(--match)}.price-delta.down{color:var(--unmatch)}
#match-log{max-height:140px;overflow-y:auto;font-size:10px;color:var(--dim);line-height:1.8}
#match-log .match-entry{border-bottom:1px solid #111320;padding:2px 0}
#back{position:fixed;bottom:6px;right:8px;font-size:9px;opacity:0.25;color:var(--dim);text-decoration:none}
@media(max-width:600px){
  #side{width:100%;height:200px;border-left:none;border-top:1px solid var(--border)}
  #mid{flex-direction:column}
}
</style>
</head>
<body>
<div id="top">
<h1>Market of Desire</h1>
<div class="stats">
Round <span id="roundEl">0</span> &nbsp;
Agents <span id="agentEl">0</span> &nbsp;
Matched <span id="matchEl">0</span> &nbsp;
Single <span id="singleEl">0</span> &nbsp;
Gini <span id="giniEl">0</span>
</div>
</div>
<div id="mid">
<canvas id="c"></canvas>
<div id="side">
<h3>Controls</h3>
<div style="display:flex;flex-wrap:wrap">
<button class="btn active" id="playBtn">Play</button>
<button class="btn" id="fastBtn">2x</button>
<button class="btn" id="resetBtn">Reset</button>
</div>
<div class="ctrl">
<label>Agents <span id="v-pop">40</span></label>
<input type="range" min="10" max="80" value="40" id="s-pop">
</div>
<div class="ctrl">
<label>Selectiveness <span id="v-sel">50</span></label>
<input type="range" min="10" max="90" value="50" id="s-sel">
</div>
<div class="ctrl">
<label>Market Chaos <span id="v-chaos">20</span></label>
<input type="range" min="0" max="80" value="20" id="s-chaos">
</div>
<div class="ctrl">
<label>Friction <span id="v-fric">30</span></label>
<input type="range" min="0" max="90" value="30" id="s-fric">
</div>
<div class="ctrl">
<label>Signal Cost <span id="v-sig">20</span></label>
<input type="range" min="0" max="80" value="20" id="s-sig">
</div>
<h3>Trait Market Prices</h3>
<div id="market-prices"></div>
<h3>Recent Matches</h3>
<div id="match-log"></div>
</div>
</div>
<a id="back" href="https://sloppy.live">sloppy.live</a>
<script>
(function(){
var C=document.getElementById('c'),X=C.getContext('2d');
var W,H;
function resize(){W=C.width=C.clientWidth;H=C.height=C.clientHeight;}
resize();window.addEventListener('resize',resize);

var TRAITS=[
  {name:'Wit',color:'#4488ff'},
  {name:'Charm',color:'#ff6644'},
  {name:'Depth',color:'#aa44ff'},
  {name:'Drive',color:'#44cc88'},
  {name:'Spark',color:'#ff44aa'}
];

var agents=[],matches=[],prices=[1,1,1,1,1],prevPrices=[1,1,1,1,1];
var round=0,totalMatched=0,paused=false,speed=1;
var matchLog=[];

var sPop=document.getElementById('s-pop'),sSel=document.getElementById('s-sel'),sChaos=document.getElementById('s-chaos');
var sFric=document.getElementById('s-fric'),sSig=document.getElementById('s-sig');
var vPop=document.getElementById('v-pop'),vSel=document.getElementById('v-sel'),vChaos=document.getElementById('v-chaos');
var vFric=document.getElementById('v-fric'),vSig=document.getElementById('v-sig');
var playBtn=document.getElementById('playBtn'),fastBtn=document.getElementById('fastBtn'),resetBtn=document.getElementById('resetBtn');
var pricesEl=document.getElementById('market-prices');
var logEl=document.getElementById('match-log');

// Pareto distribution: most agents low, few very high
function paretoTrait(alpha){
  alpha=alpha||1.5;
  var u=Math.random();
  var raw=0.1/Math.pow(1-u,1/alpha);
  return Math.min(raw,1);
}

function makeAgent(x,y){
  var offer=[];var seek=[];
  for(var i=0;i<5;i++){offer.push(paretoTrait(1.8));seek.push(0.2+Math.random()*0.7);}
  var totalOffer=0;for(var i=0;i<5;i++)totalOffer+=offer[i];
  var status=totalOffer/5;
  return{
    x:x||50+Math.random()*(W-100),y:y||50+Math.random()*(H-100),
    vx:0,vy:0,
    offer:offer,seek:seek,
    matched:false,partner:null,
    matchTimer:0,
    value:0,
    status:status,
    energy:1,
    signal:status*0.5+0.3,
    evals:0,
    id:Math.floor(Math.random()*9000+1000)
  };
}

function init(){
  agents=[];matches=[];round=0;totalMatched=0;matchLog=[];
  prices=[1,1,1,1,1];prevPrices=[1,1,1,1,1];
  var n=+sPop.value;
  for(var i=0;i<n;i++)agents.push(makeAgent());
  renderPrices();
}

function agentValue(a){
  var v=0;
  for(var i=0;i<5;i++)v+=a.offer[i]*prices[i];
  return v;
}

function compatibility(a,b){
  // how well b's offer matches a's seek, weighted by market prices
  var score=0;
  for(var i=0;i<5;i++){
    var match=1-Math.abs(a.seek[i]-b.offer[i]);
    score+=match*prices[i];
  }
  return score/5;
}

function tryMatch(){
  var sel=+sSel.value/100;
  var friction=+sFric.value/100;
  var sigCost=+sSig.value/100;
  var singles=agents.filter(function(a){return !a.matched&&a.energy>0.05;});
  if(singles.length<2)return;

  // pick random agent
  var a=singles[Math.floor(Math.random()*singles.length)];
  // friction: limit evaluations per round based on friction slider
  var maxEvals=Math.max(2,Math.floor(singles.length*(1-friction)));
  var candidates=[];
  // proximity filter: agents can only evaluate nearby agents (friction gates range)
  var searchRadius=Math.max(60,Math.min(W,H)*(1-friction*0.7));
  for(var i=0;i<singles.length;i++){
    var b=singles[i];
    if(b===a)continue;
    var dx=b.x-a.x,dy=b.y-a.y;
    var dist=Math.sqrt(dx*dx+dy*dy);
    // only consider agents within search radius, weighted by their signal strength
    if(dist<searchRadius+b.signal*80)candidates.push(b);
  }
  // limit evaluations
  while(candidates.length>maxEvals){
    candidates.splice(Math.floor(Math.random()*candidates.length),1);
  }
  a.evals=candidates.length;

  var bestB=null,bestScore=-1;
  for(var i=0;i<candidates.length;i++){
    var b=candidates[i];
    var abScore=compatibility(a,b);
    var baScore=compatibility(b,a);
    var mutual=Math.min(abScore,baScore);
    // signal boost: high signal agents appear more attractive
    mutual*=(0.7+b.signal*0.3);
    if(mutual>bestScore){bestScore=mutual;bestB=b;}
  }

  // signaling drains energy each round
  a.energy-=a.signal*sigCost*0.02;
  a.energy=Math.max(0,a.energy);

  if(bestB&&bestScore>sel){
    a.matched=true;var b=bestB;b.matched=true;
    a.partner=b;b.partner=a;
    a.matchTimer=200;b.matchTimer=200;
    matches.push({a:a,b:b,score:bestScore});
    totalMatched+=2;
    matchLog.unshift('#'+a.id+' + #'+b.id+' ('+bestScore.toFixed(2)+')');
    if(matchLog.length>15)matchLog.pop();
    for(var i=0;i<5;i++){
      var demand=(a.seek[i]+b.seek[i])/2;
      var supply=(a.offer[i]+b.offer[i])/2;
      prices[i]+=(demand-supply)*0.02;
      prices[i]=Math.max(0.2,Math.min(3,prices[i]));
    }
  }
}

function marketChaos(){
  var chaos=+sChaos.value/100;
  for(var i=0;i<5;i++){
    prices[i]+=(Math.random()-0.5)*chaos*0.1;
    prices[i]=Math.max(0.2,Math.min(3,prices[i]));
  }
}

function step(){
  round++;
  // unmatched agents wander toward each other
  var singles=agents.filter(function(a){return !a.matched;});
  for(var i=0;i<singles.length;i++){
    var a=singles[i];
    a.value=agentValue(a);
    // seek compatible
    var best=null,bd=Infinity;
    for(var j=0;j<singles.length;j++){
      if(i===j)continue;
      var dx=singles[j].x-a.x,dy=singles[j].y-a.y;
      var d=Math.sqrt(dx*dx+dy*dy);
      var compat=compatibility(a,singles[j]);
      var attract=d/(compat+0.1);
      if(attract<bd){bd=attract;best=singles[j];}
    }
    if(best){
      var dx=best.x-a.x,dy=best.y-a.y;
      var dl=Math.sqrt(dx*dx+dy*dy);
      if(dl>3){a.vx+=(dx/dl)*0.3;a.vy+=(dy/dl)*0.3;}
    }
    a.vx+=(Math.random()-0.5)*0.4;
    a.vy+=(Math.random()-0.5)*0.4;
    a.vx*=0.92;a.vy*=0.92;
    a.x+=a.vx;a.y+=a.vy;
    a.x=Math.max(10,Math.min(W-10,a.x));
    a.y=Math.max(10,Math.min(H-10,a.y));
  }

  // matched pairs drift together
  for(var i=0;i<agents.length;i++){
    var a=agents[i];
    if(a.matched&&a.partner){
      var dx=a.partner.x-a.x,dy=a.partner.y-a.y;
      a.vx+=(dx)*0.01;a.vy+=(dy)*0.01;
      a.vx*=0.95;a.vy*=0.95;
      a.x+=a.vx;a.y+=a.vy;
      a.x=Math.max(10,Math.min(W-10,a.x));
      a.y=Math.max(10,Math.min(H-10,a.y));
      a.matchTimer--;
      // some matches break
      if(a.matchTimer<=0&&Math.random()<0.05){
        a.matched=false;a.partner.matched=false;
        a.partner.partner=null;a.partner=null;
      }
    }
  }

  // signal cost: unmatched agents drain energy from signaling
  var sigCost=+sSig.value/100;
  for(var i=0;i<agents.length;i++){
    var a=agents[i];
    if(!a.matched){
      a.energy-=a.signal*sigCost*0.005;
      a.energy=Math.max(0,a.energy);
      // low energy agents reduce signal
      if(a.energy<0.3)a.signal=Math.max(0.05,a.signal*0.98);
      // slow energy regen
      a.energy=Math.min(1,a.energy+0.002);
    }else{
      a.energy=Math.min(1,a.energy+0.01);
    }
  }

  // attempt matches
  for(var i=0;i<3;i++)tryMatch();

  // market chaos
  if(round%10===0)marketChaos();

  // maintain population
  var target=+sPop.value;
  while(agents.length<target)agents.push(makeAgent());

  // save prev prices and compute gini
  if(round%30===0){
    for(var i=0;i<5;i++)prevPrices[i]=prices[i];
    renderPrices();
    computeGini();
  }
}

function computeGini(){
  var vals=agents.map(function(a){return a.status;}).sort(function(a,b){return a-b;});
  var n=vals.length;if(n<2){document.getElementById('giniEl').textContent='0';return;}
  var sum=0,cumSum=0;
  for(var i=0;i<n;i++){sum+=vals[i];cumSum+=(i+1)*vals[i];}
  var gini=(2*cumSum)/(n*sum)-(n+1)/n;
  document.getElementById('giniEl').textContent=gini.toFixed(2);
}

function renderPrices(){
  var html='';
  for(var i=0;i<5;i++){
    var delta=prices[i]-prevPrices[i];
    var cls=delta>0.01?'up':delta<-0.01?'down':'';
    var arrow=delta>0.01?'\u25B2':delta<-0.01?'\u25BC':'\u25C6';
    html+='<div class="price-row"><div class="price-dot" style="background:'+TRAITS[i].color+'"></div>'
      +'<span class="price-name">'+TRAITS[i].name+'</span>'
      +'<span class="price-val">'+prices[i].toFixed(2)+'</span>'
      +'<span class="price-delta '+cls+'">'+arrow+'</span></div>';
  }
  pricesEl.innerHTML=html;
}

function renderLog(){
  var html='';
  for(var i=0;i<matchLog.length;i++){
    html+='<div class="match-entry">'+matchLog[i]+'</div>';
  }
  logEl.innerHTML=html;
}

function dominantTrait(arr){
  var mx=0,mi=0;
  for(var i=0;i<arr.length;i++){if(arr[i]>mx){mx=arr[i];mi=i;}}
  return mi;
}

function draw(){
  X.fillStyle='#07080e';X.fillRect(0,0,W,H);
  // grid
  X.strokeStyle='#0c0e18';X.lineWidth=1;
  for(var x=0;x<W;x+=80){X.beginPath();X.moveTo(x,0);X.lineTo(x,H);X.stroke();}
  for(var y=0;y<H;y+=80){X.beginPath();X.moveTo(0,y);X.lineTo(W,y);X.stroke();}

  // match lines
  var drawn={};
  for(var i=0;i<agents.length;i++){
    var a=agents[i];
    if(a.matched&&a.partner&&!drawn[a.id]){
      X.strokeStyle='rgba(68,221,170,0.2)';X.lineWidth=1;
      X.beginPath();X.moveTo(a.x,a.y);X.lineTo(a.partner.x,a.partner.y);X.stroke();
      drawn[a.id]=true;drawn[a.partner.id]=true;
    }
  }

  // agents
  for(var i=0;i<agents.length;i++){
    var a=agents[i];
    var dt=dominantTrait(a.offer);
    var col=TRAITS[dt].color;
    // radius scales with status (Pareto makes this vary a lot)
    var r=a.matched?4+a.status*4:3+a.status*3;

    // signal radius ring (how far this agent broadcasts)
    if(!a.matched&&a.signal>0.15){
      X.strokeStyle=col;X.globalAlpha=a.signal*0.06;X.lineWidth=0.5;
      X.beginPath();X.arc(a.x,a.y,10+a.signal*30,0,Math.PI*2);X.stroke();
      X.globalAlpha=1;
    }

    // glow for matched
    if(a.matched){
      X.fillStyle='rgba(68,221,170,0.08)';
      X.beginPath();X.arc(a.x,a.y,14,0,Math.PI*2);X.fill();
    }

    // energy indicator: dimmer when low energy
    var alpha=a.matched?0.9:0.3+a.energy*0.5;
    X.fillStyle=col;
    X.globalAlpha=alpha;
    X.beginPath();X.arc(a.x,a.y,r,0,Math.PI*2);X.fill();
    X.globalAlpha=1;

    // seeking ring — shows what they want
    var seekDom=dominantTrait(a.seek);
    if(!a.matched){
      X.strokeStyle=TRAITS[seekDom].color;X.globalAlpha=0.12;X.lineWidth=1;
      X.setLineDash([3,3]);
      X.beginPath();X.arc(a.x,a.y,8+a.status*6,0,Math.PI*2);X.stroke();
      X.setLineDash([]);X.globalAlpha=1;
    }
  }

  // update HUD
  var singles=agents.filter(function(a){return !a.matched;}).length;
  document.getElementById('roundEl').textContent=round;
  document.getElementById('agentEl').textContent=agents.length;
  document.getElementById('matchEl').textContent=agents.length-singles;
  document.getElementById('singleEl').textContent=singles;

  if(round%30===0)renderLog();
}

sPop.addEventListener('input',function(){vPop.textContent=this.value;});
sSel.addEventListener('input',function(){vSel.textContent=this.value;});
sChaos.addEventListener('input',function(){vChaos.textContent=this.value;});
sFric.addEventListener('input',function(){vFric.textContent=this.value;});
sSig.addEventListener('input',function(){vSig.textContent=this.value;});

playBtn.addEventListener('click',function(){
  paused=!paused;
  this.textContent=paused?'Play':'Pause';
  this.classList.toggle('active',!paused);
});
fastBtn.addEventListener('click',function(){
  speed=speed===1?2:speed===2?4:1;
  this.textContent=speed+'x';
  this.classList.toggle('active',speed>1);
});
resetBtn.addEventListener('click',function(){init();});

function loop(){
  if(!paused){for(var i=0;i<speed;i++)step();}
  draw();
  requestAnimationFrame(loop);
}
init();loop();
})();
</script>
</body>
</html>
