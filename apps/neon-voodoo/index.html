<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Voodoo</title>
<link rel="icon" href="https://emojicdn.elk.sh/🪡">
<meta property="og:title" content="Neon Voodoo">
<meta property="og:description" content="Pin your bad luck to a neon voodoo doll. Release it. Feel better.">
<meta property="og:url" content="https://app.sloppy.live/neon-voodoo/">
<meta property="og:image" content="https://emojicdn.elk.sh/🪡?style=google">
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
:root{--purple:#b000ff;--pink:#ff0080;--cyan:#00ffe0;--green:#39ff14;--bg:#08060e}
html,body{height:100%;overflow:hidden;touch-action:none}
body{
background:var(--bg);
display:flex;flex-direction:column;align-items:center;
font-family:'Share Tech Mono',monospace;
color:#c0b0d0;
}
body::before{
content:'';position:fixed;inset:0;pointer-events:none;
background:radial-gradient(ellipse at 50% 40%,rgba(176,0,255,0.06),transparent 60%);
}
header{
padding:16px 0 8px;text-align:center;z-index:5;
}
header h1{
font-family:'Creepster',cursive;
font-size:clamp(28px,8vw,44px);
color:var(--purple);
text-shadow:0 0 15px rgba(176,0,255,0.6),0 0 40px rgba(176,0,255,0.3),2px 2px 0 #2a0040;
letter-spacing:4px;
}
.sub{font-size:10px;color:#4a3060;letter-spacing:3px;margin-top:2px}
canvas{display:block;z-index:1;cursor:crosshair;flex:1}
.toolbar{
position:fixed;bottom:0;left:0;right:0;
background:rgba(8,6,14,0.9);
border-top:1px solid #1a1028;
padding:8px 12px;
display:flex;gap:8px;align-items:center;justify-content:center;
z-index:10;
flex-wrap:wrap;
}
.tool-btn{
padding:8px 14px;
background:#12101a;
border:1px solid #2a2040;
color:#8a70a0;
font-family:'Share Tech Mono',monospace;
font-size:11px;cursor:pointer;
transition:all 0.15s;
letter-spacing:1px;
}
.tool-btn:hover{border-color:var(--purple);color:var(--purple)}
.tool-btn:active{transform:scale(0.95)}
.tool-btn.active{
border-color:var(--purple);color:var(--purple);
box-shadow:0 0 8px rgba(176,0,255,0.3);
}
.pin-count{
font-size:10px;color:#4a3060;
}
.pin-count span{color:var(--pink);font-weight:700}
#bad-luck-input{
position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
display:none;z-index:20;
background:#0e0a18;border:2px solid var(--purple);
padding:20px;width:min(320px,90vw);
box-shadow:0 0 30px rgba(176,0,255,0.2);
text-align:center;
}
#bad-luck-input.show{display:block}
#bad-luck-input label{
font-family:'Creepster',cursive;font-size:18px;
color:var(--purple);display:block;margin-bottom:10px;
letter-spacing:2px;
}
#bad-luck-input input{
width:100%;padding:10px;
background:#14101e;border:1px solid #2a2040;
color:var(--cyan);font-family:'Share Tech Mono',monospace;
font-size:14px;outline:none;text-align:center;
}
#bad-luck-input input::placeholder{color:#3a2850}
#bad-luck-input input:focus{border-color:var(--cyan)}
#bad-luck-input .hint{font-size:9px;color:#3a2850;margin-top:8px}
.overlay-dim{
position:fixed;inset:0;background:rgba(0,0,0,0.6);
display:none;z-index:15;
}
.overlay-dim.show{display:block}
</style>
</head>
<body>
<header>
<h1>NEON VOODOO</h1>
<div class="sub">PIN YOUR BAD LUCK</div>
</header>
<canvas id="c"></canvas>
<div class="toolbar">
<button class="tool-btn active" id="btn-pin" onclick="setTool('pin')">PIN</button>
<button class="tool-btn" id="btn-remove" onclick="setTool('remove')">REMOVE</button>
<button class="tool-btn" onclick="clearAll()">CLEAR ALL</button>
<button class="tool-btn" onclick="banish()">BANISH</button>
<span class="pin-count">PINS: <span id="pin-count">0</span></span>
</div>
<div class="overlay-dim" id="overlay-dim"></div>
<div id="bad-luck-input">
<label>What bad luck?</label>
<input id="luck-text" type="text" placeholder="traffic, mondays, bugs..." maxlength="40" autocomplete="off">
<div class="hint">PRESS ENTER TO PIN IT</div>
</div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H,dollX,dollY,dollScale;
let pins=[],particles=[],tool='pin',pendingPin=null;
let audioCtx,wobble=0,glowPhase=0;

const PIN_COLORS=['#ff0080','#00ffe0','#39ff14','#ffe100','#ff4400','#b000ff','#00aaff','#ff6090'];
const BAD_LUCKS=['bad wifi','mondays','taxes','mosquitoes','lag','rain','cold coffee','flat tires','bugs','alarm clocks','papercuts','slow loading','traffic','deadlines','hiccups','stubbed toes'];

function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}

function sfx(type){
  initAudio();const t=audioCtx.currentTime;
  if(type==='pin'){
    // Sharp stab
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='sawtooth';o.frequency.setValueAtTime(2000,t);o.frequency.exponentialRampToValueAtTime(200,t+0.08);
    g.gain.setValueAtTime(0.1,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.1);
    o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+0.1);
    // Impact
    const o2=audioCtx.createOscillator(),g2=audioCtx.createGain();
    o2.type='sine';o2.frequency.value=80;
    g2.gain.setValueAtTime(0.08,t);g2.gain.exponentialRampToValueAtTime(0.001,t+0.06);
    o2.connect(g2);g2.connect(audioCtx.destination);o2.start(t);o2.stop(t+0.06);
  }else if(type==='remove'){
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='triangle';o.frequency.setValueAtTime(800,t);o.frequency.exponentialRampToValueAtTime(400,t+0.1);
    g.gain.setValueAtTime(0.06,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.1);
    o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+0.1);
  }else if(type==='banish'){
    [200,300,500,800,1200].forEach((f,i)=>{
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type='sawtooth';o.frequency.value=f;
      g.gain.setValueAtTime(0.06,t+i*0.08);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.08+0.2);
      const fl=audioCtx.createBiquadFilter();fl.type='bandpass';fl.frequency.value=f;fl.Q.value=3;
      o.connect(fl);fl.connect(g);g.connect(audioCtx.destination);o.start(t+i*0.08);o.stop(t+i*0.08+0.2);
    });
  }else if(type==='wobble'){
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='sine';o.frequency.setValueAtTime(150,t);o.frequency.exponentialRampToValueAtTime(100,t+0.15);
    g.gain.setValueAtTime(0.03,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.15);
    o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+0.15);
  }
}

function resize(){
  W=C.width=window.innerWidth;
  H=C.height=window.innerHeight-100;
  dollScale=Math.min(W/400,H/500)*0.85;
  dollX=W/2;dollY=H*0.45;
}
window.addEventListener('resize',resize);
resize();

// Doll body parts (relative coords, scaled)
function dollParts(){
  const s=dollScale;
  return{
    head:{cx:0,cy:-90*s,rx:28*s,ry:32*s},
    body:{cx:0,cy:-20*s,rx:35*s,ry:55*s},
    leftArm:{x1:-35*s,y1:-50*s,x2:-65*s,y2:10*s,w:12*s},
    rightArm:{x1:35*s,y1:-50*s,x2:65*s,y2:10*s,w:12*s},
    leftLeg:{x1:-15*s,y1:30*s,x2:-25*s,y2:95*s,w:14*s},
    rightLeg:{x1:15*s,y1:30*s,x2:25*s,y2:95*s,w:14*s},
  };
}

function isOnDoll(mx,my){
  const p=dollParts();
  const rx=mx-dollX,ry=my-dollY;
  // Head
  if((rx-p.head.cx)**2/p.head.rx**2+(ry-p.head.cy)**2/p.head.ry**2<=1)return true;
  // Body
  if((rx-p.body.cx)**2/p.body.rx**2+(ry-p.body.cy)**2/p.body.ry**2<=1)return true;
  // Limbs (simple rect check)
  function onLimb(l){
    const dx=l.x2-l.x1,dy=l.y2-l.y1;
    const len=Math.sqrt(dx*dx+dy*dy);
    const nx=-dy/len,ny=dx/len;
    const px=rx-l.x1,py=ry-l.y1;
    const along=(px*dx+py*dy)/(len*len);
    const across=px*nx+py*ny;
    return along>=0&&along<=1&&Math.abs(across)<l.w;
  }
  if(onLimb(p.leftArm)||onLimb(p.rightArm)||onLimb(p.leftLeg)||onLimb(p.rightLeg))return true;
  return false;
}

function drawDoll(){
  const p=dollParts();
  const s=dollScale;
  X.save();
  X.translate(dollX,dollY);

  // Wobble when pins are placed
  const w=Math.sin(wobble*0.3)*wobble*0.5;
  X.rotate(w*0.02);
  wobble*=0.92;

  // Glow aura
  const glow=0.15+0.05*Math.sin(glowPhase);
  X.shadowColor='rgba(176,0,255,'+glow+')';X.shadowBlur=30*s;

  // Stitch texture color
  const fabric='#2a1838';
  const stitch='#4a2860';

  // Limbs
  X.lineCap='round';X.lineWidth=p.leftArm.w;
  X.strokeStyle=fabric;
  [[p.leftArm],[p.rightArm],[p.leftLeg],[p.rightLeg]].forEach(([l])=>{
    X.beginPath();X.moveTo(l.x1,l.y1);X.lineTo(l.x2,l.y2);X.stroke();
    // Stitch lines
    X.strokeStyle=stitch;X.lineWidth=1;
    const dx=l.x2-l.x1,dy=l.y2-l.y1;
    const len=Math.sqrt(dx*dx+dy*dy);
    for(let i=0;i<len;i+=8*s){
      const t=i/len;
      const sx=l.x1+dx*t,sy=l.y1+dy*t;
      const nx=-dy/len*4*s,ny=dx/len*4*s;
      X.beginPath();X.moveTo(sx-nx,sy-ny);X.lineTo(sx+nx,sy+ny);X.stroke();
    }
    X.strokeStyle=fabric;X.lineWidth=p.leftArm.w;
  });

  X.shadowBlur=0;

  // Body
  X.fillStyle=fabric;
  X.beginPath();X.ellipse(p.body.cx,p.body.cy,p.body.rx,p.body.ry,0,0,Math.PI*2);X.fill();
  // Body stitches
  X.strokeStyle=stitch;X.lineWidth=1;
  X.beginPath();X.moveTo(p.body.cx,p.body.cy-p.body.ry);X.lineTo(p.body.cx,p.body.cy+p.body.ry);X.stroke();
  for(let i=-40;i<=40;i+=10){
    const y=i*s;
    const xr=p.body.rx*Math.sqrt(1-(y/p.body.ry)**2)||0;
    X.beginPath();X.moveTo(-3*s,p.body.cy+y);X.lineTo(3*s,p.body.cy+y);X.stroke();
  }

  // Head
  X.fillStyle=fabric;
  X.beginPath();X.ellipse(p.head.cx,p.head.cy,p.head.rx,p.head.ry,0,0,Math.PI*2);X.fill();
  // Cross stitch eyes
  X.strokeStyle='#b000ff';X.lineWidth=2*s;
  X.shadowColor='rgba(176,0,255,0.5)';X.shadowBlur=6;
  [-12,12].forEach(ex=>{
    const ey=p.head.cy-4*s;
    const es=6*s;
    X.beginPath();X.moveTo(ex*s-es,ey-es);X.lineTo(ex*s+es,ey+es);X.stroke();
    X.beginPath();X.moveTo(ex*s+es,ey-es);X.lineTo(ex*s-es,ey+es);X.stroke();
  });
  X.shadowBlur=0;
  // Stitched mouth
  X.strokeStyle=stitch;X.lineWidth=1.5*s;
  X.beginPath();
  const my=p.head.cy+12*s;
  for(let i=0;i<5;i++){
    const mx2=-10*s+i*5*s;
    X.moveTo(mx2,my);X.lineTo(mx2+3*s,my+(i%2?-3:3)*s);
  }
  X.stroke();

  // Heart on body
  X.fillStyle='rgba(255,0,128,0.3)';
  X.shadowColor='rgba(255,0,128,0.4)';X.shadowBlur=8;
  const hx=0,hy=p.body.cy-10*s,hs=6*s;
  X.beginPath();
  X.moveTo(hx,hy+hs);
  X.bezierCurveTo(hx-hs*1.5,hy-hs,hx-hs*0.5,hy-hs*1.8,hx,hy-hs*0.6);
  X.bezierCurveTo(hx+hs*0.5,hy-hs*1.8,hx+hs*1.5,hy-hs,hx,hy+hs);
  X.fill();
  X.shadowBlur=0;

  // Draw pins
  pins.forEach(pin=>{
    drawPin(pin.rx,pin.ry,pin.color,pin.label);
  });

  X.restore();
}

function drawPin(rx,ry,color,label){
  const s=dollScale;
  // Pin shaft
  X.strokeStyle='#888';X.lineWidth=1.5;
  X.beginPath();X.moveTo(rx,ry);X.lineTo(rx+3*s,ry-18*s);X.stroke();
  // Pin head (glowing sphere)
  X.beginPath();X.arc(rx+3*s,ry-20*s,4*s,0,Math.PI*2);
  X.fillStyle=color;X.fill();
  X.shadowColor=color;X.shadowBlur=10;
  X.fill();
  X.shadowBlur=0;
  // Label
  if(label){
    X.font=`${Math.max(8,9*s)}px 'Share Tech Mono',monospace`;
    X.fillStyle=color;
    X.globalAlpha=0.7;
    X.textAlign='center';
    X.fillText(label,rx,ry-26*s);
    X.globalAlpha=1;
  }
}

function spawnParticles(x,y,color,count){
  for(let i=0;i<count;i++){
    particles.push({
      x:dollX+x,y:dollY+y,
      vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4-1,
      life:20+Math.random()*20,color,size:1+Math.random()*2,
    });
  }
}

function drawParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life--;
    X.globalAlpha=Math.min(1,p.life/15);
    X.fillStyle=p.color;
    X.shadowColor=p.color;X.shadowBlur=4;
    X.fillRect(p.x,p.y,p.size,p.size);
    if(p.life<=0)particles.splice(i,1);
  }
  X.globalAlpha=1;X.shadowBlur=0;
}

function drawBackground(){
  // Subtle occult circle
  X.save();
  X.translate(dollX,dollY+10);
  X.strokeStyle='rgba(176,0,255,0.04)';X.lineWidth=1;
  const r=140*dollScale;
  X.beginPath();X.arc(0,0,r,0,Math.PI*2);X.stroke();
  X.beginPath();X.arc(0,0,r+10*dollScale,0,Math.PI*2);X.stroke();
  // Pentagram
  X.strokeStyle='rgba(176,0,255,0.03)';
  for(let i=0;i<5;i++){
    const a1=i*Math.PI*2/5-Math.PI/2;
    const a2=((i+2)%5)*Math.PI*2/5-Math.PI/2;
    X.beginPath();
    X.moveTo(Math.cos(a1)*r,Math.sin(a1)*r);
    X.lineTo(Math.cos(a2)*r,Math.sin(a2)*r);
    X.stroke();
  }
  // Rotating runes
  X.font=`${10*dollScale}px serif`;X.fillStyle='rgba(176,0,255,0.05)';
  const runes='ᚠᚢᚦᚨᚱᚲᚷᚹᚺᚾᛁᛃ';
  for(let i=0;i<12;i++){
    const a=i*Math.PI*2/12+glowPhase*0.1;
    X.fillText(runes[i],Math.cos(a)*(r+20*dollScale),Math.sin(a)*(r+20*dollScale));
  }
  X.restore();
}

// Input handling
function handleClick(mx,my){
  if(tool==='pin'){
    if(isOnDoll(mx,my)){
      pendingPin={rx:mx-dollX,ry:my-dollY,color:PIN_COLORS[Math.floor(Math.random()*PIN_COLORS.length)]};
      showInput();
    }
  }else if(tool==='remove'){
    // Find nearest pin
    let best=-1,bestD=Infinity;
    pins.forEach((p,i)=>{
      const d=Math.hypot(mx-dollX-p.rx,my-dollY-p.ry);
      if(d<bestD){bestD=d;best=i}
    });
    if(best>=0&&bestD<30*dollScale){
      const p=pins[best];
      spawnParticles(p.rx,p.ry,p.color,8);
      pins.splice(best,1);
      sfx('remove');
      updateCount();
    }
  }
}

C.addEventListener('click',e=>{
  const rect=C.getBoundingClientRect();
  handleClick(e.clientX-rect.left,e.clientY-rect.top);
});
C.addEventListener('touchstart',e=>{
  e.preventDefault();
  const rect=C.getBoundingClientRect();
  const t=e.touches[0];
  handleClick(t.clientX-rect.left,t.clientY-rect.top);
},{passive:false});

function showInput(){
  document.getElementById('bad-luck-input').classList.add('show');
  document.getElementById('overlay-dim').classList.add('show');
  const input=document.getElementById('luck-text');
  input.value='';
  input.placeholder=BAD_LUCKS[Math.floor(Math.random()*BAD_LUCKS.length)]+'...';
  setTimeout(()=>input.focus(),50);
}

function hideInput(){
  document.getElementById('bad-luck-input').classList.remove('show');
  document.getElementById('overlay-dim').classList.remove('show');
}

document.getElementById('luck-text').addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    const text=e.target.value.trim()||e.target.placeholder.replace('...','');
    if(pendingPin){
      pendingPin.label=text.substring(0,20);
      pins.push(pendingPin);
      spawnParticles(pendingPin.rx,pendingPin.ry,pendingPin.color,12);
      wobble=8;
      sfx('pin');
      sfx('wobble');
      pendingPin=null;
      updateCount();
    }
    hideInput();
  }else if(e.key==='Escape'){
    pendingPin=null;hideInput();
  }
});
document.getElementById('overlay-dim').addEventListener('click',()=>{pendingPin=null;hideInput()});

function setTool(t){
  tool=t;
  document.getElementById('btn-pin').classList.toggle('active',t==='pin');
  document.getElementById('btn-remove').classList.toggle('active',t==='remove');
  C.style.cursor=t==='pin'?'crosshair':'pointer';
}

function clearAll(){
  pins.forEach(p=>spawnParticles(p.rx,p.ry,p.color,6));
  pins=[];
  sfx('remove');
  updateCount();
}

function banish(){
  if(pins.length===0)return;
  sfx('banish');
  // Epic particle explosion
  pins.forEach(p=>{
    for(let i=0;i<20;i++){
      particles.push({
        x:dollX+p.rx,y:dollY+p.ry,
        vx:(Math.random()-0.5)*8,vy:(Math.random()-0.5)*8-3,
        life:30+Math.random()*30,color:p.color,size:1+Math.random()*3,
      });
    }
  });
  // Float labels up
  pins.forEach(p=>{
    for(let i=0;i<5;i++){
      particles.push({
        x:dollX+p.rx+(Math.random()-0.5)*20,y:dollY+p.ry,
        vx:(Math.random()-0.5)*2,vy:-2-Math.random()*3,
        life:40+Math.random()*20,color:'rgba(176,0,255,0.5)',size:1,
      });
    }
  });
  wobble=15;
  pins=[];
  updateCount();
}

function updateCount(){
  document.getElementById('pin-count').textContent=pins.length;
}

function draw(){
  X.clearRect(0,0,W,H);
  glowPhase+=0.02;
  drawBackground();
  drawDoll();
  drawParticles();
  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
