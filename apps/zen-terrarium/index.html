<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zen Terrarium</title>
<link rel="icon" href="https://emojicdn.elk.sh/🪴">
<meta property="og:title" content="Zen Terrarium">
<meta property="og:description" content="Watch moss slowly claim brutalist concrete. Nothing happens fast. That's the point.">
<meta property="og:url" content="https://app.sloppy.live/zen-terrarium/">
<meta property="og:image" content="https://emojicdn.elk.sh/🪴?style=apple&size=512">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;background:#1a1a1a;display:flex;flex-direction:column;
  align-items:center;justify-content:center;overflow:hidden;cursor:crosshair}
canvas{display:block;image-rendering:pixelated;image-rendering:crisp-edges}
#ui{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:10;
  display:flex;gap:16px;align-items:center;opacity:0.4;transition:opacity 0.5s}
#ui:hover{opacity:0.8}
.tool{cursor:pointer;width:36px;height:36px;border-radius:50%;
  border:1.5px solid #555;background:#2a2a2a;display:flex;align-items:center;
  justify-content:center;font-size:0.9rem;transition:all 0.2s}
.tool:hover{border-color:#888;background:#333}
.tool.active{border-color:#6a9a5a;background:#2a3a25;box-shadow:0 0 12px rgba(100,160,80,0.2)}
#info{position:fixed;top:16px;left:50%;transform:translateX(-50%);z-index:10;
  font-family:'Cormorant Garamond',serif;font-size:clamp(0.8rem,2vw,1rem);
  color:#555;font-weight:300;font-style:italic;letter-spacing:0.05em;
  text-align:center;pointer-events:none;opacity:0.6;transition:opacity 2s}
#time{position:fixed;top:40px;left:50%;transform:translateX(-50%);z-index:10;
  font-family:'Cormorant Garamond',serif;font-size:0.7rem;color:#444;
  font-weight:300;letter-spacing:0.15em;pointer-events:none;opacity:0.4}
#backlink a{color:#6a9a5a;text-decoration:none}
</style>
</head>
<body>
<div id="info">click to place water. moss will find its way.</div>
<div id="time"></div>
<canvas id="c"></canvas>
<div id="ui">
  <div class="tool active" data-tool="water" title="Water">💧</div>
  <div class="tool" data-tool="stone" title="Place stone">🪨</div>
  <div class="tool" data-tool="seed" title="Moss seed">🌱</div>
  <div class="tool" data-tool="light" title="Sunlight">☀️</div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const infoEl = document.getElementById('info');
const timeEl = document.getElementById('time');

const PX = 3;
let W, H, GW, GH;
function resize(){
  W = innerWidth; H = innerHeight;
  canvas.width = GW = Math.floor(W/PX);
  canvas.height = GH = Math.floor(H/PX);
  canvas.style.width = GW*PX+'px';
  canvas.style.height = GH*PX+'px';
}
resize();
window.addEventListener('resize', resize);

// Grid layers
let stone, moisture, moss, light, soil;
// stone: 0=empty, 1-4=concrete density
// moisture: 0-255
// moss: 0=none, 1-255=growth stage
// light: 0-255 brightness
// soil: 0=none, 1=soil

function initGrid(){
  const len = GW*GH;
  stone = new Uint8Array(len);
  moisture = new Uint8Array(len);
  moss = new Uint8Array(len);
  light = new Uint8Array(len);
  soil = new Uint8Array(len);

  // Ground soil
  for(let x=0;x<GW;x++){
    const groundY = Math.floor(GH*0.75 + Math.sin(x*0.03)*GH*0.03 + Math.sin(x*0.07)*GH*0.015);
    for(let y=groundY;y<GH;y++){
      const i=y*GW+x;
      soil[i]=1;
      moisture[i]=30+Math.floor(Math.random()*20);
    }
  }

  // Concrete slabs — brutalist arrangement
  placeSlab(GW*0.15, GH*0.5, GW*0.18, GH*0.3, 3);
  placeSlab(GW*0.45, GH*0.35, GW*0.12, GH*0.42, 4);
  placeSlab(GW*0.7, GH*0.55, GW*0.2, GH*0.22, 2);
  placeSlab(GW*0.3, GH*0.68, GW*0.35, GH*0.06, 3);
  placeSlab(GW*0.55, GH*0.28, GW*0.06, GH*0.15, 4);
  placeSlab(GW*0.08, GH*0.42, GW*0.08, GH*0.06, 2);
  placeSlab(GW*0.82, GH*0.4, GW*0.1, GH*0.35, 3);

  // Initial moss seeds at slab edges
  for(let x=0;x<GW;x++){
    for(let y=0;y<GH;y++){
      const i=y*GW+x;
      if(stone[i]>0 && Math.random()<0.01){
        // Check if edge
        const hasEmpty = (x>0&&stone[i-1]===0)||(x<GW-1&&stone[i+1]===0)||
          (y>0&&stone[i-GW]===0)||(y<GH-1&&stone[i+GW]===0);
        if(hasEmpty) moss[i]=1+Math.floor(Math.random()*10);
      }
    }
  }

  // Ambient light from top
  updateLight();
}

function placeSlab(sx,sy,sw,sh,density){
  sx=Math.floor(sx);sy=Math.floor(sy);sw=Math.floor(sw);sh=Math.floor(sh);
  for(let y=sy;y<sy+sh&&y<GH;y++){
    for(let x=sx;x<sx+sw&&x<GW;x++){
      if(x<0||y<0)continue;
      const i=y*GW+x;
      stone[i]=density;
      soil[i]=0;
    }
  }
}

function updateLight(){
  // Simple top-down light with shadow from stones
  for(let x=0;x<GW;x++){
    let brightness=220+Math.floor(Math.random()*20);
    for(let y=0;y<GH;y++){
      const i=y*GW+x;
      if(stone[i]>0) brightness=Math.max(20,brightness-40);
      else brightness=Math.min(240,brightness+2);
      light[i]=brightness;
    }
  }
  // Light spots
  for(const spot of lightSpots){
    const r=spot.r;
    for(let dy=-r;dy<=r;dy++){
      for(let dx=-r;dx<=r;dx++){
        const dist=Math.sqrt(dx*dx+dy*dy);
        if(dist>r)continue;
        const px=Math.floor(spot.x/PX)+dx;
        const py=Math.floor(spot.y/PX)+dy;
        if(px<0||px>=GW||py<0||py>=GH)continue;
        const i=py*GW+px;
        const add=Math.floor((1-dist/r)*80);
        light[i]=Math.min(255,light[i]+add);
      }
    }
  }
}

let lightSpots=[];

// Moss growth simulation
let simTick=0;
let totalMoss=0;
let growthAge=0;

function simStep(){
  simTick++;
  growthAge+=0.1;
  totalMoss=0;

  // Moisture spreads
  if(simTick%3===0){
    for(let y=1;y<GH-1;y++){
      for(let x=1;x<GW-1;x++){
        const i=y*GW+x;
        if(moisture[i]>5){
          // Spread to neighbors with less moisture
          const dirs=[i-1,i+1,i-GW,i+GW];
          for(const ni of dirs){
            if(stone[ni]===0||stone[ni]<3){ // water flows around/through porous concrete
              if(moisture[ni]<moisture[i]-2){
                const transfer=Math.min(2,moisture[i]-moisture[ni]>>2);
                moisture[ni]+=transfer;
                moisture[i]-=transfer;
              }
            }
          }
          // Gravity
          if(y<GH-2){
            const below=i+GW;
            if(moisture[below]<moisture[i]){
              const t=Math.min(3,(moisture[i]-moisture[below])>>1);
              moisture[below]+=t;
              moisture[i]-=t;
            }
          }
          // Evaporation
          if(moisture[i]>0&&light[i]>150&&Math.random()<0.02){
            moisture[i]=Math.max(0,moisture[i]-1);
          }
        }
      }
    }
  }

  // Moss growth
  for(let y=1;y<GH-1;y++){
    for(let x=1;x<GW-1;x++){
      const i=y*GW+x;

      if(moss[i]>0){
        totalMoss++;
        // Grow if conditions met
        const m=moisture[i];
        const l=light[i];
        const canGrow = m>15 && l>30 && l<230; // not too dark, not scorching
        if(canGrow && moss[i]<255){
          const growRate = m>40 ? 0.015 : 0.005;
          const lightBonus = l>80&&l<180 ? 1.5 : 1;
          if(Math.random()<growRate*lightBonus){
            moss[i]=Math.min(255,moss[i]+1);
          }
        }
        // Die if too dry
        if(m<5 && Math.random()<0.005){
          moss[i]=Math.max(0,moss[i]-1);
        }

        // Spread to neighbors
        if(moss[i]>20 && Math.random()<0.003){
          const dirs=[i-1,i+1,i-GW,i+GW];
          const ni=dirs[Math.floor(Math.random()*4)];
          if(ni>=0&&ni<GW*GH&&moss[ni]===0){
            // Can grow on stone surfaces and soil
            if((stone[ni]>0||soil[ni]>0)&&moisture[ni]>10){
              moss[ni]=1;
            }
          }
        }
      }
    }
  }
}

// Drawing
function draw(){
  const img = ctx.createImageData(GW,GH);
  const d = img.data;

  for(let y=0;y<GH;y++){
    for(let x=0;x<GW;x++){
      const i=y*GW+x;
      const pi=i*4;
      const l=light[i]/255;
      const m=moisture[i];

      if(stone[i]>0){
        // Concrete — brutalist grey with density variation
        const den=stone[i];
        const base=50+den*12;
        const noise=(Math.sin(x*7.3+y*11.1)*3+Math.cos(x*13.7+y*5.3)*2)|0;
        let r=base+noise, g=base+noise-1, b=base+noise+1;
        // Moisture darkens concrete
        if(m>20){
          const wet=Math.min(1,m/100)*0.2;
          r=Math.floor(r*(1-wet));
          g=Math.floor(g*(1-wet));
          b=Math.floor(b*(1-wet));
        }
        // Moss overlay
        if(moss[i]>0){
          const mt=Math.min(1,moss[i]/120);
          const mossR=30+Math.floor(Math.sin(x*0.5+y*0.3)*10);
          const mossG=60+Math.floor(moss[i]/4)+Math.floor(Math.sin(x*0.7)*8);
          const mossB=25+Math.floor(Math.sin(x*0.3+y*0.6)*5);
          r=Math.floor(r*(1-mt)+mossR*mt);
          g=Math.floor(g*(1-mt)+mossG*mt);
          b=Math.floor(b*(1-mt)+mossB*mt);
        }
        // Apply light
        d[pi]=Math.floor(r*l);
        d[pi+1]=Math.floor(g*l);
        d[pi+2]=Math.floor(b*l);
        d[pi+3]=255;
      } else if(soil[i]){
        let r=35, g=28, b=20;
        const noise2=(Math.sin(x*5+y*8)*3)|0;
        r+=noise2;g+=noise2;b+=noise2;
        if(m>15){r-=3;g-=2;b-=1;}
        if(moss[i]>0){
          const mt=Math.min(1,moss[i]/80);
          r=Math.floor(r*(1-mt)+(25+Math.sin(x)*5)*mt);
          g=Math.floor(g*(1-mt)+(55+moss[i]/5)*mt);
          b=Math.floor(b*(1-mt)+20*mt);
        }
        d[pi]=Math.floor(r*l);d[pi+1]=Math.floor(g*l);d[pi+2]=Math.floor(b*l);d[pi+3]=255;
      } else {
        // Background — very dark
        const bg=12+Math.floor(l*8);
        d[pi]=bg;d[pi+1]=bg;d[pi+2]=bg+2;d[pi+3]=255;
      }

      // Water shimmer
      if(m>60 && stone[i]===0 && !soil[i]){
        const shimmer=Math.sin(simTick*0.05+x*0.3+y*0.2)*0.15+0.1;
        d[pi]=Math.min(255,d[pi]+Math.floor(30*shimmer));
        d[pi+1]=Math.min(255,d[pi+1]+Math.floor(50*shimmer));
        d[pi+2]=Math.min(255,d[pi+2]+Math.floor(60*shimmer));
      }
    }
  }

  ctx.putImageData(img,0,0);

  // Tiny ambient particles (dust motes in light)
  ctx.fillStyle='rgba(255,255,200,0.15)';
  for(let i=0;i<3;i++){
    const px=(Math.sin(simTick*0.01+i*2)*0.3+0.5)*GW;
    const py=(Math.sin(simTick*0.008+i*3)*0.2+0.3)*GH;
    ctx.fillRect(Math.floor(px),Math.floor(py),1,1);
  }
}

// Tools
let currentTool='water';
let mouseDown=false;

document.querySelectorAll('.tool').forEach(t=>{
  t.addEventListener('click',()=>{
    document.querySelectorAll('.tool').forEach(t2=>t2.classList.remove('active'));
    t.classList.add('active');
    currentTool=t.dataset.tool;
    const hints={water:'click to drip water.',stone:'click to place concrete.',
      seed:'click to plant moss.',light:'click to add sunlight.'};
    infoEl.textContent=hints[currentTool];
    infoEl.style.opacity='0.6';
    setTimeout(()=>infoEl.style.opacity='0.2',3000);
  });
});

function applyTool(cx,cy){
  const gx=Math.floor(cx/PX), gy=Math.floor(cy/PX);
  const r=currentTool==='light'?12:currentTool==='stone'?4:5;

  for(let dy=-r;dy<=r;dy++){
    for(let dx=-r;dx<=r;dx++){
      const dist=Math.sqrt(dx*dx+dy*dy);
      if(dist>r)continue;
      const px=gx+dx, py=gy+dy;
      if(px<0||px>=GW||py<0||py>=GH)continue;
      const i=py*GW+px;
      const falloff=1-dist/r;

      switch(currentTool){
        case 'water':
          moisture[i]=Math.min(255,moisture[i]+Math.floor(40*falloff));
          break;
        case 'stone':
          if(dist<r*0.8){
            stone[i]=2+Math.floor(Math.random()*2);
            soil[i]=0;
          }
          break;
        case 'seed':
          if((stone[i]>0||soil[i])&&dist<r*0.6&&Math.random()<0.3){
            moss[i]=Math.max(moss[i],1+Math.floor(Math.random()*5));
          }
          break;
        case 'light':
          // Handled separately
          break;
      }
    }
  }

  if(currentTool==='light'){
    lightSpots.push({x:cx,y:cy,r:15});
    if(lightSpots.length>5) lightSpots.shift();
    updateLight();
  }
}

canvas.addEventListener('mousedown',e=>{mouseDown=true;applyTool(e.offsetX/PX*PX,e.offsetY/PX*PX);});
canvas.addEventListener('mousemove',e=>{if(mouseDown)applyTool(e.offsetX/PX*PX,e.offsetY/PX*PX);});
document.addEventListener('mouseup',()=>mouseDown=false);
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();mouseDown=true;
  const t=e.touches[0];const r=canvas.getBoundingClientRect();
  applyTool((t.clientX-r.left),(t.clientY-r.top));
},{passive:false});
canvas.addEventListener('touchmove',e=>{
  e.preventDefault();
  const t=e.touches[0];const r=canvas.getBoundingClientRect();
  applyTool((t.clientX-r.left),(t.clientY-r.top));
},{passive:false});
canvas.addEventListener('touchend',()=>mouseDown=false);

// Ambient messages
const MESSAGES = [
  'patience is the garden\'s only rule.',
  'concrete remembers. moss forgives.',
  'water finds every crack.',
  'nothing grows in a hurry.',
  'the stone does not resist the green.',
  'stillness is not emptiness.',
  'every surface becomes soil, eventually.',
  'listen to the silence between growth.',
  'time is the gentlest sculptor.',
  'what was grey becomes alive.',
  'the moss does not compete. it simply grows.',
  'even concrete breathes.',
];

let msgTimer=0;
function updateMessage(){
  msgTimer++;
  if(msgTimer%600===0){
    infoEl.textContent=MESSAGES[Math.floor(Math.random()*MESSAGES.length)];
    infoEl.style.opacity='0.5';
    setTimeout(()=>infoEl.style.opacity='0.2',5000);
  }
}

// Time display
function updateTime(){
  const hours=Math.floor(growthAge);
  const days=Math.floor(hours/24);
  if(days>0) timeEl.textContent=`day ${days+1} · ${totalMoss} moss`;
  else timeEl.textContent=`hour ${hours} · ${totalMoss} moss`;
}

// Main loop
initGrid();

let lastTime=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt=(ts-lastTime)/1000;
  lastTime=ts;

  // Run simulation multiple steps for speed
  for(let s=0;s<2;s++) simStep();

  draw();
  updateMessage();
  if(simTick%30===0) updateTime();
}
requestAnimationFrame(loop);

// Fade intro text
setTimeout(()=>infoEl.style.opacity='0.2',5000);
</script>
</body>
</html>
