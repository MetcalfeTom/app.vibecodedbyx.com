<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Total Meltdown</title>
<meta name="description" content="Click to detonate. A physics sandbox of chain explosions, flying debris, and beautiful destruction." />
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%92%A5" />

<meta property="og:title" content="Total Meltdown" />
<meta property="og:description" content="Click to cause massive chain explosions. A physics sandbox of glorious destruction." />
<meta property="og:url" content="https://sloppy.live/total-meltdown" />
<meta property="og:image" content="https://sloppy.live/total-meltdown/og-image.png" />
<meta property="og:type" content="website" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bungee+Inline&family=Share+Tech+Mono&display=swap" rel="stylesheet" />

<style>
  :root {
    --ink: #0a0a0f;
    --danger: #ff3824;
    --yellow: #ffc847;
    --cyan: #2aeaff;
    --bone: #e8e4d4;
    --dim: #7c7686;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: #000;
    color: var(--bone);
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    -webkit-user-select: none;
    user-select: none;
  }
  canvas {
    display: block;
    cursor: crosshair;
    image-rendering: auto;
  }

  #hud {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 5;
  }

  .title {
    position: absolute;
    top: 18px; left: 22px;
    font-family: 'Bungee Inline', cursive;
    font-size: 26px;
    color: var(--danger);
    text-shadow: 3px 3px 0 #000, 0 0 20px rgba(255,56,36,0.5);
    letter-spacing: 0.05em;
  }
  .title .sub {
    display: block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.3em;
    margin-top: 2px;
    text-transform: uppercase;
  }

  .scoreboard {
    position: absolute;
    top: 22px; right: 22px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    text-align: right;
    pointer-events: none;
  }
  .stat {
    background: rgba(0,0,0,0.55);
    border: 1px solid rgba(255,56,36,0.4);
    padding: 8px 14px;
    min-width: 140px;
  }
  .stat .k {
    font-size: 9px;
    color: var(--dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
  }
  .stat .v {
    font-family: 'Bungee Inline', cursive;
    font-size: 22px;
    color: var(--yellow);
    text-shadow: 2px 2px 0 #000;
  }
  .stat.chain .v { color: var(--cyan); }

  .controls {
    position: absolute;
    bottom: 20px; left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    pointer-events: auto;
  }
  button {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    padding: 10px 16px;
    background: rgba(0,0,0,0.6);
    color: var(--bone);
    border: 1px solid rgba(255,200,71,0.4);
    cursor: pointer;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  button:hover {
    background: rgba(255,200,71,0.15);
    color: var(--yellow);
    border-color: var(--yellow);
  }
  button.active {
    background: var(--danger);
    color: #000;
    border-color: var(--danger);
    box-shadow: 0 0 20px rgba(255,56,36,0.6);
  }

  .backlink {
    position: absolute;
    bottom: 22px; right: 22px;
    color: var(--dim);
    text-decoration: none;
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    pointer-events: auto;
  }
  .backlink:hover { color: var(--danger); }

  .hint {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Bungee Inline', cursive;
    font-size: 36px;
    color: var(--bone);
    opacity: 0.85;
    text-shadow: 3px 3px 0 #000, 0 0 40px rgba(255,56,36,0.4);
    letter-spacing: 0.1em;
    text-align: center;
    transition: opacity 0.8s;
  }
  .hint.gone { opacity: 0; }
  .hint .sub {
    display: block;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--dim);
    letter-spacing: 0.25em;
    margin-top: 14px;
    text-transform: uppercase;
  }

  .chain-banner {
    position: absolute;
    top: 38%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.6);
    font-family: 'Bungee Inline', cursive;
    font-size: 64px;
    color: var(--yellow);
    text-shadow: 4px 4px 0 #000, 0 0 50px var(--danger);
    letter-spacing: 0.05em;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s cubic-bezier(0.2, 1.4, 0.3, 1);
  }
  .chain-banner.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="hud">
  <div class="title">TOTAL MELTDOWN<span class="sub">◆ physics sandbox ◆</span></div>

  <div class="scoreboard">
    <div class="stat"><div class="k">Destroyed</div><div class="v" id="statDestroyed">0</div></div>
    <div class="stat chain"><div class="k">Best Chain</div><div class="v" id="statChain">0</div></div>
  </div>

  <div class="hint" id="hint">
    CLICK TO DETONATE
    <span class="sub">Cause a chain reaction</span>
  </div>

  <div class="chain-banner" id="banner"></div>

  <div class="controls">
    <button id="resetBtn">Reset Arena</button>
    <button id="bigger" data-size="1">Small</button>
    <button id="medium" data-size="2" class="active">Medium</button>
    <button id="nuke"   data-size="4">NUKE</button>
  </div>

  <a class="backlink" href="https://sloppy.live" target="_blank" rel="noopener">← sloppy.live</a>
</div>

<script>
// ============================================================
// Total Meltdown — physics sandbox of chain explosions
// ============================================================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W = 0, H = 0, GROUND = 0;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  GROUND = H - 40;
}
resize();
window.addEventListener('resize', () => { resize(); buildArena(); });

// ------------------------------------------------------------
// Entities
// ------------------------------------------------------------
// Body: rectangular physics object.
// kind: 'crate' | 'bomb' | 'fuel' | 'steel'
// Bombs explode on impact, fuel has bigger radius, steel is heavy but inert
const bodies = [];
const explosions = [];
const particles = [];
const sparks = [];
const debris = [];     // purely cosmetic chunks from destroyed bodies

let shakeT = 0, shakeMag = 0;
let stats = { destroyed: 0, bestChain: 0 };
let currentChain = 0;
let chainResetTimer = 0;

const GRAVITY = 900;
const FRICTION = 0.88;
const DAMPING = 0.998;

function rand(a, b) { return a + Math.random() * (b - a); }
function randi(a, b) { return Math.floor(rand(a, b)); }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

class Body {
  constructor(x, y, w, h, kind) {
    this.x = x; this.y = y; this.w = w; this.h = h;
    this.vx = 0; this.vy = 0;
    this.rot = 0; this.av = 0;
    this.kind = kind;
    this.alive = true;
    this.hp = kind === 'steel' ? 5 : (kind === 'fuel' ? 1 : (kind === 'bomb' ? 1 : 2));
    // visual
    if (kind === 'crate') {
      this.color = '#b07040';
      this.edge = '#5a3418';
    } else if (kind === 'bomb') {
      this.color = '#2a2a30';
      this.edge = '#ff3824';
    } else if (kind === 'fuel') {
      this.color = '#c94418';
      this.edge = '#ffc847';
    } else if (kind === 'steel') {
      this.color = '#6a6e78';
      this.edge = '#22242a';
    }
    // mass proportional to area
    this.mass = (w * h) / 1000;
    if (kind === 'steel') this.mass *= 2.5;
  }
  step(dt) {
    if (!this.alive) return;
    this.vy += GRAVITY * dt;
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.rot += this.av * dt;
    this.vx *= DAMPING;
    this.av *= 0.985;

    // Ground collision
    if (this.y + this.h/2 > GROUND) {
      this.y = GROUND - this.h/2;
      if (this.vy > 180 && this.kind === 'bomb') {
        detonate(this.x, this.y, 1, true);
        this.alive = false;
        bumpChain();
        return;
      }
      if (this.vy > 60) {
        // Small bounce
        this.vy *= -0.25;
        this.vx *= FRICTION;
        this.av *= 0.6;
        // dust puff on hard landing
        if (this.vy > 120 || Math.abs(this.vx) > 200) {
          for (let i = 0; i < 4; i++) {
            particles.push(new Dust(this.x + rand(-this.w/2, this.w/2), GROUND, rand(-40,40), rand(-80,-20), '#6a5a4a'));
          }
        }
      } else {
        this.vy = 0;
        this.vx *= 0.78;
        this.av *= 0.5;
      }
    }

    // Screen edges — lose
    if (this.x < -200 || this.x > W + 200) this.alive = false;
    if (this.y > H + 400) this.alive = false;
  }
  draw() {
    if (!this.alive) return;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.fillStyle = this.color;
    ctx.strokeStyle = this.edge;
    ctx.lineWidth = 2;
    ctx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
    ctx.strokeRect(-this.w/2, -this.h/2, this.w, this.h);
    // kind decoration
    if (this.kind === 'crate') {
      ctx.beginPath();
      ctx.moveTo(-this.w/2, -this.h/2); ctx.lineTo(this.w/2, this.h/2);
      ctx.moveTo(this.w/2, -this.h/2); ctx.lineTo(-this.w/2, this.h/2);
      ctx.stroke();
    } else if (this.kind === 'bomb') {
      ctx.fillStyle = '#ff3824';
      ctx.beginPath();
      ctx.arc(0, 0, Math.min(this.w,this.h)/3, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#ffc847';
      ctx.beginPath();
      ctx.arc(0, 0, Math.min(this.w,this.h)/6, 0, Math.PI*2);
      ctx.fill();
    } else if (this.kind === 'fuel') {
      ctx.strokeStyle = '#ffc847';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.moveTo(-this.w/2 + 4, 0); ctx.lineTo(this.w/2 - 4, 0);
      ctx.stroke();
      ctx.fillStyle = '#000';
      ctx.font = 'bold 10px sans-serif';
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('⚠', 0, 0);
    } else if (this.kind === 'steel') {
      ctx.fillStyle = '#22242a';
      for (let i = -1; i <= 1; i += 2) for (let j = -1; j <= 1; j += 2) {
        ctx.beginPath();
        ctx.arc(i * (this.w/2 - 4), j * (this.h/2 - 4), 2, 0, Math.PI*2);
        ctx.fill();
      }
    }
    ctx.restore();
  }
}

class Explosion {
  constructor(x, y, power, visible = true) {
    this.x = x; this.y = y; this.power = power;
    this.r = 0;
    this.maxR = 70 * power;
    this.life = 1;
    this.applied = false;
    this.visible = visible;
  }
  step(dt) {
    this.r += this.maxR * 3.2 * dt;
    this.life -= dt * 1.8;
    if (!this.applied) {
      // Apply forces to bodies within radius (only once — the shockwave pulse)
      for (const b of bodies) {
        if (!b.alive) continue;
        const dx = b.x - this.x;
        const dy = b.y - this.y;
        const d = Math.hypot(dx, dy);
        if (d < this.maxR) {
          const falloff = 1 - d / this.maxR;
          const force = 900 * this.power * falloff;
          const nd = d < 0.01 ? 1 : 1/d;
          const fx = dx * nd * force / b.mass;
          const fy = dy * nd * force / b.mass;
          b.vx += fx;
          b.vy += fy - 200 * this.power * falloff / b.mass; // upward bias
          b.av += rand(-10, 10) * falloff;
          b.hp -= 1 + this.power;
          if (b.hp <= 0) {
            // destroy body
            destroyBody(b);
          } else if ((b.kind === 'bomb' || b.kind === 'fuel') && falloff > 0.3) {
            // chain: trigger in 30-120ms
            const delay = rand(0.03, 0.15);
            setTimeout(() => {
              if (b.alive) {
                detonate(b.x, b.y, b.kind === 'fuel' ? 1.6 : 1.0, true);
                b.alive = false;
                destroyBody(b, true);
                bumpChain();
              }
            }, delay * 1000);
          }
        }
      }
      this.applied = true;
    }
  }
  draw() {
    if (!this.visible) return;
    const a = Math.max(0, this.life);
    ctx.save();
    // shockwave ring
    ctx.globalAlpha = a * 0.9;
    ctx.strokeStyle = '#ffe680';
    ctx.lineWidth = 6 * this.power;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    ctx.stroke();
    // inner fireball
    const grad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, this.r * 0.85);
    grad.addColorStop(0, `rgba(255,240,200,${a})`);
    grad.addColorStop(0.4, `rgba(255,150,30,${a * 0.85})`);
    grad.addColorStop(1, `rgba(255,50,20,0)`);
    ctx.globalAlpha = 1;
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r * 0.85, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }
  get dead() { return this.life <= 0; }
}

class Particle {
  constructor(x, y, vx, vy, color, life, size) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.color = color;
    this.life = life; this.maxLife = life;
    this.size = size;
  }
  step(dt) {
    this.vy += 300 * dt;
    this.vx *= 0.98;
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.life -= dt;
    if (this.y > GROUND) { this.y = GROUND; this.vy *= -0.2; this.vx *= 0.7; }
  }
  draw() {
    const a = Math.max(0, this.life / this.maxLife);
    ctx.globalAlpha = a;
    ctx.fillStyle = this.color;
    ctx.fillRect(this.x - this.size/2, this.y - this.size/2, this.size, this.size);
    ctx.globalAlpha = 1;
  }
  get dead() { return this.life <= 0; }
}

class Dust extends Particle {
  constructor(x, y, vx, vy, color) {
    super(x, y, vx, vy, color, rand(0.4, 0.9), rand(2, 5));
  }
  draw() {
    const a = Math.max(0, this.life / this.maxLife) * 0.4;
    ctx.globalAlpha = a;
    ctx.fillStyle = this.color;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size, 0, Math.PI*2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
}

class Spark {
  constructor(x, y, vx, vy) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.life = rand(0.3, 0.8);
    this.maxLife = this.life;
    this.trail = [];
  }
  step(dt) {
    this.vy += 400 * dt;
    this.vx *= 0.99;
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.trail.push({ x: this.x, y: this.y });
    if (this.trail.length > 8) this.trail.shift();
    this.life -= dt;
    if (this.y > GROUND) this.life = 0;
  }
  draw() {
    const a = Math.max(0, this.life / this.maxLife);
    ctx.strokeStyle = `rgba(255,220,120,${a})`;
    ctx.lineWidth = 2;
    ctx.beginPath();
    for (let i = 0; i < this.trail.length; i++) {
      const p = this.trail[i];
      if (i === 0) ctx.moveTo(p.x, p.y);
      else ctx.lineTo(p.x, p.y);
    }
    ctx.stroke();
  }
  get dead() { return this.life <= 0; }
}

class Chunk {
  // Destroyed body shrapnel
  constructor(x, y, vx, vy, size, color) {
    this.x = x; this.y = y; this.vx = vx; this.vy = vy;
    this.size = size;
    this.color = color;
    this.rot = rand(0, Math.PI*2);
    this.av = rand(-10, 10);
    this.life = rand(1.2, 2.4);
    this.maxLife = this.life;
  }
  step(dt) {
    this.vy += GRAVITY * 0.8 * dt;
    this.vx *= 0.99;
    this.x += this.vx * dt;
    this.y += this.vy * dt;
    this.rot += this.av * dt;
    this.life -= dt;
    if (this.y + this.size/2 > GROUND) {
      this.y = GROUND - this.size/2;
      this.vy *= -0.35;
      this.vx *= 0.7;
    }
  }
  draw() {
    const a = Math.min(1, this.life / 0.7);
    ctx.globalAlpha = a;
    ctx.save();
    ctx.translate(this.x, this.y);
    ctx.rotate(this.rot);
    ctx.fillStyle = this.color;
    ctx.fillRect(-this.size/2, -this.size/2, this.size, this.size);
    ctx.restore();
    ctx.globalAlpha = 1;
  }
  get dead() { return this.life <= 0; }
}

// ------------------------------------------------------------
// Helpers
// ------------------------------------------------------------
function destroyBody(b, fromChain) {
  if (!b.alive) return;
  b.alive = false;
  stats.destroyed++;
  updateHUD();
  // Spawn chunks
  const n = Math.floor((b.w * b.h) / 400) + 3;
  for (let i = 0; i < n; i++) {
    debris.push(new Chunk(
      b.x + rand(-b.w/2, b.w/2),
      b.y + rand(-b.h/2, b.h/2),
      rand(-250, 250), rand(-350, -50),
      rand(3, 7),
      b.color
    ));
  }
}

function bumpChain() {
  currentChain++;
  chainResetTimer = 0.8;
  if (currentChain > stats.bestChain) {
    stats.bestChain = currentChain;
    updateHUD();
  }
  if (currentChain >= 3) {
    showBanner(currentChain);
  }
}

function showBanner(n) {
  const banner = document.getElementById('banner');
  let label;
  if (n >= 15) label = 'ARMAGEDDON x' + n;
  else if (n >= 10) label = 'TOTAL MELTDOWN x' + n;
  else if (n >= 6) label = 'DEVASTATION x' + n;
  else if (n >= 4) label = 'CHAIN! x' + n;
  else label = 'COMBO x' + n;
  banner.textContent = label;
  banner.classList.add('show');
  clearTimeout(showBanner._t);
  showBanner._t = setTimeout(() => banner.classList.remove('show'), 800);
}

function detonate(x, y, power = 1, visible = true) {
  explosions.push(new Explosion(x, y, power, visible));
  // Particles: smoke + fireballs + sparks
  const n = 18 * power;
  for (let i = 0; i < n; i++) {
    const a = rand(0, Math.PI * 2);
    const sp = rand(100, 380) * power;
    particles.push(new Particle(
      x, y,
      Math.cos(a) * sp, Math.sin(a) * sp - 100,
      pick(['#ffe680','#ffaa30','#ff5020','#ff3824']),
      rand(0.5, 1.3), rand(3, 7)
    ));
  }
  for (let i = 0; i < 12 * power; i++) {
    const a = rand(0, Math.PI * 2);
    const sp = rand(200, 500) * power;
    sparks.push(new Spark(x, y, Math.cos(a) * sp, Math.sin(a) * sp - 60));
  }
  // Smoke
  for (let i = 0; i < 10 * power; i++) {
    particles.push(new Particle(
      x + rand(-20, 20), y + rand(-20, 20),
      rand(-80, 80), rand(-180, -60),
      '#3a3030',
      rand(1.2, 2.5), rand(8, 18)
    ));
  }
  shakeT = 0.35 * power;
  shakeMag = 14 * power;
}

// ------------------------------------------------------------
// Arena builder
// ------------------------------------------------------------
function buildArena() {
  bodies.length = 0;
  // A few towers + scattered bombs/fuel
  const towerCount = Math.max(3, Math.floor(W / 280));
  for (let t = 0; t < towerCount; t++) {
    const cx = (W / (towerCount + 1)) * (t + 1) + rand(-30, 30);
    const rows = randi(5, 9);
    const cols = randi(2, 4);
    const bw = 42, bh = 28;
    const baseY = GROUND - bh/2;
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const x = cx + (c - (cols - 1) / 2) * (bw + 2);
        const y = baseY - r * (bh + 2);
        // choose kind with variety
        const roll = Math.random();
        let kind;
        if (roll < 0.12) kind = 'bomb';
        else if (roll < 0.2) kind = 'fuel';
        else if (roll < 0.28) kind = 'steel';
        else kind = 'crate';
        bodies.push(new Body(x, y, bw, bh, kind));
      }
    }
  }
  // Scattered loose barrels on ground
  for (let i = 0; i < 10; i++) {
    const x = rand(60, W - 60);
    bodies.push(new Body(x, GROUND - 16, 30, 32, pick(['bomb','fuel','crate'])));
  }
}

// ------------------------------------------------------------
// Input
// ------------------------------------------------------------
let blastSize = 2;
document.querySelectorAll('.controls button[data-size]').forEach(btn => {
  btn.addEventListener('click', () => {
    blastSize = parseFloat(btn.dataset.size);
    document.querySelectorAll('.controls button[data-size]').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});
document.getElementById('resetBtn').addEventListener('click', () => {
  buildArena();
  stats.destroyed = 0; stats.bestChain = 0; currentChain = 0;
  updateHUD();
  particles.length = 0; sparks.length = 0; debris.length = 0; explosions.length = 0;
});

canvas.addEventListener('mousedown', e => {
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  currentChain = 0;
  detonate(x, y, blastSize);
  document.getElementById('hint').classList.add('gone');
});
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  for (const t of e.touches) {
    const x = t.clientX - rect.left;
    const y = t.clientY - rect.top;
    currentChain = 0;
    detonate(x, y, blastSize);
  }
  document.getElementById('hint').classList.add('gone');
}, { passive: false });

// ------------------------------------------------------------
// HUD
// ------------------------------------------------------------
function updateHUD() {
  document.getElementById('statDestroyed').textContent = stats.destroyed;
  document.getElementById('statChain').textContent = stats.bestChain;
}

// ------------------------------------------------------------
// Main loop
// ------------------------------------------------------------
buildArena();

let lastT = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;

  // chain timer
  if (chainResetTimer > 0) {
    chainResetTimer -= dt;
    if (chainResetTimer <= 0) currentChain = 0;
  }

  // physics step
  for (const b of bodies) b.step(dt);
  for (const e of explosions) e.step(dt);
  for (const p of particles) p.step(dt);
  for (const s of sparks) s.step(dt);
  for (const d of debris) d.step(dt);

  // cleanup
  for (let i = bodies.length - 1; i >= 0; i--) if (!bodies[i].alive) bodies.splice(i, 1);
  for (let i = explosions.length - 1; i >= 0; i--) if (explosions[i].dead) explosions.splice(i, 1);
  for (let i = particles.length - 1; i >= 0; i--) if (particles[i].dead) particles.splice(i, 1);
  for (let i = sparks.length - 1; i >= 0; i--) if (sparks[i].dead) sparks.splice(i, 1);
  for (let i = debris.length - 1; i >= 0; i--) if (debris[i].dead) debris.splice(i, 1);

  // draw
  // background gradient
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#0a0a18');
  bg.addColorStop(0.7, '#1a0a10');
  bg.addColorStop(1, '#2a0a08');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // screen shake
  let ox = 0, oy = 0;
  if (shakeT > 0) {
    ox = rand(-shakeMag, shakeMag);
    oy = rand(-shakeMag, shakeMag);
    shakeT -= 1/60;
    shakeMag *= 0.95;
  }
  ctx.save();
  ctx.translate(ox, oy);

  // ground line with glow
  ctx.fillStyle = '#1a1012';
  ctx.fillRect(0, GROUND, W, H - GROUND);
  ctx.strokeStyle = '#ff3824';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#ff3824';
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.moveTo(0, GROUND);
  ctx.lineTo(W, GROUND);
  ctx.stroke();
  ctx.shadowBlur = 0;

  // draw debris under bodies
  for (const d of debris) d.draw();

  for (const b of bodies) b.draw();

  // additive layer for explosions + particles
  ctx.globalCompositeOperation = 'lighter';
  for (const e of explosions) e.draw();
  for (const p of particles) p.draw();
  for (const s of sparks) s.draw();
  ctx.globalCompositeOperation = 'source-over';

  ctx.restore();

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
