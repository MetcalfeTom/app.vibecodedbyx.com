<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lexical Looter</title>
<link rel="icon" href="https://emojicdn.elk.sh/🔫">
<meta property="og:title" content="Lexical Looter">
<meta property="og:description" content="First-person shooter where you blast typos and bad grammar out of existence.">
<meta property="og:url" content="https://sloppy.live/lexical-looter/">
<meta property="og:image" content="https://sloppy.live/lexical-looter/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;600;700&family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;overflow:hidden;font-family:'Fira Code',monospace;cursor:none;touch-action:none}
canvas{display:block}

#start-screen{position:fixed;inset:0;z-index:60;background:#0a0a0f;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:20px}
#start-screen h1{font-family:'Chakra Petch',sans-serif;font-size:clamp(28px,6vw,52px);font-weight:700;color:#f44;text-shadow:0 0 40px rgba(255,60,60,.4),0 0 80px rgba(255,60,60,.15);letter-spacing:4px}
#start-screen h1 span{color:#ff0}
#start-screen p{color:rgba(255,255,255,.3);font-size:13px;max-width:400px;text-align:center;line-height:1.7}
#start-screen .typo{color:#f44;text-decoration:line-through;text-decoration-color:#f44}
#start-btn{background:rgba(255,60,60,.08);border:1px solid rgba(255,60,60,.3);color:#f44;font-family:'Chakra Petch',sans-serif;font-size:16px;font-weight:600;padding:14px 40px;cursor:pointer;border-radius:4px;letter-spacing:2px;transition:all .2s}
#start-btn:hover{background:rgba(255,60,60,.15);box-shadow:0 0 30px rgba(255,60,60,.2);transform:scale(1.03)}

#hud{position:fixed;top:0;left:0;right:0;z-index:10;pointer-events:none;display:none;padding:12px 16px}
#hud-top{display:flex;justify-content:space-between;align-items:flex-start}
#score-wrap{text-align:left}
#score{font-family:'Chakra Petch',sans-serif;font-size:28px;font-weight:700;color:#ff0;text-shadow:0 0 15px rgba(255,255,0,.3)}
#combo{font-size:11px;color:rgba(255,100,0,.6);height:16px}
#wave-info{text-align:right}
#wave{font-family:'Chakra Petch',sans-serif;font-size:16px;color:rgba(255,60,60,.7)}
#enemies-left{font-size:10px;color:rgba(255,255,255,.25);margin-top:2px}

#hp-hud{position:fixed;bottom:16px;left:16px;z-index:10;pointer-events:none;display:none}
#hp-label{font-size:9px;color:rgba(255,60,60,.5);letter-spacing:2px}
#hp-bar{width:160px;height:8px;background:rgba(255,60,60,.08);border:1px solid rgba(255,60,60,.15);border-radius:2px;overflow:hidden;margin-top:2px}
#hp-fill{height:100%;background:linear-gradient(90deg,#f44,#ff6060);transition:width .3s;width:100%}

#ammo-hud{position:fixed;bottom:16px;right:16px;z-index:10;pointer-events:none;display:none;text-align:right}
#ammo{font-family:'Chakra Petch',sans-serif;font-size:22px;font-weight:700;color:rgba(0,230,255,.7)}
#ammo-label{font-size:9px;color:rgba(0,230,255,.3);letter-spacing:2px}
#weapon-name{font-size:10px;color:rgba(255,200,0,.4);margin-top:3px}

#crosshair{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:15;pointer-events:none;display:none}

#combat-log{position:fixed;top:50%;left:16px;transform:translateY(-50%);z-index:10;pointer-events:none;max-width:300px;display:none}
.clog{font-size:11px;padding:1px 0;animation:cFade 3s forwards;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.clog.correct{color:#0f8}.clog.miss{color:#555}.clog.crit{color:#ff0;font-weight:bold}
.clog.dmg{color:#f44}.clog.wave{color:#f44;font-weight:bold;font-size:13px}.clog.heal{color:#0f8}
.clog.loot{color:#fd0}
@keyframes cFade{0%{opacity:1}70%{opacity:1}100%{opacity:0}}

#wave-banner{position:fixed;top:40%;left:50%;transform:translate(-50%,-50%);z-index:20;display:none;text-align:center;pointer-events:none}
#wave-banner h2{font-family:'Chakra Petch',sans-serif;font-size:clamp(24px,5vw,40px);font-weight:700;color:#f44;text-shadow:0 0 40px rgba(255,60,60,.5);animation:wavePulse 2s forwards}
#wave-banner p{color:rgba(255,255,255,.3);font-size:12px;margin-top:6px;animation:wavePulse 2s forwards}
@keyframes wavePulse{0%{opacity:0;transform:scale(1.4)}15%{opacity:1;transform:scale(1)}75%{opacity:1}100%{opacity:0;transform:scale(0.95)}}

#game-over{position:fixed;inset:0;z-index:50;display:none;background:rgba(0,0,0,.9);flex-direction:column;align-items:center;justify-content:center;gap:16px}
#game-over h1{font-family:'Chakra Petch',sans-serif;font-size:28px;color:#f44;text-shadow:0 0 30px #f44}
#game-over p{color:#888;font-size:12px}
#game-over button{background:rgba(255,60,60,.1);border:1px solid #f44;color:#f44;font-family:'Chakra Petch',sans-serif;font-size:13px;padding:10px 28px;cursor:pointer;border-radius:4px;letter-spacing:1px}
#game-over button:hover{background:rgba(255,60,60,.2);box-shadow:0 0 20px rgba(255,60,60,.3)}

#backlink{position:fixed;bottom:8px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.04);font-size:9px;text-decoration:none;z-index:10}
#backlink:hover{color:rgba(255,60,60,.3)}

@media(max-width:600px){
  #score{font-size:20px}
  #ammo{font-size:18px}
}
</style>
</head>
<body>

<div id="start-screen">
  <h1>LEXICAL<span> LOOTER</span></h1>
  <p>The English language is under attack. <span class="typo">Teh</span> typos are everywhere. Bad grammar <span class="typo">runing</span> amok. Only you and your Correction Gun can save literacy.</p>
  <button id="start-btn" onclick="startGame()">LOCK & LOAD</button>
  <p style="font-size:10px;color:rgba(255,255,255,.15);margin-top:8px">Mouse to aim, Click to shoot, R to reload</p>
</div>

<canvas id="c"></canvas>
<div id="crosshair"></div>
<div id="hud"><div id="hud-top">
  <div id="score-wrap"><div id="score">0</div><div id="combo"></div></div>
  <div id="wave-info"><div id="wave">WAVE 1</div><div id="enemies-left"></div></div>
</div></div>
<div id="hp-hud"><div id="hp-label">INTEGRITY</div><div id="hp-bar"><div id="hp-fill"></div></div></div>
<div id="ammo-hud"><div id="ammo">30</div><div id="ammo-label">RED INK</div><div id="weapon-name"></div></div>
<div id="combat-log"></div>
<div id="wave-banner"><h2 id="wave-title"></h2><p id="wave-sub"></p></div>
<div id="game-over"><h1>GRAMMAR COLLAPSED</h1><p id="go-stats"></p><button onclick="restartGame()">TRY AGAIN</button></div>
<a id="backlink" href="https://sloppy.live">sloppy.live</a>

<script>
const CV=document.getElementById('c'),X=CV.getContext('2d');
let W,H;
function resize(){W=CV.width=innerWidth;H=CV.height=innerHeight;}
resize();addEventListener('resize',resize);

// === ENEMY DEFINITIONS ===
const TYPOS=[
  {text:'teh',correct:'the',type:'typo',hp:1,speed:0.6,size:1,pts:10,color:'#f44'},
  {text:'recieve',correct:'receive',type:'typo',hp:1,speed:0.5,size:1,pts:15,color:'#f44'},
  {text:'definately',correct:'definitely',type:'typo',hp:2,speed:0.4,size:1.1,pts:20,color:'#f66'},
  {text:'seperate',correct:'separate',type:'typo',hp:1,speed:0.7,size:0.9,pts:12,color:'#f44'},
  {text:'occured',correct:'occurred',type:'typo',hp:1,speed:0.55,size:1,pts:15,color:'#f55'},
  {text:'alot',correct:'a lot',type:'typo',hp:1,speed:0.8,size:0.85,pts:10,color:'#f33'},
  {text:'wierd',correct:'weird',type:'typo',hp:1,speed:0.65,size:0.9,pts:12,color:'#f44'},
  {text:'accomodate',correct:'accommodate',type:'typo',hp:2,speed:0.35,size:1.2,pts:25,color:'#f66'},
  {text:'neccessary',correct:'necessary',type:'typo',hp:2,speed:0.4,size:1.1,pts:22,color:'#f55'},
  {text:'embarass',correct:'embarrass',type:'typo',hp:1,speed:0.5,size:1,pts:18,color:'#f44'},
];
const GRAMMAR=[
  {text:"your wrong",correct:"you're wrong",type:'grammar',hp:2,speed:0.45,size:1.2,pts:25,color:'#fa0'},
  {text:"their going",correct:"they're going",type:'grammar',hp:2,speed:0.4,size:1.3,pts:30,color:'#fa0'},
  {text:"should of",correct:"should have",type:'grammar',hp:2,speed:0.5,size:1.1,pts:25,color:'#f80'},
  {text:"less people",correct:"fewer people",type:'grammar',hp:3,speed:0.35,size:1.3,pts:35,color:'#fb0'},
  {text:"me and him",correct:"he and I",type:'grammar',hp:2,speed:0.45,size:1.2,pts:28,color:'#f90'},
  {text:"could care less",correct:"couldn't care less",type:'grammar',hp:3,speed:0.3,size:1.4,pts:40,color:'#fb0'},
  {text:"irregardless",correct:"regardless",type:'grammar',hp:2,speed:0.5,size:1.1,pts:30,color:'#fa0'},
  {text:"for all intensive purposes",correct:"for all intents and purposes",type:'grammar',hp:4,speed:0.25,size:1.5,pts:50,color:'#fc0'},
];
const PUNCTUATION=[
  {text:"its' broken",correct:"it's broken",type:'punct',hp:1,speed:0.7,size:0.9,pts:15,color:'#0ef'},
  {text:'dont',correct:"don't",type:'punct',hp:1,speed:0.75,size:0.85,pts:10,color:'#0cf'},
  {text:"the cat's ball's",correct:"the cats' balls",type:'punct',hp:2,speed:0.45,size:1.2,pts:30,color:'#0af'},
  {text:'....',correct:'...',type:'punct',hp:1,speed:0.9,size:0.7,pts:8,color:'#08f'},
  {text:'"smart quotes"',correct:'"smart quotes"',type:'punct',hp:1,speed:0.6,size:1,pts:12,color:'#0bf'},
];
const BOSSES=[
  {text:'RUN-ON SENTENCE THAT GOES ON AND ON AND NEVER STOPS',correct:'Use periods.',type:'boss',hp:20,speed:0.2,size:2,pts:200,color:'#f0f'},
  {text:'PASSIVE VOICE WAS BEING USED BY EVERYONE',correct:'Everyone used active voice.',type:'boss',hp:25,speed:0.18,size:2,pts:300,color:'#f0f'},
  {text:'TXTSPK: U R 2 L8 M8 LOL',correct:'Proper English restored.',type:'boss',hp:30,speed:0.22,size:1.8,pts:400,color:'#f0f'},
];

// === WEAPONS ===
const WEAPONS=[
  {name:'Red Pen',magSize:30,fireRate:6,dmg:1,spread:0.02,color:'#f44',reloadTime:60},
  {name:'Grammar Hammer',magSize:8,fireRate:20,dmg:3,spread:0.04,color:'#fa0',reloadTime:80},
  {name:'Syntax Shotgun',magSize:6,fireRate:25,dmg:2,spread:0.12,pellets:5,color:'#0ef',reloadTime:90},
];

// === GAME STATE ===
let gameStarted=false,gameOver=false;
let score=0,combo=0,maxCombo=0,wave=0,kills=0;
let hp=100,maxHp=100;
let enemies=[],particles=[],floatTexts=[];
let mouseX=W/2,mouseY=H/2;
let weaponIdx=0,ammo=30,reloading=0,fireCooldown=0;
let waveEnemies=0,waveKills=0,wavePause=0;
let shakeX=0,shakeY=0;
let muzzleFlash=0;
let animT=0;

function weapon(){return WEAPONS[weaponIdx];}

function startGame(){
  document.getElementById('start-screen').style.display='none';
  ['hud','hp-hud','ammo-hud','crosshair','combat-log'].forEach(id=>
    document.getElementById(id).style.display='block');
  document.getElementById('game-over').style.display='none';
  gameStarted=true;gameOver=false;
  score=0;combo=0;maxCombo=0;wave=0;kills=0;
  hp=maxHp=100;
  enemies=[];particles=[];floatTexts=[];
  weaponIdx=0;ammo=weapon().magSize;reloading=0;fireCooldown=0;
  nextWave();
}
window.startGame=startGame;

function restartGame(){startGame();}
window.restartGame=restartGame;

function nextWave(){
  wave++;
  waveKills=0;
  // boss every 5 waves
  if(wave%5===0){
    const bi=Math.min(BOSSES.length-1,Math.floor(wave/5)-1);
    waveEnemies=1;
    spawnEnemy(BOSSES[bi]);
    showWaveBanner('BOSS WAVE '+wave,BOSSES[bi].text.substring(0,30)+'...');
  } else {
    waveEnemies=4+wave*2;
    for(let i=0;i<Math.min(waveEnemies,6+wave);i++)spawnRandom();
    showWaveBanner('WAVE '+wave,waveEnemies+' errors detected');
  }
  // weapon unlock
  if(wave===3&&weaponIdx===0){
    weaponIdx=0; // they can switch now
    clog('Grammar Hammer unlocked! Press 2','loot');
  }
  if(wave===6){
    clog('Syntax Shotgun unlocked! Press 3','loot');
  }
  updateHUD();
}

function spawnRandom(){
  const roll=Math.random();
  let pool;
  if(roll<0.5)pool=TYPOS;
  else if(roll<0.8)pool=GRAMMAR;
  else pool=PUNCTUATION;
  const template=pool[Math.floor(Math.random()*pool.length)];
  spawnEnemy(template);
}

function spawnEnemy(template){
  const angle=Math.random()*Math.PI*2;
  const dist=15+Math.random()*10;
  const hpScale=1+wave*0.15;
  const spdScale=1+wave*0.03;
  enemies.push({
    ...template,
    hp:Math.ceil(template.hp*hpScale),
    maxHp:Math.ceil(template.hp*hpScale),
    x:Math.cos(angle)*dist,
    y:-0.5+Math.random()*1.5,
    z:Math.sin(angle)*dist,
    vx:0,vy:0,vz:0,
    speed:template.speed*spdScale,
    wobbleT:Math.random()*100,
    hitFlash:0,
    alive:true,
  });
}

// === SHOOTING ===
function shoot(){
  if(gameOver||!gameStarted)return;
  if(reloading>0)return;
  if(fireCooldown>0)return;
  if(ammo<=0){reload();return;}

  ammo--;
  fireCooldown=weapon().fireRate;
  muzzleFlash=4;
  shakeX=(Math.random()-0.5)*3;
  shakeY=-2-Math.random()*2;

  const pellets=weapon().pellets||1;
  let anyHit=false;

  for(let p=0;p<pellets;p++){
    const sx=mouseX+(Math.random()-0.5)*W*weapon().spread;
    const sy=mouseY+(Math.random()-0.5)*H*weapon().spread;

    // hit test — project enemies to screen, check distance
    let closest=null,closestDist=Infinity;
    for(const e of enemies){
      if(!e.alive)continue;
      const sp=project(e);
      if(!sp||sp.z<0.5)continue;
      const dx=sx-sp.sx,dy=sy-sp.sy;
      const hitR=sp.scale*30*e.size;
      if(dx*dx+dy*dy<hitR*hitR){
        if(sp.z<closestDist){closest=e;closestDist=sp.z;}
      }
    }

    if(closest){
      anyHit=true;
      closest.hp-=weapon().dmg;
      closest.hitFlash=8;

      // hit particles
      const sp=project(closest);
      if(sp)for(let i=0;i<6;i++){
        particles.push({x:sp.sx,y:sp.sy,vx:(Math.random()-0.5)*6,vy:(Math.random()-0.5)*6,
          life:20+Math.random()*15,color:closest.color,size:2+Math.random()*2});
      }

      if(closest.hp<=0){
        killEnemy(closest);
      } else {
        clog('Hit! '+closest.text+' ('+closest.hp+'/'+closest.maxHp+')','correct');
      }
    }
  }

  if(!anyHit){
    combo=0;
    // bullet trail particle
    for(let i=0;i<3;i++){
      particles.push({x:mouseX+(Math.random()-0.5)*10,y:mouseY+(Math.random()-0.5)*10,
        vx:(Math.random()-0.5)*2,vy:-2-Math.random()*3,life:10,color:'#f44',size:1.5});
    }
  }

  if(ammo<=0)reload();
  updateHUD();
}

function killEnemy(e){
  e.alive=false;kills++;waveKills++;
  combo++;
  if(combo>maxCombo)maxCombo=combo;
  const comboMult=Math.min(5,1+Math.floor(combo/5));
  const pts=e.pts*comboMult;
  score+=pts;

  const sp=project(e);
  if(sp){
    // correction float text
    floatTexts.push({x:sp.sx,y:sp.sy-20,text:e.correct,color:'#0f8',life:60,size:14});
    floatTexts.push({x:sp.sx+20,y:sp.sy-40,text:'+'+pts+(comboMult>1?' x'+comboMult:''),color:'#ff0',life:45,size:12});
    // death particles
    for(let i=0;i<15;i++){
      particles.push({x:sp.sx,y:sp.sy,vx:(Math.random()-0.5)*10,vy:(Math.random()-0.5)*10,
        life:25+Math.random()*20,color:e.color,size:2+Math.random()*3});
    }
    // letter explosion
    for(const ch of e.text.split('')){
      if(ch===' ')continue;
      particles.push({x:sp.sx+(Math.random()-0.5)*40,y:sp.sy+(Math.random()-0.5)*20,
        vx:(Math.random()-0.5)*5,vy:-3-Math.random()*5,life:40+Math.random()*20,
        color:e.color,size:0,letter:ch});
    }
  }

  if(e.type==='boss'){
    clog('BOSS DESTROYED: '+e.correct,'wave');
    // heal on boss kill
    hp=Math.min(maxHp,hp+30);
  } else {
    clog(e.text+' → '+e.correct,'correct');
  }

  // Check wave completion
  if(waveKills>=waveEnemies&&enemies.filter(e2=>e2.alive).length===0){
    wavePause=90; // frames until next wave
    clog('Wave '+wave+' cleared!','wave');
    // small heal between waves
    hp=Math.min(maxHp,hp+10);
  }
  updateHUD();
}

function reload(){
  if(reloading>0||ammo===weapon().magSize)return;
  reloading=weapon().reloadTime;
  clog('Reloading...','miss');
}

// === 3D PROJECTION ===
const CAM_FOV=70*Math.PI/180;

function project(e){
  const dx=e.x,dy=e.y,dz=e.z;
  const dist=Math.sqrt(dx*dx+dz*dz);
  if(dist<0.3)return null;
  const angle=Math.atan2(dx,dz);
  const sx=W/2+Math.tan(angle)*W/(2*Math.tan(CAM_FOV/2));
  const scale=H/(dist*2);
  const sy=H/2-dy*scale;
  return{sx,sy,z:dist,scale};
}

// === UPDATE ===
function update(){
  if(!gameStarted||gameOver)return;
  animT++;

  // cooldowns
  if(fireCooldown>0)fireCooldown--;
  if(reloading>0){
    reloading--;
    if(reloading<=0){ammo=weapon().magSize;updateHUD();clog('Ready!','correct');}
  }
  if(shakeX)shakeX*=0.8;
  if(shakeY)shakeY*=0.85;
  if(muzzleFlash>0)muzzleFlash--;

  // wave pause
  if(wavePause>0){
    wavePause--;
    if(wavePause<=0)nextWave();
    return;
  }

  // spawn stragglers
  const aliveCount=enemies.filter(e=>e.alive).length;
  if(aliveCount<3&&waveKills<waveEnemies&&wave%5!==0){
    spawnRandom();
  }

  // move enemies toward center (player)
  for(const e of enemies){
    if(!e.alive)continue;
    e.wobbleT+=0.03;
    if(e.hitFlash>0)e.hitFlash--;

    const dist=Math.sqrt(e.x*e.x+e.z*e.z);
    const moveSpeed=e.speed*0.016;
    // move toward player (0,0,0)
    if(dist>1.5){
      e.x-=e.x/dist*moveSpeed;
      e.z-=e.z/dist*moveSpeed;
    }
    // wobble
    e.x+=Math.sin(e.wobbleT)*0.01;
    e.y+=Math.cos(e.wobbleT*1.3)*0.005;
    e.z+=Math.cos(e.wobbleT*0.7)*0.01;

    // damage player if too close
    if(dist<2){
      const dmg=e.type==='boss'?2:1;
      hp-=dmg;
      e.x+=e.x/dist*0.5; // push back
      e.z+=e.z/dist*0.5;
      if(animT%30===0){
        clog('"'+e.text+'" attacks!','dmg');
        shakeX=(Math.random()-0.5)*8;shakeY=(Math.random()-0.5)*8;
      }
      if(hp<=0){die();return;}
    }
  }

  // particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;
    p.vy+=0.15; // gravity
    p.life--;
    if(p.life<=0)particles.splice(i,1);
  }

  // float texts
  for(let i=floatTexts.length-1;i>=0;i--){
    const ft=floatTexts[i];
    ft.y-=0.8;ft.life--;
    if(ft.life<=0)floatTexts.splice(i,1);
  }

  updateHUD();
}

function die(){
  gameOver=true;
  document.getElementById('game-over').style.display='flex';
  document.getElementById('go-stats').textContent=
    'Wave '+wave+' · Score '+score+' · '+kills+' corrections · Max combo x'+maxCombo;
}

// === RENDER ===
function render(){
  X.fillStyle='#0a0a0f';X.fillRect(0,0,W,H);
  if(!gameStarted)return;

  X.save();
  X.translate(shakeX,shakeY);

  // floor grid
  X.strokeStyle='rgba(255,60,60,.04)';X.lineWidth=1;
  for(let i=-20;i<=20;i++){
    const scale=H/(Math.abs(i)*0.5+1);
    const y=H/2+scale*0.3;
    if(y>H/2&&y<H){
      X.globalAlpha=Math.max(0,1-Math.abs(i)/20);
      X.beginPath();X.moveTo(0,y);X.lineTo(W,y);X.stroke();
    }
  }
  X.globalAlpha=1;

  // perspective lines from center
  for(let i=0;i<12;i++){
    const a=i*Math.PI/6;
    X.strokeStyle='rgba(255,60,60,.02)';
    X.beginPath();X.moveTo(W/2,H/2);
    X.lineTo(W/2+Math.cos(a)*W,H/2+Math.sin(a)*H);X.stroke();
  }

  // sort enemies by distance (far first)
  const sorted=[...enemies].filter(e=>e.alive).sort((a,b)=>{
    const da=a.x*a.x+a.z*a.z,db=b.x*b.x+b.z*b.z;
    return db-da;
  });

  for(const e of sorted){
    const sp=project(e);
    if(!sp||sp.z<0.5||sp.sx<-200||sp.sx>W+200)continue;

    const alpha=Math.max(0.15,1-sp.z/25);
    const fontSize=Math.max(8,Math.min(60,sp.scale*14*e.size));

    X.save();
    X.translate(sp.sx,sp.sy);

    // glow
    X.shadowColor=e.color;X.shadowBlur=e.hitFlash>0?30:12;

    // background plate
    X.font='bold '+Math.floor(fontSize)+'px "Fira Code"';
    const tw=X.measureText(e.text).width;
    const pad=fontSize*0.3;
    X.fillStyle='rgba(0,0,0,'+(alpha*0.6)+')';
    X.fillRect(-tw/2-pad,-fontSize*0.4-pad/2,tw+pad*2,fontSize+pad);
    X.strokeStyle=e.color+(e.hitFlash>0?'':'44');
    X.lineWidth=e.hitFlash>0?2:1;
    X.strokeRect(-tw/2-pad,-fontSize*0.4-pad/2,tw+pad*2,fontSize+pad);

    // text
    X.globalAlpha=alpha;
    X.fillStyle=e.hitFlash>0?'#fff':e.color;
    X.textAlign='center';X.textBaseline='middle';
    X.fillText(e.text,0,fontSize*0.15);

    // HP bar for multi-hit enemies
    if(e.maxHp>1){
      const bw=tw*0.8,bh=3;
      X.fillStyle='rgba(255,0,0,.2)';
      X.fillRect(-bw/2,-fontSize*0.4-pad/2-6,bw,bh);
      X.fillStyle=e.type==='boss'?'#f0f':'#f44';
      X.fillRect(-bw/2,-fontSize*0.4-pad/2-6,bw*(e.hp/e.maxHp),bh);
    }

    // type indicator
    X.font='bold '+Math.floor(fontSize*0.35)+'px "Fira Code"';
    X.fillStyle=e.color+'66';
    X.fillText(e.type==='typo'?'TYPO':e.type==='grammar'?'GRAMMAR':e.type==='punct'?'PUNCT':'BOSS',
      0,fontSize*0.6+pad);

    X.shadowBlur=0;
    X.restore();
  }

  // particles
  for(const p of particles){
    X.globalAlpha=Math.max(0,p.life/40);
    if(p.letter){
      X.font='bold 14px "Fira Code"';X.fillStyle=p.color;
      X.textAlign='center';X.fillText(p.letter,p.x,p.y);
    } else {
      X.fillStyle=p.color;
      X.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
    }
  }
  X.globalAlpha=1;

  // float texts
  for(const ft of floatTexts){
    X.globalAlpha=Math.max(0,ft.life/60);
    X.font='bold '+ft.size+'px "Fira Code"';X.fillStyle=ft.color;
    X.textAlign='center';X.shadowColor=ft.color;X.shadowBlur=8;
    X.fillText(ft.text,ft.x,ft.y);
    X.shadowBlur=0;
  }
  X.globalAlpha=1;

  X.restore();

  // muzzle flash
  if(muzzleFlash>0){
    const flAlpha=muzzleFlash/4*0.15;
    X.fillStyle='rgba(255,100,60,'+flAlpha+')';
    X.fillRect(0,H*0.6,W,H*0.4);
  }

  // draw weapon
  drawWeapon();

  // crosshair
  drawCrosshair();

  // reload indicator
  if(reloading>0){
    const pct=1-reloading/weapon().reloadTime;
    X.strokeStyle='rgba(255,60,60,.4)';X.lineWidth=2;
    X.beginPath();X.arc(mouseX,mouseY,20,-Math.PI/2,-Math.PI/2+pct*Math.PI*2);X.stroke();
  }
}

function drawWeapon(){
  const wp=weapon();
  const bx=W*0.6,by=H*0.88;
  const bob=Math.sin(animT*0.04)*2;
  const recoil=fireCooldown>wp.fireRate-3?-8:0;

  X.save();
  X.translate(bx,by+bob+recoil);

  // weapon body
  X.strokeStyle=wp.color;X.lineWidth=2;X.shadowColor=wp.color;X.shadowBlur=8;

  if(weaponIdx===0){ // Red Pen
    X.beginPath();X.moveTo(0,0);X.lineTo(-3,-90);X.lineTo(3,-95);X.lineTo(6,0);X.closePath();X.stroke();
    X.fillStyle=wp.color+'44';X.fill();
    // pen tip
    X.fillStyle=wp.color;X.beginPath();X.moveTo(-1,-90);X.lineTo(1,-105);X.lineTo(4,-92);X.fill();
  } else if(weaponIdx===1){ // Grammar Hammer
    // handle
    X.strokeStyle='#a86';X.lineWidth=4;
    X.beginPath();X.moveTo(3,0);X.lineTo(3,-60);X.stroke();
    // head
    X.strokeStyle=wp.color;X.lineWidth=2;
    X.fillStyle=wp.color+'33';
    X.fillRect(-18,-75,40,18);X.strokeRect(-18,-75,40,18);
    X.fillStyle=wp.color;X.font='bold 9px "Fira Code"';X.fillText('ABC',-5,-63);
  } else { // Syntax Shotgun
    // barrel
    X.beginPath();X.moveTo(-8,0);X.lineTo(-6,-80);X.lineTo(8,-80);X.lineTo(10,0);X.closePath();X.stroke();
    X.beginPath();X.moveTo(-3,0);X.lineTo(-1,-80);X.lineTo(3,-80);X.lineTo(5,0);X.closePath();X.stroke();
    // pump
    X.fillStyle=wp.color+'22';X.fillRect(-12,-30,28,12);X.strokeRect(-12,-30,28,12);
  }

  X.shadowBlur=0;X.restore();
}

function drawCrosshair(){
  const s=reloading>0?14:10;
  const col=reloading>0?'rgba(255,60,60,.2)':'rgba(255,60,60,.6)';
  X.strokeStyle=col;X.lineWidth=1.5;
  // cross lines with gap
  X.beginPath();X.moveTo(mouseX-s,mouseY);X.lineTo(mouseX-4,mouseY);X.stroke();
  X.beginPath();X.moveTo(mouseX+4,mouseY);X.lineTo(mouseX+s,mouseY);X.stroke();
  X.beginPath();X.moveTo(mouseX,mouseY-s);X.lineTo(mouseX,mouseY-4);X.stroke();
  X.beginPath();X.moveTo(mouseX,mouseY+4);X.lineTo(mouseX,mouseY+s);X.stroke();
  // center dot
  X.fillStyle=col;X.beginPath();X.arc(mouseX,mouseY,1.5,0,Math.PI*2);X.fill();
}

// === HUD ===
function updateHUD(){
  document.getElementById('score').textContent=score;
  document.getElementById('combo').textContent=combo>1?'COMBO x'+combo+(combo>=10?' BLAZING':combo>=5?' HOT':''):'';
  document.getElementById('wave').textContent='WAVE '+wave;
  const alive=enemies.filter(e=>e.alive).length;
  document.getElementById('enemies-left').textContent=alive+' error'+(alive!==1?'s':'')+' remaining';
  document.getElementById('hp-fill').style.width=Math.max(0,hp/maxHp*100)+'%';
  document.getElementById('ammo').textContent=reloading>0?'..':ammo;
  document.getElementById('weapon-name').textContent=weapon().name;
}

function clog(msg,cls){
  const el=document.getElementById('combat-log');
  const div=document.createElement('div');
  div.className='clog '+(cls||'');div.textContent=msg;
  el.appendChild(div);
  if(el.children.length>8)el.firstChild.remove();
  setTimeout(()=>{if(div.parentNode)div.remove();},3500);
}

function showWaveBanner(title,sub){
  document.getElementById('wave-title').textContent=title;
  document.getElementById('wave-sub').textContent=sub;
  const el=document.getElementById('wave-banner');
  el.style.display='block';
  // re-trigger animation
  el.querySelector('h2').style.animation='none';
  el.querySelector('p').style.animation='none';
  void el.offsetHeight;
  el.querySelector('h2').style.animation='wavePulse 2s forwards';
  el.querySelector('p').style.animation='wavePulse 2s forwards';
  setTimeout(()=>el.style.display='none',2200);
}

// === INPUT ===
addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;});
addEventListener('mousedown',e=>{if(e.button===0)shoot();});
addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.touches[0];
  mouseX=t.clientX;mouseY=t.clientY;
  shoot();
},{passive:false});
addEventListener('touchmove',e=>{
  const t=e.touches[0];
  mouseX=t.clientX;mouseY=t.clientY;
},{passive:true});

addEventListener('keydown',e=>{
  const k=e.key.toLowerCase();
  if(k==='r')reload();
  if(k==='1'){weaponIdx=0;ammo=Math.min(ammo,weapon().magSize);updateHUD();}
  if(k==='2'&&wave>=3){weaponIdx=1;ammo=Math.min(ammo,weapon().magSize);updateHUD();}
  if(k==='3'&&wave>=6){weaponIdx=2;ammo=Math.min(ammo,weapon().magSize);updateHUD();}
});

// prevent context menu
addEventListener('contextmenu',e=>e.preventDefault());

// === GAME LOOP ===
function loop(){update();render();requestAnimationFrame(loop);}
loop();
</script>
