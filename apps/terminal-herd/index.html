<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Terminal Herd</title>
<meta name="description" content="A neon terminal where every keystroke spawns a wandering ASCII cow." />
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%90%84" />
<meta property="og:title" content="Terminal Herd" />
<meta property="og:description" content="A neon terminal where every keystroke spawns a wandering ASCII cow." />
<meta property="og:url" content="https://sloppy.live/terminal-herd/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/Neon%20green%20phosphor%20terminal%20screen%20with%20many%20small%20pixel%20ASCII%20cows%20wandering,%20CRT%20scanlines,%20dark%20void,%20retro%20cyberpunk%20pasture?width=1200&height=630&nologo=true" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Major+Mono+Display&family=Space+Mono:wght@400;700&family=Bungee&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#02110a;
    --bg2:#06291a;
    --phosphor:#7dffb0;
    --phosphor-d:#4ddc88;
    --amber:#ffd25b;
    --magenta:#ff5ea1;
    --cyan:#5ee0ff;
    --violet:#c47bff;
    --ink:#031a0e;
  }
  html,body{height:100%;width:100%;overflow:hidden;background:radial-gradient(1200px 700px at 50% 30%, #062a1c 0%, #02110a 60%, #010906 100%);color:var(--phosphor);font-family:'VT323','Space Mono',monospace}
  body{position:relative}
  /* CRT scanline overlay */
  body::after{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:50;
    background:repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0 2px, rgba(0,0,0,0.18) 2px 3px);
    mix-blend-mode:multiply;
  }
  /* Vignette */
  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:49;
    background:radial-gradient(ellipse at center, rgba(0,0,0,0) 50%, rgba(0,0,0,0.65) 100%);
  }
  #stage{position:fixed;inset:0;display:flex;flex-direction:column}
  header{
    padding:14px 22px 10px 22px;display:flex;align-items:flex-end;justify-content:space-between;gap:12px;
    border-bottom:1px dashed rgba(125,255,176,0.2);
    background:linear-gradient(to bottom, rgba(2,17,10,0.9), rgba(2,17,10,0.6));
    z-index:10;
  }
  h1{
    font-family:'Major Mono Display',monospace;
    font-size:clamp(22px,3.6vw,38px);
    color:var(--phosphor);
    letter-spacing:0.16em;
    text-shadow:0 0 6px rgba(125,255,176,0.7), 0 0 24px rgba(77,220,136,0.4), 2px 0 0 var(--magenta), -2px 0 0 var(--cyan);
    animation:flicker 4.6s infinite steps(60);
  }
  @keyframes flicker{0%,100%{opacity:1}93%{opacity:0.96}94%{opacity:0.78}95%{opacity:1}}
  .meta{display:flex;gap:14px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
  .pill{
    font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.18em;
    text-transform:uppercase;color:var(--phosphor-d);
    border:1px solid rgba(125,255,176,0.32);
    padding:4px 10px;border-radius:999px;
    background:rgba(6,41,26,0.5);
  }
  .pill b{color:var(--amber);font-weight:400;font-family:'VT323',monospace;font-size:16px;letter-spacing:0;margin-left:6px}
  .pill.bump{animation:countBump 0.3s ease-out}
  @keyframes countBump{0%{transform:scale(1)}40%{transform:scale(1.18);color:var(--amber)}100%{transform:scale(1)}}
  button.tool{
    background:transparent;border:1px solid rgba(125,255,176,0.32);color:var(--phosphor);
    padding:5px 12px;font-family:'Space Mono',monospace;font-size:11px;letter-spacing:0.16em;
    text-transform:uppercase;cursor:pointer;border-radius:999px;
  }
  button.tool:hover{background:rgba(125,255,176,0.12);color:var(--amber);border-color:var(--amber)}

  #pasture{position:relative;flex:1;overflow:hidden;cursor:text}
  /* faint dot grid */
  #pasture::before{
    content:'';position:absolute;inset:0;pointer-events:none;
    background-image:radial-gradient(circle at 1px 1px, rgba(125,255,176,0.07) 1px, transparent 1px);
    background-size:34px 34px;
  }
  /* boot text */
  .boot{
    position:absolute;top:18px;left:24px;font-family:'VT323',monospace;font-size:18px;color:var(--phosphor-d);
    line-height:1.3;opacity:0.7;pointer-events:none;
  }
  .boot .pmt{color:var(--amber)}
  .boot.fade{animation:bootFade 12s ease 6s forwards}
  @keyframes bootFade{to{opacity:0.12}}

  .cow{
    position:absolute;font-family:'VT323',monospace;font-size:15px;line-height:1;
    white-space:pre;pointer-events:none;text-shadow:0 0 3px currentColor;
    transform-origin:center bottom;
    transition:opacity 0.5s ease;
  }
  .cow.dying{opacity:0}
  .moo{
    position:absolute;font-family:'Bungee',sans-serif;font-size:14px;
    color:var(--amber);text-shadow:0 0 6px rgba(255,210,91,0.7);
    pointer-events:none;animation:mooFloat 1.4s ease-out forwards;
    letter-spacing:0.04em;
  }
  @keyframes mooFloat{0%{opacity:0;transform:translate(-50%,0) scale(0.7)}20%{opacity:1;transform:translate(-50%,-12px) scale(1)}100%{opacity:0;transform:translate(-50%,-78px) scale(1.1)}}

  /* prompt area */
  .promptbar{
    position:relative;display:flex;align-items:center;gap:10px;padding:12px 22px 18px;
    border-top:1px dashed rgba(125,255,176,0.2);
    background:linear-gradient(to top, rgba(2,17,10,0.95), rgba(2,17,10,0.6));
    z-index:10;
  }
  .promptbar .who{
    font-family:'Space Mono',monospace;font-size:13px;color:var(--magenta);
    text-shadow:0 0 5px rgba(255,94,161,0.5);
  }
  .promptbar .who span{color:var(--cyan)}
  .promptbar .who b{color:var(--phosphor);font-weight:400}
  #prompt{
    flex:1;background:transparent;border:none;outline:none;color:var(--phosphor);
    font-family:'VT323',monospace;font-size:22px;letter-spacing:0.04em;
    text-shadow:0 0 4px rgba(125,255,176,0.7);
    caret-color:var(--amber);
  }
  .blink{display:inline-block;width:10px;height:18px;background:var(--phosphor);
    animation:blink 1.05s steps(2) infinite;vertical-align:-2px;margin-left:2px}
  @keyframes blink{50%{opacity:0}}

  .hint{
    position:absolute;bottom:78px;right:24px;font-family:'Space Mono',monospace;
    font-size:11px;color:var(--phosphor-d);letter-spacing:0.18em;text-transform:uppercase;
    opacity:0.55;pointer-events:none;
  }
  .hint b{color:var(--amber);font-weight:400}

  @media (max-width:560px){
    h1{font-size:20px;letter-spacing:0.12em}
    .meta{gap:8px}
    .pill{font-size:10px;padding:3px 8px}
    button.tool{font-size:10px;padding:4px 9px}
    #prompt{font-size:18px}
    .hint{display:none}
  }
</style>
</head>
<body>
<div id="stage">
  <header>
    <h1>Terminal Herd</h1>
    <div class="meta">
      <div class="pill" id="herdPill">HERD <b id="herdCount">0</b></div>
      <div class="pill">KEYS <b id="keyCount">0</b></div>
      <button class="tool" id="muteBtn">♪ ON</button>
      <button class="tool" id="cullBtn">cull</button>
    </div>
  </header>

  <div id="pasture">
    <div class="boot fade" id="boot">
<span class="pmt">$</span> ./herd-init --pasture=infinite<br/>
<span class="pmt">&gt;</span> phosphor calibrated<br/>
<span class="pmt">&gt;</span> ascii.cow.lib loaded (5 breeds)<br/>
<span class="pmt">&gt;</span> waiting for keystrokes — every key drops a cow<br/>
<span class="pmt">&gt;</span> [type below ↓]
    </div>
    <div class="hint">type to spawn · <b>ENTER</b> moo · <b>C</b> cull</div>
  </div>

  <form class="promptbar" id="form" autocomplete="off">
    <div class="who">guest@<span>pasture</span>:<b>~</b>$</div>
    <input id="prompt" type="text" maxlength="240" autofocus spellcheck="false" placeholder="type something cow-worthy…" />
  </form>
</div>

<script>
(() => {
  const pasture = document.getElementById('pasture');
  const promptEl = document.getElementById('prompt');
  const formEl = document.getElementById('form');
  const herdCountEl = document.getElementById('herdCount');
  const herdPill = document.getElementById('herdPill');
  const keyCountEl = document.getElementById('keyCount');
  const muteBtn = document.getElementById('muteBtn');
  const cullBtn = document.getElementById('cullBtn');

  // ----- ASCII cow breeds -----
  // each is an array of strings (rows) + meta
  const BREEDS = [
    {
      name:'classic',
      art:[
        '  ^__^',
        '  (oo)\\___',
        '  (__)\\   )\\',
        '     ||--||'
      ]
    },
    {
      name:'sleepy',
      art:[
        '  ^--^',
        '  (zz)\\__',
        '  (__)\\  )_',
        '     ||--|'
      ]
    },
    {
      name:'angry',
      art:[
        '  >__<',
        '  (XX)\\___',
        '  (__)\\   )!',
        '     ||--||'
      ]
    },
    {
      name:'tiny',
      art:[
        ' ^_^',
        '(oo)_',
        '(__) )',
        '  ww'
      ]
    },
    {
      name:'cosmic',
      art:[
        '  *__*',
        '  (**)\\___',
        '  (~~)\\   )\\',
        '     ||--||'
      ]
    },
    {
      name:'derpy',
      art:[
        '  ^_O',
        '  (Oo)\\___',
        '  (__)\\   )/',
        '     ||--||'
      ]
    },
    {
      name:'mini',
      art:[
        '(oo)',
        '/||\\',
        ' ww '
      ]
    },
    {
      name:'lonk',
      art:[
        '   ^__^',
        '   (oo)\\______',
        '   (__)\\      )\\',
        '       ||----||'
      ]
    }
  ];

  const COLORS = [
    {hex:'#7dffb0', name:'phosphor'},
    {hex:'#ffd25b', name:'amber'},
    {hex:'#5ee0ff', name:'cyan'},
    {hex:'#ff5ea1', name:'magenta'},
    {hex:'#c47bff', name:'violet'},
    {hex:'#a8ff6f', name:'lime'},
  ];

  const MOO_VARIANTS = ['MOO','moo!','MOOO','m·o·o','mrrhh','mooo~','MUUH','mawww','BWAH'];
  const SAYS = ['hello','i exist','am cow','grass?','beep','*chews*','vibe','dot dot','??','udder up'];

  const MAX_COWS = 80;
  const cows = [];
  const moos = [];

  const state = {
    keyCount:0,
    muted:false,
    audio:null,
    lastSpawnAt:0,
  };

  // ----- audio -----
  function ensureAudio(){
    if(state.audio) return state.audio;
    try{
      state.audio = new (window.AudioContext||window.webkitAudioContext)();
    }catch(e){ return null; }
    return state.audio;
  }
  function moo(pitch=1, dur=0.42){
    if(state.muted) return;
    const ac = ensureAudio(); if(!ac) return;
    if(ac.state==='suspended') ac.resume();
    const t = ac.currentTime;
    const osc = ac.createOscillator();
    osc.type='sawtooth';
    const f0 = 90*pitch, f1 = 130*pitch, f2 = 80*pitch;
    osc.frequency.setValueAtTime(f0, t);
    osc.frequency.exponentialRampToValueAtTime(f1, t+dur*0.45);
    osc.frequency.exponentialRampToValueAtTime(f2, t+dur);
    // vibrato
    const lfo = ac.createOscillator(); lfo.type='sine'; lfo.frequency.value = 5.4;
    const lg = ac.createGain(); lg.gain.value = 4;
    lfo.connect(lg).connect(osc.frequency);
    const lp = ac.createBiquadFilter();
    lp.type='lowpass'; lp.frequency.value = 720*pitch; lp.Q.value = 1.6;
    const g = ac.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.16, t+0.04);
    g.gain.exponentialRampToValueAtTime(0.001, t+dur);
    osc.connect(lp).connect(g).connect(ac.destination);
    osc.start(t); lfo.start(t);
    osc.stop(t+dur+0.05); lfo.stop(t+dur+0.05);
  }
  function blip(){
    if(state.muted) return;
    const ac = ensureAudio(); if(!ac) return;
    if(ac.state==='suspended') ac.resume();
    const t = ac.currentTime;
    const osc = ac.createOscillator();
    osc.type='square';
    osc.frequency.value = 1200 + Math.random()*600;
    const g = ac.createGain();
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.025, t+0.005);
    g.gain.exponentialRampToValueAtTime(0.001, t+0.06);
    osc.connect(g).connect(ac.destination);
    osc.start(t); osc.stop(t+0.07);
  }

  // ----- spawn -----
  function spawnCow(seedChar){
    if(cows.length >= MAX_COWS){
      // cull oldest
      const oldest = cows.shift();
      if(oldest && oldest.el && oldest.el.parentNode) oldest.el.parentNode.removeChild(oldest.el);
    }
    const breed = BREEDS[Math.floor(Math.random()*BREEDS.length)];
    const color = COLORS[Math.floor(Math.random()*COLORS.length)];
    const el = document.createElement('div');
    el.className = 'cow';
    el.style.color = color.hex;
    el.textContent = breed.art.join('\n');

    const W = pasture.clientWidth;
    const H = pasture.clientHeight;
    // approximate width/height based on art
    const cowW = breed.art.reduce((m,r)=>Math.max(m,r.length),0) * 8.4 + 8;
    const cowH = breed.art.length * 15 + 6;

    const margin = 30;
    const x = margin + Math.random()*(W - cowW - margin*2);
    const y = margin + Math.random()*(H - cowH - margin*2 - 60);

    el.style.left = x+'px';
    el.style.top = y+'px';
    pasture.appendChild(el);

    const facing = Math.random()<0.5 ? -1 : 1;
    if(facing===-1) el.style.transform = 'scaleX(-1)';

    const c = {
      el, x, y, vx: (0.3 + Math.random()*0.7) * facing,
      vy:0, w:cowW, h:cowH,
      bobPhase: Math.random()*Math.PI*2,
      breed, color, seedChar,
      t: 0,
      restUntil: 0,
      facing,
      lastMooAt: 0
    };
    cows.push(c);
    updateMeta();
    blip();
    return c;
  }

  function updateMeta(){
    herdCountEl.textContent = cows.length;
    keyCountEl.textContent = state.keyCount;
    herdPill.classList.remove('bump');
    void herdPill.offsetWidth;
    herdPill.classList.add('bump');
  }

  function spawnMoo(c, text){
    const m = document.createElement('div');
    m.className = 'moo';
    m.textContent = text || MOO_VARIANTS[Math.floor(Math.random()*MOO_VARIANTS.length)];
    m.style.left = (c.x + c.w/2) + 'px';
    m.style.top = (c.y - 6) + 'px';
    pasture.appendChild(m);
    setTimeout(()=>{ if(m.parentNode) m.parentNode.removeChild(m); }, 1500);
  }

  // ----- main loop -----
  let last = performance.now();
  function tick(now){
    const dt = Math.min(40, now-last); last = now;
    const W = pasture.clientWidth;
    const H = pasture.clientHeight;

    for(let i=0;i<cows.length;i++){
      const c = cows[i];
      c.t += dt;

      // wandering AI: occasional pause + direction change
      if(c.restUntil > 0){
        c.restUntil -= dt;
        if(c.restUntil <= 0){
          c.vx = (0.3 + Math.random()*0.7) * (Math.random()<0.5?-1:1);
          c.facing = c.vx<0 ? -1 : 1;
        }
      } else {
        if(Math.random() < 0.0018){
          c.restUntil = 600 + Math.random()*1400;
          c.vx = 0;
          // chance to moo while paused
          if(Math.random() < 0.32 && now - c.lastMooAt > 1800){
            spawnMoo(c);
            moo(0.85 + Math.random()*0.5);
            c.lastMooAt = now;
          }
        } else if(Math.random() < 0.005){
          c.vx = -c.vx * (0.9 + Math.random()*0.2);
          c.facing = c.vx<0 ? -1 : 1;
        }
      }

      c.x += c.vx * dt * 0.06;
      c.bobPhase += dt * 0.012 * (Math.abs(c.vx)>0.05 ? 1 : 0.3);
      const bobY = Math.sin(c.bobPhase) * (Math.abs(c.vx)>0.05 ? 1.4 : 0.5);

      // wall bounce
      if(c.x < 10){ c.x = 10; c.vx = Math.abs(c.vx); c.facing = 1; }
      else if(c.x + c.w > W - 10){ c.x = W - 10 - c.w; c.vx = -Math.abs(c.vx); c.facing = -1; }

      // settle y if it goes off
      if(c.y + c.h > H - 70) c.y = H - 70 - c.h;
      if(c.y < 6) c.y = 6;

      const tx = `translate(${0}px, ${bobY}px) scaleX(${c.facing})`;
      c.el.style.left = c.x + 'px';
      c.el.style.top = c.y + 'px';
      c.el.style.transform = tx;
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

  // ----- input -----
  let lastValue = '';
  promptEl.addEventListener('input', (e)=>{
    const v = promptEl.value;
    if(v.length > lastValue.length){
      // a real char was added
      const ch = v[v.length-1];
      state.keyCount++;
      // throttle slightly so paste doesn't flood
      const now = performance.now();
      if(now - state.lastSpawnAt > 28){
        spawnCow(ch);
        state.lastSpawnAt = now;
      }
    }
    lastValue = v;
  });

  formEl.addEventListener('submit', (e)=>{
    e.preventDefault();
    const text = promptEl.value.trim();
    if(!text){
      // empty enter = collective moo
      cows.forEach((c,i)=>{
        setTimeout(()=>{ spawnMoo(c); }, i*40);
      });
      moo(1.0, 0.6);
      return;
    }
    // pick random cow to "say" the text fragment
    if(cows.length){
      const c = cows[Math.floor(Math.random()*cows.length)];
      const snippet = text.slice(0, 24);
      spawnMoo(c, snippet);
      moo(1 + (Math.random()-0.5)*0.4, 0.5);
    }
    promptEl.value = '';
    lastValue = '';
  });

  // global keys
  window.addEventListener('keydown', (e)=>{
    if(e.key === 'c' || e.key === 'C'){
      if(document.activeElement === promptEl) return;
      cull();
    }
  });

  cullBtn.addEventListener('click', cull);
  function cull(){
    cows.forEach(c=>{
      c.el.classList.add('dying');
      setTimeout(()=>{ if(c.el.parentNode) c.el.parentNode.removeChild(c.el); }, 520);
    });
    cows.length = 0;
    moo(0.6, 0.7);
    updateMeta();
  }

  muteBtn.addEventListener('click', ()=>{
    state.muted = !state.muted;
    muteBtn.textContent = state.muted ? '♪ OFF' : '♪ ON';
    if(!state.muted) ensureAudio();
  });

  // unlock audio on first interaction anywhere
  const unlock = ()=>{
    ensureAudio();
    window.removeEventListener('pointerdown', unlock);
    window.removeEventListener('keydown', unlock);
  };
  window.addEventListener('pointerdown', unlock);
  window.addEventListener('keydown', unlock);

  // click on pasture refocuses input
  pasture.addEventListener('click', ()=>{ promptEl.focus(); });

  // Welcome cow
  setTimeout(()=>{
    const c = spawnCow('@');
    c.x = 80;
    spawnMoo(c, 'welcome');
  }, 500);

})();
</script>
</body>
</html>
