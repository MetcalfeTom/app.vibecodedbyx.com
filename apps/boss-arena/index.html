<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Boss Arena</title>
<meta name="description" content="Third-person souls-lite combat prototype. Dodge, slash, survive the giant." />
<link rel="icon" href="https://emojicdn.elk.sh/%E2%9A%94%EF%B8%8F" />

<meta property="og:title" content="Boss Arena" />
<meta property="og:description" content="Third-person combat prototype with dodge roll and a giant boss. Can you topple the Colossus?" />
<meta property="og:url" content="https://sloppy.live/boss-arena" />
<meta property="og:image" content="https://sloppy.live/boss-arena/og-image.png" />
<meta property="og:type" content="website" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />

<style>
  :root {
    --gold: #d4a952;
    --blood: #8a1424;
    --bone: #e8dfc4;
    --ash: #1a1712;
    --dim: #7a6e5c;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; overflow: hidden; background: #0a0806; color: var(--bone); font-family: 'JetBrains Mono', monospace; }
  canvas { display: block; }

  #hud {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 5;
    font-family: 'JetBrains Mono', monospace;
  }

  /* Player HP bottom-left */
  .playerHP {
    position: absolute;
    bottom: 28px; left: 28px;
    width: 280px;
  }
  .playerHP .label {
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--gold);
    margin-bottom: 6px;
    text-transform: uppercase;
    text-shadow: 2px 2px 0 #000;
  }
  .bar {
    height: 14px;
    background: #0a0806;
    border: 1px solid var(--dim);
    box-shadow: 0 0 0 1px #000, 2px 2px 0 #000;
    position: relative;
    overflow: hidden;
  }
  .bar .fill {
    height: 100%;
    transition: width 0.25s ease-out;
  }
  .playerHP .fill {
    background: linear-gradient(180deg, #c8443a 0%, #7a0e10 100%);
    box-shadow: 0 0 10px rgba(200,60,60,0.4) inset;
  }
  .stamina {
    height: 6px;
    margin-top: 4px;
    background: #0a0806;
    border: 1px solid var(--dim);
    position: relative;
    overflow: hidden;
  }
  .stamina .fill {
    height: 100%;
    background: linear-gradient(180deg, #d4a952 0%, #6b4e1a 100%);
    transition: width 0.15s ease-out;
  }

  /* Boss HP top-center */
  .bossHP {
    position: absolute;
    top: 36px; left: 50%;
    transform: translateX(-50%);
    width: min(520px, 80vw);
    text-align: center;
    opacity: 0;
    transition: opacity 0.5s;
  }
  .bossHP.active { opacity: 1; }
  .bossHP .label {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    letter-spacing: 0.4em;
    color: var(--bone);
    margin-bottom: 8px;
    text-transform: uppercase;
    text-shadow: 2px 2px 0 #000, 0 0 8px rgba(212,169,82,0.3);
  }
  .bossHP .bar { height: 10px; border-color: var(--gold); }
  .bossHP .fill {
    background: linear-gradient(180deg, #e8dfc4 0%, #8a1424 100%);
  }

  /* Center messages */
  .announce {
    position: absolute;
    top: 38%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Cinzel', serif;
    font-weight: 800;
    font-size: 64px;
    letter-spacing: 0.1em;
    text-align: center;
    text-shadow: 4px 4px 0 #000, 0 0 40px #000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 1s;
  }
  .announce.show { opacity: 1; }
  .announce.victory { color: var(--gold); }
  .announce.defeat  { color: var(--blood); }
  .announce .sub {
    display: block;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.2em;
    color: var(--bone);
    margin-top: 16px;
    font-weight: 400;
    opacity: 0.7;
  }

  /* Start screen */
  #start {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center, #1a0a08 0%, #050302 70%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 32px;
    pointer-events: auto;
    z-index: 20;
    text-align: center;
    padding: 30px;
  }
  #start h1 {
    font-family: 'Cinzel', serif;
    font-weight: 800;
    font-size: 72px;
    letter-spacing: 0.15em;
    color: var(--gold);
    text-shadow: 6px 6px 0 #000, 0 0 30px rgba(212,169,82,0.3);
  }
  #start .tag {
    font-family: 'Cinzel', serif;
    font-size: 14px;
    letter-spacing: 0.4em;
    color: var(--blood);
    text-transform: uppercase;
    margin-top: -18px;
  }
  #start .controls {
    font-size: 12px;
    line-height: 2.2;
    color: var(--bone);
    background: rgba(10,8,6,0.7);
    border: 1px solid var(--dim);
    padding: 18px 28px;
    max-width: 420px;
  }
  #start .controls b { color: var(--gold); }
  #start button {
    font-family: 'Cinzel', serif;
    font-weight: 800;
    font-size: 18px;
    letter-spacing: 0.3em;
    padding: 16px 42px;
    background: transparent;
    color: var(--bone);
    border: 2px solid var(--gold);
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    text-shadow: 2px 2px 0 #000;
  }
  #start button:hover {
    background: var(--gold);
    color: #0a0806;
    box-shadow: 0 0 30px rgba(212,169,82,0.5);
  }
  #start a  #start a
  /* Damage vignette */
  .vignette {
    position: absolute; inset: 0;
    box-shadow: inset 0 0 200px rgba(120,0,0,0);
    pointer-events: none;
    transition: box-shadow 0.25s;
  }
  .vignette.hit { box-shadow: inset 0 0 200px rgba(180,0,0,0.75); }

  /* Dodge indicator */
  .dodgeHint {
    position: absolute;
    bottom: 32px; right: 32px;
    font-family: 'Cinzel', serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--dim);
    text-transform: uppercase;
    text-shadow: 2px 2px 0 #000;
    text-align: right;
    line-height: 1.8;
  }
  .dodgeHint b { color: var(--gold); }
</style>
</head>
<body>

<div id="hud">
  <div class="vignette" id="vignette"></div>

  <div class="bossHP" id="bossHPEl">
    <div class="label">THE COLOSSUS</div>
    <div class="bar"><div class="fill" id="bossFill" style="width:100%"></div></div>
  </div>

  <div class="playerHP">
    <div class="label">Wanderer</div>
    <div class="bar"><div class="fill" id="playerFill" style="width:100%"></div></div>
    <div class="stamina"><div class="fill" id="stamFill" style="width:100%"></div></div>
  </div>

  <div class="dodgeHint">
    <b>WASD</b> move<br/>
    <b>SHIFT / SPACE</b> dodge<br/>
    <b>CLICK</b> attack
  </div>

  <div class="announce" id="announce"></div>
</div>

<div id="start">
  <h1>BOSS ARENA</h1>
  <div class="tag">⚔ A Third-Person Trial ⚔</div>
  <div class="controls">
    <b>WASD</b> — move<br/>
    <b>MOUSE</b> — camera (pointer-lock)<br/>
    <b>LEFT CLICK</b> — slash attack<br/>
    <b>SHIFT</b> or <b>SPACE</b> — dodge roll (i-frames)<br/>
    <b>ESC</b> — release mouse
  </div>
  <button id="startBtn">ENTER THE ARENA</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ============================================================
// Scene setup
// ============================================================
const scene = new THREE.Scene();
scene.background = new THREE.Color('#0a0806');
scene.fog = new THREE.Fog('#0a0806', 18, 60);

const camera = new THREE.PerspectiveCamera(65, window.innerWidth/window.innerHeight, 0.1, 300);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.15;
document.body.appendChild(renderer.domElement);

// Lighting
const ambient = new THREE.AmbientLight(0x332820, 0.5);
scene.add(ambient);

const key = new THREE.DirectionalLight(0xffddaa, 1.4);
key.position.set(10, 18, 6);
key.castShadow = true;
key.shadow.mapSize.set(1024, 1024);
key.shadow.camera.near = 1;
key.shadow.camera.far = 60;
key.shadow.camera.left = -25;
key.shadow.camera.right = 25;
key.shadow.camera.top = 25;
key.shadow.camera.bottom = -25;
key.shadow.bias = -0.0005;
scene.add(key);

const rim = new THREE.DirectionalLight(0x4a6a9a, 0.6);
rim.position.set(-8, 10, -10);
scene.add(rim);

// torchlight point light that follows action
const torch = new THREE.PointLight(0xff8030, 2.0, 30, 1.5);
torch.position.set(0, 8, 0);
scene.add(torch);

// ============================================================
// Arena — circular stone platform
// ============================================================
const ARENA_RADIUS = 18;
const arenaGroup = new THREE.Group();
scene.add(arenaGroup);

const arenaGeo = new THREE.CylinderGeometry(ARENA_RADIUS, ARENA_RADIUS, 0.8, 48);
const arenaMat = new THREE.MeshStandardMaterial({ color: 0x4a3a2e, roughness: 0.85, metalness: 0.1 });
const arenaMesh = new THREE.Mesh(arenaGeo, arenaMat);
arenaMesh.position.y = -0.4;
arenaMesh.receiveShadow = true;
arenaGroup.add(arenaMesh);

// Inner ring detail
const ringGeo = new THREE.RingGeometry(ARENA_RADIUS - 0.3, ARENA_RADIUS, 64);
const ringMat = new THREE.MeshBasicMaterial({ color: 0xd4a952, side: THREE.DoubleSide });
const ring = new THREE.Mesh(ringGeo, ringMat);
ring.rotation.x = -Math.PI/2;
ring.position.y = 0.02;
arenaGroup.add(ring);

// Center sigil
const sigilGeo = new THREE.RingGeometry(2.4, 2.8, 32);
const sigilMat = new THREE.MeshBasicMaterial({ color: 0x5a3020, side: THREE.DoubleSide });
const sigil = new THREE.Mesh(sigilGeo, sigilMat);
sigil.rotation.x = -Math.PI/2;
sigil.position.y = 0.01;
arenaGroup.add(sigil);

// Pillars around the edge
for (let i = 0; i < 8; i++) {
  const a = (i / 8) * Math.PI * 2;
  const px = Math.cos(a) * (ARENA_RADIUS - 0.7);
  const pz = Math.sin(a) * (ARENA_RADIUS - 0.7);
  const pillar = new THREE.Mesh(
    new THREE.BoxGeometry(0.8, 4, 0.8),
    new THREE.MeshStandardMaterial({ color: 0x3a2a22, roughness: 0.9 })
  );
  pillar.position.set(px, 2, pz);
  pillar.castShadow = true;
  pillar.receiveShadow = true;
  arenaGroup.add(pillar);

  // brazier on top
  const brazierBowl = new THREE.Mesh(
    new THREE.SphereGeometry(0.45, 12, 8, 0, Math.PI*2, Math.PI/2, Math.PI/2),
    new THREE.MeshStandardMaterial({ color: 0x2a1810 })
  );
  brazierBowl.position.set(px, 4.1, pz);
  arenaGroup.add(brazierBowl);

  const flame = new THREE.Mesh(
    new THREE.SphereGeometry(0.3, 8, 6),
    new THREE.MeshBasicMaterial({ color: 0xff8030 })
  );
  flame.position.set(px, 4.35, pz);
  flame.userData.baseY = 4.35;
  flame.userData.phase = i * 0.8;
  arenaGroup.add(flame);

  const flameLight = new THREE.PointLight(0xff6020, 1.0, 8, 2);
  flameLight.position.set(px, 4.5, pz);
  arenaGroup.add(flameLight);
}

// ============================================================
// Player — simple stacked capsule warrior
// ============================================================
const player = new THREE.Group();
scene.add(player);

// Body
const bodyMat = new THREE.MeshStandardMaterial({ color: 0x4a2a20, roughness: 0.7 });
const armorMat = new THREE.MeshStandardMaterial({ color: 0x6a6468, roughness: 0.4, metalness: 0.6 });

const torso = new THREE.Mesh(new THREE.BoxGeometry(0.7, 0.85, 0.45), armorMat);
torso.position.y = 1.1;
torso.castShadow = true;
player.add(torso);

const head = new THREE.Mesh(new THREE.SphereGeometry(0.22, 16, 12), new THREE.MeshStandardMaterial({ color: 0xd4a870, roughness: 0.7 }));
head.position.y = 1.75;
head.castShadow = true;
player.add(head);

// Hood/cloak
const hood = new THREE.Mesh(new THREE.ConeGeometry(0.35, 0.5, 8), new THREE.MeshStandardMaterial({ color: 0x3a1a16, roughness: 0.95 }));
hood.position.y = 1.95;
hood.castShadow = true;
player.add(hood);

// Legs
const legL = new THREE.Mesh(new THREE.BoxGeometry(0.22, 0.65, 0.22), bodyMat);
legL.position.set(-0.18, 0.35, 0);
legL.castShadow = true;
player.add(legL);
const legR = legL.clone();
legR.position.x = 0.18;
player.add(legR);

// Arms
const armL = new THREE.Mesh(new THREE.BoxGeometry(0.18, 0.7, 0.18), bodyMat);
armL.position.set(-0.48, 1.1, 0);
armL.castShadow = true;
player.add(armL);
const armR = armL.clone();
armR.position.x = 0.48;
player.add(armR);

// Sword in right hand
const swordPivot = new THREE.Group();
swordPivot.position.set(0.48, 1.2, 0.1);
player.add(swordPivot);

const swordBlade = new THREE.Mesh(
  new THREE.BoxGeometry(0.08, 1.2, 0.02),
  new THREE.MeshStandardMaterial({ color: 0xe8e6dd, roughness: 0.2, metalness: 0.9, emissive: 0x222222 })
);
swordBlade.position.y = 0.7;
swordBlade.castShadow = true;
swordPivot.add(swordBlade);

const swordGuard = new THREE.Mesh(
  new THREE.BoxGeometry(0.26, 0.05, 0.05),
  new THREE.MeshStandardMaterial({ color: 0xd4a952, roughness: 0.4, metalness: 0.7 })
);
swordGuard.position.y = 0.12;
swordPivot.add(swordGuard);

const swordGrip = new THREE.Mesh(
  new THREE.BoxGeometry(0.06, 0.18, 0.06),
  new THREE.MeshStandardMaterial({ color: 0x2a1810 })
);
swordGrip.position.y = 0.02;
swordPivot.add(swordGrip);

// Sword default orientation — held down
swordPivot.rotation.x = -0.2;
swordPivot.rotation.z = 0.3;

// Player state
const pState = {
  pos: new THREE.Vector3(0, 0, 6),
  vel: new THREE.Vector3(),
  facing: 0,          // rotation around Y
  hp: 100, hpMax: 100,
  stam: 100, stamMax: 100,
  iframes: 0,         // invincibility timer
  dodgeTimer: 0,      // dodge animation time
  dodgeDir: new THREE.Vector3(),
  attackTimer: 0,     // attack swing time
  attackCooldown: 0,  // time before next attack allowed
  attackHitReg: false,
  hitstun: 0,
};

// ============================================================
// Boss — The Colossus (big stacked humanoid)
// ============================================================
const boss = new THREE.Group();
scene.add(boss);

const bossArmorMat = new THREE.MeshStandardMaterial({ color: 0x2a2228, roughness: 0.6, metalness: 0.4 });
const bossAccentMat = new THREE.MeshStandardMaterial({ color: 0x8a1424, roughness: 0.5, metalness: 0.3, emissive: 0x2a0005 });
const bossBoneMat = new THREE.MeshStandardMaterial({ color: 0xd8cfa0, roughness: 0.8 });

// Torso
const bossTorso = new THREE.Mesh(new THREE.BoxGeometry(3.2, 3.6, 2.0), bossArmorMat);
bossTorso.position.y = 5.0;
bossTorso.castShadow = true;
boss.add(bossTorso);

// Belt accent
const bossBelt = new THREE.Mesh(new THREE.BoxGeometry(3.4, 0.5, 2.15), bossAccentMat);
bossBelt.position.y = 3.4;
boss.add(bossBelt);

// Shoulders
const shoulderL = new THREE.Mesh(new THREE.SphereGeometry(1.0, 16, 12), bossArmorMat);
shoulderL.position.set(-1.9, 6.3, 0);
shoulderL.castShadow = true;
boss.add(shoulderL);
const shoulderR = shoulderL.clone();
shoulderR.position.x = 1.9;
boss.add(shoulderR);

// Head — skull-like
const bossHead = new THREE.Mesh(new THREE.BoxGeometry(1.3, 1.4, 1.3), bossBoneMat);
bossHead.position.y = 7.5;
bossHead.castShadow = true;
boss.add(bossHead);

// Glowing eyes
const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff3020 });
const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 6), eyeMat);
eyeL.position.set(-0.3, 7.55, 0.66);
boss.add(eyeL);
const eyeR = eyeL.clone();
eyeR.position.x = 0.3;
boss.add(eyeR);

// Horns
const hornGeo = new THREE.ConeGeometry(0.22, 1.1, 8);
const hornMat = new THREE.MeshStandardMaterial({ color: 0x1a1010, roughness: 0.9 });
const hornL = new THREE.Mesh(hornGeo, hornMat);
hornL.position.set(-0.45, 8.3, -0.2);
hornL.rotation.z = 0.35;
hornL.rotation.x = -0.2;
boss.add(hornL);
const hornR = hornL.clone();
hornR.position.x = 0.45;
hornR.rotation.z = -0.35;
boss.add(hornR);

// Arms — with shoulder pivots so we can swing
const bossArmLGroup = new THREE.Group();
bossArmLGroup.position.set(-1.9, 6.3, 0);
boss.add(bossArmLGroup);
const bossArmL = new THREE.Mesh(new THREE.BoxGeometry(0.9, 3.0, 0.9), bossArmorMat);
bossArmL.position.y = -1.5;
bossArmL.castShadow = true;
bossArmLGroup.add(bossArmL);
// left hand — fist
const bossFistL = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.1, 1.2), bossArmorMat);
bossFistL.position.y = -3.3;
bossFistL.castShadow = true;
bossArmLGroup.add(bossFistL);

const bossArmRGroup = new THREE.Group();
bossArmRGroup.position.set(1.9, 6.3, 0);
boss.add(bossArmRGroup);
const bossArmR = new THREE.Mesh(new THREE.BoxGeometry(0.9, 3.0, 0.9), bossArmorMat);
bossArmR.position.y = -1.5;
bossArmR.castShadow = true;
bossArmRGroup.add(bossArmR);
// Giant hammer in right hand
const hammerGroup = new THREE.Group();
hammerGroup.position.y = -3.1;
bossArmRGroup.add(hammerGroup);

const hammerShaft = new THREE.Mesh(
  new THREE.CylinderGeometry(0.18, 0.18, 3.5, 8),
  new THREE.MeshStandardMaterial({ color: 0x2a1810, roughness: 0.85 })
);
hammerShaft.position.y = -1.2;
hammerShaft.castShadow = true;
hammerGroup.add(hammerShaft);

const hammerHead = new THREE.Mesh(
  new THREE.BoxGeometry(1.6, 1.3, 1.6),
  new THREE.MeshStandardMaterial({ color: 0x4a4a4a, roughness: 0.5, metalness: 0.7 })
);
hammerHead.position.y = -2.8;
hammerHead.castShadow = true;
hammerGroup.add(hammerHead);

// Legs
const bossLegL = new THREE.Mesh(new THREE.BoxGeometry(1.0, 3.2, 1.0), bossArmorMat);
bossLegL.position.set(-0.8, 1.6, 0);
bossLegL.castShadow = true;
boss.add(bossLegL);
const bossLegR = bossLegL.clone();
bossLegR.position.x = 0.8;
boss.add(bossLegR);

// Boss state
const bState = {
  pos: new THREE.Vector3(0, 0, -6),
  vel: new THREE.Vector3(),
  facing: Math.PI,
  hp: 500, hpMax: 500,
  state: 'idle', // idle | chasing | telegraph | attack | recover | stagger | dead
  stateTimer: 0,
  attackType: 0, // 0 = hammer slam, 1 = sweep, 2 = stomp
  attackLanded: false,
  armSwing: 0,
  legSwing: 0,
};

boss.position.copy(bState.pos);

// ============================================================
// Input
// ============================================================
const keys = {};
let mouseDX = 0;
let mouseLocked = false;
let camYaw = 0;   // camera orbit around player
let camPitch = 0.3;

document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if ((e.code === 'ShiftLeft' || e.code === 'ShiftRight' || e.code === 'Space') && !e.repeat) tryDodge();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });
document.addEventListener('mousemove', e => {
  if (!mouseLocked) return;
  camYaw   -= e.movementX * 0.0028;
  camPitch -= e.movementY * 0.0022;
  camPitch = Math.max(-0.15, Math.min(0.9, camPitch));
});
document.addEventListener('pointerlockchange', () => {
  mouseLocked = document.pointerLockElement === renderer.domElement;
});
renderer.domElement.addEventListener('mousedown', e => {
  if (!mouseLocked) { renderer.domElement.requestPointerLock(); return; }
  if (e.button === 0) tryAttack();
});

// ============================================================
// Gameplay
// ============================================================
function tryDodge() {
  if (!gameRunning) return;
  if (pState.dodgeTimer > 0) return;
  if (pState.stam < 30) return;
  pState.stam -= 30;
  pState.dodgeTimer = 0.5;
  pState.iframes = 0.35;
  // dodge direction — input if any, else backward
  const fwd = new THREE.Vector3(-Math.sin(camYaw), 0, -Math.cos(camYaw));
  const right = new THREE.Vector3(Math.cos(camYaw), 0, -Math.sin(camYaw));
  let dx = 0, dz = 0;
  if (keys['KeyW']) { dx += fwd.x; dz += fwd.z; }
  if (keys['KeyS']) { dx -= fwd.x; dz -= fwd.z; }
  if (keys['KeyD']) { dx += right.x; dz += right.z; }
  if (keys['KeyA']) { dx -= right.x; dz -= right.z; }
  if (dx === 0 && dz === 0) { dx = -fwd.x; dz = -fwd.z; } // backdash
  const len = Math.hypot(dx, dz) || 1;
  pState.dodgeDir.set(dx/len, 0, dz/len);
}

function tryAttack() {
  if (!gameRunning) return;
  if (pState.attackCooldown > 0) return;
  if (pState.dodgeTimer > 0) return;
  if (pState.stam < 15) return;
  pState.stam -= 15;
  pState.attackTimer = 0.45;
  pState.attackCooldown = 0.55;
  pState.attackHitReg = false;
}

// Vignette flash
const vignetteEl = document.getElementById('vignette');
function damagePlayer(amount) {
  if (pState.iframes > 0) return;
  pState.hp -= amount;
  pState.hitstun = 0.25;
  vignetteEl.classList.add('hit');
  setTimeout(() => vignetteEl.classList.remove('hit'), 200);
  if (pState.hp <= 0) {
    pState.hp = 0;
    loseGame();
  }
}
function damageBoss(amount) {
  bState.hp -= amount;
  if (bState.hp <= 0) {
    bState.hp = 0;
    bState.state = 'dead';
    winGame();
  }
}

// ============================================================
// Boss AI
// ============================================================
function updateBoss(dt) {
  if (bState.state === 'dead') {
    // slump
    boss.rotation.z = THREE.MathUtils.lerp(boss.rotation.z, -0.8, dt * 1.2);
    boss.position.y = THREE.MathUtils.lerp(boss.position.y, -1.5, dt * 1.2);
    return;
  }

  const toPlayer = new THREE.Vector3().subVectors(pState.pos, bState.pos);
  toPlayer.y = 0;
  const dist = toPlayer.length();
  const targetFacing = Math.atan2(toPlayer.x, toPlayer.z);

  // face player (slow)
  if (bState.state !== 'attack') {
    let df = targetFacing - bState.facing;
    while (df > Math.PI) df -= Math.PI*2;
    while (df < -Math.PI) df += Math.PI*2;
    bState.facing += Math.sign(df) * Math.min(Math.abs(df), dt * 1.8);
  }

  bState.stateTimer -= dt;

  if (bState.state === 'idle' || bState.state === 'chasing') {
    // Chase player
    if (dist > 4) {
      const dir = toPlayer.clone().normalize();
      bState.pos.x += dir.x * 2.2 * dt;
      bState.pos.z += dir.z * 2.2 * dt;
      bState.legSwing += dt * 4;
      bState.state = 'chasing';
    } else {
      bState.legSwing *= 0.9;
    }
    // start an attack when close enough
    if (dist < 6.5 && bState.stateTimer <= 0) {
      bState.state = 'telegraph';
      bState.stateTimer = 0.9;
      bState.attackType = Math.random() < 0.55 ? 0 : (Math.random() < 0.5 ? 1 : 2);
      bState.attackLanded = false;
    }
  } else if (bState.state === 'telegraph') {
    if (bState.stateTimer <= 0) {
      bState.state = 'attack';
      bState.stateTimer = 0.35;
    }
  } else if (bState.state === 'attack') {
    // damage window: mid of attack
    if (!bState.attackLanded && bState.stateTimer < 0.25) {
      // area check
      let hitRange = 6, hitArc = 1.2;
      if (bState.attackType === 1) { hitRange = 7.5; hitArc = 2.2; } // sweep wider
      if (bState.attackType === 2) { hitRange = 5.5; hitArc = Math.PI * 2; } // stomp: circle
      const bossToP = new THREE.Vector3().subVectors(pState.pos, bState.pos); bossToP.y = 0;
      const d = bossToP.length();
      if (d < hitRange) {
        if (bState.attackType === 2) {
          damagePlayer(20);
        } else {
          const ang = Math.atan2(bossToP.x, bossToP.z);
          let df = ang - bState.facing;
          while (df > Math.PI) df -= Math.PI*2;
          while (df < -Math.PI) df += Math.PI*2;
          if (Math.abs(df) < hitArc) damagePlayer(bState.attackType === 1 ? 18 : 22);
        }
      }
      bState.attackLanded = true;
    }
    if (bState.stateTimer <= 0) {
      bState.state = 'recover';
      bState.stateTimer = 0.8;
    }
  } else if (bState.state === 'recover') {
    if (bState.stateTimer <= 0) {
      bState.state = 'idle';
      bState.stateTimer = 0.4;
    }
  }

  // arena containment
  const bdist = Math.hypot(bState.pos.x, bState.pos.z);
  if (bdist > ARENA_RADIUS - 2.5) {
    const k = (ARENA_RADIUS - 2.5) / bdist;
    bState.pos.x *= k;
    bState.pos.z *= k;
  }

  // apply transform
  boss.position.x = bState.pos.x;
  boss.position.z = bState.pos.z;
  boss.rotation.y = bState.facing;

  // Animate
  // idle breathing
  const bob = Math.sin(performance.now() * 0.003) * 0.08;
  if (bState.state !== 'dead') boss.position.y = bob;

  // Arm swing — based on attack state
  let armRTarget = 0, armLTarget = 0;
  if (bState.state === 'telegraph') {
    // raise hammer way up
    armRTarget = -2.3; // tilt back
    armLTarget = 0.2;
    // glow eyes brighter
    eyeMat.color.setHex(0xff6040);
  } else if (bState.state === 'attack') {
    if (bState.attackType === 0) {
      // hammer slam down
      const t = 1 - Math.max(0, bState.stateTimer / 0.35);
      armRTarget = -2.3 + t * 3.5;
    } else if (bState.attackType === 1) {
      // sweep — swing arm from side
      const t = 1 - Math.max(0, bState.stateTimer / 0.35);
      armRTarget = -0.8;
      bossArmRGroup.rotation.y = -1.5 + t * 3;
    } else {
      // stomp — raise leg & slam
      const t = 1 - Math.max(0, bState.stateTimer / 0.35);
      bossLegR.position.y = 1.6 + Math.sin(t * Math.PI) * 1.5;
    }
  } else {
    eyeMat.color.setHex(0xff3020);
    bossArmRGroup.rotation.y = 0;
    bossLegR.position.y = 1.6;
  }
  bossArmRGroup.rotation.x = THREE.MathUtils.lerp(bossArmRGroup.rotation.x, armRTarget, dt * 10);
  bossArmLGroup.rotation.x = THREE.MathUtils.lerp(bossArmLGroup.rotation.x, armLTarget + Math.sin(bState.legSwing) * 0.3, dt * 8);

  // leg swing while walking
  bossLegL.rotation.x = Math.sin(bState.legSwing) * 0.3;
  if (bState.state !== 'attack' || bState.attackType !== 2) {
    bossLegR.rotation.x = -Math.sin(bState.legSwing) * 0.3;
  }
}

// ============================================================
// Player update
// ============================================================
function updatePlayer(dt) {
  if (!gameRunning) return;

  // Stamina regen
  if (pState.stam < pState.stamMax) {
    pState.stam = Math.min(pState.stamMax, pState.stam + 25 * dt);
  }
  if (pState.iframes > 0) pState.iframes -= dt;
  if (pState.hitstun > 0) pState.hitstun -= dt;
  if (pState.attackCooldown > 0) pState.attackCooldown -= dt;

  if (pState.dodgeTimer > 0) {
    pState.dodgeTimer -= dt;
    pState.pos.x += pState.dodgeDir.x * 11 * dt;
    pState.pos.z += pState.dodgeDir.z * 11 * dt;
  } else if (pState.hitstun <= 0) {
    // Movement from input
    const fwd = new THREE.Vector3(-Math.sin(camYaw), 0, -Math.cos(camYaw));
    const right = new THREE.Vector3(Math.cos(camYaw), 0, -Math.sin(camYaw));
    let dx = 0, dz = 0;
    if (keys['KeyW']) { dx += fwd.x; dz += fwd.z; }
    if (keys['KeyS']) { dx -= fwd.x; dz -= fwd.z; }
    if (keys['KeyD']) { dx += right.x; dz += right.z; }
    if (keys['KeyA']) { dx -= right.x; dz -= right.z; }
    const len = Math.hypot(dx, dz);
    if (len > 0) {
      dx = dx/len; dz = dz/len;
      const speed = 5.5;
      pState.pos.x += dx * speed * dt;
      pState.pos.z += dz * speed * dt;
      // face direction of movement
      const targetFace = Math.atan2(dx, dz);
      let df = targetFace - pState.facing;
      while (df > Math.PI) df -= Math.PI*2;
      while (df < -Math.PI) df += Math.PI*2;
      pState.facing += Math.sign(df) * Math.min(Math.abs(df), dt * 10);
    }
  }

  // Arena containment
  const pdist = Math.hypot(pState.pos.x, pState.pos.z);
  if (pdist > ARENA_RADIUS - 0.5) {
    const k = (ARENA_RADIUS - 0.5) / pdist;
    pState.pos.x *= k;
    pState.pos.z *= k;
  }

  // Attack animation + hit reg
  if (pState.attackTimer > 0) {
    pState.attackTimer -= dt;
    const t = 1 - pState.attackTimer / 0.45; // 0..1
    // swing
    swordPivot.rotation.x = -0.2 + Math.sin(t * Math.PI) * -2.6;
    swordPivot.rotation.z = 0.3 + Math.sin(t * Math.PI) * -1.2;
    // apply damage mid-swing once
    if (!pState.attackHitReg && t > 0.35 && t < 0.65) {
      pState.attackHitReg = true;
      // check if boss is in front within range
      const toB = new THREE.Vector3().subVectors(bState.pos, pState.pos);
      toB.y = 0;
      const d = toB.length();
      if (d < 5.5 && bState.state !== 'dead') {
        const ang = Math.atan2(toB.x, toB.z);
        let df = ang - pState.facing;
        while (df > Math.PI) df -= Math.PI*2;
        while (df < -Math.PI) df += Math.PI*2;
        if (Math.abs(df) < 0.9) {
          damageBoss(12);
          // flash boss
          bossTorso.material.emissive = new THREE.Color(0x330000);
          setTimeout(() => bossTorso.material.emissive = new THREE.Color(0x000000), 100);
        }
      }
    }
  } else {
    swordPivot.rotation.x = THREE.MathUtils.lerp(swordPivot.rotation.x, -0.2, dt * 8);
    swordPivot.rotation.z = THREE.MathUtils.lerp(swordPivot.rotation.z, 0.3, dt * 8);
  }

  // Dodge roll visual: tilt body
  if (pState.dodgeTimer > 0) {
    const t = 1 - pState.dodgeTimer / 0.5;
    player.rotation.x = Math.sin(t * Math.PI) * -1.6;
    // flash player during iframes
    torso.material.emissive = new THREE.Color(0x443322);
  } else {
    player.rotation.x = THREE.MathUtils.lerp(player.rotation.x, 0, dt * 10);
    torso.material.emissive = new THREE.Color(0x000000);
  }

  // Walking leg bob
  const moving = !!(keys['KeyW']||keys['KeyA']||keys['KeyS']||keys['KeyD']) && pState.dodgeTimer <= 0;
  const t = performance.now() * 0.012;
  if (moving) {
    legL.rotation.x = Math.sin(t) * 0.5;
    legR.rotation.x = -Math.sin(t) * 0.5;
    armL.rotation.x = -Math.sin(t) * 0.4;
  } else {
    legL.rotation.x = THREE.MathUtils.lerp(legL.rotation.x, 0, dt * 8);
    legR.rotation.x = THREE.MathUtils.lerp(legR.rotation.x, 0, dt * 8);
    armL.rotation.x = THREE.MathUtils.lerp(armL.rotation.x, 0, dt * 8);
  }

  // Apply transform
  player.position.copy(pState.pos);
  player.rotation.y = pState.facing;
}

// ============================================================
// Camera — third-person orbit behind player
// ============================================================
function updateCamera() {
  const dist = 6.5;
  const height = 2.5;
  const off = new THREE.Vector3(
    Math.sin(camYaw) * Math.cos(camPitch) * dist,
    Math.sin(camPitch) * dist + height,
    Math.cos(camYaw) * Math.cos(camPitch) * dist
  );
  const target = new THREE.Vector3().copy(pState.pos).add(new THREE.Vector3(0, 1.3, 0));
  const desired = new THREE.Vector3().copy(target).add(off);

  // smooth follow
  camera.position.lerp(desired, 0.2);
  camera.lookAt(target);

  // move torch to between player and boss
  torch.position.set(
    (pState.pos.x + bState.pos.x) / 2,
    6 + Math.sin(performance.now() * 0.003) * 0.3,
    (pState.pos.z + bState.pos.z) / 2
  );
  torch.intensity = 2.0 + Math.sin(performance.now() * 0.01) * 0.3;
}

// ============================================================
// Flame flicker
// ============================================================
function flickerFlames() {
  arenaGroup.traverse(o => {
    if (o.userData && o.userData.baseY !== undefined) {
      const t = performance.now() * 0.006 + o.userData.phase;
      o.position.y = o.userData.baseY + Math.sin(t) * 0.05;
      o.scale.y = 1 + Math.sin(t * 1.7) * 0.15;
    }
  });
}

// ============================================================
// HUD
// ============================================================
const playerFill = document.getElementById('playerFill');
const stamFill = document.getElementById('stamFill');
const bossFill = document.getElementById('bossFill');
const bossHPEl = document.getElementById('bossHPEl');
const announce = document.getElementById('announce');

function updateHUD() {
  playerFill.style.width = (pState.hp / pState.hpMax * 100) + '%';
  stamFill.style.width   = (pState.stam / pState.stamMax * 100) + '%';
  bossFill.style.width   = (bState.hp / bState.hpMax * 100) + '%';
}

let gameRunning = false;

function winGame() {
  gameRunning = false;
  announce.innerHTML = 'VICTORY<span class="sub">The Colossus falls</span>';
  announce.className = 'announce victory show';
  document.exitPointerLock();
}
function loseGame() {
  gameRunning = false;
  announce.innerHTML = 'YOU DIED<span class="sub">Click to try again</span>';
  announce.className = 'announce defeat show';
  document.exitPointerLock();
  // Click to restart
  setTimeout(() => {
    document.addEventListener('click', restart, { once: true });
  }, 1000);
}
function restart() {
  pState.pos.set(0, 0, 6);
  pState.hp = pState.hpMax;
  pState.stam = pState.stamMax;
  pState.iframes = 0; pState.dodgeTimer = 0; pState.attackTimer = 0; pState.attackCooldown = 0; pState.hitstun = 0;
  bState.pos.set(0, 0, -6);
  bState.hp = bState.hpMax;
  bState.state = 'idle';
  bState.stateTimer = 1.2;
  boss.rotation.z = 0;
  boss.position.y = 0;
  announce.classList.remove('show');
  gameRunning = true;
  renderer.domElement.requestPointerLock();
}

// ============================================================
// Start
// ============================================================
document.getElementById('startBtn').addEventListener('click', () => {
  document.getElementById('start').style.display = 'none';
  bossHPEl.classList.add('active');
  gameRunning = true;
  renderer.domElement.requestPointerLock();
});

// ============================================================
// Main loop
// ============================================================
let lastT = performance.now();
function loop(now) {
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;

  updatePlayer(dt);
  updateBoss(dt);
  updateCamera();
  flickerFlames();
  updateHUD();

  renderer.render(scene, camera);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
