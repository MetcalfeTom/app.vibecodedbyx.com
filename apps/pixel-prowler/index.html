<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1">
<title>Pixel Prowler</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%91%BB?style=twitter">
<meta name="description" content="Dark pixel-art stealth horror. Swipe the real relics, dodge the guard, survive the jump scares.">
<meta property="og:title" content="Pixel Prowler">
<meta property="og:description" content="A dark pixel-art stealth horror. Not every relic is real. Not every shadow is empty.">
<meta property="og:url" content="https://sloppy.live/pixel-prowler">
<meta property="og:image" content="https://image.pollinations.ai/prompt/dark%20pixelart%20horror%20stealth%20thief%20sneaking%20past%20guard%20red%20vision%20cone%20cursed%20relic%20vault%2016bit%20crimson%20purple%20scanlines%20static%20jumpscare?width=1200&height=630&nologo=true">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Silkscreen&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #05040d;
    --ink: #b7b1d6;
    --accent: #f5c542;
    --accent2: #6ee7f5;
    --alert: #ff3344;
    --wall: #2a1b3d;
    --wall-hi: #3d2a55;
    --madness: 0;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: radial-gradient(ellipse at center, #0d081f 0%, #05040d 70%);
    color: var(--ink);
    font-family: 'VT323', monospace;
    -webkit-font-smoothing: none;
    user-select: none;
    touch-action: none;
  }
  .app {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 12px;
  }
  .frame {
    position: relative;
    border: 3px solid var(--wall-hi);
    box-shadow:
      0 0 0 1px #000,
      0 0 28px rgba(255, 40, 60, calc(0.12 + var(--madness) * 0.6)),
      inset 0 0 0 1px #000;
    background: var(--bg);
    width: 100%;
    max-width: 820px;
    display: flex; flex-direction: column;
    transition: box-shadow 0.25s, transform 0.06s;
  }
  .frame.shake { animation: shake 0.35s steps(6) 1; }
  @keyframes shake {
    0% { transform: translate(0,0); }
    20% { transform: translate(-4px, 3px) rotate(-0.3deg); }
    40% { transform: translate(3px, -4px) rotate(0.3deg); }
    60% { transform: translate(-3px, -2px); }
    80% { transform: translate(4px, 2px); }
    100% { transform: translate(0,0); }
  }
  .hud {
    display: flex; justify-content: space-between; align-items: center;
    padding: 7px 10px; background: #0a0614;
    border-bottom: 1px solid #1a1028;
    font-family: 'Silkscreen', monospace;
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.12em;
    color: #8a85a9; flex-shrink: 0; gap: 8px; flex-wrap: wrap;
  }
  .hud .title {
    color: var(--accent); font-family: 'Press Start 2P', monospace;
    font-size: 10px; letter-spacing: 0.03em;
  }
  .hud .title b { color: var(--alert); }
  .hud .stat { display: inline-flex; gap: 6px; align-items: center; }
  .hud .val {
    color: var(--accent2); font-family: 'VT323', monospace;
    font-size: 18px; min-width: 28px; text-align: center;
  }
  .hud .val.warn { color: var(--alert); animation: blink 0.5s steps(2) infinite; }
  .hud .val.spot { color: var(--accent); }
  @keyframes blink { 0%,50% { opacity: 1; } 51%,100% { opacity: 0.25; } }
  .madness-bar {
    position: relative; width: 60px; height: 6px;
    background: #160a14; border: 1px solid #2a1028;
  }
  .madness-bar > i {
    display: block; height: 100%;
    width: calc(var(--madness) * 100%);
    background: linear-gradient(90deg, #4a0808, #d41818 80%, #ff4040);
    box-shadow: 0 0 6px rgba(255,50,50,0.7);
    transition: width 0.4s;
  }
  .stage {
    position: relative; width: 100%;
    aspect-ratio: 26/19; overflow: hidden;
    background: #05040d;
  }
  canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
  }
  #game { z-index: 1; }
  #static {
    z-index: 3;
    mix-blend-mode: screen;
    opacity: calc(0.35 + var(--madness) * 0.25);
    pointer-events: none;
  }
  .red-overlay {
    position: absolute; inset: 0;
    z-index: 4; pointer-events: none;
    background:
      radial-gradient(ellipse at center, transparent 30%, rgba(180, 10, 20, calc(0.15 + var(--madness) * 0.7)) 100%),
      linear-gradient(rgba(140, 6, 12, calc(var(--madness) * 0.15)), rgba(140, 6, 12, calc(var(--madness) * 0.15)));
  }
  .scanlines {
    position: absolute; inset: 0; z-index: 5; pointer-events: none;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0,
      transparent 2px,
      rgba(0,0,0,0.25) 3px,
      transparent 4px
    );
    opacity: calc(0.35 + var(--madness) * 0.25);
  }
  .vignette {
    position: absolute; inset: 0; z-index: 6; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.75) 100%);
  }
  .alert-flash {
    position: absolute; inset: 0; z-index: 7; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(255,40,50,0.45) 100%);
    opacity: 0; transition: opacity 0.18s;
  }
  .alert-flash.on { opacity: 1; }
  .overlay {
    position: absolute; inset: 0; z-index: 12;
    background: rgba(5,4,13,0.93);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 28px; text-align: center;
  }
  .overlay.hidden { display: none; }
  .overlay .intro-title {
    font-family: 'Press Start 2P', monospace;
    color: var(--accent);
    font-size: clamp(22px, 5vw, 42px);
    margin-bottom: 6px;
    text-shadow: 3px 3px 0 #1a0a30, 6px 6px 0 #430819;
    letter-spacing: 0.04em; line-height: 1.2;
  }
  .overlay .intro-title .prowl { color: var(--accent2); }
  .overlay .intro-title em { color: var(--alert); font-style: normal; }
  .overlay .intro-sub {
    font-family: 'VT323', monospace;
    font-size: clamp(18px, 2.8vw, 26px);
    color: var(--alert);
    margin-bottom: 16px; letter-spacing: 0.04em;
  }
  .overlay p {
    font-family: 'VT323', monospace;
    font-size: clamp(15px, 2.3vw, 21px);
    color: #b7b1d6; max-width: 520px;
    margin-bottom: 6px; line-height: 1.3;
  }
  .overlay p.hint { color: #8a85a9; font-size: 15px; }
  .overlay kbd {
    font-family: 'Silkscreen', monospace;
    background: #1a1028; border: 1px solid #3d2a55;
    color: var(--accent2); padding: 2px 6px; margin: 0 2px;
    border-radius: 2px; font-size: 10px; text-transform: uppercase;
  }
  .btn {
    font-family: 'Press Start 2P', monospace;
    background: var(--accent); color: #1a0a30;
    border: none; padding: 12px 22px;
    font-size: 12px; letter-spacing: 0.05em;
    cursor: pointer; margin-top: 14px;
    box-shadow: 4px 4px 0 #2a1b3d, 4px 4px 0 2px #000;
    transition: transform 0.08s;
  }
  .btn:hover { transform: translate(-2px,-2px); box-shadow: 6px 6px 0 #2a1b3d, 6px 6px 0 2px #000; }
  .btn:active { transform: translate(2px,2px); box-shadow: 2px 2px 0 #2a1b3d, 2px 2px 0 2px #000; }
  .btn.danger { background: var(--alert); color: #1a0408; }
  .summary {
    display: flex; gap: 22px; margin: 12px 0;
    font-family: 'VT323', monospace; color: var(--accent2); font-size: 22px;
  }
  .summary span small {
    display: block; font-family: 'Silkscreen', monospace;
    font-size: 10px; color: #8a85a9;
    text-transform: uppercase; letter-spacing: 0.1em;
  }
  #scare {
    position: absolute; inset: 0; z-index: 20;
    pointer-events: none;
    opacity: 0; transform: scale(0.5);
    transition: opacity 0.1s;
    background: radial-gradient(ellipse at center, #6a0000 0%, #1a0000 60%, #000 100%);
  }
  #scare.active {
    opacity: 1; transform: scale(1);
    animation: scarePulse 0.7s steps(3) 1;
  }
  @keyframes scarePulse {
    0% { transform: scale(0.5); opacity: 0; filter: hue-rotate(0deg); }
    10% { transform: scale(1.15); opacity: 1; }
    40% { transform: scale(0.96); filter: hue-rotate(-15deg); }
    70% { transform: scale(1.05); filter: hue-rotate(10deg); }
    100% { transform: scale(1); opacity: 1; filter: hue-rotate(0deg); }
  }
  /* touch controls */
  .touch {
    position: absolute; bottom: 0; left: 0; right: 0;
    display: none; justify-content: space-between; align-items: flex-end;
    padding: 14px 18px 22px; pointer-events: none; z-index: 8;
  }
  .touch > * { pointer-events: auto; }
  .dpad { position: relative; width: 140px; height: 140px; }
  .dpad button {
    position: absolute; width: 46px; height: 46px;
    background: rgba(40,25,65,0.7);
    border: 2px solid var(--wall-hi);
    color: var(--accent2);
    font-family: 'Silkscreen', monospace;
    font-size: 18px; border-radius: 6px;
    backdrop-filter: blur(4px);
  }
  .dpad button:active { background: rgba(80,45,120,0.8); color: var(--accent); }
  .dpad .up { top: 0; left: 47px; }
  .dpad .down { bottom: 0; left: 47px; }
  .dpad .left { top: 47px; left: 0; }
  .dpad .right { top: 47px; right: 0; }
  .sneak {
    width: 84px; height: 84px;
    background: rgba(40,25,65,0.7);
    border: 2px solid var(--wall-hi);
    color: var(--accent); font-family: 'Silkscreen', monospace;
    font-size: 10px; letter-spacing: 0.1em;
    border-radius: 50%; backdrop-filter: blur(4px);
  }
  .sneak:active { background: rgba(140,90,20,0.8); color: #fff; }
  @media (hover: none) and (pointer: coarse) {
    .touch { display: flex; }
    .hud { font-size: 9px; }
    .hud .val { font-size: 16px; }
  }
</style>
</head>
<body>
<div class="app">
  <div class="frame" id="frame">
    <div class="hud">
      <div class="title">PIXEL <b>PROWLER</b></div>
      <div class="stat">TIME <span class="val" id="hud-time">75</span></div>
      <div class="stat">LOOT <span class="val" id="hud-loot">0/6</span></div>
      <div class="stat">ALERT <span class="val" id="hud-alert">—</span></div>
      <div class="stat">DREAD <div class="madness-bar"><i></i></div></div>
      <div class="stat"><button id="audio-toggle" style="background:none;border:1px solid #3d2a55;color:var(--accent2);font-family:'Silkscreen',monospace;font-size:9px;padding:4px 6px;cursor:pointer">♪ ON</button></div>
    </div>
    <div class="stage">
      <canvas id="game"></canvas>
      <canvas id="static"></canvas>
      <div class="red-overlay"></div>
      <div class="scanlines"></div>
      <div class="vignette"></div>
      <div class="alert-flash" id="alert-flash"></div>
      <canvas id="scare"></canvas>
      <div class="overlay" id="overlay">
        <div class="intro-title">PIXEL <span class="prowl">PROWLER</span></div>
        <div class="intro-sub">— not every relic is real —</div>
        <p>Six real relics glimmer in the dark. Two are cursed bait. Grab the gold, avoid the fakes, and stay out of the guard's cone before the clock burns out.</p>
        <p class="hint"><kbd>WASD</kbd>/<kbd>Arrows</kbd> move · <kbd>Shift</kbd> tiptoe · <kbd>P</kbd> pause</p>
        <button class="btn" id="start-btn">Enter the Vault</button>
      </div>
    </div>
    <div class="touch">
      <div class="dpad">
        <button class="up" data-dir="up">▲</button>
        <button class="down" data-dir="down">▼</button>
        <button class="left" data-dir="left">◀</button>
        <button class="right" data-dir="right">▶</button>
      </div>
      <button class="sneak" id="sneak-btn">SNEAK</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ============== MAP ==============
const MAP = [
  'WWWWWWWWWWWWWWWWWWWWWWWWWW', //  0
  'W........................W', //  1
  'W..WWWW..........WWWW....W', //  2
  'W..W$.W..........W$.W....W', //  3
  'W..W..W..........W..W....W', //  4
  'W..WW.W.....F....WW.W....W', //  5
  'W........................W', //  6
  'W......WWWWWWWW..........W', //  7
  'W......W......W...$......W', //  8
  'W......W..$...W..........W', //  9
  'W......W......W..........W', // 10
  'W......WWW.WWWW..........W', // 11
  'W............G...........W', // 12
  'W..WWWW..................W', // 13
  'W..W$.W......F.......$...W', // 14
  'W..W..W..................W', // 15
  'W..WW.W..................W', // 16
  'WP.......................W', // 17
  'WWWWWWWWWWWWWWWWWWWWWWWWWW', // 18
];
const TS = 16;
const MAP_W = MAP[0].length;   // 26
const MAP_H = MAP.length;      // 19
const CW = MAP_W * TS;          // 416
const CH = MAP_H * TS;          // 304

const walls = new Set();
for (let y = 0; y < MAP_H; y++) {
  for (let x = 0; x < MAP_W; x++) {
    if (MAP[y][x] === 'W') walls.add(y * MAP_W + x);
  }
}
function isWall(tx, ty) {
  return tx < 0 || ty < 0 || tx >= MAP_W || ty >= MAP_H || walls.has(ty * MAP_W + tx);
}

// ============== STATE ==============
const state = {
  player: null,
  guard: null,
  items: [],
  realTotal: 0,
  realTaken: 0,
  particles: [],
  torches: [],
  timeLeft: 75,
  alertLevel: 0,
  caught: false,
  won: false,
  paused: false,
  running: false,
  keys: {},
  time: 0,
  proximity: 0,
  madness: 0,
  audioOn: true,
  lastFootstep: 0,
};

function init() {
  state.items = [];
  let px = 1.5, py = 17.5, gx = 13.5, gy = 12.5;
  for (let y = 0; y < MAP_H; y++) {
    for (let x = 0; x < MAP_W; x++) {
      const c = MAP[y][x];
      if (c === 'P') { px = x + 0.5; py = y + 0.5; }
      else if (c === 'G') { gx = x + 0.5; gy = y + 0.5; }
      else if (c === '$') state.items.push({ x: (x + 0.5) * TS, y: (y + 0.5) * TS, taken: false, fake: false, twinkle: Math.random() * Math.PI * 2 });
      else if (c === 'F') state.items.push({ x: (x + 0.5) * TS, y: (y + 0.5) * TS, taken: false, fake: true, twinkle: Math.random() * Math.PI * 2 });
    }
  }
  state.realTotal = state.items.filter(i => !i.fake).length;
  state.realTaken = 0;
  state.player = { x: px * TS, y: py * TS, r: 4.5, dir: { x: 0, y: -1 }, step: 0 };
  state.guard = {
    x: gx * TS, y: gy * TS, r: 5, dir: { x: 1, y: 0 },
    waypoints: [
      { x: 16 * TS + 8, y: 12 * TS + 8 },
      { x: 22 * TS + 8, y: 12 * TS + 8 },
      { x: 22 * TS + 8, y: 6 * TS + 8 },
      { x: 16 * TS + 8, y: 6 * TS + 8 },
    ],
    wpIdx: 0, pauseT: 0, scanBase: null, step: 0,
    coneRange: 80, coneHalf: 0.45,
  };
  state.torches = [
    { x: 2.5 * TS, y: 1.5 * TS }, { x: 23.5 * TS, y: 1.5 * TS },
    { x: 2.5 * TS, y: 17.5 * TS }, { x: 23.5 * TS, y: 17.5 * TS },
    { x: 13.5 * TS, y: 6.5 * TS },
  ];
  state.particles = [];
  state.timeLeft = 75;
  state.alertLevel = 0;
  state.caught = false;
  state.won = false;
  state.paused = false;
  state.time = 0;
  state.proximity = 0;
  state.madness = 0;
  updateMadnessCSS();
}

function updateMadnessCSS() {
  document.documentElement.style.setProperty('--madness', state.madness.toFixed(3));
}

// ============== AUDIO ==============
let ac = null;
let masterGain = null;
let droneNodes = null;
let staticNodes = null;

function ensureAC() {
  if (!ac) {
    ac = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = ac.createGain();
    masterGain.gain.value = state.audioOn ? 1 : 0;
    masterGain.connect(ac.destination);
  }
  return ac;
}

function makeNoiseBuffer(seconds) {
  const c = ensureAC();
  const buf = c.createBuffer(1, c.sampleRate * seconds, c.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  return buf;
}

function startDrone() {
  if (droneNodes) return;
  const c = ensureAC();
  const bus = c.createGain(); bus.gain.value = 0.0;
  // fade in
  bus.gain.linearRampToValueAtTime(0.16, c.currentTime + 1.8);
  const lp = c.createBiquadFilter();
  lp.type = 'lowpass';
  lp.frequency.value = 360;
  lp.Q.value = 3.2;
  // LFO sweeping filter
  const lfo = c.createOscillator();
  lfo.type = 'sine';
  lfo.frequency.value = 0.07;
  const lfoGain = c.createGain();
  lfoGain.gain.value = 160;
  lfo.connect(lfoGain);
  lfoGain.connect(lp.frequency);
  lfo.start();
  // convolver reverb
  const conv = c.createConvolver();
  const rbuf = c.createBuffer(2, c.sampleRate * 3.4, c.sampleRate);
  for (let ch = 0; ch < 2; ch++) {
    const d = rbuf.getChannelData(ch);
    for (let i = 0; i < d.length; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 2.1);
    }
  }
  conv.buffer = rbuf;
  const wet = c.createGain(); wet.gain.value = 0.45;
  const dry = c.createGain(); dry.gain.value = 0.6;
  lp.connect(dry).connect(bus);
  lp.connect(conv).connect(wet).connect(bus);
  bus.connect(masterGain);
  const voices = [lfo];
  const freqs = [41.2, 55, 82.4, 110, 164.8];
  freqs.forEach((f, i) => {
    const o1 = c.createOscillator(); o1.type = 'sine'; o1.frequency.value = f;
    const o2 = c.createOscillator(); o2.type = i % 2 ? 'triangle' : 'sawtooth'; o2.frequency.value = f * 1.005;
    const vg = c.createGain(); vg.gain.value = 0.14;
    o1.connect(vg); o2.connect(vg);
    vg.connect(lp);
    // slow per-voice detune LFO
    const dLfo = c.createOscillator();
    dLfo.frequency.value = 0.03 + Math.random() * 0.08;
    const dG = c.createGain();
    dG.gain.value = 0.6 + Math.random() * 1.8;
    dLfo.connect(dG).connect(o1.detune);
    o1.start(); o2.start(); dLfo.start();
    voices.push(o1, o2, dLfo);
  });
  // occasional "ghost" random high tone
  droneNodes = { bus, voices, lp };
}

function stopDrone() {
  if (!droneNodes) return;
  const c = ensureAC();
  droneNodes.bus.gain.cancelScheduledValues(c.currentTime);
  droneNodes.bus.gain.linearRampToValueAtTime(0, c.currentTime + 0.4);
  setTimeout(() => {
    if (!droneNodes) return;
    droneNodes.voices.forEach(v => { try { v.stop(); } catch (e) {} });
    droneNodes = null;
  }, 500);
}

function startStatic() {
  if (staticNodes) return;
  const c = ensureAC();
  const src = c.createBufferSource();
  src.buffer = makeNoiseBuffer(2);
  src.loop = true;
  const hp = c.createBiquadFilter();
  hp.type = 'highpass'; hp.frequency.value = 1200; hp.Q.value = 0.4;
  const bp = c.createBiquadFilter();
  bp.type = 'bandpass'; bp.frequency.value = 2600; bp.Q.value = 0.6;
  const g = c.createGain(); g.gain.value = 0.015;
  src.connect(hp).connect(bp).connect(g).connect(masterGain);
  src.start();
  staticNodes = { src, gain: g };
}

function stopStatic() {
  if (!staticNodes) return;
  const c = ensureAC();
  staticNodes.gain.gain.cancelScheduledValues(c.currentTime);
  staticNodes.gain.gain.linearRampToValueAtTime(0, c.currentTime + 0.3);
  setTimeout(() => {
    if (!staticNodes) return;
    try { staticNodes.src.stop(); } catch(e) {}
    staticNodes = null;
  }, 400);
}

function setStaticProximity(prox) {
  if (!staticNodes) return;
  const target = 0.018 + prox * 0.18 + state.madness * 0.05;
  const c = ensureAC();
  staticNodes.gain.gain.linearRampToValueAtTime(target, c.currentTime + 0.08);
}

function sfxPickup(isGood) {
  const c = ensureAC();
  const f1 = isGood ? 880 : 180;
  const f2 = isGood ? 1320 : 90;
  [ [f1, 0, 0.12, 'triangle', 0.2], [f2, 70, 0.14, 'triangle', 0.18] ].forEach(([f, delay, dur, type, vol]) => {
    setTimeout(() => {
      const o = c.createOscillator(); const g = c.createGain();
      o.type = type; o.frequency.value = f;
      g.gain.setValueAtTime(vol, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + dur);
      o.connect(g).connect(masterGain);
      o.start(); o.stop(c.currentTime + dur);
    }, delay);
  });
}

function sfxFootstep() {
  const c = ensureAC();
  const src = c.createBufferSource();
  src.buffer = makeNoiseBuffer(0.05);
  const f = c.createBiquadFilter();
  f.type = 'bandpass'; f.frequency.value = 300; f.Q.value = 1.5;
  const g = c.createGain(); g.gain.value = 0.08;
  g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.08);
  src.connect(f).connect(g).connect(masterGain);
  src.start(); src.stop(c.currentTime + 0.08);
}

function sfxAlert() {
  const c = ensureAC();
  const o = c.createOscillator(); const g = c.createGain();
  o.type = 'square'; o.frequency.value = 720;
  g.gain.setValueAtTime(0.14, c.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.1);
  o.connect(g).connect(masterGain);
  o.start(); o.stop(c.currentTime + 0.1);
}

function sfxWin() {
  [523.25, 659.25, 783.99, 1046.5].forEach((f, i) => {
    setTimeout(() => {
      const c = ensureAC();
      const o = c.createOscillator(); const g = c.createGain();
      o.type = 'triangle'; o.frequency.value = f;
      g.gain.setValueAtTime(0.24, c.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.28);
      o.connect(g).connect(masterGain);
      o.start(); o.stop(c.currentTime + 0.28);
    }, i * 140);
  });
}

function scream() {
  const c = ensureAC();
  // brutal noise burst
  const src = c.createBufferSource();
  src.buffer = makeNoiseBuffer(0.65);
  const bp = c.createBiquadFilter();
  bp.type = 'bandpass'; bp.frequency.value = 1600; bp.Q.value = 1.1;
  // sweep bandpass downward
  bp.frequency.exponentialRampToValueAtTime(300, c.currentTime + 0.6);
  const nGain = c.createGain();
  nGain.gain.setValueAtTime(0.52, c.currentTime);
  nGain.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.65);
  src.connect(bp).connect(nGain).connect(masterGain);
  src.start(); src.stop(c.currentTime + 0.7);
  // descending saw
  const ws = c.createWaveShaper();
  const curve = new Float32Array(256);
  for (let i = 0; i < 256; i++) { const x = i / 128 - 1; curve[i] = Math.tanh(x * 4); }
  ws.curve = curve;
  const o = c.createOscillator();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(900, c.currentTime);
  o.frequency.exponentialRampToValueAtTime(70, c.currentTime + 0.55);
  const og = c.createGain();
  og.gain.setValueAtTime(0.3, c.currentTime);
  og.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.6);
  o.connect(ws).connect(og).connect(masterGain);
  o.start(); o.stop(c.currentTime + 0.62);
  // high square shriek
  const h = c.createOscillator();
  h.type = 'square'; h.frequency.value = 2000;
  h.frequency.exponentialRampToValueAtTime(500, c.currentTime + 0.35);
  const hg = c.createGain();
  hg.gain.setValueAtTime(0.14, c.currentTime);
  hg.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.36);
  h.connect(hg).connect(masterGain);
  h.start(); h.stop(c.currentTime + 0.38);
  // sub thud
  const s = c.createOscillator();
  s.type = 'sine'; s.frequency.setValueAtTime(80, c.currentTime);
  s.frequency.exponentialRampToValueAtTime(40, c.currentTime + 0.5);
  const sg = c.createGain();
  sg.gain.setValueAtTime(0.45, c.currentTime);
  sg.gain.exponentialRampToValueAtTime(0.001, c.currentTime + 0.55);
  s.connect(sg).connect(masterGain);
  s.start(); s.stop(c.currentTime + 0.6);
}

function setAudioOn(on) {
  state.audioOn = on;
  if (!ac) return;
  masterGain.gain.linearRampToValueAtTime(on ? 1 : 0, ac.currentTime + 0.2);
}

// ============== UPDATE ==============
function movePlayer(dt) {
  const p = state.player;
  let ax = 0, ay = 0;
  if (state.keys.left) ax -= 1;
  if (state.keys.right) ax += 1;
  if (state.keys.up) ay -= 1;
  if (state.keys.down) ay += 1;
  if (ax || ay) {
    const m = Math.hypot(ax, ay);
    ax /= m; ay /= m;
    p.dir.x = ax; p.dir.y = ay;
    const speed = state.keys.sneak ? 42 : 72;
    const nx = p.x + ax * speed * dt;
    const ny = p.y + ay * speed * dt;
    if (!playerCollides(nx, p.y)) p.x = nx;
    if (!playerCollides(p.x, ny)) p.y = ny;
    p.step += speed * dt * 0.08;
    if (!state.keys.sneak && state.time - state.lastFootstep > 0.32) {
      sfxFootstep();
      state.lastFootstep = state.time;
    }
  } else {
    p.step *= 0.9;
  }
}

function playerCollides(x, y) {
  const r = state.player.r;
  const pts = [[x - r, y - r], [x + r, y - r], [x - r, y + r], [x + r, y + r]];
  for (const [tx, ty] of pts) {
    if (isWall(Math.floor(tx / TS), Math.floor(ty / TS))) return true;
  }
  return false;
}

function updateGuard(dt) {
  const g = state.guard;
  if (g.pauseT > 0) {
    g.pauseT -= dt;
    if (g.scanBase === null) g.scanBase = Math.atan2(g.dir.y, g.dir.x);
    const a = g.scanBase + Math.sin(state.time * 2.4) * 0.45;
    g.dir.x = Math.cos(a); g.dir.y = Math.sin(a);
    g.step *= 0.9;
    return;
  }
  g.scanBase = null;
  const wp = g.waypoints[g.wpIdx];
  const dx = wp.x - g.x, dy = wp.y - g.y;
  const d = Math.hypot(dx, dy);
  if (d < 2) {
    g.wpIdx = (g.wpIdx + 1) % g.waypoints.length;
    g.pauseT = 0.8;
    return;
  }
  const speed = 38;
  const nx = dx / d, ny = dy / d;
  g.dir.x = g.dir.x + (nx - g.dir.x) * 0.18;
  g.dir.y = g.dir.y + (ny - g.dir.y) * 0.18;
  const dm = Math.hypot(g.dir.x, g.dir.y) || 1;
  g.dir.x /= dm; g.dir.y /= dm;
  g.x += nx * speed * dt;
  g.y += ny * speed * dt;
  g.step += speed * dt * 0.08;
}

function checkVision() {
  const g = state.guard;
  const p = state.player;
  const dx = p.x - g.x, dy = p.y - g.y;
  const d = Math.hypot(dx, dy);
  if (d > g.coneRange) return false;
  const gAng = Math.atan2(g.dir.y, g.dir.x);
  const pAng = Math.atan2(dy, dx);
  let da = pAng - gAng;
  while (da > Math.PI) da -= Math.PI * 2;
  while (da < -Math.PI) da += Math.PI * 2;
  if (Math.abs(da) > g.coneHalf) return false;
  const steps = Math.ceil(d / 3);
  for (let i = 1; i < steps; i++) {
    const t = i / steps;
    const tx = Math.floor((g.x + dx * t) / TS);
    const ty = Math.floor((g.y + dy * t) / TS);
    if (isWall(tx, ty)) return false;
  }
  return true;
}

function updateAlert(dt) {
  const seen = checkVision();
  if (seen) {
    if (state.alertLevel < 0.2) sfxAlert();
    state.alertLevel = Math.min(1, state.alertLevel + dt / 0.55);
    if (state.alertLevel >= 1 && !state.caught) {
      state.caught = true;
      state.running = false;
      jumpScare('caught');
      setTimeout(() => showOverlay('lose', 'spot'), 650);
    }
  } else {
    state.alertLevel = Math.max(0, state.alertLevel - dt / 1.1);
  }
}

function updateProximity() {
  const dx = state.player.x - state.guard.x;
  const dy = state.player.y - state.guard.y;
  const d = Math.hypot(dx, dy);
  const prox = Math.max(0, Math.min(1, 1 - d / 180));
  state.proximity = state.proximity + (prox - state.proximity) * 0.12;
  setStaticProximity(state.proximity);
}

function checkItems() {
  const p = state.player;
  for (const it of state.items) {
    if (it.taken) continue;
    const d = Math.hypot(it.x - p.x, it.y - p.y);
    if (d < p.r + 5) {
      it.taken = true;
      if (it.fake) {
        sfxPickup(false);
        jumpScare('fake');
        state.timeLeft = Math.max(0, state.timeLeft - 8);
        state.alertLevel = Math.min(1, state.alertLevel + 0.2);
        spawnParticles(it.x, it.y, 18, ['#7a0a14', '#2a0406', '#c61a22']);
      } else {
        sfxPickup(true);
        state.realTaken++;
        state.madness = state.realTaken / state.realTotal;
        updateMadnessCSS();
        spawnParticles(it.x, it.y, 18, ['#f5c542', '#fff5c0']);
      }
    }
  }
  if (state.realTaken >= state.realTotal && !state.won && !state.caught) {
    state.won = true;
    state.running = false;
    sfxWin();
    setTimeout(() => showOverlay('win'), 250);
  }
}

function spawnParticles(x, y, n, colors) {
  for (let i = 0; i < n; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 18 + Math.random() * 44;
    state.particles.push({
      x, y,
      vx: Math.cos(a) * s, vy: Math.sin(a) * s,
      life: 1, size: 1 + Math.floor(Math.random() * 2),
      color: colors[Math.floor(Math.random() * colors.length)],
    });
  }
}

function updateParticles(dt) {
  for (let i = state.particles.length - 1; i >= 0; i--) {
    const p = state.particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.92; p.vy *= 0.92;
    p.life -= dt * 1.5;
    if (p.life <= 0) state.particles.splice(i, 1);
  }
}

// ============== RENDER ==============
const canvas = document.getElementById('game');
canvas.width = CW; canvas.height = CH;
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const staticCanvas = document.getElementById('static');
const staticCtx = staticCanvas.getContext('2d');
staticCanvas.width = 96; staticCanvas.height = 72;
staticCtx.imageSmoothingEnabled = false;

function draw() {
  ctx.clearRect(0, 0, CW, CH);
  // subtle screen tremor tied to madness + alert
  const trem = state.madness * 1.4 + state.alertLevel * 1.2;
  const ox = (Math.random() - 0.5) * trem;
  const oy = (Math.random() - 0.5) * trem;
  ctx.save();
  ctx.translate(ox, oy);

  // ---- FLOOR + WALLS ----
  for (let y = 0; y < MAP_H; y++) {
    for (let x = 0; x < MAP_W; x++) {
      const c = MAP[y][x];
      const wx = x * TS, wy = y * TS;
      if (c === 'W') {
        ctx.fillStyle = '#2a1b3d';
        ctx.fillRect(wx, wy, TS, TS);
        // top highlight
        ctx.fillStyle = '#3d2a55';
        ctx.fillRect(wx, wy, TS, 1);
        ctx.fillRect(wx, wy, 1, TS);
        // bottom shade
        ctx.fillStyle = '#150a20';
        ctx.fillRect(wx, wy + TS - 1, TS, 1);
        ctx.fillRect(wx + TS - 1, wy, 1, TS);
        // brick mark
        if ((x + y) & 1) {
          ctx.fillStyle = '#36254a';
          ctx.fillRect(wx + 4, wy + 5, 2, 2);
          ctx.fillRect(wx + 10, wy + 10, 2, 2);
        }
      } else {
        ctx.fillStyle = '#0e0a18';
        ctx.fillRect(wx, wy, TS, TS);
        // grid lines
        ctx.fillStyle = '#1a1028';
        ctx.fillRect(wx, wy, TS, 1);
        ctx.fillRect(wx, wy, 1, TS);
        // floor stipple
        if ((x * 7 + y * 13) % 5 === 0) {
          ctx.fillStyle = '#1b1532';
          ctx.fillRect(wx + 7, wy + 7, 2, 2);
        }
      }
    }
  }

  // ---- TORCHES ----
  for (const t of state.torches) {
    const flick = 0.8 + Math.sin(state.time * 11 + t.x * 0.7) * 0.12 + Math.random() * 0.12;
    const r = 40 * flick;
    const grad = ctx.createRadialGradient(t.x, t.y, 0, t.x, t.y, r);
    grad.addColorStop(0, 'rgba(245,170,60,0.28)');
    grad.addColorStop(0.5, 'rgba(180,40,60,0.12)');
    grad.addColorStop(1, 'rgba(180,40,60,0)');
    ctx.fillStyle = grad;
    ctx.fillRect(t.x - r, t.y - r, r * 2, r * 2);
    // flame
    ctx.fillStyle = '#f5c542';
    ctx.fillRect(t.x - 1, t.y - 2, 2, 3);
    ctx.fillStyle = '#ff8844';
    ctx.fillRect(t.x - 1, t.y - 3, 2, 1);
  }

  // ---- VISION CONE ----
  drawCone();

  // ---- ITEMS ----
  for (const it of state.items) {
    if (it.taken) continue;
    it.twinkle += 0.07;
    const pulse = 1 + Math.sin(it.twinkle) * (it.fake ? 0.55 : 0.35);
    const rGlow = 16 * pulse;
    const color = it.fake ? 'rgba(200,40,50,' : 'rgba(245,197,66,';
    const grad = ctx.createRadialGradient(it.x, it.y, 0, it.x, it.y, rGlow);
    grad.addColorStop(0, color + '0.36)');
    grad.addColorStop(1, color + '0)');
    ctx.fillStyle = grad;
    ctx.fillRect(it.x - rGlow, it.y - rGlow, rGlow * 2, rGlow * 2);
    // gem diamond shape
    const xr = Math.round(it.x), yr = Math.round(it.y);
    if (it.fake) {
      // cursed gem — slightly off, darker/red core
      ctx.fillStyle = '#b89a2a';
      ctx.fillRect(xr - 3, yr - 2, 6, 4);
      ctx.fillRect(xr - 2, yr - 3, 4, 6);
      // tiny red pulse core
      const corePulse = (Math.sin(it.twinkle * 2.7) + 1) / 2;
      ctx.fillStyle = `rgba(${200 + corePulse * 55}, ${20 + corePulse * 40}, 20, 1)`;
      ctx.fillRect(xr - 1, yr - 1, 2, 2);
      // flicker glitch
      if (Math.random() < 0.04) {
        ctx.fillStyle = '#8a0a14';
        ctx.fillRect(xr - 3, yr - 2 + Math.floor(Math.random() * 4), 6, 1);
      }
    } else {
      ctx.fillStyle = '#f5c542';
      ctx.fillRect(xr - 3, yr - 2, 6, 4);
      ctx.fillRect(xr - 2, yr - 3, 4, 6);
      ctx.fillStyle = '#fff5c0';
      ctx.fillRect(xr - 1, yr - 2, 1, 1);
    }
  }

  // ---- PLAYER ----
  drawPlayer();

  // ---- GUARD ----
  drawGuard();

  // ---- PARTICLES ----
  for (const p of state.particles) {
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.fillStyle = p.color;
    ctx.fillRect(Math.round(p.x), Math.round(p.y), p.size, p.size);
  }
  ctx.globalAlpha = 1;

  ctx.restore();

  // ---- STATIC OVERLAY ----
  drawStaticOverlay();
}

function drawCone() {
  const g = state.guard;
  const seen = checkVision();
  const intensity = state.alertLevel;
  const r = seen ? 255 : 245, gg = seen ? 60 : 180, bb = seen ? 70 : 80;
  const alpha = 0.18 + intensity * 0.3;
  ctx.fillStyle = `rgba(${r},${gg},${bb},${alpha})`;
  ctx.beginPath();
  ctx.moveTo(g.x, g.y);
  const steps = 20;
  const ang = Math.atan2(g.dir.y, g.dir.x);
  for (let i = 0; i <= steps; i++) {
    const t = i / steps;
    const a = ang - g.coneHalf + t * g.coneHalf * 2;
    const dx = Math.cos(a), dy = Math.sin(a);
    let rr = 2;
    while (rr < g.coneRange) {
      rr += 2;
      const nx = g.x + dx * rr, ny = g.y + dy * rr;
      if (isWall(Math.floor(nx / TS), Math.floor(ny / TS))) break;
    }
    ctx.lineTo(g.x + dx * rr, g.y + dy * rr);
  }
  ctx.closePath();
  ctx.fill();
}

function drawPlayer() {
  const p = state.player;
  const sn = state.keys.sneak;
  const bob = Math.round(Math.sin(p.step) * 0.6);
  const x = Math.round(p.x - 4), y = Math.round(p.y - 6 + bob);
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(x, y + 13, 8, 2);
  // hood
  ctx.fillStyle = '#1a243d';
  ctx.fillRect(x + 1, y, 6, 3);
  ctx.fillRect(x, y + 2, 8, 4);
  // face
  ctx.fillStyle = '#6ee7f5';
  ctx.fillRect(x + 2, y + 3, 4, 2);
  // eyes
  ctx.fillStyle = '#000';
  ctx.fillRect(x + 2, y + 4, 1, 1);
  ctx.fillRect(x + 5, y + 4, 1, 1);
  // torso
  ctx.fillStyle = '#1d2745';
  ctx.fillRect(x + 1, y + 6, 6, 4);
  ctx.fillStyle = '#2d3a5f';
  ctx.fillRect(x + 1, y + 6, 1, 4);
  // legs
  ctx.fillStyle = '#10172a';
  const legBob = Math.round(Math.sin(p.step) * (sn ? 0.5 : 0.9));
  ctx.fillRect(x + 1, y + 10, 2, 3 + legBob);
  ctx.fillRect(x + 5, y + 10, 2, 3 - legBob);
  // sneak indicator — dim halo
  if (sn) {
    ctx.fillStyle = 'rgba(110,231,245,0.08)';
    ctx.fillRect(x - 2, y - 2, 12, 18);
  }
}

function drawGuard() {
  const g = state.guard;
  const bob = Math.round(Math.sin(g.step) * 0.6);
  const x = Math.round(g.x - 4), y = Math.round(g.y - 7 + bob);
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fillRect(x, y + 13, 8, 2);
  // helmet
  ctx.fillStyle = '#c23030';
  ctx.fillRect(x + 1, y, 6, 2);
  ctx.fillRect(x, y + 2, 8, 3);
  // visor
  ctx.fillStyle = '#1a0408';
  ctx.fillRect(x + 1, y + 3, 6, 1);
  // face
  ctx.fillStyle = '#d4a087';
  ctx.fillRect(x + 2, y + 4, 4, 1);
  // torso
  ctx.fillStyle = '#8a1e1e';
  ctx.fillRect(x + 1, y + 5, 6, 5);
  // belt
  ctx.fillStyle = '#3a1010';
  ctx.fillRect(x + 1, y + 9, 6, 1);
  // badge
  ctx.fillStyle = '#f5c542';
  ctx.fillRect(x + 3, y + 7, 2, 1);
  if ((Math.floor(state.time * 6)) & 1) {
    ctx.fillStyle = '#fff5c0';
    ctx.fillRect(x + 3, y + 7, 1, 1);
  }
  // legs
  ctx.fillStyle = '#2a0808';
  const legBob = Math.round(Math.sin(g.step) * 0.9);
  ctx.fillRect(x + 1, y + 10, 2, 3 + legBob);
  ctx.fillRect(x + 5, y + 10, 2, 3 - legBob);
  // flashlight indicator at front
  const fx = g.x + g.dir.x * 5;
  const fy = g.y + g.dir.y * 5;
  ctx.fillStyle = '#f5d060';
  ctx.fillRect(Math.round(fx), Math.round(fy), 1, 1);
}

function drawStaticOverlay() {
  const W = staticCanvas.width, H = staticCanvas.height;
  const img = staticCtx.createImageData(W, H);
  const intensity = 0.35 + state.proximity * 0.45 + state.madness * 0.2;
  for (let i = 0; i < img.data.length; i += 4) {
    const v = Math.random() * 255;
    img.data[i] = v;
    img.data[i + 1] = v;
    img.data[i + 2] = v;
    img.data[i + 3] = 40 + intensity * 180 * Math.random();
  }
  staticCtx.putImageData(img, 0, 0);
}

// ============== HUD ==============
function updateHUD() {
  document.getElementById('hud-time').textContent = Math.max(0, Math.ceil(state.timeLeft));
  document.getElementById('hud-time').classList.toggle('warn', state.timeLeft < 15 && state.running);
  document.getElementById('hud-loot').textContent = state.realTaken + '/' + state.realTotal;
  const alertEl = document.getElementById('hud-alert');
  alertEl.classList.remove('warn', 'spot');
  if (state.alertLevel > 0.7) { alertEl.textContent = 'SEEN'; alertEl.classList.add('warn'); }
  else if (state.alertLevel > 0.15) { alertEl.textContent = 'SPOT'; alertEl.classList.add('spot'); }
  else { alertEl.textContent = '—'; }
  document.getElementById('alert-flash').classList.toggle('on', state.alertLevel > 0.35 && state.running);
}

// ============== LOOP ==============
let lastT = 0;
function loop(t) {
  requestAnimationFrame(loop);
  const dt = Math.min(0.05, (t - lastT) / 1000 || 0);
  lastT = t;
  state.time += dt;
  if (state.running && !state.paused) {
    movePlayer(dt);
    updateGuard(dt);
    updateAlert(dt);
    updateProximity();
    updateParticles(dt);
    checkItems();
    state.timeLeft -= dt;
    if (state.timeLeft <= 0 && !state.caught && !state.won) {
      state.timeLeft = 0;
      state.caught = true;
      state.running = false;
      jumpScare('time');
      setTimeout(() => showOverlay('lose', 'time'), 550);
    }
    updateHUD();
  }
  draw();
}
requestAnimationFrame(loop);

// ============== OVERLAYS ==============
const overlayEl = document.getElementById('overlay');

function showOverlay(kind, reason) {
  const items = state.realTotal;
  const taken = state.realTaken;
  const timeLeft = Math.max(0, Math.ceil(state.timeLeft));
  if (kind === 'win') {
    overlayEl.innerHTML = `
      <div class="intro-title">CLEAN <span class="prowl">GETAWAY</span></div>
      <div class="intro-sub" style="color:#6ee7f5">— you vanished into the dark —</div>
      <p>Six real relics. Zero real guards spotted you. The vault will remember a ghost.</p>
      <div class="summary">
        <span><small>Loot</small>${taken}/${items}</span>
        <span><small>Left</small>${timeLeft}s</span>
      </div>
      <p class="hint">press <kbd>R</kbd> or tap below</p>
      <button class="btn" id="start-btn">Steal Again</button>
    `;
  } else {
    let sub = 'the cone caught the glint of your hood';
    if (reason === 'time') sub = 'the sun rose and the alarm sang';
    else if (reason === 'fake') sub = 'the cursed relic opened its eye';
    overlayEl.innerHTML = `
      <div class="intro-title">BUSTED<em>.</em></div>
      <div class="intro-sub">— ${sub} —</div>
      <div class="summary">
        <span><small>Real Loot</small>${taken}/${items}</span>
        <span><small>Time</small>${timeLeft}s</span>
        <span><small>Dread</small>${Math.round(state.madness * 100)}%</span>
      </div>
      <p class="hint">press <kbd>R</kbd> or tap below</p>
      <button class="btn danger" id="start-btn">Try Again</button>
    `;
  }
  overlayEl.classList.remove('hidden');
  document.getElementById('start-btn').addEventListener('click', startGame);
}

function startGame() {
  overlayEl.classList.add('hidden');
  init();
  state.running = true;
  ensureAC();
  startDrone();
  startStatic();
  setAudioOn(state.audioOn);
}

// ============== INPUT ==============
const KEYMAP = {
  'ArrowLeft': 'left', 'KeyA': 'left',
  'ArrowRight': 'right', 'KeyD': 'right',
  'ArrowUp': 'up', 'KeyW': 'up',
  'ArrowDown': 'down', 'KeyS': 'down',
  'ShiftLeft': 'sneak', 'ShiftRight': 'sneak',
};
document.addEventListener('keydown', e => {
  const k = KEYMAP[e.code];
  if (k) { state.keys[k] = true; e.preventDefault(); }
  if (e.code === 'KeyP') {
    if (state.running) state.paused = !state.paused;
  }
  if (e.code === 'KeyR') {
    if (!state.running || state.caught || state.won) startGame();
  }
  if (e.code === 'KeyM') {
    setAudioOn(!state.audioOn);
    document.getElementById('audio-toggle').textContent = state.audioOn ? '♪ ON' : '♪ OFF';
  }
});
document.addEventListener('keyup', e => {
  const k = KEYMAP[e.code];
  if (k) state.keys[k] = false;
});

document.querySelectorAll('.dpad button').forEach(btn => {
  const dir = btn.dataset.dir;
  const on = e => { state.keys[dir] = true; e.preventDefault(); };
  const off = e => { state.keys[dir] = false; };
  btn.addEventListener('pointerdown', on);
  btn.addEventListener('pointerup', off);
  btn.addEventListener('pointercancel', off);
  btn.addEventListener('pointerleave', off);
});
const sneakBtn = document.getElementById('sneak-btn');
sneakBtn.addEventListener('pointerdown', e => { state.keys.sneak = true; e.preventDefault(); });
sneakBtn.addEventListener('pointerup', e => { state.keys.sneak = false; });
sneakBtn.addEventListener('pointercancel', e => { state.keys.sneak = false; });

document.getElementById('audio-toggle').addEventListener('click', () => {
  setAudioOn(!state.audioOn);
  document.getElementById('audio-toggle').textContent = state.audioOn ? '♪ ON' : '♪ OFF';
});

document.getElementById('start-btn').addEventListener('click', startGame);

// initial silent render so background shows before start
init();
</script>
</body>
</html>
