<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>AI Slop Generator</title>
<meta name="description" content="Generate over-saturated AI-flavoured motivational posters that say absolutely nothing." />
<meta property="og:title" content="AI Slop Generator" />
<meta property="og:description" content="Generate over-saturated AI-flavoured motivational posters that say absolutely nothing." />
<meta property="og:url" content="https://sloppy.live/ai-slop-generator/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/AI%20generated%20motivational%20poster%20mountain%20sunset%20lens%20flare%20over%20saturated%20colours%20stock%20photo%20HUGE%20bold%20text%20LinkedIn%20hustle%20culture%20meaningless%20slogan?width=1200&height=630&model=flux&nologo=true&seed=42096" />
<meta property="og:type" content="website" />
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%92%AA" type="image/png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bungee&family=Anton&family=Bricolage+Grotesque:opsz,wght@12..96,300..800&family=Caveat:wght@700&family=Fraunces:ital,wght@1,300&display=swap" />
<style>
:root{
  --bg-a: #0f0a18;
  --bg-b: #2c1840;
  --ink: #f6e8ff;
  --dim: #a890c8;
  --pink: #ff2db4;
  --cyan: #2df0ff;
  --amber: #ffba1a;
  --lime: #b8ff5a;
}
*{ box-sizing: border-box; }
html, body{ overscroll-behavior: none; }
html{ font-size: 100%; }
body{
  margin: 0;
  min-height: 100vh;
  font-family: 'Bricolage Grotesque', system-ui, sans-serif;
  color: var(--ink);
  background:
    radial-gradient(circle at 18% 12%, rgba(255, 45, 180, 0.30), transparent 38%),
    radial-gradient(circle at 86% 22%, rgba(45, 240, 255, 0.24), transparent 38%),
    radial-gradient(circle at 80% 90%, rgba(184, 255, 90, 0.20), transparent 42%),
    linear-gradient(180deg, var(--bg-a) 0%, var(--bg-b) 60%, var(--bg-a) 100%);
  background-attachment: fixed;
  padding: 2rem 1rem 3rem;
  display: flex;
  flex-direction: column;
  align-items: center;
}
main{
  max-width: 56rem;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
}

/* ── HERO ── */
header{ text-align: center; }
header h1{
  margin: 0;
  font-family: 'Bungee', cursive;
  font-size: clamp(2rem, 7vw, 3.4rem);
  letter-spacing: 0.02em;
  line-height: 0.95;
  background: linear-gradient(96deg, #ff2db4 0%, #ffba1a 50%, #b8ff5a 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-shadow: 0 0 22px rgba(255, 45, 180, 0.45);
  filter: drop-shadow(0 4px 0 rgba(0,0,0,0.35));
}
header h1 .em{ -webkit-text-fill-color: var(--cyan); color: var(--cyan); }
header .tag{
  margin-top: 0.4rem;
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 300;
  font-size: clamp(0.95rem, 2.5vw, 1.25rem);
  color: var(--dim);
}
header .tag b{ color: var(--amber); font-family: 'Bungee', cursive; font-style: normal; font-size: 0.86em; }

/* ── POSTER ── */
.poster-wrap{
  width: 100%;
  max-width: 24rem;
  aspect-ratio: 4 / 5;
  position: relative;
  border-radius: 12px;
  overflow: hidden;
  box-shadow:
    0 0 0 4px rgba(255, 45, 180, 0.30),
    0 0 60px rgba(45, 240, 255, 0.30),
    0 30px 60px rgba(0,0,0,0.55);
  transition: transform 0.18s cubic-bezier(.5,1.3,.5,1);
}
.poster-wrap.flash{ animation: flashPop 0.45s cubic-bezier(.34,1.40,.50,1); }
@keyframes flashPop{
  0%{ transform: scale(0.92) rotate(-1.5deg); opacity: 0.65; filter: brightness(1.4); }
  60%{ transform: scale(1.05) rotate(0.8deg); opacity: 1; filter: brightness(1.1); }
  100%{ transform: scale(1) rotate(0); opacity: 1; filter: brightness(1); }
}
.poster{
  position: absolute;
  inset: 0;
  background-color: #1a0028;
  background-size: cover;
  background-position: center;
  /* heavy saturation + contrast — the iconic AI-slop look */
  filter: saturate(1.55) contrast(1.18) brightness(0.85);
  transition: background-image 0.3s, filter 0.3s;
}
.poster.loading{
  background:
    repeating-linear-gradient(45deg, #2c1840 0 12px, #1a0a2a 12px 24px);
  filter: none;
}
.overlay-tint{
  position: absolute;
  inset: 0;
  /* layered tints to push contrast + add cinematic vignette */
  background:
    linear-gradient(180deg, rgba(0,0,0,0.30) 0%, transparent 35%, transparent 60%, rgba(0,0,0,0.55) 100%),
    radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,0.45) 100%);
  mix-blend-mode: multiply;
}
.overlay-color{
  position: absolute;
  inset: 0;
  background: linear-gradient(180deg, rgba(255, 100, 0, 0.18), rgba(80, 0, 120, 0.20));
  mix-blend-mode: overlay;
}
.poster-text{
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 1.6rem 1.2rem;
  text-align: center;
  color: #fff;
}
.poster-text .slogan{
  font-family: 'Anton', sans-serif;
  font-weight: 400;
  font-size: clamp(1.6rem, 6vw, 2.4rem);
  line-height: 0.95;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  text-shadow:
    0 0 18px rgba(0, 0, 0, 0.85),
    0 4px 0 rgba(0, 0, 0, 0.55),
    0 0 40px rgba(255, 60, 200, 0.45);
  margin: 0 0 0.6rem;
  word-break: break-word;
}
.poster-text .subtitle{
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 700;
  font-size: clamp(0.92rem, 2vw, 1.1rem);
  letter-spacing: 0.04em;
  color: rgba(255, 245, 220, 0.95);
  text-shadow: 0 0 12px rgba(0,0,0,0.85), 0 2px 0 rgba(0,0,0,0.55);
  font-style: italic;
  max-width: 90%;
}
.poster-meta{
  position: absolute;
  bottom: 0.7rem;
  left: 0.9rem;
  right: 0.9rem;
  display: flex;
  justify-content: space-between;
  align-items: flex-end;
  pointer-events: none;
}
.poster-meta .author{
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 700;
  font-size: 0.72rem;
  color: #fff;
  text-shadow: 0 0 8px rgba(0,0,0,0.85);
  text-align: right;
  line-height: 1.25;
}
.poster-meta .author small{
  display: block;
  font-weight: 400;
  font-size: 0.62rem;
  color: rgba(255,245,220,0.78);
}
.poster-meta .logo{
  font-family: 'Bungee', cursive;
  font-size: 0.72rem;
  letter-spacing: 0.10em;
  color: var(--cyan);
  background: rgba(0,0,0,0.55);
  padding: 0.2rem 0.5rem;
  border-radius: 4px;
  border: 1px solid rgba(255,255,255,0.30);
  text-shadow: 0 0 6px rgba(45, 240, 255, 0.85);
}
/* the over-cooked sun-flare */
.lens-flare{
  position: absolute;
  top: 12%;
  right: 18%;
  width: 4rem;
  height: 4rem;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(255,255,255,0.85) 0%, rgba(255,200,80,0.55) 30%, transparent 70%);
  filter: blur(2px);
  pointer-events: none;
  mix-blend-mode: screen;
  opacity: 0.65;
}

/* ── CONTROLS ── */
.controls{
  display: flex;
  flex-wrap: wrap;
  gap: 0.5rem;
  justify-content: center;
  width: 100%;
  max-width: 28rem;
}
.btn{
  background: var(--pink);
  color: #fff;
  border: 2px solid #fff;
  font-family: 'Bungee', cursive;
  font-size: 0.84rem;
  letter-spacing: 0.04em;
  padding: 0.65rem 1.1rem;
  border-radius: 999px;
  cursor: pointer;
  min-height: 2.75rem;
  box-shadow:
    0 0 0 2px var(--pink),
    0 0 20px rgba(255, 45, 180, 0.45),
    0 6px 0 rgba(0,0,0,0.50);
  transition: transform 0.12s, box-shadow 0.12s;
  text-transform: uppercase;
}
.btn:hover{ transform: translateY(-2px); box-shadow: 0 0 0 2px var(--pink), 0 0 28px rgba(255, 45, 180, 0.65), 0 8px 0 rgba(0,0,0,0.50); }
.btn:active{ transform: translateY(2px); box-shadow: 0 0 0 2px var(--pink), 0 0 14px rgba(255,45,180,0.35), 0 3px 0 rgba(0,0,0,0.50); }
.btn:disabled{ filter: grayscale(0.55) brightness(0.7); cursor: not-allowed; }
.btn.alt{ background: var(--cyan); color: var(--bg-a); box-shadow: 0 0 0 2px var(--cyan), 0 0 20px rgba(45,240,255,0.45), 0 6px 0 rgba(0,0,0,0.50); }
.btn.alt:hover{ box-shadow: 0 0 0 2px var(--cyan), 0 0 28px rgba(45,240,255,0.65), 0 8px 0 rgba(0,0,0,0.50); }
.btn.amber{ background: var(--amber); color: var(--bg-a); box-shadow: 0 0 0 2px var(--amber), 0 0 20px rgba(255,186,26,0.50), 0 6px 0 rgba(0,0,0,0.50); }
.btn.ghost{ background: transparent; color: var(--dim); border-color: var(--dim); box-shadow: 0 0 0 2px transparent, 0 6px 0 transparent; }
.btn.ghost:hover{ color: #fff; border-color: #fff; box-shadow: 0 0 0 2px transparent, 0 6px 0 rgba(255,255,255,0.20); }
*:focus-visible{ outline: 3px solid var(--amber); outline-offset: 3px; }

/* ── STYLE PICKER ── */
.style-row{
  display: flex;
  gap: 0.4rem;
  flex-wrap: wrap;
  justify-content: center;
  font-family: 'Bricolage Grotesque', sans-serif;
}
.style-chip{
  background: rgba(255,255,255,0.10);
  color: var(--ink);
  border: 1.5px solid rgba(255,255,255,0.25);
  padding: 0.34rem 0.75rem;
  border-radius: 999px;
  font-size: 0.78rem;
  letter-spacing: 0.04em;
  cursor: pointer;
  font-family: inherit;
  font-weight: 700;
  transition: background 0.18s, border-color 0.18s, color 0.18s;
}
.style-chip:hover{ background: rgba(255,255,255,0.18); border-color: var(--amber); }
.style-chip[aria-pressed="true"]{ background: var(--amber); color: var(--bg-a); border-color: var(--amber); }
.style-chip .em{ margin-right: 0.18rem; }

/* ── GALLERY ── */
.gallery-head{
  font-family: 'Bungee', cursive;
  font-size: 0.84rem;
  letter-spacing: 0.10em;
  color: var(--dim);
  text-transform: uppercase;
  margin-top: 0.6rem;
}
.gallery{
  width: 100%;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(8rem, 1fr));
  gap: 0.5rem;
}
.thumb{
  position: relative;
  aspect-ratio: 4 / 5;
  border-radius: 8px;
  overflow: hidden;
  cursor: pointer;
  background: #1a0028 center / cover;
  filter: saturate(1.5) contrast(1.15) brightness(0.88);
  border: 2px solid rgba(255,255,255,0.18);
  box-shadow: 0 4px 14px rgba(0,0,0,0.45);
  transition: transform 0.12s, border-color 0.18s, box-shadow 0.18s;
}
.thumb:hover{ transform: translateY(-2px); border-color: var(--pink); box-shadow: 0 6px 22px rgba(255,45,180,0.45); }
.thumb::after{
  content: attr(data-slogan);
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0.4rem 0.5rem;
  text-align: center;
  font-family: 'Anton', sans-serif;
  text-transform: uppercase;
  font-size: 0.74rem;
  color: #fff;
  text-shadow: 0 0 10px rgba(0,0,0,0.95), 0 2px 0 rgba(0,0,0,0.55);
  line-height: 0.95;
  letter-spacing: 0.04em;
  background: linear-gradient(180deg, rgba(0,0,0,0.25) 0%, transparent 35%, transparent 60%, rgba(0,0,0,0.55) 100%);
}

/* ── TOAST ── */
#toast{
  position: fixed;
  bottom: 1rem;
  left: 50%;
  transform: translate(-50%, 0.5rem);
  background: var(--bg-a);
  color: var(--amber);
  font-family: 'Bungee', cursive;
  font-size: 0.86rem;
  padding: 0.5rem 1rem;
  border-radius: 999px;
  border: 2px solid var(--amber);
  box-shadow: 0 0 0 1px var(--amber), 0 8px 24px rgba(255, 186, 26, 0.45);
  opacity: 0;
  pointer-events: none;
  z-index: 60;
  transition: opacity 0.22s, transform 0.22s;
}
#toast.show{ opacity: 1; transform: translate(-50%, 0); }

footer{
  margin-top: 0.5rem;
  text-align: center;
  color: var(--dim);
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 0.9rem;
}
footer .credit{ color: var(--pink); }

@media (prefers-reduced-motion: reduce){
  *{ animation: none !important; transition: none !important; }
}
</style>
</head>
<body>

<main>
  <header>
    <h1>AI SLOP <span class="em">GENERATOR</span></h1>
    <p class="tag">over-saturated motivational posters that <b>mean</b> nothing · pumped out on demand</p>
  </header>

  <div class="style-row" role="group" aria-label="poster style">
    <button class="style-chip" type="button" data-style="hustle" aria-pressed="true"><span class="em">💪</span>hustle</button>
    <button class="style-chip" type="button" data-style="ceo"><span class="em">📈</span>CEO</button>
    <button class="style-chip" type="button" data-style="lone-wolf"><span class="em">🐺</span>lone wolf</button>
    <button class="style-chip" type="button" data-style="locker-room"><span class="em">🏋️</span>locker room</button>
    <button class="style-chip" type="button" data-style="sunrise"><span class="em">🌅</span>sunrise</button>
    <button class="style-chip" type="button" data-style="boardroom"><span class="em">🤝</span>boardroom</button>
  </div>

  <div class="poster-wrap" id="poster-wrap">
    <div class="poster loading" id="poster" role="img" aria-label="generated motivational poster"></div>
    <div class="overlay-tint"></div>
    <div class="overlay-color"></div>
    <div class="lens-flare" id="lens-flare"></div>
    <div class="poster-text">
      <div class="slogan" id="slogan">summoning the slop…</div>
      <div class="subtitle" id="subtitle">— please wait —</div>
    </div>
    <div class="poster-meta">
      <div class="logo" id="logo">SLOP™</div>
      <div class="author" id="author">— —<small>—</small></div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" type="button" id="btn-gen"><span style="margin-right:0.32rem;">✨</span>PUMP A FRESH ONE</button>
    <button class="btn alt" type="button" id="btn-text">⟳ new slogan only</button>
    <button class="btn amber" type="button" id="btn-save">💾 save PNG</button>
    <button class="btn ghost" type="button" id="btn-share">🔗 share text</button>
  </div>

  <div class="gallery-head">recent slop ↓</div>
  <div class="gallery" id="gallery"></div>

  <footer><p>all images Pollinations · all wisdom synthetic · <span class="credit">sloppy.live</span></p></footer>
</main>

<div id="toast" role="status" aria-live="polite"></div>

<script>
/* ────────── AI SLOP GENERATOR ──────────
   Combine random fragments from word pools into a meaningless ALL-CAPS
   motivational slogan, slap it on a Pollinations stock-photo background
   with heavy saturation + cinematic vignette + lens flare, sign with a
   fake CEO + fake company. Click PUMP A FRESH ONE to regenerate the
   whole thing; "new slogan only" recycles the current image with a new
   line; save PNG renders the poster to canvas + downloads. Gallery
   shows the last 8 you generated. */

const VERBS = [
  'HUSTLE','GRIND','MANIFEST','ELEVATE','PIVOT','OPTIMIZE','DOMINATE','CONQUER',
  'IGNITE','UNLEASH','AMPLIFY','SCALE','DELIVER','EXECUTE','SHIP','MONETISE',
  'NETWORK','ITERATE','DISRUPT','CRUSH','SHATTER','BUILD','BREAK','AWAKEN',
  'OUT-WORK','OUT-LEARN','LEVERAGE','SYNTHESISE','OPERATIONALISE','PROTOTYPE',
];
const NOUNS = [
  'SYNERGY','GRINDSET','EMPIRE','DREAMS','FAILURE','SUCCESS','VISION','PIVOT',
  'BANDWIDTH','EXCELLENCE','MEDIOCRITY','VALUE-ADD','RUNWAY','PIPELINE','MOMENTUM',
  'GREATNESS','EXCUSES','COMFORT-ZONE','MEETINGS','WINNERS','LIONS','WOLVES',
  'GLASS-CEILING','LIMITS','COMPETITION','GOALPOSTS','BOXES','IMPOSSIBLE','MORNINGS',
  'MONDAYS','BLOCKCHAINS','LANES','UPSIDE','MOAT','TRACTION','OUTLIERS','PIVOTS',
];
const ADJS = [
  '7-FIGURE','NEXT-LEVEL','FOUNDER-MODE','UNCOPYABLE','MULTI-HYPHENATE',
  'POSTHUMOUS','UNHINGED','RECESSION-PROOF','VERTICALLY-INTEGRATED','UN-NERFED',
];
const PATTERNS = [
  () => `${pick(VERBS)} YOUR ${pick(NOUNS)}`,
  () => `${pick(NOUNS)} IS THE ${pick(NOUNS)} OF ${pick(NOUNS)}`,
  () => `DON'T ${pick(VERBS)} — ${pick(VERBS)}`,
  () => `${pick(NOUNS)} BUILDS ${pick(NOUNS)}`,
  () => `${pick(VERBS)} LIKE A ${pickSingular(pick(NOUNS))}`,
  () => `EVERY ${pickSingular(pick(NOUNS))} IS A ${pickSingular(pick(NOUNS))}`,
  () => `BE THE ${pickSingular(pick(NOUNS))} YOU ${pick(VERBS)}`,
  () => `${pick(VERBS)}. ${pick(VERBS)}. ${pick(VERBS)}.`,
  () => `${pick(ADJS)} ${pickSingular(pick(NOUNS))} STARTS NOW`,
  () => `THE ${pickSingular(pick(NOUNS))} CHOOSES YOU`,
  () => `${pick(VERBS)} ${pick(ADJS)}`,
  () => `${pick(NOUNS)} > ${pick(NOUNS)}`,
  () => `IF NOT YOU, WHO? IF NOT NOW, ${pickSingular(pick(NOUNS))}?`,
  () => `STOP ${pick(VERBS).toLowerCase()}ING — START ${pick(VERBS).toLowerCase()}ING`,
];

const SUBTITLES = [
  '(buy my course)',
  '— do not screenshot · do screenshot —',
  'the secret? showing up. (also a $4,000 cohort.)',
  '+97% retention. in 6 weeks. trust me.',
  'this changed my life. and yours probably.',
  'no excuses. only deliverables.',
  'pinned tweet, year 2031.',
  'a thread you didn\'t ask for.',
  'follow for more daily wisdom you\'ll forget by lunch.',
  'unironically.',
  'they laughed. (they\'re still laughing.)',
  'I learned this from a sunset and a podcast.',
  'said no founder ever. except this one.',
  'if this resonates, please consider buying my e-book.',
];

const FIRSTS = [
  'Brad','Chad','Tyler','Aiden','Bryson','Hunter','Maverick','Phoenix','Zeke','Kane','Cooper','Dax',
  'Talia','Brynn','Skye','Aurora','Indigo','Saskia','Marlowe','Wren','Ash','River','Sage','Sloane',
  'Beck','Reed','Quinn','Storm','Roman','Felix','Atlas','Onyx',
];
const LASTS = [
  'Vaynerhustle','Petrov-Sands','Kingsley','Thornberry','Vance','Sterling','Greatness',
  'MacGuffin-Smyth','Holloway','Drexler','Hex','Steele','Northcliff','Brennan','de la Cruz-Maxwell',
  'Wickham','Beaumont','Aldridge','Cassidy','Volkov-Reyes',
];
const TITLES = [
  'CEO','Founder','Founder & Chairman','Founder & Vibe Officer','Chief Bandwidth Officer',
  'Head of Vision','Multi-hyphenate','Serial Founder','Recovering CTO','5x Founder · 0x Exit',
  'Author of "Hustle, Sleep is for the Dead"','Self-styled Thought Leader',
];
const COMPANIES = [
  'Apex Cognitive Dynamics','Synergy Loop Labs','GrindCore Inc','Empire Forge','Vertex Mindset',
  'Optimal Bandwidth Group','Pivot Capital','DeliveryStack','MomentumLab','BluePeak Ventures',
  'OuterNorth Capital','RippleCore','BlockTrace Forge','OneTakeAI','Zenfounder.io',
];

const POLLI_STYLES = {
  'hustle':       'highly saturated stock photo motivational hustle culture lone climber sunset lens flare cinematic blurry overcooked colours AI generated',
  'ceo':          'corporate boardroom CEO portrait skyscraper view sunlight lens flare overly saturated AI stock photo big bold smile',
  'lone-wolf':    'lone wolf silhouette on a mountain top orange dramatic sunset stock photo over-edited extra saturated AI generated',
  'locker-room':  'gym locker room weight lifter sweat dramatic spotlight motivational poster aesthetic over saturated harsh contrast',
  'sunrise':      'sunrise over ocean cliff yoga pose silhouette lens flare extreme saturation cinematic stock photo AI generated',
  'boardroom':    'multi-ethnic business team handshake meeting room sunlight bokeh corporate stock photo overly saturated AI hustle culture',
};

const SAVE_KEY = 'ai-slop-gallery-v1';
const state = {
  style: 'hustle',
  gallery: loadGallery(),
  current: null,        // { slogan, subtitle, author, title, company, logo, imgUrl, style }
  loading: false,
};
function loadGallery(){ try { return JSON.parse(localStorage.getItem(SAVE_KEY) || '[]'); } catch(e){ return []; } }
function persistGallery(){ try { localStorage.setItem(SAVE_KEY, JSON.stringify(state.gallery.slice(0, 24))); } catch(e){} }

/* ── helpers ── */
function pick(arr){ return arr[(Math.random() * arr.length) | 0]; }
function pickSingular(word){
  // crude singularisation so "LIKE A WOLVES" doesn't slip out
  if (word.endsWith('IES')) return word.slice(0, -3) + 'Y';
  if (word.endsWith('VES')) return word.slice(0, -3) + 'F';
  if (word.endsWith('SES') || word.endsWith('ESS')) return word;     // GLASS-CEILING, EXCESS — leave alone
  if (word.endsWith('S') && !word.endsWith('US')) return word.slice(0, -1);
  return word;
}
function makeSlogan(){
  // pick a pattern + sometimes add a trailing emoji for extra slop
  let s = PATTERNS[(Math.random() * PATTERNS.length) | 0]();
  const tailEmojis = ['', '', '🔥', '💸', '📈', '🚀', '⚡', '🦁'];
  const e = tailEmojis[(Math.random() * tailEmojis.length) | 0];
  if (e) s = s + ' ' + e;
  return s;
}
function makeSignature(){
  const author = pick(FIRSTS) + ' ' + pick(LASTS);
  const title = pick(TITLES);
  const company = pick(COMPANIES);
  return { author, title, company };
}
function makeLogo(){
  const tokens = ['CORE','LOOP','FORGE','LAB','CO','VENTURES','GROUP','HQ','TRUST','HOUSE'];
  return pick(['SLOP','APEX','GRIND','SYNC','VRTX','ZNTH','PIVOT','RUNWAY','VITAL']) + '·' + pick(tokens);
}
function makeImageUrl(style){
  const prompt = POLLI_STYLES[style] || POLLI_STYLES.hustle;
  const seed = (Math.random() * 99999 | 0);
  return 'https://image.pollinations.ai/prompt/' + encodeURIComponent(prompt)
    + '?width=480&height=600&model=flux&nologo=true&enhance=true&seed=' + seed;
}

/* ── DOM helpers ── */
const sloganEl = document.getElementById('slogan');
const subEl = document.getElementById('subtitle');
const authorEl = document.getElementById('author');
const logoEl = document.getElementById('logo');
const posterEl = document.getElementById('poster');
const posterWrap = document.getElementById('poster-wrap');
const lensFlare = document.getElementById('lens-flare');

function renderCurrent(){
  const c = state.current;
  if (!c) return;
  sloganEl.textContent = c.slogan;
  subEl.textContent = c.subtitle;
  authorEl.innerHTML = '— ' + esc(c.author) + '<small>' + esc(c.title) + ' · ' + esc(c.company) + '</small>';
  logoEl.textContent = c.logo;
  // randomise lens flare position
  const fx = 12 + Math.random() * 72;
  const fy = 4 + Math.random() * 30;
  lensFlare.style.top = fy + '%';
  lensFlare.style.right = fx + '%';
  lensFlare.style.opacity = (0.35 + Math.random() * 0.5).toFixed(2);
  posterWrap.classList.remove('flash');
  void posterWrap.offsetWidth;
  posterWrap.classList.add('flash');
}

function applyImage(url){
  posterEl.classList.add('loading');
  posterEl.style.backgroundImage = '';
  // preload the image so we don't show a broken state
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => {
    posterEl.style.backgroundImage = 'url("' + url + '")';
    posterEl.classList.remove('loading');
  };
  img.onerror = () => {
    posterEl.classList.remove('loading');
    posterEl.style.background = 'linear-gradient(135deg, #ff2db4, #ffba1a, #2df0ff)';
  };
  img.src = url;
}

function pushGallery(item){
  state.gallery.unshift(item);
  state.gallery = state.gallery.slice(0, 8);
  persistGallery();
  renderGallery();
}
function renderGallery(){
  const wrap = document.getElementById('gallery');
  if (!state.gallery.length){
    wrap.innerHTML = '<span style="color: var(--dim); font-family: \'Fraunces\', serif; font-style: italic;">— no slop yet — pump some —</span>';
    return;
  }
  wrap.innerHTML = state.gallery.map((it, i) => (
    '<div class="thumb" role="button" tabindex="0" data-i="' + i + '" data-slogan="' + esc(it.slogan) + '" '
    + 'style="background-image: url(' + JSON.stringify(it.imgUrl) + ');"></div>'
  )).join('');
  wrap.querySelectorAll('.thumb').forEach(t => {
    t.addEventListener('click', () => loadFromGallery(parseInt(t.dataset.i, 10)));
    t.addEventListener('keydown', (e) => {
      if (e.code === 'Enter' || e.code === 'Space'){ e.preventDefault(); loadFromGallery(parseInt(t.dataset.i, 10)); }
    });
  });
}
function loadFromGallery(i){
  const it = state.gallery[i];
  if (!it) return;
  state.current = { ...it };
  renderCurrent();
  applyImage(it.imgUrl);
}

/* ── full pump (new image + new text) ── */
function pumpFresh(){
  if (state.loading) return;
  state.loading = true;
  const sig = makeSignature();
  const c = {
    slogan: makeSlogan(),
    subtitle: pick(SUBTITLES),
    author: sig.author,
    title: sig.title,
    company: sig.company,
    logo: makeLogo(),
    imgUrl: makeImageUrl(state.style),
    style: state.style,
  };
  state.current = c;
  renderCurrent();
  applyImage(c.imgUrl);
  pushGallery(c);
  showToast('✨ fresh slop · ' + state.style);
  setTimeout(() => { state.loading = false; }, 800);
}

/* ── slogan only (keep current image) ── */
function pumpSloganOnly(){
  if (!state.current){ pumpFresh(); return; }
  const sig = makeSignature();
  state.current.slogan = makeSlogan();
  state.current.subtitle = pick(SUBTITLES);
  state.current.author = sig.author;
  state.current.title = sig.title;
  state.current.company = sig.company;
  state.current.logo = makeLogo();
  renderCurrent();
  // also update its gallery entry
  if (state.gallery[0]) state.gallery[0] = { ...state.current };
  persistGallery();
  renderGallery();
  showToast('⟳ new words · same hustle');
}

/* ── save as PNG (render the poster to a canvas) ── */
async function saveAsPng(){
  if (!state.current){ showToast('generate one first'); return; }
  showToast('💾 rendering…');
  const W = 800, H = 1000;
  const cv = document.createElement('canvas');
  cv.width = W; cv.height = H;
  const ctx = cv.getContext('2d');
  // background image
  try {
    const img = await loadImg(state.current.imgUrl);
    // simulate the over-saturated filter by drawing into an offscreen and using filter
    const tmp = document.createElement('canvas');
    tmp.width = W; tmp.height = H;
    const tctx = tmp.getContext('2d');
    tctx.filter = 'saturate(1.55) contrast(1.18) brightness(0.85)';
    tctx.drawImage(img, 0, 0, W, H);
    ctx.drawImage(tmp, 0, 0);
  } catch (e){
    // fallback gradient
    const g = ctx.createLinearGradient(0, 0, W, H);
    g.addColorStop(0, '#ff2db4'); g.addColorStop(0.5, '#ffba1a'); g.addColorStop(1, '#2df0ff');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);
  }
  // dark overlay
  const ovr = ctx.createLinearGradient(0, 0, 0, H);
  ovr.addColorStop(0, 'rgba(0,0,0,0.30)'); ovr.addColorStop(0.35, 'rgba(0,0,0,0)');
  ovr.addColorStop(0.60, 'rgba(0,0,0,0)'); ovr.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = ovr; ctx.fillRect(0, 0, W, H);
  // vignette
  const vg = ctx.createRadialGradient(W/2, H/2, W*0.30, W/2, H/2, W*0.70);
  vg.addColorStop(0, 'rgba(0,0,0,0)'); vg.addColorStop(1, 'rgba(0,0,0,0.50)');
  ctx.fillStyle = vg; ctx.fillRect(0, 0, W, H);
  // colour overlay
  ctx.globalCompositeOperation = 'overlay';
  const co = ctx.createLinearGradient(0, 0, 0, H);
  co.addColorStop(0, 'rgba(255, 100, 0, 0.18)'); co.addColorStop(1, 'rgba(80, 0, 120, 0.22)');
  ctx.fillStyle = co; ctx.fillRect(0, 0, W, H);
  ctx.globalCompositeOperation = 'source-over';
  // slogan — fit to width
  const c = state.current;
  ctx.fillStyle = '#fff';
  ctx.textAlign = 'center';
  const lines = wrapText(ctx, c.slogan.toUpperCase(), W - 80, 78);
  let fontSize = 78;
  while (lines.length > 4 && fontSize > 38){
    fontSize -= 6;
    const re = wrapText(ctx, c.slogan.toUpperCase(), W - 80, fontSize);
    if (re.length <= 4){ lines.length = 0; for (const l of re) lines.push(l); break; }
  }
  ctx.font = '400 ' + fontSize + 'px Anton, Impact, sans-serif';
  ctx.textBaseline = 'middle';
  const startY = H * 0.42 - (lines.length - 1) * fontSize * 0.55;
  for (let i = 0; i < lines.length; i++){
    const ly = startY + i * fontSize * 1.05;
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.85)'; ctx.fillText(lines[i], W/2, ly + 6);
    ctx.fillStyle = '#fff'; ctx.fillText(lines[i], W/2, ly);
  }
  // subtitle
  ctx.font = 'italic bold 28px "Bricolage Grotesque", system-ui, sans-serif';
  ctx.fillStyle = 'rgba(0,0,0,0.85)';
  ctx.fillText(c.subtitle, W/2 + 2, H * 0.66 + 2);
  ctx.fillStyle = '#fff5dc';
  ctx.fillText(c.subtitle, W/2, H * 0.66);
  // author bottom-right
  ctx.textAlign = 'right';
  ctx.font = 'bold 22px "Bricolage Grotesque", system-ui, sans-serif';
  ctx.fillStyle = 'rgba(0,0,0,0.80)';
  ctx.fillText('— ' + c.author, W - 36, H - 64);
  ctx.fillStyle = '#fff';
  ctx.fillText('— ' + c.author, W - 38, H - 66);
  ctx.font = '18px "Bricolage Grotesque", system-ui, sans-serif';
  ctx.fillStyle = '#fff5dc';
  ctx.fillText(c.title + ' · ' + c.company, W - 38, H - 36);
  // logo bottom-left
  ctx.textAlign = 'left';
  ctx.font = '700 22px Bungee, Impact, sans-serif';
  ctx.fillStyle = 'rgba(0,0,0,0.6)';
  ctx.fillRect(28, H - 88, ctx.measureText(c.logo).width + 24, 36);
  ctx.fillStyle = '#2df0ff';
  ctx.fillText(c.logo, 40, H - 64);
  // download
  cv.toBlob((blob) => {
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'ai-slop-' + (c.slogan.toLowerCase().replace(/[^a-z0-9]+/g,'-').slice(0,40) || 'poster') + '.png';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('✓ saved · ' + a.download);
  }, 'image/png');
}
function loadImg(url){
  return new Promise((res, rej) => {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.onload = () => res(img);
    img.onerror = rej;
    img.src = url;
  });
}
function wrapText(ctx, text, maxW, fontSize){
  ctx.font = '400 ' + fontSize + 'px Anton, Impact, sans-serif';
  const words = text.split(' ');
  const lines = [];
  let cur = '';
  for (const w of words){
    const tryLine = cur ? cur + ' ' + w : w;
    if (ctx.measureText(tryLine).width > maxW){
      if (cur) lines.push(cur);
      cur = w;
    } else {
      cur = tryLine;
    }
  }
  if (cur) lines.push(cur);
  return lines;
}

/* ── share text ── */
async function shareText(){
  if (!state.current){ showToast('generate one first'); return; }
  const c = state.current;
  const text = '"' + c.slogan + '"\n— ' + c.author + ', ' + c.title + ' at ' + c.company + '\n' + c.subtitle + '\n\nvia ' + location.href;
  try {
    if (navigator.share){
      await navigator.share({ text, title: 'AI Slop' });
      return;
    }
  } catch(e){}
  try {
    await navigator.clipboard.writeText(text);
    showToast('🔗 quote copied');
  } catch(e){
    showToast('couldn\'t copy · try selecting');
  }
}

/* ── toast ── */
let toastT = null;
function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('show'), 1800);
}

function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ── BUTTONS ── */
document.getElementById('btn-gen').addEventListener('click', pumpFresh);
document.getElementById('btn-text').addEventListener('click', pumpSloganOnly);
document.getElementById('btn-save').addEventListener('click', saveAsPng);
document.getElementById('btn-share').addEventListener('click', shareText);
document.querySelectorAll('.style-chip').forEach(c => {
  c.addEventListener('click', () => {
    state.style = c.dataset.style;
    document.querySelectorAll('.style-chip').forEach(x => x.setAttribute('aria-pressed', x === c ? 'true' : 'false'));
    pumpFresh();
  });
});

/* ── BOOT ── */
renderGallery();
pumpFresh();
</script>
