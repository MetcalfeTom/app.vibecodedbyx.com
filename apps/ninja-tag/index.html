<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Ninja Tag</title>
<meta name="description" content="Top-down tag with naruto-run sprites. Sprint, dodge, slap a headband, run for your life." />
<meta property="og:title" content="Ninja Tag" />
<meta property="og:description" content="Top-down tag with naruto-run sprites. Sprint, dodge, slap a headband, run for your life." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://sloppy.live/ninja-tag" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/dark%20pixelart%20top%20down%20ninja%20training%20ground%20cherry%20blossom%20night%20moonlit%20red%20headband%20no%20text?width=1200&height=630&nologo=true" />
<meta name="theme-color" content="#0d1518" />
<link rel="icon" href="https://emojicdn.elk.sh/🥷" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bowlby+One+SC&family=Yuji+Boku&family=Silkscreen:wght@400;700&family=Space+Mono&display=swap" />
<style>
  /* ===========================================================
     Ninja Tag — accessibility-first defaults
     - rem everywhere; html stays at 100% so user font-size scales
     - all text vs bg meets WCAG AA contrast (≥4.5:1 normal text)
     - canvas + interactive UI have ARIA labels + focus-visible
     - prefers-reduced-motion kill switch on the title pulse
     =========================================================== */
  :root{
    --ink:#0d1518;
    --ink-soft:#cfd8d6;     /* 12.6:1 on ink */
    --paper:#f4ecd3;
    --moss:#8fc46a;          /* 7.0:1 on ink */
    --sumi:#1f2a2c;
    --runner:#7adcff;        /* 9.7:1 on ink */
    --it:#ff5252;            /* 5.6:1 on ink */
    --gold:#ffd968;          /* 12.5:1 on ink */
    --magenta:#ff77c2;
    --plum:#9b6cff;
    --rule:#3a4a4d;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none}
  html{font-size:100%;-webkit-text-size-adjust:100%;text-size-adjust:100%}
  body{
    color:var(--ink-soft);font-family:'Space Mono', ui-monospace, monospace;
    font-size:1rem;line-height:1.45;
    min-height:100vh;background:#070a0c;
    background-image:
      radial-gradient(circle at 20% 12%, rgba(143,196,106,0.06), transparent 60%),
      radial-gradient(circle at 80% 88%, rgba(122,220,255,0.06), transparent 55%);
    overflow:hidden;
  }
  .skip-link{
    position:absolute;left:0.5rem;top:-3rem;z-index:200;
    background:var(--ink);color:var(--paper);padding:0.5rem 0.875rem;
    text-decoration:none;border-radius:0.25rem;
    font-family:'Silkscreen', monospace;font-size:0.875rem;
    transition:top 0.15s;
  }
  .skip-link:focus{top:0.5rem;outline:0.1875rem solid var(--gold);outline-offset:0.125rem}

  /* ===== Stage / canvas ===== */
  .stage{
    position:fixed;inset:0;display:flex;align-items:center;justify-content:center;
  }
  canvas{
    display:block;width:100vw;height:100vh;
    background:#0a1316;
    image-rendering:pixelated;image-rendering:crisp-edges;
    touch-action:none;cursor:crosshair;
  }
  body.locked canvas{cursor:none}

  /* ===== HUD ===== */
  .hud{
    position:fixed;inset:0;pointer-events:none;z-index:10;
    font-family:'Silkscreen', monospace;
  }
  .hud-corner{
    position:absolute;display:flex;flex-direction:column;gap:0.5rem;padding:1rem;
  }
  .hud-corner.tl{top:0;left:0}
  .hud-corner.tr{top:0;right:0;align-items:flex-end}
  .hud-corner.bl{bottom:0;left:0}
  .hud-corner.br{bottom:0;right:0;align-items:flex-end}
  .hud-cell{
    background:rgba(0,0,0,0.78);border:0.1875rem solid var(--rule);
    padding:0.5rem 0.875rem;border-radius:0.375rem;
    backdrop-filter:blur(3px);
    display:flex;flex-direction:column;gap:0.125rem;line-height:1;
  }
  .hud-cell .lbl{
    font-size:0.75rem;letter-spacing:0.22em;color:var(--ink-soft);text-transform:uppercase;
  }
  .hud-cell .val{
    font-family:'Bowlby One SC', sans-serif;font-size:2rem;line-height:1;letter-spacing:0.02em;
    text-shadow:0 0 0.5rem currentColor, 0 0 0.125rem #000;
  }
  .hud-cell.timer{border-color:var(--gold);color:var(--gold)}
  .hud-cell.timer .val{color:var(--gold)}
  .hud-cell.score{border-color:var(--moss);color:var(--moss)}
  .hud-cell.score .val{color:var(--moss);font-size:1.5rem}
  .hud-cell.status{border-color:var(--runner);color:var(--runner);min-width:10rem}
  .hud-cell.status.it{border-color:var(--it);color:var(--it);animation:itPulse 0.7s ease-in-out infinite alternate}
  .hud-cell.status .val{font-size:1.375rem;letter-spacing:0.06em}
  .hud-cell.chakra{border-color:var(--plum);color:var(--plum)}
  .hud-cell.chakra .val{font-size:1rem;letter-spacing:0.06em}
  .chakra-bar{
    margin-top:0.25rem;width:9rem;height:0.5rem;
    background:rgba(0,0,0,0.5);border:0.125rem solid var(--plum);border-radius:0.125rem;
    overflow:hidden;
  }
  .chakra-bar .fill{height:100%;background:linear-gradient(90deg, var(--plum), var(--magenta));
    transition:width 0.08s linear;}
  @keyframes itPulse{
    0%{transform:scale(1);box-shadow:0 0 0 0 rgba(255,82,82,0.5)}
    100%{transform:scale(1.04);box-shadow:0 0 1.25rem 0.25rem rgba(255,82,82,0.5)}
  }
  @media (prefers-reduced-motion: reduce){
    .hud-cell.status.it{animation:none}
  }

  /* ===== Title screen ===== */
  .overlay{
    position:fixed;inset:0;display:none;align-items:center;justify-content:center;
    background:rgba(7,10,12,0.92);z-index:50;padding:1.5rem;text-align:center;
    flex-direction:column;
  }
  .overlay.show{display:flex}
  .overlay h1{
    font-family:'Bowlby One SC', sans-serif;
    font-size:clamp(3rem, 11vw, 7rem);line-height:0.95;color:var(--paper);
    letter-spacing:0.02em;margin-bottom:0.5rem;
    text-shadow:0.25rem 0.25rem 0 var(--it), 0.5rem 0.5rem 0 var(--ink);
  }
  .overlay h1 .kanji{
    display:block;font-family:'Yuji Boku', serif;font-size:0.5em;
    color:var(--it);letter-spacing:0.5em;margin-bottom:0.25rem;
    text-shadow:none;
  }
  .overlay .sub{
    font-family:'Space Mono', monospace;font-size:1.0625rem;color:var(--ink-soft);
    max-width:32rem;margin:0.75rem 0 1.5rem;line-height:1.5;
  }
  .overlay .controls{
    display:grid;grid-template-columns:repeat(2, minmax(0, 1fr));gap:0.5rem 1.5rem;
    font-family:'Silkscreen', monospace;font-size:0.9375rem;color:var(--paper);
    margin-bottom:1.75rem;text-align:left;
  }
  .overlay .controls kbd{
    display:inline-block;padding:0.1875rem 0.5rem;border:0.125rem solid var(--moss);
    border-radius:0.25rem;background:rgba(143,196,106,0.12);color:var(--moss);
    font-family:inherit;font-size:0.875rem;margin-right:0.5rem;
  }
  .overlay button{
    font-family:'Bowlby One SC', sans-serif;font-size:1.375rem;letter-spacing:0.04em;
    padding:1rem 2.5rem;cursor:pointer;
    background:linear-gradient(180deg, var(--it), #a32b2b);
    border:0.1875rem solid var(--paper);color:var(--paper);
    border-radius:0.5rem;
    box-shadow:0 0.3125rem 0 rgba(0,0,0,0.5), 0 0 1.5rem rgba(255,82,82,0.4);
    text-shadow:0 0.0625rem 0 rgba(0,0,0,0.4);
    min-height:3rem;min-width:3rem;
  }
  .overlay button:focus-visible{outline:0.25rem solid var(--gold);outline-offset:0.25rem}
  .overlay button:hover{transform:translateY(-0.125rem)}
  .overlay .endstats{
    font-family:'Silkscreen', monospace;font-size:1rem;color:var(--ink-soft);
    margin-bottom:1rem;line-height:1.8;
  }
  .overlay .endstats b{font-family:'Bowlby One SC', sans-serif;font-size:1.5rem;color:var(--gold)}

  /* ===== Status banners (mid-screen) ===== */
  .banner{
    position:fixed;top:30%;left:50%;transform:translate(-50%,-50%);
    font-family:'Bowlby One SC', sans-serif;font-size:clamp(2rem, 7vw, 4.5rem);
    color:var(--paper);text-align:center;line-height:1;
    text-shadow:0.25rem 0.25rem 0 var(--it), 0.375rem 0.375rem 0 #000;
    pointer-events:none;z-index:20;
    opacity:0;transition:opacity 0.25s;
  }
  .banner.show{opacity:1}
  .banner small{
    display:block;font-family:'Space Mono', monospace;
    font-size:0.32em;color:var(--gold);text-shadow:none;
    letter-spacing:0.18em;margin-top:0.5rem;
  }

  /* ===== Mobile joystick + sprint button ===== */
  .touch-controls{display:none;position:fixed;inset:0;pointer-events:none;z-index:30}
  .joystick{
    position:absolute;left:1.25rem;bottom:1.25rem;width:8rem;height:8rem;
    border:0.25rem solid var(--paper);border-radius:50%;
    background:rgba(0,0,0,0.4);pointer-events:auto;touch-action:none;
  }
  .joystick .knob{
    position:absolute;left:50%;top:50%;width:3.5rem;height:3.5rem;
    margin-left:-1.75rem;margin-top:-1.75rem;
    background:radial-gradient(circle at 35% 35%, var(--moss), #345921);
    border:0.25rem solid var(--paper);border-radius:50%;
    transition:transform 0.05s linear;
  }
  .sprint-btn{
    position:absolute;right:1.25rem;bottom:1.5rem;width:6rem;height:6rem;
    border:0.25rem solid var(--paper);border-radius:50%;
    background:radial-gradient(circle at 35% 35%, var(--it), #6b1a1a);
    color:var(--paper);font-family:'Bowlby One SC', sans-serif;font-size:1.0625rem;
    pointer-events:auto;touch-action:none;
    box-shadow:0 0.3125rem 0 rgba(0,0,0,0.5);
  }
  .sprint-btn:active{transform:translateY(0.1875rem);box-shadow:0 0.125rem 0 rgba(0,0,0,0.5)}
  @media (pointer: coarse), (max-width: 720px){
    .touch-controls{display:block}
    .hud-cell .val{font-size:1.5rem}
    .chakra-bar{width:7rem}
  }

  /* ===== Floating tag-text effects ===== */
  .float{
    position:absolute;font-family:'Bowlby One SC', sans-serif;font-size:1.5rem;
    color:var(--gold);text-shadow:0.125rem 0.125rem 0 #000;
    pointer-events:none;animation:floatUp 1s ease-out forwards;
    z-index:15;
  }
  @keyframes floatUp{
    0%{transform:translate(-50%,0) scale(0.6);opacity:0}
    20%{opacity:1;transform:translate(-50%,-1rem) scale(1.2)}
    100%{transform:translate(-50%,-3rem) scale(1);opacity:0}
  }

  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;
    overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0;}
</style>
</head>
<body>

<a href="#field" class="skip-link">Skip to game</a>

<main class="stage">
  <canvas id="field" width="960" height="600" tabindex="0"
          role="application"
          aria-label="Ninja Tag playfield. Use WASD or arrow keys to run, hold Shift to sprint, press Space or tap the start button to begin. When marked IT, touch any other ninja within six seconds to pass it on."></canvas>
</main>

<div class="hud" aria-hidden="true">
  <aside class="hud-corner tl">
    <div class="hud-cell timer" role="status" aria-live="polite" aria-atomic="true">
      <div class="lbl">Time</div>
      <div class="val" id="hudTime">60</div>
    </div>
    <div class="hud-cell score">
      <div class="lbl">Safe</div>
      <div class="val" id="hudScore">0.0s</div>
    </div>
  </aside>
  <aside class="hud-corner tr">
    <div class="hud-cell status" id="hudStatusCell" role="status" aria-live="polite" aria-atomic="true">
      <div class="lbl">Status</div>
      <div class="val" id="hudStatus">RUNNER</div>
    </div>
    <div class="hud-cell chakra">
      <div class="lbl">Chakra</div>
      <div class="val" id="hudChakraText">100%</div>
      <div class="chakra-bar"><div class="fill" id="chakraFill" style="width:100%"></div></div>
    </div>
  </aside>
</div>

<div class="banner" id="banner" role="status" aria-live="assertive"></div>

<!-- Title overlay -->
<div class="overlay show" id="title" role="dialog" aria-modal="true" aria-labelledby="titleHeading" aria-describedby="titleSub">
  <h1 id="titleHeading">
    <span class="kanji" aria-hidden="true">忍 鬼 走</span>
    NINJA TAG
  </h1>
  <p class="sub" id="titleSub">
    Top-down chase. Side-view ninjas. The lean, the trailing arms, the dust kick — it's the run you know.
    Don't be IT when the timer hits zero.
  </p>
  <div class="controls">
    <div><kbd>WASD</kbd> run</div>
    <div><kbd>SHIFT</kbd> sprint</div>
    <div><kbd>SPACE</kbd> start / restart</div>
    <div><kbd>ESC</kbd> pause</div>
  </div>
  <button type="button" id="playBtn" aria-label="Begin the chase — start a 60-second tag round">▶ BEGIN THE CHASE</button>
</div>

<!-- End overlay -->
<div class="overlay" id="end" role="dialog" aria-modal="true" aria-labelledby="endHeading" inert>
  <h1 id="endHeading"></h1>
  <p class="endstats" id="endstats"></p>
  <button type="button" id="restartBtn" aria-label="Run it back — restart the round">↻ RUN IT BACK</button>
</div>

<!-- Touch controls -->
<div class="touch-controls" id="touchControls" aria-hidden="true">
  <div class="joystick" id="joystick"><div class="knob" id="joyKnob"></div></div>
  <button class="sprint-btn" id="sprintBtn" type="button" aria-label="Sprint">DASH</button>
</div>

<script>
(() => {
'use strict';
// =====================================================================
// NINJA TAG — top-down playfield, side-view sprites, naruto-run pose
// =====================================================================

const cvs = document.getElementById('field');
const ctx = cvs.getContext('2d');

// World dimensions (logical playfield) — camera follows player inside.
const WORLD = { w: 1800, h: 1300 };

// Reduced-motion preference observed throughout
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function fitCanvas() {
  // Match canvas resolution to viewport for crisp pixels at any size,
  // but cap at 1.0 device pixel ratio so the GPU isn't slammed on
  // retina displays (the look stays consistent with the title art).
  const dpr = Math.min(window.devicePixelRatio || 1, 1.4);
  cvs.width  = Math.floor(window.innerWidth  * dpr);
  cvs.height = Math.floor(window.innerHeight * dpr);
  cvs.style.width  = window.innerWidth  + 'px';
  cvs.style.height = window.innerHeight + 'px';
}
window.addEventListener('resize', fitCanvas);
fitCanvas();

// =====================================================================
// AUDIO — Web Audio synth for everything
// =====================================================================
let actx = null;
let muted = false;
function ensureAudio() {
  if (!actx) {
    try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
  }
  if (actx && actx.state === 'suspended') actx.resume();
}
function blip(freq, dur, type, vol) {
  if (muted || !actx) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type || 'square'; o.frequency.value = freq;
  g.gain.value = vol || 0.16;
  g.gain.exponentialRampToValueAtTime(0.0001, actx.currentTime + dur);
  o.connect(g).connect(actx.destination);
  o.start(); o.stop(actx.currentTime + dur);
}
const sfx = {
  poof: () => { blip(540, 0.10, 'triangle', 0.18); setTimeout(() => blip(220, 0.18, 'sawtooth', 0.16), 30); },
  tag:  () => { blip(880, 0.06, 'square', 0.18); setTimeout(() => blip(1320, 0.10, 'square', 0.18), 50); setTimeout(() => blip(1760, 0.10, 'triangle', 0.16), 110); },
  step: () => { blip(180 + Math.random() * 60, 0.04, 'sawtooth', 0.05); },
  start:() => { blip(440, 0.08, 'square', 0.18); setTimeout(() => blip(660, 0.08, 'square', 0.18), 80); setTimeout(() => blip(990, 0.18, 'triangle', 0.20), 160); },
  end:  () => { blip(330, 0.20, 'sawtooth', 0.20); setTimeout(() => blip(220, 0.30, 'sawtooth', 0.18), 180); },
};

// =====================================================================
// FIELD — obstacles, scenery
// =====================================================================
// Fixed seed so the layout is predictable + tested
function mulberry32(seed){return function(){let t=seed+=0x6D2B79F5;t=Math.imul(t^t>>>15,t|1);t^=t+Math.imul(t^t>>>7,t|61);return((t^t>>>14)>>>0)/4294967296;};}
const fieldRand = mulberry32(1234);
const obstacles = [];   // { kind, x, y, r } — circle colliders
function buildField() {
  obstacles.length = 0;
  // Border bushes for visual edges (don't collide — we clamp at world bounds)
  // Trees scattered at meaningful spacing so chases have weave geometry.
  const tries = 60, maxTrees = 22;
  let placed = 0;
  while (placed < maxTrees && tries > 0) {
    const x = 80 + fieldRand() * (WORLD.w - 160);
    const y = 80 + fieldRand() * (WORLD.h - 160);
    let ok = true;
    // keep trees out of the spawn ring (centre)
    if (Math.hypot(x - WORLD.w/2, y - WORLD.h/2) < 220) ok = false;
    for (const o of obstacles) {
      if (Math.hypot(x - o.x, y - o.y) < o.r + 90) { ok = false; break; }
    }
    if (ok) { obstacles.push({ kind:'tree', x, y, r: 22 }); placed++; }
  }
  // Rock clusters — smaller colliders
  for (let i = 0; i < 14; i++) {
    const x = 80 + fieldRand() * (WORLD.w - 160);
    const y = 80 + fieldRand() * (WORLD.h - 160);
    if (Math.hypot(x - WORLD.w/2, y - WORLD.h/2) < 200) continue;
    let ok = true;
    for (const o of obstacles) if (Math.hypot(x - o.x, y - o.y) < o.r + 60) { ok = false; break; }
    if (ok) obstacles.push({ kind:'rock', x, y, r: 18 });
  }
  // Two ponds — bigger no-go zones
  for (let i = 0; i < 2; i++) {
    const x = 200 + fieldRand() * (WORLD.w - 400);
    const y = 200 + fieldRand() * (WORLD.h - 400);
    let ok = Math.hypot(x - WORLD.w/2, y - WORLD.h/2) > 280;
    for (const o of obstacles) if (Math.hypot(x - o.x, y - o.y) < o.r + 110) { ok = false; break; }
    if (ok) obstacles.push({ kind:'pond', x, y, r: 64 });
  }
  // Decorative grass tufts — non-colliding, drawn for atmosphere only
  decoGrass.length = 0;
  for (let i = 0; i < 220; i++) {
    decoGrass.push({
      x: fieldRand() * WORLD.w, y: fieldRand() * WORLD.h,
      h: 4 + fieldRand() * 6, sway: fieldRand() * Math.PI * 2,
    });
  }
  // Cherry blossom petals — drift across the field
  petals.length = 0;
  for (let i = 0; i < 50; i++) {
    petals.push({
      x: fieldRand() * WORLD.w, y: fieldRand() * WORLD.h,
      vx: 18 + fieldRand() * 25, vy: 8 + fieldRand() * 10,
      r: 2 + fieldRand() * 2, phase: fieldRand() * Math.PI * 2,
    });
  }
}
const decoGrass = [];
const petals = [];
buildField();

function blocksAt(x, y, r) {
  // World bounds
  if (x - r < 0 || x + r > WORLD.w || y - r < 0 || y + r > WORLD.h) return true;
  for (const o of obstacles) {
    if (o.kind === 'pond') continue;   // ponds slow but don't fully block
    const d = Math.hypot(x - o.x, y - o.y);
    if (d < o.r + r) return true;
  }
  return false;
}
function inWater(x, y) {
  for (const o of obstacles) if (o.kind === 'pond') {
    if (Math.hypot(x - o.x, y - o.y) < o.r) return true;
  }
  return false;
}

// =====================================================================
// NINJAS — player + AI agents
// =====================================================================
// Side-view sprite drawn each frame procedurally. Naruto-run pose:
// forward lean ~26°, both arms straight back, legs alternating, hair +
// scarf trailing in the wind, dust kick at the feet.
const NINJAS = [];
function makeNinja(spec) {
  // spec: { name, color, headband, scarf, isPlayer, brain }
  return Object.assign({
    x: 0, y: 0, vx: 0, vy: 0,
    facing: 1,             // -1 left, +1 right (sprite mirror)
    speed: 220,            // base run speed (px/sec)
    runPhase: 0,           // accumulator for leg cycle
    chakra: 100, maxChakra: 100,
    sprinting: false,
    isIt: false,
    immuneUntil: 0,        // newly-tagged "ex-IT" can't be re-tagged
    tagPenaltyUntil: 0,    // IT failed to tag → small chakra drain
    aiState: { wanderT: 0, targetX: 0, targetY: 0 },
    safeAccum: 0,          // seconds spent NOT being IT (player score)
    lastStepT: 0,
    name: '???',
    color: '#fff', headband: '#7adcff', scarf: '#ff77c2',
    isPlayer: false,
  }, spec);
}
function spawnNinjas() {
  NINJAS.length = 0;
  // Spawn 4 ninjas equally around the centre at radius 160
  const specs = [
    { name:'YOU',    color:'#f0d8a8', headband:'#7adcff', scarf:'#ff77c2', isPlayer:true  },
    { name:'AKIRA',  color:'#e8c898', headband:'#9be35a', scarf:'#5a8cff', isPlayer:false },
    { name:'KIRA',   color:'#f4dcc0', headband:'#ffaf3a', scarf:'#ff5050', isPlayer:false },
    { name:'TSUKI',  color:'#dec0a8', headband:'#c46fff', scarf:'#7af5cc', isPlayer:false },
  ];
  for (let i = 0; i < specs.length; i++) {
    const angle = (i / specs.length) * Math.PI * 2;
    const n = makeNinja(specs[i]);
    n.x = WORLD.w / 2 + Math.cos(angle) * 160;
    n.y = WORLD.h / 2 + Math.sin(angle) * 160;
    n.facing = Math.cos(angle) >= 0 ? 1 : -1;
    NINJAS.push(n);
  }
  // Pick the first AI as IT
  NINJAS[1].isIt = true;
}
spawnNinjas();

// =====================================================================
// INPUT — keyboard + virtual joystick
// =====================================================================
const keys = {};
window.addEventListener('keydown', e => {
  if (e.key === 'Escape') { togglePause(); e.preventDefault(); return; }
  if (e.key === ' ' || e.key === 'Enter') {
    if (state.phase === 'title' || state.phase === 'end') { startRound(); e.preventDefault(); return; }
  }
  keys[e.key.toLowerCase()] = true;
  if (e.key === 'Shift') keys.shift = true;
});
window.addEventListener('keyup', e => {
  keys[e.key.toLowerCase()] = false;
  if (e.key === 'Shift') keys.shift = false;
});

// --- joystick state (mobile)
const joy = { active: false, dx: 0, dy: 0, sprint: false };
const joyEl = document.getElementById('joystick');
const knobEl = document.getElementById('joyKnob');
const sprintBtn = document.getElementById('sprintBtn');
function joyHandle(e, isStart) {
  e.preventDefault();
  const t = e.touches ? e.touches[0] : e;
  const r = joyEl.getBoundingClientRect();
  const cx = r.left + r.width / 2, cy = r.top + r.height / 2;
  let dx = t.clientX - cx, dy = t.clientY - cy;
  const max = r.width / 2 - 20;
  const len = Math.hypot(dx, dy);
  if (len > max) { dx = dx / len * max; dy = dy / len * max; }
  joy.dx = dx / max; joy.dy = dy / max;
  joy.active = true;
  knobEl.style.transform = `translate(${dx}px, ${dy}px)`;
}
function joyEnd() {
  joy.active = false; joy.dx = 0; joy.dy = 0;
  knobEl.style.transform = 'translate(0,0)';
}
joyEl.addEventListener('touchstart', e => joyHandle(e, true), { passive: false });
joyEl.addEventListener('touchmove',  e => joyHandle(e, false), { passive: false });
joyEl.addEventListener('touchend',   joyEnd);
joyEl.addEventListener('touchcancel', joyEnd);
sprintBtn.addEventListener('touchstart', e => { e.preventDefault(); joy.sprint = true; }, { passive: false });
sprintBtn.addEventListener('touchend',   () => { joy.sprint = false; });
sprintBtn.addEventListener('mousedown',  () => { joy.sprint = true; });
window.addEventListener('mouseup',       () => { joy.sprint = false; });

// =====================================================================
// GAME STATE
// =====================================================================
const state = {
  phase: 'title',     // 'title' | 'playing' | 'paused' | 'end'
  roundLen: 60,       // seconds
  timeLeft: 60,
  paused: false,
  itTimerLeft: 0,     // when player is IT, must tag within 6s or chakra drain
};
const banner = document.getElementById('banner');
let bannerT = 0;
function showBanner(big, sub) {
  banner.innerHTML = big + (sub ? '<small>' + sub + '</small>' : '');
  banner.classList.add('show');
  bannerT = 1.6;
}
function hideBanner() { banner.classList.remove('show'); }

function startRound() {
  ensureAudio();
  state.phase = 'playing';
  state.timeLeft = state.roundLen;
  state.itTimerLeft = 6;
  for (const n of NINJAS) {
    n.chakra = n.maxChakra;
    n.immuneUntil = 0;
    n.safeAccum = 0;
  }
  // Re-spawn positions
  for (let i = 0; i < NINJAS.length; i++) {
    const angle = (i / NINJAS.length) * Math.PI * 2;
    NINJAS[i].x = WORLD.w / 2 + Math.cos(angle) * 160;
    NINJAS[i].y = WORLD.h / 2 + Math.sin(angle) * 160;
    NINJAS[i].vx = NINJAS[i].vy = 0;
    NINJAS[i].isIt = false;
  }
  NINJAS[1].isIt = true;
  document.getElementById('title').classList.remove('show');
  document.getElementById('title').setAttribute('inert', '');
  document.getElementById('end').classList.remove('show');
  document.getElementById('end').setAttribute('inert', '');
  cvs.focus();
  showBanner('GO!', 'don\'t be IT when time runs out');
  sfx.start();
}
function endRound() {
  state.phase = 'end';
  const player = NINJAS[0];
  const safeSec = player.safeAccum.toFixed(1);
  const wasIt = player.isIt;
  document.getElementById('endHeading').textContent = wasIt ? 'CAUGHT!' : 'YOU SURVIVED';
  document.getElementById('endstats').innerHTML =
    'Safe time: <b>' + safeSec + 's</b><br>' +
    'Final status: <b>' + (wasIt ? 'IT' : 'RUNNER') + '</b>';
  const endEl = document.getElementById('end');
  endEl.classList.add('show');
  endEl.removeAttribute('inert');
  document.getElementById('restartBtn').focus();
  sfx.end();
}
function togglePause() {
  if (state.phase !== 'playing' && state.phase !== 'paused') return;
  state.paused = !state.paused;
  state.phase = state.paused ? 'paused' : 'playing';
  showBanner(state.paused ? 'PAUSED' : 'GO!', state.paused ? 'press esc to resume' : '');
}

document.getElementById('playBtn').addEventListener('click', startRound);
document.getElementById('restartBtn').addEventListener('click', startRound);

// =====================================================================
// AI BRAIN
// =====================================================================
function aiTick(n, dt, t) {
  // IT chases STRICTLY the nearest non-immune ninja — no player bias.
  // Chat fix: previous version weighted the player by ×0.78 which
  // made the IT bot lock onto the human even when an NPC was closer.
  // Removed entirely. If every other ninja is mid-immunity (just got
  // tagged), fall back to the nearest including immune ones so the IT
  // doesn't freeze for the 1.5s immunity window.
  if (n.isIt) {
    let target = null, best = Infinity;
    for (const o of NINJAS) {
      if (o === n) continue;
      if (t < (o.immuneUntil || 0)) continue;
      const d = Math.hypot(o.x - n.x, o.y - n.y);
      if (d < best) { best = d; target = o; }
    }
    if (!target) {
      // Fallback: nearest ANY ninja (ignore immunity) so we keep moving
      let bestF = Infinity;
      for (const o of NINJAS) {
        if (o === n) continue;
        const d = Math.hypot(o.x - n.x, o.y - n.y);
        if (d < bestF) { bestF = d; target = o; }
      }
    }
    if (target) {
      const dx = target.x - n.x, dy = target.y - n.y;
      const d = Math.hypot(dx, dy) || 1;
      n.aiState.targetX = n.x + dx / d * 80;
      n.aiState.targetY = n.y + dy / d * 80;
      n.sprinting = n.chakra > 20 && d > 50;
    } else {
      n.aiState.targetX = WORLD.w / 2;
      n.aiState.targetY = WORLD.h / 2;
      n.sprinting = false;
    }
  } else {
    // Runners: flee from IT, with a wander mix when far away
    const it = NINJAS.find(o => o.isIt);
    if (!it) return;
    const dx = n.x - it.x, dy = n.y - it.y;
    const d = Math.hypot(dx, dy) || 1;
    if (d < 280) {
      // sprint flee directly away
      n.aiState.targetX = n.x + dx / d * 200;
      n.aiState.targetY = n.y + dy / d * 200;
      n.sprinting = n.chakra > 20;
    } else {
      // wander with occasional reroll
      n.aiState.wanderT -= dt;
      if (n.aiState.wanderT <= 0 || (n.aiState.targetX === 0 && n.aiState.targetY === 0)) {
        n.aiState.wanderT = 1.5 + Math.random() * 2.0;
        n.aiState.targetX = 80 + Math.random() * (WORLD.w - 160);
        n.aiState.targetY = 80 + Math.random() * (WORLD.h - 160);
      }
      n.sprinting = false;
    }
  }
  // Move toward target (with simple obstacle steering: sample 3 angles)
  const tx = n.aiState.targetX, ty = n.aiState.targetY;
  let bestAng = Math.atan2(ty - n.y, tx - n.x), bestScore = -Infinity;
  const baseAng = bestAng;
  for (let off = -1.0; off <= 1.0; off += 0.5) {
    const a = baseAng + off;
    const stepX = n.x + Math.cos(a) * 28, stepY = n.y + Math.sin(a) * 28;
    if (blocksAt(stepX, stepY, 14)) continue;
    const score = -off*off;   // prefer the straight-line direction
    if (score > bestScore) { bestScore = score; bestAng = a; }
  }
  const speed = (n.sprinting && n.chakra > 0) ? n.speed * 1.55 : n.speed;
  n.vx = Math.cos(bestAng) * speed;
  n.vy = Math.sin(bestAng) * speed;
}

// =====================================================================
// PLAYER INPUT → MOVEMENT
// =====================================================================
function applyPlayerInput(n, dt) {
  let dx = 0, dy = 0;
  if (keys['w'] || keys['arrowup'])    dy -= 1;
  if (keys['s'] || keys['arrowdown'])  dy += 1;
  if (keys['a'] || keys['arrowleft'])  dx -= 1;
  if (keys['d'] || keys['arrowright']) dx += 1;
  // Touch joystick overlay
  if (joy.active) { dx = joy.dx; dy = joy.dy; }
  const len = Math.hypot(dx, dy);
  if (len > 0) { dx /= len; dy /= len; }
  // Sprint via Shift OR mobile sprint button
  n.sprinting = (keys.shift || joy.sprint) && n.chakra > 0;
  const speed = n.sprinting ? n.speed * 1.55 : n.speed;
  // Velocity smoothing — accelerate toward the target velocity at a
  // capped rate so direction-changes feel like a runner pivoting
  // rather than a plane teleporting. Higher accel when sprinting so
  // dashes still snap.
  const targetVx = dx * speed, targetVy = dy * speed;
  const accel = n.sprinting ? 24 : 18;     // (target − current) ramp /sec
  n.vx += (targetVx - n.vx) * Math.min(1, dt * accel);
  n.vy += (targetVy - n.vy) * Math.min(1, dt * accel);
}

// =====================================================================
// MOVE + COLLIDE — axis-separated step, water slowdown, world clamp
// =====================================================================
function stepNinja(n, dt) {
  let speedScale = 1;
  if (inWater(n.x, n.y)) speedScale = 0.5;     // ponds slow
  let nx = n.x + n.vx * dt * speedScale;
  let ny = n.y + n.vy * dt * speedScale;
  // axis-separated collision so corner-grazing doesn't lock movement
  if (!blocksAt(nx, n.y, 14)) n.x = nx;
  if (!blocksAt(n.x, ny, 14)) n.y = ny;
  // clamp to world bounds defensively
  n.x = Math.max(14, Math.min(WORLD.w - 14, n.x));
  n.y = Math.max(14, Math.min(WORLD.h - 14, n.y));
  // facing — only flip when there's enough horizontal velocity
  if (Math.abs(n.vx) > 8) n.facing = n.vx > 0 ? 1 : -1;
  // run cycle phase advances proportional to speed magnitude
  const speed = Math.hypot(n.vx, n.vy);
  n.runPhase += dt * (speed * 0.025);
  // chakra: drain on sprint, regen on rest
  if (n.sprinting && speed > 10) {
    n.chakra = Math.max(0, n.chakra - dt * 22);
  } else {
    n.chakra = Math.min(n.maxChakra, n.chakra + dt * (n.isIt ? 8 : 14));
  }
  // step sound for player only, throttled
  if (n.isPlayer && speed > 50) {
    const now = performance.now();
    const period = n.sprinting ? 180 : 260;
    if (now - n.lastStepT > period) { n.lastStepT = now; sfx.step(); }
  }
}

// =====================================================================
// TAG LOGIC — IT touches a non-immune ninja → role swap, smoke, immunity
// =====================================================================
function checkTags(t) {
  const it = NINJAS.find(n => n.isIt);
  if (!it) return;
  for (const other of NINJAS) {
    if (other === it || other.isIt) continue;
    if (t < (other.immuneUntil || 0)) continue;
    const d = Math.hypot(other.x - it.x, other.y - it.y);
    if (d < 30) {
      // TAG! swap roles
      it.isIt = false;
      it.immuneUntil = t + 1500;       // 1.5s grace
      other.isIt = true;
      state.itTimerLeft = 6;
      // Knockback impulse — small recoil between the two so the swap
      // reads as a physical contact. Capped so it doesn't punt the
      // ninja across the field.
      const dxk = (it.x - other.x) / (d || 1), dyk = (it.y - other.y) / (d || 1);
      const KICK = 280;
      it.vx    += dxk * KICK;
      it.vy    += dyk * KICK;
      other.vx -= dxk * KICK * 0.4;
      other.vy -= dyk * KICK * 0.4;
      // Smoke poof at midpoint
      spawnSmoke((it.x + other.x) / 2, (it.y + other.y) / 2);
      sfx.tag();
      // Floating text
      spawnFloat((it.x + other.x) / 2, (it.y + other.y) / 2, 'TAG!');
      showBanner(other.isPlayer ? 'YOU\'RE IT!' : it.isPlayer ? 'PASSED ON!' : it.name + ' → ' + other.name,
        other.isPlayer ? 'tag someone in 6s' : '');
      return;
    }
  }
}

// =====================================================================
// PARTICLES — smoke poof on tag, dust kick under sprinting feet
// =====================================================================
const particles = [];
function spawnSmoke(x, y) {
  for (let i = 0; i < 14; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 60 + Math.random() * 80;
    particles.push({
      x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 30,
      life: 0.9 + Math.random() * 0.3, age: 0,
      r: 8 + Math.random() * 6, color: 'rgba(220,225,230,0.9)',
      kind: 'smoke',
    });
  }
}
function spawnDust(x, y, facing) {
  for (let i = 0; i < 2; i++) {
    particles.push({
      x: x - facing * (4 + Math.random() * 4),
      y: y + 16 + Math.random() * 4,
      vx: -facing * (40 + Math.random() * 40),
      vy: -10 - Math.random() * 20,
      life: 0.5, age: 0,
      r: 3 + Math.random() * 2,
      color: 'rgba(180,160,120,0.8)',
      kind: 'dust',
    });
  }
}
function tickParticles(dt) {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.age += dt;
    p.x += p.vx * dt; p.y += p.vy * dt;
    if (p.kind === 'smoke') p.vy += 60 * dt;   // smoke rises a bit then settles
    else p.vy += 120 * dt;
    p.vx *= Math.pow(0.92, dt * 60);
    if (p.age >= p.life) particles.splice(i, 1);
  }
}
function spawnFloat(x, y, text) {
  // Use a DOM element for the floating tag text so the CSS keyframe handles it
  const el = document.createElement('div');
  el.className = 'float';
  el.textContent = text;
  // World coords → screen via the camera; we anchor to current camera state
  // (recomputed at draw time but we just place at the current screen pos)
  const sx = (x - cam.x) + cvs.clientWidth / 2;
  const sy = (y - cam.y) + cvs.clientHeight / 2;
  el.style.left = sx + 'px'; el.style.top = sy + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1100);
}

// =====================================================================
// CAMERA
// =====================================================================
const cam = { x: WORLD.w / 2, y: WORLD.h / 2 };
function updateCamera(dt) {
  const player = NINJAS[0];
  // lerp toward player
  cam.x += (player.x - cam.x) * Math.min(1, dt * 6);
  cam.y += (player.y - cam.y) * Math.min(1, dt * 6);
  // clamp so camera doesn't show outside-world black
  const halfW = cvs.clientWidth / 2, halfH = cvs.clientHeight / 2;
  cam.x = Math.max(halfW, Math.min(WORLD.w - halfW, cam.x));
  cam.y = Math.max(halfH, Math.min(WORLD.h - halfH, cam.y));
}

// =====================================================================
// RENDER
// =====================================================================
function clearScene() {
  // grass tint base
  ctx.fillStyle = '#13251c';
  ctx.fillRect(0, 0, cvs.width, cvs.height);
}
function drawGrid() {
  // soft grid pattern visible only over the playable area
  const left = cam.x - cvs.clientWidth / 2;
  const top  = cam.y - cvs.clientHeight / 2;
  ctx.save();
  ctx.translate(-left, -top);
  // checker for grass texture
  const tile = 64;
  for (let y = 0; y < WORLD.h; y += tile) {
    for (let x = 0; x < WORLD.w; x += tile) {
      const odd = ((x / tile) + (y / tile)) % 2 === 0;
      ctx.fillStyle = odd ? '#1a3026' : '#152a20';
      ctx.fillRect(x, y, tile, tile);
    }
  }
  // dirt path through center for visual variety
  ctx.fillStyle = '#3b2e1b';
  ctx.fillRect(WORLD.w/2 - 24, 0, 48, WORLD.h);
  ctx.fillStyle = '#2a2114';
  for (let y = 0; y < WORLD.h; y += 16) ctx.fillRect(WORLD.w/2 - 24, y, 48, 1);
  // border
  ctx.strokeStyle = '#0a1310'; ctx.lineWidth = 6;
  ctx.strokeRect(0, 0, WORLD.w, WORLD.h);
  ctx.restore();
}
function drawGrassDecor(t) {
  const left = cam.x - cvs.clientWidth / 2;
  const top  = cam.y - cvs.clientHeight / 2;
  ctx.save(); ctx.translate(-left, -top);
  ctx.strokeStyle = '#3a5e34'; ctx.lineWidth = 1.4;
  for (const g of decoGrass) {
    if (g.x < left - 16 || g.x > left + cvs.clientWidth + 16) continue;
    if (g.y < top - 16  || g.y > top  + cvs.clientHeight + 16) continue;
    const s = Math.sin(t * 1.3 + g.sway) * 1.5;
    ctx.beginPath();
    ctx.moveTo(g.x, g.y);
    ctx.lineTo(g.x + s, g.y - g.h);
    ctx.stroke();
  }
  ctx.restore();
}
function drawObstacles() {
  const left = cam.x - cvs.clientWidth / 2;
  const top  = cam.y - cvs.clientHeight / 2;
  ctx.save(); ctx.translate(-left, -top);
  // Ponds first (under everything)
  for (const o of obstacles) if (o.kind === 'pond') {
    // water — concentric ellipses with wave hint
    ctx.fillStyle = '#1f4a72';
    ctx.beginPath(); ctx.ellipse(o.x, o.y, o.r, o.r * 0.78, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = 'rgba(122,220,255,0.18)';
    ctx.beginPath(); ctx.ellipse(o.x, o.y - 4, o.r * 0.78, o.r * 0.6, 0, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#0a2438'; ctx.lineWidth = 2;
    ctx.stroke();
  }
  // Rocks
  for (const o of obstacles) if (o.kind === 'rock') {
    ctx.fillStyle = '#5a5550';
    ctx.beginPath(); ctx.arc(o.x, o.y + 6, o.r * 0.6, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#7a7570';
    ctx.beginPath(); ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#9a9590';
    ctx.beginPath(); ctx.arc(o.x - o.r * 0.3, o.y - o.r * 0.4, o.r * 0.3, 0, Math.PI * 2); ctx.fill();
  }
  // Trees (shadow + trunk + foliage)
  for (const o of obstacles) if (o.kind === 'tree') {
    // shadow
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.beginPath(); ctx.ellipse(o.x, o.y + 6, o.r + 4, (o.r + 4) * 0.5, 0, 0, Math.PI * 2); ctx.fill();
    // trunk
    ctx.fillStyle = '#4a2e1a';
    ctx.fillRect(o.x - 4, o.y - 8, 8, 18);
    // foliage 3-blob
    ctx.fillStyle = '#3a6a3a';
    ctx.beginPath(); ctx.arc(o.x, o.y - 14, o.r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#5fa05f';
    ctx.beginPath(); ctx.arc(o.x - 6, o.y - 18, o.r * 0.7, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(o.x + 6, o.y - 16, o.r * 0.6, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#7fc97f';
    ctx.beginPath(); ctx.arc(o.x - 2, o.y - 22, o.r * 0.4, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}
function drawPetals(dt, t) {
  const left = cam.x - cvs.clientWidth / 2;
  const top  = cam.y - cvs.clientHeight / 2;
  ctx.save(); ctx.translate(-left, -top);
  for (const p of petals) {
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.phase += dt * 2;
    if (p.x > WORLD.w) p.x = 0;
    if (p.y > WORLD.h) p.y = 0;
    const sway = Math.sin(p.phase) * 4;
    if (p.x + sway < left - 10 || p.x + sway > left + cvs.clientWidth + 10) continue;
    if (p.y < top - 10 || p.y > top + cvs.clientHeight + 10) continue;
    ctx.fillStyle = 'rgba(255,170,200,0.85)';
    ctx.beginPath(); ctx.ellipse(p.x + sway, p.y, p.r, p.r * 0.6, p.phase, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

// === SIDE-VIEW NINJA SPRITE (drawn each frame, naruto-run pose) ===
// Sprite drawn at world coordinates (cx, cy); the canvas is already
// translated by -camera.x/-camera.y at this point (by the caller).
//
// All limbs are positioned in a "facing right" body-local frame, then
// the entire sprite is mirrored via ctx.scale(facing, 1) so left-facing
// is just a horizontal flip. The forward-lean for naruto-run is applied
// AFTER the mirror so the lean always tilts toward the direction of
// travel.
function drawNinja(n, t) {
  const speed = Math.hypot(n.vx, n.vy);
  const moving = speed > 12;
  // Per chat: only the IT ninja leans forward + flails arms forward.
  // Runners hold the classic upright naruto-run with arms trailing
  // behind. So we branch on isIt for both the body tilt AND the arm
  // pose downstream.
  const sprintNow = n.sprinting && moving && n.chakra > 0;
  let tilt;
  if (n.isIt && moving) {
    // IT goes FULL DEMON HUNT — sprint pose tips the head almost
    // ahead of the feet (~60° forward of vertical). Anime-extreme.
    tilt = sprintNow ? -1.05 : -0.70;
  } else if (moving) {
    // Runners do the classic trailing anime run — they still lean,
    // but less aggressively than IT. Sprint = deeper lean, walk = soft.
    tilt = sprintNow ? -0.42 : -0.30;
  } else {
    tilt = 0;
  }
  const phase = n.runPhase * (sprintNow ? 1.7 : 1.0);
  // animation: legs alternate via sin; sprint = wider sweep + faster cycle.
  // IT during sprint gets an even WIDER stride — pure pursuit mode.
  const legAmp = (n.isIt && sprintNow) ? 1.45
               :  sprintNow            ? 1.15
               :                         0.85;
  const legA = Math.sin(phase * 8) * legAmp;
  const legB = -legA;
  // dust under sprinting feet — IT gets noticeably more particles
  // (2× spawn chance + a kicked-up extra burst) for the "menace" feel.
  if (moving && n.sprinting) {
    const chance = n.isIt ? 0.55 : 0.25;
    if (Math.random() < chance) spawnDust(n.x + n.facing * 4, n.y, n.facing);
    if (n.isIt && Math.random() < 0.30) spawnDust(n.x + n.facing * 8, n.y - 2, n.facing);
  }
  ctx.save();
  ctx.translate(n.x, n.y);
  // mirror for facing
  ctx.scale(n.facing, 1);
  // forward lean (rotates toward +X which is forward-facing in body frame)
  ctx.rotate(tilt);
  // soft shadow first (under lean)
  ctx.save();
  ctx.rotate(-tilt);     // shadow stays flat
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath(); ctx.ellipse(0, 18, 14 + speed * 0.02, 4, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();
  // immunity blink — periodically skip drawing the body to flash
  if (t * 1000 < (n.immuneUntil || 0) && Math.floor(t * 12) % 2 === 0) {
    ctx.restore();
    return;
  }
  // === legs (under everything else) ===
  ctx.fillStyle = '#1c2024';      // dark trousers
  // back leg
  drawLeg(legA);
  // front leg (slightly in front)
  drawLeg(legB, 4);
  // sandals on each foot
  ctx.fillStyle = '#3a2818';
  drawSandal(legA);
  drawSandal(legB, 4);
  // === arms FIRST so the torso paints over the shoulder area ===
  // IT and runners get DIFFERENT arm poses now (chat directive):
  //   • IT     : both arms FLAIL FORWARD — wild grabbing reach,
  //              big sin-driven swing so the pose looks frantic.
  //   • RUNNER : both arms PINNED BACK — classic naruto trail,
  //              no swing while sprinting (rigid silhouette).
  // Drawing the arms before the torso keeps only the trailing tail
  // visible behind the body in the runner case; in the IT case the
  // forward-extended arms reach OUT in front of the silhouette so
  // the torso doesn't hide them.
  if (n.isIt && moving) {
    // FLAILING REACH — wide ±0.7 rad oscillation drives the arms
    // ahead like a desperate grab. Sprint adds a second-harmonic
    // jitter so the swing feels frantic rather than metronome-clean.
    const flail = Math.sin(phase * 9) * (sprintNow ? 0.70 : 0.45);
    const jitter = sprintNow ? Math.sin(phase * 17 + 0.7) * 0.12 : 0;
    drawNarutoArmIt( flail + jitter);             // far arm (drawn first)
    drawNarutoArmIt(-flail - jitter + 0.30);      // near arm
  } else {
    // RUNNER — arms pinned straight back. Sprint = zero swing.
    const armSwing = sprintNow ? 0 : (moving ? Math.sin(phase * 8 + 1.2) * 0.08 : 0);
    drawNarutoArm(0.0 - armSwing, true);  // back arm (farther) — drawn first → deepest behind
    drawNarutoArm(0.3 + armSwing);        // back arm (closer)
  }
  // === body torso (longer when leaning) — paints over the shoulders ===
  ctx.fillStyle = '#262d33';      // dark gi
  ctx.beginPath();
  ctx.moveTo(-7, -16);
  ctx.lineTo( 7, -16);
  ctx.lineTo( 9,  10);
  ctx.lineTo(-9,  10);
  ctx.closePath();
  ctx.fill();
  // belt
  ctx.fillStyle = n.isIt ? '#ff5252' : '#8b6f3a';
  ctx.fillRect(-9, -2, 18, 5);
  // === head ===
  ctx.fillStyle = n.color;
  ctx.beginPath(); ctx.arc(2, -22, 9, 0, Math.PI * 2); ctx.fill();
  // headband — colored band across the forehead with metal plate
  ctx.fillStyle = n.headband;
  ctx.fillRect(-6, -29, 16, 4);
  ctx.fillStyle = '#999';
  ctx.fillRect(-2, -28, 7, 2);
  // headband ribbon trailing back
  ctx.fillStyle = n.headband;
  ctx.beginPath();
  ctx.moveTo(-6, -27);
  ctx.lineTo(-14 - speed * 0.02, -22 + Math.sin(phase * 5) * 1.5);
  ctx.lineTo(-12 - speed * 0.02, -19);
  ctx.lineTo(-6, -25);
  ctx.closePath();
  ctx.fill();
  // hair (spiky) — short hair flowing back
  ctx.fillStyle = '#1a1a22';
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.moveTo(-2 - i * 2, -28);
    ctx.lineTo(-12 - i * 3 - speed * 0.02, -22 - i + Math.sin(phase * 6 + i) * 1);
    ctx.lineTo(-2 - i * 2, -25);
    ctx.closePath();
    ctx.fill();
  }
  // eye + furrowed brow (single pixel — toward direction of motion)
  ctx.fillStyle = '#fff';
  ctx.fillRect(5, -22, 3, 2);
  ctx.fillStyle = '#000';
  ctx.fillRect(7, -22, 2, 2);
  // brow
  ctx.fillStyle = '#1a1a22';
  ctx.fillRect(4, -24, 5, 1);
  // scarf trailing back from the neck
  const sc = n.scarf;
  ctx.fillStyle = sc;
  const scWave = Math.sin(phase * 4) * 4;
  ctx.beginPath();
  ctx.moveTo(-2, -16);
  ctx.lineTo(-16 - speed * 0.04, -16 + scWave);
  ctx.lineTo(-22 - speed * 0.05, -10 + scWave * 0.5);
  ctx.lineTo(-14 - speed * 0.04, -8);
  ctx.lineTo(-2, -12);
  ctx.closePath();
  ctx.fill();
  // IT marker — red glow halo
  if (n.isIt) {
    ctx.save();
    ctx.rotate(-tilt);
    ctx.scale(n.facing, 1);
    const pulse = 1 + Math.sin(t * 6) * 0.12;
    ctx.strokeStyle = 'rgba(255, 82, 82, 0.7)';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(0, 0, 22 * pulse, 0, Math.PI * 2); ctx.stroke();
    ctx.strokeStyle = 'rgba(255, 82, 82, 0.3)';
    ctx.lineWidth = 6;
    ctx.beginPath(); ctx.arc(0, 0, 28 * pulse, 0, Math.PI * 2); ctx.stroke();
    ctx.restore();
  }
  ctx.restore();
}
function drawLeg(angle, frontOffset) {
  // angle: leg sweep relative to vertical (+ = forward, − = back)
  const off = frontOffset || 0;
  ctx.save();
  ctx.translate(off, 8);
  ctx.rotate(angle);
  ctx.fillRect(-3, 0, 6, 16);
  ctx.restore();
}
function drawSandal(angle, frontOffset) {
  const off = frontOffset || 0;
  ctx.save();
  ctx.translate(off, 8);
  ctx.rotate(angle);
  ctx.fillRect(-5, 16, 10, 3);
  ctx.restore();
}
// IT-pose arm — extends FORWARD from the shoulder (opposite of the
// runner pose). Same rotation math as drawNarutoArm but with the
// signs flipped so the rect's local +Y axis points toward +X (the
// direction of motion). Forearm bends slightly UP at the elbow so
// the hand reaches even further forward — the "grabbing" silhouette.
function drawNarutoArmIt(angleOffset) {
  ctx.save();
  ctx.translate(-2, -10);
  ctx.rotate(-1.45 + angleOffset);   // arm shaft extends FORWARD + slight up
  ctx.fillStyle = '#262d33';
  ctx.fillRect(-2, 0, 4, 14);
  // forearm — bent slightly upward (toward the target)
  ctx.translate(0, 14);
  ctx.rotate(-0.30);
  ctx.fillStyle = '#262d33';
  ctx.fillRect(-2, 0, 4, 12);
  // grabbing hand — bigger than the runner's, claw-shaped
  ctx.fillStyle = '#e8c898';
  ctx.fillRect(-3, 11, 6, 4);
  ctx.fillStyle = '#1a1a22';
  ctx.fillRect(2, 11, 1, 5);   // small claw / fingernail accent
  ctx.fillRect(0, 11, 1, 5);
  ctx.restore();
}
function drawNarutoArm(angleOffset, lower) {
  // arm extends BACKWARD from the shoulder.
  //
  // The body-local frame has +X = forward (direction of motion).
  // fillRect(-2, 0, 4, 14) draws a rect that extends in local +Y.
  // Canvas's ctx.rotate(angle) rotates the local axes CLOCKWISE by
  // `angle` rad (since +Y is down-screen). To make the rect's +Y
  // direction point toward -X (backward), rotate by +π/2 ≈ +1.57.
  // Previous code used -1.45 which rotated +Y toward +X — i.e. arms
  // pointing FORWARD past the body. Sign was inverted; this fixes it.
  ctx.save();
  ctx.translate(-2, -10);
  ctx.rotate(1.45 + angleOffset);    // arm shaft trails backward + slight up
  ctx.fillStyle = '#262d33';
  ctx.fillRect(-2, 0, 4, 14);
  // forearm — bend at the elbow, sign mirrors the upper-arm flip so
  // the hand drops slightly toward the trailing ground.
  ctx.translate(0, 14);
  ctx.rotate(0.25);
  ctx.fillStyle = '#262d33';
  ctx.fillRect(-2, 0, 4, 12);
  // hand (skin colour)
  ctx.fillStyle = '#e8c898';
  ctx.fillRect(-3, 11, 5, 3);
  ctx.restore();
}
function drawParticles() {
  const left = cam.x - cvs.clientWidth / 2;
  const top  = cam.y - cvs.clientHeight / 2;
  ctx.save(); ctx.translate(-left, -top);
  for (const p of particles) {
    const a = 1 - p.age / p.life;
    if (p.kind === 'smoke') {
      ctx.fillStyle = 'rgba(220,225,230,' + (a * 0.85).toFixed(3) + ')';
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r * (1 + (1 - a)), 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.fillStyle = 'rgba(180,160,120,' + (a * 0.85).toFixed(3) + ')';
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2); ctx.fill();
    }
  }
  ctx.restore();
}
function drawNamesAndArrows(t) {
  // Always draw the IT ninja's name above their head, and an off-screen
  // arrow pointing toward the IT ninja (so the player knows where the
  // chaser is when off-camera).
  const left = cam.x - cvs.clientWidth / 2;
  const top  = cam.y - cvs.clientHeight / 2;
  ctx.save(); ctx.translate(-left, -top);
  for (const n of NINJAS) {
    if (!n.isIt && !n.isPlayer) continue;
    ctx.fillStyle = n.isIt ? '#ff8888' : '#7adcff';
    ctx.font = 'bold 12px "Silkscreen", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(n.name + (n.isIt ? ' · IT' : ''), n.x, n.y - 38);
  }
  ctx.restore();
  // off-screen arrow for IT
  const it = NINJAS.find(n => n.isIt);
  if (it) {
    const sx = it.x - left, sy = it.y - top;
    const margin = 60;
    if (sx < margin || sx > cvs.clientWidth - margin || sy < margin || sy > cvs.clientHeight - margin) {
      const cx = cvs.clientWidth / 2, cy = cvs.clientHeight / 2;
      const ang = Math.atan2(sy - cy, sx - cx);
      const px = cx + Math.cos(ang) * (Math.min(cvs.clientWidth, cvs.clientHeight) / 2 - 50);
      const py = cy + Math.sin(ang) * (Math.min(cvs.clientWidth, cvs.clientHeight) / 2 - 50);
      ctx.save();
      ctx.translate(px, py); ctx.rotate(ang);
      ctx.fillStyle = '#ff5252';
      ctx.beginPath(); ctx.moveTo(20, 0); ctx.lineTo(-10, -10); ctx.lineTo(-10, 10); ctx.closePath(); ctx.fill();
      ctx.restore();
    }
  }
}

// =====================================================================
// MAIN LOOP
// =====================================================================
let lastT = performance.now();
let elapsedT = 0;
function loop(now) {
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  if (state.phase === 'playing' && !state.paused) update(dt);
  elapsedT += dt;
  bannerT -= dt;
  if (bannerT <= 0) hideBanner();
  draw(elapsedT, dt);
  requestAnimationFrame(loop);
}
function update(dt) {
  state.timeLeft -= dt;
  if (state.timeLeft <= 0) { state.timeLeft = 0; endRound(); return; }
  const t = performance.now();
  // input → player velocity
  applyPlayerInput(NINJAS[0], dt);
  // AI brains for the rest
  for (let i = 1; i < NINJAS.length; i++) aiTick(NINJAS[i], dt, t);
  // step movement + collisions
  for (const n of NINJAS) stepNinja(n, dt);
  // tag detection
  checkTags(t);
  // accumulate safe time for player
  if (!NINJAS[0].isIt) NINJAS[0].safeAccum += dt;
  // IT timer drains chakra if player is IT and stalls
  if (NINJAS[0].isIt) {
    state.itTimerLeft = Math.max(0, state.itTimerLeft - dt);
    if (state.itTimerLeft === 0) {
      NINJAS[0].chakra = Math.max(0, NINJAS[0].chakra - dt * 12);
    }
  }
  // particles
  tickParticles(dt);
  // camera follow
  updateCamera(dt);
  // HUD
  document.getElementById('hudTime').textContent = Math.ceil(state.timeLeft);
  document.getElementById('hudScore').textContent = NINJAS[0].safeAccum.toFixed(1) + 's';
  const sc = document.getElementById('hudStatusCell');
  const sv = document.getElementById('hudStatus');
  if (NINJAS[0].isIt) { sc.classList.add('it'); sv.textContent = 'IT! ' + state.itTimerLeft.toFixed(1) + 's'; }
  else                { sc.classList.remove('it'); sv.textContent = 'RUNNER'; }
  document.getElementById('hudChakraText').textContent = Math.round(NINJAS[0].chakra) + '%';
  document.getElementById('chakraFill').style.width = (NINJAS[0].chakra / NINJAS[0].maxChakra * 100) + '%';
}
function draw(t, dt) {
  clearScene();
  drawGrid();
  drawObstacles();
  drawGrassDecor(t);
  drawPetals(dt, t);
  // particles below ninjas (dust kicks)
  drawParticles();
  // sort ninjas by Y so southern ones overlap northern ones (top-down depth)
  const order = NINJAS.slice().sort((a, b) => a.y - b.y);
  // we need to translate by the camera before drawing each ninja
  const left = cam.x - cvs.clientWidth / 2;
  const top  = cam.y - cvs.clientHeight / 2;
  ctx.save(); ctx.translate(-left, -top);
  for (const n of order) drawNinja(n, t);
  ctx.restore();
  drawNamesAndArrows(t);
  // smoke smoke (above ninjas) — second pass for the smoke kind only
  // already handled in drawParticles (z-order: between ground + ninjas).
}
requestAnimationFrame(loop);

// Move keyboard focus to the start button so Enter immediately works
requestAnimationFrame(() => document.getElementById('playBtn').focus());

})();
</script>
