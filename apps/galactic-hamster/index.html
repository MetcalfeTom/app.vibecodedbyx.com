<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;overflow:hidden;font-family:'VT323',monospace;
  width:100vw;height:100vh;display:flex;flex-direction:column;align-items:center;
  justify-content:center;user-select:none;image-rendering:pixelated}

#game-wrap{position:relative;width:min(800px,100vw);height:min(600px,100vh);
  background:#000;border:3px solid #333;overflow:hidden}
canvas{display:block;width:100%;height:100%;cursor:url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='24' height='24'><circle cx='12' cy='12' r='4' fill='none' stroke='%23ff0' stroke-width='2'/><line x1='12' y1='2' x2='12' y2='8' stroke='%23ff0' stroke-width='1'/><line x1='12' y1='16' x2='12' y2='22' stroke='%23ff0' stroke-width='1'/><line x1='2' y1='12' x2='8' y2='12' stroke='%23ff0' stroke-width='1'/><line x1='16' y1='12' x2='22' y2='12' stroke='%23ff0' stroke-width='1'/></svg>") 12 12, crosshair}

#verb-bar{position:absolute;bottom:0;left:0;right:0;height:80px;
  background:linear-gradient(180deg,#1a1a3a,#0e0e22);border-top:2px solid #333;
  display:flex;flex-wrap:wrap;align-items:center;padding:4px 8px;gap:4px}
#verb-bar button{font-family:'Press Start 2P',monospace;font-size:9px;
  padding:6px 10px;background:#222244;border:2px solid #444;color:#aaa;
  cursor:pointer;border-radius:2px;letter-spacing:0.5px}
#verb-bar button:hover{background:#333366;color:#fff;border-color:#666}
#verb-bar button.active{background:#443388;color:#ff0;border-color:#ff0}

#inventory{position:absolute;bottom:82px;left:0;right:0;height:48px;
  background:#0c0c1e;border-top:2px solid #333;display:flex;
  align-items:center;padding:0 8px;gap:6px;overflow-x:auto}
.inv-item{width:40px;height:40px;background:#1a1a3a;border:2px solid #333;
  border-radius:3px;display:flex;align-items:center;justify-content:center;
  font-size:24px;cursor:pointer;flex-shrink:0}
.inv-item:hover{border-color:#ff0;background:#222244}
.inv-item.selected{border-color:#0f0;background:#1a331a;box-shadow:0 0 8px rgba(0,255,0,0.2)}

#text-box{position:absolute;bottom:130px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,20,0.92);border:2px solid #555;border-radius:4px;
  padding:8px 16px;color:#ddd;font-family:'VT323',monospace;font-size:18px;
  max-width:90%;text-align:center;pointer-events:none;display:none;
  text-shadow:1px 1px 0 #000;line-height:1.3}

#title-screen{position:absolute;inset:0;background:#000;display:flex;
  flex-direction:column;align-items:center;justify-content:center;z-index:20;
  cursor:pointer}
#title-screen h1{font-family:'Press Start 2P',monospace;font-size:clamp(14px,3vw,22px);
  color:#ff0;text-shadow:2px 2px 0 #880,4px 4px 0 #440;margin-bottom:8px;text-align:center;
  line-height:1.6}
#title-screen .sub{font-family:'VT323',monospace;font-size:20px;color:#888;margin-top:12px}
#title-screen .blink{animation:blink 1s step-end infinite;color:#aaa;margin-top:30px;font-size:16px}
@keyframes blink{50%{opacity:0}}

#sound-toggle{position:absolute;top:6px;right:8px;z-index:25;
  font-family:'Press Start 2P',monospace;font-size:8px;padding:4px 8px;
  background:#222244;border:2px solid #444;color:#aaa;cursor:pointer;border-radius:2px}
#sound-toggle:hover{background:#333366;color:#fff;border-color:#666}
#sound-toggle.muted{color:#660;border-color:#660}
.back-link{position:fixed;bottom:4px;right:8px;z-index:30}
.back-link a{color:#333;font-size:9px;text-decoration:none;font-family:'VT323',monospace}
.back-link a:hover{color:#888}
</style>

<body>
<div id="game-wrap">
  <canvas id="c"></canvas>
  <div id="text-box"></div>
  <div id="inventory"></div>
  <div id="verb-bar">
    <button data-verb="look">Look at</button>
    <button data-verb="use">Use</button>
    <button data-verb="take">Pick up</button>
    <button data-verb="talk">Talk to</button>
    <button data-verb="push">Push</button>
    <button data-verb="open">Open</button>
  </div>
  <button id="sound-toggle">🔊 SFX</button>
  <div id="title-screen">
    <h1>🐹 GALACTIC<br>HAMSTER QUEST</h1>
    <div class="sub">A POINT & CLICK ADVENTURE</div>
    <div class="sub" style="font-size:14px;color:#666;margin-top:6px">An Interstellar Rodent Production</div>
    <div class="blink" style="font-family:'Press Start 2P';font-size:10px">CLICK TO START</div>
  </div>
</div>
<div class="back-link"><a href="https://sloppy.live">← sloppy.live</a></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const GW = 800, GH = 600;
canvas.width = GW; canvas.height = GH;

// === GAME STATE ===
let currentVerb = 'look';
let selectedItem = null;
let inventory = [];
let gameFlags = {};
let currentRoom = 'cell';
let textTimer = null;
let textQueue = [];
let gameStarted = false;
let hamsterX = 200, hamsterY = 310, hamsterDir = 1, hamsterFrame = 0;
let walkTarget = null;
let walkCallback = null;
let animTimer = 0;

// === AUDIO ENGINE ===
let audioCtx = null;
let masterGain = null;
let musicGain = null;
let sfxGain = null;
let muted = false;
let musicPlaying = false;
let musicNodes = [];

function initAudio(){
  if(audioCtx) return;
  audioCtx = new (window.AudioContext||window.webkitAudioContext)();
  masterGain = audioCtx.createGain();
  masterGain.gain.value = 0.6;
  masterGain.connect(audioCtx.destination);
  musicGain = audioCtx.createGain();
  musicGain.gain.value = 0.12;
  musicGain.connect(masterGain);
  sfxGain = audioCtx.createGain();
  sfxGain.gain.value = 0.5;
  sfxGain.connect(masterGain);
}

document.getElementById('sound-toggle').onclick = () => {
  muted = !muted;
  const btn = document.getElementById('sound-toggle');
  btn.textContent = muted ? '🔇 SFX' : '🔊 SFX';
  btn.classList.toggle('muted', muted);
  if(masterGain) masterGain.gain.value = muted ? 0 : 0.6;
};

// Voice profiles: pitch, speed, wave, vibrato
const VOICES = {
  nibbles:  {base:320, range:120, speed:0.035, wave:'square',   vibrato:8,  vibAmt:15},
  guard:    {base:80,  range:30,  speed:0.08,  wave:'sawtooth', vibrato:3,  vibAmt:5},
  robot:    {base:200, range:180, speed:0.025, wave:'square',   vibrato:20, vibAmt:40},
  mouse:    {base:600, range:200, speed:0.02,  wave:'sine',     vibrato:12, vibAmt:30},
  narrator: {base:180, range:60,  speed:0.04,  wave:'triangle', vibrato:5,  vibAmt:8},
};

function speakText(text, voiceId){
  if(!audioCtx || muted) return;
  const v = VOICES[voiceId] || VOICES.nibbles;
  const chars = text.replace(/[^a-zA-Z ]/g,'');
  const now = audioCtx.currentTime;
  let t = now;
  for(let i = 0; i < Math.min(chars.length, 60); i++){
    const ch = chars[i];
    if(ch === ' '){ t += v.speed * 2; continue; }
    const charCode = ch.toLowerCase().charCodeAt(0) - 97;
    const freq = v.base + (charCode / 26) * v.range;
    const dur = v.speed + Math.random()*v.speed*0.3;
    const osc = audioCtx.createOscillator();
    osc.type = v.wave;
    osc.frequency.setValueAtTime(freq, t);
    // Vibrato
    const lfo = audioCtx.createOscillator();
    const lfoGain = audioCtx.createGain();
    lfo.frequency.value = v.vibrato;
    lfoGain.gain.value = v.vibAmt;
    lfo.connect(lfoGain);
    lfoGain.connect(osc.frequency);
    lfo.start(t); lfo.stop(t + dur);
    const env = audioCtx.createGain();
    env.gain.setValueAtTime(0, t);
    env.gain.linearRampToValueAtTime(0.15, t + dur*0.1);
    env.gain.linearRampToValueAtTime(0.12, t + dur*0.7);
    env.gain.linearRampToValueAtTime(0, t + dur);
    osc.connect(env);
    env.connect(sfxGain);
    osc.start(t); osc.stop(t + dur + 0.01);
    t += dur;
  }
}

// Detect voice from text content
function detectVoice(text){
  const t = text.toLowerCase();
  if(t.includes('snooore') || t.includes('space tacos')) return 'guard';
  if(t.includes('unit rx') || t.includes('analyzing') || t.includes('sustenance') || t.includes('happy beeps') || t.includes('organic')) return 'robot';
  if(t.includes('beep boop bzz') || t.includes('sad beeping')) return 'mouse';
  if(t.includes('wanted:') || t.includes('captain nibbles wakes')) return 'narrator';
  return 'nibbles';
}

// SFX library
function playSfx(type){
  if(!audioCtx || muted) return;
  const now = audioCtx.currentTime;
  switch(type){
    case 'pickup': {
      const o = audioCtx.createOscillator();
      o.type = 'sine';
      o.frequency.setValueAtTime(500, now);
      o.frequency.exponentialRampToValueAtTime(900, now+0.12);
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.2, now);
      g.gain.linearRampToValueAtTime(0, now+0.15);
      o.connect(g); g.connect(sfxGain);
      o.start(now); o.stop(now+0.16);
      break;
    }
    case 'door': {
      // Beep then swoosh
      const o1 = audioCtx.createOscillator();
      o1.type = 'square';
      o1.frequency.value = 880;
      const g1 = audioCtx.createGain();
      g1.gain.setValueAtTime(0.12, now);
      g1.gain.setValueAtTime(0, now+0.08);
      o1.connect(g1); g1.connect(sfxGain);
      o1.start(now); o1.stop(now+0.1);
      // Swoosh (noise)
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.4, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/d.length*5);
      const ns = audioCtx.createBufferSource();
      ns.buffer = buf;
      const gn = audioCtx.createGain();
      gn.gain.setValueAtTime(0, now+0.1);
      gn.gain.linearRampToValueAtTime(0.15, now+0.15);
      gn.gain.linearRampToValueAtTime(0, now+0.5);
      const flt = audioCtx.createBiquadFilter();
      flt.type = 'bandpass'; flt.frequency.value = 2000; flt.Q.value = 0.5;
      ns.connect(flt); flt.connect(gn); gn.connect(sfxGain);
      ns.start(now+0.1); ns.stop(now+0.55);
      break;
    }
    case 'metal': {
      const o = audioCtx.createOscillator();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(150, now);
      o.frequency.exponentialRampToValueAtTime(60, now+0.3);
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.15, now);
      g.gain.linearRampToValueAtTime(0, now+0.35);
      o.connect(g); g.connect(sfxGain);
      o.start(now); o.stop(now+0.36);
      break;
    }
    case 'beep': {
      [660, 880].forEach((f,i) => {
        const o = audioCtx.createOscillator();
        o.type = 'sine';
        o.frequency.value = f;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0.12, now+i*0.1);
        g.gain.linearRampToValueAtTime(0, now+i*0.1+0.08);
        o.connect(g); g.connect(sfxGain);
        o.start(now+i*0.1); o.stop(now+i*0.1+0.1);
      });
      break;
    }
    case 'creak': {
      const o = audioCtx.createOscillator();
      o.type = 'sawtooth';
      o.frequency.setValueAtTime(200, now);
      o.frequency.linearRampToValueAtTime(80, now+0.5);
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.08, now);
      g.gain.linearRampToValueAtTime(0, now+0.5);
      o.connect(g); g.connect(sfxGain);
      o.start(now); o.stop(now+0.55);
      break;
    }
    case 'clunk': {
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.15, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/d.length*8);
      const ns = audioCtx.createBufferSource();
      ns.buffer = buf;
      const g = audioCtx.createGain();
      g.gain.value = 0.2;
      const flt = audioCtx.createBiquadFilter();
      flt.type = 'lowpass'; flt.frequency.value = 800;
      ns.connect(flt); flt.connect(g); g.connect(sfxGain);
      ns.start(now); ns.stop(now+0.2);
      break;
    }
    case 'step': {
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.04, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/d.length*12);
      const ns = audioCtx.createBufferSource();
      ns.buffer = buf;
      const g = audioCtx.createGain();
      g.gain.value = 0.06;
      const flt = audioCtx.createBiquadFilter();
      flt.type = 'lowpass'; flt.frequency.value = 400;
      ns.connect(flt); flt.connect(g); g.connect(sfxGain);
      ns.start(now);
      break;
    }
    case 'win': {
      [523,659,784,1047].forEach((f,i) => {
        const o = audioCtx.createOscillator();
        o.type = 'sine';
        o.frequency.value = f;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0, now+i*0.15);
        g.gain.linearRampToValueAtTime(0.15, now+i*0.15+0.05);
        g.gain.linearRampToValueAtTime(0, now+i*0.15+0.4);
        o.connect(g); g.connect(sfxGain);
        o.start(now+i*0.15); o.stop(now+i*0.15+0.45);
      });
      break;
    }
    case 'roomchange': {
      const o = audioCtx.createOscillator();
      o.type = 'triangle';
      o.frequency.setValueAtTime(300, now);
      o.frequency.exponentialRampToValueAtTime(150, now+0.25);
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.1, now);
      g.gain.linearRampToValueAtTime(0, now+0.3);
      o.connect(g); g.connect(sfxGain);
      o.start(now); o.stop(now+0.31);
      break;
    }
  }
}

// Background music — ambient space drone
function startMusic(){
  if(!audioCtx || musicPlaying) return;
  musicPlaying = true;

  // Base drone
  const drone = audioCtx.createOscillator();
  drone.type = 'sine';
  drone.frequency.value = 55; // low A
  drone.connect(musicGain);
  drone.start();
  musicNodes.push(drone);

  // Pad chord
  [82.4, 110, 164.8].forEach(f => {
    const o = audioCtx.createOscillator();
    o.type = 'triangle';
    o.frequency.value = f;
    const g = audioCtx.createGain();
    g.gain.value = 0.4;
    o.connect(g); g.connect(musicGain);
    o.start();
    musicNodes.push(o);
  });

  // Slow LFO on drone for movement
  const lfo = audioCtx.createOscillator();
  lfo.frequency.value = 0.08;
  const lfoG = audioCtx.createGain();
  lfoG.gain.value = 5;
  lfo.connect(lfoG);
  lfoG.connect(drone.frequency);
  lfo.start();
  musicNodes.push(lfo);

  // Filtered noise bed
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*4, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i]=(Math.random()*2-1)*0.03;
  const noise = audioCtx.createBufferSource();
  noise.buffer = buf; noise.loop = true;
  const flt = audioCtx.createBiquadFilter();
  flt.type = 'bandpass'; flt.frequency.value = 400; flt.Q.value = 2;
  // LFO on filter
  const fltLfo = audioCtx.createOscillator();
  fltLfo.frequency.value = 0.05;
  const fltLfoG = audioCtx.createGain();
  fltLfoG.gain.value = 200;
  fltLfo.connect(fltLfoG); fltLfoG.connect(flt.frequency);
  fltLfo.start();
  noise.connect(flt); flt.connect(musicGain);
  noise.start();
  musicNodes.push(noise, fltLfo);

  // Random melodic pings
  function ping(){
    if(!musicPlaying || !audioCtx) return;
    const notes = [220,261.6,329.6,392,440,523.3];
    const f = notes[Math.floor(Math.random()*notes.length)];
    const o = audioCtx.createOscillator();
    o.type = 'sine';
    o.frequency.value = f;
    const g = audioCtx.createGain();
    const t = audioCtx.currentTime;
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.3, t+0.05);
    g.gain.exponentialRampToValueAtTime(0.001, t+2);
    const delay = audioCtx.createDelay(0.5);
    delay.delayTime.value = 0.3;
    const delayG = audioCtx.createGain();
    delayG.gain.value = 0.3;
    o.connect(g); g.connect(musicGain); g.connect(delay);
    delay.connect(delayG); delayG.connect(musicGain);
    o.start(t); o.stop(t+2.5);
    setTimeout(ping, 3000 + Math.random()*5000);
  }
  setTimeout(ping, 2000);
}

// Room-specific music mood
function updateMusicMood(room){
  if(!musicGain) return;
  const moods = {
    cell: {gain:0.10, filterQ:1},
    hallway: {gain:0.08, filterQ:3},
    vents: {gain:0.14, filterQ:5},
    hangar: {gain:0.12, filterQ:2},
    ending: {gain:0.18, filterQ:1},
  };
  const m = moods[room] || moods.cell;
  musicGain.gain.linearRampToValueAtTime(m.gain, audioCtx.currentTime + 1);
}

// Step sound throttle
let lastStepTime = 0;

// === ROOMS ===
const rooms = {
  cell: {
    name: 'Detention Cell',
    bg: drawCellBG,
    hotspots: [
      {id:'vent', x:580, y:60, w:100, h:80, name:'Air Vent',
        look:'A rusty air vent. Some screws are loose...',
        use:()=>{
          if(inventory.includes('screwdriver')){
            removeItem('screwdriver');
            gameFlags.ventOpen = true;
            showText('*creak* The vent cover comes off! Freedom smells like... old cheese.');
            return true;
          }
          showText("I can't open it with my tiny paws alone.");
        },
        take:"It's bolted to the wall. Mostly."},
      {id:'bed', x:40, y:200, w:160, h:140, name:'Space Bunk',
        look:"A tiny bunk bed. Even for a hamster it's small.",
        use:"I've had enough sleep. Time to escape!",
        take:"It's welded to the floor. Prison chic."},
      {id:'pillow', x:60, y:220, w:80, h:40, name:'Lumpy Pillow',
        look:()=>gameFlags.hasPillow?'Just an empty bunk now.':'There\'s something hard inside this pillow...',
        take:()=>{
          if(gameFlags.hasPillow) return "Nothing else there.";
          gameFlags.hasPillow = true;
          addItem('screwdriver','🪛');
          showText("Inside the pillow... a screwdriver! Who hides screwdrivers in pillows? Lucky hamsters, that's who.");
        }},
      {id:'toilet', x:300, y:280, w:60, h:80, name:'Space Toilet',
        look:"It makes concerning gurgling noises. I don't want to think about space plumbing.",
        use:"No time for that! I'm on a QUEST!",
        push:()=>{
          if(gameFlags.toiletMoved) return "It won't budge anymore.";
          gameFlags.toiletMoved = true;
          addItem('keycard','💳');
          showText("*SCRREEECH* Under the toilet... a keycard! Don't ask why it was there.");
        }},
      {id:'door', x:680, y:100, w:80, h:260, name:'Cell Door',
        look:"Heavy blast door. There's a card reader beside it.",
        use:()=>{
          if(inventory.includes('keycard')){
            removeItem('keycard');
            gameFlags.doorOpen = true;
            playSfx('door');
            showText("*BEEP* The door slides open! The hallway stretches ahead...", ()=>{
              changeRoom('hallway');
            });
            return true;
          }
          showText("It needs a keycard. Maybe I should search the cell more.");
        },
        open:()=>{
          if(gameFlags.doorOpen) { changeRoom('hallway'); return; }
          showText("Locked tight. Need a keycard.");
        }},
      {id:'exitvent', x:580, y:60, w:100, h:80, name:'Open Vent',
        condition:()=>gameFlags.ventOpen,
        look:"The vent leads somewhere dark and smelly. Classic escape route!",
        use:()=>{
          showText("I crawl through the dusty vent... *cough* *cough*", ()=>{
            changeRoom('vents');
          });
        }},
    ]
  },
  hallway: {
    name: 'Station Hallway',
    bg: drawHallwayBG,
    enter:()=>{ hamsterX = 100; hamsterY = 320; },
    hotspots: [
      {id:'guard', x:380, y:180, w:80, h:180, name:'Sleeping Guard',
        look:"A big alien guard. Snoring like a broken engine. Three eyes, all closed.",
        talk:"*SNOOORE* ... mumble ... no more space tacos ...",
        use:"I'm not touching that. Have you seen those claws?",
        push:"ARE YOU CRAZY? Let sleeping guards lie!"},
      {id:'console', x:520, y:220, w:120, h:80, name:'Security Console',
        look:"Lots of blinking lights. The screen shows a map of the station.",
        use:()=>{
          if(gameFlags.consoleUsed) return "I already downloaded the map.";
          gameFlags.consoleUsed = true;
          addItem('map','🗺️');
          showText("*beep boop* Map downloaded! I can see the hangar bay from here.");
        }},
      {id:'poster', x:180, y:100, w:80, h:100, name:'Wanted Poster',
        look:()=>{

// === DRAWING ===
function drawStars(seed){
  const rng = mulberry32(seed);
  ctx.fillStyle = '#fff';
  for(let i = 0; i < 60; i++){
    const x = rng()*GW, y = rng()*GH*0.4;
    const s = rng()*2;
    ctx.globalAlpha = 0.3 + rng()*0.5;
    ctx.fillRect(x, y, s, s);
  }
  ctx.globalAlpha = 1;
}
function mulberry32(a){
  return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;};
}

  ctx.beginPath();ctx.ellipse(x+12, y-32+bob, 6, 8, 0.3, 0, Math.PI*2);ctx.fill();
  // Inner ears
  ctx.fillStyle = '#ffaa88';
  ctx.beginPath();ctx.ellipse(x-12, y-32+bob, 3, 5, -0.3, 0, Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+12, y-32+bob, 3, 5, 0.3, 0, Math.PI*2);ctx.fill();
  // Eyes
  ctx.fillStyle = '#111';
  ctx.beginPath();ctx.arc(x-6*hamsterDir-2, y-24+bob, 3.5, 0, Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+8*hamsterDir-2, y-24+bob, 3.5, 0, Math.PI*2);ctx.fill();
  // Eye shine
  ctx.fillStyle = '#fff';
  ctx.beginPath();ctx.arc(x-6*hamsterDir-1, y-25+bob, 1.2, 0, Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+8*hamsterDir-1, y-25+bob, 1.2, 0, Math.PI*2);ctx.fill();
  // Nose
  ctx.fillStyle = '#ff8899';
  ctx.beginPath();ctx.ellipse(x+2*hamsterDir, y-19+bob, 3, 2.5, 0, 0, Math.PI*2);ctx.fill();
  // Whiskers
  ctx.strokeStyle = '#997755';
  ctx.lineWidth = 0.7;
  for(let w = -1; w <= 1; w += 2){
    ctx.beginPath();ctx.moveTo(x+2*hamsterDir, y-19+bob);
    ctx.lineTo(x+20*hamsterDir, y-19+bob+w*5);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x+2*hamsterDir, y-19+bob);
    ctx.lineTo(x+18*hamsterDir, y-19+bob+w*10);ctx.stroke();
  }
  // Feet
  ctx.fillStyle = '#cc8833';
  ctx.beginPath();ctx.ellipse(x-10, y+22+bob, 7, 4, 0, 0, Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+10, y+22+bob, 7, 4, 0, 0, Math.PI*2);ctx.fill();
}

// === INVENTORY ===
function addItem(id, emoji){
  if(inventory.includes(id)) return;
  inventory.push(id);
  renderInventory();
  playSfx('pickup');
}
function removeItem(id){
  inventory = inventory.filter(i => i !== id);
  if(selectedItem === id) selectedItem = null;
  renderInventory();
}
const ITEM_EMOJIS = {screwdriver:'🪛',keycard:'💳',string:'🧵',coin:'🪙',cheese:'🧀',fuel:'⛽',map:'🗺️'};
function renderInventory(){
  const el = document.getElementById('inventory');
  el.innerHTML = '';
  inventory.forEach(id => {
    const div = document.createElement('div');
    div.className = 'inv-item' + (selectedItem===id?' selected':'');
    div.textContent = ITEM_EMOJIS[id]||'❓';
    div.title = id;
    div.onclick = () => {
      selectedItem = selectedItem===id ? null : id;
      renderInventory();
    };
    el.appendChild(div);
  });
}

// === TEXT ===
function showText(text, callback){
  if(typeof text === 'function') text = text();
  if(!text) return;
  const el = document.getElementById('text-box');
  el.textContent = text;
  el.style.display = 'block';
  // Speak with character voice
  const voice = detectVoice(text);
  speakText(text, voice);
  // SFX triggers from text content
  const tl = text.toLowerCase();
  if(tl.includes('*creak*')) playSfx('creak');
  else if(tl.includes('*beep*') || tl.includes('beep boop')) playSfx('beep');
  else if(tl.includes('*scrreeech*') || tl.includes('*griiind*')) playSfx('metal');
  else if(tl.includes('*clunk*') || tl.includes('*glug')) playSfx('clunk');
  else if(tl.includes('*rattle')) playSfx('clunk');
  else if(tl.includes('freedom')) playSfx('win');
  if(textTimer) clearTimeout(textTimer);
  textTimer = setTimeout(()=>{
    el.style.display = 'none';
    if(callback) callback();
  }, Math.max(2500, text.length * 45));
}

// === ROOM CHANGE ===
function changeRoom(id){
  currentRoom = id;
  const room = rooms[id];
  if(room.enter) room.enter();
  playSfx('roomchange');
  updateMusicMood(id);
  if(id === 'ending') playSfx('win');
}

// === VERBS ===
document.querySelectorAll('#verb-bar button').forEach(btn => {
  btn.addEventListener('click', () => {
    currentVerb = btn.dataset.verb;
    document.querySelectorAll('#verb-bar button').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// === CLICK HANDLER ===
canvas.addEventListener('click', e => {
  if(!gameStarted) return;
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) / rect.width * GW;
  const my = (e.clientY - rect.top) / rect.height * GH;

  // Check hotspots
  const room = rooms[currentRoom];
  let hit = null;
  for(const h of room.hotspots){
    if(h.condition && !h.condition()) continue;
    if(mx >= h.x && mx <= h.x+h.w && my >= h.y && my <= h.y+h.h){
      hit = h; break;
    }
  }

  if(hit){
    // Walk toward hotspot then interact
    const targetX = Math.max(40, Math.min(GW-40, hit.x + hit.w/2));
    walkTo(targetX, ()=>{
      hamsterDir = targetX > hamsterX ? 1 : -1;
      interact(hit);
    });
  } else {
    // Walk to click point
    const targetX = Math.max(40, Math.min(GW-40, mx));
    walkTo(targetX);
  }
});

function walkTo(tx, cb){
  walkTarget = tx;
  walkCallback = cb || null;
  hamsterDir = tx > hamsterX ? 1 : -1;
}

function interact(hotspot){
  let verb = currentVerb;
  // If using inventory item
  if(selectedItem && verb === 'use'){
    // Try 'use' handler
    const handler = hotspot.use;
    if(typeof handler === 'function'){
      handler();
    } else if(handler){
      showText(handler);
    } else {
      showText("That doesn't work.");
    }
    return;
  }

  const handler = hotspot[verb];
  if(typeof handler === 'function'){
    handler();
  } else if(handler){
    showText(handler);
  } else {
    // Default responses
    const defaults = {
      look: `It's ${hotspot.name.toLowerCase()}. Nothing special.`,
      use: "I can't use that.",
      take: "I can't pick that up.",
      talk: "It doesn't respond. Not surprising.",
      push: "It won't budge.",
      open: "I can't open that.",
    };
    showText(defaults[verb]);
  }
}

// === TITLE SCREEN ===
document.getElementById('title-screen').addEventListener('click', ()=>{
  document.getElementById('title-screen').style.display = 'none';
  gameStarted = true;
  initAudio();
  startMusic();
  showText("Captain Nibbles wakes up in a detention cell on Starbase Omega-7. Time to escape!");
});

// === MAIN LOOP ===
function frame(timestamp){
  animTimer = timestamp * 0.001;

  // Walk
  if(walkTarget !== null){
    const speed = 3;
    const dx = walkTarget - hamsterX;
    if(Math.abs(dx) < speed){
      hamsterX = walkTarget;
      walkTarget = null;
      if(walkCallback){ walkCallback(); walkCallback = null; }
    } else {
      hamsterX += Math.sign(dx) * speed;
      // Footstep sound
      const now = Date.now();
      if(now - lastStepTime > 200){ lastStepTime = now; playSfx('step'); }
    }
  }

  // Draw
  const room = rooms[currentRoom];
  room.bg();
  drawHamster();

  // Hotspot hover indicator
  if(currentRoom !== 'ending'){
    ctx.font = "14px 'VT323'";
    ctx.fillStyle = '#ff0';
    ctx.textAlign = 'left';
    const roomName = room.name;
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0, GH-130, GW, 20);
    ctx.fillStyle = '#888';
    ctx.font = "14px 'VT323'";
    ctx.fillText('📍 ' + roomName, 8, GH-117);
  }

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
