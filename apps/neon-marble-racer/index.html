<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Neon Marble Racer</title>
<link rel="icon" href="https://emojicdn.elk.sh/🔮">
<meta property="og:title" content="Neon Marble Racer">
<meta property="og:description" content="Drop glowing marbles through neon tracks and obstacles you build yourself.">
<meta property="og:url" content="https://sloppy.live/neon-marble-racer">
<meta property="og:image" content="https://emojicdn.elk.sh/🔮?style=apple&size=512">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Anybody:wght@200;600;900&family=Fira+Code:wght@300&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100dvh;overflow:hidden;background:#06060f;font-family:'Fira Code',monospace}
body{display:flex}
canvas{flex:1;display:block;cursor:crosshair}

#sidebar{width:0;overflow:hidden;overflow-y:auto;background:rgba(6,6,20,0.96);border-left:1px solid rgba(80,40,160,0.2);flex-shrink:0;transition:width .25s;display:flex;flex-direction:column}
#sidebar.open{width:185px}
#sidebar h3{font-size:8px;letter-spacing:2px;color:rgba(160,100,255,0.4);text-transform:uppercase;padding:12px 12px 6px;margin:0}
.sp-btn{display:flex;align-items:center;gap:8px;padding:8px 12px;border:none;background:none;cursor:pointer;font-family:'Fira Code',monospace;font-size:10px;color:rgba(180,140,255,0.6);transition:all .15s;text-align:left;width:100%;min-height:40px}
.sp-btn:hover,.sp-btn.active{background:rgba(80,40,160,0.15);color:#c8f}
.sp-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.sp-info{font-size:7px;color:rgba(140,100,200,0.3);margin-top:1px}
.sidebar-section{border-top:1px solid rgba(80,40,160,0.12);margin-top:4px}

#toggle-btn{position:fixed;top:10px;right:12px;background:rgba(30,15,60,0.7);border:1px solid rgba(80,40,160,0.3);color:rgba(160,100,255,0.6);font-family:'Fira Code',monospace;font-size:11px;padding:10px 16px;border-radius:6px;cursor:pointer;z-index:5;min-height:44px;min-width:44px;display:flex;align-items:center;justify-content:center;transition:all .15s}
#toggle-btn:hover{color:#c8f;border-color:rgba(160,100,255,0.5)}

#drop-btn{position:fixed;top:10px;left:50%;transform:translateX(-50%);background:rgba(30,15,60,0.7);border:1px solid rgba(255,60,120,0.4);color:rgba(255,100,150,0.8);font-family:'Anybody',sans-serif;font-size:12px;font-weight:600;padding:10px 22px;border-radius:6px;cursor:pointer;z-index:5;min-height:44px;letter-spacing:2px;transition:all .15s}
#drop-btn:hover{background:rgba(255,60,120,0.15);color:#ff6090;border-color:rgba(255,60,120,0.7)}

#hud{position:fixed;top:10px;left:14px;font-size:10px;color:rgba(160,100,255,0.35);pointer-events:none;font-weight:300}

.clear-btn{margin:8px 12px;padding:6px;border:1px solid rgba(120,40,40,0.3);border-radius:4px;background:none;color:rgba(255,80,80,0.4);font-family:'Fira Code',monospace;font-size:9px;cursor:pointer;min-height:40px;transition:all .15s}
.clear-btn:hover{border-color:rgba(255,80,80,0.5);color:rgba(255,80,80,0.7)}

#gravity-row{padding:6px 12px;display:flex;align-items:center;gap:6px}
#gravity-row label{font-size:8px;color:rgba(160,100,255,0.4);letter-spacing:1px}
#gravity-slider{flex:1;accent-color:#a060ff}

a
@media(max-width:500px){
  #sidebar.open{width:160px}
  .sp-btn{padding:10px 12px;font-size:11px;min-height:44px}
  .clear-btn{padding:10px;font-size:10px;min-height:44px}
  #hud{font-size:9px;max-width:calc(100% - 80px)}
  #drop-btn{font-size:11px;padding:10px 16px}
}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="sidebar">
<h3>Track Pieces</h3>
<div id="track-list"></div>
<div class="sidebar-section"></div>
<h3>Obstacles</h3>
<div id="obstacle-list"></div>
<div class="sidebar-section"></div>
<div id="gravity-row">
  <label>GRAVITY</label>
  <input type="range" id="gravity-slider" min="1" max="20" value="6" step="1">
</div>
<div class="sidebar-section"></div>
<button class="clear-btn" id="clearBtn">Clear Track</button>
<button class="clear-btn" id="clearMarbles" style="border-color:rgba(80,40,120,0.3);color:rgba(160,100,255,0.4)">Clear Marbles</button>
</div>

<div id="hud"></div>
<button id="drop-btn">DROP MARBLE</button>
<button id="toggle-btn">Build</button>
<script>
(function(){
var C=document.getElementById('c'),X=C.getContext('2d');
var W,H;
function resize(){W=C.width=C.clientWidth;H=C.height=C.clientHeight;}
resize();window.addEventListener('resize',resize);

// --- PIECE DEFINITIONS ---
var TRACK_PIECES=[
  {name:'Ramp Right',type:'ramp',dir:1,hue:260,desc:'slope right'},
  {name:'Ramp Left',type:'ramp',dir:-1,hue:200,desc:'slope left'},
  {name:'Platform',type:'platform',hue:180,desc:'flat surface'},
  {name:'Funnel',type:'funnel',hue:40,desc:'narrows marbles'},
  {name:'Trampoline',type:'trampoline',hue:330,desc:'bouncy!'},
  {name:'Tube Right',type:'tube',dir:1,hue:140,desc:'enclosed slide'},
  {name:'Tube Left',type:'tube',dir:-1,hue:100,desc:'enclosed slide'}
];

var OBSTACLE_PIECES=[
  {name:'Bumper',type:'bumper',hue:0,desc:'bounces marbles'},
  {name:'Spinner',type:'spinner',hue:50,desc:'rotating bar'},
  {name:'Pin Row',type:'pins',hue:280,desc:'pachinko pins'},
  {name:'Gravity Well',type:'well',hue:270,desc:'pulls marbles in'},
  {name:'Portal',type:'portal',hue:310,desc:'teleport pair'}
];

// --- STATE ---
var pieces=[];
var marbles=[];
var trails=[];
var particles=[];
var placingPiece=null;
var gravity=0.35;
var t=0;
var portalPairCount=0;

// --- MARBLE ---
function dropMarble(x){
  var hues=[0,30,60,120,180,220,270,310];
  marbles.push({
    x:x||W*0.3+Math.random()*W*0.4,
    y:20,
    vx:(Math.random()-0.5)*1.5,
    vy:0,
    r:6+Math.random()*3,
    hue:hues[Math.floor(Math.random()*hues.length)],
    trail:[],
    alive:true,
    bounceCount:0,
    age:0
  });
}

// --- PHYSICS ---
function updateMarbles(){
  for(var i=marbles.length-1;i>=0;i--){
    var m=marbles[i];
    if(!m.alive)continue;
    m.age+=0.016;

    // gravity
    m.vy+=gravity;
    // air resistance
    m.vx*=0.998;
    m.vy*=0.998;

    m.x+=m.vx;
    m.y+=m.vy;

    // trail
    m.trail.push({x:m.x,y:m.y,age:0});
    if(m.trail.length>40)m.trail.shift();
    for(var j=0;j<m.trail.length;j++)m.trail[j].age+=0.04;

    // wall bounce
    if(m.x<m.r){m.x=m.r;m.vx=Math.abs(m.vx)*0.7;}
    if(m.x>W-m.r){m.x=W-m.r;m.vx=-Math.abs(m.vx)*0.7;}

    // piece collisions
    for(var p=0;p<pieces.length;p++){
      collidePiece(m,pieces[p]);
    }

    // off screen bottom — remove
    if(m.y>H+50){
      m.alive=false;
      // splash particles
      for(var k=0;k<12;k++){
        particles.push({x:m.x,y:H,vx:(Math.random()-0.5)*4,vy:-2-Math.random()*4,life:1,hue:m.hue,size:2+Math.random()*3});
      }
    }
  }
  // clean dead marbles
  for(var i=marbles.length-1;i>=0;i--){
    if(!marbles[i].alive&&marbles[i].age>2)marbles.splice(i,1);
  }
}

function collidePiece(m,p){
  var px=p.x,py=p.y,pw=p.w||100,ph=p.h||12;

  if(p.type==='ramp'){
    // angled surface
    var x1=px-pw/2,y1=py,x2=px+pw/2,y2=py-ph*p.dir*2;
    if(p.dir<0){var tmp=y1;y1=y2;y2=tmp;}
    var proj=lineCircle(x1,y1,x2,y2,m.x,m.y,m.r);
    if(proj){
      m.y=proj.y-m.r*proj.ny;
      m.x=proj.x-m.r*proj.nx;
      // reflect velocity along normal
      var dot=m.vx*proj.nx+m.vy*proj.ny;
      m.vx-=1.5*dot*proj.nx;
      m.vy-=1.5*dot*proj.ny;
      // add slide force
      m.vx+=p.dir*0.8;
      m.vy*=0.85;
      spawnBounceParticle(m,p);
    }
  }else if(p.type==='platform'){
    // flat surface
    if(m.x>px-pw/2&&m.x<px+pw/2&&m.y+m.r>py&&m.y+m.r<py+15&&m.vy>0){
      m.y=py-m.r;
      m.vy*=-0.3;
      m.vx*=0.95;
      if(Math.abs(m.vy)<0.5)m.vy=0;
      spawnBounceParticle(m,p);
    }
  }else if(p.type==='funnel'){
    // two angled walls converging
    var funnelW=pw/2;
    var funnelH=ph*3;
    // left wall
    var lx1=px-funnelW,ly1=py;
    var lx2=px-10,ly2=py+funnelH;
    var lp=lineCircle(lx1,ly1,lx2,ly2,m.x,m.y,m.r);
    if(lp){
      m.x=lp.x+m.r*0.7;
      m.vx=Math.abs(m.vx)*0.5+0.3;
      m.vy*=0.9;
      spawnBounceParticle(m,p);
    }
    // right wall
    var rx1=px+funnelW,ry1=py;
    var rx2=px+10,ry2=py+funnelH;
    var rp=lineCircle(rx1,ry1,rx2,ry2,m.x,m.y,m.r);
    if(rp){
      m.x=rp.x-m.r*0.7;
      m.vx=-Math.abs(m.vx)*0.5-0.3;
      m.vy*=0.9;
      spawnBounceParticle(m,p);
    }
  }else if(p.type==='trampoline'){
    if(m.x>px-pw/2&&m.x<px+pw/2&&m.y+m.r>py&&m.y+m.r<py+15&&m.vy>0){
      m.y=py-m.r;
      m.vy=-Math.abs(m.vy)*1.4-3; // super bounce!
      m.vx+=(Math.random()-0.5)*2;
      p._flash=1;
      spawnBounceParticle(m,p);
      // extra particles for trampoline
      for(var k=0;k<6;k++){
        particles.push({x:m.x,y:py,vx:(Math.random()-0.5)*3,vy:-2-Math.random()*3,life:1,hue:p.hue,size:2+Math.random()*2});
      }
    }
  }else if(p.type==='tube'){
    // enclosed slide — acts like a ramp with walls
    var x1=px-pw/2,y1=py,x2=px+pw/2,y2=py+ph*2*p.dir;
    if(p.dir<0){y2=py-ph*2;}
    // floor
    var proj=lineCircle(x1,y1,x2,y2,m.x,m.y,m.r);
    if(proj){
      m.y=proj.y-m.r*proj.ny;
      m.x=proj.x-m.r*proj.nx;
      var dot=m.vx*proj.nx+m.vy*proj.ny;
      m.vx-=1.4*dot*proj.nx;
      m.vy-=1.4*dot*proj.ny;
      m.vx+=p.dir*1.2;
      m.vy*=0.85;
    }
    // ceiling (10px above)
    var proj2=lineCircle(x1,y1-14,x2,y2-14,m.x,m.y,m.r);
    if(proj2&&m.vy<0){
      m.vy=Math.abs(m.vy)*0.5;
    }
  }else if(p.type==='bumper'){
    var dx=m.x-px,dy=m.y-py;
    var dist=Math.sqrt(dx*dx+dy*dy);
    var br=p.r||20;
    if(dist<br+m.r&&dist>0){
      var nx=dx/dist,ny=dy/dist;
      m.x=px+nx*(br+m.r+1);
      m.y=py+ny*(br+m.r+1);
      // bounce away with force
      var speed=Math.sqrt(m.vx*m.vx+m.vy*m.vy);
      var bounce=Math.max(speed*1.1,4);
      m.vx=nx*bounce;
      m.vy=ny*bounce;
      m.bounceCount++;
      p._flash=1;
      for(var k=0;k<8;k++){
        particles.push({x:m.x,y:m.y,vx:nx*2+(Math.random()-0.5)*3,vy:ny*2+(Math.random()-0.5)*3,life:1,hue:p.hue,size:2+Math.random()*2});
      }
    }
  }else if(p.type==='spinner'){
    // rotating bar
    var angle=p._angle||0;
    var barLen=pw*0.6;
    var cx=px,cy=py;
    var ex1=cx+Math.cos(angle)*barLen,ey1=cy+Math.sin(angle)*barLen;
    var ex2=cx-Math.cos(angle)*barLen,ey2=cy-Math.sin(angle)*barLen;
    var sp=lineCircle(ex1,ey1,ex2,ey2,m.x,m.y,m.r);
    if(sp){
      // push marble perpendicular to bar
      var perpX=-Math.sin(angle),perpY=Math.cos(angle);
      var side=(m.x-cx)*perpX+(m.y-cy)*perpY>0?1:-1;
      m.vx+=perpX*side*3;
      m.vy+=perpY*side*3;
      m.x+=perpX*side*(m.r+2);
      m.y+=perpY*side*(m.r+2);
      spawnBounceParticle(m,p);
    }
  }else if(p.type==='pins'){
    // row of pins
    var pinCount=5;
    var spacing=pw/(pinCount+1);
    for(var pi=0;pi<pinCount;pi++){
      var pinX=px-pw/2+spacing*(pi+1);
      var pinY=py+(pi%2)*8;
      var pinR=4;
      var dx=m.x-pinX,dy=m.y-pinY;
      var dist=Math.sqrt(dx*dx+dy*dy);
      if(dist<pinR+m.r&&dist>0){
        var nx=dx/dist,ny=dy/dist;
        m.x=pinX+nx*(pinR+m.r+1);
        m.y=pinY+ny*(pinR+m.r+1);
        var dot=m.vx*nx+m.vy*ny;
        m.vx-=1.8*dot*nx;
        m.vy-=1.8*dot*ny;
        m.vx+=(Math.random()-0.5)*1.5;
        spawnBounceParticle(m,p);
      }
    }
  }else if(p.type==='well'){
    // gravity well — pulls marbles toward center
    var dx=px-m.x,dy=py-m.y;
    var dist=Math.sqrt(dx*dx+dy*dy);
    var wellR=p.r||50;
    if(dist<wellR&&dist>5){
      var force=2.5*(1-dist/wellR);
      m.vx+=dx/dist*force;
      m.vy+=dy/dist*force;
    }
  }else if(p.type==='portal'){
    var dx=m.x-px,dy=m.y-py;
    var dist=Math.sqrt(dx*dx+dy*dy);
    var pr=18;
    if(dist<pr&&!m._portalCooldown){
      // find partner
      for(var pp=0;pp<pieces.length;pp++){
        var partner=pieces[pp];
        if(partner.type==='portal'&&partner!==p&&partner._portalId===p._portalId){
          m.x=partner.x;
          m.y=partner.y+25;
          m._portalCooldown=30;
          // warp particles
          for(var k=0;k<10;k++){
            particles.push({x:px,y:py,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:1,hue:p.hue,size:3+Math.random()*3});
            particles.push({x:partner.x,y:partner.y,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4,life:1,hue:partner.hue,size:3+Math.random()*3});
          }
          break;
        }
      }
    }
    if(m._portalCooldown>0)m._portalCooldown--;
  }
}

function lineCircle(x1,y1,x2,y2,cx,cy,r){
  var dx=x2-x1,dy=y2-y1;
  var len=Math.sqrt(dx*dx+dy*dy);
  if(len===0)return null;
  var nx=-dy/len,ny=dx/len; // normal
  // distance from circle center to line
  var dist=(cx-x1)*nx+(cy-y1)*ny;
  if(Math.abs(dist)>r)return null;
  // project onto segment
  var t=((cx-x1)*(dx)+(cy-y1)*(dy))/(len*len);
  if(t<-0.05||t>1.05)return null;
  t=Math.max(0,Math.min(1,t));
  return{x:x1+dx*t,y:y1+dy*t,nx:nx,ny:ny};
}

function spawnBounceParticle(m,p){
  for(var k=0;k<3;k++){
    particles.push({x:m.x,y:m.y,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,life:1,hue:p.hue,size:1.5+Math.random()*1.5});
  }
}

// --- UPDATE ---
function update(){
  t+=0.016;
  updateMarbles();
  // update spinner angles
  for(var i=0;i<pieces.length;i++){
    var p=pieces[i];
    if(p.type==='spinner')p._angle=(p._angle||0)+0.03;
    if(p._flash)p._flash*=0.9;
  }
  // update particles
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];
    p.x+=p.vx;p.y+=p.vy;
    p.vy+=0.05;
    p.life-=0.025;
    if(p.life<=0)particles.splice(i,1);
  }
}

// --- DRAW ---
function draw(){
  // background
  var bg=X.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#06060f');
  bg.addColorStop(0.5,'#0a0818');
  bg.addColorStop(1,'#0e0620');
  X.fillStyle=bg;
  X.fillRect(0,0,W,H);

  // subtle grid
  X.strokeStyle='rgba(80,40,160,0.04)';
  X.lineWidth=1;
  for(var x=0;x<W;x+=40){X.beginPath();X.moveTo(x,0);X.lineTo(x,H);X.stroke();}
  for(var y=0;y<H;y+=40){X.beginPath();X.moveTo(0,y);X.lineTo(W,y);X.stroke();}

  // draw pieces
  for(var i=0;i<pieces.length;i++)drawPiece(pieces[i]);

  // draw placing preview
  if(placingPiece&&mouseX!==null){
    X.globalAlpha=0.4;
    drawPiece({...placingPiece,x:mouseX,y:mouseY});
    X.globalAlpha=1;
  }

  // draw marble trails
  for(var i=0;i<marbles.length;i++){
    var m=marbles[i];
    if(!m.alive)continue;
    if(m.trail.length>1){
      for(var j=1;j<m.trail.length;j++){
        var tp=m.trail[j-1],tc=m.trail[j];
        var alpha=Math.max(0,1-tc.age)*0.3;
        X.strokeStyle='hsla('+m.hue+',90%,60%,'+alpha+')';
        X.lineWidth=m.r*0.6*(1-tc.age*0.5);
        X.beginPath();X.moveTo(tp.x,tp.y);X.lineTo(tc.x,tc.y);X.stroke();
      }
    }
  }

  // draw marbles
  for(var i=0;i<marbles.length;i++){
    var m=marbles[i];
    if(!m.alive)continue;
    // outer glow
    var mg=X.createRadialGradient(m.x,m.y,m.r*0.3,m.x,m.y,m.r*3);
    mg.addColorStop(0,'hsla('+m.hue+',90%,60%,0.15)');
    mg.addColorStop(1,'hsla('+m.hue+',90%,60%,0)');
    X.fillStyle=mg;
    X.beginPath();X.arc(m.x,m.y,m.r*3,0,Math.PI*2);X.fill();
    // marble body
    var mbg=X.createRadialGradient(m.x-m.r*0.3,m.y-m.r*0.3,0,m.x,m.y,m.r);
    mbg.addColorStop(0,'hsla('+m.hue+',80%,75%,0.9)');
    mbg.addColorStop(0.6,'hsla('+m.hue+',85%,55%,0.85)');
    mbg.addColorStop(1,'hsla('+m.hue+',90%,35%,0.7)');
    X.fillStyle=mbg;
    X.beginPath();X.arc(m.x,m.y,m.r,0,Math.PI*2);X.fill();
    // highlight
    X.fillStyle='hsla('+m.hue+',60%,90%,0.5)';
    X.beginPath();X.arc(m.x-m.r*0.25,m.y-m.r*0.3,m.r*0.3,0,Math.PI*2);X.fill();
  }

  // draw particles
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    X.fillStyle='hsla('+p.hue+',85%,65%,'+p.life*0.6+')';
    X.beginPath();X.arc(p.x,p.y,p.size*p.life,0,Math.PI*2);X.fill();
  }

  // HUD
  document.getElementById('hud').textContent=marbles.length+' marbles | '+pieces.length+' pieces';
}

function drawPiece(p){
  var px=p.x,py=p.y,pw=p.w||100,ph=p.h||12;
  var hue=p.hue;
  var flash=p._flash||0;
  var glowAlpha=0.06+flash*0.15;

  // piece glow
  var pg=X.createRadialGradient(px,py,0,px,py,pw*0.8);
  pg.addColorStop(0,'hsla('+hue+',80%,55%,'+glowAlpha+')');
  pg.addColorStop(1,'hsla('+hue+',80%,55%,0)');
  X.fillStyle=pg;
  X.beginPath();X.arc(px,py,pw*0.8,0,Math.PI*2);X.fill();

  X.strokeStyle='hsla('+hue+',75%,55%,'+(0.6+flash*0.4)+')';
  X.fillStyle='hsla('+hue+',60%,40%,'+(0.15+flash*0.15)+')';
  X.lineWidth=2;X.lineCap='round';X.lineJoin='round';

  if(p.type==='ramp'){
    var x1=px-pw/2,y1=py,x2=px+pw/2,y2=py-ph*p.dir*2;
    if(p.dir<0){var tmp=y1;y1=y2;y2=tmp;}
    X.beginPath();X.moveTo(x1,y1);X.lineTo(x2,y2);X.stroke();
    // surface fill
    X.fillStyle='hsla('+hue+',60%,40%,0.1)';
    X.beginPath();X.moveTo(x1,y1);X.lineTo(x2,y2);X.lineTo(x2,y2+4);X.lineTo(x1,y1+4);X.fill();
  }else if(p.type==='platform'){
    X.beginPath();X.moveTo(px-pw/2,py);X.lineTo(px+pw/2,py);X.stroke();
    X.fillRect(px-pw/2,py,pw,3);
  }else if(p.type==='funnel'){
    var fW=pw/2,fH=ph*3;
    X.beginPath();X.moveTo(px-fW,py);X.lineTo(px-10,py+fH);X.stroke();
    X.beginPath();X.moveTo(px+fW,py);X.lineTo(px+10,py+fH);X.stroke();
    // opening glow
    X.fillStyle='hsla('+hue+',80%,50%,0.05)';
    X.beginPath();X.moveTo(px-fW,py);X.lineTo(px-10,py+fH);X.lineTo(px+10,py+fH);X.lineTo(px+fW,py);X.fill();
  }else if(p.type==='trampoline'){
    var bounce=flash*4;
    X.strokeStyle='hsla('+hue+',85%,60%,'+(0.7+flash*0.3)+')';
    X.lineWidth=3;
    X.beginPath();
    X.moveTo(px-pw/2,py);
    X.quadraticCurveTo(px,py+4+bounce,px+pw/2,py);
    X.stroke();
    // springs
    X.strokeStyle='hsla('+hue+',60%,45%,0.3)';X.lineWidth=1;
    X.beginPath();X.moveTo(px-pw/3,py);X.lineTo(px-pw/3,py+10);X.stroke();
    X.beginPath();X.moveTo(px+pw/3,py);X.lineTo(px+pw/3,py+10);X.stroke();
  }else if(p.type==='tube'){
    var x1=px-pw/2,y1=py,x2=px+pw/2,y2=py+ph*2*p.dir;
    if(p.dir<0){y2=py-ph*2;}
    // floor
    X.beginPath();X.moveTo(x1,y1);X.lineTo(x2,y2);X.stroke();
    // ceiling
    X.strokeStyle='hsla('+hue+',75%,55%,0.35)';
    X.beginPath();X.moveTo(x1,y1-14);X.lineTo(x2,y2-14);X.stroke();
    // fill between
    X.fillStyle='hsla('+hue+',50%,30%,0.06)';
    X.beginPath();X.moveTo(x1,y1);X.lineTo(x2,y2);X.lineTo(x2,y2-14);X.lineTo(x1,y1-14);X.fill();
  }else if(p.type==='bumper'){
    var br=p.r||20;
    X.fillStyle='hsla('+hue+',70%,50%,'+(0.2+flash*0.3)+')';
    X.beginPath();X.arc(px,py,br,0,Math.PI*2);X.fill();
    X.strokeStyle='hsla('+hue+',85%,60%,'+(0.6+flash*0.4)+')';
    X.lineWidth=2.5;
    X.beginPath();X.arc(px,py,br,0,Math.PI*2);X.stroke();
    // inner ring
    X.strokeStyle='hsla('+hue+',80%,70%,'+(0.15+flash*0.2)+')';
    X.lineWidth=1;
    X.beginPath();X.arc(px,py,br*0.5,0,Math.PI*2);X.stroke();
  }else if(p.type==='spinner'){
    var angle=p._angle||0;
    var barLen=pw*0.6;
    // center
    X.fillStyle='hsla('+hue+',70%,50%,0.3)';
    X.beginPath();X.arc(px,py,6,0,Math.PI*2);X.fill();
    // bar
    X.strokeStyle='hsla('+hue+',80%,55%,0.7)';X.lineWidth=3;
    X.beginPath();
    X.moveTo(px+Math.cos(angle)*barLen,py+Math.sin(angle)*barLen);
    X.lineTo(px-Math.cos(angle)*barLen,py-Math.sin(angle)*barLen);
    X.stroke();
    // tips
    X.fillStyle='hsla('+hue+',90%,65%,0.6)';
    X.beginPath();X.arc(px+Math.cos(angle)*barLen,py+Math.sin(angle)*barLen,4,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(px-Math.cos(angle)*barLen,py-Math.sin(angle)*barLen,4,0,Math.PI*2);X.fill();
  }else if(p.type==='pins'){
    var pinCount=5;
    var spacing=pw/(pinCount+1);
    for(var pi=0;pi<pinCount;pi++){
      var pinX=px-pw/2+spacing*(pi+1);
      var pinY=py+(pi%2)*8;
      X.fillStyle='hsla('+hue+',70%,55%,0.5)';
      X.beginPath();X.arc(pinX,pinY,4,0,Math.PI*2);X.fill();
      X.strokeStyle='hsla('+hue+',80%,65%,0.3)';X.lineWidth=1;
      X.beginPath();X.arc(pinX,pinY,7,0,Math.PI*2);X.stroke();
    }
  }else if(p.type==='well'){
    var wr=p.r||50;
    // swirl effect
    for(var r=0;r<3;r++){
      var a=t*1.5+r*2.1;
      X.strokeStyle='hsla('+hue+',80%,55%,'+(0.1-r*0.03)+')';
      X.lineWidth=1.5;
      X.beginPath();
      X.arc(px,py,wr*(0.3+r*0.25),a,a+Math.PI*1.3);
      X.stroke();
    }
    // center glow
    var wg=X.createRadialGradient(px,py,0,px,py,wr);
    wg.addColorStop(0,'hsla('+hue+',90%,60%,0.12)');
    wg.addColorStop(0.5,'hsla('+hue+',90%,50%,0.04)');
    wg.addColorStop(1,'hsla('+hue+',90%,50%,0)');
    X.fillStyle=wg;
    X.beginPath();X.arc(px,py,wr,0,Math.PI*2);X.fill();
  }else if(p.type==='portal'){
    var pr=18;
    var pulse=Math.sin(t*3+p._portalId*2)*0.3;
    X.strokeStyle='hsla('+hue+',85%,60%,'+(0.5+pulse)+')';
    X.lineWidth=2;
    X.beginPath();X.arc(px,py,pr,0,Math.PI*2);X.stroke();
    // inner swirl
    X.strokeStyle='hsla('+hue+',90%,70%,'+(0.2+pulse*0.5)+')';
    X.lineWidth=1.5;
    X.beginPath();X.arc(px,py,pr*0.5,t*4,t*4+Math.PI*1.5);X.stroke();
    // center dot
    X.fillStyle='hsla('+hue+',95%,80%,'+(0.4+pulse)+')';
    X.beginPath();X.arc(px,py,3,0,Math.PI*2);X.fill();
    // label
    X.fillStyle='hsla('+hue+',80%,70%,0.3)';
    X.font='7px "Fira Code"';X.textAlign='center';
    X.fillText(String.fromCharCode(65+p._portalId),px,py+pr+10);
  }
}

// --- INPUT ---
var mouseX=null,mouseY=null;
C.addEventListener('mousemove',function(e){
  var rect=C.getBoundingClientRect();
  mouseX=e.clientX-rect.left;
  mouseY=e.clientY-rect.top;
});
C.addEventListener('mouseleave',function(){mouseX=null;mouseY=null;});

C.addEventListener('click',function(e){
  var rect=C.getBoundingClientRect();
  var cx=e.clientX-rect.left,cy=e.clientY-rect.top;

  if(placingPiece){
    var newPiece=JSON.parse(JSON.stringify(placingPiece));
    newPiece.x=cx;
    newPiece.y=cy;
    if(newPiece.type==='portal'){
      newPiece._portalId=portalPairCount;
      // check if partner already placed
      var hasPartner=false;
      for(var i=0;i<pieces.length;i++){
        if(pieces[i].type==='portal'&&pieces[i]._portalId===portalPairCount){hasPartner=true;break;}
      }
      if(hasPartner){
        portalPairCount++;
        placingPiece=null;
        C.style.cursor='crosshair';
        // deselect buttons
        var btns=document.querySelectorAll('.sp-btn');
        for(var i=0;i<btns.length;i++)btns[i].classList.remove('active');
      }
    }else{
      // keep placing same type (hold shift to stop, or click button again)
    }
    pieces.push(newPiece);
    saveTrack();
    return;
  }

  // no piece selected — drop marble at click
  dropMarble(cx);
});

// touch support for placing
C.addEventListener('touchstart',function(e){
  if(placingPiece&&e.touches.length>0){
    var rect=C.getBoundingClientRect();
    var cx=e.touches[0].clientX-rect.left;
    var cy=e.touches[0].clientY-rect.top;
    mouseX=cx;mouseY=cy;
  }
},{passive:true});

C.addEventListener('touchend',function(e){
  if(placingPiece&&mouseX!==null){
    var newPiece=JSON.parse(JSON.stringify(placingPiece));
    newPiece.x=mouseX;
    newPiece.y=mouseY;
    if(newPiece.type==='portal'){
      newPiece._portalId=portalPairCount;
      var hasPartner=false;
      for(var i=0;i<pieces.length;i++){
        if(pieces[i].type==='portal'&&pieces[i]._portalId===portalPairCount){hasPartner=true;break;}
      }
      if(hasPartner){portalPairCount++;placingPiece=null;C.style.cursor='crosshair';}
    }
    pieces.push(newPiece);
    saveTrack();
  }else if(!placingPiece&&e.changedTouches&&e.changedTouches.length>0){
    var rect=C.getBoundingClientRect();
    dropMarble(e.changedTouches[0].clientX-rect.left);
  }
});

// --- SIDEBAR ---
var sidebar=document.getElementById('sidebar');
var toggleBtn=document.getElementById('toggle-btn');

toggleBtn.addEventListener('click',function(){
  sidebar.classList.toggle('open');
  toggleBtn.textContent=sidebar.classList.contains('open')?'Close':'Build';
});

// populate track buttons
var trackList=document.getElementById('track-list');
TRACK_PIECES.forEach(function(tp,idx){
  var btn=document.createElement('button');
  btn.className='sp-btn';
  btn.innerHTML='<span class="sp-dot" style="background:hsl('+tp.hue+',70%,50%)"></span><span>'+tp.name+'<br><span class="sp-info">'+tp.desc+'</span></span>';
  btn.addEventListener('click',function(){
    selectPiece(tp,btn);
  });
  trackList.appendChild(btn);
});

// populate obstacle buttons
var obsList=document.getElementById('obstacle-list');
OBSTACLE_PIECES.forEach(function(op,idx){
  var btn=document.createElement('button');
  btn.className='sp-btn';
  btn.innerHTML='<span class="sp-dot" style="background:hsl('+op.hue+',70%,50%)"></span><span>'+op.name+'<br><span class="sp-info">'+op.desc+'</span></span>';
  btn.addEventListener('click',function(){
    selectPiece(op,btn);
  });
  obsList.appendChild(btn);
});

function selectPiece(piece,btn){
  var allBtns=document.querySelectorAll('.sp-btn');
  var wasActive=btn.classList.contains('active');
  for(var i=0;i<allBtns.length;i++)allBtns[i].classList.remove('active');

  if(wasActive){
    placingPiece=null;
    C.style.cursor='crosshair';
  }else{
    btn.classList.add('active');
    placingPiece={type:piece.type,hue:piece.hue,dir:piece.dir||0,w:100,h:12,r:piece.type==='bumper'?20:piece.type==='well'?50:undefined};
    C.style.cursor='cell';
    sidebar.classList.remove('open');
    toggleBtn.textContent='Build';
  }
}

// drop button
document.getElementById('drop-btn').addEventListener('click',function(){
  // deselect any piece
  placingPiece=null;
  C.style.cursor='crosshair';
  var allBtns=document.querySelectorAll('.sp-btn');
  for(var i=0;i<allBtns.length;i++)allBtns[i].classList.remove('active');
  dropMarble();
});

// gravity slider
document.getElementById('gravity-slider').addEventListener('input',function(){
  gravity=parseInt(this.value)/15;
});

// clear buttons
document.getElementById('clearBtn').addEventListener('click',function(){
  pieces=[];portalPairCount=0;saveTrack();
});
document.getElementById('clearMarbles').addEventListener('click',function(){
  marbles=[];
});

// --- SAVE/LOAD ---
function saveTrack(){
  try{localStorage.setItem('neon_marble_track',JSON.stringify(pieces));}catch(e){}
}
function loadTrack(){
  try{
    var raw=localStorage.getItem('neon_marble_track');
    if(!raw)return;
    pieces=JSON.parse(raw);
    // restore portal count
    for(var i=0;i<pieces.length;i++){
      if(pieces[i].type==='portal'&&pieces[i]._portalId>=portalPairCount){
        portalPairCount=pieces[i]._portalId+1;
      }
    }
  }catch(e){}
}
loadTrack();

// --- LOOP ---
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();

})();
</script>
