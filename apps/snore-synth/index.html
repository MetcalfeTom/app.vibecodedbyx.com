<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Snore Synth</title>
  <link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%92%A4">
  <meta name="description" content="Type anything. Every keystroke blooms into a neon ambient pad. A lullaby synth for rhythmic typists.">
  <meta property="og:title" content="Snore Synth">
  <meta property="og:description" content="A dreamlike ambient synth: your keyboard becomes a field of glowing pads, reverbs and slow chimes. Just type.">
  <meta property="og:url" content="https://sloppy.live/snore-synth">
  <meta property="og:image" content="https://image.pollinations.ai/prompt/ambient%20neon%20dream%20synth%20glowing%20orbs%20dark%20indigo%20soft%20pink%20cyan%20sleeping%20cloud%20z?width=1200&height=630&nologo=true">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Unica+One&family=DotGothic16&family=Syne+Mono&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-0: #02010d;
      --bg-1: #0a0626;
      --bg-2: #180a3a;
      --ink: #f0e6ff;
      --muted: rgba(240, 230, 255, 0.55);
      --pink: #ffb3f0;
      --cyan: #b3ffe7;
      --violet: #c9a7ff;
      --amber: #ffd59a;
      --line: rgba(240, 230, 255, 0.18);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'Syne Mono', ui-monospace, monospace;
      color: var(--ink);
      background:
        radial-gradient(ellipse at 15% 10%, rgba(255, 179, 240, 0.14), transparent 55%),
        radial-gradient(ellipse at 85% 90%, rgba(179, 255, 231, 0.12), transparent 55%),
        linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 45%, var(--bg-2) 100%);
      min-height: 100vh;
      -webkit-user-select: none;
      user-select: none;
      cursor: text;
    }
    canvas {
      position: fixed; inset: 0;
      width: 100%; height: 100%;
      display: block;
      pointer-events: none;
    }
    .vignette {
      position: fixed; inset: 0;
      pointer-events: none;
      background: radial-gradient(ellipse at 50% 50%, transparent 50%, rgba(2, 1, 13, 0.75) 100%);
      z-index: 2;
    }
    .title {
      position: fixed;
      top: 28px; left: 38px;
      font-family: 'Unica One', sans-serif;
      font-weight: 400;
      font-size: clamp(32px, 4.4vw, 56px);
      letter-spacing: 0.42em;
      line-height: 1;
      color: var(--ink);
      text-transform: uppercase;
      text-shadow: 0 0 22px rgba(255, 179, 240, 0.4);
      z-index: 4;
      pointer-events: none;
    }
    .title .zzz {
      display: inline-block;
      color: var(--cyan);
      text-shadow: 0 0 18px rgba(179, 255, 231, 0.6);
      animation: float 4.2s ease-in-out infinite;
      font-size: 0.55em;
      margin-left: 8px;
      letter-spacing: 0.2em;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) rotate(-2deg); opacity: 0.6; }
      50% { transform: translateY(-8px) rotate(4deg); opacity: 1; }
    }
    .sub {
      position: fixed;
      top: 92px; left: 38px;
      font-family: 'Syne Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.32em;
      color: var(--muted);
      text-transform: uppercase;
      z-index: 4;
      pointer-events: none;
    }
    .typeboard {
      position: fixed;
      left: 50%;
      top: 58%;
      transform: translate(-50%, -50%);
      font-family: 'DotGothic16', monospace;
      font-size: clamp(26px, 3.6vw, 46px);
      line-height: 1.35;
      max-width: 80vw;
      text-align: center;
      color: var(--ink);
      letter-spacing: 0.04em;
      z-index: 3;
      pointer-events: none;
      text-shadow: 0 0 18px rgba(255, 179, 240, 0.45), 0 0 42px rgba(201, 167, 255, 0.3);
      min-height: 3em;
      overflow: hidden;
      word-break: break-word;
    }
    .typeboard .caret {
      display: inline-block;
      width: 0.5ch;
      background: var(--cyan);
      color: var(--cyan);
      box-shadow: 0 0 14px rgba(179, 255, 231, 0.9);
      animation: blink 1.1s steps(1) infinite;
      margin-left: 2px;
      opacity: 0.85;
    }
    @keyframes blink { 0%, 49% { opacity: 0.8; } 50%, 100% { opacity: 0.15; } }

    .hint {
      position: fixed;
      top: 45%;
      left: 50%;
      transform: translate(-50%, -50%);
      max-width: 520px;
      text-align: center;
      font-family: 'Unica One', sans-serif;
      letter-spacing: 0.18em;
      font-size: clamp(18px, 2.2vw, 26px);
      color: var(--muted);
      text-transform: uppercase;
      z-index: 3;
      pointer-events: none;
      transition: opacity 0.6s ease;
      line-height: 1.6;
    }
    .hint.faded { opacity: 0; }
    .hint .k {
      font-family: 'Syne Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.2em;
      color: var(--cyan);
      border: 1px solid var(--line);
      padding: 3px 7px;
      margin: 0 3px;
      border-radius: 3px;
      background: rgba(179, 255, 231, 0.05);
    }

    .panel {
      position: fixed;
      bottom: 26px;
      left: 38px;
      display: flex;
      gap: 14px;
      flex-wrap: wrap;
      align-items: center;
      z-index: 4;
    }
    .chip {
      font-family: 'Syne Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      padding: 8px 14px;
      background: rgba(240, 230, 255, 0.04);
      color: var(--muted);
      border: 1px solid var(--line);
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.18s ease;
    }
    .chip:hover { color: var(--ink); border-color: rgba(240, 230, 255, 0.35); }
    .chip.on { color: var(--cyan); border-color: rgba(179, 255, 231, 0.65); box-shadow: 0 0 16px rgba(179, 255, 231, 0.18); }
    .chip label { color: var(--muted); margin-right: 6px; }
    .chip select {
      background: transparent;
      color: var(--ink);
      border: none;
      outline: none;
      font-family: inherit;
      font-size: inherit;
      letter-spacing: inherit;
      text-transform: inherit;
      cursor: pointer;
      appearance: none;
    }
    .chip select option { background: var(--bg-1); color: var(--ink); }

    .meter {
      position: fixed;
      bottom: 28px;
      right: 38px;
      display: flex;
      gap: 16px;
      align-items: flex-end;
      z-index: 4;
      font-family: 'Syne Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .meter .val {
      font-family: 'Unica One', sans-serif;
      font-size: 22px;
      color: var(--pink);
      text-shadow: 0 0 10px rgba(255, 179, 240, 0.5);
      letter-spacing: 0.1em;
      line-height: 1;
    }
    .meter .col { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }

    @media (max-width: 640px) {
      .title { top: 18px; left: 18px; font-size: 30px; letter-spacing: 0.25em; }
      .sub { top: 58px; left: 18px; font-size: 10px; }
      .panel { bottom: 16px; left: 16px; gap: 8px; }
      .meter { bottom: 18px; right: 16px; gap: 10px; }
      .typeboard { font-size: 22px; top: 55%; max-width: 90vw; }
      .hint { font-size: 14px; padding: 0 22px; }
    }
  </style>
</head>
<body>
  <canvas id="fx"></canvas>
  <div class="vignette"></div>
  <div class="title">Snore Synth<span class="zzz">zZz</span></div>
  <div class="sub">keyboard — dream — drift</div>

  <div class="hint" id="hint">
    Press any key<br>
    <span style="font-size: 0.7em; color: var(--muted)">
      <span class="k">A–Z</span> pads ·
      <span class="k">Space</span> drone ·
      <span class="k">Enter</span> chime ·
      <span class="k">Shift</span>+key up-oct
    </span>
  </div>
  <div class="typeboard" id="board"><span class="caret"> </span></div>

  <div class="panel">
    <div class="chip"><label>key</label><select id="rootSel">
      <option value="0">C</option>
      <option value="2">D</option>
      <option value="4">E</option>
      <option value="5">F</option>
      <option value="7" selected>G</option>
      <option value="9">A</option>
      <option value="10">Bb</option>
    </select></div>
    <div class="chip"><label>scale</label><select id="scaleSel">
      <option value="pentMaj" selected>pent · major</option>
      <option value="pentMin">pent · minor</option>
      <option value="dorian">dorian</option>
      <option value="lydian">lydian</option>
      <option value="phrygian">phrygian</option>
      <option value="whole">whole-tone</option>
    </select></div>
    <div class="chip on" id="droneBtn">◎ drone</div>
    <div class="chip" id="muteBtn">◎ mute</div>
  </div>

  <div class="meter">
    <div class="col"><span class="val" id="wpm">0</span><span>wpm</span></div>
    <div class="col"><span class="val" id="keys">0</span><span>keys</span></div>
  </div>

<script>
(() => {
  const canvas = document.getElementById('fx');
  const ctx2d = canvas.getContext('2d');
  const board = document.getElementById('board');
  const hint = document.getElementById('hint');
  const wpmEl = document.getElementById('wpm');
  const keysEl = document.getElementById('keys');
  const rootSel = document.getElementById('rootSel');
  const scaleSel = document.getElementById('scaleSel');
  const droneBtn = document.getElementById('droneBtn');
  const muteBtn = document.getElementById('muteBtn');

  let W = 0, H = 0, DPR = 1;
  function resize() {
    DPR = Math.min(2, window.devicePixelRatio || 1);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx2d.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  const SCALES = {
    pentMaj:  [0, 2, 4, 7, 9],
    pentMin:  [0, 3, 5, 7, 10],
    dorian:   [0, 2, 3, 5, 7, 9, 10],
    lydian:   [0, 2, 4, 6, 7, 9, 11],
    phrygian: [0, 1, 3, 5, 7, 8, 10],
    whole:    [0, 2, 4, 6, 8, 10],
  };

  // ---- Audio ----
  let ac = null;
  let master = null;
  let wetBus = null;
  let delay = null;
  let delayFb = null;
  let convolver = null;
  let droneGain = null;
  let droneOsc = [];
  let muted = false;
  let droneOn = true;

  function initAudio() {
    if (ac) return;
    ac = new (window.AudioContext || window.webkitAudioContext)();
    master = ac.createGain();
    master.gain.value = 0;
    master.gain.linearRampToValueAtTime(0.7, ac.currentTime + 0.8);
    const comp = ac.createDynamicsCompressor();
    comp.threshold.value = -16;
    comp.ratio.value = 5;
    comp.attack.value = 0.008;
    comp.release.value = 0.25;
    master.connect(comp).connect(ac.destination);

    // wet bus: delay + reverb
    wetBus = ac.createGain();
    wetBus.gain.value = 0.55;
    delay = ac.createDelay(1.2);
    delay.delayTime.value = 0.42;
    delayFb = ac.createGain();
    delayFb.gain.value = 0.45;
    const delayFilt = ac.createBiquadFilter();
    delayFilt.type = 'lowpass';
    delayFilt.frequency.value = 2800;
    delay.connect(delayFilt).connect(delayFb).connect(delay);

    // reverb — long softened impulse
    convolver = ac.createConvolver();
    const sr = ac.sampleRate;
    const len = Math.floor(sr * 3.2);
    const imp = ac.createBuffer(2, len, sr);
    for (let c = 0; c < 2; c++) {
      const d = imp.getChannelData(c);
      for (let i = 0; i < len; i++) {
        const t = i / len;
        d[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, 3.4) * (0.7 + Math.sin(i * 0.0001) * 0.3);
      }
    }
    convolver.buffer = imp;
    const revGain = ac.createGain();
    revGain.gain.value = 0.8;

    wetBus.connect(delay);
    wetBus.connect(convolver);
    delay.connect(revGain);
    convolver.connect(revGain);
    revGain.connect(master);

    startDrone();
  }

  function startDrone() {
    if (droneGain) return;
    droneGain = ac.createGain();
    droneGain.gain.value = 0;
    droneGain.gain.linearRampToValueAtTime(droneOn ? 0.08 : 0, ac.currentTime + 2.5);
    const droneFilt = ac.createBiquadFilter();
    droneFilt.type = 'lowpass';
    droneFilt.frequency.value = 580;
    droneFilt.Q.value = 1;
    droneGain.connect(droneFilt).connect(master);
    // also faintly send to reverb
    const drWet = ac.createGain();
    drWet.gain.value = 0.3;
    droneGain.connect(drWet).connect(wetBus);

    [55, 82.4, 110, 164.8].forEach((f, i) => {
      const o = ac.createOscillator();
      o.type = i === 0 ? 'sine' : (i === 3 ? 'triangle' : 'sine');
      o.frequency.value = f;
      const g = ac.createGain();
      g.gain.value = 0.25 / (i + 1);
      const lfo = ac.createOscillator();
      const lfoG = ac.createGain();
      lfo.frequency.value = 0.04 + i * 0.025;
      lfoG.gain.value = 1.2;
      lfo.connect(lfoG).connect(o.detune);
      o.connect(g).connect(droneGain);
      o.start();
      lfo.start();
      droneOsc.push({ o, g, lfo });
    });
  }

  function setDrone(on) {
    droneOn = on;
    if (droneGain && ac) {
      droneGain.gain.cancelScheduledValues(ac.currentTime);
      droneGain.gain.linearRampToValueAtTime(on ? 0.08 : 0, ac.currentTime + 1.2);
    }
    droneBtn.classList.toggle('on', on);
  }
  function setMute(m) {
    muted = m;
    if (master && ac) {
      master.gain.cancelScheduledValues(ac.currentTime);
      master.gain.linearRampToValueAtTime(m ? 0 : 0.7, ac.currentTime + 0.5);
    }
    muteBtn.classList.toggle('on', m);
  }

  droneBtn.addEventListener('click', () => { initAudio(); setDrone(!droneOn); });
  muteBtn.addEventListener('click', () => { initAudio(); setMute(!muted); });

  function midiToFreq(m) { return 440 * Math.pow(2, (m - 69) / 12); }

  function playPad(midi, vel = 1) {
    if (!ac || muted) return;
    const now = ac.currentTime;
    const freq = midiToFreq(midi);
    // carrier + modulator FM-ish
    const car = ac.createOscillator();
    car.type = 'triangle';
    car.frequency.value = freq;
    const mod = ac.createOscillator();
    mod.type = 'sine';
    mod.frequency.value = freq * 1.5;
    const modG = ac.createGain();
    modG.gain.value = freq * 0.18;
    mod.connect(modG).connect(car.frequency);

    const filt = ac.createBiquadFilter();
    filt.type = 'lowpass';
    filt.Q.value = 0.4;
    filt.frequency.setValueAtTime(300, now);
    filt.frequency.exponentialRampToValueAtTime(1400 + Math.random() * 600, now + 0.4);
    filt.frequency.exponentialRampToValueAtTime(600, now + 2.4);

    const amp = ac.createGain();
    const vol = 0.18 * vel;
    amp.gain.setValueAtTime(0, now);
    amp.gain.linearRampToValueAtTime(vol, now + 0.25);
    amp.gain.exponentialRampToValueAtTime(0.0001, now + 2.6);

    // soft sub
    const sub = ac.createOscillator();
    sub.type = 'sine';
    sub.frequency.value = freq / 2;
    const subG = ac.createGain();
    subG.gain.setValueAtTime(0, now);
    subG.gain.linearRampToValueAtTime(vol * 0.35, now + 0.3);
    subG.gain.exponentialRampToValueAtTime(0.0001, now + 2.2);
    sub.connect(subG).connect(filt);

    car.connect(filt).connect(amp);
    // dry
    amp.connect(master);
    // wet send
    const send = ac.createGain();
    send.gain.value = 0.6;
    amp.connect(send).connect(wetBus);

    car.start(now); car.stop(now + 2.7);
    mod.start(now); mod.stop(now + 2.7);
    sub.start(now); sub.stop(now + 2.3);
  }

  function playDroneHit(midi) {
    if (!ac || muted) return;
    const now = ac.currentTime;
    const freq = midiToFreq(midi);
    const o = ac.createOscillator();
    o.type = 'sine';
    o.frequency.value = freq / 2;
    const g = ac.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(0.22, now + 0.4);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 3.8);
    o.connect(g).connect(master);
    const send = ac.createGain(); send.gain.value = 0.8;
    g.connect(send).connect(wetBus);
    o.start(now); o.stop(now + 4);
  }

  function playChime() {
    if (!ac || muted) return;
    const now = ac.currentTime;
    const root = parseInt(rootSel.value, 10);
    const scale = SCALES[scaleSel.value];
    [0, 2, 4].forEach((s, i) => {
      setTimeout(() => {
        const m = 60 + root + scale[s % scale.length] + 12;
        const o = ac.createOscillator();
        o.type = 'sine';
        o.frequency.value = midiToFreq(m);
        const g = ac.createGain();
        const t = ac.currentTime;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(0.16, t + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, t + 3.2);
        o.connect(g).connect(master);
        const s2 = ac.createGain(); s2.gain.value = 0.7;
        g.connect(s2).connect(wetBus);
        o.start(t); o.stop(t + 3.3);
      }, i * 110);
    });
  }

  function playSoft() {
    // gentle noise wash (backspace)
    if (!ac || muted) return;
    const now = ac.currentTime;
    const bufSize = Math.floor(ac.sampleRate * 0.6);
    const buf = ac.createBuffer(1, bufSize, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) {
      d[i] = (Math.random() * 2 - 1) * Math.pow(i / bufSize, 0.8);
    }
    const src = ac.createBufferSource();
    src.buffer = buf;
    const bp = ac.createBiquadFilter();
    bp.type = 'bandpass';
    bp.frequency.value = 2200;
    bp.Q.value = 0.5;
    const g = ac.createGain();
    g.gain.value = 0.14;
    g.gain.exponentialRampToValueAtTime(0.0001, now + 0.55);
    src.connect(bp).connect(g).connect(master);
    const s = ac.createGain(); s.gain.value = 0.8;
    g.connect(s).connect(wetBus);
    src.start(now);
  }

  // ---- Visuals ----
  const state = {
    orbs: [],
    ripples: [],
    stars: [],
    letters: [],
    text: '',
    typedCount: 0,
    lastTimes: [],
    t: 0,
  };

  // seed stars
  for (let i = 0; i < 120; i++) {
    state.stars.push({
      x: Math.random() * 2000,
      y: Math.random() * 2000,
      r: 0.5 + Math.random() * 1.5,
      a: 0.15 + Math.random() * 0.5,
      tw: Math.random() * 6.28,
    });
  }

  const PALETTE = ['#ffb3f0', '#b3ffe7', '#c9a7ff', '#ffd59a', '#ff9ac4', '#9adcff'];

  function palForMidi(m) {
    return PALETTE[(m % 12) % PALETTE.length];
  }

  function spawnOrb(midi, color, intensity = 1) {
    // map pitch to y (higher = higher)
    const midiRange = 20; // spread
    const tY = 1 - Math.min(1, Math.max(0, (midi - 48) / midiRange));
    const y = H * (0.15 + tY * 0.7);
    const x = W * 0.08 + Math.random() * W * 0.84;
    state.orbs.push({
      x, y,
      vx: (Math.random() - 0.5) * 24,
      vy: -8 - Math.random() * 12,
      r: 28 + Math.random() * 20 + intensity * 20,
      rMax: 120 + Math.random() * 80 + intensity * 40,
      life: 3.4 + Math.random() * 1.5,
      age: 0,
      color,
      intensity,
    });
    state.ripples.push({ x, y, r: 10, age: 0, life: 1.6, color });
  }

  function spawnLetter(ch) {
    state.letters.push({
      ch,
      x: W * 0.1 + Math.random() * W * 0.8,
      y: H * (0.75 + Math.random() * 0.1),
      vx: (Math.random() - 0.5) * 30,
      vy: -30 - Math.random() * 60,
      age: 0, life: 3.5 + Math.random() * 1.5,
      size: 18 + Math.random() * 18,
      rot: (Math.random() - 0.5) * 0.3,
    });
  }

  // ---- Keyboard ----
  const heldKeys = new Set();
  let firstKey = true;
  window.addEventListener('keydown', e => {
    if (e.repeat) return;
    if (e.ctrlKey || e.metaKey || e.altKey) return;
    const k = e.key;
    // allow tab/f-keys
    if (k.length > 1 && !['Backspace','Enter',' ','Shift'].includes(k)) return;
    if (k === 'Shift') return; // don't trigger on plain shift press
    e.preventDefault();
    initAudio();
    if (firstKey) {
      firstKey = false;
      hint.classList.add('faded');
      setTimeout(() => hint.style.display = 'none', 800);
    }
    handleKey(k, e.shiftKey);
  });

  function handleKey(k, shifted) {
    state.typedCount++;
    const now = performance.now();
    state.lastTimes.push(now);
    state.lastTimes = state.lastTimes.filter(t => now - t < 6000);
    // WPM: assume 5 chars/word
    const secs = 6;
    const cpm = (state.lastTimes.length * (60 / secs));
    const wpm = Math.round(cpm / 5);
    wpmEl.textContent = wpm;
    keysEl.textContent = state.typedCount;

    const root = parseInt(rootSel.value, 10);
    const scale = SCALES[scaleSel.value];

    if (k === ' ') {
      // drone hit at root
      const midi = 36 + root + (shifted ? 12 : 0);
      playDroneHit(midi);
      spawnOrb(midi, '#a0c8ff', 1.4);
      pushText(' ');
      return;
    }
    if (k === 'Enter') {
      playChime();
      for (let i = 0; i < 3; i++) {
        const m = 60 + root + scale[i % scale.length] + 12;
        setTimeout(() => spawnOrb(m, palForMidi(m), 0.8), i * 140);
      }
      pushText('\n');
      return;
    }
    if (k === 'Backspace') {
      playSoft();
      // small fade orb
      const m = 48 + root;
      spawnOrb(m, '#dddddd', 0.3);
      state.text = state.text.slice(0, -1);
      board.innerHTML = escapeHtml(state.text) + '<span class="caret"> </span>';
      return;
    }
    // letters / punctuation — map to pitch by char code
    const code = k.toLowerCase().charCodeAt(0);
    const idx = Math.abs(code - 97); // a=0
    // idx -> scale + octave
    const sd = idx % scale.length;
    const oct = Math.floor(idx / scale.length);
    let midi = 48 + root + scale[sd] + oct * 12;
    if (shifted) midi += 12;
    // punctuation falls outside a-z → still works via code difference
    playPad(midi, 1);
    spawnOrb(midi, palForMidi(midi), 1);
    if (k.length === 1) pushText(k);
    spawnLetter(k);
  }

  function pushText(ch) {
    if (ch === '\n') state.text += ' ⏎ ';
    else state.text += ch;
    if (state.text.length > 120) state.text = state.text.slice(-120);
    board.innerHTML = escapeHtml(state.text) + '<span class="caret"> </span>';
  }
  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
  }

  // ---- Drawing ----
  let last = performance.now();
  function loop(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    state.t += dt;

    // fade trail
    ctx2d.fillStyle = 'rgba(2, 1, 13, 0.13)';
    ctx2d.fillRect(0, 0, W, H);

    // stars
    for (const s of state.stars) {
      s.tw += dt;
      const x = (s.x + state.t * 8) % W;
      const y = (s.y + state.t * 4) % H;
      const a = s.a * (0.5 + Math.sin(s.tw * 2) * 0.5);
      ctx2d.fillStyle = `rgba(240, 230, 255, ${a})`;
      ctx2d.fillRect(x, y, s.r, s.r);
    }

    // ripples
    for (let i = state.ripples.length - 1; i >= 0; i--) {
      const r = state.ripples[i];
      r.age += dt;
      r.r += 260 * dt;
      if (r.age >= r.life) { state.ripples.splice(i, 1); continue; }
      const a = 1 - r.age / r.life;
      ctx2d.strokeStyle = r.color;
      ctx2d.globalAlpha = a * 0.35;
      ctx2d.lineWidth = 1.5;
      ctx2d.beginPath();
      ctx2d.arc(r.x, r.y, r.r, 0, Math.PI * 2);
      ctx2d.stroke();
    }
    ctx2d.globalAlpha = 1;

    // orbs
    for (let i = state.orbs.length - 1; i >= 0; i--) {
      const o = state.orbs[i];
      o.age += dt;
      if (o.age >= o.life) { state.orbs.splice(i, 1); continue; }
      o.x += o.vx * dt;
      o.y += o.vy * dt;
      o.vx *= Math.pow(0.6, dt);
      o.vy += 4 * dt;
      const k = o.age / o.life;
      const bloom = Math.sin(k * Math.PI); // grow then shrink
      const r = o.r + (o.rMax - o.r) * bloom;
      const a = 0.55 * (1 - k) + 0.15 * Math.sin(k * 6);
      const grad = ctx2d.createRadialGradient(o.x, o.y, 0, o.x, o.y, r);
      grad.addColorStop(0, hexA(o.color, a));
      grad.addColorStop(0.5, hexA(o.color, a * 0.35));
      grad.addColorStop(1, hexA(o.color, 0));
      ctx2d.fillStyle = grad;
      ctx2d.beginPath();
      ctx2d.arc(o.x, o.y, r, 0, Math.PI * 2);
      ctx2d.fill();
      // core
      ctx2d.fillStyle = hexA(o.color, (1 - k) * 0.8);
      ctx2d.beginPath();
      ctx2d.arc(o.x, o.y, 3 + bloom * 2, 0, Math.PI * 2);
      ctx2d.fill();
    }

    // floating letters (subtle)
    for (let i = state.letters.length - 1; i >= 0; i--) {
      const l = state.letters[i];
      l.age += dt;
      if (l.age >= l.life) { state.letters.splice(i, 1); continue; }
      l.x += l.vx * dt;
      l.y += l.vy * dt;
      l.vy += 10 * dt;
      l.vx *= Math.pow(0.2, dt);
      l.rot += 0.4 * dt;
      const k = l.age / l.life;
      const a = Math.min(1, (1 - k) * 1.3);
      ctx2d.save();
      ctx2d.translate(l.x, l.y);
      ctx2d.rotate(l.rot * (1 - k));
      ctx2d.globalAlpha = a * 0.35;
      ctx2d.font = `${l.size}px DotGothic16, monospace`;
      ctx2d.fillStyle = '#f0e6ff';
      ctx2d.shadowColor = '#ffb3f0';
      ctx2d.shadowBlur = 12;
      ctx2d.fillText(l.ch, 0, 0);
      ctx2d.restore();
    }
    ctx2d.globalAlpha = 1;
    ctx2d.shadowBlur = 0;

    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  function hexA(hex, alpha) {
    // hex like #ffb3f0
    const h = hex.replace('#', '');
    const r = parseInt(h.substring(0, 2), 16);
    const g = parseInt(h.substring(2, 4), 16);
    const b = parseInt(h.substring(4, 6), 16);
    return `rgba(${r}, ${g}, ${b}, ${alpha})`;
  }
})();
</script>
</body>
</html>
