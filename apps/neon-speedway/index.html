<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>Neon Speedway · Chat Race</title>
<meta name="description" content="Type in chat to race. Every message kicks your car forward around a glowing neon circuit." />
<meta property="og:title" content="Neon Speedway" />
<meta property="og:description" content="Type in chat to race. Every message is a speed boost." />
<meta property="og:url" content="https://app.sloppy.live/neon-speedway/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/Neon%20synthwave%20top%20down%20oval%20race%20track%20with%20glowing%20cars%2C%20pink%20cyan%20yellow%20violet%20neon%2C%20dark%20night%20grid%20background%2C%2080s%20arcade%2C%20vaporwave?width=1200&height=630&nologo=true" />
<link rel="icon" href="https://emojicdn.elk.sh/🏁" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Monoton&family=Share+Tech+Mono&family=VT323&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet" />
<style>
  *,*::before,*::after { box-sizing: border-box; }
  :root {
    --bg-0: #050018;
    --bg-1: #0a0124;
    --bg-2: #15003a;
    --ink: #f6e7ff;
    --dim: #8a76b8;
    --pink: #ff2e88;
    --cyan: #26e8ff;
    --yellow: #ffe14d;
    --violet: #9d5bff;
    --lime: #7cff5b;
    --orange: #ff8a3d;
    --rose: #ff5fa2;
    --white-glow: rgba(255,231,255,0.72);
    --grid: rgba(157,91,255,0.12);
  }
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    background: radial-gradient(ellipse at 18% 8%, rgba(255,46,136,0.18), transparent 55%),
                radial-gradient(ellipse at 82% 92%, rgba(38,232,255,0.16), transparent 60%),
                linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 50%, var(--bg-2) 100%);
    color: var(--ink);
    font-family: 'Share Tech Mono', monospace;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none;
    background:
      repeating-linear-gradient(0deg, rgba(0,0,0,0) 0 2px, rgba(0,0,0,0.18) 2px 3px),
      repeating-linear-gradient(90deg, rgba(157,91,255,0) 0 64px, rgba(157,91,255,0.06) 64px 65px),
      repeating-linear-gradient(0deg, rgba(38,232,255,0) 0 64px, rgba(38,232,255,0.05) 64px 65px);
    mix-blend-mode: screen;
    z-index: 50;
  }
  body::after {
    content: ''; position: fixed; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse at 50% 50%, transparent 30%, rgba(5,0,24,0.55) 100%);
    z-index: 51;
  }

  #stage { position: fixed; inset: 0; }
  canvas#track {
    position: absolute; inset: 0; width: 100%; height: 100%;
    display: block;
  }

  /* ============================================ */
  /* HEADER                                       */
  /* ============================================ */
  header.hud {
    position: fixed;
    top: 14px; left: 50%; transform: translateX(-50%);
    z-index: 70;
    display: flex; flex-direction: column; align-items: center;
    pointer-events: none;
  }
  .title {
    font-family: 'Monoton', cursive;
    font-size: clamp(28px, 5.6vw, 64px);
    letter-spacing: clamp(2px, 0.4vw, 6px);
    line-height: 1;
    background: linear-gradient(90deg, var(--pink) 0%, var(--violet) 35%, var(--cyan) 70%, var(--yellow) 100%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 22px rgba(255,46,136,0.18);
    filter: drop-shadow(0 0 16px rgba(157,91,255,0.45));
    user-select: none;
  }
  .sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(10px, 1.3vw, 13px);
    letter-spacing: 0.42em;
    text-transform: uppercase;
    color: var(--dim);
    margin-top: 6px;
  }

  /* ============================================ */
  /* CONTROL BAR                                  */
  /* ============================================ */
  .panel {
    position: fixed;
    z-index: 70;
    background: rgba(10,1,36,0.78);
    border: 1px solid rgba(157,91,255,0.35);
    border-radius: 14px;
    backdrop-filter: blur(8px);
    box-shadow: 0 0 22px rgba(157,91,255,0.15), inset 0 0 12px rgba(38,232,255,0.06);
    padding: 12px 14px;
    pointer-events: auto;
  }
  .panel .label {
    font-family: 'Silkscreen', monospace;
    font-size: 10px;
    letter-spacing: 0.32em;
    color: var(--dim);
    text-transform: uppercase;
  }
  .panel h3 {
    font-family: 'Audiowide', cursive;
    font-size: 13px;
    letter-spacing: 0.18em;
    color: var(--cyan);
    margin: 0 0 8px 0;
    text-transform: uppercase;
    text-shadow: 0 0 8px rgba(38,232,255,0.5);
  }

  #controlPanel {
    bottom: 18px; left: 18px;
    width: min(320px, 90vw);
  }
  .row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .row:last-child { margin-bottom: 0; }
  input[type=text], input[type=number] {
    flex: 1;
    background: rgba(0,0,0,0.45);
    border: 1px solid rgba(38,232,255,0.4);
    border-radius: 8px;
    color: var(--ink);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 8px 10px;
    outline: none;
    transition: border-color 0.18s, box-shadow 0.18s;
  }
  input[type=text]:focus, input[type=number]:focus {
    border-color: var(--cyan);
    box-shadow: 0 0 0 2px rgba(38,232,255,0.2), 0 0 14px rgba(38,232,255,0.4);
  }
  button.btn {
    background: linear-gradient(135deg, rgba(255,46,136,0.18), rgba(157,91,255,0.18));
    border: 1px solid rgba(255,46,136,0.55);
    color: var(--ink);
    font-family: 'Audiowide', cursive;
    font-size: 12px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    transition: transform 0.12s, box-shadow 0.18s, border-color 0.18s;
    white-space: nowrap;
  }
  button.btn:hover {
    border-color: var(--pink);
    box-shadow: 0 0 14px rgba(255,46,136,0.45);
    transform: translateY(-1px);
  }
  button.btn:active { transform: translateY(1px); }
  button.btn.ghost {
    background: rgba(157,91,255,0.08);
    border-color: rgba(157,91,255,0.4);
  }
  button.btn.ghost:hover { box-shadow: 0 0 14px rgba(157,91,255,0.45); }

  .status {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.06em;
    margin-top: 2px;
    line-height: 1.4;
  }
  .status.ok { color: var(--lime); }
  .status.bad { color: var(--pink); }
  .status.warn { color: var(--yellow); }

  .row label.tight {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.16em;
    text-transform: uppercase;
    min-width: 56px;
  }
  .row .num {
    width: 64px; flex: 0 0 auto;
  }

  /* ============================================ */
  /* LEADERBOARD                                  */
  /* ============================================ */
  #leaderboard {
    top: 18px; right: 18px;
    width: min(260px, 88vw);
    max-height: calc(100vh - 36px);
    overflow: hidden auto;
  }
  #leaderboard::-webkit-scrollbar { width: 6px; }
  #leaderboard::-webkit-scrollbar-track { background: transparent; }
  #leaderboard::-webkit-scrollbar-thumb { background: rgba(157,91,255,0.4); border-radius: 4px; }

  .leader-row {
    display: grid;
    grid-template-columns: 18px 1fr auto;
    gap: 8px;
    align-items: center;
    padding: 6px 0;
    border-bottom: 1px dashed rgba(157,91,255,0.18);
    font-size: 12px;
  }
  .leader-row:last-child { border-bottom: 0; }
  .leader-rank {
    font-family: 'Audiowide', cursive;
    color: var(--yellow);
    font-size: 12px;
  }
  .leader-name {
    font-family: 'Share Tech Mono', monospace;
    color: var(--ink);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    display: flex; align-items: center; gap: 6px;
  }
  .leader-color {
    width: 9px; height: 9px; border-radius: 50%;
    box-shadow: 0 0 8px currentColor;
  }
  .leader-laps {
    font-family: 'VT323', monospace;
    font-size: 16px;
    color: var(--cyan);
  }
  .leader-empty {
    font-size: 11px; color: var(--dim);
    font-style: italic;
    padding: 4px 0;
  }
  #champBadge {
    margin-top: 10px;
    text-align: center;
    font-family: 'Audiowide', cursive;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: var(--yellow);
    text-shadow: 0 0 10px rgba(255,225,77,0.6);
    text-transform: uppercase;
    display: none;
  }
  #champBadge.live { display: block; animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse {
    0%,100% { transform: scale(1); }
    50% { transform: scale(1.04); }
  }

  /* ============================================ */
  /* CHAT FEED                                    */
  /* ============================================ */
  #chatFeed {
    bottom: 18px; right: 18px;
    width: min(280px, 88vw);
    max-height: 200px;
    overflow: hidden auto;
    font-size: 11px;
  }
  #chatFeed::-webkit-scrollbar { width: 6px; }
  #chatFeed::-webkit-scrollbar-thumb { background: rgba(38,232,255,0.4); border-radius: 4px; }
  .chat-line {
    padding: 3px 0;
    border-bottom: 1px dashed rgba(38,232,255,0.1);
    line-height: 1.35;
  }
  .chat-line:last-child { border-bottom: 0; }
  .chat-user {
    font-weight: bold;
  }
  .chat-text {
    color: var(--dim);
    margin-left: 6px;
    word-break: break-word;
  }

  /* ============================================ */
  /* TOAST                                        */
  /* ============================================ */
  #toast {
    position: fixed;
    top: 50%; left: 50%; transform: translate(-50%,-50%);
    z-index: 80;
    background: rgba(10,1,36,0.92);
    border: 1px solid var(--pink);
    border-radius: 14px;
    padding: 18px 28px;
    font-family: 'Audiowide', cursive;
    font-size: 24px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink);
    box-shadow: 0 0 32px rgba(255,46,136,0.55);
    text-align: center;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s;
  }
  #toast.live { opacity: 1; }
  #toast .winner {
    color: var(--yellow);
    text-shadow: 0 0 16px var(--yellow);
  }
  #toast .small {
    display: block; font-size: 11px; color: var(--dim); margin-top: 6px; letter-spacing: 0.2em;
  }

  /* ============================================ */
  /* MOBILE                                       */
  /* ============================================ */
  @media (max-width: 720px) {
    .title { font-size: 30px; }
    .sub { font-size: 9px; letter-spacing: 0.3em; }
    header.hud { top: 6px; }
    #controlPanel { left: 8px; bottom: 8px; padding: 8px 10px; width: calc(50% - 12px); font-size: 11px; }
    #leaderboard { right: 8px; top: 80px; padding: 8px 10px; width: calc(50% - 12px); max-height: 40vh; }
    #chatFeed { right: 8px; bottom: 8px; padding: 6px 10px; width: calc(50% - 12px); max-height: 130px; }
    .row { flex-wrap: wrap; gap: 6px; }
    button.btn { padding: 6px 10px; font-size: 10px; }
    input[type=text], input[type=number] { padding: 6px 8px; font-size: 11px; }
    .leader-row { grid-template-columns: 14px 1fr auto; font-size: 10px; padding: 4px 0; }
    .leader-laps { font-size: 14px; }
  }

  /* ============================================ */
  /* HINT                                         */
  /* ============================================ */
  #hint {
    position: fixed;
    top: 50%; left: 50%; transform: translate(-50%, -50%);
    z-index: 60;
    text-align: center;
    pointer-events: none;
    font-family: 'Share Tech Mono', monospace;
    color: var(--dim);
    font-size: 13px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    transition: opacity 0.6s;
  }
  #hint .big {
    display: block;
    font-family: 'Audiowide', cursive;
    color: var(--cyan);
    font-size: 22px;
    letter-spacing: 0.3em;
    margin-bottom: 8px;
    text-shadow: 0 0 12px rgba(38,232,255,0.5);
  }
  #hint.hide { opacity: 0; }
</style>
</head>
<body>

<div id="stage">
  <canvas id="track"></canvas>
</div>

<header class="hud">
  <div class="title">NEON&nbsp;SPEEDWAY</div>
  <div class="sub">type · in · chat · to · race</div>
</header>

<div id="hint">
  <span class="big">CONNECT TWITCH CHAT</span>
  every message in chat<br/>kicks that user's car forward
</div>

<aside id="leaderboard" class="panel">
  <h3>· STANDINGS ·</h3>
  <div id="leaderList"></div>
  <div id="champBadge"></div>
</aside>

<aside id="chatFeed" class="panel">
  <h3>· CHAT ·</h3>
  <div id="chatList"></div>
</aside>

<aside id="controlPanel" class="panel">
  <h3>· RACE CONTROL ·</h3>
  <div class="row">
    <input id="channelInput" type="text" placeholder="twitch channel" value="sloppy_ai" autocomplete="off" spellcheck="false" />
    <button id="connectBtn" class="btn">Connect</button>
  </div>
  <div class="row">
    <label class="tight">Laps</label>
    <input id="lapsInput" type="number" class="num" min="1" max="50" value="5" />
    <button id="resetBtn" class="btn ghost">Reset</button>
    <button id="demoBtn" class="btn ghost">Demo</button>
  </div>
  <div id="connStatus" class="status">💤 idle · enter a channel + connect</div>
</aside>

<div id="toast"></div>

<script>
'use strict';

/* =========================================================
 * CANVAS + RESIZE
 * ========================================================= */
const canvas = document.getElementById('track');
const ctx = canvas.getContext('2d', { alpha: true });
let W = 0, H = 0, DPR = 1;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2.2);
  W = canvas.clientWidth = window.innerWidth;
  H = canvas.clientHeight = window.innerHeight;
  canvas.width = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  buildTrack();
}
window.addEventListener('resize', resize);

/* =========================================================
 * TRACK GEOMETRY  (rounded-rectangle "stadium" oval)
 * Each car has parametric position s ∈ [0, perimeter)
 * Track has an inner-bound and outer-bound; we use a centerline
 * for the racing line and offset cars onto N parallel lanes.
 * ========================================================= */
const track = {
  cx: 0, cy: 0,
  rx: 0, ry: 0,
  cornerR: 0,
  width: 0,         // road width
  perimeter: 0,
  segments: [],     // built from straights + arcs
  laneCount: 6,
};

function buildTrack() {
  // Pick safe margins so HUD doesn't clip
  const padTop = Math.min(140, H * 0.18);
  const padBottom = Math.min(160, H * 0.20);
  const padLeftRight = Math.min(60, W * 0.06);
  const usableW = Math.max(W - padLeftRight * 2, 320);
  const usableH = Math.max(H - padTop - padBottom, 240);

  // Stadium shape parameters
  const cx = W / 2;
  const cy = padTop + usableH / 2;
  const r = Math.min(usableH * 0.5, usableW * 0.5) - 8;
  const cornerR = Math.max(r, 60);

  // Width of the rounded rect (the centerline)
  const halfW = Math.max((usableW / 2) - cornerR, cornerR * 0.4);
  const halfH = cornerR;

  track.cx = cx;
  track.cy = cy;
  track.cornerR = cornerR;
  track.halfW = halfW;
  track.halfH = halfH;
  track.width = Math.max(48, Math.min(96, cornerR * 0.55));

  // Build piecewise segments along the center: top straight (right→left), left arc, bottom straight (left→right), right arc.
  // We use clockwise direction so cars go counter-clockwise visually? Let's go clockwise: start at top-left of top straight going right.
  const segs = [];
  // 1. Top straight: from (cx - halfW, cy - halfH) → (cx + halfW, cy - halfH)
  segs.push({ kind: 'line', x1: cx - halfW, y1: cy - halfH, x2: cx + halfW, y2: cy - halfH, len: halfW * 2 });
  // 2. Right arc: center (cx + halfW, cy), radius cornerR, from -90° to +90° (clockwise sweep π)
  segs.push({ kind: 'arc', cx: cx + halfW, cy: cy, r: cornerR, a1: -Math.PI / 2, a2: Math.PI / 2, len: Math.PI * cornerR });
  // 3. Bottom straight: from (cx + halfW, cy + halfH) → (cx - halfW, cy + halfH)
  segs.push({ kind: 'line', x1: cx + halfW, y1: cy + halfH, x2: cx - halfW, y2: cy + halfH, len: halfW * 2 });
  // 4. Left arc: from +90° to +270° (= -π/2)
  segs.push({ kind: 'arc', cx: cx - halfW, cy: cy, r: cornerR, a1: Math.PI / 2, a2: 3 * Math.PI / 2, len: Math.PI * cornerR });

  let total = 0;
  for (const s of segs) { s.start = total; total += s.len; }
  track.segments = segs;
  track.perimeter = total;
}

// Position + tangent at arc-length s along the centerline.
function trackPoint(s) {
  s = ((s % track.perimeter) + track.perimeter) % track.perimeter;
  const segs = track.segments;
  for (let i = 0; i < segs.length; i++) {
    const seg = segs[i];
    if (s <= seg.start + seg.len) {
      const u = (s - seg.start) / seg.len;
      if (seg.kind === 'line') {
        const x = seg.x1 + (seg.x2 - seg.x1) * u;
        const y = seg.y1 + (seg.y2 - seg.y1) * u;
        const dx = (seg.x2 - seg.x1) / seg.len;
        const dy = (seg.y2 - seg.y1) / seg.len;
        // outward normal: rotate tangent 90° clockwise (for clockwise loop, outward = left-of-tangent)
        // For our clockwise direction outward normal points away from center.
        const nx = dy, ny = -dx;
        return { x, y, dx, dy, nx, ny };
      } else {
        const a = seg.a1 + (seg.a2 - seg.a1) * u;
        const x = seg.cx + Math.cos(a) * seg.r;
        const y = seg.cy + Math.sin(a) * seg.r;
        const dx = -Math.sin(a) * Math.sign(seg.a2 - seg.a1);
        const dy =  Math.cos(a) * Math.sign(seg.a2 - seg.a1);
        const nx = Math.cos(a);
        const ny = Math.sin(a);
        return { x, y, dx, dy, nx, ny };
      }
    }
  }
  // Fallback
  return { x: track.cx, y: track.cy, dx: 1, dy: 0, nx: 0, ny: -1 };
}

/* =========================================================
 * RACERS
 * ========================================================= */
const NEON_PALETTE = [
  '#ff2e88', '#26e8ff', '#ffe14d', '#9d5bff', '#7cff5b',
  '#ff8a3d', '#ff5fa2', '#5be1ff', '#c8ff3d', '#a07bff',
  '#ff79c6', '#50fa7b', '#8be9fd', '#ffb86c', '#bd93f9',
  '#ff5555', '#f1fa8c', '#6272a4',
];
function colorFor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;
  return NEON_PALETTE[h % NEON_PALETTE.length];
}

const racers = new Map();   // key: lower-case username → racer object
let raceFinished = false;
let lapsTarget = 5;
let winner = null;

function makeRacer(user, display) {
  const lane = racers.size % track.laneCount;
  const r = {
    user,
    display: (display || user),
    color: colorFor(user),
    s: 0,                           // arc-length progress
    lap: 0,
    speed: 0,                       // current px/sec along arc
    boost: 0,                       // decaying boost added by chat
    lane,                            // 0..N-1 — outward offset
    laneTarget: lane,
    laneOffset: 0,                  // smoothed
    bobPhase: Math.random() * Math.PI * 2,
    finishedAt: 0,                  // ms
    sparks: [],                     // exhaust particles
    lastBoostAt: 0,
    msgCount: 0,
  };
  racers.set(user, r);
  return r;
}

function boostRacer(user, display, magnitude) {
  let r = racers.get(user);
  const wasNew = !r;
  if (!r) r = makeRacer(user, display);
  if (display) r.display = display;
  // each chat message: +N boost (decays over time). Cap scales with base speed.
  const cap = Math.max(220, baseSpeed() * 4);
  r.boost = Math.min(cap, r.boost + magnitude);
  r.msgCount++;
  r.lastBoostAt = performance.now();
  // spawn a few sparks
  spawnSparks(r, 6);
  if (wasNew) console.log('[neon-speedway] new racer', user, '→', r.color);
}

function spawnSparks(r, n) {
  const pt = laneOffsetPoint(r);
  for (let i = 0; i < n; i++) {
    r.sparks.push({
      x: pt.x - pt.dx * 6 + (Math.random() - 0.5) * 6,
      y: pt.y - pt.dy * 6 + (Math.random() - 0.5) * 6,
      vx: -pt.dx * (40 + Math.random() * 70) + (Math.random() - 0.5) * 30,
      vy: -pt.dy * (40 + Math.random() * 70) + (Math.random() - 0.5) * 30,
      life: 0.5 + Math.random() * 0.4,
      max: 0.9,
    });
  }
}

function laneOffsetPoint(r) {
  const pt = trackPoint(r.s);
  const laneSpacing = track.width / track.laneCount;
  // lane 0 = innermost, top lane = outermost; offset along normal (outward)
  const offset = (r.laneOffset - (track.laneCount - 1) / 2) * laneSpacing;
  return {
    x: pt.x + pt.nx * offset,
    y: pt.y + pt.ny * offset,
    dx: pt.dx, dy: pt.dy, nx: pt.nx, ny: pt.ny,
  };
}

/* =========================================================
 * SIMULATION
 * ========================================================= */
// Speed scales with track perimeter so a lap stays ~28-32s on any viewport.
function baseSpeed() { return Math.max(60, track.perimeter / 30); }
const BOOST_DECAY = 0.85;       // per second (faster decay, snappier feel)
const SPEED_LERP = 5.5;
const LANE_LERP = 1.8;
const FINISH_SPEED = 0;

let prev = performance.now();

function tick(now) {
  const dt = Math.min(0.1, (now - prev) / 1000);
  prev = now;

  // Update racers
  for (const r of racers.values()) {
    if (r.finishedAt) {
      // wind down past finish line
      r.speed *= 0.97;
      r.s += r.speed * dt;
    } else {
      // boost decay
      r.boost *= Math.exp(-BOOST_DECAY * dt);
      const targetSpeed = baseSpeed() + r.boost;
      r.speed += (targetSpeed - r.speed) * Math.min(1, SPEED_LERP * dt);
      r.s += r.speed * dt;
      // check lap completion: each racer's `s` modulo perimeter, but we track completed laps
      while (r.s >= track.perimeter) {
        r.s -= track.perimeter;
        r.lap++;
        if (!raceFinished && lapsTarget > 0 && r.lap >= lapsTarget) {
          r.finishedAt = now;
          r.speed *= 0.6;
          if (!winner) {
            winner = r;
            raceFinished = true;
            announceWinner(r);
          }
        }
      }
    }
    // smooth lane
    r.laneOffset += (r.laneTarget - r.laneOffset) * Math.min(1, LANE_LERP * dt);
    r.bobPhase += dt * (3 + r.speed * 0.02);

    // spark physics
    for (let i = r.sparks.length - 1; i >= 0; i--) {
      const sp = r.sparks[i];
      sp.life -= dt;
      if (sp.life <= 0) { r.sparks.splice(i, 1); continue; }
      sp.x += sp.vx * dt;
      sp.y += sp.vy * dt;
      sp.vx *= 0.93;
      sp.vy *= 0.93;
    }
  }

  // Lane re-balancing: assign lanes by current rank so leader sits on cleanest line.
  if (racers.size > 1) {
    const list = [...racers.values()].sort((a, b) => (b.lap * track.perimeter + b.s) - (a.lap * track.perimeter + a.s));
    list.forEach((r, i) => { r.laneTarget = i % track.laneCount; });
  }

  draw(now);
  requestAnimationFrame(tick);
}

/* =========================================================
 * RENDER
 * ========================================================= */
function draw(now) {
  ctx.clearRect(0, 0, W, H);
  drawBackground(now);
  drawTrack(now);
  drawCars(now);
  updateLeaderboard();
}

let bgTime = 0;
function drawBackground(now) {
  bgTime += 0.0015;
  // sun semicircle
  const sunY = H * 0.62;
  const sunR = Math.min(W, H) * 0.18;
  const grad = ctx.createLinearGradient(0, sunY - sunR, 0, sunY + sunR);
  grad.addColorStop(0, 'rgba(255,46,136,0.9)');
  grad.addColorStop(0.45, 'rgba(255,138,61,0.55)');
  grad.addColorStop(1, 'rgba(157,91,255,0.0)');
  ctx.save();
  ctx.beginPath();
  ctx.arc(W / 2, sunY, sunR, Math.PI, 0, false);
  ctx.fillStyle = grad;
  ctx.fill();
  // sun bands
  ctx.globalCompositeOperation = 'destination-out';
  for (let i = 0; i < 7; i++) {
    const y = sunY - sunR * 0.92 + i * (sunR / 8) + (sunR / 12);
    ctx.fillRect(W / 2 - sunR, y, sunR * 2, Math.max(2, sunR / 30));
  }
  ctx.restore();

  // ground perspective grid
  ctx.save();
  ctx.strokeStyle = 'rgba(157,91,255,0.22)';
  ctx.lineWidth = 1;
  const groundY = H * 0.66;
  for (let i = 0; i < 14; i++) {
    const t = i / 14;
    const yy = groundY + t * (H - groundY) * 1.05;
    ctx.beginPath();
    ctx.moveTo(0, yy);
    ctx.lineTo(W, yy);
    ctx.globalAlpha = 0.5 - t * 0.4;
    ctx.stroke();
  }
  ctx.globalAlpha = 1;
  // verticals (vanishing point)
  const vpx = W / 2;
  for (let i = -10; i <= 10; i++) {
    ctx.beginPath();
    const startX = vpx + i * (W * 0.06);
    ctx.moveTo(startX, groundY);
    ctx.lineTo(vpx + i * (W * 0.4), H + 30);
    ctx.strokeStyle = 'rgba(38,232,255,0.18)';
    ctx.stroke();
  }
  ctx.restore();
}

function strokeCenterline(width, style, dashes) {
  ctx.save();
  ctx.lineWidth = width;
  ctx.strokeStyle = style;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  if (dashes) ctx.setLineDash(dashes);
  ctx.beginPath();
  // walk segments
  for (const seg of track.segments) {
    if (seg.kind === 'line') {
      ctx.moveTo(seg.x1, seg.y1);
      ctx.lineTo(seg.x2, seg.y2);
    } else {
      ctx.moveTo(seg.cx + Math.cos(seg.a1) * seg.r, seg.cy + Math.sin(seg.a1) * seg.r);
      ctx.arc(seg.cx, seg.cy, seg.r, seg.a1, seg.a2, seg.a2 < seg.a1);
    }
  }
  ctx.stroke();
  ctx.restore();
}

function drawTrack(now) {
  const w = track.width;

  // Outer glow halo (very wide blurred)
  ctx.save();
  ctx.shadowColor = 'rgba(157,91,255,0.85)';
  ctx.shadowBlur = 36;
  strokeCenterline(w + 12, 'rgba(157,91,255,0.18)');
  ctx.restore();

  // Asphalt body
  strokeCenterline(w, 'rgba(8,2,28,0.92)');

  // Outer pink rail
  ctx.save();
  ctx.shadowColor = 'rgba(255,46,136,0.95)';
  ctx.shadowBlur = 18;
  ctx.lineWidth = 3;
  ctx.strokeStyle = 'rgba(255,46,136,0.95)';
  ctx.beginPath();
  // outer rail = centerline offset along outward normal by (w/2)
  drawOffsetLoop(w / 2);
  ctx.stroke();
  ctx.restore();

  // Inner cyan rail
  ctx.save();
  ctx.shadowColor = 'rgba(38,232,255,0.95)';
  ctx.shadowBlur = 18;
  ctx.lineWidth = 3;
  ctx.strokeStyle = 'rgba(38,232,255,0.95)';
  ctx.beginPath();
  drawOffsetLoop(-w / 2);
  ctx.stroke();
  ctx.restore();

  // dashed yellow centerline (slowly moving — racing flow)
  ctx.save();
  ctx.lineWidth = 1.6;
  ctx.strokeStyle = 'rgba(255,225,77,0.55)';
  ctx.setLineDash([14, 18]);
  ctx.lineDashOffset = -now * 0.06;
  ctx.beginPath();
  drawOffsetLoop(0);
  ctx.stroke();
  ctx.restore();

  // start / finish line — at s=0 (top straight start, left side)
  drawStartLine();
}

// Draw the centerline offset by `offset` along the outward normal.
function drawOffsetLoop(offset) {
  const segs = track.segments;
  let started = false;
  for (const seg of segs) {
    if (seg.kind === 'line') {
      // offset = perpendicular = (dy, -dx) * offset for outward
      const dx = (seg.x2 - seg.x1) / seg.len;
      const dy = (seg.y2 - seg.y1) / seg.len;
      const nx = dy, ny = -dx;
      const x1 = seg.x1 + nx * offset;
      const y1 = seg.y1 + ny * offset;
      const x2 = seg.x2 + nx * offset;
      const y2 = seg.y2 + ny * offset;
      if (!started) { ctx.moveTo(x1, y1); started = true; }
      else ctx.lineTo(x1, y1);
      ctx.lineTo(x2, y2);
    } else {
      // arc: outward normal at angle a is (cos a, sin a). Offset along normal scales the radius.
      const r2 = seg.r + offset;
      if (r2 <= 0) continue;
      const a1 = seg.a1, a2 = seg.a2;
      if (!started) {
        ctx.moveTo(seg.cx + Math.cos(a1) * r2, seg.cy + Math.sin(a1) * r2);
        started = true;
      } else {
        ctx.lineTo(seg.cx + Math.cos(a1) * r2, seg.cy + Math.sin(a1) * r2);
      }
      ctx.arc(seg.cx, seg.cy, r2, a1, a2, a2 < a1);
    }
  }
  ctx.closePath();
}

function drawStartLine() {
  const pt = trackPoint(0);
  // perpendicular bar across road
  const half = track.width / 2;
  ctx.save();
  ctx.translate(pt.x, pt.y);
  ctx.rotate(Math.atan2(pt.dy, pt.dx));
  // checker bar
  const bw = 7;
  const cells = Math.max(4, Math.floor(track.width / bw));
  for (let i = 0; i < cells; i++) {
    const yy = -half + i * (track.width / cells);
    ctx.fillStyle = (i % 2 === 0) ? '#f6e7ff' : '#0a0124';
    ctx.fillRect(-3, yy, 6, track.width / cells + 0.5);
  }
  // glow line
  ctx.shadowColor = 'rgba(255,225,77,0.9)';
  ctx.shadowBlur = 10;
  ctx.fillStyle = 'rgba(255,225,77,0.9)';
  ctx.fillRect(-1, -half, 2, track.width);
  ctx.restore();
}

function drawCars(now) {
  const sorted = [...racers.values()].sort((a, b) => a.s + a.lap * 1e6 - b.s - b.lap * 1e6);
  for (const r of sorted) {
    drawCar(r, now);
  }
}

function drawCar(r, now) {
  const pt = laneOffsetPoint(r);
  const ang = Math.atan2(pt.dy, pt.dx);
  const carLen = 22;
  const carWid = 11;
  const bob = Math.sin(r.bobPhase) * 0.6;

  // sparks behind
  for (const sp of r.sparks) {
    const a = sp.life / sp.max;
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.fillStyle = r.color;
    ctx.globalAlpha = a * 0.85;
    ctx.shadowColor = r.color;
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.arc(sp.x, sp.y, 1.6 + a * 1.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  ctx.save();
  ctx.translate(pt.x, pt.y + bob);
  ctx.rotate(ang);

  // outer halo
  ctx.shadowColor = r.color;
  ctx.shadowBlur = 22;
  ctx.fillStyle = r.color;
  ctx.globalAlpha = 0.18;
  ctx.beginPath();
  ctx.ellipse(0, 0, carLen + 4, carWid + 4, 0, 0, Math.PI * 2);
  ctx.fill();

  // body
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 14;
  ctx.fillStyle = r.color;
  roundedRect(-carLen / 2, -carWid / 2, carLen, carWid, 4);
  ctx.fill();

  // dark window strip
  ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(8,2,28,0.78)';
  roundedRect(-carLen / 2 + 5, -carWid / 2 + 2, carLen - 10, carWid - 4, 1.4);
  ctx.fill();

  // headlight (front-right because heading direction is +x in local)
  ctx.fillStyle = '#fff8e8';
  ctx.shadowColor = '#fff';
  ctx.shadowBlur = 6;
  ctx.fillRect(carLen / 2 - 3, -carWid / 2 + 1.8, 2, 1.6);
  ctx.fillRect(carLen / 2 - 3, carWid / 2 - 3.4, 2, 1.6);

  // boost flame trailing back
  if (r.boost > 4) {
    const flameLen = Math.min(28, r.boost * 0.5);
    ctx.shadowBlur = 12;
    ctx.shadowColor = '#ffe14d';
    const fg = ctx.createLinearGradient(-carLen / 2, 0, -carLen / 2 - flameLen, 0);
    fg.addColorStop(0, '#ffe14d');
    fg.addColorStop(0.6, 'rgba(255,138,61,0.8)');
    fg.addColorStop(1, 'rgba(255,46,136,0)');
    ctx.fillStyle = fg;
    ctx.beginPath();
    ctx.moveTo(-carLen / 2, -carWid / 2 + 2);
    ctx.lineTo(-carLen / 2 - flameLen, 0);
    ctx.lineTo(-carLen / 2, carWid / 2 - 2);
    ctx.closePath();
    ctx.fill();
  }

  ctx.restore();

  // username label above car (in screen space, not rotated)
  ctx.save();
  ctx.translate(pt.x, pt.y - 16);
  ctx.font = '10px "Silkscreen", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  const text = (r.display || r.user).slice(0, 16);
  // shadow plate
  const tw = ctx.measureText(text).width + 8;
  ctx.fillStyle = 'rgba(8,2,28,0.7)';
  roundedRect(-tw / 2, -8, tw, 14, 4);
  ctx.fill();
  // text
  ctx.fillStyle = r.color;
  ctx.shadowColor = r.color;
  ctx.shadowBlur = 6;
  ctx.fillText(text, 0, -1);
  ctx.restore();

  // lap pip
  if (r.finishedAt) {
    ctx.save();
    ctx.translate(pt.x, pt.y - 28);
    ctx.font = '11px "Audiowide"';
    ctx.fillStyle = '#ffe14d';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#ffe14d';
    ctx.shadowBlur = 8;
    ctx.fillText('🏁', 0, 0);
    ctx.restore();
  }
}

function roundedRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
}

/* =========================================================
 * LEADERBOARD UI
 * ========================================================= */
const leaderList = document.getElementById('leaderList');
const champBadge = document.getElementById('champBadge');
let lastLeaderHTML = '';

function progressOf(r) {
  return r.lap * track.perimeter + r.s;
}

function updateLeaderboard() {
  const list = [...racers.values()].sort((a, b) => progressOf(b) - progressOf(a)).slice(0, 12);
  if (list.length === 0) {
    if (lastLeaderHTML !== 'empty') {
      leaderList.innerHTML = '<div class="leader-empty">no racers yet — type in chat</div>';
      lastLeaderHTML = 'empty';
    }
    return;
  }
  let html = '';
  list.forEach((r, i) => {
    const prog = ((r.s / track.perimeter) * 100).toFixed(0);
    const display = (r.display || r.user).slice(0, 14);
    const escaped = display.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    html += `<div class="leader-row">
      <div class="leader-rank">${i + 1}</div>
      <div class="leader-name">
        <span class="leader-color" style="background:${r.color};color:${r.color}"></span>
        <span>${escaped}</span>
      </div>
      <div class="leader-laps">${r.lap}<span style="font-size:10px;color:var(--dim);">·${prog}%</span></div>
    </div>`;
  });
  if (html !== lastLeaderHTML) {
    leaderList.innerHTML = html;
    lastLeaderHTML = html;
  }
  if (winner) {
    const display = (winner.display || winner.user);
    champBadge.textContent = `🏁 ${display} wins`;
    champBadge.classList.add('live');
  } else {
    champBadge.classList.remove('live');
  }
}

/* =========================================================
 * CHAT FEED UI
 * ========================================================= */
const chatList = document.getElementById('chatList');
const MAX_CHAT_LINES = 30;

function logChat(user, text, color) {
  const row = document.createElement('div');
  row.className = 'chat-line';
  const u = document.createElement('span');
  u.className = 'chat-user';
  u.style.color = color || colorFor(user.toLowerCase());
  u.textContent = user;
  const t = document.createElement('span');
  t.className = 'chat-text';
  t.textContent = (text || '').slice(0, 120);
  row.appendChild(u);
  row.appendChild(t);
  chatList.insertBefore(row, chatList.firstChild);
  while (chatList.childNodes.length > MAX_CHAT_LINES) {
    chatList.removeChild(chatList.lastChild);
  }
}

/* =========================================================
 * CHAT MESSAGE → BOOST
 * ========================================================= */
function handleChatMessage(user, display, text) {
  if (!user) return;
  const lc = user.toLowerCase();
  const wasNew = !racers.has(lc);
  // chat-message magnitude: short messages get base boost, longer get a tiny bit more.
  // Cap so no novel-length spam runs away with it.
  const len = (text || '').length;
  const magnitude = 60 + Math.min(40, len * 0.7);
  boostRacer(lc, display, magnitude);
  logChat(display || user, text, racers.get(lc).color);
  if (wasNew) hideHint();
}

/* =========================================================
 * TWITCH IRC (anonymous read-only)
 * ========================================================= */
let twitchWs = null;
let twitchChannel = null;
let twitchConnected = false;
const chatStats = { received: 0 };

function setStatus(msg, cls) {
  const el = document.getElementById('connStatus');
  el.textContent = msg;
  el.className = 'status' + (cls ? ' ' + cls : '');
}

function parseIrcLine(line) {
  if (!line) return null;
  let i = 0;
  let tags = '';
  if (line[0] === '@') {
    const sp = line.indexOf(' ');
    tags = line.slice(1, sp);
    i = sp + 1;
  }
  let prefix = '';
  if (line[i] === ':') {
    const sp = line.indexOf(' ', i);
    prefix = line.slice(i + 1, sp);
    i = sp + 1;
  }
  const rest = line.slice(i).split(' ');
  const command = rest.shift();
  const params = [];
  while (rest.length) {
    const p = rest.shift();
    if (p.startsWith(':')) { params.push([p.slice(1), ...rest].join(' ')); break; }
    params.push(p);
  }
  return { tags, prefix, command, params };
}
function nickFromPrefix(prefix) {
  if (!prefix) return null;
  const bang = prefix.indexOf('!');
  return (bang > 0 ? prefix.slice(0, bang) : prefix).toLowerCase();
}
function displayNameFromTags(tags) {
  if (!tags) return null;
  const m = tags.match(/(?:^|;)display-name=([^;]*)/);
  // Twitch escapes spaces in tag values as the literal two chars: backslash + s
  return m ? m[1].replace(/\\s/g, ' ') : null;
}

function twitchConnect(channel) {
  channel = channel.replace(/[^a-z0-9_]/gi, '').toLowerCase();
  if (!channel) { setStatus('❌ invalid channel', 'bad'); return; }
  twitchDisconnect();
  twitchChannel = channel;
  setStatus('⏳ connecting…', 'warn');
  let ws;
  try { ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443'); }
  catch (e) { setStatus('❌ connect failed', 'bad'); return; }
  twitchWs = ws;
  const nick = 'justinfan' + ((Math.random() * 90000 + 10000) | 0);
  ws.addEventListener('open', () => {
    try {
      ws.send('CAP REQ :twitch.tv/tags twitch.tv/commands\r\n');
      ws.send('PASS SCHMOOPIIE\r\n');
      ws.send('NICK ' + nick + '\r\n');
      ws.send('JOIN #' + channel + '\r\n');
      console.log('[neon-speedway] WSS open, JOIN #' + channel + ' as ' + nick);
    } catch(e){ console.warn('[neon-speedway] WSS handshake error', e); }
  });
  ws.addEventListener('message', (ev) => {
    const lines = ev.data.split('\r\n');
    for (const line of lines) {
      if (!line) continue;
      if (line.startsWith('PING ')) { try { ws.send('PONG ' + line.slice(5) + '\r\n'); } catch (e) {} continue; }
      const msg = parseIrcLine(line);
      if (!msg) continue;
      if (msg.command === 'JOIN') {
        if (nickFromPrefix(msg.prefix) === nick) {
          twitchConnected = true;
          setStatus('✅ live · #' + channel + ' · waiting for chat', 'ok');
          document.getElementById('connectBtn').textContent = 'Disconnect';
          hideHint();
          stopDemo(true);
        }
      } else if (msg.command === 'PRIVMSG') {
        const user = nickFromPrefix(msg.prefix);
        const text = msg.params[1] || '';
        const display = displayNameFromTags(msg.tags) || user;
        chatStats.received++;
        document.getElementById('connStatus').dataset.rate = chatStats.received;
        if (user && text) handleChatMessage(user, display, text);
      } else if (msg.command === 'NOTICE') {
        // ignore
      }
    }
  });
  ws.addEventListener('close', () => {
    if (twitchWs === ws) {
      twitchConnected = false;
      twitchWs = null;
      setStatus('💤 disconnected · running demo', '');
      document.getElementById('connectBtn').textContent = 'Connect';
      // resume demo so the track isn't blank
      startDemo(true);
    }
  });
  ws.addEventListener('error', () => setStatus('❌ connection error', 'bad'));
}

function twitchDisconnect() {
  if (twitchWs) { try { twitchWs.close(); } catch (e) {} twitchWs = null; }
  twitchConnected = false;
}

/* =========================================================
 * DEMO MODE
 * ========================================================= */
const DEMO_NAMES = ['Sloppy_AI', 'PixelGremlin', 'NeonFox', 'turboWizard', 'glitch_io', 'datawitch', 'voidcrab', 'lazerllama', 'octobyte', 'modemKid', 'prismCat', 'syncFM', 'crtKnight', 'pinkParrot', 'biteSize'];
const DEMO_MSGS = ['gogo', 'send it', 'vibes', 'go go go', 'speed', '🔥🔥', 'chargin', 'lfg', 'whoosh', 'turbo!', 'overtake', 'race', 'go!!!', 'zoom', 'gas it', 'lap me', 'wheee'];
let demoTimer = null;
function startDemo(silent) {
  if (demoTimer) return;
  document.getElementById('demoBtn').textContent = 'Stop Demo';
  if (!silent) setStatus('🎲 demo running · connect Twitch to take over', 'warn');
  hideHint();
  demoTimer = setInterval(() => {
    const u = DEMO_NAMES[Math.floor(Math.random() * DEMO_NAMES.length)];
    const msg = DEMO_MSGS[Math.floor(Math.random() * DEMO_MSGS.length)];
    handleChatMessage(u.toLowerCase(), u, msg);
  }, 380);
}
function stopDemo(silent) {
  if (!demoTimer) return;
  clearInterval(demoTimer);
  demoTimer = null;
  document.getElementById('demoBtn').textContent = 'Demo';
  if (!silent) setStatus('💤 demo stopped', '');
}
function toggleDemo() {
  if (demoTimer) stopDemo();
  else startDemo();
}

/* =========================================================
 * RACE FLOW
 * ========================================================= */
const toastEl = document.getElementById('toast');
let toastTimer = null;
function showToast(html, ms) {
  toastEl.innerHTML = html;
  toastEl.classList.add('live');
  if (toastTimer) clearTimeout(toastTimer);
  if (ms) toastTimer = setTimeout(() => toastEl.classList.remove('live'), ms);
}
function announceWinner(r) {
  const display = (r.display || r.user);
  showToast(`<span class="winner">🏁 ${escapeHtml(display)} WINS</span><span class="small">type in chat to start a new race</span>`, 0);
}
function escapeHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function resetRace() {
  racers.clear();
  raceFinished = false;
  winner = null;
  toastEl.classList.remove('live');
  setStatus(twitchConnected ? '✅ live · #' + twitchChannel + ' (race reset)' : '💤 race reset', twitchConnected ? 'ok' : '');
  showHint();
}

const hintEl = document.getElementById('hint');
function hideHint() { hintEl.classList.add('hide'); }
function showHint() { hintEl.classList.remove('hide'); }

/* =========================================================
 * EVENT WIRING
 * ========================================================= */
document.getElementById('connectBtn').addEventListener('click', () => {
  if (twitchConnected || twitchWs) {
    twitchDisconnect();
    setStatus('💤 disconnected', '');
    document.getElementById('connectBtn').textContent = 'Connect';
  } else {
    const ch = (document.getElementById('channelInput').value || 'sloppy_ai').trim();
    twitchConnect(ch);
  }
});
document.getElementById('channelInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('connectBtn').click();
});
document.getElementById('lapsInput').addEventListener('change', (e) => {
  const v = Math.max(1, Math.min(50, parseInt(e.target.value, 10) || 5));
  e.target.value = v;
  lapsTarget = v;
});
document.getElementById('resetBtn').addEventListener('click', resetRace);
document.getElementById('demoBtn').addEventListener('click', toggleDemo);

/* =========================================================
 * BOOT
 * ========================================================= */
resize();
lapsTarget = parseInt(document.getElementById('lapsInput').value, 10) || 5;
requestAnimationFrame((t) => { prev = t; tick(t); });

// Auto-start demo so the track is never empty when a viewer first lands.
// Real Twitch chat takes over (and pauses the demo) the moment Connect succeeds.
window.addEventListener('load', () => {
  setTimeout(() => {
    if (racers.size === 0) startDemo();
  }, 600);
});
</script>
