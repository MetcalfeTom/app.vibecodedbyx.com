<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lunar Descent</title>
<link rel="icon" href="https://emojicdn.elk.sh/🌙">
<meta property="og:title" content="Lunar Descent">
<meta property="og:description" content="Land on the moon. Don't crash. Pixel art. Holographic physics.">
<meta property="og:url" content="https://app.sloppy.live/lunar-descent/">
<meta property="og:image" content="https://emojicdn.elk.sh/🌙?style=google">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#000;touch-action:none}
body{display:flex;align-items:center;justify-content:center;flex-direction:column}
canvas{image-rendering:pixelated;image-rendering:crisp-edges;display:block}
#hud{
position:fixed;top:0;left:0;right:0;
padding:8px 12px;
display:flex;justify-content:space-between;
font-family:'Share Tech Mono',monospace;
font-size:clamp(9px,2vw,12px);
color:#0ff;z-index:5;
pointer-events:none;
}
#hud .col{display:flex;flex-direction:column;gap:2px}
#hud .label{color:#066;font-size:0.8em;letter-spacing:2px}
#hud .val{text-shadow:0 0 8px rgba(0,255,255,0.5)}
.fuel-bar{width:80px;height:6px;background:#111;border:1px solid #066;position:relative;margin-top:2px}
.fuel-fill{height:100%;background:#0ff;transition:width 0.1s;box-shadow:0 0 6px #0ff}
#overlay{
position:fixed;inset:0;display:flex;flex-direction:column;
align-items:center;justify-content:center;z-index:10;
background:rgba(0,0,0,0.85);
}
#overlay.hidden{display:none}
#overlay h1{
font-family:'Press Start 2P',monospace;
font-size:clamp(18px,5vw,32px);
color:#0ff;text-shadow:0 0 20px #0ff,0 0 40px rgba(0,255,255,0.4);
letter-spacing:2px;margin-bottom:8px;
}
#overlay .sub{
font-family:'Share Tech Mono',monospace;
font-size:clamp(10px,2.5vw,14px);
color:#088;margin-bottom:20px;letter-spacing:3px;
}
#overlay button{
font-family:'Press Start 2P',monospace;
font-size:10px;padding:12px 24px;
background:transparent;border:2px solid #0ff;
color:#0ff;cursor:pointer;letter-spacing:2px;
text-shadow:0 0 8px #0ff;
animation:blink 1.2s ease infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.4}}
#overlay .hint{
font-family:'Share Tech Mono',monospace;
color:#444;font-size:8px;margin-top:16px;letter-spacing:1px;text-align:center;line-height:2;
}
#result{
position:fixed;inset:0;display:none;flex-direction:column;
align-items:center;justify-content:center;z-index:10;
background:rgba(0,0,0,0.85);
}
#result.show{display:flex}
#result h2{
font-family:'Press Start 2P',monospace;
font-size:clamp(14px,4vw,24px);
margin-bottom:6px;letter-spacing:2px;
}
#result .info{
font-family:'Share Tech Mono',monospace;
font-size:11px;color:#888;line-height:2.2;text-align:center;margin:8px 0 16px;
}
#result button{
font-family:'Press Start 2P',monospace;
font-size:9px;padding:10px 20px;
background:transparent;border:2px solid;
cursor:pointer;letter-spacing:2px;
}
.touch-controls{
position:fixed;bottom:12px;left:0;right:0;
display:none;justify-content:space-between;
padding:0 20px;z-index:5;
}
.t-btn{
width:70px;height:56px;
background:rgba(0,255,255,0.06);
border:1px solid rgba(0,255,255,0.2);
border-radius:8px;
color:#0ff;font-family:'Press Start 2P',monospace;
font-size:8px;cursor:pointer;
display:flex;align-items:center;justify-content:center;
}
.t-btn:active{background:rgba(0,255,255,0.15)}
.t-btn.thrust{
width:100px;height:70px;font-size:10px;
border-color:rgba(255,100,0,0.4);color:#f60;
background:rgba(255,100,0,0.06);
}
.t-btn.thrust:active{background:rgba(255,100,0,0.2)}
@media(pointer:coarse){.touch-controls{display:flex}}
.back-link{position:fixed;bottom:3px;right:8px;color:#222;font-size:7px;text-decoration:none;z-index:5;font-family:'Share Tech Mono',monospace}
</style>
</head>
<body>
<div id="overlay">
<h1>LUNAR DESCENT</h1>
<div class="sub">RETRO MOON LANDER</div>
<button onclick="startGame()">LAUNCH</button>
<div class="hint">ARROW KEYS / WASD TO THRUST<br>LAND GENTLY ON FLAT PADS<br>SPEED &lt; 2.0 TO SURVIVE</div>
</div>
<canvas id="c"></canvas>
<div id="hud">
<div class="col">
<div><span class="label">ALT </span><span class="val" id="h-alt">500</span>m</div>
<div><span class="label">VEL </span><span class="val" id="h-vx">0.0</span> / <span class="val" id="h-vy">0.0</span></div>
</div>
<div class="col" style="align-items:center">
<div><span class="label">LEVEL </span><span class="val" id="h-level">1</span></div>
<div><span class="label">SCORE </span><span class="val" id="h-score">0</span></div>
</div>
<div class="col" style="align-items:flex-end">
<div><span class="label">FUEL</span></div>
<div class="fuel-bar"><div class="fuel-fill" id="fuel-bar" style="width:100%"></div></div>
<div><span class="val" id="h-fuel">100</span>%</div>
</div>
</div>
<div id="result">
<h2 id="r-title"></h2>
<div class="info" id="r-info"></div>
<button id="r-btn" onclick="nextAction()">RETRY</button>
</div>
<div class="touch-controls">
<div class="t-btn" ontouchstart="tKey.l=true" ontouchend="tKey.l=false">◄</div>
<div class="t-btn thrust" ontouchstart="tKey.u=true" ontouchend="tKey.u=false">▲ THRUST</div>
<div class="t-btn" ontouchstart="tKey.r=true" ontouchend="tKey.r=false">►</div>
</div>
<a href="https://sloppy.live" class="back-link" target="_blank">sloppy.live</a>

<script>
const C=document.getElementById('c'),X=C.getContext('2d');
const NW=320,NH=240;
let scale,cw,ch;
let audioCtx;

function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}

// Sound effects
let thrustNode=null,thrustGain=null;
function startThrust(){
  if(thrustNode)return;initAudio();
  thrustNode=audioCtx.createOscillator();thrustGain=audioCtx.createGain();
  const f=audioCtx.createBiquadFilter();f.type='lowpass';f.frequency.value=400;
  thrustNode.type='sawtooth';thrustNode.frequency.value=60;
  thrustGain.gain.value=0.08;
  thrustNode.connect(f);f.connect(thrustGain);thrustGain.connect(audioCtx.destination);
  thrustNode.start();
  // Noise layer
  const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*2,audioCtx.sampleRate);
  const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
  const ns=audioCtx.createBufferSource();ns.buffer=buf;ns.loop=true;
  const ng=audioCtx.createGain();ng.gain.value=0.04;
  const nf=audioCtx.createBiquadFilter();nf.type='bandpass';nf.frequency.value=300;nf.Q.value=1;
  ns.connect(nf);nf.connect(ng);ng.connect(audioCtx.destination);ns.start();
  thrustNode._noise=ns;thrustNode._noiseGain=ng;
}
function stopThrust(){
  if(!thrustNode)return;
  thrustGain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.1);
  if(thrustNode._noiseGain)thrustNode._noiseGain.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.1);
  const n=thrustNode;setTimeout(()=>{try{n.stop();n._noise.stop()}catch(e){}},150);
  thrustNode=null;thrustGain=null;
}
function sfx(type){
  initAudio();const t=audioCtx.currentTime;
  if(type==='land'){
    [523,659,784,1047].forEach((f,i)=>{
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type='triangle';o.frequency.value=f;
      g.gain.setValueAtTime(0.08,t+i*0.12);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.12+0.3);
      o.connect(g);g.connect(audioCtx.destination);o.start(t+i*0.12);o.stop(t+i*0.12+0.3);
    });
  }else if(type==='crash'){
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.4,audioCtx.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.3));
    const s=audioCtx.createBufferSource();s.buffer=buf;
    const g=audioCtx.createGain();g.gain.value=0.25;
    s.connect(g);g.connect(audioCtx.destination);s.start(t);
    const o=audioCtx.createOscillator(),g2=audioCtx.createGain();
    o.type='sine';o.frequency.setValueAtTime(150,t);o.frequency.exponentialRampToValueAtTime(30,t+0.4);
    g2.gain.setValueAtTime(0.15,t);g2.gain.exponentialRampToValueAtTime(0.001,t+0.4);
    o.connect(g2);g2.connect(audioCtx.destination);o.start(t);o.stop(t+0.4);
  }else if(type==='beep'){
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='square';o.frequency.value=1200;
    g.gain.setValueAtTime(0.04,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.06);
    o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+0.06);
  }
}

function resize(){
  scale=Math.min(Math.floor(window.innerWidth/NW),Math.floor((window.innerHeight-20)/NH));
  scale=Math.max(scale,1);
  C.width=NW;C.height=NH;
  cw=NW*scale;ch=NH*scale;
  C.style.width=cw+'px';C.style.height=ch+'px';
}
window.addEventListener('resize',resize);

// Game state
let lander,terrain,pads,stars,particles,level,score,fuel,gameState,shake,holoPhase;
const GRAVITY=0.012;
const THRUST=0.035;
const SIDE_THRUST=0.02;
const MAX_LAND_SPEED=2.0;

function generateTerrain(lvl){
  terrain=[];pads=[];
  const segments=64;
  const segW=NW/segments*2; // terrain wider than screen
  // Heightmap with midpoint displacement
  const heights=new Float32Array(segments+1);
  heights[0]=100+Math.random()*40;
  heights[segments]=100+Math.random()*40;
  function subdivide(l,r,rough){
    if(r-l<2)return;
    const m=Math.floor((l+r)/2);
    heights[m]=(heights[l]+heights[r])/2+(Math.random()-0.5)*rough;
    heights[m]=Math.max(40,Math.min(160,heights[m]));
    subdivide(l,m,rough*0.6);
    subdivide(m,r,rough*0.6);
  }
  subdivide(0,segments,60+lvl*5);

  // Create landing pads (flat sections)
  const numPads=Math.max(1,3-Math.floor(lvl/3));
  const padWidth=Math.max(3,6-lvl);
  for(let p=0;p<numPads;p++){
    const pos=4+Math.floor(Math.random()*(segments-padWidth-8));
    const h=heights[pos];
    for(let i=0;i<=padWidth;i++)heights[pos+i]=h;
    pads.push({x:pos,w:padWidth,h});
  }

  for(let i=0;i<=segments;i++){
    terrain.push({x:i*segW-NW*0.5,y:NH-heights[i]});
  }

  // Stars
  stars=[];
  for(let i=0;i<80;i++){
    stars.push({
      x:Math.random()*NW*2-NW*0.5,
      y:Math.random()*(NH-80),
      size:Math.random()<0.3?2:1,
      blink:Math.random()*Math.PI*2,
      color:STAR_COLORS[Math.floor(Math.random()*STAR_COLORS.length)],
    });
  }
}

const STAR_COLORS=['#fff','#aaf','#ffa','#aff','#faf'];

function initLander(lvl){
  lander={
    x:NW/2,y:30,
    vx:(Math.random()-0.5)*0.5,vy:0,
    angle:0,thrusting:false,
    w:10,h:12,
  };
  fuel=100-lvl*5;
  fuel=Math.max(40,fuel);
  particles=[];
  shake={x:0,y:0,t:0};
  holoPhase=0;
}

const keys={};
const tKey={l:false,r:false,u:false};
document.addEventListener('keydown',e=>{
  keys[e.key.toLowerCase()]=true;
  if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key))e.preventDefault();
});
document.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);

function startGame(){
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('result').classList.remove('show');
  level=1;score=0;
  generateTerrain(level);
  initLander(level);
  gameState='playing';
  resize();
  loop();
}

function nextAction(){
  document.getElementById('result').classList.remove('show');
  if(gameState==='landed'){
    level++;
    generateTerrain(level);
    initLander(level);
    gameState='playing';
    loop();
  }else{
    startGame();
  }
}

// Camera
let camX=0;

function update(){
  if(gameState!=='playing')return;
  holoPhase+=0.03;

  const up=keys['w']||keys['arrowup']||keys[' ']||tKey.u;
  const lt=keys['a']||keys['arrowleft']||tKey.l;
  const rt=keys['d']||keys['arrowright']||tKey.r;

  // Gravity
  lander.vy+=GRAVITY;

  // Thrust
  lander.thrusting=false;
  if(up&&fuel>0){
    lander.vy-=THRUST;
    fuel-=0.15;
    lander.thrusting=true;
    // Exhaust particles
    for(let i=0;i<3;i++){
      particles.push({
        x:lander.x+(Math.random()-0.5)*4,
        y:lander.y+lander.h/2+2,
        vx:(Math.random()-0.5)*1.5,
        vy:1+Math.random()*2,
        life:10+Math.random()*10,
        color:Math.random()<0.5?'#f60':'#ff0',
        size:1+Math.random(),
      });
    }
    startThrust();
  }else{
    stopThrust();
  }

  if(lt){lander.vx-=SIDE_THRUST;if(fuel>0){fuel-=0.05}}
  if(rt){lander.vx+=SIDE_THRUST;if(fuel>0){fuel-=0.05}}

  fuel=Math.max(0,fuel);
  lander.x+=lander.vx;
  lander.y+=lander.vy;

  // Damping
  lander.vx*=0.998;

  // Camera follow
  camX+=(lander.x-NW/2-camX)*0.08;

  // Collision with terrain
  const landerBottom=lander.y+lander.h/2;
  const terrainY=getTerrainY(lander.x);

  if(landerBottom>=terrainY){
    stopThrust();
    const speed=Math.sqrt(lander.vx*lander.vx+lander.vy*lander.vy);
    const onPad=pads.some(p=>{
      const segW=NW/32;
      const px1=p.x*segW-NW*0.5;
      const px2=(p.x+p.w)*segW-NW*0.5;
      return lander.x>=px1&&lander.x<=px2;
    });

    if(speed<MAX_LAND_SPEED&&onPad&&Math.abs(lander.vx)<1.5){
      // Successful landing
      gameState='landed';
      lander.vy=0;lander.vx=0;
      lander.y=terrainY-lander.h/2;
      const bonus=Math.floor((MAX_LAND_SPEED-speed)*50)+Math.floor(fuel)*2;
      score+=100+bonus;
      sfx('land');
      setTimeout(()=>{
        const el=document.getElementById('result');
        document.getElementById('r-title').textContent='LANDING SUCCESSFUL';
        document.getElementById('r-title').style.color='#0f0';
        document.getElementById('r-title').style.textShadow='0 0 20px #0f0';
        document.getElementById('r-info').innerHTML=
          `SPEED: ${speed.toFixed(1)} m/s<br>FUEL: ${fuel.toFixed(0)}%<br>BONUS: +${bonus}<br>SCORE: ${score}`;
        const btn=document.getElementById('r-btn');
        btn.textContent='NEXT LEVEL';btn.style.borderColor='#0f0';btn.style.color='#0f0';
        el.classList.add('show');
      },600);
    }else{
      // Crash
      gameState='crashed';
      for(let i=0;i<40;i++){
        particles.push({
          x:lander.x+(Math.random()-0.5)*8,
          y:landerBottom+(Math.random()-0.5)*4,
          vx:(Math.random()-0.5)*4,vy:-Math.random()*3,
          life:20+Math.random()*20,
          color:['#f00','#f60','#ff0','#fff','#0ff'][Math.floor(Math.random()*5)],
          size:1+Math.random()*2,
        });
      }
      shake.t=15;
      sfx('crash');
      setTimeout(()=>{
        const el=document.getElementById('result');
        document.getElementById('r-title').textContent='CRASH';
        document.getElementById('r-title').style.color='#f00';
        document.getElementById('r-title').style.textShadow='0 0 20px #f00';
        let reason=!onPad?'MISSED THE PAD':'SPEED: '+speed.toFixed(1)+' m/s (MAX '+MAX_LAND_SPEED+')';
        document.getElementById('r-info').innerHTML=
          `${reason}<br>LEVEL: ${level}<br>FINAL SCORE: ${score}`;
        const btn=document.getElementById('r-btn');
        btn.textContent='RETRY';btn.style.borderColor='#f00';btn.style.color='#f00';
        el.classList.add('show');
      },1000);
    }
  }

  // Off-screen top/sides wrap
  if(lander.y<-20)lander.y=-20;

  // Update shake
  if(shake.t>0){shake.x=(Math.random()-0.5)*4;shake.y=(Math.random()-0.5)*4;shake.t--}
  else{shake.x=0;shake.y=0}

  // Update particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.03;p.life--;
    if(p.life<=0)particles.splice(i,1);
  }

  // Fuel warning beep
  if(fuel>0&&fuel<20&&Math.floor(fuel*10)%10===0)sfx('beep');
}

function getTerrainY(wx){
  // Find terrain height at world x
  for(let i=0;i<terrain.length-1;i++){
    if(wx>=terrain[i].x&&wx<terrain[i+1].x){
      const t=(wx-terrain[i].x)/(terrain[i+1].x-terrain[i].x);
      return terrain[i].y+(terrain[i+1].y-terrain[i].y)*t;
    }
  }
  return NH-60;
}

function draw(){
  X.fillStyle='#000';X.fillRect(0,0,NW,NH);

  X.save();
  X.translate(-Math.floor(camX-NW/2)+shake.x,shake.y);

  // Stars (parallax)
  for(const s of stars){
    const sx=s.x-camX*0.3;
    const a=0.5+0.5*Math.sin(s.blink+holoPhase*2);
    X.fillStyle=s.color;
    X.globalAlpha=a;
    X.fillRect(Math.floor(sx),Math.floor(s.y),s.size,s.size);
  }
  X.globalAlpha=1;

  // Earth in sky
  const earthX=NW*0.8-camX*0.1;
  X.beginPath();X.arc(earthX,30,14,0,Math.PI*2);
  X.fillStyle='#1144aa';X.fill();
  X.beginPath();X.arc(earthX-2,28,14,0,Math.PI*2);
  X.fillStyle='rgba(0,180,80,0.3)';X.fill();
  X.beginPath();X.arc(earthX,30,14,0,Math.PI*2);
  X.strokeStyle='rgba(0,255,255,0.15)';X.lineWidth=1;X.stroke();

  // Terrain with holographic effect
  X.beginPath();
  X.moveTo(terrain[0].x,NH);
  for(const t of terrain)X.lineTo(t.x,t.y);
  X.lineTo(terrain[terrain.length-1].x,NH);
  X.closePath();
  // Fill terrain
  const tGrad=X.createLinearGradient(0,NH-160,0,NH);
  tGrad.addColorStop(0,'#222');
  tGrad.addColorStop(0.5,'#181818');
  tGrad.addColorStop(1,'#111');
  X.fillStyle=tGrad;X.fill();

  // Terrain edge glow (holographic)
  X.beginPath();
  for(let i=0;i<terrain.length;i++){
    if(i===0)X.moveTo(terrain[i].x,terrain[i].y);
    else X.lineTo(terrain[i].x,terrain[i].y);
  }
  // Holographic shimmer
  const hue=(holoPhase*60)%360;
  X.strokeStyle=`hsl(${hue},100%,70%)`;
  X.shadowColor=`hsl(${hue},100%,50%)`;X.shadowBlur=8;
  X.lineWidth=1;X.stroke();
  X.shadowBlur=0;

  // Second holo layer offset
  X.beginPath();
  for(let i=0;i<terrain.length;i++){
    const off=Math.sin(holoPhase+i*0.5)*1.5;
    if(i===0)X.moveTo(terrain[i].x,terrain[i].y+off);
    else X.lineTo(terrain[i].x,terrain[i].y+off);
  }
  X.strokeStyle=`hsla(${(hue+120)%360},100%,60%,0.3)`;
  X.lineWidth=1;X.stroke();

  // Landing pads
  const segW=NW/32;
  for(const p of pads){
    const px=p.x*segW-NW*0.5;
    const pw=p.w*segW;
    const py=NH-p.h;
    // Pad markers
    X.fillStyle='#0ff';
    X.fillRect(px,py-1,pw,2);
    // Blinking arrows
    const blink=Math.sin(holoPhase*3)>0;
    if(blink){
      X.fillStyle='rgba(0,255,255,0.6)';
      const cx=px+pw/2;
      // Down arrows
      for(let a=-1;a<=1;a+=2){
        const ax=cx+a*12;
        X.fillRect(ax-1,py-14,2,8);
        X.fillRect(ax-2,py-8,4,2);
      }
    }
    // Pad glow
    X.fillStyle=`rgba(0,255,255,${0.02+0.02*Math.sin(holoPhase*2)})`;
    X.fillRect(px,py,pw,4);
  }

  // Particles
  for(const p of particles){
    X.fillStyle=p.color;
    X.globalAlpha=Math.min(1,p.life/10);
    X.fillRect(Math.floor(p.x),Math.floor(p.y),Math.ceil(p.size),Math.ceil(p.size));
  }
  X.globalAlpha=1;

  // Lander (pixel art)
  if(gameState!=='crashed'){
    drawLander(Math.floor(lander.x),Math.floor(lander.y));
  }

  // Holographic scan lines over everything
  X.restore();
  for(let y=0;y<NH;y+=3){
    X.fillStyle='rgba(0,0,0,0.08)';
    X.fillRect(0,y,NW,1);
  }
  // Holographic color fringe at edges
  const fringeA=0.03+0.02*Math.sin(holoPhase);
  X.fillStyle=`rgba(0,255,255,${fringeA})`;
  X.fillRect(0,0,NW,1);
  X.fillStyle=`rgba(255,0,255,${fringeA})`;
  X.fillRect(0,NH-1,NW,1);
}

function drawLander(cx,cy){
  const px=1; // 1:1 pixel
  // Body (silver/white)
  const bodyColor='#ccc';
  const legColor='#888';
  const windowColor='#0ff';

  // Legs
  X.fillStyle=legColor;
  X.fillRect(cx-5,cy+4,2,3);
  X.fillRect(cx+3,cy+4,2,3);
  X.fillRect(cx-6,cy+6,3,1);
  X.fillRect(cx+3,cy+6,3,1);

  // Body
  X.fillStyle=bodyColor;
  X.fillRect(cx-4,cy-2,8,6);
  X.fillRect(cx-3,cy-4,6,2);
  // Top dome
  X.fillRect(cx-2,cy-5,4,1);

  // Window with glow
  X.fillStyle=windowColor;
  X.shadowColor='#0ff';X.shadowBlur=4;
  X.fillRect(cx-1,cy-3,2,2);
  X.shadowBlur=0;

  // Antenna
  X.fillStyle='#aaa';
  X.fillRect(cx,cy-7,1,2);
  // Antenna tip blinks
  if(Math.sin(holoPhase*5)>0){
    X.fillStyle='#f00';X.fillRect(cx,cy-8,1,1);
  }

  // Thrust flame
  if(lander.thrusting){
    const flicker=Math.random();
    const fh=4+Math.floor(flicker*4);
    X.fillStyle='#ff0';
    X.fillRect(cx-1,cy+5,2,fh);
    X.fillStyle='#f60';
    X.fillRect(cx-2,cy+5,4,Math.floor(fh*0.6));
    X.fillStyle='#fff';
    X.fillRect(cx,cy+5,1,2);
  }

  // Holographic ghost effect
  X.globalAlpha=0.15;
  const off=Math.sin(holoPhase*2)*2;
  X.fillStyle='#0ff';
  X.fillRect(cx-4+off,cy-2,8,6);
  X.fillStyle='#f0f';
  X.fillRect(cx-4-off,cy-2,8,6);
  X.globalAlpha=1;
}

function updateHUD(){
  const alt=Math.max(0,getTerrainY(lander.x)-lander.y-lander.h/2);
  document.getElementById('h-alt').textContent=Math.floor(alt);
  document.getElementById('h-vx').textContent=lander.vx.toFixed(1);
  document.getElementById('h-vy').textContent=lander.vy.toFixed(1);
  document.getElementById('h-fuel').textContent=Math.floor(fuel);
  document.getElementById('h-level').textContent=level;
  document.getElementById('h-score').textContent=score;
  document.getElementById('fuel-bar').style.width=fuel+'%';
  // Color warnings
  const vyEl=document.getElementById('h-vy');
  vyEl.style.color=lander.vy>1.5?'#f00':lander.vy>1?'#ff0':'#0ff';
  document.getElementById('h-fuel').style.color=fuel<20?'#f00':fuel<40?'#ff0':'#0ff';
}

let lastT=0;
function loop(ts=0){
  const dt=ts-lastT;
  if(dt>=1000/60){
    lastT=ts;
    update();
    draw();
    if(gameState==='playing')updateHUD();
  }
  if(gameState==='playing'||particles.length>0)requestAnimationFrame(loop);
}
</script>
