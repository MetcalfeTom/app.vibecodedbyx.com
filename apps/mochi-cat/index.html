      ctx.strokeStyle = 'rgba(255,224,130,0.9)';
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.ellipse(0, headY - 76, 32, 10, 0, 0, Math.PI * 2);
      ctx.stroke();
      ctx.strokeStyle = 'rgba(255,255,255,0.7)';
      ctx.lineWidth = 2;
      ctx.stroke();
      // wings (small)
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.strokeStyle = 'rgba(255,200,240,0.8)';
      ctx.lineWidth = 1.5;
      [-1, 1].forEach(dir => {
        ctx.beginPath();
        ctx.moveTo(dir * 56, headY + 14);
        ctx.quadraticCurveTo(dir * 80, headY - 10, dir * 92, headY + 6);
        ctx.quadraticCurveTo(dir * 78, headY + 16, dir * 56, headY + 14);
        ctx.fill(); ctx.stroke();
      });
    }
    if (lifetime >= 10000000) {
      // cosmic aura — 3 ring orbiting
      ctx.strokeStyle = 'rgba(127,255,212,0.45)';
      ctx.lineWidth = 2;
      [0, 1, 2].forEach(i => {
        const r = 78 + Math.sin(cat.age * 2 + i * 1.5) * 4;
        ctx.beginPath();
        ctx.ellipse(0, 0, r, r * 0.55, cat.age * 0.4 + i * 1.0, 0, Math.PI * 2);
        ctx.stroke();
      });
    }

    ctx.restore();

    // ===== BAT PAW SWIPE =====
    // Drawn in canvas coords (after restore) so the paw can extend outside
    // the cat-local transform region. Fires when cat.batT > 0.05; reach
    // peaks at batT=0.5 (sin(π·0.5)=1) and returns to 0 at the end of the
    // animation. The paw points along cat.batAngle toward the cursor that
    // triggered the bat.
    if (cat.batT > 0.05) {
      const cx0 = cx + cat.followX;
      const cy0 = cy + cat.followY - 10;
      const reach = 56 * Math.sin((1 - cat.batT) * Math.PI);
      const px = cx0 + Math.cos(cat.batAngle) * reach;
      const py = cy0 + Math.sin(cat.batAngle) * reach;
      // motion arcs (3 fading curves trailing the paw)
      ctx.strokeStyle = 'rgba(255,255,255,0.55)';
      ctx.lineWidth = 2.5;
      for (let i = 0; i < 3; i++) {
        const r = 14 + i * 7;
        ctx.globalAlpha = (0.6 - i * 0.18) * cat.batT;
        ctx.beginPath();
        ctx.arc(cx0 + Math.cos(cat.batAngle) * 22, cy0 + Math.sin(cat.batAngle) * 22, r,
                cat.batAngle - 0.5, cat.batAngle + 0.5);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      // paw pad
      ctx.fillStyle = NES.candy;
      ctx.strokeStyle = NES.ink;
      ctx.lineWidth = 2.2;
      ctx.beginPath();
      ctx.arc(px, py, 11, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      // pink toe beans (3)
      ctx.fillStyle = NES.pink;
      const beanAng = cat.batAngle + Math.PI;   // beans point inward (back toward cat)
      for (let i = -1; i <= 1; i++) {
        const a = beanAng + i * 0.4;
        ctx.beginPath();
        ctx.arc(px + Math.cos(a) * 6, py + Math.sin(a) * 6, 1.6, 0, Math.PI * 2);
        ctx.fill();
      }
      // central bigger bean
      ctx.beginPath();
      ctx.arc(px + Math.cos(beanAng) * 3, py + Math.sin(beanAng) * 3, 2.2, 0, Math.PI * 2);
      ctx.fill();
    }

    // ===== MEGA UWU MODE OVERLAY (draws into canvas) =====
    if (performance.now() < state.megaUwuUntil) {
      const remaining = (state.megaUwuUntil - performance.now()) / 1000;
      ctx.save();
      // Strict NES — flat gold flash instead of a radial gradient.
      // The CRT scanlines + globalAlpha pulse keep the throbbing feel.
      ctx.globalAlpha = 0.16 + Math.sin(now * 0.012) * 0.10;
      ctx.fillStyle = NES.gold;
      ctx.fillRect(0, 0, sz, sz);
      ctx.restore();
      // remaining ring
      ctx.save();
      ctx.strokeStyle = NES.gold;
      ctx.lineWidth = 5;
      ctx.beginPath();
      const ang = (1 - remaining / 8) * Math.PI * 2;
      ctx.arc(cx, sz - 20, 14, -Math.PI / 2, -Math.PI / 2 + ang);
      ctx.stroke();
      ctx.fillStyle = NES.gold;
      ctx.font = 'bold 11px DotGothic16, monospace';
      ctx.textAlign = 'center';
      ctx.fillText('MEGA UWU ' + remaining.toFixed(1) + 's', cx, sz - 32);
      ctx.restore();
    }
  }

  // ===== UI BUILD =====
  const upgradeListEl = document.getElementById('upgradeList');
  function buildUpgrades() {
    upgradeListEl.innerHTML = '';
    for (const u of UPGRADES) {
      const lvl = state.upgrades[u.k].lvl;
      const cost = costOf(u);
      const maxed = lvl >= u.max;
      const can = state.pets >= cost;
      const row = document.createElement('div');
      row.className = 'upgrade' + (maxed ? ' maxed' : (can ? ' affordable' : ''));
      row.innerHTML = `
        <div class="em">${u.em}</div>
        <div class="nm">${u.nm}<small>${u.desc}</small></div>
        <div class="right">
          <div class="lvl ${maxed ? 'maxed' : ''}">${maxed ? 'MAX' : 'L' + lvl}</div>
          <div class="cost">${maxed ? '✓' : fmt(cost) + ' ♡'}</div>
        </div>
      `;
      if (!maxed) row.addEventListener('click', () => buyUpgrade(u));
      upgradeListEl.appendChild(row);
    }
  }
  function buyUpgrade(u) {
    if (state.upgrades[u.k].lvl >= u.max) return;
    const cost = costOf(u);
    if (state.pets < cost) { sfx.err(); toast('not enough ♡'); return; }
    state.pets -= cost;
    state.upgrades[u.k].lvl++;
    sfx.buy();
    save();
    buildUpgrades();
    renderHUD();
  }
  function fmt(n) {
    if (!isFinite(n)) return '∞';
    n = Math.floor(n);
    if (n < 1000) return String(n);
    if (n < 1e6) return (n / 1000).toFixed(2) + 'k';
    if (n < 1e9) return (n / 1e6).toFixed(2) + 'M';
    if (n < 1e12) return (n / 1e9).toFixed(2) + 'B';
    return (n / 1e12).toFixed(2) + 'T';
  }

  // ===== HUD =====
  let lastPetDisplay = -1;
  let bumpT = 0;
  function renderHUD() {
    const pc = document.getElementById('petCount');
    pc.textContent = fmt(state.pets);
    if (Math.floor(state.pets) !== lastPetDisplay) {
      pc.classList.remove('bump'); void pc.offsetWidth; pc.classList.add('bump');
      clearTimeout(bumpT);
      bumpT = setTimeout(() => pc.classList.remove('bump'), 140);
    }
    lastPetDisplay = Math.floor(state.pets);
    document.getElementById('lifetimeCount').textContent = fmt(state.lifetime);
    document.getElementById('rateLine').textContent =
      `+${fmt(clickValue())} ♡/click · ${fmt(cps())}/sec idle`;
    const stage = evoStage();
    document.getElementById('evoStageName').textContent = stage.name;
    document.getElementById('evoLabel').textContent = stage.name;
  }

  // ===== CLICK / PET =====
  const stage = document.getElementById('catStage');
  function spawnReact(text, x, y, kind) {
    const f = document.createElement('div');
    f.className = 'float-react ' + (kind || '');
    f.textContent = text;
    f.style.left = x + 'px';
    f.style.top = y + 'px';
    stage.appendChild(f);
    setTimeout(() => f.remove(), 1200);
  }
  function spawnRipple(x, y) {
    const r = document.createElement('div');
    r.className = 'ripple';
    r.style.left = x + 'px';
    r.style.top = y + 'px';
    r.style.width = '40px';
    r.style.height = '40px';
    stage.appendChild(r);
    setTimeout(() => r.remove(), 850);
  }
  // ===== INTERACTION CORE =====
  // applyPet() is the single position-driven reward path used by both the
  // legacy click handler AND the cursor-chase bat triggers. Each call
  // credits one pet (≡ click value), animates the right cat, fires sfx,
  // spawns floating reactions at the given stage coords. The "Null" name
  // refers to the kitty herself (chat-given). Mouse-over batting is the
  // primary input now; clicks still work as a fallback for touch devices.
  function applyPet(stageX, stageY, target) {
    const v = clickValue();
    state.pets += v;
    state.lifetime += v;
    state.clicks++;

    // animate the appropriate cat
    if (target === 'room') {
      const rc = room.cat;
      rc.mouthOpen = 1;
      rc.blush = Math.min(1, rc.blush + 0.55);
      rc.happyT = Math.max(rc.happyT, 0.45);
    } else {
      cat.bounce = 1;
      cat.blush = Math.min(1, cat.blush + 0.5);
      cat.mouthOpen = 1;
      cat.happyT = 0.42;
    }

    // mega uwu charges — every 50 successful interactions earns a charge,
    // capped at 5; each charge arms an 8s 5× burst on the NEXT interaction.
    const now = performance.now();
    const wasMega = now < state.megaUwuUntil;
    if (state.clicks % 50 === 0 && !wasMega) state.megaUwuCharges = Math.min(5, state.megaUwuCharges + 1);
    if (state.megaUwuCharges > 0 && !wasMega) {
      state.megaUwuCharges--;
      state.megaUwuUntil = now + 8000;
      sfx.mega();
      const banner = document.createElement('div');
      banner.className = 'mega-banner';
      banner.textContent = 'MEGA UWU ✨';
      document.body.appendChild(banner);
      setTimeout(() => banner.remove(), 1700);
    }

    // visual reactions in stage coords
    spawnRipple(stageX, stageY);
    const reactWords = ['nya~', 'uwu', '♡', 'mrrr', 'purr', '✨'];
    const text = wasMega ? '+' + fmt(v) + ' ♡✨' : '+' + fmt(v) + ' ♡';
    const kind = wasMega ? 'crit' : (Math.random() < 0.25 ? 'heart' : '');
    spawnReact(text, stageX, stageY, kind);
    if (Math.random() < 0.4) {
      const w = reactWords[Math.floor(Math.random() * reactWords.length)];
      setTimeout(() => spawnReact(w, stageX + (Math.random() - 0.5) * 30, stageY - 20, 'heart'), 80);
    }

    // hide hint after first interaction
    const hint = document.getElementById('clickHint');
    if (hint) hint.style.display = 'none';

    if (wasMega) sfx.crit();
    else sfx.pet();

    if (state.clicks % 5 === 0) buildUpgrades();
    renderHUD();
    if (state.clicks % 12 === 0) save();
  }

  // Click handler — converts an event to stage coords then calls applyPet.
  // Mouse-over batting is the new primary input; this stays as a fallback
  // for touch devices where there's no hover.
  function petCat(e) {
    const rect = stage.getBoundingClientRect();
    const x = (e ? e.clientX - rect.left : rect.width / 2);
    const y = (e ? e.clientY - rect.top  : rect.height / 2);
    applyPet(x, y, state.viewMode === 'room' ? 'room' : 'pet');
  }
  // ===== PET-VIEW CURSOR TRACKING =====
  // Mouse-over is now the primary input — Null lerps her body toward the
  // cursor (clamped to a small region around canvas center so she can't
  // run off-screen) and bats at it when within range. Click still works
  // as a fallback for touch devices and for players who prefer tapping.
  cat.canvas.addEventListener('mousemove', (e) => {
    const rect = cat.canvas.getBoundingClientRect();
    cat.cursor = {
      x: (e.clientX - rect.left) * (cat.size / rect.width),
      y: (e.clientY - rect.top)  * (cat.size / rect.height),
    };
  });
  cat.canvas.addEventListener('mouseleave', () => { cat.cursor = null; });
  cat.canvas.addEventListener('click', petCat);
  cat.canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const t = e.changedTouches[0];
    // touch sets cursor + acts as a tap
    const rect = cat.canvas.getBoundingClientRect();
    cat.cursor = {
      x: (t.clientX - rect.left) * (cat.size / rect.width),
      y: (t.clientY - rect.top)  * (cat.size / rect.height),
    };
    petCat({ clientX: t.clientX, clientY: t.clientY });
  }, { passive: false });
  cat.canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const t = e.changedTouches[0];
    const rect = cat.canvas.getBoundingClientRect();
    cat.cursor = {
      x: (t.clientX - rect.left) * (cat.size / rect.width),
      y: (t.clientY - rect.top)  * (cat.size / rect.height),
    };
  }, { passive: false });
  cat.canvas.addEventListener('touchend', () => { cat.cursor = null; });

  // Room view — clicking is OPTIONAL but still rewarded if the player taps
  // the kitty. Only the cat sprite area triggers a pet so the player can
  // also click empty room space without earning anything (which would feel
  // weird). We hit-test against the live roomCat position.
  function roomCatHitTest(localX, localY) {
    const rc = room.cat;
    // Convert click in display coords → world (W=480, H=340) coords
    const wx = (localX / room.dispW) * room.w;
    const wy = (localY / room.dispH) * room.h;
    return Math.hypot(wx - rc.x, wy - (rc.y - 30)) < 50;
  }
  function roomClickHandler(e, touch) {
    const rect = room.canvas.getBoundingClientRect();
    const lx = (touch ? touch.clientX : e.clientX) - rect.left;
    const ly = (touch ? touch.clientY : e.clientY) - rect.top;
    if (roomCatHitTest(lx, ly)) {
      // bonus tap — react in room
      const rc = room.cat;
      rc.mouthOpen = 1;
      rc.blush = 1;
      rc.happyT = Math.max(rc.happyT, 0.6);
      // synthesize a petCat call but anchor float text in the cat-stage
      // so the floating reactions appear over the room canvas
      petCat({ clientX: rect.left + lx, clientY: rect.top + ly });
      // extra hearts at click point
      spawnRoomHeart(rc.x, rc.y - 30);
      spawnRoomHeart(rc.x + 10, rc.y - 24);
    }
  }
  room.canvas.addEventListener('click', (e) => roomClickHandler(e, null));
  room.canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    roomClickHandler(null, e.changedTouches[0]);
  }, { passive: false });

  // Room cursor tracking — Null abandons wander AI and chases the cursor
  // when present, batting when close. Cursor is stored in world coords
  // (0..480, 0..340).
  room.canvas.addEventListener('mousemove', (e) => {
    const rect = room.canvas.getBoundingClientRect();
    room.cursor = {
      x: (e.clientX - rect.left) * (room.w / rect.width),
      y: (e.clientY - rect.top)  * (room.h / rect.height),
    };
  });
  room.canvas.addEventListener('mouseleave', () => { room.cursor = null; });
  room.canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const t = e.changedTouches[0];
    const rect = room.canvas.getBoundingClientRect();
    room.cursor = {
      x: (t.clientX - rect.left) * (room.w / rect.width),
      y: (t.clientY - rect.top)  * (room.h / rect.height),
    };
  }, { passive: false });
  room.canvas.addEventListener('touchend', () => { room.cursor = null; });

  // ===== PASSIVE TICK =====
  // Renders whichever view is active. cps() credit is unconditional — the
  // room view explicitly says "clicking optional" so passive love must
  // accrue identically regardless of which canvas the player is watching.
  function passiveTick() {
    const now = performance.now();
    const dt = Math.min(0.5, (now - lastTickT) / 1000);
    lastTickT = now;
    const earned = cps() * dt;
    if (earned > 0) {
      state.pets    += earned;
      state.lifetime += earned;
    }
    renderHUD();
    if (state.viewMode === 'room') drawRoom(now);
    else                            drawCat(now);
    requestAnimationFrame(passiveTick);
  }
  requestAnimationFrame(passiveTick);

  // periodic save (every 10s) so passive idle doesn't lose progress on close
  setInterval(() => { save(); buildUpgrades(); }, 10000);

  // ===== TOAST =====
  let toastT;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastT);
    toastT = setTimeout(() => el.classList.remove('show'), 1700);
  }

  // ===== CONTROLS =====
  document.getElementById('muteBtn').addEventListener('click', (e) => {
    state.muted = !state.muted;
    e.target.textContent = state.muted ? '♪ off' : '♪ on';
    save();
  });
  document.getElementById('musicBtn').addEventListener('click', (e) => {
    // ♫ is independent of ♪ (which only mutes sfx). Browser autoplay policy
    // requires this click as the audio gesture — ctx() resumes inside lofiStart().
    if (lofi.on) { lofiStop(); e.target.textContent = '♫ off'; }
    else         { lofiStart(); e.target.textContent = '♫ on'; }
  });
  document.getElementById('resetBtn').addEventListener('click', () => {
    if (!confirm('reset all progress? this can\'t be undone uwu')) return;
    localStorage.removeItem(STATE_KEY);
    location.reload();
  });
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); petCat(); }
  });

  // ===== VIEW + PIXEL TOGGLES =====
  // Two orthogonal display switches:
  //   - viewMode: 'pet' (click-stage) | 'room' (passive bedroom scene)
  //   - pixel: bool — drops canvas internal res so CSS upscales blocky
  // Both persist to localStorage and re-apply on reload.
  function applyViewMode() {
    document.body.classList.toggle('view-pet',  state.viewMode === 'pet');
    document.body.classList.toggle('view-room', state.viewMode === 'room');
    document.getElementById('viewPetBtn') .classList.toggle('on', state.viewMode === 'pet');
    document.getElementById('viewRoomBtn').classList.toggle('on', state.viewMode === 'room');
    // hint only matters in pet view
    const hint = document.getElementById('clickHint');
    if (hint) hint.textContent = state.clicks === 0 ? 'wave near null uwu' : '';
  }
  function applyPixel() {
    document.body.classList.toggle('pixel-on', state.pixel);
    document.getElementById('pixelBtn').classList.toggle('on', state.pixel);
    document.getElementById('pixelBtn').textContent = state.pixel ? '🟪 pixel · on' : '🟪 pixel';
    setupCat(); setupRoom();
  }
  document.getElementById('viewPetBtn').addEventListener('click', () => {
    state.viewMode = 'pet'; applyViewMode(); save();
  });
  document.getElementById('viewRoomBtn').addEventListener('click', () => {
    state.viewMode = 'room'; applyViewMode(); save();
    // hide click hint forever once user enters room mode
    const hint = document.getElementById('clickHint');
    if (hint) hint.style.display = 'none';
  });
  document.getElementById('pixelBtn').addEventListener('click', () => {
    state.pixel = !state.pixel; applyPixel(); save();
  });

  // ===== INIT =====
  buildUpgrades();
  renderHUD();
  document.getElementById('muteBtn').textContent = state.muted ? '♪ off' : '♪ on';
  applyViewMode();
  applyPixel();
})();
</script>
</body>
</html>
