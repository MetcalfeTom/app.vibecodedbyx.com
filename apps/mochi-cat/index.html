<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Mochi Cat · uwu clicker</title>
<meta name="description" content="Click the kawaii cat. Earn pets. Buy yarn balls. Become the princess of all neko." />
<meta property="og:title" content="Mochi Cat · uwu clicker" />
<meta property="og:description" content="Click the kawaii cat. Earn pets. Buy yarn balls. Become the princess of all neko." />
<meta property="og:url" content="https://sloppy.live/mochi-cat/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/kawaii%20chibi%20pink%20cat%20with%20bow%20and%20sparkles%2C%20pink%20neon%20glow%2C%20uwu%20expression%2C%20clicker%20game%2C%201200x630?width=1200&height=630&nofeed=true&format=png" />
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%90%B1" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=Fredoka:wght@500;600;700&family=Zen+Maru+Gothic:wght@500;700;900&family=DotGothic16&display=swap" rel="stylesheet">
<style>
:root{
  --bg-deep:#1d0030;
  --bg-mid:#3a0858;
  --bg-pink:#5d0d68;
  --neon-pink:#ff5fbf;
  --hot-pink:#ff85d0;
  --bubble:#ffb5e2;
  --candy:#fff0f7;
  --ink:#3a0a3f;
  --gold:#ffe082;
  --mint:#7fffd4;
  --shadow:rgba(255,95,191,0.35);
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overscroll-behavior:none}
body{
  font-family:'Zen Maru Gothic', system-ui, sans-serif;
  color:var(--candy);
  background:
    radial-gradient(ellipse at 18% 12%, rgba(255,133,208,0.32), transparent 55%),
    radial-gradient(ellipse at 82% 88%, rgba(127,255,212,0.18), transparent 55%),
    linear-gradient(165deg, var(--bg-deep) 0%, var(--bg-mid) 45%, var(--bg-pink) 100%);
  min-height:100vh;
  overflow-x:hidden;
  position:relative;
}
/* drifting sparkle layer */
body::before, body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:
    radial-gradient(circle at 12% 22%, rgba(255,255,255,0.55) 0.8px, transparent 1.5px),
    radial-gradient(circle at 38% 70%, rgba(255,200,240,0.6) 0.7px, transparent 1.4px),
    radial-gradient(circle at 70% 14%, rgba(255,255,255,0.5) 0.9px, transparent 1.5px),
    radial-gradient(circle at 88% 60%, rgba(255,200,240,0.55) 0.7px, transparent 1.4px),
    radial-gradient(circle at 22% 52%, rgba(255,255,255,0.4) 0.6px, transparent 1.2px),
    radial-gradient(circle at 56% 36%, rgba(255,200,240,0.5) 0.8px, transparent 1.4px),
    radial-gradient(circle at 82% 30%, rgba(255,255,255,0.5) 0.7px, transparent 1.3px);
  background-size:480px 320px;
  animation:sparkleDrift 50s linear infinite;
}
body::after{
  background-size:680px 460px;opacity:0.55;
  animation-duration:90s;animation-direction:reverse;
}
@keyframes sparkleDrift{
  from{ transform: translateY(0); }
  to  { transform: translateY(-320px); }
}

/* layout */
.stage{
  position:relative;z-index:1;
  display:grid;grid-template-columns:1fr 320px;
  gap:18px;padding:18px;max-width:1180px;margin:0 auto;min-height:100vh;
}
@media (max-width:880px){
  .stage{grid-template-columns:1fr;padding:12px;gap:12px}
}

/* header */
.head{
  grid-column:1/-1;display:flex;align-items:center;justify-content:space-between;
  flex-wrap:wrap;gap:10px;
}
.brand{
  font-family:'Bagel Fat One', cursive;
  font-size:clamp(40px, 7vw, 76px);
  letter-spacing:0.02em;line-height:1;color:var(--candy);
  text-shadow:
    0 0 22px rgba(255,95,191,0.75),
    0 0 44px rgba(255,95,191,0.45),
    3px 3px 0 var(--neon-pink),
    -1px -1px 0 var(--hot-pink);
  transform:rotate(-2deg);
}
.brand small{
  display:block;font-family:'Fredoka', sans-serif;font-weight:600;
  font-size:0.18em;letter-spacing:0.4em;color:var(--bubble);
  text-shadow:0 0 8px rgba(255,133,208,0.6);text-transform:uppercase;
  margin-top:8px;transform:rotate(2deg);
}
.hud-pill{
  display:flex;align-items:center;gap:6px;padding:8px 16px;
  background:rgba(255,255,255,0.08);border:2px solid var(--hot-pink);
  border-radius:999px;font-family:'Zen Maru Gothic', sans-serif;font-weight:700;
  color:var(--candy);font-size:14px;letter-spacing:0.06em;
  box-shadow:0 0 18px rgba(255,95,191,0.35), inset 0 0 12px rgba(255,255,255,0.06);
  backdrop-filter:blur(6px);text-transform:uppercase;
}
.hud-pill .em{font-size:18px}

/* main */
.main{
  position:relative;
  display:flex;flex-direction:column;align-items:center;
  background:rgba(20,2,42,0.42);
  border:2px solid rgba(255,133,208,0.5);
  border-radius:28px;
  padding:18px;
  box-shadow:
    0 0 40px rgba(255,95,191,0.30),
    inset 0 0 60px rgba(255,133,208,0.06);
  backdrop-filter:blur(8px);
  min-height:520px;
  overflow:hidden;
}

/* hearts counter */
.score-box{
  display:flex;flex-direction:column;align-items:center;gap:2px;
  margin-bottom:8px;
}
.score-box .count{
  font-family:'Bagel Fat One', cursive;
  font-size:clamp(38px, 7vw, 64px);
  color:var(--candy);
  text-shadow:
    0 0 18px var(--neon-pink),
    0 0 36px rgba(255,95,191,0.6),
    2px 3px 0 rgba(58,10,63,0.7);
  line-height:1;letter-spacing:0.02em;
  transition:transform 0.12s ease;
}
.score-box .count.bump{transform:scale(1.08)}
.score-box .label{
  font-family:'Fredoka', sans-serif;font-weight:600;
  font-size:11px;letter-spacing:0.5em;color:var(--bubble);
  text-transform:uppercase;text-shadow:0 0 6px rgba(255,133,208,0.5);
}
.score-box .rate{
  font-family:'DotGothic16', monospace;
  font-size:13px;color:rgba(255,200,240,0.85);
  letter-spacing:0.08em;margin-top:2px;
}

/* cat stage */
.cat-stage{
  position:relative;
  width:100%;flex:1;
  display:flex;align-items:center;justify-content:center;
  min-height:380px;
}
#catCanvas, #roomCanvas{
  cursor:pointer;
  filter:drop-shadow(0 0 24px rgba(255,95,191,0.35)) drop-shadow(0 6px 0 rgba(58,10,63,0.4));
  user-select:none;-webkit-user-select:none;
  touch-action:manipulation;
}
#roomCanvas{
  display:none;
  border-radius:14px;
  border:3px solid rgba(255,133,208,0.4);
  box-shadow:0 0 20px rgba(255,95,191,0.3), inset 0 0 30px rgba(255,133,208,0.05);
}
/* pixel-art mode — both canvases render at low res and CSS scales up
   blocky. Backgrounds (gradients, sparkles) stay smooth — only the canvas
   sprites get the retro chunky look so the room/cat read as pixel art
   sitting in a softly glowing neon space rather than the whole page being
   pixelated. */
body.pixel-on #catCanvas,
body.pixel-on #roomCanvas{
  image-rendering: pixelated;
  image-rendering: -moz-crisp-edges;
  image-rendering: crisp-edges;
}
/* CRT scanlines — strict 8-bit aesthetic per chat. Soft horizontal dark
   bands at every other pixel row (display-px scale) over the cat-stage
   only, NOT the whole page (would clash with HUD typography). Multiply
   blend so the underlying NES-palette colors stay punchy. */
.cat-stage::after{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:4;
  background:
    repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0.30) 0px,
      rgba(0,0,0,0.30) 1.5px,
      transparent 1.5px,
      transparent 3px
    );
  mix-blend-mode:multiply;
  opacity:0.55;
  border-radius:14px;
}
/* Subtle CRT bulge vignette around the canvas edge */
.cat-stage::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:5;
  background:
    radial-gradient(ellipse at center,
      transparent 55%,
      rgba(0,0,0,0.45) 100%);
  border-radius:14px;
}
/* view-mode swap — only one canvas visible at a time */
body.view-room #catCanvas,
body.view-room .floor,
body.view-room .click-hint{ display:none }
body.view-room #roomCanvas{ display:block }
body.view-pet  #roomCanvas{ display:none }
.cat-stage .floor{
  position:absolute;bottom:14%;left:50%;transform:translateX(-50%);
  width:140px;height:18px;border-radius:50%;
  background:radial-gradient(ellipse, rgba(255,95,191,0.5), transparent 75%);
  filter:blur(2px);pointer-events:none;
}
/* view-toggle pill row above the cat-stage */
.view-toggle{
  display:flex;gap:6px;justify-content:center;margin:0 0 10px;flex-wrap:wrap;
}
.view-toggle button{
  background:rgba(255,255,255,0.06);
  border:2px solid rgba(255,133,208,0.3);
  color:var(--bubble);
  font-family:'Fredoka', sans-serif;font-weight:600;font-size:11px;
  letter-spacing:0.18em;padding:5px 14px;border-radius:999px;
  cursor:pointer;text-transform:uppercase;transition:all 0.14s;
}
.view-toggle button:hover{
  background:rgba(255,133,208,0.18);color:var(--candy);
  border-color:var(--hot-pink);
}
.view-toggle button.on{
  background:rgba(255,133,208,0.28);
  border-color:var(--hot-pink);
  color:var(--candy);
  box-shadow:0 0 10px rgba(255,95,191,0.5);
  text-shadow:0 0 8px rgba(255,255,255,0.4);
}
.cat-stage .stage-name{
  position:absolute;top:6px;left:50%;transform:translateX(-50%);
  font-family:'DotGothic16', monospace;font-size:11px;letter-spacing:0.32em;
  color:rgba(255,200,240,0.6);text-transform:uppercase;
  pointer-events:none;
}
.cat-stage .click-hint{
  position:absolute;bottom:8px;left:50%;transform:translateX(-50%);
  font-family:'Fredoka', sans-serif;font-weight:600;
  font-size:13px;letter-spacing:0.18em;color:var(--bubble);
  text-transform:uppercase;opacity:0.85;pointer-events:none;
  text-shadow:0 0 10px rgba(255,133,208,0.6);
  animation:hintPulse 1.6s ease-in-out infinite;
}
@keyframes hintPulse{
  0%,100%{opacity:0.4}
  50%{opacity:0.9}
}

/* floating reactions */
.float-react{
  position:absolute;pointer-events:none;
  font-family:'Bagel Fat One', cursive;
  font-size:22px;color:var(--candy);
  text-shadow:0 0 12px var(--neon-pink), 0 0 20px rgba(255,95,191,0.7);
  animation:floatUp 1.2s ease-out forwards;z-index:5;
}
.float-react.heart{color:#ffd1e8;font-size:28px}
.float-react.crit{font-size:32px;color:var(--gold);text-shadow:0 0 14px #ffe082, 0 0 28px rgba(255,224,130,0.7)}
@keyframes floatUp{
  0%   {opacity:0;transform:translate(-50%, 0) scale(0.6) rotate(-6deg)}
  18%  {opacity:1;transform:translate(-50%, -16px) scale(1.1) rotate(-3deg)}
  100% {opacity:0;transform:translate(-50%, -110px) scale(0.95) rotate(8deg)}
}

/* ripple */
.ripple{
  position:absolute;border-radius:50%;
  border:3px solid var(--hot-pink);
  pointer-events:none;
  animation:ripple 0.8s ease-out forwards;z-index:3;
}
@keyframes ripple{
  0%   {opacity:0.9;transform:translate(-50%,-50%) scale(0.2)}
  100% {opacity:0;transform:translate(-50%,-50%) scale(2.6)}
}

/* upgrades panel */
.panel{
  background:rgba(20,2,42,0.55);
  border:2px solid rgba(255,133,208,0.5);
  border-radius:24px;
  padding:14px 12px;
  box-shadow:
    0 0 30px rgba(255,95,191,0.22),
    inset 0 0 40px rgba(255,133,208,0.05);
  backdrop-filter:blur(6px);
  display:flex;flex-direction:column;gap:10px;
  max-height:calc(100vh - 36px);overflow:hidden;
}
.panel h3{
  font-family:'Bagel Fat One', cursive;
  font-size:22px;color:var(--candy);text-align:center;
  letter-spacing:0.08em;
  text-shadow:0 0 12px var(--neon-pink), 2px 2px 0 var(--hot-pink);
  padding:6px 0 4px;
}
.panel h3 small{
  display:block;font-family:'Fredoka', sans-serif;font-weight:600;
  font-size:9px;letter-spacing:0.42em;color:var(--bubble);
  text-shadow:none;text-transform:uppercase;margin-top:4px;
}
.upgrade-list{
  display:flex;flex-direction:column;gap:8px;
  overflow-y:auto;padding-right:4px;flex:1;
}
.upgrade{
  display:grid;grid-template-columns:34px 1fr auto;align-items:center;
  gap:8px;padding:10px;border-radius:14px;cursor:pointer;
  background:rgba(255,255,255,0.04);
  border:2px solid rgba(255,133,208,0.25);
  transition:all 0.16s ease;
  position:relative;
}
.upgrade:hover{transform:translateY(-1px)}
.upgrade.affordable{
  border-color:var(--hot-pink);
  background:rgba(255,133,208,0.10);
  box-shadow:0 0 14px rgba(255,95,191,0.4), inset 0 0 14px rgba(255,255,255,0.05);
}
.upgrade.affordable:hover{
  background:rgba(255,133,208,0.18);
  box-shadow:0 0 22px rgba(255,95,191,0.6), inset 0 0 14px rgba(255,255,255,0.08);
}
.upgrade.maxed{
  border-color:var(--mint);opacity:0.85;cursor:default;
  background:rgba(127,255,212,0.06);
}
.upgrade .em{
  font-size:24px;text-align:center;line-height:1;
  filter:drop-shadow(0 0 6px rgba(255,200,240,0.5));
}
.upgrade .nm{
  font-family:'Bagel Fat One', cursive;font-size:14px;
  letter-spacing:0.04em;color:var(--candy);line-height:1.05;
}
.upgrade .nm small{
  display:block;font-family:'Fredoka', sans-serif;font-weight:500;
  font-size:10px;letter-spacing:0.04em;color:rgba(255,200,240,0.7);
  text-transform:none;margin-top:2px;
}
.upgrade .right{
  display:flex;flex-direction:column;align-items:flex-end;gap:1px;
}
.upgrade .lvl{
  font-family:'DotGothic16', monospace;font-size:10px;letter-spacing:0.18em;
  color:rgba(255,200,240,0.7);text-transform:uppercase;
}
.upgrade .lvl.maxed{color:var(--mint)}
.upgrade .cost{
  font-family:'Fredoka', sans-serif;font-weight:700;font-size:13px;
  color:var(--candy);
}
.upgrade.affordable .cost{color:var(--gold);text-shadow:0 0 6px rgba(255,224,130,0.5)}

/* footer */
.footer{
  grid-column:1/-1;display:flex;justify-content:center;gap:10px;
  flex-wrap:wrap;padding:6px 0 10px;font-family:'DotGothic16', monospace;
  font-size:11px;letter-spacing:0.18em;color:rgba(255,200,240,0.55);
  text-transform:uppercase;
}
.footer button{
  background:rgba(255,133,208,0.12);border:2px solid rgba(255,133,208,0.35);
  color:var(--bubble);font-family:'DotGothic16', monospace;
  font-size:11px;letter-spacing:0.18em;padding:5px 12px;border-radius:8px;
  cursor:pointer;text-transform:uppercase;transition:all 0.14s;
}
.footer button:hover{background:rgba(255,133,208,0.22);color:var(--candy);border-color:var(--hot-pink)}

/* mega uwu mode overlay */
.mega-banner{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.6);
  font-family:'Bagel Fat One', cursive;font-size:64px;
  color:var(--candy);
  text-shadow:0 0 24px var(--neon-pink), 0 0 48px rgba(255,95,191,0.7), 4px 4px 0 var(--hot-pink);
  pointer-events:none;z-index:50;opacity:0;
  animation:megaBanner 1.6s ease-out forwards;
}
@keyframes megaBanner{
  0%   {opacity:0;transform:translate(-50%,-50%) scale(0.5) rotate(-8deg)}
  20%  {opacity:1;transform:translate(-50%,-50%) scale(1.15) rotate(2deg)}
  60%  {opacity:1;transform:translate(-50%,-50%) scale(1) rotate(-1deg)}
  100% {opacity:0;transform:translate(-50%,-50%) scale(1.05) rotate(0)}
}

.toast{
  position:fixed;left:50%;bottom:20px;transform:translateX(-50%);
  background:rgba(20,2,42,0.92);border:2px solid var(--hot-pink);
  color:var(--candy);font-family:'Fredoka', sans-serif;font-weight:600;
  padding:8px 18px;border-radius:999px;font-size:13px;letter-spacing:0.12em;
  box-shadow:0 0 18px rgba(255,95,191,0.45);
  opacity:0;transition:opacity 0.3s, transform 0.3s;
  pointer-events:none;z-index:60;text-transform:uppercase;
}
.toast.show{opacity:1;transform:translate(-50%, -8px)}
</style>
</head>
<body>

<div class="stage">
  <div class="head">
    <div class="brand">mochi cat<small>· 8-bit null · ♡ ♡ ♡ ·</small></div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <div class="hud-pill"><span class="em">♡</span><span id="lifetimeCount">0</span> total</div>
      <div class="hud-pill" id="evoStagePill"><span class="em">🐱</span><span id="evoStageName">kitten</span></div>
    </div>
  </div>

  <div class="main">
    <div class="score-box">
      <div class="count" id="petCount">0</div>
      <div class="label">pets · ♡</div>
      <div class="rate" id="rateLine">+0 ♡/click · 0/sec idle</div>
    </div>
    <div class="view-toggle">
      <button data-view="pet"  id="viewPetBtn">🐾 pet</button>
      <button data-view="room" id="viewRoomBtn">🛏️ room</button>
      <button id="pixelBtn">🟪 pixel</button>
    </div>
    <div class="cat-stage" id="catStage">
      <div class="stage-name" id="evoLabel">kitten</div>
      <canvas id="catCanvas" width="320" height="320"></canvas>
      <canvas id="roomCanvas" width="480" height="340"></canvas>
      <div class="floor" id="catFloor"></div>
      <div class="click-hint" id="clickHint">wave near null uwu</div>
    </div>
  </div>

  <div class="panel">
    <h3>upgrades<small>more pets · more love · more nya</small></h3>
    <div class="upgrade-list" id="upgradeList"></div>
  </div>

  <div class="footer">
    <button id="muteBtn">♪ on</button>
    <button id="musicBtn">♫ off</button>
    <button id="resetBtn">↻ reset</button>
    <span>made with ♡</span>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(() => {
  // ===== STATE =====
  const STATE_KEY = 'mochi-cat-v1';
  const state = {
    pets: 0,           // current spendable currency
    lifetime: 0,       // never decreases — drives evolution
    clicks: 0,         // tap count for stats
    upgrades: {
      paw:     { lvl: 0 },   // +click value
      pillow:  { lvl: 0 },   // +cps cozy starter
      yarn:    { lvl: 0 },   // +cps early
      milk:    { lvl: 0 },   // +cps early-mid (warm milk)
      sushi:   { lvl: 0 },   // +cps mid
      kissu:   { lvl: 0 },   // ×click multiplier
      stardust:{ lvl: 0 },   // +cps high
      sakura:  { lvl: 0 },   // +cps mid-late (sakura nap)
      princess:{ lvl: 0 },   // ×global
      spirit:  { lvl: 0 },   // +cps top
    },
    muted: false,
    megaUwuUntil: 0,        // performance.now() timestamp; mega mode active while < this
    megaUwuCharges: 0,      // charges accumulated; every 50 interactions gives 1 charge
    viewMode: 'pet',        // 'pet' (cursor-chase stage) | 'room' (passive bedroom scene)
    pixel: true,            // retro chunky-pixel rendering — DEFAULT ON for new players per chat
  };

  // ===== NES PALETTE =====
  // Strict 12-color master palette derived from the actual NES system
  // palette ($0F, $24, $34, $14, etc — see chat ask "NES-style 8-bit
  // palette"). Every canvas fill in this app pulls from this object —
  // no gradients, no rgba mid-fades inside sprites, no hex literals
  // sprinkled through the drawing code. Sub-palette discipline (≈4
  // colors per "tile"):
  //   - cat sprite:    ink + pink + candy + lime (eyes)
  //   - cat shading:   magenta (cheeks, inner ears) + pink + ink
  //   - room walls:    violet + plum + pink + candy
  //   - window/sky:    void + plum + cyan + amber
  //   - aquarium:      cyan + plum + lime + gold + white
  //   - rain:          cyan only
  // Authentic NES never had a true bright lime — `lime` here is a slight
  // creative liberty for Null's piercing predator eyes. Everything else
  // maps to canon NES values.
  const NES = {
    ink:     '#000000',  // $0F outline / dark slit pupil
    void:    '#0000A8',  // $01 deepest sky
    plum:    '#440098',  // $03 floor / sky mid
    violet:  '#9430FF',  // $13 wall / accent
    magenta: '#B413FF',  // $14 cat shading + cheeks
    pink:    '#FF77B7',  // $24 PRIMARY pink (cat / frames)
    candy:   '#F8B0FF',  // $34 highlight / rug center
    white:   '#FCFCFC',  // $30 sparkles / paws / fur
    lime:    '#7CF800',  // ~$2A piercing eyes / aquarium plants
    cyan:    '#54E1FE',  // $2C rain / aquarium water
    amber:   '#FCBCAC',  // ~$35 soft moon
    gold:    '#F8B800',  // $28 jewelry / aquarium fish
  };

  // Persistent rate tracking — keep love streaming without storing per-tick deltas.
  let lastTickT = performance.now();

  // Ordered roughly by unlock cost so the panel reads as a natural progression.
  // Per chat: cozy passives are critical to the vibe — pillow/milk/sakura nap
  // give the cat warm-and-soft activities to passively earn love between taps.
  const UPGRADES = [
    { k:'paw',      em:'🐾', nm:'PAW POWER',   desc:'+1 ♡ per click',                base:15,     grow:1.15, max:60 },
    { k:'pillow',   em:'🛋️', nm:'COZY PILLOW', desc:'+1 ♡/sec · soft napping',       base:40,     grow:1.15, max:30 },
    { k:'yarn',     em:'🧶', nm:'YARN BALL',   desc:'+1 ♡/sec · playful kicks',      base:90,     grow:1.15, max:30 },
    { k:'milk',     em:'🥛', nm:'WARM MILK',   desc:'+3 ♡/sec · cozy bowl',          base:280,    grow:1.16, max:30 },
    { k:'sushi',    em:'🍣', nm:'SUSHI',       desc:'+5 ♡/sec · happy belly',        base:600,    grow:1.16, max:30 },
    { k:'kissu',    em:'💋', nm:'KISSU',       desc:'×1.05 click multiplier',        base:1500,   grow:1.50, max:20 },
    { k:'stardust', em:'✨', nm:'STARDUST',    desc:'+25 ♡/sec · sparkle dreams',    base:7000,   grow:1.17, max:25 },
    { k:'sakura',   em:'🌸', nm:'SAKURA NAP',  desc:'+60 ♡/sec · blossom dreams',    base:24000,  grow:1.18, max:25 },
    { k:'princess', em:'👑', nm:'PRINCESS',    desc:'×1.15 global multiplier',       base:60000,  grow:2.00, max:10 },
    { k:'spirit',   em:'👻', nm:'NEKO SPIRIT', desc:'+150 ♡/sec · ghost purrs',      base:180000, grow:1.18, max:30 },
  ];

  // ===== EVOLUTION STAGES (drives cat sprite + label) =====
  // Triggered by lifetime love earned (never goes back, even if you spend down).
  const STAGES = [
    { thresh:0,        name:'kitten',         em:'🐱' },
    { thresh:1000,     name:'bowtie cutie',   em:'🎀' },
    { thresh:10000,    name:'sparkle puff',   em:'✨' },
    { thresh:100000,   name:'crown princess', em:'👑' },
    { thresh:1000000,  name:'angel neko',     em:'😇' },
    { thresh:10000000, name:'cosmic mochi',   em:'🌌' },
  ];
  function evoStage() {
    let s = STAGES[0];
    for (const st of STAGES) if (state.lifetime >= st.thresh) s = st;
    return s;
  }

  // ===== DERIVED STATS =====
  function costOf(u) {
    return Math.ceil(u.base * Math.pow(u.grow, state.upgrades[u.k].lvl));
  }
  function lvlOf(k) { return state.upgrades[k].lvl; }
  function clickValue() {
    // base 1 + paw level, then ×kissu, then ×princess, ×mega
    const base = 1 + lvlOf('paw');
    const kissu = Math.pow(1.05, lvlOf('kissu'));
    const princess = Math.pow(1.15, lvlOf('princess'));
    const mega = performance.now() < state.megaUwuUntil ? 5 : 1;
    return base * kissu * princess * mega;
  }
  function cps() {
    // sum of passive sources × princess × mega — cozy upgrades stack
    // additively (each level adds its flat ♡/sec contribution), then the
    // PRINCESS global multiplier and the active MEGA UWU window scale the
    // total. This way buying a pillow always feels meaningful even if you
    // also have stardust and spirit running.
    const passive =
      lvlOf('pillow')   * 1   +    // 🛋️ cozy starter
      lvlOf('yarn')     * 1   +    // 🧶 playful
      lvlOf('milk')     * 3   +    // 🥛 warm bowl
      lvlOf('sushi')    * 5   +    // 🍣 happy belly
      lvlOf('stardust') * 25  +    // ✨ sparkle dreams
      lvlOf('sakura')   * 60  +    // 🌸 blossom nap
      lvlOf('spirit')   * 150;     // 👻 ghost purrs (top tier)
    const princess = Math.pow(1.15, lvlOf('princess'));
    const mega = performance.now() < state.megaUwuUntil ? 5 : 1;
    return passive * princess * mega;
  }

  // ===== PERSIST =====
  function save() {
    try { localStorage.setItem(STATE_KEY, JSON.stringify({
      pets: state.pets, lifetime: state.lifetime, clicks: state.clicks,
      upgrades: state.upgrades, muted: state.muted,
      megaUwuCharges: state.megaUwuCharges,
      viewMode: state.viewMode, pixel: state.pixel,
    })); } catch (e) {}
  }
  function load() {
    try {
      const raw = JSON.parse(localStorage.getItem(STATE_KEY) || 'null');
      if (!raw) return;
      state.pets = raw.pets || 0;
      state.lifetime = raw.lifetime || 0;
      state.clicks = raw.clicks || 0;
      state.muted = !!raw.muted;
      state.megaUwuCharges = raw.megaUwuCharges || 0;
      if (raw.viewMode === 'room' || raw.viewMode === 'pet') state.viewMode = raw.viewMode;
      if (typeof raw.pixel === 'boolean') state.pixel = raw.pixel;
      for (const u of UPGRADES) {
        if (raw.upgrades && raw.upgrades[u.k]) state.upgrades[u.k].lvl = raw.upgrades[u.k].lvl || 0;
      }
    } catch (e) {}
  }
  load();

  // ===== AUDIO =====
  let actx = null;
  function ctx() {
    if (!actx) {
      try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {}
    }
    if (actx && actx.state === 'suspended') actx.resume();
    return actx;
  }
  function tone(freq, dur, type='sine', vol=0.08) {
    if (state.muted) return;
    const a = ctx(); if (!a) return;
    const o = a.createOscillator(), g = a.createGain();
    o.type = type; o.frequency.value = freq;
    o.connect(g); g.connect(a.destination);
    const t = a.currentTime;
    g.gain.setValueAtTime(vol, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.start(t); o.stop(t + dur);
  }
  const sfx = {
    pet: () => {
      // soft "ny~" — two-tone triangle pluck shifted by combo a tiny bit
      const f = 660 + Math.random() * 120;
      tone(f, 0.06, 'triangle', 0.06);
      setTimeout(() => tone(f * 1.4, 0.05, 'triangle', 0.05), 25);
    },
    crit: () => {
      [880, 1175, 1568, 1976].forEach((f, i) => setTimeout(() => tone(f, 0.10, 'triangle', 0.07), i * 50));
    },
    buy: () => { tone(540, 0.06, 'triangle', 0.07); setTimeout(() => tone(810, 0.08, 'triangle', 0.07), 40); },
    mega: () => {
      [392, 494, 587, 698, 880].forEach((f, i) => setTimeout(() => tone(f, 0.18, 'sine', 0.10), i * 70));
    },
    err: () => tone(180, 0.10, 'sine', 0.05),
  };

  // ===== LO-FI MUSIC LOOP =====
  // 4-bar Cmaj7 / Am7 / Fmaj7 / G7 progression at 78 BPM with triangle-wave
  // melody, soft sine bass, brushed-noise hi-hat, sub-thump kick, and a
  // sparse vinyl crackle layer. Everything routes through a 1800 Hz lowpass
  // for that warm tape feel + a noise-impulse convolver reverb. Uses a
  // look-ahead scheduler (60 ms tick, 0.5 s schedule horizon) so timing
  // stays tight even under a busy main thread. ♫ button in footer toggles.
  const NOTE = {
    'C3':130.81,'D3':146.83,'E3':164.81,'F3':174.61,'G3':196.00,'A3':220.00,'Bb3':233.08,'B3':246.94,
    'C4':261.63,'D4':293.66,'E4':329.63,'F4':349.23,'G4':392.00,'A4':440.00,'Bb4':466.16,'B4':493.88,
    'C5':523.25,'D5':587.33,'E5':659.25,'F5':698.46,'G5':783.99,'A5':880.00,'B5':987.77,'C6':1046.50,
  };
  const lofi = {
    on: false,
    tempo: 78,                 // BPM
    beat: 0,                   // monotonic beat counter
    schedNext: 0,              // ctx-time of next beat to schedule
    master: null, reverb: null, dry: null, wet: null, crackleSrc: null,
    schedTimer: null,
    // bass + chord notes per bar
    chords: [
      { bass: 'C3',  pad: ['C4', 'E4', 'G4', 'B4'] },   // Cmaj7
      { bass: 'A3',  pad: ['A3', 'C4', 'E4', 'G4'] },   // Am7
      { bass: 'F3',  pad: ['F3', 'A3', 'C4', 'E4'] },   // Fmaj7
      { bass: 'G3',  pad: ['G3', 'B3', 'D4', 'F4'] },   // G7
    ],
    // 4-note melody per bar (one per beat) — simple, hummable
    melody: [
      ['E5', 'G5', 'C6', 'G5'],
      ['A4', 'C5', 'E5', 'C5'],
      ['F4', 'A4', 'C5', 'A4'],
      ['G4', 'B4', 'D5', 'B4'],
    ],
  };
  function makeReverb(a, dur = 2.4) {
    const len = Math.floor(a.sampleRate * dur);
    const buf = a.createBuffer(2, len, a.sampleRate);
    for (let ch = 0; ch < 2; ch++) {
      const d = buf.getChannelData(ch);
      for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.4);
    }
    return buf;
  }
  function makeCrackleBuffer(a, durSec = 4) {
    const len = Math.floor(a.sampleRate * durSec);
    const buf = a.createBuffer(1, len, a.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) {
      // sparse vinyl pops — only ~0.6% of samples carry a click
      d[i] = Math.random() < 0.006 ? (Math.random() * 2 - 1) : 0;
    }
    return buf;
  }
  function lofiNote(t, freq, type, dur, vol, attack = 0.04) {
    const a = ctx(); if (!a || !lofi.master) return;
    const osc = a.createOscillator(), g = a.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t);
    osc.connect(g); g.connect(lofi.master);
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(vol, t + attack);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    osc.start(t); osc.stop(t + dur + 0.05);
  }
  function lofiHat(t) {
    const a = ctx(); if (!a || !lofi.master) return;
    const dur = 0.10;
    const len = Math.max(1, Math.floor(a.sampleRate * dur));
    const buf = a.createBuffer(1, len, a.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1);
    const src = a.createBufferSource(); src.buffer = buf;
    const f = a.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 6500;
    const g = a.createGain();
    g.gain.setValueAtTime(0.045, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    src.connect(f); f.connect(g); g.connect(lofi.master);
    src.start(t);
  }
  function lofiKick(t) {
    const a = ctx(); if (!a || !lofi.master) return;
    const osc = a.createOscillator();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(120, t);
    osc.frequency.exponentialRampToValueAtTime(38, t + 0.18);
    const g = a.createGain();
    g.gain.setValueAtTime(0.22, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
    osc.connect(g); g.connect(lofi.master);
    osc.start(t); osc.stop(t + 0.20);
  }
  function lofiSchedule() {
    if (!lofi.on) return;
    const a = ctx(); if (!a) return;
    const beatDur = 60 / lofi.tempo;
    while (lofi.schedNext < a.currentTime + 0.5) {
      const t = lofi.schedNext;
      const beatInBar = lofi.beat % 4;
      const bar = Math.floor(lofi.beat / 4) % lofi.chords.length;
      // bass — once per bar on beat 0
      if (beatInBar === 0) {
        lofiNote(t, NOTE[lofi.chords[bar].bass] / 2, 'sine', beatDur * 3.85, 0.16, 0.06);
        // chord pad — slightly staggered triangle stack
        lofi.chords[bar].pad.forEach((n, i) => {
          lofiNote(t + 0.018 * i, NOTE[n], 'triangle', beatDur * 3.7, 0.045, 0.10);
        });
      }
      // melody — every beat
      const melName = lofi.melody[bar][beatInBar];
      lofiNote(t, NOTE[melName], 'triangle', beatDur * 0.92, 0.085, 0.025);
      // kick on beats 0 and 2
      if (beatInBar === 0 || beatInBar === 2) lofiKick(t);
      // hi-hat on every offbeat
      lofiHat(t + beatDur * 0.5);
      lofi.beat++;
      lofi.schedNext += beatDur;
    }
    lofi.schedTimer = setTimeout(lofiSchedule, 60);
  }
  function lofiStart() {
    const a = ctx(); if (!a) return;
    if (lofi.on) return;
    lofi.on = true;
    // master chain: osc → master gain → lowpass → split (dry + reverb wet) → output
    const master = a.createGain(); master.gain.value = 0.0;
    const lp = a.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 1800; lp.Q.value = 0.7;
    const conv = a.createConvolver(); conv.buffer = makeReverb(a, 2.4);
    const dry = a.createGain(); dry.gain.value = 0.85;
    const wet = a.createGain(); wet.gain.value = 0.42;
    master.connect(lp);
    lp.connect(dry); lp.connect(conv); conv.connect(wet);
    dry.connect(a.destination); wet.connect(a.destination);
    lofi.master = master; lofi.reverb = conv; lofi.dry = dry; lofi.wet = wet;
    // sparse vinyl crackle — looping noise through highpass at low gain
    const crSrc = a.createBufferSource();
    crSrc.buffer = makeCrackleBuffer(a, 4);
    crSrc.loop = true;
    const crFilt = a.createBiquadFilter(); crFilt.type = 'highpass'; crFilt.frequency.value = 2400;
    const crGain = a.createGain(); crGain.gain.value = 0.18;
    crSrc.connect(crFilt); crFilt.connect(crGain); crGain.connect(master);
    crSrc.start();
    lofi.crackleSrc = crSrc;
    // gentle fade-in
    master.gain.linearRampToValueAtTime(0.42, a.currentTime + 1.2);
    lofi.beat = 0;
    lofi.schedNext = a.currentTime + 0.15;
    lofiSchedule();
  }
  function lofiStop() {
    if (!lofi.on) return;
    lofi.on = false;
    if (lofi.schedTimer) { clearTimeout(lofi.schedTimer); lofi.schedTimer = null; }
    const a = ctx();
    if (a && lofi.master) {
      lofi.master.gain.cancelScheduledValues(a.currentTime);
      lofi.master.gain.setValueAtTime(lofi.master.gain.value, a.currentTime);
      lofi.master.gain.linearRampToValueAtTime(0.0001, a.currentTime + 0.4);
    }
    setTimeout(() => {
      try { lofi.crackleSrc && lofi.crackleSrc.stop(); } catch (e) {}
      try { lofi.master && lofi.master.disconnect(); } catch (e) {}
      lofi.master = null; lofi.crackleSrc = null;
    }, 500);
  }

  // ===== CAT RENDERER =====
  // Pure-canvas chibi cat. Draws to offscreen-style raw canvas — no DOM
  // children — so we can re-render at 60fps cheaply. Sprite layout:
  //   - body ellipse (pink)
  //   - tail wagging via sin
  //   - head circle
  //   - 2 ear triangles + inner ear pink
  //   - eyes (mood-dependent)
  //   - blush, mouth, accessories per stage
  const cat = {
    canvas: document.getElementById('catCanvas'),
    ctx: null,
    bounce: 0,             // 0..1 — set to 1 on bat/click, decays
    blush: 0,              // 0..1
    mouthOpen: 0,          // 0..1, set to 1 on bat/click for ~150ms
    happyT: 0,             // happy-face hold time (post-bat)
    walkPhase: 0,
    blinkT: 0,             // blink animation 0..1
    blinkNext: 4 + Math.random() * 4,
    tailPhase: 0,
    age: 0,                // total animated time
    // Cursor-chase fields — Null tracks the cursor and bats at it instead
    // of relying on clicks. cursor is in canvas-px coords (0..size); null
    // when pointer is off-canvas → she gradually drifts back to center.
    cursor: null,
    followX: 0, followY: 0,    // body-offset lerp toward cursor
    lastBatT: 0,
    batT: 0,                   // 0..1, set to 1 on bat trigger, decays
    batAngle: 0,
  };
  function setupCat() {
    const c = cat.canvas;
    // CSS display size — same in both modes so layout doesn't reflow when
    // toggling pixel-art on/off.
    const sz = Math.min(380, Math.max(280, Math.floor(c.parentElement.clientWidth * 0.85)));
    c.style.width = sz + 'px'; c.style.height = sz + 'px';
    cat.size = sz;
    if (state.pixel) {
      // Pixel-art mode — small physical framebuffer, CSS upscales with
      // `image-rendering: pixelated`. Cranked from 96→64 per chat for
      // chunkier retro feel: at ~320px display that's ~5 display-px per
      // logical pixel, which reads as solidly NES/GameBoy-style blocky.
      const PIX = 64;
      c.width = PIX; c.height = PIX;
      cat.ctx = c.getContext('2d');
      cat.ctx.imageSmoothingEnabled = false;
      cat.ctx.setTransform(PIX / sz, 0, 0, PIX / sz, 0, 0);
    } else {
      // Smooth (default) — DPR-aware crisp rendering.
      const dpr = Math.min(2, window.devicePixelRatio || 1);
      c.width = sz * dpr; c.height = sz * dpr;
      cat.ctx = c.getContext('2d');
      cat.ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }
  }
  setupCat();
  window.addEventListener('resize', () => { setupCat(); setupRoom(); });

  // ===== ROOM VIEW =====
  // A passive bedroom scene where the cat wanders between cozy stations
  // (pillow / yarn / milk / sushi / sakura — each appears only if its
  // upgrade is owned). Clicking is OPTIONAL: passive cps still credits
  // pets every frame from the global tick regardless of which view is
  // active. Tap-to-pet still works in room mode but isn't required.
  const room = {
    canvas: document.getElementById('roomCanvas'),
    ctx: null,
    w: 480, h: 340,
    // wandering kitty — autonomous AI, no input required
    cat: { x: 240, y: 280, vx: 0, facing: 1, walkPhase: 0, blinkT: 0, blinkNext: 5,
           state: 'wander', stateT: 3, target: null, mouthOpen: 0, blush: 0, happyT: 0, age: 0,
           lastBatT: 0, batT: 0, batAngle: 0 },
    cursor: null,           // world-coord cursor or null when off-canvas
    lastHeartT: 0,
  };
  function setupRoom() {
    const c = room.canvas;
    const wantW = Math.min(560, Math.max(320, Math.floor(c.parentElement.clientWidth * 0.96)));
    const wantH = Math.floor(wantW * 0.70);
    c.style.width = wantW + 'px'; c.style.height = wantH + 'px';
    room.dispW = wantW; room.dispH = wantH;
    if (state.pixel) {
      // Low-res framebuffer → CSS upscales pixelated. Cranked from 192×134
      // down to 96×68 per chat for chunkier retro feel — at ~480px display
      // that's ~5 display-px per logical pixel, NES-tier blocky.
      const PW = 96, PH = 68;
      c.width = PW; c.height = PH;
      room.ctx = c.getContext('2d');
      room.ctx.imageSmoothingEnabled = false;
      room.ctx.setTransform(PW / room.w, 0, 0, PH / room.h, 0, 0);
    } else {
      const dpr = Math.min(2, window.devicePixelRatio || 1);
      c.width = wantW * dpr; c.height = wantH * dpr;
      room.ctx = c.getContext('2d');
      room.ctx.setTransform((wantW / room.w) * dpr, 0, 0, (wantH / room.h) * dpr, 0, 0);
    }
  }
  setupRoom();

  // Stations the cat visits — only those whose upgrade is owned (lvl > 0)
  // appear in the room. The cat's wander AI picks among visible stations.
  function visibleStations() {
    const out = [];
    if (lvlOf('pillow') > 0) out.push({ kind:'pillow', em:'🛋️', x: 80,  y: 280, label:'nap',   sound:'snoring' });
    if (lvlOf('yarn')   > 0) out.push({ kind:'yarn',   em:'🧶', x: 380, y: 282, label:'play',  sound:'pat' });
    if (lvlOf('milk')   > 0) out.push({ kind:'milk',   em:'🥛', x: 200, y: 286, label:'sip',   sound:'lap' });
    if (lvlOf('sushi')  > 0) out.push({ kind:'sushi',  em:'🍣', x: 300, y: 290, label:'munch', sound:'chew' });
    if (lvlOf('sakura') > 0) out.push({ kind:'sakura', em:'🌸', x: 440, y: 240, label:'dream', sound:'breeze' });
    return out;
  }

  function drawRoom(now) {
    const ctx = room.ctx;
    if (!ctx) return;
    const W = room.w, H = room.h;
    // ===== BG: back wall + floor =====
    ctx.fillStyle = NES.plum;
    ctx.fillRect(0, 0, W, H);
    // back wall (top portion)
    const wallH = H * 0.62;
    // wall — strict NES: a single flat plum fill, no gradient. The CRT
    // scanlines + the 8-bit framebuffer do all the lighting work.
    ctx.fillStyle = NES.plum;
    ctx.fillRect(0, 0, W, wallH);
    // optional 1-row violet "trim" near the ceiling — NES tile boundary feel
    ctx.fillStyle = NES.violet;
    ctx.fillRect(0, 0, W, 6);
    // ===== LARGE PIXELATED WINDOW WITH RAIN =====
    // Centerpiece of the back wall. 2×2 pane grid, blue rain falling
    // behind the glass, distant moon + softly twinkling cloud-veiled
    // stars. Sized to dominate the wall — chat ask: "large pixelated
    // window with rain animation".
    const winX = 110, winY = 18, winW = 260, winH = 170;
    // outer frame (chunky pink)
    ctx.fillStyle = NES.pink;
    ctx.fillRect(winX - 6, winY - 6, winW + 12, winH + 12);
    // sky (deep indigo gradient inside the pane)
    // sky — strict NES: 3 flat horizontal bands instead of a gradient.
    // Each band gets ONE solid color from the void/plum/violet sub-palette,
    // exactly mimicking how NES tile-based backgrounds approximated lighting.
    const skyTop = Math.floor(winH * 0.40);
    const skyMid = Math.floor(winH * 0.72);
    ctx.fillStyle = NES.ink;
    ctx.fillRect(winX, winY, winW, skyTop);
    ctx.fillStyle = NES.void;
    ctx.fillRect(winX, winY + skyTop, winW, skyMid - skyTop);
    ctx.fillStyle = NES.plum;
    ctx.fillRect(winX, winY + skyMid, winW, winH - skyMid);
    // distant cloud band (soft horizontal swipe)
    ctx.fillStyle = 'rgba(180, 140, 220, 0.20)';
    ctx.fillRect(winX, winY + winH * 0.42, winW, 18);
    ctx.fillRect(winX, winY + winH * 0.62, winW, 12);
    // moon (hazy, behind clouds)
    const moonX = winX + winW * 0.78, moonY = winY + winH * 0.26;
    ctx.fillStyle = 'rgba(255, 224, 176, 0.55)';
    ctx.beginPath(); ctx.arc(moonX, moonY, 16, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = NES.amber;
    ctx.beginPath(); ctx.arc(moonX, moonY, 10, 0, Math.PI * 2); ctx.fill();
    // veiled stars
    ctx.fillStyle = NES.white;
    const stars = [
      {x:winX + 30, y:winY + 28}, {x:winX + 60, y:winY + 50},
      {x:winX + 110, y:winY + 22}, {x:winX + 170, y:winY + 38},
      {x:winX + 200, y:winY + 90}, {x:winX + 90, y:winY + 130},
      {x:winX + 230, y:winY + 60}, {x:winX + 30, y:winY + 110},
    ];
    stars.forEach((s, i) => {
      const tw = 0.5 + 0.5 * Math.sin(now * 0.003 + i * 1.7);
      ctx.globalAlpha = (0.25 + tw * 0.55) * 0.7;
      ctx.fillRect(s.x, s.y, 1.5, 1.5);
    });
    ctx.globalAlpha = 1;
    // ===== RAIN — clipped to the window pane =====
    if (!room.rain) {
      room.rain = [];
      for (let i = 0; i < 60; i++) {
        room.rain.push({
          x: Math.random() * winW,
          y: Math.random() * winH,
          v: 110 + Math.random() * 90,
        });
      }
    }
    ctx.save();
    ctx.beginPath(); ctx.rect(winX, winY, winW, winH); ctx.clip();
    const rainDt = Math.min(0.05, (now - (room._rainT || now)) / 1000);
    room._rainT = now;
    ctx.fillStyle = NES.cyan;
    for (const r of room.rain) {
      r.y += r.v * rainDt;
      r.x -= r.v * rainDt * 0.18;     // slight wind angle
      if (r.y > winH || r.x < -4) {
        r.x = Math.random() * (winW + 30);
        r.y = -2 - Math.random() * 8;
      }
      // 1×3 vertical pixel drop — chunky in pixel mode, fine in smooth mode
      ctx.fillRect(winX + r.x, winY + r.y, 1, 3);
    }
    // periodic puddle splashes at the bottom edge of the pane
    if (Math.random() < 0.35) {
      const sx = winX + Math.random() * winW;
      ctx.fillStyle = 'rgba(155, 213, 255, 0.55)';
      ctx.fillRect(sx, winY + winH - 1, 2, 1);
    }
    ctx.restore();
    // window cross (4-pane grid)
    ctx.strokeStyle = NES.pink;
    ctx.lineWidth = 3;
    ctx.strokeRect(winX, winY, winW, winH);
    ctx.beginPath();
    ctx.moveTo(winX + winW * 0.5, winY); ctx.lineTo(winX + winW * 0.5, winY + winH);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(winX, winY + winH * 0.5); ctx.lineTo(winX + winW, winY + winH * 0.5);
    ctx.stroke();
    // sill
    ctx.fillStyle = NES.pink;
    ctx.fillRect(winX - 12, winY + winH + 4, winW + 24, 8);

    // small picture frame (kept, repositioned to lower-left to balance window)
    ctx.fillStyle = NES.pink;
    ctx.fillRect(28, 130, 56, 44);
    ctx.fillStyle = NES.candy;
    ctx.fillRect(32, 134, 48, 36);
    ctx.fillStyle = NES.pink;
    drawHeart(ctx, 56, 152, 12);

    // floor (lower portion) — pink wood-feel via stripes
    ctx.fillStyle = NES.plum;
    ctx.fillRect(0, wallH, W, H - wallH);
    ctx.fillStyle = 'rgba(0,0,0,0.18)';
    for (let x = 0; x < W; x += 24) ctx.fillRect(x, wallH + 2, 1, H - wallH - 2);
    // floor rug
    ctx.fillStyle = NES.pink;
    ctx.beginPath();
    ctx.ellipse(W / 2, H - 18, W * 0.42, 22, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = NES.candy;
    ctx.beginPath();
    ctx.ellipse(W / 2, H - 18, W * 0.34, 16, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = NES.pink;
    for (let x = -W * 0.32; x < W * 0.32; x += 18) {
      ctx.beginPath();
      ctx.arc(W / 2 + x, H - 18, 1.6, 0, Math.PI * 2);
      ctx.fill();
    }

    // ===== DECORATIVE FURNITURE (always present, NES sub-palette) =====
    // Per chat: "more decorative furniture like a bubbling aquarium" +
    // "beanbags and stacks of vintage consoles around the room". Drawn
    // before the stations so any owned-station emoji sits in front.

    // ----- BEANBAG (back-left, between window-corner and pillow) -----
    // Pink+candy puff with magenta dot pattern. ≤4 colors per tile.
    const bbX = 38, bbY = 252;
    ctx.fillStyle = NES.pink;
    ctx.beginPath();
    ctx.ellipse(bbX, bbY, 28, 22, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = NES.ink;
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = NES.candy;     // squishy highlight
    ctx.beginPath();
    ctx.ellipse(bbX - 6, bbY - 8, 14, 7, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = NES.magenta;   // dot pattern
    [[-12, -2], [10, 0], [-2, 8], [14, -10], [-16, 6]].forEach(([dx, dy]) => {
      ctx.beginPath();
      ctx.arc(bbX + dx, bbY + dy, 1.6, 0, Math.PI * 2);
      ctx.fill();
    });

    // ----- VINTAGE CONSOLE STACK (back-left wall, on top of small table) -----
    // 3 stacked retro consoles + tiny CRT TV with animated static.
    // Each console is a flat-colored 28×8 block (NES, SNES-tier, GameBoy)
    // with a single accent stripe and ink outline.
    const csX = 12, csY = 178;     // bottom-left of stack
    // table the consoles sit on
    ctx.fillStyle = NES.gold;
    ctx.fillRect(csX - 4, csY + 2, 44, 4);
    ctx.fillStyle = NES.ink;
    ctx.fillRect(csX - 2, csY + 6, 4, 16);
    ctx.fillRect(csX + 34, csY + 6, 4, 16);
    // console 1: dark grey/violet (NES-style) at base
    ctx.fillStyle = NES.violet;
    ctx.fillRect(csX, csY - 8, 36, 8);
    ctx.fillStyle = NES.candy;
    ctx.fillRect(csX + 4, csY - 5, 28, 1);   // accent stripe
    ctx.strokeStyle = NES.ink;
    ctx.lineWidth = 1;
    ctx.strokeRect(csX, csY - 8, 36, 8);
    // console 2: pink (SNES-tier) middle
    ctx.fillStyle = NES.pink;
    ctx.fillRect(csX + 2, csY - 16, 32, 8);
    ctx.fillStyle = NES.candy;
    ctx.fillRect(csX + 5, csY - 13, 26, 1);
    ctx.strokeRect(csX + 2, csY - 16, 32, 8);
    // console 3: gold (GameBoy-tier) top
    ctx.fillStyle = NES.gold;
    ctx.fillRect(csX + 4, csY - 24, 28, 8);
    ctx.fillStyle = NES.lime;
    ctx.fillRect(csX + 8, csY - 22, 14, 4);   // tiny screen
    ctx.strokeRect(csX + 4, csY - 24, 28, 8);
    // mini CRT TV on top — 22×18 box with animated bandpass static
    const tvX = csX + 6, tvY = csY - 46;
    ctx.fillStyle = NES.ink;
    ctx.fillRect(tvX, tvY, 24, 20);
    // screen
    ctx.fillStyle = NES.violet;
    ctx.fillRect(tvX + 2, tvY + 2, 20, 14);
    // static — flat-color noise dots in NES candy at random positions
    ctx.fillStyle = NES.candy;
    for (let i = 0; i < 8; i++) {
      const px = tvX + 2 + Math.floor(Math.random() * 20);
      const py = tvY + 2 + Math.floor(Math.random() * 14);
      ctx.fillRect(px, py, 1, 1);
    }
    // 3 horizontal scanlines on the screen
    ctx.fillStyle = NES.ink;
    for (let i = 0; i < 3; i++) ctx.fillRect(tvX + 2, tvY + 4 + i * 4, 20, 1);
    // antenna nubs
    ctx.strokeStyle = NES.ink;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(tvX + 6, tvY); ctx.lineTo(tvX + 2, tvY - 8); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(tvX + 18, tvY); ctx.lineTo(tvX + 22, tvY - 8); ctx.stroke();
    // power LED
    ctx.fillStyle = NES.lime;
    ctx.fillRect(tvX + 21, tvY + 17, 2, 2);

    // ----- NEON LAVA LAMP (back-right wall, between window and aquarium) -----
    // Per chat: pixel-art lamp w/ glowing molten blobs. Strict NES palette:
    // gold (cap + base trim) + ink (stand/outline) + candy (glass fluid) +
    // magenta/pink (lava blobs) + a translucent same-color halo for the
    // "neon" bloom. Lava animates via two sin curves — vertical bob and
    // horizontal sway — clipped to the glass body so blobs never escape.
    const llX = 378, llY = 92, llW = 18, llH = 80;
    const standY = llY + llH - 16;
    const bodyY = llY + 6, bodyH = llH - 24;
    // neon halo behind the whole lamp (translucent magenta wash)
    ctx.globalAlpha = 0.30;
    ctx.fillStyle = NES.magenta;
    ctx.fillRect(llX - 5, llY - 2, llW + 10, llH + 4);
    ctx.globalAlpha = 1;
    // gold base trim
    ctx.fillStyle = NES.gold;
    ctx.fillRect(llX - 2, standY, llW + 4, 3);
    // ink stand
    ctx.fillStyle = NES.ink;
    ctx.fillRect(llX + 1, standY + 3, llW - 2, 11);
    // gold foot
    ctx.fillStyle = NES.gold;
    ctx.fillRect(llX - 3, standY + 14, llW + 6, 2);
    // candy glass body
    ctx.fillStyle = NES.candy;
    ctx.fillRect(llX, bodyY, llW, bodyH);
    // ink outline of glass
    ctx.strokeStyle = NES.ink;
    ctx.lineWidth = 1;
    ctx.strokeRect(llX, bodyY, llW, bodyH);
    // vertical bright beam inside glass (white pixel column)
    ctx.fillStyle = NES.white;
    ctx.fillRect(llX + Math.floor(llW / 2), bodyY + 1, 1, bodyH - 2);
    // gold dome cap on top
    ctx.fillStyle = NES.gold;
    ctx.fillRect(llX + 1, llY, llW - 2, 6);
    ctx.fillStyle = NES.ink;
    ctx.fillRect(llX + 1, llY, llW - 2, 1);    // top edge ink line
    ctx.fillStyle = NES.gold;
    ctx.fillRect(llX + 5, llY - 2, llW - 10, 2);  // tiny finial nub
    // ===== LAVA BLOBS — 3 morphing circles drifting inside the glass =====
    if (!room.lavaBlobs) {
      room.lavaBlobs = [
        { yPhase: 0.0, speed: 0.55, size: 4, color: NES.magenta, xPhase: 0.0 },
        { yPhase: 2.1, speed: 0.42, size: 3, color: NES.pink,    xPhase: 1.7 },
        { yPhase: 4.5, speed: 0.62, size: 4, color: NES.magenta, xPhase: 3.4 },
      ];
    }
    ctx.save();
    // clip to glass body so blobs can't escape
    ctx.beginPath();
    ctx.rect(llX + 1, bodyY + 1, llW - 2, bodyH - 2);
    ctx.clip();
    for (const lb of room.lavaBlobs) {
      // vertical bob — triangle wave 0..1..0 over a 2-cycle period
      const t = (now * 0.0006 * lb.speed + lb.yPhase) % 2;
      const yOff = (t < 1 ? t : 2 - t) * (bodyH - 10);
      const xOff = Math.sin(now * 0.0011 + lb.xPhase) * 3;
      const bx = llX + llW / 2 + xOff;
      const by = bodyY + 5 + yOff;
      // pulse scale (lava-blob morph)
      const pulse = 1 + Math.sin(now * 0.003 + lb.xPhase) * 0.18;
      const r = lb.size * pulse;
      // translucent halo for the "neon" feel
      ctx.globalAlpha = 0.50;
      ctx.fillStyle = lb.color;
      ctx.fillRect(bx - r - 1, by - r - 1, r * 2 + 2, r * 2 + 2);
      ctx.globalAlpha = 1;
      // blob body — chunky pixel disc (cross of rectangles for round look)
      ctx.fillStyle = lb.color;
      ctx.fillRect(bx - r + 1, by - r, r * 2 - 2, r * 2);
      ctx.fillRect(bx - r, by - r + 1, r * 2, r * 2 - 2);
      // inner bright pinprick
      ctx.fillStyle = NES.white;
      ctx.fillRect(bx - 1, by - 1, 1, 1);
    }
    ctx.restore();

    // ----- BUBBLING AQUARIUM (back-right floor) -----
    // Fish swim back and forth, bubbles rise. NES-strict palette:
    // cyan (water) + plum (gravel) + lime (plants) + gold (fish) + ink + white (bubbles).
    const aqX = 408, aqY = 220, aqW = 64, aqH = 52;
    // stand
    ctx.fillStyle = NES.ink;
    ctx.fillRect(aqX - 2, aqY + aqH, aqW + 4, 4);
    // tank water
    ctx.fillStyle = NES.cyan;
    ctx.fillRect(aqX, aqY, aqW, aqH);
    // gravel
    ctx.fillStyle = NES.plum;
    ctx.fillRect(aqX, aqY + aqH - 6, aqW, 6);
    // plants — chunky vertical lime rectangles, sway via sin
    if (!room._aqT) room._aqT = now;
    const aqDt = Math.min(0.05, (now - room._aqT) / 1000);
    room._aqT = now;
    ctx.fillStyle = NES.lime;
    for (let i = 0; i < 3; i++) {
      const baseX = aqX + 8 + i * 16;
      const sway = Math.sin(now * 0.002 + i * 1.3) * 1.5;
      ctx.fillRect(baseX + sway, aqY + aqH - 18, 2, 12);
      ctx.fillRect(baseX + sway - 2, aqY + aqH - 12, 2, 6);
      ctx.fillRect(baseX + sway + 2, aqY + aqH - 14, 2, 8);
    }
    // fish — 2 gold fish patrolling
    if (!room.fish) {
      room.fish = [
        { x: 12, y: 14, dir: 1, v: 14 + Math.random() * 6 },
        { x: 40, y: 28, dir: -1, v: 12 + Math.random() * 6 },
      ];
    }
    for (const f of room.fish) {
      f.x += f.dir * f.v * aqDt;
      if (f.x > aqW - 14) f.dir = -1;
      if (f.x < 4)        f.dir = 1;
      // body (3px tall gold rectangle)
      ctx.fillStyle = NES.gold;
      ctx.fillRect(aqX + f.x, aqY + f.y, 7, 3);
      // tail (triangle-ish 2-pixel tail behind direction)
      ctx.fillRect(aqX + f.x + (f.dir > 0 ? -2 : 7), aqY + f.y + 1, 2, 1);
      // eye
      ctx.fillStyle = NES.ink;
      ctx.fillRect(aqX + f.x + (f.dir > 0 ? 5 : 1), aqY + f.y, 1, 1);
    }
    // bubbles — rising white pixels
    if (!room.bubbles) {
      room.bubbles = [];
      for (let i = 0; i < 6; i++) room.bubbles.push({
        x: 8 + Math.random() * (aqW - 16),
        y: Math.random() * (aqH - 8),
        v: 8 + Math.random() * 8,
        seed: Math.random() * 6.28,
      });
    }
    ctx.fillStyle = NES.white;
    for (const b of room.bubbles) {
      b.y -= b.v * aqDt;
      if (b.y < 4) {
        b.y = aqH - 8;
        b.x = 8 + Math.random() * (aqW - 16);
      }
      const sway = Math.sin(now * 0.003 + b.seed) * 1.4;
      ctx.fillRect(aqX + b.x + sway, aqY + b.y, 2, 2);
    }
    // ===== NEON ISOPODS =====
    // 3 segmented pill-bugs crawling along the gravel in neon NES colors.
    // Each is a 6×7 body with 3 ink stripes for segments + antennae nubs +
    // a translucent 1-pixel halo for the "neon" glow. Direction flips at
    // tank edges, gentle vertical bob via sin.
    if (!room.isopods) {
      room.isopods = [
        { x: 10, color: NES.magenta, dir:  1, v: 4 + Math.random() * 3, bobSeed: 0.0 },
        { x: 30, color: NES.lime,    dir: -1, v: 3 + Math.random() * 3, bobSeed: 1.7 },
        { x: 48, color: NES.cyan,    dir:  1, v: 4 + Math.random() * 3, bobSeed: 3.4 },
      ];
    }
    for (const ip of room.isopods) {
      ip.x += ip.dir * ip.v * aqDt;
      if (ip.x > aqW - 10) ip.dir = -1;
      if (ip.x < 4)        ip.dir = 1;
      const bob = Math.sin(now * 0.005 + ip.bobSeed) * 0.6;
      const ix = aqX + ip.x;
      const iy = aqY + aqH - 4 + bob;
      // neon halo (translucent same-color bloom around body)
      ctx.globalAlpha = 0.45;
      ctx.fillStyle = ip.color;
      ctx.fillRect(ix - 1, iy - 8, 8, 8);
      ctx.globalAlpha = 1;
      // body
      ctx.fillStyle = ip.color;
      ctx.fillRect(ix, iy - 7, 6, 7);
      // segment stripes (ink horizontal lines for that pill-bug look)
      ctx.fillStyle = NES.ink;
      ctx.fillRect(ix, iy - 5, 6, 1);
      ctx.fillRect(ix, iy - 3, 6, 1);
      ctx.fillRect(ix, iy - 1, 6, 1);
      // antennae nubs (face direction of travel)
      ctx.fillStyle = ip.color;
      if (ip.dir > 0) {
        ctx.fillRect(ix + 5, iy - 9, 1, 2);
        ctx.fillRect(ix + 4, iy - 8, 1, 1);
      } else {
        ctx.fillRect(ix, iy - 9, 1, 2);
        ctx.fillRect(ix + 1, iy - 8, 1, 1);
      }
    }

    // tank glass border
    ctx.strokeStyle = NES.candy;
    ctx.lineWidth = 2;
    ctx.strokeRect(aqX, aqY, aqW, aqH);
    // glass shine — 2 vertical white pixel lines in upper-left
    ctx.fillStyle = NES.white;
    ctx.fillRect(aqX + 4, aqY + 4, 1, 8);
    ctx.fillRect(aqX + 6, aqY + 4, 1, 4);

    // ===== STATIONS =====
    const stations = visibleStations();
    ctx.font = '32px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (const st of stations) {
      // soft pink halo under each station
      ctx.fillStyle = 'rgba(255,95,191,0.30)';
      ctx.beginPath();
      ctx.ellipse(st.x, st.y + 18, 22, 6, 0, 0, Math.PI * 2);
      ctx.fill();
      // little drop-shadow then the emoji glyph itself
      ctx.fillText(st.em, st.x, st.y);
    }
    ctx.textAlign = 'left'; ctx.textBaseline = 'alphabetic';

    // ===== ROOM CAT AI tick =====
    const dt = Math.min(0.05, (now - (room._lastT || now)) / 1000);
    room._lastT = now;
    const rc = room.cat;
    rc.age += dt;
    rc.stateT -= dt;
    rc.mouthOpen *= 0.92;
    rc.blush *= 0.96;
    rc.happyT = Math.max(0, rc.happyT - dt);
    if (rc.blinkT > 0) rc.blinkT = Math.max(0, rc.blinkT - dt * 6);
    rc.blinkNext -= dt;
    if (rc.blinkNext <= 0) { rc.blinkT = 1; rc.blinkNext = 4 + Math.random() * 5; }

    // ===== CURSOR CHASE OVERRIDES AI =====
    // When the cursor is over the room canvas, Null abandons her wander
    // schedule and chases it directly. She bats when within 50 world-px
    // of the cursor, with a 380ms cooldown. When the cursor leaves, she
    // resumes autonomous wandering on the next stateT tick.
    if (room.cursor) {
      const tx = Math.max(50, Math.min(W - 50, room.cursor.x));
      rc.target = { x: tx, y: 280, kind: 'cursor' };
      rc.state  = 'walk_to';
      rc.stateT = 1;       // keep refreshing while cursor present
      // bat trigger
      const dx = room.cursor.x - rc.x;
      const dy = room.cursor.y - (rc.y - 30);
      const dist = Math.hypot(dx, dy);
      if (dist < 60 && now - rc.lastBatT > 380 && rc.batT < 0.15) {
        rc.batT = 1;
        rc.batAngle = Math.atan2(dy, dx);
        rc.lastBatT = now;
        const sx = room.canvas.offsetLeft + (room.cursor.x / W) * room.dispW;
        const sy = room.canvas.offsetTop  + (room.cursor.y / H) * room.dispH;
        applyPet(sx, sy, 'room');
        spawnRoomHeart(rc.x, rc.y - 30);
      }
    } else if (rc.stateT <= 0) {
      // pick a new behavior — 75% visit a station if any exist
      if (stations.length > 0 && Math.random() < 0.75) {
        const s = stations[Math.floor(Math.random() * stations.length)];
        rc.target = { x: s.x, y: s.y, kind: s.kind };
        rc.state  = 'walk_to';
        rc.stateT = 7 + Math.random() * 5;
      } else {
        // random wander point on the floor
        rc.target = { x: 60 + Math.random() * (W - 120), y: 280, kind: 'wander' };
        rc.state  = 'walk_to';
        rc.stateT = 4 + Math.random() * 3;
      }
    }
    rc.batT *= 0.90;  // bat anim decay

    // walk toward target
    if (rc.target) {
      const dx = rc.target.x - rc.x;
      const speed = room.cursor ? 56 : 36;     // chase faster than wander
      if (Math.abs(dx) > 4) {
        rc.facing = dx > 0 ? 1 : -1;
        rc.x += Math.sign(dx) * Math.min(Math.abs(dx), speed * dt);
        rc.walkPhase += dt * 8;
      } else {
        // arrived — switch to station-specific idle (skip if chasing cursor;
        // we want to keep her bat-ready stance, not lull into nap mode)
        if (rc.state === 'walk_to' && rc.target.kind !== 'cursor') {
          rc.state = (rc.target.kind === 'wander') ? 'idle'
                   : (rc.target.kind === 'pillow' || rc.target.kind === 'sakura') ? 'sleep'
                   : (rc.target.kind === 'yarn') ? 'play'
                   : (rc.target.kind === 'milk' || rc.target.kind === 'sushi') ? 'eat'
                   : 'idle';
          rc.stateT = 4 + Math.random() * 4;
          if (rc.state === 'sleep' || rc.state === 'eat' || rc.state === 'play') {
            rc.happyT = rc.stateT;       // sustained happy face during the activity
            rc.blush  = 0.8;
          }
        }
      }
    }

    // periodic floating heart from the cat (visual cps feedback,
    // pulse-rate scales with cps so big idlers see lots of love).
    const cpsNow = cps();
    if (cpsNow > 0) {
      const interval = Math.max(0.25, 1.4 - Math.log10(1 + cpsNow) * 0.18);
      if (now - room.lastHeartT > interval * 1000) {
        room.lastHeartT = now;
        spawnRoomHeart(rc.x, rc.y - 28);
      }
    }

    // ===== DRAW THE ROOM CAT =====
    drawRoomCat(ctx, rc);

    // ===== ROOM HEART PARTICLES =====
    if (!room.hearts) room.hearts = [];
    for (let i = room.hearts.length - 1; i >= 0; i--) {
      const h = room.hearts[i];
      h.t += dt;
      if (h.t >= h.life) { room.hearts.splice(i, 1); continue; }
      const p = h.t / h.life;
      const yy = h.y - p * 36;
      const xx = h.x + Math.sin(h.t * 4 + h.seed) * 6;
      ctx.globalAlpha = (1 - p) * 0.95;
      ctx.fillStyle = h.color;
      drawHeart(ctx, xx, yy, 10);
    }
    ctx.globalAlpha = 1;

    // mega uwu indicator
    if (performance.now() < state.megaUwuUntil) {
      const remaining = (state.megaUwuUntil - performance.now()) / 1000;
      ctx.fillStyle = NES.gold;
      ctx.font = 'bold 11px DotGothic16, monospace';
      ctx.textAlign = 'center';
      ctx.fillText('MEGA UWU ' + remaining.toFixed(1) + 's', W / 2, 24);
      ctx.textAlign = 'left';
    }
  }

  function spawnRoomHeart(x, y) {
    if (!room.hearts) room.hearts = [];
    if (room.hearts.length > 24) room.hearts.shift();
    const colors = [NES.pink, NES.pink, '#ffd1e8', NES.gold];
    room.hearts.push({
      x: x + (Math.random() - 0.5) * 12,
      y, t: 0, life: 1.2 + Math.random() * 0.4,
      color: colors[Math.floor(Math.random() * colors.length)],
      seed: Math.random() * 6.28,
    });
  }

  function drawHeart(ctx, x, y, s) {
    // s = full height (hearts are taller than wide-ish)
    const w = s, h = s;
    ctx.beginPath();
    ctx.moveTo(x, y + h * 0.35);
    ctx.bezierCurveTo(x, y, x - w * 0.55, y, x - w * 0.55, y + h * 0.30);
    ctx.bezierCurveTo(x - w * 0.55, y + h * 0.55, x, y + h * 0.75, x, y + h);
    ctx.bezierCurveTo(x, y + h * 0.75, x + w * 0.55, y + h * 0.55, x + w * 0.55, y + h * 0.30);
    ctx.bezierCurveTo(x + w * 0.55, y, x, y, x, y + h * 0.35);
    ctx.fill();
  }

  function drawRoomCat(ctx, rc) {
    // Smaller variant of the pet-view cat, scaled & flippable, with simple
    // walking bob and per-state expressions.
    const s = 0.55;     // sprite scale
    const bob = (rc.state === 'walk_to' && rc.target) ? Math.abs(Math.sin(rc.walkPhase)) * 2.5 : 0;
    ctx.save();
    ctx.translate(rc.x, rc.y - bob);
    ctx.scale(rc.facing * s, s);

    // tail (simpler 1-segment quadratic)
    ctx.strokeStyle = NES.pink;
    ctx.lineWidth = 8;
    ctx.lineCap = 'round';
    const wag = Math.sin(rc.age * 4) * 10;
    ctx.beginPath();
    ctx.moveTo(-44, 18);
    ctx.quadraticCurveTo(-72 + wag * 0.3, -4, -86 + wag * 0.6, -28 + wag);
    ctx.stroke();

    // body — flat NES pink + candy belly highlight + ink outline
    ctx.fillStyle = NES.pink;
    ctx.beginPath();
    ctx.ellipse(0, 24, 48, 40, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = NES.ink;
    ctx.lineWidth = 2.4;
    ctx.stroke();
    ctx.fillStyle = NES.candy;
    ctx.beginPath();
    ctx.ellipse(0, 30, 22, 18, 0, 0, Math.PI * 2);
    ctx.fill();

    // paws
    ctx.fillStyle = NES.candy;
    [{x:-18, y:58}, {x:18, y:58}].forEach(p => {
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, 12, 8, 0, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
    });

    // head — flat NES pink + candy snout + ink outline
    const headY = -32;
    ctx.fillStyle = NES.pink;
    ctx.beginPath();
    ctx.ellipse(0, headY, 42, 38, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.fillStyle = NES.candy;
    ctx.beginPath();
    ctx.ellipse(0, headY + 4, 18, 12, 0, 0, Math.PI * 2);
    ctx.fill();

    // ears
    ctx.fillStyle = NES.pink;
    ctx.beginPath(); ctx.moveTo(-32, headY - 20); ctx.lineTo(-18, headY - 48); ctx.lineTo(-10, headY - 26); ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(32, headY - 20); ctx.lineTo(18, headY - 48); ctx.lineTo(10, headY - 26); ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = NES.pink;
    ctx.beginPath(); ctx.moveTo(-26, headY - 24); ctx.lineTo(-18, headY - 42); ctx.lineTo(-13, headY - 26); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(26, headY - 24); ctx.lineTo(18, headY - 42); ctx.lineTo(13, headY - 26); ctx.closePath(); ctx.fill();

    // eyes — sleeping if state is sleep, otherwise normal/blink
    const isHappy = rc.happyT > 0 && (rc.state === 'play' || rc.state === 'eat');
    const isSleeping = rc.state === 'sleep';
    const blinkAmt = rc.blinkT;
    [-13, 13].forEach(ex => {
      if (isSleeping) {
        // sleeping closed-eye line ~ ~ ~
        ctx.strokeStyle = NES.ink;
        ctx.lineWidth = 2.4;
        ctx.beginPath();
        ctx.moveTo(ex - 6, headY + 2);
        ctx.quadraticCurveTo(ex, headY + 5, ex + 6, headY + 2);
        ctx.stroke();
      } else if (isHappy) {
        ctx.strokeStyle = NES.ink;
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(ex - 6, headY + 4);
        ctx.quadraticCurveTo(ex, headY - 4, ex + 6, headY + 4);
        ctx.stroke();
      } else if (blinkAmt > 0.3) {
        ctx.strokeStyle = NES.ink;
        ctx.lineWidth = 2.4;
        ctx.beginPath();
        ctx.moveTo(ex - 6, headY + 2);
        ctx.lineTo(ex + 6, headY + 2);
        ctx.stroke();
      } else if (state.pixel) {
        // PIXEL MODE — same lime-green glowing slit eyes as the pet view,
        // adapted to the room cat's slightly smaller eye size.
        const eyeH = 10 - blinkAmt * 7;
        // dark void sclera
        ctx.fillStyle = NES.ink;
        ctx.beginPath();
        ctx.ellipse(ex, headY + 2, 6, eyeH, 0, 0, Math.PI * 2);
        ctx.fill();
        // lime glow bloom
        const glowStr = 0.55 + rc.batT * 0.4;
        ctx.fillStyle = `rgba(170,255,40,${glowStr})`;
        ctx.beginPath();
        ctx.ellipse(ex, headY + 2, 8, eyeH + 2, 0, 0, Math.PI * 2);
        ctx.fill();
        // crisp lime iris
        ctx.fillStyle = NES.lime;
        ctx.beginPath();
        ctx.ellipse(ex, headY + 3, 4, Math.max(1, eyeH - 3), 0, 0, Math.PI * 2);
        ctx.fill();
        // dark slit pupil
        ctx.fillStyle = NES.ink;
        ctx.beginPath();
        ctx.ellipse(ex, headY + 3, 1.2, Math.max(1, eyeH - 4), 0, 0, Math.PI * 2);
        ctx.fill();
        // sparkle
        ctx.fillStyle = NES.white;
        ctx.beginPath(); ctx.arc(ex - 1, headY, 1.4, 0, Math.PI * 2); ctx.fill();
      } else {
        const eyeH = 10 - blinkAmt * 7;
        ctx.fillStyle = NES.white;
        ctx.beginPath();
        ctx.ellipse(ex, headY + 2, 6, eyeH, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = NES.ink;
        ctx.beginPath();
        ctx.ellipse(ex, headY + 3, 4, Math.max(1, eyeH - 3), 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = NES.white;
        ctx.beginPath(); ctx.arc(ex - 1, headY, 1.5, 0, Math.PI * 2); ctx.fill();
      }
    });

    // cheeks
    const cheekA = 0.45 + rc.blush * 0.4;
    ctx.fillStyle = `rgba(255,127,184,${cheekA})`;
    ctx.beginPath(); ctx.ellipse(-22, headY + 12, 5, 3, 0, 0, Math.PI * 2); ctx.fill();
    ctx.beginPath(); ctx.ellipse(22, headY + 12, 5, 3, 0, 0, Math.PI * 2); ctx.fill();

    // mouth
    if (rc.state === 'eat' || rc.mouthOpen > 0.2) {
      ctx.fillStyle = NES.ink;
      ctx.beginPath(); ctx.ellipse(0, headY + 15, 4, 3, 0, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = NES.pink;
      ctx.beginPath(); ctx.ellipse(0, headY + 16, 2.5, 1.4, 0, 0, Math.PI * 2); ctx.fill();
    } else {
      ctx.strokeStyle = NES.ink;
      ctx.lineWidth = 2;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-5, headY + 11);
      ctx.quadraticCurveTo(-2, headY + 15, 0, headY + 12);
      ctx.quadraticCurveTo(2, headY + 15, 5, headY + 11);
      ctx.stroke();
    }

    ctx.restore();

    // ===== BAT PAW SWIPE (room view) =====
    if (rc.batT > 0.05) {
      const cx0 = rc.x;
      const cy0 = rc.y - 30;     // around the head
      const reach = 36 * Math.sin((1 - rc.batT) * Math.PI);
      const px = cx0 + Math.cos(rc.batAngle) * reach;
      const py = cy0 + Math.sin(rc.batAngle) * reach;
      // motion arcs
      ctx.strokeStyle = 'rgba(255,255,255,0.55)';
      ctx.lineWidth = 1.6;
      for (let i = 0; i < 3; i++) {
        const r = 9 + i * 5;
        ctx.globalAlpha = (0.6 - i * 0.18) * rc.batT;
        ctx.beginPath();
        ctx.arc(cx0 + Math.cos(rc.batAngle) * 14, cy0 + Math.sin(rc.batAngle) * 14, r,
                rc.batAngle - 0.5, rc.batAngle + 0.5);
        ctx.stroke();
      }
      ctx.globalAlpha = 1;
      // paw pad
      ctx.fillStyle = NES.candy;
      ctx.strokeStyle = NES.ink;
      ctx.lineWidth = 1.6;
      ctx.beginPath();
      ctx.arc(px, py, 7, 0, Math.PI * 2);
      ctx.fill(); ctx.stroke();
      // pink toe beans
      ctx.fillStyle = NES.pink;
      const beanAng = rc.batAngle + Math.PI;
      for (let i = -1; i <= 1; i++) {
        const a = beanAng + i * 0.4;
        ctx.beginPath();
        ctx.arc(px + Math.cos(a) * 4, py + Math.sin(a) * 4, 1.1, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // sleep z's float above head
    if (rc.state === 'sleep') {
      ctx.save();
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.font = 'bold 18px Bagel Fat One, sans-serif';
      ctx.textAlign = 'center';
      const zSway = Math.sin(rc.age * 1.2) * 3;
      ctx.fillText('z', rc.x + 22 + zSway, rc.y - 60);
      ctx.fillText('z', rc.x + 30 + zSway, rc.y - 76);
      ctx.fillText('Z', rc.x + 38 + zSway, rc.y - 94);
      ctx.restore();
    }
  }

  function drawCat(now) {
    const ctx = cat.ctx, sz = cat.size;
    if (!ctx) return;
    ctx.clearRect(0, 0, sz, sz);

    // bounce decays
    cat.bounce *= 0.86;
    cat.blush *= 0.94;
    cat.mouthOpen *= 0.86;
    cat.happyT = Math.max(0, cat.happyT - 0.016);

    // blink timer
    cat.age += 0.016;
    if (cat.age >= cat.blinkNext) {
      cat.blinkT = 1;
      cat.blinkNext = cat.age + 4 + Math.random() * 4.5;
    }
    cat.blinkT = Math.max(0, cat.blinkT - 0.12);

    cat.tailPhase += 0.04;

    const stage = evoStage().name;
    const cx = sz * 0.5;
    const cy = sz * 0.55;
    const scale = (sz / 320) * (1 - cat.bounce * 0.10);

    // ===== CURSOR-CHASE LERP =====
    // Null leans her body toward the cursor (clamped) so it reads as her
    // following the mouse, then bats when within range. When cursor leaves,
    // followX/Y decay back to 0 (centered).
    if (cat.cursor) {
      const dx = cat.cursor.x - cx;
      const dy = cat.cursor.y - cy;
      const tgX = Math.max(-60, Math.min(60, dx * 0.35));
      const tgY = Math.max(-26, Math.min(26, dy * 0.30));
      cat.followX += (tgX - cat.followX) * 0.14;
      cat.followY += (tgY - cat.followY) * 0.14;
    } else {
      cat.followX *= 0.92;
      cat.followY *= 0.92;
    }
    cat.batT *= 0.90;     // bat anim decay (~7-frame half-life)

    // ===== BAT TRIGGER =====
    // When cursor is inside the canvas AND close enough to Null's current
    // (followed) position AND cooldown has elapsed, fire a bat: paw swipe
    // animation + applyPet reward at the cursor's stage-coord position.
    if (cat.cursor) {
      const cx0 = cx + cat.followX;
      const cy0 = cy + cat.followY - 30;   // bat-zone is around the head
      const dx = cat.cursor.x - cx0;
      const dy = cat.cursor.y - cy0;
      const dist = Math.hypot(dx, dy);
      if (dist < 84 && now - cat.lastBatT > 380 && cat.batT < 0.15) {
        cat.batT = 1;
        cat.batAngle = Math.atan2(dy, dx);
        cat.lastBatT = now;
        // stage coords of cursor (canvas offset + cursor in display px,
        // which equals cat.cursor since CSS px == cat.size logical units)
        const sx = cat.canvas.offsetLeft + cat.cursor.x;
        const sy = cat.canvas.offsetTop  + cat.cursor.y;
        applyPet(sx, sy, 'pet');
      }
    }

    ctx.save();
    ctx.translate(cx + cat.followX, cy + cat.followY + cat.bounce * 6);
    ctx.scale(scale, scale);

    // ===== TAIL (NES sub-palette: pink + ink + white tip) =====
    const wag = Math.sin(cat.tailPhase * 1.6 + cat.bounce * 4) * (12 + cat.bounce * 14);
    ctx.strokeStyle = NES.pink;
    ctx.lineWidth = 12;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(-50, 24);
    ctx.quadraticCurveTo(-86 + wag * 0.3, 0 + wag * 0.4, -98 + wag * 0.6, -32 + wag);
    ctx.stroke();
    ctx.fillStyle = NES.white;
    ctx.beginPath();
    ctx.arc(-98 + wag * 0.6, -32 + wag, 5, 0, Math.PI * 2);
    ctx.fill();

    // ===== BODY (NES sub-palette: pink fill + candy belly + ink outline) =====
    // Replaced radial gradient with a flat pink fill + a smaller candy
    // belly oval — this is exactly how NES sprites suggested shading: two
    // flat-fill shapes layered, no in-between gradient stops.
    ctx.fillStyle = NES.pink;
    ctx.beginPath();
    ctx.ellipse(0, 30, 56, 48, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = NES.ink;
    ctx.lineWidth = 2.5;
    ctx.stroke();
    // candy belly (highlight as a flat-fill secondary shape)
    ctx.fillStyle = NES.candy;
    ctx.beginPath();
    ctx.ellipse(0, 38, 28, 22, 0, 0, Math.PI * 2);
    ctx.fill();

    // ===== PAWS (NES: candy fill + ink outline + magenta toe beans) =====
    ctx.strokeStyle = NES.ink;
    ctx.lineWidth = 2;
    [{x:-22, y:70}, {x:22, y:70}].forEach(p => {
      ctx.fillStyle = NES.candy;
      ctx.beginPath();
      ctx.ellipse(p.x, p.y, 14, 9, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.fillStyle = NES.magenta;
      [-4, 0, 4].forEach(dx => {
        ctx.beginPath();
        ctx.arc(p.x + dx, p.y + 1, 1.5, 0, Math.PI * 2);
        ctx.fill();
      });
    });

    // ===== HEAD (NES: pink fill + candy mask + ink outline) =====
    const headY = -38;
    ctx.fillStyle = NES.pink;
    ctx.beginPath();
    ctx.ellipse(0, headY, 50, 44, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = NES.ink;
    ctx.lineWidth = 2.5;
    ctx.stroke();
    // candy snout/forehead (small flat-fill highlight)
    ctx.fillStyle = NES.candy;
    ctx.beginPath();
    ctx.ellipse(0, headY + 6, 22, 14, 0, 0, Math.PI * 2);
    ctx.fill();

    // ===== EARS (NES: pink outer + magenta inner + ink outline) =====
    ctx.fillStyle = NES.pink;
    ctx.strokeStyle = NES.ink;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(-38, headY - 24);
    ctx.lineTo(-22, headY - 56);
    ctx.lineTo(-12, headY - 32);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(38, headY - 24);
    ctx.lineTo(22, headY - 56);
    ctx.lineTo(12, headY - 32);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = NES.magenta;
    ctx.beginPath();
    ctx.moveTo(-32, headY - 28);
    ctx.lineTo(-22, headY - 48);
    ctx.lineTo(-15, headY - 32);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(32, headY - 28);
    ctx.lineTo(22, headY - 48);
    ctx.lineTo(15, headY - 32);
    ctx.closePath();
    ctx.fill();

    // ===== EYES =====
    const eyeY = headY + 2;
    const isHappy = cat.happyT > 0;
    const blinkAmt = cat.blinkT;
    [-16, 16].forEach(ex => {
      if (isHappy) {
        // ^^ smile eyes
        ctx.strokeStyle = NES.ink;
        ctx.lineWidth = 4;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(ex - 8, eyeY + 2);
        ctx.quadraticCurveTo(ex, eyeY - 8, ex + 8, eyeY + 2);
        ctx.stroke();
      } else if (blinkAmt > 0.3) {
        // closed eye line
        ctx.strokeStyle = NES.ink;
        ctx.lineWidth = 3;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(ex - 7, eyeY);
        ctx.lineTo(ex + 7, eyeY);
        ctx.stroke();
      } else if (state.pixel) {
        // PIXEL MODE — Null's eyes glow lime green and pierce through the
        // neon shadow per chat. Layered render: dark void sclera, lime-green
        // glowing iris that pulses with bat tension, white pinprick sparkle.
        // The drop-shadow "glow" at low res reads as bright bloom around
        // the eye — pierces through the cat's pink shadow palette.
        const eyeH = 12 - blinkAmt * 9;
        // dark sclera (almost black) so the green pops
        ctx.fillStyle = NES.ink;
        ctx.beginPath();
        ctx.ellipse(ex, eyeY, 8, eyeH, 0, 0, Math.PI * 2);
        ctx.fill();
        // lime green glow pass (drawn larger + transparent for bloom)
        const glowStr = 0.55 + cat.batT * 0.4;
        ctx.fillStyle = `rgba(170,255,40,${glowStr})`;
        ctx.beginPath();
        ctx.ellipse(ex, eyeY, 10, eyeH + 2, 0, 0, Math.PI * 2);
        ctx.fill();
        // crisp lime iris core
        ctx.fillStyle = NES.lime;
        ctx.beginPath();
        ctx.ellipse(ex, eyeY + 1, 5, Math.max(1, eyeH - 4), 0, 0, Math.PI * 2);
        ctx.fill();
        // dark slit pupil (cat-style vertical slit) for that piercing look
        ctx.fillStyle = NES.ink;
        ctx.beginPath();
        ctx.ellipse(ex, eyeY + 1, 1.5, Math.max(1, eyeH - 5), 0, 0, Math.PI * 2);
        ctx.fill();
        // white sparkle
        ctx.fillStyle = NES.white;
        ctx.beginPath();
        ctx.arc(ex - 2, eyeY - 3, 1.6, 0, Math.PI * 2);
        ctx.fill();
      } else {
        // big sparkly eye — sclera + pink iris + white sparkle (smooth mode)
        const eyeH = 12 - blinkAmt * 9;
        ctx.fillStyle = NES.white;
        ctx.beginPath();
        ctx.ellipse(ex, eyeY, 8, eyeH, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = NES.ink;
        ctx.lineWidth = 1.8;
        ctx.stroke();
        // pupil
        ctx.fillStyle = NES.ink;
        ctx.beginPath();
        ctx.ellipse(ex, eyeY + 1, 5, Math.max(1, eyeH - 4), 0, 0, Math.PI * 2);
        ctx.fill();
        // sparkles
        ctx.fillStyle = NES.white;
        ctx.beginPath();
        ctx.arc(ex - 2, eyeY - 3, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(ex + 3, eyeY + 2, 1, 0, Math.PI * 2);
        ctx.fill();
      }
    });

    // ===== CHEEKS =====
    const cheekAlpha = 0.5 + cat.blush * 0.45;
    ctx.fillStyle = `rgba(255,127,184,${cheekAlpha})`;
    ctx.beginPath();
    ctx.ellipse(-26, headY + 12, 7, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(26, headY + 12, 7, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    // ===== MOUTH =====
    const mo = cat.mouthOpen;
    if (mo > 0.2) {
      // open mouth (catching/mid-pet)
      ctx.fillStyle = NES.ink;
      ctx.beginPath();
      ctx.ellipse(0, headY + 16, 5, 3 + mo * 2.5, 0, 0, Math.PI * 2);
      ctx.fill();
      // tongue
      ctx.fillStyle = NES.pink;
      ctx.beginPath();
      ctx.ellipse(0, headY + 17 + mo * 1.5, 3, 1.5, 0, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // tiny w mouth — uwu
      ctx.strokeStyle = NES.ink;
      ctx.lineWidth = 2.4;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(-6, headY + 12);
      ctx.quadraticCurveTo(-3, headY + 17, 0, headY + 13);
      ctx.quadraticCurveTo(3, headY + 17, 6, headY + 12);
      ctx.stroke();
    }

    // ===== ACCESSORIES BY STAGE =====
    const lifetime = state.lifetime;
    if (lifetime >= 1000) {
      // bow on left ear
      ctx.fillStyle = NES.pink;
      ctx.strokeStyle = NES.ink;
      ctx.lineWidth = 2;
      // left wing
      ctx.beginPath();
      ctx.moveTo(-32, headY - 48);
      ctx.quadraticCurveTo(-46, headY - 56, -42, headY - 38);
      ctx.quadraticCurveTo(-36, headY - 44, -30, headY - 44);
      ctx.fill(); ctx.stroke();
      // right wing
      ctx.beginPath();
      ctx.moveTo(-22, headY - 48);
      ctx.quadraticCurveTo(-12, headY - 56, -16, headY - 38);
      ctx.quadraticCurveTo(-22, headY - 44, -28, headY - 44);
      ctx.fill(); ctx.stroke();
      // knot
      ctx.fillStyle = NES.candy;
      ctx.beginPath();
      ctx.arc(-26, headY - 44, 3, 0, Math.PI * 2);
      ctx.fill();
    }
    if (lifetime >= 10000) {
      // sparkles around face
      ctx.fillStyle = NES.gold;
      const sparkles = [
        { x: 50, y: headY - 18, s: 4 },
        { x: -54, y: headY + 10, s: 3 },
        { x: 56, y: headY + 28, s: 3 },
      ];
      sparkles.forEach((sp, i) => {
        const sc = 1 + Math.sin(cat.age * 4 + i) * 0.25;
        ctx.save();
        ctx.translate(sp.x, sp.y);
        ctx.scale(sc, sc);
        // 4-point star
        ctx.beginPath();
        ctx.moveTo(0, -sp.s);
        ctx.lineTo(sp.s * 0.3, -sp.s * 0.3);
        ctx.lineTo(sp.s, 0);
        ctx.lineTo(sp.s * 0.3, sp.s * 0.3);
        ctx.lineTo(0, sp.s);
        ctx.lineTo(-sp.s * 0.3, sp.s * 0.3);
        ctx.lineTo(-sp.s, 0);
        ctx.lineTo(-sp.s * 0.3, -sp.s * 0.3);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      });
    }
    if (lifetime >= 100000) {
      // tiny crown
      ctx.fillStyle = NES.gold;
      ctx.strokeStyle = NES.gold;
      ctx.lineWidth = 1.6;
      ctx.beginPath();
      ctx.moveTo(-18, headY - 50);
      ctx.lineTo(-14, headY - 62);
      ctx.lineTo(-6, headY - 54);
      ctx.lineTo(0, headY - 64);
      ctx.lineTo(6, headY - 54);
      ctx.lineTo(14, headY - 62);
      ctx.lineTo(18, headY - 50);
      ctx.closePath();
      ctx.fill(); ctx.stroke();
      // jewels
      ctx.fillStyle = NES.pink;
      ctx.beginPath(); ctx.arc(-10, headY - 56, 1.6, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(0, headY - 60, 1.8, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(10, headY - 56, 1.6, 0, Math.PI * 2); ctx.fill();
    }
    if (lifetime >= 1000000) {
      // halo
