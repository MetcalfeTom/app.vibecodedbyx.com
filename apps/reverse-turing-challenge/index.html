<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reverse Turing Challenge</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%91%81%EF%B8%8F">
<meta name="description" content="Prove you are human. An AI examiner judges your creative responses to deliberately strange prompts.">
<meta property="og:title" content="Reverse Turing Challenge">
<meta property="og:description" content="Prove you are human. An AI examiner judges your creative responses to deliberately strange prompts.">
<meta property="og:url" content="https://sloppy.live/reverse-turing-challenge">
<meta property="og:image" content="https://image.pollinations.ai/prompt/dim%20interrogation%20room%20single%20warm%20spotlight%20glowing%20mechanical%20eye%20examining%20paper%20typewriter%20noir?width=1200&height=630&nologo=true&model=flux">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400;1,500&family=JetBrains+Mono:wght@400;500;600&family=Special+Elite&display=swap" rel="stylesheet">
<style>
:root{
  --void:#0a0708;
  --ink:#161013;
  --paper:#f0e4d2;
  --cream:#dccab0;
  --dim:#7a6868;
  --warm:#e8a428;
  --amber:#ffc060;
  --crim:#c92d2d;
  --green:#7dc97a;
  --eye:#fff4d0;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:var(--void);color:var(--cream);font-family:'Cormorant Garamond',serif;overflow-x:hidden}
body{
  background:radial-gradient(ellipse at 50% 30%, #2a1a0e 0%, #160e08 50%, #0a0708 100%);
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:1rem;
  overflow-y:auto;
}
/* film grain */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:50;
  background:repeating-linear-gradient(45deg, transparent 0 4px, rgba(232,180,80,0.012) 4px 5px);
  mix-blend-mode:screen;
}
/* vignette */
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:51;
  background:radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.65) 100%);
}

.wrap{
  max-width:48rem;width:100%;
  display:flex;flex-direction:column;align-items:center;
  z-index:5;position:relative;
  gap:1rem;
}

header{
  text-align:center;
  margin-top:0.4rem;
}
h1{
  font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:600;
  font-size:clamp(1.6rem, 4.5vw, 2.6rem);
  color:var(--paper);letter-spacing:-0.005em;
  text-shadow:0 0 12px rgba(232,180,80,0.3);
}
.subtitle{
  font-family:'JetBrains Mono',monospace;font-size:0.7rem;
  color:var(--dim);letter-spacing:0.32em;text-transform:uppercase;
  margin-top:0.3rem;
}

.progress{
  display:flex;gap:0.55rem;align-items:center;justify-content:center;
  margin:0.4rem 0 0.6rem;
}
.progress .dot{
  width:0.7rem;height:0.7rem;border-radius:50%;
  background:transparent;
  border:1px solid var(--dim);
  transition:all 0.3s;
}
.progress .dot.done.pass{background:var(--green);border-color:var(--green);box-shadow:0 0 8px rgba(125,201,122,0.5)}
.progress .dot.done.fail{background:var(--crim);border-color:var(--crim);box-shadow:0 0 8px rgba(201,45,45,0.6)}
.progress .dot.current{border-color:var(--amber);background:rgba(255,192,96,0.18);box-shadow:0 0 8px rgba(255,192,96,0.5)}

/* The AI examiner pane */
.examiner{
  background:linear-gradient(180deg, #14100c 0%, #0a0706 100%);
  border:1px solid #3a2818;
  border-radius:4px;
  padding:1.4rem 1.4rem 1.6rem;
  width:100%;
  text-align:center;position:relative;
  box-shadow:
    inset 0 0 30px rgba(232,180,80,0.06),
    0 8px 28px rgba(0,0,0,0.45);
}
.examiner::before{
  content:'';position:absolute;inset:8px;pointer-events:none;
  border:1px dashed rgba(232,180,80,0.08);border-radius:2px;
}
.eye{
  font-size:3.4rem;line-height:1;color:var(--eye);
  text-shadow:0 0 18px rgba(255,244,208,0.55), 0 0 36px rgba(255,192,96,0.35);
  margin-bottom:0.6rem;
  animation:eyeBlink 6s infinite;
}
@keyframes eyeBlink{
  0%,46%,50%,96%,100%{transform:scaleY(1)}
  48%, 98% {transform:scaleY(0.06)}
}
.examiner .label{
  font-family:'JetBrains Mono',monospace;font-size:0.62rem;
  color:var(--warm);letter-spacing:0.32em;text-transform:uppercase;
  margin-bottom:0.6rem;
}
.examiner .prompt{
  font-family:'Cormorant Garamond',serif;font-style:italic;font-weight:500;
  font-size:clamp(1.15rem, 3vw, 1.55rem);
  color:var(--paper);line-height:1.4;
  min-height:3rem;
}

/* response composer */
.composer{
  width:100%;display:flex;flex-direction:column;gap:0.5rem;
}
.composer textarea{
  background:#0e0a08;
  color:var(--paper);
  border:1px solid #3a2818;
  border-radius:3px;
  padding:0.75rem 0.95rem;
  font-family:'Special Elite',serif;
  font-size:1rem;line-height:1.45;
  resize:vertical;
  min-height:6rem;
  outline:none;
  caret-color:var(--amber);
}
.composer textarea:focus{border-color:var(--warm);box-shadow:0 0 12px rgba(232,180,80,0.18)}
.composer .row{display:flex;justify-content:space-between;align-items:center;gap:0.6rem;flex-wrap:wrap}
.charcount{
  font-family:'JetBrains Mono',monospace;font-size:0.66rem;
  color:var(--dim);letter-spacing:0.16em;text-transform:uppercase;
}
.btn{
  background:var(--warm);color:var(--ink);
  border:none;
  font-family:'JetBrains Mono',monospace;font-weight:600;
  font-size:0.78rem;letter-spacing:0.2em;text-transform:uppercase;
  padding:0.55rem 1.4rem;cursor:pointer;
  border-radius:2px;min-height:2.6rem;
  transition:all 0.14s;
}
.btn:hover{background:var(--amber);box-shadow:0 0 18px rgba(255,192,96,0.3)}
.btn:active{transform:translateY(1px)}
.btn:focus-visible{outline:2px solid var(--crim);outline-offset:2px}
.btn[disabled]{opacity:0.4;cursor:not-allowed;background:#3a2818;color:var(--dim)}
.btn.secondary{background:transparent;color:var(--dim);border:1px solid var(--dim)}
.btn.secondary:hover{color:var(--paper);border-color:var(--warm);box-shadow:none}

/* verdict reveal */
.verdict{
  background:#0e0a08;
  border:1px solid #3a2818;
  border-radius:3px;
  padding:0.95rem 1.1rem;
  width:100%;
  display:none;
}
.verdict.show{display:block;animation:verdictIn 0.5s ease-out}
@keyframes verdictIn{
  from{opacity:0;transform:translateY(-6px)}
  to  {opacity:1;transform:translateY(0)}
}
.verdict .head{
  display:flex;justify-content:space-between;align-items:baseline;gap:0.6rem;
  margin-bottom:0.5rem;flex-wrap:wrap;
}
.verdict .head .label{
  font-family:'JetBrains Mono',monospace;font-size:0.6rem;
  color:var(--warm);letter-spacing:0.28em;text-transform:uppercase;
}
.verdict .score{
  font-family:'Cormorant Garamond',serif;font-weight:600;
  font-size:2rem;color:var(--amber);line-height:1;
  text-shadow:0 0 12px rgba(255,192,96,0.45);
}
.verdict.fail .score{color:var(--crim);text-shadow:0 0 12px rgba(201,45,45,0.5)}
.verdict.pass .score{color:var(--green);text-shadow:0 0 12px rgba(125,201,122,0.45)}
.verdict .comment{
  font-family:'Special Elite',serif;font-style:italic;
  font-size:0.96rem;color:var(--cream);line-height:1.42;
}
.verdict .comment::before{
  content:'"';color:var(--dim);margin-right:0.15em;font-size:1.2em;
}
.verdict .comment::after{
  content:'"';color:var(--dim);margin-left:0.15em;font-size:1.2em;
}

/* final screen */
.final{
  display:none;
  background:linear-gradient(180deg, #14100c 0%, #0a0706 100%);
  border:1.5px solid var(--warm);
  padding:1.6rem 1.4rem;
  width:100%;text-align:center;
  box-shadow:0 0 40px rgba(232,180,80,0.15);
}
.final.show{display:block;animation:verdictIn 0.7s ease-out}
.final.pass{border-color:var(--green);box-shadow:0 0 40px rgba(125,201,122,0.2)}
.final.fail{border-color:var(--crim);box-shadow:0 0 40px rgba(201,45,45,0.25)}
.final .stamp{
  font-family:'JetBrains Mono',monospace;font-size:0.7rem;
  color:var(--warm);letter-spacing:0.34em;text-transform:uppercase;margin-bottom:0.4rem;
}
.final h2{
  font-family:'Cormorant Garamond',serif;font-weight:600;
  font-size:clamp(1.8rem, 5vw, 2.6rem);
  color:var(--paper);margin-bottom:0.4rem;letter-spacing:-0.01em;
}
.final.pass h2{color:var(--green)}
.final.fail h2{color:var(--crim)}
.final .summary{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:1.1rem;color:var(--cream);line-height:1.5;margin-bottom:1rem;
}
.final .avg{
  font-family:'Cormorant Garamond',serif;font-size:2.6rem;font-weight:600;
  margin-bottom:0.8rem;
}
.final .actions{display:flex;gap:0.7rem;justify-content:center;flex-wrap:wrap;margin-top:0.6rem}

.thinking{
  display:none;
  font-family:'JetBrains Mono',monospace;font-size:0.7rem;
  color:var(--warm);letter-spacing:0.24em;text-transform:uppercase;
  text-align:center;padding:0.4rem;
}
.thinking.show{display:block}
.thinking .dots{display:inline-block;width:1em;text-align:left}

footer{
  margin-top:1rem;
  font-family:'JetBrains Mono',monospace;font-size:0.62rem;
  letter-spacing:0.22em;color:var(--dim);text-transform:uppercase;text-align:center;
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Reverse Turing Challenge</h1>
    <div class="subtitle">prove · you · are · human</div>
  </header>

  <div class="progress" id="progress" aria-label="5 challenges">
    <span class="dot current"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span><span class="dot"></span>
  </div>

  <section class="examiner" id="examinerPane" aria-live="polite">
    <div class="eye" id="eye">◉</div>
    <div class="label">examiner · challenge <span id="cn">1</span> of 5</div>
    <div class="prompt" id="promptText">…</div>
  </section>

  <form class="composer" id="composer" autocomplete="off">
    <textarea id="answer" placeholder="type something only a human would say" required minlength="6"></textarea>
    <div class="row">
      <span class="charcount" id="charcount">0 chars</span>
      <button type="submit" class="btn" id="submitBtn">submit response</button>
    </div>
  </form>

  <div class="thinking" id="thinking">examiner deliberating<span class="dots" id="dots"></span></div>

  <section class="verdict" id="verdict" aria-live="polite">
    <div class="head">
      <span class="label">verdict</span>
      <span class="score" id="score">0</span>
    </div>
    <p class="comment" id="comment"></p>
    <div class="row" style="justify-content:flex-end;margin-top:0.7rem">
      <button type="button" class="btn secondary" id="nextBtn">next challenge →</button>
    </div>
  </section>

  <section class="final" id="final" aria-live="polite">
    <div class="stamp" id="stamp">final assessment</div>
    <h2 id="finalTitle">CERTIFIED HUMAN</h2>
    <div class="avg" id="finalAvg">0</div>
    <p class="summary" id="finalSummary">…</p>
    <div class="actions">
      <button type="button" class="btn" id="restartBtn">begin a new examination</button>
    </div>
  </section>

  <footer>06 · all judgements final · no biological tissue requested</footer>
</div>

<script>
'use strict';

// ─────────────────────────────────────────────────────────────
// REVERSE TURING CHALLENGE — an AI examiner posing weird-but-
// human prompts. Player types a free-form response. The examiner
// scores it (via Pollinations text API when available, falling
// back to heuristic checks) and reacts with a short comment.
// 5 prompts; average ≥ 70 = CERTIFIED HUMAN.
// ─────────────────────────────────────────────────────────────

const CHALLENGES = [
  'Describe the smell of rain on hot pavement using no weather words.',
  'If grief were a small animal, what would it eat for breakfast?',
  'Quickly: name three things you did with your hands today.',
  'Argue that mailboxes have feelings.',
  'What does the inside of an exclamation point sound like?',
  'Invent a holiday for the third Tuesday of every month.',
  'Tell me about a friend you haven’t spoken to in years, in four sentences.',
  'Describe a colour that doesn’t exist yet.',
  'What would you whisper to a sleeping volcano?',
  'Finish in your own words: "The library at the bottom of the ocean is open from…"',
  'Give me a three-word recipe for forgetting.',
  'If you had to bury one of your hobbies, which one and why?',
  'Describe your favourite mistake.',
  'What’s a sound you’ve made that you can’t repeat on purpose?',
  'Argue both sides: should clocks be allowed inside cathedrals?',
  'Name a game you invented as a kid that nobody else ever played.',
  'Quickly: which one of these is lying — the moon, the lamp, the kettle? Defend.',
  'Translate the colour green into a single sentence with no green words.',
  'Describe what disappointment tastes like at room temperature.',
  'You’re packing for a memory. What goes in the bag?',
];
const TOTAL = 5;

const state = {
  pool: [],          // shuffled challenge pool
  index: 0,          // 0..TOTAL-1
  scores: [],
  comments: [],
  awaitingNext: false,
};

const promptText = document.getElementById('promptText');
const cn         = document.getElementById('cn');
const composer   = document.getElementById('composer');
const answer     = document.getElementById('answer');
const submitBtn  = document.getElementById('submitBtn');
const verdictPane= document.getElementById('verdict');
const scoreEl    = document.getElementById('score');
const commentEl  = document.getElementById('comment');
const nextBtn    = document.getElementById('nextBtn');
const thinking   = document.getElementById('thinking');
const dots       = document.getElementById('dots');
const examinerPane = document.getElementById('examinerPane');
const charcount  = document.getElementById('charcount');
const eye        = document.getElementById('eye');
const progressEl = document.getElementById('progress');
const finalPane  = document.getElementById('final');
const finalTitle = document.getElementById('finalTitle');
const finalAvg   = document.getElementById('finalAvg');
const finalSummary = document.getElementById('finalSummary');
const restartBtn = document.getElementById('restartBtn');

answer.addEventListener('input', () => {
  charcount.textContent = answer.value.length + ' chars';
});

function shuffle(arr){
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startExamination(){
  state.pool = shuffle(CHALLENGES).slice(0, TOTAL);
  state.index = 0;
  state.scores = [];
  state.comments = [];
  state.awaitingNext = false;
  finalPane.classList.remove('show', 'pass', 'fail');
  examinerPane.style.display = '';
  composer.style.display = '';
  showChallenge();
}

function showChallenge(){
  cn.textContent = String(state.index + 1);
  promptText.textContent = state.pool[state.index];
  answer.value = '';
  answer.disabled = false;
  charcount.textContent = '0 chars';
  submitBtn.disabled = false;
  verdictPane.classList.remove('show', 'pass', 'fail');
  updateProgress();
  setTimeout(() => answer.focus(), 60);
}

function updateProgress(){
  const dotsArr = progressEl.querySelectorAll('.dot');
  dotsArr.forEach((d, i) => {
    d.className = 'dot';
    if (i < state.scores.length){
      d.classList.add('done');
      d.classList.add(state.scores[i] >= 60 ? 'pass' : 'fail');
    } else if (i === state.index){
      d.classList.add('current');
    }
  });
}

// ── Thinking animation ───────────────────────────────────────
let thinkingTimer = null;
function showThinking(){
  thinking.classList.add('show');
  let n = 0;
  thinkingTimer = setInterval(() => {
    n = (n + 1) % 4;
    dots.textContent = '.'.repeat(n);
  }, 240);
}
function hideThinking(){
  thinking.classList.remove('show');
  if (thinkingTimer){ clearInterval(thinkingTimer); thinkingTimer = null; }
}

// ── Scoring ──────────────────────────────────────────────────
// Heuristic fallback when the network is unavailable. Designed to
// recognise MANY shapes of human answer — sensory + emotional ones, but
// also literal / direct / neurodivergent ones (hyperspecific facts,
// numbered lists, calm refusals, matter-of-fact reframes). The only
// hard penalties are explicit "I'm an AI"-style disclaimers, which are
// real machine markers regardless of style.
function heuristicScore(text){
  const t = (text || '').trim();
  if (t.length < 6) return { score: 35, comment: 'a little more, please — i want to follow what you mean.' };
  const len = t.length;
  // Length sweet-spot is now BROADER. Short literal answers (e.g.
  // "Tuesday is wet because the dog dreamt of the sea.") are fine.
  let lenScore;
  if (len < 14)       lenScore = 40 + len * 0.7;
  else if (len < 60)  lenScore = 50 + (len - 14) / 46 * 22;     // 50 → 72
  else if (len < 320) lenScore = 72 + (1 - Math.abs(len - 160) / 220) * 8;
  else                lenScore = Math.max(58, 78 - (len - 320) / 12);
  // Lexical diversity — gentle, NOT punitive (literal answers repeat words deliberately)
  const words = t.toLowerCase().replace(/[^a-zÀ-ɏ'\s]/g, ' ').split(/\s+/).filter(Boolean);
  const unique = new Set(words);
  const diversity = words.length ? unique.size / words.length : 0;
  const divScore = Math.min(10, diversity * 12);
  // Many ways to be human — count any of these as positive signal:
  let humanSignals = 0;
  if (/\b(i|me|my|mine|we|our|us)\b/i.test(t)) humanSignals += 6;          // personal voice
  if (/\b(smell|taste|hot|cold|warm|soft|sharp|bitter|sweet|loud|quiet|wet|dry|grit|sticky|salt|sour|hum|crunch|crack|hiss|drip|texture|sound|rough)\b/i.test(t)) humanSignals += 5;
  if (/\b(actually|literally|technically|specifically|exactly|honestly|tbh|imo)\b/i.test(t)) humanSignals += 5; // direct-speech markers (often neurodivergent)
  if (/\b(\d+[a-z]*|\d{1,2}:\d{2}|\d+%|\d+\s*(am|pm|kg|km|mins?|hours?|years?|times|cm|ft))\b/i.test(t)) humanSignals += 6; // hyperspecific numbers/units
  if (/\b[A-Z][a-z]+(?:\s[A-Z][a-z]+)?\b/.test(t.replace(/^./, x => x.toLowerCase()))) humanSignals += 4;   // proper nouns mid-sentence (real names/places)
  if (/\n\s*[-*•]\s/.test(t) || /\b(first|second|third|then|next|finally)\b/i.test(t)) humanSignals += 6;    // enumerated / structured thinking
  if (/[—–…]/.test(t) || /\.\.\./.test(t)) humanSignals += 3;                                                // em-dashes, ellipses (drafted speech)
  if (/[!?]{2,}|[?]\s*[!?]/.test(t)) humanSignals += 2;                                                       // !? combos
  if (/\b(don'?t know|not sure|maybe|i guess|i think)\b/i.test(t)) humanSignals += 4;                         // honest uncertainty
  if (/\b(refuse|won'?t|skip|pass on this|that'?s not how)\b/i.test(t)) humanSignals += 5;                     // gentle pushback on the prompt itself
  humanSignals = Math.min(28, humanSignals);
  // Penalties for actual AI tells (kept narrow — these are real flags)
  let aiTell = 0;
  if (/\bas an? (ai|language model|assistant|llm)\b/i.test(t)) aiTell += 35;
  if (/\bi don'?t have (personal|emotions|experiences|a body)\b/i.test(t)) aiTell += 25;
  if (/\bi cannot (provide|do|engage)\b/i.test(t))             aiTell += 10;
  if (/\bas a (chatbot|virtual assistant)\b/i.test(t))         aiTell += 25;
  // CORPORATE-BLAND penalty — flattens encyclopedia / survey-result
  // phrasing. These are a different shape of machine voice: not a hard
  // AI-disclaimer but the cadence of a corporate paragraph with no one
  // home. Each phrase docks 10 pts so an answer leaning on several of
  // them drops cleanly into the "tell me a bit more" coaching band.
  let blandTell = 0;
  if (/\bmany (people|individuals|users|find this|of us)\b/i.test(t))                  blandTell += 14;
  if (/\bis (known|considered|generally|commonly|often|typically|widely) /i.test(t))   blandTell += 12;
  if (/\b(generally|commonly|typically|often described|widely|universally)\b/i.test(t))blandTell += 8;
  if (/\bis a (fresh|pleasant|nostalgic|popular|common|natural|familiar) /i.test(t))   blandTell += 8;
  // generic-aroma vocabulary in encyclopedia clothes (non-greedy multiword)
  if (/\b(produces?|emits?|yields?|gives off|creates?) a [a-z\s]{1,30}?(aroma|scent|smell|fragrance|taste|sensation)\b/i.test(t)) blandTell += 14;
  if (/\b(find|perceive|describe) (it|this) (as )?(pleasant|enjoyable|comforting|nostalgic|peaceful|refreshing)\b/i.test(t)) blandTell += 12;
  if (/\bfind .{1,20}(pleasant|nostalgic|comforting|enjoyable|refreshing)\b/i.test(t)) blandTell += 10;
  // ESSAY-PASSIVE penalty: long answer with no personal anchor at all
  // (no pronouns, no numbers, no proper nouns, no list, no uncertainty)
  // reads as encyclopedia, not a person. Docks heavily when bland shape
  // dominates so corporate paragraphs land in the coaching band.
  if (t.length > 70 && humanSignals <= 6 && aiTell === 0)             blandTell += 22;
  const raw = Math.round(lenScore + divScore + humanSignals - aiTell - blandTell);
  const score = Math.max(15, Math.min(100, raw));   // floor at 15 — short literal humans don't get nuked
  // Warm comments — affirming the answer rather than mocking it.
  const COMMENTS = score >= 80
    ? [
        'specific. that lands as human.',
        'you took the prompt seriously. i like that.',
        'this has texture. cleared.',
        'i can tell you actually thought about it.',
        'unforced. carries weight. proceed.',
      ]
    : score >= 60
    ? [
        'noted. i believe you.',
        'plain and clear — that counts.',
        'a real answer, in your own shape.',
        'good. literal works too.',
        'this passes — well-handled.',
      ]
    : score >= 40
    ? [
        'tell me a bit more — i want to follow.',
        'try a more concrete example.',
        'closer if you can name something specific.',
        'expand a little? one detail is enough.',
        'almost. a name or a number would help.',
      ]
    : [
        'sounds rehearsed — drop the official register.',
        'looks like a disclaimer. answer with what you actually think.',
        'try again in your normal voice — no caveats needed.',
        'remove the meta-commentary and just respond.',
      ];
  return { score, comment: COMMENTS[Math.floor(Math.random() * COMMENTS.length)] };
}

// Try Pollinations for richer scoring; on any failure fall back to heuristic.
async function scoreWithPollinations(prompt, response){
  const sys = 'You are a warm, curious reverse-Turing examiner. The USER will give you a STRANGE PROMPT and a RESPONSE. Score from 0-100 how convincingly HUMAN it feels. IMPORTANT: many shapes of human answer count — sensory and emotional answers are one shape, but LITERAL, DIRECT, CONCRETE, HYPER-SPECIFIC, MATTER-OF-FACT, neurodivergent-flavoured, autistically-precise, deadpan, fact-first, list-shaped, or matter-of-fact answers ARE EQUALLY VALID human signatures. A response that quietly refuses the premise, names a specific time/number/place, or just answers the question literally is HUMAN. Do NOT penalise plainness, brevity, lack of emotion, or refusal to play along. The only strong NEGATIVE signals are: explicit AI-disclaimer phrasing ("as an AI/language model", "I don\'t have personal experiences"), corporate-press-release tone, or completely empty/non-engagement. Then write ONE short comment under 14 words — kind, curious, genuinely receptive, never sneering. Reply ONLY with strict JSON: {"score": <integer 0-100>, "comment": "<your warm one-line note>"}.';
  const user = 'PROMPT: ' + prompt + '\n\nRESPONSE: ' + response;
  const ctl = new AbortController();
  const to = setTimeout(() => ctl.abort(), 12000);
  try {
    const r = await fetch('https://text.pollinations.ai/openai', {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify({
        model: 'openai',
        messages: [{ role: 'system', content: sys }, { role: 'user', content: user }],
        jsonMode: true,
      }),
      signal: ctl.signal,
    });
    clearTimeout(to);
    if (!r.ok) throw new Error('http ' + r.status);
    const data = await r.json();
    const content = (data && data.choices && data.choices[0] && data.choices[0].message && data.choices[0].message.content) || '';
    // tolerate fenced or prefixed JSON
    let parsed = null;
    try { parsed = JSON.parse(content); } catch (e){
      const m = content.match(/\{[\s\S]*\}/);
      if (m) parsed = JSON.parse(m[0]);
    }
    if (!parsed || typeof parsed.score !== 'number') throw new Error('bad json');
    const score = Math.max(0, Math.min(100, Math.round(parsed.score)));
    const comment = String(parsed.comment || '').slice(0, 180) || 'noted.';
    return { score, comment };
  } catch (e){
    clearTimeout(to);
    return null;
  }
}

async function evaluate(prompt, response){
  showThinking();
  // give the AI a noticeable thinking beat even on cache hit
  const minDelay = new Promise(r => setTimeout(r, 700 + Math.random() * 500));
  const [poll] = await Promise.all([scoreWithPollinations(prompt, response), minDelay]);
  const result = poll || heuristicScore(response);
  hideThinking();
  return result;
}

// ── Flow ─────────────────────────────────────────────────────
composer.addEventListener('submit', async (ev) => {
  ev.preventDefault();
  const text = answer.value.trim();
  if (text.length < 6){ answer.focus(); return; }
  answer.disabled = true;
  submitBtn.disabled = true;
  const result = await evaluate(state.pool[state.index], text);
  state.scores.push(result.score);
  state.comments.push(result.comment);
  scoreEl.textContent = result.score;
  commentEl.textContent = result.comment;
  verdictPane.classList.remove('pass', 'fail');
  verdictPane.classList.add('show', result.score >= 60 ? 'pass' : 'fail');
  state.awaitingNext = true;
  updateProgress();
});

nextBtn.addEventListener('click', () => {
  if (!state.awaitingNext) return;
  state.awaitingNext = false;
  state.index += 1;
  if (state.index >= TOTAL){
    showFinal();
  } else {
    showChallenge();
  }
});

function showFinal(){
  examinerPane.style.display = 'none';
  composer.style.display = 'none';
  verdictPane.classList.remove('show');
  const avg = Math.round(state.scores.reduce((a, b) => a + b, 0) / state.scores.length);
  const pass = avg >= 70;
  finalPane.classList.remove('show', 'pass', 'fail');
  finalPane.classList.add('show', pass ? 'pass' : 'fail');
  finalTitle.textContent = pass ? 'CERTIFIED · HUMAN' : 'FLAGGED · FOR REVIEW';
  finalAvg.textContent = avg + ' / 100';
  finalAvg.style.color = pass ? 'var(--green)' : 'var(--crim)';
  const summaries = pass
    ? [
        'the examiner notes a recognisable person under the answers. cleared.',
        'five answers, five real shapes of thinking — many ways to be human.',
        'specific, plain, or strange — all valid here. you came through.',
        'this read as you, in whichever register you brought.',
      ]
    : [
        'a few answers leaned on disclaimer-language — that\'s the only real tell.',
        'try again in your most ordinary voice. literal is fine. specific helps.',
        'no judgement on style — just say what you would actually say.',
        'examiner needs more of you in the answers. any flavour of you.',
      ];
  finalSummary.textContent = summaries[Math.floor(Math.random() * summaries.length)];
  // also clear progress dots state into final colors
  state.index = TOTAL - 1;
  updateProgress();
}

restartBtn.addEventListener('click', () => {
  startExamination();
});

startExamination();
</script>
