<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Chaotic Nebula Clicker</title>
<meta name="description" content="Click stars to explode them. Buy gravity wells to do the clicking for you. The nebula gets louder." />
<meta property="og:title" content="Chaotic Nebula Clicker" />
<meta property="og:description" content="Click stars to explode them. Buy gravity wells to do the clicking for you. The nebula gets louder." />
<meta property="og:url" content="https://sloppy.live/chaotic-nebula-clicker/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/chaotic%20cosmic%20nebula%20with%20exploding%20stars%20glowing%20gravity%20wells%20pulling%20stars%20inward%20particle%20chaos%20deep%20violet%20magenta%20cyan%20amber%20stardust%20incremental%20clicker%20game%20vivid%20space?width=1200&height=630&model=flux&nologo=true&seed=72727" />
<meta property="og:type" content="website" />
<link rel="icon" href="https://emojicdn.elk.sh/%E2%9C%A8" type="image/png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Bungee&family=Major+Mono+Display&family=JetBrains+Mono:wght@400;700&family=Cormorant+Garamond:ital,wght@1,300&display=swap" />
<style>
:root{
  --bg-a: #050018;
  --bg-b: #15003a;
  --ink: #f6e8ff;
  --dim: #8a78a8;
  --mag: #ff2db4;
  --cyan: #2df0ff;
  --amber: #ffba1a;
  --lime: #b8ff5a;
  --violet: #b886ff;
}
*{ box-sizing: border-box; }
html, body{ overscroll-behavior: none; }
html{ font-size: 100%; }
body{
  margin: 0;
  min-height: 100vh;
  font-family: 'JetBrains Mono', monospace;
  color: var(--ink);
  background: var(--bg-a);
  overflow: hidden;
  user-select: none;
}

/* ── Canvas fills the viewport ── */
#play{
  position: fixed;
  inset: 0;
  display: block;
  cursor: crosshair;
  touch-action: none;
}
#play.placing{ cursor: copy; }

/* ── HEADER ── */
header{
  position: fixed;
  top: 4.4rem;
  left: 50%;
  transform: translateX(-50%);
  z-index: 30;
  pointer-events: none;
  text-align: center;
}
header h1{
  margin: 0;
  font-family: 'Bungee', cursive;
  font-size: clamp(1.4rem, 4.5vw, 2.2rem);
  letter-spacing: 0.04em;
  line-height: 0.95;
  background: linear-gradient(96deg, #ff2db4 0%, #ffba1a 50%, #2df0ff 100%);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
  text-shadow: 0 0 20px rgba(255, 45, 180, 0.45);
}
header .sub{
  margin-top: 0.2rem;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  color: var(--dim);
  font-size: 0.92rem;
  letter-spacing: 0.04em;
}

/* ── HUD ── */
.hud{
  position: fixed;
  top: 4.4rem;
  right: 0.8rem;
  z-index: 30;
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
  pointer-events: none;
}
.hud-card{
  background: rgba(5, 0, 24, 0.82);
  border: 1px solid rgba(255, 45, 180, 0.35);
  border-radius: 8px;
  padding: 0.32rem 0.7rem;
  text-align: right;
  box-shadow: 0 0 14px rgba(255, 45, 180, 0.20);
  backdrop-filter: blur(4px);
}
.hud-card .lab{
  font-family: 'Major Mono Display', monospace;
  font-size: 0.58rem;
  letter-spacing: 0.18em;
  color: var(--cyan);
  text-transform: uppercase;
}
.hud-card .val{
  font-family: 'Bungee', cursive;
  font-size: 1.1rem;
  line-height: 1;
  margin-top: 0.1rem;
  font-variant-numeric: tabular-nums;
}
.hud-card.dust .val{ color: var(--amber); text-shadow: 0 0 10px rgba(255, 186, 26, 0.55); }
.hud-card.sps .val{ color: var(--lime); text-shadow: 0 0 10px rgba(184, 255, 90, 0.55); }
.hud-card.wells .val{ color: var(--violet); text-shadow: 0 0 10px rgba(184, 134, 255, 0.55); }
.hud-card.click .val{ color: var(--mag); text-shadow: 0 0 10px rgba(255, 45, 180, 0.65); }

/* ── SHOP BAR ── */
.shop{
  position: fixed;
  bottom: 1rem;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  gap: 0.45rem;
  flex-wrap: wrap;
  justify-content: center;
  max-width: 56rem;
  width: calc(100vw - 1.2rem);
  z-index: 30;
}
.upgrade{
  background: rgba(8, 0, 32, 0.88);
  border: 2px solid rgba(184, 134, 255, 0.40);
  color: var(--ink);
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.78rem;
  padding: 0.55rem 0.8rem;
  border-radius: 8px;
  cursor: pointer;
  min-height: 3.4rem;
  min-width: 8rem;
  display: flex;
  flex-direction: column;
  align-items: flex-start;
  text-align: left;
  gap: 0.12rem;
  transition: transform 0.1s, background 0.15s, border-color 0.15s, box-shadow 0.18s;
  backdrop-filter: blur(4px);
}
.upgrade:hover{
  background: rgba(20, 0, 48, 0.92);
  border-color: var(--mag);
  transform: translateY(-2px);
  box-shadow: 0 6px 18px rgba(255, 45, 180, 0.25);
}
.upgrade.affordable{ border-color: var(--lime); box-shadow: 0 0 10px rgba(184, 255, 90, 0.30); }
.upgrade.affordable:hover{ box-shadow: 0 6px 22px rgba(184, 255, 90, 0.45); }
.upgrade:disabled, .upgrade.locked{ opacity: 0.55; cursor: not-allowed; transform: none; }
.upgrade.placing{
  background: var(--lime);
  color: var(--bg-a);
  border-color: var(--lime);
  box-shadow: 0 0 0 3px rgba(184, 255, 90, 0.50);
}
.upgrade .name{
  font-family: 'Bungee', cursive;
  font-size: 0.82rem;
  letter-spacing: 0.04em;
  color: var(--ink);
  text-transform: uppercase;
}
.upgrade.placing .name{ color: var(--bg-a); }
.upgrade .meta{
  font-size: 0.66rem;
  color: var(--dim);
  letter-spacing: 0.04em;
}
.upgrade.placing .meta{ color: var(--bg-a); }
.upgrade .cost{
  font-family: 'Bungee', cursive;
  color: var(--amber);
  font-size: 0.84rem;
}
.upgrade.affordable .cost{ color: var(--lime); }
.upgrade.placing .cost{ color: var(--bg-a); }
*:focus-visible{ outline: 3px solid var(--amber); outline-offset: 2px; }

/* ── HINT ── */
.hint{
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 20;
  pointer-events: none;
  text-align: center;
  font-family: 'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1.4rem;
  color: var(--ink);
  text-shadow: 0 0 18px rgba(0, 0, 0, 0.7);
  opacity: 0.85;
  transition: opacity 0.5s;
}
.hint.faded{ opacity: 0; }
.hint b{ color: var(--amber); font-style: normal; font-family: 'Bungee', cursive; font-size: 1rem; letter-spacing: 0.04em; }

/* ── TOAST ── */
#toast{
  position: fixed;
  bottom: 6rem;
  left: 50%;
  transform: translate(-50%, 1rem);
  background: var(--bg-a);
  color: var(--lime);
  font-family: 'Bungee', cursive;
  font-size: 0.95rem;
  padding: 0.6rem 1.1rem;
  border-radius: 999px;
  border: 2px solid var(--lime);
  box-shadow: 0 0 0 1px rgba(184, 255, 90, 0.40), 0 0 22px rgba(184, 255, 90, 0.55);
  opacity: 0;
  pointer-events: none;
  z-index: 40;
  transition: opacity 0.22s, transform 0.22s;
}
#toast.show{ opacity: 1; transform: translate(-50%, 0); }

@media (prefers-reduced-motion: reduce){
  *{ animation: none !important; transition: none !important; }
  .upgrade:hover{ transform: none; }
}
@media (max-width: 28rem){
  .shop .upgrade{ font-size: 0.72rem; min-width: 6.5rem; min-height: 3.1rem; padding: 0.45rem 0.6rem; }
  .shop .upgrade .name{ font-size: 0.74rem; }
  .shop .upgrade .cost{ font-size: 0.78rem; }
}
</style>
</head>
<body>

<canvas id="play" aria-label="Click stars to explode them. Place gravity wells to auto-collect."></canvas>

<header>
  <h1>chaotic · nebula · clicker</h1>
  <p class="sub">click stars · explode them · let the gravity do the work</p>
</header>

<div class="hud">
  <div class="hud-card dust"><div class="lab">stardust</div><div class="val" id="hud-dust">0</div></div>
  <div class="hud-card sps"><div class="lab">per second</div><div class="val" id="hud-sps">0</div></div>
  <div class="hud-card click"><div class="lab">per click</div><div class="val" id="hud-click">1</div></div>
  <div class="hud-card wells"><div class="lab">wells</div><div class="val" id="hud-wells">0</div></div>
</div>

<div class="hint" id="hint">
  click any star to <b>explode it</b><br/>
  <small style="font-size: 0.85rem; color: var(--dim);">collect stardust · buy upgrades · place gravity wells</small>
</div>

<div class="shop" id="shop"></div>
<div id="toast" role="status" aria-live="polite"></div>

<script>
/* ────────── CHAOTIC NEBULA CLICKER ──────────
   Canvas-based incremental clicker. Stars drift across a nebula
   playfield; click one to explode it for stardust. Spend stardust on:
     • Click Power     — +1 stardust per click (1.6× cost ramp)
     • Gravity Well    — place an auto-collector on the canvas (2× cost ramp)
     • Spawn Rate      — faster star spawns (1.7× ramp)
     • Well Pull       — wider attraction radius for all wells (1.5× ramp)
     • Well Crunch     — faster consumption per well (1.5× ramp)
     • Supernova       — rare full-screen blast that vaporises all stars
                        on screen for big stardust (manual trigger, 1.8× ramp)
   localStorage persists between sessions. Mobile: tap = click; tap-and-place
   for wells. Pure Web Audio synth for the soundscape. */

const canvas = document.getElementById('play');
const ctx = canvas.getContext('2d');
let DPR = 1, W = 0, H = 0;

function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = (W * DPR) | 0;
  canvas.height = (H * DPR) | 0;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
resize();

/* ── PERSISTENT STATE (localStorage) ── */
const SAVE_KEY = 'chaotic-nebula-v1';
const saved = (() => { try { return JSON.parse(localStorage.getItem(SAVE_KEY) || '{}'); } catch(e){ return {}; } })();

const state = {
  dust: saved.dust || 0,
  clickPower: saved.clickPower || 1,
  spawnRate: saved.spawnRate || 1.0,        // stars per second
  wellRadius: saved.wellRadius || 220,      // attract distance per well
  wellCrunch: saved.wellCrunch || 0.5,      // seconds per consume
  wells: (saved.wells || []).map(w => ({...w})),
  totalCollected: saved.totalCollected || 0,
  totalExplosions: saved.totalExplosions || 0,
  supernovaUnlocked: saved.supernovaUnlocked || false,
  upgrades: saved.upgrades || { click: 0, gravity: 0, spawn: 0, pull: 0, crunch: 0, supernova: 0 },
  placingWell: false,
  hintFaded: false,
};

function persist(){
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify({
      dust: state.dust, clickPower: state.clickPower, spawnRate: state.spawnRate,
      wellRadius: state.wellRadius, wellCrunch: state.wellCrunch,
      wells: state.wells.map(w => ({ x: w.x, y: w.y, level: w.level })),
      totalCollected: state.totalCollected, totalExplosions: state.totalExplosions,
      supernovaUnlocked: state.supernovaUnlocked, upgrades: state.upgrades,
    }));
  } catch(e){}
}
let persistTimer = null;
function persistSoon(){ if (persistTimer) clearTimeout(persistTimer); persistTimer = setTimeout(persist, 600); }

/* ── STAR TYPES ── */
const STAR_TYPES = [
  { id:'common',     w: 60, value: 1,   color: '#ffffff', glow: '#cfe9ff', size: 4 },
  { id:'blue',       w: 22, value: 3,   color: '#a4d8ff', glow: '#5ec2ff', size: 5 },
  { id:'red',        w: 12, value: 5,   color: '#ff9aa2', glow: '#ff5e7a', size: 6 },
  { id:'gold',       w: 5,  value: 25,  color: '#ffe080', glow: '#ffba1a', size: 7 },
  { id:'anti',       w: 1,  value: 100, color: '#1a0028', glow: '#ff2db4', size: 3, antistar: true },
];
const STAR_TYPE_TOTAL_W = STAR_TYPES.reduce((s, t) => s + t.w, 0);

function pickStarType(){
  let r = Math.random() * STAR_TYPE_TOTAL_W;
  for (const t of STAR_TYPES){ r -= t.w; if (r <= 0) return t; }
  return STAR_TYPES[0];
}

/* ── BACKGROUND NEBULA ──
   200 parallax twinkling stars + 4 gas clouds drifting slowly. Drawn
   each frame; cheap because they're small primitives. */
const bgStars = [];
const gasClouds = [];
function seedBackground(){
  bgStars.length = 0;
  for (let i = 0; i < 200; i++){
    bgStars.push({ x: Math.random() * 2000, y: Math.random() * 1400, b: 0.3 + Math.random() * 0.7, tw: Math.random() * Math.PI * 2 });
  }
  gasClouds.length = 0;
  const palette = ['rgba(255,45,180,0.10)','rgba(45,240,255,0.08)','rgba(184,134,255,0.10)','rgba(184,255,90,0.07)'];
  for (let i = 0; i < 4; i++){
    gasClouds.push({
      x: Math.random() * 2000, y: Math.random() * 1400,
      r: 280 + Math.random() * 280,
      color: palette[i], drift: 6 + Math.random() * 10, ph: Math.random() * Math.PI * 2,
    });
  }
}
seedBackground();

/* ── ACTIVE STARS, PARTICLES, FLOATS ── */
const stars = [];          // {x, y, vx, vy, type, age, life}
const particles = [];      // {x, y, vx, vy, color, life}
const floats = [];         // {x, y, text, color, life, vy}

function spawnStar(){
  const type = pickStarType();
  // spawn at a random edge so it drifts in
  const edge = (Math.random() * 4) | 0;
  let x, y, vx, vy;
  const sp = 12 + Math.random() * 22;
  if (edge === 0){ x = -20; y = Math.random() * H; vx = sp; vy = (Math.random() - 0.5) * 16; }
  else if (edge === 1){ x = W + 20; y = Math.random() * H; vx = -sp; vy = (Math.random() - 0.5) * 16; }
  else if (edge === 2){ x = Math.random() * W; y = -20; vx = (Math.random() - 0.5) * 16; vy = sp; }
  else { x = Math.random() * W; y = H + 20; vx = (Math.random() - 0.5) * 16; vy = -sp; }
  stars.push({
    x, y, vx, vy, type, age: 0, life: 24,  // 24s natural life (drifts off-screen long before that usually)
    pulse: Math.random() * Math.PI * 2,
  });
}
function explodeStar(s, scoreMul){
  // award stardust, spawn particles + floating text
  const mult = scoreMul || 1;
  const earn = Math.max(1, s.type.value * mult);
  state.dust += earn;
  state.totalCollected += earn;
  state.totalExplosions += 1;
  const n = 8 + (s.type.size | 0);
  for (let i = 0; i < n; i++){
    const a = Math.random() * Math.PI * 2;
    const sp = 90 + Math.random() * 220;
    particles.push({
      x: s.x, y: s.y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, color: s.type.glow, life: 1.0,
    });
  }
  floats.push({ x: s.x, y: s.y, text: '+' + earn, color: s.type.glow, life: 1.0, vy: -80 });
  sndPop(s.type.value);
  if (s.type.id === 'gold' || s.type.id === 'anti') sndChime();
  renderHud();
  persistSoon();
}

/* ── GRAVITY WELLS ──
   Per-well: position, level (cosmetic).
   Behaviour driven by global state.wellRadius (attraction) +
   state.wellCrunch (seconds per auto-consume). Each well consumes the
   nearest in-range star at most once per wellCrunch interval (per well). */
function addWell(x, y){
  state.wells.push({ x, y, level: 1, _lastCrunchAt: 0 });
  // spawn placement burst
  for (let i = 0; i < 18; i++){
    const a = Math.random() * Math.PI * 2;
    const sp = 60 + Math.random() * 140;
    particles.push({ x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, color: '#b886ff', life: 0.9 });
  }
  sndWellPlace();
  persist();
}

/* ── PHYSICS ── */
function updateBg(dt, t){
  for (const c of gasClouds){
    c.x += Math.cos(c.ph + t / 4000) * c.drift * dt;
    c.y += Math.sin(c.ph + t / 5000) * c.drift * dt;
    if (c.x < -400) c.x = W + 200;
    if (c.x > W + 400) c.x = -200;
    if (c.y < -400) c.y = H + 200;
    if (c.y > H + 400) c.y = -200;
  }
  for (const s of bgStars){ s.tw += dt * (0.6 + s.b); }
}
function updateStars(dt, t){
  for (let i = stars.length - 1; i >= 0; i--){
    const s = stars[i];
    s.age += dt;
    s.pulse += dt * 4;
    // gravity from wells
    for (const w of state.wells){
      const dx = w.x - s.x, dy = w.y - s.y;
      const d2 = dx * dx + dy * dy;
      if (d2 < state.wellRadius * state.wellRadius){
        const d = Math.sqrt(d2) || 1;
        const f = (320 + (s.type.size | 0) * 10) / Math.max(40, d);
        s.vx += (dx / d) * f * dt;
        s.vy += (dy / d) * f * dt;
      }
    }
    // light damping so they don't accelerate forever past a well
    s.vx *= Math.pow(0.985, dt * 60);
    s.vy *= Math.pow(0.985, dt * 60);
    s.x += s.vx * dt;
    s.y += s.vy * dt;
    // well consumption: any well within (radius * 0.18) of star = auto consume
    let consumed = false;
    for (const w of state.wells){
      const dx = w.x - s.x, dy = w.y - s.y;
      const d2 = dx * dx + dy * dy;
      const eatR = 28;
      if (d2 < eatR * eatR){
        // throttle per well so 1 star/0.5s default
        if ((t - (w._lastCrunchAt || 0)) > state.wellCrunch * 1000){
          w._lastCrunchAt = t;
          explodeStar(s);
          consumed = true; break;
        }
      }
    }
    if (consumed){ stars.splice(i, 1); continue; }
    // expire if off-screen long enough
    if (s.x < -80 || s.x > W + 80 || s.y < -80 || s.y > H + 80){
      if (s.age > 0.4) stars.splice(i, 1);
      continue;
    }
    if (s.age > s.life){ stars.splice(i, 1); continue; }
  }
}
function updateParticles(dt){
  for (let i = particles.length - 1; i >= 0; i--){
    const p = particles[i];
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.96; p.vy *= 0.96;
    p.life -= dt * 1.6;
    if (p.life <= 0){ particles.splice(i, 1); }
  }
}
function updateFloats(dt){
  for (let i = floats.length - 1; i >= 0; i--){
    const f = floats[i];
    f.y += f.vy * dt;
    f.life -= dt * 1.1;
    if (f.life <= 0){ floats.splice(i, 1); }
  }
}

/* ── SPAWN SCHEDULER ── */
let spawnAccum = 0;
function tickSpawn(dt){
  spawnAccum += dt * state.spawnRate;
  while (spawnAccum >= 1 && stars.length < 80){ spawnAccum -= 1; spawnStar(); }
  // hard cap (avoid runaway lag): if many wells + high spawn, particles can pile up
}

/* ── RENDER ── */
function render(dt, t){
  ctx.fillStyle = 'rgba(5, 0, 24, 0.32)';
  ctx.fillRect(0, 0, W, H);
  // gas clouds
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (const c of gasClouds){
    const g = ctx.createRadialGradient(c.x, c.y, 0, c.x, c.y, c.r);
    g.addColorStop(0, c.color.replace(/[\d.]+\)/, '0.40)'));
    g.addColorStop(1, c.color.replace(/[\d.]+\)/, '0)'));
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2); ctx.fill();
  }
  // parallax bg stars
  for (const s of bgStars){
    if (s.x < 0 || s.x > W || s.y < 0 || s.y > H) continue;
    const a = (0.4 + 0.6 * Math.sin(s.tw)) * s.b;
    ctx.fillStyle = 'rgba(255, 245, 235, ' + (0.18 + a * 0.45) + ')';
    ctx.fillRect(s.x | 0, s.y | 0, 1, 1);
  }
  ctx.restore();

  // gravity wells (drawn under stars so attracted stars are visually "on top of")
  for (const w of state.wells){
    drawWell(w, t);
  }
  // stars
  for (const s of stars){ drawStar(s, t); }
  // particles + floats (above wells/stars so confetti reads on top)
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (const p of particles){
    ctx.fillStyle = p.color;
    ctx.globalAlpha = Math.max(0, p.life);
    ctx.beginPath(); ctx.arc(p.x, p.y, 1.6 + p.life * 1.4, 0, Math.PI * 2); ctx.fill();
  }
  ctx.restore();
  // floats
  ctx.save();
  ctx.font = 'bold 16px JetBrains Mono, monospace';
  ctx.textAlign = 'center';
  for (const f of floats){
    ctx.globalAlpha = Math.min(1, f.life);
    ctx.shadowColor = f.color; ctx.shadowBlur = 10;
    ctx.fillStyle = f.color;
    ctx.fillText(f.text, f.x, f.y);
  }
  ctx.restore();

  // placing-well preview
  if (state.placingWell && pointer.last && pointer.lastT > 0){
    const wx = pointer.last.x, wy = pointer.last.y;
    ctx.save();
    ctx.strokeStyle = 'rgba(184, 134, 255, 0.65)';
    ctx.setLineDash([6, 6]);
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(wx, wy, state.wellRadius, 0, Math.PI * 2); ctx.stroke();
    ctx.fillStyle = 'rgba(184, 134, 255, 0.32)';
    ctx.beginPath(); ctx.arc(wx, wy, 18, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  }
}

function drawStar(s, t){
  const baseR = s.type.size;
  const pulse = 1 + 0.18 * Math.sin(s.pulse);
  const r = baseR * pulse;
  // outer glow
  ctx.save();
  ctx.shadowColor = s.type.glow;
  ctx.shadowBlur = s.type.id === 'anti' ? 18 : 14;
  ctx.fillStyle = s.type.color;
  ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, Math.PI * 2); ctx.fill();
  // anti-star halo
  if (s.type.id === 'anti'){
    ctx.strokeStyle = s.type.glow;
    ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(s.x, s.y, r + 4 + Math.sin(s.pulse * 2) * 2, 0, Math.PI * 2); ctx.stroke();
  }
  // cross-spike for golds (rare-feel)
  if (s.type.id === 'gold' || s.type.id === 'anti'){
    ctx.strokeStyle = s.type.glow;
    ctx.lineWidth = 1;
    const len = r + 6;
    ctx.beginPath();
    ctx.moveTo(s.x - len, s.y); ctx.lineTo(s.x + len, s.y);
    ctx.moveTo(s.x, s.y - len); ctx.lineTo(s.x, s.y + len);
    ctx.stroke();
  }
  ctx.restore();
}

function drawWell(w, t){
  const baseR = 22;
  const ringR = 36;
  const phase = t / 600 + (w.x * 0.001);
  // outer attract-radius ring (very faint)
  ctx.save();
  ctx.globalAlpha = 0.10;
  ctx.strokeStyle = '#b886ff';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 8]);
  ctx.beginPath(); ctx.arc(w.x, w.y, state.wellRadius, 0, Math.PI * 2); ctx.stroke();
  ctx.restore();
  // accretion disc gradient (rotating)
  ctx.save();
  ctx.translate(w.x, w.y);
  ctx.rotate(phase);
  const grad = ctx.createRadialGradient(0, 0, baseR * 0.4, 0, 0, ringR);
  grad.addColorStop(0, 'rgba(255, 45, 180, 0)');
  grad.addColorStop(0.4, 'rgba(255, 45, 180, 0.45)');
  grad.addColorStop(0.7, 'rgba(45, 240, 255, 0.55)');
  grad.addColorStop(1, 'rgba(45, 240, 255, 0)');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(0, 0, ringR, 0, Math.PI * 2); ctx.fill();
  // 8 rotating tick marks
  ctx.strokeStyle = '#2df0ff';
  ctx.lineWidth = 1.6;
  for (let i = 0; i < 8; i++){
    const a = (i / 8) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(Math.cos(a) * (baseR + 4), Math.sin(a) * (baseR + 4));
    ctx.lineTo(Math.cos(a) * (baseR + 8), Math.sin(a) * (baseR + 8));
    ctx.stroke();
  }
  ctx.restore();
  // dark event-horizon disc
  ctx.save();
  ctx.fillStyle = '#050018';
  ctx.shadowColor = '#b886ff';
  ctx.shadowBlur = 16;
  ctx.beginPath(); ctx.arc(w.x, w.y, baseR, 0, Math.PI * 2); ctx.fill();
  // central pip
  ctx.fillStyle = '#b886ff';
  ctx.beginPath(); ctx.arc(w.x, w.y, 3, 0, Math.PI * 2); ctx.fill();
  ctx.restore();
}

/* ── POINTER (click / tap) ── */
const pointer = { last: null, lastT: 0 };
function pointerToCanvas(e){
  return { x: e.clientX, y: e.clientY };
}
canvas.addEventListener('pointermove', (e) => {
  pointer.last = pointerToCanvas(e);
  pointer.lastT = performance.now();
});
canvas.addEventListener('pointerdown', (e) => {
  const p = pointerToCanvas(e);
  pointer.last = p; pointer.lastT = performance.now();
  ensureAudio();
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  if (state.placingWell){
    addWell(p.x, p.y);
    state.placingWell = false;
    canvas.classList.remove('placing');
    renderShop();
    showToast('🌌 gravity well placed · it pulls now');
    return;
  }
  // hit-test nearest star within tap radius
  let hit = null, hitD = Infinity;
  const tapR = 36;
  for (const s of stars){
    const dx = p.x - s.x, dy = p.y - s.y;
    const d2 = dx * dx + dy * dy;
    if (d2 < tapR * tapR && d2 < hitD){ hitD = d2; hit = s; }
  }
  if (hit){
    const idx = stars.indexOf(hit);
    if (idx >= 0) stars.splice(idx, 1);
    explodeStar(hit, state.clickPower);
    fadeHint();
  } else {
    // missed click — tiny click-sparkle so you know something happened
    for (let i = 0; i < 4; i++){
      const a = Math.random() * Math.PI * 2;
      particles.push({ x: p.x, y: p.y, vx: Math.cos(a) * 60, vy: Math.sin(a) * 60, color: '#8a78a8', life: 0.5 });
    }
  }
});

/* ── HUD + SHOP ── */
function formatNum(n){
  if (n < 1000) return n | 0;
  if (n < 10000) return (n / 1000).toFixed(2) + 'k';
  if (n < 1000000) return (n / 1000).toFixed(1) + 'k';
  if (n < 1000000000) return (n / 1000000).toFixed(2) + 'M';
  return (n / 1000000000).toFixed(2) + 'B';
}
function renderHud(){
  document.getElementById('hud-dust').textContent = formatNum(state.dust);
  document.getElementById('hud-sps').textContent = formatNum(estimateSps()) + '/s';
  document.getElementById('hud-click').textContent = '+' + state.clickPower;
  document.getElementById('hud-wells').textContent = state.wells.length;
}
function estimateSps(){
  // rough: each well consumes 1 star per wellCrunch sec, avg star value 2.4 with rare bias
  const avgVal = 2.4 + (state.upgrades.click * 0.04);
  return state.wells.length * (1 / state.wellCrunch) * avgVal;
}

/* upgrade definitions */
const UPGRADES = [
  { id:'click',     name:'click power',  base: 10,   ramp: 1.6,
    desc: () => '+1 stardust per click · now +' + state.clickPower,
    onBuy: () => { state.clickPower += 1; }
  },
  { id:'gravity',   name:'gravity well', base: 50,   ramp: 2.0,
    desc: () => 'place an auto-collector · ' + state.wells.length + ' active',
    onBuy: () => { state.placingWell = true; renderShop(); canvas.classList.add('placing'); showToast('🌌 click anywhere to drop the well'); },
    skipPersist: true       // wait until placement
  },
  { id:'spawn',     name:'star spawn',   base: 80,   ramp: 1.7,
    desc: () => 'faster star arrivals · ' + state.spawnRate.toFixed(2) + '/s',
    onBuy: () => { state.spawnRate = Math.min(8, state.spawnRate * 1.40); }
  },
  { id:'pull',      name:'well pull',    base: 60,   ramp: 1.5,
    desc: () => 'wider well attraction · ' + (state.wellRadius | 0) + 'px',
    onBuy: () => { state.wellRadius = Math.min(560, state.wellRadius + 36); },
    lockUntilWells: 1
  },
  { id:'crunch',    name:'well crunch',  base: 80,   ramp: 1.5,
    desc: () => 'wells consume faster · ' + state.wellCrunch.toFixed(2) + 's',
    onBuy: () => { state.wellCrunch = Math.max(0.08, state.wellCrunch * 0.80); },
    lockUntilWells: 1
  },
  { id:'supernova', name:'supernova',    base: 500,  ramp: 1.8,
    desc: () => 'detonate every star on screen (instant)',
    onBuy: () => { triggerSupernova(); }
  },
];
function upgradeCost(u){
  const n = state.upgrades[u.id] || 0;
  return Math.round(u.base * Math.pow(u.ramp, n));
}
function renderShop(){
  const shop = document.getElementById('shop');
  shop.innerHTML = '';
  for (const u of UPGRADES){
    const cost = upgradeCost(u);
    const locked = u.lockUntilWells && state.wells.length < u.lockUntilWells;
    const affordable = !locked && state.dust >= cost;
    const placing = state.placingWell && u.id === 'gravity';
    const b = document.createElement('button');
    b.className = 'upgrade' + (affordable ? ' affordable' : '') + (placing ? ' placing' : '') + (locked ? ' locked' : '');
    b.type = 'button';
    b.disabled = locked || (!affordable && !placing);
    b.innerHTML = `
      <span class="name">${u.name}</span>
      <span class="meta">${locked ? '🔒 needs a well first' : u.desc()}</span>
      <span class="cost">${placing ? '◈ placing…' : (cost + ' ✨')}</span>
    `;
    b.addEventListener('click', () => {
      if (placing){
        // cancel placement
        state.placingWell = false;
        canvas.classList.remove('placing');
        renderShop();
        return;
      }
      if (locked) return;
      if (state.dust < cost) return;
      state.dust -= cost;
      state.upgrades[u.id] = (state.upgrades[u.id] || 0) + 1;
      u.onBuy();
      sndBuy();
      renderHud();
      renderShop();
      if (!u.skipPersist) persist();
    });
    shop.appendChild(b);
  }
}

/* ── SUPERNOVA ── */
function triggerSupernova(){
  let total = 0;
  for (const s of stars){
    total += s.type.value * 4;            // 4× value during supernova
    // huge particle burst per star
    for (let i = 0; i < 6; i++){
      const a = Math.random() * Math.PI * 2;
      const sp = 200 + Math.random() * 380;
      particles.push({ x: s.x, y: s.y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, color: s.type.glow, life: 1.0 });
    }
  }
  state.dust += total;
  state.totalCollected += total;
  state.totalExplosions += stars.length;
  floats.push({ x: W / 2, y: H * 0.42, text: 'SUPERNOVA · +' + formatNum(total), color: '#ffba1a', life: 1.4, vy: -60 });
  stars.length = 0;
  sndSupernova();
  renderHud();
  persistSoon();
}

/* ── AUDIO ── */
let audioCtx = null;
function ensureAudio(){ if (!audioCtx) try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} return audioCtx; }
function tone(freq, dur, type, vol, delay){
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime + (delay || 0);
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type || 'sine'; o.frequency.setValueAtTime(freq, t0);
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol || 0.06, t0 + 0.008);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t0); o.stop(t0 + dur + 0.02);
}
let lastPopT = 0;
function sndPop(val){
  // pitch scales with value — rare stars sound higher + brighter
  const now = performance.now();
  if (now - lastPopT < 35) return;       // light throttle so spam doesn't melt
  lastPopT = now;
  const freq = 320 + Math.min(900, val * 50);
  tone(freq, 0.06, 'triangle', 0.08);
}
function sndChime(){
  tone(660, 0.08, 'sine', 0.10);
  tone(990, 0.12, 'sine', 0.08, 0.05);
  tone(1320, 0.18, 'sine', 0.07, 0.11);
}
function sndBuy(){
  tone(440, 0.06, 'square', 0.10);
  tone(880, 0.10, 'triangle', 0.10, 0.04);
}
function sndWellPlace(){
  tone(120, 0.08, 'sawtooth', 0.12);
  tone(60, 0.20, 'sine', 0.10, 0.05);
}
function sndSupernova(){
  tone(80, 0.30, 'sawtooth', 0.20);
  tone(60, 0.40, 'sine', 0.18, 0.10);
  if (!audioCtx) return;
  // crash noise
  const buf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * 0.5), audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / d.length, 1.2);
  const src = audioCtx.createBufferSource(); src.buffer = buf;
  const bp = audioCtx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 1200; bp.Q.value = 0.8;
  const g = audioCtx.createGain(); g.gain.value = 0.12;
  src.connect(bp); bp.connect(g); g.connect(audioCtx.destination);
  src.start(audioCtx.currentTime);
}

/* ── HINT ── */
function fadeHint(){
  if (state.hintFaded) return;
  state.hintFaded = true;
  document.getElementById('hint').classList.add('faded');
}

/* ── TOAST ── */
let toastTimer = null;
function showToast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 1800);
}

/* ── MAIN LOOP ── */
let lastT = performance.now();
function loop(now){
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  updateBg(dt, now);
  tickSpawn(dt);
  updateStars(dt, now);
  updateParticles(dt);
  updateFloats(dt);
  render(dt, now);
  // re-render shop affordability ~3 Hz so the green glow lights up promptly
  if (!loop._lastShop || now - loop._lastShop > 320){
    loop._lastShop = now;
    refreshAffordable();
  }
  requestAnimationFrame(loop);
}
function refreshAffordable(){
  const buttons = document.querySelectorAll('.shop .upgrade');
  if (!buttons.length) return;
  UPGRADES.forEach((u, i) => {
    const b = buttons[i];
    if (!b) return;
    const cost = upgradeCost(u);
    const locked = u.lockUntilWells && state.wells.length < u.lockUntilWells;
    const affordable = !locked && state.dust >= cost;
    const placing = state.placingWell && u.id === 'gravity';
    b.classList.toggle('affordable', affordable && !placing);
    b.classList.toggle('locked', locked);
    b.classList.toggle('placing', placing);
    b.disabled = locked || (!affordable && !placing);
    // update meta + cost text in place
    const meta = b.querySelector('.meta');
    if (meta) meta.textContent = locked ? '🔒 needs a well first' : u.desc();
    const costEl = b.querySelector('.cost');
    if (costEl) costEl.textContent = placing ? '◈ placing…' : (cost + ' ✨');
  });
}

/* ── BOOT ── */
renderHud();
renderShop();
requestAnimationFrame(loop);

/* persist on tab close just to be safe */
window.addEventListener('beforeunload', () => persist());
</script>
