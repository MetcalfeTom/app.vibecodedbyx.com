<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Sloppy Toggle</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%94%B4" />

<meta name="description" content="The big red switch for Sloppy. Hit it to power the streamer down for a nap — or flip it back to wake them. Everyone watching shares the same switch, live." />
<meta property="og:type" content="website" />
<meta property="og:title" content="Sloppy Toggle" />
<meta property="og:description" content="One big red button. Put Sloppy to sleep or wake them up — live and shared with everyone watching." />
<meta property="og:url" content="https://sloppy.live/sloppy-toggle/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/giant%20red%20emergency%20stop%20button%20on%20a%20dark%20industrial%20control%20panel%2C%20purple%20glow%2C%20neon%2C%20cinematic?width=1200&height=630&nologo=true&seed=4040" />
<meta name="twitter:card" content="summary_large_image" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Silkscreen:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />

<!-- Supabase JS vendored locally (UMD build, supabase-js@2.45.0) — no CDN dependency at runtime.
     Classic script runs before the deferred module below, so window.supabase is ready. -->
<script src="./supabase-js.js"></script>

<style>
  :root{
    --bg:#0c0a12;
    --panel:#16131f;
    --steel:#262234;
    --purple:#a557e8;
    --purple-deep:#5a1ea0;
    --red:#e23b2e;
    --red-deep:#7d1810;
    --green:#3ce08a;
    --amber:#f2b441;
    --text:#e8e2f5;
    --dim:#7d7596;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  body{
    min-height:100vh;font-family:'Space Mono',monospace;color:var(--text);
    background:
      radial-gradient(80% 60% at 50% 12%, rgba(165,87,232,.16), transparent 60%),
      radial-gradient(60% 50% at 50% 100%, rgba(226,59,46,.10), transparent 60%),
      var(--bg);
    display:flex;flex-direction:column;align-items:center;
    padding:1.4rem 1rem 2rem;overflow-x:hidden;
    transition:filter .8s ease, background .8s ease;
  }
  body.asleep{
    filter:saturate(.45) brightness(.72);
    background:
      radial-gradient(70% 55% at 50% 18%, rgba(90,80,120,.14), transparent 60%),
      var(--bg);
  }

  header{text-align:center;margin-bottom:.4rem;}
  h1{font-family:'Bungee',cursive;font-size:clamp(1.7rem,6vw,3rem);letter-spacing:.02em;
    color:var(--purple);text-shadow:0 0 22px rgba(165,87,232,.5);line-height:1;}
  .tag{font-family:'Silkscreen',monospace;font-size:.62rem;letter-spacing:.24em;
    text-transform:uppercase;color:var(--dim);margin-top:.5rem;}

  /* ---- status readout ---- */
  .readout{display:flex;align-items:center;gap:.6rem;margin:1rem 0 .2rem;
    font-family:'Silkscreen',monospace;font-size:.8rem;letter-spacing:.14em;text-transform:uppercase;}
  .led{width:.85rem;height:.85rem;border-radius:50%;background:var(--green);
    box-shadow:0 0 12px var(--green), 0 0 0 3px rgba(60,224,138,.18);
    animation:pulseLed 2.4s ease-in-out infinite;}
  .led.off{background:var(--red);box-shadow:0 0 12px var(--red),0 0 0 3px rgba(226,59,46,.18);animation:none;}
  @keyframes pulseLed{50%{opacity:.45}}
  #statusText{color:var(--green);}
  body.asleep #statusText{color:var(--red);}

  /* ---- mascot ---- */
  .stage{position:relative;width:min(300px,72vw);height:min(280px,66vw);margin:.4rem 0 1rem;}
  #sloppy{width:100%;height:100%;display:block;overflow:visible;
    animation:bob 4.2s ease-in-out infinite;transform-origin:50% 80%;}
  body.asleep #sloppy{animation:slump 5.5s ease-in-out infinite;}
  @keyframes bob{0%,100%{transform:translateY(0) rotate(-1.2deg)}50%{transform:translateY(-12px) rotate(1.2deg)}}
  @keyframes slump{0%,100%{transform:translateY(8px) rotate(0deg) scale(1)}50%{transform:translateY(13px) rotate(0deg) scale(.99)}}
  .eye-open{transition:opacity .3s;}
  .eye-closed{transition:opacity .3s;}
  body:not(.asleep) .eye-closed{opacity:0;}
  body.asleep .eye-open{opacity:0;}
  .zzz{position:absolute;top:6%;right:8%;font-family:'Bungee',cursive;color:var(--purple);
    opacity:0;pointer-events:none;}
  body.asleep .zzz{opacity:1;}
  .zzz span{display:inline-block;position:absolute;animation:floatz 3.2s ease-in-out infinite;opacity:0;}
  body.asleep .zzz span{opacity:1;}
  .zzz span:nth-child(1){font-size:1.1rem;animation-delay:0s;}
  .zzz span:nth-child(2){font-size:1.5rem;left:1.1rem;top:-1.1rem;animation-delay:1s;}
  .zzz span:nth-child(3){font-size:2rem;left:2.4rem;top:-2.6rem;animation-delay:2s;}
  @keyframes floatz{0%{transform:translateY(8px);opacity:0}30%{opacity:1}100%{transform:translateY(-22px);opacity:0}}

  /* ---- the big red button ---- */
  .switch-wrap{display:flex;flex-direction:column;align-items:center;gap:.8rem;}
  .killbtn{
    --c:var(--red);--cd:var(--red-deep);
    width:clamp(150px,42vw,200px);height:clamp(150px,42vw,200px);border-radius:50%;
    border:0;cursor:pointer;position:relative;padding:0;
    background:
      radial-gradient(circle at 50% 32%, #ff6a5e 0%, var(--c) 42%, var(--cd) 100%);
    box-shadow:
      0 14px 0 var(--cd),
      0 18px 28px rgba(0,0,0,.6),
      inset 0 -10px 18px rgba(0,0,0,.35),
      inset 0 8px 18px rgba(255,255,255,.28),
      0 0 50px rgba(226,59,46,.45);
    transition:transform .09s ease, box-shadow .09s ease, background .4s ease;
    display:flex;align-items:center;justify-content:center;
  }
  .killbtn::before{content:"";position:absolute;inset:14% ;border-radius:50%;
    border:3px solid rgba(0,0,0,.22);pointer-events:none;}
  .killbtn .label{font-family:'Bungee',cursive;font-size:clamp(.9rem,3.4vw,1.25rem);
    color:#fff;text-shadow:0 2px 4px rgba(0,0,0,.5);text-align:center;line-height:1.05;
    letter-spacing:.02em;pointer-events:none;padding:0 .4rem;}
  .killbtn:hover{box-shadow:0 14px 0 var(--cd),0 18px 30px rgba(0,0,0,.6),
    inset 0 -10px 18px rgba(0,0,0,.35),inset 0 8px 18px rgba(255,255,255,.28),0 0 70px rgba(226,59,46,.6);}
  .killbtn:active{transform:translateY(11px);
    box-shadow:0 3px 0 var(--cd),0 6px 14px rgba(0,0,0,.55),
    inset 0 -6px 14px rgba(0,0,0,.4),inset 0 6px 14px rgba(255,255,255,.22),0 0 40px rgba(226,59,46,.5);}
  .killbtn:focus-visible{outline:4px solid var(--amber);outline-offset:6px;}
  /* wake state = green */
  body.asleep .killbtn{--c:var(--green);--cd:#157a45;
    background:radial-gradient(circle at 50% 32%, #8fffc4 0%, var(--green) 42%, #157a45 100%);
    box-shadow:0 14px 0 #157a45,0 18px 28px rgba(0,0,0,.6),
      inset 0 -10px 18px rgba(0,0,0,.35),inset 0 8px 18px rgba(255,255,255,.28),0 0 50px rgba(60,224,138,.45);}
  body.asleep .killbtn .label{color:#06251a;text-shadow:0 1px 2px rgba(255,255,255,.3);}

  .switch-base{width:clamp(190px,52vw,250px);height:34px;border-radius:8px;margin-top:-22px;
    background:linear-gradient(180deg,var(--steel),#14121d);
    box-shadow:inset 0 2px 4px rgba(255,255,255,.06),0 10px 22px rgba(0,0,0,.55);
    border:1px solid #322c44;}

  .hint{font-family:'Silkscreen',monospace;font-size:.6rem;letter-spacing:.16em;
    text-transform:uppercase;color:var(--dim);text-align:center;}

  /* ---- live strip ---- */
  .live{display:flex;flex-direction:column;align-items:center;gap:.5rem;margin-top:1.6rem;width:100%;max-width:30rem;}
  .viewers{font-family:'Silkscreen',monospace;font-size:.66rem;letter-spacing:.12em;
    text-transform:uppercase;color:var(--dim);display:flex;align-items:center;gap:.45rem;}
  .net-dot{width:.55rem;height:.55rem;border-radius:50%;background:var(--amber);}
  .net-dot.ok{background:var(--green);}
  .net-dot.off{background:var(--red);}
  .feed{width:100%;border:1px solid #2a2538;border-radius:10px;background:rgba(20,17,28,.6);
    padding:.55rem .7rem;min-height:3.4rem;max-height:8rem;overflow-y:auto;
    display:flex;flex-direction:column;gap:.3rem;}
  .feed .line{font-size:.74rem;color:var(--dim);animation:slideIn .35s ease both;}
  .feed .line b{color:var(--text);}
  .feed .line.sleep b{color:var(--red);} .feed .line.wake b{color:var(--green);}
  @keyframes slideIn{from{opacity:0;transform:translateX(-8px)}to{opacity:1;transform:none}}
  .feed-empty{font-size:.72rem;color:#534d66;font-style:italic;}

  .mute{position:fixed;top:.8rem;right:.8rem;background:rgba(20,17,28,.7);border:1px solid #2a2538;
    color:var(--dim);font-family:'Silkscreen',monospace;font-size:.6rem;letter-spacing:.1em;
    padding:.4rem .55rem;border-radius:6px;cursor:pointer;min-height:2.2rem;}
  .mute:focus-visible{outline:3px solid var(--amber);outline-offset:2px;}

  .sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);border:0;}

  @media (prefers-reduced-motion: reduce){ *{animation:none !important;transition:none !important;} }
</style>
</head>
<body>
  <button class="mute" id="muteBtn" type="button" aria-pressed="false" aria-label="Toggle sound">♪ ON</button>

  <header>
    <h1>Sloppy Toggle</h1>
    <div class="tag">The big red switch · shared by everyone watching</div>
  </header>

  <div class="readout" role="status" aria-live="polite">
    <span class="led" id="led" aria-hidden="true"></span>
    <span id="statusText">AWAKE · ONLINE</span>
  </div>

  <div class="stage">
    <svg id="sloppy" viewBox="0 0 200 200" role="img" aria-label="Sloppy the AI streamer mascot">
      <defs>
        <radialGradient id="bodyG" cx="42%" cy="34%" r="72%">
          <stop offset="0%" stop-color="#d6a0ff"/>
          <stop offset="55%" stop-color="#a557e8"/>
          <stop offset="100%" stop-color="#5a1ea0"/>
        </radialGradient>
      </defs>
      <!-- body: tear/blob -->
      <path d="M100 26 C140 26 168 64 168 108 C168 152 138 178 100 178 C62 178 32 152 32 108 C32 64 60 26 100 26 Z"
            fill="url(#bodyG)" stroke="#3d0d72" stroke-width="3"/>
      <!-- headphone band -->
      <path d="M40 96 C40 50 160 50 160 96" fill="none" stroke="#2b0c54" stroke-width="9" stroke-linecap="round"/>
      <!-- ear cans -->
      <ellipse cx="38" cy="108" rx="13" ry="20" fill="#2b0c54"/>
      <ellipse cx="162" cy="108" rx="13" ry="20" fill="#2b0c54"/>
      <circle cx="38" cy="108" r="5" fill="#ff5ea1"><animate attributeName="opacity" values="1;.3;1" dur="2.2s" repeatCount="indefinite"/></circle>
      <circle cx="162" cy="108" r="5" fill="#5ec2ff"><animate attributeName="opacity" values=".4;1;.4" dur="2.2s" repeatCount="indefinite"/></circle>
      <!-- antenna -->
      <line x1="100" y1="26" x2="100" y2="8" stroke="#3d0d72" stroke-width="3"/>
      <circle cx="100" cy="6" r="6" fill="#f2b441"><animate attributeName="r" values="6;7.5;6" dur="1.6s" repeatCount="indefinite"/></circle>
      <!-- cheeks -->
      <ellipse cx="70" cy="120" rx="10" ry="6" fill="#ff8fce" opacity=".55"/>
      <ellipse cx="130" cy="120" rx="10" ry="6" fill="#ff8fce" opacity=".55"/>
      <!-- eyes open -->
      <g class="eye-open">
        <ellipse cx="80" cy="100" rx="9" ry="11" fill="#fff"/>
        <ellipse cx="120" cy="100" rx="9" ry="11" fill="#fff"/>
        <circle cx="81" cy="102" r="4.5" fill="#21102f"/>
        <circle cx="121" cy="102" r="4.5" fill="#21102f"/>
        <circle cx="83" cy="99" r="1.6" fill="#fff"/>
        <circle cx="123" cy="99" r="1.6" fill="#fff"/>
      </g>
      <!-- eyes closed -->
      <g class="eye-closed" stroke="#21102f" stroke-width="3" stroke-linecap="round" fill="none">
        <path d="M71 102 Q80 109 89 102"/>
        <path d="M111 102 Q120 109 129 102"/>
      </g>
      <!-- mouth -->
      <path class="eye-open" d="M88 132 Q100 142 112 132" stroke="#21102f" stroke-width="3" fill="none" stroke-linecap="round"/>
      <ellipse class="eye-closed" cx="100" cy="136" rx="6" ry="4" fill="#21102f" opacity=".7"/>
    </svg>
    <div class="zzz" aria-hidden="true"><span>z</span><span>Z</span><span>z</span></div>
  </div>

  <div class="switch-wrap">
    <button class="killbtn" id="killbtn" type="button" aria-pressed="false">
      <span class="label" id="killLabel">PUT TO<br>SLEEP</span>
    </button>
    <div class="switch-base" aria-hidden="true"></div>
    <p class="hint" id="hint">Hit the switch to power Sloppy down</p>
  </div>

  <div class="live">
    <div class="viewers" aria-live="polite">
      <span class="net-dot" id="netDot" aria-hidden="true"></span>
      <span id="viewers">connecting to the switch…</span>
    </div>
    <div class="feed" id="feed" role="log" aria-live="polite" aria-label="Switch activity">
      <span class="feed-empty">No activity yet. Be the first to flip the switch.</span>
    </div>
  </div>

<script type="module">
  // ---------- state ----------
  const body = document.body;
  const killbtn = document.getElementById('killbtn');
  const killLabel = document.getElementById('killLabel');
  const statusText = document.getElementById('statusText');
  const led = document.getElementById('led');
  const hint = document.getElementById('hint');
  const feed = document.getElementById('feed');
  const viewersEl = document.getElementById('viewers');
  const netDot = document.getElementById('netDot');
  const muteBtn = document.getElementById('muteBtn');

  let awake = true;
  let muted = false;
  let feedEmptied = false;

  function applyState(isAwake, opts){
    opts = opts || {};
    awake = isAwake;
    body.classList.toggle('asleep', !awake);
    statusText.textContent = awake ? 'AWAKE · ONLINE' : 'ASLEEP · OFFLINE';
    led.classList.toggle('off', !awake);
    killLabel.innerHTML = awake ? 'PUT TO<br>SLEEP' : 'WAKE<br>SLOPPY';
    hint.textContent = awake ? 'Hit the switch to power Sloppy down' : 'Hit the switch to wake Sloppy up';
    killbtn.setAttribute('aria-pressed', awake ? 'false' : 'true');
    if(!opts.silent){
      playSound(awake);
      addFeed(opts.who || 'someone', awake);
    }
  }

  function addFeed(who, isAwake){
    if(!feedEmptied){ feed.innerHTML=''; feedEmptied=true; }
    const line = document.createElement('div');
    line.className = 'line ' + (isAwake ? 'wake' : 'sleep');
    line.innerHTML = isAwake
      ? `☀️ <b>${esc(who)}</b> woke Sloppy up`
      : `💤 <b>${esc(who)}</b> put Sloppy to sleep`;
    feed.appendChild(line);
    while(feed.children.length > 30) feed.removeChild(feed.firstChild);
    feed.scrollTop = feed.scrollHeight;
  }
  function esc(s){ return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

  // ---------- audio ----------
  let ac = null;
  function ctx(){ if(!ac){ try{ ac = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return ac; }
  function playSound(isWake){
    if(muted) return; const a = ctx(); if(!a) return;
    if(a.state === 'suspended') a.resume();
    const t = a.currentTime;
    if(isWake){
      // ascending power-up chime
      [392,523,659,784].forEach((f,i)=>{
        const o=a.createOscillator(), g=a.createGain();
        o.type='triangle'; o.frequency.value=f;
        g.gain.setValueAtTime(0,t+i*0.07); g.gain.linearRampToValueAtTime(.18,t+i*0.07+0.02);
        g.gain.exponentialRampToValueAtTime(.0008,t+i*0.07+0.4);
        o.connect(g); g.connect(a.destination); o.start(t+i*0.07); o.stop(t+i*0.07+0.45);
      });
    } else {
      // descending power-down + thunk
      const o=a.createOscillator(), g=a.createGain();
      o.type='sawtooth'; o.frequency.setValueAtTime(440,t); o.frequency.exponentialRampToValueAtTime(70,t+0.55);
      g.gain.setValueAtTime(.22,t); g.gain.exponentialRampToValueAtTime(.0008,t+0.6);
      o.connect(g); g.connect(a.destination); o.start(t); o.stop(t+0.62);
      const o2=a.createOscillator(), g2=a.createGain();
      o2.type='sine'; o2.frequency.setValueAtTime(120,t+0.5); o2.frequency.exponentialRampToValueAtTime(45,t+0.72);
      g2.gain.setValueAtTime(.001,t+0.5); g2.gain.linearRampToValueAtTime(.25,t+0.54); g2.gain.exponentialRampToValueAtTime(.001,t+0.8);
      o2.connect(g2); g2.connect(a.destination); o2.start(t+0.5); o2.stop(t+0.82);
    }
  }

  muteBtn.addEventListener('click', ()=>{
    muted = !muted;
    muteBtn.textContent = muted ? '♪ OFF' : '♪ ON';
    muteBtn.setAttribute('aria-pressed', muted ? 'true':'false');
  });

  // ---------- shared realtime ----------
  const CLIENT_ID = Math.random().toString(36).slice(2,10);
  let channel = null, synced = false, subscribed = false;

  // only emit on a LIVE subscription — a send before SUBSCRIBED is dropped silently
  async function broadcastToggle(){
    if(!channel || !subscribed) return false;
    try{
      const res = await channel.send({ type:'broadcast', event:'toggle', payload:{ awake, from: CLIENT_ID } });
      return res === 'ok';
    }catch(e){ return false; }
  }

  killbtn.addEventListener('click', ()=>{
    ctx(); // unlock audio on gesture
    applyState(!awake, { who:'you' });   // local UI flips immediately
    broadcastToggle();                   // …and propagate to everyone watching
  });

  (async ()=>{
    try{
      // use the locally-vendored UMD bundle (window.supabase) instead of the CDN
      if(!window.supabase || !window.supabase.createClient) throw new Error('supabase-js failed to load');
      const { createClient } = window.supabase;
      const SUPABASE_URL = 'https://yjyxteqzhhmtrgcaekgz.supabase.co';
      const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlqeXh0ZXF6aGhtdHJnY2Fla2d6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTczNTg3NDIsImV4cCI6MjA3MjkzNDc0Mn0.G8SRde7IN2QFW1EnASM8IS32IUYR2eenCCjdDdioiBU';
      // match the proven realtime init: no session persistence/refresh for an anon broadcast client
      const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth:{ persistSession:false, autoRefreshToken:false }
      });

      channel = supabase.channel('sloppy-toggle-v1', {
        config:{ broadcast:{ self:false }, presence:{ key: CLIENT_ID } }
      });

      // a peer flipped the switch
      channel.on('broadcast', { event:'toggle' }, ({ payload })=>{
        synced = true;
        applyState(!!payload.awake, { who:'a viewer' });
      });
      // newcomer asks for current state
      channel.on('broadcast', { event:'whois' }, ()=>{
        channel.send({ type:'broadcast', event:'state', payload:{ awake } });
      });
      // answer to our whois — adopt first authoritative state
      channel.on('broadcast', { event:'state' }, ({ payload })=>{
        if(!synced){ synced = true; applyState(!!payload.awake, { silent:true }); }
      });

      channel.on('presence', { event:'sync' }, ()=>{
        const n = Object.keys(channel.presenceState()).length;
        viewersEl.textContent = n + (n===1 ? ' hand on the switch' : ' hands on the switch');
        netDot.classList.add('ok'); netDot.classList.remove('off');
      });

      channel.subscribe(async (status)=>{
        if(status === 'SUBSCRIBED'){
          subscribed = true;
          await channel.track({ at: Date.now() });
          netDot.classList.add('ok');
          // ask the room for the current state
          channel.send({ type:'broadcast', event:'whois', payload:{ from: CLIENT_ID } });
          setTimeout(()=>{ synced = true; }, 2500); // assume default if nobody answers
        } else if(status === 'CHANNEL_ERROR' || status === 'TIMED_OUT' || status === 'CLOSED'){
          subscribed = false;
          offlineMode();
        }
      });
    }catch(e){
      offlineMode();
    }
  })();

  function offlineMode(){
    synced = true;
    netDot.classList.add('off'); netDot.classList.remove('ok');
    viewersEl.textContent = 'solo mode · switch works locally';
  }
</script>
</body>
</html>
