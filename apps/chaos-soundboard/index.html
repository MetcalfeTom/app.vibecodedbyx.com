<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chaos Soundboard</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%94%8A">
<meta name="description" content="Big colorful buttons. Each one detonates a meme sound. Hit CHAOS to blast a random one.">
<meta property="og:title" content="Chaos Soundboard">
<meta property="og:description" content="Big colorful buttons. Each one detonates a meme sound.">
<meta property="og:url" content="https://app.sloppy.live/chaos-soundboard">
<meta property="og:image" content="https://app.sloppy.live/chaos-soundboard/og-image.png">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root{
  --bg1:#0d0518;
  --bg2:#1a0930;
  --ink:#fff;
  --hot:#ff2e88;
  --lime:#d4ff3a;
  --cyan:#3afff0;
  --orange:#ff8c00;
  --violet:#8a4bff;
  --yellow:#ffd23a;
  --red:#ff3a3a;
  --teal:#00c9a7;
  --pink:#ff6fae;
  --blue:#3a8cff;
  --mustard:#d4a017;
  --spring:#3aff7a;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--bg1);color:var(--ink);font-family:'IBM Plex Mono',monospace;overflow-x:hidden;-webkit-tap-highlight-color:transparent;}
body{
  min-height:100%;
  background:
    radial-gradient(ellipse at 20% 30%, rgba(255,46,136,.15), transparent 55%),
    radial-gradient(ellipse at 85% 70%, rgba(58,255,240,.12), transparent 55%),
    radial-gradient(ellipse at 50% 100%, rgba(212,255,58,.08), transparent 60%),
    linear-gradient(180deg, var(--bg1), var(--bg2));
  background-attachment:fixed;
  padding:18px 16px 32px;
}

/* Glitchy scanline overlay */
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:1;
  background:repeating-linear-gradient(to bottom, rgba(255,255,255,.03) 0 1px, transparent 1px 3px);
  mix-blend-mode:overlay;
}

.wrap{max-width:1080px;margin:0 auto;position:relative;z-index:2}

header{
  text-align:center;margin-bottom:20px;
}
h1{
  font-family:'Shrikhand',serif;font-size:clamp(2.4rem, 6vw, 4.4rem);
  background:linear-gradient(90deg, var(--hot), var(--yellow), var(--cyan), var(--lime));
  -webkit-background-clip:text;background-clip:text;color:transparent;
  letter-spacing:.01em;line-height:.95;
  filter:drop-shadow(0 2px 0 rgba(0,0,0,.35));
  transform:skew(-2deg);
}
.sub{
  font-size:.78rem;letter-spacing:.25em;text-transform:uppercase;color:#c8b8ff;
  margin-top:6px;opacity:.85;
}
.sub b{color:var(--lime)}

/* Chaos mega-button */
.chaos-row{display:flex;gap:8px;justify-content:center;margin:14px 0 18px;flex-wrap:wrap}
.btn-chaos{
  font-family:'Bowlby One',sans-serif;font-size:1.1rem;letter-spacing:.18em;
  padding:12px 24px;
  background:linear-gradient(135deg, var(--hot), var(--orange));
  color:#fff;border:3px solid #fff;border-radius:999px;cursor:pointer;
  box-shadow:0 0 24px rgba(255,46,136,.55), inset 0 0 12px rgba(255,255,255,.2);
  text-transform:uppercase;transition:transform .1s, box-shadow .15s;
}
.btn-chaos:hover{transform:translateY(-2px) scale(1.04);box-shadow:0 0 36px rgba(255,46,136,.8)}
.btn-chaos:active{transform:translateY(2px) scale(.97)}
.btn-panic{
  font-family:'IBM Plex Mono',monospace;font-size:.78rem;letter-spacing:.2em;
  padding:12px 16px;background:#120420;color:#c8b8ff;
  border:2px dashed rgba(255,255,255,.25);border-radius:999px;cursor:pointer;
  text-transform:uppercase;transition:all .15s;
}
.btn-panic:hover{color:#fff;border-color:#fff}

/* Grid */
.grid{
  display:grid;gap:14px;
  grid-template-columns:repeat(auto-fit, minmax(180px, 1fr));
}
@media(max-width:480px){
  .grid{grid-template-columns:repeat(2, 1fr);gap:10px}
}

.pad{
  position:relative;aspect-ratio:1/1;
  border-radius:20px;border:none;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
  font-family:'Bowlby One',sans-serif;font-size:1rem;letter-spacing:.04em;
  color:#120420;text-transform:uppercase;
  transition:transform .08s cubic-bezier(.2,1.6,.5,1), filter .12s, box-shadow .15s;
  overflow:hidden;user-select:none;
  box-shadow:
    0 6px 0 rgba(0,0,0,.4),
    0 10px 28px rgba(0,0,0,.35),
    inset 0 2px 0 rgba(255,255,255,.45),
    inset 0 -4px 0 rgba(0,0,0,.18);
}
.pad .emoji{font-size:2.8rem;filter:drop-shadow(0 2px 0 rgba(0,0,0,.25));line-height:1}
.pad .label{font-size:.95rem;text-align:center;padding:0 8px;line-height:1.1}
.pad .hotkey{
  position:absolute;top:8px;right:10px;
  font-family:'IBM Plex Mono',monospace;font-size:.72rem;letter-spacing:.05em;
  font-weight:700;color:rgba(0,0,0,.55);
  background:rgba(255,255,255,.35);padding:2px 6px;border-radius:6px;
}
.pad:hover{filter:brightness(1.1) saturate(1.15);transform:translateY(-2px)}
.pad:active, .pad.pressed{
  transform:translateY(4px) scale(.97);
  box-shadow:
    0 2px 0 rgba(0,0,0,.4),
    0 4px 14px rgba(0,0,0,.35),
    inset 0 2px 0 rgba(255,255,255,.3),
    inset 0 -2px 0 rgba(0,0,0,.2);
}
.pad.flash::before{
  content:"";position:absolute;inset:0;background:#fff;
  animation:flash .35s ease-out forwards;pointer-events:none;
}
@keyframes flash{
  from{opacity:.75}
  to{opacity:0}
}

/* Particles */
.fx{position:fixed;inset:0;pointer-events:none;z-index:5}

footer{
  text-align:center;margin-top:22px;
  font-family:'IBM Plex Mono',monospace;font-size:.72rem;
  letter-spacing:.15em;color:#7a6fa0;text-transform:uppercase;
}
footer kbd{
  display:inline-block;padding:2px 7px;border-radius:4px;
  background:#2a1a46;color:#fff;border:1px solid #4a3a66;
  font-size:.68rem;margin:0 1px;
}

/* Toast */
.toast{
  position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(30px);
  background:#120420;color:#fff;font-family:'Bowlby One',sans-serif;
  font-size:1rem;letter-spacing:.08em;text-transform:uppercase;
  padding:10px 22px;border-radius:999px;border:2px solid var(--hot);
  box-shadow:0 0 30px rgba(255,46,136,.5);
  opacity:0;transition:all .25s;pointer-events:none;z-index:50;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Volume slider */
.vol{
  display:flex;align-items:center;gap:8px;
  font-family:'IBM Plex Mono',monospace;font-size:.7rem;letter-spacing:.15em;
  color:#c8b8ff;text-transform:uppercase;
}
.vol input[type=range]{
  -webkit-appearance:none;appearance:none;width:120px;height:4px;
  background:linear-gradient(90deg, var(--hot), var(--cyan));border-radius:4px;
  outline:none;cursor:pointer;
}
.vol input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:14px;height:14px;border-radius:50%;
  background:#fff;border:2px solid var(--hot);cursor:pointer;
}
.vol input[type=range]::-moz-range-thumb{
  width:14px;height:14px;border-radius:50%;
  background:#fff;border:2px solid var(--hot);cursor:pointer;
}
</style>
</head>
<body>

<div class="wrap">
  <header>
    <h1>CHAOS SOUNDBOARD</h1>
    <div class="sub">hit a <b>button</b>. watch it <b>explode</b>. no login, just noise.</div>
  </header>

  <div class="chaos-row">
    <button class="btn-chaos" id="chaosBtn">🎰 CHAOS RANDOM</button>
    <button class="btn-panic" id="panicBtn">🔇 STOP ALL</button>
    <label class="vol">
      vol
      <input type="range" id="volSlider" min="0" max="100" value="70">
    </label>
  </div>

  <div class="grid" id="grid"></div>

  <footer>
    Keys <kbd>1</kbd>–<kbd>9</kbd>, <kbd>0</kbd>, <kbd>Q</kbd>, <kbd>W</kbd> &nbsp;·&nbsp; <kbd>Space</kbd> = chaos &nbsp;·&nbsp; <kbd>X</kbd> = stop
  </footer>
</div>

<canvas class="fx" id="fx"></canvas>
<div class="toast" id="toast"></div>

<script>
// ──────────────────────────────────────────────
// Audio engine (Web Audio, all synthesized)
// ──────────────────────────────────────────────
let ctx = null;
let master = null;
let activeNodes = new Set();

function ensureCtx(){
  if(ctx) return ctx;
  const C = window.AudioContext || window.webkitAudioContext;
  ctx = new C();
  master = ctx.createGain();
  master.gain.value = 0.7;
  master.connect(ctx.destination);
  return ctx;
}

function track(node){
  activeNodes.add(node);
  if(node.stop){
    const orig = node.stop.bind(node);
    node.stop = (...a)=>{ try{ orig(...a); }catch(e){} activeNodes.delete(node); };
  }
}

function stopAll(){
  for(const n of activeNodes){
    try { n.stop(); } catch(e){}
    try { n.disconnect(); } catch(e){}
  }
  activeNodes.clear();
}

function envGain(peak, attack, decay, hold=0){
  const g = ctx.createGain();
  const t0 = ctx.currentTime;
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(peak, t0+attack);
  if(hold>0) g.gain.setValueAtTime(peak, t0+attack+hold);
  g.gain.exponentialRampToValueAtTime(0.0001, t0+attack+hold+decay);
  return g;
}

function noiseBuffer(dur, color='white'){
  const len = Math.floor(ctx.sampleRate * dur);
  const buf = ctx.createBuffer(1, len, ctx.sampleRate);
  const d = buf.getChannelData(0);
  let last = 0;
  for(let i=0;i<len;i++){
    let v = Math.random()*2-1;
    if(color==='pink'){ v = (last + v*0.2); last = v*0.98; }
    if(color==='brown'){ v = (last + v*0.05); last = v*0.99; }
    d[i] = v;
  }
  return buf;
}

// ──── Individual meme sounds ────

function sndAirhorn(){
  ensureCtx();
  const t0 = ctx.currentTime;
  for(let i=0;i<2;i++){
    const osc = ctx.createOscillator();
    osc.type = 'square';
    osc.frequency.setValueAtTime(180 + i*5, t0);
    osc.frequency.linearRampToValueAtTime(440 + i*5, t0+0.04);
    osc.frequency.setValueAtTime(440 + i*5, t0+0.65);
    osc.frequency.linearRampToValueAtTime(420, t0+0.85);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0,t0);
    g.gain.linearRampToValueAtTime(0.35, t0+0.03);
    g.gain.setValueAtTime(0.35, t0+0.7);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+0.95);
    const f = ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=2400; f.Q.value=1.2;
    osc.connect(f); f.connect(g); g.connect(master);
    osc.start(t0); osc.stop(t0+1.0); track(osc);
  }
}

function sndVineBoom(){
  ensureCtx();
  const t0 = ctx.currentTime;
  // low thump
  const osc = ctx.createOscillator();
  osc.type='sine';
  osc.frequency.setValueAtTime(140, t0);
  osc.frequency.exponentialRampToValueAtTime(30, t0+0.6);
  const g = ctx.createGain();
  g.gain.setValueAtTime(0.0, t0);
  g.gain.linearRampToValueAtTime(0.85, t0+0.008);
  g.gain.exponentialRampToValueAtTime(0.001, t0+0.65);
  osc.connect(g); g.connect(master);
  osc.start(t0); osc.stop(t0+0.7); track(osc);
  // noise burst
  const src = ctx.createBufferSource(); src.buffer = noiseBuffer(0.25, 'brown');
  const nf = ctx.createBiquadFilter(); nf.type='lowpass'; nf.frequency.value=300;
  const ng = ctx.createGain();
  ng.gain.setValueAtTime(0.4, t0);
  ng.gain.exponentialRampToValueAtTime(0.001, t0+0.25);
  src.connect(nf); nf.connect(ng); ng.connect(master);
  src.start(t0); track(src);
}

function sndBruh(){
  ensureCtx();
  const t0 = ctx.currentTime;
  const osc = ctx.createOscillator();
  osc.type='sawtooth';
  osc.frequency.setValueAtTime(200, t0);
  osc.frequency.exponentialRampToValueAtTime(85, t0+0.25);
  const f = ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=800; f.Q.value=3;
  const g = envGain(0.5, 0.01, 0.25, 0.05);
  osc.connect(f); f.connect(g); g.connect(master);
  osc.start(t0); osc.stop(t0+0.4); track(osc);
}

function sndFart(){
  ensureCtx();
  const t0 = ctx.currentTime;
  const osc = ctx.createOscillator();
  osc.type='square';
  osc.frequency.setValueAtTime(110, t0);
  const dur = 0.55;
  // wobble
  const lfo = ctx.createOscillator(); lfo.type='sine'; lfo.frequency.value=22;
  const lfoG = ctx.createGain(); lfoG.gain.value=30;
  lfo.connect(lfoG); lfoG.connect(osc.frequency);
  // random chop
  osc.frequency.setValueAtTime(110, t0);
  osc.frequency.linearRampToValueAtTime(75, t0+dur);
  const f = ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=900;
  const g = envGain(0.45, 0.005, dur);
  osc.connect(f); f.connect(g); g.connect(master);
  osc.start(t0); lfo.start(t0);
  osc.stop(t0+dur); lfo.stop(t0+dur);
  track(osc); track(lfo);
}

function sndSadTrombone(){
  ensureCtx();
  const t0 = ctx.currentTime;
  const notes = [
    {f:392, t:0,   d:0.22}, // G
    {f:370, t:0.22,d:0.22}, // F#
    {f:349, t:0.44,d:0.22}, // F
    {f:294, t:0.66,d:0.55}, // D (hold)
  ];
  notes.forEach(n=>{
    const osc = ctx.createOscillator();
    osc.type='sawtooth';
    osc.frequency.setValueAtTime(n.f, t0+n.t);
    // slide down slightly
    osc.frequency.linearRampToValueAtTime(n.f*0.96, t0+n.t+n.d);
    const f = ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=1200; f.Q.value=2;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0, t0+n.t);
    g.gain.linearRampToValueAtTime(0.32, t0+n.t+0.02);
    g.gain.setValueAtTime(0.32, t0+n.t+n.d-0.05);
    g.gain.exponentialRampToValueAtTime(0.001, t0+n.t+n.d);
    osc.connect(f); f.connect(g); g.connect(master);
    osc.start(t0+n.t); osc.stop(t0+n.t+n.d); track(osc);
  });
}

function sndTada(){
  ensureCtx();
  const t0 = ctx.currentTime;
  // "ta" short chord
  [523, 659, 784].forEach(f=>{ // C E G
    const o = ctx.createOscillator(); o.type='triangle'; o.frequency.value=f;
    const g = envGain(0.18, 0.005, 0.18, 0.05);
    o.connect(g); g.connect(master);
    o.start(t0); o.stop(t0+0.25); track(o);
  });
  // "daa" hold chord
  [523, 659, 784, 1047].forEach(f=>{
    const o = ctx.createOscillator(); o.type='triangle'; o.frequency.value=f;
    const g = envGain(0.18, 0.01, 0.8, 0.6);
    o.connect(g); g.connect(master);
    o.start(t0+0.3); o.stop(t0+1.8); track(o);
  });
}

function sndBonk(){
  ensureCtx();
  const t0 = ctx.currentTime;
  const osc = ctx.createOscillator();
  osc.type='triangle';
  osc.frequency.setValueAtTime(900, t0);
  osc.frequency.exponentialRampToValueAtTime(120, t0+0.15);
  const g = envGain(0.5, 0.002, 0.18);
  osc.connect(g); g.connect(master);
  osc.start(t0); osc.stop(t0+0.22); track(osc);
}

function sndCrickets(){
  ensureCtx();
  const t0 = ctx.currentTime;
  // chirp: 5 quick high squeaks over 2 seconds
  for(let i=0;i<5;i++){
    const chirp = t0 + i*0.4 + (Math.random()*0.1);
    const o = ctx.createOscillator(); o.type='square';
    o.frequency.setValueAtTime(3200 + Math.random()*400, chirp);
    const g = ctx.createGain();
    g.gain.setValueAtTime(0, chirp);
    g.gain.linearRampToValueAtTime(0.1, chirp+0.003);
    g.gain.exponentialRampToValueAtTime(0.0001, chirp+0.06);
    const f = ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=4000; f.Q.value=8;
    o.connect(f); f.connect(g); g.connect(master);
    o.start(chirp); o.stop(chirp+0.07); track(o);
  }
}

function sndRickroll(){
  ensureCtx();
  const t0 = ctx.currentTime;
  // 7-note intro: C E A G F E D (approx)
  const notes = [
    {f:523, t:0.00, d:0.18},
    {f:659, t:0.18, d:0.18},
    {f:880, t:0.36, d:0.18},
    {f:784, t:0.54, d:0.18},
    {f:698, t:0.72, d:0.18},
    {f:659, t:0.90, d:0.18},
    {f:587, t:1.08, d:0.36},
  ];
  notes.forEach(n=>{
    const o = ctx.createOscillator(); o.type='square';
    o.frequency.value = n.f;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0, t0+n.t);
    g.gain.linearRampToValueAtTime(0.18, t0+n.t+0.01);
    g.gain.setValueAtTime(0.18, t0+n.t+n.d-0.04);
    g.gain.exponentialRampToValueAtTime(0.001, t0+n.t+n.d);
    const f = ctx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=2500;
    o.connect(f); f.connect(g); g.connect(master);
    o.start(t0+n.t); o.stop(t0+n.t+n.d); track(o);
  });
}

function sndMetalPipe(){
  ensureCtx();
  const t0 = ctx.currentTime;
  // Clang: multiple inharmonic partials + noise attack
  const partials = [310, 740, 1120, 1870, 2320];
  partials.forEach((f,i)=>{
    const o = ctx.createOscillator();
    o.type='sine';
    o.frequency.value = f;
    const g = ctx.createGain();
    const peak = 0.24/(1+i*0.7);
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(peak, t0+0.002);
    g.gain.exponentialRampToValueAtTime(0.0001, t0+1.8-i*0.12);
    o.connect(g); g.connect(master);
    o.start(t0); o.stop(t0+2.0); track(o);
  });
  // initial noise tick
  const src = ctx.createBufferSource(); src.buffer = noiseBuffer(0.04,'white');
  const nf = ctx.createBiquadFilter(); nf.type='highpass'; nf.frequency.value=2200;
  const ng = ctx.createGain(); ng.gain.setValueAtTime(0.35,t0);
  ng.gain.exponentialRampToValueAtTime(0.001, t0+0.05);
  src.connect(nf); nf.connect(ng); ng.connect(master);
  src.start(t0); track(src);
}

function sndScream(){
  ensureCtx();
  const t0 = ctx.currentTime;
  const osc = ctx.createOscillator(); osc.type='sawtooth';
  osc.frequency.setValueAtTime(200, t0);
  osc.frequency.exponentialRampToValueAtTime(1600, t0+0.3);
  osc.frequency.linearRampToValueAtTime(1400, t0+0.7);
  const dist = ctx.createWaveShaper();
  const curve = new Float32Array(256);
  for(let i=0;i<256;i++){ const x=(i/128)-1; curve[i] = Math.sign(x)*Math.pow(Math.abs(x),0.4); }
  dist.curve = curve;
  const f = ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=1400; f.Q.value=4;
  const g = envGain(0.4, 0.01, 0.3, 0.4);
  osc.connect(dist); dist.connect(f); f.connect(g); g.connect(master);
  osc.start(t0); osc.stop(t0+0.8); track(osc);
}

function sndDialup(){
  ensureCtx();
  const t0 = ctx.currentTime;
  // A sequence reminiscent of modem handshake
  const seq = [
    {f:1800, t:0.00, d:0.25},
    {f:2100, t:0.25, d:0.25},
    {f:1200, t:0.55, d:0.50},
    {f:2500, t:1.05, d:0.20},
    {f:2400, t:1.25, d:0.30, type:'sawtooth'},
  ];
  seq.forEach(n=>{
    const o = ctx.createOscillator();
    o.type = n.type || 'sine';
    o.frequency.setValueAtTime(n.f, t0+n.t);
    const g = envGain(0.20, 0.01, n.d, Math.max(0, n.d-0.08));
    o.connect(g); g.connect(master);
    o.start(t0+n.t); o.stop(t0+n.t+n.d+0.2); track(o);
  });
  // white noise hiss underlayer
  const src = ctx.createBufferSource(); src.buffer = noiseBuffer(1.6,'pink');
  const nf = ctx.createBiquadFilter(); nf.type='bandpass'; nf.frequency.value=2000; nf.Q.value=2;
  const ng = ctx.createGain(); ng.gain.value=0.04;
  src.connect(nf); nf.connect(ng); ng.connect(master);
  src.start(t0); src.stop(t0+1.6); track(src);
}

function sndChaching(){
  ensureCtx();
  const t0 = ctx.currentTime;
  // Bell ding
  [1200, 1800].forEach((f,i)=>{
    const o = ctx.createOscillator(); o.type='triangle'; o.frequency.value=f;
    const g = envGain(0.22, 0.002, 0.5);
    o.connect(g); g.connect(master);
    o.start(t0+i*0.02); o.stop(t0+0.6); track(o);
  });
  // Drawer slide (noise burst)
  const src = ctx.createBufferSource(); src.buffer = noiseBuffer(0.35,'white');
  const nf = ctx.createBiquadFilter(); nf.type='highpass'; nf.frequency.value=3000;
  const ng = ctx.createGain();
  ng.gain.setValueAtTime(0.0, t0);
  ng.gain.linearRampToValueAtTime(0.25, t0+0.15);
  ng.gain.exponentialRampToValueAtTime(0.001, t0+0.5);
  src.connect(nf); nf.connect(ng); ng.connect(master);
  src.start(t0); track(src);
}

function sndDiscordPing(){
  ensureCtx();
  const t0 = ctx.currentTime;
  [{f:740,t:0},{f:988,t:0.09}].forEach(n=>{
    const o = ctx.createOscillator(); o.type='sine'; o.frequency.value=n.f;
    const g = envGain(0.3, 0.005, 0.22, 0.02);
    o.connect(g); g.connect(master);
    o.start(t0+n.t); o.stop(t0+n.t+0.3); track(o);
  });
}

function sndWilhelm(){
  ensureCtx();
  const t0 = ctx.currentTime;
  // Stylized "aaaghhh"
  const o = ctx.createOscillator(); o.type='sawtooth';
  o.frequency.setValueAtTime(220, t0);
  o.frequency.linearRampToValueAtTime(180, t0+0.2);
  o.frequency.linearRampToValueAtTime(80, t0+0.55);
  const f = ctx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=900; f.Q.value=4;
  // Tremolo
  const lfo = ctx.createOscillator(); lfo.type='sine'; lfo.frequency.value=12;
  const lg = ctx.createGain(); lg.gain.value=0.3;
  lfo.connect(lg); lg.connect(f.frequency);
  const g = envGain(0.45, 0.015, 0.25, 0.3);
  o.connect(f); f.connect(g); g.connect(master);
  o.start(t0); o.stop(t0+0.6); track(o);
  lfo.start(t0); lfo.stop(t0+0.6); track(lfo);
}

// ──── Table of sounds ────
const SOUNDS = [
  {key:'1', emoji:'📯', label:'AIR HORN',       color:'var(--hot)',     fn:sndAirhorn},
  {key:'2', emoji:'💥', label:'VINE BOOM',      color:'var(--yellow)',  fn:sndVineBoom},

  {key:'4', emoji:'💨', label:'FART',           color:'var(--lime)',    fn:sndFart},
  {key:'5', emoji:'🎺', label:'SAD TROMBONE',   color:'var(--orange)',  fn:sndSadTrombone},
  {key:'6', emoji:'✨', label:'TA-DA!',         color:'var(--pink)',    fn:sndTada},
  {key:'7', emoji:'🪵', label:'BONK',           color:'var(--mustard)', fn:sndBonk},
  {key:'8', emoji:'🦗', label:'CRICKETS',       color:'var(--spring)',  fn:sndCrickets},

];

// ──────────────────────────────────────────────
// UI
// ──────────────────────────────────────────────
const grid = document.getElementById('grid');
const toast = document.getElementById('toast');
let toastT = null;
function showToast(msg){
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(()=>toast.classList.remove('show'), 1100);
}

SOUNDS.forEach((s, i)=>{
  const btn = document.createElement('button');
  btn.className = 'pad';
  btn.dataset.idx = i;
  btn.style.background = `linear-gradient(145deg, ${s.color}, rgba(255,255,255,.15))`;
  btn.style.setProperty('--pad-color', s.color);
  btn.innerHTML = `
    <div class="hotkey">${s.key.toUpperCase()}</div>
    <div class="emoji">${s.emoji}</div>
    <div class="label">${s.label}</div>
  `;
  btn.addEventListener('click', (e)=> firePad(i, btn, e));
  grid.appendChild(btn);
});

function firePad(i, btn, ev){
  const s = SOUNDS[i];
  if(!s) return;
  try { s.fn(); } catch(e){ console.error('snd err', e); showToast('Sound failed'); return; }
  btn.classList.add('pressed','flash');
  setTimeout(()=>btn.classList.remove('pressed'), 90);
  setTimeout(()=>btn.classList.remove('flash'), 350);
  // Particles
  const rect = btn.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  spawnParticles(cx, cy, s.color);
  showToast(s.label);
}

document.getElementById('chaosBtn').addEventListener('click', ()=>{
  const i = Math.floor(Math.random()*SOUNDS.length);
  const btn = grid.children[i];
  firePad(i, btn);
  flashAll();
});

document.getElementById('panicBtn').addEventListener('click', ()=>{
  stopAll();
  showToast('🔇 silence');
});

document.getElementById('volSlider').addEventListener('input', (e)=>{
  const v = +e.target.value / 100;
  if(master) master.gain.setTargetAtTime(v, ctx.currentTime, 0.02);
  // Also set before ctx exists — keep an "intended" value
  pendingVolume = v;
});
let pendingVolume = 0.7;

// Apply volume after ctx init
const _origEnsure = ensureCtx;
ensureCtx = function(){
  const c = _origEnsure();
  if(master) master.gain.value = pendingVolume;
  return c;
};

// Keyboard
const keyMap = {};
SOUNDS.forEach((s,i)=>{ keyMap[s.key.toLowerCase()] = i; });
window.addEventListener('keydown', (e)=>{
  if(e.repeat) return;
  const k = e.key.toLowerCase();
  if(keyMap[k] !== undefined){
    const i = keyMap[k];
    firePad(i, grid.children[i]);
    e.preventDefault();
  } else if(k === ' '){
    document.getElementById('chaosBtn').click();
    e.preventDefault();
  } else if(k === 'x'){
    stopAll();
    showToast('🔇 silence');
    e.preventDefault();
  }
});

// ──────────────────────────────────────────────
// Particle canvas
// ──────────────────────────────────────────────
const fx = document.getElementById('fx');
const fxCtx = fx.getContext('2d');
let parts = [];
function resize(){ fx.width = innerWidth; fx.height = innerHeight; }
addEventListener('resize', resize); resize();

function colorHex(v){
  // Resolve CSS variable to hex for particles
  const s = getComputedStyle(document.documentElement).getPropertyValue(v.replace('var(','').replace(')','').trim()) || v;
  return s.trim() || '#ffffff';
}

function spawnParticles(x, y, color){
  const c = colorHex(color);
  const n = 22 + Math.floor(Math.random()*14);
  for(let i=0;i<n;i++){
    const a = Math.random()*Math.PI*2;
    const sp = 3 + Math.random()*7;
    parts.push({
      x, y,
      vx: Math.cos(a)*sp,
      vy: Math.sin(a)*sp - 2,
      g: 0.18 + Math.random()*0.12,
      life: 1,
      decay: 0.012 + Math.random()*0.015,
      r: 3 + Math.random()*5,
      color: c,
      shape: Math.random()<0.5 ? 'rect' : 'circle',
      rot: Math.random()*Math.PI,
      vr: (Math.random()-0.5)*0.4,
    });
  }
  if(!raf) loopFx();
}

function flashAll(){
  const rect = grid.getBoundingClientRect();
  const cx = rect.left + rect.width/2;
  const cy = rect.top + rect.height/2;
  ['var(--hot)','var(--yellow)','var(--cyan)','var(--lime)','var(--violet)','var(--pink)'].forEach(col=>{
    spawnParticles(cx + (Math.random()-0.5)*200, cy + (Math.random()-0.5)*200, col);
  });
}

let raf = null;
function loopFx(){
  fxCtx.clearRect(0,0,fx.width,fx.height);
  for(let i=parts.length-1;i>=0;i--){
    const p = parts[i];
    p.x += p.vx; p.y += p.vy; p.vy += p.g;
    p.rot += p.vr;
    p.life -= p.decay;
    if(p.life <= 0 || p.y > fx.height+40){ parts.splice(i,1); continue; }
    fxCtx.save();
    fxCtx.translate(p.x, p.y);
    fxCtx.rotate(p.rot);
    fxCtx.fillStyle = p.color;
    fxCtx.globalAlpha = Math.max(0, p.life);
    if(p.shape==='rect'){
      fxCtx.fillRect(-p.r, -p.r*0.5, p.r*2, p.r);
    } else {
      fxCtx.beginPath();
      fxCtx.arc(0,0,p.r,0,Math.PI*2);
      fxCtx.fill();
    }
    fxCtx.restore();
  }
  if(parts.length){ raf = requestAnimationFrame(loopFx); }
  else { raf = null; }
}

// Unlock audio on first user gesture — suppressed toast on first click
document.addEventListener('pointerdown', ()=>{
  try { ensureCtx(); if(ctx.state === 'suspended') ctx.resume(); } catch(e){}
}, {once:true});
</script>
