<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Taskbar Hero</title>
<meta name="description" content="An idle RPG in your taskbar: a tiny pixel hero auto-slays the notification popups that plague humanity. XP, levels, and a trophy inventory of dismissed evils.">
<link rel="icon" href="https://emojicdn.elk.sh/⚔️">
<meta property="og:title" content="Taskbar Hero — the taskbar idle RPG">
<meta property="og:description" content="A pixel hero lives in your taskbar and fights the popups: cookie banners, update reminders, 47 unread emails. Level up. Collect their remains.">
<meta property="og:url" content="https://sloppy.live/taskbar-hero/">
<meta property="og:type" content="website">
<meta property="og:image" content="https://image.pollinations.ai/prompt/tiny%20pixel%20knight%20fighting%20giant%20notification%20popup%20windows%20on%20a%20computer%20taskbar%2C%20sword%20slash%2C%20retro%20game%20art%2C%20dark%20desktop%20background.png?width=1200&height=630&seed=4242&model=flux&nologo=true">
<style>
  :root{
    --desk1:#1a2340;
    --desk2:#0d1226;
    --bar:#0b0e1c;
    --ink:#e6ebf7;
    --dim:#8a93b0;
    --gold:#f5c453;
    --hp:#e05a5a;
    --xp:#6fd88a;
    --toast:#1c2236;
  }
  html{ font-size:100%; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    font-family:"Rubik", sans-serif;
    background:
      radial-gradient(ellipse 80% 60% at 50% 30%, var(--desk1), var(--desk2) 80%);
    color:var(--ink);
    height:100dvh;
    overflow:hidden;
    user-select:none; -webkit-user-select:none;
  }
  /* hero stats card (top-left like a quest HUD) */
  #hud{
    position:fixed; top:1rem; left:1rem;
    background:rgba(11,14,28,0.85);
    border:1px solid #263054;
    border-radius:0.7rem;
    padding:0.7rem 0.9rem;
    min-width:15rem;
    z-index:10;
  }
  #hud h1{
    font-family:"Pixelify Sans", sans-serif;
    font-size:1.15rem;
    color:var(--gold);
    letter-spacing:0.04em;
  }
  #hud .lv{ font-size:0.8rem; color:var(--dim); margin:0.15rem 0 0.4rem; }
  #hud .lv b{ color:var(--ink); }
  .bar{
    height:0.7rem;
    background:#0a0d1a;
    border:1px solid #263054;
    border-radius:999px;
    overflow:hidden;
    margin-bottom:0.3rem;
  }
  .bar > div{ height:100%; width:0%; transition:width 0.25s ease; }
  #xpFill{ background:linear-gradient(90deg, #3d8a56, var(--xp)); }
  .statline{ font-size:0.7rem; color:var(--dim); display:flex; gap:1rem; }
  .statline b{ color:var(--gold); font-weight:600; }
  #invBtn{
    margin-top:0.5rem;
    font-family:inherit;
    font-size:0.72rem;
    min-height:2.4rem;
    padding:0.2rem 0.8rem;
    background:#141a30;
    color:var(--ink);
    border:1px solid #263054;
    border-radius:0.4rem;
    cursor:pointer;
  }
  button:focus-visible{ outline:3px solid var(--gold); outline-offset:2px; }
  /* inventory panel */
  #inv{
    position:fixed; top:1rem; right:1rem;
    width:min(20rem, 92vw);
    max-height:70dvh;
    overflow-y:auto;
    background:rgba(11,14,28,0.92);
    border:1px solid #263054;
    border-radius:0.7rem;
    padding:0.8rem 0.9rem;
    z-index:11;
    display:none;
  }
  #inv.open{ display:block; }
  #inv h2{
    font-family:"Pixelify Sans", sans-serif;
    font-size:1rem;
    color:var(--gold);
    margin-bottom:0.5rem;
  }
  #inv .item{
    display:flex; gap:0.5rem; align-items:baseline;
    padding:0.3rem 0;
    border-bottom:1px dashed #263054;
    font-size:0.78rem;
  }
  #inv .item .n{ color:var(--gold); margin-left:auto; white-space:nowrap; }
  #inv .item .fl{ display:block; font-size:0.66rem; color:var(--dim); }
  #inv .empty{ font-size:0.75rem; color:var(--dim); }
  /* toasts (the monsters) */
  #toasts{
    position:fixed;
    right:0.9rem;
    bottom:3.6rem;
    display:flex;
    flex-direction:column-reverse;
    gap:0.55rem;
    z-index:5;
    width:min(21rem, 88vw);
  }
  .toast{
    background:var(--toast);
    border:1px solid #2c3760;
    border-left:0.3rem solid var(--hp);
    border-radius:0.5rem;
    padding:0.5rem 0.7rem 0.55rem;
    box-shadow:0 0.6rem 1.6rem rgba(0,0,0,0.5);
    cursor:pointer;
    position:relative;
    overflow:hidden;
  }
  .toast .tt{
    font-size:0.8rem;
    font-weight:600;
    display:flex; gap:0.4rem; align-items:center;
  }
  .toast .fl{ font-size:0.66rem; color:var(--dim); margin:0.15rem 0 0.35rem; }
  .toast .hpbar{
    height:0.45rem;
    background:#0a0d1a;
    border-radius:999px;
    overflow:hidden;
  }
  .toast .hpbar div{
    height:100%; width:100%;
    background:linear-gradient(90deg, #8a2f2f, var(--hp));
    transition:width 0.12s ease;
  }
  .toast.hit{ animation:tshake 0.14s ease; }
  @keyframes tshake{ 50%{ transform:translateX(-0.35rem) rotate(-0.7deg); } }
  .toast.boss{ border-left-color:var(--gold); box-shadow:0 0 1.2rem rgba(245,196,83,0.35); }
  .toast .dmg{
    position:absolute;
    right:0.6rem; top:0.2rem;
    font-family:"Pixelify Sans", sans-serif;
    color:var(--gold);
    font-size:1rem;
    animation:dfloat 0.6s ease forwards;
    pointer-events:none;
  }
  @keyframes dfloat{ to{ transform:translateY(-1.1rem); opacity:0; } }
  /* taskbar */
  #taskbar{
    position:fixed;
    left:0; right:0; bottom:0;
    height:3rem;
    background:linear-gradient(180deg, #10142a, var(--bar));
    border-top:1px solid #263054;
    display:flex;
    align-items:center;
    padding:0 0.9rem;
    gap:0.9rem;
    z-index:6;
  }
  #startBtn{
    font-family:"Pixelify Sans", sans-serif;
    font-size:0.85rem;
    color:var(--gold);
    background:#141a30;
    border:1px solid #263054;
    border-radius:0.4rem;
    min-height:2.2rem;
    padding:0 0.8rem;
    cursor:default;
  }
  #clock{
    margin-left:auto;
    font-size:0.75rem;
    color:var(--dim);
    font-variant-numeric:tabular-nums;
  }
  /* hero canvas rides ON the taskbar */
  #heroC{
    position:fixed;
    bottom:2.9rem;
    left:0;
    width:64px; height:64px;
    image-rendering:pixelated;
    z-index:7;
    pointer-events:none;
  }
  #announce{
    position:fixed;
    bottom:4.2rem; left:50%;
    transform:translateX(-50%);
    font-family:"Pixelify Sans", sans-serif;
    font-size:1rem;
    color:var(--gold);
    text-shadow:0 0 0.8rem rgba(245,196,83,0.7);
    opacity:0;
    transition:opacity 0.4s ease;
    pointer-events:none;
    z-index:9;
    white-space:nowrap;
  }
  #announce.show{ opacity:1; }
  @media (prefers-reduced-motion: reduce){
    .toast.hit{ animation:none; }
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@500;700&family=Rubik:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

<div id="hud" aria-label="Hero status">
  <h1>⚔ TASKBAR HERO</h1>
  <p class="lv">Link Dismissalot of the Green Tunic · <b id="hLv">Lv 1</b></p>
  <div class="bar" aria-label="Experience"><div id="xpFill"></div></div>
  <div class="bar" aria-label="Hero health"><div id="hpFill" style="background:linear-gradient(90deg,#8a2f2f,var(--hp));width:100%"></div></div>
  <p class="statline" id="poisonLine" hidden style="color:#7dbd5c;">☠ POISONED — close the calendar invite!</p>
  <p class="statline">
    <span>DMG <b id="hDmg">2</b></span>
    <span>SLAIN <b id="hKills">0</b></span>
    <span>DPS <b id="hDps">2.5</b></span>
    <span>🪙 <b id="hGold">0</b></span>
  </p>
  <button type="button" id="invBtn" aria-expanded="false">🎒 INVENTORY</button>
</div>

<div id="inv" role="region" aria-label="Trophy inventory">
  <h2>🎒 TROPHIES OF THE DISMISSED</h2>
  <div id="invList"><p class="empty">nothing slain yet. the popups are coming — wait.</p></div>
</div>

<div id="toasts" aria-live="off"></div>
<p id="announce" aria-live="polite"></p>

<canvas id="heroC" width="16" height="16" aria-hidden="true"></canvas>

<div id="taskbar" aria-hidden="true">
  <span id="startBtn">▶ IDLE</span>
  <span style="font-size:0.7rem;color:var(--dim);">the hero patrols. the popups spawn. you may click them to help.</span>
  <span id="clock">00:00</span>
</div>

<script>
(function(){
'use strict';

/* ── monster bestiary ── */
var MOBS = [
  { id:'cookie',  icon:'🍪', tt:'We value your privacy',        fl:'and your marrow. Accept all?',              hp:26, xp:14, drop:'Crumbled Cookie Banner',    dfl:'+2 patience when browsing' },
  { id:'update',  icon:'🔄', tt:'Updates are available',        fl:'Restart now? Now? How about now?',          hp:48, xp:24, drop:'Deferred Update Shard',     dfl:'grants the power to say "later" forever' },
  { id:'mail',    icon:'📧', tt:'47 unread emails',             fl:'now 48. now 49. now—',                      hp:20, xp:11, drop:'Sealed Envelope of Guilt',  dfl:'weighs nothing, weighs everything' },
  { id:'news',    icon:'🗞️', tt:'BREAKING NEWS ALERT',          fl:'something happened somewhere!!',            hp:30, xp:16, drop:'Torn Headline Ribbon',      dfl:'+1 calm per scroll resisted' },
  { id:'sub',     icon:'💳', tt:'Your trial expires TODAY',     fl:'sadness will be billed monthly.',           hp:38, xp:20, drop:'Cancelled Subscription Rune',dfl:'engraved: "no thanks"' },
  { id:'disk',    icon:'💾', tt:'Low disk space',               fl:'your memories are too heavy.',              hp:42, xp:22, drop:'Compressed Nostalgia Block', dfl:'2GB of feelings, zipped' },
  { id:'captcha', icon:'🤖', tt:'Are you a robot?',             fl:'select all squares containing regret.',     hp:60, xp:34, drop:'Proof of Humanity Fragment', dfl:'the hero clicked every traffic light' },
  { id:'av',      icon:'🛡️', tt:'Your PC may be at RISK',      fl:'(the risk is this notification)',           hp:34, xp:18, drop:'Snake-Oil Vial',            dfl:'99.9% effective against nothing' },
  { id:'social',  icon:'👍', tt:'Someone liked your post',      fl:'from 2019. they are lurking.',              hp:16, xp:9,  drop:'Fossilized Like',           dfl:'still warm somehow' },
  { id:'meeting', icon:'📅', tt:'MEETING IN 5 MINUTES',         fl:'it could have been an email. BOSS.',        hp:150,xp:80, drop:'Agenda of the Damned',      dfl:'BOSS TROPHY · minutes were not taken', boss:true },
  { id:'dragon',  icon:'🐉', tt:'THE INBOX DRAGON',             fl:'it has consumed your unread emails.',       hp:120,xp:90, drop:'Dragonscale of Inbox Zero', dfl:'DRAGON TROPHY · grows back by Monday', boss:true },
  { id:'invite',  icon:'☠️', tt:'Poison Calendar Invite',       fl:'Weekly Sync (recurring · forever) — DRAINS THE HERO. Close it!', hp:18, xp:10, drop:'Declined Invitation', dfl:'RSVP: never. venom: neutralized.', boss:true }
];

/* ── state ── */
var S = { lv:1, xp:0, kills:0, gold:0, emailsFed:0, emailsTotal:0, inv:{}, last: Date.now() };
try{
  var sv = JSON.parse(localStorage.getItem('taskbar-hero-v1') || 'null');
  if(sv && sv.lv) S = sv;
}catch(e){}
function save(){ S.last = Date.now(); try{ localStorage.setItem('taskbar-hero-v1', JSON.stringify(S)); }catch(e){} }
function dmg(){ return 2 + (S.lv - 1) * 2; }
function xpNeed(){ return Math.floor(25 * Math.pow(S.lv, 1.4)); }
function clickDmg(){ return 3 + S.lv; }

/* ── offline progress ── */
(function(){
  var away = (Date.now() - (S.last || Date.now())) / 60000;   /* minutes */
  if(away > 2){
    var killsAway = Math.min(300, Math.floor(away * 0.8));
    if(killsAway > 0){
      for(var i = 0; i < killsAway; i++){
        var m = MOBS[Math.floor(Math.random() * (MOBS.length - 1))];
        S.inv[m.id] = (S.inv[m.id] || 0) + 1;
        S.kills++;
        S.gold += Math.max(1, Math.round(m.hp / 5));
        gainXp(m.xp, true);
      }
      setTimeout(function(){
        announce('while you were away, Sir Dismissalot slew ' + killsAway + ' popups. he asks for nothing.');
      }, 1200);
      save();
    }
  }
})();

/* ── xp / levels ── */
function gainXp(n, silent){
  S.xp += n;
  while(S.xp >= xpNeed()){
    S.xp -= xpNeed();
    S.lv++;
    if(!silent){
      announce('⬆ LEVEL ' + S.lv + '! damage rises to ' + dmg());
      levelSound();
    }
  }
}
var annT = 0;
function announce(t){
  var a = document.getElementById('announce');
  a.textContent = t;
  a.classList.add('show');
  clearTimeout(annT);
  annT = setTimeout(function(){ a.classList.remove('show'); }, 4000);
}

/* ── audio ── */
var ac = null;
function snd(fn){
  try{
    if(!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
    fn(ac, ac.currentTime);
  }catch(e){}
}
function hitSound(){
  snd(function(a, t){
    var o = a.createOscillator(), g = a.createGain();
    o.type = 'square'; o.frequency.value = 180 + Math.random() * 120;
    g.gain.setValueAtTime(0.04, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
    o.connect(g); g.connect(a.destination); o.start(t); o.stop(t + 0.07);
  });
}
function poofSound(boss){
  snd(function(a, t){
    [0, 5, 9].forEach(function(st, i){
      var o = a.createOscillator(), g = a.createGain();
      o.type = 'triangle';
      o.frequency.value = (boss ? 320 : 440) * Math.pow(2, st / 12);
      g.gain.setValueAtTime(0.0001, t + i * 0.05);
      g.gain.linearRampToValueAtTime(0.06, t + i * 0.05 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.05 + 0.4);
      o.connect(g); g.connect(a.destination);
      o.start(t + i * 0.05); o.stop(t + i * 0.05 + 0.45);
    });
  });
}
function levelSound(){
  snd(function(a, t){
    [523, 659, 784, 1047].forEach(function(f, i){
      var o = a.createOscillator(), g = a.createGain();
      o.type = 'triangle'; o.frequency.value = f;
      g.gain.setValueAtTime(0.0001, t + i * 0.09);
      g.gain.linearRampToValueAtTime(0.08, t + i * 0.09 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.09 + 0.6);
      o.connect(g); g.connect(a.destination);
      o.start(t + i * 0.09); o.stop(t + i * 0.09 + 0.65);
    });
  });
}

/* ── toasts (monsters) ── */
var live = [];       /* { el, mob, hp, maxHp } */
var spawnT = 0;
function spawn(forceId){
  if(live.length >= 4 && forceId !== 'invite') return;
  var mob;
  if(forceId){
    mob = MOBS.find(function(m){ return m.id === forceId; });
  } else if(S.emailsFed >= 5 && !live.some(function(r){ return r.mob.id === 'dragon'; })){
    mob = MOBS.find(function(m){ return m.id === 'dragon'; });
  } else {
    var boss = S.kills > 0 && S.kills % 10 === 9;
    var pool = MOBS.filter(function(m){ return (boss ? m.boss : !m.boss) && m.id !== 'dragon' && m.id !== 'invite'; });
    mob = pool[Math.floor(Math.random() * pool.length)];
  }
  if(!mob) return;
  if(mob.id === 'dragon'){
    /* the dragon grows stronger with every email it has ever eaten */
    mob = Object.assign({}, mob, {
      hp: 120 + S.emailsTotal * 14,
      xp: 90 + S.emailsTotal * 6,
      gold: 50 + S.emailsTotal * 8,
      fl: 'it has consumed ' + S.emailsTotal + ' unread emails. it is mostly newsletters now.'
    });
  }
  var hp = Math.round(mob.hp * (1 + (S.lv - 1) * 0.12));
  var el = document.createElement('div');
  el.className = 'toast' + (mob.boss ? ' boss' : '');
  el.setAttribute('role', 'button');
  el.setAttribute('aria-label', mob.tt + ' — click to strike it');
  el.innerHTML =
    '<div class="tt"><span>' + mob.icon + '</span> ' + mob.tt + '</div>' +
    '<div class="fl">' + mob.fl + '</div>' +
    '<div class="hpbar"><div></div></div>';
  var rec = { el: el, mob: mob, hp: hp, maxHp: hp };
  el.addEventListener('click', function(){ strike(rec, clickDmg()); });
  document.getElementById('toasts').appendChild(el);
  live.push(rec);
}
function strike(rec, amount){
  if(rec.hp <= 0) return;
  rec.hp -= amount;
  rec.el.querySelector('.hpbar div').style.width = Math.max(0, rec.hp / rec.maxHp * 100) + '%';
  rec.el.classList.remove('hit');
  void rec.el.offsetWidth;
  rec.el.classList.add('hit');
  var d = document.createElement('span');
  d.className = 'dmg';
  d.textContent = '-' + amount;
  rec.el.appendChild(d);
  setTimeout(function(){ d.remove(); }, 600);
  hitSound();
  if(rec.hp <= 0) slay(rec);
}
function slay(rec){
  live = live.filter(function(r){ return r !== rec; });
  rec.el.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
  rec.el.style.transform = 'scale(0.6) rotate(4deg)';
  rec.el.style.opacity = '0';
  setTimeout(function(){ rec.el.remove(); }, 320);
  S.kills++;
  S.inv[rec.mob.id] = (S.inv[rec.mob.id] || 0) + 1;
  S.gold += rec.mob.gold || Math.max(1, Math.round(rec.maxHp / 5));
  gainXp(rec.mob.xp);
  poofSound(rec.mob.boss);
  if(rec.mob.id === 'mail'){
    S.emailsFed++;
    S.emailsTotal++;
    if(S.emailsFed >= 5) announce('🐉 the INBOX DRAGON stirs… it has eaten ' + S.emailsTotal + ' emails.');
    else announce('the inbox dragon felt that. (' + S.emailsFed + '/5 emails until it wakes)');
  }
  if(rec.mob.id === 'invite'){
    announce('☠→✓ invite declined. the venom fades.');
    heroHp = Math.min(heroHpMax(), heroHp + 25);
  }
  if(rec.mob.id === 'dragon'){
    S.emailsFed = 0;
    announce('🐉⚔ INBOX ZERO! the dragon falls — +' + rec.mob.gold + ' gold. it will regrow. it always regrows.');
  } else if(rec.mob.boss){
    announce('👑 BOSS DOWN: the meeting has been declined.');
  }
  save();
  renderHud();
  renderInv();
}

/* ── the hero ── */
var heroC = document.getElementById('heroC');
var hctx = heroC.getContext('2d');
var heroX = 60, heroTarget = 60, facing = 1, swingT = 0, walkT = 0;
var heroHpMax = function(){ return 100 + (S.lv - 1) * 10; };
var heroHp = heroHpMax(), koUntil = 0, lastCast = 0;
function drawHero(t){
  hctx.clearRect(0, 0, 16, 16);
  var bob = Math.abs(heroX - heroTarget) > 4 ? Math.floor(walkT * 8) % 2 : 0;
  function px(x, y, c){ hctx.fillStyle = c; hctx.fillRect(facing > 0 ? x : 15 - x, y, 1, 1); }
  function rect(x, y, w, h, c){ for(var i = 0; i < w; i++) for(var j = 0; j < h; j++) px(x + i, y + j, c); }
  rect(6, 2, 4, 3, '#c8ccd8');            /* helmet */
  px(9, 3, '#20263c');                    /* visor */
  rect(6, 5, 4, 5, '#3f9a4d');            /* the green tunic */
  rect(6, 6, 1, 3, '#f5c453');            /* trim */
  rect(6, 10 - bob, 2, 4 + bob, '#2c6b36');  /* legs */
  rect(9, 10, 2, 4, '#2c6b36');
  var sw = (performance.now() - swingT) < 200;
  if(sw){
    rect(11, 2, 1, 6, '#e8ecf5');         /* sword up-swing */
    px(11, 1, '#f5c453');
  } else {
    rect(11, 6, 1, 5, '#e8ecf5');
    px(11, 11, '#f5c453');
  }
  rect(4, 6, 2, 3, '#8a93b0');            /* shield */
}
function heroLoop(dt, now){
  var ko = now < koUntil;
  var invite = live.find(function(r){ return r.mob.id === 'invite'; });
  var dragon = live.find(function(r){ return r.mob.id === 'dragon'; });
  /* the dragon casts a poison invite every ~7s while it lives */
  if(dragon && !invite && now - lastCast > 7000){
    lastCast = now;
    spawn('invite');
    announce('🐉 the dragon casts POISON CALENDAR INVITE!');
    invite = live.find(function(r){ return r.mob.id === 'invite'; });
  }
  /* poison drains until the invite is closed */
  if(invite && !ko){
    heroHp -= (4 + S.lv * 0.5) * dt;
    if(heroHp <= 0){
      heroHp = 0;
      koUntil = now + 5000;
      var tax = Math.floor(S.gold * 0.1);
      S.gold -= tax;
      announce('💀 the hero accepted the meeting… KO for 5s. -' + tax + ' gold. CLOSE THE INVITE!');
      save();
      renderHud();
    }
  } else if(!invite){
    heroHp = Math.min(heroHpMax(), heroHp + 6 * dt);
  }
  document.getElementById('hpFill').style.width = (heroHp / heroHpMax() * 100) + '%';
  document.getElementById('poisonLine').hidden = !invite;
  /* smart hero: invites first, then the oldest toast */
  var target = invite || live[0];
  if(target){
    var r = target.el.getBoundingClientRect();
    heroTarget = r.left - 40;
  } else {
    heroTarget = 60 + Math.sin(now * 0.0004) * (innerWidth * 0.3);
  }
  var dx = heroTarget - heroX;
  facing = dx >= 0 ? 1 : -1;
  if(!ko){
    var sp = Math.min(Math.abs(dx), 140 * dt);
    heroX += Math.sign(dx) * sp;
    walkT += dt;
  }
  heroC.style.left = Math.max(0, Math.min(innerWidth - 64, heroX)) + 'px';
  heroC.style.opacity = ko ? 0.35 : 1;
  if(!ko && target && Math.abs(dx) < 60 && now - swingT > 800){
    swingT = now;
    strike(target, dmg());
  }
  drawHero(now);
}

/* ── hud/inv render ── */
function renderHud(){
  document.getElementById('hLv').textContent = 'Lv ' + S.lv;
  document.getElementById('hDmg').textContent = dmg();
  document.getElementById('hKills').textContent = S.kills;
  document.getElementById('hDps').textContent = (dmg() / 0.8).toFixed(1);
  document.getElementById('hGold').textContent = S.gold;
  document.getElementById('xpFill').style.width = Math.min(100, S.xp / xpNeed() * 100) + '%';
}
function renderInv(){
  var el = document.getElementById('invList');
  var ids = Object.keys(S.inv).filter(function(k){ return S.inv[k] > 0; });
  if(!ids.length){
    el.innerHTML = '<p class="empty">nothing slain yet. the popups are coming — wait.</p>';
    return;
  }
  el.textContent = '';
  ids.sort(function(a, b){ return S.inv[b] - S.inv[a]; }).forEach(function(id){
    var mob = MOBS.find(function(m){ return m.id === id; });
    if(!mob) return;
    var d = document.createElement('div');
    d.className = 'item';
    d.innerHTML = '<span>' + mob.icon + '</span><span>' + mob.drop +
      '<span class="fl">' + mob.dfl + '</span></span><span class="n">×' + S.inv[id] + '</span>';
    el.appendChild(d);
  });
}
var invOpen = false;
document.getElementById('invBtn').addEventListener('click', function(){
  invOpen = !invOpen;
  document.getElementById('inv').classList.toggle('open', invOpen);
  this.setAttribute('aria-expanded', invOpen ? 'true' : 'false');
  if(invOpen) renderInv();
});

/* ── main loop ── */
var last = performance.now();
function frame(now){
  requestAnimationFrame(frame);
  var dt = Math.min(0.06, (now - last) / 1000);
  last = now;
  spawnT -= dt * 1000;
  if(spawnT <= 0){
    spawn();
    spawnT = 4200 + Math.random() * 4000;
  }
  heroLoop(dt, now);
}
requestAnimationFrame(frame);
setInterval(function(){
  var d = new Date();
  document.getElementById('clock').textContent =
    String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0');
}, 1000);
setInterval(save, 8000);

renderHud();
renderInv();

/* debug/testing */
window.__ns = function(){
  return { lv: S.lv, xp: S.xp, kills: S.kills, live: live.length, inv: S.inv, dmg: dmg() };
};
window.__nsSpawn = spawn;
window.__nsState = function(){ return { emailsFed: S.emailsFed, emailsTotal: S.emailsTotal, gold: S.gold }; };
window.__nsStrike = function(n){ if(live[0]) strike(live[0], n || 9999); };
})();
</script>
