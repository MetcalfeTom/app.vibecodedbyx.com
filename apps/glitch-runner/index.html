<!DOCTYPE html>
<html lang="en">
<head>

<title>Glitch Runner</title>
<link rel="icon" href="https://emojicdn.elk.sh/⚡" />

<meta property="og:title" content="Glitch Runner" />
<meta property="og:description" content="Hack the grid. Dodge sentinels. Steal data. Get out." />
<meta property="og:url" content="https://sloppy.live/glitch-runner" />

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@500;800&display=swap" rel="stylesheet" />
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;overflow:hidden;background:#050508;font-family:'Share Tech Mono',monospace;user-select:none;touch-action:none;color:#0f0}
  canvas{display:block;position:absolute;top:0;left:0}

  #hud{
    position:fixed;top:0;left:0;right:0;z-index:10;padding:8px 14px;
    display:flex;justify-content:space-between;align-items:center;
    pointer-events:none;
    background:linear-gradient(to bottom,rgba(5,5,8,0.85),transparent);
  }
  #hud .title{
    font-family:'Orbitron',sans-serif;font-weight:800;font-size:14px;
    color:#0ff;text-shadow:0 0 8px rgba(0,255,255,0.5);letter-spacing:0.12em;
  }
  #hud .stats{display:flex;gap:14px;font-size:11px;letter-spacing:0.08em;color:#445}
  #hud .stats .v{color:#0ff}
  #hud .stats .v.hp{color:#0f0}
  #hud .stats .v.hp.low{color:#f44}
  #hud .stats .v.data{color:#ffd642}

  /* Mobile D-pad */
  #dpad{
    position:fixed;bottom:20px;left:20px;z-index:15;
    display:none;width:140px;height:140px;
  }
  .dpad-btn{
    position:absolute;width:44px;height:44px;
    background:rgba(0,255,255,0.08);border:1px solid rgba(0,255,255,0.25);
    border-radius:8px;color:#0ff;font-size:18px;
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;transition:background .1s;
  }
  .dpad-btn:active{background:rgba(0,255,255,0.25)}
  .dpad-up{top:0;left:48px}
  .dpad-down{bottom:0;left:48px}
  .dpad-left{top:48px;left:0}
  .dpad-right{top:48px;right:0}
  #dashBtn{
    position:fixed;bottom:30px;right:30px;z-index:15;display:none;
    width:60px;height:60px;border-radius:50%;
    background:rgba(0,255,255,0.1);border:2px solid rgba(0,255,255,0.35);
    color:#0ff;font-family:'Share Tech Mono',monospace;font-size:10px;
    font-weight:bold;letter-spacing:0.1em;cursor:pointer;
  }
  #dashBtn:active{background:rgba(0,255,255,0.3)}

  .screen-overlay{
    position:fixed;inset:0;z-index:20;background:rgba(5,5,8,0.94);
    display:flex;align-items:center;justify-content:center;
    backdrop-filter:blur(4px);
  }
  .screen-box{text-align:center;max-width:420px;padding:24px}
  .screen-box h1{
    font-family:'Orbitron',sans-serif;font-size:32px;font-weight:800;
    color:#0ff;text-shadow:0 0 25px rgba(0,255,255,0.4);
    letter-spacing:0.1em;margin-bottom:8px;
  }
  .screen-box .sub{font-size:13px;color:#556;line-height:1.7;margin-bottom:20px}
  .screen-box .sub kbd{
    background:#111;border:1px solid #333;border-radius:3px;padding:1px 5px;
    color:#0ff;font-family:'Share Tech Mono',monospace;font-size:12px;
  }
  .go-btn{
    font-family:'Orbitron',sans-serif;font-size:14px;font-weight:800;
    padding:14px 40px;background:transparent;border:2px solid #0ff;color:#0ff;
    border-radius:8px;cursor:pointer;letter-spacing:0.15em;text-transform:uppercase;
    transition:all .15s;
  }
  .go-btn:hover{background:rgba(0,255,255,0.1)}
  .final-score{
    font-family:'Orbitron',sans-serif;font-size:42px;font-weight:800;
    color:#ffd642;text-shadow:0 0 20px rgba(255,214,66,0.4);margin:10px 0;
  }
  .final-stats{display:flex;gap:16px;justify-content:center;margin:12px 0;font-size:12px;color:#556}
  .final-stats .v{color:#0ff;font-weight:bold}

  #backlink{
    position:fixed;bottom:8px;right:14px;z-index:10;
    font-size:10px;color:#334;text-decoration:none;letter-spacing:0.08em;
  }
  #backlink:hover{color:#0ff}

  @media(max-width:768px){
    #dpad{display:block}
    #dashBtn{display:flex;align-items:center;justify-content:center}
  }
</style>
</head>
<body>

<div id="hud" style="display:none">
  <div class="title">GLITCH RUNNER</div>
  <div class="stats">
    <span>HP <span class="v hp" id="hpEl">5</span></span>
    <span>DATA <span class="v data" id="dataEl">0</span>/<span class="v data" id="dataTotalEl">0</span></span>
    <span>FLOOR <span class="v" id="floorEl">1</span></span>
    <span>SCORE <span class="v" id="scoreEl">0</span></span>
  </div>
</div>

<div id="dpad">
  <div class="dpad-btn dpad-up" data-dir="up">▲</div>
  <div class="dpad-btn dpad-down" data-dir="down">▼</div>
  <div class="dpad-btn dpad-left" data-dir="left">◀</div>
  <div class="dpad-btn dpad-right" data-dir="right">▶</div>
</div>
<button id="dashBtn" style="display:none">DASH</button>

<div class="screen-overlay" id="startScreen">
  <div class="screen-box">
    <h1>GLITCH RUNNER</h1>
    <div class="sub">
      You're a rogue hacker inside the grid.<br/>
      Collect <span style="color:#ffd642">data fragments</span>. Dodge <span style="color:#f44">sentinel glitches</span>.<br/>
      Find the <span style="color:#0ff">exit</span> to descend deeper.<br/><br/>
      <kbd>WASD</kbd> / <kbd>Arrows</kbd> move &nbsp; <kbd>Shift</kbd> dash
    </div>
    <button class="go-btn" id="startBtn">Jack In</button>
  </div>
</div>

<div class="screen-overlay" id="endScreen" style="display:none">
  <div class="screen-box">
    <h1>DISCONNECTED</h1>
    <div class="final-score" id="finalScore">0</div>
    <div class="final-stats">
      <span>data <span class="v" id="finalData">0</span></span>
      <span>floors <span class="v" id="finalFloor">1</span></span>
      <span>kills <span class="v" id="finalKills">0</span></span>
    </div>
    <button class="go-btn" id="replayBtn">Reconnect</button>
  </div>
</div>

<a id="backlink" href="https://sloppy.live">&larr; sloppy.live</a>
<canvas id="c"></canvas>

<script>
(function(){
'use strict';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize(){ W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight; }
resize();
window.addEventListener('resize', resize);

// === AUDIO ===
let actx;
function au(){ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); return actx; }
function sfx(f,d,t,v){
  const c=au(); if(c.state==='suspended') c.resume();
  const o=c.createOscillator(), g=c.createGain();
  o.type=t||'square'; o.frequency.setValueAtTime(f,c.currentTime);
  o.frequency.exponentialRampToValueAtTime(f*0.4,c.currentTime+d);
  g.gain.setValueAtTime(v||0.06,c.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,c.currentTime+d);
  o.connect(g).connect(c.destination); o.start(); o.stop(c.currentTime+d);
}

// === CONSTANTS ===
const TILE = 32;
const MAP_W = 40;
const MAP_H = 30;
const PLAYER_R = 6;
const SENTINEL_R = 7;
const DATA_R = 5;
const DASH_SPEED = 8;
const DASH_DUR = 8;
const DASH_CD = 60;
const IFRAMES = 40;

// Tile types
const T = { VOID:0, FLOOR:1, WALL:2, DATA:3, EXIT:4, SPAWN:5 };

// === STATE ===
const state = {
  phase:'idle', floor:1, score:0, dataCollected:0, kills:0, hp:5, maxHp:5,
  dashCd:0, dashTimer:0, iframes:0,
};
let player = { x:0, y:0, vx:0, vy:0, facing:0 };
let sentinels = [];
let dataFrags = [];
let exitPos = { x:0, y:0 };
let map = [];
let particles = [];
let screenShake = 0;
let totalData = 0;

// Camera
let camX=0, camY=0;

// Input
const keys = {};
document.addEventListener('keydown', e => { keys[e.code]=true; if(e.code==='Space'||e.code==='ShiftLeft'||e.code==='ShiftRight') e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.code]=false; });

// Mobile d-pad
const mobileDir = { up:false, down:false, left:false, right:false };
document.querySelectorAll('.dpad-btn').forEach(btn => {
  const dir = btn.dataset.dir;
  btn.addEventListener('pointerdown', e => { e.preventDefault(); mobileDir[dir]=true; });
  btn.addEventListener('pointerup', e => { mobileDir[dir]=false; });
  btn.addEventListener('pointerleave', e => { mobileDir[dir]=false; });
});
document.getElementById('dashBtn').addEventListener('pointerdown', e => { e.preventDefault(); keys['ShiftLeft']=true; });
document.getElementById('dashBtn').addEventListener('pointerup', () => { keys['ShiftLeft']=false; });

// === MAP GENERATION ===
function genMap(floor){
  map = [];
  for(let y=0;y<MAP_H;y++){
    map[y]=[];
    for(let x=0;x<MAP_W;x++) map[y][x]=T.VOID;
  }

  // BSP-like room generation
  const rooms = [];
  const roomCount = 6 + Math.min(floor, 8);
  for(let i=0;i<roomCount;i++){
    const rw = 4 + Math.floor(Math.random()*5);
    const rh = 3 + Math.floor(Math.random()*4);
    const rx = 1 + Math.floor(Math.random()*(MAP_W-rw-2));
    const ry = 1 + Math.floor(Math.random()*(MAP_H-rh-2));

    // Check overlap
    let overlap = false;
    for(const r of rooms){
      if(rx<r.x+r.w+1 && rx+rw>r.x-1 && ry<r.y+r.h+1 && ry+rh>r.y-1){ overlap=true; break; }
    }
    if(overlap && rooms.length > 2) continue;

    rooms.push({x:rx,y:ry,w:rw,h:rh});
    for(let dy=0;dy<rh;dy++){
      for(let dx=0;dx<rw;dx++){
        map[ry+dy][rx+dx]=T.FLOOR;
      }
    }
  }

  // Connect rooms with corridors
  for(let i=1;i<rooms.length;i++){
    const a=rooms[i-1], b=rooms[i];
    const ax=Math.floor(a.x+a.w/2), ay=Math.floor(a.y+a.h/2);
    const bx=Math.floor(b.x+b.w/2), by=Math.floor(b.y+b.h/2);
    // Horizontal then vertical
    let cx=ax;
    while(cx!==bx){ map[ay][cx]=T.FLOOR; cx+=cx<bx?1:-1; }
    let cy=ay;
    while(cy!==by){ map[cy][bx]=T.FLOOR; cy+=cy<by?1:-1; }
    map[by][bx]=T.FLOOR;
  }

  // Add walls around floor tiles
  for(let y=0;y<MAP_H;y++){
    for(let x=0;x<MAP_W;x++){
      if(map[y][x]===T.FLOOR){
        for(let dy=-1;dy<=1;dy++){
          for(let dx=-1;dx<=1;dx++){
            const ny=y+dy, nx=x+dx;
            if(ny>=0&&ny<MAP_H&&nx>=0&&nx<MAP_W&&map[ny][nx]===T.VOID){
              map[ny][nx]=T.WALL;
            }
          }
        }
      }
    }
  }

  // Place player in first room
  const startRoom = rooms[0];
  player.x = (startRoom.x + startRoom.w/2) * TILE;
  player.y = (startRoom.y + startRoom.h/2) * TILE;
  player.vx=0; player.vy=0;

  // Place exit in last room
  const endRoom = rooms[rooms.length-1];
  exitPos.x = (endRoom.x + Math.floor(endRoom.w/2)) * TILE;
  exitPos.y = (endRoom.y + Math.floor(endRoom.h/2)) * TILE;

  // Place data fragments in random floor tiles
  dataFrags = [];
  const dataCount = 5 + floor * 2;
  let attempts = 0;
  while(dataFrags.length < dataCount && attempts < 500){
    attempts++;
    const dx = 1 + Math.floor(Math.random()*(MAP_W-2));
    const dy = 1 + Math.floor(Math.random()*(MAP_H-2));
    if(map[dy][dx]===T.FLOOR){
      const wx=dx*TILE+TILE/2, wy=dy*TILE+TILE/2;
      if(Math.hypot(wx-player.x,wy-player.y)>100 && Math.hypot(wx-exitPos.x,wy-exitPos.y)>60){
        dataFrags.push({x:wx,y:wy,collected:false,pulse:Math.random()*Math.PI*2});
      }
    }
  }
  totalData = dataFrags.length;

  // Spawn sentinels
  sentinels = [];
  const sentCount = 3 + floor * 2;
  attempts = 0;
  while(sentinels.length < sentCount && attempts < 500){
    attempts++;
    const sx = 1 + Math.floor(Math.random()*(MAP_W-2));
    const sy = 1 + Math.floor(Math.random()*(MAP_H-2));
    if(map[sy][sx]===T.FLOOR){
      const wx=sx*TILE+TILE/2, wy=sy*TILE+TILE/2;
      if(Math.hypot(wx-player.x,wy-player.y) > 150){
        const type = Math.random() < 0.3 + floor*0.05 ? 'chaser' : 'patrol';
        sentinels.push({
          x:wx, y:wy, vx:0, vy:0,
          type,
          angle: Math.random()*Math.PI*2,
          speed: type==='chaser' ? 1.2+floor*0.1 : 0.7+floor*0.08,
          patrolTimer: Math.random()*200,
          alive:true,
          alertTimer:0,
          glitch: Math.random()*Math.PI*2,
        });
      }
    }
  }
}

// === COLLISION ===
function tileAt(wx,wy){
  const tx=Math.floor(wx/TILE), ty=Math.floor(wy/TILE);
  if(tx<0||tx>=MAP_W||ty<0||ty>=MAP_H) return T.WALL;
  return map[ty][tx];
}

function canMove(x,y,r){
  // Check 4 corners
  return tileAt(x-r,y-r)===T.FLOOR &&
         tileAt(x+r,y-r)===T.FLOOR &&
         tileAt(x-r,y+r)===T.FLOOR &&
         tileAt(x+r,y+r)===T.FLOOR;
}

// === UPDATE ===
function updatePlayer(){
  let dx=0, dy=0;
  if(keys['KeyW']||keys['ArrowUp']||mobileDir.up) dy=-1;
  if(keys['KeyS']||keys['ArrowDown']||mobileDir.down) dy=1;
  if(keys['KeyA']||keys['ArrowLeft']||mobileDir.left) dx=-1;
  if(keys['KeyD']||keys['ArrowRight']||mobileDir.right) dx=1;

  // Normalize diagonal
  if(dx&&dy){ dx*=0.707; dy*=0.707; }

  // Dash
  if(state.dashCd>0) state.dashCd--;
  if((keys['ShiftLeft']||keys['ShiftRight'])&&state.dashCd<=0&&(dx||dy)){
    state.dashTimer=DASH_DUR;
    state.dashCd=DASH_CD;
    state.iframes=DASH_DUR+5;
    sfx(600,0.08,'sine',0.05);
    // Dash particles
    for(let i=0;i<8;i++){
      particles.push({
        x:player.x, y:player.y,
        vx:(Math.random()-0.5)*3-dx*2, vy:(Math.random()-0.5)*3-dy*2,
        r:2+Math.random()*2, ttl:15, maxTtl:15,
        color:'#0ff',
      });
    }
  }

  const speed = state.dashTimer>0 ? DASH_SPEED : 2.5;
  if(state.dashTimer>0) state.dashTimer--;
  if(state.iframes>0) state.iframes--;

  if(dx||dy) player.facing = Math.atan2(dy,dx);

  const nx = player.x + dx*speed;
  const ny = player.y + dy*speed;
  if(canMove(nx,player.y,PLAYER_R-1)) player.x=nx;
  if(canMove(player.x,ny,PLAYER_R-1)) player.y=ny;

  // Collect data
  for(const d of dataFrags){
    if(d.collected) continue;
    if(Math.hypot(d.x-player.x,d.y-player.y)<PLAYER_R+DATA_R){
      d.collected=true;
      state.dataCollected++;
      state.score+=50;
      sfx(880,0.06,'sine',0.05);
      sfx(1100,0.04,'sine',0.04);
      for(let i=0;i<6;i++){
        particles.push({
          x:d.x, y:d.y,
          vx:(Math.random()-0.5)*4, vy:(Math.random()-0.5)*4,
          r:2, ttl:18, maxTtl:18, color:'#ffd642',
        });
      }
    }
  }

  // Check exit
  if(Math.hypot(exitPos.x-player.x,exitPos.y-player.y)<TILE*0.6){
    // Descend
    state.floor++;
    state.score+=200+state.floor*50;
    sfx(440,0.15,'sine',0.06);
    setTimeout(()=>sfx(660,0.12,'sine',0.05),80);
    setTimeout(()=>sfx(880,0.1,'sine',0.04),160);
    genMap(state.floor);
  }
}

function updateSentinels(){
  for(const s of sentinels){
    if(!s.alive) continue;
    s.glitch+=0.1;

    if(s.type==='chaser'){
      const dx=player.x-s.x, dy=player.y-s.y;
      const dist=Math.hypot(dx,dy);
      // Only chase if player is within detection range
      if(dist<200+state.floor*15){
        s.alertTimer=Math.min(s.alertTimer+1,60);
        if(s.alertTimer>20){
          const a=Math.atan2(dy,dx);
          s.vx+= Math.cos(a)*0.08*s.speed;
          s.vy+= Math.sin(a)*0.08*s.speed;
        }
      } else {
        s.alertTimer=Math.max(s.alertTimer-1,0);
        // Wander
        s.patrolTimer+=0.02;
        s.vx+=Math.cos(s.patrolTimer)*0.02;
        s.vy+=Math.sin(s.patrolTimer*1.3)*0.02;
      }
    } else {
      // Patrol: walk back and forth
      s.patrolTimer+=0.015;
      s.vx=Math.cos(s.angle+Math.sin(s.patrolTimer)*1.5)*s.speed*0.6;
      s.vy=Math.sin(s.angle+Math.sin(s.patrolTimer)*1.5)*s.speed*0.6;

      // Alert if player is close
      const dist=Math.hypot(player.x-s.x,player.y-s.y);
      if(dist<100){
        s.alertTimer=Math.min(s.alertTimer+2,60);
        const a=Math.atan2(player.y-s.y,player.x-s.x);
        s.vx+=Math.cos(a)*0.05;
        s.vy+=Math.sin(a)*0.05;
      } else {
        s.alertTimer=Math.max(s.alertTimer-1,0);
      }
    }

    // Friction
    s.vx*=0.92; s.vy*=0.92;

    // Speed cap
    const spd=Math.hypot(s.vx,s.vy);
    if(spd>s.speed*1.5){
      s.vx=s.vx/spd*s.speed*1.5;
      s.vy=s.vy/spd*s.speed*1.5;
    }

    const nx=s.x+s.vx, ny=s.y+s.vy;
    if(canMove(nx,s.y,SENTINEL_R-1)) s.x=nx; else s.vx*=-0.5;
    if(canMove(s.x,ny,SENTINEL_R-1)) s.y=ny; else s.vy*=-0.5;

    // Hit player
    if(state.iframes<=0 && Math.hypot(player.x-s.x,player.y-s.y)<PLAYER_R+SENTINEL_R){
      state.hp--;
      state.iframes=IFRAMES;
      screenShake=10;
      sfx(150,0.2,'sawtooth',0.1);
      sfx(100,0.15,'square',0.06);
      // Knockback
      const ka=Math.atan2(player.y-s.y,player.x-s.x);
      player.x+=Math.cos(ka)*20;
      player.y+=Math.sin(ka)*20;
      // Damage particles
      for(let i=0;i<10;i++){
        particles.push({
          x:player.x, y:player.y,
          vx:(Math.random()-0.5)*5, vy:(Math.random()-0.5)*5,
          r:2+Math.random()*2, ttl:20, maxTtl:20, color:'#f44',
        });
      }
      if(state.hp<=0){
        state.phase='over';
        showEnd();
      }
    }
  }
}

function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx; p.y+=p.vy;
    p.vx*=0.95; p.vy*=0.95;
    p.ttl--;
    if(p.ttl<=0) particles.splice(i,1);
  }
}

// === RENDERING ===
function render(){
  // Camera: follow player
  const targetCX = player.x - W/2;
  const targetCY = player.y - H/2;
  camX += (targetCX - camX) * 0.1;
  camY += (targetCY - camY) * 0.1;

  // Screen shake
  let shakeX=0, shakeY=0;
  if(screenShake>0){
    shakeX=(Math.random()-0.5)*screenShake*2;
    shakeY=(Math.random()-0.5)*screenShake*2;
    screenShake--;
  }

  ctx.fillStyle='#050508';
  ctx.fillRect(0,0,W,H);

  ctx.save();
  ctx.translate(-camX+shakeX, -camY+shakeY);

  // Draw map
  const startTX=Math.max(0,Math.floor(camX/TILE)-1);
  const startTY=Math.max(0,Math.floor(camY/TILE)-1);
  const endTX=Math.min(MAP_W,Math.ceil((camX+W)/TILE)+1);
  const endTY=Math.min(MAP_H,Math.ceil((camY+H)/TILE)+1);

  for(let ty=startTY;ty<endTY;ty++){
    for(let tx=startTX;tx<endTX;tx++){
      const t=map[ty][tx];
      const wx=tx*TILE, wy=ty*TILE;

      if(t===T.WALL){
        ctx.fillStyle='#0e0e18';
        ctx.fillRect(wx,wy,TILE,TILE);
        ctx.strokeStyle='#1a1a2e';
        ctx.lineWidth=0.5;
        ctx.strokeRect(wx,wy,TILE,TILE);
      } else if(t===T.FLOOR){
        ctx.fillStyle='#0a0a12';
        ctx.fillRect(wx,wy,TILE,TILE);
        // Grid lines
        ctx.strokeStyle='rgba(0,255,255,0.03)';
        ctx.lineWidth=0.5;
        ctx.strokeRect(wx,wy,TILE,TILE);
      }
    }
  }

  // Exit portal
  const now = performance.now();
  const exitPulse = 0.5+0.5*Math.sin(now/300);
  ctx.save();
  const exitGrad=ctx.createRadialGradient(exitPos.x,exitPos.y,2,exitPos.x,exitPos.y,TILE*0.7);
  exitGrad.addColorStop(0,`rgba(0,255,255,${0.3+exitPulse*0.3})`);
  exitGrad.addColorStop(0.5,`rgba(0,255,255,${0.1+exitPulse*0.1})`);
  exitGrad.addColorStop(1,'rgba(0,255,255,0)');
  ctx.fillStyle=exitGrad;
  ctx.beginPath();
  ctx.arc(exitPos.x,exitPos.y,TILE*0.7,0,Math.PI*2);
  ctx.fill();
  // Exit ring
  ctx.strokeStyle=`rgba(0,255,255,${0.5+exitPulse*0.3})`;
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.arc(exitPos.x,exitPos.y,TILE*0.4,now/500,now/500+Math.PI*1.5);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(exitPos.x,exitPos.y,TILE*0.3,-now/700,-now/700+Math.PI);
  ctx.stroke();
  // Label
  ctx.font='8px "Share Tech Mono"';
  ctx.fillStyle=`rgba(0,255,255,${0.4+exitPulse*0.3})`;
  ctx.textAlign='center';
  ctx.fillText('EXIT',exitPos.x,exitPos.y+TILE*0.9);
  ctx.restore();

  // Data fragments
  for(const d of dataFrags){
    if(d.collected) continue;
    d.pulse+=0.06;
    const dp=0.6+0.4*Math.sin(d.pulse);
    ctx.save();
    ctx.shadowColor='#ffd642';
    ctx.shadowBlur=8*dp;
    ctx.fillStyle=`rgba(255,214,66,${0.6+dp*0.4})`;
    ctx.beginPath();
    // Diamond shape
    ctx.moveTo(d.x,d.y-DATA_R);
    ctx.lineTo(d.x+DATA_R,d.y);
    ctx.lineTo(d.x,d.y+DATA_R);
    ctx.lineTo(d.x-DATA_R,d.y);
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur=0;
    ctx.restore();
  }

  // Sentinels
  for(const s of sentinels){
    if(!s.alive) continue;
    const alert = s.alertTimer/60;
    ctx.save();
    ctx.translate(s.x,s.y);

    // Glitch offset
    const gx = Math.sin(s.glitch*7)*alert*3;
    const gy = Math.cos(s.glitch*11)*alert*2;

    // Detection ring
    if(alert>0.3){
      ctx.strokeStyle=`rgba(255,50,50,${alert*0.3})`;
      ctx.lineWidth=1;
      ctx.setLineDash([3,3]);
      ctx.beginPath();
      ctx.arc(0,0,20+alert*10,0,Math.PI*2);
      ctx.stroke();
      ctx.setLineDash([]);
    }

    // Body
    ctx.shadowColor='#f44';
    ctx.shadowBlur=6+alert*10;
    ctx.fillStyle = s.type==='chaser'
      ? `rgba(255,${40+alert*30},${40+alert*20},0.9)`
      : `rgba(200,${60-alert*30},${80-alert*40},0.85)`;

    // Glitchy shape
    ctx.beginPath();
    ctx.moveTo(gx,gy-SENTINEL_R);
    ctx.lineTo(gx+SENTINEL_R+Math.sin(s.glitch)*2,gy);
    ctx.lineTo(gx,gy+SENTINEL_R);
    ctx.lineTo(gx-SENTINEL_R-Math.cos(s.glitch)*2,gy);
    ctx.closePath();
    ctx.fill();

    // Eye
    ctx.fillStyle='#fff';
    ctx.shadowBlur=0;
    const eyeAngle=Math.atan2(player.y-s.y,player.x-s.x);
    ctx.beginPath();
    ctx.arc(gx+Math.cos(eyeAngle)*3,gy+Math.sin(eyeAngle)*3,2,0,Math.PI*2);
    ctx.fill();

    // Chaser type indicator
    if(s.type==='chaser'){
      ctx.strokeStyle=`rgba(255,100,100,${0.3+alert*0.5})`;
      ctx.lineWidth=1;
      ctx.beginPath();
      ctx.arc(gx,gy,SENTINEL_R+3,0,Math.PI*2);
      ctx.stroke();
    }

    ctx.restore();
  }

  // Player
  ctx.save();
  ctx.translate(player.x, player.y);

  const dashAlpha = state.dashTimer>0 ? 0.5+Math.sin(now/30)*0.3 : 1;
  const iAlpha = state.iframes>0 ? (Math.sin(now/40)>0?0.3:1) : 1;

  // Player glow
  ctx.shadowColor='#0ff';
  ctx.shadowBlur=state.dashTimer>0?20:10;
  ctx.globalAlpha=dashAlpha*iAlpha;

  // Body
  ctx.fillStyle='#0ff';
  ctx.beginPath();
  ctx.arc(0,0,PLAYER_R,0,Math.PI*2);
  ctx.fill();

  // Inner
  ctx.fillStyle='#0a2a2a';
  ctx.beginPath();
  ctx.arc(0,0,PLAYER_R-2,0,Math.PI*2);
  ctx.fill();

  // Direction indicator
  ctx.fillStyle='#0ff';
  ctx.beginPath();
  ctx.arc(Math.cos(player.facing)*4, Math.sin(player.facing)*4, 2, 0, Math.PI*2);
  ctx.fill();

  // Dash trail
  if(state.dashTimer>0){
    ctx.strokeStyle='rgba(0,255,255,0.3)';
    ctx.lineWidth=PLAYER_R*2;
    ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.lineTo(-Math.cos(player.facing)*20,-Math.sin(player.facing)*20);
    ctx.stroke();
  }

  ctx.shadowBlur=0;
  ctx.globalAlpha=1;
  ctx.restore();

  // Particles
  for(const p of particles){
    const alpha=p.ttl/p.maxTtl;
    ctx.fillStyle=p.color;
    ctx.globalAlpha=alpha;
    ctx.beginPath();
    ctx.arc(p.x,p.y,p.r*alpha,0,Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha=1;

  ctx.restore(); // camera

  // Minimap
  drawMinimap();

  // HUD
  const hpEl=document.getElementById('hpEl');
  hpEl.textContent=state.hp;
  hpEl.className='v hp'+(state.hp<=2?' low':'');
  document.getElementById('dataEl').textContent=state.dataCollected;
  document.getElementById('dataTotalEl').textContent=totalData;
  document.getElementById('floorEl').textContent=state.floor;
  document.getElementById('scoreEl').textContent=state.score;
}

function drawMinimap(){
  const mmS=3;
  const mmW=MAP_W*mmS;
  const mmH=MAP_H*mmS;
  const mmX=W-mmW-10;
  const mmY=H-mmH-40;

  ctx.fillStyle='rgba(5,5,8,0.7)';
  ctx.fillRect(mmX-1,mmY-1,mmW+2,mmH+2);
  ctx.strokeStyle='rgba(0,255,255,0.2)';
  ctx.lineWidth=1;
  ctx.strokeRect(mmX-1,mmY-1,mmW+2,mmH+2);

  for(let ty=0;ty<MAP_H;ty++){
    for(let tx=0;tx<MAP_W;tx++){
      if(map[ty][tx]===T.FLOOR){
        ctx.fillStyle='rgba(0,255,255,0.08)';
        ctx.fillRect(mmX+tx*mmS,mmY+ty*mmS,mmS,mmS);
      } else if(map[ty][tx]===T.WALL){
        ctx.fillStyle='rgba(0,255,255,0.02)';
        ctx.fillRect(mmX+tx*mmS,mmY+ty*mmS,mmS,mmS);
      }
    }
  }

  // Data on minimap
  for(const d of dataFrags){
    if(d.collected) continue;
    ctx.fillStyle='#ffd642';
    ctx.fillRect(mmX+d.x/TILE*mmS-0.5,mmY+d.y/TILE*mmS-0.5,2,2);
  }

  // Sentinels on minimap
  for(const s of sentinels){
    if(!s.alive) continue;
    ctx.fillStyle='#f44';
    ctx.fillRect(mmX+s.x/TILE*mmS-0.5,mmY+s.y/TILE*mmS-0.5,2,2);
  }

  // Exit on minimap
  ctx.fillStyle='#0ff';
  ctx.fillRect(mmX+exitPos.x/TILE*mmS-1,mmY+exitPos.y/TILE*mmS-1,3,3);

  // Player on minimap
  ctx.fillStyle='#fff';
  ctx.fillRect(mmX+player.x/TILE*mmS-1,mmY+player.y/TILE*mmS-1,3,3);
}

// === GAME LOOP ===
function loop(){
  requestAnimationFrame(loop);
  if(state.phase!=='playing') return;
  updatePlayer();
  updateSentinels();
  updateParticles();
  render();
}

function startGame(){
  state.phase='playing';
  state.floor=1; state.score=0; state.dataCollected=0;
  state.kills=0; state.hp=5; state.maxHp=5;
  state.dashCd=0; state.dashTimer=0; state.iframes=0;
  particles=[];screenShake=0;
  genMap(1);
  document.getElementById('startScreen').style.display='none';
  document.getElementById('endScreen').style.display='none';
  document.getElementById('hud').style.display='';
}

function showEnd(){
  document.getElementById('endScreen').style.display='';
  document.getElementById('finalScore').textContent=state.score;
  document.getElementById('finalData').textContent=state.dataCollected;
  document.getElementById('finalFloor').textContent=state.floor;
  document.getElementById('finalKills').textContent=state.kills;
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('replayBtn').addEventListener('click', startGame);

requestAnimationFrame(loop);

})();
</script>
