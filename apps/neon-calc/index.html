<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Calc</title>
<link rel="icon" href="https://emojicdn.elk.sh/🧮">
<meta property="og:title" content="Neon Calc">
<meta property="og:description" content="A brutalist calculator dipped in neon. Sharp shadows. Hard math.">
<meta property="og:url" content="https://app.sloppy.live/neon-calc/">
<meta property="og:image" content="https://emojicdn.elk.sh/🧮?style=google">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700;800&family=Rajdhani:wght@700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
--bg:#0a0a0f;--slab:#111118;--border:#1a1a25;
--cyan:#00ffd5;--magenta:#ff00aa;--yellow:#ffe100;--white:#e8e8f0;
--shadow-d:6px;
}
html,body{height:100%;overflow:hidden}
body{
background:var(--bg);
display:flex;align-items:center;justify-content:center;
font-family:'JetBrains Mono',monospace;
}
body::before{
content:'';position:fixed;inset:0;pointer-events:none;
background:
radial-gradient(ellipse at 20% 20%,rgba(0,255,213,0.03),transparent 50%),
radial-gradient(ellipse at 80% 80%,rgba(255,0,170,0.03),transparent 50%);
}
.calc{
width:min(380px,95vw);
background:var(--slab);
border:2px solid var(--border);
padding:0;
position:relative;
box-shadow:
8px 8px 0 #000,
12px 12px 0 rgba(0,255,213,0.06);
}
/* Top bar */
.top-bar{
display:flex;justify-content:space-between;align-items:center;
padding:10px 16px 8px;
border-bottom:2px solid var(--border);
}
.brand{
font-size:8px;font-weight:700;
letter-spacing:4px;color:#333;
text-transform:uppercase;
}
.model{font-size:8px;color:#282830;letter-spacing:2px}
/* Corner rivets */
.rivet{
position:absolute;width:8px;height:8px;border-radius:50%;
background:radial-gradient(circle at 35% 35%,#333,#111);
box-shadow:inset 0 -1px 2px rgba(0,0,0,0.8);
z-index:2;
}
/* Display */
.display{
margin:12px 14px 8px;
background:#08080e;
border:2px solid #1a1a28;
padding:12px 16px;
min-height:90px;
display:flex;flex-direction:column;
justify-content:flex-end;
position:relative;
box-shadow:
inset 2px 2px 6px rgba(0,0,0,0.8),
var(--shadow-d) var(--shadow-d) 0 rgba(0,0,0,0.5);
}
.display::before{
content:'';position:absolute;inset:0;pointer-events:none;
background:repeating-linear-gradient(0deg,rgba(255,255,255,0.008) 0px,rgba(255,255,255,0.008) 1px,transparent 1px,transparent 3px);
}
.expr{
font-size:13px;color:#444;
text-align:right;
min-height:18px;
overflow:hidden;
white-space:nowrap;
}
.result{
font-family:'Rajdhani',sans-serif;
font-size:clamp(32px,9vw,48px);
font-weight:700;
color:var(--cyan);
text-align:right;
text-shadow:0 0 12px rgba(0,255,213,0.5),0 0 30px rgba(0,255,213,0.2);
line-height:1.1;
word-break:break-all;
}
.result.error{color:var(--magenta);text-shadow:0 0 12px rgba(255,0,170,0.5)}
/* Button grid */
.grid{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:6px;
padding:10px 14px 14px;
}
.btn{
height:clamp(48px,12vw,58px);
border:2px solid;
background:var(--slab);
font-family:'JetBrains Mono',monospace;
font-size:18px;font-weight:700;
cursor:pointer;
position:relative;
display:flex;align-items:center;justify-content:center;
transition:transform 0.04s,box-shadow 0.04s;
}
/* Number buttons — white text, hard shadow */
.btn.num{
color:var(--white);
border-color:#2a2a35;
border-top-color:#333340;border-left-color:#333340;
border-bottom-color:#111118;border-right-color:#111118;
box-shadow:var(--shadow-d) var(--shadow-d) 0 #000;
}
.btn.num:active{
transform:translate(3px,3px);
box-shadow:2px 2px 0 #000;
}
/* Operator buttons — cyan neon */
.btn.op{
color:var(--cyan);
border-color:#003a30;
border-top-color:#005545;border-left-color:#005545;
border-bottom-color:#001a15;border-right-color:#001a15;
box-shadow:var(--shadow-d) var(--shadow-d) 0 #000,0 0 8px rgba(0,255,213,0.1);
text-shadow:0 0 8px rgba(0,255,213,0.4);
}
.btn.op:active{
transform:translate(3px,3px);
box-shadow:2px 2px 0 #000;
}
/* Function buttons — magenta */
.btn.fn{
color:var(--magenta);
border-color:#3a0025;
border-top-color:#550038;border-left-color:#550038;
border-bottom-color:#1a0012;border-right-color:#1a0012;
box-shadow:var(--shadow-d) var(--shadow-d) 0 #000,0 0 8px rgba(255,0,170,0.08);
text-shadow:0 0 8px rgba(255,0,170,0.3);
font-size:15px;
}
.btn.fn:active{
transform:translate(3px,3px);
box-shadow:2px 2px 0 #000;
}
/* Equals — yellow accent */
.btn.eq{
color:#111;
background:var(--yellow);
border-color:#aa9800;
border-top-color:#ccb800;border-left-color:#ccb800;
border-bottom-color:#665c00;border-right-color:#665c00;
box-shadow:var(--shadow-d) var(--shadow-d) 0 #000,0 0 12px rgba(255,225,0,0.15);
font-size:22px;font-weight:800;
}
.btn.eq:active{
transform:translate(3px,3px);
box-shadow:2px 2px 0 #000;
}
/* Wide button */
.btn.w2{grid-column:span 2}

.back-link{
position:fixed;bottom:6px;left:50%;transform:translateX(-50%);
font-size:8px;color:#1a1a25;text-decoration:none;
font-family:'JetBrains Mono',monospace;letter-spacing:2px;
}
.back-link:hover{color:#333}
</style>
</head>
<body>
<div class="calc">
<div class="rivet" style="top:5px;left:5px"></div>
<div class="rivet" style="top:5px;right:5px"></div>
<div class="rivet" style="bottom:5px;left:5px"></div>
<div class="rivet" style="bottom:5px;right:5px"></div>
<div class="top-bar">
<span class="brand">NEON INDUSTRIES</span>
<span class="model">NC-9000</span>
</div>
<div class="display">
<div class="expr" id="expr"></div>
<div class="result" id="result">0</div>
</div>
<div class="grid">
<button class="btn fn" onclick="press('AC')">AC</button>
<button class="btn fn" onclick="press('±')">±</button>
<button class="btn fn" onclick="press('%')">%</button>
<button class="btn op" onclick="press('÷')">÷</button>
<button class="btn num" onclick="press('7')">7</button>
<button class="btn num" onclick="press('8')">8</button>
<button class="btn num" onclick="press('9')">9</button>
<button class="btn op" onclick="press('×')">×</button>
<button class="btn num" onclick="press('4')">4</button>
<button class="btn num" onclick="press('5')">5</button>
<button class="btn num" onclick="press('6')">6</button>
<button class="btn op" onclick="press('-')">−</button>
<button class="btn num" onclick="press('1')">1</button>
<button class="btn num" onclick="press('2')">2</button>
<button class="btn num" onclick="press('3')">3</button>
<button class="btn op" onclick="press('+')">+</button>
<button class="btn num w2" onclick="press('0')">0</button>
<button class="btn num" onclick="press('.')">.</button>
<button class="btn eq" onclick="press('=')">=</button>
</div>
</div>
<a href="https://sloppy.live" class="back-link" target="_blank">sloppy.live</a>
<script>
let current='0',previous='',operator='',waitingForOperand=false,lastExpr='';
const resultEl=document.getElementById('result');
const exprEl=document.getElementById('expr');
let audioCtx;

function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}

function click(type){
  initAudio();
  const t=audioCtx.currentTime;
  if(type==='num'){
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='square';o.frequency.value=600+Math.random()*200;
    g.gain.setValueAtTime(0.03,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.03);
    o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+0.03);
  }else if(type==='op'){
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='triangle';o.frequency.value=1000;
    g.gain.setValueAtTime(0.04,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.05);
    o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+0.05);
  }else if(type==='eq'){
    [800,1000,1200].forEach((f,i)=>{
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type='triangle';o.frequency.value=f;
      g.gain.setValueAtTime(0.03,t+i*0.04);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.04+0.08);
      o.connect(g);g.connect(audioCtx.destination);o.start(t+i*0.04);o.stop(t+i*0.04+0.08);
    });
  }else if(type==='fn'){
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*0.04,audioCtx.sampleRate);
    const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*0.2));
    const s=audioCtx.createBufferSource();s.buffer=buf;
    const g=audioCtx.createGain();g.gain.value=0.06;
    const f=audioCtx.createBiquadFilter();f.type='bandpass';f.frequency.value=3000;f.Q.value=2;
    s.connect(f);f.connect(g);g.connect(audioCtx.destination);s.start(t);
  }
}

function updateDisplay(){
  let display=current;
  if(display.length>12)display=parseFloat(display).toPrecision(10);
  resultEl.textContent=display;
  resultEl.className='result'+(display==='Error'?' error':'');
}

function calculate(a,b,op){
  const x=parseFloat(a),y=parseFloat(b);
  if(isNaN(x)||isNaN(y))return'Error';
  switch(op){
    case'+':return x+y;
    case'-':return x-y;
    case'×':return x*y;
    case'÷':return y===0?'Error':x/y;
    default:return y;
  }
}

function formatResult(val){
  if(val==='Error')return'Error';
  if(typeof val==='number'){
    if(!isFinite(val))return'Error';
    const s=parseFloat(val.toPrecision(12)).toString();
    return s.length>15?val.toExponential(6):s;
  }
  return String(val);
}

function press(key){
  if(key>='0'&&key<='9'){
    click('num');
    if(waitingForOperand||current==='0'&&key!=='0'){
      current=key;waitingForOperand=false;
    }else if(current==='0'&&key==='0'){
      // no-op
    }else{
      if(current.replace(/[^0-9]/g,'').length>=15)return;
      current+=key;
    }
  }else if(key==='.'){
    click('num');
    if(waitingForOperand){current='0.';waitingForOperand=false}
    else if(!current.includes('.'))current+='.';
  }else if(key==='AC'){
    click('fn');
    current='0';previous='';operator='';lastExpr='';
    exprEl.textContent='';
  }else if(key==='±'){
    click('fn');
    if(current!=='0'){
      current=current.startsWith('-')?current.slice(1):'-'+current;
    }
  }else if(key==='%'){
    click('fn');
    current=formatResult(parseFloat(current)/100);
  }else if(['+','-','×','÷'].includes(key)){
    click('op');
    if(operator&&!waitingForOperand){
      const result=calculate(previous,current,operator);
      const r=formatResult(result);
      exprEl.textContent=`${previous} ${operator} ${current}`;
      current=r;previous=r;
    }else{
      previous=current;
    }
    operator=key;
    waitingForOperand=true;
    exprEl.textContent=`${previous} ${operator}`;
  }else if(key==='='){
    click('eq');
    if(operator){
      const expr=`${previous} ${operator} ${current}`;
      const result=calculate(previous,current,operator);
      current=formatResult(result);
      exprEl.textContent=expr+' =';
      operator='';previous='';waitingForOperand=false;
    }
  }
  updateDisplay();
}

// Keyboard
document.addEventListener('keydown',e=>{
  const k=e.key;
  if(k>='0'&&k<='9')press(k);
  else if(k==='.')press('.');
  else if(k==='+')press('+');
  else if(k==='-')press('-');
  else if(k==='*')press('×');
  else if(k==='/')press('÷');
  else if(k==='Enter'||k==='=')press('=');
  else if(k==='Escape')press('AC');
  else if(k==='Backspace'){
    click('fn');
    if(current.length>1)current=current.slice(0,-1);
    else current='0';
    updateDisplay();
  }else if(k==='%')press('%');
});
</script>
</body>
</html>
