<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Neon Calc</title>
<link rel="icon" href="https://emojicdn.elk.sh/🔢">
<meta property="og:title" content="Neon Calc">
<meta property="og:description" content="Glowing neon calculator with full history. Tap, type, calculate.">
<meta property="og:url" content="https://sloppy.live/neon-calc">
<meta property="og:image" content="https://emojicdn.elk.sh/🔢?style=apple&size=512">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@300;500;700&family=IBM+Plex+Mono:wght@300;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080a10;--calc:#0e1018;--display:#0a0c14;--border:#1a1c2a;--text:#e8e8f0;--dim:#4a4c5a;--num:#d0d4e0;--op:#00e8b8;--eq:#ff3c78;--fn:#6a8aff;--clear:#ff8844}
html,body{min-height:100dvh;background:var(--bg);color:var(--text);font-family:'Chakra Petch',sans-serif;display:flex;justify-content:center;align-items:center;padding:16px}
#wrap{display:flex;gap:16px;align-items:flex-start;max-width:680px;width:100%}
#calc{background:var(--calc);border:1px solid var(--border);border-radius:16px;padding:20px;width:320px;flex-shrink:0}
#display{background:var(--display);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:16px;min-height:90px;display:flex;flex-direction:column;justify-content:flex-end;align-items:flex-end;overflow:hidden}
#expr{font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--dim);word-break:break-all;text-align:right;min-height:18px}
#result{font-family:'IBM Plex Mono',monospace;font-size:36px;font-weight:300;color:var(--text);word-break:break-all;text-align:right;transition:color 0.15s}
#grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.k{font-family:'Chakra Petch',sans-serif;font-size:18px;font-weight:500;border:none;border-radius:10px;padding:16px 0;cursor:pointer;transition:all 0.12s;position:relative;overflow:hidden}
.k:active{transform:scale(0.93)}
.k::after{content:'';position:absolute;inset:0;border-radius:10px;opacity:0;transition:opacity 0.3s}
.k:hover::after{opacity:1}
.k-num{background:#14161e;color:var(--num);border:1px solid #1e2030}
.k-num:hover{background:#1a1c28;border-color:#2a2c40}
.k-num::after{box-shadow:0 0 16px #ffffff11 inset}
.k-op{background:#0a1a1a;color:var(--op);border:1px solid #0e2a28}
.k-op:hover{background:#0e2222;border-color:var(--op)}
.k-op::after{box-shadow:0 0 20px #00e8b822 inset}
.k-eq{background:var(--eq);color:#fff;border:1px solid var(--eq);grid-column:span 1}
.k-eq:hover{filter:brightness(1.15)}
.k-eq::after{box-shadow:0 0 24px #ff3c7844 inset}
.k-fn{background:#10121e;color:var(--fn);border:1px solid #1a1e36}
.k-fn:hover{background:#161830;border-color:var(--fn)}
.k-fn::after{box-shadow:0 0 16px #6a8aff18 inset}
.k-clear{background:#1a1210;color:var(--clear);border:1px solid #2a1a10}
.k-clear:hover{background:#221810;border-color:var(--clear)}
.k-zero{grid-column:span 2}
#history{flex:1;min-width:200px;max-height:480px;overflow-y:auto}
#history h3{font-size:12px;font-weight:500;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.h-item{font-family:'IBM Plex Mono',monospace;font-size:12px;padding:8px 10px;border-bottom:1px solid #111320;cursor:pointer;transition:background 0.15s;border-radius:6px}
.h-item:hover{background:#14161e}
.h-expr{color:var(--dim);margin-bottom:2px}
.h-val{color:var(--text);font-size:15px;font-weight:500}
.h-empty{color:var(--dim);font-size:12px;font-style:italic;font-family:'IBM Plex Mono',monospace}
#clear-hist{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 12px;color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:10px;cursor:pointer;float:right;transition:all 0.2s}
#clear-hist:hover{border-color:var(--clear);color:var(--clear)}
@media(max-width:600px){
  #wrap{flex-direction:column;align-items:center}
  #calc{width:100%;max-width:360px}
  #history{width:100%;max-width:360px;max-height:240px}
  body{align-items:flex-start;padding-top:24px}
}
</style>
</head>
<body>
<div id="wrap">
<div id="calc">
<div id="display">
<div id="expr"></div>
<div id="result">0</div>
</div>
<div id="grid">
<button class="k k-clear" data-k="C">C</button>
<button class="k k-fn" data-k="±">±</button>
<button class="k k-fn" data-k="%">%</button>
<button class="k k-op" data-k="÷">÷</button>
<button class="k k-num" data-k="7">7</button>
<button class="k k-num" data-k="8">8</button>
<button class="k k-num" data-k="9">9</button>
<button class="k k-op" data-k="×">×</button>
<button class="k k-num" data-k="4">4</button>
<button class="k k-num" data-k="5">5</button>
<button class="k k-num" data-k="6">6</button>
<button class="k k-op" data-k="-">−</button>
<button class="k k-num" data-k="1">1</button>
<button class="k k-num" data-k="2">2</button>
<button class="k k-num" data-k="3">3</button>
<button class="k k-op" data-k="+">+</button>
<button class="k k-num k-zero" data-k="0">0</button>
<button class="k k-num" data-k=".">.</button>
<button class="k k-eq" data-k="=">=</button>
</div>
</div>
<div id="history">
<button id="clear-hist">clear</button>
<h3>History</h3>
<div id="h-list"></div>
</div>
</div>
<script>
(function(){
var exprEl=document.getElementById('expr');
var resultEl=document.getElementById('result');
var hList=document.getElementById('h-list');
var HKEY='neon-calc-hist';

var current='0',expression='',operator='',prev='',justEvaled=false;
var history=[];

function loadHist(){try{var d=localStorage.getItem(HKEY);if(d)history=JSON.parse(d);}catch(e){history=[];}}
function saveHist(){try{localStorage.setItem(HKEY,JSON.stringify(history.slice(0,50)));}catch(e){}}

function display(val){
  resultEl.textContent=val;
  // glow on long numbers
  resultEl.style.fontSize=val.length>12?'22px':val.length>8?'28px':'36px';
}

function formatNum(n){
  if(!isFinite(n))return 'Error';
  var s=String(n);
  if(s.indexOf('e')!==-1)return s;
  // limit decimal places
  if(s.indexOf('.')!==-1){
    var parts=s.split('.');
    if(parts[1].length>10)s=n.toFixed(10).replace(/0+$/,'').replace(/\.$/,'');
  }
  return s;
}

function compute(a,op,b){
  var na=parseFloat(a),nb=parseFloat(b);
  if(isNaN(na)||isNaN(nb))return 'Error';
  var r;
  if(op==='+')r=na+nb;
  else if(op==='-'||op==='−')r=na-nb;
  else if(op==='×'||op==='*')r=na*nb;
  else if(op==='÷'||op==='/'){if(nb===0)return 'Error';r=na/nb;}
  else return 'Error';
  return formatNum(r);
}

function addHistory(expr,val){
  history.unshift({e:expr,v:val});
  if(history.length>50)history.pop();
  saveHist();renderHist();
}

function renderHist(){
  if(history.length===0){hList.innerHTML='<div class="h-empty">No calculations yet</div>';return;}
  var html='';
  for(var i=0;i<history.length;i++){
    html+='<div class="h-item" data-i="'+i+'"><div class="h-expr">'+escHtml(history[i].e)+'</div><div class="h-val">'+escHtml(history[i].v)+'</div></div>';
  }
  hList.innerHTML=html;
}

function escHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function press(k){
  if(k>='0'&&k<='9'){
    if(justEvaled){current='';expression='';operator='';prev='';justEvaled=false;}
    if(current==='0'&&k!=='0')current=k;
    else if(current==='0'&&k==='0'){}
    else current+=k;
    display(current);
    return;
  }
  if(k==='.'){
    if(justEvaled){current='0';expression='';operator='';prev='';justEvaled=false;}
    if(current.indexOf('.')===-1)current+='.';
    display(current);
    return;
  }
  if(k==='C'){
    current='0';expression='';operator='';prev='';justEvaled=false;
    display('0');exprEl.textContent='';
    return;
  }
  if(k==='±'){
    if(current!=='0'){
      if(current.charAt(0)==='-')current=current.slice(1);
      else current='-'+current;
    }
    display(current);return;
  }
  if(k==='%'){
    var n=parseFloat(current);
    if(!isNaN(n)){current=formatNum(n/100);}
    display(current);return;
  }
  if(k==='+'||k==='-'||k==='−'||k==='×'||k==='*'||k==='÷'||k==='/'){
    justEvaled=false;
    if(operator&&prev){
      var res=compute(prev,operator,current);
      prev=res;display(res);
    }else{
      prev=current;
    }
    operator=k;
    var dispOp=k==='*'?'×':k==='/'?'÷':k==='−'?'-':k;
    exprEl.textContent=prev+' '+dispOp;
    current='0';
    return;
  }
  if(k==='='||k==='Enter'){
    if(!operator||!prev)return;
    var fullExpr=prev+' '+(operator==='*'?'×':operator==='/'?'÷':operator==='−'?'-':operator)+' '+current;
    var res=compute(prev,operator,current);
    exprEl.textContent=fullExpr+' =';
    display(res);
    addHistory(fullExpr,res);
    prev='';operator='';current=res;justEvaled=true;
    return;
  }
}

// button clicks
document.getElementById('grid').addEventListener('click',function(e){
  var btn=e.target.closest('.k');
  if(!btn)return;
  press(btn.dataset.k);
});

// keyboard
document.addEventListener('keydown',function(e){
  var k=e.key;
  if(k>='0'&&k<='9')press(k);
  else if(k==='.')press('.');
  else if(k==='+')press('+');
  else if(k==='-')press('-');
  else if(k==='*')press('*');
  else if(k==='/')press('/');
  else if(k==='Enter'||k==='=')press('=');
  else if(k==='Escape')press('C');
  else if(k==='%')press('%');
  else if(k==='Backspace'){
    if(current.length>1)current=current.slice(0,-1);
    else current='0';
    display(current);
  }
});

// click history to reuse
hList.addEventListener('click',function(e){
  var item=e.target.closest('.h-item');
  if(!item)return;
  var idx=parseInt(item.dataset.i);
  if(history[idx]){
    current=String(history[idx].v);
    expression='';operator='';prev='';justEvaled=false;
    display(current);exprEl.textContent='';
  }
});

document.getElementById('clear-hist').addEventListener('click',function(){
  history=[];saveHist();renderHist();
});

loadHist();renderHist();
})();
</script>
</body>
</html>
