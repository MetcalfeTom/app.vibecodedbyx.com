<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Sorry Simulator</title>
<meta name="description" content="Two people block a doorway. Out-apologise your opponent until their patience snaps. Aggressive politeness wins." />
<meta property="og:title" content="Sorry Simulator" />
<meta property="og:description" content="Two people block a doorway. Out-apologise your opponent until their patience snaps. Aggressive politeness wins." />
<meta property="og:url" content="https://sloppy.live/sorry-simulator/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/two%20cartoon%20people%20blocking%20a%20doorway%20saying%20sorry%20to%20each%20other%20awkward%20British%20politeness%20stand-off%20warm%20pub%20interior%20cream%20brown%20coral%20chunky%20bold%20type?width=1200&height=630&model=flux&nologo=true&seed=51515" />
<meta property="og:type" content="website" />
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%99%87" type="image/png" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@1,400&family=Fredoka:wght@400;700&family=Bungee&family=Caveat:wght@700&display=swap" />
<style>
:root{
  --bg-a: #f4ecd8;
  --bg-b: #ebd9b3;
  --ink: #3a1f10;
  --paper: #fff5e3;
  --dim: #8a6a52;
  --coral: #e8553a;
  --plum: #6a2b6b;
  --teal: #2b8a8a;
  --gold: #d99a3a;
  --p1: #4a8c3d;
  --p2: #c45288;
}
*{ box-sizing: border-box; }
html, body{ overscroll-behavior: none; }
html{ font-size: 100%; }
body{
  margin: 0;
  min-height: 100vh;
  font-family: 'Fredoka', system-ui, sans-serif;
  color: var(--ink);
  background:
    radial-gradient(circle at 22% 12%, rgba(232, 85, 58, 0.12), transparent 40%),
    radial-gradient(circle at 80% 12%, rgba(43, 138, 138, 0.14), transparent 40%),
    radial-gradient(circle at 80% 90%, rgba(106, 43, 107, 0.12), transparent 42%),
    linear-gradient(180deg, var(--bg-a) 0%, var(--bg-b) 100%);
  background-attachment: fixed;
  padding: 1.5rem 1rem;
  display: flex;
  flex-direction: column;
  align-items: center;
  user-select: none;
}
main{
  max-width: 56rem;
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.8rem;
  position: relative;
  z-index: 1;
}

/* ── HEADER ── */
header{ text-align: center; margin-bottom: 0.4rem; }
header h1{
  margin: 0;
  font-family: 'Bungee', cursive;
  font-size: clamp(2rem, 6.5vw, 3.3rem);
  letter-spacing: 0.02em;
  line-height: 0.95;
  color: var(--ink);
  text-shadow: 3px 3px 0 var(--coral), 6px 6px 0 rgba(0,0,0,0.10);
}
header h1 .em{ color: var(--coral); }
header .tag{
  margin-top: 0.4rem;
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-weight: 400;
  font-size: clamp(0.95rem, 2.5vw, 1.25rem);
  color: var(--dim);
}
header .tag b{ color: var(--coral); font-style: normal; font-family: 'Bungee', cursive; font-size: 0.85em; }

/* ── METERS ── */
.meters{
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.6rem;
}
.meter{
  background: var(--paper);
  border: 2px solid var(--ink);
  border-radius: 10px;
  padding: 0.55rem 0.8rem;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.18);
}
.meter h3{
  margin: 0 0 0.3rem;
  font-family: 'Bungee', cursive;
  font-size: 0.78rem;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 0.4rem;
}
.meter.p1 h3{ color: var(--p1); }
.meter.p2 h3{ color: var(--p2); }
.meter h3 .name{ flex: 1; }
.meter h3 .pip{
  font-size: 0.66rem;
  color: var(--dim);
  font-family: 'Fredoka', sans-serif;
  font-weight: 700;
  text-transform: none;
  letter-spacing: 0;
}
.bar{
  height: 0.7rem;
  background: rgba(0,0,0,0.10);
  border-radius: 999px;
  overflow: hidden;
  margin-bottom: 0.32rem;
}
.bar .fill{
  height: 100%;
  transition: width 0.32s ease-out;
}
.bar.pol .fill{ background: linear-gradient(90deg, var(--gold), var(--coral)); }
.bar.pat .fill{ background: linear-gradient(90deg, var(--teal), var(--p1)); }
.bar.pat.danger .fill{ background: linear-gradient(90deg, #ff7050, var(--coral)); animation: pulseBar 0.7s ease-in-out infinite; }
@keyframes pulseBar{ 0%, 100%{ opacity: 1; } 50%{ opacity: 0.55; } }
.bar-row{
  display: flex;
  justify-content: space-between;
  font-family: 'Fredoka', sans-serif;
  font-size: 0.7rem;
  color: var(--dim);
  margin-bottom: 0.3rem;
}
.bar-row b{ color: var(--ink); font-variant-numeric: tabular-nums; }

/* ── DOORWAY SCENE ── */
.stage{
  width: 100%;
  height: 18rem;
  max-height: 50vh;
  position: relative;
  background:
    /* doorway light */
    radial-gradient(ellipse 30% 35% at 50% 60%, rgba(255, 220, 140, 0.65), transparent 70%),
    linear-gradient(180deg, #4a2814 0%, #6a3a1f 55%, #c49060 70%, #d6a378 100%);
  border: 3px solid var(--ink);
  border-radius: 14px;
  overflow: hidden;
  box-shadow: 6px 6px 0 var(--coral), 0 12px 30px rgba(0,0,0,0.30);
}
/* doorway rectangle */
.doorway{
  position: absolute;
  left: 50%;
  bottom: 0;
  transform: translateX(-50%);
  width: 36%;
  height: 70%;
  background: linear-gradient(180deg, #fff5b0 0%, #ffd97a 60%, #c69838 100%);
  border-radius: 28% 28% 0 0;
  border: 3px solid var(--ink);
  border-bottom: none;
  box-shadow: inset 0 0 0 2px rgba(255,255,255,0.18);
}
.doorway::before{
  /* light beam */
  content: '';
  position: absolute;
  top: 30%; bottom: 0;
  left: 18%; right: 18%;
  background: radial-gradient(ellipse, rgba(255,255,255,0.55), transparent 70%);
}
/* floor strip */
.floor{
  position: absolute;
  left: 0; right: 0; bottom: 0;
  height: 14%;
  background: linear-gradient(180deg, rgba(0,0,0,0.20), rgba(0,0,0,0.40));
  border-top: 1.5px solid rgba(0,0,0,0.40);
}

/* ── CHARACTERS ── */
.char{
  position: absolute;
  bottom: 14%;
  width: 9rem;
  height: 12rem;
  transition: left 0.35s cubic-bezier(.5,1.3,.5,1), right 0.35s cubic-bezier(.5,1.3,.5,1);
  transform-origin: center bottom;
}
.char.left{ left: 8%; }
.char.left.shift-l{ left: 2%; }
.char.left.shift-r{ left: 18%; }
.char.right{ right: 8%; }
.char.right.shift-l{ right: 18%; }
.char.right.shift-r{ right: 2%; }
.char.passed-l{ left: -25% !important; right: auto !important; transition: left 0.7s ease-in; }
.char.passed-r{ right: -25% !important; left: auto !important; transition: right 0.7s ease-in; }
.char.snap{ animation: snapShake 0.5s ease-in-out 3; }
@keyframes snapShake{
  0%,100% { transform: translateX(0) rotate(0); }
  25% { transform: translateX(-4px) rotate(-3deg); }
  75% { transform: translateX(4px) rotate(3deg); }
}
.char .body{
  position: absolute;
  left: 50%; bottom: 0;
  transform: translateX(-50%);
  width: 5rem; height: 8rem;
  background: var(--p1);
  border-radius: 50% 50% 14% 14% / 50% 50% 8% 8%;
  border: 3px solid var(--ink);
  box-shadow: inset 0 -10px 0 rgba(0,0,0,0.18);
}
.char.right .body{ background: var(--p2); }
.char .head{
  position: absolute;
  left: 50%; top: 0;
  transform: translateX(-50%);
  width: 4rem; height: 4rem;
  background: #f5d3b3;
  border: 3px solid var(--ink);
  border-radius: 50%;
  box-shadow: inset -6px -8px 0 rgba(0,0,0,0.10);
}
.char .face{
  position: absolute;
  left: 50%; top: 50%;
  transform: translate(-50%, -50%);
  width: 100%; height: 100%;
}
.char .eye{
  position: absolute;
  width: 0.4rem; height: 0.55rem;
  background: var(--ink);
  border-radius: 50%;
  top: 45%;
}
.char .eye.l{ left: 30%; }
.char .eye.r{ right: 30%; }
.char .mouth{
  position: absolute;
  left: 50%;
  bottom: 22%;
  transform: translateX(-50%);
  width: 1rem; height: 0.35rem;
  background: var(--ink);
  border-radius: 50%;
  transition: all 0.25s;
}
.char.talking .mouth{
  width: 0.6rem; height: 0.7rem;
  border-radius: 50% 50% 50% 50%;
  background: #2a1008;
}
.char .arm{
  position: absolute;
  top: 36%;
  width: 1rem; height: 3rem;
  background: var(--p1);
  border: 3px solid var(--ink);
  border-radius: 50% / 25%;
  transition: transform 0.32s cubic-bezier(.5,1.3,.5,1);
}
.char.right .arm{ background: var(--p2); }
.char .arm.l{ left: -0.5rem; transform-origin: 60% 10%; }
.char .arm.r{ right: -0.5rem; transform-origin: 40% 10%; }
.char.gesturing .arm.r{ transform: rotate(-65deg); }
.char.right.gesturing .arm.l{ transform: rotate(65deg); }
.char.right.gesturing .arm.r{ transform: rotate(0); }
.char.left.gesturing .arm.l{ transform: rotate(0); }

/* speech bubble */
.bubble{
  position: absolute;
  top: -2.4rem;
  background: var(--paper);
  border: 2.5px solid var(--ink);
  border-radius: 14px;
  padding: 0.36rem 0.8rem;
  font-family: 'Caveat', cursive;
  font-weight: 700;
  font-size: 1.3rem;
  color: var(--coral);
  white-space: nowrap;
  opacity: 0;
  transform: translateY(8px) scale(0.7);
  transition: opacity 0.22s, transform 0.32s cubic-bezier(.5,1.3,.5,1);
  pointer-events: none;
  box-shadow: 3px 3px 0 rgba(0,0,0,0.25);
}
.char.left .bubble{ left: 50%; transform-origin: bottom left; }
.char.right .bubble{ right: 50%; transform-origin: bottom right; }
.char.talking .bubble{ opacity: 1; transform: translateY(0) scale(1); }
.bubble::after{
  content: '';
  position: absolute;
  bottom: -8px;
  width: 0; height: 0;
  border: 6px solid transparent;
  border-top-color: var(--paper);
  border-bottom: 0;
}
.char.left .bubble::after{ left: 1rem; }
.char.right .bubble::after{ right: 1rem; }
.bubble::before{
  content: '';
  position: absolute;
  bottom: -11px;
  width: 0; height: 0;
  border: 7px solid transparent;
  border-top-color: var(--ink);
  border-bottom: 0;
}
.char.left .bubble::before{ left: calc(1rem - 1px); }
.char.right .bubble::before{ right: calc(1rem - 1px); }

/* ── ACTION ROW ── */
.controls{
  width: 100%;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.6rem;
}
.controls .side{
  background: var(--paper);
  border: 2px solid var(--ink);
  border-radius: 12px;
  padding: 0.7rem;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.18);
}
.controls .side h4{
  margin: 0 0 0.5rem;
  font-family: 'Bungee', cursive;
  font-size: 0.74rem;
  letter-spacing: 0.10em;
  text-transform: uppercase;
  color: var(--p1);
}
.controls .side.p2 h4{ color: var(--p2); text-align: right; }
.controls .side .row{
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0.4rem;
}
.act{
  background: var(--p1);
  color: #fff;
  border: 2px solid var(--ink);
  font-family: 'Fredoka', sans-serif;
  font-weight: 700;
  font-size: 0.86rem;
  padding: 0.55rem 0.5rem;
  border-radius: 8px;
  cursor: pointer;
  min-height: 2.75rem;
  box-shadow: 2px 2px 0 var(--ink);
  transition: transform 0.08s, box-shadow 0.08s, background 0.18s;
  text-align: center;
}
.controls .side.p2 .act{ background: var(--p2); }
.act:hover{ transform: translate(-1px, -1px); box-shadow: 3px 3px 0 var(--ink); }
.act:active{ transform: translate(1px, 1px); box-shadow: 1px 1px 0 var(--ink); }
.act.cool{ background: var(--paper); color: var(--ink); }
.act.cool:hover{ background: #fff; }
.act:disabled{ opacity: 0.55; cursor: not-allowed; transform: none; box-shadow: 2px 2px 0 var(--ink); }
.act .em{ display: block; font-size: 1rem; margin-bottom: 0.05rem; }
*:focus-visible{ outline: 3px solid var(--gold); outline-offset: 3px; }

/* ── TOOLBAR ── */
.toolbar{
  width: 100%;
  display: flex;
  gap: 0.5rem;
  justify-content: center;
  flex-wrap: wrap;
}
.btn{
  background: var(--ink);
  color: #fff;
  border: 2px solid var(--ink);
  font-family: 'Bungee', cursive;
  font-size: 0.76rem;
  letter-spacing: 0.06em;
  padding: 0.55rem 1rem;
  border-radius: 999px;
  cursor: pointer;
  min-height: 2.75rem;
  box-shadow: 3px 3px 0 var(--coral);
  text-transform: uppercase;
  transition: transform 0.1s, box-shadow 0.1s;
}
.btn:hover{ transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--coral); }
.btn:active{ transform: translate(1px, 1px); box-shadow: 1px 1px 0 var(--coral); }
.btn.alt{ background: var(--paper); color: var(--ink); box-shadow: 3px 3px 0 var(--plum); }
.btn.alt:hover{ box-shadow: 4px 4px 0 var(--plum); }
.btn[aria-pressed="true"]{ background: var(--gold); color: var(--ink); }

/* ── LOG ── */
.log-card{
  width: 100%;
  background: var(--paper);
  border: 2px solid var(--ink);
  border-radius: 12px;
  padding: 0.7rem 0.9rem;
  box-shadow: 4px 4px 0 rgba(0,0,0,0.18);
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 0.96rem;
  color: var(--ink);
  max-height: 8rem;
  overflow-y: auto;
  line-height: 1.45;
}
.log-card .line{ margin: 0.1rem 0; }
.log-card .line .who{
  font-family: 'Bungee', cursive;
  font-style: normal;
  font-size: 0.72rem;
  letter-spacing: 0.06em;
  margin-right: 0.4rem;
}
.log-card .line.p1 .who{ color: var(--p1); }
.log-card .line.p2 .who{ color: var(--p2); }
.log-card .line.meta{ color: var(--dim); font-size: 0.84rem; }

/* ── OVERLAY ── */
.overlay{
  position: fixed; inset: 0;
  background: rgba(58, 31, 16, 0.78);
  backdrop-filter: blur(6px);
  z-index: 80;
  display: flex; align-items: center; justify-content: center;
  padding: 1rem;
}
.overlay.hidden{ display: none; }
.panel{
  background: var(--paper);
  border: 4px solid var(--ink);
  border-radius: 16px;
  padding: 1.6rem 1.6rem 1.4rem;
  max-width: 30rem;
  width: 100%;
  text-align: center;
  box-shadow: 8px 8px 0 var(--coral);
}
.panel h2{
  margin: 0 0 0.4rem;
  font-family: 'Bungee', cursive;
  font-size: clamp(1.4rem, 4.5vw, 2.2rem);
  line-height: 0.95;
  color: var(--coral);
}
.panel h2 .em{ color: var(--plum); }
.panel .sub{
  margin: 0.3rem 0 0.9rem;
  font-family: 'Fraunces', serif;
  font-style: italic;
  font-size: 1.05rem;
  color: var(--dim);
}
.panel .stats{
  background: rgba(0,0,0,0.06);
  border-radius: 8px;
  padding: 0.6rem 0.9rem;
  margin: 0.5rem 0 1rem;
  text-align: left;
  font-family: 'Fredoka', sans-serif;
  font-size: 0.96rem;
}
.panel .stats .row{ display: flex; justify-content: space-between; padding: 0.16rem 0; }
.panel .stats .row b{ color: var(--coral); font-variant-numeric: tabular-nums; }
.panel button{ margin-top: 0.4rem; }

@media (prefers-reduced-motion: reduce){
  *{ animation: none !important; transition: none !important; }
}
@media (max-width: 36rem){
  .controls{ grid-template-columns: 1fr; }
  .controls .side.p2{ display: none; }   /* hide P2 panel in vs-AI mode default */
  .controls.hot-seat .side.p2{ display: block; }
  .stage{ height: 14rem; }
  .char{ width: 7rem; height: 10rem; }
  .char .body{ width: 4rem; height: 6.4rem; }
  .char .head{ width: 3.2rem; height: 3.2rem; }
}
</style>
</head>
<body>

<main>
  <header>
    <h1>SORRY <span class="em">·</span> SIMULATOR</h1>
    <p class="tag">two people · one doorway · <b>aggressive politeness</b></p>
  </header>

  <div class="meters">
    <div class="meter p1">
      <h3><span class="name" id="p1-name">YOU</span> <span class="pip" id="p1-mode">left side</span></h3>
      <div class="bar-row"><span>politeness</span><b id="p1-pol-val">0</b></div>
      <div class="bar pol"><div class="fill" id="p1-pol-bar" style="width: 0%;"></div></div>
      <div class="bar-row"><span>patience</span><b id="p1-pat-val">100</b></div>
      <div class="bar pat" id="p1-pat-row"><div class="fill" id="p1-pat-bar" style="width: 100%;"></div></div>
    </div>
    <div class="meter p2">
      <h3><span class="name" id="p2-name">STRANGER</span> <span class="pip" id="p2-mode">right side</span></h3>
      <div class="bar-row"><span>politeness</span><b id="p2-pol-val">0</b></div>
      <div class="bar pol"><div class="fill" id="p2-pol-bar" style="width: 0%;"></div></div>
      <div class="bar-row"><span>patience</span><b id="p2-pat-val">100</b></div>
      <div class="bar pat" id="p2-pat-row"><div class="fill" id="p2-pat-bar" style="width: 100%;"></div></div>
    </div>
  </div>

  <section class="stage" id="stage" aria-label="doorway scene">
    <div class="doorway"></div>
    <div class="floor"></div>
    <div class="char left" id="char-p1">
      <div class="arm l"></div>
      <div class="arm r"></div>
      <div class="body"></div>
      <div class="head"><div class="face">
        <div class="eye l"></div><div class="eye r"></div>
        <div class="mouth"></div>
      </div></div>
      <div class="bubble" id="bubble-p1">—</div>
    </div>
    <div class="char right" id="char-p2">
      <div class="arm l"></div>
      <div class="arm r"></div>
      <div class="body"></div>
      <div class="head"><div class="face">
        <div class="eye l"></div><div class="eye r"></div>
        <div class="mouth"></div>
      </div></div>
      <div class="bubble" id="bubble-p2">—</div>
    </div>
  </section>

  <section class="controls" id="controls">
    <div class="side p1">
      <h4>YOU · choose your sorry</h4>
      <div class="row">
        <button class="act" type="button" data-act="sorry" data-side="p1"><span class="em">🙏</span>SORRY!</button>
        <button class="act" type="button" data-act="after-you" data-side="p1"><span class="em">👉</span>after you</button>
        <button class="act cool" type="button" data-act="step-l" data-side="p1"><span class="em">⬅️</span>step left</button>
        <button class="act cool" type="button" data-act="step-r" data-side="p1"><span class="em">➡️</span>step right</button>
      </div>
    </div>
    <div class="side p2">
      <h4>STRANGER · their move</h4>
      <div class="row">
        <button class="act" type="button" data-act="sorry" data-side="p2"><span class="em">🙏</span>SORRY!</button>
        <button class="act" type="button" data-act="after-you" data-side="p2"><span class="em">👉</span>after you</button>
        <button class="act cool" type="button" data-act="step-l" data-side="p2"><span class="em">⬅️</span>step left</button>
        <button class="act cool" type="button" data-act="step-r" data-side="p2"><span class="em">➡️</span>step right</button>
      </div>
    </div>
  </section>

  <div class="toolbar">
    <button class="btn" type="button" id="btn-mode" aria-pressed="false">vs AI</button>
    <button class="btn alt" type="button" id="btn-reset">restart</button>
  </div>

  <section class="log-card" id="log" role="log" aria-live="polite"></section>
</main>

<div class="overlay hidden" id="end-overlay" role="dialog" aria-modal="true" aria-labelledby="end-title">
  <div class="panel">
    <h2 id="end-title"><span class="em">—</span></h2>
    <p class="sub" id="end-flavor">— a thing happened —</p>
    <div class="stats" id="end-stats"></div>
    <button class="btn" type="button" id="btn-end-restart">again, sorry</button>
  </div>
</div>

<script>
/* ────────── SORRY SIMULATOR ──────────
   Two players block a doorway. Pick an action — apologise (+ your
   politeness, − their patience), wave them through (bigger boost), or
   step (left/right). Stepping is a coin-flip: if you both step the SAME
   direction you mirror → both apologise → patience drops; if you step
   OPPOSITE → one of you passes → game ends. Patience hits 0 = that
   player snaps and walks through (the OTHER wins because they were
   more polite). vs-AI by default; toggle hot-seat for 2-player local. */

const PHRASES = {
  sorry: [
    "Sorry!",
    "Oh sorry sorry!",
    "Sorry, sorry.",
    "So sorry!",
    "Sorry — my fault.",
    "Sorry, didn't see you.",
    "Sorry, sorry, sorry.",
    "Ah, sorry.",
    "Sorry, my bad entirely.",
    "Pardon me, sorry!",
    "Cheers, sorry.",
    "Oh god, sorry.",
  ],
  insist: [
    "No, no, after you.",
    "Please, you first.",
    "I insist, go on.",
    "No no, I'm in no rush.",
    "Please, after you.",
    "Honestly, you go.",
    "I couldn't possibly.",
    "No really, you go.",
    "Please, I insist.",
    "No no no, you absolutely first.",
    "Couldn't, wouldn't. After you.",
  ],
  step: [
    "I'll just nip past.",
    "Ah, this way then.",
    "Let me just—",
    "Oh, sorry, that way.",
    "Right then, this side.",
    "I'll go this way then.",
    "Right. Sorry. Going.",
  ],
  snap: [
    "FINE. I'm going.",
    "Right. I'M going.",
    "ENOUGH. Through I go.",
    "I — yes, fine, thank you.",
    "Just — yes, sorry, going.",
  ],
};

const state = {
  p1: { pol: 0, pat: 100, name: 'YOU', side: 'left',  pos: 0 },   // pos: -1 / 0 / 1 (left/center/right of own slot)
  p2: { pol: 0, pat: 100, name: 'STRANGER', side: 'right', pos: 0 },
  hotSeat: false,
  ended: false,
  totalSorries: 0,
  longestChain: 0,
  chain: 0,
  turn: 0,
  log: [],
  lockUntil: 0,           // ms — block all input briefly while characters animate / AI thinks
};

const els = {
  stage: document.getElementById('stage'),
  charP1: document.getElementById('char-p1'),
  charP2: document.getElementById('char-p2'),
  bubP1: document.getElementById('bubble-p1'),
  bubP2: document.getElementById('bubble-p2'),
  log: document.getElementById('log'),
  controls: document.getElementById('controls'),
  endOverlay: document.getElementById('end-overlay'),
  endTitle: document.getElementById('end-title'),
  endFlavor: document.getElementById('end-flavor'),
  endStats: document.getElementById('end-stats'),
  btnMode: document.getElementById('btn-mode'),
  p1Mode: document.getElementById('p1-mode'),
  p2Mode: document.getElementById('p2-mode'),
};

/* ── UI helpers ── */
function pickPhrase(kind){
  const pool = PHRASES[kind] || PHRASES.sorry;
  return pool[(Math.random() * pool.length) | 0];
}
function say(who, text, opts){
  const charEl = who === 'p1' ? els.charP1 : els.charP2;
  const bubEl = who === 'p1' ? els.bubP1 : els.bubP2;
  bubEl.textContent = text;
  charEl.classList.add('talking');
  if (opts && opts.gesture) charEl.classList.add('gesturing');
  // pop the bubble for ~1.5s
  clearTimeout(charEl._talkTimer);
  charEl._talkTimer = setTimeout(() => {
    charEl.classList.remove('talking');
    charEl.classList.remove('gesturing');
  }, 1500);
  // log
  pushLog(who, text);
}
function pushLog(who, text){
  state.log.push({ who, text });
  if (state.log.length > 30) state.log.shift();
  renderLog();
}
function pushLogMeta(text){
  state.log.push({ who: 'meta', text });
  if (state.log.length > 30) state.log.shift();
  renderLog();
}
function renderLog(){
  els.log.innerHTML = state.log.slice(-12).map(line => {
    if (line.who === 'meta'){
      return '<div class="line meta">— ' + esc(line.text) + ' —</div>';
    }
    const name = line.who === 'p1' ? state.p1.name : state.p2.name;
    return '<div class="line ' + line.who + '"><span class="who">' + esc(name) + '</span>"' + esc(line.text) + '"</div>';
  }).join('');
  els.log.scrollTop = els.log.scrollHeight;
}
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function updateMeters(){
  for (const k of ['p1', 'p2']){
    const s = state[k];
    document.getElementById(k + '-pol-val').textContent = s.pol;
    document.getElementById(k + '-pol-bar').style.width = Math.min(100, s.pol) + '%';
    document.getElementById(k + '-pat-val').textContent = Math.max(0, s.pat | 0);
    document.getElementById(k + '-pat-bar').style.width = Math.max(0, Math.min(100, s.pat)) + '%';
    document.getElementById(k + '-pat-row').classList.toggle('danger', s.pat < 25);
  }
}

function applyStepClasses(who, dir){
  const el = who === 'p1' ? els.charP1 : els.charP2;
  el.classList.remove('shift-l', 'shift-r');
  if (dir === 'l') el.classList.add('shift-l');
  else if (dir === 'r') el.classList.add('shift-r');
}

/* ── core: process a player's action, then resolve AI/peer response ── */
function doAction(side, action){
  if (state.ended) return;
  if (performance.now() < state.lockUntil) return;
  state.lockUntil = performance.now() + 750;
  state.turn++;
  resolveAction(side, action);
  // schedule the other side's response if not hot-seat
  if (!state.hotSeat){
    const ai = side === 'p1' ? 'p2' : 'p1';
    setTimeout(() => aiRespond(ai, action), 700);
  } else {
    // hot-seat: nudge the other player to act next
    pushLogMeta((side === 'p1' ? state.p2.name : state.p1.name) + "'s move");
  }
}

function resolveAction(side, action){
  const me = state[side];
  const other = side === 'p1' ? state.p2 : state.p1;
  const otherSide = side === 'p1' ? 'p2' : 'p1';
  if (action === 'sorry'){
    state.totalSorries++;
    state.chain++;
    if (state.chain > state.longestChain) state.longestChain = state.chain;
    me.pol += 6;
    other.pat -= 4;
    say(side, pickPhrase('sorry'));
    sndSorry();
  } else if (action === 'after-you'){
    state.totalSorries++;
    state.chain++;
    if (state.chain > state.longestChain) state.longestChain = state.chain;
    me.pol += 12;
    other.pat -= 8;     // even harder to absorb — they MUST apologise back
    say(side, pickPhrase('insist'), { gesture: true });
    sndInsist();
  } else if (action === 'step-l' || action === 'step-r'){
    // step in a direction — temporarily shifts the character. The actual
    // pass-through depends on whether the OTHER also stepped, and which way.
    const dir = action === 'step-l' ? 'l' : 'r';
    me.pos = dir === 'l' ? -1 : 1;
    applyStepClasses(side, dir);
    say(side, pickPhrase('step'));
    sndStep();
    // attempt pass: check if other has ALSO stepped (this turn or last)
    if (other.pos !== 0 && other.pos !== me.pos){
      // they stepped opposite → one passes through!
      maybePassThrough(side);
      return;
    }
    if (other.pos === me.pos){
      // they mirrored — the dance continues
      state.chain++;
      if (state.chain > state.longestChain) state.longestChain = state.chain;
      // both lose a bit of patience from the awkwardness
      me.pat -= 2;
      other.pat -= 2;
      pushLogMeta('they mirror each other (the dance)');
      // reset both positions for next turn
      setTimeout(() => {
        me.pos = 0; other.pos = 0;
        applyStepClasses('p1', null); applyStepClasses('p2', null);
        updateMeters();
      }, 700);
    }
  }
  updateMeters();
  if (me.pat <= 0){ snap(side); return; }
  if (other.pat <= 0){ snap(otherSide); return; }
}

function maybePassThrough(passingSide){
  // The OTHER side wins (they were more polite — they let you through)
  const passing = state[passingSide];
  const winner = passingSide === 'p1' ? 'p2' : 'p1';
  const passingEl = passingSide === 'p1' ? els.charP1 : els.charP2;
  passingEl.classList.add(passingSide === 'p1' ? 'passed-r' : 'passed-l');
  pushLogMeta(state[passingSide].name + ' nips through · ' + state[winner].name + ' wins the politeness war');
  setTimeout(() => endGame(winner, 'gracious-pass'), 900);
}

function snap(snappingSide){
  // The snapping player gives up + storms through — the OTHER wins
  const winner = snappingSide === 'p1' ? 'p2' : 'p1';
  const snappingEl = snappingSide === 'p1' ? els.charP1 : els.charP2;
  snappingEl.classList.add('snap');
  say(snappingSide, pickPhrase('snap'));
  sndSnap();
  setTimeout(() => {
    snappingEl.classList.add(snappingSide === 'p1' ? 'passed-r' : 'passed-l');
    pushLogMeta(state[snappingSide].name + ' SNAPS and walks through · ' + state[winner].name + ' was simply too polite');
    setTimeout(() => endGame(winner, 'snap'), 700);
  }, 1200);
}

function aiRespond(ai, theirLastAction){
  if (state.ended) return;
  // AI personality:
  // - 60% chance: mirror the player's action (the awkward dance)
  // - 25% chance: apologise back (sorry)
  // - 10% chance: after-you escalation
  // - 5% chance: try a step (might cause pass)
  // If AI's patience is very low → it might just step boldly (try to get through)
  const me = state[ai];
  let act;
  if (me.pat < 30 && Math.random() < 0.40){
    act = Math.random() < 0.5 ? 'step-l' : 'step-r';
  } else {
    const r = Math.random();
    if (r < 0.60){
      // mirror — react to their action
      if (theirLastAction === 'sorry') act = 'sorry';
      else if (theirLastAction === 'after-you') act = 'after-you';
      else if (theirLastAction === 'step-l') act = 'step-l';     // mirror direction (the dance)
      else act = 'step-r';
    } else if (r < 0.85){
      act = 'sorry';
    } else if (r < 0.95){
      act = 'after-you';
    } else {
      act = Math.random() < 0.5 ? 'step-l' : 'step-r';
    }
  }
  resolveAction(ai, act);
}

function endGame(winner, reason){
  if (state.ended) return;
  state.ended = true;
  els.endTitle.innerHTML = state[winner].name + ' <span class="em">wins the doorway</span>';
  const flav = reason === 'snap'
    ? 'the other one snapped and stormed through. Aggressive politeness is a real strategy.'
    : 'the other one bolted through the gap. You were too polite to even resist.';
  els.endFlavor.textContent = flav;
  els.endStats.innerHTML = `
    <div class="row"><span>winner</span><b>${esc(state[winner].name)}</b></div>
    <div class="row"><span>politeness gap</span><b>${state[winner].pol - state[winner === 'p1' ? 'p2' : 'p1'].pol}</b></div>
    <div class="row"><span>total apologies</span><b>${state.totalSorries}</b></div>
    <div class="row"><span>longest sorry-chain</span><b>${state.longestChain}</b></div>
    <div class="row"><span>turns taken</span><b>${state.turn}</b></div>
  `;
  els.endOverlay.classList.remove('hidden');
  sndEnd();
}

/* ── AUDIO ── */
let audioCtx = null;
function ensureAudio(){ if (!audioCtx) try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} return audioCtx; }
function tone(freq, dur, type, vol, delay){
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime + (delay || 0);
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type || 'sine'; o.frequency.setValueAtTime(freq, t0);
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol || 0.06, t0 + 0.008);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t0); o.stop(t0 + dur + 0.02);
}
function sndSorry(){ tone(520 + Math.random() * 80, 0.10, 'triangle', 0.08); tone(380, 0.16, 'sine', 0.06, 0.06); }
function sndInsist(){ tone(660, 0.08, 'triangle', 0.10); tone(880, 0.12, 'sine', 0.08, 0.06); tone(990, 0.18, 'sine', 0.06, 0.14); }
function sndStep(){ tone(220, 0.05, 'square', 0.05); }
function sndSnap(){ tone(180, 0.10, 'sawtooth', 0.14); tone(140, 0.18, 'sawtooth', 0.12, 0.08); tone(90, 0.32, 'sine', 0.10, 0.22); }
function sndEnd(){ tone(523, 0.10, 'triangle', 0.10); tone(659, 0.14, 'triangle', 0.10, 0.08); tone(784, 0.22, 'sine', 0.08, 0.18); }

/* ── BUTTONS ── */
document.querySelectorAll('.act').forEach(b => {
  b.addEventListener('click', () => {
    ensureAudio();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    const side = b.dataset.side;
    const act = b.dataset.act;
    // in vs-AI mode, only p1 controls are live
    if (!state.hotSeat && side === 'p2') return;
    doAction(side, act);
  });
});

document.getElementById('btn-mode').addEventListener('click', (e) => {
  state.hotSeat = !state.hotSeat;
  e.currentTarget.textContent = state.hotSeat ? 'hot-seat' : 'vs AI';
  e.currentTarget.setAttribute('aria-pressed', String(state.hotSeat));
  els.controls.classList.toggle('hot-seat', state.hotSeat);
  // hide/show P2 panel by container responsive rule too
  document.querySelector('.controls .side.p2').style.display = state.hotSeat ? '' : '';
  state.p2.name = state.hotSeat ? 'PLAYER 2' : 'STRANGER';
  els.p1Mode.textContent = state.hotSeat ? 'player 1' : 'left side';
  els.p2Mode.textContent = state.hotSeat ? 'player 2' : 'right side · AI';
  reset();
});

document.getElementById('btn-reset').addEventListener('click', reset);
document.getElementById('btn-end-restart').addEventListener('click', reset);

function reset(){
  state.p1.pol = 0; state.p1.pat = 100; state.p1.pos = 0;
  state.p2.pol = 0; state.p2.pat = 100; state.p2.pos = 0;
  state.ended = false;
  state.totalSorries = 0;
  state.longestChain = 0;
  state.chain = 0;
  state.turn = 0;
  state.log = [];
  els.endOverlay.classList.add('hidden');
  applyStepClasses('p1', null); applyStepClasses('p2', null);
  els.charP1.classList.remove('passed-r', 'passed-l', 'snap', 'talking', 'gesturing');
  els.charP2.classList.remove('passed-r', 'passed-l', 'snap', 'talking', 'gesturing');
  state.p2.name = state.hotSeat ? 'PLAYER 2' : 'STRANGER';
  document.getElementById('p1-name').textContent = state.p1.name;
  document.getElementById('p2-name').textContent = state.p2.name;
  updateMeters();
  renderLog();
  pushLogMeta('two people · one doorway · ' + (state.hotSeat ? 'p1 first move' : 'your move'));
}

reset();
</script>
</body>
</html>
