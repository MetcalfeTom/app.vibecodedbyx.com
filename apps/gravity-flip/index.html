<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Gravity Flip</title>
<link rel="icon" href="https://emojicdn.elk.sh/🔄">
<meta property="og:title" content="Gravity Flip">
<meta property="og:description" content="Neon physics sandbox where gravity reverses every 5 seconds. Spawn shapes and watch the chaos.">
<meta property="og:url" content="https://app.sloppy.live/gravity-flip/">
<meta property="og:image" content="https://emojicdn.elk.sh/🔄?style=google">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#08080f;overflow:hidden;font-family:'Fira Code',monospace;user-select:none;cursor:crosshair}
canvas{display:block}
#hud{position:fixed;top:10px;left:14px;z-index:10;pointer-events:none}
#hud h1{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:20px;color:#fff;letter-spacing:3px;margin-bottom:4px}
#hud p{font-size:11px;color:rgba(255,255,255,.4);margin-bottom:2px}
#gravity-indicator{position:fixed;top:10px;right:14px;z-index:10;pointer-events:none;text-align:right}
#gravity-indicator .dir{font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:28px;transition:transform .3s}
#gravity-indicator .timer{font-size:10px;color:rgba(255,255,255,.3)}
#gravity-indicator .bar{width:60px;height:4px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:4px;margin-left:auto}
#gravity-indicator .bar-fill{height:100%;border-radius:2px;transition:width .1s,background .3s}
#controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
#controls button{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.55);padding:7px 14px;border-radius:4px;font-family:'Fira Code',monospace;font-size:11px;cursor:pointer;transition:all .15s}
#controls button:hover{background:rgba(255,255,255,.1);color:#fff;border-color:rgba(255,255,255,.25)}
#controls button.active{border-color:rgba(0,255,200,.5);color:#0fc}
#instructions{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(255,255,255,.18);font-size:13px;text-align:center;pointer-events:none;transition:opacity .6s;z-index:5}
.back-link{position:fixed;bottom:4px;right:8px;font-size:9px;color:rgba(255,255,255,.1);text-decoration:none;z-index:10}
.back-link:hover{color:rgba(255,255,255,.25)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
<h1>GRAVITY FLIP</h1>
<p id="obj-count">Objects: 0</p>
</div>
<div id="gravity-indicator">
<div class="dir" id="grav-arrow" style="color:#0fc">▼</div>
<div class="timer" id="grav-timer">5.0s</div>
<div class="bar"><div class="bar-fill" id="grav-bar" style="width:100%;background:#0fc"></div></div>
</div>
<div id="instructions">Click to spawn shapes<br>Drag to fling them<br>Gravity flips every 5s</div>
<div id="controls">
<button id="btn-circle" class="active">Circle</button>
<button id="btn-square">Square</button>
<button id="btn-tri">Triangle</button>
<button id="btn-mix">Random</button>
<button id="btn-rain">Rain</button>
<button id="btn-clear">Clear</button>
</div>
<a href="https://sloppy.live" class="back-link" target="_blank">sloppy.live</a>

<script>
var CV=document.getElementById('c'),X=CV.getContext('2d');
var W,H;
function resize(){W=CV.width=window.innerWidth;H=CV.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

var FLIP_INTERVAL=5;
var GRAVITY=700;
var RESTITUTION=0.6;
var MAX_OBJECTS=200;
var COLORS=[
  {h:170,glow:'rgba(0,255,200,.5)'},
  {h:280,glow:'rgba(160,80,255,.5)'},
  {h:340,glow:'rgba(255,50,100,.5)'},
  {h:45,glow:'rgba(255,200,0,.5)'},
  {h:200,glow:'rgba(0,160,255,.5)'},
  {h:100,glow:'rgba(80,255,0,.5)'},
  {h:20,glow:'rgba(255,140,40,.5)'},
  {h:310,glow:'rgba(255,0,220,.5)'}
];

var gravDir=1;
var flipTimer=FLIP_INTERVAL;
var objects=[];
var sparks=[];
var shapeMode='circle';
var raining=false;
var rainTimer=0;
var instructionShown=true;
var shake=0;
var flashHue=0,flashAlpha=0;

function rndColor(){return COLORS[Math.floor(Math.random()*COLORS.length)];}

function createObj(x,y,vx,vy,shape){
  var col=rndColor();
  var size=10+Math.random()*20;
  return{
    x:x,y:y,vx:vx||0,vy:vy||0,
    size:size,mass:size*size,
    shape:shape||shapeMode,
    col:col,
    rot:Math.random()*Math.PI*2,
    rotV:(Math.random()-0.5)*5,
    flash:0
  };
}

function spawnAt(x,y,vx,vy){
  if(objects.length>=MAX_OBJECTS)objects.shift();
  var s=shapeMode==='mix'?['circle','square','tri'][Math.floor(Math.random()*3)]:shapeMode;
  objects.push(createObj(x,y,vx,vy,s));
  if(instructionShown){
    instructionShown=false;
    var el=document.getElementById('instructions');
    if(el){el.style.opacity='0';setTimeout(function(){el.remove();},600);}
  }
}

function spawnSparks(x,y,hue,count){
  for(var i=0;i<count;i++){
    var a=Math.random()*Math.PI*2;
    var sp=60+Math.random()*200;
    sparks.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0.3+Math.random()*0.3,maxLife:0.3+Math.random()*0.3,size:1+Math.random()*2.5,hue:hue});
  }
}

function flipGravity(){
  gravDir*=-1;
  flashHue=gravDir>0?170:340;
  flashAlpha=0.15;
  shake=6;
  // Kick all objects slightly
  objects.forEach(function(o){
    o.vy+=gravDir*120;
    o.flash=0.5;
  });
  spawnSparks(W/2,H/2,flashHue,15);
}

function updateObj(o,dt){
  o.vy+=GRAVITY*gravDir*dt;
  o.x+=o.vx*dt;
  o.y+=o.vy*dt;
  o.rot+=o.rotV*dt;
  o.vx*=0.999;
  o.flash=Math.max(0,o.flash-dt*3);
  var r=o.size/2;
  // Walls
  if(o.x-r<0){o.x=r;o.vx=Math.abs(o.vx)*RESTITUTION;o.rotV*=-0.7;bounceEffect(o,0,o.y);}
  if(o.x+r>W){o.x=W-r;o.vx=-Math.abs(o.vx)*RESTITUTION;o.rotV*=-0.7;bounceEffect(o,W,o.y);}
  // Floor/ceiling depending on gravity
  if(o.y-r<0){o.y=r;o.vy=Math.abs(o.vy)*RESTITUTION;o.rotV*=-0.5;o.vx*=0.98;bounceEffect(o,o.x,0);}
  if(o.y+r>H){o.y=H-r;o.vy=-Math.abs(o.vy)*RESTITUTION;o.rotV*=-0.5;o.vx*=0.98;bounceEffect(o,o.x,H);}
}

function bounceEffect(o,bx,by){
  if(Math.abs(o.vy)>80||Math.abs(o.vx)>80){
    spawnSparks(bx,by,o.col.h,Math.floor(Math.max(Math.abs(o.vy),Math.abs(o.vx))/60));
  }
}

function collide(a,b){
  var dx=b.x-a.x,dy=b.y-a.y;
  var dist=Math.sqrt(dx*dx+dy*dy);
  var minD=(a.size+b.size)/2*0.85;
  if(dist<minD&&dist>0.01){
    var nx=dx/dist,ny=dy/dist;
    var dvx=a.vx-b.vx,dvy=a.vy-b.vy;
    var dvn=dvx*nx+dvy*ny;
    if(dvn>0){
      var tm=a.mass+b.mass;
      var imp=2*dvn/tm;
      a.vx-=imp*b.mass*nx*RESTITUTION;
      a.vy-=imp*b.mass*ny*RESTITUTION;
      b.vx+=imp*a.mass*nx*RESTITUTION;
      b.vy+=imp*a.mass*ny*RESTITUTION;
      var ov=(minD-dist)/2+0.5;
      a.x-=nx*ov;a.y-=ny*ov;
      b.x+=nx*ov;b.y+=ny*ov;
      a.rotV+=(Math.random()-0.5)*dvn*0.003;
      b.rotV+=(Math.random()-0.5)*dvn*0.003;
      var relS=Math.abs(dvn);
      if(relS>40){
        var cx=(a.x+b.x)/2,cy=(a.y+b.y)/2;
        spawnSparks(cx,cy,a.col.h,Math.floor(relS/50));
        a.flash=Math.min(1,relS/200);
        b.flash=Math.min(1,relS/200);
      }
    }
  }
}

function drawObj(o){
  X.save();
  X.translate(o.x,o.y);
  X.rotate(o.rot);
  var r=o.size/2;
  var hue=o.col.h;
  var light=55+o.flash*35;
  X.shadowColor=o.col.glow;
  X.shadowBlur=8+o.flash*20;
  X.fillStyle='hsl('+hue+',85%,'+light+'%)';
  X.strokeStyle='hsl('+hue+',100%,75%)';
  X.lineWidth=1.2;
  if(o.shape==='circle'){
    X.beginPath();X.arc(0,0,r,0,Math.PI*2);X.fill();X.stroke();
    // Inner ring
    X.strokeStyle='hsla('+hue+',100%,85%,.15)';
    X.lineWidth=0.5;
    X.beginPath();X.arc(0,0,r*0.6,0,Math.PI*2);X.stroke();
  } else if(o.shape==='square'){
    X.fillRect(-r,-r,o.size,o.size);
    X.strokeRect(-r,-r,o.size,o.size);
    X.strokeStyle='hsla('+hue+',100%,85%,.15)';
    X.lineWidth=0.5;
    X.strokeRect(-r*0.6,-r*0.6,o.size*0.6,o.size*0.6);
  } else {
    X.beginPath();
    X.moveTo(0,-r);
    X.lineTo(r*0.87,r*0.5);
    X.lineTo(-r*0.87,r*0.5);
    X.closePath();X.fill();X.stroke();
    X.strokeStyle='hsla('+hue+',100%,85%,.15)';
    X.lineWidth=0.5;
    X.beginPath();
    X.moveTo(0,-r*0.5);
    X.lineTo(r*0.43,r*0.25);
    X.lineTo(-r*0.43,r*0.25);
    X.closePath();X.stroke();
  }
  X.shadowBlur=0;
  X.restore();
}

function drawSparks(dt){
  sparks.forEach(function(s){
    s.x+=s.vx*dt;s.y+=s.vy*dt;
    s.vx*=0.95;s.vy*=0.95;
    s.vy+=GRAVITY*gravDir*dt*0.3;
    s.life-=dt;
    var a=Math.max(0,s.life/s.maxLife);
    X.globalAlpha=a;
    X.shadowColor='hsla('+s.hue+',100%,60%,.4)';
    X.shadowBlur=5*a;
    X.fillStyle='hsl('+s.hue+',100%,75%)';
    X.fillRect(s.x-s.size/2,s.y-s.size/2,s.size,s.size);
  });
  X.globalAlpha=1;X.shadowBlur=0;
  sparks=sparks.filter(function(s){return s.life>0;});
}

function drawGrid(){
  X.strokeStyle='rgba(255,255,255,.015)';
  X.lineWidth=0.5;
  var gs=50;
  for(var x=0;x<W;x+=gs){X.beginPath();X.moveTo(x,0);X.lineTo(x,H);X.stroke();}
  for(var y=0;y<H;y+=gs){X.beginPath();X.moveTo(0,y);X.lineTo(W,y);X.stroke();}
}

// Input
var mouseDown=false,mouseX=0,mouseY=0,dragStartX=0,dragStartY=0;
var dragSpawnTimer=0;

CV.addEventListener('mousedown',function(e){
  mouseDown=true;mouseX=e.clientX;mouseY=e.clientY;
  dragStartX=mouseX;dragStartY=mouseY;dragSpawnTimer=0;
});
CV.addEventListener('mousemove',function(e){mouseX=e.clientX;mouseY=e.clientY;});
CV.addEventListener('mouseup',function(e){
  if(mouseDown){
    var dx=e.clientX-dragStartX,dy=e.clientY-dragStartY;
    var dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>15){
      // Fling spawn
      spawnAt(dragStartX,dragStartY,-dx*3,-dy*3);
    } else {
      spawnAt(e.clientX,e.clientY,(Math.random()-0.5)*80,(Math.random()-0.5)*80);
    }
  }
  mouseDown=false;
});

CV.addEventListener('touchstart',function(e){
  e.preventDefault();var t=e.touches[0];
  mouseDown=true;mouseX=t.clientX;mouseY=t.clientY;
  dragStartX=mouseX;dragStartY=mouseY;dragSpawnTimer=0;
},{passive:false});
CV.addEventListener('touchmove',function(e){
  e.preventDefault();var t=e.touches[0];mouseX=t.clientX;mouseY=t.clientY;
},{passive:false});
CV.addEventListener('touchend',function(e){
  e.preventDefault();var t=e.changedTouches[0];
  if(mouseDown){
    var dx=t.clientX-dragStartX,dy=t.clientY-dragStartY;
    var dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>15) spawnAt(dragStartX,dragStartY,-dx*3,-dy*3);
    else spawnAt(t.clientX,t.clientY,(Math.random()-0.5)*80,(Math.random()-0.5)*80);
  }
  mouseDown=false;
},{passive:false});

// Buttons
var btns=['circle','square','tri','mix'];
btns.forEach(function(b){
  document.getElementById('btn-'+b).onclick=function(){
    shapeMode=b;raining=false;
    document.querySelectorAll('#controls button').forEach(function(el){el.classList.remove('active');});
    this.classList.add('active');
  };
});
document.getElementById('btn-rain').onclick=function(){
  raining=!raining;
  this.classList.toggle('active',raining);
};
document.getElementById('btn-clear').onclick=function(){objects=[];sparks=[];};

// Main loop
var lastTime=0;

function loop(time){
  var dt=Math.min((time-lastTime)/1000,0.033);
  lastTime=time;

  // Gravity flip timer
  flipTimer-=dt;
  if(flipTimer<=0){
    flipGravity();
    flipTimer=FLIP_INTERVAL;
  }

  // Rain
  if(raining){
    rainTimer+=dt;
    if(rainTimer>0.15){
      rainTimer=0;
      var rx=Math.random()*W;
      var ry=gravDir>0?-20:H+20;
      var s=shapeMode==='mix'?['circle','square','tri'][Math.floor(Math.random()*3)]:shapeMode;
      if(objects.length<MAX_OBJECTS)objects.push(createObj(rx,ry,0,0,s));
    }
  }

  // Drag continuous spawn
  if(mouseDown){
    dragSpawnTimer+=dt;
    if(dragSpawnTimer>0.2){
      dragSpawnTimer=0;
      spawnAt(mouseX,mouseY,(Math.random()-0.5)*50,(Math.random()-0.5)*50);
    }
  }

  // Physics
  objects.forEach(function(o){updateObj(o,dt);});
  for(var i=0;i<objects.length;i++){
    for(var j=i+1;j<objects.length;j++){
      collide(objects[i],objects[j]);
    }
  }

  shake*=Math.max(0,1-dt*6);
  flashAlpha*=0.93;

  // Render
  X.save();
  if(shake>0.3)X.translate((Math.random()-0.5)*shake*2,(Math.random()-0.5)*shake*2);

  X.fillStyle='rgba(8,8,15,.4)';
  X.fillRect(0,0,W,H);

  drawGrid();

  // Gravity field lines
  var gAlpha=0.03+Math.abs(FLIP_INTERVAL-flipTimer)/FLIP_INTERVAL*0.02;
  X.strokeStyle='rgba(255,255,255,'+gAlpha+')';
  X.lineWidth=0.5;
  var arrowDir=gravDir;
  for(var gx=30;gx<W;gx+=80){
    for(var gy=60;gy<H-30;gy+=100){
      X.beginPath();
      X.moveTo(gx,gy);
      X.lineTo(gx,gy+arrowDir*12);
      X.stroke();
      X.beginPath();
      X.moveTo(gx-3,gy+arrowDir*8);
      X.lineTo(gx,gy+arrowDir*12);
      X.lineTo(gx+3,gy+arrowDir*8);
      X.stroke();
    }
  }

  // Objects
  objects.forEach(function(o){drawObj(o);});
  X.shadowBlur=0;

  drawSparks(dt);

  // Flash overlay on flip
  if(flashAlpha>0.005){
    X.fillStyle='hsla('+flashHue+',100%,50%,'+flashAlpha+')';
    X.fillRect(0,0,W,H);
  }

  // Drag line
  if(mouseDown){
    var ddx=mouseX-dragStartX,ddy=mouseY-dragStartY;
    if(Math.sqrt(ddx*ddx+ddy*ddy)>15){
      X.strokeStyle='rgba(255,255,255,.15)';
      X.lineWidth=1;
      X.setLineDash([4,4]);
      X.beginPath();X.moveTo(dragStartX,dragStartY);X.lineTo(mouseX,mouseY);X.stroke();
      X.setLineDash([]);
      // Arrow at start
      X.fillStyle='rgba(0,255,200,.4)';
      X.beginPath();X.arc(dragStartX,dragStartY,4,0,Math.PI*2);X.fill();
    }
  }

  X.restore();

  // HUD updates
  document.getElementById('obj-count').textContent='Objects: '+objects.length;
  var arrow=document.getElementById('grav-arrow');
  arrow.textContent=gravDir>0?'▼':'▲';
  arrow.style.color=gravDir>0?'#0fc':'#f6c';
  document.getElementById('grav-timer').textContent=flipTimer.toFixed(1)+'s';
  var barPct=Math.floor(flipTimer/FLIP_INTERVAL*100);
  var barEl=document.getElementById('grav-bar');
  barEl.style.width=barPct+'%';
  barEl.style.background=gravDir>0?'#0fc':'#f6c';

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
