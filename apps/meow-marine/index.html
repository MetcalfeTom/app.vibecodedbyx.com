<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Meow-Marine · a cat fishing simulator</title>
<meta name="description" content="Cast your line. Catch real fish, mythical fish, and the occasional boot. 50+ species in the catalog.">
<meta property="og:title" content="Meow-Marine">
<meta property="og:description" content="A cozy cat-fishing game with a massive fish database. Cast, wait, reel, catalog. 50+ species across five rarity tiers.">
<meta property="og:image" content="https://image.pollinations.ai/prompt/Cozy%20pixel%20art%20cat%20fishing%20on%20a%20wooden%20dock%20at%20golden%20hour%2C%20lake%20with%20silhouetted%20fish%2C%20warm%20palette%2C%20detailed%20background%20with%20cattails%20and%20cypress%20trees?width=1200&height=630&model=flux&nologo=true&seed=4242">
<meta property="og:url" content="https://sloppy.live/meow-marine">
<meta property="og:type" content="website">
<link rel="icon" href="https://emojicdn.elk.sh/🎣">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Newsreader:ital,wght@1,400;0,500;0,700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --sky-1:    #f5d5a0;
    --sky-2:    #f0a06a;
    --sky-3:    #c47a8a;
    --sky-4:    #4a3068;
    --water-1:  #2a4870;
    --water-2:  #143058;
    --water-3:  #08182a;
    --wood:     #6a4020;
    --wood-dk:  #3a2210;
    --moss:     #4a6028;
    --paper:    #f4ece0;
    --paper-2:  #e8dcc4;
    --ink:      #1a1410;
    --ink-2:    #4a3f30;
    --ink-3:    #8a7e6a;
    --common:   #8aa0a8;
    --uncommon: #6fc7a8;
    --rare:     #6cb7e8;
    --epic:     #b870ff;
    --legendary:#ffc94a;
    --trash:    #6a5448;
  }
  *{ box-sizing: border-box; margin: 0; padding: 0; }
  html, body{ background: #08182a; color: var(--ink); height: 100vh; overflow: hidden; }
  body{
    font-family: 'Fredoka', system-ui, sans-serif;
    display: flex; flex-direction: column;
    padding: 0;
  }
  /* Depth selector tabs (under top bar) */
  .depth-tabs{
    display: flex; gap: 6px;
    padding: 8px 20px;
    background: rgba(20, 30, 50, 0.85);
    border-bottom: 2px solid rgba(255,255,255,0.06);
    overflow-x: auto;
    z-index: 4;
  }
  .depth-tabs .dt{
    background: rgba(0,0,0,0.4);
    border: 2px solid rgba(255,255,255,0.15);
    color: rgba(255,255,255,0.7);
    padding: 6px 14px;
    font: 600 12px 'Fredoka', sans-serif;
    border-radius: 999px;
    cursor: pointer;
    display: flex; align-items: center; gap: 4px;
    white-space: nowrap;
    transition: background 80ms, color 80ms;
  }
  .depth-tabs .dt:hover:not(.locked){ background: rgba(255,255,255,0.08); color: #fff; }
  .depth-tabs .dt.active{
    background: var(--sky-2); color: #fff; border-color: #fff;
    box-shadow: 0 0 12px rgba(240,160,106,0.45);
  }
  .depth-tabs .dt.locked{ opacity: 0.45; cursor: not-allowed; }
  .depth-tabs .dt.locked::after{ content: ' 🔒'; font-size: 11px; }
  .depth-tabs .dt .meow-em{ font-size: 14px; }
  .depth-tabs .dt .meow-short{ font: 9px 'JetBrains Mono', monospace; letter-spacing: 0.06em; opacity: 0.6; }
  /* Item rail (bottom-right) */
  .item-rail{
    position: absolute;
    bottom: 16px; right: 16px;
    display: flex; flex-direction: column; gap: 8px;
    z-index: 4;
  }
  .item-rail .item-btn{
    background: rgba(244, 236, 224, 0.96);
    border: 3px solid var(--ink);
    color: var(--ink);
    padding: 8px 12px;
    font: 700 18px 'Fredoka', sans-serif;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 0 4px 0 var(--ink);
    display: flex; align-items: center; gap: 6px;
    min-width: 72px;
    justify-content: center;
  }
  .item-rail .item-btn:hover{ background: #fff; }
  .item-rail .item-btn:active{ transform: translateY(3px); box-shadow: 0 1px 0 var(--ink); }
  .item-rail .item-btn:disabled{ opacity: 0.45; cursor: not-allowed; }
  .item-rail .item-btn .count{
    font: 700 12px 'JetBrains Mono', monospace;
    background: var(--sky-2);
    color: #fff;
    padding: 1px 7px;
    border-radius: 999px;
    min-width: 22px;
    text-align: center;
  }
  /* Sonar reveal effect */
  .sonar-pulse{
    position: absolute;
    border: 2px solid #66f5ff;
    border-radius: 50%;
    pointer-events: none;
    z-index: 3;
    animation: sonarPulse 1.5s ease-out forwards;
  }
  @keyframes sonarPulse{
    0%   { width: 4px; height: 4px; opacity: 0.9; }
    100% { width: 600px; height: 600px; opacity: 0; }
  }
  /* Bomb falling */
  .bomb-falling{
    position: absolute;
    font-size: 32px;
    z-index: 4;
    pointer-events: none;
    animation: bombFall 1.5s ease-in forwards;
  }
  @keyframes bombFall{
    0% { transform: translateY(0) rotate(0); }
    100% { transform: translateY(50vh) rotate(540deg); opacity: 0.6; }
  }
  /* Shop modal (reuses journal-modal style) */
  .shop-modal{
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.75);
    display: none;
    align-items: flex-start; justify-content: center;
    z-index: 11;
    padding: 30px 16px;
    overflow: auto;
  }
  .shop-modal.show{ display: flex; }
  .shop-modal .panel{
    background: var(--paper);
    border: 4px solid var(--ink);
    border-radius: 14px;
    padding: 20px 22px;
    max-width: 720px;
    width: 100%;
    box-shadow: 0 8px 0 var(--ink), 0 16px 60px rgba(0,0,0,0.6);
  }
  .shop-modal h2{
    font-family: 'Newsreader', serif;
    font-style: italic;
    font-size: 26px;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .shop-modal .sub{ color: var(--ink-3); font: italic 13px 'Newsreader', serif; margin-bottom: 12px; }
  .shop-modal h3{
    font: 600 13px 'JetBrains Mono', monospace;
    color: var(--ink-2);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin: 14px 0 8px;
    padding-top: 8px;
    border-top: 1px dashed var(--ink-3);
  }
  .shop-modal .item-grid{
    display: grid; gap: 8px;
  }
  .shop-modal .shop-row{
    display: grid;
    grid-template-columns: 50px 1fr auto;
    gap: 12px;
    align-items: center;
    padding: 10px 12px;
    background: var(--paper-2);
    border: 2px solid var(--ink);
    border-radius: 8px;
  }
  .shop-modal .shop-row.owned{ background: rgba(111,199,168,0.18); }
  .shop-modal .shop-row.locked{ opacity: 0.55; }
  .shop-modal .shop-row .em{ font-size: 32px; text-align: center; }
  .shop-modal .shop-row .name{ font: 700 15px 'Fredoka', sans-serif; color: var(--ink); }
  .shop-modal .shop-row .desc{ font: italic 12px 'Newsreader', serif; color: var(--ink-2); margin-top: 2px; }
  .shop-modal .shop-row button{
    background: var(--moss);
    border: 2px solid var(--ink);
    color: #fff;
    padding: 6px 14px;
    font: 700 12px 'Fredoka', sans-serif;
    border-radius: 6px;
    cursor: pointer;
    box-shadow: 0 3px 0 var(--ink);
    white-space: nowrap;
  }
  .shop-modal .shop-row button:active{ transform: translateY(2px); box-shadow: 0 1px 0 var(--ink); }
  .shop-modal .shop-row button:disabled{
    opacity: 0.45; cursor: not-allowed;
    background: var(--ink-3); box-shadow: 0 3px 0 var(--ink);
  }
  .shop-modal .shop-row .owned-tag{
    font: 700 11px 'JetBrains Mono', monospace;
    color: var(--moss); letter-spacing: 0.06em;
  }
  .shop-modal .close-x{
    margin-top: 14px;
    background: var(--moss);
    border: 3px solid var(--ink);
    color: #fff;
    padding: 8px 22px;
    font: 700 14px 'Fredoka', sans-serif;
    border-radius: 6px;
    cursor: pointer;
    box-shadow: 0 4px 0 var(--ink);
    width: 100%;
  }
  /* Top bar */
  .top{
    background: rgba(244, 236, 224, 0.96);
    border-bottom: 2px solid var(--wood-dk);
    padding: 10px 20px;
    display: flex; align-items: center; gap: 16px;
    flex-wrap: wrap;
    z-index: 4;
  }
  .top h1{
    font-family: 'Newsreader', serif;
    font-style: italic;
    font-size: clamp(22px, 3vw, 30px);
    color: var(--ink);
    line-height: 1;
    letter-spacing: -0.01em;
  }
  .top h1 em{
    color: var(--sky-2);
    font-weight: 700;
    font-style: italic;
  }
  .top .sub{
    color: var(--ink-3);
    font: italic 14px 'Newsreader', serif;
  }
  .top .stats{
    margin-left: auto;
    display: flex; gap: 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--ink-2);
    flex-wrap: wrap;
  }
  .top .stats b{
    color: var(--ink); font-size: 16px; margin-left: 4px;
    font-family: 'Newsreader', serif;
  }
  .top button{
    background: var(--moss);
    border: 2px solid var(--ink);
    color: var(--paper);
    padding: 6px 14px;
    font: 600 13px 'Fredoka', sans-serif;
    cursor: pointer;
    border-radius: 4px;
    box-shadow: 0 3px 0 var(--ink);
    transition: transform 80ms, box-shadow 80ms;
  }
  .top button:hover{ background: #5a7038; }
  .top button:active{ transform: translateY(2px); box-shadow: 0 1px 0 var(--ink); }
  /* Main stage */
  .stage{
    position: relative;
    flex: 1;
    overflow: hidden;
  }
  canvas#cv{
    display: block;
    width: 100%; height: 100%;
    cursor: crosshair;
    background:
      linear-gradient(180deg,
        var(--sky-1) 0%,
        var(--sky-2) 25%,
        var(--sky-3) 38%,
        var(--sky-4) 50%,
        var(--water-1) 55%,
        var(--water-2) 70%,
        var(--water-3) 100%);
  }
  /* HUD overlays */
  .hud{
    position: absolute;
    pointer-events: none;
    z-index: 3;
    font-family: 'Fredoka', sans-serif;
  }
  /* Cast power bar (bottom-center) */
  .cast-meter{
    position: absolute;
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    width: 320px;
    height: 18px;
    background: rgba(0,0,0,0.45);
    border: 2px solid #fff;
    box-shadow: 0 0 14px rgba(255,200,80,0.4);
    z-index: 3;
    display: none;
    overflow: hidden;
  }
  .cast-meter.show{ display: block; }
  .cast-meter .fill{
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #4a8a4a, #c8d04a, #f5c026, #c43d33);
    transition: width 0.06s linear;
  }
  .cast-meter .label{
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font: 600 12px 'JetBrains Mono', monospace;
    color: #fff;
    text-shadow: 1px 1px 0 #000;
    letter-spacing: 0.06em;
  }
  /* Hint bubble */
  .hint-bubble{
    position: absolute;
    background: rgba(244, 236, 224, 0.96);
    border: 2px solid var(--ink);
    border-radius: 14px;
    padding: 8px 14px;
    font: italic 14px 'Newsreader', serif;
    color: var(--ink);
    box-shadow: 0 3px 0 var(--ink);
    z-index: 3;
    pointer-events: none;
    white-space: nowrap;
    transform: translate(-50%, -100%);
  }
  .hint-bubble::after{
    content: '';
    position: absolute;
    bottom: -10px; left: 50%;
    transform: translateX(-50%);
    border: 8px solid transparent;
    border-top-color: var(--ink);
  }
  .hint-bubble.hidden{ display: none; }
  /* Bite indicator (pulsing !) */
  .bite-pop{
    position: absolute;
    font: 900 64px 'Fredoka', sans-serif;
    color: #ff2e3a;
    text-shadow: 3px 3px 0 #fff, 6px 6px 0 rgba(0,0,0,0.4);
    z-index: 5;
    pointer-events: none;
    transform: translate(-50%, -100%);
    animation: bitePulse 0.5s ease-in-out infinite alternate;
  }
  @keyframes bitePulse{
    from{ transform: translate(-50%, -100%) scale(1); }
    to  { transform: translate(-50%, -110%) scale(1.18); }
  }
  /* Reel mini-game bar */
  .reel-panel{
    position: absolute;
    bottom: 22px; left: 50%;
    transform: translateX(-50%);
    background: rgba(244, 236, 224, 0.96);
    border: 3px solid var(--ink);
    border-radius: 12px;
    padding: 14px 18px;
    z-index: 6;
    width: 380px;
    max-width: calc(100vw - 32px);
    box-shadow: 0 4px 0 var(--ink);
    display: none;
    pointer-events: auto;
  }
  .reel-panel.show{ display: block; }
  .reel-panel .title{
    font: 700 14px 'Fredoka', sans-serif;
    color: var(--ink);
    margin-bottom: 6px;
    display: flex; align-items: center; gap: 8px;
  }
  .reel-panel .title .fish-name{ color: var(--ink-3); font-weight: 400; font-style: italic; }
  .reel-panel .bar{
    height: 18px;
    background: rgba(0,0,0,0.12);
    border: 1px solid var(--ink);
    border-radius: 4px;
    position: relative;
    overflow: hidden;
    margin-bottom: 6px;
  }
  .reel-panel .bar .fill{
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #4a8a4a, #6fc7a8 60%, #c8e070);
    transition: width 0.08s linear;
  }
  .reel-panel .bar .escape{
    position: absolute; top: 0; right: 0;
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, rgba(255,46,58,0), #ff2e3a);
  }
  .reel-panel .reel-btn{
    width: 100%;
    background: var(--sky-2);
    border: 3px solid var(--ink);
    color: #fff;
    padding: 10px;
    font: 700 16px 'Fredoka', sans-serif;
    border-radius: 6px;
    cursor: pointer;
    box-shadow: 0 4px 0 var(--ink);
    margin-top: 4px;
  }
  .reel-panel .reel-btn:active{ transform: translateY(3px); box-shadow: 0 1px 0 var(--ink); }
  .reel-panel .reel-btn:disabled{ opacity: 0.5; cursor: not-allowed; }
  .reel-panel .small{ font: 11px 'JetBrains Mono', monospace; color: var(--ink-3); margin-top: 4px; text-align: center; }

  /* Catch modal */
  .catch-modal{
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.65);
    display: none; align-items: center; justify-content: center;
    z-index: 10;
    padding: 16px;
  }
  .catch-modal.show{ display: flex; }
  .catch-modal .panel{
    background: var(--paper);
    border: 4px solid var(--ink);
    border-radius: 16px;
    padding: 22px 28px;
    max-width: 440px;
    width: 100%;
    box-shadow: 0 6px 0 var(--ink), 0 14px 40px rgba(0,0,0,0.55);
    text-align: center;
    animation: catchPop 0.5s cubic-bezier(0.2,0.85,0.35,1.1);
  }
  @keyframes catchPop{
    0%   { opacity: 0; transform: scale(0.5) rotate(-8deg); }
    100% { opacity: 1; transform: scale(1) rotate(0); }
  }
  .catch-modal h2{
    font-family: 'Newsreader', serif;
    font-style: italic;
    font-size: 30px;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .catch-modal .rarity-pill{
    display: inline-block;
    padding: 4px 14px;
    border-radius: 999px;
    font: 700 11px 'JetBrains Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin: 6px 0 10px;
    border: 2px solid var(--ink);
    color: var(--ink);
  }
  .catch-modal .rarity-pill.common   { background: var(--common); }
  .catch-modal .rarity-pill.uncommon { background: var(--uncommon); }
  .catch-modal .rarity-pill.rare     { background: var(--rare); color: #fff; }
  .catch-modal .rarity-pill.epic     { background: var(--epic); color: #fff; }
  .catch-modal .rarity-pill.legendary{ background: var(--legendary); animation: legendaryGlow 0.8s ease-in-out infinite alternate; }
  .catch-modal .rarity-pill.trash    { background: var(--trash); color: var(--paper); }
  @keyframes legendaryGlow{
    from{ box-shadow: 0 0 6px rgba(255,201,74,0.6); }
    to  { box-shadow: 0 0 18px rgba(255,201,74,0.95); }
  }
  .catch-modal .fish-art{
    font-size: 90px;
    margin: 8px 0;
    filter: drop-shadow(3px 3px 0 rgba(0,0,0,0.25));
    animation: fishWiggle 1.4s ease-in-out infinite;
  }
  @keyframes fishWiggle{
    0%, 100%{ transform: rotate(-3deg); }
    50%     { transform: rotate(3deg); }
  }
  .catch-modal .desc{
    font: italic 14px/1.5 'Newsreader', serif;
    color: var(--ink-2);
    margin: 8px 0;
  }
  .catch-modal .stats{
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin: 10px 0;
    font: 13px 'JetBrains Mono', monospace;
    text-align: left;
  }
  .catch-modal .stats .stat{
    background: var(--paper-2);
    padding: 6px 10px;
    border-radius: 4px;
    border-left: 3px solid var(--sky-2);
  }
  .catch-modal .stats .stat .label{ font-size: 10px; color: var(--ink-3); display: block; }
  .catch-modal .stats .stat .v{ color: var(--ink); font-weight: 700; font-size: 14px; }
  .catch-modal .first-time{
    background: var(--legendary);
    color: var(--ink);
    padding: 4px 12px;
    font: 700 12px 'JetBrains Mono', monospace;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border: 2px solid var(--ink);
    border-radius: 4px;
    margin-top: 6px;
    display: inline-block;
  }
  .catch-modal button{
    background: var(--moss);
    border: 3px solid var(--ink);
    color: #fff;
    padding: 10px 22px;
    font: 700 14px 'Fredoka', sans-serif;
    border-radius: 6px;
    cursor: pointer;
    box-shadow: 0 4px 0 var(--ink);
    margin: 12px 6px 0;
  }
  .catch-modal button:hover{ filter: brightness(1.1); }
  .catch-modal button:active{ transform: translateY(3px); box-shadow: 0 1px 0 var(--ink); }
  .catch-modal button.release{ background: var(--ink-3); }

  /* Journal modal — fish catalog */
  .journal-modal{
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.75);
    display: none;
    align-items: flex-start; justify-content: center;
    z-index: 11;
    padding: 30px 16px;
    overflow: auto;
  }
  .journal-modal.show{ display: flex; }
  .journal-modal .panel{
    background: var(--paper);
    border: 4px solid var(--ink);
    border-radius: 14px;
    padding: 18px 22px 22px;
    max-width: 880px;
    width: 100%;
    box-shadow: 0 8px 0 var(--ink), 0 16px 60px rgba(0,0,0,0.6);
  }
  .journal-modal h2{
    font-family: 'Newsreader', serif;
    font-style: italic;
    font-size: 24px;
    color: var(--ink);
    margin-bottom: 4px;
  }
  .journal-modal .sub{
    color: var(--ink-3);
    font: italic 13px 'Newsreader', serif;
    margin-bottom: 14px;
  }
  .journal-modal .filter{
    display: flex; gap: 6px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .journal-modal .filter button{
    background: var(--paper-2);
    border: 2px solid var(--ink);
    color: var(--ink);
    padding: 4px 12px;
    font: 600 12px 'Fredoka', sans-serif;
    cursor: pointer;
    border-radius: 999px;
  }
  .journal-modal .filter button.active{ background: var(--sky-2); color: #fff; }
  .journal-modal .grid{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 10px;
    max-height: 60vh;
    overflow-y: auto;
    padding: 4px;
  }
  .journal-modal .card{
    background: var(--paper-2);
    border: 2px solid var(--ink);
    border-radius: 8px;
    padding: 8px 10px;
    text-align: center;
    position: relative;
  }
  .journal-modal .card.locked{
    background: rgba(0,0,0,0.05);
    color: var(--ink-3);
    filter: grayscale(1);
    opacity: 0.55;
  }
  .journal-modal .card .em{
    font-size: 36px;
    line-height: 1;
    margin: 4px 0;
    filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.2));
  }
  .journal-modal .card.locked .em{ color: var(--ink-3); }
  .journal-modal .card .nm{
    font: 600 13px 'Fredoka', sans-serif;
    color: var(--ink);
    line-height: 1.15;
    margin-bottom: 2px;
    word-break: break-word;
  }
  .journal-modal .card.locked .nm{ color: var(--ink-3); }
  .journal-modal .card .nm.locked-txt{ font-style: italic; }
  .journal-modal .card .meta{
    font: 10px 'JetBrains Mono', monospace;
    color: var(--ink-3);
  }
  .journal-modal .card .count{
    position: absolute;
    top: 4px; right: 6px;
    background: var(--moss);
    color: #fff;
    font: 700 10px 'JetBrains Mono', monospace;
    padding: 1px 6px;
    border-radius: 999px;
  }
  .journal-modal .card .rar-strip{
    height: 4px;
    border-radius: 3px;
    margin-top: 4px;
  }
  .journal-modal .card .rar-strip.common   { background: var(--common); }
  .journal-modal .card .rar-strip.uncommon { background: var(--uncommon); }

<div class="top">
  <h1>Meow<em>·Marine</em></h1>

<div class="depth-tabs" id="depth-tabs"></div>

</div>

const SAVE_KEY = 'meow-marine-v2';
const state = (function(){
  const def = {

    boat: 0, rod: 0, depth: 0,
    bombs: 3, sonar: 5,

    bait: 'worm',
    baits: { worm: -1, shrimp: 0, minnow: 0, star: 0 },
  };
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw){
      const loaded = JSON.parse(raw);
      Object.assign(def, loaded);
      // migrate older saves that don't have bait state yet
      if (!def.bait || !BAIT_BY_ID[def.bait]) def.bait = 'worm';
      if (!def.baits || typeof def.baits !== 'object'){
        def.baits = { worm: -1, shrimp: 0, minnow: 0, star: 0 };
      } else {
        // ensure every known bait has an entry
        for (const b of BAITS){
          if (def.baits[b.id] == null) def.baits[b.id] = (b.id === 'worm' ? -1 : 0);
        }
      }
    }
  } catch(_){}
  return def;
})();
function save(){ try{ localStorage.setItem(SAVE_KEY, JSON.stringify(state)); }catch(_){} }
/* Bait helpers — worm is infinite (-1), other baits decrement on each cast. */
function baitCount(id){ const c = state.baits[id]; return c === -1 ? Infinity : (c || 0); }
function activeBaitTier(){ return BAIT_BY_ID[state.bait] ? BAIT_BY_ID[state.bait].tier : 0; }
function consumeBait(){
  const cur = state.bait;
  if (cur === 'worm') return cur; // infinite
  if (state.baits[cur] > 0){
    state.baits[cur]--;
    if (state.baits[cur] <= 0){
      // out of this bait — auto-fall-back to worm for next cast
      state.bait = 'worm';
      setTimeout(() => flashHint('out of ' + BAIT_BY_ID[cur].name + ' — switched to 🪱 worm', 2000), 0);
    }
    return cur;
  }
  // shouldn't happen — guard
  state.bait = 'worm';
  return 'worm';
}

/* Sell value — fish.pts is the "score tier"; this scales it into actual coin payouts.
   Common 1.5×, uncommon 2×, rare 3×, epic 4×, legendary 6×, trash 1× (still pity). */
const SELL_MULT = { common: 1.5, uncommon: 2.0, rare: 3.0, epic: 4.0, legendary: 6.0, trash: 1.0 };
function sellValue(fish){
  const mul = SELL_MULT[fish.rar] || 1;
  return Math.max(1, Math.round((fish.pts || 1) * mul));
}

/* ── Canvas setup ───────────────────────────────────────── */
const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let W = 0, H = 0, DPR = 1;
function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  // clientWidth/clientHeight are READ-ONLY — read from the parent, then set
  // the canvas's own width/height attributes for the backing buffer AND its
  // CSS width/height for layout.
  const parent = cv.parentElement;
  W = parent.clientWidth  || window.innerWidth;
  H = parent.clientHeight || window.innerHeight;
  cv.width = W * DPR;
  cv.height = H * DPR;
  cv.style.width  = W + 'px';
  cv.style.height = H + 'px';
  if (!ctx) return; // headless / canvas-unavailable — bail safely
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.imageSmoothingEnabled = false;
}
window.addEventListener('resize', resize);
resize();

/* ── Game phases: idle | charging | flying | waiting | biting | reeling ── */
let phase = 'idle';
let castPower = 0; // 0-1
let castDir = 1;   // bar swing dir
let bobber = { x: 0, y: 0, vx: 0, vy: 0, restY: 0 };
/* mouse aim — used to direct the cast. Updated by mousemove + pointerdown
   over the stage. Default points toward the water area. */
const aim = { x: 0, y: 0, has: false };
let waitUntil = 0;
let biteUntil = 0;
let activeFish = null; // current fish on hook
let reelFill = 0;      // 0-1 progress
let reelEscape = 0;    // 0-1 — if reaches 1, fish escapes
let ripples = [];
let fishSchool = [];   // decorative background fish
let dockY = 0;

/* ── Build the dock & cat positions (anchored to canvas) ── */
function dockLayout(){
  // dock is on the LEFT side; water fills right + below
  const dx = 12;
  const dw = Math.max(120, W * 0.18);
  const dy = H * 0.50;
  const dh = 30;
  return { x: dx, y: dy, w: dw, h: dh,
           catX: dx + dw - 28, catY: dy - 4,
           rodTipX: dx + dw + 14, rodTipY: dy - 38 };
}

function startCharging(){
  if (phase !== 'idle') return;
  phase = 'charging';
  castPower = 0;
  castDir = 1;
  document.getElementById('cast-meter').classList.add('show');
  document.getElementById('hint').classList.add('hidden');
}
function releaseCast(){
  if (phase !== 'charging') return;
  phase = 'flying';
  document.getElementById('cast-meter').classList.remove('show');
  // launch bobber from rod tip with an arc — direction comes from the
  // current mouse aim. Power scales the maximum horizontal reach.
  const d = dockLayout();
  bobber.x = d.rodTipX;
  bobber.y = d.rodTipY;
  bobber.restY = H * 0.62;
  // Direction: from rod tip toward the aim point, clamped to the
  // forward arc (positive x → into the water on the right side of
  // the dock). If the aim is behind the rod tip, default to a
  // mild forward toss.
  const minX = d.rodTipX + 60;             // can't aim into the dock
  const maxX = W - 30;                     // off-screen cap
  const dt = 0.75;                         // approximate flight time
  let targetX = aim.has ? aim.x : (d.rodTipX + W * 0.4);
  targetX = Math.max(minX, Math.min(maxX, targetX));
  // Power gates how far you can reach (full power = full screen).
  const maxReachX = d.rodTipX + 80 + castPower * Math.min(W - d.rodTipX - 80, 700);
  if (targetX > maxReachX) targetX = maxReachX;
  // Horizontal velocity to land at targetX in dt seconds.
  bobber.vx = (targetX - d.rodTipX) / dt;
  // Vertical: enough negative vy so the apex height feels arc-y and the
  // bobber descends to restY by ≈dt. Solve y(dt) = vy*dt + 0.5*g*dt^2 = restY - rodTipY
  //   vy = ((restY - rodTipY) - 0.5*g*dt^2) / dt
  const g = 700; // matches the bobber update loop (vy += 700 * dt)
  bobber.vy = ((bobber.restY - d.rodTipY) - 0.5 * g * dt * dt) / dt;
}
function landBobber(){
  phase = 'waiting';
  ripples.push({ x: bobber.x, y: bobber.y, r: 4, alpha: 1 });
  // consume one of the active bait (worm = unlimited; otherwise -1 + auto-fallback)
  const consumed = consumeBait();
  updateItemBar();
  save();
  // better bait shortens the wait slightly (fish find it faster)
  const tb = BAIT_BY_ID[consumed] ? BAIT_BY_ID[consumed].tier : 0;
  const dur = 1800 + Math.random() * 3000 - castPower * 500 - tb * 220;
  waitUntil = performance.now() + Math.max(700, dur);
}
function triggerBite(){
  phase = 'biting';
  biteUntil = performance.now() + 1200; // 1.2s to react
  // pre-pick what fish would be caught if successfully hooked
  activeFish = pickFish();
}
function hookFish(){
  if (phase !== 'biting') return;
  phase = 'reeling';
  reelFill = 0.05;
  reelEscape = 0;
  const reelPanel = document.getElementById('reel-panel');
  reelPanel.classList.add('show');
  document.getElementById('reel-fish-hint').textContent =
    activeFish.rar === 'trash' ? 'something heavy and wet' :
    activeFish.rar === 'legendary' ? 'the rod is BENDING' :
    activeFish.rar === 'epic' ? 'something HUGE on the other end' :
    activeFish.rar === 'rare' ? 'a serious fight' : 'a steady tug';
}
function pickFish(){
  // Filter to current depth ONLY (boats gate access to higher depths)
  let pool = FISH.filter(f => f.d === state.depth);
  // ── BAIT/DEPTH GATING for epic + legendary ─────────────────
  // Epic   needs bait tier >= 2  OR depth >= 3 (Pelagic+)
  // Legend needs bait tier >= 3  OR depth >= 4 (Abyss)
  const btier = activeBaitTier();
  const d = state.depth;
  pool = pool.filter(f => {
    if (f.rar === 'legendary' && btier < 3 && d < 4) return false;
    if (f.rar === 'epic'      && btier < 2 && d < 3) return false;
    return true;
  });
  // If gating left us with nothing (shouldn't, but be safe), fall back to depth-only
  if (pool.length === 0) pool = FISH.filter(f => f.d === state.depth);
  // Rod + bait shift rarity bias
  const rod = RODS[state.rod] || RODS[0];
  const weights = pool.map(f => {
    let w = RARITY_BIAS[f.rar] || 5;
    if (rod.bonus >= 1 && f.rar === 'common') w *= 1.2;
    if (rod.bonus >= 2 && f.rar === 'rare') w *= 1.3;
    if (rod.bonus >= 3 && (f.rar === 'epic' || f.rar === 'legendary')) w *= 1.5;
    if (rod.bonus >= 4){ w *= 1.15; } // mythril: small boost across the board
    // bait bias on top of rod bias
    if (btier >= 1 && f.rar === 'uncommon')  w *= 1.25;
    if (btier >= 1 && f.rar === 'rare')      w *= 1.10;
    if (btier >= 2 && f.rar === 'rare')      w *= 1.30;
    if (btier >= 2 && f.rar === 'epic')      w *= 1.60;
    if (btier >= 3 && f.rar === 'epic')      w *= 1.25;
    if (btier >= 3 && f.rar === 'legendary') w *= 2.50;
    // tier-4 lures (Neon Squid + Pig Lung): pull the rarest catches much harder
    if (btier >= 4 && f.rar === 'epic')      w *= 1.50;
    if (btier >= 4 && f.rar === 'legendary') w *= 4.00;
    // Pig Lung is the cryptid lure — extra boost on legendary at depth 3-4
    if (state.bait === 'piglung' && f.rar === 'legendary' && d >= 3) w *= 1.6;
    // Neon Squid is the all-around top lure — extra boost on epic at any depth
    if (state.bait === 'squid' && f.rar === 'epic')                  w *= 1.35;
    // Worm gets a slight penalty against epic/legendary even when depth opens them,
    // so deep waters still reward better bait.
    if (btier === 0 && (f.rar === 'epic' || f.rar === 'legendary')) w *= 0.55;
    return w;
  });
  const total = weights.reduce((a, w) => a + w, 0);
  let r = Math.random() * total;
  for (let i = 0; i < pool.length; i++){
    r -= weights[i];
    if (r <= 0) return pool[i];
  }
  return pool[0];
}

/* ── Reeling mini-game ─────────────────────────────────── */
const reelPanel = document.getElementById('reel-panel');
const reelBtn = document.getElementById('reel-btn');
const reelFillEl = document.getElementById('reel-fill');
const reelEscapeEl = document.getElementById('reel-escape');
let reelLastClick = 0;
reelBtn.addEventListener('click', () => {
  if (phase !== 'reeling') return;
  const now = performance.now();
  const dt = (now - reelLastClick) / 1000;
  reelLastClick = now;
  // each click adds progress; spamming = faster
  reelFill += 0.05 + Math.min(0.08, dt * 0.15);
  // reduce escape a bit
  reelEscape = Math.max(0, reelEscape - 0.02);
  if (reelFill >= 1){
    completeCatch(activeFish);
  }
});
function updateReelTick(dt){
  if (phase !== 'reeling') return;
  // fish resists — escape fills automatically based on rarity
  const resistRate = activeFish.rar === 'legendary' ? 0.36 :
                     activeFish.rar === 'epic' ? 0.30 :
                     activeFish.rar === 'rare' ? 0.22 :
                     activeFish.rar === 'uncommon' ? 0.16 : 0.12;
  reelEscape += dt * resistRate * 0.5;
  // tiny dribble of fill loss between clicks (so you actually have to spam)
  reelFill -= dt * 0.18;
  reelFill = Math.max(0, Math.min(1, reelFill));
  reelEscape = Math.max(0, Math.min(1, reelEscape));
  reelFillEl.style.width = (reelFill * 100) + '%';
  reelEscapeEl.style.width = (reelEscape * 100) + '%';
  if (reelEscape >= 1){
    escapeFish();
  }
}
function completeCatch(fish){
  phase = 'caught';
  reelPanel.classList.remove('show');
  // randomize size in range
  const size = +(fish.minS + Math.random() * (fish.maxS - fish.minS)).toFixed(1);
  const isFirst = !state.caught[fish.id];
  if (!state.caught[fish.id]) state.caught[fish.id] = { count: 0, biggest: 0 };
  state.caught[fish.id].count++;
  if (size > state.caught[fish.id].biggest) state.caught[fish.id].biggest = size;
  state.totalCaught++;
  state.coins += sellValue(fish);
  if (!state.biggest || size > state.biggest.size){
    state.biggest = { name: fish.name, em: fish.em, size };
  }
  save();
  showCatchModal(fish, size, isFirst);
  updateTopStats();
}
function escapeFish(){
  phase = 'idle';
  reelPanel.classList.remove('show');
  reelFill = 0; reelEscape = 0;
  activeFish = null;
  flashHint('the line snapped — the fish got away.', 2000);
}
function flashHint(msg, ms){
  const h = document.getElementById('hint');
  h.textContent = msg;
  h.classList.remove('hidden');
  // place above dock
  const d = dockLayout();
  h.style.left = (d.rodTipX) + 'px';
  h.style.top = (d.rodTipY - 30) + 'px';
  if (flashHint._timer) clearTimeout(flashHint._timer);
  flashHint._timer = setTimeout(() => h.classList.add('hidden'), ms);
}

function showCatchModal(fish, size, isFirst){

  p.innerHTML =
    '<h2>' + (fish.rar === 'trash' ? 'a piece of trash' : 'caught!') + '</h2>'

    + '<div class="fish-art">' + fish.em + '</div>'
    + '<h2 style="margin-top:0;">' + fish.name + '</h2>'
    + '<div class="desc">' + fish.desc + '</div>'

      + '<div class="stat"><span class="label">Size</span><span class="v">' + size + ' inches</span></div>'
      + '<div class="stat"><span class="label">Habitat</span><span class="v">' + fish.hab + '</span></div>'
      + '<div class="stat"><span class="label">Earned</span><span class="v">+' + fish.pts + ' coins</span></div>'
      + '<div class="stat"><span class="label">Caught</span><span class="v">' + state.caught[fish.id].count + 'x total</span></div>'

/* ── Background fish school ─────────────────────────────── */
function spawnSchool(){
  fishSchool = [];
  // pull from the local species pool so silhouettes match what actually lives here
  const local = FISH.filter(f => f.d === state.depth);
  const RAR_SIZE = { common: 4, uncommon: 6, rare: 8, epic: 11, legendary: 14, trash: 5 };
  for (let i = 0; i < 6; i++){
    const f = local.length ? local[Math.floor(Math.random() * local.length)] : null;
    const baseSize = (f ? RAR_SIZE[f.rar] : 5) + Math.random() * 2;
    fishSchool.push({
      x: Math.random() * W,
      y: H * (0.62 + Math.random() * 0.30),
      vx: 10 + Math.random() * 18,
      dir: Math.random() > 0.5 ? 1 : -1,
      size: baseSize,
      hue: 220 + Math.random() * 40,
      flick: Math.random() * Math.PI * 2,
      glow: f ? f.rar : null,
    });
  }
}
spawnSchool();
window.addEventListener('resize', spawnSchool);

/* ── Input ──────────────────────────────────────────────── */
const stage = document.getElementById('stage');
/* Bail out of rod input if the click came from a HUD chrome element:
   item-rail buttons (bait/bomb/sonar), the reel panel, the catch modal,
   the journal, the shop, the tutorial, the depth tabs, or any <button>.
   Bug fix: previously sonar/bomb/bait clicks bubbled up to the stage
   and started a cast / advanced the rod state. */
function isHudClick(target){
  if (!target || !target.closest) return false;
  return !!(
    target.closest('.item-rail')   ||
    target.closest('.reel-panel')  ||
    target.closest('.catch-modal') ||
    target.closest('.journal-modal') ||
    target.closest('.shop-modal')  ||
    target.closest('.depth-tabs')  ||
    target.closest('.top')         ||
    target.tagName === 'BUTTON'
  );
}
// Continuously track mouse for aim preview + final cast direction.
stage.addEventListener('pointermove', e => {
  if (isHudClick(e.target)) return;
  const r = stage.getBoundingClientRect();
  aim.x = e.clientX - r.left;
  aim.y = e.clientY - r.top;
  aim.has = true;
});
stage.addEventListener('pointerleave', () => { /* keep last aim */ });
stage.addEventListener('pointerdown', e => {
  if (isHudClick(e.target)) return;
  // Update aim on click too (so touch/tap registers a target before launch).
  const r = stage.getBoundingClientRect();
  aim.x = e.clientX - r.left;
  aim.y = e.clientY - r.top;
  aim.has = true;
  if (phase === 'biting'){ hookFish(); return; }
  if (phase === 'idle') startCharging();
});
stage.addEventListener('pointerup', e => {
  if (isHudClick(e.target)) return;
  if (phase === 'charging') releaseCast();
});
// keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.code === 'Space'){
    e.preventDefault();
    if (phase === 'biting') hookFish();
    else if (phase === 'reeling') reelBtn.click();
    else if (phase === 'idle') startCharging();
  }
  if (e.key.toLowerCase() === 'r' && phase === 'charging') releaseCast();
  if (e.key.toLowerCase() === 'j') openJournal();
});

/* ── Main loop ──────────────────────────────────────────── */
let lastT = performance.now();
function frame(now){
  if (!ctx) return; // no drawing context — abort the loop quietly
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  // charge cycle (auto-swings up and down)
  if (phase === 'charging'){
    castPower += castDir * dt * 1.4;
    if (castPower >= 1){ castPower = 1; castDir = -1; }
    if (castPower <= 0){ castPower = 0; castDir = 1; }
    document.getElementById('cast-fill').style.width = (castPower * 100) + '%';
    document.getElementById('cast-label').textContent =
      castPower > 0.85 ? 'POWER!' : castPower > 0.55 ? 'far cast' : castPower > 0.25 ? 'mid cast' : 'short cast';
  }
  // flying bobber
  if (phase === 'flying'){
    bobber.x += bobber.vx * dt;
    bobber.y += bobber.vy * dt;
    bobber.vy += 700 * dt;
    if (bobber.y > bobber.restY){
      bobber.y = bobber.restY;
      bobber.vy = 0;
      bobber.vx = 0;
      landBobber();
    }
  }
  // waiting / bite check
  if (phase === 'waiting'){
    if (now >= waitUntil){
      triggerBite();
    }
  }
  if (phase === 'biting'){
    if (now > biteUntil){
      // missed
      phase = 'idle';
      activeFish = null;
      flashHint('missed it — too slow!', 1800);
    }
  }
  // ripples
  for (let i = ripples.length - 1; i >= 0; i--){
    const r = ripples[i];
    r.r += dt * 24;
    r.alpha -= dt * 1.2;
    if (r.alpha <= 0) ripples.splice(i, 1);
  }
  // school
  for (const f of fishSchool){
    f.x += f.vx * f.dir * dt;
    f.flick += dt * 8;
    if (f.x < -10) { f.dir = 1; }
    if (f.x > W + 10) { f.dir = -1; }
  }
  // reel
  updateReelTick(dt);

  draw();
  requestAnimationFrame(frame);
}

function draw(){
  ctx.clearRect(0, 0, W, H);
  // Paint a unique backdrop for the current depth (replaces the old CSS gradient).
  // Each depth has its own palette, sky/horizon, and decor; the dock stays in place.
  drawDepthBackdrop();
  // water shimmers
  drawWaterShimmers();
  // background fish school (silhouettes in water)
  for (const f of fishSchool){
    if (f.y < H * 0.55) continue; // only in water
    const wig = Math.sin(f.flick) * 1.5;
    ctx.fillStyle = 'rgba(10,20,40,0.45)';
    ctx.beginPath();
    ctx.ellipse(f.x, f.y, f.size, f.size * 0.45, 0, 0, Math.PI * 2);
    ctx.fill();
    // tail
    ctx.beginPath();
    ctx.moveTo(f.x - f.dir * f.size * 0.8, f.y);
    ctx.lineTo(f.x - f.dir * (f.size * 1.4), f.y + wig);
    ctx.lineTo(f.x - f.dir * (f.size * 1.4), f.y - wig);
    ctx.closePath();
    ctx.fill();
  }
  // ripples
  for (const r of ripples){
    ctx.strokeStyle = 'rgba(220,240,255,' + r.alpha.toFixed(2) + ')';
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.ellipse(r.x, r.y, r.r, r.r * 0.4, 0, 0, Math.PI * 2);
    ctx.stroke();
  }
  drawDistantTrees();
  // dock + cat + rod + line + bobber
  drawDockAndCat();
  // aim preview while charging — dotted arc from rod tip toward mouse
  if (phase === 'charging') drawAimArc();
}
function drawAimArc(){
  const d = dockLayout();
  // compute the same clamped target the launch will use
  const minX = d.rodTipX + 60, maxX = W - 30;
  let targetX = aim.has ? aim.x : (d.rodTipX + W * 0.4);
  targetX = Math.max(minX, Math.min(maxX, targetX));
  const maxReachX = d.rodTipX + 80 + castPower * Math.min(W - d.rodTipX - 80, 700);
  const clamped = Math.min(targetX, maxReachX);
  // simulate the same physics for ~24 dots
  const dtSim = 0.75;
  const g = 700;
  const vx = (clamped - d.rodTipX) / dtSim;
  let vy = ((H * 0.62 - d.rodTipY) - 0.5 * g * dtSim * dtSim) / dtSim;
  // tactical-red arc — bright glowing dots from rod tip to landing
  let px = d.rodTipX, py = d.rodTipY;
  // straight laser sight line first (the "designator")
  ctx.save();
  ctx.strokeStyle = 'rgba(255,30,40,0.32)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(d.rodTipX, d.rodTipY);
  ctx.lineTo(clamped, H * 0.62 - 4);
  ctx.stroke();
  ctx.restore();
  // arc dots — bright red core + soft red halo
  for (let i = 1; i <= 24; i++){
    const t = i * (dtSim / 24);
    px = d.rodTipX + vx * t;
    py = d.rodTipY + vy * t + 0.5 * g * t * t;
    if (py >= H * 0.62) break;
    // halo
    ctx.fillStyle = 'rgba(255,40,50,0.30)';
    ctx.beginPath(); ctx.arc(px, py, 4 - i * 0.06, 0, Math.PI * 2); ctx.fill();
    // core
    ctx.fillStyle = 'rgba(255,80,90,0.95)';
    ctx.beginPath(); ctx.arc(px, py, 1.8 - i * 0.04, 0, Math.PI * 2); ctx.fill();
  }
  // landing target — tactical red crosshair
  const tx = clamped, ty = H * 0.62;
  // outer ring (glow)
  ctx.strokeStyle = 'rgba(255,40,40,0.45)';
  ctx.lineWidth = 3;
  ctx.beginPath(); ctx.ellipse(tx, ty, 17, 5, 0, 0, Math.PI * 2); ctx.stroke();
  // inner ring (sharp)
  ctx.strokeStyle = 'rgba(255,60,60,0.95)';
  ctx.lineWidth = 1.4;
  ctx.beginPath(); ctx.ellipse(tx, ty, 14, 4, 0, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.ellipse(tx, ty, 6, 2, 0, 0, Math.PI * 2); ctx.stroke();
  // crosshair ticks
  ctx.strokeStyle = 'rgba(255,80,80,0.85)';
  ctx.lineWidth = 1.2;
  ctx.beginPath();
  ctx.moveTo(tx - 22, ty); ctx.lineTo(tx - 12, ty);
  ctx.moveTo(tx + 12, ty); ctx.lineTo(tx + 22, ty);
  ctx.moveTo(tx, ty - 7);  ctx.lineTo(tx, ty - 2);
  ctx.moveTo(tx, ty + 2);  ctx.lineTo(tx, ty + 7);
  ctx.stroke();
  // out-of-reach warning marker
  if (targetX > maxReachX){
    ctx.strokeStyle = 'rgba(255,30,40,1.0)';
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(targetX - 9, ty - 16); ctx.lineTo(targetX + 9, ty - 16);
    ctx.moveTo(targetX - 6, ty - 22); ctx.lineTo(targetX + 6, ty - 10);
    ctx.moveTo(targetX + 6, ty - 22); ctx.lineTo(targetX - 6, ty - 10);
    ctx.stroke();
    ctx.fillStyle = 'rgba(255,30,40,1.0)';
    ctx.font = '600 9px JetBrains Mono, monospace';
    ctx.textAlign = 'center';
    ctx.fillText('OUT OF REACH', targetX, ty - 28);
  }
}

/* Per-depth palettes + decor renderer. Painted into the canvas so it can
   change without reloading the page when state.depth changes. */
const DEPTH_BG = {
  // [sky-top, sky-bot, water-top, water-bot]
  0: { palette: ['#f5d5a0','#f0a06a','#2a4870','#143058'], name:'pond'    },
  // SHALLOWS — cold grey-cyan morning, brackish blue, low saturation
  1: { palette: ['#bcc8c8','#8da3a0','#4a7a7e','#1a3a44'], name:'shallows'},
  // REEF — vivid tropical sunset, hot pink/orange sky, saturated turquoise water
  2: { palette: ['#ff9aa8','#ff6a78','#13c0c0','#0a607a'], name:'reef'    },
  3: { palette: ['#395088','#1f3260','#0e3858','#03182c'], name:'pelagic' },
  4: { palette: ['#0a0820','#06061a','#020e1a','#000208'], name:'abyss'   },
};
function drawDepthBackdrop(){
  const d = state.depth;
  const cfg = DEPTH_BG[d] || DEPTH_BG[0];
  const [skyT, skyB, watT, watB] = cfg.palette;
  // sky band (top ~55%)
  let g = ctx.createLinearGradient(0, 0, 0, H * 0.55);
  g.addColorStop(0, skyT);
  g.addColorStop(1, skyB);
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H * 0.55);
  // water band (below)
  g = ctx.createLinearGradient(0, H * 0.55, 0, H);
  g.addColorStop(0, watT);
  g.addColorStop(1, watB);
  ctx.fillStyle = g;
  ctx.fillRect(0, H * 0.55, W, H * 0.45);
  // per-depth decor
  if (d === 0){
    // Pond / surface — warm sun + cattails + lily pads
    drawSun(W * 0.78, H * 0.18, 36, '#ffe39a', '#ffb35a');
    drawCattails();
    drawLilyPads();
  } else if (d === 1){
    // Shallows — cool morning, gulls, sandy bottom rocks, drifting kelp
    drawSun(W * 0.82, H * 0.15, 30, '#fef4d8', '#cfdfd0');
    drawGulls();
    drawSandyBottom();
  } else if (d === 2){
    // Reef — neon coral, anemones, light shafts
    drawLightShafts(3);
    drawReef();
  } else if (d === 3){
    // Pelagic — open ocean, light shafts from above, distant whale silhouette
    drawLightShafts(4);
    drawDistantWhale();
  } else if (d === 4){
    // Abyss — total dark with bioluminescent specks + an anglerfish lure glow
    drawBioFlecks();
    drawAnglerLure();
  }
}
function drawSun(cx, cy, r, inner, outer){
  const grd = ctx.createRadialGradient(cx, cy, 2, cx, cy, r * 2.5);
  grd.addColorStop(0, inner);
  grd.addColorStop(0.5, outer);
  grd.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grd;
  ctx.fillRect(cx - r * 2.5, cy - r * 2.5, r * 5, r * 5);
  ctx.fillStyle = inner;
  ctx.beginPath(); ctx.arc(cx, cy, r * 0.7, 0, Math.PI * 2); ctx.fill();
}
function drawCattails(){
  // a small clump on the right shore at the waterline
  const baseY = H * 0.55;
  const xs = [W * 0.86, W * 0.89, W * 0.92, W * 0.95];
  for (const x of xs){
    ctx.strokeStyle = '#3a5818';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x, baseY);
    ctx.lineTo(x + Math.sin(performance.now() * 0.001 + x) * 2, baseY - 56);
    ctx.stroke();
    // head
    ctx.fillStyle = '#3a2010';
    ctx.fillRect(x - 2, baseY - 64, 4, 12);
  }
}
function drawLilyPads(){
  ctx.fillStyle = 'rgba(60,108,52,0.85)';
  const pads = [
    { x: W * 0.62, r: 18 }, { x: W * 0.72, r: 12 }, { x: W * 0.88, r: 14 },
  ];
  for (const p of pads){
    ctx.beginPath();
    ctx.ellipse(p.x, H * 0.58, p.r, p.r * 0.4, 0, 0, Math.PI * 2);
    ctx.fill();
    // notch
    ctx.fillStyle = 'rgba(20,40,12,0.55)';
    ctx.beginPath();
    ctx.moveTo(p.x, H * 0.58);
    ctx.lineTo(p.x + p.r * 0.9, H * 0.575);
    ctx.lineTo(p.x + p.r * 0.6, H * 0.585);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = 'rgba(60,108,52,0.85)';
  }
}
function drawGulls(){
  ctx.strokeStyle = 'rgba(40,30,30,0.75)';
  ctx.lineWidth = 1.6;
  const t = performance.now() * 0.001;
  for (let i = 0; i < 4; i++){
    const x = W * (0.30 + i * 0.13) + Math.sin(t + i) * 6;

function drawDockAndCat(){
  const d = dockLayout();
  // dock body — wood plank look
  ctx.fillStyle = '#6a4020';
  ctx.fillRect(d.x, d.y, d.w, d.h);
  // plank seams
  ctx.fillStyle = '#3a2210';
  for (let p = 1; p < 4; p++){
    ctx.fillRect(d.x + (d.w / 4) * p - 1, d.y, 1.5, d.h);
  }
  // plank highlight
  ctx.fillStyle = 'rgba(255,255,255,0.05)';
  ctx.fillRect(d.x, d.y, d.w, 2);
  // posts under dock
  ctx.fillStyle = '#3a2210';
  ctx.fillRect(d.x + 6, d.y + d.h, 4, H - (d.y + d.h));
  ctx.fillRect(d.x + d.w - 16, d.y + d.h, 4, H - (d.y + d.h));
  // cat (sitting)
  drawCat(d.catX, d.catY);
  // fishing rod
  ctx.strokeStyle = '#3a2210';
  ctx.lineWidth = 3;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(d.catX + 8, d.catY - 6);
  ctx.lineTo(d.rodTipX, d.rodTipY);
  ctx.stroke();
  // rod handle
  ctx.strokeStyle = '#6a3018';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(d.catX + 6, d.catY - 4);
  ctx.lineTo(d.catX + 10, d.catY - 12);
  ctx.stroke();
  // fishing line + bobber
  const line = computeLine(d);
  ctx.strokeStyle = 'rgba(240,240,255,0.75)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(d.rodTipX, d.rodTipY);
  ctx.lineTo(line.x, line.y);
  ctx.stroke();

  drawBobber(line.x, line.y);

  if (phase === 'biting'){
    showBitePop(line.x, line.y - 18);
  } else {
    hideBitePop();
  }
}
function computeLine(d){
  if (phase === 'idle') return { x: d.rodTipX + 8, y: d.rodTipY + 18 };
  if (phase === 'charging') return { x: d.rodTipX + 8, y: d.rodTipY + 18 };
  if (phase === 'flying') return { x: bobber.x, y: bobber.y };
  // waiting / biting / reeling — bobber sits at landing point with a gentle bob
  const t = performance.now() * 0.004;
  const bobOff = phase === 'biting'
    ? Math.sin(t * 5) * 8 + 3
    : Math.sin(t) * 1.5;
  return { x: bobber.x, y: bobber.y + bobOff };
}
function drawBobber(x, y){
  // red top + white bottom

/* ═══ Depth tabs ════════════════════════════════════════ */
function renderDepthTabs(){
  const el = document.getElementById('depth-tabs');
  el.innerHTML = DEPTHS.map(d => {
    const locked = d.need > state.boat;
    const active = state.depth === d.id;
    return '<button type="button" class="dt' + (active ? ' active' : '') + (locked ? ' locked' : '')
      + '" data-depth="' + d.id + '">'
      + '<span class="meow-em">' + d.em + '</span> '
      + '<span>' + d.name + '</span> '
      + '<span class="meow-short">' + d.short + '</span>'
      + '</button>';
  }).join('');
  el.querySelectorAll('[data-depth]').forEach(b => {
    b.addEventListener('click', () => {
      const d = +b.dataset.depth;
      if (d > state.boat){
        flashHint('upgrade your boat in the shop 🛒 to dive deeper', 2200);
        return;
      }
      if (phase !== 'idle' && phase !== 'waiting' && phase !== 'biting'){
        flashHint('finish reeling first!', 1500);
        return;
      }
      state.depth = d;
      // reset phase to idle so the bobber retracts
      phase = 'idle';
      // re-roll the background school so silhouettes match the new locale
      spawnSchool();
      save();
      renderDepthTabs();
      flashHint('diving to ' + DEPTHS[d].name + ' ' + DEPTHS[d].em, 1800);
    });
  });
}
renderDepthTabs();

const shopModal = document.getElementById('shop-modal');
document.getElementById('btn-shop').addEventListener('click', openShop);
function openShop(){
  const p = document.getElementById('shop-panel');
  p.innerHTML =
    '<h2>🛒 The Dockside Shop</h2>'
    + '<div class="sub">spend coins on boats, rods, and items · you have <b>' + state.coins + ' coins</b></div>'

    + '<div class="item-grid">' + BOATS.map((b, i) => shopRow(b, 'boat', i, b.tier <= state.boat)).join('') + '</div>'
    + '<h3>🎣 Rods <span style="float:right; font-weight:400; text-transform:none; letter-spacing:0;">(catch-rate bonuses)</span></h3>'
    + '<div class="item-grid">' + RODS.map((r, i) => shopRow(r, 'rod', i, r.tier <= state.rod)).join('') + '</div>'
    + '<h3>🪱 Bait <span style="float:right; font-weight:400; text-transform:none; letter-spacing:0;">(gates epic/legendary)</span></h3>'
    + '<div class="item-grid">' + BAITS.map(b => baitRow(b)).join('') + '</div>'
    + '<h3>🧪 Items <span style="float:right; font-weight:400; text-transform:none; letter-spacing:0;">(consumable)</span></h3>'
    + '<div class="item-grid">' + ITEMS.map(it => itemRow(it)).join('') + '</div>'
    + '<button type="button" class="close-x" id="shop-close">CLOSE</button>';
  // wire buttons
  p.querySelectorAll('[data-buy]').forEach(b => {
    b.addEventListener('click', () => buy(b.dataset.kind, b.dataset.buy));
  });
  document.getElementById('shop-close').addEventListener('click', () => shopModal.classList.remove('show'));
  shopModal.classList.add('show');
}
function shopRow(entry, kind, idx, owned){
  const lock = (kind === 'boat' && idx > state.boat + 1) || (kind === 'rod' && idx > state.rod + 1);
  const canBuy = !owned && !lock && state.coins >= entry.cost;
  return '<div class="shop-row ' + (owned ? 'owned' : '') + ' ' + (lock ? 'locked' : '') + '">'
    + '<div class="em">' + entry.em + '</div>'
    + '<div>'
      + '<div class="name">' + entry.name + ' <small style="color:var(--ink-3);">· tier ' + entry.tier + '</small></div>'
      + '<div class="desc">' + entry.desc + '</div>'
    + '</div>'
    + (owned
        ? '<div class="owned-tag">✓ OWNED</div>'
        : lock
          ? '<div class="owned-tag" style="color:var(--ink-3);">🔒 LOCKED</div>'
          : '<button type="button" data-buy="' + idx + '" data-kind="' + kind + '"'
              + (canBuy ? '' : ' disabled')
              + '>🪙 ' + entry.cost + '</button>'
      )
    + '</div>';
}
function itemRow(it){
  const canBuy = state.coins >= it.cost;
  const owned = it.id === 'bomb' ? state.bombs : state.sonar;
  return '<div class="shop-row">'
    + '<div class="em">' + it.em + '</div>'
    + '<div>'
      + '<div class="name">' + it.name + '  <small style="color:var(--ink-3);">· you have ' + owned + '</small></div>'
      + '<div class="desc">' + it.desc + '</div>'
    + '</div>'
    + '<button type="button" data-buy="' + it.id + '" data-kind="item"'
      + (canBuy ? '' : ' disabled')
      + '>🪙 ' + it.cost + '</button>'
    + '</div>';
}
function baitRow(b){
  const have = baitCount(b.id);
  const haveTxt = (have === Infinity ? '∞' : have);
  const totalCost = b.cost * b.bundle;
  const canBuy = b.id !== 'worm' && state.coins >= totalCost;
  return '<div class="shop-row ' + (state.bait === b.id ? 'owned' : '') + '">'
    + '<div class="em">' + b.em + '</div>'
    + '<div>'
      + '<div class="name">' + b.name + ' <small style="color:var(--ink-3);">· tier ' + b.tier + ' · you have ' + haveTxt + '</small></div>'
      + '<div class="desc">' + b.desc + '</div>'
    + '</div>'
    + (b.id === 'worm'
        ? '<div class="owned-tag">∞ FREE</div>'
        : '<button type="button" data-buy="' + b.id + '" data-kind="bait"'
          + (canBuy ? '' : ' disabled')
          + ' title="buy ' + b.bundle + '">🪙 ' + totalCost + ' / ' + b.bundle + '</button>'
      )
    + '</div>';
}
function buy(kind, key){
  if (kind === 'boat'){
    const tier = +key;
    const b = BOATS[tier];
    if (state.coins < b.cost){ return; }
    if (tier > state.boat + 1){ return; }
    state.coins -= b.cost;
    state.boat = Math.max(state.boat, tier);
    flashHint('🛥️ unlocked: ' + b.name, 1800);
  } else if (kind === 'rod'){
    const tier = +key;
    const r = RODS[tier];
    if (state.coins < r.cost) return;
    if (tier > state.rod + 1) return;
    state.coins -= r.cost;
    state.rod = Math.max(state.rod, tier);
    flashHint('🎣 equipped: ' + r.name, 1800);
  } else if (kind === 'item'){
    const it = ITEMS.find(i => i.id === key);
    if (!it || state.coins < it.cost) return;
    state.coins -= it.cost;
    if (key === 'bomb') state.bombs++;
    if (key === 'sonar') state.sonar++;
  } else if (kind === 'bait'){
    const b = BAIT_BY_ID[key];
    if (!b || b.id === 'worm') return;
    const tcost = b.cost * b.bundle;
    if (state.coins < tcost) return;
    state.coins -= tcost;
    state.baits[b.id] = (state.baits[b.id] || 0) + b.bundle;
    flashHint('🎣 +' + b.bundle + ' ' + b.name + ' bait', 1600);
  }
  save();
  updateTopStats();
  updateItemBar();
  renderDepthTabs();
  openShop(); // refresh
}
shopModal.addEventListener('click', e => {
  if (e.target === shopModal) shopModal.classList.remove('show');
});

    body: '<b>Garden Worm</b> (free, infinite) catches commons. <b>Shrimp</b>/<b>Minnow</b>/<b>Star Bait</b>/<b>Neon Squid</b>/<b>Pig Lung</b> climb the tiers. <b>Epic</b> fish need tier ≥ 2 or depth ≥ 3. <b>Legendary</b> need tier ≥ 3 or depth ≥ 4. Better bait = bigger fish. Each cast eats one (worm is free).' },
  { em: '📡', title: 'Sonar & bombs',
    body: '<b>📡 Sonar</b> is a visual radar — pulses out, reveals every fish silhouette in the water for 30s. <b>It does NOT drop your line</b> and doesn\'t affect bites. <b>💣 Fishing Bomb</b> auto-catches 2-4 fish from the current depth (a brute-force tool). Both are consumable; restock at the shop.' },
  { em: '🛒', title: 'Shop, coins, and the cat',
    body: 'Catches pay coins (scaled by rarity — legendaries pay <b>6×</b> their points). Spend coins on <b>boats</b> (unlock depth), <b>rods</b> (catch-rate bonuses), <b>bait</b>, and <b>items</b>. The cat watches silently. Good luck out there.' },
];
const tutModal = document.getElementById('tut-modal');
const TUT_KEY = 'meow-marine-tut-v2';
let tutIdx = 0;
function openTutorial(){
  tutIdx = 0;
  renderTutorial();
  tutModal.classList.add('show');
}
function closeTutorial(){
  tutModal.classList.remove('show');
  try { localStorage.setItem(TUT_KEY, '1'); } catch(_){}
}
function renderTutorial(){
  const slide = TUTORIAL[tutIdx];
  const p = document.getElementById('tut-panel');
  const dots = TUTORIAL.map((_, i) =>
    '<span style="display:inline-block; width:8px; height:8px; border-radius:50%; margin:0 3px; background:' +
    (i === tutIdx ? 'var(--sky-2)' : 'rgba(180,160,140,0.45)') + ';"></span>'
  ).join('');
  const isLast = tutIdx === TUTORIAL.length - 1;
  p.innerHTML =
    '<h2>' + slide.em + ' ' + slide.title + '</h2>'
    + '<div class="sub" style="font-size: 15px; line-height: 1.6;">' + slide.body + '</div>'
    + '<div style="text-align:center; margin: 18px 0 8px;">' + dots + '</div>'
    + '<div style="display:flex; gap:8px; justify-content: flex-end; margin-top: 4px;">'
    +   (tutIdx > 0 ? '<button type="button" id="tut-prev" style="background: var(--paper-2); border: 2px solid var(--ink); padding: 8px 16px; font: 700 12px Fredoka, sans-serif; cursor: pointer; border-radius: 6px;">← back</button>' : '')
    +   '<button type="button" id="tut-skip" style="background: transparent; border: 2px dashed var(--ink-3); color: var(--ink-3); padding: 8px 16px; font: 600 12px Fredoka, sans-serif; cursor: pointer; border-radius: 6px;">skip</button>'
    +   '<button type="button" id="tut-next" style="background: var(--moss); border: 2px solid var(--ink); padding: 8px 18px; font: 700 12px Fredoka, sans-serif; color: var(--paper); cursor: pointer; border-radius: 6px; box-shadow: 0 3px 0 var(--ink);">' + (isLast ? 'start fishing 🎣' : 'next →') + '</button>'
    + '</div>';
  const next = document.getElementById('tut-next');
  if (next) next.addEventListener('click', () => {
    if (isLast) closeTutorial();
    else { tutIdx++; renderTutorial(); }
  });
  const skip = document.getElementById('tut-skip');
  if (skip) skip.addEventListener('click', closeTutorial);
  const prev = document.getElementById('tut-prev');
  if (prev) prev.addEventListener('click', () => { tutIdx--; renderTutorial(); });
}
tutModal.addEventListener('click', e => { if (e.target === tutModal) closeTutorial(); });
document.getElementById('btn-tutorial').addEventListener('click', openTutorial);
// auto-show on first visit
try {
  if (!localStorage.getItem(TUT_KEY)) setTimeout(openTutorial, 400);
} catch(_){}

/* ═══ Ambient ocean music (synth, persistent) ════════════
   Slow chord drone (Cmaj9 → Am → Fmaj7 → G) on triangle voices
   through a long reverb, plus randomly-scheduled bell tones from a
   pentatonic scale. Muted by default; click the 🎵 button to start.
   Starts on first user interaction (browser autoplay policy). */
const MUSIC_KEY = 'meow-marine-music-v1';
const music = {
  ctx: null,
  on: false,
  master: null,
  voices: [],
  bellTimer: null,
  chordTimer: null,
  chordIdx: 0,
};
function ensureMusicCtx(){
  if (music.ctx) return music.ctx;
  try {
    music.ctx = new (window.AudioContext || window.webkitAudioContext)();
  } catch(_){ music.ctx = null; }
  return music.ctx;
}
function startMusic(){
  if (music.on) return;
  const a = ensureMusicCtx();
  if (!a) return;
  if (a.state === 'suspended') a.resume();
  music.on = true;
  // master gain — gentle fade in
  music.master = a.createGain();
  music.master.gain.value = 0;
  music.master.gain.linearRampToValueAtTime(0.32, a.currentTime + 2.4);
  // reverb via random-noise impulse
  const conv = a.createConvolver();
  const len = Math.floor(a.sampleRate * 3.6);
  const imp = a.createBuffer(2, len, a.sampleRate);
  for (let ch = 0; ch < 2; ch++){
    const d = imp.getChannelData(ch);
    for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.0);
  }
  conv.buffer = imp;
  const dry = a.createGain(); dry.gain.value = 0.45;
  const wet = a.createGain(); wet.gain.value = 0.55;
  // 4 oscillator voices for the chord pad
  const pad = a.createGain(); pad.gain.value = 0;
  for (let i = 0; i < 4; i++){
    const o = a.createOscillator();
    o.type = i % 2 === 0 ? 'sine' : 'triangle';
    o.frequency.value = 220;
    const g = a.createGain(); g.gain.value = 0;
    const v = a.createOscillator(); // vibrato
    v.frequency.value = 0.11 + Math.random() * 0.08;
    const vg = a.createGain(); vg.gain.value = 0.7 + Math.random() * 0.5;
    v.connect(vg).connect(o.frequency);
    v.start();
    o.connect(g).connect(pad);
    o.start();
    music.voices.push({ osc: o, gain: g });
  }
  pad.connect(dry).connect(music.master);
  pad.connect(conv).connect(wet).connect(music.master);
  music.master.connect(a.destination);
  // chord progression — Cmaj9, Am7, Fmaj7, G6 (warm + ocean-y)
  const CHORDS = [
    [130.81, 196, 246.94, 329.63],  // C3, G3, B3, E4 — Cmaj7
    [110.00, 164.81, 220.00, 261.63],// A2, E3, A3, C4 — Am7
    [87.31,  174.61, 220.00, 261.63],// F2, F3, A3, C4 — Fmaj7
    [98.00,  146.83, 220.00, 293.66],// G2, D3, A3, D4 — G9
  ];
  function setChord(idx){
    music.chordIdx = idx;
    const c = CHORDS[idx % CHORDS.length];
    const now = music.ctx.currentTime;
    for (let i = 0; i < music.voices.length; i++){
      const v = music.voices[i];
      v.osc.frequency.cancelScheduledValues(now);
      v.osc.frequency.exponentialRampToValueAtTime(c[i % c.length], now + 5.5);
      v.gain.gain.cancelScheduledValues(now);
      v.gain.gain.linearRampToValueAtTime(0.18, now + 2);
    }
  }
  setChord(0);
  music.chordTimer = setInterval(() => {
    if (!music.on) return;
    setChord(music.chordIdx + 1);
  }, 11000 + Math.random() * 4000);
  // sparse bell tones from a C major pentatonic — 1 per ~8-18s
  const BELLS = [523.25, 659.25, 783.99, 1046.5, 1318.5]; // C5 E5 G5 C6 E6
  function bell(){
    if (!music.on) return;
    const a2 = music.ctx;
    const f = BELLS[Math.floor(Math.random() * BELLS.length)];
    const o = a2.createOscillator(), g = a2.createGain();
    o.type = 'sine';
    o.frequency.value = f;
    g.gain.setValueAtTime(0, a2.currentTime);
    g.gain.linearRampToValueAtTime(0.05, a2.currentTime + 0.05);
    g.gain.exponentialRampToValueAtTime(0.0001, a2.currentTime + 1.4);
    // route bell through reverb too
    o.connect(g).connect(conv);
    o.start(); o.stop(a2.currentTime + 1.5);
    music.bellTimer = setTimeout(bell, 8000 + Math.random() * 10000);
  }
  music.bellTimer = setTimeout(bell, 4000 + Math.random() * 4000);
  try { localStorage.setItem(MUSIC_KEY, '1'); } catch(_){}
  refreshMusicBtn();
}
function stopMusic(){
  if (!music.on) return;
  music.on = false;
  if (music.master && music.ctx){
    music.master.gain.linearRampToValueAtTime(0, music.ctx.currentTime + 0.6);
  }
  if (music.chordTimer){ clearInterval(music.chordTimer); music.chordTimer = null; }
  if (music.bellTimer){ clearTimeout(music.bellTimer); music.bellTimer = null; }
  setTimeout(() => {
    try { music.voices.forEach(v => v.osc.stop()); } catch(_){}
    music.voices = [];
  }, 700);
  try { localStorage.setItem(MUSIC_KEY, '0'); } catch(_){}
  refreshMusicBtn();
}
function refreshMusicBtn(){
  const b = document.getElementById('btn-music');
  if (!b) return;
  b.textContent = music.on ? '🎵 on' : '🎵';
  b.style.background = music.on ? 'rgba(111,199,168,0.45)' : '';
}
document.getElementById('btn-music').addEventListener('click', () => {
  if (music.on) stopMusic(); else startMusic();
});
// auto-resume if the player had it on last visit (browser will still
// require a user gesture; this just remembers the preference)
try {
  if (localStorage.getItem(MUSIC_KEY) === '1'){
    const oneShot = () => {
      startMusic();
      window.removeEventListener('pointerdown', oneShot);
      window.removeEventListener('keydown', oneShot);
    };
    window.addEventListener('pointerdown', oneShot, { once: false });
    window.addEventListener('keydown', oneShot, { once: false });
  }
} catch(_){}

/* ═══ Bomb mechanic ═════════════════════════════════════ */
const bombBtn = document.getElementById('btn-bomb');
const sonarBtn = document.getElementById('btn-sonar');
bombBtn.addEventListener('click', () => {
  if (state.bombs <= 0){ flashHint('out of bombs — buy more in the shop', 1600); return; }
  if (phase !== 'idle' && phase !== 'waiting'){ flashHint('finish your current cast first', 1500); return; }
  state.bombs--;
  save(); updateItemBar();
  dropBomb();
});
function dropBomb(){
  // visual: a bomb drops from above middle of canvas
  const stage = document.getElementById('stage');
  const x = W * 0.5 + (Math.random() - 0.5) * 100;
  const el = document.createElement('div');
  el.className = 'bomb-falling';
  el.textContent = '💣';
  el.style.left = x + 'px';
  el.style.top = (H * 0.30) + 'px';
  stage.appendChild(el);
  setTimeout(() => {
    el.remove();
    // boom!
    explodeBomb(x, H * 0.70);
  }, 900);
}
function explodeBomb(x, y){
  // bomb catches 2-4 fish from the current depth
  const count = 2 + Math.floor(Math.random() * 3);
  for (let i = 0; i < 6; i++){
    ripples.push({ x: x + (Math.random() - 0.5) * 50, y: y, r: 6 + Math.random() * 20, alpha: 1 });
  }
  // multi-catch reveal — show fish names quickly via flash hint
  const caughtBatch = [];
  for (let i = 0; i < count; i++){
    const fish = pickFish();
    const size = +(fish.minS + Math.random() * (fish.maxS - fish.minS)).toFixed(1);
    if (!state.caught[fish.id]) state.caught[fish.id] = { count: 0, biggest: 0 };
    state.caught[fish.id].count++;
    if (size > state.caught[fish.id].biggest) state.caught[fish.id].biggest = size;
    state.totalCaught++;
    state.coins += sellValue(fish);
    if (!state.biggest || size > state.biggest.size){
      state.biggest = { name: fish.name, em: fish.em, size };
    }
    caughtBatch.push(fish.em + ' ' + fish.name);
  }
  save();
  updateTopStats();
  flashHint('💥 BOOM · caught: ' + caughtBatch.join(' · '), 3500);
}

sonarBtn.addEventListener('click', () => {
  if (state.sonar <= 0){ flashHint('no sonar pings left — buy more in the shop', 1600); return; }
  state.sonar--;
  save(); updateItemBar();
  pingSonar();
});
function pingSonar(){
  const stage = document.getElementById('stage');
  const pulse = document.createElement('div');
  pulse.className = 'sonar-pulse';
  // Origin: from the bobber if we have a line out (waiting/biting/reeling),
  // else from the boat. Either way this is purely visual radar — it does NOT
  // drop the line, change phase, advance the bite timer, or consume bait.
  let ox, oy;
  const lineOut = (phase === 'waiting' || phase === 'biting' || phase === 'reeling' || phase === 'flying');
  if (lineOut){
    ox = bobber.x - 4;
    oy = bobber.y - 4;
  } else {
    const dl = dockLayout();
    ox = dl.x + dl.w + 4;
    oy = dl.y - 6;
  }
  pulse.style.left = ox + 'px';
  pulse.style.top  = oy + 'px';
  stage.appendChild(pulse);
  state.sonarUntil = performance.now() + 30000;
  setTimeout(() => pulse.remove(), 1500);
  flashHint('📡 sonar · fish revealed for 30s (line not affected)', 1500);
  // spawn extra "ghost fish" for the sonar reveal — but DON'T use pickFish (which
  // would respect bait gating + bias and feel like rolling for the next bite).
  // Sonar should just show what's swimming around right now: a wider sample.
  const visiblePool = FISH.filter(f => f.d === state.depth);
  for (let i = 0; i < 7; i++){
    const f = visiblePool[Math.floor(Math.random() * visiblePool.length)];
    if (!f) continue;
    fishSchool.push({
      x: Math.random() * W,
      y: H * (0.60 + Math.random() * 0.30),
      vx: 10 + Math.random() * 16,
      dir: Math.random() > 0.5 ? 1 : -1,
      size: 6 + Math.random() * 6,
      hue: 200,
      flick: Math.random() * Math.PI * 2,
      glow: f.rar, // rarity-colored
      revealUntil: state.sonarUntil,
    });
  }
}

function updateItemBar(){
  document.getElementById('cnt-bomb').textContent = state.bombs;
  document.getElementById('cnt-sonar').textContent = state.sonar;
  bombBtn.disabled = state.bombs <= 0;
  sonarBtn.disabled = state.sonar <= 0;
  // bait display: active bait icon + remaining count (∞ for worm)
  const b = BAIT_BY_ID[state.bait] || BAIT_BY_ID.worm;
  const cntEl = document.getElementById('bait-cnt');
  const emEl  = document.getElementById('bait-em');
  const nmEl  = document.getElementById('bait-name');
  if (emEl) emEl.textContent = b.em;
  if (nmEl) nmEl.textContent = b.name.split(' ')[0].toLowerCase();
  if (cntEl){
    const c = baitCount(b.id);
    cntEl.textContent = (c === Infinity ? '∞' : c);
  }
  const btn = document.getElementById('btn-bait');
  if (btn){ btn.title = 'active bait: ' + b.name + ' · click to switch'; }
}
// Wire the bait-cycle button: click cycles through baits you actually own (or worm).
const _baitBtn = document.getElementById('btn-bait');
if (_baitBtn){
  _baitBtn.addEventListener('click', () => {
    // build list of baits you have any of (worm always counts)
    const avail = BAITS.filter(b => b.id === 'worm' || baitCount(b.id) > 0);
    let idx = avail.findIndex(b => b.id === state.bait);
    if (idx < 0) idx = 0;
    const next = avail[(idx + 1) % avail.length];
    state.bait = next.id;
    save(); updateItemBar();
    flashHint('🎣 active bait: ' + next.em + ' ' + next.name, 1400);
  });
}
updateItemBar();

// patch the school renderer to color glowing fish during sonar
// (overrides the default draw of background fish — we add an outline color)
const _origDraw = draw;
draw = function(){
  _origDraw();
  // overlay: if sonar is active, render rarity-colored auras around school fish
  const now = performance.now();
  for (const f of fishSchool){
    if (!f.revealUntil || now > f.revealUntil) continue;
    const color = (
      f.glow === 'legendary' ? '#ffc94a' :
      f.glow === 'epic'      ? '#b870ff' :
      f.glow === 'rare'      ? '#6cb7e8' :
      f.glow === 'uncommon'  ? '#6fc7a8' :
      f.glow === 'trash'     ? '#6a5448' : '#8aa0a8');
    ctx.strokeStyle = color;
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.ellipse(f.x, f.y, f.size + 3, f.size * 0.65 + 1, 0, 0, Math.PI * 2);
    ctx.stroke();
  }
  // when sonar expires, prune revealed school
  if (now > state.sonarUntil){
    fishSchool = fishSchool.filter(f => !f.revealUntil);
    if (fishSchool.length < 5) spawnSchool();
  }
};

/* ── Init ───────────────────────────────────────────────── */
requestAnimationFrame(frame);
</script>
