<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Gravity Goo</title>
<meta name="description" content="A neon physics sandbox. Drag the black holes around and watch glowing goo get sucked in.">
<meta property="og:title" content="Gravity Goo">
<meta property="og:description" content="A neon physics sandbox. Drag the black holes around and watch glowing goo get sucked in.">
<meta property="og:url" content="https://sloppy.live/gravity-goo">
<meta property="og:image" content="https://image.pollinations.ai/prompt/Neon%20glowing%20gooey%20cyan%20magenta%20lime%20particles%20being%20pulled%20into%20a%20black%20hole%20with%20an%20accretion%20disk%2C%20metaball%20physics%2C%20deep%20void%20background%2C%20vaporwave%20aesthetic?width=1200&height=630&model=flux&nologo=true&seed=8181">
<link rel="icon" href="https://emojicdn.elk.sh/%E2%9A%AB">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=Syne+Mono&family=Space+Mono:wght@400;700&family=Cormorant+Garamond:ital,wght@1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#050010;
    --void-2:#0a0420;
    --cyan:#5ec2ff;
    --magenta:#ff5ea1;
    --lime:#9bff5e;
    --amber:#ffb15e;
    --plum:#a86bff;
    --ink-3:#7a6a90;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html{ font-size:100%; }
  html, body{
    width:100%; height:100dvh;
    background:var(--void);
    color:#fff;
    font-family:'Space Mono', monospace;
    overflow:hidden;
    touch-action:none;
  }
  body{
    background:
      radial-gradient(circle at 20% 30%, rgba(94,194,255,0.10), transparent 45%),
      radial-gradient(circle at 80% 70%, rgba(255,94,161,0.10), transparent 45%),
      radial-gradient(circle at 50% 50%, rgba(168,107,255,0.06), transparent 65%),
      var(--void);
  }

  /* ── Stage holds the two stacked canvases ── */
  #stage{
    position:fixed;
    inset:0;
    cursor: grab;
  }
  #stage.dragging{ cursor: grabbing; }
  canvas{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    display:block;
  }
  /* The goo layer gets the metaball treatment: heavy blur + extreme
     contrast collapses overlapping radial gradients into hard goo blobs */
  #goo{
    filter: blur(10px) contrast(28) saturate(1.5) brightness(1.08);
    mix-blend-mode: screen;
  }
  /* scene layer is below goo; overlay is above for HUD ring effects */
  #scene{ z-index:1; }
  #goo  { z-index:2; }
  #fx   { z-index:3; }

  /* ── HUD ── */
  .masthead{
    position:fixed;
    top:0; left:0; right:0;
    padding:0.9rem 1.1rem 0.5rem;
    z-index:10;
    pointer-events:none;
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:1rem;
  }
  h1{
    font-family:'Major Mono Display', monospace;
    font-weight:400;
    font-size:clamp(1.5rem, 3vw, 2.4rem);
    letter-spacing:0.12em;
    line-height:1;
    color:#fff;
    text-shadow: 0 0 18px rgba(94,194,255,0.55), 0 0 36px rgba(168,107,255,0.35);
  }
  h1 .dot{ color:var(--magenta); }
  .tagline{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-weight:300;
    margin-top:0.3rem;
    font-size:0.95rem;
    color:rgba(220,210,255,0.7);
    max-width:30ch;
  }
  .hud-right{
    text-align:right;
    font-family:'Syne Mono', monospace;
    font-size:0.78rem;
    color:rgba(220,210,255,0.85);
    line-height:1.5;
  }
  .hud-right .v{ color:var(--cyan); }
  .hud-right .v.mag{ color:var(--magenta); }

  /* ── Bottom toolbar ── */
  .toolbar{
    position:fixed;
    bottom:1rem; left:50%;
    transform:translateX(-50%);
    z-index:10;
    background: rgba(10,4,32, 0.75);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(168,107,255,0.35);
    border-radius: 99px;
    padding:0.55rem 0.7rem;
    display:flex;
    align-items:center;
    gap:0.45rem;
    box-shadow: 0 6px 30px rgba(94,32,140,0.35);
    max-width: calc(100vw - 1.5rem);
    flex-wrap:wrap;
    justify-content:center;
  }
  .pill{
    background:transparent;
    color:#fff;
    border:1px solid rgba(168,107,255,0.45);
    border-radius:99px;
    padding:0.5rem 0.9rem;
    font-family:'Syne Mono', monospace;
    font-size:0.8rem;
    letter-spacing:0.05em;
    cursor:pointer;
    transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
    min-height: 2.5rem;
  }
  .pill:hover{ background: rgba(168,107,255,0.18); border-color: var(--plum); }
  .pill:focus-visible{ outline: 2px solid var(--plum); outline-offset: 2px; }
  .pill:active{ transform: scale(0.96); }
  .pill[aria-pressed="true"]{
    background: rgba(168,107,255,0.32);
    border-color: var(--magenta);
    color: var(--magenta);
  }
  .pill.primary{
    background: linear-gradient(135deg, rgba(255,94,161,0.25), rgba(94,194,255,0.25));
    border-color: var(--magenta);
    color: #fff;
    text-shadow: 0 0 10px rgba(255,94,161,0.6);
    font-weight:700;
  }
  .pill.primary:hover{
    background: linear-gradient(135deg, rgba(255,94,161,0.45), rgba(94,194,255,0.45));
  }
  .toolbar .sep{
    width:1px;
    height:1.4rem;
    background: rgba(168,107,255,0.25);
    margin: 0 0.15rem;
  }
  .slider-wrap{
    display:flex;
    align-items:center;
    gap:0.4rem;
    color: rgba(220,210,255,0.8);
    font-family:'Syne Mono', monospace;
    font-size:0.72rem;
    letter-spacing:0.08em;
  }
  input[type="range"]{
    -webkit-appearance:none;
    appearance:none;
    width:84px;
    height:4px;
    background: rgba(168,107,255,0.25);
    border-radius:99px;
    outline:none;
  }
  input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:14px; height:14px;
    background: var(--magenta);
    border-radius:50%;
    cursor:pointer;
    box-shadow: 0 0 10px rgba(255,94,161,0.6);
  }
  input[type="range"]::-moz-range-thumb{
    width:14px; height:14px;
    background: var(--magenta);
    border-radius:50%;
    cursor:pointer;
    border:none;
    box-shadow: 0 0 10px rgba(255,94,161,0.6);
  }

  /* ── Help hint that fades after first interaction ── */
  .hint{
    position:fixed;
    bottom:5.2rem; left:50%;
    transform:translateX(-50%);
    z-index:9;
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:1.05rem;
    color: rgba(220,210,255,0.62);
    text-align:center;
    pointer-events:none;
    transition: opacity 0.6s ease;
    max-width: 90vw;
  }
  .hint.hidden{ opacity:0; }

  @media (max-width: 640px){
    h1{ font-size:1.4rem; }
    .tagline{ font-size:0.85rem; }
    .hud-right{ font-size:0.7rem; }
    .pill{ padding:0.45rem 0.7rem; font-size:0.72rem; }
    input[type="range"]{ width:64px; }
  }
  @media (prefers-reduced-motion: reduce){
    .pill, .pill:active{ transform: none !important; transition: none !important; }
  }
</style>
</head>
<body>
<main id="stage" role="application" aria-label="Gravity Goo — interactive physics sandbox">
  <canvas id="scene" aria-hidden="true"></canvas>
  <canvas id="goo"   aria-hidden="true"></canvas>
  <canvas id="fx"    aria-hidden="true"></canvas>

  <div class="masthead">
    <div>
      <h1>gravity<span class="dot">·</span>goo</h1>
      <p class="tagline">drag the black holes · click empty space to spawn another · the goo does the rest</p>
    </div>
    <div class="hud-right" role="status" aria-live="polite" aria-atomic="true">
      <div><span class="v" id="hud-goo">0</span> goo</div>
      <div><span class="v mag" id="hud-holes">1</span> ⚫ holes</div>
      <div><span class="v" id="hud-consumed">0</span> consumed</div>
    </div>
  </div>

  <p class="hint" id="hint">tap or drag a black hole · click empty space to spawn one · space = burst</p>

  <div class="toolbar" role="toolbar" aria-label="Gravity Goo controls">
    <button class="pill primary" id="btn-burst" type="button" title="Burst — space">✨ Burst</button>
    <button class="pill" id="btn-reset" type="button" title="Reset scene — R">↻ Reset</button>
    <button class="pill" id="btn-clear-holes" type="button" title="Remove all black holes — C">⚫ Clear holes</button>
    <span class="sep" aria-hidden="true"></span>
    <button class="pill" id="btn-rainbow" type="button" aria-pressed="true" title="Toggle rainbow goo">🌈 Rainbow</button>
    <span class="sep" aria-hidden="true"></span>
    <div class="slider-wrap">
      <label for="slider-goo">GOO</label>
      <input type="range" id="slider-goo" min="200" max="2000" value="900" aria-label="Goo particle count">
      <span id="slider-goo-val" aria-hidden="true">900</span>
    </div>
    <div class="slider-wrap">
      <label for="slider-grav">G</label>
      <input type="range" id="slider-grav" min="40" max="220" value="120" aria-label="Gravity strength">
      <span id="slider-grav-val" aria-hidden="true">120</span>
    </div>
    <div class="slider-wrap">
      <label for="slider-trail">TRAIL</label>
      <input type="range" id="slider-trail" min="2" max="40" value="14" aria-label="Trail length (low = long)">
    </div>
  </div>
</main>

<script>
/* ════════════════════════════════════════════════════════════
   GRAVITY · GOO — neon physics sandbox with draggable black holes
   ──────────────────────────────────────────────────────────── */

const stage = document.getElementById('stage');
const scene = document.getElementById('scene'),  sceneCtx = scene.getContext('2d');
const goo   = document.getElementById('goo'),    gooCtx   = goo.getContext('2d');
const fx    = document.getElementById('fx'),     fxCtx    = fx.getContext('2d');

let W = 0, H = 0, DPR = 1;
function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  for (const c of [scene, goo, fx]){
    c.width  = Math.floor(W * DPR);
    c.height = Math.floor(H * DPR);
    c.style.width  = W + 'px';
    c.style.height = H + 'px';
    c.getContext('2d').setTransform(DPR, 0, 0, DPR, 0, 0);
  }
}
window.addEventListener('resize', resize);
resize();

/* ── Settings ─────────────────────────────────────────────── */
const settings = {
  gooCount: 900,
  gravity: 120,
  trail: 14,
  rainbow: true,
};

/* ── Goo particles ────────────────────────────────────────── */
const NEON_HUES = [195, 320, 100, 32, 270]; // cyan, magenta, lime, amber, plum
const particles = [];
function spawnParticle(x, y, vx, vy, hue){
  particles.push({
    x: x ?? Math.random() * W,
    y: y ?? Math.random() * H,
    vx: vx ?? (Math.random() - 0.5) * 80,
    vy: vy ?? (Math.random() - 0.5) * 80,
    hue: hue ?? NEON_HUES[Math.floor(Math.random() * NEON_HUES.length)],
    r: 3 + Math.random() * 4.5,
    life: 0,
  });
}
function resetParticles(){
  particles.length = 0;
  while (particles.length < settings.gooCount) spawnParticle();
}

/* ── Black holes ──────────────────────────────────────────── */
const holes = [];
let consumedCount = 0;
function makeHole(x, y, mass){
  return {
    x, y,
    mass: mass ?? (1.0 + Math.random() * 0.6),
    angle: Math.random() * Math.PI * 2,
    hue: NEON_HUES[Math.floor(Math.random() * NEON_HUES.length)],
    radius: 22,        // event horizon
    diskOuter: 60,     // accretion disk outer
    bornAt: performance.now(),
  };
}
holes.push(makeHole(W * 0.5, H * 0.5, 1.3));

/* ── Drag state ───────────────────────────────────────────── */
const drag = { active:false, holeIdx:-1, ox:0, oy:0, downX:0, downY:0, moved:false };
function hitTestHole(x, y){
  for (let i = holes.length - 1; i >= 0; i--){
    const h = holes[i];
    const dx = x - h.x, dy = y - h.y;
    if (dx*dx + dy*dy <= (h.diskOuter * 0.7) ** 2) return i;
  }
  return -1;
}

/* ── Physics step ─────────────────────────────────────────── */
const SOFT = 1800;     // softening so 1/r² doesn't explode near r=0
const G_SCALE = 5500;  // baseline force constant (settings.gravity scales it)
function step(dt){
  const G = settings.gravity * G_SCALE / 120; // 120 = slider default
  const consumed = [];
  for (let p = 0; p < particles.length; p++){
    const part = particles[p];
    let ax = 0, ay = 0;
    for (let h = 0; h < holes.length; h++){
      const hole = holes[h];
      const dx = hole.x - part.x;
      const dy = hole.y - part.y;
      const d2 = dx*dx + dy*dy;
      // event-horizon consumption
      if (d2 < (hole.radius * hole.radius)){
        consumed.push(p);
        consumedCount++;
        break;
      }
      const inv = 1 / Math.sqrt(d2 + SOFT);
      const f = G * hole.mass * inv * inv * inv; // F/m * unit-vector → ax/ay
      ax += dx * f;
      ay += dy * f;
    }
    part.vx += ax * dt;
    part.vy += ay * dt;
    // very light velocity damping so unbounded gravity slingshots don't escape forever
    part.vx *= 0.999;
    part.vy *= 0.999;
    part.x += part.vx * dt;
    part.y += part.vy * dt;
    part.life += dt;
    // soft wrap at screen edges with small inward velocity bias
    if (part.x < -40){ part.x = W + 30; part.vx = -Math.abs(part.vx) * 0.6; }
    if (part.x > W + 40){ part.x = -30; part.vx =  Math.abs(part.vx) * 0.6; }
    if (part.y < -40){ part.y = H + 30; part.vy = -Math.abs(part.vy) * 0.6; }
    if (part.y > H + 40){ part.y = -30; part.vy =  Math.abs(part.vy) * 0.6; }
  }
  // remove consumed particles in reverse order, respawn from screen edge
  if (consumed.length){
    consumed.sort((a, b) => b - a);
    for (const idx of consumed){
      particles.splice(idx, 1);
    }
    // respawn to maintain count
    while (particles.length < settings.gooCount) spawnEdge();
  }
}
function spawnEdge(){
  const side = Math.floor(Math.random() * 4);
  let x, y, vx, vy;
  const speed = 60 + Math.random() * 90;
  if (side === 0){ x = Math.random() * W; y = -20; vx = (Math.random() - 0.5) * 60; vy = speed; }
  else if (side === 1){ x = W + 20; y = Math.random() * H; vx = -speed; vy = (Math.random() - 0.5) * 60; }
  else if (side === 2){ x = Math.random() * W; y = H + 20; vx = (Math.random() - 0.5) * 60; vy = -speed; }
  else                { x = -20; y = Math.random() * H; vx = speed; vy = (Math.random() - 0.5) * 60; }
  spawnParticle(x, y, vx, vy);
}

/* ── Render ───────────────────────────────────────────────── */
function drawScene(){
  // trail-fade — alpha proportional to trail slider (low = long trails)
  sceneCtx.fillStyle = 'rgba(5, 0, 16, ' + (settings.trail / 100).toFixed(3) + ')';
  sceneCtx.fillRect(0, 0, W, H);

  // background halo for each black hole
  for (const h of holes){
    const grd = sceneCtx.createRadialGradient(h.x, h.y, 0, h.x, h.y, h.diskOuter * 2.4);
    grd.addColorStop(0,   'rgba(168,107,255,0.10)');
    grd.addColorStop(0.5, 'rgba(168,107,255,0.04)');
    grd.addColorStop(1,   'rgba(168,107,255,0)');
    sceneCtx.fillStyle = grd;
    sceneCtx.fillRect(h.x - h.diskOuter*2.4, h.y - h.diskOuter*2.4, h.diskOuter*4.8, h.diskOuter*4.8);
  }
}
function drawGoo(){
  // FULL clear each frame — the trail comes from the scene layer beneath
  gooCtx.clearRect(0, 0, W, H);
  gooCtx.globalCompositeOperation = 'lighter';
  for (const p of particles){
    const hue = settings.rainbow ? p.hue : 195;
    // each particle = radial gradient blob; blur+contrast merges nearby ones
    const r = p.r * 2.0;
    const grd = gooCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, r);
    grd.addColorStop(0,   'hsla(' + hue + ', 95%, 68%, 1)');
    grd.addColorStop(0.5, 'hsla(' + hue + ', 95%, 55%, 0.75)');
    grd.addColorStop(1,   'hsla(' + hue + ', 95%, 40%, 0)');
    gooCtx.fillStyle = grd;
    gooCtx.beginPath();
    gooCtx.arc(p.x, p.y, r, 0, Math.PI * 2);
    gooCtx.fill();
  }
  gooCtx.globalCompositeOperation = 'source-over';
}
function drawHoles(){
  fxCtx.clearRect(0, 0, W, H);
  for (const h of holes){
    h.angle += 0.014;
    // outer halo / lensing ring
    const halo = fxCtx.createRadialGradient(h.x, h.y, h.radius * 0.5, h.x, h.y, h.diskOuter * 1.5);
    halo.addColorStop(0,   'rgba(255,94,161,0.45)');
    halo.addColorStop(0.4, 'rgba(168,107,255,0.18)');
    halo.addColorStop(1,   'rgba(168,107,255,0)');
    fxCtx.fillStyle = halo;
    fxCtx.beginPath();
    fxCtx.arc(h.x, h.y, h.diskOuter * 1.5, 0, Math.PI * 2);
    fxCtx.fill();
    // accretion disk — rotating tick spokes
    fxCtx.save();
    fxCtx.translate(h.x, h.y);
    fxCtx.rotate(h.angle);
    fxCtx.scale(1, 0.36); // edge-on perspective
    for (let i = 0; i < 28; i++){
      const a = (i / 28) * Math.PI * 2;
      const r1 = h.radius * 1.2;
      const r2 = h.diskOuter;
      const hot = Math.sin(h.angle * 1.3 + i * 0.42) > 0.3;
      fxCtx.strokeStyle = hot
        ? 'rgba(255, 200, 120, 0.85)'
        : 'rgba(168,107,255, 0.55)';
      fxCtx.lineWidth = hot ? 2.0 : 1.2;
      fxCtx.beginPath();
      fxCtx.moveTo(Math.cos(a) * r1, Math.sin(a) * r1);
      fxCtx.lineTo(Math.cos(a) * r2, Math.sin(a) * r2);
      fxCtx.stroke();
    }
    fxCtx.restore();
    // photon ring
    fxCtx.strokeStyle = 'rgba(180,240,255, 0.7)';
    fxCtx.lineWidth = 1.4;
    fxCtx.beginPath();
    fxCtx.arc(h.x, h.y, h.radius * 1.4, 0, Math.PI * 2);
    fxCtx.stroke();
    // pitch-black event horizon
    fxCtx.fillStyle = '#000';
    fxCtx.beginPath();
    fxCtx.arc(h.x, h.y, h.radius, 0, Math.PI * 2);
    fxCtx.fill();
    // grab handle if being dragged
    if (drag.active && drag.holeIdx === holes.indexOf(h)){
      fxCtx.strokeStyle = 'rgba(255,94,161, 0.9)';
      fxCtx.lineWidth = 1.5;
      fxCtx.setLineDash([4, 4]);
      fxCtx.beginPath();
      fxCtx.arc(h.x, h.y, h.diskOuter * 0.85, 0, Math.PI * 2);
      fxCtx.stroke();
      fxCtx.setLineDash([]);
    }
  }
}
function updateHud(){
  document.getElementById('hud-goo').textContent = particles.length;
  document.getElementById('hud-holes').textContent = holes.length;
  document.getElementById('hud-consumed').textContent = consumedCount;
}

/* ── Input ────────────────────────────────────────────────── */
function evtXY(e){
  if (e.touches && e.touches[0]){
    return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
  return { x: e.clientX, y: e.clientY };
}
let dismissedHint = false;
function dismissHint(){
  if (dismissedHint) return;
  dismissedHint = true;
  document.getElementById('hint').classList.add('hidden');
}
stage.addEventListener('pointerdown', e => {
  if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT' || e.target.tagName === 'LABEL') return;
  const { x, y } = evtXY(e);
  dismissHint();
  const idx = hitTestHole(x, y);
  drag.downX = x; drag.downY = y; drag.moved = false;
  if (idx >= 0){
    // start dragging an existing hole — shift-click = delete instead
    if (e.shiftKey){
      holes.splice(idx, 1);
      updateHud();
      return;
    }
    drag.active = true;
    drag.holeIdx = idx;
    drag.ox = holes[idx].x - x;
    drag.oy = holes[idx].y - y;
    stage.classList.add('dragging');
    try { stage.setPointerCapture(e.pointerId); } catch(_){}
  } else {
    // record an empty-space tap → spawn hole on pointerup if no significant drag
    drag.active = false;
    drag.holeIdx = -1;
  }
});
stage.addEventListener('pointermove', e => {
  const { x, y } = evtXY(e);
  const dx = x - drag.downX, dy = y - drag.downY;
  if (dx*dx + dy*dy > 16) drag.moved = true;
  if (drag.active && drag.holeIdx >= 0){
    const h = holes[drag.holeIdx];
    h.x = x + drag.ox;
    h.y = y + drag.oy;
  }
});
stage.addEventListener('pointerup', e => {
  const { x, y } = evtXY(e);
  if (!drag.active && !drag.moved){
    // empty-space click → spawn new black hole (cap at 8)
    if (holes.length < 8){
      holes.push(makeHole(x, y, 1.0 + Math.random() * 0.5));
      updateHud();
    }
  }
  drag.active = false;
  drag.holeIdx = -1;
  stage.classList.remove('dragging');
  try { stage.releasePointerCapture(e.pointerId); } catch(_){}
});
// context-menu on a black hole = remove (right-click)
stage.addEventListener('contextmenu', e => {
  const { x, y } = evtXY(e);
  const idx = hitTestHole(x, y);
  if (idx >= 0){
    e.preventDefault();
    holes.splice(idx, 1);
    updateHud();
  }
});
// keyboard
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.code === 'Space'){ e.preventDefault(); burst(); }
  if (e.key === 'r' || e.key === 'R'){ resetScene(); }
  if (e.key === 'c' || e.key === 'C'){ holes.length = 0; updateHud(); }
});

/* ── Actions ──────────────────────────────────────────────── */
function burst(){
  // spawn a tight cloud of new goo at every black hole (or center if none)
  const sites = holes.length ? holes.map(h => ({ x:h.x, y:h.y })) : [{ x:W/2, y:H/2 }];
  for (const s of sites){
    for (let i = 0; i < 60; i++){
      const a = Math.random() * Math.PI * 2;
      const sp = 140 + Math.random() * 200;
      spawnParticle(s.x + Math.cos(a) * 8, s.y + Math.sin(a) * 8, Math.cos(a) * sp, Math.sin(a) * sp);
    }
  }
  // trim if over goal
  while (particles.length > settings.gooCount * 1.4) particles.shift();
}
function resetScene(){
  holes.length = 0;
  holes.push(makeHole(W * 0.5, H * 0.5, 1.3));
  consumedCount = 0;
  resetParticles();
  updateHud();
}

/* ── Toolbar wiring ──────────────────────────────────────── */
document.getElementById('btn-burst').addEventListener('click', () => { dismissHint(); burst(); });
document.getElementById('btn-reset').addEventListener('click', () => { dismissHint(); resetScene(); });
document.getElementById('btn-clear-holes').addEventListener('click', () => {
  dismissHint();
  holes.length = 0;
  updateHud();
});
const rainbowBtn = document.getElementById('btn-rainbow');
rainbowBtn.addEventListener('click', () => {
  settings.rainbow = !settings.rainbow;
  rainbowBtn.setAttribute('aria-pressed', settings.rainbow ? 'true' : 'false');
});
const gooSlider = document.getElementById('slider-goo');
const gooVal = document.getElementById('slider-goo-val');
gooSlider.addEventListener('input', () => {
  settings.gooCount = +gooSlider.value;
  gooVal.textContent = settings.gooCount;
  // grow or trim to match
  while (particles.length < settings.gooCount) spawnEdge();
  if (particles.length > settings.gooCount) particles.length = settings.gooCount;
});
const gravSlider = document.getElementById('slider-grav');
const gravVal = document.getElementById('slider-grav-val');
gravSlider.addEventListener('input', () => {
  settings.gravity = +gravSlider.value;
  gravVal.textContent = settings.gravity;
});
document.getElementById('slider-trail').addEventListener('input', e => {
  settings.trail = +e.target.value;
});

/* ── Main loop ────────────────────────────────────────────── */
let lastT = performance.now();
function frame(now){
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  step(dt);
  drawScene();
  drawGoo();
  drawHoles();
  updateHud();
  requestAnimationFrame(frame);
}

/* ── Boot ─────────────────────────────────────────────────── */
resetParticles();
// drop one playful satellite hole offscreen so the very first frame has motion
holes.push(makeHole(W * 0.78, H * 0.32, 0.85));
updateHud();
requestAnimationFrame(frame);
</script>
</body>
</html>
