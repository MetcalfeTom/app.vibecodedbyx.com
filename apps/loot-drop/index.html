<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Loot Drop</title>
<link rel="icon" href="https://emojicdn.elk.sh/🔫">
<meta property="og:title" content="Loot Drop">
<meta property="og:description" content="Pop the chest. Watch the rarity beam. Pray for legendary.">
<meta property="og:url" content="https://sloppy.live/loot-drop/">
<meta property="og:image" content="https://sloppy.live/loot-drop/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0f;font-family:'Share Tech Mono',monospace}
canvas{display:block;position:fixed;inset:0;z-index:0}
#ui{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2;pointer-events:none}
#open-btn{pointer-events:all;font-family:'Teko',sans-serif;font-weight:700;font-size:clamp(1.2rem,3vw,1.8rem);padding:.5em 2em;background:linear-gradient(135deg,#ffd700,#ff8c00);border:none;color:#1a0a00;cursor:pointer;letter-spacing:.15em;text-transform:uppercase;box-shadow:0 0 30px rgba(255,200,0,.3),0 4px 0 #8b5e00;transition:transform .1s,box-shadow .2s;border-radius:4px}
#open-btn:hover{box-shadow:0 0 50px rgba(255,200,0,.5),0 4px 0 #8b5e00}
#open-btn:active{transform:translateY(4px);box-shadow:0 0 30px rgba(255,200,0,.3)}
#open-btn.hidden{display:none}
#card{pointer-events:all;display:none;background:rgba(15,15,25,.95);border-radius:8px;padding:24px 30px;min-width:280px;max-width:380px;width:90vw;border:2px solid #333;position:relative;overflow:hidden;animation:cardIn .4s ease-out}
@keyframes cardIn{from{opacity:0;transform:scale(.8) translateY(30px)}to{opacity:1;transform:scale(1) translateY(0)}}
#card .rarity-bar{position:absolute;top:0;left:0;right:0;height:3px}
#card .weapon-name{font-family:'Teko',sans-serif;font-weight:700;font-size:1.8rem;letter-spacing:.05em;margin:8px 0 2px;line-height:1.1}
#card .weapon-type{font-size:.7rem;color:#888;text-transform:uppercase;letter-spacing:.2em;margin-bottom:12px}
#card .manufacturer{font-size:.65rem;color:#666;letter-spacing:.15em;margin-bottom:10px}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:3px 0;font-size:.75rem}
.stat-row .label{color:#888}
.stat-row .value{font-family:'Teko',sans-serif;font-weight:600;font-size:1rem}
.stat-bar-bg{flex:1;height:6px;background:#1a1a2a;margin:0 10px;border-radius:3px;overflow:hidden}
.stat-bar-fill{height:100%;border-radius:3px;transition:width .6s ease-out}
.flavor{font-size:.65rem;color:#666;font-style:italic;margin-top:12px;padding-top:10px;border-top:1px solid #1a1a2a;line-height:1.5}
.element-badge{display:inline-block;font-size:.6rem;padding:2px 8px;border-radius:10px;margin-top:6px;letter-spacing:.1em}
#next-btn{pointer-events:all;font-family:'Teko',sans-serif;font-weight:600;font-size:1rem;padding:.4em 1.5em;background:transparent;border:1px solid #444;color:#888;cursor:pointer;margin-top:16px;letter-spacing:.15em;transition:all .2s;border-radius:3px}
#next-btn:hover{border-color:#ffd700;color:#ffd700}
#inventory-bar{position:fixed;bottom:0;left:0;right:0;z-index:3;display:flex;gap:4px;padding:8px;justify-content:center;flex-wrap:wrap;pointer-events:none}
.inv-slot{width:42px;height:42px;border:1px solid #222;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:18px;background:rgba(10,10,15,.8);pointer-events:all;cursor:pointer;transition:border-color .2s,transform .2s}
.inv-slot:hover{transform:scale(1.15);z-index:4}
.inv-slot .inv-rarity{position:absolute;bottom:0;left:0;right:0;height:2px;border-radius:0 0 3px 3px}
.drop-count{position:fixed;top:10px;right:14px;z-index:5;color:#555;font-size:.7rem}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="ui">
  <button id="open-btn" onclick="openChest()">OPEN LOOT CHEST</button>
  <div id="card">
    <div class="rarity-bar" id="rarity-bar"></div>
    <div class="weapon-name" id="w-name"></div>
    <div class="weapon-type" id="w-type"></div>
    <div class="manufacturer" id="w-mfr"></div>
    <div id="w-stats"></div>
    <div id="w-element"></div>
    <div class="flavor" id="w-flavor"></div>
    <button id="next-btn" onclick="nextDrop()">OPEN ANOTHER</button>
  </div>
</div>
<div id="inventory-bar"></div>
<div class="drop-count" id="drop-count"></div>
<script>
var CV=document.getElementById('cv');
var X=CV.getContext('2d');
var W,H;
function resize(){W=CV.width=window.innerWidth;H=CV.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

// --- RARITY SYSTEM ---
var RARITIES=[
  {name:'Common',color:'#888888',glow:'rgba(136,136,136,',weight:35,statMult:1,beamW:0},
  {name:'Uncommon',color:'#2ecc40',glow:'rgba(46,204,64,',weight:28,statMult:1.15,beamW:20},
  {name:'Rare',color:'#0074d9',glow:'rgba(0,116,217,',weight:18,statMult:1.35,beamW:30},
  {name:'Epic',color:'#b10dc9',glow:'rgba(177,13,201,',weight:10,statMult:1.6,beamW:40},
  {name:'Legendary',color:'#ff851b',glow:'rgba(255,133,27,',weight:6,statMult:2.0,beamW:55},
  {name:'Pearlescent',color:'#00ffff',glow:'rgba(0,255,255,',weight:2.5,statMult:2.5,beamW:65},
  {name:'GLITCHED',color:'#ff2d95',glow:'rgba(255,45,149,',weight:0.5,statMult:3.5,beamW:80}
];

var WEAPON_TYPES=[
  {name:'Pistol',icon:'\uD83D\uDD2B',dmgBase:45,fireBase:8,relBase:2.0,magBase:12,accBase:85},
  {name:'SMG',icon:'\uD83D\uDD2B',dmgBase:28,fireBase:14,relBase:2.5,magBase:35,accBase:72},
  {name:'Assault Rifle',icon:'\uD83D\uDD2B',dmgBase:52,fireBase:10,relBase:3.0,magBase:30,accBase:80},
  {name:'Shotgun',icon:'\uD83D\uDD2B',dmgBase:120,fireBase:3,relBase:3.5,magBase:6,accBase:55},
  {name:'Sniper Rifle',icon:'\uD83C\uDFAF',dmgBase:250,fireBase:1.5,relBase:4.0,magBase:5,accBase:95},
  {name:'Rocket Launcher',icon:'\uD83D\uDE80',dmgBase:800,fireBase:1,relBase:5.0,magBase:3,accBase:88},
  {name:'Laser Cannon',icon:'\u26A1',dmgBase:65,fireBase:0,relBase:2.0,magBase:80,accBase:90},
];

var MANUFACTURERS=[
  {name:'DAHL',prefix:['Searing','Liquid','Resolute','Swift']},
  {name:'HYPERION',prefix:['Corporate','Executive','Synergy','Leveraged']},
  {name:'JAKOBS',prefix:['Iron','Rustler','Scarlet','Ornery']},
  {name:'MALIWAN',prefix:['Sublime','Surfeit','Dandy','Gentleman\'s']},
  {name:'TEDIORE',prefix:['Hefty','Loaded','Jam Packed','Two Fer']},
  {name:'TORGUE',prefix:['EXPLOSIVE','BADASS','MEGA','DOUBLE']},
  {name:'VLADOF',prefix:['Angry','Vengeful','Ruthless','Rabid']},
  {name:'SLOPPY ARMS',prefix:['Vibing','Scuffed','Unhinged','Chaotic']},
];

var ELEMENTS=[
  {name:'Fire',color:'#ff4500',icon:'\uD83D\uDD25'},
  {name:'Shock',color:'#00bfff',icon:'\u26A1'},
  {name:'Corrosive',color:'#39ff14',icon:'\u2622\uFE0F'},
  {name:'Cryo',color:'#88ccff',icon:'\u2744\uFE0F'},
  {name:'Radiation',color:'#ffcc00',icon:'\u2622\uFE0F'},
  {name:'Slag',color:'#b10dc9',icon:'\uD83D\uDCA7'},
];

var FLAVORS=[
  '"I never die." - The gun, probably.',
  'Reloading is just a suggestion.',
  'It\'s not a bug, it\'s a feature.',
  'Shoots more bullets than expected.',
  'Warning: May cause loot addiction.',
  'Found in a porta-potty. Don\'t ask.',
  'This gun has trust issues.',
  'Smells faintly of pizza.',
  'Previously owned by a very angry midget.',
  'The bullets come out here. Usually.',
  'Warranty void if used in combat.',
  'Side effects include: winning.',
  'Made with 100% organic explosions.',
  'It goes pew pew, what more do you want?',
  'ERROR 404: Mercy not found.',
  'Ludicrous speed! GO!',
  'I am become death, destroyer of loot goblins.',
  'Now with 50% more dakka.',
  'Does exactly what you think. But louder.',
  'The last thing they never saw.',
];

var LEGENDARY_NAMES=['Infinity','Conference Call','Unkempt Harold','Norfleet','Bee Shield Simulator',
  'The Sham','Fastball','Lyuda','Hellwalker','Sand Hawk','Butcher','Flakker','Ogre',
  'Mongol','Volcano','Thunderball Fists','Sloppy Cannon','Vibe Blaster','Stream Sniper','Chat Destroyer'];

// --- LOOT GENERATION ---
function rollRarity(){
  var total=0;for(var i=0;i<RARITIES.length;i++)total+=RARITIES[i].weight;
  var r=Math.random()*total,cum=0;
  for(var i=0;i<RARITIES.length;i++){cum+=RARITIES[i].weight;if(r<=cum)return i;}
  return 0;
}

function generateWeapon(){
  var rarityIdx=rollRarity();
  var rarity=RARITIES[rarityIdx];
  var type=WEAPON_TYPES[Math.floor(Math.random()*WEAPON_TYPES.length)];
  var mfr=MANUFACTURERS[Math.floor(Math.random()*MANUFACTURERS.length)];
  var prefix=mfr.prefix[Math.floor(Math.random()*mfr.prefix.length)];
  var hasElement=Math.random()<0.3+rarityIdx*0.1;
  var element=hasElement?ELEMENTS[Math.floor(Math.random()*ELEMENTS.length)]:null;
  var mult=rarity.statMult*(0.85+Math.random()*0.3);
  var name;
  if(rarityIdx>=4){
    name=LEGENDARY_NAMES[Math.floor(Math.random()*LEGENDARY_NAMES.length)];
  } else {
    name=prefix+' '+type.name;
  }
  return {
    name:name,
    type:type.name,
    typeIcon:type.icon,
    manufacturer:mfr.name,
    rarityIdx:rarityIdx,
    rarity:rarity,
    element:element,
    damage:Math.floor(type.dmgBase*mult),
    fireRate:+(type.fireBase*mult*(0.8+Math.random()*0.4)).toFixed(1),
    reload:+Math.max(0.5,type.relBase/mult*(0.8+Math.random()*0.4)).toFixed(1),
    magSize:Math.floor(type.magBase*mult*(0.7+Math.random()*0.6)),
    accuracy:Math.min(99,Math.floor(type.accBase*Math.sqrt(mult)*(0.9+Math.random()*0.2))),
    flavor:FLAVORS[Math.floor(Math.random()*FLAVORS.length)],
    level:Math.floor(Math.random()*60)+1
  };
}

// --- BEAM + PARTICLE EFFECTS ---
var beam={active:false,x:0,y:0,color:'',glow:'',width:0,timer:0,maxTime:2.5,particles:[]};
var chestParticles=[];
var ambientParticles=[];

function initAmbient(){
  ambientParticles=[];
  for(var i=0;i<30;i++){
    ambientParticles.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*8,vy:-5-Math.random()*10,r:1+Math.random()*2,alpha:Math.random()*0.15,hue:Math.random()*360});
  }
}
initAmbient();

function startBeam(weapon){
  var r=weapon.rarity;
  beam.active=true;
  beam.x=W/2;beam.y=H*0.45;
  beam.color=r.color;beam.glow=r.glow;
  beam.width=r.beamW;beam.timer=0;beam.maxTime=weapon.rarityIdx>=4?3.5:2;
  beam.particles=[];
  // Burst particles
  for(var i=0;i<30+weapon.rarityIdx*15;i++){
    var a=Math.random()*Math.PI*2;
    var sp=100+Math.random()*200;
    chestParticles.push({x:beam.x,y:beam.y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      life:0.5+Math.random()*0.8,maxLife:1.3,r:2+Math.random()*4,color:r.color});
  }
}

// --- CANVAS DRAWING ---
function drawBackground(){
  X.fillStyle='#0a0a0f';X.fillRect(0,0,W,H);
  // Subtle grid
  X.strokeStyle='rgba(255,255,255,0.015)';X.lineWidth=1;
  for(var x=0;x<W;x+=50){X.beginPath();X.moveTo(x,0);X.lineTo(x,H);X.stroke();}
  for(var y=0;y<H;y+=50){X.beginPath();X.moveTo(0,y);X.lineTo(W,y);X.stroke();}
}

function drawBeam(dt){
  if(!beam.active)return;
  beam.timer+=dt;
  var progress=Math.min(beam.timer/beam.maxTime,1);
  var alpha=progress<0.1?progress*10:progress>0.7?1-(progress-0.7)/0.3:1;
  if(beam.width<=0){if(beam.timer>0.5){beam.active=false;}return;}

  // Main beam
  var bw=beam.width*(0.8+Math.sin(beam.timer*8)*0.2);
  var grd=X.createLinearGradient(beam.x-bw,0,beam.x+bw,0);
  grd.addColorStop(0,'transparent');
  grd.addColorStop(0.3,beam.glow+(alpha*0.3)+')');
  grd.addColorStop(0.5,beam.glow+(alpha*0.7)+')');
  grd.addColorStop(0.7,beam.glow+(alpha*0.3)+')');
  grd.addColorStop(1,'transparent');
  X.fillStyle=grd;
  X.fillRect(beam.x-bw,0,bw*2,beam.y);

  // Core bright line
  X.fillStyle=beam.glow+(alpha*0.9)+')';
  X.fillRect(beam.x-2,0,4,beam.y);

  // Base glow
  var baseGrd=X.createRadialGradient(beam.x,beam.y,0,beam.x,beam.y,beam.width*2);
  baseGrd.addColorStop(0,beam.glow+(alpha*0.5)+')');
  baseGrd.addColorStop(1,'transparent');
  X.fillStyle=baseGrd;
  X.beginPath();X.arc(beam.x,beam.y,beam.width*2,0,Math.PI*2);X.fill();

  // Rising beam particles
  if(Math.random()<0.4){
    beam.particles.push({x:beam.x+(Math.random()-.5)*bw,y:beam.y,
      vy:-200-Math.random()*300,vx:(Math.random()-.5)*20,
      life:0.5+Math.random()*0.5,maxLife:1,r:1+Math.random()*2,color:beam.color});
  }

  for(var i=beam.particles.length-1;i>=0;i--){
    var p=beam.particles[i];p.y+=p.vy*dt;p.x+=p.vx*dt;p.life-=dt;
    if(p.life<=0){beam.particles.splice(i,1);continue;}
    var a2=p.life/p.maxLife;
    X.fillStyle=beam.glow+a2+')';
    X.beginPath();X.arc(p.x,p.y,p.r*a2,0,Math.PI*2);X.fill();
  }

  if(beam.timer>=beam.maxTime) beam.active=false;
}

function drawChestParticles(dt){
  for(var i=chestParticles.length-1;i>=0;i--){
    var p=chestParticles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=150*dt;p.life-=dt;
    if(p.life<=0){chestParticles.splice(i,1);continue;}
    var a=p.life/p.maxLife;
    X.fillStyle=p.color;X.globalAlpha=a;
    X.beginPath();X.arc(p.x,p.y,p.r*a,0,Math.PI*2);X.fill();
  }
  X.globalAlpha=1;
}

function drawAmbient(dt){
  for(var i=0;i<ambientParticles.length;i++){
    var p=ambientParticles[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    if(p.y<-10){p.y=H+10;p.x=Math.random()*W;}
    if(p.x<-10)p.x=W+10;if(p.x>W+10)p.x=-10;
    X.fillStyle='hsla('+p.hue+',60%,60%,'+p.alpha+')';
    X.beginPath();X.arc(p.x,p.y,p.r,0,Math.PI*2);X.fill();
  }
}

// --- LOOT CARD ---
var currentWeapon=null;
var inventory=[];
var totalDrops=0;

function showCard(w){
  var card=document.getElementById('card');
  card.style.display='block';
  card.style.borderColor=w.rarity.color;
  document.getElementById('rarity-bar').style.background=w.rarity.color;
  document.getElementById('w-name').textContent=w.name;
  document.getElementById('w-name').style.color=w.rarity.color;
  document.getElementById('w-type').textContent=w.type+' \u00B7 Lv.'+w.level+' \u00B7 '+w.rarity.name;
  document.getElementById('w-type').style.color=w.rarity.color;
  document.getElementById('w-mfr').textContent=w.manufacturer;

  var stats=[
    {label:'DAMAGE',value:w.damage,max:2500,color:'#ff4444'},
    {label:'FIRE RATE',value:w.fireRate,max:20,color:'#ffcc00'},
    {label:'ACCURACY',value:w.accuracy,max:99,color:'#00bfff'},
    {label:'MAG SIZE',value:w.magSize,max:100,color:'#2ecc40'},
    {label:'RELOAD',value:w.reload,max:6,color:'#b10dc9',invert:true}
  ];
  var statsHTML='';
  for(var i=0;i<stats.length;i++){
    var s=stats[i];
    var pct=s.invert?Math.max(0,100-s.value/s.max*100):Math.min(100,s.value/s.max*100);
    statsHTML+='<div class="stat-row"><span class="label">'+s.label+'</span>'+
      '<div class="stat-bar-bg"><div class="stat-bar-fill" style="width:'+pct+'%;background:'+s.color+'"></div></div>'+
      '<span class="value" style="color:'+s.color+'">'+s.value+'</span></div>';
  }
  document.getElementById('w-stats').innerHTML=statsHTML;

  var elemHTML='';
  if(w.element){
    elemHTML='<span class="element-badge" style="background:'+w.element.color+'22;color:'+w.element.color+';border:1px solid '+w.element.color+'44">'+
      w.element.icon+' '+w.element.name+'</span>';
  }
  document.getElementById('w-element').innerHTML=elemHTML;
  document.getElementById('w-flavor').textContent=w.flavor;
}

function addToInventory(w){
  inventory.push(w);
  if(inventory.length>12) inventory.shift();
  renderInventory();
}

function renderInventory(){
  var bar=document.getElementById('inventory-bar');
  bar.innerHTML='';
  for(var i=0;i<inventory.length;i++){
    var w=inventory[i];
    var slot=document.createElement('div');
    slot.className='inv-slot';
    slot.style.borderColor=w.rarity.color+'66';
    slot.style.position='relative';
    slot.innerHTML=w.typeIcon+'<div class="inv-rarity" style="background:'+w.rarity.color+'"></div>';
    slot.title=w.rarity.name+' '+w.name;
    (function(weapon){
      slot.addEventListener('click',function(){showCard(weapon);document.getElementById('card').style.display='block';});
    })(w);
    bar.appendChild(slot);
  }
}

// --- GAME FLOW ---
var state='idle'; // idle, opening, showing

function openChest(){
  if(state!=='idle')return;
  state='opening';
  document.getElementById('open-btn').classList.add('hidden');
  document.getElementById('card').style.display='none';
  currentWeapon=generateWeapon();
  totalDrops++;
  document.getElementById('drop-count').textContent='DROPS: '+totalDrops;
  startBeam(currentWeapon);
  // Show card after beam peaks
  var delay=currentWeapon.rarityIdx>=4?2200:1200;
  setTimeout(function(){
    showCard(currentWeapon);
    addToInventory(currentWeapon);
    state='showing';
  },delay);
}

function nextDrop(){
  state='idle';
  document.getElementById('card').style.display='none';
  document.getElementById('open-btn').classList.remove('hidden');
}

// Keyboard shortcut
document.addEventListener('keydown',function(e){
  if(e.code==='Space'||e.key===' '){
    e.preventDefault();
    if(state==='idle')openChest();
    else if(state==='showing')nextDrop();
  }
});

// --- MAIN LOOP ---
var lastTime=performance.now();
function loop(now){
  var dt=Math.min((now-lastTime)/1000,0.05);lastTime=now;
  drawBackground();
  drawAmbient(dt);
  drawBeam(dt);
  drawChestParticles(dt);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
