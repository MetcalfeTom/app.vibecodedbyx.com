<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Neon Pong</title>
<link rel="icon" href="https://emojicdn.elk.sh/🏓">
<meta property="og:title" content="Neon Pong">
<meta property="og:description" content="Classic pong with neon glow. 2 players or vs AI.">
<meta property="og:url" content="https://sloppy.live/neon-pong">
<meta property="og:image" content="https://emojicdn.elk.sh/🏓?style=apple&size=512">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100dvh;overflow:hidden;background:#06070e;font-family:'Share Tech Mono',monospace;color:#d0d0d8}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
canvas{display:block;border:1px solid #1a1a3a;border-radius:4px}
#hud{display:flex;gap:20px;font-size:12px;opacity:0.6}
#mode-row{display:flex;gap:8px;margin-bottom:4px}
.mbtn{font-family:'Orbitron',sans-serif;font-size:11px;padding:6px 14px;background:transparent;border:1px solid #1a1a3a;color:#888;border-radius:4px;cursor:pointer;transition:all 0.2s}
.mbtn.active{border-color:#00ffcc;color:#00ffcc}
.mbtn:hover{border-color:#00ffcc;color:#00ffcc}
#overlay{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(6,7,14,0.9);z-index:10;gap:14px}
#overlay h1{font-family:'Orbitron',sans-serif;font-size:clamp(28px,6vw,48px);font-weight:900;color:#00ffcc;text-shadow:0 0 30px #00ffcc44}
#overlay p{font-size:13px;opacity:0.6;text-align:center;max-width:380px;line-height:1.6}
.btn{font-family:'Orbitron',sans-serif;padding:12px 28px;background:transparent;border:2px solid #00ffcc;color:#00ffcc;font-size:15px;cursor:pointer;border-radius:4px;transition:all 0.2s}
.btn:hover{background:#00ffcc18}
.hidden{display:none!important}
#back{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);font-size:11px;opacity:0.3;color:#666;text-decoration:none}
#back:hover{opacity:0.6}
/* touch zones */
.touch-zone{display:none;position:fixed;top:0;bottom:0;width:50%;z-index:15;pointer-events:none}
.touch-zone.tz-l{left:0}.touch-zone.tz-r{right:0}
.tz-lbl{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron',sans-serif;font-size:11px;opacity:0;transition:opacity 0.3s;pointer-events:none;writing-mode:vertical-lr;letter-spacing:4px}
.tz-l .tz-lbl{color:#00ffcc44}
.tz-r .tz-lbl{color:#ff44cc44}
.touch-zone .tz-line{position:absolute;top:10%;bottom:10%;width:2px;background:linear-gradient(to bottom,transparent,currentColor,transparent);opacity:0.15}
.tz-l .tz-line{right:0;color:#00ffcc}
.tz-r .tz-line{left:0;color:#ff44cc}
.touch-zone.active .tz-lbl{opacity:1}
@media(pointer:coarse){.touch-zone{display:block;pointer-events:auto}}
</style>
</head>
<body>
<div id="mode-row">
<button class="mbtn active" data-m="ai">vs AI</button>
<button class="mbtn" data-m="2p">2 Player</button>
</div>
<canvas id="c"></canvas>
<div id="hud">
<span>P1: W/S</span>
<span>P2: ↑/↓</span>
<span>First to 7 wins</span>
</div>
<div id="overlay">
<h1>NEON PONG</h1>
<p>P1: W / S &nbsp;&nbsp; P2: ↑ / ↓<br>Mobile: slide left half = P1, right half = P2</p>
<button class="btn" id="startBtn">PLAY</button>
</div>
<div class="touch-zone tz-l" id="tzL"><div class="tz-line"></div><div class="tz-lbl">DRAG P1</div></div>
<div class="touch-zone tz-r" id="tzR"><div class="tz-line"></div><div class="tz-lbl">DRAG P2</div></div>
<a id="back" href="https://sloppy.live">sloppy.live</a>
<script>
(function(){
var C=document.getElementById('c'),X=C.getContext('2d');
var overlay=document.getElementById('overlay'),startBtn=document.getElementById('startBtn');
var CW=640,CH=420;C.width=CW;C.height=CH;
var PADDLE_W=10,PADDLE_H=70,BALL_R=7,WIN_SCORE=7;
var mode='ai';
var p1={y:CH/2,score:0,vy:0},p2={y:CH/2,score:0,vy:0};
var ball={x:CW/2,y:CH/2,vx:0,vy:0,speed:5};
var PADDLE_SPEED=360,AI_SPEED=280;
var state='menu',pauseT=0,trail=[];
var keys={};
var touches={l:null,r:null};

function resetBall(dir){
  ball.x=CW/2;ball.y=CH/2;
  var angle=(Math.random()-0.5)*1.2;
  ball.speed=5;
  ball.vx=Math.cos(angle)*ball.speed*(dir||1);
  ball.vy=Math.sin(angle)*ball.speed;
  trail=[];pauseT=0.6;
}

function startGame(){
  p1.y=CH/2;p2.y=CH/2;p1.score=0;p2.score=0;
  resetBall(1);state='play';
}

document.addEventListener('keydown',function(e){keys[e.code]=true;if(['ArrowUp','ArrowDown'].indexOf(e.code)!==-1)e.preventDefault();});
document.addEventListener('keyup',function(e){keys[e.code]=false;});

// touch — use full screen zones
var tzL=document.getElementById('tzL'),tzR=document.getElementById('tzR');
function handleTouchGlobal(e){
  e.preventDefault();
  var rect=C.getBoundingClientRect();
  var hasL=false,hasR=false;
  for(var i=0;i<e.touches.length;i++){
    var t=e.touches[i];
    if(t.clientX<window.innerWidth/2){
      hasL=true;
      touches.l=((t.clientY-rect.top)/rect.height)*CH;
    }else{
      hasR=true;
      touches.r=((t.clientY-rect.top)/rect.height)*CH;
    }
  }
  if(!hasL)touches.l=null;
  if(!hasR)touches.r=null;
  tzL.classList.toggle('active',hasL);
  tzR.classList.toggle('active',hasR);
}
document.addEventListener('touchstart',handleTouchGlobal,{passive:false});
document.addEventListener('touchmove',handleTouchGlobal,{passive:false});
document.addEventListener('touchend',function(e){
  handleTouchGlobal(e);
  if(e.touches.length===0){touches.l=null;touches.r=null;tzL.classList.remove('active');tzR.classList.remove('active');}
},{passive:false});

// mode buttons
var mbtns=document.querySelectorAll('.mbtn');
for(var i=0;i<mbtns.length;i++){
  mbtns[i].addEventListener('click',function(){
    for(var j=0;j<mbtns.length;j++)mbtns[j].classList.remove('active');
    this.classList.add('active');
    mode=this.dataset.m;
  });
}

startBtn.addEventListener('click',function(){
  overlay.classList.add('hidden');
  startGame();
});

function clampPaddle(y){return Math.max(PADDLE_H/2,Math.min(CH-PADDLE_H/2,y));}

function update(dt){
  if(state!=='play')return;
  if(pauseT>0){pauseT-=dt;return;}

  // P1 input
  var p1v=0;
  if(keys['KeyW'])p1v=-PADDLE_SPEED;
  if(keys['KeyS'])p1v=PADDLE_SPEED;
  if(touches.l!==null)p1v=(touches.l-p1.y)*8;
  p1.y=clampPaddle(p1.y+p1v*dt);

  // P2 input
  if(mode==='2p'){
    var p2v=0;
    if(keys['ArrowUp'])p2v=-PADDLE_SPEED;
    if(keys['ArrowDown'])p2v=PADDLE_SPEED;
    if(touches.r!==null)p2v=(touches.r-p2.y)*8;
    p2.y=clampPaddle(p2.y+p2v*dt);
  }else{
    // AI
    var target=ball.y;
    var diff=target-p2.y;
    if(Math.abs(diff)>10){
      p2.y=clampPaddle(p2.y+(diff>0?AI_SPEED:-AI_SPEED)*dt);
    }
  }

  // ball trail
  trail.push({x:ball.x,y:ball.y});
  if(trail.length>20)trail.shift();

  // move ball
  ball.x+=ball.vx;ball.y+=ball.vy;

  // wall bounce
  if(ball.y-BALL_R<=0){ball.y=BALL_R;ball.vy=Math.abs(ball.vy);}
  if(ball.y+BALL_R>=CH){ball.y=CH-BALL_R;ball.vy=-Math.abs(ball.vy);}

  // paddle collision P1
  var px1=20+PADDLE_W;
  if(ball.x-BALL_R<=px1&&ball.x-BALL_R>=px1-12&&ball.y>=p1.y-PADDLE_H/2-4&&ball.y<=p1.y+PADDLE_H/2+4){
    ball.x=px1+BALL_R;
    var hit=(ball.y-p1.y)/(PADDLE_H/2);
    var angle=hit*1.1;
    ball.speed=Math.min(ball.speed+0.3,10);
    ball.vx=Math.cos(angle)*ball.speed;
    ball.vy=Math.sin(angle)*ball.speed;
  }

  // paddle collision P2
  var px2=CW-20-PADDLE_W;
  if(ball.x+BALL_R>=px2&&ball.x+BALL_R<=px2+12&&ball.y>=p2.y-PADDLE_H/2-4&&ball.y<=p2.y+PADDLE_H/2+4){
    ball.x=px2-BALL_R;
    var hit=(ball.y-p2.y)/(PADDLE_H/2);
    var angle=Math.PI-hit*1.1;
    ball.speed=Math.min(ball.speed+0.3,10);
    ball.vx=Math.cos(angle)*ball.speed;
    ball.vy=Math.sin(angle)*ball.speed;
  }

  // scoring
  if(ball.x<-20){p2.score++;resetBall(1);if(p2.score>=WIN_SCORE)state='won';}
  if(ball.x>CW+20){p1.score++;resetBall(-1);if(p1.score>=WIN_SCORE)state='won';}
}

function drawGlow(x,y,w,h,color,blur){
  X.save();X.shadowColor=color;X.shadowBlur=blur;
  X.fillStyle=color;X.fillRect(x,y,w,h);
  X.restore();
}

function draw(){
  // bg
  X.fillStyle='#06070e';X.fillRect(0,0,CW,CH);

  // center line
  X.setLineDash([8,8]);X.strokeStyle='#1a1a3a';X.lineWidth=2;
  X.beginPath();X.moveTo(CW/2,0);X.lineTo(CW/2,CH);X.stroke();X.setLineDash([]);

  // scores
  X.font='900 48px Orbitron';X.textAlign='center';X.textBaseline='top';
  X.fillStyle='#00ffcc18';X.fillText(p1.score,CW/2-60,12);
  X.fillStyle='#ff44cc18';X.fillText(p2.score,CW/2+60,12);

  // trail
  for(var i=0;i<trail.length;i++){
    var a=i/trail.length*0.3;
    X.save();X.globalAlpha=a;X.fillStyle='#00ffcc';
    X.beginPath();X.arc(trail[i].x,trail[i].y,BALL_R*0.6,0,Math.PI*2);X.fill();
    X.restore();
  }

  // ball
  X.save();X.shadowColor='#00ffcc';X.shadowBlur=18;
  X.fillStyle='#00ffcc';
  X.beginPath();X.arc(ball.x,ball.y,BALL_R,0,Math.PI*2);X.fill();
  X.restore();
  // ball inner
  X.fillStyle='#ffffff';
  X.beginPath();X.arc(ball.x,ball.y,BALL_R*0.4,0,Math.PI*2);X.fill();

  // P1 paddle
  drawGlow(20,p1.y-PADDLE_H/2,PADDLE_W,PADDLE_H,'#00ffcc',16);
  // P2 paddle
  drawGlow(CW-20-PADDLE_W,p2.y-PADDLE_H/2,PADDLE_W,PADDLE_H,'#ff44cc',16);

  // pause countdown
  if(pauseT>0&&state==='play'){
    X.font='700 28px Orbitron';X.textAlign='center';X.textBaseline='middle';
    X.fillStyle='#ffffff44';
    X.fillText(Math.ceil(pauseT),CW/2,CH/2);
  }

  // win screen
  if(state==='won'){
    X.save();X.globalAlpha=0.75;X.fillStyle='#06070e';X.fillRect(0,0,CW,CH);X.restore();
    var winner=p1.score>=WIN_SCORE?1:2;
    var wcolor=winner===1?'#00ffcc':'#ff44cc';
    X.font='900 36px Orbitron';X.textAlign='center';X.textBaseline='middle';
    X.fillStyle=wcolor;X.shadowColor=wcolor;X.shadowBlur=24;
    X.fillText('P'+winner+' WINS!',CW/2,CH/2-16);
    X.shadowBlur=0;X.font='14px Share Tech Mono';X.fillStyle='#888';
    X.fillText(p1.score+' — '+p2.score,CW/2,CH/2+20);
    X.fillText('Click to play again',CW/2,CH/2+50);
  }
}

C.addEventListener('click',function(){
  if(state==='won')startGame();
});

function resize(){
  var maxW=window.innerWidth-16,maxH=window.innerHeight-80;
  var scale=Math.min(maxW/CW,maxH/CH,1);
  C.style.width=(CW*scale)+'px';
  C.style.height=(CH*scale)+'px';
}
window.addEventListener('resize',resize);resize();

var last=0;
function loop(t){
  var dt=Math.min((t-last)/1000,0.05);last=t;
  update(dt);draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(function(t){last=t;loop(t);});
})();
</script>
</body>
</html>
