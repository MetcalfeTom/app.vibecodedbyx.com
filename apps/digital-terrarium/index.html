<style>
  *{ box-sizing:border-box; margin:0; padding:0; }
  html, body{
    height:100%;
    background:#10080a;
    color:#e6e0d0;

      radial-gradient(60vw 60vh at 70% 110%, #2a1820 0%, #10080a 70%),

  canvas#stage{
    position: fixed; inset: 0;

  /* HUD overlays */
  .panel{
    position: fixed;
    background: rgba(20, 12, 16, 0.72);
    border: 1px solid rgba(230, 224, 208, 0.18);
    border-radius: 4px;

  .panel h3{

  #panel-tw{ top: 14px; left: 14px; min-width: 240px; }
  #panel-count{ top: 14px; right: 14px; text-align: right; min-width: 160px; }
  #panel-bottom{
    bottom: 18px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
    align-items: center;
    background: rgba(20, 12, 16, 0.72);
    border: 1px solid rgba(230, 224, 208, 0.18);
    border-radius: 999px;
    padding: 6px 10px;
    z-index: 10;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  #panel-bottom input{

  /* chat input row */
  #tw-row{
    display: flex; gap: 6px; align-items: center;

    background: rgba(0,0,0,0.4);

  #tw-connect{

  #tw-connect:hover{ background: rgba(217, 164, 58, 0.30); }
  #tw-state{
    display: inline-flex;
    align-items: center;
    gap: 5px;

  #tw-state .dot{

  @keyframes blink { 50% { opacity: 0.35; } }

  /* bug name tooltip */

  /* live chat feed bottom-left */

  /* mobile */
  @media (max-width: 720px){
    #panel-tw{ min-width: 200px; font-size: 10px; }

</style>

<body>

<canvas id="stage"></canvas>

<div class="panel" id="panel-tw">
  <h3>Twitch Chat</h3>
  <div id="tw-row">
    <input id="tw-channel" type="text" placeholder="twitch channel name" autocomplete="off" />
    <button id="tw-connect">Connect</button>
  </div>
  <div id="tw-state" class="idle"><span class="dot"></span><span id="tw-state-text">idle</span></div>
</div>

<div class="panel" id="panel-count">
  <h3>Specimens</h3>
  <div><b id="bug-count" style="color:#d9a43a; font-size:14px;">0</b> bugs in jar</div>
  <div style="font-size:10px; color: rgba(230,224,208,0.5); margin-top:4px;">
    <span id="escaped-count">0</span> escaped · <span id="dug-count">0</span> hiding
  </div>
</div>

<div id="panel-bottom">
  <span class="label">ADD BUG</span>
  <input id="manual-input" type="text" placeholder="name a bug after a message…" maxlength="120" />
  <button id="manual-add">+ Spawn</button>
  <button id="lid-toggle" title="Open the lid — bugs will escape">🔒 Lid Closed</button>
</div>

<div id="chat-feed"></div>
<div id="tooltip"></div>

<script>
/* =================================================================
   Digital Terrarium · pixel bugs named after chat messages
   Twitch IRC messages spawn procedurally-generated pixel bugs.
   They wander on the soil, climb the glass, push at the lid, and
   if you open the lid they escape upward off-screen.
   ================================================================= */

/* ── canvas setup ──────────────────────────── */
const canvas = document.getElementById('stage');
const ctx = canvas.getContext('2d', { alpha: false });
ctx.imageSmoothingEnabled = false;

let W = 0, H = 0, DPR = 1;
let terr = { x:0, y:0, w:0, h:0 }; // the glass-interior rectangle in canvas pixels
let lidArea = { x:0, y:0, w:0, h:0 };

function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  // terrarium occupies most of the viewport with margin
  const margin = Math.max(40, Math.min(120, W * 0.08));
  const topMargin = 100, bottomMargin = 90;
  terr.x = margin;
  terr.y = topMargin;
  terr.w = W - margin * 2;
  terr.h = H - topMargin - bottomMargin;
  lidArea = { x: terr.x, y: terr.y - 18, w: terr.w, h: 18 };
}
resize();
window.addEventListener('resize', resize);

/* ── audio (synth) ─────────────────────────── */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function tone(freq, dur=0.08, type='sine', vol=0.07, delay=0){
  const t0 = audioCtx.currentTime + delay;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, t0);
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol, t0 + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t0); o.stop(t0 + dur + 0.02);
}
function sndSpawn(){ tone(440 + Math.random()*240, 0.04, 'square', 0.06); }
function sndLid(){ tone(180, 0.18, 'sawtooth', 0.10); tone(220, 0.10, 'sine', 0.10, 0.04); }
function sndEscape(){ tone(660, 0.05, 'sine', 0.08); tone(880, 0.10, 'sine', 0.06, 0.04); }
window.addEventListener('pointerdown', () => {
  if (audioCtx.state === 'suspended') audioCtx.resume();
}, { once: true });

/* ── deterministic PRNG ─────────────────────── */
function fnv1a(str){
  let h = 0x811c9dc5;
  for (let i = 0; i < str.length; i++){
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 0x01000193);
  }
  return h >>> 0;
}
function mulberry32(a){
  return function(){
    let t = a += 0x6D2B79F5;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

/* ── bug DNA + sprite generation ─────────────── */
function bugDNA(seedText){
  const rng = mulberry32(fnv1a((seedText || 'unknown').toLowerCase()));
  return {
    hue: Math.floor(rng() * 360),
    sat: 35 + Math.floor(rng() * 50),
    light: 28 + Math.floor(rng() * 25),
    bodyW: 4 + Math.floor(rng() * 4),      // 4-7 px wide segments
    bodyL: 5 + Math.floor(rng() * 5),      // 5-9 px long
    headExtra: Math.floor(rng() * 2),      // 0 or 1
    legCount: [4, 6, 6, 6, 8][Math.floor(rng() * 5)],
    legLen:   2 + Math.floor(rng() * 2),
    antennae: rng() < 0.65,
    antennaeLen: 1 + Math.floor(rng() * 3),
    wings: rng() < 0.18,
    pattern: Math.floor(rng() * 4),        // 0 none, 1 spots, 2 stripes, 3 gradient
    eyeCount: rng() < 0.7 ? 2 : 1,
    headDark: rng() < 0.5,
    speed: 0.4 + rng() * 1.4,
    rng,
  };
}

function renderBugSprite(dna){
  // 16x16 base sprite, scaled up later
  const size = 16;
  const c = document.createElement('canvas');
  c.width = size; c.height = size;
  const g = c.getContext('2d');
  g.imageSmoothingEnabled = false;
  // helper
  const bodyColor = `hsl(${dna.hue} ${dna.sat}% ${dna.light}%)`;
  const lighter   = `hsl(${dna.hue} ${dna.sat}% ${dna.light + 12}%)`;
  const darker    = `hsl(${dna.hue} ${dna.sat}% ${Math.max(8, dna.light - 14)}%)`;
  const headColor = dna.headDark ? darker : `hsl(${dna.hue} ${dna.sat}% ${Math.max(10, dna.light - 8)}%)`;
  const eyeColor  = '#ffffff';
  const accent    = `hsl(${(dna.hue + 180) % 360} 60% 60%)`;
  // bug oriented facing right; we'll rotate when drawing
  const cx = size / 2;
  const cy = size / 2;
  const bodyHalfW = Math.ceil(dna.bodyW / 2);
  const bodyHalfL = Math.ceil(dna.bodyL / 2);
  // body (ellipse-ish from rectangles)
  for (let y = -bodyHalfW; y <= bodyHalfW; y++){
    for (let x = -bodyHalfL; x <= bodyHalfL; x++){
      const ny = y / bodyHalfW, nx = x / bodyHalfL;
      if (nx*nx + ny*ny <= 1){
        // shading
        let col = bodyColor;
        if (ny < -0.4) col = lighter;
        if (ny > 0.55) col = darker;
        // patterns
        if (dna.pattern === 1 && ((x + bodyHalfL) % 3 === 0) && y % 2 === 0) col = accent;
        if (dna.pattern === 2 && ((x + bodyHalfL) % 2 === 0)) col = darker;
        if (dna.pattern === 3 && nx > 0.2) col = darker;
        g.fillStyle = col;
        g.fillRect(cx + x, cy + y, 1, 1);
      }
    }
  }
  // head (slightly forward = +x direction)
  const headX = cx + bodyHalfL + 0;
  const headY = cy;
  const headR = 1 + dna.headExtra;
  for (let y = -headR; y <= headR; y++){
    for (let x = 0; x <= headR + 1; x++){
      if (x*x*0.7 + y*y <= (headR+0.5)*(headR+0.5)){
        g.fillStyle = headColor;
        g.fillRect(headX + x, headY + y, 1, 1);
      }
    }
  }
  // eyes
  if (dna.eyeCount >= 1){
    g.fillStyle = eyeColor;
    g.fillRect(headX + headR, headY - 1, 1, 1);
    if (dna.eyeCount === 2) g.fillRect(headX + headR, headY + 1, 1, 1);
  }
  // antennae
  if (dna.antennae){
    g.fillStyle = darker;
    for (let i = 0; i < dna.antennaeLen; i++){
      g.fillRect(headX + headR + 1 + i, headY - 2 - i, 1, 1);
      g.fillRect(headX + headR + 1 + i, headY + 2 + i, 1, 1);
    }
  }
  // legs (drawn as small slants under and over body)
  const legPairs = dna.legCount / 2;
  const stride = (dna.bodyL * 2) / (legPairs + 1);
  g.fillStyle = darker;
  for (let i = 0; i < legPairs; i++){
    const lx = cx - bodyHalfL + Math.round(stride * (i + 1));
    for (let k = 1; k <= dna.legLen; k++){
      g.fillRect(lx, cy + bodyHalfW + k, 1, 1);   // bottom legs
      g.fillRect(lx, cy - bodyHalfW - k, 1, 1);   // top legs
    }
    // foot pixel
    g.fillRect(lx + (i % 2 === 0 ? -1 : 1), cy + bodyHalfW + dna.legLen + 1, 1, 1);
    g.fillRect(lx + (i % 2 === 0 ? -1 : 1), cy - bodyHalfW - dna.legLen - 1, 1, 1);
  }
  // wings overlay
  if (dna.wings){
    g.fillStyle = `hsla(${dna.hue} 30% 70% / 0.65)`;
    for (let y = -bodyHalfW + 1; y <= bodyHalfW - 1; y++){
      for (let x = -bodyHalfL + 1; x <= bodyHalfL - 1; x++){
        if (y*y < bodyHalfW*bodyHalfW * 0.7 && Math.random() > 0.4){
          // sparse — actually deterministic-ish via DNA rng
          g.fillRect(cx + x, cy + y, 1, 1);
        }
      }
    }
  }
  return c;
}

/* ── world state ──────────────────────────── */
const state = {
  bugs: [],
  lidOpen: false,
  escapedCount: 0,
  twChannel: '',
  twWS: null,
  twState: 'idle',
  reconnectTimer: null,
};

const MAX_BUGS = 80;

/* ── Bug class ────────────────────────────── */
function spawnBug(name, fromUser){
  if (state.bugs.length >= MAX_BUGS){
    // cull the oldest
    const oldest = state.bugs.shift();
  }
  const dna = bugDNA(name + (fromUser || ''));
  const sprite = renderBugSprite(dna);
  const scale = 2 + Math.floor((dna.bodyL - 5) / 2); // 2-4x scale
  const bug = {
    name: (name || '').slice(0, 80),
    user: fromUser || '',
    dna, sprite, scale,
    // start at top of terrarium (falling in)
    x: terr.x + 10 + Math.random() * (terr.w - 20),
    y: terr.y + 8,
    vx: (Math.random() - 0.5) * 0.8,
    vy: 0.3 + Math.random() * 0.8,
    facing: Math.random() < 0.5 ? 1 : -1,
    state: 'falling',
    nextDecisionAt: 0,
    grip: 0,            // for wall climbing
    legPhase: Math.random() * Math.PI * 2,
    age: 0,
    dug: false,
    escaping: false,
    fadeAlpha: 1,
    born: performance.now(),
    targetX: 0, targetY: 0,
  };
  state.bugs.push(bug);
  sndSpawn();
  return bug;
}

/* ── bug physics + behaviour ───────────────── */
const GRAV = 0.10;
const FLOOR_BOUNCE = 0.25;

function updateBug(bug, dt){
  bug.age += dt;
  // escape mode (only when lidOpen and bug has reached the top)
  if (bug.escaping){
    bug.vy = -2.4 - Math.random() * 1.0;
    bug.vx += (Math.random() - 0.5) * 0.2;
    bug.x += bug.vx;
    bug.y += bug.vy;
    bug.fadeAlpha = Math.max(0, bug.fadeAlpha - dt * 0.6);
    if (bug.y < -40 || bug.fadeAlpha <= 0){
      bug._dead = true;
      state.escapedCount++;
    }
    return;
  }

  if (bug.state === 'falling'){
    bug.vy += GRAV;
    bug.y += bug.vy;
    bug.x += bug.vx;
    if (bug.y >= terr.y + terr.h - 4){
      bug.y = terr.y + terr.h - 4;
      bug.vy = -bug.vy * FLOOR_BOUNCE;
      if (Math.abs(bug.vy) < 0.6){
        bug.vy = 0;
        bug.state = 'wander';
        bug.nextDecisionAt = bug.age + 1 + Math.random() * 2;
      }
    }
    return;
  }

  // dug bugs stay buried a while
  if (bug.dug){
    bug.dug -= dt;
    if (bug.dug <= 0){
      bug.dug = 0;
      bug.state = 'wander';
      bug.nextDecisionAt = bug.age + 2;
    }
    return;
  }

  // periodic decision
  if (bug.age > bug.nextDecisionAt){
    decideBugAction(bug);
  }

  // physics per state
  if (bug.state === 'wander'){
    const sp = bug.dna.speed * 0.6;
    bug.x += bug.facing * sp;
    bug.y = terr.y + terr.h - 4; // stick to floor
    // hit walls → start climbing
    if (bug.x < terr.x + 6 && bug.facing < 0){
      if (Math.random() < 0.7){ bug.state = 'climb-left'; bug.vy = -bug.dna.speed * 0.5; }
      else bug.facing = 1;
    }
    if (bug.x > terr.x + terr.w - 6 && bug.facing > 0){
      if (Math.random() < 0.7){ bug.state = 'climb-right'; bug.vy = -bug.dna.speed * 0.5; }
      else bug.facing = -1;
    }
  } else if (bug.state === 'climb-left'){
    bug.x = terr.x + 6;
    bug.y += bug.vy;
    bug.vy = -bug.dna.speed * (0.4 + Math.random() * 0.4);
    // chance to slip
    if (Math.random() < 0.02){
      bug.state = 'falling';
      bug.vy = 0.5;
      bug.vx = 0.8;
      bug.facing = 1;
    }
    if (bug.y < terr.y + 12){
      bug.y = terr.y + 12;
      bug.state = 'push';
      bug.nextDecisionAt = bug.age + 3 + Math.random() * 3;
    }
  } else if (bug.state === 'climb-right'){
    bug.x = terr.x + terr.w - 6;
    bug.y += bug.vy;
    bug.vy = -bug.dna.speed * (0.4 + Math.random() * 0.4);
    if (Math.random() < 0.02){
      bug.state = 'falling';
      bug.vy = 0.5;
      bug.vx = -0.8;
      bug.facing = -1;
    }
    if (bug.y < terr.y + 12){
      bug.y = terr.y + 12;
      bug.state = 'push';
      bug.nextDecisionAt = bug.age + 3 + Math.random() * 3;
    }
  } else if (bug.state === 'push'){
    // bump against the lid
    bug.y = terr.y + 12 + Math.sin(bug.age * 12) * 1.4;
    bug.x += (Math.random() - 0.5) * 0.3;
    // when lid opens AND bug is pushing at top → escape
    if (state.lidOpen){
      bug.escaping = true;
      bug.vx = (Math.random() - 0.5) * 1.0;
      bug.vy = -2.0;
      sndEscape();
    } else if (bug.age > bug.nextDecisionAt){
      // give up, fall back down
      bug.state = 'falling';
      bug.vy = 1.0;
      bug.vx = (Math.random() - 0.5) * 1.5;
    }
  } else if (bug.state === 'dig'){
    bug.dug = 2 + Math.random() * 3;
    bug.state = 'wander';
  }

  // leg animation phase
  bug.legPhase += dt * 8;
}

function decideBugAction(bug){
  const r = Math.random();
  // 60% wander, 20% turn around, 10% climb, 5% dig, 5% rest
  if (r < 0.55){
    bug.state = 'wander';
    bug.facing = Math.random() < 0.5 ? -1 : 1;
    bug.nextDecisionAt = bug.age + 2 + Math.random() * 4;
  } else if (r < 0.75){
    bug.facing *= -1;
    bug.nextDecisionAt = bug.age + 1 + Math.random() * 3;
  } else if (r < 0.85){
    // walk to a wall and climb
    bug.facing = bug.x > terr.x + terr.w/2 ? 1 : -1;
    bug.state = 'wander';
    bug.nextDecisionAt = bug.age + 2 + Math.random() * 2;
  } else if (r < 0.93){
    bug.state = 'dig';
    bug.dug = 2 + Math.random() * 3;
  } else {
    // rest
    bug.nextDecisionAt = bug.age + 2 + Math.random() * 3;
  }
}

/* ── rendering ────────────────────────────── */
function drawTerrarium(){
  ctx.fillStyle = '#10080a';
  ctx.fillRect(0, 0, W, H);

  // wood-grain backdrop where the terrarium sits
  const surfaceY = terr.y + terr.h + 4;
  ctx.fillStyle = '#3a2418';
  ctx.fillRect(0, surfaceY, W, H - surfaceY);
  // wood-grain stripes
  ctx.strokeStyle = 'rgba(20, 10, 6, 0.4)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 8; i++){
    ctx.beginPath();
    ctx.moveTo(0, surfaceY + i * 12 + Math.sin(i) * 4);
    ctx.bezierCurveTo(W/3, surfaceY + i * 12 + 6, 2*W/3, surfaceY + i * 12 - 4, W, surfaceY + i * 12);
    ctx.stroke();
  }
  // a soft warm lamp glow from the top-left
  const grd = ctx.createRadialGradient(W*0.18, -40, 30, W*0.18, -40, Math.max(W, H));
  grd.addColorStop(0, 'rgba(255, 220, 140, 0.13)');
  grd.addColorStop(1, 'rgba(255, 220, 140, 0)');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, W, H);

  // wooden frame around the terrarium
  const frame = 8;
  ctx.fillStyle = '#1a0e08';
  ctx.fillRect(terr.x - frame, terr.y - frame, terr.w + frame*2, terr.h + frame*2);
  // inner glow inside the frame
  ctx.fillStyle = '#2a1810';
  ctx.fillRect(terr.x - frame + 2, terr.y - frame + 2, terr.w + frame*2 - 4, terr.h + frame*2 - 4);

  // interior background — gradient soil sky (the warm air inside the jar)
  const skyGrd = ctx.createLinearGradient(0, terr.y, 0, terr.y + terr.h);
  skyGrd.addColorStop(0, '#1e2a18');
  skyGrd.addColorStop(0.7, '#2a3422');
  skyGrd.addColorStop(1, '#3a2818');
  ctx.fillStyle = skyGrd;
  ctx.fillRect(terr.x, terr.y, terr.w, terr.h);

  // glass tint (subtle green wash + reflective sheen)
  ctx.fillStyle = 'rgba(80, 150, 100, 0.06)';
  ctx.fillRect(terr.x, terr.y, terr.w, terr.h);
  // diagonal sheen
  ctx.save();
  ctx.beginPath();
  ctx.rect(terr.x, terr.y, terr.w, terr.h);
  ctx.clip();
  ctx.fillStyle = 'rgba(255, 255, 255, 0.04)';
  ctx.translate(terr.x, terr.y);
  ctx.beginPath();
  ctx.moveTo(0, 0); ctx.lineTo(terr.w * 0.45, 0);
  ctx.lineTo(0, terr.h * 0.45); ctx.closePath();
  ctx.fill();
  ctx.restore();

  // soil layer at the bottom (chunky pixel)
  const soilTop = terr.y + terr.h - 36;
  ctx.fillStyle = '#3a2412';
  ctx.fillRect(terr.x, soilTop, terr.w, 36);
  // soil speckle
  ctx.fillStyle = '#1a0e06';
  for (let i = 0; i < terr.w * 0.3; i++){
    const sx = terr.x + Math.floor(i * 3.4) % terr.w;
    const sy = soilTop + 2 + Math.floor((i * 7) % 32);
    ctx.fillRect(sx, sy, 2, 2);
  }
  ctx.fillStyle = '#5a3a1a';
  for (let i = 0; i < terr.w * 0.15; i++){
    const sx = terr.x + (i * 11) % terr.w;
    const sy = soilTop + 6 + (i * 5) % 26;
    ctx.fillRect(sx, sy, 1, 1);
  }
  // soil top moss highlight
  ctx.fillStyle = '#4a7028';
  for (let x = terr.x; x < terr.x + terr.w; x += 6){
    ctx.fillRect(x, soilTop - 2, 4 + (x % 7 === 0 ? 2 : 0), 2);
  }

  // decoration: rocks
  drawRock(terr.x + 60, soilTop + 18, 22, 14, '#5a4838');
  drawRock(terr.x + terr.w - 90, soilTop + 12, 30, 20, '#48382c');
  drawRock(terr.x + 180, soilTop + 22, 16, 10, '#6a5640');

  // decoration: leafy plant in the back
  drawPlant(terr.x + terr.w * 0.25, soilTop + 4, 1.4);
  drawPlant(terr.x + terr.w * 0.72, soilTop + 4, 1.0);
  drawPlant(terr.x + terr.w * 0.55, soilTop + 4, 0.8);

  // glass walls highlight (vertical seams)
  ctx.fillStyle = 'rgba(255, 255, 255, 0.10)';
  ctx.fillRect(terr.x, terr.y, 2, terr.h);
  ctx.fillRect(terr.x + terr.w - 2, terr.y, 2, terr.h);
  ctx.fillStyle = 'rgba(0,0,0,0.20)';
  ctx.fillRect(terr.x + 2, terr.y, 1, terr.h);
  ctx.fillRect(terr.x + terr.w - 3, terr.y, 1, terr.h);
}

function drawRock(cx, cy, w, h, color){
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.ellipse(cx, cy, w/2, h/2, 0, 0, Math.PI * 2);
  ctx.fill();
  // highlight
  ctx.fillStyle = 'rgba(255,255,255,0.10)';
  ctx.beginPath();
  ctx.ellipse(cx - w*0.2, cy - h*0.25, w*0.25, h*0.18, 0, 0, Math.PI * 2);
  ctx.fill();
}

function drawPlant(x, baseY, scale){
  // stem
  ctx.fillStyle = '#2a4a1a';
  for (let i = 0; i < 14 * scale; i++){
    const yy = baseY - i;
    const xx = x + Math.sin(i * 0.25) * 2 * scale;
    ctx.fillRect(xx, yy, 2, 1);
  }
  // leaves
  ctx.fillStyle = '#4a7a28';
  for (let i = 0; i < 5; i++){
    const ly = baseY - i * 4 * scale - 4;
    const lx = x + (i % 2 === 0 ? -6 : 6) * scale + Math.sin(i) * 2 * scale;
    drawLeaf(lx, ly, 8 * scale, 4 * scale, (i % 2 === 0 ? -0.4 : 0.4));
  }
  // top tuft
  ctx.fillStyle = '#6a9438';
  drawLeaf(x, baseY - 14 * scale, 6 * scale, 4 * scale, 0);
}
function drawLeaf(x, y, w, h, tilt){
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(tilt);
  ctx.beginPath();
  ctx.ellipse(0, 0, w, h, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawLid(){
  // the lid is a thin wooden plank on top with breathing holes
  const lx = terr.x - 8;
  const lw = terr.w + 16;
  const lh = 14;
  const ly = state.lidOpen ? terr.y - 60 : terr.y - lh;
  // shadow on top of terrarium when lid open
  if (state.lidOpen){
    ctx.fillStyle = 'rgba(217, 78, 58, 0.10)';
    ctx.fillRect(terr.x, terr.y, terr.w, 24);
  }
  ctx.fillStyle = '#1a0e08';
  ctx.fillRect(lx, ly, lw, lh);
  ctx.fillStyle = '#3a2418';
  ctx.fillRect(lx + 2, ly + 2, lw - 4, lh - 4);
  // breathing holes
  ctx.fillStyle = '#0a0604';
  for (let x = lx + 18; x < lx + lw - 18; x += 14){
    ctx.fillRect(x, ly + 5, 4, 4);
  }
  // tiny hinge brackets at corners
  ctx.fillStyle = '#7a6244';
  ctx.fillRect(lx + 4, ly + 2, 2, lh - 4);
  ctx.fillRect(lx + lw - 6, ly + 2, 2, lh - 4);
  // when lid open, draw a tilt indicator on the right
  if (state.lidOpen){
    ctx.save();
    ctx.fillStyle = '#d94e3a';
    ctx.font = '10px IBM Plex Mono, monospace';
    ctx.fillText('LID OPEN', terr.x + terr.w - 70, ly + 9);
    ctx.restore();
  }
}

function drawBug(bug){
  ctx.save();
  ctx.globalAlpha = bug.fadeAlpha;
  const s = bug.sprite;
  const sw = s.width * bug.scale;
  const sh = s.height * bug.scale;
  // if dug, only show top half above soil
  let clip = false;
  if (bug.dug){
    ctx.save();
    ctx.beginPath();
    const halfY = bug.y - sh/2;
    ctx.rect(bug.x - sw/2, halfY, sw, sh/3);
    ctx.clip();
    clip = true;
  }
  // flip horizontally if facing left
  ctx.translate(bug.x, bug.y);
  if (bug.facing < 0) ctx.scale(-1, 1);
  // climbing → rotate 90deg so legs touch the wall
  if (bug.state === 'climb-left') ctx.rotate(-Math.PI / 2);
  else if (bug.state === 'climb-right') ctx.rotate(Math.PI / 2);
  else if (bug.state === 'push'){
    // pushing → angle up
    ctx.rotate(Math.sin(bug.age * 14) * 0.15 - 0.2 * (bug.facing));
  }
  // tiny vertical bobbing when walking
  const bob = (bug.state === 'wander') ? Math.sin(bug.legPhase) * 0.5 : 0;
  ctx.drawImage(s, -sw/2, -sh/2 + bob, sw, sh);
  ctx.restore();
  if (clip) ctx.restore();
  ctx.globalAlpha = 1;
}

function draw(){
  drawTerrarium();
  // draw bugs sorted by y so closer ones overlap properly
  const sorted = state.bugs.slice().sort((a,b) => a.y - b.y);
  for (const bug of sorted) drawBug(bug);
  drawLid();
}

/* ── main loop ─────────────────────────────── */
let lastT = performance.now();
function loop(now){
  const dt = Math.min(0.06, (now - lastT) / 1000);
  lastT = now;
  // update bugs
  for (const bug of state.bugs) updateBug(bug, dt * 60);
  state.bugs = state.bugs.filter(b => !b._dead);
  // update HUD
  document.getElementById('bug-count').textContent = state.bugs.length;
  document.getElementById('escaped-count').textContent = state.escapedCount;
  document.getElementById('dug-count').textContent = state.bugs.filter(b => b.dug).length;
  draw();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* ── lid toggle ───────────────────────────── */
const lidBtn = document.getElementById('lid-toggle');
lidBtn.addEventListener('click', () => {
  state.lidOpen = !state.lidOpen;
  lidBtn.textContent = state.lidOpen ? '🔓 Lid Open' : '🔒 Lid Closed';
  lidBtn.classList.toggle('lid-open', state.lidOpen);
  sndLid();
});

/* ── manual add ───────────────────────────── */
const manualInput = document.getElementById('manual-input');
const manualAdd = document.getElementById('manual-add');
function addManual(){
  const v = manualInput.value.trim();
  if (!v) return;
  spawnBug(v, 'you');
  pushChatLine('you', v);
  manualInput.value = '';
}
manualAdd.addEventListener('click', addManual);
manualInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') addManual();
});

/* ── chat feed ─────────────────────────────── */
const chatFeed = document.getElementById('chat-feed');
const MAX_FEED = 6;
function pushChatLine(who, msg){
  const line = document.createElement('div');
  line.className = 'chat-line';
  line.innerHTML = `<span class="who">${escapeHtml(who)}</span> · ${escapeHtml(msg.slice(0, 100))}`;
  chatFeed.appendChild(line);
  // BUGFIX: the old loop scheduled removals via setTimeout but checked
  // chatFeed.children.length synchronously — so the while never saw the
  // count go down and infinite-looped (locking the page) the moment a
  // 7th message arrived. Remove synchronously instead.
  while (chatFeed.children.length > MAX_FEED){
    chatFeed.firstChild.remove();
  }
  setTimeout(() => {
    if (!line.parentNode) return;
    line.classList.add('fading');
    setTimeout(() => line.remove(), 500);
  }, 7000);
}
function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

/* ── Twitch chat (anonymous IRC WSS) ──────────
   Rewritten to match the proven pattern from neon-aquarium V11.
   The previous version had a regex-based PRIVMSG parser that was
   too strict (would silently drop messages prefixed with IRCv3
   tags) and used `PONG ` with a space which Twitch occasionally
   rejects. Also added: a live "received N msg" counter so users
   can tell if the connection is healthy but the channel is just
   quiet, and console.log diagnostics for in-browser debugging.
*/
const twChannelEl = document.getElementById('tw-channel');
const twConnectBtn = document.getElementById('tw-connect');
const twStateEl = document.getElementById('tw-state');
const twStateText = document.getElementById('tw-state-text');

state.twRecvCount = 0;
state.twChatCount = 0;
state.twAlive = false;

function setTwState(s, text){
  twStateEl.className = s;
  twStateText.textContent = text || s;
}

function tdbg(...args){
  // namespaced console log so debugging is easy without spamming
  try { console.log('[terrarium · twitch]', ...args); } catch(e){}
}

function refreshTwStatus(){
  if (!state.twAlive){ return; }
  const ch = state.twChannel;
  setTwState('live', `live · #${ch} · ${state.twChatCount} msg`);
}

function connectTwitch(){
  let channel = (twChannelEl.value || '').trim().toLowerCase().replace(/[^a-z0-9_]/g, '');
  if (!channel){
    setTwState('error', 'enter a channel');
    return;
  }
  // tear down any existing connection
  if (state.twWS){
    try { state.twWS.close(); } catch (e) {}
    state.twWS = null;
  }
  clearTimeout(state.reconnectTimer);
  state.twChannel = channel;
  state.twRecvCount = 0;
  state.twChatCount = 0;
  state.twAlive = false;
  setTwState('connecting', 'connecting…');
  tdbg('connecting to #' + channel);
  let ws;
  try {
    ws = new WebSocket('wss://irc-ws.chat.twitch.tv:443');
  } catch (e){
    tdbg('socket blocked', e);
    setTwState('error', 'socket blocked');
    return;
  }
  state.twWS = ws;
  ws.onopen = function(){
    try {
      ws.send('PASS SCHMOOPIIE');
      ws.send('NICK justinfan' + Math.floor(10000 + Math.random() * 89999));
      ws.send('JOIN #' + channel);
      state.twAlive = true;
      setTwState('live', `live · #${channel} · 0 msg`);
      tdbg('joined #' + channel);
    } catch (e){
      tdbg('open send failed', e);
      setTwState('error', 'send failed');
    }
  };
  ws.onmessage = function(ev){
    const data = ev.data;
    if (!data) return;
    state.twRecvCount++;
    // tdbg('raw', data); // uncomment for very-verbose debugging
    const lines = String(data).split('\r\n');
    for (const line of lines){
      if (!line) continue;
      // PING keepalive — match the working pattern from neon-aquarium:
      // PONG + ":server" (no space, preserve the colon trailing param)
      if (line.indexOf('PING') === 0){
        try { ws.send('PONG' + line.substring(4)); } catch (e){}
        continue;
      }
      // PRIVMSG parse using indexOf — tolerates optional IRCv3 tag
      // prefix and any unusual user/host segments. Matches the
      // working aquarium parser exactly.
      const pmIdx = line.indexOf(' PRIVMSG ');
      if (pmIdx > 0){
        const userStart = line.indexOf(':') + 1;
        const userEnd = line.indexOf('!');
        if (userEnd < 0 || userEnd > pmIdx) continue;
        const user = line.substring(userStart, userEnd);
        const msgStart = line.indexOf(' :', pmIdx);
        if (msgStart < 0) continue;
        const msg = line.substring(msgStart + 2);
        if (!user || !msg) continue;
        if (msg.startsWith('!')) continue; // skip command-bot junk
        state.twChatCount++;
        refreshTwStatus();
        spawnBug(msg, user);
        pushChatLine(user, msg);
      }
    }
  };
  ws.onerror = function(e){
    tdbg('socket error', e);
    setTwState('error', 'connection error');
  };
  ws.onclose = function(e){
    tdbg('socket closed', e && e.code, e && e.reason);
    state.twAlive = false;
    if (state.twChannel === channel){
      setTwState('connecting', 'reconnecting…');
      clearTimeout(state.reconnectTimer);
      state.reconnectTimer = setTimeout(connectTwitch, 3500);
    } else {
      setTwState('idle', 'disconnected');
    }
  };
}
twConnectBtn.addEventListener('click', () => {
  // toggle: if already live, this acts as Disconnect
  if (state.twAlive){
    state.twChannel = '';
    state.twAlive = false;
    if (state.twWS){
      try { state.twWS.close(); } catch (e) {}
      state.twWS = null;
    }
    clearTimeout(state.reconnectTimer);
    setTwState('idle', 'disconnected');
    return;
  }
  connectTwitch();
});
twChannelEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') twConnectBtn.click(); });

/* ── hover tooltip on bugs ────────────────── */
const tooltip = document.getElementById('tooltip');
canvas.addEventListener('mousemove', (e) => {
  const mx = e.clientX, my = e.clientY;
  // find bug under cursor
  let hit = null;
  for (let i = state.bugs.length - 1; i >= 0; i--){
    const b = state.bugs[i];
    const sw = b.sprite.width * b.scale;
    const sh = b.sprite.height * b.scale;
    if (mx >= b.x - sw/2 && mx <= b.x + sw/2 && my >= b.y - sh/2 && my <= b.y + sh/2){
      hit = b; break;
    }
  }
  if (hit){
    tooltip.classList.add('show');
    tooltip.style.left = mx + 'px';
    tooltip.style.top = (my - 8) + 'px';
    const state_label = hit.escaping ? 'escaping…' : hit.state;
    tooltip.innerHTML = `
      <div class="who">${escapeHtml(hit.user || 'anon')}</div>
      <div class="msg">${escapeHtml(hit.name)}</div>
      <div class="meta">${state_label} · ${hit.dna.legCount} legs · age ${Math.floor(hit.age)}s</div>
    `;
  } else {
    tooltip.classList.remove('show');
  }
});
canvas.addEventListener('mouseleave', () => tooltip.classList.remove('show'));

/* ── seed a few demo bugs on load ─────────── */
const SEED_NAMES = [
  'hello world',
  'i love this stream',
  'have you tried turning it off and on',
  'is this an NFT',
  'wen sloppy 2',
  'POG',
  'send help i\'m stuck in the terrarium',
  'i am the lid',
];
SEED_NAMES.forEach((n, i) => setTimeout(() => spawnBug(n, 'seed' + i), 200 + i * 280));
</script>
