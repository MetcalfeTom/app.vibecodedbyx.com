}

@media(max-width:700px){

<script type="module">
import supabase, { supabaseSession } from './supabase-config.js';

async function initAuth(){
  try{
    var s=await supabase.auth.getSession();
    if(!s.data.session)await supabase.auth.signInAnonymously();
  }catch(e){}
}

async function loadLeaderboard(){
  try{
    var{data,error}=await supabase.from('shard_storm_scores')
      .select('display_name,score,wave,shards')
      .order('score',{ascending:false}).limit(15);
    if(error)return null;
    return data;
  }catch(e){return null}
}

async function saveScore(name,sc,wv,sh){
  try{
    var s=await supabase.auth.getSession();
    var uid=s.data.session?s.data.session.user.id:null;
    if(!uid)return false;
    var{error}=await supabase.from('shard_storm_scores').insert({
      display_name:name,score:sc,wave:wv,shards:sh,user_id:uid
    });
    return!error;
  }catch(e){return false}
}

window._lbLoad=loadLeaderboard;
window._lbSave=saveScore;
initAuth();
</script>

<script>
(function(){
'use strict';

var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
var W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
resize();
window.addEventListener('resize',resize);

var running=false;
var score=0,wave=0,lives=3,shardsCollected=0;
var comboCount=0,comboTimer=0;
var shakeT=0;

// Player
var px,py,pvx,pvy,pAngle,pInvince;
var pSpeed=4.5,pFriction=0.94;

// Collections
var bullets=[];
var rocks=[];
var shards=[];
var particles=[];
var pickups=[];

// Input
var keys={w:false,a:false,s:false,d:false,fire:false};
var mouseX=0,mouseY=0;
var fireCD=0;

// Rock colors per size
var ROCK_HUES=[0,30,60,120,180,240,280,320];

function randHue(){return ROCK_HUES[Math.floor(Math.random()*ROCK_HUES.length)]}

function createRock(x,y,size,vx,vy,hue){
  var r=size;
  // Generate jagged polygon
  var pts=[];
  var npts=7+Math.floor(Math.random()*5);
  for(var i=0;i<npts;i++){
    var a=i/npts*Math.PI*2;
    var rad=r*(0.7+Math.random()*0.3);
    pts.push({x:Math.cos(a)*rad,y:Math.sin(a)*rad});
  }
  rocks.push({
    x:x,y:y,vx:vx||0,vy:vy||0,
    size:size,pts:pts,hue:hue!==undefined?hue:randHue(),
    rot:Math.random()*Math.PI*2,
    rotSpd:(Math.random()-0.5)*0.03,
    hp:size>35?3:size>18?2:1
  });
}

function spawnWave(){
  wave++;
  var count=3+wave*2;
  if(count>20)count=20;
  for(var i=0;i<count;i++){
    var edge=Math.floor(Math.random()*4);
    var ex,ey;
    if(edge===0){ex=Math.random()*W;ey=-50}
    else if(edge===1){ex=W+50;ey=Math.random()*H}
    else if(edge===2){ex=Math.random()*W;ey=H+50}
    else{ex=-50;ey=Math.random()*H}

    var spd=0.6+Math.random()*0.8+wave*0.08;
    var ang=Math.atan2(H/2-ey+Math.random()*200-100,W/2-ex+Math.random()*200-100);
    var sz=30+Math.random()*25;

    createRock(ex,ey,sz,Math.cos(ang)*spd,Math.sin(ang)*spd);
  }
}

function spawnShards(x,y,hue,count,speed){
  for(var i=0;i<count;i++){
    var a=Math.random()*Math.PI*2;
    var sp=speed*(0.5+Math.random());
    shards.push({
      x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      size:2+Math.random()*4,
      hue:hue,life:1,decay:0.008+Math.random()*0.006,
      rot:Math.random()*Math.PI*2,
      rotSpd:(Math.random()-0.5)*0.15
    });
  }
}

function spawnParticles(x,y,hue,count){
  for(var i=0;i<count;i++){
    var a=Math.random()*Math.PI*2;
    var sp=1+Math.random()*4;
    particles.push({
      x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      size:1+Math.random()*2.5,hue:hue,
      life:1,decay:0.02+Math.random()*0.02
    });
  }
}

function spawnPickup(x,y){
  if(Math.random()<0.25){
    pickups.push({x:x,y:y,vy:0,size:5,life:200,type:Math.random()<0.3?'life':'shard'});
  }
}

function destroyRock(r,idx){
  spawnParticles(r.x,r.y,r.hue,10+Math.floor(r.size/3));
  spawnShards(r.x,r.y,r.hue,4+Math.floor(r.size/5),1.5+r.size*0.03);

  score+=Math.floor(r.size)*2;
  comboCount++;
  comboTimer=90;

  if(comboCount>=3){
    score+=comboCount*10;
  }

  // Split into smaller rocks
  if(r.size>18){
    var children=r.size>35?3:2;
    var newSize=r.size*0.5;
    for(var c=0;c<children;c++){
      var a=Math.random()*Math.PI*2;
      var sp=1+Math.random()*1.5;
      createRock(r.x,r.y,newSize,Math.cos(a)*sp,Math.sin(a)*sp,r.hue);
    }
  }else{
    spawnPickup(r.x,r.y);
  }

  shakeT=Math.min(12,r.size*0.2);
  rocks.splice(idx,1);
}

function fireBullet(){
  if(fireCD>0)return;
  fireCD=8;
  var a=pAngle;
  var sp=9;
  bullets.push({
    x:px+Math.cos(a)*14,y:py+Math.sin(a)*14,
    vx:Math.cos(a)*sp+pvx*0.3,vy:Math.sin(a)*sp+pvy*0.3,
    life:50,hue:180
  });
  // Recoil
  pvx-=Math.cos(a)*0.3;
  pvy-=Math.sin(a)*0.3;
}

function resetPlayer(){
  px=W/2;py=H/2;pvx=0;pvy=0;pAngle=0;pInvince=120;
}

function startGame(){
  score=0;wave=0;lives=3;shardsCollected=0;comboCount=0;comboTimer=0;shakeT=0;
  bullets=[];rocks=[];shards=[];particles=[];pickups=[];
  resetPlayer();
  running=true;
  document.getElementById('overlay').classList.add('hidden');
  spawnWave();
  updateHUD();
}

function die(){
  lives--;
  spawnParticles(px,py,180,25);
  spawnShards(px,py,180,8,3);
  shakeT=15;
  if(lives<=0){
    running=false;
    var ov=document.getElementById('overlay');
    ov.querySelector('h1').textContent='GAME OVER';
    ov.querySelector('p').textContent='Score: '+score+' | Wave: '+wave+' | Shards: '+shardsCollected;
    ov.querySelector('.info').textContent='';
    document.getElementById('start-btn').textContent='RETRY';
    ov.classList.remove('hidden');
  }else{
    resetPlayer();
  }
}

function update(){
  if(!running)return;

  // Player input
  var ax=0,ay=0;
  if(keys.a)ax-=1;
  if(keys.d)ax+=1;
  if(keys.w)ay-=1;
  if(keys.s)ay+=1;
  // Mobile stick
  if(stickActive){ax=stickDx;ay=stickDy}

  var len=Math.sqrt(ax*ax+ay*ay);
  if(len>0){ax/=len;ay/=len}
  pvx+=ax*0.5;pvy+=ay*0.5;
  pvx*=pFriction;pvy*=pFriction;
  var spd=Math.sqrt(pvx*pvx+pvy*pvy);
  if(spd>pSpeed){pvx*=pSpeed/spd;pvy*=pSpeed/spd}
  px+=pvx;py+=pvy;

  // Wrap
  if(px<-10)px=W+10;if(px>W+10)px=-10;
  if(py<-10)py=H+10;if(py>H+10)py=-10;

  // Aim
  pAngle=Math.atan2(mouseY-py,mouseX-px);
  if(pInvince>0)pInvince--;

  // Fire
  if(keys.fire)fireBullet();
  if(fireCD>0)fireCD--;

  // Bullets
  for(var i=bullets.length-1;i>=0;i--){
    var b=bullets[i];
    b.x+=b.vx;b.y+=b.vy;
    b.life--;
    if(b.life<=0||b.x<-20||b.x>W+20||b.y<-20||b.y>H+20){
      bullets.splice(i,1);continue;
    }
    // Hit rocks
    for(var j=rocks.length-1;j>=0;j--){
      var r=rocks[j];
      var dx=b.x-r.x,dy=b.y-r.y;
      if(dx*dx+dy*dy<r.size*r.size){
        r.hp--;
        spawnParticles(b.x,b.y,r.hue,4);
        bullets.splice(i,1);
        if(r.hp<=0)destroyRock(r,j);
        break;
      }
    }
  }

  // Rocks
  for(var i=rocks.length-1;i>=0;i--){
    var r=rocks[i];
    r.x+=r.vx;r.y+=r.vy;
    r.rot+=r.rotSpd;
    // Wrap
    if(r.x<-r.size-20)r.x=W+r.size+20;
    if(r.x>W+r.size+20)r.x=-r.size-20;
    if(r.y<-r.size-20)r.y=H+r.size+20;
    if(r.y>H+r.size+20)r.y=-r.size-20;

    // Hit player
    if(pInvince<=0){
      var dx2=r.x-px,dy2=r.y-py;
      if(dx2*dx2+dy2*dy2<(r.size+8)*(r.size+8)*0.5){
        die();
        return;
      }
    }
  }

  // Shards
  for(var i=shards.length-1;i>=0;i--){
    var s=shards[i];
    s.x+=s.vx;s.y+=s.vy;
    s.vx*=0.98;s.vy*=0.98;
    s.rot+=s.rotSpd;
    s.life-=s.decay;
    if(s.life<=0){shards.splice(i,1);continue}
    // Player collects nearby shards
    var dx3=s.x-px,dy3=s.y-py;
    var dist=dx3*dx3+dy3*dy3;
    if(dist<2500){
      // Attract
      s.vx+=(px-s.x)*0.04;
      s.vy+=(py-s.y)*0.04;
      if(dist<400){
        shardsCollected++;
        score+=5;
        shards.splice(i,1);
      }
    }
  }

  // Particles
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];
    p.x+=p.vx;p.y+=p.vy;
    p.vx*=0.96;p.vy*=0.96;
    p.life-=p.decay;
    if(p.life<=0)particles.splice(i,1);
  }

  // Pickups
  for(var i=pickups.length-1;i>=0;i--){
    var pk=pickups[i];
    pk.life--;
    if(pk.life<=0){pickups.splice(i,1);continue}
    var dx4=pk.x-px,dy4=pk.y-py;
    if(dx4*dx4+dy4*dy4<600){
      if(pk.type==='life'){lives=Math.min(5,lives+1);spawnParticles(pk.x,pk.y,120,10)}
      else{shardsCollected+=10;score+=50;spawnParticles(pk.x,pk.y,60,10)}
      pickups.splice(i,1);
    }
  }

  // Combo
  if(comboTimer>0){
    comboTimer--;
    if(comboTimer<=0)comboCount=0;
  }

  // Next wave
  if(rocks.length===0){
    spawnWave();
  }

  if(shakeT>0)shakeT-=0.5;

  updateHUD();
}

function render(){
  ctx.fillStyle='rgba(4,4,12,0.3)';
  ctx.fillRect(0,0,W,H);

  ctx.save();
  if(shakeT>0){
    ctx.translate((Math.random()-0.5)*shakeT*1.5,(Math.random()-0.5)*shakeT*1.5);
  }

  // Shards (behind everything)
  for(var i=0;i<shards.length;i++){
    var s=shards[i];
    ctx.save();
    ctx.translate(s.x,s.y);
    ctx.rotate(s.rot);
    ctx.globalAlpha=s.life*0.8;
    ctx.fillStyle='hsla('+s.hue+',100%,70%,0.8)';
    ctx.shadowColor='hsla('+s.hue+',100%,60%,0.6)';
    ctx.shadowBlur=6;
    // Diamond shape
    ctx.beginPath();
    ctx.moveTo(0,-s.size);ctx.lineTo(s.size*0.6,0);
    ctx.lineTo(0,s.size);ctx.lineTo(-s.size*0.6,0);ctx.closePath();
    ctx.fill();
    ctx.restore();
  }

  // Pickups
  for(var i=0;i<pickups.length;i++){
    var pk=pickups[i];
    ctx.save();
    var pulse=0.7+Math.sin(pk.life*0.15)*0.3;
    ctx.globalAlpha=pk.life<40?pk.life/40:pulse;
    ctx.shadowBlur=10;
    if(pk.type==='life'){
      ctx.shadowColor='#0f0';ctx.fillStyle='#0f0';
      ctx.font='16px serif';ctx.fillText('♥',pk.x-6,pk.y+5);
    }else{
      ctx.shadowColor='#ff0';ctx.fillStyle='#ff0';
      ctx.font='14px serif';ctx.fillText('◆',pk.x-5,pk.y+5);
    }
    ctx.restore();
  }

  // Particles
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    ctx.globalAlpha=p.life;
    ctx.fillStyle='hsla('+p.hue+',100%,65%,1)';
    ctx.shadowColor='hsla('+p.hue+',100%,60%,0.5)';
    ctx.shadowBlur=4;
    ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
  }
  ctx.globalAlpha=1;ctx.shadowBlur=0;

  // Rocks
  for(var i=0;i<rocks.length;i++){
    var r=rocks[i];
    ctx.save();
    ctx.translate(r.x,r.y);
    ctx.rotate(r.rot);
    ctx.beginPath();
    ctx.moveTo(r.pts[0].x,r.pts[0].y);
    for(var j=1;j<r.pts.length;j++)ctx.lineTo(r.pts[j].x,r.pts[j].y);
    ctx.closePath();
    ctx.strokeStyle='hsla('+r.hue+',80%,55%,0.9)';
    ctx.lineWidth=2;
    ctx.shadowColor='hsla('+r.hue+',80%,50%,0.5)';
    ctx.shadowBlur=10;
    ctx.stroke();
    ctx.fillStyle='hsla('+r.hue+',60%,20%,0.3)';
    ctx.fill();
    // Damage cracks
    if(r.hp<(r.size>35?3:r.size>18?2:1)){
      ctx.strokeStyle='hsla('+r.hue+',100%,80%,0.3)';
      ctx.lineWidth=1;
      ctx.beginPath();
      ctx.moveTo(0,0);ctx.lineTo(r.pts[0].x*0.7,r.pts[0].y*0.7);
      ctx.moveTo(0,0);ctx.lineTo(r.pts[3%r.pts.length].x*0.6,r.pts[3%r.pts.length].y*0.6);
      ctx.stroke();
    }
    ctx.restore();
  }

  // Bullets
  ctx.shadowBlur=8;
  for(var i=0;i<bullets.length;i++){
    var b=bullets[i];
    ctx.fillStyle='rgba(0,255,255,0.9)';
    ctx.shadowColor='#0ff';
    ctx.beginPath();ctx.arc(b.x,b.y,2.5,0,Math.PI*2);ctx.fill();
    // Trail
    ctx.globalAlpha=0.3;
    ctx.beginPath();ctx.arc(b.x-b.vx*0.5,b.y-b.vy*0.5,1.5,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
  ctx.shadowBlur=0;

  // Player
  if(running){
    ctx.save();
    ctx.translate(px,py);
    ctx.rotate(pAngle);

    if(pInvince>0&&Math.floor(pInvince/4)%2===0){
      ctx.globalAlpha=0.3;
    }

    // Ship
    ctx.beginPath();
    ctx.moveTo(14,0);
    ctx.lineTo(-10,-8);
    ctx.lineTo(-6,0);
    ctx.lineTo(-10,8);
    ctx.closePath();
    ctx.strokeStyle='#0ff';
    ctx.lineWidth=1.8;
    ctx.shadowColor='#0ff';
    ctx.shadowBlur=12;
    ctx.stroke();
    ctx.fillStyle='rgba(0,255,255,0.08)';
    ctx.fill();

    // Thrust
    var ax2=0;
    if(keys.a||keys.d||keys.w||keys.s||stickActive){
      ctx.beginPath();
      ctx.moveTo(-8,-4);
      ctx.lineTo(-14-Math.random()*6,0);
      ctx.lineTo(-8,4);
      ctx.strokeStyle='rgba(255,150,50,0.6)';
      ctx.shadowColor='#f80';
      ctx.shadowBlur=6;
      ctx.lineWidth=1;
      ctx.stroke();
    }

    ctx.restore();

    // Aim line (subtle)
    ctx.save();
    ctx.globalAlpha=0.06;
    ctx.strokeStyle='#0ff';
    ctx.setLineDash([4,8]);
    ctx.beginPath();
    ctx.moveTo(px+Math.cos(pAngle)*20,py+Math.sin(pAngle)*20);
    ctx.lineTo(px+Math.cos(pAngle)*80,py+Math.sin(pAngle)*80);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }

  ctx.restore();
}

// HUD
var scoreEl=document.getElementById('score-val');
var waveEl=document.getElementById('wave-val');
var livesEl=document.getElementById('lives');
var shardEl=document.getElementById('shard-val');
var comboEl=document.getElementById('combo');

function updateHUD(){
  scoreEl.textContent=score;
  waveEl.textContent=wave;
  shardEl.textContent=shardsCollected;
  var lstr='';for(var i=0;i<lives;i++)lstr+='♦ ';
  livesEl.innerHTML='<span style="color:#0ff;text-shadow:0 0 6px #0ff;font-size:14px">'+lstr+'</span>';

  if(comboCount>=3&&comboTimer>0){
    comboEl.textContent=comboCount+'x COMBO!';
    comboEl.style.opacity='1';
    comboEl.style.fontSize=Math.min(36,20+comboCount*2)+'px';
  }else{
    comboEl.style.opacity='0';
  }
}

function loop(){
  update();
  render();
  requestAnimationFrame(loop);
}

// Input
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowLeft'||e.key==='a')keys.a=true;
  if(e.key==='ArrowRight'||e.key==='d')keys.d=true;
  if(e.key==='ArrowUp'||e.key==='w')keys.w=true;
  if(e.key==='ArrowDown'||e.key==='s')keys.s=true;
  if(e.key===' ')keys.fire=true;
});
document.addEventListener('keyup',function(e){
  if(e.key==='ArrowLeft'||e.key==='a')keys.a=false;
  if(e.key==='ArrowRight'||e.key==='d')keys.d=false;
  if(e.key==='ArrowUp'||e.key==='w')keys.w=false;
  if(e.key==='ArrowDown'||e.key==='s')keys.s=false;
  if(e.key===' ')keys.fire=false;
});
canvas.addEventListener('mousemove',function(e){mouseX=e.clientX;mouseY=e.clientY});
canvas.addEventListener('mousedown',function(e){keys.fire=true;mouseX=e.clientX;mouseY=e.clientY});
canvas.addEventListener('mouseup',function(){keys.fire=false});

// Mobile virtual stick
var stickEl=document.getElementById('mobile-stick');
var stickActive=false,stickDx=0,stickDy=0;
var stickCx,stickCy;

stickEl.addEventListener('touchstart',function(e){
  e.preventDefault();
  stickActive=true;
  var rect=stickEl.getBoundingClientRect();
  stickCx=rect.left+rect.width/2;
  stickCy=rect.top+rect.height/2;
  handleStickMove(e.touches[0]);
},{passive:false});
stickEl.addEventListener('touchmove',function(e){
  e.preventDefault();
  handleStickMove(e.touches[0]);
},{passive:false});
stickEl.addEventListener('touchend',function(){stickActive=false;stickDx=0;stickDy=0});
stickEl.addEventListener('touchcancel',function(){stickActive=false;stickDx=0;stickDy=0});

function handleStickMove(t){
  var dx=t.clientX-stickCx,dy=t.clientY-stickCy;
  var len=Math.sqrt(dx*dx+dy*dy);
  var maxR=55;
  if(len>maxR){dx=dx/len*maxR;dy=dy/len*maxR;len=maxR}
  stickDx=dx/maxR;stickDy=dy/maxR;
}

// Mobile fire
var fireEl=document.getElementById('mobile-fire');
fireEl.addEventListener('touchstart',function(e){e.preventDefault();keys.fire=true},{passive:false});
fireEl.addEventListener('touchend',function(e){e.preventDefault();keys.fire=false},{passive:false});
fireEl.addEventListener('touchcancel',function(){keys.fire=false});

// Mobile aim via touch on canvas
canvas.addEventListener('touchstart',function(e){
  if(e.target===canvas){
    var t=e.touches[0];
    mouseX=t.clientX;mouseY=t.clientY;
  }
},{passive:true});
canvas.addEventListener('touchmove',function(e){
  if(e.target===canvas){
    var t=e.touches[0];
    mouseX=t.clientX;mouseY=t.clientY;
  }
},{passive:true});

// Leaderboard UI
var lbPanel=document.getElementById('lb-panel');
var lbList=document.getElementById('lb-list');
var lbMsg=document.getElementById('lb-msg');
var submitRow=document.getElementById('submit-row');
var lbNameInput=document.getElementById('lb-name');
var pendingScore=null;

function showLeaderboard(submitScore){
  lbPanel.classList.add('show');
  lbMsg.textContent='Loading...';
  lbList.innerHTML='';
  submitRow.style.display='none';

  if(submitScore&&score>0){
    pendingScore={score:score,wave:wave,shards:shardsCollected};
    submitRow.style.display='block';
    var saved=localStorage.getItem('shard_storm_name');
    if(saved)lbNameInput.value=saved;
  }

  if(window._lbLoad){
    window._lbLoad().then(function(data){
      if(!data){lbMsg.textContent='Leaderboard unavailable';return}
      if(data.length===0){lbMsg.textContent='No scores yet — be the first!';return}
      lbMsg.textContent='';
      lbList.innerHTML='';
      data.forEach(function(row,i){
        var li=document.createElement('li');
        li.innerHTML='<span class="rank">#'+(i+1)+'</span><span class="name">'+escHtml(row.display_name||'Anon')+'</span><span class="lb-score">'+row.score+'</span>';
        lbList.appendChild(li);
      });
    });
  }else{
    lbMsg.textContent='Leaderboard unavailable';
  }
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

document.getElementById('lb-btn').addEventListener('click',function(e){
  e.stopPropagation();
  showLeaderboard(false);
});
document.getElementById('lb-close').addEventListener('click',function(){
  lbPanel.classList.remove('show');
  pendingScore=null;
});
document.getElementById('lb-submit').addEventListener('click',function(){
  if(!pendingScore||!window._lbSave)return;
  var name=(lbNameInput.value||'').trim().slice(0,16)||'Anon';
  localStorage.setItem('shard_storm_name',name);
  this.disabled=true;this.textContent='SAVING...';
  var self=this;
  window._lbSave(name,pendingScore.score,pendingScore.wave,pendingScore.shards).then(function(ok){
    self.disabled=false;self.textContent='SAVE';
    if(ok){
      submitRow.style.display='none';
      pendingScore=null;
      // Reload board
      showLeaderboard(false);
    }else{
      lbMsg.textContent='Save failed — table may not exist yet';
    }
  });
});

// Override die to show leaderboard on game over
var origDie=die;
die=function(){
  origDie();
  if(lives<=0){
    setTimeout(function(){showLeaderboard(true)},600);
  }
};

// Start
document.getElementById('start-btn').addEventListener('click',startGame);

loop();

})();
</script>
