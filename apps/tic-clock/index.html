<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Tic Clock</title>
<meta name="description" content="A grand analog clock that only ticks when someone types 'tic' in Twitch chat. No tics, no time.">
<link rel="icon" href="https://emojicdn.elk.sh/🕰️">
<meta property="og:title" content="The Tic Clock">
<meta property="og:description" content="Time itself is chat-operated: this big analog clock only advances when someone types 'tic'. The seconds are yours now.">
<meta property="og:url" content="https://sloppy.live/tic-clock/">
<meta property="og:type" content="website">
<meta property="og:image" content="https://image.pollinations.ai/prompt/grand%20antique%20brass%20analog%20clock%20face%20with%20roman%20numerals%20on%20dark%20mahogany%2C%20cobwebs%2C%20candlelight%2C%20oil%20painting%20style%2C%20mysterious.png?width=1200&height=630&seed=1212&model=flux&nologo=true">
<style>
  :root{
    --wood:#1d120b;
    --wood2:#2b1a0f;
    --brass:#c9a24e;
    --brass-hi:#eed9a0;
    --cream:#f2e5c4;
    --dim:#8a7454;
    --red:#a8402e;
  }
  html{ font-size:100%; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    font-family:"Crimson Pro", serif;
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(201,162,78,0.08), transparent 60%),
      repeating-linear-gradient(90deg, rgba(0,0,0,0.25) 0 3px, transparent 3px 40px),
      linear-gradient(180deg, var(--wood2), var(--wood));
    color:var(--cream);
    min-height:100dvh;
    display:flex;
    flex-direction:column;
    align-items:center;
    overflow-x:hidden;
  }
  header{ text-align:center; padding:1rem 1rem 0.2rem; }
  h1{
    font-family:"IM Fell English", serif;
    font-size:clamp(1.7rem, 5vw, 2.8rem);
    color:var(--brass);
    letter-spacing:0.06em;
    text-shadow:0 0.2rem 0.6rem rgba(0,0,0,0.8);
  }
  .tag{
    font-style:italic;
    font-size:clamp(0.85rem, 2.2vw, 1.05rem);
    color:var(--dim);
  }
  /* ── the clock ── */
  #clockWrap{
    position:relative;
    margin:1rem 0 0.4rem;
  }
  svg#face{
    width:min(78vw, 30rem, 52dvh);
    height:auto;
    display:block;
    filter:drop-shadow(0 1.6rem 2.5rem rgba(0,0,0,0.75));
  }
  #cobweb{
    position:absolute; inset:0;
    display:grid; place-items:center;
    font-size:clamp(3rem, 10vw, 5rem);
    opacity:0;
    transition:opacity 2.5s ease;
    pointer-events:none;
  }
  #cobweb.show{ opacity:0.5; }
  #pendulum{
    width:0.5rem;
    height:clamp(4rem, 11dvh, 7rem);
    margin:-0.4rem auto 0;
    background:linear-gradient(180deg, var(--brass), #8a6a2e);
    border-radius:0 0 0.2rem 0.2rem;
    position:relative;
    transform-origin:top center;
    transition:transform 0.45s cubic-bezier(.45,0,.55,1);
  }
  #pendulum::after{
    content:'';
    position:absolute;
    bottom:-1.5rem; left:50%;
    transform:translateX(-50%);
    width:2.6rem; height:2.6rem;
    border-radius:50%;
    background:radial-gradient(circle at 35% 30%, var(--brass-hi), var(--brass) 55%, #6b4f1e);
    box-shadow:0 0.4rem 1rem rgba(0,0,0,0.6);
  }
  /* ── readouts ── */
  #digits{
    font-family:"IM Fell English", serif;
    font-size:clamp(1.3rem, 4vw, 2rem);
    color:var(--brass-hi);
    letter-spacing:0.2em;
    padding-top:2.4rem;
  }
  #status{
    min-height:1.4rem;
    font-style:italic;
    font-size:0.95rem;
    color:var(--dim);
    text-align:center;
    padding:0.2rem 1rem;
  }
  #status b{ color:var(--brass); font-weight:600; }
  /* ── controls ── */
  #controls{
    display:flex; gap:0.6rem; align-items:center; justify-content:center;
    flex-wrap:wrap;
    padding:0.8rem 1rem 0.4rem;
  }
  #controls input{
    font-family:"Space Mono", monospace;
    font-size:0.9rem;
    min-height:2.75rem;
    padding:0.3rem 0.8rem;
    width:13rem;
    background:rgba(0,0,0,0.4);
    border:1px solid #5a4526;
    border-radius:0.4rem;
    color:var(--cream);
  }
  #controls button, #ticBtn{
    font-family:"IM Fell English", serif;
    font-size:1rem;
    min-height:2.75rem;
    padding:0.35rem 1.2rem;
    background:linear-gradient(180deg, var(--brass), #9a7a34);
    color:#241505;
    border:none;
    border-radius:0.4rem;
    cursor:pointer;
    box-shadow:0 0.25rem 0 rgba(0,0,0,0.5);
  }
  button:focus-visible, input:focus-visible{ outline:3px solid var(--brass-hi); outline-offset:2px; }
  #chanState{
    font-family:"Space Mono", monospace;
    font-size:0.7rem;
    color:var(--dim);
    display:flex; align-items:center; gap:0.4rem;
  }
  #chanState::before{
    content:'';
    width:0.55rem; height:0.55rem; border-radius:50%;
    background:#5a4526;
  }
  #chanState.live::before{ background:#6a9a4a; }
  #chanState.err::before{ background:var(--red); }
  /* ── ledger ── */
  #ledger{
    display:flex;
    gap:2rem;
    flex-wrap:wrap;
    justify-content:center;
    font-size:0.95rem;
    color:var(--dim);
    padding:0.5rem 1rem 2.5rem;
  }
  #ledger b{ color:var(--brass-hi); font-weight:600; font-size:1.2rem; }
  #ledger .who{ font-style:italic; }
  @media (prefers-reduced-motion: reduce){
    #pendulum{ transition:none; }
    #cobweb{ transition:none; }
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=Crimson+Pro:ital,wght@0,400;0,600;1,400&family=Space+Mono&display=swap" rel="stylesheet">
</head>
<body>
<header>
  <h1>The Tic Clock</h1>
  <p class="tag">time only passes when somebody says <b>tic</b> — the universe is chat-operated now</p>
</header>

<div id="clockWrap">
  <svg id="face" viewBox="0 0 400 400" role="img" aria-label="Analog clock face, advanced one second per tic">
    <defs>
      <radialGradient id="dial" cx="42%" cy="38%">
        <stop offset="0%" stop-color="#f6ecd2"/>
        <stop offset="70%" stop-color="#e8d9b0"/>
        <stop offset="100%" stop-color="#cdb884"/>
      </radialGradient>
      <linearGradient id="rim" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0%" stop-color="#eed9a0"/>
        <stop offset="45%" stop-color="#c9a24e"/>
        <stop offset="100%" stop-color="#6b4f1e"/>
      </linearGradient>
    </defs>
    <circle cx="200" cy="200" r="196" fill="url(#rim)"/>
    <circle cx="200" cy="200" r="178" fill="#241505"/>
    <circle cx="200" cy="200" r="170" fill="url(#dial)"/>
    <g id="marks"></g>
    <g id="nums" font-family="IM Fell English, serif" font-size="30" fill="#3a2a12" text-anchor="middle"></g>
    <g id="handHour"><rect x="196.5" y="110" width="7" height="95" rx="3.5" fill="#2b1c0a"/></g>
    <g id="handMin"><rect x="197.5" y="72" width="5" height="133" rx="2.5" fill="#2b1c0a"/></g>
    <g id="handSec"><rect x="199" y="58" width="2" height="160" fill="#a8402e"/><circle cx="200" cy="76" r="6" fill="#a8402e"/></g>
    <circle cx="200" cy="200" r="9" fill="url(#rim)"/>
  </svg>
  <div id="cobweb" aria-hidden="true">🕸️</div>
</div>
<div id="pendulum" aria-hidden="true"></div>

<p id="digits" aria-live="off">12:00:00</p>
<p id="status" role="status" aria-live="polite">the clock is still. say <b>tic</b>.</p>

<div id="controls">
  <input id="chan" placeholder="twitch channel (no #)" autocomplete="off" spellcheck="false" aria-label="Twitch channel to listen to">
  <button type="button" id="joinBtn">listen</button>
  <button type="button" id="ticBtn" aria-label="Tick the clock once">tic</button>
  <span id="chanState">idle</span>
</div>

<div id="ledger">
  <span>TOTAL TICS <b id="lTotal">0</b></span>
  <span>THIS MINUTE <b id="lRate">0</b></span>
  <span>LAST KEEPER <b id="lWho" class="who">nobody yet</b></span>
  <span>TOP KEEPER <b id="lTop" class="who">—</b></span>
</div>

<script>
(function(){
'use strict';

/* ── face setup ── */
var marks = document.getElementById('marks');
var nums = document.getElementById('nums');
var ROMAN = ['XII','I','II','III','IV','V','VI','VII','VIII','IX','X','XI'];
for(var m = 0; m < 60; m++){
  var a = m * 6 * Math.PI / 180;
  var big = m % 5 === 0;
  var r1 = big ? 150 : 158, r2 = 166;
  var x1 = 200 + Math.sin(a) * r1, y1 = 200 - Math.cos(a) * r1;
  var x2 = 200 + Math.sin(a) * r2, y2 = 200 - Math.cos(a) * r2;
  var ln = document.createElementNS('http://www.w3.org/2000/svg', 'line');
  ln.setAttribute('x1', x1); ln.setAttribute('y1', y1);
  ln.setAttribute('x2', x2); ln.setAttribute('y2', y2);
  ln.setAttribute('stroke', '#3a2a12');
  ln.setAttribute('stroke-width', big ? 4 : 1.5);
  marks.appendChild(ln);
}
for(var h = 0; h < 12; h++){
  var ha = h * 30 * Math.PI / 180;
  var tx = 200 + Math.sin(ha) * 128, ty = 200 - Math.cos(ha) * 128 + 11;
  var t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
  t.setAttribute('x', tx); t.setAttribute('y', ty);
  t.textContent = ROMAN[h];
  nums.appendChild(t);
}

/* ── state ── */
var seconds = 0;          /* total tics = seconds of clock-time */
var lastTicAt = 0;
var recent = [];          /* timestamps for per-minute rate */
var keepers = {};
var lastKeeper = null;
var pendulumSide = false;
try{
  var saved = JSON.parse(localStorage.getItem('tic-clock-v1') || 'null');
  if(saved && typeof saved.s === 'number'){ seconds = saved.s; keepers = saved.k || {}; }
}catch(e){}

function save(){
  try{ localStorage.setItem('tic-clock-v1', JSON.stringify({ s: seconds, k: keepers })); }catch(e){}
}

/* ── render ── */
function pad(n){ return String(n).padStart(2, '0'); }
function render(){
  var s = seconds % 60;
  var mi = Math.floor(seconds / 60) % 60;
  var hr = Math.floor(seconds / 3600) % 12;
  document.getElementById('handSec').setAttribute('transform', 'rotate(' + (s * 6) + ' 200 200)');
  document.getElementById('handMin').setAttribute('transform', 'rotate(' + (mi * 6 + s * 0.1) + ' 200 200)');
  document.getElementById('handHour').setAttribute('transform', 'rotate(' + (hr * 30 + mi * 0.5) + ' 200 200)');
  var dispH = hr === 0 ? 12 : hr;
  document.getElementById('digits').textContent = pad(dispH) + ':' + pad(mi) + ':' + pad(s);
  document.getElementById('lTotal').textContent = seconds;
  var now = Date.now();
  recent = recent.filter(function(t){ return now - t < 60000; });
  document.getElementById('lRate').textContent = recent.length;
  document.getElementById('lWho').textContent = lastKeeper || 'nobody yet';
  var top = null, topN = 0;
  for(var k in keepers) if(keepers[k] > topN){ topN = keepers[k]; top = k; }
  document.getElementById('lTop').textContent = top ? top + ' (' + topN + ')' : '—';
}

/* ── audio ── */
var ac = null;
function tickSound(alt){
  try{
    if(!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
    var t = ac.currentTime;
    var o = ac.createOscillator(), g = ac.createGain();
    o.type = 'square';
    o.frequency.value = alt ? 1100 : 800;
    g.gain.setValueAtTime(0.0001, t);
    g.gain.linearRampToValueAtTime(0.05, t + 0.004);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.07);
    var lp = ac.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 2400;
    o.connect(lp); lp.connect(g); g.connect(ac.destination);
    o.start(t); o.stop(t + 0.08);
  }catch(e){}
}
function chime(){
  try{
    if(!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
    var t = ac.currentTime;
    [660, 495].forEach(function(f, i){
      var o = ac.createOscillator(), g = ac.createGain();
      o.type = 'sine'; o.frequency.value = f;
      g.gain.setValueAtTime(0.0001, t + i * 0.5);
      g.gain.linearRampToValueAtTime(0.09, t + i * 0.5 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t + i * 0.5 + 1.8);
      o.connect(g); g.connect(ac.destination);
      o.start(t + i * 0.5); o.stop(t + i * 0.5 + 2);
    });
  }catch(e){}
}

/* ── the tick ── */
var statusEl = document.getElementById('status');
function tic(who){
  seconds++;
  lastTicAt = Date.now();
  recent.push(lastTicAt);
  lastKeeper = who;
  keepers[who] = (keepers[who] || 0) + 1;
  pendulumSide = !pendulumSide;
  document.getElementById('pendulum').style.transform = 'rotate(' + (pendulumSide ? 14 : -14) + 'deg)';
  document.getElementById('cobweb').classList.remove('show');
  tickSound(pendulumSide);
  if(seconds % 60 === 0){
    chime();
    statusEl.innerHTML = '🔔 <b>' + esc(who) + '</b> rang the minute! (' + Math.floor(seconds / 60) + ' whole minutes of borrowed time)';
  } else {
    statusEl.innerHTML = '<b>' + esc(who) + '</b> gave the world one more second.';
  }
  render();
  save();
}
function esc(s){
  var d = document.createElement('span');
  d.textContent = s;
  return d.innerHTML;
}
document.getElementById('ticBtn').addEventListener('click', function(){ tic('you, personally'); });

/* the dust settles */
setInterval(function(){
  if(Date.now() - lastTicAt > 30000 && seconds > 0){
    document.getElementById('cobweb').classList.add('show');
    statusEl.innerHTML = 'the clock has been still for a while. time is <i>stuck</i>. say <b>tic</b>.';
  }
  render();
}, 5000);

/* ── twitch chat (anonymous IRC) ── */
var ws = null, chan = null, reconnectT = 0;
var chanState = document.getElementById('chanState');
function setChanState(cls, txt){ chanState.className = cls; chanState.textContent = txt; }
function joinChannel(c){
  c = c.trim().toLowerCase().replace(/^#/, '');
  if(!c) return;
  chan = c;
  try{ localStorage.setItem('tic-clock-chan', c); }catch(e){}
  if(ws){ try{ ws.close(); }catch(e){} ws = null; }
  setChanState('', 'connecting…');
  var sock = new WebSocket('wss://irc-ws.chat.twitch.tv:443');
  ws = sock;
  sock.onopen = function(){
    sock.send('PASS SCHMOOPIIE');
    sock.send('NICK justinfan' + Math.floor(10000 + Math.random() * 80000));
    sock.send('JOIN #' + chan);
    setChanState('live', 'live · #' + chan);
  };
  sock.onmessage = function(ev){
    String(ev.data).split('\r\n').forEach(function(line){
      if(!line) return;
      if(line.startsWith('PING')){ sock.send('PONG :tmi.twitch.tv'); return; }
      var m = line.match(/^:(\w+)!\S+ PRIVMSG #\S+ :(.*)$/);
      if(!m) return;
      var user = m[1], msg = m[2];
      if(/\btic\b/i.test(msg)) tic(user);
    });
  };
  sock.onclose = function(){
    if(ws !== sock) return;
    setChanState('err', 'reconnecting…');
    clearTimeout(reconnectT);
    reconnectT = setTimeout(function(){ if(chan) joinChannel(chan); }, 3500);
  };
  sock.onerror = function(){ try{ sock.close(); }catch(e){} };
}
document.getElementById('joinBtn').addEventListener('click', function(){
  joinChannel(document.getElementById('chan').value);
});
document.getElementById('chan').addEventListener('keydown', function(e){
  if(e.key === 'Enter') joinChannel(e.target.value);
});
try{
  var lastChan = localStorage.getItem('tic-clock-chan');
  if(lastChan){
    document.getElementById('chan').value = lastChan;
    joinChannel(lastChan);
  }
}catch(e){}

/* debug/testing: simulate a chat line */
window.__tic = function(user, msg){
  if(/\btic\b/i.test(msg || 'tic')) tic(user || 'tester');
  return seconds;
};

render();
})();
</script>
</body>
</html>
