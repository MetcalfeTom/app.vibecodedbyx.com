<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Flip · gradually invert any text</title>
<link rel="icon" href="https://emojicdn.elk.sh/🙃">
<meta name="description" content="Type text and watch it flip upside down while the whole page slowly rotates 180°.">
<meta property="og:title" content="Flip" />
<meta property="og:description" content="Type anything. Watch it invert. The entire viewport gradually rotates 180° until fully upside down." />
<meta property="og:image" content="https://image.pollinations.ai/prompt/minimalist%20cream%20peach%20paper%20card%20with%20elegant%20italic%20serif%20word%20flip%20rotating%20upside%20down%20warm%20editorial%20poster%20typography?width=1200&height=630&nologo=true&seed=7101" />
<meta property="og:url" content="https://sloppy.live/flip-text" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..900;1,9..144,400..900&family=IBM+Plex+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f3e3ca;
    --bg-2: #ead4b2;
    --ink: #221812;
    --ink-soft: #5a4636;
    --accent: #ff6a3d;
    --accent-2: #ff9a5c;
    --paper: #fffaf0;
    --line: #cdb394;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'IBM Plex Mono', monospace;
    overflow: hidden;
  }

  /* Rotating viewport */
  #stage {
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
    transform-origin: 50% 50%;
    background:
      radial-gradient(ellipse at 22% 18%, rgba(255, 200, 160, 0.55), transparent 55%),
      radial-gradient(ellipse at 80% 82%, rgba(255, 140, 110, 0.35), transparent 60%),
      var(--bg);
    will-change: transform;
  }

  /* Subtle paper grain */
  #stage::before {
    content: "";
    position: absolute; inset: 0;
    pointer-events: none;
    background-image:
      repeating-linear-gradient(0deg, rgba(60,35,20,0.02) 0 1px, transparent 1px 3px),
      repeating-linear-gradient(90deg, rgba(60,35,20,0.02) 0 1px, transparent 1px 3px);
    mix-blend-mode: multiply;
  }

  #app {
    width: min(960px, 92vw);
    max-height: 92vh;
    display: flex;
    flex-direction: column;
    gap: 20px;
    padding: 34px 34px 24px;
    background: var(--paper);
    border: 2px solid var(--ink);
    box-shadow: 10px 10px 0 var(--ink);
    border-radius: 4px;
    position: relative;
  }

  .topline {
    display: flex; justify-content: space-between; align-items: baseline;
    border-bottom: 1px dashed var(--line);
    padding-bottom: 10px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.3em;
    color: var(--ink-soft);
    text-transform: uppercase;
  }
  .topline .live { color: var(--accent); animation: pulse 1.8s infinite; }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

  h1.logo {
    font-family: 'Fraunces', serif;
    font-weight: 300;
    font-style: italic;
    font-size: clamp(64px, 11vw, 128px);
    line-height: 0.9;
    letter-spacing: -0.03em;
    color: var(--ink);
    text-align: center;
    position: relative;
  }
  h1.logo em {
    color: var(--accent);
    font-style: italic;
    font-weight: 600;
  }
  h1.logo .spinner {
    display: inline-block;
    font-size: 0.55em;
    margin-left: 0.1em;
    animation: spin 22s linear infinite;
    transform-origin: center center;
    color: var(--ink-soft);
  }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  .sub {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-weight: 400;
    text-align: center;
    color: var(--ink-soft);
    font-size: clamp(14px, 2vw, 19px);
    letter-spacing: 0.02em;
    margin-top: -10px;
  }
  .sub::before, .sub::after { content: ' ↻ '; color: var(--accent); font-style: normal; }

  .panes {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 18px;
  }

  .pane {
    display: flex; flex-direction: column;
    border: 1px solid var(--line);
    border-radius: 3px;
    background: #fffef6;
    min-height: 180px;
    overflow: hidden;
  }
  .pane header {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--ink-soft);
    padding: 10px 14px;
    border-bottom: 1px dashed var(--line);
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: linear-gradient(180deg, #fff8e6, transparent);
  }

  .pane textarea,
  .pane .out {
    border: 0; outline: 0; resize: none;
    background: transparent;
    color: var(--ink);
    font: 500 17px/1.55 'IBM Plex Mono', monospace;
    padding: 18px;
    flex: 1;
    width: 100%;
    min-height: 220px;
    white-space: pre-wrap;
    word-wrap: break-word;
    overflow: auto;
    caret-color: var(--accent);
  }
  .pane .out {
    color: var(--ink);
    white-space: pre-wrap;
  }
  .pane textarea::placeholder {
    color: var(--line);
    font-style: italic;
  }

  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    align-items: center;
  }
  .progressWrap {
    flex: 1;
    min-width: 220px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--ink-soft);
    text-transform: uppercase;
  }
  .bar {
    flex: 1;
    height: 7px;
    background: var(--bg-2);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
    border: 1px solid var(--line);
  }
  .bar > i {
    display: block;
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    transition: width 0.25s linear;
  }
  #angle {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 17px;
    font-weight: 600;
    color: var(--ink);
    min-width: 55px;
    text-align: right;
  }

  button {
    font-family: 'IBM Plex Mono', monospace;
    font-weight: 500;
    font-size: 12px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    padding: 12px 20px;
    background: var(--ink);
    color: var(--paper);
    border: 2px solid var(--ink);
    cursor: pointer;
    border-radius: 2px;
    transition: transform 0.08s, box-shadow 0.08s;
    box-shadow: 3px 3px 0 var(--ink-soft);
  }
  button:hover { transform: translate(-1px, -1px); box-shadow: 4px 4px 0 var(--ink-soft); }
  button:active { transform: translate(2px, 2px); box-shadow: 1px 1px 0 var(--ink-soft); }
  button.ghost { background: transparent; color: var(--ink); box-shadow: none; }
  button.ghost:hover { background: var(--bg-2); box-shadow: none; transform: none; }
  button.primary { background: var(--accent); border-color: var(--accent); color: var(--paper); }
  button.primary:hover { background: var(--accent-2); border-color: var(--accent-2); }

  .mini {
    font-size: 10px;
    padding: 5px 12px;
    background: transparent;
    color: var(--ink-soft);
    border: 1px solid var(--line);
    box-shadow: none;
    letter-spacing: 0.2em;
    border-radius: 2px;
  }
  .mini:hover { color: var(--accent); border-color: var(--accent); box-shadow: none; transform: none; }

  .footline {
    border-top: 1px dashed var(--line);
    padding-top: 12px;
    display: flex;
    justify-content: space-between;
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.25em;
    color: var(--ink-soft);
    text-transform: uppercase;
  }
  .footline kbd {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 9.5px;
    padding: 2px 6px;
    border: 1px solid var(--line);
    border-radius: 2px;
    margin: 0 2px;
    color: var(--ink);
  }

  @media (max-width: 720px) {
    .panes { grid-template-columns: 1fr; }
    #app { padding: 24px 20px 20px; gap: 16px; }
    h1.logo { font-size: 76px; }
    .pane textarea, .pane .out { font-size: 15px; min-height: 160px; }
    .controls { flex-direction: column; align-items: stretch; }
    .progressWrap { width: 100%; }
  }
</style>
</head>
<body>

<div id="stage">
  <main id="app">
    <div class="topline">
      <span>↻ folio · no. 001</span>
      <span>rotation <span class="live">●</span> <span id="angle">0°</span></span>
    </div>

    <h1 class="logo"><em>flip</em><span class="spinner">↻</span></h1>
    <p class="sub">type text — the whole page slowly turns itself upside down</p>

    <div class="panes">
      <div class="pane">
        <header>
          <span>input</span>
          <button class="mini" data-action="clear">clear</button>
        </header>
        <textarea id="in" spellcheck="false" placeholder="type anything…"></textarea>
      </div>
      <div class="pane">
        <header>
          <span>flipped</span>
          <button class="mini" data-action="copy">copy</button>
        </header>
        <div class="out" id="out"></div>
      </div>
    </div>

    <div class="controls">
      <div class="progressWrap">
        <span>viewport ↻</span>
        <div class="bar"><i id="bar"></i></div>
      </div>
      <button class="ghost" id="resetBtn">reset</button>
      <button class="primary" id="flipBtn">begin rotation</button>
    </div>

    <div class="footline">
      <span>unicode upside-down glyphs</span>
      <span><kbd>space</kbd> toggle · <kbd>R</kbd> reset</span>
    </div>
  </main>
</div>

<script>
  // Upside-down character mappings
  const FLIP = {
    'a':'ɐ','b':'q','c':'ɔ','d':'p','e':'ǝ','f':'ɟ','g':'ƃ','h':'ɥ','i':'ᴉ','j':'ɾ',
    'k':'ʞ','l':'ꞁ','m':'ɯ','n':'u','o':'o','p':'d','q':'b','r':'ɹ','s':'s','t':'ʇ',
    'u':'n','v':'ʌ','w':'ʍ','x':'x','y':'ʎ','z':'z',
    'A':'∀','B':'ꓭ','C':'Ɔ','D':'ᗡ','E':'Ǝ','F':'Ⅎ','G':'⅁','H':'H','I':'I','J':'ſ',
    'K':'ꓘ','L':'⅂','M':'W','N':'N','O':'O','P':'Ԁ','Q':'Ό','R':'ᴚ','S':'S','T':'⊥',
    'U':'∩','V':'Λ','W':'M','X':'X','Y':'⅄','Z':'Z',
    '0':'0','1':'Ɩ','2':'ᄅ','3':'Ɛ','4':'ᔭ','5':'ϛ','6':'9','7':'ㄥ','8':'8','9':'6',
    '.':'˙', ',':'\u02BB', "'":',', '"':'„', ';':'؛', '?':'¿', '!':'¡',
    '(':')', ')':'(', '[':']', ']':'[', '{':'}', '}':'{', '<':'>', '>':'<',
    '&':'⅋', '_':'‾', '…':'…', '—':'—', '–':'–'
  };
  // Add reverse mappings so flipping twice round-trips
  for (const [k, v] of Object.entries({ ...FLIP })) {
    if (!(v in FLIP)) FLIP[v] = k;
  }

  function flip(text) {
    return text.split('\n').map(line => {
      return [...line].map(c => FLIP[c] || c).reverse().join('');
    }).reverse().join('\n');
  }

  // Elements
  const inEl = document.getElementById('in');
  const outEl = document.getElementById('out');
  const stage = document.getElementById('stage');
  const barEl = document.getElementById('bar');
  const angleEl = document.getElementById('angle');
  const flipBtn = document.getElementById('flipBtn');
  const resetBtn = document.getElementById('resetBtn');

  // Seed text
  inEl.value = 'hello, upside-world!\n\ntype anything here\nand watch it flip.\n\npress begin rotation ↓';
  function updateFlipped() { outEl.textContent = flip(inEl.value); }
  updateFlipped();
  inEl.addEventListener('input', updateFlipped);

  // Rotation state
  let currentAngle = 0;      // in degrees
  let rotating = false;
  let lastTs = null;
  const DURATION_MS = 42000; // 42s for full 180°
  const DEG_PER_MS = 180 / DURATION_MS;

  function setAngle(deg) {
    currentAngle = Math.max(0, Math.min(180, deg));
    stage.style.transform = `rotate(${currentAngle}deg)`;
    angleEl.textContent = Math.round(currentAngle) + '°';
    barEl.style.width = (currentAngle / 180 * 100) + '%';
    if (currentAngle >= 180) {
      flipBtn.textContent = 'fully inverted 🙃';
      flipBtn.disabled = true;
    } else if (currentAngle <= 0) {
      flipBtn.textContent = 'begin rotation';
      flipBtn.disabled = false;
    } else if (rotating) {
      flipBtn.textContent = 'pause ❚❚';
      flipBtn.disabled = false;
    } else {
      flipBtn.textContent = 'resume ▶';
      flipBtn.disabled = false;
    }
  }
  setAngle(0);

  function tick(ts) {
    if (!rotating) return;
    if (lastTs == null) lastTs = ts;
    const dt = ts - lastTs;
    lastTs = ts;
    const next = currentAngle + DEG_PER_MS * dt;
    setAngle(next);
    if (currentAngle < 180) {
      requestAnimationFrame(tick);
    } else {
      rotating = false;
    }
  }

  flipBtn.addEventListener('click', () => {
    if (currentAngle >= 180) return;
    rotating = !rotating;
    lastTs = null;
    if (rotating) {
      requestAnimationFrame(tick);
      flipBtn.textContent = 'pause ❚❚';
    } else {
      setAngle(currentAngle);
    }
  });

  resetBtn.addEventListener('click', () => {
    rotating = false;
    lastTs = null;
    setAngle(0);
  });

  // Copy / clear
  document.querySelector('[data-action="copy"]').addEventListener('click', (e) => {
    const btn = e.currentTarget;
    navigator.clipboard.writeText(outEl.textContent).then(() => {
      const orig = btn.textContent;
      btn.textContent = 'copied ✓';
      setTimeout(() => { btn.textContent = orig; }, 1200);
    }).catch(() => {
      const orig = btn.textContent;
      btn.textContent = 'oops';
      setTimeout(() => { btn.textContent = orig; }, 1200);
    });
  });
  document.querySelector('[data-action="clear"]').addEventListener('click', () => {
    inEl.value = '';
    updateFlipped();
    inEl.focus();
  });

  // Keyboard shortcuts
  window.addEventListener('keydown', (e) => {
    if (e.target === inEl) return; // don't trigger while typing
    if (e.code === 'Space') { e.preventDefault(); flipBtn.click(); }
    else if (e.key === 'r' || e.key === 'R') { resetBtn.click(); }
  });
</script>

</body>
</html>
