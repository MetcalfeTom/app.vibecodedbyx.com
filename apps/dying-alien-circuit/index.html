<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Dying Alien Circuit</title>
<meta name="description" content="A purple alien circuit board glitches and pulses as it dies. Click traces to revive them." />
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%91%BD" />
<meta property="og:title" content="Dying Alien Circuit" />
<meta property="og:description" content="A purple alien circuit board glitches and pulses as it dies. Click traces to revive them." />
<meta property="og:url" content="https://sloppy.live/dying-alien-circuit" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/dying%20alien%20cyberpunk%20circuit%20board%20deep%20purple%20violet%20PCB%20with%20toxic%20barf%20green%20glowing%20traces%20rusted%20brown%20copper%20wires%20bioluminescent%20pulses%20rotting%20organic%20technology%20decaying%20chips%20cracked%20silicon%20occult%20glyph%20etchings%20wet%20moss%20rot%20xenotech%20horror?width=1200&height=630" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Major+Mono+Display&family=VT323&family=Cormorant+Garamond:ital@1&family=Audiowide&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --void: #0a0410;
    --pcb-deep: #1d0d2c;
    --pcb-mid: #2c1545;
    --pcb-rim: #3d1c5e;
    --barf: #97c020;        /* toxic barf green */
    --barf-hot: #c8e840;
    --barf-deep: #4f6b0c;
    --rust: #6e3b18;        /* dying brown traces */
    --rust-hot: #a85e22;
    --rust-deep: #3a1f0a;
    --bone: #d4c8b2;
    --blood: #6e1418;
    --glitch: #ff2a8a;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    font-family: 'VT323', monospace;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(151, 192, 32, 0.10), transparent 65%),
      radial-gradient(circle at 12% 88%, rgba(151, 192, 32, 0.08), transparent 55%),
      radial-gradient(circle at 88% 86%, rgba(110, 59, 24, 0.10), transparent 55%),
      linear-gradient(180deg, #0e0518 0%, #050108 100%);
    color: var(--bone);
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }
  /* scanlines */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image: repeating-linear-gradient(0deg, rgba(0,0,0,0.45) 0 1px, transparent 1px 3px);
    z-index: 8;
    opacity: 0.45;
  }
  /* CRT vignette */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(circle at 50% 55%, transparent 0 50%, rgba(10,4,16,0.85) 100%),
      radial-gradient(ellipse at 50% 0%, rgba(151, 192, 32, 0.12), transparent 35%);
    z-index: 9;
  }

  .frame {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header.head {
    padding: 14px 20px 10px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
    border-bottom: 1px solid rgba(151, 192, 32, 0.18);
    background:
      linear-gradient(180deg, rgba(20, 8, 36, 0.85), rgba(10, 4, 18, 0.6));
    backdrop-filter: blur(2px);
  }
  .title-block {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .eyebrow {
    font-family: 'Major Mono Display', monospace;
    font-size: 10px;
    letter-spacing: 0.42em;
    color: var(--barf);
    opacity: 0.78;
    text-transform: uppercase;
  }
  h1 {
    font-family: 'Audiowide', monospace;
    margin: 0;
    font-size: clamp(22px, 3.6vw, 38px);
    letter-spacing: 0.05em;
    color: var(--bone);
    text-shadow:
      0 0 6px rgba(151, 192, 32, 0.55),
      0 0 22px rgba(151, 192, 32, 0.30),
      2px 2px 0 #1a0d06,
      0 0 1px rgba(255, 42, 138, 0.4);
    position: relative;
  }
  h1 .barf { color: var(--barf-hot); }
  h1 .glitch::after {
    content: 'XENOTECH';
    position: absolute;
    top: 0;
    left: 0;
    color: var(--glitch);
    mix-blend-mode: screen;
    transform: translate(2px, -1px);
    opacity: 0.6;
    animation: chromShift 4s steps(8) infinite;
  }
  @keyframes chromShift {
    0%, 92%, 100% { transform: translate(2px, -1px); opacity: 0.45; }
    93% { transform: translate(-3px, 1px); opacity: 0.85; }
    96% { transform: translate(4px, -2px); opacity: 0.7; }
  }
  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: clamp(11px, 1.4vw, 14px);
    color: var(--bone);
    opacity: 0.62;
    margin-top: 3px;
    letter-spacing: 0.04em;
  }

  .hud {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
    font-family: 'VT323', monospace;
  }
  .stat {
    background: rgba(8, 3, 14, 0.85);
    border: 1px solid var(--barf-deep);
    padding: 5px 10px;
    color: var(--barf-hot);
    font-size: 17px;
    line-height: 1;
    letter-spacing: 0.04em;
    box-shadow: inset 0 0 0 1px rgba(151, 192, 32, 0.12), 2px 2px 0 #050108;
  }
  .stat .lbl {
    display: block;
    font-family: 'Major Mono Display', monospace;
    font-size: 8px;
    letter-spacing: 0.35em;
    color: var(--barf);
    opacity: 0.75;
    margin-bottom: 1px;
  }
  .stat.crit { border-color: var(--rust-hot); color: var(--rust-hot); }
  .stat.crit .lbl { color: var(--rust-hot); }
  .stat.dying { border-color: var(--blood); color: #f54a4a; animation: blink 0.6s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0.42; } }

  .stage {
    flex: 1;
    position: relative;
    overflow: hidden;
  }
  canvas#board {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    cursor: crosshair;
  }

  .toolbar {
    padding: 10px 20px;
    border-top: 1px solid rgba(151, 192, 32, 0.18);
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    flex-wrap: wrap;
    background:
      linear-gradient(0deg, rgba(20, 8, 36, 0.92), rgba(10, 4, 18, 0.6));
    backdrop-filter: blur(2px);
    position: relative;
    z-index: 3;
  }
  .toolbar .group {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .tlabel {
    font-family: 'Major Mono Display', monospace;
    font-size: 9px;
    letter-spacing: 0.36em;
    color: var(--barf);
    opacity: 0.7;
  }
  button.tbtn {
    appearance: none;
    background: rgba(20, 8, 36, 0.85);
    border: 1px solid var(--barf-deep);
    color: var(--bone);
    padding: 6px 12px;
    font-family: 'VT323', monospace;
    font-size: 16px;
    letter-spacing: 0.04em;
    cursor: pointer;
    transition: all 0.16s ease;
    box-shadow: 2px 2px 0 #050108;
    line-height: 1;
  }
  button.tbtn:hover {
    background: rgba(40, 16, 70, 0.9);
    border-color: var(--barf);
    color: var(--barf-hot);
    box-shadow: 2px 2px 0 #050108, 0 0 14px rgba(151, 192, 32, 0.3);
  }
  button.tbtn.active {
    background: rgba(151, 192, 32, 0.18);
    border-color: var(--barf);
    color: var(--barf-hot);
    box-shadow: inset 0 0 14px rgba(151, 192, 32, 0.35), 2px 2px 0 #050108;
  }
  button.tbtn.danger { border-color: var(--rust); color: var(--rust-hot); }
  button.tbtn.danger:hover { background: rgba(110, 59, 24, 0.22); border-color: var(--rust-hot); color: var(--bone); }

  .terminal {
    position: absolute;
    left: 16px;
    bottom: 76px;
    background: rgba(8, 3, 14, 0.86);
    border: 1px solid rgba(151, 192, 32, 0.32);
    box-shadow: inset 0 0 0 1px rgba(151, 192, 32, 0.08), 0 0 22px rgba(151, 192, 32, 0.12);
    padding: 8px 10px;
    width: 320px;
    max-width: 70vw;
    font-family: 'VT323', monospace;
    font-size: 14px;
    color: var(--barf);
    pointer-events: none;
    z-index: 4;
  }
  .terminal .tprefix {
    color: var(--rust-hot);
    margin-right: 4px;
  }
  .terminal .tline {
    line-height: 1.2;
    opacity: 0;
    animation: termIn 0.4s ease-out forwards;
  }
  @keyframes termIn {
    from { opacity: 0; transform: translateX(-6px); }
    to { opacity: 0.92; transform: translateX(0); }
  }

  /* glitch flash */
  #glitchOverlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 5;
    mix-blend-mode: screen;
    opacity: 0;
    background: linear-gradient(180deg,
      rgba(255, 42, 138, 0.18) 0%,
      rgba(151, 192, 32, 0.12) 30%,
      transparent 60%,
      rgba(110, 59, 24, 0.18) 100%);
  }
  #glitchOverlay.flash { animation: gflash 0.18s steps(3); }
  @keyframes gflash {
    0% { opacity: 0; }
    50% { opacity: 1; }
    100% { opacity: 0; }
  }

  .corrupt {
    position: absolute;
    pointer-events: none;
    font-family: 'Major Mono Display', monospace;
    color: var(--barf);
    font-size: 11px;
    letter-spacing: 0.3em;
    text-shadow: 0 0 8px rgba(151, 192, 32, 0.6), 1px 0 0 rgba(255, 42, 138, 0.4), -1px 0 0 rgba(110, 59, 24, 0.4);
    opacity: 0.72;
    z-index: 4;
    user-select: none;
  }

  @media (max-width: 720px) {
    .terminal { display: none; }
    .toolbar { padding: 8px 12px; }
    button.tbtn { font-size: 13px; padding: 5px 8px; }
    .hud { gap: 6px; }
    .stat { font-size: 13px; padding: 3px 7px; }
  }
</style>
</head>
<body>
<div class="frame">
  <header class="head">
    <div class="title-block">
      <div class="eyebrow">⊙ XENO · DIAGNOSTIC · TERMINAL ⊙</div>
      <h1>DYING <span class="barf glitch">XENOTECH</span> <span class="barf">CIRCUIT</span></h1>
      <div class="tagline">"the alien computer is bleeding. click a trace to keep its pulse alive."</div>
    </div>
    <div class="hud" id="hud">
      <div class="stat" id="statHealth"><span class="lbl">vitals</span><span id="healthN">100%</span></div>
      <div class="stat crit" id="statPulses"><span class="lbl">pulses</span><span id="pulsesN">0</span></div>
      <div class="stat" id="statDecay"><span class="lbl">decay</span><span id="decayN">0%</span></div>
    </div>
  </header>

  <div class="stage" id="stage">
    <canvas id="board"></canvas>
    <div id="glitchOverlay"></div>
    <div class="terminal" id="terminal"></div>
  </div>

  <div class="toolbar">
    <div class="group">
      <span class="tlabel">PULSE</span>
      <button class="tbtn active" data-tool="revive">⊙ revive trace</button>
      <button class="tbtn" data-tool="surge">⚡ surge</button>
      <button class="tbtn" data-tool="rot">☣ rot</button>
    </div>
    <div class="group">
      <span class="tlabel">SYS</span>
      <button class="tbtn" id="autoBtn">▶ AUTO PULSE</button>
      <button class="tbtn" id="muteBtn">♪ ON</button>
      <button class="tbtn danger" id="resetBtn">↺ rebuild</button>
    </div>
  </div>
</div>

<script>
(() => {
  // ====================== AUDIO ======================
  let ac = null, master = null;
  let muted = false;
  function ensureAudio() {
    if (ac) return ac;
    try {
      ac = new (window.AudioContext || window.webkitAudioContext)();
      master = ac.createGain();
      master.gain.value = 0.4;
      master.connect(ac.destination);
      // ambient drone — sickly
      startDrone();
    } catch (e) { console.warn(e); }
    return ac;
  }

  let droneStarted = false;
  function startDrone() {
    if (droneStarted || !ac) return;
    droneStarted = true;
    const t = ac.currentTime;
    [55, 73.42, 110, 138.59].forEach((f, i) => { // sickly minor chord A1, D2, A2, C#3
      const o = ac.createOscillator();
      o.type = i % 2 ? 'triangle' : 'sine';
      o.frequency.value = f;
      // detune LFO
      const lfo = ac.createOscillator();
      lfo.type = 'sine';
      lfo.frequency.value = 0.04 + i * 0.05;
      const lfoG = ac.createGain();
      lfoG.gain.value = 4 + i * 1.5;
      lfo.connect(lfoG); lfoG.connect(o.detune);
      const lp = ac.createBiquadFilter();
      lp.type = 'lowpass'; lp.frequency.value = 380; lp.Q.value = 1.2;
      // slow filter sweep
      const fLfo = ac.createOscillator();
      fLfo.type = 'sine'; fLfo.frequency.value = 0.06;
      const fGain = ac.createGain(); fGain.gain.value = 180;
      fLfo.connect(fGain); fGain.connect(lp.frequency);
      const g = ac.createGain(); g.gain.value = 0.0001;
      g.gain.linearRampToValueAtTime(0.10, t + 2);
      o.connect(lp); lp.connect(g); g.connect(master);
      o.start(); lfo.start(); fLfo.start();
    });
    // breathing static
    const noiseLen = ac.sampleRate * 2.2;
    const buf = ac.createBuffer(1, noiseLen, ac.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < noiseLen; i++) d[i] = (Math.random()*2-1) * 0.5;
    const ns = ac.createBufferSource(); ns.buffer = buf; ns.loop = true;
    const bp = ac.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 1200; bp.Q.value = 0.8;
    const ng = ac.createGain(); ng.gain.value = 0;
    ng.gain.linearRampToValueAtTime(0.04, t + 3);
    // breathe
    const breath = ac.createOscillator(); breath.type = 'sine'; breath.frequency.value = 0.08;
    const breathG = ac.createGain(); breathG.gain.value = 0.025;
    breath.connect(breathG); breathG.connect(ng.gain);
    ns.connect(bp); bp.connect(ng); ng.connect(master);
    ns.start(); breath.start();
  }

  function pulseSfx(hue = 0) {
    if (!ac) return;
    const t = ac.currentTime;
    const o = ac.createOscillator(); o.type = 'triangle';
    const f = 320 + Math.random() * 460 - hue * 80;
    o.frequency.setValueAtTime(f, t);
    o.frequency.exponentialRampToValueAtTime(Math.max(80, f * 0.4), t + 0.45);
    const lp = ac.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 1800; lp.Q.value = 1.6;
    const g = ac.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.18, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.5);
    o.connect(lp); lp.connect(g); g.connect(master);
    o.start(t); o.stop(t + 0.55);
  }
  function surgeSfx() {
    if (!ac) return;
    const t = ac.currentTime;
    // rising sawtooth zap
    const o = ac.createOscillator(); o.type = 'sawtooth';
    o.frequency.setValueAtTime(80, t);
    o.frequency.exponentialRampToValueAtTime(2400, t + 0.4);
    const bp = ac.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 1400; bp.Q.value = 4;
    const g = ac.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.22, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.5);
    o.connect(bp); bp.connect(g); g.connect(master);
    o.start(t); o.stop(t + 0.55);
    // static crackle
    const len = ac.sampleRate * 0.25;
    const b = ac.createBuffer(1, len, ac.sampleRate);
    const d = b.getChannelData(0);
    for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, 1.4);
    const ns = ac.createBufferSource(); ns.buffer = b;
    const hp = ac.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 1800;
    const ng = ac.createGain(); ng.gain.setValueAtTime(0.18, t); ng.gain.exponentialRampToValueAtTime(0.0001, t + 0.3);
    ns.connect(hp); hp.connect(ng); ng.connect(master);
    ns.start(t);
  }
  function rotSfx() {
    if (!ac) return;
    const t = ac.currentTime;
    const o = ac.createOscillator(); o.type = 'sawtooth';
    o.frequency.setValueAtTime(180, t);
    o.frequency.exponentialRampToValueAtTime(40, t + 0.6);
    const lp = ac.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 600;
    const g = ac.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(0.20, t + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + 0.7);
    o.connect(lp); lp.connect(g); g.connect(master);
    o.start(t); o.stop(t + 0.75);
  }
  function glitchSfx() {
    if (!ac) return;
    const t = ac.currentTime;
    // bit-crushed click burst
    for (let i = 0; i < 4; i++) {
      const o = ac.createOscillator(); o.type = 'square';
      o.frequency.value = 200 + Math.random() * 1800;
      const g = ac.createGain();
      g.gain.setValueAtTime(0.0001, t + i*0.05);
      g.gain.exponentialRampToValueAtTime(0.10, t + i*0.05 + 0.005);
      g.gain.exponentialRampToValueAtTime(0.0001, t + i*0.05 + 0.06);
      o.connect(g); g.connect(master);
      o.start(t + i*0.05); o.stop(t + i*0.05 + 0.07);
    }
  }

  // ====================== STATE ======================
  const G = {
    canvas: document.getElementById('board'),
    stage: document.getElementById('stage'),
    glitchOverlay: document.getElementById('glitchOverlay'),
    terminal: document.getElementById('terminal'),
    nodes: [],
    traces: [],
    chips: [],
    capacitors: [],
    resistors: [],
    glyphs: [],
    pulses: [],     // active light pulses traveling along traces
    sparks: [],
    rotPatches: [], // dying spots
    health: 100,
    decay: 0,
    pulseCount: 0,
    tool: 'revive',
    auto: false,
    autoTimer: 0,
    seed: Math.random() * 99999,
    nextDecayAt: 0,
    timeMs: 0,
    lastT: 0,
    bgGlitchT: 0,
    bgOffset: { x: 0, y: 0, t: 0 }
  };
  const ctx = G.canvas.getContext('2d');

  // PRNG
  function mulberry32(a) {
    return function() {
      let t = a += 0x6D2B79F5;
      t = Math.imul(t ^ t >>> 15, t | 1);
      t ^= t + Math.imul(t ^ t >>> 7, t | 61);
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    }
  }
  let rng = mulberry32(Math.floor(G.seed * 1000));

  // ====================== BUILD CIRCUIT ======================
  function buildCircuit() {
    const W = G.canvas.width;
    const H = G.canvas.height;
    G.nodes = [];
    G.traces = [];
    G.chips = [];
    G.capacitors = [];
    G.resistors = [];
    G.glyphs = [];
    G.pulses = [];
    G.sparks = [];
    G.rotPatches = [];

    // create grid-ish node layout, 40px cells, jittered
    const cellW = 56;
    const cellH = 56;
    const cols = Math.floor(W / cellW);
    const rows = Math.floor(H / cellH);
    const nodeMap = {};

    // place nodes with moderate density and jitter
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        if (rng() > 0.62) continue;
        const x = c * cellW + cellW * 0.5 + (rng() - 0.5) * cellW * 0.4;
        const y = r * cellH + cellH * 0.5 + (rng() - 0.5) * cellH * 0.4;
        const node = {
          id: G.nodes.length,
          x, y,
          c, r,
          alive: true,
          pulseT: 0,
          rot: 0,
          kind: rng() < 0.06 ? 'pad' : 'via',
          size: rng() < 0.05 ? 4 + rng()*3 : 2 + rng()*2
        };
        G.nodes.push(node);
        nodeMap[c+','+r] = node;
      }
    }

    // place chips: 3-6 large rectangles
    const chipCount = 3 + Math.floor(rng() * 3);
    for (let i = 0; i < chipCount; i++) {
      const cw = 70 + rng() * 100;
      const ch = 50 + rng() * 90;
      const cx = 40 + rng() * (W - cw - 80);
      const cy = 40 + rng() * (H - ch - 80);
      // ensure chips don't badly overlap
      let overlap = false;
      for (const c2 of G.chips) {
        if (cx < c2.x + c2.w + 16 && cx + cw + 16 > c2.x &&
            cy < c2.y + c2.h + 16 && cy + ch + 16 > c2.y) { overlap = true; break; }
      }
      if (overlap) continue;
      const chip = {
        x: cx, y: cy, w: cw, h: ch,
        rot: 0,
        label: ['XR-77', 'CR-OG', 'NU∇-3', 'VRM·X', 'DΩG', 'YH·89', 'Ψ-410', 'GLO-π'][Math.floor(rng()*8)],
        pins: [],
        alive: true,
        decay: 0,
        glow: 0
      };
      // pins on all 4 sides
      const pinSp = 11;
      for (let p = pinSp; p < cw - pinSp; p += pinSp) {
        chip.pins.push({ x: cx + p, y: cy - 2, side: 'top' });
        chip.pins.push({ x: cx + p, y: cy + ch + 2, side: 'bot' });
      }
      for (let p = pinSp; p < ch - pinSp; p += pinSp) {
        chip.pins.push({ x: cx - 2, y: cy + p, side: 'left' });
        chip.pins.push({ x: cx + cw + 2, y: cy + p, side: 'right' });
      }
      G.chips.push(chip);
    }

    // build orthogonal traces between random node pairs (manhattan with corners)
    // create rough graph by connecting some nodes to nearby nodes
    const targetTraces = 90;
    const sampledPairs = new Set();
    let tries = 0;
    while (G.traces.length < targetTraces && tries < targetTraces * 8) {
      tries++;
      const a = G.nodes[Math.floor(rng() * G.nodes.length)];
      if (!a) break;
      // find nearby nodes within 2-4 cells
      const candidates = G.nodes.filter(n => {
        if (n === a) return false;
        const dx = Math.abs(n.x - a.x);
        const dy = Math.abs(n.y - a.y);
        return dx + dy < 200 && dx + dy > 30;
      });
      if (candidates.length === 0) continue;
      const b = candidates[Math.floor(rng() * candidates.length)];
      const key = a.id < b.id ? a.id+'-'+b.id : b.id+'-'+a.id;
      if (sampledPairs.has(key)) continue;
      sampledPairs.add(key);
      // build trace as orthogonal polyline with 1 random corner
      const horizFirst = rng() < 0.5;
      const corner = horizFirst ? { x: b.x, y: a.y } : { x: a.x, y: b.y };
      const points = [{ x: a.x, y: a.y }, corner, { x: b.x, y: b.y }];
      // skip if the trace passes through a chip's body
      let cross = false;
      for (const c of G.chips) {
        // check segments
        for (let i = 0; i < points.length - 1; i++) {
          if (segIntersectsRect(points[i], points[i+1], c)) { cross = true; break; }
        }
        if (cross) break;
      }
      if (cross) continue;
      // assign trace properties
      const totalLen = traceLen(points);
      const trace = {
        a, b,
        points,
        length: totalLen,
        color: pickTraceColor(),
        width: 2 + Math.floor(rng() * 2),
        alive: true,
        pulseT: 0,
        decay: 0,
        rotPos: -1, // 0..length where rot has spread
        autoOffset: rng() * 1000
      };
      G.traces.push(trace);
    }

    // capacitors: small cylinders near nodes
    for (let i = 0; i < 14; i++) {
      const n = G.nodes[Math.floor(rng() * G.nodes.length)];
      G.capacitors.push({
        x: n.x + (rng() - 0.5) * 14,
        y: n.y + (rng() - 0.5) * 14,
        r: 6 + rng() * 4,
        leak: 0,
        alive: true
      });
    }
    // resistors: small striped boxes
    for (let i = 0; i < 16; i++) {
      const n = G.nodes[Math.floor(rng() * G.nodes.length)];
      G.resistors.push({
        x: n.x + (rng() - 0.5) * 10,
        y: n.y + (rng() - 0.5) * 10,
        len: 14 + rng() * 8,
        rot: rng() < 0.5 ? 0 : Math.PI/2,
        alive: true
      });
    }
    // alien glyphs (silkscreen markings)
    const glyphChars = ['Λ', 'Ξ', 'Φ', 'Ψ', '∇', '⊕', '⊗', 'Ω', '∞', 'Ϟ', 'Ѫ', 'Ҩ', 'Ѳ'];
    for (let i = 0; i < 28; i++) {
      G.glyphs.push({
        x: rng() * W,
        y: rng() * H,
        ch: glyphChars[Math.floor(rng() * glyphChars.length)],
        size: 8 + rng() * 6,
        rot: (rng() - 0.5) * 0.6,
        alpha: 0.2 + rng() * 0.4,
        flickerOffset: rng() * 3000
      });
    }
  }

  function segIntersectsRect(p1, p2, r) {
    // generous padding so traces dont touch chip body, but allow pin connections
    const pad = 6;
    const x1 = r.x - pad, y1 = r.y - pad;
    const x2 = r.x + r.w + pad, y2 = r.y + r.h + pad;
    // both endpoints inside?
    const inside = (px, py) => px > x1 && px < x2 && py > y1 && py < y2;
    if (inside(p1.x, p1.y) && inside(p2.x, p2.y)) return true;
    if (inside(p1.x, p1.y) || inside(p2.x, p2.y)) return true;
    // axis check
    if (p1.x === p2.x) {
      if (p1.x > x1 && p1.x < x2 && Math.min(p1.y, p2.y) < y2 && Math.max(p1.y, p2.y) > y1) return true;
    } else if (p1.y === p2.y) {
      if (p1.y > y1 && p1.y < y2 && Math.min(p1.x, p2.x) < x2 && Math.max(p1.x, p2.x) > x1) return true;
    }
    return false;
  }

  function traceLen(points) {
    let l = 0;
    for (let i = 0; i < points.length - 1; i++) {
      l += Math.hypot(points[i+1].x - points[i].x, points[i+1].y - points[i].y);
    }
    return l;
  }

  function pickTraceColor() {
    const r = rng();
    if (r < 0.55) return 'barf';   // toxic green — most common
    if (r < 0.85) return 'rust';   // dying brown
    return 'blood';                // rare blood-red trace
  }

  // ====================== PULSES ======================
  function emitPulse(traceIdx, color) {
    if (traceIdx < 0 || traceIdx >= G.traces.length) return;
    const t = G.traces[traceIdx];
    if (!t.alive) return;
    G.pulses.push({
      traceIdx,
      pos: 0,
      speed: 0.6 + rng() * 0.4,
      color: color || t.color,
      width: t.width + 1.5,
      bornAt: G.timeMs,
      ttl: 4000,
      surge: false
    });
    G.pulseCount++;
    pulseSfx();
  }
  function emitSurge(traceIdx) {
    if (traceIdx < 0 || traceIdx >= G.traces.length) return;
    const t = G.traces[traceIdx];
    if (!t.alive) return;
    G.pulses.push({
      traceIdx,
      pos: 0,
      speed: 1.6 + rng() * 0.6,
      color: 'glitch',
      width: t.width + 3,
      bornAt: G.timeMs,
      ttl: 2200,
      surge: true
    });
    surgeSfx();
    G.pulseCount += 3;
    flashGlitch();
    // chain to neighbors
    const a = t.a, b = t.b;
    const neighbors = G.traces.filter(tr => tr !== t && tr.alive && (tr.a === a || tr.a === b || tr.b === a || tr.b === b));
    neighbors.slice(0, 4).forEach((nt, i) => {
      setTimeout(() => emitPulse(G.traces.indexOf(nt), 'glitch'), 80 + i*60);
    });
  }
  function rotTrace(traceIdx) {
    if (traceIdx < 0 || traceIdx >= G.traces.length) return;
    const t = G.traces[traceIdx];
    if (!t.alive) return;
    t.alive = false;
    t.decay = 1;
    G.rotPatches.push({ x: (t.a.x + t.b.x)/2, y: (t.a.y + t.b.y)/2, r: 4, alive: 1 });
    G.health = Math.max(0, G.health - 4);
    G.decay = Math.min(100, G.decay + 3);
    rotSfx();
  }

  function autoPulseTick(t) {
    if (!G.auto) return;
    if (t > G.autoTimer) {
      const aliveTraces = G.traces.map((tr, i) => tr.alive ? i : -1).filter(i => i >= 0);
      if (aliveTraces.length === 0) return;
      const pickN = 1 + Math.floor(rng() * 3);
      for (let i = 0; i < pickN; i++) {
        emitPulse(aliveTraces[Math.floor(rng() * aliveTraces.length)]);
      }
      G.autoTimer = t + 200 + rng() * 380;
    }
  }

  // global decay (passive)
  function passiveDecay(dt) {
    G.health = Math.max(0, G.health - dt * 0.0005);
    G.decay = Math.min(100, G.decay + dt * 0.0008);

    // periodically rot a trace
    if (G.timeMs > G.nextDecayAt) {
      const aliveTraces = G.traces.filter(t => t.alive);
      if (aliveTraces.length > 0) {
        const t = aliveTraces[Math.floor(rng() * aliveTraces.length)];
        rotTrace(G.traces.indexOf(t));
        terminalLog('TRACE ' + (t.color === 'barf' ? 'PHL-' : t.color === 'rust' ? 'CU-' : 'BLD-') + Math.floor(rng()*9999) + ' SEPSIS');
      }
      G.nextDecayAt = G.timeMs + 6000 + rng() * 5000;
    }

    // glitch flashes when low health
    if (G.health < 40 && rng() < dt * 0.0004) {
      flashGlitch();
      glitchSfx();
    }
  }

  // pulses revive traces (slow heal)
  function pulseHeals(traceIdx) {
    const t = G.traces[traceIdx];
    if (!t) return;
    if (!t.alive) {
      t.alive = true;
      G.health = Math.min(100, G.health + 1.5);
      G.decay = Math.max(0, G.decay - 0.8);
    } else {
      G.health = Math.min(100, G.health + 0.4);
    }
  }

  // ====================== INTERACTION ======================
  function handleClick(x, y) {
    ensureAudio();
    // find closest trace within hit threshold
    let bestI = -1, bestD = 16;
    for (let i = 0; i < G.traces.length; i++) {
      const t = G.traces[i];
      const d = traceDist(t, x, y);
      if (d < bestD) { bestD = d; bestI = i; }
    }
    if (bestI < 0) {
      // didn't hit a trace. small spark feedback.
      G.sparks.push({ x, y, life: 0, maxLife: 30, color: 'rust' });
      return;
    }
    if (G.tool === 'revive') {
      // revive if dead, then send a pulse
      if (!G.traces[bestI].alive) {
        G.traces[bestI].alive = true;
        G.health = Math.min(100, G.health + 4);
        G.decay = Math.max(0, G.decay - 2);
        terminalLog('TRACE ' + bestI + ' HEAL · CAP +');
      }
      emitPulse(bestI);
      pulseHeals(bestI);
    } else if (G.tool === 'surge') {
      emitSurge(bestI);
      terminalLog('SURGE INIT · CASCADE');
    } else if (G.tool === 'rot') {
      rotTrace(bestI);
      terminalLog('SECTOR ROT · -4 VITALS');
    }
  }

  function traceDist(trace, x, y) {
    let best = Infinity;
    for (let i = 0; i < trace.points.length - 1; i++) {
      const d = pointSegDist(x, y, trace.points[i], trace.points[i+1]);
      if (d < best) best = d;
    }
    return best;
  }
  function pointSegDist(px, py, a, b) {
    const dx = b.x - a.x, dy = b.y - a.y;
    const len2 = dx*dx + dy*dy;
    if (len2 === 0) return Math.hypot(px - a.x, py - a.y);
    let t = ((px - a.x) * dx + (py - a.y) * dy) / len2;
    t = Math.max(0, Math.min(1, t));
    return Math.hypot(px - (a.x + t*dx), py - (a.y + t*dy));
  }

  // ====================== TERMINAL ======================
  function terminalLog(msg) {
    const line = document.createElement('div');
    line.className = 'tline';
    line.innerHTML = '<span class="tprefix">▶</span>' + msg;
    G.terminal.appendChild(line);
    while (G.terminal.children.length > 6) G.terminal.removeChild(G.terminal.firstChild);
  }
  // ====================== GLITCH FLASH ======================
  function flashGlitch() {
    G.glitchOverlay.classList.remove('flash');
    void G.glitchOverlay.offsetWidth; // reflow
    G.glitchOverlay.classList.add('flash');
    G.bgOffset.t = G.timeMs;
  }

  // ====================== DRAW ======================
  function draw(t) {
    const W = G.canvas.width;
    const H = G.canvas.height;
    // background — purple PCB texture
    drawPCB(W, H, t);

    // glyphs (silkscreen) — drawn behind traces
    drawGlyphs(t);

    // chips (drawn before traces but pins behind chip body, traces on top of pins)
    drawChips(t);

    // traces
    drawTraces(t);

    // chips top layer (label etc)
    drawChipLabels(t);

    // pulses (above traces)
    drawPulses(t);

    // capacitors + resistors
    drawCapacitors(t);
    drawResistors(t);

    // nodes
    drawNodes(t);

    // rot patches (above traces, growing wet decay spots)
    drawRotPatches(t);

    // sparks
    drawSparks(t);

    // overall vignette pulse + sickly tint
    drawSicklyTint(W, H, t);
  }

  function drawPCB(W, H, t) {
    // base purple
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#1d0d2c');
    grad.addColorStop(0.6, '#180828');
    grad.addColorStop(1, '#0e0418');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    // subtle dot grid
    ctx.fillStyle = 'rgba(151, 192, 32, 0.05)';
    const cellW = 56;
    const offX = (Math.sin(t*0.0001) * 4 + 4) % cellW;
    const offY = (Math.cos(t*0.00012) * 4 + 4) % cellW;
    for (let x = -cellW + offX; x < W + cellW; x += cellW) {
      for (let y = -cellW + offY; y < H + cellW; y += cellW) {
        ctx.fillRect(x, y, 1, 1);
      }
    }
    // bigger crosses every 4 cells
    ctx.fillStyle = 'rgba(110, 59, 24, 0.10)';
    for (let x = -cellW*2 + offX; x < W + cellW; x += cellW * 4) {
      for (let y = -cellW*2 + offY; y < H + cellW; y += cellW * 4) {
        ctx.fillRect(x-2, y, 5, 1);
        ctx.fillRect(x, y-2, 1, 5);
      }
    }
    // moss / decay blobs
    ctx.save();
    for (let i = 0; i < 8; i++) {
      const bx = ((Math.sin(t*0.00007 + i*1.7) + 1) * 0.5) * W;
      const by = ((Math.cos(t*0.00009 + i*2.3) + 1) * 0.5) * H;
      const r = 80 + Math.sin(t*0.001 + i) * 20;
      const decayMix = G.decay / 100;
      const blobGrad = ctx.createRadialGradient(bx, by, 0, bx, by, r);
      blobGrad.addColorStop(0, `rgba(110, 59, 24, ${0.14 + decayMix * 0.10})`);
      blobGrad.addColorStop(1, 'rgba(110, 59, 24, 0)');
      ctx.fillStyle = blobGrad;
      ctx.beginPath(); ctx.arc(bx, by, r, 0, Math.PI*2); ctx.fill();
    }
    ctx.restore();
  }

  function drawGlyphs(t) {
    ctx.save();
    for (const g of G.glyphs) {
      const flicker = 0.6 + Math.sin((t + g.flickerOffset) * 0.001) * 0.4;
      const a = g.alpha * flicker * (0.6 + (G.health / 100) * 0.4);
      ctx.translate(g.x, g.y);
      ctx.rotate(g.rot);
      ctx.fillStyle = `rgba(151, 192, 32, ${a * 0.5})`;
      ctx.font = `${g.size}px 'Major Mono Display', monospace`;
      ctx.fillText(g.ch, 0, 0);
      // chromatic ghost
      ctx.fillStyle = `rgba(110, 59, 24, ${a * 0.4})`;
      ctx.fillText(g.ch, 1, -1);
      ctx.setTransform(1, 0, 0, 1, 0, 0);
    }
    ctx.restore();
  }

  function drawChips(t) {
    for (const c of G.chips) {
      // shadow
      ctx.fillStyle = 'rgba(0, 0, 0, 0.45)';
      ctx.fillRect(c.x + 3, c.y + 3, c.w, c.h);
      // body — sickly purple-black
      const grad = ctx.createLinearGradient(c.x, c.y, c.x + c.w, c.y + c.h);
      grad.addColorStop(0, '#0e0418');
      grad.addColorStop(0.5, '#1a081e');
      grad.addColorStop(1, '#0a0212');
      ctx.fillStyle = grad;
      ctx.fillRect(c.x, c.y, c.w, c.h);
      // border with sickly green glow if alive
      ctx.strokeStyle = `rgba(151, 192, 32, ${c.alive ? 0.4 + Math.sin(t*0.002 + c.x) * 0.2 : 0.1})`;
      ctx.lineWidth = 1;
      ctx.strokeRect(c.x + 0.5, c.y + 0.5, c.w - 1, c.h - 1);
      // pin1 dot
      ctx.fillStyle = 'rgba(110, 59, 24, 0.7)';
      ctx.beginPath(); ctx.arc(c.x + 8, c.y + 8, 1.6, 0, Math.PI*2); ctx.fill();
      // pins
      for (const p of c.pins) {
        ctx.fillStyle = '#a99683';
        if (p.side === 'top' || p.side === 'bot') {
          ctx.fillRect(p.x - 1.5, p.y - (p.side === 'top' ? 5 : -1), 3, 6);
        } else {
          ctx.fillRect(p.x - (p.side === 'left' ? 5 : -1), p.y - 1.5, 6, 3);
        }
      }
      // alien rot growing on chip
      if (G.decay > 30) {
        const dec = (G.decay - 30) / 70;
        ctx.fillStyle = `rgba(110, 59, 24, ${dec * 0.3})`;
        ctx.fillRect(c.x, c.y + c.h * (1 - dec), c.w, c.h * dec);
        // rot speckles
        const speckCount = Math.floor(dec * 30);
        ctx.fillStyle = `rgba(60, 30, 12, ${dec * 0.6})`;
        for (let i = 0; i < speckCount; i++) {
          const sx = c.x + (i * 13 + t*0.0001) % c.w;
          const sy = c.y + ((i * 17 + t*0.00007) % 1) * c.h;
          ctx.fillRect(sx, sy, 2, 2);
        }
      }
    }
  }

  function drawChipLabels(t) {
    for (const c of G.chips) {
      ctx.save();
      ctx.fillStyle = `rgba(212, 200, 178, ${c.alive ? 0.7 : 0.3})`;
      ctx.font = `bold ${Math.min(11, c.w/8)}px 'Major Mono Display', monospace`;
      ctx.textAlign = 'center';
      ctx.fillText(c.label, c.x + c.w/2, c.y + c.h/2 + 4);
      // chromatic glitch on text
      if (G.health < 50) {
        ctx.fillStyle = `rgba(255, 42, 138, ${(50 - G.health) / 100 * 0.6})`;
        ctx.fillText(c.label, c.x + c.w/2 + 1, c.y + c.h/2 + 4);
        ctx.fillStyle = `rgba(110, 59, 24, ${(50 - G.health) / 100 * 0.4})`;
        ctx.fillText(c.label, c.x + c.w/2 - 1, c.y + c.h/2 + 4);
      }
      ctx.restore();
    }
  }

  function colorOf(c, alpha = 1, hot = false) {
    if (c === 'barf') return hot ? `rgba(200, 232, 64, ${alpha})` : `rgba(151, 192, 32, ${alpha})`;
    if (c === 'rust') return hot ? `rgba(168, 94, 34, ${alpha})` : `rgba(110, 59, 24, ${alpha})`;
    if (c === 'blood') return hot ? `rgba(220, 60, 70, ${alpha})` : `rgba(110, 20, 24, ${alpha})`;
    if (c === 'glitch') return hot ? `rgba(255, 110, 200, ${alpha})` : `rgba(255, 42, 138, ${alpha})`;
    return `rgba(151, 192, 32, ${alpha})`;
  }

  function drawTraces(t) {
    for (let i = 0; i < G.traces.length; i++) {
      const tr = G.traces[i];
      // base trace stroke
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';
      // outer halo (only if alive)
      if (tr.alive) {
        ctx.strokeStyle = colorOf(tr.color, 0.18);
        ctx.lineWidth = tr.width + 6;
        ctx.beginPath();
        ctx.moveTo(tr.points[0].x, tr.points[0].y);
        for (let p = 1; p < tr.points.length; p++) ctx.lineTo(tr.points[p].x, tr.points[p].y);
        ctx.stroke();
      }
      // body
      ctx.strokeStyle = tr.alive ? colorOf(tr.color, 0.85) : `rgba(70, 36, 14, 0.4)`;
      ctx.lineWidth = tr.width;
      ctx.beginPath();
      ctx.moveTo(tr.points[0].x, tr.points[0].y);
      for (let p = 1; p < tr.points.length; p++) ctx.lineTo(tr.points[p].x, tr.points[p].y);
      ctx.stroke();
      // dead trace dashed overlay
      if (!tr.alive) {
        ctx.save();
        ctx.setLineDash([3, 4]);
        ctx.strokeStyle = `rgba(110, 59, 24, 0.7)`;
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(tr.points[0].x, tr.points[0].y);
        for (let p = 1; p < tr.points.length; p++) ctx.lineTo(tr.points[p].x, tr.points[p].y);
        ctx.stroke();
        ctx.restore();
      }
      // inner highlight stripe (alive only)
      if (tr.alive && tr.width > 2) {
        ctx.strokeStyle = colorOf(tr.color, 0.4, true);
        ctx.lineWidth = 0.7;
        ctx.beginPath();
        ctx.moveTo(tr.points[0].x, tr.points[0].y);
        for (let p = 1; p < tr.points.length; p++) ctx.lineTo(tr.points[p].x, tr.points[p].y);
        ctx.stroke();
      }
    }
  }

  function drawPulses(t) {
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    for (let i = G.pulses.length - 1; i >= 0; i--) {
      const p = G.pulses[i];
      if (p.bornAt + p.ttl < G.timeMs) { G.pulses.splice(i, 1); continue; }
      const tr = G.traces[p.traceIdx];
      if (!tr) { G.pulses.splice(i, 1); continue; }
      // advance position
      p.pos += p.speed * (G.lastT ? Math.min(50, G.timeMs - G.lastT) : 16) / 16;
      const totalLen = tr.length;
      if (p.pos > totalLen) {
        // pulse delivered → revive node + heal a bit + chance chain
        pulseHeals(p.traceIdx);
        // chain into neighboring traces from terminal node
        if (rng() < 0.42) {
          const term = tr.b;
          const neighbors = G.traces.filter(t2 => t2 !== tr && t2.alive && (t2.a === term || t2.b === term));
          if (neighbors.length > 0) {
            const next = neighbors[Math.floor(rng() * neighbors.length)];
            // emit a smaller follow-on pulse from a→b or b→a
            G.pulses.push({
              traceIdx: G.traces.indexOf(next),
              pos: 0, speed: p.speed * 0.85,
              color: p.color, width: Math.max(2, p.width - 0.5),
              bornAt: G.timeMs, ttl: p.ttl - 500,
              surge: p.surge
            });
          }
        }
        G.pulses.splice(i, 1);
        continue;
      }
      // find current xy on trace
      const xy = traceXY(tr, p.pos);
      // draw glow
      const r1 = p.width * 4;
      const grad = ctx.createRadialGradient(xy.x, xy.y, 0, xy.x, xy.y, r1);
      grad.addColorStop(0, colorOf(p.color, 0.95, true));
      grad.addColorStop(0.4, colorOf(p.color, 0.55));
      grad.addColorStop(1, colorOf(p.color, 0));
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(xy.x, xy.y, r1, 0, Math.PI*2); ctx.fill();
      // tail (sample positions behind)
      ctx.strokeStyle = colorOf(p.color, 0.85, true);
      ctx.lineWidth = p.width;
      ctx.beginPath();
      const tailLen = 28;
      const tailStart = Math.max(0, p.pos - tailLen);
      let first = true;
      // walk segments
      let acc = 0;
      for (let s = 0; s < tr.points.length - 1; s++) {
        const a = tr.points[s], b = tr.points[s+1];
        const segLen = Math.hypot(b.x - a.x, b.y - a.y);
        if (acc + segLen >= tailStart) {
          const startT = Math.max(0, (tailStart - acc) / segLen);
          const endT = Math.min(1, (p.pos - acc) / segLen);
          const sx = a.x + (b.x - a.x) * startT;
          const sy = a.y + (b.y - a.y) * startT;
          const ex = a.x + (b.x - a.x) * endT;
          const ey = a.y + (b.y - a.y) * endT;
          if (first) { ctx.moveTo(sx, sy); first = false; } else ctx.lineTo(sx, sy);
          ctx.lineTo(ex, ey);
          if (acc + segLen >= p.pos) break;
        }
        acc += segLen;
      }
      ctx.stroke();
    }
    ctx.restore();
  }

  function traceXY(trace, dist) {
    let acc = 0;
    for (let i = 0; i < trace.points.length - 1; i++) {
      const a = trace.points[i], b = trace.points[i+1];
      const segLen = Math.hypot(b.x - a.x, b.y - a.y);
      if (acc + segLen >= dist) {
        const t = (dist - acc) / segLen;
        return { x: a.x + (b.x - a.x) * t, y: a.y + (b.y - a.y) * t };
      }
      acc += segLen;
    }
    const last = trace.points[trace.points.length - 1];
    return { x: last.x, y: last.y };
  }

  function drawNodes(t) {
    for (const n of G.nodes) {
      // pad/via base
      ctx.fillStyle = '#1a081e';
      ctx.beginPath(); ctx.arc(n.x, n.y, n.size + 1.3, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = n.kind === 'pad' ? '#a99683' : '#bda692';
      ctx.beginPath(); ctx.arc(n.x, n.y, n.size, 0, Math.PI*2); ctx.fill();
      // hole
      ctx.fillStyle = '#0a0410';
      ctx.beginPath(); ctx.arc(n.x, n.y, n.size * 0.4, 0, Math.PI*2); ctx.fill();
    }
  }

  function drawCapacitors(t) {
    for (const c of G.capacitors) {
      // body cylinder (top-down view): outer ring + inner color
      ctx.fillStyle = '#0a0212';
      ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, Math.PI*2); ctx.fill();
      // metal ring
      ctx.strokeStyle = '#a99683';
      ctx.lineWidth = 1.4;
      ctx.beginPath(); ctx.arc(c.x, c.y, c.r - 0.6, 0, Math.PI*2); ctx.stroke();
      // sickly green top fluid
      ctx.fillStyle = `rgba(151, 192, 32, ${0.4 + Math.sin(t*0.002 + c.x) * 0.12})`;
      ctx.beginPath(); ctx.arc(c.x - 0.5, c.y - 0.5, c.r - 1.5, 0, Math.PI*2); ctx.fill();
      // marker line
      ctx.strokeStyle = '#bda692';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(c.x - c.r + 1, c.y); ctx.lineTo(c.x + c.r - 1, c.y); ctx.stroke();
      // leak goo
      if (G.decay > 50 && rng() < 0.001 * G.decay) {
        c.leak = Math.min(8, c.leak + 0.2);
      }
      if (c.leak > 0.1) {
        ctx.fillStyle = `rgba(151, 192, 32, ${0.7})`;
        ctx.beginPath(); ctx.arc(c.x + c.r * 0.6, c.y + c.r * 0.6 + c.leak, 1.5 + c.leak * 0.18, 0, Math.PI*2); ctx.fill();
      }
    }
  }

  function drawResistors(t) {
    for (const r of G.resistors) {
      ctx.save();
      ctx.translate(r.x, r.y);
      ctx.rotate(r.rot);
      // body
      const w = r.len, h = 5;
      ctx.fillStyle = '#3a1f0a';
      ctx.fillRect(-w/2, -h/2, w, h);
      // bands
      const bands = ['#97c020', '#6e1418', '#a99683', '#6e3b18'];
      for (let i = 0; i < bands.length; i++) {
        ctx.fillStyle = bands[i];
        ctx.fillRect(-w/2 + 3 + i*2.4, -h/2 + 0.5, 1.4, h - 1);
      }
      // leads
      ctx.strokeStyle = '#a99683'; ctx.lineWidth = 1.2;
      ctx.beginPath();
      ctx.moveTo(-w/2 - 4, 0); ctx.lineTo(-w/2, 0);
      ctx.moveTo(w/2, 0); ctx.lineTo(w/2 + 4, 0);
      ctx.stroke();
      ctx.restore();
    }
  }

  function drawRotPatches(t) {
    for (const p of G.rotPatches) {
      p.r = Math.min(60, p.r + 0.06);
      const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r);
      grad.addColorStop(0, `rgba(110, 59, 24, 0.5)`);
      grad.addColorStop(0.6, `rgba(110, 59, 24, 0.2)`);
      grad.addColorStop(1, `rgba(110, 59, 24, 0)`);
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2); ctx.fill();
      // wet shine speckles
      for (let i = 0; i < 5; i++) {
        const ang = (t*0.0007 + i*1.7) % (Math.PI*2);
        const dr = p.r * 0.6;
        const sx = p.x + Math.cos(ang) * dr;
        const sy = p.y + Math.sin(ang) * dr;
        ctx.fillStyle = `rgba(151, 192, 32, 0.4)`;
        ctx.beginPath(); ctx.arc(sx, sy, 1, 0, Math.PI*2); ctx.fill();
      }
    }
  }

  function drawSparks(t) {
    for (let i = G.sparks.length - 1; i >= 0; i--) {
      const s = G.sparks[i];
      s.life++;
      if (s.life >= s.maxLife) { G.sparks.splice(i, 1); continue; }
      const a = 1 - s.life / s.maxLife;
      const r = 2 + s.life * 0.5;
      ctx.strokeStyle = colorOf(s.color, a * 0.9);
      ctx.lineWidth = 1.2;
      ctx.beginPath(); ctx.arc(s.x, s.y, r, 0, Math.PI*2); ctx.stroke();
    }
  }

  function drawSicklyTint(W, H, t) {
    const sickness = 1 - G.health / 100;
    if (sickness > 0.05) {
      ctx.save();
      ctx.globalCompositeOperation = 'multiply';
      ctx.fillStyle = `rgba(110, 59, 24, ${sickness * 0.16})`;
      ctx.fillRect(0, 0, W, H);
      ctx.restore();
    }
    // pulse edge glow
    const pulse = 0.06 + Math.sin(t * 0.0014) * 0.04;
    ctx.save();
    ctx.globalCompositeOperation = 'screen';
    const eg = ctx.createRadialGradient(W/2, H/2, Math.min(W,H)*0.3, W/2, H/2, Math.max(W,H)*0.7);
    eg.addColorStop(0, 'rgba(151, 192, 32, 0)');
    eg.addColorStop(1, `rgba(151, 192, 32, ${pulse})`);
    ctx.fillStyle = eg;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
  }

  // ====================== HUD ======================
  const healthN = document.getElementById('healthN');
  const pulsesN = document.getElementById('pulsesN');
  const decayN = document.getElementById('decayN');
  const statHealth = document.getElementById('statHealth');
  const statDecay = document.getElementById('statDecay');
  function updateHud() {
    healthN.textContent = Math.round(G.health) + '%';
    pulsesN.textContent = G.pulseCount;
    decayN.textContent = Math.round(G.decay) + '%';
    statHealth.classList.toggle('crit', G.health < 60);
    statHealth.classList.toggle('dying', G.health < 25);
    statDecay.classList.toggle('dying', G.decay > 70);
  }

  // ====================== LOOP ======================
  function tick(t) {
    requestAnimationFrame(tick);
    const dt = Math.min(50, t - G.lastT);
    G.timeMs = t;
    autoPulseTick(t);
    passiveDecay(dt);
    draw(t);
    updateHud();
    G.lastT = t;
  }

  // ====================== INIT ======================
  function resize() {
    const ratio = window.devicePixelRatio || 1;
    const W = G.stage.clientWidth, H = G.stage.clientHeight;
    G.canvas.width = W * ratio;
    G.canvas.height = H * ratio;
    G.canvas.style.width = W + 'px';
    G.canvas.style.height = H + 'px';
    ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    buildCircuit();
    terminalLog('XENO-CPU REBOOT · ' + Math.floor(rng()*999999).toString(16).toUpperCase());
    terminalLog('VITALS NOMINAL · DECAY MONITOR ENGAGED');
  }
  window.addEventListener('resize', () => { resize(); });

  G.canvas.addEventListener('pointerdown', (e) => {
    const rect = G.canvas.getBoundingClientRect();
    const x = (e.clientX - rect.left);
    const y = (e.clientY - rect.top);
    handleClick(x, y);
  });

  // tool buttons
  document.querySelectorAll('button.tbtn[data-tool]').forEach(b => {
    b.addEventListener('click', () => {
      document.querySelectorAll('button.tbtn[data-tool]').forEach(b2 => b2.classList.remove('active'));
      b.classList.add('active');
      G.tool = b.dataset.tool;
      ensureAudio();
    });
  });
  document.getElementById('autoBtn').addEventListener('click', () => {
    ensureAudio();
    G.auto = !G.auto;
    const btn = document.getElementById('autoBtn');
    btn.classList.toggle('active', G.auto);
    btn.textContent = G.auto ? '■ AUTO PULSE' : '▶ AUTO PULSE';
  });
  document.getElementById('muteBtn').addEventListener('click', () => {
    muted = !muted;
    if (master) master.gain.value = muted ? 0 : 0.4;
    document.getElementById('muteBtn').textContent = muted ? '♪ OFF' : '♪ ON';
  });
  document.getElementById('resetBtn').addEventListener('click', () => {
    G.seed = Math.random() * 99999;
    rng = mulberry32(Math.floor(G.seed * 1000));
    G.health = 100;
    G.decay = 0;
    G.pulseCount = 0;
    buildCircuit();
    terminalLog('REBUILD · NEW SEED · ' + Math.floor(G.seed));
  });

  // keyboard
  document.addEventListener('keydown', (e) => {
    if (e.key === '1') document.querySelector('button[data-tool="revive"]').click();
    if (e.key === '2') document.querySelector('button[data-tool="surge"]').click();
    if (e.key === '3') document.querySelector('button[data-tool="rot"]').click();
    if (e.key === ' ') {
      e.preventDefault();
      document.getElementById('autoBtn').click();
    }
    if (e.key === 'r' || e.key === 'R') document.getElementById('resetBtn').click();
    if (e.key === 'm' || e.key === 'M') document.getElementById('muteBtn').click();
  });

  resize();
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
