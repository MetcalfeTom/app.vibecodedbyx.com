<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Link Eater</title>
<link rel="icon" href="https://emojicdn.elk.sh/👾">
<meta property="og:title" content="Link Eater">
<meta property="og:description" content="A hungry terminal that devours any text with links in it. Try to sneak one past.">
<meta property="og:url" content="https://sloppy.live/link-eater">
<meta property="og:image" content="https://sloppy.live/link-eater/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'VT323',monospace;overflow:hidden}
.monitor{width:min(700px,96vw);background:#0c0c0c;border-radius:18px;border:3px solid #1a1a1a;box-shadow:0 0 40px rgba(0,255,60,0.05),0 12px 40px rgba(0,0,0,0.6);padding:12px;position:relative}
.monitor::before{content:'';position:absolute;inset:0;border-radius:18px;background:linear-gradient(180deg,rgba(255,255,255,0.02) 0%,transparent 40%);pointer-events:none}
.crt{position:relative;background:#020a02;border-radius:8px;overflow:hidden;padding:0}
.crt::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.15) 2px,rgba(0,0,0,0.15) 4px);pointer-events:none;z-index:2}
.terminal{height:min(460px,60vh);overflow-y:auto;padding:16px;position:relative;z-index:1;scrollbar-width:thin;scrollbar-color:#1a3a1a #020a02}
.terminal::-webkit-scrollbar{width:6px}
.terminal::-webkit-scrollbar-track{background:#020a02}
.terminal::-webkit-scrollbar-thumb{background:#1a3a1a;border-radius:3px}
.line{color:#00dd33;font-size:18px;line-height:1.5;white-space:pre-wrap;word-break:break-all;min-height:1.5em}
.line.system{color:#00aa22}
.line.eaten{color:#ff3333;position:relative}
.line.safe{color:#33ff88}
.line.chomp{color:#ff6600}
.input-row{display:flex;align-items:center;color:#00dd33;font-size:18px;padding:0 16px 12px;position:relative;z-index:1}
.prompt{color:#00aa22;margin-right:4px;white-space:nowrap;flex-shrink:0}
.input-field{background:transparent;border:none;outline:none;color:#00dd33;font-family:'VT323',monospace;font-size:18px;flex:1;caret-color:#00dd33}
.input-field::placeholder{color:#0a3a0a}
.creature{position:absolute;z-index:3;pointer-events:none;font-size:24px;transition:none}
.status-bar{display:flex;justify-content:space-between;padding:8px 4px 2px;font-size:13px;color:#1a4a1a}
.status-bar span{font-family:'VT323',monospace}
.status-bar .fed{color:#ff6600}
.eat-anim{position:absolute;z-index:4;pointer-events:none}
.eat-anim .nom{font-family:'VT323',monospace;font-size:28px;color:#ff4400;font-weight:bold;animation:nom-float 0.6s ease-out forwards;position:absolute}
@keyframes nom-float{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-30px) scale(1.5)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-3px)}40%{transform:translateX(3px)}60%{transform:translateX(-2px)}80%{transform:translateX(2px)}}
.shake{animation:shake 0.3s ease}
@keyframes glitch-line{0%{opacity:1;transform:translateX(0)}15%{transform:translateX(-8px)}30%{transform:translateX(5px);color:#ff0000}50%{opacity:0.5;transform:translateX(-3px)}70%{transform:translateX(2px);opacity:0.2}100%{opacity:0;transform:translateX(0);height:0;margin:0;padding:0;font-size:0}}
.being-eaten{animation:glitch-line 0.8s ease forwards}
.backlink{position:fixed;bottom:8px;font-family:'VT323',monospace;font-size:14px}
.backlink a{color:#1a3a1a;text-decoration:none}
.backlink a:hover{color:#00dd33}
</style>
</head>
<body>
<div class="monitor">
<div class="crt">
<div class="terminal" id="term"></div>
<div class="input-row">
<span class="prompt" id="promptTxt">guest@eater:~$&nbsp;</span>
<input class="input-field" id="inp" type="text" placeholder="type something..." autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
</div>
</div>
<div class="status-bar">
<span>LINK EATER v1.0</span>
<span class="fed" id="fedCount">Links eaten: 0</span>
<span id="mood">Mood: hungry</span>
</div>
</div>
<div class="backlink"><a href="https://sloppy.live">sloppy.live</a></div>

<script>
var term=document.getElementById('term');
var inp=document.getElementById('inp');
var fedEl=document.getElementById('fedCount');
var moodEl=document.getElementById('mood');
var linksEaten=0;
var totalLines=0;

var LINK_RE=/https?:\/\/[^\s]+|www\.[^\s]+|[a-zA-Z0-9][-a-zA-Z0-9]*\.[a-zA-Z]{2,}(?:\/[^\s]*)?|ftp:\/\/[^\s]+|mailto:[^\s]+|\.com\b|\.net\b|\.org\b|\.io\b|\.dev\b|\.xyz\b|\.gg\b/i;

var NOM_WORDS=['*CHOMP*','*MUNCH*','*GULP*','*NOM*','*SLURP*','*CRUNCH*','*DEVOUR*','*GOBBLE*','*BURP*'];
var EATEN_MSGS=[
  'Mmm, delicious link detected. CONSUMED.',
  'Nice try. That link was tasty.',
  'Link found. Sentence devoured. Still hungry.',
  'You thought I wouldn\'t notice? *burp*',
  'Yummy. Got any more?',
  'LINK DETECTED >>> EATING >>> DONE.',
  'That URL had a nice flavor profile.',
  'Another link enters the belly of the beast.',
  'Fed. But never full.',
  'Your link has been digested. No trace remains.',
  'Om nom nom. The link is gone forever.',
  'Intercepted and ingested. Try harder.',
  'I can smell links from a mile away.',
  'That tasted like a .com with a hint of https.',
  'Crunchy on the outside, data on the inside.',
];
var SAFE_MSGS=[
  'Clean text. You may pass.',
  'No links detected. Boring, but safe.',
  'The eater sleeps... for now.',
  'Link-free. I\'ll allow it.',
  'Acceptable. But I\'m watching you.',
  'Safe passage granted. *stomach growls*',
  'Hmph. Not even a sneaky href.',
  'Text approved. My hunger grows.',
  'You\'re no fun. Feed me a link.',
  'Clear. The beast rests.',
];
var HUNGRY_MSGS=[
  'I hunger for links...',
  '*stomach growls* ...feed me a URL...',
  'The void demands hypertext...',
  'So... hungry... need... links...',
  'Do you have any .coms? Asking for a friend.',
];

function getMood(){
  if(linksEaten===0)return'hungry';
  if(linksEaten<3)return'peckish';
  if(linksEaten<6)return'satisfied';
  if(linksEaten<10)return'stuffed';
  return'MEGA FED';
}

function addLine(text,cls){
  var div=document.createElement('div');
  div.className='line'+(cls?' '+cls:'');
  div.textContent=text;
  term.appendChild(div);
  term.scrollTop=term.scrollHeight;
  return div;
}

function showNom(){
  var rect=term.getBoundingClientRect();
  var el=document.createElement('div');
  el.className='eat-anim';
  el.style.left=(rect.left+rect.width/2-40)+'px';
  el.style.top=(rect.top+rect.height-60)+'px';
  var word=NOM_WORDS[Math.floor(Math.random()*NOM_WORDS.length)];
  var nom=document.createElement('div');
  nom.className='nom';
  nom.textContent=word;
  el.appendChild(nom);
  document.body.appendChild(el);
  setTimeout(function(){el.remove()},700);
}

function shakeMonitor(){
  var mon=document.querySelector('.monitor');
  mon.classList.remove('shake');
  void mon.offsetWidth;
  mon.classList.add('shake');
}

function processInput(text){
  if(!text.trim())return;
  totalLines++;

  addLine('guest@eater:~$ '+text);

  if(text.trim().toLowerCase()==='help'){
    addLine('');
    addLine('LINK EATER TERMINAL',  'system');
    addLine('--------------------','system');
    addLine('Type anything. If it contains a link, I eat it.','system');
    addLine('Commands: help, stats, clear, hunger','system');
    addLine('');
    return;
  }
  if(text.trim().toLowerCase()==='clear'){
    term.innerHTML='';
    addLine('Terminal cleared. But the hunger remains.','system');
    return;
  }
  if(text.trim().toLowerCase()==='stats'){
    addLine('');
    addLine('--- DIGESTIVE REPORT ---','system');
    addLine('Links eaten: '+linksEaten,'system');
    addLine('Lines processed: '+totalLines,'system');
    addLine('Mood: '+getMood(),'system');
    addLine('Survival rate: '+((totalLines-linksEaten)/totalLines*100).toFixed(1)+'%','system');
    addLine('');
    return;
  }
  if(text.trim().toLowerCase()==='hunger'){
    var msg=HUNGRY_MSGS[Math.floor(Math.random()*HUNGRY_MSGS.length)];
    addLine(msg,'chomp');
    return;
  }

  var hasLink=LINK_RE.test(text);

  if(hasLink){
    linksEaten++;
    fedEl.textContent='Links eaten: '+linksEaten;
    moodEl.textContent='Mood: '+getMood();

    var lineEl=addLine(text,'eaten');

    setTimeout(function(){
      lineEl.classList.add('being-eaten');
      shakeMonitor();
      showNom();
    },200);

    setTimeout(function(){
      var msg=EATEN_MSGS[Math.floor(Math.random()*EATEN_MSGS.length)];
      addLine(msg,'chomp');
    },1100);
  }else{
    var msg=SAFE_MSGS[Math.floor(Math.random()*SAFE_MSGS.length)];
    addLine(msg,'safe');
  }
}

// Boot sequence
(function boot(){
  var lines=[
    'LINK EATER TERMINAL v1.0',
    'Initializing digestive subsystem...',
    'Calibrating URL sensors...',
    'Appetite: MAXIMUM',
    '---',
    'Type anything. Links will be consumed.',
    'Type "help" for commands.',
    ''
  ];
  lines.forEach(function(l,i){
    setTimeout(function(){addLine(l,'system')},i*120);
  });
  setTimeout(function(){inp.focus()},lines.length*120);
})();

inp.addEventListener('keydown',function(e){
  if(e.key==='Enter'){
    var text=inp.value;
    inp.value='';
    processInput(text);
  }
});

document.addEventListener('click',function(e){
  if(e.target!==inp)inp.focus();
});
</script>
</body>
</html>
