<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tama Pixel</title>
<link rel="icon" href="https://emojicdn.elk.sh/🥚">
<meta property="og:title" content="Tama Pixel">
<meta property="og:description" content="Raise a pixel pet from egg to legend. Feed it, play with it, watch it evolve.">
<meta property="og:url" content="https://sloppy.live/tama-pixel">
<meta property="og:image" content="https://sloppy.live/tama-pixel/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=DotGothic16&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Silkscreen',monospace;color:#e0e0e0;overflow:hidden}
.device{position:relative;width:320px;background:linear-gradient(145deg,#3a2f5c,#2a1f4c,#1f1538);border-radius:40px 40px 50px 50px;padding:24px 20px 30px;box-shadow:0 8px 32px rgba(0,0,0,0.6),inset 0 1px 0 rgba(255,255,255,0.08);border:2px solid #4a3f6c}
.device::before{content:'TAMA PIXEL';position:absolute;top:8px;left:50%;transform:translateX(-50%);font-size:8px;color:#6a5f8c;letter-spacing:3px}
.screen-frame{background:#0a0a12;border-radius:12px;padding:4px;margin-bottom:16px;box-shadow:inset 0 2px 8px rgba(0,0,0,0.8)}
.screen{position:relative;width:100%;aspect-ratio:1/1;border-radius:8px;overflow:hidden;image-rendering:pixelated}
canvas{width:100%;height:100%;display:block;image-rendering:pixelated}
.stats{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap}
.stat{flex:1;min-width:80px;background:#0d0d1a;border-radius:6px;padding:6px 8px;border:1px solid #2a2a4a}
.stat-label{font-size:8px;color:#7a7a9a;margin-bottom:3px;font-family:'DotGothic16',monospace}
.stat-bar{height:8px;background:#1a1a2e;border-radius:4px;overflow:hidden}
.stat-fill{height:100%;border-radius:4px;transition:width 0.5s}
.hunger .stat-fill{background:linear-gradient(90deg,#ff4444,#ff8844)}
.happy .stat-fill{background:linear-gradient(90deg,#44cc44,#88ff44)}
.energy .stat-fill{background:linear-gradient(90deg,#4488ff,#44ccff)}
.buttons{display:flex;gap:10px;justify-content:center}
.btn{width:64px;height:64px;border-radius:50%;border:2px solid #4a3f6c;background:linear-gradient(145deg,#2a2548,#1f1a38);color:#c0b8e0;font-family:'Silkscreen',monospace;font-size:9px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:all 0.15s;-webkit-tap-highlight-color:transparent;user-select:none}
.btn:active{transform:scale(0.92);background:linear-gradient(145deg,#3a3558,#2a2548);box-shadow:0 0 12px rgba(140,120,200,0.3)}
.btn .icon{font-size:18px;line-height:1}
.btn:disabled{opacity:0.3;cursor:default}
.info{text-align:center;margin-top:10px;font-size:9px;color:#5a5a7a;font-family:'DotGothic16',monospace}
.info .stage{color:#b0a0d0;font-size:10px}
.msg{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-family:'Silkscreen',monospace;font-size:7px;color:#ffcc00;text-align:center;pointer-events:none;white-space:nowrap;opacity:0;transition:opacity 0.3s}
.msg.show{opacity:1}
.egg-prompt{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,18,0.95);border-radius:8px;z-index:5;cursor:pointer}
.egg-prompt .tap{font-family:'Silkscreen',monospace;font-size:10px;color:#b0a0d0;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:0.5}50%{opacity:1}}
.dead-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(10,10,18,0.92);border-radius:8px;z-index:5;gap:8px}
.dead-overlay .rip{font-family:'Silkscreen',monospace;font-size:16px;color:#ff4444}
.dead-overlay .sub{font-family:'DotGothic16',monospace;font-size:11px;color:#7a7a9a}
.dead-overlay .restart{font-family:'Silkscreen',monospace;font-size:10px;color:#b0a0d0;cursor:pointer;padding:8px 16px;border:1px solid #4a3f6c;border-radius:6px;background:#1f1a38;margin-top:4px}
.backlink{position:fixed;bottom:8px;font-family:'DotGothic16',monospace;font-size:10px}
.backlink a{color:#5a5a7a;text-decoration:none}
.backlink a:hover{color:#b0a0d0}
@media(max-width:380px){.device{width:calc(100vw - 32px);padding:20px 14px 24px}.btn{width:56px;height:56px;font-size:8px}}
</style>
</head>
<body>
<div class="device">
<div class="screen-frame">
<div class="screen" id="screenWrap">
<canvas id="c"></canvas>
<div class="msg" id="msg"></div>
<div class="egg-prompt" id="eggPrompt"><div class="tap">tap egg to hatch</div></div>
</div>
</div>
<div class="stats">
<div class="stat hunger"><div class="stat-label">HUNGER</div><div class="stat-bar"><div class="stat-fill" id="hungerBar"></div></div></div>
<div class="stat happy"><div class="stat-label">HAPPY</div><div class="stat-bar"><div class="stat-fill" id="happyBar"></div></div></div>
<div class="stat energy"><div class="stat-label">ENERGY</div><div class="stat-bar"><div class="stat-fill" id="energyBar"></div></div></div>
</div>
<div class="buttons">
<button class="btn" id="btnFeed" onclick="doFeed()"><span class="icon">🍖</span>Feed</button>
<button class="btn" id="btnPlay" onclick="doPlay()"><span class="icon">⚽</span>Play</button>
<button class="btn" id="btnSleep" onclick="doSleep()"><span class="icon">💤</span>Sleep</button>
<button class="btn" id="btnClean" onclick="doClean()"><span class="icon">🧹</span>Clean</button>
</div>
<div class="info">
<div class="stage" id="stageLabel">Egg</div>
<div id="ageLabel">Age: 0</div>
</div>
</div>
<div class="backlink"><a href="https://sloppy.live">sloppy.live</a></div>

<script>
var W=64,H=64;
var c=document.getElementById('c');
c.width=W;c.height=H;
var ctx=c.getContext('2d');

// Pet state
var pet={
  hunger:80,happy:80,energy:80,
  dirty:0,age:0,stage:0,alive:true,
  sleeping:false,evo:0,
  careScore:0,totalFeeds:0,totalPlays:0,
  x:32,y:40,vx:0,frame:0,
  poops:[],hearts:[],zzz:[],sparkles:[]
};

// Evolution: egg(0) -> baby(1) -> child(2) -> teen(3) -> adult(4) -> elder(5)
// At certain ages, evolve based on care quality
var STAGES=['Egg','Baby','Child','Teen','Adult','Elder'];
var EVO_AGES=[0,5,30,80,160,300];

// Pixel art for each stage (12x12)
var SPRITES={
  egg:[
    '....XXXX....',
    '...X....X...',
    '..X......X..',
    '..X..XX..X..',
    '.X...XX...X.',
    '.X........X.',
    '.X..X..X..X.',
    '.X........X.',
    '..X......X..',
    '..X......X..',
    '...X....X...',
    '....XXXX....'
  ],
  baby:[
    '............',
    '....XXXX....',
    '...X....X...',
    '..X.OO.OO..',
    '..X.@@.@@..',
    '..X......X..',
    '..X..ww..X..',
    '...X....X...',
    '....XXXX....',
    '....X..X....',
    '...XX..XX...',
    '............'
  ],
  child:[
    '....XXXX....',
    '...X....X...',
    '..X......X..',
    '.X..OO.OO.X',
    '.X..@@.@@.X',
    '.X........X',
    '.X...ww...X',
    '.X........X',
    '..XXXXXXXX.',
    '..X......X.',
    '..X......X.',
    '..XX....XX.'
  ],
  teen:[
    '...XXXXXX...',
    '..X......X..',
    '.X........X.',
    '.X.OOO.OOO.',
    '.X.@@@.@@@.',
    '.X........X.',
    '.X..wWWw..X.',
    '.X........X.',
    '.XXXXXXXXXX.',
    '.X..X..X..X.',
    '.X..X..X..X.',
    '.XX.X..X.XX.'
  ],
  adult:[
    'X..XXXXXX..X',
    'XX.X....X.XX',
    '.X.X....X.X.',
    '.X.OOO.OOO.',
    '.X.@@@.@@@.',
    '.X........X.',
    '.X..WWWW..X.',
    '.X........X.',
    '.XXXXXXXXXX.',
    '..X.X..X.X..',
    '..X.X..X.X..',
    '..XXX..XXX..'
  ],
  elder:[
    'XXXXXXXXXXXX',
    'X..X....X..X',
    '.X.X....X.X.',
    '.X.OOO.OOO.',
    '.X..@@.@@.X.',
    '.X........X.',
    '.X..wWWw..X.',
    '.X........X.',
    '.XXXXXXXXXX.',
    '..X......X..',
    '..XXXXXXXX..',
    '...X....X...'
  ]
};

var STAGE_KEYS=['egg','baby','child','teen','adult','elder'];

// Color palettes per evolution quality
var PALETTES=[
  {body:'#8bc4ff',eye:'#1a1a3e',pupil:'#ffffff',mouth:'#ff6688',accent:'#6aa4df'},// good care - blue
  {body:'#7de87d',eye:'#1a3e1a',pupil:'#ffffff',mouth:'#ff6688',accent:'#5dc85d'},// decent - green
  {body:'#e8c44a',eye:'#3e2e1a',pupil:'#ffffff',mouth:'#dd5566',accent:'#c8a43a'},// ok - gold
  {body:'#e86a6a',eye:'#3e1a1a',pupil:'#ffffff',mouth:'#cc4455',accent:'#c84a4a'},// poor - red
];

var poop_sprite=[
  '..XX..',
  '.X..X.',
  'X....X',
  'X.X..X',
  '.X..X.',
  '..XX..'
];

var msgEl=document.getElementById('msg');
var msgTimer=null;

function showMsg(txt){
  msgEl.textContent=txt;
  msgEl.classList.add('show');
  clearTimeout(msgTimer);
  msgTimer=setTimeout(function(){msgEl.classList.remove('show')},2000);
}

function getPalette(){
  var avg=(pet.hunger+pet.happy+pet.energy)/3;
  if(avg>65)return PALETTES[0];
  if(avg>45)return PALETTES[1];
  if(avg>25)return PALETTES[2];
  return PALETTES[3];
}

function drawPixelSprite(sprite,px,py,pal,scale){
  scale=scale||1;
  for(var r=0;r<sprite.length;r++){
    for(var c2=0;c2<sprite[r].length;c2++){
      var ch=sprite[r][c2];
      var col=null;
      if(ch==='X')col=pal.body;
      else if(ch==='O')col=pal.eye;
      else if(ch==='@')col=pal.pupil;
      else if(ch==='w'||ch==='W')col=pal.mouth;
      if(col){
        ctx.fillStyle=col;
        ctx.fillRect(px+c2*scale,py+r*scale,scale,scale);
      }
    }
  }
}

function drawPoop(x,y){
  for(var r=0;r<poop_sprite.length;r++){
    for(var c2=0;c2<poop_sprite[r].length;c2++){
      if(poop_sprite[r][c2]==='X'){
        ctx.fillStyle='#6b4226';
        ctx.fillRect(x+c2,y+r,1,1);
      }
    }
  }
}

var eggWobble=0;
var hatching=false;
var hatchFrame=0;

function drawEgg(t){
  eggWobble+=0.05;
  var ox=Math.sin(eggWobble*2)*1.5;
  var pal={body:'#f0e8d0',eye:'#c0b8a0',pupil:'#a09880',mouth:'#c0b8a0',accent:'#d8d0b8'};

  if(hatching){
    hatchFrame++;
    if(hatchFrame>60){
      pet.stage=1;
      pet.age=1;
      document.getElementById('eggPrompt').style.display='none';
      showMsg('It hatched!');
      return;
    }
    // Shake more as hatching progresses
    ox=Math.sin(hatchFrame*0.8)*(hatchFrame/10);
    // Crack lines
    if(hatchFrame>20){
      ctx.fillStyle='#3a2f5c';
      ctx.fillRect(28+ox,34,2,1);
      ctx.fillRect(30+ox,35,1,2);
      ctx.fillRect(33+ox,33,2,1);
    }
    if(hatchFrame>40){
      ctx.fillStyle='#3a2f5c';
      ctx.fillRect(27+ox,36,1,2);
      ctx.fillRect(34+ox,35,1,3);
      ctx.fillRect(30+ox,32,3,1);
    }
  }

  drawPixelSprite(SPRITES.egg,Math.floor(26+ox),28,pal,1);
}

function startHatch(){
  if(!hatching&&pet.stage===0){
    hatching=true;
    hatchFrame=0;
  }
}

document.getElementById('eggPrompt').addEventListener('click',startHatch);
document.getElementById('eggPrompt').addEventListener('touchstart',function(e){e.preventDefault();startHatch()});

// Actions
function doFeed(){
  if(!pet.alive||pet.stage===0||pet.sleeping)return;
  if(pet.hunger>=95){showMsg('Not hungry!');return;}
  pet.hunger=Math.min(100,pet.hunger+25);
  pet.totalFeeds++;
  pet.careScore+=1;
  // Food particle
  pet.hearts.push({x:pet.x-2,y:pet.y-8,life:30,ch:'🍖',dy:-0.3});
  showMsg('+25 Food');
}

function doPlay(){
  if(!pet.alive||pet.stage===0||pet.sleeping)return;
  if(pet.energy<10){showMsg('Too tired!');return;}
  pet.happy=Math.min(100,pet.happy+20);
  pet.energy=Math.max(0,pet.energy-15);
  pet.totalPlays++;
  pet.careScore+=1;
  pet.hearts.push({x:pet.x+2,y:pet.y-8,life:30,ch:'❤️',dy:-0.4});
  showMsg('+20 Happy  -15 Energy');
}

function doSleep(){
  if(!pet.alive||pet.stage===0)return;
  pet.sleeping=!pet.sleeping;
  if(pet.sleeping){
    showMsg('Zzz...');
  }else{
    showMsg('Good morning!');
  }
}

function doClean(){
  if(!pet.alive||pet.stage===0||pet.sleeping)return;
  if(pet.poops.length===0){showMsg('Already clean!');return;}
  // Sparkle effect
  for(var i=0;i<pet.poops.length;i++){
    pet.sparkles.push({x:pet.poops[i].x+3,y:pet.poops[i].y+3,life:20});
  }
  pet.poops=[];
  pet.dirty=0;
  pet.careScore+=1;
  showMsg('Sparkly clean!');
}

// Decay timer
var decayTick=0;
function decay(){
  if(!pet.alive||pet.stage===0)return;
  decayTick++;
  if(decayTick%3===0){
    pet.age++;
    // Evolution check
    for(var s=5;s>=1;s--){
      if(pet.stage<s&&pet.age>=EVO_AGES[s]){
        pet.stage=s;
        showMsg('Evolved to '+STAGES[s]+'!');
        // Sparkle burst
        for(var j=0;j<6;j++){
          pet.sparkles.push({x:pet.x-4+Math.random()*12,y:pet.y-4+Math.random()*12,life:25});
        }
        break;
      }
    }
  }

  if(pet.sleeping){
    pet.energy=Math.min(100,pet.energy+4);
    pet.hunger=Math.max(0,pet.hunger-1);
    if(pet.energy>=100){
      pet.sleeping=false;
      showMsg('Woke up refreshed!');
    }
  }else{
    pet.hunger=Math.max(0,pet.hunger-2);
    pet.happy=Math.max(0,pet.happy-1.5);
    pet.energy=Math.max(0,pet.energy-1);

    // Poop chance
    if(Math.random()<0.08&&pet.poops.length<4){
      var px=pet.x+(Math.random()>0.5?10:-16)+Math.random()*6;
      pet.poops.push({x:Math.floor(px),y:52+Math.floor(Math.random()*4)});
      pet.dirty=Math.min(100,pet.dirty+25);
    }
  }

  // Dirty reduces happiness
  if(pet.dirty>50)pet.happy=Math.max(0,pet.happy-1);

  // Death check
  if(pet.hunger<=0&&pet.happy<=0&&pet.energy<=0){
    pet.alive=false;
    showDead();
  }
}

function showDead(){
  var ov=document.createElement('div');
  ov.className='dead-overlay';
  ov.innerHTML='<div class="rip">R.I.P.</div><div class="sub">Age: '+pet.age+'</div><div class="sub">Stage: '+STAGES[pet.stage]+'</div><div class="restart" onclick="restart()">Try Again</div>';
  document.getElementById('screenWrap').appendChild(ov);
}

function restart(){
  var ov=document.querySelector('.dead-overlay');
  if(ov)ov.remove();
  document.getElementById('eggPrompt').style.display='flex';
  pet={hunger:80,happy:80,energy:80,dirty:0,age:0,stage:0,alive:true,sleeping:false,evo:0,careScore:0,totalFeeds:0,totalPlays:0,x:32,y:40,vx:0,frame:0,poops:[],hearts:[],zzz:[],sparkles:[]};
  hatching=false;hatchFrame=0;
}

// Render
var t=0;
function render(){
  t++;
  ctx.fillStyle='#0a0a14';
  ctx.fillRect(0,0,W,H);

  // Ground
  ctx.fillStyle='#12121e';
  ctx.fillRect(0,56,W,8);
  for(var i=0;i<W;i+=4){
    ctx.fillStyle='#181828';
    ctx.fillRect(i,56,2,1);
  }

  if(pet.stage===0){
    drawEgg(t);
    requestAnimationFrame(render);
    return;
  }

  if(!pet.alive){
    // Ghost floating up
    var gy=30+Math.sin(t*0.03)*3;
    ctx.globalAlpha=0.3+Math.sin(t*0.05)*0.15;
    var pal=getPalette();
    var sk=STAGE_KEYS[Math.min(pet.stage,5)];
    drawPixelSprite(SPRITES[sk],Math.floor(pet.x-6),Math.floor(gy-6),pal,1);
    ctx.globalAlpha=1;
    requestAnimationFrame(render);
    return;
  }

  var pal=getPalette();
  var sk=STAGE_KEYS[Math.min(pet.stage,5)];
  var sprite=SPRITES[sk];

  // Idle movement
  if(!pet.sleeping){
    pet.frame++;
    if(pet.frame%60===0){
      pet.vx=(Math.random()-0.5)*0.6;
    }
    pet.x+=pet.vx;
    if(pet.x<10){pet.x=10;pet.vx=0.3;}
    if(pet.x>54){pet.x=54;pet.vx=-0.3;}
  }

  // Bounce
  var bounce=pet.sleeping?0:Math.abs(Math.sin(t*0.08))*1.5;
  var py=pet.y-bounce;

  // Draw poops
  for(var i=0;i<pet.poops.length;i++){
    drawPoop(pet.poops[i].x,pet.poops[i].y);
  }

  // Draw pet
  if(pet.sleeping){
    // Sleeping: eyes closed (replace O/@ with -)
    var sleepSprite=[];
    for(var r=0;r<sprite.length;r++){
      var row='';
      for(var c2=0;c2<sprite[r].length;c2++){
        var ch=sprite[r][c2];
        if(ch==='O')row+='-';
        else if(ch==='@')row+='.';
        else row+=ch;
      }
      sleepSprite.push(row);
    }
    var sleepPal={body:pal.body,eye:pal.body,pupil:'.',mouth:pal.mouth,accent:pal.accent};
    // Draw closed eyes as lines
    drawPixelSprite(sleepSprite,Math.floor(pet.x-6),Math.floor(py-6),pal,1);
    // Horizontal line eyes
    for(var r=0;r<sprite.length;r++){
      for(var c2=0;c2<sprite[r].length;c2++){
        if(sprite[r][c2]==='O'){
          ctx.fillStyle='#1a1a3e';
          ctx.fillRect(Math.floor(pet.x-6)+c2,Math.floor(py-6)+r,1,1);
        }
      }
    }

    // Zzz particles
    if(t%25===0){
      pet.zzz.push({x:pet.x+6,y:py-8,life:40,size:3});
    }
  }else{
    drawPixelSprite(sprite,Math.floor(pet.x-6),Math.floor(py-6),pal,1);
  }

  // Sad face when stats low
  var avg=(pet.hunger+pet.happy+pet.energy)/3;
  if(avg<30&&!pet.sleeping){
    // Sweat drop
    if(t%40<20){
      ctx.fillStyle='#4488ff';
      ctx.fillRect(Math.floor(pet.x+6),Math.floor(py-5),1,2);
    }
  }

  // Hearts/food particles
  for(var i=pet.hearts.length-1;i>=0;i--){
    var h=pet.hearts[i];
    h.y+=h.dy;
    h.life--;
    if(h.life<=0){pet.hearts.splice(i,1);continue;}
    ctx.globalAlpha=h.life/30;
    ctx.font='5px serif';
    ctx.fillText(h.ch,h.x,h.y);
    ctx.globalAlpha=1;
  }

  // Zzz particles
  for(var i=pet.zzz.length-1;i>=0;i--){
    var z=pet.zzz[i];
    z.y-=0.2;
    z.x+=0.15;
    z.life--;
    if(z.life<=0){pet.zzz.splice(i,1);continue;}
    ctx.globalAlpha=z.life/40;
    ctx.fillStyle='#8888cc';
    ctx.font=z.size+'px Silkscreen';
    ctx.fillText('z',Math.floor(z.x),Math.floor(z.y));
    ctx.globalAlpha=1;
  }

  // Sparkles
  for(var i=pet.sparkles.length-1;i>=0;i--){
    var s=pet.sparkles[i];
    s.life--;
    if(s.life<=0){pet.sparkles.splice(i,1);continue;}
    ctx.globalAlpha=s.life/25;
    ctx.fillStyle='#ffee88';
    // Tiny star
    ctx.fillRect(Math.floor(s.x),Math.floor(s.y)-1,1,3);
    ctx.fillRect(Math.floor(s.x)-1,Math.floor(s.y),3,1);
    ctx.globalAlpha=1;
  }

  // Status indicators
  if(pet.hunger<25){
    // Hungry icon flash
    if(t%30<15){
      ctx.fillStyle='#ff4444';
      ctx.fillRect(2,2,1,3);ctx.fillRect(4,2,1,3);ctx.fillRect(1,4,5,1);
    }
  }

  // Update UI
  document.getElementById('hungerBar').style.width=pet.hunger+'%';
  document.getElementById('happyBar').style.width=pet.happy+'%';
  document.getElementById('energyBar').style.width=pet.energy+'%';
  document.getElementById('stageLabel').textContent=STAGES[pet.stage]+(pet.sleeping?' (sleeping)':'');
  document.getElementById('ageLabel').textContent='Age: '+pet.age;

  // Button states
  document.getElementById('btnFeed').disabled=pet.sleeping;
  document.getElementById('btnPlay').disabled=pet.sleeping;
  document.getElementById('btnClean').disabled=pet.sleeping;

  requestAnimationFrame(render);
}

// Decay every 2 seconds
setInterval(decay,2000);
render();
</script>
