<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Singularity Chat · whisper into the event horizon</title>
<link rel="icon" href="https://emojicdn.elk.sh/🕳️">
<meta name="description" content="Type a message and watch it spiral, stretch, and redshift into the singularity of a cosmic black hole.">
<meta property="og:title" content="Singularity Chat" />
<meta property="og:description" content="Whisper into the event horizon. Watch your words spiral, stretch, and redshift into a black hole." />
<meta property="og:image" content="https://image.pollinations.ai/prompt/a%20swirling%20cosmic%20black%20hole%20with%20a%20glowing%20orange%20accretion%20disk%20and%20blue%20photon%20ring%20against%20deep%20purple%20starfield%2C%20ethereal%2C%20scientific%20illustration%2C%20ultra%20detailed%2C%20cinematic%20lighting?width=1200&height=630&nologo=true&seed=88412" />
<meta property="og:url" content="https://sloppy.live/black-hole-chat" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Unica+One&family=Cormorant+Garamond:ital,wght@1,300;1,500&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --void:   #05020f;
    --deep:   #0b0524;
    --photon: #b7f4ff;
    --amber:  #ffb15b;
    --ember:  #ff6a22;
    --crimson:#d61f4a;
    --violet: #8b5bff;
    --ghost:  rgba(183, 244, 255, 0.85);
    --dust:   rgba(255, 177, 91, 0.55);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: var(--void); color: var(--ghost); font-family: 'Space Mono', monospace; }
  body {
    background:
      radial-gradient(ellipse at 18% 14%, rgba(139, 91, 255, 0.22), transparent 60%),
      radial-gradient(ellipse at 82% 88%, rgba(255, 106, 34, 0.14), transparent 62%),
      radial-gradient(ellipse at 50% 50%, #0b0524 0%, #05020f 70%);
  }

  canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    touch-action: manipulation;
  }

  .header {
    position: fixed;
    top: 20px;
    left: 0;
    right: 0;
    text-align: center;
    pointer-events: none;
    z-index: 5;
    padding: 0 20px;
    transition: opacity 0.8s;
  }
  .title {
    font-family: 'Unica One', sans-serif;
    font-size: clamp(26px, 4vw, 44px);
    letter-spacing: 0.3em;
    color: var(--photon);
    text-shadow: 0 0 22px rgba(183, 244, 255, 0.45), 0 0 4px rgba(139, 91, 255, 0.6);
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: clamp(12px, 1.4vw, 17px);
    letter-spacing: 0.12em;
    color: rgba(183, 244, 255, 0.55);
  }
  .tagline .sep { color: var(--amber); margin: 0 10px; }

  .stats {
    position: fixed;
    top: 22px;
    right: 24px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: rgba(183, 244, 255, 0.4);
    text-align: right;
    z-index: 5;
    pointer-events: none;
    text-transform: uppercase;
    line-height: 1.6;
  }
  .stats .n { color: var(--amber); font-weight: 700; }

  .composer {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%);
    width: min(640px, calc(100% - 40px));
    display: flex;
    gap: 10px;
    z-index: 10;
    align-items: stretch;
  }
  .composer input {
    flex: 1;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 18px;
    padding: 14px 20px;
    background: rgba(11, 5, 36, 0.55);
    border: 1px solid rgba(183, 244, 255, 0.22);
    border-radius: 36px;
    color: var(--photon);
    outline: none;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    letter-spacing: 0.02em;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .composer input::placeholder { color: rgba(183, 244, 255, 0.38); font-style: italic; }
  .composer input:focus {
    border-color: rgba(255, 177, 91, 0.6);
    box-shadow: 0 0 24px rgba(255, 177, 91, 0.22), inset 0 0 12px rgba(139, 91, 255, 0.1);
  }
  .composer button {
    font-family: 'Unica One', sans-serif;
    font-size: 13px;
    letter-spacing: 0.28em;
    padding: 0 22px;
    background: linear-gradient(160deg, var(--amber), var(--ember));
    border: none;
    border-radius: 36px;
    color: #1a0605;
    cursor: pointer;
    text-transform: uppercase;
    transition: transform 0.12s, box-shadow 0.22s;
    box-shadow: 0 0 18px rgba(255, 106, 34, 0.35);
    font-weight: 700;
  }
  .composer button:hover { transform: translateY(-1px); box-shadow: 0 0 28px rgba(255, 177, 91, 0.55); }
  .composer button:active { transform: translateY(1px); }
  .composer button:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }

  .hint {
    position: fixed;
    bottom: 88px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 13px;
    color: rgba(183, 244, 255, 0.3);
    letter-spacing: 0.08em;
    z-index: 4;
    pointer-events: none;
    text-align: center;
    white-space: nowrap;
    transition: opacity 0.8s;
  }

  .sound-toggle {
    position: fixed;
    bottom: 28px;
    right: 24px;
    background: rgba(11, 5, 36, 0.45);
    border: 1px solid rgba(183, 244, 255, 0.18);
    color: rgba(183, 244, 255, 0.55);
    font-family: 'Unica One', sans-serif;
    font-size: 11px;
    letter-spacing: 0.28em;
    padding: 8px 14px;
    border-radius: 20px;
    cursor: pointer;
    z-index: 10;
    backdrop-filter: blur(6px);
    transition: color 0.3s, border-color 0.3s;
  }
  .sound-toggle:hover { color: var(--amber); border-color: rgba(255, 177, 91, 0.5); }

  .intro {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 6;
    text-align: center;
    pointer-events: none;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 17px;
    color: rgba(183, 244, 255, 0.36);
    letter-spacing: 0.1em;
    width: min(420px, 80%);
    transition: opacity 1.2s;
  }
  .intro.fade { opacity: 0; }

  @media (max-width: 560px) {
    .header { top: 12px; }
    .stats { top: 14px; right: 14px; font-size: 10px; }
    .composer { bottom: 18px; width: calc(100% - 20px); }
    .composer input { font-size: 16px; padding: 12px 16px; }
    .composer button { font-size: 11px; padding: 0 14px; }
    .sound-toggle { bottom: 78px; right: 14px; }
    .hint { bottom: 78px; font-size: 11px; }
  }
</style>
</head>
<body>
  <canvas id="canvas"></canvas>

  <div class="header" id="header">
    <div class="title">Singularity</div>
    <div class="tagline">whisper <span class="sep">·</span> spiral <span class="sep">·</span> vanish</div>
  </div>

  <div class="stats" id="stats">
    <div>drifting <span class="n" id="driftCount">0</span></div>
    <div>consumed <span class="n" id="consumedCount">0</span></div>
  </div>

  <div class="intro" id="intro">nothing escapes the horizon. not even your words.</div>

  <div class="hint" id="hint">press enter to release into the void</div>

  <div class="composer">
    <input id="msgInput" type="text" placeholder="whisper something into the void…" maxlength="140" autocomplete="off" />
    <button id="sendBtn">send</button>
  </div>

  <button class="sound-toggle" id="soundBtn">◯ drone</button>

<script>
(() => {
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  const input = document.getElementById('msgInput');
  const sendBtn = document.getElementById('sendBtn');
  const hint = document.getElementById('hint');
  const intro = document.getElementById('intro');
  const driftCountEl = document.getElementById('driftCount');
  const consumedCountEl = document.getElementById('consumedCount');
  const soundBtn = document.getElementById('soundBtn');

  let W = 0, H = 0, DPR = 1;
  let cx = 0, cy = 0;
  let t = 0;
  let consumed = 0;
  let interacted = false;

  // Black hole geometry (scaled to screen)
  function geometry() {
    const base = Math.min(W, H);
    return {
      horizonR: base * 0.055,           // event horizon (black disk)
      photonR:  base * 0.075,           // photon ring
      diskInner: base * 0.085,          // accretion disk inner radius
      diskOuter: base * 0.28,           // accretion disk outer radius
      lensR:    base * 0.32             // lensing influence radius
    };
  }

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = W * DPR;
    canvas.height = H * DPR;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    cx = W / 2;
    cy = H / 2;
    seedStars();
  }
  window.addEventListener('resize', resize);

  // ----- Starfield -----
  let stars = [];
  function seedStars() {
    stars = [];
    const count = Math.floor((W * H) / 3800);
    for (let i = 0; i < count; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        r: Math.pow(Math.random(), 3) * 1.6 + 0.2,
        hue: 200 + Math.random() * 80,
        bright: 0.4 + Math.random() * 0.6,
        twPhase: Math.random() * Math.PI * 2,
        twSpeed: 0.4 + Math.random() * 1.3
      });
    }
  }

  // ----- Messages (particles that carry text) -----
  const messages = [];
  const MAX_MESSAGES = 80;

  function spawnMessage(text) {
    if (!text || !text.trim()) return;
    text = text.trim().slice(0, 140);

    // Spawn from a random edge, outside lensing range
    const base = Math.min(W, H);
    const spawnR = base * 0.45 + Math.random() * base * 0.08;
    const angle = Math.random() * Math.PI * 2;
    const x = cx + Math.cos(angle) * spawnR;
    const y = cy + Math.sin(angle) * spawnR;

    // Tangential velocity (spiral rather than plunge)
    const dx = x - cx, dy = y - cy;
    const r = Math.sqrt(dx * dx + dy * dy);
    const perpX = -dy / r, perpY = dx / r;
    const tangSpeed = 80 + Math.random() * 55;
    const radialSpeed = 16 + Math.random() * 10;   // small inward pull
    const spin = Math.random() < 0.5 ? 1 : -1;

    messages.push({
      text,
      x, y,
      vx: perpX * tangSpeed * spin - (dx / r) * radialSpeed,
      vy: perpY * tangSpeed * spin - (dy / r) * radialSpeed,
      hue: 180 + Math.random() * 120,    // cyan-through-violet
      born: t,
      alpha: 0,
      targetAlpha: 1,
      consumed: false,
      size: 14 + Math.random() * 3
    });

    // Cull oldest if full
    if (messages.length > MAX_MESSAGES) {
      messages.splice(0, messages.length - MAX_MESSAGES);
    }

    if (!interacted) {
      interacted = true;
      intro.classList.add('fade');
      hint.style.opacity = '0';
    }
    ensureAudio();
    playWhisper();
  }

  // ----- Physics -----
  const GM = 48000;  // gravitational constant * mass — tuned for screen scale

  function updateMessage(m, dt) {
    const dx = m.x - cx, dy = m.y - cy;
    const r = Math.sqrt(dx * dx + dy * dy);
    const geom = geometry();

    // Apply gravity (inverse square, clamped near horizon to avoid explosion)
    const rClamped = Math.max(r, geom.horizonR * 0.9);
    const a = GM / (rClamped * rClamped);
    m.vx += -a * (dx / rClamped) * dt;
    m.vy += -a * (dy / rClamped) * dt;

    // Mild drag so spirals decay gracefully
    m.vx *= Math.pow(0.993, dt * 60);
    m.vy *= Math.pow(0.993, dt * 60);

    m.x += m.vx * dt;
    m.y += m.vy * dt;

    // Fade in
    m.alpha += (m.targetAlpha - m.alpha) * Math.min(1, dt * 2.5);

    // Redshift near horizon, then consume
    const horizonDist = r - geom.horizonR;
    if (horizonDist < 0) {
      m.targetAlpha = 0;
      if (m.alpha < 0.02) {
        m.consumed = true;
      }
    }

    // Age-out if floating forever (safety)
    if (t - m.born > 120) m.targetAlpha = 0;
  }

  // ----- Rendering -----
  function drawBlackHole(geom) {
    // Lensed starfield is drawn separately before this. Here we draw the BH itself.
    // Photon ring (outer glow)
    const grad = ctx.createRadialGradient(cx, cy, geom.horizonR * 0.7, cx, cy, geom.photonR * 1.4);
    grad.addColorStop(0, 'rgba(0,0,0,1)');
    grad.addColorStop(0.6, 'rgba(0,0,0,0.92)');
    grad.addColorStop(0.82, 'rgba(183, 244, 255, 0.5)');
    grad.addColorStop(1, 'rgba(139, 91, 255, 0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, geom.photonR * 1.4, 0, Math.PI * 2);
    ctx.fill();

    // Accretion disk (rotating, ember → amber → ember)
    ctx.save();
    ctx.translate(cx, cy);
    // tilted oblique disk for subtle perspective
    ctx.rotate(t * 0.02);
    ctx.scale(1, 0.42);  // flatten for edge-on view
    const diskSteps = 38;
    for (let i = 0; i < diskSteps; i++) {
      const rr = geom.diskInner + (geom.diskOuter - geom.diskInner) * (i / diskSteps);
      // alternating hot streaks, swirling with time
      const phase = t * 1.5 + i * 0.42;
      const hot = 0.5 + 0.5 * Math.sin(phase);
      const heat = hot * hot;
      const hue = 18 + heat * 34;       // 18 (red) → 52 (amber)
      const sat = 92;
      const light = 42 + heat * 22;
      ctx.strokeStyle = `hsla(${hue}, ${sat}%, ${light}%, ${0.35 + 0.35 * heat})`;
      ctx.lineWidth = 2.2;
      ctx.beginPath();
      const segStart = phase;
      ctx.arc(0, 0, rr, segStart, segStart + Math.PI * 1.6);
      ctx.stroke();
      // Glow streaks
      if (i % 3 === 0) {
        ctx.strokeStyle = `hsla(${hue + 8}, 100%, ${70 + heat * 18}%, ${0.16})`;
        ctx.lineWidth = 6;
        ctx.stroke();
      }
    }
    ctx.restore();

    // Secondary photon ring — warped top arc catching the back of the disk
    ctx.save();
    ctx.translate(cx, cy);
    const topGrad = ctx.createLinearGradient(0, -geom.diskOuter, 0, geom.diskOuter);
    topGrad.addColorStop(0, 'rgba(255, 177, 91, 0.55)');
    topGrad.addColorStop(0.4, 'rgba(255, 106, 34, 0.35)');
    topGrad.addColorStop(0.5, 'rgba(0,0,0,0)');
    ctx.strokeStyle = topGrad;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.ellipse(0, 0, geom.diskOuter * 0.96, geom.diskOuter * 0.25, 0, Math.PI, Math.PI * 2);
    ctx.stroke();
    ctx.restore();

    // Event horizon: pure black disk
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(cx, cy, geom.horizonR, 0, Math.PI * 2);
    ctx.fill();

    // Photon ring (thin bright boundary)
    ctx.strokeStyle = 'rgba(183, 244, 255, 0.65)';
    ctx.lineWidth = 1.4;
    ctx.shadowBlur = 22;
    ctx.shadowColor = 'rgba(183, 244, 255, 0.8)';
    ctx.beginPath();
    ctx.arc(cx, cy, geom.photonR, 0, Math.PI * 2);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  function drawStars(geom) {
    for (const s of stars) {
      const dx = s.x - cx, dy = s.y - cy;
      const r = Math.sqrt(dx * dx + dy * dy);

      // Lensing: displace stars radially away from BH as they approach
      let px = s.x, py = s.y;
      if (r < geom.lensR * 2.4) {
        const influence = Math.max(0, 1 - r / (geom.lensR * 2.4));
        const lensShift = geom.photonR * 0.9 * influence * influence;
        if (r > 1) {
          px += (dx / r) * lensShift;
          py += (dy / r) * lensShift;
        }
      }

      // Stars inside photon ring hidden (swallowed visually)
      const pr = Math.sqrt((px - cx) ** 2 + (py - cy) ** 2);
      if (pr < geom.photonR) continue;

      const tw = 0.6 + 0.4 * Math.sin(t * s.twSpeed + s.twPhase);
      ctx.fillStyle = `hsla(${s.hue}, 60%, ${60 + tw * 20}%, ${s.bright * tw})`;
      ctx.beginPath();
      ctx.arc(px, py, s.r * (0.8 + tw * 0.4), 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawMessage(m, geom) {
    const dx = m.x - cx, dy = m.y - cy;
    const r = Math.sqrt(dx * dx + dy * dy);

    // Spaghettification: stretch along velocity direction as r decreases
    const stretchStart = geom.diskOuter * 1.4;
    const stretchEnd   = geom.photonR;
    const prox = Math.max(0, Math.min(1, (stretchStart - r) / (stretchStart - stretchEnd)));
    const stretch = 1 + prox * 6.5;
    const squish  = 1 - prox * 0.35;

    // Rotate text to flow with motion direction (tangent + spiral)
    const theta = Math.atan2(m.vy, m.vx);

    // Redshift: cyan/violet far out → red/black as it falls in
    const shiftedHue = m.hue - prox * 150;     // 180 → 30 (into red)
    const light = 78 - prox * 40;
    const sat = 70 + prox * 20;

    ctx.save();
    ctx.translate(m.x, m.y);
    ctx.rotate(theta);
    ctx.scale(stretch, squish);

    ctx.font = `${m.size}px 'Space Mono', monospace`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    // Outer glow
    ctx.shadowBlur = 14 + prox * 30;
    ctx.shadowColor = `hsla(${shiftedHue}, ${sat}%, ${light}%, ${0.5 * m.alpha})`;
    ctx.fillStyle = `hsla(${shiftedHue}, ${sat}%, ${light}%, ${m.alpha})`;
    ctx.fillText(m.text, 0, 0);

    // Slight trailing ghost for extra drag feel
    if (prox > 0.1) {
      ctx.globalAlpha = 0.35 * m.alpha * prox;
      ctx.fillStyle = `hsla(${shiftedHue - 20}, 80%, ${light + 8}%, 1)`;
      ctx.fillText(m.text, -stretch * 0.45, 0);
    }

    ctx.restore();
  }

  // ----- Audio (ambient drone + whisper chimes) -----
  let audioCtx = null;
  let droneGain = null;
  let droneOn = false;
  let masterGain = null;

  function ensureAudio() {
    if (audioCtx) return;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.85;
      masterGain.connect(audioCtx.destination);
    } catch(e) { /* ignore */ }
  }

  function startDrone() {
    if (!audioCtx || droneGain) return;
    droneGain = audioCtx.createGain();
    droneGain.gain.value = 0;
    droneGain.connect(masterGain);
    const freqs = [55, 82.4, 110, 164.8];
    freqs.forEach((f, i) => {
      const osc = audioCtx.createOscillator();
      osc.type = i % 2 === 0 ? 'sine' : 'triangle';
      osc.frequency.value = f;
      const lfo = audioCtx.createOscillator();
      lfo.frequency.value = 0.07 + i * 0.03;
      const lfoGain = audioCtx.createGain();
      lfoGain.gain.value = 0.4 + i * 0.15;
      lfo.connect(lfoGain);
      lfoGain.connect(osc.frequency);
      const oGain = audioCtx.createGain();
      oGain.gain.value = 0.05 + (i === 0 ? 0.05 : 0);
      const filt = audioCtx.createBiquadFilter();
      filt.type = 'lowpass';
      filt.frequency.value = 460;
      osc.connect(filt);
      filt.connect(oGain);
      oGain.connect(droneGain);
      osc.start();
      lfo.start();
    });
    droneGain.gain.linearRampToValueAtTime(0.4, audioCtx.currentTime + 2.4);
  }

  function stopDrone() {
    if (!droneGain) return;
    droneGain.gain.cancelScheduledValues(audioCtx.currentTime);
    droneGain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.6);
    const toStop = droneGain;
    setTimeout(() => { try { toStop.disconnect(); } catch(e) {} }, 700);
    droneGain = null;
  }

  function playWhisper() {
    if (!audioCtx) return;
    const now = audioCtx.currentTime;
    const base = 180 + Math.random() * 220;
    for (let i = 0; i < 2; i++) {
      const o = audioCtx.createOscillator();
      o.type = 'sine';
      o.frequency.value = base * (1 + i * 0.51);
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(0.12, now + 0.04);
      g.gain.exponentialRampToValueAtTime(0.001, now + 1.4);
      const f = audioCtx.createBiquadFilter();
      f.type = 'bandpass';
      f.frequency.value = 620;
      f.Q.value = 1.8;
      o.connect(f); f.connect(g); g.connect(masterGain);
      o.start(now);
      o.stop(now + 1.5);
    }
  }

  soundBtn.addEventListener('click', () => {
    ensureAudio();
    if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
    droneOn = !droneOn;
    if (droneOn) {
      startDrone();
      soundBtn.textContent = '● drone';
    } else {
      stopDrone();
      soundBtn.textContent = '◯ drone';
    }
  });

  // ----- Send handling -----
  function send() {
    const text = input.value;
    if (!text.trim()) return;
    spawnMessage(text);
    input.value = '';
  }
  sendBtn.addEventListener('click', send);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); send(); }
  });

  // Seed a few faint ghost messages so the scene breathes on first load
  function seedGhosts() {
    const whispers = [
      'hello?', 'is anyone there', 'echo', 'forever', 'gravity',
      'i was here', 'silence', 'wait —', 'light bends', 'cosmic dust'
    ];
    whispers.forEach((w, i) => {
      setTimeout(() => spawnMessage(w), i * 900 + Math.random() * 400);
    });
  }

  // ----- Main loop -----
  let lastT = 0;
  function loop(now) {
    const dt = Math.min(0.05, (now - lastT) / 1000 || 0.016);
    lastT = now;
    t += dt;

    ctx.clearRect(0, 0, W, H);

    // Deep space gradient wash
    const bg = ctx.createRadialGradient(cx, cy, 0, cx, cy, Math.max(W, H) * 0.9);
    bg.addColorStop(0, 'rgba(20, 10, 50, 0.55)');
    bg.addColorStop(0.5, 'rgba(11, 5, 36, 0.0)');
    bg.addColorStop(1, 'rgba(5, 2, 15, 0)');
    ctx.fillStyle = bg;
    ctx.fillRect(0, 0, W, H);

    const geom = geometry();

    drawStars(geom);
    drawBlackHole(geom);

    // Update + draw messages
    let drifting = 0;
    for (let i = messages.length - 1; i >= 0; i--) {
      const m = messages[i];
      updateMessage(m, dt);
      if (m.consumed) {
        messages.splice(i, 1);
        consumed++;
        continue;
      }
      drifting++;
    }
    // Draw messages after BH so the bright ones pop over the disk
    for (const m of messages) drawMessage(m, geom);

    driftCountEl.textContent = drifting;
    consumedCountEl.textContent = consumed;

    requestAnimationFrame(loop);
  }

  // Kickoff
  resize();
  requestAnimationFrame((t0) => { lastT = t0; loop(t0); });
  setTimeout(seedGhosts, 1200);

  // Focus input on space tap outside
  canvas.addEventListener('pointerdown', () => {
    if (document.activeElement !== input) input.focus();
  });

})();
</script>
</body>
</html>
