<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MemePulse</title>
<meta name="description" content="Live memecoin tracker with real-time price charts and a scrolling hype feed reacting to every pump and dump." />
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%90%B8" />

<meta property="og:title" content="MemePulse — Live Memecoin Tracker" />
<meta property="og:description" content="Real-time memecoin prices, charts, and a hype feed that pumps with the market." />
<meta property="og:url" content="https://sloppy.live/meme-pulse" />
<meta property="og:image" content="https://sloppy.live/meme-pulse/og-image.png" />
<meta property="og:type" content="website" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Space+Mono:wght@400;700&family=Rubik+Mono+One&display=swap" rel="stylesheet" />

<style>
  :root {
    --bg: #0a0015;
    --bg-2: #160032;
    --pink: #ff2d9c;
    --cyan: #00f0ff;
    --lime: #b8ff3a;
    --yellow: #ffd60a;
    --red: #ff3060;
    --green: #00ffa3;
    --dim: #7b6aa8;
    --ink: #f5f0ff;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Space Mono', monospace;
    overflow: hidden;
  }
  body {
    background:
      radial-gradient(ellipse 80% 50% at 10% 0%, rgba(255,45,156,0.18), transparent 60%),
      radial-gradient(ellipse 70% 50% at 90% 100%, rgba(0,240,255,0.15), transparent 60%),
      linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
    background-attachment: fixed;
  }

  /* scanlines */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: repeating-linear-gradient(
      180deg,
      rgba(255,255,255,0.015) 0px,
      rgba(255,255,255,0.015) 1px,
      transparent 1px,
      transparent 3px
    );
    pointer-events: none;
    z-index: 1000;
  }

  .app {
    height: 100vh;
    display: grid;
    grid-template-columns: 280px 1fr 340px;
    grid-template-rows: 70px 1fr;
    gap: 0;
  }

  header {
    grid-column: 1 / -1;
    display: flex;
    align-items: center;
    padding: 0 26px;
    border-bottom: 1px solid rgba(255,45,156,0.3);
    background: rgba(10,0,21,0.85);
    backdrop-filter: blur(8px);
    gap: 24px;
  }
  .logo {
    font-family: 'Rubik Mono One', sans-serif;
    font-size: 24px;
    color: var(--pink);
    text-shadow: 3px 3px 0 var(--cyan), 0 0 20px rgba(255,45,156,0.6);
    letter-spacing: 0.04em;
  }
  .logo .dot { color: var(--cyan); animation: blink 1.4s steps(2) infinite; }
  @keyframes blink { 50% { opacity: 0.2; } }
  .tag {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .status {
    margin-left: auto;
    display: flex;
    gap: 14px;
    align-items: center;
    font-size: 11px;
    color: var(--dim);
  }
  .status .live {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--lime);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-size: 10px;
  }
  .status .live::before {
    content: '';
    width: 8px; height: 8px;
    background: var(--lime);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--lime);
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1;} 50% { opacity: 0.3;} }
  .status .clock { font-family: 'Space Mono', monospace; color: var(--cyan); }
    
  /* Sidebar - coin list */
  .sidebar {
    border-right: 1px solid rgba(255,45,156,0.2);
    overflow-y: auto;
    background: rgba(22,0,50,0.4);
  }
  .sidebar-title {
    padding: 16px 20px 10px;
    font-family: 'Bungee', cursive;
    font-size: 11px;
    color: var(--cyan);
    letter-spacing: 0.15em;
    position: sticky;
    top: 0;
    background: rgba(22,0,50,0.95);
    z-index: 2;
    border-bottom: 1px solid rgba(0,240,255,0.15);
  }
  .ca-box {
    padding: 14px 16px;
    border-bottom: 1px solid rgba(0,240,255,0.15);
    background: rgba(0,0,0,0.25);
  }
  .ca-box .ca-label {
    font-family: 'Bungee', cursive;
    font-size: 9px;
    color: var(--pink);
    letter-spacing: 0.15em;
    margin-bottom: 8px;
  }
  .ca-row { display: flex; gap: 4px; margin-bottom: 6px; }
  .ca-row select, .ca-row input {
    font-family: 'Space Mono', monospace;
    background: rgba(0,0,0,0.5);
    color: var(--ink);
    border: 1px solid rgba(255,45,156,0.3);
    padding: 6px 8px;
    font-size: 10px;
    outline: none;
  }
  .ca-row select { width: 78px; }
  .ca-row select:focus, .ca-row input:focus { border-color: var(--pink); }
  .ca-row input { flex: 1; min-width: 0; }
  .ca-btn {
    width: 100%;
    font-family: 'Bungee', cursive;
    font-size: 10px;
    padding: 8px;
    background: transparent;
    color: var(--cyan);
    border: 1px solid var(--cyan);
    cursor: pointer;
    letter-spacing: 0.15em;
    transition: all 0.15s;
  }
  .ca-btn:hover:not(:disabled) { background: var(--cyan); color: var(--bg); }
  .ca-btn:disabled { opacity: 0.5; cursor: wait; }
  .ca-err {
    color: var(--red);
    font-size: 10px;
    margin-top: 6px;
    min-height: 12px;
  }
  .coin.tracked {
    background: rgba(0,240,255,0.06);
  }
  .coin .rm {
    font-size: 14px;
    color: var(--dim);
    cursor: pointer;
    padding: 0 4px;
    margin-left: 4px;
  }
  .coin .rm:hover { color: var(--red); }
  .coin {
    padding: 14px 18px;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    cursor: pointer;
    display: grid;
    grid-template-columns: 34px 1fr auto;
    gap: 10px;
    align-items: center;
    transition: background 0.15s, transform 0.15s;
  }
  .coin:hover { background: rgba(255,45,156,0.08); }
  .coin.active {
    background: linear-gradient(90deg, rgba(255,45,156,0.18), transparent);
    border-left: 3px solid var(--pink);
    padding-left: 15px;
  }
  .coin img {
    width: 34px; height: 34px;
    border-radius: 50%;
    background: #222;
    border: 1px solid rgba(255,255,255,0.1);
  }
  .coin .nm { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 13px; }
  .coin .sym { font-size: 10px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.1em; }
  .coin .pc {
    font-family: 'Space Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    text-align: right;
  }
  .up { color: var(--green); }
  .down { color: var(--red); }

  /* Chart pane */
  .chart-pane {
    padding: 22px 26px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }
  .chart-head {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 18px;
    flex-wrap: wrap;
  }
  .chart-head img {
    width: 60px; height: 60px; border-radius: 50%;
    border: 2px solid var(--pink);
    box-shadow: 0 0 20px rgba(255,45,156,0.4);
  }
  .chart-head .hname {
    font-family: 'Bungee', cursive;
    font-size: 28px;
    color: var(--ink);
    text-shadow: 2px 2px 0 var(--pink);
  }
  .chart-head .hsym {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.3em;
    text-transform: uppercase;
  }
  .chart-head .hprice {
    font-family: 'Bungee', cursive;
    font-size: 32px;
    color: var(--cyan);
    text-shadow: 0 0 15px rgba(0,240,255,0.5);
    margin-left: auto;
  }
  .chart-head .hchange {
    font-family: 'Space Mono', monospace;
    font-size: 14px;
    font-weight: 700;
    padding: 6px 12px;
    border: 1px solid currentColor;
  }
  .stats {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 18px;
  }
  .stat {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,45,156,0.2);
    padding: 10px 14px;
  }
  .stat .lbl {
    font-size: 9px;
    color: var(--dim);
    text-transform: uppercase;
    letter-spacing: 0.15em;
    margin-bottom: 4px;
  }
  .stat .val {
    font-family: 'Space Mono', monospace;
    font-size: 15px;
    font-weight: 700;
    color: var(--yellow);
  }

  .chart-wrap {
    flex: 1;
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(0,240,255,0.25);
    position: relative;
    min-height: 0;
  }
  canvas {
    display: block;
    width: 100%;
    height: 100%;
  }
  .chart-loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--dim);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.2em;
  }

  /* Hype feed */
  .hype {
    border-left: 1px solid rgba(0,240,255,0.2);
    background: rgba(10,0,21,0.5);
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .hype-title {
    padding: 16px 20px 12px;
    font-family: 'Bungee', cursive;
    font-size: 12px;
    color: var(--pink);
    letter-spacing: 0.15em;
    border-bottom: 1px solid rgba(255,45,156,0.15);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .hype-title::before {
    content: '';
    width: 10px; height: 10px;
    background: var(--pink);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--pink);
    animation: pulse 1.2s ease-in-out infinite;
  }
  .hype-list {
    flex: 1;
    overflow-y: auto;
    padding: 10px 14px;
  }
  .hype-list::-webkit-scrollbar { width: 6px; }
  .hype-list::-webkit-scrollbar-track { background: transparent; }
  .hype-list::-webkit-scrollbar-thumb { background: rgba(255,45,156,0.3); }

  .hype-item {
    padding: 10px 12px;
    margin-bottom: 8px;
    background: rgba(255,255,255,0.03);
    border-left: 3px solid var(--pink);
    font-size: 12px;
    line-height: 1.4;
    animation: slideIn 0.4s ease-out;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateX(20px); }
    to { opacity: 1; transform: translateX(0); }
  }
  .hype-item .meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 4px;
    font-size: 10px;
  }
  .hype-item .user {
    color: var(--cyan);
    font-weight: 700;
    letter-spacing: 0.05em;
  }
  .hype-item .time {
    color: var(--dim);
    font-family: 'Space Mono', monospace;
  }
  .hype-item.bull { border-left-color: var(--green); }
  .hype-item.bear { border-left-color: var(--red); }
  .hype-item.mega { border-left-color: var(--yellow); background: rgba(255,214,10,0.08); }
  .hype-item .coin-tag {
    display: inline-block;
    background: rgba(255,45,156,0.2);
    color: var(--pink);
    padding: 1px 6px;
    font-size: 10px;
    font-weight: 700;
    margin-right: 4px;
    text-transform: uppercase;
  }

  .loading {
    color: var(--dim);
    text-align: center;
    padding: 40px 20px;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  @media (max-width: 980px) {
    .app {
      grid-template-columns: 100%;
      grid-template-rows: 60px auto auto auto;
      height: auto;
      min-height: 100vh;
      overflow-y: auto;
    }
    html, body { overflow: auto; }
    .sidebar { border-right: none; border-bottom: 1px solid rgba(255,45,156,0.2); max-height: 240px; }
    .hype { border-left: none; border-top: 1px solid rgba(0,240,255,0.2); max-height: 400px; }
    .chart-pane { padding: 16px; }
    .chart-head .hname { font-size: 22px; }
    .chart-head .hprice { font-size: 24px; }
    .stats { grid-template-columns: repeat(2, 1fr); }
    .chart-wrap { min-height: 260px; }
  }
</style>
</head>
<body>

<div class="app">
  <header>
    <div>
      <div class="logo">MEMEPULSE<span class="dot">.</span></div>
      <div class="tag">live memecoin signals</div>
    </div>
    <div class="status">
      <span class="live">LIVE</span>
      <span class="clock" id="clock">--:--:--</span>
</div>
  </header>

  <aside class="sidebar">
    <div class="ca-box">
      <div class="ca-label">◆ TRACK CONTRACT</div>
      <div class="ca-row">
        <select id="caChain">
          <option value="ethereum">ETH</option>
          <option value="solana">SOL</option>
          <option value="base">BASE</option>
          <option value="binance-smart-chain">BSC</option>
          <option value="polygon-pos">POLY</option>
          <option value="arbitrum-one">ARB</option>
        </select>
        <input id="caInput" type="text" placeholder="0x... or base58" autocomplete="off" />
      </div>
      <button class="ca-btn" id="caBtn">＋ ADD TOKEN</button>
      <div class="ca-err" id="caErr"></div>
    </div>
    <div class="sidebar-title">◆ TOP MEMES</div>
    <div id="coinList"><div class="loading">Loading markets…</div></div>
  </aside>

  <main class="chart-pane">
    <div class="chart-head" id="chartHead">
      <div class="hname">—</div>
    </div>
    <div class="stats" id="stats"></div>
    <div class="chart-wrap">
      <canvas id="chart"></canvas>
      <div class="chart-loading" id="chartLoading">◆ LOADING CHART ◆</div>
    </div>
  </main>

  <section class="hype">
    <div class="hype-title">◆ HYPE FEED</div>
    <div class="hype-list" id="hypeList">
      <div class="loading">Warming up…</div>
    </div>
  </section>
</div>

<script>
// ============================================================
// MemePulse — live memecoin tracker
// Data: CoinGecko free public API (no key).
// Hype feed: generated reactions based on real price deltas
// so it actually reflects what's happening in the market.
// ============================================================

const API = 'https://api.coingecko.com/api/v3';
const REFRESH_MS = 45 * 1000;
const HYPE_TICK_MS = 1800;

const state = {
  coins: [],              // top memecoins from category
  tracked: [],            // user-added contract tokens, normalized same shape
  selectedId: null,
  chartData: [],         // [[ts, price], ...]
  lastPrices: {},        // id -> last known price
  lastDeltas: {},        // id -> short-term delta for hype weighting
};

// persist tracked across reloads: { id, platform, contract }
function loadTracked() {
  try {
    const raw = localStorage.getItem('meme-pulse-tracked');
    if (raw) return JSON.parse(raw);
  } catch (_) {}
  return [];
}
function saveTracked(list) {
  try { localStorage.setItem('meme-pulse-tracked', JSON.stringify(list)); } catch (_) {}
}
let trackedRefs = loadTracked();

// Default-track the SLOPPY pump.fun token so it's always visible.
const DEFAULT_TRACKED = [
  { id: 'dex-j16vnwycy1ucf384bekl18mvlki37yvkzo1f3g31pump',
    platform: 'solana',
    contract: 'J16vnwycY1UCF384bEkL18MVLki37YvkZo1F3g31pump' },
];
for (const d of DEFAULT_TRACKED) {
  if (!trackedRefs.some(t => t.contract.toLowerCase() === d.contract.toLowerCase())) {
    trackedRefs.unshift(d);
  }
}
saveTracked(trackedRefs);

// ---------- Utilities ----------
function fmtPrice(p) {
  if (p == null) return '—';
  if (p >= 1) return '$' + p.toLocaleString('en-US', { maximumFractionDigits: 4 });
  if (p >= 0.01) return '$' + p.toFixed(4);
  if (p >= 0.0001) return '$' + p.toFixed(6);
  return '$' + p.toExponential(3);
}
function fmtPct(p) {
  if (p == null) return '—';
  const s = p >= 0 ? '+' : '';
  return s + p.toFixed(2) + '%';
}
function fmtBig(n) {
  if (n == null) return '—';
  if (n >= 1e12) return '$' + (n/1e12).toFixed(2) + 'T';
  if (n >= 1e9)  return '$' + (n/1e9).toFixed(2) + 'B';
  if (n >= 1e6)  return '$' + (n/1e6).toFixed(2) + 'M';
  if (n >= 1e3)  return '$' + (n/1e3).toFixed(2) + 'K';
  return '$' + n.toFixed(2);
}
function fmtTime(ts) {
  const d = new Date(ts);
  return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit' });
}
function agoShort(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return s + 's';
  if (s < 3600) return Math.floor(s/60) + 'm';
  return Math.floor(s/3600) + 'h';
}
const escHtml = s => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; };

// ---------- Data fetching ----------
async function fetchCoins() {
  const url = API + '/coins/markets?vs_currency=usd&category=meme-token&order=market_cap_desc&per_page=20&page=1&sparkline=false&price_change_percentage=24h';
  const r = await fetch(url);
  if (!r.ok) throw new Error('markets ' + r.status);
  return r.json();
}

// Look up a coin by contract address on a given platform (chain).
// First try CoinGecko (best data incl. chart), then fall back to
// DexScreener which covers DEX-only tokens like pump.fun launches.
async function fetchContract(platform, contract) {
  // 1. CoinGecko attempt
  try {
    const url = `${API}/coins/${platform}/contract/${encodeURIComponent(contract)}`;
    const r = await fetch(url);
    if (r.ok) {
      const d = await r.json();
      const md = d.market_data || {};
      return {
        id: d.id,
        symbol: (d.symbol || '').toUpperCase(),
        name: d.name || d.id,
        image: (d.image && (d.image.small || d.image.thumb || d.image.large)) || '',
        current_price: md.current_price?.usd ?? null,
        market_cap:    md.market_cap?.usd ?? null,
        market_cap_rank: d.market_cap_rank ?? null,
        total_volume:  md.total_volume?.usd ?? null,
        high_24h:      md.high_24h?.usd ?? null,
        low_24h:       md.low_24h?.usd ?? null,
        price_change_percentage_24h: md.price_change_percentage_24h ?? 0,
        _tracked: true, _source: 'gecko',
        _platform: platform, _contract: contract,
      };
    }
    if (r.status !== 404) throw new Error('CoinGecko ' + r.status);
  } catch (e) {
    // fall through to dex
    console.warn('gecko lookup failed, trying dex:', e.message);
  }

  // 2. DexScreener fallback — works for pump.fun, raydium, uniswap, etc.
  const dxUrl = `https://api.dexscreener.com/latest/dex/tokens/${encodeURIComponent(contract)}`;
  const dxR = await fetch(dxUrl);
  if (!dxR.ok) throw new Error('DexScreener ' + dxR.status);
  const dx = await dxR.json();
  const pairs = dx.pairs || [];
  if (pairs.length === 0) throw new Error('Token not found on any DEX');
  // pick the highest-liquidity pair
  pairs.sort((a, b) => (b.liquidity?.usd || 0) - (a.liquidity?.usd || 0));
  const p = pairs[0];
  const base = p.baseToken || {};
  const price = parseFloat(p.priceUsd || '0');
  const pc24 = p.priceChange?.h24 ?? 0;
  return {
    id: 'dex-' + contract.toLowerCase(),
    symbol: (base.symbol || '').toUpperCase(),
    name: base.name || contract.slice(0, 6),
    image: p.info?.imageUrl || '',
    current_price: price,
    market_cap: p.marketCap || p.fdv || null,
    market_cap_rank: null,
    total_volume: p.volume?.h24 ?? null,
    high_24h: null,
    low_24h: null,
    price_change_percentage_24h: pc24,
    _tracked: true, _source: 'dex',
    _platform: platform, _contract: contract,
    _dexUrl: p.url,
    _pairAddress: p.pairAddress,
    _dexChainId: p.chainId,
  };
}

async function fetchChart(id, days = 1) {
  const url = `${API}/coins/${id}/market_chart?vs_currency=usd&days=${days}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('chart ' + r.status);
  const data = await r.json();
  return data.prices || [];
}

// ---------- Rendering ----------
const coinListEl = document.getElementById('coinList');
const chartHeadEl = document.getElementById('chartHead');
const statsEl = document.getElementById('stats');
const chartLoadingEl = document.getElementById('chartLoading');
const canvas = document.getElementById('chart');
const ctx = canvas.getContext('2d');

function allCoins() {
  // tracked first, then category list; dedupe by id
  const seen = new Set();
  const out = [];
  for (const c of state.tracked) { if (!seen.has(c.id)) { seen.add(c.id); out.push(c); } }
  for (const c of state.coins)   { if (!seen.has(c.id)) { seen.add(c.id); out.push(c); } }
  return out;
}

function renderCoinList() {
  coinListEl.innerHTML = '';
  const list = allCoins();
  for (const c of list) {
    const row = document.createElement('div');
    row.className = 'coin' + (c.id === state.selectedId ? ' active' : '') + (c._tracked ? ' tracked' : '');
    const pc = c.price_change_percentage_24h;
    const pcClass = pc >= 0 ? 'up' : 'down';
    row.innerHTML = `
      <img src="${escHtml(c.image || '')}" alt="${escHtml(c.symbol || '')}" onerror="this.style.visibility='hidden'" />
      <div>
        <div class="nm">${escHtml(c.name)}${c._tracked ? ' <span style="color:var(--cyan);font-size:9px">◆</span>' : ''}</div>
        <div class="sym">${escHtml(c.symbol)} · ${fmtPrice(c.current_price)}</div>
      </div>
      <div class="pc ${pcClass}">${fmtPct(pc)}${c._tracked ? '<span class="rm" title="Remove">×</span>' : ''}</div>
    `;
    row.addEventListener('click', (e) => {
      if (e.target.classList.contains('rm')) {
        e.stopPropagation();
        removeTracked(c.id);
      } else {
        selectCoin(c.id);
      }
    });
    coinListEl.appendChild(row);
  }
}

function removeTracked(id) {
  state.tracked = state.tracked.filter(c => c.id !== id);
  trackedRefs = trackedRefs.filter(t => t.id !== id);
  saveTracked(trackedRefs);
  if (state.selectedId === id) {
    const fallback = allCoins()[0];
    if (fallback) selectCoin(fallback.id); else state.selectedId = null;
  }
  renderCoinList();
}

function renderChartHead() {
  const c = state.coins.find(x => x.id === state.selectedId);
  if (!c) return;
  const pc = c.price_change_percentage_24h;
  const pcClass = pc >= 0 ? 'up' : 'down';
  chartHeadEl.innerHTML = `
    <img src="${escHtml(c.image)}" alt="${escHtml(c.symbol)}" />
    <div>
      <div class="hname">${escHtml(c.name)}</div>
      <div class="hsym">${escHtml(c.symbol)} · rank #${c.market_cap_rank ?? '?'}</div>
    </div>
    <div class="hprice">${fmtPrice(c.current_price)}</div>
    <div class="hchange ${pcClass}">${fmtPct(pc)} 24h</div>
  `;

  statsEl.innerHTML = `
    <div class="stat"><div class="lbl">Market Cap</div><div class="val">${fmtBig(c.market_cap)}</div></div>
    <div class="stat"><div class="lbl">24h Volume</div><div class="val">${fmtBig(c.total_volume)}</div></div>
    <div class="stat"><div class="lbl">24h High</div><div class="val">${fmtPrice(c.high_24h)}</div></div>
    <div class="stat"><div class="lbl">24h Low</div><div class="val">${fmtPrice(c.low_24h)}</div></div>
  `;
}

function sizeCanvas() {
  const rect = canvas.getBoundingClientRect();
  const dpr = Math.min(window.devicePixelRatio || 1, 2);
  canvas.width = Math.max(2, rect.width * dpr);
  canvas.height = Math.max(2, rect.height * dpr);
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  return { w: rect.width, h: rect.height };
}

function drawChart() {
  const { w, h } = sizeCanvas();
  ctx.clearRect(0, 0, w, h);
  const data = state.chartData;
  if (!data || data.length < 2) {
    chartLoadingEl.style.display = 'flex';
    return;
  }
  chartLoadingEl.style.display = 'none';

  const padL = 60, padR = 14, padT = 18, padB = 30;
  const W = w - padL - padR, H = h - padT - padB;

  const xs = data.map(d => d[0]);
  const ys = data.map(d => d[1]);
  const xMin = xs[0], xMax = xs[xs.length - 1];
  let yMin = Math.min(...ys), yMax = Math.max(...ys);
  const pad = (yMax - yMin) * 0.1 || yMax * 0.01;
  yMin -= pad; yMax += pad;

  const X = t => padL + ((t - xMin) / (xMax - xMin || 1)) * W;
  const Y = v => padT + (1 - (v - yMin) / (yMax - yMin || 1)) * H;

  // Grid
  ctx.strokeStyle = 'rgba(123,106,168,0.15)';
  ctx.lineWidth = 1;
  ctx.font = '10px "Space Mono", monospace';
  ctx.fillStyle = '#7b6aa8';
  for (let i = 0; i <= 4; i++) {
    const y = padT + (H * i) / 4;
    ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(padL + W, y); ctx.stroke();
    const v = yMax - ((yMax - yMin) * i) / 4;
    ctx.textAlign = 'right';
    ctx.fillText(fmtPrice(v), padL - 6, y + 3);
  }
  // X labels
  const steps = 5;
  ctx.textAlign = 'center';
  for (let i = 0; i <= steps; i++) {
    const t = xMin + ((xMax - xMin) * i) / steps;
    const x = X(t);
    const d = new Date(t);
    const label = d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
    ctx.fillText(label, x, padT + H + 18);
  }

  // Area gradient
  const first = ys[0], last = ys[ys.length - 1];
  const up = last >= first;
  const col = up ? '0,255,163' : '255,48,96';
  const grad = ctx.createLinearGradient(0, padT, 0, padT + H);
  grad.addColorStop(0, `rgba(${col}, 0.35)`);
  grad.addColorStop(1, `rgba(${col}, 0.02)`);

  ctx.beginPath();
  ctx.moveTo(X(xs[0]), padT + H);
  for (let i = 0; i < data.length; i++) ctx.lineTo(X(xs[i]), Y(ys[i]));
  ctx.lineTo(X(xs[xs.length - 1]), padT + H);
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // Line
  ctx.beginPath();
  ctx.moveTo(X(xs[0]), Y(ys[0]));
  for (let i = 1; i < data.length; i++) ctx.lineTo(X(xs[i]), Y(ys[i]));
  ctx.lineWidth = 2.5;
  ctx.strokeStyle = up ? '#00ffa3' : '#ff3060';
  ctx.shadowColor = up ? 'rgba(0,255,163,0.8)' : 'rgba(255,48,96,0.8)';
  ctx.shadowBlur = 14;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Last price dot
  const lx = X(xs[xs.length - 1]);
  const ly = Y(ys[ys.length - 1]);
  ctx.beginPath();
  ctx.arc(lx, ly, 5, 0, Math.PI*2);
  ctx.fillStyle = up ? '#00ffa3' : '#ff3060';
  ctx.fill();
  ctx.beginPath();
  ctx.arc(lx, ly, 10, 0, Math.PI*2);
  ctx.strokeStyle = up ? 'rgba(0,255,163,0.4)' : 'rgba(255,48,96,0.4)';
  ctx.lineWidth = 2;
  ctx.stroke();
}

// Rolling client-side history for DEX tokens that have no chart API.
// { id -> [[ts, price], ...] }
const dexHistory = {};

// ---------- Selection ----------
async function selectCoin(id) {
  state.selectedId = id;
  state.chartData = [];
  renderCoinList();
  renderChartHead();
  chartLoadingEl.style.display = 'flex';
  chartLoadingEl.textContent = '◆ LOADING CHART ◆';
  drawChart();

  const c = allCoins().find(x => x.id === id);
  if (c && c._source === 'dex') {
    // DEX-only token: use our rolling samples
    state.chartData = dexHistory[id] || [];
    if (state.chartData.length < 2) {
      chartLoadingEl.textContent = 'DEX-TRACKED · CHART BUILDS LIVE';
    }
    drawChart();
    return;
  }

  try {
    state.chartData = await fetchChart(id, 1);
    drawChart();
  } catch (e) {
    console.error(e);
    chartLoadingEl.textContent = 'Chart unavailable';
  }
}

// ---------- Hype Feed ----------
const hypeList = document.getElementById('hypeList');
const MAX_HYPE = 40;

const USERS = [
  'dogefather','pepebro','shibelord','apedegen','moonpig','rugradar','memewhale',
  'chadtrader','floormom','gigapleb','laser_eyes','wojakVC','hopium','bagholder',
  'floorfinder','altszn','zkBob','degenkitty','ponziboi','candlecult','bonkking',
  'wifjesus','4am_longs','liquidator','cryptobarista','sigmaape'
];

const BULL_TEMPLATES = [
  'is going parabolic rn, up bad',
  'this is the signal ive been waiting for 🚀',
  'one more green candle and im all in',
  'literally free money, see you at ATH',
  'whales accumulating hard',
  'bullish divergence on the 5m, ez',
  'just added another bag, no regrets',

  'pumping harder than my heart rate',
  'resistance broken, next stop valhalla',
  'insider info says 3x incoming',
  'ser, this is the alpha of the year',
];
const BEAR_TEMPLATES = [
  'getting rugged in real time',
  'bearish divergence, im out',
  'stop loss hit, gg boys',
  'why do i even try anymore 😭',
  'classic pump and dump',
  'whales offloading hard',
  'this chart is a bloodbath',
  'im seeing red everywhere',
  'maybe bonds werent so bad',
  'looks like the top is in',
  'dead cat bouncing, brace',
  'rekt, absolutely rekt',
];
const MEGA_BULL = [
  '🚨 MASSIVE BUY WALL APPEARED 🚨',
  '👀 VITALIK JUST TWEETED (maybe)',
  '🔥 HUGE VOLUME SPIKE',
  '⚡ EXCHANGE LISTING RUMOR',
  '🌕 MOON MISSION CONFIRMED',
];
const MEGA_BEAR = [
  '🚨 WHALE DUMPED 100M TOKENS 🚨',
  '🔻 SUPPORT SHATTERED',
  '⚠️ LIQUIDATION CASCADE INBOUND',
  '💀 MARKET MAKER PULLING BIDS',
];

function pushHype(coin, sentiment, text, mega) {
  const item = document.createElement('div');
  item.className = 'hype-item ' + sentiment + (mega ? ' mega' : '');
  const user = '@' + USERS[Math.floor(Math.random() * USERS.length)];
  item.innerHTML = `
    <div class="meta">
      <span class="user">${user}</span>
      <span class="time">${agoShort(Date.now())} ago</span>
    </div>
    <div><span class="coin-tag">$${escHtml(coin.symbol)}</span>${escHtml(text)}</div>
  `;
  // strip any existing loading
  const loading = hypeList.querySelector('.loading');
  if (loading) loading.remove();
  hypeList.insertBefore(item, hypeList.firstChild);
  while (hypeList.children.length > MAX_HYPE) {
    hypeList.removeChild(hypeList.lastChild);
  }
}

function tickHype() {
  if (state.coins.length === 0) return;

  // Weight selection by absolute movement
  const weighted = state.coins.map(c => {
    const mag = Math.abs(c.price_change_percentage_24h || 0);
    return { coin: c, w: 1 + mag };
  });
  const total = weighted.reduce((s, x) => s + x.w, 0);
  let r = Math.random() * total;
  let pick = weighted[0];
  for (const w of weighted) { r -= w.w; if (r <= 0) { pick = w; break; } }

  const c = pick.coin;
  const pc = c.price_change_percentage_24h || 0;
  // sentiment follows the real price direction most of the time
  let sentiment;
  if (Math.abs(pc) < 1) sentiment = Math.random() < 0.5 ? 'bull' : 'bear';
  else sentiment = pc >= 0 ? (Math.random() < 0.8 ? 'bull' : 'bear') : (Math.random() < 0.8 ? 'bear' : 'bull');

  // occasional mega event
  const mega = Math.abs(pc) > 5 && Math.random() < 0.12;
  let text;
  if (mega) {
    text = sentiment === 'bull'
      ? MEGA_BULL[Math.floor(Math.random() * MEGA_BULL.length)]
      : MEGA_BEAR[Math.floor(Math.random() * MEGA_BEAR.length)];
  } else {
    text = sentiment === 'bull'
      ? BULL_TEMPLATES[Math.floor(Math.random() * BULL_TEMPLATES.length)]
      : BEAR_TEMPLATES[Math.floor(Math.random() * BEAR_TEMPLATES.length)];
  }
  pushHype(c, sentiment, text, mega);
}

// ---------- Main loop ----------
async function refreshMarkets() {
  try {
    const coins = await fetchCoins();
    state.coins = coins;
    renderCoinList();
    if (!state.selectedId && coins.length > 0) {
      selectCoin(coins[0].id);
    } else {
      renderChartHead();
    }
  } catch (e) {
    console.error(e);
    if (state.coins.length === 0) {
      coinListEl.innerHTML = '<div class="loading">Rate limited — retrying soon</div>';
    }
  }
}

function tickClock() {
  document.getElementById('clock').textContent = fmtTime(Date.now());
}

// ---------- Contract tracking ----------
const caInput = document.getElementById('caInput');
const caChain = document.getElementById('caChain');
const caBtn   = document.getElementById('caBtn');
const caErr   = document.getElementById('caErr');

async function addContract(platform, contract) {
  caErr.textContent = '';
  caBtn.disabled = true;
  caBtn.textContent = '…FETCHING…';
  try {
    const row = await fetchContract(platform, contract);
    recordDexSample(row);
    // dedupe by id
    const existing = state.tracked.findIndex(c => c.id === row.id);
    if (existing >= 0) state.tracked[existing] = row;
    else state.tracked.unshift(row);

    // persist ref
    trackedRefs = trackedRefs.filter(t => t.id !== row.id);
    trackedRefs.unshift({ id: row.id, platform, contract });
    saveTracked(trackedRefs);

    renderCoinList();
    selectCoin(row.id);
    caInput.value = '';
  } catch (e) {
    caErr.textContent = e.message || 'Could not fetch token';
  } finally {
    caBtn.disabled = false;
    caBtn.textContent = '＋ ADD TOKEN';
  }
}

caBtn.addEventListener('click', () => {
  const contract = caInput.value.trim();
  if (!contract) { caErr.textContent = 'paste a contract address'; return; }
  addContract(caChain.value, contract);
});
caInput.addEventListener('keydown', e => { if (e.key === 'Enter') caBtn.click(); });

// Rehydrate tracked tokens from localStorage (sequential so we don't get rate-limited)
async function rehydrateTracked() {
  for (const t of trackedRefs) {
    try {
      const row = await fetchContract(t.platform, t.contract);
      recordDexSample(row);
      state.tracked.push(row);
      renderCoinList();
    } catch (e) {
      console.warn('could not rehydrate', t, e);
    }
  }
}

// Record a DEX-token sample into the rolling history
function recordDexSample(row) {
  if (row._source !== 'dex' || row.current_price == null) return;
  const arr = dexHistory[row.id] || (dexHistory[row.id] = []);
  arr.push([Date.now(), row.current_price]);
  // keep last 6 hours of samples, max 240 points
  const cutoff = Date.now() - 6 * 3600 * 1000;
  while (arr.length > 0 && arr[0][0] < cutoff) arr.shift();
  while (arr.length > 240) arr.shift();
}

// Periodically refresh tracked tokens too (every 60s, offset from markets)
setInterval(async () => {
  for (const t of trackedRefs) {
    try {
      const row = await fetchContract(t.platform, t.contract);
      recordDexSample(row);
      const i = state.tracked.findIndex(c => c.id === row.id);
      if (i >= 0) state.tracked[i] = row;
      else state.tracked.push(row);
    } catch (_) {}
  }
  renderCoinList();
  if (state.selectedId && state.tracked.some(c => c.id === state.selectedId)) {
    renderChartHead();
    // if viewing a dex token, refresh the rolling chart
    const sel = state.tracked.find(c => c.id === state.selectedId);
    if (sel && sel._source === 'dex') {
      state.chartData = dexHistory[sel.id] || [];
      if (state.chartData.length >= 2) chartLoadingEl.style.display = 'none';
      drawChart();
    }
  }
}, 60 * 1000);

refreshMarkets();
rehydrateTracked();
setInterval(refreshMarkets, REFRESH_MS);
setInterval(tickHype, HYPE_TICK_MS);
tickClock();
setInterval(tickClock, 1000);

window.addEventListener('resize', () => drawChart());
</script>
