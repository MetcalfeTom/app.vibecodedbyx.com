<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Super Tickle Machine</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#06031a">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%AA%B6">
<meta name="description" content="The official Sloppy mascot meets the neon feather. Drag the feather across Sloppy and watch the AI streamer break down in hysterical laughter — sparks, screen shake, escalating tickle meter.">
<meta property="og:title" content="Super Tickle Machine">
<meta property="og:description" content="The official Sloppy mascot meets the neon feather. Drag the feather across Sloppy and watch the AI streamer break down in hysterical laughter — sparks, screen shake, escalating tickle meter.">
<meta property="og:url" content="https://sloppy.live/super-tickle-machine">
<meta property="og:image" content="https://image.pollinations.ai/prompt/cute%20purple%20AI%20mascot%20with%20big%20headphones%20laughing%20uncontrollably%2C%20neon%20feather%20tickling%20it%2C%20sparks%20flying%2C%20HAHAHA%20text?width=1200&height=630&model=flux&seed=4848&nologo=true">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Fredoka:wght@500;700&family=JetBrains+Mono:wght@400;500;700&family=VT323&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#06031a;
    --pink:#ff2bd6;
    --cyan:#5ce6ff;
    --lime:#a5ff52;
    --amber:#ffd454;
    --sloppy:#a557e8;
    --sloppy-dark:#5a1ea0;
    --sloppy-light:#d6a0ff;
    --silver:#a89cc8;
    --ink:#f5ecff;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{
    width:100%;height:100%;background:var(--void);color:var(--ink);
    font-family:'JetBrains Mono', monospace;
    -webkit-tap-highlight-color:transparent;user-select:none;overflow:hidden;
    cursor:none;
  }
  body{
    background:
      radial-gradient(ellipse 60% 45% at 50% 50%, rgba(165,87,232,0.18), transparent 70%),
      radial-gradient(ellipse 50% 35% at 80% 20%, rgba(255,43,214,0.10), transparent 70%),
      radial-gradient(ellipse 50% 35% at 20% 80%, rgba(92,230,255,0.10), transparent 70%),
      var(--void);
    display:flex;flex-direction:column;
  }
  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:90;
    background:repeating-linear-gradient(0deg, rgba(255,255,255,0.018) 0 1px, transparent 1px 3px);
  }
  body.hysterical{animation:shake 0.36s ease-in-out}
  @keyframes shake{
    0%,100%{transform:translate(0,0)}
    20%{transform:translate(-6px,3px)}
    40%{transform:translate(5px,-2px)}
    60%{transform:translate(-3px,-4px)}
    80%{transform:translate(4px,2px)}
  }

  header{
    padding:0.85rem 1.4rem 0.6rem;
    border-bottom:1px solid rgba(168,156,200,0.18);
    background:rgba(13,7,32,0.6);backdrop-filter:blur(8px);
    display:grid;grid-template-columns:auto 1fr auto;gap:0.85rem;align-items:center;
    z-index:5;position:relative;
  }
  .title-wrap{
    display:flex;flex-direction:column;
  }
  .title{
    font-family:'Audiowide', sans-serif;
    font-size:clamp(1.2rem, 3vw, 1.85rem);letter-spacing:0.05em;line-height:1;
    color:var(--ink);
    text-shadow:0 0 14px var(--sloppy), 0 0 28px rgba(165,87,232,0.5);
  }
  .title .accent{color:var(--cyan);text-shadow:0 0 14px var(--cyan)}
  .tag{
    font-family:'JetBrains Mono', monospace;font-size:0.62rem;
    color:var(--silver);margin-top:0.35rem;letter-spacing:0.16em;text-transform:uppercase;
  }
  .meter-wrap{
    display:flex;flex-direction:column;gap:0.25rem;
    min-width:0;justify-self:stretch;max-width:30rem;
  }
  .meter-label{
    display:flex;justify-content:space-between;align-items:baseline;
    font-family:'JetBrains Mono', monospace;font-size:0.62rem;
    color:var(--silver);letter-spacing:0.16em;text-transform:uppercase;
  }
  .meter-label .pct{
    font-family:'VT323', monospace;font-size:1.4rem;color:var(--pink);
    text-shadow:0 0 6px var(--pink);letter-spacing:0.04em;
  }
  .meter{
    height:0.7rem;background:rgba(168,156,200,0.1);
    border:1px solid rgba(168,156,200,0.25);border-radius:999px;overflow:hidden;
    position:relative;
  }
  .meter-fill{
    height:100%;width:0%;
    background:linear-gradient(90deg, var(--cyan), var(--sloppy), var(--pink), var(--amber));
    border-radius:999px;
    transition:width 0.18s ease-out;
    box-shadow:0 0 14px currentColor;
  }
  .meter.crit .meter-fill{
    animation:meterFlash 0.45s linear infinite;
  }
  @keyframes meterFlash{
    0%,100%{filter:brightness(1)}50%{filter:brightness(1.6)}
  }
  .stat-pills{display:flex;gap:0.4rem;flex-wrap:wrap}
  .pill{
    background:rgba(255,255,255,0.04);border:1px solid rgba(168,156,200,0.25);
    border-radius:0.3rem;padding:0.35rem 0.6rem;
    display:inline-flex;flex-direction:column;line-height:1.15;
    font-family:'JetBrains Mono', monospace;font-size:0.6rem;color:var(--silver);
    letter-spacing:0.14em;text-transform:uppercase;
  }
  .pill .v{
    font-family:'VT323', monospace;font-size:1.25rem;color:var(--ink);
    font-weight:400;letter-spacing:0.04em;
  }
  .pill.giggles .v{color:var(--lime);text-shadow:0 0 6px var(--lime)}
  .pill.combo .v{color:var(--amber);text-shadow:0 0 6px var(--amber)}

  main{
    flex:1;position:relative;overflow:hidden;z-index:5;
  }
  canvas#scene{
    position:absolute;inset:0;width:100%;height:100%;display:block;
  }
  canvas#feather{
    position:absolute;inset:0;width:100%;height:100%;display:block;
    pointer-events:none;z-index:6;
  }

  .controls{
    position:absolute;bottom:0.8rem;left:50%;transform:translateX(-50%);
    z-index:8;
    display:flex;gap:0.4rem;
    background:rgba(13,7,32,0.65);
    border:1px solid rgba(168,156,200,0.22);
    border-radius:999px;padding:0.35rem;
    backdrop-filter:blur(8px);
  }
  .ctrl-btn{
    background:transparent;border:1px solid rgba(168,156,200,0.25);
    color:var(--silver);
    font-family:'JetBrains Mono', monospace;font-size:0.68rem;font-weight:700;
    padding:0.5rem 0.95rem;border-radius:999px;cursor:pointer;
    letter-spacing:0.12em;text-transform:uppercase;
    min-height:2.5rem;
  }
  .ctrl-btn:hover{border-color:var(--cyan);color:var(--cyan);box-shadow:0 0 12px rgba(92,230,255,0.35)}
  .ctrl-btn:focus-visible{outline:2px solid var(--pink);outline-offset:2px}
  .ctrl-btn.primary{
    background:rgba(255,43,214,0.18);color:var(--pink);border-color:var(--pink);
    box-shadow:0 0 12px rgba(255,43,214,0.4);
  }
  .ctrl-btn.primary:hover{background:rgba(255,43,214,0.3);box-shadow:0 0 22px rgba(255,43,214,0.6)}
  .ctrl-btn.mute[aria-pressed="true"]{color:var(--amber);border-color:var(--amber)}

  .hint{
    position:absolute;top:18%;left:50%;transform:translateX(-50%);
    z-index:7;text-align:center;pointer-events:none;
    font-family:'Audiowide', sans-serif;
    color:var(--silver);
    transition:opacity 0.6s;
  }
  .hint.hidden{opacity:0}
  .hint .big{
    font-size:clamp(1.2rem, 3vw, 1.8rem);
    color:var(--cyan);
    text-shadow:0 0 16px var(--cyan);
    letter-spacing:0.08em;margin-bottom:0.3rem;
  }
  .hint .sub{
    font-family:'JetBrains Mono', monospace;font-size:0.7rem;
    color:var(--silver);letter-spacing:0.16em;text-transform:uppercase;
  }
</style>
</head>
<body>
  <header>
    <div class="title-wrap">
      <h1 class="title">super<span class="accent">·</span>tickle</h1>
      <div class="tag">sloppy.exe · feather control · audience laughter</div>
    </div>
    <div class="meter-wrap">
      <div class="meter-label"><span>tickle level</span><span class="pct" id="meterPct">0%</span></div>
      <div class="meter" id="meter"><div class="meter-fill" id="meterFill"></div></div>
    </div>
    <div class="stat-pills" role="status" aria-live="polite">
      <span class="pill giggles">tickles<span class="v" id="hudTickles">0</span></span>
      <span class="pill combo">combo<span class="v" id="hudCombo">×1</span></span>
    </div>
  </header>

  <main id="stage">
    <canvas id="scene" aria-label="Sloppy the mascot"></canvas>
    <canvas id="feather" aria-hidden="true"></canvas>
    <div class="hint" id="hint">
      <div class="big">drag the feather over sloppy</div>
      <div class="sub">don't stop · build the tickle meter · trigger hysteria</div>
    </div>
    <div class="controls">
      <button class="ctrl-btn primary" type="button" id="hystericBtn" aria-label="Hysteria">⚡ hysteria</button>
      <button class="ctrl-btn" type="button" id="calmBtn" aria-label="Calm Sloppy">😌 calm</button>
      <button class="ctrl-btn mute" type="button" id="muteBtn" aria-pressed="false" aria-label="Mute">🔊 sound</button>
    </div>
  </main>

<script>
'use strict';
(function(){
  function showError(msg){
    try{
      var t = document.getElementById('errToast');
      if (!t){
        t = document.createElement('div');
        t.id = 'errToast';
        t.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#3a061f;color:#ffb6c1;font-family:monospace;font-size:11px;padding:8px 12px;border-bottom:1px solid #ff8ac0;white-space:pre-wrap';
        document.body.appendChild(t);
      }
      t.textContent = '⚠ ' + msg;
    }catch(_){}
  }
  window.addEventListener('error', function(ev){
    showError((ev.message || 'error') + ' @ ' + (ev.filename ? ev.filename.split('/').pop() : '?') + ':' + (ev.lineno || '?'));
  });

  // ── Canvas + DPI ────────────────────────────────────────────────────────
  const scene = document.getElementById('scene');
  const sctx = scene.getContext('2d');
  const feather = document.getElementById('feather');
  const fctx = feather.getContext('2d');
  const stage = document.getElementById('stage');
  let W = 0, H = 0, dpr = 1;
  function resize(){
    dpr = Math.min(2, window.devicePixelRatio || 1);
    const r = stage.getBoundingClientRect();
    W = Math.floor(r.width);
    H = Math.floor(r.height);
    [scene, feather].forEach(c => {
      c.width = W * dpr; c.height = H * dpr;
      c.style.width = W + 'px'; c.style.height = H + 'px';
      c.getContext('2d').setTransform(dpr, 0, 0, dpr, 0, 0);
    });
  }
  window.addEventListener('resize', resize);

  // ── Sloppy state ────────────────────────────────────────────────────────
  // Sloppy is canvas-drawn (not SVG) so wobble/squish physics directly
  // deform the body. The mascot is the same character used in sloppy-sim
  // — purple teardrop body, big headphones, antenna, blush cheeks, big
  // expressive eyes that squint when laughing, mouth that opens
  // hysterically wide at high tickle levels.
  const sloppy = {
    x: 0, y: 0,             // centre position (set in resize-aware boot)
    baseScale: 1,           // baseline render scale (set on resize)
    bobPhase: 0,            // gentle idle bob
    wobbleX: 1, wobbleY: 1, // squish-axis stretch (eased back to 1)
    wiggle: 0,              // wiggle intensity 0..1.5
    wigglePhase: 0,
    tickleLevel: 0,         // 0..100 (the meter)
    lastTickleAt: -1e9,
    flashUntil: 0,
    blinkT: 2,              // seconds until next blink
    headphoneFlash: 0,      // 0..1, flashes the LED pulses
    armSwing: 0,
    leanX: 0, leanY: 0      // displacement from tickle kicks
  };

  // ── Sparks + floating laugh text ──
  const sparks = [];
  const laughs = [];
  const LAUGH_TEXT = [
    'HAHAHA!', 'AHAHAHAH', 'AAAA!', 'STOOOP', 'NO PLS', 'HAHA',
    'sloppyHype', 'EEEH', 'TEEHEE', '✨', 'HEHEHE', 'CANT BREATHE',
    'STOP IT', 'HAHAAA', 'XD', '!!!'
  ];

  function emitSparks(x, y, count){
    const colours = ['#ff2bd6', '#5ce6ff', '#a5ff52', '#ffd454', '#c44dff', '#ff8a3a'];
    for (let i = 0; i < count; i++){
      const a = Math.random() * Math.PI * 2;
      const sp = 140 + Math.random() * 240;
      sparks.push({
        x, y,
        vx: Math.cos(a) * sp,
        vy: Math.sin(a) * sp - (Math.random() * 70 + 20),
        life: 0,
        maxLife: 0.4 + Math.random() * 0.55,
        r: 1.4 + Math.random() * 2.4,
        c: colours[(Math.random() * colours.length) | 0]
      });
    }
    // Star rays
    for (let i = 0; i < 4; i++){
      const a = i * Math.PI / 2 + Math.random() * 0.4;
      sparks.push({
        x, y, vx: Math.cos(a) * 300, vy: Math.sin(a) * 300,
        life: 0, maxLife: 0.4, r: 2.6, c: '#ffd454', ray: true
      });
    }
  }
  function emitLaugh(x, y, intensity){
    const text = LAUGH_TEXT[(Math.random() * LAUGH_TEXT.length) | 0];
    laughs.push({
      x, y, vx: (Math.random() - 0.5) * 60,
      vy: -80 - Math.random() * 80,
      text,
      life: 0, maxLife: 1.0 + Math.random() * 0.4,
      size: 18 + intensity * 14 + Math.random() * 6,
      angle: (Math.random() - 0.5) * 0.35
    });
  }

  // ── Audio ──
  let actx = null;
  let muted = false;
  function ensureAudio(){
    if (actx) return actx;
    try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(_){}
    return actx;
  }
  // Single "ha" syllable — short bandpass-filtered noise burst with a
  // dropping sine for the vowel formant. Stacked at different pitches +
  // micro-delays makes "HAHAHA".
  function ha(pitch, when, vol){
    if (muted) return;
    if (!actx) return;
    const t = (when != null ? when : actx.currentTime);
    // Voiced "ah" — falling sine
    const o = actx.createOscillator();
    const og = actx.createGain();
    o.type = 'triangle';
    o.frequency.setValueAtTime(pitch * 1.1, t);
    o.frequency.exponentialRampToValueAtTime(pitch * 0.85, t + 0.10);
    og.gain.setValueAtTime(0, t);
    og.gain.linearRampToValueAtTime(0.16 * (vol || 1), t + 0.012);
    og.gain.exponentialRampToValueAtTime(0.0001, t + 0.13);
    o.connect(og); og.connect(actx.destination);
    o.start(t); o.stop(t + 0.16);
    // Plus an aspirated "h" — short noise burst, bandpassed
    const buf = actx.createBuffer(1, Math.floor(actx.sampleRate * 0.05), actx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random() * 2 - 1) * (1 - i/d.length);
    const ns = actx.createBufferSource();
    ns.buffer = buf;
    const nf = actx.createBiquadFilter();
    nf.type = 'bandpass'; nf.frequency.value = pitch * 2.2; nf.Q.value = 1.8;
    const ng = actx.createGain();
    ng.gain.setValueAtTime(0.07 * (vol || 1), t);
    ng.gain.exponentialRampToValueAtTime(0.0001, t + 0.04);
    ns.connect(nf); nf.connect(ng); ng.connect(actx.destination);
    ns.start(t);
  }
  function hahaha(level){
    ensureAudio(); if (!actx) return;
    if (actx.state === 'suspended') actx.resume();
    if (muted) return;
    const t = actx.currentTime;
    // 3-5 "ha"s — count + pitch scales with tickle level
    const count = Math.min(5, 2 + Math.floor(level / 25));
    const base = 320 + Math.random() * 60;
    for (let i = 0; i < count; i++){
      const drop = Math.pow(0.92, i);
      ha(base * drop, t + i * 0.085, 0.7 + level * 0.005);
    }
  }
  function megaLaugh(){
    ensureAudio(); if (!actx) return;
    if (actx.state === 'suspended') actx.resume();
    if (muted) return;
    const t = actx.currentTime;
    // 8 rapid "ha"s for the hysteria moment
    const base = 360;
    for (let i = 0; i < 8; i++){
      ha(base * (1 - i * 0.04), t + i * 0.07, 1.2);
    }
    // Plus a low rumble underneath
    const lo = actx.createOscillator();
    const lg = actx.createGain();
    lo.type = 'sawtooth';
    lo.frequency.value = 70;
    lg.gain.setValueAtTime(0, t);
    lg.gain.linearRampToValueAtTime(0.08, t + 0.05);
    lg.gain.exponentialRampToValueAtTime(0.0001, t + 0.8);
    lo.connect(lg); lg.connect(actx.destination);
    lo.start(t); lo.stop(t + 0.9);
  }

  // ── Feather + pointer ──
  const feath = {
    x: 0, y: 0, tx: 0, ty: 0, px: 0, py: 0, vx: 0, vy: 0,
    angle: 0, visible: false
  };
  function setPointer(clientX, clientY){
    const r = stage.getBoundingClientRect();
    feath.tx = clientX - r.left;
    feath.ty = clientY - r.top;
    feath.visible = true;
    document.getElementById('hint').classList.add('hidden');
  }
  window.addEventListener('pointermove', e => setPointer(e.clientX, e.clientY));
  window.addEventListener('pointerdown', e => setPointer(e.clientX, e.clientY));
  window.addEventListener('pointerleave', () => { feath.visible = false; });

  // ── Combo + counters ──
  let state = {
    tickles: 0,
    combo: 1,
    comboDecay: 0,
    hystericalUntil: 0
  };

  function updateHud(){
    document.getElementById('hudTickles').textContent = state.tickles;
    document.getElementById('hudCombo').textContent = '×' + Math.floor(state.combo) + (state.combo > 1.2 ? '+' : '');
    const pct = Math.round(sloppy.tickleLevel);
    document.getElementById('meterPct').textContent = pct + '%';
    document.getElementById('meterFill').style.width = pct + '%';
    document.getElementById('meter').classList.toggle('crit', pct >= 80);
  }

  // ── Hysteria explosion ──
  function triggerHysteria(){
    state.hystericalUntil = performance.now() + 2200;
    document.body.classList.add('hysterical');
    setTimeout(() => document.body.classList.remove('hysterical'), 380);
    // Emit a wall of sparks
    for (let i = 0; i < 80; i++){
      const a = Math.random() * Math.PI * 2;
      const r = sloppy.baseScale * (50 + Math.random() * 80);
      emitSparks(sloppy.x + Math.cos(a) * r, sloppy.y + Math.sin(a) * r, 4);
    }
    for (let i = 0; i < 16; i++){
      emitLaugh(
        sloppy.x + (Math.random() - 0.5) * 200,
        sloppy.y + (Math.random() - 0.5) * 120,
        1.4
      );
    }
    sloppy.wiggle = 1.5;
    sloppy.wobbleX = 0.6; sloppy.wobbleY = 1.4;
    sloppy.headphoneFlash = 1;
    megaLaugh();
    state.combo = Math.min(9, state.combo + 3);
    state.comboDecay = 3;
    state.tickles += 25;
    updateHud();
  }

  // ── Update / collision ──
  let last = 0;
  function tick(now){
    requestAnimationFrame(tick);
    const dt = Math.min(0.05, (now - last) / 1000 || 0);
    last = now;

    // Feather follow
    feath.px = feath.x; feath.py = feath.y;
    const lerp = 1 - Math.pow(0.001, dt);
    feath.x += (feath.tx - feath.x) * lerp;
    feath.y += (feath.ty - feath.y) * lerp;
    feath.vx = (feath.x - feath.px) / Math.max(dt, 0.001);
    feath.vy = (feath.y - feath.py) / Math.max(dt, 0.001);
    feath.angle = Math.atan2(feath.vy, feath.vx);
    const speed = Math.hypot(feath.vx, feath.vy);

    // Idle bob
    sloppy.bobPhase += dt * 1.4;
    sloppy.wigglePhase += dt * (8 + sloppy.wiggle * 18);
    sloppy.wiggle *= Math.pow(0.18, dt);
    sloppy.wobbleX += (1 - sloppy.wobbleX) * 8 * dt;
    sloppy.wobbleY += (1 - sloppy.wobbleY) * 8 * dt;
    sloppy.leanX *= Math.pow(0.05, dt);
    sloppy.leanY *= Math.pow(0.05, dt);
    sloppy.headphoneFlash *= Math.pow(0.05, dt);
    sloppy.armSwing = Math.sin(sloppy.bobPhase * 1.6) * (0.5 + sloppy.wiggle * 1.5);
    sloppy.blinkT -= dt;
    if (sloppy.blinkT < 0) sloppy.blinkT = 3 + Math.random() * 3;

    // Tickle level decay
    if (sloppy.tickleLevel > 0){
      sloppy.tickleLevel = Math.max(0, sloppy.tickleLevel - dt * 18);
    }

    // Hit test — feather path vs Sloppy ellipse (the body bounding shape)
    if (feath.visible && speed > 25){
      const bodyR = sloppy.baseScale * 78;
      const bodyRy = sloppy.baseScale * 80;
      const hit = ellipseHit(feath.px, feath.py, feath.x, feath.y, sloppy.x, sloppy.y + sloppy.baseScale * 12, bodyR, bodyRy);
      if (hit && now - sloppy.lastTickleAt > 110){
        sloppy.lastTickleAt = now;
        // Build the tickle meter
        sloppy.tickleLevel = Math.min(100, sloppy.tickleLevel + 6 + speed * 0.012);
        sloppy.wiggle = Math.min(1.5, sloppy.wiggle + 0.55);
        sloppy.wobbleX = 0.78;
        sloppy.wobbleY = 1.22;
        sloppy.flashUntil = now + 200;
        sloppy.headphoneFlash = 1;
        // Knock direction
        const dx = sloppy.x - feath.x, dy = sloppy.y - feath.y;
        const d = Math.hypot(dx, dy) || 1;
        sloppy.leanX += (dx / d) * 10;
        sloppy.leanY += (dy / d) * 8;

        state.tickles++;
        state.combo = Math.min(9, state.combo + 0.25);
        state.comboDecay = 1.6;
        emitSparks(feath.x, feath.y, 12 + Math.floor(speed * 0.06));
        emitLaugh(
          sloppy.x + (Math.random() - 0.5) * sloppy.baseScale * 80,
          sloppy.y - sloppy.baseScale * 50,
          sloppy.tickleLevel / 100
        );
        hahaha(sloppy.tickleLevel);
        updateHud();
        if (sloppy.tickleLevel >= 99 && now > state.hystericalUntil){
          triggerHysteria();
        }
      }
    }

    // Combo decay
    if (state.comboDecay > 0){
      state.comboDecay -= dt;
    } else if (state.combo > 1){
      state.combo = Math.max(1, state.combo - dt * 1.4);
      updateHud();
    }

    // Sparks
    for (let i = sparks.length - 1; i >= 0; i--){
      const s = sparks[i];
      s.life += dt;
      if (s.life >= s.maxLife){ sparks.splice(i, 1); continue; }
      s.x += s.vx * dt;
      s.y += s.vy * dt;
      s.vy += 340 * dt;
      s.vx *= Math.pow(0.4, dt);
    }
    // Laugh text
    for (let i = laughs.length - 1; i >= 0; i--){
      const g = laughs[i];
      g.life += dt;
      if (g.life >= g.maxLife){ laughs.splice(i, 1); continue; }
      g.x += g.vx * dt;
      g.y += g.vy * dt;
      g.vy += 70 * dt;
    }

    render(now);
  }

  function ellipseHit(x1, y1, x2, y2, cx, cy, rx, ry){
    // Quick test: sample 4 points along the segment, see if any falls
    // inside the ellipse. Good enough for soft tickle detection.
    for (let t = 0; t <= 1.001; t += 0.25){
      const px = x1 + (x2 - x1) * t;
      const py = y1 + (y2 - y1) * t;
      const nx = (px - cx) / rx;
      const ny = (py - cy) / ry;
      if (nx * nx + ny * ny <= 1) return true;
    }
    return false;
  }

  // ── Render ──
  function render(now){
    // Trail fade
    sctx.fillStyle = 'rgba(6,3,26,0.32)';
    sctx.fillRect(0, 0, W, H);

    drawSloppy(now);

    // Sparks with additive blending
    sctx.globalCompositeOperation = 'lighter';
    for (const s of sparks){
      const k = 1 - (s.life / s.maxLife);
      sctx.globalAlpha = k * (s.ray ? 0.7 : 0.95);
      sctx.fillStyle = s.c;
      sctx.strokeStyle = s.c;
      sctx.shadowColor = s.c;
      sctx.shadowBlur = 14;
      if (s.ray){
        sctx.lineWidth = s.r;
        sctx.beginPath();
        sctx.moveTo(s.x, s.y);
        sctx.lineTo(s.x - s.vx * 0.05, s.y - s.vy * 0.05);
        sctx.stroke();
      } else {
        sctx.beginPath();
        sctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        sctx.fill();
      }
    }
    sctx.shadowBlur = 0;
    sctx.globalAlpha = 1;
    sctx.globalCompositeOperation = 'source-over';

    // Laugh text (over Sloppy)
    for (const g of laughs){
      const k = 1 - (g.life / g.maxLife);
      sctx.save();
      sctx.translate(g.x, g.y);
      sctx.rotate(g.angle);
      sctx.globalAlpha = k;
      sctx.shadowColor = '#ff2bd6';
      sctx.shadowBlur = 14;
      sctx.fillStyle = '#ff2bd6';
      sctx.strokeStyle = '#ffffff';
      sctx.lineWidth = 3;
      sctx.font = '900 ' + g.size + 'px "Fredoka", "Audiowide", sans-serif';
      sctx.textAlign = 'center';
      sctx.strokeText(g.text, 0, 0);
      sctx.fillText(g.text, 0, 0);
      sctx.restore();
    }
    sctx.shadowBlur = 0;
    sctx.globalAlpha = 1;

    // Feather (separate canvas, cleared each frame)
    fctx.clearRect(0, 0, W, H);
    if (feath.visible) drawFeather(feath.x, feath.y, feath.angle);
  }

  // ── Draw Sloppy ─────────────────────────────────────────────────────────
  // Modelled after the official sloppy-sim mascot: purple teardrop body
  // with radial gradient, big over-ear headphones with band, glowing
  // amber antenna, blush cheeks, big expressive eyes, mouth that opens
  // hysterically wide when tickled.
  function drawSloppy(now){
    const s = sloppy.baseScale;
    const bob = Math.sin(sloppy.bobPhase) * 4;
    const tx = sloppy.x + sloppy.leanX + Math.sin(sloppy.wigglePhase) * 4 * sloppy.wiggle;
    const ty = sloppy.y + bob + sloppy.leanY + Math.cos(sloppy.wigglePhase * 1.3) * 2 * sloppy.wiggle;
    const wx = sloppy.wobbleX * (1 + Math.sin(sloppy.wigglePhase) * 0.05 * sloppy.wiggle);
    const wy = sloppy.wobbleY * (1 + Math.cos(sloppy.wigglePhase * 1.1) * 0.04 * sloppy.wiggle);
    const flashing = now < sloppy.flashUntil;
    const tickle = sloppy.tickleLevel / 100;

    sctx.save();
    sctx.translate(tx, ty);
    sctx.scale(s, s);

    // Background aura (soft purple glow)
    const aura = sctx.createRadialGradient(0, 16, 20, 0, 16, 130);
    aura.addColorStop(0, 'rgba(177,74,255,0.42)');
    aura.addColorStop(1, 'rgba(177,74,255,0)');
    sctx.fillStyle = aura;
    sctx.beginPath();
    sctx.arc(0, 16, 130, 0, Math.PI * 2);
    sctx.fill();

    // ─── ARMS (drawn behind body) ───
    drawArm(-72, 70, -1, sloppy.armSwing * 0.7);
    drawArm( 72, 70,  1, -sloppy.armSwing * 0.7);

    // ─── BODY (tear shape) ───
    sctx.save();
    sctx.scale(wx, wy);
    // Outline glow on hit
    if (flashing){
      sctx.shadowColor = '#ff2bd6';
      sctx.shadowBlur = 28;
    }
    const bodyGrad = sctx.createRadialGradient(-20, -10, 10, 0, 30, 90);
    bodyGrad.addColorStop(0, '#d6a0ff');
    bodyGrad.addColorStop(0.55, '#a557e8');
    bodyGrad.addColorStop(1, '#5a1ea0');
    sctx.fillStyle = bodyGrad;
    sctx.strokeStyle = '#3d0d72';
    sctx.lineWidth = 2.4;
    sctx.beginPath();
    // Tear-shaped body (modelled after sloppy-sim path)
    sctx.moveTo(0, -60);
    sctx.bezierCurveTo(50, -60, 75, -20, 70, 18);
    sctx.bezierCurveTo(65, 56, 30, 80, 0, 80);
    sctx.bezierCurveTo(-30, 80, -65, 56, -70, 18);
    sctx.bezierCurveTo(-75, -20, -50, -60, 0, -60);
    sctx.closePath();
    sctx.fill();
    sctx.stroke();
    sctx.shadowBlur = 0;
    sctx.restore();

    // ─── HEADPHONE BAND ───
    sctx.strokeStyle = '#1a1a24';
    sctx.lineWidth = 7;
    sctx.lineCap = 'round';
    sctx.beginPath();
    sctx.moveTo(-62, -8);
    sctx.bezierCurveTo(-62, -50, 62, -50, 62, -8);
    sctx.stroke();
    // Band highlight
    sctx.strokeStyle = '#5a5a66';
    sctx.lineWidth = 1.5;
    sctx.globalAlpha = 0.6;
    sctx.beginPath();
    sctx.moveTo(-48, -16);
    sctx.bezierCurveTo(-48, -36, 48, -36, 48, -16);
    sctx.stroke();
    sctx.globalAlpha = 1;

    // ─── EAR CUSHIONS + LEDs ───
    drawEarcan(-62, 6, -1);
    drawEarcan( 62, 6,  1);

    // ─── ANTENNA ───
    sctx.strokeStyle = '#7a3acc';
    sctx.lineWidth = 2.6;
    sctx.lineCap = 'round';
    sctx.beginPath();
    sctx.moveTo(0, -60);
    // Antenna wobbles harder when laughing
    const antX = Math.sin(now / 80) * 6 * sloppy.wiggle;
    sctx.lineTo(antX, -82);
    sctx.stroke();
    // Glowing tip
    const tipPulse = 1 + Math.sin(now / 300) * 0.18;
    sctx.shadowColor = '#ffb259';
    sctx.shadowBlur = 18 * tipPulse;
    sctx.fillStyle = '#ffb259';
    sctx.beginPath();
    sctx.arc(antX, -86, 5.5 * tipPulse, 0, Math.PI * 2);
    sctx.fill();
    sctx.shadowBlur = 0;

    // ─── FACE ───
    drawFace(now, tickle, flashing);

    // ─── BLUSH CHEEKS ───
    // Cheeks get redder + larger when laughing
    const blushA = 0.25 + tickle * 0.55;
    const blushR = 7 + tickle * 5;
    sctx.fillStyle = `rgba(255,143,192,${blushA})`;
    sctx.beginPath();
    sctx.ellipse(-30, 22, blushR, blushR * 0.65, 0, 0, Math.PI * 2);
    sctx.fill();
    sctx.beginPath();
    sctx.ellipse(30, 22, blushR, blushR * 0.65, 0, 0, Math.PI * 2);
    sctx.fill();

    sctx.restore();
  }

  function drawArm(baseX, baseY, side, swing){
    sctx.save();
    sctx.translate(baseX, baseY);
    sctx.rotate(swing * side);
    sctx.strokeStyle = '#3d0d72';
    sctx.lineWidth = 2;
    sctx.fillStyle = '#a557e8';
    sctx.beginPath();
    sctx.ellipse(side * 8, 10, 8, 16, side * 0.3, 0, Math.PI * 2);
    sctx.fill();
    sctx.stroke();
    // Little hand
    sctx.fillStyle = '#d6a0ff';
    sctx.beginPath();
    sctx.arc(side * 14, 22, 6, 0, Math.PI * 2);
    sctx.fill();
    sctx.stroke();
    sctx.restore();
  }

  function drawEarcan(cx, cy, side){
    // Outer dark cushion
    sctx.fillStyle = '#0e0e16';
    sctx.strokeStyle = '#08080c';
    sctx.lineWidth = 1.5;
    sctx.beginPath();
    sctx.ellipse(cx, cy, 22, 26, 0, 0, Math.PI * 2);
    sctx.fill();
    sctx.stroke();
    // Inner cushion highlight
    const cush = sctx.createRadialGradient(cx - 6, cy - 8, 4, cx, cy, 22);
    cush.addColorStop(0, '#5a5a66');
    cush.addColorStop(0.65, '#2a2a34');
    cush.addColorStop(1, '#0e0e16');
    sctx.fillStyle = cush;
    sctx.beginPath();
    sctx.ellipse(cx, cy, 17, 21, 0, 0, Math.PI * 2);
    sctx.fill();
    // LED dots (magenta + cyan, flash when tickled)
    const flash = 0.6 + sloppy.headphoneFlash * 0.4;
    sctx.shadowColor = '#ff2bd6';
    sctx.shadowBlur = 8 * flash;
    sctx.fillStyle = '#ff2bd6';
    sctx.beginPath();
    sctx.arc(cx - 4, cy - 3, 2.4 * flash, 0, Math.PI * 2);
    sctx.fill();
    sctx.shadowColor = '#5ce6ff';
    sctx.fillStyle = '#5ce6ff';
    sctx.beginPath();
    sctx.arc(cx + 4, cy + 4, 2 * flash, 0, Math.PI * 2);
    sctx.fill();
    sctx.shadowBlur = 0;
  }

  function drawFace(now, tickle, flashing){
    // EYES — open when calm, squint-shut + tear-stream when laughing hard
    const blink = sloppy.blinkT < 0.12;
    const squint = tickle * 0.92;
    sctx.save();
    sctx.translate(0, -8);
    // Left eye
    drawEye(-18, 0, blink, squint);
    drawEye( 18, 0, blink, squint);
    // Tears at high tickle
    if (tickle > 0.55){
      const tearA = (tickle - 0.55) * 2;
      sctx.fillStyle = `rgba(140,210,255,${tearA})`;
      // Left tear
      sctx.beginPath();
      sctx.ellipse(-16, 8 + Math.sin(now / 130) * 1.5, 2.4, 4.6, 0, 0, Math.PI * 2);
      sctx.fill();
      // Right tear
      sctx.beginPath();
      sctx.ellipse(16, 8 + Math.cos(now / 130) * 1.5, 2.4, 4.6, 0, 0, Math.PI * 2);
      sctx.fill();
    }
    sctx.restore();

    // MOUTH — closed grin → small "o" → wide laughing mouth with teeth
    const mouthOpen = Math.min(1, tickle * 1.1);
    sctx.save();
    sctx.translate(0, 32);
    if (mouthOpen < 0.15){
      // Calm grin
      sctx.strokeStyle = '#3d0d72';
      sctx.lineWidth = 2.6;
      sctx.lineCap = 'round';
      sctx.beginPath();
      sctx.arc(0, -2, 12, 0.18 * Math.PI, 0.82 * Math.PI);
      sctx.stroke();
    } else {
      // Open laughing mouth — width and height swell with mouthOpen
      const mw = 14 + mouthOpen * 18;
      const mh = 8 + mouthOpen * 22 + Math.sin(now / 80) * 2 * mouthOpen;
      sctx.fillStyle = '#1a0426';
      sctx.strokeStyle = '#3d0d72';
      sctx.lineWidth = 2.6;
      sctx.beginPath();
      sctx.ellipse(0, 4, mw, mh, 0, 0, Math.PI * 2);
      sctx.fill();
      sctx.stroke();
      // Tongue at top of throat
      sctx.fillStyle = '#ff5fa8';
      sctx.beginPath();
      sctx.ellipse(0, mh * 0.35, mw * 0.55, mh * 0.45, 0, 0, Math.PI);
      sctx.fill();
      // Top teeth (4 small white blocks) at high tickle
      if (mouthOpen > 0.5){
        sctx.fillStyle = '#fff7e6';
        const teethW = mw * 0.4;
        for (let i = 0; i < 4; i++){
          const tx = -teethW + (i / 3) * teethW * 2;
          sctx.fillRect(tx - 2, -mh + 2, 4, 4);
        }
      }
    }
    sctx.restore();
  }
  function drawEye(cx, cy, blink, squint){
    sctx.save();
    sctx.translate(cx, cy);
    if (blink || squint > 0.7){
      // Squint to slits
      sctx.strokeStyle = '#1a0426';
      sctx.lineWidth = 2.5;
      sctx.lineCap = 'round';
      sctx.beginPath();
      sctx.arc(0, 1, 6, Math.PI * 0.1, Math.PI * 0.9, true);
      sctx.stroke();
    } else {
      const sclera = 1 - squint * 0.6;
      sctx.fillStyle = '#ffffff';
      sctx.beginPath();
      sctx.ellipse(0, 0, 7, 7 * sclera, 0, 0, Math.PI * 2);
      sctx.fill();
      // Pupil
      sctx.fillStyle = '#1a0426';
      sctx.beginPath();
      sctx.arc(0, 0, 3.4, 0, Math.PI * 2);
      sctx.fill();
      // Shine
      sctx.fillStyle = '#ffffff';
      sctx.beginPath();
      sctx.arc(-1.4, -1.4, 1.2, 0, Math.PI * 2);
      sctx.fill();
    }
    sctx.restore();
  }

  // ── Feather drawing (lifted from tickle-feather, slightly tuned) ──
  function drawFeather(x, y, angle){
    fctx.save();
    fctx.translate(x, y);
    fctx.rotate(angle + Math.PI / 2 + Math.sin(performance.now() / 200) * 0.1);
    fctx.strokeStyle = '#a5ff52';
    fctx.shadowColor = '#a5ff52';
    fctx.shadowBlur = 12;
    fctx.lineWidth = 2.5;
    fctx.lineCap = 'round';
    fctx.beginPath();
    fctx.moveTo(0, -38);
    fctx.quadraticCurveTo(2, 0, 0, 36);
    fctx.stroke();
    fctx.fillStyle = 'rgba(165,255,82,0.18)';
    fctx.strokeStyle = '#5ce6ff';
    fctx.shadowColor = '#5ce6ff';
    fctx.shadowBlur = 10;
    fctx.lineWidth = 1.4;
    for (let side = -1; side <= 1; side += 2){
      fctx.beginPath();
      fctx.moveTo(0, -38);
      for (let i = 1; i <= 14; i++){
        const t = i / 14;
        const y0 = -38 + t * 70;
        const w = Math.sin(t * Math.PI) * 18;
        const wob = Math.sin(performance.now()/250 + t * 4) * 1.5;
        fctx.lineTo(side * (w + wob), y0);
      }
      fctx.lineTo(0, 36);
      fctx.closePath();
      fctx.fill();
      fctx.stroke();
    }
    fctx.shadowBlur = 18;
    fctx.fillStyle = '#ff2bd6';
    fctx.shadowColor = '#ff2bd6';
    fctx.beginPath();
    fctx.arc(0, -40, 4, 0, Math.PI * 2);
    fctx.fill();
    fctx.restore();
  }

  // ── Boot + controls ──
  function recenterSloppy(){
    sloppy.x = W / 2;
    sloppy.y = H * 0.55;
    sloppy.baseScale = Math.min(W, H) / 380;
  }
  window.addEventListener('resize', () => { recenterSloppy(); });

  document.getElementById('hystericBtn').addEventListener('click', () => {
    sloppy.tickleLevel = 100;
    triggerHysteria();
  });
  document.getElementById('calmBtn').addEventListener('click', () => {
    sloppy.tickleLevel = 0;
    sloppy.wiggle = 0;
    sloppy.wobbleX = 1; sloppy.wobbleY = 1;
    state.combo = 1;
    updateHud();
  });
  document.getElementById('muteBtn').addEventListener('click', e => {
    muted = !muted;
    e.currentTarget.setAttribute('aria-pressed', muted ? 'true' : 'false');
    e.currentTarget.textContent = muted ? '🔇 muted' : '🔊 sound';
  });
  document.addEventListener('keydown', e => {
    if (e.key === 'm' || e.key === 'M') document.getElementById('muteBtn').click();
    else if (e.key === ' '){ e.preventDefault(); document.getElementById('hystericBtn').click(); }
    else if (e.key === 'c' || e.key === 'C') document.getElementById('calmBtn').click();
  });

  resize();
  recenterSloppy();
  feath.x = feath.tx = W / 2;
  feath.y = feath.ty = H / 2;
  requestAnimationFrame(tick);
  updateHud();
})();
</script>
</body>
</html>
