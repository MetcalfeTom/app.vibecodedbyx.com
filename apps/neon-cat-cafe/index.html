<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Neon Cat Cafe</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0218">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%90%88%E2%80%8D%E2%AC%9B">
<meta name="description" content="A top-down pixel cat cafe. Pet glowing neon cats to earn purr-points. Hit milestones to unlock new fur colors and a rare rainbow cat.">
<meta property="og:title" content="Neon Cat Cafe">
<meta property="og:description" content="A top-down pixel cat cafe. Pet glowing neon cats to earn purr-points. Hit milestones to unlock new fur colors and a rare rainbow cat.">
<meta property="og:url" content="https://sloppy.live/neon-cat-cafe">
<meta property="og:image" content="https://image.pollinations.ai/prompt/top-down%20pixel%20art%20cat%20cafe%20with%20glowing%20neon%20cats%2C%20pink%20cyan%20yellow%2C%20synthwave%20arcade%2C%20cozy%20cafe%20with%20tables%20chairs%20cat%20bed?width=1200&height=630&model=flux&seed=3737&nologo=true">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Bowlby+One+SC&family=Press+Start+2P&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#0a0218;
    --void-2:#1c0840;
    --cyan:#5ce6ff;
    --magenta:#ff2bd6;
    --pink:#ff6ec0;
    --gold:#ffd454;
    --lime:#a5ff52;
    --jade:#3affb0;
    --violet:#9b5bff;
    --orange:#ff8a3a;
    --coral:#ff7a8a;
    --ink:#f4f0ff;
    --silver:#a3a8c2;
    --silver-dim:#5e637a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  html,body{height:100%;overflow:hidden;background:var(--void);color:var(--ink);font-family:'Share Tech Mono', monospace;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:manipulation}
  body{
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(255,110,192,0.18), transparent 60%),
      radial-gradient(ellipse 70% 40% at 50% 100%, rgba(92,230,255,0.12), transparent 70%),
      var(--void);
    display:flex;flex-direction:column;align-items:center;
  }
  header{text-align:center;padding:0.6rem 1rem 0.2rem;position:relative;z-index:3;pointer-events:none;width:100%}
  h1{
    font-family:'Bowlby One SC', sans-serif;
    font-size:clamp(1.6rem, 4.4vw, 2.6rem);letter-spacing:0.04em;
    background:linear-gradient(180deg, var(--pink), var(--magenta) 55%, var(--gold));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 12px rgba(255,43,214,0.4));line-height:1;text-transform:uppercase;
  }
  .tag{font-family:'Press Start 2P', monospace;font-size:clamp(0.5rem, 1vw, 0.65rem);letter-spacing:0.16em;color:var(--silver);margin-top:0.3rem}
  main{
    flex:1;display:flex;align-items:center;justify-content:center;
    width:100%;padding:0.3rem 0.4rem 6rem;position:relative;
  }
  canvas#cafe{
    display:block;background:#040112;
    border:2px solid rgba(255,43,214,0.32);border-radius:0.3rem;
    box-shadow:0 0 30px rgba(255,43,214,0.30), inset 0 0 22px rgba(0,0,0,0.6);
    max-width:100%;
    image-rendering:pixelated;
    image-rendering:crisp-edges;
    cursor:pointer;
  }

  .hud-top{
    position:fixed;top:3.4rem;left:0.6rem;right:0.6rem;
    display:flex;justify-content:space-between;align-items:flex-start;gap:0.6rem;
    z-index:5;pointer-events:none;font-family:'Share Tech Mono', monospace;
  }
  .hud-top .card{
    background:rgba(10,2,24,0.86);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(255,110,192,0.42);
    padding:0.45rem 0.85rem;border-radius:0.4rem;
    display:flex;flex-direction:column;gap:0.18rem;
    box-shadow:0 0 14px rgba(255,110,192,0.20);min-width:5rem;
    text-align:center;
  }
  .hud-top .label{font-size:0.55rem;letter-spacing:0.22em;color:var(--silver);text-transform:uppercase}
  .hud-top .val{font-family:'Bowlby One SC', sans-serif;font-size:1.25rem;color:var(--pink);letter-spacing:0.02em;line-height:1}
  .hud-top .card.cats .val{color:var(--cyan)}
  .hud-top .card.pets .val{color:var(--lime)}
  .hud-top .card.points{border-color:var(--gold);box-shadow:0 0 16px rgba(255,212,84,0.30)}
  .hud-top .card.points .val{color:var(--gold)}
  .hud-top .card .unit{font-size:0.6rem;color:var(--silver-dim);margin-left:0.18rem}

  /* Floating purr text */
  .floater{
    position:fixed;pointer-events:none;z-index:7;
    font-family:'Bowlby One SC', sans-serif;font-size:0.95rem;color:var(--pink);
    text-shadow:0 0 8px var(--pink), 0 0 16px rgba(255,110,192,0.5);
    animation:floatUp 1.4s ease-out forwards;
    letter-spacing:0.04em;
  }
  @keyframes floatUp{
    0%{opacity:0;transform:translate(-50%, 0) scale(0.6)}
    20%{opacity:1;transform:translate(-50%, -10px) scale(1.1)}
    100%{opacity:0;transform:translate(-50%, -60px) scale(1)}
  }
  .floater.legendary{color:var(--gold);text-shadow:0 0 10px var(--gold), 0 0 22px rgba(255,212,84,0.6);font-size:1.2rem}

  /* Bottom strip */
  .bottom-strip{
    position:fixed;bottom:0.8rem;left:50%;transform:translateX(-50%);
    display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;justify-content:center;
    background:rgba(10,2,24,0.86);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(255,43,214,0.32);
    padding:0.55rem 0.85rem;border-radius:0.4rem;
    z-index:5;font-size:0.62rem;letter-spacing:0.14em;text-transform:uppercase;color:var(--silver);
    max-width:calc(100% - 1rem);
    font-family:'Share Tech Mono', monospace;
  }
  .bottom-strip .quote{
    font-family:'Press Start 2P', monospace;font-size:0.62rem;color:var(--cyan);letter-spacing:0.08em;
    max-width:22rem;
    text-shadow:0 0 6px var(--cyan);text-transform:none;
  }
  .bottom-strip button{
    background:transparent;color:var(--gold);border:1px solid var(--gold);
    font-family:'Audiowide', monospace;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;
    padding:0.4rem 0.6rem;border-radius:0.22rem;cursor:pointer;min-height:2.5rem;
  }
  .bottom-strip button:hover{background:rgba(255,212,84,0.14)}
  .bottom-strip button:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
  .bottom-strip button.treat{color:var(--coral);border-color:var(--coral)}
  .bottom-strip button.treat:hover{background:rgba(255,122,138,0.14)}
  .bottom-strip button:disabled{opacity:0.45;cursor:not-allowed}

  /* Unlock banner */
  .unlock-banner{
    position:fixed;left:50%;top:38%;transform:translate(-50%, -50%);
    font-family:'Bowlby One SC', sans-serif;
    font-size:clamp(1.4rem, 4.4vw, 2.4rem);letter-spacing:0.04em;
    color:var(--gold);text-shadow:0 0 18px var(--gold), 0 0 36px rgba(255,212,84,0.6);
    pointer-events:none;z-index:9;opacity:0;text-align:center;
    text-transform:uppercase;
  }
  .unlock-banner.show{opacity:1;animation:unlockPop 2s cubic-bezier(0.34, 1.56, 0.64, 1)}
  @keyframes unlockPop{
    0%{opacity:0;transform:translate(-50%, -50%) scale(0.4)}
    15%{opacity:1;transform:translate(-50%, -50%) scale(1.15)}
    70%{transform:translate(-50%, -50%) scale(1)}
    100%{opacity:0;transform:translate(-50%, -50%) scale(1)}
  }

  @media (max-width: 540px){
    .hud-top{top:2.7rem;gap:0.35rem}
    .hud-top .card{padding:0.3rem 0.55rem;min-width:3.8rem}
    .hud-top .val{font-size:0.95rem}
    .bottom-strip{font-size:0.55rem;padding:0.4rem 0.55rem}
    .bottom-strip .quote{font-size:0.55rem;max-width:11rem}
  }
  @media (prefers-reduced-motion: reduce){
    .floater{animation-duration:0.6s}
    .unlock-banner.show{animation:none;opacity:1}
  }
</style>
</head>
<body>
  <header>
    <h1>NEON CAT CAFE</h1>
    <div class="tag">PET TO PURR · COLLECT FLOOFS</div>
  </header>

  <div class="hud-top">
    <div class="card points"><div class="label">purr-points</div><div class="val"><span id="pointsVal">0</span></div></div>
    <div class="card cats"><div class="label">cats</div><div class="val"><span id="catsVal">1</span><span class="unit">/<span id="catsMax">6</span></span></div></div>
    <div class="card pets"><div class="label">pets</div><div class="val"><span id="petsVal">0</span></div></div>
  </div>

  <main>
    <canvas id="cafe" width="672" height="432" role="application" aria-label="Top-down pixel cat cafe. Click or tap a cat to pet it and earn purr-points. New cat colors unlock as you accumulate points."></canvas>
  </main>

  <div class="unlock-banner" id="unlockBanner" aria-live="polite"></div>

  <div class="bottom-strip" role="group" aria-label="Cafe controls">
    <span class="quote" id="quote" aria-live="polite">welcome, gentle floof gardener.</span>
    <button class="treat" id="treatBtn" type="button" aria-label="Drop a treat for the cats — 10 purr-points">🐟 treat (10)</button>
    <button id="muteBtn" type="button" aria-pressed="false" aria-label="Toggle sound">♪ on</button>
  </div>

<script>
(function(){
  'use strict';

  function showError(msg){
    try {
      var t = document.getElementById('errToast');
      if (!t){
        t = document.createElement('div');
        t.id = 'errToast';
        t.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#3a0610;color:#ffb6c1;font-family:monospace;font-size:11px;padding:8px 12px;border-bottom:1px solid #ff2bd6;white-space:pre-wrap';
        document.body.appendChild(t);
      }
      t.textContent = '⚠ ' + msg;
    } catch(_){}
  }
  window.addEventListener('error', function(ev){
    showError((ev.message || 'error') + ' @ ' + (ev.filename ? ev.filename.split('/').pop() : '?') + ':' + (ev.lineno || '?'));
  });

  var prefersReducedMotion = false;
  try { prefersReducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch(_){}

  var canvas = document.getElementById('cafe');
  var ctx;
  try { ctx = canvas.getContext('2d'); } catch(e){ showError('canvas init: ' + e.message); return; }
  if (!ctx){ showError('canvas 2d unavailable'); return; }
  ctx.imageSmoothingEnabled = false;

  // ── Layout ──
  var TILE = 24;
  var COLS = 28, ROWS = 18;
  var CW = COLS * TILE, CH = ROWS * TILE;
  canvas.width = CW;
  canvas.height = CH;

  var DPR = Math.min(window.devicePixelRatio || 1, 2);
  function resize(){
    try {
      var maxW = Math.min(window.innerWidth - 12, 920);
      var maxH = Math.max(360, window.innerHeight - 220);
      var ratio = CW / CH;
      var w = Math.min(maxW, maxH * ratio);
      var h = w / ratio;
      if (h > maxH){ h = maxH; w = h * ratio; }
      canvas.style.width = Math.floor(w) + 'px';
      canvas.style.height = Math.floor(h) + 'px';
    } catch(e){ showError('resize: ' + e.message); }
  }
  resize();
  window.addEventListener('resize', resize);

  // ── Map ──
  // Tile codes:
  // . floor   # wall   T table (top)   t table (bottom)   c chair  b bed  f food  s scratch  w window  N neon sign  p plant
  var LAYOUT = [
    '############################',
    '#wwwwwww##NNNNNN##wwwwwww#',
    '#........................p#',
    '#........................p#',
    '#..Tt.....b....s.........p#',
    '#..Tt.....b..............p#',
    '#..cc....................p#',
    '#........................p#',
    '#..................f......#',
    '#..........................#',
    '#..........................#',
    '#..Tt....Tt..............p#',
    '#..Tt....Tt..............p#',
    '#..cc....cc..............p#',
    '#..........................#',
    '#..........................#',
    '#..........................#',
    '############################'
  ];
  // Build tiles
  var tiles = [];
  function tileAt(tx, ty){
    if (ty < 0 || ty >= ROWS || tx < 0 || tx >= COLS) return null;
    return tiles[ty][tx];
  }
  function isSolidTile(tx, ty){
    var t = tileAt(tx, ty);
    if (!t) return true;
    return t.solid;
  }
  function isCatBlockedTile(tx, ty){
    var t = tileAt(tx, ty);
    if (!t) return true;
    // cats can walk on chairs, beds, food bowls; blocked by walls, tables, plants, scratch, window/sign
    return t.solid && !t.catWalkable;
  }
  (function buildTiles(){
    tiles = [];
    for (var y = 0; y < ROWS; y++){
      var row = [];
      var src = LAYOUT[y] || '';
      for (var x = 0; x < COLS; x++){
        var ch = src[x] || '.';
        var t = { type: ch, solid: false, catWalkable: false, kind: 'floor' };
        if (ch === '#'){ t.solid = true; t.kind = 'wall'; }
        else if (ch === 'T'){ t.solid = true; t.kind = 'tableTop'; }
        else if (ch === 't'){ t.solid = true; t.kind = 'tableBot'; }
        else if (ch === 'c'){ t.solid = false; t.kind = 'chair'; }
        else if (ch === 'b'){ t.solid = false; t.kind = 'bed'; }
        else if (ch === 'f'){ t.solid = false; t.kind = 'food'; }
        else if (ch === 's'){ t.solid = false; t.kind = 'scratch'; }
        else if (ch === 'w'){ t.solid = true; t.kind = 'window'; }
        else if (ch === 'N'){ t.solid = true; t.kind = 'sign'; }
        else if (ch === 'p'){ t.solid = true; t.kind = 'plant'; }
        else { t.kind = 'floor'; }
        row.push(t);
      }
      tiles.push(row);
    }
  })();

  // Find walkable spawn point near entrance
  function randomFloor(){
    for (var i = 0; i < 200; i++){
      var x = 2 + Math.floor(Math.random() * (COLS - 4));
      var y = 2 + Math.floor(Math.random() * (ROWS - 4));
      if (!isCatBlockedTile(x, y)) return { x: x * TILE + TILE/2, y: y * TILE + TILE/2 };
    }
    return { x: CW / 2, y: CH / 2 };
  }

  // ── Cat data ──
  // Each entry: name, hue, accent, pattern (solid|stripes|spots|tuxedo|rainbow), pointBase, minPoints (unlock)
  var CAT_TYPES = [
    { id: 'slate',    name: 'Slate',    hue: 220, sat: 6,  light: 56, pattern: 'solid',   pointBase: 1, minPoints: 0 },
    { id: 'coral',    name: 'Coral',    hue: 350, sat: 88, light: 64, pattern: 'tuxedo',  pointBase: 1, minPoints: 10 },
    { id: 'mint',     name: 'Mint',     hue: 160, sat: 80, light: 60, pattern: 'stripes', pointBase: 1, minPoints: 30 },
    { id: 'azure',    name: 'Azure',    hue: 200, sat: 90, light: 60, pattern: 'spots',   pointBase: 2, minPoints: 80 },
    { id: 'butter',   name: 'Butter',   hue: 48,  sat: 95, light: 65, pattern: 'stripes', pointBase: 2, minPoints: 200 },
    { id: 'grape',    name: 'Grape',    hue: 285, sat: 85, light: 62, pattern: 'tuxedo',  pointBase: 3, minPoints: 500 },
    { id: 'shadow',   name: 'Shadow',   hue: 270, sat: 18, light: 18, pattern: 'solid',   pointBase: 4, minPoints: 1000, glow: true },
    { id: 'rainbow',  name: 'Rainbow',  hue: 0,   sat: 100,light: 60, pattern: 'rainbow', pointBase: 8, minPoints: 0, rare: true }
  ];

  var CAT_NAMES = ['Mochi','Pixel','Saturn','Plum','Echo','Noodle','Wisp','Lumen','Frost','Honey','Marble','Static','Velvet','Comet','Doodle','Loaf','Pretzel','Specter','Banshee','Quasar'];

  var state = {
    cats: [],
    nextCatId: 1,
    points: 0,
    pets: 0,
    rainbowSeen: false,
    spawnCD: 4.0,
    treats: [],
    particles: [],
    floaters: [],  // DOM-driven
    unlockedTypes: new Set(['slate']),
    lastBannerT: 0
  };

  // Load state
  try {
    var raw = localStorage.getItem('neon-cat-cafe-v1');
    if (raw){
      var s = JSON.parse(raw);
      if (s){
        state.points = s.points || 0;
        state.pets = s.pets || 0;
        state.rainbowSeen = !!s.rainbowSeen;
        if (Array.isArray(s.unlocked)) s.unlocked.forEach(function(id){ state.unlockedTypes.add(id); });
      }
    }
  } catch(_){}
  // Always include the typesUnlocked baseline + any user has unlocked by passing thresholds historically
  function applyUnlocks(silent){
    CAT_TYPES.forEach(function(t){
      if (t.rare) return; // rainbow is spawn-roll only
      if (state.points >= t.minPoints && !state.unlockedTypes.has(t.id)){
        state.unlockedTypes.add(t.id);
        if (!silent){
          bannerFlash('UNLOCKED · ' + t.name.toUpperCase() + ' CAT');
          spawnCat(t.id);
        }
      }
    });
  }
  applyUnlocks(true);

  function saveState(){
    try {
      localStorage.setItem('neon-cat-cafe-v1', JSON.stringify({
        points: state.points, pets: state.pets, rainbowSeen: state.rainbowSeen,
        unlocked: Array.from(state.unlockedTypes)
      }));
    } catch(_){}
  }

  // Spawn cats
  function pickType(){
    // Rainbow is 4% chance per spawn (independent)
    if (Math.random() < 0.04) return 'rainbow';
    var avail = CAT_TYPES.filter(function(t){ return !t.rare && state.unlockedTypes.has(t.id); });
    return avail[Math.floor(Math.random() * avail.length)].id;
  }
  function spawnCat(typeId){
    if (state.cats.length >= 8) return;
    var type = CAT_TYPES.find(function(t){ return t.id === (typeId || pickType()); });
    if (!type) type = CAT_TYPES[0];
    var spot = randomFloor();
    var cat = {
      id: state.nextCatId++,
      type: type,
      x: spot.x, y: spot.y,
      vx: 0, vy: 0,
      facing: 'down',
      state: 'wander',
      stateT: 0,
      walkPhase: 0,
      target: null,
      happiness: 0.7,
      lastPetT: -10,
      name: CAT_NAMES[Math.floor(Math.random() * CAT_NAMES.length)],
      blink: 0, blinkUntil: performance.now() + 1500 + Math.random() * 3000,
      hueShift: 0
    };
    state.cats.push(cat);
    if (type.id === 'rainbow'){
      bannerFlash('✦ A RAINBOW CAT APPEARED ✦', 'rainbow');
      state.rainbowSeen = true;
    }
    saveState();
  }
  // Always have at least one cat at start
  if (state.cats.length === 0) spawnCat('slate');

  // ── Particles ──
  function pushParticle(p){ state.particles.push(p); if (state.particles.length > 200) state.particles.shift(); }
  function pushHearts(x, y, n, hue){
    for (var i = 0; i < n; i++){
      var ang = -Math.PI/2 + (Math.random() - 0.5) * Math.PI * 0.8;
      var sp = 30 + Math.random() * 60;
      pushParticle({
        x: x + (Math.random() - 0.5) * 12,
        y: y - 6,
        vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp - 12,
        ttl: 0.9 + Math.random() * 0.6,
        life: 0,
        kind: 'heart',
        hue: hue,
        size: 5 + Math.random() * 3
      });
    }
  }
  function pushZ(x, y){
    state.particles.push({
      x: x, y: y - 10,
      vx: 6 + Math.random() * 8, vy: -16,
      ttl: 1.4, life: 0,
      kind: 'zzz',
      hue: 200
    });
  }
  function pushSparkle(x, y, hue){
    var ang = Math.random() * Math.PI * 2;
    var sp = 30 + Math.random() * 50;
    pushParticle({
      x: x, y: y,
      vx: Math.cos(ang)*sp, vy: Math.sin(ang)*sp,
      ttl: 0.5 + Math.random()*0.3, life: 0,
      kind: 'spark',
      hue: hue
    });
  }

  // ── Audio ──
  var audioCtx = null, muted = false;
  function ensureAudio(){
    if (audioCtx){ if (audioCtx.state === 'suspended') audioCtx.resume(); return audioCtx; }
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(_){ audioCtx = null; }
    return audioCtx;
  }
  function tone(type, freq, dur, gain, slideTo, t0){
    var c = ensureAudio(); if (!c || muted) return;
    var o = c.createOscillator(); o.type = type;
    var t = t0 || c.currentTime;
    o.frequency.setValueAtTime(freq, t);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20, slideTo), t + dur);
    var g = c.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(gain, t + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g).connect(c.destination);
    o.start(t); o.stop(t + dur + 0.02);
  }
  function sndPurr(hue){
    // Per-cat-pet two-tone chirp + tiny vibrato
    var freq = 600 + (hue % 360) * 0.6;
    tone('triangle', freq, 0.10, 0.10, freq * 1.5);
    tone('sine', freq * 1.5, 0.18, 0.08, freq * 2.2, ensureAudio() && audioCtx.currentTime + 0.04);
  }
  function sndUnlock(){
    [523, 659, 784, 1047].forEach(function(f, i){
      tone('triangle', f, 0.28, 0.15, null, ensureAudio() && audioCtx.currentTime + i * 0.08);
    });
  }
  function sndTreat(){
    tone('triangle', 880, 0.12, 0.10, 1320);
    tone('sine', 660, 0.10, 0.08, 440, ensureAudio() && audioCtx.currentTime + 0.04);
  }

  // ── Cat AI ──
  function pickTarget(cat){
    for (var i = 0; i < 40; i++){
      var x = 2 + Math.floor(Math.random() * (COLS - 4));
      var y = 2 + Math.floor(Math.random() * (ROWS - 4));
      if (!isCatBlockedTile(x, y)){
        return { x: x * TILE + TILE/2, y: y * TILE + TILE/2 };
      }
    }
    return null;
  }
  function nearestTileOfKind(cat, kind){
    var best = null, bestD = Infinity;
    for (var y = 0; y < ROWS; y++){
      for (var x = 0; x < COLS; x++){
        var t = tiles[y][x];
        if (t.kind !== kind) continue;
        var tx = x * TILE + TILE/2, ty = y * TILE + TILE/2;
        var dx = tx - cat.x, dy = ty - cat.y;
        var d = dx*dx + dy*dy;
        if (d < bestD){ bestD = d; best = { x: tx, y: ty }; }
      }
    }
    return best;
  }
  function updateCat(cat, dt, now){
    cat.stateT += dt;
    if (cat.state === 'pet'){
      cat.vx = 0; cat.vy = 0;
      if (cat.stateT > 1.6) cat.state = 'wander';
      return;
    }
    if (cat.state === 'sit'){
      cat.vx = 0; cat.vy = 0;
      if (cat.stateT > (3 + Math.random()*4)) {
        cat.state = 'wander'; cat.stateT = 0; cat.target = null;
      }
      return;
    }
    if (cat.state === 'sleep'){
      cat.vx = 0; cat.vy = 0;
      if (Math.random() < dt * 0.6) pushZ(cat.x, cat.y - 8);
      if (cat.stateT > (8 + Math.random()*6)){
        cat.state = 'wander'; cat.stateT = 0; cat.target = null;
      }
      return;
    }
    if (cat.state === 'eat'){
      cat.vx = 0; cat.vy = 0;
      if (cat.stateT > 4){ cat.state = 'wander'; cat.stateT = 0; cat.target = null; }
      return;
    }
    // wander: head toward target. Pick new if none or arrived
    if (!cat.target){
      // Occasionally aim for a feature
      var r = Math.random();
      if (r < 0.10) cat.target = nearestTileOfKind(cat, 'bed');
      else if (r < 0.18) cat.target = nearestTileOfKind(cat, 'food');
      else if (r < 0.24) cat.target = nearestTileOfKind(cat, 'scratch');
      else if (r < 0.32) cat.target = nearestTileOfKind(cat, 'chair');
      if (!cat.target) cat.target = pickTarget(cat);
    }
    if (cat.target){
      var dx = cat.target.x - cat.x, dy = cat.target.y - cat.y;
      var d = Math.hypot(dx, dy);
      if (d < 8){
        // Arrived. Maybe switch state based on tile
        var tx = Math.floor(cat.target.x / TILE), ty = Math.floor(cat.target.y / TILE);
        var tk = tileAt(tx, ty);
        cat.target = null;
        if (tk){
          if (tk.kind === 'bed' && Math.random() < 0.7){
            cat.state = 'sleep'; cat.stateT = 0; return;
          }
          if (tk.kind === 'food'){ cat.state = 'eat'; cat.stateT = 0; cat.happiness = Math.min(1, cat.happiness + 0.15); return; }
          if (tk.kind === 'scratch'){ cat.state = 'sit'; cat.stateT = 0; cat.happiness = Math.min(1, cat.happiness + 0.10); return; }
          if (tk.kind === 'chair' && Math.random() < 0.5){ cat.state = 'sit'; cat.stateT = 0; return; }
        }
        if (Math.random() < 0.3){ cat.state = 'sit'; cat.stateT = 0; }
        return;
      }
      var speed = 32 + Math.random() * 8;
      var nx = dx / d, ny = dy / d;
      // Try movement with tile collision (try axis-by-axis)
      var newX = cat.x + nx * speed * dt;
      var newY = cat.y + ny * speed * dt;
      var tx = Math.floor(newX / TILE), ty = Math.floor(cat.y / TILE);
      if (!isCatBlockedTile(tx, ty)) cat.x = newX;
      else cat.target = null;
      tx = Math.floor(cat.x / TILE); ty = Math.floor(newY / TILE);
      if (!isCatBlockedTile(tx, ty)) cat.y = newY;
      else cat.target = null;
      cat.vx = nx; cat.vy = ny;
      if (Math.abs(nx) > Math.abs(ny)){
        cat.facing = nx > 0 ? 'right' : 'left';
      } else {
        cat.facing = ny > 0 ? 'down' : 'up';
      }
      cat.walkPhase += dt * 8;
    }
    // Treat magnetism — if treats around, head there
    if (state.treats.length){
      var nt = null, ntd = Infinity;
      for (var i = 0; i < state.treats.length; i++){
        var tr = state.treats[i];
        var ddx = tr.x - cat.x, ddy = tr.y - cat.y;
        var dd = ddx*ddx + ddy*ddy;
        if (dd < ntd){ ntd = dd; nt = tr; }
      }
      if (nt) cat.target = { x: nt.x, y: nt.y };
    }
  }

  function spawnTreatAt(x, y){
    state.treats.push({ x: x, y: y, life: 0, ttl: 20, eaten: false });
  }

  function updateTreats(dt){
    for (var i = state.treats.length - 1; i >= 0; i--){
      var tr = state.treats[i];
      tr.life += dt;
      if (tr.life >= tr.ttl){ state.treats.splice(i, 1); continue; }
      // Check if any cat is on top → eat
      for (var ci = 0; ci < state.cats.length; ci++){
        var c = state.cats[ci];
        var dx = c.x - tr.x, dy = c.y - tr.y;
        if (dx*dx + dy*dy < 14*14){
          // eat
          c.happiness = Math.min(1, c.happiness + 0.40);
          c.state = 'eat'; c.stateT = 0;
          pushHearts(c.x, c.y - 8, 6, 350);
          state.points += 5;
          document.getElementById('pointsVal').textContent = Math.floor(state.points);
          applyUnlocks();
          saveState();
          spawnFloater('+5', tr.x, tr.y, false);
          state.treats.splice(i, 1);
          break;
        }
      }
    }
  }

  // ── Pet logic ──
  function tryPet(canvasX, canvasY){
    var best = null, bestD = Infinity;
    for (var i = 0; i < state.cats.length; i++){
      var c = state.cats[i];
      var dx = c.x - canvasX, dy = c.y - canvasY;
      var d = dx*dx + dy*dy;
      if (d < bestD){ bestD = d; best = c; }
    }
    if (!best || bestD > 18*18) return false;
    var now = performance.now();
    if (now - best.lastPetT < 1200) return false;
    best.lastPetT = now;
    best.state = 'pet';
    best.stateT = 0;
    best.happiness = Math.min(1, best.happiness + 0.10);
    var pts = best.type.pointBase;
    if (best.happiness > 0.85) pts += 1;
    state.points += pts;
    state.pets++;
    document.getElementById('pointsVal').textContent = Math.floor(state.points);
    document.getElementById('petsVal').textContent = state.pets;
    pushHearts(best.x, best.y - 6, 5 + Math.floor(pts/2), best.type.hue);
    var legendary = best.type.rare;
    spawnFloater('+' + pts + (legendary ? ' ✨' : ''), best.x, best.y - 14, legendary);
    sndPurr(best.type.hue);
    applyUnlocks();
    saveState();
    return true;
  }

  // ── Floater (DOM-positioned purr-points popup) ──
  function spawnFloater(text, worldX, worldY, legendary){
    var rect = canvas.getBoundingClientRect();
    var scaleX = rect.width / CW;
    var scaleY = rect.height / CH;
    var px = rect.left + worldX * scaleX;
    var py = rect.top + worldY * scaleY;
    var f = document.createElement('div');
    f.className = 'floater' + (legendary ? ' legendary' : '');
    f.textContent = text;
    f.style.left = px + 'px';
    f.style.top = py + 'px';
    document.body.appendChild(f);
    setTimeout(function(){ if (f.parentNode) f.parentNode.removeChild(f); }, 1500);
  }

  // Cat sprite drawing — 16x16 inside a tile
  function drawCat(cat, now){
    var x = Math.floor(cat.x);
    var y = Math.floor(cat.y);
    var type = cat.type;

    // Rainbow hue cycles
    var hue = type.hue;
    if (type.id === 'rainbow') hue = (now * 0.08 + cat.id * 30) % 360;
    cat.hueShift = hue;

    var sat = type.sat, light = type.light;
    var bodyColor = 'hsl(' + hue + ',' + sat + '%,' + light + '%)';
    var darkBody = 'hsl(' + hue + ',' + sat + '%,' + Math.max(20, light - 20) + '%)';
    var lightBody = 'hsl(' + hue + ',' + sat + '%,' + Math.min(85, light + 18) + '%)';
    var patternColor = 'hsl(' + ((hue + 30) % 360) + ',' + sat + '%,' + Math.max(20, light - 25) + '%)';

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    ctx.fillRect(x - 5, y + 5, 10, 2);

    // Outer aura glow for shadow / rare types
    if (type.glow || type.id === 'rainbow'){
      ctx.fillStyle = 'hsla(' + hue + ', 100%, 65%, 0.30)';
      ctx.fillRect(x - 9, y - 8, 18, 16);
    }

    // Sleeping or sitting variants
    var sleeping = cat.state === 'sleep';
    var sitting = cat.state === 'sit' || cat.state === 'eat';
    var petting = cat.state === 'pet';

    // bob
    var bob = 0;
    if (cat.state === 'wander') bob = Math.abs(Math.sin(cat.walkPhase * 2)) * 0.6;
    if (petting) bob = Math.sin(performance.now() * 0.018) * 0.6;

    // body
    if (sleeping){
      // Curled up — wider body, no legs visible
      ctx.fillStyle = bodyColor;
      ctx.fillRect(x - 7, y - 1, 14, 5);
      ctx.fillStyle = lightBody;
      ctx.fillRect(x - 6, y, 12, 2);
      ctx.fillStyle = darkBody;
      ctx.fillRect(x - 7, y + 3, 14, 1);
      // tail curled
      ctx.fillStyle = bodyColor;
      ctx.fillRect(x + 5, y + 1, 2, 2);
      ctx.fillRect(x + 4, y, 2, 2);
      // ears
      ctx.fillStyle = darkBody;
      ctx.fillRect(x - 5, y - 3, 2, 2);
      ctx.fillRect(x + 3, y - 3, 2, 2);
      // closed eyes (two arcs)
      ctx.fillStyle = '#000';
      ctx.fillRect(x - 3, y, 2, 1);
      ctx.fillRect(x + 1, y, 2, 1);
    } else {
      // Standing cat (16x14)
      // legs
      ctx.fillStyle = darkBody;
      var legBob1 = sitting ? 0 : (Math.floor(cat.walkPhase) % 2 === 0 ? 0 : 1);
      var legBob2 = sitting ? 0 : (Math.floor(cat.walkPhase) % 2 === 0 ? 1 : 0);
      if (sitting){
        // legs tucked
        ctx.fillRect(x - 4, y + 3 - bob, 2, 3);
        ctx.fillRect(x + 2, y + 3 - bob, 2, 3);
      } else {
        ctx.fillRect(x - 4, y + 3 - bob + legBob1, 2, 3 - legBob1);
        ctx.fillRect(x - 1, y + 3 - bob + legBob2, 2, 3 - legBob2);
        ctx.fillRect(x + 2, y + 3 - bob + legBob1, 2, 3 - legBob1);
      }
      // body
      ctx.fillStyle = bodyColor;
      ctx.fillRect(x - 5, y - 2 - bob, 11, 6);
      // body underside lighter
      ctx.fillStyle = lightBody;
      ctx.fillRect(x - 4, y - 1 - bob, 9, 1);
      // back stripe
      ctx.fillStyle = darkBody;
      ctx.fillRect(x - 4, y + 3 - bob, 9, 1);
      // pattern overlay
      if (type.pattern === 'stripes'){
        ctx.fillStyle = patternColor;
        ctx.fillRect(x - 4, y - bob, 1, 3);
        ctx.fillRect(x - 1, y - bob, 1, 3);
        ctx.fillRect(x + 2, y - bob, 1, 3);
      } else if (type.pattern === 'spots'){
        ctx.fillStyle = patternColor;
        ctx.fillRect(x - 3, y - bob, 2, 1);
        ctx.fillRect(x + 1, y + 1 - bob, 2, 1);
        ctx.fillRect(x + 3, y - 1 - bob, 1, 1);
      } else if (type.pattern === 'tuxedo'){
        ctx.fillStyle = '#fff';
        ctx.fillRect(x - 1, y - bob, 3, 4);
        ctx.fillRect(x - 4, y + 3 - bob + legBob1, 1, 3 - legBob1);
        ctx.fillRect(x + 3, y + 3 - bob + legBob1, 1, 3 - legBob1);
      } else if (type.pattern === 'rainbow'){
        // diagonal rainbow stripes overlaid
        for (var s = -5; s < 6; s++){
          var sh = (hue + s * 30 + 360) % 360;
          ctx.fillStyle = 'hsla(' + sh + ',100%,70%,0.55)';
          ctx.fillRect(x + s, y - bob, 1, 4);
        }
      }
      // tail (back side, depending on facing)
      ctx.fillStyle = darkBody;
      var tailWag = Math.sin(performance.now() * 0.005 + cat.id) * 1.5;
      if (cat.facing === 'right'){
        ctx.fillRect(x - 7, y - 1 - bob + tailWag, 2, 1);
        ctx.fillRect(x - 8, y - 2 - bob + tailWag, 1, 1);
      } else {
        ctx.fillRect(x + 5, y - 1 - bob + tailWag, 2, 1);
        ctx.fillRect(x + 7, y - 2 - bob + tailWag, 1, 1);
      }

      // Head (on top of body)
      var headY = y - 5 - bob;
      ctx.fillStyle = bodyColor;
      ctx.fillRect(x - 3, headY, 7, 4);
      // cheeks
      ctx.fillStyle = lightBody;
      ctx.fillRect(x - 3, headY + 3, 7, 1);
      // ears (triangle-ish)
      ctx.fillStyle = darkBody;
      ctx.fillRect(x - 3, headY - 2, 2, 2);
      ctx.fillRect(x + 2, headY - 2, 2, 2);
      // inner ear
      ctx.fillStyle = '#ff9ec0';
      ctx.fillRect(x - 2, headY - 1, 1, 1);
      ctx.fillRect(x + 3, headY - 1, 1, 1);

      // Eyes (state-dependent)
      var blinking = (performance.now() < cat.blink);
      if (performance.now() > cat.blinkUntil){
        cat.blink = performance.now() + 110;
        cat.blinkUntil = performance.now() + 1800 + Math.random() * 3500;
      }
      if (petting){
        // Happy closed-eye crescents
        ctx.fillStyle = '#000';
        ctx.fillRect(x - 2, headY + 1, 2, 1);
        ctx.fillRect(x + 1, headY + 1, 2, 1);
      } else if (blinking){
        ctx.fillStyle = '#000';
        ctx.fillRect(x - 2, headY + 1, 2, 1);
        ctx.fillRect(x + 1, headY + 1, 2, 1);
      } else {
        // Open eyes — bright eye-color
        var eyeColor = type.glow ? '#a5ff52' : (type.id === 'rainbow' ? 'hsl(' + ((hue + 180) % 360) + ',100%,75%)' : '#1a0a08');
        ctx.fillStyle = eyeColor;
        ctx.fillRect(x - 2, headY + 1, 1, 1);
        ctx.fillRect(x + 2, headY + 1, 1, 1);
        // tiny white catchlight
        ctx.fillStyle = '#fff';
        ctx.fillRect(x - 2, headY + 1, 1, 1);  // covers eye for blink — we want a tiny dot
        // re-paint the inner with eye color and add catchlight at corner
        ctx.fillStyle = eyeColor;
        ctx.fillRect(x - 2, headY + 1, 1, 1);
        ctx.fillRect(x + 2, headY + 1, 1, 1);
      }
      // Nose
      ctx.fillStyle = '#ff8aa0';
      ctx.fillRect(x, headY + 2, 1, 1);
      // Mouth
      ctx.fillStyle = '#1a0a08';
      ctx.fillRect(x, headY + 3, 1, 1);

      // Whiskers (faint)
      ctx.fillStyle = 'rgba(255,255,255,0.40)';
      ctx.fillRect(x - 5, headY + 2, 2, 1);
      ctx.fillRect(x + 4, headY + 2, 2, 1);

      // Name label when petted
      if (petting){
        ctx.fillStyle = 'rgba(255,255,255,0.9)';
        ctx.font = '6px "Press Start 2P", monospace';
        ctx.textAlign = 'center';
        ctx.fillText(cat.name, x, headY - 4);
      }
    }

    // Pet ripple ring
    if (petting){
      var t = cat.stateT / 1.6;
      ctx.strokeStyle = 'hsla(' + hue + ',100%,75%,' + (1 - t) * 0.7 + ')';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(x, y, 6 + t * 12, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  function drawParticles(now){
    for (var i = 0; i < state.particles.length; i++){
      var p = state.particles[i];
      var a = 1 - p.life / p.ttl;
      if (p.kind === 'heart'){
        // pixel heart
        ctx.fillStyle = 'hsl(' + (p.hue || 350) + ', 90%, 65%)';
        var px = Math.floor(p.x), py = Math.floor(p.y);
        ctx.globalAlpha = Math.max(0, a);
        ctx.fillRect(px - 2, py - 2, 2, 2);
        ctx.fillRect(px + 0, py - 2, 2, 2);
        ctx.fillRect(px - 3, py, 6, 1);
        ctx.fillRect(px - 2, py + 1, 4, 1);
        ctx.fillRect(px - 1, py + 2, 2, 1);
        ctx.globalAlpha = 1;
      } else if (p.kind === 'zzz'){
        ctx.fillStyle = 'rgba(165,255,82,' + a + ')';
        ctx.font = '8px "Press Start 2P", monospace';
        ctx.fillText('z', p.x, p.y);
      } else if (p.kind === 'spark'){
        ctx.fillStyle = 'hsla(' + p.hue + ', 100%, 75%, ' + a + ')';
        ctx.fillRect(p.x, p.y, 2, 2);
      }
    }
  }

  // ── Update particles + cats ──
  function updateParticles(dt){
    for (var i = state.particles.length - 1; i >= 0; i--){
      var p = state.particles[i];
      p.life += dt;
      if (p.life >= p.ttl){ state.particles.splice(i, 1); continue; }
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      if (p.kind === 'heart' || p.kind === 'zzz') p.vy -= 8 * dt;
      else p.vy += 60 * dt;
      p.vx *= Math.pow(0.94, dt * 60);
    }
  }

  // Camera-less render: canvas matches world directly
  function render(now){
    ctx.fillStyle = '#02000a';
    ctx.fillRect(0, 0, CW, CH);
    drawFloor();
    drawTilesProps(now);
    drawTreats();
    // Sort cats by Y so deeper ones render first
    var sorted = state.cats.slice().sort(function(a, b){ return a.y - b.y; });
    for (var i = 0; i < sorted.length; i++) drawCat(sorted[i], now);
    drawParticles(now);
    // Scanline overlay (very subtle)
    ctx.fillStyle = 'rgba(255,255,255,0.018)';
    for (var sl = 0; sl < CH; sl += 3) ctx.fillRect(0, sl, CW, 1);
  }

  // ── Input ──
  canvas.addEventListener('pointerdown', function(e){
    ensureAudio();
    var rect = canvas.getBoundingClientRect();
    var cx = (e.clientX - rect.left) * (CW / rect.width);
    var cy = (e.clientY - rect.top) * (CH / rect.height);
    tryPet(cx, cy);
  });

  document.getElementById('treatBtn').addEventListener('click', function(){
    ensureAudio();
    if (state.points < 10) return;
    state.points -= 10;
    document.getElementById('pointsVal').textContent = Math.floor(state.points);
    // drop treat at random floor spot
    var spot = randomFloor();
    spawnTreatAt(spot.x, spot.y);
    sndTreat();
    saveState();
  });
  function refreshTreatBtn(){
    var b = document.getElementById('treatBtn');
    b.disabled = state.points < 10;
  }
  setInterval(refreshTreatBtn, 250);
  refreshTreatBtn();

  document.getElementById('muteBtn').addEventListener('click', function(){
    muted = !muted;
    this.textContent = muted ? '♪ off' : '♪ on';
    this.setAttribute('aria-pressed', muted ? 'true' : 'false');
  });

  // Idle quotes
  var quotes = [
    'a cat blinks slowly.',
    'someone purrs.',
    'tiny pawsteps on the floor.',
    'the neon sign hums.',
    'a tail flicks.',
    'one cat watches the window.',
    'the plant is doing fine.',
    'somewhere a paw stretches.',
    'a small dream begins.'
  ];
  var qIdx = 0;
  function rotateQuote(){
    var q = document.getElementById('quote');
    q.textContent = quotes[qIdx % quotes.length];
    qIdx++;
    setTimeout(rotateQuote, 10000);
  }
  setTimeout(rotateQuote, 5000);

  // ── Main loop ──
  var lastT = performance.now();
  function frame(now){
    var dt = Math.min(0.05, (now - lastT) / 1000);
    lastT = now;
    if (prefersReducedMotion) dt *= 0.85;

    // Spawn loop — auto-spawn cats up to 4 free, more unlocked via milestones
    state.spawnCD -= dt;
    var maxCats = Math.min(8, 3 + state.unlockedTypes.size);
    document.getElementById('catsMax').textContent = maxCats;
    if (state.spawnCD <= 0 && state.cats.length < maxCats){
      spawnCat();
      state.spawnCD = 12 + Math.random() * 8;
    }

    for (var i = 0; i < state.cats.length; i++) updateCat(state.cats[i], dt, now);
    updateTreats(dt);
    updateParticles(dt);

    document.getElementById('catsVal').textContent = state.cats.length;
    document.getElementById('pointsVal').textContent = Math.floor(state.points);

    try { render(now); } catch(e){ showError('render: ' + e.message); }
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // Initial HUD sync
  document.getElementById('pointsVal').textContent = Math.floor(state.points);
  document.getElementById('petsVal').textContent = state.pets;
})();
</script>
</body>
</html>
