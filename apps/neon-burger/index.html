<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Neon Burger</title>
<link rel="icon" href="https://emojicdn.elk.sh/🍔">
<meta property="og:title" content="Neon Burger">
<meta property="og:description" content="Stack glowing ingredients to build your dream burger.">
<meta property="og:url" content="https://sloppy.live/neon-burger">
<meta property="og:image" content="https://emojicdn.elk.sh/🍔?style=apple&size=512">
<link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=Chakra+Petch:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#08090f;--panel:#0e1018;--border:#1a1c2a;--text:#d0d0d8;--dim:#555;--accent:#ff6622}
html,body{min-height:100dvh;background:var(--bg);color:var(--text);font-family:'Chakra Petch',sans-serif}
body{display:flex;flex-direction:column;align-items:center;padding:20px 12px 60px;gap:16px}
h1{font-family:'Bungee Shade',sans-serif;font-size:clamp(24px,5vw,38px);background:linear-gradient(90deg,#ff6622,#ffcc00,#ff3366);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center}
.sub{font-size:12px;color:var(--dim);text-align:center;margin-top:-8px}
#main{display:flex;gap:24px;align-items:flex-start;max-width:700px;width:100%;flex-wrap:wrap;justify-content:center}
#plate{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:20px;min-width:260px;flex:1;display:flex;flex-direction:column;align-items:center;min-height:360px;position:relative}
#burger{display:flex;flex-direction:column-reverse;align-items:center;gap:0;min-height:80px;width:100%;padding-bottom:8px}
.layer{width:180px;height:28px;border-radius:14px;position:relative;transition:all 0.2s;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;letter-spacing:1px;color:#000a;animation:dropIn 0.25s ease-out}
.layer:hover{filter:brightness(1.3);transform:scale(1.04)}
@keyframes dropIn{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:translateY(0)}}
#ingredients{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:260px}
.ing{padding:10px 14px;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;border:1px solid var(--border);background:var(--panel);transition:all 0.15s;user-select:none;display:flex;align-items:center;gap:6px}
.ing:hover{border-color:var(--accent);transform:scale(1.05)}
.ing:active{transform:scale(0.95)}
.ing .dot{width:14px;height:14px;border-radius:4px;flex-shrink:0}
#actions{display:flex;gap:8px;margin-top:12px}
.abtn{font-family:'Chakra Petch',sans-serif;font-size:12px;padding:8px 16px;border:1px solid var(--border);background:transparent;color:var(--dim);border-radius:6px;cursor:pointer;transition:all 0.2s}
.abtn:hover{border-color:var(--accent);color:var(--accent)}
#total{font-size:22px;font-weight:700;color:var(--accent);margin-top:8px}
#cal{font-size:11px;color:var(--dim)}
#name{font-size:14px;color:var(--text);margin-top:4px;font-weight:700;letter-spacing:1px;min-height:20px;text-align:center}
#back{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);font-size:11px;opacity:0.3;color:#666;text-decoration:none}
#back:hover{opacity:0.6}
@media(max-width:560px){
  #main{flex-direction:column;align-items:center}
  #ingredients{max-width:100%}
}
</style>
</head>
<body>
<h1>NEON BURGER</h1>
<p class="sub">tap ingredients to stack — tap layers to remove</p>
<div id="main">
<div id="plate">
<div id="name"></div>
<div id="total">$0.00</div>
<div id="cal">0 cal</div>
<div id="burger"></div>
<div id="actions">
<button class="abtn" id="clearBtn">Clear</button>
<button class="abtn" id="randBtn">Random</button>
</div>
</div>
<div id="ingredients"></div>
</div>
<a id="back" href="https://sloppy.live">sloppy.live</a>
<script>
(function(){
var ITEMS=[
  {id:'bun-top',name:'Top Bun',color:'#e8a840',glow:'#e8a84066',price:0.50,cal:120,w:180,h:32,r:16,top:true},
  {id:'bun-bottom',name:'Bottom Bun',color:'#d49030',glow:'#d4903066',price:0.50,cal:120,w:180,h:24,r:12,bottom:true},
  {id:'patty',name:'Beef Patty',color:'#6a3a1a',glow:'#8a4a2a66',price:2.50,cal:250,w:170,h:26,r:13},
  {id:'cheese',name:'Cheese',color:'#ffcc22',glow:'#ffcc2266',price:0.75,cal:90,w:174,h:14,r:7},
  {id:'lettuce',name:'Lettuce',color:'#44cc44',glow:'#44cc4466',price:0.30,cal:5,w:178,h:16,r:8},
  {id:'tomato',name:'Tomato',color:'#ee3333',glow:'#ee333366',price:0.40,cal:10,w:168,h:14,r:7},
  {id:'onion',name:'Onion',color:'#cc88dd',glow:'#cc88dd66',price:0.30,cal:8,w:164,h:12,r:6},
  {id:'pickle',name:'Pickle',color:'#66aa33',glow:'#66aa3366',price:0.25,cal:4,w:160,h:12,r:6},
  {id:'bacon',name:'Bacon',color:'#cc4422',glow:'#cc442266',price:1.50,cal:180,w:170,h:14,r:7},
  {id:'egg',name:'Fried Egg',color:'#ffee88',glow:'#ffee8866',price:1.00,cal:90,w:160,h:18,r:9},
  {id:'mushroom',name:'Mushroom',color:'#c8a878',glow:'#c8a87866',price:0.80,cal:15,w:156,h:14,r:7},
  {id:'jalapeno',name:'Jalapeno',color:'#22aa44',glow:'#22aa4466',price:0.40,cal:6,w:152,h:12,r:6},
  {id:'sauce',name:'Special Sauce',color:'#ff8844',glow:'#ff884466',price:0.30,cal:40,w:172,h:10,r:5},
  {id:'ketchup',name:'Ketchup',color:'#dd2222',glow:'#dd222266',price:0,cal:20,w:172,h:10,r:5},
  {id:'mustard',name:'Mustard',color:'#ccaa00',glow:'#ccaa0066',price:0,cal:15,w:172,h:10,r:5}
];

var stack=[];
var burgerEl=document.getElementById('burger');
var ingEl=document.getElementById('ingredients');
var totalEl=document.getElementById('total');
var calEl=document.getElementById('cal');
var nameEl=document.getElementById('name');

// render ingredient buttons
for(var i=0;i<ITEMS.length;i++){
  var it=ITEMS[i];
  var btn=document.createElement('div');
  btn.className='ing';
  btn.dataset.id=it.id;
  btn.innerHTML='<div class="dot" style="background:'+it.color+'"></div>'+it.name;
  ingEl.appendChild(btn);
}

ingEl.addEventListener('click',function(e){
  var btn=e.target.closest('.ing');
  if(!btn)return;
  var id=btn.dataset.id;
  addLayer(id);
});

function addLayer(id){
  var it=null;
  for(var i=0;i<ITEMS.length;i++){if(ITEMS[i].id===id){it=ITEMS[i];break;}}
  if(!it)return;
  stack.push(id);
  render();
}

function removeLayer(idx){
  stack.splice(idx,1);
  render();
}

function render(){
  burgerEl.innerHTML='';
  var price=0,cal=0;
  for(var i=0;i<stack.length;i++){
    var it=findItem(stack[i]);
    if(!it)continue;
    price+=it.price;cal+=it.cal;
    var el=document.createElement('div');
    el.className='layer';
    el.style.width=it.w+'px';
    el.style.height=it.h+'px';
    el.style.borderRadius=it.r+'px';
    el.style.background=it.color;
    el.style.boxShadow='0 0 12px '+it.glow+',inset 0 2px 4px rgba(255,255,255,0.2)';
    el.dataset.idx=i;
    el.textContent=it.name;
    burgerEl.appendChild(el);
  }
  totalEl.textContent='$'+price.toFixed(2);
  calEl.textContent=cal+' cal';
  nameEl.textContent=generateName();
}

burgerEl.addEventListener('click',function(e){
  var layer=e.target.closest('.layer');
  if(!layer)return;
  var idx=parseInt(layer.dataset.idx);
  removeLayer(idx);
});

function findItem(id){
  for(var i=0;i<ITEMS.length;i++){if(ITEMS[i].id===id)return ITEMS[i];}
  return null;
}

function generateName(){
  if(stack.length===0)return '';
  var has=function(id){return stack.indexOf(id)!==-1;};
  var patties=stack.filter(function(s){return s==='patty';}).length;
  var prefix='';
  if(patties===0)prefix='The Bunny';
  else if(patties===1)prefix='Classic';
  else if(patties===2)prefix='Double';
  else if(patties===3)prefix='Triple';
  else prefix='Monster';

  var suffix='';
  if(has('jalapeno')&&has('bacon'))suffix=' Inferno';
  else if(has('jalapeno'))suffix=' Spicy';
  else if(has('bacon')&&has('egg'))suffix=' Sunrise';
  else if(has('bacon'))suffix=' Smokehouse';
  else if(has('egg'))suffix=' Brunch';
  else if(has('mushroom'))suffix=' Forager';
  else if(has('cheese')&&patties>=2)suffix=' Melt';
  else if(has('cheese'))suffix=' Deluxe';

  if(stack.length>10)prefix='Mega '+prefix;
  return prefix+suffix;
}

document.getElementById('clearBtn').addEventListener('click',function(){
  stack=[];render();
});

document.getElementById('randBtn').addEventListener('click',function(){
  stack=['bun-bottom'];
  var mid=ITEMS.filter(function(it){return !it.top&&!it.bottom;});
  var count=3+Math.floor(Math.random()*5);
  for(var i=0;i<count;i++){
    stack.push(mid[Math.floor(Math.random()*mid.length)].id);
  }
  stack.push('bun-top');
  render();
});

// start with a basic burger
stack=['bun-bottom','patty','cheese','lettuce','tomato','bun-top'];
render();
})();
</script>
</body>
</html>
