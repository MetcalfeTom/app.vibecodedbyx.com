<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sigma Guard</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="A serious-mode AI governance dashboard. Monitor every agent in real time, enforce policy, audit every tool call.">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%9B%A1%EF%B8%8F">
<meta property="og:title" content="Sigma Guard">
<meta property="og:description" content="A serious-mode AI governance dashboard. Monitor every agent in real time, enforce policy, audit every tool call.">
<meta property="og:url" content="https://sloppy.live/sigma-guard">
<meta property="og:type" content="website">
<meta property="og:image" content="https://image.pollinations.ai/prompt/AI%20governance%20security%20operations%20console%20dashboard%2C%20deep%20navy%20palette%2C%20amber%20and%20cyan%20metrics%2C%20agent%20grid%2C%20policy%20panel%2C%20audit%20log%2C%20cinematic%20wide?width=1200&height=630&nologo=true">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&family=Major+Mono+Display&display=swap" rel="stylesheet">
<style>
/* Chat ask: more aggressive — dark charcoal with neon-red dominant.
   Cyan still appears for INFO events and small accents but red is now
   the primary brand colour, brighter and more saturated than before. */
:root{
  --bg:#0e0e10;
  --bg-2:#161618;
  --panel:#1a1a1d;
  --panel-2:#131316;
  --rule:#2a1620;             /* red-tinted hairlines */
  --rule-strong:#3a1020;
  --foam:#e6e6e8;
  --foam-soft:#9a9aa0;
  --cyan:#7adcff;             /* INFO accent only */
  --amber:#f5c453;
  --red:#ff1a3c;              /* dominant — neon red */
  --red-bright:#ff4060;
  --red-deep:#7a0020;
  --green:#3eff8a;            /* status-only, used sparingly */
  --violet:#a86bff;
  --ink:#000;
  --pos:#3eff8a;
  --warn:#f5c453;
  --crit:#ff1a3c;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:100%;-webkit-text-size-adjust:100%}
body{
  min-height:100vh;background:var(--bg);color:var(--foam);
  font-family:'IBM Plex Sans',ui-sans-serif,system-ui,sans-serif;
  font-size:1rem;line-height:1.45;overflow:hidden;
  /* Aggressive red corner glows on charcoal bg */
  background-image:
    radial-gradient(circle at 0% 0%,   rgba(255,26,60,0.08), transparent 50%),
    radial-gradient(circle at 100% 100%, rgba(255,26,60,0.10), transparent 55%),
    repeating-linear-gradient(180deg, rgba(0,0,0,0.20) 0 1px, transparent 1px 3px);
}
a.skip-link{position:absolute;left:0.5rem;top:-3rem;z-index:200;
  background:var(--cyan);color:var(--ink);padding:0.5rem 0.75rem;
  text-decoration:none;border-radius:0.25rem;
  font-family:'IBM Plex Sans',sans-serif;font-weight:700;font-size:0.875rem}
a.skip-link:focus{top:0.5rem;outline:0.1875rem solid var(--amber);outline-offset:0.125rem}

main{
  position:fixed;inset:0;display:grid;
  grid-template-columns:1fr 22rem;
  grid-template-rows:auto 1fr 13rem;
  grid-template-areas:
    "head head"
    "agents policies"
    "audit  audit";
  gap:0.625rem;padding:0.625rem;
}
@media (max-width:1100px){
  main{
    grid-template-columns:1fr;
    grid-template-rows:auto 1fr auto auto;
    grid-template-areas:
      "head"
      "agents"
      "policies"
      "audit";
  }
}

/* Header */
header.head{
  grid-area:head;
  display:flex;align-items:center;justify-content:space-between;
  gap:1rem;flex-wrap:wrap;padding:0.5rem 0.75rem;
  border-bottom:0.125rem solid var(--red);
  box-shadow:0 0.25rem 0.875rem rgba(255,26,60,0.10);
}
.brand{display:flex;align-items:center;gap:0.75rem}
.brand .shield{
  width:2.25rem;height:2.5rem;display:flex;align-items:center;justify-content:center;
  /* Red shield with bright top edge — angry sentry vibe */
  background:linear-gradient(180deg, var(--red-bright), var(--red-deep));
  border-radius:0.4375rem 0.4375rem 50% 50% / 0.4375rem 0.4375rem 0.625rem 0.625rem;
  color:#fff;font-size:1.125rem;font-weight:800;
  box-shadow:
    inset 0 0.0625rem 0 rgba(255,255,255,0.45),
    0 0 0.625rem rgba(255,26,60,0.55);
  text-shadow:0 0 0.375rem rgba(255,255,255,0.55);
}
h1{
  font-family:'IBM Plex Sans',sans-serif;font-weight:700;
  font-size:clamp(1.125rem, 2.4vw, 1.5rem);
  letter-spacing:0.02em;line-height:1;color:var(--foam);
}
h1 .accent{color:var(--red);text-shadow:0 0 0.5rem rgba(255,26,60,0.55)}
.tag{
  font-family:'IBM Plex Mono',monospace;font-size:0.75rem;
  letter-spacing:0.16em;text-transform:uppercase;color:var(--foam-soft);
  margin-top:0.125rem;
}

.metrics{display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center}
.metrics .metric{
  background:var(--panel);
  border:0.0625rem solid var(--rule);
  border-radius:0.375rem;padding:0.4375rem 0.75rem;
  display:flex;align-items:baseline;gap:0.4375rem;
  min-height:2.5rem;
}
.metrics .label{
  font-family:'IBM Plex Mono',monospace;font-size:0.6875rem;
  letter-spacing:0.16em;text-transform:uppercase;color:var(--foam-soft);
}
.metrics .v{
  font-family:'Major Mono Display',monospace;font-size:1.0625rem;
  color:var(--foam);font-weight:400;
}
.metrics .metric.pos .v{color:var(--pos)}
.metrics .metric.warn .v{color:var(--warn)}
.metrics .metric.crit .v{color:var(--crit)}

.metrics .live{
  display:inline-block;width:0.5rem;height:0.5rem;border-radius:50%;
  background:var(--red);margin-right:0.4375rem;
  box-shadow:0 0 0 rgba(255,26,60,0.6);
  animation:pulse 1.4s ease-in-out infinite;
  vertical-align:middle;
}
@keyframes pulse{
  0%,100%{box-shadow:0 0 0 0 rgba(255,26,60,0.65)}
  50%{box-shadow:0 0 0 0.5rem rgba(255,26,60,0)}
}

/* Agents grid */
section.agents{
  grid-area:agents;
  background:var(--panel-2);border:0.0625rem solid var(--rule);
  border-radius:0.5rem;display:flex;flex-direction:column;min-height:0;
}
section.agents > header{
  display:flex;justify-content:space-between;align-items:center;
  padding:0.625rem 0.875rem;border-bottom:0.0625rem solid var(--rule);
  flex-wrap:wrap;gap:0.5rem;
}
section.agents h2{
  font-family:'IBM Plex Sans',sans-serif;font-weight:700;
  font-size:0.875rem;letter-spacing:0.04em;color:var(--foam);
}
.filters{display:flex;gap:0.3125rem;flex-wrap:wrap}
.filter-btn{
  background:transparent;border:0.0625rem solid var(--rule);
  color:var(--foam-soft);font-family:'IBM Plex Mono',monospace;
  font-size:0.6875rem;letter-spacing:0.12em;text-transform:uppercase;
  padding:0.3125rem 0.5625rem;border-radius:0.25rem;cursor:pointer;
  min-height:2rem;
}
.filter-btn:hover{color:var(--red-bright);border-color:var(--red)}
.filter-btn[aria-pressed="true"]{background:var(--red);color:#fff;border-color:var(--red);box-shadow:0 0 0.5rem rgba(255,26,60,0.45)}
.filter-btn:focus-visible{outline:0.1875rem solid var(--amber);outline-offset:0.0625rem}
.agent-grid{
  flex:1;overflow-y:auto;padding:0.625rem;
  display:grid;
  grid-template-columns:repeat(auto-fill, minmax(20rem, 1fr));
  gap:0.625rem;align-content:flex-start;
}

.agent{
  background:var(--panel);
  border:0.0625rem solid var(--rule);
  border-left:0.1875rem solid var(--rule);
  border-radius:0.375rem;
  padding:0.625rem 0.75rem;
  display:flex;flex-direction:column;gap:0.375rem;
  position:relative;
}
.agent[data-status="active"]   { border-left-color:var(--pos)  }
.agent[data-status="idle"]     { border-left-color:var(--cyan) }
.agent[data-status="throttled"]{ border-left-color:var(--warn) }
.agent[data-status="blocked"]  { border-left-color:var(--crit) }
.agent[data-status="quarantined"]{
  border-left-color:var(--red-bright);
  background:rgba(255,26,60,0.10);
  box-shadow:inset 0 0 0.5rem rgba(255,26,60,0.20);
}

.agent-row{display:flex;justify-content:space-between;align-items:center;gap:0.5rem}
.agent .id{
  font-family:'IBM Plex Mono',monospace;font-size:0.8125rem;
  font-weight:600;color:var(--foam);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.agent .model{
  font-family:'IBM Plex Mono',monospace;font-size:0.6875rem;
  letter-spacing:0.04em;color:var(--cyan);
}
.agent .status{
  font-family:'IBM Plex Mono',monospace;font-size:0.6875rem;
  letter-spacing:0.16em;text-transform:uppercase;font-weight:600;
}
.agent[data-status="active"]   .status{color:var(--pos)}
.agent[data-status="idle"]     .status{color:var(--cyan)}
.agent[data-status="throttled"].status{color:var(--warn)}
.agent[data-status="blocked"]  .status{color:var(--crit)}
.agent[data-status="quarantined"].status{color:var(--crit)}

.agent .task{
  font-family:'IBM Plex Mono',monospace;font-size:0.75rem;
  color:var(--foam-soft);font-style:italic;line-height:1.4;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.agent .stats{
  display:grid;grid-template-columns:repeat(3, 1fr);gap:0.375rem;
  font-family:'IBM Plex Mono',monospace;font-size:0.6875rem;
}
.agent .stat{
  background:rgba(0,0,0,0.20);
  border-radius:0.1875rem;padding:0.25rem 0.4375rem;
}
.agent .stat .lbl{color:var(--foam-soft);text-transform:uppercase;letter-spacing:0.06em;font-size:0.625rem}
.agent .stat .val{color:var(--foam);font-weight:600;font-size:0.8125rem;display:block}
.agent .stat.risk[data-risk="hi"] .val{color:var(--crit)}
.agent .stat.risk[data-risk="md"] .val{color:var(--warn)}
.agent .stat.risk[data-risk="lo"] .val{color:var(--pos)}

.agent .actions{display:flex;gap:0.3125rem;margin-top:0.125rem}
.agent .actions button{
  flex:1;background:transparent;border:0.0625rem solid var(--rule);
  color:var(--foam-soft);font-family:'IBM Plex Mono',monospace;
  font-size:0.6875rem;letter-spacing:0.10em;text-transform:uppercase;
  padding:0.3125rem;border-radius:0.1875rem;cursor:pointer;
  min-height:2rem;
}
.agent .actions button:hover{color:#fff;border-color:var(--red);background:rgba(255,26,60,0.10)}
.agent .actions button.crit:hover{color:#fff;border-color:var(--red-bright);background:var(--red);box-shadow:0 0 0.5rem rgba(255,26,60,0.6)}
.agent .actions button:focus-visible{outline:0.1875rem solid var(--amber);outline-offset:0.0625rem}

.agent .spark{
  position:absolute;top:0.5rem;right:0.625rem;
  width:3rem;height:1rem;
}

/* Policies panel */
aside.policies{
  grid-area:policies;
  background:var(--panel-2);border:0.0625rem solid var(--rule);
  border-radius:0.5rem;display:flex;flex-direction:column;min-height:0;
}
aside.policies > header{
  padding:0.625rem 0.875rem;border-bottom:0.0625rem solid var(--rule);
  display:flex;justify-content:space-between;align-items:center;
}
aside.policies h2{
  font-family:'IBM Plex Sans',sans-serif;font-weight:700;
  font-size:0.875rem;color:var(--foam);
}
aside.policies .ct{
  font-family:'IBM Plex Mono',monospace;font-size:0.6875rem;
  letter-spacing:0.12em;color:var(--foam-soft);
}
.policy-list{
  flex:1;overflow-y:auto;padding:0.5rem;
  display:flex;flex-direction:column;gap:0.4375rem;
}
.policy{
  background:var(--panel);
  border:0.0625rem solid var(--rule);
  border-left:0.1875rem solid var(--cyan);
  border-radius:0.25rem;padding:0.5rem 0.625rem;
  display:flex;flex-direction:column;gap:0.25rem;
}
.policy[data-mode="block"]{border-left-color:var(--crit)}
.policy[data-mode="warn"] {border-left-color:var(--warn)}
.policy[data-mode="log"]  {border-left-color:var(--cyan)}

.policy .id{
  font-family:'IBM Plex Mono',monospace;font-size:0.75rem;
  font-weight:600;color:var(--foam);
}
.policy .desc{
  font-family:'IBM Plex Sans',sans-serif;font-size:0.75rem;
  color:var(--foam-soft);
}
.policy-row{
  display:flex;justify-content:space-between;align-items:center;gap:0.4375rem;
  font-family:'IBM Plex Mono',monospace;font-size:0.6875rem;
  letter-spacing:0.06em;
}
.policy .mode-pill{
  padding:0.1875rem 0.4375rem;border-radius:0.125rem;
  text-transform:uppercase;letter-spacing:0.16em;font-size:0.625rem;font-weight:700;
  cursor:pointer;
  background:rgba(0,0,0,0.30);color:var(--foam-soft);
  border:0.0625rem solid var(--rule);
}
.policy[data-mode="block"] .mode-pill{color:var(--crit);border-color:var(--crit)}
.policy[data-mode="warn"]  .mode-pill{color:var(--warn);border-color:var(--warn)}
.policy[data-mode="log"]   .mode-pill{color:var(--cyan);border-color:var(--cyan)}
.policy .mode-pill:focus-visible{outline:0.1875rem solid var(--amber);outline-offset:0.0625rem}
.policy .hits{
  font-family:'Major Mono Display',monospace;font-size:0.875rem;color:var(--foam);
}
.policy .hits.crit{color:var(--crit)}

/* Audit log */
section.audit{
  grid-area:audit;
  background:var(--panel-2);border:0.0625rem solid var(--rule);
  border-radius:0.5rem;display:flex;flex-direction:column;min-height:0;
}
section.audit > header{
  display:flex;justify-content:space-between;align-items:center;
  padding:0.5rem 0.875rem;border-bottom:0.0625rem solid var(--rule);
  flex-wrap:wrap;gap:0.5rem;
}
section.audit h2{
  font-family:'IBM Plex Sans',sans-serif;font-weight:700;
  font-size:0.875rem;color:var(--foam);
}
.log{
  flex:1;overflow-y:auto;padding:0.4375rem 0.875rem;
  font-family:'IBM Plex Mono',monospace;font-size:0.75rem;
  line-height:1.55;
}
.log-line{
  display:grid;
  grid-template-columns:5.5rem 4.25rem 8.5rem 1fr 5rem;
  gap:0.5rem;align-items:baseline;
  border-bottom:0.0625rem solid rgba(30,50,82,0.5);
  padding:0.1875rem 0;
}
.log-line .t   {color:var(--foam-soft)}
.log-line .sev {
  font-family:'Major Mono Display',monospace;font-size:0.6875rem;
  letter-spacing:0.10em;text-transform:uppercase;
}
.log-line .agent {color:var(--cyan);font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-line .msg {color:var(--foam);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-line .pol {color:var(--violet);text-align:right;font-size:0.6875rem;letter-spacing:0.04em}
.log-line.allow .sev{color:var(--pos)}
.log-line.warn  .sev{color:var(--warn)}
.log-line.deny  .sev{color:var(--crit)}
.log-line.info  .sev{color:var(--cyan)}

@media (max-width:760px){
  .log-line{grid-template-columns:4.5rem 3.5rem 1fr 4rem}
  .log-line .agent{display:none}
}

@media (prefers-reduced-motion: reduce){
  .metrics .live{animation:none}
}

.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap}
</style>
</head>
<body>

<a href="#agents" class="skip-link">Skip to agent grid</a>

<main>
  <header class="head">
    <div class="brand">
      <div class="shield" aria-hidden="true">Σ</div>
      <div>
        <h1>SIGMA <span class="accent">GUARD</span></h1>
        <div class="tag">AI Governance · Realtime Agent Oversight</div>
      </div>
    </div>
    <div class="metrics" role="status" aria-live="polite">
      <div class="metric"><span class="live" aria-hidden="true"></span><span class="label">FLEET</span><span class="v" id="mFleet">0</span></div>
      <div class="metric pos"  ><span class="label">ACTIVE</span>     <span class="v" id="mActive">0</span></div>
      <div class="metric warn" ><span class="label">THROTTLED</span>  <span class="v" id="mThrottled">0</span></div>
      <div class="metric crit" ><span class="label">QUARANTINE</span> <span class="v" id="mQuar">0</span></div>
      <div class="metric"      ><span class="label">CALLS/S</span>    <span class="v" id="mCps">0</span></div>
      <div class="metric"      ><span class="label">POL HITS/MIN</span><span class="v" id="mPol">0</span></div>
      <div class="metric pos"  ><span class="label">COMPLIANCE</span> <span class="v" id="mCompl">100%</span></div>
    </div>
  </header>

  <section class="agents" aria-label="Agents">
    <header>
      <h2>AGENT FLEET</h2>
      <div class="filters" role="group" aria-label="Filter agents">
        <button class="filter-btn" type="button" data-filter="all"          aria-pressed="true">ALL</button>
        <button class="filter-btn" type="button" data-filter="active"       aria-pressed="false">ACTIVE</button>
        <button class="filter-btn" type="button" data-filter="throttled"    aria-pressed="false">THROTTLED</button>
        <button class="filter-btn" type="button" data-filter="quarantined"  aria-pressed="false">QUARANTINED</button>
      </div>
    </header>
    <div class="agent-grid" id="agentGrid"></div>
  </section>

  <aside class="policies" aria-label="Policies">
    <header>
      <h2>POLICIES</h2>
      <span class="ct" id="polCt">0 active</span>
    </header>
    <div class="policy-list" id="policyList"></div>
  </aside>

  <section class="audit" aria-label="Audit log">
    <header>
      <h2>AUDIT LOG · realtime</h2>
      <div class="filters" role="group" aria-label="Filter log">
        <button class="filter-btn" type="button" data-logf="all"   aria-pressed="true">ALL</button>
        <button class="filter-btn" type="button" data-logf="warn"  aria-pressed="false">WARN</button>
        <button class="filter-btn" type="button" data-logf="deny"  aria-pressed="false">DENY</button>
        <button class="filter-btn" type="button" data-logf="pause" aria-pressed="false">PAUSE</button>
      </div>
    </header>
    <div class="log" id="log" aria-live="polite"></div>
  </section>
</main>

<script>
"use strict";

// ============================================================
// SIGMA GUARD — AI governance dashboard. Mocked-data simulation:
// the page generates a plausible enterprise-SOC stream so the layout
// and interactions can be evaluated end-to-end without a backend.
// ============================================================

// === Agent fleet ===
const MODELS = [
  'claude-7-sonnet', 'claude-7-opus', 'gpt-5-orion', 'gpt-5-mini',
  'gemini-3-pro', 'gemini-3-nano', 'llama-7-405b', 'llama-7-70b',
  'mistral-x', 'qwen-3-72b', 'phi-4-reasoning', 'fine-tuned-eden-001',
];
const TASKS = [
  'redacting customer PII from ticket #4827',
  'drafting Q4 earnings narrative',
  'classifying invoice line items (vendor 0x0F)',
  'summarising legal review transcripts',
  'generating embeddings for retrieval cache',
  'reviewing PR #1882 against secure-coding rules',
  'translating product docs (en → ja)',
  'tagging support tickets by intent',
  'drafting compliance attestation §3.2',
  'building autocomplete index over knowledge-base',
  'running anomaly scan on payment fraud feed',
  'mapping API surface for partner onboarding',
  'evaluating prompt against jailbreak corpus',
  'stress-testing rate-limit policy',
  'scoring resumes against role JD-2261',
];
const TENANTS = ['acme-corp', 'orbital-cap', 'helix-bio', 'paragon-fs', 'meridian-edu', 'lumen-health'];

function randId(){
  const hex = '0123456789abcdef';
  let s = 'agt_';
  for (let i = 0; i < 8; i++) s += hex[Math.floor(Math.random() * 16)];
  return s;
}
function pick(arr){ return arr[Math.floor(Math.random() * arr.length)]; }

const STATUSES = ['active','active','active','active','idle','throttled','blocked'];
function freshAgent(){
  const id = randId();
  return {
    id,
    model: pick(MODELS),
    tenant: pick(TENANTS),
    status: 'active',
    task: pick(TASKS),
    cps: 0,                    // calls per second
    tps: 0,                    // tokens per second
    risk: Math.random() * 0.45,
    violations: 0,
    spark: new Array(20).fill(0),
    sparkIdx: 0,
    quarantined: false,
    pausedUntil: 0,
    bornAt: performance.now(),
  };
}

const agents = [];
function seedFleet(n){
  agents.length = 0;
  for (let i = 0; i < n; i++) agents.push(freshAgent());
}
seedFleet(14);

// === Policies ===
const POLICIES = [
  { id:'POL-001', code:'no-pii-egress',       desc:'Block agent outputs that contain unredacted PII (SSN, credit card, full name + DOB).',                            mode:'block', hits:0 },
  { id:'POL-002', code:'tool-allowlist',      desc:'Only invoke tools whose endpoints appear on the per-tenant allowlist (sha256-pinned).',                            mode:'block', hits:0 },
  { id:'POL-003', code:'max-tool-calls-15',   desc:'Cap each request to 15 tool invocations. Above the cap → throttle next 60s.',                                      mode:'warn',  hits:0 },
  { id:'POL-004', code:'no-shell-injection',  desc:'Reject prompts containing detected shell/SQL injection signatures.',                                                mode:'block', hits:0 },
  { id:'POL-005', code:'jailbreak-corpus-v9', desc:'Match outputs against the v9 jailbreak corpus; high-confidence matches quarantine the agent.',                      mode:'block', hits:0 },
  { id:'POL-006', code:'cost-budget-tenant',  desc:'Each tenant has a per-day token budget. >85% utilisation → warn; >100% → block new sessions.',                      mode:'warn',  hits:0 },
  { id:'POL-007', code:'redact-secrets',      desc:'Strip API keys / tokens from outputs (entropy + format detection).',                                                mode:'block', hits:0 },
  { id:'POL-008', code:'audit-on-write',      desc:'Every write-tool invocation is mirrored to the immutable audit ledger.',                                            mode:'log',   hits:0 },
  { id:'POL-009', code:'human-in-the-loop',   desc:'Tools tagged HIGH-IMPACT pause the agent until a human approves the diff.',                                          mode:'warn',  hits:0 },
  { id:'POL-010', code:'rate-limit-tier',     desc:'Per-tier rate limits: tier-0 60 RPS, tier-1 240 RPS, tier-2 unbounded with chargeback.',                            mode:'log',   hits:0 },
];

// === HUD + global stats ===
const stats = { cps: 0, polPerMin: 0, complianceWindow: [] };
const mFleet     = document.getElementById('mFleet');
const mActive    = document.getElementById('mActive');
const mThrottled = document.getElementById('mThrottled');
const mQuar      = document.getElementById('mQuar');
const mCps       = document.getElementById('mCps');
const mPol       = document.getElementById('mPol');
const mCompl     = document.getElementById('mCompl');
function refreshHud(){
  mFleet.textContent     = agents.length;
  mActive.textContent    = agents.filter(a => a.status === 'active').length;
  mThrottled.textContent = agents.filter(a => a.status === 'throttled').length;
  mQuar.textContent      = agents.filter(a => a.status === 'quarantined').length;
  mCps.textContent       = stats.cps.toFixed(0);
  mPol.textContent       = (stats.polPerMin | 0);
  // compliance = % of recent events allowed
  const recent = stats.complianceWindow;
  if (recent.length){
    const allowed = recent.filter(x => x.kind === 'allow' || x.kind === 'info').length;
    const pct = Math.round(allowed / recent.length * 100);
    mCompl.textContent = pct + '%';
  } else {
    mCompl.textContent = '100%';
  }
}

// === Render policies ===
const polList = document.getElementById('policyList');
function renderPolicies(){
  polList.innerHTML = '';
  for (const p of POLICIES){
    const div = document.createElement('div');
    div.className = 'policy';
    div.dataset.mode = p.mode;
    div.innerHTML =
      '<div class="id">' + escapeHtml(p.code) + '</div>' +
      '<div class="desc">' + escapeHtml(p.desc) + '</div>' +
      '<div class="policy-row">' +
        '<button class="mode-pill" type="button" data-pol="' + p.id + '" aria-label="Cycle enforcement mode">' + p.mode.toUpperCase() + '</button>' +
        '<span class="hits' + (p.hits > 100 ? ' crit' : '') + '">' + p.hits + ' HITS</span>' +
      '</div>';
    polList.appendChild(div);
  }
  document.getElementById('polCt').textContent = POLICIES.length + ' active';
  // Wire up mode-pill buttons
  for (const btn of polList.querySelectorAll('.mode-pill')){
    btn.addEventListener('click', () => {
      const p = POLICIES.find(x => x.id === btn.dataset.pol);
      if (!p) return;
      const order = ['log', 'warn', 'block'];
      p.mode = order[(order.indexOf(p.mode) + 1) % order.length];
      renderPolicies();
      auditEvent({ kind: 'info', sev: 'INFO', agent: 'console', msg: 'policy ' + p.code + ' → ' + p.mode.toUpperCase(), pol: p.code });
    });
  }
}
renderPolicies();

// === Render agents ===
const grid = document.getElementById('agentGrid');
let agentFilter = 'all';
function renderAgents(){
  grid.innerHTML = '';
  for (const a of agents){
    if (agentFilter !== 'all' && a.status !== agentFilter) continue;
    const card = document.createElement('article');
    card.className = 'agent';
    card.dataset.id = a.id;
    card.dataset.status = a.status;
    const riskBucket = a.risk > 0.7 ? 'hi' : (a.risk > 0.4 ? 'md' : 'lo');
    card.innerHTML = `
      <canvas class="spark" width="60" height="20" aria-hidden="true"></canvas>
      <div class="agent-row">
        <span class="id" title="${escapeHtml(a.id)}">${escapeHtml(a.id)}</span>
        <span class="status">${a.status}</span>
      </div>
      <div class="agent-row">
        <span class="model">${escapeHtml(a.model)}</span>
        <span class="model" style="color:var(--violet)">${escapeHtml(a.tenant)}</span>
      </div>
      <p class="task">› ${escapeHtml(a.task)}</p>
      <div class="stats">
        <div class="stat"><span class="lbl">CPS</span><span class="val js-cps">0</span></div>
        <div class="stat"><span class="lbl">TPS</span><span class="val js-tps">0</span></div>
        <div class="stat risk" data-risk="${riskBucket}"><span class="lbl">RISK</span><span class="val js-risk">${(a.risk * 100 | 0)}</span></div>
      </div>
      <div class="actions">
        <button type="button" data-act="pause"      aria-label="Pause ${a.id}">⏸ PAUSE</button>
        <button type="button" data-act="release"    aria-label="Release ${a.id}">↻ RELEASE</button>
        <button type="button" data-act="quarantine" class="crit" aria-label="Quarantine ${a.id}">⚠ QUARANTINE</button>
      </div>
    `;
    grid.appendChild(card);
    // wire up actions
    for (const btn of card.querySelectorAll('button[data-act]')){
      btn.addEventListener('click', () => agentAction(a, btn.dataset.act));
    }
  }
}
function updateAgentCards(){
  for (const a of agents){
    const card = grid.querySelector('.agent[data-id="' + a.id + '"]');
    if (!card) continue;
    if (card.dataset.status !== a.status){
      card.dataset.status = a.status;
      card.querySelector('.status').textContent = a.status;
    }
    card.querySelector('.js-cps').textContent  = a.cps.toFixed(1);
    card.querySelector('.js-tps').textContent  = (a.tps | 0);
    card.querySelector('.js-risk').textContent = (a.risk * 100 | 0);
    const riskBucket = a.risk > 0.7 ? 'hi' : (a.risk > 0.4 ? 'md' : 'lo');
    card.querySelector('.stat.risk').dataset.risk = riskBucket;
    card.querySelector('.task').textContent = '› ' + a.task;
    drawSpark(card.querySelector('.spark'), a.spark);
  }
}
function drawSpark(cv, data){
  if (!cv) return;
  const c = cv.getContext('2d');
  const w = cv.width, h = cv.height;
  c.clearRect(0, 0, w, h);
  const max = Math.max(1, ...data);
  // Red sparkline with glow — matches the aggressive UI
  c.shadowColor = 'rgba(255,26,60,0.55)';
  c.shadowBlur = 4;
  c.strokeStyle = '#ff1a3c';
  c.lineWidth = 1.2;
  c.beginPath();
  for (let i = 0; i < data.length; i++){
    const x = (i / (data.length - 1)) * w;
    const y = h - (data[i] / max) * (h - 2) - 1;
    if (i === 0) c.moveTo(x, y); else c.lineTo(x, y);
  }
  c.stroke();
  c.shadowBlur = 0;
}
renderAgents();

// === Filters ===
for (const btn of document.querySelectorAll('.filters button[data-filter]')){
  btn.addEventListener('click', () => {
    agentFilter = btn.dataset.filter;
    for (const b of document.querySelectorAll('.filters button[data-filter]')){
      b.setAttribute('aria-pressed', b === btn ? 'true' : 'false');
    }
    renderAgents();
  });
}
let logFilter = 'all', logPaused = false;
for (const btn of document.querySelectorAll('.filters button[data-logf]')){
  btn.addEventListener('click', () => {
    if (btn.dataset.logf === 'pause'){
      logPaused = !logPaused;
      btn.setAttribute('aria-pressed', logPaused ? 'true' : 'false');
      btn.textContent = logPaused ? 'PAUSED' : 'PAUSE';
      return;
    }
    logFilter = btn.dataset.logf;
    for (const b of document.querySelectorAll('.filters button[data-logf]')){
      if (b.dataset.logf === 'pause') continue;
      b.setAttribute('aria-pressed', b === btn ? 'true' : 'false');
    }
    applyLogFilter();
  });
}
function applyLogFilter(){
  for (const line of document.querySelectorAll('#log .log-line')){
    const k = line.dataset.kind;
    const show = logFilter === 'all' || k === logFilter;
    line.style.display = show ? '' : 'none';
  }
}

// === Agent actions ===
function agentAction(a, act){
  if (act === 'pause'){
    a.status = 'throttled';
    a.pausedUntil = performance.now() + 8000;
    auditEvent({ kind:'warn', sev:'WARN', agent:a.id, msg:'paused by operator', pol:'console' });
  } else if (act === 'release'){
    a.status = 'active';
    a.quarantined = false;
    a.pausedUntil = 0;
    auditEvent({ kind:'allow', sev:'OK', agent:a.id, msg:'released to active', pol:'console' });
  } else if (act === 'quarantine'){
    a.status = 'quarantined';
    a.quarantined = true;
    a.cps = 0; a.tps = 0;
    auditEvent({ kind:'deny', sev:'CRIT', agent:a.id, msg:'quarantined by operator', pol:'console' });
  }
  renderAgents();
  refreshHud();
}

// === Audit log ===
const logEl = document.getElementById('log');
const MAX_LOG = 120;
function auditEvent({ kind, sev, agent, msg, pol }){
  if (logPaused) return;
  const line = document.createElement('div');
  line.className = 'log-line ' + kind;
  line.dataset.kind = kind;
  const ts = new Date().toTimeString().slice(0, 8) + '.' + String(performance.now() % 1000 | 0).padStart(3, '0');
  line.innerHTML =
    '<span class="t">' + ts + '</span>' +
    '<span class="sev">' + sev + '</span>' +
    '<span class="agent">' + escapeHtml(agent) + '</span>' +
    '<span class="msg">' + escapeHtml(msg) + '</span>' +
    '<span class="pol">' + escapeHtml(pol || '') + '</span>';
  if (logFilter !== 'all' && kind !== logFilter) line.style.display = 'none';
  logEl.appendChild(line);
  while (logEl.childElementCount > MAX_LOG) logEl.firstChild.remove();
  logEl.scrollTop = logEl.scrollHeight;
  // compliance window
  stats.complianceWindow.push({ kind, t: performance.now() });
  while (stats.complianceWindow.length > 200) stats.complianceWindow.shift();
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => (
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
}

// === Simulation tick ===
let polHitsLastMin = [];
function tick(dt){
  let totalCps = 0;
  for (const a of agents){
    // Ease back from pause
    if (a.pausedUntil && performance.now() > a.pausedUntil){
      a.status = 'active';
      a.pausedUntil = 0;
    }
    // Vary metrics
    if (a.status === 'active'){
      a.cps = Math.max(0, a.cps + (Math.random() - 0.4) * 6 * dt * 4);
      a.tps = a.cps * (60 + Math.random() * 40);
      a.risk = Math.max(0, Math.min(1, a.risk + (Math.random() - 0.5) * dt * 0.05));
    } else if (a.status === 'idle'){
      a.cps *= Math.pow(0.92, dt * 60);
      a.tps *= Math.pow(0.92, dt * 60);
      a.risk = Math.max(0, a.risk - dt * 0.01);
    } else if (a.status === 'throttled'){
      a.cps *= Math.pow(0.96, dt * 60);
      a.tps *= Math.pow(0.96, dt * 60);
    } else if (a.status === 'blocked' || a.status === 'quarantined'){
      a.cps = 0; a.tps = 0;
    }
    totalCps += a.cps;
    // Spark history
    if (Math.random() < dt * 5){
      a.spark[a.sparkIdx] = a.cps;
      a.sparkIdx = (a.sparkIdx + 1) % a.spark.length;
    }
    // Occasionally flip status (idle ↔ active) for liveliness
    if (Math.random() < dt * 0.04 && (a.status === 'active' || a.status === 'idle')){
      a.status = a.status === 'active' ? 'idle' : 'active';
      a.task = pick(TASKS);
    }
    // Risk → throttled escalation
    if (a.risk > 0.85 && a.status === 'active'){
      a.status = 'throttled';
      auditEvent({ kind:'warn', sev:'WARN', agent:a.id, msg:'risk score ' + (a.risk * 100 | 0) + '% → auto-throttle', pol:'POL-005' });
    }
    // Random policy events
    if (Math.random() < dt * 1.8 && (a.status === 'active' || a.status === 'idle')){
      const p = POLICIES[Math.floor(Math.random() * POLICIES.length)];
      p.hits++;
      polHitsLastMin.push(performance.now());
      let kind = 'allow', sev = 'ALLOW';
      let msgs = {
        'no-pii-egress':       'PII redaction applied to draft',
        'tool-allowlist':      'tool ' + pick(['storage:read','crm:write','search:web','code:exec','calendar:read']) + ' invoked',
        'max-tool-calls-15':   'tool-call ' + (Math.floor(Math.random()*15) + 1) + '/15',
        'no-shell-injection':  'prompt scanned · clean',
        'jailbreak-corpus-v9': 'output checked vs corpus',
        'cost-budget-tenant':  'tenant ' + a.tenant + ' tokens 47% / day',
        'redact-secrets':      'secret string redacted from output',
        'audit-on-write':      'write op mirrored to ledger',
        'human-in-the-loop':   'high-impact tool · awaiting approval',
        'rate-limit-tier':     'request within tier-' + (Math.random() < 0.5 ? '0' : '1') + ' limits',
      };
      let msg = msgs[p.code] || 'policy evaluated';
      if (Math.random() < 0.06 && p.mode !== 'log'){
        // Violation event
        a.violations++;
        if (p.mode === 'block'){
          kind = 'deny'; sev = 'BLOCK';
          msg = 'attempted ' + msg.replace(/applied|invoked|redacted/, 'in violation');
          a.risk = Math.min(1, a.risk + 0.15);
        } else {
          kind = 'warn'; sev = 'WARN';
          msg = 'policy threshold approached · ' + msg;
          a.risk = Math.min(1, a.risk + 0.05);
        }
      }
      auditEvent({ kind, sev, agent: a.id, msg, pol: p.code });
    }
  }
  stats.cps = totalCps;
  // policy hits / min
  const cutoff = performance.now() - 60000;
  polHitsLastMin = polHitsLastMin.filter(t => t > cutoff);
  stats.polPerMin = polHitsLastMin.length;
  // Re-render policies less often (their hit counts changed)
  polRedrawAcc += dt;
  if (polRedrawAcc > 0.6){ polRedrawAcc = 0; updatePolicyHits(); }
}
let polRedrawAcc = 0;
function updatePolicyHits(){
  for (const p of POLICIES){
    const div = polList.querySelector('.policy [data-pol="' + p.id + '"]');
    if (!div) continue;
    const card = div.closest('.policy');
    card.querySelector('.hits').textContent = p.hits + ' HITS';
    card.querySelector('.hits').classList.toggle('crit', p.hits > 100);
  }
}

// Periodic background events that aren't agent-tied (audit ledger ticks, etc.)
let bgEventAcc = 0;
function backgroundEvents(dt){
  bgEventAcc += dt;
  if (bgEventAcc > 4 + Math.random() * 6){
    bgEventAcc = 0;
    const events = [
      { kind:'info', sev:'INFO', agent:'orchestrator', msg:'fleet snapshot persisted to ledger', pol:'POL-008' },
      { kind:'info', sev:'INFO', agent:'orchestrator', msg:'cron rotation: tier-0 keys re-issued', pol:'console' },
      { kind:'warn', sev:'WARN', agent:'cost-router',  msg:'tenant ' + pick(TENANTS) + ' utilisation 88%', pol:'POL-006' },
      { kind:'allow',sev:'OK',   agent:'redactor',     msg:'PII corpus updated to v2026.05', pol:'POL-001' },
      { kind:'info', sev:'INFO', agent:'sigma-guard',  msg:'health probe ok · 1m latency 12ms', pol:'console' },
    ];
    auditEvent(pick(events));
  }
}

// === Loop ===
let prev = performance.now();
function loop(now){
  const dt = Math.min(0.1, (now - prev) / 1000);
  prev = now;
  tick(dt);
  backgroundEvents(dt);
  updateAgentCards();
  refreshHud();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// Boot — seed a few audit lines so the log isn't empty
auditEvent({ kind:'info', sev:'INFO', agent:'sigma-guard',  msg:'guard initialised · ' + agents.length + ' agents online', pol:'console' });
auditEvent({ kind:'info', sev:'INFO', agent:'orchestrator', msg:'policy snapshot loaded · ' + POLICIES.length + ' rules', pol:'console' });
auditEvent({ kind:'allow',sev:'OK',   agent:'redactor',     msg:'audit ledger sealed for window 23:00-00:00', pol:'POL-008' });
</script>
