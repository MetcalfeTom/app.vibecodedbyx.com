<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Blitz</title>
<link rel="icon" href="https://emojicdn.elk.sh/🚀">
<meta property="og:title" content="Neon Blitz">
<meta property="og:description" content="Retro neon space shooter with synth music. Blast waves of enemies in a neon void.">
<meta property="og:url" content="https://app.sloppy.live/neon-blitz/">
<meta property="og:image" content="https://app.sloppy.live/neon-blitz/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#000}
body{display:flex;align-items:center;justify-content:center;font-family:'Audiowide',sans-serif}
canvas{display:block;image-rendering:pixelated}
#start-screen{position:fixed;inset:0;background:rgba(0,0,0,.92);display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:10;cursor:pointer}
#start-screen.hidden{display:none}
#start-screen h1{font-size:clamp(28px,6vw,48px);color:#0ff;letter-spacing:4px;text-shadow:0 0 20px #0ff,0 0 40px #08f}
#start-screen .sub{font-family:'Share Tech Mono',monospace;font-size:clamp(11px,2vw,14px);color:#f0f;margin:12px 0 24px;letter-spacing:2px}
#start-screen .prompt{font-family:'Share Tech Mono',monospace;font-size:12px;color:rgba(255,255,255,.4);animation:blink 1.2s step-end infinite}
@keyframes blink{50%{opacity:0}}
#mobile-controls{position:fixed;bottom:0;left:0;right:0;height:120px;display:none;z-index:5;pointer-events:none}
#mobile-controls button{pointer-events:auto;position:absolute;width:60px;height:60px;border-radius:50%;background:rgba(0,255,255,.08);border:1px solid rgba(0,255,255,.2);color:rgba(0,255,255,.4);font-size:20px;touch-action:none;-webkit-user-select:none;user-select:none}
#ml{left:16px;bottom:20px}
#mr{left:86px;bottom:20px}
#mfire{right:16px;bottom:20px}
.back-link{position:fixed;bottom:4px;left:8px;font-size:9px;color:rgba(255,255,255,.1);text-decoration:none;z-index:10}
@media(max-width:700px){#mobile-controls{display:block}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="start-screen">
<h1>NEON BLITZ</h1>
<div class="sub">RETRO SPACE ASSAULT</div>
<div class="prompt">[ CLICK OR TAP TO START ]</div>
</div>
<div id="mobile-controls">
<button id="ml">&larr;</button>
<button id="mr">&rarr;</button>
<button id="mfire">FIRE</button>
</div>
<a href="https://sloppy.live" class="back-link" target="_blank">sloppy.live</a>

<script>
const C=document.getElementById('c'),X=C.getContext('2d');
const GW=360,GH=640;
let scale=1,offX=0,offY=0;

function resize(){
  let ww=window.innerWidth,wh=window.innerHeight;
  scale=Math.min(ww/GW,wh/GH);
  C.width=GW*scale;C.height=GH*scale;
  offX=(ww-C.width)/2;offY=(wh-C.height)/2;
  C.style.marginLeft=offX+'px';C.style.marginTop=offY+'px';
  X.setTransform(scale,0,0,scale,0,0);
}
resize();window.addEventListener('resize',resize);

// --- STATE ---
let player,bullets,enemies,particles,powerups,stars;
let score,wave,lives,gameOver,frame,shakeTime,comboTimer,combo;
let keys={},started=false,musicStarted=false;
let hiScore=parseInt(localStorage.getItem('neonblitz_hi'))||0;

// --- SYNTH MUSIC ---
let actx=null,musicGain=null,bassOsc=null,leadOsc=null,arpOsc=null,kickInterval=null;
const BASS_NOTES=[55,55,65.41,73.42, 55,55,82.41,73.42];
const ARP_NOTES=[
  220,330,440,550, 261,392,523,659,
  293,440,587,733, 349,523,698,880
];
const LEAD_NOTES=[
  440,0,523,0,659,587,0,440,
  523,0,659,0,880,784,0,659
];

let musicStep=0,beatTimer=0;
const BPM=140,BEAT_LEN=60/(BPM*4);

function initAudio(){
  if(actx)return;
  actx=new(window.AudioContext||window.webkitAudioContext)();
  musicGain=actx.createGain();musicGain.gain.value=0.12;musicGain.connect(actx.destination);

  // Bass
  bassOsc=actx.createOscillator();bassOsc.type='sawtooth';bassOsc.frequency.value=55;
  let bassFilter=actx.createBiquadFilter();bassFilter.type='lowpass';bassFilter.frequency.value=200;
  let bassGain=actx.createGain();bassGain.gain.value=0.5;
  bassOsc.connect(bassFilter);bassFilter.connect(bassGain);bassGain.connect(musicGain);
  bassOsc.start();

  // Arp
  arpOsc=actx.createOscillator();arpOsc.type='square';arpOsc.frequency.value=220;
  let arpFilter=actx.createBiquadFilter();arpFilter.type='lowpass';arpFilter.frequency.value=1500;
  let arpGain=actx.createGain();arpGain.gain.value=0.12;
  arpOsc.connect(arpFilter);arpFilter.connect(arpGain);arpGain.connect(musicGain);
  arpOsc.start();

  // Lead
  leadOsc=actx.createOscillator();leadOsc.type='sine';leadOsc.frequency.value=440;
  let leadGain=actx.createGain();leadGain.gain.value=0;
  leadOsc.connect(leadGain);leadGain.connect(musicGain);
  leadOsc.leadGain=leadGain;
  leadOsc.start();

  musicStarted=true;
}

function updateMusic(dt){
  if(!musicStarted)return;
  beatTimer+=dt;
  if(beatTimer>=BEAT_LEN){
    beatTimer-=BEAT_LEN;
    let step=musicStep%16;
    // Bass: changes every 2 beats
    let bassIdx=Math.floor(musicStep/2)%BASS_NOTES.length;
    bassOsc.frequency.setTargetAtTime(BASS_NOTES[bassIdx],actx.currentTime,0.02);
    // Arp
    let arpIdx=musicStep%ARP_NOTES.length;
    arpOsc.frequency.setTargetAtTime(ARP_NOTES[arpIdx],actx.currentTime,0.005);
    // Lead
    let leadIdx=musicStep%LEAD_NOTES.length;
    let leadNote=LEAD_NOTES[leadIdx];
    if(leadNote>0){
      leadOsc.frequency.setTargetAtTime(leadNote,actx.currentTime,0.01);
      leadOsc.leadGain.gain.setTargetAtTime(0.18,actx.currentTime,0.01);
      leadOsc.leadGain.gain.setTargetAtTime(0,actx.currentTime+BEAT_LEN*0.7,0.05);
    } else {
      leadOsc.leadGain.gain.setTargetAtTime(0,actx.currentTime,0.01);
    }
    // Kick on beats 0,4,8,12
    if(step%4===0) playKick();
    // Hi-hat on even steps
    if(step%2===0) playHat();
    musicStep++;
  }
}

function playKick(){
  let o=actx.createOscillator();let g=actx.createGain();
  o.connect(g);g.connect(musicGain);
  o.type='sine';o.frequency.setValueAtTime(150,actx.currentTime);
  o.frequency.exponentialRampToValueAtTime(30,actx.currentTime+0.1);
  g.gain.setValueAtTime(0.6,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.15);
  o.start();o.stop(actx.currentTime+0.15);
}

function playHat(){
  let buf=actx.createBuffer(1,actx.sampleRate*0.03,actx.sampleRate);
  let d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*0.3;
  let s=actx.createBufferSource();s.buffer=buf;
  let g=actx.createGain();g.gain.setValueAtTime(0.15,actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.03);
  let f=actx.createBiquadFilter();f.type='highpass';f.frequency.value=8000;
  s.connect(f);f.connect(g);g.connect(musicGain);
  s.start();
}

function playSfx(type){
  if(!actx)return;
  let o=actx.createOscillator(),g=actx.createGain();
  o.connect(g);g.connect(actx.destination);
  if(type==='shoot'){o.type='square';o.frequency.setValueAtTime(880,actx.currentTime);o.frequency.exponentialRampToValueAtTime(220,actx.currentTime+0.06);g.gain.setValueAtTime(0.04,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.06);o.start();o.stop(actx.currentTime+0.06);}
  else if(type==='explode'){
    let buf=actx.createBuffer(1,actx.sampleRate*0.2,actx.sampleRate);let d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
    let s=actx.createBufferSource();s.buffer=buf;let g2=actx.createGain();g2.gain.setValueAtTime(0.1,actx.currentTime);g2.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.2);
    s.connect(g2);g2.connect(actx.destination);s.start();
    o.type='sine';o.frequency.setValueAtTime(200,actx.currentTime);o.frequency.exponentialRampToValueAtTime(40,actx.currentTime+0.2);g.gain.setValueAtTime(0.08,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.2);o.start();o.stop(actx.currentTime+0.2);
  }
  else if(type==='powerup'){o.type='sine';o.frequency.setValueAtTime(523,actx.currentTime);o.frequency.exponentialRampToValueAtTime(1047,actx.currentTime+0.15);g.gain.setValueAtTime(0.06,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.2);o.start();o.stop(actx.currentTime+0.2);}
  else if(type==='die'){o.type='sawtooth';o.frequency.setValueAtTime(400,actx.currentTime);o.frequency.exponentialRampToValueAtTime(50,actx.currentTime+0.5);g.gain.setValueAtTime(0.08,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.5);o.start();o.stop(actx.currentTime+0.5);}
  else if(type==='wave'){
    o.type='sine';o.frequency.setValueAtTime(330,actx.currentTime);g.gain.setValueAtTime(0.04,actx.currentTime);g.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.3);o.start();o.stop(actx.currentTime+0.3);
    let o2=actx.createOscillator(),g2=actx.createGain();o2.connect(g2);g2.connect(actx.destination);o2.type='sine';o2.frequency.setValueAtTime(440,actx.currentTime+0.1);g2.gain.setValueAtTime(0.04,actx.currentTime+0.1);g2.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.4);o2.start(actx.currentTime+0.1);o2.stop(actx.currentTime+0.4);
    let o3=actx.createOscillator(),g3=actx.createGain();o3.connect(g3);g3.connect(actx.destination);o3.type='sine';o3.frequency.setValueAtTime(660,actx.currentTime+0.2);g3.gain.setValueAtTime(0.04,actx.currentTime+0.2);g3.gain.exponentialRampToValueAtTime(0.001,actx.currentTime+0.5);o3.start(actx.currentTime+0.2);o3.stop(actx.currentTime+0.5);
  }
}

// --- GAME ---
function initGame(){
  player={x:GW/2,y:GH-60,w:16,h:20,speed:4,fireRate:8,fireCd:0,power:1,shield:0,invuln:0};
  bullets=[];enemies=[];particles=[];powerups=[];
  stars=[];for(let i=0;i<80;i++)stars.push({x:Math.random()*GW,y:Math.random()*GH,s:Math.random()*2+.5,sp:Math.random()*1.5+.5});
  score=0;wave=0;lives=3;gameOver=false;frame=0;shakeTime=0;comboTimer=0;combo=0;
  spawnWave();
}

const ENEMY_TYPES={
  drone:{w:14,h:14,hp:1,speed:1.5,score:100,color:'#0f0',shootRate:0},
  gunner:{w:16,h:16,hp:2,speed:1,score:200,color:'#ff0',shootRate:120},
  tank:{w:20,h:20,hp:4,speed:.7,score:400,color:'#f80',shootRate:90},
  elite:{w:18,h:18,hp:6,speed:1.2,score:600,color:'#f0f',shootRate:60}
};

function spawnWave(){
  wave++;
  let count=4+wave*2;
  let types=['drone','drone','gunner'];
  if(wave>=3)types.push('tank');
  if(wave>=5)types.push('elite');
  for(let i=0;i<count;i++){
    let t=types[Math.floor(Math.random()*types.length)];
    let et=ENEMY_TYPES[t];
    let cols=Math.min(8,3+wave);
    let row=Math.floor(i/cols);
    let col=i%cols;
    enemies.push({
      type:t,...et,
      x:50+col*(GW-100)/(cols-1||1)+Math.random()*10-5,
      y:-30-row*40,
      targetY:50+row*40+Math.random()*20,
      hp:et.hp+Math.floor(wave/4),maxHp:et.hp+Math.floor(wave/4),
      fireCd:Math.floor(Math.random()*et.shootRate),
      phase:Math.random()*Math.PI*2,
      arrived:false
    });
  }
  playSfx('wave');
}

function spawnParticles(x,y,color,count,speed){
  for(let i=0;i<count;i++){
    let a=Math.random()*Math.PI*2;
    let sp=(Math.random()*speed+speed*.3);
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:30+Math.random()*20,maxLife:50,color,size:Math.random()*3+1});
  }
}

function update(dt){
  frame++;
  if(gameOver)return;

  // Stars
  stars.forEach(s=>{s.y+=s.sp;if(s.y>GH){s.y=0;s.x=Math.random()*GW;}});

  // Player movement
  let dx=0;
  if(keys.ArrowLeft||keys.KeyA||keys.mLeft)dx=-player.speed;
  if(keys.ArrowRight||keys.KeyD||keys.mRight)dx=player.speed;
  player.x+=dx;
  player.x=Math.max(player.w,Math.min(GW-player.w,player.x));
  if(player.invuln>0)player.invuln--;
  if(player.shield>0)player.shield--;

  // Shooting
  player.fireCd--;
  if((keys.Space||keys.KeyZ||keys.mFire)&&player.fireCd<=0){
    player.fireCd=player.fireRate;
    let bx=player.x,by=player.y-player.h;
    bullets.push({x:bx,y:by,vx:0,vy:-8,isPlayer:true,dmg:1});
    if(player.power>=2){
      bullets.push({x:bx-8,y:by+4,vx:-0.5,vy:-8,isPlayer:true,dmg:1});
      bullets.push({x:bx+8,y:by+4,vx:0.5,vy:-8,isPlayer:true,dmg:1});
    }
    if(player.power>=3){
      bullets.push({x:bx-14,y:by+8,vx:-1,vy:-7,isPlayer:true,dmg:1});
      bullets.push({x:bx+14,y:by+8,vx:1,vy:-7,isPlayer:true,dmg:1});
    }
    playSfx('shoot');
  }

  // Bullets
  bullets=bullets.filter(b=>{
    b.x+=b.vx;b.y+=b.vy;
    return b.y>-10&&b.y<GH+10&&b.x>-10&&b.x<GW+10;
  });

  // Enemies
  let allDead=true;
  enemies.forEach(e=>{
    if(e.hp<=0)return;
    allDead=false;
    // Movement
    if(!e.arrived){
      e.y+=2.5;
      if(e.y>=e.targetY){e.arrived=true;}
    } else {
      e.x+=Math.sin(frame*0.02+e.phase)*0.8;
      e.y+=Math.sin(frame*0.015+e.phase*2)*0.3;
    }
    // Shooting
    if(e.shootRate>0&&e.arrived){
      e.fireCd--;
      if(e.fireCd<=0){
        e.fireCd=e.shootRate-Math.min(wave*2,30);
        let angle=Math.atan2(player.y-e.y,player.x-e.x);
        bullets.push({x:e.x,y:e.y+e.h/2,vx:Math.cos(angle)*3,vy:Math.sin(angle)*3,isPlayer:false,dmg:1});
      }
    }
    // Collision with player bullets
    bullets.forEach(b=>{
      if(!b.isPlayer||b.hit)return;
      if(Math.abs(b.x-e.x)<e.w&&Math.abs(b.y-e.y)<e.h){
        b.hit=true;
        e.hp-=b.dmg;
        spawnParticles(b.x,b.y,e.color,3,2);
        if(e.hp<=0){
          combo++;comboTimer=120;
          let mult=Math.min(combo,10);
          score+=e.score*mult;
          spawnParticles(e.x,e.y,e.color,12,4);
          playSfx('explode');
          shakeTime=6;
          // Powerup drop
          if(Math.random()<0.12){
            let types=['power','shield','rapid'];
            powerups.push({x:e.x,y:e.y,type:types[Math.floor(Math.random()*types.length)],vy:1});
          }
        }
      }
    });
  });
  enemies=enemies.filter(e=>e.hp>0);
  bullets=bullets.filter(b=>!b.hit);

  // Enemy bullets hit player
  if(player.invuln<=0){
    bullets.forEach(b=>{
      if(b.isPlayer||b.hit)return;
      if(Math.abs(b.x-player.x)<player.w&&Math.abs(b.y-player.y)<player.h){
        b.hit=true;
        if(player.shield>0){
          player.shield=0;
          spawnParticles(player.x,player.y,'#0ff',8,3);
        } else {
          lives--;
          player.invuln=90;
          player.power=Math.max(1,player.power-1);
          shakeTime=12;
          spawnParticles(player.x,player.y,'#0ff',15,4);
          playSfx('die');
          if(lives<=0){
            gameOver=true;
            if(score>hiScore){hiScore=score;localStorage.setItem('neonblitz_hi',hiScore);}
          }
        }
      }
    });
    bullets=bullets.filter(b=>!b.hit);
  }

  // Enemy collision with player
  if(player.invuln<=0){
    enemies.forEach(e=>{
      if(e.hp<=0)return;
      if(Math.abs(e.x-player.x)<(e.w+player.w)*0.7&&Math.abs(e.y-player.y)<(e.h+player.h)*0.7){
        e.hp=0;
        spawnParticles(e.x,e.y,e.color,10,4);
        if(player.shield>0){player.shield=0;}
        else{
          lives--;player.invuln=90;player.power=Math.max(1,player.power-1);
          shakeTime=12;playSfx('die');
          if(lives<=0){gameOver=true;if(score>hiScore){hiScore=score;localStorage.setItem('neonblitz_hi',hiScore);}}
        }
      }
    });
  }

  // Powerups
  powerups.forEach(p=>{
    p.y+=p.vy;
    if(Math.abs(p.x-player.x)<20&&Math.abs(p.y-player.y)<20){
      p.collected=true;
      if(p.type==='power')player.power=Math.min(3,player.power+1);
      else if(p.type==='shield')player.shield=300;
      else if(p.type==='rapid')player.fireRate=Math.max(3,player.fireRate-2);
      playSfx('powerup');
    }
  });
  powerups=powerups.filter(p=>!p.collected&&p.y<GH+20);

  // Particles
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=0.96;p.vy*=0.96;p.life--;});
  particles=particles.filter(p=>p.life>0);

  // Combo decay
  if(comboTimer>0)comboTimer--;
  else combo=0;

  // Shake
  if(shakeTime>0)shakeTime--;

  // Next wave
  if(allDead&&enemies.length===0) spawnWave();

  // Music
  updateMusic(1/60);
}

// --- RENDER ---
function render(){
  X.save();
  // Shake
  if(shakeTime>0){
    X.translate(Math.random()*shakeTime-shakeTime/2,Math.random()*shakeTime-shakeTime/2);
  }

  // BG
  X.fillStyle='#05050f';X.fillRect(0,0,GW,GH);

  // Grid lines (subtle)
  X.strokeStyle='rgba(0,255,255,.03)';X.lineWidth=0.5;
  for(let y=frame%40*1;y<GH;y+=40){X.beginPath();X.moveTo(0,y);X.lineTo(GW,y);X.stroke();}
  for(let x=0;x<GW;x+=40){X.beginPath();X.moveTo(x,0);X.lineTo(x,GH);X.stroke();}

  // Stars
  stars.forEach(s=>{
    X.fillStyle=`rgba(150,180,255,${0.3+s.sp*0.2})`;
    X.fillRect(s.x,s.y,s.s,s.s);
  });

  // Particles
  particles.forEach(p=>{
    let a=p.life/p.maxLife;
    X.globalAlpha=a;X.fillStyle=p.color;
    X.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
  });
  X.globalAlpha=1;

  // Powerups
  powerups.forEach(p=>{
    let col=p.type==='power'?'#f0f':p.type==='shield'?'#0ff':'#ff0';
    let pulse=Math.sin(frame*.1)*2;
    X.strokeStyle=col;X.lineWidth=1.5;
    X.beginPath();X.arc(p.x,p.y,6+pulse,0,Math.PI*2);X.stroke();
    X.fillStyle=col;X.font='bold 8px Share Tech Mono';X.textAlign='center';
    X.fillText(p.type==='power'?'P':p.type==='shield'?'S':'R',p.x,p.y+3);
  });

  // Enemies
  enemies.forEach(e=>{
    if(e.hp<=0)return;
    X.save();X.translate(e.x,e.y);
    // Glow
    X.shadowColor=e.color;X.shadowBlur=10;
    X.strokeStyle=e.color;X.lineWidth=1.5;
    // Shape based on type
    if(e.type==='drone'){
      X.beginPath();X.moveTo(0,-e.h/2);X.lineTo(e.w/2,e.h/2);X.lineTo(-e.w/2,e.h/2);X.closePath();X.stroke();
      X.fillStyle=e.color+'33';X.fill();
    } else if(e.type==='gunner'){
      X.strokeRect(-e.w/2,-e.h/2,e.w,e.h);
      X.fillStyle=e.color+'33';X.fillRect(-e.w/2,-e.h/2,e.w,e.h);
      X.beginPath();X.moveTo(0,e.h/2);X.lineTo(0,e.h/2+6);X.stroke();
    } else if(e.type==='tank'){
      X.beginPath();X.arc(0,0,e.w/2,0,Math.PI*2);X.stroke();
      X.fillStyle=e.color+'22';X.fill();
      X.beginPath();X.moveTo(-e.w/3,0);X.lineTo(e.w/3,0);X.stroke();
      X.beginPath();X.moveTo(0,-e.h/3);X.lineTo(0,e.h/3);X.stroke();
    } else if(e.type==='elite'){
      X.beginPath();X.moveTo(0,-e.h/2);X.lineTo(e.w/2,0);X.lineTo(0,e.h/2);X.lineTo(-e.w/2,0);X.closePath();X.stroke();
      X.fillStyle=e.color+'33';X.fill();
    }
    X.shadowBlur=0;
    // HP bar
    if(e.hp<e.maxHp){
      let bw=e.w+4;
      X.fillStyle='#333';X.fillRect(-bw/2,-e.h/2-6,bw,3);
      X.fillStyle=e.color;X.fillRect(-bw/2,-e.h/2-6,bw*(e.hp/e.maxHp),3);
    }
    X.restore();
  });

  // Bullets
  bullets.forEach(b=>{
    if(b.isPlayer){
      X.fillStyle='#0ff';
      X.shadowColor='#0ff';X.shadowBlur=6;
      X.fillRect(b.x-1.5,b.y-4,3,8);
      X.shadowBlur=0;
    } else {
      X.fillStyle='#f44';
      X.shadowColor='#f44';X.shadowBlur=4;
      X.beginPath();X.arc(b.x,b.y,2.5,0,Math.PI*2);X.fill();
      X.shadowBlur=0;
    }
  });

  // Player
  if(!gameOver&&(player.invuln<=0||frame%4<2)){
    X.save();X.translate(player.x,player.y);
    // Shield
    if(player.shield>0){
      X.strokeStyle=player.shield<60&&frame%6<3?'rgba(0,255,255,.2)':'rgba(0,255,255,.3)';
      X.lineWidth=1;X.beginPath();X.arc(0,0,player.w+4,0,Math.PI*2);X.stroke();
    }
    // Ship body
    X.shadowColor='#0ff';X.shadowBlur=8;
    X.strokeStyle='#0ff';X.lineWidth=1.5;
    X.beginPath();
    X.moveTo(0,-player.h);
    X.lineTo(player.w,-2);X.lineTo(player.w,player.h*.4);
    X.lineTo(4,player.h*.6);X.lineTo(0,player.h*.3);
    X.lineTo(-4,player.h*.6);X.lineTo(-player.w,player.h*.4);
    X.lineTo(-player.w,-2);X.closePath();
    X.stroke();X.fillStyle='rgba(0,255,255,.1)';X.fill();
    X.shadowBlur=0;
    // Engine
    let eLen=6+Math.random()*6;
    X.strokeStyle='#f80';X.lineWidth=1;
    X.beginPath();X.moveTo(-3,player.h*.4);X.lineTo(0,player.h*.4+eLen);X.lineTo(3,player.h*.4);X.stroke();
    // Power indicator dots
    for(let i=0;i<player.power;i++){
      X.fillStyle='#f0f';
      X.fillRect(-player.power*3+i*6,player.h*.6+4,3,3);
    }
    X.restore();
  }

  // HUD
  X.fillStyle='rgba(0,0,0,.4)';X.fillRect(0,0,GW,22);
  X.font='10px Audiowide';X.fillStyle='#0ff';X.textAlign='left';
  X.fillText('SCORE '+score,6,15);
  X.textAlign='center';
  X.fillStyle='#f0f';X.fillText('WAVE '+wave,GW/2,15);
  X.textAlign='right';
  // Lives
  for(let i=0;i<lives;i++){
    let lx=GW-10-i*14;
    X.strokeStyle='#0ff';X.lineWidth=1;
    X.beginPath();X.moveTo(lx,8);X.lineTo(lx+4,14);X.lineTo(lx-4,14);X.closePath();X.stroke();
  }
  // Combo
  if(combo>1&&comboTimer>0){
    X.globalAlpha=comboTimer/120;
    X.fillStyle='#ff0';X.font='bold 14px Audiowide';X.textAlign='center';
    X.fillText(combo+'x COMBO',GW/2,42);
    X.globalAlpha=1;
  }
  // Hi score
  X.fillStyle='rgba(255,255,255,.2)';X.font='8px Share Tech Mono';X.textAlign='right';
  X.fillText('HI '+hiScore,GW-6,GH-6);

  // Game over
  if(gameOver){
    X.fillStyle='rgba(0,0,0,.6)';X.fillRect(0,0,GW,GH);
    X.fillStyle='#f44';X.font='24px Audiowide';X.textAlign='center';
    X.fillText('GAME OVER',GW/2,GH/2-20);
    X.fillStyle='#0ff';X.font='12px Share Tech Mono';
    X.fillText('Score: '+score,GW/2,GH/2+10);
    X.fillText('Wave: '+wave,GW/2,GH/2+28);
    if(score>=hiScore&&score>0){X.fillStyle='#ff0';X.fillText('NEW HIGH SCORE!',GW/2,GH/2+48);}
    X.fillStyle='rgba(255,255,255,.4)';X.font='10px Share Tech Mono';
    X.fillText('Click or tap to restart',GW/2,GH/2+72);
  }

  X.restore();
}

// --- LOOP ---
let lastTime=0;
function loop(t){
  let dt=Math.min((t-lastTime)/1000,0.05);lastTime=t;
  if(started){update(dt);render();}
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// --- INPUT ---
document.addEventListener('keydown',e=>{keys[e.code]=true;if(e.code==='Space')e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.code]=false;});

function startGame(){
  document.getElementById('start-screen').classList.add('hidden');
  initAudio();initGame();started=true;
}

document.getElementById('start-screen').addEventListener('click',startGame);
document.getElementById('start-screen').addEventListener('touchend',e=>{e.preventDefault();startGame();});

// Restart on game over click
C.addEventListener('click',()=>{if(gameOver){initGame();}});
C.addEventListener('touchend',e=>{
  if(gameOver){e.preventDefault();initGame();}
});

// Mobile controls
['ml','mr','mfire'].forEach(id=>{
  let key=id==='ml'?'mLeft':id==='mr'?'mRight':'mFire';
  let el=document.getElementById(id);
  el.addEventListener('touchstart',e=>{e.preventDefault();keys[key]=true;},{passive:false});
  el.addEventListener('touchend',e=>{e.preventDefault();keys[key]=false;},{passive:false});
  el.addEventListener('touchcancel',e=>{keys[key]=false;});
});

// Touch move for player (drag horizontally)
let touchActive=false,touchStartX=0,playerStartX=0;
C.addEventListener('touchstart',e=>{
  if(gameOver)return;
  let t=e.touches[0];
  touchActive=true;touchStartX=t.clientX;playerStartX=player?player.x:GW/2;
  keys.mFire=true;
},{passive:true});
C.addEventListener('touchmove',e=>{
  if(!touchActive||!player)return;
  let t=e.touches[0];
  let dx=(t.clientX-touchStartX)/scale;
  player.x=Math.max(player.w,Math.min(GW-player.w,playerStartX+dx));
},{passive:true});
C.addEventListener('touchend',()=>{touchActive=false;keys.mFire=false;});
C.addEventListener('touchcancel',()=>{touchActive=false;keys.mFire=false;});
</script>
