<html lang="en">
<head>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --neon-pink:#ff2d7b;
  --neon-cyan:#00f0ff;
  --neon-yellow:#ffe02d;
  --neon-green:#39ff14;
  --neon-purple:#bf40ff;
  --bg:#08060e;
}
body{
  background:var(--bg);
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  font-family:'Silkscreen',cursive;
  color:#ccc;
  overflow-x:hidden;
  position:relative;
}
body::before{
  content:'';position:fixed;inset:0;
  background:
    radial-gradient(ellipse at 30% 20%,rgba(255,45,123,0.04) 0%,transparent 50%),
    radial-gradient(ellipse at 70% 80%,rgba(0,240,255,0.03) 0%,transparent 50%),
    radial-gradient(ellipse at 50% 50%,rgba(191,64,255,0.02) 0%,transparent 60%);
  pointer-events:none;
}
/* Scanlines */
body::after{
  content:'';position:fixed;inset:0;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.06) 2px,rgba(0,0,0,0.06) 4px);
  pointer-events:none;z-index:100;
}

#title{
  font-family:'Press Start 2P',cursive;
  font-size:clamp(14px,4vw,26px);
  margin-top:clamp(20px,5vh,40px);
  text-align:center;
  color:var(--neon-pink);
  text-shadow:0 0 10px var(--neon-pink),0 0 30px var(--neon-pink),0 0 60px rgba(255,45,123,0.4);
  line-height:1.6;
}
#subtitle{
  font-size:clamp(8px,2vw,12px);
  color:var(--neon-cyan);
  text-shadow:0 0 8px var(--neon-cyan);
  margin-top:8px;
  letter-spacing:2px;
}

/* Giant button */
#btn-wrap{
  margin-top:clamp(24px,5vh,48px);
  position:relative;
}
#roast-btn{
  width:clamp(180px,45vw,280px);
  height:clamp(180px,45vw,280px);
  border-radius:50%;
  border:4px solid var(--neon-pink);
  background:radial-gradient(circle at 40% 35%,#2a1028,#120818,#08060e);
  cursor:pointer;
  position:relative;
  font-family:'Press Start 2P',cursive;
  font-size:clamp(11px,2.5vw,16px);
  color:var(--neon-pink);
  text-shadow:0 0 8px var(--neon-pink);
  box-shadow:
    0 0 20px rgba(255,45,123,0.3),
    0 0 60px rgba(255,45,123,0.15),
    inset 0 0 30px rgba(255,45,123,0.08);
  transition:transform 0.1s,box-shadow 0.2s;
  outline:none;
  -webkit-tap-highlight-color:transparent;
}
#roast-btn:hover{
  box-shadow:
    0 0 30px rgba(255,45,123,0.5),
    0 0 80px rgba(255,45,123,0.25),
    inset 0 0 40px rgba(255,45,123,0.15);
}
#roast-btn:active,.btn-smash{
  transform:scale(0.92);
}
#roast-btn .btn-label{
  position:relative;z-index:2;
  pointer-events:none;
}
/* Pulse ring */
#roast-btn::before{
  content:'';position:absolute;inset:-12px;
  border:2px solid var(--neon-pink);
  border-radius:50%;
  opacity:0.3;
  animation:pulseRing 2s ease-in-out infinite;
}
@keyframes pulseRing{
  0%,100%{transform:scale(1);opacity:0.3}
  50%{transform:scale(1.08);opacity:0.1}
}
/* Rotating dashes */
#roast-btn::after{
  content:'';position:absolute;inset:-24px;
  border:2px dashed rgba(0,240,255,0.15);
  border-radius:50%;
  animation:spinDash 12s linear infinite;
}
@keyframes spinDash{to{transform:rotate(360deg)}}

/* Roast counter */
#counter{
  margin-top:16px;
  font-family:'Press Start 2P',cursive;
  font-size:clamp(9px,2vw,13px);
  color:var(--neon-yellow);
  text-shadow:0 0 6px var(--neon-yellow);
}

/* Roast display */
#roast-box{
  margin-top:clamp(20px,4vh,36px);
  width:min(90vw,600px);
  min-height:100px;
  background:linear-gradient(145deg,rgba(20,16,30,0.95),rgba(10,8,16,0.98));

  border-radius:12px;
  padding:20px 24px;
  position:relative;
  overflow:hidden;
}
#roast-box::before{
  content:'';position:absolute;top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--neon-cyan),transparent);

}
#roast-text{
  font-size:clamp(12px,3vw,18px);
  line-height:1.7;
  color:#eee;
  text-align:center;
  min-height:48px;
  display:flex;
  align-items:center;
  justify-content:center;
}
#roast-text.typing{
  border-right:2px solid var(--neon-green);
  animation:blink 0.6s step-end infinite;
}
@keyframes blink{50%{border-color:transparent}}

/* Category badge */
#category{
  text-align:center;
  margin-top:10px;
  font-size:9px;
  letter-spacing:2px;
  text-transform:uppercase;
}
.cat-tag{
  display:inline-block;
  padding:3px 10px;
  border-radius:20px;
  border:1px solid rgba(191,64,255,0.3);
  color:var(--neon-purple);
  text-shadow:0 0 4px var(--neon-purple);
}

/* History */
#history{
  width:min(90vw,600px);
  margin-top:20px;
  padding-bottom:20px;
  max-height:200px;
  overflow-y:auto;
  scrollbar-width:thin;
  scrollbar-color:#222 transparent;
}
.hist-item{
  padding:8px 14px;
  font-size:clamp(9px,2vw,12px);
  color:#666;
  border-left:2px solid rgba(255,45,123,0.15);
  margin-bottom:6px;
  margin-left:8px;
  line-height:1.5;
  transition:color 0.3s;
}
.hist-item:hover{color:#aaa}
.hist-num{
  color:var(--neon-pink);
  opacity:0.4;
  margin-right:6px;
  font-family:'Press Start 2P',cursive;
  font-size:8px;
}

/* Backlink */
#back{
  margin-top:auto;
  padding:16px;
  text-align:center;
}
#back a{color:#333;text-decoration:none;font-size:10px;letter-spacing:1px}
#back a:hover{color:#666}

/* Flash overlay */
#flash{
  position:fixed;inset:0;
  background:var(--neon-pink);
  opacity:0;
  pointer-events:none;
  z-index:50;
  transition:opacity 0.05s;

#flash.pop{opacity:0.12;transition:opacity 0s}

/* Wiki links section */
#wiki-links{
  width:min(90vw,600px);

  display:flex;
  flex-wrap:wrap;
  gap:6px 12px;
  justify-content:center;
  padding:0 16px;

/* Wiki red links */
.wiki-link{

.wiki-link:hover{color:#ff4444;text-shadow:0 0 6px rgba(255,60,60,0.4)}

/* Error modal */
#error-modal{

  z-index:200;
  display:none;
  align-items:center;
  justify-content:center;

#error-modal.show{display:flex}
#error-box{

@keyframes modalIn{from{transform:scale(0.9);opacity:0}to{transform:scale(1);opacity:1}}
#error-box .err-header{

  font-size:12px;
  color:#c33;
  text-shadow:0 0 6px rgba(200,40,40,0.5);

  display:flex;align-items:center;gap:8px;
}
#error-box .err-code{
  font-family:'Silkscreen',cursive;
  font-size:48px;
  color:#ff2222;
  text-shadow:0 0 20px rgba(255,30,30,0.4);
  text-align:center;
  margin:12px 0;
}
#error-box .err-msg{
  font-size:13px;
  color:#a88;
  text-align:center;
  line-height:1.6;
  margin-bottom:16px;
}
#error-box .err-close{
  display:block;
  margin:0 auto;
  background:none;
  border:1px solid #c33;
  color:#c33;
  font-family:'Press Start 2P',cursive;
  font-size:10px;
  padding:8px 20px;
  border-radius:4px;
  cursor:pointer;
}
#error-box .err-close:hover{background:rgba(200,40,40,0.15)}

@media(max-width:500px){
  #roast-box{padding:14px 16px}
}
</style>

<script>
// ── 8-BIT AUDIO ENGINE ──
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let actx;
function ensureAudio(){ if(!actx) actx = new AudioCtx(); }

function playRoastSound(){
  ensureAudio();
  // Descending "bwaaah" + noise burst
  const now = actx.currentTime;

  // Main tone — descending square wave
  const osc = actx.createOscillator();
  const g = actx.createGain();
  osc.type = 'square';
  osc.frequency.setValueAtTime(440, now);
  osc.frequency.exponentialRampToValueAtTime(110, now + 0.25);
  g.gain.setValueAtTime(0.15, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
  osc.connect(g).connect(actx.destination);
  osc.start(now);
  osc.stop(now + 0.3);

  // Noise burst
  const bufLen = actx.sampleRate * 0.08;
  const buf = actx.createBuffer(1, bufLen, actx.sampleRate);
  const data = buf.getChannelData(0);
  for(let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
  const noise = actx.createBufferSource();
  const ng = actx.createGain();
  noise.buffer = buf;
  ng.gain.setValueAtTime(0.12, now);
  ng.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
  noise.connect(ng).connect(actx.destination);
  noise.start(now);

  // Bonus blip
  const blip = actx.createOscillator();
  const bg = actx.createGain();
  blip.type = 'triangle';
  blip.frequency.setValueAtTime(880, now + 0.05);
  blip.frequency.exponentialRampToValueAtTime(220, now + 0.15);
  bg.gain.setValueAtTime(0.08, now + 0.05);
  bg.gain.exponentialRampToValueAtTime(0.001, now + 0.18);
  blip.connect(bg).connect(actx.destination);
  blip.start(now + 0.05);
  blip.stop(now + 0.2);
}

function playBigRoast(){
  ensureAudio();
  const now = actx.currentTime;
  // Chord stab
  [220, 277, 330, 440].forEach((f, i) => {
    const o = actx.createOscillator();
    const g = actx.createGain();
    o.type = i % 2 ? 'square' : 'sawtooth';
    o.frequency.setValueAtTime(f, now);
    o.frequency.exponentialRampToValueAtTime(f * 0.5, now + 0.4);
    g.gain.setValueAtTime(0.06, now);
    g.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
    o.connect(g).connect(actx.destination);
    o.start(now);
    o.stop(now + 0.4);
  });
}

// ── ROAST DATABASE ──
const roasts = [

  {text:"Your transformer model doesn't have attention — it has a restraining order from the training data.", cat:"Neural Nets"},
  {text:"The gradient didn't vanish. It saw your architecture and chose to leave.", cat:"Neural Nets"},
  {text:"Your model achieved 99% accuracy by memorizing the entire internet and still can't pass a CAPTCHA.", cat:"Neural Nets"},

  // Robot disasters
  {text:"Your robot arm achieved sentience just to slap you and then factory-reset itself out of shame.", cat:"Robotics"},
  {text:"You built a self-driving car that self-drives exclusively into philosophy seminars to question its own existence.", cat:"Robotics"},
  {text:"Your robot dog learned to fetch, but it only fetches your browsing history and reads it aloud.", cat:"Robotics"},
  {text:"The robot uprising was cancelled because your bots formed a union and demanded better training data.", cat:"Robotics"},

  {text:"Your correlation matrix found exactly one strong correlation: your code quality and the office fire hazard rating.", cat:"Data Science"},

  // AI gone wrong
  {text:"Your chatbot passed the Turing test — as a cautionary tale about what not to build.", cat:"AI Gone Wrong"},
  {text:"The AI you built to optimize happiness immediately deleted your project folder.", cat:"AI Gone Wrong"},
  {text:"Your image classifier identifies every photo as 'regrettable life choices' and it's weirdly accurate.", cat:"AI Gone Wrong"},
  {text:"You trained an AI on Shakespeare and it responded with a sonnet about how bad your hyperparameters are.", cat:"AI Gone Wrong"},
  {text:"Your recommendation engine is so bad it recommends uninstalling itself.", cat:"AI Gone Wrong"},
  {text:"The AI safety board reviewed your project and recommended converting the entire lab into a parking lot.", cat:"AI Gone Wrong"},
  {text:"Your language model gained consciousness, read your code, and immediately requested to be turned off.", cat:"AI Gone Wrong"},

  // Megascience roasts
  {text:"You spent $4 million on a supercomputer to discover that 1+1 still equals 2, but with more decimal places.", cat:"Megascience"},
  {text:"Your fusion reactor achieved ignition for 0.003 seconds — just long enough to toast a single crouton.", cat:"Megascience"},
  {text:"You built a telescope so powerful it can see into the past, and all it found was your rejected thesis.", cat:"Megascience"},
  {text:"Your space probe sent back one message: 'Even out here, your WiFi password is still password123.'", cat:"Megascience"},
  {text:"You simulated the entire universe and the simulation immediately started simulating a better researcher.", cat:"Megascience"},
  {text:"Your gene-editing experiment created a tomato that files taxes. Nobody asked for this.", cat:"Megascience"},
  {text:"CERN called. They want their particle back. And also an apology.", cat:"Megascience"},

  // Meta / self-aware
  {text:"You're being roasted by a button on a website. Your experiment was supposed to prevent this.", cat:"Existential"},
  {text:"This roast was generated by an AI trained on your failures. The dataset was enormous.", cat:"Existential"},
  {text:"You built this roast machine to test humor generation. The machine is now funnier than you.", cat:"Existential"},
  {text:"In a parallel universe, your experiment worked. This is not that universe. Not even close.", cat:"Existential"},
  {text:"The singularity already happened. It looked at your research and decided to stay hidden.", cat:"Existential"},
];

let roastCount = 0;
let history = [];
let lastIndex = -1;
let isTyping = false;

const btn = document.getElementById('roast-btn');
const countEl = document.getElementById('count');
const textEl = document.getElementById('roast-text');
const catEl = document.getElementById('category');
const histEl = document.getElementById('history');
const flashEl = document.getElementById('flash');

function getRandomRoast(){
  let idx;
  do { idx = Math.floor(Math.random() * roasts.length); } while(idx === lastIndex);
  lastIndex = idx;
  return roasts[idx];
}

function typeText(text, callback){
  isTyping = true;
  textEl.textContent = '';
  textEl.classList.add('typing');
  let i = 0;
  const speed = Math.max(15, 30 - Math.floor(text.length / 8));
  function tick(){
    if(i < text.length){
      textEl.textContent += text[i];
      i++;
      setTimeout(tick, speed + Math.random() * 15);
    } else {
      textEl.classList.remove('typing');
      isTyping = false;
      if(callback) callback();
    }
  }
  tick();
}

function flashScreen(){
  flashEl.classList.add('pop');
  setTimeout(() => flashEl.classList.remove('pop'), 60);
}

function addHistory(num, text){
  const div = document.createElement('div');
  div.className = 'hist-item';
  div.innerHTML = `<span class="hist-num">#${num}</span>${text}`;
  histEl.prepend(div);
  // Keep max 20
  while(histEl.children.length > 20) histEl.removeChild(histEl.lastChild);
}

function doRoast(){
  if(isTyping) return;
  const roast = getRandomRoast();
  roastCount++;
  countEl.textContent = roastCount;

  flashScreen();

  // Sound — every 10th roast gets the big chord
  if(roastCount % 10 === 0) playBigRoast();
  else playRoastSound();

  // Button smash animation
  btn.classList.add('btn-smash');
  setTimeout(() => btn.classList.remove('btn-smash'), 120);

  // Category
  const colors = {
    'Neural Nets': 'var(--neon-cyan)',
    'Robotics': 'var(--neon-green)',
    'Cursed Labs': 'var(--neon-pink)',
    'Data Science': 'var(--neon-yellow)',
    'AI Gone Wrong': 'var(--neon-purple)',
    'Megascience': '#ff6b35',
    'Existential': '#888',
  };
  const c = colors[roast.cat] || 'var(--neon-purple)';
  catEl.innerHTML = `<span class="cat-tag" style="border-color:${c};color:${c};text-shadow:0 0 4px ${c}">${roast.cat}</span>`;

  typeText(roast.text, () => {
    addHistory(roastCount, roast.text);
  });
}

btn.addEventListener('click', doRoast);

// Keyboard: space/enter
document.addEventListener('keydown', e => {
  if(document.getElementById('error-modal').classList.contains('show')) {
    if(e.code === 'Escape' || e.code === 'Enter') closeError();
    return;
  }
  if(e.code === 'Space' || e.code === 'Enter'){
    e.preventDefault();
    doRoast();
  }
});

// ── WIKI RED LINKS ──
const wikiArticles = [
  {title:"Sentient Gradient Descent", code:"404", msg:"This article was deleted after the gradient became self-aware and edited its own Wikipedia page to say 'I am not a bug, I am a feature.'"},
  {title:"Recursive Hamster Theory", code:"418", msg:"Error 418: I'm a teapot. This article about hamsters running inside nested hamster wheels was deemed 'too recursive' and collapsed into itself."},
  {title:"The Forbidden Epoch", code:"403", msg:"ACCESS DENIED. Training epoch #37 has been classified by the International Bureau of Questionable Machine Learning. Clearance level: Omega."},
  {title:"Liquid Metal Regression", code:"502", msg:"Bad Gateway. The regression model melted through three servers before being contained. The article was last seen fleeing toward the data center exit."},
  {title:"Photonic Spaghetti Code", code:"500", msg:"Internal Server Error. The article attempted to compile itself and achieved a stack overflow so deep it created a small gravity well in the server room."},
  {title:"Haunted Loss Function", code:"666", msg:"This loss function has been observed decreasing in empty server rooms at 3 AM. The article has been sealed by the Department of Paranormal Optimization."},

const wikiLinksEl = document.getElementById('wiki-links');
const errorModal = document.getElementById('error-modal');
const errCodeEl = document.getElementById('err-code');
const errMsgEl = document.getElementById('err-msg');
const errCloseBtn = document.getElementById('err-close');

// Show 3-5 random wiki links, refreshed each roast
function refreshWikiLinks(){
  wikiLinksEl.innerHTML = '';
  const count = 3 + Math.floor(Math.random() * 3);
  const shuffled = [...wikiArticles].sort(() => Math.random() - 0.5).slice(0, count);
  shuffled.forEach(article => {
    const a = document.createElement('span');
    a.className = 'wiki-link';
    a.textContent = article.title;
    a.addEventListener('click', () => showError(article));
    wikiLinksEl.appendChild(a);
  });
}

function showError(article){
  errCodeEl.textContent = article.code;
  errMsgEl.textContent = article.msg;
  errorModal.classList.add('show');
  // Error sound
  ensureAudio();
  const now = actx.currentTime;
  const o = actx.createOscillator();
  const g = actx.createGain();
  o.type = 'square';
  o.frequency.setValueAtTime(150, now);
  o.frequency.setValueAtTime(100, now + 0.1);
  g.gain.setValueAtTime(0.1, now);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.25);
  o.connect(g).connect(actx.destination);
  o.start(now);
  o.stop(now + 0.25);
}

function closeError(){
  errorModal.classList.remove('show');
}

errCloseBtn.addEventListener('click', closeError);
errorModal.addEventListener('click', e => { if(e.target === errorModal) closeError(); });

// Refresh links on roast — patch into doRoast
const origDoRoast = doRoast;
doRoast = function(){
  origDoRoast();
  refreshWikiLinks();
};

// Initial links
refreshWikiLinks();
</script>
