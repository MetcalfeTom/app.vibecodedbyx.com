<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Logic Gate Simulator</title>
<link rel="icon" href="https://emojicdn.elk.sh/⚡">
<meta property="og:title" content="Logic Gate Simulator">
<meta property="og:description" content="Wire up logic gates and watch truth tables come alive.">
<meta property="og:url" content="https://sloppy.live/logic-gates">
<meta property="og:image" content="https://emojicdn.elk.sh/⚡?style=apple&size=512">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Fira+Code:wght@300;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a12;font-family:'Fira Code',monospace;color:#c8d8e8}

#canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}

#toolbar{
  position:fixed;top:0;left:0;right:0;z-index:10;
  display:flex;align-items:center;gap:6px;
  padding:8px 12px;
  background:rgba(10,10,18,0.92);
  border-bottom:1px solid rgba(0,255,180,0.15);
  backdrop-filter:blur(8px);
  overflow-x:auto;
}
#toolbar h1{
  font-family:'Orbitron',sans-serif;font-size:13px;font-weight:700;
  color:#00ffb4;margin-right:8px;white-space:nowrap;letter-spacing:1px;
}
.gate-btn{
  font-family:'Orbitron',sans-serif;font-size:10px;font-weight:400;
  background:rgba(0,255,180,0.08);border:1px solid rgba(0,255,180,0.25);
  color:#00ffb4;padding:5px 10px;border-radius:4px;cursor:pointer;
  white-space:nowrap;transition:all .15s;
}
.gate-btn:hover{background:rgba(0,255,180,0.18);border-color:#00ffb4}
.gate-btn.active{background:rgba(0,255,180,0.25);border-color:#00ffb4;box-shadow:0 0 8px rgba(0,255,180,0.3)}

#truth-panel{
  position:fixed;bottom:0;right:0;z-index:10;
  width:320px;max-height:50vh;overflow-y:auto;
  background:rgba(10,10,18,0.94);
  border-top:1px solid rgba(0,255,180,0.15);
  border-left:1px solid rgba(0,255,180,0.15);
  border-radius:8px 0 0 0;
  padding:12px;font-size:11px;
  backdrop-filter:blur(8px);
  transition:transform .3s;
}
#truth-panel.hidden{transform:translateY(100%)}
#truth-panel h2{
  font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;
  color:#00ffb4;margin-bottom:8px;letter-spacing:1px;
}
#truth-table{width:100%;border-collapse:collapse}
#truth-table th{
  font-family:'Orbitron',sans-serif;font-size:9px;font-weight:400;
  color:#00ffb4;padding:4px 6px;border-bottom:1px solid rgba(0,255,180,0.2);
  text-align:center;letter-spacing:1px;
}
#truth-table td{
  padding:3px 6px;text-align:center;font-size:11px;
  border-bottom:1px solid rgba(255,255,255,0.04);
}
.val-1{color:#00ffb4;text-shadow:0 0 6px rgba(0,255,180,0.5)}
.val-0{color:#555}

.hint{
  position:fixed;bottom:12px;left:12px;z-index:10;
  font-size:10px;color:rgba(200,216,232,0.35);
  pointer-events:none;transition:opacity 1s;
}

#toggle-truth{
  position:fixed;bottom:8px;right:328px;z-index:11;
  font-family:'Orbitron',sans-serif;font-size:9px;font-weight:400;
  background:rgba(10,10,18,0.9);border:1px solid rgba(0,255,180,0.2);
  color:#00ffb4;padding:4px 8px;border-radius:4px;cursor:pointer;
}

#clear-btn{
  font-family:'Orbitron',sans-serif;font-size:10px;font-weight:400;
  background:rgba(255,60,60,0.1);border:1px solid rgba(255,60,60,0.3);
  color:#ff4444;padding:5px 10px;border-radius:4px;cursor:pointer;
  margin-left:auto;white-space:nowrap;transition:all .15s;
}
#clear-btn:hover{background:rgba(255,60,60,0.25)}

a#back{position:fixed;bottom:8px;left:10px;font-size:9px;opacity:0.2;color:#888;text-decoration:none;z-index:5}
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="toolbar">
  <h1>LOGIC GATES</h1>
  <button class="gate-btn" data-gate="INPUT">INPUT</button>
  <button class="gate-btn" data-gate="AND">AND</button>
  <button class="gate-btn" data-gate="OR">OR</button>
  <button class="gate-btn" data-gate="NOT">NOT</button>
  <button class="gate-btn" data-gate="NAND">NAND</button>
  <button class="gate-btn" data-gate="NOR">NOR</button>
  <button class="gate-btn" data-gate="XOR">XOR</button>
  <button class="gate-btn" data-gate="XNOR">XNOR</button>
  <button class="gate-btn" data-gate="OUTPUT">OUTPUT</button>
  <button id="clear-btn">CLEAR</button>
</div>

<div id="truth-panel">
  <h2>TRUTH TABLE</h2>
  <table id="truth-table"><tbody></tbody></table>
</div>
<button id="toggle-truth">TABLE</button>

<div class="hint" id="hint">Click a gate button, then click canvas to place. Drag from output to input to connect.</div>

<a id="back" href="https://sloppy.live">sloppy.live</a>

<script>
(function(){
'use strict';

var canvas=document.getElementById('canvas');
var ctx=canvas.getContext('2d');
var W,H;
var dpr=window.devicePixelRatio||1;

function resize(){
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
}
resize();
window.addEventListener('resize',resize);

// Gate types
var GATE_DEFS={
  INPUT:{inputs:0,outputs:1,label:'IN',w:60,h:40,color:'#00ccff'},
  OUTPUT:{inputs:1,outputs:0,label:'OUT',w:60,h:40,color:'#ff6600'},
  AND:{inputs:2,outputs:1,label:'AND',w:70,h:50,color:'#00ffb4'},
  OR:{inputs:2,outputs:1,label:'OR',w:70,h:50,color:'#00ffb4'},
  NOT:{inputs:1,outputs:1,label:'NOT',w:70,h:50,color:'#ff44aa'},
  NAND:{inputs:2,outputs:1,label:'NAND',w:80,h:50,color:'#ffcc00'},
  NOR:{inputs:2,outputs:1,label:'NOR',w:70,h:50,color:'#ffcc00'},
  XOR:{inputs:2,outputs:1,label:'XOR',w:70,h:50,color:'#aa66ff'},
  XNOR:{inputs:2,outputs:1,label:'XNOR',w:80,h:50,color:'#aa66ff'}
};

function evalGate(type,a,b){
  switch(type){
    case'INPUT':return a;
    case'AND':return a&b;
    case'OR':return a|b;
    case'NOT':return a?0:1;
    case'NAND':return(a&b)?0:1;
    case'NOR':return(a|b)?0:1;
    case'XOR':return a^b;
    case'XNOR':return(a^b)?0:1;
    case'OUTPUT':return a;
  }
  return 0;
}

var gates=[];
var wires=[];
var nextId=1;
var selectedTool=null;
var draggingGate=null;
var dragOff={x:0,y:0};
var wiringFrom=null; // {gateId, portIdx, portType:'out'}
var hoverPort=null;
var mouseX=0,mouseY=0;

function createGate(type,x,y){
  var def=GATE_DEFS[type];
  var g={
    id:nextId++,type:type,x:x,y:y,
    w:def.w,h:def.h,color:def.color,label:def.label,
    numInputs:def.inputs,numOutputs:def.outputs,
    value:0,inputValues:[],outputValue:0
  };
  for(var i=0;i<def.inputs;i++)g.inputValues.push(0);
  gates.push(g);
  return g;
}

function getInputPort(g,idx){
  var spacing=g.h/(g.numInputs+1);
  return{x:g.x,y:g.y+spacing*(idx+1)};
}

function getOutputPort(g,idx){
  var spacing=g.h/(g.numOutputs+1);
  return{x:g.x+g.w,y:g.y+spacing*(idx+1)};
}

function dist(a,b){return Math.sqrt((a.x-b.x)*(a.x-b.x)+(a.y-b.y)*(a.y-b.y))}

function findPortAt(mx,my,excludeGateId,portType){
  var best=null,bestD=15;
  for(var i=0;i<gates.length;i++){
    var g=gates[i];
    if(g.id===excludeGateId)continue;
    if(portType==='in'||!portType){
      for(var j=0;j<g.numInputs;j++){
        var p=getInputPort(g,j);
        var d=dist(p,{x:mx,y:my});
        if(d<bestD){bestD=d;best={gateId:g.id,portIdx:j,portType:'in',pos:p}}
      }
    }
    if(portType==='out'||!portType){
      for(var j=0;j<g.numOutputs;j++){
        var p=getOutputPort(g,j);
        var d=dist(p,{x:mx,y:my});
        if(d<bestD){bestD=d;best={gateId:g.id,portIdx:j,portType:'out',pos:p}}
      }
    }
  }
  return best;
}

function findGateAt(mx,my){
  for(var i=gates.length-1;i>=0;i--){
    var g=gates[i];
    if(mx>=g.x&&mx<=g.x+g.w&&my>=g.y&&my<=g.y+g.h)return g;
  }
  return null;
}

// Propagation
function propagate(){
  // Reset
  for(var i=0;i<gates.length;i++){
    var g=gates[i];
    for(var j=0;j<g.numInputs;j++)g.inputValues[j]=0;
  }
  // Topological propagation (simple iterative — max 20 passes)
  for(var pass=0;pass<20;pass++){
    var changed=false;
    for(var i=0;i<gates.length;i++){
      var g=gates[i];
      var oldOut=g.outputValue;
      if(g.type==='INPUT'){
        g.outputValue=g.value;
      }else if(g.type==='OUTPUT'){
        g.outputValue=g.inputValues[0]||0;
      }else{
        g.outputValue=evalGate(g.type,g.inputValues[0]||0,g.inputValues[1]||0);
      }
      if(g.outputValue!==oldOut)changed=true;
    }
    // Propagate through wires
    for(var i=0;i<wires.length;i++){
      var w=wires[i];
      var srcGate=gateById(w.fromGate);
      var dstGate=gateById(w.toGate);
      if(srcGate&&dstGate){
        var val=srcGate.outputValue;
        if(dstGate.inputValues[w.toPort]!==val){
          dstGate.inputValues[w.toPort]=val;
          changed=true;
        }
      }
    }
    if(!changed)break;
  }
}

function gateById(id){
  for(var i=0;i<gates.length;i++)if(gates[i].id===id)return gates[i];
  return null;
}

// Drawing
function drawGate(g){
  var bright=g.outputValue?1:0.4;
  var col=g.color;

  // Body
  ctx.save();
  ctx.fillStyle='rgba(10,10,18,0.85)';
  ctx.strokeStyle=col;
  ctx.lineWidth=2;
  ctx.globalAlpha=0.3+bright*0.7;
  ctx.shadowColor=col;
  ctx.shadowBlur=bright*18;

  // Rounded rect
  var r=8;
  ctx.beginPath();
  ctx.moveTo(g.x+r,g.y);
  ctx.lineTo(g.x+g.w-r,g.y);
  ctx.quadraticCurveTo(g.x+g.w,g.y,g.x+g.w,g.y+r);
  ctx.lineTo(g.x+g.w,g.y+g.h-r);
  ctx.quadraticCurveTo(g.x+g.w,g.y+g.h,g.x+g.w-r,g.y+g.h);
  ctx.lineTo(g.x+r,g.y+g.h);
  ctx.quadraticCurveTo(g.x,g.y+g.h,g.x,g.y+g.h-r);
  ctx.lineTo(g.x,g.y+r);
  ctx.quadraticCurveTo(g.x,g.y,g.x+r,g.y);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // Label
  ctx.shadowBlur=0;
  ctx.globalAlpha=1;
  ctx.fillStyle=col;
  ctx.font='bold 12px Orbitron,sans-serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  var label=g.label;
  if(g.type==='INPUT')label=g.value?'1':'0';
  ctx.fillText(label,g.x+g.w/2,g.y+g.h/2);

  ctx.restore();

  // Ports
  for(var i=0;i<g.numInputs;i++){
    var p=getInputPort(g,i);
    drawPort(p,g.inputValues[i],col);
  }
  for(var i=0;i<g.numOutputs;i++){
    var p=getOutputPort(g,i);
    drawPort(p,g.outputValue,col);
  }
}

function drawPort(p,val,col){
  ctx.beginPath();
  ctx.arc(p.x,p.y,5,0,Math.PI*2);
  ctx.fillStyle=val?col:'#333';
  ctx.strokeStyle=col;
  ctx.lineWidth=1.5;
  if(val){
    ctx.shadowColor=col;
    ctx.shadowBlur=10;
  }
  ctx.fill();ctx.stroke();
  ctx.shadowBlur=0;
}

function drawWire(w){
  var srcGate=gateById(w.fromGate);
  var dstGate=gateById(w.toGate);
  if(!srcGate||!dstGate)return;
  var from=getOutputPort(srcGate,w.fromPort);
  var to=getInputPort(dstGate,w.toPort);
  var val=srcGate.outputValue;
  var col=val?'#00ffb4':'#2a3a3a';

  ctx.save();
  ctx.strokeStyle=col;
  ctx.lineWidth=val?2.5:1.5;
  if(val){ctx.shadowColor='#00ffb4';ctx.shadowBlur=12}

  // Bezier curve
  var dx=Math.abs(to.x-from.x)*0.5;
  ctx.beginPath();
  ctx.moveTo(from.x,from.y);
  ctx.bezierCurveTo(from.x+dx,from.y,to.x-dx,to.y,to.x,to.y);
  ctx.stroke();

  // Animated pulse when active
  if(val){
    var t=(Date.now()%1500)/1500;
    var px=bezierPoint(from.x,from.x+dx,to.x-dx,to.x,t);
    var py=bezierPoint(from.y,from.y,to.y,to.y,t);
    ctx.beginPath();
    ctx.arc(px,py,3,0,Math.PI*2);
    ctx.fillStyle='#00ffb4';
    ctx.shadowBlur=15;
    ctx.fill();
  }
  ctx.restore();
}

function bezierPoint(p0,p1,p2,p3,t){
  var u=1-t;
  return u*u*u*p0+3*u*u*t*p1+3*u*t*t*p2+t*t*t*p3;
}

function drawGrid(){
  ctx.save();
  ctx.strokeStyle='rgba(0,255,180,0.03)';
  ctx.lineWidth=1;
  var s=40;
  for(var x=0;x<W;x+=s){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(var y=0;y<H;y+=s){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}
  ctx.restore();
}

// Main loop
function draw(){
  ctx.clearRect(0,0,W,H);
  drawGrid();

  propagate();

  for(var i=0;i<wires.length;i++)drawWire(wires[i]);
  for(var i=0;i<gates.length;i++)drawGate(gates[i]);

  // Wiring preview
  if(wiringFrom){
    var srcGate=gateById(wiringFrom.gateId);
    if(srcGate){
      var from=getOutputPort(srcGate,wiringFrom.portIdx);
      ctx.save();
      ctx.strokeStyle='rgba(0,255,180,0.5)';
      ctx.lineWidth=2;
      ctx.setLineDash([6,4]);
      var dx=Math.abs(mouseX-from.x)*0.5;
      ctx.beginPath();
      ctx.moveTo(from.x,from.y);
      ctx.bezierCurveTo(from.x+dx,from.y,mouseX-dx,mouseY,mouseX,mouseY);
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }
  }

  requestAnimationFrame(draw);
}

// Events
var toolBtns=document.querySelectorAll('.gate-btn');
for(var i=0;i<toolBtns.length;i++){
  toolBtns[i].addEventListener('click',function(){
    var t=this.dataset.gate;
    if(selectedTool===t){selectedTool=null;this.classList.remove('active')}
    else{
      for(var j=0;j<toolBtns.length;j++)toolBtns[j].classList.remove('active');
      selectedTool=t;this.classList.add('active');
    }
  });
}

canvas.addEventListener('mousedown',function(e){
  var mx=e.clientX,my=e.clientY;
  mouseX=mx;mouseY=my;

  // Check if clicking on a port first
  var port=findPortAt(mx,my,0,null);
  if(port&&port.portType==='out'&&!selectedTool){
    wiringFrom=port;
    return;
  }

  // If tool selected, place gate
  if(selectedTool){
    var def=GATE_DEFS[selectedTool];
    createGate(selectedTool,mx-def.w/2,my-def.h/2);
    updateTruthTable();
    hideHint();
    return;
  }

  // Click INPUT to toggle
  var g=findGateAt(mx,my);
  if(g&&g.type==='INPUT'){
    // Check if near a port first
    var outP=getOutputPort(g,0);
    if(dist({x:mx,y:my},outP)<12){
      wiringFrom={gateId:g.id,portIdx:0,portType:'out'};
      return;
    }
    g.value=g.value?0:1;
    updateTruthTable();
    return;
  }

  // Start drag
  if(g){
    // Check ports
    for(var i=0;i<g.numOutputs;i++){
      var p=getOutputPort(g,i);
      if(dist({x:mx,y:my},p)<12){
        wiringFrom={gateId:g.id,portIdx:i,portType:'out'};
        return;
      }
    }
    draggingGate=g;
    dragOff.x=mx-g.x;dragOff.y=my-g.y;
  }
});

canvas.addEventListener('mousemove',function(e){
  mouseX=e.clientX;mouseY=e.clientY;
  if(draggingGate){
    draggingGate.x=mouseX-dragOff.x;
    draggingGate.y=mouseY-dragOff.y;
  }
});

canvas.addEventListener('mouseup',function(e){
  var mx=e.clientX,my=e.clientY;

  if(wiringFrom){
    var port=findPortAt(mx,my,wiringFrom.gateId,'in');
    if(port){
      // Check for existing wire to same input
      for(var i=wires.length-1;i>=0;i--){
        if(wires[i].toGate===port.gateId&&wires[i].toPort===port.portIdx){
          wires.splice(i,1);
        }
      }
      wires.push({
        fromGate:wiringFrom.gateId,fromPort:wiringFrom.portIdx,
        toGate:port.gateId,toPort:port.portIdx
      });
      updateTruthTable();
    }
    wiringFrom=null;
  }
  draggingGate=null;
});

// Touch support
canvas.addEventListener('touchstart',function(e){
  e.preventDefault();
  var t=e.touches[0];
  canvas.dispatchEvent(new MouseEvent('mousedown',{clientX:t.clientX,clientY:t.clientY}));
},{passive:false});
canvas.addEventListener('touchmove',function(e){
  e.preventDefault();
  var t=e.touches[0];
  canvas.dispatchEvent(new MouseEvent('mousemove',{clientX:t.clientX,clientY:t.clientY}));
},{passive:false});
canvas.addEventListener('touchend',function(e){
  e.preventDefault();
  canvas.dispatchEvent(new MouseEvent('mouseup',{clientX:mouseX,clientY:mouseY}));
},{passive:false});

// Right-click to delete
canvas.addEventListener('contextmenu',function(e){
  e.preventDefault();
  var mx=e.clientX,my=e.clientY;
  var g=findGateAt(mx,my);
  if(g){
    // Remove wires connected to this gate
    for(var i=wires.length-1;i>=0;i--){
      if(wires[i].fromGate===g.id||wires[i].toGate===g.id)wires.splice(i,1);
    }
    gates.splice(gates.indexOf(g),1);
    updateTruthTable();
  }
});

// Clear
document.getElementById('clear-btn').addEventListener('click',function(){
  gates=[];wires=[];nextId=1;updateTruthTable();
});

// Truth table toggle
var truthPanel=document.getElementById('truth-panel');
document.getElementById('toggle-truth').addEventListener('click',function(){
  truthPanel.classList.toggle('hidden');
});

// Truth table generation
function getInputGates(){
  var r=[];
  for(var i=0;i<gates.length;i++)if(gates[i].type==='INPUT')r.push(gates[i]);
  return r;
}
function getOutputGates(){
  var r=[];
  for(var i=0;i<gates.length;i++)if(gates[i].type==='OUTPUT')r.push(gates[i]);
  return r;
}

function updateTruthTable(){
  var inputs=getInputGates();
  var outputs=getOutputGates();
  var tbody=document.querySelector('#truth-table tbody');
  tbody.innerHTML='';

  if(inputs.length===0||outputs.length===0){
    tbody.innerHTML='<tr><td colspan="99" style="color:#555;padding:8px">Place INPUT and OUTPUT gates to see truth table</td></tr>';
    return;
  }

  // Header
  var thead=document.querySelector('#truth-table thead');
  if(!thead){thead=document.createElement('thead');document.getElementById('truth-table').insertBefore(thead,tbody)}
  thead.innerHTML='';
  var hr=document.createElement('tr');
  for(var i=0;i<inputs.length;i++){
    var th=document.createElement('th');th.textContent='IN'+(i+1);hr.appendChild(th);
  }
  for(var i=0;i<outputs.length;i++){
    var th=document.createElement('th');th.textContent='OUT'+(i+1);th.style.color='#ff6600';hr.appendChild(th);
  }
  thead.appendChild(hr);

  // Save current input values
  var saved=[];
  for(var i=0;i<inputs.length;i++)saved.push(inputs[i].value);

  var combos=1<<inputs.length;
  if(combos>256){
    tbody.innerHTML='<tr><td colspan="99" style="color:#555;padding:8px">Too many inputs for truth table</td></tr>';
    for(var i=0;i<inputs.length;i++)inputs[i].value=saved[i];
    return;
  }

  for(var c=0;c<combos;c++){
    // Set input values
    for(var i=0;i<inputs.length;i++){
      inputs[i].value=(c>>(inputs.length-1-i))&1;
    }
    propagate();

    var tr=document.createElement('tr');
    for(var i=0;i<inputs.length;i++){
      var td=document.createElement('td');
      td.textContent=inputs[i].value;
      td.className=inputs[i].value?'val-1':'val-0';
      tr.appendChild(td);
    }
    for(var i=0;i<outputs.length;i++){
      var td=document.createElement('td');
      var v=outputs[i].inputValues[0]||0;
      td.textContent=v;
      td.className=v?'val-1':'val-0';
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }

  // Restore current input values
  for(var i=0;i<inputs.length;i++)inputs[i].value=saved[i];
  propagate();
}

function hideHint(){
  var h=document.getElementById('hint');
  if(h)h.style.opacity='0';
}
setTimeout(function(){hideHint()},8000);

draw();

})();
</script>

</body>
