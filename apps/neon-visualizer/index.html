<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>Neon Visualizer</title>
<link rel="icon" href="https://emojicdn.elk.sh/🎵">
<meta property="og:title" content="Neon Visualizer">
<meta property="og:description" content="Drop a song or use your mic — watch sound come alive in neon.">
<meta property="og:url" content="https://sloppy.live/neon-visualizer">
<meta property="og:image" content="https://emojicdn.elk.sh/🎵?style=apple&size=512">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Megrim&family=Fira+Code:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#06050e;user-select:none}
canvas{display:block;position:absolute;top:0;left:0}

#controls{
  position:fixed;bottom:0;left:0;right:0;z-index:10;
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;
  background:rgba(6,5,14,0.85);
  border-top:1px solid rgba(0,255,180,0.08);
  backdrop-filter:blur(8px);
}
.ctrl-btn{
  font-family:'Fira Code',monospace;font-size:10px;
  background:rgba(0,255,180,0.06);border:1px solid rgba(0,255,180,0.15);
  color:rgba(0,255,180,0.6);padding:6px 12px;border-radius:4px;
  cursor:pointer;transition:all .12s;white-space:nowrap;
}
.ctrl-btn:hover{background:rgba(0,255,180,0.12);color:#0fb}
.ctrl-btn.active{background:rgba(0,255,180,0.15);border-color:rgba(0,255,180,0.4);color:#0fb}
#file-input{display:none}
#track-name{
  flex:1;font-family:'Fira Code',monospace;font-size:10px;
  color:rgba(255,255,255,0.2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
#mode-label{
  font-family:'Fira Code',monospace;font-size:9px;
  color:rgba(0,255,180,0.25);letter-spacing:1px;
}

#drop-zone{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:30;
  display:none;align-items:center;justify-content:center;
  background:rgba(6,5,14,0.92);
}
#drop-zone.show{display:flex}
#drop-zone span{
  font-family:'Megrim',cursive;font-size:28px;color:#0fb;
  text-shadow:0 0 20px rgba(0,255,180,0.3);
  border:2px dashed rgba(0,255,180,0.2);
  padding:40px 60px;border-radius:12px;
}

#start-overlay{
  position:fixed;top:0;left:0;right:0;bottom:0;z-index:20;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(6,5,14,0.9);backdrop-filter:blur(4px);
  transition:opacity .5s;
}
#start-overlay.hidden{opacity:0;pointer-events:none}
#start-overlay h1{
  font-family:'Megrim',cursive;font-size:clamp(32px,7vw,56px);
  color:#0fb;letter-spacing:4px;
  text-shadow:0 0 30px rgba(0,255,180,0.3);
  margin-bottom:8px;
}
#start-overlay .sub{
  font-family:'Fira Code',monospace;font-size:12px;
  color:rgba(255,255,255,0.3);margin-bottom:28px;text-align:center;line-height:1.7;
}
#start-overlay .start-btn{
  font-family:'Megrim',cursive;font-size:18px;letter-spacing:3px;
  background:none;border:2px solid rgba(0,255,180,0.4);
  color:#0fb;padding:12px 40px;border-radius:6px;cursor:pointer;
  transition:all .2s;
}
#start-overlay .start-btn:hover{background:rgba(0,255,180,0.08);border-color:#0fb}

a#back{position:fixed;bottom:50px;left:10px;font-size:9px;opacity:0.15;color:#888;text-decoration:none;z-index:5}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="start-overlay">
  <h1>NEON VISUALIZER</h1>
  <div class="sub">Drop an audio file or use your microphone<br>Click to begin</div>
  <button class="start-btn" id="begin-btn">BEGIN</button>
</div>

<div id="controls">
  <button class="ctrl-btn" id="mic-btn">MIC</button>
  <button class="ctrl-btn" id="file-btn">FILE</button>
  <input type="file" id="file-input" accept="audio/*">
  <span id="track-name"></span>
  <button class="ctrl-btn" id="mode-btn">MODE</button>
  <span id="mode-label">BARS</span>
</div>

<div id="drop-zone"><span>Drop audio here</span></div>

<a id="back" href="https://sloppy.live">sloppy.live</a>

<script>
(function(){
'use strict';

var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
var W,H,dpr,cx,cy;

function resize(){
  dpr=window.devicePixelRatio||1;
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=W*dpr;canvas.height=H*dpr;
  canvas.style.width=W+'px';canvas.style.height=H+'px';
  ctx.setTransform(dpr,0,0,dpr,0,0);
  cx=W/2;cy=H/2;
}
resize();window.addEventListener('resize',resize);

var actx=null;
var analyser=null;
var source=null;
var freqData=null;
var timeData=null;
var FFT_SIZE=2048;
var started=false;
var mode=0;
var MODES=['BARS','CIRCLE','WAVE','MIRROR','RING'];
var time=0;
var peaks=[];
var smoothFreq=[];

function initAudio(){
  if(actx)return;
  actx=new(window.AudioContext||window.webkitAudioContext)();
  analyser=actx.createAnalyser();
  analyser.fftSize=FFT_SIZE;
  analyser.smoothingTimeConstant=0.82;
  freqData=new Uint8Array(analyser.frequencyBinCount);
  timeData=new Uint8Array(analyser.fftSize);
  for(var i=0;i<analyser.frequencyBinCount;i++){peaks.push(0);smoothFreq.push(0)}
}

function connectMic(){
  initAudio();
  if(source){try{source.disconnect()}catch(e){}}
  navigator.mediaDevices.getUserMedia({audio:true}).then(function(stream){
    source=actx.createMediaStreamSource(stream);
    source.connect(analyser);
    document.getElementById('track-name').textContent='Microphone';
    document.getElementById('mic-btn').classList.add('active');
  }).catch(function(e){
    document.getElementById('track-name').textContent='Mic denied';
  });
}

function loadFile(file){
  initAudio();
  if(source){try{source.disconnect()}catch(e){}}
  document.getElementById('mic-btn').classList.remove('active');
  document.getElementById('track-name').textContent=file.name;

  var reader=new FileReader();
  reader.onload=function(e){
    actx.decodeAudioData(e.target.result,function(buffer){
      if(source){try{source.disconnect()}catch(e){}}
      source=actx.createBufferSource();
      source.buffer=buffer;
      source.loop=true;
      source.connect(analyser);
      analyser.connect(actx.destination);
      source.start(0);
    });
  };
  reader.readAsArrayBuffer(file);
}

// Colors
var NEON_COLORS=[
  [0,255,180],  // green
  [0,200,255],  // cyan
  [180,0,255],  // purple
  [255,0,120],  // pink
  [255,180,0],  // orange
];

function getColor(i,total,alpha){
  var t=i/total;
  var idx=t*(NEON_COLORS.length-1);
  var lo=Math.floor(idx);
  var hi=Math.min(lo+1,NEON_COLORS.length-1);
  var f=idx-lo;
  var r=NEON_COLORS[lo][0]+(NEON_COLORS[hi][0]-NEON_COLORS[lo][0])*f;
  var g=NEON_COLORS[lo][1]+(NEON_COLORS[hi][1]-NEON_COLORS[lo][1])*f;
  var b=NEON_COLORS[lo][2]+(NEON_COLORS[hi][2]-NEON_COLORS[lo][2])*f;
  return'rgba('+Math.round(r)+','+Math.round(g)+','+Math.round(b)+','+(alpha||1)+')';
}

function getGlow(i,total){return getColor(i,total,0.5)}

// Drawing modes
function drawBars(){
  var bars=Math.min(128,freqData.length);
  var barW=W/bars;
  for(var i=0;i<bars;i++){
    var v=smoothFreq[i]/255;
    var h=v*H*0.75;
    var col=getColor(i,bars);
    var glow=getGlow(i,bars);

    ctx.save();
    ctx.fillStyle=col;
    ctx.shadowColor=glow;
    ctx.shadowBlur=8+v*12;
    ctx.fillRect(i*barW,H-h,barW-1,h);

    // Peak dot
    if(peaks[i]>2){
      ctx.fillStyle=col;
      ctx.globalAlpha=0.7;
      ctx.fillRect(i*barW,H-peaks[i],barW-1,2);
    }
    ctx.restore();
  }
}

function drawCircle(){
  var bars=128;
  var baseR=Math.min(W,H)*0.18;

  for(var i=0;i<bars;i++){
    var v=smoothFreq[i]/255;
    var angle=Math.PI*2*i/bars-Math.PI/2;
    var r1=baseR;
    var r2=baseR+v*Math.min(W,H)*0.3;
    var col=getColor(i,bars);

    ctx.save();
    ctx.strokeStyle=col;
    ctx.shadowColor=getGlow(i,bars);
    ctx.shadowBlur=6+v*10;
    ctx.lineWidth=2+v*2;
    ctx.beginPath();
    ctx.moveTo(cx+Math.cos(angle)*r1,cy+Math.sin(angle)*r1);
    ctx.lineTo(cx+Math.cos(angle)*r2,cy+Math.sin(angle)*r2);
    ctx.stroke();
    ctx.restore();
  }

  // Inner circle
  ctx.save();
  var bassAvg=(smoothFreq[0]+smoothFreq[1]+smoothFreq[2]+smoothFreq[3])/4/255;
  ctx.strokeStyle=getColor(0,1,0.3+bassAvg*0.4);
  ctx.shadowColor=getGlow(0,1);
  ctx.shadowBlur=15+bassAvg*20;
  ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(cx,cy,baseR-2+bassAvg*5,0,Math.PI*2);ctx.stroke();
  ctx.restore();
}

function drawWave(){
  analyser.getByteTimeDomainData(timeData);
  var sliceW=W/timeData.length;

  ctx.save();
  ctx.lineWidth=2;
  ctx.shadowBlur=10;

  // Draw 3 layers with offset
  for(var layer=0;layer<3;layer++){
    ctx.beginPath();
    ctx.strokeStyle=getColor(layer*40,120,0.6+layer*0.15);
    ctx.shadowColor=getGlow(layer*40,120);
    var yOff=(layer-1)*4;

    for(var i=0;i<timeData.length;i++){
      var v=timeData[i]/128-1;
      var y=cy+v*H*0.35+yOff;
      if(i===0)ctx.moveTo(0,y);
      else ctx.lineTo(i*sliceW,y);
    }
    ctx.stroke();
  }
  ctx.restore();
}

function drawMirror(){
  var bars=Math.min(128,freqData.length);
  var halfW=W/2;
  var barW=halfW/bars;

  for(var i=0;i<bars;i++){
    var v=smoothFreq[i]/255;
    var h=v*H*0.4;
    var col=getColor(i,bars);

    ctx.save();
    ctx.fillStyle=col;
    ctx.shadowColor=getGlow(i,bars);
    ctx.shadowBlur=6+v*8;
    // Right
    ctx.fillRect(halfW+i*barW,cy-h,barW-1,h*2);
    // Left (mirrored)
    ctx.fillRect(halfW-i*barW-barW,cy-h,barW-1,h*2);
    ctx.restore();
  }

  // Center line
  ctx.save();
  ctx.strokeStyle='rgba(0,255,180,0.1)';
  ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(halfW,0);ctx.lineTo(halfW,H);ctx.stroke();
  ctx.restore();
}

function drawRing(){
  var bars=64;
  var rings=5;
  var baseR=Math.min(W,H)*0.08;
  var ringGap=Math.min(W,H)*0.06;

  for(var r=0;r<rings;r++){
    var radius=baseR+r*ringGap;
    ctx.save();
    ctx.beginPath();

    for(var i=0;i<=bars;i++){
      var idx=Math.floor(i/bars*128)+r*8;
      if(idx>=smoothFreq.length)idx=smoothFreq.length-1;
      var v=smoothFreq[idx]/255;
      var angle=Math.PI*2*i/bars+time*0.3*(r%2?1:-1);
      var rv=radius+v*ringGap*1.5;
      var x=cx+Math.cos(angle)*rv;
      var y=cy+Math.sin(angle)*rv;
      if(i===0)ctx.moveTo(x,y);
      else ctx.lineTo(x,y);
    }

    ctx.closePath();
    ctx.strokeStyle=getColor(r*25,rings*25,0.6);
    ctx.shadowColor=getGlow(r*25,rings*25);
    ctx.shadowBlur=8;
    ctx.lineWidth=1.5;
    ctx.stroke();
    ctx.restore();
  }
}

var drawModes=[drawBars,drawCircle,drawWave,drawMirror,drawRing];

function draw(){
  time+=0.016;
  ctx.clearRect(0,0,W,H);

  // Background
  ctx.fillStyle='#06050e';
  ctx.fillRect(0,0,W,H);

  if(analyser){
    analyser.getByteFrequencyData(freqData);

    // Smooth and track peaks
    for(var i=0;i<freqData.length&&i<smoothFreq.length;i++){
      smoothFreq[i]+=(freqData[i]-smoothFreq[i])*0.25;
      if(smoothFreq[i]>peaks[i])peaks[i]=smoothFreq[i];
      else peaks[i]=Math.max(0,peaks[i]-0.8);
    }

    drawModes[mode]();
  }else{
    // Idle animation
    for(var i=0;i<64;i++){
      var a=Math.PI*2*i/64+time*0.5;
      var r=80+Math.sin(time*2+i*0.2)*20;
      ctx.save();
      ctx.globalAlpha=0.15+Math.sin(time*3+i)*0.1;
      ctx.fillStyle=getColor(i,64);
      ctx.beginPath();
      ctx.arc(cx+Math.cos(a)*r,cy+Math.sin(a)*r,2,0,Math.PI*2);
      ctx.fill();
      ctx.restore();
    }
  }

  requestAnimationFrame(draw);
}

// Events
document.getElementById('begin-btn').addEventListener('click',function(){
  initAudio();
  if(actx.state==='suspended')actx.resume();
  document.getElementById('start-overlay').classList.add('hidden');
  started=true;
});

document.getElementById('mic-btn').addEventListener('click',function(){
  if(!started)return;
  connectMic();
});

document.getElementById('file-btn').addEventListener('click',function(){
  document.getElementById('file-input').click();
});

document.getElementById('file-input').addEventListener('change',function(e){
  if(e.target.files.length>0)loadFile(e.target.files[0]);
});

document.getElementById('mode-btn').addEventListener('click',function(){
  mode=(mode+1)%MODES.length;
  document.getElementById('mode-label').textContent=MODES[mode];
});

// Drag and drop
var dropZone=document.getElementById('drop-zone');
document.addEventListener('dragover',function(e){e.preventDefault();dropZone.classList.add('show')});
document.addEventListener('dragleave',function(e){
  if(e.relatedTarget===null||e.relatedTarget===document.documentElement)dropZone.classList.remove('show');
});
document.addEventListener('drop',function(e){
  e.preventDefault();dropZone.classList.remove('show');
  if(!started){initAudio();document.getElementById('start-overlay').classList.add('hidden');started=true}
  var files=e.dataTransfer.files;
  if(files.length>0&&files[0].type.indexOf('audio')>=0){
    loadFile(files[0]);
  }
});

// Keyboard
document.addEventListener('keydown',function(e){
  if(e.key==='m'||e.key==='M'){
    mode=(mode+1)%MODES.length;
    document.getElementById('mode-label').textContent=MODES[mode];
  }
});

draw();

})();
</script>
<script src="/sloppy-header/sloppy-bar.js"></script>
</body>
</html>
