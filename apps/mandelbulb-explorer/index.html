<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Mandelbulb Explorer</title>
<meta name="description" content="A 3D Mandelbulb fractal you can orbit. Real-time GLSL distance-field ray marching." />
<meta property="og:title" content="Mandelbulb Explorer" />
<meta property="og:description" content="A 3D Mandelbulb fractal you can orbit. Real-time GLSL distance-field ray marching." />
<meta property="og:type" content="website" />
<meta property="og:url" content="https://sloppy.live/mandelbulb-explorer" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/3d%20mandelbulb%20fractal%20pure%20glsl%20raymarched%20electric%20pink%20violet%20cyan%20neon%20deep%20space%20background%20no%20text?width=1200&height=630&nologo=true" />
<link rel="icon" href="https://emojicdn.elk.sh/🌀" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500&family=Major+Mono+Display&family=Syne+Mono&display=swap" />
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
  html,body{height:100%;overflow:hidden;background:#03020a;color:#f0e8ff;font-family:'Syne Mono', monospace}
  body{
    width:100vw;height:100vh;display:block;position:relative;
    background:#03020a;cursor:grab;
  }
  body.grabbing{cursor:grabbing}

  canvas{position:fixed;inset:0;width:100vw;height:100vh;display:block}
  /* Subtle vignette + scanline overlay above the canvas */
  body::after{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:5;
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,0) 0 2px, rgba(255,255,255,0.020) 2px 3px),
      radial-gradient(circle at 50% 50%, transparent 35%, rgba(0,0,0,0.55) 100%);
    mix-blend-mode:screen;
  }

  header{
    position:fixed;top:0;left:0;right:0;z-index:10;
    display:flex;justify-content:space-between;align-items:flex-start;
    padding:22px 26px;pointer-events:none;
  }
  .title{
    font-family:'Major Mono Display', monospace;font-size:clamp(28px, 4vw, 46px);
    letter-spacing:0.06em;line-height:1;color:rgba(240,232,255,0.92);
    text-shadow:-2px 0 #ff3aa1, 2px 0 #3afaff, 0 0 20px rgba(255,80,200,0.4);
  }
  .title small{
    display:block;font-family:'Syne Mono', monospace;font-size:11px;
    letter-spacing:0.36em;color:rgba(240,232,255,0.55);margin-top:6px;
    text-shadow:none;text-transform:uppercase;
  }

  .controls{
    pointer-events:auto;display:flex;flex-direction:column;gap:8px;
    background:rgba(8,4,16,0.72);border:1px solid rgba(255,80,200,0.30);
    backdrop-filter:blur(6px);border-radius:8px;padding:12px 14px;
    min-width:230px;
    box-shadow:0 0 22px rgba(255,80,200,0.18);
  }
  .controls h3{
    font-family:'Major Mono Display', monospace;font-size:12px;
    letter-spacing:0.32em;color:rgba(240,232,255,0.55);
    text-transform:uppercase;margin-bottom:4px;font-weight:normal;
  }
  .row{
    display:flex;justify-content:space-between;align-items:center;gap:8px;
    font-family:'Syne Mono', monospace;font-size:11px;letter-spacing:0.14em;
    text-transform:uppercase;color:rgba(240,232,255,0.85);
  }
  .row .val{
    font-family:'Cormorant Garamond', serif;font-style:italic;
    font-weight:500;font-size:18px;color:#ff80c8;
    text-shadow:0 0 6px rgba(255,128,200,0.5);min-width:38px;text-align:right;
  }
  input[type=range]{
    -webkit-appearance:none;appearance:none;width:100%;height:4px;
    background:rgba(240,232,255,0.18);outline:none;border-radius:2px;
    cursor:pointer;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;appearance:none;width:14px;height:14px;
    background:#ff3aa1;border-radius:50%;cursor:pointer;
    box-shadow:0 0 10px rgba(255,58,161,0.8);
  }
  input[type=range]::-moz-range-thumb{
    width:14px;height:14px;background:#ff3aa1;border-radius:50%;
    border:none;cursor:pointer;box-shadow:0 0 10px rgba(255,58,161,0.8);
  }
  .pal-row{display:flex;gap:5px;flex-wrap:wrap}
  .pal-btn{
    flex:1;min-width:48px;background:rgba(8,4,16,0.5);
    border:1px solid rgba(240,232,255,0.22);color:rgba(240,232,255,0.7);
    font-family:'Syne Mono', monospace;font-size:10px;letter-spacing:0.16em;
    text-transform:uppercase;padding:5px 6px;cursor:pointer;border-radius:4px;
    transition:background 0.12s, border-color 0.12s, color 0.12s;
  }
  .pal-btn:hover{color:#fff;border-color:rgba(255,128,200,0.6)}
  .pal-btn.on{background:rgba(255,58,161,0.32);color:#fff;border-color:#ff3aa1}

  .footer-hint{
    position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:10;
    font-family:'Syne Mono', monospace;font-size:10px;letter-spacing:0.30em;
    text-transform:uppercase;color:rgba(240,232,255,0.42);text-align:center;
    pointer-events:none;
  }
</style>
</head>
<body>

<canvas id="mb"></canvas>

<header>
  <div class="title">
    Mandel·Bulb
    <small>raymarched · glsl · power-N fractal</small>
  </div>
  <div class="controls" id="controls">
    <h3>Parameters</h3>
    <div class="row"><span>Power</span><span class="val" id="powerVal">8.0</span></div>
    <input type="range" id="power" min="2" max="12" step="0.1" value="8" />
    <div class="row"><span>Iterations</span><span class="val" id="itersVal">10</span></div>
    <input type="range" id="iters" min="3" max="16" step="1" value="10" />
    <div class="row"><span>Detail</span><span class="val" id="detailVal">100</span></div>
    <input type="range" id="detail" min="40" max="160" step="2" value="100" />
    <h3 style="margin-top:6px">Palette</h3>
    <div class="pal-row" id="palRow">
      <button class="pal-btn on" data-p="0">Plasma</button>
      <button class="pal-btn"    data-p="1">Toxic</button>
      <button class="pal-btn"    data-p="2">Frost</button>
      <button class="pal-btn"    data-p="3">Ember</button>
    </div>
    <div class="row" style="margin-top:6px"><span>FPS</span><span class="val" id="fpsVal">—</span></div>
  </div>
</header>

<div class="footer-hint">
  drag · orbit · scroll · zoom · animate auto-rotate by default
</div>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

const cvs = document.getElementById('mb');
const renderer = new THREE.WebGLRenderer({ canvas: cvs, antialias: false, powerPreference: 'high-performance' });
renderer.setPixelRatio(Math.min(2, window.devicePixelRatio || 1));
function resize() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h, false);
  cvs.width = w * renderer.getPixelRatio();
  cvs.height = h * renderer.getPixelRatio();
  uniforms.uResolution.value.set(cvs.width, cvs.height);
}
window.addEventListener('resize', () => resize());

// ===== SHADER UNIFORMS =====
// Camera state is driven from JS — the shader receives a position +
// look-at point per frame and constructs ray directions internally.
const uniforms = {
  uResolution: { value: new THREE.Vector2() },
  uTime:       { value: 0 },
  uCamPos:     { value: new THREE.Vector3() },
  uCamTarget:  { value: new THREE.Vector3(0, 0, 0) },
  uPower:      { value: 8.0 },
  uIters:      { value: 10 },
  uMaxSteps:   { value: 100 },
  uPalette:    { value: 0 },
};

// ===== FRAGMENT SHADER (the Mandelbulb itself) =====
const FRAG = `
precision highp float;
uniform vec2  uResolution;
uniform float uTime;
uniform vec3  uCamPos;
uniform vec3  uCamTarget;
uniform float uPower;
uniform int   uIters;
uniform int   uMaxSteps;
uniform int   uPalette;

// Distance estimator for the Mandelbulb. Standard formula: iterate
// z = z^P + c in spherical coords, tracking d/dr to reconstruct an
// approximate distance to the surface from any point in space.
float bulbDE(vec3 p, out float orbitTrap) {
  vec3 z = p;
  float dr = 1.0;
  float r = 0.0;
  orbitTrap = 1e9;
  for (int i = 0; i < 20; i++) {
    if (i >= uIters) break;
    r = length(z);
    if (r > 2.0) break;
    // Spherical coords
    float theta = acos(z.z / r);
    float phi   = atan(z.y, z.x);
    dr = pow(r, uPower - 1.0) * uPower * dr + 1.0;
    // Iterate
    float zr = pow(r, uPower);
    theta = theta * uPower;
    phi   = phi   * uPower;
    z = zr * vec3(sin(theta) * cos(phi),
                  sin(phi) * sin(theta),
                  cos(theta));
    z += p;
    // Track closest approach to origin for color
    orbitTrap = min(orbitTrap, length(z));
  }
  return 0.5 * log(r) * r / dr;
}

// Soft shadow via secondary ray march toward a light direction
float softShadow(vec3 ro, vec3 rd, float k) {
  float res = 1.0;
  float t = 0.02;
  float trap;
  for (int i = 0; i < 32; i++) {
    vec3 p = ro + rd * t;
    float d = bulbDE(p, trap);
    if (d < 0.0008) return 0.0;
    res = min(res, k * d / t);
    t += clamp(d, 0.01, 0.2);
    if (t > 4.0) break;
  }
  return clamp(res, 0.0, 1.0);
}

// Surface normal via finite-difference gradient of the DE
vec3 calcNormal(vec3 p) {
  const float h = 0.0008;
  float trap;
  return normalize(vec3(
    bulbDE(p + vec3(h, 0.0, 0.0), trap) - bulbDE(p - vec3(h, 0.0, 0.0), trap),
    bulbDE(p + vec3(0.0, h, 0.0), trap) - bulbDE(p - vec3(0.0, h, 0.0), trap),
    bulbDE(p + vec3(0.0, 0.0, h), trap) - bulbDE(p - vec3(0.0, 0.0, h), trap)
  ));
}

// Palette mixer — orbitTrap (closest-approach distance to origin) +
// view depth + iter count combine into a scalar that we map to color.
vec3 paletteSample(int which, float t) {
  // Five-stop palettes — interpolate across rgb stops
  vec3 a, b, c, d;
  if (which == 0) { // PLASMA — pink → violet → cyan
    return mix(
      mix(vec3(1.00, 0.20, 0.55), vec3(0.55, 0.20, 0.95), smoothstep(0.0, 0.5, t)),
      mix(vec3(0.30, 0.85, 1.00), vec3(0.95, 0.95, 1.00), smoothstep(0.5, 1.0, t)),
      step(0.5, t)
    );
  } else if (which == 1) { // TOXIC — green → yellow → magenta
    return mix(
      mix(vec3(0.05, 0.55, 0.10), vec3(0.78, 0.92, 0.20), smoothstep(0.0, 0.5, t)),
      mix(vec3(0.95, 0.40, 0.10), vec3(1.00, 0.10, 0.55), smoothstep(0.5, 1.0, t)),
      step(0.5, t)
    );
  } else if (which == 2) { // FROST — deep blue → ice → white
    return mix(
      mix(vec3(0.05, 0.10, 0.35), vec3(0.20, 0.55, 0.80), smoothstep(0.0, 0.5, t)),
      mix(vec3(0.55, 0.85, 0.95), vec3(0.95, 1.00, 1.00), smoothstep(0.5, 1.0, t)),
      step(0.5, t)
    );
  } else { // EMBER — black → red → gold → white
    return mix(
      mix(vec3(0.05, 0.02, 0.02), vec3(0.85, 0.20, 0.05), smoothstep(0.0, 0.5, t)),
      mix(vec3(0.95, 0.65, 0.15), vec3(1.00, 0.95, 0.75), smoothstep(0.5, 1.0, t)),
      step(0.5, t)
    );
  }
}

void main() {
  // Build a ray from camera through this pixel
  vec2 ndc = (gl_FragCoord.xy * 2.0 - uResolution) / uResolution.y;
  vec3 fwd = normalize(uCamTarget - uCamPos);
  vec3 right = normalize(cross(fwd, vec3(0.0, 1.0, 0.0)));
  vec3 up = cross(right, fwd);
  vec3 rd = normalize(fwd + right * ndc.x + up * ndc.y);
  vec3 ro = uCamPos;

  float t = 0.0;
  float trap = 1e9;
  bool hit = false;
  int iSteps = 0;
  for (int i = 0; i < 200; i++) {
    if (i >= uMaxSteps) break;
    iSteps = i;
    vec3 p = ro + rd * t;
    float d = bulbDE(p, trap);
    if (d < 0.0006) { hit = true; break; }
    if (t > 8.0) break;
    t += d;
  }

  vec3 col;
  if (hit) {
    vec3 p = ro + rd * t;
    vec3 n = calcNormal(p);
    vec3 lightDir = normalize(vec3(0.6, 0.8, 0.5));
    float diff = clamp(dot(n, lightDir), 0.0, 1.0);
    float shadow = softShadow(p + n * 0.002, lightDir, 16.0);
    // Color base on orbit trap + step count for nice depth shading
    float colorT = clamp(trap * 0.9 + float(iSteps) / float(uMaxSteps) * 0.4, 0.0, 1.0);
    vec3 base = paletteSample(uPalette, colorT);
    // Lambertian + soft shadow + ambient + rim
    float rim = pow(1.0 - clamp(dot(n, -rd), 0.0, 1.0), 2.5);
    col = base * (0.18 + 0.82 * diff * (0.4 + 0.6 * shadow));
    col += base * rim * 0.6;
    // Fog toward background by depth
    float fogAmt = 1.0 - exp(-t * 0.20);
    vec3 bg = vec3(0.03, 0.02, 0.06);
    col = mix(col, bg, fogAmt * 0.55);
  } else {
    // Background — deep void with subtle gradient based on rd.y
    col = mix(vec3(0.03, 0.02, 0.06), vec3(0.06, 0.04, 0.12), 0.5 + rd.y * 0.5);
    // Distant star sparkle by hashing rd direction
    float h = fract(sin(dot(rd.xy * 50.0, vec2(12.9898, 78.233))) * 43758.5);
    if (h > 0.9985) col += vec3(0.7, 0.8, 1.0);
  }

  // Subtle vignette + chromatic-aberration tint at the edges
  vec2 uv = gl_FragCoord.xy / uResolution.xy;
  float vign = smoothstep(1.2, 0.4, length(uv - 0.5));
  col *= mix(0.5, 1.0, vign);
  // Output
  gl_FragColor = vec4(col, 1.0);
}
`;

const VERT = `
void main() { gl_Position = vec4(position, 1.0); }
`;

// ===== SCENE =====
const scene = new THREE.Scene();
const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 1);   // unused for raymarch — we pass our own cam in uniforms
const quad = new THREE.Mesh(
  new THREE.PlaneGeometry(2, 2),
  new THREE.ShaderMaterial({ vertexShader: VERT, fragmentShader: FRAG, uniforms })
);
scene.add(quad);
resize();

// ===== ORBIT CAMERA =====
const cam = {
  theta: 0.6,           // azimuth
  phi:   0.4,           // elevation
  radius: 2.6,
  autoRotate: true,
};
function updateCamUniform() {
  const x = cam.radius * Math.cos(cam.phi) * Math.cos(cam.theta);
  const y = cam.radius * Math.sin(cam.phi);
  const z = cam.radius * Math.cos(cam.phi) * Math.sin(cam.theta);
  uniforms.uCamPos.value.set(x, y, z);
}
updateCamUniform();

// Drag to orbit, wheel to zoom. Auto-rotate disables on first interact.
let dragging = false, lastX = 0, lastY = 0;
cvs.addEventListener('pointerdown', e => {
  dragging = true; lastX = e.clientX; lastY = e.clientY;
  cam.autoRotate = false;
  document.body.classList.add('grabbing');
  cvs.setPointerCapture(e.pointerId);
});
cvs.addEventListener('pointermove', e => {
  if (!dragging) return;
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  cam.theta -= dx * 0.005;
  cam.phi   = Math.max(-1.4, Math.min(1.4, cam.phi + dy * 0.005));
});
cvs.addEventListener('pointerup', e => {
  dragging = false; document.body.classList.remove('grabbing');
  try { cvs.releasePointerCapture(e.pointerId); } catch (err) {}
});
cvs.addEventListener('wheel', e => {
  e.preventDefault();
  cam.radius = Math.max(1.4, Math.min(6.0, cam.radius + e.deltaY * 0.002));
  cam.autoRotate = false;
}, { passive: false });

// ===== UI =====
const $ = id => document.getElementById(id);
function bindRange(id, valId, onChange) {
  const slider = $(id);
  const val = $(valId);
  function update() { val.textContent = slider.value; onChange(parseFloat(slider.value)); }
  slider.addEventListener('input', update);
  update();
}
bindRange('power',  'powerVal',  v => uniforms.uPower.value    = v);
bindRange('iters',  'itersVal',  v => uniforms.uIters.value    = Math.round(v));
bindRange('detail', 'detailVal', v => uniforms.uMaxSteps.value = Math.round(v));
document.querySelectorAll('.pal-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.pal-btn').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    uniforms.uPalette.value = parseInt(btn.dataset.p, 10);
  });
});

// ===== LOOP =====
let lastT = performance.now();
let fpsAccum = 0, fpsFrames = 0, fpsT = 0;
function loop(now) {
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  uniforms.uTime.value += dt;
  if (cam.autoRotate) cam.theta += dt * 0.18;
  updateCamUniform();
  renderer.render(scene, camera);
  // FPS readout
  fpsAccum += dt; fpsFrames++; fpsT += dt;
  if (fpsT > 0.5) {
    $('fpsVal').textContent = Math.round(fpsFrames / fpsAccum);
    fpsAccum = 0; fpsFrames = 0; fpsT = 0;
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
