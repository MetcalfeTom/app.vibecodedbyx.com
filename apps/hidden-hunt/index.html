<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hidden Hunt</title>
<link rel="icon" href="https://emojicdn.elk.sh/🔍">
<meta property="og:title" content="Hidden Hunt">
<meta property="og:description" content="Find letters hidden in hand-drawn scenes. Tap to reveal, beat the clock.">
<meta property="og:url" content="https://sloppy.live/hidden-hunt">
<meta property="og:image" content="https://sloppy.live/hidden-hunt/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Text&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1712;overflow:hidden;display:flex;flex-direction:column;align-items:center;min-height:100vh;font-family:'DM Serif Text',serif}
#hud{
  position:fixed;top:0;left:0;right:0;z-index:10;
  display:none;padding:8px 16px;
  background:rgba(26,23,18,.92);border-bottom:1px solid rgba(200,168,100,.15);
  font-size:13px;color:#c8a864;
}
#hud-inner{display:flex;align-items:center;justify-content:space-between;max-width:900px;margin:0 auto}
.hud-title{font-size:16px;font-weight:400;letter-spacing:3px}
.hud-stats{display:flex;gap:16px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#998855}
.hud-stats b{color:#c8a864}
#target-bar{
  display:flex;gap:8px;justify-content:center;margin-top:6px;flex-wrap:wrap;
}
.target-letter{
  width:20px;height:22px;border-radius:3px;
  background:rgba(200,168,100,.04);border:1px solid rgba(200,168,100,.1);
  display:inline-flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:600;color:rgba(200,168,100,.2);
  font-family:'IBM Plex Mono',monospace;transition:all .3s;
  margin:1px;
}
.target-letter.found{
  color:#c8a864;background:rgba(200,168,100,.15);
  border-color:rgba(200,168,100,.35);
  text-shadow:0 0 6px rgba(200,168,100,.4);
}
#canvas-wrap{
  position:relative;display:flex;align-items:center;justify-content:center;
  flex:1;width:100%;overflow:hidden;margin-top:60px;
}
canvas{display:block;cursor:crosshair;touch-action:none}
#start-screen,#complete-screen{
  position:fixed;inset:0;z-index:30;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:radial-gradient(ellipse at center,#221e16,#1a1712);gap:12px;
}
#start-screen h1{font-size:48px;color:#c8a864;letter-spacing:6px;text-shadow:0 0 30px rgba(200,168,100,.2)}
.sub{font-size:13px;color:#776644;letter-spacing:3px;font-family:'IBM Plex Mono',monospace}
.info{font-size:12px;color:#665533;line-height:2;text-align:center;margin:6px 0}
.btn{
  margin-top:8px;padding:13px 40px;border:2px solid #c8a864;border-radius:4px;
  background:transparent;color:#c8a864;font-size:17px;
  cursor:pointer;font-family:'DM Serif Text',serif;letter-spacing:2px;transition:all .15s;
}
.btn:hover{background:rgba(200,168,100,.1);box-shadow:0 0 16px rgba(200,168,100,.2)}
#complete-screen{display:none}
#complete-screen h2{font-size:36px;color:#c8a864}
#complete-stats{font-family:'IBM Plex Mono',monospace;font-size:13px;color:#998855;line-height:2}
#hint-btn{
  position:fixed;bottom:16px;right:16px;z-index:15;display:none;
  width:44px;height:44px;border-radius:50%;
  background:rgba(200,168,100,.1);border:1px solid rgba(200,168,100,.25);
  color:#c8a864;font-size:20px;cursor:pointer;
  font-family:'DM Serif Text';transition:all .15s;
}
#hint-btn:hover{background:rgba(200,168,100,.2)}
#lb-panel{
  position:fixed;top:50%;right:8px;z-index:15;transform:translateY(-50%);
  width:180px;max-height:50vh;overflow-y:auto;
  background:rgba(26,23,18,.88);border:1px solid rgba(200,168,100,.12);
  border-radius:6px;padding:8px;display:none;
}
#lb-panel h3{font-size:10px;color:#998855;letter-spacing:2px;text-align:center;margin-bottom:6px;font-family:'IBM Plex Mono',monospace}
.lb-row{display:flex;align-items:center;gap:4px;padding:3px 4px;font-family:'IBM Plex Mono',monospace;font-size:10px;color:#887744}
.lb-row.gold{color:#c8a864}.lb-row.silver{color:#aaa}.lb-row.bronze{color:#b87333}
.lb-rank{width:16px;text-align:right;opacity:.6}.lb-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-time{color:#c8a864;font-weight:600}
#submit-area{text-align:center;margin-top:10px}
#submit-area input{
  width:160px;padding:6px 10px;border:1px solid rgba(200,168,100,.25);border-radius:4px;
  background:rgba(200,168,100,.06);color:#c8a864;font-family:'IBM Plex Mono',monospace;
  font-size:12px;text-align:center;outline:none;
}
#submit-area input::placeholder{color:rgba(200,168,100,.3)}
#submit-area button{
  margin-top:6px;padding:6px 20px;border:1px solid rgba(200,168,100,.3);border-radius:4px;
  background:rgba(200,168,100,.08);color:#c8a864;font-size:11px;font-family:'IBM Plex Mono',monospace;
  cursor:pointer;letter-spacing:1px;transition:all .15s;
}
#submit-area button:hover{background:rgba(200,168,100,.15)}
</style>
</head>
<body>

<div id="hud">
  <div id="hud-inner">
    <span class="hud-title">HIDDEN HUNT</span>
    <div class="hud-stats">
      <span>Scene <b id="hud-scene">1</b>/5</span>
      <span>Found <b id="hud-found">0</b>/<b id="hud-total">0</b></span>
      <span>Time <b id="hud-time">0:00</b></span>
    </div>
  </div>
  <div id="target-bar"></div>
</div>

<div id="start-screen">
  <h1>HIDDEN HUNT</h1>
  <div class="sub">FIND THE HIDDEN LETTERS</div>
  <div class="info">
    All 26 letters of the alphabet are hidden in each scene.<br>
    Click/tap where you spot a letter to reveal it.<br>
    Find every letter A–Z to clear the scene. Good luck.
  </div>
  <button class="btn" id="start-btn">START HUNTING</button>
</div>

<div id="complete-screen">
  <h2 id="complete-title">SCENE COMPLETE</h2>
  <div id="complete-stats"></div>
  <div id="submit-area" style="display:none">
    <input type="text" id="playerName" placeholder="Your name" maxlength="15">
    <br><button id="submitBtn">SUBMIT TO LEADERBOARD</button>
  </div>
  <button class="btn" id="next-btn">NEXT SCENE</button>
  <div id="complete-lb"></div>
</div>

<div id="lb-panel">
  <h3>TOP TIMES</h3>
  <div id="lb-list"></div>
</div>

<button id="hint-btn" title="Hint">?</button>

<div id="canvas-wrap">
  <canvas id="c"></canvas>
</div>

<script src="/supabase-config.js"></script>
<script>
const C=document.getElementById('c'), X=C.getContext('2d');

// ── Scene themes ──
const THEMES=[
  {name:'Enchanted Forest',bg1:'#0a1a0a',bg2:'#0a0e14',ground:'#1a2a1a',
   elements:'trees',palette:['#1a3a1a','#2a5a2a','#3a7a3a','#0a2a0a','#1a4a2a','#2a3a1a','#4a6a3a'],
   letterCol:'#2a4a2a',accentCol:'#4a8a4a'},
  {name:'Desert Ruins',bg1:'#2a1a0a',bg2:'#1a1208',ground:'#3a2a1a',
   elements:'ruins',palette:['#4a3a2a','#5a4a3a','#3a2a1a','#6a5a4a','#2a2018','#8a7a6a','#5a4030'],
   letterCol:'#5a4a3a',accentCol:'#aa8a5a'},
  {name:'Ocean Depths',bg1:'#0a0a2a',bg2:'#060818',ground:'#0a1a2a',
   elements:'ocean',palette:['#0a2a4a','#1a3a5a','#0a1a3a','#2a4a6a','#0a2a3a','#1a4a5a','#0a3a5a'],
   letterCol:'#1a3a5a',accentCol:'#4a8acc'},
  {name:'Volcanic Cavern',bg1:'#1a0808',bg2:'#0e0404',ground:'#2a1010',
   elements:'cavern',palette:['#3a1a1a','#4a2020','#2a1010','#5a2a1a','#3a2018','#1a0a0a','#4a3020'],
   letterCol:'#3a2020',accentCol:'#cc6644'},
  {name:'Crystal Tundra',bg1:'#101820',bg2:'#0a1018',ground:'#1a2a3a',
   elements:'tundra',palette:['#2a3a4a','#3a4a5a','#1a2a3a','#4a5a6a','#2a3a5a','#3a5a6a','#1a3a4a'],
   letterCol:'#3a4a5a',accentCol:'#88bbdd'},
];

const ALPHABET='ABCDEFGHIJKLMNOPQRSTUVWXYZ';

// ── State ──
let W,H, sceneIdx=0, totalScenes=5;
let currentWord=ALPHABET, letters=[], foundCount=0;
let gameTime=0, timerInterval=null, hintsLeft=5;
let clickFeedback=[];

function resize(){
  W=Math.min(innerWidth,900);
  H=Math.min(innerHeight-80,600);
  C.width=W;C.height=H;
  C.style.width=W+'px';C.style.height=H+'px';
}
onresize=()=>{resize();if(letters.length)drawScene()};
resize();

// ── Procedural scene drawing ──
function seededRandom(seed){
  let s=seed;
  return()=>{s=(s*16807+0)%2147483647;return(s-1)/2147483646};
}

function drawSceneBackground(theme,seed){
  const rng=seededRandom(seed);
  // Sky gradient
  const grd=X.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,theme.bg1);grd.addColorStop(1,theme.bg2);
  X.fillStyle=grd;X.fillRect(0,0,W,H);

  // Ground
  const groundY=H*0.65;
  X.fillStyle=theme.ground;
  X.fillRect(0,groundY,W,H-groundY);

  const pal=theme.palette;
  const pick=()=>pal[Math.floor(rng()*pal.length)];

  if(theme.elements==='trees'){
    // Background trees
    for(let i=0;i<18;i++){
      const tx=rng()*W,th=60+rng()*120,tw=20+rng()*40;
      X.fillStyle=pick();
      // Trunk
      X.fillRect(tx-3,groundY-th*0.3,6,th*0.3);
      // Canopy layers
      for(let j=0;j<3;j++){
        X.beginPath();
        X.moveTo(tx-tw/2+j*4,groundY-th*0.3-j*15);
        X.lineTo(tx,groundY-th+j*10);
        X.lineTo(tx+tw/2-j*4,groundY-th*0.3-j*15);
        X.fill();
      }
    }
    // Bushes
    for(let i=0;i<25;i++){
      X.fillStyle=pick();
      const bx=rng()*W,by=groundY-rng()*20,br=10+rng()*25;
      X.beginPath();X.arc(bx,by,br,Math.PI,0);X.fill();
    }
    // Ground details
    for(let i=0;i<40;i++){
      X.fillStyle=pick();
      X.fillRect(rng()*W,groundY+rng()*(H-groundY),2+rng()*8,1+rng()*3);
    }
    // Mushrooms, rocks
    for(let i=0;i<12;i++){
      X.fillStyle=pick();
      const rx=rng()*W,ry=groundY+rng()*30;
      X.beginPath();X.ellipse(rx,ry,4+rng()*10,3+rng()*6,0,0,6.28);X.fill();
    }
  } else if(theme.elements==='ruins'){
    // Columns
    for(let i=0;i<10;i++){
      const cx=rng()*W,ch=50+rng()*120,cw=12+rng()*16;
      X.fillStyle=pick();X.fillRect(cx-cw/2,groundY-ch,cw,ch);
      X.fillStyle=pick();X.fillRect(cx-cw/2-4,groundY-ch,cw+8,8);
      X.fillRect(cx-cw/2-2,groundY-6,cw+4,6);
    }
    // Broken walls
    for(let i=0;i<8;i++){
      X.fillStyle=pick();
      const wx=rng()*W,wh=20+rng()*60,ww=30+rng()*60;
      X.fillRect(wx,groundY-wh,ww,wh);
      // Cracks
      X.strokeStyle=theme.bg2;X.lineWidth=1;
      for(let j=0;j<3;j++){
        X.beginPath();X.moveTo(wx+rng()*ww,groundY-wh);
        X.lineTo(wx+rng()*ww,groundY-rng()*wh);X.stroke();
      }
    }
    // Sand/ground stones
    for(let i=0;i<30;i++){
      X.fillStyle=pick();
      X.beginPath();X.ellipse(rng()*W,groundY+5+rng()*40,3+rng()*12,2+rng()*6,rng()*3,0,6.28);X.fill();
    }
  } else if(theme.elements==='ocean'){
    // Coral structures
    for(let i=0;i<14;i++){
      X.fillStyle=pick();
      const cx=rng()*W,ch=30+rng()*100;
      // Branching coral
      X.lineWidth=4+rng()*8;X.strokeStyle=pick();X.lineCap='round';
      X.beginPath();X.moveTo(cx,groundY);
      const branches=2+Math.floor(rng()*3);
      for(let b=0;b<branches;b++){
        X.lineTo(cx+(rng()-.5)*40,groundY-ch*((b+1)/branches));
      }
      X.stroke();
    }
    // Seaweed
    for(let i=0;i<20;i++){
      X.strokeStyle=pick();X.lineWidth=2+rng()*3;X.lineCap='round';
      const sx=rng()*W,sh=20+rng()*60;
      X.beginPath();X.moveTo(sx,groundY+10);
      for(let s=0;s<4;s++){
        X.quadraticCurveTo(sx+(rng()-.5)*20,groundY-sh*s/4,sx+(rng()-.5)*10,groundY-sh*(s+1)/4);
      }
      X.stroke();
    }
    // Bubbles
    for(let i=0;i<30;i++){
      X.strokeStyle='rgba(100,180,255,.15)';X.lineWidth=1;
      X.beginPath();X.arc(rng()*W,rng()*H,2+rng()*6,0,6.28);X.stroke();
    }
    // Sand floor
    for(let i=0;i<40;i++){
      X.fillStyle=pick();
      X.beginPath();X.ellipse(rng()*W,groundY+rng()*(H-groundY),4+rng()*15,2+rng()*4,0,0,6.28);X.fill();
    }
  } else if(theme.elements==='cavern'){
    // Stalactites from top
    for(let i=0;i<16;i++){
      X.fillStyle=pick();
      const sx=rng()*W,sl=30+rng()*100,sw=6+rng()*16;
      X.beginPath();X.moveTo(sx-sw/2,0);X.lineTo(sx,sl);X.lineTo(sx+sw/2,0);X.fill();
    }
    // Stalagmites from bottom
    for(let i=0;i<14;i++){
      X.fillStyle=pick();
      const sx=rng()*W,sl=20+rng()*70,sw=8+rng()*20;
      X.beginPath();X.moveTo(sx-sw/2,H);X.lineTo(sx,H-sl);X.lineTo(sx+sw/2,H);X.fill();
    }
    // Lava pools
    for(let i=0;i<5;i++){
      const grd2=X.createRadialGradient(rng()*W,groundY+20+rng()*30,0,rng()*W,groundY+20,30+rng()*20);
      grd2.addColorStop(0,'#cc4422');grd2.addColorStop(1,'transparent');
      X.fillStyle=grd2;X.fillRect(0,0,W,H);
    }
    // Rocks
    for(let i=0;i<25;i++){
      X.fillStyle=pick();
      X.beginPath();X.ellipse(rng()*W,groundY+rng()*50-20,5+rng()*18,4+rng()*10,rng()*3,0,6.28);X.fill();
    }
  } else if(theme.elements==='tundra'){
    // Snow hills
    for(let i=0;i<8;i++){
      X.fillStyle=pick();
      const hx=rng()*W,hr=60+rng()*100;
      X.beginPath();X.arc(hx,groundY+30,hr,Math.PI,0);X.fill();
    }
    // Ice crystals
    for(let i=0;i<10;i++){
      X.strokeStyle=pick();X.lineWidth=2+rng()*4;X.lineCap='round';
      const ix=rng()*W,iy=groundY-rng()*80,il=15+rng()*40;
      X.beginPath();X.moveTo(ix,iy);X.lineTo(ix,iy-il);X.stroke();
      X.beginPath();X.moveTo(ix-il*.3,iy-il*.4);X.lineTo(ix+il*.3,iy-il*.6);X.stroke();
    }
    // Snowflakes
    for(let i=0;i<40;i++){
      X.fillStyle='rgba(200,220,240,.12)';
      X.beginPath();X.arc(rng()*W,rng()*H,1+rng()*3,0,6.28);X.fill();
    }
    // Snow ground texture
    for(let i=0;i<30;i++){
      X.fillStyle=pick();
      X.fillRect(rng()*W,groundY+rng()*(H-groundY),3+rng()*20,1+rng()*3);
    }
  }
}

// ── Environmental letter shapes (theme-aware) ──
// Draws scene objects shaped like letters, with contextual detail per theme
let _envTheme=null; // set before drawing

// Helper: add organic detail along a stroke path
function addFoliage(pts,col,s){
  X.fillStyle=col;
  for(const [px,py] of pts){
    for(let i=0;i<3;i++){
      const ox=(Math.random()-.5)*s*.4, oy=(Math.random()-.5)*s*.4;
      const r=s*(.08+Math.random()*.1);
      X.beginPath();X.arc(px+ox,py+oy,r,0,6.28);X.fill();
    }
  }
}
function addBark(x1,y1,x2,y2,col,lw){
  // Draw a trunk-like thick line with slight wobble
  X.strokeStyle=col; X.lineWidth=lw; X.lineCap='round';
  X.beginPath(); X.moveTo(x1,y1);
  const mx=(x1+x2)/2+(Math.random()-.5)*lw, my=(y1+y2)/2+(Math.random()-.5)*lw;
  X.quadraticCurveTo(mx,my,x2,y2); X.stroke();
}
function addRock(x,y,rx,ry,col){
  X.fillStyle=col;
  X.beginPath();X.ellipse(x,y,rx,ry,Math.random()*.5,0,6.28);X.fill();
  // Crack detail
  X.strokeStyle=col;X.globalAlpha*=0.4;X.lineWidth=0.5;
  X.beginPath();X.moveTo(x-rx*.3,y);X.lineTo(x+rx*.2,y+ry*.3);X.stroke();
  X.globalAlpha/=0.4;
}
function addCoral(x,y,s,col){
  X.fillStyle=col;
  for(let i=0;i<4;i++){
    const ox=(Math.random()-.5)*s*.5, oy=(Math.random()-.5)*s*.5;
    X.beginPath();X.arc(x+ox,y+oy,s*.06+Math.random()*s*.05,0,6.28);X.fill();
  }
}

function drawEnvLetter(ch,x,y,s,col,col2){
  const t=_envTheme;
  const el=t?t.elements:'';
  X.fillStyle=col; X.strokeStyle=col2||col;
  X.lineCap='round'; X.lineJoin='round';
  const h=s, w=s*0.7;
  // Adaptive line width: thicker for organic themes
  const bw=el==='trees'?s*0.18:el==='ocean'?s*0.1:s*0.13;
  X.lineWidth=bw;

  // After drawing the letter shape, add contextual decoration
  function deco(pts){
    if(el==='trees') addFoliage(pts,col,s);
    else if(el==='ocean') pts.forEach(p=>addCoral(p[0],p[1],s,col2||col));
    else if(el==='ruins'){
      // Cracks and stone chips
      X.fillStyle=col2||col;X.globalAlpha*=0.5;
      pts.forEach(p=>{X.beginPath();X.ellipse(p[0],p[1],s*.06,s*.04,Math.random()*3,0,6.28);X.fill()});
      X.globalAlpha/=0.5;
    }
    else if(el==='tundra'){
      // Ice sparkle
      X.fillStyle='rgba(200,230,255,.3)';
      pts.forEach(p=>{X.beginPath();X.arc(p[0]+(Math.random()-.5)*s*.3,p[1]+(Math.random()-.5)*s*.3,s*.04,0,6.28);X.fill()});
    }
  }

  // Stroke helper that draws bark-like for trees, smooth for others
  function envStroke(x1,y1,x2,y2){
    if(el==='trees'){
      addBark(x1,y1,x2,y2,col2||col,bw);
    } else {
      X.strokeStyle=col2||col;X.lineWidth=bw;
      X.beginPath();X.moveTo(x1,y1);X.lineTo(x2,y2);X.stroke();
    }
  }

  switch(ch){
    case 'A': {// Tree/tent: two trunks meeting at top + crossbar branch
      envStroke(x,y-h*.45, x-w*.65,y+h*.45);
      envStroke(x,y-h*.45, x+w*.65,y+h*.45);
      envStroke(x-w*.32,y, x+w*.32,y);
      deco([[x,y-h*.45],[x-w*.5,y+h*.2],[x+w*.5,y+h*.2],[x-w*.32,y],[x+w*.32,y]]);
      break;}
    case 'B': {
      envStroke(x-w*.3,y-h*.45, x-w*.3,y+h*.45);
      X.strokeStyle=col2||col;X.lineWidth=bw;
      X.beginPath();X.arc(x+w*.05,y-h*.22,s*0.22,4.71,1.57);X.stroke();
      X.beginPath();X.arc(x+w*.08,y+h*.2,s*0.25,4.71,1.57);X.stroke();
      deco([[x+w*.2,y-h*.22],[x+w*.25,y+h*.2],[x-w*.3,y]]);
      break;}
    case 'C': {
      X.strokeStyle=col2||col;X.lineWidth=bw;
      X.beginPath();X.arc(x,y,s*0.42,0.6,5.7);X.stroke();
      deco([[x-s*.4,y],[x-s*.2,y-s*.35],[x-s*.2,y+s*.35]]);
      break;}
    case 'D': {
      envStroke(x-w*.3,y-h*.45, x-w*.3,y+h*.45);
      X.strokeStyle=col2||col;X.lineWidth=bw;
      X.beginPath();X.arc(x-w*.3,y,h*.45,4.71,1.57);X.stroke();
      deco([[x+w*.3,y],[x-w*.3,y-h*.3],[x-w*.3,y+h*.3]]);
      break;}
    case 'E': {
      envStroke(x-w*.3,y-h*.42, x-w*.3,y+h*.42);
      envStroke(x-w*.3,y-h*.42, x+w*.5,y-h*.42);
      envStroke(x-w*.3,y, x+w*.35,y);
      envStroke(x-w*.3,y+h*.42, x+w*.5,y+h*.42);
      deco([[x+w*.5,y-h*.42],[x+w*.35,y],[x+w*.5,y+h*.42]]);
      break;}
    case 'F': {
      envStroke(x-w*.3,y+h*.45, x-w*.3,y-h*.45);
      envStroke(x-w*.3,y-h*.42, x+w*.5,y-h*.42);
      envStroke(x-w*.3,y-h*.02, x+w*.35,y-h*.02);
      deco([[x+w*.5,y-h*.42],[x+w*.35,y-h*.02],[x-w*.3,y-h*.2]]);
      break;}
    case 'G': {
      X.strokeStyle=col2||col;X.lineWidth=bw;
      X.beginPath();X.arc(x,y,s*0.42,0.3,5.9);X.stroke();
      envStroke(x+s*.35,y, x+s*.1,y);
      deco([[x-s*.4,y],[x+s*.2,y],[x,y-s*.4]]);
      break;}
    case 'H': {
      envStroke(x-w*.4,y-h*.45, x-w*.4,y+h*.45);
      envStroke(x+w*.4,y-h*.45, x+w*.4,y+h*.45);
      envStroke(x-w*.4,y, x+w*.4,y);
      deco([[x-w*.4,y-h*.3],[x+w*.4,y-h*.3],[x,y]]);
      break;}
    case 'I': {
      envStroke(x,y-h*.45, x,y+h*.45);
      envStroke(x-w*.3,y-h*.45, x+w*.3,y-h*.45);
      envStroke(x-w*.3,y+h*.42, x+w*.3,y+h*.42);
      deco([[x,y-h*.2],[x,y+h*.2]]);
      break;}
    case 'J': {
      envStroke(x+w*.2,y-h*.45, x+w*.2,y+h*.15);
      X.strokeStyle=col2||col;X.lineWidth=bw;
      X.beginPath();X.arc(x-w*.05,y+h*.15,w*.25,0,Math.PI);X.stroke();
      deco([[x+w*.2,y-h*.3],[x-w*.1,y+h*.35]]);
      break;}
    case 'K': {
      envStroke(x-w*.3,y-h*.45, x-w*.3,y+h*.45);
      envStroke(x+w*.5,y-h*.4, x-w*.3,y);
      envStroke(x-w*.3,y, x+w*.5,y+h*.4);
      deco([[x+w*.5,y-h*.4],[x+w*.5,y+h*.4],[x-w*.3,y]]);
      break;}
    case 'L': {
      envStroke(x-w*.2,y-h*.45, x-w*.2,y+h*.45);
      envStroke(x-w*.2,y+h*.42, x+w*.7,y+h*.42);
      deco([[x-w*.2,y-h*.2],[x+w*.4,y+h*.42]]);
      break;}
    case 'M': {
      envStroke(x-w,y+h*.4, x-w*.4,y-h*.38);
      envStroke(x-w*.4,y-h*.38, x,y+h*.08);
      envStroke(x,y+h*.08, x+w*.4,y-h*.38);
      envStroke(x+w*.4,y-h*.38, x+w,y+h*.4);
      deco([[x-w*.4,y-h*.38],[x+w*.4,y-h*.38],[x,y+h*.08]]);
      break;}
    case 'N': {
      envStroke(x-w*.3,y+h*.45, x-w*.3,y-h*.45);
      envStroke(x-w*.3,y-h*.45, x+w*.3,y+h*.45);
      envStroke(x+w*.3,y+h*.45, x+w*.3,y-h*.45);
      deco([[x-w*.3,y-h*.3],[x+w*.3,y+h*.3],[x,y]]);
      break;}
    case 'O': {
      X.strokeStyle=col2||col;X.lineWidth=bw;
      X.beginPath();X.arc(x,y,s*0.42,0,6.28);X.stroke();
      X.fillStyle=col;X.globalAlpha*=0.15;X.fill();X.globalAlpha/=0.15;
      deco([[x-s*.3,y-s*.2],[x+s*.3,y-s*.2],[x,y+s*.35]]);
      break;}
    case 'P': {
      envStroke(x-w*.25,y+h*.45, x-w*.25,y-h*.45);
      X.strokeStyle=col2||col;X.lineWidth=bw;
      X.beginPath();X.arc(x+w*.1,y-h*.22,s*0.24,4.71,1.57);X.stroke();
      deco([[x+w*.3,y-h*.22],[x-w*.25,y-h*.35],[x-w*.25,y+h*.2]]);
      break;}
    case 'Q': {
      X.strokeStyle=col2||col;X.lineWidth=bw;
      X.beginPath();X.arc(x-w*.05,y-h*.05,s*0.38,0,6.28);X.stroke();
      envStroke(x+w*.15,y+h*.1, x+w*.55,y+h*.45);
      deco([[x-s*.35,y],[x+s*.35,y],[x+w*.4,y+h*.35]]);
      break;}
    case 'R': {
      envStroke(x-w*.3,y+h*.45, x-w*.3,y-h*.45);
      X.strokeStyle=col2||col;X.lineWidth=bw;
      X.beginPath();X.arc(x+w*.05,y-h*.22,s*0.22,4.71,1.57);X.stroke();
      envStroke(x+w*.05,y, x+w*.5,y+h*.4);
      deco([[x+w*.2,y-h*.22],[x+w*.4,y+h*.3],[x-w*.3,y]]);
      break;}
    case 'S': {
      X.strokeStyle=col2||col;X.lineWidth=bw;
      X.beginPath();
      X.moveTo(x+w*.4,y-h*.38);
      X.bezierCurveTo(x+w*.6,y-h*.18, x-w*.6,y-h*.08, x-w*.4,y+h*.02);
      X.bezierCurveTo(x-w*.6,y+h*.12, x+w*.6,y+h*.22, x+w*.4,y+h*.4);
      X.stroke();
      deco([[x+w*.3,y-h*.3],[x-w*.3,y],[x+w*.3,y+h*.3]]);
      break;}
    case 'T': {
      envStroke(x,y-h*.42, x,y+h*.45);
      envStroke(x-w*.7,y-h*.42, x+w*.7,y-h*.42);
      deco([[x-w*.5,y-h*.42],[x+w*.5,y-h*.42],[x,y-h*.1],[x,y+h*.2]]);
      break;}
    case 'U': {
      X.strokeStyle=col2||col;X.lineWidth=bw;
      X.beginPath();X.moveTo(x-s*.4,y-h*.45);X.lineTo(x-s*.4,y+h*.05);
      X.arc(x,y+h*.05,s*.4,Math.PI,0);
      X.lineTo(x+s*.4,y-h*.45);X.stroke();
      deco([[x-s*.35,y-h*.2],[x+s*.35,y-h*.2],[x,y+h*.35]]);
      break;}
    case 'V': {
      envStroke(x-w*.65,y-h*.45, x,y+h*.42);
      envStroke(x+w*.65,y-h*.45, x,y+h*.42);
      deco([[x-w*.45,y-h*.2],[x+w*.45,y-h*.2],[x,y+h*.3]]);
      break;}
    case 'W': {
      envStroke(x-w,y-h*.4, x-w*.4,y+h*.38);
      envStroke(x-w*.4,y+h*.38, x,y-h*.05);
      envStroke(x,y-h*.05, x+w*.4,y+h*.38);
      envStroke(x+w*.4,y+h*.38, x+w,y-h*.4);
      deco([[x-w*.4,y+h*.3],[x+w*.4,y+h*.3],[x,y-h*.05]]);
      break;}
    case 'X': {
      envStroke(x-w*.45,y-h*.42, x+w*.45,y+h*.42);
      envStroke(x+w*.45,y-h*.42, x-w*.45,y+h*.42);
      deco([[x,y],[x-w*.3,y-h*.25],[x+w*.3,y+h*.25]]);
      break;}
    case 'Y': {
      envStroke(x-w*.5,y-h*.45, x,y);
      envStroke(x+w*.5,y-h*.45, x,y);
      envStroke(x,y, x,y+h*.45);
      deco([[x-w*.35,y-h*.35],[x+w*.35,y-h*.35],[x,y]]);
      break;}
    case 'Z': {
      envStroke(x-w*.5,y-h*.4, x+w*.5,y-h*.4);
      envStroke(x+w*.5,y-h*.4, x-w*.5,y+h*.4);
      envStroke(x-w*.5,y+h*.4, x+w*.5,y+h*.4);
      deco([[x+w*.4,y-h*.35],[x-w*.4,y+h*.35],[x,y]]);
      break;}
    default: {
      X.font=`bold ${s*0.7}px 'DM Serif Text',serif`;
      X.textAlign='center';X.textBaseline='middle';
      X.globalAlpha*=0.4;X.fillText(ch,x,y);X.globalAlpha/=0.4;
    }
  }
}

// ── Place and draw hidden letters ──
function generateScene(){
  const theme=THEMES[sceneIdx%THEMES.length];
  currentWord=ALPHABET;
  const seed=Date.now();

  letters=[];foundCount=0;
  const margin=35;

  // Place all 26 letters at random positions
  for(let i=0;i<26;i++){
    let lx,ly;
    for(let a=0;a<200;a++){
      lx=margin+Math.random()*(W-margin*2);
      ly=margin+50+Math.random()*(H-margin*2-50);
      let ok=true;
      for(const l of letters){
        if(Math.hypot(lx-l.x,ly-l.y)<32){ok=false;break}
      }
      if(ok)break;
    }
    const palIdx=Math.floor(Math.random()*theme.palette.length);
    const palIdx2=(palIdx+1+Math.floor(Math.random()*(theme.palette.length-1)))%theme.palette.length;
    letters.push({
      char:ALPHABET[i],
      x:lx,y:ly,
      found:false,
      size:16+Math.random()*12, // env shapes: 16-28px
      col:theme.palette[palIdx],
      col2:theme.palette[palIdx2],
      alpha:0.35+Math.random()*0.25, // visible enough to be "part of scene" but subtle
    });
  }

  // Draw the base scene
  drawSceneBackground(theme,seed);

  // Draw letters disguised as environmental objects
  _envTheme=theme;
  for(const l of letters){
    if(l.found) continue;
    X.save();
    X.globalAlpha=l.alpha;
    drawEnvLetter(l.char,l.x,l.y,l.size,l.col,l.col2);
    X.restore();
  }

  // Save the scene image data for redrawing
  sceneImage=X.getImageData(0,0,W,H);
}

let sceneImage=null;

function drawScene(){
  if(sceneImage) X.putImageData(sceneImage,0,0);

  // Draw found markers
  for(const l of letters){
    if(!l.found) continue;
    // Glowing ring
    X.strokeStyle='rgba(200,168,100,.6)';
    X.lineWidth=2;
    X.beginPath();X.arc(l.x,l.y,22,0,6.28);X.stroke();
    // Bright letter
    X.save();
    X.translate(l.x,l.y);X.rotate(l.rot);
    X.font=`bold ${l.size}px 'DM Serif Text',serif`;
    X.textAlign='center';X.textBaseline='middle';
    X.fillStyle='#c8a864';
    X.shadowColor='#c8a864';X.shadowBlur=10;
    X.fillText(l.char,0,0);
    X.shadowBlur=0;
    X.restore();
  }

  // Click feedback
  for(let i=clickFeedback.length-1;i>=0;i--){
    const f=clickFeedback[i];
    f.life--;
    if(f.life<=0){clickFeedback.splice(i,1);continue}
    X.globalAlpha=f.life/20;
    X.strokeStyle=f.hit?'#c8a864':'#884444';
    X.lineWidth=2;
    X.beginPath();X.arc(f.x,f.y,20-f.life*.5,0,6.28);X.stroke();
    X.globalAlpha=1;
  }
}

// ── Click handling ──
function handleClick(cx,cy){
  // Check if click is near any unfound letter
  let found=false;
  for(const l of letters){
    if(l.found) continue;
    if(Math.hypot(cx-l.x,cy-l.y)<22){
      l.found=true;
      foundCount++;
      found=true;
      clickFeedback.push({x:l.x,y:l.y,life:20,hit:true});
      updateHUD();
      drawScene();
      if(foundCount>=currentWord.length){
        setTimeout(sceneComplete,600);
      }
      break;
    }
  }
  if(!found){
    clickFeedback.push({x:cx,y:cy,life:20,hit:false});
    // Time penalty
    gameTime+=2;
  }
}

C.addEventListener('click',e=>{
  if(!gameRunning)return;
  const rect=C.getBoundingClientRect();
  const sx=W/rect.width, sy=H/rect.height;
  handleClick((e.clientX-rect.left)*sx,(e.clientY-rect.top)*sy);
});
C.addEventListener('touchstart',e=>{
  if(!gameRunning)return;
  e.preventDefault();
  const rect=C.getBoundingClientRect();
  const sx=W/rect.width, sy=H/rect.height;
  const t=e.changedTouches[0];
  handleClick((t.clientX-rect.left)*sx,(t.clientY-rect.top)*sy);
},{passive:false});

// ── Hint ──
document.getElementById('hint-btn').onclick=()=>{
  if(hintsLeft<=0)return;
  const unfound=letters.filter(l=>!l.found);
  if(unfound.length===0)return;
  hintsLeft--;
  const target=unfound[Math.floor(Math.random()*unfound.length)];
  // Flash a circle around the hint letter
  clickFeedback.push({x:target.x,y:target.y,life:40,hit:true});
  document.getElementById('hint-btn').textContent=hintsLeft>0?'?':'✕';
};

// ── HUD ──
function updateHUD(){
  document.getElementById('hud-scene').textContent=sceneIdx+1;
  document.getElementById('hud-found').textContent=foundCount;
  document.getElementById('hud-total').textContent=currentWord.length;
  // Target bar
  const bar=document.getElementById('target-bar');
  bar.innerHTML='';
  for(let i=0;i<currentWord.length;i++){
    const slot=document.createElement('span');
    slot.className='target-letter';
    // Find matching letter in order
    const ltr=letters[i];
    if(ltr&&ltr.found){
      slot.textContent=ltr.char;
      slot.classList.add('found');
    } else {
      slot.textContent=currentWord[i];
    }
    bar.appendChild(slot);
  }
}

function updateTimer(){
  const min=Math.floor(gameTime/60),sec=Math.floor(gameTime%60);
  document.getElementById('hud-time').textContent=min+':'+String(sec).padStart(2,'0');
}

// ── Scene complete ──
function sceneComplete(){
  clearInterval(timerInterval);
  const min=Math.floor(gameTime/60),sec=Math.floor(gameTime%60);
  if(sceneIdx+1>=totalScenes){
    document.getElementById('complete-title').textContent='ALL SCENES COMPLETE!';
    document.getElementById('complete-stats').innerHTML=
      `Total time: <b>${min}:${String(sec).padStart(2,'0')}</b><br>Scenes cleared: <b>${totalScenes}</b>`;
    document.getElementById('next-btn').textContent='PLAY AGAIN';
    document.getElementById('next-btn').onclick=()=>{sceneIdx=-1;startNextScene()};
    // Show submit
    const sa=document.getElementById('submit-area');
    sa.style.display='block';
    document.getElementById('submitBtn').disabled=false;
    document.getElementById('submitBtn').textContent='SUBMIT TO LEADERBOARD';
    loadLeaderboard();
  } else {
    document.getElementById('complete-title').textContent='WORD FOUND';
    document.getElementById('complete-stats').innerHTML=
      `All 26 letters found!<br><br>`+
      `Time: <b>${min}:${String(sec).padStart(2,'0')}</b> &nbsp; Scenes left: <b>${totalScenes-sceneIdx-1}</b>`;
    document.getElementById('next-btn').textContent='NEXT SCENE';
    document.getElementById('next-btn').onclick=startNextScene;
  }
  document.getElementById('complete-screen').style.display='flex';
}

// ── Game flow ──
let gameRunning=false;

function startNextScene(){
  sceneIdx++;
  document.getElementById('complete-screen').style.display='none';
  resize();
  generateScene();
  drawScene();
  updateHUD();
  hintsLeft=5;
  document.getElementById('hint-btn').textContent='?';
  gameRunning=true;
  if(timerInterval)clearInterval(timerInterval);
  timerInterval=setInterval(()=>{gameTime++;updateTimer()},1000);
}

function startGame(){
  sceneIdx=-1;
  gameTime=0;
  document.getElementById('start-screen').style.display='none';
  document.getElementById('hud').style.display='block';
  document.getElementById('hint-btn').style.display='flex';
  document.getElementById('lb-panel').style.display='block';
  document.getElementById('submit-area').style.display='none';
  startNextScene();
}

document.getElementById('start-btn').onclick=startGame;

// ── Supabase leaderboard ──
let currentUser=null;
async function initAuth(){
  try{
    if(typeof supabase==='undefined')return;
    const{data:{session}}=await supabase.auth.getSession();
    if(!session) await supabase.auth.signInAnonymously();
    const{data:{user}}=await supabase.auth.getUser();
    currentUser=user;
    loadLeaderboard();
  }catch(e){console.error('Auth:',e)}
}

function fmtTime(s){
  const m=Math.floor(s/60),ss=Math.floor(s%60);
  return m+':'+String(ss).padStart(2,'0');
}

function escHtml(s){return s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":"&#39;"}[c]))}

async function loadLeaderboard(){
  try{
    if(typeof supabase==='undefined')return;
    const{data,error}=await supabase
      .from('hidden_hunt_leaderboard')
      .select('name,time_seconds,scenes')
      .order('time_seconds',{ascending:true})
      .limit(15);
    if(error)throw error;
    const panel=document.getElementById('lb-list');
    const completeLb=document.getElementById('complete-lb');
    if(!data||data.length===0){
      panel.innerHTML='<div style="text-align:center;color:#665533;font-size:10px">No times yet</div>';
      if(completeLb)completeLb.innerHTML='';
      return;
    }
    const html=data.map((e,i)=>{
      const cls=i===0?'gold':i===1?'silver':i===2?'bronze':'';
      return `<div class="lb-row ${cls}"><span class="lb-rank">${i+1}</span><span class="lb-name">${escHtml(e.name||'Anon')}</span><span class="lb-time">${fmtTime(e.time_seconds)}</span></div>`;
    }).join('');
    panel.innerHTML=html;
    if(completeLb)completeLb.innerHTML='<div style="margin-top:12px;font-size:10px;color:#776644;letter-spacing:1px;font-family:IBM Plex Mono,monospace">TOP TIMES</div>'+html;
  }catch(e){console.error('LB:',e)}
}

async function submitScore(){
  try{
    if(typeof supabase==='undefined')return;
    const name=(document.getElementById('playerName').value.trim()||'Anonymous').slice(0,15);
    localStorage.setItem('hidden_hunt_name',name);
    const btn=document.getElementById('submitBtn');
    btn.disabled=true;btn.textContent='SUBMITTING...';
    await supabase.from('hidden_hunt_leaderboard').insert({
      name:name,
      time_seconds:Math.floor(gameTime),
      scenes:totalScenes,
      user_id:currentUser?.id
    });
    btn.textContent='SUBMITTED ✓';
    loadLeaderboard();
  }catch(e){
    console.error('Submit:',e);
    document.getElementById('submitBtn').textContent='ERROR';
  }
}

document.getElementById('submitBtn').onclick=submitScore;

// Restore saved name
try{const n=localStorage.getItem('hidden_hunt_name');if(n)document.getElementById('playerName').value=n}catch(e){}

initAuth();

// Animation loop for feedback effects
function loop(){
  if(gameRunning && clickFeedback.length>0) drawScene();
  requestAnimationFrame(loop);
}
loop();
</script>
