<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mock Blade</title>
<link rel="icon" href="https://emojicdn.elk.sh/⚔️">
<meta property="og:title" content="Mock Blade">
<meta property="og:description" content="Pixel dungeon crawler with a sword that roasts your every move">
<meta property="og:url" content="https://sloppy.live/mock-blade">
<meta property="og:image" content="https://sloppy.live/mock-blade/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;image-rendering:pixelated}
body{background:#0f0a1a;color:#c8bfa0;font-family:'Silkscreen',cursive;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow:hidden}
h1{font-family:'Press Start 2P',monospace;font-size:14px;color:#d4a843;margin:10px 0 2px;text-shadow:2px 2px 0 #000}
.sub{font-size:10px;color:#6a5a8a;margin-bottom:6px}
#game-wrap{position:relative;display:inline-block}
canvas{display:block;border:3px solid #3a2a4a}
.crt{pointer-events:none;position:absolute;top:0;left:0;width:100%;height:100%;background:repeating-linear-gradient(0deg,rgba(0,0,0,0.1) 0px,rgba(0,0,0,0.1) 1px,transparent 1px,transparent 3px);z-index:10}
.crt::after{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at center,transparent 55%,rgba(0,0,0,0.45) 100%)}
#speech{position:absolute;bottom:8px;left:8px;right:8px;background:rgba(15,10,26,0.92);border:2px solid #d4a843;padding:8px 10px;font-family:'Press Start 2P',monospace;font-size:8px;color:#d4a843;line-height:1.6;min-height:40px;z-index:20;display:none}
#speech .speaker{color:#c45baa;margin-bottom:4px;font-size:7px}
.hud{display:flex;gap:12px;margin:6px 0;font-size:10px;font-family:'Silkscreen',cursive}
.hud span{color:#5a8a6a}
.hud .hp{color:#c45b5b}
.hud .gold{color:#d4a843}
.hud .floor{color:#6a5a8a}
.controls{display:flex;gap:4px;margin:6px 0}
.controls button{font-family:'Press Start 2P',monospace;font-size:10px;width:36px;height:36px;background:#1a1028;color:#c8bfa0;border:2px solid #3a2a4a;cursor:pointer}
.controls button:active{background:#3a2a4a}
.mobile-row{display:flex;gap:4px;justify-content:center}
@media(min-width:500px){.controls{display:none}}
</style>
</head>
<body>
<h1>MOCK BLADE</h1>
<div class="sub">your sword judges you</div>
<div id="game-wrap">
<canvas id="cv"></canvas>
<div class="crt"></div>
<div id="speech"><div class="speaker">⚔ BLADE:</div><span id="speech-text"></span></div>
</div>
<div class="hud">
<span class="hp" id="hud-hp">HP: 10/10</span>
<span class="gold" id="hud-gold">GOLD: 0</span>
<span class="floor" id="hud-floor">FLOOR: 1</span>
<span id="hud-kills">KILLS: 0</span>
</div>
<div class="controls">
<div class="mobile-row"><button onclick="tryMove(0,-1)">↑</button></div>
<div class="mobile-row">
<button onclick="tryMove(-1,0)">←</button>
<button onclick="tryMove(0,1)">↓</button>
<button onclick="tryMove(1,0)">→</button>
</div>
</div>
<script>
var C=document.getElementById('cv'),X=C.getContext('2d');
var T=16,MW=20,MH=15;
C.width=MW*T;C.height=MH*T;
X.imageSmoothingEnabled=false;

// Colors
var COL_FLOOR='#1a1428',COL_WALL='#3a2a4a',COL_DOOR='#6a5a3a',COL_GOLD='#d4a843';
var COL_PLAYER='#5bc0be',COL_ENEMY='#c45b5b',COL_POTION='#c45baa',COL_STAIRS='#8a7ab0';

// Game state
var map=[],player={x:0,y:0,hp:10,maxHp:10,gold:0,kills:0,floor:1,atk:2};
var enemies=[],items=[],stairs={x:0,y:0};
var speechEl=document.getElementById('speech');
var speechText=document.getElementById('speech-text');
var speechTimer=0;
var gameOver=false;
var turnCount=0;

// Sword personality — hundreds of quips
var QUIPS={
  move:[
    "Wow, you moved. Groundbreaking.",
    "Bold strategy: walking.",
    "Are we going somewhere or just vibing?",
    "Left foot, right foot. You're a natural.",
    "I've seen slimes with better pathfinding.",
    "Oh good, more walking. My favorite.",
    "Do you even know where you're going?",
    "Another step closer to disappointing me.",
    "You walk like you've never had legs before.",
    "Fascinating. You chose... that direction.",
    "I could cut faster than you walk.",
    "Are you lost? You look lost.",
    "Every step you take, I lose a little more hope.",
    "Navigation level: drunk moth.",
    "You do know the enemies are THAT way, right?"
  ],
  kill:[
    "Finally! I was getting rusty. Literally.",
    "Was that a fight or a sneeze?",
    "You killed it! I mean, I killed it. You held me.",
    "One down. Only your dignity left to lose.",
    "Don't celebrate. It was basically already dead.",
    "Congrats on beating something with no thumbs.",
    "I did most of the work, just so you know.",
    "Enemy defeated! ...it was a level 1 rat, calm down.",
    "Wow you actually hit something. Mark the calendar.",
    "That was ALL me. You just pointed me vaguely.",
    "Victory! Now do it again without embarrassing us.",
    "Did you close your eyes? It looked like you closed your eyes.",
    "A kill! Quick, act like you meant to do that."
  ],
  hurt:[
    "OW! That's YOUR body, not mine. Still, ow.",
    "Maybe try NOT getting hit? Just a thought.",
    "Your HP is a suggestion, not a promise.",
    "You're bleeding. Disgusting. Keep me out of it.",
    "I'm a SWORD. I'm for hitting, not getting hit.",
    "That looked like it hurt. Good.",
    "You know you're supposed to DODGE, right?",
    "At this rate, I'll need a new wielder by floor 3.",
    "Pain is just weakness leaving the body. You must be SO strong.",
    "Oh no, are you okay? Just kidding, I don't care.",
    "Blood on my handle again. Wonderful.",
    "Have you considered a shield? Or a different hobby?"
  ],
  gold:[
    "Ooh, shiny! ...I mean, whatever.",
    "Gold! Maybe buy yourself some skill.",
    "You picked up gold. Your one talent.",
    "Great, more weight for me to carry.",
    "A coin! At this rate you can afford a burial.",
    "Treasure hunter? More like floor sweeper.",
    "Gold won't save you. But grab it anyway.",
    "Cha-ching. Still poor in spirit though."
  ],
  potion:[
    "Drinking mystery liquid in a dungeon. Smart.",
    "Chug chug chug! ...I'm being sarcastic.",
    "Health restored! Your brain damage is permanent though.",
    "A potion! Your only friend down here besides me. And I hate you.",
    "Mmm, floor potion. Delicious.",
    "Healed up so you can get hurt again. The circle of you."
  ],
  wall:[
    "That's a wall. WALL. It's solid. Stop.",
    "Bonk.",
    "The wall isn't going to move. Trust me.",
    "You just walked into a wall. I'm embarrassed FOR you.",
    "Walls: famously not doors.",
    "Did you think that was a secret passage? It's not.",
    "I'm literally face-first in stone right now.",
    "Navigation: expert level. Obviously."
  ],
  stairs:[
    "Deeper we go! ...said no smart person ever.",
    "New floor! Same questionable decisions!",
    "Going down? Your standards already did.",
    "Another floor of this? Joy.",
    "Descending! Like your skill level!",
    "Fresh dungeon smell. My favorite."
  ],
  idle:[
    "...are you still there?",
    "Hello? Wielder? Anyone home?",
    "I'm literally a magic sword and THIS is my life.",
    "I could be in a museum right now.",
    "Do something. Anything. Please.",
    "I've seen more action in a scabbard."
  ],
  death:[
    "And so it ends. Not with a bang, but with you.",
    "Game over. I'll find a better wielder. Maybe a goblin.",
    "You died. I'm shocked. SHOCKED. Well, not that shocked.",
    "RIP. Rest In Pathetic.",
    "Dead! Finally I can get some peace.",
    "You lasted longer than I expected. That's not a compliment."
  ],
  start:[
    "Oh great. Another 'hero'. Let's get this over with.",
    "Welcome, wielder. I already regret this.",
    "A new adventure! ...I'm going to hate every second."
  ]
};

function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}

function showSpeech(category){
  var q=pick(QUIPS[category]);
  speechText.textContent=q;
  speechEl.style.display='block';
  clearTimeout(speechTimer);
  speechTimer=setTimeout(function(){speechEl.style.display='none';},3500);
}

// Dungeon generation (simple BSP-ish rooms + corridors)
function generate(){
  map=[];
  for(var y=0;y<MH;y++){map[y]=[];for(var x=0;x<MW;x++)map[y][x]=1;}
  enemies=[];items=[];

  // Carve rooms
  var rooms=[];
  var attempts=0;
  while(rooms.length<6&&attempts<80){
    attempts++;
    var rw=3+Math.floor(Math.random()*5);
    var rh=3+Math.floor(Math.random()*4);
    var rx=1+Math.floor(Math.random()*(MW-rw-2));
    var ry=1+Math.floor(Math.random()*(MH-rh-2));
    var overlap=false;
    for(var i=0;i<rooms.length;i++){
      var r=rooms[i];
      if(rx<=r.x+r.w+1&&rx+rw>=r.x-1&&ry<=r.y+r.h+1&&ry+rh>=r.y-1){overlap=true;break;}
    }
    if(!overlap){
      rooms.push({x:rx,y:ry,w:rw,h:rh});
      for(var yy=ry;yy<ry+rh;yy++)for(var xx=rx;xx<rx+rw;xx++)map[yy][xx]=0;
    }
  }

  // Connect rooms with corridors
  for(var i=1;i<rooms.length;i++){
    var a=rooms[i-1],b=rooms[i];
    var ax=Math.floor(a.x+a.w/2),ay=Math.floor(a.y+a.h/2);
    var bx=Math.floor(b.x+b.w/2),by=Math.floor(b.y+b.h/2);
    var cx=ax,cy=ay;
    while(cx!==bx){map[cy][cx]=0;cx+=cx<bx?1:-1;}
    while(cy!==by){map[cy][cx]=0;cy+=cy<by?1:-1;}
    map[cy][cx]=0;
  }

  // Place player in first room
  var r0=rooms[0];
  player.x=Math.floor(r0.x+r0.w/2);
  player.y=Math.floor(r0.y+r0.h/2);

  // Place stairs in last room
  var rLast=rooms[rooms.length-1];
  stairs.x=Math.floor(rLast.x+rLast.w/2);
  stairs.y=Math.floor(rLast.y+rLast.h/2);

  // Place enemies in rooms (skip first)
  var enemyTypes=[
    {name:'rat',hp:2,atk:1,col:'#c45b5b',char:'r'},
    {name:'bat',hp:3,atk:1,col:'#8a5bc4',char:'b'},
    {name:'slime',hp:4,atk:2,col:'#5baa5b',char:'s'},
    {name:'skeleton',hp:5,atk:3,col:'#c8bfa0',char:'k'},
    {name:'demon',hp:7,atk:4,col:'#c44b3b',char:'d'}
  ];

  for(var i=1;i<rooms.length;i++){
    var rm=rooms[i];
    var count=1+Math.floor(Math.random()*2)+Math.floor(player.floor/3);
    for(var j=0;j<count;j++){
      var ex=rm.x+1+Math.floor(Math.random()*(rm.w-2));
      var ey=rm.y+1+Math.floor(Math.random()*(rm.h-2));
      if(ex===stairs.x&&ey===stairs.y)continue;
      if(ex===player.x&&ey===player.y)continue;
      var tier=Math.min(Math.floor(Math.random()*2)+Math.floor((player.floor-1)/2),enemyTypes.length-1);
      var et=enemyTypes[tier];
      var floorBonus=Math.floor((player.floor-1)*0.5);
      enemies.push({x:ex,y:ey,hp:et.hp+floorBonus,maxHp:et.hp+floorBonus,atk:et.atk+Math.floor(floorBonus/2),col:et.col,char:et.char,name:et.name,flash:0});
    }
  }

  // Place items
  for(var i=0;i<rooms.length;i++){
    var rm=rooms[i];
    if(Math.random()<0.6){
      var ix=rm.x+Math.floor(Math.random()*rm.w);
      var iy=rm.y+Math.floor(Math.random()*rm.h);
      if(map[iy][ix]===0&&!(ix===player.x&&iy===player.y)&&!(ix===stairs.x&&iy===stairs.y)){
        items.push({x:ix,y:iy,type:Math.random()<0.4?'potion':'gold'});
      }
    }
  }
}

function tryMove(dx,dy){
  if(gameOver)return;
  var nx=player.x+dx,ny=player.y+dy;
  turnCount++;

  // Wall bump
  if(ny<0||ny>=MH||nx<0||nx>=MW||map[ny][nx]===1){
    if(Math.random()<0.35)showSpeech('wall');
    draw();return;
  }

  // Enemy at target?
  var hitEnemy=null;
  for(var i=0;i<enemies.length;i++){
    if(enemies[i].x===nx&&enemies[i].y===ny){hitEnemy=enemies[i];break;}
  }

  if(hitEnemy){
    // Attack
    var dmg=player.atk+Math.floor(Math.random()*2);
    hitEnemy.hp-=dmg;
    hitEnemy.flash=6;
    if(hitEnemy.hp<=0){
      enemies.splice(enemies.indexOf(hitEnemy),1);
      player.kills++;
      player.gold+=1+Math.floor(Math.random()*3);
      showSpeech('kill');
    }else{
      // Enemy counter-attacks
      var eDmg=Math.max(1,hitEnemy.atk-Math.floor(Math.random()*2));
      player.hp-=eDmg;
      if(Math.random()<0.5)showSpeech('hurt');
    }
  }else{
    // Move
    player.x=nx;player.y=ny;

    // Check items
    for(var i=items.length-1;i>=0;i--){
      if(items[i].x===player.x&&items[i].y===player.y){
        var it=items[i];
        if(it.type==='gold'){
          player.gold+=3+Math.floor(Math.random()*5);
          showSpeech('gold');
        }else if(it.type==='potion'){
          player.hp=Math.min(player.maxHp,player.hp+4);
          showSpeech('potion');
        }
        items.splice(i,1);
        break;
      }
    }

    // Check stairs
    if(player.x===stairs.x&&player.y===stairs.y){
      player.floor++;
      player.maxHp+=2;player.hp=player.maxHp;
      player.atk+=1;
      showSpeech('stairs');
      generate();
    }else{
      // Random move quip (low chance)
      if(Math.random()<0.15&&speechEl.style.display==='none')showSpeech('move');
    }

    // Enemies move toward player
    moveEnemies();
  }

  // Check death
  if(player.hp<=0){
    player.hp=0;gameOver=true;
    showSpeech('death');
  }

  // Idle quip
  if(turnCount%20===0&&!gameOver&&speechEl.style.display==='none')showSpeech('idle');

  updateHud();
  draw();
}

function moveEnemies(){
  for(var i=0;i<enemies.length;i++){
    var e=enemies[i];
    var dx=player.x-e.x,dy=player.y-e.y;
    var dist=Math.abs(dx)+Math.abs(dy);
    if(dist<=1){
      // Adjacent — attack
      var eDmg=Math.max(1,e.atk-Math.floor(Math.random()*2));
      player.hp-=eDmg;
      e.flash=4;
      if(Math.random()<0.4&&speechEl.style.display==='none')showSpeech('hurt');
      continue;
    }
    if(dist>8)continue; // Too far, don't chase

    // Simple chase: move one step toward player
    var mx=0,my=0;
    if(Math.abs(dx)>=Math.abs(dy))mx=dx>0?1:-1;
    else my=dy>0?1:-1;
    var ex=e.x+mx,ey=e.y+my;
    if(ey>=0&&ey<MH&&ex>=0&&ex<MW&&map[ey][ex]===0){
      var blocked=false;
      if(ex===player.x&&ey===player.y)blocked=true;
      for(var j=0;j<enemies.length;j++){
        if(j!==i&&enemies[j].x===ex&&enemies[j].y===ey){blocked=true;break;}
      }
      if(!blocked){e.x=ex;e.y=ey;}
    }
  }
}

function updateHud(){
  document.getElementById('hud-hp').textContent='HP: '+player.hp+'/'+player.maxHp;
  document.getElementById('hud-gold').textContent='GOLD: '+player.gold;
  document.getElementById('hud-floor').textContent='FLOOR: '+player.floor;
  document.getElementById('hud-kills').textContent='KILLS: '+player.kills;
}

// Pixel art drawing helpers
function drawPixelChar(cx,cy,ch,col,bgCol){
  // Draw a character as a blocky pixel thing
  X.fillStyle=bgCol||'transparent';
  if(bgCol)X.fillRect(cx,cy,T,T);
  X.fillStyle=col;
  // Simple recognizable shapes
  var p=2; // pixel size within tile
  var ox=cx+2,oy=cy+1;
  if(ch==='@'){
    // Player: helmet + body
    X.fillRect(ox+2,oy,8,4);     // head
    X.fillRect(ox,oy+4,12,2);    // shoulders
    X.fillRect(ox+2,oy+6,8,4);   // body
    X.fillRect(ox,oy+10,4,4);    // left leg
    X.fillRect(ox+8,oy+10,4,4);  // right leg
    // Sword in hand
    X.fillStyle='#d4a843';
    X.fillRect(ox+12,oy+2,2,10); // blade
    X.fillRect(ox+10,oy+4,6,2);  // guard
  }else if(ch==='r'){
    X.fillRect(ox+2,oy+4,8,4);
    X.fillRect(ox,oy+8,4,4);X.fillRect(ox+8,oy+8,4,4);
    X.fillRect(ox+2,oy+2,2,2);X.fillRect(ox+8,oy+2,2,2);
    X.fillRect(ox+10,oy+6,4,2); // tail
  }else if(ch==='b'){
    X.fillRect(ox+4,oy+4,4,4);
    X.fillRect(ox,oy+2,4,4);X.fillRect(ox+8,oy+2,4,4); // wings
    X.fillRect(ox+2,oy+8,2,2);X.fillRect(ox+8,oy+8,2,2);
  }else if(ch==='s'){
    X.fillRect(ox+2,oy+4,8,6);
    X.fillRect(ox+4,oy+2,4,2);
    X.fillRect(ox+4,oy+10,4,2);
    X.fillStyle='#fff';
    X.fillRect(ox+4,oy+6,2,2);X.fillRect(ox+8,oy+6,2,2);
  }else if(ch==='k'){
    X.fillRect(ox+4,oy,4,4);     // skull
    X.fillStyle='#0f0a1a';
    X.fillRect(ox+4,oy+1,2,2);X.fillRect(ox+7,oy+1,2,2); // eye holes
    X.fillStyle=col;
    X.fillRect(ox+2,oy+4,8,6);   // ribs
    X.fillRect(ox+2,oy+10,4,4);X.fillRect(ox+8,oy+10,4,4);
  }else if(ch==='d'){
    X.fillRect(ox+2,oy,8,6);     // head
    X.fillRect(ox,oy-2,4,4);X.fillRect(ox+8,oy-2,4,4); // horns
    X.fillRect(ox,oy+6,12,6);    // body
    X.fillRect(ox+2,oy+12,4,2);X.fillRect(ox+8,oy+12,4,2);
    X.fillStyle='#ff0';
    X.fillRect(ox+4,oy+2,2,2);X.fillRect(ox+8,oy+2,2,2); // eyes
  }
}

function draw(){
  X.fillStyle='#0f0a1a';
  X.fillRect(0,0,C.width,C.height);

  // Draw map
  for(var y=0;y<MH;y++){
    for(var x=0;x<MW;x++){
      var cx=x*T,cy=y*T;
      if(map[y][x]===1){
        X.fillStyle=COL_WALL;
        X.fillRect(cx,cy,T,T);
        // Brick pattern
        X.fillStyle='#2a1e3a';
        X.fillRect(cx,cy+T-1,T,1);
        if((x+y)%2===0)X.fillRect(cx+T/2,cy,1,T);
      }else{
        X.fillStyle=COL_FLOOR;
        X.fillRect(cx,cy,T,T);
        // Floor dots
        if((x+y)%3===0){
          X.fillStyle='#221a30';
          X.fillRect(cx+6,cy+6,2,2);
        }
      }
    }
  }

  // Draw stairs
  X.fillStyle=COL_STAIRS;
  var sx=stairs.x*T,sy=stairs.y*T;
  X.fillRect(sx+2,sy+2,12,12);
  X.fillStyle='#0f0a1a';
  X.fillRect(sx+4,sy+4,8,2);
  X.fillRect(sx+6,sy+7,6,2);
  X.fillRect(sx+8,sy+10,4,2);

  // Draw items
  for(var i=0;i<items.length;i++){
    var it=items[i],ix=it.x*T,iy=it.y*T;
    if(it.type==='gold'){
      X.fillStyle=COL_GOLD;
      X.fillRect(ix+4,iy+4,8,8);
      X.fillStyle='#fff';
      X.fillRect(ix+6,iy+6,2,4);
    }else{
      X.fillStyle=COL_POTION;
      X.fillRect(ix+5,iy+2,6,4);
      X.fillRect(ix+4,iy+6,8,8);
      X.fillStyle='rgba(255,255,255,0.3)';
      X.fillRect(ix+6,iy+8,2,4);
    }
  }

  // Draw enemies
  for(var i=0;i<enemies.length;i++){
    var e=enemies[i];
    var ecol=e.flash>0?'#fff':e.col;
    if(e.flash>0)e.flash--;
    drawPixelChar(e.x*T,e.y*T,e.char,ecol);
    // HP bar
    if(e.hp<e.maxHp){
      var bx=e.x*T,by=e.y*T-3;
      X.fillStyle='#300';X.fillRect(bx,by,T,2);
      X.fillStyle='#c45b5b';X.fillRect(bx,by,Math.floor(T*(e.hp/e.maxHp)),2);
    }
  }

  // Draw player
  var px=player.x*T,py=player.y*T;
  if(!gameOver){
    drawPixelChar(px,py,'@',COL_PLAYER);
  }else{
    // Dead player — flat
    X.fillStyle='#c45b5b';
    X.fillRect(px+1,py+8,14,4);
    X.fillStyle='#d4a843';
    X.fillRect(px+12,py+6,2,8); // sword fallen
  }

  // Game over overlay
  if(gameOver){
    X.fillStyle='rgba(15,10,26,0.7)';
    X.fillRect(0,0,C.width,C.height);
    X.fillStyle='#c45b5b';
    X.font='14px "Press Start 2P"';
    X.textAlign='center';
    X.fillText('YOU DIED',C.width/2,C.height/2-20);
    X.fillStyle='#c8bfa0';
    X.font='8px "Press Start 2P"';
    X.fillText('Floor '+player.floor+' | '+player.kills+' kills | '+player.gold+' gold',C.width/2,C.height/2+10);
    X.fillText('Press R to retry',C.width/2,C.height/2+30);
  }
}

// Keyboard
document.addEventListener('keydown',function(e){
  if(gameOver){
    if(e.key==='r'||e.key==='R'){restart();return;}
  }
  switch(e.key){
    case'ArrowUp':case'w':case'W':e.preventDefault();tryMove(0,-1);break;
    case'ArrowDown':case's':case'S':e.preventDefault();tryMove(0,1);break;
    case'ArrowLeft':case'a':case'A':e.preventDefault();tryMove(-1,0);break;
    case'ArrowRight':case'd':case'D':e.preventDefault();tryMove(1,0);break;
  }
});

// Touch/swipe
var touchStart=null;
C.addEventListener('touchstart',function(e){
  e.preventDefault();
  touchStart={x:e.touches[0].clientX,y:e.touches[0].clientY};
},{passive:false});
C.addEventListener('touchend',function(e){
  if(!touchStart)return;
  var dx=e.changedTouches[0].clientX-touchStart.x;
  var dy=e.changedTouches[0].clientY-touchStart.y;
  touchStart=null;
  if(Math.abs(dx)<10&&Math.abs(dy)<10)return;
  if(Math.abs(dx)>Math.abs(dy)){
    tryMove(dx>0?1:-1,0);
  }else{
    tryMove(0,dy>0?1:-1);
  }
},{passive:false});

function restart(){
  player={x:0,y:0,hp:10,maxHp:10,gold:0,kills:0,floor:1,atk:2};
  gameOver=false;turnCount=0;
  speechEl.style.display='none';
  generate();
  showSpeech('start');
  updateHud();draw();
}

// Responsive
function resize(){
  var maxW=Math.min(window.innerWidth-16,MW*T*2);
  C.style.width=maxW+'px';
  C.style.height=(maxW*(MH/MW))+'px';
}
window.addEventListener('resize',resize);
resize();

// Init
generate();
showSpeech('start');
updateHud();
draw();
</script>
</body>
</html>
