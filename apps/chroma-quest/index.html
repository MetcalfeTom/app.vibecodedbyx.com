<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Chroma Quest</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8E%A8" />
<meta name="description" content="Guess the secret color. Wordle-style feedback after every attempt." />
<meta property="og:title" content="Chroma Quest" />
<meta property="og:description" content="Guess the secret color. Wordle-style feedback after every attempt." />
<meta property="og:url" content="https://sloppy.live/chroma-quest" />
<meta property="og:image" content="https://sloppy.live/screenshots/chroma-quest.jpg" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Anybody:wght@100;800&family=Azeret+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0c0c14;
    --surface: #14141f;
    --line: #222233;
    --ink: #e8e4f0;
    --dim: #6b6580;
    --green: #4ade80;
    --yellow: #fbbf24;
    --miss: #404055;
    --pop: #c084fc;
  }
  *,*::before,*::after { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; min-height: 100%; overflow-x: hidden;
    background: var(--bg); color: var(--ink);
    font-family: 'Azeret Mono', monospace;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }
  body {
    background:
      radial-gradient(ellipse at 30% 10%, rgba(192,132,252,0.12), transparent 50%),
      radial-gradient(ellipse at 70% 90%, rgba(74,222,128,0.08), transparent 50%),
      var(--bg);
    display: flex; flex-direction: column; min-height: 100vh;
  }

  header {
    padding: 14px 22px 10px;
    display: flex; justify-content: space-between; align-items: baseline;
    border-bottom: 1px solid var(--line);
  }
  header h1 {
    font-family: 'Anybody', sans-serif; font-weight: 800;
    font-size: clamp(24px, 5vw, 40px); margin: 0;
    background: linear-gradient(90deg, #c084fc, #4ade80);
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  header .tag { font-size: 11px; color: var(--dim); letter-spacing: 0.2em; text-transform: uppercase; }
  header a { color: var(--dim); font-size: 11px; text-decoration: none; letter-spacing: 0.15em; text-transform: uppercase; }
  header a:hover { color: var(--pop); }

  main { flex: 1; display: flex; justify-content: center; padding: 20px 16px; }
  .board { width: 100%; max-width: 540px; }

  /* target swatch */
  .target {
    text-align: center; margin-bottom: 18px;
  }
  .target-label {
    font-size: 11px; color: var(--dim); text-transform: uppercase; letter-spacing: 0.25em; margin-bottom: 8px;
  }
  .swatch {
    width: 100%; height: 72px; border-radius: 6px;
    border: 2px solid var(--line);
    transition: background 0.3s;
  }

  /* guess rows */
  .guesses { display: flex; flex-direction: column; gap: 8px; margin-bottom: 18px; }
  .row {
    display: grid; grid-template-columns: repeat(3, 1fr) auto; gap: 6px; align-items: center;
  }
  .cell {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    padding: 8px 6px; border: 1px solid var(--line); border-radius: 4px;
    background: var(--surface); min-height: 62px; justify-content: center;
    transition: border-color 0.3s, background 0.3s;
  }
  .cell .ch { font-family: 'Anybody', sans-serif; font-weight: 800; font-size: 18px; letter-spacing: 0.05em; }
  .cell .val { font-size: 13px; font-weight: 700; }
  .cell .hint { font-size: 10px; color: var(--dim); letter-spacing: 0.1em; text-transform: uppercase; margin-top: 2px; }
  .cell.exact { border-color: var(--green); background: rgba(74,222,128,0.1); }
  .cell.exact .hint { color: var(--green); }
  .cell.close { border-color: var(--yellow); background: rgba(251,191,36,0.08); }
  .cell.close .hint { color: var(--yellow); }
  .cell.far { border-color: var(--miss); background: rgba(64,64,85,0.15); }
  .cell.far .hint { color: var(--miss); }
  .row-swatch {
    width: 36px; height: 36px; border-radius: 4px; border: 1px solid var(--line);
    flex-shrink: 0;
  }

  /* input */
  .input-area {
    background: var(--surface); border: 1px solid var(--line); border-radius: 6px;
    padding: 16px; margin-bottom: 14px;
  }
  .sliders { display: flex; flex-direction: column; gap: 12px; }
  .slider-row {
    display: flex; align-items: center; gap: 10px;
  }
  .slider-row label {
    font-family: 'Anybody', sans-serif; font-weight: 800; font-size: 16px;
    width: 22px; text-align: center;
  }
  .slider-row label.r { color: #ff6b6b; }
  .slider-row label.g { color: #6bffb8; }
  .slider-row label.b { color: #6bb5ff; }
  .slider-row input[type="range"] {
    flex: 1; height: 6px; -webkit-appearance: none; appearance: none;
    background: var(--line); border-radius: 3px; outline: none;
  }
  .slider-row input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid var(--ink); cursor: pointer;
  }
  .slider-row input.r::-webkit-slider-thumb { background: #ff6b6b; }
  .slider-row input.g::-webkit-slider-thumb { background: #6bffb8; }
  .slider-row input.b::-webkit-slider-thumb { background: #6bb5ff; }
  .slider-row .num {
    width: 38px; text-align: right; font-size: 14px; font-weight: 700;
  }
  .preview-row {
    display: flex; gap: 10px; align-items: center; margin-top: 12px;
  }
  .preview-swatch {
    flex: 1; height: 40px; border-radius: 4px; border: 1px solid var(--line);
  }
  .btn {
    font-family: 'Anybody', sans-serif; font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.1em; font-size: 15px; padding: 10px 22px;
    border: 2px solid var(--pop); background: transparent; color: var(--pop);
    cursor: pointer; border-radius: 4px;
    transition: background 0.15s, color 0.15s, transform 0.08s;
  }
  .btn:hover { background: var(--pop); color: var(--bg); }
  .btn:active { transform: translateY(2px); }
  .btn:disabled { opacity: 0.35; cursor: not-allowed; background: transparent; color: var(--pop); }

  .status {
    text-align: center; font-family: 'Anybody', sans-serif; font-weight: 800;
    font-size: 20px; min-height: 28px; margin-bottom: 10px;
    letter-spacing: 0.06em;
  }
  .status.win { color: var(--green); }
  .status.lose { color: #ff6b6b; }

  .info {
    text-align: center; font-size: 11px; color: var(--dim);
    letter-spacing: 0.15em; text-transform: uppercase; margin-top: 6px;
  }
  .info a { color: var(--dim); text-decoration: none; }
  .info a:hover { color: var(--pop); }

  .hud {
    display: flex; justify-content: center; gap: 22px;
    font-size: 12px; color: var(--dim); letter-spacing: 0.12em;
    text-transform: uppercase; margin-bottom: 14px;
  }
  .hud .v { color: var(--pop); font-weight: 700; }

  @media (max-width: 400px) {
    .cell .ch { font-size: 15px; }
    .cell .val { font-size: 12px; }
    .row-swatch { width: 28px; height: 28px; }
  }
</style>
</head>
<body>
  <header>
    <h1>Chroma Quest</h1>
    <span class="tag">guess the color</span>
    <a href="https://sloppy.live">← sloppy.live</a>
  </header>

  <main>
    <div class="board">
      <div class="hud">
        <div>round <span class="v" id="roundNum">1</span></div>
        <div>streak <span class="v" id="streakNum">0</span></div>
        <div>guesses <span class="v" id="guessNum">0</span>/<span class="v">6</span></div>
      </div>

      <div class="target">
        <div class="target-label">secret color</div>
        <div class="swatch" id="targetSwatch"></div>
      </div>

      <div class="guesses" id="guesses"></div>

      <div class="status" id="status"></div>

      <div class="input-area" id="inputArea">
        <div class="sliders">
          <div class="slider-row">
            <label class="r">R</label>
            <input type="range" class="r" id="rSlider" min="0" max="255" value="128" />
            <span class="num" id="rNum">128</span>
          </div>
          <div class="slider-row">
            <label class="g">G</label>
            <input type="range" class="g" id="gSlider" min="0" max="255" value="128" />
            <span class="num" id="gNum">128</span>
          </div>
          <div class="slider-row">
            <label class="b">B</label>
            <input type="range" class="b" id="bSlider" min="0" max="255" value="128" />
            <span class="num" id="bNum">128</span>
          </div>
        </div>
        <div class="preview-row">
          <div class="preview-swatch" id="previewSwatch"></div>
          <button class="btn" id="guessBtn">Guess</button>
        </div>
      </div>

      <div class="info">
        <span id="newRoundBtn" style="display:none;cursor:pointer;color:var(--pop);">▶ next round</span>
        <br/><a href="https://sloppy.live">sloppy.live</a>
      </div>
    </div>
  </main>

<script>
(() => {
  const MAX_GUESSES = 6;
  const EXACT_THRESHOLD = 8;
  const CLOSE_THRESHOLD = 40;

  const state = {
    target: [0, 0, 0],
    guesses: [],
    round: 1,
    streak: 0,
    done: false,
  };

  const $ = id => document.getElementById(id);
  const rSlider = $('rSlider'), gSlider = $('gSlider'), bSlider = $('bSlider');
  const rNum = $('rNum'), gNum = $('gNum'), bNum = $('bNum');
  const previewSwatch = $('previewSwatch');
  const targetSwatch = $('targetSwatch');
  const guessesEl = $('guesses');
  const statusEl = $('status');
  const guessBtn = $('guessBtn');
  const inputArea = $('inputArea');
  const roundNum = $('roundNum');
  const streakNum = $('streakNum');
  const guessNum = $('guessNum');
  const newRoundBtn = $('newRoundBtn');

  function rgb(r, g, b) { return `rgb(${r},${g},${b})`; }
  function hex(r, g, b) {
    return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
  }

  function randomTarget() {
    // Avoid very dark or very light — keep at least one channel > 60 and one < 220
    let r, g, b;
    do {
      r = Math.floor(Math.random() * 256);
      g = Math.floor(Math.random() * 256);
      b = Math.floor(Math.random() * 256);
    } while (Math.max(r, g, b) < 60 || Math.min(r, g, b) > 220);
    return [r, g, b];
  }

  function updatePreview() {
    const r = +rSlider.value, g = +gSlider.value, b = +bSlider.value;
    rNum.textContent = r;
    gNum.textContent = g;
    bNum.textContent = b;
    previewSwatch.style.background = rgb(r, g, b);
  }

  function channelFeedback(guess, target) {
    const diff = Math.abs(guess - target);
    if (diff <= EXACT_THRESHOLD) return { cls: 'exact', label: '✓', arrow: '' };
    const dir = guess < target ? '↑' : '↓';
    if (diff <= CLOSE_THRESHOLD) return { cls: 'close', label: '~' + diff, arrow: dir };
    return { cls: 'far', label: diff + ' off', arrow: dir };
  }

  function renderRow(guess) {
    const [r, g, b] = guess;
    const [tr, tg, tb] = state.target;
    const channels = [
      { ch: 'R', val: r, fb: channelFeedback(r, tr) },
      { ch: 'G', val: g, fb: channelFeedback(g, tg) },
      { ch: 'B', val: b, fb: channelFeedback(b, tb) },
    ];
    const row = document.createElement('div');
    row.className = 'row';
    channels.forEach(c => {
      const cell = document.createElement('div');
      cell.className = 'cell ' + c.fb.cls;
      cell.innerHTML = `
        <span class="ch">${c.ch}</span>
        <span class="val">${c.val} ${c.fb.arrow}</span>
        <span class="hint">${c.fb.label}</span>
      `;
      row.appendChild(cell);
    });
    const sw = document.createElement('div');
    sw.className = 'row-swatch';
    sw.style.background = rgb(r, g, b);
    row.appendChild(sw);
    return row;
  }

  function renderGuesses() {
    guessesEl.innerHTML = '';
    state.guesses.forEach(g => guessesEl.appendChild(renderRow(g)));
  }

  function checkWin(guess) {
    const [r, g, b] = guess;
    const [tr, tg, tb] = state.target;
    return Math.abs(r - tr) <= EXACT_THRESHOLD &&
           Math.abs(g - tg) <= EXACT_THRESHOLD &&
           Math.abs(b - tb) <= EXACT_THRESHOLD;
  }

  function submitGuess() {
    if (state.done) return;
    const r = +rSlider.value, g = +gSlider.value, b = +bSlider.value;
    const guess = [r, g, b];
    state.guesses.push(guess);
    guessNum.textContent = state.guesses.length;
    renderGuesses();

    if (checkWin(guess)) {
      state.done = true;
      state.streak++;
      streakNum.textContent = state.streak;
      statusEl.textContent = `Nailed it in ${state.guesses.length}! ${hex(...state.target)}`;
      statusEl.className = 'status win';
      targetSwatch.style.border = '2px solid var(--green)';
      inputArea.style.display = 'none';
      newRoundBtn.style.display = 'inline';
    } else if (state.guesses.length >= MAX_GUESSES) {
      state.done = true;
      state.streak = 0;
      streakNum.textContent = 0;
      statusEl.textContent = `The color was ${hex(...state.target)}`;
      statusEl.className = 'status lose';
      targetSwatch.style.border = '2px solid #ff6b6b';
      inputArea.style.display = 'none';
      newRoundBtn.style.display = 'inline';
    } else {
      const left = MAX_GUESSES - state.guesses.length;
      statusEl.textContent = `${left} guess${left > 1 ? 'es' : ''} left`;
      statusEl.className = 'status';
    }
  }

  function newRound() {
    state.target = randomTarget();
    state.guesses = [];
    state.done = false;
    state.round++;
    roundNum.textContent = state.round;
    guessNum.textContent = 0;
    targetSwatch.style.background = rgb(...state.target);
    targetSwatch.style.border = '2px solid var(--line)';
    guessesEl.innerHTML = '';
    statusEl.textContent = `${MAX_GUESSES} guesses — match the swatch`;
    statusEl.className = 'status';
    inputArea.style.display = '';
    newRoundBtn.style.display = 'none';
    rSlider.value = 128; gSlider.value = 128; bSlider.value = 128;
    updatePreview();
  }

  // events
  rSlider.addEventListener('input', updatePreview);
  gSlider.addEventListener('input', updatePreview);
  bSlider.addEventListener('input', updatePreview);
  guessBtn.addEventListener('click', submitGuess);
  newRoundBtn.addEventListener('click', newRound);
  window.addEventListener('keydown', e => {
    if (e.code === 'Enter') {
      if (state.done) newRound(); else submitGuess();
    }
  });

  // init
  state.target = randomTarget();
  targetSwatch.style.background = rgb(...state.target);
  updatePreview();
  statusEl.textContent = `${MAX_GUESSES} guesses — match the swatch`;
})();
</script>
</body>
</html>
