<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Packet Planets</title>
<meta name="description" content="Store your data in the void: glowing packets bounce between two orbiting planets, and your message only exists while it's in flight.">
<link rel="icon" href="https://emojicdn.elk.sh/🪐">
<meta property="og:title" content="Packet Planets — delay-line memory, but planetary">
<meta property="og:description" content="Two orbiting planets, glowing packets carrying your message between them, and a return-delay slider. The data lives in the light-lag.">
<meta property="og:url" content="https://sloppy.live/packet-planets/">
<meta property="og:type" content="website">
<meta property="og:image" content="https://image.pollinations.ai/prompt/two%20planets%20orbiting%20a%20star%20with%20glowing%20data%20packets%20streaming%20between%20them%2C%20orbital%20path%20lines%2C%20deep%20space%20starfield%2C%20retro%20sci%20fi%20diagram%20art.png?width=1200&height=630&seed=6174&model=flux&nologo=true">
<style>
  :root{
    --void:#05070f;
    --ink:#d8e2f2;
    --dim:#66748f;
    --teal:#4dd8c8;
    --rust:#e08a5a;
    --gold:#ffd34d;
  }
  html{ font-size:100%; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    font-family:"Space Mono", monospace;
    background:var(--void);
    color:var(--ink);
    height:100dvh;
    overflow:hidden;
  }
  canvas#space{
    position:fixed; inset:0;
    width:100%; height:100%;
    display:block;
  }
  header{
    position:fixed; top:0.9rem; left:1.2rem;
    z-index:5; pointer-events:none;
  }
  h1{
    font-family:"Audiowide", sans-serif;
    font-size:clamp(1.2rem, 3.4vw, 1.9rem);
    letter-spacing:0.1em;
    color:var(--teal);
    text-shadow:0 0 1.4rem rgba(77,216,200,0.5);
  }
  .tag{ font-size:0.68rem; color:var(--dim); letter-spacing:0.08em; }
  #stats{
    position:fixed; top:0.9rem; right:1.2rem;
    text-align:right;
    font-size:0.7rem;
    color:var(--dim);
    z-index:5;
    line-height:1.9;
  }
  #stats b{ color:var(--gold); font-weight:400; }
  /* control deck */
  #deck{
    position:fixed;
    bottom:0.9rem; left:50%;
    transform:translateX(-50%);
    width:min(46rem, 95vw);
    background:rgba(8,11,22,0.85);
    border:1px solid #1c2740;
    border-radius:0.8rem;
    padding:0.7rem 0.9rem;
    z-index:5;
    backdrop-filter:blur(6px);
  }
  .row{ display:flex; gap:0.6rem; align-items:center; flex-wrap:wrap; }
  .row + .row{ margin-top:0.55rem; }
  #msg{
    flex:1;
    min-width:11rem;
    font-family:inherit;
    font-size:0.9rem;
    min-height:2.75rem;
    padding:0.3rem 0.7rem;
    background:#060a16;
    border:1px solid #1c2740;
    border-radius:0.5rem;
    color:var(--ink);
    letter-spacing:0.1em;
  }
  button{
    font-family:inherit;
    font-size:0.75rem;
    letter-spacing:0.08em;
    min-height:2.75rem;
    padding:0.3rem 1rem;
    background:#0d1428;
    color:var(--ink);
    border:1px solid #223052;
    border-radius:0.5rem;
    cursor:pointer;
  }
  button.hot{ background:var(--teal); color:#04211d; border:none; font-weight:700; }
  button:hover{ border-color:var(--teal); }
  button:focus-visible, input:focus-visible{ outline:3px solid var(--gold); outline-offset:2px; }
  label.sl{
    display:flex; align-items:center; gap:0.6rem;
    font-size:0.68rem; color:var(--dim); letter-spacing:0.08em;
    flex:1;
    min-width:14rem;
  }
  input[type=range]{ flex:1; accent-color:var(--teal); min-height:2.75rem; }
  #readout{
    font-size:0.78rem;
    color:var(--dim);
    letter-spacing:0.14em;
    min-height:1.3rem;
    word-break:break-all;
  }
  #readout b{ color:var(--teal); font-weight:400; }
  #readout .fresh{ color:var(--gold); }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Space+Mono&display=swap" rel="stylesheet">
</head>
<body>
<canvas id="space"></canvas>

<header>
  <h1>PACKET PLANETS</h1>
  <p class="tag">delay-line memory · your data exists only while it travels</p>
</header>

<div id="stats" aria-live="off">
  <span>ROUND TRIP <b id="sRtt">6.0s</b></span><br>
  <span>IN FLIGHT <b id="sFly">0</b> packets · <b id="sBits">0</b> bits</span><br>
  <span>CYCLES <b id="sCyc">0</b></span><br>
  <span>XOR KEY <b>0x2A</b> · LAST CHECKSUM <b id="sSum">—</b></span>
</div>

<main id="deck" aria-label="Transmission controls">
  <div class="row">
    <input id="msg" maxlength="24" placeholder="type a message to store in the void…" aria-label="Message to store as packets">
    <button type="button" class="hot" id="btnSend">⬆ UPLOAD TO ORBIT</button>
    <button type="button" id="btnClear">PURGE</button>
    <button type="button" id="btnCipher" aria-pressed="false">🔓 XOR CIPHER: OFF</button>
    <button type="button" id="btnFlare" title="Corrupt a random in-flight packet">☀ SOLAR FLARE</button>
  </div>
  <div class="row">
    <label class="sl">RETURN DELAY <span id="sDelay">6.0s</span>
      <input id="delay" type="range" min="20" max="200" value="60" aria-label="Return delay in tenths of seconds">
    </label>
  </div>
  <div class="row">
    <p id="readout" role="status" aria-live="polite">memory is empty — upload something.</p>
  </div>
</main>

<script>
(function(){
'use strict';

var canvas = document.getElementById('space');
var ctx = canvas.getContext('2d');
var W = 0, H = 0, CX = 0, CY = 0, SCALE = 1;
function resize(){
  var dpr = Math.min(2, window.devicePixelRatio || 1);
  W = canvas.width = Math.floor(innerWidth * dpr);
  H = canvas.height = Math.floor(innerHeight * dpr);
  CX = W / 2; CY = H / 2;
  SCALE = Math.min(W, H) / 900;
}
window.addEventListener('resize', resize);
resize();

var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

/* ── the system ── */
var planets = [
  { name: 'AZUR',  r: 24, orbit: 240, speed: 0.22, ang: 0.6,  col1: '#7fe8dc', col2: '#1a6a72', ring: false },
  { name: 'RUSTE', r: 18, orbit: 380, speed: 0.13, ang: 3.6,  col1: '#f2b088', col2: '#8a3d22', ring: true }
];
function planetPos(p){
  return [CX + Math.cos(p.ang) * p.orbit * SCALE, CY + Math.sin(p.ang) * p.orbit * SCALE * 0.72];
}

/* ── packets: each carries one character ── */
var packets = [];
var delayS = 6;              /* full round trip target, seconds */
var cycles = 0;
var msgSeq = 0;
var rebuilt = {};            /* per-message reconstruction at home planet */
var checksums = {};          /* mid -> expected checksum */
var cipherOn = false;
var XOR_KEY = 42;
function cipherChar(ch){
  var c = (ch.charCodeAt(0) ^ XOR_KEY);
  return String.fromCharCode(33 + (c % 94));
}
function checksum(str){
  var sum = 0;
  for(var i = 0; i < str.length; i++) sum = (sum + str.charCodeAt(i)) & 255;
  return '0x' + sum.toString(16).toUpperCase().padStart(2, '0');
}
var arrivedFresh = 0;

function launch(ch, fromIdx, seq, total, mid){
  var from = planets[fromIdx], to = planets[1 - fromIdx];
  var fp = planetPos(from), tp = planetPos(to);
  var dist = Math.hypot(tp[0] - fp[0], tp[1] - fp[1]);
  packets.push({
    ch: ch, seq: seq, total: total, mid: mid,
    x: fp[0], y: fp[1],
    target: 1 - fromIdx,
    speed: dist / (delayS / 2),   /* one leg = half the round trip */
    hue: cipherOn ? 285 : 130,
    enc: cipherOn,
    scramble: performance.now(),
    trail: []
  });
}
function uploadMessage(text){
  var t = text.toUpperCase().replace(/\s+/g, '·');
  var mid = ++msgSeq;
  checksums[mid] = checksum(t);
  for(var i = 0; i < t.length; i++){
    (function(ch, i, total){
      setTimeout(function(){ launch(ch, 0, i, total, mid); }, i * 260);
    })(t[i], i, t.length);
  }
}
document.getElementById('btnSend').addEventListener('click', function(){
  var v = document.getElementById('msg').value.trim();
  if(!v) return;
  uploadMessage(v);
  document.getElementById('msg').value = '';
  document.getElementById('readout').innerHTML = 'uploading <b>' + esc(v.toUpperCase()) + '</b> to the void…';
});
document.getElementById('msg').addEventListener('keydown', function(e){
  if(e.key === 'Enter') document.getElementById('btnSend').click();
});
document.getElementById('btnClear').addEventListener('click', function(){
  packets = [];
  rebuilt = {};
  document.getElementById('readout').textContent = 'memory purged. the void forgets instantly.';
});
function esc(s){
  var d = document.createElement('span');
  d.textContent = s;
  return d.innerHTML;
}

var cipherBtn = document.getElementById('btnCipher');
cipherBtn.addEventListener('click', function(){
  cipherOn = !cipherOn;
  cipherBtn.textContent = cipherOn ? '🔐 XOR CIPHER: ON' : '🔓 XOR CIPHER: OFF';
  cipherBtn.setAttribute('aria-pressed', cipherOn ? 'true' : 'false');
  var now = performance.now();
  packets.forEach(function(p){
    if(p.corrupt) return;
    p.enc = cipherOn;
    p.scramble = now;   /* visible re-scramble; hue lerps in the loop */
  });
});
document.getElementById('btnFlare').addEventListener('click', function(){
  var alive = packets.filter(function(p){ return !p.corrupt; });
  if(!alive.length) return;
  var pk = alive[Math.floor(Math.random() * alive.length)];
  pk.ch = String.fromCharCode(pk.ch.charCodeAt(0) ^ (1 << (1 + Math.floor(Math.random() * 3))));
  pk.zapped = performance.now();
  document.getElementById('readout').innerHTML =
    '☀ solar flare! a bit flipped somewhere in transit\u2026 the checksum will know.';
});

var delayIn = document.getElementById('delay');
delayIn.addEventListener('input', function(){
  delayS = delayIn.value / 10;
  document.getElementById('sDelay').textContent = delayS.toFixed(1) + 's';
  document.getElementById('sRtt').textContent = delayS.toFixed(1) + 's';
});

/* ── stars ── */
var stars = [];
for(var i = 0; i < 240; i++){
  stars.push({ x: Math.random(), y: Math.random(), s: Math.random() * 1.6 + 0.4, ph: Math.random() * 6.28 });
}

/* ── loop ── */
var last = performance.now();
function frame(now){
  requestAnimationFrame(frame);
  var dt = Math.min(0.05, (now - last) / 1000);
  last = now;

  /* planets orbit */
  planets.forEach(function(p){ p.ang += p.speed * dt * (reduceMotion ? 0.3 : 1); });

  /* packets chase their (moving) target planet */
  for(var i = packets.length - 1; i >= 0; i--){
    var pk = packets[i];
    var hueTarget = pk.corrupt ? 275 : (pk.enc ? 285 : 130);
    pk.hue += (hueTarget - pk.hue) * Math.min(1, dt * 5);
    var tp = planetPos(planets[pk.target]);
    var dx = tp[0] - pk.x, dy = tp[1] - pk.y;
    var d = Math.hypot(dx, dy);
    var step = pk.speed * dt * SCALE;
    pk.trail.push([pk.x, pk.y]);
    if(pk.trail.length > 14) pk.trail.shift();
    if(d <= step + planets[pk.target].r * SCALE){
      /* arrived: bounce back */
      var arrivedHome = pk.target === 0;
      pk.x = tp[0]; pk.y = tp[1];
      pk.target = 1 - pk.target;
      var np = planetPos(planets[pk.target]);
      var nd = Math.hypot(np[0] - pk.x, np[1] - pk.y);
      pk.speed = nd / (delayS / 2);
      pk.enc = cipherOn;
      pk.scramble = now;
      if(arrivedHome){
        cycles++;
        if(pk.seq === 0) rebuilt[pk.mid] = '';
        rebuilt[pk.mid] = (rebuilt[pk.mid] || '') + pk.ch;
        arrivedFresh = now;
        if(pk.seq === pk.total - 1){
          var got = checksum(rebuilt[pk.mid] || '');
          var want = checksums[pk.mid] || got;
          var ok = got === want;
          if(!ok){
            packets.forEach(function(p){
              if(p.mid === pk.mid && !p.corrupt) p.corrupt = now;
            });
          }
          document.getElementById('sSum').textContent = got + (ok ? ' ✓' : ' ✗');
          document.getElementById('readout').innerHTML =
            'memory read-out: <b>' + esc(rebuilt[pk.mid] || '') + '</b> ' +
            '<span class="fresh">' + (ok ? '✓ checksum ' + got + ' verified' : '✗ CORRUPTED (' + got + ' ≠ ' + want + ')') + ' · lap ' + cycles + '</span>';
        }
      }
    } else {
      pk.x += dx / d * step;
      pk.y += dy / d * step;
    }
  }

  draw(now);
  document.getElementById('sFly').textContent = packets.length;
  document.getElementById('sBits').textContent = packets.length * 8;
  document.getElementById('sCyc').textContent = cycles;
}

function draw(now){
  ctx.clearRect(0, 0, W, H);
  /* stars */
  for(var i = 0; i < stars.length; i++){
    var st = stars[i];
    ctx.globalAlpha = 0.35 + 0.35 * Math.sin(now * 0.001 + st.ph);
    ctx.fillStyle = '#cdd8ec';
    ctx.fillRect(st.x * W, st.y * H, st.s * SCALE, st.s * SCALE);
  }
  ctx.globalAlpha = 1;
  /* the star at the barycenter */
  var g = ctx.createRadialGradient(CX, CY, 2, CX, CY, 60 * SCALE);
  g.addColorStop(0, '#fff7d8');
  g.addColorStop(0.25, '#ffd34d');
  g.addColorStop(1, 'rgba(255,211,77,0)');
  ctx.fillStyle = g;
  ctx.fillRect(CX - 60 * SCALE, CY - 60 * SCALE, 120 * SCALE, 120 * SCALE);
  ctx.fillStyle = '#fff3c0';
  ctx.beginPath();
  ctx.arc(CX, CY, 10 * SCALE, 0, 6.29);
  ctx.fill();
  /* orbital paths */
  planets.forEach(function(p){
    ctx.strokeStyle = 'rgba(102,116,143,0.35)';
    ctx.lineWidth = 1;
    ctx.setLineDash([5, 7]);
    ctx.beginPath();
    ctx.ellipse(CX, CY, p.orbit * SCALE, p.orbit * SCALE * 0.72, 0, 0, 6.29);
    ctx.stroke();
    ctx.setLineDash([]);
  });
  /* packets under planets */
  packets.forEach(function(pk){
    for(var t = 0; t < pk.trail.length; t++){
      ctx.globalAlpha = t / pk.trail.length * 0.5;
      ctx.fillStyle = 'hsl(' + pk.hue + ', 90%, 65%)';
      ctx.fillRect(pk.trail[t][0] - 1.5 * SCALE, pk.trail[t][1] - 1.5 * SCALE, 3 * SCALE, 3 * SCALE);
    }
    ctx.globalAlpha = 1;
    var gg = ctx.createRadialGradient(pk.x, pk.y, 1, pk.x, pk.y, 12 * SCALE);
    gg.addColorStop(0, 'hsla(' + pk.hue + ', 100%, 80%, 0.9)');
    gg.addColorStop(1, 'hsla(' + pk.hue + ', 100%, 60%, 0)');
    ctx.fillStyle = gg;
    ctx.fillRect(pk.x - 12 * SCALE, pk.y - 12 * SCALE, 24 * SCALE, 24 * SCALE);
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(pk.x, pk.y, 2.4 * SCALE, 0, 6.29);
    ctx.fill();
    /* XOR scramble animation at hops; cipher glyph while encrypted;
       corrupted packets flash orange then decay into purple static */
    var scrT = now - (pk.scramble || 0);
    var corT = pk.corrupt ? now - pk.corrupt : -1;
    var zapT = pk.zapped ? now - pk.zapped : -1;
    var shown;
    var STATIC_CHARS = '\u2580\u2584\u2588\u2593\u2592\u2591\u259A\u259E';
    if(corT >= 0){
      if(corT < 450){
        pk.hue = 25;   /* orange flash */
        shown = pk.ch;
      } else {
        shown = STATIC_CHARS[Math.floor(Math.random() * STATIC_CHARS.length)];
        ctx.globalAlpha = 0.55 + Math.random() * 0.35;
      }
    } else if(zapT >= 0 && zapT < 500){
      pk.hue = 25;
      shown = pk.ch;
      ctx.globalAlpha = 0.7 + Math.random() * 0.3;
    } else if(scrT < 380){
      shown = String.fromCharCode(33 + Math.floor(Math.random() * 94));
      ctx.globalAlpha = 0.85;
    } else {
      shown = pk.enc ? cipherChar(pk.ch) : pk.ch;
    }
    if(pk.enc){
      /* rotating dashed key-ring marks encrypted flight */
      ctx.strokeStyle = 'hsla(285, 90%, 75%, 0.8)';
      ctx.lineWidth = 1.2 * SCALE;
      ctx.setLineDash([3 * SCALE, 4 * SCALE]);
      ctx.lineDashOffset = -now * 0.02;
      ctx.beginPath();
      ctx.arc(pk.x, pk.y, 7 * SCALE, 0, 6.29);
      ctx.stroke();
      ctx.setLineDash([]);
    }
    if(corT >= 450){
      for(var sn = 0; sn < 3; sn++){
        ctx.fillStyle = 'hsla(275, ' + (30 + Math.random()*40) + '%, ' + (40 + Math.random()*30) + '%, ' + (0.2 + Math.random()*0.4) + ')';
        ctx.fillRect(pk.x + (Math.random()-0.5) * 18 * SCALE, pk.y + (Math.random()-0.5) * 18 * SCALE, 2 * SCALE, 2 * SCALE);
      }
    }
    ctx.fillStyle = scrT < 380 ? '#ffffff' : 'hsl(' + pk.hue + ', ' + (corT >= 450 ? 45 : 95) + '%, ' + (corT >= 450 ? 55 : 75) + '%)';
    ctx.font = (11 * SCALE) + 'px "Space Mono", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(shown, pk.x, pk.y - 8 * SCALE);
    ctx.globalAlpha = 1;
  });
  /* planets on top */
  planets.forEach(function(p, idx){
    var pos = planetPos(p);
    var pr = p.r * SCALE;
    if(p.ring){
      ctx.strokeStyle = 'rgba(242,176,136,0.5)';
      ctx.lineWidth = 2.5 * SCALE;
      ctx.beginPath();
      ctx.ellipse(pos[0], pos[1], pr * 1.9, pr * 0.55, -0.35, 0, 6.29);
      ctx.stroke();
    }
    var pg = ctx.createRadialGradient(pos[0] - pr * 0.4, pos[1] - pr * 0.4, pr * 0.15, pos[0], pos[1], pr);
    pg.addColorStop(0, p.col1);
    pg.addColorStop(1, p.col2);
    ctx.fillStyle = pg;
    ctx.beginPath();
    ctx.arc(pos[0], pos[1], pr, 0, 6.29);
    ctx.fill();
    ctx.globalAlpha = 0.25;
    var halo = ctx.createRadialGradient(pos[0], pos[1], pr, pos[0], pos[1], pr * 1.8);
    halo.addColorStop(0, p.col1);
    halo.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = halo;
    ctx.fillRect(pos[0] - pr * 1.8, pos[1] - pr * 1.8, pr * 3.6, pr * 3.6);
    ctx.globalAlpha = 1;
    ctx.fillStyle = '#8fa3c8';
    ctx.font = (10 * SCALE) + 'px "Space Mono", monospace';
    ctx.textAlign = 'center';
    ctx.fillText(p.name, pos[0], pos[1] + pr + 14 * SCALE);
  });
}
requestAnimationFrame(frame);

/* demo payload so the void isn't empty */
setTimeout(function(){ uploadMessage('HELLO VOID'); }, 900);

/* debug/testing */
window.__pp = function(){
  return { packets: packets.length, cycles: cycles, rebuilt: rebuilt, delay: delayS,
    cipher: cipherOn, encCount: packets.filter(function(p){ return p.enc; }).length,
    corrupt: packets.filter(function(p){ return p.corrupt; }).length,
    sample: packets[0] ? { ch: packets[0].ch, enc: packets[0].enc, cipher: cipherChar(packets[0].ch) } : null };
};
})();
</script>
</body>
</html>
