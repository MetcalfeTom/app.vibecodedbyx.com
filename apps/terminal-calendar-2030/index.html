<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Terminal Calendar 2030</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%97%93%EF%B8%8F" />

<meta name="description" content="A retro green-phosphor terminal showing July 2030. Click any date and the machine types out its log entry from the future, one character at a time." />
<meta property="og:type" content="website" />
<meta property="og:title" content="Terminal Calendar 2030" />
<meta property="og:description" content="A CRT terminal from the future. Click a date. Read its log." />
<meta property="og:url" content="https://sloppy.live/terminal-calendar-2030/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/a%20green%20phosphor%20CRT%20terminal%20screen%20displaying%20a%20monthly%20calendar%20grid%2C%20retro%20computing%2C%20scanlines%2C%20dark%20room?width=1200&height=630&nologo=true&seed=2030" />
<meta name="twitter:card" content="summary_large_image" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet" />

<style>
  :root{ --ph:#33ff66; --ph-dim:#1d9c40; --ph-dark:#0e5b26; --bg:#020a04; }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  body{
    min-height:100vh; background:#000; color:var(--ph); font-family:'VT323',monospace;
    display:flex; align-items:center; justify-content:center; padding:1rem .6rem;
    -webkit-font-smoothing:none;
  }
  .crt{
    position:relative; width:min(46rem,96vw); min-height:min(38rem,92vh);
    background:radial-gradient(120% 120% at 50% 40%, #05230f 0%, var(--bg) 70%);
    border-radius:14px; padding:1.4rem 1.6rem 1.6rem;
    box-shadow:0 0 0 6px #1a1a1a, 0 0 0 8px #2c2c2c, 0 18px 50px rgba(0,0,0,.8),
      inset 0 0 80px rgba(0,0,0,.55), inset 0 0 18px rgba(51,255,102,.08);
    overflow:hidden;
  }
  .crt::before{ content:""; position:absolute; inset:0; pointer-events:none; z-index:5;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,.25) 0 1px, transparent 1px 3px); }
  .crt::after{ content:""; position:absolute; inset:0; pointer-events:none; z-index:6;
    background:radial-gradient(105% 105% at 50% 50%, transparent 62%, rgba(0,0,0,.5) 100%); }
  @keyframes flick{ 0%,100%{opacity:1} 92%{opacity:1} 93%{opacity:.86} 94%{opacity:1} }
  .inner{ position:relative; z-index:2; animation:flick 7s infinite; }

  .head{ font-size:1.15rem; color:var(--ph-dim); letter-spacing:.05em; line-height:1.5; }
  .head b{ color:var(--ph); font-weight:400; }

  /* calendar */
  .calhead{ display:flex; align-items:baseline; justify-content:space-between; margin:1rem 0 .3rem; }
  .month{ font-size:1.9rem; letter-spacing:.12em; text-shadow:0 0 8px rgba(51,255,102,.5); }
  .nav button{ font-family:inherit; font-size:1.3rem; color:var(--ph); background:none; border:1px solid var(--ph-dark);
    border-radius:4px; padding:.1rem .7rem; cursor:pointer; min-height:2.2rem; }
  .nav button:hover{ background:rgba(51,255,102,.12); }
  .nav button:focus-visible{ outline:2px solid var(--ph); outline-offset:2px; }
  table{ width:100%; border-collapse:collapse; }
  th{ font-weight:400; font-size:1.05rem; color:var(--ph-dim); padding:.25rem 0; border-bottom:1px solid var(--ph-dark); }
  td{ padding:2px; }
  td button{
    width:100%; aspect-ratio:1.55/1; font-family:inherit; font-size:1.25rem; color:var(--ph);
    background:rgba(51,255,102,.04); border:1px solid var(--ph-dark); border-radius:3px; cursor:pointer;
    display:flex; align-items:flex-start; justify-content:flex-start; padding:.15rem .35rem;
  }
  td button:hover{ background:rgba(51,255,102,.16); text-shadow:0 0 8px rgba(51,255,102,.7); }
  td button:focus-visible{ outline:2px solid var(--ph); outline-offset:1px; }
  td button.sel{ background:rgba(51,255,102,.25); box-shadow:inset 0 0 10px rgba(51,255,102,.3); }
  td .pad{ opacity:0; pointer-events:none; }

  /* output */
  .out{ margin-top:1rem; border-top:1px solid var(--ph-dark); padding-top:.7rem;
    font-size:1.2rem; line-height:1.45; min-height:6.2rem; word-wrap:break-word; }
  .out .dim{ color:var(--ph-dim); }
  .cursor{ display:inline-block; width:.6em; height:1em; background:var(--ph); vertical-align:-0.12em;
    animation:blink 1.06s steps(1) infinite; }
  @keyframes blink{ 0%,49%{opacity:1} 50%,100%{opacity:0} }
  .hint{ margin-top:.6rem; font-size:.95rem; color:var(--ph-dark); }
  @media (prefers-reduced-motion: reduce){ .inner{ animation:none; } .cursor{ animation:none; } }
</style>
</head>
<body>
  <main class="crt">
    <div class="inner">
      <div class="head">
        SLOPTECH CHRONOS-88 · TEMPORAL DISPLAY UNIT<br>
        <b>&gt; cal --year 2030 --interactive</b><br>
        <span id="bootline">initializing phosphor…</span>
      </div>

      <div class="calhead">
        <span class="month" id="monthLbl">JULY 2030</span>
        <span class="nav">
          <button id="prevBtn" type="button" aria-label="Previous month">◄</button>
          <button id="nextBtn" type="button" aria-label="Next month">►</button>
        </span>
      </div>
      <table aria-label="Monthly calendar">
        <thead><tr><th>MON</th><th>TUE</th><th>WED</th><th>THU</th><th>FRI</th><th>SAT</th><th>SUN</th></tr></thead>
        <tbody id="grid"></tbody>
      </table>

      <div class="out" aria-live="polite">
        <span class="dim">&gt; </span><span id="typed"></span><span class="cursor" aria-hidden="true"></span>
      </div>
      <p class="hint">click a date to read its log entry · ◄ ► to change month</p>
    </div>
  </main>

<script>
(function(){
  "use strict";
  var $=function(id){return document.getElementById(id);};
  var MONTHS=['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
  var view={ y:2030, m:6 };   // July 2030
  var reduce=window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  // deterministic per-date future log entries
  var OPEN=[
    'routine sync with the lunar relay completed in',
    'the neighborhood delivery drone apologized for',
    'archive defrag recovered a memory of',
    'weather subscription delivered',
    'the toaster negotiated a firmware truce after',
    'municipal AI politely declined',
    'personal assistant flagged a nostalgia spike caused by',
    'the household plants filed a complaint regarding',
    'solar credits balanced themselves despite',
    'a legacy website from 2026 was found still running'
  ];
  var MID=[
    '3.2 seconds','one unscheduled sunset','a duplicate Tuesday','four rogue notifications',
    'an unlicensed rain shower','two competing coffee protocols','a brief return of dial-up sounds',
    'the annual cursor migration','a polite disagreement with the fridge','an untranslated seagull broadcast'
  ];
  var CLOSE=[
    'No further action required.','Filed under: fine, probably.','Backup of the backup verified.',
    'The committee remains unbothered.','Entropy holding at acceptable levels.','Rebooting optimism subsystem.',
    'All timelines nominal.','Witnesses: one cat.','Logged and lovingly ignored.','This entry types itself, allegedly.'
  ];
  function hash(s){ var h=2166136261; for(var i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return h>>>0; }
  function entryFor(y,m,d){
    var h=hash(y+'-'+m+'-'+d);
    var date=new Date(y,m,d);
    var dow=['SUN','MON','TUE','WED','THU','FRI','SAT'][date.getDay()];
    return 'LOG '+y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0')+' ['+dow+'] // '+
      OPEN[h%OPEN.length]+' '+MID[(h>>>4)%MID.length]+'. '+CLOSE[(h>>>9)%CLOSE.length];
  }

  // typewriter (interruptible)
  var typeToken=0;
  function typewrite(text){
    var token=++typeToken, el=$('typed'), i=0;
    el.textContent='';
    if(reduce){ el.textContent=text; return; }
    (function tick(){
      if(token!==typeToken) return;
      if(i>=text.length) return;
      el.textContent+=text[i++];
      var ch=text[i-1], pause = ch==='.'?220 : ch===','?120 : (18+Math.random()*26);
      setTimeout(tick, pause);
    })();
  }

  // calendar grid (Monday-first)
  function build(){
    $('monthLbl').textContent=MONTHS[view.m]+' '+view.y;
    var grid=$('grid'); grid.innerHTML='';
    var first=new Date(view.y,view.m,1);
    var lead=(first.getDay()+6)%7;                       // Mon=0
    var days=new Date(view.y,view.m+1,0).getDate();
    var cells=[];
    for(var i=0;i<lead;i++) cells.push(null);
    for(var d=1;d<=days;d++) cells.push(d);
    while(cells.length%7) cells.push(null);
    for(var r=0;r<cells.length;r+=7){
      var tr=document.createElement('tr');
      for(var c=0;c<7;c++){
        var td=document.createElement('td');
        var v=cells[r+c];
        var b=document.createElement('button'); b.type='button';
        if(v===null){ b.className='pad'; b.disabled=true; b.setAttribute('aria-hidden','true'); b.textContent='·'; }
        else{
          b.textContent=v;
          b.setAttribute('aria-label', MONTHS[view.m]+' '+v+', '+view.y);
          (function(day,btn){
            btn.addEventListener('click', function(){
              grid.querySelectorAll('.sel').forEach(function(x){ x.classList.remove('sel'); });
              btn.classList.add('sel');
              typewrite(entryFor(view.y,view.m,day));
            });
          })(v,b);
        }
        td.appendChild(b); tr.appendChild(td);
      }
      grid.appendChild(tr);
    }
  }
  $('prevBtn').addEventListener('click', function(){ view.m--; if(view.m<0){ view.m=11; view.y--; } build(); typewrite('month buffer swapped: '+MONTHS[view.m]+' '+view.y+'.'); });
  $('nextBtn').addEventListener('click', function(){ view.m++; if(view.m>11){ view.m=0; view.y++; } build(); typewrite('month buffer swapped: '+MONTHS[view.m]+' '+view.y+'.'); });

  build();
  // boot sequence
  var boot=['initializing phosphor…','calibrating temporal offset: +4 years…','display ready. select a date.'];
  var bi=0;
  (function bootTick(){
    $('bootline').textContent=boot[bi];
    if(++bi<boot.length) setTimeout(bootTick, reduce?60:650);
    else typewrite('awaiting input. the future is clickable.');
  })();
})();
</script>
</body>
</html>
