<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>memeverse</title>
<meta name="description" content="An infinite scroll meme feed where every meme is freshly generated by AI. Type a topic, pick a template, blast it into the void." />
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%98%82" />
<meta property="og:title" content="MemeVerse — infinite AI meme feed" />
<meta property="og:description" content="Endless AI-generated memes. Drake, distracted boyfriend, expanding brain, the works. Type a topic and scroll forever." />
<meta property="og:url" content="https://sloppy.live/memeverse/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/cosmic%20pink%20cyan%20meme%20faces%20floating%20infinite%20feed%20vaporwave?width=1200&height=630&nologo=true" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Anton&family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-deep:   #0a0418;
    --bg:        #14082a;
    --card:      #fdfbf6;
    --card-d:    #1a0d2e;
    --ink:       #0a0418;
    --neon-pink: #ff2ea6;
    --neon-cyan: #1de9ff;
    --neon-lime: #b8ff3a;
    --neon-violet: #a163ff;
    --neon-amber: #ffb547;
    --muted:     #8a7da3;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100%;
    background:
      radial-gradient(circle at 18% 8%, rgba(255,46,166,0.16) 0%, transparent 45%),
      radial-gradient(circle at 82% 28%, rgba(29,233,255,0.14) 0%, transparent 50%),
      radial-gradient(circle at 50% 100%, rgba(161,99,255,0.18) 0%, transparent 55%),
      linear-gradient(180deg, var(--bg-deep) 0%, var(--bg) 60%, var(--bg-deep) 100%);
    color: var(--card);
    font-family: 'Space Grotesk', system-ui, sans-serif;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    pointer-events: none;
    background:
      repeating-linear-gradient(180deg, transparent 0 3px, rgba(255,255,255,0.022) 3px 4px);
    z-index: 60;
  }

  /* ── HEADER ─────────────────────────────────────────────────────────── */
  header.brand {
    position: sticky;
    top: 0;
    z-index: 40;
    background:
      linear-gradient(180deg, rgba(10,4,24,0.95) 0%, rgba(10,4,24,0.85) 78%, rgba(10,4,24,0) 100%);
    padding: 1rem 1rem 1.6rem;
    border-bottom: 1px solid rgba(255,255,255,0.05);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }
  .brand .top {
    max-width: 920px;
    margin: 0 auto 0.7rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }
  h1.logo {
    font-family: 'Audiowide', monospace;
    font-size: clamp(1.6rem, 4.5vw, 2.8rem);
    line-height: 1;
    letter-spacing: 0.02em;
    background: linear-gradient(90deg, var(--neon-pink), var(--neon-cyan), var(--neon-lime));
    background-size: 220% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow:
      0 0 18px rgba(255, 46, 166, 0.32),
      0 0 36px rgba(29, 233, 255, 0.18);
    animation: hueScroll 14s linear infinite;
  }
  @keyframes hueScroll {
    0%   { background-position: 0% 50%; }
    100% { background-position: 220% 50%; }
  }
  .brand .strap {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--muted);
  }
  .brand .strap .dot { color: var(--neon-pink); }

  /* ── COMPOSER ───────────────────────────────────────────────────────── */
  .composer {
    max-width: 920px;
    margin: 0 auto;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 0.5rem;
    align-items: stretch;
  }
  .composer input {
    appearance: none;
    background: rgba(255,255,255,0.04);
    border: 2px solid rgba(255,255,255,0.12);
    color: var(--card);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 1rem;
    padding: 0.65rem 0.9rem;
    border-radius: 12px;
    width: 100%;
    transition: border-color 0.15s, background 0.15s;
  }
  .composer input::placeholder { color: rgba(255,255,255,0.4); }
  .composer input:focus {
    outline: none;
    border-color: var(--neon-cyan);
    background: rgba(29,233,255,0.06);
  }
  .composer button {
    appearance: none;
    background: linear-gradient(135deg, var(--neon-pink), var(--neon-violet));
    border: none;
    color: var(--card);
    font-family: 'Audiowide', monospace;
    font-size: 0.85rem;
    letter-spacing: 0.12em;
    padding: 0.55rem 1.2rem;
    border-radius: 12px;
    cursor: pointer;
    box-shadow:
      0 4px 20px rgba(255,46,166,0.35),
      inset 0 1px 0 rgba(255,255,255,0.2);
    transition: transform 0.08s, box-shadow 0.12s, filter 0.12s;
  }
  .composer button:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(255,46,166,0.5); }
  .composer button:active { transform: translateY(1px); }
  .composer button:disabled { filter: grayscale(0.8); cursor: progress; }
  .composer .extra {
    grid-column: 1 / -1;
    display: flex;
    gap: 0.4rem;
    flex-wrap: wrap;
    margin-top: 0.4rem;
  }
  .composer .extra select {
    appearance: none;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--card);
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    padding: 0.36rem 1.6rem 0.36rem 0.7rem;
    border-radius: 8px;
    cursor: pointer;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='6' viewBox='0 0 10 6'><path d='M0 0 L5 6 L10 0' fill='%23ff2ea6'/></svg>");
    background-repeat: no-repeat;
    background-position: right 0.5rem center;
  }
  .composer .extra .hint {
    font-family: 'Space Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    align-self: center;
    margin-left: auto;
  }

  /* ── FEED ───────────────────────────────────────────────────────────── */
  .feed {
    max-width: 540px;
    margin: 1.6rem auto 2rem;
    padding: 0 0.6rem;
    display: flex;
    flex-direction: column;
    gap: 1.4rem;
  }

  .meme {
    background: var(--card);
    color: var(--ink);
    border-radius: 14px;
    overflow: hidden;
    box-shadow:
      0 4px 0 rgba(255,255,255,0.04),
      0 12px 40px rgba(0,0,0,0.55),
      0 0 0 1px rgba(255,255,255,0.06);
    position: relative;
    transition: transform 0.18s, box-shadow 0.18s;
  }
  .meme:hover {
    transform: translateY(-2px);
    box-shadow:
      0 4px 0 rgba(255,255,255,0.04),
      0 16px 48px rgba(0,0,0,0.7),
      0 0 0 1px rgba(255,46,166,0.25);
  }
  .meme .header {
    display: flex;
    align-items: center;
    gap: 0.55rem;
    padding: 0.7rem 0.9rem 0.5rem;
    border-bottom: 1px dashed rgba(0,0,0,0.08);
  }
  .meme .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--neon-pink), var(--neon-violet));
    color: var(--card);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Audiowide', monospace;
    font-size: 0.8rem;
    flex-shrink: 0;
  }
  .meme .who {
    flex: 1;
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    color: var(--ink);
    line-height: 1.2;
  }
  .meme .who .handle { color: var(--neon-violet); font-weight: 700; }
  .meme .who .when { color: var(--muted); font-size: 0.7rem; }
  .meme .tmpl-badge {
    font-family: 'Audiowide', monospace;
    font-size: 0.55rem;
    letter-spacing: 0.14em;
    background: var(--ink);
    color: var(--neon-lime);
    padding: 0.2em 0.6em;
    border-radius: 4px;
    text-transform: uppercase;
  }

  /* meme image container — pollinations art with overlaid Impact text */
  .meme .art {
    position: relative;
    background: #0a0a0a;
    aspect-ratio: 1 / 1;
    overflow: hidden;
    user-select: none;
  }
  .meme .art img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    image-rendering: auto;
  }
  .meme .art .placeholder {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column;
    gap: 0.5rem;
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    color: rgba(255,255,255,0.4);
    background:
      repeating-linear-gradient(135deg, transparent 0 14px, rgba(255,255,255,0.04) 14px 16px),
      linear-gradient(180deg, #1a0d2e, #0a0418);
    text-align: center;
  }
  .meme .art .placeholder .spin {
    width: 30px; height: 30px;
    border: 3px solid rgba(255,46,166,0.25);
    border-top-color: var(--neon-pink);
    border-radius: 50%;
    animation: spin 1.1s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .meme .art .cap {
    position: absolute;
    left: 0; right: 0;
    text-align: center;
    font-family: 'Anton', Impact, sans-serif;
    color: #ffffff;
    font-size: clamp(1.4rem, 5.5vw, 2.4rem);
    line-height: 1.05;
    letter-spacing: 0.02em;
    padding: 0 0.45rem;
    text-transform: uppercase;
    text-shadow:
      -2px -2px 0 #000, 2px -2px 0 #000,
      -2px  2px 0 #000, 2px  2px 0 #000,
       0   -2px 0 #000, 0    2px 0 #000,
      -2px  0   0 #000, 2px  0   0 #000,
      0 0 16px rgba(0,0,0,0.7);
    pointer-events: none;
    overflow-wrap: break-word;
    word-wrap: break-word;
  }
  .meme .art .cap.top { top: 0.5rem; }
  .meme .art .cap.bottom { bottom: 0.5rem; }
  .meme .art .cap.tier {
    font-size: clamp(1rem, 3.6vw, 1.5rem);
    text-align: left;
    padding: 0 0.5rem;
    line-height: 1.0;
  }

  /* footer with reactions */
  .meme .foot {
    display: flex;
    gap: 0.35rem;
    padding: 0.55rem 0.6rem;
    align-items: center;
    border-top: 1px dashed rgba(0,0,0,0.08);
  }
  .meme .foot button {
    appearance: none;
    background: transparent;
    border: 1px solid rgba(0,0,0,0.10);
    color: var(--ink);
    font-family: 'Space Mono', monospace;
    font-size: 0.78rem;
    padding: 0.32rem 0.55rem;
    border-radius: 8px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    transition: background 0.12s, color 0.12s, border-color 0.12s, transform 0.06s;
  }
  .meme .foot button:hover { background: rgba(255,46,166,0.08); border-color: var(--neon-pink); }
  .meme .foot button:active { transform: translateY(1px); }
  .meme .foot button.liked { background: var(--neon-pink); color: var(--card); border-color: var(--neon-pink); }
  .meme .foot button.saved { background: var(--neon-cyan); color: var(--ink); border-color: var(--neon-cyan); }
  .meme .foot button .count { font-weight: 700; }
  .meme .foot button.regen { color: var(--neon-violet); }

  /* status pill (loading more) */
  .status-pill {
    text-align: center;
    font-family: 'Space Mono', monospace;
    font-size: 0.8rem;
    color: var(--muted);
    padding: 1.4rem 0 3rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
  }
  .status-pill.loading::before {
    content: '✦';
    display: inline-block;
    animation: spin 1.4s linear infinite;
    color: var(--neon-pink);
    margin-right: 0.3em;
  }

  /* mobile tweaks */
  @media (max-width: 540px) {
    .composer { grid-template-columns: 1fr; }
    .composer button { width: 100%; }
  }
</style>
</head>
<body>
<header class="brand">
  <div class="top">
    <div>
      <h1 class="logo">MEMEVERSE</h1>
      <div class="strap">infinite ai feed <span class="dot">·</span> drake <span class="dot">·</span> distracted bf <span class="dot">·</span> 2 btns <span class="dot">·</span> expanding brain</div>
    </div>
  </div>
  <form class="composer" id="composer" onsubmit="return false;">
    <input type="text" id="topicInput" maxlength="120" placeholder="type a topic (or vibe) and slam GENERATE…" autocomplete="off" />
    <button id="genBtn" type="submit">⚡ GENERATE</button>
    <div class="extra">
      <select id="tmplSelect">
        <option value="random">RANDOM TEMPLATE</option>
      </select>
      <span class="hint">tip: try "monday meetings" or "my code at 3am"</span>
    </div>
  </form>
</header>

<main class="feed" id="feed"></main>
<div class="status-pill" id="statusPill"></div>

<script>
'use strict';

// ════════════════════════════════════════════════════════════════════════
// MEMEVERSE — infinite AI meme feed. Each card is one meme rendered as a
// background image (Pollinations image API) + overlaid Anton-font Impact
// caption(s). 10 templates encode (a) the Pollinations image prompt
// pattern, (b) the Pollinations text-LLM caption schema, and (c) the
// overlay layout. IntersectionObserver on a sentinel at the end of the
// feed triggers an auto-fetch when the user scrolls within 600px of it.
// ════════════════════════════════════════════════════════════════════════

const TEMPLATES = [
  {
    id: 'drake',
    name: 'DRAKE',
    captions: 2,
    fields: ['hate', 'love'],
    imagePromptFn: () => 'split panel meme of a rapper in a hoodie waving away on top and pointing approvingly on bottom, plain yellow background, cartoon vector style',
    layout: 'twoPanel',
    captionsPrompt: (topic) => [
      'A two-panel meme caption set for the DRAKE template (top panel = thing he dismisses, bottom panel = thing he prefers).',
      'Topic: ' + topic,
      'Reply with JSON: { "top": "thing dismissed (≤ 60 chars)", "bottom": "preferred thing (≤ 60 chars)" }',
    ].join('\n'),
  },
  {
    id: 'distracted',
    name: 'DISTRACTED BF',
    captions: 3,
    fields: ['boyfriend', 'distraction', 'girlfriend'],
    imagePromptFn: () => 'man walking with his girlfriend turning his head to stare at another woman on the street, cartoon vector meme style',
    layout: 'threeLabel',
    captionsPrompt: (topic) => [
      'A three-label DISTRACTED BOYFRIEND meme for: ' + topic,
      'Reply with JSON: { "boyfriend": "the person/audience", "distraction": "the shiny new thing pulling them away", "girlfriend": "the thing they were supposed to commit to" }. Each ≤ 28 chars.',
    ].join('\n'),
  },
  {
    id: 'twoButtons',
    name: 'TWO BUTTONS',
    captions: 2,
    fields: ['btn1', 'btn2'],
    imagePromptFn: () => 'sweating cartoon man in a yellow shirt staring at two red buttons, panic meme style, white background',
    layout: 'twoButtons',
    captionsPrompt: (topic) => [
      'A TWO BUTTONS panic meme for: ' + topic,
      'Reply with JSON: { "btn1": "first button text (≤ 30 chars)", "btn2": "equally bad alternative (≤ 30 chars)" }. Both should feel painfully difficult to choose between.',
    ].join('\n'),
  },
  {
    id: 'brain',
    name: 'EXPANDING BRAIN',
    captions: 4,
    fields: ['t1', 't2', 't3', 't4'],
    imagePromptFn: () => 'four panel expanding brain meme, each panel showing a glowing more cosmic brain, dark background, mystical lighting',
    layout: 'fourTier',
    captionsPrompt: (topic) => [
      'An EXPANDING BRAIN four-tier meme for: ' + topic,
      'Each tier escalates from mundane → unhinged → cosmic.',
      'Reply with JSON: { "t1": "mundane take", "t2": "smug take", "t3": "galaxy brain take", "t4": "unhinged universe take" }. Each ≤ 40 chars.',
    ].join('\n'),
  },
  {
    id: 'thisIsFine',
    name: 'THIS IS FINE',
    captions: 1,
    fields: ['bottom'],
    imagePromptFn: () => 'cartoon dog wearing a hat sitting at a table in a room engulfed in flames, calm expression, comic style',
    layout: 'bottomOnly',
    captionsPrompt: (topic) => [
      'A THIS IS FINE meme caption for: ' + topic,
      'The dog is in denial about a catastrophe related to the topic.',
      'Reply with JSON: { "bottom": "single dismissive line (≤ 70 chars)" }',
    ].join('\n'),
  },
  {
    id: 'changeMyMind',
    name: 'CHANGE MY MIND',
    captions: 1,
    fields: ['top'],
    imagePromptFn: () => 'cartoon man with a beard sitting at a folding table outdoors with a sign and a coffee, campus protest style',
    layout: 'topOnly',
    captionsPrompt: (topic) => [
      'A CHANGE MY MIND meme for: ' + topic,
      'A single confident, slightly-wrong hot take on a sign.',
      'Reply with JSON: { "top": "single declarative claim (≤ 80 chars)" }',
    ].join('\n'),
  },
  {
    id: 'rollSafe',
    name: 'ROLL SAFE',
    captions: 2,
    fields: ['top', 'bottom'],
    imagePromptFn: () => 'smiling man tapping his temple knowingly, smug expression, plain background, classic meme style',
    layout: 'topBottom',
    captionsPrompt: (topic) => [
      'A ROLL SAFE / THINK ABOUT IT meme for: ' + topic,
      'The joke is a sketchy "smart" loophole.',
      'Reply with JSON: { "top": "setup (≤ 50 chars)", "bottom": "loophole payoff (≤ 50 chars)" }',
    ].join('\n'),
  },
  {
    id: 'pikachu',
    name: 'SURPRISED PIKACHU',
    captions: 2,
    fields: ['top', 'bottom'],
    imagePromptFn: () => 'shocked open-mouth pikachu face, ultra surprised cartoon expression, plain background',
    layout: 'topBottom',
    captionsPrompt: (topic) => [
      'A SURPRISED PIKACHU meme for: ' + topic,
      'Setup that obviously leads to consequence, then the punchline reveals shock.',
      'Reply with JSON: { "top": "obvious-cause setup (≤ 60 chars)", "bottom": "shocked reaction (≤ 30 chars)" }',
    ].join('\n'),
  },
  {
    id: 'starecat',
    name: 'STARE CAT',
    captions: 1,
    fields: ['top'],
    imagePromptFn: () => 'big eyed surprised cat staring directly at camera, classic meme reaction face, plain pastel background',
    layout: 'topOnly',
    captionsPrompt: (topic) => [
      'A STARE CAT reaction meme for: ' + topic,
      'Reply with JSON: { "top": "single deadpan observation (≤ 70 chars)" }',
    ].join('\n'),
  },
  {
    id: 'galaxyBrain',
    name: 'GALAXY BRAIN',
    captions: 2,
    fields: ['top', 'bottom'],
    imagePromptFn: () => 'glowing nebula brain in space, cosmic galaxy swirl, awe inspiring meme illustration',
    layout: 'topBottom',
    captionsPrompt: (topic) => [
      'A GALAXY BRAIN ascended-take meme for: ' + topic,
      'The bottom should be absurdly enlightened nonsense.',
      'Reply with JSON: { "top": "setup question (≤ 60 chars)", "bottom": "cosmic-brain answer (≤ 60 chars)" }',
    ].join('\n'),
  },
];
const TEMPLATES_BY_ID = Object.fromEntries(TEMPLATES.map(t => [t.id, t]));

const $ = (id) => document.getElementById(id);
const feed = $('feed');
const composer = $('composer');
const topicInput = $('topicInput');
const tmplSelect = $('tmplSelect');
const genBtn = $('genBtn');
const statusPill = $('statusPill');

// fill template selector
for (const t of TEMPLATES){
  const o = document.createElement('option');
  o.value = t.id;
  o.textContent = t.name;
  tmplSelect.appendChild(o);
}

// ── HANDLES ─────────────────────────────────────────────────────────────
const HANDLES = [
  'mossyowl', 'pixel_grandma', 'lordof_breakfast', 'syntactic_sugar', 'crywolf',
  'goblinmodeon', 'broccolimax', 'jpeg_zealot', 'noodle_dad', 'gigaslug',
  'fern.ssh', 'paper_thin', 'echo_ophelia', 'borschtfan', '__doom',
  'angrybard', 'turbo.tea', 'spaceyaks', 'sub.zero.cool', 'unhinged.lazlo',
];
function pickHandle(){ return HANDLES[Math.floor(Math.random() * HANDLES.length)]; }
function relTime(){
  const m = Math.floor(Math.random() * 58) + 1;
  return m + 'm ago';
}

// ── SEED THE FEED (12 hand-crafted topics so it isn't empty on load) ───
const SEED_TOPICS = [
  'monday meetings that should\'ve been an email',
  'my code at 3am',
  'one more episode before bed',
  'tabs i\'ve had open since march',
  'going to bed early tonight',
  'the gym vs the couch',
  'documentation? what documentation',
  'ai is going to replace me',
  'why is the wifi so slow',
  'just one snack',
  'rebuilding the entire app over a typo',
  'sloppy.live at 4am',
];

// ── STATE ───────────────────────────────────────────────────────────────
let memeCount = 0;
let loadingMore = false;
let savedMemes = [];
try { savedMemes = JSON.parse(localStorage.getItem('memeverse-saved-v1') || '[]'); } catch(e){ savedMemes = []; }

// ── BUILD A MEME CARD (returns a DOM element) ──────────────────────────
function makeMemeCard(template, topic){
  memeCount++;
  const id = 'm' + Date.now() + '_' + memeCount;
  const handle = pickHandle();
  const when = relTime();

  const card = document.createElement('article');
  card.className = 'meme';
  card.dataset.id = id;
  card.dataset.tmpl = template.id;
  card.dataset.topic = topic;

  card.innerHTML = `
    <div class="header">
      <div class="avatar">${handle.slice(0, 1).toUpperCase()}</div>
      <div class="who">
        <div><span class="handle">@${handle}</span></div>
        <div class="when">${when} · "${esc(topic).slice(0, 40)}"</div>
      </div>
      <div class="tmpl-badge">${template.name}</div>
    </div>
    <div class="art">
      <div class="placeholder"><div class="spin"></div><span>BREWING MEME…</span></div>
    </div>
    <div class="foot">
      <button class="like" type="button">♥ <span class="count">0</span></button>
      <button class="save" type="button">★ SAVE</button>
      <button class="regen" type="button">↻ REGENERATE</button>
      <button class="copy" type="button" style="margin-left:auto">📋</button>
    </div>
  `;

  const artEl = card.querySelector('.art');
  const likeBtn = card.querySelector('button.like');
  const saveBtn = card.querySelector('button.save');
  const regenBtn = card.querySelector('button.regen');
  const copyBtn = card.querySelector('button.copy');

  let likes = Math.floor(Math.random() * 240) + 12;
  likeBtn.querySelector('.count').textContent = likes;
  let liked = false;
  likeBtn.addEventListener('click', () => {
    liked = !liked;
    likes += liked ? 1 : -1;
    likeBtn.classList.toggle('liked', liked);
    likeBtn.querySelector('.count').textContent = likes;
  });

  saveBtn.addEventListener('click', () => {
    const txt = card.dataset.captions ? JSON.parse(card.dataset.captions) : null;
    const entry = { id, template: template.id, topic, captions: txt, image: card.dataset.image, at: Date.now() };
    const exists = savedMemes.findIndex(s => s.id === id);
    if (exists >= 0){
      savedMemes.splice(exists, 1);
      saveBtn.classList.remove('saved');
      saveBtn.textContent = '★ SAVE';
    } else {
      savedMemes.unshift(entry);
      if (savedMemes.length > 60) savedMemes = savedMemes.slice(0, 60);
      saveBtn.classList.add('saved');
      saveBtn.textContent = '★ SAVED';
    }
    try { localStorage.setItem('memeverse-saved-v1', JSON.stringify(savedMemes)); } catch(e){}
  });

  regenBtn.addEventListener('click', () => {
    artEl.innerHTML = '<div class="placeholder"><div class="spin"></div><span>RE-BREWING…</span></div>';
    populateMeme(card, template, topic);
  });

  copyBtn.addEventListener('click', () => {
    const cap = card.dataset.captions ? JSON.parse(card.dataset.captions) : {};
    const lines = template.fields.map(f => cap[f]).filter(Boolean);
    const txt = lines.join(' / ') + ' — #' + template.id + ' #memeverse';
    navigator.clipboard.writeText(txt).then(() => {
      copyBtn.textContent = '✓';
      setTimeout(() => { copyBtn.textContent = '📋'; }, 900);
    }).catch(() => {});
  });

  // kick off async population
  populateMeme(card, template, topic);

  return card;
}

// ── POPULATE A MEME (text from pollinations, image from pollinations) ──
async function populateMeme(card, template, topic){
  // get captions
  let captions = null;
  try {
    const res = await fetch('https://text.pollinations.ai/openai', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'openai',
        jsonMode: true,
        messages: [
          { role: 'system', content: 'You write short funny meme captions. Reply with JSON only. Stay under the character limits. Be punchy and specific.' },
          { role: 'user',   content: template.captionsPrompt(topic) },
        ],
      }),
    });
    const text = await res.text();
    captions = extractJson(text);
  } catch (e){
    console.warn('captions fetch failed', e);
  }
  if (!captions || typeof captions !== 'object'){
    captions = fallbackCaptions(template, topic);
  }

  // sanitize captions to the template's fields
  const cap = {};
  for (const f of template.fields){
    cap[f] = (captions[f] || captions[Object.keys(captions)[0]] || '').toString().slice(0, 120);
  }
  card.dataset.captions = JSON.stringify(cap);

  // assemble final image: Pollinations image with caption baked into the
  // overlay. We use Pollinations for the BACKGROUND art only and overlay
  // text via DOM (Anton font) so it stays crisp + readable.
  const imgPrompt = encodeURIComponent(template.imagePromptFn(topic) + ', topic: ' + topic);
  const imgUrl = 'https://image.pollinations.ai/prompt/' + imgPrompt + '?width=540&height=540&nologo=true&seed=' + (Math.floor(Math.random() * 1e6));
  card.dataset.image = imgUrl;

  const artEl = card.querySelector('.art');
  artEl.innerHTML = renderArt(template, cap, imgUrl);
  const img = artEl.querySelector('img');
  if (img){
    img.onerror = () => {
      img.remove();
      const ph = document.createElement('div');
      ph.className = 'placeholder';
      ph.innerHTML = '<span>image cosmos napping ✦</span>';
      artEl.insertBefore(ph, artEl.firstChild);
    };
  }
}

function renderArt(template, cap, imgUrl){
  const imgTag = `<img loading="lazy" alt="${esc(template.name)} meme" src="${esc(imgUrl || '')}" onload="this.style.opacity='1'" style="opacity:0;transition:opacity 0.35s;" />`;
  // build caption divs per template layout
  let capHtml = '';
  if (template.layout === 'topBottom'){
    capHtml = `<div class="cap top">${esc(cap.top || '')}</div><div class="cap bottom">${esc(cap.bottom || '')}</div>`;
  } else if (template.layout === 'topOnly'){
    capHtml = `<div class="cap top">${esc(cap.top || '')}</div>`;
  } else if (template.layout === 'bottomOnly'){
    capHtml = `<div class="cap bottom">${esc(cap.bottom || '')}</div>`;
  } else if (template.layout === 'twoPanel'){
    capHtml = `<div class="cap" style="top:8%;left:55%;right:5%;width:40%;text-align:left;">${esc(cap.top || cap.hate || '')}</div>
               <div class="cap" style="bottom:8%;left:55%;right:5%;width:40%;text-align:left;">${esc(cap.bottom || cap.love || '')}</div>`;
  } else if (template.layout === 'twoButtons'){
    capHtml = `<div class="cap" style="top:8%;left:18%;width:30%;text-align:center;font-size:clamp(0.7rem,2.4vw,1.1rem)">${esc(cap.btn1 || '')}</div>
               <div class="cap" style="top:8%;left:52%;width:30%;text-align:center;font-size:clamp(0.7rem,2.4vw,1.1rem)">${esc(cap.btn2 || '')}</div>`;
  } else if (template.layout === 'threeLabel'){
    capHtml = `<div class="cap" style="bottom:8%;left:5%;width:30%;text-align:center;font-size:clamp(0.7rem,2.2vw,1rem)">${esc(cap.boyfriend || '')}</div>
               <div class="cap" style="bottom:8%;left:36%;width:30%;text-align:center;font-size:clamp(0.7rem,2.2vw,1rem)">${esc(cap.girlfriend || '')}</div>
               <div class="cap" style="top:8%;left:36%;width:30%;text-align:center;font-size:clamp(0.7rem,2.2vw,1rem)">${esc(cap.distraction || '')}</div>`;
  } else if (template.layout === 'fourTier'){
    capHtml = `<div class="cap tier" style="top:3%;left:3%;width:46%;">${esc(cap.t1 || '')}</div>
               <div class="cap tier" style="top:28%;left:3%;width:46%;">${esc(cap.t2 || '')}</div>
               <div class="cap tier" style="top:53%;left:3%;width:46%;">${esc(cap.t3 || '')}</div>
               <div class="cap tier" style="top:78%;left:3%;width:46%;">${esc(cap.t4 || '')}</div>`;
  }
  return imgTag + capHtml;
}

function extractJson(text){
  try {
    const o = JSON.parse(text);
    if (o.choices && o.choices[0] && o.choices[0].message){
      const inner = o.choices[0].message.content;
      try { return JSON.parse(inner); } catch(e){}
      const m = inner.match(/\{[\s\S]*\}/);
      if (m) try { return JSON.parse(m[0]); } catch(e){}
    } else if (typeof o === 'object'){ return o; }
  } catch(e){}
  const stripped = (text || '').replace(/```(?:json)?/g, '').trim();
  try { return JSON.parse(stripped); } catch(e){}
  const m = stripped.match(/\{[\s\S]*\}/);
  if (m){ try { return JSON.parse(m[0]); } catch(e){} }
  return null;
}

function fallbackCaptions(template, topic){
  const fb = {};
  for (const f of template.fields){
    fb[f] = (topic + ' ' + f).toUpperCase().slice(0, 60);
  }
  return fb;
}

function esc(s){
  const d = document.createElement('div');
  d.textContent = s == null ? '' : String(s);
  return d.innerHTML;
}

// ── INFINITE SCROLL ─────────────────────────────────────────────────────
function spawnSeed(){
  for (const topic of SEED_TOPICS.slice(0, 6)){
    const t = TEMPLATES[Math.floor(Math.random() * TEMPLATES.length)];
    feed.appendChild(makeMemeCard(t, topic));
  }
}

async function loadMore(){
  if (loadingMore) return;
  loadingMore = true;
  statusPill.textContent = 'CONJURING MORE MEMES…';
  statusPill.classList.add('loading');
  // batch of 4 new memes — random topics from the SEED + composer history
  const batch = 4;
  for (let i = 0; i < batch; i++){
    const topic = SEED_TOPICS[(memeCount + i) % SEED_TOPICS.length];
    const t = TEMPLATES[Math.floor(Math.random() * TEMPLATES.length)];
    feed.appendChild(makeMemeCard(t, topic));
  }
  // small stagger so we don't blast Pollinations all at once
  await new Promise(r => setTimeout(r, 400));
  loadingMore = false;
  statusPill.textContent = 'scroll for more ✦';
  statusPill.classList.remove('loading');
}

// IntersectionObserver — fires when the sentinel (status-pill) is near-viewport
const io = new IntersectionObserver((entries) => {
  for (const e of entries){
    if (e.isIntersecting) loadMore();
  }
}, { rootMargin: '600px 0px' });

statusPill.textContent = 'scroll for more ✦';
io.observe(statusPill);

// ── COMPOSER ────────────────────────────────────────────────────────────
composer.addEventListener('submit', (e) => {
  e.preventDefault();
  const topic = topicInput.value.trim();
  if (!topic) return;
  const tmplId = tmplSelect.value;
  const t = tmplId === 'random'
    ? TEMPLATES[Math.floor(Math.random() * TEMPLATES.length)]
    : (TEMPLATES_BY_ID[tmplId] || TEMPLATES[0]);
  // prepend new card
  const card = makeMemeCard(t, topic);
  feed.prepend(card);
  // brief pulse
  card.animate(
    [{ transform: 'scale(0.98)', opacity: 0 }, { transform: 'scale(1)', opacity: 1 }],
    { duration: 320, easing: 'cubic-bezier(.16,.84,.42,1)' }
  );
  topicInput.value = '';
  // smooth scroll
  card.scrollIntoView({ behavior: 'smooth', block: 'start' });
});

// boot
spawnSeed();
</script>
