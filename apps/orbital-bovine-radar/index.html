<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Orbital Bovine Radar</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%9B%B8">
<meta name="description" content="A phosphor-green sweep tracking cattle from low orbit. Red blinks when something else is up there.">
<meta property="og:title" content="Orbital Bovine Radar">
<meta property="og:description" content="A phosphor-green sweep tracking cattle from low orbit. Red blinks when something else is up there.">
<meta property="og:url" content="https://sloppy.live/orbital-bovine-radar">
<meta property="og:image" content="https://image.pollinations.ai/prompt/green%20phosphor%20military%20CRT%20radar%20screen%20with%20sweep%20line%20tracking%20cows%20and%20glowing%20UFO%20blip%20alert%20red%20moody%20cockpit?width=1200&height=630&nologo=true&model=flux">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --void:#000604;
  --bg:#001008;
  --grid:#003a20;
  --phosphor:#00ff66;
  --phosphor-dim:#1a7a52;
  --beef:#00cc44;
  --alert:#ff3a4a;
  --amber:#ffb43c;
  --bone:#cfe4d2;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:var(--void);color:var(--phosphor);font-family:'Share Tech Mono',monospace;overflow:hidden}
body{
  background:radial-gradient(ellipse at 50% 50%, #001a10 0%, var(--void) 80%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:0.7rem;position:relative;
}
/* scanlines + flicker overlay */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:50;
  background:repeating-linear-gradient(0deg, transparent 0 2px, rgba(0,0,0,0.18) 2px 3px);
  mix-blend-mode:multiply;
}
body::after{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:51;
  background:radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.6) 100%);
}

header{
  width:100%;max-width:60rem;
  display:flex;justify-content:space-between;align-items:baseline;
  margin-bottom:0.5rem;gap:0.6rem;flex-wrap:wrap;
}
h1{
  font-family:'VT323',monospace;font-weight:400;
  font-size:clamp(1.7rem, 4.2vw, 2.5rem);
  color:var(--phosphor);
  letter-spacing:0.04em;
  text-shadow:0 0 8px var(--phosphor), 0 0 18px rgba(0,255,102,0.5);
}
.tag{
  font-family:'JetBrains Mono',monospace;font-size:0.7rem;letter-spacing:0.24em;
  color:var(--phosphor-dim);text-transform:uppercase;
}
.tag .dot{color:var(--alert);animation:blink 0.7s infinite step-end}
@keyframes blink{50%{opacity:0}}

.stage-wrap{
  position:relative;width:100%;max-width:60rem;aspect-ratio:16/9;
  background:#000;border:3px solid #002818;border-radius:6px;
  box-shadow:
    inset 0 0 0 1px rgba(0,0,0,0.5),
    inset 0 0 100px rgba(0,40,20,0.6),
    0 12px 30px rgba(0,0,0,0.6),
    0 0 60px rgba(0,255,102,0.08);
  overflow:hidden;
}
canvas{display:block;width:100%;height:100%}

/* HUD overlay panels */
.hud{position:absolute;inset:0;z-index:4;pointer-events:none;color:var(--phosphor)}
.panel{
  position:absolute;
  background:rgba(0,16,8,0.6);
  border:1px solid var(--phosphor-dim);
  padding:0.42rem 0.7rem;
  font-family:'JetBrains Mono',monospace;font-size:0.66rem;
  letter-spacing:0.14em;text-transform:uppercase;
  text-shadow:0 0 6px var(--phosphor);
  box-shadow:0 0 12px rgba(0,255,102,0.12), inset 0 0 12px rgba(0,40,20,0.4);
}
.panel.tl{top:0.7rem;left:0.7rem;display:flex;flex-direction:column;gap:0.18rem}
.panel.tr{top:0.7rem;right:0.7rem;text-align:right}
.panel.bl{bottom:0.7rem;left:0.7rem}
.panel.br{bottom:0.7rem;right:0.7rem;text-align:right;display:flex;flex-direction:column;gap:0.18rem}
.panel .num{color:var(--bone);font-weight:500;font-size:0.84rem;letter-spacing:0.08em}
.panel .num.alert{color:var(--alert);text-shadow:0 0 8px var(--alert);animation:blink 0.5s infinite step-end}
.panel .num.amber{color:var(--amber);text-shadow:0 0 8px var(--amber)}

.alert-banner{
  position:absolute;left:50%;top:1.1rem;transform:translateX(-50%);
  background:rgba(50,0,0,0.78);
  border:1.5px solid var(--alert);
  padding:0.36rem 1.2rem;
  font-family:'VT323',monospace;font-size:1.4rem;letter-spacing:0.24em;
  color:#fff;text-transform:uppercase;
  text-shadow:0 0 10px var(--alert);
  box-shadow:0 0 30px rgba(255,58,74,0.55);
  display:none;
  z-index:5;
  animation:bannerPulse 0.4s infinite alternate;
}
.alert-banner.show{display:block}
@keyframes bannerPulse{
  from{box-shadow:0 0 20px rgba(255,58,74,0.4)}
  to  {box-shadow:0 0 40px rgba(255,58,74,0.85)}
}

.alert-log{
  position:absolute;left:0.7rem;right:0.7rem;bottom:3.1rem;
  display:flex;flex-direction:column;gap:0.15rem;
  font-family:'Share Tech Mono',monospace;font-size:0.74rem;
  color:var(--phosphor);text-shadow:0 0 4px var(--phosphor);
  pointer-events:none;
  z-index:4;
  max-height:6rem;overflow:hidden;
}
.alert-log .row{opacity:0.65}
.alert-log .row.alert{color:var(--alert);text-shadow:0 0 6px var(--alert);opacity:1}
.alert-log .row .ts{color:var(--phosphor-dim);margin-right:0.4rem}

footer{
  margin-top:0.55rem;
  font-family:'JetBrains Mono',monospace;font-size:0.66rem;
  letter-spacing:0.2em;color:var(--phosphor-dim);text-transform:uppercase;
}

@media (prefers-reduced-motion: reduce){
  .alert-banner.show{animation:none}
  .panel .num.alert{animation:none}
  .tag .dot{animation:none}
}
</style>
</head>
<body>
<header>
  <h1>Orbital Bovine Radar</h1>
  <span class="tag">SIGINT · LOW ORBIT · <span class="dot">●</span> SCAN ACTIVE</span>
</header>

<div class="stage-wrap">
  <canvas id="stage" width="960" height="540" role="application" aria-label="Top-down green phosphor radar sweep tracking bovine contacts. Red alerts indicate unidentified flying objects."></canvas>

  <div class="hud" aria-hidden="true">
    <div class="panel tl">
      <div>SECTOR · <span class="num">07-N</span></div>
      <div>RPM · <span class="num" id="hudRpm">10.0</span></div>
      <div>BEARING · <span class="num" id="hudBearing">000</span>°</div>
    </div>
    <div class="panel tr">
      <div>BOVINE · <span class="num" id="hudBovine">0</span></div>
      <div>UNKNOWN · <span class="num alert" id="hudUfo">0</span></div>
    </div>
    <div class="alert-banner" id="alertBanner">⚠ UNKNOWN CONTACT</div>
    <div class="panel bl">
      RANGE · <span class="num amber">04</span> KM
    </div>
    <div class="panel br">
      <div>SYS · <span class="num">NOMINAL</span></div>
      <div>TICK · <span class="num" id="hudTick">0000</span></div>
    </div>
  </div>

  <div class="alert-log" id="alertLog" aria-live="polite"></div>
</div>

<footer>SIG · GREEN PHOSPHOR — KEEP THE CATTLE ON THE PLANET</footer>

<script>
'use strict';

const cv = document.getElementById('stage');
const ctx = cv.getContext('2d');
const W = 960, H = 540;
const CX = W * 0.42;            // radar centre — left of middle to leave room for log
const CY = H * 0.52;
const R  = Math.min(W, H) * 0.42;  // radar radius

// ── AUDIO ────────────────────────────────────────────────────
let actx = null, master = null, hum = null, humGain = null;
function ensureAudio(){
  if (actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
  master = actx.createGain(); master.gain.value = 0.6;
  master.connect(actx.destination);
  // very low radar hum
  hum = actx.createOscillator(); hum.type = 'sine'; hum.frequency.value = 60;
  humGain = actx.createGain(); humGain.gain.value = 0.02;
  hum.connect(humGain).connect(master);
  hum.start();
}
function tone(freq, dur, type, vol){
  if (!actx) return;
  const t = actx.currentTime;
  const o = actx.createOscillator(); o.type = type || 'sine';
  o.frequency.value = freq;
  const g = actx.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(vol || 0.06, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.connect(g).connect(master); o.start(t); o.stop(t + dur + 0.02);
}
function sfxBlip(){ tone(720, 0.05, 'sine', 0.04); }
function sfxAlertPing(){
  tone(1320, 0.18, 'square', 0.10);
  setTimeout(() => tone(880, 0.22, 'square', 0.08), 80);
}
function sfxTick(){ tone(180, 0.04, 'square', 0.018); }

cv.addEventListener('pointerdown', () => {
  ensureAudio();
  if (actx && actx.state === 'suspended') actx.resume();
});

// ── STATE ────────────────────────────────────────────────────
const SWEEP_PERIOD = 6;          // seconds per full rotation → 10 RPM
const ECHO_DECAY = 2.4;          // seconds for a fresh blip to fade
const sweep = { angle: 0, lastTickAngle: 0 };
const bovines = [];
const ufos = [];
const log = [];
let alertUntil = 0;
let tickN = 0;

function makeBovine(){
  return {
    angle: Math.random() * Math.PI * 2,
    dist: 0.18 + Math.random() * 0.78,    // normalised radial position 0..1
    vAng: (Math.random() - 0.5) * 0.18,    // slow angular drift
    vDist: (Math.random() - 0.5) * 0.02,
    lastSwept: -10,
    callsign: cattleCallsign(),
  };
}
function cattleCallsign(){
  const head = ['BOS','TAU','MUT','HRD','GRZ','BLR','HRN'];
  const num = String(100 + Math.floor(Math.random() * 900));
  return head[Math.floor(Math.random() * head.length)] + '-' + num;
}
function makeUfo(){
  return {
    angle: Math.random() * Math.PI * 2,
    dist: 0.55 + Math.random() * 0.40,
    vAng: (Math.random() < 0.5 ? -1 : 1) * (0.4 + Math.random() * 0.6),  // fast
    vDist: (Math.random() - 0.5) * 0.15,
    lastSwept: -10,
    detected: false,
    callsign: 'U-' + Math.floor(Math.random() * 999).toString().padStart(3, '0'),
    life: 14 + Math.random() * 16,   // seconds before it leaves
  };
}

// seed cattle
for (let i = 0; i < 14; i++) bovines.push(makeBovine());

function pushLog(msg, alert){
  log.unshift({ msg, alert, when: tickN });
  while (log.length > 8) log.pop();
  renderLog();
}
const logEl = document.getElementById('alertLog');
function renderLog(){
  logEl.innerHTML = '';
  for (const e of log){
    const row = document.createElement('div');
    row.className = 'row' + (e.alert ? ' alert' : '');
    const ts = String(Math.floor(e.when / 60)).padStart(2, '0') + ':' + String(e.when % 60).padStart(2, '0');
    row.innerHTML = '<span class="ts">' + ts + '</span>' + e.msg;
    logEl.appendChild(row);
  }
}

// ── TICK ─────────────────────────────────────────────────────
let lastTs = 0;
function loop(ts){
  const dt = Math.min(0.05, (ts - lastTs || 16) / 1000);
  lastTs = ts;
  tickN += dt;

  // sweep advance
  sweep.angle += (Math.PI * 2 / SWEEP_PERIOD) * dt;
  if (sweep.angle - sweep.lastTickAngle >= Math.PI * 2){
    sweep.lastTickAngle = sweep.angle;
    sfxTick();
  }
  const sweepNorm = ((sweep.angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);

  // move contacts + detect on sweep pass
  for (const b of bovines){
    b.angle += b.vAng * dt;
    b.dist  += b.vDist * dt;
    if (b.dist < 0.15 || b.dist > 0.96){ b.vDist *= -1; b.dist = Math.max(0.15, Math.min(0.96, b.dist)); }
    checkSweep(b, sweepNorm, false);
  }
  for (let i = ufos.length - 1; i >= 0; i--){
    const u = ufos[i];
    u.life -= dt;
    u.angle += u.vAng * dt;
    u.dist  += u.vDist * dt;
    if (u.dist < 0.2 || u.dist > 0.95){ u.vDist *= -1; }
    if (u.life <= 0){
      pushLog(u.callsign + ' lost — exited range', false);
      ufos.splice(i, 1);
      continue;
    }
    checkSweep(u, sweepNorm, true);
  }

  // occasionally spawn a UFO (rough cadence ~ every 18-32 seconds)
  if (Math.random() < dt / (18 + Math.random() * 14) && ufos.length < 3){
    const u = makeUfo();
    ufos.push(u);
    pushLog('inbound contact — bearing ' + Math.round(u.angle * 180 / Math.PI) + '°', false);
  }

  // tick HUD
  document.getElementById('hudRpm').textContent = (60 / SWEEP_PERIOD).toFixed(1);
  document.getElementById('hudBearing').textContent = String(Math.round(sweepNorm * 180 / Math.PI)).padStart(3, '0');
  document.getElementById('hudBovine').textContent = bovines.length;
  document.getElementById('hudUfo').textContent = ufos.length;
  document.getElementById('hudTick').textContent = String(Math.floor(tickN * 10)).padStart(4, '0');

  // alert banner show/hide
  const banner = document.getElementById('alertBanner');
  if (performance.now() < alertUntil){
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
  }

  render();
  requestAnimationFrame(loop);
}

function checkSweep(c, sweepNorm, isUfo){
  // angle of contact relative to centre
  const cAng = ((c.angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
  // sweep has a small angular window — if sweep crossed the contact since
  // last frame, mark it as freshly swept.
  // shortest angular delta from sweep to contact (signed in [-π, π])
  let delta = cAng - sweepNorm;
  while (delta > Math.PI) delta -= Math.PI * 2;
  while (delta < -Math.PI) delta += Math.PI * 2;
  // detect when contact is within a ~0.06 rad window behind the sweep
  // (small back-window so a frame's worth of sweep can light it up)
  if (delta < 0 && delta > -0.08){
    if (tickN - c.lastSwept > 0.4){
      c.lastSwept = tickN;
      if (isUfo){
        if (!c.detected){
          c.detected = true;
          pushLog('⚠ UFO acquired · ' + c.callsign, true);
          sfxAlertPing();
        }
        alertUntil = performance.now() + 1100;
      } else {
        sfxBlip();
      }
    }
  }
}

// ── RENDER ───────────────────────────────────────────────────
function render(){
  // background tinted phosphor void
  ctx.fillStyle = '#000604';
  ctx.fillRect(0, 0, W, H);

  // distant moving star bg over the radar disc area
  ctx.fillStyle = 'rgba(0,40,20,0.15)';
  ctx.fillRect(0, 0, W, H);

  // ── radar disc background ──
  // outer ring shadow
  const discG = ctx.createRadialGradient(CX, CY, R * 0.15, CX, CY, R);
  discG.addColorStop(0, '#002818');
  discG.addColorStop(1, '#000a06');
  ctx.fillStyle = discG;
  ctx.beginPath(); ctx.arc(CX, CY, R, 0, Math.PI * 2); ctx.fill();
  // outer bezel
  ctx.strokeStyle = '#003a20'; ctx.lineWidth = 6;
  ctx.shadowColor = '#00ff66'; ctx.shadowBlur = 12;
  ctx.beginPath(); ctx.arc(CX, CY, R, 0, Math.PI * 2); ctx.stroke();
  ctx.shadowBlur = 0;

  // concentric range rings
  ctx.strokeStyle = '#00552c'; ctx.lineWidth = 1;
  for (let k = 1; k <= 4; k++){
    const rr = R * (k / 4);
    ctx.beginPath(); ctx.arc(CX, CY, rr, 0, Math.PI * 2); ctx.stroke();
  }
  // cross hairs
  ctx.beginPath();
  ctx.moveTo(CX - R, CY); ctx.lineTo(CX + R, CY);
  ctx.moveTo(CX, CY - R); ctx.lineTo(CX, CY + R);
  ctx.stroke();
  // 30° spokes
  ctx.strokeStyle = '#003a20';
  for (let i = 0; i < 12; i++){
    const a = (i / 12) * Math.PI * 2;
    ctx.beginPath();
    ctx.moveTo(CX, CY);
    ctx.lineTo(CX + Math.cos(a) * R, CY + Math.sin(a) * R);
    ctx.stroke();
  }
  // bearing tick numerals every 30°
  ctx.fillStyle = '#1a7a52';
  ctx.font = '10px "JetBrains Mono", monospace';
  ctx.textAlign = 'center';
  for (let i = 0; i < 12; i++){
    const a = (i / 12) * Math.PI * 2;
    const deg = String(i * 30).padStart(3, '0');
    const lx = CX + Math.cos(a) * (R + 14);
    const ly = CY + Math.sin(a) * (R + 14) + 3;
    ctx.fillText(deg, lx, ly);
  }
  ctx.textAlign = 'left';

  // ── sweep wedge — bright leading edge + trailing fade ──
  const sweepNorm = ((sweep.angle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
  ctx.save();
  ctx.translate(CX, CY);
  // trailing wedge (radial gradient from leading edge backward)
  const wedge = ctx.createConicGradient ? null : null;  // not all browsers
  // Manual wedge: draw radial trail with steps
  for (let k = 0; k < 24; k++){
    const back = (k / 24) * Math.PI;  // up to π behind
    const alpha = 0.18 * (1 - k / 24);
    ctx.fillStyle = 'rgba(0,255,102,' + alpha.toFixed(3) + ')';
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.arc(0, 0, R - 4, sweepNorm - back - 0.06, sweepNorm - back + 0.06, false);
    ctx.closePath(); ctx.fill();
  }
  // leading sweep line (bright)
  ctx.strokeStyle = '#a0ffd6';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#00ff66'; ctx.shadowBlur = 14;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(Math.cos(sweepNorm) * (R - 4), Math.sin(sweepNorm) * (R - 4));
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.restore();

  // ── contacts ──
  // bovines first (so UFOs blink on top)
  for (const b of bovines) drawContact(b, false);
  for (const u of ufos)    drawContact(u, true);

  // tiny "you are here" centre tick
  ctx.fillStyle = '#a0ffd6';
  ctx.shadowColor = '#00ff66'; ctx.shadowBlur = 8;
  ctx.beginPath(); ctx.arc(CX, CY, 3, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
}

function drawContact(c, isUfo){
  const cx = CX + Math.cos(c.angle) * R * c.dist;
  const cy = CY + Math.sin(c.angle) * R * c.dist;
  const since = tickN - c.lastSwept;
  const echo = Math.max(0, 1 - since / ECHO_DECAY);  // 1 = just lit, 0 = faded out
  if (isUfo){
    if (c.detected){
      // blinking outer ring
      const blink = Math.sin(tickN * 14) > 0;
      ctx.strokeStyle = blink ? '#ff3a4a' : 'rgba(255,58,74,0.35)';
      ctx.lineWidth = 1.5;
      ctx.shadowColor = '#ff3a4a'; ctx.shadowBlur = 10;
      ctx.beginPath(); ctx.arc(cx, cy, 10 + Math.sin(tickN * 6) * 2, 0, Math.PI * 2); ctx.stroke();
      ctx.shadowBlur = 0;
    }
    // core diamond
    ctx.fillStyle = c.detected ? '#ff3a4a' : 'rgba(255,58,74,' + (0.3 + echo * 0.7).toFixed(3) + ')';
    ctx.save(); ctx.translate(cx, cy); ctx.rotate(Math.PI / 4);
    ctx.fillRect(-4, -4, 8, 8);
    ctx.restore();
    if (echo > 0.05){
      // bright fresh-echo halo
      ctx.fillStyle = 'rgba(255,80,90,' + (echo * 0.45).toFixed(3) + ')';
      ctx.beginPath(); ctx.arc(cx, cy, 12 * echo + 4, 0, Math.PI * 2); ctx.fill();
    }
    // callsign label
    if (c.detected){
      ctx.fillStyle = '#ff8a8a';
      ctx.font = '9px "JetBrains Mono", monospace';
      ctx.textAlign = 'left';
      ctx.fillText(c.callsign, cx + 12, cy - 6);
    }
  } else {
    // bovine — small green dot with optional fresh echo glow
    const baseA = 0.25 + echo * 0.7;
    ctx.fillStyle = 'rgba(0,255,102,' + baseA.toFixed(3) + ')';
    ctx.beginPath(); ctx.arc(cx, cy, 2.4 + echo * 1.4, 0, Math.PI * 2); ctx.fill();
    if (echo > 0.4){
      ctx.fillStyle = 'rgba(0,255,102,' + (echo * 0.35).toFixed(3) + ')';
      ctx.beginPath(); ctx.arc(cx, cy, 6 + echo * 4, 0, Math.PI * 2); ctx.fill();
    }
  }
}

requestAnimationFrame(loop);
</script>
</body>
</html>
