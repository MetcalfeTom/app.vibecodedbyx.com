<style>
  :root {
    --void:#070310;
    --stage:#16091f;
    --stage2:#2a0d3d;
    --gold:#f5c44d;
    --hotgold:#ffd96b;
    --red:#cf1d3a;
    --hotred:#ff345b;
    --pink:#ff5fa7;
    --bone:#fbf2dc;

  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(ellipse at 50% 28%, rgba(245,196,77,0.18), transparent 55%),
      radial-gradient(ellipse at 12% 90%, rgba(255,52,91,0.16), transparent 60%),

    min-height:100vh;

  }
  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;
    background:repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0 1px, transparent 1px 4px);
    mix-blend-mode:screen;z-index:90;

    content:'';position:fixed;inset:0;pointer-events:none;z-index:91;

  #stage{position:fixed;inset:0;display:block;z-index:1}
  header{
    position:fixed;top:14px;left:0;right:0;text-align:center;z-index:20;

  h1{
    font-family:'Bungee Inline',sans-serif;

      0 0 18px rgba(245,196,77,0.55),
      4px 4px 0 var(--red),

  }
  h1 .ow{color:var(--hotred);font-style:italic}
  .tagline{
    font-family:'Playfair Display',serif;

    color:var(--bone);opacity:0.78;
    margin-top:6px;font-size:clamp(11px, 1.6vw, 16px);

  }
  .tagline em{color:var(--gold);font-style:italic}
  .meta{
    margin-top:6px;font-family:'Major Mono Display',monospace;

  }
  /* Marquee */
  #marquee{
    position:fixed;left:0;right:0;bottom:172px;
    z-index:18;pointer-events:none;
    font-family:'Bungee Inline',sans-serif;
    font-size:clamp(40px, 8vw, 110px);
    text-align:center;
    color:var(--gold);
    text-shadow:0 0 24px rgba(245,196,77,0.7), 4px 4px 0 var(--red);
    opacity:0;transform:translateY(30px) scale(0.85);
    transition:opacity 0.18s ease, transform 0.18s ease;
  }
  #marquee.show{opacity:1;transform:translateY(0) scale(1)}
  /* Pad strip */
  .pads{
    position:fixed;left:0;right:0;bottom:0;z-index:30;
    background:linear-gradient(180deg, rgba(10,4,20,0) 0%, rgba(10,4,20,0.85) 30%, rgba(5,2,12,0.96) 100%);
    padding:18px 20px 22px;
    display:flex;flex-direction:column;gap:10px;
  }
  .pad-row{
    display:grid;grid-template-columns:repeat(8, minmax(0, 1fr));
    gap:10px;
  }
  .pad{
    position:relative;
    border:1.5px solid rgba(245,196,77,0.45);

    padding:14px 8px 10px;

      inset 0 0 0 1px rgba(255,255,255,0.04),

  }
  .pad::before{
    content:'';position:absolute;inset:6px;border-radius:4px;
    background:repeating-linear-gradient(45deg, rgba(255,255,255,0.025) 0 2px, transparent 2px 5px);

  .pad:hover{
    transform:translateY(-2px);

  .pad:active, .pad.bang{

      inset 0 0 18px rgba(255,52,91,0.4),

  .pad .emoji{font-size:32px;line-height:1;display:block;filter:drop-shadow(0 0 10px rgba(245,196,77,0.5))}
  .pad .label{
    margin-top:6px;font-family:'Bungee Inline',sans-serif;

  }
  .pad .key{
    position:absolute;top:4px;right:6px;
    font-family:'VT323',monospace;font-size:14px;
    color:var(--pink);opacity:0.8;
  }
  /* Controls row */
  .ctrls{
    display:grid;grid-template-columns:repeat(4, 1fr) auto auto;
    gap:14px;align-items:center;
    padding:0 4px;
  }
  .slider{
    display:flex;flex-direction:column;gap:4px;
    font-family:'Major Mono Display',monospace;

  }
  .slider .vrow{display:flex;justify-content:space-between;align-items:center}
  .slider .v{font-family:'VT323',monospace;font-size:14px;color:var(--bone)}
  input[type=range]{
    -webkit-appearance:none;appearance:none;
    width:100%;height:4px;background:linear-gradient(90deg, var(--red), var(--gold));
    border-radius:2px;outline:none;
  }
  input[type=range]::-webkit-slider-thumb{
    -webkit-appearance:none;appearance:none;

  }
  input[type=range]::-moz-range-thumb{
    width:14px;height:14px;border-radius:50%;

    transition:all 0.15s ease;
  }
  .btn:hover{background:var(--gold);color:var(--shade);box-shadow:0 0 22px rgba(245,196,77,0.6)}
  .btn.on{background:var(--red);border-color:var(--red);color:var(--bone)}
  /* Hint */
  .hint{

    z-index:5;text-align:center;pointer-events:none;
    font-family:'Playfair Display',serif;font-style:italic;font-weight:800;
    font-size:clamp(16px, 3vw, 26px);color:var(--gold);
    opacity:0.78;text-shadow:0 0 18px rgba(245,196,77,0.5);
    transition:opacity 0.6s ease;
  }
  .hint.gone{opacity:0}
  .hint .small{display:block;font-size:0.55em;color:var(--bone);opacity:0.7;margin-top:6px;letter-spacing:0.2em;font-family:'Major Mono Display',monospace}
  /* Mobile */
  @media (max-width:760px){
    .pad-row{grid-template-columns:repeat(4, 1fr)}
    .ctrls{grid-template-columns:repeat(2, 1fr) auto auto}
    .pad .emoji{font-size:26px}
    .pad .label{font-size:9px}
    #marquee{bottom:280px}
  }
</style>

<body>
<canvas id="stage"></canvas>
<header>
  <h1>MJ <span class="ow">OWW!</span> Generator</h1>
  <div class="tagline">a glittering fedora · <em>fart-tuned</em> · moonwalking ✨</div>
  <div class="meta">SHA · MONE · OWW · HEEHEE</div>
</header>
<div id="marquee">OWW!</div>
<div class="hint" id="hint">click anywhere to <em>oww</em><span class="small">or hit 1–8 · space rips · M mutes</span></div>

<div class="pads">
  <div class="pad-row" id="padRow"></div>
  <div class="ctrls">
    <div class="slider"><div class="vrow"><span>FART</span><span class="v" id="vFart">60</span></div><input id="sFart" type="range" min="0" max="100" value="60" /></div>
    <div class="slider"><div class="vrow"><span>SQUEAK</span><span class="v" id="vSqueak">35</span></div><input id="sSqueak" type="range" min="0" max="100" value="35" /></div>
    <div class="slider"><div class="vrow"><span>SPARKLE</span><span class="v" id="vSparkle">70</span></div><input id="sSparkle" type="range" min="0" max="100" value="70" /></div>
    <div class="slider"><div class="vrow"><span>REVERB</span><span class="v" id="vRev">42</span></div><input id="sRev" type="range" min="0" max="100" value="42" /></div>
    <button class="btn" id="bMoon">MOONWALK</button>
    <button class="btn" id="bMute">♪ ON</button>
  </div>
</div>

<script>
(() => {
const stage = document.getElementById('stage');
const ctx = stage.getContext('2d');
let DPR = Math.min(2, window.devicePixelRatio || 1);
let W = 0, H = 0;
function resize() {
  DPR = Math.min(2, window.devicePixelRatio || 1);
  W = window.innerWidth; H = window.innerHeight;
  stage.width = W * DPR; stage.height = H * DPR;
  stage.style.width = W + 'px'; stage.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// === audio ===
let ac = null, master = null, conv = null, dryBus = null, wetBus = null, noiseBuf = null;
let muted = false;
function ensureAudio() {
  if (ac) return;
  ac = new (window.AudioContext || window.webkitAudioContext)();
  master = ac.createGain(); master.gain.value = 0.55;
  const comp = ac.createDynamicsCompressor();
  comp.threshold.value = -16; comp.knee.value = 18; comp.ratio.value = 4;
  comp.attack.value = 0.005; comp.release.value = 0.18;
  master.connect(comp); comp.connect(ac.destination);
  // reverb
  const len = ac.sampleRate * 1.6;
  const buf = ac.createBuffer(2, len, ac.sampleRate);
  for (let c = 0; c < 2; c++) {
    const ch = buf.getChannelData(c);
    for (let i = 0; i < len; i++) {
      ch[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2.4);
    }
  }
  conv = ac.createConvolver(); conv.buffer = buf;
  dryBus = ac.createGain(); dryBus.gain.value = 1;
  wetBus = ac.createGain(); wetBus.gain.value = 0.42;
  dryBus.connect(master);
  wetBus.connect(conv); conv.connect(master);
  // noise
  const nLen = ac.sampleRate * 1.0;
  noiseBuf = ac.createBuffer(1, nLen, ac.sampleRate);
  const nch = noiseBuf.getChannelData(0);
  for (let i = 0; i < nLen; i++) nch[i] = Math.random() * 2 - 1;
}

function busOut() {
  return { dry: dryBus, wet: wetBus };
}

// === phrases ===
const PHRASES = [
  { name:'OWW!',     emoji:'🤙', f1:[640, 880, 720],   f2:[1100, 1480, 1200], pitch:170, len:0.55, gliss:1.45, key:'1', vibrato:6, tail:'wail' },
  { name:'HEE-HEE!', emoji:'🎩', f1:[290, 290],         f2:[2350, 2400],        pitch:280, len:0.42, key:'2', stutter:14, gliss:1.05 },
  { name:'SHAMONE!', emoji:'✨', f1:[600, 720, 500, 380], f2:[1100, 1500, 900, 750], pitch:130, len:1.05, key:'3', prefix:'sh', gliss:0.7, vibrato:5 },
  { name:'OOOH!',    emoji:'😮', f1:[380, 380],         f2:[800, 760],         pitch:160, len:0.7, key:'4', gliss:1.1, vibrato:4 },
  { name:'TEE-HEE',  emoji:'😋', f1:[290, 290],         f2:[2200, 2500],       pitch:340, len:0.32, key:'5', stutter:18, gliss:1.0 },
  { name:'GRUNT!',   emoji:'😤', f1:[500, 600],         f2:[950, 1200],        pitch:95,  len:0.36, key:'6', gliss:1.3 },
  { name:'WOOO!',    emoji:'🎤', f1:[400, 600, 700],    f2:[800, 1300, 1500],  pitch:210, len:0.95, key:'7', gliss:1.6, vibrato:7 },
  { name:'POW!',     emoji:'👞', f1:[700, 700],         f2:[1100, 1100],       pitch:140, len:0.24, key:'8', kick:true },
];

function playPhrase(p) {
  ensureAudio();
  if (muted) return;
  if (ac.state === 'suspended') ac.resume();
  const fartLevel = +sFart.value / 100;
  const squeakLevel = +sSqueak.value / 100;
  const revAmt = +sRev.value / 100;
  if (wetBus) wetBus.gain.setTargetAtTime(0.42 * revAmt, ac.currentTime, 0.05);
  const t = ac.currentTime;
  const dur = p.len;
  // === Vocal layer: saw → 2 parallel BP formants ===
  const startP = p.pitch;
  const endP = startP * (p.gliss || 1);
  const vox = ac.createOscillator();
  vox.type = 'sawtooth';
  vox.frequency.setValueAtTime(startP, t);
  vox.frequency.exponentialRampToValueAtTime(Math.max(40, endP), t + dur * 0.85);

  // vibrato
  if (p.vibrato) {
    const vib = ac.createOscillator(); vib.type = 'sine';
    vib.frequency.value = p.vibrato;
    const vibG = ac.createGain(); vibG.gain.value = startP * 0.04;
    vib.connect(vibG); vibG.connect(vox.frequency);
    vib.start(t); vib.stop(t + dur);
  }
  // sub vocal harmonics
  const sub = ac.createOscillator(); sub.type = 'sine';
  sub.frequency.setValueAtTime(startP * 0.5, t);
  sub.frequency.exponentialRampToValueAtTime(Math.max(40, endP * 0.5), t + dur * 0.85);

  function makeFormant(freqs, q) {
    const f = ac.createBiquadFilter();
    f.type = 'bandpass'; f.Q.value = q;
    f.frequency.setValueAtTime(freqs[0], t);
    if (freqs.length > 1) {
      const step = dur * 0.92 / (freqs.length - 1);
      for (let i = 1; i < freqs.length; i++) {
        f.frequency.linearRampToValueAtTime(freqs[i], t + step * i);
      }
    }
    return f;
  }
  const f1 = makeFormant(p.f1, 9);
  const f2 = makeFormant(p.f2, 11);
  vox.connect(f1); vox.connect(f2);
  sub.connect(f1);

  const voxGain = ac.createGain();
  voxGain.gain.setValueAtTime(0, t);
  voxGain.gain.linearRampToValueAtTime(0.42 * (1 - 0.4 * fartLevel), t + 0.012);
  if (p.tail === 'wail') {
    voxGain.gain.linearRampToValueAtTime(0.5, t + dur * 0.55);
  }
  voxGain.gain.linearRampToValueAtTime(0.36, t + dur * 0.78);
  voxGain.gain.exponentialRampToValueAtTime(0.001, t + dur);

  // shaper for grit
  const shaper = ac.createWaveShaper();
  const wsCurve = new Float32Array(2048);
  for (let i = 0; i < 2048; i++) {
    const x = (i / 2048) * 2 - 1;
    wsCurve[i] = Math.tanh(x * 1.8);
  }
  shaper.curve = wsCurve;
  f1.connect(shaper); f2.connect(shaper);
  shaper.connect(voxGain);

  // stutter (hee-hee, tee-hee)
  if (p.stutter) {
    const lfo = ac.createOscillator(); lfo.type = 'square';
    lfo.frequency.value = p.stutter;
    const lfoG = ac.createGain(); lfoG.gain.value = 0.45;
    lfo.connect(lfoG);
    const trem = ac.createGain(); trem.gain.value = 0.55;
    lfoG.connect(trem.gain);
    voxGain.connect(trem);
    const out = busOut();
    trem.connect(out.dry); trem.connect(out.wet);
    lfo.start(t); lfo.stop(t + dur);
  } else {
    const out = busOut();
    voxGain.connect(out.dry); voxGain.connect(out.wet);
  }
  vox.start(t); vox.stop(t + dur + 0.02);
  sub.start(t); sub.stop(t + dur + 0.02);

  // squeak (high-pitched accent on "oww!")
  if (p.tail === 'wail' && squeakLevel > 0.05) {
    const sq = ac.createOscillator(); sq.type = 'sine';
    sq.frequency.setValueAtTime(endP * 3, t + dur * 0.55);
    sq.frequency.exponentialRampToValueAtTime(endP * 4.2, t + dur * 0.92);
    const sqG = ac.createGain();
    sqG.gain.setValueAtTime(0, t + dur * 0.55);
    sqG.gain.linearRampToValueAtTime(0.16 * squeakLevel, t + dur * 0.6);
    sqG.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.95);
    sq.connect(sqG);
    const out = busOut();
    sqG.connect(out.dry); sqG.connect(out.wet);
    sq.start(t + dur * 0.55); sq.stop(t + dur);
  }

  // sh-prefix for SHAMONE
  if (p.prefix === 'sh') {
    const sh = ac.createBufferSource(); sh.buffer = noiseBuf;
    const shf = ac.createBiquadFilter();
    shf.type = 'bandpass'; shf.frequency.value = 4200; shf.Q.value = 1.4;
    const shg = ac.createGain();
    shg.gain.setValueAtTime(0.0, t);
    shg.gain.linearRampToValueAtTime(0.32, t + 0.02);
    shg.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
    sh.connect(shf); shf.connect(shg);
    const out = busOut();
    shg.connect(out.dry);
    sh.start(t); sh.stop(t + 0.2);
  }

  // kick prefix (POW)
  if (p.kick) {
    const k = ac.createOscillator(); k.type = 'sine';
    k.frequency.setValueAtTime(180, t);
    k.frequency.exponentialRampToValueAtTime(38, t + 0.18);
    const kg = ac.createGain();
    kg.gain.setValueAtTime(0.45, t);
    kg.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
    k.connect(kg);
    const out = busOut();
    kg.connect(out.dry); kg.connect(out.wet);
    k.start(t); k.stop(t + 0.25);
  }

  // === Fart sub-layer ===
  if (fartLevel > 0.02) {
    const fartFreq = startP * 0.42;
    const f = ac.createOscillator(); f.type = 'sawtooth';
    f.frequency.setValueAtTime(fartFreq * 1.4, t);
    f.frequency.exponentialRampToValueAtTime(Math.max(28, fartFreq * 0.6), t + dur);
    const f2o = ac.createOscillator(); f2o.type = 'sawtooth';
    f2o.frequency.setValueAtTime(fartFreq * 1.4 * 1.012, t);
    f2o.frequency.exponentialRampToValueAtTime(Math.max(28, fartFreq * 0.6 * 0.99), t + dur);

    const sputter = ac.createOscillator(); sputter.type = 'square';
    sputter.frequency.value = 18 + Math.random() * 10;
    const sputterG = ac.createGain(); sputterG.gain.value = 0.55;
    sputter.connect(sputterG);

    const lp = ac.createBiquadFilter();
    lp.type = 'lowpass'; lp.Q.value = 5;
    lp.frequency.setValueAtTime(620, t);
    lp.frequency.exponentialRampToValueAtTime(220, t + dur);

    const ws = ac.createWaveShaper();
    const c = new Float32Array(2048);
    for (let i = 0; i < 2048; i++) { const x = (i/2048)*2-1; c[i] = Math.tanh(x * 3.2); }
    ws.curve = c;

    const fartG = ac.createGain();
    fartG.gain.setValueAtTime(0, t);
    fartG.gain.linearRampToValueAtTime(0.30 * fartLevel, t + 0.018);
    fartG.gain.linearRampToValueAtTime(0.22 * fartLevel, t + dur * 0.7);
    fartG.gain.exponentialRampToValueAtTime(0.001, t + dur);
    sputterG.connect(fartG.gain);

    f.connect(lp); f2o.connect(lp);
    lp.connect(ws); ws.connect(fartG);
    const out = busOut();
    fartG.connect(out.dry); fartG.connect(out.wet);

    // PFFT noise
    const n = ac.createBufferSource(); n.buffer = noiseBuf;
    const nbp = ac.createBiquadFilter();
    nbp.type = 'bandpass'; nbp.frequency.value = 540; nbp.Q.value = 0.9;
    const ng = ac.createGain();
    ng.gain.setValueAtTime(0.18 * fartLevel, t);
    ng.gain.exponentialRampToValueAtTime(0.001, t + dur * 0.6);
    n.connect(nbp); nbp.connect(ng);
    ng.connect(out.dry);

    f.start(t); f.stop(t + dur + 0.02);
    f2o.start(t); f2o.stop(t + dur + 0.02);
    sputter.start(t); sputter.stop(t + dur + 0.02);
    n.start(t); n.stop(t + dur);
  }
}

// === MJ ===
const mj = {
  x: 0, y: 0,
  baseY: 0,
  vx: 0,
  facing: 1,
  shuffle: 0,
  slide: 0,        // 0..1 progress of moonwalk slide
  slideDir: -1,    // direction of slide
  bob: 0,
  hatTilt: 0,
  trigger: 0,      // visual reaction strength (0..1)
  glove: 0,        // glove flash
};
function placeMJ() { mj.baseY = H * 0.62; mj.x = W * 0.5; mj.y = mj.baseY; }
placeMJ();
window.addEventListener('resize', placeMJ);

function moonwalk() {
  mj.slide = 1;
  mj.slideDir = Math.random() < 0.5 ? -1 : 1;
  mj.facing = -mj.slideDir; // facing opposite of slide direction (the illusion)
  burstSparkle(mj.x, mj.y + 36, 26, mj.slideDir);
  flashMarquee('MOON·WALK');
}

function drawMJ() {
  const t = performance.now() / 1000;
  // shoe shuffle
  mj.shuffle += 16 * (1 + mj.slide * 0.6);
  // slide motion
  if (mj.slide > 0) {
    const speed = 220 * mj.slide;
    mj.x += mj.slideDir * speed * (1/60);
    mj.slide -= 0.012;
    if (mj.slide < 0) mj.slide = 0;
    // wrap
    if (mj.x < 80) mj.x = 80;
    if (mj.x > W - 80) mj.x = W - 80;
  }
  mj.bob = Math.sin(t * 2.4) * 2 + (mj.slide > 0 ? Math.sin(t * 12) * 1.5 : 0);
  mj.hatTilt = Math.sin(t * 1.7) * 0.04 + mj.trigger * 0.18 * Math.sin(t * 30);
  if (mj.trigger > 0) mj.trigger *= 0.92;
  if (mj.glove > 0) mj.glove *= 0.9;

  ctx.save();
  ctx.translate(mj.x, mj.y + mj.bob);
  ctx.scale(mj.facing, 1);
  ctx.rotate(mj.hatTilt * 0.15);

  // shadow on stage
  ctx.save();
  ctx.scale(1, 0.35);
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath(); ctx.ellipse(0, 110, 36, 12, 0, 0, Math.PI*2); ctx.fill();
  ctx.restore();

  // legs (white pants, sequined)
  ctx.fillStyle = '#f3eedf';
  const sLeg = Math.sin(mj.shuffle * 0.18 + 0.5) * 6;
  const sLeg2 = -sLeg;
  ctx.fillRect(-10, 32, 7, 60);
  ctx.fillRect(3, 32, 7, 60);
  // pant sequins
  ctx.fillStyle = 'rgba(245,196,77,0.8)';
  for (let i = 0; i < 12; i++) {
    const y = 36 + i * 4 + (i%2)*2;
    ctx.fillRect(-9 + Math.sin(t*3+i)*0.5, y, 1.5, 1.5);
    ctx.fillRect(4 + Math.sin(t*3+i+1)*0.5, y, 1.5, 1.5);
  }
  // shoes (black, glossy)
  ctx.fillStyle = '#0a0a0a';
  ctx.beginPath();
  ctx.ellipse(-7 + sLeg * 0.4, 96, 11, 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath();
  ctx.ellipse(7 + sLeg2 * 0.4, 96, 11, 5, 0, 0, Math.PI*2); ctx.fill();
  // shoe gold tip
  ctx.fillStyle = '#f5c44d';
  ctx.fillRect(-15 + sLeg * 0.4, 95, 4, 2);
  ctx.fillRect(11 + sLeg2 * 0.4, 95, 4, 2);

  // jacket (red sequin)
  const jacketGrad = ctx.createLinearGradient(0, -8, 0, 36);
  jacketGrad.addColorStop(0, '#e8294a');
  jacketGrad.addColorStop(0.5, '#cf1d3a');
  jacketGrad.addColorStop(1, '#88112a');
  ctx.fillStyle = jacketGrad;
  ctx.beginPath();
  ctx.moveTo(-18, -6);
  ctx.lineTo(18, -6);
  ctx.lineTo(16, 38);
  ctx.lineTo(-16, 38);
  ctx.closePath(); ctx.fill();
  // shoulder pads
  ctx.fillStyle = '#88112a';
  ctx.fillRect(-22, -6, 6, 8);
  ctx.fillRect(16, -6, 6, 8);
  // sequins
  for (let i = 0; i < 36; i++) {
    const xx = -14 + (i % 6) * 5;
    const yy = -2 + Math.floor(i / 6) * 6;
    const sparkle = (Math.sin(t * 4 + i * 0.7) * 0.5 + 0.5);
    ctx.fillStyle = `rgba(255,${180 + sparkle * 60},${100 + sparkle * 80},${0.35 + sparkle * 0.5})`;
    ctx.fillRect(xx, yy, 2, 2);
  }
  // belt
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(-16, 30, 32, 4);
  ctx.fillStyle = '#ffd96b';
  ctx.fillRect(-3, 30, 6, 4);

  // arms — left raised, right glove down
  ctx.strokeStyle = '#cf1d3a'; ctx.lineWidth = 7; ctx.lineCap = 'round';
  // raised arm
  const armSwing = Math.sin(mj.shuffle * 0.1) * 6;
  ctx.beginPath();
  ctx.moveTo(-16, 0);
  ctx.lineTo(-22, -14 + armSwing * 0.3);
  ctx.lineTo(-26, -32 + armSwing * 0.4);
  ctx.stroke();
  // down arm
  ctx.beginPath();
  ctx.moveTo(16, 0);
  ctx.lineTo(20, 18 - armSwing * 0.3);
  ctx.lineTo(22, 30);
  ctx.stroke();

  // sparkly white glove (raised)
  const gloveR = 7 + mj.glove * 4;
  const gloveGrad = ctx.createRadialGradient(-26, -34, 1, -26, -32, gloveR);
  gloveGrad.addColorStop(0, '#fff');
  gloveGrad.addColorStop(0.6, '#f3eedf');
  gloveGrad.addColorStop(1, '#a6987a');
  ctx.fillStyle = gloveGrad;
  ctx.beginPath(); ctx.arc(-26, -32, gloveR, 0, Math.PI*2); ctx.fill();
  // glove sparkle bursts
  ctx.strokeStyle = `rgba(255,217,107,${0.5 + mj.glove * 0.5})`;
  ctx.lineWidth = 1.2;
  for (let i = 0; i < 6; i++) {
    const a = i * Math.PI / 3 + t * 1.2;
    const r1 = gloveR + 2, r2 = gloveR + 6 + mj.glove * 6;
    ctx.beginPath();
    ctx.moveTo(-26 + Math.cos(a) * r1, -32 + Math.sin(a) * r1);
    ctx.lineTo(-26 + Math.cos(a) * r2, -32 + Math.sin(a) * r2);
    ctx.stroke();
  }
  // bare right hand
  ctx.fillStyle = '#3a2620';
  ctx.beginPath(); ctx.arc(22, 30, 4, 0, Math.PI*2); ctx.fill();

  // head (warm tan-brown)
  ctx.fillStyle = '#3a2620';
  ctx.beginPath(); ctx.arc(0, -18, 11, 0, Math.PI*2); ctx.fill();
  // hair curl
  ctx.fillStyle = '#1a0d08';
  ctx.beginPath(); ctx.arc(-2, -22, 8, Math.PI, Math.PI * 2.0); ctx.fill();
  // hair lock down forehead
  ctx.beginPath();
  ctx.moveTo(-6, -22);
  ctx.quadraticCurveTo(-2, -10, -3, -8);
  ctx.quadraticCurveTo(-7, -14, -8, -22);
  ctx.fill();

  // sunglasses (pointing down + nose)
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(-9, -19, 18, 3);
  // nose
  ctx.strokeStyle = '#1a0d08'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(0, -16); ctx.lineTo(-1, -11); ctx.stroke();

  // fedora
  ctx.save();
  ctx.translate(0, -28);
  ctx.rotate(mj.hatTilt);
  // brim
  ctx.fillStyle = '#0a0a0a';
  ctx.beginPath();
  ctx.ellipse(0, 2, 22, 4, 0, 0, Math.PI*2); ctx.fill();
  // crown
  ctx.fillRect(-12, -12, 24, 14);
  // band
  ctx.fillStyle = '#cf1d3a';
  ctx.fillRect(-12, -3, 24, 3);
  // hat highlight
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.fillRect(-10, -10, 4, 12);
  ctx.restore();

  ctx.restore();
}

// === Particles ===
const parts = [];
function spawnPart(p) { parts.push(p); if (parts.length > 600) parts.shift(); }

function burstSparkle(x, y, n, dir) {
  const sLevel = +sSparkle.value / 100;
  const N = Math.round(n * (0.5 + sLevel));
  for (let i = 0; i < N; i++) {
    const a = Math.random() * Math.PI * 2;
    const v = 1 + Math.random() * 4;
    const palette = ['#f5c44d','#ffd96b','#fff7d9','#ff5fa7','#cf1d3a','#ffb1d4'];
    spawnPart({
      type: 'sequin',
      x, y,
      vx: Math.cos(a) * v + (dir||0) * 1.5,
      vy: Math.sin(a) * v - 1.5,
      life: 60 + Math.random() * 40,
      age: 0,
      r: 2 + Math.random() * 3,
      rot: Math.random() * Math.PI * 2,
      vrot: (Math.random() - 0.5) * 0.3,
      color: palette[Math.floor(Math.random() * palette.length)],
    });
  }
  // shoe scuff
  for (let i = 0; i < 6; i++) {
    spawnPart({
      type: 'scuff',
      x: x + (Math.random()-0.5) * 30,
      y: y + 12,
      vx: (dir||0) * (1 + Math.random() * 2),
      vy: -Math.random() * 0.3,
      life: 32 + Math.random() * 16, age: 0,
      r: 4 + Math.random() * 6,
    });
  }
}

function burstShout(x, y, color) {
  for (let i = 0; i < 10; i++) {
    const a = Math.random() * Math.PI * 2;
    const v = 2 + Math.random() * 5;
    spawnPart({
      type: 'shout',
      x, y, vx: Math.cos(a)*v, vy: Math.sin(a)*v - 2,
      life: 45, age: 0, r: 6 + Math.random() * 5,
      color,
    });
  }
}

function tickParts(dt) {
  for (let i = parts.length - 1; i >= 0; i--) {
    const p = parts[i];
    p.age += dt;
    if (p.type === 'sequin') {
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.18;
      p.vx *= 0.99;
      p.rot += p.vrot;
    } else if (p.type === 'scuff') {
      p.x += p.vx; p.y += p.vy;
      p.r *= 1.04; p.vx *= 0.95;
    } else if (p.type === 'shout') {
      p.x += p.vx; p.y += p.vy;
      p.vy += 0.12;
    }
    if (p.age > p.life) parts.splice(i, 1);
  }
}

function drawParts() {
  for (const p of parts) {
    const t = p.age / p.life;
    if (p.type === 'sequin') {
      const a = 1 - t;
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.rot);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = a;
      ctx.shadowBlur = 10; ctx.shadowColor = p.color;
      ctx.beginPath();
      ctx.moveTo(0, -p.r);
      ctx.lineTo(p.r * 0.4, 0);
      ctx.lineTo(0, p.r);
      ctx.lineTo(-p.r * 0.4, 0);
      ctx.closePath(); ctx.fill();
      ctx.restore();
    } else if (p.type === 'scuff') {
      ctx.save();
      ctx.globalAlpha = (1 - t) * 0.4;
      ctx.fillStyle = '#f3eedf';
      ctx.beginPath(); ctx.ellipse(p.x, p.y, p.r, p.r * 0.3, 0, 0, Math.PI*2); ctx.fill();
      ctx.restore();
    } else if (p.type === 'shout') {
      const a = 1 - t;
      ctx.save();
      ctx.globalAlpha = a;
      ctx.fillStyle = p.color || '#ff345b';
      ctx.shadowBlur = 18; ctx.shadowColor = p.color || '#ff345b';
      ctx.beginPath(); ctx.arc(p.x, p.y, p.r * (0.5 + t), 0, Math.PI*2); ctx.fill();
      ctx.restore();
    }
  }
  ctx.globalAlpha = 1;
  ctx.shadowBlur = 0;
}

// === Stage backdrop ===
const stars = [];
for (let i = 0; i < 90; i++) {
  stars.push({ x: Math.random(), y: Math.random() * 0.55, s: Math.random() * 1.3 + 0.4, ph: Math.random() * 6 });
}

function drawStage() {
  const t = performance.now() / 1000;
  // floor reflection
  const floorY = H * 0.74;
  const grad = ctx.createLinearGradient(0, floorY, 0, H);
  grad.addColorStop(0, 'rgba(245,196,77,0.16)');
  grad.addColorStop(0.5, 'rgba(40,10,30,0.6)');
  grad.addColorStop(1, '#050010');
  ctx.fillStyle = grad;
  ctx.fillRect(0, floorY, W, H - floorY);
  // floor checker
  ctx.save();
  ctx.globalAlpha = 0.18;
  ctx.fillStyle = '#3a0f4a';
  for (let row = 0; row < 5; row++) {
    for (let col = -8; col < 24; col++) {
      if ((row + col) % 2 === 0) {
        const yy = floorY + row * (H - floorY) / 5;
        const xx = ((col * 80) - W * 0.5) * (1 + row * 0.4) + W * 0.5;
        const w = 80 * (1 + row * 0.45);
        const h = (H - floorY) / 5;
        ctx.fillRect(xx, yy, w, h);
      }
    }
  }
  ctx.restore();

  // stars
  for (const s of stars) {
    const tw = (Math.sin(t * 2 + s.ph) + 1) * 0.5;
    ctx.fillStyle = `rgba(255,247,217,${0.3 + tw * 0.6})`;
    ctx.fillRect(s.x * W, s.y * H, s.s, s.s);
  }

  // spotlight cone
  const sx = mj.x;
  const sy = mj.y - 80;
  ctx.save();
  ctx.globalCompositeOperation = 'screen';
  const cone = ctx.createRadialGradient(sx, sy, 6, sx, sy + 200, 380);
  cone.addColorStop(0, 'rgba(255,247,217,0.4)');
  cone.addColorStop(0.4, 'rgba(245,196,77,0.16)');
  cone.addColorStop(1, 'rgba(245,196,77,0)');
  ctx.fillStyle = cone;
  ctx.beginPath();
  ctx.moveTo(sx - 14, 0);
  ctx.lineTo(sx + 14, 0);
  ctx.lineTo(sx + 220, H);
  ctx.lineTo(sx - 220, H);
  ctx.closePath(); ctx.fill();
  ctx.restore();

  // dust motes in spotlight
  ctx.fillStyle = 'rgba(255,247,217,0.5)';
  for (let i = 0; i < 24; i++) {
    const dx = sx + Math.sin(t * 0.4 + i) * 90;
    const dy = (i / 24) * H + ((t * 8 + i * 5) % H);
    ctx.fillRect(dx, dy, 1, 1);
  }
}

// === Marquee ===
const marquee = document.getElementById('marquee');
let marqTimer = 0;
function flashMarquee(text) {
  marquee.textContent = text;
  marquee.classList.add('show');
  marqTimer = 28;
}

// === Pads ===
const padRow = document.getElementById('padRow');
PHRASES.forEach((p, i) => {
  const el = document.createElement('div');
  el.className = 'pad';
  el.innerHTML = `<span class="key">${p.key}</span><span class="emoji">${p.emoji}</span><span class="label">${p.name}</span>`;
  el.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    triggerPhrase(i, true);
  });
  padRow.appendChild(el);
});

function triggerPhrase(i, fromPad) {
  const p = PHRASES[i];
  playPhrase(p);
  flashMarquee(p.name);
  burstSparkle(mj.x, mj.y - 10, 18 + (p.tail === 'wail' ? 14 : 0));
  burstShout(mj.x + (Math.random()-0.5)*30, mj.y - 30, p.tail === 'wail' ? '#ff345b' : '#f5c44d');
  mj.trigger = 1;
  if (p.tail === 'wail' || p.name === 'WOOO!') mj.glove = 1;
  if (p.kick) {
    // POW! triggers a hard slide
    mj.slide = 1;
    mj.slideDir = Math.random() < 0.5 ? -1 : 1;
    mj.facing = -mj.slideDir;
  }
  hideHint();
  if (fromPad) {
    const els = padRow.children;
    if (els[i]) {
      els[i].classList.add('bang');
      setTimeout(() => els[i].classList.remove('bang'), 140);
    }
  }
}

// === Hint ===
const hint = document.getElementById('hint');
let hintHidden = false;
function hideHint() { if (!hintHidden) { hint.classList.add('gone'); hintHidden = true; } }

// === Click anywhere ===
stage.addEventListener('pointerdown', (e) => {
  if (e.target !== stage) return;
  const rect = stage.getBoundingClientRect();
  const x = e.clientX - rect.left;
  // walk MJ toward click
  if (Math.abs(x - mj.x) > 60) {
    mj.slideDir = x < mj.x ? -1 : 1;
    mj.facing = -mj.slideDir;
    mj.slide = 0.85;
  }
  triggerPhrase(Math.floor(Math.random() * PHRASES.length), false);
});

// === Keys ===
window.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  if (e.code === 'Space') { e.preventDefault(); triggerPhrase(Math.floor(Math.random() * PHRASES.length), false); return; }
  if (e.key === 'm' || e.key === 'M') { toggleMute(); return; }
  if (e.key === 'w' || e.key === 'W') { moonwalk(); return; }
  for (let i = 0; i < PHRASES.length; i++) {
    if (e.key === PHRASES[i].key) { triggerPhrase(i, true); return; }
  }
});

// === UI bindings ===
const sFart = document.getElementById('sFart');
const sSqueak = document.getElementById('sSqueak');
const sSparkle = document.getElementById('sSparkle');
const sRev = document.getElementById('sRev');
sFart.addEventListener('input', () => vFart.textContent = sFart.value);
sSqueak.addEventListener('input', () => vSqueak.textContent = sSqueak.value);
sSparkle.addEventListener('input', () => vSparkle.textContent = sSparkle.value);
sRev.addEventListener('input', () => vRev.textContent = sRev.value);

document.getElementById('bMoon').addEventListener('click', () => { ensureAudio(); moonwalk(); });
const bMute = document.getElementById('bMute');
function toggleMute() {
  muted = !muted;
  bMute.textContent = muted ? '♪ OFF' : '♪ ON';
  bMute.classList.toggle('on', muted);
}
bMute.addEventListener('click', toggleMute);

// === Loop ===
let last = performance.now();
function loop(now) {
  const dt = Math.min(2, (now - last) / 16.67); last = now;
  ctx.clearRect(0, 0, W, H);
  drawStage();
  tickParts(dt);
  drawParts();
  drawMJ();
  if (marqTimer > 0) { marqTimer -= dt; if (marqTimer <= 0) marquee.classList.remove('show'); }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// auto idle: occasional sparkle bursts
setInterval(() => {
  if (Math.random() < 0.4) {
    burstSparkle(mj.x + (Math.random()-0.5)*60, mj.y + 20 + Math.random()*40, 4 + Math.floor(Math.random()*5));
  }
}, 1200);
})();
</script>
