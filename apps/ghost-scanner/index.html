<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ghost Scanner</title>
<link rel="icon" href="https://emojicdn.elk.sh/👻">
<meta property="og:title" content="Ghost Scanner">
<meta property="og:description" content="Sweep a dark room with your scanner. Find the ghosts before they find you.">
<meta property="og:url" content="https://sloppy.live/ghost-scanner">
<meta property="og:image" content="https://sloppy.live/ghost-scanner/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Nosifer&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06080a;--green:#30e860;--red:#e03030;--blue:#3080e0;--dim:#1a2a1a}
body{background:var(--bg);color:var(--green);font-family:'Share Tech Mono',monospace;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  overflow:hidden;cursor:none;user-select:none}

canvas{display:block;width:100vw;height:100vh;position:fixed;top:0;left:0}

#hud{position:fixed;top:0;left:0;right:0;display:flex;justify-content:space-between;
  padding:10px 16px;pointer-events:none;z-index:10}
#hud .label{font-size:9px;letter-spacing:2px;color:rgba(48,232,96,0.4)}
#hud .value{font-size:clamp(14px,2.5vw,20px);text-shadow:0 0 8px rgba(48,232,96,0.3)}

#emf-bar{position:fixed;right:14px;top:50%;transform:translateY(-50%);
  width:8px;height:clamp(100px,25vh,200px);background:rgba(48,232,96,0.06);
  border:1px solid rgba(48,232,96,0.15);border-radius:4px;z-index:10;
  overflow:hidden;pointer-events:none}
#emf-fill{position:absolute;bottom:0;width:100%;border-radius:2px;
  transition:height 0.15s,background 0.3s}

#msg{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  font-size:clamp(11px,1.8vw,14px);color:rgba(48,232,96,0.5);
  letter-spacing:2px;text-align:center;pointer-events:none;z-index:10;
  text-shadow:0 0 6px rgba(48,232,96,0.2);transition:opacity 0.5s}

#start{position:fixed;inset:0;background:var(--bg);display:flex;
  flex-direction:column;align-items:center;justify-content:center;z-index:100;
  cursor:pointer}
#start h1{font-family:'Nosifer',system-ui;font-size:clamp(22px,5vw,48px);
  color:var(--green);letter-spacing:4px;margin-bottom:6px;
  text-shadow:0 0 20px rgba(48,232,96,0.3)}
#start .sub{font-size:clamp(10px,1.5vw,14px);color:rgba(48,232,96,0.3);
  letter-spacing:3px;margin-bottom:24px}
#start .controls{font-size:11px;color:rgba(48,232,96,0.2);letter-spacing:1px;
  line-height:2;text-align:center;margin-bottom:20px}
#start .cta{font-family:'Nosifer',system-ui;font-size:12px;
  color:rgba(48,232,96,0.15);letter-spacing:4px;animation:pulse 2s ease infinite}
@keyframes pulse{0%,100%{opacity:0.2}50%{opacity:0.7}}

#game-over{position:fixed;inset:0;background:rgba(6,8,10,0.95);display:none;
  flex-direction:column;align-items:center;justify-content:center;z-index:100;cursor:pointer}
#game-over.show{display:flex}
#game-over h2{font-family:'Nosifer',system-ui;font-size:clamp(18px,4vw,32px);
  color:var(--green);letter-spacing:3px;margin-bottom:8px}
#game-over .stats{font-size:12px;color:rgba(48,232,96,0.4);letter-spacing:2px;
  line-height:2;text-align:center;margin-bottom:20px}
#game-over .cta{font-size:11px;color:rgba(48,232,96,0.2);letter-spacing:3px}
</style>
</head>
<body>

<div id="start">
  <h1>GHOST SCANNER</h1>
  <div class="sub">PARANORMAL DETECTION UNIT</div>
  <div class="controls">
    MOVE — scan the room<br>
    CLICK — capture ghost<br>
    EMF BAR — proximity alert
  </div>
  <div class="cta">CLICK TO BEGIN SCAN</div>
</div>

<div id="game-over">
  <h2>SCAN COMPLETE</h2>
  <div class="stats" id="go-stats"></div>
  <div class="cta">CLICK TO SCAN AGAIN</div>
</div>

<div id="hud" style="display:none">
  <div><div class="label">GHOSTS FOUND</div><div class="value" id="found-count">0 / 0</div></div>
  <div><div class="label">TIME</div><div class="value" id="timer">60</div></div>
  <div><div class="label">SCORE</div><div class="value" id="score">0</div></div>
</div>
<div id="emf-bar" style="display:none"><div id="emf-fill"></div></div>
<div id="msg" style="display:none"></div>

<canvas id="c"></canvas>

<script>
const C = document.getElementById('c');
const ctx = C.getContext('2d');
let W, H;

function resize(){
  W = C.width = window.innerWidth;
  H = C.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// === GHOST TYPES ===
const GHOST_TYPES = [
  { name:'Whisper',   color:'rgba(180,220,255,0.6)', size:20, speed:0.3, points:100, behavior:'drift' },
  { name:'Shade',     color:'rgba(140,100,200,0.5)', size:28, speed:0.15, points:150, behavior:'lurk' },
  { name:'Flicker',   color:'rgba(255,200,100,0.5)', size:14, speed:1.2, points:200, behavior:'dart' },
  { name:'Hollow',    color:'rgba(100,255,150,0.4)', size:35, speed:0.08, points:250, behavior:'pulse' },
  { name:'Screamer',  color:'rgba(255,80,80,0.6)',   size:24, speed:0.6, points:300, behavior:'chase' },
];

// === ROOM OBJECTS (furniture silhouettes) ===
const ROOM_OBJECTS = [];
function generateRoom(){
  ROOM_OBJECTS.length = 0;
  const objs = [
    { x:0.05, y:0.08, w:0.18, h:0.06, label:'Bookshelf' },
    { x:0.78, y:0.05, w:0.17, h:0.12, label:'Wardrobe' },
    { x:0.08, y:0.40, w:0.14, h:0.20, label:'Armchair' },
    { x:0.40, y:0.35, w:0.20, h:0.12, label:'Table' },
    { x:0.75, y:0.45, w:0.18, h:0.25, label:'Bed' },
    { x:0.30, y:0.75, w:0.12, h:0.10, label:'Chest' },
    { x:0.55, y:0.80, w:0.10, h:0.08, label:'Stool' },
    { x:0.02, y:0.72, w:0.08, h:0.22, label:'Lamp' },
    { x:0.88, y:0.78, w:0.10, h:0.18, label:'Mirror' },
  ];
  for(const o of objs){
    ROOM_OBJECTS.push({
      x: o.x*W, y: o.y*H, w: o.w*W, h: o.h*H, label: o.label
    });
  }
}

// === STATE ===
let mx = W/2, my = H/2;
let running = false;
let ghosts = [];
let particles = [];
let scanPulses = [];
let score = 0;
let ghostsFound = 0;
let totalGhosts = 0;
let timeLeft = 60;
let gameTime = 0;
let flashAlpha = 0;
let msgText = '';
let msgTimer = 0;
let emfLevel = 0;
let ambientParticles = [];
let staticNoise = [];

// === GHOST SPAWNING ===
function spawnGhosts(count){
  ghosts = [];
  for(let i=0; i<count; i++){
    const type = GHOST_TYPES[Math.floor(Math.random()*GHOST_TYPES.length)];
    let gx, gy, valid;
    // Don't spawn too close to center or in furniture
    do {
      gx = 40 + Math.random()*(W-80);
      gy = 40 + Math.random()*(H-80);
      valid = true;
      for(const obj of ROOM_OBJECTS){
        if(gx>obj.x-20 && gx<obj.x+obj.w+20 && gy>obj.y-20 && gy<obj.y+obj.h+20) valid=false;
      }
      const dx=gx-W/2, dy=gy-H/2;
      if(Math.sqrt(dx*dx+dy*dy)<100) valid=false;
    } while(!valid);

    ghosts.push({
      x:gx, y:gy, type, found:false, visible:0,
      baseX:gx, baseY:gy,
      phase: Math.random()*Math.PI*2,
      orbitR: 10+Math.random()*30,
      flickerTimer: 0,
      revealProgress: 0,
    });
  }
  totalGhosts = count;
}

// === AMBIENT ===
function initAmbient(){
  ambientParticles = [];
  for(let i=0; i<30; i++){
    ambientParticles.push({
      x:Math.random()*W, y:Math.random()*H,
      vx:(Math.random()-0.5)*0.3, vy:(Math.random()-0.5)*0.3,
      size:1+Math.random()*2, alpha:Math.random()*0.15,
    });
  }
}

// === UPDATE ===
function update(dt){
  gameTime += dt;

  // Timer
  timeLeft -= dt;
  if(timeLeft <= 0){
    timeLeft = 0;
    endGame();
    return;
  }

  // Message fade
  if(msgTimer > 0){
    msgTimer -= dt;
    if(msgTimer <= 0) document.getElementById('msg').style.opacity = '0';
  }

  // Flash fade
  if(flashAlpha > 0) flashAlpha -= dt*3;

  // EMF — proximity to nearest unfound ghost
  let minDist = Infinity;
  for(const g of ghosts){
    if(g.found) continue;
    const dx=g.x-mx, dy=g.y-my;
    const d = Math.sqrt(dx*dx+dy*dy);
    if(d < minDist) minDist = d;
  }
  const emfRange = 250;
  emfLevel += ((minDist < emfRange ? 1 - minDist/emfRange : 0) - emfLevel) * 0.1;

  // Update EMF bar
  const emfFill = document.getElementById('emf-fill');
  emfFill.style.height = (emfLevel*100)+'%';
  emfFill.style.background = emfLevel > 0.7 ? 'var(--red)' :
    emfLevel > 0.4 ? '#e0a030' : 'var(--green)';

  // Ghost behaviors
  for(const g of ghosts){
    if(g.found) continue;
    g.phase += dt * g.type.speed * 2;

    if(g.type.behavior === 'drift'){
      g.x = g.baseX + Math.sin(g.phase)*g.orbitR;
      g.y = g.baseY + Math.cos(g.phase*0.7)*g.orbitR*0.6;
    } else if(g.type.behavior === 'lurk'){
      g.x = g.baseX + Math.sin(g.phase*0.3)*5;
      g.y = g.baseY + Math.cos(g.phase*0.2)*5;
    } else if(g.type.behavior === 'dart'){
      if(Math.random() < 0.005){
        g.baseX = Math.max(30, Math.min(W-30, g.baseX + (Math.random()-0.5)*120));
        g.baseY = Math.max(30, Math.min(H-30, g.baseY + (Math.random()-0.5)*120));
      }
      g.x += (g.baseX - g.x)*0.05;
      g.y += (g.baseY - g.y)*0.05;
    } else if(g.type.behavior === 'pulse'){
      g.x = g.baseX;
      g.y = g.baseY;
    } else if(g.type.behavior === 'chase'){
      const dx=mx-g.x, dy=my-g.y;
      const d = Math.sqrt(dx*dx+dy*dy)||1;
      if(d < 300){
        g.baseX += (dx/d)*0.3;
        g.baseY += (dy/d)*0.3;
      }
      g.x = g.baseX + Math.sin(g.phase*3)*8;
      g.y = g.baseY + Math.cos(g.phase*2.5)*8;
    }

    // Visibility based on scanner distance
    const dx=g.x-mx, dy=g.y-my;
    const d = Math.sqrt(dx*dx+dy*dy);
    const scanR = 120;
    if(d < scanR){
      g.visible = Math.min(1, g.visible + dt*2.5);
    } else {
      g.visible = Math.max(0, g.visible - dt*1.5);
    }
  }

  // Scan pulses
  for(let i=scanPulses.length-1; i>=0; i--){
    const p = scanPulses[i];
    p.r += dt*300;
    p.alpha -= dt*1.5;
    if(p.alpha <= 0) scanPulses.splice(i,1);
  }

  // Capture particles
  for(let i=particles.length-1; i>=0; i--){
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.97; p.vy *= 0.97;
    p.alpha -= 0.02;
    if(p.alpha <= 0) particles.splice(i,1);
  }

  // Ambient
  for(const p of ambientParticles){
    p.x += p.vx; p.y += p.vy;
    if(p.x<0) p.x=W; if(p.x>W) p.x=0;
    if(p.y<0) p.y=H; if(p.y>H) p.y=0;
    p.alpha = 0.05 + Math.sin(gameTime+p.x*0.01)*0.05;
  }

  // HUD
  document.getElementById('found-count').textContent = `${ghostsFound} / ${totalGhosts}`;
  document.getElementById('timer').textContent = Math.ceil(timeLeft);
  document.getElementById('score').textContent = score;
  if(timeLeft < 10) document.getElementById('timer').style.color = 'var(--red)';

  // All found?
  if(ghostsFound >= totalGhosts) endGame();
}

// === DRAW ===
function draw(){
  // Dark room
  ctx.fillStyle = '#06080a';
  ctx.fillRect(0,0,W,H);

  // Static noise texture
  ctx.globalAlpha = 0.015;
  for(let i=0; i<200; i++){
    const nx = Math.random()*W, ny = Math.random()*H;
    ctx.fillStyle = Math.random()>0.5 ? '#1a2a1a' : '#0a1a0a';
    ctx.fillRect(nx, ny, 2, 2);
  }
  ctx.globalAlpha = 1;

  // Room objects (barely visible in darkness)
  for(const obj of ROOM_OBJECTS){
    const dx = obj.x+obj.w/2-mx, dy = obj.y+obj.h/2-my;
    const d = Math.sqrt(dx*dx+dy*dy);
    const vis = Math.max(0.03, Math.min(0.2, 1-d/350));
    ctx.fillStyle = `rgba(20,35,20,${vis})`;
    ctx.fillRect(obj.x, obj.y, obj.w, obj.h);
    ctx.strokeStyle = `rgba(48,100,48,${vis*0.5})`;
    ctx.lineWidth = 1;
    ctx.strokeRect(obj.x, obj.y, obj.w, obj.h);
    if(d < 200){
      ctx.fillStyle = `rgba(48,232,96,${vis*0.5})`;
      ctx.font = '9px "Share Tech Mono", monospace';
      ctx.textAlign = 'center';
      ctx.fillText(obj.label, obj.x+obj.w/2, obj.y+obj.h/2+3);
    }
  }

  // Scanner light cone
  const scanR = 120;
  const scanGrad = ctx.createRadialGradient(mx,my,0,mx,my,scanR);
  scanGrad.addColorStop(0, 'rgba(48,232,96,0.06)');
  scanGrad.addColorStop(0.5, 'rgba(48,232,96,0.03)');
  scanGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = scanGrad;
  ctx.beginPath();
  ctx.arc(mx,my,scanR,0,Math.PI*2);
  ctx.fill();

  // Scan grid lines in cone
  ctx.strokeStyle = 'rgba(48,232,96,0.04)';
  ctx.lineWidth = 0.5;
  const gridS = 30;
  for(let x=mx-scanR; x<mx+scanR; x+=gridS){
    ctx.beginPath(); ctx.moveTo(x, my-scanR); ctx.lineTo(x, my+scanR); ctx.stroke();
  }
  for(let y=my-scanR; y<my+scanR; y+=gridS){
    ctx.beginPath(); ctx.moveTo(mx-scanR, y); ctx.lineTo(mx+scanR, y); ctx.stroke();
  }

  // Scan pulses
  for(const p of scanPulses){
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(48,232,96,${p.alpha*0.5})`;
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // Ambient particles
  for(const p of ambientParticles){
    ctx.fillStyle = `rgba(48,232,96,${p.alpha})`;
    ctx.fillRect(p.x, p.y, p.size, p.size);
  }

  // Ghosts
  for(const g of ghosts){
    if(g.found){
      // Captured — fading outline
      if(g.revealProgress > 0){
        g.revealProgress -= 0.01;
        ctx.globalAlpha = g.revealProgress * 0.3;
        ctx.beginPath();
        ctx.arc(g.x, g.y, g.type.size*0.5, 0, Math.PI*2);
        ctx.strokeStyle = g.type.color;
        ctx.lineWidth = 1;
        ctx.stroke();
        ctx.globalAlpha = 1;
      }
      continue;
    }

    if(g.visible <= 0) continue;

    const alpha = g.visible;
    const s = g.type.size;

    // Ghost body — ethereal shape
    ctx.save();
    ctx.translate(g.x, g.y);
    ctx.globalAlpha = alpha * 0.7;

    // Outer glow
    const glow = ctx.createRadialGradient(0,0,0,0,0,s*1.5);
    glow.addColorStop(0, g.type.color);
    glow.addColorStop(1, 'transparent');
    ctx.fillStyle = glow;
    ctx.beginPath();
    ctx.arc(0,0,s*1.5,0,Math.PI*2);
    ctx.fill();

    // Core shape — wobbly ghost
    ctx.beginPath();
    ctx.moveTo(0, -s*0.7);
    for(let a=0; a<Math.PI*2; a+=0.3){
      const wobble = Math.sin(a*3+gameTime*3+g.phase)*s*0.15;
      const r = s*0.5 + wobble;
      // Ghost bottom is wavy
      const yStretch = a > Math.PI ? 1.2 : 1;
      ctx.lineTo(Math.cos(a)*r, Math.sin(a)*r*yStretch);
    }
    ctx.closePath();
    ctx.fillStyle = g.type.color;
    ctx.fill();

    // Eyes
    if(alpha > 0.3){
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#000';
      const eyeY = -s*0.1;
      const eyeSpread = s*0.2;
      ctx.beginPath();
      ctx.ellipse(-eyeSpread, eyeY, 3, 4, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.ellipse(eyeSpread, eyeY, 3, 4, 0, 0, Math.PI*2);
      ctx.fill();
      // Pupils that follow scanner
      const dx=mx-g.x, dy=my-g.y;
      const pa = Math.atan2(dy,dx);
      ctx.fillStyle = g.type.color.replace(/[\d.]+\)/, '1)');
      ctx.beginPath();
      ctx.arc(-eyeSpread+Math.cos(pa)*1.5, eyeY+Math.sin(pa)*1.5, 1.5, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(eyeSpread+Math.cos(pa)*1.5, eyeY+Math.sin(pa)*1.5, 1.5, 0, Math.PI*2);
      ctx.fill();
    }

    // Name tag when very visible
    if(alpha > 0.6){
      ctx.globalAlpha = (alpha-0.6)*2.5;
      ctx.fillStyle = g.type.color;
      ctx.font = '9px "Share Tech Mono", monospace';
      ctx.textAlign = 'center';
      ctx.fillText(g.type.name.toUpperCase(), 0, s+14);
      ctx.fillText(`${g.type.points} PTS`, 0, s+24);
    }

    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // Capture particles
  for(const p of particles){
    ctx.globalAlpha = p.alpha;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size, 0, Math.PI*2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Flash
  if(flashAlpha > 0){
    ctx.fillStyle = `rgba(48,232,96,${flashAlpha*0.1})`;
    ctx.fillRect(0,0,W,H);
  }

  // Cursor — crosshair scanner
  ctx.strokeStyle = `rgba(48,232,96,${0.4+emfLevel*0.4})`;
  ctx.lineWidth = 1;
  const cR = 14;
  ctx.beginPath(); ctx.arc(mx,my,cR,0,Math.PI*2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(mx-cR-6,my); ctx.lineTo(mx-cR+4,my); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(mx+cR-4,my); ctx.lineTo(mx+cR+6,my); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(mx,my-cR-6); ctx.lineTo(mx,my-cR+4); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(mx,my+cR-4); ctx.lineTo(mx,my+cR+6); ctx.stroke();
  // Center dot
  ctx.fillStyle = emfLevel > 0.6 ? 'var(--red)' : 'var(--green)';
  ctx.beginPath(); ctx.arc(mx,my,2,0,Math.PI*2); ctx.fill();

  // Scanline effect
  const scanlineY = (gameTime*80) % H;
  ctx.fillStyle = 'rgba(48,232,96,0.015)';
  ctx.fillRect(0, scanlineY, W, 2);
}

// === INPUT ===
window.addEventListener('mousemove', e => { mx=e.clientX; my=e.clientY; });
window.addEventListener('touchmove', e => {
  e.preventDefault();
  mx=e.touches[0].clientX; my=e.touches[0].clientY;
}, {passive:false});

window.addEventListener('click', () => {
  if(!running) return;
  // Scan pulse
  scanPulses.push({ x:mx, y:my, r:0, alpha:1 });

  // Check ghost capture
  for(const g of ghosts){
    if(g.found) continue;
    const dx=g.x-mx, dy=g.y-my;
    const d = Math.sqrt(dx*dx+dy*dy);
    if(d < g.type.size+15 && g.visible > 0.3){
      captureGhost(g);
      return;
    }
  }
});

window.addEventListener('touchstart', e => {
  mx=e.touches[0].clientX; my=e.touches[0].clientY;
  if(!running) return;
  scanPulses.push({ x:mx, y:my, r:0, alpha:1 });
  for(const g of ghosts){
    if(g.found) continue;
    const dx=g.x-mx, dy=g.y-my;
    if(Math.sqrt(dx*dx+dy*dy) < g.type.size+20 && g.visible > 0.2){
      captureGhost(g); return;
    }
  }
});

function captureGhost(g){
  g.found = true;
  g.revealProgress = 1;
  ghostsFound++;
  const timeBonus = Math.floor(timeLeft * 2);
  score += g.type.points + timeBonus;
  flashAlpha = 1;

  // Particles
  for(let i=0; i<20; i++){
    const a = Math.random()*Math.PI*2;
    const spd = 1+Math.random()*4;
    particles.push({
      x:g.x, y:g.y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
      size:1+Math.random()*3, color:g.type.color, alpha:1,
    });
  }

  showMsg(`${g.type.name.toUpperCase()} CAPTURED! +${g.type.points+timeBonus}`);
}

function showMsg(text){
  const el = document.getElementById('msg');
  el.textContent = text;
  el.style.opacity = '1';
  msgTimer = 2;
}

// === GAME FLOW ===
function startGame(){
  document.getElementById('start').style.display = 'none';
  document.getElementById('game-over').classList.remove('show');
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('emf-bar').style.display = 'block';
  document.getElementById('msg').style.display = 'block';
  document.getElementById('timer').style.color = '';

  generateRoom();
  score = 0; ghostsFound = 0; timeLeft = 60; gameTime = 0;
  emfLevel = 0; flashAlpha = 0; particles = []; scanPulses = [];
  spawnGhosts(7);
  initAmbient();
  running = true;
  showMsg('SCAN INITIATED — FIND THE GHOSTS');
  requestAnimationFrame(ts => { lastTime=ts; loop(ts); });
}

function endGame(){
  running = false;
  const el = document.getElementById('game-over');
  el.classList.add('show');
  const allFound = ghostsFound >= totalGhosts;
  document.getElementById('go-stats').innerHTML =
    `GHOSTS: ${ghostsFound} / ${totalGhosts}<br>` +
    `SCORE: ${score}<br>` +
    `TIME LEFT: ${Math.ceil(timeLeft)}s<br>` +
    (allFound ? '<br>ALL GHOSTS CAPTURED!' : '<br>SOME ESCAPED...');
}

document.getElementById('start').addEventListener('click', startGame);
document.getElementById('game-over').addEventListener('click', startGame);

// === LOOP ===
let lastTime = 0;
function loop(ts){
  if(!running) return;
  const dt = Math.min(0.05, (ts-lastTime)/1000);
  lastTime = ts;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
