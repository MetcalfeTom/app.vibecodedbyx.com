<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Chat Blossom</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8C%B8" />

<meta name="description" content="A flower that blooms one pastel petal for every Twitch chat message. Watch the stream talk it into blossom — or tap to help it along." />
<meta property="og:type" content="website" />
<meta property="og:title" content="Chat Blossom" />
<meta property="og:description" content="Every chat message opens one pastel petal. Gentle springs. Infinite blooms." />
<meta property="og:url" content="https://sloppy.live/chat-blossom/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/a%20single%20pastel%20flower%20blooming%20petal%20by%20petal%20against%20soft%20morning%20sky%2C%20minimal%20illustration%2C%20gentle%2C%20dreamy?width=1200&height=630&nologo=true&seed=333" />
<meta name="twitter:card" content="summary_large_image" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,500;1,600&family=Sometype+Mono:wght@400;500&display=swap" rel="stylesheet" />

<style>
  :root{ --ink:#5a5348; --faint:#9a917f; }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  html,body{height:100%}
  body{
    font-family:'Sometype Mono',monospace; color:var(--ink); overflow:hidden;
    background:linear-gradient(180deg,#dcecf5 0%, #eef2e3 55%, #dfe8c9 78%, #cfdcae 100%);
    display:flex; flex-direction:column; align-items:center; justify-content:center;
  }
  header{ position:fixed; top:1.1rem; text-align:center; z-index:5; }
  h1{ font-family:'Cormorant Garamond',serif; font-style:italic; font-weight:600;
    font-size:clamp(1.6rem,6vw,2.4rem); color:#6a5d68; letter-spacing:.04em; }
  .tag{ font-size:.64rem; letter-spacing:.22em; text-transform:uppercase; color:var(--faint); margin-top:.3rem; }

  #stage{ width:min(30rem,92vw); }
  svg{ width:100%; height:auto; display:block; }

  .hud{ position:fixed; bottom:1rem; display:flex; gap:1.4rem; align-items:center; z-index:5;
    background:rgba(255,255,255,.5); border:1px solid rgba(90,83,72,.15); border-radius:20px;
    padding:.45rem 1rem; font-size:.68rem; backdrop-filter:blur(4px); }
  .hud b{ color:#6a5d68; }
  .dot{ display:inline-block; width:.5rem; height:.5rem; border-radius:50%; background:#c9a227; margin-right:.3rem; }
  .hud .live .dot{ background:#7dbd7a; }
  .hud .err .dot{ background:#d47a6a; }
  .last{ position:fixed; bottom:3.6rem; font-family:'Cormorant Garamond',serif; font-style:italic;
    font-size:1rem; color:#8a7d88; z-index:5; min-height:1.3rem; text-align:center; }
  @media (prefers-reduced-motion: reduce){ .sway{ animation:none !important; } }
  .sway{ animation:sway 7s ease-in-out infinite alternate; transform-origin:50% 100%; }
  @keyframes sway{ from{ transform:rotate(-1.4deg); } to{ transform:rotate(1.4deg); } }
</style>
</head>
<body>
  <header>
    <h1>chat blossom</h1>
    <p class="tag">one petal per message</p>
  </header>

  <div id="stage">
    <svg viewBox="0 0 400 460" role="img" aria-label="A flower that opens one pastel petal for each chat message" id="scene">
      <g class="sway">
        <!-- stem -->
        <path d="M200 440 C 196 380 206 330 200 262" fill="none" stroke="#7fa464" stroke-width="7" stroke-linecap="round"/>
        <path d="M200 380 C 172 372 158 352 152 330 C 180 334 196 352 200 368 Z" fill="#8fb474"/>
        <path d="M201 342 C 228 332 244 312 250 288 C 220 294 206 312 201 330 Z" fill="#86ac6b"/>
        <!-- petals injected here -->
        <g id="petals" transform="translate(200,240)"></g>
        <!-- center -->
        <circle cx="200" cy="240" r="26" fill="#f5d76e" stroke="#e3b93c" stroke-width="3"/>
        <g id="centerFace"></g>
      </g>
      <!-- ground -->
      <ellipse cx="200" cy="448" rx="120" ry="10" fill="rgba(110,140,80,.25)"/>
    </svg>
  </div>

  <p class="last" id="last" role="status" aria-live="polite"></p>
  <div class="hud">
    <span id="twitch" class="conn"><span class="dot"></span><span id="twitchTxt">connecting…</span></span>
    <span>petals <b id="nPetals">0</b>/<b id="nMax">16</b></span>
    <span>blooms <b id="nBlooms">0</b></span>
  </div>

<script>
(function(){
  "use strict";
  var $=function(id){return document.getElementById(id);};
  var petalsG=$('petals'), reduce=window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  var NS='http://www.w3.org/2000/svg';
  var MAX=16;
  var PASTELS=['#f7c8d4','#c8e3f7','#d9ccf0','#f7e5b8','#c9ecd2','#f7d3b8','#e3c8ea','#c8ecec',
               '#f2c8c0','#d3d9f7','#eed0e0','#e8eec0','#c0e0d3','#f0dcc8','#d5c8f2','#c8d8ec'];
  var petals=0, blooms=0, resetting=false;
  try{ blooms=parseInt(localStorage.getItem('chat-blossom-blooms'),10)||0; }catch(e){}
  $('nBlooms').textContent=blooms; $('nMax').textContent=MAX;

  // ---- one petal ----
  function openPetal(who){
    if(resetting) return;
    if(petals>=MAX) return;
    var i=petals++;
    var angle=(i/MAX)*360 - 90;
    var p=document.createElementNS(NS,'path');
    // teardrop petal pointing outward from center
    p.setAttribute('d','M0 -24 C 16 -52 14 -86 0 -102 C -14 -86 -16 -52 0 -24 Z');
    p.setAttribute('fill', PASTELS[i%PASTELS.length]);
    p.setAttribute('stroke','rgba(90,83,72,.18)');
    p.setAttribute('stroke-width','1.5');
    p.setAttribute('transform','rotate('+angle+')');
    var wrap=document.createElementNS(NS,'g');
    wrap.appendChild(p);
    petalsG.appendChild(wrap);
    // gentle spring: overshoot then settle (scale around the flower centre)
    if(reduce){ /* appear instantly */ }
    else{
      p.style.transformOrigin='0px 0px';
      p.animate(
        [{transform:'rotate('+angle+'deg) scale(0)'},
         {transform:'rotate('+angle+'deg) scale(1.12)', offset:.55},
         {transform:'rotate('+angle+'deg) scale(.96)', offset:.78},
         {transform:'rotate('+angle+'deg) scale(1)'}],
        {duration:900, easing:'cubic-bezier(.34,1.3,.5,1)', fill:'both'}
      );
    }
    chime(i);
    $('nPetals').textContent=petals;
    if(who) $('last').textContent='a petal for '+who;
    if(petals>=MAX) fullBloom();
  }

  // ---- full bloom → petals drift away → new bud ----
  function fullBloom(){
    resetting=true;
    blooms++; $('nBlooms').textContent=blooms;
    try{ localStorage.setItem('chat-blossom-blooms', String(blooms)); }catch(e){}
    $('last').textContent='full bloom · thank you, chat 🌸';
    [523,659,784,988,1175].forEach(function(f,i){ tone(f,0.7,0.05,i*0.13); });
    setTimeout(function(){
      // petals drift off one by one
      var kids=Array.prototype.slice.call(petalsG.children);
      kids.forEach(function(k,i){
        setTimeout(function(){
          if(reduce){ k.remove(); return; }
          var drift=k.animate(
            [{transform:'translate(0,0) rotate(0deg)', opacity:1},
             {transform:'translate('+((Math.random()-0.5)*160)+'px,'+(120+Math.random()*80)+'px) rotate('+((Math.random()-0.5)*140)+'deg)', opacity:0}],
            {duration:1600+Math.random()*800, easing:'cubic-bezier(.3,.1,.6,1)', fill:'forwards'});
          drift.onfinish=function(){ k.remove(); };
        }, i*90);
      });
      setTimeout(function(){
        petalsG.innerHTML=''; petals=0; resetting=false;
        $('nPetals').textContent='0';
        $('last').textContent='a new bud waits…';
      }, kids.length*90+2600);
    }, 4200);
  }

  // ---- gentle audio ----
  var AC=null, unlocked=false;
  function ac(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} }
    if(AC&&AC.state==='suspended') AC.resume(); return AC; }
  function tone(f,dur,vol,delay){
    var c=AC; if(!c||!unlocked) return; var t=c.currentTime+(delay||0);
    var o=c.createOscillator(), g=c.createGain();
    o.type='sine'; o.frequency.value=f;
    var o2=c.createOscillator(); o2.type='sine'; o2.frequency.value=f*2; // soft octave shimmer
    var g2=c.createGain(); g2.gain.value=0.25;
    g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(vol,t+0.04);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g); o2.connect(g2); g2.connect(g); g.connect(c.destination);
    o.start(t); o.stop(t+dur+0.05); o2.start(t); o2.stop(t+dur+0.05);
  }
  var SCALE=[392,440,523,587,659,784,880,1047];
  function chime(i){ tone(SCALE[i%SCALE.length], 1.4, 0.06); }
  // audio unlocks on first tap anywhere (petal chimes silent until then)
  document.addEventListener('pointerdown', function(){ unlocked=true; ac(); }, {once:false});

  // ---- Twitch chat: one petal per message ----
  var ws=null;
  function setConn(cls,msg){ var el=$('twitch'); el.className=cls; $('twitchTxt').textContent=msg; }
  function connect(){
    try{ ws=new WebSocket('wss://irc-ws.chat.twitch.tv:443'); }catch(e){ setConn('err','chat unreachable'); return; }
    ws.onopen=function(){
      ws.send('PASS SCHMOOPIIE');
      ws.send('NICK justinfan'+Math.floor(Math.random()*99999));
      ws.send('JOIN #sloppy_ai');
      setConn('live','live · #sloppy_ai');
    };
    ws.onmessage=function(ev){
      ev.data.split('\r\n').forEach(function(line){
        if(!line) return;
        if(line.indexOf('PING')===0){ ws.send('PONG :tmi.twitch.tv'); return; }
        var m=line.match(/^:([A-Za-z0-9_]+)![^ ]+ PRIVMSG #[^ ]+ :(.*)$/);
        if(m) openPetal(m[1]);
      });
    };
    ws.onclose=function(){ setConn('conn','reconnecting…'); setTimeout(connect, 4000); };
    ws.onerror=function(){ try{ws.close();}catch(e){} };
  }
  connect();

  // tap the flower = a petal too (for quiet moments; labelled honestly)
  $('scene').addEventListener('pointerdown', function(){ openPetal('you'); });
})();
</script>
</body>
</html>
