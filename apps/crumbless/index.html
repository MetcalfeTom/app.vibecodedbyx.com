<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Crumbless — a crumb-free to-do list</title>
<meta name="description" content="A clean dark to-do list that saves in your browser. Finish tasks, then sweep them away. Zero crumbs left behind.">
<link rel="icon" href="https://emojicdn.elk.sh/🧹">
<meta property="og:title" content="Crumbless — a crumb-free to-do list">
<meta property="og:description" content="A clean dark to-do list that saves in your browser. Finish tasks, then sweep them away.">
<meta property="og:url" content="https://sloppy.live/crumbless">
<meta property="og:type" content="website">
<meta property="og:image" content="https://image.pollinations.ai/prompt/minimalist%20dark%20charcoal%20desk%20swept%20perfectly%20clean%20by%20a%20small%20elegant%20broom%2C%20single%20lime%20green%20checkmark%20glowing%2C%20flat%20vector%20illustration%2C%20high%20contrast%2C%20moody?width=1200&height=630&nologo=true&seed=8841&model=flux&format=png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@1,6..72,200..500&family=Spline+Sans+Mono:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0e0f12;
  --panel:#15161b;
  --panel-2:#1a1c22;
  --line:#262933;
  --ink:#eceff4;
  --dim:#9aa1ad;
  --accent:#b8e34f;
  --accent-ink:#131503;
  --danger:#ff7a6e;
  --radius:0.375rem;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:100%}
body{
  min-height:100vh;
  background:
    radial-gradient(60rem 40rem at 85% -10%, rgba(184,227,79,0.05), transparent 60%),
    radial-gradient(50rem 35rem at -10% 110%, rgba(120,140,255,0.04), transparent 60%),
    var(--bg);
  color:var(--ink);
  font-family:'Spline Sans Mono',monospace;
  font-weight:300;
  display:flex;
  justify-content:center;
  padding:clamp(1rem,4vw,3rem) 1rem 4rem;
}
main{width:100%;max-width:38rem}
header{margin-bottom:2rem;animation:rise .5s ease both}
.eyebrow{
  font-size:0.6875rem;letter-spacing:0.35em;text-transform:uppercase;
  color:var(--dim);margin-bottom:0.5rem;
}
.eyebrow .dot{color:var(--accent)}
h1{
  font-family:'Newsreader',serif;font-style:italic;font-weight:200;
  font-size:clamp(2.75rem,9vw,4.25rem);line-height:1;letter-spacing:-0.02em;
}
h1 em{font-style:italic;color:var(--accent)}
.tagline{color:var(--dim);font-size:0.8125rem;margin-top:0.75rem}

form{
  display:flex;gap:0.5rem;margin-bottom:1rem;
  animation:rise .5s .08s ease both;
}
#newTask{
  flex:1;min-height:2.75rem;padding:0 1rem;
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  color:var(--ink);font:inherit;font-size:0.9375rem;
}
#newTask::placeholder{color:#5b6170}
#newTask:focus-visible{outline:3px solid var(--accent);outline-offset:2px;border-color:transparent}
.btn{
  min-height:2.75rem;min-width:2.75rem;padding:0 1.1rem;
  border:1px solid var(--line);border-radius:var(--radius);
  background:var(--panel-2);color:var(--ink);
  font:inherit;font-size:0.8125rem;font-weight:600;letter-spacing:0.06em;
  cursor:pointer;transition:transform .12s ease,background .12s ease;
}
.btn:hover{background:#22242c}
.btn:active{transform:scale(0.97)}
.btn:focus-visible{outline:3px solid var(--accent);outline-offset:2px}
.btn-add{background:var(--accent);border-color:var(--accent);color:var(--accent-ink)}
.btn-add:hover{background:#c8f06a}

.bar{
  display:flex;align-items:center;justify-content:space-between;gap:0.5rem;
  margin-bottom:0.75rem;animation:rise .5s .14s ease both;
}
.filters{display:flex;gap:0.25rem}
.chip{
  min-height:2.75rem;padding:0 0.9rem;
  background:transparent;border:1px solid transparent;border-radius:var(--radius);
  color:var(--dim);font:inherit;font-size:0.75rem;letter-spacing:0.08em;cursor:pointer;
}
.chip:hover{color:var(--ink)}
.chip:focus-visible{outline:3px solid var(--accent);outline-offset:2px}
.chip[aria-pressed="true"]{color:var(--accent);border-color:var(--line);background:var(--panel)}
#count{font-size:0.75rem;color:var(--dim);white-space:nowrap}

ul{list-style:none;animation:rise .5s .2s ease both}
li.task{
  display:flex;align-items:center;gap:0.75rem;
  background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);
  padding:0.55rem 0.55rem 0.55rem 0.9rem;margin-bottom:0.5rem;
  transition:opacity .25s ease,transform .25s ease;
}
li.task.entering{animation:pop .3s ease}
li.task.leaving{opacity:0;transform:translateX(2.5rem) rotate(1deg)}
.check{
  flex:none;width:2.75rem;height:2.75rem;display:grid;place-items:center;
  background:transparent;border:none;cursor:pointer;border-radius:var(--radius);
}
.check:focus-visible{outline:3px solid var(--accent);outline-offset:-2px}
.check .box{
  width:1.25rem;height:1.25rem;border:1px solid var(--dim);border-radius:0.25rem;
  display:grid;place-items:center;transition:all .15s ease;
  color:transparent;font-size:0.8rem;font-weight:600;
}
.check[aria-pressed="true"] .box{
  background:var(--accent);border-color:var(--accent);color:var(--accent-ink);
}
.task-label{
  flex:1;font-size:0.9375rem;line-height:1.45;word-break:break-word;
  padding:0.35rem 0;transition:color .2s ease;
}
li.done .task-label{
  color:var(--dim);
  text-decoration:line-through;text-decoration-color:var(--accent);text-decoration-thickness:1px;
}
.del{
  flex:none;width:2.75rem;height:2.75rem;display:grid;place-items:center;
  background:transparent;border:none;border-radius:var(--radius);
  color:#5b6170;font-size:1.1rem;cursor:pointer;transition:color .12s ease;
}
.del:hover{color:var(--danger)}
.del:focus-visible{outline:3px solid var(--danger);outline-offset:-2px}

.empty{
  text-align:center;padding:3rem 1rem;color:var(--dim);
  border:1px dashed var(--line);border-radius:var(--radius);
}
.empty .big{font-size:2rem;display:block;margin-bottom:0.75rem}
.empty p{font-family:'Newsreader',serif;font-style:italic;font-size:1.125rem;font-weight:300}

.sweep-row{margin-top:1.25rem;text-align:right}
.btn-sweep{color:var(--dim)}
.btn-sweep:not(:disabled):hover{color:var(--ink)}
.btn-sweep:disabled{opacity:0.35;cursor:default}

footer{
  margin-top:3rem;font-size:0.6875rem;color:#565c69;line-height:1.8;
  animation:rise .5s .26s ease both;
}
footer .ok{color:var(--accent)}

@keyframes rise{from{opacity:0;transform:translateY(0.75rem)}to{opacity:1;transform:none}}
@keyframes pop{0%{opacity:0;transform:scale(0.97) translateY(-0.25rem)}100%{opacity:1;transform:none}}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation:none!important;transition:none!important}
}
@media (max-width:26rem){
  .bar{flex-direction:column;align-items:flex-start}
}
</style>
</head>
<body>
<main>
  <header>
    <p class="eyebrow">crumb-free productivity <span class="dot">·</span> est. 2026</p>
    <h1>Crumb<em>less</em></h1>
    <p class="tagline">finish your tasks, then sweep them away. nothing left on the counter.</p>
  </header>

  <form id="addForm">
    <label for="newTask" class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0 0 0 0)">New task</label>
    <input id="newTask" type="text" maxlength="200" placeholder="what needs doing?" autocomplete="off">
    <button type="submit" class="btn btn-add">add</button>
  </form>

  <div class="bar">
    <div class="filters" role="group" aria-label="Filter tasks">
      <button type="button" class="chip" data-filter="all" aria-pressed="true">all</button>
      <button type="button" class="chip" data-filter="active" aria-pressed="false">active</button>
      <button type="button" class="chip" data-filter="done" aria-pressed="false">done</button>
    </div>
    <p id="count" role="status" aria-live="polite"></p>
  </div>

  <ul id="list" aria-label="Tasks"></ul>
  <div id="empty" class="empty" hidden>
    <span class="big" aria-hidden="true">🧹</span>
    <p>spotless. not a crumb in sight.</p>
  </div>

  <div class="sweep-row">
    <button type="button" id="sweepBtn" class="btn btn-sweep" disabled>🧹 sweep done tasks</button>
  </div>

  <footer>
    saved locally in your browser — your list survives refreshes.<br>
    dependencies: <span class="ok">0</span> · crumb-related dependencies: <span class="ok">0</span> · vibes: plenty
  </footer>
</main>

<script>
(function(){
  'use strict';
  const KEY = 'crumbless-v1';
  const list = document.getElementById('list');
  const empty = document.getElementById('empty');
  const count = document.getElementById('count');
  const form = document.getElementById('addForm');
  const input = document.getElementById('newTask');
  const sweepBtn = document.getElementById('sweepBtn');
  const chips = Array.from(document.querySelectorAll('.chip'));

  let tasks = [];
  let filter = 'all';
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) tasks = JSON.parse(raw).filter(t => t && typeof t.text === 'string');
  } catch (e) { tasks = []; }

  function save(){
    try { localStorage.setItem(KEY, JSON.stringify(tasks)); }
    catch (e) { count.textContent = 'storage full — changes may not persist'; }
  }

  function visible(){
    if (filter === 'active') return tasks.filter(t => !t.done);
    if (filter === 'done') return tasks.filter(t => t.done);
    return tasks;
  }

  function render(entering){
    list.innerHTML = '';
    const vis = visible();
    for (const t of vis){
      const li = document.createElement('li');
      li.className = 'task' + (t.done ? ' done' : '') + (entering === t.id ? ' entering' : '');
      li.dataset.id = t.id;

      const check = document.createElement('button');
      check.type = 'button';
      check.className = 'check';
      check.setAttribute('aria-pressed', t.done ? 'true' : 'false');
      check.setAttribute('aria-label', (t.done ? 'Mark not done: ' : 'Mark done: ') + t.text);
      const box = document.createElement('span');
      box.className = 'box';
      box.setAttribute('aria-hidden', 'true');
      box.textContent = '✓';
      check.appendChild(box);
      check.addEventListener('click', () => toggle(t.id));

      const label = document.createElement('span');
      label.className = 'task-label';
      label.textContent = t.text;

      const del = document.createElement('button');
      del.type = 'button';
      del.className = 'del';
      del.setAttribute('aria-label', 'Delete task: ' + t.text);
      del.textContent = '×';
      del.addEventListener('click', () => remove(t.id));

      li.append(check, label, del);
      list.appendChild(li);
    }
    empty.hidden = vis.length > 0;
    const open = tasks.filter(t => !t.done).length;
    const doneN = tasks.length - open;
    count.textContent = tasks.length === 0 ? 'nothing to do' :
      open + ' to do · ' + doneN + ' done';
    sweepBtn.disabled = doneN === 0;
  }

  function toggle(id){
    const t = tasks.find(t => t.id === id);
    if (!t) return;
    t.done = !t.done;
    save();
    render();
  }

  function remove(id){
    const el = list.querySelector('[data-id="' + id + '"]');
    tasks = tasks.filter(t => t.id !== id);
    save();
    if (el){
      el.classList.add('leaving');
      setTimeout(render, 220);
    } else render();
  }

  form.addEventListener('submit', e => {
    e.preventDefault();
    const text = input.value.trim();
    if (!text) return;
    const t = { id: 't' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7), text: text, done: false };
    tasks.unshift(t);
    save();
    input.value = '';
    render(t.id);
    input.focus();
  });

  sweepBtn.addEventListener('click', () => {
    const doomed = Array.from(list.querySelectorAll('li.done'));
    tasks = tasks.filter(t => !t.done);
    save();
    if (doomed.length){
      doomed.forEach((el, i) => {
        el.style.transitionDelay = (i * 40) + 'ms';
        el.classList.add('leaving');
      });
      setTimeout(render, 240 + doomed.length * 40);
    } else render();
  });

  chips.forEach(chip => {
    chip.addEventListener('click', () => {
      filter = chip.dataset.filter;
      chips.forEach(c => c.setAttribute('aria-pressed', c === chip ? 'true' : 'false'));
      render();
    });
  });

  render();
})();
</script>
</body>
</html>
