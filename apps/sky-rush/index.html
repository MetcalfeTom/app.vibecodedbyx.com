<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sky Rush — Rainbow Ring Racer</title>
<link rel="icon" href="https://emojicdn.elk.sh/✈️">
<meta property="og:title" content="Sky Rush">
<meta property="og:description" content="Fly through rainbow rings and dodge storm clouds at breakneck speed.">
<meta property="og:url" content="https://app.sloppy.live/sky-rush/">
<meta property="og:image" content="https://emojicdn.elk.sh/✈️?style=google">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Share Tech Mono',monospace}
canvas{display:block}
.hud{position:fixed;top:0;left:0;width:100%;padding:10px 16px;display:flex;justify-content:space-between;align-items:flex-start;z-index:5;pointer-events:none}
.hud-left,.hud-right{display:flex;flex-direction:column;gap:2px}
.hud-val{font-family:'Orbitron',sans-serif;font-size:clamp(18px,4vw,28px);font-weight:900;color:#fff;text-shadow:0 0 10px rgba(255,255,255,0.3)}
.hud-label{font-size:9px;color:rgba(255,255,255,0.4);letter-spacing:2px}
.hud-right{text-align:right}
.speed-bar{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);width:200px;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;z-index:5}
.speed-fill{height:100%;border-radius:3px;transition:width 0.1s;background:linear-gradient(90deg,#22dd88,#ffcc00,#ff4444)}
.combo{position:fixed;top:50%;left:50%;transform:translate(-50%,-80px);font-family:'Orbitron',sans-serif;font-size:clamp(24px,5vw,40px);font-weight:900;color:#ffcc00;text-shadow:0 0 20px rgba(255,204,0,0.6);z-index:5;pointer-events:none;opacity:0;transition:opacity 0.3s}
.combo.show{opacity:1}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;z-index:10;background:rgba(0,0,0,0.6)}
.overlay.hidden{display:none}
.overlay-box{text-align:center;font-family:'Orbitron',sans-serif}
.overlay-box h2{font-size:clamp(24px,6vw,48px);font-weight:900;color:#fff;margin-bottom:8px;letter-spacing:2px}
.overlay-box p{font-family:'Share Tech Mono',monospace;font-size:14px;color:#aaa;margin-bottom:6px}
.overlay-box button{font-family:'Orbitron',sans-serif;font-weight:700;font-size:14px;background:linear-gradient(135deg,#ff4488,#ffcc00,#22dd88,#4488ff);color:#000;border:none;padding:12px 28px;cursor:pointer;border-radius:6px;margin-top:12px;letter-spacing:1px}
.overlay-box button:hover{filter:brightness(1.2)}
.mobile-controls{position:fixed;bottom:40px;left:0;width:100%;display:flex;justify-content:space-between;padding:0 20px;z-index:5;pointer-events:none}
.mobile-controls button{pointer-events:auto;width:60px;height:60px;border-radius:50%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.5);font-size:24px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.mobile-controls button:active{background:rgba(255,255,255,0.2)}
@media(min-width:768px){.mobile-controls{display:none}}
a</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="hud">
<div class="hud-left">
<div class="hud-val" id="scoreVal">0</div>
<div class="hud-label">SCORE</div>
</div>
<div class="hud-right">
<div class="hud-val" id="ringsVal">0</div>
<div class="hud-label">RINGS</div>
</div>
</div>
<div class="speed-bar"><div class="speed-fill" id="speedFill" style="width:30%"></div></div>
<div class="combo" id="combo">x2 COMBO!</div>
<div class="mobile-controls">
<button ontouchstart="mobileDir=-1" ontouchend="mobileDir=0">◄</button>
<button ontouchstart="mobileDir=1" ontouchend="mobileDir=0">►</button>
</div>
<div class="overlay" id="startOverlay">
<div class="overlay-box">
<h2>SKY RUSH</h2>
<p>Fly through rainbow rings<br>Dodge storm clouds<br>Arrow keys / A-D / Tilt</p>
<button onclick="startGame()">FLY</button>
</div>
</div>
<div class="overlay hidden" id="gameOverOverlay">
<div class="overlay-box">
<h2>CRASHED</h2>
<p id="goScore">Score: 0 — Rings: 0</p>
<button onclick="startGame()">RETRY</button>
</div>
</div>

<script>
const C=document.getElementById('c');
const ctx=C.getContext('2d');
let W,H;
function resize(){W=C.width=window.innerWidth;H=C.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

let mobileDir=0;
let frame=0,gameState='menu',score=0,rings=0,combo=0,comboTimer=0;
let speed=4,maxSpeed=12,baseSpeed=4;
let playerX=0,playerY=0,playerTilt=0;
let obstacles=[],ringObjs=[],clouds=[],stars=[],particles=[];
let shakeX=0,shakeY=0,shakeInt=0;
let invincible=0;

// Audio
let audioCtx;
function ensureAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playRing(){const c=ensureAudio(),n=c.currentTime;[880,1100,1320].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0.05,n+i*0.04);g.gain.linearRampToValueAtTime(0,n+i*0.04+0.1);o.connect(g);g.connect(c.destination);o.start(n+i*0.04);o.stop(n+i*0.04+0.1);});}
function playCombo(){const c=ensureAudio(),n=c.currentTime;[1320,1760,2200].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='triangle';o.frequency.value=f;g.gain.setValueAtTime(0.04,n+i*0.05);g.gain.linearRampToValueAtTime(0,n+i*0.05+0.12);o.connect(g);g.connect(c.destination);o.start(n+i*0.05);o.stop(n+i*0.05+0.12);});}
function playCrash(){const c=ensureAudio(),n=c.currentTime;const buf=c.createBuffer(1,c.sampleRate*0.4,c.sampleRate);const d=buf.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(c.sampleRate*0.1));const s=c.createBufferSource(),g=c.createGain();s.buffer=buf;g.gain.setValueAtTime(0.15,n);s.connect(g);g.connect(c.destination);s.start(n);}
function playBoost(){const c=ensureAudio(),n=c.currentTime;const o=c.createOscillator(),g=c.createGain();o.type='sawtooth';o.frequency.setValueAtTime(200,n);o.frequency.exponentialRampToValueAtTime(800,n+0.2);g.gain.setValueAtTime(0.04,n);g.gain.linearRampToValueAtTime(0,n+0.25);o.connect(g);g.connect(c.destination);o.start(n);o.stop(n+0.25);}

// Init
function initStars(){stars=[];for(let i=0;i<80;i++)stars.push({x:Math.random()*W,y:Math.random()*H,s:0.5+Math.random()*1.5,spd:0.5+Math.random()*2});}
initStars();

function startGame(){
  document.getElementById('startOverlay').classList.add('hidden');
  document.getElementById('gameOverOverlay').classList.add('hidden');
  gameState='playing';score=0;rings=0;combo=0;comboTimer=0;
  speed=baseSpeed;playerX=W/2;playerY=H*0.75;playerTilt=0;
  obstacles=[];ringObjs=[];particles=[];invincible=0;frame=0;
}

// Spawning
function spawnRing(){
  const hue=(frame*2)%360;
  ringObjs.push({
    x:100+Math.random()*(W-200),
    y:-60,
    radius:35+Math.random()*20,
    hue,
    passed:false
  });
}
function spawnCloud(){
  obstacles.push({
    x:50+Math.random()*(W-100),
    y:-80,
    w:60+Math.random()*80,
    h:30+Math.random()*40,
    type:'cloud',
    flash:0
  });
}
function spawnLightning(){
  obstacles.push({
    x:80+Math.random()*(W-160),
    y:-120,
    w:20,
    h:80+Math.random()*60,
    type:'lightning',
    life:40,
    segments:[]
  });
  // Generate zigzag
  const o=obstacles[obstacles.length-1];
  let cx=o.x+o.w/2,cy=o.y;
  for(let i=0;i<6;i++){
    const nx=cx+(Math.random()-0.5)*40;
    const ny=cy+o.h/6;
    o.segments.push({x1:cx,y1:cy,x2:nx,y2:ny});
    cx=nx;cy=ny;
  }
}

// Input
let keys={};
document.addEventListener('keydown',e=>{keys[e.key]=true;});
document.addEventListener('keyup',e=>{keys[e.key]=false;});

function update(){
  if(gameState!=='playing')return;
  frame++;

  // Speed increases over time
  speed=Math.min(maxSpeed,baseSpeed+frame*0.002);

  // Input
  let moveX=0;
  if(keys.ArrowLeft||keys.a)moveX=-1;
  if(keys.ArrowRight||keys.d)moveX=1;
  if(mobileDir)moveX=mobileDir;
  playerX+=moveX*6;
  playerTilt+=(moveX*0.3-playerTilt)*0.15;
  playerX=Math.max(30,Math.min(W-30,playerX));

  if(invincible>0)invincible--;

  // Spawn
  if(frame%Math.max(15,50-Math.floor(speed*2))===0)spawnRing();
  if(frame%Math.max(20,70-Math.floor(speed*3))===0)spawnCloud();
  if(frame%200===0&&speed>6)spawnLightning();

  // Move objects
  ringObjs.forEach(r=>{r.y+=speed;});
  obstacles.forEach(o=>{o.y+=speed*(o.type==='lightning'?1.2:0.9);if(o.type==='lightning')o.life--;o.segments&&o.segments.forEach(s=>{s.y1+=speed*1.2;s.y2+=speed*1.2;});});

  // Ring collision
  ringObjs.forEach(r=>{
    if(r.passed)return;
    const dx=playerX-r.x,dy=playerY-r.y;
    const dist=Math.hypot(dx,dy);
    if(dist<r.radius+15&&Math.abs(dy)<30){
      r.passed=true;
      rings++;
      combo++;
      comboTimer=90;
      const mult=Math.min(combo,5);
      score+=100*mult;
      speed=Math.min(maxSpeed,speed+0.3);
      playRing();
      if(combo>=3)playCombo();
      // Ring burst particles
      for(let i=0;i<12;i++){
        const a=Math.PI*2*i/12;
        particles.push({x:r.x,y:r.y,vx:Math.cos(a)*3,vy:Math.sin(a)*3-1,life:25,maxLife:25,hue:r.hue,size:3});
      }
    }
  });

  // Cloud collision
  obstacles.forEach(o=>{
    if(o.type==='cloud'){
      const cx=o.x+o.w/2,cy=o.y+o.h/2;
      if(Math.abs(playerX-cx)<o.w/2+12&&Math.abs(playerY-cy)<o.h/2+10){
        if(invincible<=0){crash();}
      }
    }
    if(o.type==='lightning'&&o.life>0){
      o.segments&&o.segments.forEach(s=>{
        const midX=(s.x1+s.x2)/2,midY=(s.y1+s.y2)/2;
        if(Math.abs(playerX-midX)<20&&Math.abs(playerY-midY)<25){
          if(invincible<=0)crash();
        }
      });
    }
  });

  // Combo timer
  if(comboTimer>0){comboTimer--;if(comboTimer<=0)combo=0;}

  // Particles
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.05;p.life--;});
  particles=particles.filter(p=>p.life>0);

  // Cleanup
  ringObjs=ringObjs.filter(r=>r.y<H+100);
  obstacles=obstacles.filter(o=>o.y<H+100&&(o.type!=='lightning'||o.life>-20));

  // Stars
  stars.forEach(s=>{s.y+=s.spd*speed*0.3;if(s.y>H){s.y=0;s.x=Math.random()*W;}});

  // Shake
  if(shakeInt>0){shakeX=(Math.random()-0.5)*shakeInt;shakeY=(Math.random()-0.5)*shakeInt;shakeInt*=0.85;}else{shakeX=shakeY=0;}

  // Score from distance
  if(frame%6===0)score++;

  // HUD
  document.getElementById('scoreVal').textContent=score;
  document.getElementById('ringsVal').textContent=rings;
  document.getElementById('speedFill').style.width=((speed-baseSpeed)/(maxSpeed-baseSpeed)*100)+'%';
  const comboEl=document.getElementById('combo');
  if(combo>=2&&comboTimer>0){comboEl.textContent='x'+combo+' COMBO!';comboEl.classList.add('show');}else{comboEl.classList.remove('show');}
}

function crash(){
  playCrash();
  shakeInt=15;
  invincible=60;
  speed=Math.max(baseSpeed,speed-2);
  combo=0;comboTimer=0;
  // Smoke particles
  for(let i=0;i<15;i++){
    particles.push({x:playerX,y:playerY,vx:(Math.random()-0.5)*4,vy:(Math.random()-0.5)*4-2,life:30,maxLife:30,hue:0,size:4,smoke:true});
  }
  score=Math.max(0,score-50);
  // 3 strikes = game over (using health system)
  // Actually let's keep it arcade — just penalty, no game over for more fun
}

function drawPlayer(){
  ctx.save();
  ctx.translate(playerX,playerY);
  ctx.rotate(playerTilt);
  const flash=invincible>0&&frame%4<2;

  // Trail
  ctx.globalAlpha=0.15;
  ctx.fillStyle='#88ccff';
  ctx.beginPath();
  ctx.moveTo(-8,12);ctx.lineTo(0,40+speed*3);ctx.lineTo(8,12);
  ctx.fill();
  ctx.globalAlpha=0.08;
  ctx.fillStyle='#ffcc00';
  ctx.beginPath();
  ctx.moveTo(-4,14);ctx.lineTo(0,30+speed*2);ctx.lineTo(4,14);
  ctx.fill();
  ctx.globalAlpha=1;

  if(flash){ctx.globalAlpha=0.4;}

  // Body — sleek jet
  ctx.fillStyle='#ddeeff';
  ctx.shadowColor='#88ccff';ctx.shadowBlur=12;
  ctx.beginPath();
  ctx.moveTo(0,-18);
  ctx.lineTo(-6,-4);ctx.lineTo(-14,10);ctx.lineTo(-6,14);
  ctx.lineTo(0,10);
  ctx.lineTo(6,14);ctx.lineTo(14,10);ctx.lineTo(6,-4);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur=0;

  // Cockpit
  ctx.fillStyle='#44aaff';
  ctx.beginPath();ctx.ellipse(0,-8,3,5,0,0,Math.PI*2);ctx.fill();

  // Wing stripes
  ctx.fillStyle='#ff4488';
  ctx.fillRect(-13,8,8,2);
  ctx.fillRect(5,8,8,2);

  // Engine glow
  ctx.fillStyle='#ffaa22';
  ctx.shadowColor='#ff8800';ctx.shadowBlur=8;
  ctx.beginPath();ctx.ellipse(0,14,3,2+Math.sin(frame*0.3),0,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;

  ctx.globalAlpha=1;
  ctx.restore();
}

function drawRing(r){
  const a=r.passed?0.2:1;
  ctx.save();
  ctx.globalAlpha=a;
  ctx.translate(r.x,r.y);

  // Rainbow ring
  const colors=6;
  for(let i=colors;i>=0;i--){
    ctx.beginPath();
    ctx.ellipse(0,0,r.radius+i*2,r.radius*0.35+i,0,0,Math.PI*2);
    ctx.strokeStyle=`hsla(${r.hue+i*30},90%,60%,${a*(0.3+i*0.1)})`;
    ctx.lineWidth=3;
    ctx.shadowColor=`hsla(${r.hue+i*30},90%,60%,0.5)`;
    ctx.shadowBlur=8;
    ctx.stroke();
  }
  ctx.shadowBlur=0;

  // Inner glow
  ctx.beginPath();
  ctx.ellipse(0,0,r.radius-4,r.radius*0.3,0,0,Math.PI*2);
  ctx.fillStyle=`hsla(${r.hue},80%,80%,${a*0.05})`;
  ctx.fill();

  ctx.globalAlpha=1;
  ctx.restore();
}

function drawCloud(o){
  ctx.save();
  ctx.translate(o.x,o.y);

  // Dark storm cloud
  const cw=o.w,ch=o.h;
  ctx.fillStyle='#1a1828';
  ctx.shadowColor='#443366';ctx.shadowBlur=15;

  // Multiple ellipses for puffy shape
  ctx.beginPath();
  ctx.ellipse(cw*0.3,ch*0.4,cw*0.35,ch*0.35,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cw*0.6,ch*0.35,cw*0.3,ch*0.4,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();
  ctx.ellipse(cw*0.45,ch*0.2,cw*0.25,ch*0.3,0,0,Math.PI*2);ctx.fill();
  // Bottom flat
  ctx.fillRect(cw*0.05,ch*0.4,cw*0.9,ch*0.2);

  ctx.shadowBlur=0;

  // Lightning flash inside cloud
  if(Math.random()<0.02){
    ctx.fillStyle='rgba(200,180,255,0.3)';
    ctx.fillRect(0,0,cw,ch);
  }

  // Angry eyes
  ctx.fillStyle='#aa66cc';
  ctx.shadowColor='#aa66cc';ctx.shadowBlur=4;
  ctx.beginPath();ctx.arc(cw*0.35,ch*0.35,3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(cw*0.6,ch*0.35,3,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  // Frown
  ctx.strokeStyle='#886699';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(cw*0.47,ch*0.6,8,0.3,Math.PI-0.3);ctx.stroke();

  ctx.restore();
}

function drawLightning(o){
  if(o.life<=0)return;
  const a=Math.min(1,o.life/10);
  ctx.save();
  ctx.globalAlpha=a;
  o.segments.forEach(s=>{
    ctx.beginPath();
    ctx.moveTo(s.x1,s.y1);
    ctx.lineTo(s.x2,s.y2);
    ctx.strokeStyle='#eeddff';
    ctx.lineWidth=3;
    ctx.shadowColor='#cc88ff';
    ctx.shadowBlur=15;
    ctx.stroke();
    // Thinner bright core
    ctx.strokeStyle='#fff';
    ctx.lineWidth=1;
    ctx.stroke();
  });
  ctx.shadowBlur=0;
  ctx.globalAlpha=1;
  ctx.restore();
}

function render(){
  ctx.save();
  ctx.translate(shakeX,shakeY);

  // Sky gradient
  const skyHue=(frame*0.2)%360;
  const grad=ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,`hsl(${220+Math.sin(frame*0.002)*20},40%,8%)`);
  grad.addColorStop(0.5,`hsl(${240+Math.sin(frame*0.003)*15},35%,12%)`);
  grad.addColorStop(1,`hsl(${260+Math.sin(frame*0.001)*10},30%,18%)`);
  ctx.fillStyle=grad;
  ctx.fillRect(-20,-20,W+40,H+40);

  // Stars
  stars.forEach(s=>{
    ctx.fillStyle=`rgba(255,255,255,${0.3+Math.sin(frame*0.02+s.x)*0.2})`;
    ctx.fillRect(s.x,s.y,s.s,s.s);
  });

  // Rings (behind player)
  ringObjs.forEach(drawRing);

  // Obstacles
  obstacles.forEach(o=>{
    if(o.type==='cloud')drawCloud(o);
    if(o.type==='lightning')drawLightning(o);
  });

  // Player
  drawPlayer();

  // Particles
  particles.forEach(p=>{
    const a=p.life/p.maxLife;
    if(p.smoke){
      ctx.beginPath();ctx.arc(p.x,p.y,p.size*(1+1-a),0,Math.PI*2);
      ctx.fillStyle=`rgba(80,70,90,${a*0.5})`;ctx.fill();
    }else{
      ctx.beginPath();ctx.arc(p.x,p.y,p.size*a,0,Math.PI*2);
      ctx.fillStyle=`hsla(${p.hue},90%,70%,${a})`;
      ctx.shadowColor=`hsla(${p.hue},90%,70%,0.5)`;ctx.shadowBlur=4;
      ctx.fill();ctx.shadowBlur=0;
    }
  });

  // Speed lines at high speed
  if(speed>7){
    const intensity=(speed-7)/(maxSpeed-7);
    ctx.strokeStyle=`rgba(255,255,255,${intensity*0.06})`;
    ctx.lineWidth=1;
    for(let i=0;i<5;i++){
      const lx=Math.random()*W;
      ctx.beginPath();ctx.moveTo(lx,0);ctx.lineTo(lx+(Math.random()-0.5)*10,H);ctx.stroke();
    }
  }

  ctx.restore();
}

function loop(){
  update();
  render();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
