<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Neon Sand</title>
<link rel="icon" href="https://emojicdn.elk.sh/✨">
<meta property="og:title" content="Neon Sand">
<meta property="og:description" content="Falling sand physics sandbox with glowing neon particles. Pour sand, water, lava, and watch them interact.">
<meta property="og:url" content="https://sloppy.live/neon-sand/">
<meta property="og:image" content="https://sloppy.live/neon-sand/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06060c;--bar:#0a0b14;--border:rgba(255,100,200,0.12);--dim:rgba(255,255,255,0.4);--text:#dde;--accent:#ff66cc}
html,body{width:100%;height:100dvh;overflow:hidden;background:var(--bg);font-family:'Chakra Petch',sans-serif;color:var(--text);touch-action:none;user-select:none;-webkit-user-select:none}
#wrap{display:flex;flex-direction:column;height:100dvh}
canvas{flex:1;display:block;cursor:crosshair;image-rendering:pixelated}
#bar{display:flex;align-items:center;gap:4px;padding:6px 8px;background:var(--bar);border-top:1px solid var(--border);flex-wrap:wrap;justify-content:center;padding-bottom:calc(6px + env(safe-area-inset-bottom))}
.mat-btn{font-family:'Share Tech Mono',monospace;font-size:12px;border:1px solid var(--border);border-radius:5px;padding:5px 10px;cursor:pointer;transition:all .15s;-webkit-tap-highlight-color:transparent;background:rgba(255,255,255,0.03);color:var(--dim);position:relative;overflow:hidden}
.mat-btn:hover{background:rgba(255,255,255,0.06)}
.mat-btn.active{border-width:2px}
.mat-btn .dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:4px;vertical-align:middle}
#bar .sep{width:1px;height:22px;background:var(--border)}
#size-wrap{display:flex;align-items:center;gap:4px;font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--dim)}
#brush-size{width:50px;height:3px;-webkit-appearance:none;appearance:none;background:rgba(255,100,200,0.15);border-radius:2px;outline:none}
#brush-size::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:var(--accent);cursor:pointer}
#clear-btn{font-family:'Share Tech Mono',monospace;font-size:11px;background:rgba(255,50,80,0.08);border:1px solid rgba(255,50,80,0.2);border-radius:5px;color:#ff4466;padding:4px 10px;cursor:pointer}
</style>
</head>
<body>
<div id="wrap">
<canvas id="cv"></canvas>
<div id="bar">
  <button class="mat-btn active" data-m="1"><span class="dot" style="background:#ffcc44"></span>SAND</button>
  <button class="mat-btn" data-m="2"><span class="dot" style="background:#44ccff"></span>WATER</button>
  <button class="mat-btn" data-m="3"><span class="dot" style="background:#ff4422"></span>LAVA</button>
  <button class="mat-btn" data-m="4"><span class="dot" style="background:#888"></span>STONE</button>
  <button class="mat-btn" data-m="5"><span class="dot" style="background:#44ff88"></span>ACID</button>
  <button class="mat-btn" data-m="6"><span class="dot" style="background:#cc88ff"></span>GAS</button>
  <button class="mat-btn" data-m="7"><span class="dot" style="background:#ff8844"></span>FIRE</button>
  <button class="mat-btn" data-m="0"><span class="dot" style="background:#222"></span>ERASE</button>
  <div class="sep"></div>
  <div id="size-wrap">
    SIZE<input type="range" id="brush-size" min="1" max="12" value="3">
  </div>
  <div class="sep"></div>
  <button id="clear-btn">CLEAR</button>
</div>
</div>
<script>
var CV=document.getElementById('cv'),X=CV.getContext('2d');
var PX=3; // pixel scale
var W,H; // grid dimensions
var grid,nextGrid;
var imgData;

// Materials: 0=empty,1=sand,2=water,3=lava,4=stone,5=acid,6=gas,7=fire
var MAT={EMPTY:0,SAND:1,WATER:2,LAVA:3,STONE:4,ACID:5,GAS:6,FIRE:7};
var selectedMat=1;
var brushSize=3;
var painting=false;
var mouseX=0,mouseY=0;

// Material colors with variation
function matColor(m,x,y){
  var v=((x*7+y*13)&15)/15; // deterministic variation
  switch(m){
    case 1: // sand
      var r=220+Math.floor(v*35),g=180+Math.floor(v*30),b=40+Math.floor(v*30);
      return [r,g,b];
    case 2: // water
      return [30+Math.floor(v*20),160+Math.floor(v*40),240+Math.floor(v*15)];
    case 3: // lava
      var f=Math.random();
      return [200+Math.floor(f*55),30+Math.floor(f*60+v*40),5+Math.floor(v*20)];
    case 4: // stone
      var g2=90+Math.floor(v*40);
      return [g2,g2,g2+Math.floor(v*10)];
    case 5: // acid
      return [30+Math.floor(v*30),220+Math.floor(v*35),80+Math.floor(v*40)];
    case 6: // gas
      return [160+Math.floor(v*40),100+Math.floor(v*40),220+Math.floor(v*35)];
    case 7: // fire
      var f2=Math.random();
      return [240+Math.floor(f2*15),100+Math.floor(f2*120),10+Math.floor(f2*30)];
    default: return [6,6,12];
  }
}

function resize(){
  var barH=document.getElementById('bar').offsetHeight||60;
  CV.width=window.innerWidth;
  CV.height=window.innerHeight-barH;
  var newW=Math.floor(CV.width/PX);
  var newH=Math.floor(CV.height/PX);
  var oldGrid=grid;
  var oldW=W||0,oldH=H||0;
  W=newW;H=newH;
  grid=new Uint8Array(W*H);
  nextGrid=new Uint8Array(W*H);
  if(oldGrid){
    for(var y=0;y<Math.min(oldH,H);y++){
      for(var x=0;x<Math.min(oldW,W);x++){
        grid[y*W+x]=oldGrid[y*oldW+x];
      }
    }
  }
  imgData=X.createImageData(W,H);
}
resize();
window.addEventListener('resize',resize);

function get(x,y){return(x>=0&&x<W&&y>=0&&y<H)?grid[y*W+x]:-1;}
function set(x,y,v){if(x>=0&&x<W&&y>=0&&y<H)grid[y*W+x]=v;}
function nget(x,y){return(x>=0&&x<W&&y>=0&&y<H)?nextGrid[y*W+x]:-1;}
function nset(x,y,v){if(x>=0&&x<W&&y>=0&&y<H)nextGrid[y*W+x]=v;}
function isEmpty(x,y){var v=get(x,y);return v===0;}
function isLiquid(x,y){var v=get(x,y);return v===2||v===5;}
function swap(x1,y1,x2,y2){
  var a=grid[y1*W+x1],b=grid[y2*W+x2];
  grid[y1*W+x1]=b;grid[y2*W+x2]=a;
}

function simulate(){
  // Process bottom-to-top so gravity works in one pass
  // Alternate left-right scan direction for natural spreading
  var leftFirst=Math.random()<0.5;
  for(var y=H-1;y>=0;y--){
    var startX=leftFirst?0:W-1;
    var endX=leftFirst?W:-1;
    var dx=leftFirst?1:-1;
    for(var x=startX;x!==endX;x+=dx){
      var m=grid[y*W+x];
      if(m===0) continue;

      if(m===MAT.SAND){
        if(y<H-1&&(isEmpty(x,y+1)||isLiquid(x,y+1))){
          swap(x,y,x,y+1);
        }else{
          var side=Math.random()<0.5?-1:1;
          if(y<H-1&&x+side>=0&&x+side<W&&(isEmpty(x+side,y+1)||isLiquid(x+side,y+1))){
            swap(x,y,x+side,y+1);
          }else if(y<H-1&&x-side>=0&&x-side<W&&(isEmpty(x-side,y+1)||isLiquid(x-side,y+1))){
            swap(x,y,x-side,y+1);
          }
        }
      }
      else if(m===MAT.WATER){
        if(y<H-1&&isEmpty(x,y+1)){
          swap(x,y,x,y+1);
        }else{
          var side=Math.random()<0.5?-1:1;
          if(y<H-1&&x+side>=0&&x+side<W&&isEmpty(x+side,y+1)){
            swap(x,y,x+side,y+1);
          }else if(y<H-1&&x-side>=0&&x-side<W&&isEmpty(x-side,y+1)){
            swap(x,y,x-side,y+1);
          }else{
            // Spread sideways
            var spread=Math.floor(Math.random()*3)+1;
            for(var s=0;s<spread;s++){
              if(x+side>=0&&x+side<W&&isEmpty(x+side,y)){
                swap(x,y,x+side,y);x+=side;
              }else break;
            }
          }
        }
      }
      else if(m===MAT.LAVA){
        // Lava: slow, heavy liquid; ignites nearby, turns water to stone
        if(Math.random()<0.7&&y<H-1&&(isEmpty(x,y+1)||get(x,y+1)===MAT.WATER)){
          if(get(x,y+1)===MAT.WATER){set(x,y+1,MAT.STONE);set(x,y,MAT.STONE);continue;}
          swap(x,y,x,y+1);
        }else{
          var side=Math.random()<0.5?-1:1;
          if(Math.random()<0.3&&x+side>=0&&x+side<W){
            var nb=get(x+side,y);
            if(nb===0){swap(x,y,x+side,y);}
            else if(nb===MAT.WATER){set(x+side,y,MAT.STONE);set(x,y,MAT.STONE);}
          }
        }
        // Ignite: spawn fire above
        if(Math.random()<0.03&&y>0&&isEmpty(x,y-1)) set(x,y-1,MAT.FIRE);
        // Melt adjacent sand
        for(var dd=-1;dd<=1;dd+=2){
          if(Math.random()<0.01&&x+dd>=0&&x+dd<W&&get(x+dd,y)===MAT.SAND) set(x+dd,y,MAT.LAVA);
        }
      }
      else if(m===MAT.ACID){
        // Acid: liquid that dissolves everything except stone slowly
        if(y<H-1&&isEmpty(x,y+1)){
          swap(x,y,x,y+1);
        }else if(y<H-1){
          var below=get(x,y+1);
          if(below>0&&below!==MAT.ACID&&below!==MAT.STONE){
            if(Math.random()<0.15){set(x,y+1,MAT.EMPTY);set(x,y,MAT.EMPTY);continue;}
          }
          var side=Math.random()<0.5?-1:1;
          if(x+side>=0&&x+side<W&&isEmpty(x+side,y)){
            swap(x,y,x+side,y);
          }
        }
        // Dissolve adjacent
        for(var dd=-1;dd<=1;dd+=2){
          if(Math.random()<0.02){
            var nb=get(x+dd,y);
            if(nb>0&&nb!==MAT.ACID&&nb!==MAT.STONE){set(x+dd,y,MAT.EMPTY);if(Math.random()<0.3)set(x,y,MAT.EMPTY);}
          }
        }
      }
      else if(m===MAT.GAS){
        // Gas: rises, spreads
        if(y>0&&isEmpty(x,y-1)){
          swap(x,y,x,y-1);
        }else{
          var side=Math.random()<0.5?-1:1;
          if(y>0&&x+side>=0&&x+side<W&&isEmpty(x+side,y-1)){
            swap(x,y,x+side,y-1);
          }else if(x+side>=0&&x+side<W&&isEmpty(x+side,y)){
            swap(x,y,x+side,y);
          }
        }
        // Dissipate slowly
        if(Math.random()<0.002) set(x,y,MAT.EMPTY);
        // Fire ignites gas
        for(var dy2=-1;dy2<=1;dy2++){
          for(var dx2=-1;dx2<=1;dx2++){
            if(get(x+dx2,y+dy2)===MAT.FIRE){set(x,y,MAT.FIRE);break;}
          }
        }
      }
      else if(m===MAT.FIRE){
        // Fire: rises briefly, dies
        if(Math.random()<0.08){set(x,y,MAT.EMPTY);continue;}
        if(y>0&&isEmpty(x,y-1)&&Math.random()<0.6){
          swap(x,y,x,y-1);
        }else{
          var side=Math.random()<0.5?-1:1;
          if(y>0&&x+side>=0&&x+side<W&&isEmpty(x+side,y-1)){
            swap(x,y,x+side,y-1);
          }
        }
        // Spread to gas
        for(var dy3=-1;dy3<=1;dy3++){
          for(var dx3=-1;dx3<=1;dx3++){
            if(Math.random()<0.3&&get(x+dx3,y+dy3)===MAT.GAS) set(x+dx3,y+dy3,MAT.FIRE);
          }
        }
      }
      // Stone: static, no movement
    }
  }
}

function render(){
  var d=imgData.data;
  for(var y=0;y<H;y++){
    for(var x=0;x<W;x++){
      var m=grid[y*W+x];
      var i=(y*W+x)*4;
      if(m===0){
        d[i]=6;d[i+1]=6;d[i+2]=12;d[i+3]=255;
      }else{
        var c=matColor(m,x,y);
        d[i]=c[0];d[i+1]=c[1];d[i+2]=c[2];d[i+3]=255;
      }
    }
  }
  // Put at 1:1 then scale
  var tmpCv=document.createElement('canvas');
  tmpCv.width=W;tmpCv.height=H;
  tmpCv.getContext('2d').putImageData(imgData,0,0);
  X.imageSmoothingEnabled=false;
  X.drawImage(tmpCv,0,0,CV.width,CV.height);

  // Glow pass for lava and fire
  X.globalCompositeOperation='lighter';
  X.globalAlpha=0.06;
  X.drawImage(tmpCv,0,0,CV.width,CV.height);
  X.globalAlpha=1;
  X.globalCompositeOperation='source-over';
}

// --- PAINTING ---
function paintAt(px,py){
  var gx=Math.floor(px/PX);
  var gy=Math.floor(py/PX);
  var r=brushSize;
  for(var dy=-r;dy<=r;dy++){
    for(var dx=-r;dx<=r;dx++){
      if(dx*dx+dy*dy>r*r) continue;
      var nx=gx+dx,ny=gy+dy;
      if(nx<0||nx>=W||ny<0||ny>=H) continue;
      if(selectedMat===0){
        set(nx,ny,0);
      }else{
        if(get(nx,ny)===0){
          // Add slight randomness to not fill solid
          if(Math.random()<0.7) set(nx,ny,selectedMat);
        }
      }
    }
  }
}

CV.addEventListener('mousedown',function(e){painting=true;mouseX=e.offsetX;mouseY=e.offsetY;paintAt(mouseX,mouseY);});
CV.addEventListener('mousemove',function(e){mouseX=e.offsetX;mouseY=e.offsetY;if(painting)paintAt(mouseX,mouseY);});
document.addEventListener('mouseup',function(){painting=false;});

CV.addEventListener('touchstart',function(e){
  e.preventDefault();painting=true;
  var r=CV.getBoundingClientRect();
  mouseX=e.touches[0].clientX-r.left;mouseY=e.touches[0].clientY-r.top;
  paintAt(mouseX,mouseY);
},{passive:false});
CV.addEventListener('touchmove',function(e){
  e.preventDefault();
  var r=CV.getBoundingClientRect();
  mouseX=e.touches[0].clientX-r.left;mouseY=e.touches[0].clientY-r.top;
  if(painting)paintAt(mouseX,mouseY);
},{passive:false});
CV.addEventListener('touchend',function(){painting=false;});

// --- TOOLBAR ---
var matBtns=document.querySelectorAll('.mat-btn');
function selectMat(m){
  selectedMat=m;
  matBtns.forEach(function(b){
    var bm=parseInt(b.dataset.m);
    b.classList.toggle('active',bm===m);
    if(bm===m){
      var dot=b.querySelector('.dot');
      if(dot) b.style.borderColor=dot.style.background;
    }else{
      b.style.borderColor='';
    }
  });
}
document.getElementById('bar').addEventListener('click',function(e){
  var btn=e.target.closest('.mat-btn');
  if(btn) selectMat(parseInt(btn.dataset.m));
});
selectMat(1);

document.getElementById('brush-size').addEventListener('input',function(){brushSize=parseInt(this.value);});
document.getElementById('clear-btn').addEventListener('click',function(){grid.fill(0);});

// --- LOOP ---
function loop(){
  simulate();
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
