<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PS2 System Menu</title>
<link rel="icon" href="https://emojicdn.elk.sh/🎮">
<meta property="og:title" content="PS2 System Menu">
<meta property="og:description" content="The iconic dark blue oscillating cubes and smoke — faithfully recreated in the browser">
<meta property="og:url" content="https://sloppy.live/ps2-menu">
<meta property="og:image" content="https://sloppy.live/ps2-menu/og-image.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:sans-serif}
canvas{display:block;width:100%;height:100%;position:fixed;top:0;left:0}
#ui{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
.menu-bar{position:absolute;bottom:0;left:0;width:100%;background:linear-gradient(180deg,transparent 0%,rgba(0,8,30,0.6) 30%,rgba(0,8,30,0.85) 100%);padding:40px 0 0}
.menu-items{display:flex;justify-content:center;gap:0;padding:0 20px 24px}
.menu-item{text-align:center;padding:12px 28px;color:rgba(160,190,255,0.5);font-size:13px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;pointer-events:auto;transition:color 0.3s,transform 0.3s;position:relative}
.menu-item:hover,.menu-item.active{color:rgba(200,220,255,0.95);transform:scale(1.05)}
.menu-item.active::after{content:'';position:absolute;bottom:4px;left:50%;transform:translateX(-50%);width:40px;height:2px;background:rgba(160,200,255,0.5)}
.menu-label{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(120,160,255,0.08);font-size:clamp(60px,15vw,160px);font-weight:100;letter-spacing:20px;text-transform:uppercase;white-space:nowrap;user-select:none}
.top-bar{position:absolute;top:0;left:0;width:100%;display:flex;justify-content:space-between;padding:16px 24px;color:rgba(140,170,230,0.4);font-size:11px;letter-spacing:1px}
.back-link{position:fixed;top:8px;left:8px;color:rgba(140,170,230,0.3);font-size:10px;text-decoration:none;z-index:100;pointer-events:auto}
.back-link:hover{color:rgba(200,220,255,0.7)}
@media(max-width:600px){
  .menu-item{padding:10px 14px;font-size:10px;letter-spacing:1px}
  .top-bar{padding:10px 14px;font-size:9px}
}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div id="ui">
  <a class="back-link" href="https://sloppy.live">← sloppy.live</a>
  <div class="top-bar">
    <span id="clock"></span>
    <span>Version 2.50</span>
  </div>
  <div class="menu-label">PlayStation</div>
  <div class="menu-bar">
    <div class="menu-items">
      <div class="menu-item active" onclick="selectMenu(this)">Browser</div>
      <div class="menu-item" onclick="selectMenu(this)">System</div>
      <div class="menu-item" onclick="selectMenu(this)">Configuration</div>
    </div>
  </div>
</div>
<script>
var C=document.getElementById('cv'),G=C.getContext('2d');
var W,H;

function resize(){
  W=C.width=window.innerWidth;
  H=C.height=window.innerHeight;
}
window.addEventListener('resize',resize);
resize();

// Menu interaction
function selectMenu(el){
  document.querySelectorAll('.menu-item').forEach(function(m){m.classList.remove('active');});
  el.classList.add('active');
}

// Clock
function updateClock(){
  var d=new Date();
  var h=d.getHours(),m=d.getMinutes();
  document.getElementById('clock').textContent=
    (h<10?'0':'')+h+':'+(m<10?'0':'')+m+'  '+
    d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
}
setInterval(updateClock,10000);updateClock();

// === CUBE FIELD ===
// Generate a grid of small cubes that oscillate
var cubes=[];
var GRID_X=28,GRID_Z=20;
var SPACING=1.8;

for(var gz=0;gz<GRID_Z;gz++){
  for(var gx=0;gx<GRID_X;gx++){
    cubes.push({
      bx:(gx-GRID_X/2)*SPACING,
      bz:(gz-GRID_Z/2)*SPACING+2,
      by:0,
      phase:Math.sqrt((gx-GRID_X/2)*(gx-GRID_X/2)+(gz-GRID_Z/2)*(gz-GRID_Z/2))*0.4+Math.random()*0.5,
      size:0.32+Math.random()*0.12
    });
  }
}

// === SMOKE PARTICLES ===
var smoke=[];
var MAX_SMOKE=120;

function spawnSmoke(){
  if(smoke.length>=MAX_SMOKE)return;
  smoke.push({
    x:(Math.random()-0.5)*W*0.8,
    y:H*0.15+Math.random()*H*0.5,
    z:2+Math.random()*8,
    vx:(Math.random()-0.5)*0.3,
    vy:-0.15-Math.random()*0.3,
    size:40+Math.random()*100,
    alpha:0,
    maxAlpha:0.012+Math.random()*0.025,
    life:0,
    maxLife:300+Math.random()*400,
    phase:Math.random()*Math.PI*2
  });
}

// Pre-fill smoke
for(var i=0;i<60;i++){
  var s={
    x:(Math.random()-0.5)*W*0.8,
    y:Math.random()*H*0.7,
    z:2+Math.random()*8,
    vx:(Math.random()-0.5)*0.3,
    vy:-0.15-Math.random()*0.3,
    size:40+Math.random()*100,
    alpha:0.01+Math.random()*0.02,
    maxAlpha:0.012+Math.random()*0.025,
    life:100+Math.random()*200,
    maxLife:300+Math.random()*400,
    phase:Math.random()*Math.PI*2
  };
  smoke.push(s);
}

// === 3D PROJECTION ===
var camY=-2,camZ=-8;
var fov=300;

function project(x,y,z){
  var rz=z-camZ;
  if(rz<0.1)rz=0.1;
  var scale=fov/rz;
  return{
    sx:W/2+x*scale,
    sy:H*0.42+(y-camY)*scale,
    scale:scale
  };
}

// === CUBE DRAWING ===
// Isometric-ish cube faces
function drawCube(cx,cy,cz,size,t){
  // Oscillation
  var osc=Math.sin(t*0.8+cubes[0].phase)*0.1; // global gentle drift
  var ry=cy+Math.sin(t*1.2+Math.sqrt(cx*cx+cz*cz)*0.5)*0.4;

  var p=project(cx,ry,cz);
  if(p.sx<-50||p.sx>W+50||p.sy<-50||p.sy>H+50)return;

  var s=size*p.scale;
  if(s<1.5)return;

  var depth=(cz-camZ);
  var brightness=Math.max(0,Math.min(1,1-depth/25));

  // Top face (lightest)
  var topB=Math.floor(40+brightness*60);
  var topR=Math.floor(brightness*15);
  var topG=Math.floor(10+brightness*30);
  G.fillStyle='rgb('+topR+','+topG+','+topB+')';
  G.beginPath();
  G.moveTo(p.sx,p.sy-s*0.7);
  G.lineTo(p.sx+s*0.5,p.sy-s*0.35);
  G.lineTo(p.sx,p.sy);
  G.lineTo(p.sx-s*0.5,p.sy-s*0.35);
  G.closePath();
  G.fill();

  // Right face
  var rB=Math.floor(25+brightness*40);
  var rR2=Math.floor(brightness*8);
  var rG=Math.floor(5+brightness*18);
  G.fillStyle='rgb('+rR2+','+rG+','+rB+')';
  G.beginPath();
  G.moveTo(p.sx,p.sy);
  G.lineTo(p.sx+s*0.5,p.sy-s*0.35);
  G.lineTo(p.sx+s*0.5,p.sy+s*0.35);
  G.lineTo(p.sx,p.sy+s*0.7);
  G.closePath();
  G.fill();

  // Left face (darkest)
  var lB=Math.floor(15+brightness*28);
  var lR=Math.floor(brightness*4);
  var lG=Math.floor(2+brightness*10);
  G.fillStyle='rgb('+lR+','+lG+','+lB+')';
  G.beginPath();
  G.moveTo(p.sx,p.sy);
  G.lineTo(p.sx-s*0.5,p.sy-s*0.35);
  G.lineTo(p.sx-s*0.5,p.sy+s*0.35);
  G.lineTo(p.sx,p.sy+s*0.7);
  G.closePath();
  G.fill();

  // Edge highlights
  G.strokeStyle='rgba(80,130,220,'+brightness*0.15+')';
  G.lineWidth=0.5;
  G.beginPath();
  G.moveTo(p.sx,p.sy-s*0.7);
  G.lineTo(p.sx+s*0.5,p.sy-s*0.35);
  G.lineTo(p.sx,p.sy);
  G.lineTo(p.sx-s*0.5,p.sy-s*0.35);
  G.closePath();
  G.stroke();
}

// === MAIN LOOP ===
var lastTime=0;
function frame(ts){
  var t=ts*0.001;
  var dt=Math.min(0.05,t-lastTime);
  lastTime=t;

  // Background — very dark navy gradient
  var grad=G.createLinearGradient(0,0,0,H);
  grad.addColorStop(0,'#000612');
  grad.addColorStop(0.4,'#000a1e');
  grad.addColorStop(0.7,'#00081a');
  grad.addColorStop(1,'#000510');
  G.fillStyle=grad;
  G.fillRect(0,0,W,H);

  // Subtle radial glow at center
  var rg=G.createRadialGradient(W/2,H*0.4,0,W/2,H*0.4,Math.max(W,H)*0.6);
  rg.addColorStop(0,'rgba(15,30,80,0.2)');
  rg.addColorStop(0.5,'rgba(5,15,50,0.1)');
  rg.addColorStop(1,'transparent');
  G.fillStyle=rg;
  G.fillRect(0,0,W,H);

  // Draw smoke (behind cubes)
  for(var i=smoke.length-1;i>=0;i--){
    var s=smoke[i];
    s.life++;
    s.x+=s.vx+Math.sin(t*0.3+s.phase)*0.2;
    s.y+=s.vy;

    // Fade in, hold, fade out
    var lifeRatio=s.life/s.maxLife;
    if(lifeRatio<0.15)s.alpha=s.maxAlpha*(lifeRatio/0.15);
    else if(lifeRatio>0.7)s.alpha=s.maxAlpha*(1-(lifeRatio-0.7)/0.3);
    else s.alpha=s.maxAlpha;

    if(s.life>s.maxLife){smoke.splice(i,1);continue;}

    var sx=W/2+s.x;
    var sy=s.y;
    var sz=s.size*(0.8+lifeRatio*0.6);

    var sg=G.createRadialGradient(sx,sy,0,sx,sy,sz);
    sg.addColorStop(0,'rgba(20,40,100,'+s.alpha*1.5+')');
    sg.addColorStop(0.4,'rgba(10,25,70,'+s.alpha+')');
    sg.addColorStop(1,'rgba(5,10,40,0)');
    G.fillStyle=sg;
    G.fillRect(sx-sz,sy-sz,sz*2,sz*2);
  }

  // Spawn new smoke
  if(Math.random()<0.3)spawnSmoke();

  // Sort cubes by Z for painter's algo
  cubes.sort(function(a,b){return b.bz-a.bz;});

  // Draw cubes with wave oscillation
  for(var i=0;i<cubes.length;i++){
    var c=cubes[i];
    // Wave: each cube oscillates up/down based on position and time
    var wave1=Math.sin(t*0.9+c.phase)*0.5;
    var wave2=Math.sin(t*0.6+c.bx*0.3)*0.25;
    var wave3=Math.cos(t*0.4+c.bz*0.2)*0.2;
    c.by=wave1+wave2+wave3;

    drawCube(c.bx,c.by,c.bz,c.size,t);
  }

  // Draw smoke in front (closer particles)
  for(var i=0;i<smoke.length;i++){
    var s=smoke[i];
    if(s.z<4){
      var sx=W/2+s.x;
      var sy=s.y;
      var sz=s.size*0.5;
      var sg=G.createRadialGradient(sx,sy,0,sx,sy,sz);
      sg.addColorStop(0,'rgba(15,30,80,'+s.alpha*0.5+')');
      sg.addColorStop(1,'rgba(5,10,40,0)');
      G.fillStyle=sg;
      G.fillRect(sx-sz,sy-sz,sz*2,sz*2);
    }
  }

  // Subtle horizontal scanlines
  G.fillStyle='rgba(0,0,0,0.03)';
  for(var y=0;y<H;y+=3){
    G.fillRect(0,y,W,1);
  }

  // Very subtle vignette
  var vig=G.createRadialGradient(W/2,H/2,Math.min(W,H)*0.3,W/2,H/2,Math.max(W,H)*0.7);
  vig.addColorStop(0,'transparent');
  vig.addColorStop(1,'rgba(0,0,0,0.4)');
  G.fillStyle=vig;
  G.fillRect(0,0,W,H);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
