<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Neon City Bloxx</title>
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0625">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8F%99%EF%B8%8F">
<meta name="description" content="Drop blocks to stack a neon skyscraper. Perfect drops regen width. Toggle the optimization solver and watch it stack until the noise drift kills it.">
<meta property="og:title" content="Neon City Bloxx">
<meta property="og:description" content="Drop blocks to stack a neon skyscraper. Perfect drops regen width. Toggle the optimization solver and watch it stack until the noise drift kills it.">
<meta property="og:url" content="https://sloppy.live/neon-city-bloxx">
<meta property="og:image" content="https://image.pollinations.ai/prompt/neon%20synthwave%20skyscraper%20tower%20of%20glowing%20cyan%20magenta%20blocks%20stacked%20high%2C%20Nokia%20arcade%20game%2C%20city%20skyline%2C%20night%20sky?width=1200&height=630&model=flux&seed=2025&nologo=true">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Major+Mono+Display&family=Share+Tech+Mono&family=Rubik+Mono+One&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#070418;
    --void-2:#120832;
    --cyan:#5ce6ff;
    --magenta:#ff2bd6;
    --pink:#ff6ec0;
    --gold:#ffd454;
    --lime:#a5ff52;
    --violet:#9b5bff;
    --ink:#f4f0ff;
    --silver:#a3a8c2;
    --silver-dim:#5e637a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  html,body{height:100%;overflow:hidden;background:var(--void);color:var(--ink);font-family:'Share Tech Mono', monospace;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:none}
  body{
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(255,43,214,0.18), transparent 60%),
      radial-gradient(ellipse 70% 40% at 50% 100%, rgba(92,230,255,0.10), transparent 70%),
      var(--void);
    display:flex;flex-direction:column;align-items:center;
  }
  header{
    width:100%;text-align:center;padding:0.6rem 1rem 0.2rem;position:relative;z-index:2;pointer-events:none;
  }
  h1{
    font-family:'Audiowide', monospace;
    font-size:clamp(1.4rem, 3.4vw, 2.2rem);letter-spacing:0.08em;
    background:linear-gradient(180deg, var(--cyan), var(--magenta) 70%, var(--gold));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 8px rgba(255,43,214,0.4));line-height:1;
  }
  .tag{
    font-family:'Major Mono Display', monospace;font-size:clamp(0.6rem, 1.2vw, 0.8rem);
    letter-spacing:0.35em;color:var(--silver);margin-top:0.2rem;text-transform:lowercase;
  }
  main{
    flex:1;display:flex;align-items:center;justify-content:center;
    width:100%;padding:0.3rem 0.4rem 1rem;position:relative;
  }
  canvas{
    display:block;background:#02011a;
    border:1px solid rgba(92,230,255,0.18);
    box-shadow:0 0 36px rgba(255,43,214,0.18), inset 0 0 22px rgba(0,0,0,0.6);
    max-width:100%;cursor:pointer;
  }
  .hud-top{
    position:fixed;top:3.4rem;left:0.6rem;right:0.6rem;
    display:flex;justify-content:space-between;align-items:flex-start;
    z-index:5;pointer-events:none;font-family:'Share Tech Mono', monospace;
  }
  .hud-top .card{
    background:rgba(7,4,24,0.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(92,230,255,0.32);
    padding:0.55rem 0.85rem;border-radius:0.4rem;
    display:flex;flex-direction:column;gap:0.2rem;
    box-shadow:0 0 14px rgba(92,230,255,0.15);min-width:5.5rem;
  }
  .hud-top .label{font-size:0.6rem;letter-spacing:0.22em;color:var(--silver);text-transform:uppercase}
  .hud-top .val{font-family:'Rubik Mono One', monospace;font-size:1.5rem;color:var(--cyan);letter-spacing:0.04em;line-height:1}
  .hud-top .card.best .val{color:var(--gold)}
  .hud-top .card.solver .val{color:var(--magenta)}
  .hud-top .card .unit{font-size:0.7rem;color:var(--silver-dim);margin-left:0.18rem}

  /* prompts */
  .prompt{
    position:fixed;top:55%;left:50%;transform:translate(-50%, -50%);
    font-family:'Audiowide', monospace;font-size:clamp(1.4rem, 4vw, 2.6rem);
    color:var(--ink);letter-spacing:0.1em;text-transform:uppercase;
    text-shadow:0 0 14px var(--magenta), 0 0 28px rgba(255,43,214,0.4);
    pointer-events:none;z-index:6;opacity:0;transition:opacity 0.3s;text-align:center;
  }
  .prompt.show{opacity:1;animation:promptPulse 0.9s ease-out}
  @keyframes promptPulse{
    0%{transform:translate(-50%, -50%) scale(1.5)}
    20%{transform:translate(-50%, -50%) scale(1)}
    100%{transform:translate(-50%, -50%) scale(1)}
  }

  /* result */
  .result{
    position:fixed;left:50%;top:50%;transform:translate(-50%, -50%);
    background:rgba(7,4,24,0.94);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    border:2px solid var(--magenta);border-radius:0.8rem;
    padding:1.5rem 2rem;text-align:center;z-index:20;
    box-shadow:0 0 40px rgba(255,43,214,0.4);display:none;min-width:18rem;
  }
  .result.show{display:block;animation:popIn 0.45s cubic-bezier(0.34, 1.56, 0.64, 1)}
  .result.best{border-color:var(--gold);box-shadow:0 0 40px rgba(255,212,84,0.45)}
  .result.solver{border-color:var(--lime);box-shadow:0 0 40px rgba(165,255,82,0.4)}
  @keyframes popIn{
    from{opacity:0;transform:translate(-50%, -50%) scale(0.7)}
    to{opacity:1;transform:translate(-50%, -50%) scale(1)}
  }
  .result h2{
    font-family:'Audiowide', monospace;font-size:1.4rem;color:var(--magenta);letter-spacing:0.1em;
    margin-bottom:0.4rem;text-shadow:0 0 10px var(--magenta);
  }
  .result.best h2{color:var(--gold);text-shadow:0 0 12px var(--gold)}
  .result.solver h2{color:var(--lime);text-shadow:0 0 12px var(--lime)}
  .result .dist{
    font-family:'Rubik Mono One', monospace;
    font-size:clamp(2.6rem, 7vw, 4.2rem);color:var(--ink);line-height:1;letter-spacing:0.04em;margin:0.6rem 0;
  }
  .result .dist .u{font-size:0.5em;color:var(--silver);margin-left:0.2em}
  .result .meta{color:var(--silver);font-size:0.85rem;margin-bottom:1rem;letter-spacing:0.08em}
  .result .actions{display:flex;gap:0.6rem;justify-content:center;flex-wrap:wrap}
  .result .btn{
    background:transparent;color:var(--cyan);border:2px solid var(--cyan);
    font-family:'Audiowide', monospace;font-size:0.85rem;letter-spacing:0.12em;text-transform:uppercase;
    padding:0.7rem 1.3rem;cursor:pointer;border-radius:0.4rem;min-height:2.75rem;
    box-shadow:0 0 12px rgba(92,230,255,0.3);
  }
  .result .btn:hover{background:rgba(92,230,255,0.14)}
  .result .btn:focus-visible{outline:3px solid var(--ink);outline-offset:2px}

  /* hints / hud bottom */
  .hints{
    position:fixed;bottom:0.8rem;left:50%;transform:translateX(-50%);
    display:flex;gap:0.7rem;align-items:center;flex-wrap:wrap;justify-content:center;
    background:rgba(7,4,24,0.82);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(92,230,255,0.25);
    padding:0.4rem 0.65rem;border-radius:0.4rem;z-index:5;
    font-size:0.62rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--silver);
    max-width:calc(100% - 1rem);
  }
  .hints kbd{
    background:#161035;border:1px solid rgba(92,230,255,0.4);border-radius:0.2rem;
    color:var(--ink);padding:0.25rem 0.4rem;font-family:'Share Tech Mono', monospace;font-size:0.6rem;
    min-width:1.6rem;text-align:center;display:inline-block;
  }
  .hints .sep{width:1px;background:rgba(92,230,255,0.2);height:1rem}
  .hints button{
    background:transparent;color:var(--cyan);border:1px solid var(--cyan);
    font-family:inherit;font-size:0.6rem;letter-spacing:0.15em;text-transform:uppercase;
    padding:0.45rem 0.65rem;border-radius:0.2rem;cursor:pointer;min-height:2.5rem;
  }
  .hints button:hover{background:rgba(92,230,255,0.12)}
  .hints button:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
  .hints button.solver-btn{color:var(--lime);border-color:var(--lime)}
  .hints button.solver-btn:hover{background:rgba(165,255,82,0.14)}
  .hints button.solver-btn[aria-pressed="true"]{background:rgba(165,255,82,0.22);box-shadow:0 0 12px rgba(165,255,82,0.4)}
  .hints button.danger{color:var(--magenta);border-color:var(--magenta)}
  .hints button.danger:hover{background:rgba(255,43,214,0.14)}

  /* big drop button on mobile */
  .drop-btn{
    position:fixed;right:1rem;bottom:6rem;
    width:6rem;height:6rem;border-radius:50%;
    background:radial-gradient(circle at 30% 30%, rgba(255,212,84,0.30), rgba(7,4,24,0.85));
    border:2.5px solid var(--gold);color:var(--gold);
    font-family:'Audiowide', monospace;font-size:1rem;letter-spacing:0.12em;
    box-shadow:0 0 20px rgba(255,212,84,0.5);
    display:none;align-items:center;justify-content:center;
    z-index:7;cursor:pointer;
  }
  @media (pointer: coarse), (max-width: 720px){
    .drop-btn{display:flex}
    .hud-top{top:2.8rem;left:0.4rem;right:0.4rem}
    .hud-top .card{padding:0.35rem 0.55rem;min-width:4rem}
    .hud-top .val{font-size:1.05rem}
  }
  @media (prefers-reduced-motion: reduce){
    .result.show{animation:none}
    .prompt.show{animation:none}
  }
</style>
</head>
<body>
  <header>
    <h1>NEON CITY BLOXX</h1>
    <div class="tag">drop · slice · stack · ascend</div>
  </header>

  <div class="hud-top">
    <div class="card">
      <div class="label">floor</div>
      <div class="val"><span id="floorVal">0</span></div>
    </div>
    <div class="card best">
      <div class="label">best</div>
      <div class="val"><span id="bestVal">0</span></div>
    </div>
    <div class="card solver" id="solverCard" style="display:none">
      <div class="label">solver</div>
      <div class="val" id="solverVal">on</div>
    </div>
  </div>

  <main>
    <canvas id="game" width="520" height="720" role="application" aria-label="Neon city block-stacking game. A block sweeps left and right at the top of the tower. Press Space or tap to drop it. Overhang gets sliced off. Perfect drops regenerate width."></canvas>
  </main>

  <div class="prompt" id="prompt" aria-live="polite"></div>

  <div class="result" id="result" role="dialog" aria-modal="true" aria-hidden="true">
    <h2 id="resultTitle">COLLAPSE</h2>
    <div class="dist"><span id="resultDist">0</span><span class="u">floors</span></div>
    <div class="meta" id="resultMeta">perfects: 0  ·  best: 0</div>
    <div class="actions">
      <button class="btn" id="restartBtn" type="button">Rebuild</button>
    </div>
  </div>

  <div class="hints">
    <span><kbd>Space</kbd> drop</span>
    <span class="sep" aria-hidden="true"></span>
    <button class="solver-btn" id="solverBtn" type="button" aria-pressed="false" aria-label="Toggle optimization solver">⌬ solver</button>
    <span class="sep" aria-hidden="true"></span>
    <button class="danger" id="resetBtn" type="button" aria-label="Restart tower">↻</button>
    <span class="sep" aria-hidden="true"></span>
    <button id="muteBtn" type="button" aria-pressed="false" aria-label="Toggle sound">♪ on</button>
  </div>

  <button class="drop-btn" id="dropBtn" type="button" aria-label="Drop block">DROP</button>

<script>
(function(){
  'use strict';

  function showError(msg){
    try {
      var t = document.getElementById('errToast');
      if (!t){
        t = document.createElement('div');
        t.id = 'errToast';
        t.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#3a0610;color:#ffb6c1;font-family:monospace;font-size:11px;padding:8px 12px;border-bottom:1px solid #ff2bd6;white-space:pre-wrap';
        document.body.appendChild(t);
      }
      t.textContent = '⚠ ' + msg;
    } catch(_){}
  }
  window.addEventListener('error', function(ev){
    showError((ev.message || 'error') + ' @ ' + (ev.filename ? ev.filename.split('/').pop() : '?') + ':' + (ev.lineno || '?'));
  });

  var prefersReducedMotion = false;
  try { prefersReducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch(_){}

  var canvas = document.getElementById('game');
  var ctx;
  try { ctx = canvas.getContext('2d'); } catch(e){ showError('canvas init: ' + e.message); return; }
  if (!ctx){ showError('canvas 2d unavailable'); return; }

  // ── Sizing ──
  var DPR = Math.min(window.devicePixelRatio || 1, 2);
  var W = 520, H = 720;
  function resize(){
    try {
      var maxW = Math.min(window.innerWidth - 16, 580);
      var maxH = Math.max(440, window.innerHeight - 180);
      // 5:7 aspect tall
      var ratio = 5/7;
      var w = Math.min(maxW, maxH * ratio);
      var h = w / ratio;
      if (h > maxH){ h = maxH; w = h * ratio; }
      W = Math.floor(w); H = Math.floor(h);
      canvas.style.width = W + 'px'; canvas.style.height = H + 'px';
      canvas.width = Math.floor(W * DPR); canvas.height = Math.floor(H * DPR);
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    } catch(e){ showError('resize: ' + e.message); }
  }
  resize();
  window.addEventListener('resize', resize);

  // ── Game state ──
  var BLOCK_H = 26;
  var INIT_WIDTH = 130;
  var MAX_WIDTH = 130;
  var SWEEP_Y_FROM_TOP = 90;
  var BASE_Y_FROM_BOTTOM = 80;
  var HUE_WHEEL = [185, 320, 55, 280, 100, 0, 220, 340];

  var state = {
    floors: 0,
    perfects: 0,
    best: 0,
    bestSolver: 0,
    over: false,
    solver: false,
    stack: [],     // {x, y, w, h, color, sway?}
    scraps: [],    // {x, y, w, h, vx, vy, vRot, rot, color}
    sweep: null,   // {x, dir, speed, w, color}
    falling: null, // {x, y, vy, w, color}
    cam: { y: 0, target: 0 },
    swayPhase: 0,
    swayMag: 0
  };

  try { state.best = parseInt(localStorage.getItem('neon-city-bloxx-best') || '0', 10) || 0; } catch(_){}
  try { state.bestSolver = parseInt(localStorage.getItem('neon-city-bloxx-best-solver') || '0', 10) || 0; } catch(_){}

  function newGame(){
    state.floors = 0;
    state.perfects = 0;
    state.over = false;
    state.stack = [];
    state.scraps = [];
    state.falling = null;
    state.sweep = null;
    state.cam.y = 0;
    state.cam.target = 0;
    state.swayPhase = 0;
    state.swayMag = 0;
    // Base block (foundation)
    var foundation = {
      x: W/2 - 90, y: H - BASE_Y_FROM_BOTTOM - BLOCK_H,
      w: 180, h: BLOCK_H,
      color: 200
    };
    state.stack.push(foundation);
    state.floors = 1;
    spawnSweep();
    hideResult();
  }

  function spawnSweep(){
    var top = state.stack[state.stack.length - 1];
    var w = Math.min(top.w, MAX_WIDTH);
    if (state.floors === 1) w = INIT_WIDTH;
    var baseSpeed = 170 + state.floors * 9;
    if (baseSpeed > 540) baseSpeed = 540;
    state.sweep = {
      x: 20,
      w: w,
      dir: 1,
      speed: baseSpeed,
      color: HUE_WHEEL[state.floors % HUE_WHEEL.length],
      // y from top, will be transformed via cam each frame
      worldY: top.y - BLOCK_H - 16
    };
  }

  function dropBlock(){
    if (state.over || !state.sweep || state.falling) return;
    state.falling = {
      x: state.sweep.x,
      y: state.sweep.worldY,
      vy: 0,
      w: state.sweep.w,
      h: BLOCK_H,
      color: state.sweep.color
    };
    state.sweep = null;
    sndSwoosh();
  }

  function landFalling(){
    var top = state.stack[state.stack.length - 1];
    var b = state.falling;
    b.y = top.y - b.h;
    // Compute overlap
    var left = Math.max(b.x, top.x);
    var right = Math.min(b.x + b.w, top.x + top.w);
    var overlap = right - left;
    if (overlap < 1){
      // miss → game over
      state.falling = null;
      gameOver(b);
      return;
    }

    // Detect perfect drop (centers within tight tolerance)
    var prevCenter = top.x + top.w/2;
    var newCenter = b.x + b.w/2;
    var centerErr = Math.abs(newCenter - prevCenter);
    var perfect = centerErr < 2.5;

    // Left overhang scrap
    if (b.x < top.x){
      var scrapW = top.x - b.x;
      if (scrapW > 0.5){
        state.scraps.push({
          x: b.x, y: b.y, w: scrapW, h: b.h, color: b.color,
          vx: -90 - Math.random()*70, vy: -40 - Math.random()*40,
          vRot: -0.4 - Math.random()*0.6, rot: 0
        });
      }
    }
    // Right overhang scrap
    if (b.x + b.w > top.x + top.w){
      var scrapW2 = (b.x + b.w) - (top.x + top.w);
      if (scrapW2 > 0.5){
        state.scraps.push({
          x: top.x + top.w, y: b.y, w: scrapW2, h: b.h, color: b.color,
          vx: 90 + Math.random()*70, vy: -40 - Math.random()*40,
          vRot: 0.4 + Math.random()*0.6, rot: 0
        });
      }
    }

    // Trim block to overlap
    b.x = left;
    b.w = overlap;

    // Perfect → regen up to 6px of width (capped at MAX_WIDTH), aligned to top center
    if (perfect && b.w < MAX_WIDTH){
      var regen = 6;
      var newW = Math.min(MAX_WIDTH, b.w + regen);
      var growBy = newW - b.w;
      b.x -= growBy / 2;
      // clamp to canvas
      if (b.x < 4) b.x = 4;
      if (b.x + newW > W - 4) b.x = W - 4 - newW;
      b.w = newW;
      state.perfects++;
      flashPrompt('PERFECT', 'gold');
      sndPerfect();
      // sparkle at center
      for (var s = 0; s < 14; s++){
        var ang = Math.random() * Math.PI * 2;
        var sp = 60 + Math.random() * 140;
        state.scraps.push({
          x: prevCenter, y: b.y,
          w: 2, h: 2,
          color: 50,
          vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp - 30,
          vRot: 0, rot: 0,
          spark: true, life: 0, ttl: 0.45 + Math.random() * 0.3
        });
      }
    } else if (overlap < top.w * 0.55){
      flashPrompt('SLICED', 'magenta');
      sndSlice();
    } else {
      sndThud();
    }

    state.stack.push(b);
    state.floors++;
    state.falling = null;

    // Camera target: keep top at ~30% of canvas from top
    var topYWorld = b.y;
    state.cam.target = Math.max(0, -topYWorld + H * 0.30);

    // After 8 floors, build sway
    if (state.floors > 8){
      state.swayMag = Math.min(0.05, (state.floors - 8) * 0.0035);
    }

    spawnSweep();
  }

  function gameOver(missedBlock){
    state.over = true;
    if (missedBlock){
      // fling the missed block down
      state.scraps.push({
        x: missedBlock.x, y: missedBlock.y, w: missedBlock.w, h: missedBlock.h, color: missedBlock.color,
        vx: (missedBlock.x < W/2 ? -1 : 1) * (40 + Math.random()*60),
        vy: 80, vRot: 0.6 * (Math.random() < 0.5 ? -1 : 1), rot: 0
      });
    }
    sndGameOver();
    var isBest;
    if (state.solver){
      isBest = state.floors > state.bestSolver;
      if (isBest){ state.bestSolver = state.floors; try { localStorage.setItem('neon-city-bloxx-best-solver', String(state.bestSolver)); } catch(_){} }
    } else {
      isBest = state.floors > state.best;
      if (isBest){ state.best = state.floors; try { localStorage.setItem('neon-city-bloxx-best', String(state.best)); } catch(_){} }
    }
    setTimeout(function(){
      var res = document.getElementById('result');
      var title = document.getElementById('resultTitle');
      var dist = document.getElementById('resultDist');
      var meta = document.getElementById('resultMeta');
      res.classList.remove('best', 'solver');
      if (state.solver) res.classList.add('solver');
      else if (isBest) res.classList.add('best');
      title.textContent = state.solver ? 'SOLVER FAILED' : (isBest ? 'NEW HIGH' : 'COLLAPSE');
      dist.textContent = state.floors;
      meta.textContent =
        'perfects: ' + state.perfects +
        '   ·   ' + (state.solver ? 'solver best: ' + state.bestSolver : 'best: ' + state.best);
      res.classList.add('show');
      res.setAttribute('aria-hidden', 'false');
      setTimeout(function(){ document.getElementById('restartBtn').focus(); }, 200);
    }, 700);
  }

  // ── Optimization solver ──
  // Strategy: predict the exact frame the sweep center crosses the previous block center
  // Add small Gaussian noise to simulate non-perfect drift so the tower eventually dies.
  function solverTick(dt){
    if (!state.solver || state.over || state.falling || !state.sweep) return;
    var top = state.stack[state.stack.length - 1];
    if (!top) return;
    var sweepCenter = state.sweep.x + state.sweep.w / 2;
    var prevCenter = top.x + top.w / 2;
    var noise = randn() * 1.8; // Gaussian px noise
    var targetCenter = prevCenter + noise;
    var velocity = state.sweep.dir * state.sweep.speed;
    var dCenter = targetCenter - sweepCenter;
    // If we will cross the target this frame, drop now
    var nextSweepCenter = sweepCenter + velocity * dt;
    var willCross = (sweepCenter < targetCenter && nextSweepCenter >= targetCenter) ||
                    (sweepCenter > targetCenter && nextSweepCenter <= targetCenter);
    if (willCross || Math.abs(dCenter) < 1.0){
      dropBlock();
    }
  }
  // Box-Muller normal sample
  function randn(){
    var u1 = Math.random(), u2 = Math.random();
    return Math.sqrt(-2 * Math.log(Math.max(1e-9, u1))) * Math.cos(2 * Math.PI * u2);
  }

  // ── Update ──
  var lastT = performance.now();
  function update(now){
    var dt = Math.min(0.05, (now - lastT) / 1000);
    lastT = now;
    if (prefersReducedMotion) dt *= 0.9;

    // sway phase always advances; magnitude scales with floors
    state.swayPhase += dt * 0.8;

    // sweep motion
    if (state.sweep){
      var s = state.sweep;
      // Slight sway influence on sweep position (the tower is shaking under it)
      var swayOffset = Math.sin(state.swayPhase * 1.6) * state.swayMag * 80;
      s.x += s.dir * s.speed * dt;
      var leftBound = 8 + swayOffset * 0.3;
      var rightBound = W - 8 - s.w + swayOffset * 0.3;
      if (s.x < leftBound){ s.x = leftBound; s.dir = 1; }
      if (s.x > rightBound){ s.x = rightBound; s.dir = -1; }
    }

    // solver
    solverTick(dt);

    // falling block
    if (state.falling){
      state.falling.vy += 1600 * dt;
      state.falling.y += state.falling.vy * dt;
      var top = state.stack[state.stack.length - 1];
      if (state.falling.y + state.falling.h >= top.y){
        landFalling();
      }
    }

    // scraps physics
    for (var i = state.scraps.length - 1; i >= 0; i--){
      var sc = state.scraps[i];
      sc.vy += 1100 * dt;
      sc.x += sc.vx * dt;
      sc.y += sc.vy * dt;
      sc.rot += sc.vRot * dt;
      if (sc.spark){
        sc.life = (sc.life || 0) + dt;
        if (sc.life >= sc.ttl){ state.scraps.splice(i, 1); continue; }
      }
      // Off-screen culling — convert to screen y first
      var screenY = sc.y + state.cam.y;
      if (screenY > H + 200) state.scraps.splice(i, 1);
    }

    // camera lerp
    state.cam.y += (state.cam.target - state.cam.y) * Math.min(1, dt * 3);
  }

  // ── Render ──
  function drawBackground(){
    // sky gradient
    var sky = ctx.createLinearGradient(0, 0, 0, H);
    sky.addColorStop(0, '#070418');
    sky.addColorStop(0.55, '#1d0d4a');
    sky.addColorStop(0.85, '#5c1a72');
    sky.addColorStop(1, '#a0307a');
    ctx.fillStyle = sky;
    ctx.fillRect(0, 0, W, H);

    // Moon
    var moonX = W * 0.72;
    var moonY = H * 0.18;
    var glow = ctx.createRadialGradient(moonX, moonY, 4, moonX, moonY, 110);
    glow.addColorStop(0, 'rgba(255,235,140,0.85)');
    glow.addColorStop(0.5, 'rgba(255,150,180,0.45)');
    glow.addColorStop(1, 'rgba(255,40,140,0)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = '#fff5cc';
    ctx.beginPath(); ctx.arc(moonX, moonY, 28, 0, Math.PI * 2); ctx.fill();

    // stars (deterministic)
    for (var i = 0; i < 80; i++){
      var sx = (i * 137.5) % W;
      var sy = (i * 73.3) % (H * 0.55);
      var tw = 0.4 + ((i * 31) % 7) / 10;
      ctx.fillStyle = 'rgba(255,255,255,' + tw + ')';
      ctx.fillRect(sx, sy, 1.4, 1.4);
    }

    // distant city silhouette layer 1 (small, far)
    drawCityLayer(0.7, 14, '#1a0a45', H * 0.74);
    drawCityLayer(0.55, 26, '#2a0c60', H * 0.80);
    drawCityLayer(0.35, 44, '#3a1080', H * 0.88);
  }

  function drawCityLayer(parallax, height, color, baseScreenY){
    var camOffset = state.cam.y * parallax * 0.4;
    var off = (camOffset) % 24;
    ctx.fillStyle = color;
    ctx.fillRect(0, baseScreenY, W, H - baseScreenY);
    // skyline buildings: deterministic per layer
    var seed = Math.floor(parallax * 100);
    var x = -off;
    var bi = 0;
    while (x < W + 20){
      var bw = 18 + ((seed * 13 + bi * 7) % 20);
      var bh = 18 + ((seed * 19 + bi * 11) % height);
      ctx.fillStyle = color;
      ctx.fillRect(x, baseScreenY - bh, bw, bh);
      // tiny windows
      ctx.fillStyle = 'rgba(92,230,255,' + (0.18 + (bi % 3) * 0.05) + ')';
      var wy = baseScreenY - bh + 4;
      for (var w = 0; w < bw - 4; w += 4){
        for (var hh = 0; hh < bh - 4; hh += 4){
          if ((bi * 7 + w + hh) % 5 === 0){
            ctx.fillRect(x + 2 + w, wy + hh, 1.5, 1.5);
          }
        }
      }
      x += bw + 2;
      bi++;
    }
    // top neon edge
    ctx.strokeStyle = parallax < 0.5 ? 'rgba(255,43,214,0.30)' : 'rgba(92,230,255,0.25)';
    ctx.lineWidth = 1;
    ctx.shadowColor = ctx.strokeStyle; ctx.shadowBlur = 6;
    ctx.beginPath();
    ctx.moveTo(0, baseScreenY);
    ctx.lineTo(W, baseScreenY);
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  function drawBlock(b, hue, opts){
    opts = opts || {};
    var alpha = opts.alpha != null ? opts.alpha : 1;
    var ghost = !!opts.ghost;
    ctx.save();
    if (opts.translate) ctx.translate(opts.translate.x, opts.translate.y);
    if (opts.rotate) ctx.rotate(opts.rotate);
    // glow halo
    ctx.shadowColor = 'hsl(' + hue + ',95%,65%)';
    ctx.shadowBlur = ghost ? 6 : 18;
    // body
    var bgrad = ctx.createLinearGradient(b.x, b.y, b.x, b.y + b.h);
    bgrad.addColorStop(0, 'hsla(' + hue + ',95%,70%,' + alpha + ')');
    bgrad.addColorStop(0.5, 'hsla(' + hue + ',95%,52%,' + alpha + ')');
    bgrad.addColorStop(1, 'hsla(' + hue + ',95%,32%,' + alpha + ')');
    ctx.fillStyle = bgrad;
    ctx.fillRect(b.x, b.y, b.w, b.h);
    // inner highlight strip
    ctx.fillStyle = 'hsla(' + hue + ',100%,80%,' + (0.6 * alpha) + ')';
    ctx.fillRect(b.x + 2, b.y + 2, b.w - 4, 2);
    // bottom shadow strip
    ctx.fillStyle = 'hsla(' + hue + ',100%,18%,' + (0.7 * alpha) + ')';
    ctx.fillRect(b.x, b.y + b.h - 3, b.w, 3);
    // outline
    ctx.strokeStyle = 'hsla(' + hue + ',100%,80%,' + alpha + ')';
    ctx.lineWidth = ghost ? 1 : 1.5;
    ctx.strokeRect(b.x + 0.5, b.y + 0.5, b.w - 1, b.h - 1);
    // windows
    if (!ghost){
      ctx.fillStyle = 'hsla(' + hue + ',100%,90%,0.5)';
      var winCount = Math.max(2, Math.floor(b.w / 14));
      var winGap = b.w / (winCount + 1);
      for (var i = 0; i < winCount; i++){
        var wx = b.x + winGap * (i + 1) - 2;
        ctx.fillRect(wx, b.y + 6, 3, 4);
        ctx.fillRect(wx, b.y + b.h - 10, 3, 4);
      }
    }
    ctx.shadowBlur = 0;
    ctx.restore();
  }

  function drawSolverHint(){
    if (!state.solver || !state.sweep) return;
    var top = state.stack[state.stack.length - 1];
    if (!top) return;
    var sweepWorldY = state.sweep.worldY;
    var screenY = sweepWorldY + state.cam.y;
    var targetX = top.x + top.w/2;
    var sweepCenter = state.sweep.x + state.sweep.w/2;
    // crosshair on target
    var pulse = 0.5 + Math.sin(performance.now() * 0.01) * 0.5;
    ctx.save();
    ctx.strokeStyle = 'rgba(165,255,82,' + (0.4 + pulse * 0.4) + ')';
    ctx.lineWidth = 1.5;
    ctx.shadowColor = '#a5ff52'; ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.moveTo(targetX, screenY - 18);
    ctx.lineTo(targetX, screenY + state.sweep.h ? screenY + BLOCK_H + 18 : screenY + 30);
    ctx.stroke();
    // small arrow indicating sweep vs target
    var diff = sweepCenter - targetX;
    ctx.beginPath();
    ctx.moveTo(targetX - 8, screenY - 24);
    ctx.lineTo(targetX + 8, screenY - 24);
    ctx.stroke();
    ctx.restore();
  }

  function render(){
    drawBackground();
    // apply camera translate for world content
    ctx.save();
    ctx.translate(0, state.cam.y);

    // sway transform — top blocks visually sway with a small rotation pivot at base
    var swayAngle = Math.sin(state.swayPhase * 1.6) * state.swayMag;

    // Draw stack (with sway applied per floor, more sway for higher floors)
    for (var i = 0; i < state.stack.length; i++){
      var b = state.stack[i];
      var hue = b.color;
      var swayInfluence = (i / state.stack.length) * 0.7 + 0.3;
      var dx = Math.sin(state.swayPhase * 1.6 + i * 0.06) * state.swayMag * 18 * swayInfluence;
      ctx.save();
      ctx.translate(dx, 0);
      drawBlock(b, hue, {});
      ctx.restore();
    }

    // falling block
    if (state.falling){
      drawBlock(state.falling, state.falling.color, {});
    }

    // scraps
    for (var s = 0; s < state.scraps.length; s++){
      var sc = state.scraps[s];
      if (sc.spark){
        var a = 1 - (sc.life || 0) / sc.ttl;
        ctx.save();
        ctx.globalCompositeOperation = 'lighter';
        ctx.fillStyle = 'hsla(' + sc.color + ',100%,75%,' + a + ')';
        ctx.shadowColor = 'hsl(' + sc.color + ',100%,70%)'; ctx.shadowBlur = 8;
        ctx.fillRect(sc.x, sc.y, sc.w, sc.h);
        ctx.restore();
      } else {
        ctx.save();
        ctx.translate(sc.x + sc.w/2, sc.y + sc.h/2);
        ctx.rotate(sc.rot);
        ctx.translate(-sc.w/2, -sc.h/2);
        var bScrap = { x: 0, y: 0, w: sc.w, h: sc.h };
        drawBlock(bScrap, sc.color, {});
        ctx.restore();
      }
    }

    ctx.restore();

    // Sweep block (NOT camera-shifted because cam translate already covers it)
    // Actually sweep is at sweep.worldY in world coords, so it IS affected by cam.
    // Re-apply translate for sweep:
    if (state.sweep){
      ctx.save();
      ctx.translate(0, state.cam.y);
      var sweepBox = { x: state.sweep.x, y: state.sweep.worldY, w: state.sweep.w, h: BLOCK_H };
      // pulse the sweep slightly
      var sp = 0.85 + Math.sin(performance.now() * 0.01) * 0.15;
      ctx.globalAlpha = sp;
      drawBlock(sweepBox, state.sweep.color, {});
      ctx.globalAlpha = 1;
      // pendulum-arrow showing direction
      ctx.fillStyle = 'rgba(255,255,255,0.7)';
      ctx.beginPath();
      var arrX = state.sweep.x + (state.sweep.dir > 0 ? state.sweep.w + 8 : -8);
      var arrY = state.sweep.worldY + BLOCK_H / 2;
      var tip = state.sweep.dir > 0 ? 6 : -6;
      ctx.moveTo(arrX, arrY);
      ctx.lineTo(arrX - tip, arrY - 4);
      ctx.lineTo(arrX - tip, arrY + 4);
      ctx.closePath();
      ctx.fill();
      ctx.restore();
      drawSolverHint();
    }

    // floor number label on top of tower
    if (state.stack.length > 0){
      var topB = state.stack[state.stack.length - 1];
      ctx.save();
      ctx.translate(0, state.cam.y);
      ctx.fillStyle = 'rgba(244,240,255,0.55)';
      ctx.font = 'bold 11px "Share Tech Mono", monospace';
      ctx.textAlign = 'right';
      ctx.fillText('F' + state.floors, topB.x - 4, topB.y + BLOCK_H - 6);
      ctx.restore();
    }

    // ground glow
    var glow = ctx.createLinearGradient(0, H - 40, 0, H);
    glow.addColorStop(0, 'rgba(255,43,214,0)');
    glow.addColorStop(1, 'rgba(255,43,214,0.30)');
    ctx.fillStyle = glow;
    ctx.fillRect(0, H - 40, W, 40);

    // scanline overlay
    ctx.fillStyle = 'rgba(255,255,255,0.015)';
    for (var sl = 0; sl < H; sl += 3) ctx.fillRect(0, sl, W, 1);
  }

  // ── HUD ──
  function updateHUD(){
    document.getElementById('floorVal').textContent = state.floors - 1; // foundation isn't counted as a stacked floor
    var bestShow = state.solver ? state.bestSolver : state.best;
    document.getElementById('bestVal').textContent = bestShow;
    var solverCard = document.getElementById('solverCard');
    if (state.solver){
      solverCard.style.display = '';
      document.getElementById('solverVal').textContent = 'on';
    } else {
      solverCard.style.display = 'none';
    }
  }

  // ── Audio ──
  var audioCtx = null, muted = false;
  function ensureAudio(){
    if (audioCtx){ if (audioCtx.state === 'suspended') audioCtx.resume(); return audioCtx; }
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(_){ audioCtx = null; }
    return audioCtx;
  }
  function tone(type, freq, dur, gain, slideTo, t0){
    var c = ensureAudio(); if (!c || muted) return;
    var o = c.createOscillator(); o.type = type;
    var t = t0 || c.currentTime;
    o.frequency.setValueAtTime(freq, t);
    if (slideTo) o.frequency.exponentialRampToValueAtTime(Math.max(20, slideTo), t + dur);
    var g = c.createGain();
    g.gain.setValueAtTime(0.0001, t);
    g.gain.exponentialRampToValueAtTime(gain, t + 0.008);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.connect(g).connect(c.destination);
    o.start(t); o.stop(t + dur + 0.02);
  }
  function noise(dur, freq, Q, gain){
    var c = ensureAudio(); if (!c || muted) return;
    var n = Math.floor(c.sampleRate * dur);
    var buf = c.createBuffer(1, n, c.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < n; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/n, 1.6);
    var s = c.createBufferSource(); s.buffer = buf;
    var bp = c.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = freq; bp.Q.value = Q;
    var g = c.createGain(); g.gain.value = gain;
    s.connect(bp).connect(g).connect(c.destination);
    s.start();
  }
  function sndSwoosh(){ noise(0.10, 2200, 1.4, 0.06); tone('triangle', 660, 0.10, 0.10, 280); }
  function sndThud(){ tone('sine', 90, 0.16, 0.20, 50); noise(0.10, 220, 1.0, 0.08); }
  function sndSlice(){ noise(0.14, 3400, 4, 0.16); tone('square', 1400, 0.06, 0.10, 320); tone('sine', 110, 0.16, 0.16, 60); }
  function sndPerfect(){ [880, 1320, 1760].forEach(function(f, i){ tone('triangle', f, 0.18, 0.16, null, ensureAudio() && audioCtx.currentTime + i * 0.05); }); }
  function sndGameOver(){ tone('sawtooth', 220, 0.40, 0.20, 60); noise(0.34, 280, 0.9, 0.18); tone('square', 110, 0.28, 0.14, 50, ensureAudio() && audioCtx.currentTime + 0.10); }

  // ── Input ──
  function tryDrop(){
    ensureAudio();
    if (state.over || state.solver) return;
    dropBlock();
  }
  window.addEventListener('keydown', function(e){
    if (e.target && e.target.tagName === 'INPUT') return;
    if (e.code === 'Space' || e.code === 'Enter'){
      e.preventDefault();
      tryDrop();
    } else if (e.code === 'KeyR'){
      newGame();
    } else if (e.code === 'KeyS'){
      toggleSolver();
    }
  });
  canvas.addEventListener('pointerdown', function(e){
    e.preventDefault(); tryDrop();
  });
  document.getElementById('dropBtn').addEventListener('pointerdown', function(e){
    e.preventDefault(); tryDrop();
  });

  function toggleSolver(){
    state.solver = !state.solver;
    var btn = document.getElementById('solverBtn');
    btn.setAttribute('aria-pressed', state.solver ? 'true' : 'false');
    btn.textContent = state.solver ? '⌬ solver ✓' : '⌬ solver';
    if (state.over){ newGame(); }
    flashPrompt(state.solver ? 'SOLVER ON' : 'SOLVER OFF', state.solver ? 'lime' : 'cyan');
  }
  document.getElementById('solverBtn').addEventListener('click', toggleSolver);
  document.getElementById('resetBtn').addEventListener('click', function(){ newGame(); });
  document.getElementById('restartBtn').addEventListener('click', function(){ newGame(); });
  document.getElementById('muteBtn').addEventListener('click', function(){
    muted = !muted;
    this.textContent = muted ? '♪ off' : '♪ on';
    this.setAttribute('aria-pressed', muted ? 'true' : 'false');
  });

  // ── Prompt overlay ──
  var promptEl = document.getElementById('prompt');
  function flashPrompt(text, color){
    promptEl.textContent = text;
    promptEl.classList.remove('show');
    void promptEl.offsetWidth;
    promptEl.classList.add('show');
    promptEl.style.color =
      color === 'gold' ? 'var(--gold)' :
      color === 'lime' ? 'var(--lime)' :
      color === 'magenta' ? 'var(--magenta)' :
      'var(--cyan)';
    promptEl.style.textShadow =
      color === 'gold' ? '0 0 18px var(--gold)' :
      color === 'lime' ? '0 0 18px var(--lime)' :
      color === 'magenta' ? '0 0 18px var(--magenta)' :
      '0 0 18px var(--cyan)';
    clearTimeout(flashPrompt._t);
    flashPrompt._t = setTimeout(function(){ promptEl.classList.remove('show'); }, 900);
  }

  function hideResult(){
    var res = document.getElementById('result');
    res.classList.remove('show');
    res.setAttribute('aria-hidden', 'true');
  }

  // ── Main loop ──
  function frame(now){
    try {
      update(now);
      render();
      updateHUD();
    } catch(e){ showError('loop: ' + e.message); }
    requestAnimationFrame(frame);
  }

  newGame();
  requestAnimationFrame(frame);
  flashPrompt('TAP TO DROP', 'cyan');
})();
</script>
</body>
