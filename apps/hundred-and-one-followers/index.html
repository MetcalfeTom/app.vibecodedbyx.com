<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>101 Followers — Thank You</title>
<meta name="description" content="A confetti-and-fireworks thank you for the hundred-and-first. Tap to launch a rocket — now with chrysanthemum trails, multi-stage shells, and heart bursts.">
<meta property="og:title" content="101 Followers — Thank You">
<meta property="og:description" content="A confetti-and-fireworks thank you for the hundred-and-first. Now with chrysanthemum willows, multi-stage shells, and heart bursts.">

<meta property="og:image" content="https://image.pollinations.ai/prompt/101%20followers%20celebration%20fireworks%20chrysanthemum%20heart%20burst%20night%20sky%20neon%20pink%20gold%20cyan%20party?width=1200&height=630&nologo=true">
<meta property="og:type" content="website">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
:root{
  --bg:#0a0014;
  --bg-2:#1c0735;
  --pink:#ff3eaa;
  --cyan:#3ee0ff;
  --gold:#ffd83e;
  --lime:#9aff3e;
  --orange:#ff7a3e;
  --violet:#b13eff;
  --ink:#fff5e6;
  --rule:rgba(255,245,230,0.18);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:'IBM Plex Mono',monospace;-webkit-font-smoothing:antialiased}
html{font-size:100%}

body{
  background:
    radial-gradient(900px 600px at 18% 110%, rgba(255,62,170,0.18), transparent 60%),
    radial-gradient(900px 600px at 88% 110%, rgba(62,224,255,0.16), transparent 60%),
    radial-gradient(1200px 700px at 50% 0%, rgba(177,62,255,0.12), transparent 60%),
    linear-gradient(180deg, #0a0014 0%, #1c0735 60%, #2c0a47 100%);
}

.skip{position:absolute;left:-9999px;top:auto;width:1px;height:1px;overflow:hidden}
.skip:focus{left:1rem;top:1rem;width:auto;height:auto;background:var(--pink);color:var(--bg);padding:0.5rem 0.75rem;border-radius:0.25rem;z-index:1000}

#sky{
  position:fixed; inset:0;
  width:100%; height:100%;
  z-index:1;
  display:block;
  cursor: crosshair;
  touch-action: none;
}

.banner{
  position:fixed; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  z-index:2; pointer-events:none;
  text-align:center; padding:1rem;
}

.eyebrow{
  font-family:'Major Mono Display', monospace;
  font-size:clamp(0.7rem, 1.6vw, 1rem);
  letter-spacing:0.4em;
  color:var(--cyan);
  text-shadow: 0 0 10px rgba(62,224,255,0.5);
  margin-bottom:0.4rem;
  opacity:0;
  animation: fadeUp 0.8s 0.2s ease forwards;
}

.counter{
  font-family:'Bungee Shade', cursive;
  font-size:clamp(7rem, 22vw, 18rem);
  line-height:0.95;
  margin:0;
  color:var(--gold);
  text-shadow:
    0 0 20px rgba(255,216,62,0.55),
    0 0 60px rgba(255,62,170,0.35),
    6px 6px 0 rgba(255,62,170,0.55);
  letter-spacing:-0.02em;
  font-variant-numeric:tabular-nums;
}

.headline{
  font-family:'Bungee Inline', cursive;
  font-size:clamp(2.2rem, 7vw, 5.4rem);
  margin:0 0 0.4rem;
  color:var(--ink);
  letter-spacing:0.04em;
  text-shadow:
    3px 3px 0 var(--pink),
    6px 6px 0 var(--violet),
    0 0 50px rgba(255,62,170,0.35);
  opacity:0;
  animation: pop 0.6s 1.6s cubic-bezier(.5,1.6,.6,1) forwards;
}
.headline em{
  font-family:'Bungee Inline', cursive;
  font-style:normal;
  color:var(--cyan);
  text-shadow:
    3px 3px 0 var(--violet),
    6px 6px 0 var(--pink),
    0 0 50px rgba(62,224,255,0.4);
}

.tagline{
  font-family:'Cormorant Garamond', serif;
  font-style:italic;
  font-size:clamp(1.05rem, 2.4vw, 1.55rem);
  color:#ffd9b1;
  margin:0;
  max-width:34rem;
  line-height:1.45;
  opacity:0;
  animation: fadeUp 0.8s 2.2s ease forwards;
}
.tagline b{color:var(--gold); font-weight:500; font-style:normal; font-family:'IBM Plex Mono',monospace; font-size:0.85em; letter-spacing:0.04em}

.cta-row{
  margin-top:1.4rem;
  display:flex; gap:0.6rem; flex-wrap:wrap; justify-content:center;
  opacity:0;
  animation: fadeUp 0.8s 2.6s ease forwards;
  pointer-events:auto;
}

.btn{
  font-family:'IBM Plex Mono',monospace;
  font-size:0.78rem; letter-spacing:0.18em; text-transform:uppercase;
  background: rgba(255,255,255,0.06);
  color:var(--ink);
  border:1px solid var(--rule);
  padding:0.85rem 1.3rem;
  cursor:pointer;
  min-height:2.85rem;
  backdrop-filter: blur(6px);
  transition: background 0.15s ease, border-color 0.15s ease, transform 0.08s ease, color 0.15s ease;
}
.btn:hover{ background: rgba(255,62,170,0.14); border-color:var(--pink); color:#fff }
.btn:active{ transform:translateY(1px) }
.btn:focus-visible{ outline:3px solid var(--cyan); outline-offset:2px }
.btn.primary{
  background: linear-gradient(180deg, var(--pink), #c41878);
  border-color: var(--pink);
  color:#fff;
  font-weight:500;
  box-shadow: 0 6px 22px rgba(255,62,170,0.35), 0 0 0 1px rgba(255,255,255,0.08) inset;
}
.btn.primary:hover{ background: linear-gradient(180deg, #ff5dbc, var(--pink)); }

/* unmute hint pulses */
.hint-mute{
  position:fixed; left:50%; bottom:5.4rem; transform:translateX(-50%);
  z-index:3;
  font-family:'IBM Plex Mono',monospace;
  font-size:0.7rem; letter-spacing:0.16em; text-transform:uppercase;
  color: rgba(255,245,230,0.6);
  background: rgba(0,0,0,0.4);
  border:1px solid var(--rule);
  padding:0.4rem 0.7rem;
  pointer-events:none;
  transition: opacity 0.4s ease;
}
.hint-mute.gone{ opacity:0 }
.hint-mute .blink{
  display:inline-block; width:0.5rem; height:0.5rem; background:var(--pink);
  border-radius:50%; margin-right:0.45rem; vertical-align:0.05em;
  animation: blink 1.1s ease-in-out infinite;
}
@keyframes blink{ 0%,100%{opacity:0.4} 50%{opacity:1} }

/* ticker bottom */
.ticker{
  position:fixed; left:0; right:0; bottom:0;
  z-index:3;
  background: linear-gradient(180deg, transparent, rgba(0,0,0,0.5));
  padding:0.7rem 0;
  pointer-events:none;
  overflow:hidden;
  -webkit-mask-image: linear-gradient(90deg, transparent, #000 6%, #000 94%, transparent);
          mask-image: linear-gradient(90deg, transparent, #000 6%, #000 94%, transparent);
}
.ticker .track{
  display:inline-flex; gap:2.5rem;
  white-space:nowrap;
  animation: marquee 36s linear infinite;
  font-family:'IBM Plex Mono',monospace;
  font-size:0.85rem; letter-spacing:0.04em;
  color: rgba(255,245,230,0.78);
}
.ticker .track span{display:inline-flex; align-items:center; gap:0.6rem}
.ticker .track .heart{color:var(--pink)}
.ticker .track .gold{color:var(--gold)}
.ticker .track .cyan{color:var(--cyan)}
@keyframes marquee{
  from{transform:translateX(0)}
  to{transform:translateX(-50%)}
}

/* corner status */
.corner{
  position:fixed; top:1rem; right:1rem;
  z-index:4;
  display:flex; gap:0.4rem;
  pointer-events:auto;
}
.corner .pill{
  font-family:'IBM Plex Mono',monospace;
  font-size:0.6rem; letter-spacing:0.2em; text-transform:uppercase;
  background: rgba(0,0,0,0.45);
  color:var(--ink);
  border:1px solid var(--rule);
  padding:0.45rem 0.7rem;
  display:inline-flex; align-items:center; gap:0.35rem;
  cursor:pointer;
}
.corner .pill[aria-pressed="true"]{ color:var(--cyan); border-color:var(--cyan) }
.corner .pill .dot{width:0.45rem;height:0.45rem;border-radius:50%;background:var(--cyan);box-shadow:0 0 6px var(--cyan)}
.corner .pill[aria-pressed="false"] .dot{background:#666; box-shadow:none}

@keyframes pop{
  0%{ opacity:0; transform: scale(0.6) }
  60%{ opacity:1; transform: scale(1.06) }
  100%{ opacity:1; transform: scale(1) }
}
@keyframes fadeUp{
  from{opacity:0; transform:translateY(8px)}
  to{opacity:1; transform:translateY(0)}
}

@media (prefers-reduced-motion: reduce){
  .ticker .track{ animation: none }
  .eyebrow, .headline, .tagline, .cta-row{ animation:none; opacity:1 }
}

@media (max-width: 540px){
  .corner{ top:0.5rem; right:0.5rem; }
  .hint-mute{ bottom:4rem }
}
</style>
</head>
<body>
<a href="#hero" class="skip">Skip to main hero</a>

<canvas id="sky" aria-label="Fireworks and confetti — click to launch a rocket"></canvas>

<div class="banner" id="hero">
  <div class="eyebrow">▸ celebration · room · 02 · the encore</div>
  <div class="counter" id="counter" aria-live="polite">0</div>
  <h1 class="headline">followers <em>thank you</em></h1>
  <p class="tagline">one more came in. it's a hundred and one now — chrysanthemums, hearts, multi-stage shells. <b>this round's on the house.</b></p>
  <div class="cta-row">
    <button type="button" class="btn primary" id="launchBtn">▲ Launch a rocket</button>
    <button type="button" class="btn" id="bigBtn">✦ Grand finale</button>
  </div>
</div>

<div class="hint-mute" id="muteHint"><span class="blink"></span>tap anywhere for sound</div>

<div class="corner" aria-label="Controls">
  <button type="button" class="pill" id="audioToggle" aria-pressed="false" aria-label="Toggle audio">
    <span class="dot"></span><span id="audioLabel">muted</span>
  </button>
  <button type="button" class="pill" id="autoToggle" aria-pressed="true" aria-label="Toggle auto fireworks">
    <span class="dot"></span>auto
  </button>
</div>

<div class="ticker" aria-hidden="true">
  <div class="track" id="tickerTrack"></div>
</div>

<script>
'use strict';

// ════════════════════════════════════════════════════════════════
//   101-follower encore — multi-stage shells, chrysanthemums, hearts
// ════════════════════════════════════════════════════════════════

const $ = (s, r=document) => r.querySelector(s);

// ──────── canvas + sizing ────────
const canvas = $('#sky');
const ctx = canvas.getContext('2d');
let W = 0, H = 0, DPR = 1;

function fit(){
  DPR = Math.min(2, window.devicePixelRatio || 1);
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
fit();
window.addEventListener('resize', fit);

// ──────── audio ────────
let actx = null;
let audioOn = false;

function ac(){
  if (!actx){
    try { actx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e){ return null; }
  }
  if (actx.state === 'suspended') actx.resume();
  return actx;
}

function setAudio(on){
  audioOn = on;
  const t = $('#audioToggle');
  t.setAttribute('aria-pressed', on ? 'true' : 'false');
  $('#audioLabel').textContent = on ? 'audio on' : 'muted';
  $('#muteHint').classList.toggle('gone', on);
  if (on) ac();
}
$('#audioToggle').addEventListener('click', () => setAudio(!audioOn));

function boom(level=1){
  if (!audioOn) return;
  const c = ac(); if (!c) return;
  const t = c.currentTime;

  // sub thump
  const o = c.createOscillator();
  o.type = 'sine';
  o.frequency.setValueAtTime(110 + Math.random()*30, t);
  o.frequency.exponentialRampToValueAtTime(36, t + 0.45);
  const g = c.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(0.55 * level, t + 0.01);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.55);
  o.connect(g); g.connect(c.destination);
  o.start(t); o.stop(t + 0.6);

  // crackle: filtered noise
  const buf = c.createBuffer(1, c.sampleRate * 0.45, c.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++){
    const env = Math.pow(1 - i/data.length, 1.6);
    data[i] = (Math.random()*2 - 1) * env;
  }
  const src = c.createBufferSource(); src.buffer = buf;
  const filt = c.createBiquadFilter();
  filt.type = 'highpass'; filt.frequency.value = 700 + Math.random()*400;
  const ng = c.createGain(); ng.gain.value = 0.13 * level;
  src.connect(filt); filt.connect(ng); ng.connect(c.destination);
  src.start(t);
}

function whistle(durSec=0.55){
  if (!audioOn) return;
  const c = ac(); if (!c) return;
  const t = c.currentTime;
  const o = c.createOscillator();
  o.type = 'triangle';
  o.frequency.setValueAtTime(420, t);
  o.frequency.exponentialRampToValueAtTime(2200, t + durSec);
  const g = c.createGain();
  g.gain.setValueAtTime(0.0001, t);
  g.gain.linearRampToValueAtTime(0.06, t + 0.04);
  g.gain.linearRampToValueAtTime(0.001, t + durSec + 0.05);
  o.connect(g); g.connect(c.destination);
  o.start(t); o.stop(t + durSec + 0.1);
}

function tick(){
  if (!audioOn) return;
  const c = ac(); if (!c) return;
  const t = c.currentTime;
  const o = c.createOscillator();
  o.type = 'square';
  o.frequency.setValueAtTime(880 + Math.random()*200, t);
  const g = c.createGain();
  g.gain.setValueAtTime(0.04, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.05);
  o.connect(g); g.connect(c.destination);
  o.start(t); o.stop(t + 0.06);
}

function cheer(){
  if (!audioOn) return;
  const c = ac(); if (!c) return;
  const t = c.currentTime;
  const buf = c.createBuffer(1, c.sampleRate * 1.2, c.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++){
    const env = Math.sin((i/data.length) * Math.PI);
    data[i] = (Math.random()*2 - 1) * env * 0.55;
  }
  const src = c.createBufferSource(); src.buffer = buf;
  const filt = c.createBiquadFilter();
  filt.type = 'bandpass'; filt.frequency.value = 1400; filt.Q.value = 1.4;
  const g = c.createGain(); g.gain.value = 0.22;
  src.connect(filt); filt.connect(g); g.connect(c.destination);
  src.start(t);
}

// ──────── particles ────────
const PALETTES = [
  ['#ff3eaa','#ffd83e','#ff7a3e'],   // hot
  ['#3ee0ff','#9aff3e','#ffd83e'],   // cool-pop
  ['#b13eff','#ff3eaa','#3ee0ff'],   // ultraviolet
  ['#ffffff','#ffd83e','#ff3eaa'],   // sparkler
  ['#9aff3e','#3ee0ff','#ffffff'],   // mint chip
];

const rockets = [];
const sparks = [];
const confetti = [];
const stars = [];

function rand(a, b){ return a + Math.random()*(b-a); }
function pick(a){ return a[(Math.random()*a.length)|0]; }

// pre-seed background stars
function seedStars(){
  stars.length = 0;
  const n = Math.floor((W*H)/9000);
  for (let i = 0; i < n; i++){
    stars.push({
      x: Math.random()*W,
      y: Math.random()*H,
      r: Math.random()*1.4 + 0.3,
      tw: Math.random()*Math.PI*2,
      hue: pick([45, 200, 320]),
    });
  }
}
seedStars();
window.addEventListener('resize', seedStars);

// pending shell-stage rockets: { x, y, fuse, palette, kind }
const subShells = [];

function spawnRocket(targetX, targetY, opts){
  const startX = (opts && opts.startX != null) ? opts.startX : rand(W*0.15, W*0.85);
  const startY = (opts && opts.startY != null) ? opts.startY : H + 12;
  const tx = targetX != null ? targetX : rand(W*0.18, W*0.82);
  const ty = targetY != null ? targetY : rand(H*0.12, H*0.45);
  const dx = tx - startX, dy = ty - startY;
  const dur = rand(0.85, 1.15);
  const vx = dx / dur;
  const vy = dy / dur + 240 * dur;
  rockets.push({
    x: startX, y: startY,
    vx, vy: -Math.abs(vy),
    tx, ty,
    age: 0, life: dur,
    palette: pick(PALETTES),
    trailHue: pick([18, 45, 200, 280, 320]),
    // 25% of normal rockets become "multi-stage shells" — after the first
    // burst, 3 sub-shells fly off and detonate again on a short fuse.
    shell: !!(opts && opts.shell) || (Math.random() < 0.25),
    // 25% chance the explosion uses a non-standard shape (chrysanthemum / heart / crackle)
    kind: (opts && opts.kind) || pickExplosionKind(),
  });
  whistle(dur * 0.7);
}

function pickExplosionKind(){
  const r = Math.random();
  if (r < 0.18) return 'chrysanthemum';   // long willow drip
  if (r < 0.30) return 'heart';            // heart-shaped
  if (r < 0.40) return 'crackle';          // sparks split mid-flight
  if (r < 0.65) return 'ring';             // even-spaced ring
  return 'peony';                          // tight scatter ball (default)
}

function explode(x, y, palette, big=false, kind){
  kind = kind || pickExplosionKind();
  const count = big ? 220 : (90 + Math.floor(Math.random()*60));
  const speed = big ? rand(280, 420) : rand(180, 290);

  if (kind === 'heart'){
    // parametric heart: x = 16sin³t, y = -(13cosT - 5cos2t - 2cos3t - cos4t)
    const N = Math.max(70, Math.floor(count * 0.7));
    const k = speed * 0.085;        // scale heart to explosion size
    for (let i = 0; i < N; i++){
      const t = (i / N) * Math.PI * 2;
      const hx = 16 * Math.pow(Math.sin(t), 3);
      const hy = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
      sparks.push({
        x, y,
        vx: hx * k * (0.95 + Math.random() * 0.1),
        vy: hy * k * (0.95 + Math.random() * 0.1),
        color: pick(palette),
        life: rand(1.0, 1.6),
        age: 0,
        size: rand(1.8, 2.6),
        trail: [], hasTrail: true,
      });
    }
  } else if (kind === 'chrysanthemum'){
    // long-trail willow — many sparks, low drag, long life, brocade trails
    for (let i = 0; i < count; i++){
      const angle = Math.random() * Math.PI * 2;
      const v = speed * (0.55 + Math.pow(Math.random(), 0.5)) * 0.85;
      sparks.push({
        x, y,
        vx: Math.cos(angle) * v,
        vy: Math.sin(angle) * v - 30,    // slight upward bias
        color: pick(palette),
        life: rand(1.6, 2.6),
        age: 0,
        size: rand(2.0, 3.0),
        trail: [], hasTrail: true,
        gravity: 220,                    // heavier gravity drips down
        drag: 0.94,                       // less drag → longer streaks
      });
    }
  } else if (kind === 'crackle'){
    // initial scatter, then each spark mid-life splits into mini-pops
    for (let i = 0; i < count; i++){
      const angle = Math.random() * Math.PI * 2;
      const v = speed * (0.4 + Math.pow(Math.random(), 0.4));
      sparks.push({
        x, y,
        vx: Math.cos(angle) * v,
        vy: Math.sin(angle) * v,
        color: pick(palette),
        life: rand(0.9, 1.5),
        age: 0,
        size: rand(1.6, 2.8),
        trail: [],
        crackleAt: rand(0.4, 0.75),    // fraction of life to split
        palette,
      });
    }
  } else if (kind === 'ring'){
    for (let i = 0; i < count; i++){
      const angle = (i / count) * Math.PI * 2;
      const v = speed * (0.85 + Math.random() * 0.3);
      sparks.push({
        x, y,
        vx: Math.cos(angle) * v,
        vy: Math.sin(angle) * v,
        color: pick(palette),
        life: rand(0.9, 1.7),
        age: 0,
        size: rand(1.6, 2.8),
        trail: [],
      });
    }
  } else {
    // peony — tight scatter ball
    for (let i = 0; i < count; i++){
      const angle = Math.random() * Math.PI * 2;
      const v = speed * (0.4 + Math.pow(Math.random(), 0.4));
      sparks.push({
        x, y,
        vx: Math.cos(angle) * v,
        vy: Math.sin(angle) * v,
        color: pick(palette),
        life: rand(0.9, 1.7),
        age: 0,
        size: rand(1.6, 2.8),
        trail: [],
      });
    }
  }

  boom(big ? 1.3 : 1);
  for (let i = 0; i < (big ? 80 : 22); i++){
    confetti.push(makeConfetti(x + rand(-20,20), y, palette));
  }
}

// kick off a multi-stage burst — schedule 3 sub-shells flying outward
// from (x, y) with their own ~0.55s fuses and individual explosion kinds.
function fireSubShells(x, y, palette){
  const n = 3;
  for (let i = 0; i < n; i++){
    const a = (i / n) * Math.PI * 2 + rand(-0.3, 0.3);
    const sp = rand(150, 230);
    subShells.push({
      x, y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp - 40,         // slight upward bias on launch
      fuse: rand(0.45, 0.75),
      age: 0,
      palette,
      kind: pickExplosionKind(),
      trailHue: pick([18, 45, 200, 280, 320]),
    });
  }
  // tiny secondary whistle for that "shell-burst" feel
  whistle(0.25);
}

function makeConfetti(x, y, palette){
  return {
    x: x != null ? x : rand(0, W),
    y: y != null ? y : -20,
    vx: rand(-30, 30),
    vy: y != null ? rand(-280, -80) : rand(20, 70),
    w: rand(5, 11),
    h: rand(8, 16),
    color: palette ? pick(palette) : pick(['#ff3eaa','#3ee0ff','#ffd83e','#9aff3e','#b13eff','#ff7a3e']),
    rot: Math.random() * Math.PI * 2,
    rotV: rand(-6, 6),
    swayPhase: Math.random() * Math.PI * 2,
    swayAmp: rand(8, 22),
    life: rand(7, 11),
    age: 0,
  };
}

// continuous confetti rain
function rainConfetti(dt){
  if (Math.random() < dt * 4){
    confetti.push(makeConfetti());
  }
}

// ──────── render loop ────────
let last = performance.now();
let autoTimer = 0;
let autoOn = true;

function frame(now){
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;

  // trail fade — softer than full clear so explosion sparks leave comet streaks
  ctx.fillStyle = 'rgba(10, 0, 20, 0.20)';
  ctx.fillRect(0, 0, W, H);

  // background stars
  for (const s of stars){
    s.tw += dt * 1.6;
    const a = 0.45 + Math.sin(s.tw) * 0.35;
    ctx.fillStyle = `hsla(${s.hue}, 80%, 80%, ${a})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  }

  // rockets
  for (let i = rockets.length - 1; i >= 0; i--){
    const r = rockets[i];
    r.age += dt;
    r.x += r.vx * dt;
    r.y += r.vy * dt;
    r.vy += 360 * dt;          // gravity pulls back

    // trail
    ctx.strokeStyle = `hsla(${r.trailHue}, 95%, 70%, 0.85)`;
    ctx.lineWidth = 2.4;
    ctx.beginPath();
    ctx.moveTo(r.x, r.y);
    ctx.lineTo(r.x - r.vx * 0.025, r.y - r.vy * 0.025);
    ctx.stroke();
    // glowing head
    ctx.fillStyle = `hsla(${r.trailHue}, 95%, 78%, 1)`;
    ctx.beginPath(); ctx.arc(r.x, r.y, 2.6, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 12; ctx.shadowColor = `hsl(${r.trailHue}, 95%, 70%)`;
    ctx.beginPath(); ctx.arc(r.x, r.y, 2.6, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;

    // explode at apex (when traveling more sideways/downward) or after life
    if (r.vy >= -10 || r.age >= r.life){
      explode(r.x, r.y, r.palette, false, r.kind);
      // multi-stage shell — fire 3 sub-shells outward from the burst
      if (r.shell){
        fireSubShells(r.x, r.y, r.palette);
      }
      rockets.splice(i, 1);
    }
  }

  // sub-shells (mid-air re-burst stage of multi-stage rockets)
  for (let i = subShells.length - 1; i >= 0; i--){
    const s = subShells[i];
    s.age += dt;
    s.x += s.vx * dt;
    s.y += s.vy * dt;
    s.vy += 220 * dt;     // gravity-arc
    // glowing tracer head while airborne
    ctx.fillStyle = `hsla(${s.trailHue}, 95%, 78%, 1)`;
    ctx.shadowBlur = 10; ctx.shadowColor = `hsl(${s.trailHue}, 95%, 70%)`;
    ctx.beginPath(); ctx.arc(s.x, s.y, 2, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    // detonate on fuse expiry
    if (s.age >= s.fuse){
      explode(s.x, s.y, s.palette, false, s.kind);
      subShells.splice(i, 1);
    }
  }

  // sparks (with optional brocade trails + mid-life crackle splits)
  for (let i = sparks.length - 1; i >= 0; i--){
    const s = sparks[i];
    s.age += dt;
    if (s.age >= s.life){ sparks.splice(i, 1); continue; }
    // record trail position (every other frame — fewer points, cheaper)
    if (s.hasTrail){
      if (!s.trail) s.trail = [];
      if ((s._t = (s._t || 0) + dt) > 0.018){
        s.trail.push(s.x, s.y);
        if (s.trail.length > 14) s.trail.splice(0, 2);
        s._t = 0;
      }
    }
    s.x += s.vx * dt;
    s.y += s.vy * dt;
    s.vy += (s.gravity != null ? s.gravity : 110) * dt;
    const drag = s.drag != null ? s.drag : 0.86;
    s.vx *= Math.pow(drag, dt * 60);
    s.vy *= Math.pow(drag + 0.06, dt * 60);

    // crackle — split into 4 mini-sparks at the crackle point
    if (s.crackleAt != null && !s._crackled && s.age / s.life >= s.crackleAt){
      s._crackled = true;
      for (let k = 0; k < 4; k++){
        const a = Math.random() * Math.PI * 2;
        const v = rand(60, 130);
        sparks.push({
          x: s.x, y: s.y,
          vx: Math.cos(a) * v, vy: Math.sin(a) * v,
          color: s.color,
          life: rand(0.25, 0.45),
          age: 0,
          size: rand(1.0, 1.6),
          trail: [],
        });
      }
    }

    const fade = 1 - (s.age / s.life);
    // brocade trail (chrysanthemum / heart sparks)
    if (s.hasTrail && s.trail && s.trail.length >= 4){
      ctx.strokeStyle = s.color;
      ctx.lineWidth = 1.5;
      ctx.globalAlpha = fade * 0.4;
      ctx.beginPath();
      ctx.moveTo(s.trail[0], s.trail[1]);
      for (let k = 2; k < s.trail.length; k += 2){
        ctx.lineTo(s.trail[k], s.trail[k+1]);
      }
      ctx.stroke();
    }
    ctx.globalAlpha = fade;
    ctx.fillStyle = s.color;
    ctx.shadowBlur = 8; ctx.shadowColor = s.color;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.size * fade, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;

  // confetti
  rainConfetti(dt);
  for (let i = confetti.length - 1; i >= 0; i--){
    const c = confetti[i];
    c.age += dt;
    c.swayPhase += dt * 2.2;
    c.x += c.vx * dt + Math.sin(c.swayPhase) * c.swayAmp * dt;
    c.y += c.vy * dt;
    c.vy += 90 * dt;
    c.vx *= Math.pow(0.985, dt * 60);
    c.rot += c.rotV * dt;

    if (c.y > H + 40 || c.age > c.life){ confetti.splice(i, 1); continue; }

    const fade = c.age > c.life * 0.75 ? (1 - (c.age - c.life * 0.75) / (c.life * 0.25)) : 1;
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.rotate(c.rot);
    ctx.globalAlpha = fade;
    ctx.fillStyle = c.color;
    // alternate flat / edge view based on rotation cosine
    const sx = Math.abs(Math.cos(c.swayPhase));
    ctx.fillRect(-c.w/2 * sx, -c.h/2, c.w * sx, c.h);
    ctx.restore();
  }
  ctx.globalAlpha = 1;

  // auto-launch
  autoTimer -= dt;
  if (autoOn && autoTimer <= 0){
    spawnRocket();
    autoTimer = rand(0.7, 1.6);
  }

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

// ──────── interactions ────────
function launch(x, y){
  spawnRocket(x, y);
}
canvas.addEventListener('pointerdown', (e) => {
  if (!audioOn) setAudio(true);   // first interaction unlocks audio
  launch(e.clientX, e.clientY);
});
$('#launchBtn').addEventListener('click', () => {
  if (!audioOn) setAudio(true);
  launch();
});
$('#bigBtn').addEventListener('click', () => {
  if (!audioOn) setAudio(true);
  grandFinale();
});

function grandFinale(){
  cheer();
  // launch 14 rockets in a wave over ~3s
  for (let i = 0; i < 14; i++){
    setTimeout(() => spawnRocket(rand(W*0.1, W*0.9), rand(H*0.08, H*0.4)), i * 220 + rand(0, 80));
  }
  // central super-burst at 1.6s
  setTimeout(() => explode(W/2,  H*0.32, pick(PALETTES), true, 'heart'),         1600);
  setTimeout(() => explode(W*0.3, H*0.38, pick(PALETTES), true, 'chrysanthemum'),2100);
  setTimeout(() => explode(W*0.7, H*0.38, pick(PALETTES), true, 'crackle'),      2300);
  setTimeout(() => fireSubShells(W*0.5, H*0.30, pick(PALETTES)),                  2600);
}

// auto toggle
$('#autoToggle').addEventListener('click', () => {
  autoOn = !autoOn;
  $('#autoToggle').setAttribute('aria-pressed', autoOn ? 'true' : 'false');
});

// ──────── counter animation ────────
function animateCounter(target=101, durMs=2520){
  const el = $('#counter');
  const start = performance.now();
  let lastVal = 0;
  function step(now){
    const t = Math.min(1, (now - start) / durMs);
    // ease-out cubic
    const eased = 1 - Math.pow(1 - t, 3);
    const v = Math.floor(eased * target);
    if (v !== lastVal){
      el.textContent = v;
      lastVal = v;
      if (v % 5 === 0 && audioOn) tick();
    }
    if (t < 1) requestAnimationFrame(step);
    else {
      el.textContent = target;
      // celebratory burst when we hit 101
      setTimeout(() => {
        if (!audioOn) {
          // can't play sound yet — still do the visuals
          for (let i = 0; i < 4; i++){
            setTimeout(() => spawnRocket(rand(W*0.2,W*0.8), rand(H*0.2,H*0.4)), i * 240);
          }
        } else {
          grandFinale();
        }
      }, 200);
    }
  }
  requestAnimationFrame(step);
}

// ──────── ticker ────────
const THANKS = [
  '✦ thank you, chat',
  '★ for the upvotes',
  '♥ for the bug reports',
  '✦ for the wild ideas',
  '⚡ for the late-night sessions',
  '★ for the unhinged feature requests',
  '♥ for sticking around',
  '✦ for letting us cook',
  '⚡ for keeping the streamer honest',
  '★ for one hundred reasons to build',
];
function buildTicker(){
  const t = $('#tickerTrack');
  // double the list so the marquee loops seamlessly
  const items = [...THANKS, ...THANKS];
  t.innerHTML = items.map((s, i) => {
    const cls = i % 3 === 0 ? 'gold' : (i % 3 === 1 ? 'cyan' : '');
    return `<span class="${cls}">${s}</span>`;
  }).join('');
}
buildTicker();

// ──────── boot ────────
// kick the counter once styles settle
setTimeout(() => animateCounter(101, 2520), 250);
// seed an initial rocket so the sky isn't empty
setTimeout(() => spawnRocket(W*0.5, H*0.32), 800);
// hide the "tap for sound" hint after 8s if user never engages
setTimeout(() => { if (!audioOn) $('#muteHint').classList.add('gone'); }, 8000);

// keyboard
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space'){ e.preventDefault(); launch(); if (!audioOn) setAudio(true); }
  else if (e.key === 'f' || e.key === 'F'){ grandFinale(); if (!audioOn) setAudio(true); }
  else if (e.key === 'm' || e.key === 'M'){ setAudio(!audioOn); }
});
</script>
