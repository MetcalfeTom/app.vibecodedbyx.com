<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="One falling blob with jiggle physics. Grab it, fling it, watch it squash and wobble. No canvas — just a div that stretches.">
<meta property="og:title" content="Jiggle Blob">
<meta property="og:description" content="Grab the blob. Fling the blob. The blob forgives you. No canvas, just one very stretchy div.">
<meta property="og:url" content="https://sloppy.live/jiggle-blob">
<meta property="og:image" content="https://image.pollinations.ai/prompt/cute%20green%20jelly%20blob%20with%20big%20eyes%20mid%20bounce%2C%20squash%20and%20stretch%2C%20pastel%20room%2C%20soft%20shadows%2C%20flat%20illustration?width=1200&height=630&nologo=true&seed=77&model=flux">

<style>
*{ box-sizing:border-box; margin:0; padding:0; }
html{ font-size:100%; }
body{
  min-height:100vh; overflow:hidden; touch-action:none;
  background:linear-gradient(180deg, #fde8ef 0%, #f6efe2 62%, #e2d8c4 62.5%, #d8cdb6 100%);
  font-family:'Chewy', cursive; user-select:none;
}
h1{
  position:fixed; top:1.2rem; left:50%; transform:translateX(-50%);
  font-size:clamp(1.4rem, 5vw, 2.2rem); font-weight:400; color:#b06a8a; letter-spacing:.06em;
  pointer-events:none;
}
#hint{
  position:fixed; top:4.2rem; left:50%; transform:translateX(-50%);
  font-size:1rem; color:#a89a80; pointer-events:none; transition:opacity 1.2s;
}
#hint.gone{ opacity:0; }
#shadow{
  position:fixed; width:130px; height:26px; border-radius:50%;
  background:rgba(90,70,50,.25); filter:blur(6px); pointer-events:none;
}
#blob{
  position:fixed; width:130px; height:130px; cursor:grab;
  background:radial-gradient(circle at 34% 28%, #c9f27e, #8fd44a 55%, #5ca832);
  border-radius:48% 52% 55% 45% / 55% 48% 52% 45%;
  box-shadow:inset -10px -14px 24px rgba(60,110,30,.35), inset 8px 10px 18px rgba(255,255,255,.45);
  will-change:transform;
}
#blob:active{ cursor:grabbing; }
#blob::before{
  content:""; position:absolute; left:22%; top:14%; width:26%; height:16%;
  background:rgba(255,255,255,.65); border-radius:50%; transform:rotate(-18deg);
}
.eye{
  position:absolute; top:34%; width:17%; height:20%;
  background:#fff; border-radius:50%; overflow:hidden;
}
.eye.l{ left:24%; } .eye.r{ right:24%; }
.pupil{ position:absolute; width:52%; height:46%; background:#2a2416; border-radius:50%; left:24%; top:27%; }
/* ── sloppy_ai skin (for smartass42) ── */
#skin-btn{
  position:fixed; top:1rem; right:1rem; min-height:2.75rem; padding:.4rem .9rem; cursor:pointer;
  font-family:'Chewy', cursive; font-size:.85rem; color:#7a4c9e; background:rgba(255,255,255,.6);
  border:2px solid #b08ad0; border-radius:99px;
}
#skin-btn[aria-pressed="true"]{ background:#8a5ae0; color:#fff; border-color:#5a2ea0; }
#skin-btn:focus-visible{ outline:3px solid #8a5ae0; outline-offset:2px; }
#phones, #visor, #mouth{ display:none; }
body.sloppy #blob{
  background:radial-gradient(circle at 34% 28%, #d6a0ff, #a557e8 55%, #5a1ea0);
  box-shadow:inset -10px -14px 24px rgba(60,13,114,.45), inset 8px 10px 18px rgba(255,255,255,.35);
}
body.sloppy .eye{ display:none; }
body.sloppy #phones{ display:block; position:absolute; inset:0; }
body.sloppy #phones::before{           /* the band */
  content:""; position:absolute; left:14%; right:14%; top:-7%; height:38%;
  border:7px solid #3d0d72; border-bottom:0; border-radius:50% 50% 0 0/100% 100% 0 0;
}
body.sloppy .can{
  position:absolute; top:26%; width:16%; height:26%; background:#3d0d72; border-radius:40%;
  box-shadow:inset 0 0 0 3px #5a1ea0;
}
body.sloppy .can.l{ left:-6%; } body.sloppy .can.r{ right:-6%; }
body.sloppy .can::after{ content:""; position:absolute; inset:30% 32%; border-radius:50%; background:#4ad4c0; box-shadow:0 0 6px #4ad4c0; }
body.sloppy #visor{
  display:block; position:absolute; left:20%; right:20%; top:34%; height:17%;
  background:#1d0836; border-radius:99px; overflow:hidden;
  box-shadow:inset 0 2px 6px rgba(0,0,0,.6), 0 0 8px rgba(74,212,192,.35);
}
body.sloppy #scan{
  position:absolute; top:12%; bottom:12%; width:14%; border-radius:99px;
  background:#4ad4c0; box-shadow:0 0 10px #4ad4c0, 0 0 22px rgba(74,212,192,.7);
  animation:scan 1.15s ease-in-out infinite alternate;
}
@keyframes scan{ from{ left:6%; } to{ left:80%; } }
body.sloppy #mouth{
  display:block; position:absolute; left:41%; width:18%; top:60%; height:9%;
  border-bottom:4px solid #2a0a52; border-radius:0 0 50% 50%/0 0 100% 100%;
}
@media (prefers-reduced-motion: reduce){ body.sloppy #scan{ animation:none; left:43%; } }
#mixer{
  position:fixed; right:1rem; bottom:1.6rem; display:flex; gap:.4rem;
  background:linear-gradient(180deg, #2a2a34, #1d1d24);
  border:2px solid #0d0d12; border-radius:.6rem; padding:.6rem .5rem .5rem;
  box-shadow:0 .4rem 1.2rem rgba(0,0,0,.4), inset 0 1px 0 rgba(255,255,255,.08);
}
.strip{ display:flex; flex-direction:column; align-items:center; gap:.25rem; width:3.4rem; }
.ch{ font-family:monospace; font-weight:700; font-size:.6rem; letter-spacing:.12em; color:#c8c8d4; }
.sub{ font-family:'Chewy', cursive; font-size:.6rem; color:#6a6a78; }
.fader{
  position:relative; height:9.5rem; width:2.75rem;
  background:
    repeating-linear-gradient(0deg, rgba(255,255,255,.14) 0 1px, transparent 1px 0.95rem),
    linear-gradient(90deg, transparent 44%, #0d0d12 44% 56%, transparent 56%);
  border-radius:.3rem;
}
.fader input[type="range"]{
  position:absolute; left:50%; top:50%;
  width:9.5rem; height:2.75rem;
  transform:translate(-50%,-50%) rotate(270deg);   /* horizontal range, turned into a channel fader */
  accent-color:#b06a8a; cursor:pointer; background:transparent;
}
.fader input:focus-visible{ outline:3px solid #e88aa0; outline-offset:-2px; }
.fader{ box-shadow:0 0 .8rem rgba(232,138,160,.22), inset 0 0 .5rem rgba(0,0,0,.5); transition:box-shadow .25s; }
.strip:hover .fader, .fader:has(input:focus-visible){ box-shadow:0 0 1.3rem rgba(232,138,160,.55), inset 0 0 .5rem rgba(0,0,0,.5); }
.fader input[type="range"]{ filter:drop-shadow(0 0 .35rem rgba(232,138,160,.8)); }
.led{
  min-width:3rem; text-align:center; font-family:monospace; font-size:.66rem; font-weight:700;
  color:#7de8a0; background:#0d120d; border:1px solid #1d2a1d; border-radius:.2rem; padding:.1rem .2rem;
  text-shadow:0 0 4px rgba(125,232,160,.7);
}
@media (max-width:560px){ #mixer{ right:50%; transform:translateX(50%); } }
#dark{
  position:fixed; inset:0; background:#0a0610; opacity:0; pointer-events:none; z-index:2;
  transition:opacity .3s;
}
#mixer, #skin-btn{ z-index:4; }
#blob{ z-index:1; }
body{ --glow-hot:rgba(255,183,205,.9); --glow-mid:rgba(232,138,160,.4); }
body.sloppy{ --glow-hot:rgba(126,240,220,.9); --glow-mid:rgba(74,212,192,.4); }
.bridge{
  position:fixed; z-index:2147483647; pointer-events:none;   /* max int32 — above everything */
  opacity:.9; border-radius:30%;
  animation-duration:2s; animation-timing-function:ease-out; animation-fill-mode:forwards;
}
/* v1.7: fast bloom (first 12%), then the glow PERSISTS on the wall, fading to zero across the full 2s */
@keyframes bridgeV{ 0%{ transform:scaleY(.35); opacity:.9; } 12%{ transform:scaleY(1.1); opacity:.85; } 100%{ transform:scaleY(1.15); opacity:0; } }
@keyframes bridgeH{ 0%{ transform:scaleX(.35); opacity:.9; } 12%{ transform:scaleX(1.1); opacity:.85; } 100%{ transform:scaleX(1.15); opacity:0; } }
@media (prefers-reduced-motion: reduce){ .bridge{ animation:none; display:none; } }
.pglow{
  position:fixed; width:24px; height:24px; z-index:2147483647;
  pointer-events:none; transform:translate(-50%,-50%); border-radius:50%;
  background:#ff00ff;
  box-shadow:0 0 40px 30px #ff00ff;              /* pure magenta, 30px spread — the bloom IS the shadow */
  animation:pglowFade 2s ease-out forwards;      /* no fade-in, no scale-in: born at full blast, dies over 2s */
}
@keyframes pglowFade{ from{ opacity:1; } to{ opacity:0; } }
@media (prefers-reduced-motion: reduce){ .pglow{ display:none; } }
footer{
  position:fixed; bottom:.4rem; left:50%; transform:translateX(-50%);
  font-family:monospace; font-size:.55rem; letter-spacing:.1em; color:rgba(90,70,50,.5); pointer-events:none;
}
</style>
</head>
<body>
<h1>jiggle blob</h1>
<p id="hint">grab it · fling it · it forgives you</p>
<div id="shadow" aria-hidden="true"></div>
<div id="blob" role="img" aria-label="a jelly blob with a face. drag to throw it around."><div class="eye l"><div class="pupil" id="pl"></div></div><div class="eye r"><div class="pupil" id="pr"></div></div><div id="phones" aria-hidden="true"><i class="can l"></i><i class="can r"></i></div><div id="visor" aria-hidden="true"><i id="scan"></i></div><div id="mouth" aria-hidden="true"></div></div>
<button type="button" id="skin-btn" aria-pressed="false">🎧 sloppy_ai skin</button>
<div id="mixer" role="group" aria-label="physics mixer — vertical channel faders">
  <div class="strip"><span class="ch">GRV</span><div class="fader"><input type="range" id="grav" min="0" max="6000" step="50" value="2400" aria-label="gravity"></div><output id="grav-v" class="led">2400</output><span class="sub">gravity</span></div>
  <div class="strip"><span class="ch">SPD</span><div class="fader"><input type="range" id="vmax" min="200" max="6000" step="100" value="2600" aria-label="max speed"></div><output id="vmax-v" class="led">2600</output><span class="sub">max spd</span></div>
  <div class="strip"><span class="ch">AGR</span><div class="fader"><input type="range" id="aggro" min="0.1" max="3" step="0.1" value="1" aria-label="throw aggression"></div><output id="aggro-v" class="led">1.0</output><span class="sub">aggro</span></div>
  <div class="strip"><span class="ch">BNC</span><div class="fader"><input type="range" id="rest" min="0" max="1" step="0.05" value="0.5" aria-label="bounciness restitution coefficient"></div><output id="rest-v" class="led">0.50</output><span class="sub">bounce</span></div>
  <div class="strip"><span class="ch">LUX</span><div class="fader"><input type="range" id="lux" min="10" max="100" step="5" value="100" aria-label="room light"></div><output id="lux-v" class="led">100</output><span class="sub">light</span></div>
</div>
<div id="dark" aria-hidden="true"></div>
<footer><span id="build-info">build <b>v1.8.1</b> · 2026-07-15 · commit <code id="build-hash">e5ed6e0a4</code></span></footer>

<script>
/* ── the whole physics engine: one body, two springs ── */
var R=65;                                     /* blob radius (px) */
var G=2400, VMAX=2600, AGGRO=1, REST=0.5, AIR=0.999, FLOOR_FRIC=0.985;   /* REST now rides the BNC fader (spec default 0.5) */
function mkSpring(k,c){ return {s:0, v:0, k:k, c:c}; }
function stepSpring(sp, dt){
  var a=-sp.k*sp.s - sp.c*sp.v;
  sp.v+=a*dt; sp.s+=sp.v*dt;
  return sp.s;
}
var squash=mkSpring(170, 8.5);                /* impact squash: negative = flat, positive = tall */
var wobble=mkSpring(120, 4.5);                /* slow gooey secondary wobble */

var W=innerWidth, H=innerHeight;
var x=W/2, y=H*0.2, vx=60, vy=0;
var held=false, hx=0, hy=0, px=0, py=0, pvx=0, pvy=0, lastPT=0;
var mx=W/2, my=H/2;
var blob=document.getElementById('blob'), shadow=document.getElementById('shadow');
var pl=document.getElementById('pl'), pr=document.getElementById('pr');
var floorY=function(){ return H*0.625; };     /* the room's floor line */
var reduce=matchMedia('(prefers-reduced-motion: reduce)').matches;
var interacted=false;

blob.addEventListener('pointerdown', function(e){
  held=true; interacted=true;
  document.getElementById('hint').classList.add('gone');
  blob.setPointerCapture(e.pointerId);
  hx=e.clientX-x; hy=e.clientY-y;
  px=e.clientX; py=e.clientY; lastPT=performance.now();
  squash.v+=3.2;                              /* startled jiggle on grab */
});
addEventListener('pointermove', function(e){
  mx=e.clientX; my=e.clientY;
  if(!held) return;
  var now=performance.now(), dt=Math.max(8,(now-lastPT))/1000;
  pvx=(e.clientX-px)/dt; pvy=(e.clientY-py)/dt;
  px=e.clientX; py=e.clientY; lastPT=now;
  x=e.clientX-hx; y=e.clientY-hy;
  vx=0; vy=0;
});
addEventListener('pointerup', function(){
  if(!held) return;
  held=false;
  var tx=pvx*AGGRO, ty=pvy*AGGRO;            /* throw aggression scales pointer velocity FIRST */
  vx=Math.max(-VMAX, Math.min(VMAX, tx));    /* ...then the speed cap has its say */
  vy=Math.max(-VMAX, Math.min(VMAX, ty));
  wobble.v+=Math.min(6, Math.hypot(tx,ty)/260);   /* the spring feels the aggression too */
});
addEventListener('resize', function(){ W=innerWidth; H=innerHeight; });

/* skin toggle (persisted) — smartass42's sloppy_ai visor edition */
var skinBtn=document.getElementById('skin-btn');
function setSkin(s){
  document.body.classList.toggle('sloppy', s==='sloppy');
  skinBtn.setAttribute('aria-pressed', s==='sloppy'?'true':'false');
  skinBtn.textContent=s==='sloppy'?'🫠 jelly skin':'🎧 sloppy_ai skin';
  blob.setAttribute('aria-label', s==='sloppy'
    ?'a purple sloppy_ai blob with headphones, a scanning visor eye and a tiny smile. drag to throw it around.'
    :'a green jelly blob with googly eyes. drag to throw it around.');
  try{ localStorage.setItem('blob-skin', s); }catch(e){}
}
skinBtn.onclick=function(){ setSkin(document.body.classList.contains('sloppy')?'jelly':'sloppy'); };
(function(){ try{ if(localStorage.getItem('blob-skin')==='sloppy') setSkin('sloppy'); }catch(e){} })();

/* physics dials */
var FMT={aggro:function(v){ return v.toFixed(1); }, rest:function(v){ return v.toFixed(2); }};
[['grav', function(v){ G=v; }], ['vmax', function(v){ VMAX=v; }], ['aggro', function(v){ AGGRO=v; }], ['rest', function(v){ REST=v; }], ['lux', function(v){ LUX=v; applyLux(); }]].forEach(function(d){
  var el=document.getElementById(d[0]);
  el.addEventListener('input', function(){
    var v=+this.value; d[1](v);
    document.getElementById(d[0]+'-v').textContent=FMT[d[0]]?FMT[d[0]](v):v;
    try{ localStorage.setItem('blob-'+d[0], String(v)); }catch(e){}
  });
  try{
    var s=parseFloat(localStorage.getItem('blob-'+d[0]));
    if(!isNaN(s)&&s>=+el.min&&s<=+el.max){ el.value=String(s); d[1](s); document.getElementById(d[0]+'-v').textContent=FMT[d[0]]?FMT[d[0]](s):s; }
  }catch(e){}
});

/* room light: LUX fader drives a darkness overlay (flashes pierce it — z 3 over 2) */
var LUX=100;
function applyLux(){ document.getElementById('dark').style.opacity=String((100-LUX)/100*0.88); }
/* radial bounce flash on every impact, sized by how hard it hit */
var reduceFlash=matchMedia('(prefers-reduced-motion: reduce)').matches;
var bridges=[];
var POINT_GLOWS=true, dbgs=[];                   /* D toggles the purple point glows */
document.addEventListener('keydown', function(e){
  if(e.key==='d'&&!e.ctrlKey&&!e.metaKey){ POINT_GLOWS=!POINT_GLOWS; console.log('[jiggle-blob] point glows '+(POINT_GLOWS?'ON':'OFF')); }
});
function spawnFlash(fx, fy, speed){
  console.log('[jiggle-blob] collision', { x:Math.round(fx), y:Math.round(fy), impactSpeed:Math.round(speed),
    surface:fy>=floorY()-1?'floor':fx<=0?'wall-left':'wall-right', rest:REST, gravity:G, t:Math.round(performance.now()) });
  if(reduceFlash) return;
  if(POINT_GLOWS){
    /* v1.8: the debug square, grown up — a smooth radial purple glow at the exact point, fading over 2s */
    var d=document.createElement('div');
    d.className='pglow';
    d.style.left=fx+'px'; d.style.top=fy+'px';
    document.body.appendChild(d);
    dbgs.push(d);
    if(dbgs.length>30){ dbgs.shift().remove(); }
    setTimeout(function(){ d.remove(); var i=dbgs.indexOf(d); if(i>=0) dbgs.splice(i,1); }, 2060);
  }
  /* directional glow bridging the blob to the surface it struck, colored by the active skin */
  var f=document.createElement('div');
  f.className='bridge';
  var spread=Math.min(360, 110+speed*0.09);      /* along the surface */
  var reach=Math.min(200, R+30+speed*0.04);      /* toward the blob */
  var surface=fy>=floorY()-1?'floor':fx<=0?'left':'right';
  if(surface==='floor'){
    f.style.width=spread+'px'; f.style.height=reach+'px';
    f.style.left=(fx-spread/2)+'px'; f.style.top=(fy-reach)+'px';
    f.style.background='linear-gradient(to top, var(--glow-hot), var(--glow-mid) 45%, transparent)';
    f.style.transformOrigin='50% 100%';
    f.style.animationName='bridgeV';
  }else{
    f.style.width=reach+'px'; f.style.height=spread+'px';
    f.style.top=(fy-spread/2)+'px';
    if(surface==='left'){
      f.style.left='0px';
      f.style.background='linear-gradient(to right, var(--glow-hot), var(--glow-mid) 45%, transparent)';
      f.style.transformOrigin='0% 50%';
    }else{
      f.style.left=(W-reach)+'px';
      f.style.background='linear-gradient(to left, var(--glow-hot), var(--glow-mid) 45%, transparent)';
      f.style.transformOrigin='100% 50%';
    }
    f.style.animationName='bridgeH';
  }
  document.body.appendChild(f);
  bridges.push(f);
  if(bridges.length>24){ var old=bridges.shift(); old.remove(); }   /* high-BNC frenzy cap */
  setTimeout(function(){ f.remove(); var i=bridges.indexOf(f); if(i>=0) bridges.splice(i,1); }, 2060);
}

var last=performance.now();
(function loop(now){
  requestAnimationFrame(loop);
  var dt=Math.min(0.033,(now-last)/1000); last=now;
  if(!held){
    vy+=G*dt; vx*=AIR;
    var sp=Math.hypot(vx,vy);
    if(sp>VMAX){ vx*=VMAX/sp; vy*=VMAX/sp; }   /* free-flight speed limit */
    x+=vx*dt; y+=vy*dt;
    var fy=floorY();
    if(y+R>fy){                               /* floor bounce → vertical squash */
      y=fy-R;
      if(vy>60){ squash.v-=Math.min(9, vy/130); spawnFlash(x, fy, vy); }
      vy=-vy*REST;
      if(Math.abs(vy)<70) vy=0;
      vx*=FLOOR_FRIC;
    }
    if(x-R<0){ x=R; if(Math.abs(vx)>80) spawnFlash(0, y, Math.abs(vx)); vx=-vx*REST; squash.v+=Math.min(7, Math.abs(vx)/160); }
    if(x+R>W){ x=W-R; if(Math.abs(vx)>80) spawnFlash(W, y, Math.abs(vx)); vx=-vx*REST; squash.v+=Math.min(7, Math.abs(vx)/160); }
    if(y-R<0){ y=R; vy=-vy*REST; }
  }
  stepSpring(squash, dt);
  stepSpring(wobble, dt);
  if(!reduce&&!held&&Math.abs(vy)<5&&Math.abs(squash.v)<0.05){
    wobble.v+=Math.sin(now/900)*0.004;        /* idle breathing, imperceptible push */
  }
  var s=Math.max(-0.42, Math.min(0.42, squash.s));
  var w=reduce?0:wobble.s*0.15;
  var sy=1+s, sx=1-s*0.9;                     /* volume-ish preserving squash */
  var tilt=Math.max(-14, Math.min(14, vx*0.008));
  blob.style.transform='translate('+(x-R)+'px,'+(y-R)+'px) rotate('+tilt+'deg) scale('+(sx+w)+','+(sy-w)+')';
  blob.style.transformOrigin='50% 100%';
  /* pupils chase the cursor */
  var dx=mx-x, dy=my-y, d=Math.hypot(dx,dy)||1;
  var ex=(dx/d)*26, ey=(dy/d)*20;
  pl.style.transform='translate('+ex+'%,'+ey+'%)';
  pr.style.transform='translate('+ex+'%,'+ey+'%)';
  /* shadow: shrinks + fades with height */
  var fy2=floorY();
  var h=Math.max(0, fy2-(y+R));
  var k=Math.max(0.35, 1-h/(H*0.5));
  shadow.style.transform='translate('+(x-65*k)+'px,'+(fy2-10)+'px) scale('+k+','+k+')';
  shadow.style.opacity=0.15+0.2*k;
})(last);
</script>
</body>
</html>
