<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Garden</title>
<link rel="icon" href="https://emojicdn.elk.sh/🌸">
<meta property="og:title" content="Neon Garden">
<meta property="og:description" content="Click to plant. Watch glowing flowers bloom in the dark.">
<meta property="og:url" content="https://app.sloppy.live/neon-garden/">
<meta property="og:image" content="https://emojicdn.elk.sh/🌸?style=google">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none}
html,body{height:100%;overflow:hidden}
body{background:#050508;touch-action:none}
canvas{display:block;position:fixed;inset:0}
#ui{
position:fixed;top:12px;left:50%;transform:translateX(-50%);
font-family:'Cormorant Garamond',serif;font-style:italic;
font-size:14px;color:rgba(180,160,200,0.4);
z-index:5;pointer-events:none;
text-align:center;letter-spacing:2px;
transition:opacity 2s;
}
#ui.fade{opacity:0}
.palette{
position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
display:flex;gap:8px;z-index:5;
}
.color-btn{
width:28px;height:28px;border-radius:50%;
border:2px solid rgba(255,255,255,0.1);
cursor:pointer;transition:all 0.2s;
box-shadow:0 0 8px rgba(0,0,0,0.5);
}
.color-btn:hover{transform:scale(1.2)}
.color-btn.active{border-color:rgba(255,255,255,0.5);transform:scale(1.15);box-shadow:0 0 12px var(--c)}
.clear-btn{
width:28px;height:28px;border-radius:50%;
border:2px solid rgba(255,255,255,0.1);
background:rgba(255,255,255,0.05);
cursor:pointer;font-size:12px;color:rgba(255,255,255,0.3);
display:flex;align-items:center;justify-content:center;
}
.clear-btn:hover{border-color:rgba(255,255,255,0.3)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">click anywhere to plant</div>
<div class="palette" id="palette"></div>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H;

const COLORS=[
  {name:'Orchid',h:290,s:100,l:70,color:'#d070ff'},
  {name:'Cyan',h:180,s:100,l:60,color:'#00e0e0'},
  {name:'Rose',h:340,s:100,l:70,color:'#ff5090'},
  {name:'Gold',h:45,s:100,l:60,color:'#e0b020'},
  {name:'Mint',h:150,s:90,l:60,color:'#30e080'},
  {name:'Coral',h:15,s:100,l:65,color:'#ff6830'},
  {name:'Ice',h:210,s:80,l:75,color:'#80b0ff'},
  {name:'White',h:0,s:0,l:90,color:'#e0e0e0'},
];

let selectedColor=0;
let plants=[];
let floatingPetals=[];
let audioCtx;
let planted=false;

function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}

function playGrow(pitch){
  initAudio();const t=audioCtx.currentTime;
  const base=300+pitch*80;
  [base,base*1.25,base*1.5].forEach((f,i)=>{
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='sine';o.frequency.value=f;
    g.gain.setValueAtTime(0.03,t+i*0.08);g.gain.exponentialRampToValueAtTime(0.001,t+i*0.08+0.3);
    o.connect(g);g.connect(audioCtx.destination);o.start(t+i*0.08);o.stop(t+i*0.08+0.3);
  });
}

function resize(){W=C.width=window.innerWidth;H=C.height=window.innerHeight}
window.addEventListener('resize',resize);
resize();

// Build palette
const palEl=document.getElementById('palette');
COLORS.forEach((c,i)=>{
  const btn=document.createElement('div');
  btn.className='color-btn'+(i===0?' active':'');
  btn.style.background=c.color;
  btn.style.setProperty('--c',c.color);
  btn.onclick=()=>{
    selectedColor=i;
    document.querySelectorAll('.color-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  };
  palEl.appendChild(btn);
});
const clearBtn=document.createElement('div');
clearBtn.className='clear-btn';clearBtn.textContent='×';
clearBtn.onclick=()=>{plants=[];floatingPetals=[]};
palEl.appendChild(clearBtn);

// Plant types
function createPlant(x,y,colorIdx){
  const c=COLORS[colorIdx];
  const type=Math.floor(Math.random()*5); // 0=tulip,1=rose,2=daisy,3=lily,4=orchid
  const maxH=60+Math.random()*80;
  const petalCount=type===2?8:type===4?3:5+Math.floor(Math.random()*3);
  const petalSize=8+Math.random()*12;

  return{
    x,y,colorIdx,
    hue:c.h,sat:c.s,lit:c.l,
    type,
    stemH:0,maxStemH:maxH,
    stemGrowth:0.4+Math.random()*0.3,
    bloomPhase:0,bloomed:false,bloomSpeed:0.008+Math.random()*0.005,
    petalCount,petalSize,
    swayPhase:Math.random()*Math.PI*2,
    swayAmp:0.02+Math.random()*0.02,
    leaves:[],
    glowPulse:Math.random()*Math.PI*2,
  };
}

function plantAt(mx,my){
  if(my<60)return;
  plants.push(createPlant(mx,my,selectedColor));
  playGrow(selectedColor);
  if(!planted){planted=true;document.getElementById('ui').classList.add('fade')}
}

C.addEventListener('click',e=>plantAt(e.clientX,e.clientY));
C.addEventListener('touchstart',e=>{
  e.preventDefault();
  const t=e.touches[0];
  plantAt(t.clientX,t.clientY);
},{passive:false});

function update(){
  for(const p of plants){
    // Grow stem
    if(p.stemH<p.maxStemH){
      p.stemH+=p.stemGrowth;
      // Spawn leaves as stem grows
      if(p.stemH>20&&p.leaves.length===0){
        p.leaves.push({h:0.3+Math.random()*0.2,side:-1,size:6+Math.random()*4});
      }
      if(p.stemH>p.maxStemH*0.5&&p.leaves.length===1){
        p.leaves.push({h:0.55+Math.random()*0.15,side:1,size:6+Math.random()*4});
      }
    }else if(!p.bloomed){
      // Bloom
      p.bloomPhase+=p.bloomSpeed;
      if(p.bloomPhase>=1){
        p.bloomed=true;p.bloomPhase=1;
        // Spawn celebratory petals
        for(let i=0;i<3;i++){
          floatingPetals.push({
            x:p.x,y:p.y-p.stemH,
            vx:(Math.random()-0.5)*1.5,vy:-0.5-Math.random(),
            life:60+Math.random()*60,
            hue:p.hue,size:3+Math.random()*3,
            rot:Math.random()*Math.PI*2,rotV:0.05*(Math.random()-0.5),
          });
        }
      }
    }

    p.swayPhase+=0.02;
    p.glowPulse+=0.03;
  }

  // Floating petals
  for(let i=floatingPetals.length-1;i>=0;i--){
    const p=floatingPetals[i];
    p.x+=p.vx+Math.sin(p.life*0.05)*0.3;
    p.y+=p.vy;p.vy+=0.01;
    p.rot+=p.rotV;p.life--;
    if(p.life<=0)floatingPetals.splice(i,1);
  }
}

function draw(){
  // Slight trail for dreamy feel
  X.fillStyle='rgba(5,5,8,0.15)';
  X.fillRect(0,0,W,H);

  // Ground line
  X.strokeStyle='rgba(80,60,100,0.08)';X.lineWidth=1;
  X.beginPath();
  // No ground line needed — plants root at click point

  // Draw plants back to front (sorted by y)
  const sorted=[...plants].sort((a,b)=>a.y-b.y);

  for(const p of sorted){
    drawPlant(p);
  }

  // Floating petals
  for(const fp of floatingPetals){
    X.save();
    X.translate(fp.x,fp.y);X.rotate(fp.rot);
    X.fillStyle=`hsla(${fp.hue},80%,70%,${Math.min(1,fp.life/30)*0.6})`;
    X.shadowColor=`hsla(${fp.hue},100%,60%,0.3)`;X.shadowBlur=4;
    X.beginPath();
    X.ellipse(0,0,fp.size,fp.size*0.5,0,0,Math.PI*2);
    X.fill();
    X.shadowBlur=0;
    X.restore();
  }
}

function drawPlant(p){
  const sway=Math.sin(p.swayPhase)*p.swayAmp;
  const glow=0.4+0.2*Math.sin(p.glowPulse);
  const hsl=`hsl(${p.hue},${p.sat}%,${p.lit}%)`;
  const hsla=`hsla(${p.hue},${p.sat}%,${p.lit}%,`;

  X.save();
  X.translate(p.x,p.y);

  // Stem
  const stemTop=-p.stemH;
  X.strokeStyle=`hsl(${(p.hue+60)%360},40%,25%)`;
  X.lineWidth=2;
  X.beginPath();
  X.moveTo(0,0);
  // Curved stem with sway
  const cp1x=sway*p.stemH*0.3;
  const cp1y=stemTop*0.4;
  const cp2x=sway*p.stemH*0.8;
  const cp2y=stemTop*0.7;
  const tipX=sway*p.stemH;
  const tipY=stemTop;
  X.bezierCurveTo(cp1x,cp1y,cp2x,cp2y,tipX,tipY);
  X.stroke();

  // Stem glow
  X.strokeStyle=`${hsla}${glow*0.15})`;
  X.lineWidth=6;X.stroke();

  // Leaves
  for(const leaf of p.leaves){
    const ly=stemTop*leaf.h;
    const lx=sway*p.stemH*leaf.h;
    X.save();
    X.translate(lx,ly);
    X.rotate(leaf.side*0.4+sway*2);
    X.fillStyle=`hsl(${(p.hue+60)%360},50%,30%)`;
    X.beginPath();
    X.moveTo(0,0);
    X.quadraticCurveTo(leaf.side*leaf.size*1.5,-leaf.size*0.5,leaf.side*leaf.size*2.5,0);
    X.quadraticCurveTo(leaf.side*leaf.size*1.5,leaf.size*0.5,0,0);
    X.fill();
    // Leaf glow
    X.fillStyle=`${hsla}${glow*0.1})`;
    X.fill();
    X.restore();
  }

  // Flower head
  if(p.stemH>=p.maxStemH){
    X.save();
    X.translate(tipX,tipY);
    X.rotate(sway*2);

    const bloom=p.bloomPhase;
    const radius=p.petalSize*bloom;

    // Glow aura
    X.shadowColor=`${hsla}${glow*0.5})`;
    X.shadowBlur=radius*1.5;

    // Petals
    for(let i=0;i<p.petalCount;i++){
      const angle=(i/p.petalCount)*Math.PI*2-Math.PI/2;
      X.save();
      X.rotate(angle);
      X.fillStyle=hsl;
      X.globalAlpha=0.7+0.3*bloom;

      if(p.type===0){
        // Tulip: tall narrow petals
        X.beginPath();
        X.moveTo(0,0);
        X.quadraticCurveTo(-radius*0.3,-radius*0.8,0,-radius);
        X.quadraticCurveTo(radius*0.3,-radius*0.8,0,0);
        X.fill();
      }else if(p.type===1){
        // Rose: layered round petals
        const layerR=radius*(0.6+0.4*((i%2)*0.5));
        X.beginPath();
        X.ellipse(0,-layerR*0.5,radius*0.35,layerR*0.5,0,0,Math.PI*2);
        X.fill();
      }else if(p.type===2){
        // Daisy: thin long petals
        X.beginPath();
        X.moveTo(0,0);
        X.bezierCurveTo(-radius*0.15,-radius*0.4,-radius*0.15,-radius*0.8,0,-radius);
        X.bezierCurveTo(radius*0.15,-radius*0.8,radius*0.15,-radius*0.4,0,0);
        X.fill();
      }else if(p.type===3){
        // Lily: wide flared petals
        X.beginPath();
        X.moveTo(0,0);
        X.quadraticCurveTo(-radius*0.5,-radius*0.6,0,-radius);
        X.quadraticCurveTo(radius*0.5,-radius*0.6,0,0);
        X.fill();
      }else{
        // Orchid: curved exotic petals
        X.beginPath();
        X.moveTo(0,0);
        X.bezierCurveTo(-radius*0.6,-radius*0.3,-radius*0.3,-radius,0,-radius*0.9);
        X.bezierCurveTo(radius*0.3,-radius,radius*0.6,-radius*0.3,0,0);
        X.fill();
      }
      X.globalAlpha=1;
      X.restore();
    }

    X.shadowBlur=0;

    // Center
    const centerR=radius*0.2+2;
    X.beginPath();X.arc(0,0,centerR,0,Math.PI*2);
    X.fillStyle=`hsl(${(p.hue+30)%360},${p.sat}%,${Math.min(90,p.lit+20)}%)`;
    X.fill();
    X.fillStyle=`${hsla}0.3)`;
    X.shadowColor=hsl;X.shadowBlur=centerR*3;
    X.fill();
    X.shadowBlur=0;

    X.restore();
  }

  X.restore();
}

function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
