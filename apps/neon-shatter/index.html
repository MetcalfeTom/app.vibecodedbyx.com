<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Neon Shatter</title>
<link rel="icon" href="https://emojicdn.elk.sh/💥">
<meta property="og:title" content="Neon Shatter">
<meta property="og:description" content="Chaotic physics playground. Spawn neon cubes, watch them collide and shatter into glowing shards.">
<meta property="og:url" content="https://app.sloppy.live/neon-shatter/">
<meta property="og:image" content="https://emojicdn.elk.sh/💥?style=google">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a12;overflow:hidden;font-family:'Share Tech Mono',monospace;cursor:crosshair;user-select:none}
canvas{display:block}
#ui{position:fixed;top:12px;left:12px;z-index:10;color:rgba(255,255,255,.5);font-size:11px;pointer-events:none}
#ui h1{font-family:'Oxanium',sans-serif;font-weight:700;font-size:22px;color:#fff;letter-spacing:2px;text-shadow:0 0 20px rgba(0,255,200,.4);margin-bottom:4px}
#ui p{margin-bottom:2px}
#controls{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);z-index:10;display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
#controls button{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.6);padding:8px 16px;border-radius:4px;font-family:'Share Tech Mono',monospace;font-size:12px;cursor:pointer;transition:all .15s}
#controls button:hover{background:rgba(255,255,255,.12);color:#fff;border-color:rgba(255,255,255,.3)}
#instructions{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:rgba(255,255,255,.25);font-size:14px;text-align:center;pointer-events:none;transition:opacity .5s;z-index:5}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
<h1>NEON SHATTER</h1>
<p id="stat-cubes">Cubes: 0</p>
<p id="stat-shards">Shards: 0</p>
</div>
<div id="instructions">Click or drag to spawn cubes<br>They shatter on hard impact</div>
<div id="controls">
<button id="btn-gravity">Gravity: ON</button>
<button id="btn-spawn5">Spawn 5</button>
<button id="btn-bomb">Bomb</button>
<button id="btn-clear">Clear</button>
</div>
<script>
const CV=document.getElementById('c'),X=CV.getContext('2d');
let W,H;
function resize(){W=CV.width=window.innerWidth;H=CV.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

const NEON_COLORS=[
  {h:160,s:'100%',l:'55%',glow:'rgba(0,255,180,.6)'},
  {h:280,s:'100%',l:'65%',glow:'rgba(180,80,255,.6)'},
  {h:340,s:'100%',l:'60%',glow:'rgba(255,60,120,.6)'},
  {h:45,s:'100%',l:'55%',glow:'rgba(255,200,0,.6)'},
  {h:200,s:'100%',l:'55%',glow:'rgba(0,180,255,.6)'},
  {h:120,s:'100%',l:'50%',glow:'rgba(0,255,80,.6)'},
  {h:15,s:'100%',l:'55%',glow:'rgba(255,120,30,.6)'},
];

function rndColor(){return NEON_COLORS[Math.floor(Math.random()*NEON_COLORS.length)];}

let gravity=true;
const G=800;
const RESTITUTION=0.55;
const FRICTION=0.998;
const SHATTER_VEL=320;
const MAX_CUBES=120;
const MAX_SHARDS=600;
const SHARD_LIFE=3.5;

let cubes=[];
let shards=[];
let sparks=[];

class Cube{
  constructor(x,y,vx,vy,size){
    this.x=x;this.y=y;
    this.vx=vx||0;this.vy=vy||0;
    this.size=size||(20+Math.random()*30);
    this.rot=Math.random()*Math.PI*2;
    this.rotV=(Math.random()-0.5)*4;
    this.col=rndColor();
    this.mass=this.size*this.size;
    this.hp=1+Math.floor(this.size/15);
    this.flash=0;
  }
  update(dt){
    if(gravity) this.vy+=G*dt;
    this.x+=this.vx*dt;
    this.y+=this.vy*dt;
    this.rot+=this.rotV*dt;
    this.vx*=FRICTION;
    this.vy*=FRICTION;
    this.flash=Math.max(0,this.flash-dt*4);
    let half=this.size/2;
    if(this.x-half<0){this.x=half;this.vx=Math.abs(this.vx)*RESTITUTION;this.rotV*=-0.8;}
    if(this.x+half>W){this.x=W-half;this.vx=-Math.abs(this.vx)*RESTITUTION;this.rotV*=-0.8;}
    if(this.y-half<0){this.y=half;this.vy=Math.abs(this.vy)*RESTITUTION;}
    if(this.y+half>H){this.y=H-half;this.vy=-Math.abs(this.vy)*RESTITUTION;this.rotV*=-0.5;
      this.vx*=0.98;
      if(Math.abs(this.vy)<20)this.vy=0;
    }
  }
  draw(){
    X.save();
    X.translate(this.x,this.y);
    X.rotate(this.rot);
    let s=this.size/2;
    let hsl='hsl('+this.col.h+','+this.col.s+','+this.col.l+')';
    let hslBright='hsl('+this.col.h+','+this.col.s+',80%)';
    X.shadowColor=this.col.glow;
    X.shadowBlur=12+this.flash*30;
    let f=this.flash;
    X.fillStyle=f>0?'hsl('+this.col.h+',100%,'+(55+f*40)+'%)':hsl;
    X.fillRect(-s,-s,this.size,this.size);
    X.shadowBlur=0;
    X.strokeStyle=hslBright;
    X.lineWidth=1.5;
    X.strokeRect(-s,-s,this.size,this.size);
    X.strokeStyle='hsla('+this.col.h+',100%,85%,.15)';
    X.lineWidth=0.5;
    X.strokeRect(-s*0.6,-s*0.6,this.size*0.6,this.size*0.6);
    X.restore();
  }
}

class Shard{
  constructor(x,y,vx,vy,col,size){
    this.x=x;this.y=y;
    this.vx=vx;this.vy=vy;
    this.col=col;
    this.size=size||(2+Math.random()*5);
    this.rot=Math.random()*Math.PI*2;
    this.rotV=(Math.random()-0.5)*12;
    this.life=SHARD_LIFE*(0.6+Math.random()*0.4);
    this.maxLife=this.life;
    this.pts=[];
    let n=3;
    for(let i=0;i<n;i++){
      let a=(Math.PI*2/n)*i+Math.random()*0.6;
      let r=this.size*(0.5+Math.random()*0.5);
      this.pts.push({x:Math.cos(a)*r,y:Math.sin(a)*r});
    }
  }
  update(dt){
    if(gravity) this.vy+=G*0.8*dt;
    this.x+=this.vx*dt;
    this.y+=this.vy*dt;
    this.rot+=this.rotV*dt;
    this.life-=dt;
    if(this.y>H-2){this.y=H-2;this.vy*=-0.4;this.vx*=0.9;}
    if(this.x<0||this.x>W)this.life=0;
  }
  draw(){
    let alpha=Math.max(0,this.life/this.maxLife);
    X.save();
    X.translate(this.x,this.y);
    X.rotate(this.rot);
    X.globalAlpha=alpha;
    X.shadowColor=this.col.glow;
    X.shadowBlur=6*alpha;
    X.fillStyle='hsl('+this.col.h+','+this.col.s+','+this.col.l+')';
    X.beginPath();
    X.moveTo(this.pts[0].x,this.pts[0].y);
    for(let i=1;i<this.pts.length;i++) X.lineTo(this.pts[i].x,this.pts[i].y);
    X.closePath();
    X.fill();
    X.globalAlpha=1;
    X.restore();
  }
}

class Spark{
  constructor(x,y,vx,vy,col){
    this.x=x;this.y=y;this.vx=vx;this.vy=vy;
    this.col=col;
    this.life=0.3+Math.random()*0.4;
    this.maxLife=this.life;
    this.size=1+Math.random()*2;
  }
  update(dt){
    this.x+=this.vx*dt;this.y+=this.vy*dt;
    this.life-=dt;
    this.vx*=0.96;this.vy*=0.96;
  }
  draw(){
    let a=Math.max(0,this.life/this.maxLife);
    X.globalAlpha=a;
    X.shadowColor=this.col.glow;
    X.shadowBlur=8*a;
    X.fillStyle='hsl('+this.col.h+',100%,80%)';
    X.fillRect(this.x-this.size/2,this.y-this.size/2,this.size,this.size);
    X.globalAlpha=1;
    X.shadowBlur=0;
  }
}

function shatterCube(cube,impactVx,impactVy){
  let count=6+Math.floor(cube.size/4);
  let speed=150+Math.random()*200;
  for(let i=0;i<count&&shards.length<MAX_SHARDS;i++){
    let a=Math.random()*Math.PI*2;
    let sp=speed*(0.3+Math.random()*0.7);
    let vx=Math.cos(a)*sp+impactVx*0.3;
    let vy=Math.sin(a)*sp+impactVy*0.3;
    shards.push(new Shard(cube.x,cube.y,vx,vy,cube.col,2+Math.random()*cube.size*0.2));
  }
  let sparkCount=10+Math.floor(cube.size/3);
  for(let i=0;i<sparkCount;i++){
    let a=Math.random()*Math.PI*2;
    let sp=(200+Math.random()*400);
    sparks.push(new Spark(cube.x,cube.y,Math.cos(a)*sp+impactVx*0.2,Math.sin(a)*sp+impactVy*0.2,cube.col));
  }
  shakeAmount=Math.min(shakeAmount+cube.size*0.15,20);
}

let shakeAmount=0;

function collideCubes(a,b){
  let dx=b.x-a.x,dy=b.y-a.y;
  let dist=Math.sqrt(dx*dx+dy*dy);
  let minDist=(a.size+b.size)/2*0.85;
  if(dist<minDist&&dist>0.01){
    let nx=dx/dist,ny=dy/dist;
    let dvx=a.vx-b.vx,dvy=a.vy-b.vy;
    let dvn=dvx*nx+dvy*ny;
    if(dvn>0){
      let relSpeed=Math.abs(dvn);
      let totalMass=a.mass+b.mass;
      let impulse=2*dvn/totalMass;
      a.vx-=impulse*b.mass*nx*RESTITUTION;
      a.vy-=impulse*b.mass*ny*RESTITUTION;
      b.vx+=impulse*a.mass*nx*RESTITUTION;
      b.vy+=impulse*a.mass*ny*RESTITUTION;
      let overlap=(minDist-dist)/2+1;
      a.x-=nx*overlap;a.y-=ny*overlap;
      b.x+=nx*overlap;b.y+=ny*overlap;
      a.rotV+=(Math.random()-0.5)*relSpeed*0.005;
      b.rotV+=(Math.random()-0.5)*relSpeed*0.005;
      a.flash=Math.min(1,relSpeed/SHATTER_VEL);
      b.flash=Math.min(1,relSpeed/SHATTER_VEL);
      let cx=(a.x+b.x)/2,cy=(a.y+b.y)/2;
      let sc=Math.floor(relSpeed/80);
      for(let i=0;i<sc&&sparks.length<2000;i++){
        let ang=Math.random()*Math.PI*2;
        let sp=60+Math.random()*relSpeed*0.5;
        sparks.push(new Spark(cx,cy,Math.cos(ang)*sp,Math.sin(ang)*sp,a.col));
      }
      if(relSpeed>SHATTER_VEL){
        let impVx=(a.vx-b.vx)*0.5,impVy=(a.vy-b.vy)*0.5;
        if(relSpeed>SHATTER_VEL*1.8){
          a.hp--;b.hp--;
          if(a.hp<=0)shatterCube(a,impVx,impVy);
          if(b.hp<=0)shatterCube(b,-impVx,-impVy);
        } else {
          let target=a.size<=b.size?a:b;
          let dir=a.size<=b.size?1:-1;
          target.hp--;
          if(target.hp<=0)shatterCube(target,impVx*dir,impVy*dir);
        }
      }
    }
  }
}

function spawnCube(x,y,vx,vy){
  if(cubes.length>=MAX_CUBES) cubes.shift();
  cubes.push(new Cube(x,y,vx||0,vy||0));
  instructionsFade=true;
}

function spawnBomb(){
  let bx=W/2,by=H/2;
  let force=600;
  cubes.forEach(function(c){
    let dx=c.x-bx,dy=c.y-by;
    let dist=Math.max(50,Math.sqrt(dx*dx+dy*dy));
    let f=force*300/dist;
    c.vx+=dx/dist*f;
    c.vy+=dy/dist*f;
  });
  for(let i=0;i<60;i++){
    let a=Math.random()*Math.PI*2;
    let sp=200+Math.random()*500;
    sparks.push(new Spark(bx,by,Math.cos(a)*sp,Math.sin(a)*sp,rndColor()));
  }
  shakeAmount=Math.min(shakeAmount+15,25);
}

// Input
let mouseDown=false,mouseX=0,mouseY=0,lastMX=0,lastMY=0;
let dragSpawnTimer=0;
let instructionsFade=false;

CV.addEventListener('mousedown',function(e){mouseDown=true;mouseX=e.clientX;mouseY=e.clientY;lastMX=mouseX;lastMY=mouseY;
  spawnCube(mouseX,mouseY,(Math.random()-0.5)*100,(Math.random()-0.5)*100-100);
});
CV.addEventListener('mousemove',function(e){mouseX=e.clientX;mouseY=e.clientY;});
CV.addEventListener('mouseup',function(){mouseDown=false;dragSpawnTimer=0;});

CV.addEventListener('touchstart',function(e){e.preventDefault();mouseDown=true;var t=e.touches[0];mouseX=t.clientX;mouseY=t.clientY;lastMX=mouseX;lastMY=mouseY;
  spawnCube(mouseX,mouseY,(Math.random()-0.5)*100,-150);
},{passive:false});
CV.addEventListener('touchmove',function(e){e.preventDefault();var t=e.touches[0];mouseX=t.clientX;mouseY=t.clientY;},{passive:false});
CV.addEventListener('touchend',function(e){e.preventDefault();mouseDown=false;dragSpawnTimer=0;},{passive:false});

// Buttons
document.getElementById('btn-gravity').onclick=function(){
  gravity=!gravity;
  this.textContent='Gravity: '+(gravity?'ON':'OFF');
};
document.getElementById('btn-spawn5').onclick=function(){
  for(var i=0;i<5;i++){
    var x=W*0.2+Math.random()*W*0.6;
    spawnCube(x,50,(Math.random()-0.5)*300,-200-Math.random()*300);
  }
};
document.getElementById('btn-bomb').onclick=spawnBomb;
document.getElementById('btn-clear').onclick=function(){cubes=[];shards=[];sparks=[];};

function drawGrid(){
  X.strokeStyle='rgba(255,255,255,.02)';
  X.lineWidth=0.5;
  var gs=60;
  for(var x=0;x<W;x+=gs){X.beginPath();X.moveTo(x,0);X.lineTo(x,H);X.stroke();}
  for(var y=0;y<H;y+=gs){X.beginPath();X.moveTo(0,y);X.lineTo(W,y);X.stroke();}
}

var lastTime=0;
var instrEl=document.getElementById('instructions');

function loop(time){
  var dt=Math.min((time-lastTime)/1000,0.033);
  lastTime=time;

  if(mouseDown){
    dragSpawnTimer+=dt;
    if(dragSpawnTimer>0.12){
      dragSpawnTimer=0;
      var vx=(mouseX-lastMX)*3;
      var vy=(mouseY-lastMY)*3;
      spawnCube(mouseX,mouseY,vx,vy);
      lastMX=mouseX;lastMY=mouseY;
    }
  }

  cubes.forEach(function(c){c.update(dt);});

  for(var i=0;i<cubes.length;i++){
    for(var j=i+1;j<cubes.length;j++){
      collideCubes(cubes[i],cubes[j]);
    }
  }
  cubes=cubes.filter(function(c){return c.hp>0;});

  shards.forEach(function(s){s.update(dt);});
  shards=shards.filter(function(s){return s.life>0;});

  sparks.forEach(function(s){s.update(dt);});
  sparks=sparks.filter(function(s){return s.life>0;});

  shakeAmount*=Math.max(0,1-dt*8);
  if(shakeAmount<0.1)shakeAmount=0;

  X.save();
  if(shakeAmount>0){
    X.translate((Math.random()-0.5)*shakeAmount*2,(Math.random()-0.5)*shakeAmount*2);
  }

  X.fillStyle='rgba(10,10,18,.35)';
  X.fillRect(0,0,W,H);

  drawGrid();
  shards.forEach(function(s){s.draw();});
  sparks.forEach(function(s){s.draw();});
  X.shadowBlur=0;
  cubes.forEach(function(c){c.draw();});
  X.shadowBlur=0;

  X.restore();

  document.getElementById('stat-cubes').textContent='Cubes: '+cubes.length;
  document.getElementById('stat-shards').textContent='Shards: '+shards.length;

  if(instructionsFade&&instrEl){
    instrEl.style.opacity='0';
    setTimeout(function(){if(instrEl)instrEl.remove();instrEl=null;},600);
    instructionsFade=false;
  }

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
