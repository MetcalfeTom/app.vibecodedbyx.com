<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>Tickle-Blocker</title>
<link rel="icon" href="https://emojicdn.elk.sh/🛡️">
<meta property="og:title" content="Tickle-Blocker">
<meta property="og:description" content="The world's most advanced tickle defense system. No tickle shall pass.">
<meta property="og:url" content="https://sloppy.live/tickle-blocker">
<meta property="og:image" content="https://emojicdn.elk.sh/🛡️?style=apple&size=512">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=VT323&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#06060e;user-select:none;touch-action:none}
body{display:flex;flex-direction:column;align-items:center;justify-content:center}
canvas{position:absolute;inset:0;width:100%;height:100%}

#ui{position:relative;z-index:5;display:flex;flex-direction:column;align-items:center;pointer-events:none}
h1{
  font-family:'Bungee Shade',cursive;font-size:clamp(22px,5vw,42px);
  color:#0ff;text-shadow:0 0 20px #0ff,0 0 40px rgba(0,255,255,0.3);
  letter-spacing:2px;margin-bottom:4px;text-align:center;
}
#subtitle{font-family:'VT323',monospace;font-size:clamp(14px,2.5vw,20px);color:rgba(0,255,255,0.3);margin-bottom:16px}
#status-box{
  border:1px solid rgba(0,255,255,0.15);border-radius:8px;
  background:rgba(0,20,30,0.6);padding:14px 24px;
  text-align:center;min-width:260px;
}
#shield-status{
  font-family:'VT323',monospace;font-size:28px;
  color:#0f0;text-shadow:0 0 10px #0f0;
  margin-bottom:6px;
}
#shield-status.breached{color:#f44;text-shadow:0 0 10px #f44}
#threat-level{font-family:'VT323',monospace;font-size:14px;color:rgba(255,255,255,0.3)}
#log-box{
  margin-top:12px;width:min(320px,85vw);max-height:140px;overflow-y:auto;
  border:1px solid rgba(0,255,255,0.06);border-radius:4px;
  background:rgba(0,0,0,0.3);padding:6px 8px;
}
.log-entry{
  font-family:'VT323',monospace;font-size:13px;
  color:rgba(0,255,255,0.35);line-height:1.5;
}
.log-entry.blocked{color:rgba(255,60,60,0.6)}
.log-entry.allowed{color:rgba(0,255,100,0.5)}
#stats{
  margin-top:10px;font-family:'VT323',monospace;font-size:13px;
  color:rgba(255,255,255,0.2);display:flex;gap:16px;
}
#toggle-btn{
  margin-top:14px;pointer-events:auto;
  font-family:'VT323',monospace;font-size:18px;
  padding:10px 28px;border:2px solid rgba(0,255,255,0.3);
  background:rgba(0,255,255,0.05);color:#0ff;border-radius:6px;
  cursor:pointer;letter-spacing:2px;transition:all .2s;
}
#toggle-btn:hover{background:rgba(0,255,255,0.12);box-shadow:0 0 15px rgba(0,255,255,0.2)}
#toggle-btn.danger{border-color:rgba(255,60,60,0.4);color:#f44;background:rgba(255,60,60,0.05)}
#toggle-btn.danger:hover{background:rgba(255,60,60,0.12)}
a#back{position:fixed;bottom:8px;left:8px;font-size:9px;opacity:0.12;color:#888;text-decoration:none;z-index:10}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="ui">
  <h1>TICKLE-BLOCKER</h1>
  <div id="subtitle">ADVANCED TICKLE DEFENSE SYSTEM v4.2.0</div>
  <div id="status-box">
    <div id="shield-status">SHIELD ACTIVE</div>
    <div id="threat-level">THREAT LEVEL: LOW</div>
  </div>
  <div id="log-box"></div>
  <div id="stats">
    <span>BLOCKED: <span id="blocked-count">0</span></span>
    <span>TICKLES/MIN: <span id="tpm">0</span></span>
    <span>UPTIME: <span id="uptime">00:00</span></span>
  </div>
  <button id="toggle-btn">DISABLE SHIELD</button>
</div>

<a id="back" href="https://sloppy.live">sloppy.live</a>

<script>
(function(){
'use strict';

var canvas=document.getElementById('c');
var ctx=canvas.getContext('2d');
var W,H;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
resize();
window.addEventListener('resize',resize);

var time=0;
var shieldActive=true;
var blocked=0;
var tickleLog=[];
var startTime=Date.now();
var recentBlocks=[];

// Tickle threats
var TICKLE_TYPES=[
  'FEATHER ATTACK','BELLY POKE','ARMPIT WIGGLE','FOOT TICKLE',
  'NECK NUZZLE','RIBS ASSAULT','KNEE SQUEEZE','EAR WHISPER',
  'ELBOW TICKLE','CHIN WIGGLE','TUMMY RASPBERRY','SIDE POKE',
  'TOE WIGGLE ATTACK','NOSE BOOP','TICKLE MONSTER','GIGGLEBOMB',
  'PILLOW FIGHT TICKLE','SNEAK TICKLE','SPIDER CRAWL','BUTTERFLY KISS',
  'THE CLAW','TICKLE TORNADO','MEGA WIGGLE','STEALTH POKE',
  'DOUBLE ARMPIT','TACTICAL TICKLE','PRECISION POKE','CHAOS TICKLE'
];

var SOURCES=[
  '192.168.1.'+Math.floor(Math.random()*255),
  '10.0.0.'+Math.floor(Math.random()*255),
  'tickle.monster.net','feather.factory.io',
  'giggles.darkweb.onion','poke.central.com',
  'wiggle.server.ru','ticklecraft.exe',
  'the-claw.local','sneaky-fingers.net',
  'lol-attack.cn','hehe-botnet.xyz'
];

var RESPONSES_BLOCKED=[
  'NEUTRALIZED','DEFLECTED','DESTROYED','VAPORIZED',
  'YEETED INTO VOID','SENT TO SHADOW REALM','RETURNED TO SENDER',
  'BLOCKED & MOCKED','COUNTER-TICKLED','OBLITERATED',
  'DENIED WITH PREJUDICE','NOPE\'D','FIREWALL LAUGHED AT IT'
];

var RESPONSES_BREACH=[
  'BREACH! HAHAHA!','TICKLE DETECTED!','SHIELD COMPROMISED!',
  'WARNING: GIGGLING DETECTED','DEFENSES DOWN — LAUGHTER IMMINENT',
  'CRITICAL: TICKLE PENETRATION','ABORT! ABORT! *giggles*'
];

// Incoming tickle particles
var threats=[];
var shieldPulse=0;
var shieldHits=[];

function addLog(msg,type){
  tickleLog.unshift({msg:msg,type:type,time:Date.now()});
  if(tickleLog.length>50)tickleLog.pop();
  renderLog();
}

function renderLog(){
  var box=document.getElementById('log-box');
  box.innerHTML='';
  var show=tickleLog.slice(0,12);
  show.forEach(function(entry){
    var div=document.createElement('div');
    div.className='log-entry '+(entry.type||'');
    div.textContent='> '+entry.msg;
    box.appendChild(div);
  });
}

function spawnThreat(){
  var angle=Math.random()*Math.PI*2;
  var dist=Math.max(W,H)*0.6;
  threats.push({
    x:W/2+Math.cos(angle)*dist,
    y:H/2+Math.sin(angle)*dist,
    tx:W/2+(Math.random()-0.5)*60,
    ty:H/2+(Math.random()-0.5)*60,
    speed:1.5+Math.random()*2,
    size:4+Math.random()*4,
    hue:Math.random()*360,
    type:TICKLE_TYPES[Math.floor(Math.random()*TICKLE_TYPES.length)],
    source:SOURCES[Math.floor(Math.random()*SOURCES.length)],
    alive:true
  });
}

function blockThreat(t){
  blocked++;
  recentBlocks.push(Date.now());
  shieldPulse=1;
  shieldHits.push({angle:Math.atan2(t.y-H/2,t.x-W/2),life:1});
  var resp=RESPONSES_BLOCKED[Math.floor(Math.random()*RESPONSES_BLOCKED.length)];
  addLog(t.type+' from '+t.source+' — '+resp,'blocked');
}

function breachThreat(t){
  var resp=RESPONSES_BREACH[Math.floor(Math.random()*RESPONSES_BREACH.length)];
  addLog(t.type+' from '+t.source+' — '+resp,'allowed');
}

// Shield drawing
function drawShield(cx,cy,radius){
  ctx.save();
  // Outer glow ring
  var grad=ctx.createRadialGradient(cx,cy,radius*0.85,cx,cy,radius*1.15);
  if(shieldActive){
    grad.addColorStop(0,'rgba(0,255,255,0)');
    grad.addColorStop(0.5,'rgba(0,255,255,'+(0.06+shieldPulse*0.15)+')');
    grad.addColorStop(1,'rgba(0,255,255,0)');
  }else{
    grad.addColorStop(0,'rgba(255,60,60,0)');
    grad.addColorStop(0.5,'rgba(255,60,60,0.04)');
    grad.addColorStop(1,'rgba(255,60,60,0)');
  }
  ctx.fillStyle=grad;
  ctx.beginPath();ctx.arc(cx,cy,radius*1.15,0,Math.PI*2);ctx.fill();

  // Hex grid pattern on shield
  if(shieldActive){
    ctx.strokeStyle='rgba(0,255,255,'+(0.04+shieldPulse*0.08)+')';
    ctx.lineWidth=0.5;
    var hexSize=20;
    for(var a=0;a<Math.PI*2;a+=0.15){
      for(var d=hexSize;d<radius;d+=hexSize*1.7){
        var hx=cx+Math.cos(a+time*0.1)*d;
        var hy=cy+Math.sin(a+time*0.1)*d;
        var dx=hx-cx,dy=hy-cy;
        if(dx*dx+dy*dy>radius*radius*0.95)continue;
        ctx.beginPath();
        for(var i=0;i<6;i++){
          var ha=i*Math.PI/3;
          var px=hx+Math.cos(ha)*hexSize*0.4;
          var py=hy+Math.sin(ha)*hexSize*0.4;
          if(i===0)ctx.moveTo(px,py);else ctx.lineTo(px,py);
        }
        ctx.closePath();ctx.stroke();
      }
    }
  }

  // Shield border
  ctx.beginPath();ctx.arc(cx,cy,radius,0,Math.PI*2);
  ctx.strokeStyle=shieldActive?'rgba(0,255,255,'+(0.15+shieldPulse*0.3)+')':'rgba(255,60,60,0.08)';
  ctx.lineWidth=2;
  ctx.shadowColor=shieldActive?'#0ff':'#f44';
  ctx.shadowBlur=shieldActive?15+shieldPulse*20:5;
  ctx.stroke();

  // Hit flashes
  for(var i=shieldHits.length-1;i>=0;i--){
    var h=shieldHits[i];
    h.life-=0.03;
    if(h.life<=0){shieldHits.splice(i,1);continue}
    ctx.save();
    ctx.globalAlpha=h.life;
    var hx2=cx+Math.cos(h.angle)*radius;
    var hy2=cy+Math.sin(h.angle)*radius;
    var ig=ctx.createRadialGradient(hx2,hy2,0,hx2,hy2,30);
    ig.addColorStop(0,'rgba(0,255,255,0.6)');
    ig.addColorStop(1,'rgba(0,255,255,0)');
    ctx.fillStyle=ig;
    ctx.beginPath();ctx.arc(hx2,hy2,30,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  ctx.restore();
}

function update(){
  time+=0.016;
  shieldPulse*=0.95;

  // Random threat spawning
  if(Math.random()<0.03+blocked*0.0002){
    spawnThreat();
  }

  var cx=W/2,cy=H/2;
  var shieldR=Math.min(W,H)*0.22;

  for(var i=threats.length-1;i>=0;i--){
    var t=threats[i];
    var dx=t.tx-t.x,dy=t.ty-t.y;
    var dist=Math.sqrt(dx*dx+dy*dy);
    if(dist>1){
      t.x+=dx/dist*t.speed;
      t.y+=dy/dist*t.speed;
    }

    // Check if reached shield
    var sx=t.x-cx,sy=t.y-cy;
    var sd=Math.sqrt(sx*sx+sy*sy);
    if(sd<shieldR+10){
      if(shieldActive){
        blockThreat(t);
      }else{
        breachThreat(t);
      }
      threats.splice(i,1);
      continue;
    }

    // Off screen cleanup
    if(t.x<-50||t.x>W+50||t.y<-50||t.y>H+50){
      threats.splice(i,1);
    }
  }

  // TPM calculation
  var now=Date.now();
  recentBlocks=recentBlocks.filter(function(t){return now-t<60000});
  document.getElementById('tpm').textContent=recentBlocks.length;

  // Threat level
  var tl=document.getElementById('threat-level');
  if(recentBlocks.length<5)tl.textContent='THREAT LEVEL: LOW';
  else if(recentBlocks.length<15)tl.textContent='THREAT LEVEL: MODERATE';
  else if(recentBlocks.length<30)tl.textContent='THREAT LEVEL: HIGH';
  else tl.textContent='THREAT LEVEL: EXTREME — TICKLE STORM!';

  // Uptime
  var elapsed=Math.floor((now-startTime)/1000);
  var mm=String(Math.floor(elapsed/60)).padStart(2,'0');
  var ss=String(elapsed%60).padStart(2,'0');
  document.getElementById('uptime').textContent=mm+':'+ss;
  document.getElementById('blocked-count').textContent=blocked;
}

function render(){
  ctx.fillStyle='rgba(6,6,14,0.15)';
  ctx.fillRect(0,0,W,H);

  var cx=W/2,cy=H/2;
  var shieldR=Math.min(W,H)*0.22;

  // Grid background
  ctx.strokeStyle='rgba(0,255,255,0.015)';
  ctx.lineWidth=0.5;
  var gridS=40;
  for(var x=0;x<W;x+=gridS){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke()}
  for(var y=0;y<H;y+=gridS){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}

  // Threats
  for(var i=0;i<threats.length;i++){
    var t=threats[i];
    ctx.save();
    ctx.fillStyle='hsla('+t.hue+',100%,60%,0.7)';
    ctx.shadowColor='hsla('+t.hue+',100%,60%,0.5)';
    ctx.shadowBlur=8;
    ctx.beginPath();ctx.arc(t.x,t.y,t.size,0,Math.PI*2);ctx.fill();
    // Trail
    var dx=t.tx-t.x,dy=t.ty-t.y;
    var d=Math.sqrt(dx*dx+dy*dy);
    if(d>1){
      ctx.globalAlpha=0.2;
      ctx.beginPath();
      ctx.moveTo(t.x,t.y);
      ctx.lineTo(t.x-dx/d*12,t.y-dy/d*12);
      ctx.strokeStyle='hsla('+t.hue+',100%,60%,0.4)';
      ctx.lineWidth=2;ctx.stroke();
    }
    ctx.restore();
  }

  // Shield
  drawShield(cx,cy,shieldR);

  // Center icon
  ctx.save();
  ctx.font=(shieldActive?'36':'32')+'px serif';
  ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.globalAlpha=shieldActive?0.6:0.2;
  ctx.fillText(shieldActive?'🛡️':'💀',cx,cy);
  ctx.restore();
}

function frame(){
  update();
  render();
  requestAnimationFrame(frame);
}

// Toggle
var statusEl=document.getElementById('shield-status');
var toggleBtn=document.getElementById('toggle-btn');

toggleBtn.addEventListener('click',function(){
  shieldActive=!shieldActive;
  if(shieldActive){
    statusEl.textContent='SHIELD ACTIVE';
    statusEl.classList.remove('breached');
    toggleBtn.textContent='DISABLE SHIELD';
    toggleBtn.classList.remove('danger');
    addLog('SHIELD RE-ENGAGED — tickles shall not pass','');
  }else{
    statusEl.textContent='SHIELD DOWN — VULNERABLE!';
    statusEl.classList.add('breached');
    toggleBtn.textContent='ENABLE SHIELD';
    toggleBtn.classList.add('danger');
    addLog('WARNING: SHIELD DISABLED — YOU FOOL!','allowed');
  }
});

addLog('Tickle-Blocker v4.2.0 initialized','');
addLog('Scanning for incoming tickle threats...','');

frame();

})();
</script>
<script src="/sloppy-header/sloppy-bar.js"></script>
</body>
</html>
