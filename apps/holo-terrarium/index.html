<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Holo Terrarium — Digital Ecosystem</title>
<link rel="icon" href="https://emojicdn.elk.sh/🪴">
<meta property="og:title" content="Holo Terrarium">
<meta property="og:description" content="A holographic glass jar with glowing moss and code-fragment fireflies.">
<meta property="og:url" content="https://sloppy.live/holo-terrarium">
<meta property="og:image" content="https://sloppy.live/holo-terrarium/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Megrim&family=IBM+Plex+Mono:wght@300;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#040608;overflow:hidden;font-family:'IBM Plex Mono',monospace;
  width:100vw;height:100vh;display:flex;align-items:center;justify-content:center;user-select:none}
canvas{display:block;position:absolute;top:0;left:0}
#title{position:fixed;top:16px;left:50%;transform:translateX(-50%);
  font-family:'Megrim',cursive;font-size:clamp(20px,4vw,36px);
  color:rgba(100,255,180,0.5);letter-spacing:6px;z-index:10;
  text-shadow:0 0 30px rgba(80,255,160,0.15);pointer-events:none;text-align:center}
#hint{position:fixed;bottom:48px;left:50%;transform:translateX(-50%);
  font-size:10px;color:rgba(60,90,80,0.5);z-index:10;pointer-events:none;
  transition:opacity 3s;letter-spacing:1px}
.back-link{position:fixed;bottom:12px;right:14px;z-index:10}
.back-link a{color:rgba(60,90,80,0.35);font-size:9px;text-decoration:none;
  font-family:'IBM Plex Mono',monospace}
.back-link a:hover{color:rgba(100,255,180,0.5)}
</style>
</head>
<body>
<div id="title">HOLO TERRARIUM</div>
<div id="hint">tap to release spores · move to stir fireflies</div>
<canvas id="c"></canvas>
<div class="back-link"><a href="https://sloppy.live">← sloppy.live</a></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, cx, cy, jarW, jarH, jarTop, jarBot, jarLeft, jarRight;

function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W/2; cy = H/2;
  jarH = Math.min(H*0.7, 520);
  jarW = jarH * 0.55;
  jarTop = cy - jarH*0.42;
  jarBot = cy + jarH*0.42;
  jarLeft = cx - jarW/2;
  jarRight = cx + jarW/2;
}
resize();
window.addEventListener('resize', resize);

// Code snippets for fireflies
const CODE_FRAGS = [
  'fn grow()', 'let life=1', 'if bloom{', 'loop{', 'return leaf',
  'async seed', 'yield()', 'emit(glow)', '0x3CF0', 'root.sync()',
  'pub moss', 'spawn()', 'self.light', 'match fern', 'use std::bio',
  'while alive', '#[derive]', 'impl Grow', 'mod spore', 'trace!()',
  'nil', '>>0xFF', 'λ.pulse', '∞', '::new()', 'Ok(leaf)',
  'break;', 'continue', 'import bio', 'class Moss',
];

// Moss patches
const mosses = [];
const MOSS_COUNT = 60;

class MossPatch {
  constructor(){
    // Position along bottom curve of jar
    const t = Math.random();
    this.baseX = jarLeft + jarW*0.08 + t * jarW*0.84;
    this.baseY = jarBot - jarH*0.05 - Math.random()*jarH*0.12;
    // Grow from ground
    this.stems = [];
    const stemCount = 2 + Math.floor(Math.random()*5);
    for(let i = 0; i < stemCount; i++){
      this.stems.push({
        angle: -Math.PI/2 + (Math.random()-0.5)*0.8,
        len: 8 + Math.random()*25,
        width: 1 + Math.random()*2.5,
        phase: Math.random()*Math.PI*2,
        speed: 0.3 + Math.random()*0.6,
        hue: 100 + Math.random()*50, // green range
        sat: 60 + Math.random()*30,
        bright: 0.3 + Math.random()*0.5,
        glow: 0.1 + Math.random()*0.3,
      });
    }
    // Some mosses on sides
    if(Math.random() < 0.25){
      const side = Math.random() < 0.5 ? -1 : 1;
      this.baseX = side > 0 ? jarRight - jarW*0.06 : jarLeft + jarW*0.06;
      this.baseY = jarBot - jarH*0.15 - Math.random()*jarH*0.4;
      this.stems.forEach(s => {
        s.angle = side * (Math.random()*0.6 + 0.3);
        s.len *= 0.7;
      });
    }
  }
  draw(t){
    for(const s of this.stems){
      const sway = Math.sin(t * s.speed + s.phase) * 0.06;
      const tipX = this.baseX + Math.cos(s.angle + sway) * s.len;
      const tipY = this.baseY + Math.sin(s.angle + sway) * s.len;
      // Glow
      ctx.save();
      ctx.shadowColor = `hsla(${s.hue},${s.sat}%,55%,${s.glow * (0.7 + 0.3*Math.sin(t*1.5+s.phase))})`;
      ctx.shadowBlur = 12;
      // Stem
      ctx.beginPath();
      ctx.moveTo(this.baseX, this.baseY);
      const cpx = (this.baseX + tipX)/2 + Math.sin(t*0.8+s.phase)*3;
      const cpy = (this.baseY + tipY)/2;
      ctx.quadraticCurveTo(cpx, cpy, tipX, tipY);
      ctx.strokeStyle = `hsla(${s.hue},${s.sat}%,${30+s.bright*30}%,${0.5+s.bright*0.4})`;
      ctx.lineWidth = s.width;
      ctx.lineCap = 'round';
      ctx.stroke();
      // Tip blob
      const blobR = s.width * (0.8 + 0.4*Math.sin(t*2+s.phase));
      ctx.beginPath();
      ctx.arc(tipX, tipY, blobR + 1, 0, Math.PI*2);
      ctx.fillStyle = `hsla(${s.hue},${s.sat+10}%,${45+s.bright*25}%,${0.6+s.bright*0.3})`;
      ctx.fill();
      ctx.restore();
    }
  }
}

// Fireflies
const fireflies = [];
const FIREFLY_COUNT = 24;

class Firefly {
  constructor(x, y){
    this.x = x || cx + (Math.random()-0.5)*jarW*0.6;
    this.y = y || jarTop + jarH*0.15 + Math.random()*jarH*0.5;
    this.vx = (Math.random()-0.5)*0.6;
    this.vy = (Math.random()-0.5)*0.4;
    this.code = CODE_FRAGS[Math.floor(Math.random()*CODE_FRAGS.length)];
    this.phase = Math.random()*Math.PI*2;
    this.pulseSpeed = 0.8 + Math.random()*1.5;
    this.hue = Math.random() < 0.6 ? (130 + Math.random()*40) : // green
               Math.random() < 0.5 ? (50 + Math.random()*30) :  // gold
               (170 + Math.random()*50); // cyan
    this.size = 1.5 + Math.random()*2;
    this.showCode = false;
    this.codeTimer = 0;
    this.maxCodeTime = 60 + Math.random()*120;
    this.wanderAngle = Math.random()*Math.PI*2;
    this.wanderSpeed = 0.01 + Math.random()*0.02;
  }
  update(t, mx, my){
    // Wander
    this.wanderAngle += (Math.random()-0.5)*0.15;
    this.vx += Math.cos(this.wanderAngle)*this.wanderSpeed;
    this.vy += Math.sin(this.wanderAngle)*this.wanderSpeed - 0.003; // slight float up

    // Mouse influence — stir away gently
    if(mx !== null){
      const dx = this.x - mx, dy = this.y - my;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if(dist < 120 && dist > 1){
        this.vx += (dx/dist)*0.15;
        this.vy += (dy/dist)*0.12;
        if(!this.showCode && Math.random()<0.04) this.showCode = true;
      }
    }

    // Damping
    this.vx *= 0.97;
    this.vy *= 0.97;
    this.x += this.vx;
    this.y += this.vy;

    // Stay in jar (soft bounds)
    const margin = 20;
    const jl = jarLeft + margin, jr = jarRight - margin;
    const jt = jarTop + margin, jb = jarBot - jarH*0.12;
    if(this.x < jl){ this.vx += 0.08; this.x = jl; }
    if(this.x > jr){ this.vx -= 0.08; this.x = jr; }
    if(this.y < jt){ this.vy += 0.06; this.y = jt; }
    if(this.y > jb){ this.vy -= 0.08; this.y = jb; }

    // Code flash timer
    if(this.showCode){
      this.codeTimer++;
      if(this.codeTimer > this.maxCodeTime){
        this.showCode = false;
        this.codeTimer = 0;
        this.code = CODE_FRAGS[Math.floor(Math.random()*CODE_FRAGS.length)];
        this.maxCodeTime = 60 + Math.random()*120;
      }
    } else if(Math.random() < 0.001){
      this.showCode = true;
    }
  }
  draw(t){
    const pulse = 0.5 + 0.5 * Math.sin(t * this.pulseSpeed + this.phase);
    const alpha = 0.4 + pulse * 0.6;
    // Glow
    const glowR = this.size * (6 + pulse * 6);
    const gGrad = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, glowR);
    gGrad.addColorStop(0, `hsla(${this.hue},80%,65%,${alpha*0.35})`);
    gGrad.addColorStop(0.4, `hsla(${this.hue},70%,50%,${alpha*0.1})`);
    gGrad.addColorStop(1, 'transparent');
    ctx.beginPath();
    ctx.arc(this.x, this.y, glowR, 0, Math.PI*2);
    ctx.fillStyle = gGrad;
    ctx.fill();
    // Core
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * (0.8 + pulse*0.4), 0, Math.PI*2);
    ctx.fillStyle = `hsla(${this.hue},90%,75%,${alpha})`;
    ctx.fill();
    // Code text
    if(this.showCode){
      const codeAlpha = Math.min(1, this.codeTimer / 15) * (1 - Math.max(0, (this.codeTimer - this.maxCodeTime + 20)/20));
      if(codeAlpha > 0.01){
        ctx.font = "300 10px 'IBM Plex Mono',monospace";
        ctx.fillStyle = `hsla(${this.hue},70%,65%,${codeAlpha*0.7})`;
        ctx.textAlign = 'center';
        ctx.fillText(this.code, this.x, this.y - this.size*3 - 4);
      }
    }
  }
}

// Spores (on tap)
const spores = [];
class Spore {
  constructor(x, y){
    this.x = x; this.y = y;
    this.vx = (Math.random()-0.5)*1.8;
    this.vy = -0.5 - Math.random()*2;
    this.life = 1;
    this.decay = 0.005 + Math.random()*0.01;
    this.size = 1 + Math.random()*2;
    this.hue = 100 + Math.random()*60;
  }
  update(){
    this.vy *= 0.99;
    this.vy -= 0.01; // float up
    this.vx *= 0.98;
    this.x += this.vx;
    this.y += this.vy;
    this.life -= this.decay;
  }
  draw(){
    if(this.life <= 0) return;
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.size * this.life, 0, Math.PI*2);
    ctx.fillStyle = `hsla(${this.hue},70%,60%,${this.life*0.5})`;
    ctx.fill();
  }
}

// Draw the glass jar
function drawJar(t){
  const neckW = jarW * 0.35;
  const neckH = jarH * 0.08;
  const lidH = jarH * 0.03;
  const bodyTop = jarTop + neckH;

  // Glass body
  ctx.save();
  ctx.beginPath();
  // Left side
  ctx.moveTo(cx - neckW/2, jarTop);
  ctx.lineTo(cx - neckW/2, bodyTop);
  ctx.quadraticCurveTo(jarLeft - 4, bodyTop + jarH*0.08, jarLeft, cy);
  ctx.quadraticCurveTo(jarLeft - 2, jarBot - jarH*0.06, jarLeft + jarW*0.08, jarBot);
  // Bottom
  ctx.quadraticCurveTo(cx, jarBot + jarH*0.04, jarRight - jarW*0.08, jarBot);
  // Right side
  ctx.quadraticCurveTo(jarRight + 2, jarBot - jarH*0.06, jarRight, cy);
  ctx.quadraticCurveTo(jarRight + 4, bodyTop + jarH*0.08, cx + neckW/2, bodyTop);
  ctx.lineTo(cx + neckW/2, jarTop);
  ctx.closePath();

  // Glass fill
  const glassFill = ctx.createLinearGradient(jarLeft, jarTop, jarRight, jarBot);
  glassFill.addColorStop(0, 'rgba(60,120,100,0.04)');
  glassFill.addColorStop(0.5, 'rgba(40,100,80,0.06)');
  glassFill.addColorStop(1, 'rgba(30,80,60,0.08)');
  ctx.fillStyle = glassFill;
  ctx.fill();

  // Glass edge
  ctx.strokeStyle = 'rgba(100,200,160,0.12)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Holographic sheen on left
  const sheenX = jarLeft + jarW*0.15;
  const sheenGrad = ctx.createLinearGradient(sheenX-10, bodyTop, sheenX+10, jarBot);
  sheenGrad.addColorStop(0, 'rgba(120,255,200,0.0)');
  sheenGrad.addColorStop(0.3, `rgba(120,255,200,${0.03+0.015*Math.sin(t*0.5)})`);
  sheenGrad.addColorStop(0.7, `rgba(80,200,255,${0.02+0.01*Math.sin(t*0.7)})`);
  sheenGrad.addColorStop(1, 'rgba(80,200,255,0.0)');
  ctx.beginPath();
  ctx.moveTo(sheenX - 6, bodyTop + 20);
  ctx.quadraticCurveTo(sheenX - 10, cy, sheenX - 4, jarBot - 30);
  ctx.lineTo(sheenX + 4, jarBot - 30);
  ctx.quadraticCurveTo(sheenX + 6, cy, sheenX + 6, bodyTop + 20);
  ctx.closePath();
  ctx.fillStyle = sheenGrad;
  ctx.fill();

  ctx.restore();

  // Lid / cork
  ctx.fillStyle = 'rgba(80,60,40,0.3)';
  ctx.strokeStyle = 'rgba(120,90,60,0.2)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.roundRect(cx - neckW/2 - 4, jarTop - lidH, neckW + 8, lidH, 3);
  ctx.fill();
  ctx.stroke();

  // Dirt / substrate at bottom
  const dirtGrad = ctx.createLinearGradient(cx, jarBot - jarH*0.12, cx, jarBot);
  dirtGrad.addColorStop(0, 'rgba(30,25,15,0.0)');
  dirtGrad.addColorStop(0.4, 'rgba(40,30,18,0.35)');
  dirtGrad.addColorStop(1, 'rgba(25,20,10,0.5)');
  ctx.fillStyle = dirtGrad;
  ctx.beginPath();
  ctx.moveTo(jarLeft + jarW*0.05, jarBot - jarH*0.06);
  // Bumpy top edge
  for(let i = 0; i <= 20; i++){
    const px = jarLeft + jarW*0.05 + (i/20)*jarW*0.9;
    const py = jarBot - jarH*0.06 - Math.sin(i*0.8+t*0.3)*3 - Math.sin(i*2.1)*2;
    ctx.lineTo(px, py);
  }
  ctx.lineTo(jarRight - jarW*0.05, jarBot);
  ctx.lineTo(jarLeft + jarW*0.05, jarBot);
  ctx.closePath();
  ctx.fill();
}

// Ambient particles (dust/pollen)
const dustParticles = [];
for(let i = 0; i < 30; i++){
  dustParticles.push({
    x: cx + (Math.random()-0.5)*jarW*0.7,
    y: jarTop + Math.random()*jarH*0.7,
    vx: (Math.random()-0.5)*0.15,
    vy: (Math.random()-0.5)*0.1,
    size: 0.3 + Math.random()*0.8,
    alpha: 0.1 + Math.random()*0.2,
    phase: Math.random()*Math.PI*2,
  });
}

function drawDust(t){
  for(const d of dustParticles){
    d.x += d.vx + Math.sin(t*0.4 + d.phase)*0.08;
    d.y += d.vy + Math.cos(t*0.3 + d.phase)*0.06;
    // Wrap in jar
    if(d.x < jarLeft+20) d.x = jarRight-20;
    if(d.x > jarRight-20) d.x = jarLeft+20;
    if(d.y < jarTop+20) d.y = jarBot - jarH*0.15;
    if(d.y > jarBot - jarH*0.1) d.y = jarTop+20;

    ctx.beginPath();
    ctx.arc(d.x, d.y, d.size, 0, Math.PI*2);
    ctx.fillStyle = `rgba(120,200,160,${d.alpha * (0.6 + 0.4*Math.sin(t+d.phase))})`;
    ctx.fill();
  }
}

// Init
for(let i = 0; i < MOSS_COUNT; i++) mosses.push(new MossPatch());
for(let i = 0; i < FIREFLY_COUNT; i++) fireflies.push(new Firefly());

// Mouse
let mouseX = null, mouseY = null;
window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
window.addEventListener('mouseleave', () => { mouseX = null; mouseY = null; });

// Tap to release spores
function spawnSpores(x, y){
  const count = 8 + Math.floor(Math.random()*12);
  for(let i = 0; i < count; i++) spores.push(new Spore(x, y));
}
canvas.addEventListener('click', e => { spawnSpores(e.clientX, e.clientY); hideHint(); });
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  mouseX = t.clientX; mouseY = t.clientY;
  spawnSpores(t.clientX, t.clientY);
  hideHint();
}, {passive:false});
canvas.addEventListener('touchmove', e => {
  const t = e.touches[0];
  mouseX = t.clientX; mouseY = t.clientY;
}, {passive:true});
canvas.addEventListener('touchend', () => { mouseX = null; mouseY = null; });

let hintHidden = false;
function hideHint(){
  if(!hintHidden){
    hintHidden = true;
    setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 2000);
  }
}

// Holographic scanline effect
function drawScanlines(t){
  const lineY = (t * 40) % H;
  ctx.fillStyle = 'rgba(80,255,160,0.008)';
  ctx.fillRect(0, lineY, W, 2);
  ctx.fillRect(0, (lineY + H/3) % H, W, 1);
}

// Main loop
function frame(timestamp){
  const t = timestamp * 0.001;

  // Clear
  ctx.fillStyle = 'rgba(4,6,8,0.2)';
  ctx.fillRect(0, 0, W, H);

  // Background ambient glow
  const bgGrad = ctx.createRadialGradient(cx, cy + jarH*0.1, jarW*0.2, cx, cy, Math.max(W,H)*0.6);
  bgGrad.addColorStop(0, `rgba(20,60,40,${0.06 + 0.02*Math.sin(t*0.3)})`);
  bgGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  drawScanlines(t);

  // Jar behind moss
  drawJar(t);

  // Dust
  drawDust(t);

  // Moss
  for(const m of mosses) m.draw(t);

  // Fireflies
  for(const f of fireflies){
    f.update(t, mouseX, mouseY);
    f.draw(t);
  }

  // Spores
  for(let i = spores.length - 1; i >= 0; i--){
    spores[i].update();
    spores[i].draw();
    if(spores[i].life <= 0) spores.splice(i, 1);
  }

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
