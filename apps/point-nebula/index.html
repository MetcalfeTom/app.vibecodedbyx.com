<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Point Nebula</title>
<meta name="description" content="A WebGL2 point-cloud viewer pushing millions of colored points in one draw call — orbit, zoom, and morph between galaxies.">
<link rel="icon" href="https://emojicdn.elk.sh/✨">
<meta property="og:title" content="Point Nebula — millions of points, one draw call">
<meta property="og:description" content="GPU point-cloud playground: up to 4 million colored points morphing between galaxy, knot, wave and sphere. Drag to orbit, scroll to zoom.">
<meta property="og:url" content="https://sloppy.live/point-nebula/">
<meta property="og:type" content="website">
<meta property="og:image" content="https://image.pollinations.ai/prompt/spiral%20galaxy%20made%20of%20millions%20of%20tiny%20rainbow%20points%20on%20black%2C%20deep%20space%2C%20long%20exposure%20photography%20style%2C%20glowing.png?width=1200&height=630&seed=2001&model=flux&nologo=true">
<style>
  :root{
    --void:#04050a;
    --ink:#dfe6f2;
    --dim:#6b7690;
    --neon:#7fd4ff;
    --warm:#ffb060;
  }
  html{ font-size:100%; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    font-family:"Space Mono", monospace;
    background:var(--void);
    color:var(--ink);
    height:100dvh;
    overflow:hidden;
  }
  canvas#gl{
    position:fixed; inset:0;
    width:100%; height:100%;
    display:block;
    touch-action:none;
    cursor:grab;
  }
  canvas#gl.grabbing{ cursor:grabbing; }
  header{
    position:fixed; top:0.9rem; left:1.1rem;
    pointer-events:none;
    z-index:5;
  }
  h1{
    font-family:"Unica One", sans-serif;
    font-size:clamp(1.2rem, 3.4vw, 1.9rem);
    letter-spacing:0.28em;
    color:var(--neon);
    text-shadow:0 0 1.4rem rgba(127,212,255,0.45);
  }
  .tag{ font-size:0.62rem; color:var(--dim); letter-spacing:0.1em; }
  #hud{
    position:fixed; top:0.9rem; right:1.1rem;
    text-align:right;
    font-size:0.66rem;
    color:var(--dim);
    letter-spacing:0.1em;
    z-index:5;
    line-height:1.9;
  }
  #hud b{ color:var(--warm); font-weight:400; }
  #bar{
    position:fixed; bottom:0.9rem; left:50%;
    transform:translateX(-50%);
    display:flex; gap:0.5rem; align-items:center; flex-wrap:wrap;
    justify-content:center;
    background:rgba(8,10,18,0.8);
    border:1px solid #1c2438;
    border-radius:0.6rem;
    padding:0.45rem 0.7rem;
    z-index:5;
    max-width:94vw;
  }
  #bar button, #bar select{
    font-family:inherit;
    font-size:0.68rem;
    letter-spacing:0.08em;
    min-height:2.75rem;
    padding:0.3rem 0.8rem;
    background:#0d1322;
    color:var(--ink);
    border:1px solid #263450;
    border-radius:0.4rem;
    cursor:pointer;
  }
  #bar button:hover, #bar select:hover{ border-color:var(--neon); }
  button:focus-visible, select:focus-visible, input:focus-visible{ outline:3px solid var(--neon); outline-offset:2px; }
  #bar label{
    display:flex; align-items:center; gap:0.4rem;
    font-size:0.62rem; color:var(--dim); letter-spacing:0.08em;
  }
  #bar input[type=range]{ width:9rem; accent-color:var(--neon); min-height:2.75rem; }
  #nogl{
    position:fixed; inset:0;
    display:none;
    align-items:center; justify-content:center;
    text-align:center;
    padding:2rem;
    font-size:0.85rem;
    color:var(--warm);
    line-height:1.8;
    z-index:20;
  }
  #hint{
    position:fixed; bottom:5.4rem; left:50%;
    transform:translateX(-50%);
    font-size:0.62rem;
    color:var(--dim);
    letter-spacing:0.12em;
    z-index:4;
    transition:opacity 1s ease;
    pointer-events:none;
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unica+One&family=Space+Mono&display=swap" rel="stylesheet">
</head>
<body>
<canvas id="gl"></canvas>

<header>
  <h1>POINT NEBULA</h1>
  <p class="tag">millions of points · one draw call · GPU-resident</p>
</header>

<div id="hud" aria-live="off">
  <span id="hCount">—</span> points<br>
  <b id="hFps">—</b> fps<br>
  <span id="hShape">galaxy</span>
</div>

<p id="hint">drag to orbit · scroll / pinch to zoom · morphs run in the vertex shader</p>

<div id="bar" role="group" aria-label="Viewer controls">
  <button type="button" id="btnShape">MORPH ▸ NEXT SHAPE</button>
  <select id="colorMode" aria-label="Color mode">
    <option value="0">color: rainbow xyz</option>
    <option value="1">color: nebula heat</option>
    <option value="2">color: monochrome</option>
  </select>
  <label>POINTS <span id="lblCount">1.0M</span>
    <input id="count" type="range" min="1" max="40" value="10" aria-label="Point count (hundred thousands)">
  </label>
  <button type="button" id="btnSpin" aria-pressed="true">AUTO-SPIN ✓</button>
</div>

<p id="nogl">this device/browser has no WebGL2 —<br>the nebula cannot form here. try a desktop browser.</p>

<script>
(function(){
'use strict';

var canvas = document.getElementById('gl');
var gl = canvas.getContext('webgl2', { antialias: false, powerPreference: 'high-performance' });
if(!gl){
  document.getElementById('nogl').style.display = 'flex';
  document.getElementById('bar').style.display = 'none';
  return;
}

/* ── shaders: two position sets live on the GPU; the morph is pure vertex-shader ── */
var VS = [
  '#version 300 es',
  'layout(location=0) in vec3 posA;',
  'layout(location=1) in vec3 posB;',
  'layout(location=2) in vec3 col;',
  'uniform mat4 uMvp;',
  'uniform float uT;',        /* eased morph 0..1 */
  'uniform float uSize;',
  'uniform float uMode;',
  'out vec3 vCol;',
  'void main(){',
  '  vec3 p = mix(posA, posB, uT);',
  '  gl_Position = uMvp * vec4(p, 1.0);',
  '  float w = max(gl_Position.w, 0.1);',
  '  gl_PointSize = clamp(uSize / w, 1.0, 5.0);',
  '  if(uMode < 0.5){ vCol = col; }',
  '  else if(uMode < 1.5){ float d = length(p); vCol = mix(vec3(1.0,0.75,0.35), vec3(0.35,0.55,1.0), clamp(d*0.8,0.0,1.0)); }',
  '  else { vCol = vec3(0.62,0.78,1.0); }',
  '}'
].join('\n');
var FS = [
  '#version 300 es',
  'precision mediump float;',
  'in vec3 vCol;',
  'out vec4 o;',
  'void main(){ o = vec4(vCol, 1.0); }'
].join('\n');

function shader(type, src){
  var s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if(!gl.getShaderParameter(s, gl.COMPILE_STATUS)) throw new Error(gl.getShaderInfoLog(s));
  return s;
}
var prog = gl.createProgram();
gl.attachShader(prog, shader(gl.VERTEX_SHADER, VS));
gl.attachShader(prog, shader(gl.FRAGMENT_SHADER, FS));
gl.linkProgram(prog);
if(!gl.getProgramParameter(prog, gl.LINK_STATUS)) throw new Error(gl.getProgramInfoLog(prog));
gl.useProgram(prog);
var uMvp = gl.getUniformLocation(prog, 'uMvp');
var uT = gl.getUniformLocation(prog, 'uT');
var uSize = gl.getUniformLocation(prog, 'uSize');
var uMode = gl.getUniformLocation(prog, 'uMode');

/* ── shape generators (fill a Float32Array in place) ── */
function genGalaxy(a, n){
  for(var i = 0; i < n; i++){
    var arm = i % 3;
    var t = Math.random();
    var r = Math.pow(t, 0.6) * 1.35;
    var ang = arm * 2.094 + r * 3.2 + (Math.random() - 0.5) * 0.35;
    var y = (Math.random() - 0.5) * 0.14 * (1.2 - r * 0.7);
    a[i*3]   = Math.cos(ang) * r + (Math.random() - 0.5) * 0.05;
    a[i*3+1] = y;
    a[i*3+2] = Math.sin(ang) * r + (Math.random() - 0.5) * 0.05;
  }
}
function genSphere(a, n){
  for(var i = 0; i < n; i++){
    var u = Math.random() * 2 - 1;
    var ph = Math.random() * 6.28318;
    var s = Math.sqrt(1 - u*u);
    var r = 0.95 + Math.random() * 0.08;
    a[i*3]   = s * Math.cos(ph) * r;
    a[i*3+1] = u * r;
    a[i*3+2] = s * Math.sin(ph) * r;
  }
}
function genKnot(a, n){
  for(var i = 0; i < n; i++){
    var t = Math.random() * 6.28318;
    var p = 2, q = 3;
    var rr = Math.cos(q * t) + 2.0;
    var x = rr * Math.cos(p * t), y = Math.sin(q * t), z = rr * Math.sin(p * t);
    var j = 0.09;
    a[i*3]   = x * 0.42 + (Math.random() - 0.5) * j;
    a[i*3+1] = y * 0.42 + (Math.random() - 0.5) * j;
    a[i*3+2] = z * 0.42 + (Math.random() - 0.5) * j;
  }
}
function genWave(a, n){
  var side = Math.ceil(Math.sqrt(n));
  for(var i = 0; i < n; i++){
    var gx = (i % side) / side * 2 - 1;
    var gz = Math.floor(i / side) / side * 2 - 1;
    a[i*3]   = gx * 1.4;
    a[i*3+1] = Math.sin(gx * 6.0) * Math.cos(gz * 6.0) * 0.28;
    a[i*3+2] = gz * 1.4;
  }
}
function genCube(a, n){
  for(var i = 0; i < n; i++){
    a[i*3]   = (Math.random() * 2 - 1) * 1.1;
    a[i*3+1] = (Math.random() * 2 - 1) * 1.1;
    a[i*3+2] = (Math.random() * 2 - 1) * 1.1;
  }
}
var SHAPES = [
  { name: 'galaxy', fn: genGalaxy },
  { name: 'sphere shell', fn: genSphere },
  { name: 'torus knot', fn: genKnot },
  { name: 'standing wave', fn: genWave },
  { name: 'chaos cube', fn: genCube }
];

/* ── buffers ── */
var N = 1000000;
var bufA = gl.createBuffer(), bufB = gl.createBuffer(), bufC = gl.createBuffer();
var vao = gl.createVertexArray();
gl.bindVertexArray(vao);
var shapeIdx = 0, nextIdx = 1;
var morphT = 1, morphing = false;

function colorize(colors, positions, n){
  for(var i = 0; i < n; i++){
    var x = positions[i*3], y = positions[i*3+1], z = positions[i*3+2];
    colors[i*3]   = Math.min(255, Math.abs(x) * 140 + 80);
    colors[i*3+1] = Math.min(255, Math.abs(y) * 240 + 60);
    colors[i*3+2] = Math.min(255, Math.abs(z) * 140 + 110);
  }
}
function rebuild(){
  var pa = new Float32Array(N * 3);
  var pb = new Float32Array(N * 3);
  var pc = new Uint8Array(N * 3);
  SHAPES[shapeIdx].fn(pa, N);
  SHAPES[nextIdx % SHAPES.length].fn(pb, N);
  colorize(pc, pa, N);
  gl.bindBuffer(gl.ARRAY_BUFFER, bufA);
  gl.bufferData(gl.ARRAY_BUFFER, pa, gl.DYNAMIC_DRAW);
  gl.enableVertexAttribArray(0);
  gl.vertexAttribPointer(0, 3, gl.FLOAT, false, 0, 0);
  gl.bindBuffer(gl.ARRAY_BUFFER, bufB);
  gl.bufferData(gl.ARRAY_BUFFER, pb, gl.DYNAMIC_DRAW);
  gl.enableVertexAttribArray(1);
  gl.vertexAttribPointer(1, 3, gl.FLOAT, false, 0, 0);
  gl.bindBuffer(gl.ARRAY_BUFFER, bufC);
  gl.bufferData(gl.ARRAY_BUFFER, pc, gl.STATIC_DRAW);
  gl.enableVertexAttribArray(2);
  gl.vertexAttribPointer(2, 3, gl.UNSIGNED_BYTE, true, 0, 0);
  morphT = 0;         /* show shape A; buffer B waits as the next target */
  morphing = false;
  document.getElementById('hCount').textContent = (N / 1e6).toFixed(1) + 'M';
  document.getElementById('hShape').textContent = SHAPES[shapeIdx].name;
}
function nextShape(){
  if(morphing) return;
  morphing = true;                 /* animate uT 0 -> 1 toward buffer B */
}
/* after a morph completes, B becomes the new A and a fresh target fills B */
function commitMorph(){
  var t = bufA; bufA = bufB; bufB = t;
  shapeIdx = nextIdx % SHAPES.length;
  nextIdx = shapeIdx + 1;
  var pb = new Float32Array(N * 3);
  SHAPES[nextIdx % SHAPES.length].fn(pb, N);
  gl.bindVertexArray(vao);
  gl.bindBuffer(gl.ARRAY_BUFFER, bufA);
  gl.enableVertexAttribArray(0);
  gl.vertexAttribPointer(0, 3, gl.FLOAT, false, 0, 0);
  gl.bindBuffer(gl.ARRAY_BUFFER, bufB);
  gl.bufferData(gl.ARRAY_BUFFER, pb, gl.DYNAMIC_DRAW);
  gl.enableVertexAttribArray(1);
  gl.vertexAttribPointer(1, 3, gl.FLOAT, false, 0, 0);
  morphT = 0;
  morphing = false;
  document.getElementById('hShape').textContent = SHAPES[shapeIdx].name;
}

/* ── camera (hand-rolled matrices) ── */
var theta = 0.6, phi = 0.35, dist = 3.2;
var vel = { t: 0, p: 0 };
var autoSpin = true;
function mat4Mul(a, b){
  var o = new Float32Array(16);
  for(var r = 0; r < 4; r++)
    for(var c = 0; c < 4; c++)
      o[c*4+r] = a[r] * b[c*4] + a[4+r] * b[c*4+1] + a[8+r] * b[c*4+2] + a[12+r] * b[c*4+3];
  return o;
}
function perspective(fov, asp, near, far){
  var f = 1 / Math.tan(fov / 2);
  var o = new Float32Array(16);
  o[0] = f / asp; o[5] = f;
  o[10] = (far + near) / (near - far); o[11] = -1;
  o[14] = 2 * far * near / (near - far);
  return o;
}
function lookAt(ex, ey, ez){
  var zx = ex, zy = ey, zz = ez;
  var zl = Math.hypot(zx, zy, zz); zx /= zl; zy /= zl; zz /= zl;
  var xx = zz, xz = -zx;                       /* cross(up(0,1,0), z) */
  var xl = Math.hypot(xx, xz) || 1; xx /= xl; xz /= xl;
  var yx = zy * xz, yy = zz * xx - zx * xz, yz = -zy * xx;   /* cross(z, x) */
  var o = new Float32Array(16);
  o[0] = xx; o[4] = 0;  o[8] = xz;  o[12] = -(xx * ex + xz * ez);
  o[1] = yx; o[5] = yy; o[9] = yz;  o[13] = -(yx * ex + yy * ey + yz * ez);
  o[2] = zx; o[6] = zy; o[10] = zz; o[14] = -(zx * ex + zy * ey + zz * ez);
  o[15] = 1;
  return o;
}

/* ── input: orbit + zoom + inertia ── */
var drag = null;
canvas.addEventListener('pointerdown', function(e){
  drag = { x: e.clientX, y: e.clientY, id: e.pointerId };
  canvas.classList.add('grabbing');
  canvas.setPointerCapture(e.pointerId);
});
canvas.addEventListener('pointermove', function(e){
  if(!drag || e.pointerId !== drag.id) return;
  var dx = e.clientX - drag.x, dy = e.clientY - drag.y;
  drag.x = e.clientX; drag.y = e.clientY;
  theta += dx * 0.005;
  phi = Math.max(-1.4, Math.min(1.4, phi + dy * 0.005));
  vel.t = dx * 0.005; vel.p = dy * 0.005;
});
['pointerup','pointercancel'].forEach(function(ev){
  canvas.addEventListener(ev, function(){ drag = null; canvas.classList.remove('grabbing'); });
});
canvas.addEventListener('wheel', function(e){
  e.preventDefault();
  dist = Math.max(0.7, Math.min(9, dist * (e.deltaY > 0 ? 1.1 : 0.9)));
}, { passive: false });
/* pinch */
var pinch = null;
canvas.addEventListener('touchstart', function(e){
  if(e.touches.length === 2){
    pinch = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  }
}, { passive: true });
canvas.addEventListener('touchmove', function(e){
  if(pinch && e.touches.length === 2){
    var d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
    dist = Math.max(0.7, Math.min(9, dist * pinch / d));
    pinch = d;
  }
}, { passive: true });

/* ── ui ── */
document.getElementById('btnShape').addEventListener('click', nextShape);
var spinBtn = document.getElementById('btnSpin');
spinBtn.addEventListener('click', function(){
  autoSpin = !autoSpin;
  spinBtn.textContent = autoSpin ? 'AUTO-SPIN ✓' : 'AUTO-SPIN ✗';
  spinBtn.setAttribute('aria-pressed', autoSpin ? 'true' : 'false');
});
var countIn = document.getElementById('count');
countIn.addEventListener('change', function(){
  N = countIn.value * 100000;
  document.getElementById('lblCount').textContent = (N / 1e6).toFixed(1) + 'M';
  rebuild();
});
countIn.addEventListener('input', function(){
  document.getElementById('lblCount').textContent = (countIn.value / 10).toFixed(1) + 'M';
});
var colorSel = document.getElementById('colorMode');

/* ── resize ── */
function resize(){
  var dpr = Math.min(2, window.devicePixelRatio || 1);
  canvas.width = Math.floor(innerWidth * dpr);
  canvas.height = Math.floor(innerHeight * dpr);
  gl.viewport(0, 0, canvas.width, canvas.height);
}
window.addEventListener('resize', resize);
resize();

/* ── loop ── */
gl.clearColor(0.016, 0.02, 0.04, 1);
gl.enable(gl.DEPTH_TEST);
var last = performance.now(), fpsE = 60, hintFade = 0;
var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
function frame(now){
  requestAnimationFrame(frame);
  var dt = Math.min(0.1, (now - last) / 1000);
  last = now;
  fpsE = fpsE * 0.95 + (1 / Math.max(dt, 1e-4)) * 0.05;
  if(autoSpin && !drag && !reduceMotion) theta += dt * 0.12;
  if(!drag){ theta += vel.t; phi = Math.max(-1.4, Math.min(1.4, phi + vel.p)); vel.t *= 0.94; vel.p *= 0.94; }
  if(morphing){
    morphT = Math.min(1, morphT + dt * 0.7);
    if(morphT >= 1) commitMorph();
  }
  var eye = [
    Math.cos(phi) * Math.sin(theta) * dist,
    Math.sin(phi) * dist,
    Math.cos(phi) * Math.cos(theta) * dist
  ];
  var mvp = mat4Mul(perspective(0.9, canvas.width / canvas.height, 0.05, 40), lookAt(eye[0], eye[1], eye[2]));
  gl.clear(gl.COLOR_BUFFER_BIT | gl.DEPTH_BUFFER_BIT);
  gl.useProgram(prog);
  gl.bindVertexArray(vao);
  gl.uniformMatrix4fv(uMvp, false, mvp);
  var e2 = morphT < 0.5 ? 2*morphT*morphT : 1 - Math.pow(-2*morphT + 2, 2) / 2;
  gl.uniform1f(uT, e2);
  gl.uniform1f(uSize, canvas.height * 0.0035);
  gl.uniform1f(uMode, +colorSel.value);
  gl.drawArrays(gl.POINTS, 0, N);
  document.getElementById('hFps').textContent = Math.round(fpsE);
  hintFade += dt;
  if(hintFade > 9) document.getElementById('hint').style.opacity = '0';
}
rebuild();
requestAnimationFrame(frame);

/* debug/testing */
window.__pn = function(){
  return { n: N, fps: Math.round(fpsE), shape: SHAPES[shapeIdx].name, webgl2: true, theta: +theta.toFixed(3), dist: +dist.toFixed(2), morphT: +morphT.toFixed(3), morphing: morphing };
};
window.__pnMorph = nextShape;
})();
</script>
</body>
</html>
