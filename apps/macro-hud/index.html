<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macro HUD</title>
<meta name="description" content="A floating translucent macro keypad — drag it anywhere, assign labels and snippets to glowing hotkeys, press to copy.">
<link rel="icon" href="https://emojicdn.elk.sh/🎛️">
<meta property="og:title" content="Macro HUD">
<meta property="og:description" content="A floating cyberpunk macro keypad — draggable, glowing, assignable hotkeys that copy your snippets on press.">
<meta property="og:url" content="https://sloppy.live/macro-hud/">
<meta property="og:type" content="website">
<meta property="og:image" content="https://image.pollinations.ai/prompt/translucent%20holographic%20macro%20keypad%20floating%20over%20a%20cyberpunk%20desktop%2C%20neon%20cyan%20magenta%20glow%2C%20glassmorphism%20HUD%2C%20dark%20tech%20aesthetic%2C%20clean%20ui%20render.png?width=1200&height=630&seed=2077&model=flux&nologo=true">
<style>
  :root{
    --bg:#07070f;
    --acc:#37f2ff;  --acc-rgb:55,242,255;
    --acc2:#ff3ddb; --acc2-rgb:255,61,219;
    --warn:#ffc94d; --warn-rgb:255,201,77;
    --ink:#dff6ff;
    --dim:#5c7a94;
    --glass:rgba(10,16,30,0.55);
    --panel:rgba(12,14,26,0.92);
    --keybg:rgba(16,26,46,0.6);
    --btn-ink:#03202a;
    --scan-a:0.22;
    --vig-a:0.5;
  }
  html{ font-size:100%; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    font-family:"Chakra Petch", system-ui, sans-serif;
    background:var(--bg);
    color:var(--ink);
    height:100dvh;
    overflow:hidden;
    user-select:none;
  }
  /* ── the desktop it floats over ── */
  .desk{
    position:fixed; inset:0;
    background:
      radial-gradient(ellipse 70% 50% at 20% 15%, rgba(var(--acc-rgb),0.07), transparent 60%),
      radial-gradient(ellipse 60% 45% at 85% 80%, rgba(var(--acc2-rgb),0.07), transparent 60%),
      var(--bg);
  }
  .grid-floor{
    position:fixed; left:-20%; right:-20%; bottom:-12%; height:52%;
    background:
      repeating-linear-gradient(90deg, rgba(var(--acc-rgb),0.14) 0 1px, transparent 1px 64px),
      repeating-linear-gradient(0deg, rgba(var(--acc-rgb),0.14) 0 1px, transparent 1px 44px);
    transform:perspective(480px) rotateX(62deg);
    transform-origin:top center;
    mask-image:linear-gradient(to bottom, transparent, #000 22%, #000 75%, transparent);
    -webkit-mask-image:linear-gradient(to bottom, transparent, #000 22%, #000 75%, transparent);
    animation:gridScroll 6s linear infinite;
  }
  @keyframes gridScroll{ from{ background-position:0 0, 0 0; } to{ background-position:0 0, 0 44px; } }
  .scan{
    position:fixed; inset:0; pointer-events:none;
    background:repeating-linear-gradient(0deg, rgba(0,0,0,var(--scan-a)) 0 1px, transparent 1px 3px);
    mix-blend-mode:multiply;
  }
  .vig{
    position:fixed; inset:0; pointer-events:none;
    background:radial-gradient(ellipse at 50% 45%, transparent 55%, rgba(0,0,0,var(--vig-a)) 100%);
  }
  .deskmark{
    position:fixed; left:2rem; bottom:1.6rem;
    font-family:"Share Tech Mono", monospace;
    font-size:0.7rem; letter-spacing:0.3em;
    color:var(--dim);
    pointer-events:none;
  }
  .deskmark b{ color:var(--acc); font-weight:400; }
  h1{
    position:fixed; top:1.4rem; left:2rem;
    font-family:"Zen Dots", "Chakra Petch", sans-serif;
    font-weight:400;
    font-size:clamp(1.1rem, 3vw, 1.7rem);
    letter-spacing:0.18em;
    color:var(--ink);
    text-shadow:0 0 18px rgba(var(--acc-rgb),0.6);
    pointer-events:none;
  }
  h1 em{ font-style:normal; color:var(--acc2); text-shadow:0 0 18px rgba(var(--acc2-rgb),0.7); }
  .hint{
    position:fixed; top:4.4rem; left:2rem;
    font-family:"Share Tech Mono", monospace;
    font-size:0.7rem; letter-spacing:0.12em; line-height:1.9;
    color:var(--dim);
    pointer-events:none;
    transition:opacity 1.2s ease;
  }
  .hint.gone{ opacity:0; }

  /* ── the floating pad ── */
  #pad{
    position:fixed;
    width:min(21rem, 92vw);
    background:var(--glass);
    border:1px solid rgba(var(--acc-rgb),0.5);
    border-radius:0.9rem;
    backdrop-filter:blur(10px);
    box-shadow:
      0 0 0 1px rgba(var(--acc2-rgb),0.15),
      0 0 34px rgba(var(--acc-rgb),0.18),
      0 22px 60px rgba(0,0,0,0.6);
    z-index:10;
    touch-action:none;
  }
  #padBar{
    display:flex; align-items:center; gap:0.6rem;
    padding:0.55rem 0.8rem;
    border-bottom:1px solid rgba(var(--acc-rgb),0.25);
    cursor:grab;
    border-radius:0.9rem 0.9rem 0 0;
  }
  #padBar:active{ cursor:grabbing; }
  #padBar:focus-visible{ outline:3px solid var(--acc); outline-offset:2px; }
  .grip{ display:flex; gap:0.22rem; }
  .grip i{
    width:0.28rem; height:0.28rem; border-radius:50%;
    background:rgba(var(--acc-rgb),0.6);
    box-shadow:0 0 6px rgba(var(--acc-rgb),0.8);
  }
  #padBar .name{
    font-family:"Share Tech Mono", monospace;
    font-size:0.72rem; letter-spacing:0.28em;
    color:var(--acc);
  }
  #padBar .name em{ font-style:normal; color:var(--acc2); }
  #editBtn, #themeBtn{
    min-width:2.75rem; min-height:2.15rem;
    background:transparent;
    border:1px solid rgba(var(--acc-rgb),0.35);
    border-radius:0.45rem;
    color:var(--ink);
    font-family:inherit; font-size:0.8rem;
    cursor:pointer;
  }
  #themeBtn{ margin-left:auto; }
  #editBtn[aria-pressed="true"], #themeBtn[aria-pressed="true"]{
    color:var(--warn);
    border-color:var(--warn);
    box-shadow:0 0 12px rgba(var(--warn-rgb),0.35);
  }
  #editBtn:focus-visible, #themeBtn:focus-visible{ outline:3px solid var(--acc); outline-offset:2px; }
  .keys{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:0.55rem;
    padding:0.8rem;
  }
  .mkey{
    aspect-ratio:1/0.86;
    min-height:2.75rem;
    background:var(--keybg);
    border:1px solid rgba(var(--acc-rgb),0.35);
    border-radius:0.55rem;
    color:var(--ink);
    font-family:inherit;
    font-size:0.72rem;
    line-height:1.25;
    letter-spacing:0.04em;
    cursor:pointer;
    display:flex; flex-direction:column;
    align-items:center; justify-content:center;
    gap:0.15rem;
    padding:0.25rem;
    overflow:hidden;
    transition:box-shadow 0.15s ease, border-color 0.15s ease, transform 0.08s ease;
    position:relative;
  }
  .mkey .hot{
    font-family:"Share Tech Mono", monospace;
    font-size:0.58rem;
    color:var(--dim);
    letter-spacing:0.1em;
  }
  .mkey:hover{ border-color:var(--acc); box-shadow:0 0 14px rgba(var(--acc-rgb),0.35); }
  .mkey:focus-visible{ outline:3px solid var(--acc2); outline-offset:2px; }
  .mkey.fire{
    transform:scale(0.93);
    border-color:var(--acc2);
    box-shadow:0 0 22px rgba(var(--acc2-rgb),0.65), inset 0 0 18px rgba(var(--acc2-rgb),0.25);
  }
  body.editing .mkey{ border-style:dashed; border-color:var(--warn); }
  body.editing .mkey:hover{ box-shadow:0 0 14px rgba(var(--warn-rgb),0.4); }

  /* ── key editor ── */
  #editor, #themer{
    position:fixed;
    display:none;
    width:min(19rem, 92vw);
    background:var(--panel);
    border:1px solid var(--warn);
    border-radius:0.8rem;
    box-shadow:0 0 30px rgba(var(--warn-rgb),0.25), 0 18px 50px rgba(0,0,0,0.7);
    padding:1rem;
    z-index:20;
    backdrop-filter:blur(8px);
  }
  #editor.show, #themer.show{ display:block; }
  #editor h2, #themer h2{
    font-family:"Share Tech Mono", monospace;
    font-size:0.7rem; letter-spacing:0.3em;
    color:var(--warn);
    margin-bottom:0.8rem;
  }
  #editor label, #themer label{
    display:block;
    font-size:0.65rem; letter-spacing:0.15em;
    color:var(--dim);
    margin:0.6rem 0 0.25rem;
    text-transform:uppercase;
  }
  #editor input[type=text], #editor textarea{
    width:100%;
    background:rgba(var(--acc-rgb),0.06);
    border:1px solid rgba(var(--acc-rgb),0.3);
    border-radius:0.4rem;
    color:var(--ink);
    font-family:"Share Tech Mono", monospace;
    font-size:0.85rem;
    padding:0.5rem 0.6rem;
    user-select:text;
  }
  #editor textarea{ resize:vertical; min-height:3.6rem; }
  #editor input:focus-visible, #editor textarea:focus-visible{ outline:2px solid var(--acc); }
  .edrow{ display:flex; gap:0.5rem; margin-top:0.9rem; }
  .edrow button{
    flex:1;
    min-height:2.75rem;
    font-family:inherit; font-size:0.72rem; letter-spacing:0.1em;
    border-radius:0.45rem;
    cursor:pointer;
    background:var(--acc);
    border:none; color:var(--btn-ink); font-weight:700;
  }
  .edrow button.ghost{ background:transparent; border:1px solid rgba(255,255,255,0.3); color:var(--ink); font-weight:400; }
  .edrow button:focus-visible{ outline:3px solid var(--acc2); outline-offset:2px; }
  #hotCap{
    background:rgba(var(--acc2-rgb),0.1);
    border:1px dashed rgba(var(--acc2-rgb),0.5);
    color:var(--ink);
    font-family:"Share Tech Mono", monospace;
    min-height:2.75rem;
    width:100%;
    border-radius:0.4rem;
    cursor:pointer;
    letter-spacing:0.15em;
  }
  #hotCap.listen{ color:var(--acc2); border-style:solid; }
  #toast{
    position:fixed; left:50%; bottom:2.2rem;
    transform:translateX(-50%) translateY(20px);
    background:var(--panel);
    border:1px solid var(--acc);
    color:var(--acc);
    font-family:"Share Tech Mono", monospace;
    font-size:0.75rem; letter-spacing:0.2em;
    padding:0.6rem 1.2rem;
    border-radius:999px;
    opacity:0;
    pointer-events:none;
    transition:opacity 0.25s ease, transform 0.25s ease;
    z-index:30;
    box-shadow:0 0 20px rgba(var(--acc-rgb),0.3);
  }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  .tpre{
    display:flex; flex-direction:column; gap:0.45rem;
  }
  .tpre button{
    min-height:2.75rem;
    font-family:"Share Tech Mono", monospace;
    font-size:0.72rem; letter-spacing:0.2em;
    background:var(--keybg);
    border:1px solid rgba(var(--acc-rgb),0.4);
    color:var(--ink);
    border-radius:0.45rem;
    cursor:pointer;
    text-align:left;
    padding:0 0.8rem;
  }
  .tpre button[aria-pressed="true"]{
    border-color:var(--acc);
    box-shadow:0 0 12px rgba(var(--acc-rgb),0.4);
    color:var(--acc);
  }
  .tpre button:focus-visible{ outline:3px solid var(--acc2); outline-offset:2px; }
  #accPick{
    width:100%; min-height:2.75rem;
    background:var(--keybg);
    border:1px solid rgba(var(--acc-rgb),0.4);
    border-radius:0.45rem;
    cursor:pointer;
    padding:0.2rem;
  }
  @media (prefers-reduced-motion: reduce){
    .grid-floor{ animation:none; }
    .mkey, #toast{ transition:none; }
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">

</head>
<body>
<div class="desk" aria-hidden="true"></div>
<div class="grid-floor" aria-hidden="true"></div>
<div class="scan" aria-hidden="true"></div>
<div class="vig" aria-hidden="true"></div>

<h1>MACRO<em>//</em>HUD</h1>
<p class="hint" id="hint">drag the pad by its bar · press a key to copy its macro<br>⚙ edit mode: relabel keys, set snippets &amp; hotkeys</p>
<p class="deskmark"><b>SYS://</b>DESKTOP.OVERLAY — 12 CHANNELS ARMED</p>

<main>
  <section id="pad" role="application" aria-label="Floating macro keypad. Drag the top bar to move it — or focus the bar and use arrow keys. Press a key to copy its macro text. Toggle the gear for edit mode to assign labels, snippets and hotkeys.">
    <div id="padBar" tabindex="0" aria-label="Pad handle — drag or use arrow keys to move">
      <span class="grip" aria-hidden="true"><i></i><i></i><i></i></span>
      <span class="name">MACRO<em>//</em>PAD</span>
      <button type="button" id="themeBtn" aria-pressed="false" title="Theme customizer" aria-label="Theme customizer">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" style="vertical-align:-2px;">
          <path d="M12 3a9 9 0 0 0 0 18c1.2 0 2-.9 2-2 0-.6-.2-1-.5-1.4-.3-.4-.5-.8-.5-1.3 0-1.1.9-2 2-2h2.3A4.7 4.7 0 0 0 22 9.7C21.6 5.9 17.2 3 12 3z"/>
          <circle cx="7.5" cy="10.5" r="1" fill="currentColor"/><circle cx="12" cy="7.5" r="1" fill="currentColor"/><circle cx="16.5" cy="10.5" r="1" fill="currentColor"/>
        </svg>
      </button>
      <button type="button" id="editBtn" aria-pressed="false" title="Edit mode — assign labels and macros" aria-label="Edit mode">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true" style="vertical-align:-2px;">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.01a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
      </button>
    </div>
    <div class="keys" id="keys"></div>
  </section>

  <div id="themer" role="dialog" aria-modal="false" aria-label="Theme customizer">
    <h2>THEME//CUSTOMIZER</h2>
    <label>preset palette</label>
    <div class="tpre" role="group" aria-label="Preset palettes">
      <button type="button" data-th="cyberpunk" aria-pressed="true">▸ CYBERPUNK</button>
      <button type="button" data-th="terminal" aria-pressed="false">▸ TERMINAL</button>
      <button type="button" data-th="retro" aria-pressed="false">▸ RETRO LIGHT</button>
    </div>
    <label for="accPick">manual accent color</label>
    <input type="color" id="accPick" value="#37f2ff">
    <div class="edrow">
      <button type="button" id="accReset" class="ghost">reset accent</button>
      <button type="button" id="themeClose" class="ghost">close</button>
    </div>
  </div>

  <div id="editor" role="dialog" aria-modal="false" aria-label="Edit key">
    <h2 id="edTitle">EDIT KEY 01</h2>
    <label for="edLabel">label</label>
    <input type="text" id="edLabel" maxlength="14" autocomplete="off">
    <label for="edText">macro text (copied on press)</label>
    <textarea id="edText" maxlength="500"></textarea>
    <label for="hotCap">hotkey</label>
    <button type="button" id="hotCap">none — click to capture</button>
    <div class="edrow">
      <button type="button" id="edSave">SAVE</button>
      <button type="button" id="edClear" class="ghost">clear key</button>
      <button type="button" id="edClose" class="ghost">close</button>
    </div>
  </div>
</main>

<p id="toast" role="status" aria-live="polite"></p>

<script>
(function(){
'use strict';

var N = 12;
var DEFAULTS = [
  { label:'GM ☀',      text:'gm gm ☀️',                         hot:'1' },
  { label:'LFG 🔥',    text:'LFG 🔥🔥🔥',                        hot:'2' },
  { label:'GG',        text:'gg wp 🤝',                          hot:'3' },
  { label:'¯\\_(ツ)_/¯', text:'¯\\_(ツ)_/¯',                     hot:'4' },
  { label:'SLOPPY',    text:'built live on sloppy.live',         hot:'5' },
  { label:'ONE SEC',   text:'one sec — compiling my thoughts…',  hot:'6' },
  { label:'SHIP IT',   text:'ship it 🚀',                        hot:'7' },
  { label:'HACK',      text:"I'm in. 😎",                        hot:'8' },
  { label:'BRB ☕',    text:'brb, coffee protocol ☕',           hot:'9' },
  { label:'NO.',       text:'no.',                               hot:'0' },
  { label:'+ SET ME',  text:'',                                  hot:'' },
  { label:'+ SET ME',  text:'',                                  hot:'' }
];
var state = null;
try{ state = JSON.parse(localStorage.getItem('macro-hud-v1')); }catch(e){}
if(!state || !Array.isArray(state.keys) || state.keys.length !== N){
  state = { x:null, y:null, keys: JSON.parse(JSON.stringify(DEFAULTS)) };
}
if(!state.theme) state.theme = { name:'cyberpunk', accent:'' };

/* ── themes ── */
var THEMES = {
  cyberpunk: { bg:'#07070f', acc:'#37f2ff', acc2:'#ff3ddb', warn:'#ffc94d', ink:'#dff6ff', dim:'#5c7a94',
               glass:'rgba(10,16,30,0.55)', panel:'rgba(12,14,26,0.92)', keybg:'rgba(16,26,46,0.6)',
               btnInk:'#03202a', scanA:0.22, vigA:0.5 },
  terminal:  { bg:'#040804', acc:'#39ff6a', acc2:'#c8ff2e', warn:'#ffd24d', ink:'#d8ffdf', dim:'#4d7a55',
               glass:'rgba(5,14,7,0.6)', panel:'rgba(6,16,9,0.93)', keybg:'rgba(10,26,14,0.6)',
               btnInk:'#02180a', scanA:0.3, vigA:0.55 },
  retro:     { bg:'#ece1c8', acc:'#c2451e', acc2:'#2f6ea8', warn:'#8a6210', ink:'#2a2118', dim:'#8a7c66',
               glass:'rgba(252,246,232,0.7)', panel:'rgba(250,244,230,0.96)', keybg:'rgba(255,252,244,0.72)',
               btnInk:'#fff6e8', scanA:0.05, vigA:0.16 }
};
function hexRgb(h){
  h = (h || '').replace('#','');
  if(h.length !== 6) return null;
  return parseInt(h.substr(0,2),16) + ',' + parseInt(h.substr(2,2),16) + ',' + parseInt(h.substr(4,2),16);
}
function applyTheme(){
  var th = THEMES[state.theme.name] || THEMES.cyberpunk;
  var acc = /^#[0-9a-fA-F]{6}$/.test(state.theme.accent) ? state.theme.accent : th.acc;
  var r = document.documentElement.style;
  r.setProperty('--bg', th.bg);
  r.setProperty('--acc', acc);        r.setProperty('--acc-rgb', hexRgb(acc));
  r.setProperty('--acc2', th.acc2);   r.setProperty('--acc2-rgb', hexRgb(th.acc2));
  r.setProperty('--warn', th.warn);   r.setProperty('--warn-rgb', hexRgb(th.warn));
  r.setProperty('--ink', th.ink);
  r.setProperty('--dim', th.dim);
  r.setProperty('--glass', th.glass);
  r.setProperty('--panel', th.panel);
  r.setProperty('--keybg', th.keybg);
  r.setProperty('--btn-ink', th.btnInk);
  r.setProperty('--scan-a', th.scanA);
  r.setProperty('--vig-a', th.vigA);
  document.querySelectorAll('.tpre button').forEach(function(b){
    b.setAttribute('aria-pressed', String(b.dataset.th === state.theme.name));
  });
  var pick = document.getElementById('accPick');
  if(pick) pick.value = acc;
}
function save(){
  try{ localStorage.setItem('macro-hud-v1', JSON.stringify(state)); }catch(e){}
}

/* ── audio ── */
var ac = null;
function blip(i, fail){
  try{
    if(!ac) ac = new (window.AudioContext || window.webkitAudioContext)();
    var t = ac.currentTime;
    var o = ac.createOscillator(), g = ac.createGain();
    o.type = 'square';
    o.frequency.setValueAtTime(fail ? 160 : 420 + (i % 4) * 90 + Math.floor(i / 4) * 40, t);
    if(!fail) o.frequency.exponentialRampToValueAtTime(880 + i * 40, t + 0.07);
    g.gain.setValueAtTime(0.08, t);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.12);
    o.connect(g); g.connect(ac.destination);
    o.start(t); o.stop(t + 0.13);
  }catch(e){}
}

/* ── build keys ── */
var keysEl = document.getElementById('keys');
var keyEls = [];
function keyFace(i){
  var k = state.keys[i];
  var el = keyEls[i];
  el.innerHTML = '';
  var lab = document.createElement('span');
  lab.textContent = k.label || '·';
  el.appendChild(lab);
  var hot = document.createElement('span');
  hot.className = 'hot';
  hot.textContent = k.hot ? '[' + k.hot.toUpperCase() + ']' : ' ';
  el.appendChild(hot);
  el.setAttribute('aria-label',
    (k.label || 'empty key') + (k.hot ? ', hotkey ' + k.hot : '') + (k.text ? ', copies: ' + k.text.slice(0, 40) : ', unassigned'));
}
for(var i = 0; i < N; i++){
  (function(idx){
    var b = document.createElement('button');
    b.type = 'button';
    b.className = 'mkey';
    b.addEventListener('click', function(){ pressKey(idx); });
    keysEl.appendChild(b);
    keyEls.push(b);
  })(i);
}
function refreshAll(){ for(var i = 0; i < N; i++) keyFace(i); }

/* ── toast ── */
var toastEl = document.getElementById('toast');
var toastT = null;
function toast(msg){
  toastEl.textContent = msg;
  toastEl.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(function(){ toastEl.classList.remove('show'); }, 1400);
}

/* ── press ── */
function firePulse(i){
  var el = keyEls[i];
  el.classList.remove('fire');
  void el.offsetWidth;
  el.classList.add('fire');
  setTimeout(function(){ el.classList.remove('fire'); }, 220);
}
function pressKey(i){
  hideHint();
  if(editing){ openEditor(i); return; }
  var k = state.keys[i];
  firePulse(i);
  if(!k.text){
    blip(i, true);
    toast('EMPTY CHANNEL — ⚙ TO ASSIGN');
    return;
  }
  blip(i, false);
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(k.text).then(function(){
      toast('COPIED ▸ ' + (k.label || 'MACRO'));
    }, function(){
      toast('CLIPBOARD BLOCKED');
    });
  } else {
    toast('CLIPBOARD UNAVAILABLE');
  }
}

/* ── hotkeys ── */
document.addEventListener('keydown', function(e){
  if(e.repeat) return;
  var tag = (e.target.tagName || '').toLowerCase();
  if(tag === 'input' || tag === 'textarea') return;
  if(capturing){ captureHot(e); return; }
  if(editing) return;
  var k = e.key.toLowerCase();
  for(var i = 0; i < N; i++){
    if(state.keys[i].hot && state.keys[i].hot.toLowerCase() === k){
      pressKey(i);
      return;
    }
  }
});

/* ── drag (and keyboard-move) the pad ── */
var pad = document.getElementById('pad');
var bar = document.getElementById('padBar');
function placePad(x, y){
  var r = pad.getBoundingClientRect();
  x = Math.max(6, Math.min(window.innerWidth - r.width - 6, x));
  y = Math.max(6, Math.min(window.innerHeight - r.height - 6, y));
  pad.style.left = x + 'px';
  pad.style.top = y + 'px';
  state.x = x; state.y = y;
}
(function initPos(){
  var x = typeof state.x === 'number' ? state.x : window.innerWidth * 0.56;
  var y = typeof state.y === 'number' ? state.y : window.innerHeight * 0.24;
  pad.style.left = '0px'; pad.style.top = '0px';
  requestAnimationFrame(function(){ placePad(x, y); });
})();
var dragging = false, dx = 0, dy = 0;
bar.addEventListener('pointerdown', function(e){
  if(e.target.id === 'editBtn') return;
  dragging = true;
  var r = pad.getBoundingClientRect();
  dx = e.clientX - r.left; dy = e.clientY - r.top;
  bar.setPointerCapture(e.pointerId);
  hideHint();
});
bar.addEventListener('pointermove', function(e){
  if(!dragging) return;
  placePad(e.clientX - dx, e.clientY - dy);
});
['pointerup','pointercancel'].forEach(function(ev){
  bar.addEventListener(ev, function(){ if(dragging){ dragging = false; save(); } });
});
bar.addEventListener('keydown', function(e){
  var r = pad.getBoundingClientRect();
  var step = e.shiftKey ? 32 : 10, moved = true;
  if(e.key === 'ArrowLeft') placePad(r.left - step, r.top);
  else if(e.key === 'ArrowRight') placePad(r.left + step, r.top);
  else if(e.key === 'ArrowUp') placePad(r.left, r.top - step);
  else if(e.key === 'ArrowDown') placePad(r.left, r.top + step);
  else moved = false;
  if(moved){ e.preventDefault(); save(); }
});
window.addEventListener('resize', function(){
  var r = pad.getBoundingClientRect();
  placePad(r.left, r.top);
});

/* ── edit mode & editor ── */
var editing = false, editIdx = -1, capturing = false;
var editBtn = document.getElementById('editBtn');
var editorEl = document.getElementById('editor');
var edLabel = document.getElementById('edLabel');
var edText = document.getElementById('edText');
var hotCap = document.getElementById('hotCap');
editBtn.addEventListener('click', function(){
  editing = !editing;
  editBtn.setAttribute('aria-pressed', String(editing));
  document.body.classList.toggle('editing', editing);
  if(!editing) closeEditor();
  toast(editing ? 'EDIT MODE — CLICK A KEY' : 'ARMED');
});
function openEditor(i){
  editIdx = i;
  var k = state.keys[i];
  document.getElementById('edTitle').textContent = 'EDIT KEY ' + String(i + 1).padStart(2, '0');
  edLabel.value = k.label === '+ SET ME' ? '' : (k.label || '');
  edText.value = k.text || '';
  setHotFace(k.hot);
  capturing = false;
  var pr = pad.getBoundingClientRect();
  var ex = pr.right + 14, ey = pr.top;
  if(ex + 310 > window.innerWidth) ex = Math.max(6, pr.left - 320);
  editorEl.style.left = Math.max(6, ex) + 'px';
  editorEl.style.top = Math.max(6, Math.min(window.innerHeight - 340, ey)) + 'px';
  editorEl.classList.add('show');
  edLabel.focus();
}
function closeEditor(){
  editorEl.classList.remove('show');
  editIdx = -1;
  capturing = false;
}
function setHotFace(hot){
  hotCap.textContent = hot ? '[ ' + hot.toUpperCase() + ' ] — click to change' : 'none — click to capture';
  hotCap.classList.remove('listen');
}
hotCap.addEventListener('click', function(){
  capturing = true;
  hotCap.textContent = 'press any key… (esc = none)';
  hotCap.classList.add('listen');
});
function captureHot(e){
  e.preventDefault();
  capturing = false;
  if(editIdx < 0) return;
  var k = e.key.toLowerCase();
  if(k === 'escape'){ state.keys[editIdx]._pendingHot = ''; setHotFace(''); return; }
  if(k.length > 12) { setHotFace(state.keys[editIdx].hot); return; }
  state.keys[editIdx]._pendingHot = k;
  setHotFace(k);
}
document.getElementById('edSave').addEventListener('click', function(){
  if(editIdx < 0) return;
  var k = state.keys[editIdx];
  k.label = edLabel.value.trim() || (edText.value.trim() ? 'MACRO' : '+ SET ME');
  k.text = edText.value;
  if(k._pendingHot !== undefined){
    /* steal the hotkey from any other channel */
    for(var i = 0; i < N; i++) if(i !== editIdx && state.keys[i].hot === k._pendingHot) state.keys[i].hot = '';
    k.hot = k._pendingHot;
    delete k._pendingHot;
  }
  save();
  refreshAll();
  toast('KEY ' + String(editIdx + 1).padStart(2, '0') + ' SAVED');
  closeEditor();
});
document.getElementById('edClear').addEventListener('click', function(){
  if(editIdx < 0) return;
  state.keys[editIdx] = { label:'+ SET ME', text:'', hot:'' };
  save();
  refreshAll();
  closeEditor();
});
document.getElementById('edClose').addEventListener('click', closeEditor);
document.addEventListener('keydown', function(e){
  if(e.key === 'Escape' && !capturing){
    if(editorEl.classList.contains('show')) closeEditor();
  }
});

/* ── theme customizer panel ── */
var themeBtn = document.getElementById('themeBtn');
var themerEl = document.getElementById('themer');
function positionPanel(el){
  var pr = pad.getBoundingClientRect();
  var ex = pr.right + 14;
  if(ex + 310 > window.innerWidth) ex = Math.max(6, pr.left - 320);
  el.style.left = Math.max(6, ex) + 'px';
  el.style.top = Math.max(6, Math.min(window.innerHeight - 360, pr.top)) + 'px';
}
themeBtn.addEventListener('click', function(){
  var open = !themerEl.classList.contains('show');
  themerEl.classList.toggle('show', open);
  themeBtn.setAttribute('aria-pressed', String(open));
  if(open){
    closeEditor();
    positionPanel(themerEl);
  }
});
document.querySelectorAll('.tpre button').forEach(function(b){
  b.addEventListener('click', function(){
    state.theme.name = b.dataset.th;
    state.theme.accent = '';
    applyTheme(); save();
    toast('THEME ▸ ' + b.textContent.replace('▸ ','').trim());
  });
});
document.getElementById('accPick').addEventListener('input', function(e){
  state.theme.accent = e.target.value;
  applyTheme(); save();
});
document.getElementById('accReset').addEventListener('click', function(){
  state.theme.accent = '';
  applyTheme(); save();
  toast('ACCENT RESET');
});
document.getElementById('themeClose').addEventListener('click', function(){
  themerEl.classList.remove('show');
  themeBtn.setAttribute('aria-pressed', 'false');
});
document.addEventListener('keydown', function(e){
  if(e.key === 'Escape' && themerEl.classList.contains('show')){
    themerEl.classList.remove('show');
    themeBtn.setAttribute('aria-pressed', 'false');
  }
});
applyTheme();

/* ── hint ── */
var hintEl = document.getElementById('hint');
var hintHidden = false;
function hideHint(){
  if(hintHidden) return;
  hintHidden = true;
  setTimeout(function(){ hintEl.classList.add('gone'); }, 1200);
}
setTimeout(hideHint, 14000);

refreshAll();
})();
</script>
</body>
</html>
