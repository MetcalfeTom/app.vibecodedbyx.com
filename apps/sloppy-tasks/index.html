<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Sloppy Tasks</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="A to-do list where unloved tasks grow hair and scream. Pat them to calm them down.">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%98%B1">
<meta property="og:title" content="Sloppy Tasks">
<meta property="og:description" content="A to-do list where unloved tasks grow hair and scream. Pat them to calm them down.">
<meta property="og:url" content="https://sloppy.live/sloppy-tasks">
<meta property="og:type" content="website">
<meta property="og:image" content="https://image.pollinations.ai/prompt/cute%20pastel%20to-do%20cards%20growing%20wild%20black%20hair%20and%20screaming%20mouths%20with%20worried%20eyes%2C%20editorial%20illustration%2C%20warm%20cream%20background?width=1200&height=630&nologo=true">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bagel+Fat+One&family=IBM+Plex+Sans:wght@400;500;700&family=IBM+Plex+Mono:wght@400;500&family=VT323&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#f2e8d8;
  --paper-2:#fdf6e6;
  --rule:#d6c69a;
  --ink:#1f1a14;
  --ink-soft:#5a4d36;
  --hot:#e7445a;
  --hot-soft:#f0a3ad;
  --gold:#f5c453;
  --grow:#7e9c46;
  --hair:#1a1108;
  --skin:#fdf6e6;
  --scream:#e7445a;
  --calm:#7ab8d6;
}
*{box-sizing:border-box;margin:0;padding:0}
html{font-size:100%;-webkit-text-size-adjust:100%}
body{
  min-height:100vh;background:var(--paper);color:var(--ink);
  font-family:'IBM Plex Sans',sans-serif;font-size:1rem;line-height:1.5;
  background-image:
    radial-gradient(circle at 15% 10%, rgba(120,80,30,0.05), transparent 55%),
    radial-gradient(circle at 85% 90%, rgba(120,80,30,0.07), transparent 55%),
    repeating-linear-gradient(11deg, rgba(80,50,20,0.035) 0 1px, transparent 1px 9px),
    repeating-linear-gradient(101deg, rgba(80,50,20,0.035) 0 1px, transparent 1px 11px);
}
a.skip-link{
  position:absolute;left:0.5rem;top:-3rem;z-index:200;
  background:var(--hot);color:var(--paper);padding:0.5rem 0.75rem;
  text-decoration:none;border-radius:0.25rem;
  font-family:'Bagel Fat One',cursive;font-size:0.875rem;
}
a.skip-link:focus{top:0.5rem;outline:0.1875rem solid var(--gold);outline-offset:0.125rem}

main{max-width:48rem;margin:0 auto;padding:1.75rem 1.25rem 4rem}

header.deck{
  margin-bottom:1.25rem;padding-bottom:1.25rem;
  border-bottom:0.125rem solid var(--rule);
}
.head-row{
  display:flex;align-items:flex-end;justify-content:space-between;gap:1rem;flex-wrap:wrap;
}
h1{
  font-family:'Bagel Fat One',cursive;
  font-size:clamp(1.75rem, 4.5vw, 2.625rem);
  letter-spacing:0.02em;line-height:1;color:var(--ink);
}
h1 .hot{color:var(--hot)}
.tag{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:1.125rem;color:var(--ink-soft);margin-top:0.25rem;
}
.controls{display:flex;gap:0.5rem;flex-wrap:wrap;align-items:center}
.pill{
  background:var(--paper-2);border:0.125rem solid var(--ink);
  border-radius:0.25rem;padding:0.4375rem 0.625rem;
  font-family:'IBM Plex Mono',monospace;font-size:0.75rem;
  letter-spacing:0.16em;text-transform:uppercase;
  display:flex;gap:0.4375rem;align-items:center;
  min-height:2.25rem;color:var(--ink);cursor:pointer;
  transition:transform 0.08s, box-shadow 0.08s;
}
.pill:hover{transform:translate(-0.0625rem,-0.0625rem);box-shadow:0.1875rem 0.1875rem 0 var(--ink)}
.pill:focus-visible{outline:0.1875rem solid var(--hot);outline-offset:0.125rem}
.pill[aria-pressed="true"]{background:var(--ink);color:var(--paper)}
.pill b{font-family:'VT323',monospace;font-size:1rem;font-weight:400;color:var(--hot)}

/* Add row */
.add-row{
  margin-top:1rem;display:grid;grid-template-columns:1fr auto;gap:0.625rem;
}
.add-row input{
  background:var(--paper-2);border:0.125rem solid var(--ink);
  color:var(--ink);font-family:'IBM Plex Sans',sans-serif;font-size:1.0625rem;
  padding:0.75rem 1rem;border-radius:0.25rem;min-height:2.875rem;
}
.add-row input:focus-visible{outline:0.1875rem solid var(--hot);outline-offset:0.0625rem;border-color:var(--hot)}
.add-row button{
  background:var(--hot);color:var(--paper);
  border:0.125rem solid var(--ink);
  font-family:'Bagel Fat One',cursive;font-size:1rem;letter-spacing:0.04em;
  padding:0.5rem 1.25rem;border-radius:0.25rem;cursor:pointer;
  min-height:2.875rem;min-width:5.5rem;
  box-shadow:0.1875rem 0.1875rem 0 var(--ink);
  transition:transform 0.08s, box-shadow 0.08s;
}
.add-row button:hover{transform:translate(-0.0625rem,-0.0625rem);box-shadow:0.25rem 0.25rem 0 var(--ink)}
.add-row button:focus-visible{outline:0.1875rem solid var(--gold);outline-offset:0.0625rem}

/* Task list */
.list{display:flex;flex-direction:column;gap:1.25rem;margin-top:1.5rem}

.task{
  position:relative;
  /* leave room for hair to escape upward */
  padding-top:48px;
}
.task .hair-zone{
  position:absolute;left:8px;right:8px;top:0;height:60px;
  pointer-events:none;
  overflow:visible;
}
.task .hair-zone svg{
  position:absolute;left:0;top:0;width:100%;height:100%;overflow:visible;
}
.task .card{
  display:grid;
  grid-template-columns:auto 1fr auto;
  gap:0.875rem;align-items:center;
  background:var(--paper-2);border:0.1875rem solid var(--ink);
  border-radius:0.5rem;padding:0.875rem 1rem;
  box-shadow:0.25rem 0.25rem 0 var(--ink);
  position:relative;
  transition:transform 0.15s, box-shadow 0.15s, background 0.4s;
}
.task .face{
  width:64px;height:60px;flex-shrink:0;
}
.task .face svg{display:block;width:100%;height:100%;overflow:visible}
.task .body{display:flex;flex-direction:column;gap:0.25rem;min-width:0}
.task .body input{
  width:100%;background:transparent;border:0;outline:0;
  font-family:'IBM Plex Sans',sans-serif;font-size:1.0625rem;
  color:var(--ink);font-weight:500;padding:0.125rem 0;
}
.task .body input:focus-visible{
  outline:0.1875rem solid var(--hot);outline-offset:0.125rem;border-radius:0.125rem;
}
.task .meta{
  font-family:'IBM Plex Mono',monospace;font-size:0.6875rem;
  letter-spacing:0.16em;text-transform:uppercase;color:var(--ink-soft);
}
.task .meta .stage-name{color:var(--grow);font-weight:600}
.task .actions{
  display:flex;gap:0.375rem;align-items:center;flex-shrink:0;
}
.task .actions button{
  background:var(--paper);border:0.125rem solid var(--ink);
  color:var(--ink);font-family:'Bagel Fat One',cursive;font-size:0.875rem;
  padding:0;width:2.5rem;height:2.5rem;border-radius:0.25rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0.125rem 0.125rem 0 var(--ink);
  transition:transform 0.06s, box-shadow 0.06s, background 0.15s;
  letter-spacing:0;
}
.task .actions button:hover{transform:translate(-0.0625rem,-0.0625rem);box-shadow:0.1875rem 0.1875rem 0 var(--ink)}
.task .actions .pat:hover{background:var(--calm);color:var(--paper)}
.task .actions .done:hover{background:var(--grow);color:var(--paper)}
.task .actions .del:hover{background:var(--hot);color:var(--paper)}
.task .actions button:focus-visible{outline:0.1875rem solid var(--gold);outline-offset:0.125rem}

/* stage-driven look */
.task[data-stage="0"] .meta .stage-name{color:var(--calm)}
.task[data-stage="1"] .meta .stage-name{color:var(--grow)}
.task[data-stage="2"] .meta .stage-name{color:#a07c2e}
.task[data-stage="3"] .meta .stage-name{color:#c46a2a}
.task[data-stage="4"] .meta .stage-name{color:var(--hot)}
.task[data-stage="5"] .meta .stage-name{color:var(--scream);font-weight:700}

.task[data-stage="4"] .card{animation:wobble 0.6s ease-in-out infinite}
.task[data-stage="5"] .card{
  animation:shake 0.18s steps(2) infinite;
  background:#fde2e6;
  border-color:var(--scream);
  box-shadow:0.25rem 0.25rem 0 var(--scream);
}

@keyframes wobble{
  0%, 100%{transform:rotate(-0.4deg) translate(0,0)}
  50%{transform:rotate(0.4deg) translate(0,0)}
}
@keyframes shake{
  0%{transform:translate(-2px, -1px) rotate(-0.6deg)}
  25%{transform:translate(2px, 1px) rotate(0.6deg)}
  50%{transform:translate(-1px, 2px) rotate(-0.4deg)}
  75%{transform:translate(1px, -2px) rotate(0.4deg)}
  100%{transform:translate(-2px, -1px) rotate(-0.6deg)}
}

.task.done .card{
  opacity:0.5;text-decoration:line-through;
  background:var(--paper);
}
.task.done .body input{text-decoration:line-through}
.task.done .actions .done{display:none}
.task.done .actions .pat{display:none}

.task.popping{animation:popOff 0.6s ease-out forwards}
@keyframes popOff{
  0%{opacity:1;transform:scale(1) rotate(0)}
  40%{opacity:1;transform:scale(1.08) rotate(-3deg)}
  100%{opacity:0;transform:scale(0.6) rotate(8deg) translateY(2rem)}
}

/* Empty state */
.empty{
  text-align:center;padding:3rem 1rem;
  font-family:'Cormorant Garamond',serif;font-style:italic;
  color:var(--ink-soft);font-size:1.25rem;
}

@media (prefers-reduced-motion: reduce){
  .task[data-stage="4"] .card{animation:none}
  .task[data-stage="5"] .card{animation:none}
  .task.popping{animation:none;opacity:0}
  .pill, .add-row button, .task .actions button{transition:none}
}

.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap}
</style>
</head>
<body>

<a href="#list" class="skip-link">Skip to tasks</a>

<main>
  <header class="deck">
    <div class="head-row">
      <div class="brand">
        <h1>SLOPPY <span class="hot">TASKS</span></h1>
        <div class="tag">— a to-do list. tasks grow hair. they scream when ignored. —</div>
      </div>
      <div class="controls" role="status" aria-live="polite">
        <button id="speedBtn" class="pill" aria-label="Cycle speed multiplier">
          SPEED <b id="speedLabel">1×</b>
        </button>
        <button id="muteBtn" class="pill" aria-pressed="false" aria-label="Toggle screams">
          SCREAMS <b id="muteLabel">ON</b>
        </button>
        <button id="petAllBtn" class="pill" aria-label="Calm every task at once">PAT ALL 🤲</button>
        <button id="clearDoneBtn" class="pill" aria-label="Remove all done tasks">CLEAR DONE</button>
      </div>
    </div>
    <form class="add-row" onsubmit="event.preventDefault(); addTaskFromInput();" role="search">
      <input id="addInput" type="text" placeholder="add a task… (e.g. respond to mom)" autocomplete="off" maxlength="160" autofocus>
      <button type="submit">ADD</button>
    </form>
  </header>

  <section id="list" class="list" aria-label="Tasks"></section>
</main>

<script>
"use strict";

// ============================================================
// SLOPPY TASKS — to-dos that grow hair and scream when ignored
// ============================================================

const STORAGE_KEY = 'sloppy-tasks-v1';
const SETTINGS_KEY = 'sloppy-tasks-settings-v1';

const STAGES = [
  { name:'NEW',       maxAge:8,         hairCount:0,  hasEyes:false, mouth:'smile' },
  { name:'FUZZY',     maxAge:25,        hairCount:5,  hasEyes:false, mouth:'tiny'  },
  { name:'HAIRY',     maxAge:60,        hairCount:14, hasEyes:true,  mouth:'flat'  },
  { name:'AWAKE',     maxAge:120,       hairCount:28, hasEyes:true,  mouth:'frown' },
  { name:'ANGRY',     maxAge:240,       hairCount:48, hasEyes:true,  mouth:'angry' },
  { name:'SCREAMING', maxAge:Infinity,  hairCount:78, hasEyes:true,  mouth:'scream'},
];
function stageIndexOf(age){
  for (let i = 0; i < STAGES.length; i++){
    if (age < STAGES[i].maxAge) return i;
  }
  return STAGES.length - 1;
}

// === RNG ===
function mulberry32(seed){
  let t = seed >>> 0;
  return function(){ t |= 0; t = (t + 0x6D2B79F5) | 0; let r = Math.imul(t ^ (t >>> 15), 1 | t); r = (r + Math.imul(r ^ (r >>> 7), 61 | r)) ^ r; return ((r ^ (r >>> 14)) >>> 0) / 4294967296; };
}

// === State ===
let tasks = [];
let settings = { speed: 1, screamsOn: true };
let lastScreamTimes = new Map();   // taskId → last scream timestamp

function loadState(){
  try{
    const t = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    if (Array.isArray(t)) tasks = t;
  } catch(e){}
  try{
    const s = JSON.parse(localStorage.getItem(SETTINGS_KEY) || 'null');
    if (s && typeof s === 'object') settings = Object.assign(settings, s);
  } catch(e){}
}
function saveTasks(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks)); } catch(e){}
}
function saveSettings(){
  try{ localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings)); } catch(e){}
}

function freshTask(text){
  return {
    id: 't_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 6),
    text: text.trim().slice(0, 200) || 'untitled task',
    createdAt: Date.now(),
    lastPattedAt: Date.now(),
    done: false,
    seed: (Math.random() * 1e9) | 0,
  };
}

function addTask(text){
  const t = freshTask(text);
  tasks.unshift(t);
  saveTasks();
  renderList();
  return t;
}
function addTaskFromInput(){
  const inp = document.getElementById('addInput');
  if (!inp.value.trim()) return;
  addTask(inp.value);
  inp.value = '';
  inp.focus();
}

function ageOfSeconds(t){
  const base = t.lastPattedAt || t.createdAt;
  return ((Date.now() - base) / 1000) * settings.speed;
}

function patTask(id){
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  t.lastPattedAt = Date.now();
  saveTasks();
  // Re-render this task's stage-related visuals
  const el = document.querySelector(`.task[data-id="${id}"]`);
  if (el){
    el.classList.add('patted');
    setTimeout(()=>el.classList.remove('patted'), 400);
  }
  refreshAll();
  sndPat();
}

function markDone(id){
  const t = tasks.find(x => x.id === id);
  if (!t) return;
  t.done = true;
  saveTasks();
  refreshAll();
  sndDone();
  // Trigger pop-off animation, then remove after 600ms
  const el = document.querySelector(`.task[data-id="${id}"]`);
  if (el){
    el.classList.add('popping');
    setTimeout(() => removeTask(id), 600);
  }
}
function removeTask(id){
  const wasScreaming = isScreaming(id);
  tasks = tasks.filter(x => x.id !== id);
  saveTasks();
  if (wasScreaming) sndDelete();
  renderList();
}
function isScreaming(id){
  const t = tasks.find(x => x.id === id);
  if (!t || t.done) return false;
  return stageIndexOf(ageOfSeconds(t)) === STAGES.length - 1;
}

// === Render ===
const listEl = document.getElementById('list');

function renderList(){
  listEl.innerHTML = '';
  if (tasks.length === 0){
    const empty = document.createElement('div');
    empty.className = 'empty';
    empty.textContent = 'no tasks. add one above and forget it.';
    listEl.appendChild(empty);
    return;
  }
  for (const t of tasks){
    listEl.appendChild(buildTaskNode(t));
  }
  refreshAll();
}

function buildTaskNode(t){
  const node = document.createElement('article');
  node.className = 'task' + (t.done ? ' done' : '');
  node.dataset.id = t.id;
  node.dataset.stage = '0';

  // Hair zone (above the card)
  const hairZone = document.createElement('div');
  hairZone.className = 'hair-zone';
  const hairSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  hairSvg.setAttribute('viewBox', '0 0 200 60');
  hairSvg.setAttribute('preserveAspectRatio', 'none');
  hairZone.appendChild(hairSvg);
  node.appendChild(hairZone);

  // Card body
  const card = document.createElement('div');
  card.className = 'card';

  // Face (svg)
  const face = document.createElement('div');
  face.className = 'face';
  const faceSvg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  faceSvg.setAttribute('viewBox', '0 0 100 80');
  faceSvg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
  // background blob (the "head")
  const blob = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
  blob.setAttribute('cx', '50');
  blob.setAttribute('cy', '42');
  blob.setAttribute('rx', '36');
  blob.setAttribute('ry', '34');
  blob.setAttribute('fill', colorForSeed(t.seed));
  blob.setAttribute('stroke', '#1f1a14');
  blob.setAttribute('stroke-width', '3');
  blob.classList.add('blob');
  faceSvg.appendChild(blob);
  // eyes (initially hidden)
  const eyeL = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  eyeL.setAttribute('cx', '38'); eyeL.setAttribute('cy', '38'); eyeL.setAttribute('r', '4');
  eyeL.setAttribute('fill', '#1f1a14');
  eyeL.classList.add('eye'); eyeL.style.display = 'none';
  faceSvg.appendChild(eyeL);
  const eyeR = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
  eyeR.setAttribute('cx', '62'); eyeR.setAttribute('cy', '38'); eyeR.setAttribute('r', '4');
  eyeR.setAttribute('fill', '#1f1a14');
  eyeR.classList.add('eye'); eyeR.style.display = 'none';
  faceSvg.appendChild(eyeR);
  // mouth path
  const mouth = document.createElementNS('http://www.w3.org/2000/svg', 'path');
  mouth.setAttribute('fill', 'none');
  mouth.setAttribute('stroke', '#1f1a14');
  mouth.setAttribute('stroke-width', '2.5');
  mouth.setAttribute('stroke-linecap', 'round');
  mouth.classList.add('mouth');
  faceSvg.appendChild(mouth);
  // scream mouth fill (only used at scream stage)
  const screamFill = document.createElementNS('http://www.w3.org/2000/svg', 'ellipse');
  screamFill.setAttribute('cx', '50'); screamFill.setAttribute('cy', '60');
  screamFill.setAttribute('rx', '0'); screamFill.setAttribute('ry', '0');
  screamFill.setAttribute('fill', '#3a0510');
  screamFill.classList.add('scream-fill');
  faceSvg.insertBefore(screamFill, mouth);
  face.appendChild(faceSvg);
  card.appendChild(face);

  // Body (text + meta)
  const body = document.createElement('div');
  body.className = 'body';
  const input = document.createElement('input');
  input.type = 'text';
  input.value = t.text;
  input.maxLength = 200;
  input.addEventListener('input', () => {
    t.text = input.value;
    saveTasks();
  });
  body.appendChild(input);
  const meta = document.createElement('div');
  meta.className = 'meta';
  meta.innerHTML = '<span class="stage-name">NEW</span> · <span class="age">0:00</span>';
  body.appendChild(meta);
  card.appendChild(body);

  // Actions
  const actions = document.createElement('div');
  actions.className = 'actions';
  const patBtn = document.createElement('button');
  patBtn.className = 'pat';
  patBtn.type = 'button';
  patBtn.title = 'Pat to calm (resets timer)';
  patBtn.setAttribute('aria-label', 'Pat to calm');
  patBtn.textContent = '🤲';
  patBtn.addEventListener('click', () => patTask(t.id));
  actions.appendChild(patBtn);
  const doneBtn = document.createElement('button');
  doneBtn.className = 'done';
  doneBtn.type = 'button';
  doneBtn.setAttribute('aria-label', 'Mark done');
  doneBtn.textContent = '✓';
  doneBtn.addEventListener('click', () => markDone(t.id));
  actions.appendChild(doneBtn);
  const delBtn = document.createElement('button');
  delBtn.className = 'del';
  delBtn.type = 'button';
  delBtn.setAttribute('aria-label', 'Delete');
  delBtn.textContent = '×';
  delBtn.addEventListener('click', () => removeTask(t.id));
  actions.appendChild(delBtn);
  card.appendChild(actions);
  node.appendChild(card);
  return node;
}

function colorForSeed(seed){
  const rng = mulberry32(seed);
  const hue = Math.floor(rng() * 360);
  return `hsl(${hue}, 65%, 78%)`;
}

// === Per-frame face/hair refresh ===
function refreshAll(){
  for (const t of tasks){
    if (t.done) continue;
    const node = document.querySelector(`.task[data-id="${t.id}"]`);
    if (!node) continue;
    const age = ageOfSeconds(t);
    const stageIdx = stageIndexOf(age);
    const stage = STAGES[stageIdx];
    if (node.dataset.stage !== String(stageIdx)){
      node.dataset.stage = String(stageIdx);
      // Hair regeneration only on stage change
      regenHair(node, t, stage.hairCount);
    }
    // Face: eyes + mouth
    updateFace(node, stage, age);
    // Meta
    const stageName = node.querySelector('.stage-name');
    const ageEl     = node.querySelector('.age');
    if (stageName) stageName.textContent = stage.name;
    if (ageEl) ageEl.textContent = formatAge(age);
    // Scream
    if (stageIdx === STAGES.length - 1) maybeScreamFor(t.id);
  }
}

function regenHair(node, t, count){
  const svg = node.querySelector('.hair-zone svg');
  if (!svg) return;
  while (svg.firstChild) svg.removeChild(svg.firstChild);
  if (count <= 0) return;
  const rng = mulberry32(t.seed);
  for (let i = 0; i < count; i++){
    const x = rng() * 200;
    const baseY = 60;
    const ang = (rng() - 0.5) * Math.PI * 1.2 - Math.PI / 2;  // mostly upward, fanning
    const len = 22 + rng() * 32;
    const cx = x + Math.cos(ang) * len * 0.55 + (rng() - 0.5) * len * 0.6;
    const cy = baseY + Math.sin(ang) * len * 0.55 + (rng() - 0.5) * 8;
    const ex = x + Math.cos(ang) * len;
    const ey = baseY + Math.sin(ang) * len;
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M ${x.toFixed(1)} ${baseY} Q ${cx.toFixed(1)} ${cy.toFixed(1)} ${ex.toFixed(1)} ${ey.toFixed(1)}`);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', `hsl(${15 + (rng()*20)|0}, 55%, ${10 + (rng()*15)|0}%)`);
    path.setAttribute('stroke-width', (1 + rng() * 1.4).toFixed(2));
    path.setAttribute('stroke-linecap', 'round');
    svg.appendChild(path);
  }
}

function updateFace(node, stage, age){
  const eyes = node.querySelectorAll('.eye');
  const mouth = node.querySelector('.mouth');
  const screamFill = node.querySelector('.scream-fill');
  // Eyes
  for (const e of eyes){
    e.style.display = stage.hasEyes ? 'block' : 'none';
    // Eye wobble on angry/scream stages
    if (stage.mouth === 'angry' || stage.mouth === 'scream'){
      const t = (performance.now() / 100) % (Math.PI * 2);
      const ox = Math.sin(t + parseFloat(e.getAttribute('cx'))) * 1.2;
      const oy = Math.cos(t * 1.3 + parseFloat(e.getAttribute('cy'))) * 0.8;
      e.setAttribute('transform', `translate(${ox.toFixed(2)} ${oy.toFixed(2)})`);
    } else {
      e.removeAttribute('transform');
    }
  }
  // Mouth
  let d = '', screamRX = 0, screamRY = 0;
  switch (stage.mouth){
    case 'smile':  d = 'M 36 56 Q 50 64 64 56'; break;
    case 'tiny':   d = 'M 44 58 Q 50 60 56 58'; break;
    case 'flat':   d = 'M 40 58 L 60 58'; break;
    case 'frown':  d = 'M 38 60 Q 50 52 62 60'; break;
    case 'angry':  d = 'M 36 62 Q 50 50 64 62'; break;
    case 'scream':
      d = '';
      // open scream: pulsing oval + dark fill
      const t = performance.now() * 0.012;
      const scale = 1 + Math.sin(t) * 0.18;
      screamRX = 9 * scale;
      screamRY = 14 * scale;
      break;
  }
  if (mouth) mouth.setAttribute('d', d);
  if (screamFill){
    screamFill.setAttribute('rx', screamRX);
    screamFill.setAttribute('ry', screamRY);
  }
  // Slight bg shift on stages
  const blob = node.querySelector('.blob');
  if (blob && stage.mouth === 'scream'){
    blob.setAttribute('fill', '#e7445a');
    blob.setAttribute('stroke', '#3a0510');
  }
}

function formatAge(s){
  const m = Math.floor(s / 60);
  const r = Math.floor(s % 60);
  return m + ':' + (r < 10 ? '0' : '') + r;
}

// === Audio ===
let actx = null, masterGain = null;
function ensureAudio(){
  if (actx) return;
  try{
    actx = new (window.AudioContext||window.webkitAudioContext)();
    masterGain = actx.createGain();
    masterGain.gain.value = settings.screamsOn ? 0.30 : 0;
    masterGain.connect(actx.destination);
  } catch(e){}
}
function setMute(on){
  settings.screamsOn = on;
  saveSettings();
  if (masterGain) masterGain.gain.value = on ? 0.30 : 0;
  document.getElementById('muteLabel').textContent = on ? 'ON' : 'OFF';
  document.getElementById('muteBtn').setAttribute('aria-pressed', on ? 'false' : 'true');
}

function blip(freq, dur, type, vol, slide){
  if (!actx || !masterGain) return;
  const o = actx.createOscillator(); o.type = type || 'triangle';
  o.frequency.setValueAtTime(freq, actx.currentTime);
  if (slide) o.frequency.exponentialRampToValueAtTime(slide, actx.currentTime + dur);
  const g = actx.createGain(); g.gain.value = 0;
  o.connect(g); g.connect(masterGain);
  const t = actx.currentTime;
  g.gain.linearRampToValueAtTime(vol || 0.10, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.start(t); o.stop(t + dur + 0.05);
}
function noiseBurst(dur, freq, q, vol){
  if (!actx) return;
  const buf = actx.createBuffer(1, Math.floor(actx.sampleRate*dur), actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * (1 - i/d.length);
  const src = actx.createBufferSource(); src.buffer = buf;
  const bp = actx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value = freq||1000; bp.Q.value = q||3;
  const g = actx.createGain(); g.gain.value = vol||0.18;
  src.connect(bp); bp.connect(g); g.connect(masterGain);
  src.start();
}
function sndPat(){ blip(660, 0.12, 'sine', 0.10, 880); }
function sndDone(){
  if (!actx) return;
  // Relieved sigh
  blip(880, 0.18, 'triangle', 0.12, 440);
  setTimeout(()=>blip(660, 0.16, 'sine', 0.08, 330), 80);
}
function sndAdd(){ blip(420, 0.06, 'square', 0.08, 540); }
function sndDelete(){ blip(180, 0.18, 'sawtooth', 0.10, 60); }

// One scream snippet — pitched + vibrato + bandpass noise
function scream(seed){
  if (!actx || !masterGain || !settings.screamsOn) return;
  const rng = mulberry32(seed + (Date.now() & 0xfff));
  const baseFreq = 320 + rng() * 120;
  const dur = 0.5 + rng() * 0.5;
  // sawtooth voice with vibrato LFO
  const o = actx.createOscillator(); o.type='sawtooth';
  o.frequency.setValueAtTime(baseFreq, actx.currentTime);
  const lfo = actx.createOscillator(); lfo.type='sine'; lfo.frequency.value = 6 + rng() * 4;
  const lfoG = actx.createGain(); lfoG.gain.value = 25;
  lfo.connect(lfoG); lfoG.connect(o.frequency);
  const lp = actx.createBiquadFilter(); lp.type='lowpass'; lp.frequency.value = 1800;
  const g = actx.createGain(); g.gain.value = 0;
  o.connect(lp); lp.connect(g); g.connect(masterGain);
  const t = actx.currentTime;
  g.gain.linearRampToValueAtTime(0.20, t + 0.04);
  g.gain.linearRampToValueAtTime(0.18, t + dur * 0.6);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.start(t); lfo.start(t); o.stop(t + dur + 0.05); lfo.stop(t + dur + 0.05);
  // bandpass noise overlay
  const buf = actx.createBuffer(1, Math.floor(actx.sampleRate * dur), actx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random()*2-1) * (1 - i/data.length);
  const src = actx.createBufferSource(); src.buffer = buf;
  const bp = actx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value = 1200 + rng()*600; bp.Q.value = 2;
  const ng = actx.createGain(); ng.gain.value = 0.08;
  src.connect(bp); bp.connect(ng); ng.connect(masterGain);
  src.start();
}

function maybeScreamFor(id){
  if (!settings.screamsOn) return;
  const now = performance.now();
  const last = lastScreamTimes.get(id) || 0;
  // 3.5 - 5.5s between screams per task
  if (now - last < 3500 + Math.random() * 2000) return;
  ensureAudio();
  // Cap concurrent screams to avoid noise — only fire if < 3 played in last 1s
  const recent = Array.from(lastScreamTimes.values()).filter(v => now - v < 1000).length;
  if (recent >= 2) return;
  lastScreamTimes.set(id, now);
  const t = tasks.find(x => x.id === id);
  if (t) scream(t.seed || 0);
}

}
speedBtn.addEventListener('click', () => {

muteBtn.addEventListener('click', () => {

});

  for (const t of tasks){ if (!t.done) t.lastPattedAt = Date.now(); }

});

  ];

renderList();

// Refresh ages every 250ms
setInterval(refreshAll, 250);
