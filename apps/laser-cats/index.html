<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Laser Cats</title>
<link rel="icon" href="https://emojicdn.elk.sh/🐈">
<meta property="og:title" content="Laser Cats">
<meta property="og:description" content="Move the red laser dot. The cats will try to catch it. They will never catch it.">
<meta property="og:url" content="https://sloppy.live/laser-cats">
<meta property="og:image" content="https://sloppy.live/laser-cats/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Rubik+Mono+One&family=Space+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#2a1f1a;overflow:hidden;font-family:'Space Mono',monospace;color:#e8d8c0;touch-action:none;cursor:none}
body::before{content:'';position:fixed;inset:0;background:
  repeating-linear-gradient(45deg,transparent,transparent 20px,rgba(255,255,255,0.01) 20px,rgba(255,255,255,0.01) 40px),
  radial-gradient(circle at 50% 70%,rgba(100,50,20,0.3),transparent 60%);
  pointer-events:none;z-index:0}
canvas{display:block;position:fixed;inset:0;z-index:1}
.title{position:fixed;top:14px;left:0;right:0;text-align:center;z-index:10;pointer-events:none;font-family:'Rubik Mono One',sans-serif;font-size:clamp(18px,4vw,30px);color:#ff2200;text-shadow:0 0 20px rgba(255,50,0,0.6),3px 3px 0 #000;letter-spacing:3px}
.tagline{position:fixed;top:50px;left:0;right:0;text-align:center;z-index:10;pointer-events:none;font-size:10px;color:#aa6644;letter-spacing:2px}
.stats{position:fixed;top:14px;right:14px;z-index:10;pointer-events:none;font-size:12px;text-align:right;color:#aa6644}
.stats b{color:#ff9944}
.hint{position:fixed;bottom:24px;left:0;right:0;text-align:center;z-index:10;pointer-events:none;font-size:11px;color:#664433;letter-spacing:2px;transition:opacity 1s}
.backlink{position:fixed;bottom:4px;right:14px;z-index:10;font-size:10px;font-family:'Space Mono',monospace}
.backlink a{color:#553322;text-decoration:none}
.backlink a:hover{color:#ff4400}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="title">LASER CATS</div>
<div class="tagline">move the red dot. chaos ensues.</div>
<div class="stats">cats: <b id="catCount">4</b><br>pounces: <b id="pounceCount">0</b></div>
<div class="hint" id="hint">move your mouse or touch the screen</div>
<div class="backlink"><a href="https://sloppy.live">sloppy.live</a></div>

<script>
var c=document.getElementById('c'),ctx=c.getContext('2d');
var W,H;
function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight}
resize();window.addEventListener('resize',resize);

// Laser pointer
var laser={x:window.innerWidth/2,y:window.innerHeight/2,tx:window.innerWidth/2,ty:window.innerHeight/2,active:false,wobble:0};
var laserTrail=[];

// Cats
var cats=[];
var CAT_COLORS=[
  {body:'#1a1a1a',belly:'#222',nose:'#ff88aa',eye:'#ffcc00'}, // black
  {body:'#e8a055',belly:'#f0c090',nose:'#ff99bb',eye:'#88cc44'}, // orange tabby
  {body:'#f5f5f0',belly:'#ffffff',nose:'#ff99bb',eye:'#44aaff'}, // white
  {body:'#6b4a2a',belly:'#8b6a4a',nose:'#ff88aa',eye:'#44cc66'}, // brown
  {body:'#888888',belly:'#aaaaaa',nose:'#ff88aa',eye:'#66ddcc'}, // grey
  {body:'#4a3a2a',belly:'#ffffff',nose:'#ff88aa',eye:'#88dd44'}, // tuxedo
];

var pounceCount=0;
var hintTimer=null;

function spawnCat(x,y){
  var pal=CAT_COLORS[Math.floor(Math.random()*CAT_COLORS.length)];
  cats.push({
    x:x===undefined?Math.random()*W:x,
    y:y===undefined?H-60-Math.random()*100:y,
    vx:0,vy:0,
    angle:0,
    palette:pal,
    size:36+Math.random()*14,
    state:'idle', // idle, chasing, pouncing, landing
    stateTimer:0,
    pounceStart:null,
    pounceTarget:null,
    pounceProgress:0,
    bob:Math.random()*Math.PI*2,
    tailWag:Math.random()*Math.PI*2,
    blink:0,
    facingLeft:false,
    crouchAmount:0,
    earTwitch:Math.random()*Math.PI*2,
    legCycle:0,
    walking:false
  });
  document.getElementById('catCount').textContent=cats.length;
}

// Spawn initial cats
for(var i=0;i<4;i++){
  spawnCat(100+i*(W/5),H-80);
}

// Drawing cats (procedural, side view)
function drawCat(cat){
  var s=cat.size;
  var bob=Math.sin(cat.bob)*1.5;
  var crouch=cat.crouchAmount*s*0.3;
  var flip=cat.facingLeft?-1:1;

  ctx.save();
  ctx.translate(cat.x,cat.y+crouch);

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.beginPath();
  ctx.ellipse(0,s*0.55,s*0.8,s*0.12,0,0,Math.PI*2);
  ctx.fill();

  // If pouncing, draw in midair with rotation
  if(cat.state==='pouncing'){
    var rot=Math.sin(cat.pounceProgress*Math.PI)*0.3*flip;
    ctx.rotate(rot);
    ctx.translate(0,-Math.sin(cat.pounceProgress*Math.PI)*s*0.8);
  }

  ctx.scale(flip,1);

  var p=cat.palette;

  // Back legs
  if(cat.state==='idle'||cat.state==='chasing'){
    ctx.fillStyle=p.body;
    var legSwing=cat.walking?Math.sin(cat.legCycle)*s*0.1:0;
    ctx.beginPath();
    ctx.ellipse(-s*0.35,s*0.35-bob,s*0.1,s*0.25,0,0,Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(s*0.15+legSwing,s*0.35-bob,s*0.1,s*0.25,0,0,Math.PI*2);
    ctx.fill();
  }

  // Tail
  ctx.strokeStyle=p.body;
  ctx.lineWidth=s*0.16;
  ctx.lineCap='round';
  var tailWag=Math.sin(cat.tailWag)*0.6;
  ctx.beginPath();
  ctx.moveTo(-s*0.45,-bob);
  ctx.quadraticCurveTo(-s*0.8,-s*0.4-bob+tailWag*s*0.2,-s*0.9,-s*0.6+tailWag*s*0.3-bob);
  ctx.stroke();

  // Body
  ctx.fillStyle=p.body;
  ctx.beginPath();
  ctx.ellipse(0,-bob,s*0.55,s*0.35,0,0,Math.PI*2);
  ctx.fill();

  // Belly
  ctx.fillStyle=p.belly;
  ctx.beginPath();
  ctx.ellipse(0,s*0.1-bob,s*0.4,s*0.2,0,0,Math.PI*2);
  ctx.fill();

  // Front legs
  ctx.fillStyle=p.body;
  var frontLegSwing=cat.walking?Math.sin(cat.legCycle+Math.PI)*s*0.1:0;
  ctx.beginPath();
  ctx.ellipse(s*0.3,s*0.3-bob,s*0.09,s*0.22,0,0,Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(s*0.45+frontLegSwing,s*0.3-bob,s*0.09,s*0.22,0,0,Math.PI*2);
  ctx.fill();

  // Head
  var headY=-s*0.35-bob;
  var headX=s*0.5;
  ctx.fillStyle=p.body;
  ctx.beginPath();
  ctx.arc(headX,headY,s*0.3,0,Math.PI*2);
  ctx.fill();

  // Ears
  var earT=Math.sin(cat.earTwitch)*0.1;
  ctx.beginPath();
  ctx.moveTo(headX-s*0.2,headY-s*0.2);
  ctx.lineTo(headX-s*0.08+earT*s*0.1,headY-s*0.45);
  ctx.lineTo(headX+s*0.05,headY-s*0.22);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(headX+s*0.1,headY-s*0.2);
  ctx.lineTo(headX+s*0.2+earT*s*0.1,headY-s*0.45);
  ctx.lineTo(headX+s*0.25,headY-s*0.1);
  ctx.closePath();
  ctx.fill();

  // Inner ears
  ctx.fillStyle='#ff88aa';
  ctx.beginPath();
  ctx.moveTo(headX-s*0.15,headY-s*0.22);
  ctx.lineTo(headX-s*0.1,headY-s*0.38);
  ctx.lineTo(headX-s*0.03,headY-s*0.22);
  ctx.closePath();
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(headX+s*0.13,headY-s*0.22);
  ctx.lineTo(headX+s*0.18,headY-s*0.38);
  ctx.lineTo(headX+s*0.22,headY-s*0.18);
  ctx.closePath();
  ctx.fill();

  // Eyes
  var eyeSize=s*0.07;
  var eyeOpen=cat.blink>0?0.2:1;
  // Eye whites
  ctx.fillStyle='#fff';
  ctx.beginPath();
  ctx.ellipse(headX-s*0.05,headY-s*0.02,eyeSize,eyeSize*eyeOpen,0,0,Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(headX+s*0.12,headY-s*0.02,eyeSize,eyeSize*eyeOpen,0,0,Math.PI*2);
  ctx.fill();
  // Iris (tracks laser)
  if(eyeOpen>0.5){
    var tx=laser.x-cat.x,ty=laser.y-cat.y;
    var ang=Math.atan2(ty,tx*flip);
    var dx=Math.cos(ang)*eyeSize*0.4;
    var dy=Math.sin(ang)*eyeSize*0.4;
    ctx.fillStyle=p.eye;
    ctx.beginPath();
    ctx.ellipse(headX-s*0.05+dx,headY-s*0.02+dy,eyeSize*0.7,eyeSize*0.7,0,0,Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(headX+s*0.12+dx,headY-s*0.02+dy,eyeSize*0.7,eyeSize*0.7,0,0,Math.PI*2);
    ctx.fill();
    // Pupils (slit)
    ctx.fillStyle='#000';
    var pupilH=cat.state==='pouncing'||cat.state==='chasing'?eyeSize*0.5:eyeSize*0.6;
    var pupilW=cat.state==='pouncing'?eyeSize*0.35:eyeSize*0.15;
    ctx.beginPath();
    ctx.ellipse(headX-s*0.05+dx,headY-s*0.02+dy,pupilW,pupilH,0,0,Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(headX+s*0.12+dx,headY-s*0.02+dy,pupilW,pupilH,0,0,Math.PI*2);
    ctx.fill();
  }

  // Nose
  ctx.fillStyle=p.nose;
  ctx.beginPath();
  ctx.moveTo(headX+s*0.24,headY+s*0.06);
  ctx.lineTo(headX+s*0.28,headY+s*0.12);
  ctx.lineTo(headX+s*0.2,headY+s*0.12);
  ctx.closePath();
  ctx.fill();

  // Mouth
  ctx.strokeStyle='#000';
  ctx.lineWidth=1.2;
  ctx.beginPath();
  ctx.moveTo(headX+s*0.24,headY+s*0.13);
  ctx.lineTo(headX+s*0.24,headY+s*0.17);
  ctx.moveTo(headX+s*0.24,headY+s*0.17);
  ctx.quadraticCurveTo(headX+s*0.18,headY+s*0.2,headX+s*0.15,headY+s*0.17);
  ctx.moveTo(headX+s*0.24,headY+s*0.17);
  ctx.quadraticCurveTo(headX+s*0.3,headY+s*0.2,headX+s*0.33,headY+s*0.17);
  ctx.stroke();

  // Whiskers
  ctx.strokeStyle='rgba(255,255,255,0.4)';
  ctx.lineWidth=0.8;
  ctx.beginPath();
  ctx.moveTo(headX+s*0.1,headY+s*0.12);
  ctx.lineTo(headX-s*0.1,headY+s*0.08);
  ctx.moveTo(headX+s*0.1,headY+s*0.15);
  ctx.lineTo(headX-s*0.1,headY+s*0.15);
  ctx.moveTo(headX+s*0.25,headY+s*0.12);
  ctx.lineTo(headX+s*0.45,headY+s*0.08);
  ctx.moveTo(headX+s*0.25,headY+s*0.15);
  ctx.lineTo(headX+s*0.45,headY+s*0.15);
  ctx.stroke();

  ctx.restore();
}

function drawLaser(){
  if(!laser.active)return;
  // Trail
  for(var i=0;i<laserTrail.length;i++){
    var t=laserTrail[i];
    var a=(i/laserTrail.length)*0.3;
    ctx.fillStyle='rgba(255,40,0,'+a+')';
    ctx.beginPath();
    ctx.arc(t.x,t.y,3,0,Math.PI*2);
    ctx.fill();
  }

  // Glow
  var g=ctx.createRadialGradient(laser.x,laser.y,0,laser.x,laser.y,30);
  g.addColorStop(0,'rgba(255,50,20,0.6)');
  g.addColorStop(0.3,'rgba(255,30,0,0.3)');
  g.addColorStop(1,'rgba(255,0,0,0)');
  ctx.fillStyle=g;
  ctx.beginPath();
  ctx.arc(laser.x,laser.y,30,0,Math.PI*2);
  ctx.fill();

  // Wobble dot
  var wx=Math.sin(laser.wobble)*0.3;
  var wy=Math.cos(laser.wobble*1.3)*0.3;

  // Core dot
  ctx.fillStyle='#ff0000';
  ctx.beginPath();
  ctx.arc(laser.x+wx,laser.y+wy,4.5,0,Math.PI*2);
  ctx.fill();

  // Bright center
  ctx.fillStyle='#ffcccc';
  ctx.beginPath();
  ctx.arc(laser.x+wx,laser.y+wy,1.8,0,Math.PI*2);
  ctx.fill();
}

function updateCat(cat){
  cat.tailWag+=0.2;
  cat.earTwitch+=0.01;
  cat.bob+=0.05;
  cat.blink=Math.max(0,cat.blink-1);
  if(Math.random()<0.003)cat.blink=8;

  var dx=laser.x-cat.x;
  var dy=laser.y-cat.y;
  var dist=Math.sqrt(dx*dx+dy*dy);

  cat.facingLeft=dx<0;

  if(cat.state==='idle'){
    cat.walking=false;
    cat.crouchAmount*=0.9;
    if(laser.active&&dist<500){
      cat.state='chasing';
      cat.stateTimer=0;
    }
  }else if(cat.state==='chasing'){
    cat.walking=true;
    cat.legCycle+=0.25;
    cat.crouchAmount*=0.9;
    // Chase laser (ground-bound)
    var maxSpd=2.5+cat.size*0.02;
    if(dist>cat.size*0.8){
      var targetX=laser.x;
      // Stay on ground
      var targetY=H-cat.size*0.6-20;
      var dirX=targetX-cat.x;
      var dirY=targetY-cat.y;
      var dl=Math.sqrt(dirX*dirX+dirY*dirY)||1;
      cat.vx+=(dirX/dl)*0.25;
      cat.vy+=(dirY/dl)*0.15;
    }
    cat.vx*=0.88;
    cat.vy*=0.85;
    cat.vx=Math.max(-maxSpd,Math.min(maxSpd,cat.vx));
    cat.vy=Math.max(-maxSpd,Math.min(maxSpd,cat.vy));
    cat.x+=cat.vx;
    cat.y+=cat.vy;

    // If close enough, crouch and pounce
    if(dist<180&&Math.abs(laser.y-cat.y)<200){
      cat.state='crouching';
      cat.stateTimer=0;
    }
    if(!laser.active)cat.state='idle';
  }else if(cat.state==='crouching'){
    cat.walking=false;
    cat.vx*=0.8;cat.vy*=0.8;
    cat.x+=cat.vx;cat.y+=cat.vy;
    cat.crouchAmount=Math.min(1,cat.crouchAmount+0.1);
    cat.stateTimer++;
    if(cat.stateTimer>20){
      // POUNCE!
      cat.state='pouncing';
      cat.pounceProgress=0;
      cat.pounceStart={x:cat.x,y:cat.y};
      cat.pounceTarget={x:laser.x,y:laser.y};
      cat.stateTimer=0;
    }
    if(!laser.active){cat.state='idle';cat.crouchAmount*=0.9}
  }else if(cat.state==='pouncing'){
    cat.pounceProgress+=0.06;
    // Lerp from start to target
    cat.x=cat.pounceStart.x+(cat.pounceTarget.x-cat.pounceStart.x)*cat.pounceProgress;
    cat.y=cat.pounceStart.y+(cat.pounceTarget.y-cat.pounceStart.y)*cat.pounceProgress;
    if(cat.pounceProgress>=1){
      cat.state='landing';
      cat.stateTimer=0;
      cat.crouchAmount=1;
      pounceCount++;
      document.getElementById('pounceCount').textContent=pounceCount;
    }
  }else if(cat.state==='landing'){
    cat.walking=false;
    cat.vx*=0.7;cat.vy*=0.7;
    cat.crouchAmount*=0.92;
    cat.stateTimer++;
    if(cat.stateTimer>25){
      cat.state='idle';
    }
  }

  // Keep cats on screen horizontally
  if(cat.x<30)cat.x=30;
  if(cat.x>W-30)cat.x=W-30;
  // Gravity pull back to floor
  var floorY=H-cat.size*0.6-20;
  if(cat.state!=='pouncing'){
    cat.y+=(floorY-cat.y)*0.08;
  }
}

function update(){
  // Clear with subtle trail
  ctx.fillStyle='rgba(42,31,26,0.3)';
  ctx.fillRect(0,0,W,H);

  // Ground shadow strip
  var g=ctx.createLinearGradient(0,H-40,0,H);
  g.addColorStop(0,'rgba(0,0,0,0)');
  g.addColorStop(1,'rgba(0,0,0,0.4)');
  ctx.fillStyle=g;
  ctx.fillRect(0,H-40,W,40);

  // Smooth laser follow
  laser.x+=(laser.tx-laser.x)*0.25;
  laser.y+=(laser.ty-laser.y)*0.25;
  laser.wobble+=0.3;
  laserTrail.push({x:laser.x,y:laser.y});
  if(laserTrail.length>12)laserTrail.shift();

  // Sort cats by y for depth
  cats.sort(function(a,b){return a.y-b.y});

  for(var i=0;i<cats.length;i++){
    updateCat(cats[i]);
    drawCat(cats[i]);
  }

  drawLaser();

  requestAnimationFrame(update);
}
update();

// Input
function setLaser(x,y){
  laser.tx=x;laser.ty=y;
  laser.active=true;
  if(hintTimer){clearTimeout(hintTimer)}
  document.getElementById('hint').style.opacity='0';
}

window.addEventListener('mousemove',function(e){setLaser(e.clientX,e.clientY)});
window.addEventListener('mouseleave',function(){laser.active=false});
window.addEventListener('touchmove',function(e){
  e.preventDefault();
  if(e.touches[0])setLaser(e.touches[0].clientX,e.touches[0].clientY);
},{passive:false});
window.addEventListener('touchstart',function(e){
  if(e.touches[0])setLaser(e.touches[0].clientX,e.touches[0].clientY);
});
window.addEventListener('touchend',function(){laser.active=false});

// Click to add a cat
window.addEventListener('click',function(e){
  if(cats.length<12){
    spawnCat(e.clientX,H-80);
  }
});
</script>
</body>
</html>
