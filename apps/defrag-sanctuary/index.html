<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Defrag Sanctuary</title>
<link rel="icon" href="https://emojicdn.elk.sh/🪨">
<meta property="og:title" content="Defrag Sanctuary">
<meta property="og:description" content="Watch obsidian blocks drift into perfect alignment in an endless dark void.">
<meta property="og:url" content="https://sloppy.live/defrag-sanctuary/">
<meta property="og:image" content="https://sloppy.live/defrag-sanctuary/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;500&family=Martian+Mono:wght@200;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050508;overflow:hidden;height:100dvh;cursor:default}
canvas{position:fixed;inset:0}
#ui{position:fixed;z-index:5;pointer-events:none;inset:0;display:flex;flex-direction:column;justify-content:space-between;padding:20px}
#title{text-align:center;font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(12px,2.5vw,20px);color:rgba(140,130,160,.15);letter-spacing:8px;transition:opacity 2s}
#stats{text-align:center;font-family:'Martian Mono',monospace;font-weight:200;font-size:9px;color:rgba(140,130,160,.1);letter-spacing:3px}
#progress-wrap{width:min(60%,300px);height:2px;background:rgba(140,130,160,.04);border-radius:1px;margin:6px auto 0;overflow:hidden}
#progress-fill{height:100%;width:0%;background:linear-gradient(90deg,rgba(100,80,140,.2),rgba(140,120,180,.4));border-radius:1px;transition:width .5s}
#phase{font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(10px,1.5vw,13px);color:rgba(140,130,160,.08);letter-spacing:6px;text-align:center;margin-top:4px;min-height:1.2em}
a#backlink{position:fixed;bottom:6px;right:8px;color:rgba(255,255,255,.02);font-size:7px;text-decoration:none;z-index:5}
a#backlink:hover{color:rgba(255,255,255,.08)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
 <div id="title">D E F R A G &nbsp; S A N C T U A R Y</div>
 <div>
  <div id="phase"></div>
  <div id="stats">BLOCKS ALIGNED: <span id="aligned">0</span> / <span id="total">0</span></div>
  <div id="progress-wrap"><div id="progress-fill"></div></div>
 </div>
</div>
<a id="backlink" href="https://sloppy.live">sloppy.live</a>
<script>
const C=document.getElementById('c'),X=C.getContext('2d');
let W,H;
function resize(){W=C.width=innerWidth;H=C.height=innerHeight;initGrid()}
resize();addEventListener('resize',resize);

// Grid config
const CELL=28;
let cols,rows,blocks=[];
let cycle=0,phase='scatter',phaseTimer=0;
let globalTime=0;

// Phases: scatter → seek → settle → glow → scatter
const PHASES=[
 {name:'scatter',duration:4,label:'DISPERSING'},
 {name:'seek',duration:8,label:'SEEKING ALIGNMENT'},
 {name:'settle',duration:5,label:'SETTLING'},
 {name:'glow',duration:4,label:'ALIGNED'},
];
let phaseIdx=0;

// Audio
let actx;
function initAudio(){if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)()}
function chimeSound(freq){
 if(!actx)return;const t=actx.currentTime;
 const o=actx.createOscillator(),g=actx.createGain(),f=actx.createBiquadFilter();
 o.type='sine';o.frequency.value=freq;
 f.type='lowpass';f.frequency.value=1200;
 g.gain.setValueAtTime(.02,t);g.gain.exponentialRampToValueAtTime(.001,t+1.5);
 o.connect(f);f.connect(g);g.connect(actx.destination);o.start();o.stop(t+1.5);
}

function initGrid(){
 cols=Math.floor(W/CELL);rows=Math.floor(H/CELL);
 const offX=(W-cols*CELL)/2,offY=(H-rows*CELL)/2;
 const total=cols*rows;
 // Preserve existing blocks or create new ones
 if(blocks.length!==total){
  blocks=[];
  for(let r=0;r<rows;r++){
   for(let c=0;c<cols;c++){
    const tx=offX+c*CELL+CELL/2;
    const ty=offY+r*CELL+CELL/2;
    blocks.push({
     x:tx+(Math.random()-.5)*W*.6,
     y:ty+(Math.random()-.5)*H*.6,
     tx,ty,// target position
     vx:0,vy:0,
     rot:(Math.random()-.5)*2,
     trot:0,// target rotation
     vrot:0,
     scale:.6+Math.random()*.5,
     tscale:1,
     brightness:0,// 0=dark, 1=glow
     settled:false,
     seed:Math.random(),
     col:c,row:r,
    });
   }
  }
 }
 document.getElementById('total').textContent=total;
}

function setPhase(idx){
 phaseIdx=idx%PHASES.length;
 const p=PHASES[phaseIdx];
 phase=p.name;
 phaseTimer=0;
 document.getElementById('phase').textContent=p.label;

 if(phase==='scatter'){
  cycle++;
  const offX=(W-cols*CELL)/2,offY=(H-rows*CELL)/2;
  // Shuffle target positions for next cycle (new arrangement)
  const indices=[...Array(blocks.length).keys()];
  // Fisher-Yates shuffle
  for(let i=indices.length-1;i>0;i--){
   const j=Math.floor(Math.random()*(i+1));
   [indices[i],indices[j]]=[indices[j],indices[i]];
  }
  blocks.forEach((b,i)=>{
   const ni=indices[i];
   const nc=ni%cols,nr=Math.floor(ni/cols);
   b.tx=offX+nc*CELL+CELL/2;
   b.ty=offY+nr*CELL+CELL/2;
   b.trot=(Math.random()-.5)*1.5;
   b.tscale=.5+Math.random()*.4;
   b.settled=false;
   b.brightness=0;
   // Scatter push
   b.vx+=(Math.random()-.5)*60;
   b.vy+=(Math.random()-.5)*60;
   b.vrot+=(Math.random()-.5)*3;
  });
 }
 if(phase==='seek'){
  // Blocks start moving toward targets
  blocks.forEach(b=>{
   b.trot=0;
   b.tscale=1;
  });
 }
 if(phase==='glow'){
  initAudio();
  // Gentle chime
  chimeSound(261.6);
  setTimeout(()=>chimeSound(329.6),300);
  setTimeout(()=>chimeSound(392),600);
 }
}

function updateBlock(b,dt){
 const stiff=phase==='seek'?2.5:phase==='settle'?6:phase==='glow'?8:.3;
 const damp=phase==='scatter'?1.5:3.5;

 // Spring toward target
 const dx=b.tx-b.x,dy=b.ty-b.y;
 const dr=b.trot-b.rot;
 const ds=b.tscale-b.scale;
 b.vx+=(dx*stiff-b.vx*damp)*dt;
 b.vy+=(dy*stiff-b.vy*damp)*dt;
 b.vrot+=(dr*stiff*2-b.vrot*damp*2)*dt;
 b.x+=b.vx;b.y+=b.vy;
 b.rot+=b.vrot*dt;
 b.scale+=ds*dt*stiff;

 // Settled check
 const dist=Math.sqrt(dx*dx+dy*dy);
 b.settled=dist<1.5&&Math.abs(dr)<.05;

 // Brightness
 if(phase==='glow'&&b.settled){
  b.brightness=Math.min(1,b.brightness+dt*.8);
 }else if(phase==='settle'&&b.settled){
  b.brightness=Math.min(.3,b.brightness+dt*.5);
 }else{
  b.brightness=Math.max(0,b.brightness-dt*.5);
 }
}

function drawBlock(b){
 X.save();
 X.translate(b.x,b.y);
 X.rotate(b.rot);
 const s=CELL*.42*b.scale;

 // Shadow
 X.fillStyle='rgba(0,0,0,.3)';
 X.fillRect(-s+1.5,-s+1.5,s*2,s*2);

 // Obsidian face — dark with subtle gradient
 const g=X.createLinearGradient(-s,-s,s,s);
 const base=Math.floor(12+b.brightness*25);
 const light=Math.floor(18+b.brightness*40);
 g.addColorStop(0,'rgb('+base+','+base+','+(base+4)+')');
 g.addColorStop(.5,'rgb('+light+','+light+','+(light+6)+')');
 g.addColorStop(1,'rgb('+base+','+Math.floor(base*.9)+','+(base+2)+')');
 X.fillStyle=g;
 X.fillRect(-s,-s,s*2,s*2);

 // Obsidian edge highlight — top and left
 X.fillStyle='rgba(180,170,200,'+(0.04+b.brightness*.08)+')';
 X.fillRect(-s,-s,s*2,1);// top edge
 X.fillRect(-s,-s,1,s*2);// left edge

 // Bottom/right shadow edge
 X.fillStyle='rgba(0,0,0,.2)';
 X.fillRect(-s,s-1,s*2,1);
 X.fillRect(s-1,-s,1,s*2);

 // Obsidian texture — faint diagonal streaks
 X.strokeStyle='rgba(100,90,130,'+(0.02+b.brightness*.04)+')';
 X.lineWidth=.3;
 for(let i=0;i<3;i++){
  const ox=(-s+b.seed*s*2+i*s*.7)%s;
  X.beginPath();X.moveTo(ox-s*.3,-s);X.lineTo(ox+s*.3,s);X.stroke();
 }

 // Glow overlay when aligned
 if(b.brightness>.1){
  const glow=X.createRadialGradient(0,0,0,0,0,s*1.5);
  glow.addColorStop(0,'rgba(120,100,180,'+b.brightness*.06+')');
  glow.addColorStop(1,'transparent');
  X.fillStyle=glow;
  X.fillRect(-s*2,-s*2,s*4,s*4);
 }

 X.restore();
}

function draw(t){
 // Deep void background
 X.fillStyle='#050508';X.fillRect(0,0,W,H);

 // Subtle ambient nebula
 const nx=W/2+Math.sin(t*.07)*W*.1;
 const ny=H/2+Math.cos(t*.05)*H*.1;
 const ng=X.createRadialGradient(nx,ny,0,nx,ny,Math.min(W,H)*.5);
 ng.addColorStop(0,'rgba(30,20,50,.06)');
 ng.addColorStop(.5,'rgba(15,10,30,.03)');
 ng.addColorStop(1,'transparent');
 X.fillStyle=ng;X.fillRect(0,0,W,H);

 // Second nebula
 const n2x=W*.3+Math.cos(t*.04)*W*.15;
 const n2y=H*.6+Math.sin(t*.06)*H*.1;
 const n2g=X.createRadialGradient(n2x,n2y,0,n2x,n2y,Math.min(W,H)*.35);
 n2g.addColorStop(0,'rgba(20,15,40,.04)');
 n2g.addColorStop(1,'transparent');
 X.fillStyle=n2g;X.fillRect(0,0,W,H);

 // Draw blocks
 blocks.forEach(b=>drawBlock(b));

 // Grid ghost lines when settling/glowing (very faint target grid)
 if(phase==='settle'||phase==='glow'){
  const offX=(W-cols*CELL)/2,offY=(H-rows*CELL)/2;
  X.strokeStyle='rgba(100,90,140,'+(phase==='glow'?.02:.01)+')';
  X.lineWidth=.5;
  for(let c=0;c<=cols;c++){
   X.beginPath();X.moveTo(offX+c*CELL,offY);X.lineTo(offX+c*CELL,offY+rows*CELL);X.stroke();
  }
  for(let r=0;r<=rows;r++){
   X.beginPath();X.moveTo(offX,offY+r*CELL);X.lineTo(offX+cols*CELL,offY+r*CELL);X.stroke();
  }
 }

 // Vignette
 const vg=X.createRadialGradient(W/2,H/2,Math.min(W,H)*.15,W/2,H/2,Math.max(W,H)*.65);
 vg.addColorStop(0,'transparent');
 vg.addColorStop(1,'rgba(2,2,4,.7)');
 X.fillStyle=vg;X.fillRect(0,0,W,H);
}

function update(dt){
 globalTime+=dt;
 phaseTimer+=dt;

 const p=PHASES[phaseIdx];
 if(phaseTimer>=p.duration){
  setPhase(phaseIdx+1);
 }

 // Update blocks
 blocks.forEach(b=>updateBlock(b,dt));

 // Count aligned
 let aligned=0;
 blocks.forEach(b=>{if(b.settled)aligned++});
 document.getElementById('aligned').textContent=aligned;
 const pct=blocks.length?Math.floor(aligned/blocks.length*100):0;
 document.getElementById('progress-fill').style.width=pct+'%';
}

// Click to scatter
C.addEventListener('click',()=>{
 initAudio();
 if(phase!=='scatter'){
  setPhase(0);// restart cycle
 }
});

let lastTime=0;
function loop(t){
 const dt=Math.min((t-lastTime)/1000,.033);lastTime=t;
 update(dt);draw(t/1000);
 requestAnimationFrame(loop);
}

setPhase(0);
requestAnimationFrame(loop);
</script>
</body>
</html>
