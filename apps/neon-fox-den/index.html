<!DOCTYPE html>
<html lang="en">

<style>
  :root{
    --night-0:#070314;
    --night-1:#0e0726;
    --night-2:#1a0e3d;
    --plum:#a86bff;
    --magenta:#ff5ea1;
    --orange:#ff8a3d;
    --ember:#ffb15e;
    --lime:#9bff5e;
    --amber:#ffe488;
    --cyan:#5ec2ff;
    --ink-3:#9a8ec0;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html{ font-size:100%; }
  html, body{
    width:100%; height:100dvh;
    background:var(--night-0);
    color:#fff;
    font-family:'Syne Mono', monospace;
    overflow:hidden;
    touch-action:none;
  }
  /* Stage holds 2 canvases — scene (trail-fade + atmosphere) and goo (FX) */
  #stage{
    position:fixed; inset:0;
    cursor: crosshair;
  }
  canvas{
    position:absolute; inset:0;
    width:100%; height:100%;
    display:block;
  }
  #scene{ z-index:1; }
  #fx   { z-index:2; }

  /* ── HUD ── */
  .masthead{
    position:fixed;
    top:0; left:0; right:0;
    padding:0.9rem 1.1rem 0.5rem;
    z-index:10;
    pointer-events:none;
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:1rem;
  }
  h1{
    font-family:'Major Mono Display', monospace;
    font-weight:400;
    font-size:clamp(1.4rem, 2.6vw, 2.2rem);
    letter-spacing:0.12em;
    line-height:1;
    color:#fff;
    text-shadow:
      0 0 14px rgba(255,138,61,0.55),
      0 0 26px rgba(255,94,161,0.35);
  }
  h1 .dot{ color:var(--lime); }
  .tagline{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-weight:300;
    margin-top:0.3rem;
    font-size:0.95rem;
    color:rgba(220,210,255,0.7);
    max-width:30ch;
  }
  .hud-right{
    text-align:right;
    font-family:'Syne Mono', monospace;
    font-size:0.78rem;
    color:rgba(220,210,255,0.85);
    line-height:1.55;
  }
  .hud-right .v{ color:var(--orange); }
  .hud-right .v.lime{ color:var(--lime); }
  .hud-right .v.mag{ color:var(--magenta); }

  /* ── Toolbar ── */
  .toolbar{
    position:fixed;
    bottom:1rem; left:50%;
    transform:translateX(-50%);
    z-index:10;
    background: rgba(14,7,38, 0.75);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border:1px solid rgba(168,107,255,0.35);
    border-radius: 99px;
    padding:0.55rem 0.7rem;
    display:flex;
    align-items:center;
    gap:0.45rem;
    box-shadow: 0 6px 30px rgba(94,32,140,0.35);
    max-width: calc(100vw - 1.5rem);
    flex-wrap:wrap;
    justify-content:center;
  }
  .pill{
    background:transparent;
    color:#fff;
    border:1px solid rgba(168,107,255,0.45);
    border-radius:99px;
    padding:0.5rem 0.9rem;
    font-family:'Syne Mono', monospace;
    font-size:0.8rem;
    letter-spacing:0.05em;
    cursor:pointer;
    transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
    min-height: 2.5rem;
  }
  .pill:hover{ background: rgba(168,107,255,0.18); border-color: var(--plum); }
  .pill:focus-visible{ outline: 2px solid var(--plum); outline-offset: 2px; }
  .pill:active{ transform: scale(0.96); }
  .pill[aria-pressed="true"]{
    background: rgba(155,255,94,0.20);
    border-color: var(--lime);
    color: var(--lime);
  }
  .pill.primary{
    background: linear-gradient(135deg, rgba(255,138,61,0.30), rgba(255,94,161,0.30));
    border-color: var(--orange);
    color: #fff;
    text-shadow: 0 0 10px rgba(255,138,61,0.6);
    font-weight:700;
  }
  .pill.primary:hover{
    background: linear-gradient(135deg, rgba(255,138,61,0.5), rgba(255,94,161,0.5));
  }
  .toolbar .sep{ width:1px; height:1.4rem; background: rgba(168,107,255,0.25); margin: 0 0.15rem; }
  .slider-wrap{
    display:flex; align-items:center; gap:0.4rem;
    color: rgba(220,210,255,0.8);
    font-family:'Syne Mono', monospace;
    font-size:0.72rem; letter-spacing:0.08em;
  }
  input[type="range"]{
    -webkit-appearance:none; appearance:none;
    width:84px; height:4px;
    background: rgba(168,107,255,0.25);
    border-radius:99px; outline:none;
  }
  input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:14px; height:14px;
    background: var(--orange);
    border-radius:50%; cursor:pointer;
    box-shadow: 0 0 10px rgba(255,138,61,0.6);
  }
  input[type="range"]::-moz-range-thumb{
    width:14px; height:14px;
    background: var(--orange);
    border-radius:50%; cursor:pointer; border:none;
    box-shadow: 0 0 10px rgba(255,138,61,0.6);
  }
  .hint{
    position:fixed;
    bottom:5.2rem; left:50%;
    transform:translateX(-50%);
    z-index:9;
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:1.05rem;
    color: rgba(220,210,255,0.62);
    text-align:center;
    pointer-events:none;
    transition: opacity 0.6s ease;
    max-width: 90vw;
  }
  .hint.hidden{ opacity:0; }

  @media (max-width: 640px){
    h1{ font-size:1.2rem; }
    .tagline{ font-size:0.82rem; }
    .hud-right{ font-size:0.7rem; }
    .pill{ padding:0.45rem 0.7rem; font-size:0.72rem; }
    input[type="range"]{ width:64px; }
  }
  @media (prefers-reduced-motion: reduce){
    .pill, .pill:active{ transform: none !important; transition: none !important; }
  }
</style>
</head>
<body>
<main id="stage" role="application" aria-label="Neon Fox Den — interactive nocturnal scene">
  <canvas id="scene" aria-hidden="true"></canvas>
  <canvas id="fx"    aria-hidden="true"></canvas>

  <div class="masthead">
    <div>
      <h1>neon<span class="dot">·</span>fox<span class="dot">·</span>den</h1>
      <p class="tagline">a nocturnal grove · the foxes leap for glow-flies · tap the grass to summon more</p>
    </div>
    <div class="hud-right" role="status" aria-live="polite" aria-atomic="true">
      <div><span class="v" id="hud-foxes">0</span> 🦊 foxes</div>
      <div><span class="v lime" id="hud-flies">0</span> ✦ glow-flies</div>
      <div><span class="v mag" id="hud-caught">0</span> caught</div>
    </div>
  </div>

  <p class="hint" id="hint">click empty space to summon a glow-fly · click a fox to make it pounce · space = swarm</p>

  <div class="toolbar" role="toolbar" aria-label="Den controls">
    <button class="pill primary" id="btn-swarm" type="button" title="Summon a swarm — space">✨ Swarm</button>
    <button class="pill" id="btn-add-fox" type="button" title="Add another fox">🦊 +Fox</button>
    <button class="pill" id="btn-reset" type="button" title="Reset the den — R">↻ Reset</button>
    <span class="sep" aria-hidden="true"></span>
    <button class="pill" id="btn-sound" type="button" aria-pressed="false" title="Toggle ambient sound">🔇 Sound</button>
    <span class="sep" aria-hidden="true"></span>
    <div class="slider-wrap">
      <label for="slider-flies">FLIES</label>
      <input type="range" id="slider-flies" min="10" max="160" value="55" aria-label="Glow-fly count">
      <span id="slider-flies-val">55</span>
    </div>
    <div class="slider-wrap">
      <label for="slider-foxes">FOXES</label>
      <input type="range" id="slider-foxes" min="1" max="8" value="3" aria-label="Fox count">
      <span id="slider-foxes-val">3</span>
    </div>
  </div>
</main>

<script>
/* ════════════════════════════════════════════════════════════
   NEON FOX DEN — jumping foxes + glow-flies physics sandbox
   ──────────────────────────────────────────────────────────── */

const stage = document.getElementById('stage');
const scene = document.getElementById('scene'),  sceneCtx = scene.getContext('2d');
const fx    = document.getElementById('fx'),     fxCtx    = fx.getContext('2d');

let W = 0, H = 0, DPR = 1;
let groundY = 0;
function resize(){
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth;
  H = window.innerHeight;
  for (const c of [scene, fx]){
    c.width  = Math.floor(W * DPR);
    c.height = Math.floor(H * DPR);
    c.style.width  = W + 'px';
    c.style.height = H + 'px';
    c.getContext('2d').setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  groundY = H * 0.78;
}
window.addEventListener('resize', resize);
resize();

/* ── Settings ─────────────────────────────────────────────── */
const settings = { flyCount: 55, foxCount: 3, sound: false };

/* ── Glow-flies ────────────────────────────────────────────── */
const FLY_HUES = [55, 80, 100, 40, 30]; // amber → lime → ember
const flies = [];
function spawnFly(x, y){
  flies.push({
    x: x ?? Math.random() * W,
    y: y ?? (H * 0.15 + Math.random() * (groundY - H * 0.15 - 40)),
    vx: (Math.random() - 0.5) * 14,
    vy: (Math.random() - 0.5) * 14,
    hue: FLY_HUES[Math.floor(Math.random() * FLY_HUES.length)],
    phase: Math.random() * Math.PI * 2,
    flicker: 0.6 + Math.random() * 0.4,
    r: 2 + Math.random() * 1.8,
    life: 0,
  });
}
function topUpFlies(){
  while (flies.length < settings.flyCount) spawnFly();
  while (flies.length > settings.flyCount) flies.pop();
}

/* ── Foxes ─────────────────────────────────────────────────── */
const FOX_COLORS = [
  { body:'#ff8a3d', dark:'#c4521a', glow:'rgba(255,138,61,0.6)' },  // orange
  { body:'#ff5ea1', dark:'#c0306a', glow:'rgba(255,94,161,0.6)' },  // magenta
  { body:'#ffb15e', dark:'#c47820', glow:'rgba(255,177,94,0.6)' },  // ember
  { body:'#a86bff', dark:'#6c34c4', glow:'rgba(168,107,255,0.6)' }, // plum
];
const foxes = [];
function makeFox(x){
  const col = FOX_COLORS[foxes.length % FOX_COLORS.length];
  return {
    x: x ?? (W * (0.2 + Math.random() * 0.6)),
    y: groundY,
    vx: 0, vy: 0,
    onGround: true,
    facing: Math.random() < 0.5 ? -1 : 1,
    jumpCD: Math.random() * 0.8,
    targetIdx: -1,
    color: col,
    catchGlow: 0,    // flashes after catching a fly
    bodyR: 16,
    legPhase: 0,
    tailPhase: Math.random() * Math.PI * 2,
    pounceUntil: 0,
  };
}
function topUpFoxes(){
  while (foxes.length < settings.foxCount) foxes.push(makeFox());
  while (foxes.length > settings.foxCount) foxes.pop();
}

let caughtCount = 0;

/* ── Physics step ─────────────────────────────────────────── */
const GRAVITY = 1400;
function step(dt){
  // glow-flies: gentle drift + escape from nearby foxes
  for (const f of flies){
    f.life += dt;
    f.phase += dt * (1.4 + (f.hue % 7) * 0.05);
    // soft drift + sine wobble
    f.vx += (Math.random() - 0.5) * 22 * dt;
    f.vy += (Math.random() - 0.5) * 22 * dt;
    // light damping so flies don't accelerate forever
    f.vx *= 0.96;
    f.vy *= 0.96;
    // panic-flee if a fox is mid-jump and close
    for (const fx of foxes){
      if (!fx.onGround){
        const dx = f.x - fx.x, dy = f.y - fx.y;
        const d2 = dx*dx + dy*dy;
        if (d2 < 70*70){
          const d = Math.sqrt(d2) || 1;
          // shove fly away from fox
          f.vx += (dx/d) * 220 * dt;
          f.vy += (dy/d) * 220 * dt - 30 * dt; // tiny upward tilt
        }
      }
    }
    f.x += f.vx * dt;
    f.y += f.vy * dt;
    // soft bounds — keep within sky area (above ground - small buffer)
    const topY = H * 0.12;
    const botY = groundY - 12;
    if (f.x < 10){ f.x = 10; f.vx = Math.abs(f.vx); }
    if (f.x > W - 10){ f.x = W - 10; f.vx = -Math.abs(f.vx); }
    if (f.y < topY){ f.y = topY; f.vy = Math.abs(f.vy); }
    if (f.y > botY){ f.y = botY; f.vy = -Math.abs(f.vy); }
  }

  // foxes
  for (const fox of foxes){
    fox.jumpCD -= dt;
    fox.legPhase += dt * (fox.onGround ? 9 : 2);
    fox.tailPhase += dt * 3;
    if (fox.catchGlow > 0) fox.catchGlow -= dt * 1.6;

    if (!fox.onGround){
      // airborne — gravity arc
      fox.vy += GRAVITY * dt;
      fox.x += fox.vx * dt;
      fox.y += fox.vy * dt;
      // check fly catch mid-air
      for (let i = flies.length - 1; i >= 0; i--){
        const f = flies[i];
        const dx = f.x - fox.x, dy = f.y - fox.y;
        if (dx*dx + dy*dy < 28*28){
          // caught!
          flies.splice(i, 1);
          caughtCount++;
          fox.catchGlow = 1.0;
          playCatchChime(f.hue);
          // burst of particles where the fly was
          spawnSparks(f.x, f.y, f.hue);
          // refill from edge to maintain pool
          if (flies.length < settings.flyCount) spawnFly();
        }
      }
      // land
      if (fox.y >= groundY){
        fox.y = groundY;
        fox.vy = 0;
        fox.onGround = true;
        fox.jumpCD = 0.4 + Math.random() * 1.0;
        // tiny puff on landing
        spawnLandPuff(fox.x, groundY);
      }
    } else {
      // ground — wander idly + look for a fly to pounce on
      if (fox.jumpCD <= 0){
        // find nearest fly within pounce range
        let best = -1, bestD = Infinity;
        for (let i = 0; i < flies.length; i++){
          const f = flies[i];
          const dx = f.x - fox.x, dy = f.y - fox.y;
          const d = Math.hypot(dx, dy);
          if (d < bestD && d < 220){ bestD = d; best = i; }
        }
        if (best >= 0){
          const f = flies[best];
          // launch toward fly. Solve projectile so apex roughly meets fly
          launchFox(fox, f.x, f.y);
        } else {
          // idle hop forward
          fox.vx = (60 + Math.random() * 40) * fox.facing;
          fox.vy = -(360 + Math.random() * 120);
          fox.onGround = false;
        }
      } else {
        // walking slowly on ground
        fox.x += fox.vx * dt;
        fox.vx *= 0.92;
        // turn around if hit wall
        if (fox.x < 30){ fox.x = 30; fox.facing = 1; }
        if (fox.x > W - 30){ fox.x = W - 30; fox.facing = -1; }
      }
    }
  }
}

function launchFox(fox, targetX, targetY){
  // analytical: pick t = 0.55s (typical pounce time)
  const t = 0.55;
  const vx = (targetX - fox.x) / t;
  // y(t) = vy*t + 0.5*g*t^2 ; want y(t) ≈ targetY (relative to start fox.y)
  // dy = vy*t + 0.5*g*t^2  →  vy = (dy - 0.5*g*t^2) / t
  const dy = targetY - fox.y;
  const vy = (dy - 0.5 * GRAVITY * t * t) / t;
  fox.vx = vx;
  fox.vy = vy;
  fox.onGround = false;
  fox.facing = vx >= 0 ? 1 : -1;
  fox.pounceUntil = performance.now() + t * 1000;
}

/* ── Particle FX (sparks + land puffs) ────────────────────── */
const sparks = [];
function spawnSparks(x, y, hue){
  for (let i = 0; i < 16; i++){
    const a = Math.random() * Math.PI * 2;
    const sp = 80 + Math.random() * 180;
    sparks.push({
      x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 40,
      hue: hue + (Math.random() - 0.5) * 30,
      life: 0, dur: 0.7 + Math.random() * 0.5,
      r: 1.5 + Math.random() * 1.5,
    });
  }
}
function spawnLandPuff(x, y){
  for (let i = 0; i < 6; i++){
    sparks.push({
      x: x + (Math.random() - 0.5) * 14,
      y: y - 2,
      vx: (Math.random() - 0.5) * 60, vy: -20 - Math.random() * 30,
      hue: 240, life: 0, dur: 0.4 + Math.random() * 0.3,
      r: 2 + Math.random() * 2,
      dust: true,
    });
  }
}
function stepSparks(dt){
  for (let i = sparks.length - 1; i >= 0; i--){
    const s = sparks[i];
    s.life += dt;
    s.vy += 480 * dt;
    s.x += s.vx * dt;
    s.y += s.vy * dt;
    if (s.life > s.dur) sparks.splice(i, 1);
  }
}

/* ── Background scene (trees + grass + stars) ─────────────── */
const stars = [];
function buildStars(){
  stars.length = 0;
  const n = Math.floor((W * H) / 14000);
  for (let i = 0; i < n; i++){
    stars.push({
      x: Math.random() * W,
      y: Math.random() * groundY * 0.85,
      r: Math.random() * 1.3 + 0.3,
      tw: Math.random() * Math.PI * 2,
      hue: [220, 280, 200, 320][Math.floor(Math.random() * 4)],
    });
  }
}
buildStars();
window.addEventListener('resize', buildStars);

const treeSilhouettes = [];
function buildTrees(){
  treeSilhouettes.length = 0;
  // far line
  const far = [];
  for (let x = -40; x <= W + 40; x += 22){
    const noise = Math.sin(x * 0.013) * 22 + Math.sin(x * 0.041) * 12;
    far.push([x, groundY * 0.62 - noise]);
  }
  treeSilhouettes.push({ pts: far, color: 'rgba(20,10,46,0.85)' });
  // near line
  const near = [];
  for (let x = -40; x <= W + 40; x += 16){
    const noise = Math.sin(x * 0.018 + 1.3) * 28 + Math.sin(x * 0.064 + 0.7) * 14 + Math.cos(x * 0.027) * 10;
    near.push([x, groundY * 0.72 - Math.abs(noise) - 8]);
  }
  treeSilhouettes.push({ pts: near, color: 'rgba(10,4,28,0.95)' });
}
buildTrees();
window.addEventListener('resize', buildTrees);

function drawScene(dt, now){
  // sky gradient
  const grd = sceneCtx.createLinearGradient(0, 0, 0, groundY);
  grd.addColorStop(0,   '#070314');
  grd.addColorStop(0.4, '#0e0726');
  grd.addColorStop(1,   '#1a0e3d');
  sceneCtx.fillStyle = grd;
  sceneCtx.fillRect(0, 0, W, groundY);
  // moon halo
  const moonX = W * 0.78, moonY = H * 0.18, moonR = 36;
  const halo = sceneCtx.createRadialGradient(moonX, moonY, moonR * 0.4, moonX, moonY, moonR * 5);
  halo.addColorStop(0,   'rgba(255, 220, 240, 0.45)');
  halo.addColorStop(0.4, 'rgba(168, 107, 255, 0.12)');
  halo.addColorStop(1,   'rgba(168, 107, 255, 0)');
  sceneCtx.fillStyle = halo;
  sceneCtx.fillRect(moonX - moonR * 5, moonY - moonR * 5, moonR * 10, moonR * 10);
  sceneCtx.fillStyle = '#fff8e8';
  sceneCtx.beginPath();
  sceneCtx.arc(moonX, moonY, moonR, 0, Math.PI * 2);
  sceneCtx.fill();
  // small crater shadow
  sceneCtx.fillStyle = 'rgba(120,80,140,0.18)';
  sceneCtx.beginPath();
  sceneCtx.arc(moonX - 8, moonY + 4, 7, 0, Math.PI * 2);
  sceneCtx.fill();

  // stars
  for (const s of stars){
    s.tw += dt * 1.8;
    const a = 0.4 + Math.sin(s.tw) * 0.4 + 0.4;
    sceneCtx.fillStyle = 'hsla(' + s.hue + ', 70%, 88%, ' + a.toFixed(2) + ')';
    sceneCtx.beginPath();
    sceneCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    sceneCtx.fill();
  }

  // tree silhouettes (drawn as filled polygons across the horizon)
  for (const tl of treeSilhouettes){
    sceneCtx.fillStyle = tl.color;
    sceneCtx.beginPath();
    sceneCtx.moveTo(tl.pts[0][0], groundY);
    for (const [x, y] of tl.pts) sceneCtx.lineTo(x, y);
    sceneCtx.lineTo(tl.pts[tl.pts.length - 1][0], groundY);
    sceneCtx.closePath();
    sceneCtx.fill();
  }

  // ground
  const gg = sceneCtx.createLinearGradient(0, groundY, 0, H);
  gg.addColorStop(0, '#0c0420');
  gg.addColorStop(1, '#1c0a2e');
  sceneCtx.fillStyle = gg;
  sceneCtx.fillRect(0, groundY, W, H - groundY);
  // ground glow line
  sceneCtx.strokeStyle = 'rgba(168,107,255,0.55)';
  sceneCtx.lineWidth = 1.4;
  sceneCtx.shadowColor = 'rgba(168,107,255,0.8)';
  sceneCtx.shadowBlur = 12;
  sceneCtx.beginPath();
  sceneCtx.moveTo(0, groundY);
  sceneCtx.lineTo(W, groundY);
  sceneCtx.stroke();
  sceneCtx.shadowBlur = 0;
  // grass tufts (sparse cyan blades)
  sceneCtx.strokeStyle = 'rgba(94,194,255,0.30)';
  sceneCtx.lineWidth = 1;
  for (let x = 0; x < W; x += 14){
    const sw = Math.sin(now * 0.001 + x * 0.07) * 2;
    sceneCtx.beginPath();
    sceneCtx.moveTo(x, groundY);
    sceneCtx.lineTo(x + sw, groundY - 6 - Math.random() * 3);
    sceneCtx.stroke();
  }
}

/* ── Glow-fly + fox + spark rendering on fx layer ─────────── */
function drawFX(now){
  fxCtx.clearRect(0, 0, W, H);

  // glow-flies — additive radial glow + bright core
  fxCtx.globalCompositeOperation = 'lighter';
  for (const f of flies){
    const flick = 0.55 + Math.sin(f.phase) * 0.45 * f.flicker;
    const r = f.r * (1 + flick * 0.6);
    // outer halo
    const halo = fxCtx.createRadialGradient(f.x, f.y, 0, f.x, f.y, r * 8);
    halo.addColorStop(0,   'hsla(' + f.hue + ', 95%, 75%, ' + (0.55 * flick).toFixed(2) + ')');
    halo.addColorStop(0.4, 'hsla(' + f.hue + ', 95%, 60%, ' + (0.18 * flick).toFixed(2) + ')');
    halo.addColorStop(1,   'hsla(' + f.hue + ', 95%, 50%, 0)');
    fxCtx.fillStyle = halo;
    fxCtx.beginPath();
    fxCtx.arc(f.x, f.y, r * 8, 0, Math.PI * 2);
    fxCtx.fill();
    // bright core
    fxCtx.fillStyle = 'hsla(' + f.hue + ', 100%, 88%, ' + (0.85 * flick).toFixed(2) + ')';
    fxCtx.beginPath();
    fxCtx.arc(f.x, f.y, r, 0, Math.PI * 2);
    fxCtx.fill();
  }

  // sparks — additive bright dots
  for (const s of sparks){
    const a = Math.max(0, 1 - s.life / s.dur);
    if (s.dust){
      // dust: low-alpha violet
      fxCtx.fillStyle = 'rgba(168,107,255,' + (a * 0.45).toFixed(2) + ')';
      fxCtx.beginPath();
      fxCtx.arc(s.x, s.y, s.r * (1 + s.life), 0, Math.PI * 2);
      fxCtx.fill();
    } else {
      fxCtx.fillStyle = 'hsla(' + s.hue + ', 100%, 80%, ' + (a * 0.95).toFixed(2) + ')';
      fxCtx.beginPath();
      fxCtx.arc(s.x, s.y, s.r * (1 + (1 - a) * 0.6), 0, Math.PI * 2);
      fxCtx.fill();
    }
  }
  fxCtx.globalCompositeOperation = 'source-over';

  // foxes — drawn last so they appear in front of flies
  for (const fox of foxes) drawFox(fox, now);
}

function drawFox(fox, now){
  const col = fox.color;
  const x = fox.x, y = fox.y;
  const r = fox.bodyR;
  const f = fox.facing;
  const hop = fox.onGround ? Math.abs(Math.sin(fox.legPhase) * 2.5) : -6;
  // shadow on ground
  fxCtx.fillStyle = 'rgba(0,0,0,0.4)';
  const sh = fox.onGround ? 1.0 : Math.max(0.3, 1 - (groundY - y) * 0.005);
  fxCtx.beginPath();
  fxCtx.ellipse(x, groundY + 1, r * 1.05 * sh, 4 * sh, 0, 0, Math.PI * 2);
  fxCtx.fill();

  // catch-glow halo
  if (fox.catchGlow > 0){
    const g = fox.catchGlow;
    const halo = fxCtx.createRadialGradient(x, y - r, r * 0.4, x, y - r, r * 4);
    halo.addColorStop(0,   'rgba(255, 220, 120,' + (0.55 * g) + ')');
    halo.addColorStop(0.5, 'rgba(255, 138, 61,' + (0.20 * g) + ')');
    halo.addColorStop(1,   'rgba(255, 138, 61, 0)');
    fxCtx.fillStyle = halo;
    fxCtx.beginPath();
    fxCtx.arc(x, y - r, r * 4, 0, Math.PI * 2);
    fxCtx.fill();
  }

  // soft body glow
  fxCtx.shadowColor = col.glow;
  fxCtx.shadowBlur = 14;

  // body (oval, slightly stretched when airborne in motion direction)
  const stretchX = fox.onGround ? 1 : Math.min(1.35, 1 + Math.abs(fox.vx) * 0.0008);
  const stretchY = fox.onGround ? 1 : Math.max(0.78, 1 - Math.abs(fox.vy) * 0.0006);
  fxCtx.save();
  fxCtx.translate(x, y - r - hop);
  fxCtx.scale(f * stretchX, stretchY);
  fxCtx.fillStyle = col.body;
  fxCtx.beginPath();
  fxCtx.ellipse(0, 0, r * 0.95, r * 0.65, 0, 0, Math.PI * 2);
  fxCtx.fill();
  // belly highlight
  fxCtx.fillStyle = '#fff6e8';
  fxCtx.beginPath();
  fxCtx.ellipse(-r * 0.18, r * 0.18, r * 0.35, r * 0.18, 0, 0, Math.PI * 2);
  fxCtx.fill();

  // tail (white-tipped curve, sweeps slightly via tailPhase)
  const tailSw = Math.sin(fox.tailPhase) * 0.4;
  fxCtx.save();
  fxCtx.translate(-r * 0.7, -r * 0.05);
  fxCtx.rotate(0.6 + tailSw);
  fxCtx.fillStyle = col.body;
  fxCtx.beginPath();
  fxCtx.ellipse(-r * 0.55, 0, r * 0.7, r * 0.18, 0, 0, Math.PI * 2);
  fxCtx.fill();
  // tail tip white
  fxCtx.fillStyle = '#fff6e8';
  fxCtx.beginPath();
  fxCtx.arc(-r * 1.15, 0, r * 0.22, 0, Math.PI * 2);
  fxCtx.fill();
  fxCtx.restore();

  // head (circle in front)
  fxCtx.fillStyle = col.body;
  fxCtx.beginPath();
  fxCtx.arc(r * 0.7, -r * 0.05, r * 0.55, 0, Math.PI * 2);
  fxCtx.fill();
  // muzzle
  fxCtx.fillStyle = '#fff6e8';
  fxCtx.beginPath();
  fxCtx.ellipse(r * 1.0, r * 0.05, r * 0.22, r * 0.18, 0, 0, Math.PI * 2);
  fxCtx.fill();
  // nose
  fxCtx.fillStyle = '#1a0a18';
  fxCtx.beginPath();
  fxCtx.arc(r * 1.15, 0, r * 0.07, 0, Math.PI * 2);
  fxCtx.fill();
  // eye (glowing)
  fxCtx.fillStyle = col.dark;
  fxCtx.beginPath();
  fxCtx.arc(r * 0.78, -r * 0.18, r * 0.07, 0, Math.PI * 2);
  fxCtx.fill();
  fxCtx.fillStyle = '#fff';
  fxCtx.beginPath();
  fxCtx.arc(r * 0.80, -r * 0.20, r * 0.03, 0, Math.PI * 2);
  fxCtx.fill();
  // ears (triangle)
  fxCtx.fillStyle = col.body;
  fxCtx.beginPath();
  fxCtx.moveTo(r * 0.55, -r * 0.50);
  fxCtx.lineTo(r * 0.42, -r * 0.92);
  fxCtx.lineTo(r * 0.78, -r * 0.55);
  fxCtx.closePath();
  fxCtx.fill();
  fxCtx.beginPath();
  fxCtx.moveTo(r * 0.85, -r * 0.50);
  fxCtx.lineTo(r * 0.95, -r * 0.92);
  fxCtx.lineTo(r * 1.05, -r * 0.55);
  fxCtx.closePath();
  fxCtx.fill();
  // inner ear pink
  fxCtx.fillStyle = '#ffb8d4';
  fxCtx.beginPath();
  fxCtx.moveTo(r * 0.52, -r * 0.55);
  fxCtx.lineTo(r * 0.48, -r * 0.82);
  fxCtx.lineTo(r * 0.68, -r * 0.58);
  fxCtx.closePath();
  fxCtx.fill();

  // legs (4 small ovals; alternate vertically based on legPhase if onGround,
  // tucked-up if airborne)
  fxCtx.fillStyle = col.dark;
  const legY = r * 0.55;
  const legOff = fox.onGround ? Math.sin(fox.legPhase) * 3 : -2;
  fxCtx.beginPath(); fxCtx.ellipse(-r * 0.42, legY - legOff, r * 0.13, r * 0.22, 0, 0, Math.PI * 2); fxCtx.fill();
  fxCtx.beginPath(); fxCtx.ellipse(-r * 0.20, legY + legOff, r * 0.13, r * 0.22, 0, 0, Math.PI * 2); fxCtx.fill();
  fxCtx.beginPath(); fxCtx.ellipse( r * 0.20, legY - legOff, r * 0.13, r * 0.22, 0, 0, Math.PI * 2); fxCtx.fill();
  fxCtx.beginPath(); fxCtx.ellipse( r * 0.42, legY + legOff, r * 0.13, r * 0.22, 0, 0, Math.PI * 2); fxCtx.fill();

  fxCtx.restore();
  fxCtx.shadowBlur = 0;
}

/* ── HUD update ──────────────────────────────────────────── */
function updateHud(){
  document.getElementById('hud-foxes').textContent = foxes.length;
  document.getElementById('hud-flies').textContent = flies.length;
  document.getElementById('hud-caught').textContent = caughtCount;
}

/* ── Web Audio: ambient pad + catch chime ─────────────────── */
let audioCtx = null;
let padGain = null;
function ensureAudio(){
  if (audioCtx) return audioCtx;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  // soft drone pad — 3-voice triangle chord through lowpass + reverb-ish delay
  const chord = [55, 82.4, 110];
  padGain = audioCtx.createGain();
  padGain.gain.value = 0;
  const lp = audioCtx.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 720;
  padGain.connect(lp).connect(audioCtx.destination);
  for (const f of chord){
    const osc = audioCtx.createOscillator();
    osc.type = 'triangle';
    osc.frequency.value = f;
    // slow detune wobble
    const lfo = audioCtx.createOscillator();
    lfo.frequency.value = 0.07 + Math.random() * 0.1;
    const lfoGain = audioCtx.createGain();
    lfoGain.gain.value = 3;
    lfo.connect(lfoGain).connect(osc.detune);
    lfo.start();
    osc.connect(padGain);
    osc.start();
  }
  return audioCtx;
}
function setSound(on){
  settings.sound = on;
  if (!audioCtx) ensureAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  padGain.gain.setTargetAtTime(on ? 0.10 : 0, audioCtx.currentTime, 0.5);
  const btn = document.getElementById('btn-sound');
  btn.setAttribute('aria-pressed', on ? 'true' : 'false');
  btn.textContent = on ? '🔊 Sound' : '🔇 Sound';
}
// chime when a fly is caught — pitch derived from fly hue
const CHIME_SCALE = [261.63, 329.63, 392.0, 523.25, 659.25, 783.99]; // C E G C E G
function playCatchChime(hue){
  if (!settings.sound || !audioCtx) return;
  const note = CHIME_SCALE[Math.floor(((hue % 360) / 360) * CHIME_SCALE.length)];
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  osc.type = 'triangle';
  osc.frequency.value = note;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.16, t + 0.02);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
  // little harmonic
  const osc2 = audioCtx.createOscillator();
  osc2.type = 'sine';
  osc2.frequency.value = note * 2;
  const g2 = audioCtx.createGain();
  g2.gain.setValueAtTime(0, t);
  g2.gain.linearRampToValueAtTime(0.06, t + 0.02);
  g2.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
  osc.connect(g).connect(audioCtx.destination);
  osc2.connect(g2).connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 0.7);
  osc2.start(t); osc2.stop(t + 0.55);
}

/* ── Input ────────────────────────────────────────────────── */
let dismissedHint = false;
function dismissHint(){
  if (dismissedHint) return;
  dismissedHint = true;
  document.getElementById('hint').classList.add('hidden');
}
function evtXY(e){
  if (e.touches && e.touches[0]) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}
stage.addEventListener('pointerdown', e => {
  if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT' || e.target.tagName === 'LABEL') return;
  const { x, y } = evtXY(e);
  dismissHint();
  // hit-test fox first
  for (let i = foxes.length - 1; i >= 0; i--){
    const fx = foxes[i];
    const dx = x - fx.x, dy = y - (fx.y - fx.bodyR);
    if (dx*dx + dy*dy < 36*36){
      // pounce immediately toward the click location, jumping up first
      if (fx.onGround) launchFox(fx, x, y - 40);
      else { fx.vy = -300; } // double-tap mid-air boost
      return;
    }
  }
  // empty space → spawn a glow-fly (capped at slider+30 burst limit)
  if (flies.length < settings.flyCount + 60){
    spawnFly(x, y);
  }
});
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
  if (e.code === 'Space'){ e.preventDefault(); swarm(); }
  if (e.key === 'r' || e.key === 'R'){ resetDen(); }
  if (e.key === 'f' || e.key === 'F'){ addFox(); }
  if (e.key === 'm' || e.key === 'M'){ setSound(!settings.sound); }
});

/* ── Actions ──────────────────────────────────────────────── */
function swarm(){
  for (let i = 0; i < 14; i++){
    spawnFly(W * (0.2 + Math.random() * 0.6), groundY * (0.2 + Math.random() * 0.5));
  }
}
function addFox(){
  if (foxes.length >= 8) return;
  foxes.push(makeFox());
  settings.foxCount = foxes.length;
  document.getElementById('slider-foxes').value = foxes.length;
  document.getElementById('slider-foxes-val').textContent = foxes.length;
}
function resetDen(){
  foxes.length = 0;
  flies.length = 0;
  caughtCount = 0;
  topUpFoxes();
  topUpFlies();
}

/* ── Toolbar wiring ──────────────────────────────────────── */
document.getElementById('btn-swarm').addEventListener('click', () => { dismissHint(); swarm(); });
document.getElementById('btn-add-fox').addEventListener('click', () => { dismissHint(); addFox(); });
document.getElementById('btn-reset').addEventListener('click', () => { dismissHint(); resetDen(); });
document.getElementById('btn-sound').addEventListener('click', () => setSound(!settings.sound));
const flySlider = document.getElementById('slider-flies');
const flyVal = document.getElementById('slider-flies-val');
flySlider.addEventListener('input', () => {
  settings.flyCount = +flySlider.value;
  flyVal.textContent = settings.flyCount;
  topUpFlies();
});
const foxSlider = document.getElementById('slider-foxes');
const foxVal = document.getElementById('slider-foxes-val');
foxSlider.addEventListener('input', () => {
  settings.foxCount = +foxSlider.value;
  foxVal.textContent = settings.foxCount;
  topUpFoxes();
});

/* ── Main loop ────────────────────────────────────────────── */
let lastT = performance.now();
function frame(now){
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  step(dt);
  stepSparks(dt);
  drawScene(dt, now);
  drawFX(now);
  updateHud();
  requestAnimationFrame(frame);
}

/* ── Boot ─────────────────────────────────────────────────── */
topUpFoxes();
topUpFlies();
updateHud();
requestAnimationFrame(frame);
</script>
