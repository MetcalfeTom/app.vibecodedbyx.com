<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Ghost Desktop</title>
<meta name="description" content="A 1995 operating system, but it's haunted. Windows drift, the cursor flickers, the clock lies.">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%91%BB">
<meta property="og:title" content="Ghost Desktop">
<meta property="og:description" content="A 1995 operating system, but it's haunted. The windows know you're watching.">
<meta property="og:url" content="https://sloppy.live/ghost-desktop">
<meta property="og:image" content="https://image.pollinations.ai/prompt/haunted%20windows%2095%20desktop%2C%20teal%20background%2C%20ghosts%20peeking%20through%20pixelated%20windows%2C%20CRT%20scanlines%2C%20retro%20computer?width=1200&height=630&seed=666&nologo=true">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Silkscreen:wght@400;700&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #008080;
    --silver: #c0c0c0;
    --silver-2: #dfdfdf;
    --gray: #808080;
    --dark: #000000;
    --light: #ffffff;
    --navy: #000080;
    --azure: #1084d0;
    --inactive: #7b7b7b;
    --ghost: #b9faff;
    --warn: #ff1f3a;
  }
  * { box-sizing: border-box; }
  html { font-size: 100%; }
  body {
    margin: 0;
    overflow: hidden;
    background: var(--teal);
    color: var(--dark);
    font-family: 'VT323', 'MS Sans Serif', Tahoma, monospace;
    user-select: none;
    height: 100vh;
    width: 100vw;
  }
  /* CRT scanlines */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9000;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0.08) 0 1px, transparent 1px 3px);
    mix-blend-mode: multiply;
  }
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9001;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.42));
  }

  /* Boot screen */
  .boot {
    position: fixed;
    inset: 0;
    background: #000;
    color: #6cfa5e;
    font-family: 'VT323', monospace;
    font-size: 1.1rem;
    padding: 2rem 1.4rem;
    z-index: 9999;
    line-height: 1.45;
    white-space: pre-line;
    transition: opacity 0.5s ease;
  }
  .boot.gone { opacity: 0; pointer-events: none; }
  .boot .caret {
    display: inline-block;
    width: 0.55rem;
    height: 1rem;
    background: #6cfa5e;
    vertical-align: -2px;
    animation: blink 0.9s steps(2, start) infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* Desktop */
  .desktop {
    position: fixed;
    inset: 0 0 2.2rem 0;
    overflow: hidden;
  }
  .desktop-icons {
    position: absolute;
    top: 1rem;
    left: 1rem;
    display: grid;
    grid-template-columns: 5rem;
    grid-auto-rows: 5rem;
    gap: 0.4rem;
  }
  .desk-icon {
    display: grid;
    grid-template-rows: 2.6rem auto;
    align-items: center;
    justify-items: center;
    text-align: center;
    cursor: pointer;
    padding: 0.2rem 0.1rem;
    border: 1px dotted transparent;
    background: transparent;
    color: var(--light);
    font-family: 'VT323', 'Tahoma', sans-serif;
    font-size: 0.95rem;
    text-shadow: 1px 1px 0 #000;
    line-height: 1.05;
    width: 100%;
  }
  .desk-icon:hover { border-color: #fff5; }
  .desk-icon:focus-visible { outline: 2px dotted var(--light); outline-offset: 1px; border-color: transparent; }
  .desk-icon.selected {
    background: rgba(0,0,128,0.5);
    border-color: #fff5;
  }
  .desk-icon .glyph {
    font-size: 2.2rem;
    line-height: 1;
    filter: drop-shadow(1px 1px 0 #000);
  }
  .desk-icon .lbl {
    margin-top: 0.15rem;
    padding: 0 0.15rem;
    background: transparent;
  }

  /* Windows */
  .window {
    position: absolute;
    background: var(--silver);
    border-style: solid;
    border-width: 2px;
    border-top-color: var(--silver-2);
    border-left-color: var(--silver-2);
    border-right-color: var(--gray);
    border-bottom-color: var(--gray);
    box-shadow: 1px 1px 0 var(--dark), inset 1px 1px 0 var(--light), inset -1px -1px 0 var(--dark);
    display: grid;
    grid-template-rows: 1.4rem auto 1fr;
    min-width: 14rem;
    min-height: 9rem;
    transition: filter 0.18s ease;
  }
  .window.dragging { transition: none; }
  .window.shake { animation: winShake 0.32s ease; }
  @keyframes winShake {
    0%, 100% { transform: translate(0, 0); }
    20% { transform: translate(-4px, 2px); }
    40% { transform: translate(4px, -2px); }
    60% { transform: translate(-3px, 3px); }
    80% { transform: translate(3px, -1px); }
  }
  .title-bar {
    background: linear-gradient(90deg, var(--navy) 0%, var(--azure) 100%);
    color: var(--light);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 0.15rem 0 0.4rem;
    font-family: 'Silkscreen', 'MS Sans Serif', Tahoma, sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    letter-spacing: 0.04em;
    cursor: grab;
    height: 1.4rem;
  }
  .title-bar.dragging { cursor: grabbing; }
  .window.inactive .title-bar {
    background: var(--inactive);
    color: #d0d0d0;
  }
  .title-bar .title {
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    text-shadow: none;
    text-transform: uppercase;
  }
  .title-controls { display: flex; gap: 2px; flex-shrink: 0; }
  .ctrl-btn {
    width: 1rem;
    height: 0.95rem;
    background: var(--silver);
    border-top: 1px solid var(--silver-2);
    border-left: 1px solid var(--silver-2);
    border-right: 1px solid var(--dark);
    border-bottom: 1px solid var(--dark);
    box-shadow: inset -1px -1px 0 var(--gray), inset 1px 1px 0 var(--light);
    font-family: 'Silkscreen', sans-serif;
    font-size: 0.6rem;
    line-height: 0.6rem;
    color: var(--dark);
    padding: 0;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .ctrl-btn:focus-visible { outline: 1px dotted var(--dark); outline-offset: -3px; }
  .ctrl-btn:active {
    border-top: 1px solid var(--dark);
    border-left: 1px solid var(--dark);
    border-right: 1px solid var(--silver-2);
    border-bottom: 1px solid var(--silver-2);
    box-shadow: inset 1px 1px 0 var(--gray), inset -1px -1px 0 var(--silver-2);
  }
  .menu-bar {
    background: var(--silver);
    display: flex;
    gap: 0.1rem;
    font-family: 'VT323', sans-serif;
    font-size: 0.9rem;
    padding: 0 0.15rem;
    border-bottom: 1px solid var(--gray);
  }
  .menu-bar span, .menu-bar button {
    background: transparent;
    border: none;
    padding: 0.05rem 0.4rem;
    color: var(--dark);
    cursor: pointer;
    font-family: inherit;
    font-size: inherit;
  }
  .menu-bar span u, .menu-bar button u { text-decoration: underline; }
  .menu-bar span:hover, .menu-bar button:hover { background: var(--navy); color: var(--light); }
  .window-body {
    padding: 0.3rem;
    overflow: auto;
    background: var(--silver);
    font-family: 'VT323', monospace;
    font-size: 1rem;
    line-height: 1.2;
  }
  .inset {
    background: var(--light);
    border-top: 1px solid var(--gray);
    border-left: 1px solid var(--gray);
    border-right: 1px solid var(--light);
    border-bottom: 1px solid var(--light);
    box-shadow: inset 1px 1px 0 var(--dark), inset -1px -1px 0 var(--silver-2);
    padding: 0.3rem;
  }
  .status-bar {
    background: var(--silver);
    border-top: 1px solid var(--silver-2);
    padding: 0.1rem 0.5rem;
    font-family: 'VT323', monospace;
    font-size: 0.85rem;
    color: var(--gray);
    display: flex;
    gap: 1rem;
  }

  /* Notepad content */
  .notepad-area {
    width: 100%;
    height: 100%;
    background: var(--light);
    border: none;
    resize: none;
    outline: none;
    font-family: 'VT323', 'Courier New', monospace;
    font-size: 1.1rem;
    color: var(--dark);
    padding: 0.4rem;
    line-height: 1.25;
    white-space: pre-wrap;
    overflow: auto;
  }
  .notepad-area .ghost-text { color: #4a4a8c; font-style: italic; opacity: 0.85; }

  /* File listing */
  .file-list {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(5rem, 1fr));
    gap: 0.4rem;
    padding: 0.4rem;
  }
  .file {
    display: grid;
    grid-template-rows: auto auto;
    place-items: center;
    text-align: center;
    padding: 0.3rem 0.15rem;
    cursor: pointer;
    color: var(--dark);
    font-family: 'VT323', sans-serif;
    font-size: 0.85rem;
    line-height: 1.05;
    border: 1px dotted transparent;
  }
  .file:hover { background: rgba(0,0,128,0.1); border-color: var(--gray); }
  .file .glyph { font-size: 1.8rem; line-height: 1; }

  /* Recycle */
  .recycle-list .file .lbl { text-decoration: line-through; }

  /* Minesweeper */
  .ms-wrap {
    padding: 0.4rem;
    display: grid;
    gap: 0.3rem;
  }
  .ms-top {
    display: flex;
    justify-content: space-between;
    background: var(--silver);
    border-top: 1px solid var(--gray);
    border-left: 1px solid var(--gray);
    border-right: 1px solid var(--light);
    border-bottom: 1px solid var(--light);
    box-shadow: inset 1px 1px 0 var(--dark), inset -1px -1px 0 var(--silver-2);
    padding: 0.2rem 0.4rem;
    align-items: center;
  }
  .ms-counter, .ms-time {
    background: #000;
    color: #ff3030;
    font-family: 'VT323', monospace;
    font-size: 1.3rem;
    padding: 0 0.5rem;
    min-width: 3.4rem;
    text-align: right;
    border: 1px inset #888;
  }
  .ms-face {
    width: 1.6rem;
    height: 1.6rem;
    background: var(--silver);
    border-top: 1px solid var(--silver-2);
    border-left: 1px solid var(--silver-2);
    border-right: 1px solid var(--dark);
    border-bottom: 1px solid var(--dark);
    box-shadow: inset -1px -1px 0 var(--gray), inset 1px 1px 0 var(--light);
    font-size: 1.1rem;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
  }
  .ms-face:active { box-shadow: inset 1px 1px 0 var(--gray), inset -1px -1px 0 var(--silver-2); }
  .ms-grid {
    display: grid;
    grid-template-columns: repeat(8, 1.4rem);
    grid-auto-rows: 1.4rem;
    gap: 0;
    background: var(--gray);
    padding: 2px;
    border-top: 1px solid var(--gray);
    border-left: 1px solid var(--gray);
    border-right: 1px solid var(--silver-2);
    border-bottom: 1px solid var(--silver-2);
    box-shadow: inset 1px 1px 0 var(--dark), inset -1px -1px 0 var(--light);
    width: max-content;
  }
  .ms-cell {
    width: 1.4rem;
    height: 1.4rem;
    background: var(--silver);
    border-top: 2px solid var(--silver-2);
    border-left: 2px solid var(--silver-2);
    border-right: 2px solid var(--gray);
    border-bottom: 2px solid var(--gray);
    font-family: 'Silkscreen', monospace;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--dark);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    padding: 0;
  }
  .ms-cell:focus-visible { outline: 2px dotted var(--navy); outline-offset: -3px; }
  .ms-cell.revealed {
    background: var(--silver);
    border: 1px solid var(--gray);
  }
  .ms-cell.bomb { background: #ff5252; color: #000; }
  .ms-cell .n1 { color: #0000ff; } .ms-cell .n2 { color: #008000; }
  .ms-cell .n3 { color: #ff0000; } .ms-cell .n4 { color: #000080; }
  .ms-cell .n5 { color: #800000; } .ms-cell .n6 { color: #008080; }
  .ms-cell .n7 { color: #000000; } .ms-cell .n8 { color: #808080; }

  /* System window */
  .sys-row {
    display: flex;
    justify-content: space-between;
    padding: 0.15rem 0.5rem;
    border-bottom: 1px dotted var(--gray);
  }
  .sys-row strong { font-family: 'Silkscreen', sans-serif; font-size: 0.7rem; }

  /* Taskbar */
  .taskbar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    height: 2.2rem;
    background: var(--silver);
    border-top: 2px solid var(--silver-2);
    box-shadow: inset 0 1px 0 var(--light);
    z-index: 5000;
    display: flex;
    align-items: stretch;
    padding: 0.18rem 0.2rem;
    gap: 0.3rem;
  }
  .start-btn {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0 0.5rem 0 0.3rem;
    background: var(--silver);
    border-top: 1px solid var(--silver-2);
    border-left: 1px solid var(--silver-2);
    border-right: 1px solid var(--dark);
    border-bottom: 1px solid var(--dark);
    box-shadow: inset -1px -1px 0 var(--gray), inset 1px 1px 0 var(--light);
    font-family: 'Silkscreen', sans-serif;
    font-weight: 700;
    font-size: 0.65rem;
    color: var(--dark);
    cursor: pointer;
    height: 100%;
  }
  .start-btn:focus-visible { outline: 1px dotted var(--dark); outline-offset: -3px; }
  .start-btn .icon { font-size: 1rem; line-height: 1; }
  .start-btn.open {
    border-top: 1px solid var(--dark);
    border-left: 1px solid var(--dark);
    border-right: 1px solid var(--silver-2);
    border-bottom: 1px solid var(--silver-2);
    box-shadow: inset 1px 1px 0 var(--gray), inset -1px -1px 0 var(--silver-2);
  }
  .task-list {
    display: flex;
    gap: 0.2rem;
    flex: 1;
    overflow: hidden;
  }
  .task-btn {
    display: flex;
    align-items: center;
    gap: 0.3rem;
    padding: 0 0.5rem;
    background: var(--silver);
    border-top: 1px solid var(--silver-2);
    border-left: 1px solid var(--silver-2);
    border-right: 1px solid var(--dark);
    border-bottom: 1px solid var(--dark);
    box-shadow: inset -1px -1px 0 var(--gray), inset 1px 1px 0 var(--light);
    font-family: 'VT323', sans-serif;
    font-size: 0.9rem;
    color: var(--dark);
    cursor: pointer;
    flex: 0 0 9rem;
    min-width: 0;
    height: 100%;
    overflow: hidden;
    white-space: nowrap;
    text-overflow: ellipsis;
    text-align: left;
  }
  .task-btn.active {
    border-top: 1px solid var(--dark);
    border-left: 1px solid var(--dark);
    border-right: 1px solid var(--silver-2);
    border-bottom: 1px solid var(--silver-2);
    box-shadow: inset 1px 1px 0 var(--gray), inset -1px -1px 0 var(--silver-2);
    background: linear-gradient(135deg, var(--silver) 25%, #b0b0b0 25%, #b0b0b0 50%, var(--silver) 50%, var(--silver) 75%, #b0b0b0 75%);
    background-size: 4px 4px;
  }
  .tray {
    display: flex;
    align-items: center;
    padding: 0 0.5rem;
    border-top: 1px solid var(--gray);
    border-left: 1px solid var(--gray);
    border-right: 1px solid var(--light);
    border-bottom: 1px solid var(--light);
    box-shadow: inset 1px 1px 0 var(--dark), inset -1px -1px 0 var(--silver-2);
    font-family: 'VT323', monospace;
    font-size: 0.95rem;
    color: var(--dark);
    gap: 0.5rem;
  }
  .tray .ico-btn {
    background: transparent;
    border: none;
    cursor: pointer;
    font-size: 0.9rem;
    padding: 0;
    color: var(--dark);
  }
  .tray .ico-btn:focus-visible { outline: 1px dotted var(--dark); outline-offset: 1px; }

  /* Start menu */
  .start-menu {
    position: fixed;
    bottom: 2.2rem;
    left: 0.2rem;
    background: var(--silver);
    border-top: 2px solid var(--silver-2);
    border-left: 2px solid var(--silver-2);
    border-right: 2px solid var(--dark);
    border-bottom: 2px solid var(--dark);
    box-shadow: inset -1px -1px 0 var(--gray), 2px 2px 0 var(--dark);
    z-index: 4900;
    width: 16rem;
    display: none;
  }
  .start-menu.show { display: block; }
  .start-banner {
    background: linear-gradient(180deg, var(--azure), var(--navy));
    color: var(--light);
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    padding: 0.5rem 0.3rem;
    font-family: 'Silkscreen', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    position: absolute;
    left: 0;
    top: 0;
    bottom: 0;
  }
  .start-banner em { color: var(--ghost); font-style: normal; }
  .start-items {
    padding: 0.2rem 0.2rem 0.2rem 1.6rem;
    display: grid;
    gap: 0;
  }
  .start-item {
    background: var(--silver);
    border: none;
    padding: 0.35rem 0.4rem;
    text-align: left;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-family: 'VT323', sans-serif;
    font-size: 1rem;
    color: var(--dark);
  }
  .start-item:hover { background: var(--navy); color: var(--light); }
  .start-item:focus-visible { outline: 1px dotted var(--dark); outline-offset: -2px; }
  .start-item .icon { font-size: 1.1rem; line-height: 1; }
  .start-divider {
    height: 1px;
    background: var(--gray);
    margin: 0.15rem 0;
    box-shadow: 0 1px 0 var(--light);
  }

  /* Ghost drift */
  .ghost-drift {
    position: fixed;
    z-index: 6000;
    font-size: 2.6rem;
    pointer-events: none;
    opacity: 0;
    text-shadow: 0 0 12px rgba(185,250,255,0.6);
    filter: drop-shadow(0 0 8px rgba(255,255,255,0.5));
    animation: ghostDrift 7s linear forwards;
  }
  @keyframes ghostDrift {
    0% { opacity: 0; transform: translateX(0) translateY(0); }
    10% { opacity: 0.85; }
    50% { opacity: 0.95; transform: translateX(50vw) translateY(-30px); }
    90% { opacity: 0.6; }
    100% { opacity: 0; transform: translateX(110vw) translateY(0); }
  }

  /* BSOD */
  .bsod {
    position: fixed;
    inset: 0;
    background: var(--navy);
    color: var(--light);
    font-family: 'VT323', monospace;
    font-size: 1.1rem;
    padding: 2rem 1.4rem;
    z-index: 8000;
    line-height: 1.4;
    white-space: pre-wrap;
    display: none;
  }
  .bsod.show { display: block; }
  .bsod h2 {
    background: var(--light);
    color: var(--navy);
    display: inline-block;
    padding: 0.05rem 0.6rem;
    margin: 0 0 0.7rem;
    font-family: 'Silkscreen', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    letter-spacing: 0.06em;
  }

  /* Cursor trail */
  .trail {
    position: fixed;
    pointer-events: none;
    z-index: 4500;
    color: var(--ghost);
    font-family: 'VT323', monospace;
    font-size: 0.95rem;
    text-shadow: 0 0 4px rgba(185,250,255,0.7);
    opacity: 0.65;
    animation: trailFade 0.7s linear forwards;
  }
  @keyframes trailFade {
    from { opacity: 0.65; transform: translate(0, 0); }
    to { opacity: 0; transform: translate(0, -10px); }
  }

  /* Dialog */
  .dialog {
    min-width: 18rem;
  }
  .dialog .window-body {
    padding: 0.7rem 0.7rem;
    display: grid;
    gap: 0.5rem;
  }
  .dialog .row {
    display: flex;
    gap: 0.6rem;
    align-items: center;
  }
  .dialog .row .glyph { font-size: 2rem; line-height: 1; flex-shrink: 0; }
  .dialog .row p { margin: 0; font-family: 'VT323', sans-serif; font-size: 1rem; }
  .dialog .actions {
    display: flex;
    justify-content: center;
    gap: 0.4rem;
    padding-top: 0.4rem;
  }
  .ok-btn {
    background: var(--silver);
    border-top: 1px solid var(--silver-2);
    border-left: 1px solid var(--silver-2);
    border-right: 1px solid var(--dark);
    border-bottom: 1px solid var(--dark);
    box-shadow: inset -1px -1px 0 var(--gray), inset 1px 1px 0 var(--light);
    font-family: 'Silkscreen', sans-serif;
    font-size: 0.65rem;
    font-weight: 700;
    color: var(--dark);
    padding: 0.4rem 1.1rem;
    cursor: pointer;
    min-width: 4rem;
    min-height: 2rem;
  }
  .ok-btn:focus-visible { outline: 1px dotted var(--dark); outline-offset: -3px; }
  .ok-btn:active { box-shadow: inset 1px 1px 0 var(--gray), inset -1px -1px 0 var(--silver-2); }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
    .ghost-drift, .trail, .window.shake { animation: none !important; }
  }

  @media (max-width: 32rem) {
    .desktop-icons { grid-template-columns: 4.2rem; grid-auto-rows: 4.5rem; }
    .desk-icon .glyph { font-size: 1.8rem; }
    .desk-icon { font-size: 0.85rem; }
    .task-btn { flex: 0 0 5.5rem; }
  }
</style>
</head>
<body>
<div class="boot" id="bootScreen" aria-hidden="true"></div>

<div class="desktop" id="desktop">
  <div class="desktop-icons" id="desktopIcons"></div>
  <div id="windows"></div>
</div>

<div class="start-menu" id="startMenu" role="menu" aria-hidden="true">
  <div class="start-banner">Ghost <em>OS 95</em></div>
  <div class="start-items">
    <button class="start-item" data-open="notepad" type="button"><span class="icon" aria-hidden="true">📄</span><u>P</u>rograms · Notepad</button>
    <button class="start-item" data-open="mycomputer" type="button"><span class="icon" aria-hidden="true">💾</span>My Computer</button>
    <button class="start-item" data-open="minesweeper" type="button"><span class="icon" aria-hidden="true">💣</span>Minesweeper</button>
    <button class="start-item" data-open="system" type="button"><span class="icon" aria-hidden="true">🖥️</span>System Properties</button>
    <button class="start-item" data-open="recycle" type="button"><span class="icon" aria-hidden="true">🗑️</span>Recycle Bin</button>

    <button class="start-item" id="shutDownBtn" type="button"><span class="icon" aria-hidden="true">⏻</span>Sh<u>u</u>t Down…</button>
  </div>
</div>

<div class="bsod" id="bsod" role="alert" aria-hidden="true"></div>

<div class="taskbar">
  <button class="start-btn" id="startBtn" type="button" aria-haspopup="menu" aria-label="Start menu">
    <span class="icon" aria-hidden="true">👻</span>Start
  </button>
  <div class="task-list" id="taskList"></div>
  <div class="tray">
    <button class="ico-btn" id="soundBtn" type="button" aria-label="Toggle sound" title="Sound">🔊</button>
    <span id="clock" aria-live="off">12:00:00 PM</span>
  </div>
</div>

<script>
(function(){
  const desktop = document.getElementById('desktop');
  const desktopIcons = document.getElementById('desktopIcons');
  const winsRoot = document.getElementById('windows');
  const taskList = document.getElementById('taskList');
  const startBtn = document.getElementById('startBtn');
  const startMenu = document.getElementById('startMenu');
  const clockEl = document.getElementById('clock');
  const bsod = document.getElementById('bsod');
  const bootScreen = document.getElementById('bootScreen');
  const soundBtn = document.getElementById('soundBtn');
  const exorciseBtn = document.getElementById('exorciseBtn');
  const shutDownBtn = document.getElementById('shutDownBtn');

  const state = {
    bootStart: Date.now(),
    windows: {},
    zCounter: 100,
    activeId: null,
    soundOn: true,
    haunted: true,
    exorciseUntil: 0,
    notepadText: '',
    nextHauntAt: 0,
    nextGhostAt: 0,
    nextBsodAt: 0,
    nextTypeAt: 0,
    nextClockHauntAt: 0,
  };

  // ---- Boot screen ----
  const bootLines = [
    'GhostBIOS v6.66 © 1995-2026',
    'Memory test: 13 MB OK',
    'Detecting ghosts......... 7 found',
    'Mounting drive C:\\ ........ OK',
    'Mounting drive D:\\ ........ OK',
    'Mounting drive GHOST:\\ ... WARNING (corrupted)',
    'Loading GHOST.SYS ........ OK',
    '',
    'Starting Ghost OS 95...',
  ];
  let bootText = '';
  let bootIdx = 0;
  function bootStep() {
    if (bootIdx < bootLines.length) {
      bootText += bootLines[bootIdx] + '\n';
      bootScreen.textContent = bootText;
      bootScreen.insertAdjacentHTML('beforeend', '<span class="caret"></span>');
      bootIdx += 1;
      setTimeout(bootStep, 180 + Math.random() * 120);
    } else {
      setTimeout(() => {
        bootScreen.classList.add('gone');
        setTimeout(() => bootScreen.remove(), 600);
        scheduleHauntings();
        clockTick();
      }, 600);
    }
  }
  setTimeout(bootStep, 250);

  // ---- Audio ----
  let audioCtx = null, masterGain = null;
  function ensureAudio() {
    if (audioCtx) return;
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    audioCtx = new Ctx();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 0.4;
    masterGain.connect(audioCtx.destination);
  }
  function withSound(fn) {
    if (!state.soundOn) return;
    ensureAudio();
    if (!audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    fn(audioCtx.currentTime);
  }
  function playPop() {
    withSound(t => {
      const o = audioCtx.createOscillator();
      o.type = 'square'; o.frequency.value = 880;
      o.frequency.exponentialRampToValueAtTime(440, t + 0.07);
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.08, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.07);
      o.connect(g); g.connect(masterGain);
      o.start(t); o.stop(t + 0.08);
    });
  }
  function playTap() {
    withSound(t => {
      const o = audioCtx.createOscillator();
      o.type = 'square'; o.frequency.value = 1200;
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.05, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.03);
      o.connect(g); g.connect(masterGain);
      o.start(t); o.stop(t + 0.04);
    });
  }
  function playWhisper() {
    withSound(t => {
      const len = Math.floor(0.6 * audioCtx.sampleRate);
      const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.sin((i/len)*Math.PI) * 0.6;
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      const f = audioCtx.createBiquadFilter();
      f.type = 'bandpass'; f.frequency.value = 900; f.Q.value = 4;
      const lfo = audioCtx.createOscillator();
      lfo.type = 'sine'; lfo.frequency.value = 5;
      const lfoG = audioCtx.createGain(); lfoG.gain.value = 200;
      lfo.connect(lfoG); lfoG.connect(f.frequency);
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.1, t + 0.1);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.6);
      src.connect(f); f.connect(g); g.connect(masterGain);
      src.start(t); lfo.start(t); lfo.stop(t + 0.7);
    });
  }
  function playBsod() {
    withSound(t => {
      const len = Math.floor(0.4 * audioCtx.sampleRate);
      const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * (1 - i/len);
      const src = audioCtx.createBufferSource();
      src.buffer = buf;
      const g = audioCtx.createGain(); g.gain.value = 0.16;
      const f = audioCtx.createBiquadFilter();
      f.type = 'lowpass'; f.frequency.setValueAtTime(2000, t);
      f.frequency.exponentialRampToValueAtTime(200, t + 0.4);
      src.connect(f); f.connect(g); g.connect(masterGain);
      src.start(t);
      const o = audioCtx.createOscillator();
      o.type = 'sawtooth'; o.frequency.setValueAtTime(800, t);
      o.frequency.exponentialRampToValueAtTime(80, t + 0.35);
      const og = audioCtx.createGain();
      og.gain.setValueAtTime(0.18, t);
      og.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
      o.connect(og); og.connect(masterGain);
      o.start(t); o.stop(t + 0.42);
    });
  }
  function playStartup() {
    withSound(t => {
      [392, 523, 659, 784].forEach((f, i) => {
        const o = audioCtx.createOscillator();
        o.type = 'triangle'; o.frequency.value = f;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0, t + i*0.08);
        g.gain.linearRampToValueAtTime(0.1, t + i*0.08 + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, t + i*0.08 + 0.32);
        o.connect(g); g.connect(masterGain);
        o.start(t + i*0.08); o.stop(t + i*0.08 + 0.34);
      });
    });
  }

  // ---- Clock ----
  let clockHaunted = 0;
  function clockTick() {
    let label;
    if (clockHaunted > 0) {
      clockHaunted -= 1;
      const hauntedDisplays = ['13:66:66 AM', '??:??:??', '03:33:33 AM', '00:00:00 ??', '99:99:99'];
      label = hauntedDisplays[Math.floor(Math.random()*hauntedDisplays.length)];
    } else {
      const d = new Date();
      const h = d.getHours();
      const m = d.getMinutes();
      const s = d.getSeconds();
      const ampm = h >= 12 ? 'PM' : 'AM';
      const hh = ((h + 11) % 12 + 1);
      const pad = n => String(n).padStart(2, '0');
      label = `${hh}:${pad(m)}:${pad(s)} ${ampm}`;
    }
    clockEl.textContent = label;
    setTimeout(clockTick, 1000);
  }

  // ---- Windows ----
  function defineApp(id, opts) {
    state.windows[id] = {
      id, title: opts.title, icon: opts.icon,
      x: opts.x ?? 80, y: opts.y ?? 60,
      w: opts.w ?? 360, h: opts.h ?? 240,
      open: false, minimized: false, z: 0,
      build: opts.build,
      menu: opts.menu,
      el: null,
    };
  }

  function openApp(id) {
    const app = state.windows[id];
    if (!app) return;
    if (app.open) {
      if (app.minimized) {
        app.minimized = false;
        app.el.style.display = '';
      }
      focusWindow(id);
      renderTaskbar();
      return;
    }
    app.open = true;
    const el = document.createElement('div');
    el.className = 'window';
    el.dataset.id = id;
    el.style.left = app.x + 'px';
    el.style.top = app.y + 'px';
    el.style.width = app.w + 'px';
    el.style.height = app.h + 'px';
    el.innerHTML = `
      <div class="title-bar">
        <span class="title">${app.icon || ''} ${app.title}</span>
        <div class="title-controls">
          <button class="ctrl-btn min" type="button" aria-label="Minimize">_</button>
          <button class="ctrl-btn close" type="button" aria-label="Close">×</button>
        </div>
      </div>
      ${app.menu ? `<div class="menu-bar">${app.menu}</div>` : '<div class="menu-bar" aria-hidden="true"></div>'}
      <div class="window-body"></div>
    `;
    const body = el.querySelector('.window-body');
    app.build(body, app);
    winsRoot.appendChild(el);
    app.el = el;
    // Wire controls
    el.querySelector('.close').addEventListener('click', (e) => { e.stopPropagation(); closeApp(id); });
    el.querySelector('.min').addEventListener('click', (e) => { e.stopPropagation(); minimizeApp(id); });
    // Drag
    const titleBar = el.querySelector('.title-bar');
    titleBar.addEventListener('pointerdown', (e) => beginDrag(e, app));
    el.addEventListener('pointerdown', () => focusWindow(id));
    focusWindow(id);
    playPop();
    renderTaskbar();
  }

  function closeApp(id) {
    const app = state.windows[id];
    if (!app || !app.open) return;
    app.open = false;
    app.minimized = false;
    if (app.el) { app.el.remove(); app.el = null; }
    playTap();
    renderTaskbar();
  }

  function minimizeApp(id) {
    const app = state.windows[id];
    if (!app || !app.open) return;
    app.minimized = true;
    if (app.el) app.el.style.display = 'none';
    renderTaskbar();
  }

  function focusWindow(id) {
    const app = state.windows[id];
    if (!app || !app.el) return;
    state.activeId = id;
    state.zCounter += 1;
    app.z = state.zCounter;
    Object.values(state.windows).forEach(w => {
      if (!w.el) return;
      w.el.style.zIndex = w.z || 1;
      w.el.classList.toggle('inactive', w.id !== id);
    });
    renderTaskbar();
  }

  // Drag
  function beginDrag(e, app) {
    if (!app.el) return;
    e.preventDefault();
    focusWindow(app.id);
    const rect = app.el.getBoundingClientRect();
    const offX = e.clientX - rect.left;
    const offY = e.clientY - rect.top;
    app.el.classList.add('dragging');
    const titleBar = app.el.querySelector('.title-bar');
    titleBar.classList.add('dragging');
    function onMove(ev) {
      const nx = Math.max(-app.el.offsetWidth + 60, ev.clientX - offX);
      const ny = Math.max(0, Math.min(window.innerHeight - 40, ev.clientY - offY));
      app.el.style.left = nx + 'px';
      app.el.style.top = ny + 'px';
      app.x = nx; app.y = ny;
    }
    function onUp() {
      app.el.classList.remove('dragging');
      titleBar.classList.remove('dragging');
      window.removeEventListener('pointermove', onMove);
      window.removeEventListener('pointerup', onUp);
    }
    window.addEventListener('pointermove', onMove);
    window.addEventListener('pointerup', onUp);
  }

  // Taskbar
  function renderTaskbar() {
    taskList.innerHTML = '';
    Object.values(state.windows).filter(w => w.open).forEach(w => {
      const b = document.createElement('button');
      b.className = 'task-btn' + (state.activeId === w.id && !w.minimized ? ' active' : '');
      b.type = 'button';
      b.innerHTML = `<span aria-hidden="true">${w.icon}</span><span>${w.title}</span>`;
      b.addEventListener('click', () => {
        if (state.activeId === w.id && !w.minimized) {
          minimizeApp(w.id);
        } else {
          if (w.minimized) { w.minimized = false; w.el.style.display = ''; }
          focusWindow(w.id);
        }
      });
      taskList.appendChild(b);
    });
  }

  // ---- App definitions ----
  defineApp('notepad', {
    title: 'README.HAUNTED.TXT — Notepad',
    icon: '📄',
    x: 110, y: 60, w: 460, h: 280,
    menu: '<span><u>F</u>ile</span><span><u>E</u>dit</span><span><u>S</u>earch</span><span><u>H</u>elp</span>',
    build: (body, app) => {
      const ta = document.createElement('div');
      ta.className = 'notepad-area inset';
      ta.contentEditable = 'true';
      ta.spellcheck = false;
      ta.textContent = state.notepadText || `welcome to ghost os 95.

if you are reading this, the cursor is not alone.

i was here in 1995.
do not save this file.
`;
      state.notepadText = ta.textContent;
      ta.addEventListener('input', () => { state.notepadText = ta.textContent; });
      body.style.padding = '0';
      body.appendChild(ta);
      const status = document.createElement('div');
      status.className = 'status-bar';
      status.innerHTML = '<span>Ln 1, Col 1</span><span>NUM</span><span id="hauntStatus">HAUNTED</span>';
      body.appendChild(status);
      app.notepadEl = ta;
    },
  });

  defineApp('mycomputer', {
    title: 'My Computer',
    icon: '💾',
    x: 200, y: 80, w: 420, h: 260,
    menu: '<span><u>F</u>ile</span><span><u>E</u>dit</span><span><u>V</u>iew</span><span><u>H</u>elp</span>',
    build: (body) => {
      body.style.padding = '0';
      const list = document.createElement('div');
      list.className = 'file-list inset';
      list.style.margin = '0.3rem';
      list.style.minHeight = '12rem';
      const items = [
        { glyph: '💾', lbl: '3½ Floppy (A:)' },
        { glyph: '💿', lbl: 'C:\\ DOS' },
        { glyph: '🖴', lbl: 'D:\\ DATA' },
        { glyph: '👻', lbl: 'GHOST:\\ ??' },
        { glyph: '📂', lbl: 'My Documents' },
        { glyph: '⚙', lbl: 'Control Panel' },
        { glyph: '🖨', lbl: 'Printers' },
        { glyph: '🌐', lbl: 'Dial-Up Networking' },
      ];
      items.forEach(it => {
        const el = document.createElement('button');
        el.type = 'button';
        el.className = 'file';
        el.innerHTML = `<span class="glyph" aria-hidden="true">${it.glyph}</span><span class="lbl">${it.lbl}</span>`;
        el.addEventListener('dblclick', () => openDialog('Access Denied', `${it.lbl}\nis currently being haunted.\nPlease try again never.`, '⚠'));
        el.addEventListener('click', () => playTap());
        list.appendChild(el);
      });
      body.appendChild(list);
    },
  });

  defineApp('recycle', {
    title: 'Recycle Bin',
    icon: '🗑️',
    x: 240, y: 110, w: 380, h: 240,
    menu: '<span><u>F</u>ile</span><span><u>E</u>dit</span><span><u>V</u>iew</span><span><u>H</u>elp</span>',
    build: (body) => {
      body.style.padding = '0';
      const wrap = document.createElement('div');
      wrap.style.padding = '0.3rem';
      const list = document.createElement('div');
      list.className = 'file-list inset recycle-list';
      list.style.minHeight = '10rem';
      [
        { glyph: '📄', lbl: 'yourself.exe' },
        { glyph: '📄', lbl: '1995.bak' },
        { glyph: '📄', lbl: 'ghost.dll' },
        { glyph: '📄', lbl: 'do_not_open.txt' },
        { glyph: '📁', lbl: 'screams\\' },
        { glyph: '📄', lbl: 'passwords.txt' },
      ].forEach(it => {
        const el = document.createElement('button');
        el.type = 'button';
        el.className = 'file';
        el.innerHTML = `<span class="glyph" aria-hidden="true">${it.glyph}</span><span class="lbl">${it.lbl}</span>`;
        el.addEventListener('click', () => playTap());
        el.addEventListener('dblclick', () => openDialog('Cannot Restore', 'These files refuse to be restored.\nThey appear comfortable here.', '👻'));
        list.appendChild(el);
      });
      wrap.appendChild(list);
      const btnRow = document.createElement('div');
      btnRow.style.display = 'flex';
      btnRow.style.gap = '0.4rem';
      btnRow.style.marginTop = '0.4rem';
      btnRow.style.justifyContent = 'flex-end';
      const emptyBtn = document.createElement('button');
      emptyBtn.className = 'ok-btn';
      emptyBtn.type = 'button';
      emptyBtn.textContent = 'Empty Bin';
      emptyBtn.addEventListener('click', () => openDialog('Recycle Bin', 'The bin cannot be emptied.\nThe contents have made it their home.', '🪦'));
      btnRow.appendChild(emptyBtn);
      wrap.appendChild(btnRow);
      body.appendChild(wrap);
    },
  });

  defineApp('minesweeper', {
    title: 'Minesweeper',
    icon: '💣',
    x: 280, y: 90, w: 240, h: 290,
    menu: '<span><u>G</u>ame</span><span><u>H</u>elp</span>',
    build: (body, app) => {
      body.style.padding = '0';
      const wrap = document.createElement('div');
      wrap.className = 'ms-wrap';
      const W = 8, H = 8, MINES = 10;
      const cells = []; // {bomb, revealed, n}
      const top = document.createElement('div');
      top.className = 'ms-top';
      top.innerHTML = `<span class="ms-counter">${String(MINES).padStart(3,'0')}</span><button class="ms-face" type="button" aria-label="Restart">🙂</button><span class="ms-time">000</span>`;
      const counterEl = top.querySelector('.ms-counter');
      const faceEl = top.querySelector('.ms-face');
      const timeEl = top.querySelector('.ms-time');
      const grid = document.createElement('div');
      grid.className = 'ms-grid';
      let startTs = 0, alive = true, timerH = null;

      function neighbours(i) {
        const out = [];
        const x = i % W, y = Math.floor(i / W);
        for (let dx = -1; dx <= 1; dx++) for (let dy = -1; dy <= 1; dy++) {
          if (!dx && !dy) continue;
          const nx = x + dx, ny = y + dy;
          if (nx < 0 || ny < 0 || nx >= W || ny >= H) continue;
          out.push(ny * W + nx);
        }
        return out;
      }
      function recountAll() {
        cells.forEach((c, i) => {
          if (c.bomb) c.n = -1;
          else c.n = neighbours(i).filter(j => cells[j].bomb).length;
        });
      }
      function init() {
        cells.length = 0;
        for (let i = 0; i < W*H; i++) cells.push({ bomb: false, revealed: false, n: 0 });
        const ix = [];
        for (let i = 0; i < W*H; i++) ix.push(i);
        for (let i = ix.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [ix[i], ix[j]] = [ix[j], ix[i]];
        }
        ix.slice(0, MINES).forEach(i => cells[i].bomb = true);
        recountAll();
        alive = true;
        startTs = 0;
        timeEl.textContent = '000';
        if (timerH) clearInterval(timerH);
        timerH = setInterval(() => {
          if (!startTs || !alive) return;
          const dt = Math.floor((Date.now() - startTs) / 1000);
          timeEl.textContent = String(Math.min(999, dt)).padStart(3, '0');
        }, 250);
        faceEl.textContent = '🙂';
        renderGrid();
      }
      function renderGrid() {
        grid.innerHTML = '';
        cells.forEach((c, i) => {
          const b = document.createElement('button');
          b.type = 'button';
          b.className = 'ms-cell';
          if (c.revealed) {
            b.classList.add('revealed');
            if (c.bomb) {
              b.classList.add('bomb');
              b.textContent = '💣';
            } else if (c.n > 0) {
              b.innerHTML = `<span class="n${c.n}">${c.n}</span>`;
            }
          }
          b.addEventListener('click', () => reveal(i));
          grid.appendChild(b);
        });
      }
      function reveal(i) {
        if (!alive) return;
        if (!startTs) startTs = Date.now();
        // Haunted: 18% chance bombs rearrange on click
        if (state.haunted && Date.now() > state.exorciseUntil && Math.random() < 0.18) {
          const wasBomb = cells.map(c => c.bomb);
          // Remove all bombs, place fresh (excluding clicked cell)
          cells.forEach(c => c.bomb = false);
          const pool = [];
          for (let k = 0; k < cells.length; k++) if (k !== i) pool.push(k);
          for (let k = pool.length - 1; k > 0; k--) {
            const j = Math.floor(Math.random() * (k + 1));
            [pool[k], pool[j]] = [pool[j], pool[k]];
          }
          pool.slice(0, MINES).forEach(k => cells[k].bomb = true);
          recountAll();
          playWhisper();
        }
        const c = cells[i];
        if (c.revealed) return;
        c.revealed = true;
        if (c.bomb) {
          alive = false;
          cells.forEach(c2 => { if (c2.bomb) c2.revealed = true; });
          faceEl.textContent = '😵';
          openDialog('Minesweeper', 'they were never where you thought they were.', '👻');
          renderGrid();
          return;
        }
        playTap();
        if (c.n === 0) {
          neighbours(i).forEach(j => {
            if (!cells[j].revealed) reveal(j);
          });
        }
        renderGrid();
        // Win check
        const unrevealed = cells.filter(c2 => !c2.revealed).length;
        if (unrevealed === MINES) {
          alive = false;
          faceEl.textContent = '😎';
          openDialog('Minesweeper', 'You won. But the mines kept moving.', '🏆');
        }
      }
      faceEl.addEventListener('click', init);
      init();
      wrap.appendChild(top);
      wrap.appendChild(grid);
      body.appendChild(wrap);
    },
  });

  defineApp('system', {
    title: 'System Properties',
    icon: '🖥️',
    x: 320, y: 130, w: 360, h: 280,
    menu: '<span><u>F</u>ile</span><span><u>H</u>elp</span>',
    build: (body, app) => {
      body.style.padding = '0';
      const wrap = document.createElement('div');
      wrap.style.padding = '0.4rem';
      wrap.style.fontFamily = "'VT323', monospace";
      wrap.style.fontSize = '1rem';
      const inset = document.createElement('div');
      inset.className = 'inset';
      const rows = [
        ['System', 'Ghost OS 95 Plus!'],
        ['CPU', 'GhostPentium III @ 666 MHz'],
        ['Memory', '13 MB RAM (∞ used)'],
        ['Disk C:\\', '666 GB / 666 GB used'],
        ['Disk GHOST:\\', '?? GB / ?? GB used'],
        ['Sound Card', 'SoundBlaster Spectral 16'],
        ['Display', '640 × 480 · 256 colors'],
        ['Network', 'Dial-Up · 14.4 kbps · WAILING'],
      ];
      rows.forEach(([k, v]) => {
        const row = document.createElement('div');
        row.className = 'sys-row';
        row.innerHTML = `<strong>${k}</strong><span>${v}</span>`;
        inset.appendChild(row);
      });
      const uptime = document.createElement('div');
      uptime.className = 'sys-row';
      uptime.innerHTML = `<strong>Haunted for</strong><span id="hauntUptime">0:00:00</span>`;
      inset.appendChild(uptime);
      wrap.appendChild(inset);
      body.appendChild(wrap);
      const tick = setInterval(() => {
        if (!app.el) { clearInterval(tick); return; }
        const ms = Date.now() - state.bootStart;
        const s = Math.floor(ms / 1000);
        const h = Math.floor(s / 3600);
        const m = Math.floor((s % 3600) / 60);
        const ss = s % 60;
        const e = wrap.querySelector('#hauntUptime');
        if (e) e.textContent = `${h}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
      }, 500);
    },
  });

  // ---- Dialog ----
  let dialogIdCounter = 0;
  function openDialog(title, text, glyph) {
    const id = 'dialog_' + (++dialogIdCounter);
    defineApp(id, {
      title,
      icon: '⚠',
      x: 240 + Math.random() * 60,
      y: 140 + Math.random() * 40,
      w: 320, h: 150,
      menu: null,
      build: (body, app) => {
        body.classList.add('window-body');
        body.style.padding = '0';
        const root = document.createElement('div');
        root.className = 'dialog';
        const inner = document.createElement('div');
        inner.className = 'window-body';
        inner.innerHTML = `
          <div class="row">
            <span class="glyph" aria-hidden="true">${glyph || '⚠'}</span>
            <p>${text.replace(/\n/g,'<br>')}</p>
          </div>
          <div class="actions"><button class="ok-btn" type="button">OK</button></div>
        `;
        root.appendChild(inner);
        body.appendChild(root);
        inner.querySelector('.ok-btn').addEventListener('click', () => closeApp(id));
      },
    });
    openApp(id);
    playPop();
  }

  // ---- Desktop icons ----
  const DESK_ICONS = [
    { id: 'mycomputer', glyph: '💾', label: 'My Computer' },
    { id: 'recycle', glyph: '🗑️', label: 'Recycle Bin' },
    { id: 'notepad', glyph: '📄', label: 'README.TXT' },
    { id: 'minesweeper', glyph: '💣', label: 'Minesweeper' },
    { id: 'system', glyph: '🖥️', label: 'System' },
  ];
  DESK_ICONS.forEach(d => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'desk-icon';
    btn.innerHTML = `<span class="glyph" aria-hidden="true">${d.glyph}</span><span class="lbl">${d.label}</span>`;
    let lastClick = 0;
    btn.addEventListener('click', () => {
      document.querySelectorAll('.desk-icon').forEach(x => x.classList.remove('selected'));
      btn.classList.add('selected');
      const now = Date.now();
      if (now - lastClick < 400) {
        openApp(d.id);
      }
      lastClick = now;
    });
    btn.addEventListener('dblclick', () => openApp(d.id));
    desktopIcons.appendChild(btn);
  });
  // Deselect on desktop click
  desktop.addEventListener('pointerdown', (e) => {
    if (e.target === desktop || e.target === desktopIcons) {
      document.querySelectorAll('.desk-icon').forEach(x => x.classList.remove('selected'));
    }
  });

  // ---- Start menu ----
  startBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    const show = !startMenu.classList.contains('show');
    startMenu.classList.toggle('show', show);
    startBtn.classList.toggle('open', show);
    startMenu.setAttribute('aria-hidden', String(!show));
    ensureAudio();
  });
  document.addEventListener('pointerdown', (e) => {
    if (!startMenu.contains(e.target) && !startBtn.contains(e.target)) {
      startMenu.classList.remove('show');
      startBtn.classList.remove('open');
      startMenu.setAttribute('aria-hidden', 'true');
    }
  });
  document.querySelectorAll('.start-item[data-open]').forEach(b => {
    b.addEventListener('click', () => {
      openApp(b.dataset.open);
      startMenu.classList.remove('show');
      startBtn.classList.remove('open');
    });
  });
  exorciseBtn.addEventListener('click', () => {
    state.exorciseUntil = Date.now() + 45000;
    openDialog('Exorcism', 'The haunting has been suspended.\n(45 seconds of relative peace.)', '🕯️');
    startMenu.classList.remove('show');
    startBtn.classList.remove('open');
  });
  shutDownBtn.addEventListener('click', () => {
    triggerBSOD('USER REQUESTED SHUTDOWN.\nThe ghosts decline.');
    startMenu.classList.remove('show');
    startBtn.classList.remove('open');
  });
  soundBtn.addEventListener('click', () => {
    state.soundOn = !state.soundOn;
    soundBtn.textContent = state.soundOn ? '🔊' : '🔇';
    if (state.soundOn) ensureAudio();
  });

  // ---- Hauntings ----
  function isExorcised() { return Date.now() < state.exorciseUntil; }

  function scheduleHauntings() {
    state.nextHauntAt = Date.now() + 6000;
    state.nextGhostAt = Date.now() + 4000;
    state.nextBsodAt = Date.now() + 45000;
    state.nextTypeAt = Date.now() + 10000;
    state.nextClockHauntAt = Date.now() + 25000;
    setInterval(hauntTick, 800);
    playStartup();
  }

  function hauntTick() {
    if (isExorcised()) return;
    const now = Date.now();
    if (now >= state.nextHauntAt) {
      jitterRandomWindow();
      state.nextHauntAt = now + 8000 + Math.random() * 14000;
    }
    if (now >= state.nextGhostAt) {
      spawnGhost();
      state.nextGhostAt = now + 9000 + Math.random() * 12000;
    }
    if (now >= state.nextBsodAt) {
      triggerBSOD();
      state.nextBsodAt = now + 60000 + Math.random() * 40000;
    }
    if (now >= state.nextTypeAt) {
      phantomType();
      state.nextTypeAt = now + 7000 + Math.random() * 10000;
    }
    if (now >= state.nextClockHauntAt) {
      clockHaunted = 3 + Math.floor(Math.random()*3);
      state.nextClockHauntAt = now + 40000 + Math.random() * 30000;
    }
  }

  function jitterRandomWindow() {
    const open = Object.values(state.windows).filter(w => w.open && !w.minimized && w.el);
    if (!open.length) return;
    const w = open[Math.floor(Math.random()*open.length)];
    w.el.classList.add('shake');
    setTimeout(() => w.el && w.el.classList.remove('shake'), 360);
    playWhisper();
    // Also occasionally slide it
    if (Math.random() < 0.4) {
      const dx = (Math.random() - 0.5) * 60;
      const dy = (Math.random() - 0.5) * 40;
      w.x = Math.max(0, w.x + dx);
      w.y = Math.max(0, w.y + dy);
      w.el.style.left = w.x + 'px';
      w.el.style.top = w.y + 'px';
    }
  }

  function spawnGhost() {
    const g = document.createElement('div');
    g.className = 'ghost-drift';
    const glyphs = ['👻', '🕯', '🪦', '💀', '🦇', '🕸'];
    g.textContent = glyphs[Math.floor(Math.random()*glyphs.length)];
    g.style.left = '-3rem';
    g.style.top = (Math.random() * (window.innerHeight - 140) + 60) + 'px';
    document.body.appendChild(g);
    setTimeout(() => g.remove(), 7100);
    playWhisper();
  }

  const GHOST_TEXT_POOL = [
    '\n[help me]',
    '\nwe are still here.',
    '\n13:66:66',
    '\nthe cursor watches.',
    '\ndo NOT close this file.',
    '\ni was here in 1995.',
    '\nERROR: SOUL.DLL not found',
    '\nthey are typing too.',
    '\nsave us. save us. save us.',
    '\nyou are not alone in this window.',
    '\n*tap tap tap*',
    '\nhow did this file get here',
  ];
  function phantomType() {
    const np = state.windows.notepad;
    if (!np || !np.open || !np.notepadEl) return;
    const txt = GHOST_TEXT_POOL[Math.floor(Math.random() * GHOST_TEXT_POOL.length)];
    let i = 0;
    function typeChar() {
      if (i >= txt.length) {
        state.notepadText = np.notepadEl.textContent;
        return;
      }
      const span = document.createElement('span');
      span.className = 'ghost-text';
      span.textContent = txt[i];
      np.notepadEl.appendChild(span);
      np.notepadEl.scrollTop = np.notepadEl.scrollHeight;
      playTap();
      i += 1;
      setTimeout(typeChar, 80 + Math.random() * 80);
    }
    typeChar();
  }

  function triggerBSOD(customMsg) {
    const msg = customMsg || `A ghost has performed an illegal operation
in module GHOST.SYS at 0x6:DEAD.

The current spirit will be lost. Other entities
may also be unstable.

* Press any key to continue (it won't help).`;
    bsod.innerHTML = `<h2>Ghost OS</h2>${msg}\n\nPress any key to continue _`;
    bsod.classList.add('show');
    bsod.setAttribute('aria-hidden', 'false');
    playBsod();
    const dismiss = () => {
      bsod.classList.remove('show');
      bsod.setAttribute('aria-hidden', 'true');
      document.removeEventListener('keydown', dismiss);
      document.removeEventListener('click', dismiss);
    };
    setTimeout(() => {
      document.addEventListener('keydown', dismiss);
      document.addEventListener('click', dismiss);
    }, 400);
    setTimeout(dismiss, 4000);
  }

  // Cursor trail
  let lastTrail = 0;
  document.addEventListener('pointermove', (e) => {
    if (isExorcised()) return;
    const now = Date.now();
    if (now - lastTrail < 80) return;
    lastTrail = now;
    if (Math.random() < 0.18) {
      const t = document.createElement('span');
      t.className = 'trail';
      t.textContent = Math.random() < 0.5 ? '·' : (Math.random() < 0.5 ? '•' : '◦');
      t.style.left = (e.clientX + 6) + 'px';
      t.style.top = (e.clientY + 6) + 'px';
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 720);
    }
  });

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.target.matches('input,textarea,[contenteditable=true]')) return;
    if (e.key === 'Escape') {
      startMenu.classList.remove('show');
      startBtn.classList.remove('open');
    }
  });

  // Open notepad initially after boot
  setTimeout(() => openApp('notepad'), 2300);
})();
</script>
</body>
</html>
