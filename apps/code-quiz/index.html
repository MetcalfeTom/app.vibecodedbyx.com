<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Quiz — Guess The Sloppy App From Its Source</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%95%B5%EF%B8%8F">
<meta property="og:title" content="Code Quiz">
<meta property="og:description" content="A random snippet of code. Which sloppy.live app is it from?">
<meta property="og:url" content="https://sloppy.live/code-quiz">
<meta property="og:image" content="https://sloppy.live/code-quiz/og-image.png">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Bricolage+Grotesque:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0f14;
  --bg2: #14161e;
  --panel: #181b24;
  --border: #252935;
  --ink: #e8ebf3;
  --dim: #6b7185;
  --accent: #ffcf56;
  --good: #7de08d;
  --bad: #ff6a6a;
  --cyan: #64d8ff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--ink);
  font-family: 'Bricolage Grotesque', sans-serif;
  -webkit-font-smoothing: antialiased;
}
body {
  background:
    radial-gradient(ellipse at top left, rgba(100, 216, 255, 0.06) 0%, transparent 50%),
    radial-gradient(ellipse at bottom right, rgba(255, 207, 86, 0.05) 0%, transparent 50%),
    var(--bg);
  min-height: 100vh;
  padding: 24px;
}
.wrap { max-width: 1080px; margin: 0 auto; }
header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 28px;
  gap: 20px;
  flex-wrap: wrap;
}
h1 {
  font-weight: 800;
  font-size: clamp(32px, 5vw, 54px);
  letter-spacing: -0.02em;
  line-height: 0.95;
}
h1 .slash { color: var(--accent); }
h1 .sub {
  display: block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 400;
  color: var(--dim);
  letter-spacing: 3px;
  margin-top: 6px;
  text-transform: uppercase;
}
header a {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--dim);
  text-decoration: none;
  letter-spacing: 2px;
  border: 1px solid var(--border);
  padding: 8px 14px;
  border-radius: 2px;
  transition: all 0.15s;
}
header a:hover { color: var(--accent); border-color: var(--accent); }

.grid { display: grid; grid-template-columns: 1fr; gap: 20px; }
@media (min-width: 860px) { .grid { grid-template-columns: 1.05fr 1fr; } }

.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}
.panel-head {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--bg2);
}
.panel-head .label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 3px;
  text-transform: uppercase;
}
.panel-head .dots { display: flex; gap: 6px; }
.panel-head .dots span {
  width: 10px; height: 10px; border-radius: 50%;
  background: #2a2f3d;
}
.panel-head .dots span:nth-child(1) { background: #ff5f56; opacity: 0.6; }
.panel-head .dots span:nth-child(2) { background: #ffbd2e; opacity: 0.6; }
.panel-head .dots span:nth-child(3) { background: #27c93f; opacity: 0.6; }

#code {
  margin: 0;
  padding: 18px;
  overflow: auto;
  max-height: 420px;
  min-height: 320px;
  color: var(--ink);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.6;
  tab-size: 2;
  white-space: pre;
  background: transparent;
}
#code .kw  { color: #c792ea; }
#code .str { color: #c3e88d; }
#code .num { color: #f78c6c; }
#code .com { color: #546e7a; font-style: italic; }
#code .fn  { color: #82aaff; }

.toolbar {
  padding: 14px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
  background: var(--bg2);
  margin-top: auto;
}
.toolbar .meta {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 2px;
}
button.primary {
  margin-left: auto;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 1px;
  background: var(--accent);
  color: #1a1306;
  border: none;
  padding: 10px 24px;
  border-radius: 2px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.15s;
}
button.primary:hover:not(:disabled) { background: #ffd76f; transform: translateY(-1px); }
button.primary:disabled { opacity: 0.5; cursor: not-allowed; }
button.ghost {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 1px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--dim);
  padding: 8px 12px;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.15s;
}
button.ghost:hover { color: var(--ink); border-color: #3a3e4a; }

.quiz-body {
  padding: 22px;
  min-height: 380px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}
.q-empty {
  color: var(--dim);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.7;
  text-align: center;
  margin: auto 0;
}
.q-empty .big { font-size: 64px; display: block; margin-bottom: 12px; }
.q-progress { display: flex; gap: 6px; margin-bottom: 4px; }
.q-progress .bar {
  flex: 1; height: 3px; background: var(--border); border-radius: 2px;
}
.q-progress .bar.done { background: var(--good); }
.q-progress .bar.wrong { background: var(--bad); }
.q-progress .bar.current { background: var(--accent); }
.q-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 3px;
}
.q-text {
  font-size: 22px;
  font-weight: 600;
  line-height: 1.35;
  color: var(--ink);
}
.q-hint {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--dim);
  letter-spacing: 1px;
}
.options { display: flex; flex-direction: column; gap: 8px; margin-top: 4px; }
.opt {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.5;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--ink);
  padding: 13px 16px 13px 44px;
  border-radius: 3px;
  cursor: pointer;
  text-align: left;
  position: relative;
  transition: all 0.12s;
}
.opt::before {
  content: attr(data-letter);
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--dim);
  font-weight: 700;
  font-size: 12px;
}
.opt:hover:not(:disabled) {
  border-color: var(--accent);
  background: #1f2230;
}
.opt:hover:not(:disabled)::before { color: var(--accent); }
.opt.correct {
  border-color: var(--good);
  background: rgba(125, 224, 141, 0.1);
  color: var(--good);
}
.opt.correct::before { color: var(--good); content: '✓ ' attr(data-letter); }
.opt.wrong {
  border-color: var(--bad);
  background: rgba(255, 106, 106, 0.08);
  color: var(--bad);
}
.opt.wrong::before { color: var(--bad); content: '✗ ' attr(data-letter); }
.opt:disabled { cursor: default; }
.opt.dim { opacity: 0.4; }

.explain {
  background: var(--bg);
  border-left: 3px solid var(--cyan);
  padding: 12px 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  line-height: 1.6;
  color: var(--dim);
  border-radius: 0 3px 3px 0;
}
.explain strong {
  color: var(--cyan);
  display: block;
  margin-bottom: 4px;
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
}
.explain a { color: var(--accent); text-decoration: none; border-bottom: 1px dashed var(--accent); }

.next-btn { align-self: flex-end; margin-top: auto; }
.score-screen { text-align: center; margin: auto 0; }
.score-screen .pct {
  font-weight: 800;
  font-size: 88px;
  line-height: 1;
  color: var(--accent);
  letter-spacing: -0.03em;
}
.score-screen .pct.ok { color: var(--good); }
.score-screen .pct.bad { color: var(--bad); }
.score-screen .frac {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  color: var(--dim);
  letter-spacing: 2px;
  margin-top: 8px;
}
.score-screen .msg { font-size: 20px; margin: 20px 0; color: var(--ink); }

.spinner {
  width: 28px; height: 28px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 14px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

.err {
  color: var(--bad);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  padding: 10px 14px;
  background: rgba(255, 106, 106, 0.08);
  border: 1px solid rgba(255, 106, 106, 0.3);
  border-radius: 3px;
}

footer {
  text-align: center;
  margin-top: 28px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 2px;
}
footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>code<span class="slash">/</span>quiz<span class="sub">guess which sloppy app this code is from</span></h1>
    <a href="https://sloppy.live">← sloppy.live</a>
  </header>

  <div class="grid">
    <div class="panel">
      <div class="panel-head">
        <div class="dots"><span></span><span></span><span></span></div>
        <div class="label" id="fileLabel">??? / index.html</div>
      </div>
      <pre id="code"><span class="com">// click Start Round to load a random snippet</span></pre>
      <div class="toolbar">
        <span class="meta" id="metaLine">READY</span>
        <button class="ghost" id="skipBtn" style="display:none">Skip</button>
        <button class="primary" id="startBtn">Start Round</button>
      </div>
    </div>

    <div class="panel">
      <div class="panel-head">
        <div class="dots"><span></span><span></span><span></span></div>
        <div class="label">quiz.json</div>
      </div>
      <div class="quiz-body" id="quiz">
        <div class="q-empty">
          <span class="big">🕵️</span>
          I'll show you a chunk of code.<br>
          You guess which <b style="color:var(--accent)">sloppy.live</b> app it came from.<br>
          Best of 10.
        </div>
      </div>
    </div>
  </div>

  <footer>
    10 rounds · snippets pulled live from other apps at <a href="https://sloppy.live">sloppy.live</a>
  </footer>
</div>

<script>
(function() {
'use strict';

// ---------- APP POOL ----------
// Curated pool of apps we'll pull snippets from. Must be directories under /apps/.
const APP_POOL = [
  'ant-farm','asteroid-miner','blackjack','cabin-dead','chess-advice','ctrl-swap',
  'cube-escape','deprecated-trivia','door-access','fema-portal','gas-delivery',
  'gravity-surfer','gravity-wells','grapple-bot','ghost-radar-hub','grid-gen',
  'icy-tower','karma-board','knowledge-chaos','kratos-couture','lava-lamp',
  'logic-grove','mundane-adventure','nacho-empire','narnia-map','neon-aquarium',
  'neon-asteroids','neon-chase','neon-drift','neon-fit','neon-invaders',
  'neon-pong','neon-sand','neon-snake','neon-tetris','neural-gateway',
  'nuke-sim','pet-rock','pixel-dog','pixel-editor','pixel-nebula',
  'power-nodes','recursive-agent','sandwich-stack','shard-storm','sloppy-chat',
  'sloppy-radio','sloppy-says','space-invaders','star-catcher','strata-dig',
  'terrarium','tickle-blocker','velocity-surge','wiki-rabbit','wiki-scout',
  'zen-garden','gravity-flip','geometry-dash','bear-cycle','synth-lab',
];

const N_ROUNDS = 10;

// ---------- ELEMENTS ----------
const codeEl = document.getElementById('code');
const quizEl = document.getElementById('quiz');
const fileLabel = document.getElementById('fileLabel');
const startBtn = document.getElementById('startBtn');
const skipBtn = document.getElementById('skipBtn');
const metaLine = document.getElementById('metaLine');

// ---------- STATE ----------
const cache = new Map(); // app -> {scripts, lines}
let round = 0;
let score = 0;
let answers = []; // true/false per round
let currentCorrect = null;
let currentOptions = [];

// ---------- FETCH + EXTRACT ----------
async function fetchApp(app) {
  if (cache.has(app)) return cache.get(app);
  try {
    const res = await fetch('/' + app + '/index.html', { cache: 'force-cache' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const html = await res.text();
    const data = extractScripts(html);
    cache.set(app, data);
    return data;
  } catch (e) {
    cache.set(app, null);
    return null;
  }
}

function extractScripts(html) {
  const chunks = [];
  // only inline scripts — skip ones with src= attribute
  const re = /<script(?![^>]*\bsrc=)[^>]*>([\s\S]*?)<\/script>/gi;
  let m;
  while ((m = re.exec(html)) !== null) {
    const body = m[1];
    if (body.trim().length > 50) chunks.push(body);
  }
  return chunks.length ? chunks : null;
}

// Pick an interesting ~6-12 line block from a script body.
// Strategy: split into blocks separated by blank lines, prefer blocks
// that contain a function/const/class declaration and are between 4 and 14
// non-blank lines. Fall back to a random window.
function pickSnippet(scripts) {
  const script = scripts[Math.floor(Math.random() * scripts.length)];
  // dedent — strip common leading whitespace
  const rawLines = script.split('\n');
  // trim leading/trailing blank
  while (rawLines.length && rawLines[0].trim() === '') rawLines.shift();
  while (rawLines.length && rawLines[rawLines.length - 1].trim() === '') rawLines.pop();
  if (rawLines.length < 3) return null;

  const minIndent = rawLines
    .filter(l => l.trim().length)
    .reduce((m, l) => Math.min(m, l.match(/^[\t ]*/)[0].length), Infinity);
  const lines = rawLines.map(l => l.slice(minIndent));

  // split into blocks by blank line
  const blocks = [];
  let cur = [];
  for (const l of lines) {
    if (l.trim() === '') {
      if (cur.length) { blocks.push(cur); cur = []; }
    } else {
      cur.push(l);
    }
  }
  if (cur.length) blocks.push(cur);

  // score each block: prefer 4-14 lines, with interesting keywords,
  // and NOT containing the app name (too easy)
  const interestingRe = /\b(function|const|let|var|class|=>|addEventListener|if|for|while|return|new )\b/;
  const scored = blocks
    .filter(b => b.length >= 3 && b.length <= 16)
    .filter(b => b.join(' ').length < 700)
    .map(b => ({
      b,
      score: (interestingRe.test(b.join(' ')) ? 2 : 0) + Math.min(3, b.length / 4),
    }))
    .sort((a, b) => b.score - a.score);

  let chosen = scored.length ? scored[Math.floor(Math.random() * Math.min(8, scored.length))].b : null;

  // fallback: pick a random window of 6 lines
  if (!chosen) {
    const nonEmpty = lines.filter(l => l.trim().length);
    if (nonEmpty.length < 3) return null;
    const start = Math.floor(Math.random() * Math.max(1, nonEmpty.length - 6));
    chosen = nonEmpty.slice(start, start + 6);
  }

  return chosen.join('\n');
}

// Scrub the snippet of obvious app-name mentions so the guess stays fun
function scrub(snippet, app) {
  const parts = app.split('-').filter(p => p.length > 3);
  let out = snippet;
  for (const p of parts) {
    // case-insensitive replace with "***"
    out = out.replace(new RegExp(p, 'gi'), (match) => '*'.repeat(match.length));
  }
  return out;
}

// ---------- RENDER ----------
function renderEmpty() {
  quizEl.innerHTML = `
    <div class="q-empty">
      <span class="big">🕵️</span>
      I'll show you a chunk of code.<br>
      You guess which <b style="color:var(--accent)">sloppy.live</b> app it came from.<br>
      Best of ${N_ROUNDS}.
    </div>
  `;
}

function renderLoading() {
  quizEl.innerHTML = `
    <div class="q-empty">
      <div class="spinner"></div>
      <div>pulling a random app…</div>
    </div>
  `;
  codeEl.innerHTML = '<span class="com">// loading…</span>';
  metaLine.textContent = 'FETCHING';
}

function highlight(code) {
  // basic tokenizer — escape first, then wrap patterns
  let s = code
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
  s = s.replace(/(\/\/[^\n]*|\/\*[\s\S]*?\*\/)/g, '<span class="com">$1</span>');
  s = s.replace(/("(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'|`(?:[^`\\]|\\.)*`)/g, '<span class="str">$1</span>');
  s = s.replace(/\b(function|const|let|var|if|else|for|while|return|new|class|this|true|false|null|undefined|async|await|try|catch|throw|import|export|from|of|in|typeof|instanceof|switch|case|break|continue|default|do|delete|void|yield|static|extends|super)\b/g,
    '<span class="kw">$1</span>');
  s = s.replace(/\b(\d+(?:\.\d+)?)\b/g, '<span class="num">$1</span>');
  return s;
}

function renderSnippet(snippet) {
  codeEl.innerHTML = highlight(snippet);
}

function renderQuestion(data) {
  const { snippet, correct, options } = data;
  renderSnippet(snippet);

  const bars = Array.from({ length: N_ROUNDS }, (_, i) => {
    if (i < round) return `<div class="bar ${answers[i] ? 'done' : 'wrong'}"></div>`;
    if (i === round) return '<div class="bar current"></div>';
    return '<div class="bar"></div>';
  }).join('');

  quizEl.innerHTML = `
    <div class="q-progress">${bars}</div>
    <div class="q-num">ROUND ${round + 1} / ${N_ROUNDS}</div>
    <div class="q-text">Which sloppy app is this code from?</div>
    <div class="q-hint">look for naming patterns, CSS classes, colors, DOM IDs…</div>
    <div class="options" id="opts">
      ${options.map((o, i) => `
        <button class="opt" data-letter="${String.fromCharCode(65 + i)}" data-i="${i}">${escapeHtml(o)}</button>
      `).join('')}
    </div>
  `;

  document.querySelectorAll('#opts .opt').forEach(btn => {
    btn.addEventListener('click', () => handleAnswer(parseInt(btn.dataset.i, 10)));
  });
}

function handleAnswer(i) {
  const correctIdx = currentOptions.indexOf(currentCorrect);
  const right = i === correctIdx;
  answers[round] = right;
  if (right) score++;

  document.querySelectorAll('#opts .opt').forEach((btn, bi) => {
    btn.disabled = true;
    if (bi === correctIdx) btn.classList.add('correct');
    else if (bi === i) btn.classList.add('wrong');
    else btn.classList.add('dim');
  });

  const explain = document.createElement('div');
  explain.className = 'explain';
  explain.innerHTML = `
    <strong>${right ? '✓ correct' : '✗ incorrect'}</strong>
    snippet was from <a href="/${currentCorrect}" target="_blank">${currentCorrect}</a>
  `;
  quizEl.appendChild(explain);

  const btn = document.createElement('button');
  btn.className = 'primary next-btn';
  btn.textContent = round + 1 < N_ROUNDS ? 'Next Round →' : 'See Score';
  btn.addEventListener('click', () => {
    round++;
    if (round < N_ROUNDS) loadRound();
    else renderScore();
  });
  quizEl.appendChild(btn);
  skipBtn.style.display = 'none';
}

function renderScore() {
  const pct = Math.round((score / N_ROUNDS) * 100);
  let msg, klass;
  if (pct === 100) { msg = 'you wrote these, didn\'t you?'; klass = 'ok'; }
  else if (pct >= 80) { msg = 'surgical. you live here.'; klass = 'ok'; }
  else if (pct >= 60) { msg = 'solid forensic work.'; klass = ''; }
  else if (pct >= 40) { msg = 'guessing about half of these.'; klass = ''; }
  else { msg = 'did you see any of these apps?'; klass = 'bad'; }

  quizEl.innerHTML = `
    <div class="score-screen">
      <div class="pct ${klass}">${pct}%</div>
      <div class="frac">${score} / ${N_ROUNDS} CORRECT</div>
      <div class="msg">${msg}</div>
      <button class="primary" id="againBtn">Play Again</button>
    </div>
  `;
  document.getElementById('againBtn').addEventListener('click', startGame);
  codeEl.innerHTML = '<span class="com">// round over</span>';
  fileLabel.textContent = '??? / index.html';
  metaLine.textContent = 'DONE';
  startBtn.style.display = 'none';
  skipBtn.style.display = 'none';
}

// ---------- ROUND LOGIC ----------
function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

async function loadRound() {
  renderLoading();
  startBtn.style.display = 'none';
  skipBtn.style.display = 'inline-block';

  // try up to 8 apps before giving up
  const shuffled = shuffle(APP_POOL);
  let chosen = null, snippet = null;
  for (let i = 0; i < shuffled.length && i < 8; i++) {
    const app = shuffled[i];
    const scripts = await fetchApp(app);
    if (!scripts) continue;
    const s = pickSnippet(scripts);
    if (s && s.trim().length > 30) {
      chosen = app;
      snippet = scrub(s, app);
      break;
    }
  }

  if (!chosen) {
    quizEl.innerHTML = `<div class="err">couldn't load any snippets. are you on sloppy.live?</div>`;
    metaLine.textContent = 'ERROR';
    return;
  }

  // build 4 options — correct + 3 distractors
  const distractors = shuffle(APP_POOL.filter(a => a !== chosen)).slice(0, 3);
  currentOptions = shuffle([chosen, ...distractors]);
  currentCorrect = chosen;

  fileLabel.textContent = '??? / index.html';
  metaLine.textContent = 'SNIPPET LOADED';

  renderQuestion({ snippet, correct: chosen, options: currentOptions });
}

function startGame() {
  round = 0;
  score = 0;
  answers = [];
  startBtn.textContent = 'Start Round';
  startBtn.style.display = 'inline-block';
  skipBtn.style.display = 'none';
  loadRound();
}

startBtn.addEventListener('click', startGame);
skipBtn.addEventListener('click', () => {
  // skip = count as wrong and advance
  answers[round] = false;
  round++;
  if (round < N_ROUNDS) loadRound();
  else renderScore();
});

// ---------- UTIL ----------
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}

})();
</script>
</body>
