<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Code Quiz — Test Your Code Knowledge</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%A7%AA">
<meta property="og:title" content="Code Quiz">
<meta property="og:description" content="Paste any code. Get a multiple-choice quiz on what it does.">
<meta property="og:url" content="https://sloppy.live/code-quiz">
<meta property="og:image" content="https://sloppy.live/code-quiz/og-image.png">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;700&family=Bricolage+Grotesque:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0f14;
  --bg2: #14161e;
  --panel: #181b24;
  --border: #252935;
  --ink: #e8ebf3;
  --dim: #6b7185;
  --accent: #ffcf56;
  --good: #7de08d;
  --bad: #ff6a6a;
  --cyan: #64d8ff;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--ink);
  font-family: 'Bricolage Grotesque', sans-serif;
  -webkit-font-smoothing: antialiased;
}
body {
  background:
    radial-gradient(ellipse at top left, rgba(100, 216, 255, 0.06) 0%, transparent 50%),
    radial-gradient(ellipse at bottom right, rgba(255, 207, 86, 0.05) 0%, transparent 50%),
    var(--bg);
  min-height: 100vh;
  padding: 24px;
}
.wrap {
  max-width: 1080px;
  margin: 0 auto;
}
header {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  margin-bottom: 28px;
  gap: 20px;
  flex-wrap: wrap;
}
h1 {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 800;
  font-size: clamp(32px, 5vw, 54px);
  letter-spacing: -0.02em;
  line-height: 0.95;
}
h1 .slash { color: var(--accent); }
h1 .sub {
  display: block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  font-weight: 400;
  color: var(--dim);
  letter-spacing: 3px;
  margin-top: 6px;
  text-transform: uppercase;
}
header a {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--dim);
  text-decoration: none;
  letter-spacing: 2px;
  border: 1px solid var(--border);
  padding: 8px 14px;
  border-radius: 2px;
  transition: all 0.15s;
}
header a:hover { color: var(--accent); border-color: var(--accent); }

.grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 20px;
}
@media (min-width: 860px) {
  .grid { grid-template-columns: 1.05fr 1fr; }
}

.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 4px;
  overflow: hidden;
}
.panel-head {
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: var(--bg2);
}
.panel-head .label {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 3px;
  text-transform: uppercase;
}
.panel-head .dots {
  display: flex;
  gap: 6px;
}
.panel-head .dots span {
  width: 10px; height: 10px; border-radius: 50%;
  background: #2a2f3d;
}
.panel-head .dots span:nth-child(1) { background: #ff5f56; opacity: 0.6; }
.panel-head .dots span:nth-child(2) { background: #ffbd2e; opacity: 0.6; }
.panel-head .dots span:nth-child(3) { background: #27c93f; opacity: 0.6; }

#code {
  width: 100%;
  min-height: 320px;
  background: transparent;
  border: none;
  outline: none;
  color: var(--ink);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.6;
  padding: 18px;
  resize: vertical;
  tab-size: 2;
}
#code::placeholder { color: #3a3e4a; font-style: italic; }

.toolbar {
  padding: 14px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  gap: 10px;
  align-items: center;
  flex-wrap: wrap;
  background: var(--bg2);
}
select, button.ghost {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  letter-spacing: 1px;
  background: transparent;
  border: 1px solid var(--border);
  color: var(--dim);
  padding: 8px 12px;
  border-radius: 2px;
  cursor: pointer;
  transition: all 0.15s;
}
select:hover, button.ghost:hover { color: var(--ink); border-color: #3a3e4a; }
button.primary {
  margin-left: auto;
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 700;
  font-size: 14px;
  letter-spacing: 1px;
  background: var(--accent);
  color: #1a1306;
  border: none;
  padding: 10px 24px;
  border-radius: 2px;
  cursor: pointer;
  text-transform: uppercase;
  transition: all 0.15s;
}
button.primary:hover { background: #ffd76f; transform: translateY(-1px); }
button.primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

.quiz-body {
  padding: 22px;
  min-height: 380px;
  display: flex;
  flex-direction: column;
  gap: 18px;
}
.q-empty {
  color: var(--dim);
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.7;
  text-align: center;
  margin: auto 0;
}
.q-empty .big { font-size: 64px; display: block; margin-bottom: 12px; }
.q-progress {
  display: flex;
  gap: 6px;
  margin-bottom: 4px;
}
.q-progress .bar {
  flex: 1; height: 3px; background: var(--border); border-radius: 2px;
}
.q-progress .bar.done { background: var(--good); }
.q-progress .bar.wrong { background: var(--bad); }
.q-progress .bar.current { background: var(--accent); }
.q-num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 3px;
}
.q-text {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 22px;
  font-weight: 600;
  line-height: 1.35;
  color: var(--ink);
}
.q-text code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.85em;
  background: var(--bg);
  padding: 2px 6px;
  border-radius: 3px;
  border: 1px solid var(--border);
  color: var(--cyan);
}
.options {
  display: flex;
  flex-direction: column;
  gap: 8px;
  margin-top: 4px;
}
.opt {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  line-height: 1.5;
  background: var(--bg);
  border: 1px solid var(--border);
  color: var(--ink);
  padding: 13px 16px 13px 44px;
  border-radius: 3px;
  cursor: pointer;
  text-align: left;
  position: relative;
  transition: all 0.12s;
}
.opt::before {
  content: attr(data-letter);
  position: absolute;
  left: 14px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--dim);
  font-weight: 700;
  font-size: 12px;
}
.opt:hover:not(:disabled) {
  border-color: var(--accent);
  background: #1f2230;
}
.opt:hover:not(:disabled)::before { color: var(--accent); }
.opt.correct {
  border-color: var(--good);
  background: rgba(125, 224, 141, 0.1);
  color: var(--good);
}
.opt.correct::before { color: var(--good); content: '✓ ' attr(data-letter); }
.opt.wrong {
  border-color: var(--bad);
  background: rgba(255, 106, 106, 0.08);
  color: var(--bad);
}
.opt.wrong::before { color: var(--bad); content: '✗ ' attr(data-letter); }
.opt:disabled { cursor: default; }
.opt.dim { opacity: 0.4; }

.explain {
  background: var(--bg);
  border-left: 3px solid var(--cyan);
  padding: 12px 16px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  line-height: 1.6;
  color: var(--dim);
  border-radius: 0 3px 3px 0;
}
.explain strong { color: var(--cyan); display: block; margin-bottom: 4px; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; }

.next-btn {
  align-self: flex-end;
  margin-top: auto;
}
.score-screen {
  text-align: center;
  margin: auto 0;
}
.score-screen .pct {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-weight: 800;
  font-size: 88px;
  line-height: 1;
  color: var(--accent);
  letter-spacing: -0.03em;
}
.score-screen .pct.ok { color: var(--good); }
.score-screen .pct.bad { color: var(--bad); }
.score-screen .frac {
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  color: var(--dim);
  letter-spacing: 2px;
  margin-top: 8px;
}
.score-screen .msg {
  font-family: 'Bricolage Grotesque', sans-serif;
  font-size: 20px;
  margin: 20px 0;
  color: var(--ink);
}

.spinner {
  width: 28px; height: 28px;
  border: 3px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 14px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

.err {
  color: var(--bad);
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  padding: 10px 14px;
  background: rgba(255, 106, 106, 0.08);
  border: 1px solid rgba(255, 106, 106, 0.3);
  border-radius: 3px;
}

footer {
  text-align: center;
  margin-top: 28px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 2px;
}
footer a { color: var(--accent); text-decoration: none; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>code<span class="slash">/</span>quiz<span class="sub">paste code · answer questions · learn</span></h1>
    <a href="https://sloppy.live">← sloppy.live</a>
  </header>

  <div class="grid">
    <!-- CODE PANEL -->
    <div class="panel">
      <div class="panel-head">
        <div class="dots"><span></span><span></span><span></span></div>
        <div class="label" id="fileLabel">snippet.js</div>
      </div>
      <textarea id="code" spellcheck="false" placeholder="// paste your code here...
function fibonacci(n) {
  if (n < 2) return n;
  return fibonacci(n - 1) + fibonacci(n - 2);
}"></textarea>
      <div class="toolbar">
        <select id="lang">
          <option value="auto">auto-detect</option>
          <option value="javascript">javascript</option>
          <option value="python">python</option>
          <option value="typescript">typescript</option>
          <option value="go">go</option>
          <option value="rust">rust</option>
          <option value="c">c</option>
          <option value="cpp">c++</option>
          <option value="java">java</option>
          <option value="ruby">ruby</option>
          <option value="php">php</option>
          <option value="swift">swift</option>
          <option value="sql">sql</option>
          <option value="bash">bash</option>
          <option value="html">html</option>
          <option value="css">css</option>
        </select>
        <select id="level">
          <option value="beginner">beginner</option>
          <option value="intermediate" selected>intermediate</option>
          <option value="advanced">advanced</option>
        </select>
        <select id="count">
          <option value="3">3 questions</option>
          <option value="5" selected>5 questions</option>
          <option value="8">8 questions</option>
        </select>
        <button class="primary" id="genBtn">Generate Quiz</button>
      </div>
    </div>

    <!-- QUIZ PANEL -->
    <div class="panel">
      <div class="panel-head">
        <div class="dots"><span></span><span></span><span></span></div>
        <div class="label" id="quizLabel">quiz.json</div>
      </div>
      <div class="quiz-body" id="quiz">
        <div class="q-empty">
          <span class="big">🧪</span>
          Drop a snippet on the left.<br>
          Click <b style="color:var(--accent)">Generate Quiz</b>.<br>
          We'll ask you about it.
        </div>
      </div>
    </div>
  </div>

  <footer>
    built on a livestream at <a href="https://sloppy.live">sloppy.live</a> · powered by pollinations.ai
  </footer>
</div>

<script>
(function() {
'use strict';

const codeEl = document.getElementById('code');
const genBtn = document.getElementById('genBtn');
const quizEl = document.getElementById('quiz');
const langSel = document.getElementById('lang');
const levelSel = document.getElementById('level');
const countSel = document.getElementById('count');
const fileLabel = document.getElementById('fileLabel');

// sample code for demo
const SAMPLES = {
  js: `function fibonacci(n) {
  if (n < 2) return n;
  return fibonacci(n - 1) + fibonacci(n - 2);
}`,
};

let quiz = null; // { questions: [...] }
let qIdx = 0;
let answers = [];

// label updater
const EXT = {
  javascript:'js', typescript:'ts', python:'py', go:'go', rust:'rs',
  c:'c', cpp:'cpp', java:'java', ruby:'rb', php:'php', swift:'swift',
  sql:'sql', bash:'sh', html:'html', css:'css', auto:'txt'
};
function updateLabel() {
  const l = langSel.value;
  fileLabel.textContent = 'snippet.' + (EXT[l] || 'txt');
}
langSel.addEventListener('change', updateLabel);
updateLabel();

// ---------- GENERATE ----------
genBtn.addEventListener('click', async () => {
  const code = codeEl.value.trim();
  if (!code) { showError('paste some code first.'); return; }
  if (code.length > 6000) { showError('snippet too long — keep it under 6000 chars.'); return; }

  const lang = langSel.value === 'auto' ? '' : langSel.value;
  const level = levelSel.value;
  const n = parseInt(countSel.value, 10);

  setLoading();
  genBtn.disabled = true;

  try {
    const data = await generateQuiz(code, lang, level, n);
    if (!data || !Array.isArray(data.questions) || data.questions.length === 0) {
      throw new Error('no questions returned');
    }
    quiz = data;
    qIdx = 0;
    answers = [];
    renderQuestion();
  } catch (e) {
    showError('generation failed: ' + (e.message || e));
  } finally {
    genBtn.disabled = false;
  }
});

async function generateQuiz(code, lang, level, n) {
  const sys = 'You are an expert programming instructor. You write precise, unambiguous multiple-choice questions that test real understanding of code. You ONLY output valid JSON — no prose, no markdown, no code fences.';

  const user = `Given the following ${lang || 'code'} snippet, write exactly ${n} multiple-choice quiz questions at ${level} level.

Rules:
- Each question has EXACTLY 4 options and EXACTLY one correct answer.
- Questions should test: what the code does, what it outputs, edge cases, bugs, time/space complexity, language-specific gotchas.
- Distractors should be plausible but clearly wrong on reflection.
- Keep question text under 180 chars, options under 120 chars each.
- Provide a 1-2 sentence explanation of the correct answer.
- Return ONLY a JSON object with this exact schema (no markdown fences):

{"questions":[{"q":"question text","options":["option A","option B","option C","option D"],"correct":0,"explain":"why the correct answer is right"}]}

CODE:
\`\`\`
${code}
\`\`\``;

  // NOTE: do NOT send response_format or referrer in the body — those push the
  // request into the deprecated authenticated path. Anonymous requests work fine.
  const res = await fetch('https://text.pollinations.ai/openai', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      model: 'openai',
      messages: [
        { role: 'system', content: sys },
        { role: 'user', content: user },
      ],
    }),
  });

  if (!res.ok) throw new Error('api ' + res.status);

  // the response is an OpenAI-shape object
  let body;
  try { body = await res.json(); }
  catch (e) { throw new Error('api returned non-JSON envelope'); }

  const msg = body && body.choices && body.choices[0] && body.choices[0].message;
  let text = (msg && msg.content) || '';
  if (!text && msg && typeof msg.reasoning_content === 'string') text = msg.reasoning_content;
  if (!text) throw new Error('empty response from model');

  const parsed = extractJson(text);
  if (!parsed) throw new Error('could not parse JSON from model response');

  // normalize shape — accept {questions:[...]}, {quiz:[...]}, or bare array
  let questions = null;
  if (Array.isArray(parsed)) questions = parsed;
  else if (Array.isArray(parsed.questions)) questions = parsed.questions;
  else if (Array.isArray(parsed.quiz)) questions = parsed.quiz;
  else if (Array.isArray(parsed.items)) questions = parsed.items;
  if (!questions) throw new Error('response JSON had no questions array');

  // normalize each question — accept variants (answer/correctIndex/etc)
  const clean = [];
  for (const raw of questions) {
    if (!raw || typeof raw !== 'object') continue;
    const q = raw.q || raw.question || raw.prompt || raw.text;
    const options = raw.options || raw.choices || raw.answers;
    let correct = raw.correct;
    if (typeof correct !== 'number') correct = raw.correctIndex;
    if (typeof correct !== 'number') correct = raw.answer;
    // support letter form "A"/"B"/...
    if (typeof correct === 'string') {
      const letter = correct.trim().toUpperCase().charCodeAt(0) - 65;
      if (letter >= 0 && letter < 4) correct = letter;
    }
    const explain = raw.explain || raw.explanation || raw.reason || '';
    if (typeof q !== 'string') continue;
    if (!Array.isArray(options) || options.length !== 4) continue;
    if (typeof correct !== 'number' || correct < 0 || correct > 3) continue;
    if (!options.every(o => typeof o === 'string')) continue;
    clean.push({ q, options, correct, explain: String(explain) });
  }
  if (clean.length === 0) throw new Error('no well-formed questions in response');
  return { questions: clean };
}

// Robust JSON extractor — strips markdown fences, then scans for the first
// balanced {...} or [...] block and parses it. Handles models that leak prose.
function extractJson(text) {
  let t = String(text).trim();
  // strip markdown fences ```json ... ``` or ``` ... ```
  const fence = t.match(/```(?:json)?\s*([\s\S]*?)```/);
  if (fence) t = fence[1].trim();

  // try direct parse first
  try { return JSON.parse(t); } catch (_) {}

  // scan for first { or [ and try to find the matching close
  for (let start = 0; start < t.length; start++) {
    const ch = t[start];
    if (ch !== '{' && ch !== '[') continue;
    const open = ch, close = ch === '{' ? '}' : ']';
    let depth = 0, inStr = false, esc = false;
    for (let i = start; i < t.length; i++) {
      const c = t[i];
      if (inStr) {
        if (esc) { esc = false; continue; }
        if (c === '\\') { esc = true; continue; }
        if (c === '"') inStr = false;
        continue;
      }
      if (c === '"') { inStr = true; continue; }
      if (c === open) depth++;
      else if (c === close) {
        depth--;
        if (depth === 0) {
          const candidate = t.slice(start, i + 1);
          try { return JSON.parse(candidate); } catch (_) { break; }
        }
      }
    }
  }
  return null;
}

// ---------- RENDER ----------
function setLoading() {
  quizEl.innerHTML = `
    <div class="q-empty" style="margin:auto">
      <div class="spinner"></div>
      <div>asking the oracle…</div>
    </div>
  `;
}

function showError(msg) {
  quizEl.innerHTML = `
    <div class="q-empty" style="margin:auto">
      <div class="err">${escapeHtml(msg)}</div>
    </div>
  `;
}

function renderQuestion() {
  const q = quiz.questions[qIdx];
  const total = quiz.questions.length;

  const bars = quiz.questions.map((_, i) => {
    if (i < qIdx) return `<div class="bar ${answers[i] === quiz.questions[i].correct ? 'done' : 'wrong'}"></div>`;
    if (i === qIdx) return '<div class="bar current"></div>';
    return '<div class="bar"></div>';
  }).join('');

  quizEl.innerHTML = `
    <div class="q-progress">${bars}</div>
    <div class="q-num">QUESTION ${qIdx + 1} / ${total}</div>
    <div class="q-text">${formatText(q.q)}</div>
    <div class="options" id="opts">
      ${q.options.map((o, i) => `
        <button class="opt" data-letter="${String.fromCharCode(65 + i)}" data-i="${i}">${escapeHtml(o)}</button>
      `).join('')}
    </div>
  `;

  document.querySelectorAll('#opts .opt').forEach(btn => {
    btn.addEventListener('click', () => handleAnswer(parseInt(btn.dataset.i, 10)));
  });
}

function handleAnswer(i) {
  const q = quiz.questions[qIdx];
  answers[qIdx] = i;
  const buttons = document.querySelectorAll('#opts .opt');
  buttons.forEach((btn, bi) => {
    btn.disabled = true;
    if (bi === q.correct) btn.classList.add('correct');
    else if (bi === i) btn.classList.add('wrong');
    else btn.classList.add('dim');
  });

  // explanation
  const explain = document.createElement('div');
  explain.className = 'explain';
  explain.innerHTML = `<strong>${i === q.correct ? '✓ correct' : '✗ incorrect'}</strong>${escapeHtml(q.explain || '')}`;
  quizEl.appendChild(explain);

  // next button
  const btn = document.createElement('button');
  btn.className = 'primary next-btn';
  btn.textContent = qIdx + 1 < quiz.questions.length ? 'Next →' : 'See Score';
  btn.addEventListener('click', () => {
    qIdx++;
    if (qIdx < quiz.questions.length) renderQuestion();
    else renderScore();
  });
  quizEl.appendChild(btn);
}

function renderScore() {
  const total = quiz.questions.length;
  const right = answers.reduce((s, a, i) => s + (a === quiz.questions[i].correct ? 1 : 0), 0);
  const pct = Math.round((right / total) * 100);
  let msg, klass;
  if (pct === 100) { msg = 'flawless. you read code for fun.'; klass = 'ok'; }
  else if (pct >= 80) { msg = 'strong grasp. tiny gap to close.'; klass = 'ok'; }
  else if (pct >= 60) { msg = 'decent. re-read the snippet.'; klass = ''; }
  else if (pct >= 40) { msg = 'shaky. open the docs.'; klass = 'bad'; }
  else { msg = 'rough. try a simpler snippet.'; klass = 'bad'; }

  quizEl.innerHTML = `
    <div class="score-screen">
      <div class="pct ${klass}">${pct}%</div>
      <div class="frac">${right} / ${total} CORRECT</div>
      <div class="msg">${msg}</div>
      <button class="primary" id="againBtn">Try Another Snippet</button>
    </div>
  `;
  document.getElementById('againBtn').addEventListener('click', () => {
    quizEl.innerHTML = `
      <div class="q-empty">
        <span class="big">🧪</span>
        Edit the code and generate again.
      </div>
    `;
  });
}

// ---------- UTIL ----------
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
  }[c]));
}
// format question text — wrap `backtick code` in <code>
function formatText(s) {
  return escapeHtml(s).replace(/`([^`]+)`/g, '<code>$1</code>');
}

})();
</script>
