<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ki Fighters</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%94%B6">
<meta name="description" content="Pixel-style anime fighter. Fly, punch, charge ki, and blast your rival out of the sky.">
<meta property="og:title" content="Ki Fighters">
<meta property="og:description" content="Pixel-style anime fighter. Fly, punch, charge ki, and blast your rival out of the sky.">
<meta property="og:url" content="https://sloppy.live/ki-fighters">
<meta property="og:image" content="https://sloppy.live/ki-fighters/og-image.png">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #ff8820;
    --gold: #ffd84a;
    --blue: #3fa9ff;
    --red: #ff3a4a;
    --ink: #fff8e2;
    --bg: #0a0512;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'VT323', monospace;
    height: 100%;
    overflow: hidden;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    box-shadow: 0 0 60px rgba(255, 136, 32, 0.25);
    border: 2px solid #2a1a10;
    max-width: 100vw;
    max-height: 92vh;
  }
  #title {
    position: fixed;
    top: 10px;
    left: 0; right: 0;
    text-align: center;
    font-family: 'Press Start 2P', monospace;
    font-size: 18px;
    color: var(--gold);
    text-shadow: 3px 3px 0 #a8400a, 6px 6px 0 rgba(0,0,0,0.4);
    letter-spacing: 2px;
    z-index: 20;
    pointer-events: none;
  }
  #hint {
    position: fixed;
    bottom: 10px;
    left: 0; right: 0;
    text-align: center;
    font-size: 18px;
    color: #ffaa44;
    letter-spacing: 2px;
    z-index: 10;
    pointer-events: none;
  }
  #backlink {
    position: fixed;
    top: 12px;
    right: 14px;
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: #ff8820;
    text-decoration: none;
    letter-spacing: 1px;
    z-index: 30;
    background: rgba(0,0,0,0.5);
    padding: 6px 10px;
    border: 1px solid var(--orange);
  }
  #backlink:hover { background: var(--orange); color: #000; }
  #mobileControls {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    display: none;
    justify-content: space-between;
    padding: 14px;
    z-index: 40;
    pointer-events: none;
  }
  #mobileControls .cluster { display: flex; flex-direction: column; gap: 6px; pointer-events: auto; }
  #mobileControls .row { display: flex; gap: 6px; }
  #mobileControls button {
    width: 54px; height: 54px;
    background: rgba(255, 136, 32, 0.2);
    border: 2px solid var(--orange);
    color: var(--ink);
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    border-radius: 50%;
    touch-action: none;
  }
  #mobileControls button:active { background: var(--orange); color: #000; }
  @media (max-width: 800px) {
    #mobileControls { display: flex; }
    #title { font-size: 12px; }
    #hint { display: none; }
  }
</style>
</head>
<body>
<div id="title">KI  FIGHTERS</div>
<canvas id="c" width="480" height="270"></canvas>
<div id="hint">← → ↑ ↓ fly · Z punch · X blast · C charge · SHIFT dash</div>
<a id="backlink" href="https://sloppy.live">← sloppy.live</a>
<div id="mobileControls">
  <div class="cluster">
    <div class="row"><button data-key="ArrowUp">↑</button></div>
    <div class="row">
      <button data-key="ArrowLeft">←</button>
      <button data-key="ArrowDown">↓</button>
      <button data-key="ArrowRight">→</button>
    </div>
  </div>
  <div class="cluster">
    <div class="row">
      <button data-key="c">C</button>
      <button data-key="Shift">DASH</button>
    </div>
    <div class="row">
      <button data-key="z">Z</button>
      <button data-key="x">X</button>
    </div>
  </div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const W = canvas.width;
const H = canvas.height;
const GROUND_Y = 230;

function resizeCanvas() {
  const scale = Math.min(window.innerWidth / W, (window.innerHeight - 60) / H);
  canvas.style.width = (W * scale | 0) + 'px';
  canvas.style.height = (H * scale | 0) + 'px';
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// ---------- INPUT ----------
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  keys[e.key.toLowerCase()] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup', e => {
  keys[e.key] = false;
  keys[e.key.toLowerCase()] = false;
});
document.querySelectorAll('#mobileControls button').forEach(b => {
  const k = b.dataset.key;
  const down = e => { e.preventDefault(); keys[k] = true; keys[k.toLowerCase()] = true; };
  const up   = e => { e.preventDefault(); keys[k] = false; keys[k.toLowerCase()] = false; };
  b.addEventListener('touchstart', down, { passive: false });
  b.addEventListener('touchend', up);
  b.addEventListener('touchcancel', up);
  b.addEventListener('mousedown', down);
  b.addEventListener('mouseup', up);
  b.addEventListener('mouseleave', up);
});

// ---------- ENTITIES ----------
function makeFighter(x, color, accent, hairColor, isAI) {
  return {
    x, y: GROUND_Y - 40,
    vx: 0, vy: 0,
    w: 18, h: 32,
    dir: isAI ? -1 : 1,
    color, accent, hairColor,
    hp: 100, maxHp: 100,
    ki: 50, maxKi: 100,
    isAI,
    state: 'idle', // idle, fly, punch, blast, charge, hurt, dash
    stateTime: 0,
    punchCd: 0,
    blastCd: 0,
    dashCd: 0,
    hurtTime: 0,
    aura: 0,
    flashing: 0
  };
}

const player = makeFighter(100, '#ff8820', '#ffd84a', '#1a1a1a', false);
const enemy = makeFighter(380, '#8a3aff', '#c06aff', '#e8e8e8', true);

const projectiles = [];
const particles = [];
let gameState = 'playing'; // playing, won, lost
let announceText = '';
let announceTimer = 0;

function addParticle(x, y, color, life, vx, vy, size) {
  particles.push({ x, y, color, life, maxLife: life, vx, vy, size });
}

function fireBlast(f) {
  if (f.ki < 25 || f.blastCd > 0) return;
  f.ki -= 25;
  f.blastCd = 35;
  f.state = 'blast';
  f.stateTime = 14;
  projectiles.push({
    x: f.x + f.dir * 16,
    y: f.y - 6,
    vx: f.dir * 5.5,
    vy: 0,
    owner: f,
    size: 6,
    life: 90,
    power: 18,
    t: 0
  });
  for (let i = 0; i < 10; i++) {
    addParticle(f.x + f.dir*14, f.y - 6, '#ffd84a',
      18, f.dir * (Math.random()*-1.5), (Math.random()-0.5)*2, 2);
  }
}

function punch(f, other) {
  if (f.punchCd > 0) return;
  f.punchCd = 18;
  f.state = 'punch';
  f.stateTime = 10;
  const dx = other.x - f.x;
  const dy = other.y - f.y;
  if (Math.abs(dx) < 26 && Math.abs(dy) < 26 && Math.sign(dx) === f.dir) {
    other.hp -= 6;
    other.vx += f.dir * 3;
    other.vy -= 2;
    other.hurtTime = 12;
    other.flashing = 6;
    f.ki = Math.min(f.maxKi, f.ki + 4);
    for (let i = 0; i < 8; i++) {
      addParticle(other.x, other.y - 8, '#ffffff', 14,
        (Math.random()-0.5)*3, (Math.random()-0.5)*3, 2);
    }
  }
}

function dash(f) {
  if (f.dashCd > 0 || f.ki < 10) return;
  f.dashCd = 40;
  f.ki -= 10;
  const dy = (keys['ArrowDown']||keys['s']) ? 1 : (keys['ArrowUp']||keys['w']) ? -1 : 0;
  const dx = (keys['ArrowLeft']||keys['a']) ? -1 : (keys['ArrowRight']||keys['d']) ? 1 : f.dir;
  f.vx = dx * 8;
  f.vy = dy * 6;
  f.state = 'dash';
  f.stateTime = 8;
  for (let i = 0; i < 10; i++) {
    addParticle(f.x, f.y - 12, '#ffffff', 14, -dx*Math.random()*2, (Math.random()-0.5)*2, 2);
  }
}

// ---------- UPDATE ----------
function updateFighter(f, other) {
  f.stateTime = Math.max(0, f.stateTime - 1);
  f.punchCd = Math.max(0, f.punchCd - 1);
  f.blastCd = Math.max(0, f.blastCd - 1);
  f.dashCd = Math.max(0, f.dashCd - 1);
  f.hurtTime = Math.max(0, f.hurtTime - 1);
  f.flashing = Math.max(0, f.flashing - 1);

  if (f.hp <= 0) return;

  let moveX = 0, moveY = 0;
  let wantPunch = false, wantBlast = false, wantCharge = false, wantDash = false;

  if (!f.isAI) {
    if (keys['ArrowLeft'] || keys['a']) moveX -= 1;
    if (keys['ArrowRight'] || keys['d']) moveX += 1;
    if (keys['ArrowUp'] || keys['w']) moveY -= 1;
    if (keys['ArrowDown'] || keys['s']) moveY += 1;
    wantPunch = keys['z'];
    wantBlast = keys['x'];
    wantCharge = keys['c'];
    wantDash = keys['Shift'] || keys['shift'];
  } else {
    // AI: basic behavior
    const dx = other.x - f.x;
    const dy = other.y - f.y;
    const dist = Math.hypot(dx, dy);
    if (dist > 50) {
      moveX = Math.sign(dx) * 0.9;
      moveY = Math.sign(dy) * 0.6;
    } else if (dist < 30) {
      moveX = -Math.sign(dx) * 0.4;
    }
    if (dist < 28 && Math.random() < 0.12) wantPunch = true;
    if (dist > 60 && dist < 220 && f.ki >= 30 && Math.random() < 0.035) wantBlast = true;
    if (f.ki < 25 && Math.random() < 0.015) wantCharge = true;
    if (dist < 60 && other.state === 'blast' && Math.random() < 0.08) wantDash = true;
    if (f.hp < 40 && f.ki < 50 && Math.random() < 0.02) wantCharge = true;
  }

  if (moveX !== 0) f.dir = Math.sign(moveX);
  // Turn to face opponent when not moving
  if (moveX === 0) f.dir = Math.sign(other.x - f.x) || f.dir;

  if (wantCharge && !wantDash) {
    f.state = 'charge';
    f.ki = Math.min(f.maxKi, f.ki + 1.2);
    f.aura = Math.min(1, f.aura + 0.1);
    moveX *= 0.3; moveY *= 0.3;
    // Ki aura particles
    if (Math.random() < 0.5) {
      addParticle(f.x + (Math.random()-0.5)*14, f.y - 10 + (Math.random()-0.5)*20,
        '#ffd84a', 18, (Math.random()-0.5)*0.6, -Math.random()*1.5, 2);
    }
  } else {
    f.aura = Math.max(0, f.aura - 0.05);
  }

  if (wantDash) dash(f);
  if (wantPunch) punch(f, other);
  if (wantBlast) fireBlast(f);

  // Flight physics
  if (f.state !== 'dash' || f.stateTime === 0) {
    const accel = 0.6;
    f.vx += moveX * accel;
    f.vy += moveY * accel;
    f.vx *= 0.86;
    f.vy *= 0.86;
    // Slight gravity if not actively flying up
    if (moveY === 0 && f.y < GROUND_Y - 40) f.vy += 0.12;
  }

  f.x += f.vx;
  f.y += f.vy;

  // Clamp to stage
  if (f.x < 12) { f.x = 12; f.vx = 0; }
  if (f.x > W - 12) { f.x = W - 12; f.vx = 0; }
  if (f.y < 30) { f.y = 30; f.vy = 0; }
  if (f.y > GROUND_Y - 10) {
    f.y = GROUND_Y - 10;
    f.vy = 0;
    if (Math.abs(f.vx) > 2) {
      for (let i = 0; i < 6; i++) addParticle(f.x, GROUND_Y, '#c08040', 20, (Math.random()-0.5)*3, -Math.random()*2, 2);
    }
  }

  if (f.state === 'charge' && !wantCharge) f.state = 'idle';
  if (f.stateTime === 0 && ['punch','blast','dash'].includes(f.state)) f.state = 'idle';
}

function updateProjectiles() {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    p.t++;
    // Trail
    if (p.t % 2 === 0) {
      addParticle(p.x, p.y, '#ffd84a', 14, (Math.random()-0.5)*0.6, (Math.random()-0.5)*0.6, p.size - 2);
    }
    // Check collision
    const target = p.owner === player ? enemy : player;
    const dx = target.x - p.x;
    const dy = (target.y - 16) - p.y;
    if (Math.abs(dx) < 14 && Math.abs(dy) < 16) {
      target.hp -= p.power;
      target.vx += p.vx * 0.6;
      target.vy -= 2;
      target.hurtTime = 18;
      target.flashing = 10;
      projectiles.splice(i, 1);
      for (let k = 0; k < 20; k++) {
        addParticle(p.x, p.y, ['#ffd84a','#ffffff','#ff8820'][k%3], 26,
          (Math.random()-0.5)*5, (Math.random()-0.5)*5, 3);
      }
      continue;
    }
    if (p.life <= 0 || p.x < -10 || p.x > W + 10) {
      projectiles.splice(i, 1);
    }
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ---------- DRAW ----------
function drawSky() {
  const grad = ctx.createLinearGradient(0, 0, 0, GROUND_Y);
  grad.addColorStop(0, '#1a0838');
  grad.addColorStop(0.5, '#5a1060');
  grad.addColorStop(1, '#ff6030');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, GROUND_Y);

  // Sun
  ctx.fillStyle = '#ffd84a';
  ctx.beginPath();
  ctx.arc(360, 110, 24, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255, 216, 74, 0.3)';
  ctx.beginPath();
  ctx.arc(360, 110, 36, 0, Math.PI * 2);
  ctx.fill();

  // Distant mountains
  ctx.fillStyle = '#2a0838';
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  for (let x = 0; x <= W; x += 30) {
    ctx.lineTo(x, GROUND_Y - 40 - Math.sin(x * 0.05) * 18 - Math.cos(x * 0.02) * 12);
  }
  ctx.lineTo(W, GROUND_Y);
  ctx.fill();

  // Closer mountains
  ctx.fillStyle = '#1a0528';
  ctx.beginPath();
  ctx.moveTo(0, GROUND_Y);
  for (let x = 0; x <= W; x += 22) {
    ctx.lineTo(x, GROUND_Y - 22 - Math.sin(x * 0.07) * 10);
  }
  ctx.lineTo(W, GROUND_Y);
  ctx.fill();

  // Ground
  ctx.fillStyle = '#6a3018';
  ctx.fillRect(0, GROUND_Y, W, H - GROUND_Y);
  ctx.fillStyle = '#3a1808';
  for (let x = 0; x < W; x += 6) {
    ctx.fillRect(x, GROUND_Y + 2 + (x % 12 === 0 ? 0 : 4), 4, 2);
  }

  // Stars
  ctx.fillStyle = 'rgba(255,255,255,0.8)';
  for (let i = 0; i < 20; i++) {
    const sx = (i * 53) % W;
    const sy = (i * 29) % 100;
    ctx.fillRect(sx, sy, 1, 1);
  }
}

function drawFighter(f) {
  if (f.hp <= 0) return;
  const fx = Math.round(f.x);
  const fy = Math.round(f.y);

  ctx.save();
  if (f.flashing > 0 && f.flashing % 2 === 0) {
    ctx.globalAlpha = 0.3;
  }

  // Aura
  if (f.aura > 0.1 || f.state === 'charge') {
    const ar = 18 + Math.sin(Date.now() * 0.02) * 3;
    const aGrad = ctx.createRadialGradient(fx, fy - 16, 2, fx, fy - 16, ar);
    aGrad.addColorStop(0, 'rgba(255, 216, 74, 0.6)');
    aGrad.addColorStop(0.5, 'rgba(255, 136, 32, 0.3)');
    aGrad.addColorStop(1, 'rgba(255, 136, 32, 0)');
    ctx.fillStyle = aGrad;
    ctx.beginPath();
    ctx.arc(fx, fy - 16, ar, 0, Math.PI * 2);
    ctx.fill();
  }

  // Body — pixel sprite
  const p = (x, y, w, h, c) => { ctx.fillStyle = c; ctx.fillRect(fx + x, fy + y, w, h); };
  const dir = f.dir;

  // Legs
  p(-4, -8, 3, 8, f.color);
  p(1, -8, 3, 8, f.color);
  // Boots
  p(-5, -2, 4, 3, '#2a1a10');
  p(1, -2, 4, 3, '#2a1a10');

  // Torso
  p(-5, -20, 10, 12, f.color);
  p(-5, -20, 10, 2, f.accent); // belt top
  p(-5, -10, 10, 2, f.accent); // belt
  // Symbol
  p(-1, -16, 2, 2, f.accent);

  // Arms
  if (f.state === 'punch') {
    p(-5 + (dir > 0 ? 10 : -3), -18, 6, 3, f.color);
    p(-5 + (dir > 0 ? 14 : -6), -19, 3, 4, '#f0c090'); // fist
  } else if (f.state === 'blast') {
    p(-5 + (dir > 0 ? 10 : -4), -18, 4, 4, f.color);
    // Glowing hand
    ctx.fillStyle = '#ffd84a';
    ctx.beginPath();
    ctx.arc(fx + (dir > 0 ? 10 : -10), fy - 16, 4, 0, Math.PI * 2);
    ctx.fill();
  } else {
    p(-7, -18, 3, 8, f.color);
    p(4, -18, 3, 8, f.color);
    p(-7, -11, 3, 3, '#f0c090'); // hands
    p(4, -11, 3, 3, '#f0c090');
  }

  // Head
  p(-4, -28, 8, 8, '#f0c090'); // face
  // Hair (spiky)
  p(-5, -30, 10, 3, f.hairColor);
  p(-6, -28, 2, 2, f.hairColor);
  p(4, -28, 2, 2, f.hairColor);
  p(-3, -32, 2, 2, f.hairColor);
  p(1, -32, 2, 2, f.hairColor);
  p(3, -33, 2, 2, f.hairColor);
  // Eyes
  p(-3 + (dir > 0 ? 0 : 0), -25, 2, 2, '#000');
  p(1, -25, 2, 2, '#000');
  // Eye shine
  p(-2 + (dir > 0 ? 0 : 0), -25, 1, 1, '#fff');
  p(2, -25, 1, 1, '#fff');

  ctx.restore();
}

function drawProjectile(p) {
  // Outer glow
  const grad = ctx.createRadialGradient(p.x, p.y, 1, p.x, p.y, p.size + 6);
  grad.addColorStop(0, '#ffffff');
  grad.addColorStop(0.4, '#ffd84a');
  grad.addColorStop(0.8, '#ff8820');
  grad.addColorStop(1, 'rgba(255, 136, 32, 0)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(p.x, p.y, p.size + 6, 0, Math.PI * 2);
  ctx.fill();
  // Core
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(p.x, p.y, p.size - 2, 0, Math.PI * 2);
  ctx.fill();
}

function drawParticles() {
  for (const pt of particles) {
    const a = pt.life / pt.maxLife;
    ctx.globalAlpha = a;
    ctx.fillStyle = pt.color;
    ctx.fillRect(pt.x | 0, pt.y | 0, pt.size, pt.size);
  }
  ctx.globalAlpha = 1;
}

function drawUI() {
  // Player bars (left)
  drawBar(8, 8, 180, 10, player.hp / player.maxHp, '#ff3a4a', '#5a0a10');
  drawBar(8, 20, 180, 6, player.ki / player.maxKi, '#3fa9ff', '#0a1a40');
  ctx.fillStyle = '#fff8e2';
  ctx.font = '12px "Press Start 2P", monospace';
  ctx.fillText('YOU', 8, 40);

  // Enemy bars (right)
  drawBar(W - 188, 8, 180, 10, enemy.hp / enemy.maxHp, '#ff3a4a', '#5a0a10');
  drawBar(W - 188, 20, 180, 6, enemy.ki / enemy.maxKi, '#3fa9ff', '#0a1a40');
  ctx.fillText('RIVAL', W - 60, 40);

  if (announceTimer > 0) {
    ctx.save();
    ctx.font = '20px "Press Start 2P", monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffd84a';
    ctx.shadowColor = '#ff3a00';
    ctx.shadowBlur = 6;
    ctx.fillText(announceText, W/2, H/2);
    ctx.restore();
  }
}

function drawBar(x, y, w, h, pct, fill, bg) {
  ctx.fillStyle = '#000';
  ctx.fillRect(x - 1, y - 1, w + 2, h + 2);
  ctx.fillStyle = bg;
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = fill;
  ctx.fillRect(x, y, w * Math.max(0, pct), h);
}

// ---------- LOOP ----------
function reset() {
  player.hp = 100; player.ki = 50; player.x = 100; player.y = GROUND_Y - 40; player.vx = 0; player.vy = 0; player.state = 'idle';
  enemy.hp = 100; enemy.ki = 50; enemy.x = 380; enemy.y = GROUND_Y - 40; enemy.vx = 0; enemy.vy = 0; enemy.state = 'idle';
  projectiles.length = 0;
  particles.length = 0;
  gameState = 'playing';
  announceText = 'FIGHT!';
  announceTimer = 60;
}

function loop() {
  if (gameState === 'playing') {
    updateFighter(player, enemy);
    updateFighter(enemy, player);
    updateProjectiles();
    updateParticles();

    if (player.hp <= 0) { gameState = 'lost'; announceText = 'DEFEAT'; announceTimer = 240; }
    else if (enemy.hp <= 0) { gameState = 'won'; announceText = 'VICTORY!'; announceTimer = 240; }
  } else {
    updateParticles();
    if (keys['z'] || keys[' ']) reset();
  }

  if (announceTimer > 0) announceTimer--;

  drawSky();
  for (const p of projectiles) drawProjectile(p);
  drawFighter(player);
  drawFighter(enemy);
  drawParticles();
  drawUI();

  if (gameState !== 'playing' && announceTimer < 200) {
    ctx.fillStyle = '#fff8e2';
    ctx.font = '10px "Press Start 2P", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('PRESS Z TO RESTART', W/2, H/2 + 30);
  }
  ctx.textAlign = 'left';

  requestAnimationFrame(loop);
}
reset();
loop();
</script>
</body>
</html>
