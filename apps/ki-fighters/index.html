<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ki Fighters</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%94%B6">
<meta name="description" content="Pixel-style anime fighter. Fly, punch, charge ki, and blast your rival out of the sky.">
<meta property="og:title" content="Ki Fighters">
<meta property="og:description" content="Pixel-style anime fighter. Fly, punch, charge ki, and blast your rival out of the sky.">
<meta property="og:url" content="https://sloppy.live/ki-fighters">
<meta property="og:image" content="https://sloppy.live/ki-fighters/og-image.png">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #ff8820;
    --gold: #ffd84a;
    --blue: #3fa9ff;
    --red: #ff3a4a;
    --ink: #fff8e2;
    --bg: #0a0512;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'VT323', monospace;
    height: 100%;
    width: 100%;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100dvh;
  }
  #stage {
    flex: 1 1 auto;
    min-height: 0;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4px;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    box-shadow: 0 0 60px rgba(255, 136, 32, 0.25);
    border: 2px solid #2a1a10;
  }
  #title {
    position: fixed;
    top: 10px;
    left: 0; right: 0;
    text-align: center;
    font-family: 'Press Start 2P', monospace;
    font-size: 18px;
    color: var(--gold);
    text-shadow: 3px 3px 0 #a8400a, 6px 6px 0 rgba(0,0,0,0.4);
    letter-spacing: 2px;
    z-index: 20;
    pointer-events: none;
  }
  #hint {
    position: fixed;
    bottom: 10px;
    left: 0; right: 0;
    text-align: center;
    font-size: 18px;
    color: #ffaa44;
    letter-spacing: 2px;
    z-index: 10;
    pointer-events: none;
  }
  #backlink {
    position: fixed;
    top: 12px;
    right: 14px;
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: #ff8820;
    text-decoration: none;
    letter-spacing: 1px;
    z-index: 30;
    background: rgba(0,0,0,0.5);
    padding: 6px 10px;
    border: 1px solid var(--orange);
  }
  #backlink:hover { background: var(--orange); color: #000; }

  #mobileControls {
    display: none;
    width: 100%;
    padding: 10px 14px calc(10px + env(safe-area-inset-bottom, 0px));
    justify-content: space-between;
    align-items: flex-end;
    gap: 12px;
    flex: 0 0 auto;
    z-index: 40;
  }
  #mobileControls .cluster { display: grid; gap: 6px; }
  #joystick {
    position: relative;
    width: 150px;
    height: 150px;
    touch-action: none;
    flex: 0 0 auto;
    -webkit-user-select: none;
    user-select: none;
  }
  #joystick .base {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background:
      radial-gradient(circle at 50% 50%, rgba(255, 136, 32, 0.22), rgba(255, 136, 32, 0.04) 60%, rgba(0,0,0,0.3) 100%);
    border: 3px solid var(--orange);
    box-shadow:
      0 0 30px rgba(255, 136, 32, 0.4),
      inset 0 0 24px rgba(0, 0, 0, 0.5);
  }
  #joystick .base::before,
  #joystick .base::after {
    content: '';
    position: absolute;
    background: rgba(255, 216, 74, 0.25);
  }
  #joystick .base::before {
    left: 50%; top: 10%; bottom: 10%; width: 1px; transform: translateX(-0.5px);
  }
  #joystick .base::after {
    top: 50%; left: 10%; right: 10%; height: 1px; transform: translateY(-0.5px);
  }
  #joystick .knob {
    position: absolute;
    width: 64px;
    height: 64px;
    top: 50%;
    left: 50%;
    margin-left: -32px;
    margin-top: -32px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #ffec99, var(--gold) 40%, var(--orange) 70%, #a8400a);
    border: 2px solid var(--gold);
    box-shadow: 0 0 14px rgba(255, 216, 74, 0.7), inset 0 -4px 8px rgba(0,0,0,0.4);
    pointer-events: none;
    transition: transform 0.1s ease-out;
  }
  #joystick.active .knob { transition: none; }
  #mobileControls .actions {
    grid-template-columns: repeat(2, 64px);
    grid-template-rows: repeat(2, 64px);
    align-self: end;
  }
  #mobileControls button {
    width: 100%;
    aspect-ratio: 1;
    background: rgba(255, 136, 32, 0.18);
    border: 2px solid var(--orange);
    color: var(--ink);
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    border-radius: 50%;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    cursor: pointer;
    box-shadow: 0 0 12px rgba(255, 136, 32, 0.25), inset 0 0 8px rgba(255, 216, 74, 0.15);
    text-shadow: 1px 1px 0 rgba(0,0,0,0.6);
  }
  #mobileControls button.pressed,
  #mobileControls button:active {
    background: var(--orange);
    color: #1a0a00;
    box-shadow: 0 0 18px var(--gold), inset 0 0 10px rgba(255,255,255,0.4);
    transform: translateY(1px);
  }
  #mobileControls .z-btn { border-color: var(--gold); color: var(--gold); }
  #mobileControls .x-btn { border-color: var(--red); color: var(--red); }
  #mobileControls .c-btn { border-color: var(--blue); color: var(--blue); }
  #mobileControls .dash-btn { border-color: #c06aff; color: #c06aff; font-size: 9px; }
  #mobileControls .extras {
    grid-template-columns: 56px;
    grid-template-rows: repeat(2, 56px);
    align-self: end;
    gap: 6px;
  }
  #mobileControls .tag-btn { border-color: #4aff9a; color: #4aff9a; font-size: 9px; }
  #mobileControls .fin-btn {

    font-size: 9px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  #mobileControls .fin-btn.ready {
    opacity: 1;
    pointer-events: auto;
    animation: finPulse 0.8s infinite;
  }
  @keyframes finPulse {
    0%, 100% { box-shadow: 0 0 10px #ffd84a, inset 0 0 8px rgba(255, 216, 74, 0.4); }
    50%      { box-shadow: 0 0 24px #ffd84a, 0 0 40px #ff8820, inset 0 0 16px rgba(255, 216, 74, 0.6); }
  }
  .fighter-card .slot-badge {

    top: 4px; right: 4px;
    background: currentColor;
    color: #000;

    font-size: 7px;

    align-items: center;

  #charSelect.hidden { display: none; }

    font-family: 'Press Start 2P', monospace;

  #nameRow {
    display: flex;
    flex-direction: column;
    align-items: center;

  }

    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--gold);
    letter-spacing: 2px;
  }
  #nameInput {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    padding: 10px 14px;
    background: rgba(0,0,0,0.6);

    border: 2px solid var(--orange);

  #difficultyRow {

  }
  #difficultyRow label {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--gold);
    letter-spacing: 2px;

  .diff-buttons {
    display: flex;

  }
  .diff-buttons button {
    font-family: 'Press Start 2P', monospace;
    font-size: 10px;
    padding: 10px 16px;

    color: var(--ink);

  .diff-buttons button:hover { border-color: var(--orange); }
  .diff-buttons button.active {

    box-shadow: 0 0 14px currentColor;
    background: rgba(0,0,0,0.85);

  .diff-buttons button[data-diff="easy"]   { color: #4aff9a; }
  .diff-buttons button[data-diff="normal"] { color: #ffd84a; }
  .diff-buttons button[data-diff="kai"]    { color: #ff3a4a; font-size: 8px; padding: 10px 10px; }
  #stageRoster {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 100%;

  .stage-card {
    width: 220px;
    background: rgba(0,0,0,0.55);
    border: 3px solid #2a1a10;

    transition: all 0.15s;

    color: var(--ink);
    overflow: hidden;

  .stage-card .sub-line {

    letter-spacing: 1px;
    margin-bottom: 6px;

    font-size: 14px;
    line-height: 1.15;
    color: #c8b890;

    .stage-card { width: 160px; }
    .stage-card .bio { font-size: 12px; }

  #charSelect .sub {
    font-family: 'VT323', monospace;
    font-size: 20px;
    color: #ffaa44;
    letter-spacing: 2px;
    margin-top: -8px;
  }
  #roster {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 100%;
  }
  .fighter-card {
    width: 180px;
    background: rgba(0,0,0,0.55);
    border: 3px solid #2a1a10;
    padding: 14px 12px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'VT323', monospace;
    color: var(--ink);
    text-align: center;

  .fighter-card::before {
    content: '';

  .fighter-card:hover, .fighter-card.selected {
    transform: translateY(-4px);
    box-shadow: 0 0 24px currentColor;
  }
  .fighter-card.selected { border-color: currentColor; }
  .fighter-card canvas {
    image-rendering: pixelated;
    display: block;
    margin: 0 auto 8px;
    border: none;
    box-shadow: none;
    background: linear-gradient(180deg, #1a0838 0%, #5a1060 100%);
  }
  .fighter-card h3 {
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    margin-bottom: 3px;
  }
  .fighter-card .class {
    font-size: 14px;
    color: #ffaa44;
    letter-spacing: 1px;
    margin-bottom: 10px;

  }
  .fighter-card .bio {

    line-height: 1.15;

    margin-bottom: 8px;

  .fighter-card .stat-row {
    display: flex;
    justify-content: space-between;

  }
  .fighter-card .stat-row .label { color: #8a7560; letter-spacing: 1px; font-size: 11px; }
  .fighter-card .stat-bar {

  #confirmBtn {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    padding: 14px 28px;
    background: var(--orange);
    color: #1a0a00;
    border: 3px solid var(--gold);
    letter-spacing: 3px;

    box-shadow: 0 0 20px rgba(255, 216, 74, 0.5);

  #confirmBtn:hover { transform: scale(1.05); }
  #confirmBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  @media (max-width: 640px) {
    #charSelect h2 { font-size: 13px; }

    #confirmBtn { font-size: 10px; padding: 10px 20px; }

  @media (max-width: 820px), (pointer: coarse) {
    #mobileControls { display: flex; }
    #title { font-size: 11px; top: 6px; }
    #backlink { top: 4px; right: 6px; font-size: 7px; padding: 4px 6px; }
    #hint { display: none; }
  }
  @media (max-height: 520px) {
    #mobileControls {
      padding-top: 4px;
      padding-bottom: calc(4px + env(safe-area-inset-bottom, 0px));

    #joystick .knob { width: 52px; height: 52px; margin-left: -26px; margin-top: -26px; }
    #mobileControls .actions { grid-template-columns: repeat(2, 52px); grid-template-rows: repeat(2, 52px); }
    #mobileControls .extras { grid-template-columns: 46px; grid-template-rows: repeat(2, 46px); }

</style>

<body>
<div id="charSelect">
  <h2 id="selectTitle">BUILD YOUR TAG TEAM</h2>
  <div class="sub" id="selectSub">pick 2 fighters to rotate mid-battle</div>
  <div id="nameRow">
    <label for="nameInput">YOUR NAME</label>
    <input id="nameInput" type="text" maxlength="12" placeholder="ENTER NAME" spellcheck="false" autocomplete="off">
  </div>
  <div id="difficultyRow">
    <label>DIFFICULTY</label>
    <div class="diff-buttons">
      <button data-diff="easy">EASY</button>
      <button data-diff="normal" class="active">NORMAL</button>
      <button data-diff="kai">SUPREME KAI</button>
    </div>
  </div>
  <div id="roster"></div>
  <div id="stageRoster" style="display:none;"></div>
  <button id="confirmBtn" disabled>PICK 2 FIGHTERS</button>
</div>
<div id="title">KI  FIGHTERS</div>
<div id="stage"><canvas id="c" width="480" height="270"></canvas></div>
<div id="hint">← → ↑ ↓ fly · Z punch · X blast · C charge · SHIFT dash</div>
<a id="backlink" href="https://sloppy.live">← sloppy.live</a>
<div id="mobileControls">
  <div id="joystick">
    <div class="base"></div>
    <div class="knob"></div>
  </div>
  <div class="cluster extras">
    <button class="tag-btn" data-key="t">TAG</button>
    <button class="fin-btn" data-key="f" id="finBtn">FIN</button>
  </div>
  <div class="cluster actions">
    <button class="c-btn"    data-key="c">KI</button>
    <button class="dash-btn" data-key="Shift">DASH</button>
    <button class="z-btn"    data-key="z">PNCH</button>
    <button class="x-btn"    data-key="x">BLST</button>
  </div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const W = canvas.width;
const H = canvas.height;
const GROUND_Y = 230;

function resizeCanvas() {
  const stage = document.getElementById('stage');
  const rect = stage.getBoundingClientRect();
  const availW = Math.max(160, rect.width - 8);
  const availH = Math.max(120, rect.height - 8);
  const scale = Math.max(1, Math.min(availW / W, availH / H));
  canvas.style.width  = (W * scale | 0) + 'px';
  canvas.style.height = (H * scale | 0) + 'px';
}
window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 100));
setTimeout(resizeCanvas, 0);

// ---------- INPUT ----------
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  keys[e.key.toLowerCase()] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup', e => {
  keys[e.key] = false;
  keys[e.key.toLowerCase()] = false;
});
// Virtual joystick
(() => {
  const stick = document.getElementById('joystick');
  const knob = stick.querySelector('.knob');
  let activePointer = null;
  let centerX = 0, centerY = 0, radius = 0;
  const DEAD = 0.22;

  function recomputeCenter() {
    const rect = stick.getBoundingClientRect();
    centerX = rect.left + rect.width / 2;
    centerY = rect.top + rect.height / 2;
    radius = rect.width * 0.42;
  }

  function setAxes(nx, ny) {
    keys['ArrowLeft']  = nx < -DEAD;
    keys['ArrowRight'] = nx >  DEAD;
    keys['ArrowUp']    = ny < -DEAD;
    keys['ArrowDown'] = ny >  DEAD;
  }

  function moveKnob(px, py) {
    let dx = px - centerX;
    let dy = py - centerY;
    const mag = Math.hypot(dx, dy);
    if (mag > radius) { dx = dx / mag * radius; dy = dy / mag * radius; }
    knob.style.transform = `translate(${dx}px, ${dy}px)`;
    setAxes(dx / radius, dy / radius);
  }

  function release() {
    activePointer = null;
    stick.classList.remove('active');
    knob.style.transform = 'translate(0px, 0px)';
    setAxes(0, 0);
  }

  stick.addEventListener('pointerdown', e => {
    e.preventDefault();
    recomputeCenter();
    stick.setPointerCapture(e.pointerId);
    activePointer = e.pointerId;
    stick.classList.add('active');
    moveKnob(e.clientX, e.clientY);
  });
  stick.addEventListener('pointermove', e => {
    if (activePointer !== e.pointerId) return;
    moveKnob(e.clientX, e.clientY);
  });
  stick.addEventListener('pointerup', e => { if (activePointer === e.pointerId) release(); });
  stick.addEventListener('pointercancel', e => { if (activePointer === e.pointerId) release(); });
  stick.addEventListener('lostpointercapture', release);
  stick.addEventListener('contextmenu', e => e.preventDefault());
  window.addEventListener('resize', recomputeCenter);
})();

// Multi-touch aware control binding via pointer events with capture
document.querySelectorAll('#mobileControls button').forEach(b => {
  const k = b.dataset.key;
  const press = () => { keys[k] = true; keys[k.toLowerCase()] = true; b.classList.add('pressed'); };
  const release = () => { keys[k] = false; keys[k.toLowerCase()] = false; b.classList.remove('pressed'); };
  b.addEventListener('pointerdown', e => {
    e.preventDefault();
    b.setPointerCapture(e.pointerId);
    press();
  });
  b.addEventListener('pointerup', e => { e.preventDefault(); release(); });
  b.addEventListener('pointercancel', e => { e.preventDefault(); release(); });
  b.addEventListener('lostpointercapture', release);
  b.addEventListener('contextmenu', e => e.preventDefault());
});

// ---------- FIGHTERS ROSTER ----------
const FIGHTERS = [
  {
    id: 'kaito',
    name: 'KAITO',
    class: 'BALANCED',
    bio: 'All-around warrior from the sun temple. Steady fists, steady flame.',
    color: '#ff8820', accent: '#ffd84a', hair: '#1a1a1a',
    maxHp: 100, maxKi: 100,
    moveSpeed: 1.0,
    punchDmg: 6,  punchCd: 18, punchRange: 26,
    blastDmg: 30, blastCd: 40, blastCost: 30, blastSize: 12, blastSpeed: 6.5, blastKnock: 0.9,
    dashPow: 8,   dashCost: 10,
    bars: { PWR: 0.55, SPD: 0.55, HP: 0.55, KI: 0.55 }
  },
  {
    id: 'reaper',
    name: 'DREAD REAPER',
    class: 'SPEEDSTER',
    bio: 'Shadow-stalker of the violet void. Phases through blasts on a trail of purple flame.',
    color: '#8a3aff', accent: '#c06aff', hair: '#ffffff',
    auraColor: '#c06aff', auraGlow: 'rgba(138, 58, 255, 0.6)',
    maxHp: 78, maxKi: 130,
    moveSpeed: 1.35,
    punchDmg: 4,  punchCd: 12, punchRange: 24,
    blastDmg: 20, blastCd: 24, blastCost: 22, blastSize: 9,  blastSpeed: 8.2, blastKnock: 0.6,
    dashPow: 11.5, dashCost: 8,
    bars: { PWR: 0.35, SPD: 0.95, HP: 0.35, KI: 0.85 }
  },
  {
    id: 'draka',
    name: 'DRAKA',
    class: 'JUGGERNAUT',
    bio: 'Iron-bone titan of the crimson cliffs. One punch ends conversations.',

// ---------- ENTITIES ----------
function makeFighter(x, spec, isAI) {
  return {
    x, y: GROUND_Y - 40,
    vx: 0, vy: 0,
    w: 18, h: 32,
    dir: isAI ? -1 : 1,
    spec,
    color: spec.color, accent: spec.accent, hairColor: spec.hair,
    hp: spec.maxHp, maxHp: spec.maxHp,
    ki: spec.maxKi * 0.5, maxKi: spec.maxKi,
    isAI,
    state: 'idle',
    stateTime: 0,
    punchCd: 0,
    blastCd: 0,
    dashCd: 0,
    hurtTime: 0,
    aura: 0,
    flashing: 0,
    beamCharge: 0,
    beamActive: false,
    beamHand: { x: 0, y: 0 },
    tagCd: 0,
    tagInvuln: 0,
    pendingHit: null,
    transformed: false,
    transformFrame: 0
  };
}

let playerTeamSpecs = [FIGHTERS[0], FIGHTERS[1]];
let enemyTeamSpecs  = [FIGHTERS[2], FIGHTERS[1]];
let playerTeam = [];
let enemyTeam = [];
let playerIdx = 0;
let enemyIdx = 0;
let player = null;
let enemy = null;
let tagKeyHeld = false;
let finKeyHeld = false;
let finisher = null;
let introFrame = 0;
let clash = null; // beam clash state
let meleeClash = null; // physical fist-clash state
const DIFFICULTIES = {
  easy:   { label: 'EASY',        punch: 0.45, blast: 0.4,  counter: 0.25, dash: 0.3, charge: 1.3, moveMul: 0.72, chaseAggro: 0.6, tagThreshold: 0.15 },
  normal: { label: 'NORMAL',      punch: 1.0,  blast: 1.0,  counter: 0.85, dash: 1.0, charge: 1.0, moveMul: 1.0,  chaseAggro: 1.0, tagThreshold: 0.28 },
  kai:    { label: 'SUPREME KAI', punch: 3.2,  blast: 4.0,  counter: 1.0,  dash: 3.2, charge: 0.8, moveMul: 1.55, chaseAggro: 1.7, tagThreshold: 0.45 }
};
let difficulty = 'normal';

const projectiles = [];
const particles = [];
let shake = 0;
const ROUND_FRAMES = 99 * 60; // 99 seconds at 60fps
let roundTimer = ROUND_FRAMES;
let gameState = 'playing'; // playing, won, lost
let announceText = '';
let announceTimer = 0;

function addParticle(x, y, color, life, vx, vy, size) {
  particles.push({ x, y, color, life, maxLife: life, vx, vy, size });
}

function fireBlast(f) {
  const s = f.spec;
  if (f.ki < s.blastCost || f.blastCd > 0) return;
  f.ki -= s.blastCost;
  f.blastCd = s.blastCd;
  f.state = 'blast';
  f.stateTime = 18;
  shake = Math.max(shake, 4);
  projectiles.push({
    x: f.x + f.dir * 18,
    y: f.y - 8,
    vx: f.dir * s.blastSpeed,
    vy: 0,
    owner: f,
    size: s.blastSize * (f.transformed ? 1.25 : 1),
    life: 110,
    power: s.blastDmg * (f.transformed ? 1.5 : 1),
    knock: s.blastKnock * (f.transformed ? 1.3 : 1),
    color1: s.accent, color2: s.color,
    t: 0
  });
  for (let i = 0; i < 22; i++) {
    addParticle(f.x + f.dir*16, f.y - 8,
      [s.accent, '#ffffff', s.color][i%3],
      22, f.dir * (Math.random()*-2.8), (Math.random()-0.5)*3.2, 3);
  }
}

function punch(f, other) {
  if (meleeClash || finisher) return;
  const s = f.spec;
  if (f.punchCd > 0) return;
  f.punchCd = s.punchCd;
  // Roundhouse kick if moving fast or airborne, else standard punch
  const isKick = Math.abs(f.vx) > 1.8 || f.y < (STAGES[stageIdx].groundY - 50);
  f.state = isKick ? 'kick' : 'punch';
  f.stateTime = isKick ? 14 : 10;
  const dx = other.x - f.x;
  const dy = other.y - f.y;
  const range = isKick ? s.punchRange + 6 : s.punchRange;
  if (Math.abs(dx) < range && Math.abs(dy) < 28 && Math.sign(dx) === f.dir && other.tagInvuln === 0) {
    // Buffer hit — resolveMeleeHits() decides individual vs clash
    f.pendingHit = { isKick, range };
  }
}

function applyPendingHit(f, other) {
  const h = f.pendingHit;
  f.pendingHit = null;
  if (!h || !other || other.tagInvuln > 0) return;
  const s = f.spec;
  const transformMul = f.transformed ? 1.5 : 1;
  const dmg = (h.isKick ? s.punchDmg * 1.35 : s.punchDmg) * transformMul;
  other.hp -= dmg;
  other.vx += f.dir * (2 + dmg * 0.22);
  other.vy -= h.isKick ? 3.2 : 2;
  other.hurtTime = h.isKick ? 16 : 12;
  other.flashing = h.isKick ? 9 : 6;
  f.ki = Math.min(f.maxKi, f.ki + (h.isKick ? 5 : 4));
  shake = Math.max(shake, h.isKick ? 4 : 1.5);
  for (let i = 0; i < (h.isKick ? 14 : 8); i++) {
    addParticle(other.x, other.y - 8, i % 2 ? '#ffffff' : s.accent, 16,
      (Math.random()-0.5)*4, (Math.random()-0.5)*4, 2);
  }
}

function resolveMeleeHits() {
  if (!player || !enemy) return;
  if (finisher || clash || meleeClash) {
    applyPendingHit(player, enemy);
    applyPendingHit(enemy, player);
    return;
  }
  const ph = player.pendingHit;
  const eh = enemy.pendingHit;
  if (ph && eh) {
    // Simultaneous mutual hits → melee clash
    player.pendingHit = null;
    enemy.pendingHit = null;
    startMeleeClash();
    return;
  }
  applyPendingHit(player, enemy);
  applyPendingHit(enemy, player);
}

function tagBurst(f) {
  shake = Math.max(shake, 6);
  for (let i = 0; i < 26; i++) {
    addParticle(f.x, f.y - 16, i % 2 ? '#ffffff' : (f.spec.auraColor || f.spec.accent), 26,
      (Math.random()-0.5)*6, (Math.random()-0.5)*6, 3);
  }
}

function performTag(side, instant) {
  if (side === 'player') {
    if (playerTeam.length < 2) return;
    const reserve = playerTeam[1 - playerIdx];
    if (!reserve || reserve.hp <= 0) return;
    if (!instant && player.tagCd > 0) return;
    const old = player;
    playerIdx = 1 - playerIdx;
    const neu = playerTeam[playerIdx];
    neu.x = old.x; neu.y = old.y - (instant ? 20 : 0);
    neu.vx = 0; neu.vy = 0;
    neu.dir = old.dir;
    neu.tagCd = 240;
    neu.tagInvuln = instant ? 60 : 40;
    neu.flashing = instant ? 30 : 20;
    if (!instant) old.tagCd = 240;
    player = neu;
    tagBurst(neu);
    if (instant) { announceText = neu.spec.name + ' TAGS IN!'; announceTimer = 90; }
  } else {
    if (enemyTeam.length < 2) return;
    const reserve = enemyTeam[1 - enemyIdx];
    if (!reserve || reserve.hp <= 0) return;
    if (!instant && enemy.tagCd > 0) return;
    const old = enemy;
    enemyIdx = 1 - enemyIdx;
    const neu = enemyTeam[enemyIdx];
    neu.x = old.x; neu.y = old.y - (instant ? 20 : 0);
    neu.vx = 0; neu.vy = 0;
    neu.dir = old.dir;
    neu.tagCd = 240;
    neu.tagInvuln = instant ? 60 : 40;
    neu.flashing = instant ? 30 : 20;
    if (!instant) old.tagCd = 240;
    enemy = neu;
    tagBurst(neu);
    if (instant) { announceText = neu.spec.name + ' TAGS IN!'; announceTimer = 90; }
  }
}
function tagPlayer() { if (finisher) return; performTag('player', false); }
function tagEnemy()  { if (finisher) return; performTag('enemy',  false); }

function startFinisher() {
  if (finisher) return;
  if (gameState !== 'playing') return;
  if (!enemy || enemy.hp <= 0) return;
  if (enemy.hp / enemy.maxHp > 0.22) return;
  finisher = {
    frame: 0,
    x0: player.x, y0: player.y,
    ex0: enemy.x, ey0: enemy.y,
    afterimages: [],
    zoom: 1,
    shockRings: [],
    banner: null
  };
  announceText = '';
  announceTimer = 0;
  enemy.hurtTime = 600;
  enemy.beamActive = false;
  enemy.beamCharge = 0;
  player.beamActive = false;
  player.beamCharge = 0;
}

// Finisher phase table (all frame offsets from finisher start):
//   0- 28  charge   — player glows, ground cracks, zoom drifts in
//  28- 34  vanish   — player blinks out, afterimage burst
//  34- 54  dash     — curved trajectory toward enemy, afterimages spawn
//  54      impact   — enemy hp=0, shockwave, 150 particles, shake=26, zoom peak
//  54- 78  hit-stop — hard freeze (no particle motion, no enemy movement)
//  78- 92  slow-mo  — enemy starts flight, slow launch
//  92-150  launch   — enemy ragdolls offscreen
// 150-180  settle   — zoom back out, fade to K.O.
function updateFinisher() {
  const f = finisher;
  f.frame++;
  const fr = f.frame;

  // ---- Zoom curve ----
  let targetZoom = 1;
  if (fr < 28)      targetZoom = 1 + (fr / 28) * 0.35;         // 1.00 → 1.35
  else if (fr < 54) targetZoom = 1.35 + ((fr - 28) / 26) * 0.55; // 1.35 → 1.90
  else if (fr < 78) targetZoom = 2.10;                          // punched in, hit-stop
  else if (fr < 150) targetZoom = 2.10 - ((fr - 78) / 72) * 0.95; // 2.10 → 1.15
  else              targetZoom = 1.15 - ((fr - 150) / 30) * 0.15;  // 1.15 → 1.00
  f.zoom += (targetZoom - f.zoom) * 0.35;

  // ---- Phase 1: charge ----
  if (fr < 28) {
    player.state = 'charge';
    player.aura = 1;
    if (fr % 2 === 0) {
      addParticle(player.x + (Math.random()-0.5)*16, player.y - 14,
        player.spec.auraColor || player.spec.accent, 32,
        (Math.random()-0.5)*2, -Math.random()*2.5, 3);
    }
    if (fr % 3 === 0) {
      addParticle(player.x + (Math.random()-0.5)*22, player.y + 4,
        '#ffffff', 18, (Math.random()-0.5)*3, -Math.random()*3.5, 2);
    }
    shake = Math.max(shake, 1.2 + fr * 0.05);
  }
  // ---- Phase 2: vanish ----
  else if (fr < 34) {
    if (fr === 28) {
      for (let i = 0; i < 34; i++) {
        addParticle(player.x, player.y - 14,
          player.spec.auraColor || player.spec.accent, 24,
          (Math.random()-0.5)*9, (Math.random()-0.5)*9, 3);
      }
      shake = Math.max(shake, 9);
    }
  }
  // ---- Phase 3: dash ----
  else if (fr < 54) {
    const t = (fr - 34) / 20;
    const ease = 1 - Math.pow(1 - t, 3);
    const tgtSide = Math.sign(enemy.x - f.x0) || 1;
    const targetX = enemy.x - tgtSide * 26;
    // Slight arc
    const arcY = Math.sin(t * Math.PI) * -16;
    player.x = f.x0 + (targetX - f.x0) * ease;
    player.y = f.y0 + (enemy.y - f.y0) * ease + arcY;
    player.state = 'dash';
    player.dir = tgtSide;
    // Afterimages every frame
    f.afterimages.push({
      x: player.x, y: player.y, dir: player.dir,
      life: 14, maxLife: 14
    });
    addParticle(player.x, player.y - 14,
      player.spec.auraColor || player.spec.accent, 24,
      -player.dir * 3, (Math.random()-0.5)*2, 3);
  }
  // ---- Phase 4: impact ----
  else if (fr === 54) {
    shake = 26;
    f.shockRings.push({ x: enemy.x, y: enemy.y - 14, r: 4, maxR: 180, life: 30 });
    f.shockRings.push({ x: enemy.x, y: enemy.y - 14, r: 2, maxR: 120, life: 22 });
    for (let k = 0; k < 150; k++) {
      addParticle(enemy.x, enemy.y - 14,
        ['#ffd84a','#ffffff','#ff8820','#ff3a4a'][k % 4], 64,
        (Math.random()-0.5)*20, (Math.random()-0.5)*20, 3 + (k % 3));
    }
    for (let k = 0; k < 80; k++) {
      const a = (k / 80) * Math.PI * 2;
      addParticle(enemy.x, enemy.y - 14, '#ffffff', 40,
        Math.cos(a) * 7, Math.sin(a) * 7, 2);
    }
    // Debris shards flying outward
    for (let k = 0; k < 24; k++) {
      const a = Math.random() * Math.PI * 2;
      const sp = 4 + Math.random() * 6;
      addParticle(enemy.x, enemy.y - 14, k % 2 ? '#ffd84a' : '#ff3a4a', 60,
        Math.cos(a) * sp, Math.sin(a) * sp, 4);
    }
    enemy.hp = 0;
    enemy.flashing = 60;
    player.state = 'punch';
    player.stateTime = 50;
    f.banner = 'K.O.';
  }
  // ---- Phase 5: hit-stop (54-78) ----
  else if (fr < 78) {
    // Freeze everything. Shake decays gently from 26 to ~6.
    shake = Math.max(shake, 20 - (fr - 54) * 0.5);
  }
  // ---- Phase 6: slow-mo launch (78-92) ----
  else if (fr === 78) {
    enemy.vx = (player.dir || 1) * 3;
    enemy.vy = -2.5;
    shake = 10;
  }
  else if (fr < 92) {
    enemy.x += enemy.vx * 0.4; // slow-mo
    enemy.y += enemy.vy * 0.4;
    enemy.vy += 0.08;
    if (fr % 2 === 0) {
      addParticle(enemy.x - enemy.vx, enemy.y - 14,
        '#ff8820', 30, -enemy.vx * 0.3, -enemy.vy * 0.3, 2);
    }
  }
  // ---- Phase 7: full launch (92-150) ----
  else if (fr === 92) {
    enemy.vx *= 2.5;
    enemy.vy *= 2.5;
  }
  else if (fr < 150) {
    enemy.x += enemy.vx;
    enemy.y += enemy.vy;
    enemy.vy += 0.25;
    if (fr % 3 === 0) {
      addParticle(enemy.x - enemy.vx, enemy.y - 14,
        '#ff8820', 26, -enemy.vx * 0.2, -enemy.vy * 0.2, 2);
    }
  }

  // Decay afterimages
  for (const ai of f.afterimages) ai.life--;
  f.afterimages = f.afterimages.filter(ai => ai.life > 0);
  // Update shock rings
  for (const r of f.shockRings) { r.r += (r.maxR - r.r) * 0.15; r.life--; }
  f.shockRings = f.shockRings.filter(r => r.life > 0);

  if (fr >= 180) {
    finisher = null;
    player.state = 'idle';
    player.stateTime = 0;
    player.vx = 0;
    player.vy = 0;
  }
}

function isFinisherHitStop() {
  return finisher && finisher.frame >= 54 && finisher.frame < 78;
}

// ---------- BEAM CLASH ----------
function updateClash() {
  if (!player || !enemy || finisher) { clash = null; return; }
  // Require both beams active and facing each other, in roughly same vertical band
  const facing =
    player.beamActive && enemy.beamActive &&
    Math.sign(enemy.x - player.x) === player.dir &&
    Math.sign(player.x - enemy.x) === enemy.dir &&
    Math.abs(player.y - enemy.y) < 44;

  if (!facing) {
    if (clash) {
      // End clash cleanly
      clash = null;
    }
    return;
  }

  if (!clash) {
    clash = {
      midX: (player.x + enemy.x) / 2,
      pMash: 0,
      eMash: 0,
      zPrev: false,
      frame: 0,
      decided: false
    };
    announceText = 'BEAM CLASH!';
    announceTimer = 60;
    shake = Math.max(shake, 6);
  }
  clash.frame++;

  // Player mashes Z (punch key) to push
  const zDown = !!keys['z'];
  if (zDown && !clash.zPrev) clash.pMash += 1;
  clash.zPrev = zDown;

  // AI mashes based on difficulty (random + more mashing when losing)
  const losing = clash.midX < (player.x + enemy.x) / 2 ? 1.4 : 0.8;
  if (Math.random() < 0.42 * losing) clash.eMash += 1;

  // Compute target mid based on combined stats
  const pPower = (player.ki * 0.6) + clash.pMash * 7 + (player.spec.blastDmg * 0.7) + player.maxKi * 0.15;
  const ePower = (enemy.ki  * 0.6) + clash.eMash * 7 + (enemy.spec.blastDmg  * 0.7) + enemy.maxKi  * 0.15;
  const ratio = pPower / (pPower + ePower);
  const targetMidX = player.x + (enemy.x - player.x) * ratio;
  clash.midX += (targetMidX - clash.midX) * 0.07;

  // Drain ki from both (on top of normal beam drain)
  player.ki = Math.max(0, player.ki - 0.35);
  enemy.ki  = Math.max(0, enemy.ki  - 0.35);

  // Rumble
  shake = Math.max(shake, 2.5 + Math.sin(clash.frame * 0.4) * 1.2);

  // Particles around collision point
  const midY = (player.y + enemy.y) / 2 - 10;
  for (let i = 0; i < 4; i++) {
    addParticle(
      clash.midX + (Math.random()-0.5)*26,
      midY + (Math.random()-0.5)*20,
      i % 2 ? (player.spec.auraColor || player.spec.accent) : (enemy.spec.auraColor || enemy.spec.accent),
      22,
      (Math.random()-0.5)*6,
      (Math.random()-0.5)*6,
      3
    );
  }

  // Decide winner when midpoint reaches a fighter
  if (clash.decided) return;
  const winDist = 30;
  if (clash.midX >= enemy.x - winDist) {
    clash.decided = true;
    clashResolve('player');
  } else if (clash.midX <= player.x + winDist) {
    clash.decided = true;
    clashResolve('enemy');
  }
}

function clashResolve(winner) {
  const winF = winner === 'player' ? player : enemy;
  const loseF = winner === 'player' ? enemy : player;
  const dmg = 38;
  loseF.hp -= dmg;
  loseF.vx += (winner === 'player' ? 1 : -1) * 8;
  loseF.vy -= 5;
  loseF.hurtTime = 50;
  loseF.flashing = 26;
  loseF.beamActive = false;
  loseF.beamCharge = 0;
  loseF.ki = 0;
  winF.beamActive = false;
  winF.beamCharge = 0;
  winF.ki = Math.max(0, winF.ki - 10);
  shake = Math.max(shake, 18);
  // Big explosion at loser
  for (let k = 0; k < 90; k++) {
    addParticle(loseF.x, loseF.y - 14,
      ['#ffd84a','#ffffff','#ff8820','#ff3a4a'][k % 4], 48,
      (Math.random()-0.5)*12, (Math.random()-0.5)*12, 3 + (k % 3));
  }
  for (let k = 0; k < 40; k++) {
    const a = (k / 40) * Math.PI * 2;
    addParticle(loseF.x, loseF.y - 14, '#ffffff', 28,
      Math.cos(a) * 5, Math.sin(a) * 5, 2);
  }
  announceText = winner === 'player' ? 'OVERPOWERED!' : 'BLASTED!';
  announceTimer = 90;
  clash = null;
}

function drawClash() {
  if (!clash || !player || !enemy) return;
  const midY = (player.y + enemy.y) / 2 - 10;
  const t = clash.frame;
  const rBase = 16;
  const r = rBase + Math.sin(t * 0.5) * 5;

  // Outer halo
  ctx.save();
  const halo = ctx.createRadialGradient(clash.midX, midY, 2, clash.midX, midY, r + 28);
  halo.addColorStop(0, '#ffffff');
  halo.addColorStop(0.25, '#ffd84a');
  halo.addColorStop(0.65, 'rgba(255, 100, 40, 0.6)');
  halo.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.globalAlpha = 0.9;
  ctx.fillStyle = halo;
  ctx.beginPath();
  ctx.arc(clash.midX, midY, r + 28, 0, Math.PI * 2);
  ctx.fill();

  // Main orb
  const orb = ctx.createRadialGradient(clash.midX, midY, 1, clash.midX, midY, r);
  orb.addColorStop(0, '#ffffff');
  orb.addColorStop(0.6, '#ffd84a');
  orb.addColorStop(1, '#ff6020');
  ctx.globalAlpha = 1;
  ctx.fillStyle = orb;
  ctx.beginPath();
  ctx.arc(clash.midX, midY, r, 0, Math.PI * 2);
  ctx.fill();

  // Hot core
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(clash.midX + Math.sin(t * 0.9) * 2, midY, r * 0.42, 0, Math.PI * 2);
  ctx.fill();

  // Jagged arcs radiating outward
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 2;
  ctx.globalAlpha = 0.8;
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2 + t * 0.08;
    ctx.beginPath();
    ctx.moveTo(clash.midX + Math.cos(a) * (r + 4), midY + Math.sin(a) * (r + 4));
    const jagged = 8 + Math.sin(t * 0.4 + i) * 4;
    ctx.lineTo(clash.midX + Math.cos(a) * (r + 4 + jagged), midY + Math.sin(a) * (r + 4 + jagged));
    ctx.stroke();
  }
  ctx.restore();

  // Power tug indicator (top of screen bar showing position between fighters)
  const barX = 80, barY = 52, barW = W - 160, barH = 6;
  ctx.fillStyle = '#000';
  ctx.fillRect(barX - 1, barY - 1, barW + 2, barH + 2);
  ctx.fillStyle = '#2a1a10';
  ctx.fillRect(barX, barY, barW, barH);
  // Player side fill
  const rel = (clash.midX - player.x) / (enemy.x - player.x);
  const clamped = Math.max(0.02, Math.min(0.98, rel));
  const split = barX + barW * clamped;
  ctx.fillStyle = player.spec.accent;
  ctx.fillRect(barX, barY, split - barX, barH);
  ctx.fillStyle = enemy.spec.accent;
  ctx.fillRect(split, barY, (barX + barW) - split, barH);
  // Marker
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(split - 1, barY - 3, 3, barH + 6);

  // Mash prompt
  ctx.save();
  ctx.font = '10px "Press Start 2P", monospace';
  ctx.textAlign = 'center';
  const blink = Math.sin(t * 0.35) * 0.4 + 0.6;
  ctx.globalAlpha = blink;
  ctx.fillStyle = '#ffd84a';
  ctx.shadowColor = '#ff3a00';
  ctx.shadowBlur = 10;
  ctx.fillText('MASH  Z  !', W/2, 76);
  ctx.restore();
}

// ---------- MELEE CLASH ----------
function startMeleeClash() {
  meleeClash = {
    pMash: 0,
    eMash: 0,
    zPrev: false,
    frame: 0,
    duration: 90,
    decided: false
  };
  // Zero velocity and lock positions
  player.vx = 0; player.vy = 0;
  enemy.vx = 0; enemy.vy = 0;
  player.state = 'punch'; player.stateTime = 12;
  enemy.state = 'punch'; enemy.stateTime = 12;
  announceText = 'FIST CLASH!';
  announceTimer = 50;
  shake = Math.max(shake, 10);
  const mx = (player.x + enemy.x) / 2;
  const my = (player.y + enemy.y) / 2 - 10;
  for (let i = 0; i < 40; i++) {
    addParticle(mx, my, i%2 ? '#ffffff' : '#ffd84a', 30,
      (Math.random()-0.5)*9, (Math.random()-0.5)*9, 3);
  }
}

function updateMeleeClash() {
  if (!meleeClash || !player || !enemy || finisher) { meleeClash = null; return; }
  meleeClash.frame++;
  // Hold fighters in place, face each other
  player.dir = Math.sign(enemy.x - player.x) || 1;
  enemy.dir = Math.sign(player.x - enemy.x) || -1;
  player.vx *= 0.3; player.vy *= 0.3;
  enemy.vx *= 0.3; enemy.vy *= 0.3;
  // Struggle jitter
  const jitter = 0.6;
  player.x += (Math.random()-0.5) * jitter;
  enemy.x += (Math.random()-0.5) * jitter;
  // Refresh punch sprite
  if (meleeClash.frame % 6 === 0) {
    player.state = 'punch'; player.stateTime = 6;
    enemy.state = 'punch'; enemy.stateTime = 6;
  }

  // Player mashes Z
  const zDown = !!keys['z'];
  if (zDown && !meleeClash.zPrev) meleeClash.pMash += 1;
  meleeClash.zPrev = zDown;
  // AI mash speed scaled by difficulty
  const diff = DIFFICULTIES[difficulty] || DIFFICULTIES.normal;
  if (Math.random() < 0.32 * diff.punch) meleeClash.eMash += 1;

  // Sparks at contact point every frame
  const mx = (player.x + enemy.x) / 2;
  const my = (player.y + enemy.y) / 2 - 12;
  for (let i = 0; i < 3; i++) {
    addParticle(mx + (Math.random()-0.5)*16, my + (Math.random()-0.5)*16,
      ['#ffffff','#ffd84a','#ff8820'][i%3], 14,
      (Math.random()-0.5)*6, (Math.random()-0.5)*6, 2);
  }
  shake = Math.max(shake, 2.2 + Math.sin(meleeClash.frame * 0.6));

  if (meleeClash.decided) return;
  if (meleeClash.frame >= meleeClash.duration) {
    const winner =
      meleeClash.pMash > meleeClash.eMash ? 'player' :
      meleeClash.eMash > meleeClash.pMash ? 'enemy' :
      (Math.random() < 0.5 ? 'player' : 'enemy');
    meleeClash.decided = true;
    meleeClashResolve(winner);
  }
}

function meleeClashResolve(winner) {
  const winF = winner === 'player' ? player : enemy;
  const loseF = winner === 'player' ? enemy : player;
  const combo = 24 * (winF.transformed ? 1.4 : 1);
  loseF.hp -= combo;
  loseF.vx += (winner === 'player' ? 1 : -1) * 7.5;
  loseF.vy -= 4.5;
  loseF.hurtTime = 44;
  loseF.flashing = 24;
  winF.ki = Math.min(winF.maxKi, winF.ki + 14);
  shake = Math.max(shake, 15);
  for (let k = 0; k < 60; k++) {
    addParticle(loseF.x, loseF.y - 14,
      ['#ffffff','#ffd84a','#ff5020','#ff3040'][k % 4], 40,
      (Math.random()-0.5)*10, (Math.random()-0.5)*10, 3);
  }
  for (let k = 0; k < 20; k++) {
    const a = (k / 20) * Math.PI * 2;
    addParticle(loseF.x, loseF.y - 14, '#ffffff', 24,
      Math.cos(a) * 4.5, Math.sin(a) * 4.5, 2);
  }
  announceText = winner === 'player' ? 'BROKE THROUGH!' : 'OUTFOUGHT!';
  announceTimer = 80;
  meleeClash = null;
}

function drawMeleeClash() {
  if (!meleeClash || !player || !enemy) return;
  const mx = (player.x + enemy.x) / 2;
  const my = (player.y + enemy.y) / 2 - 12;
  const t = meleeClash.frame;
  const r = 14 + Math.sin(t * 0.6) * 4;

  ctx.save();
  // Shock halo
  const halo = ctx.createRadialGradient(mx, my, 1, mx, my, r + 22);
  halo.addColorStop(0, '#ffffff');
  halo.addColorStop(0.35, '#ffd84a');
  halo.addColorStop(0.75, 'rgba(255, 80, 32, 0.55)');
  halo.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.globalAlpha = 0.9;
  ctx.fillStyle = halo;
  ctx.beginPath();
  ctx.arc(mx, my, r + 22, 0, Math.PI * 2);
  ctx.fill();

  // Star spikes
  ctx.globalAlpha = 1;
  ctx.strokeStyle = '#ffffff';
  ctx.lineWidth = 2;
  for (let i = 0; i < 10; i++) {
    const a = (i / 10) * Math.PI * 2 + t * 0.12;
    const r1 = r + 2;
    const r2 = r + 10 + Math.sin(t * 0.45 + i) * 5;
    ctx.beginPath();
    ctx.moveTo(mx + Math.cos(a) * r1, my + Math.sin(a) * r1);
    ctx.lineTo(mx + Math.cos(a) * r2, my + Math.sin(a) * r2);
    ctx.stroke();
  }

  // Hot core
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(mx + Math.sin(t * 0.9) * 2, my, r * 0.4, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Advantage bar
  const total = meleeClash.pMash + meleeClash.eMash + 1;
  const pRatio = (meleeClash.pMash + 0.5) / total;
  const barX = 90, barY = 52, barW = W - 180, barH = 5;
  ctx.fillStyle = '#000';
  ctx.fillRect(barX - 1, barY - 1, barW + 2, barH + 2);
  ctx.fillStyle = player.spec.accent;
  ctx.fillRect(barX, barY, barW * pRatio, barH);
  ctx.fillStyle = enemy.spec.accent;
  ctx.fillRect(barX + barW * pRatio, barY, barW * (1 - pRatio), barH);
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(barX + barW * pRatio - 1, barY - 2, 3, barH + 4);

  // Mash prompt
  ctx.save();
  ctx.font = '9px "Press Start 2P", monospace';
  ctx.textAlign = 'center';
  const blink = Math.sin(t * 0.4) * 0.4 + 0.6;
  ctx.globalAlpha = blink;
  ctx.fillStyle = '#ffd84a';
  ctx.shadowColor = '#ff3a00';
  ctx.shadowBlur = 10;
  ctx.fillText('MASH  Z  !', W/2, 74);
  ctx.restore();
}

function dash(f) {
  const s = f.spec;
  if (f.dashCd > 0 || f.ki < s.dashCost) return;
  f.dashCd = 40;
  f.ki -= s.dashCost;
  const dy = (keys['ArrowDown']||keys['s']) ? 1 : (keys['ArrowUp']||keys['w']) ? -1 : 0;
  const dx = (keys['ArrowLeft']||keys['a']) ? -1 : (keys['ArrowRight']||keys['d']) ? 1 : f.dir;
  f.vx = dx * s.dashPow;
  f.vy = dy * (s.dashPow * 0.75);
  f.state = 'dash';
  f.stateTime = 8;
  for (let i = 0; i < 10; i++) {
    addParticle(f.x, f.y - 12, s.accent, 14, -dx*Math.random()*2, (Math.random()-0.5)*2, 2);
  }
}

// ---------- UPDATE ----------
function updateFighter(f, other) {
  f.stateTime = Math.max(0, f.stateTime - 1);
  f.punchCd = Math.max(0, f.punchCd - 1);
  f.blastCd = Math.max(0, f.blastCd - 1);
  f.dashCd = Math.max(0, f.dashCd - 1);
  f.hurtTime = Math.max(0, f.hurtTime - 1);
  f.flashing = Math.max(0, f.flashing - 1);
  f.tagCd = Math.max(0, f.tagCd - 1);
  f.tagInvuln = Math.max(0, f.tagInvuln - 1);

  if (f.hp <= 0) return;

  // Transformation trigger — ki reaches max
  if (!f.transformed && f.ki >= f.maxKi - 0.5) {
    f.transformed = true;
    f.transformFrame = 0;
    shake = Math.max(shake, 12);
    const aura = f.spec.auraColor || f.spec.accent;
    for (let i = 0; i < 60; i++) {
      addParticle(f.x, f.y - 14, i % 3 === 0 ? '#ffffff' : (i % 3 === 1 ? '#ffe96a' : aura),
        40, (Math.random()-0.5)*7, -Math.random()*5 - 1, 3);
    }
    for (let k = 0; k < 24; k++) {
      const a = (k / 24) * Math.PI * 2;
      addParticle(f.x, f.y - 14, '#ffffff', 28, Math.cos(a) * 4, Math.sin(a) * 4, 2);
    }
    if (!f.isAI) { announceText = 'ASCENSION!'; announceTimer = 80; }
    else { announceText = 'RIVAL ASCENDS!'; announceTimer = 80; }
  }
  if (f.transformed) {
    f.transformFrame++;
    // Ki drain while transformed
    f.ki = Math.max(0, f.ki - 0.22);
    // Persistent aura
    f.aura = Math.max(f.aura, 0.7);
    if (Math.random() < 0.55) {
      addParticle(f.x + (Math.random()-0.5)*14, f.y - 10 + (Math.random()-0.5)*22,
        Math.random() < 0.5 ? '#ffe96a' : '#ffffff', 20,
        (Math.random()-0.5)*1.4, -Math.random()*2.2, 2);
    }
    if (f.ki < 8) {
      f.transformed = false;
      f.aura = 0;
      if (!f.isAI) { announceText = 'POWER FADES'; announceTimer = 60; }
    }
  }

  let moveX = 0, moveY = 0;
  let wantPunch = false, wantBlast = false, wantCharge = false, wantDash = false;

  if (!f.isAI) {
    if (keys['ArrowLeft'] || keys['a']) moveX -= 1;
    if (keys['ArrowRight'] || keys['d']) moveX += 1;
    if (keys['ArrowUp'] || keys['w']) moveY -= 1;
    if (keys['ArrowDown'] || keys['s']) moveY += 1;
    wantPunch = keys['z'];
    wantBlast = keys['x'];
    wantCharge = keys['c'];
    wantDash = keys['Shift'] || keys['shift'];
    if (keys['t']) { if (!tagKeyHeld) { tagKeyHeld = true; tagPlayer(); } } else tagKeyHeld = false;
    if (keys['f']) { if (!finKeyHeld) { finKeyHeld = true; startFinisher(); } } else finKeyHeld = false;
  } else {
    // AI: basic behavior — tuned by difficulty
    const diff = DIFFICULTIES[difficulty] || DIFFICULTIES.normal;
    const dx = other.x - f.x;
    const dy = other.y - f.y;
    const dist = Math.hypot(dx, dy);
    if (dist > 50) {
      moveX = Math.sign(dx) * 0.9 * diff.chaseAggro;
      moveY = Math.sign(dy) * 0.6 * diff.chaseAggro;
    } else if (dist < 30) {
      moveX = -Math.sign(dx) * 0.4;
    }
    moveX *= diff.moveMul;
    moveY *= diff.moveMul;
    if (dist < 28 && Math.random() < 0.12 * diff.punch) wantPunch = true;
    if (dist > 60 && dist < 220 && f.ki >= 30 && Math.random() < 0.035 * diff.blast) wantBlast = true;
    if (f.ki < 25 && Math.random() < 0.015 * diff.charge) wantCharge = true;
    if (dist < 60 && other.state === 'blast' && Math.random() < 0.08 * diff.dash) wantDash = true;
    if (f.hp < 40 && f.ki < 50 && Math.random() < 0.02 * diff.charge) wantCharge = true;
    // Rare beam commit
    if (f.ki > 60 && dist > 70 && dist < 260 && (f.beamCharge > 0 || Math.random() < 0.008 * diff.blast)) {
      wantBlast = true;
    }
    // Counter-beam: retaliate with our own when opponent fires
    if (other.beamActive && f.ki > 30 && dist < 320 && Math.abs(dy) < 40 && Math.random() < diff.counter) {
      wantBlast = true;
    }
    // Supreme Kai — elite reactions, precision beams, aggressive dodging
    if (difficulty === 'kai') {
      // ---- Precision beam targeting ----
      // Vertically align with target before firing, and prefer firing when lined up.
      const beamAligned = Math.abs(dy) < 18;
      if (f.ki > 25 && dist > 60 && dist < 300 && !beamAligned) {
        // Actively slide to the player's y-level
        moveY = Math.sign(dy) * 1.2;
      }
      // Fire beam (long charge commit) when aligned, plenty of ki, and in ideal range
      if (beamAligned && f.ki > 45 && dist > 80 && dist < 280) {
        wantBlast = true;
      }
      // Snap quick blasts when very well aligned horizontally (|dy| < 10) — high precision
      if (Math.abs(dy) < 10 && dist > 50 && dist < 240 && f.ki >= 30 && Math.random() < 0.18) {
        wantBlast = true;
      }
      // Instant counter-beam reaction (already covered by counter rule, reinforce here)
      if (other.beamActive && f.ki > 25 && Math.abs(dy) < 50) {
        wantBlast = true;
        // Snap to opponent's beam line for a clean counter
        moveY = Math.sign(dy) * 1.5;
      }

      // ---- Predictive dodge — wider window + lateral evasion ----
      let dodging = false;
      for (const p of projectiles) {
        if (p.owner === f) continue;
        const relX = p.x - f.x;
        // Only consider projectiles heading toward us
        const incoming = Math.sign(p.vx) === -Math.sign(relX);
        if (!incoming) continue;
        const pdx = Math.abs(relX);
        const pdy = Math.abs(p.y - (f.y - 14));
        // Estimate frames until impact
        const framesToHit = pdx / Math.max(0.1, Math.abs(p.vx));
        if (pdx < 160 && pdy < 42 && framesToHit < 40) {
          // Lateral evasion — slide perpendicular to incoming
          moveY = (p.y < f.y - 14 ? 1 : -1) * 1.8;
          // Dash-burst if available and very close
          if (f.dashCd === 0 && f.ki >= f.spec.dashCost && (pdx < 90 || framesToHit < 14)) {
            wantDash = true;
          }
          dodging = true;
          break;
        }
      }
      // Beam dodge — if opponent is actively beaming and we're in line
      if (!dodging && other.beamActive && Math.sign(other.x - f.x) === -other.dir && Math.abs(dy) < 40) {
        // Jump out of beam path
        moveY = (f.y - 14 > other.y - 10 ? 1 : -1) * 2.0;
        if (f.dashCd === 0 && f.ki >= f.spec.dashCost && Math.abs(dy) < 22) wantDash = true;
      }
    }
  }

  if (moveX !== 0) f.dir = Math.sign(moveX);
  // Turn to face opponent when not moving
  if (moveX === 0) f.dir = Math.sign(other.x - f.x) || f.dir;

  if (wantCharge && !wantDash) {
    f.state = 'charge';
    f.ki = Math.min(f.maxKi, f.ki + 1.2);
    f.aura = Math.min(1, f.aura + 0.1);
    moveX *= 0.3; moveY *= 0.3;
    // Ki aura particles
    if (Math.random() < 0.5) {
      addParticle(f.x + (Math.random()-0.5)*14, f.y - 10 + (Math.random()-0.5)*20,
        f.spec.auraColor || f.spec.accent, 18, (Math.random()-0.5)*0.6, -Math.random()*1.5, 2);
    }
  } else {
    f.aura = Math.max(0, f.aura - 0.05);
  }

  if (wantDash) dash(f);
  if (wantPunch) punch(f, other);
  // Beam charge / fire logic
  if (wantBlast) {
    f.beamCharge++;
    if (f.beamCharge >= 22 && f.ki >= 20) f.beamActive = true;
    if (f.beamActive) {
      if (f.ki <= 1) { f.beamActive = false; f.beamCharge = 0; }
      else {
        f.ki -= 1.3;
        f.state = 'blast';
        f.stateTime = 6;
        shake = Math.max(shake, 3);
        // Continuous damage to target in beam path
        const dxB = other.x - f.x;
        if (Math.sign(dxB) === f.dir && Math.abs(other.y - (f.y - 10)) < 34 && Math.abs(dxB) < 360 && other.tagInvuln === 0 && !clash) {
          other.hp -= 0.9 * (f.transformed ? 1.5 : 1);
          other.hurtTime = 6;
          other.flashing = 3;
          other.vx += f.dir * 0.8;
        }
        // Charge particles at hand
        if (Math.random() < 0.8) {
          addParticle(f.x + f.dir * 16, f.y - 10,
            f.spec.accent, 16, f.dir * (2 + Math.random()*3), (Math.random()-0.5)*2, 3);
        }
      }
    } else if (f.beamCharge > 2) {
      // Show charge halo at hand while charging
      if (Math.random() < 0.5) {
        addParticle(f.x + f.dir * 14, f.y - 10,
          f.spec.accent, 14, -f.dir * Math.random() * 0.6, -Math.random()*0.4, 2);
      }
    }
  } else {
    // Released — if short tap, fire normal blast
    if (f.beamCharge > 0 && f.beamCharge < 22) fireBlast(f);
    f.beamActive = false;
    f.beamCharge = 0;
  }

  // Flight physics — stage-dependent
  const stage = STAGES[stageIdx];
  if (f.state !== 'dash' || f.stateTime === 0) {
    const accel = 0.6 * f.spec.moveSpeed * (f.transformed ? 1.35 : 1);
    f.vx += moveX * accel;
    f.vy += moveY * accel;
    f.vx *= 0.86;
    f.vy *= stage.hasFloor ? 0.86 : 0.92;
    if (stage.hasFloor && moveY === 0 && f.y < stage.groundY - 40) f.vy += stage.gravity;
  }

  f.x += f.vx;
  f.y += f.vy;

  // Clamp to stage
  if (f.x < 12) { f.x = 12; f.vx = 0; }
  if (f.x > W - 12) { f.x = W - 12; f.vx = 0; }
  if (f.y < 30) { f.y = 30; f.vy = 0; }
  if (stage.hasFloor) {
    if (f.y > stage.groundY - 10) {
      f.y = stage.groundY - 10;
      f.vy = 0;
      if (Math.abs(f.vx) > 2) {
        for (let i = 0; i < 6; i++) addParticle(f.x, stage.groundY, stage.accent, 20, (Math.random()-0.5)*3, -Math.random()*2, 2);
      }
    }
  } else {
    // Void — clamp loosely to canvas
    if (f.y > H - 14) { f.y = H - 14; f.vy = 0; }
  }

  if (f.state === 'charge' && !wantCharge) f.state = 'idle';
  if (f.stateTime === 0 && ['punch','kick','blast','dash'].includes(f.state) && !f.beamActive) f.state = 'idle';
}

function updateProjectiles() {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    p.t++;
    // Trail
    if (p.t % 2 === 0) {
      addParticle(p.x, p.y, '#ffd84a', 14, (Math.random()-0.5)*0.6, (Math.random()-0.5)*0.6, p.size - 2);
    }
    // Check collision
    const target = p.owner === player ? enemy : player;
    const dx = target.x - p.x;
    const dy = (target.y - 16) - p.y;
    const hitR = p.size + 8;
    if (Math.abs(dx) < hitR && Math.abs(dy) < hitR + 4 && target.tagInvuln === 0) {
      target.hp -= p.power;
      target.vx += p.vx * (p.knock || 0.9);
      target.vy -= 3.5;
      target.hurtTime = 28;
      target.flashing = 14;
      shake = Math.max(shake, 10);
      projectiles.splice(i, 1);
      // Big explosion
      for (let k = 0; k < 40; k++) {
        addParticle(p.x, p.y, ['#ffd84a','#ffffff','#ff8820','#ff3a4a'][k%4], 32,
          (Math.random()-0.5)*8, (Math.random()-0.5)*8, 3 + (k%2));
      }
      // Shockwave ring
      for (let k = 0; k < 20; k++) {
        const a = (k / 20) * Math.PI * 2;
        addParticle(p.x, p.y, '#ffffff', 18,
          Math.cos(a) * 4, Math.sin(a) * 4, 2);
      }
      continue;
    }
    if (p.life <= 0 || p.x < -10 || p.x > W + 10) {
      projectiles.splice(i, 1);
    }
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ---------- DRAW ----------
// ---------- STAGES ----------
function drawNeonStation(c, t, w, h, gy) {
  // Deep space with neon grid floor
  const g = c.createLinearGradient(0, 0, 0, gy);
  g.addColorStop(0, '#02000a');
  g.addColorStop(0.7, '#0a0220');
  g.addColorStop(1, '#18004a');
  c.fillStyle = g;
  c.fillRect(0, 0, w, gy);

  // Stars + flicker
  for (let i = 0; i < 60; i++) {
    const sx = (i * 53) % w;
    const sy = (i * 29) % (gy - 20);
    const tw = 0.5 + Math.sin(t * 0.05 + i) * 0.5;
    c.globalAlpha = 0.4 + tw * 0.6;
    c.fillStyle = i % 4 === 0 ? '#ff4ae6' : '#ffffff';
    c.fillRect(sx, sy, 1, 1);
  }
  c.globalAlpha = 1;

  // Distant nebula glow
  const neb = c.createRadialGradient(w * 0.75, 60, 5, w * 0.75, 60, 110);
  neb.addColorStop(0, 'rgba(255, 74, 230, 0.3)');
  neb.addColorStop(1, 'rgba(0,0,0,0)');
  c.fillStyle = neb;
  c.fillRect(0, 0, w, gy);
  const neb2 = c.createRadialGradient(w * 0.2, 80, 5, w * 0.2, 80, 120);
  neb2.addColorStop(0, 'rgba(74, 200, 255, 0.25)');
  neb2.addColorStop(1, 'rgba(0,0,0,0)');
  c.fillStyle = neb2;
  c.fillRect(0, 0, w, gy);

  // Station silhouette
  c.fillStyle = '#0a0428';
  c.fillRect(40, gy - 56, 130, 48);
  c.fillRect(w - 180, gy - 62, 140, 54);
  c.fillStyle = '#ff4ae6';
  for (let i = 0; i < 8; i++) {
    const on = Math.sin(t * 0.1 + i) > 0 ? 1 : 0.3;
    c.globalAlpha = on;
    c.fillRect(48 + i * 14, gy - 44, 4, 4);
    c.fillRect(w - 170 + i * 14, gy - 48, 4, 4);
  }
  c.globalAlpha = 1;
  c.fillStyle = '#4ac8ff';
  c.fillRect(60, gy - 56, 8, 2);
  c.fillRect(w - 100, gy - 62, 8, 2);

  // Neon grid floor (perspective)
  c.fillStyle = '#050012';
  c.fillRect(0, gy, w, h - gy);
  c.strokeStyle = '#ff4ae6';
  c.lineWidth = 1;
  c.globalAlpha = 0.9;
  // Horizontal lines receding
  for (let i = 0; i < 8; i++) {
    const yy = gy + Math.pow(i / 7, 2) * (h - gy);
    c.beginPath();
    c.moveTo(0, yy);
    c.lineTo(w, yy);
    c.stroke();
  }
  // Vanishing-point vertical lines
  c.strokeStyle = '#4ac8ff';
  const vpX = w / 2;
  for (let i = -10; i <= 10; i++) {
    c.beginPath();
    c.moveTo(vpX + i * 50, gy);
    c.lineTo(vpX + i * 240, h);
    c.stroke();
  }
  c.globalAlpha = 1;
}

function drawVolcanic(c, t, w, h, gy) {
  // Molten sky
  const g = c.createLinearGradient(0, 0, 0, gy);
  g.addColorStop(0, '#1a0000');
  g.addColorStop(0.4, '#6a0a08');
  g.addColorStop(1, '#ff3008');
  c.fillStyle = g;
  c.fillRect(0, 0, w, gy);

  // Smoke clouds
  c.fillStyle = 'rgba(20, 0, 0, 0.5)';
  for (let i = 0; i < 6; i++) {
    const cx = ((i * 90 + t * 0.3) % (w + 120)) - 60;
    const cy = 30 + (i % 3) * 18;
    c.beginPath();
    c.arc(cx, cy, 22, 0, Math.PI * 2);
    c.arc(cx + 16, cy - 4, 18, 0, Math.PI * 2);
    c.arc(cx - 14, cy + 2, 16, 0, Math.PI * 2);
    c.fill();
  }

  // Distant mountains / caldera
  c.fillStyle = '#2a0000';
  c.beginPath();
  c.moveTo(0, gy);
  for (let x = 0; x <= w; x += 26) {
    c.lineTo(x, gy - 40 - Math.sin(x * 0.04) * 22 - Math.cos(x * 0.02) * 14);
  }
  c.lineTo(w, gy);
  c.fill();

  // Lava glow on mountain tips
  c.strokeStyle = 'rgba(255, 160, 40, 0.5)';
  c.lineWidth = 2;
  c.beginPath();
  c.moveTo(0, gy - 20);
  for (let x = 0; x <= w; x += 26) {
    c.lineTo(x, gy - 40 - Math.sin(x * 0.04) * 22 - Math.cos(x * 0.02) * 14);
  }
  c.stroke();

  // Throne in background
  c.fillStyle = '#1a0000';
  c.fillRect(w/2 - 30, gy - 80, 60, 60);
  c.fillRect(w/2 - 36, gy - 90, 72, 14);
  c.fillRect(w/2 - 42, gy - 20, 84, 12);
  c.fillStyle = '#ffaa22';
  c.fillRect(w/2 - 8, gy - 70, 4, 20);
  c.fillRect(w/2 + 4, gy - 70, 4, 20);

  // Stone ground
  c.fillStyle = '#2a0a02';
  c.fillRect(0, gy, w, h - gy);
  c.fillStyle = '#6a1a06';
  for (let x = 0; x < w; x += 10) {
    c.fillRect(x, gy + 2 + (x % 20 === 0 ? 0 : 3), 6, 2);
  }

  // Lava cracks in ground
  c.fillStyle = '#ffaa22';
  for (let x = 0; x < w; x += 18) {
    const hh = Math.sin(t * 0.1 + x) * 0.5 + 0.5;
    c.globalAlpha = 0.6 + hh * 0.4;
    c.fillRect(x, gy + 6, 4, 1);
    c.fillRect(x + 2, gy + 10, 3, 1);
  }
  c.globalAlpha = 1;

  // Floating embers
  for (let i = 0; i < 30; i++) {
    const ex = ((i * 47 + t * 0.8) % w);
    const ey = (gy - ((t * 0.5 + i * 40) % (gy + 80))) + (i % 3) * 4;
    c.fillStyle = i % 2 ? '#ffaa22' : '#ff5020';
    c.globalAlpha = 0.4 + (Math.sin(t * 0.05 + i) * 0.5 + 0.5) * 0.6;
    c.fillRect(ex, ey, 2, 2);
  }
  c.globalAlpha = 1;
}

function drawVoid(c, t, w, h) {
  // Deep nebula — no ground, full-screen
  const g = c.createLinearGradient(0, 0, 0, h);
  g.addColorStop(0, '#02000a');
  g.addColorStop(0.5, '#0a0028');
  g.addColorStop(1, '#02000a');
  c.fillStyle = g;
  c.fillRect(0, 0, w, h);

  // Swirling nebula clouds
  const clouds = [
    { x: 0.25, y: 0.3, r: 120, color: 'rgba(74, 200, 255, 0.2)' },
    { x: 0.75, y: 0.45, r: 150, color: 'rgba(200, 74, 255, 0.2)' },
    { x: 0.5, y: 0.8, r: 110, color: 'rgba(255, 200, 74, 0.15)' }
  ];
  for (const cl of clouds) {
    const cx = cl.x * w + Math.sin(t * 0.01) * 10;
    const cy = cl.y * h + Math.cos(t * 0.008) * 8;
    const ng = c.createRadialGradient(cx, cy, 5, cx, cy, cl.r);
    ng.addColorStop(0, cl.color);
    ng.addColorStop(1, 'rgba(0,0,0,0)');
    c.fillStyle = ng;
    c.fillRect(0, 0, w, h);
  }

  // Stars — layered depth
  for (let i = 0; i < 120; i++) {
    const sx = (i * 53 + Math.sin(t * 0.005 + i) * 2) % w;
    const sy = (i * 37) % h;
    const tw = Math.sin(t * 0.06 + i) * 0.5 + 0.5;
    c.globalAlpha = 0.3 + tw * 0.7;
    c.fillStyle = i % 5 === 0 ? '#c0e0ff' : '#ffffff';
    c.fillRect(sx, sy, 1, 1);
  }
  c.globalAlpha = 1;

  // Floating asteroids
  for (let i = 0; i < 6; i++) {
    const ax = ((i * 90 + t * 0.2) % (w + 60)) - 30;
    const ay = 60 + (i * 37) % (h - 120) + Math.sin(t * 0.01 + i) * 8;
    c.fillStyle = '#3a3a4a';
    c.beginPath();
    c.arc(ax, ay, 8 + (i % 3) * 3, 0, Math.PI * 2);
    c.fill();
    c.fillStyle = '#1a1a28';
    c.fillRect(ax - 4, ay - 2, 3, 2);
    c.fillRect(ax + 1, ay + 1, 2, 2);
  }

  // Distant planet
  const pg = c.createRadialGradient(w - 80, 50, 4, w - 80, 50, 40);
  pg.addColorStop(0, '#ff6aa0');
  pg.addColorStop(0.5, '#8a3aff');
  pg.addColorStop(1, 'rgba(0,0,0,0)');
  c.fillStyle = pg;
  c.beginPath();
  c.arc(w - 80, 50, 40, 0, Math.PI * 2);
  c.fill();
  // Planet ring
  c.strokeStyle = 'rgba(255, 200, 255, 0.4)';
  c.lineWidth = 1;
  c.beginPath();
  c.ellipse(w - 80, 50, 50, 10, -0.3, 0, Math.PI * 2);
  c.stroke();
}
