function drawFighter(f) {
  if (!f) return;
  if (f.hp <= 0 && !finisher) return;
  const fx = Math.round(f.x);
  const fy = Math.round(f.y);

  // Transformation color override — gold hair, white/gold accent
  const _acc = f.accent, _hair = f.hairColor;
  if (f.transformed) {
    f.accent = '#ffe96a';
    f.hairColor = '#ffe96a';
  }

  ctx.save();
  if (f.flashing > 0 && f.flashing % 2 === 0) {
    ctx.globalAlpha = 0.3;
  }

  // Transformed mega-aura (larger + pulsing gold)
  if (f.transformed) {
    const tp = Math.sin(Date.now() * 0.02) * 4;
    const bigR = 30 + tp;
    const bigG = ctx.createRadialGradient(fx, fy - 16, 2, fx, fy - 16, bigR);
    bigG.addColorStop(0, 'rgba(255, 255, 255, 0.9)');
    bigG.addColorStop(0.3, 'rgba(255, 233, 106, 0.7)');
    bigG.addColorStop(0.7, 'rgba(255, 150, 30, 0.3)');
    bigG.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.globalAlpha = 0.85;
    ctx.fillStyle = bigG;
    ctx.beginPath();
    ctx.arc(fx, fy - 16, bigR, 0, Math.PI * 2);
    ctx.fill();
    // Vertical energy streaks
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 1;
    ctx.globalAlpha = 0.7;
    for (let k = 0; k < 5; k++) {
      const sx = fx + (Math.random()-0.5) * 20;
      const sy = fy - 20 + (Math.random()-0.5) * 18;
      ctx.beginPath();
      ctx.moveTo(sx, sy);
      ctx.lineTo(sx, sy - 6 - Math.random() * 6);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;
  }

  // Aura
  if (f.aura > 0.1 || f.state === 'charge') {
    const ar = 18 + Math.sin(Date.now() * 0.02) * 3;
    const aGrad = ctx.createRadialGradient(fx, fy - 16, 2, fx, fy - 16, ar);
    aGrad.addColorStop(0, f.transformed ? 'rgba(255, 255, 255, 0.85)' : (f.spec.auraGlow || 'rgba(255, 216, 74, 0.6)'));
    aGrad.addColorStop(0.5, f.transformed ? '#ffe96a' : (f.spec.auraColor || f.spec.accent));
    aGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.globalAlpha = 0.6;
    ctx.fillStyle = aGrad;
    ctx.beginPath();
    ctx.arc(fx, fy - 16, ar, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Body — pixel sprite
  const p = (x, y, w, h, c) => { ctx.fillStyle = c; ctx.fillRect(fx + x, fy + y, w, h); };
  const dir = f.dir;

  // Legs (hidden during kick — kick block draws its own)
  if (f.state !== 'kick') {
    p(-4, -8, 3, 8, f.color);
    p(1, -8, 3, 8, f.color);
    p(-5, -2, 4, 3, '#2a1a10');
    p(1, -2, 4, 3, '#2a1a10');
  }

  // Torso
  p(-5, -20, 10, 12, f.color);
  p(-5, -20, 10, 2, f.accent); // belt top
  p(-5, -10, 10, 2, f.accent); // belt
  // Symbol
  p(-1, -16, 2, 2, f.accent);

  // Kick animation (roundhouse): overrides arms/legs
  if (f.state === 'kick') {
    // Spinning body tilt
    const phase = (14 - f.stateTime) / 14;
    const tilt = Math.sin(phase * Math.PI) * 6;
    // Standing leg (bent)
    p(-2, -8, 3, 8, f.color);
    p(-3, -2, 4, 3, '#2a1a10');
    // Extended kick leg (horizontal blur)
    const legX = dir > 0 ? 3 : -13;
    p(legX, -14 + tilt, 10, 4, f.color);
    p(legX + (dir > 0 ? 10 : -3), -15 + tilt, 3, 6, '#2a1a10'); // boot
    // Speed lines
    ctx.fillStyle = '#ffffff';
    for (let k = 0; k < 3; k++) {
      ctx.fillRect(fx + legX + (dir > 0 ? -4 - k*3 : 12 + k*3), fy - 14 + tilt + k, 2, 1);
    }
    // Arms tucked
    p(-5, -18, 3, 6, f.color);
    p(2, -18, 3, 6, f.color);
  } else if (f.state === 'punch') {
    p(-5 + (dir > 0 ? 10 : -3), -18, 6, 3, f.color);
    p(-5 + (dir > 0 ? 14 : -6), -19, 3, 4, '#f0c090'); // fist
  } else if (f.state === 'blast') {
    p(-5 + (dir > 0 ? 10 : -4), -18, 4, 4, f.color);
    // Glowing hand
    ctx.fillStyle = '#ffd84a';
    ctx.beginPath();
    ctx.arc(fx + (dir > 0 ? 10 : -10), fy - 16, 4, 0, Math.PI * 2);
    ctx.fill();
  } else {
    p(-7, -18, 3, 8, f.color);
    p(4, -18, 3, 8, f.color);
    p(-7, -11, 3, 3, '#f0c090'); // hands
    p(4, -11, 3, 3, '#f0c090');
  }

  // Head
  p(-4, -28, 8, 8, '#f0c090'); // face
  // Hair (spiky)
  p(-5, -30, 10, 3, f.hairColor);
  p(-6, -28, 2, 2, f.hairColor);
  p(4, -28, 2, 2, f.hairColor);
  p(-3, -32, 2, 2, f.hairColor);
  p(1, -32, 2, 2, f.hairColor);
  p(3, -33, 2, 2, f.hairColor);
  // Eyes
  p(-3 + (dir > 0 ? 0 : 0), -25, 2, 2, '#000');
  p(1, -25, 2, 2, '#000');
  // Eye shine
  p(-2 + (dir > 0 ? 0 : 0), -25, 1, 1, '#fff');
  p(2, -25, 1, 1, '#fff');

  ctx.restore();
  // Restore original colors after transform swap
  f.accent = _acc;
  f.hairColor = _hair;
}

function drawProjectile(p) {
  const pulse = 1 + Math.sin(p.t * 0.5) * 0.12;
  const r = (p.size + 10) * pulse;
  const c1 = p.color1 || '#ffd84a';
  const c2 = p.color2 || '#ff8820';
  // Wide outer halo
  const halo = ctx.createRadialGradient(p.x, p.y, 1, p.x, p.y, r + 10);
  halo.addColorStop(0, c1);
  halo.addColorStop(0.4, c2);
  halo.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.globalAlpha = 0.5;
  ctx.fillStyle = halo;
  ctx.beginPath();
  ctx.arc(p.x, p.y, r + 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
  // Main orb
  const grad = ctx.createRadialGradient(p.x, p.y, 1, p.x, p.y, r);
  grad.addColorStop(0, '#ffffff');
  grad.addColorStop(0.3, '#ffffe0');
  grad.addColorStop(0.6, c1);
  grad.addColorStop(1, c2);
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
  ctx.fill();
  // Hot core
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(p.x - p.vx * 0.4, p.y, (p.size - 2) * pulse, 0, Math.PI * 2);
  ctx.fill();
  // Comet tail streak
  ctx.save();
  ctx.globalAlpha = 0.4;
  const tGrad = ctx.createLinearGradient(p.x - p.vx * 6, p.y, p.x, p.y);
  tGrad.addColorStop(0, 'rgba(0, 0, 0, 0)');
  tGrad.addColorStop(1, c1);
  ctx.fillStyle = tGrad;
  ctx.beginPath();
  ctx.ellipse(p.x - p.vx * 3, p.y, p.size * 2.5, p.size * 0.8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawBeam(f) {
  if (!f.beamActive) return;
  const sx = f.x + f.dir * 14;
  const sy = f.y - 10;
  let ex;
  if (clash) {
    ex = clash.midX;
  } else {
    ex = f.dir > 0 ? W + 20 : -20;
  }
  const len = Math.abs(ex - sx);
  const s = f.spec;
  const wobble = Math.sin(frameT * 0.8) * 1.5;

  ctx.save();
  // Outer soft glow
  const g1 = ctx.createLinearGradient(sx, 0, ex, 0);
  g1.addColorStop(0, s.accent);
  g1.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.globalAlpha = 0.55;
  ctx.fillStyle = g1;
  const startX = f.dir > 0 ? sx : ex;
  ctx.fillRect(startX, sy - 28 + wobble, len, 56);

  // Main beam
  const g2 = ctx.createLinearGradient(sx, 0, ex, 0);
  g2.addColorStop(0, '#ffffff');
  g2.addColorStop(0.25, s.accent);
  g2.addColorStop(1, s.color);
  ctx.globalAlpha = 0.95;
  ctx.fillStyle = g2;
  ctx.fillRect(startX, sy - 14 + wobble, len, 28);

  // Hot core
  ctx.fillStyle = '#ffffff';
  ctx.globalAlpha = 1;
  ctx.fillRect(startX, sy - 5, len, 10);

  // Source burst
  const burstR = 22 + Math.sin(frameT * 0.4) * 4;
  const bg = ctx.createRadialGradient(sx, sy, 2, sx, sy, burstR);
  bg.addColorStop(0, '#ffffff');
  bg.addColorStop(0.4, s.accent);
  bg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = bg;
  ctx.beginPath();
  ctx.arc(sx, sy, burstR, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawParticles() {
  for (const pt of particles) {
    const a = pt.life / pt.maxLife;
    ctx.globalAlpha = a;
    ctx.fillStyle = pt.color;
    ctx.fillRect(pt.x | 0, pt.y | 0, pt.size, pt.size);
  }
  ctx.globalAlpha = 1;
}

// ---------- INTRO CINEMATIC ----------
function drawSideSprite(spec, cx, cy, scale, flip) {
  const px = (x, y, w, h, c) => {
    ctx.fillStyle = c;
    const rx = flip ? -1 : 1;
    const drawX = cx + (flip ? (-x - w) : x) * scale;
    ctx.fillRect(drawX, cy + y * scale, w * scale, h * scale);
  };
  // Legs
  px(-4, -8, 3, 8, spec.color);
  px(1, -8, 3, 8, spec.color);
  px(-5, -2, 4, 3, '#2a1a10');
  px(1, -2, 4, 3, '#2a1a10');
  // Torso
  px(-5, -20, 10, 12, spec.color);
  px(-5, -20, 10, 2, spec.accent);
  px(-5, -10, 10, 2, spec.accent);
  px(-1, -16, 2, 2, spec.accent);
  // Arms
  px(-7, -18, 3, 8, spec.color);
  px(4, -18, 3, 8, spec.color);
  px(-7, -11, 3, 3, '#f0c090');
  px(4, -11, 3, 3, '#f0c090');
  // Head
  px(-4, -28, 8, 8, '#f0c090');
  px(-5, -30, 10, 3, spec.hair);
  px(-6, -28, 2, 2, spec.hair);
  px(4, -28, 2, 2, spec.hair);
  px(-3, -32, 2, 2, spec.hair);
  px(1, -32, 2, 2, spec.hair);
  px(3, -33, 2, 2, spec.hair);
  px(-3, -25, 2, 2, '#000');
  px(1, -25, 2, 2, '#000');
  px(-2, -25, 1, 1, '#fff');
  px(2, -25, 1, 1, '#fff');
}

function drawTeamCard(side, teamSpecs, label, phaseFrame) {
  // side: 'left' = slides from left, 'right' = slides from right
  // phaseFrame: 0..110 (within this team's phase)
  const ease = (t) => 1 - Math.pow(1 - t, 3);
  const slideT = Math.min(1, phaseFrame / 18);
  const outT = phaseFrame > 92 ? Math.min(1, (phaseFrame - 92) / 18) : 0;
  const offRaw = (1 - ease(slideT)) * (side === 'left' ? -W : W) + ease(outT) * (side === 'left' ? -W : W);
  const offY = 0;

  ctx.save();
  ctx.translate(offRaw, offY);

  // Dark vertical band
  const bandX = side === 'left' ? 20 : W - 220;
  const bandW = 200;
  const bandY = 40;
  const bandH = 180;

  // Diagonal accent slash behind card
  const main = teamSpecs[0];
  ctx.save();
  ctx.fillStyle = main.auraGlow || (main.accent + '44');
  ctx.beginPath();
  if (side === 'left') {
    ctx.moveTo(0, bandY - 10);
    ctx.lineTo(bandX + bandW + 30, bandY - 10);
    ctx.lineTo(bandX + bandW - 10, bandY + bandH + 20);
    ctx.lineTo(0, bandY + bandH + 20);
  } else {
    ctx.moveTo(W, bandY - 10);
    ctx.lineTo(bandX - 30, bandY - 10);
    ctx.lineTo(bandX + 10, bandY + bandH + 20);
    ctx.lineTo(W, bandY + bandH + 20);
  }
  ctx.fill();
  ctx.restore();

  // Main card background
  ctx.fillStyle = 'rgba(0, 0, 0, 0.82)';
  ctx.fillRect(bandX, bandY, bandW, bandH);
  ctx.strokeStyle = main.accent;
  ctx.lineWidth = 3;
  ctx.strokeRect(bandX, bandY, bandW, bandH);

  // Label (PLAYER / CHALLENGER)
  ctx.font = '9px "Press Start 2P", monospace';
  ctx.textAlign = side === 'left' ? 'left' : 'right';
  ctx.fillStyle = main.accent;
  ctx.fillText(label, side === 'left' ? bandX + 10 : bandX + bandW - 10, bandY + 20);

  // Team names stacked
  ctx.font = '11px "Press Start 2P", monospace';
  ctx.fillStyle = '#fff8e2';
  const name1 = teamSpecs[0].name;
  const name2 = teamSpecs[1] ? teamSpecs[1].name : '';
  // Character reveal: letter by letter during first 24 frames
  const charsShown = Math.min(name1.length + name2.length + 2, Math.floor(phaseFrame * 1.2));
  const shown1 = name1.slice(0, Math.min(name1.length, charsShown));
  const shown2 = charsShown > name1.length + 1 ? name2.slice(0, charsShown - name1.length - 1) : '';
  ctx.shadowColor = main.color;
  ctx.shadowBlur = 8;
  ctx.fillText(shown1, side === 'left' ? bandX + 10 : bandX + bandW - 10, bandY + 50);
  ctx.font = '8px "Press Start 2P", monospace';
  ctx.fillStyle = '#c8b890';
  ctx.fillText('& ' + shown2, side === 'left' ? bandX + 10 : bandX + bandW - 10, bandY + 68);
  ctx.shadowBlur = 0;

  // Class
  if (phaseFrame > 28) {
    ctx.font = '7px "Press Start 2P", monospace';
    ctx.fillStyle = teamSpecs[0].accent;
    ctx.fillText(teamSpecs[0].class, side === 'left' ? bandX + 10 : bandX + bandW - 10, bandY + 86);
  }

  // Sprites inside card
  ctx.textAlign = 'left';
  const spriteScale = 2;
  const baseY = bandY + bandH - 20;
  const flipMain = side === 'right';
  drawSideSprite(teamSpecs[0], bandX + (side === 'left' ? bandW - 56 : 56), baseY, spriteScale, flipMain);
  if (phaseFrame > 30 && teamSpecs[1]) {
    ctx.globalAlpha = 0.6;
    drawSideSprite(teamSpecs[1], bandX + (side === 'left' ? bandW - 108 : 108), baseY - 2, spriteScale - 0.4, flipMain);
    ctx.globalAlpha = 1;
  }

  ctx.restore();
}

function drawIntro() {
  // Darken background
  ctx.fillStyle = 'rgba(0, 0, 0, 0.55)';
  ctx.fillRect(0, 0, W, H);

  // Scanlines for drama
  ctx.fillStyle = 'rgba(255, 216, 74, 0.04)';
  for (let y = 0; y < H; y += 3) ctx.fillRect(0, y, W, 1);

  if (introFrame < 110) {
    drawTeamCard('left', playerTeamSpecs, playerName.toUpperCase(), introFrame);
  } else if (introFrame < 220) {
    drawTeamCard('right', enemyTeamSpecs, 'CHALLENGER', introFrame - 110);
  } else {
    // VS / READY / FIGHT build-up
    const rf = introFrame - 220;
    ctx.save();
    ctx.textAlign = 'center';
    ctx.font = '28px "Press Start 2P", monospace';
    ctx.fillStyle = '#ffd84a';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 4;
    ctx.shadowColor = '#ff3a00';
    ctx.shadowBlur = 16;
    const scale = 1 + Math.sin(rf * 0.3) * 0.05;
    ctx.translate(W/2, H/2);
    ctx.scale(scale, scale);
    ctx.strokeText('READY?', 0, 0);
    ctx.fillText('READY?', 0, 0);
    ctx.restore();
  }

  // Title banner sliding across
  if (introFrame > 14 && introFrame < 226) {
    ctx.save();
    ctx.font = '10px "Press Start 2P", monospace';
    ctx.fillStyle = '#ffd84a';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#ff3a00';
    ctx.shadowBlur = 6;
    ctx.fillText(STAGES[stageIdx].name + ' — ROUND 1', W/2, 24);
    ctx.restore();
  }
}

function drawAfterimages() {
  if (!finisher || !player) return;
  const origX = player.x, origY = player.y, origDir = player.dir;
  const origFlash = player.flashing, origState = player.state, origAura = player.aura;
  for (const ai of finisher.afterimages) {
    const a = (ai.life / ai.maxLife) * 0.5;
    ctx.save();
    ctx.globalAlpha = a;
    player.x = ai.x; player.y = ai.y; player.dir = ai.dir;
    player.flashing = 0; player.state = 'dash'; player.aura = 0;
    drawFighter(player);
    ctx.restore();
  }
  player.x = origX; player.y = origY; player.dir = origDir;
  player.flashing = origFlash; player.state = origState; player.aura = origAura;
}

function drawShockRings() {
  if (!finisher) return;
  ctx.save();
  for (const r of finisher.shockRings) {
    const a = r.life / 30;
    ctx.globalAlpha = a;
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
    ctx.stroke();
    ctx.strokeStyle = '#ffd84a';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.r * 0.85, 0, Math.PI * 2);
    ctx.stroke();
  }
  ctx.restore();
}

function drawFinisherFX() {
  if (!finisher) return;
  const f = finisher;
  const fr = f.frame;

  // Vignette (darken edges, not center on enemy)
  const vignetteAlpha = fr < 54
    ? Math.min(0.55, fr * 0.02)
    : fr < 78 ? 0.65
    : Math.max(0, 0.65 - (fr - 78) * 0.008);
  if (vignetteAlpha > 0 && enemy) {
    const vg = ctx.createRadialGradient(enemy.x, enemy.y - 14, 20, enemy.x, enemy.y - 14, 220);
    vg.addColorStop(0, 'rgba(0,0,0,0)');
    vg.addColorStop(1, `rgba(0,0,0,${vignetteAlpha})`);
    ctx.fillStyle = vg;
    ctx.fillRect(0, 0, W, H);
  }

  // Charge lines converging on enemy (phase 1)
  if (fr < 28 && enemy) {
    ctx.save();
    ctx.strokeStyle = '#ffd84a';
    ctx.lineWidth = 2;
    ctx.globalAlpha = 0.9;
    for (let i = 0; i < 14; i++) {
      const ang = (i / 14) * Math.PI * 2 + fr * 0.08;
      const r1 = Math.max(10, 180 - fr * 5);
      const r2 = Math.max(6, 70 - fr * 2.2);
      if (r1 <= r2) continue;
      ctx.beginPath();
      ctx.moveTo(enemy.x + Math.cos(ang) * r1, (enemy.y - 14) + Math.sin(ang) * r1);
      ctx.lineTo(enemy.x + Math.cos(ang) * r2, (enemy.y - 14) + Math.sin(ang) * r2);
      ctx.stroke();
    }
    ctx.restore();
  }

  // Horizontal speed lines during dash (phase 3)
  if (fr >= 34 && fr < 54) {
    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.55)';
    ctx.lineWidth = 2;
    for (let i = 0; i < 22; i++) {
      const y = (i * 14 + fr * 6) % H;
      ctx.beginPath();
      ctx.moveTo(0, y); ctx.lineTo(W, y);
      ctx.stroke();
    }
    ctx.restore();
  }

  // Impact flash — hard white pulse + chromatic tint residue
  if (fr >= 54 && fr < 72) {
    const off = fr - 54;
    let a;
    if (off < 3) a = 1;                // hard white 3 frames
    else if (off < 8) a = 1 - (off - 3) / 5; // fade to 0
    else a = 0;
    if (a > 0) {
      ctx.fillStyle = `rgba(255, 255, 255, ${a})`;
      ctx.fillRect(0, 0, W, H);
    }
    // Residual red tint for 12 frames after
    if (off >= 3 && off < 16) {
      const t = Math.max(0, 0.22 - (off - 3) * 0.018);
      ctx.fillStyle = `rgba(255, 50, 30, ${t})`;
      ctx.fillRect(0, 0, W, H);
    }
  }

  // Hit-stop radial impact burst streaks (static star)
  if (fr >= 54 && fr < 78 && enemy) {
    ctx.save();
    ctx.strokeStyle = '#ffffff';
    ctx.lineWidth = 3;
    const t = (fr - 54) / 24;
    const len = 50 + (1 - t) * 60;
    for (let i = 0; i < 8; i++) {
      const a = (i / 8) * Math.PI * 2;
      ctx.globalAlpha = 1 - t;
      ctx.beginPath();
      ctx.moveTo(enemy.x + Math.cos(a) * 14, (enemy.y - 14) + Math.sin(a) * 14);
      ctx.lineTo(enemy.x + Math.cos(a) * (14 + len), (enemy.y - 14) + Math.sin(a) * (14 + len));
      ctx.stroke();
    }
    ctx.restore();
  }

  // Letterbox bars slide in for cinematic feel
  const barH = fr < 10 ? fr * 2.4
    : fr < 170 ? 24
    : Math.max(0, 24 - (fr - 170) * 2.4);
  if (barH > 0) {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, W, barH);
    ctx.fillRect(0, H - barH, W, barH);
  }

  // Banner
  let txt = null;
  let bannerY = 42;
  if (fr >= 4 && fr < 52) txt = 'FINISHING MOVE';
  else if (fr >= 54 && fr < 170) { txt = 'K.O.'; bannerY = 58; }
  if (txt) {
    ctx.save();
    ctx.textAlign = 'center';
    const isKO = txt === 'K.O.';
    let scale = 1;
    if (isKO) {
      const koFr = fr - 54;
      if (koFr < 6) scale = 1 + (6 - koFr) * 0.4;  // punch-in
      else if (koFr < 120) scale = 1 + Math.sin(koFr * 0.2) * 0.06;
      else scale = Math.max(0, 1 - (koFr - 120) / 40);
    }
    ctx.translate(W/2, bannerY);
    ctx.scale(scale, scale);
    ctx.font = (isKO ? '32px' : '18px') + ' "Press Start 2P", monospace';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 5;
    ctx.shadowColor = isKO ? '#ff0030' : '#ff3a00';
    ctx.shadowBlur = 18;
    ctx.strokeText(txt, 0, 0);
    ctx.fillStyle = '#ffd84a';
    ctx.fillText(txt, 0, 0);
    ctx.restore();
  }
}

function drawUI() {
  if (!player || !enemy) return;
  // Player bars (left)
  drawBar(8, 8, 180, 10, player.hp / player.maxHp, '#ff3a4a', '#5a0a10');
  drawBar(8, 20, 180, 6, player.ki / player.maxKi, '#3fa9ff', '#0a1a40');
  ctx.fillStyle = '#fff8e2';
  ctx.font = '8px "Press Start 2P", monospace';
  ctx.fillText(playerName + ' / ' + player.spec.name, 8, 38);

  // Enemy bars (right)
  drawBar(W - 188, 8, 180, 10, enemy.hp / enemy.maxHp, '#ff3a4a', '#5a0a10');
  drawBar(W - 188, 20, 180, 6, enemy.ki / enemy.maxKi, '#3fa9ff', '#0a1a40');
  const enText = 'CPU / ' + enemy.spec.name;
  ctx.textAlign = 'right';
  ctx.fillText(enText, W - 8, 38);
  ctx.textAlign = 'left';

  // Reserve bars
  const pRes = playerTeam[1 - playerIdx];
  if (pRes && pRes !== player) {
    drawBar(8, 48, 120, 4, Math.max(0, pRes.hp) / pRes.maxHp, '#b04a4a', '#3a0a10');
    ctx.font = '6px "Press Start 2P", monospace';
    ctx.fillStyle = pRes.hp > 0 ? '#c8b890' : '#5a3a3a';
    ctx.fillText('RES ' + pRes.spec.name, 8, 60);
  }
  const eRes = enemyTeam[1 - enemyIdx];
  if (eRes && eRes !== enemy) {
    drawBar(W - 128, 48, 120, 4, Math.max(0, eRes.hp) / eRes.maxHp, '#b04a4a', '#3a0a10');
    ctx.textAlign = 'right';
    ctx.font = '6px "Press Start 2P", monospace';
    ctx.fillStyle = eRes.hp > 0 ? '#c8b890' : '#5a3a3a';
    ctx.fillText('RES ' + eRes.spec.name, W - 8, 60);
    ctx.textAlign = 'left';
  }

  // Finisher prompt
  if (!finisher && gameState === 'playing' && enemy.hp > 0 && enemy.hp / enemy.maxHp <= 0.22) {
    ctx.save();
    ctx.font = '10px "Press Start 2P", monospace';
    ctx.textAlign = 'center';
    const pulse = Math.sin(frameT * 0.2) * 0.3 + 0.7;
    ctx.globalAlpha = pulse;
    ctx.fillStyle = '#ffd84a';
    ctx.shadowColor = '#ff3a00';
    ctx.shadowBlur = 10;
    ctx.fillText('PRESS F - FINISH!', W/2, H - 14);
    ctx.restore();
  }

  // Center fight timer
  const secs = Math.ceil(roundTimer / 60);
  const tStr = String(secs).padStart(2, '0');
  const warn = secs <= 10;
  // Frame plate
  ctx.save();
  ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
  ctx.fillRect(W/2 - 28, 4, 56, 36);
  ctx.strokeStyle = warn ? '#ff3a4a' : '#ffd84a';
  ctx.lineWidth = 2;
  ctx.strokeRect(W/2 - 28, 4, 56, 36);
  // Number
  const pulse = warn ? (1 + Math.sin(frameT * 0.4) * 0.15) : 1;
  ctx.font = (24 * pulse | 0) + 'px "Press Start 2P", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = warn ? '#ff3a4a' : '#ffd84a';
  ctx.shadowBlur = warn ? 12 : 6;
  ctx.fillStyle = warn ? '#ff3a4a' : '#ffd84a';
  ctx.fillText(tStr, W/2, 24);
  ctx.shadowBlur = 0;
  ctx.textBaseline = 'alphabetic';
  ctx.textAlign = 'left';
  ctx.restore();

  if (announceTimer > 0) {
    ctx.save();
    ctx.font = '20px "Press Start 2P", monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffd84a';
    ctx.shadowColor = '#ff3a00';
    ctx.shadowBlur = 6;
    ctx.fillText(announceText, W/2, H/2);
    ctx.restore();
  }
}

function drawBar(x, y, w, h, pct, fill, bg) {
  ctx.fillStyle = '#000';
  ctx.fillRect(x - 1, y - 1, w + 2, h + 2);
  ctx.fillStyle = bg;
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = fill;
  ctx.fillRect(x, y, w * Math.max(0, pct), h);
}

// ---------- LOOP ----------
function reset() {
  playerTeam = playerTeamSpecs.map((s, i) => {
    const f = makeFighter(100 + i * 6, s, false);
    f.teamIdx = i;
    return f;
  });
  enemyTeam = enemyTeamSpecs.map((s, i) => {
    const f = makeFighter(380 - i * 6, s, true);
    f.teamIdx = i;
    return f;
  });
  playerIdx = 0;
  enemyIdx = 0;
  player = playerTeam[0];
  enemy = enemyTeam[0];
  projectiles.length = 0;
  particles.length = 0;
  roundTimer = ROUND_FRAMES;
  finisher = null;
  clash = null;
  meleeClash = null;
  announceText = '';
  announceTimer = 0;
  gameState = 'intro';
  introFrame = 0;
}

function openSelect() {
  gameState = 'select';
  document.getElementById('charSelect').classList.remove('hidden');
}

function loop() {
  if (gameState === 'intro') {
    introFrame++;
    updateParticles();
    // Entrance aura sparkles for the fighter currently on screen
    const introPhase = introFrame < 110 ? 0 : 1; // 0 = player team, 1 = enemy team
    const focal = introPhase === 0 ? playerTeam[0] : enemyTeam[0];
    if (focal && introFrame % 2 === 0) {
      addParticle(W/2 + (introPhase === 0 ? -60 : 60) + (Math.random()-0.5)*30,
                  H/2 + 20 + (Math.random()-0.5)*30,
                  focal.spec.auraColor || focal.spec.accent, 30,
                  (Math.random()-0.5)*1.5, -Math.random()*2, 3);
    }
    if (introFrame >= 240) {
      gameState = 'playing';
      announceText = 'FIGHT!';
      announceTimer = 60;
    }
  } else if (gameState === 'playing') {
    if (finisher) {
      updateFinisher();
      if (!isFinisherHitStop()) updateParticles();
    } else if (meleeClash) {
      updateMeleeClash();
      updateParticles();
    } else {
      updateFighter(player, enemy);
      updateFighter(enemy, player);
      resolveMeleeHits();
      updateProjectiles();
      updateClash();
      updateParticles();
      if (roundTimer > 0) roundTimer--;
      // Reserve slow regen
      // Reserves: ki slowly regens while benched, but HP does NOT — damage is permanent.
      // KO'd reserves get nothing at all.
      for (const f of playerTeam) if (f !== player && f.hp > 0) { f.ki = Math.min(f.maxKi, f.ki + 0.3); }
      for (const f of enemyTeam)  if (f !== enemy  && f.hp > 0) { f.ki = Math.min(f.maxKi, f.ki + 0.3); }
      // AI tag when low
      if (enemy.hp > 0 && enemy.hp < enemy.maxHp * (DIFFICULTIES[difficulty] || DIFFICULTIES.normal).tagThreshold && enemy.tagCd === 0) {
        const res = enemyTeam[1 - enemyIdx];
        if (res && res.hp > enemy.hp * 1.2) tagEnemy();
      }
    }
    // KO handling (runs even if finisher just zeroed enemy.hp)
    if (player.hp <= 0) {
      const reserve = playerTeam[1 - playerIdx];
      if (reserve && reserve.hp > 0) { performTag('player', true); }
      else { gameState = 'lost'; announceText = 'DEFEAT'; announceTimer = 240; }
    } else if (enemy.hp <= 0 && !finisher) {
      const reserve = enemyTeam[1 - enemyIdx];
      if (reserve && reserve.hp > 0) { performTag('enemy', true); }
      else { gameState = 'won'; announceText = 'VICTORY!'; announceTimer = 240; }
    } else if (roundTimer === 0) {
      const pTotal = playerTeam.reduce((s,f) => s + Math.max(0, f.hp), 0);
      const eTotal = enemyTeam.reduce((s,f) => s + Math.max(0, f.hp), 0);
      if (pTotal > eTotal) { gameState = 'won'; announceText = 'TIME!  YOU WIN'; }
      else if (eTotal > pTotal) { gameState = 'lost'; announceText = 'TIME!  DEFEAT'; }
      else { gameState = 'lost'; announceText = 'DRAW'; }
      announceTimer = 240;
    }
    // Finish button visibility
    const finBtnEl = document.getElementById('finBtn');
    if (finBtnEl) {
      const avail = !finisher && enemy && enemy.hp > 0 && enemy.hp / enemy.maxHp <= 0.22;
      finBtnEl.classList.toggle('ready', avail);
    }
  } else if (gameState === 'won' || gameState === 'lost') {
    updateParticles();
    if (keys['z'] || keys[' ']) reset();
    if (keys['Escape'] || keys['escape']) {
      openSelect();
      selectedTeam = [];
      selectStep = 'fighter';
      document.getElementById('selectTitle').textContent = 'BUILD YOUR TAG TEAM';
      document.getElementById('selectSub').textContent = 'pick 2 fighters to rotate mid-battle';
      document.getElementById('roster').style.display = 'flex';
      document.getElementById('nameRow').style.display = 'flex';
      document.getElementById('difficultyRow').style.display = 'flex';
      document.getElementById('stageRoster').style.display = 'none';
      const cb = document.getElementById('confirmBtn');
      cb.disabled = true;
      cb.textContent = 'PICK 2 FIGHTERS';
      document.querySelectorAll('.fighter-card').forEach(c => { c.classList.remove('selected'); const b = c.querySelector('.slot-badge'); if (b) b.remove(); });
    }
  } else {
    // select state — don't update sim
    updateParticles();
  }

  if (announceTimer > 0) announceTimer--;
  frameT++;

  // Screen shake + cinematic zoom
  ctx.save();
  if (finisher && finisher.zoom > 1.005 && enemy) {
    const z = finisher.zoom;
    const halfW = W / (2 * z);
    const halfH = H / (2 * z);
    const fx = Math.max(halfW, Math.min(W - halfW, enemy.x));
    const fy = Math.max(halfH, Math.min(H - halfH, enemy.y - 14));
    ctx.translate(W/2, H/2);
    ctx.scale(z, z);
    ctx.translate(-fx, -fy);
  }
  if (shake > 0) {
    ctx.translate((Math.random()-0.5) * shake, (Math.random()-0.5) * shake);
    if (!isFinisherHitStop()) {
      shake *= 0.85;
      if (shake < 0.3) shake = 0;
    }
  }

  drawSky();
  if (gameState !== 'intro' && player && enemy) {
    for (const p of projectiles) drawProjectile(p);
    // Finisher afterimages drawn behind player
    if (finisher && finisher.afterimages.length) drawAfterimages();
    drawFighter(player);
    drawFighter(enemy);
    drawBeam(player);
    drawBeam(enemy);
    drawClash();
    drawMeleeClash();
    // Shockwave rings drawn above fighters
    if (finisher && finisher.shockRings.length) drawShockRings();
  }
  drawParticles();
  ctx.restore();
  if (gameState === 'intro') drawIntro();
  if (finisher) drawFinisherFX();
  drawUI();

  if (gameState !== 'playing' && gameState !== 'intro' && announceTimer < 200) {
    ctx.fillStyle = '#fff8e2';
    ctx.font = '10px "Press Start 2P", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('PRESS Z TO RESTART', W/2, H/2 + 30);
  }
  ctx.textAlign = 'left';

  requestAnimationFrame(loop);
}
// ---------- CHARACTER SELECT ----------
function drawFighterPortrait(canvas, spec) {
  const pctx = canvas.getContext('2d');
  pctx.imageSmoothingEnabled = false;
  const w = canvas.width, h = canvas.height;
  // Background
  const bg = pctx.createLinearGradient(0, 0, 0, h);
  bg.addColorStop(0, '#1a0838');
  bg.addColorStop(1, '#5a1060');
  pctx.fillStyle = bg;
  pctx.fillRect(0, 0, w, h);
  // Ground line
  pctx.fillStyle = '#2a1008';
  pctx.fillRect(0, h - 14, w, 14);
  // Aura glow behind
  const aR = 36;
  const ag = pctx.createRadialGradient(w/2, h/2 + 4, 2, w/2, h/2 + 4, aR);
  ag.addColorStop(0, spec.auraGlow || (spec.accent + '99'));
  ag.addColorStop(1, 'rgba(0,0,0,0)');
  pctx.fillStyle = ag;
  pctx.beginPath();
  pctx.arc(w/2, h/2 + 4, aR, 0, Math.PI * 2);
  pctx.fill();

  // Scaled pixel sprite (2x)
  const scale = 2.2;
  const cx = w / 2, cy = h / 2 + 24;
  const px = (x, y, pw, ph, c) => { pctx.fillStyle = c; pctx.fillRect(cx + x*scale, cy + y*scale, pw*scale, ph*scale); };
  // Legs
  px(-4, -8, 3, 8, spec.color);
  px(1, -8, 3, 8, spec.color);
  px(-5, -2, 4, 3, '#2a1a10');
  px(1, -2, 4, 3, '#2a1a10');
  // Torso
  px(-5, -20, 10, 12, spec.color);
  px(-5, -20, 10, 2, spec.accent);
  px(-5, -10, 10, 2, spec.accent);
  px(-1, -16, 2, 2, spec.accent);
  // Arms
  px(-7, -18, 3, 8, spec.color);
  px(4, -18, 3, 8, spec.color);
  px(-7, -11, 3, 3, '#f0c090');
  px(4, -11, 3, 3, '#f0c090');
  // Head
  px(-4, -28, 8, 8, '#f0c090');
  px(-5, -30, 10, 3, spec.hair);
  px(-6, -28, 2, 2, spec.hair);
  px(4, -28, 2, 2, spec.hair);
  px(-3, -32, 2, 2, spec.hair);
  px(1, -32, 2, 2, spec.hair);
  px(3, -33, 2, 2, spec.hair);
  px(-3, -25, 2, 2, '#000');
  px(1, -25, 2, 2, '#000');
  px(-2, -25, 1, 1, '#fff');
  px(2, -25, 1, 1, '#fff');
}

function renderRoster() {
  const roster = document.getElementById('roster');
  roster.innerHTML = '';
  FIGHTERS.forEach((spec, i) => {
    const card = document.createElement('div');
    card.className = 'fighter-card';
    card.style.color = spec.accent;
    const portrait = document.createElement('canvas');
    portrait.width = 120; portrait.height = 120;
    card.appendChild(portrait);
    drawFighterPortrait(portrait, spec);
    const bars = Object.entries(spec.bars).map(([k,v]) =>
      `<div class="stat-row"><span class="label">${k}</span><div class="stat-bar"><span style="width:${(v*100)|0}%"></span></div></div>`
    ).join('');
    card.insertAdjacentHTML('beforeend', `
      <h3>${spec.name}</h3>
      <div class="class">${spec.class}</div>
      <div class="bio">${spec.bio}</div>
      ${bars}
    `);
    card.addEventListener('click', () => selectFighter(i));
    roster.appendChild(card);
  });
}

let selectStep = 'fighter'; // 'fighter' | 'stage'
let selectedTeam = []; // indices into FIGHTERS, max 2
let selectedStageIdx = -1;
let playerName = 'PLAYER';

function selectFighter(i) {
  const pos = selectedTeam.indexOf(i);
  if (pos >= 0) {
    selectedTeam.splice(pos, 1);
  } else if (selectedTeam.length >= 2) {
    selectedTeam.shift();
    selectedTeam.push(i);
  } else {
    selectedTeam.push(i);
  }
  document.querySelectorAll('.fighter-card').forEach((c, idx) => {
    const slot = selectedTeam.indexOf(idx);
    c.classList.toggle('selected', slot >= 0);
    let badge = c.querySelector('.slot-badge');
    if (slot >= 0) {
      if (!badge) {
        badge = document.createElement('div');
        badge.className = 'slot-badge';
        c.appendChild(badge);
      }
      badge.textContent = slot === 0 ? 'MAIN' : 'RESERVE';
    } else if (badge) {
      badge.remove();
    }
  });
  const btn = document.getElementById('confirmBtn');
  if (selectedTeam.length === 2) {
    btn.disabled = false;
    btn.textContent = 'CHOOSE STAGE →';
  } else {
    btn.disabled = true;
    btn.textContent = 'PICK ' + (2 - selectedTeam.length) + ' MORE';
  }
}

function selectStage(i) {
  selectedStageIdx = i;
  document.querySelectorAll('.stage-card').forEach((c, idx) => {
    c.classList.toggle('selected', idx === i);
  });
  const btn = document.getElementById('confirmBtn');
  btn.disabled = false;
  btn.textContent = 'BEGIN BATTLE';
}

function renderStages() {
  const roster = document.getElementById('stageRoster');
  roster.innerHTML = '';
  STAGES.forEach((stage, i) => {
    const card = document.createElement('div');
    card.className = 'stage-card';
    card.style.color = stage.accent;
    const preview = document.createElement('canvas');
    preview.width = 200; preview.height = 112;
    card.appendChild(preview);
    // Draw preview using stage's draw function at half scale via drawImage trick — instead, call draw with mock context that draws to main canvas then copies. Simpler: use stage-specific preview drawers
    drawStagePreview(preview, stage);
    card.insertAdjacentHTML('beforeend', `
      <div class="info">
        <h3>${stage.name}</h3>
        <div class="sub-line">${stage.subtitle}</div>
        <div class="bio">${stage.bio}</div>
      </div>
    `);
    card.addEventListener('click', () => selectStage(i));
    roster.appendChild(card);
  });
}

function drawStagePreview(canvas, stage) {
  const pctx = canvas.getContext('2d');
  pctx.imageSmoothingEnabled = false;
  const pw = canvas.width, ph = canvas.height;
  const pgy = ph - 26;
  // Call stage draw functions with the preview context
  if (stage.id === 'station') drawNeonStation(pctx, 0, pw, ph, pgy);
  else if (stage.id === 'volcano') drawVolcanic(pctx, 0, pw, ph, pgy);
  else drawVoid(pctx, 0, pw, ph);
}

function advanceToStageStep() {
  selectStep = 'stage';
  document.getElementById('selectTitle').textContent = 'CHOOSE YOUR ARENA';
  document.getElementById('selectSub').textContent = 'where shall fists meet sky?';
  document.getElementById('roster').style.display = 'none';
  document.getElementById('nameRow').style.display = 'none';
  document.getElementById('difficultyRow').style.display = 'none';
  document.getElementById('stageRoster').style.display = 'flex';
  const btn = document.getElementById('confirmBtn');
  btn.disabled = true;
  btn.textContent = 'SELECT AN ARENA';
  renderStages();
}

function confirmSelection() {
  if (selectStep === 'fighter') {
    if (selectedTeam.length < 2) return;
    // Capture name
    const rawName = (document.getElementById('nameInput').value || '').trim();
    if (rawName) playerName = rawName.toUpperCase().slice(0, 12);
    advanceToStageStep();
    return;
  }
  // Stage step
  if (selectedStageIdx < 0) return;
  stageIdx = selectedStageIdx;
  playerTeamSpecs = selectedTeam.map(i => FIGHTERS[i]);
  // Enemy picks 2 random specs (may repeat)
  enemyTeamSpecs = [];
  const pool = [...FIGHTERS];
  const first = pool[Math.floor(Math.random() * pool.length)];
  const second = pool.filter(s => s.id !== first.id)[Math.floor(Math.random() * (pool.length - 1))] || pool[Math.floor(Math.random() * pool.length)];
  enemyTeamSpecs = [first, second];
  document.getElementById('charSelect').classList.add('hidden');
  reset();
}

document.getElementById('confirmBtn').addEventListener('click', confirmSelection);
window.addEventListener('keydown', e => {
  if (gameState === 'select') {
    if (document.activeElement && document.activeElement.id === 'nameInput') return;
    if (selectStep === 'fighter') {
      if (e.key === '1') selectFighter(0);
      else if (e.key === '2') selectFighter(1);
      else if (e.key === '3') selectFighter(2);
      else if (e.key === 'Enter') confirmSelection();
      return;
    } else {
      if (e.key === '1') selectStage(0);
      else if (e.key === '2') selectStage(1);
      else if (e.key === '3') selectStage(2);
      else if (e.key === 'Enter') confirmSelection();
    }
  }
});

// Persist name across sessions
try {
  const saved = localStorage.getItem('kifighters_name');
  if (saved) document.getElementById('nameInput').value = saved;
} catch (e) {}
document.getElementById('nameInput').addEventListener('input', e => {
  try { localStorage.setItem('kifighters_name', e.target.value); } catch (err) {}
});

// Difficulty selector
function setDifficulty(d) {
  if (!DIFFICULTIES[d]) return;
  difficulty = d;
  document.querySelectorAll('.diff-buttons button').forEach(b => {
    b.classList.toggle('active', b.dataset.diff === d);
  });
  try { localStorage.setItem('kifighters_difficulty', d); } catch (e) {}
}
try {
  const savedDiff = localStorage.getItem('kifighters_difficulty');
  if (savedDiff && DIFFICULTIES[savedDiff]) setDifficulty(savedDiff);
} catch (e) {}
document.querySelectorAll('.diff-buttons button').forEach(b => {
  b.addEventListener('click', () => setDifficulty(b.dataset.diff));
});

renderRoster();
gameState = 'select';
loop();
</script>
</body>
</html>
