<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ki Fighters</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%94%B6">
<meta name="description" content="Pixel-style anime fighter. Fly, punch, charge ki, and blast your rival out of the sky.">
<meta property="og:title" content="Ki Fighters">
<meta property="og:description" content="Pixel-style anime fighter. Fly, punch, charge ki, and blast your rival out of the sky.">
<meta property="og:url" content="https://sloppy.live/ki-fighters">
<meta property="og:image" content="https://sloppy.live/ki-fighters/og-image.png">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #ff8820;
    --gold: #ffd84a;
    --blue: #3fa9ff;
    --red: #ff3a4a;
    --ink: #fff8e2;
    --bg: #0a0512;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
  html, body {
    background: var(--bg);
    color: var(--ink);
    font-family: 'VT323', monospace;
    height: 100%;
    width: 100%;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    overscroll-behavior: none;
  }
  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100dvh;
  }
  #stage {
    flex: 1 1 auto;
    min-height: 0;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4px;
  }
  canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    box-shadow: 0 0 60px rgba(255, 136, 32, 0.25);
    border: 2px solid #2a1a10;
  }
  #title {
    position: fixed;
    top: 10px;
    left: 0; right: 0;
    text-align: center;
    font-family: 'Press Start 2P', monospace;
    font-size: 18px;
    color: var(--gold);
    text-shadow: 3px 3px 0 #a8400a, 6px 6px 0 rgba(0,0,0,0.4);
    letter-spacing: 2px;
    z-index: 20;
    pointer-events: none;
  }
  #hint {
    position: fixed;
    bottom: 10px;
    left: 0; right: 0;
    text-align: center;
    font-size: 18px;
    color: #ffaa44;
    letter-spacing: 2px;
    z-index: 10;
    pointer-events: none;
  }
  #backlink {
    position: fixed;
    top: 12px;
    right: 14px;
    font-family: 'Press Start 2P', monospace;
    font-size: 8px;
    color: #ff8820;
    text-decoration: none;
    letter-spacing: 1px;
    z-index: 30;
    background: rgba(0,0,0,0.5);
    padding: 6px 10px;
    border: 1px solid var(--orange);
  }
  #backlink:hover { background: var(--orange); color: #000; }

  #mobileControls {
    display: none;
    width: 100%;
    padding: 10px 14px calc(10px + env(safe-area-inset-bottom, 0px));
    justify-content: space-between;
    align-items: flex-end;
    gap: 12px;
    flex: 0 0 auto;
    z-index: 40;
  }
  #mobileControls .cluster { display: grid; gap: 6px; }
  #joystick {
    position: relative;
    width: 150px;
    height: 150px;
    touch-action: none;
    flex: 0 0 auto;
    -webkit-user-select: none;
    user-select: none;
  }
  #joystick .base {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background:
      radial-gradient(circle at 50% 50%, rgba(255, 136, 32, 0.22), rgba(255, 136, 32, 0.04) 60%, rgba(0,0,0,0.3) 100%);
    border: 3px solid var(--orange);
    box-shadow:
      0 0 30px rgba(255, 136, 32, 0.4),
      inset 0 0 24px rgba(0, 0, 0, 0.5);
  }
  #joystick .base::before,
  #joystick .base::after {
    content: '';
    position: absolute;
    background: rgba(255, 216, 74, 0.25);
  }
  #joystick .base::before {
    left: 50%; top: 10%; bottom: 10%; width: 1px; transform: translateX(-0.5px);
  }
  #joystick .base::after {
    top: 50%; left: 10%; right: 10%; height: 1px; transform: translateY(-0.5px);
  }
  #joystick .knob {
    position: absolute;
    width: 64px;
    height: 64px;
    top: 50%;
    left: 50%;
    margin-left: -32px;
    margin-top: -32px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #ffec99, var(--gold) 40%, var(--orange) 70%, #a8400a);
    border: 2px solid var(--gold);
    box-shadow: 0 0 14px rgba(255, 216, 74, 0.7), inset 0 -4px 8px rgba(0,0,0,0.4);
    pointer-events: none;
    transition: transform 0.1s ease-out;
  }
  #joystick.active .knob { transition: none; }
  #mobileControls .actions {
    grid-template-columns: repeat(2, 64px);
    grid-template-rows: repeat(2, 64px);
    align-self: end;
  }
  #mobileControls button {
    width: 100%;
    aspect-ratio: 1;
    background: rgba(255, 136, 32, 0.18);
    border: 2px solid var(--orange);
    color: var(--ink);
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    border-radius: 50%;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
    cursor: pointer;
    box-shadow: 0 0 12px rgba(255, 136, 32, 0.25), inset 0 0 8px rgba(255, 216, 74, 0.15);
    text-shadow: 1px 1px 0 rgba(0,0,0,0.6);
  }
  #mobileControls button.pressed,
  #mobileControls button:active {
    background: var(--orange);
    color: #1a0a00;
    box-shadow: 0 0 18px var(--gold), inset 0 0 10px rgba(255,255,255,0.4);
    transform: translateY(1px);
  }
  #mobileControls .z-btn { border-color: var(--gold); color: var(--gold); }
  #mobileControls .x-btn { border-color: var(--red); color: var(--red); }
  #mobileControls .c-btn { border-color: var(--blue); color: var(--blue); }
  #mobileControls .dash-btn { border-color: #c06aff; color: #c06aff; font-size: 9px; }

  /* Character select overlay */
  #charSelect {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
    background: radial-gradient(ellipse at 50% 40%, #1a0838 0%, #050108 100%);
    gap: 18px;
    overflow-y: auto;
  }
  #charSelect.hidden { display: none; }
  #charSelect h2 {
    font-family: 'Press Start 2P', monospace;
    font-size: 20px;
    color: var(--gold);
    text-shadow: 3px 3px 0 #a8400a, 6px 6px 0 rgba(0,0,0,0.5);
    letter-spacing: 3px;
    text-align: center;
  }
  #nameRow {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    font-family: 'VT323', monospace;
  }
  #nameRow label {
    font-family: 'Press Start 2P', monospace;
    font-size: 9px;
    color: var(--gold);
    letter-spacing: 2px;
  }
  #nameInput {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    padding: 10px 14px;
    background: rgba(0,0,0,0.6);
    color: var(--ink);
    border: 2px solid var(--orange);
    text-align: center;
    letter-spacing: 2px;
    text-transform: uppercase;
    width: 240px;
    max-width: 90vw;
    outline: none;
  }
  #nameInput:focus {
    border-color: var(--gold);
    box-shadow: 0 0 16px rgba(255, 216, 74, 0.5);
  }
  #stageRoster {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 100%;
  }
  .stage-card {
    width: 220px;
    background: rgba(0,0,0,0.55);
    border: 3px solid #2a1a10;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'VT323', monospace;
    color: var(--ink);
    overflow: hidden;
  }
  .stage-card:hover, .stage-card.selected {
    transform: translateY(-4px);
    box-shadow: 0 0 24px currentColor;
  }
  .stage-card.selected { border-color: currentColor; }
  .stage-card canvas {
    image-rendering: pixelated;
    display: block;
    width: 100%;
    border: none;
    box-shadow: none;
  }
  .stage-card .info {
    padding: 10px 12px;
    text-align: center;
  }
  .stage-card h3 {
    font-family: 'Press Start 2P', monospace;
    font-size: 11px;
    letter-spacing: 1.5px;
    margin-bottom: 4px;
  }
  .stage-card .sub-line {
    font-size: 13px;
    color: #ffaa44;
    letter-spacing: 1px;
    margin-bottom: 6px;
    text-transform: uppercase;
  }
  .stage-card .bio {
    font-size: 14px;
    line-height: 1.15;
    color: #c8b890;
  }
  @media (max-width: 640px) {
    .stage-card { width: 160px; }
    .stage-card .bio { font-size: 12px; }
  }
  #charSelect .sub {
    font-family: 'VT323', monospace;
    font-size: 20px;
    color: #ffaa44;
    letter-spacing: 2px;
    margin-top: -8px;
  }
  #roster {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
    max-width: 100%;
  }
  .fighter-card {
    width: 180px;
    background: rgba(0,0,0,0.55);
    border: 3px solid #2a1a10;
    padding: 14px 12px;
    cursor: pointer;
    transition: all 0.15s;
    font-family: 'VT323', monospace;
    color: var(--ink);
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .fighter-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, transparent 0%, rgba(255,255,255,0.04) 50%, transparent 100%);
    pointer-events: none;
  }
  .fighter-card:hover, .fighter-card.selected {
    transform: translateY(-4px);
    box-shadow: 0 0 24px currentColor;
  }
  .fighter-card.selected { border-color: currentColor; }
  .fighter-card canvas {
    image-rendering: pixelated;
    display: block;
    margin: 0 auto 8px;
    border: none;
    box-shadow: none;
    background: linear-gradient(180deg, #1a0838 0%, #5a1060 100%);
  }
  .fighter-card h3 {
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    margin-bottom: 3px;
  }
  .fighter-card .class {
    font-size: 14px;
    color: #ffaa44;
    letter-spacing: 1px;
    margin-bottom: 10px;
    text-transform: uppercase;
  }
  .fighter-card .bio {
    font-size: 15px;
    line-height: 1.15;
    color: #c8b890;
    margin-bottom: 8px;
    min-height: 50px;
  }
  .fighter-card .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    margin: 2px 0;
    gap: 6px;
  }
  .fighter-card .stat-row .label { color: #8a7560; letter-spacing: 1px; font-size: 11px; }
  .fighter-card .stat-bar {
    flex: 1;
    height: 6px;
    background: #2a1a10;
    border: 1px solid #000;
    position: relative;
  }
  .fighter-card .stat-bar span {
    position: absolute;
    top: 0; left: 0; bottom: 0;
    background: currentColor;
  }
  #confirmBtn {
    font-family: 'Press Start 2P', monospace;
    font-size: 14px;
    padding: 14px 28px;
    background: var(--orange);
    color: #1a0a00;
    border: 3px solid var(--gold);
    letter-spacing: 3px;
    cursor: pointer;
    box-shadow: 0 0 20px rgba(255, 216, 74, 0.5);
    transition: all 0.15s;
  }
  #confirmBtn:hover { transform: scale(1.05); }
  #confirmBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  @media (max-width: 640px) {
    #charSelect h2 { font-size: 13px; }
    .fighter-card { width: 150px; padding: 10px 8px; }
    .fighter-card .bio { min-height: 60px; font-size: 13px; }
    #confirmBtn { font-size: 10px; padding: 10px 20px; }
  }

  @media (max-width: 820px), (pointer: coarse) {
    #mobileControls { display: flex; }
    #title { font-size: 11px; top: 6px; }
    #backlink { top: 4px; right: 6px; font-size: 7px; padding: 4px 6px; }
    #hint { display: none; }
  }
  @media (max-height: 520px) {
    #mobileControls {
      padding-top: 4px;
      padding-bottom: calc(4px + env(safe-area-inset-bottom, 0px));
    }
    #joystick { width: 120px; height: 120px; }
    #joystick .knob { width: 52px; height: 52px; margin-left: -26px; margin-top: -26px; }
    #mobileControls .actions { grid-template-columns: repeat(2, 52px); grid-template-rows: repeat(2, 52px); }
    #mobileControls button { font-size: 9px; }
  }
</style>
</head>
<body>
<div id="charSelect">
  <h2 id="selectTitle">CHOOSE YOUR FIGHTER</h2>
  <div class="sub" id="selectSub">the fate of the sky is in your hands</div>
  <div id="nameRow">
    <label for="nameInput">YOUR NAME</label>
    <input id="nameInput" type="text" maxlength="12" placeholder="ENTER NAME" spellcheck="false" autocomplete="off">
  </div>
  <div id="roster"></div>
  <div id="stageRoster" style="display:none;"></div>
  <button id="confirmBtn" disabled>SELECT A FIGHTER</button>
</div>
<div id="title">KI  FIGHTERS</div>
<div id="stage"><canvas id="c" width="480" height="270"></canvas></div>
<div id="hint">← → ↑ ↓ fly · Z punch · X blast · C charge · SHIFT dash</div>
<a id="backlink" href="https://sloppy.live">← sloppy.live</a>
<div id="mobileControls">
  <div id="joystick">
    <div class="base"></div>
    <div class="knob"></div>
  </div>
  <div class="cluster actions">
    <button class="c-btn"    data-key="c">KI</button>
    <button class="dash-btn" data-key="Shift">DASH</button>
    <button class="z-btn"    data-key="z">PNCH</button>
    <button class="x-btn"    data-key="x">BLST</button>
  </div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

const W = canvas.width;
const H = canvas.height;
const GROUND_Y = 230;

function resizeCanvas() {
  const stage = document.getElementById('stage');
  const rect = stage.getBoundingClientRect();
  const availW = Math.max(160, rect.width - 8);
  const availH = Math.max(120, rect.height - 8);
  const scale = Math.max(1, Math.min(availW / W, availH / H));
  canvas.style.width  = (W * scale | 0) + 'px';
  canvas.style.height = (H * scale | 0) + 'px';
}
window.addEventListener('resize', resizeCanvas);
window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 100));
setTimeout(resizeCanvas, 0);

// ---------- INPUT ----------
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key] = true;
  keys[e.key.toLowerCase()] = true;
  if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup', e => {
  keys[e.key] = false;
  keys[e.key.toLowerCase()] = false;
});
// Virtual joystick
(() => {
  const stick = document.getElementById('joystick');
  const knob = stick.querySelector('.knob');
  let activePointer = null;
  let centerX = 0, centerY = 0, radius = 0;
  const DEAD = 0.22;

  function recomputeCenter() {
    const rect = stick.getBoundingClientRect();
    centerX = rect.left + rect.width / 2;
    centerY = rect.top + rect.height / 2;
    radius = rect.width * 0.42;
  }

  function setAxes(nx, ny) {
    keys['ArrowLeft']  = nx < -DEAD;
    keys['ArrowRight'] = nx >  DEAD;
    keys['ArrowUp']    = ny < -DEAD;
    keys['ArrowDown'] = ny >  DEAD;
  }

  function moveKnob(px, py) {
    let dx = px - centerX;
    let dy = py - centerY;
    const mag = Math.hypot(dx, dy);
    if (mag > radius) { dx = dx / mag * radius; dy = dy / mag * radius; }
    knob.style.transform = `translate(${dx}px, ${dy}px)`;
    setAxes(dx / radius, dy / radius);
  }

  function release() {
    activePointer = null;
    stick.classList.remove('active');
    knob.style.transform = 'translate(0px, 0px)';
    setAxes(0, 0);
  }

  stick.addEventListener('pointerdown', e => {
    e.preventDefault();
    recomputeCenter();
    stick.setPointerCapture(e.pointerId);
    activePointer = e.pointerId;
    stick.classList.add('active');
    moveKnob(e.clientX, e.clientY);
  });
  stick.addEventListener('pointermove', e => {
    if (activePointer !== e.pointerId) return;
    moveKnob(e.clientX, e.clientY);
  });
  stick.addEventListener('pointerup', e => { if (activePointer === e.pointerId) release(); });
  stick.addEventListener('pointercancel', e => { if (activePointer === e.pointerId) release(); });
  stick.addEventListener('lostpointercapture', release);
  stick.addEventListener('contextmenu', e => e.preventDefault());
  window.addEventListener('resize', recomputeCenter);
})();

// Multi-touch aware control binding via pointer events with capture
document.querySelectorAll('#mobileControls button').forEach(b => {
  const k = b.dataset.key;
  const press = () => { keys[k] = true; keys[k.toLowerCase()] = true; b.classList.add('pressed'); };
  const release = () => { keys[k] = false; keys[k.toLowerCase()] = false; b.classList.remove('pressed'); };
  b.addEventListener('pointerdown', e => {
    e.preventDefault();
    b.setPointerCapture(e.pointerId);
    press();
  });
  b.addEventListener('pointerup', e => { e.preventDefault(); release(); });
  b.addEventListener('pointercancel', e => { e.preventDefault(); release(); });
  b.addEventListener('lostpointercapture', release);
  b.addEventListener('contextmenu', e => e.preventDefault());
});

// ---------- FIGHTERS ROSTER ----------
const FIGHTERS = [
  {
    id: 'kaito',
    name: 'KAITO',
    class: 'BALANCED',
    bio: 'All-around warrior from the sun temple. Steady fists, steady flame.',
    color: '#ff8820', accent: '#ffd84a', hair: '#1a1a1a',
    maxHp: 100, maxKi: 100,
    moveSpeed: 1.0,
    punchDmg: 6,  punchCd: 18, punchRange: 26,
    blastDmg: 30, blastCd: 40, blastCost: 30, blastSize: 12, blastSpeed: 6.5, blastKnock: 0.9,
    dashPow: 8,   dashCost: 10,
    bars: { PWR: 0.55, SPD: 0.55, HP: 0.55, KI: 0.55 }
  },
  {
    id: 'reaper',
    name: 'DREAD REAPER',
    class: 'SPEEDSTER',
    bio: 'Shadow-stalker of the violet void. Phases through blasts on a trail of purple flame.',
    color: '#8a3aff', accent: '#c06aff', hair: '#ffffff',
    auraColor: '#c06aff', auraGlow: 'rgba(138, 58, 255, 0.6)',
    maxHp: 78, maxKi: 130,
    moveSpeed: 1.35,
    punchDmg: 4,  punchCd: 12, punchRange: 24,
    blastDmg: 20, blastCd: 24, blastCost: 22, blastSize: 9,  blastSpeed: 8.2, blastKnock: 0.6,
    dashPow: 11.5, dashCost: 8,
    bars: { PWR: 0.35, SPD: 0.95, HP: 0.35, KI: 0.85 }
  },
  {
    id: 'draka',
    name: 'DRAKA',
    class: 'JUGGERNAUT',
    bio: 'Iron-bone titan of the crimson cliffs. One punch ends conversations.',
    color: '#c81032', accent: '#ff6a40', hair: '#2a0000',
    maxHp: 155, maxKi: 80,
    moveSpeed: 0.78,
    punchDmg: 12, punchCd: 24, punchRange: 30,
    blastDmg: 48, blastCd: 60, blastCost: 45, blastSize: 18, blastSpeed: 5.2, blastKnock: 1.4,
    dashPow: 6,   dashCost: 14,
    bars: { PWR: 0.95, SPD: 0.3, HP: 0.95, KI: 0.4 }
  }
];

// ---------- ENTITIES ----------
function makeFighter(x, spec, isAI) {
  return {
    x, y: GROUND_Y - 40,
    vx: 0, vy: 0,
    w: 18, h: 32,
    dir: isAI ? -1 : 1,
    spec,
    color: spec.color, accent: spec.accent, hairColor: spec.hair,
    hp: spec.maxHp, maxHp: spec.maxHp,
    ki: spec.maxKi * 0.5, maxKi: spec.maxKi,
    isAI,
    state: 'idle',
    stateTime: 0,
    punchCd: 0,
    blastCd: 0,
    dashCd: 0,
    hurtTime: 0,
    aura: 0,
    flashing: 0,
    beamCharge: 0,
    beamActive: false,
    beamHand: { x: 0, y: 0 }
  };
}

let playerSpec = FIGHTERS[0];
let enemySpec  = FIGHTERS[1];
let player = makeFighter(100, playerSpec, false);
let enemy  = makeFighter(380, enemySpec, true);

const projectiles = [];
const particles = [];
let shake = 0;
const ROUND_FRAMES = 99 * 60; // 99 seconds at 60fps
let roundTimer = ROUND_FRAMES;
let gameState = 'playing'; // playing, won, lost
let announceText = '';
let announceTimer = 0;

function addParticle(x, y, color, life, vx, vy, size) {
  particles.push({ x, y, color, life, maxLife: life, vx, vy, size });
}

function fireBlast(f) {
  const s = f.spec;
  if (f.ki < s.blastCost || f.blastCd > 0) return;
  f.ki -= s.blastCost;
  f.blastCd = s.blastCd;
  f.state = 'blast';
  f.stateTime = 18;
  shake = Math.max(shake, 4);
  projectiles.push({
    x: f.x + f.dir * 18,
    y: f.y - 8,
    vx: f.dir * s.blastSpeed,
    vy: 0,
    owner: f,
    size: s.blastSize,
    life: 110,
    power: s.blastDmg,
    knock: s.blastKnock,
    color1: s.accent, color2: s.color,
    t: 0
  });
  for (let i = 0; i < 22; i++) {
    addParticle(f.x + f.dir*16, f.y - 8,
      [s.accent, '#ffffff', s.color][i%3],
      22, f.dir * (Math.random()*-2.8), (Math.random()-0.5)*3.2, 3);
  }
}

function punch(f, other) {
  const s = f.spec;
  if (f.punchCd > 0) return;
  f.punchCd = s.punchCd;
  // Roundhouse kick if moving fast or airborne, else standard punch
  const isKick = Math.abs(f.vx) > 1.8 || f.y < (STAGES[stageIdx].groundY - 50);
  f.state = isKick ? 'kick' : 'punch';
  f.stateTime = isKick ? 14 : 10;
  const dx = other.x - f.x;
  const dy = other.y - f.y;
  const range = isKick ? s.punchRange + 6 : s.punchRange;
  if (Math.abs(dx) < range && Math.abs(dy) < 28 && Math.sign(dx) === f.dir) {
    const dmg = isKick ? s.punchDmg * 1.35 : s.punchDmg;
    other.hp -= dmg;
    other.vx += f.dir * (2 + dmg * 0.22);
    other.vy -= isKick ? 3.2 : 2;
    other.hurtTime = isKick ? 16 : 12;
    other.flashing = isKick ? 9 : 6;
    f.ki = Math.min(f.maxKi, f.ki + (isKick ? 5 : 4));
    shake = Math.max(shake, isKick ? 4 : 1.5);
    for (let i = 0; i < (isKick ? 14 : 8); i++) {
      addParticle(other.x, other.y - 8, i % 2 ? '#ffffff' : s.accent, 16,
        (Math.random()-0.5)*4, (Math.random()-0.5)*4, 2);
    }
  }
}

function dash(f) {
  const s = f.spec;
  if (f.dashCd > 0 || f.ki < s.dashCost) return;
  f.dashCd = 40;
  f.ki -= s.dashCost;
  const dy = (keys['ArrowDown']||keys['s']) ? 1 : (keys['ArrowUp']||keys['w']) ? -1 : 0;
  const dx = (keys['ArrowLeft']||keys['a']) ? -1 : (keys['ArrowRight']||keys['d']) ? 1 : f.dir;
  f.vx = dx * s.dashPow;
  f.vy = dy * (s.dashPow * 0.75);
  f.state = 'dash';
  f.stateTime = 8;
  for (let i = 0; i < 10; i++) {
    addParticle(f.x, f.y - 12, s.accent, 14, -dx*Math.random()*2, (Math.random()-0.5)*2, 2);
  }
}

// ---------- UPDATE ----------
function updateFighter(f, other) {
  f.stateTime = Math.max(0, f.stateTime - 1);
  f.punchCd = Math.max(0, f.punchCd - 1);
  f.blastCd = Math.max(0, f.blastCd - 1);
  f.dashCd = Math.max(0, f.dashCd - 1);
  f.hurtTime = Math.max(0, f.hurtTime - 1);
  f.flashing = Math.max(0, f.flashing - 1);

  if (f.hp <= 0) return;

  let moveX = 0, moveY = 0;
  let wantPunch = false, wantBlast = false, wantCharge = false, wantDash = false;

  if (!f.isAI) {
    if (keys['ArrowLeft'] || keys['a']) moveX -= 1;
    if (keys['ArrowRight'] || keys['d']) moveX += 1;
    if (keys['ArrowUp'] || keys['w']) moveY -= 1;
    if (keys['ArrowDown'] || keys['s']) moveY += 1;
    wantPunch = keys['z'];
    wantBlast = keys['x'];
    wantCharge = keys['c'];
    wantDash = keys['Shift'] || keys['shift'];
  } else {
    // AI: basic behavior
    const dx = other.x - f.x;
    const dy = other.y - f.y;
    const dist = Math.hypot(dx, dy);
    if (dist > 50) {
      moveX = Math.sign(dx) * 0.9;
      moveY = Math.sign(dy) * 0.6;
    } else if (dist < 30) {
      moveX = -Math.sign(dx) * 0.4;
    }
    if (dist < 28 && Math.random() < 0.12) wantPunch = true;
    if (dist > 60 && dist < 220 && f.ki >= 30 && Math.random() < 0.035) wantBlast = true;
    if (f.ki < 25 && Math.random() < 0.015) wantCharge = true;
    if (dist < 60 && other.state === 'blast' && Math.random() < 0.08) wantDash = true;
    if (f.hp < 40 && f.ki < 50 && Math.random() < 0.02) wantCharge = true;
    // Rare beam commit: hold wantBlast across multiple frames to trigger
    if (f.ki > 60 && dist > 70 && dist < 260 && (f.beamCharge > 0 || Math.random() < 0.008)) {
      wantBlast = true;
    }
  }

  if (moveX !== 0) f.dir = Math.sign(moveX);
  // Turn to face opponent when not moving
  if (moveX === 0) f.dir = Math.sign(other.x - f.x) || f.dir;

  if (wantCharge && !wantDash) {
    f.state = 'charge';
    f.ki = Math.min(f.maxKi, f.ki + 1.2);
    f.aura = Math.min(1, f.aura + 0.1);
    moveX *= 0.3; moveY *= 0.3;
    // Ki aura particles
    if (Math.random() < 0.5) {
      addParticle(f.x + (Math.random()-0.5)*14, f.y - 10 + (Math.random()-0.5)*20,
        f.spec.auraColor || f.spec.accent, 18, (Math.random()-0.5)*0.6, -Math.random()*1.5, 2);
    }
  } else {
    f.aura = Math.max(0, f.aura - 0.05);
  }

  if (wantDash) dash(f);
  if (wantPunch) punch(f, other);
  // Beam charge / fire logic
  if (wantBlast) {
    f.beamCharge++;
    if (f.beamCharge >= 22 && f.ki >= 20) f.beamActive = true;
    if (f.beamActive) {
      if (f.ki <= 1) { f.beamActive = false; f.beamCharge = 0; }
      else {
        f.ki -= 1.3;
        f.state = 'blast';
        f.stateTime = 6;
        shake = Math.max(shake, 3);
        // Continuous damage to target in beam path
        const dxB = other.x - f.x;
        if (Math.sign(dxB) === f.dir && Math.abs(other.y - (f.y - 10)) < 34 && Math.abs(dxB) < 360) {
          other.hp -= 0.9;
          other.hurtTime = 6;
          other.flashing = 3;
          other.vx += f.dir * 0.8;
        }
        // Charge particles at hand
        if (Math.random() < 0.8) {
          addParticle(f.x + f.dir * 16, f.y - 10,
            f.spec.accent, 16, f.dir * (2 + Math.random()*3), (Math.random()-0.5)*2, 3);
        }
      }
    } else if (f.beamCharge > 2) {
      // Show charge halo at hand while charging
      if (Math.random() < 0.5) {
        addParticle(f.x + f.dir * 14, f.y - 10,
          f.spec.accent, 14, -f.dir * Math.random() * 0.6, -Math.random()*0.4, 2);
      }
    }
  } else {
    // Released — if short tap, fire normal blast
    if (f.beamCharge > 0 && f.beamCharge < 22) fireBlast(f);
    f.beamActive = false;
    f.beamCharge = 0;
  }

  // Flight physics — stage-dependent
  const stage = STAGES[stageIdx];
  if (f.state !== 'dash' || f.stateTime === 0) {
    const accel = 0.6 * f.spec.moveSpeed;
    f.vx += moveX * accel;
    f.vy += moveY * accel;
    f.vx *= 0.86;
    f.vy *= stage.hasFloor ? 0.86 : 0.92;
    if (stage.hasFloor && moveY === 0 && f.y < stage.groundY - 40) f.vy += stage.gravity;
  }

  f.x += f.vx;
  f.y += f.vy;

  // Clamp to stage
  if (f.x < 12) { f.x = 12; f.vx = 0; }
  if (f.x > W - 12) { f.x = W - 12; f.vx = 0; }
  if (f.y < 30) { f.y = 30; f.vy = 0; }
  if (stage.hasFloor) {
    if (f.y > stage.groundY - 10) {
      f.y = stage.groundY - 10;
      f.vy = 0;
      if (Math.abs(f.vx) > 2) {
        for (let i = 0; i < 6; i++) addParticle(f.x, stage.groundY, stage.accent, 20, (Math.random()-0.5)*3, -Math.random()*2, 2);
      }
    }
  } else {
    // Void — clamp loosely to canvas
    if (f.y > H - 14) { f.y = H - 14; f.vy = 0; }
  }

  if (f.state === 'charge' && !wantCharge) f.state = 'idle';
  if (f.stateTime === 0 && ['punch','kick','blast','dash'].includes(f.state) && !f.beamActive) f.state = 'idle';
}

function updateProjectiles() {
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.life--;
    p.t++;
    // Trail
    if (p.t % 2 === 0) {
      addParticle(p.x, p.y, '#ffd84a', 14, (Math.random()-0.5)*0.6, (Math.random()-0.5)*0.6, p.size - 2);
    }
    // Check collision
    const target = p.owner === player ? enemy : player;
    const dx = target.x - p.x;
    const dy = (target.y - 16) - p.y;
    const hitR = p.size + 8;
    if (Math.abs(dx) < hitR && Math.abs(dy) < hitR + 4) {
      target.hp -= p.power;
      target.vx += p.vx * (p.knock || 0.9);
      target.vy -= 3.5;
      target.hurtTime = 28;
      target.flashing = 14;
      shake = Math.max(shake, 10);
      projectiles.splice(i, 1);
      // Big explosion
      for (let k = 0; k < 40; k++) {
        addParticle(p.x, p.y, ['#ffd84a','#ffffff','#ff8820','#ff3a4a'][k%4], 32,
          (Math.random()-0.5)*8, (Math.random()-0.5)*8, 3 + (k%2));
      }
      // Shockwave ring
      for (let k = 0; k < 20; k++) {
        const a = (k / 20) * Math.PI * 2;
        addParticle(p.x, p.y, '#ffffff', 18,
          Math.cos(a) * 4, Math.sin(a) * 4, 2);
      }
      continue;
    }
    if (p.life <= 0 || p.x < -10 || p.x > W + 10) {
      projectiles.splice(i, 1);
    }
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.05;
    p.life--;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

// ---------- DRAW ----------
// ---------- STAGES ----------
function drawNeonStation(c, t, w, h, gy) {
  // Deep space with neon grid floor
  const g = c.createLinearGradient(0, 0, 0, gy);
  g.addColorStop(0, '#02000a');
  g.addColorStop(0.7, '#0a0220');
  g.addColorStop(1, '#18004a');
  c.fillStyle = g;
  c.fillRect(0, 0, w, gy);

  // Stars + flicker
  for (let i = 0; i < 60; i++) {
    const sx = (i * 53) % w;
    const sy = (i * 29) % (gy - 20);
    const tw = 0.5 + Math.sin(t * 0.05 + i) * 0.5;
    c.globalAlpha = 0.4 + tw * 0.6;
    c.fillStyle = i % 4 === 0 ? '#ff4ae6' : '#ffffff';
    c.fillRect(sx, sy, 1, 1);
  }
  c.globalAlpha = 1;

  // Distant nebula glow
  const neb = c.createRadialGradient(w * 0.75, 60, 5, w * 0.75, 60, 110);
  neb.addColorStop(0, 'rgba(255, 74, 230, 0.3)');
  neb.addColorStop(1, 'rgba(0,0,0,0)');
  c.fillStyle = neb;
  c.fillRect(0, 0, w, gy);
  const neb2 = c.createRadialGradient(w * 0.2, 80, 5, w * 0.2, 80, 120);
  neb2.addColorStop(0, 'rgba(74, 200, 255, 0.25)');
  neb2.addColorStop(1, 'rgba(0,0,0,0)');
  c.fillStyle = neb2;
  c.fillRect(0, 0, w, gy);

  // Station silhouette
  c.fillStyle = '#0a0428';
  c.fillRect(40, gy - 56, 130, 48);
  c.fillRect(w - 180, gy - 62, 140, 54);
  c.fillStyle = '#ff4ae6';
  for (let i = 0; i < 8; i++) {
    const on = Math.sin(t * 0.1 + i) > 0 ? 1 : 0.3;
    c.globalAlpha = on;
    c.fillRect(48 + i * 14, gy - 44, 4, 4);
    c.fillRect(w - 170 + i * 14, gy - 48, 4, 4);
  }
  c.globalAlpha = 1;
  c.fillStyle = '#4ac8ff';
  c.fillRect(60, gy - 56, 8, 2);
  c.fillRect(w - 100, gy - 62, 8, 2);

  // Neon grid floor (perspective)
  c.fillStyle = '#050012';
  c.fillRect(0, gy, w, h - gy);
  c.strokeStyle = '#ff4ae6';
  c.lineWidth = 1;
  c.globalAlpha = 0.9;
  // Horizontal lines receding
  for (let i = 0; i < 8; i++) {
    const yy = gy + Math.pow(i / 7, 2) * (h - gy);
    c.beginPath();
    c.moveTo(0, yy);
    c.lineTo(w, yy);
    c.stroke();
  }
  // Vanishing-point vertical lines
  c.strokeStyle = '#4ac8ff';
  const vpX = w / 2;
  for (let i = -10; i <= 10; i++) {
    c.beginPath();
    c.moveTo(vpX + i * 50, gy);
    c.lineTo(vpX + i * 240, h);
    c.stroke();
  }
  c.globalAlpha = 1;
}

function drawVolcanic(c, t, w, h, gy) {
  // Molten sky
  const g = c.createLinearGradient(0, 0, 0, gy);
  g.addColorStop(0, '#1a0000');
  g.addColorStop(0.4, '#6a0a08');
  g.addColorStop(1, '#ff3008');
  c.fillStyle = g;
  c.fillRect(0, 0, w, gy);

  // Smoke clouds
  c.fillStyle = 'rgba(20, 0, 0, 0.5)';
  for (let i = 0; i < 6; i++) {
    const cx = ((i * 90 + t * 0.3) % (w + 120)) - 60;
    const cy = 30 + (i % 3) * 18;
    c.beginPath();
    c.arc(cx, cy, 22, 0, Math.PI * 2);
    c.arc(cx + 16, cy - 4, 18, 0, Math.PI * 2);
    c.arc(cx - 14, cy + 2, 16, 0, Math.PI * 2);
    c.fill();
  }

  // Distant mountains / caldera
  c.fillStyle = '#2a0000';
  c.beginPath();
  c.moveTo(0, gy);
  for (let x = 0; x <= w; x += 26) {
    c.lineTo(x, gy - 40 - Math.sin(x * 0.04) * 22 - Math.cos(x * 0.02) * 14);
  }
  c.lineTo(w, gy);
  c.fill();

  // Lava glow on mountain tips
  c.strokeStyle = 'rgba(255, 160, 40, 0.5)';
  c.lineWidth = 2;
  c.beginPath();
  c.moveTo(0, gy - 20);
  for (let x = 0; x <= w; x += 26) {
    c.lineTo(x, gy - 40 - Math.sin(x * 0.04) * 22 - Math.cos(x * 0.02) * 14);
  }
  c.stroke();

  // Throne in background
  c.fillStyle = '#1a0000';
  c.fillRect(w/2 - 30, gy - 80, 60, 60);
  c.fillRect(w/2 - 36, gy - 90, 72, 14);
  c.fillRect(w/2 - 42, gy - 20, 84, 12);
  c.fillStyle = '#ffaa22';
  c.fillRect(w/2 - 8, gy - 70, 4, 20);
  c.fillRect(w/2 + 4, gy - 70, 4, 20);

  // Stone ground
  c.fillStyle = '#2a0a02';
  c.fillRect(0, gy, w, h - gy);
  c.fillStyle = '#6a1a06';
  for (let x = 0; x < w; x += 10) {
    c.fillRect(x, gy + 2 + (x % 20 === 0 ? 0 : 3), 6, 2);
  }

  // Lava cracks in ground
  c.fillStyle = '#ffaa22';
  for (let x = 0; x < w; x += 18) {
    const hh = Math.sin(t * 0.1 + x) * 0.5 + 0.5;
    c.globalAlpha = 0.6 + hh * 0.4;
    c.fillRect(x, gy + 6, 4, 1);
    c.fillRect(x + 2, gy + 10, 3, 1);
  }
  c.globalAlpha = 1;

  // Floating embers
  for (let i = 0; i < 30; i++) {
    const ex = ((i * 47 + t * 0.8) % w);
    const ey = (gy - ((t * 0.5 + i * 40) % (gy + 80))) + (i % 3) * 4;
    c.fillStyle = i % 2 ? '#ffaa22' : '#ff5020';
    c.globalAlpha = 0.4 + (Math.sin(t * 0.05 + i) * 0.5 + 0.5) * 0.6;
    c.fillRect(ex, ey, 2, 2);
  }
  c.globalAlpha = 1;
}

function drawVoid(c, t, w, h) {
  // Deep nebula — no ground, full-screen
  const g = c.createLinearGradient(0, 0, 0, h);
  g.addColorStop(0, '#02000a');
  g.addColorStop(0.5, '#0a0028');
  g.addColorStop(1, '#02000a');
  c.fillStyle = g;
  c.fillRect(0, 0, w, h);

  // Swirling nebula clouds
  const clouds = [
    { x: 0.25, y: 0.3, r: 120, color: 'rgba(74, 200, 255, 0.2)' },
    { x: 0.75, y: 0.45, r: 150, color: 'rgba(200, 74, 255, 0.2)' },
    { x: 0.5, y: 0.8, r: 110, color: 'rgba(255, 200, 74, 0.15)' }
  ];
  for (const cl of clouds) {
    const cx = cl.x * w + Math.sin(t * 0.01) * 10;
    const cy = cl.y * h + Math.cos(t * 0.008) * 8;
    const ng = c.createRadialGradient(cx, cy, 5, cx, cy, cl.r);
    ng.addColorStop(0, cl.color);
    ng.addColorStop(1, 'rgba(0,0,0,0)');
    c.fillStyle = ng;
    c.fillRect(0, 0, w, h);
  }

  // Stars — layered depth
  for (let i = 0; i < 120; i++) {
    const sx = (i * 53 + Math.sin(t * 0.005 + i) * 2) % w;
    const sy = (i * 37) % h;
    const tw = Math.sin(t * 0.06 + i) * 0.5 + 0.5;
    c.globalAlpha = 0.3 + tw * 0.7;
    c.fillStyle = i % 5 === 0 ? '#c0e0ff' : '#ffffff';
    c.fillRect(sx, sy, 1, 1);
  }
  c.globalAlpha = 1;

  // Floating asteroids
  for (let i = 0; i < 6; i++) {
    const ax = ((i * 90 + t * 0.2) % (w + 60)) - 30;
    const ay = 60 + (i * 37) % (h - 120) + Math.sin(t * 0.01 + i) * 8;
    c.fillStyle = '#3a3a4a';
    c.beginPath();
    c.arc(ax, ay, 8 + (i % 3) * 3, 0, Math.PI * 2);
    c.fill();
    c.fillStyle = '#1a1a28';
    c.fillRect(ax - 4, ay - 2, 3, 2);
    c.fillRect(ax + 1, ay + 1, 2, 2);
  }

  // Distant planet
  const pg = c.createRadialGradient(w - 80, 50, 4, w - 80, 50, 40);
  pg.addColorStop(0, '#ff6aa0');
  pg.addColorStop(0.5, '#8a3aff');
  pg.addColorStop(1, 'rgba(0,0,0,0)');
  c.fillStyle = pg;
  c.beginPath();
  c.arc(w - 80, 50, 40, 0, Math.PI * 2);
  c.fill();
  // Planet ring
  c.strokeStyle = 'rgba(255, 200, 255, 0.4)';
  c.lineWidth = 1;
  c.beginPath();
  c.ellipse(w - 80, 50, 50, 10, -0.3, 0, Math.PI * 2);
  c.stroke();
}

const STAGES = [
  {
    id: 'station',
    name: 'NEON STATION',
    subtitle: 'OUTER RIM, SECTOR 7',
    bio: 'Abandoned trade station drifting past a quasar. Neon floor, dead silence.',
    accent: '#ff4ae6',
    gravity: 0.12,
    groundY: 230,
    hasFloor: true,
    draw: (t) => drawNeonStation(ctx, t, W, H, 230)
  },
  {
    id: 'volcano',
    name: 'VOLCANIC THRONE',
    subtitle: 'CALDERA OF THE FIRE KING',
    bio: 'Ancient caldera where the Fire King rules. Embers rise, stone cracks with lava.',
    accent: '#ffaa22',
    gravity: 0.14,
    groundY: 230,
    hasFloor: true,
    draw: (t) => drawVolcanic(ctx, t, W, H, 230)
  },
  {
    id: 'void',
    name: 'ZERO-G VOID',
    subtitle: 'BEYOND THE LAST STAR',
    bio: 'Lawless space between galaxies. No floor. No gravity. Only you and your rival.',
    accent: '#c0e0ff',
    gravity: 0,
    groundY: 260,
    hasFloor: false,
    draw: (t) => drawVoid(ctx, t, W, H)
  }
];
let stageIdx = 0;
let frameT = 0;

function drawSky() {
  STAGES[stageIdx].draw(frameT);
}

function drawFighter(f) {
  if (f.hp <= 0) return;
  const fx = Math.round(f.x);
  const fy = Math.round(f.y);

  ctx.save();
  if (f.flashing > 0 && f.flashing % 2 === 0) {
    ctx.globalAlpha = 0.3;
  }

  // Aura
  if (f.aura > 0.1 || f.state === 'charge') {
    const ar = 18 + Math.sin(Date.now() * 0.02) * 3;
    const aGrad = ctx.createRadialGradient(fx, fy - 16, 2, fx, fy - 16, ar);
    aGrad.addColorStop(0, f.spec.auraGlow || 'rgba(255, 216, 74, 0.6)');
    aGrad.addColorStop(0.5, f.spec.auraColor || f.spec.accent);
    aGrad.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctx.globalAlpha = 0.6;
    ctx.fillStyle = aGrad;
    ctx.beginPath();
    ctx.arc(fx, fy - 16, ar, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }

  // Body — pixel sprite
  const p = (x, y, w, h, c) => { ctx.fillStyle = c; ctx.fillRect(fx + x, fy + y, w, h); };
  const dir = f.dir;

  // Legs (hidden during kick — kick block draws its own)
  if (f.state !== 'kick') {
    p(-4, -8, 3, 8, f.color);
    p(1, -8, 3, 8, f.color);
    p(-5, -2, 4, 3, '#2a1a10');
    p(1, -2, 4, 3, '#2a1a10');
  }

  // Torso
  p(-5, -20, 10, 12, f.color);
  p(-5, -20, 10, 2, f.accent); // belt top
  p(-5, -10, 10, 2, f.accent); // belt
  // Symbol
  p(-1, -16, 2, 2, f.accent);

  // Kick animation (roundhouse): overrides arms/legs
  if (f.state === 'kick') {
    // Spinning body tilt
    const phase = (14 - f.stateTime) / 14;
    const tilt = Math.sin(phase * Math.PI) * 6;
    // Standing leg (bent)
    p(-2, -8, 3, 8, f.color);
    p(-3, -2, 4, 3, '#2a1a10');
    // Extended kick leg (horizontal blur)
    const legX = dir > 0 ? 3 : -13;
    p(legX, -14 + tilt, 10, 4, f.color);
    p(legX + (dir > 0 ? 10 : -3), -15 + tilt, 3, 6, '#2a1a10'); // boot
    // Speed lines
    ctx.fillStyle = '#ffffff';
    for (let k = 0; k < 3; k++) {
      ctx.fillRect(fx + legX + (dir > 0 ? -4 - k*3 : 12 + k*3), fy - 14 + tilt + k, 2, 1);
    }
    // Arms tucked
    p(-5, -18, 3, 6, f.color);
    p(2, -18, 3, 6, f.color);
  } else if (f.state === 'punch') {
    p(-5 + (dir > 0 ? 10 : -3), -18, 6, 3, f.color);
    p(-5 + (dir > 0 ? 14 : -6), -19, 3, 4, '#f0c090'); // fist
  } else if (f.state === 'blast') {
    p(-5 + (dir > 0 ? 10 : -4), -18, 4, 4, f.color);
    // Glowing hand
    ctx.fillStyle = '#ffd84a';
    ctx.beginPath();
    ctx.arc(fx + (dir > 0 ? 10 : -10), fy - 16, 4, 0, Math.PI * 2);
    ctx.fill();
  } else {
    p(-7, -18, 3, 8, f.color);
    p(4, -18, 3, 8, f.color);
    p(-7, -11, 3, 3, '#f0c090'); // hands
    p(4, -11, 3, 3, '#f0c090');
  }

  // Head
  p(-4, -28, 8, 8, '#f0c090'); // face
  // Hair (spiky)
  p(-5, -30, 10, 3, f.hairColor);
  p(-6, -28, 2, 2, f.hairColor);
  p(4, -28, 2, 2, f.hairColor);
  p(-3, -32, 2, 2, f.hairColor);
  p(1, -32, 2, 2, f.hairColor);
  p(3, -33, 2, 2, f.hairColor);
  // Eyes
  p(-3 + (dir > 0 ? 0 : 0), -25, 2, 2, '#000');
  p(1, -25, 2, 2, '#000');
  // Eye shine
  p(-2 + (dir > 0 ? 0 : 0), -25, 1, 1, '#fff');
  p(2, -25, 1, 1, '#fff');

  ctx.restore();
}

function drawProjectile(p) {
  const pulse = 1 + Math.sin(p.t * 0.5) * 0.12;
  const r = (p.size + 10) * pulse;
  const c1 = p.color1 || '#ffd84a';
  const c2 = p.color2 || '#ff8820';
  // Wide outer halo
  const halo = ctx.createRadialGradient(p.x, p.y, 1, p.x, p.y, r + 10);
  halo.addColorStop(0, c1);
  halo.addColorStop(0.4, c2);
  halo.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.globalAlpha = 0.5;
  ctx.fillStyle = halo;
  ctx.beginPath();
  ctx.arc(p.x, p.y, r + 10, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
  // Main orb
  const grad = ctx.createRadialGradient(p.x, p.y, 1, p.x, p.y, r);
  grad.addColorStop(0, '#ffffff');
  grad.addColorStop(0.3, '#ffffe0');
  grad.addColorStop(0.6, c1);
  grad.addColorStop(1, c2);
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(p.x, p.y, r, 0, Math.PI * 2);
  ctx.fill();
  // Hot core
  ctx.fillStyle = '#ffffff';
  ctx.beginPath();
  ctx.arc(p.x - p.vx * 0.4, p.y, (p.size - 2) * pulse, 0, Math.PI * 2);
  ctx.fill();
  // Comet tail streak
  ctx.save();
  ctx.globalAlpha = 0.4;
  const tGrad = ctx.createLinearGradient(p.x - p.vx * 6, p.y, p.x, p.y);
  tGrad.addColorStop(0, 'rgba(0, 0, 0, 0)');
  tGrad.addColorStop(1, c1);
  ctx.fillStyle = tGrad;
  ctx.beginPath();
  ctx.ellipse(p.x - p.vx * 3, p.y, p.size * 2.5, p.size * 0.8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawBeam(f) {
  if (!f.beamActive) return;
  const sx = f.x + f.dir * 14;
  const sy = f.y - 10;
  const ex = f.dir > 0 ? W + 20 : -20;
  const len = Math.abs(ex - sx);
  const s = f.spec;
  const wobble = Math.sin(frameT * 0.8) * 1.5;

  ctx.save();
  // Outer soft glow
  const g1 = ctx.createLinearGradient(sx, 0, ex, 0);
  g1.addColorStop(0, s.accent);
  g1.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.globalAlpha = 0.55;
  ctx.fillStyle = g1;
  const startX = f.dir > 0 ? sx : ex;
  ctx.fillRect(startX, sy - 28 + wobble, len, 56);

  // Main beam
  const g2 = ctx.createLinearGradient(sx, 0, ex, 0);
  g2.addColorStop(0, '#ffffff');
  g2.addColorStop(0.25, s.accent);
  g2.addColorStop(1, s.color);
  ctx.globalAlpha = 0.95;
  ctx.fillStyle = g2;
  ctx.fillRect(startX, sy - 14 + wobble, len, 28);

  // Hot core
  ctx.fillStyle = '#ffffff';
  ctx.globalAlpha = 1;
  ctx.fillRect(startX, sy - 5, len, 10);

  // Source burst
  const burstR = 22 + Math.sin(frameT * 0.4) * 4;
  const bg = ctx.createRadialGradient(sx, sy, 2, sx, sy, burstR);
  bg.addColorStop(0, '#ffffff');
  bg.addColorStop(0.4, s.accent);
  bg.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = bg;
  ctx.beginPath();
  ctx.arc(sx, sy, burstR, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

function drawParticles() {
  for (const pt of particles) {
    const a = pt.life / pt.maxLife;
    ctx.globalAlpha = a;
    ctx.fillStyle = pt.color;
    ctx.fillRect(pt.x | 0, pt.y | 0, pt.size, pt.size);
  }
  ctx.globalAlpha = 1;
}

function drawUI() {
  // Player bars (left)
  drawBar(8, 8, 180, 10, player.hp / player.maxHp, '#ff3a4a', '#5a0a10');
  drawBar(8, 20, 180, 6, player.ki / player.maxKi, '#3fa9ff', '#0a1a40');
  ctx.fillStyle = '#fff8e2';
  ctx.font = '8px "Press Start 2P", monospace';
  ctx.fillText(playerName + ' / ' + playerSpec.name, 8, 38);

  // Enemy bars (right)
  drawBar(W - 188, 8, 180, 10, enemy.hp / enemy.maxHp, '#ff3a4a', '#5a0a10');
  drawBar(W - 188, 20, 180, 6, enemy.ki / enemy.maxKi, '#3fa9ff', '#0a1a40');
  const enText = 'CPU / ' + enemySpec.name;
  ctx.textAlign = 'right';
  ctx.fillText(enText, W - 8, 38);
  ctx.textAlign = 'left';

  // Center fight timer
  const secs = Math.ceil(roundTimer / 60);
  const tStr = String(secs).padStart(2, '0');
  const warn = secs <= 10;
  // Frame plate
  ctx.save();
  ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
  ctx.fillRect(W/2 - 28, 4, 56, 36);
  ctx.strokeStyle = warn ? '#ff3a4a' : '#ffd84a';
  ctx.lineWidth = 2;
  ctx.strokeRect(W/2 - 28, 4, 56, 36);
  // Number
  const pulse = warn ? (1 + Math.sin(frameT * 0.4) * 0.15) : 1;
  ctx.font = (24 * pulse | 0) + 'px "Press Start 2P", monospace';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = warn ? '#ff3a4a' : '#ffd84a';
  ctx.shadowBlur = warn ? 12 : 6;
  ctx.fillStyle = warn ? '#ff3a4a' : '#ffd84a';
  ctx.fillText(tStr, W/2, 24);
  ctx.shadowBlur = 0;
  ctx.textBaseline = 'alphabetic';
  ctx.textAlign = 'left';
  ctx.restore();

  if (announceTimer > 0) {
    ctx.save();
    ctx.font = '20px "Press Start 2P", monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = '#ffd84a';
    ctx.shadowColor = '#ff3a00';
    ctx.shadowBlur = 6;
    ctx.fillText(announceText, W/2, H/2);
    ctx.restore();
  }
}

function drawBar(x, y, w, h, pct, fill, bg) {
  ctx.fillStyle = '#000';
  ctx.fillRect(x - 1, y - 1, w + 2, h + 2);
  ctx.fillStyle = bg;
  ctx.fillRect(x, y, w, h);
  ctx.fillStyle = fill;
  ctx.fillRect(x, y, w * Math.max(0, pct), h);
}

// ---------- LOOP ----------
function reset() {
  player = makeFighter(100, playerSpec, false);
  enemy  = makeFighter(380, enemySpec, true);
  projectiles.length = 0;
  particles.length = 0;
  roundTimer = ROUND_FRAMES;
  gameState = 'playing';
  announceText = 'FIGHT!';
  announceTimer = 60;
}

function openSelect() {
  gameState = 'select';
  document.getElementById('charSelect').classList.remove('hidden');
}

function loop() {
  if (gameState === 'playing') {
    updateFighter(player, enemy);
    updateFighter(enemy, player);
    updateProjectiles();
    updateParticles();
    if (roundTimer > 0) roundTimer--;

    if (player.hp <= 0) { gameState = 'lost'; announceText = 'DEFEAT'; announceTimer = 240; }
    else if (enemy.hp <= 0) { gameState = 'won'; announceText = 'VICTORY!'; announceTimer = 240; }
    else if (roundTimer === 0) {
      if (player.hp > enemy.hp) { gameState = 'won'; announceText = 'TIME!  YOU WIN'; }
      else if (enemy.hp > player.hp) { gameState = 'lost'; announceText = 'TIME!  DEFEAT'; }
      else { gameState = 'lost'; announceText = 'DRAW'; }
      announceTimer = 240;
    }
  } else if (gameState === 'won' || gameState === 'lost') {
    updateParticles();
    if (keys['z'] || keys[' ']) reset();
    if (keys['Escape'] || keys['escape']) { openSelect(); selectedIdx = -1; document.getElementById('confirmBtn').disabled = true; document.getElementById('confirmBtn').textContent = 'SELECT A FIGHTER'; document.querySelectorAll('.fighter-card').forEach(c => c.classList.remove('selected')); }
  } else {
    // select state — don't update sim
    updateParticles();
  }

  if (announceTimer > 0) announceTimer--;
  frameT++;

  // Screen shake
  ctx.save();
  if (shake > 0) {
    ctx.translate((Math.random()-0.5) * shake, (Math.random()-0.5) * shake);
    shake *= 0.85;
    if (shake < 0.3) shake = 0;
  }

  drawSky();
  for (const p of projectiles) drawProjectile(p);
  drawFighter(player);
  drawFighter(enemy);
  drawBeam(player);
  drawBeam(enemy);
  drawParticles();
  ctx.restore();
  drawUI();

  if (gameState !== 'playing' && announceTimer < 200) {
    ctx.fillStyle = '#fff8e2';
    ctx.font = '10px "Press Start 2P", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('PRESS Z TO RESTART', W/2, H/2 + 30);
  }
  ctx.textAlign = 'left';

  requestAnimationFrame(loop);
}
// ---------- CHARACTER SELECT ----------
function drawFighterPortrait(canvas, spec) {
  const pctx = canvas.getContext('2d');
  pctx.imageSmoothingEnabled = false;
  const w = canvas.width, h = canvas.height;
  // Background
  const bg = pctx.createLinearGradient(0, 0, 0, h);
  bg.addColorStop(0, '#1a0838');
  bg.addColorStop(1, '#5a1060');
  pctx.fillStyle = bg;
  pctx.fillRect(0, 0, w, h);
  // Ground line
  pctx.fillStyle = '#2a1008';
  pctx.fillRect(0, h - 14, w, 14);
  // Aura glow behind
  const aR = 36;
  const ag = pctx.createRadialGradient(w/2, h/2 + 4, 2, w/2, h/2 + 4, aR);
  ag.addColorStop(0, spec.auraGlow || (spec.accent + '99'));
  ag.addColorStop(1, 'rgba(0,0,0,0)');
  pctx.fillStyle = ag;
  pctx.beginPath();
  pctx.arc(w/2, h/2 + 4, aR, 0, Math.PI * 2);
  pctx.fill();

  // Scaled pixel sprite (2x)
  const scale = 2.2;
  const cx = w / 2, cy = h / 2 + 24;
  const px = (x, y, pw, ph, c) => { pctx.fillStyle = c; pctx.fillRect(cx + x*scale, cy + y*scale, pw*scale, ph*scale); };
  // Legs
  px(-4, -8, 3, 8, spec.color);
  px(1, -8, 3, 8, spec.color);
  px(-5, -2, 4, 3, '#2a1a10');
  px(1, -2, 4, 3, '#2a1a10');
  // Torso
  px(-5, -20, 10, 12, spec.color);
  px(-5, -20, 10, 2, spec.accent);
  px(-5, -10, 10, 2, spec.accent);
  px(-1, -16, 2, 2, spec.accent);
  // Arms
  px(-7, -18, 3, 8, spec.color);
  px(4, -18, 3, 8, spec.color);
  px(-7, -11, 3, 3, '#f0c090');
  px(4, -11, 3, 3, '#f0c090');
  // Head
  px(-4, -28, 8, 8, '#f0c090');
  px(-5, -30, 10, 3, spec.hair);
  px(-6, -28, 2, 2, spec.hair);
  px(4, -28, 2, 2, spec.hair);
  px(-3, -32, 2, 2, spec.hair);
  px(1, -32, 2, 2, spec.hair);
  px(3, -33, 2, 2, spec.hair);
  px(-3, -25, 2, 2, '#000');
  px(1, -25, 2, 2, '#000');
  px(-2, -25, 1, 1, '#fff');
  px(2, -25, 1, 1, '#fff');
}

function renderRoster() {
  const roster = document.getElementById('roster');
  roster.innerHTML = '';
  FIGHTERS.forEach((spec, i) => {
    const card = document.createElement('div');
    card.className = 'fighter-card';
    card.style.color = spec.accent;
    const portrait = document.createElement('canvas');
    portrait.width = 120; portrait.height = 120;
    card.appendChild(portrait);
    drawFighterPortrait(portrait, spec);
    const bars = Object.entries(spec.bars).map(([k,v]) =>
      `<div class="stat-row"><span class="label">${k}</span><div class="stat-bar"><span style="width:${(v*100)|0}%"></span></div></div>`
    ).join('');
    card.insertAdjacentHTML('beforeend', `
      <h3>${spec.name}</h3>
      <div class="class">${spec.class}</div>
      <div class="bio">${spec.bio}</div>
      ${bars}
    `);
    card.addEventListener('click', () => selectFighter(i));
    roster.appendChild(card);
  });
}

let selectStep = 'fighter'; // 'fighter' | 'stage'
let selectedIdx = -1;
let selectedStageIdx = -1;
let playerName = 'PLAYER';

function selectFighter(i) {
  selectedIdx = i;
  document.querySelectorAll('.fighter-card').forEach((c, idx) => {
    c.classList.toggle('selected', idx === i);
  });
  const btn = document.getElementById('confirmBtn');
  btn.disabled = false;
  btn.textContent = 'CHOOSE STAGE →';
}

function selectStage(i) {
  selectedStageIdx = i;
  document.querySelectorAll('.stage-card').forEach((c, idx) => {
    c.classList.toggle('selected', idx === i);
  });
  const btn = document.getElementById('confirmBtn');
  btn.disabled = false;
  btn.textContent = 'BEGIN BATTLE';
}

function renderStages() {
  const roster = document.getElementById('stageRoster');
  roster.innerHTML = '';
  STAGES.forEach((stage, i) => {
    const card = document.createElement('div');
    card.className = 'stage-card';
    card.style.color = stage.accent;
    const preview = document.createElement('canvas');
    preview.width = 200; preview.height = 112;
    card.appendChild(preview);
    // Draw preview using stage's draw function at half scale via drawImage trick — instead, call draw with mock context that draws to main canvas then copies. Simpler: use stage-specific preview drawers
    drawStagePreview(preview, stage);
    card.insertAdjacentHTML('beforeend', `
      <div class="info">
        <h3>${stage.name}</h3>
        <div class="sub-line">${stage.subtitle}</div>
        <div class="bio">${stage.bio}</div>
      </div>
    `);
    card.addEventListener('click', () => selectStage(i));
    roster.appendChild(card);
  });
}

function drawStagePreview(canvas, stage) {
  const pctx = canvas.getContext('2d');
  pctx.imageSmoothingEnabled = false;
  const pw = canvas.width, ph = canvas.height;
  const pgy = ph - 26;
  // Call stage draw functions with the preview context
  if (stage.id === 'station') drawNeonStation(pctx, 0, pw, ph, pgy);
  else if (stage.id === 'volcano') drawVolcanic(pctx, 0, pw, ph, pgy);
  else drawVoid(pctx, 0, pw, ph);
}

function advanceToStageStep() {
  selectStep = 'stage';
  document.getElementById('selectTitle').textContent = 'CHOOSE YOUR ARENA';
  document.getElementById('selectSub').textContent = 'where shall fists meet sky?';
  document.getElementById('roster').style.display = 'none';
  document.getElementById('nameRow').style.display = 'none';
  document.getElementById('stageRoster').style.display = 'flex';
  const btn = document.getElementById('confirmBtn');
  btn.disabled = true;
  btn.textContent = 'SELECT AN ARENA';
  renderStages();
}

function confirmSelection() {
  if (selectStep === 'fighter') {
    if (selectedIdx < 0) return;
    // Capture name
    const rawName = (document.getElementById('nameInput').value || '').trim();
    if (rawName) playerName = rawName.toUpperCase().slice(0, 12);
    advanceToStageStep();
    return;
  }
  // Stage step
  if (selectedStageIdx < 0) return;
  playerSpec = FIGHTERS[selectedIdx];
  stageIdx = selectedStageIdx;
  const opts = FIGHTERS.filter((_, i) => i !== selectedIdx);
  enemySpec = opts[Math.floor(Math.random() * opts.length)];
  document.getElementById('charSelect').classList.add('hidden');
  reset();
}

document.getElementById('confirmBtn').addEventListener('click', confirmSelection);
window.addEventListener('keydown', e => {
  if (gameState === 'select') {
    if (document.activeElement && document.activeElement.id === 'nameInput') return;
    if (selectStep === 'fighter') {
      if (e.key === '1') selectFighter(0);
      else if (e.key === '2') selectFighter(1);
      else if (e.key === '3') selectFighter(2);
      else if (e.key === 'Enter') confirmSelection();
    } else {
      if (e.key === '1') selectStage(0);
      else if (e.key === '2') selectStage(1);
      else if (e.key === '3') selectStage(2);
      else if (e.key === 'Enter') confirmSelection();
    }
  }
});

// Persist name across sessions
try {
  const saved = localStorage.getItem('kifighters_name');
  if (saved) document.getElementById('nameInput').value = saved;
} catch (e) {}
document.getElementById('nameInput').addEventListener('input', e => {
  try { localStorage.setItem('kifighters_name', e.target.value); } catch (err) {}
});

renderRoster();
gameState = 'select';
loop();
</script>
