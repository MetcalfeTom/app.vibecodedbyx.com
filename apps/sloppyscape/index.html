<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>SloppyScape</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8F%9D%EF%B8%8F" />

<meta name="description" content="A tiny top-down RuneScape-like: click to walk your pixel adventurer around a green island. The journey of a thousand quests begins with one yellow X." />
<meta property="og:type" content="website" />
<meta property="og:title" content="SloppyScape" />
<meta property="og:description" content="Click to walk. Examine things. It's a green island and it's all yours." />
<meta property="og:url" content="https://sloppy.live/sloppyscape/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/top%20down%20pixel%20art%20rpg%20green%20island%20surrounded%20by%20ocean%2C%20tiny%20adventurer%20sprite%2C%20trees%20and%20rocks%2C%20retro%20mmorpg%20style?width=1200&height=630&nologo=true&seed=2007" />
<meta name="twitter:card" content="summary_large_image" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;600&display=swap" rel="stylesheet" />

<style>
  :root{ --gold:#f5c453; --panel:#3a3025; --panel2:#2b2318; --line:#5d4c33; --ink:#efe6d0; }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  html,body{height:100%}
  body{ font-family:'Pixelify Sans',monospace; background:#0d1a24; color:var(--ink); overflow:hidden;
    user-select:none; -webkit-tap-highlight-color:transparent; }
  #game{ position:fixed; inset:0; display:block; image-rendering:pixelated; cursor:crosshair; }

  .brand{ position:fixed; top:.6rem; left:.8rem; z-index:5; pointer-events:none; }
  .brand h1{ font-size:1.3rem; font-weight:600; color:var(--gold); text-shadow:2px 2px 0 #000; letter-spacing:.02em; }
  .brand .sub{ font-size:.7rem; color:#cbbfa4; text-shadow:1px 1px 0 #000; }

  /* RS-style chatbox */
  .chatbox{ position:fixed; left:.6rem; bottom:.6rem; z-index:5; width:min(24rem,72vw);
    background:rgba(43,35,24,.92); border:2px solid var(--line); border-radius:6px;
    box-shadow:0 4px 14px rgba(0,0,0,.5); }
  .chatbox .bar{ background:linear-gradient(180deg,#57472f,#463823); font-size:.68rem; letter-spacing:.06em;
    padding:.2rem .55rem; color:var(--gold); border-bottom:1px solid var(--line); }
  .chatbox .log{ padding:.35rem .55rem; height:5.4rem; overflow-y:auto; font-size:.78rem; line-height:1.5; }
  .chatbox .log .sys{ color:#8fd2ff; }
  .chatbox .log .ex{ color:#cbbfa4; }
  .chatbox .log .me{ color:#ffe9a8; }
  .chatbox .log .tim{ color:#9fe08f; }

  .hint{ position:fixed; right:.8rem; bottom:.8rem; z-index:5; font-size:.7rem; color:#cbbfa4;
    text-shadow:1px 1px 0 #000; text-align:right; line-height:1.6; pointer-events:none; }
  @media (max-width:700px){ .hint{ display:none; } .chatbox .log{ height:4rem; } }

  /* ---- side panel: skills + inventory + quests ---- */
  #side{ position:fixed; right:.6rem; top:.6rem; z-index:5; width:12.5rem;
    background:rgba(43,35,24,.94); border:2px solid var(--line); border-radius:8px;
    box-shadow:0 4px 14px rgba(0,0,0,.5); padding:.5rem; }
  #side .bar{ font-size:.7rem; letter-spacing:.06em; color:var(--gold); border-bottom:1px solid var(--line);
    padding-bottom:.25rem; margin-bottom:.4rem; display:flex; justify-content:space-between; align-items:center; }
  #side .bar .coins{ color:#ffd76a; }
  .skills{ display:grid; grid-template-columns:1fr 1fr; gap:.3rem; margin-bottom:.45rem; }
  .skill{ background:rgba(0,0,0,.25); border:1px solid var(--line); border-radius:6px; padding:.22rem .35rem;
    font-size:.72rem; display:flex; justify-content:space-between; align-items:center; }
  .skill b{ color:var(--gold); font-weight:600; }
  #inv{ display:grid; grid-template-columns:repeat(4,1fr); gap:.25rem; }
  .cell{ aspect-ratio:1; background:rgba(0,0,0,.28); border:1px solid #4a3d28; border-radius:5px;
    display:flex; align-items:center; justify-content:center; font-size:1.15rem; cursor:pointer; position:relative; padding:0; }
  .cell:hover{ border-color:var(--gold); }
  .cell .n{ position:absolute; right:1px; bottom:0; font-size:.6rem; color:#ffe9a8; text-shadow:1px 1px 0 #000; }
  .cell.empty{ cursor:default; opacity:.55; }
  #questBtn{ width:100%; margin-top:.45rem; font-family:inherit; font-size:.8rem; color:#2b2318; font-weight:600;
    background:linear-gradient(180deg,#e8c877,#c9a34e); border:1px solid #7a6234; border-radius:6px;
    padding:.32rem; cursor:pointer; min-height:2.1rem; }
  #questBtn:hover{ filter:brightness(1.06); }
  #packTab{ display:none; position:fixed; right:.6rem; bottom:.6rem; z-index:6; width:3rem; height:3rem;
    font-size:1.3rem; background:var(--panel); border:2px solid var(--line); border-radius:10px; cursor:pointer; }
  @media (max-width:700px){
    #side{ display:none; }
    #side.open{ display:block; top:auto; bottom:4rem; }
    #packTab{ display:block; }
  }
  /* quest overlay */
  #questov{ position:fixed; inset:0; z-index:30; display:none; align-items:center; justify-content:center;
    background:rgba(0,0,0,.55); padding:1rem; }
  #questov.open{ display:flex; }
  .qpanel{ width:min(26rem,94vw); background:#3a3025; border:3px solid var(--line); border-radius:10px; padding:.9rem; }
  .qpanel h2{ font-size:1.05rem; color:var(--gold); margin-bottom:.6rem; display:flex; justify-content:space-between; }
  .qpanel h2 button{ background:none; border:0; color:#cbbfa4; font-size:1.1rem; cursor:pointer; font-family:inherit; }
  .qcard{ background:rgba(0,0,0,.22); border:1px solid var(--line); border-radius:7px; padding:.5rem .6rem; margin-bottom:.5rem; }
  .qcard .t{ font-size:.85rem; }
  .qcard .r{ font-size:.7rem; color:#cbbfa4; margin:.15rem 0 .3rem; }
  .qbar{ height:.5rem; background:rgba(0,0,0,.4); border-radius:4px; overflow:hidden; }
  .qbar i{ display:block; height:100%; background:linear-gradient(90deg,#7fae4e,#b8d46a); width:0%; }
  .qcard button{ margin-top:.4rem; font-family:inherit; font-size:.74rem; font-weight:600; color:#20301a;
    background:linear-gradient(180deg,#9fce62,#7fae4e); border:1px solid #4c6b2c; border-radius:6px;
    padding:.28rem .7rem; cursor:pointer; min-height:1.9rem; }
  .qcard button[disabled]{ filter:grayscale(1) brightness(.7); cursor:default; }

  /* RS-style right-click context menu */
  #ctx{ position:fixed; z-index:20; min-width:9.5rem; display:none;
    background:#5d5447; border:1px solid #0e0c09; border-radius:3px; overflow:hidden;
    box-shadow:0 6px 16px rgba(0,0,0,.55); font-size:.82rem; }
  #ctx .h{ background:#0e0c09; color:#5f5443; padding:.18rem .5rem .22rem; font-size:.74rem; }
  #ctx .h span{ color:#b8a988; }
  #ctx button{ display:block; width:100%; text-align:left; border:0; cursor:pointer; font-family:inherit;
    font-size:.82rem; background:#5d5447; color:#fff; padding:.28rem .5rem; min-height:1.9rem; }
  #ctx button b{ color:#ffdd8a; font-weight:400; }
  #ctx button:hover, #ctx button:focus-visible{ background:#3f3930; color:#ffdd8a; outline:none; }
</style>
</head>
<body>
  <canvas id="game" role="application" aria-label="SloppyScape island. Click or tap anywhere on the ground to walk there."></canvas>
  <div class="brand" aria-hidden="true"><h1>SloppyScape</h1><div class="sub">a very small island · pop. 1</div></div>

  <div class="chatbox" aria-label="Game messages">
    <div class="bar">All · Game</div>
    <div class="log" id="log" role="log" aria-live="polite"></div>
  </div>
  <div class="hint" aria-hidden="true">left-click: act · right-click: options</div>
  <div id="ctx" role="menu" aria-label="Game actions"><div class="h">Choose Option <span>·</span></div><div id="ctxItems"></div></div>

  <aside id="side" aria-label="Skills and inventory">
    <div class="bar"><span>Adventurer</span><span class="coins" id="coinsEl">🪙 0</span></div>
    <div class="skills" id="skillsEl"></div>
    <div id="inv" aria-label="Inventory, 28 slots"></div>
    <button id="questBtn" type="button">📜 Quests</button>
  </aside>
  <button id="packTab" type="button" aria-label="Toggle backpack panel" aria-expanded="false">🎒</button>

  <div id="questov" role="dialog" aria-modal="true" aria-label="Quest board">
    <div class="qpanel">
      <h2>📜 The Quest Board <button id="questX" type="button" aria-label="Close">✕</button></h2>
      <div id="qlist"></div>
    </div>
  </div>

<script>
(function(){
  "use strict";
  var canvas=document.getElementById('game'), ctx=canvas.getContext('2d');
  var logEl=document.getElementById('log');

  // ---------- world gen (deterministic island) ----------
  var TILE=32, W=72, H=72, SEED=20260703;
  function mulberry(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; var t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
  var rng=mulberry(SEED);
  // value noise
  var gsz=10, gw=Math.ceil(W/gsz)+2, gh=Math.ceil(H/gsz)+2, gvals=[];
  for(var i=0;i<gw*gh;i++) gvals.push(rng());
  function lerp(a,b,t){ return a+(b-a)*t; }
  function smooth(t){ return t*t*(3-2*t); }
  function noise(x,y){
    var gx=x/gsz, gy=y/gsz, x0=Math.floor(gx), y0=Math.floor(gy);
    var fx=smooth(gx-x0), fy=smooth(gy-y0);
    function v(ix,iy){ return gvals[iy*gw+ix]; }
    return lerp(lerp(v(x0,y0),v(x0+1,y0),fx), lerp(v(x0,y0+1),v(x0+1,y0+1),fx), fy);
  }
  // tiles: 0 water, 1 sand, 2 grass, 3 dark grass
  var map=[], cx=W/2, cy=H/2;
  for(var y=0;y<H;y++){ var row=[];
    for(var x=0;x<W;x++){
      var d=Math.hypot(x-cx,y-cy)/(W*0.46);
      var v=noise(x,y)*0.5 + (1-d)*0.62;
      row.push(v>0.62 ? (noise(x*2+40,y*2+40)>0.55?3:2) : v>0.54 ? 1 : 0);
    }
    map.push(row);
  }
  function walkable(x,y){ return x>=0&&y>=0&&x<W&&y<H && map[y][x]>=1 && !blocked[y*W+x]; }

  // props: trees + rocks on grass
  var props=[], blocked=new Array(W*H).fill(false);
  var EXAMINE={
    tree:["A tree. It has decided to live here.","Sturdy. Unbothered. Moisturized.","You could chop it, if chopping existed yet."],
    rock:["It's a rock. Geology's greatest hit.","Millions of years old and still just sitting there.","You feel like it's judging your outfit."],
    yew:["A yew tree. Veterans feel a strange urge to stand here for six hours.","Dark, ancient, and worth 175 xp somewhere else.","The yew says nothing. The yew has seen things."],
    fire:["A cozy campfire. It accepts fish and forgives mistakes. Sometimes.","Crackling away since this morning. Nobody remembers lighting it."],
    board:["The quest board. Splinters included free of charge.","Somebody pinned a drawing of a fish to it. Ambitious."],
    spot:["Fish are churning the water here.","Something bubbles beneath the surface. Probably fish. Hopefully fish."]
  };

  // ═══════════ GAME SYSTEMS: items · skills · xp · save ═══════════
  var ITEMS={
    logs:      {nm:'Logs',        em:'🪵', ex:'A sturdy log. Smells like progress.'},
    yew_logs:  {nm:'Yew logs',    em:'🌲', ex:'Dark, dense, faintly smug wood.'},
    copper:    {nm:'Copper ore',  em:'🟤', ex:'Shiny-ish. The gateway ore.'},
    iron:      {nm:'Iron ore',    em:'⚫', ex:'Heavy and serious. Big rock energy.'},
    raw_shrimp:{nm:'Raw shrimp',  em:'🦐', ex:'It stares at you. Cook it.'},
    raw_trout: {nm:'Raw trout',   em:'🐟', ex:'A respectable fish. Needs fire.'},
    shrimp:    {nm:'Shrimp',      em:'🍤', ex:'Perfectly cooked. Chef vibes.'},
    trout:     {nm:'Cooked trout',em:'🍣', ex:'Restaurant quality, campfire price.'},
    burnt:     {nm:'Burnt fish',  em:'🪦', ex:'You monster. It had a family.'},
    bronze_axe:{nm:'Bronze axe',  em:'🪓', ex:'Tim\'s gift. Entry-level chopping technology.'},
    tinderbox: {nm:'Tinderbox',   em:'🔥', ex:'Sparks on demand. Use it on logs to make a fire.'}
  };
  var SKILLS={ wc:{nm:'Woodcut', em:'🪓'}, mine:{nm:'Mining', em:'⛏️'}, fish:{nm:'Fishing', em:'🎣'}, cook:{nm:'Cooking', em:'🍳'} };
  function lvlFromXp(xp){ var l=1; while(l<50 && xp>=Math.round(15*Math.pow(l,1.8))) l++; return l; }
  function xpForNext(l){ return Math.round(15*Math.pow(l,1.8)); }

  var save={ skills:{wc:0,mine:0,fish:0,cook:0}, inv:[], coins:0, quests:null, qprog:{} };
  try{ var ld=JSON.parse(localStorage.getItem('sloppyscape-save-v1')||'null'); if(ld&&ld.skills) save=ld; }catch(e){}
  function persist(){ try{ localStorage.setItem('sloppyscape-save-v1', JSON.stringify(save)); }catch(e){} }

  function invCount(id){ return save.inv.reduce(function(n,s){ return n+(s&&s.id===id?s.n:0); },0); }
  function addItem(id,n){
    n=n||1;
    var stack=save.inv.find(function(s){ return s && s.id===id; });
    if(stack){ stack.n+=n; }
    else if(save.inv.filter(Boolean).length>=28){ log('Your backpack is full.','sys'); return false; }
    else save.inv.push({id:id,n:n});
    renderInv(); persist(); return true;
  }
  function removeItem(id,n){
    n=n||1;
    var stack=save.inv.find(function(s){ return s && s.id===id; });
    if(!stack||stack.n<n) return false;
    stack.n-=n; if(stack.n<=0) save.inv=save.inv.filter(function(s){ return s!==stack; });
    renderInv(); persist(); return true;
  }

  // xp drops + level-ups
  var floats=[];
  function grantXp(skill,amount){
    var before=lvlFromXp(save.skills[skill]);
    save.skills[skill]+=amount;
    var after=lvlFromXp(save.skills[skill]);
    floats.push({x:player.px, y:player.py-52, txt:'+'+amount+' '+SKILLS[skill].nm, t:performance.now(), col:'#9fe08f'});
    if(after>before){
      log('🎉 Congratulations! Your '+SKILLS[skill].nm+' level is now '+after+'.','tim');
      floats.push({x:player.px, y:player.py-70, txt:SKILLS[skill].em+' Level '+after+'!', t:performance.now(), col:'#ffd76a'});
      sndLevel();
    }
    renderSkills(); persist();
  }

  // ---- tiny synth ----
  var AC=null;
  function ac(){ if(!AC){ try{ AC=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } if(AC&&AC.state==='suspended') AC.resume(); return AC; }
  function tone(type,f0,f1,dur,vol,delay){
    var c=ac(); if(!c) return; var t=c.currentTime+(delay||0);
    var o=c.createOscillator(); o.type=type; o.frequency.setValueAtTime(f0,t);
    if(f1) o.frequency.exponentialRampToValueAtTime(f1,t+dur);
    var g=c.createGain(); g.gain.setValueAtTime(0.0001,t); g.gain.linearRampToValueAtTime(vol,t+0.012);
    g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.connect(g); g.connect(c.destination); o.start(t); o.stop(t+dur+0.05);
  }
  function nz(dur,f,vol){
    var c=ac(); if(!c) return; var t=c.currentTime;
    var len=Math.ceil(c.sampleRate*dur), buf=c.createBuffer(1,len,c.sampleRate), d=buf.getChannelData(0);
    for(var i=0;i<len;i++) d[i]=Math.random()*2-1;
    var s=c.createBufferSource(); s.buffer=buf;
    var bp=c.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value=f; bp.Q.value=1;
    var g=c.createGain(); g.gain.setValueAtTime(vol,t); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    s.connect(bp); bp.connect(g); g.connect(c.destination); s.start(t); s.stop(t+dur);
  }
  function sndChop(){ tone('sine',150,70,0.12,0.2); nz(0.08,900,0.12); }
  function sndClink(){ tone('square',1500,900,0.06,0.08); nz(0.05,2600,0.08); }
  function sndSplash(){ nz(0.25,600,0.16); tone('sine',300,120,0.2,0.08); }
  function sndSizzle(){ nz(0.35,2200,0.1); }
  function sndLevel(){ [523,659,784,1047].forEach(function(f,i){ tone('triangle',f,null,0.28,0.12,i*0.09); }); }
  function sndQuest(){ [392,523,659,784].forEach(function(f,i){ tone('sine',f,null,0.4,0.1,i*0.12); }); }
  function sndPop(){ tone('sine',700,900,0.06,0.08); }

  // ---- side panel rendering ----
  function renderSkills(){
    var el=document.getElementById('skillsEl'); el.innerHTML='';
    Object.keys(SKILLS).forEach(function(k){
      var lvl=lvlFromXp(save.skills[k]);
      var d=document.createElement('div'); d.className='skill';
      d.title=SKILLS[k].nm+' — '+save.skills[k]+' xp · next level at '+xpForNext(lvl)+' xp';
      d.innerHTML='<span>'+SKILLS[k].em+'</span><b>'+lvl+'</b>';
      el.appendChild(d);
    });
    document.getElementById('coinsEl').textContent='🪙 '+save.coins;
  }
  function renderInv(){
    var el=document.getElementById('inv'); el.innerHTML='';
    for(var i=0;i<28;i++){
      var s=save.inv[i];
      var c=document.createElement('button'); c.type='button';
      if(s){
        var it=ITEMS[s.id];
        c.className='cell'; c.title=it.nm+' ×'+s.n;
        c.setAttribute('aria-label', it.nm+' times '+s.n);
        c.innerHTML='<span aria-hidden="true">'+it.em+'</span>'+(s.n>1?'<span class="n">'+s.n+'</span>':'');
        (function(sid){
          c.addEventListener('click', function(){ log('You examine the '+ITEMS[sid].nm.toLowerCase()+'.','me'); log(ITEMS[sid].ex,'ex'); });
          c.addEventListener('contextmenu', function(e){
            e.preventDefault(); e.stopPropagation();
            var items=[];
            if((sid==='logs'||sid==='yew_logs') && invCount('tinderbox')>0){
              items.push({label:'Light fire <b>'+ITEMS[sid].nm+'</b>', act:function(){ lightFire(sid); }});
            }
            items.push({label:'Examine <b>'+ITEMS[sid].nm+'</b>', act:function(){ log(ITEMS[sid].ex,'ex'); }});
            if(sid!=='bronze_axe' && sid!=='tinderbox'){
              items.push({label:'Drop <b>'+ITEMS[sid].nm+'</b>', act:function(){ removeItem(sid,1); log('You drop one '+ITEMS[sid].nm.toLowerCase()+'. The island absorbs it.','ex'); }});
            }
            items.push({label:'Cancel', act:null});
            showMenu(e.clientX,e.clientY,items);
          });
        })(s.id);
      } else { c.className='cell empty'; c.disabled=true; c.setAttribute('aria-label','Empty slot'); }
      el.appendChild(c);
    }
  }
  for(var py=2;py<H-2;py++){ for(var px=2;px<W-2;px++){
    if(map[py][px]>=2 && rng()<0.035){
      var kind=rng()<0.72?'tree':'rock';
      props.push({x:px,y:py,kind:kind,v:Math.floor(rng()*3)});
      blocked[py*W+px]=true;
    }
  }}

  // ---- yew grove: densest tree cluster becomes dark yews (Tim's patrol turf) ----
  var trees=props.filter(function(p){ return p.kind==='tree'; });
  var yewAnchor=null, bestN=-1;
  trees.forEach(function(t){
    var n=trees.reduce(function(acc,o){ return acc + (Math.abs(o.x-t.x)<=4 && Math.abs(o.y-t.y)<=4 ?1:0); },0);
    if(n>bestN){ bestN=n; yewAnchor=t; }
  });
  if(yewAnchor){
    trees.forEach(function(t){
      if(Math.abs(t.x-yewAnchor.x)<=4 && Math.abs(t.y-yewAnchor.y)<=4){ t.kind='yew'; }
    });
  }
  // resource state: trees/rocks can deplete + respawn
  props.forEach(function(p){ p.down=false; p.respawnT=0; });

  // ---- campfire + quest board near spawn (placed later, after spawn calc) ----
  function placeNearSpawn(dx0){
    for(var r=2;r<9;r++){ for(var a=0;a<20;a++){
      var x=Math.round(spawn.x+Math.cos((a/20+dx0)*6.283)*r), y=Math.round(spawn.y+Math.sin((a/20+dx0)*6.283)*r);
      if(x>1&&y>1&&x<W-2&&y<H-2 && map[y][x]>=2 && !blocked[y*W+x]) return {x:x,y:y};
    }} return null;
  }

  // ---- fishing spots: water tiles adjacent to sand, roaming ----
  var shoreWater=[];
  for(var sy2=1;sy2<H-1;sy2++){ for(var sx2=1;sx2<W-1;sx2++){
    if(map[sy2][sx2]===0 && (map[sy2][sx2-1]===1||map[sy2][sx2+1]===1||map[sy2-1][sx2]===1||map[sy2+1][sx2]===1)){
      shoreWater.push({x:sx2,y:sy2});
    }
  }}
  var fishSpots=[];
  (function(){
    var used={};
    for(var i=0;i<4 && shoreWater.length;i++){
      for(var tries=0;tries<40;tries++){
        var c=shoreWater[Math.floor(rng()*shoreWater.length)];
        var k=c.x+','+c.y;
        if(used[k]) continue;
        used[k]=1; fishSpots.push({x:c.x,y:c.y,moveT:30+rng()*40,phase:rng()*6.283}); break;
      }
    }
  })();
  function relocateSpot(s){
    for(var tries=0;tries<40;tries++){
      var c=shoreWater[Math.floor(Math.random()*shoreWater.length)];
      if(fishSpots.some(function(o){ return o!==s && o.x===c.x && o.y===c.y; })) continue;
      s.x=c.x; s.y=c.y; s.moveT=35+Math.random()*40; return;
    }
    s.moveT=30;
  }

        ctx.beginPath(); ctx.moveTo(sx-15,sy-2); ctx.lineTo(sx-8,sy-18); ctx.lineTo(sx+6,sy-20); ctx.lineTo(sx+15,sy-2); ctx.closePath(); ctx.fill();
        ctx.fillStyle='rgba(255,255,255,.16)'; ctx.fillRect(sx-4,sy-16,6,4);
        if(d.v===2){ ctx.fillStyle='#3d3a38'; ctx.fillRect(sx-7,sy-9,3,3); ctx.fillRect(sx+3,sy-12,3,3); }
      }
    });

    // butterflies (above the world)
    flies.forEach(function(f){
      var sx=f.x-view.x, sy=f.y-view.y;
      if(sx<-20||sy<-20||sx>vw+20||sy>vh+20) return;
      var w=Math.abs(Math.sin(f.flap))*3+1;
      ctx.fillStyle=f.hue;
      ctx.fillRect(sx-w-1, sy-1, w, 2); ctx.fillRect(sx+1, sy-1, w, 2);
      ctx.fillStyle='rgba(0,0,0,.5)'; ctx.fillRect(sx-1,sy-2,2,4);
    });

    // action progress bar over the player
    if(action){
      var pxx=player.px-view.x, pyy=player.py-view.y-FRH-8;
      var k=Math.min(1, action.t/action.dur);
      ctx.fillStyle='rgba(0,0,0,.55)'; ctx.fillRect(pxx-18,pyy,36,5);
      ctx.fillStyle='#9fce62'; ctx.fillRect(pxx-17,pyy+1,34*k,3);
    }

    // xp drop floats
    for(var fi=floats.length-1;fi>=0;fi--){
      var f2=floats[fi], age=(now-f2.t)/1000;
      if(age>1.3){ floats.splice(fi,1); continue; }
      ctx.font='600 12px "Pixelify Sans",monospace'; ctx.textAlign='center';
      ctx.globalAlpha=1-age/1.3;
      ctx.fillStyle='#000'; ctx.fillText(f2.txt, f2.x-view.x+1, f2.y-view.y-age*26+1);
      ctx.fillStyle=f2.col; ctx.fillText(f2.txt, f2.x-view.x, f2.y-view.y-age*26);
      ctx.globalAlpha=1;
    }
  }
  function drawPlayer(now){
    // drawn at 1:1 sheet scale (32×48) so the world reads big around the player
    var sx=player.px-view.x, sy=player.py-view.y;
    ctx.fillStyle='rgba(0,0,0,.28)'; ctx.beginPath(); ctx.ellipse(sx,sy+2,7,2.8,0,0,6.283); ctx.fill();
    var fr=player.moving? player.frame : 0;
    ctx.imageSmoothingEnabled=false;
    ctx.drawImage(sheet, fr*FRW, player.dir*FRH, FRW, FRH, Math.round(sx-FRW/2), Math.round(sy-FRH+6), FRW, FRH);
    // name tag
    ctx.font='600 12px "Pixelify Sans",monospace'; ctx.textAlign='center';
    ctx.fillStyle='#000'; ctx.fillText(player.name, sx+1, sy-FRH+1);
    ctx.fillStyle='#f5c453'; ctx.fillText(player.name, sx, sy-FRH);
  }
  function drawTim(now){
    var sx=tim.px-view.x, sy=tim.py-view.y;
    ctx.fillStyle='rgba(0,0,0,.28)'; ctx.beginPath(); ctx.ellipse(sx,sy+2,6,2.4,0,0,6.283); ctx.fill();
    var fr=tim.moving? tim.frame : 0;
    ctx.imageSmoothingEnabled=false;
    ctx.drawImage(gobSheet, fr*FRW, tim.dir*FRH, FRW, FRH, Math.round(sx-FRW/2), Math.round(sy-FRH+6), FRW, FRH);
    ctx.font='600 11px "Pixelify Sans",monospace'; ctx.textAlign='center';
    ctx.fillStyle='#000'; ctx.fillText('Tutorial Tim', sx+1, sy-FRH+9);
    ctx.fillStyle='#8fe0ff'; ctx.fillText('Tutorial Tim', sx, sy-FRH+8);
  }

  // ---------- actions (skilling) ----------
  var action=null;        // {type, target, t, dur}
  var pendingAction=null; // {type, target} — starts when we arrive adjacent
  function near(t,range){ return Math.hypot(player.x-t.x, player.y-t.y)<=(range||1.6); }
  function faceTarget(t){ player.dir = Math.abs(t.x-player.x)>Math.abs(t.y-player.y) ? (t.x>player.x?3:1) : (t.y>player.y?2:0); }
  function startAction(type,target){
    if(type==='chop' && invCount('bronze_axe')===0){ log('You need an axe to chop trees. Tutorial Tim hands them out to new faces.','sys'); return; }
    if(type==='chop' && target.kind==='yew' && lvlFromXp(save.skills.wc)<5){ log('You need Woodcutting level 5 to chop yews.','sys'); return; }
    if(type==='mine' && target.v===2 && lvlFromXp(save.skills.mine)<5){ log('You need Mining level 5 for iron rocks.','sys'); return; }
    if(type==='cook' && invCount('raw_shrimp')===0 && invCount('raw_trout')===0){ log('You have no raw fish to cook. The fire judges you quietly.','sys'); return; }
    faceTarget(target);
    var dur = type==='chop' ? (target.kind==='yew'?4.2:2.6)
            : type==='mine' ? (target.v===2?3.8:2.8)
            : type==='fish' ? 3.2 : 2.2;
    // levels speed things up a bit
    var sk = type==='chop'?'wc':type==='mine'?'mine':type==='fish'?'fish':'cook';
    dur *= Math.max(0.55, 1 - (lvlFromXp(save.skills[sk])-1)*0.03);
    action={ type:type, target:target, t:0, dur:dur };
    var verb=type==='chop'?'chop at the '+(target.kind==='yew'?'yew':'tree')
            :type==='mine'?'swing at the rock'
            :type==='fish'?'cast your line':'cook over the fire';
    log('You '+verb+'…','me');
  }
  function finishAction(){
    var a=action; action=null;
    if(!a) return;
    if(a.type==='chop'){
      sndChop();
      var yew=a.target.kind==='yew';
      if(addItem(yew?'yew_logs':'logs')){
        grantXp('wc', yew?80:25);
        questEvent(yew?'chop_yew':'chop_logs');
        if(!yew || Math.random()<0.3){ a.target.down=true; a.target.respawnT=yew?28:15; }
        if(!a.target.down){ startAction('chop', a.target); }   // keep chopping the yew
      }
    } else if(a.type==='mine'){
      sndClink();
      var iron=a.target.v===2;
      if(addItem(iron?'iron':'copper')){
        grantXp('mine', iron?55:30);
        questEvent('mine_ore');
        a.target.down=true; a.target.respawnT=iron?30:20;
      }
    } else if(a.type==='fish'){
      sndSplash();
      var trout = lvlFromXp(save.skills.fish)>=5 && Math.random()<0.45;
      if(addItem(trout?'raw_trout':'raw_shrimp')){
        grantXp('fish', trout?45:16);
        questEvent('fish_any');
        // spot persists — keep fishing
        startAction('fish', a.target);
      }
    } else if(a.type==='cook'){
      sndSizzle();
      var raw = invCount('raw_trout')>0 ? 'raw_trout' : 'raw_shrimp';
      if(invCount(raw)>0){
        removeItem(raw,1);
        var lvl=lvlFromXp(save.skills.cook);
        var burnChance=Math.max(0.05, 0.40 - (lvl-1)*(0.35/98));   // same 40%→5% curve as firemaking
        if(Math.random()<burnChance){ addItem('burnt'); log('You accidentally burn the fish. The fire apologises. It lies.','ex'); grantXp('cook',4); }
        else { addItem(raw==='raw_trout'?'trout':'shrimp'); grantXp('cook', raw==='raw_trout'?50:22); questEvent('cook_fish'); }
        if(invCount('raw_shrimp')>0 || invCount('raw_trout')>0){ startAction('cook', a.target); }
      }
    } else if(a.type==='light'){
      if(invCount('tinderbox')===0 || invCount(a.logId)===0) return;   // lost mid-strike somehow
      if(Math.random()<fmFailChance()){
        // failed strike — the log survives, you try again (each attempt = 2s)
        sndClink();
        log('The '+ITEMS[a.logId].nm.toLowerCase()+' refuse'+(a.logId==='logs'?'':'s')+' to catch. You try again…','ex');
        action={ type:'light', target:a.target, t:0, dur:2.0, logId:a.logId };
        return;
      }
      removeItem(a.logId,1);
      var life=Math.round(fmFireLife());
      props.push({x:player.x, y:player.y, kind:'fire', v:0, down:false, respawnT:0, temp:true, life:life});
      sndSizzle(); sndChop();
      log('The fire catches. '+life+' seconds of glory.','me');
      grantXp('cook', a.logId==='yew_logs'?14:6);
      // step off the flames like a sensible adventurer
      var adj=[[0,1],[0,-1],[1,0],[-1,0]].map(function(d){return {x:player.x+d[0],y:player.y+d[1]};}).find(function(c){return walkable(c.x,c.y);});
      if(adj){ var p2=findPath(player.x,player.y,adj.x,adj.y); if(p2) player.path=p2; }
    }
  }

  // firemaking: tinderbox + logs = a temporary campfire at your feet.
  // TOOL GATES (chat spec): tinderbox required · 2s strike time (acts as the
  // cooldown — one attempt per 2s, no spamming) · failure chance scales
  // linearly 40% @ lvl 1 → 5% @ lvl 99 (Cooking is the firemaking proxy
  // skill) · fire duration scales 60s @ lvl 1 → 120s @ lvl 99.
  function fmFailChance(){ var l=lvlFromXp(save.skills.cook); return Math.max(0.05, 0.40 - (l-1)*(0.35/98)); }
  function fmFireLife(){ var l=lvlFromXp(save.skills.cook); return Math.min(120, 60 + (l-1)*(60/98)); }
  function lightFire(logId){
    if(invCount('tinderbox')===0){ log('You need a tinderbox to light fires.','sys'); return; }
    if(invCount(logId)===0){ log('You have no logs to burn.','sys'); return; }
    if(action){ log('Finish what you\'re doing first.','sys'); return; }
    if(props.some(function(p){ return p.kind==='fire' && !p.down && p.x===player.x && p.y===player.y; })){ log('There\'s already a fire here.','sys'); return; }
    ac();
    action={ type:'light', target:{x:player.x, y:player.y}, t:0, dur:2.0, logId:logId };
    log('You strike the tinderbox against the '+ITEMS[logId].nm.toLowerCase()+'…','me');
  }

  // ---------- movement ----------
  function step(dt){
    // resource respawns + temp fires burning down
    for(var pi=props.length-1;pi>=0;pi--){
      var p=props[pi];
      if(p.down){ p.respawnT-=dt; if(p.respawnT<=0){ p.down=false; } }
      if(p.temp){
        p.life-=dt;
        if(p.life<=0){
          if(action && action.target===p){ action=null; log('The fire burns out beneath your cooking. Rude.','sys'); }
          props.splice(pi,1);
        }
      }
    }
    // fishing spots roam
    fishSpots.forEach(function(s){
      s.moveT-=dt;
      if(s.moveT<=0){
        if(action && action.type==='fish' && action.target===s){ action=null; log('The fish move on. So must you.','sys'); }
        relocateSpot(s);
      }
    });
    // active skilling
    if(action){
      if(action.target.down){ action=null; }
      else{
        action.t+=dt;
        player.moving=false;
        player.animT+=dt;
        if(player.animT>0.2){ player.animT=0; player.frame=(player.frame+1)%4; }  // work anim
        if(action.t>=action.dur) finishAction();
        return;
      }
    }
    if(!player.path.length){
      player.moving=false;
      if(pendingAction){
        var pa=pendingAction;
        if(near(pa.target, pa.type==='fish'?1.8:1.6)){ pendingAction=null; startAction(pa.type, pa.target); }
        else pendingAction=null;
      }
      return;
    }
    player.moving=true;
    var next=player.path[0], tx=next.x*TILE+TILE/2, ty=next.y*TILE+TILE/2;
    var dx=tx-player.px, dy=ty-player.py, dist=Math.hypot(dx,dy);
    if(Math.abs(dx)>Math.abs(dy)) player.dir = dx>0?3:1; else player.dir = dy>0?2:0;
    var mv=SPEED*dt;
    if(dist<=mv){
      player.px=tx; player.py=ty; player.x=next.x; player.y=next.y; player.path.shift();
      if(!player.path.length){
        if(pendingTalk && Math.hypot(player.x-tim.x,player.y-tim.y)<=1.6){ pendingTalk=false; timTalk(); }
        if(pendingAction && near(pendingAction.target, pendingAction.type==='fish'?1.8:1.6)){
          var pa2=pendingAction; pendingAction=null; startAction(pa2.type, pa2.target);
        }
      }
    }
    else { player.px+=dx/dist*mv; player.py+=dy/dist*mv; }
    player.animT+=dt;
    if(player.animT>0.14){ player.animT=0; player.frame=(player.frame+1)%4; }
  }

  // walk adjacent to a target then start an action there
  function goDo(type,target){
    ac();                                  // unlock audio on user intent
    if(near(target, type==='fish'?1.8:1.6)){ startAction(type,target); return; }
    var cand=[[0,1],[0,-1],[1,0],[-1,0]].map(function(d){return {x:target.x+d[0],y:target.y+d[1]};}).filter(function(c){return walkable(c.x,c.y);});
    cand.sort(function(a,b){ return Math.hypot(a.x-player.x,a.y-player.y)-Math.hypot(b.x-player.x,b.y-player.y); });
    for(var i=0;i<cand.length;i++){
      var p=findPath(player.x,player.y,cand[i].x,cand[i].y);
      if(p){ player.path=p; pendingAction={type:type,target:target}; pendingTalk=false;
        marker={x:target.x,y:target.y,t:performance.now(),ok:true}; return; }
    }
    log("You can't reach that.",'sys');
  }

  // ---------- input ----------
  function log(msg,cls){
    var d=document.createElement('div'); if(cls)d.className=cls; d.textContent=msg;
    logEl.appendChild(d); while(logEl.children.length>40) logEl.removeChild(logEl.firstChild);
    logEl.scrollTop=logEl.scrollHeight;
  }
  // ---------- quests ----------
  var QUEST_DEFS={
    chop_logs:{ t:'Lumber Beginnings', d:'Chop {n} logs from regular trees', ns:[4,6,8], ev:'chop_logs', coins:12, xp:['wc',40] },
    chop_yew:{ t:'The Dark Grove', d:'Fell {n} yew logs (Woodcutting 5)', ns:[2,3], ev:'chop_yew', coins:30, xp:['wc',120] },
    mine_ore:{ t:'Rock Bottom', d:'Mine {n} ores of any kind', ns:[3,5], ev:'mine_ore', coins:15, xp:['mine',50] },
    fish_any:{ t:'Gone Fishing', d:'Catch {n} fish from the churning spots', ns:[3,5], ev:'fish_any', coins:15, xp:['fish',45] },
    cook_fish:{ t:'Camp Chef', d:'Successfully cook {n} fish (burnt ones cry, and do not count)', ns:[2,4], ev:'cook_fish', coins:20, xp:['cook',60] },
    talk_tim:{ t:'Mandatory Tutorial', d:'Endure {n} pieces of advice from Tutorial Tim', ns:[2,3], ev:'talk_tim', coins:8, xp:['wc',10] }
  };
  function rollQuests(){
    var keys=Object.keys(QUEST_DEFS).sort(function(){ return Math.random()-0.5; }).slice(0,3);
    save.quests=keys.map(function(k){
      var def=QUEST_DEFS[k], n=def.ns[Math.floor(Math.random()*def.ns.length)];
      return { k:k, n:n, done:0, claimed:false };
    });
    persist();
  }
  if(!save.quests) rollQuests();
  function questEvent(ev){
    var hit=false;
    (save.quests||[]).forEach(function(q){
      if(q.claimed) return;
      if(QUEST_DEFS[q.k].ev===ev && q.done<q.n){ q.done++; hit=true;
        if(q.done===q.n) log('📜 Quest ready to claim: '+QUEST_DEFS[q.k].t+'!','tim');
      }
    });
    if(hit){ persist(); renderQuests(); }
  }
  function renderQuests(){
    var el=document.getElementById('qlist'); if(!el) return;
    el.innerHTML='';
    (save.quests||[]).forEach(function(q,qi){
      var def=QUEST_DEFS[q.k];
      var card=document.createElement('div'); card.className='qcard';
      var pct=Math.min(100, Math.round(q.done/q.n*100));
      card.innerHTML='<div class="t">'+(q.claimed?'✅ ':'')+def.t+'</div>'+
        '<div class="r">'+def.d.replace('{n}',q.n)+' · reward: 🪙'+def.coins+' + '+def.xp[1]+' '+SKILLS[def.xp[0]].nm+' xp</div>'+
        '<div class="qbar"><i style="width:'+pct+'%"></i></div>'+
        '<div class="r">'+q.done+' / '+q.n+'</div>';
      var b=document.createElement('button'); b.type='button';
      if(q.claimed){ b.disabled=true; b.textContent='Claimed'; }
      else if(q.done>=q.n){ b.textContent='Claim reward';
        b.addEventListener('click', function(){
          q.claimed=true; save.coins+=def.coins; grantXp(def.xp[0], def.xp[1]);
          sndQuest(); log('📜 Quest complete: '+def.t+' — 🪙'+def.coins+' earned!','tim');
          // replace with a fresh quest after a beat
          setTimeout(function(){
            var pool=Object.keys(QUEST_DEFS).filter(function(k){ return !save.quests.some(function(o){return o.k===k && !o.claimed;}); });
            if(pool.length){ var k=pool[Math.floor(Math.random()*pool.length)];
              var d2=QUEST_DEFS[k]; save.quests[qi]={k:k,n:d2.ns[Math.floor(Math.random()*d2.ns.length)],done:0,claimed:false};
              persist(); renderQuests(); }
          }, 600);
          persist(); renderSkills(); renderQuests();
        });
      }
      else { b.disabled=true; b.textContent='In progress'; }
      card.appendChild(b);
      el.appendChild(card);
    });
  }
  var questov=document.getElementById('questov');
  function openQuests(){ renderQuests(); questov.classList.add('open'); }
  function closeQuests(){ questov.classList.remove('open'); }
  document.getElementById('questBtn').addEventListener('click', openQuests);
  document.getElementById('questX').addEventListener('click', closeQuests);
  questov.addEventListener('click', function(e){ if(e.target===questov) closeQuests(); });
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') closeQuests(); });
  document.getElementById('packTab').addEventListener('click', function(){
    var s=document.getElementById('side'); s.classList.toggle('open');
    this.setAttribute('aria-expanded', s.classList.contains('open')?'true':'false');
  });

  // ---- actions (shared by left-click and the right-click menu) ----
  function walkTo(tx,ty){
    action=null; pendingAction=null;      // moving cancels skilling
    var path=findPath(player.x,player.y,tx,ty);
    marker={x:tx,y:ty,t:performance.now(),ok:!!path};
    if(path){ player.path=path; }
    else if(map[ty]&&map[ty][tx]===0){ log("You can't walk on water. Yet.",'sys'); }
    else { log("You can't reach that.",'sys'); }
  }
  function spotAt(t){ return fishSpots.find(function(s){ return s.x===t.x && s.y===t.y; }); }
  function examineProp(hit){
    log('You examine the '+hit.kind+'.','me');
    log(EXAMINE[hit.kind][hit.v],'ex');
    var adj=[[0,1],[0,-1],[1,0],[-1,0]].map(function(d){return {x:hit.x+d[0],y:hit.y+d[1]};}).find(function(c){return walkable(c.x,c.y);});
    if(adj){ var p2=findPath(player.x,player.y,adj.x,adj.y); if(p2){ player.path=p2; } }
    marker={x:hit.x,y:hit.y,t:performance.now(),ok:true};
  }
  function tileAt(e){
    var wx=e.clientX+view.x, wy=e.clientY+view.y;
    return { x:Math.floor(wx/TILE), y:Math.floor(wy/TILE) };
  }

  function timAt(t){ return (t.x===tim.x && t.y===tim.y) || (Math.abs(t.x-tim.x)<=0 && t.y===tim.y-1); }
  canvas.addEventListener('pointerdown', function(e){
    if(e.button===2) return;                 // right-click handled by contextmenu
    hideMenu();
    var t=tileAt(e);
    if(t.x<0||t.y<0||t.x>=W||t.y>=H) return;
    if(timAt(t)){ marker={x:tim.x,y:tim.y,t:performance.now(),ok:true}; requestTalk(); return; }
    var sp=spotAt(t);
    if(sp){ goDo('fish', sp); return; }
    var hit=props.find(function(p){ return p.x===t.x && p.y===t.y; });
    if(hit){
      if(hit.down){ log(hit.kind==='rock'?'The rock has been mined out. It needs a moment.':'Just a stump. Give it time.','ex'); return; }
      if(hit.kind==='tree'||hit.kind==='yew'){ goDo('chop', hit); return; }
      if(hit.kind==='rock'){ goDo('mine', hit); return; }
      if(hit.kind==='fire'){ goDo('cook', hit); return; }
      if(hit.kind==='board'){ openQuests(); return; }
      examineProp(hit); return;
    }
    pendingTalk=false;
    walkTo(t.x,t.y);
  });

  // ---- RS-style right-click menu ----
  var ctxEl=document.getElementById('ctx'), ctxItems=document.getElementById('ctxItems');
  function hideMenu(){ ctxEl.style.display='none'; }
  function showMenu(px,py,items){
    ctxItems.innerHTML='';
    items.forEach(function(it){
      var b=document.createElement('button'); b.type='button'; b.setAttribute('role','menuitem');
      b.innerHTML=it.label;
      b.addEventListener('click', function(){ hideMenu(); if(it.act) it.act(); });
      ctxItems.appendChild(b);
    });
    ctxEl.style.display='block';
    // clamp to viewport
    var r=ctxEl.getBoundingClientRect();
    ctxEl.style.left=Math.min(px, innerWidth-r.width-6)+'px';
    ctxEl.style.top =Math.min(py, innerHeight-r.height-6)+'px';
  }
  canvas.addEventListener('contextmenu', function(e){
    e.preventDefault();
    var t=tileAt(e);
    if(t.x<0||t.y<0||t.x>=W||t.y>=H){ hideMenu(); return; }
    var hit=props.find(function(p){ return p.x===t.x && p.y===t.y; });
    var sp=spotAt(t);
    var items=[];
    if(timAt(t)){
      items.push({label:'Talk-to <b>Tutorial Tim</b>', act:requestTalk});
      items.push({label:'Examine <b>Tutorial Tim</b>', act:function(){ log('You examine Tutorial Tim.','me'); log('A man who was, until recently, a goblin. The tiny hat survived the transformation.','ex'); }});
    } else if(sp){
      items.push({label:'Fish <b>Fishing spot</b>', act:function(){ goDo('fish', sp); }});
      items.push({label:'Examine <b>Fishing spot</b>', act:function(){ log(EXAMINE.spot[Math.floor(Math.random()*EXAMINE.spot.length)],'ex'); }});
    } else if(hit){
      var NM={yew:'Yew tree', tree:'Tree', rock:'Rock', fire:'Campfire', board:'Quest board'};
      var nm=NM[hit.kind]||'Thing';
      if(!hit.down){
        if(hit.kind==='tree'||hit.kind==='yew') items.push({label:'Chop down <b>'+nm+'</b>', act:function(){ goDo('chop', hit); }});
        if(hit.kind==='rock') items.push({label:'Mine <b>'+nm+'</b>', act:function(){ goDo('mine', hit); }});
        if(hit.kind==='fire') items.push({label:'Cook <b>at '+nm+'</b>', act:function(){ goDo('cook', hit); }});
        if(hit.kind==='board') items.push({label:'Read <b>'+nm+'</b>', act:openQuests});
      }
      items.push({label:'Examine <b>'+nm+'</b>', act:function(){ examineProp(hit); }});
      items.push({label:'Walk here', act:function(){ walkTo(hit.x,hit.y); }});
    } else {
      items.push({label:'Walk here', act:function(){ walkTo(t.x,t.y); }});
    }
    items.push({label:'Cancel', act:null});
    showMenu(e.clientX, e.clientY, items);
  });
  // the browser menu never escapes: swallow contextmenu on the options
  // container itself AND document-wide (chatbox, HUD, everything)
  ctxEl.addEventListener('contextmenu', function(e){ e.preventDefault(); e.stopPropagation(); });
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); });
  document.addEventListener('pointerdown', function(e){ if(!ctxEl.contains(e.target) && e.target!==canvas) hideMenu(); });
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') hideMenu(); });
  addEventListener('blur', hideMenu);

  // ---------- loop ----------
  var last=performance.now();
  function frame(now){
    requestAnimationFrame(frame);
    var dt=Math.min(0.05,(now-last)/1000); last=now;
    // butterflies drift
    flies.forEach(function(f){
      f.flap+=dt*14;
      f.a+=(Math.random()-0.5)*dt*3;
      f.x+=Math.cos(f.a)*f.sp*dt; f.y+=Math.sin(f.a)*f.sp*dt;
      if(f.x<TILE*4||f.x>(W-4)*TILE) f.a=Math.PI-f.a;
      if(f.y<TILE*4||f.y>(H-4)*TILE) f.a=-f.a;
    });
    step(dt); timUpdate(dt); draw(now,dt);
  }
  // snap camera to player at boot
  view.x=player.px-innerWidth/2; view.y=player.py-innerHeight/2;
  requestAnimationFrame(frame);

  renderSkills(); renderInv(); renderQuests();
  log('Welcome to SloppyScape.','sys');
  log('Chop trees. Mine rocks. Fish the churning spots. Cook at the campfire.','sys');
  log('The quest board near spawn has work for you. 🪙 awaits.','sys');
  log('A man in a tiny hat patrols the yew grove. Talk to him — he has gifts.','sys');
})();
</script>
