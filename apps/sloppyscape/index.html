<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>SloppyScape</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8F%9D%EF%B8%8F" />

<meta name="description" content="A tiny top-down RuneScape-like: click to walk your pixel adventurer around a green island. The journey of a thousand quests begins with one yellow X." />
<meta property="og:type" content="website" />
<meta property="og:title" content="SloppyScape" />
<meta property="og:description" content="Click to walk. Examine things. It's a green island and it's all yours." />
<meta property="og:url" content="https://sloppy.live/sloppyscape/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/top%20down%20pixel%20art%20rpg%20green%20island%20surrounded%20by%20ocean%2C%20tiny%20adventurer%20sprite%2C%20trees%20and%20rocks%2C%20retro%20mmorpg%20style?width=1200&height=630&nologo=true&seed=2007" />
<meta name="twitter:card" content="summary_large_image" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;600&display=swap" rel="stylesheet" />

<style>
  :root{ --gold:#f5c453; --panel:#3a3025; --panel2:#2b2318; --line:#5d4c33; --ink:#efe6d0; }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  html,body{height:100%}
  body{ font-family:'Pixelify Sans',monospace; background:#0d1a24; color:var(--ink); overflow:hidden;
    user-select:none; -webkit-tap-highlight-color:transparent; }
  #game{ position:fixed; inset:0; display:block; image-rendering:pixelated; cursor:crosshair; }

  .brand{ position:fixed; top:.6rem; left:.8rem; z-index:5; pointer-events:none; }
  .brand h1{ font-size:1.3rem; font-weight:600; color:var(--gold); text-shadow:2px 2px 0 #000; letter-spacing:.02em; }
  .brand .sub{ font-size:.7rem; color:#cbbfa4; text-shadow:1px 1px 0 #000; }

  /* RS-style chatbox */
  .chatbox{ position:fixed; left:.6rem; bottom:.6rem; z-index:5; width:min(24rem,72vw);
    background:rgba(43,35,24,.92); border:2px solid var(--line); border-radius:6px;
    box-shadow:0 4px 14px rgba(0,0,0,.5); }
  .chatbox .bar{ background:linear-gradient(180deg,#57472f,#463823); font-size:.68rem; letter-spacing:.06em;
    padding:.2rem .55rem; color:var(--gold); border-bottom:1px solid var(--line); }
  .chatbox .log{ padding:.35rem .55rem; height:5.4rem; overflow-y:auto; font-size:.78rem; line-height:1.5; }
  .chatbox .log .sys{ color:#8fd2ff; }
  .chatbox .log .ex{ color:#cbbfa4; }
  .chatbox .log .me{ color:#ffe9a8; }

  .hint{ position:fixed; right:.8rem; bottom:.8rem; z-index:5; font-size:.7rem; color:#cbbfa4;
    text-shadow:1px 1px 0 #000; text-align:right; line-height:1.6; pointer-events:none; }
  @media (max-width:700px){ .hint{ display:none; } .chatbox .log{ height:4rem; } }
</style>
</head>
<body>
  <canvas id="game" role="application" aria-label="SloppyScape island. Click or tap anywhere on the ground to walk there."></canvas>
  <div class="brand" aria-hidden="true"><h1>SloppyScape</h1><div class="sub">a very small island · pop. 1</div></div>

  <div class="chatbox" aria-label="Game messages">
    <div class="bar">All · Game</div>
    <div class="log" id="log" role="log" aria-live="polite"></div>
  </div>
  <div class="hint" aria-hidden="true">click ground: walk · click 🌳/🪨: examine</div>

<script>
(function(){
  "use strict";
  var canvas=document.getElementById('game'), ctx=canvas.getContext('2d');
  var logEl=document.getElementById('log');

  // ---------- world gen (deterministic island) ----------
  var TILE=32, W=72, H=72, SEED=20260703;
  function mulberry(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; var t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
  var rng=mulberry(SEED);
  // value noise
  var gsz=10, gw=Math.ceil(W/gsz)+2, gh=Math.ceil(H/gsz)+2, gvals=[];
  for(var i=0;i<gw*gh;i++) gvals.push(rng());
  function lerp(a,b,t){ return a+(b-a)*t; }
  function smooth(t){ return t*t*(3-2*t); }
  function noise(x,y){
    var gx=x/gsz, gy=y/gsz, x0=Math.floor(gx), y0=Math.floor(gy);
    var fx=smooth(gx-x0), fy=smooth(gy-y0);
    function v(ix,iy){ return gvals[iy*gw+ix]; }
    return lerp(lerp(v(x0,y0),v(x0+1,y0),fx), lerp(v(x0,y0+1),v(x0+1,y0+1),fx), fy);
  }
  // tiles: 0 water, 1 sand, 2 grass, 3 dark grass
  var map=[], cx=W/2, cy=H/2;
  for(var y=0;y<H;y++){ var row=[];
    for(var x=0;x<W;x++){
      var d=Math.hypot(x-cx,y-cy)/(W*0.46);
      var v=noise(x,y)*0.5 + (1-d)*0.62;
      row.push(v>0.62 ? (noise(x*2+40,y*2+40)>0.55?3:2) : v>0.54 ? 1 : 0);
    }
    map.push(row);
  }
  function walkable(x,y){ return x>=0&&y>=0&&x<W&&y<H && map[y][x]>=1 && !blocked[y*W+x]; }

  // props: trees + rocks on grass
  var props=[], blocked=new Array(W*H).fill(false);
  var EXAMINE={
    tree:["A tree. It has decided to live here.","Sturdy. Unbothered. Moisturized.","You could chop it, if chopping existed yet."],
    rock:["It's a rock. Geology's greatest hit.","Millions of years old and still just sitting there.","You feel like it's judging your outfit."]
  };
  for(var py=2;py<H-2;py++){ for(var px=2;px<W-2;px++){
    if(map[py][px]>=2 && rng()<0.035){
      var kind=rng()<0.72?'tree':'rock';
      props.push({x:px,y:py,kind:kind,v:Math.floor(rng()*3)});
      blocked[py*W+px]=true;
    }
  }}

  // ---------- LPC-style spritesheet, generated procedurally ----------
  // Same layout the Universal LPC walkcycle uses: 4 rows (up/left/down/right)
  // × 4 walk frames, 32×48 per frame. Drawn in code because external asset
  // downloads aren't possible in this sandbox — style matches, source doesn't.
  var FRW=32, FRH=48, sheet=document.createElement('canvas');
  sheet.width=FRW*4; sheet.height=FRH*4;
  (function drawSheet(){
    var s=sheet.getContext('2d');
    var SKIN='#e8b98a', SKIN_D='#c99464', HAIR='#6b3f1d', TUNIC='#2e6f4e', TUNIC_D='#215339',
        PANTS='#4a3a63', BOOT='#3a2c1a';
    // rows: 0 up, 1 left, 2 down, 3 right (LPC order)
    for(var row=0;row<4;row++){
      for(var fr=0;fr<4;fr++){
        var ox=fr*FRW, oy=row*FRH;
        var step=(fr===1?1:fr===3?-1:0);       // leg/arm swing: 0,1,0,-1
        var bob=(fr===1||fr===3)?1:0;
        s.save(); s.translate(ox,oy+bob);
        // legs
        s.fillStyle=PANTS;
        s.fillRect(12,30+ (step>0?1:0),4,10-(step>0?1:0));   // left leg
        s.fillRect(17,30+ (step<0?1:0),4,10-(step<0?1:0));   // right leg
        s.fillStyle=BOOT;
        s.fillRect(11,39+(step>0?1:0),5,3); s.fillRect(17,39+(step<0?1:0),5,3);
        // tunic body
        s.fillStyle=TUNIC; s.fillRect(10,18,13,13);
        s.fillStyle=TUNIC_D; s.fillRect(10,28,13,3);
        // arms swing opposite legs
        s.fillStyle=(row===0)?TUNIC_D:SKIN;
        if(row===1){ s.fillRect(9,19+step*2,3,10); }          // facing left: near arm
        else if(row===3){ s.fillRect(21,19-step*2,3,10); }
        else { s.fillRect(8,19+step*2,3,10); s.fillRect(22,19-step*2,3,10); }
        // head
        s.fillStyle=SKIN; s.fillRect(11,6,11,11);
        s.fillStyle=SKIN_D; s.fillRect(11,15,11,2);
        // hair by facing
        s.fillStyle=HAIR;
        if(row===0){ s.fillRect(10,5,13,9); }                  // back of head
        else { s.fillRect(10,5,13,5); s.fillRect(10,5,3,8); s.fillRect(20,5,3,8); }
        // face by facing
        if(row===2){ s.fillStyle='#221510'; s.fillRect(13,11,2,2); s.fillRect(18,11,2,2); }
        else if(row===1){ s.fillStyle='#221510'; s.fillRect(12,11,2,2); }
        else if(row===3){ s.fillStyle='#221510'; s.fillRect(19,11,2,2); }
        s.restore();
      }
    }
  })();

  // ---------- player ----------
  var spawn=(function(){ // nearest walkable to centre
    for(var r=0;r<20;r++){ for(var a=0;a<24;a++){
      var x=Math.round(cx+Math.cos(a/24*6.283)*r), y=Math.round(cy+Math.sin(a/24*6.283)*r);
      if(x>=0&&y>=0&&x<W&&y<H&&map[y][x]>=2&&!blocked[y*W+x]) return {x:x,y:y};
    }} return {x:Math.round(cx),y:Math.round(cy)};
  })();
  var player={ x:spawn.x, y:spawn.y, px:spawn.x*TILE+TILE/2, py:spawn.y*TILE+TILE/2,
    path:[], dir:2, moving:false, frame:0, animT:0, name:'Adventurer' };
  var SPEED=110; // px/s

  // ---------- pathfinding (BFS — uniform cost grid) ----------
  function findPath(sx,sy,tx,ty){
    if(!walkable(tx,ty)) return null;
    var prev=new Int32Array(W*H).fill(-1), seen=new Uint8Array(W*H);
    var q=[sy*W+sx]; seen[sy*W+sx]=1;
    var dirs=[1,-1,W,-W];
    while(q.length){
      var cur=q.shift();
      if(cur===ty*W+tx) break;
      var cxx=cur%W;
      for(var i=0;i<4;i++){
        var nx=cur+dirs[i];
        if(nx<0||nx>=W*H) continue;
        if(dirs[i]===1 && cxx===W-1) continue;
        if(dirs[i]===-1 && cxx===0) continue;
        if(seen[nx]) continue;
        var nxx=nx%W, nyy=(nx-nxx)/W;
        if(!walkable(nxx,nyy)) continue;
        seen[nx]=1; prev[nx]=cur; q.push(nx);
      }
    }
    if(!seen[ty*W+tx]) return null;
    var path=[], node=ty*W+tx;
    while(node!==sy*W+sx){ path.push({x:node%W, y:(node-node%W)/W}); node=prev[node]; if(node<0) return null; }
    path.reverse(); return path;
  }

  // ---------- camera / render ----------
  var view={x:0,y:0}, DPR=Math.min(2, window.devicePixelRatio||1);
  function fit(){ canvas.width=innerWidth*DPR; canvas.height=innerHeight*DPR; canvas.style.width=innerWidth+'px'; canvas.style.height=innerHeight+'px'; }
  addEventListener('resize', fit); fit();

  var marker=null; // {x,y,t,ok}
  var TCOL={0:'#2e6d9e',1:'#d9c07c',2:'#5d9c47',3:'#4c8639'};
  function draw(now,dt){
    var vw=canvas.width/DPR, vh=canvas.height/DPR;
    // camera follows
    view.x+= (player.px-vw/2-view.x)*0.12; view.y+=(player.py-vh/2-view.y)*0.12;
    view.x=Math.max(-80,Math.min(W*TILE-vw+80,view.x)); view.y=Math.max(-80,Math.min(H*TILE-vh+80,view.y));
    ctx.setTransform(DPR,0,0,DPR,0,0);
    ctx.fillStyle='#1d4a70'; ctx.fillRect(0,0,vw,vh);
    var x0=Math.max(0,Math.floor(view.x/TILE)), y0=Math.max(0,Math.floor(view.y/TILE));
    var x1=Math.min(W-1,Math.ceil((view.x+vw)/TILE)), y1=Math.min(H-1,Math.ceil((view.y+vh)/TILE));
    for(var y=y0;y<=y1;y++){ for(var x=x0;x<=x1;x++){
      var t=map[y][x], sx=x*TILE-view.x, sy=y*TILE-view.y;
      ctx.fillStyle=TCOL[t]; ctx.fillRect(sx,sy,TILE,TILE);
      if(t===0){ // water shimmer
        if(((x*7+y*13+ (now/450|0))%9)===0){ ctx.fillStyle='rgba(255,255,255,.13)'; ctx.fillRect(sx+8,sy+14,10,2); }
      } else if(t===2||t===3){
        if(((x*5+y*11)%7)===0){ ctx.fillStyle='rgba(0,0,0,.08)'; ctx.fillRect(sx+6,sy+6,3,3); }
      } else if(t===1 && ((x+y)%5===0)){ ctx.fillStyle='rgba(0,0,0,.07)'; ctx.fillRect(sx+12,sy+9,3,2); }
    }}
    // click marker (RS yellow X)
    if(marker){
      var age=(now-marker.t)/1000;
      if(age>0.9) marker=null;
      else{
        var mx=marker.x*TILE-view.x+TILE/2, my=marker.y*TILE-view.y+TILE/2, k=1-age/0.9;
        ctx.strokeStyle=marker.ok?'rgba(255,222,60,'+k+')':'rgba(229,72,77,'+k+')'; ctx.lineWidth=3;
        ctx.beginPath(); ctx.moveTo(mx-7,my-7); ctx.lineTo(mx+7,my+7); ctx.moveTo(mx+7,my-7); ctx.lineTo(mx-7,my+7); ctx.stroke();
      }
    }
    // props + player, y-sorted
    var drawables=[];
    for(var p=0;p<props.length;p++){ var pr=props[p];
      if(pr.x<x0-1||pr.x>x1+1||pr.y<y0-2||pr.y>y1+1) continue; drawables.push(pr); }
    drawables.push(player);
    drawables.sort(function(a,b){ return (a.py|| (a.y*TILE+TILE)) - (b.py|| (b.y*TILE+TILE)); });
    drawables.forEach(function(d){
      if(d===player){ drawPlayer(now); return; }
      var sx=d.x*TILE-view.x+TILE/2, sy=d.y*TILE-view.y+TILE;
      if(d.kind==='tree'){
        ctx.fillStyle='rgba(0,0,0,.25)'; ctx.beginPath(); ctx.ellipse(sx,sy-3,11,4,0,0,6.283); ctx.fill();
        ctx.fillStyle='#5a3a1c'; ctx.fillRect(sx-3,sy-18,6,16);
        ctx.fillStyle=d.v===0?'#2e6f2e':d.v===1?'#3c8437':'#2a6440';
        ctx.beginPath(); ctx.arc(sx,sy-26,13,0,6.283); ctx.fill();
        ctx.beginPath(); ctx.arc(sx-8,sy-19,9,0,6.283); ctx.fill();
        ctx.beginPath(); ctx.arc(sx+8,sy-19,9,0,6.283); ctx.fill();
        ctx.fillStyle='rgba(255,255,255,.12)'; ctx.beginPath(); ctx.arc(sx-4,sy-30,5,0,6.283); ctx.fill();
      } else {
        ctx.fillStyle='rgba(0,0,0,.22)'; ctx.beginPath(); ctx.ellipse(sx,sy-2,10,3.4,0,0,6.283); ctx.fill();
        ctx.fillStyle=d.v===0?'#8b8e94':'#7a7d84';
        ctx.beginPath(); ctx.moveTo(sx-10,sy-2); ctx.lineTo(sx-5,sy-12); ctx.lineTo(sx+4,sy-13); ctx.lineTo(sx+10,sy-2); ctx.closePath(); ctx.fill();
        ctx.fillStyle='rgba(255,255,255,.16)'; ctx.fillRect(sx-3,sy-11,4,3);
      }
    });
  }
  function drawPlayer(now){
    var sx=player.px-view.x, sy=player.py-view.y;
    ctx.fillStyle='rgba(0,0,0,.28)'; ctx.beginPath(); ctx.ellipse(sx,sy+3,9,3.6,0,0,6.283); ctx.fill();
    var fr=player.moving? player.frame : 0;
    ctx.imageSmoothingEnabled=false;
    ctx.drawImage(sheet, fr*FRW, player.dir*FRH, FRW, FRH, Math.round(sx-FRW*0.75), Math.round(sy-FRH*1.5+6), FRW*1.5, FRH*1.5);
    // name tag
    ctx.font='600 12px "Pixelify Sans",monospace'; ctx.textAlign='center';
    ctx.fillStyle='#000'; ctx.fillText(player.name, sx+1, sy-FRH*1.5+1);
    ctx.fillStyle='#f5c453'; ctx.fillText(player.name, sx, sy-FRH*1.5);
  }

  // ---------- movement ----------
  function step(dt){
    if(!player.path.length){ player.moving=false; return; }
    player.moving=true;
    var next=player.path[0], tx=next.x*TILE+TILE/2, ty=next.y*TILE+TILE/2;
    var dx=tx-player.px, dy=ty-player.py, dist=Math.hypot(dx,dy);
    if(Math.abs(dx)>Math.abs(dy)) player.dir = dx>0?3:1; else player.dir = dy>0?2:0;
    var mv=SPEED*dt;
    if(dist<=mv){ player.px=tx; player.py=ty; player.x=next.x; player.y=next.y; player.path.shift(); }
    else { player.px+=dx/dist*mv; player.py+=dy/dist*mv; }
    player.animT+=dt;
    if(player.animT>0.14){ player.animT=0; player.frame=(player.frame+1)%4; }
  }

  // ---------- input ----------
  function log(msg,cls){
    var d=document.createElement('div'); if(cls)d.className=cls; d.textContent=msg;
    logEl.appendChild(d); while(logEl.children.length>40) logEl.removeChild(logEl.firstChild);
    logEl.scrollTop=logEl.scrollHeight;
  }
  canvas.addEventListener('pointerdown', function(e){
    var wx=e.clientX+view.x, wy=e.clientY+view.y;
    var tx=Math.floor(wx/TILE), ty=Math.floor(wy/TILE);
    if(tx<0||ty<0||tx>=W||ty>=H){ return; }
    // prop click = examine
    var hit=props.find(function(p){ return p.x===tx && p.y===ty; });
    if(hit){
      log('You examine the '+hit.kind+'.','me');
      log(EXAMINE[hit.kind][hit.v],'ex');
      // walk adjacent to it
      var adj=[[0,1],[0,-1],[1,0],[-1,0]].map(function(d){return {x:tx+d[0],y:ty+d[1]};}).find(function(c){return walkable(c.x,c.y);});
      if(adj){ var p2=findPath(player.x,player.y,adj.x,adj.y); if(p2){ player.path=p2; } }
      marker={x:tx,y:ty,t:performance.now(),ok:true};
      return;
    }
    var path=findPath(player.x,player.y,tx,ty);
    marker={x:tx,y:ty,t:performance.now(),ok:!!path};
    if(path){ player.path=path; }
    else if(map[ty]&&map[ty][tx]===0){ log("You can't walk on water. Yet.",'sys'); }
    else { log("You can't reach that.",'sys'); }
  });

  // ---------- loop ----------
  var last=performance.now();
  function frame(now){
    requestAnimationFrame(frame);
    var dt=Math.min(0.05,(now-last)/1000); last=now;
    step(dt); draw(now,dt);
  }
  // snap camera to player at boot
  view.x=player.px-innerWidth/2; view.y=player.py-innerHeight/2;
  requestAnimationFrame(frame);

  log('Welcome to SloppyScape.','sys');
  log('Click the ground to walk. Click a tree or rock to examine it.','sys');
  log('This island is otherwise blank. That is the point. Suggest what it needs.','sys');
})();
</script>
</body>
</html>
