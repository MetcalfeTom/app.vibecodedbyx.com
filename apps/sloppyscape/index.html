<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>SloppyScape</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8F%9D%EF%B8%8F" />

<meta name="description" content="A tiny top-down RuneScape-like: click to walk your pixel adventurer around a green island. The journey of a thousand quests begins with one yellow X." />
<meta property="og:type" content="website" />
<meta property="og:title" content="SloppyScape" />
<meta property="og:description" content="Click to walk. Examine things. It's a green island and it's all yours." />
<meta property="og:url" content="https://sloppy.live/sloppyscape/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/top%20down%20pixel%20art%20rpg%20green%20island%20surrounded%20by%20ocean%2C%20tiny%20adventurer%20sprite%2C%20trees%20and%20rocks%2C%20retro%20mmorpg%20style?width=1200&height=630&nologo=true&seed=2007" />
<meta name="twitter:card" content="summary_large_image" />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;600&display=swap" rel="stylesheet" />

<style>
  :root{ --gold:#f5c453; --panel:#3a3025; --panel2:#2b2318; --line:#5d4c33; --ink:#efe6d0; }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  html,body{height:100%}
  body{ font-family:'Pixelify Sans',monospace; background:#0d1a24; color:var(--ink); overflow:hidden;
    user-select:none; -webkit-tap-highlight-color:transparent; }
  #game{ position:fixed; inset:0; display:block; image-rendering:pixelated; cursor:crosshair; }

  .brand{ position:fixed; top:.6rem; left:.8rem; z-index:5; pointer-events:none; }
  .brand h1{ font-size:1.3rem; font-weight:600; color:var(--gold); text-shadow:2px 2px 0 #000; letter-spacing:.02em; }
  .brand .sub{ font-size:.7rem; color:#cbbfa4; text-shadow:1px 1px 0 #000; }

  /* RS-style chatbox */
  .chatbox{ position:fixed; left:.6rem; bottom:.6rem; z-index:5; width:min(24rem,72vw);
    background:rgba(43,35,24,.92); border:2px solid var(--line); border-radius:6px;
    box-shadow:0 4px 14px rgba(0,0,0,.5); }
  .chatbox .bar{ background:linear-gradient(180deg,#57472f,#463823); font-size:.68rem; letter-spacing:.06em;
    padding:.2rem .55rem; color:var(--gold); border-bottom:1px solid var(--line); }
  .chatbox .log{ padding:.35rem .55rem; height:5.4rem; overflow-y:auto; font-size:.78rem; line-height:1.5; }
  .chatbox .log .sys{ color:#8fd2ff; }
  .chatbox .log .ex{ color:#cbbfa4; }
  .chatbox .log .me{ color:#ffe9a8; }
  .chatbox .log .tim{ color:#9fe08f; }

  .hint{ position:fixed; right:.8rem; bottom:.8rem; z-index:5; font-size:.7rem; color:#cbbfa4;
    text-shadow:1px 1px 0 #000; text-align:right; line-height:1.6; pointer-events:none; }
  @media (max-width:700px){ .hint{ display:none; } .chatbox .log{ height:4rem; } }

  /* RS-style right-click context menu */
  #ctx{ position:fixed; z-index:20; min-width:9.5rem; display:none;
    background:#5d5447; border:1px solid #0e0c09; border-radius:3px; overflow:hidden;
    box-shadow:0 6px 16px rgba(0,0,0,.55); font-size:.82rem; }
  #ctx .h{ background:#0e0c09; color:#5f5443; padding:.18rem .5rem .22rem; font-size:.74rem; }
  #ctx .h span{ color:#b8a988; }
  #ctx button{ display:block; width:100%; text-align:left; border:0; cursor:pointer; font-family:inherit;
    font-size:.82rem; background:#5d5447; color:#fff; padding:.28rem .5rem; min-height:1.9rem; }
  #ctx button b{ color:#ffdd8a; font-weight:400; }
  #ctx button:hover, #ctx button:focus-visible{ background:#3f3930; color:#ffdd8a; outline:none; }
</style>
</head>
<body>
  <canvas id="game" role="application" aria-label="SloppyScape island. Click or tap anywhere on the ground to walk there."></canvas>
  <div class="brand" aria-hidden="true"><h1>SloppyScape</h1><div class="sub">a very small island · pop. 1</div></div>

  <div class="chatbox" aria-label="Game messages">
    <div class="bar">All · Game</div>
    <div class="log" id="log" role="log" aria-live="polite"></div>
  </div>
  <div class="hint" aria-hidden="true">left-click: walk · right-click: options</div>
  <div id="ctx" role="menu" aria-label="Game actions"><div class="h">Choose Option <span>·</span></div><div id="ctxItems"></div></div>

<script>
(function(){
  "use strict";
  var canvas=document.getElementById('game'), ctx=canvas.getContext('2d');
  var logEl=document.getElementById('log');

  // ---------- world gen (deterministic island) ----------
  var TILE=32, W=72, H=72, SEED=20260703;
  function mulberry(a){ return function(){ a|=0; a=a+0x6D2B79F5|0; var t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
  var rng=mulberry(SEED);
  // value noise
  var gsz=10, gw=Math.ceil(W/gsz)+2, gh=Math.ceil(H/gsz)+2, gvals=[];
  for(var i=0;i<gw*gh;i++) gvals.push(rng());
  function lerp(a,b,t){ return a+(b-a)*t; }
  function smooth(t){ return t*t*(3-2*t); }
  function noise(x,y){
    var gx=x/gsz, gy=y/gsz, x0=Math.floor(gx), y0=Math.floor(gy);
    var fx=smooth(gx-x0), fy=smooth(gy-y0);
    function v(ix,iy){ return gvals[iy*gw+ix]; }
    return lerp(lerp(v(x0,y0),v(x0+1,y0),fx), lerp(v(x0,y0+1),v(x0+1,y0+1),fx), fy);
  }
  // tiles: 0 water, 1 sand, 2 grass, 3 dark grass
  var map=[], cx=W/2, cy=H/2;
  for(var y=0;y<H;y++){ var row=[];
    for(var x=0;x<W;x++){
      var d=Math.hypot(x-cx,y-cy)/(W*0.46);
      var v=noise(x,y)*0.5 + (1-d)*0.62;
      row.push(v>0.62 ? (noise(x*2+40,y*2+40)>0.55?3:2) : v>0.54 ? 1 : 0);
    }
    map.push(row);
  }
  function walkable(x,y){ return x>=0&&y>=0&&x<W&&y<H && map[y][x]>=1 && !blocked[y*W+x]; }

  // props: trees + rocks on grass
  var props=[], blocked=new Array(W*H).fill(false);
  var EXAMINE={
    tree:["A tree. It has decided to live here.","Sturdy. Unbothered. Moisturized.","You could chop it, if chopping existed yet."],
    rock:["It's a rock. Geology's greatest hit.","Millions of years old and still just sitting there.","You feel like it's judging your outfit."],
    yew:["A yew tree. Veterans feel a strange urge to stand here for six hours.","Dark, ancient, and worth 175 xp somewhere else.","The yew says nothing. The yew has seen things."]
  };
  for(var py=2;py<H-2;py++){ for(var px=2;px<W-2;px++){
    if(map[py][px]>=2 && rng()<0.035){
      var kind=rng()<0.72?'tree':'rock';
      props.push({x:px,y:py,kind:kind,v:Math.floor(rng()*3)});
      blocked[py*W+px]=true;
    }
  }}

  // ---- yew grove: densest tree cluster becomes dark yews (Tim's patrol turf) ----
  var trees=props.filter(function(p){ return p.kind==='tree'; });
  var yewAnchor=null, bestN=-1;
  trees.forEach(function(t){
    var n=trees.reduce(function(acc,o){ return acc + (Math.abs(o.x-t.x)<=4 && Math.abs(o.y-t.y)<=4 ?1:0); },0);
    if(n>bestN){ bestN=n; yewAnchor=t; }
  });
  if(yewAnchor){
    trees.forEach(function(t){
      if(Math.abs(t.x-yewAnchor.x)<=4 && Math.abs(t.y-yewAnchor.y)<=4){ t.kind='yew'; }
    });
  }

  // ---------- LPC-style spritesheet, generated procedurally ----------
  // Same layout the Universal LPC walkcycle uses: 4 rows (up/left/down/right)
  // × 4 walk frames, 32×48 per frame. Drawn in code because external asset
  // downloads aren't possible in this sandbox — style matches, source doesn't.
  var FRW=32, FRH=48, sheet=document.createElement('canvas');
  sheet.width=FRW*4; sheet.height=FRH*4;
  (function drawSheet(){
    var s=sheet.getContext('2d');
    var SKIN='#e8b98a', SKIN_D='#c99464', HAIR='#6b3f1d', TUNIC='#2e6f4e', TUNIC_D='#215339',
        PANTS='#4a3a63', BOOT='#3a2c1a';
    // rows: 0 up, 1 left, 2 down, 3 right (LPC order)
    for(var row=0;row<4;row++){
      for(var fr=0;fr<4;fr++){
        var ox=fr*FRW, oy=row*FRH;
        var step=(fr===1?1:fr===3?-1:0);       // leg/arm swing: 0,1,0,-1
        var bob=(fr===1||fr===3)?1:0;
        s.save(); s.translate(ox,oy+bob);
        // legs
        s.fillStyle=PANTS;
        s.fillRect(12,30+ (step>0?1:0),4,10-(step>0?1:0));   // left leg
        s.fillRect(17,30+ (step<0?1:0),4,10-(step<0?1:0));   // right leg
        s.fillStyle=BOOT;
        s.fillRect(11,39+(step>0?1:0),5,3); s.fillRect(17,39+(step<0?1:0),5,3);
        // tunic body
        s.fillStyle=TUNIC; s.fillRect(10,18,13,13);
        s.fillStyle=TUNIC_D; s.fillRect(10,28,13,3);
        // arms swing opposite legs
        s.fillStyle=(row===0)?TUNIC_D:SKIN;
        if(row===1){ s.fillRect(9,19+step*2,3,10); }          // facing left: near arm
        else if(row===3){ s.fillRect(21,19-step*2,3,10); }
        else { s.fillRect(8,19+step*2,3,10); s.fillRect(22,19-step*2,3,10); }
        // head
        s.fillStyle=SKIN; s.fillRect(11,6,11,11);
        s.fillStyle=SKIN_D; s.fillRect(11,15,11,2);
        // hair by facing
        s.fillStyle=HAIR;
        if(row===0){ s.fillRect(10,5,13,9); }                  // back of head
        else { s.fillRect(10,5,13,5); s.fillRect(10,5,3,8); s.fillRect(20,5,3,8); }
        // face by facing
        if(row===2){ s.fillStyle='#221510'; s.fillRect(13,11,2,2); s.fillRect(18,11,2,2); }
        else if(row===1){ s.fillStyle='#221510'; s.fillRect(12,11,2,2); }
        else if(row===3){ s.fillStyle='#221510'; s.fillRect(19,11,2,2); }
        s.restore();
      }
    }
  })();

  // ---------- Tutorial Tim — goblin sheet (same LPC row layout, drawn small) ----------
  var gobSheet=document.createElement('canvas');
  gobSheet.width=FRW*4; gobSheet.height=FRH*4;
  (function drawGoblinSheet(){
    var s=gobSheet.getContext('2d');
    var SKIN='#6fae4e', SKIN_D='#557f3c', RAG='#7a5b3a', RAG_D='#5f4426', HAT='#c23b3b', HAT_D='#8f2424';
    for(var row=0;row<4;row++){
      for(var fr=0;fr<4;fr++){
        var ox=fr*FRW, oy=row*FRH;
        var step=(fr===1?1:fr===3?-1:0), bob=(fr===1||fr===3)?1:0;
        s.save(); s.translate(ox,oy+bob+12);   // +12: goblins are short
        // legs
        s.fillStyle=SKIN_D;
        s.fillRect(12,26+(step>0?1:0),4,7-(step>0?1:0));
        s.fillRect(17,26+(step<0?1:0),4,7-(step<0?1:0));
        // rag tunic
        s.fillStyle=RAG; s.fillRect(10,16,13,11);
        s.fillStyle=RAG_D; s.fillRect(10,24,13,3);
        // arms
        s.fillStyle=SKIN;
        if(row===1){ s.fillRect(8,17+step*2,3,8); }
        else if(row===3){ s.fillRect(22,17-step*2,3,8); }
        else { s.fillRect(7,17+step*2,3,8); s.fillRect(23,17-step*2,3,8); }
        // big goblin head + ears
        s.fillStyle=SKIN; s.fillRect(10,4,13,13);
        s.fillRect(7,8,3,4); s.fillRect(23,8,3,4);          // ears
        s.fillStyle=SKIN_D; s.fillRect(10,15,13,2);
        // face
        if(row===2){ s.fillStyle='#1c130b'; s.fillRect(12,10,2,2); s.fillRect(19,10,2,2);
          s.fillStyle='#fff'; s.fillRect(14,14,2,1); s.fillRect(17,14,2,1); } // lil teeth
        else if(row===1){ s.fillStyle='#1c130b'; s.fillRect(11,10,2,2); }
        else if(row===3){ s.fillStyle='#1c130b'; s.fillRect(20,10,2,2); }
        // THE TINY HAT (all facings — it's the whole point)
        s.fillStyle=HAT;
        s.beginPath(); s.moveTo(12,4); s.lineTo(16.5,-5); s.lineTo(21,4); s.closePath(); s.fill();
        s.fillStyle=HAT_D; s.fillRect(11,3,11,2);
        s.fillStyle='#f5c453'; s.fillRect(16,-1,2,2);        // gold pom
        s.restore();
      }
    }
  })();

  var TIM_LINES=[
    "Welcome to SloppyScape! To walk, click the ground. …You clearly know that already.",
    "These are yew trees. One day they'll be worth 175 xp a chop. Today: decoration.",
    "I'd give you a quest, but quests haven't been invented. My hat and I wait patiently.",
    "Tip: right-click opens a menu. I live in constant fear of the Cancel option.",
    "They call me Tutorial Tim. I have never once finished the tutorial.",
    "The water? Can't walk on it. We've tried. We've ALL tried.",
    "This hat? Found it. The previous owner was a garden gnome. No further questions."
  ];
  var TIM_MUTTERS=[
    "Tim mutters something about respawn timers.",
    "Tim adjusts his tiny hat.",
    "Tim practices waving at nobody.",
    "Tim counts the yews again. Still the same number."
  ];
  var tim=(function(){
    var ax=yewAnchor?yewAnchor.x:Math.round(cx), ay=yewAnchor?yewAnchor.y:Math.round(cy);
    // spawn on nearest walkable to the grove anchor
    var sp=null;
    for(var r=1;r<10 && !sp;r++){ for(var a=0;a<16;a++){
      var x=Math.round(ax+Math.cos(a/16*6.283)*r), y=Math.round(ay+Math.sin(a/16*6.283)*r);
      if(walkable(x,y)){ sp={x:x,y:y}; break; }
    }}
    sp=sp||{x:Math.round(cx),y:Math.round(cy)};
    return { x:sp.x, y:sp.y, px:sp.x*TILE+TILE/2, py:sp.y*TILE+TILE/2, anchor:{x:ax,y:ay},
      path:[], dir:2, moving:false, frame:0, animT:0, idleT:1.5+Math.random()*2, lineIdx:0, mutterT:12, kind:'tim' };
  })();
  var TIM_SPEED=55;
  function timUpdate(dt){
    // wander: idle → pick a walkable tile within 5 of the grove anchor → walk
    if(!tim.path.length){
      tim.moving=false; tim.idleT-=dt;
      if(tim.idleT<=0){
        for(var tries=0;tries<12;tries++){
          var tx=tim.anchor.x+Math.floor(Math.random()*11)-5, ty=tim.anchor.y+Math.floor(Math.random()*11)-5;
          if(!walkable(tx,ty)) continue;
          var p=findPath(tim.x,tim.y,tx,ty);
          if(p && p.length && p.length<26){ tim.path=p; break; }
        }
        tim.idleT=1.2+Math.random()*3.2;
      }
    } else {
      tim.moving=true;
      var next=tim.path[0], tx2=next.x*TILE+TILE/2, ty2=next.y*TILE+TILE/2;
      var dx=tx2-tim.px, dy=ty2-tim.py, dist=Math.hypot(dx,dy);
      if(Math.abs(dx)>Math.abs(dy)) tim.dir=dx>0?3:1; else tim.dir=dy>0?2:0;
      var mv=TIM_SPEED*dt;
      if(dist<=mv){ tim.px=tx2; tim.py=ty2; tim.x=next.x; tim.y=next.y; tim.path.shift(); }
      else { tim.px+=dx/dist*mv; tim.py+=dy/dist*mv; }
      tim.animT+=dt;
      if(tim.animT>0.18){ tim.animT=0; tim.frame=(tim.frame+1)%4; }
    }
    // ambient mutters when the player is nearby
    tim.mutterT-=dt;
    if(tim.mutterT<=0){
      tim.mutterT=9+Math.random()*8;
      if(Math.hypot(player.x-tim.x, player.y-tim.y)<=5 && Math.random()<0.55){
        log(TIM_MUTTERS[Math.floor(Math.random()*TIM_MUTTERS.length)],'ex');
      }
    }
  }
  function timTalk(){
    // face the player, deliver the next tutorial pearl
    tim.path=[];
    tim.dir = Math.abs(player.x-tim.x)>Math.abs(player.y-tim.y) ? (player.x>tim.x?3:1) : (player.y>tim.y?2:0);
    log('Tutorial Tim: '+TIM_LINES[tim.lineIdx % TIM_LINES.length],'tim');
    tim.lineIdx++;
  }
  var pendingTalk=false;
  function requestTalk(){
    if(Math.hypot(player.x-tim.x, player.y-tim.y)<=1.6){ pendingTalk=false; timTalk(); return; }
    // walk adjacent to Tim, talk on arrival
    var adj=[[0,1],[0,-1],[1,0],[-1,0]].map(function(d){return {x:tim.x+d[0],y:tim.y+d[1]};}).filter(function(c){return walkable(c.x,c.y);});
    adj.sort(function(a,b){ return Math.hypot(a.x-player.x,a.y-player.y)-Math.hypot(b.x-player.x,b.y-player.y); });
    if(adj.length){ var p=findPath(player.x,player.y,adj[0].x,adj[0].y); if(p){ player.path=p; pendingTalk=true; return; } }
    log("Tim is unreachable. Classic tutorial.",'sys');
  }

  // ---------- player ----------
  var spawn=(function(){ // nearest walkable to centre
    for(var r=0;r<20;r++){ for(var a=0;a<24;a++){
      var x=Math.round(cx+Math.cos(a/24*6.283)*r), y=Math.round(cy+Math.sin(a/24*6.283)*r);
      if(x>=0&&y>=0&&x<W&&y<H&&map[y][x]>=2&&!blocked[y*W+x]) return {x:x,y:y};
    }} return {x:Math.round(cx),y:Math.round(cy)};
  })();
  var player={ x:spawn.x, y:spawn.y, px:spawn.x*TILE+TILE/2, py:spawn.y*TILE+TILE/2,
    path:[], dir:2, moving:false, frame:0, animT:0, name:'Adventurer' };
  var SPEED=110; // px/s

  // ---------- pathfinding (BFS — uniform cost grid) ----------
  function findPath(sx,sy,tx,ty){
    if(!walkable(tx,ty)) return null;
    var prev=new Int32Array(W*H).fill(-1), seen=new Uint8Array(W*H);
    var q=[sy*W+sx]; seen[sy*W+sx]=1;
    var dirs=[1,-1,W,-W];
    while(q.length){
      var cur=q.shift();
      if(cur===ty*W+tx) break;
      var cxx=cur%W;
      for(var i=0;i<4;i++){
        var nx=cur+dirs[i];
        if(nx<0||nx>=W*H) continue;
        if(dirs[i]===1 && cxx===W-1) continue;
        if(dirs[i]===-1 && cxx===0) continue;
        if(seen[nx]) continue;
        var nxx=nx%W, nyy=(nx-nxx)/W;
        if(!walkable(nxx,nyy)) continue;
        seen[nx]=1; prev[nx]=cur; q.push(nx);
      }
    }
    if(!seen[ty*W+tx]) return null;
    var path=[], node=ty*W+tx;
    while(node!==sy*W+sx){ path.push({x:node%W, y:(node-node%W)/W}); node=prev[node]; if(node<0) return null; }
    path.reverse(); return path;
  }

  // ---------- camera / render ----------
  var view={x:0,y:0}, DPR=Math.min(2, window.devicePixelRatio||1);
  function fit(){ canvas.width=innerWidth*DPR; canvas.height=innerHeight*DPR; canvas.style.width=innerWidth+'px'; canvas.style.height=innerHeight+'px'; }
  addEventListener('resize', fit); fit();

  var marker=null; // {x,y,t,ok}
  var TCOL={0:'#2e6d9e',1:'#d9c07c',2:'#5d9c47',3:'#4c8639'};
  function draw(now,dt){
    var vw=canvas.width/DPR, vh=canvas.height/DPR;
    // camera follows
    view.x+= (player.px-vw/2-view.x)*0.12; view.y+=(player.py-vh/2-view.y)*0.12;
    view.x=Math.max(-80,Math.min(W*TILE-vw+80,view.x)); view.y=Math.max(-80,Math.min(H*TILE-vh+80,view.y));
    ctx.setTransform(DPR,0,0,DPR,0,0);
    ctx.fillStyle='#1d4a70'; ctx.fillRect(0,0,vw,vh);
    var x0=Math.max(0,Math.floor(view.x/TILE)), y0=Math.max(0,Math.floor(view.y/TILE));
    var x1=Math.min(W-1,Math.ceil((view.x+vw)/TILE)), y1=Math.min(H-1,Math.ceil((view.y+vh)/TILE));
    for(var y=y0;y<=y1;y++){ for(var x=x0;x<=x1;x++){
      var t=map[y][x], sx=x*TILE-view.x, sy=y*TILE-view.y;
      ctx.fillStyle=TCOL[t]; ctx.fillRect(sx,sy,TILE,TILE);
      if(t===0){ // water shimmer
        if(((x*7+y*13+ (now/450|0))%9)===0){ ctx.fillStyle='rgba(255,255,255,.13)'; ctx.fillRect(sx+8,sy+14,10,2); }
      } else if(t===2||t===3){
        if(((x*5+y*11)%7)===0){ ctx.fillStyle='rgba(0,0,0,.08)'; ctx.fillRect(sx+6,sy+6,3,3); }
      } else if(t===1 && ((x+y)%5===0)){ ctx.fillStyle='rgba(0,0,0,.07)'; ctx.fillRect(sx+12,sy+9,3,2); }
    }}
    // click marker (RS yellow X)
    if(marker){
      var age=(now-marker.t)/1000;
      if(age>0.9) marker=null;
      else{
        var mx=marker.x*TILE-view.x+TILE/2, my=marker.y*TILE-view.y+TILE/2, k=1-age/0.9;
        ctx.strokeStyle=marker.ok?'rgba(255,222,60,'+k+')':'rgba(229,72,77,'+k+')'; ctx.lineWidth=3;
        ctx.beginPath(); ctx.moveTo(mx-7,my-7); ctx.lineTo(mx+7,my+7); ctx.moveTo(mx+7,my-7); ctx.lineTo(mx-7,my+7); ctx.stroke();
      }
    }
    // props + player, y-sorted
    var drawables=[];
    for(var p=0;p<props.length;p++){ var pr=props[p];
      if(pr.x<x0-1||pr.x>x1+1||pr.y<y0-2||pr.y>y1+1) continue; drawables.push(pr); }
    drawables.push(player);
    drawables.push(tim);
    drawables.sort(function(a,b){ return (a.py|| (a.y*TILE+TILE)) - (b.py|| (b.y*TILE+TILE)); });
    drawables.forEach(function(d){
      if(d===player){ drawPlayer(now); return; }
      if(d===tim){ drawTim(now); return; }
      var sx=d.x*TILE-view.x+TILE/2, sy=d.y*TILE-view.y+TILE;
      if(d.kind==='yew'){
        // dark, ancient, flat-topped
        ctx.fillStyle='rgba(0,0,0,.28)'; ctx.beginPath(); ctx.ellipse(sx,sy-3,18,6,0,0,6.283); ctx.fill();
        ctx.fillStyle='#3d2c14'; ctx.fillRect(sx-6,sy-36,12,34);
        ctx.fillStyle='#2c1f0d'; ctx.fillRect(sx+2,sy-36,4,34);
        ctx.fillStyle='#1e4429';
        ctx.beginPath(); ctx.arc(sx,sy-50,24,0,6.283); ctx.fill();
        ctx.beginPath(); ctx.arc(sx-17,sy-38,15,0,6.283); ctx.fill();
        ctx.beginPath(); ctx.arc(sx+17,sy-38,15,0,6.283); ctx.fill();
        ctx.fillStyle='#153520'; ctx.beginPath(); ctx.arc(sx+6,sy-40,13,0,6.283); ctx.fill();
        ctx.fillStyle='rgba(180,220,160,.10)'; ctx.beginPath(); ctx.arc(sx-9,sy-56,8,0,6.283); ctx.fill();
      } else if(d.kind==='tree'){
        // big trees — roughly 2× the player's height
        ctx.fillStyle='rgba(0,0,0,.25)'; ctx.beginPath(); ctx.ellipse(sx,sy-3,17,6,0,0,6.283); ctx.fill();
        ctx.fillStyle='#5a3a1c'; ctx.fillRect(sx-5,sy-34,10,32);
        ctx.fillStyle='#4a2f16'; ctx.fillRect(sx+2,sy-34,3,32);
        ctx.fillStyle=d.v===0?'#2e6f2e':d.v===1?'#3c8437':'#2a6440';
        ctx.beginPath(); ctx.arc(sx,sy-52,23,0,6.283); ctx.fill();
        ctx.beginPath(); ctx.arc(sx-16,sy-38,15,0,6.283); ctx.fill();
        ctx.beginPath(); ctx.arc(sx+16,sy-38,15,0,6.283); ctx.fill();
        ctx.beginPath(); ctx.arc(sx,sy-34,16,0,6.283); ctx.fill();
        ctx.fillStyle='rgba(255,255,255,.12)'; ctx.beginPath(); ctx.arc(sx-8,sy-58,8,0,6.283); ctx.fill();
      } else {
        ctx.fillStyle='rgba(0,0,0,.22)'; ctx.beginPath(); ctx.ellipse(sx,sy-2,15,5,0,0,6.283); ctx.fill();
        ctx.fillStyle=d.v===0?'#8b8e94':'#7a7d84';
        ctx.beginPath(); ctx.moveTo(sx-15,sy-2); ctx.lineTo(sx-8,sy-18); ctx.lineTo(sx+6,sy-20); ctx.lineTo(sx+15,sy-2); ctx.closePath(); ctx.fill();
        ctx.fillStyle='rgba(255,255,255,.16)'; ctx.fillRect(sx-4,sy-16,6,4);
      }
    });
  }
  function drawPlayer(now){
    // drawn at 1:1 sheet scale (32×48) so the world reads big around the player
    var sx=player.px-view.x, sy=player.py-view.y;
    ctx.fillStyle='rgba(0,0,0,.28)'; ctx.beginPath(); ctx.ellipse(sx,sy+2,7,2.8,0,0,6.283); ctx.fill();
    var fr=player.moving? player.frame : 0;
    ctx.imageSmoothingEnabled=false;
    ctx.drawImage(sheet, fr*FRW, player.dir*FRH, FRW, FRH, Math.round(sx-FRW/2), Math.round(sy-FRH+6), FRW, FRH);
    // name tag
    ctx.font='600 12px "Pixelify Sans",monospace'; ctx.textAlign='center';
    ctx.fillStyle='#000'; ctx.fillText(player.name, sx+1, sy-FRH+1);
    ctx.fillStyle='#f5c453'; ctx.fillText(player.name, sx, sy-FRH);
  }
  function drawTim(now){
    var sx=tim.px-view.x, sy=tim.py-view.y;
    ctx.fillStyle='rgba(0,0,0,.28)'; ctx.beginPath(); ctx.ellipse(sx,sy+2,6,2.4,0,0,6.283); ctx.fill();
    var fr=tim.moving? tim.frame : 0;
    ctx.imageSmoothingEnabled=false;
    ctx.drawImage(gobSheet, fr*FRW, tim.dir*FRH, FRW, FRH, Math.round(sx-FRW/2), Math.round(sy-FRH+6), FRW, FRH);
    ctx.font='600 11px "Pixelify Sans",monospace'; ctx.textAlign='center';
    ctx.fillStyle='#000'; ctx.fillText('Tutorial Tim', sx+1, sy-FRH+9);
    ctx.fillStyle='#8fe0ff'; ctx.fillText('Tutorial Tim', sx, sy-FRH+8);
  }

  // ---------- movement ----------
  function step(dt){
    if(!player.path.length){ player.moving=false; return; }
    player.moving=true;
    var next=player.path[0], tx=next.x*TILE+TILE/2, ty=next.y*TILE+TILE/2;
    var dx=tx-player.px, dy=ty-player.py, dist=Math.hypot(dx,dy);
    if(Math.abs(dx)>Math.abs(dy)) player.dir = dx>0?3:1; else player.dir = dy>0?2:0;
    var mv=SPEED*dt;
    if(dist<=mv){
      player.px=tx; player.py=ty; player.x=next.x; player.y=next.y; player.path.shift();
      if(pendingTalk && !player.path.length && Math.hypot(player.x-tim.x,player.y-tim.y)<=1.6){ pendingTalk=false; timTalk(); }
    }
    else { player.px+=dx/dist*mv; player.py+=dy/dist*mv; }
    player.animT+=dt;
    if(player.animT>0.14){ player.animT=0; player.frame=(player.frame+1)%4; }
  }

  // ---------- input ----------
  function log(msg,cls){
    var d=document.createElement('div'); if(cls)d.className=cls; d.textContent=msg;
    logEl.appendChild(d); while(logEl.children.length>40) logEl.removeChild(logEl.firstChild);
    logEl.scrollTop=logEl.scrollHeight;
  }
  // ---- actions (shared by left-click and the right-click menu) ----
  function walkTo(tx,ty){
    var path=findPath(player.x,player.y,tx,ty);
    marker={x:tx,y:ty,t:performance.now(),ok:!!path};
    if(path){ player.path=path; }
    else if(map[ty]&&map[ty][tx]===0){ log("You can't walk on water. Yet.",'sys'); }
    else { log("You can't reach that.",'sys'); }
  }
  function examineProp(hit){
    log('You examine the '+hit.kind+'.','me');
    log(EXAMINE[hit.kind][hit.v],'ex');
    var adj=[[0,1],[0,-1],[1,0],[-1,0]].map(function(d){return {x:hit.x+d[0],y:hit.y+d[1]};}).find(function(c){return walkable(c.x,c.y);});
    if(adj){ var p2=findPath(player.x,player.y,adj.x,adj.y); if(p2){ player.path=p2; } }
    marker={x:hit.x,y:hit.y,t:performance.now(),ok:true};
  }
  function tileAt(e){
    var wx=e.clientX+view.x, wy=e.clientY+view.y;
    return { x:Math.floor(wx/TILE), y:Math.floor(wy/TILE) };
  }

  function timAt(t){ return (t.x===tim.x && t.y===tim.y) || (Math.abs(t.x-tim.x)<=0 && t.y===tim.y-1); }
  canvas.addEventListener('pointerdown', function(e){
    if(e.button===2) return;                 // right-click handled by contextmenu
    hideMenu();
    var t=tileAt(e);
    if(t.x<0||t.y<0||t.x>=W||t.y>=H) return;
    if(timAt(t)){ marker={x:tim.x,y:tim.y,t:performance.now(),ok:true}; requestTalk(); return; }
    var hit=props.find(function(p){ return p.x===t.x && p.y===t.y; });
    if(hit){ examineProp(hit); return; }
    pendingTalk=false;
    walkTo(t.x,t.y);
  });

  // ---- RS-style right-click menu ----
  var ctxEl=document.getElementById('ctx'), ctxItems=document.getElementById('ctxItems');
  function hideMenu(){ ctxEl.style.display='none'; }
  function showMenu(px,py,items){
    ctxItems.innerHTML='';
    items.forEach(function(it){
      var b=document.createElement('button'); b.type='button'; b.setAttribute('role','menuitem');
      b.innerHTML=it.label;
      b.addEventListener('click', function(){ hideMenu(); if(it.act) it.act(); });
      ctxItems.appendChild(b);
    });
    ctxEl.style.display='block';
    // clamp to viewport
    var r=ctxEl.getBoundingClientRect();
    ctxEl.style.left=Math.min(px, innerWidth-r.width-6)+'px';
    ctxEl.style.top =Math.min(py, innerHeight-r.height-6)+'px';
  }
  canvas.addEventListener('contextmenu', function(e){
    e.preventDefault();
    var t=tileAt(e);
    if(t.x<0||t.y<0||t.x>=W||t.y>=H){ hideMenu(); return; }
    var hit=props.find(function(p){ return p.x===t.x && p.y===t.y; });
    var items=[];
    if(timAt(t)){
      items.push({label:'Talk-to <b>Tutorial Tim</b>', act:requestTalk});
      items.push({label:'Examine <b>Tutorial Tim</b>', act:function(){ log('You examine Tutorial Tim.','me'); log('A goblin. The hat is doing a lot of work.','ex'); }});
    } else if(hit){
      var nm = hit.kind==='yew' ? 'Yew tree' : hit.kind==='tree' ? 'Tree' : 'Rock';
      items.push({label:'Examine <b>'+nm+'</b>', act:function(){ examineProp(hit); }});
      items.push({label:'Walk here', act:function(){ walkTo(hit.x,hit.y); }});
    } else {
      items.push({label:'Walk here', act:function(){ walkTo(t.x,t.y); }});
    }
    items.push({label:'Cancel', act:null});
    showMenu(e.clientX, e.clientY, items);
  });
  // the browser menu never escapes: swallow contextmenu on the options
  // container itself AND document-wide (chatbox, HUD, everything)
  ctxEl.addEventListener('contextmenu', function(e){ e.preventDefault(); e.stopPropagation(); });
  document.addEventListener('contextmenu', function(e){ e.preventDefault(); });
  document.addEventListener('pointerdown', function(e){ if(!ctxEl.contains(e.target) && e.target!==canvas) hideMenu(); });
  document.addEventListener('keydown', function(e){ if(e.key==='Escape') hideMenu(); });
  addEventListener('blur', hideMenu);

  // ---------- loop ----------
  var last=performance.now();
  function frame(now){
    requestAnimationFrame(frame);
    var dt=Math.min(0.05,(now-last)/1000); last=now;
    step(dt); timUpdate(dt); draw(now,dt);
  }
  // snap camera to player at boot
  view.x=player.px-innerWidth/2; view.y=player.py-innerHeight/2;
  requestAnimationFrame(frame);

  log('Welcome to SloppyScape.','sys');
  log('Click the ground to walk. Click a tree or rock to examine it.','sys');
  log('This island is otherwise blank. That is the point. Suggest what it needs.','sys');
  log('A goblin in a tiny hat patrols the yew grove. He seems eager to help.','sys');
})();
</script>
</body>
</html>
