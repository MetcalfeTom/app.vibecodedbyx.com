<style>
  :root{
    --sky-1:#cfe7f5;
    --sky-2:#f5e6d2;
    --ink:#2a1810;
    --grass:#88c46c;
    --leaf:#5a9a48;
    --star:#f4cc4c;
    --door:#3a78c4;
    --kid-shirt:#84c8e8;
    --paper:#fff7e8;
    --paper-2:#f4e8d0;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html{ font-size:100%; }
  html, body{
    width:100%; height:100dvh;
    background:var(--sky-2);
    color:var(--ink);
    font-family:'Silkscreen', monospace;
    overflow:hidden;
    touch-action:none;
  }

  #stage{
    position:fixed;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(180deg, var(--sky-1) 0%, var(--sky-2) 100%);
  }
  canvas{
    image-rendering:pixelated;
    image-rendering:crisp-edges;
    border:3px solid var(--ink);
    box-shadow: 6px 6px 0 rgba(42,24,16,0.4);
    background:#dceafc;
    max-width:96vw;
    max-height:92vh;
  }

  /* ── HUD ── */
  .hud{
    position:fixed;
    top:0.6rem; left:50%;
    transform:translateX(-50%);
    z-index:10;
    background: rgba(42,24,16,0.85);
    color:var(--paper);
    padding:0.5rem 1rem;
    border-radius:6px;
    font-family:'Silkscreen', monospace;
    font-size:0.78rem;
    letter-spacing:0.08em;
    display:flex;
    gap:1.2rem;
    align-items:center;
    pointer-events:none;
    border:2px solid var(--paper);
    box-shadow: 2px 2px 0 rgba(0,0,0,0.4);
  }
  .hud .star{ color:var(--star); }
  .hud .level{ font-family:'Cormorant Garamond', serif; font-style:italic; font-size:1rem; }

  /* ── Title banner (top-left) ── */
  .corner-title{
    position:fixed;
    top:0.6rem; left:0.8rem;
    z-index:10;
    pointer-events:none;
  }
  .corner-title h1{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size:1.4rem;
    line-height:1;
    color:var(--ink);
    text-shadow: 1px 1px 0 var(--paper);
  }
  .corner-title .sub{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:0.8rem;
    color:var(--ink);
    opacity:0.7;
  }
  @media (max-width: 700px){
    .corner-title{ display:none; }
  }

  /* ── Touch controls ── */
  .touch-pad{
    display:none;
    position:fixed;
    bottom:1rem;
    z-index:20;
    pointer-events:auto;
  }
  .touch-pad.left{ left:0.8rem; display:flex; gap:0.4rem; }
  .touch-pad.right{ right:0.8rem; }
  .touch-btn{
    width:3.5rem; height:3.5rem;
    background: rgba(255,247,232,0.92);
    color: var(--ink);
    border:3px solid var(--ink);
    border-radius:10px;
    font-family:'Silkscreen', monospace;
    font-size:1.4rem;
    cursor:pointer;
    box-shadow: 3px 3px 0 rgba(42,24,16,0.6);
    user-select:none;
    -webkit-user-select:none;
    touch-action:none;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .touch-btn:active, .touch-btn.held{
    background: var(--kid-shirt);
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 rgba(42,24,16,0.6);
  }
  .touch-btn.jump{
    background: var(--star);
    width:4.5rem; height:4.5rem;
  }
  @media (pointer:coarse){
    .touch-pad{ display:flex !important; }
  }

  /* ── Overlay (intro / win / death) ── */
  .overlay{
    position:fixed;
    inset:0;
    z-index:50;
    background: radial-gradient(circle at 30% 30%, rgba(132,200,232,0.7), transparent 50%), rgba(42,24,16,0.78);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    padding:1.5rem;
    text-align:center;
    color:var(--paper);
    transition: opacity 0.3s ease;
  }
  .overlay.hidden{ display:none; }
  .overlay h2{
    font-family:'Fraunces', serif;
    font-weight:700;
    font-size:clamp(2rem, 5vw, 3.5rem);
    margin-bottom:0.6rem;
    color: var(--paper);
    text-shadow: 0 4px 12px rgba(0,0,0,0.5);
  }
  .overlay h2 .accent{ color:var(--kid-shirt); }
  .overlay .lead{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:clamp(1rem, 2vw, 1.3rem);
    color:rgba(255,247,232,0.9);
    max-width:36ch;
    margin-bottom:1.2rem;
  }
  .keys{
    display:grid;
    grid-template-columns: auto 1fr;
    gap:0.4rem 1.2rem;
    font-family:'Silkscreen', monospace;
    font-size:0.85rem;
    margin-bottom:1.5rem;
    color:var(--paper);
    align-items:center;
  }
  .keys kbd{
    background:rgba(255,247,232,0.18);
    color:var(--paper);
    border:1px solid rgba(255,247,232,0.4);
    border-radius:4px;
    padding:0.18rem 0.55rem;
    font-family:'Silkscreen', monospace;
    font-size:0.82rem;
    min-width:1.6rem;
    display:inline-block;
    text-align:center;
  }
  .play-btn{
    font-family:'Fraunces', serif;
    font-weight:700;
    background: var(--kid-shirt);
    color: var(--ink);
    border:3px solid var(--ink);
    padding:1rem 2.2rem;
    font-size:1.1rem;
    cursor:pointer;
    box-shadow: 5px 5px 0 var(--ink);
    transition: transform 0.1s ease;
    min-height:2.75rem;
  }
  .play-btn:hover{ transform:translate(-1px,-1px); box-shadow: 6px 6px 0 var(--ink); }
  .play-btn:active{ transform:translate(3px,3px); box-shadow: 2px 2px 0 var(--ink); }
  .play-btn:focus-visible{ outline:3px solid var(--star); outline-offset:3px; }

  @media (prefers-reduced-motion: reduce){
    .play-btn, .touch-btn{ transition:none !important; }
  }

<body>
<div class="corner-title">
  <h1>Pixel Kid</h1>
  <div class="sub">a tiny adventure in three acts</div>
</div>

<div class="hud" role="status" aria-live="polite" aria-atomic="true">
  <span class="level" id="hud-level">Meadow</span>
  <span><span class="star">★</span> <span id="hud-stars">0</span> / <span id="hud-stars-total">0</span></span>
  <span id="hud-deaths">deaths 0</span>
</div>

<div id="stage" role="application" aria-label="Pixel Kid — 2D platformer">
  <canvas id="cv" width="320" height="180" aria-label="Game world"></canvas>
</div>

<div class="touch-pad left">
  <button class="touch-btn" id="tch-left" type="button" aria-label="Move left">◄</button>

</div>

  <button class="touch-btn jump" id="tch-jump" type="button" aria-label="Jump">↥</button>

<div class="overlay" id="overlay">
  <h2>Pixel <span class="accent">Kid</span></h2>
  <p class="lead">A small kid in a sky-blue shirt is out for a walk. Help them collect stars and reach the door at the end of each act.</p>
  <div class="keys">
    <kbd>A D</kbd> <span>move left / right</span>
    <kbd>Space</kbd> <span>jump · hold for higher jump</span>
    <kbd>R</kbd> <span>restart current act</span>
  </div>
  <button class="play-btn" id="btn-play" type="button">begin the walk</button>
</div>

<script>
/* ════════════════════════════════════════════════════════════
   PIXEL KID — small 2D platformer
   ──────────────────────────────────────────────────────────── */

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
ctx.imageSmoothingEnabled = false;

// internal world resolution (scaled up by CSS via image-rendering:pixelated)
const VW = 320, VH = 180;

/* ── Resize canvas to fill stage while keeping integer pixel scale ── */
function resize(){
  const stage = document.getElementById('stage');
  const r = stage.getBoundingClientRect();
  const scale = Math.max(1, Math.floor(Math.min(r.width / VW, r.height / VH)));
  cv.style.width  = (VW * scale) + 'px';
  cv.style.height = (VH * scale) + 'px';
}
window.addEventListener('resize', resize);
resize();

/* ── Pixel-art sprite — 12 wide × 16 tall ──────────────────
   Color map: . transparent  B brown-hair  b hair-dark  S skin  s skin-shadow
              E eye  L light-blue-shirt  l shirt-shadow  D blue-shorts  F shoes */
const COLORS = {
  B: '#6a3a18',
  b: '#3e2008',
  S: '#f0c8a0',
  s: '#cf9970',
  E: '#1a1008',
  L: '#84c8e8',
  l: '#4d8eb4',
  D: '#274a98',
  d: '#15306e',
  F: '#3a1a08',
};
const SPRITE_IDLE = [
  '....BBBBB...',
  '...BBBBBBB..',
  '..bBBBBBBBb.',
  '..bBSSSSSBb.',
  '...SsSESES..',
  '...SsssssS..',
  '....SSSSS...',
  '...LLLLLL...',
  '..LLLLLLLL..',
  '.LLLLllLLLL.',
  '.LLLLLLLLLL.',
  '..LLLLLLLL..',
  '...DDDDDD...',
  '...DDddDD...',
  '...FF..FF...',
  '...FF..FF...',
];
const SPRITE_WALK_A = [
  '....BBBBB...',
  '...BBBBBBB..',
  '..bBBBBBBBb.',
  '..bBSSSSSBb.',
  '...SsSESES..',
  '...SsssssS..',
  '....SSSSS...',
  '...LLLLLL...',
  '..LLLLLLLL..',
  '.LLLLllLLLL.',
  '.LLLLLLLLLL.',
  '..LLLLLLLL..',
  '...DDDDDD...',
  '....DDDDD...',
  '...FFF.....',
  '...FF......',
];
const SPRITE_WALK_B = [
  '....BBBBB...',
  '...BBBBBBB..',
  '..bBBBBBBBb.',
  '..bBSSSSSBb.',
  '...SsSESES..',
  '...SsssssS..',
  '....SSSSS...',
  '...LLLLLL...',
  '..LLLLLLLL..',
  '.LLLLllLLLL.',
  '.LLLLLLLLLL.',
  '..LLLLLLLL..',
  '...DDDDDD...',
  '....DDDDD...',
  '......FFF...',
  '.......FF...',
];
const SPRITE_JUMP = [
  '....BBBBB...',
  '...BBBBBBB..',
  '..bBBBBBBBb.',
  '..bBSSSSSBb.',
  '...SsSESES..',
  '...SsssssS..',
  '....SSSSS...',
  '...LLLLLL...',
  '.LLLLLLLLLL.',
  '.LLLlllLLLL.',
  '..LLLLLLLL..',
  '...LLLLLL...',
  '...DDDDDD...',
  '..DDDDDDDD..',
  '..FF....FF..',
  '..FF....FF..',
];
function drawSprite(sprite, x, y, flipped){
  // sprite is 12 cols × 16 rows of color-key chars; each cell = 1px
  for (let row = 0; row < sprite.length; row++){
    const line = sprite[row];
    for (let col = 0; col < line.length; col++){
      const ch = line[col];
      const color = COLORS[ch];
      if (!color) continue;
      const drawCol = flipped ? (line.length - 1 - col) : col;
      ctx.fillStyle = color;
      ctx.fillRect(Math.round(x + drawCol), Math.round(y + row), 1, 1);
    }
  }
}

/* ── Level definitions — each is a horizontal world of ~800px ───
   Tiles laid out as: ground segments, floating platforms, stars, spikes, door */
const LEVELS = [
  {
    name: 'Meadow',
    bg: { sky:'#dceafc', mid:'#fcf2dc', ground:'#88c46c', mountain:'#a8d8a0' },
    width: 1200,
    groundY: 148,                          // baseline ground top
    holes: [{ x: 420, w: 60 }, { x: 720, w: 70 }],  // gaps in the ground
    platforms: [
      { x: 220, y: 110, w: 50, h: 8 },
      { x: 320, y: 90,  w: 50, h: 8 },
      { x: 470, y: 118, w: 56, h: 8 },     // bridges first hole
      { x: 560, y: 96,  w: 40, h: 8 },
      { x: 660, y: 80,  w: 60, h: 8 },
      { x: 780, y: 120, w: 60, h: 8 },     // bridges second hole
      { x: 900, y: 96,  w: 40, h: 8 },
      { x: 980, y: 76,  w: 40, h: 8 },
      { x: 1060,y: 100, w: 50, h: 8 },
    ],
    stars: [
      { x: 240, y: 96 }, { x: 340, y: 76 },
      { x: 480, y: 104 },{ x: 580, y: 82 },{ x: 680, y: 66 },
      { x: 800, y: 106 },{ x: 920, y: 82 },{ x: 1000, y: 62 },
    ],
    spikes: [
      { x: 380, y: 142, w: 20 },
    ],
    door: { x: 1140, y: 116 },
    spawn: { x: 30, y: 100 },
  },
  {
    name: 'Cavern',
    bg: { sky:'#2a2640', mid:'#3a3450', ground:'#5a4a3a', mountain:'#4a3a30' },
    width: 1400,
    groundY: 148,
    holes: [{ x: 280, w: 80 }, { x: 560, w: 100 }, { x: 1000, w: 80 }],
    platforms: [
      { x: 180, y: 120, w: 50, h: 8 },
      { x: 300, y: 100, w: 70, h: 8 },     // bridges first hole
      { x: 420, y: 80,  w: 50, h: 8 },
      { x: 580, y: 110, w: 90, h: 8 },     // bridges second hole
      { x: 700, y: 86,  w: 50, h: 8 },
      { x: 800, y: 64,  w: 50, h: 8 },
      { x: 900, y: 90,  w: 50, h: 8 },
      { x: 1020,y: 110, w: 70, h: 8 },     // bridges third hole
      { x: 1140,y: 86,  w: 50, h: 8 },
      { x: 1230,y: 66,  w: 50, h: 8 },
    ],
    stars: [
      { x: 200, y: 106 },{ x: 320, y: 86 },{ x: 440, y: 66 },
      { x: 600, y: 96 },{ x: 720, y: 72 },{ x: 820, y: 50 },
      { x: 920, y: 76 },{ x: 1040, y: 96 },{ x: 1160, y: 72 },{ x: 1250, y: 52 },
    ],
    spikes: [
      { x: 220, y: 142, w: 24 },
      { x: 720, y: 142, w: 30 },
      { x: 1090, y: 142, w: 30 },
    ],
    door: { x: 1340, y: 116 },
    spawn: { x: 30, y: 100 },
  },
  {
    name: 'Skyway',
    bg: { sky:'#f5d4dc', mid:'#fce8c8', ground:'#e8a4a4', mountain:'#d68a8a' },
    width: 1600,
    groundY: 200,                          // ground is below visible area — sky-only
    holes: [],
    platforms: [
      { x: 30,  y: 130, w: 60, h: 8 },     // spawn pad
      { x: 140, y: 110, w: 40, h: 8 },
      { x: 230, y: 90,  w: 40, h: 8 },
      { x: 330, y: 110, w: 40, h: 8 },
      { x: 420, y: 80,  w: 50, h: 8 },
      { x: 520, y: 100, w: 40, h: 8 },
      { x: 620, y: 76,  w: 40, h: 8 },
      { x: 720, y: 100, w: 50, h: 8 },
      { x: 820, y: 70,  w: 40, h: 8 },
      { x: 920, y: 96,  w: 40, h: 8 },
      { x: 1020,y: 70,  w: 40, h: 8 },
      { x: 1120,y: 96,  w: 40, h: 8 },
      { x: 1220,y: 60,  w: 50, h: 8 },
      { x: 1330,y: 80,  w: 60, h: 8 },
      { x: 1450,y: 110, w: 80, h: 8 },     // landing pad before door
    ],
    stars: [
      { x: 150, y: 96 },{ x: 240, y: 76 },{ x: 340, y: 96 },
      { x: 430, y: 66 },{ x: 530, y: 86 },{ x: 630, y: 62 },
      { x: 730, y: 86 },{ x: 830, y: 56 },{ x: 930, y: 82 },
      { x: 1030, y: 56 },{ x: 1130, y: 82 },{ x: 1230, y: 46 },
    ],
    spikes: [],
    door: { x: 1500, y: 78 },
    spawn: { x: 50, y: 110 },
  },
];

/* ── Game state ───────────────────────────────────────────── */
const state = {
  level: 0,
  player: { x: 0, y: 0, vx: 0, vy: 0, dir: 1, onGround: false, anim: 0, animT: 0,
            jumpHeldSince: 0, coyote: 0, buffer: 0 },
  stars: [],
  starsCollected: 0,
  deaths: 0,
  doneAll: false,
  cameraX: 0,
  particles: [],
  finishT: 0,
};

function loadLevel(idx){
  state.level = idx;
  const L = LEVELS[idx];
  // copy stars (so we can mutate state without touching the level def)
  state.stars = L.stars.map(s => ({ x: s.x, y: s.y, collected: false, t: Math.random() * Math.PI * 2 }));
  state.starsCollected = 0;
  state.cameraX = 0;
  state.particles.length = 0;
  state.finishT = 0;
  resetPlayer();
  updateHud();
}
function resetPlayer(){
  const L = LEVELS[state.level];
  const p = state.player;
  p.x = L.spawn.x;
  p.y = L.spawn.y;
  p.vx = 0; p.vy = 0;
  p.dir = 1;
  p.onGround = false;
  p.coyote = 0; p.buffer = 0;
}

/* ── Input ────────────────────────────────────────────────── */
const keys = {};
document.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space' || e.code.startsWith('Arrow')) e.preventDefault();
  if (e.code === 'KeyR') resetLevel();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });
function resetLevel(){
  resetPlayer();
  state.stars.forEach(s => s.collected = false);
  state.starsCollected = 0;
  updateHud();
}

// touch
function bindTouch(id, code){
  const el = document.getElementById(id);
  const press = e => { e.preventDefault(); keys[code] = true; el.classList.add('held'); };
  const release = e => { e.preventDefault(); keys[code] = false; el.classList.remove('held'); };
  el.addEventListener('touchstart', press, { passive:false });
  el.addEventListener('touchend',   release, { passive:false });
  el.addEventListener('touchcancel',release, { passive:false });
  el.addEventListener('mousedown',  press);
  el.addEventListener('mouseup',    release);
  el.addEventListener('mouseleave', release);
}
bindTouch('tch-left',  'ArrowLeft');
bindTouch('tch-right', 'ArrowRight');
bindTouch('tch-jump',  'Space');

/* ── Physics ──────────────────────────────────────────────── */
const GRAVITY = 600;
const MOVE_SPEED = 90;
const JUMP_V = 220;
const JUMP_CUT = 0.5;     // multiply vy by this if jump released early
const COYOTE = 0.10;
const BUFFER = 0.10;
const PLAYER_W = 8, PLAYER_H = 14;   // collision box (sprite is 12×16 but body is narrower)
const PLAYER_OFFX = 2;                // x-offset of sprite when drawing (sprite-left to body-left)

function isLeft(){ return keys['ArrowLeft'] || keys['KeyA']; }
function isRight(){ return keys['ArrowRight'] || keys['KeyD']; }
function isJump(){ return keys['Space'] || keys['KeyW'] || keys['ArrowUp']; }

function update(dt){
  const L = LEVELS[state.level];
  const p = state.player;

  // horizontal input
  let move = 0;
  if (isLeft())  move -= 1;
  if (isRight()) move += 1;
  p.vx = move * MOVE_SPEED;
  if (move !== 0) p.dir = move;

  // jump buffer + coyote
  if (isJump()) p.buffer = BUFFER;
  else if (p.buffer > 0) p.buffer -= dt;
  if (p.onGround) p.coyote = COYOTE;
  else if (p.coyote > 0) p.coyote -= dt;

  if (p.buffer > 0 && p.coyote > 0){
    p.vy = -JUMP_V;
    p.onGround = false;
    p.buffer = 0;
    p.coyote = 0;
    p.jumpHeldSince = performance.now();
    playJump();
  }
  // variable jump height — release early = shorter hop
  if (!isJump() && p.vy < 0){
    p.vy *= Math.pow(JUMP_CUT, dt * 8);
  }

  // gravity
  p.vy += GRAVITY * dt;
  if (p.vy > 380) p.vy = 380;

  // animation
  p.animT += dt;
  if (p.animT > 0.12){ p.animT = 0; p.anim = (p.anim + 1) % 2; }

  // axis-separated collision
  movePlayer(p.vx * dt, 0, L);
  movePlayer(0, p.vy * dt, L);

  // star collection
  for (const s of state.stars){
    if (s.collected) continue;
    s.t += dt * 3;
    const dx = (p.x + PLAYER_W/2) - s.x;
    const dy = (p.y + PLAYER_H/2) - (s.y + 4);
    if (dx*dx + dy*dy < 100){
      s.collected = true;
      state.starsCollected++;
      spawnSparks(s.x, s.y + 4, '#f4cc4c');
      playCollect();
      updateHud();
    }
  }
  // spike hit
  for (const sp of L.spikes){
    if (p.x + PLAYER_W > sp.x && p.x < sp.x + sp.w && p.y + PLAYER_H > sp.y){
      die();
      return;
    }
  }
  // fall off world
  if (p.y > VH + 40) die();

  // door reached
  const d = L.door;
  if (p.x + PLAYER_W > d.x && p.x < d.x + 14 && p.y + PLAYER_H > d.y && p.y < d.y + 28){
    state.finishT += dt;
    if (state.finishT > 0.4){
      // advance
      if (state.level < LEVELS.length - 1){
        loadLevel(state.level + 1);
      } else {
        state.doneAll = true;
        showWinOverlay();
      }
    }
  } else {
    state.finishT = 0;
  }

  // camera follows player horizontally
  const target = Math.max(0, Math.min(L.width - VW, p.x - VW * 0.4));
  state.cameraX += (target - state.cameraX) * Math.min(1, dt * 6);

  // particles
  for (let i = state.particles.length - 1; i >= 0; i--){
    const pt = state.particles[i];
    pt.x += pt.vx * dt;
    pt.y += pt.vy * dt;
    pt.vy += 280 * dt;
    pt.life -= dt;
    if (pt.life <= 0) state.particles.splice(i, 1);
  }
}

function movePlayer(dx, dy, L){
  const p = state.player;
  if (dx !== 0){
    p.x += dx;
    resolveAxis('x', dx, L);
  }
  if (dy !== 0){
    p.y += dy;
    p.onGround = false;
    resolveAxis('y', dy, L);
  }
  // soft wall at left edge
  if (p.x < 0){ p.x = 0; }
  if (p.x + PLAYER_W > L.width){ p.x = L.width - PLAYER_W; }
}
function resolveAxis(axis, delta, L){
  const p = state.player;
  const solids = solidRects(L);
  for (const r of solids){
    if (p.x + PLAYER_W > r.x && p.x < r.x + r.w &&
        p.y + PLAYER_H > r.y && p.y < r.y + r.h){
      if (axis === 'x'){
        if (delta > 0) p.x = r.x - PLAYER_W;
        else if (delta < 0) p.x = r.x + r.w;
        p.vx = 0;
      } else {
        if (delta > 0){ // landed
          p.y = r.y - PLAYER_H;
          p.vy = 0;
          p.onGround = true;
        } else if (delta < 0){
          p.y = r.y + r.h;
          p.vy = 0;
        }
      }
    }
  }
}

function solidRects(L){
  // ground = continuous strip from x=0 to width minus the gaps from `holes`
  const rects = [];
  let cursor = 0;
  const sortedHoles = L.holes.slice().sort((a, b) => a.x - b.x);
  for (const h of sortedHoles){
    if (h.x > cursor){
      rects.push({ x: cursor, y: L.groundY, w: h.x - cursor, h: VH - L.groundY });
    }
    cursor = h.x + h.w;
  }
  if (cursor < L.width){
    rects.push({ x: cursor, y: L.groundY, w: L.width - cursor, h: VH - L.groundY });
  }
  for (const plat of L.platforms){
    rects.push(plat);
  }
  return rects;
}

function die(){
  state.deaths++;
  spawnSparks(state.player.x + PLAYER_W/2, state.player.y + PLAYER_H/2, '#e85a4a');
  playDie();
  resetPlayer();
  updateHud();
}
function spawnSparks(x, y, color){
  for (let i = 0; i < 8; i++){
    state.particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 80,
      vy: -Math.random() * 80,
      color, life: 0.6 + Math.random() * 0.3,
    });
  }
}

/* ── Render ───────────────────────────────────────────────── */
function draw(){
  const L = LEVELS[state.level];
  // sky background
  const sg = ctx.createLinearGradient(0, 0, 0, VH);
  sg.addColorStop(0, L.bg.sky);
  sg.addColorStop(1, L.bg.mid);
  ctx.fillStyle = sg;
  ctx.fillRect(0, 0, VW, VH);
  // parallax clouds / stars depending on level
  drawBackdrop(L);

  // ground (with holes)
  ctx.fillStyle = L.bg.ground;
  for (const r of solidRects(L)){
    if (r.y < L.groundY) continue;
    ctx.fillRect(Math.round(r.x - state.cameraX), Math.round(r.y), r.w, r.h);
  }
  // grass top edge for meadow / skyway
  if (state.level !== 1){
    ctx.fillStyle = L.bg.mountain;
    for (const r of solidRects(L)){
      if (r.y < L.groundY) continue;
      ctx.fillRect(Math.round(r.x - state.cameraX), Math.round(r.y), r.w, 2);
    }
  }

  // floating platforms
  for (const plat of L.platforms){
    ctx.fillStyle = L.bg.ground;
    ctx.fillRect(Math.round(plat.x - state.cameraX), Math.round(plat.y), plat.w, plat.h);
    if (state.level !== 1){
      ctx.fillStyle = L.bg.mountain;
      ctx.fillRect(Math.round(plat.x - state.cameraX), Math.round(plat.y), plat.w, 1);
    }
  }

  // spikes — triangle row
  ctx.fillStyle = '#9a8a78';
  for (const sp of L.spikes){
    const xs = Math.round(sp.x - state.cameraX);
    for (let i = 0; i < sp.w; i += 4){
      ctx.beginPath();
      ctx.moveTo(xs + i,     sp.y + 6);
      ctx.lineTo(xs + i + 2, sp.y);
      ctx.lineTo(xs + i + 4, sp.y + 6);
      ctx.closePath();
      ctx.fill();
    }
  }

  // door
  const d = L.door;
  ctx.fillStyle = '#3a2010';
  ctx.fillRect(Math.round(d.x - state.cameraX), Math.round(d.y - 4), 18, 32);
  ctx.fillStyle = '#84c8e8';
  ctx.fillRect(Math.round(d.x - state.cameraX + 2), Math.round(d.y - 2), 14, 28);
  ctx.fillStyle = '#3a2010';
  ctx.fillRect(Math.round(d.x - state.cameraX + 5), Math.round(d.y - 2), 1, 28);
  ctx.fillRect(Math.round(d.x - state.cameraX + 9), Math.round(d.y - 2), 1, 28);
  ctx.fillStyle = '#f4cc4c';
  ctx.fillRect(Math.round(d.x - state.cameraX + 13), Math.round(d.y + 12), 1, 2);

  // stars
  for (const s of state.stars){
    if (s.collected) continue;
    const bob = Math.sin(s.t) * 1.5;
    drawStar(Math.round(s.x - state.cameraX), Math.round(s.y + bob));
  }

  // player
  const p = state.player;
  let sprite;
  if (!p.onGround) sprite = SPRITE_JUMP;
  else if (Math.abs(p.vx) > 5) sprite = p.anim === 0 ? SPRITE_WALK_A : SPRITE_WALK_B;
  else sprite = SPRITE_IDLE;
  drawSprite(sprite,
    Math.round(p.x - state.cameraX - PLAYER_OFFX),
    Math.round(p.y - 0),
    p.dir < 0);

  // particles
  for (const pt of state.particles){
    const a = Math.max(0, pt.life);
    ctx.globalAlpha = Math.min(1, a * 2);
    ctx.fillStyle = pt.color;
    ctx.fillRect(Math.round(pt.x - state.cameraX), Math.round(pt.y), 2, 2);
  }
  ctx.globalAlpha = 1;
}

function drawBackdrop(L){
  // simple parallax shapes — clouds for meadow/skyway, dripping stones for cave
  if (state.level === 1){
    // cave glittering stones
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    for (let i = 0; i < 24; i++){
      const sx = ((i * 73 - state.cameraX * 0.5) % VW + VW) % VW;
      const sy = (i * 47) % 100 + 20;
      ctx.fillRect(Math.round(sx), Math.round(sy), 1, 1);
    }
    // stalactites
    ctx.fillStyle = 'rgba(60,50,40,0.5)';
    for (let i = 0; i < 6; i++){
      const cx = ((i * 220 - state.cameraX * 0.4) % (VW + 80) + VW + 80) % (VW + 80) - 40;
      ctx.beginPath();
      ctx.moveTo(cx - 6, 0);
      ctx.lineTo(cx + 6, 0);
      ctx.lineTo(cx, 20);
      ctx.closePath();
      ctx.fill();
    }
  } else {
    // 4 clouds drifting at parallax 0.3
    ctx.fillStyle = state.level === 2 ? 'rgba(255,255,255,0.8)' : 'rgba(255,255,255,0.9)';
    for (let i = 0; i < 5; i++){
      const cx = ((i * 180 + 40 - state.cameraX * 0.3) % (VW + 100) + VW + 100) % (VW + 100) - 50;
      const cy = 20 + (i * 13) % 30;
      drawCloud(cx, cy);
    }
    // hills back layer (only meadow)
    if (state.level === 0){
      ctx.fillStyle = L.bg.mountain;
      for (let i = 0; i < 8; i++){
        const hx = ((i * 90 - state.cameraX * 0.5) % (VW + 60) + VW + 60) % (VW + 60) - 30;
        ctx.beginPath();
        ctx.arc(hx, L.groundY + 4, 28, Math.PI, 0);
        ctx.fill();
      }
    }
  }
}
function drawCloud(cx, cy){
  ctx.beginPath();
  ctx.arc(cx, cy, 6, 0, Math.PI * 2);
  ctx.arc(cx + 6, cy + 2, 5, 0, Math.PI * 2);
  ctx.arc(cx - 6, cy + 2, 5, 0, Math.PI * 2);
  ctx.arc(cx + 2, cy - 3, 4, 0, Math.PI * 2);
  ctx.fill();
}
function drawStar(cx, cy){
  // simple 5-pixel sparkle
  ctx.fillStyle = '#f4cc4c';
  ctx.fillRect(cx - 1, cy - 3, 2, 1);
  ctx.fillRect(cx - 3, cy - 1, 6, 2);
  ctx.fillRect(cx - 2, cy + 1, 4, 1);
  ctx.fillRect(cx - 1, cy + 2, 2, 1);
  ctx.fillStyle = '#fff8b8';
  ctx.fillRect(cx, cy - 1, 1, 1);
}

/* ── HUD ──────────────────────────────────────────────────── */
function updateHud(){
  document.getElementById('hud-level').textContent = LEVELS[state.level].name;
  document.getElementById('hud-stars').textContent = state.starsCollected;
  document.getElementById('hud-stars-total').textContent = state.stars.length;
  document.getElementById('hud-deaths').textContent = 'deaths ' + state.deaths;
}

/* ── Audio (tiny Web Audio synth) ──────────────────────────── */
let audioCtx = null;
function ensureAudio(){
  if (audioCtx) return audioCtx;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function blip(freq, dur, type, vol){
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator();
  o.type = type || 'square';
  o.frequency.value = freq;
  const g = audioCtx.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol || 0.12, t + 0.01);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g).connect(audioCtx.destination);
  o.start(t);
  o.stop(t + dur + 0.02);
}
function playJump(){ blip(420, 0.16, 'square', 0.10); setTimeout(() => blip(620, 0.10, 'square', 0.07), 60); }
function playCollect(){ blip(880, 0.08, 'triangle', 0.14); setTimeout(() => blip(1320, 0.12, 'triangle', 0.10), 50); }
function playDie(){ blip(200, 0.2, 'sawtooth', 0.18); setTimeout(() => blip(100, 0.3, 'sawtooth', 0.16), 100); }

/* ── Overlay ──────────────────────────────────────────────── */
const overlay = document.getElementById('overlay');
function showWinOverlay(){
  overlay.classList.remove('hidden');
  overlay.innerHTML = '<h2>three acts · <span class="accent">cleared</span></h2>'
    + '<p class="lead">The kid in the blue shirt has walked through the meadow, the cavern, and the sky. '
    + 'Stars collected: <b>' + state.starsCollected + '</b> · deaths: <b>' + state.deaths + '</b></p>'
    + '<button class="play-btn" type="button" id="btn-replay">walk it again</button>';
  document.getElementById('btn-replay').addEventListener('click', () => {
    overlay.classList.add('hidden');
    state.deaths = 0;
    loadLevel(0);
    state.doneAll = false;
  });
}
document.getElementById('btn-play').addEventListener('click', () => {
  ensureAudio();
  if (audioCtx.state === 'suspended') audioCtx.resume();
  overlay.classList.add('hidden');
  loadLevel(0);
});

/* ── Main loop ────────────────────────────────────────────── */
let lastT = performance.now();
function frame(now){
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  if (!overlay.classList.contains('hidden')){
    // pause world while overlay is up — still draw current state behind
    if (state.stars.length) draw();
    requestAnimationFrame(frame);
    return;
  }
  update(dt);
  draw();
  requestAnimationFrame(frame);
}

/* ── Boot ─────────────────────────────────────────────────── */
loadLevel(0);
draw();
requestAnimationFrame(frame);
</script>
</body>
</html>
