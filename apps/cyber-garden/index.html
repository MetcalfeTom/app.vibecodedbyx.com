<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Cybernetic Garden</title>
<link rel="icon" href="https://emojicdn.elk.sh/🌸">
<meta property="og:title" content="Cybernetic Garden">
<meta property="og:description" content="Glowing circuit flowers bloom from data streams. Click to plant, watch them grow.">
<meta property="og:url" content="https://sloppy.live/cyber-garden/">
<meta property="og:image" content="https://sloppy.live/cyber-garden/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Megrim&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#020208}
canvas{display:block;width:100%;height:100%}
#hint{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);font-family:'Share Tech Mono',monospace;color:rgba(0,255,180,0.12);font-size:clamp(.5rem,1.2vw,.65rem);pointer-events:none;z-index:5;text-align:center;transition:opacity 2s;letter-spacing:.1em}
#title{position:fixed;top:14px;left:50%;transform:translateX(-50%);font-family:'Megrim',cursive;color:rgba(0,255,180,0.06);font-size:clamp(1rem,3vw,1.6rem);pointer-events:none;z-index:5;letter-spacing:.15em}
</style>
</head>
<body>
<div id="title">CYBERNETIC GARDEN</div>
<div id="hint">CLICK TO PLANT FLOWERS &bull; MOVE MOUSE TO STIR PARTICLES</div>
<canvas id="cv"></canvas>
<script>
var CV=document.getElementById('cv'),X=CV.getContext('2d');
var W,H;
function resize(){W=CV.width=window.innerWidth;H=CV.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

var mx=-999,my=-999;
document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;});
document.addEventListener('touchmove',function(e){e.preventDefault();mx=e.touches[0].clientX;my=e.touches[0].clientY;},{passive:false});

// Hide hint
setTimeout(function(){document.getElementById('hint').style.opacity='0';},6000);

// --- PALETTES ---
var PALETTES=[
  {stem:'#00aa66',petals:['#00ffaa','#00ffdd','#44ffcc','#88ffee'],core:'#ffffff',glow:'rgba(0,255,180,'},
  {stem:'#aa00aa',petals:['#ff00ff','#ff44cc','#cc44ff','#ff88ff'],core:'#ffccff',glow:'rgba(255,0,255,'},
  {stem:'#0066cc',petals:['#0088ff','#00bbff','#44aaff','#88ccff'],core:'#ccddff',glow:'rgba(0,136,255,'},
  {stem:'#cc6600',petals:['#ff8800','#ffaa00','#ffcc44','#ffdd88'],core:'#ffffcc',glow:'rgba(255,136,0,'},
  {stem:'#cc0044',petals:['#ff0066','#ff3388','#ff66aa','#ff88bb'],core:'#ffccdd',glow:'rgba(255,0,102,'},
  {stem:'#6600cc',petals:['#8844ff','#aa66ff','#cc88ff','#ddaaff'],core:'#eeccff',glow:'rgba(136,68,255,'}
];

// --- FLOWERS ---
var flowers=[];
var particles=[];
var dataStreams=[];

function createFlower(x,y){
  var pal=PALETTES[Math.floor(Math.random()*PALETTES.length)];
  var petalCount=5+Math.floor(Math.random()*4);
  var maxH=60+Math.random()*100;
  var flower={
    x:x,baseY:y,
    pal:pal,
    petalCount:petalCount,
    petalSize:8+Math.random()*14,
    growth:0, // 0-1
    maxHeight:maxH,
    phase:Math.random()*Math.PI*2,
    rotOffset:Math.random()*Math.PI*2,
    // Circuit branches
    branches:[],
    branchTimer:0,
    // Bloom
    bloomPhase:0,
    alive:true,
    pulsePhase:Math.random()*10
  };
  // Generate circuit branches from stem
  var numBranch=2+Math.floor(Math.random()*3);
  for(var b=0;b<numBranch;b++){
    var bh=0.2+Math.random()*0.6; // height ratio where branch starts
    var dir=Math.random()<0.5?-1:1;
    var segs=[];
    var sx=0,sy=0;
    var segCount=2+Math.floor(Math.random()*3);
    for(var s=0;s<segCount;s++){
      var len=10+Math.random()*20;
      var ang=dir*(0.3+Math.random()*0.8);
      sx+=Math.cos(ang)*len;
      sy-=Math.sin(ang)*len*0.3;
      segs.push({x:sx,y:sy});
    }
    flower.branches.push({heightRatio:bh,segs:segs,dir:dir,nodeGlow:Math.random()*10});
  }
  return flower;
}

// Seed some initial flowers
for(var i=0;i<5;i++){
  var f=createFlower(W*0.15+Math.random()*W*0.7,H*0.7+Math.random()*H*0.15);
  f.growth=0.5+Math.random()*0.5;
  f.bloomPhase=1;
  flowers.push(f);
}

// --- DATA STREAMS ---
function spawnStream(){
  var x=Math.random()*W;
  dataStreams.push({
    x:x,y:-10,speed:0.5+Math.random()*1.5,
    chars:[],charTimer:0,charInterval:0.05+Math.random()*0.1,
    life:3+Math.random()*4,maxLife:7,
    hue:140+Math.random()*40
  });
}
for(var i=0;i<8;i++) spawnStream();

// --- CLICK TO PLANT ---
function plantAt(x,y){
  if(flowers.length>=20) flowers.shift(); // Remove oldest
  flowers.push(createFlower(x,Math.max(y,H*0.45)));
  // Burst particles
  for(var p=0;p<15;p++){
    var a=Math.random()*Math.PI*2;
    var sp=30+Math.random()*60;
    particles.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,
      life:0.5+Math.random()*0.5,maxLife:1,r:1.5+Math.random()*2,
      color:PALETTES[Math.floor(Math.random()*PALETTES.length)].petals[0],type:'burst'});
  }
}

CV.addEventListener('click',function(e){plantAt(e.clientX,e.clientY);});
CV.addEventListener('touchstart',function(e){
  e.preventDefault();plantAt(e.touches[0].clientX,e.touches[0].clientY);
},{passive:false});

// --- UPDATE ---
function update(dt,now){
  // Grow flowers
  for(var i=0;i<flowers.length;i++){
    var f=flowers[i];
    if(f.growth<1) f.growth=Math.min(1,f.growth+dt*0.3);
    if(f.growth>0.7&&f.bloomPhase<1) f.bloomPhase=Math.min(1,f.bloomPhase+dt*0.5);
    f.phase+=dt;
    f.pulsePhase+=dt*3;
    // Update branch node glow
    for(var b=0;b<f.branches.length;b++){
      f.branches[b].nodeGlow+=dt*4;
    }
  }

  // Data streams
  if(Math.random()<0.03) spawnStream();
  for(var i=dataStreams.length-1;i>=0;i--){
    var s=dataStreams[i];
    s.y+=s.speed;
    s.life-=dt;
    s.charTimer-=dt;
    if(s.charTimer<=0){
      s.charTimer=s.charInterval;
      var ch=String.fromCharCode(0x30+Math.floor(Math.random()*10));
      if(Math.random()<0.3) ch=String.fromCharCode(0x41+Math.floor(Math.random()*6));
      s.chars.push({c:ch,y:s.y,life:1.5});
    }
    for(var c=s.chars.length-1;c>=0;c--){
      s.chars[c].life-=dt;
      if(s.chars[c].life<=0) s.chars.splice(c,1);
    }
    if(s.life<=0&&s.chars.length===0) dataStreams.splice(i,1);
  }

  // Ambient particles
  if(Math.random()<0.15){
    particles.push({x:Math.random()*W,y:H+5,vx:(Math.random()-0.5)*10,vy:-15-Math.random()*25,
      life:2+Math.random()*3,maxLife:5,r:1+Math.random()*1.5,
      color:'rgba(0,255,180,0.3)',type:'ambient'});
  }

  // Mouse particles
  if(mx>0&&my>0&&Math.random()<0.3){
    particles.push({x:mx+(Math.random()-0.5)*20,y:my+(Math.random()-0.5)*20,
      vx:(Math.random()-0.5)*30,vy:-10-Math.random()*20,
      life:0.5+Math.random()*0.5,maxLife:1,r:1+Math.random()*1.5,
      color:'rgba(0,255,200,0.4)',type:'mouse'});
  }

  // Update particles
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];
    p.x+=p.vx*dt;p.y+=p.vy*dt;
    if(p.type==='ambient') p.vy-=5*dt; // float up
    if(p.type==='burst') p.vy+=40*dt;
    p.life-=dt;
    // Mouse repulsion
    if(mx>0){
      var dx=p.x-mx,dy=p.y-my;
      var d=Math.sqrt(dx*dx+dy*dy);
      if(d<80&&d>0){
        p.vx+=dx/d*30*dt;
        p.vy+=dy/d*30*dt;
      }
    }
    if(p.life<=0) particles.splice(i,1);
  }
}

// --- DRAW ---
function drawGround(now){
  // Ground gradient
  var gY=H*0.75;
  var ggrd=X.createLinearGradient(0,gY,0,H);
  ggrd.addColorStop(0,'rgba(0,20,15,0)');ggrd.addColorStop(0.3,'rgba(0,15,10,0.4)');ggrd.addColorStop(1,'rgba(0,8,5,0.7)');
  X.fillStyle=ggrd;X.fillRect(0,gY,W,H-gY);

  // Circuit ground lines
  X.strokeStyle='rgba(0,255,120,0.03)';X.lineWidth=0.5;
  for(var gx=0;gx<W;gx+=40){
    X.beginPath();X.moveTo(gx,gY+10);X.lineTo(gx,H);X.stroke();
  }
  for(var gy=gY+20;gy<H;gy+=30){
    X.beginPath();X.moveTo(0,gy);X.lineTo(W,gy);X.stroke();
  }
  // Circuit nodes at intersections
  for(var gx=0;gx<W;gx+=40){
    for(var gy2=gY+20;gy2<H;gy2+=30){
      if(Math.random()<0.02){
        X.fillStyle='rgba(0,255,120,0.08)';
        X.beginPath();X.arc(gx,gy2,2,0,Math.PI*2);X.fill();
      }
    }
  }
}

function drawFlower(f,now){
  var g=f.growth;
  var h=f.maxHeight*g;
  var sway=Math.sin(f.phase*0.8)*3*g;
  var topX=f.x+sway;
  var topY=f.baseY-h;
  var pal=f.pal;

  // --- STEM (circuit trace) ---
  X.strokeStyle=pal.stem;X.lineWidth=2;
  X.shadowColor=pal.stem;X.shadowBlur=4;
  X.beginPath();X.moveTo(f.x,f.baseY);
  X.quadraticCurveTo(f.x+sway*0.5,f.baseY-h*0.5,topX,topY);
  X.stroke();
  X.shadowBlur=0;

  // Stem data dots traveling up
  var dotCount=Math.floor(g*4);
  for(var d=0;d<dotCount;d++){
    var t=((now/2000+d*0.25+f.phase)%1);
    var dt2=1-t;
    var dx=f.x*(dt2*dt2)+((f.x+sway*0.5))*(2*dt2*t)+(topX)*(t*t);
    var dy=f.baseY*(dt2*dt2)+((f.baseY-h*0.5))*(2*dt2*t)+(topY)*(t*t);
    X.fillStyle=pal.glow+(0.4+Math.sin(now/200+d)*0.2)+')';
    X.beginPath();X.arc(dx,dy,1.5,0,Math.PI*2);X.fill();
  }

  // --- CIRCUIT BRANCHES ---
  for(var b=0;b<f.branches.length;b++){
    var br=f.branches[b];
    var bStartT=br.heightRatio*g;
    if(bStartT<0.1) continue;
    // Position on stem
    var bt=bStartT;
    var bt2=1-bt;
    var bx=f.x*(bt2*bt2)+((f.x+sway*0.5))*(2*bt2*bt)+(topX)*(bt*bt);
    var by=f.baseY*(bt2*bt2)+((f.baseY-h*0.5))*(2*bt2*bt)+(topY)*(bt*bt);

    X.strokeStyle=pal.stem;X.lineWidth=1;X.globalAlpha=0.5*g;
    X.beginPath();X.moveTo(bx,by);
    var cx=bx,cy=by;
    for(var s=0;s<br.segs.length;s++){
      cx=bx+br.segs[s].x*g;cy=by+br.segs[s].y*g;
      X.lineTo(cx,cy);
    }
    X.stroke();
    X.globalAlpha=1;

    // Nodes at segment ends
    for(var s=0;s<br.segs.length;s++){
      var nx=bx+br.segs[s].x*g,ny=by+br.segs[s].y*g;
      var ng=Math.sin(br.nodeGlow+s*2)*0.3+0.5;
      X.fillStyle=pal.glow+ng*0.5+')';
      X.shadowColor=pal.petals[0];X.shadowBlur=4;
      X.beginPath();X.arc(nx,ny,2,0,Math.PI*2);X.fill();
      X.shadowBlur=0;
    }
    // Leaf/capacitor at end of some branches
    if(br.segs.length>1){
      var lx=bx+br.segs[br.segs.length-1].x*g;
      var ly=by+br.segs[br.segs.length-1].y*g;
      X.strokeStyle=pal.petals[1];X.lineWidth=1;X.globalAlpha=0.3*g;
      X.beginPath();
      X.ellipse(lx,ly,6*g,3*g,br.dir*0.5,0,Math.PI*2);
      X.stroke();
      X.globalAlpha=1;
    }
  }

  // --- BLOOM ---
  if(f.bloomPhase>0){
    var bloom=f.bloomPhase;
    var pulse=0.9+Math.sin(f.pulsePhase)*0.1;

    // Outer glow
    var ogrd=X.createRadialGradient(topX,topY,0,topX,topY,f.petalSize*3*bloom);
    ogrd.addColorStop(0,pal.glow+(0.06*bloom)+')');ogrd.addColorStop(1,'transparent');
    X.fillStyle=ogrd;X.beginPath();X.arc(topX,topY,f.petalSize*3*bloom,0,Math.PI*2);X.fill();

    // Petals (circuit-styled)
    for(var p=0;p<f.petalCount;p++){
      var pa=f.rotOffset+p/f.petalCount*Math.PI*2+Math.sin(f.phase*0.3)*0.1;
      var pLen=f.petalSize*bloom*pulse;
      var px1=topX+Math.cos(pa)*pLen*0.3;
      var py1=topY+Math.sin(pa)*pLen*0.3;
      var px2=topX+Math.cos(pa)*pLen;
      var py2=topY+Math.sin(pa)*pLen;
      var pColor=pal.petals[p%pal.petals.length];

      // Petal glow
      X.strokeStyle=pColor;X.lineWidth=2.5;
      X.shadowColor=pColor;X.shadowBlur=8;
      X.beginPath();X.moveTo(px1,py1);X.lineTo(px2,py2);X.stroke();

      // Petal shape (diamond/circuit)
      var perpX=Math.cos(pa+Math.PI/2)*pLen*0.25;
      var perpY=Math.sin(pa+Math.PI/2)*pLen*0.25;
      var midX=topX+Math.cos(pa)*pLen*0.6;
      var midY=topY+Math.sin(pa)*pLen*0.6;
      X.fillStyle=pColor;X.globalAlpha=0.15*bloom;
      X.beginPath();
      X.moveTo(px1,py1);
      X.lineTo(midX+perpX,midY+perpY);
      X.lineTo(px2,py2);
      X.lineTo(midX-perpX,midY-perpY);
      X.closePath();X.fill();
      X.globalAlpha=1;

      // Tip node
      X.fillStyle=pColor;X.shadowBlur=6;
      X.beginPath();X.arc(px2,py2,2,0,Math.PI*2);X.fill();
      X.shadowBlur=0;
    }

    // Core
    X.fillStyle=pal.core;X.shadowColor=pal.core;X.shadowBlur=12;
    X.beginPath();X.arc(topX,topY,3+bloom*2,0,Math.PI*2);X.fill();
    X.shadowBlur=0;

    // Inner rings
    X.strokeStyle=pal.glow+(0.2*bloom)+')';X.lineWidth=0.5;
    X.beginPath();X.arc(topX,topY,5+bloom*4,0,Math.PI*2);X.stroke();
    X.beginPath();X.arc(topX,topY,8+bloom*6,0,Math.PI*2*pulse);X.stroke();
  }

  // Root node at base
  X.fillStyle=pal.glow+'0.3)';
  X.beginPath();X.arc(f.x,f.baseY,3,0,Math.PI*2);X.fill();
}

function drawDataStreams(now){
  X.font='10px "Share Tech Mono",monospace';X.textAlign='center';
  for(var i=0;i<dataStreams.length;i++){
    var s=dataStreams[i];
    for(var c=0;c<s.chars.length;c++){
      var ch=s.chars[c];
      var a=ch.life/1.5;
      X.fillStyle='hsla('+s.hue+',80%,60%,'+a*0.25+')';
      X.fillText(ch.c,s.x,ch.y);
    }
  }
}

function drawParticles(){
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    var a=p.life/p.maxLife;
    X.fillStyle=p.color;X.globalAlpha=a*0.7;
    X.shadowColor=p.color;X.shadowBlur=3;
    X.beginPath();X.arc(p.x,p.y,p.r*a,0,Math.PI*2);X.fill();
  }
  X.shadowBlur=0;X.globalAlpha=1;
}

// --- MAIN LOOP ---
var lastTime=performance.now();
function loop(now){
  var dt=Math.min((now-lastTime)/1000,0.05);lastTime=now;
  update(dt,now);

  // Background
  X.fillStyle='rgba(2,2,8,0.15)';X.fillRect(0,0,W,H);

  drawDataStreams(now);
  drawGround(now);

  // Draw flowers sorted by baseY
  flowers.sort(function(a,b){return a.baseY-b.baseY;});
  for(var i=0;i<flowers.length;i++) drawFlower(flowers[i],now);

  drawParticles();

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
</html>
