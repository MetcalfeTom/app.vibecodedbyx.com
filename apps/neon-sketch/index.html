<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Neon Sketch</title>
<link rel="icon" href="https://emojicdn.elk.sh/✏️">
<meta property="og:title" content="Neon Sketch">
<meta property="og:description" content="Draw with glowing neon pencils on a dark canvas.">
<meta property="og:url" content="https://sloppy.live/neon-sketch">
<meta property="og:image" content="https://sloppy.live/neon-sketch/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Lexend+Deca:wght@300;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#0a0a0f;
  height:100vh;
  overflow:hidden;
  font-family:'Lexend Deca',sans-serif;
  display:flex;
  flex-direction:column;
}
canvas{
  flex:1;
  display:block;
  cursor:crosshair;
  touch-action:none;
}

/* Toolbar */
#bar{
  display:flex;
  align-items:center;
  gap:8px;
  padding:8px 12px;
  background:rgba(10,10,15,0.95);
  border-top:1px solid rgba(255,255,255,0.04);
  flex-wrap:wrap;
  justify-content:center;
}

/* Color swatches */
.swatch{
  width:28px;height:28px;
  border-radius:50%;
  border:2px solid transparent;
  cursor:pointer;
  transition:transform 0.1s,border-color 0.15s;
  position:relative;
}
.swatch:hover{transform:scale(1.15)}
.swatch.active{border-color:#fff;transform:scale(1.15)}
.swatch::after{
  content:'';position:absolute;inset:3px;border-radius:50%;
  background:var(--c);
  box-shadow:0 0 8px var(--c),0 0 16px var(--c-dim);
}

/* Divider */
.div{width:1px;height:24px;background:rgba(255,255,255,0.08);margin:0 4px}

/* Size */
#size-wrap{display:flex;align-items:center;gap:6px}
#size{
  -webkit-appearance:none;appearance:none;
  width:70px;height:4px;
  background:rgba(255,255,255,0.1);
  border-radius:2px;outline:none;
}
#size::-webkit-slider-thumb{
  -webkit-appearance:none;
  width:14px;height:14px;border-radius:50%;
  background:#fff;cursor:pointer;
}
#size::-moz-range-thumb{
  width:14px;height:14px;border-radius:50%;
  background:#fff;border:none;cursor:pointer;
}
#size-val{
  font-size:11px;color:rgba(255,255,255,0.3);
  width:22px;text-align:center;
  font-weight:300;
}

/* Buttons */
.btn{
  background:none;
  border:1px solid rgba(255,255,255,0.08);
  color:rgba(255,255,255,0.5);
  font-family:'Lexend Deca',sans-serif;
  font-size:12px;font-weight:300;
  padding:5px 12px;
  border-radius:6px;
  cursor:pointer;
  transition:all 0.15s;
  letter-spacing:0.5px;
}
.btn:hover{border-color:rgba(255,255,255,0.2);color:#fff}
.btn.eraser-active{border-color:#ff4488;color:#ff4488}

/* Glow toggle */
#glow-label{
  font-size:11px;color:rgba(255,255,255,0.3);
  display:flex;align-items:center;gap:4px;cursor:pointer;
  font-weight:300;
}
#glow-cb{accent-color:#00ffaa}

@media(max-width:500px){
  .swatch{width:24px;height:24px}
  #bar{gap:5px;padding:6px 8px}
  .btn{padding:4px 8px;font-size:11px}
  #size{width:50px}
}
</style>
</head>
<body>

<canvas id="c"></canvas>

<div id="bar">
  <div id="colors"></div>
  <span class="div"></span>
  <div id="size-wrap">
    <input type="range" id="size" min="1" max="30" value="3">
    <span id="size-val">3</span>
  </div>
  <span class="div"></span>
  <label id="glow-label"><input type="checkbox" id="glow-cb" checked> glow</label>
  <button class="btn" id="eraser-btn">eraser</button>
  <button class="btn" id="undo-btn">undo</button>
  <button class="btn" id="clear-btn">clear</button>
  <button class="btn" id="save-btn">save</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const sizeSlider = document.getElementById('size');
const sizeVal = document.getElementById('size-val');
const glowCb = document.getElementById('glow-cb');
const eraserBtn = document.getElementById('eraser-btn');
const undoBtn = document.getElementById('undo-btn');
const clearBtn = document.getElementById('clear-btn');
const saveBtn = document.getElementById('save-btn');
const colorsEl = document.getElementById('colors');

const COLORS = [
  { name:'magenta',  c:'#ff00ff', dim:'#ff00ff66' },
  { name:'cyan',     c:'#00ffff', dim:'#00ffff66' },
  { name:'green',    c:'#00ff88', dim:'#00ff8866' },
  { name:'yellow',   c:'#ffff00', dim:'#ffff0066' },
  { name:'orange',   c:'#ff8800', dim:'#ff880066' },
  { name:'red',      c:'#ff2255', dim:'#ff225566' },
  { name:'blue',     c:'#4488ff', dim:'#4488ff66' },
  { name:'purple',   c:'#aa44ff', dim:'#aa44ff66' },
  { name:'pink',     c:'#ff66aa', dim:'#ff66aa66' },
  { name:'white',    c:'#ffffff', dim:'#ffffff44' },
];

let currentColor = 0;
let brushSize = 3;
let glowEnabled = true;
let eraserMode = false;
let drawing = false;
let lastX = 0, lastY = 0;
let history = [];
const MAX_HISTORY = 30;

// Build swatches
COLORS.forEach((col, i) => {
  const s = document.createElement('div');
  s.className = 'swatch' + (i === 0 ? ' active' : '');
  s.style.setProperty('--c', col.c);
  s.style.setProperty('--c-dim', col.dim);
  s.addEventListener('click', () => {
    document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
    s.classList.add('active');
    currentColor = i;
    eraserMode = false;
    eraserBtn.classList.remove('eraser-active');
  });
  colorsEl.appendChild(s);
});

// Resize
function resize() {
  // Save current image
  const img = ctx.getImageData(0, 0, canvas.width, canvas.height);
  const dpr = window.devicePixelRatio || 1;
  canvas.width = window.innerWidth * dpr;
  canvas.height = (window.innerHeight - document.getElementById('bar').offsetHeight) * dpr;
  canvas.style.width = window.innerWidth + 'px';
  canvas.style.height = (window.innerHeight - document.getElementById('bar').offsetHeight) + 'px';
  ctx.scale(dpr, dpr);
  // Restore
  ctx.putImageData(img, 0, 0);
}
resize();
window.addEventListener('resize', resize);

function saveState() {
  history.push(canvas.toDataURL());
  if (history.length > MAX_HISTORY) history.shift();
}

function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  if (e.touches) {
    return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
  }
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function startDraw(e) {
  e.preventDefault();
  drawing = true;
  saveState();
  const pos = getPos(e);
  lastX = pos.x;
  lastY = pos.y;
  drawDot(pos.x, pos.y);
}

function moveDraw(e) {
  if (!drawing) return;
  e.preventDefault();
  const pos = getPos(e);
  drawLine(lastX, lastY, pos.x, pos.y);
  lastX = pos.x;
  lastY = pos.y;
}

function endDraw(e) {
  drawing = false;
}

function drawDot(x, y) {
  const dpr = window.devicePixelRatio || 1;
  ctx.save();
  ctx.scale(1/dpr, 1/dpr);
  const sx = x * dpr, sy = y * dpr;
  const sz = brushSize * dpr;

  if (eraserMode) {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.arc(sx, sy, sz + 2, 0, Math.PI * 2);
    ctx.fill();
  } else {
    const col = COLORS[currentColor];
    if (glowEnabled) {
      ctx.shadowColor = col.c;
      ctx.shadowBlur = sz * 3;
    }
    ctx.fillStyle = col.c;
    ctx.beginPath();
    ctx.arc(sx, sy, sz / 2, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}

function drawLine(x1, y1, x2, y2) {
  const dpr = window.devicePixelRatio || 1;
  ctx.save();
  ctx.scale(1/dpr, 1/dpr);
  const sx1 = x1*dpr, sy1 = y1*dpr, sx2 = x2*dpr, sy2 = y2*dpr;
  const sz = brushSize * dpr;

  if (eraserMode) {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.lineWidth = (sz + 4);
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.beginPath();
    ctx.moveTo(sx1, sy1);
    ctx.lineTo(sx2, sy2);
    ctx.stroke();
  } else {
    const col = COLORS[currentColor];
    ctx.lineCap = 'round';
    ctx.lineJoin = 'round';
    ctx.lineWidth = sz;
    ctx.strokeStyle = col.c;
    if (glowEnabled) {
      // Draw glow layer first
      ctx.shadowColor = col.c;
      ctx.shadowBlur = sz * 3;
    }
    ctx.beginPath();
    ctx.moveTo(sx1, sy1);
    ctx.lineTo(sx2, sy2);
    ctx.stroke();

    // Second pass for core brightness
    if (glowEnabled) {
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 0.6;
      ctx.lineWidth = sz * 0.5;
      ctx.strokeStyle = '#fff';
      ctx.beginPath();
      ctx.moveTo(sx1, sy1);
      ctx.lineTo(sx2, sy2);
      ctx.stroke();
    }
  }
  ctx.restore();
}

// Events
canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', moveDraw);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('mouseleave', endDraw);
canvas.addEventListener('touchstart', startDraw, { passive: false });
canvas.addEventListener('touchmove', moveDraw, { passive: false });
canvas.addEventListener('touchend', endDraw);
canvas.addEventListener('touchcancel', endDraw);

// Controls
sizeSlider.addEventListener('input', () => {
  brushSize = parseInt(sizeSlider.value);
  sizeVal.textContent = brushSize;
});

glowCb.addEventListener('change', () => {
  glowEnabled = glowCb.checked;
});

eraserBtn.addEventListener('click', () => {
  eraserMode = !eraserMode;
  eraserBtn.classList.toggle('eraser-active', eraserMode);
  if (eraserMode) {
    document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
  } else {
    document.querySelectorAll('.swatch')[currentColor].classList.add('active');
  }
});

undoBtn.addEventListener('click', () => {
  if (!history.length) return;
  const img = new Image();
  img.onload = () => {
    ctx.save();
    const dpr = window.devicePixelRatio || 1;
    ctx.setTransform(1, 0, 0, 1, 0, 0);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.drawImage(img, 0, 0);
    ctx.restore();
  };
  img.src = history.pop();
});

clearBtn.addEventListener('click', () => {
  saveState();
  const dpr = window.devicePixelRatio || 1;
  ctx.save();
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.restore();
});

saveBtn.addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = 'neon-sketch.png';
  // Draw on temp canvas with black bg
  const tmp = document.createElement('canvas');
  tmp.width = canvas.width;
  tmp.height = canvas.height;
  const tCtx = tmp.getContext('2d');
  tCtx.fillStyle = '#0a0a0f';
  tCtx.fillRect(0, 0, tmp.width, tmp.height);
  tCtx.drawImage(canvas, 0, 0);
  link.href = tmp.toDataURL('image/png');
  link.click();
});

// Keyboard shortcuts
window.addEventListener('keydown', (e) => {
  if (e.key === 'z' && (e.ctrlKey || e.metaKey)) {
    e.preventDefault();
    undoBtn.click();
  }
  if (e.key === 'e') {
    eraserBtn.click();
  }
  if (e.key === '[') {
    brushSize = Math.max(1, brushSize - 1);
    sizeSlider.value = brushSize;
    sizeVal.textContent = brushSize;
  }
  if (e.key === ']') {
    brushSize = Math.min(30, brushSize + 1);
    sizeSlider.value = brushSize;
    sizeVal.textContent = brushSize;
  }
});
</script>
</body>
</html>
