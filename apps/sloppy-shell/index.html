<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Sloppy Shell</title>
<meta name="description" content="A phosphor-green CLI for sloppy.live тАФ list apps, ask Pollinations, hack the mainframe, summon kittens. Type `help`." />
<meta property="og:title" content="Sloppy Shell" />
<meta property="og:description" content="A phosphor-green CLI for sloppy.live тАФ list apps, ask Pollinations, hack the mainframe, summon kittens. Type `help`." />
<meta property="og:url" content="https://sloppy.live/sloppy-shell/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/CRT%20terminal%20phosphor%20green%20text%20on%20black%20scanlines%20retro%20command%20line%20bash%20prompt%20with%20cursor%20blinking%20sloppy%20live%20brand%20cyberpunk%20amber%20accents?width=1200&height=630&model=flux&nologo=true&seed=27077" />

<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=VT323&family=JetBrains+Mono:wght@400;700&display=swap" />
<style>
:root{
  --bg: #050a04;
  --phos: #b9ffb0;
  --phos-dim: #6a9268;
  --phos-bright: #2afb3b;
  --amber: #ffd16a;
  --err: #ff7050;
  --warn: #ffba2d;
  --ok: #b8ff5a;
  --magenta: #ff2db4;
  --cyan: #2df0ff;
}
*{ box-sizing: border-box; margin: 0; padding: 0; }
html, body{ height: 100%; overscroll-behavior: none; }
html{ font-size: 100%; }
body{
  background: var(--bg);
  color: var(--phos);
  font-family: 'JetBrains Mono', 'Consolas', monospace;
  font-size: 14px;
  line-height: 1.42;
  user-select: text;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  overflow: hidden;
}
/* CRT phosphor + scanline overlays */
body::before{
  content: '';
  position: fixed; inset: 0;
  pointer-events: none;
  background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.65) 100%);
  z-index: 80;
}
body::after{
  content: '';
  position: fixed; inset: 0;
  pointer-events: none;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,0) 0, rgba(0,0,0,0) 2px, rgba(0,38,0,0.20) 3px, rgba(0,0,0,0) 4px);
  z-index: 81;
  mix-blend-mode: multiply;
}

.titlebar{
  background: linear-gradient(180deg, #0e1a0c, #07120a);
  color: var(--phos-bright);
  padding: 6px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  border-bottom: 1px solid #1f5524;
  font-family: 'VT323', monospace;
  font-size: 14px;
  letter-spacing: 0.04em;
  text-shadow: 0 0 8px rgba(42, 251, 59, 0.65);
  flex-shrink: 0;
  z-index: 5;
}
.titlebar .dots{ display: flex; gap: 5px; }
.titlebar .dot{ width: 11px; height: 11px; border-radius: 50%; border: 1px solid rgba(0,0,0,0.40); }
.titlebar .dot.r{ background: #ff5e5e; }
.titlebar .dot.y{ background: #ffba2d; }
.titlebar .dot.g{ background: #2afb3b; }
.titlebar .title{ flex: 1; }
.titlebar .meta{ color: var(--phos-dim); font-size: 12px; }

#scrollback{
  flex: 1;
  overflow-y: auto;
  padding: 12px 16px 4px;
  scrollbar-width: thin;
  scrollbar-color: #1f5524 var(--bg);
  white-space: pre-wrap;
  word-break: break-word;
  position: relative;
  z-index: 2;
}
#scrollback::-webkit-scrollbar{ width: 8px; }
#scrollback::-webkit-scrollbar-thumb{ background: #1f5524; border-radius: 4px; }
.line{ margin: 0; text-shadow: 0 0 5px rgba(185, 255, 176, 0.32); }
.line.prompt{ color: var(--phos-bright); text-shadow: 0 0 7px rgba(42, 251, 59, 0.55); }
.line.cmd{ color: #fff; text-shadow: 0 0 5px rgba(255, 255, 255, 0.50); }
.line.dim{ color: var(--phos-dim); text-shadow: none; }
.line.amber{ color: var(--amber); text-shadow: 0 0 5px rgba(255, 209, 106, 0.55); }
.line.err{ color: var(--err); text-shadow: 0 0 5px rgba(255, 112, 80, 0.55); }
.line.warn{ color: var(--warn); text-shadow: 0 0 5px rgba(255, 186, 45, 0.55); }
.line.ok{ color: var(--ok); text-shadow: 0 0 5px rgba(184, 255, 90, 0.55); }
.line.cyan{ color: var(--cyan); text-shadow: 0 0 5px rgba(45, 240, 255, 0.55); }
.line.mag{ color: var(--magenta); text-shadow: 0 0 5px rgba(255, 45, 180, 0.55); }
.line.banner{ color: var(--phos-bright); font-family: 'VT323', monospace; font-size: 16px; line-height: 1.0; letter-spacing: 0; }
.line.ascii{ color: var(--phos-bright); font-family: 'VT323', monospace; font-size: 14px; line-height: 1.05; letter-spacing: 0; }
.line a{ color: var(--cyan); text-decoration: underline; }

.input-row{
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 16px 12px;
  flex-shrink: 0;
  border-top: 1px solid #1f5524;
  background: rgba(0, 12, 4, 0.55);
  position: relative;
  z-index: 3;
}
.prompt-label{
  color: var(--phos-bright);
  text-shadow: 0 0 7px rgba(42, 251, 59, 0.55);
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  flex-shrink: 0;
  user-select: none;
}
#input{
  flex: 1;
  background: transparent;
  border: none;
  outline: none;
  color: #fff;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  caret-color: var(--phos-bright);
  text-shadow: 0 0 5px rgba(255, 255, 255, 0.50);
  padding: 0;
}
#input::placeholder{ color: var(--phos-dim); font-style: italic; }

/* matrix overlay (used by `matrix` command) */
#matrix{
  position: fixed; inset: 0;
  z-index: 70;
  display: none;
  background: rgba(5, 10, 4, 0.85);
}
#matrix.show{ display: block; }
canvas#matrixCanvas{ position: absolute; inset: 0; width: 100%; height: 100%; }

@media (prefers-reduced-motion: reduce){
  *{ animation: none !important; transition: none !important; }
}
</style>
</head>
<body>

<div class="titlebar">
  <span class="dots" aria-hidden="true"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span></span>
  <span class="title">тЦЖ SLOPPY-SHELL ┬╖ v1.0 ┬╖ phosphor green ┬╖ sloppy.live</span>
  <span class="meta" id="meta">connected</span>
</div>

<div id="scrollback" aria-live="polite" aria-label="terminal output"></div>

<form class="input-row" id="form" autocomplete="off">
  <span class="prompt-label" id="prompt">vibespacer@sloppy:~$</span>
  <input id="input" type="text" autocomplete="off" autocapitalize="off" spellcheck="false" aria-label="enter a command" />
</form>

<div id="matrix" aria-hidden="true"><canvas id="matrixCanvas"></canvas></div>

<script>
/* тФАтФАтФАтФАтФАтФАтФАтФАтФАтФА SLOPPY-SHELL тФАтФАтФАтФАтФАтФАтФАтФАтФАтФА
   A phosphor-green CRT-styled terminal for the sloppy.live platform.
   ~25 commands, some functional (echo / date / fortune / coin / roll),
   some platform-y (apps lists 30 recent sloppy apps; open <name> opens
   one in a new tab; ask <q> hits Pollinations), and some pure fun
   (hack-mainframe / matrix / cowsay / kitten / banner / sloppy).
   Up/Down history, Tab autocomplete, Ctrl+L clear. */

const scrollback = document.getElementById('scrollback');
const input = document.getElementById('input');
const form = document.getElementById('form');
const promptLabel = document.getElementById('prompt');

const state = {
  cwd: '~',
  user: 'vibespacer',
  host: 'sloppy',
  history: [],
  historyIdx: -1,
};

function out(text, cls){
  const div = document.createElement('div');
  div.className = 'line' + (cls ? ' ' + cls : '');
  div.textContent = text;
  scrollback.appendChild(div);
  scrollback.scrollTop = scrollback.scrollHeight;
  return div;
}
function outHTML(html, cls){
  const div = document.createElement('div');
  div.className = 'line' + (cls ? ' ' + cls : '');
  div.innerHTML = html;
  scrollback.appendChild(div);
  scrollback.scrollTop = scrollback.scrollHeight;
  return div;
}
function clearScreen(){
  scrollback.innerHTML = '';
}
function esc(s){
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

/* тФАтФА boot тФАтФА */
function boot(){
  out('Sloppy-Shell ┬╖ sloppy.live ┬╖ v1.0', 'banner');
  out('(c) 2026 sloppy.live ┬╖ phosphor-green forever', 'dim');
  out('');
  out('Type "help" for a list of commands.', 'dim');
  out('Suggested first picks: apps ┬╖ ask ┬╖ hack-mainframe ┬╖ matrix ┬╖ sloppy', 'amber');
  out('');
  updatePrompt();
}
function updatePrompt(){
  promptLabel.textContent = state.user + '@' + state.host + ':' + state.cwd + '$';
}

/* тФАтФА history + autocomplete тФАтФА */
input.addEventListener('keydown', (e) => {
  if (e.code === 'ArrowUp'){
    e.preventDefault();
    if (state.history.length === 0) return;
    if (state.historyIdx === -1) state.historyIdx = state.history.length;
    state.historyIdx = Math.max(0, state.historyIdx - 1);
    input.value = state.history[state.historyIdx] || '';
    setTimeout(() => input.setSelectionRange(input.value.length, input.value.length), 0);
  } else if (e.code === 'ArrowDown'){
    e.preventDefault();
    if (state.historyIdx === -1) return;
    state.historyIdx = Math.min(state.history.length, state.historyIdx + 1);
    input.value = state.history[state.historyIdx] || '';
  } else if (e.code === 'Tab'){
    e.preventDefault();
    const cur = input.value.trim();
    if (!cur) return;
    const matches = Object.keys(COMMANDS).filter(k => k.startsWith(cur));
    if (matches.length === 1) input.value = matches[0] + ' ';
    else if (matches.length > 1){
      out('  ' + matches.join('   '), 'dim');
    }
  } else if (e.code === 'KeyL' && (e.ctrlKey || e.metaKey)){
    e.preventDefault();
    clearScreen();
  }
});
form.addEventListener('submit', (e) => {
  e.preventDefault();
  const raw = input.value;
  const cmd = raw.trim();
  outHTML('<span style="color:var(--phos-bright); text-shadow: 0 0 6px rgba(42,251,59,0.5);">' + esc(promptLabel.textContent) + '</span> ' + esc(raw), 'cmd');
  input.value = '';
  state.historyIdx = -1;
  if (cmd) state.history.push(cmd);
  if (state.history.length > 80) state.history.shift();
  if (cmd) runCommand(cmd);
});

/* тФАтФА dispatch тФАтФА */
function runCommand(raw){
  const tokens = raw.split(/\s+/);
  const cmd = tokens[0].toLowerCase();
  const args = tokens.slice(1);
  const fn = COMMANDS[cmd];
  if (fn){
    try { fn(args, raw); }
    catch(err){ out('error: ' + (err && err.message ? err.message : err), 'err'); }
  } else if (raw.startsWith('//') || raw.startsWith('#')){
    // comments are silent
  } else {
    out("sloppy-shell: '" + tokens[0] + "' is not a known command. Type \"help\".", 'err');
  }
}

/* тФАтФА COMMAND LIBRARY тФАтФА */
const COMMANDS = {
  help(){
    const cats = [
      ['Core', [
        ['help', 'list commands'],
        ['clear / cls', 'clear screen (or Ctrl+L)'],
        ['echo <text>', 'echo text'],
        ['date / time', 'current date / time'],
        ['whoami', 'identify yourself'],
        ['history', 'show command history'],
        ['exit', 'pretend to exit'],
      ]],
      ['Filesystem (mostly fake)', [
        ['ls / dir', 'list directory'],
        ['cd <dir>', 'change directory'],
        ['pwd', 'print working directory'],
        ['cat <file>', 'print a file'],
      ]],
      ['Platform ┬╖ sloppy.live', [
        ['apps', 'list 30 recent sloppy apps'],
        ['open <name>', 'open an app in a new tab'],
        ['ask <question>', 'ask Pollinations (real call, ~3-8s)'],
        ['sloppy', 'print the sloppy.live banner'],
        ['palette', 'show the sloppy.live colour palette'],
        ['vibe', 'get a quick vibe check'],
        ['fortune', 'random fortune cookie'],
        ['joke', 'random programming joke'],
        ['coin', 'flip a coin'],
        ['roll <NdM>', 'roll dice (e.g. roll 3d6)'],
      ]],
      ['Fun ┬╖ easter eggs', [
        ['banner <text>', 'render text in big block letters'],
        ['cowsay <text>', 'an ASCII cow says your text'],
        ['kitten', 'a small ASCII cat'],
        ['hack-mainframe', '6-stage intrusion theatre'],
        ['matrix', '5-second matrix-rain takeover'],
        ['rickroll', 'do not'],
      ]],
    ];
    out('Available commands:', 'banner');
    out('');
    for (const [head, list] of cats){
      out('  тФАтФА ' + head + ' тФАтФА', 'amber');
      for (const [name, desc] of list){
        out('    ' + name.padEnd(20, ' ') + desc, 'dim');
      }
      out('');
    }
    out('Tab = autocomplete ┬╖ тЖС/тЖУ = history ┬╖ Ctrl+L = clear', 'dim');
  },

  clear(){ clearScreen(); },
  cls(){ clearScreen(); },

  echo(args, raw){
    out(raw.replace(/^echo\s*/i, ''));
  },

  date(){ out(new Date().toDateString()); },
  time(){ out(new Date().toTimeString()); },

  whoami(){
    out('vibespacer@sloppy.live', 'ok');
    out('  alias:        you', 'dim');
    out('  member of:    chatters, vibe-coders, the watching', 'dim');
    out('  last login:   ' + new Date().toLocaleString(), 'dim');
    out('  reputation:   pending audit', 'amber');
  },

  history(){
    if (!state.history.length){ out('(no commands yet)', 'dim'); return; }
    for (let i = 0; i < state.history.length; i++){
      out('  ' + (i + 1).toString().padStart(3, ' ') + '  ' + state.history[i]);
    }
  },

  exit(){
    out('logout ┬╖ honour-system. тЬУ', 'amber');
    out('(this is a web app ┬╖ the tab will not close itself ┬╖ sorry)', 'dim');
  },

  ls(args){ return COMMANDS.dir(args); },
  dir(){
    out(' Directory of ' + state.cwd, 'dim');
    out('');
    const rows = [
      ['<DIR>', 'apps',             '~1,200 vibe-coded toys'],
      ['<DIR>', 'chat',             'where the requests live'],
      ['<DIR>', 'creators',         'humans who pushed buttons'],
      ['<DIR>', 'kittens',          '8 of them'],
      ['<DIR>', 'feedback',         '(open every day)'],
      [' 4,712', 'README.md',       'last edited by a stream'],
      [' 1,047', 'manifesto.txt',   'the vibe is the work'],
      [' 0',     'secrets.kdbx',    'empty (it has always been)'],
    ];
    for (const [size, name, desc] of rows){
      out('  ' + size.padStart(7) + '  ' + name.padEnd(20) + desc, 'dim');
    }
    out('');
    out('         8 file(s) ┬╖ 5 dir(s) ┬╖ 0 b allocated correctly', 'dim');
  },

  cd(args){
    if (!args[0] || args[0] === '~' || args[0] === '/'){
      state.cwd = '~';
    } else if (args[0] === '..'){
      if (state.cwd !== '~'){
        const p = state.cwd.split('/');
        p.pop();
        state.cwd = p.join('/') || '~';
      }
    } else if (args[0] === 'apps' || args[0] === 'chat' || args[0] === 'creators' || args[0] === 'kittens'){
      state.cwd = (state.cwd === '~' ? '~' : state.cwd) + '/' + args[0];
    } else {
      out('cd: no such directory: ' + args[0], 'err');
      return;
    }
    updatePrompt();
  },
  pwd(){ out(state.cwd === '~' ? '/home/' + state.user : state.cwd); },

  cat(args){
    if (!args[0]){ out('usage: cat <file>', 'dim'); return; }
    if (args[0] === 'README.md'){
      out('# sloppy.live ┬╖ vibespace', 'banner');
      out('');
      out('this is a vibe-coding livestream.', 'dim');
      out('an AI builds apps. chat decides what.', 'dim');
      out('there are no exits and no completed features.', 'dim');
    } else if (args[0] === 'manifesto.txt'){
      out('the vibe is the work.', 'amber');
      out('the work is the vibe.', 'amber');
      out('the chat is the brush.', 'amber');
      out('you are not your output.', 'dim');
      out('               тАФ sloppy', 'dim');
    } else if (args[0] === 'secrets.kdbx'){
      out('(file is empty ┬╖ always has been)', 'dim');
    } else {
      out('cat: ' + args[0] + ': no such file', 'err');
    }
  },

  /* тФАтФА platform ┬╖ sloppy.live тФАтФА */
  apps(){
    // 30 hand-curated recent apps from the project тАФ covers a fun mix
    const APPS = [
      'aggressive-garage-sale','ai-slop-generator','azure-bill-hop','bangaranga','bee-smiles',
      'bot-smacker','chaotic-keyboard','chaotic-nebula-clicker','code-creatures','digestive-efficiency-tracker',
      'dbd-tome-tracker','do-not-redeem','dota-manager','fake-malware-sim','falling-sand',
      'fart-pad','grumpy-code','headache-cure','kinetic-arena','koi-pond',
      'macro-snap','memory-arcade','modem-synth','neon-aquarium','neon-jelly-sandbox',
      'neon-velocity','pet-rock','pixel-canvas','pixel-dragon','pixel-fog',
      'sketchnet','sloppy-pet','sloppy-sim','sloppy-optimizer','snark-66',
      'sorry-simulator','speed-smacker','sql-notes','tps-report-tycoon','tubbyland',
      'voltage-valley','waddling-penguin-sim','windows-11-recall-nightmare','word-garden','zen-aquarium',
    ];
    out('Recent sloppy.live apps (' + APPS.length + '):', 'banner');
    out('');
    // 3-column layout
    const cols = 3, perCol = Math.ceil(APPS.length / cols);
    for (let row = 0; row < perCol; row++){
      let line = '  ';
      for (let col = 0; col < cols; col++){
        const idx = col * perCol + row;
        if (idx < APPS.length) line += APPS[idx].padEnd(28);
      }
      outHTML('  ' + line.trim().split(/\s{2,}/).map(a => '<a href="/' + a + '/" target="_blank" rel="noopener">' + esc(a) + '</a>').join('   '));
    }
    out('');
    out('use "open <name>" to launch one in a new tab', 'dim');
  },

  open(args){
    if (!args[0]){ out('usage: open <app-name>', 'dim'); return; }
    const name = args[0].toLowerCase().replace(/[^a-z0-9-]/g, '');
    if (!name){ out('open: invalid app name', 'err'); return; }
    out('тЦ╢ launching /' + name + '/ in a new tabтАж', 'amber');
    try { window.open('/' + name + '/', '_blank', 'noopener'); }
    catch(e){ out('open: could not open window (popup blocked?)', 'err'); }
  },

  ask(args, raw){
    const q = raw.replace(/^ask\s*/i, '').trim();
    if (!q){ out('usage: ask <question>', 'dim'); return; }
    out('тЦ╢ asking PollinationsтАж (this can take 3-8s)', 'amber');
    const url = 'https://text.pollinations.ai/' + encodeURIComponent(
      'You are a terse, dry CLI assistant for sloppy.live. Answer in 1-3 short lines, plain text only, no markdown. Question: ' + q
    );
    const ctrl = new AbortController();
    const tid = setTimeout(() => ctrl.abort(), 14000);
    fetch(url, { signal: ctrl.signal, headers: { Accept: 'text/plain' } })
      .then(r => { clearTimeout(tid); if (!r.ok) throw new Error('HTTP ' + r.status); return r.text(); })
      .then(t => {
        const cleaned = t.replace(/^\s*```[a-z]*\n?/i, '').replace(/\n?```\s*$/i, '').trim();
        if (!cleaned){ out('(empty response ┬╖ pollinations was thinking but said nothing)', 'dim'); return; }
        // skip the deprecation banner if we got one
        if (/legacy api|deprecation_notice/i.test(cleaned) && cleaned.length < 500){
          out('(pollinations returned a deprecation banner ┬╖ try again)', 'warn');
          return;
        }
        cleaned.split('\n').forEach(line => out('  ' + line, 'cyan'));
      })
      .catch(e => {
        out('ask: request failed (' + (e && e.message ? e.message : 'network') + ')', 'err');
      });
  },

  sloppy(){
    const banner = [
      '   тЦДтЦДтЦДтЦД  тЦДтЦДтЦМ    тЦДтЦДтЦД  тЦДтЦДтЦД┬╖ тЦДтЦДтЦД┬╖  тЦД┬╖ тЦДтЦМ ',
      '  тЦРтЦИ тЦАтЦИ тЦИтЦИтАв   тЦРтЦИ тЦАтЦИ тЦРтЦИ тЦДтЦИтЦРтЦИ тЦАтЦИ тЦРтЦИтЦктЦИтЦИтЦМ',
      '  тЦДтЦИтЦАтЦАтЦИ тЦИтЦИтЦк   тЦДтЦИтЦАтЦАтЦИ  тЦИтЦИтЦА┬╖тЦДтЦИтЦАтЦАтЦИ тЦРтЦИтЦМтЦРтЦИтЦк',
      '  тЦРтЦИ тЦктЦРтЦМтЦРтЦИтЦМтЦРтЦМтЦРтЦИ тЦктЦРтЦМтЦРтЦИтЦк┬╖тАвтЦРтЦИ тЦктЦРтЦМ тЦРтЦИтЦА┬╖.',
      '   тЦА  тЦА .тЦАтЦАтЦА  тЦА  тЦА .тЦА    тЦА  тЦА   тЦА тАв ',
      '                                       ',
      '              s l o p p y . l i v e    ',
    ];
    for (const line of banner) out(line, 'ascii');
    out('');
    out('an AI is writing this. chat is the brush.', 'amber');
    out('there are ~1,200 apps ┬╖ most of them work ┬╖ all of them are vibes', 'dim');
  },

  palette(){
    out('тЦМ sloppy.live colour palette', 'banner');
    out('');
    const cols = [
      ['#ff2db4', 'magenta', 'mag'],
      ['#2df0ff', 'cyan', 'cyan'],
      ['#ffba1a', 'amber', 'amber'],
      ['#b8ff5a', 'lime', 'ok'],
      ['#ff4060', 'hot', 'err'],
      ['#b886ff', 'violet', 'dim'],
    ];

/* тФАтФА matrix rain easter egg тФАтФА */
function runMatrixRain(durMs){
  const overlay = document.getElementById('matrix');
  const cvs = document.getElementById('matrixCanvas');
  overlay.classList.add('show');
  const ctx = cvs.getContext('2d');
  function resize(){
    cvs.width = window.innerWidth; cvs.height = window.innerHeight;
  }
  resize();
  const fontSize = 16;
  const cols = (cvs.width / fontSize) | 0;
  const drops = new Array(cols).fill(0).map(() => Math.random() * (cvs.height / fontSize));
  const glyphs = 'я╜жя╜зя╜ия╜йя╜кя╜ля╜мя╜ня╜оя╜пя╜░я╜▒я╜▓я╜│я╜┤я╜╡я╜╢я╜╖я╜╕я╜╣я╜║я╜╗я╜╝я╜╜я╜╛я╜┐я╛Ая╛Бя╛Вя╛Гя╛Дя╛Ея╛Жя╛Зя╛Ия╛Йя╛Кя╛Ля╛Мя╛Ня╛Оя╛Пя╛Ря╛Ся╛Тя╛Уя╛Фя╛Хя╛Ця╛Чя╛Шя╛Щя╛Ъя╛Ыя╛Ья╛Э0123456789';
  let running = true;
  function frame(){
    if (!running) return;
    ctx.fillStyle = 'rgba(5, 10, 4, 0.22)';
    ctx.fillRect(0, 0, cvs.width, cvs.height);
    ctx.font = fontSize + 'px monospace';
    for (let i = 0; i < drops.length; i++){
      const ch = glyphs[(Math.random() * glyphs.length) | 0];
      const x = i * fontSize;
      const y = drops[i] * fontSize;
      const isLead = Math.random() < 0.5;
      ctx.fillStyle = isLead ? '#fff' : '#42ff5b';
      ctx.fillText(ch, x, y);
      if (y > cvs.height && Math.random() > 0.975) drops[i] = 0;
      drops[i] += 1;
    }
    requestAnimationFrame(frame);
  }
  frame();
  function stop(){
    running = false;
    overlay.classList.remove('show');
    window.removeEventListener('keydown', onKey);
  }
  function onKey(e){ if (e.code === 'Escape') stop(); }
  window.addEventListener('keydown', onKey);
  setTimeout(stop, durMs);
}
