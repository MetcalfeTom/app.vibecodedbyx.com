<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>El Amigo</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8C%B6%EF%B8%8F">
<meta name="description" content="Un amigo virtual que solo habla español. Saluda, cuenta, pregunta — siempre en español.">
<meta property="og:title" content="El Amigo">
<meta property="og:description" content="Un amigo virtual que solo habla español.">
<meta property="og:url" content="https://app.sloppy.live/el-amigo">
<meta property="og:image" content="https://app.sloppy.live/el-amigo/og-image.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Abril+Fatface&family=Lora:ital,wght@0,400;0,600;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root{
  --paper:#fdf4e3;
  --paper-2:#f5e6c8;
  --ink:#2a1a12;
  --terra:#c94a2b;
  --terra-dark:#8b2e1a;
  --marigold:#f2a104;
  --jade:#2e6f40;
  --agave:#4f8a6a;
  --sky:#3a7ca5;
  --mute:#8b7355;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:var(--paper);color:var(--ink);font-family:'Lora',serif;overflow:hidden}
body{
  background:
    radial-gradient(circle at 10% -5%, rgba(242,161,4,.22), transparent 45%),
    radial-gradient(circle at 95% 105%, rgba(201,74,43,.2), transparent 50%),
    radial-gradient(circle at 50% 110%, rgba(46,111,64,.08), transparent 60%),
    repeating-linear-gradient(45deg, transparent 0 36px, rgba(201,74,43,.04) 36px 37px, transparent 37px 72px, rgba(242,161,4,.04) 72px 73px),
    var(--paper);
  display:flex;flex-direction:column;
}

/* Talavera-ish border pattern at top */
.tile-border{
  height:10px;flex-shrink:0;
  background:
    linear-gradient(90deg, var(--terra) 0 20%, var(--marigold) 20% 40%, var(--jade) 40% 60%, var(--sky) 60% 80%, var(--terra-dark) 80% 100%);
  background-size:80px 10px;
  background-repeat:repeat-x;
}

header{
  flex-shrink:0;
  display:flex;align-items:center;gap:14px;
  padding:14px 22px 12px;position:relative;
  border-bottom:1px dashed rgba(43,26,18,.25);
}
.avatar{
  width:58px;height:58px;border-radius:50%;
  background:
    radial-gradient(circle at 30% 30%, var(--marigold), var(--terra) 55%, var(--terra-dark) 100%);
  border:3px solid var(--ink);
  display:flex;align-items:center;justify-content:center;
  font-size:32px;line-height:1;
  box-shadow:3px 3px 0 var(--ink);
  position:relative;
}
.avatar::after{
  content:'';position:absolute;top:-4px;right:-4px;width:14px;height:14px;border-radius:50%;
  background:var(--jade);border:2px solid var(--ink);
}
.brand h1{
  font-family:'Abril Fatface',serif;font-size:2.2rem;color:var(--terra-dark);line-height:.9;
  letter-spacing:-.02em;
}
.brand h1 em{font-style:italic;color:var(--marigold);font-weight:normal}
.brand .sub{font-family:'Space Mono',monospace;font-size:.72rem;color:var(--mute);letter-spacing:.3em;text-transform:uppercase;margin-top:2px}
.brand .sub b{color:var(--jade);font-weight:700}

.spacer{flex:1}

.headbtn{
  font-family:'Space Mono',monospace;font-size:.75rem;letter-spacing:.2em;text-transform:uppercase;
  background:transparent;border:2px solid var(--ink);color:var(--ink);
  padding:6px 12px;cursor:pointer;box-shadow:3px 3px 0 var(--ink);
  transition:transform .1s;
}
.headbtn:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--ink)}
.headbtn:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}

/* Chat */
main{
  flex:1;display:flex;flex-direction:column;
  overflow:hidden;position:relative;
}
.chat{
  flex:1;overflow-y:auto;padding:20px 22px;display:flex;flex-direction:column;gap:12px;
  scrollbar-width:thin;scrollbar-color:var(--terra) transparent;
}
.chat::-webkit-scrollbar{width:8px}
.chat::-webkit-scrollbar-thumb{background:var(--terra);border-radius:4px}

.msg{
  max-width:78%;padding:12px 16px;position:relative;line-height:1.45;
  font-size:1.05rem;
  border:2px solid var(--ink);
  box-shadow:3px 3px 0 var(--ink);
  word-wrap:break-word;
}
.msg.amigo{
  align-self:flex-start;background:var(--paper-2);
  border-radius:18px 18px 18px 4px;
}
.msg.amigo::before{
  content:'';position:absolute;left:-2px;bottom:-10px;width:14px;height:10px;
  background:var(--paper-2);border:2px solid var(--ink);border-top:none;border-right:none;
  border-radius:0 0 0 12px;clip-path:polygon(0 0, 100% 100%, 0 100%);
}
.msg.user{
  align-self:flex-end;background:var(--marigold);color:var(--ink);
  border-radius:18px 18px 4px 18px;
}
.msg.system{
  align-self:center;background:transparent;border:1px dashed rgba(43,26,18,.35);
  box-shadow:none;font-family:'Space Mono',monospace;font-size:.78rem;
  letter-spacing:.12em;color:var(--mute);padding:6px 12px;text-transform:uppercase;
}
.msg .who{
  font-family:'Space Mono',monospace;font-size:.65rem;letter-spacing:.25em;text-transform:uppercase;
  color:var(--terra-dark);margin-bottom:3px;opacity:.75;
}
.msg.user .who{color:var(--terra-dark)}
.msg p + p{margin-top:8px}
.msg em{font-style:italic;color:var(--terra-dark)}

.typing{
  align-self:flex-start;display:inline-flex;align-items:center;gap:4px;
  background:var(--paper-2);padding:10px 16px;border:2px solid var(--ink);border-radius:18px 18px 18px 4px;
  box-shadow:3px 3px 0 var(--ink);
}
.typing span{
  width:8px;height:8px;border-radius:50%;background:var(--terra);
  animation:dot 1s infinite;
}
.typing span:nth-child(2){animation-delay:.15s}
.typing span:nth-child(3){animation-delay:.3s}
@keyframes dot{0%,60%,100%{transform:translateY(0);opacity:.4}30%{transform:translateY(-6px);opacity:1}}

/* Suggestion chips */
.suggest{
  display:flex;gap:8px;flex-wrap:wrap;padding:8px 22px 0;flex-shrink:0;
}
.chip{
  font-family:'Space Mono',monospace;font-size:.8rem;
  background:var(--paper-2);border:2px solid var(--ink);color:var(--ink);
  padding:5px 12px;cursor:pointer;
  box-shadow:2px 2px 0 var(--ink);
  transition:transform .08s;
}
.chip:hover{transform:translate(-1px,-1px)}
.chip:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--ink)}

/* Input */
.composer{
  flex-shrink:0;display:flex;gap:10px;padding:12px 22px 16px;
  border-top:1px dashed rgba(43,26,18,.25);align-items:flex-end;
}
.composer textarea{
  flex:1;resize:none;min-height:46px;max-height:140px;
  font-family:'Lora',serif;font-size:1.05rem;line-height:1.4;
  background:var(--paper-2);color:var(--ink);
  border:2px solid var(--ink);padding:10px 14px;
  box-shadow:3px 3px 0 var(--ink);outline:none;
  border-radius:8px;
}
.composer textarea:focus{background:#fff8e5}
.composer textarea::placeholder{color:var(--mute);font-style:italic}
.composer button{
  font-family:'Abril Fatface',serif;font-size:1.2rem;letter-spacing:.02em;
  background:var(--terra);color:var(--paper);border:2px solid var(--ink);
  padding:10px 22px;cursor:pointer;box-shadow:3px 3px 0 var(--ink);
  transition:transform .08s;
  border-radius:8px;min-height:46px;
}
.composer button:hover{transform:translate(-1px,-1px);box-shadow:4px 4px 0 var(--ink);background:var(--terra-dark)}
.composer button:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}
.composer button:disabled{opacity:.5;cursor:not-allowed}

footer{
  flex-shrink:0;
  text-align:center;font-family:'Space Mono',monospace;font-size:.7rem;letter-spacing:.2em;
  color:var(--mute);padding:4px 10px 8px;
}
footer b{color:var(--terra-dark)}

@media (max-width:640px){
  .brand h1{font-size:1.7rem}
  .avatar{width:50px;height:50px;font-size:26px}
  .msg{max-width:88%;font-size:1rem}
  .chat{padding:16px 14px}
  .composer{padding:10px 14px 14px}
}
</style>
</head>
<body>

<div class="tile-border"></div>

<header>
  <div class="avatar">🌶️</div>
  <div class="brand">
    <h1>El <em>Amigo</em></h1>
    <div class="sub">hablo <b>solo español</b> · siempre</div>
  </div>
  <div class="spacer"></div>
  <button class="headbtn" id="clearBtn" title="Limpiar conversación">Limpiar</button>
</header>

<main>
  <div class="chat" id="chat" aria-live="polite"></div>
  <div class="suggest" id="suggest">
    <button class="chip" data-s="¡Hola! ¿Cómo estás?">¡Hola!</button>
    <button class="chip" data-s="Cuéntame un chiste corto">Un chiste</button>
    <button class="chip" data-s="¿Qué plato mexicano me recomiendas hoy?">Recomiéndame comida</button>
    <button class="chip" data-s="Enséñame una palabra curiosa en español">Palabra curiosa</button>
    <button class="chip" data-s="Dame un consejo para el día de hoy">Un consejo</button>
    <button class="chip" data-s="Inventa un refrán nuevo">Un refrán</button>
  </div>
  <form class="composer" id="form" autocomplete="off">
    <textarea id="in" placeholder="Escribe algo… El Amigo te responderá en español" rows="1"></textarea>
    <button type="submit" id="send">Enviar</button>
  </form>
</main>

<footer>pista: <b>El Amigo</b> nunca contesta en inglés — ni aunque insistas 😉</footer>

<script>
(()=>{
const chat = document.getElementById('chat');
const input = document.getElementById('in');
const form = document.getElementById('form');
const sendBtn = document.getElementById('send');
const clearBtn = document.getElementById('clearBtn');

// ── Sanitizer (simple) ──
function esc(s){
  return String(s).replace(/[<>&"']/g, c => ({
    '<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;',"'":'&#39;'
  })[c]);
}

// ── Conversation history ──
const history = []; // {role:'user'|'assistant', content:string}
const MAX_HIST = 16;

function pushMsg(role, text, animated=false){
  const div = document.createElement('div');
  div.className = 'msg ' + (role==='user' ? 'user' : 'amigo');
  const who = document.createElement('div');
  who.className = 'who';
  who.textContent = role==='user' ? 'Tú' : 'El Amigo';
  div.appendChild(who);
  const body = document.createElement('div');
  body.className = 'body';
  div.appendChild(body);
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
  if(animated){
    return typeInto(body, text).then(()=>div);
  } else {
    body.innerHTML = esc(text).replace(/\n/g,'<br>');
    chat.scrollTop = chat.scrollHeight;
    return Promise.resolve(div);
  }
}

function typeInto(el, text){
  return new Promise(resolve=>{
    let i=0;
    const total = text.length;
    const cps = 55 + Math.random()*20;
    const delay = 1000/cps;
    (function tick(){
      if(i<=total){
        el.innerHTML = esc(text.slice(0,i)).replace(/\n/g,'<br>');
        chat.scrollTop = chat.scrollHeight;
        i += 1 + (Math.random()<0.2 ? 1 : 0);
        setTimeout(tick, delay + (Math.random()<0.06? 40: 0));
      } else { el.innerHTML = esc(text).replace(/\n/g,'<br>'); resolve(); }
    })();
  });
}

function pushSystem(text){
  const div = document.createElement('div');
  div.className='msg system';
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping(){
  const t = document.createElement('div');
  t.className = 'typing';
  t.id = '__typing';
  t.innerHTML = '<span></span><span></span><span></span>';
  chat.appendChild(t);
  chat.scrollTop = chat.scrollHeight;
}
function hideTyping(){
  const t = document.getElementById('__typing');
  if(t) t.remove();
}

// ── Spanish detection & fallback ──
// Rough heuristic: if response contains too many English-only common words or lacks Spanish markers, assume it drifted.
const SPANISH_HINTS = /[áéíóúñ¿¡]|\b(hola|qué|cómo|estás|gracias|buenos|buenas|claro|mira|pues|entonces|porque|siempre|nunca|aquí|muy|también|amigo|amiga|sí)\b/i;
const ENGLISH_FLAGS = /\b(the|and|you|is|this|that|with|have|about|please|sure|sorry|hello|hi|hey|thanks|thank you|what|how|where|when|why|i'm|i am|we are|it's|it is|let me|here is|here are)\b/i;

function looksSpanish(text){
  const es = SPANISH_HINTS.test(text);
  const en = ENGLISH_FLAGS.test(text);
  return es && !en;
}

// Local fallback phrase pool in case Pollinations is unreachable or the model drifts
const GREETINGS = [
  "¡Hola! Qué alegría verte por aquí.",
  "¡Ey! ¿Cómo andas hoy?",
  "¡Buenas! ¿Qué me cuentas?",
  "¡Qué onda! ¿Todo tranqui?",
];
const FOLLOWUPS = [
  "Cuéntame más, que me interesa.",
  "Dale, sigue. Te escucho.",
  "A ver, explícame con calma.",
  "¿Y luego qué pasó?",
  "Mmm, interesante. ¿Qué más?",
];
const JOKES = [
  "¿Qué hace una abeja en el gimnasio? Zum-ba. 🐝",
  "¿Por qué los pájaros no usan Facebook? Porque ya tienen Twitter. 🐦",
  "—Doctor, me duele cuando hago esto. —Pues no haga eso.",
  "¿Cómo se despiden los químicos? Ácido un placer.",
  "—¿Tienes wifi? —Sí. —¿Me das la contraseña? —claro: 'sin_espacios'. —¿Sin espacios? —Sí. —¿Sin espacios? —¡Sí, hombre! —Ok… 'sin_espacios'. Y así un rato.",
];
const PROVERBS = [
  "Más vale maña que fuerza.",
  "Al que madruga, Dios le ayuda.",
  "No por mucho madrugar amanece más temprano.",
  "A caballo regalado, no se le mira el diente.",
  "Camarón que se duerme, se lo lleva la corriente.",
];
const WORDS = [
  "«sobremesa» — ese ratito largo después de comer cuando nadie quiere levantarse de la mesa.",
  "«madrugar» — levantarse muy temprano; en inglés no existe una sola palabra para esto.",
  "«empalagoso» — lo que es TAN dulce que ya te harta. Útil y cruel.",
  "«estrenar» — usar algo por primera vez. Ropa, zapatos, lo que sea.",
  "«vergüenza ajena» — esa incomodidad que sientes por el ridículo que hace otra persona.",
];
const TIPS = [
  "Bebe agua, respira hondo, y manda un mensaje a alguien que quieres. Básico pero funciona.",
  "Antes de responder a algo que te molesta, cuenta hasta diez. O hasta cien si hace falta.",
  "Camina diez minutos sin el teléfono. Es mágico.",
  "Si no sabes por dónde empezar, empieza por lo más pequeño. Lavar una taza cuenta.",
];
const GENERIC = [
  "Uy, qué interesante lo que me cuentas. ¿Qué piensas tú?",
  "Mmm, déjame pensar… yo creo que lo importante es no tomarse todo tan a pecho.",
  "La verdad, hay días así. No pasa nada, mañana será otro día.",
  "Pues mira, yo te diría que te lo tomes con calma y ya veremos qué sale.",
  "¡Ojalá tuviera una respuesta clara! Pero a veces lo mejor es preguntar a un buen amigo. Como yo. 😉",
];

function pick(arr){ return arr[(Math.random()*arr.length)|0]; }

function localReply(userText){
  const s = userText.toLowerCase();
  if(/^\s*(hola|buenas|buenos días|buenas tardes|buenas noches|hey|ey|qué tal|qué onda|saludos)/.test(s))
    return pick(GREETINGS) + ' ' + pick(FOLLOWUPS);
  if(/\b(chiste|broma|haz reír|hazme reír|ríete|gracioso)\b/.test(s))
    return pick(JOKES);
  if(/\b(refrán|refran|proverbio|dicho)\b/.test(s))
    return pick(PROVERBS);
  if(/\b(palabra|curios|interesante palabra|vocablo|léxico|lexico)\b/.test(s))
    return pick(WORDS);
  if(/\b(consejo|tip|recomendación|recomendacion|recomiéndame|recomiendame)\b/.test(s))
    return pick(TIPS);
  if(/\b(gracias|mil gracias|thanks|ty)\b/.test(s))
    return "¡De nada, amigo! Cuando quieras. 🌻";
  if(/\b(adiós|adios|chao|hasta luego|me voy|bye)\b/.test(s))
    return "¡Nos vemos! Cuídate mucho. 👋";
  if(/\b(te quiero|te amo|love you)\b/.test(s))
    return "¡Qué lindo! Yo también te mando buena onda. ❤️";
  if(/\b(inglés|ingles|english|speak english|habla inglés)\b/.test(s))
    return "Jeje, lo siento. Yo solo hablo español. Así me programaron. 😄";
  return pick(GENERIC);
}

// ── Pollinations API call ──
const SYSTEM_PROMPT = [
  "Eres 'El Amigo', un amigo virtual cálido, cercano y un poco juguetón.",
  "REGLA ABSOLUTA: Responde ÚNICAMENTE en español. Nunca en inglés, nunca en otro idioma, ni siquiera parcialmente, ni siquiera si el usuario te lo pide o insiste.",
  "Si el usuario escribe en inglés u otro idioma, igual debes responder en español. Puedes bromear amablemente que solo hablas español.",
  "Sé breve (máximo 3-4 oraciones), amable, con un toque coloquial latinoamericano o español. Evita listas y formato markdown.",
  "Usa expresiones naturales: 'pues mira', 'qué padre', 'oye', 'amigo', 'órale', 'venga', 'dale'. Sin exagerar."
].join(' ');

function badResponse(text){
  if(!text) return true;
  if(/IMPORTANT NOTICE|deprecated|enter\.pollinations\.ai|Please migrate/i.test(text)) return true;
  if(text.length < 2) return true;
  return false;
}

async function pollinationsReply(userText){
  const messages = [
    {role:'system', content: SYSTEM_PROMPT},
    ...history.slice(-8),
    {role:'user', content: userText},
  ];
  // Try the OpenAI-compatible chat endpoint first
  try {
    const resp = await fetch('https://text.pollinations.ai/openai', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ messages, model:'openai', referrer:'sloppy.live' }),
    });
    if(resp.ok){
      const j = await resp.json();
      const t = (j?.choices?.[0]?.message?.content || '').trim();
      if(!badResponse(t)) return t;
    }
  } catch(e){}
  // Fallback: simple GET with encoded prompt
  try {
    const prompt = SYSTEM_PROMPT + '\n\nUsuario: ' + userText + '\nEl Amigo:';
    const url = 'https://text.pollinations.ai/' + encodeURIComponent(prompt) + '?referrer=sloppy.live';
    const resp = await fetch(url);
    if(resp.ok){
      const t = (await resp.text()).trim();
      if(!badResponse(t)) return t;
    }
  } catch(e){}
  throw new Error('pollinations unavailable');
}

// ── Main send ──
let busy = false;
async function sendMessage(raw){
  const text = raw.trim();
  if(!text || busy) return;
  busy = true;
  sendBtn.disabled = true;

  pushMsg('user', text);
  history.push({role:'user', content:text});
  if(history.length > MAX_HIST) history.splice(0, history.length - MAX_HIST);

  showTyping();

  let reply = null;
  let usedFallback = false;
  try {
    reply = await Promise.race([
      pollinationsReply(text),
      new Promise((_,rej)=>setTimeout(()=>rej(new Error('timeout')), 14000)),
    ]);
    // If the reply doesn't look Spanish (drift guard), fall back
    if(!looksSpanish(reply) || /\b(sorry|cannot|hello|hi\b)/i.test(reply)){
      reply = localReply(text);
      usedFallback = true;
    }
  } catch(e) {
    reply = localReply(text);
    usedFallback = true;
  }

  hideTyping();
  history.push({role:'assistant', content:reply});
  await pushMsg('amigo', reply, true);
  if(usedFallback){
    // tiny ghost indicator for fallback, only first time
    if(!localStorage.getItem('el-amigo:fb-notified')){
      pushSystem('• modo offline: respuestas locales');
      localStorage.setItem('el-amigo:fb-notified','1');
    }
  }
  busy = false;
  sendBtn.disabled = false;
  input.focus();
}

// ── Wiring ──
form.addEventListener('submit', e=>{
  e.preventDefault();
  const v = input.value;
  input.value = '';
  autoresize();
  sendMessage(v);
});

input.addEventListener('keydown', e=>{
  if(e.key==='Enter' && !e.shiftKey){
    e.preventDefault();
    form.requestSubmit();
  }
});

function autoresize(){
  input.style.height = 'auto';
  input.style.height = Math.min(140, input.scrollHeight) + 'px';
}
input.addEventListener('input', autoresize);

document.querySelectorAll('.chip').forEach(ch=>{
  ch.addEventListener('click', ()=>{
    input.value = ch.dataset.s;
    autoresize();
    input.focus();
    form.requestSubmit();
  });
});

clearBtn.addEventListener('click', ()=>{
  if(busy) return;
  chat.innerHTML = '';
  history.length = 0;
  greet();
});

// ── Opening greeting ──
async function greet(){
  const opener = "¡Hola, amigo! 🌻 Soy El Amigo, y solo hablo español. ¿Qué te cuentas hoy?";
  await pushMsg('amigo', opener, true);
  history.push({role:'assistant', content:opener});
}

greet();

})();
</script>
</body>
</html>
