<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>App Directory · sloppy.live</title>
  <link rel="icon" href="https://emojicdn.elk.sh/📁">
  <meta name="description" content="Search every sloppy.live app. Browse the full catalog A to Z.">
  <meta property="og:title" content="App Directory · sloppy.live">
  <meta property="og:description" content="Search every sloppy.live app. Browse the full catalog A to Z.">
  <meta property="og:image" content="https://image.pollinations.ai/prompt/neon%20alphabetical%20app%20catalog%20cyan%20black%20terminal%20directory%20grid%20cyberpunk?width=1200&height=630&nologo=true">
  <meta property="og:url" content="https://sloppy.live/app-directory">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&display=swap');

    :root {
      --bg: #07070d;
      --bg-2: #0e0e18;
      --line: #1a1a2a;
      --line-bright: #2a2a44;
      --text: #d8d8e8;
      --dim: #6a6a85;
      --cyan: #4ff0ff;
      --cyan-soft: #79e6ec;
      --amber: #ffd166;
      --hot: #ff5e9c;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { font-size: 100%; }
    html, body { background: var(--bg); }

    body {
      min-height: 100vh;
      font-family: 'JetBrains Mono', monospace;
      color: var(--text);
      background:
        radial-gradient(900px 540px at 50% -10%, rgba(79,240,255,0.06), transparent 70%),
        radial-gradient(700px 420px at 10% 110%, rgba(255,94,156,0.04), transparent 70%),
        var(--bg);
    }

    .shell {
      max-width: 78rem;
      margin: 0 auto;
      padding: 3.25rem 1.25rem 6rem;
    }

    .masthead {
      border: 1px solid var(--line-bright);
      background:
        linear-gradient(180deg, rgba(79,240,255,0.04), transparent 60%),
        var(--bg-2);
      padding: 1.5rem 1.5rem 1.25rem;
      position: relative;
    }
    .masthead::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(
        180deg,
        rgba(79,240,255,0.022) 0 1px,
        transparent 1px 3px
      );
    }

    .crumbs {
      font-size: 0.68rem;
      letter-spacing: 0.25em;
      color: var(--dim);
      margin-bottom: 0.85rem;
      text-transform: uppercase;
    }
    .crumbs .sep { color: var(--line-bright); margin: 0 0.5rem; }
    .crumbs .now { color: var(--cyan); }

    h1.title {
      font-size: clamp(1.65rem, 4.4vw, 2.4rem);
      font-weight: 700;
      letter-spacing: 0.18em;
      color: var(--cyan);
      text-shadow: 0 0 18px rgba(79,240,255,0.4);
    }
    h1.title .slash { color: var(--hot); }

    .tag {
      margin-top: 0.55rem;
      color: var(--dim);
      font-size: 0.78rem;
      letter-spacing: 0.06em;
    }
    .tag em { color: var(--amber); font-style: normal; }

    .searchwrap {
      margin-top: 1.4rem;
      position: relative;
      display: flex;
      align-items: stretch;
      gap: 0.6rem;
      flex-wrap: wrap;
    }
    .searchbox {
      flex: 1 1 22rem;
      display: flex;
      align-items: center;
      background: #04040a;
      border: 1px solid var(--line-bright);
      transition: border-color 140ms, box-shadow 140ms;
    }
    .searchbox:focus-within {
      border-color: var(--cyan);
      box-shadow: 0 0 0 3px rgba(79,240,255,0.18), 0 0 18px rgba(79,240,255,0.22);
    }
    .searchbox .icon {
      width: 2.75rem;
      text-align: center;
      color: var(--cyan);
      font-size: 0.95rem;
      user-select: none;
    }
    #search {
      flex: 1;
      min-width: 0;
      padding: 0.95rem 0.9rem 0.95rem 0;
      background: transparent;
      border: 0;
      color: var(--text);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      min-height: 2.75rem;
    }
    #search::placeholder { color: #444459; }

    .qhint {
      font-size: 0.7rem;
      color: var(--dim);
      padding: 0 0.6rem;
      align-self: center;
    }
    .qhint kbd {
      background: #050510;
      border: 1px solid var(--line-bright);
      color: var(--cyan-soft);
      padding: 0.1rem 0.45rem;
      font-family: inherit;
      font-size: 0.7rem;
      letter-spacing: 0.04em;
    }

    .stats {
      margin-top: 0.85rem;
      display: flex;
      flex-wrap: wrap;
      gap: 1.4rem;
      font-size: 0.72rem;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--dim);
    }
    .stats span b { color: var(--cyan); font-weight: 500; }
    .stats span.found b { color: var(--amber); }

    .azbar {
      margin: 1.4rem 0 0.6rem;
      padding: 0.55rem;
      border: 1px solid var(--line);
      background: var(--bg-2);
      display: flex;
      flex-wrap: wrap;
      gap: 0.2rem;
      position: sticky;
      top: 0;
      z-index: 9;
    }
    .azbar button {
      flex: 1 0 auto;
      min-width: 2rem;
      padding: 0.4rem 0.3rem;
      background: transparent;
      border: 1px solid transparent;
      color: var(--dim);
      font-family: inherit;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: 0.05em;
      transition: color 140ms, border-color 140ms, background 140ms;
    }
    .azbar button.has { color: var(--cyan-soft); }
    .azbar button.empty { color: #2a2a3e; cursor: not-allowed; }
    .azbar button:hover.has {
      background: rgba(79,240,255,0.08);
      border-color: var(--cyan);
      color: var(--cyan);
    }
    .azbar button:focus-visible {
      outline: 2px solid var(--amber);
      outline-offset: 2px;
    }

    .results {
      margin-top: 1rem;
    }

    .section {
      margin-top: 1.5rem;
    }
    .section-head {
      position: sticky;
      top: 3.2rem;
      z-index: 5;
      display: flex;
      align-items: baseline;
      gap: 0.9rem;
      padding: 0.55rem 0.7rem;
      margin-bottom: 0.6rem;
      background:
        linear-gradient(90deg, rgba(79,240,255,0.12), transparent 70%),
        #050510;
      border-left: 3px solid var(--cyan);
      border-bottom: 1px solid var(--line);
    }
    .section-head .letter {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--cyan);
      letter-spacing: 0.1em;
    }
    .section-head .count {
      font-size: 0.68rem;
      color: var(--dim);
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(17rem, 1fr));
      gap: 0.5rem;
    }

    .app {
      display: grid;
      grid-template-columns: auto 1fr;
      align-items: start;
      gap: 0.55rem;
      padding: 0.65rem 0.75rem;
      background: rgba(255,255,255,0.018);
      border: 1px solid var(--line);
      text-decoration: none;
      color: inherit;
      min-height: 2.75rem;
      transition: background 120ms, border-color 120ms, transform 120ms;
    }
    .app:hover {
      background: rgba(79,240,255,0.06);
      border-color: var(--cyan);
      transform: translateX(2px);
    }
    .app:focus-visible {
      outline: 2px solid var(--amber);
      outline-offset: 2px;
      border-color: var(--amber);
    }
    .app .glyph {
      width: 1.8rem;
      height: 1.8rem;
      display: grid;
      place-items: center;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--cyan);
      background: #050510;
      border: 1px solid var(--line-bright);
      letter-spacing: 0;
    }
    .app .meta { min-width: 0; }
    .app .name {
      font-size: 0.82rem;
      font-weight: 500;
      color: var(--cyan-soft);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .app .slug {
      font-size: 0.62rem;
      color: var(--dim);
      letter-spacing: 0.05em;
      margin-top: 0.15rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .app .desc {
      margin-top: 0.35rem;
      font-size: 0.7rem;
      line-height: 1.45;
      color: #a3a3b8;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    mark {
      background: rgba(255,209,102,0.22);
      color: var(--amber);
      padding: 0 1px;
      border-radius: 0;
    }

    .empty {
      padding: 4rem 1rem;
      text-align: center;
      color: var(--dim);
      border: 1px dashed var(--line-bright);
      margin-top: 2rem;
    }
    .empty .big {
      font-size: 1.1rem;
      color: var(--amber);
      letter-spacing: 0.1em;
      margin-bottom: 0.4rem;
    }
    .empty .small { font-size: 0.78rem; }

    .loading {
      padding: 3rem 1rem;
      text-align: center;
      color: var(--dim);
      letter-spacing: 0.2em;
      font-size: 0.78rem;
    }
    .loading::after {
      content: '_';
      color: var(--cyan);
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .errbox {
      margin-top: 2rem;
      padding: 1rem;
      border: 1px solid var(--hot);
      color: var(--hot);
      background: rgba(255,94,156,0.06);
      font-size: 0.82rem;
    }

    .footer {
      margin-top: 4rem;
      text-align: center;
      color: #333;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
    }

    @media (max-width: 540px) {
      .shell { padding: 1.6rem 0.8rem 4rem; }
      .masthead { padding: 1.1rem 0.9rem; }
      .azbar { top: 0; }
      .section-head { top: 3.1rem; }
      .grid { grid-template-columns: 1fr; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        transition-duration: 0.01ms !important;
      }
      .app:hover { transform: none; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="masthead" role="banner">
      <div class="crumbs"><span>sloppy.live</span><span class="sep">/</span><span class="now">app-directory</span></div>
      <h1 class="title">APP <span class="slash">/</span> DIRECTORY</h1>
      <p class="tag">search the full catalog. <em>every app, A to Z.</em></p>

      <div class="searchwrap" role="search">
        <label for="search" class="sr-only" style="position:absolute;left:-9999px;">Search apps</label>
        <div class="searchbox">
          <span class="icon" aria-hidden="true">⌕</span>
          <input id="search" type="search" placeholder="search 1200+ apps · name, title, description…" autocomplete="off" spellcheck="false" autofocus>
        </div>
        <div class="qhint">press <kbd>/</kbd> to focus · <kbd>Esc</kbd> to clear</div>
      </div>

      <div class="stats" role="status" aria-live="polite">
        <span>indexed <b id="total">…</b></span>
        <span class="found">showing <b id="shown">…</b></span>
        <span>last sync <b id="sync">…</b></span>
      </div>
    </header>

    <nav class="azbar" id="azbar" aria-label="Jump to letter"></nav>

    <section class="results" id="results">
      <div class="loading">fetching catalog</div>
    </section>

    <div class="footer">sloppy.live · self-serve index</div>
  </main>

  <script>
    const $ = (s, el = document) => el.querySelector(s);
    const ALPHABET = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
    const NUMSYM = '#';

    const els = {
      results: $('#results'),
      search: $('#search'),
      total: $('#total'),
      shown: $('#shown'),
      sync: $('#sync'),
      azbar: $('#azbar')
    };

    let APPS = [];

    function firstChar(slug) {
      const c = (slug || '').trim().toUpperCase().charAt(0);
      return /[A-Z]/.test(c) ? c : NUMSYM;
    }

    function esc(s) {
      return String(s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function highlight(text, q) {
      if (!q) return esc(text);
      const safe = esc(text);
      const re = new RegExp('(' + q.replace(/[-/\\^$*+?.()|[\]{}]/g, '\\$&') + ')', 'ig');
      return safe.replace(re, '<mark>$1</mark>');
    }

    function relTime(unix) {
      if (!unix) return '—';
      const now = Math.floor(Date.now() / 1000);
      const diff = now - unix;
      if (diff < 60) return diff + 's ago';
      if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
      if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
      if (diff < 86400 * 30) return Math.floor(diff / 86400) + 'd ago';
      const d = new Date(unix * 1000);
      return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    }

    function fmtTitle(app) {
      return app.title && app.title.trim() ? app.title : app.slug;
    }

    function matches(app, q) {
      if (!q) return true;
      const hay = (app.slug + ' ' + (app.title || '') + ' ' + (app.desc || '') + ' ' + (app.keywords || '')).toLowerCase();
      return hay.includes(q);
    }

    function buildAzbar(byLetter) {
      const keys = [NUMSYM, ...ALPHABET];
      els.azbar.innerHTML = keys.map(L => {
        const n = (byLetter.get(L) || []).length;
        const cls = n > 0 ? 'has' : 'empty';
        return `<button type="button" data-letter="${L}" class="${cls}" ${n === 0 ? 'aria-disabled="true"' : ''} title="${L}: ${n}">${L}</button>`;
      }).join('');
    }

    function render() {
      const q = els.search.value.trim().toLowerCase();
      const filtered = APPS.filter(a => matches(a, q));

      const byLetter = new Map();
      for (const a of filtered) {
        const L = firstChar(a.slug);
        if (!byLetter.has(L)) byLetter.set(L, []);
        byLetter.get(L).push(a);
      }
      for (const arr of byLetter.values()) {
        arr.sort((a, b) => a.slug.localeCompare(b.slug));
      }

      buildAzbar(byLetter);
      els.shown.textContent = filtered.length.toLocaleString();

      if (filtered.length === 0) {
        els.results.innerHTML = `
          <div class="empty">
            <div class="big">no matches</div>
            <div class="small">nothing in the catalog matches "${esc(q)}". try a shorter term.</div>
          </div>`;
        return;
      }

      const order = [NUMSYM, ...ALPHABET].filter(L => byLetter.has(L));
      const html = order.map(L => {
        const arr = byLetter.get(L);
        const cards = arr.map(a => {
          const title = fmtTitle(a);
          const slugDiff = title.toLowerCase().replace(/\s+/g, '-') !== a.slug.toLowerCase();
          return `
            <a class="app" href="/${encodeURIComponent(a.slug)}/" target="_blank" rel="noopener">
              <span class="glyph" aria-hidden="true">${esc(L === NUMSYM ? '#' : L)}</span>
              <div class="meta">
                <div class="name">${highlight(title, q)}</div>
                ${slugDiff ? `<div class="slug">/${highlight(a.slug, q)}</div>` : ''}
                ${a.desc ? `<div class="desc">${highlight(a.desc, q)}</div>` : ''}
              </div>
            </a>`;
        }).join('');
        return `
          <section class="section" id="L-${L}" aria-labelledby="H-${L}">
            <div class="section-head">
              <span class="letter" id="H-${L}">${esc(L)}</span>
              <span class="count">${arr.length} app${arr.length === 1 ? '' : 's'}</span>
            </div>
            <div class="grid">${cards}</div>
          </section>`;
      }).join('');

      els.results.innerHTML = html;
    }

    function jumpTo(letter) {
      const target = document.getElementById('L-' + letter);
      if (!target) return;
      target.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    els.azbar.addEventListener('click', (e) => {
      const btn = e.target.closest('button.has');
      if (!btn) return;
      jumpTo(btn.dataset.letter);
    });

    let renderTimer;
    els.search.addEventListener('input', () => {
      clearTimeout(renderTimer);
      renderTimer = setTimeout(render, 80);
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === '/' && document.activeElement !== els.search) {
        e.preventDefault();
        els.search.focus();
        els.search.select();
      } else if (e.key === 'Escape' && document.activeElement === els.search) {
        els.search.value = '';
        render();
      }
    });

    async function load() {
      try {
        const res = await fetch('/_bar/apps-index.json', { cache: 'no-cache' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();
        APPS = Array.isArray(data) ? data : [];
        els.total.textContent = APPS.length.toLocaleString();
        const newest = APPS.reduce((m, a) => Math.max(m, a.mtime || 0), 0);
        els.sync.textContent = relTime(newest);
        render();
      } catch (err) {
        els.results.innerHTML = `
          <div class="errbox">
            <strong>could not load catalog.</strong><br>
            <span style="color:#999;font-size:.75rem">${esc(err.message || String(err))}</span><br>
            <span style="color:#999;font-size:.75rem">tried: <code>/_bar/apps-index.json</code></span>
          </div>`;
        els.total.textContent = '0';
        els.shown.textContent = '0';
        els.sync.textContent = '—';
      }
    }

    load();
  </script>
  <script src="/sloppy-header/sloppy-bar.js"></script>
</body>
</html>
