<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Deadline Dread</title>
<link rel="icon" href="https://emojicdn.elk.sh/💀">
<meta property="og:title" content="Deadline Dread">
<meta property="og:description" content="Productivity timer that punishes inactivity — watch your digital health drain away">
<meta property="og:url" content="https://sloppy.live/deadline-dread">
<meta property="og:image" content="https://sloppy.live/deadline-dread/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Anybody:wght@100;400;900&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root{--bg:#08060c;--fg:#d8d0e0;--dim:#4a4258;--red:#e82040;--red2:#ff4060;--green:#2aaa4a;--yellow:#e8a020;--panel:#0e0c14;--border:#1e1a28;--glow:0 0 30px rgba(232,32,64,0.2)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--fg);font-family:'DM Mono',monospace;font-weight:300;font-size:13px;min-height:100vh;display:flex;flex-direction:column;align-items:center;transition:background 0.5s}
body.danger{background:#12040a}
body.critical{background:#1a0408;animation:critPulse 1s ease infinite}
@keyframes critPulse{0%,100%{background:#1a0408}50%{background:#220610}}

/* Header */
h1{font-family:'Anybody',sans-serif;font-weight:900;font-size:clamp(24px,5vw,36px);color:var(--red);margin:24px 0 0;letter-spacing:-1px}
.sub{font-family:'Anybody',sans-serif;font-weight:100;font-size:12px;color:var(--dim);margin-bottom:24px}

/* Health bar */
.health-section{width:min(480px,90vw);margin-bottom:20px}
.health-label{display:flex;justify-content:space-between;margin-bottom:4px;font-size:10px}
.health-label .hl-title{color:var(--dim);text-transform:uppercase;letter-spacing:1px}
.health-label .hl-val{font-family:'Anybody',sans-serif;font-weight:900;font-size:14px;transition:color 0.3s}
.health-bar{height:16px;background:#1a1420;border:1px solid var(--border);position:relative;overflow:hidden}
.health-fill{height:100%;transition:width 0.5s,background 0.3s;position:relative}
.health-fill::after{content:'';position:absolute;top:0;left:0;width:100%;height:50%;background:rgba(255,255,255,0.08)}
.health-segments{position:absolute;top:0;left:0;width:100%;height:100%;display:flex}
.health-segments div{flex:1;border-right:1px solid rgba(0,0,0,0.3)}
.damage-flash{position:absolute;top:0;right:0;width:100%;height:100%;background:var(--red);opacity:0;transition:opacity 0.1s}

/* Timer display */
.timer-display{width:min(480px,90vw);background:var(--panel);border:1px solid var(--border);padding:24px;margin-bottom:16px;text-align:center;position:relative;overflow:hidden}
.timer-display::before{content:'';position:absolute;top:0;left:0;width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--border),transparent)}
.timer-time{font-family:'Anybody',sans-serif;font-weight:900;font-size:clamp(48px,12vw,80px);line-height:1;color:var(--fg);transition:color 0.3s;letter-spacing:-2px}
.timer-time.warn{color:var(--yellow)}
.timer-time.danger{color:var(--red)}
.timer-time.dead{color:#4a2030;text-decoration:line-through}
.timer-label{font-size:10px;color:var(--dim);margin-top:6px;text-transform:uppercase;letter-spacing:2px}

/* Status */
.status-bar{width:min(480px,90vw);display:flex;gap:12px;margin-bottom:16px;font-size:10px}
.status-item{flex:1;background:var(--panel);border:1px solid var(--border);padding:10px;text-align:center}
.status-item .si-val{font-family:'Anybody',sans-serif;font-weight:900;font-size:18px;margin-bottom:2px}
.status-item .si-label{color:var(--dim);text-transform:uppercase;letter-spacing:1px;font-size:8px}

/* Controls */
.controls{width:min(480px,90vw);display:flex;gap:8px;margin-bottom:16px}
.ctrl-btn{flex:1;padding:12px;border:1px solid var(--border);background:var(--panel);color:var(--fg);font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;transition:all 0.12s;text-transform:uppercase;letter-spacing:1px}
.ctrl-btn:hover{border-color:var(--red);color:var(--red)}
.ctrl-btn.primary{background:var(--red);border-color:var(--red);color:#fff}
.ctrl-btn.primary:hover{background:var(--red2)}
.ctrl-btn.active{background:#1a2a1a;border-color:var(--green);color:var(--green)}
.ctrl-btn:disabled{opacity:0.3;cursor:default}

/* Timer config */
.config{width:min(480px,90vw);background:var(--panel);border:1px solid var(--border);padding:14px;margin-bottom:16px}
.config-title{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px}
.config-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.config-row label{font-size:10px;color:var(--dim);min-width:80px}
.config-row input,.config-row select{flex:1;padding:6px 8px;background:var(--bg);border:1px solid var(--border);color:var(--fg);font-family:'DM Mono',monospace;font-size:11px}

/* Event log */
.log-section{width:min(480px,90vw);margin-bottom:20px}
.log-title{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:2px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.log{background:var(--panel);border:1px solid var(--border);max-height:150px;overflow-y:auto;font-size:10px}
.log-item{padding:6px 10px;border-bottom:1px solid var(--border);display:flex;gap:8px}
.log-item:last-child{border-bottom:none}
.log-time{color:var(--dim);font-size:9px;white-space:nowrap}
.log-msg{flex:1}
.log-msg.dmg{color:var(--red)}
.log-msg.heal{color:var(--green)}
.log-msg.warn{color:var(--yellow)}
.log-msg.info{color:var(--dim)}

/* Dread messages */
.dread-msg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Anybody',sans-serif;font-weight:900;font-size:clamp(20px,5vw,32px);color:var(--red);opacity:0;pointer-events:none;z-index:50;text-align:center;text-shadow:var(--glow);transition:opacity 0.3s}
.dread-msg.show{opacity:0.7}
</style>
</head>
<body>
<h1>DEADLINE DREAD</h1>
<div class="sub">your time is running out — stay active or suffer</div>

<div class="health-section">
  <div class="health-label">
    <span class="hl-title">Digital Health</span>
    <span class="hl-val" id="hp-text" style="color:var(--green)">100 / 100</span>
  </div>
  <div class="health-bar">
    <div class="health-fill" id="hp-fill" style="width:100%;background:var(--green)"></div>
    <div class="health-segments"><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div><div></div></div>
    <div class="damage-flash" id="dmg-flash"></div>
  </div>
</div>

<div class="timer-display">
  <div class="timer-time" id="timer">25:00</div>
  <div class="timer-label" id="timer-label">Focus Session</div>
</div>

<div class="status-bar">
  <div class="status-item"><div class="si-val" id="st-idle">0:00</div><div class="si-label">Idle Time</div></div>
  <div class="status-item"><div class="si-val" id="st-dmg">0</div><div class="si-label">Damage Taken</div></div>
  <div class="status-item"><div class="si-val" id="st-streak">0</div><div class="si-label">Active Streak</div></div>
  <div class="status-item"><div class="si-val" id="st-sessions">0</div><div class="si-label">Sessions</div></div>
</div>

<div class="controls">
  <button class="ctrl-btn primary" id="btn-start" onclick="startTimer()">Start</button>
  <button class="ctrl-btn" id="btn-active" onclick="markActive()" disabled>I'm Active</button>
  <button class="ctrl-btn" id="btn-reset" onclick="resetTimer()">Reset</button>
</div>

<div class="config" id="config-panel">
  <div class="config-title">Configuration</div>
  <div class="config-row">
    <label>Duration</label>
    <select id="cfg-duration">
      <option value="5">5 min (test)</option>
      <option value="15">15 min</option>
      <option value="25" selected>25 min (pomodoro)</option>
      <option value="45">45 min</option>
      <option value="60">60 min</option>
    </select>
  </div>
  <div class="config-row">
    <label>Idle Threshold</label>
    <select id="cfg-idle">
      <option value="30">30 sec</option>
      <option value="60" selected>60 sec</option>
      <option value="120">2 min</option>
    </select>
  </div>
  <div class="config-row">
    <label>Damage/min</label>
    <select id="cfg-dmg">
      <option value="3">Light (3)</option>
      <option value="5" selected>Medium (5)</option>
      <option value="10">Brutal (10)</option>
      <option value="20">Nightmare (20)</option>
    </select>
  </div>
</div>

<div class="log-section">
  <div class="log-title">
    <span>Event Log</span>
    <span id="log-count">0 events</span>
  </div>
  <div class="log" id="log"></div>
</div>

<div class="dread-msg" id="dread-msg"></div>

<script>
var hp=100,maxHp=100,running=false,paused=false;
var timerSec=25*60,timerTotal=25*60;
var lastActivity=0,idleSec=0,totalDmg=0,activeStreak=0,sessions=0;
var tickInterval=null,dmgInterval=null;
var logItems=[];
var dead=false;

var DREAD_MSGS=[
  "ARE YOU STILL THERE?",
  "THE DEADLINE APPROACHES",
  "TICK. TOCK.",
  "YOUR HEALTH DECAYS",
  "PRODUCTIVITY IS DYING",
  "MOVE. DO SOMETHING.",
  "THE VOID GROWS",
  "TIME DOESN'T WAIT",
  "WASTING AWAY...",
  "YOUR DEADLINE WEEPS",
  "FOCUS OR PERISH",
  "ENTROPY WINS AGAIN",
  "IDLE HANDS INVITE DOOM",
  "THE CLOCK JUDGES YOU",
  "STILL NOTHING? REALLY?"
];

var DEATH_MSGS=[
  "DIGITAL DEATH — SESSION FAILED",
  "HP DEPLETED — YOU DID THIS",
  "FLATLINE — THE DEADLINE WON",
  "TERMINATED BY INACTIVITY"
];

function addLog(msg,type){
  var now=new Date();
  var ts=String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0')+':'+String(now.getSeconds()).padStart(2,'0');
  logItems.unshift({time:ts,msg:msg,type:type||'info'});
  if(logItems.length>50)logItems.pop();
  renderLog();
}

function renderLog(){
  var el=document.getElementById('log');
  el.innerHTML=logItems.map(function(l){
    return '<div class="log-item"><span class="log-time">'+l.time+'</span><span class="log-msg '+l.type+'">'+l.msg+'</span></div>';
  }).join('');
  document.getElementById('log-count').textContent=logItems.length+' events';
}

function updateHP(){
  var pct=Math.max(0,hp/maxHp*100);
  var fill=document.getElementById('hp-fill');
  fill.style.width=pct+'%';
  var col=pct>60?'var(--green)':pct>30?'var(--yellow)':'var(--red)';
  fill.style.background=col;
  var txt=document.getElementById('hp-text');
  txt.textContent=Math.floor(hp)+' / '+maxHp;
  txt.style.color=col;

  document.body.classList.remove('danger','critical');
  if(pct<=30)document.body.classList.add('critical');
  else if(pct<=60)document.body.classList.add('danger');
}

function flashDamage(){
  var fl=document.getElementById('dmg-flash');
  fl.style.opacity='0.5';
  setTimeout(function(){fl.style.opacity='0';},200);
}

function showDread(msg){
  var el=document.getElementById('dread-msg');
  el.textContent=msg;
  el.classList.add('show');
  setTimeout(function(){el.classList.remove('show');},2500);
}

function formatTime(s){
  var m=Math.floor(s/60),sec=s%60;
  return String(m).padStart(2,'0')+':'+String(sec).padStart(2,'0');
}

function updateTimer(){
  var el=document.getElementById('timer');
  el.textContent=formatTime(timerSec);
  var pct=timerSec/timerTotal;
  el.className='timer-time'+(dead?' dead':pct<0.1?' danger':pct<0.3?' warn':'');
}

function updateStats(){
  document.getElementById('st-idle').textContent=formatTime(idleSec);
  document.getElementById('st-dmg').textContent=totalDmg;
  document.getElementById('st-streak').textContent=activeStreak;
  document.getElementById('st-sessions').textContent=sessions;
}

function tick(){
  if(!running||dead)return;
  timerSec--;
  if(timerSec<=0){
    timerSec=0;
    completeSession();
    return;
  }
  updateTimer();

  // Check idle
  var now=Date.now();
  var idleThreshold=parseInt(document.getElementById('cfg-idle').value)*1000;
  var timeSinceActive=now-lastActivity;

  if(timeSinceActive>idleThreshold){
    idleSec++;
    // Damage every 60 idle seconds (scaled by damage setting but applied per second)
    var dmgPerMin=parseInt(document.getElementById('cfg-dmg').value);
    var dmgPerSec=dmgPerMin/60;
    hp=Math.max(0,hp-dmgPerSec);
    totalDmg=Math.round((maxHp-hp)*10)/10;

    // Flash every 5 idle seconds
    if(idleSec%5===0)flashDamage();

    // Dread message every 15-30 idle seconds
    if(idleSec%20===0){
      showDread(DREAD_MSGS[Math.floor(Math.random()*DREAD_MSGS.length)]);
    }

    // Log damage milestones
    if(idleSec===parseInt(document.getElementById('cfg-idle').value)){
      addLog('Idle detected — health drain started','warn');
    }
    if(idleSec%60===0&&idleSec>0){
      addLog('Lost '+dmgPerMin+' HP from '+Math.floor(idleSec/60)+'min idle','dmg');
    }

    activeStreak=0;

    if(hp<=0){
      hp=0;
      die();
    }
  }

  updateHP();
  updateStats();
}

function die(){
  dead=true;
  running=false;
  clearInterval(tickInterval);
  var msg=DEATH_MSGS[Math.floor(Math.random()*DEATH_MSGS.length)];
  showDread(msg);
  addLog(msg,'dmg');
  document.getElementById('timer-label').textContent='SESSION FAILED';
  document.getElementById('btn-start').textContent='Revive';
  document.getElementById('btn-start').disabled=false;
  document.getElementById('btn-active').disabled=true;
  updateTimer();
  updateHP();
}

function completeSession(){
  running=false;
  clearInterval(tickInterval);
  sessions++;
  // Heal bonus for surviving
  var healAmt=Math.min(maxHp-hp,20);
  hp=Math.min(maxHp,hp+healAmt);
  addLog('Session complete! +'+Math.floor(healAmt)+' HP restored','heal');
  showDread('SESSION SURVIVED');
  document.getElementById('timer-label').textContent='Session Complete!';
  document.getElementById('btn-start').textContent='New Session';
  document.getElementById('btn-start').disabled=false;
  document.getElementById('btn-active').disabled=true;
  document.getElementById('config-panel').style.display='block';
  updateHP();
  updateStats();
}

function startTimer(){
  if(dead){
    // Revive with half HP
    hp=Math.floor(maxHp/2);
    dead=false;
    addLog('Revived with '+hp+' HP — don\'t waste it','heal');
  }
  var dur=parseInt(document.getElementById('cfg-duration').value);
  timerSec=dur*60;
  timerTotal=dur*60;
  running=true;
  idleSec=0;
  lastActivity=Date.now();
  document.getElementById('config-panel').style.display='none';
  document.getElementById('btn-start').disabled=true;
  document.getElementById('btn-active').disabled=false;
  document.getElementById('timer-label').textContent='Focus Session';
  addLog('Session started — '+dur+' min, stay active!','info');
  updateTimer();
  updateHP();
  updateStats();
  clearInterval(tickInterval);
  tickInterval=setInterval(tick,1000);
}

function markActive(){
  if(!running)return;
  lastActivity=Date.now();
  if(idleSec>0){
    addLog('Activity detected — idle streak broken at '+formatTime(idleSec),'heal');
    // Small heal for returning
    var heal=Math.min(maxHp-hp,2);
    hp=Math.min(maxHp,hp+heal);
    if(heal>0)addLog('+'+Math.round(heal)+' HP for returning','heal');
    idleSec=0;
    updateHP();
  }
  activeStreak++;
  updateStats();
  // Visual feedback
  var btn=document.getElementById('btn-active');
  btn.classList.add('active');
  setTimeout(function(){btn.classList.remove('active');},500);
}

function resetTimer(){
  running=false;dead=false;
  clearInterval(tickInterval);
  hp=maxHp;
  timerSec=parseInt(document.getElementById('cfg-duration').value)*60;
  timerTotal=timerSec;
  idleSec=0;totalDmg=0;activeStreak=0;
  document.getElementById('config-panel').style.display='block';
  document.getElementById('btn-start').textContent='Start';
  document.getElementById('btn-start').disabled=false;
  document.getElementById('btn-active').disabled=true;
  document.getElementById('timer-label').textContent='Focus Session';
  document.body.classList.remove('danger','critical');
  updateTimer();updateHP();updateStats();
  addLog('Timer reset — fresh start','info');
}

// Track real activity (mouse, keyboard, touch)
var activityEvents=['mousemove','mousedown','keydown','touchstart','scroll'];
activityEvents.forEach(function(evt){
  document.addEventListener(evt,function(){
    if(running&&!dead){
      lastActivity=Date.now();
      if(idleSec>parseInt(document.getElementById('cfg-idle').value)){
        markActive();
      }else{
        idleSec=0;
        activeStreak++;
      }
    }
  },{passive:true});
});

// Init
updateTimer();updateHP();updateStats();
addLog('Deadline Dread initialized — configure and start','info');
</script>
</body>
</html>
