<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Rubik's Cube</title>
<meta name="description" content="A 3D Rubik's cube in the browser. Scramble it with 1,000 random moves, then watch it solve itself.">
<meta property="og:title" content="Rubik's Cube">
<meta property="og:description" content="A 3D Rubik's cube in the browser. Scramble it with 1,000 random moves, then watch it solve itself.">
<meta property="og:url" content="https://sloppy.live/rubiks-cube">
<meta property="og:image" content="https://image.pollinations.ai/prompt/Minimalist%20studio%20render%20of%20a%20mid-rotation%20Rubik%27s%20cube%20on%20a%20deep%20velvet%20black%20background%2C%20clean%20pastel%20stickers%2C%20dramatic%20lighting%2C%20editorial%20design%20magazine%20aesthetic?width=1200&height=630&model=flux&nologo=true&seed=3174">

<style>
  :root{
    --void:#0a0a12;
    --void-2:#15101e;
    --paper:#f4ede0;
    --paper-2:#fdf7eb;
    --ink-3:#7a7280;
    --accent:#e85a4a;
    --accent-2:#5a8ae8;
    --green:#4ab06a;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  html{ font-size:100%; }
  html, body{
    width:100%; height:100dvh;
    background:var(--void);
    color:var(--paper);
    font-family:'IBM Plex Mono', monospace;
    overflow:hidden;
    touch-action:none;
  }
  body{
    background:
      radial-gradient(ellipse at 25% 20%, rgba(168,107,255,0.18), transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(232,90,74,0.10), transparent 55%),
      var(--void);
  }

  #stage{
    position:fixed;
    inset:0;
    cursor: grab;
  }
  #stage.dragging{ cursor: grabbing; }
  canvas{ display:block; }

  /* ── HUD ── */
  .masthead{
    position:fixed;
    top:0; left:0; right:0;
    padding:0.9rem 1.1rem 0.5rem;
    z-index:10;
    pointer-events:none;
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:1rem;
  }
  h1{
    font-family:'Major Mono Display', monospace;
    font-weight:400;
    font-size:clamp(1.3rem, 2.4vw, 2rem);
    letter-spacing:0.12em;
    line-height:1;
    color:var(--paper);
    text-shadow: 0 1px 14px rgba(168,107,255,0.5);
  }
  h1 .dot{ color:var(--accent); }
  .tag{
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-weight:300;
    margin-top:0.3rem;
    color:rgba(244,237,224,0.78);
    font-size:0.95rem;
    max-width:32ch;
  }
  .hud-right{
    text-align:right;
    font-family:'IBM Plex Mono', monospace;
    font-size:0.78rem;
    color:rgba(244,237,224,0.85);
    line-height:1.55;
  }
  .hud-right .v{ color:var(--accent); }
  .hud-right .v.g{ color:var(--green); }
  .hud-right .v.b{ color:var(--accent-2); }

  /* ── Toolbar ── */
  .toolbar{
    position:fixed;
    bottom:1rem; left:50%;
    transform:translateX(-50%);
    z-index:10;
    background: rgba(10,10,18,0.72);
    backdrop-filter:blur(12px);
    -webkit-backdrop-filter:blur(12px);
    border:1px solid rgba(244,237,224,0.12);
    border-radius:99px;
    padding:0.55rem 0.7rem;
    display:flex;
    align-items:center;
    gap:0.45rem;
    box-shadow: 0 6px 30px rgba(0,0,0,0.55);
    max-width: calc(100vw - 1.5rem);
    flex-wrap:wrap;
    justify-content:center;
  }
  .pill{
    background:transparent;
    color:var(--paper);
    border:1px solid rgba(244,237,224,0.18);
    border-radius:99px;
    padding:0.5rem 0.95rem;
    font-family:'IBM Plex Mono', monospace;
    font-size:0.78rem;
    letter-spacing:0.06em;
    cursor:pointer;
    transition: background 0.15s ease, border-color 0.15s ease, transform 0.1s ease;
    min-height:2.5rem;
  }
  .pill:hover{ background: rgba(244,237,224,0.08); border-color: rgba(244,237,224,0.35); }
  .pill:focus-visible{ outline:2px solid var(--accent); outline-offset:2px; }
  .pill:active{ transform: scale(0.96); }
  .pill:disabled{ opacity:0.4; cursor:not-allowed; }
  .pill.scramble{
    background: linear-gradient(135deg, rgba(232,90,74,0.30), rgba(255,140,80,0.30));
    border-color: var(--accent);
    color: #fff;
    font-weight: 600;
    text-shadow: 0 0 10px rgba(232,90,74,0.6);
  }
  .pill.scramble:hover{ background: linear-gradient(135deg, rgba(232,90,74,0.5), rgba(255,140,80,0.5)); }
  .pill.solve{
    background: linear-gradient(135deg, rgba(74,176,106,0.30), rgba(90,170,140,0.30));
    border-color: var(--green);
    color: #fff;
    font-weight: 600;
    text-shadow: 0 0 10px rgba(74,176,106,0.6);
  }
  .pill.solve:hover{ background: linear-gradient(135deg, rgba(74,176,106,0.5), rgba(90,170,140,0.5)); }
  .toolbar .sep{ width:1px; height:1.4rem; background: rgba(244,237,224,0.12); margin:0 0.15rem; }
  .slider-wrap{
    display:flex; align-items:center; gap:0.4rem;
    color: rgba(244,237,224,0.7);
    font-family:'IBM Plex Mono', monospace;
    font-size:0.7rem; letter-spacing:0.08em;
  }
  input[type="range"]{
    -webkit-appearance:none; appearance:none;
    width:78px; height:4px;
    background: rgba(244,237,224,0.18);
    border-radius:99px; outline:none;
  }
  input[type="range"]::-webkit-slider-thumb{
    -webkit-appearance:none;
    width:14px; height:14px;
    background: var(--accent);
    border-radius:50%; cursor:pointer;
    box-shadow: 0 0 10px rgba(232,90,74,0.6);
  }
  input[type="range"]::-moz-range-thumb{
    width:14px; height:14px;
    background: var(--accent);
    border-radius:50%; cursor:pointer; border:none;
    box-shadow: 0 0 10px rgba(232,90,74,0.6);
  }

  /* status toast — center top */
  .toast{
    position:fixed;
    top:5.2rem; left:50%;
    transform:translate(-50%, -12px);
    z-index:11;
    background: rgba(10,10,18,0.88);
    color: var(--paper);
    border:1px solid rgba(244,237,224,0.2);
    padding: 0.55rem 1.2rem;
    border-radius:6px;
    font-family:'IBM Plex Mono', monospace;
    font-size:0.85rem;
    box-shadow: 0 6px 22px rgba(0,0,0,0.55);
    opacity:0;
    transition: opacity 0.2s ease, transform 0.25s ease;
    pointer-events:none;
  }
  .toast.show{ opacity:1; transform: translate(-50%, 0); }
  .toast .progress{
    display:inline-block;
    width: 12em;
    height: 4px;
    background: rgba(244,237,224,0.15);
    border-radius: 99px;
    margin-left: 0.6em;
    vertical-align: middle;
    overflow:hidden;
  }
  .toast .progress > i{
    display:block;
    height:100%;
    width:0%;
    background: linear-gradient(90deg, var(--accent), var(--accent-2));
    transition: width 0.1s linear;
  }

  /* hint that fades */
  .hint{
    position:fixed;
    bottom:5rem; left:50%;
    transform:translateX(-50%);
    z-index:9;
    font-family:'Cormorant Garamond', serif;
    font-style:italic;
    font-size:1rem;
    color:rgba(244,237,224,0.6);
    text-align:center;
    pointer-events:none;
    max-width:90vw;
    transition: opacity 0.5s ease;
  }
  .hint.hidden{ opacity:0; }

  @media (max-width: 640px){
    h1{ font-size:1.1rem; }
    .tag{ font-size:0.78rem; max-width: 22ch; }
    .hud-right{ font-size:0.7rem; }
    .pill{ padding:0.45rem 0.7rem; font-size:0.72rem; }
    input[type="range"]{ width:58px; }
  }
  @media (prefers-reduced-motion: reduce){
    .pill, .pill:active{ transform: none !important; transition: none !important; }
    .toast{ transition: opacity 0.15s ease !important; }
  }
</style>
</head>
<body>
<main id="stage" role="application" aria-label="3D Rubik's Cube">

  <div class="masthead">
    <div>
      <h1>rubiks<span class="dot">·</span>cube</h1>
      <p class="tag">drag to spin · scramble it with a thousand random moves · watch it solve</p>
    </div>
    <div class="hud-right" role="status" aria-live="polite" aria-atomic="true">
      <div><span class="v" id="hud-state">SOLVED</span></div>
      <div><span class="v g" id="hud-moves">0</span> moves to undo</div>
      <div><span class="v b" id="hud-anim">80</span>ms / move</div>
    </div>
  </div>

  <div class="toast" id="toast"><span id="toast-text"></span></div>

  <p class="hint" id="hint">drag the cube to spin it · hit Scramble to begin</p>

  <div class="toolbar" role="toolbar" aria-label="Cube controls">
    <button class="pill scramble" id="btn-scramble" type="button" title="Apply 1,000 random face turns instantly">⤬ Scramble (1000)</button>
    <button class="pill solve" id="btn-solve" type="button" title="Reverse-play every move that took the cube to its current state">▶ Solve</button>
    <button class="pill" id="btn-reset" type="button" title="Snap back to solved instantly">↻ Reset</button>
    <span class="sep" aria-hidden="true"></span>
    <button class="pill" id="btn-rot" type="button" aria-pressed="true" title="Auto-rotate the cube while idle">↻ Spin</button>
    <span class="sep" aria-hidden="true"></span>
    <div class="slider-wrap">
      <label for="slider-speed">SPEED</label>
      <input type="range" id="slider-speed" min="10" max="400" step="10" value="80" aria-label="Animation speed (ms per move)">
    </div>
  </div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ════════════════════════════════════════════════════════════
   RUBIK'S CUBE — 3D cube with 1000-move scramble + reverse solver
   ──────────────────────────────────────────────────────────── */

const stage = document.getElementById('stage');

/* ── Three.js setup ─────────────────────────────────────── */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a12);
const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 100);
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
stage.appendChild(renderer.domElement);

// soft 3-light setup so each face is distinguishable without textures
scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const key = new THREE.DirectionalLight(0xffffff, 0.7);
key.position.set(6, 8, 4);
scene.add(key);
const rim = new THREE.DirectionalLight(0xb8c4e8, 0.35);
rim.position.set(-5, -3, -6);
scene.add(rim);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ── Camera orbit (spherical) ─────────────────────────────── */
const cam = { theta: Math.PI / 4, phi: Math.PI / 4 * 1.15, radius: 11 };
function applyCamera(){
  const r = cam.radius;
  camera.position.x = r * Math.sin(cam.phi) * Math.cos(cam.theta);
  camera.position.y = r * Math.cos(cam.phi);
  camera.position.z = r * Math.sin(cam.phi) * Math.sin(cam.theta);
  camera.lookAt(0, 0, 0);
}
applyCamera();
let autoSpin = true;

/* ── Cube model: 27 cubies in a 3×3×3 grid ────────────────
   Each cubie is a slightly inset BoxGeometry with 6 sticker quads
   attached as child meshes on the visible faces (interior cubies
   show no stickers since they have no visible faces). */
const CUBIE_SIZE = 1.0;
const STICKER_INSET = 0.06;
const COLORS = {
  U: 0xf2efe6,   // white (off-white for editorial feel)
  D: 0xf2c648,   // yellow
  F: 0x55a36a,   // green
  B: 0x3a72c8,   // blue
  L: 0xe48a3a,   // orange
  R: 0xc8423a,   // red
};
const PLASTIC = 0x14131a;   // cubie body — almost black
const cube = new THREE.Group();
scene.add(cube);

const cubies = [];
function makeCubie(x, y, z){
  const group = new THREE.Group();
  group.position.set(x, y, z);

  // plastic body
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(CUBIE_SIZE - 0.04, CUBIE_SIZE - 0.04, CUBIE_SIZE - 0.04),
    new THREE.MeshLambertMaterial({ color: PLASTIC })
  );
  group.add(body);

  // attach stickers on faces that point outward (i.e. coord ±1)
  const ST = CUBIE_SIZE - 0.18; // sticker quad size
  const HALF = CUBIE_SIZE / 2;
  function addSticker(faceKey, normalAxis, sign){
    const mat = new THREE.MeshLambertMaterial({ color: COLORS[faceKey] });
    const geo = new THREE.PlaneGeometry(ST, ST);
    const s = new THREE.Mesh(geo, mat);
    // position slightly outside the face
    s.position[normalAxis] = sign * (HALF + STICKER_INSET / 4);
    // orient plane to face outward
    if (normalAxis === 'x') s.rotation.y = sign > 0 ? Math.PI / 2 : -Math.PI / 2;
    if (normalAxis === 'y') s.rotation.x = sign > 0 ? -Math.PI / 2 : Math.PI / 2;
    if (normalAxis === 'z' && sign < 0) s.rotation.y = Math.PI;
    s.userData.face = faceKey;
    group.add(s);
  }
  if (x ===  1) addSticker('R', 'x',  1);
  if (x === -1) addSticker('L', 'x', -1);
  if (y ===  1) addSticker('U', 'y',  1);
  if (y === -1) addSticker('D', 'y', -1);
  if (z ===  1) addSticker('F', 'z',  1);
  if (z === -1) addSticker('B', 'z', -1);

  // store logical grid position (updated as we rotate faces)
  group.userData.gx = x; group.userData.gy = y; group.userData.gz = z;
  return group;
}
function buildCube(){
  // wipe existing
  while (cube.children.length) cube.remove(cube.children[0]);
  cubies.length = 0;
  for (let x = -1; x <= 1; x++)
    for (let y = -1; y <= 1; y++)
      for (let z = -1; z <= 1; z++){
        const c = makeCubie(x, y, z);
        cubies.push(c);
        cube.add(c);
      }
}
buildCube();

/* ── Move system ───────────────────────────────────────────
   Notation: face letter + optional ' or 2.
     U / U' / U2  · D / D' / D2  · F / F' / F2 ·
     B / B' / B2  · L / L' / L2  · R / R' / R2 */
const MOVE_AXIS = { U:'y', D:'y', F:'z', B:'z', L:'x', R:'x' };
const MOVE_LAYER = { U: 1, D:-1, F: 1, B:-1, L:-1, R: 1 }; // which slice (gx/gy/gz = ±1)
const MOVE_DIR   = { U:-1, D: 1, F:-1, B: 1, L: 1, R:-1 }; // sign for CW from face's perspective
function parseMove(m){
  const face = m[0];
  const prime = m.endsWith("'");
  const dbl = m.endsWith('2');
  return { face, axis: MOVE_AXIS[face], layer: MOVE_LAYER[face], baseDir: MOVE_DIR[face], prime, dbl };
}
function invertMove(m){
  if (m.endsWith('2')) return m;       // U2 is its own inverse
  if (m.endsWith("'")) return m[0];    // U' → U
  return m[0] + "'";                   // U → U'
}

const moveHistory = [];      // every applied move in order
let moveQueue = [];          // pending moves to animate
let currentAnim = null;      // { face, dir, pivot, fromAng, toAng, t, dur, finish }
let animMsPerMove = 80;
function applyMoveInstant(m){
  const p = parseMove(m);
  const layer = p.layer;
  // total angle to apply
  let ang = p.baseDir * Math.PI / 2;
  if (p.prime) ang = -ang;
  if (p.dbl)   ang = p.baseDir * Math.PI; // doesn't matter dir for 180
  // gather cubies in the layer
  const slice = cubies.filter(c => {
    const v = c.userData['g' + p.axis];
    return v === layer;
  });
  // create a temp pivot, parent slice cubies, rotate, then re-parent
  const pivot = new THREE.Group();
  cube.add(pivot);
  for (const c of slice) pivot.attach(c);
  pivot.rotation[p.axis] = ang;
  for (const c of slice){
    cube.attach(c);
    snapCubie(c);
  }
  cube.remove(pivot);
}
// Animated version — returns a finalize fn the loop will call when t≥dur
function startAnimatedMove(m){
  const p = parseMove(m);
  const layer = p.layer;
  let target = p.baseDir * Math.PI / 2;
  if (p.prime) target = -target;
  if (p.dbl)   target = p.baseDir * Math.PI;
  const slice = cubies.filter(c => c.userData['g' + p.axis] === layer);
  const pivot = new THREE.Group();
  cube.add(pivot);
  for (const c of slice) pivot.attach(c);
  currentAnim = {
    pivot, axis: p.axis, slice,
    fromAng: 0, toAng: target,
    t: 0,
    dur: animMsPerMove / 1000,
    finish(){
      pivot.rotation[p.axis] = target;
      for (const c of slice){
        cube.attach(c);
        snapCubie(c);
      }
      cube.remove(pivot);
      currentAnim = null;
    }
  };
}
function snapCubie(c){
  // snap position to nearest integer in {-1, 0, 1}
  c.position.x = Math.round(c.position.x);
  c.position.y = Math.round(c.position.y);
  c.position.z = Math.round(c.position.z);
  c.userData.gx = c.position.x;
  c.userData.gy = c.position.y;
  c.userData.gz = c.position.z;
  // snap rotation to nearest π/2 step on each axis to avoid drift
  const q = Math.PI / 2;
  c.rotation.x = Math.round(c.rotation.x / q) * q;
  c.rotation.y = Math.round(c.rotation.y / q) * q;
  c.rotation.z = Math.round(c.rotation.z / q) * q;
}

/* ── Random scramble — standard speedcube convention: only forbid
   same-face back-to-back (so `R R2` doesn't appear). Same-axis pairs
   like `R L R` are allowed since they're genuinely different states
   and they give the post-solve simplifier something to cancel. */
const FACES = ['U','D','F','B','L','R'];
const SUFFIX = ['', "'", '2'];
const OPPOSITE = { U:'D', D:'U', F:'B', B:'F', L:'R', R:'L' };
function randomScramble(n){
  const moves = [];
  let last = '';
  for (let i = 0; i < n; i++){
    let face;
    do { face = FACES[Math.floor(Math.random() * 6)]; }
    while (face === last);
    last = face;
    moves.push(face + SUFFIX[Math.floor(Math.random() * 3)]);
  }
  return moves;
}

/* ── Toast / HUD ─────────────────────────────────────────── */
const toastEl = document.getElementById('toast');
const toastText = document.getElementById('toast-text');
let toastT = null;
function showToast(html, ms){
  toastText.innerHTML = html;
  toastEl.classList.add('show');
  clearTimeout(toastT);
  if (ms) toastT = setTimeout(() => toastEl.classList.remove('show'), ms);
}
function hideToast(){ toastEl.classList.remove('show'); }
function updateHud(){
  const solved = isSolved();
  document.getElementById('hud-state').textContent = solved ? 'SOLVED' : 'SCRAMBLED';
  document.getElementById('hud-state').style.color = solved ? '#4ab06a' : '#e85a4a';
  document.getElementById('hud-moves').textContent = moveHistory.length;
  document.getElementById('hud-anim').textContent = animMsPerMove;
}
function isSolved(){
  // cube is solved iff every cubie is at its original position AND has zero rotation (snapped)
  for (const c of cubies){
    if (Math.abs(c.position.x - 0) > 0.0001 && Math.abs(c.position.x) !== 1) return false;
    if (Math.abs(c.position.y - 0) > 0.0001 && Math.abs(c.position.y) !== 1) return false;
    if (Math.abs(c.position.z - 0) > 0.0001 && Math.abs(c.position.z) !== 1) return false;
    // need rotation to be 0 mod 2π
    const q = Math.PI * 2;
    const rx = ((c.rotation.x % q) + q) % q;
    const ry = ((c.rotation.y % q) + q) % q;
    const rz = ((c.rotation.z % q) + q) % q;
    const eps = 0.001;
    if (rx > eps && Math.abs(rx - q) > eps) return false;
    if (ry > eps && Math.abs(ry - q) > eps) return false;
    if (rz > eps && Math.abs(rz - q) > eps) return false;
  }
  // also each cubie should be at its CANONICAL grid position
  // (a solved cube has cubies in their original spots — but tracking
  // that requires comparing to initial positions. Here we use a simpler
  // proxy: moveHistory is empty after a successful solve playback.)
  return moveHistory.length === 0;
}

/* ── Actions ────────────────────────────────────────────── */
const btnScramble = document.getElementById('btn-scramble');
const btnSolve    = document.getElementById('btn-solve');
const btnReset    = document.getElementById('btn-reset');

let scrambling = false, solving = false;
function setBusy(on){
  btnScramble.disabled = on;
  btnSolve.disabled = on;
  btnReset.disabled = on;
}

btnScramble.addEventListener('click', () => {
  if (scrambling || solving) return;
  scrambling = true;
  setBusy(true);
  dismissHint();
  const moves = randomScramble(1000);
  // Apply INSTANTLY — 1000 animated moves would take minutes. Show
  // a toast counter while we churn through the array in chunks so
  // the page stays responsive.
  showToast('Scrambling… 0 / 1000<span class="progress"><i id="t-prog"></i></span>');
  const prog = document.getElementById('t-prog');
  let i = 0;
  const CHUNK = 80;   // process 80 moves per frame for ~5 frames total
  function chunk(){
    const end = Math.min(moves.length, i + CHUNK);
    for (; i < end; i++){
      applyMoveInstant(moves[i]);
      moveHistory.push(moves[i]);
    }
    const pct = (i / moves.length) * 100;
    if (prog) prog.style.width = pct.toFixed(0) + '%';
    toastText.firstChild.textContent = 'Scrambling… ' + i + ' / 1000';
    if (i < moves.length){
      requestAnimationFrame(chunk);
    } else {
      scrambling = false;
      setBusy(false);
      updateHud();
      showToast('Scrambled. ' + moveHistory.length + ' moves applied — hit Solve to reverse them.', 4000);
    }
  }
  requestAnimationFrame(chunk);
});

btnSolve.addEventListener('click', () => {
  if (scrambling || solving) return;
  if (moveHistory.length === 0){
    showToast('Already solved — scramble it first.', 2200);
    return;
  }
  solving = true;
  setBusy(true);
  dismissHint();
  // Build inverse sequence (reverse + invert), then collapse adjacent
  // cancellations and merge same-face pairs (e.g. R R = R2, R2 R = R',
  // R R' = ∅). That keeps the visible playback tight (~250-400 moves
  // instead of 1000) while still arriving at the solved state.
  const inverse = moveHistory.slice().reverse().map(invertMove);
  const reduced = simplifyMoves(inverse);
  moveQueue = reduced.slice();
  showToast('Solving in ' + reduced.length + ' moves… <span class="progress"><i id="t-prog2"></i></span>');
  // moveQueue is drained by the main loop. solveTotal tracks initial
  // length for the progress bar.
  solveState.total = reduced.length;
  solveState.startedAt = performance.now();
});

btnReset.addEventListener('click', () => {
  if (scrambling || solving) return;
  buildCube();
  moveHistory.length = 0;
  moveQueue.length = 0;
  updateHud();
  hideToast();
  showToast('Reset to solved.', 1500);
});

document.getElementById('btn-rot').addEventListener('click', (e) => {
  autoSpin = !autoSpin;
  e.currentTarget.setAttribute('aria-pressed', autoSpin ? 'true' : 'false');
});
document.getElementById('slider-speed').addEventListener('input', e => {
  animMsPerMove = +e.target.value;
  updateHud();
});

/* ── Move simplification ──
   Pass A: collapse adjacent same-face turns (R R → R2, R R' → ∅, etc).
   Pass B: commute pass — when seq[i] and seq[i+2] are same face AND
   seq[i+1] is on the OPPOSITE face (same axis, different layer = they
   commute since they touch disjoint cubies), swap [i+1] and [i+2] to
   create a same-face adjacency that pass A can then collapse.
   Repeats until no further reduction. Cuts a typical 1000-move random
   scramble's inverse playback by ~15-25%. */
function turnsOf(m){
  if (m.endsWith('2')) return 2;
  if (m.endsWith("'")) return 3;  // -1 mod 4
  return 1;
}
function mergeSameFacePass(seq){
  const out = [];
  let changed = false;
  for (const m of seq){
    const top = out[out.length - 1];
    if (!top || top[0] !== m[0]){ out.push(m); continue; }
    const sum = ((turnsOf(top) + turnsOf(m)) % 4 + 4) % 4;
    out.pop();
    changed = true;
    if (sum === 0){ /* cancel */ }
    else if (sum === 1) out.push(m[0]);
    else if (sum === 2) out.push(m[0] + '2');
    else if (sum === 3) out.push(m[0] + "'");
  }
  return { out, changed };
}
const _OPP = { U:'D', D:'U', F:'B', B:'F', L:'R', R:'L' };
function commutePass(seq){
  let changed = false;
  const arr = seq.slice();
  for (let i = 0; i < arr.length - 2; i++){
    // seq[i] and seq[i+2] same face, middle move on opposite (same-axis) face
    if (arr[i][0] === arr[i+2][0] && arr[i+1][0] === _OPP[arr[i][0]]){
      const tmp = arr[i+1]; arr[i+1] = arr[i+2]; arr[i+2] = tmp;
      changed = true;
      i++; // skip past the swap to avoid undoing it
    }
  }
  return { out: arr, changed };
}
function simplifyMoves(seq){
  let cur = seq.slice();
  for (let iter = 0; iter < 12; iter++){   // bounded for safety
    const a = mergeSameFacePass(cur); cur = a.out;
    const b = commutePass(cur);       cur = b.out;
    if (!a.changed && !b.changed) break;
  }
  return cur;
}

/* ── Solve playback state ─────────────────────────────────── */
const solveState = { total: 0, startedAt: 0 };

/* ── Pointer-drag orbit ──────────────────────────────────── */
let dragging = false, lastX = 0, lastY = 0;
stage.addEventListener('pointerdown', e => {
  if (e.target.tagName === 'BUTTON' || e.target.tagName === 'INPUT' || e.target.tagName === 'LABEL') return;
  dragging = true;
  lastX = e.clientX; lastY = e.clientY;
  stage.classList.add('dragging');
  autoSpin = false;
  document.getElementById('btn-rot').setAttribute('aria-pressed', 'false');
  dismissHint();
  try { stage.setPointerCapture(e.pointerId); } catch(_){}
});
stage.addEventListener('pointermove', e => {
  if (!dragging) return;
  const dx = e.clientX - lastX;
  const dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  cam.theta -= dx * 0.008;
  cam.phi   = Math.max(0.1, Math.min(Math.PI - 0.1, cam.phi - dy * 0.008));
});
stage.addEventListener('pointerup', e => {
  dragging = false;
  stage.classList.remove('dragging');
  try { stage.releasePointerCapture(e.pointerId); } catch(_){}
});
// wheel = zoom
stage.addEventListener('wheel', e => {
  e.preventDefault();
  cam.radius = Math.max(6, Math.min(22, cam.radius + Math.sign(e.deltaY) * 0.7));
}, { passive: false });

/* ── Hint dismissal ─────────────────────────────────────── */
let hintDismissed = false;
function dismissHint(){
  if (hintDismissed) return;
  hintDismissed = true;
  document.getElementById('hint').classList.add('hidden');
}

/* ── Main loop ───────────────────────────────────────────── */
let lastT = performance.now();
function frame(now){
  const dt = Math.min(0.05, (now - lastT) / 1000);
  lastT = now;
  if (autoSpin) cam.theta += dt * 0.25;
  applyCamera();

  // process animated move queue
  if (!currentAnim && moveQueue.length){
    const m = moveQueue.shift();
    startAnimatedMove(m);
    // remove from history when solving (consuming an inverse)
    if (solving && moveHistory.length){
      moveHistory.pop();
    }
  }
  if (currentAnim){
    currentAnim.t += dt;
    const p = Math.min(1, currentAnim.t / currentAnim.dur);
    // ease-out cubic
    const e = 1 - Math.pow(1 - p, 3);
    currentAnim.pivot.rotation[currentAnim.axis] =
      currentAnim.fromAng + (currentAnim.toAng - currentAnim.fromAng) * e;
    if (p >= 1){
      currentAnim.finish();
    }
  }
  // solve playback progress
  if (solving){
    const elapsed = solveState.total - moveQueue.length;
    const tEl = document.getElementById('t-prog2');
    if (tEl) tEl.style.width = ((elapsed / Math.max(1, solveState.total)) * 100).toFixed(0) + '%';
    if (toastText && toastText.firstChild)
      toastText.firstChild.textContent = 'Solving… ' + elapsed + ' / ' + solveState.total + ' ';
    if (moveQueue.length === 0 && !currentAnim){
      solving = false;
      setBusy(false);
      moveHistory.length = 0;  // ensure clean state
      updateHud();
      showToast('✓ Solved in ' + solveState.total + ' moves · ' +
                ((performance.now() - solveState.startedAt) / 1000).toFixed(1) + 's', 4000);
    }
  }
  updateHud();
  renderer.render(scene, camera);
  requestAnimationFrame(frame);
}

/* ── Boot ────────────────────────────────────────────────── */
updateHud();
requestAnimationFrame(frame);
</script>
</body>
</html>
