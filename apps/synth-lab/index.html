<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no">
<title>Synth Lab</title>
<link rel="icon" href="https://emojicdn.elk.sh/🎛️">
<meta property="og:title" content="Synth Lab">
<meta property="og:description" content="Twist colorful sliders and play a glowing synthesizer with real-time waveforms.">
<meta property="og:url" content="https://sloppy.live/synth-lab">
<meta property="og:image" content="https://emojicdn.elk.sh/🎛️?style=apple&size=512">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Oxanium:wght@300;500;700&family=IBM+Plex+Mono:wght@200;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow-x:hidden;background:#08080f;user-select:none;touch-action:manipulation}
body{display:flex;flex-direction:column;align-items:center;padding:12px 10px 50px;min-height:100%}

h1{font-family:'Oxanium',cursive;font-size:clamp(20px,4vw,32px);font-weight:700;color:#0ff;text-shadow:0 0 15px #0ff;letter-spacing:3px;margin-bottom:2px}
.sub{font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:200;color:rgba(255,255,255,0.15);letter-spacing:3px;margin-bottom:12px}

#viz{
  width:min(580px,95vw);height:110px;border:1px solid rgba(0,255,255,0.08);
  border-radius:6px;background:rgba(0,0,0,0.3);margin-bottom:12px;overflow:hidden;
}
#viz canvas{width:100%;height:100%;display:block}

#controls{
  display:grid;grid-template-columns:repeat(auto-fit,minmax(90px,1fr));
  gap:8px;width:min(580px,95vw);margin-bottom:12px;
}
.ctrl{
  background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.04);
  border-radius:6px;padding:8px 6px;display:flex;flex-direction:column;align-items:center;gap:4px;
}
.ctrl label{font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:200;color:rgba(255,255,255,0.25);letter-spacing:1.5px;text-transform:uppercase}
.ctrl .val{font-family:'Oxanium',cursive;font-size:12px;font-weight:500;color:rgba(255,255,255,0.45);min-height:15px}
input[type=range]{
  -webkit-appearance:none;appearance:none;width:100%;height:6px;
  border-radius:3px;outline:none;cursor:pointer;background:transparent;
}
input[type=range]::-webkit-slider-runnable-track{height:6px;border-radius:3px}
input[type=range]::-moz-range-track{height:6px;border-radius:3px}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;width:16px;height:16px;border-radius:50%;
  border:2px solid currentColor;background:rgba(0,0,0,0.7);
  box-shadow:0 0 8px currentColor;cursor:pointer;margin-top:-5px;
}
input[type=range]::-moz-range-thumb{
  width:16px;height:16px;border-radius:50%;
  border:2px solid currentColor;background:rgba(0,0,0,0.7);
  box-shadow:0 0 8px currentColor;cursor:pointer;
}
.c-vol input{color:#0f0}.c-vol input::-webkit-slider-runnable-track{background:linear-gradient(90deg,#002200,#0f0)}.c-vol input::-moz-range-track{background:linear-gradient(90deg,#002200,#0f0)}
.c-detune input{color:#f0f}.c-detune input::-webkit-slider-runnable-track{background:linear-gradient(90deg,#220022,#f0f)}.c-detune input::-moz-range-track{background:linear-gradient(90deg,#220022,#f0f)}
.c-attack input{color:#ff0}.c-attack input::-webkit-slider-runnable-track{background:linear-gradient(90deg,#222200,#ff0)}.c-attack input::-moz-range-track{background:linear-gradient(90deg,#222200,#ff0)}
.c-release input{color:#f80}.c-release input::-webkit-slider-runnable-track{background:linear-gradient(90deg,#221100,#f80)}.c-release input::-moz-range-track{background:linear-gradient(90deg,#221100,#f80)}
.c-filter input{color:#08f}.c-filter input::-webkit-slider-runnable-track{background:linear-gradient(90deg,#001122,#08f)}.c-filter input::-moz-range-track{background:linear-gradient(90deg,#001122,#08f)}
.c-reverb input{color:#f44}.c-reverb input::-webkit-slider-runnable-track{background:linear-gradient(90deg,#220000,#f44)}.c-reverb input::-moz-range-track{background:linear-gradient(90deg,#220000,#f44)}
.c-lfo input{color:#0ff}.c-lfo input::-webkit-slider-runnable-track{background:linear-gradient(90deg,#002222,#0ff)}.c-lfo input::-moz-range-track{background:linear-gradient(90deg,#002222,#0ff)}

#wave-select{display:flex;gap:4px;margin-bottom:10px}
.ws-btn{
  font-family:'IBM Plex Mono',monospace;font-size:10px;font-weight:400;
  padding:5px 12px;border:1px solid rgba(0,255,255,0.1);
  background:rgba(0,255,255,0.03);color:rgba(0,255,255,0.35);
  border-radius:4px;cursor:pointer;transition:all .12s;
}
.ws-btn:hover{background:rgba(0,255,255,0.08);color:rgba(0,255,255,0.6)}
.ws-btn.active{border-color:rgba(0,255,255,0.3);color:#0ff;background:rgba(0,255,255,0.1);box-shadow:0 0 8px rgba(0,255,255,0.15)}

#keyboard{
  display:flex;position:relative;width:min(580px,95vw);height:clamp(70px,13vh,110px);
  overflow:hidden;
}
.key{
  position:relative;flex:1;
  border:1px solid rgba(255,255,255,0.06);border-radius:0 0 4px 4px;
  cursor:pointer;transition:background .08s;
  display:flex;align-items:flex-end;justify-content:center;padding-bottom:5px;
}
.key span{font-family:'IBM Plex Mono',monospace;font-size:8px;color:rgba(255,255,255,0.12);pointer-events:none}
.key.white{background:linear-gradient(180deg,rgba(30,30,40,0.9),rgba(20,20,30,0.95));z-index:1}
.key.white.pressed{background:linear-gradient(180deg,rgba(0,80,80,0.5),rgba(0,40,40,0.6))}
.key.black{
  position:absolute;width:6.5%;height:55%;top:0;
  background:linear-gradient(180deg,#0a0a14,#060610);
  border:1px solid rgba(255,255,255,0.03);z-index:2;border-radius:0 0 3px 3px;
}
.key.black.pressed{background:linear-gradient(180deg,rgba(0,60,60,0.6),rgba(0,30,30,0.7))}
.key.pressed::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:3px;
  background:#0ff;box-shadow:0 0 8px #0ff;border-radius:0 0 3px 3px;
}
#hint{font-family:'IBM Plex Mono',monospace;font-size:10px;color:rgba(255,255,255,0.08);margin-top:6px;text-align:center;transition:opacity 2s}
a#back{position:fixed;bottom:8px;left:8px;font-size:9px;opacity:0.12;color:#888;text-decoration:none;z-index:10}
</style>
</head>
<body>

<h1>SYNTH LAB</h1>
<span class="sub">WAVEFORM SYNTHESIZER</span>

<div id="viz"><canvas id="viz-canvas"></canvas></div>

<div id="wave-select">
  <button class="ws-btn active" data-wave="sine">SINE</button>
  <button class="ws-btn" data-wave="square">SQUARE</button>
  <button class="ws-btn" data-wave="sawtooth">SAW</button>
  <button class="ws-btn" data-wave="triangle">TRI</button>
</div>

<div id="controls">
  <div class="ctrl c-vol"><label>Volume</label><input type="range" id="sl-vol" min="0" max="100" value="40"><div class="val" id="v-vol">40%</div></div>
  <div class="ctrl c-detune"><label>Detune</label><input type="range" id="sl-detune" min="-100" max="100" value="0"><div class="val" id="v-detune">0ct</div></div>
  <div class="ctrl c-attack"><label>Attack</label><input type="range" id="sl-attack" min="1" max="500" value="20"><div class="val" id="v-attack">20ms</div></div>
  <div class="ctrl c-release"><label>Release</label><input type="range" id="sl-release" min="10" max="2000" value="300"><div class="val" id="v-release">300ms</div></div>
  <div class="ctrl c-filter"><label>Filter</label><input type="range" id="sl-filter" min="100" max="12000" value="12000"><div class="val" id="v-filter">12kHz</div></div>
  <div class="ctrl c-reverb"><label>Delay</label><input type="range" id="sl-reverb" min="0" max="80" value="0"><div class="val" id="v-reverb">0%</div></div>
  <div class="ctrl c-lfo"><label>Vibrato</label><input type="range" id="sl-lfo" min="0" max="50" value="0"><div class="val" id="v-lfo">0</div></div>
</div>

<div id="keyboard"></div>
<div id="hint">Keys: A-L row white, W-U row black &bull; Tap visualizer to toggle mode</div>

<a id="back" href="https://sloppy.live">sloppy.live</a>

<script>
(function(){
'use strict';

var audioCtx=null;
var analyser=null;
var masterGain=null;
var filterNode=null;
var delayNode=null;
var delayGain=null;
var lfoNode=null;
var lfoGainNode=null;

var waveType='sine';
var volume=0.4;
var detune=0;
var attack=0.02;
var release=0.3;
var filterFreq=12000;
var delayAmount=0;
var lfoAmount=0;

var activeNotes={};

function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  analyser=audioCtx.createAnalyser();
  analyser.fftSize=2048;
  masterGain=audioCtx.createGain();
  masterGain.gain.value=volume;
  filterNode=audioCtx.createBiquadFilter();
  filterNode.type='lowpass';
  filterNode.frequency.value=filterFreq;
  filterNode.Q.value=1.5;

  // Delay effect
  delayNode=audioCtx.createDelay(1.0);
  delayNode.delayTime.value=0.3;
  delayGain=audioCtx.createGain();
  delayGain.gain.value=0;

  // LFO for vibrato
  lfoNode=audioCtx.createOscillator();
  lfoGainNode=audioCtx.createGain();
  lfoNode.type='sine';
  lfoNode.frequency.value=5;
  lfoGainNode.gain.value=0;
  lfoNode.connect(lfoGainNode);
  lfoNode.start();

  // Routing: masterGain -> filter -> analyser -> dest
  //                               -> delay -> delayGain -> filter (feedback)
  masterGain.connect(filterNode);
  filterNode.connect(analyser);
  analyser.connect(audioCtx.destination);

  filterNode.connect(delayNode);
  delayNode.connect(delayGain);
  delayGain.connect(filterNode);
}

var NOTE_FREQS=[
  {note:'C4',freq:261.63,key:'a',black:false},
  {note:'C#4',freq:277.18,key:'w',black:true,pos:0},
  {note:'D4',freq:293.66,key:'s',black:false},
  {note:'D#4',freq:311.13,key:'e',black:true,pos:1},
  {note:'E4',freq:329.63,key:'d',black:false},
  {note:'F4',freq:349.23,key:'f',black:false},
  {note:'F#4',freq:369.99,key:'r',black:true,pos:3},
  {note:'G4',freq:392.00,key:'g',black:false},
  {note:'G#4',freq:415.30,key:'t',black:true,pos:4},
  {note:'A4',freq:440.00,key:'h',black:false},
  {note:'A#4',freq:466.16,key:'y',black:true,pos:5},
  {note:'B4',freq:493.88,key:'j',black:false},
  {note:'C5',freq:523.25,key:'k',black:false},
  {note:'C#5',freq:554.37,key:'u',black:true,pos:7},
  {note:'D5',freq:587.33,key:'l',black:false},
];

// Build keyboard
var keyboard=document.getElementById('keyboard');
var whiteCount=0;
NOTE_FREQS.forEach(function(n){if(!n.black)whiteCount++});

NOTE_FREQS.forEach(function(n,i){
  var el=document.createElement('div');
  el.className='key '+(n.black?'black':'white');
  if(!n.black){
    el.innerHTML='<span>'+n.note+'</span>';
    el.style.width=(100/whiteCount)+'%';
  }else{
    var ww=100/whiteCount;
    el.style.left=(n.pos*ww+ww*0.65)+'%';
    el.style.width=(ww*0.65)+'%';
  }
  el.setAttribute('data-idx',i);
  keyboard.appendChild(el);

  el.addEventListener('pointerdown',function(e){e.preventDefault();noteOn(i)});
  el.addEventListener('pointerup',function(){noteOff(i)});
  el.addEventListener('pointerleave',function(){noteOff(i)});
  el.addEventListener('pointercancel',function(){noteOff(i)});
});

function noteOn(idx){
  initAudio();
  if(activeNotes[idx])return;

  var n=NOTE_FREQS[idx];
  var osc=audioCtx.createOscillator();
  var gain=audioCtx.createGain();

  osc.type=waveType;
  osc.frequency.value=n.freq;
  osc.detune.value=detune;

  // Connect LFO to this oscillator's frequency
  lfoGainNode.connect(osc.frequency);

  gain.gain.setValueAtTime(0,audioCtx.currentTime);
  gain.gain.linearRampToValueAtTime(1,audioCtx.currentTime+attack);

  osc.connect(gain);
  gain.connect(masterGain);
  osc.start();

  activeNotes[idx]={osc:osc,gain:gain};

  var el=keyboard.querySelector('[data-idx="'+idx+'"]');
  if(el)el.classList.add('pressed');
}

function noteOff(idx){
  if(!activeNotes[idx])return;
  var note=activeNotes[idx];
  var t=audioCtx.currentTime;
  note.gain.gain.cancelScheduledValues(t);
  note.gain.gain.setValueAtTime(note.gain.gain.value,t);
  note.gain.gain.linearRampToValueAtTime(0,t+release);
  var osc=note.osc;
  setTimeout(function(){try{osc.stop();osc.disconnect()}catch(e){}},release*1000+100);
  delete activeNotes[idx];

  var el=keyboard.querySelector('[data-idx="'+idx+'"]');
  if(el)el.classList.remove('pressed');
}

// Keyboard mapping
var keyMap={};
NOTE_FREQS.forEach(function(n,i){keyMap[n.key]=i});

document.addEventListener('keydown',function(e){
  if(e.repeat)return;
  var k=e.key.toLowerCase();
  if(keyMap[k]!==undefined){e.preventDefault();noteOn(keyMap[k])}
});
document.addEventListener('keyup',function(e){
  var k=e.key.toLowerCase();
  if(keyMap[k]!==undefined)noteOff(keyMap[k]);
});

// Slider handlers
document.getElementById('sl-vol').addEventListener('input',function(){
  volume=this.value/100;
  document.getElementById('v-vol').textContent=this.value+'%';
  if(masterGain)masterGain.gain.value=volume;
});
document.getElementById('sl-detune').addEventListener('input',function(){
  detune=parseFloat(this.value);
  document.getElementById('v-detune').textContent=detune+'ct';
  for(var k in activeNotes)if(activeNotes[k].osc)activeNotes[k].osc.detune.value=detune;
});
document.getElementById('sl-attack').addEventListener('input',function(){
  attack=this.value/1000;
  document.getElementById('v-attack').textContent=this.value+'ms';
});
document.getElementById('sl-release').addEventListener('input',function(){
  release=this.value/1000;
  document.getElementById('v-release').textContent=this.value+'ms';
});
document.getElementById('sl-filter').addEventListener('input',function(){
  filterFreq=parseFloat(this.value);
  var d=filterFreq>=1000?(filterFreq/1000).toFixed(1)+'kHz':Math.round(filterFreq)+'Hz';
  document.getElementById('v-filter').textContent=d;
  if(filterNode)filterNode.frequency.value=filterFreq;
});
document.getElementById('sl-reverb').addEventListener('input',function(){
  delayAmount=this.value/100;
  document.getElementById('v-reverb').textContent=this.value+'%';
  if(delayGain)delayGain.gain.value=delayAmount*0.5;
});
document.getElementById('sl-lfo').addEventListener('input',function(){
  lfoAmount=parseFloat(this.value);
  document.getElementById('v-lfo').textContent=this.value;
  if(lfoGainNode)lfoGainNode.gain.value=lfoAmount;
});

// Wave select
document.querySelectorAll('.ws-btn').forEach(function(btn){
  btn.addEventListener('click',function(){
    document.querySelectorAll('.ws-btn').forEach(function(b){b.classList.remove('active')});
    this.classList.add('active');
    waveType=this.getAttribute('data-wave');
    for(var k in activeNotes)if(activeNotes[k].osc)activeNotes[k].osc.type=waveType;
  });
});

// Visualizer
var vizCanvas=document.getElementById('viz-canvas');
var vctx=vizCanvas.getContext('2d');
function resizeViz(){vizCanvas.width=vizCanvas.parentElement.clientWidth;vizCanvas.height=vizCanvas.parentElement.clientHeight}
resizeViz();
window.addEventListener('resize',resizeViz);

var vizMode=0;
document.getElementById('viz').addEventListener('click',function(){vizMode=(vizMode+1)%3});

function drawViz(){
  requestAnimationFrame(drawViz);
  var w=vizCanvas.width,h=vizCanvas.height;
  vctx.fillStyle='rgba(8,8,15,0.35)';
  vctx.fillRect(0,0,w,h);
  if(!analyser)return;

  if(vizMode===0){
    // Waveform — cyan
    var bufLen=analyser.fftSize;
    var data=new Float32Array(bufLen);
    analyser.getFloatTimeDomainData(data);

    vctx.strokeStyle='rgba(0,255,255,0.04)';vctx.lineWidth=0.5;
    vctx.beginPath();vctx.moveTo(0,h/2);vctx.lineTo(w,h/2);vctx.stroke();

    // Glow
    vctx.beginPath();
    var sliceW=w/bufLen;
    for(var i=0;i<bufLen;i++){
      var y=(0.5-data[i]*0.45)*h;
      if(i===0)vctx.moveTo(0,y);else vctx.lineTo(i*sliceW,y);
    }
    vctx.strokeStyle='rgba(0,255,255,0.15)';vctx.lineWidth=5;vctx.shadowColor='#0ff';vctx.shadowBlur=12;vctx.stroke();
    // Sharp
    vctx.beginPath();
    for(var i=0;i<bufLen;i++){
      var y=(0.5-data[i]*0.45)*h;
      if(i===0)vctx.moveTo(0,y);else vctx.lineTo(i*sliceW,y);
    }
    vctx.strokeStyle='#0ff';vctx.lineWidth=1.5;vctx.shadowBlur=4;vctx.stroke();
    vctx.shadowBlur=0;

  }else if(vizMode===1){
    // Frequency bars — rainbow
    var bufLen=analyser.frequencyBinCount;
    var data=new Uint8Array(bufLen);
    analyser.getByteFrequencyData(data);
    var barW=w/bufLen*2.5;var x=0;
    for(var i=0;i<bufLen&&x<w;i++){
      var val=data[i]/255;var barH=val*h;
      var hue=i/bufLen*300;
      vctx.fillStyle='hsla('+hue+',90%,55%,'+(0.2+val*0.8)+')';
      vctx.shadowColor='hsla('+hue+',90%,50%,0.3)';vctx.shadowBlur=3;
      vctx.fillRect(x,h-barH,barW-1,barH);
      x+=barW;
    }
    vctx.shadowBlur=0;

  }else{
    // Circular — polar waveform
    var bufLen=analyser.fftSize;
    var data=new Float32Array(bufLen);
    analyser.getFloatTimeDomainData(data);
    var cx=w/2,cy=h/2,baseR=Math.min(w,h)*0.3;
    vctx.beginPath();
    for(var i=0;i<bufLen;i++){
      var angle=i/bufLen*Math.PI*2;
      var r=baseR+data[i]*baseR*0.8;
      var px=cx+Math.cos(angle)*r,py=cy+Math.sin(angle)*r;
      if(i===0)vctx.moveTo(px,py);else vctx.lineTo(px,py);
    }
    vctx.closePath();
    vctx.strokeStyle='#0ff';vctx.lineWidth=1.5;
    vctx.shadowColor='#0ff';vctx.shadowBlur=10;
    vctx.stroke();
    // Inner glow
    vctx.strokeStyle='rgba(0,255,255,0.15)';vctx.lineWidth=4;vctx.stroke();
    vctx.shadowBlur=0;
  }
}
drawViz();

// Hide hint
var hintEl=document.getElementById('hint');
document.addEventListener('pointerdown',function(){
  setTimeout(function(){hintEl.style.opacity='0'},3000);
},{once:true});

})();
</script>
<script src="/sloppy-header/sloppy-bar.js"></script>
</body>
</html>
