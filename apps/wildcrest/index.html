<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Wildcrest</title>
<meta name="description" content="Roam tall grass, meet wild creatures, battle them in a cozy top-down pocket adventure.">
<meta property="og:title" content="Wildcrest">
<meta property="og:description" content="Roam tall grass, meet wild creatures, battle them in a cozy top-down pocket adventure.">
<meta property="og:url" content="https://sloppy.live/wildcrest">
<meta property="og:image" content="https://emojicdn.elk.sh/%F0%9F%8C%BF?style=apple">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8C%BF">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Jersey+10&family=DotGothic16&family=Share+Tech+Mono&display=swap">
<style>
:root{
  --dusk:#2a1f3d;
  --dusk-2:#3d2f5a;
  --sage:#5e8b7e;
  --sage-deep:#3b5c51;
  --tall:#7fb588;
  --tall-dark:#4d8860;
  --tree:#1b3127;
  --path:#e6c7a1;
  --path-dark:#b59068;
  --water:#7fcfd9;
  --water-deep:#4aa3b0;
  --cream:#faf3e3;
  --coral:#f27878;
  --coral-deep:#c14a4a;
  --lav:#b79cd9;
  --lemon:#ffd46b;
  --ink:#2b1a36;
  --shadow:rgba(40,20,55,.35);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--dusk);color:var(--cream);font-family:'DotGothic16',monospace;overflow:hidden;height:100%}
body{
  min-height:100vh;
  background:
    radial-gradient(ellipse 70% 55% at 50% 40%, rgba(183,156,217,.18), transparent 70%),
    radial-gradient(ellipse 60% 40% at 80% 85%, rgba(242,120,120,.16), transparent 70%),
    radial-gradient(ellipse 40% 30% at 10% 10%, rgba(127,207,217,.14), transparent 70%),
    linear-gradient(180deg, #1a1129 0%, #2a1f3d 45%, #1e1531 100%);
  display:grid;place-items:center;
  padding:clamp(8px,2vh,20px);
}
.stage{
  display:flex;flex-direction:column;align-items:center;gap:12px;
  width:100%;max-width:820px;
}
.title{
  font-family:'Jersey 10',serif;font-weight:400;font-size:clamp(36px,8vw,68px);
  letter-spacing:.06em;line-height:.9;margin:0;text-align:center;
  color:var(--cream);
  text-shadow:
    3px 3px 0 var(--coral-deep),
    6px 6px 0 var(--ink),
    0 0 26px rgba(242,120,120,.4);
  transform:rotate(-1.5deg);
}
.title span{color:var(--lemon)}
.tagline{
  font-family:'Share Tech Mono',monospace;font-size:.72rem;letter-spacing:.28em;
  text-transform:uppercase;color:var(--lav);margin-top:-6px;opacity:.8;
}
.frame{
  position:relative;border-radius:18px;padding:10px;
  background:linear-gradient(160deg, #3d2f5a 0%, #2a1f3d 100%);
  box-shadow:
    0 0 0 3px var(--ink),
    0 0 0 7px var(--lav),
    0 16px 40px rgba(0,0,0,.55),
    inset 0 0 20px rgba(183,156,217,.2);
}
.frame::before{
  content:"";position:absolute;top:14px;right:22px;width:10px;height:10px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #ffb1b1, #c14a4a);
  box-shadow:0 0 0 2px var(--ink), 0 0 8px var(--coral);
  animation:blink 2.2s infinite ease-in-out;
}
@keyframes blink{0%,88%,100%{opacity:1}92%{opacity:.4}}
canvas{
  display:block;border-radius:10px;
  background:#2d3e30;
  image-rendering:pixelated;image-rendering:crisp-edges;
  cursor:crosshair;
  width:min(100%, 768px);height:auto;
  aspect-ratio:16/11;
}
.hud{
  display:flex;align-items:center;justify-content:space-between;gap:10px;
  font-family:'Share Tech Mono',monospace;font-size:.8rem;letter-spacing:.12em;
  color:var(--lav);text-transform:uppercase;width:100%;max-width:768px;
  padding:0 4px;
}
.keys{display:flex;gap:6px;flex-wrap:wrap}
.key{
  display:inline-block;padding:3px 7px;border-radius:5px;
  background:var(--dusk-2);border:2px solid var(--lav);box-shadow:2px 2px 0 var(--ink);
  color:var(--cream);font-size:.72rem;
}
.hp-tag{color:var(--coral)}
/* Mobile dpad */
.dpad{
  display:none;user-select:none;-webkit-user-select:none;touch-action:none;
  grid-template-columns:repeat(3, 60px);grid-template-rows:repeat(3, 60px);gap:4px;
  margin-top:6px;
}
.dbtn{
  background:var(--dusk-2);border:3px solid var(--lav);border-radius:10px;
  color:var(--cream);font-family:'Jersey 10',serif;font-size:26px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:3px 3px 0 var(--ink);user-select:none;
  touch-action:manipulation;
}
.dbtn:active{transform:translate(1px,1px);box-shadow:1px 1px 0 var(--ink)}
.dbtn.cc{background:var(--coral);border-color:var(--coral-deep);color:#fff}
@media (hover:none) and (pointer:coarse){
  .dpad{display:grid}
  .keys{display:none}
}
/* Startscreen */
.start{
  position:absolute;inset:10px;border-radius:10px;
  background:radial-gradient(ellipse at center, rgba(61,47,90,.96), rgba(26,17,41,.98));
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;z-index:5;text-align:center;padding:20px;
  transition:opacity .35s ease-out;
}
.start.hidden{opacity:0;pointer-events:none}
.start h2{
  font-family:'Jersey 10',serif;font-size:clamp(28px,5vw,46px);margin:0;color:var(--lemon);
  text-shadow:3px 3px 0 var(--coral-deep);letter-spacing:.05em;
}
.start p{max-width:420px;color:var(--cream);margin:4px 0;font-size:.92rem;line-height:1.45}
.start p span{color:var(--tall);font-weight:bold}
.start .cta{
  font-family:'Jersey 10',serif;font-size:32px;padding:10px 28px;margin-top:8px;
  background:linear-gradient(180deg, var(--lemon), #ffae3b);color:var(--ink);
  border:3px solid var(--ink);border-radius:12px;box-shadow:5px 5px 0 var(--ink);
  letter-spacing:.06em;cursor:pointer;
}
.start .cta:hover{transform:translate(-1px,-1px);box-shadow:6px 6px 0 var(--ink)}
.start .cta:active{transform:translate(2px,2px);box-shadow:2px 2px 0 var(--ink)}
.toast{
  position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
  font-family:'Jersey 10',serif;font-size:20px;
  background:var(--ink);color:var(--cream);padding:6px 14px;border-radius:8px;
  border:2px solid var(--lav);box-shadow:3px 3px 0 rgba(0,0,0,.4);
  opacity:0;transition:opacity .2s;pointer-events:none;z-index:6;
}
.toast.show{opacity:1}
</style>
</head>
<body>
<div class="stage">
  <h1 class="title">Wild<span>crest</span></h1>
  <div class="tagline">A pocket field guide · v0.1</div>
  <div class="frame">
    <canvas id="game" width="768" height="528"></canvas>
    <div class="start" id="startScreen">
      <h2>🌿 Welcome, wanderer</h2>
      <p>Step into the tall grass. Meet shy, wild <span>critters</span>. Trade polite blows until someone swoons.</p>
      <p style="font-size:.8rem;opacity:.75">Arrows or WASD to roam · Z to act · X to cancel</p>
      <button class="cta" id="startBtn">▶ Begin</button>
    </div>
    <div class="toast" id="toast"></div>
  </div>
  <div class="hud">
    <div id="hudLeft">🌿 Wildcrest Fields</div>
    <div class="keys">
      <span class="key">↑↓←→</span>
      <span class="key">WASD</span>
      <span class="key">Z Act</span>
      <span class="key">X Back</span>
    </div>
  </div>
  <div class="dpad" id="dpad">
    <div></div><div class="dbtn" data-k="up">▲</div><div></div>
    <div class="dbtn" data-k="left">◀</div><div class="dbtn cc" data-k="z">Z</div><div class="dbtn" data-k="right">▶</div>
    <div></div><div class="dbtn" data-k="down">▼</div><div class="dbtn cc" data-k="x">X</div>
  </div>
</div>
<script>
// ── Canvas ──
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;
const W = canvas.width, H = canvas.height;
const TS = 32;                 // tile size in pixels
const MAP_W = 24, MAP_H = 16.5; // what we render (W/TS x H/TS approximately)

// ── Map ──
// T tree, . grass, g tall grass, P path, ~ water, f flowers, s sand
const MAP_RAW = [
  "TTTTTTTTTTTTTTTTTTTTTTTT",
  "T....ggg........PPPPP..T",
  "T...gggg........P...P..T",
  "T....gg.........P...P.~T",
  "T..fff..........P...P~~T",
  "T....gggggg.....P...P~~T",
  "T....gggggg.....P...PP~T",
  "T...............P....P~T",
  "T..PPPPPPPPPPPPPP....P~T",
  "T..P.................P~T",
  "T..P...gggg.f........P~T",
  "T..P...gggg..........P~T",
  "T..P.................P~T",
  "T..PPPPPPPPPPPPPPPPPPP~T",
  "T........f........~~~~~T",
  "TTTTTTTTTTTTTTTTTTTTTTTT",
];
const MW = MAP_RAW[0].length, MH = MAP_RAW.length;
const TILE = { T:'tree', '.':'grass', g:'tallgrass', P:'path', '~':'water', f:'flower', s:'sand' };
function tileAt(tx, ty){
  if(tx<0||ty<0||tx>=MW||ty>=MH) return 'tree';
  return TILE[MAP_RAW[ty][tx]] || 'grass';
}
function walkable(t){ return t==='grass' || t==='path' || t==='tallgrass' || t==='flower' || t==='sand'; }

// ── Creatures ──
const TYPE = {
  SPARK:'spark', FLAME:'flame', TIDE:'tide', LEAF:'leaf', STONE:'stone',
};
// type × type effectiveness (attacker -> defender)
const EFF = {
  spark:{tide:1.6, stone:0.6},
  flame:{leaf:1.6, tide:0.6},
  tide:{flame:1.6, spark:0.6},
  leaf:{tide:1.6, flame:0.6, stone:1.3},
  stone:{spark:1.6, flame:1.3, leaf:0.6},
};
function eff(atkT, defT){
  return (EFF[atkT] && EFF[atkT][defT]) || 1;
}

const CREATURES = {
  sparkrat:{
    name:'Sparkrat', type:TYPE.SPARK, emoji:'⚡', bodyEmoji:'🐀',
    hp:24, atk:8, color:'#ffd46b',
    moves:[
      {name:'Tackle', type:'spark', pow:6, acc:.95},
      {name:'Zap', type:'spark', pow:9, acc:.85},
    ],
  },
  emberlizard:{
    name:'Emberlizard', type:TYPE.FLAME, emoji:'🔥', bodyEmoji:'🦎',
    hp:26, atk:8, color:'#f27878',
    moves:[
      {name:'Scratch', type:'flame', pow:6, acc:.95},
      {name:'Ember', type:'flame', pow:9, acc:.85},
    ],
  },
  bubblepup:{
    name:'Bubblepup', type:TYPE.TIDE, emoji:'💧', bodyEmoji:'🐢',
    hp:27, atk:7, color:'#7fcfd9',
    moves:[
      {name:'Bite', type:'tide', pow:6, acc:.95},
      {name:'Bubble', type:'tide', pow:9, acc:.9},
    ],
  },
  leafkit:{
    name:'Leafkit', type:TYPE.LEAF, emoji:'🌿', bodyEmoji:'🐛',
    hp:23, atk:8, color:'#7fb588',
    moves:[
      {name:'Scratch', type:'leaf', pow:6, acc:.95},
      {name:'Leafspin', type:'leaf', pow:9, acc:.85},
    ],
  },
  pebblebug:{
    name:'Pebblebug', type:TYPE.STONE, emoji:'🪨', bodyEmoji:'🐞',
    hp:30, atk:7, color:'#b59068',
    moves:[
      {name:'Tackle', type:'stone', pow:6, acc:.95},
      {name:'Rockpop', type:'stone', pow:10, acc:.75},
    ],
  },
};
const WILD_POOL = ['sparkrat','emberlizard','bubblepup','leafkit','pebblebug'];

function makeCreature(key, lvl=3){
  const base = CREATURES[key];
  return {
    key, name:base.name, type:base.type, emoji:base.emoji, bodyEmoji:base.bodyEmoji,
    color:base.color, moves:base.moves,
    lvl,
    maxHp: Math.floor(base.hp + lvl*2.5),
    hp:   Math.floor(base.hp + lvl*2.5),
    atk:  Math.floor(base.atk + lvl*0.8),
  };
}

// ── State ──
const STATE = { WORLD:'world', BATTLE:'battle', INTRO:'intro', END:'end' };
let state = STATE.INTRO;
const player = {
  tx: 4, ty: 12, // spawn on path
  px: 0, py: 0,   // interpolated pixel position (set below)
  dir: 'down',
  moving:false,
  steps:0,       // step counter for encounter rolls
  animT:0,
};
player.px = player.tx*TS; player.py = player.ty*TS;

let party = [ makeCreature('sparkrat', 5) ];
let wild = null;              // current enemy in battle
let battle = null;            // {menu:'main'|'moves'|'log', log:[], busy, turn}
let toastTimer = 0;
function toast(msg, ms=1400){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>el.classList.remove('show'), ms);
}

// ── Input ──
const keys = {};
const pressed = {}; // single-press flags
function setKey(k, down){
  if(down && !keys[k]) pressed[k] = true;
  keys[k] = down;
}
addEventListener('keydown', e=>{
  const k = e.key.toLowerCase();
  if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(k)) e.preventDefault();
  if(k==='arrowup'||k==='w') setKey('up', true);
  else if(k==='arrowdown'||k==='s') setKey('down', true);
  else if(k==='arrowleft'||k==='a') setKey('left', true);
  else if(k==='arrowright'||k==='d') setKey('right', true);
  else if(k==='z'||k==='enter'||k===' ') setKey('z', true);
  else if(k==='x'||k==='escape'||k==='backspace') setKey('x', true);
});
addEventListener('keyup', e=>{
  const k = e.key.toLowerCase();
  if(k==='arrowup'||k==='w') setKey('up', false);
  else if(k==='arrowdown'||k==='s') setKey('down', false);
  else if(k==='arrowleft'||k==='a') setKey('left', false);
  else if(k==='arrowright'||k==='d') setKey('right', false);
  else if(k==='z'||k==='enter'||k===' ') setKey('z', false);
  else if(k==='x'||k==='escape'||k==='backspace') setKey('x', false);
});
// D-pad (mobile)
document.querySelectorAll('.dbtn').forEach(btn=>{
  const k = btn.dataset.k;
  const set = v => { setKey(k, v); };
  btn.addEventListener('pointerdown', e=>{ e.preventDefault(); set(true); });
  btn.addEventListener('pointerup', e=>{ e.preventDefault(); set(false); });
  btn.addEventListener('pointerleave', ()=>set(false));
  btn.addEventListener('pointercancel', ()=>set(false));
});

// ── Start ──
document.getElementById('startBtn').addEventListener('click', ()=>{
  document.getElementById('startScreen').classList.add('hidden');
  state = STATE.WORLD;
  ensureAudio();
});

// ── Audio (simple synth beeps) ──
let actx = null;
function ensureAudio(){
  if(actx) return;
  try { actx = new (window.AudioContext||window.webkitAudioContext)(); } catch(e){}
}
function beep(freq, dur=0.08, type='square', vol=0.06){
  if(!actx) return;
  const t = actx.currentTime;
  const o = actx.createOscillator(); o.type = type; o.frequency.value = freq;
  const g = actx.createGain();
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
  o.connect(g); g.connect(actx.destination);
  o.start(t); o.stop(t+dur+0.02);
}
function sweep(f1, f2, dur=0.2, type='sawtooth', vol=0.06){
  if(!actx) return;
  const t = actx.currentTime;
  const o = actx.createOscillator(); o.type = type;
  o.frequency.setValueAtTime(f1, t);
  o.frequency.exponentialRampToValueAtTime(f2, t+dur);
  const g = actx.createGain();
  g.gain.setValueAtTime(vol, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t+dur);
  o.connect(g); g.connect(actx.destination);
  o.start(t); o.stop(t+dur+0.02);
}
function sfxStep(){ beep(180+Math.random()*30, 0.04, 'triangle', 0.03); }
function sfxSelect(){ beep(660, 0.06, 'square', 0.05); }
function sfxBack(){ beep(330, 0.06, 'square', 0.05); }
function sfxHit(){ sweep(220, 110, 0.15, 'sawtooth', 0.08); }
function sfxCritPlayer(){ sweep(900, 500, 0.25, 'square', 0.08); }
function sfxMiss(){ beep(200, 0.1, 'sine', 0.04); }
function sfxEncounter(){ sweep(200, 700, 0.35, 'square', 0.06); }
function sfxWin(){ [660, 880, 1100].forEach((f,i)=>setTimeout(()=>beep(f,0.18,'square',0.07), i*90)); }
function sfxLose(){ sweep(440, 110, 0.6, 'sawtooth', 0.08); }

// ── World update ──
function tryMove(dir){
  if(player.moving) return;
  let dx=0, dy=0;
  if(dir==='up') dy=-1; else if(dir==='down') dy=1;
  else if(dir==='left') dx=-1; else if(dir==='right') dx=1;
  player.dir = dir;
  const nx = player.tx+dx, ny = player.ty+dy;
  const t = tileAt(nx, ny);
  if(!walkable(t)) { sfxBack(); return; }
  player.moving = true;
  const sx = player.tx*TS, sy = player.ty*TS;
  const tx = nx*TS, ty = ny*TS;
  const dur = 180;
  const start = performance.now();
  sfxStep();
  function step(now){
    const k = Math.min(1, (now-start)/dur);
    const e = k<.5 ? 2*k*k : 1-(-2*k+2)*(-2*k+2)/2;
    player.px = sx + (tx-sx)*e;
    player.py = sy + (ty-sy)*e;
    player.animT = k;
    if(k<1){ requestAnimationFrame(step); }
    else {
      player.tx = nx; player.ty = ny;
      player.px = tx; player.py = ty;
      player.moving = false;
      player.steps++;
      // Encounter check
      if(tileAt(nx,ny)==='tallgrass'){
        // ~14% per step
        if(Math.random() < 0.14) startBattle();
      }
    }
  }
  requestAnimationFrame(step);
}

function startBattle(){
  const key = WILD_POOL[(Math.random()*WILD_POOL.length)|0];
  const lvl = 3 + ((Math.random()*4)|0);
  wild = makeCreature(key, lvl);
  battle = {
    menu:'main',      // 'main' | 'moves' | 'log'
    log:[`A wild ${wild.name} Lv${wild.lvl} appeared!`],
    cursor:0,
    busy:false,
    turn:'player',    // 'player' | 'enemy'
    shake:0,          // shake frames (positive = enemy shakes)
    pshake:0,         // player-side shake
    phase:0,          // animation phase timer
    flashEnemy:0,
    flashPlayer:0,
    anim:null,
  };
  state = STATE.BATTLE;
  sfxEncounter();
}

// ── Battle ──
function me(){ return party[0]; }
function calcDamage(atkr, defr, move){
  const e = eff(move.type, defr.type);
  const base = Math.floor((atkr.atk * move.pow) / 12);
  const variance = 0.85 + Math.random()*0.3;
  const crit = Math.random() < 0.08 ? 1.5 : 1;
  const dmg = Math.max(1, Math.floor(base * e * variance * crit));
  return { dmg, crit: crit>1, eff:e };
}
function logLine(s){
  battle.log.push(s);
  if(battle.log.length>3) battle.log.shift();
}
function playerMove(mi){
  if(battle.busy || battle.turn!=='player') return;
  const m = me().moves[mi];
  if(!m) return;
  battle.busy = true;
  battle.menu = 'log';
  logLine(`${me().name} used ${m.name}!`);
  sfxSelect();
  setTimeout(()=>{
    if(Math.random()>m.acc){
      logLine('…but it missed!');
      sfxMiss();
      setTimeout(()=>{ battle.busy=false; enemyTurn(); }, 550);
      return;
    }
    const {dmg, crit, eff:e} = calcDamage(me(), wild, m);
    wild.hp = Math.max(0, wild.hp - dmg);
    battle.shake = 12;
    battle.flashEnemy = 18;
    sfxHit();
    if(crit) logLine('A critical hit!');
    if(e>1.2) logLine('It\'s super effective!');
    else if(e<0.9) logLine('It\'s not very effective…');
    if(wild.hp<=0){
      setTimeout(()=>{
        logLine(`${wild.name} swooned!`);
        sfxWin();
        // XP / heal — simple: level up if lvl diff, partial heal
        const heal = Math.floor(wild.lvl * 1.4);
        me().hp = Math.min(me().maxHp, me().hp + heal);
        logLine(`${me().name} learned from the fight. +${heal} HP!`);
        // Small chance to level up
        if(Math.random()<0.35){
          me().lvl++;
          const bonus = 3;
          me().maxHp += bonus; me().hp = Math.min(me().maxHp, me().hp+bonus);
          me().atk += 1;
          logLine(`${me().name} grew to Lv${me().lvl}!`);
        }
        setTimeout(()=>{
          state = STATE.WORLD;
          wild = null;
          battle = null;
        }, 1400);
      }, 700);
      return;
    }
    setTimeout(()=>{ battle.busy=false; enemyTurn(); }, 750);
  }, 420);
}
function enemyTurn(){
  if(!wild || wild.hp<=0) return;
  battle.busy = true;
  battle.turn = 'enemy';
  battle.menu = 'log';
  const m = wild.moves[(Math.random()*wild.moves.length)|0];
  logLine(`Wild ${wild.name} used ${m.name}!`);
  setTimeout(()=>{
    if(Math.random()>m.acc){
      logLine('…but it missed!');
      sfxMiss();
      setTimeout(()=>{ endEnemyTurn(); }, 500);
      return;
    }
    const {dmg, crit, eff:e} = calcDamage(wild, me(), m);
    me().hp = Math.max(0, me().hp - dmg);
    battle.pshake = 12;
    battle.flashPlayer = 18;
    sfxHit();
    if(crit) logLine('A critical hit!');
    if(e>1.2) logLine('It\'s super effective!');
    else if(e<0.9) logLine('It\'s not very effective…');
    if(me().hp<=0){
      setTimeout(()=>{
        logLine(`${me().name} swooned…`);
        sfxLose();
        // Respawn at start, heal party
        setTimeout(()=>{
          party.forEach(c=>c.hp = c.maxHp);
          player.tx = 4; player.ty = 12;
          player.px = player.tx*TS; player.py = player.ty*TS;
          state = STATE.WORLD;
          wild = null; battle = null;
          toast('You rested and recovered.');
        }, 1400);
      }, 700);
      return;
    }
    setTimeout(()=>{ endEnemyTurn(); }, 700);
  }, 420);
}
function endEnemyTurn(){
  battle.turn = 'player';
  battle.menu = 'main';
  battle.busy = false;
}

// Attempt to flee
function tryFlee(){
  if(battle.busy) return;
  battle.busy = true;
  battle.menu = 'log';
  sfxSelect();
  const ok = Math.random() < 0.6;
  if(ok){
    logLine('Got away safely!');
    setTimeout(()=>{
      state = STATE.WORLD;
      wild = null; battle = null;
    }, 700);
  } else {
    logLine('Can\'t escape!');
    setTimeout(()=>{ battle.busy=false; enemyTurn(); }, 650);
  }
}

// ── Rendering: world ──
function drawTile(t, x, y){
  const s = TS;
  switch(t){
    case 'grass': {
      ctx.fillStyle = '#5e8b7e';
      ctx.fillRect(x,y,s,s);
      // speckle
      ctx.fillStyle = 'rgba(127,181,136,.6)';
      const seed = (x*31+y*17)%17;
      for(let i=0;i<3;i++){
        const dx = (seed*7 + i*11)%s, dy=(seed*13 + i*5)%s;
        ctx.fillRect(x+dx, y+dy, 2, 2);
      }
      break;
    }
    case 'path': {
      ctx.fillStyle = '#e6c7a1';
      ctx.fillRect(x,y,s,s);
      ctx.fillStyle = 'rgba(181,144,104,.5)';
      ctx.fillRect(x, y+s-3, s, 3);
      const seed=(x+y)%5;
      ctx.fillStyle = 'rgba(181,144,104,.6)';
      ctx.fillRect(x+seed*4, y+6, 3, 2);
      ctx.fillRect(x+8+seed*3, y+20, 2, 2);
      break;
    }
    case 'tallgrass': {
      ctx.fillStyle = '#4d8860';
      ctx.fillRect(x,y,s,s);
      ctx.fillStyle = '#7fb588';
      // blade pattern
      for(let i=0;i<5;i++){
        const bx = x + 3 + (i*6 + (x+y)%4);
        const by = y + 12 + ((i*3 + x)%6);
        ctx.fillRect(bx, by, 2, 10);
        ctx.fillRect(bx-1, by+2, 4, 1);
      }
      ctx.fillStyle = 'rgba(255,255,255,.12)';
      ctx.fillRect(x, y, s, 2);
      break;
    }
    case 'tree': {
      ctx.fillStyle = '#1b3127';
      ctx.fillRect(x,y,s,s);
      // canopy
      ctx.fillStyle = '#2d5a3f';
      ctx.fillRect(x+2, y+2, s-4, s-6);
      ctx.fillStyle = '#3a7a55';
      ctx.fillRect(x+4, y+4, s-8, s-12);
      ctx.fillStyle = '#1b3127';
      ctx.fillRect(x+s/2-2, y+s-6, 4, 6);
      // highlight
      ctx.fillStyle = 'rgba(255,255,255,.14)';
      ctx.fillRect(x+6, y+6, 4, 2);
      break;
    }
    case 'water': {
      const t0 = performance.now()/600;
      ctx.fillStyle = '#4aa3b0';
      ctx.fillRect(x,y,s,s);
      ctx.fillStyle = '#7fcfd9';
      const off = Math.sin(t0 + (x+y)*0.02) * 2;
      ctx.fillRect(x, y+8+off, s, 3);
      ctx.fillRect(x, y+20-off, s, 2);
      ctx.fillStyle = 'rgba(255,255,255,.35)';
      ctx.fillRect(x+4, y+6+off, 3, 1);
      break;
    }
    case 'flower': {
      ctx.fillStyle = '#5e8b7e';
      ctx.fillRect(x,y,s,s);
      const col = ['#f27878','#ffd46b','#b79cd9'][(x+y)%3];
      ctx.fillStyle = col;
      ctx.fillRect(x+s/2-2, y+s/2-2, 4, 4);
      ctx.fillRect(x+s/2-4, y+s/2, 2, 2);
      ctx.fillRect(x+s/2+2, y+s/2, 2, 2);
      ctx.fillStyle = '#ffd46b';
      ctx.fillRect(x+s/2-1, y+s/2-1, 2, 2);
      break;
    }
    case 'sand': {
      ctx.fillStyle = '#e6c7a1';
      ctx.fillRect(x,y,s,s);
      break;
    }
  }
}

function drawMap(camX, camY){
  // Compute visible tile range
  const x0 = Math.max(0, Math.floor(camX/TS));
  const y0 = Math.max(0, Math.floor(camY/TS));
  const x1 = Math.min(MW, Math.ceil((camX+W)/TS));
  const y1 = Math.min(MH, Math.ceil((camY+H)/TS));
  for(let ty=y0; ty<y1; ty++){
    for(let tx=x0; tx<x1; tx++){
      const t = tileAt(tx, ty);
      drawTile(t, tx*TS - camX, ty*TS - camY);
    }
  }
}

function drawPlayer(camX, camY){
  const x = player.px - camX, y = player.py - camY;
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,.35)';
  ctx.beginPath();
  ctx.ellipse(x+TS/2, y+TS-3, 10, 4, 0, 0, Math.PI*2);
  ctx.fill();
  // body — small walker, direction indicator
  const bob = player.moving ? Math.sin(player.animT*Math.PI*2)*1.5 : 0;
  // torso
  ctx.fillStyle = '#b79cd9';
  ctx.fillRect(x+10, y+14+bob, 12, 12);
  // head
  ctx.fillStyle = '#faf3e3';
  ctx.fillRect(x+11, y+6+bob, 10, 10);
  // cap
  ctx.fillStyle = '#f27878';
  ctx.fillRect(x+10, y+5+bob, 12, 4);
  ctx.fillStyle = '#c14a4a';
  ctx.fillRect(x+10, y+8+bob, 12, 1);
  // face (eye direction)
  ctx.fillStyle = '#2b1a36';
  if(player.dir==='down'){ ctx.fillRect(x+13, y+12+bob, 2, 2); ctx.fillRect(x+17, y+12+bob, 2, 2); }
  else if(player.dir==='up'){ /* back of head, no eyes */ }
  else if(player.dir==='left'){ ctx.fillRect(x+12, y+12+bob, 2, 2); }
  else if(player.dir==='right'){ ctx.fillRect(x+18, y+12+bob, 2, 2); }
  // legs
  ctx.fillStyle = '#2a1f3d';
  const lstep = player.moving ? ((Math.floor(player.animT*8)%2)===0?1:-1) : 0;
  ctx.fillRect(x+11, y+26+bob, 4, 4+lstep);
  ctx.fillRect(x+17, y+26+bob, 4, 4-lstep);
}

// ── Rendering: battle ──
function drawBattle(){
  // Background — dusk gradient with platform
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0, '#3d2f5a');
  g.addColorStop(.6, '#b79cd9');
  g.addColorStop(1, '#5e8b7e');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);

  // Platforms (oval pads)
  const pad = (cx, cy, w, h, c1, c2)=>{
    ctx.fillStyle = c2;
    ctx.beginPath(); ctx.ellipse(cx, cy+4, w, h, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = c1;
    ctx.beginPath(); ctx.ellipse(cx, cy, w, h, 0, 0, Math.PI*2); ctx.fill();
  };
  pad(W-170, 210, 110, 18, '#7fb588', '#3b5c51');  // enemy pad
  pad(170, H-200, 120, 22, '#e6c7a1', '#b59068');   // player pad

  // Enemy sprite
  const esx = W-170 + (battle.shake>0 ? (battle.shake%2===0?-4:4) : 0);
  const esy = 160;
  drawCreatureBig(wild, esx, esy, battle.flashEnemy>0);
  drawStatBox(wild, 40, 40, false);

  // Player sprite (back)
  const psx = 170 + (battle.pshake>0 ? (battle.pshake%2===0?-4:4) : 0);
  const psy = H-260;
  drawCreatureBig(me(), psx, psy, battle.flashPlayer>0, true);
  drawStatBox(me(), W-260, H-240, true);

  // Dialog / menu panel at bottom
  const px=18, py=H-130, pw=W-36, ph=112;
  ctx.fillStyle = '#2a1f3d';
  ctx.fillRect(px-3, py-3, pw+6, ph+6);
  ctx.fillStyle = '#faf3e3';
  ctx.fillRect(px, py, pw, ph);
  ctx.strokeStyle = '#2a1f3d';
  ctx.lineWidth = 4;
  ctx.strokeRect(px+2, py+2, pw-4, ph-4);

  if(battle.menu==='main'){
    drawMainMenu(px+14, py+16);
  } else if(battle.menu==='moves'){
    drawMovesMenu(px+14, py+16);
  } else {
    drawLog(px+14, py+16);
  }

  // Decrement transient effects
  if(battle.shake>0) battle.shake--;
  if(battle.pshake>0) battle.pshake--;
  if(battle.flashEnemy>0) battle.flashEnemy--;
  if(battle.flashPlayer>0) battle.flashPlayer--;
}

function drawCreatureBig(c, cx, cy, flash=false, back=false){
  // Big creature — colored disc body + emoji
  ctx.save();
  const size = back ? 96 : 104;
  if(flash){
    ctx.globalAlpha = 0.35;
    ctx.fillStyle = '#fff';
  } else {
    ctx.fillStyle = c.color;
  }
  // drop shadow
  ctx.globalAlpha = flash ? 0.35 : 1;
  ctx.beginPath(); ctx.ellipse(cx, cy+size/2+6, size*0.55, 10, 0, 0, Math.PI*2);
  ctx.fillStyle = 'rgba(0,0,0,.25)'; ctx.fill();
  // body disc
  ctx.globalAlpha = 1;
  ctx.fillStyle = c.color;
  ctx.beginPath(); ctx.arc(cx, cy, size*0.48, 0, Math.PI*2); ctx.fill();
  // highlight
  ctx.fillStyle = 'rgba(255,255,255,.25)';
  ctx.beginPath(); ctx.arc(cx-size*0.2, cy-size*0.2, size*0.2, 0, Math.PI*2); ctx.fill();
  // emoji face (the creature body emoji)
  ctx.font = `${size*0.7}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(c.bodyEmoji, cx, cy+2);
  // type sparkle
  ctx.font = `${size*0.3}px serif`;
  ctx.fillText(c.emoji, cx+size*0.4, cy-size*0.35);
  if(flash){
    ctx.globalAlpha = 0.5;
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(cx, cy, size*0.52, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}

function drawStatBox(c, x, y, isMe){
  const w = 220, h = 54;
  ctx.fillStyle = '#2a1f3d';
  ctx.fillRect(x-2, y-2, w+4, h+4);
  ctx.fillStyle = '#faf3e3';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = '#2a1f3d';
  ctx.lineWidth = 3;
  ctx.strokeRect(x+2, y+2, w-4, h-4);
  // name + level
  ctx.fillStyle = '#2a1f3d';
  ctx.font = '20px "Jersey 10", serif';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'top';
  ctx.fillText(c.name, x+10, y+6);
  ctx.font = '16px "Share Tech Mono", monospace';
  ctx.fillText(`Lv ${c.lvl}`, x+w-46, y+8);
  // HP bar
  const bw = w-24, bh = 8;
  const bx = x+12, by = y+32;
  ctx.fillStyle = '#2a1f3d'; ctx.fillRect(bx-1, by-1, bw+2, bh+2);
  ctx.fillStyle = '#b59068'; ctx.fillRect(bx, by, bw, bh);
  const ratio = Math.max(0, c.hp/c.maxHp);
  const col = ratio>0.5 ? '#7fb588' : ratio>0.2 ? '#ffd46b' : '#f27878';
  ctx.fillStyle = col; ctx.fillRect(bx, by, bw*ratio, bh);
  if(isMe){
    ctx.font = '14px "Share Tech Mono", monospace';
    ctx.fillStyle = '#2a1f3d';
    ctx.textAlign = 'right';
    ctx.fillText(`${c.hp}/${c.maxHp}`, x+w-10, y+42);
    ctx.textAlign = 'left';
  }
}

function drawMainMenu(x, y){
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillStyle = '#2a1f3d';
  ctx.font = '22px "Jersey 10", serif';
  ctx.fillText(`What will ${me().name} do?`, x, y);
  // 2x2 options
  const opts = ['Fight', 'Flee'];
  const ox = x+W-90, oy = y-2;
  ctx.font = '28px "Jersey 10", serif';
  for(let i=0;i<opts.length;i++){
    const cy = oy + i*38;
    if(i===battle.cursor){
      ctx.fillStyle = '#f27878';
      ctx.fillText('▶', ox-26, cy);
    }
    ctx.fillStyle = '#2a1f3d';
    ctx.fillText(opts[i], ox, cy);
  }
}
function drawMovesMenu(x, y){
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillStyle = '#2a1f3d';
  ctx.font = '20px "Jersey 10", serif';
  ctx.fillText('Select a move:', x, y);
  const moves = me().moves;
  ctx.font = '22px "Jersey 10", serif';
  for(let i=0;i<moves.length;i++){
    const cy = y+32 + i*30;
    if(i===battle.cursor){
      ctx.fillStyle = '#f27878';
      ctx.fillText('▶', x-2, cy);
    }
    ctx.fillStyle = '#2a1f3d';
    ctx.fillText(`${moves[i].name}`, x+22, cy);
    ctx.font = '14px "Share Tech Mono", monospace';
    ctx.fillStyle = '#7f6b8a';
    ctx.fillText(`[${moves[i].type.toUpperCase()}]  pow ${moves[i].pow}`, x+180, cy+6);
    ctx.font = '22px "Jersey 10", serif';
  }
  ctx.font = '14px "Share Tech Mono", monospace';
  ctx.fillStyle = '#7f6b8a';
  ctx.fillText('X to go back', x+W-160, y+76);
}
function drawLog(x, y){
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  ctx.fillStyle = '#2a1f3d';
  ctx.font = '20px "Jersey 10", serif';
  battle.log.forEach((line, i)=>{
    ctx.fillText(line, x, y + i*26);
  });
}

// ── World HUD ──
function drawWorldHud(){
  // Thin party HP strip
  const c = me();
  const w = 220, h = 30;
  const x = 12, y = 12;
  ctx.fillStyle = 'rgba(42,31,61,.85)';
  ctx.fillRect(x, y, w, h);
  ctx.strokeStyle = '#b79cd9'; ctx.lineWidth = 2;
  ctx.strokeRect(x+1, y+1, w-2, h-2);
  ctx.fillStyle = '#faf3e3';
  ctx.font = '16px "Jersey 10", serif';
  ctx.textAlign = 'left'; ctx.textBaseline = 'middle';
  ctx.fillText(`${c.name}  Lv${c.lvl}`, x+8, y+h/2-1);
  const bx = x+108, by = y+10, bw = 100, bh = 10;
  ctx.fillStyle = '#2a1f3d'; ctx.fillRect(bx-1, by-1, bw+2, bh+2);
  ctx.fillStyle = '#b59068'; ctx.fillRect(bx, by, bw, bh);
  const r = Math.max(0, c.hp/c.maxHp);
  ctx.fillStyle = r>0.5 ? '#7fb588' : r>0.2 ? '#ffd46b' : '#f27878';
  ctx.fillRect(bx, by, bw*r, bh);
}

// ── Main loop ──
function update(dt){
  if(state===STATE.WORLD){
    if(!player.moving){
      if(keys.up) tryMove('up');
      else if(keys.down) tryMove('down');
      else if(keys.left) tryMove('left');
      else if(keys.right) tryMove('right');
    }
  } else if(state===STATE.BATTLE){
    if(battle.busy){
      // consume directional presses so they don't stack up
    } else if(battle.menu==='main'){
      if(pressed.up || pressed.down){
        battle.cursor = (battle.cursor + 1) % 2; sfxSelect();
      }
      if(pressed.z){
        if(battle.cursor===0){
          battle.menu = 'moves'; battle.cursor = 0; sfxSelect();
        } else {
          tryFlee();
        }
      }
    } else if(battle.menu==='moves'){
      const moves = me().moves;
      if(pressed.up) { battle.cursor = (battle.cursor-1+moves.length)%moves.length; sfxSelect(); }
      if(pressed.down) { battle.cursor = (battle.cursor+1)%moves.length; sfxSelect(); }
      if(pressed.x) { battle.menu = 'main'; battle.cursor = 0; sfxBack(); }
      if(pressed.z) { playerMove(battle.cursor); }
    }
  }
  // Clear single-press flags
  for(const k in pressed) pressed[k] = false;
}

function render(){
  ctx.clearRect(0,0,W,H);
  if(state===STATE.WORLD || state===STATE.INTRO){
    // Camera follows player, clamped to map
    const camX = Math.min(Math.max(0, player.px - W/2 + TS/2), Math.max(0, MW*TS - W));
    const camY = Math.min(Math.max(0, player.py - H/2 + TS/2), Math.max(0, MH*TS - H));
    drawMap(camX, camY);
    drawPlayer(camX, camY);
    drawWorldHud();
  } else if(state===STATE.BATTLE){
    drawBattle();
  }
}

let last = performance.now();
function loop(now){
  const dt = Math.min(50, now-last);
  last = now;
  update(dt);
  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
