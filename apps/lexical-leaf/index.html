<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Lexical Leaf — Digital Garden</title>
<link rel="icon" href="https://emojicdn.elk.sh/🌱">
<meta property="og:title" content="Lexical Leaf">
<meta property="og:description" content="Type a message. Grow a unique pixel flower. Tend your digital garden.">
<meta property="og:url" content="https://sloppy.live/lexical-leaf">
<meta property="og:image" content="https://sloppy.live/lexical-leaf/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Bitter:wght@300;700&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --soil:#1a1410;--dirt:#2a2018;--grass:#1a2a12;
  --text:#8a9a6a;--bright:#c4d89a;--dim:#4a5a3a;
  --bark:#6a4a2a;--sky:#0c1a10;
}
body{background:var(--soil);color:var(--text);font-family:'Bitter',serif;min-height:100vh;overflow-x:hidden}
.header{text-align:center;padding:20px 16px 12px;position:relative}
.header h1{font-size:clamp(24px,4vw,36px);font-weight:700;color:var(--bright);letter-spacing:1px}
.header .sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--dim);margin-top:4px}
.stats{display:flex;justify-content:center;gap:20px;margin-top:8px;font-family:'DM Mono',monospace;font-size:11px;color:var(--dim)}
.garden-wrap{position:relative;width:100%;max-width:900px;margin:0 auto;padding:0 12px}
.garden-canvas{width:100%;aspect-ratio:3/2;display:block;border-radius:6px;
  background:linear-gradient(180deg,var(--sky) 0%,var(--grass) 60%,var(--dirt) 85%,var(--soil) 100%);
  image-rendering:pixelated;cursor:crosshair}
.input-area{max-width:600px;margin:16px auto;padding:0 12px;display:flex;gap:8px}
.input-area input{flex:1;background:var(--dirt);border:1px solid var(--dim);border-radius:4px;
  padding:10px 14px;color:var(--bright);font-family:'DM Mono',monospace;font-size:13px;outline:none}
.input-area input:focus{border-color:var(--text)}
.input-area input::placeholder{color:var(--dim)}
.input-area button{background:var(--grass);border:1px solid var(--dim);color:var(--bright);
  padding:10px 18px;border-radius:4px;cursor:pointer;font-family:'Bitter',serif;font-size:14px;
  font-weight:700;transition:all .2s}
.input-area button:hover{background:var(--text);color:var(--soil)}
.tooltip{position:fixed;background:var(--dirt);border:1px solid var(--dim);border-radius:4px;
  padding:6px 10px;font-family:'DM Mono',monospace;font-size:11px;color:var(--bright);
  pointer-events:none;display:none;z-index:10;max-width:200px;word-break:break-word}
.controls{text-align:center;margin:8px 0;font-family:'DM Mono',monospace;font-size:10px;color:var(--dim)}
.back-link{text-align:center;padding:12px 0 20px}
.back-link a{color:var(--dim);font-family:'DM Mono',monospace;font-size:11px;text-decoration:none;border-bottom:1px solid var(--dirt)}
.back-link a:hover{color:var(--bright)}
.grow-flash{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;
  background:radial-gradient(circle,rgba(196,216,154,.08),transparent 60%);opacity:0;z-index:5;transition:opacity .6s}
@media(max-width:500px){
  .garden-canvas{aspect-ratio:1/1}
  .input-area{flex-direction:column}
  .input-area button{width:100%}
}
</style>
</head>
<body>
<div class="header">
  <h1>Lexical Leaf</h1>
  <div class="sub">a digital garden where words become flowers</div>
  <div class="stats">
    <span>🌱 <span id="flowerCount">0</span> flowers</span>
    <span>🌿 <span id="speciesCount">0</span> species</span>
  </div>
</div>
<div class="garden-wrap">
  <canvas class="garden-canvas" id="garden"></canvas>
</div>
<div class="controls">hover to read messages — move cursor near stems to bend them</div>
<div class="input-area">
  <input type="text" id="msgInput" placeholder="Type a message to grow a flower..." maxlength="120" autocomplete="off">
  <button id="plantBtn">🌱 Plant</button>
</div>
<div class="tooltip" id="tooltip"></div>
<div class="grow-flash" id="flash"></div>
<div class="back-link"><a href="https://sloppy.live">← sloppy.live</a></div>
<script>
const canvas = document.getElementById('garden');
const ctx = canvas.getContext('2d');
const tooltip = document.getElementById('tooltip');
const flash = document.getElementById('flash');
const PX = 4; // pixel scale

let W, H, GW, GH; // canvas dims and grid dims
const flowers = JSON.parse(localStorage.getItem('lexical-flowers') || '[]');
let hovered = null;
let mouseGX = -999, mouseGY = -999; // mouse position in grid coords
const MAGNET_RADIUS = 18; // grid cells radius of influence
const MAGNET_STRENGTH = 3.5; // max pixel deflection

function resize(){
  const rect = canvas.getBoundingClientRect();
  W = canvas.width = Math.floor(rect.width);
  H = canvas.height = Math.floor(rect.height);
  GW = Math.floor(W / PX);
  GH = Math.floor(H / PX);
  drawAll();
}

// Deterministic hash from message text
function hash(str){
  let h = 0x811c9dc5;
  for(let i=0;i<str.length;i++){
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 0x01000193);
  }
  return h >>> 0;
}

function seededRng(seed){
  let s = seed;
  return function(){
    s ^= s << 13; s ^= s >> 17; s ^= s << 5;
    return (s >>> 0) / 4294967296;
  };
}

// HSL to RGB
function hsl(h,s,l){
  h = ((h%360)+360)%360;
  s /= 100; l /= 100;
  const c = (1 - Math.abs(2*l-1)) * s;
  const x = c * (1 - Math.abs((h/60)%2 - 1));
  const m = l - c/2;
  let r,g,b;
  if(h<60){r=c;g=x;b=0}else if(h<120){r=x;g=c;b=0}else if(h<180){r=0;g=c;b=x}
  else if(h<240){r=0;g=x;b=c}else if(h<300){r=x;g=0;b=c}else{r=c;g=0;b=x}
  return `rgb(${Math.round((r+m)*255)},${Math.round((g+m)*255)},${Math.round((b+m)*255)})`;
}

// Petal shapes (pixel patterns relative to center, each is array of [dx,dy])
const PETAL_SHAPES = [
  // 0: simple 4-petal cross
  (r)=>{const p=[];for(let i=1;i<=r;i++){p.push([0,-i],[0,i],[-i,0],[i,0])}return p},
  // 1: diagonal 4-petal
  (r)=>{const p=[];for(let i=1;i<=r;i++){p.push([-i,-i],[i,-i],[-i,i],[i,i])}return p},
  // 2: 8-petal star
  (r)=>{const p=[];for(let i=1;i<=r;i++){p.push([0,-i],[0,i],[-i,0],[i,0],[-i,-i],[i,-i],[-i,i],[i,i])}return p},
  // 3: round bloom
  (r)=>{const p=[];for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++){if(dx*dx+dy*dy<=r*r+1&&(dx||dy))p.push([dx,dy])}return p},
  // 4: tulip (top heavy)
  (r)=>{const p=[];for(let dy=-r;dy<=0;dy++)for(let dx=-r;dx<=r;dx++){if(Math.abs(dx)<=r-Math.abs(dy)*0.5&&(dx||dy))p.push([dx,dy])}p.push([0,1]);return p},
  // 5: spiky
  (r)=>{const p=[];for(let i=1;i<=r;i++){p.push([0,-i],[0,i],[-i,0],[i,0]);if(i<r){p.push([-1,-i],[1,-i],[-1,i],[1,i])}}return p},
  // 6: ring
  (r)=>{const p=[];const r2=r*r,ri=(r-1)*(r-1);for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++){const d=dx*dx+dy*dy;if(d<=r2&&d>=ri)p.push([dx,dy])}return p},
  // 7: diamond
  (r)=>{const p=[];for(let dy=-r;dy<=r;dy++)for(let dx=-r;dx<=r;dx++){if(Math.abs(dx)+Math.abs(dy)<=r&&(dx||dy))p.push([dx,dy])}return p},
];

const LEAF_SHAPES = [
  // 0: two angled leaves
  (h)=>[[-1,0],[-2,-1],[-2,0],[1,0],[2,1],[2,0]],
  // 1: drooping leaves
  (h)=>[[-1,0],[-2,1],[-3,1],[1,0],[2,1],[3,1]],
  // 2: upward leaves
  (h)=>[[-1,-1],[-2,-2],[-2,-1],[1,-1],[2,-2],[2,-1]],
  // 3: wide fan
  (h)=>[[-1,0],[-2,0],[-3,0],[1,0],[2,0],[3,0]],
  // 4: no leaves
  ()=>[],
];

function generateFlower(msg, x, y){
  const h = hash(msg);
  const rng = seededRng(h);
  // Flower genetics from message
  const petalHue = rng() * 360;
  const petalSat = 50 + rng() * 40;
  const petalLight = 45 + rng() * 25;
  const centerHue = (petalHue + 30 + rng() * 60) % 360;
  // Longer messages grow bigger flowers (length 1-120 maps to 1x-2.5x scale)
  const lenScale = 1 + Math.min(msg.length, 120) / 80;
  const stemH = Math.floor((3 + rng() * 8) * lenScale); // stem height in pixels
  const petalR = Math.floor((2 + rng() * 3) * lenScale); // petal radius
  const shapeIdx = Math.floor(rng() * PETAL_SHAPES.length);
  const leafIdx = Math.floor(rng() * LEAF_SHAPES.length);
  const stemHue = 90 + rng() * 40;
  const hasThorn = rng() < 0.15;
  const secondColor = rng() < 0.35;
  const petal2Hue = (petalHue + 120 + rng() * 120) % 360;

  return {
    msg, x, y, petalHue, petalSat, petalLight, centerHue,
    stemH, petalR, shapeIdx, leafIdx, stemHue,
    hasThorn, secondColor, petal2Hue, time: Date.now()
  };
}

function px(x, y, color){
  ctx.fillStyle = color;
  ctx.fillRect(x * PX, y * PX, PX, PX);
}

function drawFlower(f, age){
  const gx = Math.floor(f.x * GW);
  // Ground line is at ~75% of grid height
  const groundY = Math.floor(GH * 0.75);
  const gy = groundY - Math.floor(f.y * GH * 0.3); // y mapped to ground area

  // Growth animation (0-1 over 1.5s)
  const grow = Math.min(1, age / 1500);
  const stemDraw = Math.floor(f.stemH * grow);
  const petalGrow = Math.max(0, (grow - 0.4) / 0.6);

  // Copper wire stem with mouse magnet bending
  // Calculate magnet deflection at each stem segment
  const stemPoints = []; // actual drawn positions [gx, gy] for each stem pixel
  for(let i = 0; i < stemDraw; i++){
    const sy = groundY - i;
    let sx = gx;
    // Magnet bend: stronger near top, zero at base
    const bendFactor = i / Math.max(1, stemDraw); // 0 at base, 1 at top
    const dx = mouseGX - gx;
    const dy = mouseGY - sy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    if(dist < MAGNET_RADIUS && dist > 0){
      const force = (1 - dist / MAGNET_RADIUS) * MAGNET_STRENGTH * bendFactor;
      sx += Math.round(dx / dist * force);
    }
    // Natural sway on top of magnet
    const sway = Math.sin(Date.now()/1800 + f.x * 20 + i * 0.3) * 0.4 * bendFactor;
    sx += Math.round(sway);

    stemPoints.push([sx, sy]);

    // Copper wire colors: warm orange-brown with highlight/patina variation
    const t = i / Math.max(1, stemDraw);
    const shimmer = Math.sin(Date.now()/1200 + i * 1.7 + f.x * 30) * 8;
    // Core copper: hue 20-30, sat 55-70, light varies for wire texture
    const copperLight = 32 + shimmer + (i % 2 === 0 ? 4 : -2);
    const copperHue = 22 + Math.sin(i * 2.1) * 6;
    px(sx, sy, hsl(copperHue, 62, copperLight));
    // Specular highlight on right edge
    if(i % 3 === 0){
      px(sx + 1, sy, hsl(35, 50, copperLight + 12));
    }
    // Oxidation patina (greenish) on random segments
    if((hash(f.msg + i) % 7) === 0){
      px(sx - 1, sy, hsl(160, 30, 22));
    }
    // Thorn as copper barb
    if(f.hasThorn && i === Math.floor(f.stemH/2)){
      px(sx - 1, sy - 1, hsl(25, 55, 28));
      px(sx - 2, sy - 1, hsl(30, 45, 22));
    }
  }

  // Top of stem position (with bending)
  const topPt = stemPoints.length > 0 ? stemPoints[stemPoints.length - 1] : [gx, groundY];
  const topX = topPt[0], topY = topPt[1];

  // Leaves at stem midpoint (follow bent stem)
  if(grow > 0.3 && stemPoints.length > 1){
    const midIdx = Math.floor(stemPoints.length * 0.5);
    const [leafX, leafY] = stemPoints[midIdx];
    const leafColor = hsl(f.stemHue, 45, 32);
    const leaves = LEAF_SHAPES[f.leafIdx](f.stemH);
    leaves.forEach(([ldx, ldy]) => px(leafX + ldx, leafY + ldy, leafColor));
  }

  // Petals at top (follow bent stem top)
  if(petalGrow > 0){
    const r = Math.max(1, Math.floor(f.petalR * petalGrow));
    const petals = PETAL_SHAPES[f.shapeIdx](r);
    const rng2 = seededRng(hash(f.msg + 'petal'));
    petals.forEach(([pdx, pdy]) => {
      let color;
      if(f.secondColor && rng2() < 0.4){
        color = hsl(f.petal2Hue, f.petalSat, f.petalLight + (rng2()*10-5));
      } else {
        color = hsl(f.petalHue, f.petalSat, f.petalLight + (rng2()*10-5));
      }
      px(topX + pdx, topY + pdy, color);
    });
    // Center
    px(topX, topY, hsl(f.centerHue, 60, 55));
  }

  // Store hitbox for hover (at bent top position)
  f._gx = topX; f._gy = topY; f._r = f.petalR + 1;
}

function drawGround(){
  // Dirt/grass texture
  const groundY = Math.floor(GH * 0.75);
  const rng = seededRng(42);
  for(let y = groundY; y < GH; y++){
    for(let x = 0; x < GW; x++){
      const depth = (y - groundY) / (GH - groundY);
      if(rng() < 0.15){
        const g = depth < 0.15 ? hsl(100 + rng()*30, 30, 18 + rng()*8) : hsl(30 + rng()*20, 20, 10 + rng()*6);
        px(x, y, g);
      }
    }
  }
  // Grass tufts
  for(let i = 0; i < GW * 0.3; i++){
    const gx = Math.floor(rng() * GW);
    const gh = 1 + Math.floor(rng() * 2);
    for(let j = 0; j < gh; j++){
      px(gx, groundY - 1 - j, hsl(100 + rng()*40, 35, 20 + rng()*10));
    }
  }
}

function drawSky(){
  // Occasional stars
  const rng = seededRng(99);
  const groundY = Math.floor(GH * 0.75);
  for(let i = 0; i < 30; i++){
    const x = Math.floor(rng() * GW);
    const y = Math.floor(rng() * groundY * 0.6);
    const twinkle = Math.sin(Date.now()/800 + i * 2) * 0.3 + 0.7;
    if(twinkle > 0.6){
      px(x, y, `rgba(200,220,180,${twinkle * 0.4})`);
    }
  }
}

// === METALLIC INSECTS ===
const INSECT_COUNT = 12;
const insects = [];

function spawnInsects(){
  insects.length = 0;
  for(let i = 0; i < INSECT_COUNT; i++){
    const type = ['rolly','bee','ant','dragonfly','worm'][i % 5];
    insects.push(createInsect(type, i));
  }
}

function createInsect(type, seed){
  const rng = seededRng(seed * 7717 + 1337);
  const groundY = 0.75; // fraction
  const ins = {
    type,
    x: rng() * 0.9 + 0.05, // normalized 0-1
    y: 0,
    vx: (rng() - 0.5) * 0.0002,
    vy: 0,
    phase: rng() * Math.PI * 2,
    speed: 0.00008 + rng() * 0.00012,
    metalHue: 0, metalSat: 0, metalLight: 0,
    size: 1,
    legFrame: 0,
    curled: false, curlTimer: 0, // rolly polly
    wingPhase: rng() * Math.PI * 2,
    segments: 4 + Math.floor(rng() * 4), // worm
  };
  // Metal palette per type
  switch(type){
    case 'rolly':
      ins.metalHue = 220; ins.metalSat = 20; ins.metalLight = 40;
      ins.size = 2; ins.y = groundY + rng()*0.08;
      ins.vx = (rng()-0.5)*0.0001;
      break;
    case 'bee':
      ins.metalHue = 45; ins.metalSat = 55; ins.metalLight = 50;
      ins.size = 1.5;
      ins.y = groundY - 0.15 - rng()*0.25; // flying
      ins.vy = (rng()-0.5)*0.00005;
      break;
    case 'ant':
      ins.metalHue = 10; ins.metalSat = 30; ins.metalLight = 25;
      ins.size = 1; ins.y = groundY + rng()*0.05;
      ins.speed *= 1.5;
      break;
    case 'dragonfly':
      ins.metalHue = 180; ins.metalSat = 45; ins.metalLight = 45;
      ins.size = 2; ins.y = groundY - 0.2 - rng()*0.3;
      ins.vy = (rng()-0.5)*0.00008;
      ins.speed *= 0.7;
      break;
    case 'worm':
      ins.metalHue = 330; ins.metalSat = 25; ins.metalLight = 35;
      ins.size = 1; ins.y = groundY + 0.02 + rng()*0.1;
      ins.speed *= 0.4;
      break;
  }
  return ins;
}

function updateInsect(ins, dt){
  const groundY = 0.75;
  ins.phase += dt * 0.003;
  ins.legFrame += dt * 0.008;

  // Movement
  ins.x += ins.vx * dt;
  ins.y += ins.vy * dt;

  // React to mouse
  if(mouseGX > 0){
    const mx = mouseGX / GW, my = mouseGY / GH;
    const ddx = ins.x - mx, ddy = ins.y - my;
    const dist = Math.sqrt(ddx*ddx + ddy*ddy);
    if(ins.type === 'rolly'){
      // Rolly pollies curl in place — no flee
      if(dist < 0.1){
        ins.curled = true; ins.curlTimer = 150;
        ins.vx *= 0.8; // slow to a stop
      }
    } else if(dist < 0.12 && dist > 0){
      const flee = 0.00015 / dist;
      ins.vx += ddx / dist * flee;
      ins.vy += ddy / dist * flee * 0.3;
    }
  }

  // Rolly polly uncurl
  if(ins.curled){
    ins.curlTimer -= dt * 0.06;
    if(ins.curlTimer <= 0) ins.curled = false;
  }

  // Bounce at edges
  if(ins.x < 0.02){ ins.x = 0.02; ins.vx = Math.abs(ins.vx); }
  if(ins.x > 0.98){ ins.x = 0.98; ins.vx = -Math.abs(ins.vx); }

  // Type-specific constraints
  if(ins.type === 'rolly' || ins.type === 'ant' || ins.type === 'worm'){
    ins.y = Math.max(groundY, ins.y);
    ins.y = Math.min(groundY + 0.18, ins.y);
    ins.vy *= 0.9;
  } else {
    // Flying: bob
    const targetY = ins.type === 'bee' ? groundY - 0.15 - Math.sin(ins.phase*0.7)*0.08
      : groundY - 0.25 - Math.sin(ins.phase*0.5)*0.12;
    ins.vy += (targetY - ins.y) * 0.00005;
    ins.vy *= 0.98;
  }

  // Damping
  ins.vx *= 0.998;
  // Random wander
  ins.vx += (Math.sin(ins.phase * 1.3) * 0.000003);
}

function drawInsect(ins){
  const ix = Math.floor(ins.x * GW);
  const iy = Math.floor(ins.y * GH);
  const t = Date.now();
  const shimmer = Math.sin(t/400 + ins.phase) * 10;
  const mh = ins.metalHue, ms = ins.metalSat, ml = ins.metalLight + shimmer;
  const highlight = hsl(mh, ms + 10, ml + 15);
  const body = hsl(mh, ms, ml);
  const dark = hsl(mh, ms, ml - 12);
  const facing = ins.vx >= 0 ? 1 : -1;

  switch(ins.type){
    case 'rolly': {
      if(ins.curled){
        // Curled ball
        px(ix, iy, body); px(ix+1, iy, dark);
        px(ix, iy-1, highlight); px(ix+1, iy-1, body);
        px(ix, iy+1, dark); px(ix+1, iy+1, dark);
      } else {
        // Oval body with segments
        px(ix-1, iy, dark); px(ix, iy, body); px(ix+1, iy, body); px(ix+2, iy, dark);
        px(ix, iy-1, highlight); px(ix+1, iy-1, highlight);
        // Segment lines
        px(ix, iy, hsl(mh,ms,ml-6));
        // Legs (3 pairs, animated)
        const legOff = Math.sin(ins.legFrame) > 0 ? 1 : 0;
        px(ix-1+legOff, iy+1, dark); px(ix+legOff, iy+1, dark); px(ix+1+legOff, iy+1, dark);
        // Antennae
        px(ix-1-facing, iy-2, hsl(mh,ms,ml+5));
      }
      break;
    }
    case 'bee': {
      // Striped metallic body
      px(ix, iy, hsl(45,60,55)); px(ix+facing, iy, hsl(0,0,15));
      px(ix+facing*2, iy, hsl(45,60,50));
      // Head
      px(ix-facing, iy, hsl(35,50,40));
      // Wings (flapping)
      const wingUp = Math.sin(t/60 + ins.wingPhase) > 0;
      if(wingUp){
        px(ix, iy-1, hsl(200,10,70)); px(ix+facing, iy-1, hsl(200,10,65));
      } else {
        px(ix, iy-1, hsl(200,10,55)); px(ix+facing, iy-2, hsl(200,10,60));
      }
      // Stinger
      px(ix+facing*3, iy, hsl(30,40,30));
      break;
    }
    case 'ant': {
      // 3-segment body
      px(ix, iy, body); // head
      px(ix+facing, iy, dark); // thorax
      px(ix+facing*2, iy, body); // abdomen
      // Legs (3 pairs)
      const lo = Math.sin(ins.legFrame*1.5) > 0 ? 1 : 0;
      px(ix+lo, iy+1, dark);
      px(ix+facing+lo, iy+1, dark);
      px(ix+facing*2-lo, iy+1, dark);
      // Antennae
      px(ix-facing, iy-1, hsl(mh,ms,ml+8));
      px(ix-facing*2, iy-2, highlight);
      break;
    }
    case 'dragonfly': {
      // Long thin body
      for(let s=0;s<4;s++){
        px(ix+s*facing, iy, s===0 ? highlight : (s%2===0 ? body : dark));
      }
      // 4 wings
      const wf = Math.sin(t/50 + ins.wingPhase);
      const wy1 = wf > 0 ? -1 : -2;
      const wy2 = wf > 0 ? -2 : -1;
      px(ix, iy+wy1, hsl(mh,20,65)); px(ix+facing, iy+wy1, hsl(mh,15,60));
      px(ix+facing*2, iy+wy2, hsl(mh,20,62)); px(ix+facing*3, iy+wy2, hsl(mh,15,58));
      // Eyes
      px(ix-facing, iy, hsl(60,70,60));
      break;
    }
    case 'worm': {
      // Undulating segments
      for(let s=0; s < ins.segments; s++){
        const wave = Math.sin(ins.phase*2 + s*0.8) * 0.5;
        const wx = ix + s * facing;
        const wy = iy + Math.round(wave);
        const segLight = ml + Math.sin(s*1.5)*6;
        px(wx, wy, hsl(mh, ms, segLight));
        // Metallic highlight on top
        if(s % 2 === 0) px(wx, wy-1, hsl(mh, ms+10, segLight+10));
      }
      break;
    }
  }
}

// Initialize insects
spawnInsects();
let lastInsectTime = Date.now();

function drawAll(){
  ctx.clearRect(0, 0, W, H);
  drawSky();
  drawGround();

  // Update and draw insects
  const now = Date.now();
  const idt = Math.min(now - lastInsectTime, 50);
  lastInsectTime = now;
  insects.forEach(ins => {
    updateInsect(ins, idt);
    drawInsect(ins);
  });

  flowers.forEach(f => {
    const age = now - f.time;
    drawFlower(f, age);
  });
}

function findFlowerAt(mx, my){
  const rect = canvas.getBoundingClientRect();
  const gx = Math.floor((mx - rect.left) / rect.width * GW);
  const gy = Math.floor((my - rect.top) / rect.height * GH);
  let closest = null, closestD = Infinity;
  flowers.forEach(f => {
    if(f._gx === undefined) return;
    const d = Math.abs(f._gx - gx) + Math.abs(f._gy - gy);
    if(d < f._r + 2 && d < closestD){
      closest = f; closestD = d;
    }
  });
  return closest;
}

canvas.addEventListener('mousemove', e => {
  // Update magnet position in grid coords
  const rect = canvas.getBoundingClientRect();
  mouseGX = Math.floor((e.clientX - rect.left) / rect.width * GW);
  mouseGY = Math.floor((e.clientY - rect.top) / rect.height * GH);

  const f = findFlowerAt(e.clientX, e.clientY);
  if(f){
    tooltip.style.display = 'block';
    tooltip.style.left = e.clientX + 12 + 'px';
    tooltip.style.top = e.clientY - 8 + 'px';
    tooltip.textContent = `"${f.msg}"`;
    hovered = f;
  } else {
    tooltip.style.display = 'none';
    hovered = null;
  }
});

canvas.addEventListener('mouseleave', () => {
  tooltip.style.display = 'none';
  hovered = null;
  mouseGX = -999; mouseGY = -999; // disable magnet when mouse leaves
});

// Touch support with magnet
function updateTouchMagnet(e){
  const t = e.touches[0];
  const rect = canvas.getBoundingClientRect();
  mouseGX = Math.floor((t.clientX - rect.left) / rect.width * GW);
  mouseGY = Math.floor((t.clientY - rect.top) / rect.height * GH);
}
canvas.addEventListener('touchstart', e => {
  updateTouchMagnet(e);
  const t = e.touches[0];
  const f = findFlowerAt(t.clientX, t.clientY);
  if(f){
    tooltip.style.display = 'block';
    tooltip.style.left = Math.min(t.clientX + 12, window.innerWidth - 210) + 'px';
    tooltip.style.top = t.clientY - 40 + 'px';
    tooltip.textContent = `"${f.msg}"`;
  }
});
canvas.addEventListener('touchmove', e => { updateTouchMagnet(e); }, {passive:true});
canvas.addEventListener('touchend', () => { tooltip.style.display = 'none'; mouseGX = -999; mouseGY = -999; });

function plantFlower(msg){
  // Find a position that doesn't overlap too much
  let x, y, attempts = 0;
  do {
    x = 0.05 + Math.random() * 0.9;
    y = Math.random();
    attempts++;
  } while(attempts < 50 && flowers.some(f => Math.abs(f.x - x) < 0.03 && Math.abs(f.y - y) < 0.15));

  const flower = generateFlower(msg, x, y);
  flowers.push(flower);
  // Keep garden manageable
  if(flowers.length > 200) flowers.shift();
  save();
  updateStats();

  // Flash
  flash.style.opacity = '1';
  setTimeout(() => flash.style.opacity = '0', 100);
}

function save(){
  localStorage.setItem('lexical-flowers', JSON.stringify(flowers));
}

function updateStats(){
  document.getElementById('flowerCount').textContent = flowers.length;
  // Count unique shapes (shapeIdx + leafIdx combo)
  const species = new Set(flowers.map(f => f.shapeIdx + '-' + f.leafIdx + '-' + Math.floor(f.petalHue/60)));
  document.getElementById('speciesCount').textContent = species.size;
}

document.getElementById('plantBtn').onclick = () => {
  const input = document.getElementById('msgInput');
  const msg = input.value.trim();
  if(!msg) return;
  input.value = '';
  plantFlower(msg);
  input.focus();
};

document.getElementById('msgInput').addEventListener('keydown', e => {
  if(e.key === 'Enter'){
    const msg = e.target.value.trim();
    if(!msg) return;
    e.target.value = '';
    plantFlower(msg);
  }
});

// Animation loop
function frame(){
  drawAll();
  requestAnimationFrame(frame);
}

window.addEventListener('resize', resize);
resize();
updateStats();
frame();

// Plant a welcome flower if garden is empty
if(flowers.length === 0){
  plantFlower('Welcome to the garden');
  setTimeout(() => plantFlower('Every word grows something new'), 400);
  setTimeout(() => plantFlower('What will you plant?'), 800);
}
</script>
