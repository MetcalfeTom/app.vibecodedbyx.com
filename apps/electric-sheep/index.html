<html lang="en">

<title>Electric Sheep</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<meta property="og:description" content="Glowing particles flock like sheep across a dark void. Move your cursor to herd them; click to scatter them with thunder.">

<style>
:root{
  --void:#050816;
  --void-2:#0a0e26;
  --foam:#dff5fb;
  --cyan:#7adcff;
  --magenta:#ff5ec8;
  --violet:#a86bff;
  --gold:#f5c453;
  --ink:#020410;
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:100%;-webkit-text-size-adjust:100%}
body{
  min-height:100vh;background:var(--void);color:var(--foam);
  font-family:'Space Mono',ui-monospace,monospace;
  font-size:1rem;line-height:1.45;overflow:hidden;
}
a.skip-link{position:absolute;left:0.5rem;top:-3rem;z-index:200;
  background:var(--magenta);color:var(--ink);padding:0.5rem 0.75rem;
  text-decoration:none;border-radius:0.25rem;
  font-family:'Audiowide',cursive;font-size:0.875rem}
a.skip-link:focus{top:0.5rem;outline:0.1875rem solid var(--gold);outline-offset:0.125rem}

main{position:fixed;inset:0}
canvas#stage{
  display:block;width:100%;height:100%;background:var(--void);
  cursor:crosshair;outline:none;
}
canvas#stage:focus-visible{box-shadow:inset 0 0 0 0.1875rem var(--gold)}

.brand{
  position:absolute;top:1rem;left:1.25rem;z-index:6;
  pointer-events:none;
  text-shadow:0 0.125rem 0.375rem rgba(0,0,0,0.7);
}
h1{
  font-family:'Audiowide',cursive;
  font-size:clamp(1.25rem, 3.4vw, 2.125rem);
  letter-spacing:0.18em;line-height:1;
  color:var(--foam);text-transform:uppercase;
}
h1 .accent{
  color:var(--cyan);
  text-shadow:0 0 0.5rem rgba(122,220,255,0.7), 0 0 1.25rem rgba(122,220,255,0.4);
}
.tag{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:1.0625rem;color:rgba(223,245,251,0.78);
  margin-top:0.25rem;
}

/* HUD top right */
.hud{
  position:absolute;top:1rem;right:1rem;z-index:6;
  display:flex;gap:0.4375rem;flex-wrap:wrap;font-size:0.6875rem;
}
.hud .pill{
  background:rgba(5,8,22,0.72);
  border:0.0625rem solid rgba(223,245,251,0.25);
  border-radius:0.25rem;padding:0.4375rem 0.625rem;letter-spacing:0.16em;
  text-transform:uppercase;display:flex;gap:0.4375rem;align-items:center;
  min-height:2.25rem;color:var(--foam);backdrop-filter:blur(3px);
}
.hud b{font-family:'Major Mono Display',monospace;color:var(--cyan);font-size:0.875rem;font-weight:400}
.hud .pill button{
  background:transparent;border:0;color:inherit;cursor:pointer;
  font-family:inherit;font-size:inherit;letter-spacing:inherit;text-transform:inherit;
  padding:0;min-height:0;
}
.hud .pill[role="button"]{cursor:pointer}
.hud .pill:focus-visible, .hud .pill button:focus-visible{outline:0.1875rem solid var(--gold);outline-offset:0.125rem}

/* Settings drawer (slides up from bottom) */
.drawer{
  position:absolute;left:0;right:0;bottom:0;z-index:10;
  background:linear-gradient(0deg, rgba(5,8,22,0.94), rgba(5,8,22,0.78) 60%, rgba(5,8,22,0));
  padding:1.25rem 1rem 1.5rem;
  transform:translateY(calc(100% + 0.5rem));
  transition:transform 0.22s ease-out;
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(11rem, 1fr));
  gap:0.875rem 1.25rem;max-width:64rem;margin:0 auto;
  pointer-events:none;
}
.drawer.show{transform:translateY(0);pointer-events:auto}
.drawer label{
  display:flex;flex-direction:column;gap:0.25rem;
  font-family:'Major Mono Display',monospace;font-size:0.6875rem;letter-spacing:0.18em;
  color:rgba(223,245,251,0.7);text-transform:uppercase;
}
.drawer label .val{
  color:var(--cyan);font-family:'Major Mono Display',monospace;font-size:0.875rem;
}
.drawer input[type="range"]{
  -webkit-appearance:none;appearance:none;
  background:rgba(223,245,251,0.18);height:0.25rem;border-radius:0.125rem;outline:none;
  width:100%;
}
.drawer input[type="range"]::-webkit-slider-thumb{
  -webkit-appearance:none;width:0.875rem;height:0.875rem;border-radius:50%;
  background:var(--cyan);cursor:pointer;box-shadow:0 0 0.5rem rgba(122,220,255,0.7);
}
.drawer input[type="range"]::-moz-range-thumb{
  width:0.875rem;height:0.875rem;border-radius:50%;
  background:var(--cyan);cursor:pointer;box-shadow:0 0 0.5rem rgba(122,220,255,0.7);border:0;
}
.drawer input[type="range"]:focus-visible{outline:0.1875rem solid var(--gold);outline-offset:0.125rem}
.drawer .toggle{
  display:flex;align-items:center;justify-content:space-between;
}
.drawer .toggle button{
  background:transparent;border:0.0625rem solid rgba(223,245,251,0.30);
  color:var(--foam);font-family:'Major Mono Display',monospace;
  padding:0.3125rem 0.5rem;border-radius:0.125rem;cursor:pointer;
  font-size:0.75rem;min-height:2rem;
}
.drawer .toggle button[aria-pressed="true"]{background:var(--cyan);color:var(--ink);border-color:var(--cyan)}
.drawer .toggle button:focus-visible{outline:0.1875rem solid var(--gold);outline-offset:0.125rem}
.drawer .palette{display:flex;gap:0.375rem;flex-wrap:wrap}
.drawer .palette button{
  width:1.625rem;height:1.625rem;border-radius:50%;cursor:pointer;
  border:0.125rem solid transparent;background-color:#888;
  padding:0;
}
.drawer .palette button[aria-pressed="true"]{border-color:var(--gold);box-shadow:0 0 0.5rem rgba(245,196,83,0.7)}
.drawer .palette button:focus-visible{outline:0.1875rem solid var(--gold);outline-offset:0.125rem}

/* hint at bottom */
.hint{
  position:absolute;bottom:1rem;left:50%;transform:translateX(-50%);z-index:5;
  font-family:'Cormorant Garamond',serif;font-style:italic;
  color:rgba(223,245,251,0.55);font-size:0.9375rem;
  pointer-events:none;text-align:center;
  text-shadow:0 0.125rem 0.5rem rgba(0,0,0,0.7);
  transition:opacity 0.4s;
}
.hint.fade{opacity:0}

@media (max-width:560px){
  .brand .tag{display:none}
}
@media (prefers-reduced-motion: reduce){
  .drawer{transition:none}
  .hint{transition:none}
}

.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap}
</style>

<body>

<a href="#stage" class="skip-link">Skip to flock</a>

<main>
  <canvas id="stage" tabindex="0" role="application"
          aria-label="Electric Sheep — glowing particles flocking like sheep across a dark void. Move the mouse to herd them; click to scatter with thunder.">
  </canvas>

  <div class="brand">
    <h1><span class="accent">ELECTRIC</span> SHEEP</h1>
    <div class="tag">— do androids dream? —</div>
  </div>

  <div class="hud" role="status" aria-live="polite">
    <div class="pill" aria-label="Flock size"><span>FLOCK</span> <b id="hCount">0</b></div>
    <div class="pill" aria-label="Frames per second"><span>FPS</span> <b id="hFps">—</b></div>
    <div class="pill" id="modePill" role="button" tabindex="0" aria-pressed="false" aria-label="Toggle herd / scatter cursor mode">
      <span>CURSOR</span> <b id="hMode">HERD</b>
    </div>
    <div class="pill" id="settingsPill" role="button" tabindex="0" aria-label="Toggle settings panel">
      <span>SETTINGS</span> <b>⚙</b>
    </div>
  </div>

  <div class="drawer" id="drawer" aria-label="Flock settings">
    <label>
      <span>HERD SIZE <span class="val" id="vCount">280</span></span>
      <input id="iCount" type="range" min="40" max="500" value="280" step="10">
    </label>
    <label>
      <span>SEPARATION <span class="val" id="vSep">1.6</span></span>
      <input id="iSep" type="range" min="0" max="3" step="0.05" value="1.6">
    </label>
    <label>
      <span>ALIGNMENT <span class="val" id="vAlign">1.2</span></span>
      <input id="iAlign" type="range" min="0" max="3" step="0.05" value="1.2">
    </label>
    <label>
      <span>COHESION <span class="val" id="vCoh">1.0</span></span>
      <input id="iCoh" type="range" min="0" max="3" step="0.05" value="1.0">
    </label>
    <label>
      <span>TRAILS <span class="val" id="vTrail">0.10</span></span>
      <input id="iTrail" type="range" min="0.04" max="0.30" step="0.01" value="0.10">
    </label>
    <label>
      <span>MAX SPEED <span class="val" id="vSpeed">130</span></span>
      <input id="iSpeed" type="range" min="50" max="260" step="5" value="130">
    </label>
    <div class="toggle">
      <span style="font-family:'Major Mono Display',monospace;font-size:0.6875rem;letter-spacing:0.18em;color:rgba(223,245,251,0.7);text-transform:uppercase">WOLVES</span>
      <button id="bWolves" type="button" aria-pressed="false" aria-label="Toggle wolves predator">OFF</button>
    </div>
    <div class="toggle">
      <span style="font-family:'Major Mono Display',monospace;font-size:0.6875rem;letter-spacing:0.18em;color:rgba(223,245,251,0.7);text-transform:uppercase">AUDIO</span>
      <button id="bAudio" type="button" aria-pressed="false" aria-label="Toggle audio">OFF</button>
    </div>
    <label>
      <span>PALETTE</span>
      <div class="palette" id="palette" role="radiogroup" aria-label="Color palette">
        <button type="button" data-pal="halcyon" aria-pressed="true" aria-label="Halcyon — cyan and magenta"
                style="background:linear-gradient(135deg,#7adcff,#ff5ec8)"></button>
        <button type="button" data-pal="dusk" aria-pressed="false" aria-label="Dusk — violet and amber"
                style="background:linear-gradient(135deg,#a86bff,#f5c453)"></button>
        <button type="button" data-pal="abyss" aria-pressed="false" aria-label="Abyss — teal and white"
                style="background:linear-gradient(135deg,#5fc1b3,#dff5fb)"></button>
        <button type="button" data-pal="ember" aria-pressed="false" aria-label="Ember — orange and red"
                style="background:linear-gradient(135deg,#f5c453,#e7445a)"></button>
      </div>
    </label>
  </div>

  <div class="hint" id="hint">move the mouse to herd · click to scatter · ⚙ to tune</div>
</main>

<script>
"use strict";

// ============================================================
// ELECTRIC SHEEP — boids flock with glow + dark-void aesthetic
// ============================================================

const cvs = document.getElementById('stage');
const ctx = cvs.getContext('2d');
let W = 0, H = 0, DPR = 1;

function fit(){
  DPR = Math.min(window.devicePixelRatio || 1, 1.5);
  const r = cvs.getBoundingClientRect();
  W = Math.max(320, Math.floor(r.width));
  H = Math.max(240, Math.floor(r.height));
  cvs.width  = Math.floor(W * DPR);
  cvs.height = Math.floor(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', fit);
fit();

// === Palettes ===
const PALETTES = {
  halcyon: { hueA:185, hueB:315, alpha:60, gold:48, bg:'#050816' },
  dusk:    { hueA:268, hueB: 38, alpha:60, gold:48, bg:'#0a0418' },
  abyss:   { hueA:170, hueB:200, alpha:55, gold:48, bg:'#020812' },
  ember:   { hueA: 22, hueB:354, alpha:60, gold:50, bg:'#170304' },
};
let palKey = 'halcyon';
function PAL(){ return PALETTES[palKey]; }

// === Settings (mutable from drawer UI) ===
const cfg = {
  count: 280,
  sepW: 1.6,
  alignW: 1.2,
  cohW: 1.0,
  maxSpeed: 130,
  trailFade: 0.10,
  wolvesOn: false,
  audioOn: false,
};

// === Sheep + wolves ===
const sheep = [];
const wolves = [];
function makeSheep(){
  const p = PAL();
  // Hue pulled from a span around the palette's two anchors
  const useA = Math.random() < 0.55;
  const baseH = useA ? p.hueA : p.hueB;
  const hue = (baseH + (Math.random() - 0.5) * p.alpha + 360) % 360;
  return {
    x: Math.random() * W,
    y: Math.random() * H,
    vx: (Math.random() - 0.5) * 50,
    vy: (Math.random() - 0.5) * 50,
    hue,
    size: 1.2 + Math.random() * 1.4,
    isAlpha: Math.random() < 0.04,    // 4% are gold "alphas"
    seed: Math.random() * 1000,
  };
}
function makeWolf(){
  return {
    x: Math.random() * W,
    y: Math.random() * H,
    vx: (Math.random() - 0.5) * 80,
    vy: (Math.random() - 0.5) * 80,
    hunger: 0,
  };
}
function reseedFlock(){
  sheep.length = 0;
  for (let i = 0; i < cfg.count; i++) sheep.push(makeSheep());
}
reseedFlock();

// === Lightning clouds (chat ask) ===
// Soft drifting cloud blobs that periodically zap a sheep (or cluster
// centre) with a jagged bolt. Zapped sheep get a temporary high-speed
// dash. Clicking on a cloud also triggers a manual zap from it.
const clouds = [];
const bolts  = [];        // { ax, ay, bx, by, life, maxLife }
function spawnClouds(){
  clouds.length = 0;
  const n = 2 + Math.floor(Math.random() * 2);
  for (let i = 0; i < n; i++){
    clouds.push({
      x: Math.random() * W,
      y: H * (0.10 + Math.random() * 0.18),
      vx: (Math.random() - 0.5) * 14,
      r: 70 + Math.random() * 60,
      cd: 1.5 + Math.random() * 2,        // initial countdown to first zap
      seed: Math.random() * 999,
    });
  }
}
spawnClouds();

function tickClouds(dt){
  for (const c of clouds){
    c.x += c.vx * dt;
    if (c.x < -c.r) c.x += W + c.r * 2;
    if (c.x > W + c.r) c.x -= W + c.r * 2;
    c.cd -= dt;
    if (c.cd <= 0){
      autoZapFrom(c);
      c.cd = 3 + Math.random() * 4;       // next zap in 3-7s
    }
  }
  for (let i = bolts.length - 1; i >= 0; i--){
    bolts[i].life -= dt;
    if (bolts[i].life <= 0) bolts.splice(i, 1);
  }
}

function autoZapFrom(cloud){
  // Aim at the densest sheep cluster within reach, otherwise random sheep
  let best = null, bestN = 0;
  for (const s of sheep){
    let near = 0;
    for (const o of sheep){
      if (o === s) continue;
      const dx = o.x - s.x, dy = o.y - s.y;
      if (dx*dx + dy*dy < 90*90) near++;
      if (near > 6) break;   // good enough
    }
    if (near > bestN){ bestN = near; best = s; }
  }
  const tgt = best || sheep[Math.floor(Math.random() * sheep.length)];
  if (tgt) zapAt(cloud.x, cloud.y, tgt.x, tgt.y, tgt);
}

function zapAt(ax, ay, bx, by, target){
  bolts.push({ ax, ay, bx, by, life: 0.42, maxLife: 0.42 });
  // Apply dash to target + nearby sheep (chain shock)
  const STRIKE_R = 90;
  for (const s of sheep){
    const dx = s.x - bx, dy = s.y - by;
    const d2 = dx * dx + dy * dy;
    if (s === target || d2 < STRIKE_R * STRIKE_R){
      // Direction = away from strike point (sheep panic outward)
      const d = Math.sqrt(d2) || 1;
      // For the direct target there's no offset, kick in a random dir
      const ang = (s === target)
        ? Math.random() * Math.PI * 2
        : Math.atan2(dy, dx);
      const boost = 320 + Math.random() * 220;
      s.vx = Math.cos(ang) * boost;
      s.vy = Math.sin(ang) * boost;
      s.dashUntil = performance.now() + 1100 + Math.random() * 400;
      s.dashHue = 60 + Math.random() * 40;   // electric-yellow flash
    }
  }
  zapSound();
}
function zapSound(){
  if (!actx || !masterGain) return;
  const t = actx.currentTime;
  // Crackling noise burst + falling square chirp
  const dur = 0.18;
  const buf = actx.createBuffer(1, Math.floor(actx.sampleRate * dur), actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++){
    const env = Math.exp(-i / d.length * 6);
    d[i] = (Math.random() * 2 - 1) * env;
  }
  const src = actx.createBufferSource(); src.buffer = buf;
  const bp = actx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value = 2400; bp.Q.value = 1.4;
  const g = actx.createGain(); g.gain.value = 0.16;
  src.connect(bp); bp.connect(g); g.connect(masterGain);
  src.start(t);
  const o = actx.createOscillator(); o.type='square';
  o.frequency.setValueAtTime(1400, t);
  o.frequency.exponentialRampToValueAtTime(420, t + dur);
  const og = actx.createGain(); og.gain.value = 0;
  o.connect(og); og.connect(masterGain);
  og.gain.linearRampToValueAtTime(0.10, t + 0.005);
  og.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.start(t); o.stop(t + dur + 0.05);
  // Detuned chord blossom — ride the current drone chord with three
  // slightly-detuned sine voices that swell and fade across ~0.9s.
  // The blossom locks into the harmony so zaps sound musical, not
  // dissonant.
  const chord = DRONE_CHORDS[chordIdx];
  const blossomDur = 0.9;
  for (let v = 0; v < 3; v++){
    const ofreq = chord[(v + 1) % chord.length] * 4;   // octave-up detune
    const detune = 1 + (Math.random() - 0.5) * 0.012;
    const oo = actx.createOscillator(); oo.type='sine';
    oo.frequency.value = ofreq * detune;
    const og = actx.createGain(); og.gain.value = 0;
    oo.connect(og); og.connect(masterGain);
    og.gain.linearRampToValueAtTime(0.06, t + 0.04);
    og.gain.exponentialRampToValueAtTime(0.001, t + blossomDur);
    oo.start(t); oo.stop(t + blossomDur + 0.05);
  }
}

function drawClouds(){
  ctx.save();
  for (const c of clouds){
    // soft puffy halo
    const grad = ctx.createRadialGradient(c.x, c.y, 5, c.x, c.y, c.r);
    grad.addColorStop(0, 'rgba(223,235,255,0.32)');
    grad.addColorStop(0.6, 'rgba(135,150,200,0.16)');
    grad.addColorStop(1, 'rgba(60,70,100,0)');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.arc(c.x, c.y, c.r, 0, Math.PI*2); ctx.fill();
    // dark underbelly
    ctx.fillStyle = 'rgba(20,20,40,0.30)';
    ctx.beginPath();
    ctx.ellipse(c.x, c.y + c.r * 0.35, c.r * 0.85, c.r * 0.32, 0, 0, Math.PI*2);
    ctx.fill();
    // pulsing-charge dot — bigger as cooldown nears 0
    const charge = Math.max(0, Math.min(1, 1 - c.cd / 4));
    if (charge > 0.15){
      const a = 0.25 + 0.55 * charge;
      ctx.fillStyle = `rgba(245,196,83,${a})`;
      ctx.beginPath();
      ctx.arc(c.x, c.y + c.r * 0.30, 3 + 4 * charge, 0, Math.PI*2);
      ctx.fill();
    }
  }
  ctx.restore();
}
function drawBolts(){
  if (!bolts.length) return;
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (const b of bolts){
    const a = Math.max(0, b.life / b.maxLife);
    drawJaggedBolt(b.ax, b.ay, b.bx, b.by, a);
  }
  ctx.restore();
}
function drawJaggedBolt(ax, ay, bx, by, alpha){
  const dx = bx - ax, dy = by - ay;
  const len = Math.hypot(dx, dy) || 1;
  const px = -dy / len, py = dx / len;
  const segs = Math.max(6, Math.min(18, Math.round(len / 22)));
  const pts = [{ x: ax, y: ay }];
  for (let i = 1; i < segs; i++){
    const t = i / segs;
    const jit = (Math.random() - 0.5) * Math.min(28, len * 0.18);
    pts.push({ x: ax + dx * t + px * jit, y: ay + dy * t + py * jit });
  }
  pts.push({ x: bx, y: by });
  // outer cyan glow
  ctx.strokeStyle = `rgba(122,220,255,${alpha * 0.85})`;
  ctx.lineWidth = 6;
  ctx.lineCap = 'round';
  ctx.shadowColor = 'rgba(122,220,255,0.9)';
  ctx.shadowBlur = 14;
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  for (let i = 1; i < pts.length; i++) ctx.lineTo(pts[i].x, pts[i].y);
  ctx.stroke();
  // bright inner core
  ctx.strokeStyle = `rgba(255,255,255,${alpha})`;
  ctx.lineWidth = 2;
  ctx.shadowBlur = 0;
  ctx.stroke();
  // strike sparks at the end
  ctx.fillStyle = `rgba(255,250,180,${alpha})`;
  for (let k = 0; k < 6; k++){
    const sx = bx + (Math.random() - 0.5) * 22;
    const sy = by + (Math.random() - 0.5) * 22;
    ctx.beginPath(); ctx.arc(sx, sy, 1.4, 0, Math.PI*2); ctx.fill();
  }
}

// === Mouse / cursor mode ===
let mouseX = -1000, mouseY = -1000;
let mouseInside = false;
let cursorMode = 'herd';   // 'herd' = sheep gently steer toward, 'scatter' = recoil
let scatterPulses = [];    // { x, y, t, ttl }

cvs.addEventListener('pointermove', e => {
  const r = cvs.getBoundingClientRect();
  mouseX = e.clientX - r.left;
  mouseY = e.clientY - r.top;
  mouseInside = true;
  fadeHint();
});
cvs.addEventListener('pointerleave', () => { mouseInside = false; });
cvs.addEventListener('pointerdown', e => {
  ensureAudio();
  const r = cvs.getBoundingClientRect();
  const px = e.clientX - r.left, py = e.clientY - r.top;
  // Did the click land on a cloud? If so, fire a manual zap from it
  // toward the nearest sheep instead of a generic scatter pulse.
  for (const c of clouds){
    const dx = px - c.x, dy = py - c.y;
    if (dx * dx + dy * dy < c.r * c.r){
      // Find nearest sheep to the clicked point
      let nearest = null, nd2 = Infinity;
      for (const s of sheep){
        const sd = (s.x - px) * (s.x - px) + (s.y - py) * (s.y - py);
        if (sd < nd2){ nd2 = sd; nearest = s; }
      }
      if (nearest){
        zapAt(c.x, c.y, nearest.x, nearest.y, nearest);
        c.cd = 3 + Math.random() * 4;
        fadeHint();
        return;
      }
    }
  }
  scatterPulses.push({ x: px, y: py, t: 0, ttl: 0.5 });
  thunder();
  fadeHint();
});

// === Audio — reactive generative drone (chat ask) ===
// Three voices stacked in fifths (root + fifth + octave). The drone's
// "movement" is driven by the flock: per-tick we compute average sheep
// speed and average local-cluster density and use them to:
//   - shift the oscillator pitches (faster flock = brighter; denser =
//     deeper bass weight)
//   - sweep the lowpass filter (movement opens it; calm closes it)
//   - layer a brighter pad during dash bursts (zap chord swell)
// Chord choice rotates through a 4-step modal palette every ~16s so
// the drone never sits in the same harmony for long.
let actx = null, masterGain = null, droneGain = null;
let voices = [];                  // {osc, gain}
let droneFilter = null;
let dashPad = null, dashPadGain = null;
const DRONE_CHORDS = [
  // Aeolian
  [55, 65.4, 82.4, 110],
  // Dorian
  [49, 65.4, 73.4, 98],
  // Mixolydian
  [55, 73.4, 82.4, 110],
  // Phrygian
  [52, 61.7, 78, 104],
];
let chordIdx = 0, chordT = 0;

function ensureAudio(){
  if (actx) return;
  try{
    actx = new (window.AudioContext||window.webkitAudioContext)();
    masterGain = actx.createGain();
    masterGain.gain.value = cfg.audioOn ? 0.30 : 0;
    masterGain.connect(actx.destination);
    droneGain = actx.createGain(); droneGain.gain.value = 0.07;
    droneGain.connect(masterGain);
    droneFilter = actx.createBiquadFilter();
    droneFilter.type = 'lowpass';
    droneFilter.frequency.value = 360;
    droneFilter.Q.value = 0.7;
    droneFilter.connect(droneGain);
    const types = ['sine', 'triangle', 'sine', 'triangle'];
    const chord = DRONE_CHORDS[0];
    voices = [];
    for (let i = 0; i < 4; i++){
      const o = actx.createOscillator();
      o.type = types[i];
      o.frequency.value = chord[i];
      const g = actx.createGain();
      g.gain.value = i === 0 ? 0.55 : (i === 3 ? 0.18 : 0.30);
      o.connect(g); g.connect(droneFilter);
      o.start();
      voices.push({ osc: o, gain: g, baseFreq: chord[i] });
    }
    // Dash pad — a brighter mid-band layer that swells with each zap
    dashPadGain = actx.createGain(); dashPadGain.gain.value = 0;
    dashPadGain.connect(masterGain);
    dashPad = actx.createOscillator();
    dashPad.type = 'sawtooth';
    dashPad.frequency.value = 220;
    const padLp = actx.createBiquadFilter(); padLp.type = 'lowpass';
    padLp.frequency.value = 1400; padLp.Q.value = 0.9;
    dashPad.connect(padLp); padLp.connect(dashPadGain);
    dashPad.start();
  } catch(e){}
}

// Smoothed reactive params (0..1)
let _moveSm = 0, _densSm = 0, _dashSm = 0;
function updateGenerativeAudio(dt){
  if (!actx || !droneFilter || !voices.length) return;
  // 1) Average sheep speed (normalized to maxSpeed)
  let sum = 0;
  for (const s of sheep) sum += Math.hypot(s.vx, s.vy);
  const avg = sheep.length ? sum / sheep.length : 0;
  const moveNorm = Math.min(1, avg / Math.max(40, cfg.maxSpeed));
  _moveSm += (moveNorm - _moveSm) * Math.min(1, dt * 2.5);
  // 2) Density proxy = inverse of average bbox spread
  let mnx = Infinity, mny = Infinity, mxx = -Infinity, mxy = -Infinity;
  for (let i = 0; i < sheep.length; i += 4){   // sample every 4th for cheap
    const s = sheep[i];
    if (s.x < mnx) mnx = s.x; if (s.x > mxx) mxx = s.x;
    if (s.y < mny) mny = s.y; if (s.y > mxy) mxy = s.y;
  }
  const spread = Math.max(1, Math.hypot(mxx - mnx, mxy - mny));
  const density = Math.min(1, 600 / spread);
  _densSm += (density - _densSm) * Math.min(1, dt * 2);
  // 3) Dash energy: how many sheep are currently dashing
  const now = performance.now();
  let dashing = 0;
  for (const s of sheep) if (s.dashUntil && s.dashUntil > now) dashing++;
  const dashNorm = Math.min(1, dashing / Math.max(1, sheep.length * 0.20));
  _dashSm += (dashNorm - _dashSm) * Math.min(1, dt * 4);
  // 4) Rotate the chord every ~16s
  chordT += dt;
  if (chordT > 16){
    chordT = 0;
    chordIdx = (chordIdx + 1) % DRONE_CHORDS.length;
  }
  const chord = DRONE_CHORDS[chordIdx];
  // 5) Apply: pitch glide toward chord*pitchMult, filter sweep, pad gain
  const pitchMult = 1 + _moveSm * 0.18;        // faster flock = brighter
  const t = actx.currentTime;
  for (let i = 0; i < voices.length; i++){
    const v = voices[i];
    const target = chord[i] * pitchMult;
    v.osc.frequency.cancelScheduledValues(t);
    v.osc.frequency.setTargetAtTime(target, t, 0.4);
    // Bass voice pumps up with density; high voice with movement
    const targetGain = i === 0 ? 0.45 + _densSm * 0.18
                     : i === 3 ? 0.10 + _moveSm * 0.18
                     :           0.25 + _moveSm * 0.10;
    v.gain.gain.cancelScheduledValues(t);
    v.gain.gain.setTargetAtTime(targetGain, t, 0.5);
  }
  // Filter opens with movement
  const targetLp = 220 + _moveSm * 1100 + _dashSm * 900;
  droneFilter.frequency.cancelScheduledValues(t);
  droneFilter.frequency.setTargetAtTime(targetLp, t, 0.25);
  // Dash pad gain
  if (dashPadGain){
    const padG = _dashSm * 0.12;
    dashPadGain.gain.cancelScheduledValues(t);
    dashPadGain.gain.setTargetAtTime(padG, t, 0.15);
  }
  if (dashPad){
    // Pad pitch follows chord root × 4 (high octave) + slight movement detune
    const padTarget = chord[0] * 4 * (1 + _moveSm * 0.04);
    dashPad.frequency.cancelScheduledValues(t);
    dashPad.frequency.setTargetAtTime(padTarget, t, 0.20);
  }
}
function setAudio(on){
  cfg.audioOn = on;
  if (masterGain) masterGain.gain.value = on ? 0.30 : 0;
  const btn = document.getElementById('bAudio');
  btn.textContent = on ? 'ON' : 'OFF';
  btn.setAttribute('aria-pressed', on ? 'true' : 'false');
}
function thunder(){
  if (!actx || !masterGain) return;
  const t = actx.currentTime;
  // bandpass-noise burst, low rumble underneath
  const dur = 0.55;
  const buf = actx.createBuffer(1, Math.floor(actx.sampleRate * dur), actx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++){
    const env = Math.exp(-i / d.length * 4);
    d[i] = (Math.random() * 2 - 1) * env;
  }
  const src = actx.createBufferSource(); src.buffer = buf;
  const bp = actx.createBiquadFilter(); bp.type='bandpass'; bp.frequency.value = 800; bp.Q.value = 0.6;
  const g = actx.createGain(); g.gain.value = 0.20;
  src.connect(bp); bp.connect(g); g.connect(masterGain);
  src.start(t);
  // sub rumble
  const o = actx.createOscillator(); o.type='sawtooth';
  o.frequency.setValueAtTime(80, t);
  o.frequency.exponentialRampToValueAtTime(28, t + dur);
  const og = actx.createGain(); og.gain.value = 0;
  o.connect(og); og.connect(masterGain);
  og.gain.linearRampToValueAtTime(0.16, t + 0.02);
  og.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.start(t); o.stop(t + dur + 0.05);
}

// === Boids physics ===
// Spatial hash: bin the sheep into cells of size ~max-radius for cheap
// neighbor lookup — keeps the per-frame cost roughly O(N) instead of
// O(N²) at large flock sizes.
const CELL = 80;
let grid = new Map();
function gridKey(cx, cy){ return cx * 4096 + cy; }
function rebuildGrid(){
  grid.clear();
  for (const s of sheep){
    const cx = Math.floor(s.x / CELL);
    const cy = Math.floor(s.y / CELL);
    const k = gridKey(cx, cy);
    let arr = grid.get(k);
    if (!arr){ arr = []; grid.set(k, arr); }
    arr.push(s);
  }
}
function neighborsOf(s, out){
  out.length = 0;
  const cx = Math.floor(s.x / CELL);
  const cy = Math.floor(s.y / CELL);
  for (let dx = -1; dx <= 1; dx++){
    for (let dy = -1; dy <= 1; dy++){
      const arr = grid.get(gridKey(cx + dx, cy + dy));
      if (!arr) continue;
      for (const o of arr) out.push(o);
    }
  }
  return out;
}

const _nb = [];
function tickFlock(dt){
  const SEP_R = 28;
  const ALIGN_R = 60;
  const COH_R = 80;
  const SEP_R2 = SEP_R * SEP_R;
  const ALIGN_R2 = ALIGN_R * ALIGN_R;
  const COH_R2 = COH_R * COH_R;
  const MAX_F = 80;        // force cap
  rebuildGrid();
  const cursorPullR = 180;
  const scatterR = 240;
  for (const s of sheep){
    let sepX = 0, sepY = 0, sepN = 0;
    let alignX = 0, alignY = 0, alignN = 0;
    let cohX = 0, cohY = 0, cohN = 0;
    neighborsOf(s, _nb);
    for (let i = 0; i < _nb.length; i++){
      const o = _nb[i];
      if (o === s) continue;
      const dx = o.x - s.x, dy = o.y - s.y;
      const d2 = dx * dx + dy * dy;
      if (d2 < SEP_R2 && d2 > 0.001){
        const inv = 1 / Math.sqrt(d2);
        sepX -= dx * inv; sepY -= dy * inv;
        sepN++;
      }
      if (d2 < ALIGN_R2){
        alignX += o.vx; alignY += o.vy;
        alignN++;
      }
      if (d2 < COH_R2){
        cohX += o.x; cohY += o.y;
        cohN++;
      }
    }
    if (sepN > 0){ sepX /= sepN; sepY /= sepN; }
    if (alignN > 0){ alignX = alignX / alignN - s.vx; alignY = alignY / alignN - s.vy; }
    if (cohN > 0){ cohX = cohX / cohN - s.x; cohY = cohY / cohN - s.y; }
    let ax = sepX * cfg.sepW * 60 + alignX * cfg.alignW * 0.8 + cohX * cfg.cohW * 0.04;
    let ay = sepY * cfg.sepW * 60 + alignY * cfg.alignW * 0.8 + cohY * cfg.cohW * 0.04;
    // Mouse force
    if (mouseInside){
      const mdx = s.x - mouseX, mdy = s.y - mouseY;
      const md2 = mdx * mdx + mdy * mdy;
      const R = cursorMode === 'herd' ? cursorPullR : scatterR;
      if (md2 < R * R){
        const md = Math.sqrt(md2) || 0.1;
        const k = (1 - md / R);
        if (cursorMode === 'herd'){
          // Soft attraction within cursorPullR — sheep gravitate toward shepherd
          ax += -mdx / md * k * 30;
          ay += -mdy / md * k * 30;
        } else {
          // Scatter — push outward strongly
          ax +=  mdx / md * k * 240;
          ay +=  mdy / md * k * 240;
        }
      }
    }
    // Scatter pulses (clicks)
    for (let p = 0; p < scatterPulses.length; p++){
      const pl = scatterPulses[p];
      const pdx = s.x - pl.x, pdy = s.y - pl.y;
      const pd2 = pdx * pdx + pdy * pdy;
      const PR = 220;
      if (pd2 < PR * PR){
        const pd = Math.sqrt(pd2) || 0.1;
        const k = (1 - pd / PR) * (1 - pl.t / pl.ttl);
        ax += pdx / pd * k * 600;
        ay += pdy / pd * k * 600;
      }
    }
    // Wolf avoidance
    if (cfg.wolvesOn){
      for (const w of wolves){
        const wdx = s.x - w.x, wdy = s.y - w.y;
        const wd2 = wdx * wdx + wdy * wdy;
        const WR = 130;
        if (wd2 < WR * WR){
          const wd = Math.sqrt(wd2) || 0.1;
          const k = (1 - wd / WR);
          ax += wdx / wd * k * 320;
          ay += wdy / wd * k * 320;
        }
      }
    }
    // Cap force
    const af = Math.hypot(ax, ay);
    if (af > MAX_F){ ax *= MAX_F / af; ay *= MAX_F / af; }
    s.vx += ax * dt;
    s.vy += ay * dt;
    // Cap speed — zapped sheep get a temporary dash ceiling
    const dashing = s.dashUntil && s.dashUntil > performance.now();
    const sp = Math.hypot(s.vx, s.vy);
    const ms = cfg.maxSpeed * (s.isAlpha ? 1.15 : 1) * (dashing ? 4.0 : 1);
    if (sp > ms){ s.vx *= ms / sp; s.vy *= ms / sp; }
    s.x += s.vx * dt;
    s.y += s.vy * dt;
    // Toroidal wrap — the void loops
    if (s.x < -10) s.x += W + 20;
    else if (s.x > W + 10) s.x -= W + 20;
    if (s.y < -10) s.y += H + 20;
    else if (s.y > H + 10) s.y -= H + 20;
  }
  // Tick scatter pulses
  for (let i = scatterPulses.length - 1; i >= 0; i--){
    scatterPulses[i].t += dt;
    if (scatterPulses[i].t > scatterPulses[i].ttl) scatterPulses.splice(i, 1);
  }
}

function tickWolves(dt){
  if (!cfg.wolvesOn){
    if (wolves.length) wolves.length = 0;
    return;
  }
  if (wolves.length === 0){
    for (let i = 0; i < 2; i++) wolves.push(makeWolf());
  }
  for (const w of wolves){
    // Steer toward nearest sheep clump
    let cx = 0, cy = 0, n = 0;
    let nearest = null, nd2 = Infinity;
    for (const s of sheep){
      const dx = s.x - w.x, dy = s.y - w.y;
      const d2 = dx * dx + dy * dy;
      if (d2 < 360 * 360){ cx += s.x; cy += s.y; n++; }
      if (d2 < nd2){ nd2 = d2; nearest = s; }
    }
    let ax = 0, ay = 0;
    if (n > 0){
      cx = cx / n - w.x; cy = cy / n - w.y;
      const m = Math.hypot(cx, cy) || 1;
      ax += cx / m * 80; ay += cy / m * 80;
    }
    if (nearest && nd2 < 80 * 80){
      // chomp — relocate the sheep to a far edge
      nearest.x = Math.random() * W;
      nearest.y = Math.random() * H;
      nearest.vx = (Math.random() - 0.5) * 40;
      nearest.vy = (Math.random() - 0.5) * 40;
    }
    w.vx += ax * dt; w.vy += ay * dt;
    const sp = Math.hypot(w.vx, w.vy);
    if (sp > 100){ w.vx *= 100 / sp; w.vy *= 100 / sp; }
    w.x += w.vx * dt; w.y += w.vy * dt;
    if (w.x < 0) w.x += W; if (w.x > W) w.x -= W;
    if (w.y < 0) w.y += H; if (w.y > H) w.y -= H;
  }
}

// === Render ===
function drawBackground(){
  // Trail-fade overlay — soft motion blur for the glow trails
  ctx.fillStyle = `rgba(5,8,22,${cfg.trailFade})`;
  ctx.fillRect(0, 0, W, H);
}
function drawFlock(){
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (const s of sheep){
    const sz = s.size + (s.isAlpha ? 1.2 : 0);
    const sat = s.isAlpha ? 90 : 80;
    const lit = s.isAlpha ? 78 : 65;
    const col = s.isAlpha
      ? `hsl(${PAL().gold}, 95%, 75%)`
      : `hsl(${s.hue}, ${sat}%, ${lit}%)`;
    // halo glow via radial gradient
    const r0 = sz * 8;
    const grad = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, r0);
    grad.addColorStop(0, col);
    grad.addColorStop(0.4, col.replace('hsl(', 'hsla(').replace(')', ',0.35)'));
    grad.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(s.x, s.y, r0, 0, Math.PI * 2);
    ctx.fill();
    // bright core
    ctx.fillStyle = '#ffffff';
    ctx.beginPath();
    ctx.arc(s.x, s.y, sz, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.restore();
}
function drawWolves(){
  if (!cfg.wolvesOn || wolves.length === 0) return;
  ctx.save();
  for (const w of wolves){
    // pulsing red mark
    const t = performance.now() * 0.005;
    const r = 8 + Math.sin(t) * 1.5;
    const grad = ctx.createRadialGradient(w.x, w.y, 0, w.x, w.y, 26);
    grad.addColorStop(0, 'rgba(231,68,90,0.9)');
    grad.addColorStop(1, 'rgba(231,68,90,0)');
    ctx.fillStyle = grad;
    ctx.globalCompositeOperation = 'lighter';
    ctx.beginPath(); ctx.arc(w.x, w.y, 26, 0, Math.PI*2); ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle = '#1a0408';
    ctx.beginPath(); ctx.arc(w.x, w.y, r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#ffe27a';
    ctx.beginPath(); ctx.arc(w.x - 2, w.y - 1, 1.4, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(w.x + 2, w.y - 1, 1.4, 0, Math.PI*2); ctx.fill();
  }
  ctx.restore();
}
function drawScatterPulses(){
  if (!scatterPulses.length) return;
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (const p of scatterPulses){
    const t = p.t / p.ttl;
    const r = 30 + t * 240;
    const a = (1 - t) * 0.55;
    ctx.strokeStyle = `rgba(255,255,255,${a})`;
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.arc(p.x, p.y, r, 0, Math.PI*2); ctx.stroke();
    ctx.strokeStyle = `rgba(122,220,255,${a * 0.8})`;
    ctx.beginPath(); ctx.arc(p.x, p.y, r * 0.85, 0, Math.PI*2); ctx.stroke();
  }
  ctx.restore();
}
function drawCursorRing(){
  if (!mouseInside) return;
  const t = performance.now() * 0.004;
  const a = 0.18 + 0.12 * Math.sin(t);
  ctx.save();
  ctx.strokeStyle = cursorMode === 'herd'
    ? `rgba(122,220,255,${a})`
    : `rgba(255,94,200,${a})`;
  ctx.lineWidth = 1.5;
  ctx.setLineDash([3, 5]);
  ctx.beginPath();
  ctx.arc(mouseX, mouseY, cursorMode === 'herd' ? 180 : 240, 0, Math.PI*2);
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

// === HUD ===
const hCount = document.getElementById('hCount');
const hFps = document.getElementById('hFps');
const hMode = document.getElementById('hMode');
let fpsAvg = 60, frames = 0, fpsT = 0;
function refreshHud(dt){
  frames++;
  fpsT += dt;
  if (fpsT > 0.5){
    fpsAvg = Math.round(frames / fpsT);
    frames = 0; fpsT = 0;
    hFps.textContent = fpsAvg;
  }
  hCount.textContent = sheep.length;
}

// === Loop (fixed-step physics) ===
const FIXED_DT = 1/120;
const MAX_DT = 0.25;
const MAX_STEPS = 8;
let prev = performance.now();
let physAcc = 0;
let paused = false;
function loop(now){
  let dt = (now - prev) / 1000;
  prev = now;
  if (dt > MAX_DT) dt = MAX_DT;
  if (!paused){
    physAcc += dt;
    let steps = 0;
    while (physAcc >= FIXED_DT && steps < MAX_STEPS){
      tickFlock(FIXED_DT);
      tickWolves(FIXED_DT);
      tickClouds(FIXED_DT);
      physAcc -= FIXED_DT;
      steps++;
    }
    updateGenerativeAudio(dt);
    if (steps >= MAX_STEPS) physAcc = 0;
  }
  drawBackground();
  drawClouds();
  drawFlock();
  drawWolves();
  drawScatterPulses();
  drawBolts();
  drawCursorRing();
  refreshHud(dt);
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// === Input — keyboard ===
window.addEventListener('keydown', e => {
  if (e.code === 'Space'){ e.preventDefault(); paused = !paused; }
  if (e.code === 'KeyM'){ ensureAudio(); setAudio(!cfg.audioOn); }
  if (e.code === 'KeyS'){ ensureAudio(); toggleScatter(); }
  if (e.code === 'KeyR'){ reseedFlock(); }
  if (e.code === 'KeyG'){ toggleDrawer(); }
});

// === Mode toggle (HERD vs SCATTER cursor) ===
function toggleScatter(){
  cursorMode = cursorMode === 'herd' ? 'scatter' : 'herd';
  hMode.textContent = cursorMode === 'herd' ? 'HERD' : 'SCATTER';
  document.getElementById('modePill').setAttribute('aria-pressed', cursorMode === 'scatter' ? 'true' : 'false');
}
document.getElementById('modePill').addEventListener('click', toggleScatter);
document.getElementById('modePill').addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' '){ e.preventDefault(); toggleScatter(); }
});

// === Settings drawer ===
const drawer = document.getElementById('drawer');
function toggleDrawer(){
  drawer.classList.toggle('show');
}
document.getElementById('settingsPill').addEventListener('click', toggleDrawer);
document.getElementById('settingsPill').addEventListener('keydown', e => {
  if (e.key === 'Enter' || e.key === ' '){ e.preventDefault(); toggleDrawer(); }
});

function bindSlider(id, valId, key, parser){
  const inp = document.getElementById(id);
  const out = document.getElementById(valId);
  inp.addEventListener('input', () => {
    const v = parser ? parser(inp.value) : parseFloat(inp.value);
    cfg[key] = v;
    out.textContent = (v === Math.floor(v) ? v.toString() : v.toFixed(2));
    if (key === 'count'){
      // Re-seed only if delta is large; otherwise grow/shrink in place
      while (sheep.length < cfg.count) sheep.push(makeSheep());
      while (sheep.length > cfg.count) sheep.pop();
    }
  });
}
bindSlider('iCount', 'vCount', 'count', v => parseInt(v, 10));
bindSlider('iSep',   'vSep',   'sepW');
bindSlider('iAlign', 'vAlign', 'alignW');
bindSlider('iCoh',   'vCoh',   'cohW');
bindSlider('iTrail', 'vTrail', 'trailFade');
bindSlider('iSpeed', 'vSpeed', 'maxSpeed', v => parseInt(v, 10));

document.getElementById('bWolves').addEventListener('click', () => {
  cfg.wolvesOn = !cfg.wolvesOn;
  const btn = document.getElementById('bWolves');
  btn.textContent = cfg.wolvesOn ? 'ON' : 'OFF';
  btn.setAttribute('aria-pressed', cfg.wolvesOn ? 'true' : 'false');
});
document.getElementById('bAudio').addEventListener('click', () => {
  ensureAudio();
  setAudio(!cfg.audioOn);
});

// Palette buttons
document.querySelectorAll('#palette button').forEach(b => {
  b.addEventListener('click', () => {
    palKey = b.dataset.pal;
    // Reseed colours by re-rolling each sheep's hue from the new palette
    for (const s of sheep){
      const newSheep = makeSheep();
      s.hue = newSheep.hue;
    }
    document.querySelectorAll('#palette button').forEach(o => {
      o.setAttribute('aria-pressed', o === b ? 'true' : 'false');
    });
  });
});

// === Hint fade ===
let hintFaded = false;
function fadeHint(){
  if (hintFaded) return;
  hintFaded = true;
  const el = document.getElementById('hint');
  el.classList.add('fade');
  setTimeout(() => el.remove(), 800);
}
</script>
</body>
