/* ═══ GAME 5: SPLIT & SUM (composite shapes) ════════════════ */
function makeSplitLevel(idx){
  // L-shapes / T-shapes — player computes total area by counting OR splitting
  const shapes = [
    // L-shape: 5×3 with a 2×2 corner removed
    { cells: [
        ...rectCells(5, 3).filter(([x,y]) => !(x >= 3 && y >= 1))
      ], label: 'L-shape' },
    // T-shape: 5×3 top + 3×2 below center
    { cells: [
        ...rectCells(5, 1),
        [1,1],[2,1],[3,1],
        [1,2],[2,2],[3,2],
      ], label: 'T-shape' },
    // Plus-shape
    { cells: [
        [1,0],[2,0],[3,0],
        [0,1],[1,1],[2,1],[3,1],[4,1],
        [1,2],[2,2],[3,2],
      ], label: 'plus-shape' },
    // bigger L: 6×4 with 3×2 corner removed
    { cells: rectCells(6, 4).filter(([x,y]) => !(x >= 3 && y >= 2)), label: 'big-L-shape' },
    // staircase
    { cells: [
        [0,0],
        [0,1],[1,1],
        [0,2],[1,2],[2,2],
        [0,3],[1,3],[2,3],[3,3],
      ], label: 'staircase' },
  ];
  const shape = shapes[idx];
  const cols = Math.max(...shape.cells.map(c => c[0])) + 1;
  const rows = Math.max(...shape.cells.map(c => c[1])) + 1;
  const g = svgGrid(cols, rows);
  const fill = svgFillCells(shape.cells, g.pad, '#b85ec0');
  const svg = svgWrap(g.w, g.h, g.pad, g.content + fill);
  const answer = shape.cells.length;
  return {
    html:
      '<div class="prompt">Find the total area of this <b>' + shape.label + '</b>. Tip: split it into rectangles, find each area, then add them up!</div>'
      + '<div class="canvas-area">' + svg + '</div>'
      + '<div class="answer-row">'
        + '<input type="number" id="ans-split" min="1" max="999" placeholder="?">'
        + '<span class="unit">square units</span>'
      + '</div>',
    hint: '<b>Tip:</b> Imagine drawing a line that splits the shape into 2 or 3 rectangles. Find the area of each rectangle (length × width), then add them all up. Or just count squares!',
    onMount(){
      setTimeout(() => document.getElementById('ans-split')?.focus(), 30);
    },
    check(){
      const v = +document.getElementById('ans-split').value;
      return v === answer;
    },
  };
}

/* ═══ GAME 6: TRIANGLES ═══════════════════════════════════ */
function makeTriLevel(idx){
  // Each level shows a triangle with a labeled base + perpendicular height.
  // Player computes area = (b × h) / 2.
  const levels = [
    { b: 4,  h: 6,  kind: 'right',  unit: 'sq cm' },
    { b: 10, h: 4,  kind: 'right',  unit: 'sq m' },
    { b: 8,  h: 5,  kind: 'iso',    unit: 'sq in' },
    { b: 12, h: 7,  kind: 'obtuse', unit: 'sq ft' },
    { b: 6,  h: 9,  kind: 'iso',    unit: 'sq m',
      story: 'A pirate flag is a triangle <b>6 feet wide</b> at the bottom and <b>9 feet tall</b>. What is its area?',
      icon: '🏴‍☠️',
    },
  ];
  const lv = levels[idx];
  const ans = (lv.b * lv.h) / 2;
  const svg = svgTriangle(lv.b, lv.h, lv.kind);
  return {
    html:
      '<div class="prompt">' + (lv.story
        ? lv.story
        : 'What is the area of this triangle with <b>base = ' + lv.b + '</b> and <b>height = ' + lv.h + '</b>?'
      ) + '</div>'
      + '<div class="canvas-area">' + (lv.icon ? '<div style="font-size:36px; text-align:center; margin-right:8px;">' + lv.icon + '</div>' : '') + svg + '</div>'
      + '<div class="answer-row">'
        + '<input type="number" id="ans-tri" min="1" max="999" placeholder="?" step="0.5">'
        + '<span class="unit">' + lv.unit + '</span>'
      + '</div>',
    hint: '<b>Tip:</b> Triangle area = (base × height) ÷ 2. So (' + lv.b + ' × ' + lv.h + ') ÷ 2 = ' + (lv.b * lv.h) + ' ÷ 2.',
    onMount(){ setTimeout(() => document.getElementById('ans-tri')?.focus(), 30); },
    check(){
      const v = +document.getElementById('ans-tri').value;
      return Math.abs(v - ans) < 0.01;
    },
  };
}
function svgTriangle(b, h, kind){
  const SCALE = 22;
  const W = b * SCALE, H = h * SCALE;
  const pad = 36;
  let pts;
  if (kind === 'right'){
    pts = [[0, H], [W, H], [0, 0]];
  } else if (kind === 'obtuse'){
    // apex BEYOND the base (height drawn outside)
    const ax = W * 1.15;
    pts = [[0, H], [W, H], [ax, 0]];
  } else {
    // isoceles
    pts = [[0, H], [W, H], [W / 2, 0]];
  }
  const maxX = Math.max(...pts.map(p => p[0]));
  const minX = Math.min(...pts.map(p => p[0]));
  const totW = maxX - minX + pad * 2;
  const totH = H + pad * 2;
  const tx = -minX + pad, ty = pad;
  const poly = pts.map(p => (p[0] + tx) + ',' + (p[1] + ty)).join(' ');
  let out = '<svg viewBox="0 0 ' + totW + ' ' + totH + '" width="' + Math.min(totW, 460) + '">';
  out += '<polygon points="' + poly + '" fill="#ff7a6f" stroke="#2a3848" stroke-width="2.5"/>';
  // height line (dashed) — perpendicular from apex DOWN to the base
  if (kind === 'right'){
    out += '<line x1="' + (tx + 0) + '" y1="' + (ty) + '" x2="' + (tx + 0) + '" y2="' + (ty + H)
      + '" stroke="#2a3848" stroke-width="1.5" stroke-dasharray="4 3"/>';
    out += '<text x="' + (tx - 4) + '" y="' + (ty + H / 2 + 4) + '" font-family="Fredoka" font-size="13" fill="#2a3848" text-anchor="end">h = ' + h + '</text>';
  } else if (kind === 'iso'){
    out += '<line x1="' + (tx + W / 2) + '" y1="' + (ty) + '" x2="' + (tx + W / 2) + '" y2="' + (ty + H)
      + '" stroke="#2a3848" stroke-width="1.5" stroke-dasharray="4 3"/>';
    out += '<text x="' + (tx + W / 2 + 6) + '" y="' + (ty + H / 2 + 4) + '" font-family="Fredoka" font-size="13" fill="#2a3848">h = ' + h + '</text>';
  } else {
    // obtuse: height dropped from apex straight DOWN past the base extension
    const ax = W * 1.15 + tx;
    out += '<line x1="' + ax + '" y1="' + (ty) + '" x2="' + ax + '" y2="' + (ty + H)
      + '" stroke="#2a3848" stroke-width="1.5" stroke-dasharray="4 3"/>';
    // base extension dashed
    out += '<line x1="' + (tx + W) + '" y1="' + (ty + H) + '" x2="' + ax + '" y2="' + (ty + H)
      + '" stroke="#2a3848" stroke-width="1" stroke-dasharray="3 3" opacity="0.6"/>';
    out += '<text x="' + (ax + 6) + '" y="' + (ty + H / 2 + 4) + '" font-family="Fredoka" font-size="13" fill="#2a3848">h = ' + h + '</text>';
  }
  // base label
  out += '<text x="' + (tx + W / 2) + '" y="' + (ty + H + 22) + '" font-family="Fredoka" font-size="13" fill="#2a3848" text-anchor="middle">b = ' + b + '</text>';
  out += '</svg>';
  return out;
}

/* ═══ GAME 7: PARALLELOGRAMS ═══════════════════════════════ */
function makeParaLevel(idx){
  const levels = [
    { b: 5, h: 4, slant: 0.25, unit: 'sq cm' },
    { b: 7, h: 3, slant: 0.35, unit: 'sq m' },
    { b: 10, h: 6, slant: 0.30, unit: 'sq in' },
    { b: 9, h: 8, slant: 0.40, unit: 'sq m' },
    { b: 12, h: 5, slant: 0.30, unit: 'sq m',
      story: 'A garden plot shaped like a parallelogram has a <b>base of 12 m</b> and a perpendicular <b>height of 5 m</b>. What is its area?',
      icon: '🌷',
    },
  ];
  const lv = levels[idx];
  const ans = lv.b * lv.h;
  const svg = svgParallelogram(lv.b, lv.h, lv.slant);
  return {
    html:
      '<div class="prompt">' + (lv.story
        ? lv.story
        : 'What is the area of this parallelogram? <b>base = ' + lv.b + '</b>, <b>height = ' + lv.h + '</b> (the perpendicular distance).'
      ) + '</div>'
      + '<div class="canvas-area">' + (lv.icon ? '<div style="font-size:36px; text-align:center; margin-right:8px;">' + lv.icon + '</div>' : '') + svg + '</div>'
      + '<div class="answer-row">'
        + '<input type="number" id="ans-para" min="1" max="999" placeholder="?">'
        + '<span class="unit">' + lv.unit + '</span>'
      + '</div>',
    hint: '<b>Tip:</b> Parallelogram area = base × height. The <i>slant</i> side doesn\'t matter — only the perpendicular height. So ' + lv.b + ' × ' + lv.h + '.',
    onMount(){ setTimeout(() => document.getElementById('ans-para')?.focus(), 30); },
    check(){
      const v = +document.getElementById('ans-para').value;
      return v === ans;
    },
  };
}
function svgParallelogram(b, h, slantFrac){
  const SCALE = 22;
  const W = b * SCALE, H = h * SCALE;
  const slant = H * (slantFrac || 0.3);
  const pad = 30;
  // points: top-left (slant, 0), top-right (slant+W, 0), bot-right (W, H), bot-left (0, H)
  const pts = [[slant, 0], [slant + W, 0], [W, H], [0, H]];
  const poly = pts.map(p => (p[0] + pad) + ',' + (p[1] + pad)).join(' ');
  const totW = slant + W + pad * 2;
  const totH = H + pad * 2;
  let out = '<svg viewBox="0 0 ' + totW + ' ' + totH + '" width="' + Math.min(totW, 460) + '">';
  out += '<polygon points="' + poly + '" fill="#6cb7e8" stroke="#2a3848" stroke-width="2.5"/>';
  // perpendicular height line (dashed) from top-left corner DOWN
  out += '<line x1="' + (slant + pad) + '" y1="' + pad + '" x2="' + (slant + pad) + '" y2="' + (H + pad)
    + '" stroke="#2a3848" stroke-width="1.5" stroke-dasharray="4 3"/>';
  // small right-angle square at the foot
  out += '<rect x="' + (slant + pad) + '" y="' + (H + pad - 7) + '" width="7" height="7" fill="none" stroke="#2a3848" stroke-width="1"/>';
  out += '<text x="' + (slant + pad - 6) + '" y="' + (pad + H / 2 + 4) + '" font-family="Fredoka" font-size="13" fill="#2a3848" text-anchor="end">h = ' + h + '</text>';
  // base label (bottom)
  out += '<text x="' + (W / 2 + pad) + '" y="' + (H + pad + 20) + '" font-family="Fredoka" font-size="13" fill="#2a3848" text-anchor="middle">b = ' + b + '</text>';
  out += '</svg>';
  return out;
}

/* ═══ GAME 8: TRAPEZOIDS ═══════════════════════════════════ */
function makeTrapLevel(idx){
  // Area = ½ × (b₁ + b₂) × h
  const levels = [
    { b1: 4, b2: 6, h: 3, unit: 'sq cm' },
    { b1: 5, b2: 9, h: 4, unit: 'sq m' },
    { b1: 6, b2: 10, h: 5, unit: 'sq in' },
    { b1: 3, b2: 11, h: 6, unit: 'sq ft' },
    { b1: 8, b2: 12, h: 7, unit: 'sq m',
      story: 'A trapezoid-shaped pool deck has a top edge of <b>8 m</b>, a bottom edge of <b>12 m</b>, and a height of <b>7 m</b>. What is its area?',
      icon: '🏊',
    },
  ];
  const lv = levels[idx];
  const ans = ((lv.b1 + lv.b2) * lv.h) / 2;
  const svg = svgTrapezoid(lv.b1, lv.b2, lv.h);
  return {
    html:
      '<div class="prompt">' + (lv.story
        ? lv.story
        : 'What is the area of this trapezoid? Top base <b>b₁ = ' + lv.b1 + '</b>, bottom base <b>b₂ = ' + lv.b2 + '</b>, height <b>h = ' + lv.h + '</b>.'
      ) + '</div>'
      + '<div class="canvas-area">' + (lv.icon ? '<div style="font-size:36px; text-align:center; margin-right:8px;">' + lv.icon + '</div>' : '') + svg + '</div>'
      + '<div class="answer-row">'
        + '<input type="number" id="ans-trap" min="1" max="999" placeholder="?" step="0.5">'
        + '<span class="unit">' + lv.unit + '</span>'
      + '</div>',
    hint: '<b>Tip:</b> Trapezoid area = ½ × (b₁ + b₂) × h. So ½ × (' + lv.b1 + ' + ' + lv.b2 + ') × ' + lv.h + ' = ½ × ' + (lv.b1 + lv.b2) + ' × ' + lv.h + '.',
    onMount(){ setTimeout(() => document.getElementById('ans-trap')?.focus(), 30); },
    check(){
      const v = +document.getElementById('ans-trap').value;
      return Math.abs(v - ans) < 0.01;
    },
  };
}
function svgTrapezoid(b1, b2, h){
  const SCALE = 22;
  const TopW = b1 * SCALE, BotW = b2 * SCALE, H = h * SCALE;
  const pad = 30;
  const offset = (BotW - TopW) / 2;
  const pts = [[offset, 0], [offset + TopW, 0], [BotW, H], [0, H]];
  const poly = pts.map(p => (p[0] + pad) + ',' + (p[1] + pad)).join(' ');
  const totW = BotW + pad * 2;
  const totH = H + pad * 2;
  let out = '<svg viewBox="0 0 ' + totW + ' ' + totH + '" width="' + Math.min(totW, 460) + '">';
  out += '<polygon points="' + poly + '" fill="#b85ec0" stroke="#2a3848" stroke-width="2.5"/>';
  // height line dashed (centered, perpendicular)
  out += '<line x1="' + (BotW / 2 + pad) + '" y1="' + pad + '" x2="' + (BotW / 2 + pad) + '" y2="' + (H + pad)
    + '" stroke="#2a3848" stroke-width="1.5" stroke-dasharray="4 3"/>';
  out += '<text x="' + (BotW / 2 + pad + 6) + '" y="' + (pad + H / 2 + 4) + '" font-family="Fredoka" font-size="13" fill="#fff" font-weight="700">h = ' + h + '</text>';
  // top base label
  out += '<text x="' + (offset + TopW / 2 + pad) + '" y="' + (pad - 6) + '" font-family="Fredoka" font-size="13" fill="#2a3848" text-anchor="middle">b₁ = ' + b1 + '</text>';
  // bottom base label
  out += '<text x="' + (BotW / 2 + pad) + '" y="' + (H + pad + 20) + '" font-family="Fredoka" font-size="13" fill="#2a3848" text-anchor="middle">b₂ = ' + b2 + '</text>';
  out += '</svg>';
  return out;
}

/* ═══ GAME 9: FORMULA MATCH ════════════════════════════════ */
function makeFormulaLevel(idx){
  // Each level: show a shape, give 4 formula choices, pick the right one.
  const ALL_FORMULAS = [
    'length × width',
    '½ × base × height',
    'base × height',
    '½ × (b₁ + b₂) × height',
    'side × side',
    'π × radius²',
  ];
  const levels = [
    { shape: 'rect',   correct: 'length × width',        svg: svgFormulaRect(7, 4) },
    { shape: 'tri',    correct: '½ × base × height',     svg: svgFormulaTri(6, 5) },
    { shape: 'para',   correct: 'base × height',         svg: svgFormulaPara(7, 4) },
    { shape: 'trap',   correct: '½ × (b₁ + b₂) × height', svg: svgFormulaTrap(4, 8, 4) },
    { shape: 'square', correct: 'side × side',           svg: svgFormulaSquare(5) },
  ];
  const lv = levels[idx];
  // pick 4 choices: correct + 3 random distractors
  const distractors = ALL_FORMULAS.filter(f => f !== lv.correct);
  shuffle(distractors);
  const choices = [lv.correct, ...distractors.slice(0, 3)];
  shuffle(choices);
  return {
    html:
      '<div class="prompt">Which formula gives the area of this shape?</div>'
      + '<div class="canvas-area">' + lv.svg + '</div>'
      + '<div class="choice-grid" style="grid-template-columns: 1fr 1fr;">'
        + choices.map((c, i) => '<button type="button" class="choice-btn" data-choice="' + i + '" data-text="' + c + '" style="font-size:17px;">' + c + '</button>').join('')
      + '</div>',
    hint: '<b>Tip:</b> Look at what kind of shape it is — rectangle, triangle, parallelogram, trapezoid? Each shape has its own formula.',
    onMount(){
      document.querySelectorAll('.choice-btn[data-choice]').forEach(b => {
        b.addEventListener('click', () => {
          const t = b.dataset.text;
          document.querySelectorAll('.choice-btn[data-choice]').forEach(x => x.disabled = true);
          attempts++;
          if (t === lv.correct){
            b.classList.add('correct');
            showFeedback('<span class="emoji">🎯</span>' + pick(GOOD_LINES), 'good');
            const a = document.getElementById('actions');
            a.innerHTML = '<button type="button" class="btn next" id="btn-next">Next ▶</button>';
            document.getElementById('btn-next').addEventListener('click', advanceLevel);
            popStar(); confetti();
          } else {
            b.classList.add('wrong');
            // re-enable others
            document.querySelectorAll('.choice-btn[data-choice]').forEach(x => { if (x !== b) x.disabled = false; });
            showFeedback('<span class="emoji">📐</span>not that one — check the shape\'s formula!', 'bad');
          }
        });
      });
    },
    check(){
      // Formula match is click-based — Check button just shows a hint to click
      showFeedback('<span class="emoji">👆</span>tap one of the formula buttons!', 'bad');
      return false;
    },
  };
}
function svgFormulaRect(w, h){
  const S = 24;
  const W = w * S, H = h * S, pad = 30;
  return '<svg viewBox="0 0 ' + (W + pad * 2) + ' ' + (H + pad * 2) + '" width="' + (W + pad * 2) + '">'
    + '<rect x="' + pad + '" y="' + pad + '" width="' + W + '" height="' + H + '" fill="#ff7a6f" stroke="#2a3848" stroke-width="2.5" rx="3"/>'
    + '<text x="' + (pad + W / 2) + '" y="' + (pad + H + 22) + '" font-family="Fredoka" font-size="14" fill="#2a3848" text-anchor="middle">length</text>'
    + '<text x="' + (pad - 6) + '" y="' + (pad + H / 2 + 5) + '" font-family="Fredoka" font-size="14" fill="#2a3848" text-anchor="end">width</text>'
    + '</svg>';
}
function svgFormulaTri(b, h){
  // simple isoceles triangle, labeled base + height
  const S = 22;
  const W = b * S, H = h * S, pad = 30;
  return '<svg viewBox="0 0 ' + (W + pad * 2) + ' ' + (H + pad * 2) + '" width="' + (W + pad * 2) + '">'
    + '<polygon points="' + pad + ',' + (pad + H) + ' ' + (pad + W) + ',' + (pad + H) + ' ' + (pad + W / 2) + ',' + pad + '" fill="#ff7a6f" stroke="#2a3848" stroke-width="2.5"/>'
    + '<line x1="' + (pad + W / 2) + '" y1="' + pad + '" x2="' + (pad + W / 2) + '" y2="' + (pad + H) + '" stroke="#2a3848" stroke-width="1.5" stroke-dasharray="4 3"/>'
    + '<text x="' + (pad + W / 2) + '" y="' + (pad + H + 22) + '" font-family="Fredoka" font-size="14" fill="#2a3848" text-anchor="middle">base</text>'
    + '<text x="' + (pad + W / 2 + 6) + '" y="' + (pad + H / 2 + 4) + '" font-family="Fredoka" font-size="14" fill="#2a3848">height</text>'
    + '</svg>';
}
function svgFormulaPara(b, h){
  const S = 24;
  const W = b * S, H = h * S, slant = H * 0.3, pad = 30;
  return '<svg viewBox="0 0 ' + (W + slant + pad * 2) + ' ' + (H + pad * 2) + '" width="' + (W + slant + pad * 2) + '">'
    + '<polygon points="' + (slant + pad) + ',' + pad + ' ' + (slant + W + pad) + ',' + pad + ' ' + (W + pad) + ',' + (pad + H) + ' ' + pad + ',' + (pad + H) + '" fill="#6cb7e8" stroke="#2a3848" stroke-width="2.5"/>'
    + '<line x1="' + (slant + pad) + '" y1="' + pad + '" x2="' + (slant + pad) + '" y2="' + (H + pad) + '" stroke="#2a3848" stroke-width="1.5" stroke-dasharray="4 3"/>'
    + '<text x="' + (slant + pad - 6) + '" y="' + (pad + H / 2 + 4) + '" font-family="Fredoka" font-size="14" fill="#2a3848" text-anchor="end">height</text>'
    + '<text x="' + (W / 2 + pad) + '" y="' + (H + pad + 22) + '" font-family="Fredoka" font-size="14" fill="#2a3848" text-anchor="middle">base</text>'
    + '</svg>';
}
function svgFormulaTrap(b1, b2, h){
  const S = 22;
  const TopW = b1 * S, BotW = b2 * S, H = h * S, pad = 30;
  const offset = (BotW - TopW) / 2;
  return '<svg viewBox="0 0 ' + (BotW + pad * 2) + ' ' + (H + pad * 2) + '" width="' + (BotW + pad * 2) + '">'
    + '<polygon points="' + (offset + pad) + ',' + pad + ' ' + (offset + TopW + pad) + ',' + pad + ' ' + (BotW + pad) + ',' + (pad + H) + ' ' + pad + ',' + (pad + H) + '" fill="#b85ec0" stroke="#2a3848" stroke-width="2.5"/>'
    + '<text x="' + (offset + TopW / 2 + pad) + '" y="' + (pad - 6) + '" font-family="Fredoka" font-size="14" fill="#2a3848" text-anchor="middle">b₁</text>'
    + '<text x="' + (BotW / 2 + pad) + '" y="' + (H + pad + 22) + '" font-family="Fredoka" font-size="14" fill="#2a3848" text-anchor="middle">b₂</text>'
    + '<line x1="' + (BotW / 2 + pad) + '" y1="' + pad + '" x2="' + (BotW / 2 + pad) + '" y2="' + (H + pad) + '" stroke="#2a3848" stroke-width="1.5" stroke-dasharray="4 3"/>'
    + '<text x="' + (BotW / 2 + pad + 6) + '" y="' + (pad + H / 2 + 5) + '" font-family="Fredoka" font-size="14" fill="#fff" font-weight="700">height</text>'
    + '</svg>';
}
function svgFormulaSquare(s){
  const S = 28;
  const Side = s * S, pad = 30;
  return '<svg viewBox="0 0 ' + (Side + pad * 2) + ' ' + (Side + pad * 2) + '" width="' + (Side + pad * 2) + '">'
    + '<rect x="' + pad + '" y="' + pad + '" width="' + Side + '" height="' + Side + '" fill="#ffc94a" stroke="#2a3848" stroke-width="2.5" rx="3"/>'
    + '<text x="' + (pad + Side / 2) + '" y="' + (pad + Side + 22) + '" font-family="Fredoka" font-size="14" fill="#2a3848" text-anchor="middle">side</text>'
    + '<text x="' + (pad - 6) + '" y="' + (pad + Side / 2 + 5) + '" font-family="Fredoka" font-size="14" fill="#2a3848" text-anchor="end">side</text>'
    + '</svg>';
}

/* ═══ GAME 10: SHAPE RESCUE ════════════════════════════════ */
function makeRescueLevel(idx){
  // 4 islands of different shapes — player must tap the one with the BIGGEST area to rescue the puppy
  // Difficulty: L1 all rectangles → L5 all 4 different shape types
  function area(s){
    if (s.kind === 'rect' || s.kind === 'square') return s.w * s.h;
    if (s.kind === 'tri') return (s.w * s.h) / 2;
    if (s.kind === 'para') return s.w * s.h;
    if (s.kind === 'trap') return ((s.b1 + s.b2) * s.h) / 2;
    return 0;
  }
  function pool(){
    return [
      { kind: 'rect', w: 5, h: 4 },
      { kind: 'rect', w: 6, h: 3 },
      { kind: 'rect', w: 7, h: 4 },
      { kind: 'rect', w: 8, h: 3 },
      { kind: 'square', w: 5, h: 5 },
      { kind: 'square', w: 6, h: 6 },
      { kind: 'tri', w: 8, h: 6 },
      { kind: 'tri', w: 10, h: 5 },
      { kind: 'tri', w: 6, h: 8 },
      { kind: 'para', w: 5, h: 6 },
      { kind: 'para', w: 7, h: 4 },
      { kind: 'trap', b1: 4, b2: 8, h: 5 },
      { kind: 'trap', b1: 5, b2: 9, h: 6 },
    ];
  }
  let shapes;
  if (idx === 0){
    shapes = [
      { kind: 'rect', w: 5, h: 4 },
      { kind: 'rect', w: 6, h: 3 },
      { kind: 'rect', w: 7, h: 4 },  // biggest = 28
      { kind: 'rect', w: 4, h: 5 },
    ];
  } else if (idx === 1){
    shapes = [
      { kind: 'rect', w: 5, h: 6 },
      { kind: 'rect', w: 8, h: 4 },
      { kind: 'tri',  w: 10, h: 6 }, // 30
      { kind: 'tri',  w: 6,  h: 8 }, // 24
    ];
  } else if (idx === 2){
    shapes = [
      { kind: 'rect', w: 6, h: 5 },
      { kind: 'tri',  w: 8, h: 7 },
      { kind: 'para', w: 7, h: 5 },
      { kind: 'trap', b1: 4, b2: 8, h: 6 }, // 36 ← biggest
    ];
  } else if (idx === 3){
    shapes = [
      { kind: 'trap', b1: 3, b2: 7, h: 6 },   // 30
      { kind: 'trap', b1: 4, b2: 10, h: 6 },  // 42 ← biggest
      { kind: 'trap', b1: 5, b2: 9, h: 5 },   // 35
      { kind: 'trap', b1: 2, b2: 8, h: 7 },   // 35
    ];
  } else {
    // L5: tricky — close areas
    shapes = [
      { kind: 'rect', w: 6, h: 7 },           // 42
      { kind: 'tri',  w: 12, h: 8 },          // 48
      { kind: 'para', w: 9, h: 5 },           // 45
      { kind: 'trap', b1: 4, b2: 10, h: 6 },  // 42
    ];
  }
  const areas = shapes.map(area);
  const maxA = Math.max(...areas);
  const correctIdx = areas.indexOf(maxA);
  return {
    html:
      '<div class="prompt"><span style="font-size:32px;">🐱</span> The blocky cat is stranded! Tap the shape with the <b>biggest area</b> — that\'s the safest island. Calculate each before you pick!</div>'
      + '<div class="canvas-area">' + svgRescueShapes(shapes) + '</div>'
      + '<div class="answer-row" style="font-size:14px; color:var(--ink-3);">tap an island</div>',
    hint: '<b>Tip:</b> Calculate each shape\'s area first. Rectangle = l × w. Triangle = ½ × b × h. Parallelogram = b × h. Trapezoid = ½ × (b₁ + b₂) × h. Then pick the biggest!',
    onMount(){
      document.querySelectorAll('[data-rescue-idx]').forEach(el => {
        el.addEventListener('click', () => {
          const i = +el.dataset.rescueIdx;
          document.querySelectorAll('[data-rescue-idx]').forEach(x => x.style.pointerEvents = 'none');
          el.style.outline = '4px solid ' + (i === correctIdx ? 'var(--mint-dk)' : 'var(--coral-dk)');
          attempts++;
          if (i === correctIdx){
            // jump the blocky Maine Coon onto the safe island
            // (compute destination in the SVG viewBox grid coords — same
            // formula used by svgRescueShapes)
            const cellW = 230, cellH = 150;
            const ox = 15 + (correctIdx % 2) * cellW;
            const oy = 15 + Math.floor(correctIdx / 2) * cellH;
            const targetX = ox + cellW / 2;
            const targetY = oy + cellH / 2;
            const puppy = document.getElementById('rescue-puppy');
            if (puppy){
              puppy.setAttribute('transform',
                'translate(' + targetX + ' ' + targetY + ')');
            }
            showFeedback('<span class="emoji">🐱</span>blocky cat saved! biggest area = ' + maxA + ' sq units · ' + pick(GOOD_LINES), 'good');
            const a = document.getElementById('actions');
            a.innerHTML = '<button type="button" class="btn next" id="btn-next">Next ▶</button>';
            document.getElementById('btn-next').addEventListener('click', advanceLevel);
            popStar(); confetti();
          } else {
            showFeedback('<span class="emoji">📐</span>that island is ' + areas[i] + ' sq units. Find the bigger one!', 'bad');
            // re-enable other shapes (not the wrong one)
            document.querySelectorAll('[data-rescue-idx]').forEach(x => {
              if (x !== el) x.style.pointerEvents = '';
            });
          }
        });
      });
    },
    check(){
      showFeedback('<span class="emoji">👆</span>tap an island to rescue the puppy!', 'bad');
      return false;
    },
  };
}
/* Blocky Maine Coon sprite — pixel-art brown tabby with extra fluff.
   Distinctive features: long lynx ear tufts, tabby stripes between the
   ears, big white ruff/chest, and asymmetric fur "Z" pixels on the
   outline so it reads as a fluffy long-haired cat instead of a smooth
   shorthair. Sized so it overlays the central "island" markers in
   the rescue game. */
function svgBlockyCat(cx, cy, scale){
  const sprite = [
    '..#.........#..',  // 0  — lynx ear-tuft tips
    '.##.........##.',  // 1  — lynx ear-tuft body
    '.#O#.......#O#.',  // 2  — ear outline top
    '#OOO#######OOO#',  // 3  — head top + ear bases
    '#OPOOOOSOOOOPO#',  // 4  — pink inner ears + tabby stripe
    '#OOOOOSSSOOOOO#',  // 5  — wider tabby stripe
    '#OWBOOSSSOOWBO#',  // 6  — eyes + stripe between
    '#OWBOOOOOOOWBO#',  // 7  — eyes (pupils tracking forward)
    '#OOOOOM+MOOOOO#',  // 8  — nose + first whisker pair
    'Z#OMMMM+MMMMOO#',  // 9  — full whisker spread + cheek fluff
    'Z#FFFFFFFFFFFF#Z', // 10 — white ruff begin
    'ZZ#FFFFFFFFFF#ZZ', // 11 — ruff + side fur fluff
    '.ZZ##########ZZ.', // 12 — ruff outline + bottom fur fluff
  ];
  const COLORS = {
    '.': null,
    '#': '#1a0a08',  // outline black
    'O': '#a86838',  // brown tabby (Maine Coon classic brown)
    'S': '#5a3818',  // darker tabby stripe
    'P': '#c46060',  // pink inner ear
    'W': '#fff6e0',  // eye white
    'B': '#1a0a08',  // pupil
    '+': '#c44848',  // pink nose
    'M': '#2a1810',  // whisker dark
    'F': '#fff6e0',  // white ruff / chest
    'Z': '#c89858',  // lighter tan — outer fur fluff
  };
  const rows = sprite.length;
  const cols = sprite[0].length;
  const startX = cx - (cols * scale) / 2;
  const startY = cy - (rows * scale) / 2;
  let out = '';
  for (let r = 0; r < rows; r++){
    for (let c = 0; c < cols; c++){
      const ch = sprite[r][c];
      const col = COLORS[ch];
      if (!col) continue;
      out += '<rect x="' + (startX + c * scale) + '" y="' + (startY + r * scale)
        + '" width="' + scale + '" height="' + scale + '" fill="' + col + '" shape-rendering="crispEdges"/>';
    }
  }
  return out;
}

function svgRescueShapes(shapes){
  // 2×2 grid layout, each cell 220×140
  const cellW = 230, cellH = 150;
  const W = cellW * 2 + 30;
  const H = cellH * 2 + 30;
  let out = '<svg viewBox="0 0 ' + W + ' ' + H + '" width="' + W + '" style="background:#e7f6ee; border-radius:14px; border:2px dashed var(--mint-dk);">';
  // gentle water dots
  for (let i = 0; i < 24; i++){
    const x = Math.random() * W;
    const y = Math.random() * H;
    out += '<circle cx="' + x + '" cy="' + y + '" r="1.5" fill="rgba(42,122,94,0.18)"/>';
  }
  const colors = ['#ff7a6f', '#6cb7e8', '#ffc94a', '#b85ec0'];
  shapes.forEach((s, i) => {
    const ox = 15 + (i % 2) * cellW;
    const oy = 15 + Math.floor(i / 2) * cellH;
    const color = colors[i];
    const cx = ox + cellW / 2;
    const cy = oy + cellH / 2;
    out += '<g data-rescue-idx="' + i + '" style="cursor:pointer;">';
    // shape drawn centered around (cx, cy)
    if (s.kind === 'rect' || s.kind === 'square'){
      const w = s.w * 12, h = s.h * 12;
      const x = cx - w / 2, y = cy - h / 2 + 8;
      out += '<rect x="' + x + '" y="' + y + '" width="' + w + '" height="' + h + '" fill="' + color + '" stroke="#2a3848" stroke-width="2" rx="3"/>';
      out += '<text x="' + cx + '" y="' + (y + h + 16) + '" font-family="Fredoka" font-size="12" fill="#2a3848" text-anchor="middle">' + s.w + ' × ' + s.h + '</text>';
    } else if (s.kind === 'tri'){
      const w = s.w * 10, h = s.h * 10;
      const x = cx - w / 2, y = cy - h / 2 + 8;
      out += '<polygon points="' + x + ',' + (y + h) + ' ' + (x + w) + ',' + (y + h) + ' ' + (x + w / 2) + ',' + y + '" fill="' + color + '" stroke="#2a3848" stroke-width="2"/>';
      out += '<text x="' + cx + '" y="' + (y + h + 16) + '" font-family="Fredoka" font-size="11" fill="#2a3848" text-anchor="middle">b=' + s.w + ' h=' + s.h + '</text>';
    } else if (s.kind === 'para'){
      const w = s.w * 12, h = s.h * 11;
      const slant = h * 0.3;
      const x = cx - (w + slant) / 2, y = cy - h / 2 + 4;
      out += '<polygon points="' + (x + slant) + ',' + y + ' ' + (x + slant + w) + ',' + y + ' ' + (x + w) + ',' + (y + h) + ' ' + x + ',' + (y + h) + '" fill="' + color + '" stroke="#2a3848" stroke-width="2"/>';
      out += '<text x="' + cx + '" y="' + (y + h + 16) + '" font-family="Fredoka" font-size="11" fill="#2a3848" text-anchor="middle">b=' + s.w + ' h=' + s.h + '</text>';
    } else if (s.kind === 'trap'){
      const W2 = s.b2 * 11, W1 = s.b1 * 11, h = s.h * 11;
      const offset = (W2 - W1) / 2;
      const x = cx - W2 / 2, y = cy - h / 2 + 4;
      out += '<polygon points="' + (x + offset) + ',' + y + ' ' + (x + offset + W1) + ',' + y + ' ' + (x + W2) + ',' + (y + h) + ' ' + x + ',' + (y + h) + '" fill="' + color + '" stroke="#2a3848" stroke-width="2"/>';
      out += '<text x="' + cx + '" y="' + (y + h + 16) + '" font-family="Fredoka" font-size="11" fill="#2a3848" text-anchor="middle">b₁=' + s.b1 + ' b₂=' + s.b2 + ' h=' + s.h + '</text>';
    }
    out += '</g>';
  });
  // blocky Maine Coon starts in the center; jumps to the chosen island after answer
  out += '<g id="rescue-puppy" transform="translate(' + (W / 2) + ' ' + (H / 2) + ')" pointer-events="none">';
  out += svgBlockyCat(0, 0, 3);
  out += '</g>';
  out += '</svg>';
  return out;
}

/* ═══════════════════════════════════════════════════════════
   EASTER EGGS + 5-STAR REWARDS
   ═══════════════════════════════════════════════════════════ */
const EGG_KEY = 'area-arcade-eggs-v1';
const REW_KEY = 'area-arcade-rewards-v1';
const eggs = (() => {
  try{ const r = localStorage.getItem(EGG_KEY); if (r) return Object.assign({diamond:0,konami:0,moo:0,pi:0}, JSON.parse(r)); }catch(_){}
  return { diamond: 0, konami: 0, moo: 0, pi: 0 };
})();
const rewards = (() => {
  try{ const r = localStorage.getItem(REW_KEY); if (r) return JSON.parse(r); }catch(_){}
  return {}; // map: '5' → true, '10' → true ...
})();
function saveEggs(){ try{ localStorage.setItem(EGG_KEY, JSON.stringify(eggs)); }catch(_){} }
function saveRewards(){ try{ localStorage.setItem(REW_KEY, JSON.stringify(rewards)); }catch(_){} }
function eggCount(){ return Object.values(eggs).reduce((a, v) => a + (v ? 1 : 0), 0); }

const EGG_DEFS = [
  { key: 'diamond', ic: '💎', label: 'Diamond Block',  hint: 'Hidden somewhere on the page — keep your eyes peeled.' },
  { key: 'konami',  ic: '🎵', label: 'Dancing Cat',    hint: 'Try the most famous gaming cheat code (10 keys).' },
  { key: 'moo',     ic: '🐄', label: 'Cow Crossing',   hint: 'Type a sound a cow makes (3 letters).' },
  { key: 'pi',      ic: '🥧', label: 'Pi Day',         hint: 'Type two letters that spell a famous Greek number.' },
];

const REWARD_DEFS = [
  { n: 5,  ic: '🟫', label: 'Apprentice Mason',  text: 'You laid your first 5 blocks.' },
  { n: 10, ic: '🪨', label: 'Stone Cutter',      text: 'You\'re carving real area now.' },
  { n: 15, ic: '⛏️', label: 'Iron Pickaxe',      text: 'Halfway to diamond tools!' },
  { n: 20, ic: '💎', label: 'Diamond Finder',    text: 'Sparkling math skills, friend.' },
  { n: 25, ic: '🛡️', label: 'Half-master',       text: 'A round 25 — you\'ve mastered half the arcade.' },
  { n: 30, ic: '🏰', label: 'Castle Builder',    text: 'You could build a whole castle out of these stars.' },
  { n: 35, ic: '🌳', label: 'Forest Surveyor',   text: 'Every square unit accounted for.' },
  { n: 40, ic: '🌋', label: 'Nether Ready',      text: 'Brave the harder problems — you\'re ready.' },
  { n: 45, ic: '🐉', label: 'Ender Surveyor',    text: 'Almost a perfect score!' },
  { n: 50, ic: '👑', label: 'AREA MONARCH',      text: 'All 50 stars! You are royalty of square units.' },
];

/* ── Easter egg unlock + reward checker ───────────────────── */
function unlockEgg(key){
  if (eggs[key]) return false;
  eggs[key] = 1;
  saveEggs();
  updateEggTracker();
  showEggToast('🥚 EGG FOUND: ' + EGG_DEFS.find(e => e.key === key).label);
  return true;
}
function checkRewards(){
  // called every time stars change
  const total = totalStars();
  REWARD_DEFS.forEach(r => {
    if (total >= r.n && !rewards[r.n]){
      rewards[r.n] = 1;
      saveRewards();
      showEggToast('🏆 REWARD: ' + r.label);
      updateEggTracker();
    }
  });
}
function showEggToast(text){
  const t = document.createElement('div');
  t.className = 'egg-toast';
  t.textContent = text;
  document.body.appendChild(t);
  // animate in
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => {
    t.classList.remove('show');
    setTimeout(() => t.remove(), 500);
  }, 2600);
}
function updateEggTracker(){
  const t = document.getElementById('egg-tracker');
  const total = eggCount() + Object.keys(rewards).length;
  if (total > 0) t.classList.add('show');
  document.getElementById('egg-count').textContent = eggCount();
}

/* ── Hidden Diamond — click to find ───────────────────────── */
document.getElementById('secret-diamond').addEventListener('click', () => {
  if (unlockEgg('diamond')){
    document.getElementById('secret-diamond').classList.add('found');
    confetti();
  } else {
    // already found — let it pulse
    document.getElementById('secret-diamond').classList.add('found');
  }
});
// mark diamond as found visually if it was previously discovered
if (eggs.diamond) document.getElementById('secret-diamond').classList.add('found');

/* ── Konami code — dancing Maine Coon ─────────────────────── */
const KONAMI = ['ArrowUp','ArrowUp','ArrowDown','ArrowDown',
                'ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
let konamiBuffer = [];
let typeBuffer = '';
document.addEventListener('keydown', e => {
  // Konami
  konamiBuffer.push(e.key);
  if (konamiBuffer.length > KONAMI.length) konamiBuffer.shift();
  if (konamiBuffer.length === KONAMI.length){
    let match = true;
    for (let i = 0; i < KONAMI.length; i++){
      if (konamiBuffer[i].toLowerCase() !== KONAMI[i].toLowerCase()){ match = false; break; }
    }
    if (match){
      konamiBuffer = [];
      triggerDance();
    }
  }
  // typing detection (only if focus is not in an input)
  if (document.activeElement && /INPUT|TEXTAREA/.test(document.activeElement.tagName)) return;
  if (e.key.length === 1 && /[a-zA-Z]/.test(e.key)){
    typeBuffer += e.key.toLowerCase();
    if (typeBuffer.length > 10) typeBuffer = typeBuffer.slice(-10);
    if (typeBuffer.endsWith('moo')) triggerMoo();
    if (typeBuffer.endsWith('pi'))  triggerPi();
  }
});

function triggerDance(){
  unlockEgg('konami');
  // render the Maine Coon into the dance SVG using the existing sprite renderer
  const sv = document.getElementById('dance-svg');
  // svgBlockyCat returns just <rect>s; we inject directly as innerHTML
  sv.innerHTML = svgBlockyCat(0, 0, 3);
  const overlay = document.getElementById('dance-overlay');
  overlay.classList.add('show');
  // spawn floating musical notes for 6 seconds
  let noteIv = setInterval(() => {
    const note = document.createElement('div');
    note.className = 'dance-note';
    note.textContent = ['♪','♫','♬','♩','♭'][Math.floor(Math.random()*5)];
    note.style.left = (Math.random() * 100) + 'vw';
    note.style.top = (90 + Math.random() * 8) + 'vh';
    note.style.setProperty('--rot', ((Math.random() - 0.5) * 720) + 'deg');
    note.style.color = ['#ffc94a','#ff7eb9','#6cb7e8','#c8a8d4','#7df0ff'][Math.floor(Math.random()*5)];
    document.body.appendChild(note);
    setTimeout(() => note.remove(), 2400);
  }, 220);
  // tap to dismiss
  const close = () => {
    overlay.classList.remove('show');
    clearInterval(noteIv);
    overlay.removeEventListener('click', close);
  };
  overlay.addEventListener('click', close);
  setTimeout(close, 6500); // auto-close after 6.5s in case nobody taps
}

function triggerMoo(){
  unlockEgg('moo');
  // spawn a crossing cow
  const cow = document.createElement('div');
  cow.className = 'crossing-cow';
  cow.textContent = '🐄';
  document.body.appendChild(cow);
  setTimeout(() => cow.remove(), 6500);
}
function triggerPi(){
  unlockEgg('pi');
  const banner = document.createElement('div');
  banner.className = 'pi-banner';
  banner.innerHTML = 'π = 3.14159…<small>circumference ÷ diameter, every time</small>';
  document.body.appendChild(banner);
  setTimeout(() => banner.remove(), 2700);
}

/* ── Tracker modal ────────────────────────────────────────── */
document.getElementById('egg-tracker').addEventListener('click', openEggModal);
document.getElementById('egg-close').addEventListener('click', () => {
  document.getElementById('egg-modal').classList.remove('show');
});
document.getElementById('egg-modal').addEventListener('click', e => {
  if (e.target.id === 'egg-modal') e.target.classList.remove('show');
});
function openEggModal(){
  // render eggs
  document.getElementById('egg-list').innerHTML = EGG_DEFS.map(e => {
    const found = !!eggs[e.key];
    return '<div class="egg-item' + (found ? ' found' : '') + '">'
      + '<span class="ic">' + (found ? e.ic : '❓') + '</span>'
      + '<div class="label">'
        + (found ? e.label : '???')
        + (found ? '' : '<span class="hint">' + e.hint + '</span>')
      + '</div>'
      + '<span class="status">' + (found ? 'FOUND' : 'HIDDEN') + '</span>'
      + '</div>';
  }).join('');
  // render rewards
  document.getElementById('reward-list').innerHTML = REWARD_DEFS.map(r => {
    const unlocked = !!rewards[r.n];
    return '<div class="egg-item' + (unlocked ? ' found' : '') + '">'
      + '<span class="ic">' + r.ic + '</span>'
      + '<div class="label">'
        + r.label
        + '<span class="hint">' + (unlocked ? r.text : 'unlocks at ' + r.n + ' stars') + '</span>'
      + '</div>'
      + '<span class="status">' + (unlocked ? 'EARNED' : '🔒') + '</span>'
      + '</div>';
  }).join('');
  document.getElementById('egg-modal').classList.add('show');
}

/* ── Hook into saveStars to check rewards every time ──────── */
const _origSaveStars = saveStars;
saveStars = function(){
  _origSaveStars();
  checkRewards();
};

/* ── Init ─────────────────────────────────────────────────── */
saveStars();          // also runs checkRewards via the wrapper
updateEggTracker();
render();
// allow Enter on inputs to submit
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && view === 'game' && document.activeElement.tagName === 'INPUT'){
    e.preventDefault();
    const checkBtn = document.getElementById('btn-check');
    const nextBtn = document.getElementById('btn-next');
    if (nextBtn) nextBtn.click();
    else if (checkBtn) checkBtn.click();
  }
});
</script>
