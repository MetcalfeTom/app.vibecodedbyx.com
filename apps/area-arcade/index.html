<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Area Arcade · 5th grade area, gamified</title>
<meta name="description" content="Five mini-games for 5th graders to learn area: count tiles, build rectangles, match areas, solve garden problems, and split composite shapes.">
<meta property="og:title" content="Area Arcade">
<meta property="og:description" content="Learn the area of rectangles, triangles, and L-shapes by playing five mini-games. For 5th graders. Stars, streaks, and confetti.">
<meta property="og:image" content="https://image.pollinations.ai/prompt/Friendly%20cartoon%20math%20classroom%20with%20colorful%20grid%20shapes%2C%20unit%20squares%2C%20rectangles%2C%20triangles%2C%20cheerful%2010-year-olds%20learning%20area%2C%20bright%20mint%20coral%20yellow%20palette?width=1200&height=630&model=flux&nologo=true&seed=2525">
<meta property="og:url" content="https://sloppy.live/area-arcade">
<meta property="og:type" content="website">
<link rel="icon" href="https://emojicdn.elk.sh/📐">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root{
    --cream:    #fbf5e3;
    --paper:    #fff9eb;
    --mint:     #6fc7a8;
    --mint-dk:  #2a7a5e;
    --coral:    #ff7a6f;
    --coral-dk: #c43d33;
    --sun:      #ffc94a;
    --sun-dk:   #c08a00;
    --sky:      #6cb7e8;
    --sky-dk:   #2a6a9a;
    --plum:     #b85ec0;
    --plum-dk:  #6a2a72;
    --ink:      #2a3848;
    --ink-2:    #5a6878;
    --ink-3:    #98a4b2;
  }
  *{ box-sizing: border-box; margin: 0; padding: 0; }
  html, body{ background: var(--cream); color: var(--ink); height: 100vh; overflow: hidden; }
  body{
    font-family: 'Nunito', system-ui, sans-serif;
    display: flex; flex-direction: column;
    padding: 0;
    background:
      radial-gradient(ellipse 50% 35% at 20% 15%, rgba(111,199,168,0.18), transparent 70%),
      radial-gradient(ellipse 45% 30% at 80% 85%, rgba(255,201,74,0.16), transparent 70%),
      radial-gradient(ellipse 40% 30% at 85% 15%, rgba(255,122,111,0.14), transparent 70%),
      var(--cream);
  }
  /* Top bar */
  .top{
    width: 100%; max-width: 1100px;
    margin: 0 auto;
    padding: 14px 22px 8px;
    display: flex; align-items: center; gap: 16px;
    flex-wrap: wrap;
  }
  .top .brand{
    display: flex; align-items: baseline; gap: 8px;
  }
  .top h1{
    font-family: 'Fredoka', sans-serif;
    font-size: 28px;
    color: var(--mint-dk);
    line-height: 1;
    letter-spacing: 0.01em;
  }
  .top h1 em{
    color: var(--coral);
    font-style: normal;
    font-weight: 700;
  }
  .top .sub{
    color: var(--ink-2);
    font: italic 14px 'Nunito', sans-serif;
  }
  .top .stars{
    margin-left: auto;
    display: flex; align-items: center; gap: 4px;
    font-family: 'Fredoka', sans-serif;
    font-size: 18px;
    color: var(--sun-dk);
  }
  .top .stars b{ color: var(--ink); font-size: 22px; }
  .top .back-btn{
    background: var(--paper);
    border: 2px solid var(--ink-3);
    color: var(--ink);
    padding: 6px 14px;
    font: 600 14px 'Fredoka', sans-serif;
    border-radius: 14px;
    cursor: pointer;
    box-shadow: 0 3px 0 var(--ink-3);
    transition: transform 80ms, box-shadow 80ms;
  }
  .top .back-btn:hover{ background: #fff; }
  .top .back-btn:active{ transform: translateY(2px); box-shadow: 0 1px 0 var(--ink-3); }
  .top .back-btn.hidden{ display: none; }
  /* Main */
  .main{
    flex: 1;
    width: 100%; max-width: 1100px;
    margin: 0 auto;
    padding: 4px 22px 20px;
    overflow: auto;
    min-height: 0;
  }
  /* HOME — game grid */
  .game-grid{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 18px;
    margin-top: 8px;
  }
  .game-card{
    background: var(--paper);
    border: 3px solid var(--ink);
    border-radius: 22px;
    padding: 18px 14px 14px;
    text-align: center;
    cursor: pointer;
    transition: transform 120ms, box-shadow 120ms;
    box-shadow: 0 6px 0 var(--ink);
    position: relative;
  }
  .game-card:hover{ transform: translateY(-2px); box-shadow: 0 8px 0 var(--ink); }
  .game-card:active{ transform: translateY(3px); box-shadow: 0 3px 0 var(--ink); }
  .game-card .gc-icon{
    font-size: 48px;
    line-height: 1;
    margin-bottom: 6px;
    display: block;
  }
  .game-card .gc-name{
    font-family: 'Fredoka', sans-serif;
    font-size: 18px;
    font-weight: 600;
    color: var(--ink);
    margin-bottom: 2px;
  }
  .game-card .gc-desc{
    font-size: 12.5px;
    color: var(--ink-2);
    margin-bottom: 10px;
    min-height: 32px;
    line-height: 1.3;
  }
  .game-card .gc-stars{
    display: flex; justify-content: center; gap: 3px;
    font-size: 18px;
  }
  .game-card .gc-stars .s.on{ color: var(--sun); }
  .game-card .gc-stars .s.off{ color: var(--ink-3); opacity: 0.5; }
  .game-card.mint    { background: #e7f6ee; border-color: var(--mint-dk); box-shadow: 0 6px 0 var(--mint-dk); }
  .game-card.coral   { background: #ffe6e3; border-color: var(--coral-dk); box-shadow: 0 6px 0 var(--coral-dk); }
  .game-card.sun     { background: #fff2cc; border-color: var(--sun-dk); box-shadow: 0 6px 0 var(--sun-dk); }
  .game-card.sky     { background: #e0eff8; border-color: var(--sky-dk); box-shadow: 0 6px 0 var(--sky-dk); }
  .game-card.plum    { background: #f5e2f7; border-color: var(--plum-dk); box-shadow: 0 6px 0 var(--plum-dk); }
  .game-card.mint:hover, .game-card.mint:active{ box-shadow: 0 8px 0 var(--mint-dk); }
  .game-card.coral:hover, .game-card.coral:active{ box-shadow: 0 8px 0 var(--coral-dk); }
  /* HOME — title row */
  .home-intro{
    font-family: 'Fredoka', sans-serif;
    font-size: 28px;
    color: var(--ink);
    text-align: center;
    margin: 12px 0 4px;
  }
  .home-intro b{ color: var(--coral); }
  .home-subintro{
    text-align: center;
    color: var(--ink-2);
    font-size: 15px;
    margin-bottom: 18px;
  }
  /* Game shell */
  .game-shell{
    background: var(--paper);
    border: 3px solid var(--ink);
    border-radius: 22px;
    padding: 20px 24px 16px;
    box-shadow: 0 6px 0 var(--ink);
    position: relative;
    max-width: 900px;
    margin: 0 auto;
  }
  .game-shell h2{
    font-family: 'Fredoka', sans-serif;
    font-size: 22px;
    color: var(--mint-dk);
    margin-bottom: 4px;
  }
  .game-shell .progress{
    display: flex; gap: 4px;
    margin-bottom: 12px;
  }
  .game-shell .progress .pip{
    height: 6px; flex: 1;
    background: var(--ink-3);
    opacity: 0.3;
    border-radius: 3px;
  }
  .game-shell .progress .pip.active{ background: var(--mint); opacity: 1; }
  .game-shell .progress .pip.done{ background: var(--mint-dk); opacity: 1; }
  .game-shell .prompt{
    font-size: 18px;
    color: var(--ink);
    line-height: 1.5;
    margin-bottom: 16px;
  }
  .game-shell .prompt b{ color: var(--coral); font-size: 22px; }
  /* SVG canvas */
  .canvas-area{
    display: flex; justify-content: center;
    margin: 16px 0;
  }
  .canvas-area svg{
    background: #fff;
    border: 2px dashed var(--ink-3);
    border-radius: 12px;
    max-width: 100%;
  }
  /* Answer area */
  .answer-row{
    display: flex; gap: 10px; flex-wrap: wrap;
    justify-content: center;
    align-items: center;
    margin: 14px 0 8px;
  }
  .answer-row input[type=number]{
    background: var(--paper);
    border: 2px solid var(--ink);
    color: var(--ink);
    padding: 8px 14px;
    font: 700 22px 'Fredoka', sans-serif;
    border-radius: 12px;
    width: 110px;
    text-align: center;
    outline: none;
    box-shadow: 0 3px 0 var(--ink);
  }
  .answer-row input[type=number]:focus{ border-color: var(--sky); }
  .answer-row .unit{
    font: 600 16px 'Nunito', sans-serif;
    color: var(--ink-2);
  }
  .answer-row .unit sup{ font-size: 11px; vertical-align: super; }
  .choice-grid{
    display: grid; gap: 10px;
    grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
    max-width: 540px;
    margin: 12px auto;
  }
  .choice-btn{
    background: var(--paper);
    border: 2px solid var(--ink);
    color: var(--ink);
    padding: 10px 8px;
    font: 700 22px 'Fredoka', sans-serif;
    border-radius: 14px;
    cursor: pointer;
    box-shadow: 0 4px 0 var(--ink);
    transition: transform 80ms, box-shadow 80ms;
  }
  .choice-btn:hover:not(:disabled){ background: #fff; }
  .choice-btn:active:not(:disabled){ transform: translateY(3px); box-shadow: 0 1px 0 var(--ink); }
  .choice-btn.correct{ background: var(--mint); border-color: var(--mint-dk); color: #fff; }
  .choice-btn.wrong{ background: var(--coral); border-color: var(--coral-dk); color: #fff; }
  .choice-btn:disabled{ cursor: not-allowed; opacity: 0.65; }
  /* Action row */
  .actions{
    display: flex; gap: 10px;
    margin-top: 18px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
  }
  .actions .btn{
    background: var(--mint);
    border: 2px solid var(--mint-dk);
    color: #fff;
    padding: 10px 24px;
    font: 700 18px 'Fredoka', sans-serif;
    border-radius: 14px;
    cursor: pointer;
    box-shadow: 0 4px 0 var(--mint-dk);
    transition: transform 80ms, box-shadow 80ms;
  }
  .actions .btn:hover{ background: #7ddabb; }
  .actions .btn:active{ transform: translateY(3px); box-shadow: 0 1px 0 var(--mint-dk); }
  .actions .btn.hint{
    background: var(--sun);
    border-color: var(--sun-dk);
    color: var(--ink);
    box-shadow: 0 4px 0 var(--sun-dk);
  }
  .actions .btn.hint:hover{ background: #ffd770; }
  .actions .btn.hint:active{ box-shadow: 0 1px 0 var(--sun-dk); }
  .actions .btn.next{ background: var(--coral); border-color: var(--coral-dk); box-shadow: 0 4px 0 var(--coral-dk); }
  .actions .btn.next:hover{ background: #ff8e85; }
  .actions .btn.next:active{ box-shadow: 0 1px 0 var(--coral-dk); }
  /* Feedback */
  .feedback{
    text-align: center;
    margin: 12px 0 4px;
    font: 600 18px 'Fredoka', sans-serif;
    min-height: 26px;
  }
  .feedback.good{ color: var(--mint-dk); }
  .feedback.bad { color: var(--coral-dk); }
  .feedback .emoji{ font-size: 22px; margin-right: 6px; }
  .hint-box{
    background: #fff6dd;
    border: 2px dashed var(--sun-dk);
    border-radius: 14px;
    padding: 12px 16px;
    margin: 10px auto;
    max-width: 540px;
    color: var(--ink);
    font-size: 14px;
    line-height: 1.5;
    display: none;
  }
  .hint-box.show{ display: block; }
  .hint-box b{ color: var(--sun-dk); }

  /* Build-a-rectangle game specific */
  .builder-controls{
    display: flex; gap: 16px; flex-wrap: wrap;
    justify-content: center; align-items: center;
    margin: 10px 0;
  }
  .builder-controls .field{
    display: flex; align-items: center; gap: 6px;
    font-family: 'Fredoka', sans-serif;
  }
  .builder-controls .field label{ font-size: 16px; color: var(--ink-2); }
  .builder-controls .field input{
    width: 64px;
    background: var(--paper);
    border: 2px solid var(--ink);
    color: var(--ink);
    padding: 4px 8px;
    font: 700 20px 'Fredoka', sans-serif;
    border-radius: 10px;
    text-align: center;
    outline: none;
  }
  .builder-controls .field input:focus{ border-color: var(--sky); }
  .builder-area-display{
    font-family: 'Fredoka', sans-serif;
    font-size: 18px;
    color: var(--mint-dk);
  }
  .builder-area-display.match{ color: var(--coral-dk); animation: pulseMatch 1.2s ease-in-out infinite; }
  @keyframes pulseMatch{ 50%{ opacity: 0.65; } }

  /* Confetti / celebrate */
  .confetti{
    position: fixed;
    pointer-events: none;
    z-index: 99;
    font-size: 22px;
    animation: confettiFall 1.8s ease-in forwards;
  }
  @keyframes confettiFall{
    0%   { transform: translate(0, 0) rotate(0); opacity: 1; }
    100% { transform: translate(var(--cx, 0), 60vh) rotate(720deg); opacity: 0; }
  }
  /* Star pop */
  .star-pop{
    position: fixed;
    top: 40%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 100px;
    pointer-events: none;
    z-index: 100;
    animation: starPop 1.2s cubic-bezier(0.2, 0.85, 0.35, 1.1);
    color: var(--sun);
    filter: drop-shadow(0 0 24px rgba(255,201,74,0.7));
  }
  @keyframes starPop{
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0); }
    25%  { opacity: 1; transform: translate(-50%, -50%) scale(1.3); }
    75%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -180%) scale(1); }
  }
  /* Done overlay (game complete) */
  .done-overlay{
    text-align: center;
    padding: 30px 16px;
  }
  .done-overlay h2{
    font-family: 'Fredoka', sans-serif;
    font-size: 36px;
    color: var(--mint-dk);
    margin-bottom: 8px;
  }
  .done-overlay .big-stars{ font-size: 64px; margin: 10px 0; color: var(--sun); }
  .done-overlay .sub{ color: var(--ink-2); margin-bottom: 18px; }
  .done-overlay button{
    background: var(--coral);
    border: 2px solid var(--coral-dk);
    color: #fff;
    padding: 12px 26px;
    font: 700 18px 'Fredoka', sans-serif;
    border-radius: 14px;
    cursor: pointer;
    box-shadow: 0 4px 0 var(--coral-dk);
    margin: 0 4px;
  }
  .done-overlay button:hover{ background: #ff8e85; }
  .done-overlay button:active{ transform: translateY(3px); box-shadow: 0 1px 0 var(--coral-dk); }
  /* Responsive */
  @media (max-width: 600px){
    .top h1{ font-size: 22px; }
    .top .sub{ display: none; }
    .game-shell{ padding: 14px 16px; }
    .game-shell .prompt{ font-size: 16px; }
  }
  @media (prefers-reduced-motion: reduce){
    .builder-area-display.match{ animation: none; }
    .star-pop, .confetti{ animation: none; }
  }
  /* Focus */
  button:focus-visible, input:focus-visible{
    outline: 3px solid var(--sky); outline-offset: 2px;
  }

  /* ═══════════════════════════════════════════════════════════
     MINECRAFT BLOCKY OVERRIDES
     Layered on top so the game logic + per-game color cues stay
     intact, but the chrome looks like Minecraft: chunky pixel fonts,
     square corners, hard pixel-step shadows, block-textured panels.
     ═══════════════════════════════════════════════════════════ */
  body{
    image-rendering: pixelated;
    font-family: 'VT323', 'JetBrains Mono', monospace;
    font-size: 18px;
    background:
      /* dirt-pattern (top band) */
      repeating-linear-gradient(0deg, rgba(106,69,30,0.05) 0 6px, transparent 6px 12px),
      repeating-linear-gradient(90deg, rgba(106,69,30,0.04) 0 6px, transparent 6px 12px),
      radial-gradient(ellipse 50% 35% at 20% 15%, rgba(111,199,168,0.18), transparent 70%),
      radial-gradient(ellipse 45% 30% at 80% 85%, rgba(255,201,74,0.16), transparent 70%),
      radial-gradient(ellipse 40% 30% at 85% 15%, rgba(255,122,111,0.14), transparent 70%),
      var(--cream);
  }

  /* All titles use Press Start 2P */
  .top h1, .game-shell h2, .game-card .gc-name, .home-intro, .done-overlay h2{
    font-family: 'Press Start 2P', monospace;
  }
  .top h1{ font-size: 18px; line-height: 1.4; letter-spacing: 0.04em; }
  .top .sub{
    font-family: 'VT323', monospace;
    font-style: normal;
    font-size: 16px;
    letter-spacing: 0.04em;
  }
  .top .stars{ font-family: 'Press Start 2P', monospace; font-size: 12px; }
  .top .stars b{ font-family: 'Press Start 2P', monospace; font-size: 14px; }
  .game-shell h2{ font-size: 14px; letter-spacing: 0.04em; line-height: 1.4; }
  .game-shell .prompt{ font-family: 'VT323', monospace; font-size: 22px; line-height: 1.35; }
  .game-shell .prompt b{ font-family: 'Press Start 2P', monospace; font-size: 18px; vertical-align: -1px; }
  .home-intro{ font-size: 18px; line-height: 1.5; letter-spacing: 0.04em; }
  .home-intro b{ font-family: 'Press Start 2P', monospace; }
  .home-subintro{ font-family: 'VT323', monospace; font-size: 18px; letter-spacing: 0.04em; }
  .done-overlay h2{ font-size: 20px; line-height: 1.4; }
  .done-overlay .sub{ font-family: 'VT323', monospace; font-size: 20px; }
  .game-card .gc-name{ font-size: 12px; line-height: 1.4; letter-spacing: 0.02em; }
  .game-card .gc-desc{ font-family: 'VT323', monospace; font-size: 15px; line-height: 1.35; }

  /* SQUARE CORNERS EVERYWHERE — no rounded blobs */
  .game-card, .game-shell, .top .back-btn, .choice-btn,
  .answer-row input, .actions .btn, .hint-box,
  .builder-controls .field input, .done-overlay button{
    border-radius: 0 !important;
  }
  /* Re-square the canvas border too */
  .canvas-area svg{ border-radius: 0; border-style: solid; border-width: 3px; border-color: var(--ink); }

  /* Block-style buttons — chunky pixel borders via inset box-shadows */
  .actions .btn, .top .back-btn, .choice-btn,
  .builder-controls .field input, .answer-row input,
  .done-overlay button{
    border: 3px solid var(--ink);
    box-shadow:
      inset 2px 2px 0 rgba(255,255,255,0.32),
      inset -3px -3px 0 rgba(0,0,0,0.32),
      4px 4px 0 var(--ink) !important;
    font-family: 'Press Start 2P', monospace !important;
    font-size: 12px !important;
    letter-spacing: 0.04em;
    padding: 12px 18px;
    text-transform: uppercase;
  }
  .answer-row input, .builder-controls .field input{
    font-family: 'VT323', monospace !important;
    font-size: 24px !important;
    text-transform: none;
  }
  .actions .btn:active, .top .back-btn:active,
  .choice-btn:active:not(:disabled), .done-overlay button:active{
    transform: translate(3px, 3px);
    box-shadow:
      inset 2px 2px 0 rgba(255,255,255,0.32),
      inset -3px -3px 0 rgba(0,0,0,0.32),
      1px 1px 0 var(--ink) !important;
  }

  /* Game cards as Minecraft "blocks" — lighter top/left + darker bottom/right edges */
  .game-card{
    border: 3px solid var(--ink) !important;
    box-shadow:
      inset 3px 3px 0 rgba(255,255,255,0.45),
      inset -4px -4px 0 rgba(0,0,0,0.35),
      6px 6px 0 var(--ink) !important;
    padding: 14px 10px 12px;
    image-rendering: pixelated;
  }
  .game-card:hover{
    transform: translate(-1px, -1px);
    box-shadow:
      inset 3px 3px 0 rgba(255,255,255,0.55),
      inset -4px -4px 0 rgba(0,0,0,0.35),
      7px 7px 0 var(--ink) !important;
  }
  .game-card:active{
    transform: translate(3px, 3px);
    box-shadow:
      inset 3px 3px 0 rgba(255,255,255,0.4),
      inset -4px -4px 0 rgba(0,0,0,0.3),
      2px 2px 0 var(--ink) !important;
  }
  .game-card .gc-icon{ font-size: 40px; }

  /* Game shell = stone-block panel with chunky bevel */
  .game-shell{
    border: 4px solid var(--ink) !important;
    box-shadow:
      inset 3px 3px 0 rgba(255,255,255,0.35),
      inset -4px -4px 0 rgba(0,0,0,0.25),
      6px 6px 0 var(--ink) !important;
    background:
      repeating-linear-gradient(0deg, rgba(0,0,0,0.02) 0 4px, transparent 4px 8px),
      repeating-linear-gradient(90deg, rgba(0,0,0,0.02) 0 4px, transparent 4px 8px),
      var(--paper);
  }

  /* Progress pips look like XP bar segments */
  .game-shell .progress .pip{
    border-radius: 0;
    height: 8px;
    border: 2px solid var(--ink);
    box-shadow: inset 1px 1px 0 rgba(255,255,255,0.4);
  }

  /* Stars in the top bar styled as monospace digits */
  .top .stars{ letter-spacing: 0.04em; }

  /* Hint box = enchantment book vibe (purple-tinted, square) */
  .hint-box{
    background: #fff6dd;
    border: 3px solid var(--sun-dk);
    box-shadow:
      inset 2px 2px 0 rgba(255,255,255,0.5),
      inset -3px -3px 0 rgba(0,0,0,0.18),
      4px 4px 0 var(--sun-dk);
    font-family: 'VT323', monospace;
    font-size: 17px;
    line-height: 1.4;
  }
  .hint-box b{ font-family: 'Press Start 2P', monospace; font-size: 12px; }

  /* Feedback messages — chunky */
  .feedback{ font-family: 'Press Start 2P', monospace; font-size: 13px; line-height: 1.4; letter-spacing: 0.02em; }

  /* Done overlay — block style */
  .done-overlay{
    padding: 20px 14px;
  }
  .done-overlay .big-stars{
    font-size: 48px;
    letter-spacing: 6px;
    filter: drop-shadow(3px 3px 0 rgba(0,0,0,0.4));
  }

  /* Star pop — pixelate */
  .star-pop{ image-rendering: pixelated; filter: drop-shadow(4px 4px 0 rgba(0,0,0,0.4)); }

  /* Choice buttons — re-color the "correct/wrong" with blocky borders */
  .choice-btn.correct{
    background: #6fc7a8;
    border-color: #1a4030 !important;
    color: #1a1a1a;
    box-shadow:
      inset 2px 2px 0 rgba(255,255,255,0.45),
      inset -3px -3px 0 rgba(0,0,0,0.3),
      4px 4px 0 #1a4030 !important;
  }
  .choice-btn.wrong{
    background: #ff7a6f;
    border-color: #6a1a14 !important;
    color: #fff;
    box-shadow:
      inset 2px 2px 0 rgba(255,255,255,0.3),
      inset -3px -3px 0 rgba(0,0,0,0.3),
      4px 4px 0 #6a1a14 !important;
  }

  /* The number inputs need monospaced numbers */
  .answer-row input[type=number]{
    font-family: 'VT323', monospace !important;
    font-size: 28px !important;
    width: 130px;
  }
  .answer-row .unit{ font-family: 'VT323', monospace; font-size: 18px; }

  /* Builder area-display = XP-bar feel */
  .builder-area-display{
    font-family: 'Press Start 2P', monospace;
    font-size: 12px;
    padding: 8px 12px;
    background: var(--cream);
    border: 3px solid var(--ink);
    box-shadow: inset 2px 2px 0 rgba(255,255,255,0.4), inset -2px -2px 0 rgba(0,0,0,0.18);
  }
  .builder-area-display.match{
    background: #ffc94a;
    color: var(--coral-dk);
  }

  /* Confetti = pixelated */
  .confetti{ image-rendering: pixelated; text-shadow: 2px 2px 0 rgba(0,0,0,0.3); }

  /* ═══════════════════════════════════════════════════════════
     SECRET LEVELS & EASTER EGGS
     ═══════════════════════════════════════════════════════════ */
  /* Hidden diamond block in the bottom-right corner — faint, ~16×16
     pixel cluster. Becomes clickable once spotted. */
  .secret-diamond{
    position: fixed;
    bottom: 6px;
    right: 6px;
    width: 16px;
    height: 16px;
    cursor: pointer;
    image-rendering: pixelated;
    opacity: 0.12;
    transition: opacity 0.15s, transform 0.15s;
    z-index: 50;
  }
  .secret-diamond:hover{ opacity: 0.95; transform: scale(1.4); }
  .secret-diamond.found{
    opacity: 1;
    animation: diamondGlow 1.6s ease-in-out infinite alternate;
  }
  @keyframes diamondGlow{
    from{ filter: drop-shadow(0 0 4px #7df0ff); }
    to  { filter: drop-shadow(0 0 14px #c8f8ff); }
  }
  /* Easter egg tracker pill (appears once first egg is found) */
  .egg-tracker{
    position: fixed;
    top: 60px; right: 10px;
    background: var(--paper);
    border: 3px solid var(--ink);
    box-shadow:
      inset 2px 2px 0 rgba(255,255,255,0.4),
      inset -3px -3px 0 rgba(0,0,0,0.18),
      3px 3px 0 var(--ink);
    color: var(--ink);
    font: 11px 'Press Start 2P', monospace;
    letter-spacing: 0.04em;
    padding: 6px 10px;
    z-index: 49;
    cursor: pointer;
    display: none;
  }
  .egg-tracker.show{ display: block; }
  .egg-tracker:hover{ background: var(--cream); }
  /* Dancing cat overlay (Konami code reveal) */
  .dance-overlay{
    position: fixed; inset: 0;
    background:
      repeating-linear-gradient(0deg, rgba(0,0,0,0.3) 0 4px, transparent 4px 8px),
      radial-gradient(ellipse 60% 50% at 50% 50%, rgba(255,200,80,0.18), rgba(20,10,30,0.92));
    z-index: 200;
    display: none;
    align-items: center; justify-content: center;
    flex-direction: column;
    cursor: pointer;
    overflow: hidden;
  }
  .dance-overlay.show{ display: flex; }
  .dance-overlay .dance-svg{
    width: 280px; height: 220px;
    animation: catDance 0.7s ease-in-out infinite alternate;
    transform-origin: 50% 80%;
  }
  @keyframes catDance{
    0%   { transform: translateY(0) rotate(-12deg) scale(1); }
    100% { transform: translateY(-30px) rotate(12deg) scale(1.15); }
  }
  .dance-overlay .dance-floor{
    width: 320px; height: 14px;
    background:
      repeating-linear-gradient(90deg, #1a0a08 0 16px, #2a1810 16px 32px);
    border: 3px solid var(--ink);
    box-shadow: inset 2px 2px 0 rgba(255,255,255,0.2);
    margin-top: -6px;
  }
  .dance-overlay .dance-title{
    font: 18px 'Press Start 2P', monospace;
    color: var(--sun);
    letter-spacing: 0.06em;
    margin-top: 24px;
    animation: dancePulse 0.42s steps(2, end) infinite alternate;
    text-shadow: 2px 2px 0 var(--ink), 4px 4px 0 rgba(0,0,0,0.4);
  }
  .dance-overlay .dance-sub{
    font: 14px 'VT323', monospace;
    color: var(--text);
    color: #fff6dd;
    margin-top: 10px;
    opacity: 0.7;
  }
  @keyframes dancePulse{
    from{ color: #ffc94a; }
    to  { color: #ff7eb9; }
  }
  /* Floating note characters (musical confetti) */
  .dance-note{
    position: fixed;
    font: 28px 'Press Start 2P', monospace;
    color: var(--sun);
    pointer-events: none;
    z-index: 201;
    animation: noteFloat 2.4s ease-out forwards;
    text-shadow: 2px 2px 0 var(--ink);
  }
  @keyframes noteFloat{
    0%   { opacity: 0; transform: translateY(0) rotate(0); }
    15%  { opacity: 1; }
    100% { opacity: 0; transform: translateY(-90vh) rotate(var(--rot, 360deg)); }
  }
  /* Crossing cow ("moo" easter egg) */
  .crossing-cow{
    position: fixed;
    bottom: 40px;
    left: -120px;
    font: 60px sans-serif;
    z-index: 95;
    pointer-events: none;
    animation: cowWalk 6s linear forwards;
    image-rendering: pixelated;
    filter: drop-shadow(2px 2px 0 rgba(0,0,0,0.4));
  }
  @keyframes cowWalk{
    0%   { left: -120px; transform: scaleX(1); }
    100% { left: 110vw;  transform: scaleX(1); }
  }
  /* Pi banner */
  .pi-banner{
    position: fixed;
    top: 30%; left: 50%;
    transform: translate(-50%, -50%);
    font: 32px 'Press Start 2P', monospace;
    color: var(--coral);
    background: var(--paper);
    border: 4px solid var(--ink);
    box-shadow:
      inset 3px 3px 0 rgba(255,255,255,0.4),
      inset -4px -4px 0 rgba(0,0,0,0.2),
      6px 6px 0 var(--ink);
    padding: 18px 28px;
    z-index: 90;
    letter-spacing: 0.04em;
    text-align: center;
    pointer-events: none;
    animation: piPop 2.6s ease-out forwards;
  }
  .pi-banner small{
    display: block;
    font: 14px 'VT323', monospace;
    color: var(--ink-2);
    margin-top: 6px;
    letter-spacing: 0;
  }
  @keyframes piPop{
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
    15%  { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
    50%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    100% { opacity: 0; transform: translate(-50%, -120%) scale(1); }
  }
  /* Egg-found toast */
  .egg-toast{
    position: fixed;
    top: 100px; left: 50%;
    transform: translateX(-50%) translateY(-80px);
    background: var(--sun);
    color: var(--ink);
    border: 3px solid var(--ink);
    box-shadow:
      inset 2px 2px 0 rgba(255,255,255,0.4),
      inset -3px -3px 0 rgba(0,0,0,0.2),
      4px 4px 0 var(--ink);
    padding: 10px 18px;
    font: 12px 'Press Start 2P', monospace;
    letter-spacing: 0.04em;
    z-index: 110;
    transition: transform 0.35s cubic-bezier(0.2,0.85,0.35,1.1);
  }
  .egg-toast.show{ transform: translateX(-50%) translateY(0); }
  /* Secret-list modal */
  .egg-modal{
    position: fixed; inset: 0;
    background: rgba(20,10,5,0.7);
    display: none;
    align-items: center; justify-content: center;
    z-index: 105;
    padding: 16px;
  }
  .egg-modal.show{ display: flex; }
  .egg-modal .panel{
    background: var(--paper);
    border: 4px solid var(--ink);
    box-shadow:
      inset 3px 3px 0 rgba(255,255,255,0.4),
      inset -4px -4px 0 rgba(0,0,0,0.2),
      6px 6px 0 var(--ink);
    padding: 22px 26px;
    max-width: 440px;
    width: 100%;
  }
  .egg-modal h3{
    font: 14px 'Press Start 2P', monospace;
    color: var(--coral-dk);
    letter-spacing: 0.04em;
    margin-bottom: 14px;
  }
  .egg-modal .egg-item{
    display: flex; align-items: center; gap: 12px;
    padding: 8px 0;
    border-bottom: 2px dashed var(--ink-3);
    font: 14px 'VT323', monospace;
    font-size: 16px;
  }
  .egg-modal .egg-item:last-child{ border-bottom: none; }
  .egg-modal .egg-item .ic{ font-size: 24px; width: 30px; text-align: center; }
  .egg-modal .egg-item .label{ flex: 1; }
  .egg-modal .egg-item .status{
    font: 9px 'Press Start 2P', monospace;
    padding: 3px 7px;
    border: 2px solid var(--ink);
  }
  .egg-modal .egg-item.found .status{ background: var(--mint); color: var(--ink); }
  .egg-modal .egg-item:not(.found) .status{ background: var(--ink-3); color: var(--paper); }
  .egg-modal .egg-item .hint{
    font-style: italic;
    color: var(--ink-2);
    font-size: 13px;
    margin-top: 2px;
    display: block;
  }
  .egg-modal .close-btn{
    margin-top: 14px;
    width: 100%;
    background: var(--coral);
    border: 3px solid var(--ink);
    color: #fff;
    padding: 10px;
    font: 11px 'Press Start 2P', monospace;
    box-shadow:
      inset 2px 2px 0 rgba(255,255,255,0.3),
      inset -3px -3px 0 rgba(0,0,0,0.25),
      4px 4px 0 var(--ink);
    cursor: pointer;
  }

  /* Mobile adjustments — Press Start 2P is wide */
  @media (max-width: 600px){
    .top h1{ font-size: 14px; }
    .game-shell h2{ font-size: 12px; }
    .game-shell .prompt{ font-size: 18px; }
    .game-card .gc-name{ font-size: 11px; }
    .actions .btn{ font-size: 11px !important; padding: 10px 12px; }
  }
</style>
</head>
<body>

<div class="top">
  <div class="brand">
    <h1>📐 Area <em>Arcade</em></h1>
    <div class="sub">learn area · 5 mini-games</div>
  </div>
  <button type="button" class="back-btn hidden" id="back-btn">← all games</button>
  <div class="stars">⭐ <b id="stars-total">0</b> / 50</div>
</div>

<div class="main" id="main">
  <!-- rendered by JS -->
</div>

<!-- ═══ EASTER EGGS + REWARDS ═══ -->
<!-- Hidden diamond block in the bottom-right corner (faint until found) -->
<svg class="secret-diamond" id="secret-diamond" viewBox="0 0 16 16" aria-label="A faint pixel block">
  <rect x="6" y="2" width="4" height="2" fill="#fff" shape-rendering="crispEdges"/>
  <rect x="4" y="4" width="2" height="2" fill="#a0e8f0" shape-rendering="crispEdges"/>
  <rect x="6" y="4" width="4" height="2" fill="#5cd0e0" shape-rendering="crispEdges"/>
  <rect x="10" y="4" width="2" height="2" fill="#3aa0c0" shape-rendering="crispEdges"/>
  <rect x="2" y="6" width="2" height="2" fill="#a0e8f0" shape-rendering="crispEdges"/>
  <rect x="4" y="6" width="8" height="2" fill="#5cd0e0" shape-rendering="crispEdges"/>
  <rect x="12" y="6" width="2" height="2" fill="#3aa0c0" shape-rendering="crispEdges"/>
  <rect x="2" y="8" width="2" height="2" fill="#3aa0c0" shape-rendering="crispEdges"/>
  <rect x="4" y="8" width="8" height="2" fill="#1a78a0" shape-rendering="crispEdges"/>
  <rect x="12" y="8" width="2" height="2" fill="#0a5878" shape-rendering="crispEdges"/>
  <rect x="4" y="10" width="2" height="2" fill="#1a78a0" shape-rendering="crispEdges"/>
  <rect x="6" y="10" width="4" height="2" fill="#0a5878" shape-rendering="crispEdges"/>
  <rect x="10" y="10" width="2" height="2" fill="#0a4060" shape-rendering="crispEdges"/>
  <rect x="6" y="12" width="4" height="2" fill="#0a4060" shape-rendering="crispEdges"/>
</svg>

<!-- Tracker pill (appears once first egg/reward is found) -->
<button type="button" class="egg-tracker" id="egg-tracker" title="View your collection">
  🥚 <span id="egg-count">0</span> / 4
</button>

<!-- Dancing Maine Coon overlay (Konami code) -->
<div class="dance-overlay" id="dance-overlay" role="dialog" aria-modal="true" aria-label="dancing cat">
  <svg class="dance-svg" id="dance-svg" viewBox="-30 -25 60 50"></svg>
  <div class="dance-floor"></div>
  <div class="dance-title">★ DANCE BREAK ★</div>
  <div class="dance-sub">(tap anywhere to stop the cat)</div>
</div>

<!-- Egg+Reward collection modal -->
<div class="egg-modal" id="egg-modal" role="dialog" aria-modal="true">
  <div class="panel">
    <h3>🥚 SECRETS &amp; REWARDS</h3>
    <div id="egg-list"></div>
    <h3 style="margin-top:18px;">🏆 5-STAR REWARDS</h3>
    <div id="reward-list"></div>
    <button type="button" class="close-btn" id="egg-close">CLOSE</button>
  </div>
</div>

<script>
'use strict';

/* ── State + persistence ──────────────────────────────────── */
const STAR_KEY = 'area-arcade-stars-v2';
const stars = (() => {
  const def = { tile: 0, build: 0, match: 0, garden: 0, split: 0,
                tri: 0, para: 0, trap: 0, formula: 0, rescue: 0 };
  try{
    const raw = localStorage.getItem(STAR_KEY);
    if (raw){
      const parsed = JSON.parse(raw);
      return Object.assign(def, parsed);
    }
    // migrate v1 → v2 if present
    const old = localStorage.getItem('area-arcade-stars-v1');
    if (old){
      const parsed = JSON.parse(old);
      return Object.assign(def, parsed);
    }
  }catch(_){}
  return def;
})();
function totalStars(){
  return Object.values(stars).reduce((a, v) => a + (+v || 0), 0);
}
function saveStars(){
  try{ localStorage.setItem(STAR_KEY, JSON.stringify(stars)); }catch(_){}
  document.getElementById('stars-total').textContent = totalStars();
}

const GAMES = [
  { id: 'tile',    color: 'mint',  icon: '🟦', name: 'Tile Count',     desc: 'Count the unit squares to find the area' },
  { id: 'build',   color: 'coral', icon: '📏', name: 'Build It',       desc: 'Make a rectangle with the right area' },
  { id: 'match',   color: 'sun',   icon: '🔍', name: 'Area Match',     desc: 'Pick the shape with the matching area' },
  { id: 'garden',  color: 'sky',   icon: '🌻', name: 'Garden Plan',    desc: 'Solve story problems about area' },
  { id: 'split',   color: 'plum',  icon: '🧩', name: 'Split & Sum',    desc: 'Split L-shapes into rectangles' },
  { id: 'tri',     color: 'coral', icon: '🔺', name: 'Triangles',      desc: 'Area = ½ × base × height' },
  { id: 'para',    color: 'sky',   icon: '◇',  name: 'Parallelograms', desc: 'Area = base × height (the slant doesn\'t matter)' },
  { id: 'trap',    color: 'plum',  icon: '⏢',  name: 'Trapezoids',     desc: 'Area = ½ × (b₁ + b₂) × height' },
  { id: 'formula', color: 'sun',   icon: '🧮', name: 'Formula Match',  desc: 'Pick the right formula for the shape' },
  { id: 'rescue',  color: 'mint',  icon: '🐱', name: 'Shape Rescue',   desc: 'Save the blocky cat! Tap the shape with the biggest area' },
];

let view = 'home';
let currentGame = null;
let currentLevel = 0;
let levelStars = 0;
let attempts = 0;
let levelData = null;

/* ── Main router ──────────────────────────────────────────── */
function render(){
  const main = document.getElementById('main');
  const back = document.getElementById('back-btn');
  if (view === 'home'){
    back.classList.add('hidden');
    main.innerHTML = renderHome();
    bindHome();
  } else if (view === 'game'){
    back.classList.remove('hidden');
    main.innerHTML = renderGameShell();
    renderLevel();
  } else if (view === 'done'){
    back.classList.remove('hidden');
    main.innerHTML = renderDone();
    bindDone();
  }
}
document.getElementById('back-btn').addEventListener('click', () => {
  view = 'home';
  currentGame = null;
  render();
});

/* ── HOME view ────────────────────────────────────────────── */
function renderHome(){
  return '<div class="home-intro">welcome to <b>Area Arcade</b></div>'
    + '<div class="home-subintro">pick a mini-game — every level wins a ⭐</div>'
    + '<div class="game-grid">'
    + GAMES.map(g => {
        const won = stars[g.id] || 0;
        const max = 5;
        const pips = Array.from({length: max}, (_, i) =>
          '<span class="s ' + (i < won ? 'on' : 'off') + '">⭐</span>').join('');
        return '<div class="game-card ' + g.color + '" data-game="' + g.id + '">'
          + '<span class="gc-icon">' + g.icon + '</span>'
          + '<div class="gc-name">' + g.name + '</div>'
          + '<div class="gc-desc">' + g.desc + '</div>'
          + '<div class="gc-stars">' + pips + '</div>'
          + '</div>';
      }).join('')
    + '</div>';
}
function bindHome(){
  document.querySelectorAll('.game-card[data-game]').forEach(card => {
    card.addEventListener('click', () => {
      const g = card.dataset.game;
      currentGame = g;
      currentLevel = 0; // always start at level 1 — players can repeat
      attempts = 0;
      levelStars = 0;
      view = 'game';
      render();
    });
  });
}

/* ── GAME SHELL (common chrome around any level) ───────── */
function renderGameShell(){
  const game = GAMES.find(g => g.id === currentGame);
  const pips = Array.from({length: 5}, (_, i) =>
    '<div class="pip' + (i < currentLevel ? ' done' : '') + (i === currentLevel ? ' active' : '') + '"></div>'
  ).join('');
  return '<div class="game-shell">'
    + '<h2>' + game.icon + ' ' + game.name + ' <span style="color:var(--ink-2); font-size:14px; font-weight:400;">· level ' + (currentLevel + 1) + ' / 5</span></h2>'
    + '<div class="progress">' + pips + '</div>'
    + '<div id="level-body"></div>'
    + '<div class="feedback" id="feedback"></div>'
    + '<div class="hint-box" id="hint-box"></div>'
    + '<div class="actions" id="actions"></div>'
    + '</div>';
}

/* ── Level renderer dispatch ─────────────────────────────── */
function renderLevel(){
  attempts = 0;
  levelData = makeLevel(currentGame, currentLevel);
  const body = document.getElementById('level-body');
  body.innerHTML = levelData.html;
  setupActions(levelData);
  levelData.onMount && levelData.onMount();
}

/* ── Generic actions: Hint + Check + Next ───────────────── */
function setupActions(level){
  const a = document.getElementById('actions');
  a.innerHTML = '<button type="button" class="btn hint" id="btn-hint">💡 Hint</button>'
    + '<button type="button" class="btn" id="btn-check">Check answer ✓</button>';
  document.getElementById('btn-hint').addEventListener('click', () => {
    document.getElementById('hint-box').innerHTML = level.hint;
    document.getElementById('hint-box').classList.add('show');
  });
  document.getElementById('btn-check').addEventListener('click', () => checkAnswer(level));
}
function showFeedback(msg, kind){
  const fb = document.getElementById('feedback');
  fb.className = 'feedback ' + (kind || '');
  fb.innerHTML = msg;
}
function checkAnswer(level){
  attempts++;
  const ok = level.check();
  if (ok){
    showFeedback('<span class="emoji">🎉</span>' + pick(GOOD_LINES), 'good');
    // award star ONLY if first attempt was correct? No — be friendly to kids.
    // Award star for completion; first-try gets a bonus message.
    if (attempts === 1) showFeedback('<span class="emoji">🌟</span>first try! ' + pick(GOOD_LINES), 'good');
    // freeze inputs
    document.querySelectorAll('#level-body input, #level-body button').forEach(el => el.disabled = true);
    // replace actions with Next
    const a = document.getElementById('actions');
    a.innerHTML = '<button type="button" class="btn next" id="btn-next">Next ▶</button>';
    document.getElementById('btn-next').addEventListener('click', advanceLevel);
    // visual star pop
    popStar();
    confetti();
  } else {
    showFeedback('<span class="emoji">' + pick(['🤔','🙃','📐','✏️']) + '</span>' + pick(BAD_LINES), 'bad');
  }
}
const GOOD_LINES = [
  'nice work!', 'you got it!', 'spot on!', 'beautifully done.',
  'area expert!', 'math wizard!', 'perfect square!', 'precision!',
];
const BAD_LINES = [
  'not quite — try again!',
  'close! check your math.',
  "almost — let's try once more.",
  'oops, give it another shot.',
  'hmm, count again carefully!',
];
function pick(a){ return a[Math.floor(Math.random() * a.length)]; }

function advanceLevel(){
  // award a star if this level wasn't already earned
  if (currentLevel + 1 > stars[currentGame]){
    stars[currentGame] = currentLevel + 1;
    saveStars();
  }
  currentLevel++;
  if (currentLevel >= 5){
    view = 'done';
    render();
  } else {
    render();
  }
}

/* ── DONE view (game complete) ───────────────────────────── */
function renderDone(){
  const game = GAMES.find(g => g.id === currentGame);
  return '<div class="game-shell"><div class="done-overlay">'
    + '<h2>🎉 ' + game.name + ' complete!</h2>'
    + '<div class="big-stars">⭐⭐⭐⭐⭐</div>'
    + '<div class="sub">you mastered all 5 levels of <b>' + game.name + '</b>!</div>'
    + '<button type="button" id="btn-replay">↻ play again</button>'
    + '<button type="button" id="btn-home">🏠 menu</button>'
    + '</div></div>';
}
function bindDone(){
  document.getElementById('btn-replay').addEventListener('click', () => {
    currentLevel = 0;
    view = 'game';
    render();
  });
  document.getElementById('btn-home').addEventListener('click', () => {
    view = 'home';
    currentGame = null;
    render();
  });
}

/* ── Star pop + confetti ─────────────────────────────────── */
function popStar(){
  const s = document.createElement('div');
  s.className = 'star-pop';
  s.textContent = '⭐';
  document.body.appendChild(s);
  setTimeout(() => s.remove(), 1200);
}
function confetti(){
  const emojis = ['🎉','🎊','✨','🌟','⭐','🟦','🟥','🟨','🟩'];
  for (let i = 0; i < 18; i++){

/* ── Level factory: routes to per-game generator ────────── */
function makeLevel(gameId, idx){
  if (gameId === 'tile')    return makeTileLevel(idx);
  if (gameId === 'build')   return makeBuildLevel(idx);
  if (gameId === 'match')   return makeMatchLevel(idx);
  if (gameId === 'garden')  return makeGardenLevel(idx);
  if (gameId === 'split')   return makeSplitLevel(idx);
  if (gameId === 'tri')     return makeTriLevel(idx);
  if (gameId === 'para')    return makeParaLevel(idx);
  if (gameId === 'trap')    return makeTrapLevel(idx);
  if (gameId === 'formula') return makeFormulaLevel(idx);
  if (gameId === 'rescue')  return makeRescueLevel(idx);
}

/* ── SVG helpers ─────────────────────────────────────────── */
const UNIT = 32; // px per unit square in SVG renders

function svgGrid(cols, rows, opts){
  const w = cols * UNIT;
  const h = rows * UNIT;
  let pad = 12;
  let content = '';
  // grid lines
  for (let x = 0; x <= cols; x++){
    content += '<line x1="' + (pad + x * UNIT) + '" y1="' + pad + '" x2="' + (pad + x * UNIT) + '" y2="' + (pad + h) + '" stroke="#dde4ec" stroke-width="1"/>';
  }
  for (let y = 0; y <= rows; y++){
    content += '<line x1="' + pad + '" y1="' + (pad + y * UNIT) + '" x2="' + (pad + w) + '" y2="' + (pad + y * UNIT) + '" stroke="#dde4ec" stroke-width="1"/>';
  }
  return { pad, w, h, content };
}
function svgFillCells(cells, pad, color){
  return cells.map(([x, y]) =>
    '<rect x="' + (pad + x * UNIT + 1) + '" y="' + (pad + y * UNIT + 1)
    + '" width="' + (UNIT - 2) + '" height="' + (UNIT - 2)
    + '" fill="' + color + '" rx="2"/>'
  ).join('');
}
function svgWrap(w, h, pad, inner){
  return '<svg viewBox="0 0 ' + (w + pad * 2) + ' ' + (h + pad * 2)
    + '" width="' + Math.min(w + pad * 2, 460) + '">' + inner + '</svg>';
}

/* ═══ GAME 1: TILE COUNT ═══════════════════════════════════ */
function makeTileLevel(idx){
  // 5 levels of increasing complexity:
  // L1: 3x2 rectangle (6) · L2: 4x3 (12) · L3: L-shape · L4: T-shape · L5: bigger irregular
  const layouts = [
    { cells: rectCells(3, 2), label: 'rectangle' },
    { cells: rectCells(4, 3), label: 'rectangle' },
    { cells: [...rectCells(3, 2), [3,0],[3,1]], label: 'L-shape' },
    { cells: [...rectCells(4, 1), [1,1],[2,1],[1,2],[2,2]], label: 'T-shape' },
    { cells: [...rectCells(5, 2), [0,2],[4,2],[2,2]], label: 'plus-shape' },
  ];
  const layout = layouts[idx];
  const cells = layout.cells;
  const cols = Math.max(...cells.map(c => c[0])) + 1;
  const rows = Math.max(...cells.map(c => c[1])) + 1;
  const g = svgGrid(cols, rows);
  const fill = svgFillCells(cells, g.pad, '#6fc7a8');
  const svg = svgWrap(g.w, g.h, g.pad, g.content + fill);
  const answer = cells.length;
  return {
    html:
      '<div class="prompt">How many square units of area does this ' + layout.label + ' have? <b>Count the tiles!</b></div>'
      + '<div class="canvas-area">' + svg + '</div>'
      + '<div class="answer-row">'
        + '<input type="number" id="ans-tile" min="1" max="999" placeholder="?">'
        + '<span class="unit">square units</span>'
      + '</div>',
    hint: '<b>Tip:</b> count each green square one at a time. You can mark them with your finger! For shapes that aren\'t rectangles, count each unit square — they all count the same.',
    onMount(){
      setTimeout(() => document.getElementById('ans-tile')?.focus(), 30);
    },
    check(){
      const v = +document.getElementById('ans-tile').value;
      return v === answer;
    },
  };
}
function rectCells(w, h){
  const out = [];
  for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) out.push([x, y]);
  return out;
}

/* ═══ GAME 2: BUILD IT (target area) ════════════════════════ */
function makeBuildLevel(idx){
  // target area; player picks length + width
  const targets = [12, 20, 24, 36, 48];
  const target = targets[idx];
  return {
    html:
      '<div class="prompt">Build a <b>rectangle</b> with an area of <b>' + target + ' square units</b>. Choose any length and width that multiply to ' + target + '.</div>'
      + '<div class="builder-controls">'
        + '<div class="field"><label>length:</label><input type="number" id="b-l" min="1" max="12" value="1"></div>'
        + '<div class="field" style="font-size:24px; color:var(--ink-3);">×</div>'
        + '<div class="field"><label>width:</label><input type="number" id="b-w" min="1" max="12" value="1"></div>'
        + '<div class="builder-area-display" id="b-area-display">area: 1 sq units</div>'
      + '</div>'
      + '<div class="canvas-area" id="builder-canvas"></div>',
    hint: '<b>Tip:</b> think about pairs of numbers that multiply to ' + target + '. For ' + target + ', try ' + factorsHint(target) + '.',
    onMount(){
      const lI = document.getElementById('b-l');
      const wI = document.getElementById('b-w');
      const repaint = () => {
        const l = Math.max(1, Math.min(12, +lI.value || 1));
        const w = Math.max(1, Math.min(12, +wI.value || 1));
        const area = l * w;
        const display = document.getElementById('b-area-display');
        display.textContent = 'area: ' + area + ' sq units';
        display.classList.toggle('match', area === target);
        // svg
        const g = svgGrid(l, w);
        const fill = svgFillCells(rectCells(l, w), g.pad, area === target ? '#ff7a6f' : '#6cb7e8');
        document.getElementById('builder-canvas').innerHTML = svgWrap(g.w, g.h, g.pad, g.content + fill);
      };
      lI.addEventListener('input', repaint);
      wI.addEventListener('input', repaint);
      repaint();
      setTimeout(() => lI.focus(), 30);
    },
    check(){
      const l = +document.getElementById('b-l').value;
      const w = +document.getElementById('b-w').value;
      return l * w === target;
    },
  };
}
function factorsHint(n){
  const f = [];
  for (let i = 1; i * i <= n; i++){
    if (n % i === 0 && i > 1) f.push(i + ' × ' + (n / i));
  }
  return f.slice(0, 3).join(', ') || 'just experiment with small numbers';
}

/* ═══ GAME 3: AREA MATCH ════════════════════════════════════ */
function makeMatchLevel(idx){
  // show 4 shapes, ask which has the target area
  // levels: simple rectangles, then add triangles + parallelograms
  const target = [12, 16, 18, 20, 24][idx];
  // build 4 candidates: one with target area, 3 with different areas
  const shapeOptions = [];
  // build pool of shapes around target
  const make = (kind, w, h) => ({ kind, w, h, area: kind === 'tri' ? (w * h) / 2 : w * h });
  // pool
  const pool = [];
  // rectangles
  for (let w = 2; w <= 8; w++) for (let h = 2; h <= 8; h++) pool.push(make('rect', w, h));
  // triangles (so area = w*h/2)
  for (let w = 2; w <= 10; w += 2) for (let h = 2; h <= 10; h += 2) pool.push(make('tri', w, h));
  // pick 1 correct
  const correctOptions = pool.filter(s => s.area === target);
  const correct = correctOptions[Math.floor(Math.random() * correctOptions.length)];
  // pick 3 wrong (close areas, never target)
  const distractors = [];
  while (distractors.length < 3){
    const cand = pool[Math.floor(Math.random() * pool.length)];
    if (cand.area === target) continue;
    if (Math.abs(cand.area - target) > 12) continue;
    if (distractors.find(d => d.area === cand.area && d.kind === cand.kind && d.w === cand.w && d.h === cand.h)) continue;
    distractors.push(cand);
  }
  const all = [correct, ...distractors];
  shuffle(all);
  return {
    html:
      '<div class="prompt">Which shape has an area of <b>' + target + ' square units</b>?</div>'
      + '<div class="canvas-area">' + svgMultipleShapes(all) + '</div>'
      + '<div class="answer-row" style="font-size:14px; color:var(--ink-3);">tap a shape to pick</div>',
    hint: '<b>Tip:</b> rectangle area = length × width. Triangle area = (base × height) ÷ 2 — half a rectangle!',
    onMount(){
      document.querySelectorAll('[data-shape-idx]').forEach(el => {
        el.addEventListener('click', () => {
          const i = +el.dataset.shapeIdx;
          const chosen = all[i];
          // mark visually + check
          document.querySelectorAll('[data-shape-idx]').forEach(x => x.classList.remove('selected'));
          el.classList.add('selected');
          if (chosen.area === target){
            el.style.outline = '4px solid var(--mint-dk)';
            checkAnswerForMatch(true);
          } else {
            el.style.outline = '4px solid var(--coral-dk)';
            checkAnswerForMatch(false);
          }
        });
      });
    },
    check(){
      // also fall through to "Check answer" button — but match is click-based
      // grab whichever was selected and compare
      const sel = document.querySelector('[data-shape-idx][style*="selected"], [data-shape-idx][style*="outline"]');
      if (!sel) return false;
      const i = +sel.dataset.shapeIdx;
      return all[i].area === target;
    },
  };
}
function checkAnswerForMatch(correct){
  attempts++;
  if (correct){
    showFeedback('<span class="emoji">🎯</span>' + pick(GOOD_LINES), 'good');
    document.querySelectorAll('[data-shape-idx]').forEach(el => el.style.pointerEvents = 'none');
    const a = document.getElementById('actions');
    a.innerHTML = '<button type="button" class="btn next" id="btn-next">Next ▶</button>';
    document.getElementById('btn-next').addEventListener('click', advanceLevel);
    popStar();
    confetti();
  } else {
    showFeedback('<span class="emoji">📐</span>not that one — calculate the area first.', 'bad');
  }
}
function shuffle(a){
  for (let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
}
function svgMultipleShapes(shapes){
  let out = '<svg viewBox="0 0 540 280" width="540" style="background:#fff; border-radius:12px; border:2px dashed var(--ink-3);">';
  const colors = ['#ff7a6f', '#6cb7e8', '#ffc94a', '#b85ec0'];
  shapes.forEach((s, i) => {
    const ox = 24 + (i % 2) * 260;
    const oy = 24 + Math.floor(i / 2) * 130;
    const cellSize = 14;
    out += '<g transform="translate(' + ox + ' ' + oy + ')" data-shape-idx="' + i + '" style="cursor:pointer;">';
    if (s.kind === 'rect'){
      // grid lines + fill
      const W = s.w * cellSize, H = s.h * cellSize;
      out += '<rect width="' + W + '" height="' + H + '" fill="' + colors[i] + '" stroke="#2a3848" stroke-width="2" rx="3"/>';
      // grid overlay
      for (let x = 1; x < s.w; x++){
        out += '<line x1="' + (x * cellSize) + '" y1="0" x2="' + (x * cellSize) + '" y2="' + H + '" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>';
      }
      for (let y = 1; y < s.h; y++){
        out += '<line x1="0" y1="' + (y * cellSize) + '" x2="' + W + '" y2="' + (y * cellSize) + '" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>';
      }
      // label
      out += '<text x="' + (W + 8) + '" y="' + (H / 2 + 4) + '" font-family="Fredoka" font-size="12" fill="#2a3848">' + s.w + ' × ' + s.h + '</text>';
    } else if (s.kind === 'tri'){
      const W = s.w * cellSize, H = s.h * cellSize;
      out += '<polygon points="0,' + H + ' ' + W + ',' + H + ' 0,0" fill="' + colors[i] + '" stroke="#2a3848" stroke-width="2"/>';
      // dashed base + height labels
      out += '<line x1="0" y1="' + H + '" x2="' + W + '" y2="' + H + '" stroke="#2a3848" stroke-width="1" stroke-dasharray="3 3"/>';
      out += '<text x="' + (W / 2) + '" y="' + (H + 18) + '" font-family="Fredoka" font-size="11" fill="#5a6878" text-anchor="middle">b = ' + s.w + '</text>';
      out += '<text x="-6" y="' + (H / 2) + '" font-family="Fredoka" font-size="11" fill="#5a6878" text-anchor="end">h = ' + s.h + '</text>';
    }
    out += '</g>';
  });
  out += '</svg>';
  return out;
}

/* ═══ GAME 4: GARDEN PLANNER (word problems) ════════════════ */
