<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Tickle Machine</title>
<link rel="icon" href="https://emojicdn.elk.sh/🤭">
<meta property="og:title" content="Tickle Machine">
<meta property="og:description" content="Tickle the fuzzy mascot and make it laugh uncontrollably.">
<meta property="og:url" content="https://sloppy.live/tickle-machine">
<meta property="og:image" content="https://emojicdn.elk.sh/🤭?style=apple&size=512">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&family=Nunito:wght@300;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100dvh;overflow:hidden}
body{
  background:#1a0a2e;
  font-family:'Nunito',sans-serif;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  user-select:none;-webkit-user-select:none;
}

h1{
  font-family:'Fredoka',sans-serif;font-weight:600;
  font-size:clamp(1.6rem,5vw,2.4rem);
  color:#ff80d0;text-shadow:0 0 20px rgba(255,128,208,0.3);
  letter-spacing:2px;margin-bottom:4px;text-align:center;
}
.sub{font-size:10px;color:rgba(255,128,208,0.2);letter-spacing:3px;margin-bottom:12px}

canvas{
  border-radius:50%;
  cursor:pointer;
  touch-action:none;
  box-shadow:0 0 60px rgba(255,128,208,0.1),0 0 120px rgba(180,80,255,0.05);
}

#laugh-meter{
  width:200px;height:8px;border-radius:4px;margin-top:14px;
  background:rgba(255,128,208,0.1);overflow:hidden;
}
#laugh-fill{
  height:100%;width:0%;border-radius:4px;
  background:linear-gradient(90deg,#ff80d0,#ffdd40,#80ff80);
  transition:width 0.15s;
}

#tickle-count{
  font-size:11px;color:rgba(255,128,208,0.2);margin-top:6px;letter-spacing:1px;
}

#laugh-text{
  font-family:'Fredoka',sans-serif;font-size:1.2rem;
  color:#ffdd40;text-shadow:0 0 15px rgba(255,220,64,0.3);
  height:30px;margin-top:6px;opacity:0;transition:opacity 0.2s;
}
#laugh-text.show{opacity:1}

a#back{position:fixed;bottom:8px;left:10px;font-size:9px;opacity:0.1;color:#408;text-decoration:none;z-index:5}

/* Fuzzy background texture */
body::before{
  content:'';position:fixed;inset:0;z-index:-1;
  background:
    radial-gradient(circle at 20% 30%,rgba(180,80,255,0.06) 0%,transparent 50%),
    radial-gradient(circle at 80% 70%,rgba(255,80,180,0.05) 0%,transparent 50%),
    radial-gradient(circle at 50% 50%,rgba(100,200,255,0.03) 0%,transparent 60%);
}
</style>
</head>
<body>

<h1>TICKLE MACHINE</h1>
<div class="sub">TOUCH THE FUZZY BLOB</div>
<canvas id="c" width="280" height="280"></canvas>
<div id="laugh-meter"><div id="laugh-fill"></div></div>
<div id="tickle-count">tickles: 0</div>
<div id="laugh-text"></div>
<a id="back" href="https://sloppy.live">sloppy.live</a>

<script>
(function(){
var C=document.getElementById('c');
var ctx=C.getContext('2d');
var SIZE=280;
var cx=SIZE/2,cy=SIZE/2;

// --- AUDIO ---
var actx=null;
function ensureAudio(){
  if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended')actx.resume();
  return actx;
}

function playGiggle(pitch){
  var ctx2=ensureAudio();var t=ctx2.currentTime;
  var baseF=300+pitch*200+Math.random()*150;
  // Quick ascending giggles
  var count=2+Math.floor(Math.random()*3);
  for(var i=0;i<count;i++){
    var o=ctx2.createOscillator();o.type='sine';
    var f=baseF+i*80+Math.random()*60;
    o.frequency.setValueAtTime(f,t+i*0.08);
    o.frequency.exponentialRampToValueAtTime(f*1.3,t+i*0.08+0.04);
    o.frequency.exponentialRampToValueAtTime(f*0.8,t+i*0.08+0.08);
    var g=ctx2.createGain();
    g.gain.setValueAtTime(0.12,t+i*0.08);
    g.gain.exponentialRampToValueAtTime(0.001,t+i*0.08+0.1);
    o.connect(g);g.connect(ctx2.destination);
    o.start(t+i*0.08);o.stop(t+i*0.08+0.1);
  }
}

function playBigLaugh(){
  var ctx2=ensureAudio();var t=ctx2.currentTime;
  // Descending then ascending ha-ha pattern
  var notes=[500,400,500,600,500,400,500,700,600,500];
  for(var i=0;i<notes.length;i++){
    var o=ctx2.createOscillator();o.type='triangle';
    o.frequency.setValueAtTime(notes[i]+Math.random()*50,t+i*0.07);
    o.frequency.exponentialRampToValueAtTime(notes[i]*1.2,t+i*0.07+0.03);
    o.frequency.exponentialRampToValueAtTime(notes[i]*0.7,t+i*0.07+0.07);
    var g=ctx2.createGain();
    g.gain.setValueAtTime(0.15,t+i*0.07);
    g.gain.exponentialRampToValueAtTime(0.001,t+i*0.07+0.09);
    o.connect(g);g.connect(ctx2.destination);
    o.start(t+i*0.07);o.stop(t+i*0.07+0.09);
  }
}

// --- MASCOT STATE ---
var tickleLevel=0; // 0-1
var tickles=0;
var wobble=0;
var wobbleDecay=0;
var squish={x:0,y:0}; // deformation from poke
var eyeSquint=0;
var mouthOpen=0;
var blush=0;
var jigglePhase=0;
var fuzzHairs=[];
var laughParticles=[];

// Generate fuzzy hairs around the blob
for(var i=0;i<80;i++){
  var angle=Math.random()*Math.PI*2;
  var dist=85+Math.random()*25;
  fuzzHairs.push({
    angle:angle,
    dist:dist,
    len:8+Math.random()*14,
    width:1+Math.random()*2,
    phase:Math.random()*Math.PI*2,
    speed:0.02+Math.random()*0.03,
    hue:280+Math.random()*60
  });
}

var LAUGHS=['hehe','haha','tehee','HAHAHA','stop!!','ahahaha','nooo','heehee','LMAO','pffft'];

// --- INTERACTION ---
var pointerDown=false;
var pointerPos={x:cx,y:cy};
var lastTickleTime=0;

function getPos(e){
  var rect=C.getBoundingClientRect();
  var t=e.touches?e.touches[0]:e;
  return{x:(t.clientX-rect.left)*(SIZE/rect.width),y:(t.clientY-rect.top)*(SIZE/rect.height)};
}

function isOnBlob(px,py){
  var dx=px-cx,dy=py-cy;
  return Math.sqrt(dx*dx+dy*dy)<95;
}

function doTickle(px,py){
  if(!isOnBlob(px,py))return;
  var now=Date.now();
  if(now-lastTickleTime<50)return;
  lastTickleTime=now;

  ensureAudio();
  tickles++;
  tickleLevel=Math.min(1,tickleLevel+0.06);
  wobbleDecay=1;

  // Squish toward poke point
  var dx=px-cx,dy=py-cy;
  var d=Math.sqrt(dx*dx+dy*dy)||1;
  squish.x+=(dx/d)*4;
  squish.y+=(dy/d)*4;

  document.getElementById('tickle-count').textContent='tickles: '+tickles;

  // Sound
  playGiggle(tickleLevel);

  // Laugh particles
  for(var i=0;i<2+Math.floor(tickleLevel*3);i++){
    var a=Math.random()*Math.PI*2;
    var spd=1.5+Math.random()*2;
    laughParticles.push({
      x:px,y:py,
      vx:Math.cos(a)*spd,vy:Math.sin(a)*spd-1,
      life:30+Math.random()*20,
      maxLife:50,
      text:['✨','⭐','💫','😂','🤣','✧','♪'][Math.floor(Math.random()*7)],
      size:10+Math.random()*10
    });
  }

  // Big laugh at threshold
  if(tickleLevel>0.85&&Math.random()<0.3){
    playBigLaugh();
    var lt=document.getElementById('laugh-text');
    lt.textContent=LAUGHS[Math.floor(Math.random()*LAUGHS.length)];
    lt.classList.add('show');
    setTimeout(function(){lt.classList.remove('show')},800);
    // Extra particles
    for(var j=0;j<8;j++){
      var a2=Math.random()*Math.PI*2;
      laughParticles.push({
        x:cx,y:cy-20,vx:Math.cos(a2)*3,vy:Math.sin(a2)*3-2,
        life:40,maxLife:40,
        text:['😂','🤣','😆','💀'][Math.floor(Math.random()*4)],
        size:16+Math.random()*12
      });
    }
  }
}

C.addEventListener('pointerdown',function(e){
  e.preventDefault();
  pointerDown=true;
  var p=getPos(e);
  pointerPos=p;
  doTickle(p.x,p.y);
});
C.addEventListener('pointermove',function(e){
  e.preventDefault();
  var p=getPos(e);
  pointerPos=p;
  if(pointerDown)doTickle(p.x,p.y);
});
C.addEventListener('pointerup',function(){pointerDown=false});
C.addEventListener('pointercancel',function(){pointerDown=false});

// --- RENDER ---
var time=0;

function draw(){
  time++;
  ctx.clearRect(0,0,SIZE,SIZE);

  // Decay tickle level
  tickleLevel*=0.992;
  wobbleDecay*=0.92;
  squish.x*=0.85;squish.y*=0.85;
  jigglePhase+=0.08+tickleLevel*0.15;

  // Derived expressions
  eyeSquint=tickleLevel*0.6;
  mouthOpen=tickleLevel;
  blush=tickleLevel;

  var jigX=Math.sin(jigglePhase)*wobbleDecay*6;
  var jigY=Math.cos(jigglePhase*1.3)*wobbleDecay*4;

  // Update laugh meter
  document.getElementById('laugh-fill').style.width=(tickleLevel*100)+'%';

  // --- FUZZY HAIRS ---
  fuzzHairs.forEach(function(h){
    h.phase+=h.speed+tickleLevel*0.05;
    var wave=Math.sin(h.phase)*5*(1+tickleLevel*2);
    var bx=cx+squish.x*0.3+jigX;
    var by=cy+squish.y*0.3+jigY;
    var hx=bx+Math.cos(h.angle)*h.dist;
    var hy=by+Math.sin(h.angle)*h.dist;
    var ex=hx+Math.cos(h.angle+wave*0.05)*h.len;
    var ey=hy+Math.sin(h.angle+wave*0.05)*h.len;

    ctx.strokeStyle='hsla('+h.hue+',60%,70%,0.35)';
    ctx.lineWidth=h.width;
    ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(hx,hy);
    // Bezier for fuzzy curl
    var cpx=hx+Math.cos(h.angle+0.3)*h.len*0.5+wave;
    var cpy=hy+Math.sin(h.angle+0.3)*h.len*0.5;
    ctx.quadraticCurveTo(cpx,cpy,ex,ey);
    ctx.stroke();
  });

  // --- MAIN BLOB BODY ---
  var blobR=80;
  var bx=cx+squish.x*0.5+jigX;
  var by=cy+squish.y*0.5+jigY;

  // Fuzzy edge: draw many semi-transparent circles
  for(var fi=0;fi<12;fi++){
    var fa=fi/12*Math.PI*2+time*0.01;
    var fr=blobR+Math.sin(fa*3+jigglePhase)*3+Math.sin(time*0.05+fi)*2;
    var fx=bx+Math.cos(fa)*4;
    var fy=by+Math.sin(fa)*4;
    ctx.fillStyle='rgba(200,140,255,0.04)';
    ctx.beginPath();
    ctx.arc(fx,fy,fr+6,0,Math.PI*2);
    ctx.fill();
  }

  // Body gradient
  var bodyGrad=ctx.createRadialGradient(bx-15,by-20,10,bx,by,blobR);
  bodyGrad.addColorStop(0,'hsl(290,50%,75%)');
  bodyGrad.addColorStop(0.6,'hsl(280,45%,55%)');
  bodyGrad.addColorStop(1,'hsl(270,40%,40%)');
  ctx.fillStyle=bodyGrad;
  ctx.beginPath();
  // Wobbly circle
  for(var a=0;a<Math.PI*2;a+=0.1){
    var wr=blobR+Math.sin(a*5+jigglePhase)*3*wobbleDecay+Math.sin(a*3+time*0.03)*2;
    var wx=bx+Math.cos(a)*wr;
    var wy=by+Math.sin(a)*wr;
    if(a===0)ctx.moveTo(wx,wy);else ctx.lineTo(wx,wy);
  }
  ctx.closePath();
  ctx.fill();

  // Highlight
  ctx.fillStyle='rgba(255,255,255,0.12)';
  ctx.beginPath();
  ctx.ellipse(bx-20,by-25,25,15,-.3,0,Math.PI*2);
  ctx.fill();

  // --- BLUSH ---
  if(blush>0.05){
    ctx.fillStyle='rgba(255,100,150,'+(blush*0.25).toFixed(2)+')';
    ctx.beginPath();ctx.ellipse(bx-30,by+8,16,10,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(bx+30,by+8,16,10,0,0,Math.PI*2);ctx.fill();
  }

  // --- EYES ---
  var eyeY=by-10;
  var eyeLX=bx-22;
  var eyeRX=bx+22;
  var eyeH=12*(1-eyeSquint*0.7);

  // Eye whites
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.ellipse(eyeLX,eyeY,9,eyeH,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(eyeRX,eyeY,9,eyeH,0,0,Math.PI*2);ctx.fill();

  // Pupils (look toward pointer)
  var lookDx=(pointerPos.x-bx)*0.03;
  var lookDy=(pointerPos.y-by)*0.03;
  var pupR=eyeSquint>0.5?3:5;
  ctx.fillStyle='#2a1040';
  ctx.beginPath();ctx.arc(eyeLX+lookDx,eyeY+lookDy,pupR,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(eyeRX+lookDx,eyeY+lookDy,pupR,0,Math.PI*2);ctx.fill();

  // Eye shine
  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.beginPath();ctx.arc(eyeLX+lookDx-2,eyeY+lookDy-2,2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(eyeRX+lookDx-2,eyeY+lookDy-2,2,0,Math.PI*2);ctx.fill();

  // Squint lines when very tickled
  if(eyeSquint>0.4){
    ctx.strokeStyle='hsl(280,40%,35%)';
    ctx.lineWidth=2;ctx.lineCap='round';
    // Left eye crinkle
    ctx.beginPath();ctx.moveTo(eyeLX-11,eyeY-4);ctx.lineTo(eyeLX-14,eyeY-8);ctx.stroke();
    ctx.beginPath();ctx.moveTo(eyeLX-11,eyeY+2);ctx.lineTo(eyeLX-14,eyeY+6);ctx.stroke();
    // Right
    ctx.beginPath();ctx.moveTo(eyeRX+11,eyeY-4);ctx.lineTo(eyeRX+14,eyeY-8);ctx.stroke();
    ctx.beginPath();ctx.moveTo(eyeRX+11,eyeY+2);ctx.lineTo(eyeRX+14,eyeY+6);ctx.stroke();
  }

  // --- MOUTH ---
  var mouthY=by+20;
  var mouthW=15+mouthOpen*20;
  var mouthH=4+mouthOpen*16;
  ctx.fillStyle='hsl(340,60%,35%)';
  ctx.beginPath();
  ctx.ellipse(bx,mouthY,mouthW,mouthH,0,0,Math.PI*2);
  ctx.fill();
  // Tongue when very open
  if(mouthOpen>0.4){
    ctx.fillStyle='hsl(350,70%,55%)';
    ctx.beginPath();
    ctx.ellipse(bx+4,mouthY+mouthH*0.4,mouthW*0.4,mouthH*0.5,0.1,0,Math.PI);
    ctx.fill();
  }
  // Teeth when mouth open
  if(mouthOpen>0.2){
    ctx.fillStyle='rgba(255,255,255,0.8)';
    var tw=3+mouthOpen*2;
    ctx.fillRect(bx-tw*1.5,mouthY-mouthH*0.8,tw,mouthH*0.4);
    ctx.fillRect(bx+tw*0.5,mouthY-mouthH*0.8,tw,mouthH*0.4);
  }

  // --- LITTLE ARMS (wiggle when tickled) ---
  var armWiggle=Math.sin(jigglePhase*2)*tickleLevel*15;
  ctx.strokeStyle='hsl(280,45%,55%)';
  ctx.lineWidth=6;ctx.lineCap='round';
  // Left arm
  ctx.beginPath();
  ctx.moveTo(bx-blobR+10,by+10);
  ctx.quadraticCurveTo(bx-blobR-15,by-10+armWiggle,bx-blobR-5,by-30+armWiggle);
  ctx.stroke();
  // Right arm
  ctx.beginPath();
  ctx.moveTo(bx+blobR-10,by+10);
  ctx.quadraticCurveTo(bx+blobR+15,by-10-armWiggle,bx+blobR+5,by-30-armWiggle);
  ctx.stroke();

  // --- LITTLE FEET ---
  ctx.fillStyle='hsl(280,45%,50%)';
  ctx.beginPath();ctx.ellipse(bx-25,by+blobR-5,14,8,0.2,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(bx+25,by+blobR-5,14,8,-0.2,0,Math.PI*2);ctx.fill();

  // --- LAUGH PARTICLES ---
  laughParticles.forEach(function(p){
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.04;p.life--;
    var alpha=p.life/p.maxLife;
    ctx.globalAlpha=alpha;
    ctx.font=Math.floor(p.size)+'px sans-serif';
    ctx.textAlign='center';
    ctx.fillText(p.text,p.x,p.y);
  });
  ctx.globalAlpha=1;
  laughParticles=laughParticles.filter(function(p){return p.life>0});

  requestAnimationFrame(draw);
}

draw();

})();
</script>
<script src="/sloppy-header/sloppy-bar.js"></script>
</body>
</html>
