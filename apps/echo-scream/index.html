<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Echo Scream — Grow Your Monster</title>
<link rel="icon" href="https://emojicdn.elk.sh/👹">
<meta property="og:title" content="Echo Scream">
<meta property="og:description" content="Scream into your mic. Watch your pixel monster grow. Louder = bigger.">
<meta property="og:url" content="https://sloppy.live/echo-scream">
<meta property="og:image" content="https://sloppy.live/echo-scream/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0608;--flesh:#2a1818;--blood:#8a2020;
  --glow:#ff4040;--green:#40c050;--purple:#8040c0;
  --text:#7a5a5a;--bright:#e0b0b0;--dim:#3a2828;
}
body{background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow:hidden}
canvas{display:block;image-rendering:pixelated;margin-top:10px}
#hud{display:flex;gap:20px;padding:10px;font-size:12px;flex-wrap:wrap;justify-content:center}
.hud-item{display:flex;align-items:center;gap:4px}
.hud-val{color:var(--bright);font-weight:700}
#volumeBar{width:clamp(200px,50vw,350px);height:10px;background:var(--flesh);
  border-radius:5px;overflow:hidden;border:1px solid var(--dim);margin:4px auto}
#volumeFill{height:100%;width:0%;border-radius:5px;transition:width .05s;
  background:linear-gradient(90deg,var(--green),#e0e020,var(--glow))}
#status{font-family:'Creepster',cursive;font-size:clamp(14px,3vw,20px);color:var(--dim);
  text-align:center;padding:4px;min-height:28px;transition:color .2s}
#status.loud{color:var(--glow);text-shadow:0 0 15px rgba(255,64,64,.4)}
#startBtn{background:transparent;border:2px solid var(--glow);color:var(--glow);
  font-family:'Creepster',cursive;font-size:20px;padding:14px 36px;border-radius:8px;
  cursor:pointer;letter-spacing:2px;transition:all .2s;margin:20px}
#startBtn:hover{background:var(--glow);color:var(--bg);box-shadow:0 0 20px rgba(255,64,64,.3)}
#startBtn.hidden{display:none}
#title{font-family:'Creepster',cursive;font-size:clamp(28px,5vw,44px);color:var(--glow);
  text-shadow:2px 2px 0 #400,0 0 20px rgba(255,64,64,.3);padding:16px 0 4px;text-align:center}
#subtitle{font-size:11px;color:var(--dim);text-align:center;margin-bottom:4px}
#traits{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;padding:4px 8px;max-width:500px}
.trait{font-size:9px;padding:2px 6px;border:1px solid var(--dim);border-radius:3px;color:var(--dim)}
.trait.active{border-color:var(--glow);color:var(--bright);background:rgba(255,64,64,.08)}
</style>
</head>
<body>
<div id="title">ECHO SCREAM</div>
<div id="subtitle">scream to grow your monster</div>
<div id="hud">
  <div class="hud-item">📏 <span class="hud-val" id="sizeVal">1</span></div>
  <div class="hud-item">👁️ <span class="hud-val" id="eyeVal">2</span></div>
  <div class="hud-item">🦷 <span class="hud-val" id="teethVal">4</span></div>
  <div class="hud-item">🦎 <span class="hud-val" id="limbVal">2</span></div>
  <div class="hud-item">⏱️ <span class="hud-val" id="timeVal">0:00</span></div>
</div>
<div id="volumeBar"><div id="volumeFill"></div></div>
<div id="status">Press start and SCREAM</div>
<canvas id="game" width="480" height="360"></canvas>
<div id="traits"></div>
<button id="startBtn">🎤 UNLEASH</button>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const statusEl = document.getElementById('status');
const volumeFill = document.getElementById('volumeFill');
const startBtn = document.getElementById('startBtn');
const traitsEl = document.getElementById('traits');
const PX = 4;

let audioCtx, analyser, mic, dataArray;
let running = false;
let startTime = 0;

// Monster state
const monster = {
  size: 1,        // 1-20 scale factor
  growthXP: 0,    // accumulated scream energy
  eyes: 2,
  teeth: 4,
  limbs: 2,       // arms/legs/tentacles
  horns: 0,
  spikes: 0,
  tails: 0,
  wings: 0,
  tongues: 1,
  hue: 0,         // body color hue
  mouthOpen: 0,   // 0-1 how open mouth is
  rage: 0,        // visual intensity
  breathe: 0,     // breathing cycle
};

// Growth thresholds — what unlocks at each size
const EVOLUTIONS = [
  { size:2, trait:'horns', val:2, msg:'Horns sprouted!' },
  { size:3, trait:'spikes', val:3, msg:'Spikes erupted from its back!' },
  { size:5, trait:'eyes', val:4, msg:'Extra eyes opened!' },
  { size:6, trait:'tails', val:1, msg:'A tail lashed out!' },
  { size:8, trait:'limbs', val:4, msg:'More limbs emerged!' },
  { size:10, trait:'teeth', val:12, msg:'Fangs multiplied!' },
  { size:12, trait:'wings', val:2, msg:'Wings unfurled!' },
  { size:14, trait:'eyes', val:6, msg:'It sees everything now!' },
  { size:16, trait:'tongues', val:3, msg:'Tongues writhing!' },
  { size:18, trait:'horns', val:6, msg:'Crown of horns!' },
  { size:20, trait:'tails', val:3, msg:'FINAL FORM ACHIEVED!' },
];

const SCREAMS = [
  'Feed me your screams...',
  'LOUDER!',
  'It hungers for more...',
  'The creature stirs!',
  'Your voice fuels the beast!',
  'KEEP SCREAMING!',
  'It grows... it GROWS!',
  'The echo feeds it!',
  'MORE! MOOORE!',
  'Unleash your lungs!',
  'The walls are shaking!',
  'It can taste your fear!',
];

// Mic setup
async function initAudio(){
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    mic = audioCtx.createMediaStreamSource(stream);
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 256;
    analyser.smoothingTimeConstant = 0.7;
    mic.connect(analyser);
    dataArray = new Uint8Array(analyser.frequencyBinCount);
    return true;
  } catch(e){
    statusEl.textContent = 'Mic access denied — monster sleeps...';
    return false;
  }
}

function getVolume(){
  if(!analyser) return 0;
  analyser.getByteFrequencyData(dataArray);
  let sum = 0;
  for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
  return sum / dataArray.length / 255; // 0-1
}

function updateMonster(vol, dt){
  // Mouth tracks volume
  monster.mouthOpen += (vol - monster.mouthOpen) * 0.2;
  monster.rage += (vol * vol - monster.rage) * 0.1;
  monster.breathe += dt * 2;

  // Hue shifts slowly
  monster.hue = (monster.hue + dt * 5 + vol * 20) % 360;

  // Growth from screaming (volume must be above threshold)
  if(vol > 0.15){
    const gain = vol * vol * dt * 30; // louder = way more growth
    monster.growthXP += gain;

    // Check level ups
    const newSize = Math.min(20, 1 + Math.floor(Math.sqrt(monster.growthXP / 5)));
    if(newSize > monster.size){
      monster.size = newSize;
      // Check evolution unlocks
      EVOLUTIONS.forEach(ev => {
        if(monster.size >= ev.size && monster[ev.trait] < ev.val){
          monster[ev.trait] = ev.val;
          statusEl.textContent = ev.msg;
          statusEl.classList.add('loud');
          setTimeout(()=> statusEl.classList.remove('loud'), 1500);
        }
      });
    }
  }

  // Idle messages
  if(vol > 0.5){
    if(Math.random() < 0.01){
      statusEl.textContent = SCREAMS[Math.floor(Math.random()*SCREAMS.length)];
      statusEl.classList.add('loud');
      setTimeout(()=> statusEl.classList.remove('loud'), 800);
    }
  }
}

function px(x, y, color){
  ctx.fillStyle = color;
  ctx.fillRect(x*PX, y*PX, PX, PX);
}

function hsl(h,s,l){ return `hsl(${h},${s}%,${l}%)`; }

function drawMonster(){
  const cx = Math.floor(canvas.width/PX/2);
  const cy = Math.floor(canvas.height/PX/2) + 5;
  const s = monster.size;
  const scale = 0.5 + s * 0.25; // pixel scale
  const t = Date.now()/1000;
  const breathe = Math.sin(monster.breathe) * 0.5;
  const rage = monster.rage;

  // Body color
  const bodyH = monster.hue;
  const bodyS = 40 + rage*30;
  const bodyL = 25 + rage*10;

  // Body (oval, grows with size)
  const bw = Math.floor(4 * scale + breathe);
  const bh = Math.floor(5 * scale + breathe * 0.5);
  for(let dy=-bh; dy<=bh; dy++){
    for(let dx=-bw; dx<=bw; dx++){
      const dist = (dx*dx)/(bw*bw) + (dy*dy)/(bh*bh);
      if(dist <= 1){
        const shade = bodyL + (1-dist)*10 + Math.sin(dx*0.5+dy*0.3+t*3)*3;
        px(cx+dx, cy+dy, hsl(bodyH, bodyS, shade));
      }
    }
  }

  // Belly highlight
  for(let dy=-Math.floor(bh*0.4); dy<=Math.floor(bh*0.5); dy++){
    for(let dx=-Math.floor(bw*0.5); dx<=Math.floor(bw*0.5); dx++){
      const dist = (dx*dx)/((bw*0.5)*(bw*0.5)) + (dy*dy)/((bh*0.5)*(bh*0.5));
      if(dist <= 1){
        px(cx+dx, cy+dy+Math.floor(bh*0.2), hsl(bodyH+10, bodyS-10, bodyL+12));
      }
    }
  }

  // Spikes on back
  if(monster.spikes > 0){
    for(let i=0; i<monster.spikes; i++){
      const sx = cx - Math.floor(bw*0.6) + Math.floor(i * (bw*1.2/monster.spikes));
      const spikeH = Math.floor(2 + scale + Math.sin(t*4+i)*0.5);
      for(let j=0;j<spikeH;j++){
        px(sx, cy - bh - j, hsl(bodyH-20, bodyS+10, bodyL-5+j*3));
      }
    }
  }

  // Horns
  if(monster.horns > 0){
    const hornPairs = Math.ceil(monster.horns / 2);
    for(let i=0; i<hornPairs; i++){
      const hx = Math.floor(2 + i*2) * scale * 0.5;
      const hornH = Math.floor(3 + scale + i);
      for(let j=0; j<hornH; j++){
        const spread = Math.floor(j * 0.5);
        px(cx - Math.floor(hx) - spread, cy - bh - j, hsl(30, 30, 35+j*4));
        px(cx + Math.floor(hx) + spread, cy - bh - j, hsl(30, 30, 35+j*4));
      }
    }
  }

  // Eyes
  const eyeRow = cy - Math.floor(bh * 0.3);
  const eyeSpread = Math.max(2, Math.floor(bw * 0.6));
  for(let i=0; i<monster.eyes; i++){
    const ex = cx - Math.floor(eyeSpread/2) + Math.floor(i * eyeSpread / Math.max(1, monster.eyes-1));
    const ey = eyeRow + (i%2===0? 0 : 1);
    // White
    px(ex, ey, '#ddd');
    px(ex+1, ey, '#ddd');
    // Pupil (follows volume — bigger when screaming)
    const pupilSize = rage > 0.3 ? 0 : 1; // dilated when loud
    px(ex + (pupilSize?1:0), ey, rage>0.3? '#f00':'#222');
    // Glow when enraged
    if(rage > 0.4){
      ctx.fillStyle = `rgba(255,0,0,${rage*0.15})`;
      ctx.fillRect((ex-1)*PX, (ey-1)*PX, PX*4, PX*3);
    }
  }

  // Mouth
  const mouthW = Math.floor((2 + scale) * (0.6 + monster.mouthOpen * 0.6));
  const mouthH = Math.max(1, Math.floor(1 + monster.mouthOpen * 2 * scale));
  const mouthY = cy + Math.floor(bh * 0.2);
  // Mouth opening
  for(let dy=0; dy<mouthH; dy++){
    for(let dx=-mouthW; dx<=mouthW; dx++){
      px(cx+dx, mouthY+dy, hsl(0, 40, 10));
    }
  }
  // Teeth
  if(monster.teeth > 0){
    const teethSpacing = Math.max(1, Math.floor(mouthW*2 / monster.teeth));
    for(let i=0; i<monster.teeth && i < mouthW*2; i++){
      const tx = cx - mouthW + i * teethSpacing;
      if(tx >= cx-mouthW && tx <= cx+mouthW){
        // Top teeth
        px(tx, mouthY, '#eee');
        if(mouthH > 2) px(tx, mouthY+1, '#ddd');
        // Bottom teeth
        if(mouthH > 1){
          px(tx, mouthY+mouthH-1, '#eee');
        }
      }
    }
  }
  // Tongues
  if(monster.tongues > 0 && monster.mouthOpen > 0.3){
    for(let i=0; i<monster.tongues; i++){
      const tx = cx - Math.floor(monster.tongues/2) + i*2;
      const tongueLen = Math.floor(monster.mouthOpen * 3 * scale);
      for(let j=0; j<tongueLen; j++){
        const wiggle = Math.floor(Math.sin(t*6+i*2+j*0.5)*0.8);
        px(tx+wiggle, mouthY+mouthH+j, hsl(350, 60, 40-j*2));
      }
    }
  }

  // Limbs
  const limbPairs = Math.ceil(monster.limbs / 2);
  for(let i=0; i<limbPairs; i++){
    const ly = cy + Math.floor(bh*0.1) + i * Math.floor(bh*0.4);
    const limbLen = Math.floor(3 + scale*2);
    const wiggle = Math.sin(t*3 + i*1.5) * 1.5;
    // Left
    for(let j=0; j<limbLen; j++){
      const lx = cx - bw - j;
      const w = Math.floor(Math.sin(t*2+j+i)*wiggle);
      px(lx, ly+w, hsl(bodyH, bodyS, bodyL+5));
      // Claws at end
      if(j === limbLen-1){
        px(lx-1, ly+w-1, hsl(30,30,40));
        px(lx-1, ly+w+1, hsl(30,30,40));
      }
    }
    // Right
    for(let j=0; j<limbLen; j++){
      const rx = cx + bw + j;
      const w = Math.floor(Math.sin(t*3+j+i+2)*wiggle);
      px(rx, ly+w, hsl(bodyH, bodyS, bodyL+5));
      if(j === limbLen-1){
        px(rx+1, ly+w-1, hsl(30,30,40));
        px(rx+1, ly+w+1, hsl(30,30,40));
      }
    }
  }

  // Legs
  const legY = cy + bh;
  for(let i=0; i<2; i++){
    const lx = cx + (i===0?-Math.floor(bw*0.4):Math.floor(bw*0.4));
    const stomp = Math.sin(t*2+i*Math.PI) * 1;
    for(let j=0;j<Math.floor(3+scale);j++){
      px(lx, legY+j, hsl(bodyH, bodyS, bodyL-3));
    }
    // Feet
    px(lx-1, legY+Math.floor(3+scale)-1+Math.floor(stomp), hsl(bodyH,bodyS,bodyL-5));
    px(lx+1, legY+Math.floor(3+scale)-1+Math.floor(stomp), hsl(bodyH,bodyS,bodyL-5));
  }

  // Tails
  if(monster.tails > 0){
    for(let i=0; i<monster.tails; i++){
      const tailLen = Math.floor(5 + scale*2);
      const spread = (i - (monster.tails-1)/2) * 3;
      for(let j=0; j<tailLen; j++){
        const tx = cx + spread + Math.floor(Math.sin(t*3+j*0.4+i*2)*2);
        const ty = cy + bh + j;
        px(tx, ty, hsl(bodyH+10, bodyS, bodyL - j*1.5));
        // Tail tip
        if(j===tailLen-1){
          px(tx-1,ty, hsl(bodyH+20,bodyS+10,bodyL+10));
          px(tx+1,ty, hsl(bodyH+20,bodyS+10,bodyL+10));
        }
      }
    }
  }

  // Wings
  if(monster.wings > 0){
    const wingSpan = Math.floor(6 + scale*3);
    const wingH = Math.floor(4 + scale*2);
    const flap = Math.sin(t*4) * 2;
    for(let side=-1; side<=1; side+=2){
      for(let j=0; j<wingSpan; j++){
        const wy = cy - Math.floor(bh*0.5) + Math.floor(Math.sin(j*0.3)*wingH*0.3) - Math.floor(flap);
        const wx = cx + side*(bw + j + 1);
        const membraneH = Math.max(1, wingH - Math.floor(j*wingH/wingSpan));
        for(let k=0; k<membraneH; k++){
          px(wx, wy+k, hsl(bodyH+30, 30, 20+k*3+j));
        }
      }
    }
  }

  // Scream aura
  if(rage > 0.3){
    const auraR = Math.floor((bw+bh)*0.8 + rage*5);
    ctx.strokeStyle = `rgba(255,60,60,${rage*0.15})`;
    ctx.lineWidth = 1;
    for(let ring=0;ring<3;ring++){
      ctx.beginPath();
      ctx.arc(cx*PX+PX/2, cy*PX+PX/2, (auraR+ring*4)*PX, 0, Math.PI*2);
      ctx.stroke();
    }
  }

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(cx*PX, (cy+bh+Math.floor(4+scale))*PX, bw*PX, 3*PX, 0, 0, Math.PI*2);
  ctx.fill();
}

function drawBackground(){
  // Dark void with subtle noise
  const t = Date.now()/1000;
  ctx.fillStyle = '#0a0608';
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Pulsing vignette tied to volume
  const vol = monster.rage;
  if(vol > 0.1){
    const grad = ctx.createRadialGradient(
      canvas.width/2, canvas.height/2, 0,
      canvas.width/2, canvas.height/2, canvas.width*0.6
    );
    grad.addColorStop(0, `rgba(60,10,10,${vol*0.15})`);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(0,0,canvas.width,canvas.height);
  }

  // Floating particles
  for(let i=0;i<15;i++){
    const px = (Math.sin(t*0.3+i*4.7)*0.4+0.5)*canvas.width;
    const py = (Math.sin(t*0.2+i*3.1)*0.4+0.5)*canvas.height;
    const alpha = Math.sin(t+i*2)*0.15+0.15;
    ctx.fillStyle = `rgba(255,60,60,${alpha * (0.3+vol)})`;
    ctx.fillRect(px, py, 2, 2);
  }
}

function updateTraits(){
  const traits = [
    {name:'Eyes',val:monster.eyes,max:6},
    {name:'Teeth',val:monster.teeth,max:12},
    {name:'Limbs',val:monster.limbs,max:4},
    {name:'Horns',val:monster.horns,max:6},
    {name:'Spikes',val:monster.spikes,max:3},
    {name:'Tails',val:monster.tails,max:3},
    {name:'Wings',val:monster.wings,max:2},
    {name:'Tongues',val:monster.tongues,max:3},
  ];
  traitsEl.innerHTML = traits.map(t =>
    `<span class="trait${t.val > (t.name==='Eyes'?2:t.name==='Teeth'?4:t.name==='Limbs'?2:t.name==='Tongues'?1:0)?' active':''}">${t.name}: ${t.val}</span>`
  ).join('');
}

function updateHUD(){
  document.getElementById('sizeVal').textContent = monster.size;
  document.getElementById('eyeVal').textContent = monster.eyes;
  document.getElementById('teethVal').textContent = monster.teeth;
  document.getElementById('limbVal').textContent = monster.limbs;
  const elapsed = Math.floor((Date.now()-startTime)/1000);
  const min = Math.floor(elapsed/60);
  const sec = (elapsed%60).toString().padStart(2,'0');
  document.getElementById('timeVal').textContent = `${min}:${sec}`;
}

let lastTime = Date.now();
function frame(){
  const now = Date.now();
  const dt = Math.min((now - lastTime)/1000, 0.1);
  lastTime = now;

  if(running){
    const vol = getVolume();
    volumeFill.style.width = (vol*100)+'%';
    updateMonster(vol, dt);
    updateHUD();
    updateTraits();
  }

  drawBackground();
  drawMonster();

  requestAnimationFrame(frame);
}

startBtn.addEventListener('click', async ()=>{
  const ok = await initAudio();
  if(ok){
    running = true;
    startTime = Date.now();
    startBtn.classList.add('hidden');
    statusEl.textContent = 'Scream to feed the beast...';
  }
});

frame();
</script>
</body>
</html>
