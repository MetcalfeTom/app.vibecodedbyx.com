<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meme Graveyard</title>
<link rel="icon" href="https://emojicdn.elk.sh/🪦">
<meta property="og:title" content="Meme Graveyard">
<meta property="og:description" content="Rest in peace, fallen memes. Place a headstone for the trends we lost.">
<meta property="og:url" content="https://app.sloppy.live/meme-graveyard/">
<meta property="og:image" content="https://emojicdn.elk.sh/🪦?style=google">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,700;0,800;1,400&family=Fira+Code:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0f0a;--surface:#151912;--border:#252e1e;
  --text:#b8c4a0;--dim:#5e6b4a;--stone:#8a917a;
  --gold:#a89050;--moss:#4a6a30;--fog:#c8d0b8;
}
body{
  background:var(--bg);color:var(--text);
  font-family:'EB Garamond',serif;
  min-height:100vh;padding:0;
}

.fog-layer{
  position:fixed;top:0;left:0;right:0;bottom:0;
  pointer-events:none;z-index:1;
  background:radial-gradient(ellipse at 50% 100%, rgba(30,40,20,0.3) 0%, transparent 70%);
}

.container{
  max-width:640px;width:100%;margin:0 auto;padding:20px 16px;
  position:relative;z-index:2;
}

header{text-align:center;margin-bottom:28px}
h1{
  font-size:clamp(2rem,6vw,3.2rem);font-weight:800;
  color:var(--fog);letter-spacing:0.03em;
  text-shadow:0 0 30px rgba(200,208,184,0.1);
}
.sub{color:var(--dim);font-size:0.85rem;font-weight:400;font-style:italic;margin-top:4px}

.count-bar{
  text-align:center;color:var(--dim);font-family:'Fira Code',monospace;
  font-size:0.6rem;margin-bottom:20px;
}

/* Place headstone form */
.place-section{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:20px;margin-bottom:24px;
}
.place-title{font-size:1rem;font-weight:700;color:var(--fog);margin-bottom:14px}
.form-row{display:flex;gap:8px;margin-bottom:10px}
.form-row.full{flex-direction:column}
.form-input{
  flex:1;padding:10px 12px;border:1px solid var(--border);
  border-radius:8px;background:var(--bg);color:var(--text);
  font-family:'EB Garamond',serif;font-size:0.9rem;
  outline:none;
}
.form-input:focus{border-color:var(--moss)}
.form-input::placeholder{color:var(--dim);font-style:italic}
.form-input.sm{width:80px;flex:none;font-family:'Fira Code',monospace;font-size:0.75rem;text-align:center}
textarea.form-input{resize:vertical;min-height:60px}
.place-btn{
  width:100%;padding:12px;border:1px solid var(--moss);
  border-radius:10px;background:var(--moss);color:#fff;
  font-family:inherit;font-size:0.95rem;font-weight:700;
  cursor:pointer;transition:all 0.2s;
}
.place-btn:hover{background:#3a5a22}
.place-btn:disabled{opacity:0.3;cursor:default}
.place-error{color:#c0392b;font-size:0.75rem;margin-top:6px;display:none}

/* Sort/filter */
.sort-row{
  display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap;
  justify-content:center;
}
.sort-btn{
  padding:5px 12px;border:1px solid var(--border);border-radius:6px;
  background:transparent;color:var(--dim);font-family:inherit;
  font-size:0.75rem;cursor:pointer;transition:all 0.15s;
}
.sort-btn.active{border-color:var(--moss);color:var(--moss);background:rgba(74,106,48,0.08)}
.sort-btn:hover{border-color:var(--moss);color:var(--moss)}

/* Graveyard grid */
.graveyard{
  display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:16px;margin-bottom:24px;
}

.grave{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:20px 18px;
  position:relative;transition:transform 0.2s,border-color 0.2s;
}
.grave:hover{transform:translateY(-2px);border-color:var(--stone)}

.headstone{
  text-align:center;margin-bottom:12px;
  padding-bottom:12px;border-bottom:1px solid var(--border);
}
.headstone-icon{font-size:2rem;margin-bottom:6px;filter:grayscale(0.3)}
.meme-name{
  font-size:1.2rem;font-weight:800;color:var(--fog);
  letter-spacing:0.02em;line-height:1.2;
}
.years{
  font-family:'Fira Code',monospace;font-size:0.65rem;
  color:var(--dim);margin-top:4px;
}
.epitaph{
  font-style:italic;font-size:0.9rem;color:var(--stone);
  line-height:1.5;text-align:center;margin-bottom:10px;
  min-height:2em;
}
.grave-footer{
  display:flex;justify-content:space-between;align-items:center;
  font-size:0.7rem;color:var(--dim);
}
.grave-author{font-family:'Fira Code',monospace;font-size:0.6rem}
.flower-btn{
  display:flex;align-items:center;gap:4px;
  padding:4px 10px;border:1px solid var(--border);border-radius:6px;
  background:transparent;color:var(--dim);font-family:inherit;
  font-size:0.75rem;cursor:pointer;transition:all 0.15s;
}
.flower-btn:hover{border-color:var(--gold);color:var(--gold)}
.flower-btn.placed{border-color:var(--gold);color:var(--gold);background:rgba(168,144,80,0.08)}
.flower-count{font-family:'Fira Code',monospace;font-size:0.6rem}

.empty-yard{
  text-align:center;color:var(--dim);font-style:italic;
  padding:40px;font-size:0.9rem;
}

.loading{text-align:center;color:var(--dim);font-size:0.85rem;padding:40px}

/* Ambient grass at bottom */
.grass{
  position:fixed;bottom:0;left:0;right:0;height:40px;
  background:linear-gradient(to top, rgba(30,50,15,0.4), transparent);
  pointer-events:none;z-index:1;
}

</style>
</head>
<body>
<div class="fog-layer"></div>
<div class="grass"></div>

<div class="container">
  <header>
    <h1>Meme Graveyard</h1>
    <div class="sub">here lie the memes we loved and lost</div>
  </header>

  <div id="loading" class="loading">Opening the gates...</div>

  <div id="app" style="display:none">
    <div class="count-bar" id="count-bar">0 memes at rest</div>

    <div class="place-section">
      <div class="place-title">Place a Headstone</div>
      <div class="form-row">
        <input class="form-input" id="f-name" placeholder="Meme name" maxlength="60">
      </div>
      <div class="form-row full">
        <textarea class="form-input" id="f-epitaph" placeholder="Write an epitaph..." maxlength="200"></textarea>
      </div>
      <div class="form-row">
        <input class="form-input sm" id="f-born" placeholder="Born" type="number" min="1990" max="2026">
        <input class="form-input sm" id="f-died" placeholder="Died" type="number" min="1990" max="2026">
        <input class="form-input" id="f-user" placeholder="Your name" maxlength="20">
      </div>
      <button class="place-btn" id="place-btn" onclick="placeGrave()">Lay to Rest</button>
      <div class="place-error" id="place-error"></div>
    </div>

    <div class="sort-row">
      <button class="sort-btn active" data-sort="newest" onclick="setSort('newest',this)">Newest</button>
      <button class="sort-btn" data-sort="oldest" onclick="setSort('oldest',this)">Oldest</button>
      <button class="sort-btn" data-sort="flowers" onclick="setSort('flowers',this)">Most Flowers</button>
      <button class="sort-btn" data-sort="name" onclick="setSort('name',this)">A-Z</button>
    </div>

    <div class="graveyard" id="graveyard"></div>
  </div>

  </div>

<script type="module">
import supabase, { supabaseSession } from './supabase-config.js';

let userId, graves = [], currentSort = 'newest';
let floweredGraves = new Set();

const HEADSTONE_ICONS = ['🪦','⚰️','🕊️','💀','👻','🌹','⚱️','🦴'];

function pickIcon(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = ((hash << 5) - hash) + name.charCodeAt(i);
  return HEADSTONE_ICONS[Math.abs(hash) % HEADSTONE_ICONS.length];
}

async function init() {
  try {
    const { user } = await supabaseSession();
    userId = user.id;

    // Resolve username
    let username = '';
    try {
      const stored = localStorage.getItem('sloppy-profile');
      if (stored) { const p = JSON.parse(stored); if (p.username) username = p.username; }
    } catch(e) {}
    if (!username) {
      try {
        const { data: prof } = await supabase.from('sloppygram_profiles').select('username').eq('user_id', userId).limit(1);
        if (prof && prof[0]?.username) username = prof[0].username;
      } catch(e) {}
    }
    if (username) document.getElementById('f-user').value = username;

    // Load flowered from localStorage
    try {
      const f = localStorage.getItem('meme-graveyard-flowers');
      if (f) floweredGraves = new Set(JSON.parse(f));
    } catch(e) {}

    await loadGraves();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = 'block';
  } catch(e) {
    document.getElementById('loading').textContent = 'Error: ' + e.message;
  }
}

async function loadGraves() {
  let query = supabase.from('meme_graves').select('*');
  if (currentSort === 'newest') query = query.order('created_at', { ascending: false });
  else if (currentSort === 'oldest') query = query.order('created_at', { ascending: true });
  else if (currentSort === 'flowers') query = query.order('flowers', { ascending: false });
  else if (currentSort === 'name') query = query.order('meme_name', { ascending: true });

  const { data, error } = await query;
  if (error) { console.error('Load error:', error.message); return; }
  graves = data || [];
  renderGraves();
}

function renderGraves() {
  const yard = document.getElementById('graveyard');
  document.getElementById('count-bar').textContent = graves.length + ' meme' + (graves.length !== 1 ? 's' : '') + ' at rest';

  if (graves.length === 0) {
    yard.innerHTML = '<div class="empty-yard">The graveyard is empty. Be the first to honor a fallen meme.</div>';
    return;
  }

  yard.innerHTML = graves.map(g => {
    const icon = pickIcon(g.meme_name);
    const years = (g.born_year && g.died_year) ? `${g.born_year} — ${g.died_year}` :
                  g.died_year ? `? — ${g.died_year}` :
                  g.born_year ? `${g.born_year} — ?` : '';
    const isFlowered = floweredGraves.has(g.created_at);
    const isMine = g.user_id === userId;
    return `
      <div class="grave">
        <div class="headstone">
          <div class="headstone-icon">${icon}</div>
          <div class="meme-name">${esc(g.meme_name)}</div>
          ${years ? `<div class="years">${years}</div>` : ''}
        </div>
        <div class="epitaph">"${esc(g.epitaph)}"</div>
        <div class="grave-footer">
          <span class="grave-author">by ${esc(g.username || 'Anon')}</span>
          <button class="flower-btn${isFlowered ? ' placed' : ''}" onclick="placeFlower('${g.created_at}', ${g.flowers || 0})" ${isFlowered ? 'disabled' : ''}>
            🌸 <span class="flower-count">${g.flowers || 0}</span>
          </button>
        </div>
        ${isMine ? `<button style="position:absolute;top:8px;right:8px;background:none;border:none;color:var(--dim);cursor:pointer;font-size:0.6rem;opacity:0.4" onclick="deleteGrave('${g.created_at}')" title="Delete">✕</button>` : ''}
      </div>`;
  }).join('');
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

window.setSort = function(sort, el) {
  currentSort = sort;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  loadGraves();
};

window.placeGrave = async function() {
  const name = document.getElementById('f-name').value.trim();
  const epitaph = document.getElementById('f-epitaph').value.trim();
  const born = parseInt(document.getElementById('f-born').value) || null;
  const died = parseInt(document.getElementById('f-died').value) || null;
  const username = document.getElementById('f-user').value.trim() || 'Anon';
  const errEl = document.getElementById('place-error');

  if (!name) { errEl.textContent = 'Every meme needs a name.'; errEl.style.display = 'block'; return; }
  if (!epitaph) { errEl.textContent = 'Write something. They deserve it.'; errEl.style.display = 'block'; return; }
  errEl.style.display = 'none';

  const btn = document.getElementById('place-btn');
  btn.disabled = true;
  btn.textContent = 'Placing...';

  const { error } = await supabase.from('meme_graves').insert({
    user_id: userId, meme_name: name, epitaph, born_year: born,
    died_year: died, flowers: 0, username
  });

  if (error) {
    errEl.textContent = 'Error: ' + error.message;
    errEl.style.display = 'block';
  } else {
    document.getElementById('f-name').value = '';
    document.getElementById('f-epitaph').value = '';
    document.getElementById('f-born').value = '';
    document.getElementById('f-died').value = '';
    await loadGraves();
  }
  btn.disabled = false;
  btn.textContent = 'Lay to Rest';
};

window.placeFlower = async function(createdAt, currentFlowers) {
  if (floweredGraves.has(createdAt)) return;
  floweredGraves.add(createdAt);
  localStorage.setItem('meme-graveyard-flowers', JSON.stringify([...floweredGraves]));

  await supabase.from('meme_graves').update({ flowers: currentFlowers + 1 }).eq('created_at', createdAt);
  await loadGraves();
};

window.deleteGrave = async function(createdAt) {
  await supabase.from('meme_graves').delete().eq('created_at', createdAt).eq('user_id', userId);
  await loadGraves();
};

init();
</script>
</body>
</html>
