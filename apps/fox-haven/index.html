<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fox Haven — Cozy Fox Sanctuary</title>
<link rel="icon" href="https://emojicdn.elk.sh/🦊">
<meta property="og:title" content="Fox Haven">
<meta property="og:description" content="A cozy sanctuary where you feed, name, and watch foxes roam a grassy field.">
<meta property="og:url" content="https://app.sloppy.live/fox-haven/">
<meta property="og:image" content="https://emojicdn.elk.sh/🦊?style=google">
<link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Nunito:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#2d4a2e;font-family:'Nunito',sans-serif;min-height:100vh;overflow:hidden}
canvas{display:block;position:fixed;top:0;left:0}
.ui{position:fixed;z-index:10}
.title{position:fixed;top:10px;left:50%;transform:translateX(-50%);font-family:'Caveat',cursive;font-size:clamp(24px,5vw,38px);font-weight:700;color:#f5e6d0;text-shadow:0 2px 8px rgba(0,0,0,0.3);pointer-events:none;z-index:10}
.subtitle{font-size:clamp(11px,2vw,14px);font-weight:300;color:rgba(245,230,208,0.6);display:block;text-align:center;letter-spacing:1px}
.controls{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10}
.btn{font-family:'Nunito',sans-serif;font-weight:600;font-size:12px;background:rgba(245,230,208,0.85);color:#5a3e28;border:none;padding:8px 14px;border-radius:18px;cursor:pointer;backdrop-filter:blur(6px);transition:all 0.2s;letter-spacing:0.5px}
.btn:hover{background:#5a3e28;color:#f5e6d0}
.fox-info{position:fixed;top:60px;right:12px;background:rgba(245,230,208,0.9);border-radius:12px;padding:10px 14px;font-size:12px;color:#5a3e28;backdrop-filter:blur(6px);z-index:10;display:none;max-width:180px}
.fox-info h3{font-family:'Caveat',cursive;font-size:18px;margin-bottom:4px}
.fox-info .stat{font-size:11px;color:#8a6e50;margin:2px 0}
.fox-info input{font-family:'Caveat',cursive;font-size:16px;border:none;border-bottom:1px solid #c4a882;background:transparent;color:#5a3e28;width:100%;outline:none;padding:2px 0}
.count{position:fixed;top:12px;right:12px;font-family:'Caveat',cursive;font-size:18px;color:rgba(245,230,208,0.7);z-index:10;pointer-events:none}
.back{position:fixed;bottom:12px;right:12px;font-size:9px;z-index:10}
.back a{color:rgba(245,230,208,0.3);text-decoration:none}.back a:hover{color:#f5e6d0}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div class="title">Fox Haven<span class="subtitle">a cozy sanctuary</span></div>
<div class="count" id="foxCount"></div>
<div class="controls">
<button class="btn" onclick="addFox()">New Fox</button>
<button class="btn" onclick="dropFood()">Feed</button>
<button class="btn" id="sleepBtn" onclick="toggleNap()">Nap Time</button>
</div>
<div class="fox-info" id="foxInfo">
<input id="foxName" placeholder="Name this fox..." oninput="renameFox(this.value)">
<div class="stat" id="foxMood"></div>
<div class="stat" id="foxHunger"></div>
<div class="stat" id="foxAge"></div>
</div>
<div class="back"><a href="https://sloppy.live">sloppy.live</a></div>

<script>
const C=document.getElementById('c');const ctx=C.getContext('2d');
let W,H;
function resize(){W=C.width=window.innerWidth;H=C.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

let foxes=[],foods=[],butterflies=[],flowers=[],clouds=[];
let mouseX=W/2,mouseY=H/2,frame=0,selectedFox=null,napMode=false;
const GROUND_Y=()=>H*0.55;

const FOX_COATS=[
  {body:'#d4752a',belly:'#f5e0c4',ear:'#2a1a0a',tail:'#f5e0c4',name:'Red'},
  {body:'#8a8a8a',belly:'#d4d0cc',ear:'#3a3a3a',tail:'#d4d0cc',name:'Silver'},
  {body:'#f0c878',belly:'#faf0e0',ear:'#5a4020',tail:'#faf0e0',name:'Golden'},
  {body:'#2a2220',belly:'#5a4a3a',ear:'#1a1210',tail:'#5a4a3a',name:'Melanistic'},
  {body:'#cc6633',belly:'#f0d8b8',ear:'#331a0a',tail:'#f0d8b8',name:'Amber'},
  {body:'#b0a090',belly:'#e8e0d8',ear:'#4a4038',tail:'#e8e0d8',name:'Platinum'},
];
const NAMES=['Maple','Acorn','Hazel','Fern','Rusty','Ember','Clover','Sage','Willow','Bramble','Copper','Honey','Nutmeg','Ginger','Thorn','Moss'];

function rng(a,b){return a+Math.random()*(b-a);}

function createFox(x){
  const coat=FOX_COATS[Math.floor(Math.random()*FOX_COATS.length)];
  return{
    x:x||rng(60,W-60),y:GROUND_Y()+rng(-10,30),
    vx:0,targetX:0,
    coat,name:NAMES[Math.floor(Math.random()*NAMES.length)],
    size:14+Math.random()*4,
    facing:Math.random()<0.5?-1:1,
    state:'idle',stateTimer:60+Math.random()*120,
    tailPhase:Math.random()*Math.PI*2,
    legPhase:0,
    blinkTimer:60+Math.random()*100,blinking:false,
    hunger:30+Math.random()*30,
    happiness:50+Math.random()*30,
    age:0,
    earWiggle:0,
    yawnTimer:0,
    sleeping:false,sleepZ:0,
    hearts:[]
  };
}

function addFox(){
  if(foxes.length>=10)return;
  foxes.push(createFox());
  playYip();
}

function dropFood(){
  foods.push({x:mouseX,y:GROUND_Y()+rng(-5,15),life:600,eaten:false,size:4});
  foxes.forEach(f=>{
    if(!f.sleeping&&f.hunger>20&&Math.random()<0.7){
      f.state='seek';f.targetX=mouseX+(Math.random()-0.5)*30;f.stateTimer=200;
    }
  });
}

function toggleNap(){
  napMode=!napMode;
  document.getElementById('sleepBtn').textContent=napMode?'Wake Up':'Nap Time';
  foxes.forEach(f=>{
    if(napMode){f.sleeping=true;f.state='sleep';f.stateTimer=9999;}
    else{f.sleeping=false;f.state='idle';f.stateTimer=60;}
  });
}

// Audio
let audioCtx;
function ensureAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function playYip(){const c=ensureAudio(),n=c.currentTime;const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.setValueAtTime(500+Math.random()*200,n);o.frequency.linearRampToValueAtTime(700+Math.random()*200,n+0.06);o.frequency.linearRampToValueAtTime(400+Math.random()*100,n+0.15);g.gain.setValueAtTime(0.04,n);g.gain.linearRampToValueAtTime(0,n+0.18);o.connect(g);g.connect(c.destination);o.start(n);o.stop(n+0.18);}
function playMunch(){const c=ensureAudio(),n=c.currentTime;const o=c.createOscillator(),g=c.createGain();o.type='triangle';o.frequency.setValueAtTime(300,n);o.frequency.linearRampToValueAtTime(150,n+0.05);g.gain.setValueAtTime(0.05,n);g.gain.linearRampToValueAtTime(0,n+0.06);o.connect(g);g.connect(c.destination);o.start(n);o.stop(n+0.06);}
function playPet(){const c=ensureAudio(),n=c.currentTime;[500,600,700].forEach((f,i)=>{const o=c.createOscillator(),g=c.createGain();o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0.02,n+i*0.06);g.gain.linearRampToValueAtTime(0,n+i*0.06+0.1);o.connect(g);g.connect(c.destination);o.start(n+i*0.06);o.stop(n+i*0.06+0.1);});}

// Input
C.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY;});
C.addEventListener('touchmove',e=>{e.preventDefault();mouseX=e.touches[0].clientX;mouseY=e.touches[0].clientY;},{passive:false});

C.addEventListener('click',e=>{
  const mx=e.clientX,my=e.clientY;
  let clicked=null,dist=50;
  foxes.forEach(f=>{const d=Math.hypot(f.x-mx,f.y-my);if(d<dist){clicked=f;dist=d;}});
  if(clicked){
    selectedFox=clicked;
    clicked.happiness=Math.min(100,clicked.happiness+10);
    clicked.earWiggle=10;
    clicked.hearts.push({x:0,y:-clicked.size*2,vy:-1,life:40});
    playPet();
    const info=document.getElementById('foxInfo');
    info.style.display='block';
    document.getElementById('foxName').value=clicked.name;
    updateFoxInfo();
  }else{
    selectedFox=null;
    document.getElementById('foxInfo').style.display='none';
  }
});

function renameFox(name){if(selectedFox&&name.trim())selectedFox.name=name.trim().slice(0,12);}
function updateFoxInfo(){
  if(!selectedFox)return;
  const f=selectedFox;
  const moods=['Lonely','Okay','Content','Happy','Overjoyed'];
  const mi=Math.min(4,Math.floor(f.happiness/20));
  document.getElementById('foxMood').textContent='Mood: '+moods[mi];
  const hungerLabel=f.hunger<20?'Full':f.hunger<50?'Satisfied':f.hunger<75?'Hungry':'Starving';
  document.getElementById('foxHunger').textContent='Hunger: '+hungerLabel;
  document.getElementById('foxAge').textContent='Coat: '+f.coat.name;
}

// Init scene
function initScene(){
  for(let i=0;i<15;i++){
    flowers.push({x:rng(30,W-30),y:GROUND_Y()+rng(-20,60),hue:rng(0,360),size:3+Math.random()*3,swayPhase:Math.random()*Math.PI*2});
  }
  for(let i=0;i<4;i++){
    clouds.push({x:rng(0,W),y:rng(20,H*0.3),w:60+Math.random()*80,speed:0.1+Math.random()*0.15});
  }
  for(let i=0;i<5;i++){
    butterflies.push({x:rng(50,W-50),y:rng(H*0.3,GROUND_Y()),vx:(Math.random()-0.5)*0.5,vy:(Math.random()-0.5)*0.3,wingPhase:Math.random()*Math.PI*2,hue:rng(0,360)});
  }
}

// Simulation
function simulate(){
  frame++;

  foxes.forEach(f=>{
    f.age++;
    f.tailPhase+=0.04;
    f.blinkTimer--;
    if(f.blinkTimer<=0){f.blinking=true;f.blinkTimer=70+Math.random()*100;setTimeout(()=>f.blinking=false,120);}
    if(f.earWiggle>0)f.earWiggle--;
    f.hunger=Math.min(100,f.hunger+0.003);
    f.happiness=Math.max(0,f.happiness-0.002);
    if(f.hunger>70)f.happiness=Math.max(0,f.happiness-0.005);

    f.hearts=f.hearts.filter(h=>{h.y+=h.vy;h.life--;return h.life>0;});

    if(f.sleeping){
      f.sleepZ+=0.02;
      return;
    }

    f.stateTimer--;
    if(f.state==='idle'){
      if(f.stateTimer<=0){
        f.targetX=rng(60,W-60);
        f.state='walk';f.stateTimer=100+Math.random()*150;
      }
    }else if(f.state==='walk'){
      const dx=f.targetX-f.x;
      if(Math.abs(dx)<5||f.stateTimer<=0){
        f.state='idle';f.stateTimer=80+Math.random()*160;f.vx=0;
      }else{
        f.vx+=(Math.sign(dx)*0.8-f.vx)*0.05;
        f.facing=dx>0?1:-1;
        f.legPhase+=0.12;
      }
    }else if(f.state==='seek'){
      const dx=f.targetX-f.x;
      if(Math.abs(dx)<15||f.stateTimer<=0){
        // Try to eat nearby food
        let ate=false;
        foods.forEach(fd=>{
          if(!fd.eaten&&Math.abs(f.x-fd.x)<25){
            fd.eaten=true;f.hunger=Math.max(0,f.hunger-30);f.happiness=Math.min(100,f.happiness+15);
            f.earWiggle=8;ate=true;playMunch();
          }
        });
        f.state='idle';f.stateTimer=60+Math.random()*100;f.vx=0;
      }else{
        f.vx+=(Math.sign(dx)*1.2-f.vx)*0.06;
        f.facing=dx>0?1:-1;
        f.legPhase+=0.15;
      }
    }

    f.vx*=0.95;
    f.x+=f.vx;
    f.x=Math.max(40,Math.min(W-40,f.x));

    // Random yawn
    if(Math.random()<0.001&&f.state==='idle'){f.yawnTimer=30;}
    if(f.yawnTimer>0)f.yawnTimer--;
  });

  foods=foods.filter(fd=>{fd.life--;return fd.life>0&&!fd.eaten;});

  butterflies.forEach(b=>{
    b.wingPhase+=0.2;
    b.x+=b.vx+Math.sin(frame*0.01+b.x*0.01)*0.2;
    b.y+=b.vy+Math.cos(frame*0.013+b.y*0.01)*0.15;
    if(b.x<20||b.x>W-20)b.vx*=-1;
    if(b.y<H*0.2||b.y>GROUND_Y()-20)b.vy*=-1;
  });

  clouds.forEach(cl=>{cl.x+=cl.speed;if(cl.x>W+cl.w)cl.x=-cl.w;});
  flowers.forEach(fl=>fl.swayPhase+=0.015);

  if(selectedFox)updateFoxInfo();
  document.getElementById('foxCount').textContent=foxes.length+' fox'+(foxes.length!==1?'es':'');
}

// Render
function drawFox(f){
  ctx.save();
  ctx.translate(f.x,f.y);
  const s=f.size,fc=f.facing;
  const legBob=f.sleeping?0:Math.sin(f.legPhase)*2;
  const earW=Math.sin(frame*0.3)*f.earWiggle*0.3;
  const c=f.coat;

  // Shadow
  ctx.beginPath();ctx.ellipse(0,s*0.6,s*1.2,s*0.2,0,0,Math.PI*2);
  ctx.fillStyle='rgba(0,0,0,0.1)';ctx.fill();

  if(f.sleeping){
    // Curled up
    ctx.beginPath();ctx.ellipse(0,0,s*1.1,s*0.5,0,0,Math.PI*2);ctx.fillStyle=c.body;ctx.fill();
    // Tail wrapping around
    ctx.beginPath();
    ctx.arc(s*0.6,0,s*0.7,-0.5,1.8);
    ctx.strokeStyle=c.body;ctx.lineWidth=s*0.35;ctx.lineCap='round';ctx.stroke();
    // Tail tip
    ctx.beginPath();
    ctx.arc(s*0.9,s*0.3,s*0.2,0,Math.PI*2);ctx.fillStyle=c.tail;ctx.fill();
    // Head
    ctx.beginPath();ctx.arc(-s*0.4,-s*0.1,s*0.45,0,Math.PI*2);ctx.fillStyle=c.body;ctx.fill();
    // Ears
    ctx.beginPath();ctx.moveTo(-s*0.6,-s*0.3);ctx.lineTo(-s*0.75,-s*0.7);ctx.lineTo(-s*0.4,-s*0.4);ctx.fillStyle=c.body;ctx.fill();
    ctx.beginPath();ctx.moveTo(-s*0.2,-s*0.3);ctx.lineTo(-s*0.1,-s*0.7);ctx.lineTo(-s*0.35,-s*0.4);ctx.fill();
    ctx.beginPath();ctx.moveTo(-s*0.65,-s*0.4);ctx.lineTo(-s*0.7,-s*0.6);ctx.lineTo(-s*0.48,-s*0.4);ctx.fillStyle=c.ear;ctx.fill();
    ctx.beginPath();ctx.moveTo(-s*0.25,-s*0.4);ctx.lineTo(-s*0.15,-s*0.6);ctx.lineTo(-s*0.35,-s*0.4);ctx.fill();
    // Closed eyes
    ctx.strokeStyle='#2a1a0a';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.arc(-s*0.5,-s*0.1,s*0.08,0.3,Math.PI-0.3);ctx.stroke();
    ctx.beginPath();ctx.arc(-s*0.3,-s*0.1,s*0.08,0.3,Math.PI-0.3);ctx.stroke();
    // Nose
    ctx.fillStyle='#222';ctx.beginPath();ctx.arc(-s*0.4,s*0.02,s*0.04,0,Math.PI*2);ctx.fill();
    // Zzz
    const za=Math.sin(f.sleepZ);
    ctx.font=`${10+za*2}px Caveat`;ctx.fillStyle=`rgba(245,230,208,${0.3+za*0.15})`;ctx.textAlign='center';
    ctx.fillText('z',-s*0.1-za*4,-s*0.7-za*6);
    ctx.font=`${13+za*3}px Caveat`;
    ctx.fillText('Z',s*0.2-za*2,-s*0.9-za*10);
  }else{
    // Tail
    const tailWag=Math.sin(f.tailPhase)*12;
    ctx.beginPath();
    ctx.moveTo(-fc*s*0.6,0);
    ctx.quadraticCurveTo(-fc*s*1.0,-s*0.2+tailWag*0.02,-fc*s*1.3,-s*0.3+Math.sin(f.tailPhase)*s*0.2);
    ctx.strokeStyle=c.body;ctx.lineWidth=s*0.3;ctx.lineCap='round';ctx.stroke();
    // Tail tip
    ctx.beginPath();
    const tipX=-fc*s*1.3,tipY=-s*0.3+Math.sin(f.tailPhase)*s*0.2;
    ctx.arc(tipX,tipY,s*0.18,0,Math.PI*2);ctx.fillStyle=c.tail;ctx.fill();

    // Legs
    ctx.fillStyle=c.body;
    ctx.fillRect(-s*0.4,s*0.15+legBob,s*0.2,s*0.35);
    ctx.fillRect(s*0.2,s*0.15-legBob,s*0.2,s*0.35);
    // Paws
    ctx.fillStyle=c.ear;
    ctx.beginPath();ctx.ellipse(-s*0.3,s*0.5+legBob,s*0.12,s*0.06,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(s*0.3,s*0.5-legBob,s*0.12,s*0.06,0,0,Math.PI*2);ctx.fill();

    // Body
    ctx.beginPath();ctx.ellipse(0,0,s*0.7,s*0.45,0,0,Math.PI*2);ctx.fillStyle=c.body;ctx.fill();
    // Belly
    ctx.beginPath();ctx.ellipse(fc*s*0.1,s*0.1,s*0.35,s*0.25,0,0,Math.PI*2);ctx.fillStyle=c.belly;ctx.fill();

    // Head
    const hx=fc*s*0.55,hy=-s*0.25;
    ctx.beginPath();ctx.arc(hx,hy,s*0.42,0,Math.PI*2);ctx.fillStyle=c.body;ctx.fill();
    // Cheeks
    ctx.beginPath();ctx.ellipse(hx+fc*s*0.1,hy+s*0.15,s*0.3,s*0.2,0,0,Math.PI*2);ctx.fillStyle=c.belly;ctx.fill();

    // Ears
    ctx.beginPath();ctx.moveTo(hx-fc*s*0.1,hy-s*0.25+earW);ctx.lineTo(hx-fc*s*0.25,hy-s*0.65+earW);ctx.lineTo(hx+fc*s*0.05,hy-s*0.3);ctx.fillStyle=c.body;ctx.fill();
    ctx.beginPath();ctx.moveTo(hx+fc*s*0.25,hy-s*0.25-earW);ctx.lineTo(hx+fc*s*0.35,hy-s*0.65-earW);ctx.lineTo(hx+fc*s*0.1,hy-s*0.3);ctx.fill();
    // Inner ears
    ctx.beginPath();ctx.moveTo(hx-fc*s*0.05,hy-s*0.3+earW);ctx.lineTo(hx-fc*s*0.18,hy-s*0.55+earW);ctx.lineTo(hx+fc*s*0.05,hy-s*0.32);ctx.fillStyle=c.ear;ctx.fill();
    ctx.beginPath();ctx.moveTo(hx+fc*s*0.22,hy-s*0.3-earW);ctx.lineTo(hx+fc*s*0.3,hy-s*0.55-earW);ctx.lineTo(hx+fc*s*0.12,hy-s*0.32);ctx.fill();

    // Snout
    ctx.beginPath();ctx.ellipse(hx+fc*s*0.25,hy+s*0.08,s*0.18,s*0.12,0,0,Math.PI*2);ctx.fillStyle=c.belly;ctx.fill();

    // Eyes
    if(f.blinking){
      ctx.strokeStyle='#2a1a0a';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(hx+fc*s*0.05,hy-s*0.02,s*0.06,0.3,Math.PI-0.3);ctx.stroke();
      ctx.beginPath();ctx.arc(hx+fc*s*0.22,hy-s*0.02,s*0.06,0.3,Math.PI-0.3);ctx.stroke();
    }else{
      ctx.fillStyle='#2a1a0a';
      ctx.beginPath();ctx.arc(hx+fc*s*0.05,hy-s*0.02,s*0.06,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(hx+fc*s*0.22,hy-s*0.02,s*0.06,0,Math.PI*2);ctx.fill();
      // Eye shine
      ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(hx+fc*s*0.07,hy-s*0.05,s*0.025,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(hx+fc*s*0.24,hy-s*0.05,s*0.025,0,Math.PI*2);ctx.fill();
    }

    // Nose
    ctx.fillStyle='#1a1008';
    ctx.beginPath();ctx.arc(hx+fc*s*0.35,hy+s*0.06,s*0.05,0,Math.PI*2);ctx.fill();

    // Mouth / yawn
    if(f.yawnTimer>0){
      const yawnOpen=Math.sin(f.yawnTimer/30*Math.PI)*s*0.08;
      ctx.beginPath();ctx.ellipse(hx+fc*s*0.3,hy+s*0.14,s*0.08,yawnOpen,0,0,Math.PI*2);
      ctx.fillStyle='#cc6666';ctx.fill();
    }else{
      // Smile
      ctx.strokeStyle='#5a3020';ctx.lineWidth=0.8;
      ctx.beginPath();ctx.arc(hx+fc*s*0.28,hy+s*0.1,s*0.06,0.2,Math.PI-0.2);ctx.stroke();
    }

    // Whiskers
    ctx.strokeStyle='rgba(200,180,160,0.3)';ctx.lineWidth=0.5;
    const wx=hx+fc*s*0.35,wy=hy+s*0.08;
    for(let i=-1;i<=1;i++){
      ctx.beginPath();ctx.moveTo(wx,wy+i*2);ctx.lineTo(wx+fc*s*0.4,wy+i*4);ctx.stroke();
    }
  }

  // Hearts
  f.hearts.forEach(h=>{
    const a=h.life/40;
    ctx.font=`${12*a}px serif`;ctx.fillStyle=`rgba(220,80,100,${a})`;ctx.textAlign='center';
    ctx.fillText('\u2665',h.x,h.y);
  });

  // Name
  ctx.font='12px Caveat';ctx.fillStyle='rgba(245,230,208,0.6)';ctx.textAlign='center';
  ctx.fillText(f.name,0,s*0.85);

  // Selected indicator
  if(f===selectedFox){
    ctx.beginPath();ctx.ellipse(0,s*0.6,s*1.3,s*0.2,0,0,Math.PI*2);
    ctx.strokeStyle='rgba(245,230,208,0.3)';ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.stroke();ctx.setLineDash([]);
  }

  ctx.restore();
}

function render(){
  // Sky gradient
  const skyGrad=ctx.createLinearGradient(0,0,0,GROUND_Y());
  skyGrad.addColorStop(0,'#5a8ab8');skyGrad.addColorStop(0.6,'#8ab8d0');skyGrad.addColorStop(1,'#b0d8c0');
  ctx.fillStyle=skyGrad;ctx.fillRect(0,0,W,GROUND_Y());

  // Sun
  ctx.beginPath();ctx.arc(W*0.8,H*0.15,40,0,Math.PI*2);
  ctx.fillStyle='rgba(255,240,200,0.3)';ctx.fill();
  ctx.beginPath();ctx.arc(W*0.8,H*0.15,25,0,Math.PI*2);
  ctx.fillStyle='rgba(255,245,220,0.5)';ctx.fill();

  // Clouds
  clouds.forEach(cl=>{
    ctx.fillStyle='rgba(255,255,255,0.4)';
    ctx.beginPath();ctx.ellipse(cl.x,cl.y,cl.w*0.5,cl.w*0.2,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cl.x+cl.w*0.25,cl.y-cl.w*0.08,cl.w*0.3,cl.w*0.15,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cl.x-cl.w*0.2,cl.y+cl.w*0.04,cl.w*0.25,cl.w*0.12,0,0,Math.PI*2);ctx.fill();
  });

  // Grass
  const grassGrad=ctx.createLinearGradient(0,GROUND_Y(),0,H);
  grassGrad.addColorStop(0,'#5a8a42');grassGrad.addColorStop(0.3,'#4a7a38');grassGrad.addColorStop(1,'#3a6a2e');
  ctx.fillStyle=grassGrad;ctx.fillRect(0,GROUND_Y()-5,W,H-GROUND_Y()+5);

  // Grass blades
  for(let x=5;x<W;x+=8){
    const h=6+Math.sin(x*0.3+frame*0.02)*3;
    const sway=Math.sin(frame*0.015+x*0.05)*2;
    ctx.strokeStyle=`rgba(100,160,70,${0.3+Math.random()*0.1})`;ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(x,GROUND_Y()-2);ctx.lineTo(x+sway,GROUND_Y()-2-h);ctx.stroke();
  }

  // Flowers
  flowers.forEach(fl=>{
    const sway=Math.sin(fl.swayPhase)*1.5;
    ctx.strokeStyle='#4a8a3a';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(fl.x,fl.y);ctx.lineTo(fl.x+sway,fl.y-fl.size*3);ctx.stroke();
    ctx.fillStyle=`hsla(${fl.hue},70%,65%,0.7)`;
    ctx.beginPath();ctx.arc(fl.x+sway,fl.y-fl.size*3,fl.size,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,200,0.5)';
    ctx.beginPath();ctx.arc(fl.x+sway,fl.y-fl.size*3,fl.size*0.4,0,Math.PI*2);ctx.fill();
  });

  // Foods
  foods.forEach(fd=>{
    ctx.fillStyle='#cc6644';ctx.beginPath();ctx.arc(fd.x,fd.y,fd.size,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#aa4422';ctx.beginPath();ctx.arc(fd.x-1,fd.y-1,fd.size*0.4,0,Math.PI*2);ctx.fill();
  });

  // Foxes sorted by y
  [...foxes].sort((a,b)=>a.y-b.y).forEach(drawFox);

  // Butterflies
  butterflies.forEach(b=>{
    const wing=Math.sin(b.wingPhase)*0.7;
    ctx.fillStyle=`hsla(${b.hue},70%,60%,0.6)`;
    ctx.beginPath();ctx.ellipse(b.x-3,b.y,3,5*Math.abs(wing),wing*0.3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(b.x+3,b.y,3,5*Math.abs(wing),-wing*0.3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#333';ctx.fillRect(b.x-0.5,b.y-2,1,4);
  });
}

function loop(){simulate();render();requestAnimationFrame(loop);}

initScene();
for(let i=0;i<3;i++)addFox();
loop();
</script>
