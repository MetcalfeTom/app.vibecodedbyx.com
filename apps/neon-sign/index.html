<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Sign Generator</title>
<link rel="icon" href="https://emojicdn.elk.sh/💡">
<meta property="og:title" content="Neon Sign Generator">
<meta property="og:description" content="Type anything and watch it glow as a pulsating neon sign. Pick your color, tweak the vibe.">
<meta property="og:url" content="https://app.sloppy.live/neon-sign/">
<meta property="og:image" content="https://image.pollinations.ai/prompt/glowing%20neon%20sign%20text%20on%20dark%20brick%20wall%20pink%20blue%20purple%20glow?width=1200&height=630&nologo=true&referrer=sloppy.live">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Sacramento&family=Monoton&family=Bungee+Shade&family=Rubik+Glitch&family=Press+Start+2P&family=Lexend+Mega:wght@700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow-x:hidden;background:#0a0a0f;font-family:'Share Tech Mono',monospace;color:#ccc}
#wall{position:relative;width:100%;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
#wall::before{content:'';position:absolute;inset:0;background:repeating-linear-gradient(90deg,transparent,transparent 48px,rgba(255,255,255,0.015) 48px,rgba(255,255,255,0.015) 50px),repeating-linear-gradient(0deg,transparent,transparent 24px,rgba(255,255,255,0.02) 24px,rgba(255,255,255,0.02) 26px);pointer-events:none}
#wall::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 40%,rgba(0,0,0,0) 0%,rgba(0,0,0,0.6) 100%);pointer-events:none}

#neon-display{position:relative;z-index:2;padding:40px 20px;text-align:center;min-height:200px;display:flex;align-items:center;justify-content:center;width:100%;flex:1}
#neon-text{font-size:clamp(32px,10vw,120px);line-height:1.2;word-break:break-word;max-width:90vw;transition:font-family 0.3s;cursor:default}

#controls{position:relative;z-index:10;width:100%;max-width:600px;padding:16px 20px 24px;margin:0 auto}
#text-input{width:100%;padding:12px 16px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#fff;font-family:'Share Tech Mono',monospace;font-size:16px;border-radius:4px;outline:none;text-align:center}
#text-input:focus{border-color:rgba(255,255,255,0.3)}
#text-input::placeholder{color:#444}

#options{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-top:14px}
.color-btn{width:36px;height:36px;border-radius:50%;border:2px solid rgba(255,255,255,0.15);cursor:pointer;transition:all 0.2s;position:relative}
.color-btn:hover{transform:scale(1.15)}
.color-btn.active{border-color:#fff;transform:scale(1.2);box-shadow:0 0 12px var(--glow)}
.color-btn::after{content:'';position:absolute;inset:3px;border-radius:50%;background:var(--bg)}

#font-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:10px}
.font-btn{font-size:10px;padding:6px 12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#888;cursor:pointer;border-radius:3px;transition:all 0.2s;white-space:nowrap}
.font-btn:hover{color:#fff;border-color:rgba(255,255,255,0.3)}
.font-btn.active{color:#fff;background:rgba(255,255,255,0.1);border-color:rgba(255,255,255,0.4)}

#sliders{display:flex;gap:16px;justify-content:center;margin-top:12px;flex-wrap:wrap}
.slider-group{display:flex;flex-direction:column;align-items:center;gap:2px}
.slider-group label{font-size:9px;color:#555;letter-spacing:1px;text-transform:uppercase}
.slider-group input[type=range]{width:80px;accent-color:#ff3388}

#actions{display:flex;gap:10px;justify-content:center;margin-top:12px}
.action-btn{font-family:'Share Tech Mono',monospace;font-size:11px;padding:8px 16px;background:transparent;border:1px solid rgba(255,255,255,0.15);color:#888;cursor:pointer;border-radius:3px;transition:all 0.2s}
.action-btn:hover{color:#fff;border-color:rgba(255,255,255,0.4)}

#saved-toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:rgba(0,255,136,0.15);border:1px solid #0f8;color:#0f8;padding:8px 20px;border-radius:4px;font-size:12px;opacity:0;transition:opacity 0.3s;z-index:100;pointer-events:none}

canvas#sparks{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:3}
</style>
</head>
<body>
<div id="wall">
  <div id="neon-display">
    <div id="neon-text">HELLO WORLD</div>
  </div>
  <div id="controls">
    <input type="text" id="text-input" placeholder="Type your neon text..." maxlength="60" value="HELLO WORLD">
    <div id="options">
      <div class="color-btn active" style="--bg:#ff3388;--glow:#ff3388" data-color="#ff3388" data-name="Hot Pink"></div>
      <div class="color-btn" style="--bg:#00ffff;--glow:#00ffff" data-color="#00ffff" data-name="Cyan"></div>
      <div class="color-btn" style="--bg:#ff6600;--glow:#ff6600" data-color="#ff6600" data-name="Orange"></div>
      <div class="color-btn" style="--bg:#aa00ff;--glow:#aa00ff" data-color="#aa00ff" data-name="Violet"></div>
      <div class="color-btn" style="--bg:#00ff66;--glow:#00ff66" data-color="#00ff66" data-name="Green"></div>
      <div class="color-btn" style="--bg:#ffee00;--glow:#ffee00" data-color="#ffee00" data-name="Yellow"></div>
      <div class="color-btn" style="--bg:#ff0044;--glow:#ff0044" data-color="#ff0044" data-name="Red"></div>
      <div class="color-btn" style="--bg:#ffffff;--glow:#ffffff" data-color="#ffffff" data-name="White"></div>
      <div class="color-btn" style="--bg:#4488ff;--glow:#4488ff" data-color="#4488ff" data-name="Blue"></div>
    </div>
    <div id="font-row">
      <button class="font-btn active" data-font="Pacifico">Script</button>
      <button class="font-btn" data-font="Monoton">Outline</button>
      <button class="font-btn" data-font="Bungee Shade">Block</button>
      <button class="font-btn" data-font="Sacramento">Cursive</button>
      <button class="font-btn" data-font="Rubik Glitch">Glitch</button>
      <button class="font-btn" data-font="Press Start 2P">Pixel</button>
      <button class="font-btn" data-font="Lexend Mega">Bold</button>
    </div>
    <div id="sliders">
      <div class="slider-group">
        <input type="range" id="glow-slider" min="0" max="100" value="60">
        <label>Glow</label>
      </div>
      <div class="slider-group">
        <input type="range" id="pulse-slider" min="0" max="100" value="40">
        <label>Pulse</label>
      </div>
      <div class="slider-group">
        <input type="range" id="flicker-slider" min="0" max="100" value="15">
        <label>Flicker</label>
      </div>
      <div class="slider-group">
        <input type="range" id="size-slider" min="20" max="200" value="80">
        <label>Size</label>
      </div>
    </div>
    <div id="actions">
      <button class="action-btn" id="btn-screenshot">Screenshot</button>
      <button class="action-btn" id="btn-random">Random</button>
      <button class="action-btn" id="btn-buzz">Buzz Effect</button>
    </div>
  </div>
</div>
<canvas id="sparks"></canvas>
<div id="saved-toast">Saved to clipboard!</div>
<script>
const neonEl = document.getElementById('neon-text');
const textInput = document.getElementById('text-input');
const sparkCanvas = document.getElementById('sparks');
const sparkCtx = sparkCanvas.getContext('2d');

let currentColor = '#ff3388';
let currentFont = 'Pacifico';
let glowIntensity = 60;
let pulseSpeed = 40;
let flickerAmount = 15;
let fontSize = 80;
let buzzActive = false;
let buzzTimer = 0;
let sparks = [];

function resizeCanvas() {
  sparkCanvas.width = window.innerWidth * (window.devicePixelRatio || 1);
  sparkCanvas.height = window.innerHeight * (window.devicePixelRatio || 1);
  sparkCtx.setTransform(window.devicePixelRatio||1, 0, 0, window.devicePixelRatio||1, 0, 0);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

// Color hex to rgb
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

// Apply neon style
function applyNeon() {
  const rgb = hexToRgb(currentColor);
  const g = glowIntensity / 100;
  const baseBlur = 10 + g * 40;
  const outerBlur = 20 + g * 80;

  neonEl.style.fontFamily = "'" + currentFont + "', cursive";
  neonEl.style.fontSize = 'clamp(20px,' + fontSize/8 + 'vw,' + fontSize*1.5 + 'px)';
  neonEl.style.color = currentColor;
  neonEl.style.textShadow = [
    '0 0 ' + (baseBlur*0.3) + 'px rgba('+rgb.r+','+rgb.g+','+rgb.b+',0.8)',
    '0 0 ' + baseBlur + 'px rgba('+rgb.r+','+rgb.g+','+rgb.b+',0.6)',
    '0 0 ' + outerBlur + 'px rgba('+rgb.r+','+rgb.g+','+rgb.b+',0.3)',
    '0 0 ' + (outerBlur*1.5) + 'px rgba('+rgb.r+','+rgb.g+','+rgb.b+',0.15)'
  ].join(',');

  // Wall ambient glow
  document.getElementById('wall').style.background =
    'radial-gradient(ellipse at 50% 35%, rgba('+rgb.r+','+rgb.g+','+rgb.b+','+g*0.08+') 0%, rgba(10,10,15,1) 70%)';
}

// Animate pulse + flicker
let frame = 0;
function animate() {
  frame++;
  const pulse = pulseSpeed / 100;
  const flicker = flickerAmount / 100;

  let opacity = 1;
  // Pulse
  if (pulse > 0) {
    const wave = Math.sin(frame * pulse * 0.04) * 0.5 + 0.5;
    opacity *= 0.7 + wave * 0.3;
  }
  // Flicker
  if (flicker > 0 && Math.random() < flicker * 0.15) {
    opacity *= 0.3 + Math.random() * 0.5;
  }
  // Buzz
  if (buzzActive) {
    buzzTimer--;
    if (buzzTimer <= 0) buzzActive = false;
    opacity *= 0.1 + Math.random() * 0.9;
    neonEl.style.transform = 'translate(' + (Math.random()-0.5)*4 + 'px,' + (Math.random()-0.5)*2 + 'px)';
    // Spawn sparks
    if (Math.random() < 0.4) {
      const rect = neonEl.getBoundingClientRect();
      const sx = rect.left + Math.random() * rect.width;
      const sy = rect.top + Math.random() * rect.height;
      for (let i = 0; i < 3; i++) {
        const a = Math.random()*Math.PI*2;
        sparks.push({ x:sx, y:sy, vx:Math.cos(a)*3*Math.random(), vy:Math.sin(a)*3*Math.random()-1, life:1, color:currentColor });
      }
    }
  } else {
    neonEl.style.transform = '';
  }

  neonEl.style.opacity = opacity;

  // Sparks
  sparkCtx.clearRect(0, 0, window.innerWidth, window.innerHeight);
  for (let i = sparks.length-1; i >= 0; i--) {
    const s = sparks[i];
    s.x += s.vx; s.y += s.vy; s.vy += 0.1; s.life -= 0.03;
    if (s.life <= 0) { sparks.splice(i,1); continue; }
    sparkCtx.globalAlpha = s.life;
    sparkCtx.fillStyle = s.color;
    sparkCtx.shadowColor = s.color;
    sparkCtx.shadowBlur = 6;
    sparkCtx.fillRect(s.x-1, s.y-1, 2, 2);
  }
  sparkCtx.globalAlpha = 1;
  sparkCtx.shadowBlur = 0;

  requestAnimationFrame(animate);
}

// Text input
textInput.addEventListener('input', () => {
  neonEl.textContent = textInput.value || 'TYPE SOMETHING';
});

// Color buttons
document.querySelectorAll('.color-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentColor = btn.dataset.color;
    applyNeon();
  });
});

// Font buttons
document.querySelectorAll('.font-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.font-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFont = btn.dataset.font;
    applyNeon();
  });
});

// Sliders
document.getElementById('glow-slider').addEventListener('input', e => { glowIntensity = parseInt(e.target.value); applyNeon(); });
document.getElementById('pulse-slider').addEventListener('input', e => { pulseSpeed = parseInt(e.target.value); });
document.getElementById('flicker-slider').addEventListener('input', e => { flickerAmount = parseInt(e.target.value); });
document.getElementById('size-slider').addEventListener('input', e => { fontSize = parseInt(e.target.value); applyNeon(); });

// Screenshot
document.getElementById('btn-screenshot').addEventListener('click', async () => {
  try {
    const el = document.getElementById('neon-display');
    // Use canvas to capture
    const c = document.createElement('canvas');
    const w = 1200, h = 630;
    c.width = w; c.height = h;
    const cx = c.getContext('2d');
    // Dark bg
    cx.fillStyle = '#0a0a0f';
    cx.fillRect(0,0,w,h);
    // Brick pattern
    cx.strokeStyle = 'rgba(255,255,255,0.03)';
    cx.lineWidth = 1;
    for (let y = 0; y < h; y += 26) { cx.beginPath(); cx.moveTo(0,y); cx.lineTo(w,y); cx.stroke(); }
    for (let x = 0; x < w; x += 50) { for (let y = 0; y < h; y += 52) { cx.beginPath(); cx.moveTo(x + (Math.floor(y/26)%2)*25, y); cx.lineTo(x + (Math.floor(y/26)%2)*25, y+26); cx.stroke(); } }
    // Glow
    const rgb = hexToRgb(currentColor);
    const grd = cx.createRadialGradient(w/2, h/2, 0, w/2, h/2, w*0.5);
    grd.addColorStop(0, 'rgba('+rgb.r+','+rgb.g+','+rgb.b+',0.08)');
    grd.addColorStop(1, 'rgba(0,0,0,0)');
    cx.fillStyle = grd; cx.fillRect(0,0,w,h);
    // Text
    const text = neonEl.textContent;
    let sz = 100;
    cx.font = sz + 'px ' + currentFont;
    while (cx.measureText(text).width > w * 0.85 && sz > 20) { sz -= 4; cx.font = sz + 'px ' + currentFont; }
    cx.textAlign = 'center'; cx.textBaseline = 'middle';
    cx.shadowColor = currentColor; cx.shadowBlur = 40;
    cx.fillStyle = currentColor;
    cx.fillText(text, w/2, h/2);
    cx.shadowBlur = 80; cx.globalAlpha = 0.5; cx.fillText(text, w/2, h/2);
    cx.globalAlpha = 1; cx.shadowBlur = 0;

    c.toBlob(async blob => {
      try {
        await navigator.clipboard.write([new ClipboardItem({'image/png': blob})]);
        showToast('Copied to clipboard!');
      } catch(e) {
        const url = c.toDataURL('image/png');
        const a = document.createElement('a');
        a.href = url; a.download = 'neon-sign.png'; a.click();
        showToast('Downloaded!');
      }
    }, 'image/png');
  } catch(e) { console.error(e); }
});

function showToast(msg) {
  const t = document.getElementById('saved-toast');
  t.textContent = msg;
  t.style.opacity = 1;
  setTimeout(() => t.style.opacity = 0, 2000);
}

// Random
const randomTexts = ['OPEN 24/7','DREAM BIG','GOOD VIBES','LIVE FAST','STAY WEIRD','NO LIMITS','PURE CHAOS','GAME OVER','LOVE WINS','SEND HELP','VIBE CHECK','TOO COOL','NEON NIGHTS','LETS GO','OH YEAH','RADICAL'];
document.getElementById('btn-random').addEventListener('click', () => {
  const text = randomTexts[Math.floor(Math.random()*randomTexts.length)];
  textInput.value = text;
  neonEl.textContent = text;
  // Random color
  const btns = [...document.querySelectorAll('.color-btn')];
  const btn = btns[Math.floor(Math.random()*btns.length)];
  btns.forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentColor = btn.dataset.color;
  // Random font
  const fbtns = [...document.querySelectorAll('.font-btn')];
  const fb = fbtns[Math.floor(Math.random()*fbtns.length)];
  fbtns.forEach(b => b.classList.remove('active'));
  fb.classList.add('active');
  currentFont = fb.dataset.font;
  applyNeon();
});

// Buzz
document.getElementById('btn-buzz').addEventListener('click', () => {
  buzzActive = true;
  buzzTimer = 45;
});

applyNeon();
animate();
</script>
</body>
</html>
