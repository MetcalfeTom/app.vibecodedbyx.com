  function chipsPerSec() {
    const interval = effectOf(UPGRADES.find(x => x.k === 'speed'));
    if (!state.autoOn || !effectOf(UPGRADES.find(x => x.k === 'auto'))) return 0;
    // Empirical estimate of avg payout
    const avg = avgPayout();
    return avg / interval;
  }
  function avgPayout() {
    // E[payout] for current setup, very rough — sum over symbols of (p * count_avg)² × val × multiplier
    const N = reelCount();
    const totalW = SYMBOLS.reduce((s, x) => s + x.weight, 0);
    let avg = 0;
    for (const s of SYMBOLS) {
      const p = s.weight / totalW;
      // expected count = N * p; E[count²] = N*p*(1 + (N-1)*p)
      const eSq = N * p * (1 + (N - 1) * p);
      avg += eSq * s.val;
    }
    return avg * multiplier();
  }

  // ===== SPIN =====
  // Payout is calculated AT THE START of the spin — chips, runChips, lastPayout,
  // and combo badge all update on the first frame after the click. The reels
  // animate purely as a visual flourish; their settle-timeout only triggers
  // win-glow + clears the spinning lock. This makes auto-spin feel snappy and
  // decouples math from visuals.
  // ===== REEL ANIMATION (rAF ticker) =====
  // Replaces the prior CSS-transition + setTimeout-race approach. Three bugs
  // this fixes simultaneously:
  //
  //  1. **Mobile landing desync** — old code hard-coded SLOT_H=100 but the
  //     mobile CSS breakpoint (.reel{height:80px} @ ≤560px) made the strip
  //     overshoot the window by 5 cells. Cell height is now read from layout
  //     (r.wrap.clientHeight) at spin-start so landing is always pixel-correct.
  //  2. **Off-by-one painted vs. landed** — old code painted the result at
  //     strip index 21 but translateY(-20*SLOT_H) centered cell 20 in the
  //     window, so the symbol you saw at rest was a random filler, not the
  //     computed result. LANDING_IDX is now the single source of truth for
  //     both the painter and the translation magnitude.
  //  3. **Resolve race** — `setTimeout(longest)` could fire before or after
  //     the CSS transition finished if the browser was throttled. Resolve
  //     now runs from the ticker's "all reels landed" callback, guaranteeing
  //     visual + state sync on every spin.
  const STRIP_LEN   = 24;   // cells per strip (matches buildReels)
  const LANDING_IDX = 20;   // strip index where result lands
  const reelAnims   = [];   // active per-reel tweens
  let   reelTickerOn   = false;
  let   reelOnComplete = null;
  function easeOutCubic(t) { const u = 1 - t; return 1 - u * u * u; }
  function startReelTween(r, landingSym, startTime, duration, fillerLuck) {
    // Repaint every cell — landing symbol at LANDING_IDX, fresh random
    // fillers everywhere else so old leftover cells never linger.
    const cells = r.strip.children;
    for (let k = 0; k < cells.length; k++) {
      cells[k].textContent = (k === LANDING_IDX) ? landingSym.em : pickSymbol(fillerLuck).em;
    }
    const cellH = r.wrap.clientHeight;     // layout-driven, survives breakpoint
    r.strip.style.transition = 'none';     // disable any leftover CSS transition
    r.strip.style.transform  = 'translateY(0px)';
    r.wrap.classList.remove('win');
    reelAnims.push({ r, startTime, duration, endY: -LANDING_IDX * cellH });
  }
  function reelTicker(now) {
    for (let i = 0; i < reelAnims.length; i++) {
      const a = reelAnims[i];
      const elapsed = now - a.startTime;
      if (elapsed >= a.duration) {
        a.r.strip.style.transform = `translateY(${a.endY}px)`;
        a._done = true;
      } else {
        const t = Math.max(0, elapsed) / a.duration;
        a.r.strip.style.transform = `translateY(${a.endY * easeOutCubic(t)}px)`;
      }
    }
    for (let i = reelAnims.length - 1; i >= 0; i--) {
      if (reelAnims[i]._done) reelAnims.splice(i, 1);
    }
    if (reelAnims.length > 0) {
      requestAnimationFrame(reelTicker);
    } else {
      reelTickerOn = false;
      const cb = reelOnComplete;
      reelOnComplete = null;
      if (cb) cb();
    }
  }
  function ensureReelTicker() {
    if (reelTickerOn) return;
    reelTickerOn = true;
    requestAnimationFrame(reelTicker);
  }

  // ===== PAYLINE GENERATOR =====
  // Replaces the prior hardcoded LINESETS={6:[...], 9:[...]} table — which
  // (a) gave zero line bonuses at N=3,4,5,7,8 (silent gap) and (b) had no
  // structural protection against wrap-around lines like `[2,3,4]` at N=6
  // (which crosses a row boundary and is not a horizontal line).
  //
  // The generator builds the same grid the player sees in buildReels
  // (cols = colCount(N) — strict 3 max, rows = ceil(N/cols)) and walks
  // real rows/cols/diagonals, emitting only lines whose every cell maps
  // to a valid reel index. Wrap-around is impossible because we never
  // generate a line that spans cells outside a single row/col/diagonal
  // of the true 2D grid.
  //
  // Coverage by N (cached on first call):
  //   N=3  → 1 row [0,1,2]                                          (1 line)
  //   N=4  → 1 row [0,1,2] + col [0,3]                              (2 lines)
  //   N=5  → 1 row + 2 cols (col-2 dropped; row-1 col-2 missing)    (3 lines)
  //   N=6  → 2 rows + 3 cols                                        (5 lines)
  //   N=7  → 2 rows + 1 col [0,3,6] + 1 anti-diag [2,4,6]           (4 lines)
  //   N=8  → 2 rows + 2 cols + 1 anti-diag [2,4,6]                  (5 lines)
  //   N=9  → 3 rows + 3 cols + 2 diagonals                          (8 lines)
  // ===== EXPLICIT PER-N PAYLINE TABLES =====
  // Per chat: "rewrite to strictly check adjacent reels for each row, only
  // allow diagonals if the board is square, no more phantom wins". Each
  // payline is hand-written so there's zero ambiguity about which cells
  // the scorer (and the SVG overlay visualizer) considers a "line". A
  // board is "square" only when cols × rows === N, which (with the strict
  // 3-col cap) is true ONLY at N=9 (3×3). All other N values get rows +
  // partial cols, no diagonals — eliminates the false-positive diagonal
  // wins that the old procedural generator could imply at N=7/8 (where
  // rows === cols mathematically but the bottom row was incomplete).
  const LINES_BY_N = {
    3: [
      { idx: [0,1,2], len: 3, kind: 'row' },
      // Per chat: 1×3 early game was too slow with only the full-line.
      // Re-enable adjacent 2-of-3 pair matches so "two cherries side by
      // side" gives a small payout. evalLine + len² scoring naturally
      // weights these (×4 of cell.val) below the full-line (×9).
      { idx: [0,1],   len: 2, kind: 'row' },
      { idx: [1,2],   len: 2, kind: 'row' },
    ],
    4: [
      { idx: [0,1,2], len: 3, kind: 'row' },
      { idx: [0,3],   len: 2, kind: 'col' },
    ],
    5: [
      { idx: [0,1,2], len: 3, kind: 'row' },
      { idx: [0,3],   len: 2, kind: 'col' },
      { idx: [1,4],   len: 2, kind: 'col' },
    ],
    6: [
      { idx: [0,1,2], len: 3, kind: 'row' },
      { idx: [3,4,5], len: 3, kind: 'row' },
      { idx: [0,3],   len: 2, kind: 'col' },
      { idx: [1,4],   len: 2, kind: 'col' },
      { idx: [2,5],   len: 2, kind: 'col' },
    ],
    7: [
      { idx: [0,1,2], len: 3, kind: 'row' },
      { idx: [3,4,5], len: 3, kind: 'row' },
      { idx: [0,3,6], len: 3, kind: 'col' },
    ],
    8: [
      { idx: [0,1,2], len: 3, kind: 'row' },
      { idx: [3,4,5], len: 3, kind: 'row' },
      { idx: [0,3,6], len: 3, kind: 'col' },
      { idx: [1,4,7], len: 3, kind: 'col' },
    ],
    9: [   // SQUARE (3×3) — only N where diagonals fire
      { idx: [0,1,2], len: 3, kind: 'row' },
      { idx: [3,4,5], len: 3, kind: 'row' },
      { idx: [6,7,8], len: 3, kind: 'row' },
      { idx: [0,3,6], len: 3, kind: 'col' },
      { idx: [1,4,7], len: 3, kind: 'col' },
      { idx: [2,5,8], len: 3, kind: 'col' },
      { idx: [0,4,8], len: 3, kind: 'diag' },
      { idx: [2,4,6], len: 3, kind: 'antidiag' },
    ],
  };
  // ===== AUTO HORIZONTAL PAYLINES — irregular grids only =====
  // Per chat: "only apply irregular horizontal payline detection when cell
  // count isn't a multiple of 3". For N where N % 3 === 0 (3, 6, 9) the
  // canonical hand-written LINES_BY_N table already enumerates every row
  // — no auto-gen needed. For N=4, 5, 7, 8 (N % 3 !== 0) the trailing
  // partial row may have 1 OR 2+ cells and the hand-written tables miss
  // the 2-cell horizontals — auto-gen fills those in. Specifically:
  //   N=4 (3×2, last row [3]):       row 0 only → no new line (len 1)
  //   N=5 (3×2, last row [3,4]):     adds row [3,4] (len 2)
  //   N=7 (3×3, last row [6]):       no new line (len 1)
  //   N=8 (3×3, last row [6,7]):     adds row [6,7] (len 2)
  // Cols and diagonals stay table-driven and are merged in via getLines.
  function autoHorizontalLines(N) {
    const cols = colCount(N);
    const rows = Math.ceil(N / cols);
    const out = [];
    for (let r = 0; r < rows; r++) {
      const row = [];
      for (let c = 0; c < cols; c++) {
        const idx = r * cols + c;
        if (idx < N) row.push(idx);
      }
      if (row.length >= 2) out.push({ idx: row, len: row.length, kind: 'row' });
    }
    return out;
  }
  function getLines(N) {
    // Multiples of 3 → canonical hand-written table (rows + cols + diags)
    if (N % 3 === 0) return LINES_BY_N[N] || [];
    // Irregular grid → auto-gen horizontals + stored cols/diagonals
    const stored = LINES_BY_N[N] || [];
    const nonHoriz = stored.filter(l => l.kind !== 'row');
    return [...autoHorizontalLines(N), ...nonHoriz];
  }

  let spinning = false;
  let runEpoch = 0;   // bumped on prestige so in-flight spin-resolves can bail out

  // ===== NOTIFICATION BUFFER =====
  // Visual pops + win-sfx are queued, drained on a 90ms cadence by the rAF
  // ticker below — under heavy auto-spin (multiple wins per second) this
  // prevents the float-chip pop and audio from stacking into noise.
  const FX = {
    queue: [],         // [{ amount, isJackpot, sym, ts, readyAt }]
    cap: 12,           // hard cap to avoid runaway DOM
    nextDrain: 0,
    push(item)        { if (this.queue.length >= this.cap) this.queue.shift(); this.queue.push(item); },
    drain(now) {
      if (now < this.nextDrain) return;
      if (this.queue.length === 0) return;
      // Hold the front item until its readyAt timestamp — the math is already
      // applied at spin start, but the visual pop + win sfx should wait until
      // the reels have actually settled so the pop doesn't appear over a still-
      // spinning grid. Don't shift() until ready.
      if (now < this.queue[0].readyAt) return;
      const item = this.queue.shift();
      this.nextDrain = now + 90;
      spawnFloatPop(item);
      if (item.isJackpot) sfx.jackpot();
      else                sfx.win(item.amount);
    },
  };
  // ===== BACKGROUND-FRIENDLY GAMELOOP =====
  // Per chat: stardust must accumulate even when the tab is hidden.
  // Both rAF and main-thread setInterval are throttled to ~1Hz (or paused
  // entirely) when a tab is backgrounded. setInterval running INSIDE a
  // Web Worker is on a separate thread that's not subject to those
  // throttles, so we offload the auto-spin tick clock to one. Falls back
  // to plain setInterval if Workers are unavailable (CSP edge cases).
  // Returns a `{ stop() }` handle for cleanup, replacing the bare
  // setInterval id we used to clear with clearInterval.
  function startBackgroundTimer(callback, intervalMs) {
    try {
      const workerSrc = `
        let timer = null;
        self.onmessage = (e) => {
          if (e.data && e.data.type === 'start') {
            if (timer) clearInterval(timer);
            timer = setInterval(() => self.postMessage('tick'), e.data.interval);
          } else if (e.data && e.data.type === 'stop') {
            if (timer) { clearInterval(timer); timer = null; }
          }
        };
      `;
      const blob = new Blob([workerSrc], { type: 'application/javascript' });
      const url  = URL.createObjectURL(blob);
      const w    = new Worker(url);
      w.onmessage = () => callback();
      w.postMessage({ type: 'start', interval: intervalMs });
      return {
        kind: 'worker',
        stop: () => {
          try { w.postMessage({ type: 'stop' }); } catch (e) {}
          try { w.terminate(); } catch (e) {}
          try { URL.revokeObjectURL(url); } catch (e) {}
        },
      };
    } catch (e) {
      // Fallback: throttled setInterval (background slows but doesn't fully stop).
      const id = setInterval(callback, intervalMs);
      return { kind: 'interval', stop: () => clearInterval(id) };
    }
  }

  // rAF heartbeat — every visible frame, fxLoop stamps `lastRafTime`.
  // The worker auto-spin tick checks the staleness of this stamp to
  // detect "rAF is paused (tab hidden)" — needed so an in-flight reel
  // tween that can't complete (because rAF stopped) doesn't lock the
  // `spinning` flag and stall auto-spin forever.
  let lastRafTime = 0;
  function fxLoop(now) {
    lastRafTime = now;
    FX.drain(now);
    requestAnimationFrame(fxLoop);
  }
  requestAnimationFrame(fxLoop);

  // ===== BACKGROUND CATCH-UP SUMMARY =====
  // When the worker keeps auto-spinning while the tab is hidden, the FX
  // queue accumulates float-chip pops that would otherwise drain at one
  // every 90ms on resume — producing a long stale dribble of "+12c +8c
  // +24c +96c…" notifications for spins the player didn't watch. Per chat:
  // replace ALL of those queued pops with a single summary popup showing
  // total chips earned + spin count + duration away. Wallet state is
  // snapshotted on `visibilitychange → hidden` and the delta is computed
  // on resume.
  let bgSnapshot = null;
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) {
      bgSnapshot = {
        chips: state.totalChipsEver,
        spins: state.spins,
        t: performance.now(),
      };
    } else if (bgSnapshot) {
      const elapsed       = (performance.now() - bgSnapshot.t) / 1000;
      const chipsGained   = state.totalChipsEver - bgSnapshot.chips;
      const spinsGained   = state.spins          - bgSnapshot.spins;
      bgSnapshot = null;
      // Only summarize if the player was actually away long enough
      // for spins to happen. Brief tab-flips don't warrant a popup.
      if (elapsed > 1.0 && spinsGained > 0) {
        FX.queue.length = 0;       // suppress the queued individual pops
        showCatchupSummary(chipsGained, spinsGained, elapsed);
      }
    }
  });
  function formatElapsed(sec) {
    if (sec < 60)   return Math.floor(sec) + 's';
    if (sec < 3600) return Math.floor(sec / 60) + 'm';
    return (sec / 3600).toFixed(1) + 'h';
  }
  function showCatchupSummary(chips, spins, sec) {
    // remove any prior popup so a fast hide/show/hide/show doesn't stack
    const prior = document.querySelector('.catchup-popup');
    if (prior) prior.remove();
    const el = document.createElement('div');
    el.className = 'catchup-popup';
    el.innerHTML = ''
      + '<div class="catchup-title">while you were away</div>'
      + '<div class="catchup-amount">+' + fmt(Math.floor(chips)) + ' 💫 STARCHIPS</div>'
      + '<div class="catchup-stats">' + spins + ' spin' + (spins === 1 ? '' : 's') + ' · ' + formatElapsed(sec) + ' away</div>';
    document.body.appendChild(el);
    // tiny delay so the transition triggers from the initial 0.85 scale
    requestAnimationFrame(() => el.classList.add('show'));
    // ===== 10% FASTER DISMISSAL (per chat) =====
    // hold 3500→3150ms, fade-out 500→450ms (each cut 10%). Total visible
    // window is now ~3.6s instead of ~4s.
    const HOLD_MS = 3150;
    const FADE_MS = 450;
    let dismissed = false;
    const dismiss = () => {
      if (dismissed) return;
      dismissed = true;
      document.removeEventListener('click', docDismiss);
      clearTimeout(autoT);
      el.classList.remove('show');
      el.style.pointerEvents = 'none';
      setTimeout(() => el.remove(), FADE_MS);
    };
    const autoT = setTimeout(dismiss, HOLD_MS);
    // ===== CLICK-ANYWHERE-TO-DISMISS (per chat) =====
    // Listener on `document` so a click ANY where on the page dismisses
    // the popup — not just clicks on the popup itself. The popup click
    // bubbles to document so it still works on direct clicks; cursor
    // stays as the pointer hint over the popup. One-frame rAF delay
    // before registering avoids the click-to-refocus event (the click
    // that brought the tab back to focus) from instantly dismissing.
    el.style.pointerEvents = 'auto';
    el.style.cursor = 'pointer';
    const docDismiss = () => dismiss();
    requestAnimationFrame(() => {
      document.addEventListener('click', docDismiss, { once: true });
    });
    // play a single jackpot-tier chime instead of N individual win sfx
    sfx.jackpot();
  }

  function spinOnce() {
    if (spinning) return;
    spinning = true;
    const epoch = runEpoch;
    state.spins++;
    sfx.spin();
    const N = reelCount();
    const result = [];
    const luck = effectOf(UPGRADES.find(x => x.k === 'luck'));
    for (let i = 0; i < N; i++) result.push(pickSymbol(luck));
    // Snapshot reel DOM right now so an EXTRA-REEL buy mid-spin doesn't desync.
    const reelsAtSpin = reelEls.slice();

    // ===== STRICT PAYLINE-ONLY SCORING (per chat: no phantom wins) =====
    // Removed the legacy global `count² × val` formula that paid out for
    // ANY symbol frequency across the grid regardless of cell adjacency
    // (e.g. 3 nebulas on cells [0, 5, 8] used to pay even though they're
    // not on any line). Scoring now ONLY recognizes wins where identical
    // symbols sit on adjacent cells along an explicitly-defined payline
    // from `LINES_BY_N`. Diagonals are gated to the SQUARE board (N=9)
    // alone — non-square configurations get rows + cols only.
    //
    // Two reward tiers (no partial-line consolation — also a phantom):
    //   - FULL line match:   len² × val   (e.g. 3-in-a-row → 9 × val)
    //   - multi-line bonus:  × (1 + 0.25 × (lineCount − 1)) on the sum
    //                         so 2 lines = ×1.25, 4 lines = ×1.75, 8 lines = ×2.75
    // Jackpot bonus (every reel same symbol) replaces the line-bonus
    // formula with `N² × val × 5 × jackpotMult`.
    const counts = {};
    for (const s of result) counts[s.nm] = (counts[s.nm] || 0) + 1;
    let bestSym = null, bestCount = 0;
    for (const s of SYMBOLS) {
      const c = counts[s.nm] || 0;
      if (c > bestCount) { bestCount = c; bestSym = s; }
    }
    // ===== MULTI-PASS PAYLINE SCAN =====
    // Per chat: "perform a clean, independent pass on each payline,
    // ensuring symbols are reused for multiple wins". `evalLine` is a
    // PURE function — given the result array + a single line spec, it
    // returns a winner-or-null verdict without touching any outer
    // state. Each line is checked in isolation; symbols are shared
    // across all lines they appear in, so a single cell can drive
    // multiple wins simultaneously without dedupe.
    //
    // Three orchestration passes:
    //   PASS 1 — MATCH: call evalLine() on each of the (up to 8)
    //     canonical paylines. Each call is independent — no carry-over
    //     state, no early bailout based on prior results.
    //   PASS 2 — OVERLAP TALLY: cellHits[i] = count of winning lines
    //     touching cell i. Reused symbols inflate this count, which is
    //     the explicit "reuse" signal.
    //   PASS 3 — SCORE: sum len² × val across winning lines. Cells in
    //     multiple winners contribute to each line's bonus separately.
    //
    // evalLine is hoisted into a module-level helper:
    //   {
    //     idx:[...], len, kind,         (echoes the line spec)
    //     dominantSym,                  (the substitute-resolved symbol)
    //   }
    // or null if the line doesn't match. WILD-aware: wilds substitute
    // for the dominant non-wild on the line; pure-wild lines score at
    // the wild's own val; mixed non-wilds → no match.
    function evalLine(ln, result) {
      const symsOnLine = ln.idx.map(i => result[i]);
      const nonWilds = symsOnLine.filter(s => s.nm !== WILD_NM);
      let dominantSym;
      if (nonWilds.length === 0) {
        dominantSym = symsOnLine[0];          // pure-wild — score at wild val
      } else {
        dominantSym = nonWilds[0];
        for (let i = 1; i < nonWilds.length; i++) {
          if (nonWilds[i].nm !== dominantSym.nm) return null;   // mixed non-wilds
        }
      }
      return { idx: ln.idx, len: ln.len, kind: ln.kind, dominantSym };
    }

    const winningLines = [];
    const lines = getLines(N);

    // ----- PASS 1: independent per-line match -----
    for (const ln of lines) {
      const verdict = evalLine(ln, result);
      if (verdict) winningLines.push(verdict);
    }

    // ----- PASS 2: overlap tally (REUSE signal) -----
    // For each cell, how many winning lines include it. Reused symbols
    // (e.g., the center cell on a full-grid match in row 1 + col 1 +
    // both diagonals = 4 reuses) explicitly bump this count.
    const cellHits = new Array(result.length).fill(0);
    for (const w of winningLines) {
      for (const i of w.idx) cellHits[i]++;
    }
    let maxOverlap = 0;
    for (const c of cellHits) if (c > maxOverlap) maxOverlap = c;

    // ----- PASS 3: score -----
    // Each line counted independently. A cell on 4 winning lines
    // contributes its val to all 4 line bonuses (no dedupe — reuse is
    // the point).
    let fullLineBonus = 0;
    for (const w of winningLines) {
      fullLineBonus += w.len * w.len * w.dominantSym.val;
    }
    const lineCount = winningLines.length;
    const multiLineMult = lineCount > 1 ? (1 + 0.25 * (lineCount - 1)) : 1;

    // ===== INTERSECTING L-WINS — double payout when lines overlap =====
    // Per chat: "recognize when L-wins overlap for double payouts". An
    // L-win is 2+ winning lines that share at least one cell, forming
    // an L (row+col at a corner), T (row+col mid-edge), or + (row+col+
    // diagonal all crossing). On the 3×3 grid, MOST cross-direction
    // pairs (row+col, row+diag, col+diag) share a cell — so the bonus
    // fires whenever the player lands a non-parallel multi-line combo.
    // Parallel multi-line wins (2 rows, 2 cols) do NOT share cells →
    // they keep the standard ×1.25 / ×1.50 etc multi-line multiplier
    // without the doubling. Cap: hasIntersection is a single flag, not
    // per-pair count, so the doubling can only apply once even if 3+
    // lines all cross at the center cell.
    let hasIntersection = false;
    if (winningLines.length >= 2) {
      const cellSets = winningLines.map(ln => new Set(ln.idx));
      outer: for (let i = 0; i < cellSets.length; i++) {
        for (let j = i + 1; j < cellSets.length; j++) {
          for (const c of cellSets[i]) {
            if (cellSets[j].has(c)) { hasIntersection = true; break outer; }
          }
        }
      }
    }
    const lWinMult = hasIntersection ? 2.0 : 1.0;
    const totalLineMult = multiLineMult * lWinMult;

    // ===== COUNT BONUS — "X-OF-A-KIND" detection (wild-aware) =====
    // Wilds substitute for the BEST non-wild symbol when computing
    // the X-of-a-kind count: e.g., 4 planets + 2 wilds = effective
    // 6-of-a-planet (paying at planet.val). All-wild grids score at
    // the wild's own val. Wilds cannot stack onto MULTIPLE non-wild
    // symbols (each wild only "becomes" one other symbol — the best
    // substitution wins).
    const wildCount = counts[WILD_NM] || 0;
    let bestNonWildC = 0, bestNonWild = null;
    for (const s of SYMBOLS) {
      if (s.nm === WILD_NM) continue;
      const c = counts[s.nm] || 0;
      if (c > bestNonWildC) { bestNonWildC = c; bestNonWild = s; }
    }
    let countBonus = 0, kindCount = 0, kindSym = null;
    // Try non-wild + wild substitution first (this is the typical case)
    if (bestNonWild) {
      const eff = bestNonWildC + wildCount;
      if (eff >= 5) {
        countBonus = eff * eff * bestNonWild.val * 0.40;
        kindCount = eff;
        kindSym   = bestNonWild;
      }
    }
    // All-wild fallback — if there's no non-wild present (or wilds
    // alone score higher than any substitution), use the wild's own val.
    if (wildCount >= 5) {
      const wildSym = SYMBOLS.find(s => s.nm === WILD_NM);
      const wildBonus = wildCount * wildCount * wildSym.val * 0.40;
      if (wildBonus > countBonus) {
        countBonus = wildBonus;
        kindCount  = wildCount;
        kindSym    = wildSym;
      }
    }
    let payout = fullLineBonus * totalLineMult + countBonus;

    // ===== JACKPOT (wild-aware) =====
    // A jackpot fires when every cell on the grid is the same symbol —
    // OR when every cell is either the same non-wild symbol OR a wild.
    // Pure-wild grids score at the wild's val.
    let jackpotSym = null;
    const distinct = new Set(result.map(r => r.nm));
    if (distinct.size === 1) {
      jackpotSym = result[0];
    } else if (distinct.size === 2 && distinct.has(WILD_NM) && N >= 3) {
      // mixed of one non-wild + wild → counts as full match at non-wild val
      jackpotSym = result.find(r => r.nm !== WILD_NM);
    }
    const isFullMatch = jackpotSym !== null && N >= 3;
    if (isFullMatch) {
      const jp = effectOf(UPGRADES.find(x => x.k === 'jackpot'));
      payout = N * N * jackpotSym.val * 5 * jp;
    }
    payout = Math.floor(payout * multiplier());
    const isJackpot = isFullMatch;
    if (!bestSym && jackpotSym) bestSym = jackpotSym;   // ensure HUD shows the right emoji

    // Reel animation duration — every spin takes exactly this long visually
    // regardless of win/loss, so AUTO cadence stays constant. Each reel runs
    // for `BASE + i*STAGGER + SETTLE` ms; the last reel sets `longest` and the
    // FX buffer's `readyAt` syncs the float-pop popup to the moment it lands.
    const BASE_DUR = 700, STAGGER = 220, SETTLE = 120;
    const longest = BASE_DUR + (N - 1) * STAGGER + SETTLE;
    const now = performance.now();

    if (payout > 0) {
      // WALLET writes are instant (chips counter ticks up the moment you click).
      // The lastPayout / comboBadge readouts and the float-chip pop are
      // deferred to readyAt so they sync with reel-stop. Previously the
      // readouts updated mid-spin, which made losing spins feel like they
      // ended early ('—' appeared while reels were still moving).
      state.chips        += payout;
      state.runChips     += payout;
      state.totalChipsEver += payout;
      FX.push({ amount: payout, isJackpot, sym: bestSym, ts: now, readyAt: now + longest });
      save();
      buildUpgrades();
      renderHUD();
    }
    // (losses: no wallet change, no FX push — readout cleared in resolve below)

    // ===== VISUAL: rAF-driven reel animation =====
    // Each reel's tween is registered with the central ticker. Strip cells
    // are repainted inside startReelTween (result at LANDING_IDX, random
    // fillers elsewhere), and the ticker drives translateY 0 → endY where
    // endY = -LANDING_IDX × r.wrap.clientHeight (read from current layout).
    reelsAtSpin.forEach((r, i) => {
      const dur = BASE_DUR + i * STAGGER + SETTLE;
      startReelTween(r, result[i], now, dur, luck);
    });

    // ===== RESOLVE — fires from ticker when the last reel lands =====
    // Replacing the previous setTimeout(longest) race. The ticker only calls
    // this after every reel's translateY has reached endY, so readouts can
    // never appear ahead of (or behind) the visual stop.
    reelOnComplete = () => {
      if (epoch !== runEpoch) { spinning = false; return; }
      if (payout > 0) {
        document.getElementById('lastPayout').textContent = '+' + fmt(payout) + ' 💫 STARCHIPS';
        // Combo badge priority: JACKPOT (every reel same) > X-OF-A-KIND
        // (count ≥ 5) > none. The 5-of-a-kind path is the new tier; the
        // jackpot path keeps its existing precedence so the all-9-same
        // case still flashes the bigger label.
        let comboHTML = '';
        if (isJackpot) {
          comboHTML = `<span class="combo-badge">JACKPOT ${bestSym ? bestSym.em : ''}</span>`;
        } else if (kindCount >= 5 && kindSym) {
          comboHTML = `<span class="combo-badge">${kindCount} OF A KIND ${kindSym.em}</span>`;
        }
        document.getElementById('comboBadge').innerHTML = comboHTML;
        // Highlight every reel that's part of a winning line, draw the
        // colored polylines, show the WIN COUNT badge.
        const winCells = new Set();
        for (const ln of winningLines) for (const i of ln.idx) winCells.add(i);
        reelsAtSpin.forEach((r, i) => {
          if (winCells.has(i)) r.wrap.classList.add('win');
        });
        showWinningLines(winningLines, reelsAtSpin);
        showLineSummary(lineCount, totalLineMult, isJackpot, hasIntersection, maxOverlap);
      } else {
        document.getElementById('lastPayout').textContent = '—';
        document.getElementById('comboBadge').textContent = '';
        showWinningLines([], reelsAtSpin);
        showLineSummary(0, 1, false, false, 0);
      }
      spinning = false;
    };
    ensureReelTicker();
  }

  // Visual-only float-chip pop. Wallet + readouts are already updated in
  // spinOnce; this fn is invoked from the FX buffer so spam-spinning doesn't
  // overflow the DOM. Old `award()` (which mixed wallet write + readouts +
  // visual + sfx) is gone — those concerns are split across spinOnce's
  // immediate-payout block and the FX buffer.
  function spawnFloatPop({ amount, isJackpot }) {
    const f = document.createElement('div');
    f.className = 'float-chip' + (isJackpot ? ' jackpot' : '');
    f.innerHTML = (isJackpot ? '🎰 +' : '+') + fmtRich(amount);
    f.style.left = Math.max(8, 40 + Math.random() * Math.max(0, reelDeck.clientWidth - 80)) + 'px';
    f.style.bottom = '50%';
    reelDeck.appendChild(f);
    setTimeout(() => f.remove(), 1300);
  }

  // ===== AUTO-SPIN =====
  // Per inisso's spec: the auto-spin runs as a setInterval loop (not a chained
  // setTimeout). The interval fires every 100ms and checks "is enough time
  // since the last spin elapsed under the current SPEED upgrade?". This
  // pattern keeps a single live interval and still adapts to speed upgrades
  // bought mid-run because the interval body re-reads effectOf(speed) each tick.
  let autoTimer = null;        // { kind, stop() } from startBackgroundTimer
  let nextSpinAt = 0;
  function setupAuto() {
    if (autoTimer) { autoTimer.stop(); autoTimer = null; }
    if (!state.autoOn) return;
    if (!effectOf(UPGRADES.find(x => x.k === 'auto'))) return;
    nextSpinAt = performance.now() + 200;
    autoTimer = startBackgroundTimer(() => {
      if (!state.autoOn) {
        if (autoTimer) { autoTimer.stop(); autoTimer = null; }
        return;
      }
      const now = performance.now();
      // ===== STALL DETECTION (rAF paused while spinning) =====
      // When the tab is backgrounded, rAF pauses → reel tween ticker
      // halts → reelOnComplete never fires → spinning stays true →
      // every subsequent worker tick is gated by `!spinning` and no
      // new spins fire. To keep auto-spin (and thus chip/stardust
      // accumulation) running, we detect rAF staleness via lastRafTime
      // and force-resolve the in-flight spin: invoke its resolve
      // callback (HUD readouts + win-glow) and clear the tween array.
      // Player gets full credit for the spin's payout even though the
      // reel animation can't render — math was applied at click time.
      if (spinning && lastRafTime > 0 && now - lastRafTime > 200) {
        // ===== SNAP STRIPS TO LANDING POSITION BEFORE FORCE-RESOLVE =====
        // BUG FIX (chat: "lines on mismatched symbols at 50% spin speed"):
        // Without this snap, force-resolve cleared reelAnims and fired
        // the resolve callback while strips were still at translateY(0).
        // When the tab regained focus the visible cell in each reel was
        // cell-0 (a random filler from pickSymbol), NOT cell LANDING_IDX
        // (the computed result), so the colored win lines drawn by the
        // resolve callback connected reels showing fillers that didn't
        // match. Writing endY here guarantees the wrap window shows the
        // landing symbol so the lines are always over matching cells.
        for (const a of reelAnims) {
          try { a.r.strip.style.transition = 'none'; } catch (e) {}
          try { a.r.strip.style.transform  = 'translateY(' + a.endY + 'px)'; } catch (e) {}
        }
        const cb = reelOnComplete;
        reelOnComplete = null;
        reelAnims.length = 0;
        try { cb && cb(); } catch (e) {}
        spinning = false;        // hard-clear in case the callback couldn't
      }
      if (now >= nextSpinAt && !spinning) {
        spinOnce();
        const dt = effectOf(UPGRADES.find(x => x.k === 'speed')) * 1000;
        nextSpinAt = now + dt;
      }
    }, 100);
  }

  // ===== CONTROLS =====
  document.getElementById('spinBtn').addEventListener('click', () => spinOnce());
  document.getElementById('autoBtn').addEventListener('click', () => {
    if (!effectOf(UPGRADES.find(x => x.k === 'auto'))) { toast('buy AUTO-SPIN upgrade first'); return; }
    state.autoOn = !state.autoOn;
    save();
    renderHUD();
    setupAuto();
    toast('AUTO ' + (state.autoOn ? 'ON' : 'OFF'));
  });
  document.getElementById('prestigeBtn').addEventListener('click', () => {
    const gain = prestigeGain();
    if (gain <= 0) return;
    if (!confirm(`Cash Out: gain +${gain} 🌟 stardust (each = +50% permanent payout). Resets your 💫 STARCHIPS balance + STARCHIPS-tab upgrades. Stardust meta upgrades persist.`)) return;
    // gain = min(2^HighRollerLevel, log2(overshoot)+1). Per chat: HIGH ROLLER only raises the cap now — no longer compounds the per-🌟 slope.
    runEpoch++;     // invalidate any in-flight spin-resolve closures
    state.stardust       += gain;
    state.stardustEarned += gain;     // lifetime — drives multiplier, never decreases
    state.rerolls        += 1;
    // AFTER-IMAGE keeps N PAYOUT levels through the reset (capped at current lvl)
    const keepMulti = Math.min(state.upgrades.multi.lvl, effectOf(UPGRADES.find(x => x.k === 'afterImage')));
    state.chips    = 0;
    state.runChips = 0;
    // Reset only chip-purchased upgrades; stardust meta upgrades persist
    for (const u of UPGRADES) {
      if (u.currency === 'chips' && state.upgrades[u.k]) state.upgrades[u.k].lvl = 0;
    }
    state.upgrades.multi.lvl = keepMulti;
    state.autoOn = false;
    spinning = false;
    // (reelAnims + reelOnComplete cleanup moved into buildReels itself,
    // so all rebuild paths — buy / prestige / init — share one cleanup.)
    if (autoTimer) { autoTimer.stop(); autoTimer = null; }
    sfx.prestige();
    toast(`🌟 cashed out · +${gain} stardust!`);
    save();
    buildReels();
    buildUpgrades();
    renderHUD();
  });

  let toastT;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastT);
    toastT = setTimeout(() => el.classList.remove('show'), 1800);
  }

  // ===== KEYBOARD =====
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === ' ') { e.preventDefault(); if (!state.autoOn) spinOnce(); }
    if (e.key === 'a' || e.key === 'A') document.getElementById('autoBtn').click();
  });

  // ===== HUD TICK =====
  setInterval(() => renderHUD(), 250);

  // ===== BOOT =====
  buildReels();
  buildUpgradeTabs();
  buildUpgrades();
  renderHUD();
  if (state.autoOn) setupAuto();
})();
</script>
</body>
</html>
