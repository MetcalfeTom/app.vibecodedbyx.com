<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bee Smiles</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%90%9D">
<meta name="description" content="A pastel sky of floating bees in tiny top hats and monocles. Click one and it grins at you.">
<meta property="og:title" content="Bee Smiles · pocket full of pleased bees">
<meta property="og:description" content="Distinguished bees in top hats and monocles drift across a pastel sky. Click any to make it smile. Make as many bees smile as you like.">
<meta property="og:url" content="https://sloppy.live/bee-smiles">
<meta property="og:image" content="https://image.pollinations.ai/prompt/a%20charming%20yellow%20cartoon%20bee%20wearing%20a%20tiny%20black%20top%20hat%20and%20a%20gold%20monocle%20smiling%20on%20a%20pastel%20sky%20blue%20background%20with%20fluffy%20white%20clouds%20childrens%20book%20illustration%20style?width=1200&height=630&model=flux&nologo=true&enhance=true&seed=8989">
<style>
  :root{
    --sky-1: #c2e6fa;
    --sky-2: #8ec9ee;
    --honey: #ffd442;
    --honey-dark: #2a1a08;
  }
  *{ box-sizing:border-box; margin:0; padding:0; }
  html, body{
    height:100%;
    background: linear-gradient(180deg, var(--sky-1) 0%, var(--sky-2) 60%, #b8d8e8 100%);
    color:#2a1a08;
    font-family: 'Fredoka', 'Nunito', system-ui, sans-serif;
    overflow:hidden;
    user-select:none;
    -webkit-user-select:none;
    -webkit-tap-highlight-color: transparent;
  }
  /* fluffy clouds drifting */
  .clouds{
    position: fixed; inset: 0;
    z-index: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .cloud{
    position: absolute;
    background: radial-gradient(ellipse at center, rgba(255,255,255,0.95) 0%, rgba(255,255,255,0.0) 70%);
    border-radius: 50%;
    opacity: 0.85;
    animation: drift linear infinite;
  }
  @keyframes drift{
    from { transform: translateX(-20vw); }
    to   { transform: translateX(120vw); }
  }
  /* grass + flowers at the bottom */
  .ground{
    position: fixed;
    left: 0; right: 0; bottom: 0;
    height: 110px;
    z-index: 1;
    pointer-events: none;
    background:
      radial-gradient(ellipse 200% 70% at 50% 100%, #6cbf3c 0%, #5aaa30 60%, #4a9028 100%);
  }
  .ground::before, .ground::after{
    content:'';
    position: absolute;
    top: -8px; left: 0; right: 0;
    height: 12px;
    background-image:
      radial-gradient(circle 6px at 20px 6px, #6cbf3c 60%, transparent 65%),
      radial-gradient(circle 5px at 60px 8px, #5fb030 60%, transparent 65%),
      radial-gradient(circle 7px at 110px 5px, #6cbf3c 60%, transparent 65%),
      radial-gradient(circle 5px at 160px 9px, #5fb030 60%, transparent 65%);
    background-repeat: repeat-x;
    background-size: 200px 12px;
  }
  .flower{
    position: absolute;
    bottom: 80px;
    width: 28px; height: 60px;
    pointer-events: none;
  }
  .flower .stem{
    position: absolute;
    bottom: 0; left: 50%;
    width: 3px; height: 100%;
    background: #3a7a20;
    transform: translateX(-50%);
  }
  .flower .petals{
    position: absolute;
    top: 0; left: 50%;
    width: 22px; height: 22px;
    transform: translateX(-50%);
    border-radius: 50%;
    background: var(--c, #ff90a8);
    box-shadow:
      0 -10px 0 -3px var(--c),
      0 10px 0 -3px var(--c),
      -10px 0 0 -3px var(--c),
      10px 0 0 -3px var(--c);
  }
  .flower .core{
    position: absolute;
    top: 6px; left: 50%;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #ffe240;
    transform: translateX(-50%);
    box-shadow: inset -1px -1px 0 #c89020;
  }

  /* the sky container holds all the bees */
  .sky{
    position: fixed; inset: 0;
    z-index: 5;
  }

  /* bee element */
  .bee{
    position: absolute;
    width: 92px; height: 64px;
    top: 0; left: 0;
    cursor: pointer;
    will-change: transform;
    transition: filter 0.18s;
    /* drop shadow so they pop against the sky */
    filter: drop-shadow(0 4px 6px rgba(40, 30, 20, 0.20));
  }
  .bee:hover{ filter: drop-shadow(0 6px 10px rgba(255, 200, 60, 0.45)); }
  .bee.smiling{
    filter: drop-shadow(0 4px 12px rgba(255, 200, 60, 0.6));
  }
  /* default mouth swap based on smiling state */
  .bee .mouth-smile { display: none; }
  .bee.smiling .mouth-smile { display: block; }
  .bee.smiling .mouth-neutral { display: none; }
  /* wing flutter */
  .wing{
    transform-origin: 24px 18px;
    animation: flutter 0.10s linear infinite alternate;
  }
  .wing.wing-back{
    animation-delay: 0.04s;
  }
  @keyframes flutter{
    0%   { transform: scale(1, 1); }
    100% { transform: scale(1, 0.32); }
  }
  /* gentle bee bob (the body itself wiggles slightly when smiling) */
  .bee.smiling .bee-body{
    animation: wiggle 0.42s ease-in-out;
  }
  @keyframes wiggle{
    0%, 100% { transform: rotate(0deg); }
    25%      { transform: rotate(-6deg); }
    75%      { transform: rotate( 6deg); }
  }

  /* sparkle particles spawned on click */
  .sparkle{
    position: fixed;
    z-index: 30;
    font-size: 22px;
    pointer-events: none;
    transform: translate(-50%, -50%);
    animation: sparkleFly 1.3s ease-out forwards;
    will-change: transform, opacity;
  }
  @keyframes sparkleFly{
    0%   { transform: translate(-50%, -50%) scale(0.4); opacity: 0; }
    20%  { transform: translate(calc(-50% + var(--dx) * 0.25), calc(-50% + var(--dy) * 0.25)) scale(1.15); opacity: 1; }
    100% { transform: translate(calc(-50% + var(--dx)),       calc(-50% + var(--dy)))       scale(0.7); opacity: 0; }
  }

  /* HUD */
  .hud{
    position: fixed;
    top: 14px; right: 14px;
    z-index: 20;
    display: flex;
    flex-direction: column;
    gap: 8px;
    align-items: flex-end;
  }
  .smile-pill{
    background: #fff;
    border: 2px solid #ffd442;
    border-radius: 999px;
    padding: 8px 18px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 18px;
    color: #2a1a08;
    box-shadow: 0 4px 10px rgba(0,0,0,0.18);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .smile-pill .num{
    font-variant-numeric: tabular-nums;
    color: #c89020;
    min-width: 32px;
    text-align: right;
  }

  .controls{
    position: fixed;
    bottom: 22px; left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    display: flex;
    gap: 10px;
    align-items: center;
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: 999px;
    padding: 8px 16px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.18);
    border: 2px solid #ffd442;
  }
  .controls button{
    background: linear-gradient(180deg, #ffe080 0%, #ffd040 100%);
    border: 2px solid #c89020;
    color: #2a1a08;
    padding: 6px 14px;
    border-radius: 999px;
    font-family: 'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    transition: transform 0.10s, box-shadow 0.18s;
    box-shadow: 0 3px 0 #c89020;
  }
  .controls button:hover{ transform: translateY(-1px); box-shadow: 0 4px 0 #c89020; }
  .controls button:active{ transform: translateY(2px); box-shadow: 0 1px 0 #c89020; }
  .controls button.secondary{
    background: linear-gradient(180deg, #fff 0%, #f0f0f0 100%);
    border-color: #aaa;
    box-shadow: 0 3px 0 #aaa;
    color: #555;
  }
  .controls button.secondary:hover, .controls button.secondary:active{
    box-shadow: 0 4px 0 #aaa;
  }

  /* hint at top-left */
  .hint{
    position: fixed;
    top: 14px; left: 14px;
    z-index: 20;
    background: rgba(255,255,255,0.78);
    border-radius: 999px;
    padding: 6px 14px;
    font-family: 'Fredoka', sans-serif;
    font-size: 13px;
    color: #2a1a08;
    border: 2px solid rgba(255, 212, 66, 0.6);
    backdrop-filter: blur(6px);
  }
  .hint .em{ color: #c89020; font-weight: 600; }

  @media (max-width: 600px){
    .smile-pill{ font-size: 14px; padding: 6px 12px; }
    .controls{ flex-wrap: wrap; justify-content: center; }
    .controls button{ font-size: 11px; padding: 5px 10px; }
    .hint{ font-size: 11px; padding: 5px 10px; }
    .bee{ width: 76px; height: 54px; }
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>

<div class="clouds" id="clouds"></div>
<div class="ground"></div>

<div class="sky" id="sky"></div>

<div class="hint">click a bee to make it <span class="em">smile</span> · they wear top hats &amp; monocles</div>
<div class="hud">
  <div class="smile-pill">😊 <span class="num" id="smile-count">0</span></div>
</div>
<div class="controls">
  <button id="btn-add">+ More bees</button>
  <button id="btn-all-smile">😊 Smile, all of you</button>
  <button class="secondary" id="btn-mute">🔊</button>
</div>

<!-- bee SVG template (cloned per spawn) -->
<template id="bee-template">
  <svg viewBox="0 0 92 64" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <!-- antennae -->
    <g class="antennae">
      <path d="M22 18 Q18 8 16 4" stroke="#2a1a08" stroke-width="2" fill="none" stroke-linecap="round"/>
      <circle cx="16" cy="4" r="2.2" fill="#2a1a08"/>
      <path d="M30 18 Q32 10 36 6" stroke="#2a1a08" stroke-width="2" fill="none" stroke-linecap="round"/>
      <circle cx="36" cy="6" r="2.2" fill="#2a1a08"/>
    </g>
    <!-- back wing (slightly behind body) -->
    <ellipse class="wing wing-back" cx="40" cy="20" rx="17" ry="11"
             fill="rgba(220,235,250,0.55)" stroke="rgba(180,210,240,0.7)" stroke-width="0.8"/>
    <!-- body container (everything that should wiggle on smile) -->
    <g class="bee-body" style="transform-origin: 46px 40px;">
      <!-- main body oval (yellow) -->
      <ellipse cx="56" cy="40" rx="28" ry="18" fill="#ffd442" stroke="#3a2008" stroke-width="2.5"/>
      <!-- black stripes — drawn as ellipses across the body -->
      <ellipse cx="50" cy="40" rx="3" ry="16" fill="#2a1a08"/>
      <ellipse cx="60" cy="40" rx="3" ry="16" fill="#2a1a08"/>
      <ellipse cx="70" cy="40" rx="3" ry="14" fill="#2a1a08"/>
      <!-- stinger -->
      <polygon points="83,40 92,38 92,42" fill="#2a1a08"/>
      <!-- head (smaller circle to the left) -->
      <circle cx="26" cy="34" r="15" fill="#ffd442" stroke="#3a2008" stroke-width="2.5"/>
      <!-- TINY TOP HAT — sits on top of head -->
      <g class="top-hat">
        <!-- brim -->
        <ellipse cx="24" cy="19" rx="13" ry="2.5" fill="#1a1208"/>
        <!-- crown -->
        <rect x="17" y="6" width="14" height="14" rx="1.5" fill="#1a1208"/>
        <!-- hat band -->
        <rect x="17" y="16" width="14" height="2.5" fill="#c34a32"/>
        <!-- top sheen -->
        <ellipse cx="24" cy="7" rx="6" ry="1.2" fill="rgba(255,255,255,0.20)"/>
      </g>
      <!-- face -->
      <g class="face">
        <!-- eyes -->
        <circle cx="20" cy="32" r="2.3" fill="#1a1a1a"/>
        <circle cx="30" cy="32" r="2.3" fill="#1a1a1a"/>
        <!-- eye shines -->
        <circle cx="19.4" cy="31.3" r="0.7" fill="#fff"/>
        <circle cx="29.4" cy="31.3" r="0.7" fill="#fff"/>
        <!-- MONOCLE on the right eye -->
        <g class="monocle">
          <circle cx="30" cy="32" r="5" fill="none" stroke="#c89020" stroke-width="1.4"/>
          <circle cx="30" cy="32" r="5" fill="rgba(255,255,255,0.10)"/>
          <!-- glint -->
          <path d="M27 30 Q28 28 30 29" stroke="rgba(255,255,255,0.6)" stroke-width="0.9" fill="none"/>
          <!-- chain looping down + right -->
          <path d="M34 34 Q38 38 40 44" stroke="#c89020" stroke-width="1" fill="none" stroke-dasharray="1.2 1"/>
        </g>
        <!-- blush cheeks -->
        <ellipse cx="16" cy="38" rx="2.6" ry="1.6" fill="#ff8090" opacity="0.65"/>
        <ellipse cx="36" cy="38" rx="2.6" ry="1.6" fill="#ff8090" opacity="0.65"/>
        <!-- mouth: neutral -->
        <line class="mouth-neutral" x1="22" y1="40" x2="30" y2="40"
              stroke="#2a1a08" stroke-width="1.8" stroke-linecap="round"/>
        <!-- mouth: smile (shown when .smiling) -->
        <path class="mouth-smile" d="M20 38 Q26 45 32 38"
              stroke="#2a1a08" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      </g>
    </g>
    <!-- front wing (above body, fluttering) -->
    <ellipse class="wing wing-front" cx="50" cy="20" rx="22" ry="10"
             fill="rgba(225,240,255,0.72)" stroke="rgba(255,255,255,0.85)" stroke-width="0.8"/>
  </svg>
</template>

<script>
/* =================================================================
   Bee Smiles — pastel sky of floating bees with top hats and
   monocles. Click any bee to make it grin. Each grin counts.
   ================================================================= */

/* ── audio (synth) ───────────────────────── */
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
let muted = false;
function tone(freq, dur=0.10, type='sine', vol=0.06, delay=0){
  if (muted) return;
  const t0 = audioCtx.currentTime + delay;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.frequency.setValueAtTime(freq, t0);
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(vol, t0 + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t0); o.stop(t0 + dur + 0.02);
}
function sndHappy(){
  // 3-note bright arpeggio
  tone(660, 0.10, 'triangle', 0.07, 0.00);
  tone(880, 0.10, 'triangle', 0.07, 0.06);
  tone(1175, 0.16, 'sine',    0.08, 0.12);
}
function sndBuzz(){
  // brief sawtooth buzz with vibrato
  if (muted) return;
  const t0 = audioCtx.currentTime;
  const o = audioCtx.createOscillator();
  const lfo = audioCtx.createOscillator();
  const lfoGain = audioCtx.createGain();
  const g = audioCtx.createGain();
  o.type = 'sawtooth';
  o.frequency.setValueAtTime(160, t0);
  lfo.type = 'sine';
  lfo.frequency.value = 22;
  lfoGain.gain.value = 18;
  lfo.connect(lfoGain); lfoGain.connect(o.frequency);
  g.gain.setValueAtTime(0, t0);
  g.gain.linearRampToValueAtTime(0.05, t0 + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.20);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(t0); lfo.start(t0);
  o.stop(t0 + 0.22); lfo.stop(t0 + 0.22);
}
window.addEventListener('pointerdown', () => {
  if (audioCtx.state === 'suspended') audioCtx.resume();
}, { once: true });

/* ── clouds (decorative, drifting) ───────── */
const cloudsEl = document.getElementById('clouds');
function spawnCloud(){
  const c = document.createElement('div');
  c.className = 'cloud';
  const w = 140 + Math.random() * 220;
  const h = w * (0.32 + Math.random() * 0.18);
  c.style.width = w + 'px';
  c.style.height = h + 'px';
  c.style.top = (Math.random() * 60) + '%';
  c.style.animationDuration = (40 + Math.random() * 80) + 's';
  c.style.animationDelay = (-Math.random() * 80) + 's';
  c.style.opacity = (0.55 + Math.random() * 0.35).toFixed(2);
  cloudsEl.appendChild(c);
}
for (let i = 0; i < 7; i++) spawnCloud();

/* ── flowers on the ground ──────────────── */
const FLOWER_COLORS = ['#ff90a8', '#ff7770', '#c060ff', '#ffd040', '#ff60d0', '#80c0ff'];
function spawnFlower(x){
  const f = document.createElement('div');
  f.className = 'flower';
  f.style.left = x + 'px';
  f.style.setProperty('--c', FLOWER_COLORS[Math.floor(Math.random() * FLOWER_COLORS.length)]);
  f.innerHTML = '<div class="stem"></div><div class="petals"></div><div class="core"></div>';
  document.body.appendChild(f);
}
function seedFlowers(){
  const n = Math.floor(window.innerWidth / 130);
  for (let i = 0; i < n; i++){
    spawnFlower(40 + (i + Math.random() * 0.4) * (window.innerWidth - 80) / n);
  }
}
seedFlowers();

/* ── bees ────────────────────────────────── */
const sky = document.getElementById('sky');
const tmpl = document.getElementById('bee-template');
const bees = [];
let smileCount = 0;

function spawnBee(opts={}){
  const wrap = document.createElement('div');
  wrap.className = 'bee';
  wrap.appendChild(tmpl.content.cloneNode(true));
  sky.appendChild(wrap);
  // pick a hat colour band + monocle frame variant for variety
  const hatBand = wrap.querySelector('.top-hat rect[fill="#c34a32"]');
  if (hatBand){
    const bands = ['#c34a32', '#3a6ea8', '#6a3a8a', '#207050', '#a04a18', '#1a1208'];
    hatBand.setAttribute('fill', bands[Math.floor(Math.random() * bands.length)]);
  }
  const bee = {
    el: wrap,
    baseX: opts.x ?? (60 + Math.random() * (window.innerWidth - 200)),
    baseY: opts.y ?? (80 + Math.random() * (window.innerHeight - 280)),
    freq: 0.25 + Math.random() * 0.55,
    phase: Math.random() * Math.PI * 2,
    ampX: 60 + Math.random() * 120,
    ampY: 22 + Math.random() * 50,
    rotAmp: 8 + Math.random() * 10,
    smileUntil: 0,
  };
  bees.push(bee);
  wrap.addEventListener('pointerdown', (e) => onBeeClick(bee, e));
  // initial position
  wrap.style.transform = `translate(${bee.baseX}px, ${bee.baseY}px)`;
  return bee;
}

function onBeeClick(bee, e){
  bee.smileUntil = performance.now() + 3200;
  bee.el.classList.remove('smiling'); // restart wiggle if already smiling
  // force reflow before re-adding the class so the wiggle animation re-runs
  void bee.el.offsetWidth;
  bee.el.classList.add('smiling');
  smileCount++;
  updateSmileCount();
  // sparkle burst at the cursor
  sparkleAt(e.clientX || e.touches?.[0]?.clientX || 0,
            e.clientY || e.touches?.[0]?.clientY || 0);
  sndHappy();
}

function updateSmileCount(){
  document.getElementById('smile-count').textContent = smileCount.toLocaleString();
}

/* ── sparkles ───────────────────────────── */
const SPARKLE_GLYPHS = ['✨','♥','💛','🌼','😊','🍯'];
function sparkleAt(x, y){
  for (let i = 0; i < 6; i++){
    const s = document.createElement('div');
    s.className = 'sparkle';
    s.textContent = SPARKLE_GLYPHS[Math.floor(Math.random() * SPARKLE_GLYPHS.length)];
    s.style.left = x + 'px';
    s.style.top = y + 'px';
    const angle = (Math.random() * Math.PI * 1.4) - Math.PI * 1.2; // upward-ish
    const dist = 60 + Math.random() * 50;
    s.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    s.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1300);
  }
}

/* ── floating-animation loop ──────────── */
function loop(now){
  const t = now / 1000;
  for (const bee of bees){
    const x = bee.baseX + Math.sin(t * bee.freq + bee.phase) * bee.ampX;
    const y = bee.baseY + Math.cos(t * bee.freq * 1.3 + bee.phase) * bee.ampY;
    const rot = Math.sin(t * bee.freq + bee.phase) * bee.rotAmp;
    bee.el.style.transform = `translate(${x}px, ${y}px) rotate(${rot}deg)`;
    if (bee.smileUntil && now > bee.smileUntil){
      bee.el.classList.remove('smiling');
      bee.smileUntil = 0;
    }
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

/* ── controls ─────────────────────────── */
document.getElementById('btn-add').addEventListener('click', () => {
  for (let i = 0; i < 3; i++) spawnBee();
  sndBuzz();
});
document.getElementById('btn-all-smile').addEventListener('click', () => {
  let i = 0;
  for (const bee of bees){
    setTimeout(() => {
      bee.el.classList.remove('smiling');
      void bee.el.offsetWidth;
      bee.el.classList.add('smiling');
      bee.smileUntil = performance.now() + 3500;
      const r = bee.el.getBoundingClientRect();
      sparkleAt(r.left + r.width/2, r.top + r.height/2);
    }, i * 60);
    i++;
  }
  smileCount += bees.length;
  updateSmileCount();
  // happy cascade — chime per bee
  for (let k = 0; k < Math.min(bees.length, 8); k++){
    setTimeout(() => sndHappy(), k * 80);
  }
});
const muteBtn = document.getElementById('btn-mute');
muteBtn.addEventListener('click', () => {
  muted = !muted;
  muteBtn.textContent = muted ? '🔇' : '🔊';
});

/* ── seed initial bees ────────────────── */
const INITIAL_BEES = Math.min(8, Math.max(4, Math.floor(window.innerWidth / 220)));
for (let i = 0; i < INITIAL_BEES; i++){
  setTimeout(() => spawnBee(), i * 120);
}

/* a bee that drifts in from off-screen if you click empty sky (just for delight) */
document.addEventListener('pointerdown', (e) => {
  if (e.target.closest('.bee')) return;          // already on a bee
  if (e.target.closest('.controls')) return;     // not from UI
  if (e.target.closest('.hud')) return;
  if (e.target.closest('.hint')) return;
  if (bees.length >= 30) return;                 // cap
  spawnBee({ x: e.clientX - 40, y: e.clientY - 30 });
  sndBuzz();
});
</script>
