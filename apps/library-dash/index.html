<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Library Dash — Return the Books!</title>
<link rel="icon" href="https://emojicdn.elk.sh/📚">
<meta property="og:title" content="Library Dash">
<meta property="og:description" content="Return overdue books to the shelves while dodging an angry librarian. Shh!">
<meta property="og:url" content="https://sloppy.live/library-dash">
<meta property="og:image" content="https://sloppy.live/library-dash/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Special+Elite&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1510;overflow:hidden;width:100vw;height:100vh;
  display:flex;align-items:center;justify-content:center;user-select:none}
#game-wrap{position:relative;width:min(900px,100vw);height:min(640px,100vh);background:#0e0c08}
canvas{display:block;width:100%;height:100%}
#ui{position:absolute;top:8px;left:12px;right:12px;display:flex;justify-content:space-between;
  align-items:flex-start;pointer-events:none;z-index:5}
#ui .stat{font-family:'Special Elite',monospace;font-size:14px;color:#c8b890;
  text-shadow:1px 1px 0 #000;letter-spacing:1px}
#ui .stat .val{color:#f0d870;font-weight:700}
#msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Libre Baskerville',serif;font-size:28px;font-weight:700;
  color:#f0d870;text-shadow:2px 2px 0 #000,0 0 20px rgba(240,216,112,0.3);
  text-align:center;pointer-events:none;z-index:10;display:none;line-height:1.4}
#start-screen{position:absolute;inset:0;background:rgba(14,12,8,0.95);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:20;cursor:pointer}
#start-screen h1{font-family:'Libre Baskerville',serif;font-size:clamp(22px,4vw,36px);
  font-weight:700;color:#f0d870;text-shadow:2px 2px 0 #3a2a10;margin-bottom:4px}
#start-screen .sub{font-family:'Special Elite',monospace;color:#8a7a60;font-size:16px;margin-top:8px}
#start-screen .hint{font-family:'Special Elite',monospace;color:#5a4a30;font-size:13px;
  margin-top:20px;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{50%{opacity:0.5}}
#mobile-controls{position:absolute;bottom:10px;left:0;right:0;display:none;
  justify-content:center;gap:6px;z-index:15;padding:0 10px}
#mobile-controls button{width:60px;height:60px;border-radius:50%;font-size:24px;
  background:rgba(30,25,15,0.7);border:2px solid rgba(200,184,144,0.2);color:#c8b890;
  cursor:pointer;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
@media(pointer:coarse){#mobile-controls{display:flex}}
.back-link{position:absolute;bottom:4px;right:8px;z-index:15}
.back-link a{color:#2a2218;font-size:9px;text-decoration:none;font-family:'Special Elite',monospace}
.back-link a:hover{color:#8a7a60}
</style>
</head>
<body>
<div id="game-wrap">
  <canvas id="c"></canvas>
  <div id="ui">
    <div class="stat">📚 Books: <span class="val" id="books-left">0</span></div>
    <div class="stat">⭐ Score: <span class="val" id="score">0</span></div>
    <div class="stat">❤️ Lives: <span class="val" id="lives">3</span></div>
    <div class="stat">🏛️ Level: <span class="val" id="level">1</span></div>
  </div>
  <div id="msg"></div>
  <div id="start-screen">
    <h1>📚 LIBRARY DASH</h1>
    <div class="sub">Return the overdue books. Dodge the librarian.</div>
    <div class="sub" style="font-size:12px;color:#6a5a40;margin-top:4px">SHH! No running in the library!</div>
    <div class="hint">Click or tap to start</div>
  </div>
  <div id="mobile-controls">
    <button id="m-left">←</button>
    <button id="m-up">↑</button>
    <button id="m-down">↓</button>
    <button id="m-right">→</button>
  </div>
  <div class="back-link"><a href="https://sloppy.live">← sloppy.live</a></div>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const GW = 900, GH = 640;
canvas.width = GW; canvas.height = GH;

// === GAME STATE ===
let gameState = 'title'; // title, playing, caught, levelup, gameover
let score = 0;
let lives = 3;
let level = 1;
let stateTimer = 0;
let shakeTimer = 0;
let comboTimer = 0;
let combo = 0;

// === COLORS ===
const WOOD_DARK = '#3a2a18';
const WOOD_MED = '#5a4430';
const WOOD_LIGHT = '#7a6448';
const CARPET = '#4a2028';
const CARPET2 = '#3a1820';
const WALL = '#d8c8a0';
const WALL2 = '#c8b890';

// Book colors
const BOOK_COLORS = [
  '#cc3333','#3366cc','#339944','#cc8833','#8833aa',
  '#cc3388','#3388aa','#aa6633','#446644','#884444',
  '#2255aa','#aa3355','#558833','#775522','#334488',
];

// === MAP ===
// Grid-based: 0=floor, 1=shelf, 2=desk, 3=dropoff
const TILE = 48;
const COLS = Math.floor(GW/TILE); // 18
const ROWS = Math.floor((GH-40)/TILE); // 12 (leave space for UI + controls)

let grid = [];
let shelves = []; // {gx, gy, books: [{color, returned}]}
let dropoffs = []; // {gx, gy}
let books = []; // books player must return {gx, gy, color, shelfIdx, returned}

// Player
const player = {
  x: 0, y: 0, gx: 1, gy: 1, speed: 3.5,
  dir: 0, // 0=right,1=down,2=left,3=up
  frame: 0, carrying: null, invincible: 0,
};

// Librarian
const librarians = [];

class Librarian {
  constructor(gx, gy, patrol){
    this.x = gx * TILE + TILE/2;
    this.y = gy * TILE + TILE/2 + 20;
    this.gx = gx; this.gy = gy;
    this.speed = 1.2 + level * 0.25;
    this.dir = 0;
    this.frame = 0;
    this.patrol = patrol; // array of {gx,gy} waypoints
    this.patrolIdx = 0;
    this.alertTimer = 0;
    this.chasing = false;
    this.sightRange = 140 + level * 15;
    this.chaseSpeed = 2.0 + level * 0.2;
  }
  update(dt){
    this.frame += dt * 4;
    const px = player.x, py = player.y;
    const dx = px - this.x, dy = py - this.y;
    const dist = Math.sqrt(dx*dx + dy*dy);

    // Line of sight check
    const canSee = dist < this.sightRange && !isBlockedLOS(this.x, this.y, px, py);

    if(canSee){
      this.alertTimer = Math.min(2, this.alertTimer + dt * 3);
      if(this.alertTimer > 0.8) this.chasing = true;
    } else {
      this.alertTimer = Math.max(0, this.alertTimer - dt * 0.8);
      if(this.alertTimer < 0.1) this.chasing = false;
    }

    let tx, ty, spd;
    if(this.chasing){
      tx = px; ty = py; spd = this.chaseSpeed;
    } else {
      const wp = this.patrol[this.patrolIdx];
      tx = wp.gx * TILE + TILE/2;
      ty = wp.gy * TILE + TILE/2 + 20;
      spd = this.speed;
      if(Math.abs(this.x - tx) < 3 && Math.abs(this.y - ty) < 3){
        this.patrolIdx = (this.patrolIdx + 1) % this.patrol.length;
      }
    }

    const tdx = tx - this.x, tdy = ty - this.y;
    const td = Math.sqrt(tdx*tdx + tdy*tdy);
    if(td > 2){
      let mx = (tdx/td) * spd;
      let my = (tdy/td) * spd;
      // Collide with shelves
      const nx = this.x + mx, ny = this.y + my;
      if(!isSolid(nx, ny)) { this.x = nx; this.y = ny; }
      else if(!isSolid(nx, this.y)) this.x = nx;
      else if(!isSolid(this.x, ny)) this.y = ny;

      if(Math.abs(mx) > Math.abs(my)) this.dir = mx > 0 ? 0 : 2;
      else this.dir = my > 0 ? 1 : 3;
    }

    // Catch player
    if(dist < 28 && player.invincible <= 0 && gameState === 'playing'){
      catchPlayer();
    }
  }
}

function isBlockedLOS(x1,y1,x2,y2){
  const steps = Math.ceil(Math.sqrt((x2-x1)**2+(y2-y1)**2)/TILE);
  for(let i = 1; i < steps; i++){
    const t = i/steps;
    const mx = x1 + (x2-x1)*t, my = y1 + (y2-y1)*t;
    const gx = Math.floor(mx/TILE), gy = Math.floor((my-20)/TILE);
    if(gx >= 0 && gx < COLS && gy >= 0 && gy < ROWS && grid[gy][gx] === 1) return true;
  }
  return false;
}

function isSolid(px, py){
  const gx = Math.floor(px/TILE), gy = Math.floor((py-20)/TILE);
  if(gx < 0 || gx >= COLS || gy < 0 || gy >= ROWS) return true;
  return grid[gy][gx] === 1 || grid[gy][gx] === 2;
}

function catchPlayer(){
  lives--;
  player.invincible = 2;
  shakeTimer = 0.3;
  if(lives <= 0){
    gameState = 'gameover';
    stateTimer = 0;
    showMsg('📖 OVERDUE!\nFinal Score: ' + score);
  } else {
    gameState = 'caught';
    stateTimer = 0;
    showMsg('🤫 CAUGHT! "No running!"');
    combo = 0;
  }
}

// === LEVEL GENERATION ===
function generateLevel(){
  grid = [];
  shelves = [];
  dropoffs = [];
  books = [];
  librarians.length = 0;

  for(let y = 0; y < ROWS; y++){
    grid[y] = [];
    for(let x = 0; x < COLS; x++) grid[y][x] = 0;
  }

  // Walls (border)
  for(let x = 0; x < COLS; x++){ grid[0][x] = 1; grid[ROWS-1][x] = 1; }
  for(let y = 0; y < ROWS; y++){ grid[y][0] = 1; grid[y][COLS-1] = 1; }

  // Shelf rows (library aisles)
  const shelfRows = [];
  const rowSpacing = level < 3 ? 3 : 2;
  for(let row = 2; row < ROWS-2; row += rowSpacing){
    const startX = 2 + Math.floor(Math.random()*2);
    const endX = COLS - 2 - Math.floor(Math.random()*2);
    const gap1 = startX + 2 + Math.floor(Math.random()*(endX-startX-5));
    const gap2 = gap1 + 3 + Math.floor(Math.random()*3);
    for(let x = startX; x < endX; x++){
      if(x === gap1 || x === gap2) continue; // gaps for walking
      grid[row][x] = 1;
      if(Math.random() < 0.6){
        const shelfBooks = [];
        const bc = 2 + Math.floor(Math.random()*4);
        for(let i = 0; i < bc; i++){
          shelfBooks.push({color: BOOK_COLORS[Math.floor(Math.random()*BOOK_COLORS.length)], present: true});
        }
        shelves.push({gx: x, gy: row, books: shelfBooks});
      }
    }
    shelfRows.push(row);
  }

  // Desk (front desk / return counter)
  const deskY = ROWS - 3;
  const deskX1 = Math.floor(COLS/2) - 2;
  const deskX2 = Math.floor(COLS/2) + 2;
  for(let x = deskX1; x <= deskX2; x++){
    grid[deskY][x] = 2;
  }

  // Drop-off spots (on shelves with missing books)
  const bookCount = 3 + level * 2;
  const available = shelves.filter(s => s.books.length > 0);
  const chosen = [];
  for(let i = 0; i < Math.min(bookCount, available.length); i++){
    let s;
    do { s = available[Math.floor(Math.random()*available.length)]; }
    while(chosen.includes(s) && chosen.length < available.length);
    if(chosen.includes(s)) break;
    chosen.push(s);
    const bookIdx = Math.floor(Math.random()*s.books.length);
    const book = s.books[bookIdx];
    book.present = false; // gap on shelf
    // Scatter the book somewhere on the floor
    let bx, by;
    do {
      bx = 1 + Math.floor(Math.random()*(COLS-2));
      by = 1 + Math.floor(Math.random()*(ROWS-2));
    } while(grid[by][bx] !== 0);
    books.push({
      gx: bx, gy: by,
      x: bx*TILE + TILE/2, y: by*TILE + TILE/2 + 20,
      color: book.color,
      shelfGx: s.gx, shelfGy: s.gy,
      returned: false, pickedUp: false,
    });
  }

  // Librarian patrol routes
  const libCount = Math.min(1 + Math.floor(level / 2), 4);
  for(let i = 0; i < libCount; i++){
    const patrolRow = shelfRows[i % shelfRows.length] || 4;
    const patrol = [
      {gx: 2, gy: patrolRow + 1},
      {gx: COLS - 3, gy: patrolRow + 1},
      {gx: COLS - 3, gy: patrolRow - 1},
      {gx: 2, gy: patrolRow - 1},
    ];
    const startWP = patrol[i % patrol.length];
    librarians.push(new Librarian(startWP.gx, startWP.gy, patrol));
  }

  // Player start
  player.gx = Math.floor(COLS/2);
  player.gy = ROWS - 2;
  player.x = player.gx * TILE + TILE/2;
  player.y = player.gy * TILE + TILE/2 + 20;
  player.carrying = null;
  player.invincible = 1;
}

// === INPUT ===
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.key.toLowerCase()] = true;
  if(['arrowup','arrowdown','arrowleft','arrowright',' '].includes(e.key.toLowerCase())) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

// Mobile controls
function setupMobileBtn(id, key){
  const btn = document.getElementById(id);
  btn.addEventListener('touchstart', e => { e.preventDefault(); keys[key] = true; }, {passive:false});
  btn.addEventListener('touchend', e => { e.preventDefault(); keys[key] = false; }, {passive:false});
  btn.addEventListener('mousedown', e => { keys[key] = true; });
  btn.addEventListener('mouseup', e => { keys[key] = false; });
}
setupMobileBtn('m-left','arrowleft');
setupMobileBtn('m-right','arrowright');
setupMobileBtn('m-up','arrowup');
setupMobileBtn('m-down','arrowdown');

// === DRAWING ===
function drawFloor(){
  // Carpet pattern
  for(let y = 0; y < ROWS; y++){
    for(let x = 0; x < COLS; x++){
      const px = x*TILE, py = y*TILE + 20;
      if((x+y)%2 === 0){
        ctx.fillStyle = CARPET;
      } else {
        ctx.fillStyle = CARPET2;
      }
      ctx.fillRect(px, py, TILE, TILE);
      // Carpet detail
      if((x+y)%4 === 0){
        ctx.fillStyle = 'rgba(80,40,50,0.3)';
        ctx.fillRect(px+4, py+4, TILE-8, TILE-8);
      }
    }
  }
}

function drawWalls(){
  // Top wall
  ctx.fillStyle = WALL;
  ctx.fillRect(0, 0, GW, 20 + TILE);
  ctx.fillStyle = WALL2;
  ctx.fillRect(0, 18 + TILE, GW, 4);
  // Wainscoting at bottom
  ctx.fillStyle = WOOD_MED;
  ctx.fillRect(0, 20, GW, 8);
}

function drawShelves(){
  for(let y = 0; y < ROWS; y++){
    for(let x = 0; x < COLS; x++){
      if(grid[y][x] === 1){
        const px = x*TILE, py = y*TILE + 20;
        // Shelf unit
        ctx.fillStyle = WOOD_DARK;
        ctx.fillRect(px, py, TILE, TILE);
        ctx.fillStyle = WOOD_MED;
        ctx.fillRect(px+2, py+2, TILE-4, TILE-4);
        // Shelf planks
        ctx.fillStyle = WOOD_DARK;
        ctx.fillRect(px, py + TILE/3, TILE, 2);
        ctx.fillRect(px, py + TILE*2/3, TILE, 2);
        // Find shelf data
        const shelf = shelves.find(s => s.gx === x && s.gy === y);
        if(shelf){
          // Draw books on shelf
          let bx = px + 4;
          for(const b of shelf.books){
            if(b.present){
              const bw = 4 + Math.floor(Math.random()*1.5);
              ctx.fillStyle = b.color;
              ctx.fillRect(bx, py+4, bw, TILE/3-6);
              ctx.fillStyle = b.color;
              ctx.fillRect(bx, py+TILE/3+4, bw, TILE/3-6);
              bx += bw + 1;
            } else {
              // Gap
              bx += 6;
            }
          }
        }
      } else if(grid[y][x] === 2){
        // Desk
        const px = x*TILE, py = y*TILE + 20;
        ctx.fillStyle = '#6a5540';
        ctx.fillRect(px, py, TILE, TILE);
        ctx.fillStyle = '#7a6550';
        ctx.fillRect(px+2, py+2, TILE-4, TILE-4);
        // Label
        ctx.fillStyle = '#ddd';
        ctx.font = "bold 9px 'Special Elite'";
        ctx.textAlign = 'center';
        ctx.fillText('RETURN', px+TILE/2, py+TILE/2+3);
        ctx.textAlign = 'left';
      }
    }
  }
}

function drawBooks(){
  for(const b of books){
    if(b.pickedUp || b.returned) continue;
    // Book on floor
    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(b.gx * 0.5); // random-ish rotation
    ctx.fillStyle = b.color;
    ctx.fillRect(-8, -5, 16, 10);
    ctx.fillStyle = 'rgba(255,255,255,0.15)';
    ctx.fillRect(-6, -4, 12, 2);
    // Glow indicator
    ctx.beginPath();
    ctx.arc(0, 0, 14, 0, Math.PI*2);
    ctx.fillStyle = `rgba(240,216,112,${0.1 + Math.sin(Date.now()*0.004)*0.05})`;
    ctx.fill();
    ctx.restore();
  }
}

function drawPlayer(t){
  const x = player.x, y = player.y;
  if(player.invincible > 0 && Math.floor(player.invincible*10)%2) return; // blink

  const bob = Math.sin(player.frame * 6) * 2;
  const isMoving = keys['arrowleft']||keys['arrowright']||keys['arrowup']||keys['arrowdown']
    ||keys['a']||keys['d']||keys['w']||keys['s'];

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(x, y+14, 10, 4, 0, 0, Math.PI*2);
  ctx.fill();

  // Body
  ctx.fillStyle = '#4488cc';
  ctx.fillRect(x-7, y-8+(isMoving?bob:0), 14, 14);
  // Head
  ctx.fillStyle = '#ffcc88';
  ctx.fillRect(x-6, y-18+(isMoving?bob:0), 12, 11);
  // Hair
  ctx.fillStyle = '#553322';
  ctx.fillRect(x-7, y-20+(isMoving?bob:0), 14, 5);
  // Eyes
  const eyeDir = player.dir === 2 ? -3 : player.dir === 0 ? 3 : 0;
  ctx.fillStyle = '#222';
  ctx.fillRect(x-3+eyeDir, y-14+(isMoving?bob:0), 2, 2);
  ctx.fillRect(x+2+eyeDir, y-14+(isMoving?bob:0), 2, 2);
  // Legs
  if(isMoving){
    const lo = Math.sin(player.frame*8)*4;
    ctx.fillStyle = '#335588';
    ctx.fillRect(x-4, y+6+bob, 4, 6+lo);
    ctx.fillRect(x+1, y+6+bob, 4, 6-lo);
  } else {
    ctx.fillStyle = '#335588';
    ctx.fillRect(x-4, y+6, 4, 6);
    ctx.fillRect(x+1, y+6, 4, 6);
  }
  // Shoes
  ctx.fillStyle = '#443322';
  if(isMoving){
    const lo = Math.sin(player.frame*8)*4;
    ctx.fillRect(x-5, y+12+bob+lo, 5, 3);
    ctx.fillRect(x+1, y+12+bob-lo, 5, 3);
  } else {
    ctx.fillRect(x-5, y+12, 5, 3);
    ctx.fillRect(x+1, y+12, 5, 3);
  }

  // Carrying book
  if(player.carrying !== null){
    const b = books[player.carrying];
    ctx.fillStyle = b.color;
    ctx.fillRect(x+8, y-6+(isMoving?bob:0), 10, 7);
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillRect(x+9, y-5+(isMoving?bob:0), 8, 2);
  }
}

function drawLibrarian(lib, t){
  const x = lib.x, y = lib.y;
  const bob = Math.sin(lib.frame) * 1.5;
  const isChasing = lib.chasing;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.beginPath();
  ctx.ellipse(x, y+16, 12, 5, 0, 0, Math.PI*2);
  ctx.fill();

  // Body (dress)
  ctx.fillStyle = isChasing ? '#882244' : '#556644';
  ctx.fillRect(x-9, y-10+bob, 18, 18);
  // Collar
  ctx.fillStyle = '#ddd';
  ctx.fillRect(x-4, y-10+bob, 8, 3);
  // Head
  ctx.fillStyle = '#eebb88';
  ctx.fillRect(x-7, y-22+bob, 14, 13);
  // Hair bun
  ctx.fillStyle = '#777';
  ctx.fillRect(x-8, y-25+bob, 16, 6);
  ctx.beginPath();
  ctx.arc(x, y-26+bob, 5, 0, Math.PI*2);
  ctx.fill();
  // Glasses
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(x-6, y-19+bob, 5, 4);
  ctx.strokeRect(x+1, y-19+bob, 5, 4);
  ctx.beginPath(); ctx.moveTo(x-1, y-17+bob); ctx.lineTo(x+1, y-17+bob); ctx.stroke();
  // Angry eyes
  ctx.fillStyle = isChasing ? '#ff0000' : '#333';
  ctx.fillRect(x-4, y-18+bob, 2, 2);
  ctx.fillRect(x+3, y-18+bob, 2, 2);
  // Angry eyebrows when chasing
  if(isChasing){
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(x-6,y-20+bob); ctx.lineTo(x-2,y-19+bob); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x+7,y-20+bob); ctx.lineTo(x+3,y-19+bob); ctx.stroke();
  }
  // Mouth
  if(isChasing){
    ctx.fillStyle = '#600';
    ctx.fillRect(x-2, y-13+bob, 5, 2);
  }
  // Legs
  ctx.fillStyle = '#444';
  ctx.fillRect(x-4, y+8+bob, 4, 6);
  ctx.fillRect(x+1, y+8+bob, 4, 6);
  // Book/ruler weapon when chasing
  if(isChasing){
    ctx.fillStyle = '#664422';
    const swing = Math.sin(t*10)*15;
    ctx.save();
    ctx.translate(x+10, y-5+bob);
    ctx.rotate(swing * Math.PI/180);
    ctx.fillRect(0, -1, 16, 3);
    ctx.restore();
  }

  // Alert indicator
  if(lib.alertTimer > 0 && !lib.chasing){
    ctx.fillStyle = '#ff0';
    ctx.font = "bold 16px 'Special Elite'";
    ctx.textAlign = 'center';
    ctx.fillText('?', x, y - 30);
    ctx.textAlign = 'left';
  }
  if(lib.chasing){
    ctx.fillStyle = '#f33';
    ctx.font = "bold 18px 'Special Elite'";
    ctx.textAlign = 'center';
    ctx.fillText('!', x, y - 30);
    // SHH bubble
    if(Math.sin(t*4) > 0){
      ctx.fillStyle = 'rgba(255,255,255,0.85)';
      ctx.beginPath();
      ctx.ellipse(x+20, y-35, 22, 12, 0, 0, Math.PI*2);
      ctx.fill();
      ctx.fillStyle = '#c00';
      ctx.font = "bold 12px 'Special Elite'";
      ctx.fillText('SHH!', x+20, y-32);
    }
    ctx.textAlign = 'left';
  }

  // Sight range (debug-ish, but cool)
  if(lib.chasing){
    ctx.beginPath();
    ctx.arc(x, y, lib.sightRange, 0, Math.PI*2);
    ctx.strokeStyle = 'rgba(255,50,50,0.06)';
    ctx.lineWidth = 1;
    ctx.stroke();
  }
}

function drawDropoffIndicators(){
  // Show where each carried book goes
  if(player.carrying !== null){
    const b = books[player.carrying];
    const px = b.shelfGx * TILE, py = b.shelfGy * TILE + 20;
    ctx.strokeStyle = `rgba(240,216,112,${0.3 + Math.sin(Date.now()*0.005)*0.15})`;
    ctx.lineWidth = 2;
    ctx.setLineDash([4,4]);
    ctx.strokeRect(px-2, py-2, TILE+4, TILE+4);
    ctx.setLineDash([]);
    // Arrow
    ctx.fillStyle = '#f0d870';
    ctx.font = "14px 'Special Elite'";
    ctx.textAlign = 'center';
    ctx.fillText('↓ HERE', px+TILE/2, py-6);
    ctx.textAlign = 'left';
  }
}

// === PLAYER UPDATE ===
function updatePlayer(dt){
  if(gameState !== 'playing') return;
  player.invincible = Math.max(0, player.invincible - dt);

  let mx = 0, my = 0;
  if(keys['arrowleft']||keys['a']) mx -= 1;
  if(keys['arrowright']||keys['d']) mx += 1;
  if(keys['arrowup']||keys['w']) my -= 1;
  if(keys['arrowdown']||keys['s']) my += 1;

  if(mx || my){
    const len = Math.sqrt(mx*mx+my*my);
    mx = mx/len * player.speed;
    my = my/len * player.speed;
    player.frame += dt;

    const nx = player.x + mx, ny = player.y + my;
    if(!isSolid(nx, ny)){ player.x = nx; player.y = ny; }
    else if(!isSolid(nx, player.y)) player.x = nx;
    else if(!isSolid(player.x, ny)) player.y = ny;

    if(Math.abs(mx) > Math.abs(my)) player.dir = mx > 0 ? 0 : 2;
    else player.dir = my > 0 ? 1 : 3;
  }

  // Clamp
  player.x = Math.max(TILE, Math.min(GW-TILE, player.x));
  player.y = Math.max(TILE+20, Math.min(GH-TILE+10, player.y));

  // Pick up book
  if(player.carrying === null){
    for(let i = 0; i < books.length; i++){
      const b = books[i];
      if(b.pickedUp || b.returned) continue;
      const dx = player.x - b.x, dy = player.y - b.y;
      if(dx*dx+dy*dy < 30*30){
        b.pickedUp = true;
        player.carrying = i;
        break;
      }
    }
  }

  // Return book to shelf
  if(player.carrying !== null){
    const b = books[player.carrying];
    const sx = b.shelfGx*TILE+TILE/2, sy = b.shelfGy*TILE+TILE/2+20;
    const dx = player.x - sx, dy = player.y - sy;
    if(dx*dx+dy*dy < 40*40){
      b.returned = true;
      // Mark shelf book as present again
      const shelf = shelves.find(s => s.gx === b.shelfGx && s.gy === b.shelfGy);
      if(shelf){
        const sb = shelf.books.find(sb => !sb.present && sb.color === b.color);
        if(sb) sb.present = true;
      }
      player.carrying = null;
      combo++;
      comboTimer = 2;
      const points = 100 * combo;
      score += points;
      // Check win
      if(books.every(b => b.returned)){
        gameState = 'levelup';
        stateTimer = 0;
        level++;
        score += 500 * level;
        showMsg('📖 Level ' + (level-1) + ' Complete!\n+' + (500*level) + ' bonus!');
      }
    }
  }

  comboTimer = Math.max(0, comboTimer - dt);
  if(comboTimer <= 0) combo = 0;
}

// === UI ===
function showMsg(text){
  const el = document.getElementById('msg');
  el.textContent = text;
  el.style.display = 'block';
}
function hideMsg(){
  document.getElementById('msg').style.display = 'none';
}

function updateUI(){
  const remaining = books.filter(b => !b.returned).length;
  document.getElementById('books-left').textContent = remaining;
  document.getElementById('score').textContent = score;
  document.getElementById('lives').textContent = lives;
  document.getElementById('level').textContent = level;
}

// === MAIN LOOP ===
let lastTime = 0;
function frame(timestamp){
  const dt = Math.min(0.05, (timestamp - lastTime) / 1000);
  lastTime = timestamp;
  const t = timestamp * 0.001;

  ctx.save();
  if(shakeTimer > 0){
    shakeTimer -= dt;
    ctx.translate(Math.random()*6-3, Math.random()*6-3);
  }

  // Draw
  drawFloor();
  drawShelves();
  drawBooks();
  drawDropoffIndicators();

  if(gameState === 'playing' || gameState === 'caught'){
    updatePlayer(dt);
    for(const lib of librarians) lib.update(dt);
  }

  // Sort by Y and draw characters
  const chars = [{type:'player', y:player.y}, ...librarians.map(l=>({type:'lib',y:l.y,ref:l}))];
  chars.sort((a,b) => a.y - b.y);
  for(const c of chars){
    if(c.type === 'player') drawPlayer(t);
    else drawLibrarian(c.ref, t);
  }

  // Combo display
  if(combo > 1 && comboTimer > 0){
    ctx.fillStyle = '#f0d870';
    ctx.font = "bold 20px 'Libre Baskerville'";
    ctx.textAlign = 'center';
    ctx.globalAlpha = comboTimer/2;
    ctx.fillText(`${combo}x COMBO!`, player.x, player.y - 40);
    ctx.globalAlpha = 1;
    ctx.textAlign = 'left';
  }

  // Vignette
  const vig = ctx.createRadialGradient(GW/2, GH/2, GW*0.3, GW/2, GH/2, GW*0.7);
  vig.addColorStop(0, 'transparent');
  vig.addColorStop(1, 'rgba(0,0,0,0.4)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, GW, GH);

  ctx.restore();

  // State timers
  if(gameState === 'caught'){
    stateTimer += dt;
    if(stateTimer > 1.5){
      gameState = 'playing';
      hideMsg();
    }
  }
  if(gameState === 'levelup'){
    stateTimer += dt;
    if(stateTimer > 2.5){
      gameState = 'playing';
      hideMsg();
      generateLevel();
    }
  }
  if(gameState === 'gameover'){
    stateTimer += dt;
    if(stateTimer > 3 && (keys[' '] || keys['enter'])){
      score = 0; lives = 3; level = 1;
      gameState = 'playing';
      hideMsg();
      generateLevel();
    }
  }

  updateUI();
  requestAnimationFrame(frame);
}

// Start
document.getElementById('start-screen').addEventListener('click', ()=>{
  document.getElementById('start-screen').style.display = 'none';
  gameState = 'playing';
  generateLevel();
});

requestAnimationFrame(frame);
</script>
