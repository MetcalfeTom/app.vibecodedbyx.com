<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Laser Sand — Neon Particle Trails</title>
<link rel="icon" href="https://emojicdn.elk.sh/⚡">
<meta property="og:title" content="Laser Sand">
<meta property="og:description" content="Two yellow laser tracers race around your screen dropping falling sand particles.">
<meta property="og:url" content="https://sloppy.live/laser-sand">
<meta property="og:image" content="https://sloppy.live/laser-sand/og-image.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a08;overflow:hidden;cursor:none}
canvas{display:block;position:fixed;inset:0}
#hint{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
  font-family:monospace;font-size:10px;color:rgba(255,220,60,.2);
  pointer-events:none;letter-spacing:1px;z-index:2;transition:opacity 1s}
#controls{position:fixed;top:10px;left:50%;transform:translateX(-50%);
  display:flex;gap:6px;z-index:5;opacity:0.3;transition:opacity .3s}
#controls:hover{opacity:1}
#controls .mbtn{background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.4);font-family:monospace;font-size:9px;padding:4px 8px;
  border-radius:12px;cursor:pointer;transition:all .15s}
#controls .mbtn:hover{border-color:rgba(255,255,255,.4);color:rgba(255,255,255,.7)}
.back{position:fixed;bottom:12px;right:12px;z-index:5}
.back a{color:rgba(255,220,60,.12);font-family:monospace;font-size:9px;text-decoration:none}
.back a:hover{color:rgba(255,220,60,.4)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="controls">
  <button class="mbtn" id="modeBtn">border</button>
</div>
<div id="hint">scroll to adjust speed</div>
<div class="back"><a href="https://sloppy.live">← sloppy.live</a></div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize(){
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
  // Rebuild sand grid
  sandW = W;
  sandH = H;
  sand = new Uint32Array(sandW * sandH);
}

// Sand simulation grid (stores RGBA as uint32)
let sandW, sandH, sand;
let sandImg;

resize();
sandImg = ctx.createImageData(W, H);

// Laser tracers
const BORDER_MARGIN = 3;
let speedMult = 0.15; // slow and steady
let mode = 0; // 0=border, 1=diagonal, 2=spiral
const MODES = 3;
const MODE_NAMES = ['border','diagonal','spiral'];

class Tracer {
  constructor(clockwise){
    this.clockwise = clockwise;
    this.progress = clockwise ? 0 : 0.5; // start opposite
    this.speed = 0.004;
    this.trail = [];
    this.maxTrail = 60;
  }

  getBorderPos(t){
    // t is 0-1 around the border perimeter
    t = ((t % 1) + 1) % 1;
    const perim = 2*(W + H);
    const d = t * perim;
    const m = BORDER_MARGIN;

    if(d < W){
      return {x: d, y: m}; // top
    } else if(d < W + H){
      return {x: W - m, y: d - W}; // right
    } else if(d < 2*W + H){
      return {x: W - (d - W - H), y: H - m}; // bottom
    } else {
      return {x: m, y: H - (d - 2*W - H)}; // left
    }
  }

  getDiagonalPos(t){
    t = ((t % 1) + 1) % 1;
    const seg = t * 4;
    const s = seg % 1;
    const si = Math.floor(seg);
    if(si===0) return {x: s*W, y: s*H};
    if(si===1) return {x: W - s*W, y: s*H};
    if(si===2) return {x: s*W, y: H - s*H};
    return {x: W - s*W, y: H - s*H};
  }

  getSpiralPos(t){
    t = ((t % 1) + 1) % 1;
    const cx = W/2, cy = H/2;
    const maxR = Math.min(W,H) * 0.45;
    const angle = t * Math.PI * 12;
    const r = maxR * (1 - t * 0.7);
    return {x: cx + Math.cos(angle)*r, y: cy + Math.sin(angle)*r};
  }

  getPos(t){
    switch(mode){
      case 0: return this.getBorderPos(t);
      case 1: return this.getDiagonalPos(t);
      case 2: return this.getSpiralPos(t);
    }
  }

  update(){
    const dir = this.clockwise ? 1 : -1;
    this.progress += this.speed * speedMult * dir;
    this.progress = ((this.progress % 1) + 1) % 1;

    const pos = this.getPos(this.progress);
    this.trail.unshift({x: pos.x, y: pos.y, life: 1});
    if(this.trail.length > this.maxTrail) this.trail.pop();

    // Spawn sand particles along the trail
    this.spawnSand(pos.x, pos.y);
  }

  spawnSand(x, y){
    const count = 2 + Math.floor(Math.random() * 3);
    for(let i=0; i<count; i++){
      const sx = Math.floor(x + (Math.random()-0.5)*8);
      const sy = Math.floor(y + (Math.random()-0.5)*4);
      if(sx < 0 || sx >= sandW || sy < 0 || sy >= sandH) continue;

      // Yellow/gold sand
      const r = 200 + Math.floor(Math.random()*55);
      const g = 170 + Math.floor(Math.random()*60);
      const b = 20 + Math.floor(Math.random()*40);
      const rgba = (255 << 24) | (b << 16) | (g << 8) | r;
      sand[sy * sandW + sx] = rgba;
    }
  }

  draw(){
    const hue = this.clockwise ? 50 : 45;
    for(let i=0; i<this.trail.length; i++){
      const t = this.trail[i];
      const alpha = 1 - i/this.trail.length;
      const size = 3 + (1 - i/this.trail.length) * 4;

      // Glow
      ctx.globalAlpha = alpha * 0.3;
      ctx.fillStyle = `hsl(${hue},100%,70%)`;
      ctx.beginPath();
      ctx.arc(t.x, t.y, size*3, 0, Math.PI*2);
      ctx.fill();

      // Core
      ctx.globalAlpha = alpha * 0.9;
      ctx.fillStyle = `hsl(${hue},100%,85%)`;
      ctx.beginPath();
      ctx.arc(t.x, t.y, size, 0, Math.PI*2);
      ctx.fill();

      // Hot center
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(t.x, t.y, size*0.4, 0, Math.PI*2);
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }
}

const tracerA = new Tracer(true);
const tracerB = new Tracer(false);

// Sand physics
function updateSand(){
  // Bottom to top, randomly left or right sweep for natural look
  for(let y = sandH - 2; y >= 0; y--){
    const leftToRight = Math.random() > 0.5;
    for(let i = 0; i < sandW; i++){
      const x = leftToRight ? i : sandW - 1 - i;
      const idx = y * sandW + x;
      if(sand[idx] === 0) continue;

      const below = (y+1)*sandW + x;
      const belowL = (y+1)*sandW + (x-1);
      const belowR = (y+1)*sandW + (x+1);

      if(y+1 < sandH && sand[below] === 0){
        // Fall straight down
        sand[below] = sand[idx];
        sand[idx] = 0;
      } else if(y+1 < sandH && x-1 >= 0 && sand[belowL] === 0){
        // Fall left
        sand[belowL] = sand[idx];
        sand[idx] = 0;
      } else if(y+1 < sandH && x+1 < sandW && sand[belowR] === 0){
        // Fall right
        sand[belowR] = sand[idx];
        sand[idx] = 0;
      }
      // Else: settled, stay put
    }
  }

  // Slowly fade bottom rows to prevent infinite buildup
  for(let x=0; x<sandW; x++){
    const idx = (sandH-1)*sandW + x;
    if(sand[idx] !== 0 && Math.random() < 0.02){
      sand[idx] = 0;
    }
  }
}

function renderSand(){
  // Build ImageData from sand grid
  if(sandImg.width !== sandW || sandImg.height !== sandH){
    sandImg = ctx.createImageData(sandW, sandH);
  }
  const data = sandImg.data;
  const buf = new Uint32Array(data.buffer);

  // Start with transparent
  buf.fill(0);

  // Copy sand
  for(let i=0; i<sand.length; i++){
    if(sand[i] !== 0) buf[i] = sand[i];
  }

  ctx.putImageData(sandImg, 0, 0);
}

// Draw border frame
function drawBorder(){
  const m = BORDER_MARGIN;
  ctx.strokeStyle = 'rgba(255,220,60,0.06)';
  ctx.lineWidth = 2;
  ctx.strokeRect(m, m, W-m*2, H-m*2);
}

function frame(){
  // Fade background (creates trail effect and darkens sand glow)
  ctx.fillStyle = 'rgba(10,10,8,0.15)';
  ctx.fillRect(0, 0, W, H);

  // Update sand physics (multiple steps for speed)
  const steps = Math.max(1, Math.floor(2 + speedMult));
  for(let i=0; i<steps; i++) updateSand();

  // Render sand
  renderSand();

  // Update and draw tracers
  tracerA.update();
  tracerB.update();

  drawBorder();
  tracerA.draw();
  tracerB.draw();

  requestAnimationFrame(frame);
}

// Mode button
document.getElementById('modeBtn').addEventListener('click', e => {
  e.stopPropagation();
  mode = (mode + 1) % MODES;
  e.target.textContent = MODE_NAMES[mode];
  document.getElementById('hint').style.opacity = '0';
});

window.addEventListener('wheel', e => {
  speedMult = Math.max(0.1, Math.min(4, speedMult + e.deltaY * 0.002));
}, {passive:true});

window.addEventListener('resize', () => {
  const oldSand = sand;
  const oldW = sandW, oldH = sandH;
  resize();
  sandImg = ctx.createImageData(W, H);
  // Copy old sand data that fits
  for(let y=0; y<Math.min(oldH, sandH); y++){
    for(let x=0; x<Math.min(oldW, sandW); x++){
      sand[y*sandW+x] = oldSand[y*oldW+x];
    }
  }
});

frame();
</script>
</body>
</html>
