<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Laser Sand — Neon Particle Trails</title>
<link rel="icon" href="https://emojicdn.elk.sh/⚡">
<meta property="og:title" content="Laser Sand">
<meta property="og:description" content="Two yellow laser tracers race around your screen with long glowing tails.">
<meta property="og:url" content="https://sloppy.live/laser-sand">
<meta property="og:image" content="https://sloppy.live/laser-sand/og-image.png">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a08;overflow:hidden;cursor:none}
canvas{display:block;position:fixed;inset:0}
#hint{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);
  font-family:monospace;font-size:10px;color:rgba(255,220,60,.2);
  pointer-events:none;letter-spacing:1px;z-index:2;transition:opacity 1s}
#controls{position:fixed;top:10px;left:50%;transform:translateX(-50%);
  display:flex;gap:6px;z-index:5;opacity:0.3;transition:opacity .3s}
#controls:hover{opacity:1}
#controls .mbtn{background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.4);font-family:monospace;font-size:9px;padding:4px 8px;
  border-radius:12px;cursor:pointer;transition:all .15s}
#controls .mbtn:hover{border-color:rgba(255,255,255,.4);color:rgba(255,255,255,.7)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="controls">
  <button class="mbtn" id="modeBtn">border</button>
</div>
<div id="hint">scroll to adjust speed</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize(){
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W;
  canvas.height = H;
}

resize();

const BORDER_MARGIN = 3;
let speedMult = 0.15;
let mode = 0;
const MODES = 3;
const MODE_NAMES = ['border','diagonal','spiral'];

class Tracer {
  constructor(offset){
    this.progress = offset;
    this.speed = 0.004;
    this.trail = [];
    this.maxTrail = 120; // long tail
  }

  getBorderPos(t){
    t = ((t % 1) + 1) % 1;
    const perim = 2*(W + H);
    const d = t * perim;
    const m = BORDER_MARGIN;
    if(d < W) return {x: d, y: m};
    if(d < W + H) return {x: W - m, y: d - W};
    if(d < 2*W + H) return {x: W - (d - W - H), y: H - m};
    return {x: m, y: H - (d - 2*W - H)};
  }

  getDiagonalPos(t){
    t = ((t % 1) + 1) % 1;
    const seg = t * 4;
    const s = seg % 1;
    const si = Math.floor(seg);
    if(si===0) return {x: s*W, y: s*H};
    if(si===1) return {x: W - s*W, y: s*H};
    if(si===2) return {x: s*W, y: H - s*H};
    return {x: W - s*W, y: H - s*H};
  }

  getSpiralPos(t){
    t = ((t % 1) + 1) % 1;
    const cx = W/2, cy = H/2;
    const maxR = Math.min(W,H) * 0.45;
    const angle = t * Math.PI * 12;
    const r = maxR * (1 - t * 0.7);
    return {x: cx + Math.cos(angle)*r, y: cy + Math.sin(angle)*r};
  }

  getPos(t){
    switch(mode){
      case 0: return this.getBorderPos(t);
      case 1: return this.getDiagonalPos(t);
      case 2: return this.getSpiralPos(t);
    }
  }

  update(){
    this.progress += this.speed * speedMult;
    this.progress = ((this.progress % 1) + 1) % 1;
    const pos = this.getPos(this.progress);
    this.trail.unshift({x: pos.x, y: pos.y});
    if(this.trail.length > this.maxTrail) this.trail.pop();
  }

  draw(){
    const len = this.trail.length;
    for(let i=0; i<len; i++){
      const t = this.trail[i];
      const fade = 1 - i/len;

      // Soft glow
      ctx.globalAlpha = fade * 0.15;
      ctx.fillStyle = 'hsl(50,100%,65%)';
      ctx.beginPath();
      ctx.arc(t.x, t.y, 6, 0, Math.PI*2);
      ctx.fill();

      // Thin core beam
      ctx.globalAlpha = fade * 0.85;
      ctx.fillStyle = 'hsl(50,100%,80%)';
      ctx.beginPath();
      ctx.arc(t.x, t.y, 1.2, 0, Math.PI*2);
      ctx.fill();

      // Hot center (head only)
      if(i < 3){
        ctx.globalAlpha = fade;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(t.x, t.y, 1.8, 0, Math.PI*2);
        ctx.fill();
      }
    }
    ctx.globalAlpha = 1;
  }
}

const tracerA = new Tracer(0);
const tracerB = new Tracer(0.5); // opposite side

function drawBorder(){
  const m = BORDER_MARGIN;
  ctx.strokeStyle = 'rgba(255,220,60,0.04)';
  ctx.lineWidth = 1;
  ctx.strokeRect(m, m, W-m*2, H-m*2);
}

function frame(){
  // Fade background for trail persistence
  ctx.fillStyle = 'rgba(10,10,8,0.12)';
  ctx.fillRect(0, 0, W, H);

  tracerA.update();
  tracerB.update();

  drawBorder();
  tracerA.draw();
  tracerB.draw();

  requestAnimationFrame(frame);
}

document.getElementById('modeBtn').addEventListener('click', e => {
  e.stopPropagation();
  mode = (mode + 1) % MODES;
  e.target.textContent = MODE_NAMES[mode];
  document.getElementById('hint').style.opacity = '0';
});

window.addEventListener('wheel', e => {
  speedMult = Math.max(0.05, Math.min(4, speedMult + e.deltaY * 0.002));
}, {passive:true});

window.addEventListener('resize', resize);

frame();
</script>
</body>
</html>
