<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Slime Melt · drag to drip neon goo</title>
<link rel="icon" href="https://emojicdn.elk.sh/🟢">
<meta name="description" content="Physics-based slime where every drop drips downward, pools, merges, and stickies itself onto ledges. Drag to paint neon goo.">
<meta property="og:title" content="Slime Melt" />
<meta property="og:description" content="Drag to drip neon goo. Watch it pool, merge, and ooze down ledges in glorious metaball physics." />
<meta property="og:image" content="https://image.pollinations.ai/prompt/neon%20green%20and%20pink%20slime%20blobs%20melting%20and%20dripping%20down%20metal%20ledges%20in%20a%20dark%20laboratory%2C%20goo%20physics%2C%20metaball%20render%2C%20cinematic%20lighting%2C%20ultra%20vivid?width=1200&height=630&nologo=true&seed=71233" />
<meta property="og:url" content="https://sloppy.live/slime-melt" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rubik+Moonrocks&family=Fredoka:wght@400;600&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg0: #060810;
    --bg1: #0d1426;
    --metal0: #252a38;
    --metal1: #1a1e2a;
    --rim: #3e4558;
    --lime:  #7dff5b;
    --pink:  #ff3ea0;
    --cyan:  #3efffb;
    --amber: #ffc233;
    --violet:#b368ff;
    --ink:   #0a0d16;
    --ghost: rgba(255, 255, 255, 0.82);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--bg0);
    color: var(--ghost);
    font-family: 'Fredoka', sans-serif;
    user-select: none;
    -webkit-user-select: none;
    touch-action: none;
  }

  .stage {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 110%, rgba(179, 104, 255, 0.22), transparent 65%),
      radial-gradient(ellipse at 10% -10%, rgba(62, 255, 251, 0.18), transparent 55%),
      linear-gradient(180deg, #060810 0%, #0d1426 65%, #111a2e 100%);
  }

  /* Scene background canvas: draws platforms + floor */
  #scene {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }

  /* Slime canvas: metaball filter magic */
  #slime {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    filter: blur(7px) contrast(22) brightness(1.08) saturate(1.35);
    -webkit-filter: blur(7px) contrast(22) brightness(1.08) saturate(1.35);
    pointer-events: none;
    mix-blend-mode: normal;
  }

  /* Highlight pass — subtle shine for gooeyness */
  #shine {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
    pointer-events: none;
    mix-blend-mode: screen;
    opacity: 0.9;
  }

  .chrome {
    position: fixed;
    left: 18px;
    top: 18px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    z-index: 10;
    pointer-events: none;
  }
  .chrome > * { pointer-events: auto; }

  .title {
    font-family: 'Rubik Moonrocks', serif;
    font-size: clamp(28px, 4vw, 44px);
    letter-spacing: 0.05em;
    color: var(--lime);
    text-shadow: 0 0 22px rgba(125, 255, 91, 0.45), 3px 3px 0 var(--ink);
    line-height: 1;
  }
  .sub {
    font-family: 'Fredoka', sans-serif;
    font-size: 13px;
    letter-spacing: 0.14em;
    color: rgba(255, 255, 255, 0.45);
    text-transform: uppercase;
    margin-left: 2px;
    margin-top: -4px;
  }

  .panel {
    background: rgba(10, 13, 22, 0.72);
    border: 1px solid rgba(255, 255, 255, 0.08);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-radius: 14px;
    padding: 12px 14px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.75);
    display: flex;
    flex-direction: column;
    gap: 10px;
    width: max-content;
  }

  .row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .label {
    font-family: 'Fredoka', sans-serif;
    font-size: 11px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.45);
    min-width: 78px;
  }

  .colors {
    display: flex;
    gap: 7px;
  }
  .swatch {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 2px solid rgba(255,255,255,0.12);
    cursor: pointer;
    transition: transform 0.12s, border-color 0.12s;
    box-shadow: 0 0 12px rgba(0,0,0,0.5);
  }
  .swatch.on { transform: scale(1.18); border-color: #fff; }
  .swatch.lime   { background: radial-gradient(circle at 30% 30%, #d9ffae, var(--lime)); }
  .swatch.pink   { background: radial-gradient(circle at 30% 30%, #ffb0db, var(--pink)); }
  .swatch.cyan   { background: radial-gradient(circle at 30% 30%, #b9ffff, var(--cyan)); }
  .swatch.amber  { background: radial-gradient(circle at 30% 30%, #ffe8a0, var(--amber)); }
  .swatch.violet { background: radial-gradient(circle at 30% 30%, #e4caff, var(--violet)); }
  .swatch.mix    {
    background: conic-gradient(from 0deg, var(--pink), var(--amber), var(--lime), var(--cyan), var(--violet), var(--pink));
  }

  input[type=range] {
    -webkit-appearance: none;
    appearance: none;
    background: transparent;
    width: 120px;
    cursor: pointer;
  }
  input[type=range]::-webkit-slider-runnable-track {
    height: 3px; background: rgba(255,255,255,0.14); border-radius: 2px;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 14px; height: 14px; background: var(--lime);
    border-radius: 50%; margin-top: -6px;
    box-shadow: 0 0 10px rgba(125, 255, 91, 0.6);
  }
  input[type=range]::-moz-range-track {
    height: 3px; background: rgba(255,255,255,0.14); border-radius: 2px;
  }
  input[type=range]::-moz-range-thumb {
    width: 14px; height: 14px; background: var(--lime);
    border-radius: 50%; border: none;
    box-shadow: 0 0 10px rgba(125, 255, 91, 0.6);
  }

  .btn {
    font-family: 'Fredoka', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 8px 16px;
    background: transparent;
    border: 1.5px solid rgba(255, 255, 255, 0.3);
    border-radius: 10px;
    color: rgba(255, 255, 255, 0.8);
    cursor: pointer;
    transition: border-color 0.14s, color 0.14s, background 0.14s;
  }
  .btn:hover { border-color: var(--pink); color: var(--pink); background: rgba(255, 62, 160, 0.07); }
  .btn.shake:hover { border-color: var(--cyan); color: var(--cyan); background: rgba(62,255,251,0.06); }

  .count {
    position: fixed;
    right: 18px;
    top: 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.18em;
    color: rgba(255, 255, 255, 0.42);
    text-align: right;
    line-height: 1.6;
    z-index: 10;
    pointer-events: none;
    text-transform: uppercase;
  }
  .count .n { color: var(--lime); font-weight: 700; font-size: 13px; }

  .hint {
    position: fixed;
    bottom: 16px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Fredoka', sans-serif;
    font-size: 13px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.32);
    z-index: 10;
    pointer-events: none;
    transition: opacity 0.6s;
    text-align: center;
  }
  .hint b { color: var(--pink); font-weight: 400; }

  @media (max-width: 620px) {
    .chrome { left: 12px; top: 12px; }
    .title { font-size: 30px; }
    .panel { padding: 10px 12px; font-size: 11px; }
    .label { min-width: 64px; font-size: 10px; }
    .swatch { width: 24px; height: 24px; }
    input[type=range] { width: 90px; }
    .btn { padding: 7px 12px; font-size: 10px; }
    .count { font-size: 10px; }
    .hint { font-size: 11px; bottom: 10px; }
  }
</style>
</head>
<body>
  <div class="stage">
    <canvas id="scene"></canvas>
    <canvas id="slime"></canvas>
    <canvas id="shine"></canvas>
  </div>

  <div class="chrome">
    <div class="title">SLIME MELT</div>
    <div class="sub">drag · drip · ooze</div>
    <div class="panel">
      <div class="row">
        <div class="label">color</div>
        <div class="colors" id="colors">
          <div class="swatch lime on"   data-color="lime"   title="lime"></div>
          <div class="swatch pink"      data-color="pink"   title="pink"></div>
          <div class="swatch cyan"      data-color="cyan"   title="cyan"></div>
          <div class="swatch amber"     data-color="amber"  title="amber"></div>
          <div class="swatch violet"    data-color="violet" title="violet"></div>
          <div class="swatch mix"       data-color="mix"    title="rainbow mix"></div>
        </div>
      </div>
      <div class="row">
        <div class="label">flow</div>
        <input type="range" id="flow" min="1" max="6" step="1" value="2" />
      </div>
      <div class="row">
        <div class="label">gravity</div>
        <input type="range" id="grav" min="0" max="1600" step="50" value="780" />
      </div>
      <div class="row" style="gap:6px;">
        <button class="btn" id="clearBtn">clear</button>
        <button class="btn shake" id="shakeBtn">shake</button>
      </div>
    </div>
  </div>

  <div class="count">
    <div>drops <span class="n" id="dropCount">0</span></div>
  </div>

  <div class="hint" id="hint">drag anywhere to drip slime · <b>shake</b> to wobble the world</div>

<script>
(() => {
  const scene = document.getElementById('scene');
  const slime = document.getElementById('slime');
  const shine = document.getElementById('shine');
  const sceneCtx = scene.getContext('2d');
  const slimeCtx = slime.getContext('2d');
  const shineCtx = shine.getContext('2d');
  const hint = document.getElementById('hint');
  const dropCountEl = document.getElementById('dropCount');

  let W = 0, H = 0, DPR = 1;
  let shakeT = 0, shakeAmp = 0;

  const COLOR_MAP = {
    lime:   { fill: '#7dff5b', light: '#d9ffae', dark: '#28a60a' },
    pink:   { fill: '#ff3ea0', light: '#ffb0db', dark: '#a2155a' },
    cyan:   { fill: '#3efffb', light: '#b9ffff', dark: '#0e8a86' },
    amber:  { fill: '#ffc233', light: '#ffe8a0', dark: '#a87600' },
    violet: { fill: '#b368ff', light: '#e4caff', dark: '#581e9a' }
  };
  const COLOR_KEYS = ['lime', 'pink', 'cyan', 'amber', 'violet'];

  let currentColor = 'lime';
  let flow = 2;

  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = window.innerWidth;
    H = window.innerHeight;
    for (const c of [scene, slime, shine]) {
      c.width = W * DPR;
      c.height = H * DPR;
    }
    sceneCtx.setTransform(DPR, 0, 0, DPR, 0, 0);
    slimeCtx.setTransform(DPR, 0, 0, DPR, 0, 0);
    shineCtx.setTransform(DPR, 0, 0, DPR, 0, 0);
    rebuildPlatforms();
    drawScene();
  }
  window.addEventListener('resize', resize);

  // ----- Platforms (static obstacles slime drips onto) -----
  let platforms = [];
  function rebuildPlatforms() {
    platforms = [];
    // Floor
    platforms.push({ x: 0, y: H - 28, w: W, h: 28, floor: true });

    // A few floating metal ledges — positions relative to canvas size
    const cellW = Math.max(140, W * 0.18);
    const cellH = 14;
    const lanes = [0.28, 0.5, 0.72];
    for (let i = 0; i < lanes.length; i++) {
      const y = H * lanes[i];
      // two ledges per lane, staggered
      const side = i % 2 === 0 ? 0.22 : 0.58;
      const side2 = i % 2 === 0 ? 0.68 : 0.08;
      platforms.push({ x: W * side,  y, w: cellW * 1.6, h: cellH });
      platforms.push({ x: W * side2, y: y + 30, w: cellW, h: cellH });
    }
    // A high narrow ledge
    platforms.push({ x: W * 0.42, y: H * 0.16, w: Math.max(160, W * 0.14), h: cellH });
  }

  function drawScene() {
    sceneCtx.clearRect(0, 0, W, H);

    // Subtle grid
    sceneCtx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
    sceneCtx.lineWidth = 1;
    const step = 56;
    for (let x = 0; x < W; x += step) {
      sceneCtx.beginPath();
      sceneCtx.moveTo(x, 0); sceneCtx.lineTo(x, H);
      sceneCtx.stroke();
    }
    for (let y = 0; y < H; y += step) {
      sceneCtx.beginPath();
      sceneCtx.moveTo(0, y); sceneCtx.lineTo(W, y);
      sceneCtx.stroke();
    }

    // Platforms
    for (const p of platforms) drawPlatform(p);
  }

  function drawPlatform(p) {
    // metallic ledge
    const g = sceneCtx.createLinearGradient(p.x, p.y, p.x, p.y + p.h);
    g.addColorStop(0, '#3b4256');
    g.addColorStop(0.5, '#232836');
    g.addColorStop(1, '#13161f');
    sceneCtx.fillStyle = g;
    sceneCtx.fillRect(p.x, p.y, p.w, p.h);
    // top rim
    sceneCtx.fillStyle = 'rgba(255,255,255,0.07)';
    sceneCtx.fillRect(p.x, p.y, p.w, 1);
    // bolt details (decorative)
    if (!p.floor) {
      sceneCtx.fillStyle = 'rgba(255,255,255,0.14)';
      for (let x = p.x + 8; x < p.x + p.w - 8; x += 22) {
        sceneCtx.fillRect(x, p.y + p.h - 4, 2, 2);
      }
    } else {
      // floor: subtle highlight
      sceneCtx.fillStyle = 'rgba(125, 255, 91, 0.05)';
      sceneCtx.fillRect(0, H - 28, W, 2);
    }
  }

  // ----- Particles -----
  const particles = [];
  const MAX_PARTICLES = 1400;

  function spawn(x, y, hueKey, vx = 0, vy = 0, r = null) {
    if (particles.length >= MAX_PARTICLES) {
      // Reuse oldest at bottom (those that have come to rest)
      let oldestIdx = 0;
      let oldestY = 0;
      for (let i = 0; i < particles.length; i++) {
        if (particles[i].y > oldestY && particles[i].stuck > 120) {
          oldestY = particles[i].y;
          oldestIdx = i;
        }
      }
      particles.splice(oldestIdx, 1);
    }
    const radius = r || (8 + Math.random() * 4);
    const key = hueKey === 'mix' ? COLOR_KEYS[Math.floor(Math.random() * COLOR_KEYS.length)] : hueKey;
    particles.push({
      x, y,
      vx: vx + (Math.random() - 0.5) * 20,
      vy: vy + (Math.random() - 0.5) * 10,
      r: radius,
      color: key,
      stuck: 0,
      age: 0
    });
  }

  // ----- Physics -----
  let gravity = 780;

  function stepPhysics(dt) {
    const GRAV = gravity;
    const DAMP = 0.985;

    // Gravity + integration
    for (const p of particles) {
      p.age += dt;
      // If stuck on floor and surrounded, keep still to save physics time
      if (p.stuck > 60 && p.y > H - 40) {
        continue;
      }
      p.vy += GRAV * dt;
      p.vx *= Math.pow(DAMP, dt * 60);
      p.vy *= Math.pow(0.992, dt * 60);
      p.x += p.vx * dt;
      p.y += p.vy * dt;
    }

    // Soft particle collisions (spatial hash for perf)
    const cellSize = 24;
    const grid = new Map();
    for (let i = 0; i < particles.length; i++) {
      const p = particles[i];
      const cx = Math.floor(p.x / cellSize);
      const cy = Math.floor(p.y / cellSize);
      for (let dx = -1; dx <= 1; dx++) {
        for (let dy = -1; dy <= 1; dy++) {
          const key = (cx + dx) + ',' + (cy + dy);
          if (dx === 0 && dy === 0) {
            if (!grid.has(key)) grid.set(key, []);
            grid.get(key).push(i);
          }
        }
      }
    }

    for (const indices of grid.values()) {
      for (let ii = 0; ii < indices.length; ii++) {
        const i = indices[ii];
        const a = particles[i];
        // neighboring cells
        const cx = Math.floor(a.x / cellSize);
        const cy = Math.floor(a.y / cellSize);
        for (let dx = -1; dx <= 1; dx++) {
          for (let dy = -1; dy <= 1; dy++) {
            const list = grid.get((cx + dx) + ',' + (cy + dy));
            if (!list) continue;
            for (const j of list) {
              if (j <= i) continue;
              const b = particles[j];
              const ddx = b.x - a.x;
              const ddy = b.y - a.y;
              const dist2 = ddx*ddx + ddy*ddy;
              const min = (a.r + b.r) * 0.82;
              if (dist2 < min*min && dist2 > 0.01) {
                const d = Math.sqrt(dist2);
                const overlap = (min - d) * 0.5;
                const nx = ddx / d;
                const ny = ddy / d;
                a.x -= nx * overlap;
                a.y -= ny * overlap;
                b.x += nx * overlap;
                b.y += ny * overlap;
                // Velocity exchange (viscous)
                const relVel = (b.vx - a.vx) * nx + (b.vy - a.vy) * ny;
                if (relVel < 0) {
                  const impulse = relVel * 0.35;
                  a.vx += impulse * nx;
                  a.vy += impulse * ny;
                  b.vx -= impulse * nx;
                  b.vy -= impulse * ny;
                }
              }
            }
          }
        }
      }
    }

    // Platform collisions
    for (const p of particles) {
      let touched = false;
      for (const pl of platforms) {
        // AABB with particle as circle (simple)
        const closestX = Math.max(pl.x, Math.min(p.x, pl.x + pl.w));
        const closestY = Math.max(pl.y, Math.min(p.y, pl.y + pl.h));
        const dx = p.x - closestX;
        const dy = p.y - closestY;
        const d2 = dx*dx + dy*dy;
        if (d2 < p.r * p.r && d2 > 0.001) {
          const d = Math.sqrt(d2);
          const overlap = p.r - d;
          const nx = dx / d, ny = dy / d;
          p.x += nx * overlap;
          p.y += ny * overlap;
          // Viscous contact: kill a chunk of velocity
          const vDotN = p.vx * nx + p.vy * ny;
          p.vx -= vDotN * nx * 1.2;
          p.vy -= vDotN * ny * 1.2;
          // Horizontal sliding damping — makes it goopy along surfaces
          p.vx *= 0.78;
          // Gentle downward creep (drip) on horizontal surfaces
          if (ny < -0.7) {
            // on top of a surface — apply friction
            p.vx *= 0.86;
            if (Math.abs(p.vy) < 30) p.vy = 12; // very slow ooze
          }
          touched = true;
        }
      }
      // Walls
      if (p.x < p.r) { p.x = p.r; p.vx *= -0.2; touched = true; }
      if (p.x > W - p.r) { p.x = W - p.r; p.vx *= -0.2; touched = true; }
      // Hard bottom under floor (safety)
      if (p.y > H) { p.y = H; p.vy = 0; }

      if (touched && Math.abs(p.vx) < 12 && Math.abs(p.vy) < 30) {
        p.stuck++;
      } else if (!touched) {
        p.stuck = Math.max(0, p.stuck - 1);
      }
    }
  }

  // ----- Rendering -----
  function renderSlime() {
    // Clear with transparent
    slimeCtx.clearRect(0, 0, W, H);
    shineCtx.clearRect(0, 0, W, H);

    // Group by color and draw soft radial gradient blobs.
    // Because the #slime canvas has contrast(22) applied via CSS,
    // soft overlapping circles blend into gooey metaballs.
    // Using 'source-over' per color group to preserve color.

    for (const p of particles) {
      const c = COLOR_MAP[p.color];
      // Core radial
      const grad = slimeCtx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 2.4);
      grad.addColorStop(0, c.fill);
      grad.addColorStop(0.45, c.fill);
      grad.addColorStop(1, 'rgba(0,0,0,0)');
      slimeCtx.fillStyle = grad;
      slimeCtx.beginPath();
      slimeCtx.arc(p.x, p.y, p.r * 2.4, 0, Math.PI * 2);
      slimeCtx.fill();
    }

    // Shine pass (drawn sharper, no filter) — highlights on top of clusters
    for (const p of particles) {
      if (p.age < 0.05) continue;
      const c = COLOR_MAP[p.color];
      const hr = p.r * 0.55;
      const hg = shineCtx.createRadialGradient(
        p.x - p.r * 0.35, p.y - p.r * 0.45, 0,
        p.x - p.r * 0.35, p.y - p.r * 0.45, hr
      );
      hg.addColorStop(0, `${c.light}`);
      hg.addColorStop(1, 'rgba(255,255,255,0)');
      shineCtx.fillStyle = hg;
      shineCtx.globalAlpha = 0.75;
      shineCtx.beginPath();
      shineCtx.arc(p.x - p.r * 0.35, p.y - p.r * 0.45, hr, 0, Math.PI * 2);
      shineCtx.fill();
    }
    shineCtx.globalAlpha = 1;
  }

  // ----- Input -----
  let dragging = false;
  let lastSpawn = 0;
  let lastPos = null;
  let hintHidden = false;

  function getXY(e) {
    const rect = slime.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    return { x: t.clientX - rect.left, y: t.clientY - rect.top };
  }

  function startDrip(e) {
    e.preventDefault();
    dragging = true;
    const { x, y } = getXY(e);
    lastPos = { x, y };
    dripAt(x, y, 0, 0);
    if (!hintHidden) { hint.style.opacity = '0'; hintHidden = true; }
  }

  function moveDrip(e) {
    if (!dragging) return;
    e.preventDefault();
    const { x, y } = getXY(e);
    const dx = lastPos ? x - lastPos.x : 0;
    const dy = lastPos ? y - lastPos.y : 0;
    dripAt(x, y, dx, dy);
    lastPos = { x, y };
  }

  function endDrip() {
    dragging = false;
    lastPos = null;
  }

  function dripAt(x, y, dx, dy) {
    const now = performance.now();
    if (now - lastSpawn < 16) return;
    lastSpawn = now;
    const count = Math.max(1, Math.floor(flow));
    for (let i = 0; i < count; i++) {
      spawn(
        x + (Math.random() - 0.5) * 14,
        y + (Math.random() - 0.5) * 8,
        currentColor,
        dx * 0.45 + (Math.random() - 0.5) * 30,
        dy * 0.45 + Math.random() * 20 + 40
      );
    }
    dropCountEl.textContent = particles.length;
  }

  slime.addEventListener('pointerdown', startDrip);
  document.addEventListener('pointermove', moveDrip);
  document.addEventListener('pointerup', endDrip);
  document.addEventListener('pointercancel', endDrip);

  // Color swatches
  document.getElementById('colors').addEventListener('click', (e) => {
    const sw = e.target.closest('.swatch');
    if (!sw) return;
    document.querySelectorAll('.swatch').forEach(el => el.classList.remove('on'));
    sw.classList.add('on');
    currentColor = sw.dataset.color;
  });

  // Flow slider
  document.getElementById('flow').addEventListener('input', (e) => {
    flow = parseInt(e.target.value, 10);
  });
  document.getElementById('grav').addEventListener('input', (e) => {
    gravity = parseInt(e.target.value, 10);
  });

  document.getElementById('clearBtn').addEventListener('click', () => {
    particles.length = 0;
    dropCountEl.textContent = 0;
  });

  document.getElementById('shakeBtn').addEventListener('click', () => {
    shakeAmp = 28;
    // Launch all particles with upward jitter
    for (const p of particles) {
      p.vx += (Math.random() - 0.5) * 420;
      p.vy += -Math.random() * 360;
      p.stuck = 0;
    }
  });

  // Main loop
  let last = 0;
  function loop(now) {
    const dt = Math.min(0.033, (now - last) / 1000 || 0.016);
    last = now;

    // Shake world by offsetting stage transform
    if (shakeAmp > 0.1) {
      shakeT += dt * 40;
      shakeAmp *= Math.pow(0.92, dt * 60);
      const ox = Math.sin(shakeT * 3.1) * shakeAmp;
      const oy = Math.cos(shakeT * 2.7) * shakeAmp * 0.6;
      document.querySelector('.stage').style.transform = `translate(${ox}px, ${oy}px)`;
    } else if (shakeAmp !== 0) {
      shakeAmp = 0;
      document.querySelector('.stage').style.transform = '';
    }

    stepPhysics(dt);
    renderSlime();

    requestAnimationFrame(loop);
  }

  resize();
  requestAnimationFrame((t0) => { last = t0; loop(t0); });

  // Seed demo drip
  setTimeout(() => {
    if (particles.length === 0) {
      for (let i = 0; i < 14; i++) {
        setTimeout(() => {
          spawn(W * 0.5 + (Math.random() - 0.5) * 40, 60, COLOR_KEYS[Math.floor(Math.random()*5)], 0, 180);
        }, i * 60);
      }
    }
  }, 800);
})();
</script>
</body>
</html>
