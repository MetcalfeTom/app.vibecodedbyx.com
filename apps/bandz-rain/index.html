<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bandz Rain</title>
<link rel="icon" href="https://emojicdn.elk.sh/💰">
<meta property="og:title" content="Bandz Rain">
<meta property="og:description" content="Golden bricks of cash falling from the sky. Catch them with your designer bag before they hit the ground.">
<meta property="og:url" content="https://app.sloppy.live/bandz-rain/">
<meta property="og:image" content="https://emojicdn.elk.sh/💰?style=google">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0804;--gold:#d4a520;--gold-light:#f0d060;--gold-bright:#ffe88a;
  --cash-green:#2a8a3a;--bag-brown:#6a4028;--bag-tan:#c89a60;
  --text:#c8b888;--dim:#5a4a30;--danger:#cc3333;
}
body{
  background:var(--bg);color:var(--text);font-family:'DM Mono',monospace;
  min-height:100vh;display:flex;flex-direction:column;align-items:center;
  overflow:hidden;touch-action:none;cursor:none;
}
canvas{display:block;width:100%;max-width:600px;image-rendering:auto;background:var(--bg)}

.hud{
  display:flex;justify-content:space-between;padding:8px 12px;
  max-width:600px;width:100%;
}
.hud-item{text-align:center}
.hud-label{font-size:0.4rem;color:var(--dim);text-transform:uppercase;letter-spacing:0.1em}
.hud-val{font-family:'Playfair Display',serif;font-size:0.9rem;font-weight:900}
.hud-val.gold{color:var(--gold-light)}
.hud-val.green{color:var(--cash-green)}
.hud-val.red{color:var(--danger)}

.screen{
  position:fixed;top:0;left:0;right:0;bottom:0;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  background:rgba(10,8,4,0.94);z-index:10;text-align:center;padding:20px;
}
.screen.hidden{display:none}
.screen h2{
  font-family:'Playfair Display',serif;font-size:clamp(1.4rem,5vw,2.4rem);
  font-weight:900;color:var(--gold-light);margin-bottom:10px;
}
.screen p{font-size:0.6rem;color:var(--dim);margin-bottom:6px;line-height:1.8}
.play-btn{
  padding:12px 30px;border:2px solid var(--gold);border-radius:4px;
  background:transparent;color:var(--gold);font-family:'Playfair Display',serif;
  font-size:0.8rem;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:10px;
}
.play-btn:hover{background:var(--gold);color:var(--bg)}
.final-score{font-family:'Playfair Display',serif;font-size:2rem;font-weight:900;color:var(--gold-bright);margin:8px 0}

</style>
</head>
<body>

<div class="hud">
  <div class="hud-item"><div class="hud-val gold" id="h-score">$0</div><div class="hud-label">Bandz</div></div>
  <div class="hud-item"><div class="hud-val green" id="h-combo">x1</div><div class="hud-label">Combo</div></div>
  <div class="hud-item"><div class="hud-val red" id="h-missed">0/5</div><div class="hud-label">Missed</div></div>
</div>

<canvas id="game"></canvas>

<div class="screen" id="start-screen">
  <h2>BANDZ RAIN</h2>
  <p>Golden bricks of money fall from the sky.<br>Catch them with your designer bag!</p>
  <p>Mouse / touch to move</p>
  <button class="play-btn" onclick="startGame()">GET RICH</button>
</div>

<div class="screen hidden" id="end-screen">
  <h2>GAME OVER</h2>
  <div class="final-score" id="final-score">$0</div>
  <p id="final-msg">Nice haul!</p>
  <button class="play-btn" onclick="startGame()">RUN IT BACK</button>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const GW = 600, GH = 500;
canvas.width = GW; canvas.height = GH;

let state = 'menu', frame = 0;
let score = 0, combo = 1, missed = 0, maxMissed = 5;
let bagX = GW / 2, bagTargetX = GW / 2;
const BAG_W = 60, BAG_H = 50, BAG_Y = GH - 65;
let bricks = [], particles = [], sparkles = [];
let spawnTimer = 0, difficulty = 1;
let hiScore = 0;

try { hiScore = parseInt(localStorage.getItem('bandz-rain-hi')) || 0; } catch(e) {}

// Brick types
const BRICK_TYPES = [
  { value: 100, label: '$100', color: '#d4a520', w: 36, h: 18, weight: 60 },
  { value: 500, label: '$500', color: '#e8c040', w: 40, h: 20, weight: 25 },
  { value: 1000, label: '$1K', color: '#f0d860', w: 44, h: 22, weight: 10 },
  { value: 5000, label: '$5K', color: '#ffe88a', w: 48, h: 24, weight: 4 },
  { value: 10000, label: '$10K', color: '#fff4c0', w: 52, h: 26, weight: 1 },
];

function pickBrickType() {
  const totalWeight = BRICK_TYPES.reduce((s, b) => s + b.weight, 0);
  let r = Math.random() * totalWeight;
  for (const bt of BRICK_TYPES) {
    r -= bt.weight;
    if (r <= 0) return bt;
  }
  return BRICK_TYPES[0];
}

function spawnBrick() {
  const bt = pickBrickType();
  bricks.push({
    x: 20 + Math.random() * (GW - 40),
    y: -30,
    speed: 1.5 + Math.random() * 1.5 + difficulty * 0.3,
    rotation: (Math.random() - 0.5) * 0.1,
    rotAngle: Math.random() * Math.PI * 2,
    type: bt,
    caught: false,
    sparkle: Math.random() * Math.PI * 2
  });
}

function spawnCatchParticles(x, y, value) {
  const count = value >= 5000 ? 25 : value >= 1000 ? 15 : 8;
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 6,
      vy: -2 - Math.random() * 4,
      life: 20 + Math.random() * 20,
      maxLife: 40,
      size: 2 + Math.random() * 3,
      color: value >= 5000 ? '#fff4c0' : value >= 1000 ? '#f0d860' : '#d4a520'
    });
  }
  // Dollar signs floating up
  for (let i = 0; i < 3; i++) {
    sparkles.push({
      x: x + (Math.random() - 0.5) * 30,
      y,
      vy: -1.5 - Math.random(),
      text: '$',
      life: 30,
      maxLife: 30,
      size: 10 + Math.random() * 8
    });
  }
}

function drawBag(x, y) {
  ctx.save();
  ctx.translate(x, y);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(0, BAG_H / 2 + 4, BAG_W / 2 + 4, 6, 0, 0, Math.PI * 2);
  ctx.fill();

  // Bag body
  const grad = ctx.createLinearGradient(-BAG_W / 2, -BAG_H / 2, BAG_W / 2, BAG_H / 2);
  grad.addColorStop(0, '#c89a60');
  grad.addColorStop(0.3, '#a07840');
  grad.addColorStop(0.7, '#8a6430');
  grad.addColorStop(1, '#6a4828');
  ctx.fillStyle = grad;

  // Main body shape
  ctx.beginPath();
  ctx.moveTo(-BAG_W / 2, -BAG_H / 4);
  ctx.quadraticCurveTo(-BAG_W / 2 - 3, BAG_H / 2, -BAG_W / 3, BAG_H / 2);
  ctx.lineTo(BAG_W / 3, BAG_H / 2);
  ctx.quadraticCurveTo(BAG_W / 2 + 3, BAG_H / 2, BAG_W / 2, -BAG_H / 4);
  ctx.closePath();
  ctx.fill();

  // Bag opening (wider at top)
  ctx.fillStyle = '#3a2818';
  ctx.beginPath();
  ctx.ellipse(0, -BAG_H / 4, BAG_W / 2 + 2, 8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#1a1008';
  ctx.beginPath();
  ctx.ellipse(0, -BAG_H / 4, BAG_W / 2 - 2, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Handles
  ctx.strokeStyle = '#8a6430';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(-12, -BAG_H / 4 - 8, 10, Math.PI * 0.8, Math.PI * 0.2, true);
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(12, -BAG_H / 4 - 8, 10, Math.PI * 0.8, Math.PI * 0.2, true);
  ctx.stroke();

  // Gold clasp
  ctx.fillStyle = '#d4a520';
  ctx.beginPath();
  ctx.roundRect(-6, -BAG_H / 4 - 4, 12, 8, 2);
  ctx.fill();
  ctx.fillStyle = '#f0d860';
  ctx.fillRect(-2, -BAG_H / 4 - 2, 4, 4);

  // Stitching
  ctx.strokeStyle = 'rgba(200,154,96,0.3)';
  ctx.lineWidth = 0.5;
  ctx.setLineDash([3, 3]);
  ctx.beginPath();
  ctx.moveTo(-BAG_W / 2 + 4, -BAG_H / 6);
  ctx.quadraticCurveTo(-BAG_W / 2 + 1, BAG_H / 3, -BAG_W / 3 + 4, BAG_H / 2 - 4);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(BAG_W / 2 - 4, -BAG_H / 6);
  ctx.quadraticCurveTo(BAG_W / 2 - 1, BAG_H / 3, BAG_W / 3 - 4, BAG_H / 2 - 4);
  ctx.stroke();
  ctx.setLineDash([]);

  // Shine
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  ctx.beginPath();
  ctx.ellipse(-BAG_W / 4, 0, 6, BAG_H / 3, -0.2, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawBrick(b) {
  ctx.save();
  ctx.translate(b.x, b.y);
  ctx.rotate(b.rotAngle);

  const bt = b.type;

  // Glow
  ctx.shadowColor = bt.color;
  ctx.shadowBlur = 6 + (bt.value >= 5000 ? 10 : 0);

  // Brick body
  const grad = ctx.createLinearGradient(-bt.w / 2, -bt.h / 2, bt.w / 2, bt.h / 2);
  grad.addColorStop(0, bt.color);
  grad.addColorStop(0.5, '#d4a520');
  grad.addColorStop(1, '#8a6a10');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.roundRect(-bt.w / 2, -bt.h / 2, bt.w, bt.h, 3);
  ctx.fill();

  // Band/strap
  ctx.fillStyle = 'rgba(0,0,0,0.2)';
  ctx.fillRect(-bt.w / 4, -bt.h / 2, bt.w / 2, bt.h);

  // $ symbol
  ctx.fillStyle = 'rgba(0,0,0,0.35)';
  ctx.font = `700 ${bt.h * 0.6}px "Playfair Display"`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('$', 0, 1);

  // Shine
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(-bt.w / 2 + 2, -bt.h / 2 + 2, bt.w - 4, bt.h / 3);

  // Sparkle
  if (bt.value >= 1000) {
    b.sparkle += 0.08;
    const sx = Math.cos(b.sparkle) * bt.w * 0.3;
    const sy = Math.sin(b.sparkle * 1.3) * bt.h * 0.2;
    ctx.fillStyle = `rgba(255,255,200,${0.3 + Math.sin(b.sparkle * 2) * 0.2})`;
    ctx.beginPath();
    ctx.arc(sx, sy, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.shadowBlur = 0;
  ctx.restore();

  // Value label
  ctx.fillStyle = 'rgba(212,165,32,0.4)';
  ctx.font = '300 7px "DM Mono"';
  ctx.textAlign = 'center';
  ctx.fillText(bt.label, b.x, b.y + bt.h / 2 + 10);
}

window.startGame = function() {
  state = 'playing';
  score = 0; combo = 1; missed = 0; frame = 0; difficulty = 1;
  bricks = []; particles = []; sparkles = []; spawnTimer = 0;
  bagX = GW / 2; bagTargetX = GW / 2;
  document.getElementById('start-screen').classList.add('hidden');
  document.getElementById('end-screen').classList.add('hidden');
  updateHUD();
};

function gameOver() {
  state = 'over';
  if (score > hiScore) { hiScore = score; try { localStorage.setItem('bandz-rain-hi', hiScore); } catch(e) {} }
  document.getElementById('final-score').textContent = '$' + score.toLocaleString();
  const msgs = ['Not bad!', 'Nice bag!', 'Big spender!', 'Money moves!', 'BALLER!', 'LEGENDARY HAUL!'];
  const tier = score >= 50000 ? 5 : score >= 20000 ? 4 : score >= 10000 ? 3 : score >= 5000 ? 2 : score >= 1000 ? 1 : 0;
  document.getElementById('final-msg').textContent = msgs[tier] + (score >= hiScore && score > 0 ? ' NEW RECORD!' : '');
  document.getElementById('end-screen').classList.remove('hidden');
}

function updateHUD() {
  document.getElementById('h-score').textContent = '$' + score.toLocaleString();
  document.getElementById('h-combo').textContent = 'x' + combo;
  document.getElementById('h-combo').style.color = combo >= 5 ? 'var(--gold-bright)' : combo >= 3 ? 'var(--gold-light)' : 'var(--cash-green)';
  document.getElementById('h-missed').textContent = missed + '/' + maxMissed;
}

function update() {
  if (state !== 'playing') return;
  frame++;
  difficulty = 1 + frame * 0.0003;

  // Bag movement (smooth follow)
  bagX += (bagTargetX - bagX) * 0.15;
  bagX = Math.max(BAG_W / 2 + 5, Math.min(GW - BAG_W / 2 - 5, bagX));

  // Spawn bricks
  spawnTimer++;
  const spawnRate = Math.max(15, 50 - difficulty * 4);
  if (spawnTimer >= spawnRate) {
    spawnTimer = 0;
    spawnBrick();
    // Extra bricks at higher difficulty
    if (difficulty > 3 && Math.random() < 0.3) spawnBrick();
  }

  // Update bricks
  bricks.forEach(b => {
    b.y += b.speed;
    b.rotAngle += b.rotation;
  });

  // Catch detection
  bricks = bricks.filter(b => {
    const bt = b.type;
    // Check if brick hits bag
    if (b.y + bt.h / 2 >= BAG_Y - BAG_H / 4 && b.y - bt.h / 2 <= BAG_Y + BAG_H / 2 &&
        Math.abs(b.x - bagX) < BAG_W / 2 + bt.w / 4) {
      // Caught!
      const points = bt.value * combo;
      score += points;
      combo = Math.min(combo + 1, 10);
      spawnCatchParticles(b.x, BAG_Y, bt.value);
      sparkles.push({
        x: b.x, y: BAG_Y - 20,
        vy: -1.5, text: '+$' + points.toLocaleString(),
        life: 35, maxLife: 35,
        size: points >= 5000 ? 14 : points >= 1000 ? 11 : 9
      });
      updateHUD();
      return false;
    }
    // Missed — hit ground
    if (b.y > GH + 20) {
      missed++;
      combo = 1;
      updateHUD();
      if (missed >= maxMissed) gameOver();
      return false;
    }
    return true;
  });

  // Particles
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.life--; });
  particles = particles.filter(p => p.life > 0);

  // Sparkle text
  sparkles.forEach(s => { s.y += s.vy; s.life--; });
  sparkles = sparkles.filter(s => s.life > 0);
}

function draw() {
  // Background
  ctx.fillStyle = '#0a0804';
  ctx.fillRect(0, 0, GW, GH);

  // Ambient gold light from top
  const topGlow = ctx.createLinearGradient(0, 0, 0, 150);
  topGlow.addColorStop(0, 'rgba(212,165,32,0.04)');
  topGlow.addColorStop(1, 'transparent');
  ctx.fillStyle = topGlow;
  ctx.fillRect(0, 0, GW, 150);

  // Rain streaks (subtle)
  ctx.strokeStyle = 'rgba(212,165,32,0.03)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 8; i++) {
    const rx = (frame * 2 + i * 73) % GW;
    ctx.beginPath();
    ctx.moveTo(rx, (frame * 3 + i * 111) % GH);
    ctx.lineTo(rx - 2, (frame * 3 + i * 111) % GH + 20);
    ctx.stroke();
  }

  // Ground line
  ctx.strokeStyle = 'rgba(106,72,40,0.2)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, GH - 10);
  ctx.lineTo(GW, GH - 10);
  ctx.stroke();

  if (state === 'menu') return;

  // Bricks
  bricks.forEach(drawBrick);

  // Bag
  drawBag(bagX, BAG_Y);

  // Particles
  particles.forEach(p => {
    const a = p.life / p.maxLife;
    ctx.fillStyle = p.color.replace(')', `,${a})`).replace('rgb', 'rgba').replace('#', '');
    // Hex to fill
    ctx.globalAlpha = a;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * a, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Floating text
  sparkles.forEach(s => {
    const a = s.life / s.maxLife;
    ctx.fillStyle = `rgba(240,216,96,${a})`;
    ctx.font = `700 ${s.size}px "Playfair Display"`;
    ctx.textAlign = 'center';
    ctx.fillText(s.text, s.x, s.y);
  });

  // Combo flash
  if (combo >= 5) {
    ctx.fillStyle = `rgba(255,228,100,${0.02 + Math.sin(frame * 0.1) * 0.01})`;
    ctx.fillRect(0, 0, GW, GH);
  }
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Input
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  bagTargetX = (e.clientX - rect.left) / rect.width * GW;
});
canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  bagTargetX = (e.touches[0].clientX - rect.left) / rect.width * GW;
}, { passive: false });
canvas.addEventListener('touchstart', e => {
  const rect = canvas.getBoundingClientRect();
  bagTargetX = (e.touches[0].clientX - rect.left) / rect.width * GW;
}, { passive: true });

loop();
</script>
</body>
</html>
