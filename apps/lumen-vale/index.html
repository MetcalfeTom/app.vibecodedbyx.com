<style>
  :root{
    --ink:#eef3f8;
    --dim:#9fb2c4;
    --glass:rgba(8,14,24,0.55);
    --edge:rgba(180,210,240,0.22);
    --accent:#ffc06a;
  }
  html{ font-size:100%; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    font-family:"Space Mono", ui-monospace, monospace;
    background:#060a14;
    color:var(--ink);
    overflow:hidden;
    height:100dvh;
  }
  #scene{ position:fixed; inset:0; display:block; touch-action:none; }
  .vignette{
    position:fixed; inset:0; pointer-events:none;
    background:radial-gradient(ellipse at 50% 42%, transparent 58%, rgba(2,4,10,0.42) 100%);
  }
  header{
    position:fixed; top:1.1rem; left:1.25rem; z-index:5;
    transition:opacity 1.6s ease;
    pointer-events:none;
  }
  header.faded{ opacity:0.28; }
  h1{
    font-family:"Fraunces", Georgia, serif;
    font-weight:300; font-style:italic;
    font-size:clamp(1.9rem, 4.5vw, 3rem);
    letter-spacing:0.04em;
    color:var(--ink);
    text-shadow:0 2px 18px rgba(0,0,0,0.55);
  }
  h1 em{ font-style:italic; color:var(--accent); }
  h1 a{
    color:inherit; text-decoration:none; pointer-events:auto;
    border-bottom:1px solid transparent;
  }
  h1 a:hover{ border-bottom-color:var(--accent); }
  h1 a:focus-visible{ outline:3px solid var(--accent); outline-offset:4px; border-radius:2px; }
  .tag{
    font-size:0.68rem; letter-spacing:0.28em; text-transform:uppercase;
    color:var(--dim); margin-top:0.35rem;
    text-shadow:0 1px 8px rgba(0,0,0,0.6);
  }
  .hint{
    position:fixed; bottom:1.1rem; left:50%; transform:translateX(-50%);
    z-index:5; font-size:0.72rem; letter-spacing:0.14em; color:var(--dim);
    background:var(--glass); border:1px solid var(--edge);
    padding:0.5rem 1rem; border-radius:999px;
    backdrop-filter:blur(6px);
    transition:opacity 1.4s ease;
    text-align:center; white-space:nowrap;
    pointer-events:none;
  }
  .hint.gone{ opacity:0; }
  .panel{
    position:fixed; right:1.1rem; bottom:1.1rem; z-index:6;
    display:flex; gap:0.5rem;
  }
  .panel button{
    min-width:2.75rem; min-height:2.75rem;
    padding:0 0.85rem;
    font-family:inherit; font-size:0.82rem; letter-spacing:0.06em;
    color:var(--ink);
    background:var(--glass); border:1px solid var(--edge);
    border-radius:0.75rem; cursor:pointer;
    backdrop-filter:blur(6px);
    transition:border-color 0.2s ease, transform 0.15s ease;
  }
  .panel button:hover{ border-color:var(--accent); transform:translateY(-2px); }
  .panel button:focus-visible{ outline:3px solid var(--accent); outline-offset:2px; }
  .panel button[aria-pressed="true"]{ color:var(--accent); border-color:var(--accent); }
  #clock{
    position:fixed; right:1.1rem; top:1.1rem; z-index:5;
    font-size:0.7rem; letter-spacing:0.22em; color:var(--dim);
    background:var(--glass); border:1px solid var(--edge);
    padding:0.5rem 0.9rem; border-radius:999px;
    backdrop-filter:blur(6px);
    pointer-events:none;
  }
  #loading{
    position:fixed; inset:0; z-index:10;
    display:flex; align-items:center; justify-content:center;
    background:#060a14;
    font-size:0.75rem; letter-spacing:0.3em; text-transform:uppercase; color:var(--dim);
    transition:opacity 0.9s ease;
  }
  #loading.done{ opacity:0; pointer-events:none; }
  #err{
    position:fixed; inset:0; z-index:11; display:none;
    align-items:center; justify-content:center; text-align:center;
    background:#060a14; color:var(--ink); padding:2rem;
    font-size:0.9rem; line-height:1.7;
  }
  @media (max-width:640px){
    .hint{ font-size:0.62rem; }
  }
  @media (prefers-reduced-motion: reduce){
    .panel button{ transition:none; }
  }
</style>

<body>
<canvas id="scene" role="application" aria-label="First-person bird simulator over an endless mountain landscape. You are always flying. Arrow keys steer: up and down control pitch, left and right bank into turns. Dive to gain speed. Press F or Escape for a calm orbit camera. Buttons below control camera mode and the day cycle."></canvas>
<div class="vignette" aria-hidden="true"></div>

<header id="hdr">
  <h1><a href="manifesto.html" title="Read the creator manifesto">lumen <em>vale</em></a></h1>

<p id="clock" role="status" aria-live="off">—</p>

<p class="hint" id="hint">↑ ↓ ← → to fly · dive to gain speed</p>

<div class="panel" role="group" aria-label="Scene controls">
  <button type="button" id="btnBody" aria-pressed="false" title="Toggle wingsuit body">🪂 suit</button>
  <button type="button" id="btnMode" aria-pressed="false" title="Switch to orbit camera (F)">🧭 orbit</button>
  <button type="button" id="btnPause" aria-pressed="false" title="Pause the sun">⏸ sun</button>
  <button type="button" id="btnSpeed" title="Day cycle speed">1×</button>
</div>

<div id="loading">growing the world…</div>
<div id="err"><p>This landscape needs WebGL, which your browser or device declined to provide.<br>Try a different browser — the valley will wait.</p></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function(){
'use strict';

/* ---------- helpers ---------- */
const clamp01 = v => Math.min(1, Math.max(0, v));
const lerp = (a,b,t) => a + (b-a)*t;
const sstep = (a,b,v) => { const t = clamp01((v-a)/(b-a)); return t*t*(3-2*t); };
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
function makeRand(seed){
  let s = (seed >>> 0) || 1;
  return () => {
    s ^= s << 13; s >>>= 0;
    s ^= s >> 17;
    s ^= s << 5;  s >>>= 0;
    return s / 4294967296;
  };
}

/* ---------- renderer ---------- */
const canvas = document.getElementById('scene');
let renderer;
try{
  renderer = new THREE.WebGLRenderer({ canvas, antialias:true, powerPreference:'high-performance' });
}catch(e){
  document.getElementById('err').style.display = 'flex';
  document.getElementById('loading').classList.add('done');
  return;
}
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0xc4dbe6, 0.00095); /* only lambert (trees/birds) use this; terrain has custom fog */
const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.5, 12000);
camera.position.set(-160, 95, 230);

const controls = new THREE.OrbitControls(camera, canvas);
controls.target.set(0, 18, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 45;
controls.maxDistance = 850;
controls.maxPolarAngle = 1.52;
controls.autoRotate = !reduceMotion;
controls.autoRotateSpeed = 0.22;
controls.addEventListener('start', () => { controls.autoRotate = false; hideHint(); });

/* lights for the lambert-shaded props (trees, rocks); terrain/water/sky are custom shaders */
const dirLight = new THREE.DirectionalLight(0xfff3da, 1.1);
dirLight.position.set(0.5, 0.8, 0.3);
scene.add(dirLight);
const ambLight = new THREE.AmbientLight(0x8aa2bb, 1.0);
scene.add(ambLight);

/* ---------- CPU noise ---------- */
function makeNoise(seed){
  const hash = (x,y) => {
    const n = Math.sin(x*127.1 + y*311.7 + seed*74.7) * 43758.5453;
    return n - Math.floor(n);
  };
  return function(x,y){
    const ix = Math.floor(x), iy = Math.floor(y);
    const fx = x-ix, fy = y-iy;
    const ux = fx*fx*(3-2*fx), uy = fy*fy*(3-2*fy);
    const a = hash(ix,iy), b = hash(ix+1,iy), c = hash(ix,iy+1), d = hash(ix+1,iy+1);
    return a + (b-a)*ux + (c-a)*uy + (a-b-c+d)*ux*uy;
  };
}
const n1 = makeNoise(3.7), n2 = makeNoise(11.3);

function fbm1(x, y, oct){
  let a = 0.5, f = 1, s = 0, norm = 0;
  for(let i=0;i<oct;i++){
    s += a * n1(x*f + i*13.7, y*f + i*7.1);
    norm += a; f *= 2.03; a *= 0.5;
  }
  return s / norm;
}
function ridged(x, y, oct){
  let a = 0.5, f = 1, s = 0, norm = 0;
  for(let i=0;i<oct;i++){
    let v = 1 - Math.abs(2*n2(x*f + i*5.3, y*f + i*9.7) - 1);
    v *= v;
    s += a*v; norm += a; f *= 2.11; a *= 0.52;
  }
  return s / norm;
}

/* infinite heightfield — pure function of (x,z), no bounds */
function terrainH(x, z){
  const s = 0.0035;
  let wx = x*s, wz = z*s;
  const qx = fbm1(wx + 5.2, wz + 1.3, 4);
  const qz = fbm1(wx + 9.7, wz + 8.1, 4);
  wx += (qx - 0.5) * 1.1;
  wz += (qz - 0.5) * 1.1;
  const base   = fbm1(wx, wz, 5);
  const valley = fbm1(wx*0.35 + 40.0, wz*0.35 + 20.0, 3);
  const mMask  = Math.pow(clamp01(fbm1(wx*0.55 + 31.4, wz*0.55 + 17.8, 3) * 1.8 - 0.55), 1.7);
  const ridge  = ridged(wx*1.9 + 7.7, wz*1.9 + 3.1, 5);
  return base*24 + (valley - 0.5)*36 + mMask*ridge*92 - 9;
}

/* ---------- shared GLSL noise ---------- */
const GLSL_NOISE = `
float hash21(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453123); }
float vnoise(vec2 p){
  vec2 i = floor(p), f = fract(p);
  vec2 u = f*f*(3.0-2.0*f);
  float a = hash21(i), b = hash21(i+vec2(1.0,0.0));
  float c = hash21(i+vec2(0.0,1.0)), d = hash21(i+vec2(1.0,1.0));
  return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);
}
float fbm(vec2 p){
  float s = 0.0, a = 0.5;
  for(int i=0;i<4;i++){ s += a*vnoise(p); p = p*2.13 + vec2(19.7, 7.3); a *= 0.5; }
  return s;
}`;

/* ---------- terrain material (shared by all chunks) ---------- */
const terrainUniforms = {
  uLightDir:  { value: new THREE.Vector3(0.5,0.8,0.3) },
  uLightCol:  { value: new THREE.Color(0xfff3da) },
  uLightI:    { value: 1.2 },
  uAmb:       { value: new THREE.Color(0x8aa2bb) },
  uFogCol:    { value: new THREE.Color(0xc4dbe6) },
  uTime:      { value: 0 },
  uSnowLine:  { value: 46.0 }
};
const terrainMat = new THREE.ShaderMaterial({
  uniforms: terrainUniforms,
  side: THREE.DoubleSide, /* skirt walls must render from any angle */
  vertexShader: `
    attribute float ao;
    varying vec3 vNormal;
    varying vec3 vWorldPos;
    varying float vAo;
    void main(){
      vNormal = normal;
      vAo = ao;
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorldPos = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }`,
  fragmentShader: `
    uniform vec3 uLightDir;
    uniform vec3 uLightCol;
    uniform float uLightI;
    uniform vec3 uAmb;
    uniform vec3 uFogCol;
    uniform float uTime;
    uniform float uSnowLine;
    varying vec3 vNormal;
    varying vec3 vWorldPos;
    varying float vAo;
    ${GLSL_NOISE}
    void main(){
      vec3 N = normalize(vNormal);
      float slope = 1.0 - N.y;
      float h = vWorldPos.y;
      vec2 xz = vWorldPos.xz;
      float macro = fbm(xz*0.018);
      float jit = (macro - 0.5) * 16.0;

      vec3 grass = mix(vec3(0.13,0.24,0.09), vec3(0.34,0.40,0.15), vnoise(xz*0.11));
      grass = mix(grass, vec3(0.42,0.38,0.19), smoothstep(0.55,0.8,vnoise(xz*0.045+3.1))*0.5);
      vec3 sand = vec3(0.70,0.62,0.45);
      vec3 rock = mix(vec3(0.27,0.24,0.23), vec3(0.47,0.44,0.41), vnoise(xz*0.15+7.0));
      rock *= 0.88 + 0.24*vnoise(vec2(h*0.5, dot(xz,vec2(0.03))));
      vec3 snow = vec3(0.91,0.94,0.985);

      vec3 col = mix(sand, grass, smoothstep(1.5, 6.5, h + jit*0.4));
      col = mix(col, rock, smoothstep(0.20, 0.42, slope + (macro-0.5)*0.10));
      float snowM = smoothstep(uSnowLine + jit, uSnowLine + 12.0 + jit, h) * (1.0 - smoothstep(0.30, 0.62, slope));
      col = mix(col, snow, snowM);
      col = mix(col*vec3(0.45,0.60,0.62), col, smoothstep(-6.0, 0.6, h));

      float diff = max(dot(N, uLightDir), 0.0);
      vec3 amb = uAmb * (0.55 + 0.45*N.y);
      vec3 lit = col * (amb + uLightCol * diff * uLightI);
      vec3 V = normalize(cameraPosition - vWorldPos);
      vec3 Hv = normalize(uLightDir + V);
      lit += uLightCol * pow(max(dot(N,Hv),0.0), 72.0) * (snowM*0.55 + 0.04) * uLightI;
      lit *= (0.55 + 0.45*vAo);

      float dist = length(cameraPosition - vWorldPos);
      float fogF = 1.0 - exp(-pow(dist*0.0013, 1.6));
      float hfog = exp(-max(h, 0.0)*0.05) * smoothstep(80.0, 380.0, dist) * (0.32 + 0.12*sin(uTime*0.07 + macro*6.28));
      fogF = clamp(fogF + hfog, 0.0, 1.0);
      gl_FragColor = vec4(mix(lit, uFogCol, fogF), 1.0);
    }`
});

/* ---------- infinite chunk streaming ---------- */
const CHUNK = 400, VIEW_RING = 5, APRON = 4;
const chunks = new Map();
let buildQueue = [];
let lastCX = Infinity, lastCZ = Infinity;
const ringRes = ring => ring <= 1 ? 48 : ring <= 3 ? 24 : 12;

function disposeChunk(key, ch){
  scene.remove(ch.mesh);
  ch.mesh.geometry.dispose();
  if(ch.veg) ch.veg.forEach(m => { scene.remove(m); m.dispose(); });
  chunks.delete(key);
}

function planChunks(force){
  const ccx = Math.round(camera.position.x / CHUNK);
  const ccz = Math.round(camera.position.z / CHUNK);
  if(!force && ccx === lastCX && ccz === lastCZ) return;
  lastCX = ccx; lastCZ = ccz;
  const needed = new Map();
  for(let dz=-VIEW_RING; dz<=VIEW_RING; dz++){
    for(let dx=-VIEW_RING; dx<=VIEW_RING; dx++){
      const ring = Math.max(Math.abs(dx), Math.abs(dz));
      needed.set((ccx+dx)+','+(ccz+dz), { cx:ccx+dx, cz:ccz+dz, res:ringRes(ring), ring });
    }
  }
  for(const [key, ch] of [...chunks]) if(!needed.has(key)) disposeChunk(key, ch);
  buildQueue = [];
  for(const [key, want] of needed){
    const have = chunks.get(key);
    /* rebuild only for detail upgrades (or missing veg) — leaving a high-res
       chunk in a far ring is fine, it gets disposed once out of range */
    if(!have || have.res < want.res || (want.ring <= 2 && !have.hasVeg)){
      buildQueue.push({ key, cx:want.cx, cz:want.cz, res:want.res, ring:want.ring });
    }
  }
  buildQueue.sort((a,b) => a.ring - b.ring);
}

function buildChunk(cx, cz, res, ring){
  const step = CHUNK/res, w = res + 1 + APRON*2;
  const ox = cx*CHUNK - CHUNK/2, oz = cz*CHUNK - CHUNK/2;
  const Hg = new Float32Array(w*w);
  for(let iz=0; iz<w; iz++){
    const z = oz + (iz-APRON)*step;
    for(let ix=0; ix<w; ix++) Hg[iz*w+ix] = terrainH(ox + (ix-APRON)*step, z);
  }
  const W1 = res+1, main = W1*W1, total = main + 4*W1;
  const pos = new Float32Array(total*3), nor = new Float32Array(total*3), ao = new Float32Array(total);
  for(let iz=0; iz<W1; iz++){
    for(let ix=0; ix<W1; ix++){
      const vi = iz*W1+ix, gi = (iz+APRON)*w + (ix+APRON);
      pos[vi*3]   = ox + ix*step;
      pos[vi*3+1] = Hg[gi];
      pos[vi*3+2] = oz + iz*step;
      const nx = -(Hg[gi+1] - Hg[gi-1]) / (2*step);
      const nz = -(Hg[gi+w] - Hg[gi-w]) / (2*step);
      const inv = 1/Math.sqrt(nx*nx + 1 + nz*nz);
      nor[vi*3] = nx*inv; nor[vi*3+1] = inv; nor[vi*3+2] = nz*inv;
      const ring8 = Hg[gi+4] + Hg[gi-4] + Hg[gi+4*w] + Hg[gi-4*w]
                  + Hg[gi+3*w+3] + Hg[gi+3*w-3] + Hg[gi-3*w+3] + Hg[gi-3*w-3];
      ao[vi] = clamp01(1 - (ring8/8 - Hg[gi]) * 0.02);
    }
  }
  /* skirts: border ring dropped straight down — hides cracks between LOD levels */
  const skirtDepth = 10 + step;
  let sv = main;
  const addSkirt = mi => {
    pos[sv*3] = pos[mi*3]; pos[sv*3+1] = pos[mi*3+1] - skirtDepth; pos[sv*3+2] = pos[mi*3+2];
    nor[sv*3] = nor[mi*3]; nor[sv*3+1] = nor[mi*3+1]; nor[sv*3+2] = nor[mi*3+2];
    ao[sv] = ao[mi];
    return sv++;
  };
  const nS=[], sS=[], wS=[], eS=[];
  for(let i=0;i<W1;i++){
    nS.push(addSkirt(i));
    sS.push(addSkirt(res*W1 + i));
    wS.push(addSkirt(i*W1));
    eS.push(addSkirt(i*W1 + res));
  }
  const idx = new Uint32Array(res*res*6 + 4*res*6);
  let k = 0;
  for(let iz=0; iz<res; iz++){
    for(let ix=0; ix<res; ix++){
      const a = iz*W1+ix, b = a+1, c = a+W1, d = c+1;
      idx[k++]=a; idx[k++]=c; idx[k++]=b;
      idx[k++]=b; idx[k++]=c; idx[k++]=d;
    }
  }
  const seam = (mA, mB, sA, sB) => { idx[k++]=mA; idx[k++]=sA; idx[k++]=mB; idx[k++]=mB; idx[k++]=sA; idx[k++]=sB; };
  for(let i=0;i<res;i++){
    seam(i, i+1, nS[i], nS[i+1]);
    seam(res*W1+i, res*W1+i+1, sS[i], sS[i+1]);
    seam(i*W1, (i+1)*W1, wS[i], wS[i+1]);
    seam(i*W1+res, (i+1)*W1+res, eS[i], eS[i+1]);
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('normal',   new THREE.BufferAttribute(nor, 3));
  geo.setAttribute('ao',       new THREE.BufferAttribute(ao, 1));
  geo.setIndex(new THREE.BufferAttribute(idx, 1));
  geo.computeBoundingSphere();
  const mesh = new THREE.Mesh(geo, terrainMat);
  scene.add(mesh);

  let veg = null, hasVeg = false;
  if(ring <= 2){
    veg = buildVeg(cx, cz, Hg, w, step, ox, oz);
    hasVeg = true;
  }
  return { mesh, res, veg, hasVeg };
}

function processQueue(budget){
  while(budget-- > 0 && buildQueue.length){
    const job = buildQueue.shift();
    const old = chunks.get(job.key);
    const rec = buildChunk(job.cx, job.cz, job.res, job.ring);
    if(old) disposeChunk(job.key, old);
    chunks.set(job.key, rec);
  }
}

/* ---------- vegetation (per-chunk InstancedMesh pines) ---------- */
const trunkGeo = new THREE.CylinderGeometry(0.32, 0.5, 2.8, 5);
trunkGeo.translate(0, 1.4, 0);
const canopyGeo = new THREE.ConeGeometry(2.6, 8, 6);
canopyGeo.translate(0, 6.2, 0);
const trunkMat = new THREE.MeshLambertMaterial({ color: 0x4a3526 });
const canopyMat = new THREE.MeshLambertMaterial({ color: 0xffffff });
const vegDummy = new THREE.Object3D();
const vegColor = new THREE.Color();

function buildVeg(cx, cz, Hg, w, step, ox, oz){
  const rnd = makeRand(((cx*73856093) ^ (cz*19349663)) + 0x9e3779);
  const spots = [];
  for(let n=0; n<130; n++){
    const lx = rnd()*CHUNK, lz = rnd()*CHUNK;
    const sy = 0.75 + rnd()*0.55, rot = rnd()*Math.PI*2, hue = 0.24 + rnd()*0.12;
    const gx = lx/step + APRON, gz = lz/step + APRON;
    const ix = Math.floor(gx), iz = Math.floor(gz);
    if(ix < 1 || iz < 1 || ix > w-3 || iz > w-3) continue;
    const fx = gx-ix, fz = gz-iz;
    const h = Hg[iz*w+ix]*(1-fx)*(1-fz) + Hg[iz*w+ix+1]*fx*(1-fz)
            + Hg[(iz+1)*w+ix]*(1-fx)*fz + Hg[(iz+1)*w+ix+1]*fx*fz;
    if(h < 2.5 || h > 42) continue;
    const nx = (Hg[iz*w+ix+1] - Hg[iz*w+ix-1]) / (2*step);
    const nz = (Hg[(iz+1)*w+ix] - Hg[(iz-1)*w+ix]) / (2*step);
    if(1/Math.sqrt(nx*nx + 1 + nz*nz) < 0.86) continue;
    const wx = ox+lx, wz = oz+lz;
    if(fbm1(wx*0.012 + 61.7, wz*0.012 + 13.9, 3) < 0.48) continue; /* forest clumps */
    spots.push({ x:wx, y:h-0.3, z:wz, s:0.7 + rnd()*0.9, sy, rot, hue });
  }
  if(!spots.length) return null;
  const trunks = new THREE.InstancedMesh(trunkGeo, trunkMat, spots.length);
  const canopies = new THREE.InstancedMesh(canopyGeo, canopyMat, spots.length);
  trunks.frustumCulled = false; /* r128 instancing culls by base geometry bounds — wrong for scattered instances */
  canopies.frustumCulled = false;
  spots.forEach((m, i) => {
    vegDummy.position.set(m.x, m.y, m.z);
    vegDummy.rotation.set(0, m.rot, 0);
    vegDummy.scale.set(m.s, m.s*m.sy, m.s);
    vegDummy.updateMatrix();
    trunks.setMatrixAt(i, vegDummy.matrix);
    canopies.setMatrixAt(i, vegDummy.matrix);
    vegColor.setHSL(m.hue, 0.42, 0.16 + m.hue*0.35);
    canopies.setColorAt(i, vegColor);
  });
  scene.add(trunks); scene.add(canopies);
  return [trunks, canopies];
}

/* ---------- water (follows camera; waves are world-space, so it's seamless) ---------- */
const waterUniforms = {
  uLightDir: { value: new THREE.Vector3(0.5,0.8,0.3) },
  uLightCol: { value: new THREE.Color(0xfff3da) },
  uLightI:   { value: 1.2 },
  uDeep:     { value: new THREE.Color(0x0e3a55) },
  uSkyRef:   { value: new THREE.Color(0x86b4d4) },
  uFogCol:   { value: new THREE.Color(0xc4dbe6) },
  uTime:     { value: 0 }
};
const waterMat = new THREE.ShaderMaterial({
  uniforms: waterUniforms,
  transparent: true,
  vertexShader: `
    varying vec3 vWorldPos;
    void main(){
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorldPos = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }`,
  fragmentShader: `
    uniform vec3 uLightDir;
    uniform vec3 uLightCol;
    uniform float uLightI;
    uniform vec3 uDeep;
    uniform vec3 uSkyRef;
    uniform vec3 uFogCol;
    uniform float uTime;
    varying vec3 vWorldPos;
    ${GLSL_NOISE}
    float waveH(vec2 p){
      float t = uTime;
      float h = 0.0;
      h += sin(p.x*0.06 + t*1.1)*0.35;
      h += sin(dot(p, vec2(0.045,0.062)) + t*1.6)*0.25;
      h += vnoise(p*0.05 + vec2(t*0.14, t*0.10))*0.9;
      h += vnoise(p*0.16 + vec2(-t*0.20, t*0.07))*0.4;
      return h;
    }
    void main(){
      vec2 p = vWorldPos.xz;
      float e = 1.4;
      float hl = waveH(p - vec2(e,0.0)), hr = waveH(p + vec2(e,0.0));
      float hb = waveH(p - vec2(0.0,e)), hf = waveH(p + vec2(0.0,e));
      vec3 N = normalize(vec3(hl-hr, 2.6, hb-hf));
      vec3 V = normalize(cameraPosition - vWorldPos);
      float fres = pow(1.0 - max(dot(V, N), 0.0), 3.0);
      vec3 col = mix(uDeep, uSkyRef, 0.18 + fres*0.72);
      vec3 R = reflect(-uLightDir, N);
      float rv = max(dot(R, V), 0.0);
      col += uLightCol * pow(rv, 160.0) * 1.8 * uLightI;
      col += uLightCol * uLightI * 0.25 * pow(rv, 24.0) * vnoise(p*0.8 + uTime*0.5);
      float dist = length(cameraPosition - vWorldPos);
      float fogF = 1.0 - exp(-pow(dist*0.0013, 1.6));
      col = mix(col, uFogCol, clamp(fogF, 0.0, 1.0));
      gl_FragColor = vec4(col, 0.94);
    }`
});
const water = new THREE.Mesh(new THREE.PlaneGeometry(6000, 6000, 1, 1), waterMat);
water.rotation.x = -Math.PI/2;
scene.add(water);

/* ---------- sky ---------- */
const skyUniforms = {
  uZen:      { value: new THREE.Color(0x3672b9) },
  uHor:      { value: new THREE.Color(0xd6ebf4) },
  uSunDir:   { value: new THREE.Vector3(0.5,0.8,0.3) },
  uMoonDir:  { value: new THREE.Vector3(-0.5,0.4,-0.3) },
  uSunCol:   { value: new THREE.Color(0xfff6e0) },
  uCloudCol: { value: new THREE.Color(0xffffff) },
  uDayF:     { value: 1.0 },
  uTime:     { value: 0 }
};
const skyMat = new THREE.ShaderMaterial({
  uniforms: skyUniforms,
  side: THREE.BackSide,
  depthWrite: false,
  vertexShader: `
    varying vec3 vDir;
    void main(){
      vDir = (modelMatrix * vec4(position, 1.0)).xyz - cameraPosition;
      gl_Position = projectionMatrix * viewMatrix * modelMatrix * vec4(position, 1.0);
    }`,
  fragmentShader: `
    uniform vec3 uZen;
    uniform vec3 uHor;
    uniform vec3 uSunDir;
    uniform vec3 uMoonDir;
    uniform vec3 uSunCol;
    uniform vec3 uCloudCol;
    uniform float uDayF;
    uniform float uTime;
    varying vec3 vDir;
    ${GLSL_NOISE}
    float hash31(vec3 p){ return fract(sin(dot(p, vec3(12.9898,78.233,45.164)))*43758.5453123); }
    void main(){
      vec3 dir = normalize(vDir);
      float y = dir.y;
      vec3 col = mix(uHor, uZen, pow(clamp(y*1.15 + 0.08, 0.0, 1.0), 0.75));

      float sd = clamp(dot(dir, uSunDir), 0.0, 1.0);
      col += uSunCol * (pow(sd, 1400.0)*1.6 + pow(sd, 24.0)*0.28 + pow(sd, 5.0)*0.10);

      float md = clamp(dot(dir, uMoonDir), 0.0, 1.0);
      col += vec3(0.75,0.82,0.95) * (pow(md, 2600.0)*0.9 + pow(md, 40.0)*0.10) * (1.0 - uDayF);

      vec3 sp = floor(dir*230.0);
      float star = step(0.9982, hash31(sp));
      float tw = 0.55 + 0.45*sin(uTime*2.4 + hash31(sp.zxy)*40.0);
      col += vec3(0.9,0.95,1.0) * star * tw * (1.0 - uDayF) * smoothstep(0.03, 0.25, y) * 0.85;

      float cm = smoothstep(0.02, 0.16, y);
      if(cm > 0.001){
        vec2 cuv = dir.xz / (y + 0.18);
        vec2 drift = vec2(uTime*0.006, uTime*0.0023);
        float c = fbm(cuv*0.55 + drift);
        c = smoothstep(0.42, 0.72, c + 0.12*fbm(cuv*1.7 - drift*2.0));
        float shade = fbm(cuv*0.9 + drift + 3.7);
        vec3 cc = uCloudCol * (0.72 + 0.5*shade);
        cc += uSunCol * pow(sd, 6.0) * 0.35;
        col = mix(col, cc, c * cm * 0.85);
      }
      gl_FragColor = vec4(col, 1.0);
    }`
});
const sky = new THREE.Mesh(new THREE.SphereGeometry(5000, 40, 24), skyMat);
scene.add(sky);

];

const birds = [];
{
  const rnd = makeRand(777);
  for(let i=0;i<BIRD_N;i++){
    birds.push({
      f: i % FLOCKS.length,
      ang: rnd()*Math.PI*2,
      r: 30 + rnd()*70,
      sp: 0.22 + rnd()*0.3,
      ph: rnd()*Math.PI*2,
      alt: (rnd()-0.5)*36
    });
  }
}
const _fv = new THREE.Vector3();
function updateBirds(dt, t, dayF){
  birdMesh.visible = dayF > 0.08;
  if(!birdMesh.visible) return;
  birdMat.opacity = 0.25 + 0.75*dayF;
  const k = 1 - Math.exp(-0.25*dt);
  for(const f of FLOCKS){
    _fv.copy(camera.position).add(f.off);
    f.pos.lerp(_fv, k);
  }
  for(let i=0;i<BIRD_N;i++){
    const b = birds[i], f = FLOCKS[b.f];
    b.ang += b.sp*dt;
    const px = f.pos.x + Math.cos(b.ang)*b.r;
    const pz = f.pos.z + Math.sin(b.ang)*b.r;
    let py = f.pos.y + b.alt + Math.sin(b.ang*1.7 + b.ph)*10;
    const gy = terrainH(px, pz);
    if(py < gy + 25) py = gy + 25;
    birdDummy.position.set(px, py, pz);
    birdDummy.lookAt(px - Math.sin(b.ang), py, pz + Math.cos(b.ang));
    const flap = Math.sin(t*9 + b.ph);
    birdDummy.rotation.z += flap*0.35;
    birdDummy.scale.set(1 + 0.3*flap, 1, 1);
    birdDummy.updateMatrix();
    birdMesh.setMatrixAt(i, birdDummy.matrix);
  }
  birdMesh.instanceMatrix.needsUpdate = true;
}

/* ---------- day/night palettes ---------- */
const C = hex => new THREE.Color(hex);
const PAL = {
  night: { zen:C(0x030711), hor:C(0x0e1830), light:C(0x5a6fa8), li:0.34, amb:C(0x232c44), fog:C(0x0a1222), deep:C(0x06121f), ref:C(0x14213a), cloud:C(0x141d31), sun:C(0xc8d8ff) },
  dusk:  { zen:C(0x24335f), hor:C(0xff8a4c), light:C(0xffa04e), li:1.00, amb:C(0x584a5a), fog:C(0xd88a5e), deep:C(0x1c2f42), ref:C(0xe6906a), cloud:C(0xffb98a), sun:C(0xffc98a) },
  day:   { zen:C(0x3672b9), hor:C(0xd6ebf4), light:C(0xfff3da), li:1.28, amb:C(0x8aa2bb), fog:C(0xc4dbe6), deep:C(0x0e3a55), ref:C(0x9cc3de), cloud:C(0xffffff), sun:C(0xfff6e0) }
};
const cur = { zen:C(0), hor:C(0), light:C(0), li:1, amb:C(0), fog:C(0), deep:C(0), ref:C(0), cloud:C(0), sun:C(0) };
function palMix(a, b, t){
  for(const key of ['zen','hor','light','amb','fog','deep','ref','cloud','sun']){
    cur[key].lerpColors(a[key], b[key], t);
  }
  cur.li = lerp(a.li, b.li, t);
}

/* ---------- day cycle ---------- */
const sunDir = new THREE.Vector3();
const moonDir = new THREE.Vector3();
const lightDir = new THREE.Vector3();
let phi = 0.55;
let paused = false;
const SPEEDS = [1, 4, 12];
let speedIdx = 0;
const DAY_SECONDS = 160;
let dayF = 1;

const clockEl = document.getElementById('clock');
function updateCycle(dt, t){
  if(!paused) phi += dt * SPEEDS[speedIdx] * (Math.PI*2 / DAY_SECONDS);
  const sx = Math.cos(phi), sy = Math.sin(phi);
  sunDir.set(sx*0.85, sy, 0.5 - sx*0.2).normalize();
  moonDir.set(-sx*0.85, -sy, -(0.5 - sx*0.2)).normalize();
  const e = sunDir.y;

  /* hard select light source: sunDir and moonDir are antiparallel, lerping
     them through 0.5 would collapse to a zero vector and NaN the shaders */
  lightDir.copy(e > -0.02 ? sunDir : moonDir);
  if(lightDir.y < 0.06){ lightDir.y = 0.06; lightDir.normalize(); }

  if(e < 0) palMix(PAL.night, PAL.dusk, sstep(-0.38, 0.0, e));
  else      palMix(PAL.dusk,  PAL.day,  sstep(0.0, 0.42, e));
  dayF = sstep(-0.12, 0.28, e);

  terrainUniforms.uLightDir.value.copy(lightDir);
  terrainUniforms.uLightCol.value.copy(cur.light);
  terrainUniforms.uLightI.value = cur.li;
  terrainUniforms.uAmb.value.copy(cur.amb);
  terrainUniforms.uFogCol.value.copy(cur.fog);
  terrainUniforms.uTime.value = t;

  waterUniforms.uLightDir.value.copy(lightDir);
  waterUniforms.uLightCol.value.copy(cur.light);
  waterUniforms.uLightI.value = cur.li;
  waterUniforms.uDeep.value.copy(cur.deep);
  waterUniforms.uSkyRef.value.copy(cur.ref);
  waterUniforms.uFogCol.value.copy(cur.fog);
  waterUniforms.uTime.value = t;

  skyUniforms.uZen.value.copy(cur.zen);
  skyUniforms.uHor.value.copy(cur.hor);
  skyUniforms.uSunDir.value.copy(sunDir);
  skyUniforms.uMoonDir.value.copy(moonDir);
  skyUniforms.uSunCol.value.copy(cur.sun);
  skyUniforms.uCloudCol.value.copy(cur.cloud);
  skyUniforms.uDayF.value = dayF;
  skyUniforms.uTime.value = t;

  dirLight.position.copy(lightDir);
  dirLight.color.copy(cur.light);
  dirLight.intensity = cur.li * 0.9;
  ambLight.color.copy(cur.amb);
  scene.fog.color.copy(cur.fog);

  const dayFrac = ((phi / (Math.PI*2)) % 1 + 1) % 1;
  const mins = Math.floor((dayFrac*24 + 6) % 24 * 60);
  const hh = String(Math.floor(mins/60)).padStart(2,'0');
  const mm = String(mins%60).padStart(2,'0');
  clockEl.textContent = hh + ':' + mm;
}

/* steering by drag: horizontal offset = bank, vertical offset = pitch */
canvas.addEventListener('pointerdown', e => {
  if(mode !== 'bird' || dragging) return;
  dragging = true; dragId = e.pointerId;
  dragSX = e.clientX; dragSY = e.clientY;
  canvas.setPointerCapture(e.pointerId);
  hideHint();
});
canvas.addEventListener('pointermove', e => {
  if(mode !== 'bird' || !dragging || e.pointerId !== dragId) return;
  dragBank  = Math.max(-1, Math.min(1, (e.clientX - dragSX) / 110));
  dragPitch = Math.max(-1, Math.min(1, (dragSY - e.clientY) / 110));
});
const endDrag = e => { if(e.pointerId === dragId){ dragging = false; dragBank = 0; dragPitch = 0; } };

  if(e.key === 'f' || e.key === 'F'){ (mode === 'bird') ? enterOrbit() : enterBird(); return; }
  if(mode !== 'bird') return;
  if(e.key === 'Escape'){ enterOrbit(); return; }
  keys[e.code] = true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});

const _fwd = new THREE.Vector3();
function updatePlayerFlight(dt){
  const bankIn  = Math.max(-1, Math.min(1, (keys['ArrowRight'] ? 1 : 0) + (keys['ArrowLeft'] ? -1 : 0) + dragBank));
  const pitchIn = Math.max(-1, Math.min(1, (keys['ArrowUp'] ? 1 : 0) + (keys['ArrowDown'] ? -1 : 0) + dragPitch));

  /* stall: bleed too much speed climbing and the nose drops on its own */
  const stall = clamp01((40 - airspeed) / 8);
  const pitchTarget = pitchIn*0.72 - stall*0.55;
  pitch = lerp(pitch, pitchTarget, 1 - Math.exp(-3.2*dt));
  bank  = lerp(bank, bankIn*0.85, 1 - Math.exp(-4.5*dt));
  yaw  -= bank * dt * (0.75 + 45/airspeed);

  /* energy: dive to gain, climb to bleed, drag pulls toward cruise */
  airspeed += (-Math.sin(pitch)*55 - (airspeed - CRUISE)*0.30) * dt;
  airspeed = Math.max(V_MIN, Math.min(V_MAX, airspeed));

  _fwd.set(-Math.sin(yaw)*Math.cos(pitch), Math.sin(pitch), -Math.cos(yaw)*Math.cos(pitch));
  camera.position.addScaledVector(_fwd, airspeed*dt);

  /* ground assist — birds don't faceplant */
  const gy = terrainH(camera.position.x, camera.position.z);
  const minY = Math.max(gy + 3.5, 2.2);
  if(camera.position.y < minY){
    camera.position.y = minY;
    if(pitch < 0.12) pitch = lerp(pitch, 0.2, 1 - Math.exp(-8*dt));
  }
  if(camera.position.y > 1500){ camera.position.y = 1500; if(pitch > 0) pitch *= 0.9; }

  camera.rotation.set(pitch, yaw, -bank*0.9);

  if(bodyType === 'bird'){
    /* wings flap when climbing or slow; lock into a shallow V when gliding */
    const flapping = pitchIn > 0.2 || airspeed < CRUISE - 6;
    flapPhase += dt * (flapping ? 10 : 2.0);
    const a = flapping ? Math.sin(flapPhase)*0.5 : 0.06 + Math.sin(flapPhase)*0.06;
    wingR.rotation.z = a;
    wingL.rotation.z = -a;
  }else{
    /* nylon doesn't flap — it flutters, harder the faster you go */
    flapPhase += dt * (4 + airspeed*0.09);
    const buzz = Math.sin(flapPhase*5.3)*0.014*(0.4 + clamp01(airspeed/V_MAX));
    sWingR.rotation.z = -0.04 + buzz;
    sWingL.rotation.z =  0.04 - buzz;
  }

  /* speed reads as field of view */
  const targetFov = baseFov + clamp01((airspeed - CRUISE)/150) * (reduceMotion ? 6 : 16);
  if(Math.abs(camera.fov - targetFov) > 0.05){
    camera.fov = lerp(camera.fov, targetFov, 1 - Math.exp(-5*dt));
    camera.updateProjectionMatrix();
  }
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ---------- boot: build the near world synchronously, stream the rest ---------- */
planChunks(true);
{
  let guard = 0;
  while(buildQueue.length && buildQueue[0].ring <= 1 && guard++ < 16) processQueue(1);
}
/* take off immediately — the app opens mid-glide */
camera.position.set(-160, 150, 230);
camera.lookAt(0, 60, 0);
enterBird();

/* ---------- loop ---------- */
const clock = new THREE.Clock();
let elapsed = 0;
function frame(){
  requestAnimationFrame(frame);
  const dt = Math.min(clock.getDelta(), 0.1);
  elapsed += dt;
  updateCycle(dt, elapsed);
  if(mode === 'bird') updatePlayerFlight(dt);
  else controls.update();
  planChunks(false);
  processQueue(dt > 0.03 ? 1 : 2);
  water.position.set(camera.position.x, 0, camera.position.z);
  sky.position.copy(camera.position);
  updateBirds(dt, elapsed, dayF);
  renderer.render(scene, camera);
}
frame();
document.getElementById('loading').classList.add('done');
})();
</script>
</body>
</html>
