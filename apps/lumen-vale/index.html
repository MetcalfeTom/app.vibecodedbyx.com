<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lumen Vale</title>
<meta name="description" content="A living mountain valley — watch the sun rise and set over shader-painted peaks, mist and water.">
<link rel="icon" href="https://emojicdn.elk.sh/🏔️">
<meta property="og:title" content="Lumen Vale">
<meta property="og:description" content="A living mountain valley — sun, mist, snow and water, all painted by shaders. Drag to look around.">
<meta property="og:url" content="https://sloppy.live/lumen-vale/">
<meta property="og:type" content="website">
<meta property="og:image" content="https://image.pollinations.ai/prompt/epic%20painterly%20mountain%20valley%20at%20golden%20hour%2C%20alpine%20lake%20mirror%20reflection%2C%20snowy%20ridges%2C%20volumetric%20mist%2C%20dramatic%20sunset%20sky%2C%20rich%20saturated%20color%2C%20wide%20cinematic%20landscape.png?width=1200&height=630&seed=4127&model=flux&nologo=true">
<style>
  :root{
    --ink:#eef3f8;
    --dim:#9fb2c4;
    --glass:rgba(8,14,24,0.55);
    --edge:rgba(180,210,240,0.22);
    --accent:#ffc06a;
  }
  html{ font-size:100%; }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    font-family:"Space Mono", ui-monospace, monospace;
    background:#060a14;
    color:var(--ink);
    overflow:hidden;
    height:100dvh;
  }
  #scene{ position:fixed; inset:0; display:block; touch-action:none; }
  .vignette{
    position:fixed; inset:0; pointer-events:none;
    background:radial-gradient(ellipse at 50% 42%, transparent 58%, rgba(2,4,10,0.42) 100%);
  }
  header{
    position:fixed; top:1.1rem; left:1.25rem; z-index:5;
    transition:opacity 1.6s ease;
    pointer-events:none;
  }
  header.faded{ opacity:0.28; }
  h1{
    font-family:"Fraunces", Georgia, serif;
    font-weight:300; font-style:italic;
    font-size:clamp(1.9rem, 4.5vw, 3rem);
    letter-spacing:0.04em;
    color:var(--ink);
    text-shadow:0 2px 18px rgba(0,0,0,0.55);
  }
  h1 em{ font-style:italic; color:var(--accent); }
  .tag{
    font-size:0.68rem; letter-spacing:0.28em; text-transform:uppercase;
    color:var(--dim); margin-top:0.35rem;
    text-shadow:0 1px 8px rgba(0,0,0,0.6);
  }
  .hint{
    position:fixed; bottom:1.1rem; left:50%; transform:translateX(-50%);
    z-index:5; font-size:0.72rem; letter-spacing:0.14em; color:var(--dim);
    background:var(--glass); border:1px solid var(--edge);
    padding:0.5rem 1rem; border-radius:999px;
    backdrop-filter:blur(6px);
    transition:opacity 1.4s ease;
    text-align:center; white-space:nowrap;
    pointer-events:none;
  }
  .hint.gone{ opacity:0; }
  .panel{
    position:fixed; right:1.1rem; bottom:1.1rem; z-index:6;
    display:flex; gap:0.5rem;
  }
  .panel button{
    min-width:2.75rem; min-height:2.75rem;
    padding:0 0.85rem;
    font-family:inherit; font-size:0.82rem; letter-spacing:0.06em;
    color:var(--ink);
    background:var(--glass); border:1px solid var(--edge);
    border-radius:0.75rem; cursor:pointer;
    backdrop-filter:blur(6px);
    transition:border-color 0.2s ease, transform 0.15s ease;
  }
  .panel button:hover{ border-color:var(--accent); transform:translateY(-2px); }
  .panel button:focus-visible{ outline:3px solid var(--accent); outline-offset:2px; }
  .panel button[aria-pressed="true"]{ color:var(--accent); border-color:var(--accent); }
  #flyFwd{
    position:fixed; left:1.1rem; bottom:1.1rem; z-index:6;
    display:none; align-items:center; justify-content:center;
    width:4.5rem; height:4.5rem; border-radius:50%;
    font-family:inherit; font-size:1.4rem; color:var(--ink);
    background:var(--glass); border:1px solid var(--edge);
    backdrop-filter:blur(6px); cursor:pointer;
    touch-action:none; user-select:none; -webkit-user-select:none;
  }
  #flyFwd.show{ display:flex; }
  #flyFwd:focus-visible{ outline:3px solid var(--accent); outline-offset:2px; }
  #flyFwd.held{ color:var(--accent); border-color:var(--accent); }
  #clock{
    position:fixed; right:1.1rem; top:1.1rem; z-index:5;
    font-size:0.7rem; letter-spacing:0.22em; color:var(--dim);
    background:var(--glass); border:1px solid var(--edge);
    padding:0.5rem 0.9rem; border-radius:999px;
    backdrop-filter:blur(6px);
    pointer-events:none;
  }
  #loading{
    position:fixed; inset:0; z-index:10;
    display:flex; align-items:center; justify-content:center;
    background:#060a14;
    font-size:0.75rem; letter-spacing:0.3em; text-transform:uppercase; color:var(--dim);
    transition:opacity 0.9s ease;
  }
  #loading.done{ opacity:0; pointer-events:none; }
  #err{
    position:fixed; inset:0; z-index:11; display:none;
    align-items:center; justify-content:center; text-align:center;
    background:#060a14; color:var(--ink); padding:2rem;
    font-size:0.9rem; line-height:1.7;
  }
  @media (max-width:640px){
    .hint{ font-size:0.62rem; }
  }
  @media (prefers-reduced-motion: reduce){
    .panel button{ transition:none; }
  }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@1,300;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
<canvas id="scene" role="application" aria-label="Interactive 3D mountain landscape. Drag to orbit the camera, scroll or pinch to zoom. Press F for bird flight mode: WASD to fly, drag to look around, Shift to boost, Escape to exit. Buttons below control flight mode and the day cycle."></canvas>
<div class="vignette" aria-hidden="true"></div>

<header id="hdr">
  <h1>lumen <em>vale</em></h1>
  <p class="tag">a living landscape</p>
</header>

<p id="clock" role="status" aria-live="off">—</p>

<p class="hint" id="hint">drag to look · scroll to zoom</p>

<div class="panel" role="group" aria-label="Scene controls">
  <button type="button" id="btnFly" aria-pressed="false" title="Toggle bird flight mode (F)">🕊 fly</button>
  <button type="button" id="btnPause" aria-pressed="false" title="Pause the sun">⏸ sun</button>
  <button type="button" id="btnSpeed" title="Day cycle speed">1×</button>
</div>
<button type="button" id="flyFwd" aria-label="Hold to fly forward">🕊</button>

<div id="loading">shaping the valley…</div>
<div id="err"><p>This landscape needs WebGL, which your browser or device declined to provide.<br>Try a different browser — the valley will wait.</p></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
(function(){
'use strict';

/* ---------- helpers ---------- */
const clamp01 = v => Math.min(1, Math.max(0, v));
const lerp = (a,b,t) => a + (b-a)*t;
const sstep = (a,b,v) => { const t = clamp01((v-a)/(b-a)); return t*t*(3-2*t); };
const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

/* ---------- renderer ---------- */
const canvas = document.getElementById('scene');
let renderer;
try{
  renderer = new THREE.WebGLRenderer({ canvas, antialias:true, powerPreference:'high-performance' });
}catch(e){
  document.getElementById('err').style.display = 'flex';
  document.getElementById('loading').classList.add('done');
  return;
}
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.setSize(window.innerWidth, window.innerHeight);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.5, 12000);
camera.position.set(-160, 95, 230);

const controls = new THREE.OrbitControls(camera, canvas);
controls.target.set(0, 18, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 45;
controls.maxDistance = 850;
controls.maxPolarAngle = 1.52;
controls.autoRotate = !reduceMotion;
controls.autoRotateSpeed = 0.22;
controls.addEventListener('start', () => { controls.autoRotate = false; hideHint(); });

/* ---------- CPU noise for terrain generation ---------- */
function makeNoise(seed){
  const hash = (x,y) => {
    const n = Math.sin(x*127.1 + y*311.7 + seed*74.7) * 43758.5453;
    return n - Math.floor(n);
  };
  return function(x,y){
    const ix = Math.floor(x), iy = Math.floor(y);
    const fx = x-ix, fy = y-iy;
    const ux = fx*fx*(3-2*fx), uy = fy*fy*(3-2*fy);
    const a = hash(ix,iy), b = hash(ix+1,iy), c = hash(ix,iy+1), d = hash(ix+1,iy+1);
    return a + (b-a)*ux + (c-a)*uy + (a-b-c+d)*ux*uy;
  };
}
const n1 = makeNoise(3.7), n2 = makeNoise(11.3);

function fbm1(x, y, oct){
  let a = 0.5, f = 1, s = 0, norm = 0;
  for(let i=0;i<oct;i++){
    s += a * n1(x*f + i*13.7, y*f + i*7.1);
    norm += a; f *= 2.03; a *= 0.5;
  }
  return s / norm;
}
function ridged(x, y, oct){
  let a = 0.5, f = 1, s = 0, norm = 0;
  for(let i=0;i<oct;i++){
    let v = 1 - Math.abs(2*n2(x*f + i*5.3, y*f + i*9.7) - 1);
    v *= v;
    s += a*v; norm += a; f *= 2.11; a *= 0.52;
  }
  return s / norm;
}

const SIZE = 1000, RES = 240, STEP = SIZE/RES, W = RES + 1;

function terrainH(x, z){
  const s = 0.0035;
  let wx = x*s, wz = z*s;
  const qx = fbm1(wx + 5.2, wz + 1.3, 4);
  const qz = fbm1(wx + 9.7, wz + 8.1, 4);
  wx += (qx - 0.5) * 1.1;
  wz += (qz - 0.5) * 1.1;
  const base   = fbm1(wx, wz, 5);
  const valley = fbm1(wx*0.35 + 40.0, wz*0.35 + 20.0, 3);
  const mMask  = Math.pow(clamp01(fbm1(wx*0.55 + 31.4, wz*0.55 + 17.8, 3) * 1.8 - 0.55), 1.7);
  const ridge  = ridged(wx*1.9 + 7.7, wz*1.9 + 3.1, 5);
  let h = base*24 + (valley - 0.5)*36 + mMask*ridge*92 - 9;
  const d = Math.hypot(x, z) / (SIZE*0.5);
  const edge = Math.max(0, d - 0.80);
  h -= edge*edge*1100;
  return h;
}

/* height grid */
const H = new Float32Array(W*W);
for(let iy=0; iy<W; iy++){
  const z = -SIZE/2 + iy*STEP;
  for(let ix=0; ix<W; ix++){
    H[iy*W + ix] = terrainH(-SIZE/2 + ix*STEP, z);
  }
}
const gh = (ix,iy) => H[Math.min(RES,Math.max(0,iy))*W + Math.min(RES,Math.max(0,ix))];

/* geometry */
const positions = new Float32Array(W*W*3);
const normals   = new Float32Array(W*W*3);
const aoArr     = new Float32Array(W*W);
for(let iy=0; iy<W; iy++){
  for(let ix=0; ix<W; ix++){
    const i = iy*W + ix;
    positions[i*3]   = -SIZE/2 + ix*STEP;
    positions[i*3+1] = H[i];
    positions[i*3+2] = -SIZE/2 + iy*STEP;
    const nx = -(gh(ix+1,iy) - gh(ix-1,iy)) / (2*STEP);
    const nz = -(gh(ix,iy+1) - gh(ix,iy-1)) / (2*STEP);
    const inv = 1/Math.sqrt(nx*nx + 1 + nz*nz);
    normals[i*3]   = nx*inv;
    normals[i*3+1] = inv;
    normals[i*3+2] = nz*inv;
    /* cavity AO: compare to ring average */
    let sum = 0;
    sum += gh(ix+4,iy) + gh(ix-4,iy) + gh(ix,iy+4) + gh(ix,iy-4);
    sum += gh(ix+9,iy+9) + gh(ix-9,iy+9) + gh(ix+9,iy-9) + gh(ix-9,iy-9);
    aoArr[i] = clamp01(1 - (sum/8 - H[i]) * 0.02);
  }
}
const indices = new Uint32Array(RES*RES*6);
let k = 0;
for(let iy=0; iy<RES; iy++){
  for(let ix=0; ix<RES; ix++){
    const a = iy*W + ix, b = a+1, c = a+W, d = c+1;
    indices[k++]=a; indices[k++]=c; indices[k++]=b;
    indices[k++]=b; indices[k++]=c; indices[k++]=d;
  }
}
const terrainGeo = new THREE.BufferGeometry();
terrainGeo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
terrainGeo.setAttribute('normal',   new THREE.BufferAttribute(normals, 3));
terrainGeo.setAttribute('ao',       new THREE.BufferAttribute(aoArr, 1));
terrainGeo.setIndex(new THREE.BufferAttribute(indices, 1));

/* ---------- shared GLSL noise ---------- */
const GLSL_NOISE = `
float hash21(vec2 p){ return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453123); }
float vnoise(vec2 p){
  vec2 i = floor(p), f = fract(p);
  vec2 u = f*f*(3.0-2.0*f);
  float a = hash21(i), b = hash21(i+vec2(1.0,0.0));
  float c = hash21(i+vec2(0.0,1.0)), d = hash21(i+vec2(1.0,1.0));
  return mix(mix(a,b,u.x), mix(c,d,u.x), u.y);
}
float fbm(vec2 p){
  float s = 0.0, a = 0.5;
  for(int i=0;i<4;i++){ s += a*vnoise(p); p = p*2.13 + vec2(19.7, 7.3); a *= 0.5; }
  return s;
}`;

/* ---------- terrain material ---------- */
const terrainUniforms = {
  uLightDir:  { value: new THREE.Vector3(0.5,0.8,0.3) },
  uLightCol:  { value: new THREE.Color(0xfff3da) },
  uLightI:    { value: 1.2 },
  uAmb:       { value: new THREE.Color(0x8aa2bb) },
  uFogCol:    { value: new THREE.Color(0xc4dbe6) },
  uTime:      { value: 0 },
  uSnowLine:  { value: 46.0 }
};
const terrainMat = new THREE.ShaderMaterial({
  uniforms: terrainUniforms,
  vertexShader: `
    attribute float ao;
    varying vec3 vNormal;
    varying vec3 vWorldPos;
    varying float vAo;
    void main(){
      vNormal = normal;
      vAo = ao;
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorldPos = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }`,
  fragmentShader: `
    uniform vec3 uLightDir;
    uniform vec3 uLightCol;
    uniform float uLightI;
    uniform vec3 uAmb;
    uniform vec3 uFogCol;
    uniform float uTime;
    uniform float uSnowLine;
    varying vec3 vNormal;
    varying vec3 vWorldPos;
    varying float vAo;
    ${GLSL_NOISE}
    void main(){
      vec3 N = normalize(vNormal);
      float slope = 1.0 - N.y;
      float h = vWorldPos.y;
      vec2 xz = vWorldPos.xz;
      float macro = fbm(xz*0.018);
      float jit = (macro - 0.5) * 16.0;

      vec3 grass = mix(vec3(0.13,0.24,0.09), vec3(0.34,0.40,0.15), vnoise(xz*0.11));
      grass = mix(grass, vec3(0.42,0.38,0.19), smoothstep(0.55,0.8,vnoise(xz*0.045+3.1))*0.5);
      vec3 sand = vec3(0.70,0.62,0.45);
      vec3 rock = mix(vec3(0.27,0.24,0.23), vec3(0.47,0.44,0.41), vnoise(xz*0.15+7.0));
      rock *= 0.88 + 0.24*vnoise(vec2(h*0.5, dot(xz,vec2(0.03))));
      vec3 snow = vec3(0.91,0.94,0.985);

      vec3 col = mix(sand, grass, smoothstep(1.5, 6.5, h + jit*0.4));
      col = mix(col, rock, smoothstep(0.20, 0.42, slope + (macro-0.5)*0.10));
      float snowM = smoothstep(uSnowLine + jit, uSnowLine + 12.0 + jit, h) * (1.0 - smoothstep(0.30, 0.62, slope));
      col = mix(col, snow, snowM);
      col = mix(col*vec3(0.45,0.60,0.62), col, smoothstep(-6.0, 0.6, h));

      float diff = max(dot(N, uLightDir), 0.0);
      vec3 amb = uAmb * (0.55 + 0.45*N.y);
      vec3 lit = col * (amb + uLightCol * diff * uLightI);
      vec3 V = normalize(cameraPosition - vWorldPos);
      vec3 Hv = normalize(uLightDir + V);
      lit += uLightCol * pow(max(dot(N,Hv),0.0), 72.0) * (snowM*0.55 + 0.04) * uLightI;
      lit *= (0.55 + 0.45*vAo);

      float dist = length(cameraPosition - vWorldPos);
      float fogF = 1.0 - exp(-pow(dist*0.0013, 1.6));
      float hfog = exp(-max(h, 0.0)*0.05) * smoothstep(80.0, 380.0, dist) * (0.32 + 0.12*sin(uTime*0.07 + macro*6.28));
      fogF = clamp(fogF + hfog, 0.0, 1.0);
      gl_FragColor = vec4(mix(lit, uFogCol, fogF), 1.0);
    }`
});
scene.add(new THREE.Mesh(terrainGeo, terrainMat));

/* ---------- water ---------- */
const waterUniforms = {
  uLightDir: { value: new THREE.Vector3(0.5,0.8,0.3) },
  uLightCol: { value: new THREE.Color(0xfff3da) },
  uLightI:   { value: 1.2 },
  uDeep:     { value: new THREE.Color(0x0e3a55) },
  uSkyRef:   { value: new THREE.Color(0x86b4d4) },
  uFogCol:   { value: new THREE.Color(0xc4dbe6) },
  uTime:     { value: 0 }
};
const waterMat = new THREE.ShaderMaterial({
  uniforms: waterUniforms,
  transparent: true,
  vertexShader: `
    varying vec3 vWorldPos;
    void main(){
      vec4 wp = modelMatrix * vec4(position, 1.0);
      vWorldPos = wp.xyz;
      gl_Position = projectionMatrix * viewMatrix * wp;
    }`,
  fragmentShader: `
    uniform vec3 uLightDir;
    uniform vec3 uLightCol;
    uniform float uLightI;
    uniform vec3 uDeep;
    uniform vec3 uSkyRef;
    uniform vec3 uFogCol;
    uniform float uTime;
    varying vec3 vWorldPos;
    ${GLSL_NOISE}
    float waveH(vec2 p){
      float t = uTime;
      float h = 0.0;
      h += sin(p.x*0.06 + t*1.1)*0.35;
      h += sin(dot(p, vec2(0.045,0.062)) + t*1.6)*0.25;
      h += vnoise(p*0.05 + vec2(t*0.14, t*0.10))*0.9;
      h += vnoise(p*0.16 + vec2(-t*0.20, t*0.07))*0.4;
      return h;
    }
    void main(){
      vec2 p = vWorldPos.xz;
      float e = 1.4;
      float hl = waveH(p - vec2(e,0.0)), hr = waveH(p + vec2(e,0.0));
      float hb = waveH(p - vec2(0.0,e)), hf = waveH(p + vec2(0.0,e));
      vec3 N = normalize(vec3(hl-hr, 2.6, hb-hf));
      vec3 V = normalize(cameraPosition - vWorldPos);
      float fres = pow(1.0 - max(dot(V, N), 0.0), 3.0);
      vec3 col = mix(uDeep, uSkyRef, 0.18 + fres*0.72);
      vec3 R = reflect(-uLightDir, N);
      float rv = max(dot(R, V), 0.0);
      col += uLightCol * pow(rv, 160.0) * 1.8 * uLightI;
      col += uLightCol * uLightI * 0.25 * pow(rv, 24.0) * vnoise(p*0.8 + uTime*0.5);
      float dist = length(cameraPosition - vWorldPos);
      float fogF = 1.0 - exp(-pow(dist*0.0013, 1.6));
      col = mix(col, uFogCol, clamp(fogF, 0.0, 1.0));
      gl_FragColor = vec4(col, 0.94);
    }`
});
const water = new THREE.Mesh(new THREE.PlaneGeometry(SIZE*3.2, SIZE*3.2, 1, 1), waterMat);
water.rotation.x = -Math.PI/2;
scene.add(water);

/* ---------- sky ---------- */
const skyUniforms = {
  uZen:      { value: new THREE.Color(0x3672b9) },
  uHor:      { value: new THREE.Color(0xd6ebf4) },
  uSunDir:   { value: new THREE.Vector3(0.5,0.8,0.3) },
  uMoonDir:  { value: new THREE.Vector3(-0.5,0.4,-0.3) },
  uSunCol:   { value: new THREE.Color(0xfff6e0) },
  uCloudCol: { value: new THREE.Color(0xffffff) },
  uDayF:     { value: 1.0 },
  uTime:     { value: 0 }
};
const skyMat = new THREE.ShaderMaterial({
  uniforms: skyUniforms,
  side: THREE.BackSide,
  depthWrite: false,
  vertexShader: `
    varying vec3 vDir;
    void main(){
      vDir = (modelMatrix * vec4(position, 1.0)).xyz - cameraPosition;
      gl_Position = projectionMatrix * viewMatrix * modelMatrix * vec4(position, 1.0);
    }`,
  fragmentShader: `
    uniform vec3 uZen;
    uniform vec3 uHor;
    uniform vec3 uSunDir;
    uniform vec3 uMoonDir;
    uniform vec3 uSunCol;
    uniform vec3 uCloudCol;
    uniform float uDayF;
    uniform float uTime;
    varying vec3 vDir;
    ${GLSL_NOISE}
    float hash31(vec3 p){ return fract(sin(dot(p, vec3(12.9898,78.233,45.164)))*43758.5453123); }
    void main(){
      vec3 dir = normalize(vDir);
      float y = dir.y;
      vec3 col = mix(uHor, uZen, pow(clamp(y*1.15 + 0.08, 0.0, 1.0), 0.75));

      float sd = clamp(dot(dir, uSunDir), 0.0, 1.0);
      col += uSunCol * (pow(sd, 1400.0)*1.6 + pow(sd, 24.0)*0.28 + pow(sd, 5.0)*0.10);

      float md = clamp(dot(dir, uMoonDir), 0.0, 1.0);
      col += vec3(0.75,0.82,0.95) * (pow(md, 2600.0)*0.9 + pow(md, 40.0)*0.10) * (1.0 - uDayF);

      vec3 sp = floor(dir*230.0);
      float star = step(0.9982, hash31(sp));
      float tw = 0.55 + 0.45*sin(uTime*2.4 + hash31(sp.zxy)*40.0);
      col += vec3(0.9,0.95,1.0) * star * tw * (1.0 - uDayF) * smoothstep(0.03, 0.25, y) * 0.85;

      float cm = smoothstep(0.02, 0.16, y);
      if(cm > 0.001){
        vec2 cuv = dir.xz / (y + 0.18);
        vec2 drift = vec2(uTime*0.006, uTime*0.0023);
        float c = fbm(cuv*0.55 + drift);
        c = smoothstep(0.42, 0.72, c + 0.12*fbm(cuv*1.7 - drift*2.0));
        float shade = fbm(cuv*0.9 + drift + 3.7);
        vec3 cc = uCloudCol * (0.72 + 0.5*shade);
        cc += uSunCol * pow(sd, 6.0) * 0.35;
        col = mix(col, cc, c * cm * 0.85);
      }
      gl_FragColor = vec4(col, 1.0);
    }`
});
scene.add(new THREE.Mesh(new THREE.SphereGeometry(5000, 40, 24), skyMat));

/* ---------- day/night palettes ---------- */
const C = hex => new THREE.Color(hex);
const PAL = {
  night: { zen:C(0x030711), hor:C(0x0e1830), light:C(0x5a6fa8), li:0.34, amb:C(0x232c44), fog:C(0x0a1222), deep:C(0x06121f), ref:C(0x14213a), cloud:C(0x141d31), sun:C(0xc8d8ff) },
  dusk:  { zen:C(0x24335f), hor:C(0xff8a4c), light:C(0xffa04e), li:1.00, amb:C(0x584a5a), fog:C(0xd88a5e), deep:C(0x1c2f42), ref:C(0xe6906a), cloud:C(0xffb98a), sun:C(0xffc98a) },
  day:   { zen:C(0x3672b9), hor:C(0xd6ebf4), light:C(0xfff3da), li:1.28, amb:C(0x8aa2bb), fog:C(0xc4dbe6), deep:C(0x0e3a55), ref:C(0x9cc3de), cloud:C(0xffffff), sun:C(0xfff6e0) }
};
const cur = { zen:C(0), hor:C(0), light:C(0), li:1, amb:C(0), fog:C(0), deep:C(0), ref:C(0), cloud:C(0), sun:C(0) };
function palMix(a, b, t){
  for(const key of ['zen','hor','light','amb','fog','deep','ref','cloud','sun']){
    cur[key].lerpColors(a[key], b[key], t);
  }
  cur.li = lerp(a.li, b.li, t);
}

/* ---------- day cycle ---------- */
const sunDir = new THREE.Vector3();
const moonDir = new THREE.Vector3();
const lightDir = new THREE.Vector3();
let phi = 0.55;                     /* start mid-morning */
let paused = false;
const SPEEDS = [1, 4, 12];
let speedIdx = 0;
const DAY_SECONDS = 160;

const clockEl = document.getElementById('clock');
function updateCycle(dt, t){
  if(!paused) phi += dt * SPEEDS[speedIdx] * (Math.PI*2 / DAY_SECONDS);
  const sx = Math.cos(phi), sy = Math.sin(phi);
  sunDir.set(sx*0.85, sy, 0.5 - sx*0.2).normalize();
  moonDir.set(-sx*0.85, -sy, -(0.5 - sx*0.2)).normalize();
  const e = sunDir.y;

  /* hard select light source: sunDir and moonDir are antiparallel, lerping
     them through 0.5 would collapse to a zero vector and NaN the shaders */
  lightDir.copy(e > -0.02 ? sunDir : moonDir);
  if(lightDir.y < 0.06){ lightDir.y = 0.06; lightDir.normalize(); }

  if(e < 0) palMix(PAL.night, PAL.dusk, sstep(-0.38, 0.0, e));
  else      palMix(PAL.dusk,  PAL.day,  sstep(0.0, 0.42, e));
  const dayF = sstep(-0.12, 0.28, e);

  terrainUniforms.uLightDir.value.copy(lightDir);
  terrainUniforms.uLightCol.value.copy(cur.light);
  terrainUniforms.uLightI.value = cur.li;
  terrainUniforms.uAmb.value.copy(cur.amb);
  terrainUniforms.uFogCol.value.copy(cur.fog);
  terrainUniforms.uTime.value = t;

  waterUniforms.uLightDir.value.copy(lightDir);
  waterUniforms.uLightCol.value.copy(cur.light);
  waterUniforms.uLightI.value = cur.li;
  waterUniforms.uDeep.value.copy(cur.deep);
  waterUniforms.uSkyRef.value.copy(cur.ref);
  waterUniforms.uFogCol.value.copy(cur.fog);
  waterUniforms.uTime.value = t;

  skyUniforms.uZen.value.copy(cur.zen);
  skyUniforms.uHor.value.copy(cur.hor);
  skyUniforms.uSunDir.value.copy(sunDir);
  skyUniforms.uMoonDir.value.copy(moonDir);
  skyUniforms.uSunCol.value.copy(cur.sun);
  skyUniforms.uCloudCol.value.copy(cur.cloud);
  skyUniforms.uDayF.value = dayF;
  skyUniforms.uTime.value = t;

  /* clock readout: phi 0 = 6:00, phi π/2 = 12:00 */
  const dayFrac = ((phi / (Math.PI*2)) % 1 + 1) % 1;
  const mins = Math.floor((dayFrac*24 + 6) % 24 * 60);
  const hh = String(Math.floor(mins/60)).padStart(2,'0');
  const mm = String(mins%60).padStart(2,'0');
  clockEl.textContent = hh + ':' + mm;
}

/* ---------- UI ---------- */
const hdr = document.getElementById('hdr');
const hint = document.getElementById('hint');
let hintHidden = false;
function hideHint(){
  if(hintHidden) return;
  hintHidden = true;
  hint.classList.add('gone');
}
setTimeout(() => hdr.classList.add('faded'), 7000);
setTimeout(hideHint, 12000);

const btnPause = document.getElementById('btnPause');
btnPause.addEventListener('click', () => {
  paused = !paused;
  btnPause.setAttribute('aria-pressed', String(paused));
  btnPause.textContent = paused ? '▶ sun' : '⏸ sun';
  btnPause.title = paused ? 'Resume the sun' : 'Pause the sun';
});
const btnSpeed = document.getElementById('btnSpeed');
btnSpeed.addEventListener('click', () => {
  speedIdx = (speedIdx + 1) % SPEEDS.length;
  btnSpeed.textContent = SPEEDS[speedIdx] + '×';
});

/* ---------- bird flight mode ---------- */
const btnFly = document.getElementById('btnFly');
const flyFwd = document.getElementById('flyFwd');
const coarse = window.matchMedia('(pointer: coarse)').matches;
let mode = 'orbit';
let yaw = 0, pitch = 0, roll = 0, lookVelX = 0;
const vel = new THREE.Vector3();
const keys = {};
let touchThrottle = false;
let dragging = false, dragId = -1, lastX = 0, lastY = 0;
const baseFov = 55;

function showHint(text){
  hint.textContent = text;
  hint.classList.remove('gone');
  hintHidden = false;
  clearTimeout(showHint._t);
  showHint._t = setTimeout(hideHint, 9000);
}

function enterFly(){
  mode = 'fly';
  controls.autoRotate = false;
  controls.enabled = false;
  const d = camera.getWorldDirection(new THREE.Vector3());
  yaw = Math.atan2(-d.x, -d.z);
  pitch = Math.asin(clamp01(d.y*0.5+0.5)*2-1);
  roll = 0; lookVelX = 0;
  vel.set(0,0,0);
  camera.rotation.order = 'YXZ';
  btnFly.setAttribute('aria-pressed','true');
  btnFly.textContent = '🧭 orbit';
  btnFly.title = 'Back to orbit camera (F)';
  if(coarse) flyFwd.classList.add('show');
  showHint(coarse ? 'drag to steer · hold 🕊 to fly' : 'WASD fly · drag to look · shift = boost');
}
function exitFly(){
  mode = 'orbit';
  dragging = false;
  flyFwd.classList.remove('show');
  flyFwd.classList.remove('held');
  touchThrottle = false;
  const d = camera.getWorldDirection(new THREE.Vector3());
  controls.target.copy(camera.position).addScaledVector(d, 80);
  controls.target.y = Math.max(controls.target.y, 2);
  camera.fov = baseFov;
  camera.updateProjectionMatrix();
  controls.enabled = true;
  controls.update();
  btnFly.setAttribute('aria-pressed','false');
  btnFly.textContent = '🕊 fly';
  btnFly.title = 'Toggle bird flight mode (F)';
}
btnFly.addEventListener('click', () => {
  (mode === 'fly') ? exitFly() : enterFly();
  btnFly.blur();  /* keep Space from re-toggling the button mid-flight */
});

canvas.addEventListener('pointerdown', e => {
  if(mode !== 'fly' || dragging) return;
  dragging = true; dragId = e.pointerId;
  lastX = e.clientX; lastY = e.clientY;
  canvas.setPointerCapture(e.pointerId);
  hideHint();
});
canvas.addEventListener('pointermove', e => {
  if(mode !== 'fly' || !dragging || e.pointerId !== dragId) return;
  const dx = e.clientX - lastX, dy = e.clientY - lastY;
  lastX = e.clientX; lastY = e.clientY;
  yaw   -= dx * 0.0032;
  pitch -= dy * 0.0028;
  pitch = Math.min(1.35, Math.max(-1.35, pitch));
  lookVelX = lerp(lookVelX, dx, 0.35);
});
const endDrag = e => { if(e.pointerId === dragId) dragging = false; };
canvas.addEventListener('pointerup', endDrag);
canvas.addEventListener('pointercancel', endDrag);

window.addEventListener('keydown', e => {
  if(e.key === 'f' || e.key === 'F'){ (mode === 'fly') ? exitFly() : enterFly(); return; }
  if(mode !== 'fly') return;
  if(e.key === 'Escape'){ exitFly(); return; }
  keys[e.code] = true;
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup', e => { keys[e.code] = false; });
window.addEventListener('blur', () => { for(const k in keys) keys[k] = false; touchThrottle = false; });

flyFwd.addEventListener('pointerdown', e => { e.preventDefault(); touchThrottle = true; flyFwd.classList.add('held'); });
const throttleOff = () => { touchThrottle = false; flyFwd.classList.remove('held'); };
flyFwd.addEventListener('pointerup', throttleOff);
flyFwd.addEventListener('pointercancel', throttleOff);
flyFwd.addEventListener('pointerleave', throttleOff);

const _fwd = new THREE.Vector3(), _right = new THREE.Vector3();
function updateFly(dt){
  const fwdIn    = (keys['KeyW'] || keys['ArrowUp'] || touchThrottle ? 1 : 0) + (keys['KeyS'] || keys['ArrowDown'] ? -1 : 0);
  const strafeIn = (keys['KeyD'] || keys['ArrowRight'] ? 1 : 0) + (keys['KeyA'] || keys['ArrowLeft'] ? -1 : 0);
  const vertIn   = (keys['Space'] || keys['KeyE'] ? 1 : 0) + (keys['KeyQ'] || keys['ControlLeft'] ? -1 : 0);
  const boost = (keys['ShiftLeft'] || keys['ShiftRight']) ? 2.1 : 1;
  const ACC = 280 * boost;

  _fwd.set(-Math.sin(yaw)*Math.cos(pitch), Math.sin(pitch), -Math.cos(yaw)*Math.cos(pitch));
  _right.set(Math.cos(yaw), 0, -Math.sin(yaw));
  vel.addScaledVector(_fwd, fwdIn*ACC*dt);
  vel.addScaledVector(_right, strafeIn*ACC*0.7*dt);
  vel.y += vertIn*ACC*0.6*dt;
  vel.multiplyScalar(Math.exp(-2.3*dt));
  camera.position.addScaledVector(vel, dt);

  /* stay above ground and water, inside the world */
  const gy = terrainH(camera.position.x, camera.position.z);
  const minY = Math.max(gy + 3.0, 2.0);
  if(camera.position.y < minY){ camera.position.y = minY; if(vel.y < 0) vel.y = 0; }
  if(camera.position.y > 800){ camera.position.y = 800; if(vel.y > 0) vel.y = 0; }
  const rxz = Math.hypot(camera.position.x, camera.position.z);
  if(rxz > 1400){
    const s = 1400 / rxz;
    camera.position.x *= s; camera.position.z *= s;
  }

  /* banking roll from turning + strafing */
  lookVelX *= Math.exp(-6*dt);
  const rollTarget = Math.min(0.5, Math.max(-0.5, -strafeIn*0.20 - lookVelX*0.018));
  roll = lerp(roll, rollTarget, 1 - Math.exp(-8*dt));
  camera.rotation.set(pitch, yaw, roll);

  /* speed-based fov kick */
  const speed = vel.length();
  const targetFov = baseFov + clamp01(speed/260)*13;
  if(Math.abs(camera.fov - targetFov) > 0.05){
    camera.fov = lerp(camera.fov, targetFov, 1 - Math.exp(-5*dt));
    camera.updateProjectionMatrix();
  }
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

/* ---------- loop ---------- */
const clock = new THREE.Clock();
let elapsed = 0;
function frame(){
  requestAnimationFrame(frame);
  const dt = Math.min(clock.getDelta(), 0.1);
  elapsed += dt;
  updateCycle(dt, elapsed);
  if(mode === 'fly') updateFly(dt);
  else controls.update();
  renderer.render(scene, camera);
}
frame();
document.getElementById('loading').classList.add('done');
})();
</script>
</body>
</html>
