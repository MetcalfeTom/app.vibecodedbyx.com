<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Threadline Flow</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="description" content="A neon dashboard that visualizes a swarm deployment pipeline. Commits flow through ingest, build, test, scan, push, swarm, and health stages live.">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%9A%80">
<meta property="og:title" content="Threadline Flow">
<meta property="og:description" content="A neon dashboard that visualizes a swarm deployment pipeline.">
<meta property="og:url" content="https://sloppy.live/threadline-flow">
<meta property="og:type" content="website">
<meta property="og:image" content="https://image.pollinations.ai/prompt/neon%20cyberpunk%20deployment%20pipeline%20dashboard%2C%20glowing%20pillars%20and%20connection%20wires%2C%20swarm%20replicas%20grid%2C%20cyan%20magenta%20gold%2C%20cinematic%20wide?width=1200&height=630&nologo=true">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Major+Mono+Display&family=IBM+Plex+Mono:wght@400;500;600&family=Cormorant+Garamond:ital@1&display=swap" rel="stylesheet">
<style>
:root{
  --void:#06032a;
  --void-2:#0a0418;
  --grid:rgba(122,220,255,0.05);
  --foam:#dff5fb;
  --cyan:#7adcff;
  --magenta:#ff5ec8;
  --violet:#a86bff;
  --gold:#f5c453;
  --green:#7dba6c;
  --orange:#ff8a4c;
  --teal:#5fc1b3;
  --warn:#ff5a4a;
  --rule:#1d1840;
  --panel:rgba(10,4,28,0.78);
}
*{margin:0;padding:0;box-sizing:border-box}
html{font-size:100%;-webkit-text-size-adjust:100%}
body{
  min-height:100vh;background:var(--void);color:var(--foam);
  font-family:'IBM Plex Mono',ui-monospace,monospace;
  font-size:1rem;line-height:1.45;overflow:hidden;
  background-image:
    radial-gradient(circle at 20% 10%, rgba(168,107,255,0.10), transparent 50%),
    radial-gradient(circle at 80% 90%, rgba(255,94,200,0.08), transparent 55%),
    linear-gradient(180deg, var(--void-2), var(--void));
}
a.skip-link{position:absolute;left:0.5rem;top:-3rem;z-index:200;
  background:var(--magenta);color:var(--void);padding:0.5rem 0.75rem;
  text-decoration:none;border-radius:0.25rem;
  font-family:'Audiowide',cursive;font-size:0.875rem}
a.skip-link:focus{top:0.5rem;outline:0.1875rem solid var(--gold);outline-offset:0.125rem}

main{
  position:fixed;inset:0;
  display:grid;
  grid-template-columns:1fr 22rem;
  grid-template-rows:auto 1fr 9rem;
  grid-template-areas:
    "head    head"
    "stage   side"
    "feed    side";
  gap:0.625rem;padding:0.625rem;
}
@media (max-width:980px){
  main{
    grid-template-columns:1fr;
    grid-template-rows:auto 1fr auto auto;
    grid-template-areas:
      "head"
      "stage"
      "feed"
      "side";
  }
  aside.side{max-height:14rem}
}

header.head{
  grid-area:head;
  display:flex;align-items:center;justify-content:space-between;gap:1rem;
  flex-wrap:wrap;padding:0.5rem 0.75rem;
}
.brand{display:flex;flex-direction:column;gap:0.125rem}
h1{
  font-family:'Audiowide',cursive;
  font-size:clamp(1.25rem, 2.6vw, 1.875rem);
  letter-spacing:0.18em;line-height:1;color:var(--foam);text-transform:uppercase;
}
h1 .a1{color:var(--cyan);text-shadow:0 0 0.5rem rgba(122,220,255,0.6)}
h1 .a2{color:var(--magenta);text-shadow:0 0 0.5rem rgba(255,94,200,0.6)}
h1 .sep{color:var(--gold);margin:0 0.25rem}
.tag{
  font-family:'Cormorant Garamond',serif;font-style:italic;
  font-size:1rem;color:rgba(223,245,251,0.65);
}
.metrics{display:flex;gap:0.4375rem;flex-wrap:wrap;font-size:0.6875rem}
.metrics .pill{
  background:var(--panel);
  border:0.0625rem solid rgba(223,245,251,0.20);
  border-radius:0.25rem;padding:0.375rem 0.5625rem;letter-spacing:0.16em;
  text-transform:uppercase;display:flex;gap:0.4375rem;align-items:center;
  min-height:2rem;color:var(--foam);backdrop-filter:blur(3px);
}
.metrics b{font-family:'Major Mono Display',monospace;color:var(--cyan);font-size:0.875rem;font-weight:400}
.metrics .pos b{color:var(--green)}
.metrics .neg b{color:var(--warn)}

section.stage{
  grid-area:stage;
  position:relative;overflow:hidden;
  border:0.0625rem solid var(--rule);border-radius:0.5rem;
  background:rgba(10,4,28,0.5);
}
canvas#flow{
  display:block;width:100%;height:100%;outline:none;
}

aside.side{
  grid-area:side;
  display:flex;flex-direction:column;gap:0.5rem;overflow:hidden;
}
.side-panel{
  background:var(--panel);
  border:0.0625rem solid var(--rule);border-radius:0.375rem;
  display:flex;flex-direction:column;
  min-height:0;
}
.side-panel header{
  padding:0.5rem 0.75rem;border-bottom:0.0625rem solid var(--rule);
  display:flex;justify-content:space-between;align-items:center;
}
.side-panel h2{
  font-family:'Audiowide',cursive;font-size:0.8125rem;
  letter-spacing:0.16em;color:var(--cyan);text-transform:uppercase;
  font-weight:400;
}
.side-panel .ct{
  font-family:'Major Mono Display',monospace;font-size:0.75rem;
  color:rgba(223,245,251,0.55);letter-spacing:0.06em;
}
.deploys{
  flex:1;overflow-y:auto;padding:0.375rem;display:flex;flex-direction:column;gap:0.3125rem;
}
.deploy{
  display:grid;grid-template-columns:auto 1fr auto;gap:0.5rem;
  align-items:center;
  background:rgba(0,0,0,0.30);
  border:0.0625rem solid rgba(223,245,251,0.10);
  border-left:0.1875rem solid var(--cyan);
  padding:0.4375rem 0.5625rem;border-radius:0.25rem;
  font-family:'IBM Plex Mono',monospace;
}
.deploy[data-state="running"]  { border-left-color:var(--cyan) }
.deploy[data-state="success"]  { border-left-color:var(--green); opacity:0.85 }
.deploy[data-state="failed"]   { border-left-color:var(--warn);  opacity:0.85 }
.deploy[data-state="rolled"]   { border-left-color:var(--orange); opacity:0.85 }
.deploy .sha{
  font-family:'Major Mono Display',monospace;font-size:0.75rem;
  color:var(--cyan);letter-spacing:0.04em;
}
.deploy .meta{display:flex;flex-direction:column;gap:0.125rem;min-width:0}
.deploy .author{
  font-size:0.75rem;color:var(--foam);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.deploy .author .branch{color:var(--gold)}
.deploy .msg{
  font-size:0.6875rem;color:rgba(223,245,251,0.55);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-style:italic;
}
.deploy .state{
  font-family:'Major Mono Display',monospace;font-size:0.6875rem;
  letter-spacing:0.10em;text-transform:uppercase;
}
.deploy[data-state="running"] .state { color:var(--cyan) }
.deploy[data-state="success"] .state { color:var(--green) }
.deploy[data-state="failed"]  .state { color:var(--warn) }
.deploy[data-state="rolled"]  .state { color:var(--orange) }

.spark-panel{flex:0 0 auto}
.spark-panel canvas{display:block;width:100%;height:5rem;background:rgba(0,0,0,0.20);border-radius:0 0 0.375rem 0.375rem}
.spark-meta{
  display:flex;justify-content:space-between;
  padding:0.375rem 0.625rem;font-size:0.6875rem;
  color:rgba(223,245,251,0.6);font-family:'IBM Plex Mono',monospace;
  letter-spacing:0.06em;text-transform:uppercase;
}
.spark-meta b{color:var(--cyan);font-family:'Major Mono Display',monospace}

section.feed{
  grid-area:feed;
  background:var(--panel);
  border:0.0625rem solid var(--rule);border-radius:0.375rem;
  padding:0.375rem 0.625rem;
  font-family:'IBM Plex Mono',monospace;font-size:0.75rem;
  color:rgba(223,245,251,0.85);
  display:flex;flex-direction:column;gap:0.0625rem;
  overflow:hidden;
  min-height:0;
}
section.feed > .feed-h{
  display:flex;justify-content:space-between;align-items:center;
  border-bottom:0.0625rem solid var(--rule);padding-bottom:0.25rem;margin-bottom:0.25rem;
  flex-shrink:0;
}
section.feed h2{
  font-family:'Audiowide',cursive;font-size:0.75rem;
  letter-spacing:0.16em;color:var(--cyan);text-transform:uppercase;font-weight:400;
}
section.feed .controls{
  display:flex;gap:0.375rem;
}
section.feed .controls button{
  background:transparent;border:0.0625rem solid rgba(223,245,251,0.20);
  color:rgba(223,245,251,0.7);font-family:inherit;font-size:0.6875rem;
  letter-spacing:0.16em;text-transform:uppercase;
  padding:0.1875rem 0.5rem;border-radius:0.125rem;cursor:pointer;
}
section.feed .controls button:hover{color:var(--cyan);border-color:var(--cyan)}
section.feed .controls button:focus-visible{outline:0.1875rem solid var(--gold);outline-offset:0.0625rem}
section.feed .controls button[aria-pressed="true"]{background:var(--cyan);color:var(--void);border-color:var(--cyan)}
.log-list{flex:1;overflow-y:auto;font-variant-numeric:tabular-nums;line-height:1.45}
.log-line{display:flex;gap:0.5rem;align-items:baseline}
.log-line .t{color:rgba(223,245,251,0.4);flex-shrink:0}
.log-line .lv{
  font-family:'Major Mono Display',monospace;font-size:0.6875rem;
  letter-spacing:0.10em;text-transform:uppercase;flex-shrink:0;
  width:3.25rem;
}
.log-line.info  .lv{color:var(--cyan)}
.log-line.ok    .lv{color:var(--green)}
.log-line.warn  .lv{color:var(--gold)}
.log-line.error .lv{color:var(--warn)}
.log-line.swarm .lv{color:var(--orange)}
.log-line .msg .sha{color:var(--cyan)}
.log-line .msg .br{color:var(--gold)}
.log-line .msg .au{color:var(--magenta)}

@media (prefers-reduced-motion: reduce){
  /* (no transitions to disable; canvas-driven) */
}

.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap}
</style>
</head>
<body>

<a href="#flow" class="skip-link">Skip to pipeline</a>

<main>
  <header class="head">
    <div class="brand">
      <h1><span class="a1">THREADLINE</span><span class="sep">·</span><span class="a2">FLOW</span></h1>
      <div class="tag">— a swarm deployment pipeline, painted in neon —</div>
    </div>
    <div class="metrics" role="status" aria-live="polite">
      <div class="pill" aria-label="Active jobs"><span>ACTIVE</span> <b id="mActive">0</b></div>
      <div class="pill" aria-label="Throughput"><span>TPS</span> <b id="mTps">0.0</b></div>
      <div class="pill pos" aria-label="Successful deploys"><span>OK</span> <b id="mOk">0</b></div>
      <div class="pill neg" aria-label="Failed deploys"><span>FAIL</span> <b id="mFail">0</b></div>
      <div class="pill" aria-label="Replicas"><span>REPLICAS</span> <b id="mRep">12</b></div>
      <div class="pill" aria-label="Uptime"><span>UPTIME</span> <b id="mUp">0:00</b></div>
    </div>
  </header>

  <section class="stage">
    <canvas id="flow" tabindex="0" role="application"
            aria-label="Threadline Flow pipeline canvas — visualizes commits flowing through ingest, build, test, scan, push, swarm rollout, and health stages.">
    </canvas>
  </section>

  <aside class="side">
    <div class="side-panel" style="flex:1">
      <header>
        <h2>RECENT DEPLOYS</h2>
        <span class="ct" id="depCt">0</span>
      </header>
      <div class="deploys" id="deploys"></div>
    </div>
    <div class="side-panel spark-panel">
      <header>
        <h2>THROUGHPUT · 60s</h2>
        <span class="ct" id="sparkPeak">peak —</span>
      </header>
      <canvas id="spark" width="320" height="80" aria-label="Throughput sparkline"></canvas>
      <div class="spark-meta">
        <span>P50 <b id="mP50">0.0s</b></span>
        <span>P95 <b id="mP95">0.0s</b></span>
        <span>SUCCESS <b id="mSr">100%</b></span>
      </div>
    </div>
  </aside>

  <section class="feed" aria-label="Live log stream">
    <div class="feed-h">
      <h2>LOG STREAM</h2>
      <div class="controls">
        <button type="button" id="filterAll"  aria-pressed="true" >ALL</button>
        <button type="button" id="filterInfo" aria-pressed="false">INFO</button>
        <button type="button" id="filterErr"  aria-pressed="false">ERR</button>
        <button type="button" id="filterSwarm"aria-pressed="false">SWARM</button>
        <button type="button" id="pauseBtn"   aria-pressed="false">PAUSE</button>
      </div>
    </div>
    <div class="log-list" id="logList" aria-live="polite"></div>
  </section>
</main>

<script>
"use strict";

// ============================================================
// THREADLINE FLOW — neon swarm deployment pipeline dashboard
// ============================================================

const cvs = document.getElementById('flow');
const ctx = cvs.getContext('2d');
const sparkCv = document.getElementById('spark');
const sctx = sparkCv.getContext('2d');
let W = 0, H = 0, DPR = 1;
function fit(){
  DPR = Math.min(window.devicePixelRatio || 1, 1.5);
  const r = cvs.getBoundingClientRect();
  W = Math.max(360, Math.floor(r.width));
  H = Math.max(280, Math.floor(r.height));
  cvs.width  = Math.floor(W * DPR);
  cvs.height = Math.floor(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  // spark
  const sr = sparkCv.getBoundingClientRect();
  sparkCv.width  = Math.floor(sr.width * DPR);
  sparkCv.height = Math.floor(sr.height * DPR);
  sctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', fit);
fit();

// === Pipeline definition ===
const STAGES = [
  { key:'ingest', name:'INGEST',  color:'#7adcff', glyph:'⌒'  },
  { key:'build',  name:'BUILD',   color:'#a86bff', glyph:'⛏'  },
  { key:'test',   name:'TEST',    color:'#ff5ec8', glyph:'✓' },
  { key:'scan',   name:'SCAN',    color:'#f5c453', glyph:'◎'  },
  { key:'push',   name:'PUSH',    color:'#5fc1b3', glyph:'↥'  },
  { key:'swarm',  name:'SWARM',   color:'#ff8a4c', glyph:'⌬', swarm:true },
  { key:'health', name:'HEALTH',  color:'#7dba6c', glyph:'♥'  },
];
const REPLICAS = 12;
// Stage processing time range (seconds)
const STAGE_TIME = {
  ingest: [0.4, 0.8],
  build:  [1.4, 2.6],
  test:   [1.0, 2.0],
  scan:   [0.6, 1.2],
  push:   [0.5, 1.0],
  swarm:  [1.6, 2.8],
  health: [0.4, 0.8],
};
const STAGE_FAIL = {
  ingest: 0.005, build: 0.05, test: 0.07, scan: 0.04,
  push: 0.02, swarm: 0.05, health: 0.03,
};

// === Authors / branches / messages — for color ===
const AUTHORS = ['ada','ren','xeno','blake','jules','sam','vex','iris','quinn','milo','tao','nova'];
const BRANCHES = ['main','release/v3','feat/auth','fix/race','hotfix/expiry','refactor/queue','feat/swarm-roll','exp/lighthouse','chore/bump-deps'];
const MESSAGES = [
  'Bump base image to alpine 3.20',
  'Drain stale connections on shutdown',
  'Promote sticky-session controller',
  'Refactor swarm gossip to use Quorum',
  'Tighten csrf token rotation window',
  'Add prefork worker bench job',
  'Roll back faulty migration #1042',
  'Cap image sizes to 250MB',
  'Add health endpoint to ledger svc',
  'Patch CVE-2026-0455 in serializer',
  'Tune autoscaler cooldown to 90s',
  'Add post-deploy lighthouse pass',
  'Replace flaky postgres retry policy',
  'Wire trace IDs to log stream',
  'Drop legacy v1 deploy hooks',
  'Rebuild frontend with esbuild 0.24',
  'Squash retry storm in build worker',
  'Annotate canary rollout with owner tag',
];
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function shortSha(){
  const hex = '0123456789abcdef';
  let s = '';
  for (let i = 0; i < 7; i++) s += hex[Math.floor(Math.random() * 16)];
  return s;
}

// === Job state ===
const jobs = [];
let jobSpawnIn = 0.6;
let stats = {
  active: 0, ok: 0, fail: 0, rolled: 0,
  startedAt: performance.now(),
  // last 60s buckets (1 second each) of jobs completed
  completedBuckets: new Array(60).fill(0),
  bucketIdx: 0,
  bucketAcc: 0,
  durations: [],         // last ~60 completed durations
};
function spawnJob(){
  const sha    = shortSha();
  const author = pick(AUTHORS);
  const branch = pick(BRANCHES);
  const msg    = pick(MESSAGES);
  const job = {
    sha, author, branch, msg,
    stage: 0,                   // index into STAGES
    progress: 0,                // 0..1 within current stage's processing
    state: 'queued',            // 'queued' | 'process' | 'transit' | 'done' | 'failed'
    transitProgress: 0,
    failed: false,
    swarmFilled: 0,             // for swarm stage: 0..REPLICAS
    swarmTimer: 0,
    bornAt: performance.now() / 1000,
    completedAt: 0,
    color: STAGES[0].color,
  };
  jobs.push(job);
  stats.active++;
  log('info', `<span class="sha">${sha}</span> ingested <span class="br">${branch}</span> · <span class="au">${author}</span> :: <em>${escapeHtml(msg)}</em>`);
  pushDeploy(job);
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => (
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
}

// === Tick the simulation ===
function tick(dt){
  // Spawn new commits
  jobSpawnIn -= dt;
  if (jobSpawnIn <= 0){
    spawnJob();
    jobSpawnIn = 0.6 + Math.random() * 1.7;
  }
  // Throughput buckets — each second tally completed jobs
  stats.bucketAcc += dt;
  while (stats.bucketAcc >= 1){
    stats.bucketAcc -= 1;
    stats.bucketIdx = (stats.bucketIdx + 1) % stats.completedBuckets.length;
    stats.completedBuckets[stats.bucketIdx] = 0;
  }
  // Tick each job
  for (let i = jobs.length - 1; i >= 0; i--){
    const j = jobs[i];
    if (j.state === 'done' || j.state === 'failed') continue;
    if (j.state === 'queued'){
      // Just spawned — start processing first stage
      j.state = 'process';
      j.progress = 0;
    }
    const stage = STAGES[j.stage];
    if (j.state === 'process'){
      const [lo, hi] = STAGE_TIME[stage.key];
      const dur = lo + Math.random() * (hi - lo) * 0;     // sample once at entry
      // Use stored proceedT once entered
      if (!j.proceedT){
        j.proceedT = lo + Math.random() * (hi - lo);
      }
      j.progress += dt / j.proceedT;
      // SWARM extra: fill replicas as progress climbs
      if (stage.swarm){
        j.swarmFilled = Math.min(REPLICAS, Math.floor(j.progress * REPLICAS));
      }
      if (j.progress >= 1){
        // Roll fail chance for this stage
        if (Math.random() < STAGE_FAIL[stage.key]){
          j.state = 'failed';
          j.failed = true;
          stats.active--;
          stats.fail++;
          log('error', `<span class="sha">${j.sha}</span> ✕ FAILED at <span class="br">${stage.name}</span>`);
          updateDeploy(j, stage.swarm ? 'rolled' : 'failed');
          // remove visually after a moment
          setTimeout(() => { const idx = jobs.indexOf(j); if (idx >= 0) jobs.splice(idx, 1); }, 1400);
          continue;
        }
        // Otherwise advance to next stage (transit or done)
        if (j.stage < STAGES.length - 1){
          j.state = 'transit';
          j.transitProgress = 0;
          j.proceedT = 0;
          // Pre-roll the next stage's time to avoid replays per frame
          const nextKey = STAGES[j.stage + 1].key;
          const [lo2, hi2] = STAGE_TIME[nextKey];
          j._nextProceedT = lo2 + Math.random() * (hi2 - lo2);
          // Stage-success log line for milestone stages
          if (stage.key === 'build' || stage.key === 'test' || stage.key === 'scan' || stage.key === 'push'){
            log('ok', `<span class="sha">${j.sha}</span> ✓ <span class="br">${stage.name}</span> passed`);
          }
          if (stage.swarm){
            log('swarm', `<span class="sha">${j.sha}</span> rolled ${REPLICAS} replicas`);
          }
        } else {
          // Health passed = deployed
          j.state = 'done';
          j.completedAt = performance.now() / 1000;
          stats.active--; stats.ok++;
          stats.completedBuckets[stats.bucketIdx]++;
          stats.durations.push(j.completedAt - j.bornAt);
          if (stats.durations.length > 100) stats.durations.shift();
          log('ok', `<span class="sha">${j.sha}</span> 🟢 deployed (<b>${(j.completedAt - j.bornAt).toFixed(1)}s</b> end-to-end)`);
          updateDeploy(j, 'success');
          setTimeout(() => { const idx = jobs.indexOf(j); if (idx >= 0) jobs.splice(idx, 1); }, 1200);
        }
      }
    } else if (j.state === 'transit'){
      j.transitProgress += dt * 1.6;     // transit speed
      if (j.transitProgress >= 1){
        j.stage++;
        j.state = 'process';
        j.progress = 0;
        j.proceedT = j._nextProceedT;
        j._nextProceedT = 0;
        j.color = STAGES[j.stage].color;
        j.transitProgress = 0;
      }
    }
  }
  // Update HUD every tick
  refreshHud();
}

// === Pipeline render ===
function stageX(idx){
  const margin = 70;
  const usable = W - margin * 2;
  return margin + (usable * idx / (STAGES.length - 1));
}
const PIPELINE_Y_RATIO = 0.50;
function pipelineY(){ return H * PIPELINE_Y_RATIO; }

function drawBackground(){
  // Trail-fade + grid
  ctx.fillStyle = 'rgba(6,3,42,0.18)';
  ctx.fillRect(0, 0, W, H);
  // Faint grid
  ctx.strokeStyle = 'rgba(122,220,255,0.05)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  for (let x = 0; x < W; x += 32){
    ctx.moveTo(x, 0); ctx.lineTo(x, H);
  }
  for (let y = 0; y < H; y += 32){
    ctx.moveTo(0, y); ctx.lineTo(W, y);
  }
  ctx.stroke();
  // Scan-line shimmer
  const t = performance.now() / 1000;
  const scan = ((t * 30) % H);
  const scanG = ctx.createLinearGradient(0, scan - 40, 0, scan + 40);
  scanG.addColorStop(0,    'rgba(122,220,255,0)');
  scanG.addColorStop(0.5,  'rgba(122,220,255,0.04)');
  scanG.addColorStop(1,    'rgba(122,220,255,0)');
  ctx.fillStyle = scanG;
  ctx.fillRect(0, scan - 40, W, 80);
}

function drawPipes(){
  const py = pipelineY();
  // Thick dark base pipe
  ctx.strokeStyle = 'rgba(122,220,255,0.10)';
  ctx.lineWidth = 14;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(stageX(0), py);
  ctx.lineTo(stageX(STAGES.length - 1), py);
  ctx.stroke();
  // Animated dash neon
  const t = performance.now() / 60;
  ctx.strokeStyle = 'rgba(122,220,255,0.55)';
  ctx.lineWidth = 2;
  ctx.setLineDash([8, 14]);
  ctx.lineDashOffset = -t;
  ctx.shadowColor = 'rgba(122,220,255,0.6)';
  ctx.shadowBlur = 6;
  ctx.beginPath();
  ctx.moveTo(stageX(0), py);
  ctx.lineTo(stageX(STAGES.length - 1), py);
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.setLineDash([]);
}

function drawStages(){
  const py = pipelineY();
  for (let i = 0; i < STAGES.length; i++){
    const s = STAGES[i];
    const x = stageX(i);
    const inFlight = jobs.filter(j => j.stage === i && j.state === 'process').length;
    // Pillar
    const pillarH = 110, pillarW = 30;
    ctx.save();
    // base block
    ctx.fillStyle = 'rgba(10,4,28,0.85)';
    ctx.strokeStyle = s.color;
    ctx.lineWidth = 2;
    ctx.shadowColor = s.color;
    ctx.shadowBlur = 14;
    ctx.beginPath();
    roundRect(ctx, x - pillarW/2, py - pillarH/2, pillarW, pillarH, 5);
    ctx.fill();
    ctx.stroke();
    ctx.shadowBlur = 0;
    // glyph at top
    ctx.fillStyle = s.color;
    ctx.font = `bold 22px 'Major Mono Display', monospace`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(s.glyph, x, py - pillarH/2 + 22);
    // count of in-flight jobs
    if (inFlight > 0){
      ctx.fillStyle = '#dff5fb';
      ctx.font = `700 14px 'Major Mono Display', monospace`;
      ctx.fillText(String(inFlight), x, py);
    }
    // stage name below
    ctx.fillStyle = s.color;
    ctx.font = `600 11px 'Audiowide', cursive`;
    ctx.textAlign = 'center'; ctx.textBaseline = 'top';
    ctx.fillText(s.name, x, py + pillarH/2 + 8);
    // progress arc(s) for jobs working at this stage (max 3 arcs)
    const working = jobs.filter(j => j.stage === i && j.state === 'process').slice(0, 3);
    for (let k = 0; k < working.length; k++){
      const j = working[k];
      const ang = -Math.PI / 2 + j.progress * Math.PI * 2;
      ctx.strokeStyle = s.color;
      ctx.lineWidth = 2;
      ctx.globalAlpha = 0.85;
      ctx.beginPath();
      ctx.arc(x, py, pillarW * 0.55 + k * 4, -Math.PI/2, ang);
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
    // Special: SWARM stage shows a 3×4 replicas grid below the pillar
    if (s.swarm){
      drawSwarmGrid(x, py + pillarH/2 + 32, s.color);
    }
    ctx.restore();
  }
}

function drawSwarmGrid(cx, cy, color){
  const cols = 4, rows = 3;
  const sz = 12, gap = 4;
  const totalW = cols * sz + (cols - 1) * gap;
  const totalH = rows * sz + (rows - 1) * gap;
  const x0 = cx - totalW / 2;
  const y0 = cy + 8;
  // Aggregate fill — sum of jobs currently processing the swarm stage
  let filled = 0;
  for (const j of jobs){
    if (j.stage === STAGES.findIndex(s => s.swarm) && j.state === 'process'){
      filled = Math.max(filled, j.swarmFilled);
    }
  }
  for (let r = 0; r < rows; r++){
    for (let c = 0; c < cols; c++){
      const idx = r * cols + c;
      const x = x0 + c * (sz + gap);
      const y = y0 + r * (sz + gap);
      const on = idx < filled;
      ctx.fillStyle = on ? color : 'rgba(10,4,28,0.6)';
      ctx.strokeStyle = color;
      ctx.lineWidth = 1.2;
      ctx.globalAlpha = on ? 1 : 0.45;
      if (on){
        ctx.shadowColor = color; ctx.shadowBlur = 8;
      } else {
        ctx.shadowBlur = 0;
      }
      ctx.beginPath();
      ctx.rect(x, y, sz, sz);
      ctx.fill();
      ctx.stroke();
      ctx.globalAlpha = 1;
    }
  }
  ctx.shadowBlur = 0;
  // label
  ctx.fillStyle = 'rgba(223,245,251,0.55)';
  ctx.font = `400 9px 'IBM Plex Mono', monospace`;
  ctx.textAlign = 'center'; ctx.textBaseline = 'top';
  ctx.fillText(filled + ' / ' + REPLICAS + ' REPLICAS', cx, y0 + totalH + 4);
}

function drawJobs(){
  const py = pipelineY();
  ctx.save();
  ctx.globalCompositeOperation = 'lighter';
  for (const j of jobs){
    let x = stageX(j.stage);
    let y = py;
    if (j.state === 'transit' && j.stage < STAGES.length - 1){
      const x0 = stageX(j.stage), x1 = stageX(j.stage + 1);
      x = x0 + (x1 - x0) * j.transitProgress;
      y = py;
    } else if (j.state === 'process'){
      // sit at the stage but with a tiny orbit for liveliness
      const ang = (performance.now() / 200 + j.progress * 6) % (Math.PI * 2);
      x = stageX(j.stage) + Math.cos(ang) * 18;
      y = py + Math.sin(ang) * 8;
    }
    const c = j.failed ? '#ff5a4a' : j.color;
    // halo
    const halo = ctx.createRadialGradient(x, y, 1, x, y, 14);
    halo.addColorStop(0, c);
    halo.addColorStop(0.5, hexAlpha(c, 0.4));
    halo.addColorStop(1, hexAlpha(c, 0));
    ctx.fillStyle = halo;
    ctx.beginPath();
    ctx.arc(x, y, 14, 0, Math.PI*2);
    ctx.fill();
    // core
    ctx.fillStyle = '#ffffff';
    ctx.beginPath(); ctx.arc(x, y, 2.4, 0, Math.PI*2); ctx.fill();
    j._sx = x; j._sy = y;
  }
  ctx.restore();
}

function drawJobLabels(){
  // Show sha + stage of the most recent active job above the pipeline
  ctx.fillStyle = 'rgba(223,245,251,0.55)';
  ctx.font = `400 10px 'IBM Plex Mono', monospace`;
  ctx.textAlign = 'left'; ctx.textBaseline = 'top';
  let y = 14;
  const recent = jobs.slice(-4).reverse();
  for (const j of recent){
    const stage = STAGES[j.stage];
    ctx.fillText(`${j.sha} · ${stage.name.padEnd(7)}`, 14, y);
    y += 14;
  }
}

function hexAlpha(hex, a){
  const m = hex.match(/^#([0-9a-f]{6})$/i);
  if (!m) return `rgba(255,255,255,${a})`;
  const v = parseInt(m[1], 16);
  return `rgba(${(v>>16)&255},${(v>>8)&255},${v&255},${a})`;
}

function roundRect(c, x, y, w, h, r){
  c.beginPath();
  c.moveTo(x+r, y);
  c.lineTo(x+w-r, y);
  c.quadraticCurveTo(x+w, y, x+w, y+r);
  c.lineTo(x+w, y+h-r);
  c.quadraticCurveTo(x+w, y+h, x+w-r, y+h);
  c.lineTo(x+r, y+h);
  c.quadraticCurveTo(x, y+h, x, y+h-r);
  c.lineTo(x, y+r);
  c.quadraticCurveTo(x, y, x+r, y);
  c.closePath();
}

function draw(){
  drawBackground();
  drawPipes();
  drawStages();
  drawJobs();
  drawJobLabels();
}

// === Sparkline ===
function drawSpark(){
  const sw = sparkCv.width / DPR;
  const sh = sparkCv.height / DPR;
  sctx.clearRect(0, 0, sw, sh);
  // grid line
  sctx.strokeStyle = 'rgba(122,220,255,0.15)';
  sctx.beginPath(); sctx.moveTo(0, sh - 1); sctx.lineTo(sw, sh - 1); sctx.stroke();
  // Buckets
  const buckets = stats.completedBuckets;
  const len = buckets.length;
  // Order buckets with newest on the right (bucketIdx points to current)
  const ordered = [];
  for (let i = 0; i < len; i++){
    ordered.push(buckets[(stats.bucketIdx - (len - 1 - i) + len) % len]);
  }
  const maxB = Math.max(1, ...ordered);
  const w = sw / len;
  // Filled area
  sctx.fillStyle = 'rgba(122,220,255,0.18)';
  sctx.beginPath();
  sctx.moveTo(0, sh);
  for (let i = 0; i < len; i++){
    const v = ordered[i];
    const x = i * w + w/2;
    const y = sh - (v / maxB) * (sh - 6) - 2;
    if (i === 0) sctx.lineTo(x, y); else sctx.lineTo(x, y);
  }
  sctx.lineTo(sw, sh);
  sctx.closePath();
  sctx.fill();
  // Stroke
  sctx.strokeStyle = '#7adcff';
  sctx.shadowColor = 'rgba(122,220,255,0.7)'; sctx.shadowBlur = 4;
  sctx.lineWidth = 1.6;
  sctx.beginPath();
  for (let i = 0; i < len; i++){
    const v = ordered[i];
    const x = i * w + w/2;
    const y = sh - (v / maxB) * (sh - 6) - 2;
    if (i === 0) sctx.moveTo(x, y); else sctx.lineTo(x, y);
  }
  sctx.stroke();
  sctx.shadowBlur = 0;
  // Peak label
  document.getElementById('sparkPeak').textContent = 'peak ' + maxB + '/s';
}

// === Deploys panel ===
const deploysEl = document.getElementById('deploys');
const depCt     = document.getElementById('depCt');
const deployList = [];   // newest first
function pushDeploy(j){
  const item = {
    sha: j.sha, author: j.author, branch: j.branch, msg: j.msg,
    state: 'running', node: null,
  };
  deployList.unshift(item);
  if (deployList.length > 24) deployList.pop();
  j._deployItem = item;
  renderDeploys();
}
function updateDeploy(j, state){
  if (!j._deployItem) return;
  j._deployItem.state = state;
  renderDeploys();
}
function renderDeploys(){
  deploysEl.innerHTML = '';
  for (const d of deployList){
    const div = document.createElement('div');
    div.className = 'deploy';
    div.dataset.state = d.state;
    div.innerHTML = `
      <span class="sha">${escapeHtml(d.sha)}</span>
      <div class="meta">
        <div class="author">${escapeHtml(d.author)} · <span class="branch">${escapeHtml(d.branch)}</span></div>
        <div class="msg">${escapeHtml(d.msg)}</div>
      </div>
      <span class="state">${stateLabel(d.state)}</span>
    `;
    deploysEl.appendChild(div);
  }
  depCt.textContent = deployList.length;
}
function stateLabel(s){
  return s === 'running' ? '◴ RUN'
       : s === 'success' ? '✓ OK'
       : s === 'failed'  ? '✕ FAIL'
       : s === 'rolled'  ? '↺ ROLLED'
       : s.toUpperCase();
}

// === Log stream ===
const logListEl = document.getElementById('logList');
let logFilter = 'all';
let logPaused = false;
const MAX_LOG = 80;
function log(level, html){
  if (logPaused) return;
  const div = document.createElement('div');
  div.className = 'log-line ' + level;
  div.dataset.level = level;
  const now = new Date();
  const ts = now.toTimeString().slice(0, 8);
  div.innerHTML = `<span class="t">${ts}</span><span class="lv">${level.toUpperCase()}</span><span class="msg">${html}</span>`;
  applyFilterTo(div);
  logListEl.appendChild(div);
  while (logListEl.childElementCount > MAX_LOG) logListEl.firstChild.remove();
  logListEl.scrollTop = logListEl.scrollHeight;
}
function applyFilterTo(line){
  const lv = line.dataset.level;
  let show = true;
  if (logFilter === 'info'  && lv !== 'info' && lv !== 'ok') show = false;
  if (logFilter === 'err'   && lv !== 'error') show = false;
  if (logFilter === 'swarm' && lv !== 'swarm') show = false;
  line.style.display = show ? '' : 'none';
}
function applyFilterAll(){
  for (const line of logListEl.children) applyFilterTo(line);
}

document.getElementById('filterAll').addEventListener('click',  () => setFilter('all'));
document.getElementById('filterInfo').addEventListener('click', () => setFilter('info'));
document.getElementById('filterErr').addEventListener('click',  () => setFilter('err'));
document.getElementById('filterSwarm').addEventListener('click',() => setFilter('swarm'));
document.getElementById('pauseBtn').addEventListener('click',   () => {
  logPaused = !logPaused;
  document.getElementById('pauseBtn').setAttribute('aria-pressed', logPaused ? 'true' : 'false');
  document.getElementById('pauseBtn').textContent = logPaused ? 'PAUSED' : 'PAUSE';
});
function setFilter(f){
  logFilter = f;
  for (const id of ['filterAll','filterInfo','filterErr','filterSwarm']){
    document.getElementById(id).setAttribute('aria-pressed', 'false');
  }
  document.getElementById('filter' + (f === 'all' ? 'All' : f === 'info' ? 'Info' : f === 'err' ? 'Err' : 'Swarm')).setAttribute('aria-pressed', 'true');
  applyFilterAll();
}

// === HUD ===
const mActive = document.getElementById('mActive');
const mTps    = document.getElementById('mTps');
const mOk     = document.getElementById('mOk');
const mFail   = document.getElementById('mFail');
const mRep    = document.getElementById('mRep');
const mUp     = document.getElementById('mUp');
const mP50    = document.getElementById('mP50');
const mP95    = document.getElementById('mP95');
const mSr     = document.getElementById('mSr');
let hudAcc = 0;
function refreshHud(){
  hudAcc += 1;
  if (hudAcc < 6) return;
  hudAcc = 0;
  mActive.textContent = stats.active;
  // throughput = sum of last 10s buckets / 10
  const len = stats.completedBuckets.length;
  let recent10 = 0;
  for (let i = 0; i < 10; i++){
    recent10 += stats.completedBuckets[(stats.bucketIdx - i + len) % len];
  }
  mTps.textContent = (recent10 / 10).toFixed(1);
  mOk.textContent  = stats.ok;
  mFail.textContent = stats.fail;
  mRep.textContent = REPLICAS;
  // uptime
  const upS = (performance.now() - stats.startedAt) / 1000;
  const m = Math.floor(upS / 60), s = Math.floor(upS % 60);
  mUp.textContent = m + ':' + (s < 10 ? '0' : '') + s;
  // percentiles
  if (stats.durations.length){
    const sorted = stats.durations.slice().sort((a, b) => a - b);
    const p50 = sorted[Math.floor(sorted.length * 0.50)];
    const p95 = sorted[Math.floor(sorted.length * 0.95)];
    mP50.textContent = p50.toFixed(1) + 's';
    mP95.textContent = p95.toFixed(1) + 's';
  }
  const total = stats.ok + stats.fail;
  mSr.textContent = total === 0 ? '100%' : Math.round(stats.ok / total * 100) + '%';
}

// === Loop ===
let prev = performance.now();
function loop(now){
  const dt = Math.min(0.1, (now - prev) / 1000);
  prev = now;
  tick(dt);
  draw();
  drawSpark();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// === Boot — seed a few in-flight jobs so the canvas isn't empty ===
for (let i = 0; i < 3; i++) spawnJob();
log('info', `pipeline online — ${STAGES.length} stages, ${REPLICAS} replicas`);
</script>
