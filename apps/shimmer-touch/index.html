<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Shimmer Touch</title>
<link rel="icon" href="https://emojicdn.elk.sh/✨">
<meta property="og:title" content="Shimmer Touch">
<meta property="og:description" content="Move your mouse to paint sparkling glitter trails with satisfying chime sounds">
<meta property="og:url" content="https://sloppy.live/shimmer-touch">
<meta property="og:image" content="https://sloppy.live/shimmer-touch/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,wght@0,200;0,400;1,200&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0810;cursor:none}
canvas{display:block;position:fixed;top:0;left:0}
.start-overlay{position:fixed;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:50;background:rgba(10,8,16,0.95);transition:opacity 0.8s;cursor:pointer}
.start-overlay.hidden{opacity:0;pointer-events:none}
.start-overlay h1{font-family:'Newsreader',serif;font-weight:200;font-style:italic;font-size:clamp(28px,6vw,48px);color:rgba(220,200,255,0.7);margin-bottom:8px;letter-spacing:2px}
.start-overlay p{font-family:'Newsreader',serif;font-weight:200;font-size:14px;color:rgba(180,160,210,0.4);margin-bottom:30px}
.start-btn{font-family:'Newsreader',serif;font-weight:200;font-style:italic;font-size:16px;color:rgba(220,200,255,0.5);background:none;border:1px solid rgba(200,180,240,0.15);padding:12px 40px;cursor:pointer;letter-spacing:3px;transition:all 0.3s}
.start-btn:hover{border-color:rgba(200,180,240,0.4);color:rgba(220,200,255,0.8)}
.palette-bar{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:20}
.pal-dot{width:18px;height:18px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:border-color 0.2s,transform 0.2s;opacity:0.6}
.pal-dot:hover,.pal-dot.active{border-color:rgba(255,255,255,0.4);transform:scale(1.2);opacity:1}
.info{position:fixed;top:8px;right:12px;font-family:'Newsreader',serif;font-weight:200;font-size:11px;color:rgba(180,160,210,0.2);z-index:20}
</style>
</head>
<body>
<canvas id="cv"></canvas>
<div class="start-overlay" id="overlay">
  <h1>Shimmer Touch</h1>
  <p>move to sparkle — tap for chimes</p>
  <button class="start-btn" id="start-btn">begin</button>
</div>
<div class="palette-bar" id="palette-bar"></div>
<div class="info" id="info"></div>

<script>
var C=document.getElementById('cv'),X=C.getContext('2d');
var W,H;
function resize(){W=C.width=window.innerWidth;H=C.height=window.innerHeight;}
window.addEventListener('resize',resize);resize();

var started=false,t=0;
var mx=W/2,my=H/2,pmx=W/2,pmy=H/2,mouseDown=false;
var glitters=[],trails=[],chimeRipples=[];
var totalGlitters=0;

// Audio context (created on user gesture)
var audioCtx=null;
function initAudio(){
  if(audioCtx)return;
  audioCtx=new(window.AudioContext||window.webkitAudioContext)();
}

// Pentatonic chime notes (relaxing)
var NOTES=[261.6,293.7,329.6,392.0,440.0,523.3,587.3,659.3,784.0,880.0];
var lastChimeTime=0;

function playChime(freq,vol){
  if(!audioCtx)return;
  var now=audioCtx.currentTime;
  if(now-lastChimeTime<0.06)return; // rate limit
  lastChimeTime=now;

  var osc=audioCtx.createOscillator();
  var gain=audioCtx.createGain();
  var filter=audioCtx.createBiquadFilter();

  osc.type='sine';
  osc.frequency.setValueAtTime(freq,now);
  osc.frequency.exponentialRampToValueAtTime(freq*1.002,now+0.3);

  filter.type='lowpass';
  filter.frequency.setValueAtTime(2000,now);

  gain.gain.setValueAtTime(vol*0.12,now);
  gain.gain.exponentialRampToValueAtTime(0.001,now+1.2);

  osc.connect(filter);
  filter.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now+1.3);

  // Harmonic overtone
  var osc2=audioCtx.createOscillator();
  var gain2=audioCtx.createGain();
  osc2.type='sine';
  osc2.frequency.setValueAtTime(freq*2,now);
  gain2.gain.setValueAtTime(vol*0.03,now);
  gain2.gain.exponentialRampToValueAtTime(0.001,now+0.8);
  osc2.connect(gain2);gain2.connect(audioCtx.destination);
  osc2.start(now);osc2.stop(now+0.9);
}

// Palettes
var PALETTES=[
  {name:'Aurora',colors:['#a0e8ff','#60c0ff','#c0a0ff','#ff80c0','#ffe0a0'],bg:'#060810'},
  {name:'Rose Gold',colors:['#ffc0a0','#ff90a0','#ffcc80','#ffe0c0','#ffa0b0'],bg:'#0c0808'},
  {name:'Ocean',colors:['#40e0d0','#60b0ff','#80ffd0','#a0d0ff','#c0fff0'],bg:'#060a10'},
  {name:'Lavender',colors:['#d0a0ff','#b080e0','#e0c0ff','#c0a0e0','#f0d0ff'],bg:'#08060c'},
  {name:'Firefly',colors:['#ffe060','#ffc040','#ffee80','#e0c020','#fff0a0'],bg:'#080a06'},
  {name:'Prism',colors:['#ff6080','#ffb040','#ffe060','#60ff80','#60a0ff'],bg:'#080808'}
];
var currentPal=0;

function buildPalette(){
  var bar=document.getElementById('palette-bar');
  bar.innerHTML='';
  PALETTES.forEach(function(p,i){
    var dot=document.createElement('div');
    dot.className='pal-dot'+(i===currentPal?' active':'');
    dot.style.background='linear-gradient(135deg,'+p.colors[0]+','+p.colors[2]+')';
    dot.title=p.name;
    dot.onclick=function(e){e.stopPropagation();currentPal=i;buildPalette();};
    bar.appendChild(dot);
  });
}
buildPalette();

function pal(){return PALETTES[currentPal];}

function spawnGlitter(x,y,count,vel){
  var colors=pal().colors;
  for(var i=0;i<count;i++){
    var a=Math.random()*Math.PI*2;
    var v=(vel||1)*(0.5+Math.random()*2);
    glitters.push({
      x:x+(Math.random()-0.5)*8,
      y:y+(Math.random()-0.5)*8,
      vx:Math.cos(a)*v,
      vy:Math.sin(a)*v,
      size:1+Math.random()*3,
      life:60+Math.random()*120,
      maxLife:60+Math.random()*120,
      color:colors[Math.floor(Math.random()*colors.length)],
      twinkle:Math.random()*Math.PI*2,
      twinkleSpd:3+Math.random()*5,
      gravity:0.01+Math.random()*0.02,
      drag:0.985+Math.random()*0.01
    });
    totalGlitters++;
  }
}

function addTrail(x,y){
  trails.push({x:x,y:y,size:4+Math.random()*6,life:40+Math.random()*30,
    maxLife:40+Math.random()*30,color:pal().colors[Math.floor(Math.random()*pal().colors.length)]});
}

function addChimeRipple(x,y){
  chimeRipples.push({x:x,y:y,r:0,maxR:60+Math.random()*40,life:1,
    color:pal().colors[Math.floor(Math.random()*pal().colors.length)]});
}

// Mouse/touch
function onMove(x,y){
  pmx=mx;pmy=my;mx=x;my=y;
  if(!started)return;
  var dx=mx-pmx,dy=my-pmy;
  var dist=Math.sqrt(dx*dx+dy*dy);
  if(dist>2){
    var count=Math.min(8,Math.floor(dist/3)+1);
    spawnGlitter(mx,my,count,dist*0.15);
    addTrail(mx,my);
    // Chime based on position
    if(dist>8&&Math.random()<0.3){
      var noteIdx=Math.floor((my/H)*NOTES.length);
      noteIdx=Math.max(0,Math.min(NOTES.length-1,noteIdx));
      playChime(NOTES[noteIdx],0.5+dist*0.02);
    }
  }
}

function onClick(x,y){
  if(!started)return;
  spawnGlitter(x,y,25,3);
  addChimeRipple(x,y);
  // Play a chord
  var baseNote=Math.floor((y/H)*6);
  playChime(NOTES[baseNote],0.8);
  setTimeout(function(){playChime(NOTES[Math.min(baseNote+2,NOTES.length-1)],0.6);},80);
  setTimeout(function(){playChime(NOTES[Math.min(baseNote+4,NOTES.length-1)],0.4);},160);
}

C.addEventListener('mousemove',function(e){onMove(e.clientX,e.clientY);});
C.addEventListener('mousedown',function(e){mouseDown=true;onClick(e.clientX,e.clientY);});
C.addEventListener('mouseup',function(){mouseDown=false;});
C.addEventListener('touchmove',function(e){
  e.preventDefault();var tc=e.touches[0];onMove(tc.clientX,tc.clientY);
},{passive:false});
C.addEventListener('touchstart',function(e){
  e.preventDefault();var tc=e.touches[0];
  mx=tc.clientX;my=tc.clientY;
  if(!started){startApp();return;}
  onClick(tc.clientX,tc.clientY);
},{passive:false});

document.getElementById('start-btn').addEventListener('click',function(e){
  e.stopPropagation();startApp();
});

function startApp(){
  initAudio();
  started=true;
  document.getElementById('overlay').classList.add('hidden');
  playChime(NOTES[4],0.5);
  setTimeout(function(){playChime(NOTES[6],0.4);},150);
  setTimeout(function(){playChime(NOTES[8],0.3);},300);
}

function hexToRgb(hex){
  return{r:parseInt(hex.slice(1,3),16),g:parseInt(hex.slice(3,5),16),b:parseInt(hex.slice(5,7),16)};
}

function draw(){
  t+=0.016;

  // Soft fade (creates trails)
  X.fillStyle=pal().bg+'18';
  X.fillRect(0,0,W,H);

  // Very subtle ambient glow at mouse position
  if(started){
    var ag=X.createRadialGradient(mx,my,0,mx,my,80);
    var pc=pal().colors[0];
    ag.addColorStop(0,pc.slice(0,7)+'08');
    ag.addColorStop(1,'transparent');
    X.fillStyle=ag;
    X.fillRect(mx-80,my-80,160,160);
  }

  // Trail dots (soft glow behind glitter)
  for(var i=trails.length-1;i>=0;i--){
    var tr=trails[i];
    tr.life--;
    if(tr.life<=0){trails.splice(i,1);continue;}
    var ta=tr.life/tr.maxLife;
    var rgb=hexToRgb(tr.color);
    var tg=X.createRadialGradient(tr.x,tr.y,0,tr.x,tr.y,tr.size);
    tg.addColorStop(0,'rgba('+rgb.r+','+rgb.g+','+rgb.b+','+ta*0.15+')');
    tg.addColorStop(1,'transparent');
    X.fillStyle=tg;
    X.fillRect(tr.x-tr.size,tr.y-tr.size,tr.size*2,tr.size*2);
  }

  // Chime ripples
  for(var i=chimeRipples.length-1;i>=0;i--){
    var cr=chimeRipples[i];
    cr.r+=2.5;cr.life-=0.012;
    if(cr.life<=0){chimeRipples.splice(i,1);continue;}
    var rgb2=hexToRgb(cr.color);
    X.strokeStyle='rgba('+rgb2.r+','+rgb2.g+','+rgb2.b+','+cr.life*0.25+')';
    X.lineWidth=1.5;
    X.beginPath();X.arc(cr.x,cr.y,cr.r,0,Math.PI*2);X.stroke();
    if(cr.r>15){
      X.strokeStyle='rgba('+rgb2.r+','+rgb2.g+','+rgb2.b+','+cr.life*0.1+')';
      X.beginPath();X.arc(cr.x,cr.y,cr.r*0.6,0,Math.PI*2);X.stroke();
    }
  }

  // Glitter particles
  for(var i=glitters.length-1;i>=0;i--){
    var g=glitters[i];
    g.vx*=g.drag;g.vy*=g.drag;
    g.vy+=g.gravity;
    g.x+=g.vx;g.y+=g.vy;
    g.life--;
    g.twinkle+=g.twinkleSpd*0.016;

    if(g.life<=0){glitters.splice(i,1);continue;}

    var alpha=(g.life/g.maxLife);
    var twinkle=Math.sin(g.twinkle);
    var visible=twinkle>-0.3; // twinkle off sometimes
    if(!visible)continue;

    var brightness=0.5+twinkle*0.5;
    var sz=g.size*brightness*(0.5+alpha*0.5);

    var rgb3=hexToRgb(g.color);
    // Glow
    var gg=X.createRadialGradient(g.x,g.y,0,g.x,g.y,sz*3);
    gg.addColorStop(0,'rgba('+rgb3.r+','+rgb3.g+','+rgb3.b+','+alpha*brightness*0.3+')');
    gg.addColorStop(1,'transparent');
    X.fillStyle=gg;
    X.fillRect(g.x-sz*3,g.y-sz*3,sz*6,sz*6);

    // Core sparkle — 4-point star
    X.fillStyle='rgba('+(rgb3.r+40)+','+(rgb3.g+40)+','+(rgb3.b+40)+','+alpha*brightness*0.9+')';
    X.fillRect(g.x-sz/2,g.y-sz*1.5,sz,sz*3); // vertical
    X.fillRect(g.x-sz*1.5,g.y-sz/2,sz*3,sz); // horizontal
    // Center bright point
    X.fillStyle='rgba(255,255,255,'+alpha*brightness*0.6+')';
    X.fillRect(g.x-sz*0.3,g.y-sz*0.3,sz*0.6,sz*0.6);
  }

  // Custom cursor
  if(started){
    X.strokeStyle='rgba(200,180,240,0.3)';
    X.lineWidth=1;
    X.beginPath();X.arc(mx,my,6,0,Math.PI*2);X.stroke();
    X.fillStyle='rgba(220,200,255,0.5)';
    X.fillRect(mx-1,my-1,2,2);
  }

  requestAnimationFrame(draw);
}
draw();
</script>
</body>
</html>
