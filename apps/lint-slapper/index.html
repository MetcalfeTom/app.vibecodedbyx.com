<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>lint slapper</title>
<meta name="description" content="Fling a sticky hand at the bedroom floor. Collect fur, lint, and dust until it loses its stickiness." />
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%96%90%EF%B8%8F" />
<meta property="og:title" content="Lint Slapper" />
<meta property="og:description" content="Fling a sticky hand at the bedroom floor. Collect fur, lint, and dust until it loses its stickiness." />
<meta property="og:url" content="https://sloppy.live/lint-slapper/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/cartoon%20pink%20sticky%20hand%20toy%20on%20rubber%20string%20flinging%20across%20dusty%20bedroom%20floor%20collecting%20fur%20and%20lint%20cozy%20pastel?width=1200&height=630&nologo=true" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bungee+Inline&family=Bowlby+One+SC&family=Fraunces:ital,wght@1,400;1,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --floor: #d8c5a8;
    --floor-dark: #a08866;
    --shadow: #6b4f2b;
    --wall: #f0d9b9;
    --hand-pink: #ff7ab6;
    --hand-pink-dark: #c5447a;
    --hand-grimy: #6a4f3d;
    --string: #2e2018;
    --ink: #1c150c;
    --gauge-ok: #5fc070;
    --gauge-warn: #f5b133;
    --gauge-bad: #d54a3a;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    height: 100%;
    overflow: hidden;
    background:
      radial-gradient(ellipse at 50% 110%, #b58c5a 0%, #6b4a25 70%);
    color: var(--ink);
    font-family: 'JetBrains Mono', monospace;
    user-select: none;
    touch-action: none;
  }
  #stage { position: fixed; inset: 0; }
  canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
  #bgCanvas { z-index: 1; }
  #gameCanvas { z-index: 2; }

  .ui { position: fixed; z-index: 5; pointer-events: none; }
  .ui > * { pointer-events: auto; }

  header.ui {
    top: 1rem; left: 1.4rem;
    line-height: 0.95;
  }
  h1 {
    font-family: 'Bungee Inline', cursive;
    font-size: clamp(1.8rem, 4.2vw, 2.8rem);
    color: var(--hand-pink);
    text-shadow:
      2px 2px 0 var(--ink),
      4px 4px 0 rgba(0,0,0,0.18);
    letter-spacing: 0.02em;
  }
  h1 .lint { color: #fcefb5; }
  .sub {
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 1rem;
    color: #fbeed4;
    margin-top: 0.45rem;
    text-shadow: 0 2px 3px rgba(0,0,0,0.5);
  }

  .hud {
    position: fixed;
    top: 1rem; right: 1.4rem;
    z-index: 5;
    text-align: right;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: #fbeed4;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
    line-height: 1.7;
  }
  .hud .val {
    font-family: 'Bowlby One SC', sans-serif;
    color: #fcefb5;
    font-size: 1.6rem;
    letter-spacing: 0.02em;
    text-shadow: 2px 2px 0 var(--ink);
    display: block;
    line-height: 1;
    margin-top: 0.1rem;
  }
  .hud .val.bad { color: var(--gauge-bad); }
  .hud .val.warn { color: var(--gauge-warn); }
  .hud .val.ok { color: var(--gauge-ok); }

  .gauge {
    position: fixed;
    bottom: 5.2rem;
    left: 50%;
    transform: translateX(-50%);
    width: min(28rem, calc(100vw - 2rem));
    z-index: 4;
    pointer-events: none;
  }
  .gauge .gauge-label {
    text-align: center;
    color: #fbeed4;
    font-size: 0.66rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    margin-bottom: 0.3rem;
    text-shadow: 0 1px 2px rgba(0,0,0,0.6);
  }
  .gauge .track {
    height: 0.72rem;
    background: rgba(20, 12, 6, 0.6);
    border: 1px solid rgba(255, 250, 230, 0.18);
    border-radius: 999px;
    overflow: hidden;
    box-shadow: inset 0 1px 2px rgba(0,0,0,0.6);
  }
  .gauge .fill {
    height: 100%;
    width: 100%;
    background: linear-gradient(90deg, var(--gauge-bad), var(--gauge-warn) 40%, var(--gauge-ok) 60%);
    transition: width 0.25s ease;
    box-shadow: 0 0 12px rgba(95, 192, 112, 0.5);
  }

  .toast {
    position: fixed;
    top: 7rem;
    left: 50%;
    transform: translate(-50%, 0);
    z-index: 6;
    font-family: 'Bungee Inline', cursive;
    font-size: 1rem;
    letter-spacing: 0.12em;
    color: #fcefb5;
    text-shadow: 2px 2px 0 var(--ink), 4px 4px 0 rgba(0,0,0,0.3);
    opacity: 0;
    pointer-events: none;
    text-align: center;
  }
  .toast.show { animation: tpop 1.1s ease-out forwards; }
  @keyframes tpop {
    0% { transform: translate(-50%, 12px); opacity: 0; }
    20% { transform: translate(-50%, 0); opacity: 1; }
    100% { transform: translate(-50%, -28px); opacity: 0; }
  }

  .hint {
    position: fixed;
    bottom: 1.3rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    font-family: 'Fraunces', serif;
    font-style: italic;
    font-size: 0.95rem;
    color: rgba(251, 238, 212, 0.7);
    text-shadow: 0 1px 2px rgba(0,0,0,0.55);
    transition: opacity 0.5s ease;
    pointer-events: none;
  }
  .hint.fade { opacity: 0; }

  .controls {
    position: fixed;
    bottom: 1.3rem;
    right: 1.3rem;
    z-index: 5;
    display: flex;
    gap: 0.45rem;
  }
  .btn {
    appearance: none;
    border: 1.5px solid rgba(252, 239, 181, 0.55);
    background: rgba(20, 12, 6, 0.55);
    color: #fcefb5;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    padding: 0.5rem 0.85rem;
    border-radius: 999px;
    cursor: pointer;
    transition: transform 0.1s, background 0.12s;
    min-height: 2.4rem;
  }
  .btn:hover { background: rgba(252, 239, 181, 0.16); transform: translateY(-1px); }
  .btn:focus-visible { outline: 3px solid var(--hand-pink); outline-offset: 2px; }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(8, 4, 2, 0.78);
    z-index: 10;
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    padding: 2rem;
    text-align: center;
  }
  .overlay.show { display: flex; }
  .overlay .end-title {
    font-family: 'Bungee Inline', cursive;
    font-size: clamp(2rem, 6vw, 3.4rem);
    color: var(--hand-pink);
    text-shadow: 2px 2px 0 var(--ink), 4px 4px 0 rgba(0,0,0,0.4);
    letter-spacing: 0.04em;
  }
  .overlay .end-sub {
    font-family: 'Fraunces', serif;
    font-style: italic;
    color: #fbeed4;
    font-size: 1.2rem;
    margin: 0.7rem 0 2rem;
    max-width: 26rem;
  }
  .overlay .end-stats {
    display: flex;
    gap: 1.8rem;
    margin-bottom: 2rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .overlay .end-stat {
    text-align: center;
    color: #fbeed4;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
  }
  .overlay .end-stat .v {
    display: block;
    font-family: 'Bowlby One SC', sans-serif;
    font-size: 2.4rem;
    color: #fcefb5;
    text-shadow: 2px 2px 0 var(--ink);
    margin-top: 0.2rem;
  }

  @media (max-width: 720px) {
    header.ui { top: 0.6rem; left: 0.8rem; }
    .hud { top: 0.6rem; right: 0.8rem; font-size: 0.62rem; }
    .hud .val { font-size: 1.2rem; }
    .sub { display: none; }
    .gauge { bottom: 4.2rem; }
    .hint { font-size: 0.85rem; bottom: 0.9rem; }
    .controls { bottom: 0.9rem; right: 0.9rem; }
  }
  @media (prefers-reduced-motion: reduce) {
    .toast.show { animation: none; opacity: 1; }
  }
</style>
</head>
<body>

<div id="stage" role="application" aria-label="Drag the sticky hand on the rubber string back, release to fling it at the floor and collect dust, lint, and fur. Game ends when the hand loses all its stickiness.">
  <canvas id="bgCanvas"></canvas>
  <canvas id="gameCanvas"></canvas>
</div>

<header class="ui">
  <h1><span class="lint">lint</span> slapper</h1>
  <p class="sub">drag back · fling · collect the gunk</p>
</header>

<div class="hud" aria-live="polite">
  <div>score <span class="val ok" id="score">0</span></div>
  <div>caught <span class="val" id="caught">0</span></div>
</div>

<div class="gauge">
  <div class="gauge-label">stickiness · <span id="stickPct">100</span>%</div>
  <div class="track"><div class="fill" id="stickFill"></div></div>
</div>

<div class="hint" id="hint">drag the hand · release to fling · collect everything you can</div>
<div class="toast" id="toast"></div>

<div class="controls">
  <button class="btn" id="resetBtn" title="Reset (R)">⟲ reset</button>
  <button class="btn" id="muteBtn" title="Mute (M)">♪ on</button>
</div>

<div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-hidden="true">
  <div class="end-title" id="endTitle">tossed out</div>
  <div class="end-sub" id="endSub">the hand has lost its stickiness. into the bin it goes.</div>
  <div class="end-stats">
    <div class="end-stat">score<span class="v" id="endScore">0</span></div>
    <div class="end-stat">caught<span class="v" id="endCaught">0</span></div>
    <div class="end-stat">flings<span class="v" id="endFlings">0</span></div>
  </div>
  <button class="btn" id="playAgain">⟲ new hand</button>
</div>

<script>
'use strict';

const bgCanvas = document.getElementById('bgCanvas');
const gameCanvas = document.getElementById('gameCanvas');
const bg = bgCanvas.getContext('2d');
const ctx = gameCanvas.getContext('2d');

let W = 0, H = 0, DPR = 1;
function fit(){
  DPR = Math.min(2, window.devicePixelRatio || 1);
  W = window.innerWidth; H = window.innerHeight;
  for (const c of [bgCanvas, gameCanvas]){
    c.width = Math.floor(W * DPR);
    c.height = Math.floor(H * DPR);
    c.style.width = W + 'px'; c.style.height = H + 'px';
  }
  bg.setTransform(DPR, 0, 0, DPR, 0, 0);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  placeWrist();
  drawBackground();
}

// ───────── AUDIO ─────────
let actx = null, muted = false, userGestured = false;
function ensureAudio(){
  if (!userGestured || muted) return null;
  if (!actx){
    try { actx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e){ return null; }
  }
  if (actx.state === 'suspended') actx.resume();
  return actx;
}
function sfxStretch(){
  const a = ensureAudio(); if (!a) return;
  const t = a.currentTime;
  const o = a.createOscillator(); const g = a.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(180, t);
  o.frequency.linearRampToValueAtTime(340, t + 0.18);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.06, t + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
  o.connect(g); g.connect(a.destination);
  o.start(t); o.stop(t + 0.25);
}
function sfxFling(){
  const a = ensureAudio(); if (!a) return;
  const t = a.currentTime;
  // a wet "thwip" — bandpass-swept noise + sub
  const len = Math.floor(a.sampleRate * 0.3);
  const buf = a.createBuffer(1, len, a.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/len, 1.5);
  const src = a.createBufferSource(); src.buffer = buf;
  const bp = a.createBiquadFilter();
  bp.type = 'bandpass';
  bp.frequency.setValueAtTime(800, t);
  bp.frequency.exponentialRampToValueAtTime(1800, t + 0.18);
  bp.Q.value = 1.6;
  const g = a.createGain(); g.gain.value = 0.32;
  src.connect(bp); bp.connect(g); g.connect(a.destination);
  src.start(t); src.stop(t + 0.32);
}
function sfxStick(intensity){
  const a = ensureAudio(); if (!a) return;
  const t = a.currentTime;
  // sticky "schmuck" — short low-freq squelch
  const len = Math.floor(a.sampleRate * 0.32);
  const buf = a.createBuffer(1, len, a.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/len, 2);
  const src = a.createBufferSource(); src.buffer = buf;
  const lp = a.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 380; lp.Q.value = 1;
  const g = a.createGain(); g.gain.value = 0.34 + intensity * 0.18;
  src.connect(lp); lp.connect(g); g.connect(a.destination);
  src.start(t); src.stop(t + 0.34);
  // pitch chirp on top
  const o = a.createOscillator();
  const og = a.createGain();
  o.type = 'sine';
  o.frequency.setValueAtTime(220 + intensity*40, t);
  o.frequency.exponentialRampToValueAtTime(80, t + 0.16);
  og.gain.setValueAtTime(0.0001, t);
  og.gain.exponentialRampToValueAtTime(0.14, t + 0.01);
  og.gain.exponentialRampToValueAtTime(0.0001, t + 0.2);
  o.connect(og); og.connect(a.destination);
  o.start(t); o.stop(t + 0.22);
}
function sfxMiss(){
  const a = ensureAudio(); if (!a) return;
  const t = a.currentTime;
  const o = a.createOscillator(); const g = a.createGain();
  o.type = 'triangle';
  o.frequency.setValueAtTime(180, t);
  o.frequency.exponentialRampToValueAtTime(60, t + 0.18);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.1, t + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.22);
  o.connect(g); g.connect(a.destination);
  o.start(t); o.stop(t + 0.24);
}
function sfxRetract(){
  const a = ensureAudio(); if (!a) return;
  const t = a.currentTime;
  const o = a.createOscillator(); const g = a.createGain();
  o.type = 'triangle';
  o.frequency.setValueAtTime(360, t);
  o.frequency.exponentialRampToValueAtTime(180, t + 0.14);
  g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.06, t + 0.02);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.18);
  o.connect(g); g.connect(a.destination);
  o.start(t); o.stop(t + 0.2);
}
function sfxGameOver(){
  const a = ensureAudio(); if (!a) return;
  const t = a.currentTime;
  let f = 360;
  for (let i = 0; i < 4; i++){
    const o = a.createOscillator(); const g = a.createGain();
    o.type = 'sawtooth';
    o.frequency.value = f;
    g.gain.setValueAtTime(0.0001, t + i * 0.18);
    g.gain.exponentialRampToValueAtTime(0.1, t + i * 0.18 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t + i * 0.18 + 0.18);
    o.connect(g); g.connect(a.destination);
    o.start(t + i * 0.18); o.stop(t + i * 0.18 + 0.22);
    f *= 0.75;
  }
}

document.getElementById('muteBtn').addEventListener('click', (e) => {
  muted = !muted;
  e.currentTarget.textContent = muted ? '♪ off' : '♪ on';
});

// ───────── BACKGROUND ─────────
function drawBackground(){
  bg.clearRect(0, 0, W, H);
  const skirtY = H * 0.22;
  // wall (back)
  const wallG = bg.createLinearGradient(0, 0, 0, skirtY);
  wallG.addColorStop(0, '#f6e4be');
  wallG.addColorStop(1, '#e6d1a5');
  bg.fillStyle = wallG; bg.fillRect(0, 0, W, skirtY);
  // wallpaper stripes
  bg.strokeStyle = 'rgba(120, 70, 30, 0.07)';
  bg.lineWidth = 1;
  for (let x = 28; x < W; x += 56){
    bg.beginPath(); bg.moveTo(x, 0); bg.lineTo(x, skirtY); bg.stroke();
  }
  // skirting board
  bg.fillStyle = '#9c7644';
  bg.fillRect(0, skirtY - 4, W, 6);
  bg.fillStyle = '#674020';
  bg.fillRect(0, skirtY + 2, W, 2);

  // floor — wood plank gradient
  const floorG = bg.createLinearGradient(0, skirtY, 0, H);
  floorG.addColorStop(0, '#c5a87a');
  floorG.addColorStop(0.6, '#a98454');
  floorG.addColorStop(1, '#7a5a32');
  bg.fillStyle = floorG; bg.fillRect(0, skirtY + 2, W, H - skirtY - 2);

  // wood plank grain
  const plankHeight = 64;
  for (let y = skirtY + 4; y < H; y += plankHeight){
    bg.strokeStyle = 'rgba(40, 20, 0, 0.16)';
    bg.lineWidth = 1;
    bg.beginPath(); bg.moveTo(0, y); bg.lineTo(W, y); bg.stroke();
    for (let i = 0; i < 14; i++){
      const x = Math.random() * W;
      const ww = 60 + Math.random() * 180;
      bg.strokeStyle = 'rgba(40, 20, 0, 0.05)';
      bg.beginPath();
      bg.moveTo(x, y + 8 + Math.random() * plankHeight - 12);
      bg.bezierCurveTo(x + ww * 0.3, y + 12 + Math.random() * 4,
                       x + ww * 0.6, y + 20 + Math.random() * 4,
                       x + ww, y + 12 + Math.random() * 8);
      bg.stroke();
    }
  }

  // furniture silhouettes — couch leg + bed frame on right
  bg.save();
  bg.fillStyle = 'rgba(20, 10, 0, 0.5)';
  // couch leg far-left
  bg.fillRect(W * 0.05, skirtY + 4, 12, H - skirtY - 4);
  bg.fillRect(W * 0.05 - 4, skirtY + 4, 4, 16);
  // bed frame right
  bg.fillRect(W * 0.85, skirtY + 4, 14, H - skirtY - 4);
  // dresser-like block top-right
  bg.fillRect(W * 0.6, skirtY + 4, W * 0.18, 38);
  bg.restore();

  // shadow cast on floor from couch
  bg.save();
  const couchShadow = bg.createLinearGradient(0, skirtY, 0, H);
  couchShadow.addColorStop(0, 'rgba(0,0,0,0.32)');
  couchShadow.addColorStop(1, 'rgba(0,0,0,0)');
  bg.fillStyle = couchShadow;
  bg.fillRect(0, skirtY, W * 0.13, H - skirtY);
  bg.fillStyle = couchShadow;
  bg.fillRect(W * 0.84, skirtY, W * 0.16, H - skirtY);
  bg.restore();

  // vignette
  const vg = bg.createRadialGradient(W/2, H/2, Math.min(W,H)*0.4, W/2, H/2, Math.max(W,H)*0.85);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.55)');
  bg.fillStyle = vg;
  bg.fillRect(0, 0, W, H);
}

// ───────── GAME STATE ─────────
const G = 1800;                  // gravity px/s²
const AIR = 0.992;
const wrist = { x: 0, y: 0 };    // anchor where the rubber string starts
let hand;
let items = [];                  // floating gunk on the floor
let bursts = [];
let collected = [];              // stuck items visualized on the hand
let score = 0;
let caught = 0;
let flings = 0;
let stickiness = 100;
let dragging = false;
let dragStart = null;
let lastDragXY = null;
let gameOver = false;
const MAX_PULL = 220;

function placeWrist(){
  wrist.x = W * 0.5;
  wrist.y = H - 60;
}

function newHand(){
  return {
    x: wrist.x, y: wrist.y,
    vx: 0, vy: 0,
    state: 'idle',         // idle | pulled | flying | retracting
    targetItem: null,
    age: 0,
    palmAngle: 0,
  };
}

// ───────── ITEMS ─────────
// Each kind: { id, name, color1, color2, radius, points, stickCost, render }
const ITEM_KINDS = [
  { id:'dustbun', name:'dust bunny', color1:'#9c9c9c', color2:'#5a5a5a',
    radius: 16, points: 8, stickCost: 3.5,
    rate: 1.0 },
  { id:'lint',    name:'lint ball',  color1:'#e6dfd2', color2:'#9d937e',
    radius: 10, points: 3, stickCost: 1.5,
    rate: 1.3 },
  { id:'hair',    name:'hair',       color1:'#3a1a08', color2:'#180a04',
    radius: 12, points: 5, stickCost: 2.4,
    rate: 0.9 },
  { id:'fur',     name:'cat fur',    color1:'#d59a5a', color2:'#7a4a18',
    radius: 14, points: 11, stickCost: 4.5,
    rate: 0.65 },
  { id:'crumb',   name:'crumb',      color1:'#7a5028', color2:'#3a200a',
    radius: 7,  points: 2, stickCost: 0.6,
    rate: 1.5 },
  { id:'glitter', name:'glitter',    color1:'#ff5ea1', color2:'#ffd864',
    radius: 8,  points: 18, stickCost: 1.2,
    rate: 0.3,  shiny: true },
  { id:'sticky',  name:'old candy',  color1:'#c25a3a', color2:'#5a1a00',
    radius: 11, points: 7, stickCost: 12,
    rate: 0.45, gross: true },
];

function spawnItem(){
  // weighted by `rate`
  const total = ITEM_KINDS.reduce((s, k) => s + k.rate, 0);
  let r = Math.random() * total;
  let kind = ITEM_KINDS[0];
  for (const k of ITEM_KINDS){ r -= k.rate; if (r <= 0){ kind = k; break; } }
  const skirtY = H * 0.22;
  const padTop = skirtY + 30;
  const padBot = H - 30;
  const padLeft = W * 0.12;
  const padRight = W * 0.86;
  // bias toward middle/back of the room (further away looks like deeper into the floor)
  const x = padLeft + Math.random() * (padRight - padLeft);
  const y = padTop + Math.pow(Math.random(), 0.85) * (padBot - padTop);
  items.push({
    kind, x, y,
    radius: kind.radius * (0.85 + Math.random() * 0.35),
    seed: Math.floor(Math.random() * 1e6),
    spin: Math.random() * Math.PI * 2,
    bob: Math.random() * Math.PI * 2,
    born: performance.now(),
  });
}

function seedInitialItems(){
  for (let i = 0; i < 22; i++) spawnItem();
}

function drawItem(c, it){
  const k = it.kind;
  c.save();
  c.translate(it.x, it.y);
  c.rotate(it.spin);
  // soft shadow
  c.fillStyle = 'rgba(0,0,0,0.32)';
  c.beginPath();
  c.ellipse(0, it.radius * 0.7, it.radius * 0.95, it.radius * 0.3, 0, 0, Math.PI * 2);
  c.fill();
  // body
  if (k.id === 'dustbun' || k.id === 'lint' || k.id === 'fur'){
    drawFluffy(c, 0, 0, it.radius, it.seed, k.color1, k.color2);
  } else if (k.id === 'hair'){
    drawHairStrand(c, 0, 0, it.radius * 1.6, it.seed, k.color1);
  } else if (k.id === 'crumb'){
    drawCrumb(c, 0, 0, it.radius, it.seed, k.color1, k.color2);
  } else if (k.id === 'glitter'){
    drawGlitter(c, 0, 0, it.radius, it.seed);
  } else if (k.id === 'sticky'){
    drawCandy(c, 0, 0, it.radius, it.seed);
  }
  c.restore();
}

function drawFluffy(c, x, y, r, seed, c1, c2){
  // multi-blob fluff with seeded fringe
  const rnd = mulberry32(seed);
  const blobs = 6 + Math.floor(rnd() * 4);
  c.fillStyle = c2;
  for (let i = 0; i < blobs; i++){
    const a = (i / blobs) * Math.PI * 2 + rnd() * 0.4;
    const dr = r * (0.6 + rnd() * 0.4);
    c.beginPath();
    c.arc(x + Math.cos(a) * r * 0.4, y + Math.sin(a) * r * 0.4, dr * 0.42, 0, Math.PI * 2);
    c.fill();
  }
  c.fillStyle = c1;
  c.beginPath();
  c.arc(x, y, r * 0.78, 0, Math.PI * 2);
  c.fill();
  // fringe wisps
  c.strokeStyle = c2;
  c.lineWidth = 1.2;
  c.lineCap = 'round';
  for (let i = 0; i < 12; i++){
    const a = rnd() * Math.PI * 2;
    const r1 = r * 0.7;
    const r2 = r * (1.0 + rnd() * 0.5);
    c.beginPath();
    c.moveTo(Math.cos(a) * r1, Math.sin(a) * r1);
    c.lineTo(Math.cos(a) * r2, Math.sin(a) * r2);
    c.stroke();
  }
}

function drawHairStrand(c, x, y, len, seed, color){
  const rnd = mulberry32(seed);
  c.strokeStyle = color;
  c.lineWidth = 1.8;
  c.lineCap = 'round';
  c.beginPath();
  c.moveTo(-len/2, 0);
  c.bezierCurveTo(-len/4, (rnd()-0.5)*len*0.6, len/4, (rnd()-0.5)*len*0.6, len/2, 0);
  c.stroke();
  // a second wispy strand
  c.lineWidth = 1.1;
  c.beginPath();
  c.moveTo(-len/2 + 3, 2);
  c.bezierCurveTo(-len/4, (rnd()-0.5)*len*0.5, len/4, (rnd()-0.5)*len*0.5, len/2 - 3, 1);
  c.stroke();
}

function drawCrumb(c, x, y, r, seed, c1, c2){
  const rnd = mulberry32(seed);
  c.fillStyle = c1;
  c.beginPath();
  irregularBlob(c, x, y, r, rnd);
  c.fill();
  c.fillStyle = c2;
  c.beginPath();
  c.arc(x - r * 0.3, y - r * 0.2, r * 0.25, 0, Math.PI * 2);
  c.fill();
}

function drawGlitter(c, x, y, r, seed){
  const rnd = mulberry32(seed);
  const palette = ['#ff5ea1', '#ffd864', '#a2eaff', '#c5ffba', '#e6a2ff'];
  const n = 5 + Math.floor(rnd() * 4);
  for (let i = 0; i < n; i++){
    const a = (i / n) * Math.PI * 2 + rnd() * 0.4;
    const dr = r * (0.4 + rnd() * 0.5);
    c.fillStyle = palette[Math.floor(rnd() * palette.length)];
    c.save();
    c.translate(Math.cos(a) * r * 0.3, Math.sin(a) * r * 0.3);
    c.rotate(rnd() * Math.PI);
    c.beginPath();
    c.moveTo(0, -dr);
    c.lineTo(dr * 0.3, 0);
    c.lineTo(0, dr);
    c.lineTo(-dr * 0.3, 0);
    c.closePath();
    c.fill();
    c.restore();
  }
  // sparkle
  c.fillStyle = '#fff8d6';
  c.beginPath();
  c.arc(0, 0, r * 0.18, 0, Math.PI * 2);
  c.fill();
}

function drawCandy(c, x, y, r, seed){
  // gross old candy with sticky aura
  c.fillStyle = '#c25a3a';
  c.beginPath();
  irregularBlob(c, x, y, r * 1.05, mulberry32(seed));
  c.fill();
  c.fillStyle = 'rgba(255, 220, 120, 0.7)';
  c.beginPath();
  c.arc(x - r * 0.2, y - r * 0.2, r * 0.4, 0, Math.PI * 2);
  c.fill();
  // sticky strands
  c.strokeStyle = 'rgba(200, 90, 50, 0.5)';
  c.lineWidth = 1.2;
  c.beginPath();
  c.moveTo(x - r, y + r * 0.5);
  c.quadraticCurveTo(x, y - r * 0.5, x + r, y + r * 0.4);
  c.stroke();
}

function irregularBlob(c, cx, cy, r, rnd){
  const pts = 8 + Math.floor(rnd() * 4);
  c.moveTo(cx + r, cy);
  for (let i = 1; i <= pts; i++){
    const a = (i / pts) * Math.PI * 2;
    const rr = r * (0.75 + rnd() * 0.5);
    c.lineTo(cx + Math.cos(a) * rr, cy + Math.sin(a) * rr);
  }
  c.closePath();
}

function mulberry32(seed){
  return function(){
    let t = seed += 0x6D2B79F5;
    t = Math.imul(t ^ t >>> 15, t | 1);
    t ^= t + Math.imul(t ^ t >>> 7, t | 61);
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}

// ───────── HAND DRAWING ─────────
function drawHand(c){
  const h = hand;
  // stretchy string from wrist to hand
  drawString(c, wrist.x, wrist.y, h.x, h.y);
  // the hand itself
  c.save();
  c.translate(h.x, h.y);
  // velocity-based rotation while flying
  if (h.state === 'flying' || h.state === 'retracting'){
    c.rotate(Math.atan2(h.vy, h.vx));
  } else if (h.state === 'pulled'){
    const dx = wrist.x - h.x, dy = wrist.y - h.y;
    c.rotate(Math.atan2(-dy, -dx));
  } else {
    c.rotate(-Math.PI / 2);
  }
  const stickFrac = Math.max(0, Math.min(1, stickiness / 100));
  // base palm color shifts from pink → grimy as stickiness drops
  const palmColor = mixColor('#ff7ab6', '#6a4f3d', 1 - stickFrac);
  const palmDark = mixColor('#c5447a', '#3a2a1c', 1 - stickFrac);
  // palm — chunky rounded oval
  c.fillStyle = palmColor;
  c.beginPath();
  c.ellipse(0, 0, 24, 18, 0, 0, Math.PI * 2);
  c.fill();
  c.strokeStyle = palmDark;
  c.lineWidth = 1.5;
  c.stroke();
  // wrist nub at back
  c.fillStyle = palmDark;
  c.beginPath();
  c.ellipse(-22, 0, 8, 6, 0, 0, Math.PI * 2);
  c.fill();
  // fingers (4 + thumb)
  for (let i = 0; i < 4; i++){
    const ang = (i - 1.5) * 0.32;
    const px = Math.cos(ang) * 24 + 10;
    const py = Math.sin(ang) * 24;
    c.fillStyle = palmColor;
    c.beginPath();
    c.ellipse(px, py, 8, 5, ang, 0, Math.PI * 2);
    c.fill();
    c.strokeStyle = palmDark;
    c.stroke();
  }
  // thumb
  c.fillStyle = palmColor;
  c.beginPath();
  c.ellipse(8, -16, 6, 9, -0.4, 0, Math.PI * 2);
  c.fill();
  c.stroke();
  // palm highlight (only when fresh)
  c.fillStyle = 'rgba(255, 255, 255, ' + (0.35 * stickFrac).toFixed(2) + ')';
  c.beginPath();
  c.ellipse(-4, -6, 10, 4, 0, 0, Math.PI * 2);
  c.fill();

  // collected gunk visualized on the palm
  for (let i = 0; i < collected.length; i++){
    const g = collected[i];
    c.save();
    c.translate(g.relX, g.relY);
    c.scale(0.7, 0.7);
    c.rotate(g.relAngle);
    drawItem(c, { kind: g.kind, x: 0, y: 0, radius: g.radius * 0.8, seed: g.seed, spin: 0 });
    c.restore();
  }
  c.restore();
}

function drawString(c, x1, y1, x2, y2){
  // stretchy rubber line — bezier with sag/tension
  c.save();
  c.strokeStyle = '#2a1a08';
  c.lineWidth = 2.4;
  c.lineCap = 'round';
  const midX = (x1 + x2) / 2;
  const midY = (y1 + y2) / 2;
  const dx = x2 - x1, dy = y2 - y1;
  const len = Math.sqrt(dx*dx + dy*dy);
  // perpendicular offset for slight sag
  const sag = Math.max(8, 30 - len * 0.05);
  const px = -dy / (len || 1);
  const py = dx / (len || 1);
  const cx = midX + px * sag * 0.3;
  const cy = midY + py * sag * 0.3 + sag;
  c.beginPath();
  c.moveTo(x1, y1);
  c.quadraticCurveTo(cx, cy, x2, y2);
  c.stroke();
  // pink highlight along the string
  c.strokeStyle = 'rgba(255, 170, 200, 0.6)';
  c.lineWidth = 0.8;
  c.beginPath();
  c.moveTo(x1, y1);
  c.quadraticCurveTo(cx, cy - 0.6, x2, y2);
  c.stroke();
  // wrist anchor
  c.fillStyle = '#1a0c00';
  c.beginPath();
  c.arc(x1, y1, 7, 0, Math.PI * 2);
  c.fill();
  c.strokeStyle = '#3a2818';
  c.lineWidth = 1.5;
  c.stroke();
  // wrist cuff
  c.fillStyle = '#c5447a';
  c.beginPath();
  c.arc(x1, y1, 4, 0, Math.PI * 2);
  c.fill();
  c.restore();
}

function mixColor(hex1, hex2, t){
  const r1 = parseInt(hex1.slice(1,3), 16);
  const g1 = parseInt(hex1.slice(3,5), 16);
  const b1 = parseInt(hex1.slice(5,7), 16);
  const r2 = parseInt(hex2.slice(1,3), 16);
  const g2 = parseInt(hex2.slice(3,5), 16);
  const b2 = parseInt(hex2.slice(5,7), 16);
  const r = Math.round(r1 + (r2 - r1) * t);
  const g = Math.round(g1 + (g2 - g1) * t);
  const b = Math.round(b1 + (b2 - b1) * t);
  return '#' + r.toString(16).padStart(2,'0') + g.toString(16).padStart(2,'0') + b.toString(16).padStart(2,'0');
}

// ───────── INPUT ─────────
function eventXY(e){
  if (e.touches && e.touches[0]) return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  if (e.changedTouches && e.changedTouches[0]) return { x: e.changedTouches[0].clientX, y: e.changedTouches[0].clientY };
  return { x: e.clientX, y: e.clientY };
}

function onDown(e){
  if (e.cancelable) e.preventDefault();
  userGestured = true;
  if (gameOver) return;
  if (hand.state !== 'idle') return;
  const p = eventXY(e);
  // start drag if near the hand
  const dx = p.x - hand.x, dy = p.y - hand.y;
  if (dx*dx + dy*dy > 80*80) return;
  dragging = true;
  dragStart = { x: p.x, y: p.y, t: performance.now() };
  lastDragXY = p;
  hand.state = 'pulled';
  fadeHint();
  sfxStretch();
}

function onMove(e){
  if (!dragging) return;
  const p = eventXY(e);
  lastDragXY = p;
  // hand follows pointer, but clamped to a max pull from wrist
  let dx = p.x - wrist.x;
  let dy = p.y - wrist.y;
  // only allow pulling AWAY from the room into the launcher area (i.e. below/around wrist).
  // but allow any direction so users can aim freely — they pull back toward themselves.
  const d = Math.sqrt(dx*dx + dy*dy);
  const m = Math.min(d, MAX_PULL);
  if (d > 0){ dx = dx / d * m; dy = dy / d * m; }
  hand.x = wrist.x + dx;
  hand.y = wrist.y + dy;
}

function onUp(e){
  if (!dragging) return;
  dragging = false;
  const dx = hand.x - wrist.x;
  const dy = hand.y - wrist.y;
  const pull = Math.sqrt(dx*dx + dy*dy);
  if (pull < 14){
    // weak pull, snap back
    hand.x = wrist.x; hand.y = wrist.y;
    hand.state = 'idle';
    return;
  }
  const power = pull / MAX_PULL;
  const launchSpeed = 540 + power * 1380;
  // launch direction = opposite of drag vector (sling away from wrist)
  const a = Math.atan2(-dy, -dx);
  hand.vx = Math.cos(a) * launchSpeed;
  hand.vy = Math.sin(a) * launchSpeed;
  hand.state = 'flying';
  hand.age = 0;
  flings++;
  sfxFling();
}

window.addEventListener('mousedown', onDown);
window.addEventListener('mousemove', onMove);
window.addEventListener('mouseup', onUp);
window.addEventListener('touchstart', onDown, { passive: false });
window.addEventListener('touchmove', onMove, { passive: false });
window.addEventListener('touchend', onUp);

document.addEventListener('keydown', (e) => {
  if (e.code === 'KeyM') document.getElementById('muteBtn').click();
  if (e.code === 'KeyR') document.getElementById('resetBtn').click();
});

let hintFaded = false;
function fadeHint(){
  if (hintFaded) return;
  hintFaded = true;
  setTimeout(() => document.getElementById('hint').classList.add('fade'), 1600);
}

// ───────── COLLECTION + STICKINESS ─────────
function tryStick(item){
  // chance to stick depends on stickiness level — when nearly dead, it slips off
  const stickChance = Math.max(0.1, Math.min(1, stickiness / 65));
  if (Math.random() > stickChance) return false;
  // success — collect
  caught++;
  score += item.kind.points;
  // sticky candy reduces stickiness much more than dust
  stickiness = Math.max(0, stickiness - item.kind.stickCost);
  const slot = collected.length;
  // place on the palm in a sweep pattern
  const ang = (slot * 1.45) % (Math.PI * 2);
  const dist = 4 + (slot % 4) * 5;
  collected.push({
    kind: item.kind,
    radius: item.radius,
    seed: item.seed,
    relX: Math.cos(ang) * dist,
    relY: Math.sin(ang) * dist - 2,
    relAngle: Math.random() * Math.PI * 2,
  });
  // cap visual stack so we don't draw 200 sprites
  if (collected.length > 22) collected.shift();
  document.getElementById('score').textContent = score;
  document.getElementById('caught').textContent = caught;
  updateGauge();
  showToast(item.kind.name + (item.kind.gross ? ' · YUCK' : '') + ' +' + item.kind.points);
  sfxStick(item.kind.stickCost / 8);
  return true;
}

function updateGauge(){
  const pct = Math.round(stickiness);
  document.getElementById('stickPct').textContent = pct;
  const fill = document.getElementById('stickFill');
  fill.style.width = pct + '%';
  const v = document.getElementById('score');
  // colour the score gauge accordingly
  v.classList.remove('ok','warn','bad');
  if (pct > 50) v.classList.add('ok');
  else if (pct > 20) v.classList.add('warn');
  else v.classList.add('bad');
  if (pct <= 0 && !gameOver) endGame();
}

function showToast(text){
  const t = document.getElementById('toast');
  t.textContent = text;
  t.classList.remove('show');
  void t.offsetWidth;
  t.classList.add('show');
}

// ───────── END GAME ─────────
function endGame(){
  gameOver = true;
  sfxGameOver();
  document.getElementById('endScore').textContent = score;
  document.getElementById('endCaught').textContent = caught;
  document.getElementById('endFlings').textContent = flings;
  const sub = document.getElementById('endSub');
  if (caught === 0){
    sub.textContent = 'the hand is pristine. you have failed.';
    document.getElementById('endTitle').textContent = 'pristine.';
  } else if (caught < 8){
    sub.textContent = 'the hand has lost its stickiness. into the bin it goes.';
  } else if (caught < 20){
    sub.textContent = 'the hand fought hard. it is now mostly fur.';
  } else {
    sub.textContent = 'the hand has become the gunk. somewhere a vacuum weeps.';
  }
  const ov = document.getElementById('overlay');
  ov.classList.add('show');
  ov.setAttribute('aria-hidden', 'false');
  document.getElementById('playAgain').focus();
}

function resetGame(){
  hand = newHand();
  items = []; bursts = []; collected = [];
  score = 0; caught = 0; flings = 0; stickiness = 100;
  gameOver = false;
  document.getElementById('score').textContent = '0';
  document.getElementById('caught').textContent = '0';
  updateGauge();
  const ov = document.getElementById('overlay');
  ov.classList.remove('show');
  ov.setAttribute('aria-hidden', 'true');
  seedInitialItems();
}

document.getElementById('resetBtn').addEventListener('click', resetGame);
document.getElementById('playAgain').addEventListener('click', resetGame);

// ───────── PHYSICS / LOOP ─────────
let last = performance.now();
function loop(now){
  const dt = Math.min(0.04, (now - last) / 1000);
  last = now;

  ctx.clearRect(0, 0, W, H);

  // spawn new items occasionally
  if (!gameOver && items.length < 26 && Math.random() < 0.025) spawnItem();

  // update hand physics
  if (hand.state === 'flying'){
    hand.age += dt;
    hand.vy += G * dt;
    const dragK = Math.pow(AIR, dt * 60);
    hand.vx *= dragK; hand.vy *= dragK;
    hand.x += hand.vx * dt;
    hand.y += hand.vy * dt;
    // check item collisions
    for (let i = items.length - 1; i >= 0; i--){
      const it = items[i];
      const dx = it.x - hand.x, dy = it.y - hand.y;
      const dd = Math.sqrt(dx*dx + dy*dy);
      if (dd < it.radius + 18){
        if (tryStick(it)){
          items.splice(i, 1);
          spawnBurst(hand.x, hand.y, it.kind);
          // start retract toward wrist
          hand.state = 'retracting';
          break;
        } else {
          // bounced off (slipped)
          showToast('slipped…');
          sfxMiss();
        }
      }
    }
    // bail if off-screen or stuck on the floor too long
    if (hand.x < -50 || hand.x > W + 50 || hand.y < -50 || hand.y > H + 50 || hand.age > 2.4){
      hand.state = 'retracting';
      sfxMiss();
    }
  } else if (hand.state === 'retracting'){
    // tension-based pull back to wrist
    const dx = wrist.x - hand.x, dy = wrist.y - hand.y;
    const d = Math.sqrt(dx*dx + dy*dy);
    if (d < 8){
      hand.x = wrist.x; hand.y = wrist.y;
      hand.vx = 0; hand.vy = 0;
      hand.state = 'idle';
      sfxRetract();
    } else {
      // spring + cap so the retract feels snappy but not instant
      const speed = Math.min(2400, d * 6 + 400);
      hand.vx = (dx / d) * speed;
      hand.vy = (dy / d) * speed;
      hand.x += hand.vx * dt;
      hand.y += hand.vy * dt;
    }
  }

  // items idle animation
  for (const it of items){
    it.bob += dt * 0.6;
    it.spin += dt * 0.06;
  }

  // draw items
  for (const it of items) drawItem(ctx, it);

  // draw hand
  drawHand(ctx);

  // bursts (collection sparkles)
  for (let i = bursts.length - 1; i >= 0; i--){
    const p = bursts[i];
    p.age += dt;
    if (p.age >= p.life){ bursts.splice(i, 1); continue; }
    p.vy += G * dt * 0.4;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    const k = 1 - p.age / p.life;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = k;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * k, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // aim trajectory preview while dragging
  if (dragging){
    const dx = hand.x - wrist.x, dy = hand.y - wrist.y;
    const pull = Math.sqrt(dx*dx + dy*dy);
    if (pull > 12){
      const power = pull / MAX_PULL;
      const speed = 540 + power * 1380;
      const a = Math.atan2(-dy, -dx);
      const vx = Math.cos(a) * speed, vy = Math.sin(a) * speed;
      drawTrajectory(wrist.x, wrist.y, vx, vy);
    }
  }

  requestAnimationFrame(loop);
}

function drawTrajectory(x0, y0, vx, vy){
  ctx.save();
  ctx.fillStyle = 'rgba(255, 122, 182, 0.55)';
  let x = x0, y = y0;
  let vxx = vx, vyy = vy;
  const step = 0.038;
  for (let i = 0; i < 24; i++){
    vyy += G * step;
    vxx *= Math.pow(AIR, step * 60);
    vyy *= Math.pow(AIR, step * 60);
    x += vxx * step;
    y += vyy * step;
    if (x < 0 || x > W || y < 0 || y > H) break;
    if (i % 2 === 0){
      ctx.beginPath();
      ctx.arc(x, y, 2.4 - i * 0.05, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.restore();
}

function spawnBurst(x, y, kind){
  const palette = [kind.color1, kind.color2];
  for (let i = 0; i < 16; i++){
    const a = Math.random() * Math.PI * 2;
    const s = 80 + Math.random() * 220;
    bursts.push({
      x, y,
      vx: Math.cos(a) * s, vy: Math.sin(a) * s - 60,
      r: 2 + Math.random() * 3,
      color: palette[Math.floor(Math.random() * palette.length)],
      life: 0.5 + Math.random() * 0.4,
      age: 0,
    });
  }
}

// ───────── BOOT ─────────
window.addEventListener('resize', () => {
  fit();
});
fit();
hand = newHand();
seedInitialItems();
updateGauge();
requestAnimationFrame(loop);
</script>
