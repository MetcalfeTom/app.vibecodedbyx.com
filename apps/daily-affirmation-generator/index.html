<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Daily Affirmation</title>
<meta name="description" content="A small, soothing affirmation generator. One thought at a time, painted in watercolor.">
<meta property="og:title" content="Daily Affirmation">
<meta property="og:description" content="A small, soothing affirmation generator. One thought at a time, painted in watercolor.">
<meta property="og:url" content="https://sloppy.live/daily-affirmation-generator">
<meta property="og:image" content="https://image.pollinations.ai/prompt/soft%20watercolor%20daily%20affirmation%20pastel%20blush%20sage%20lavender%20peach%20gentle%20editorial%20serif%20typography?width=1200&height=630&nologo=true">

<style>
:root{
  --paper:#fbf3ea;
  --paper-2:#f5e8d8;
  --ink:#3a2a3e;
  --ink-mute:#8c7588;
  --rule:rgba(58,42,62,0.10);
  --blush:#f5b8c2;
  --sage:#a8c39c;
  --lavender:#c5b4e0;
  --peach:#f7caa5;
  --gold:#d8a857;
  --dusty-blue:#a8c2d6;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;min-height:100vh;background:var(--paper);color:var(--ink);font-family:'Fraunces',serif;font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased}
html{font-size:100%}

body{
  position:relative;
  overflow-x: hidden;
  background:
    radial-gradient(900px 600px at 12% 8%, rgba(245,184,194,0.32), transparent 60%),
    radial-gradient(800px 600px at 92% 18%, rgba(168,194,214,0.22), transparent 60%),
    radial-gradient(1100px 700px at 50% 100%, rgba(168,195,156,0.20), transparent 60%),
    radial-gradient(700px 500px at 88% 90%, rgba(197,180,224,0.18), transparent 60%),
    var(--paper);
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  padding: 1.5rem 1.25rem 4rem;
}

.skip{position:absolute;left:-9999px;top:auto}
.skip:focus{left:1rem;top:1rem;background:var(--ink);color:#fff;padding:0.5rem;z-index:200}

/* watercolor wash layer (svg filter blurs) */
.wash{
  position: fixed; inset: 0;
  z-index: 0;
  pointer-events: none;
  filter: blur(40px);
  opacity: 0.55;
}
.wash svg{ width:100%; height:100%; display:block }

/* paper grain overlay */
.grain{
  position: fixed; inset:0;
  z-index: 0;
  pointer-events: none;
  background:
    repeating-linear-gradient(7deg, rgba(58,42,62,0.022) 0 1px, transparent 1px 5px),
    repeating-linear-gradient(101deg, rgba(58,42,62,0.018) 0 1px, transparent 1px 7px);
  mix-blend-mode: multiply;
}

main{
  position: relative;
  z-index: 2;
  max-width: 42rem;
  width: 100%;
  text-align: center;
  display: flex; flex-direction: column;
  gap: 1.6rem;
}

/* eyebrow / date */
.eyebrow{
  font-family:'IBM Plex Mono', monospace;
  font-size: 0.62rem; letter-spacing: 0.32em; text-transform: uppercase;
  color: var(--ink-mute);
}
.eyebrow .date{
  display:block;
  margin-top: 0.4rem;
  font-family:'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 1rem;
  letter-spacing: 0.04em;
  color: var(--ink);
  text-transform: none;
}

/* title brand */
.brand{
  font-family:'Fraunces', serif;
  font-style: italic;
  font-weight: 400;
  font-size: clamp(1.6rem, 3.5vw, 2.4rem);
  font-variation-settings: 'opsz' 144;
  letter-spacing: -0.01em;
  color: var(--ink);
  margin: 0;
}
.brand b{
  font-weight: 500;
  font-style: normal;
  color: #6b3f5e;
}

/* affirmation centerpiece */
.thought-host{
  position: relative;
  min-height: 13rem;
  display: flex; align-items: center; justify-content: center;
  padding: 1.6rem 0.5rem;
}
.thought{
  font-family:'Cormorant Garamond', serif;
  font-style: italic;
  font-weight: 400;
  font-size: clamp(1.6rem, 4.6vw, 2.6rem);
  line-height: 1.32;
  color: var(--ink);
  max-width: 28rem;
  margin: 0 auto;
  text-wrap: balance;
  position: relative;
}
.thought::before, .thought::after{
  content: '';
  display: block;
  width: 2.6rem;
  height: 1px;
  margin: 0.7rem auto;
  background: linear-gradient(90deg, transparent, rgba(58,42,62,0.35), transparent);
}
.thought.fade{ animation: fade 0.5s ease-out both }
@keyframes fade{
  0%{ opacity: 0; transform: translateY(8px) }
  100%{ opacity: 1; transform: translateY(0) }
}
.thought.leaving{ animation: leave 0.32s ease-in both }
@keyframes leave{
  0%{ opacity: 1; transform: translateY(0) }
  100%{ opacity: 0; transform: translateY(-6px) }
}

/* signature line */
.thought-meta{
  margin-top: 0.4rem;
  font-family:'IBM Plex Mono', monospace;
  font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase;
  color: var(--ink-mute);
}

/* primary spawn button */
.btn-primary{
  font-family:'Fraunces', serif;
  font-style: italic;
  font-weight: 400;
  font-size: 1.08rem;
  letter-spacing: 0.03em;
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.6), transparent 60%),
    linear-gradient(160deg, var(--blush), var(--peach));
  color: var(--ink);
  border: 1px solid rgba(58,42,62,0.18);
  padding: 0.95rem 2rem;
  cursor: pointer;
  border-radius: 999px;
  box-shadow:
    0 1px 0 rgba(255,255,255,0.6) inset,
    0 0 0 1px rgba(255,255,255,0.5) inset,
    0 6px 24px rgba(245,184,194,0.55),
    0 1px 2px rgba(58,42,62,0.05);
  transition: transform 0.12s ease, box-shadow 0.18s ease, background 0.18s ease;
  min-height: 3rem;
  display: inline-flex; align-items: center; gap: 0.5rem;
  margin: 0 auto;
}
.btn-primary:hover{
  transform: translateY(-1px);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.6) inset,
    0 0 0 1px rgba(255,255,255,0.5) inset,
    0 10px 28px rgba(245,184,194,0.65),
    0 2px 4px rgba(58,42,62,0.08);
}
.btn-primary:active{ transform: translateY(1px) }
.btn-primary:focus-visible{ outline: 3px solid var(--gold); outline-offset: 3px }
.btn-primary .ico{
  font-style: normal;
  font-family:'IBM Plex Mono', monospace;
  font-size: 0.95em;
  opacity: 0.85;
}

/* secondary action row */
.actions{
  display:flex; gap:0.55rem; justify-content:center; flex-wrap: wrap;
  margin-top: 0.2rem;
}
.btn-mini{
  font-family:'IBM Plex Mono', monospace;
  font-size: 0.62rem; letter-spacing: 0.18em; text-transform: uppercase;
  background: rgba(255,255,255,0.55);
  color: var(--ink);
  border: 1px solid var(--rule);
  padding: 0.5rem 0.85rem;
  cursor: pointer;
  min-height: 2.6rem;
  transition: background 0.15s ease, border-color 0.15s ease, color 0.15s ease;
}
.btn-mini:hover{ background: #fff; border-color: rgba(58,42,62,0.3) }
.btn-mini:focus-visible{ outline: 2px solid var(--gold); outline-offset: 2px }
.btn-mini.faved{ color: #b14a5a; border-color: rgba(177,74,90,0.4); background: rgba(245,184,194,0.25) }
.btn-mini[aria-pressed="true"]{ background: var(--paper-2); border-color: var(--ink-mute) }

/* faves panel */
.faves{
  margin-top: 1.2rem;
  background: rgba(255,255,255,0.55);
  border: 1px solid var(--rule);
  padding: 1rem 1.1rem;
  text-align: left;
  display: none;
}
.faves.open{ display: block }
.faves h3{
  margin: 0 0 0.6rem;
  font-family:'IBM Plex Mono', monospace;
  font-weight: 400;
  font-size: 0.6rem; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--ink-mute);
  display:flex; align-items: baseline; gap: 0.5rem;
}
.faves h3 .count{
  margin-left: auto;
  font-family:'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 0.75rem;
  color: var(--ink);
}
.faves .empty{
  font-family:'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1rem;
  color: var(--ink-mute);
  text-align: center;
  padding: 0.6rem 0.4rem;
}
.fave-row{
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 0.55rem;
  align-items: start;
  padding: 0.55rem 0;
  border-bottom: 1px dashed var(--rule);
}
.fave-row:last-child{ border-bottom: none }
.fave-row .text{
  font-family:'Cormorant Garamond', serif;
  font-style: italic;
  font-size: 1rem;
  line-height: 1.45;
  color: var(--ink);
}
.fave-row .meta{
  margin-top: 0.18rem;
  font-family:'IBM Plex Mono', monospace;
  font-size: 0.55rem; letter-spacing: 0.16em; text-transform: uppercase;
  color: var(--ink-mute);
}
.fave-row .x{
  background: transparent;
  border: 1px solid transparent;
  color: var(--ink-mute);
  font-family:'IBM Plex Mono', monospace;
  font-size: 0.65rem;
  padding: 0.32rem 0.5rem;
  cursor: pointer;
  border-radius: 4px;
}
.fave-row .x:hover{ color: #b14a5a; border-color: rgba(177,74,90,0.4) }

/* tiny status / toast */
.toast{
  position: fixed; bottom: 1.2rem; left: 50%; transform: translateX(-50%);
  z-index: 80;
  background: rgba(58,42,62,0.92);
  color: var(--paper);
  padding: 0.5rem 0.95rem;
  font-family:'IBM Plex Mono', monospace;
  font-size: 0.65rem; letter-spacing: 0.14em; text-transform: uppercase;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s ease, transform 0.25s ease;
}
.toast.show{ opacity: 1; transform: translateX(-50%) translateY(-4px) }

/* footer */
footer{
  margin-top: 2rem;
  font-family:'IBM Plex Mono', monospace;
  font-size: 0.55rem; letter-spacing: 0.22em; text-transform: uppercase;
  color: var(--ink-mute);
  text-align: center;
  position: relative; z-index: 2;
}

/* SARCASTIC MODE — re-tints the whole page in ink-noir + lime acid accents.
   Same watercolor structure, different palette + typographic mood. */
body.sarcastic{
  --paper:#0e0e16;
  --paper-2:#181826;
  --ink:#e9e8d8;
  --ink-mute:#7a7a8a;
  --rule:rgba(233,232,216,0.14);
  --blush:#9c8efb;       /* swap soft palette for acid */
  --sage:#aaff66;
  --lavender:#ff6ad5;
  --peach:#ffaa44;
  --gold:#ffd03e;
  --dusty-blue:#46c8e0;
  background:
    radial-gradient(900px 600px at 12% 8%, rgba(170,255,102,0.12), transparent 60%),
    radial-gradient(800px 600px at 92% 18%, rgba(255,106,213,0.10), transparent 60%),
    radial-gradient(1100px 700px at 50% 100%, rgba(70,200,224,0.10), transparent 60%),
    radial-gradient(700px 500px at 88% 90%, rgba(156,142,251,0.10), transparent 60%),
    var(--paper);
}
body.sarcastic .wash{ opacity: 0.32; mix-blend-mode: screen }
body.sarcastic .grain{
  background:
    repeating-linear-gradient(7deg, rgba(233,232,216,0.020) 0 1px, transparent 1px 5px),
    repeating-linear-gradient(101deg, rgba(233,232,216,0.014) 0 1px, transparent 1px 7px);
  mix-blend-mode: screen;
}
body.sarcastic .brand b{ color: var(--peach) }
body.sarcastic .thought{
  font-family: 'Fraunces', serif;
  font-style: italic;
  color: var(--ink);
  text-shadow: 0 0 26px rgba(170,255,102,0.18);
}
body.sarcastic .thought::before, body.sarcastic .thought::after{
  background: linear-gradient(90deg, transparent, rgba(170,255,102,0.35), transparent);
}
body.sarcastic .btn-primary{
  background:
    radial-gradient(circle at 30% 30%, rgba(255,255,255,0.14), transparent 60%),
    linear-gradient(160deg, #2a1a3e, #0e0e16);
  color: var(--sage);
  border-color: rgba(170,255,102,0.4);
  box-shadow:
    0 1px 0 rgba(255,255,255,0.08) inset,
    0 0 0 1px rgba(170,255,102,0.18) inset,
    0 6px 24px rgba(170,255,102,0.20),
    0 1px 2px rgba(0,0,0,0.4);
}
body.sarcastic .btn-primary:hover{
  box-shadow:
    0 1px 0 rgba(255,255,255,0.08) inset,
    0 0 0 1px rgba(170,255,102,0.25) inset,
    0 10px 32px rgba(170,255,102,0.30),
    0 2px 4px rgba(0,0,0,0.5);
}
body.sarcastic .btn-mini{
  background: rgba(20,20,32,0.55);
  color: var(--ink);
  border-color: var(--rule);
}
body.sarcastic .btn-mini:hover{ background: rgba(20,20,32,0.85); border-color: rgba(170,255,102,0.45); color: var(--sage) }
body.sarcastic .btn-mini.faved{ color: var(--lavender); border-color: rgba(255,106,213,0.45); background: rgba(255,106,213,0.10) }
body.sarcastic .faves{ background: rgba(20,20,32,0.55); border-color: var(--rule) }
body.sarcastic .toast{ background: var(--sage); color: #0e0e16 }

@media (prefers-reduced-motion: reduce){
  .thought.fade, .thought.leaving{ animation: none; opacity: 1; transform: none }
  .btn-primary{ transition: none }
}
</style>
</head>

  "Your astrologer is on holiday. You will have to be your own omens today.",
  "There is no such thing as catching up. There is only the next reasonable thing and a small biscuit.",
  "Your inner critic has been temporarily reassigned to filing.",
  "Today is brought to you by the letter 'meh' and the number 'fine.'",
  "You are allowed to be a problem for a system that needs to be one.",
  "Take it one decade at a time, you absolute legend.",
  "The vibes are not great. The vibes have, however, made an effort.",
  "You are a person, on a planet, that is spinning. Frankly, the bar is on the floor.",
  "Your therapist is proud, despite herself.",
  "Today's energy: a confident pigeon walking into a glass door.",
  "You will encounter exactly one (1) opinion you did not need today. Recycle it.",
  "Your aesthetic this week is 'gently bewildered cottage witch.' Lean in.",
  "The plants are rooting for you. The plants have low standards.",
  "Today's affirmation is sponsored by spite and a really good sandwich.",
  "You can do hard things. You may, however, want to schedule them.",
  "Confidence is just memory loss with better marketing.",
  "Your future biographer will describe today as 'a productive nap.'",
  "Be kind to yourself. The competition for that title is light.",
  "Your potential and the laundry pile are tied for first place in your house. They have agreed to share.",
  "The universe is not against you. It just has a lot of tabs open.",
  "Romanticise your commute. Mourn the protagonist energy lost to traffic.",
  "Your plans are hilarious. The pets are laughing. The toaster is laughing.",
  "You are allowed to want things. Loudly. Including a second breakfast.",
  "There is no 'right time'. There is, however, a Tuesday at 4 p.m. that has a lot of availability.",
  "Today, lower your standards by exactly one notch. Watch what blooms.",
];

// time-of-day greeting prefixes (small inflection per part of day)
function timeOfDay(){
  const h = new Date().getHours();
  if (h < 6) return 'pre-dawn';
  if (h < 11) return 'morning';
  if (h < 14) return 'midday';
  if (h < 18) return 'afternoon';
  if (h < 21) return 'evening';
  return 'late';
}

// ─────────────────────────────────────────────────────────────
//   STATE
// ─────────────────────────────────────────────────────────────
const SAVE_KEY = 'daily-affirmation-v1';
let state = {
  current: null,
  serial: 1,           // affirmation number this session
  faves: [],           // [{text, savedAt, mode}]
  recent: [],          // recently-used indices (per mode, separate arrays kept simple)
  recentSarcastic: [],
  mode: 'earnest',     // 'earnest' | 'sarcastic'
};
function loadState(){
  try {
    const j = JSON.parse(localStorage.getItem(SAVE_KEY) || '{}');
    if (Array.isArray(j.faves)) state.faves = j.faves;
    if (Array.isArray(j.recent)) state.recent = j.recent.slice(-12);
    if (Array.isArray(j.recentSarcastic)) state.recentSarcastic = j.recentSarcastic.slice(-12);
    if (typeof j.serial === 'number') state.serial = j.serial | 0;
    if (j.mode === 'sarcastic' || j.mode === 'earnest') state.mode = j.mode;
  } catch{}
}
function saveState(){
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); } catch{}
}
loadState();

// ─────────────────────────────────────────────────────────────
//   PICK + RENDER
// ─────────────────────────────────────────────────────────────
function pickThought(){
  // Per-mode recent-pick tracking so each pool gets its own anti-repeat memory.
  const pool   = state.mode === 'sarcastic' ? POOL_SARCASTIC : POOL;
  const recent = state.mode === 'sarcastic' ? state.recentSarcastic : state.recent;
  let idx, attempts = 0;
  do {
    idx = Math.floor(Math.random() * pool.length);
    attempts++;
  } while (recent.includes(idx) && attempts < 30);
  recent.push(idx);
  if (recent.length > 12) recent.shift();
  return pool[idx];
}
function fmtDate(d){
  return d.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
}
function pad3(n){ return String(n).padStart(3, '0'); }

function renderHeader(){
  $('#dateEl').textContent = fmtDate(new Date()) + ' · ' + timeOfDay();
  $('#numEl').textContent = pad3(state.serial);
  $('#thoughtMeta').textContent = state.serial === 1
    ? 'tap below for the next one'
    : 'thought no. ' + pad3(state.serial) + ' · ' + timeOfDay();
}

function showThought(text, instant){
  state.current = text;
  const el = $('#thoughtEl');
  if (instant){
    el.textContent = text;
    el.classList.remove('leaving','fade');
    void el.offsetWidth;
    el.classList.add('fade');
    syncFaveBtn();
    return;
  }
  // crossfade: leave → swap → fade in
  el.classList.remove('fade');
  el.classList.add('leaving');
  setTimeout(() => {
    el.textContent = text;
    el.classList.remove('leaving');
    void el.offsetWidth;
    el.classList.add('fade');
    syncFaveBtn();
  }, 320);
}

function spawn(){
  state.serial += 1;
  const text = pickThought();
  showThought(text);
  renderHeader();
  saveState();
  // gentle synth chime
  chime();
}

// ─────────────────────────────────────────────────────────────
//   FAVOURITES
// ─────────────────────────────────────────────────────────────
function isFaved(text){ return state.faves.some(f => f.text === text); }
function syncFaveBtn(){
  const btn = $('#favBtn');
  const faved = state.current && isFaved(state.current);
  btn.classList.toggle('faved', !!faved);
  btn.setAttribute('aria-pressed', faved ? 'true' : 'false');
  btn.innerHTML = faved ? '♥ Saved' : '♡ Save';
  $('#favesCount').textContent = state.faves.length;
  $('#favesCount2').textContent = state.faves.length === 1 ? '1 kept' : state.faves.length + ' kept';
  renderFaves();
}
function toggleFave(){
  if (!state.current) return;
  if (isFaved(state.current)){
    state.faves = state.faves.filter(f => f.text !== state.current);
    toast('Released back into the breeze.');
  } else {
    state.faves.unshift({ text: state.current, savedAt: Date.now() });
    if (state.faves.length > 60) state.faves.length = 60;
    toast('Kept.');
  }
  saveState();
  syncFaveBtn();
}
function renderFaves(){
  const host = $('#favesList');
  host.innerHTML = '';
  if (!state.faves.length){
    host.innerHTML = '<div class="empty">no kept thoughts yet — save one with the heart.</div>';
    return;
  }
  for (const f of state.faves){
    const row = document.createElement('div');
    row.className = 'fave-row';
    const dt = new Date(f.savedAt);
    const dStr = dt.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    row.innerHTML = `
      <div>
        <div class="text">${escapeHtml(f.text)}</div>
        <div class="meta">kept · ${dStr}</div>
      </div>
      <button type="button" class="x" aria-label="Remove from favorites">✕</button>
    `;
    row.querySelector('.x').addEventListener('click', () => {
      state.faves = state.faves.filter(x => x.text !== f.text);
      saveState();
      syncFaveBtn();
    });
    host.appendChild(row);
  }
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c])); }

// ─────────────────────────────────────────────────────────────
//   TOAST
// ─────────────────────────────────────────────────────────────
let toastT;
function toast(msg){
  const el = $('#toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('show'), 1600);
}

// ─────────────────────────────────────────────────────────────
//   GENTLE CHIME (web audio)
// ─────────────────────────────────────────────────────────────
let actx = null;
function ac(){
  if (!actx){ try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch{ return null; } }
  if (actx.state === 'suspended') actx.resume();
  return actx;
}
function chime(){
  const c = ac(); if (!c) return;
  const t = c.currentTime;
  // soft 2-note bell — F#5 + A5 with sine harmonic
  [739.99, 880, 1108.73].forEach((f, i) => {
    const o = c.createOscillator(); o.type = 'sine'; o.frequency.value = f;
    const g = c.createGain();
    const start = t + i * 0.09;
    g.gain.setValueAtTime(0, start);
    g.gain.linearRampToValueAtTime(0.06, start + 0.05);
    g.gain.exponentialRampToValueAtTime(0.0008, start + 1.2);
    o.connect(g); g.connect(c.destination);
    o.start(start); o.stop(start + 1.4);
  });
}

// ─────────────────────────────────────────────────────────────
//   CLIPBOARD COPY
// ─────────────────────────────────────────────────────────────
async function copyCurrent(){
  if (!state.current) return;
  try {
    await navigator.clipboard.writeText(state.current);
    toast('Copied to clipboard.');
  } catch (e){
    toast('Could not copy.');
  }
}

// ─────────────────────────────────────────────────────────────
//   WIRE UP
// ─────────────────────────────────────────────────────────────
function setMode(mode, opts){
  state.mode = (mode === 'sarcastic') ? 'sarcastic' : 'earnest';
  document.body.classList.toggle('sarcastic', state.mode === 'sarcastic');
  const btn = $('#modeBtn');
  if (state.mode === 'sarcastic'){
    btn.textContent = '◐ Sarcastic';
    btn.setAttribute('aria-pressed', 'true');
    $('#spawnIco').textContent = '✺';
    $('#spawnLabel').textContent = 'Spawn an unhinged thought';
  } else {
    btn.textContent = '☉ Earnest';
    btn.setAttribute('aria-pressed', 'false');
    $('#spawnIco').textContent = '✿';
    $('#spawnLabel').textContent = 'Spawn a fresh thought';
  }
  saveState();
  if (!opts || !opts.silent){
    // immediately swap in a new thought from the new pool so the tone shift is visible
    spawn();
  }
}
$('#modeBtn').addEventListener('click', () => setMode(state.mode === 'sarcastic' ? 'earnest' : 'sarcastic'));
$('#spawnBtn').addEventListener('click', () => spawn());
$('#favBtn').addEventListener('click', () => toggleFave());
$('#copyBtn').addEventListener('click', () => copyCurrent());
$('#favesToggle').addEventListener('click', () => {
  const panel = $('#favesPanel');
  const open = !panel.classList.contains('open');
  panel.classList.toggle('open', open);
  $('#favesToggle').setAttribute('aria-pressed', open ? 'true' : 'false');
});
window.addEventListener('keydown', (e) => {
  if (e.target instanceof HTMLInputElement || e.target instanceof HTMLTextAreaElement) return;
  if (e.code === 'Space' || e.key === 'Enter'){ e.preventDefault(); spawn(); }
  else if (e.key === 'f' || e.key === 'F'){ toggleFave(); }
  else if (e.key === 'c' || e.key === 'C'){ copyCurrent(); }
});

// boot
setMode(state.mode, { silent: true });
renderHeader();
showThought(pickThought(), true);
syncFaveBtn();
</script>
</body>
</html>
