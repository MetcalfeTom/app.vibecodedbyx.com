<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Key Drums</title>
  <link rel="icon" href="https://emojicdn.elk.sh/🥁">
  <meta property="og:title" content="Key Drums">
  <meta property="og:description" content="Smash your keyboard to make beats. Pure synthesized drums, no samples.">
  <meta property="og:url" content="https://app.sloppy.live/key-drums">
  <meta property="og:image" content="https://image.pollinations.ai/prompt/neon%20drum%20pads%20glowing%20on%20dark%20background%20minimalist%20music%20production?width=1200&height=630&seed=8808&nologo=true">
  <link href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@400;700;900&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html { font-size: 100%; }

    :root {
      --bg: #0c0a0e;
      --surface: #16131a;
      --border: #2a2530;
      --kick: #ff3d5a;
      --snare: #ff9f1c;
      --hat: #e0ff4f;
      --clap: #4ff0e0;
      --tom: #a77bff;
      --perc: #ff6bb5;
      --rim: #7bafff;
      --cow: #ffd166;
      --text: #e8e4ec;
      --dim: #6b6278;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Azeret Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse at 20% 30%, rgba(255,61,90,0.06) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 70%, rgba(167,123,255,0.06) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    main {
      position: relative;
      z-index: 1;
      max-width: 56rem;
      width: 100%;
      padding: 2.5rem 1.5rem 3rem;
    }

    header {
      text-align: center;
      margin-bottom: 2.5rem;
    }

    h1 {
      font-family: 'Instrument Serif', serif;
      font-weight: 400;
      font-size: clamp(2.8rem, 6vw, 4.5rem);
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--text);
    }

    h1 em {
      font-style: italic;
      color: var(--kick);
    }

    .tagline {
      font-size: 0.7rem;
      color: var(--dim);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-top: 0.5rem;
    }

    /* Pad Grid */
    .pad-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.75rem;
      margin-bottom: 2rem;
    }

    .pad {
      aspect-ratio: 1;
      max-height: 10rem;
      background: var(--surface);
      border: 2px solid var(--border);
      border-radius: 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.35rem;
      cursor: pointer;
      transition: transform 0.08s, border-color 0.15s, box-shadow 0.15s;
      position: relative;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .pad:hover {
      border-color: var(--pad-color);
      transform: scale(1.03);
    }

    .pad:active, .pad.hit {
      transform: scale(0.95);
      border-color: var(--pad-color);
      box-shadow:
        0 0 1.5rem color-mix(in srgb, var(--pad-color) 40%, transparent),
        inset 0 0 2rem color-mix(in srgb, var(--pad-color) 15%, transparent);
    }

    .pad .key-hint {
      font-size: 0.65rem;
      font-weight: 900;
      letter-spacing: 0.15em;
      color: var(--pad-color);
      opacity: 0.7;
      text-transform: uppercase;
    }

    .pad .pad-name {
      font-family: 'Instrument Serif', serif;
      font-size: 1.2rem;
      color: var(--text);
      line-height: 1;
    }

    .pad .pad-icon {
      font-size: 1.6rem;
      line-height: 1;
    }

    /* Ripple on hit */
    .pad .ripple {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: inherit;
      background: radial-gradient(circle, var(--pad-color) 0%, transparent 70%);
      opacity: 0;
      pointer-events: none;
    }

    .pad.hit .ripple {
      animation: rippleFade 0.35s ease-out;
    }

    @keyframes rippleFade {
      0% { opacity: 0.25; transform: scale(0.5); }
      100% { opacity: 0; transform: scale(1.3); }
    }

    /* Controls row */
    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.5rem;
      flex-wrap: wrap;
      margin-bottom: 1.5rem;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .control-group label {
      font-size: 0.6rem;
      color: var(--dim);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .ctrl-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: inherit;
      font-size: 0.7rem;
      padding: 0.5rem 0.9rem;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s;
      min-height: 2.75rem;
    }

    .ctrl-btn:hover {
      border-color: var(--dim);
    }

    .ctrl-btn:focus-visible {
      outline: 3px solid var(--kick);
      outline-offset: 2px;
    }

    .ctrl-btn.active {
      border-color: var(--kick);
      color: var(--kick);
    }

    .ctrl-btn.recording {
      border-color: var(--kick);
      color: var(--kick);
      animation: recPulse 0.8s ease-in-out infinite;
    }

    @keyframes recPulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(255,61,90,0.3); }
      50% { box-shadow: 0 0 12px 2px rgba(255,61,90,0.3); }
    }

    /* Timeline */
    .timeline-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.75rem;
      padding: 1rem;
      margin-bottom: 1.5rem;
    }

    .timeline-label {
      font-size: 0.55rem;
      color: var(--dim);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    canvas#timeline {
      width: 100%;
      height: 5rem;
      display: block;
      border-radius: 0.4rem;
      background: rgba(0,0,0,0.3);
    }

    /* Footer hint */
    .hint {
      text-align: center;
      font-size: 0.6rem;
      color: var(--dim);
      letter-spacing: 0.1em;
      line-height: 1.8;
    }

    .hint kbd {
      display: inline-block;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0.25rem;
      padding: 0.1rem 0.35rem;
      font-family: inherit;
      font-size: 0.6rem;
      color: var(--text);
      margin: 0 0.1rem;
    }

    @media (max-width: 600px) {
      main { padding: 1.5rem 0.75rem 2rem; }
      .pad-grid { gap: 0.5rem; }
      .pad { border-radius: 0.75rem; }
      .pad .pad-name { font-size: 1rem; }
      .pad .pad-icon { font-size: 1.3rem; }
      .controls { gap: 0.75rem; }
    }

    @media (prefers-reduced-motion: reduce) {
      .pad, .ctrl-btn { transition: none; }
      .pad.hit .ripple { animation: none; }
      .ctrl-btn.recording { animation: none; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>Key <em>Drums</em></h1>
      <p class="tagline">smash keys &middot; make beats &middot; pure synthesis</p>
    </header>

    <div class="pad-grid" id="padGrid" role="group" aria-label="Drum pads"></div>

    <div class="controls">
      <div class="control-group">
        <button type="button" class="ctrl-btn" id="recBtn" aria-pressed="false">REC</button>
        <button type="button" class="ctrl-btn" id="playBtn" aria-pressed="false">PLAY</button>
        <button type="button" class="ctrl-btn" id="clearBtn">CLEAR</button>
      </div>
      <div class="control-group">
        <label for="bpmInput">BPM</label>
        <input type="number" id="bpmInput" class="ctrl-btn" value="120" min="60" max="200" style="width:4rem;text-align:center;">
      </div>
      <div class="control-group">
        <button type="button" class="ctrl-btn" id="muteBtn" aria-pressed="false" aria-label="Mute audio">&#9834;</button>
      </div>
    </div>

    <div class="timeline-wrap">
      <p class="timeline-label">Loop Timeline</p>
      <canvas id="timeline" role="img" aria-label="Recorded beat loop timeline"></canvas>
    </div>

    <p class="hint" id="hintBar">
      Press <kbd>A</kbd><kbd>S</kbd><kbd>D</kbd><kbd>F</kbd><kbd>G</kbd><kbd>H</kbd><kbd>J</kbd><kbd>K</kbd> to play &middot;
      <kbd>R</kbd> record &middot; <kbd>P</kbd> play loop &middot; <kbd>M</kbd> mute
    </p>
  </main>

<script>
(function(){
  'use strict';

  // ─── Pad definitions ───
  var PADS = [
    { id:'kick',  name:'Kick',   icon:'', key:'A', color:'var(--kick)'  },
    { id:'snare', name:'Snare',  icon:'', key:'S', color:'var(--snare)' },
    { id:'hat',   name:'Hi-Hat', icon:'', key:'D', color:'var(--hat)'   },
    { id:'clap',  name:'Clap',   icon:'', key:'F', color:'var(--clap)'  },
    { id:'tom',   name:'Tom',    icon:'', key:'G', color:'var(--tom)'   },
    { id:'perc',  name:'Perc',   icon:'', key:'H', color:'var(--perc)'  },
    { id:'rim',   name:'Rim',    icon:'', key:'J', color:'var(--rim)'   },
    { id:'cow',   name:'Cowbell',icon:'', key:'K', color:'var(--cow)'   }
  ];

  // Raw color values for canvas
  var PAD_COLORS_RAW = {
    kick:  '#ff3d5a',
    snare: '#ff9f1c',
    hat:   '#e0ff4f',
    clap:  '#4ff0e0',
    tom:   '#a77bff',
    perc:  '#ff6bb5',
    rim:   '#7bafff',
    cow:   '#ffd166'
  };

  var KEY_MAP = {};
  PADS.forEach(function(p){ KEY_MAP[p.key.toLowerCase()] = p.id; });

  // ─── Audio ───
  var ctx = null;
  var masterGain = null;
  var muted = false;

  function initAudio() {
    if (ctx) return;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = ctx.createGain();
    masterGain.connect(ctx.destination);
  }

  function noise(dur) {
    var len = ctx.sampleRate * dur;
    var buf = ctx.createBuffer(1, len, ctx.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    var s = ctx.createBufferSource();
    s.buffer = buf;
    return s;
  }

  // All sounds: pure sine/triangle oscillators + noise
  var synths = {
    kick: function(t, out) {
      var o = ctx.createOscillator();
      var g = ctx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(160, t);
      o.frequency.exponentialRampToValueAtTime(28, t + 0.18);
      g.gain.setValueAtTime(1, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.45);
      o.connect(g); g.connect(out);
      o.start(t); o.stop(t + 0.45);
      // click
      var o2 = ctx.createOscillator();
      var g2 = ctx.createGain();
      o2.type = 'triangle';
      o2.frequency.setValueAtTime(120, t);
      o2.frequency.exponentialRampToValueAtTime(25, t + 0.06);
      g2.gain.setValueAtTime(0.6, t);
      g2.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
      o2.connect(g2); g2.connect(out);
      o2.start(t); o2.stop(t + 0.08);
    },

    snare: function(t, out) {
      // body
      var o = ctx.createOscillator();
      var g = ctx.createGain();
      o.type = 'triangle';
      o.frequency.setValueAtTime(220, t);
      o.frequency.exponentialRampToValueAtTime(110, t + 0.04);
      g.gain.setValueAtTime(0.65, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.09);
      o.connect(g); g.connect(out);
      o.start(t); o.stop(t + 0.09);
      // rattle
      var n = noise(0.18);
      var ng = ctx.createGain();
      var f = ctx.createBiquadFilter();
      f.type = 'highpass'; f.frequency.value = 2200;
      ng.gain.setValueAtTime(0.7, t);
      ng.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
      n.connect(f); f.connect(ng); ng.connect(out);
      n.start(t); n.stop(t + 0.18);
    },

    hat: function(t, out) {
      var n = noise(0.06);
      var g = ctx.createGain();
      var f = ctx.createBiquadFilter();
      var f2 = ctx.createBiquadFilter();
      f.type = 'highpass'; f.frequency.value = 8000;
      f2.type = 'bandpass'; f2.frequency.value = 11000; f2.Q.value = 1.2;
      g.gain.setValueAtTime(0.45, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
      n.connect(f); f.connect(f2); f2.connect(g); g.connect(out);
      n.start(t); n.stop(t + 0.06);
    },

    clap: function(t, out) {
      for (var i = 0; i < 3; i++) {
        var n = noise(0.12);
        var g = ctx.createGain();
        var f = ctx.createBiquadFilter();
        f.type = 'bandpass'; f.frequency.value = 1600; f.Q.value = 0.6;
        var off = i * 0.012;
        g.gain.setValueAtTime(0, t + off);
        g.gain.linearRampToValueAtTime(0.65, t + off + 0.008);
        g.gain.exponentialRampToValueAtTime(0.001, t + off + 0.12);
        n.connect(f); f.connect(g); g.connect(out);
        n.start(t + off); n.stop(t + off + 0.12);
      }
    },

    tom: function(t, out) {
      var o = ctx.createOscillator();
      var g = ctx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(180, t);
      o.frequency.exponentialRampToValueAtTime(65, t + 0.22);
      g.gain.setValueAtTime(0.8, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.28);
      o.connect(g); g.connect(out);
      o.start(t); o.stop(t + 0.28);
    },

    perc: function(t, out) {
      var o = ctx.createOscillator();
      var o2 = ctx.createOscillator();
      var g = ctx.createGain();
      o.type = 'sine';
      o.frequency.setValueAtTime(900, t);
      o.frequency.exponentialRampToValueAtTime(400, t + 0.04);
      o2.type = 'triangle';
      o2.frequency.setValueAtTime(1350, t);
      o2.frequency.exponentialRampToValueAtTime(600, t + 0.03);
      g.gain.setValueAtTime(0.4, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.06);
      o.connect(g); o2.connect(g); g.connect(out);
      o.start(t); o.stop(t + 0.06);
      o2.start(t); o2.stop(t + 0.06);
    },

    rim: function(t, out) {
      var o = ctx.createOscillator();
      var g = ctx.createGain();
      o.type = 'triangle';
      o.frequency.setValueAtTime(820, t);
      g.gain.setValueAtTime(0.5, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
      o.connect(g); g.connect(out);
      o.start(t); o.stop(t + 0.04);
      // click overlay
      var n = noise(0.02);
      var ng = ctx.createGain();
      var f = ctx.createBiquadFilter();
      f.type = 'highpass'; f.frequency.value = 3200;
      ng.gain.setValueAtTime(0.35, t);
      ng.gain.exponentialRampToValueAtTime(0.001, t + 0.02);
      n.connect(f); f.connect(ng); ng.connect(out);
      n.start(t); n.stop(t + 0.02);
    },

    cow: function(t, out) {
      var o = ctx.createOscillator();
      var o2 = ctx.createOscillator();
      var g = ctx.createGain();
      o.type = 'triangle';
      o.frequency.setValueAtTime(587, t);
      o2.type = 'triangle';
      o2.frequency.setValueAtTime(845, t);
      g.gain.setValueAtTime(0.45, t);
      g.gain.setValueAtTime(0.45, t + 0.08);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
      o.connect(g); o2.connect(g); g.connect(out);
      o.start(t); o.stop(t + 0.22);
      o2.start(t); o2.stop(t + 0.22);
    }
  };

  function triggerSound(id) {
    if (!ctx) initAudio();
    if (muted) return;
    var t = ctx.currentTime;
    var g = ctx.createGain();
    g.gain.value = 0.7;
    g.connect(masterGain);
    synths[id](t, g);
  }

  // ─── Build pads ───
  var gridEl = document.getElementById('padGrid');
  var padEls = {};

  PADS.forEach(function(p) {
    var div = document.createElement('div');
    div.className = 'pad';
    div.style.setProperty('--pad-color', p.color);
    div.setAttribute('role', 'button');
    div.setAttribute('tabindex', '0');
    div.setAttribute('aria-label', p.name + ' — press ' + p.key);
    div.innerHTML =
      '<div class="ripple"></div>' +
      '<span class="key-hint">' + p.key + '</span>' +
      '<span class="pad-name">' + p.name + '</span>';
    gridEl.appendChild(div);
    padEls[p.id] = div;

    div.addEventListener('pointerdown', function(e) {
      e.preventDefault();
      hitPad(p.id);
    });
  });

  function hitPad(id) {
    initAudio();
    triggerSound(id);
    flashPad(id);
    if (recording) recordHit(id);
  }

  function flashPad(id) {
    var el = padEls[id];
    el.classList.remove('hit');
    void el.offsetWidth; // reflow
    el.classList.add('hit');
    setTimeout(function(){ el.classList.remove('hit'); }, 350);
  }

  // ─── Keyboard ───
  var keysDown = {};

  document.addEventListener('keydown', function(e) {
    if (e.repeat) return;
    if (e.target.tagName === 'INPUT') return;

    var k = e.key.toLowerCase();
    if (KEY_MAP[k] && !keysDown[k]) {
      keysDown[k] = true;
      hitPad(KEY_MAP[k]);
      return;
    }
    if (k === 'r') toggleRecord();
    if (k === 'p') togglePlay();
    if (k === 'm') toggleMute();
  });

  document.addEventListener('keyup', function(e) {
    keysDown[e.key.toLowerCase()] = false;
  });

  // ─── Recording / Loop ───
  var recording = false;
  var playing = false;
  var loop = []; // [{id, time}]  time = ms offset from loop start
  var recStart = 0;
  var loopDuration = 0; // ms
  var playStart = 0;
  var playTimer = null;

  var recBtn = document.getElementById('recBtn');
  var playBtn = document.getElementById('playBtn');
  var clearBtn = document.getElementById('clearBtn');
  var bpmInput = document.getElementById('bpmInput');
  var muteBtn = document.getElementById('muteBtn');

  function getLoopMs() {
    // 4 bars at current BPM
    var bpm = parseInt(bpmInput.value) || 120;
    return (60000 / bpm) * 4 * 4; // 4 bars of 4 beats
  }

  function toggleRecord() {
    initAudio();
    if (recording) {
      recording = false;
      recBtn.classList.remove('recording');
      recBtn.setAttribute('aria-pressed', 'false');
      loopDuration = getLoopMs();
      // Quantize recorded hits to loop
      loop = loop.filter(function(h){ return h.time < loopDuration; });
      drawTimeline();
    } else {
      recording = true;
      loop = [];
      recStart = performance.now();
      loopDuration = getLoopMs();
      recBtn.classList.add('recording');
      recBtn.setAttribute('aria-pressed', 'true');
      if (playing) stopPlay();
      drawTimeline();
    }
  }

  function recordHit(id) {
    var t = performance.now() - recStart;
    if (t > loopDuration) {
      // Wrap
      t = t % loopDuration;
    }
    loop.push({ id: id, time: t });
    drawTimeline();
  }

  function togglePlay() {
    if (playing) {
      stopPlay();
    } else {
      startPlay();
    }
  }

  function startPlay() {
    if (loop.length === 0) return;
    if (recording) toggleRecord();
    playing = true;
    playBtn.classList.add('active');
    playBtn.setAttribute('aria-pressed', 'true');
    loopDuration = getLoopMs();
    scheduleLoop();
  }

  function scheduleLoop() {
    playStart = performance.now();
    // Schedule all hits
    loop.forEach(function(h) {
      var tid = setTimeout(function() {
        if (!playing) return;
        triggerSound(h.id);
        flashPad(h.id);
      }, h.time);
    });
    // Schedule next loop
    playTimer = setTimeout(function() {
      if (!playing) return;
      scheduleLoop();
    }, loopDuration);
    drawTimelineAnim();
  }

  function stopPlay() {
    playing = false;
    clearTimeout(playTimer);
    playBtn.classList.remove('active');
    playBtn.setAttribute('aria-pressed', 'false');
    drawTimeline();
  }

  clearBtn.addEventListener('click', function() {
    loop = [];
    if (playing) stopPlay();
    if (recording) toggleRecord();
    drawTimeline();
  });

  recBtn.addEventListener('click', toggleRecord);
  playBtn.addEventListener('click', togglePlay);

  function toggleMute() {
    muted = !muted;
    muteBtn.setAttribute('aria-pressed', muted ? 'true' : 'false');
    muteBtn.textContent = muted ? '♪̸' : '♪';
    muteBtn.style.color = muted ? 'var(--dim)' : '';
    if (masterGain) masterGain.gain.value = muted ? 0 : 1;
  }

  muteBtn.addEventListener('click', toggleMute);

  // ─── Timeline Canvas ───
  var tlCanvas = document.getElementById('timeline');
  var tlCtx = tlCanvas.getContext('2d');

  function sizeTl() {
    var rect = tlCanvas.getBoundingClientRect();
    tlCanvas.width = rect.width * (window.devicePixelRatio || 1);
    tlCanvas.height = rect.height * (window.devicePixelRatio || 1);
  }

  function drawTimeline() {
    sizeTl();
    var W = tlCanvas.width;
    var H = tlCanvas.height;
    var dpr = window.devicePixelRatio || 1;
    tlCtx.clearRect(0, 0, W, H);

    if (loopDuration <= 0) return;

    // Beat lines
    var bpm = parseInt(bpmInput.value) || 120;
    var beatMs = 60000 / bpm;
    tlCtx.strokeStyle = 'rgba(255,255,255,0.06)';
    tlCtx.lineWidth = 1 * dpr;
    for (var b = 0; b < loopDuration; b += beatMs) {
      var x = (b / loopDuration) * W;
      tlCtx.beginPath();
      tlCtx.moveTo(x, 0);
      tlCtx.lineTo(x, H);
      tlCtx.stroke();
    }
    // Bar lines (every 4 beats)
    tlCtx.strokeStyle = 'rgba(255,255,255,0.12)';
    tlCtx.lineWidth = 2 * dpr;
    for (b = 0; b < loopDuration; b += beatMs * 4) {
      var x2 = (b / loopDuration) * W;
      tlCtx.beginPath();
      tlCtx.moveTo(x2, 0);
      tlCtx.lineTo(x2, H);
      tlCtx.stroke();
    }

    // Draw hits
    var padIds = PADS.map(function(p){ return p.id; });
    var laneH = H / padIds.length;

    loop.forEach(function(h) {
      var laneIdx = padIds.indexOf(h.id);
      if (laneIdx < 0) return;
      var x = (h.time / loopDuration) * W;
      var y = laneIdx * laneH + laneH * 0.5;
      var r = Math.min(laneH * 0.3, 6 * dpr);

      tlCtx.fillStyle = PAD_COLORS_RAW[h.id] || '#fff';
      tlCtx.globalAlpha = 0.85;
      tlCtx.beginPath();
      tlCtx.arc(x, y, r, 0, Math.PI * 2);
      tlCtx.fill();
      tlCtx.globalAlpha = 1;
    });
  }

  var animFrame = null;

  function drawTimelineAnim() {
    if (!playing) return;
    drawTimeline();

    // Playhead
    var W = tlCanvas.width;
    var H = tlCanvas.height;
    var dpr = window.devicePixelRatio || 1;
    var elapsed = (performance.now() - playStart) % loopDuration;
    var x = (elapsed / loopDuration) * W;

    tlCtx.strokeStyle = 'rgba(255,255,255,0.5)';
    tlCtx.lineWidth = 2 * dpr;
    tlCtx.beginPath();
    tlCtx.moveTo(x, 0);
    tlCtx.lineTo(x, H);
    tlCtx.stroke();

    animFrame = requestAnimationFrame(drawTimelineAnim);
  }

  // Init
  window.addEventListener('resize', function() { drawTimeline(); });
  loopDuration = getLoopMs();
  drawTimeline();

  // Hide hint after first interaction
  var hintBar = document.getElementById('hintBar');
  var hinted = false;
  function hideHint() {
    if (hinted) return;
    hinted = true;
    setTimeout(function(){
      hintBar.style.transition = 'opacity 0.6s';
      hintBar.style.opacity = '0';
    }, 3000);
  }
  document.addEventListener('keydown', hideHint, { once: true });
  gridEl.addEventListener('pointerdown', hideHint, { once: true });

})();
</script>
<script src="/sloppy-header/sloppy-bar.js"></script>
</body>
</html>
