<html lang="en">

<style>
  :root{
    --void:#080216;
    --void-2:#1a0735;
    --cyan:#5ce6ff;
    --magenta:#ff2bd6;
    --pink:#ff6ec0;
    --gold:#ffd454;
    --lime:#a5ff52;
    --violet:#9b5bff;
    --orange:#ff8a3a;
    --ink:#f4f0ff;
    --silver:#a3a8c2;
    --silver-dim:#5e637a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{font-size:100%}
  html,body{min-height:100%;background:var(--void);color:var(--ink);font-family:'Space Mono', monospace;-webkit-tap-highlight-color:transparent;user-select:none;touch-action:manipulation;overflow-x:hidden}
  body{
    background:
      radial-gradient(ellipse 80% 50% at 50% 0%, rgba(255,43,214,0.18), transparent 60%),
      radial-gradient(ellipse 70% 40% at 50% 100%, rgba(92,230,255,0.10), transparent 70%),
      var(--void);
    display:flex;flex-direction:column;align-items:center;min-height:100vh;
  }
  /* stars layer */
  body::before{
    content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
    background-image:
      radial-gradient(1px 1px at 17% 22%, rgba(255,255,255,0.7), transparent),
      radial-gradient(1px 1px at 73% 11%, rgba(255,255,255,0.55), transparent),
      radial-gradient(1px 1px at 38% 67%, rgba(255,255,255,0.6), transparent),
      radial-gradient(1px 1px at 88% 79%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1.5px 1.5px at 52% 41%, rgba(255,255,255,0.45), transparent),
      radial-gradient(1px 1px at 12% 87%, rgba(255,255,255,0.55), transparent),
      radial-gradient(1px 1px at 92% 33%, rgba(255,255,255,0.55), transparent),
      radial-gradient(1px 1px at 6% 50%, rgba(255,255,255,0.5), transparent);
  }
  header{text-align:center;padding:1rem 1rem 0.3rem;position:relative;z-index:3;pointer-events:none;width:100%}
  h1{
    font-family:'Bowlby One SC', sans-serif;
    font-size:clamp(2.2rem, 6vw, 3.6rem);letter-spacing:0.06em;
    background:linear-gradient(180deg, var(--cyan), var(--magenta) 55%, var(--orange));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 14px rgba(255,138,58,0.45));line-height:1;text-transform:uppercase;
  }
  .tag{font-family:'Major Mono Display', monospace;font-size:clamp(0.7rem, 1.3vw, 0.95rem);letter-spacing:0.35em;color:var(--silver);margin-top:0.3rem;text-transform:lowercase}

  main{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
    width:100%;max-width:46rem;padding:0.4rem 1rem 7rem;position:relative;z-index:2;gap:1rem;
  }
  .stage{
    position:relative;width:100%;display:flex;align-items:center;justify-content:center;
    min-height:18rem;
  }
  #shockCanvas{
    position:absolute;inset:0;width:100%;height:100%;pointer-events:none;z-index:1;
  }
  #planetCanvas{
    width:clamp(11rem, 38vw, 18rem);height:clamp(11rem, 38vw, 18rem);
    border-radius:50%;
    box-shadow:
      0 0 40px rgba(255,138,58,0.35),
      0 0 80px rgba(255,43,214,0.20),
      inset 0 0 30px rgba(0,0,0,0.4);
    position:relative;z-index:2;
    transition:transform 0.12s ease-out;
  }
  .grid{
    display:grid;grid-template-columns:repeat(3, 1fr);gap:0.6rem;width:100%;
  }
  .pad{
    position:relative;
    background:linear-gradient(180deg, rgba(40,18,80,0.85), rgba(8,2,22,0.95));
    color:var(--ink);
    border:2px solid var(--violet);
    border-radius:0.7rem;
    padding:0.85rem 0.5rem 0.65rem;
    cursor:pointer;font-family:'Audiowide', monospace;font-size:0.78rem;letter-spacing:0.06em;
    text-transform:uppercase;text-align:center;
    box-shadow:
      0 0 14px rgba(155,91,255,0.35),
      inset 0 0 8px rgba(155,91,255,0.10),
      0 4px 0 rgba(0,0,0,0.4);
    min-height:5.4rem;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0.3rem;
    transition:transform 0.08s, box-shadow 0.2s;
    overflow:hidden;
  }
  .pad:hover{box-shadow:0 0 22px rgba(155,91,255,0.55), inset 0 0 12px rgba(155,91,255,0.15), 0 4px 0 rgba(0,0,0,0.4);transform:translateY(-1px)}
  .pad:active{transform:translateY(3px);box-shadow:0 0 22px rgba(255,43,214,0.55), inset 0 0 12px rgba(255,43,214,0.20), 0 1px 0 rgba(0,0,0,0.4)}
  .pad:focus-visible{outline:3px solid var(--cyan);outline-offset:3px}
  .pad .emoji{font-family:initial;font-size:1.8rem;line-height:1;filter:drop-shadow(0 0 6px currentColor)}
  .pad .name{font-size:0.7rem;color:var(--ink);text-shadow:0 0 6px currentColor}
  .pad .kbd{position:absolute;top:0.3rem;right:0.45rem;font-family:'Space Mono', monospace;font-size:0.55rem;color:var(--silver-dim);letter-spacing:0.1em}

  /* hue accents per pad */
  .pad[data-hue="0"]   {border-color:var(--cyan);    color:var(--cyan);    box-shadow:0 0 14px rgba(92,230,255,0.40), inset 0 0 8px rgba(92,230,255,0.10), 0 4px 0 rgba(0,0,0,0.4)}
  .pad[data-hue="1"]   {border-color:var(--magenta); color:var(--magenta); box-shadow:0 0 14px rgba(255,43,214,0.40), inset 0 0 8px rgba(255,43,214,0.10), 0 4px 0 rgba(0,0,0,0.4)}
  .pad[data-hue="2"]   {border-color:var(--gold);    color:var(--gold);    box-shadow:0 0 14px rgba(255,212,84,0.40), inset 0 0 8px rgba(255,212,84,0.10), 0 4px 0 rgba(0,0,0,0.4)}
  .pad[data-hue="3"]   {border-color:var(--lime);    color:var(--lime);    box-shadow:0 0 14px rgba(165,255,82,0.40), inset 0 0 8px rgba(165,255,82,0.10), 0 4px 0 rgba(0,0,0,0.4)}
  .pad[data-hue="4"]   {border-color:var(--pink);    color:var(--pink);    box-shadow:0 0 14px rgba(255,110,192,0.40), inset 0 0 8px rgba(255,110,192,0.10), 0 4px 0 rgba(0,0,0,0.4)}
  .pad[data-hue="5"]   {border-color:var(--orange);  color:var(--orange);  box-shadow:0 0 14px rgba(255,138,58,0.40), inset 0 0 8px rgba(255,138,58,0.10), 0 4px 0 rgba(0,0,0,0.4)}
  .pad[data-hue="6"]   {border-color:var(--violet);  color:var(--violet);  box-shadow:0 0 14px rgba(155,91,255,0.40), inset 0 0 8px rgba(155,91,255,0.10), 0 4px 0 rgba(0,0,0,0.4)}
  .pad[data-hue="7"]   {border-color:#5ce6a0;        color:#5ce6a0;        box-shadow:0 0 14px rgba(92,230,160,0.40), inset 0 0 8px rgba(92,230,160,0.10), 0 4px 0 rgba(0,0,0,0.4)}
  .pad[data-hue="8"]   {border-color:#ff5a5a;        color:#ff5a5a;        box-shadow:0 0 14px rgba(255,90,90,0.40), inset 0 0 8px rgba(255,90,90,0.10), 0 4px 0 rgba(0,0,0,0.4)}

  /* chaos row */
  .chaos-row{display:flex;gap:0.5rem;width:100%}
  .chaos{
    flex:1;background:linear-gradient(180deg, rgba(80,10,40,0.92), rgba(20,4,30,0.95));
    border:2px solid #ff2c2c;color:#ff7c7c;
    font-family:'Bowlby One SC', sans-serif;font-size:1rem;letter-spacing:0.1em;
    padding:0.85rem;border-radius:0.5rem;cursor:pointer;min-height:3rem;text-transform:uppercase;
    box-shadow:0 0 18px rgba(255,44,44,0.45), inset 0 0 12px rgba(255,44,44,0.15), 0 4px 0 rgba(0,0,0,0.4);
  }
  .chaos:hover{box-shadow:0 0 26px rgba(255,44,44,0.7), inset 0 0 14px rgba(255,44,44,0.2), 0 4px 0 rgba(0,0,0,0.4)}
  .chaos:active{transform:translateY(2px);box-shadow:0 0 30px rgba(255,44,44,0.8), inset 0 0 18px rgba(255,44,44,0.25)}
  .chaos:focus-visible{outline:3px solid var(--cyan);outline-offset:3px}
  .random{
    background:linear-gradient(180deg, rgba(20,80,30,0.92), rgba(4,20,8,0.95));
    border-color:var(--lime);color:var(--lime);
    box-shadow:0 0 18px rgba(165,255,82,0.42), inset 0 0 12px rgba(165,255,82,0.12), 0 4px 0 rgba(0,0,0,0.4);
  }
  .random:hover{box-shadow:0 0 26px rgba(165,255,82,0.7), inset 0 0 14px rgba(165,255,82,0.2), 0 4px 0 rgba(0,0,0,0.4)}

  /* hud */
  .hud{
    position:fixed;bottom:0.7rem;left:50%;transform:translateX(-50%);
    display:flex;gap:0.5rem;align-items:center;flex-wrap:wrap;justify-content:center;
    background:rgba(8,2,22,0.86);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);
    border:1px solid rgba(155,91,255,0.32);
    padding:0.45rem 0.7rem;border-radius:0.4rem;z-index:8;font-size:0.62rem;letter-spacing:0.15em;text-transform:uppercase;color:var(--silver);
    max-width:calc(100% - 1rem);
  }
  .hud .pill{
    background:rgba(255,138,58,0.14);color:var(--orange);
    padding:0.3rem 0.55rem;border-radius:0.2rem;border:1px solid var(--orange);
    font-family:'Audiowide', monospace;font-size:0.65rem;
  }
  .hud button{
    background:transparent;color:var(--silver);border:1px solid rgba(155,91,255,0.4);
    font-family:'Space Mono', monospace;font-size:0.62rem;letter-spacing:0.15em;text-transform:uppercase;
    padding:0.4rem 0.6rem;border-radius:0.22rem;cursor:pointer;min-height:2.5rem;
  }
  .hud button:hover{border-color:var(--cyan);color:var(--cyan)}
  .hud button:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
  .hud kbd{
    background:#1a0735;border:1px solid rgba(92,230,255,0.4);border-radius:0.2rem;
    color:var(--ink);padding:0.18rem 0.35rem;font-family:'Space Mono', monospace;font-size:0.6rem;
    min-width:1.3rem;text-align:center;display:inline-block;
  }

  @media (max-width: 540px){
    .grid{gap:0.4rem}
    .pad{padding:0.6rem 0.4rem;min-height:4.6rem;font-size:0.65rem}
    .pad .emoji{font-size:1.4rem}
    .pad .name{font-size:0.6rem}
  }
  @media (prefers-reduced-motion: reduce){
    #planetCanvas{transition:none}
  }
</style>
</head>
<body>
  <header>
    <h1>Gas Giant</h1>
    <div class="tag">nine bottoms of jupiter · zero samples · pure synth</div>
  </header>

  <main>
    <div class="stage" id="stage">
      <canvas id="shockCanvas" aria-hidden="true"></canvas>
      <canvas id="planetCanvas" role="img" aria-label="A neon gas giant planet that wobbles when soundboard pads are pressed"></canvas>
    </div>

    <div class="grid" id="grid" role="group" aria-label="Soundboard pads"></div>

    <div class="chaos-row">
      <button class="chaos random" id="randomBtn" type="button" aria-label="Play a random fart">🎲 RANDOM</button>
      <button class="chaos" id="allBtn" type="button" aria-label="Trigger all nine pads at once">💥 ALL AT ONCE</button>
    </div>
  </main>

  <div class="hud" role="group" aria-label="Status">
    <span class="pill" id="countPill">0 blasts</span>
    <span><kbd>1</kbd>–<kbd>9</kbd> pads</span>
    <span><kbd>R</kbd> random</span>
    <span><kbd>Space</kbd> chaos</span>
    <button id="muteBtn" type="button" aria-pressed="false" aria-label="Toggle sound">♪ on</button>
  </div>

<script>
(function(){
  'use strict';

  function showError(msg){
    try {
      var t = document.getElementById('errToast');
      if (!t){
        t = document.createElement('div');
        t.id = 'errToast';
        t.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#3a0610;color:#ffb6c1;font-family:monospace;font-size:11px;padding:8px 12px;border-bottom:1px solid #ff2bd6;white-space:pre-wrap';
        document.body.appendChild(t);
      }
      t.textContent = '⚠ ' + msg;
    } catch(_){}
  }
  window.addEventListener('error', function(ev){
    showError((ev.message || 'error') + ' @ ' + (ev.filename ? ev.filename.split('/').pop() : '?') + ':' + (ev.lineno || '?'));
  });

  var prefersReducedMotion = false;
  try { prefersReducedMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches; } catch(_){}

  // ── Pad definitions — 9 distinct synth fart variants ──
  var PADS = [
    { id: 'rip',     name: 'WET RIP',      emoji: '🌬️', hue: 0, color: '#5ce6ff' },
    { id: 'puffer',  name: 'PUFFER',       emoji: '💨', hue: 1, color: '#ff2bd6' },
    { id: 'brassy',  name: 'BRASSY',       emoji: '🎺', hue: 2, color: '#ffd454' },
    { id: 'bubbler', name: 'BUBBLER',      emoji: '🫧', hue: 3, color: '#a5ff52' },
    { id: 'quake',   name: 'EARTHSHAKER',  emoji: '🐘', hue: 4, color: '#ff6ec0' },
    { id: 'squeak',  name: 'SQUEAKER',     emoji: '🐭', hue: 5, color: '#ff8a3a' },
    { id: 'bongo',   name: 'TRIPLE TAP',   emoji: '🥁', hue: 6, color: '#9b5bff' },
    { id: 'tornado', name: 'TORNADO',      emoji: '🌪️', hue: 7, color: '#5ce6a0' },
    { id: 'ghost',   name: 'GHOST WHIFF',  emoji: '👻', hue: 8, color: '#ff5a5a' }
  ];

  // ── Build grid ──
  var grid = document.getElementById('grid');
  PADS.forEach(function(p, i){
    var b = document.createElement('button');
    b.type = 'button';
    b.className = 'pad';
    b.dataset.hue = p.hue;
    b.dataset.id = p.id;
    b.setAttribute('aria-label', p.name);
    b.innerHTML =
      '<span class="kbd">' + (i + 1) + '</span>' +
      '<span class="emoji" aria-hidden="true">' + p.emoji + '</span>' +
      '<span class="name">' + p.name + '</span>';
    b.addEventListener('click', function(){ triggerPad(p.id, b); });
    grid.appendChild(b);
  });

  // ── Audio ──
  var audioCtx = null;
  var masterGain = null;
  var muted = false;
  var blastCount = 0;
  function ensureAudio(){
    if (audioCtx){ if (audioCtx.state === 'suspended') audioCtx.resume(); return audioCtx; }
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.value = 0.85;
      var comp = audioCtx.createDynamicsCompressor();
      comp.threshold.value = -10; comp.knee.value = 12; comp.ratio.value = 4;
      masterGain.connect(comp).connect(audioCtx.destination);
    } catch(_){ audioCtx = null; }
    return audioCtx;
  }

  function makeNoise(dur){
    var n = Math.floor(audioCtx.sampleRate * dur);
    var b = audioCtx.createBuffer(1, n, audioCtx.sampleRate);
    var d = b.getChannelData(0);
    for (var i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/n, 1.3);
    return b;
  }

  // ── Synth voices ──
  var SYNTHS = {
    rip: function(){
      var c = audioCtx; var t = c.currentTime;
      var dur = 0.55;
      var o = c.createOscillator(); o.type = 'sawtooth';
      o.frequency.setValueAtTime(95, t);
      o.frequency.exponentialRampToValueAtTime(55, t + dur);
      var lfo = c.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 17;
      var lfoG = c.createGain(); lfoG.gain.value = 32;
      lfo.connect(lfoG).connect(o.frequency);
      var bp = c.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 320; bp.Q.value = 4.5;
      var g = c.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(0.55, t + 0.04);
      g.gain.linearRampToValueAtTime(0.18, t + dur * 0.7);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      // wet noise crackle on top
      var noise = c.createBufferSource(); noise.buffer = makeNoise(dur);
      var nBp = c.createBiquadFilter(); nBp.type = 'bandpass'; nBp.frequency.value = 1200; nBp.Q.value = 2;
      var nG = c.createGain(); nG.gain.value = 0.12;
      noise.connect(nBp).connect(nG).connect(masterGain);
      noise.start(t);
      o.connect(bp).connect(g).connect(masterGain);
      o.start(t); o.stop(t + dur + 0.05);
      lfo.start(t); lfo.stop(t + dur + 0.05);
    },
    puffer: function(){
      var c = audioCtx; var t = c.currentTime; var dur = 0.18;
      // short pop: noise burst + low thump
      var n = c.createBufferSource(); n.buffer = makeNoise(dur);
      var hp = c.createBiquadFilter(); hp.type = 'highpass'; hp.frequency.value = 280;
      var nG = c.createGain(); nG.gain.value = 0.25;
      n.connect(hp).connect(nG).connect(masterGain);
      n.start(t);
      var o = c.createOscillator(); o.type = 'triangle';
      o.frequency.setValueAtTime(140, t);
      o.frequency.exponentialRampToValueAtTime(60, t + 0.10);
      var g = c.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.35, t + 0.01);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.connect(g).connect(masterGain);
      o.start(t); o.stop(t + dur + 0.02);
    },
    brassy: function(){
      var c = audioCtx; var t = c.currentTime; var dur = 0.65;
      // brass-like with formant
      var o = c.createOscillator(); o.type = 'sawtooth';
      o.frequency.setValueAtTime(165, t);
      o.frequency.linearRampToValueAtTime(195, t + 0.08);
      o.frequency.linearRampToValueAtTime(155, t + dur);
      var bp = c.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 880; bp.Q.value = 6;
      var bp2 = c.createBiquadFilter(); bp2.type = 'bandpass'; bp2.frequency.value = 1320; bp2.Q.value = 5;
      var g = c.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(0.42, t + 0.08);
      g.gain.linearRampToValueAtTime(0.18, t + dur * 0.7);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      var mix = c.createGain(); mix.gain.value = 0.6;
      o.connect(bp).connect(mix);
      o.connect(bp2).connect(mix);
      mix.connect(g).connect(masterGain);
      o.start(t); o.stop(t + dur + 0.05);
    },
    bubbler: function(){
      var c = audioCtx; var t = c.currentTime; var dur = 0.7;
      // staircase pitch jumps for bubbles
      var o = c.createOscillator(); o.type = 'sawtooth';
      var steps = 7;
      for (var s = 0; s < steps; s++){
        var st = t + (s / steps) * dur;
        var f = 80 + Math.random() * 100;
        o.frequency.setValueAtTime(f, st);
      }
      var bp = c.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 380; bp.Q.value = 3.5;
      var g = c.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(0.42, t + 0.05);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.connect(bp).connect(g).connect(masterGain);
      o.start(t); o.stop(t + dur + 0.05);
      // bubble pops
      for (var pi = 0; pi < 5; pi++){
        var pt = t + Math.random() * dur;
        var po = c.createOscillator(); po.type = 'sine';
        po.frequency.value = 280 + Math.random() * 320;
        var pg = c.createGain();
        pg.gain.setValueAtTime(0.0001, pt);
        pg.gain.exponentialRampToValueAtTime(0.20, pt + 0.005);
        pg.gain.exponentialRampToValueAtTime(0.0001, pt + 0.05);
        po.connect(pg).connect(masterGain);
        po.start(pt); po.stop(pt + 0.06);
      }
    },
    quake: function(){
      var c = audioCtx; var t = c.currentTime; var dur = 0.85;
      // deep sub bass earthshaker
      var o = c.createOscillator(); o.type = 'sine';
      o.frequency.setValueAtTime(60, t);
      o.frequency.exponentialRampToValueAtTime(28, t + dur);
      var g = c.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.78, t + 0.04);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.connect(g).connect(masterGain);
      o.start(t); o.stop(t + dur + 0.05);
      // saw harmonic for grit
      var o2 = c.createOscillator(); o2.type = 'sawtooth';
      o2.frequency.setValueAtTime(70, t);
      o2.frequency.exponentialRampToValueAtTime(35, t + dur);
      var bp = c.createBiquadFilter(); bp.type = 'lowpass'; bp.frequency.value = 240;
      var g2 = c.createGain();
      g2.gain.setValueAtTime(0.0001, t);
      g2.gain.linearRampToValueAtTime(0.22, t + 0.04);
      g2.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o2.connect(bp).connect(g2).connect(masterGain);
      o2.start(t); o2.stop(t + dur + 0.05);
      // crackle transient
      var n = c.createBufferSource(); n.buffer = makeNoise(0.06);
      var nLp = c.createBiquadFilter(); nLp.type = 'lowpass'; nLp.frequency.value = 400;
      var nG = c.createGain(); nG.gain.value = 0.16;
      n.connect(nLp).connect(nG).connect(masterGain);
      n.start(t);
    },
    squeak: function(){
      var c = audioCtx; var t = c.currentTime; var dur = 0.32;
      var o = c.createOscillator(); o.type = 'square';
      o.frequency.setValueAtTime(380, t);
      o.frequency.linearRampToValueAtTime(540, t + 0.10);
      o.frequency.linearRampToValueAtTime(340, t + dur);
      var lfo = c.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 24;
      var lfoG = c.createGain(); lfoG.gain.value = 28;
      lfo.connect(lfoG).connect(o.frequency);
      var bp = c.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 720; bp.Q.value = 4;
      var g = c.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.30, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.connect(bp).connect(g).connect(masterGain);
      o.start(t); o.stop(t + dur + 0.05);
      lfo.start(t); lfo.stop(t + dur + 0.05);
    },
    bongo: function(){
      // 3 rapid pops
      var c = audioCtx;
      for (var i = 0; i < 3; i++){
        (function(idx){
          setTimeout(function(){ if (audioCtx) SYNTHS.puffer(); }, idx * 110);
        })(i);
      }
    },
    tornado: function(){
      var c = audioCtx; var t = c.currentTime; var dur = 1.4;
      // long droner with heavy wobble + filter sweep
      var o = c.createOscillator(); o.type = 'sawtooth';
      o.frequency.setValueAtTime(75, t);
      o.frequency.linearRampToValueAtTime(110, t + dur * 0.5);
      o.frequency.linearRampToValueAtTime(50, t + dur);
      var lfo = c.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 6;
      var lfoG = c.createGain(); lfoG.gain.value = 22;
      lfo.connect(lfoG).connect(o.frequency);
      var bp = c.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 280; bp.Q.value = 5;
      // sweep filter
      bp.frequency.setValueAtTime(280, t);
      bp.frequency.linearRampToValueAtTime(700, t + dur * 0.5);
      bp.frequency.linearRampToValueAtTime(220, t + dur);
      var g = c.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(0.48, t + 0.10);
      g.gain.linearRampToValueAtTime(0.34, t + dur * 0.8);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.connect(bp).connect(g).connect(masterGain);
      o.start(t); o.stop(t + dur + 0.05);
      lfo.start(t); lfo.stop(t + dur + 0.05);
    },
    ghost: function(){
      var c = audioCtx; var t = c.currentTime; var dur = 1.2;
      // breathy, high-pitched with massive reverb-feel via long noise + filter
      var n = c.createBufferSource(); n.buffer = makeNoise(dur);
      var bp = c.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 1200; bp.Q.value = 2;
      // sweep down
      bp.frequency.setValueAtTime(2200, t);
      bp.frequency.exponentialRampToValueAtTime(400, t + dur);
      var g = c.createGain();
      g.gain.setValueAtTime(0.0001, t);
      g.gain.linearRampToValueAtTime(0.16, t + 0.20);
      g.gain.linearRampToValueAtTime(0.10, t + dur * 0.6);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      n.connect(bp).connect(g).connect(masterGain);
      n.start(t);
      // sub whisper tone
      var o = c.createOscillator(); o.type = 'sine';
      o.frequency.setValueAtTime(220, t);
      o.frequency.exponentialRampToValueAtTime(80, t + dur);
      var og = c.createGain();
      og.gain.setValueAtTime(0.0001, t);
      og.gain.linearRampToValueAtTime(0.10, t + 0.10);
      og.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.connect(og).connect(masterGain);
      o.start(t); o.stop(t + dur + 0.05);
    }
  };

  // ── Trigger ──
  function triggerPad(id, btnEl){
    ensureAudio();
    if (!audioCtx) return;
    if (!muted && SYNTHS[id]) SYNTHS[id]();
    var pad = PADS.find(function(p){ return p.id === id; });
    if (!pad) return;
    // shockwave from button
    var stageRect = document.getElementById('stage').getBoundingClientRect();
    var btnRect = btnEl ? btnEl.getBoundingClientRect() : { left: stageRect.left + stageRect.width/2 - 20, top: stageRect.bottom - 20, width: 40, height: 40 };
    var sx = btnRect.left + btnRect.width / 2 - stageRect.left;
    var sy = btnRect.top + btnRect.height / 2 - stageRect.top;
    spawnShockwave(sx, sy, pad.color, 1.0);
    // planet wobble + ripple
    planetWobble(pad.hue, 0.85);
    // counter
    blastCount++;
    document.getElementById('countPill').textContent = blastCount + ' blast' + (blastCount === 1 ? '' : 's');
  }

  // ── Random / Chaos ──
  document.getElementById('randomBtn').addEventListener('click', function(){
    var idx = Math.floor(Math.random() * PADS.length);
    var pad = grid.children[idx];
    triggerPad(PADS[idx].id, pad);
  });
  document.getElementById('allBtn').addEventListener('click', function(){
    PADS.forEach(function(p, i){
      setTimeout(function(){
        var btn = grid.children[i];
        triggerPad(p.id, btn);
      }, i * 35);
    });
  });
  document.getElementById('muteBtn').addEventListener('click', function(){
    muted = !muted;
    this.textContent = muted ? '♪ off' : '♪ on';
    this.setAttribute('aria-pressed', muted ? 'true' : 'false');
  });

  // Keyboard
  window.addEventListener('keydown', function(e){
    if (e.target && e.target.tagName === 'INPUT') return;
    if (e.code === 'KeyR'){ document.getElementById('randomBtn').click(); }
    else if (e.code === 'Space'){ e.preventDefault(); document.getElementById('allBtn').click(); }
    else if (e.code === 'KeyM'){ document.getElementById('muteBtn').click(); }
    else {
      var num = parseInt(e.key, 10);
      if (num >= 1 && num <= 9){
        var idx = num - 1;
        if (idx < PADS.length){
          var btn = grid.children[idx];
          triggerPad(PADS[idx].id, btn);
        }
      }
    }
  });

  // ── Shockwave canvas ──
  var shockCanvas = document.getElementById('shockCanvas');
  var shockCtx;
  try { shockCtx = shockCanvas.getContext('2d'); } catch(e){ showError('shock canvas: ' + e.message); }
  var shockWaves = [];
  function resizeShock(){
    var rect = shockCanvas.getBoundingClientRect();
    var DPR = Math.min(window.devicePixelRatio || 1, 2);
    shockCanvas.width = Math.floor(rect.width * DPR);
    shockCanvas.height = Math.floor(rect.height * DPR);
    if (shockCtx) shockCtx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  resizeShock();
  window.addEventListener('resize', resizeShock);
  setTimeout(resizeShock, 50);

  function spawnShockwave(x, y, color, intensity){
    var maxR = 180 + intensity * 120;
    // Main ring + 2 trailing
    for (var i = 0; i < 3; i++){
      shockWaves.push({
        x: x, y: y,
        r: 4,
        maxR: maxR * (1 + i * 0.25),
        ttl: 0.55 + i * 0.10,
        life: -i * 0.04, // staggered start
        color: color,
        thick: 3 - i * 0.5
      });
    }
    // sparkle particles
    for (var s = 0; s < 12; s++){
      var ang = Math.random() * Math.PI * 2;
      var sp = 80 + Math.random() * 180;
      shockWaves.push({
        x: x, y: y, vx: Math.cos(ang) * sp, vy: Math.sin(ang) * sp - 40,
        r: 1.5 + Math.random() * 2,
        ttl: 0.5 + Math.random() * 0.4,
        life: 0,
        color: color,
        type: 'spark'
      });
    }
  }

  // ── Planet ──
  var planetCanvas = document.getElementById('planetCanvas');
  var planetCtx;
  try { planetCtx = planetCanvas.getContext('2d'); } catch(_){}
  var planetSize = 0;
  function resizePlanet(){
    var rect = planetCanvas.getBoundingClientRect();
    var DPR = Math.min(window.devicePixelRatio || 1, 2);
    planetSize = Math.floor(rect.width);
    planetCanvas.width = planetSize * DPR;
    planetCanvas.height = planetSize * DPR;
    if (planetCtx) planetCtx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  resizePlanet();
  window.addEventListener('resize', resizePlanet);
  setTimeout(resizePlanet, 50);

  var planet = {
    rot: 0,
    wobbleX: 0, wobbleY: 0,
    pulse: 0,
    activeHue: 0
  };
  function planetWobble(hueIdx, intensity){
    planet.pulse = Math.max(planet.pulse, intensity);
    planet.activeHue = hueIdx;
    // wobble offset
    var ang = Math.random() * Math.PI * 2;
    planet.wobbleX = Math.cos(ang) * 6 * intensity;
    planet.wobbleY = Math.sin(ang) * 6 * intensity;
    if (!prefersReducedMotion){
      planetCanvas.style.transform = 'translate(' + planet.wobbleX + 'px, ' + planet.wobbleY + 'px) scale(' + (1 + intensity * 0.04) + ')';
      setTimeout(function(){ planetCanvas.style.transform = ''; }, 180);
    }
  }

  function drawPlanet(now){
    if (!planetCtx || planetSize === 0) return;
    var size = planetSize;
    var cx = size / 2, cy = size / 2;
    var r = size / 2 - 2;
    planet.rot += 0.0008;
    planet.pulse *= 0.94;

    planetCtx.clearRect(0, 0, size, size);

    // Base disk gradient (Jupiter-like bands)
    planetCtx.save();
    planetCtx.beginPath();
    planetCtx.arc(cx, cy, r, 0, Math.PI * 2);
    planetCtx.clip();

    // background of planet
    var bg = planetCtx.createLinearGradient(0, 0, 0, size);
    bg.addColorStop(0, '#5a2a1a');
    bg.addColorStop(0.4, '#ff8a3a');
    bg.addColorStop(0.7, '#ff5a8a');
    bg.addColorStop(1, '#7a2a5a');
    planetCtx.fillStyle = bg;
    planetCtx.fillRect(0, 0, size, size);

    // Horizontal cloud bands — animated by rotation
    var bandCount = 9;
    for (var i = 0; i < bandCount; i++){
      var ty = (i + 0.5) / bandCount; // 0..1
      var y = ty * size;
      var bandH = size / bandCount;
      var phase = planet.rot * (1 + (i % 3) * 0.3) + i * 0.8;
      var hue = 200 + (i * 28) % 200;
      var alpha = 0.18 + (i % 3) * 0.06;
      // draw a wavy band
      planetCtx.fillStyle = 'hsla(' + hue + ',85%,' + (45 + (i % 4) * 6) + '%,' + alpha + ')';
      planetCtx.beginPath();
      planetCtx.moveTo(0, y);
      for (var x = 0; x <= size; x += 4){
        var wave = Math.sin(x * 0.02 + phase) * (bandH * 0.18) + Math.sin(x * 0.05 + phase * 0.7) * (bandH * 0.08);
        planetCtx.lineTo(x, y + wave);
      }
      planetCtx.lineTo(size, y + bandH);
      planetCtx.lineTo(0, y + bandH);
      planetCtx.closePath();
      planetCtx.fill();
    }

    // Great red spot (animated wobble + active-hue shift)
    var spotX = cx + Math.cos(planet.rot * 2.4) * size * 0.18 + planet.wobbleX * 0.25;
    var spotY = cy + size * 0.06;
    var spotR = size * (0.10 + planet.pulse * 0.04);
    var spotHues = [195, 320, 50, 110, 330, 25, 280, 145, 0];
    var spotHue = spotHues[planet.activeHue % spotHues.length];
    var spotG = planetCtx.createRadialGradient(spotX, spotY, 2, spotX, spotY, spotR);
    spotG.addColorStop(0, 'hsla(' + spotHue + ',100%,75%,0.95)');
    spotG.addColorStop(0.5, 'hsla(' + spotHue + ',95%,52%,0.85)');
    spotG.addColorStop(1, 'hsla(' + ((spotHue + 320) % 360) + ',95%,30%,0)');
    planetCtx.fillStyle = spotG;
    planetCtx.fillRect(0, 0, size, size);

    // Pulse ring on big presses
    if (planet.pulse > 0.05){
      planetCtx.strokeStyle = 'hsla(' + spotHue + ',100%,80%,' + (planet.pulse * 0.6) + ')';
      planetCtx.lineWidth = 3 * planet.pulse;
      planetCtx.beginPath();
      planetCtx.arc(cx, cy, r * (0.85 + planet.pulse * 0.10), 0, Math.PI * 2);
      planetCtx.stroke();
    }

    // 3D shading — dark right limb + bright left highlight
    var shade = planetCtx.createRadialGradient(cx - r * 0.4, cy - r * 0.4, r * 0.1, cx, cy, r * 1.1);
    shade.addColorStop(0, 'rgba(255,255,255,0.25)');
    shade.addColorStop(0.5, 'rgba(255,255,255,0)');
    shade.addColorStop(1, 'rgba(0,0,0,0.50)');
    planetCtx.fillStyle = shade;
    planetCtx.fillRect(0, 0, size, size);

    planetCtx.restore();

    // Atmosphere glow (drawn outside clip)
    planetCtx.save();
    planetCtx.globalCompositeOperation = 'lighter';
    var glow = planetCtx.createRadialGradient(cx, cy, r * 0.9, cx, cy, r * 1.18);
    glow.addColorStop(0, 'rgba(255,138,58,0.0)');
    glow.addColorStop(0.7, 'rgba(255,138,58,0.20)');
    glow.addColorStop(1, 'rgba(255,138,58,0)');
    planetCtx.fillStyle = glow;
    planetCtx.fillRect(0, 0, size, size);
    planetCtx.restore();
  }

  // ── Shockwave render loop ──
  var lastT = performance.now();
  function loop(now){
    var dt = Math.min(0.05, (now - lastT) / 1000);
    lastT = now;
    if (shockCtx){
      // fade trails
      shockCtx.clearRect(0, 0, shockCanvas.width, shockCanvas.height);
      for (var i = shockWaves.length - 1; i >= 0; i--){
        var w = shockWaves[i];
        w.life += dt;
        if (w.life < 0){ continue; }
        if (w.life >= w.ttl){ shockWaves.splice(i, 1); continue; }
        var t = w.life / w.ttl;
        if (w.type === 'spark'){
          w.vx *= Math.pow(0.92, dt * 60);
          w.vy += 280 * dt;
          w.x += w.vx * dt; w.y += w.vy * dt;
          var a = 1 - t;
          shockCtx.save();
          shockCtx.globalCompositeOperation = 'lighter';
          shockCtx.fillStyle = w.color;
          shockCtx.globalAlpha = a;
          shockCtx.shadowColor = w.color; shockCtx.shadowBlur = 8;
          shockCtx.beginPath(); shockCtx.arc(w.x, w.y, w.r, 0, Math.PI * 2); shockCtx.fill();
          shockCtx.restore();
        } else {
          w.r += (w.maxR - 4) * (dt / w.ttl);
          var alpha = (1 - t) * 0.7;
          shockCtx.save();
          shockCtx.globalCompositeOperation = 'lighter';
          shockCtx.strokeStyle = w.color;
          shockCtx.globalAlpha = alpha;
          shockCtx.lineWidth = w.thick * (1 - t * 0.5);
          shockCtx.shadowColor = w.color; shockCtx.shadowBlur = 16 * (1 - t);
          shockCtx.beginPath(); shockCtx.arc(w.x, w.y, w.r, 0, Math.PI * 2); shockCtx.stroke();
          shockCtx.restore();
        }
      }
    }
    drawPlanet(now);
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

})();
</script>
</body>
</html>
