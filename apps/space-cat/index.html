<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Space Cat — Laser Eyes vs Bugs</title>
  <link rel="icon" href="https://emojicdn.elk.sh/🐱">
  <meta name="description" content="A cat with laser eyes blasts falling bugs in space. How long can you survive?">
  <meta property="og:title" content="Space Cat — Laser Eyes vs Bugs">
  <meta property="og:description" content="Blast falling bugs with your laser-eyed space cat!">
  <meta property="og:url" content="https://sloppy.live/space-cat">
  <meta property="og:image" content="https://emojicdn.elk.sh/🐱?style=google&size=512.png">
  <meta property="og:type" content="website">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a1a;
      overflow: hidden;
      font-family: 'Silkscreen', cursive;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
          </style>
</head>
<body>
<canvas id="gc"></canvas>
<script>
(function(){
  var C = document.getElementById('gc');
  var ctx = C.getContext('2d');
  var W, H, scale;
  var GW = 480, GH = 720; // game world size

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    C.width = W;
    C.height = H;
    scale = Math.min(W / GW, H / GH);
  }
  resize();
  window.addEventListener('resize', resize);

  // game state
  var STATE = 'menu'; // menu, playing, gameover
  var score = 0, wave = 1, lives = 3, highScore = 0;
  var waveTimer = 0, waveDuration = 800, waveTransition = 0;
  var bugSpawnTimer = 0, bugSpawnRate = 60;
  var autoFireTimer = 0, autoFireRate = 12;

  // stored high score
  try { highScore = parseInt(localStorage.getItem('spacecat_hi')) || 0; } catch(e){}

  // stars
  var stars = [];
  for (var i = 0; i < 120; i++) {
    stars.push({
      x: Math.random() * GW,
      y: Math.random() * GH,
      s: Math.random() * 2 + 0.5,
      sp: Math.random() * 0.3 + 0.1,
      b: Math.random()
    });
  }

  // cat
  var cat = { x: GW / 2, y: GH - 70, w: 48, h: 48, speed: 4 };
  var moveLeft = false, moveRight = false, firing = false;

  // lasers
  var lasers = [];
  // bugs
  var bugs = [];
  // particles
  var particles = [];

  // bug types
  var bugTypes = [
    { name: 'fly', emoji: '🪰', hp: 1, speed: 1.5, size: 22, points: 10 },
    { name: 'spider', emoji: '🕷️', hp: 2, speed: 1, size: 26, points: 25 },
    { name: 'beetle', emoji: '🪲', hp: 3, speed: 0.8, size: 28, points: 40 },
    { name: 'moth', emoji: '🦋', hp: 1, speed: 2.2, size: 24, points: 15 },
    { name: 'cockroach', emoji: '🪳', hp: 4, speed: 0.6, size: 30, points: 60 }
  ];

  function spawnBug() {
    var pool = [];
    for (var i = 0; i < bugTypes.length; i++) {
      if (i === 0) pool.push(i); // fly always
      if (i === 1 && wave >= 2) pool.push(i);
      if (i === 2 && wave >= 3) pool.push(i);
      if (i === 3) pool.push(i); // moth always
      if (i === 4 && wave >= 5) pool.push(i);
    }
    var t = bugTypes[pool[Math.floor(Math.random() * pool.length)]];
    var speedMult = 1 + (wave - 1) * 0.08;
    bugs.push({
      x: Math.random() * (GW - 60) + 30,
      y: -30,
      type: t,
      hp: t.hp + Math.floor(wave / 4),
      maxHp: t.hp + Math.floor(wave / 4),
      speed: t.speed * speedMult * (0.8 + Math.random() * 0.4),
      size: t.size,
      wobble: Math.random() * Math.PI * 2,
      wobbleAmp: Math.random() * 1.5 + 0.5
    });
  }

  function fireLaser() {
    // Two beams from cat's eyes
    var eyeOffL = -8, eyeOffR = 8;
    lasers.push({ x: cat.x + eyeOffL, y: cat.y - 15, vy: -10, w: 3, h: 14, dmg: 1 });
    lasers.push({ x: cat.x + eyeOffR, y: cat.y - 15, vy: -10, w: 3, h: 14, dmg: 1 });
  }

  function spawnExplosion(x, y, color) {
    for (var i = 0; i < 12; i++) {
      var ang = Math.random() * Math.PI * 2;
      var spd = Math.random() * 3 + 1;
      particles.push({
        x: x, y: y,
        vx: Math.cos(ang) * spd,
        vy: Math.sin(ang) * spd,
        life: 30 + Math.random() * 20,
        maxLife: 50,
        r: Math.random() * 3 + 2,
        color: color || '#ff0'
      });
    }
  }

  function spawnHitSpark(x, y) {
    for (var i = 0; i < 5; i++) {
      var ang = Math.random() * Math.PI * 2;
      var spd = Math.random() * 2 + 0.5;
      particles.push({
        x: x, y: y,
        vx: Math.cos(ang) * spd,
        vy: Math.sin(ang) * spd,
        life: 12 + Math.random() * 8,
        maxLife: 20,
        r: Math.random() * 2 + 1,
        color: '#f44'
      });
    }
  }

  function drawCat(cx, cy, s) {
    // s = scale factor (48 = full size)
    var half = s / 2;
    ctx.save();
    ctx.translate(cx, cy);

    // body
    ctx.fillStyle = '#555';
    ctx.beginPath();
    ctx.ellipse(0, 6, half * 0.7, half * 0.8, 0, 0, Math.PI * 2);
    ctx.fill();

    // head
    ctx.fillStyle = '#666';
    ctx.beginPath();
    ctx.ellipse(0, -8, half * 0.6, half * 0.55, 0, 0, Math.PI * 2);
    ctx.fill();

    // ears
    ctx.fillStyle = '#777';
    ctx.beginPath();
    ctx.moveTo(-12, -18);
    ctx.lineTo(-6, -30);
    ctx.lineTo(-2, -16);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(12, -18);
    ctx.lineTo(6, -30);
    ctx.lineTo(2, -16);
    ctx.closePath();
    ctx.fill();

    // inner ears
    ctx.fillStyle = '#f9a';
    ctx.beginPath();
    ctx.moveTo(-10, -19);
    ctx.lineTo(-6, -27);
    ctx.lineTo(-4, -17);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(10, -19);
    ctx.lineTo(6, -27);
    ctx.lineTo(4, -17);
    ctx.closePath();
    ctx.fill();

    // eyes (laser eyes!)
    var eyeGlow = (STATE === 'playing') ? 0.6 + Math.sin(Date.now() * 0.01) * 0.4 : 0.3;
    ctx.fillStyle = 'rgba(255, 50, 50, ' + eyeGlow + ')';
    ctx.shadowColor = '#f00';
    ctx.shadowBlur = 8;
    ctx.beginPath();
    ctx.ellipse(-8, -10, 5, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(8, -10, 5, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;

    // pupils
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(-7, -10, 2, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(9, -10, 2, 0, Math.PI * 2);
    ctx.fill();

    // nose
    ctx.fillStyle = '#f9a';
    ctx.beginPath();
    ctx.moveTo(0, -4);
    ctx.lineTo(-2, -2);
    ctx.lineTo(2, -2);
    ctx.closePath();
    ctx.fill();

    // whiskers
    ctx.strokeStyle = '#999';
    ctx.lineWidth = 0.8;
    ctx.beginPath();
    ctx.moveTo(-6, -3); ctx.lineTo(-20, -6);
    ctx.moveTo(-6, -1); ctx.lineTo(-20, 1);
    ctx.moveTo(6, -3); ctx.lineTo(20, -6);
    ctx.moveTo(6, -1); ctx.lineTo(20, 1);
    ctx.stroke();

    // tail
    ctx.strokeStyle = '#555';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.beginPath();
    var tailWag = Math.sin(Date.now() * 0.005) * 8;
    ctx.moveTo(14, 14);
    ctx.quadraticCurveTo(24 + tailWag, 4, 20 + tailWag, -6);
    ctx.stroke();

    ctx.restore();
  }

  function drawStars() {
    for (var i = 0; i < stars.length; i++) {
      var s = stars[i];
      var blink = 0.4 + Math.sin(Date.now() * 0.002 + s.b * 10) * 0.3;
      ctx.fillStyle = 'rgba(255, 255, 255, ' + blink + ')';
      ctx.fillRect(s.x, s.y, s.s, s.s);
    }
  }

  function drawHUD() {
    ctx.fillStyle = '#fff';
    ctx.font = '14px "Press Start 2P", monospace';
    ctx.textAlign = 'left';
    ctx.fillText('SCORE ' + score, 10, 28);
    ctx.textAlign = 'right';
    ctx.fillText('WAVE ' + wave, GW - 10, 28);
    ctx.textAlign = 'center';
    // lives as cat emojis
    var livesStr = '';
    for (var i = 0; i < lives; i++) livesStr += '😺';
    ctx.font = '18px serif';
    ctx.fillText(livesStr, GW / 2, 30);
  }

  function drawMenu() {
    // title
    ctx.fillStyle = '#fff';
    ctx.shadowColor = '#f44';
    ctx.shadowBlur = 20;
    ctx.font = '700 32px "Press Start 2P", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('SPACE', GW / 2, GH * 0.22);
    ctx.fillText('CAT', GW / 2, GH * 0.30);
    ctx.shadowBlur = 0;

    // cat preview
    drawCat(GW / 2, GH * 0.45, 72);

    // subtitle
    ctx.fillStyle = '#f88';
    ctx.font = '10px "Press Start 2P", monospace';
    ctx.fillText('LASER EYES vs BUGS', GW / 2, GH * 0.56);

    // instructions
    ctx.fillStyle = '#aaa';
    ctx.font = '9px "Silkscreen", cursive';
    ctx.fillText('Arrow keys / Touch to move', GW / 2, GH * 0.64);
    ctx.fillText('Space / Tap to fire', GW / 2, GH * 0.68);
    ctx.fillText('(Auto-fire is ON)', GW / 2, GH * 0.72);

    // start prompt
    var pulse = 0.5 + Math.sin(Date.now() * 0.004) * 0.5;
    ctx.fillStyle = 'rgba(255, 255, 100, ' + pulse + ')';
    ctx.font = '12px "Press Start 2P", monospace';
    ctx.fillText('TAP OR PRESS ENTER', GW / 2, GH * 0.82);

    if (highScore > 0) {
      ctx.fillStyle = '#ff0';
      ctx.font = '10px "Press Start 2P", monospace';
      ctx.fillText('HI: ' + highScore, GW / 2, GH * 0.88);
    }
  }

  function drawGameOver() {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, GW, GH);

    ctx.fillStyle = '#f44';
    ctx.shadowColor = '#f00';
    ctx.shadowBlur = 15;
    ctx.font = '700 24px "Press Start 2P", monospace';
    ctx.textAlign = 'center';
    ctx.fillText('GAME OVER', GW / 2, GH * 0.32);
    ctx.shadowBlur = 0;

    ctx.fillStyle = '#fff';
    ctx.font = '14px "Press Start 2P", monospace';
    ctx.fillText('SCORE: ' + score, GW / 2, GH * 0.42);
    ctx.fillText('WAVE: ' + wave, GW / 2, GH * 0.48);

    if (score >= highScore && score > 0) {
      ctx.fillStyle = '#ff0';
      ctx.font = '10px "Press Start 2P", monospace';
      ctx.fillText('NEW HIGH SCORE!', GW / 2, GH * 0.55);
    }

    drawCat(GW / 2, GH * 0.66, 56);

    var pulse = 0.5 + Math.sin(Date.now() * 0.004) * 0.5;
    ctx.fillStyle = 'rgba(255, 255, 100, ' + pulse + ')';
    ctx.font = '10px "Press Start 2P", monospace';
    ctx.fillText('TAP OR PRESS ENTER', GW / 2, GH * 0.82);
  }

  function startGame() {
    STATE = 'playing';
    score = 0;
    wave = 1;
    lives = 3;
    waveTimer = 0;
    bugSpawnTimer = 0;
    bugSpawnRate = 55;
    cat.x = GW / 2;
    bugs.length = 0;
    lasers.length = 0;
    particles.length = 0;
  }

  function update() {
    // stars scroll
    for (var i = 0; i < stars.length; i++) {
      stars[i].y += stars[i].sp;
      if (stars[i].y > GH) {
        stars[i].y = 0;
        stars[i].x = Math.random() * GW;
      }
    }

    if (STATE !== 'playing') return;

    // cat movement
    if (moveLeft) cat.x -= cat.speed;
    if (moveRight) cat.x += cat.speed;
    if (cat.x < 24) cat.x = 24;
    if (cat.x > GW - 24) cat.x = GW - 24;

    // auto fire
    autoFireTimer++;
    if (autoFireTimer >= autoFireRate) {
      autoFireTimer = 0;
      fireLaser();
    }

    // lasers
    for (var i = lasers.length - 1; i >= 0; i--) {
      lasers[i].y += lasers[i].vy;
      if (lasers[i].y < -20) lasers.splice(i, 1);
    }

    // bug spawning
    bugSpawnTimer++;
    if (bugSpawnTimer >= bugSpawnRate) {
      bugSpawnTimer = 0;
      spawnBug();
    }

    // wave progression
    waveTimer++;
    if (waveTimer >= waveDuration) {
      waveTimer = 0;
      wave++;
      waveTransition = 90;
      bugSpawnRate = Math.max(15, 55 - wave * 3);
      waveDuration = Math.min(1200, 800 + wave * 30);
    }
    if (waveTransition > 0) waveTransition--;

    // update bugs
    for (var i = bugs.length - 1; i >= 0; i--) {
      var b = bugs[i];
      b.y += b.speed;
      b.wobble += 0.04;
      b.x += Math.sin(b.wobble) * b.wobbleAmp;

      // hit bottom
      if (b.y > GH + 10) {
        bugs.splice(i, 1);
        lives--;
        spawnExplosion(b.x, GH - 10, '#f80');
        if (lives <= 0) {
          STATE = 'gameover';
          if (score > highScore) {
            highScore = score;
            try { localStorage.setItem('spacecat_hi', highScore); } catch(e){}
          }
        }
        continue;
      }

      // laser collision
      for (var j = lasers.length - 1; j >= 0; j--) {
        var l = lasers[j];
        var dx = l.x - b.x, dy = l.y - b.y;
        var dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < b.size) {
          b.hp -= l.dmg;
          lasers.splice(j, 1);
          spawnHitSpark(b.x, b.y);
          if (b.hp <= 0) {
            score += b.type.points * wave;
            var colors = ['#ff0', '#f80', '#0ff', '#f0f', '#0f0'];
            spawnExplosion(b.x, b.y, colors[Math.floor(Math.random() * colors.length)]);
            bugs.splice(i, 1);
          }
          break;
        }
      }
    }

    // particles
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
  }

  function draw() {
    // transform to game coords
    ctx.save();
    ctx.fillStyle = '#0a0a1a';
    ctx.fillRect(0, 0, W, H);

    var ox = (W - GW * scale) / 2;
    var oy = (H - GH * scale) / 2;
    ctx.translate(ox, oy);
    ctx.scale(scale, scale);

    // clip to game area
    ctx.beginPath();
    ctx.rect(0, 0, GW, GH);
    ctx.clip();

    // background gradient
    var grad = ctx.createLinearGradient(0, 0, 0, GH);
    grad.addColorStop(0, '#05051a');
    grad.addColorStop(0.5, '#0a0a2e');
    grad.addColorStop(1, '#12082a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, GW, GH);

    drawStars();

    if (STATE === 'menu') {
      drawMenu();
    } else if (STATE === 'playing' || STATE === 'gameover') {
      // draw lasers
      for (var i = 0; i < lasers.length; i++) {
        var l = lasers[i];
        ctx.fillStyle = '#f33';
        ctx.shadowColor = '#f00';
        ctx.shadowBlur = 6;
        ctx.fillRect(l.x - l.w / 2, l.y, l.w, l.h);
        ctx.shadowBlur = 0;
      }

      // draw bugs
      ctx.font = '24px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      for (var i = 0; i < bugs.length; i++) {
        var b = bugs[i];
        ctx.save();
        ctx.translate(b.x, b.y);
        // flash red when damaged
        if (b.hp < b.maxHp) {
          ctx.shadowColor = '#f00';
          ctx.shadowBlur = 8;
        }
        ctx.font = (b.size * 1.2) + 'px serif';
        ctx.fillText(b.type.emoji, 0, 0);
        ctx.shadowBlur = 0;

        // HP bar for bugs with hp > 1
        if (b.maxHp > 1) {
          var bw = b.size * 0.8;
          var bh = 3;
          ctx.fillStyle = '#333';
          ctx.fillRect(-bw / 2, -b.size / 2 - 6, bw, bh);
          ctx.fillStyle = '#0f0';
          ctx.fillRect(-bw / 2, -b.size / 2 - 6, bw * (b.hp / b.maxHp), bh);
        }
        ctx.restore();
      }

      // draw particles
      for (var i = 0; i < particles.length; i++) {
        var p = particles[i];
        var alpha = p.life / p.maxLife;
        ctx.globalAlpha = alpha;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r * alpha, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;

      // draw cat
      drawCat(cat.x, cat.y, 48);

      // eye laser beams (visual effect)
      if (autoFireTimer < 4) {
        ctx.strokeStyle = 'rgba(255, 50, 50, 0.3)';
        ctx.lineWidth = 1;
        ctx.beginPath();
        ctx.moveTo(cat.x - 8, cat.y - 15);
        ctx.lineTo(cat.x - 8, 0);
        ctx.moveTo(cat.x + 8, cat.y - 15);
        ctx.lineTo(cat.x + 8, 0);
        ctx.stroke();
      }

      drawHUD();

      // wave transition
      if (waveTransition > 0) {
        var a = waveTransition / 90;
        ctx.fillStyle = 'rgba(255, 255, 0, ' + (a * 0.9) + ')';
        ctx.font = '700 20px "Press Start 2P", monospace';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText('WAVE ' + wave, GW / 2, GH / 2);
      }

      if (STATE === 'gameover') drawGameOver();
    }

    ctx.restore();
  }

  function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
  }

  // input: keyboard
  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowLeft' || e.key === 'a') moveLeft = true;
    if (e.key === 'ArrowRight' || e.key === 'd') moveRight = true;
    if (e.key === ' ') {
      e.preventDefault();
      if (STATE === 'playing') fireLaser();
      else if (STATE === 'menu' || STATE === 'gameover') startGame();
    }
    if (e.key === 'Enter') {
      if (STATE === 'menu' || STATE === 'gameover') startGame();
    }
  });
  document.addEventListener('keyup', function(e) {
    if (e.key === 'ArrowLeft' || e.key === 'a') moveLeft = false;
    if (e.key === 'ArrowRight' || e.key === 'd') moveRight = false;
  });

  // input: touch
  var touchStartX = null;
  var touchCatStartX = null;

  C.addEventListener('touchstart', function(e) {
    e.preventDefault();
    if (STATE === 'menu' || STATE === 'gameover') {
      startGame();
      return;
    }
    var t = e.touches[0];
    touchStartX = t.clientX;
    touchCatStartX = cat.x;
  }, { passive: false });

  C.addEventListener('touchmove', function(e) {
    e.preventDefault();
    if (STATE !== 'playing' || touchStartX === null) return;
    var t = e.touches[0];
    var ox = (W - GW * scale) / 2;
    var dx = (t.clientX - touchStartX) / scale;
    cat.x = touchCatStartX + dx;
    if (cat.x < 24) cat.x = 24;
    if (cat.x > GW - 24) cat.x = GW - 24;
  }, { passive: false });

  C.addEventListener('touchend', function(e) {
    touchStartX = null;
  });

  // mouse click to fire
  C.addEventListener('mousedown', function(e) {
    if (STATE === 'menu' || STATE === 'gameover') {
      startGame();
    } else if (STATE === 'playing') {
      fireLaser();
    }
  });

  loop();
})();
</script>
<script src="/sloppy-header/sloppy-bar.js"></script>
</body>
</html>
