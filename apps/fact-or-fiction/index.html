<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
<title>Fact or Fiction</title>
<link rel="icon" href="https://emojicdn.elk.sh/🔍" />
<meta name="description" content="Bizarre claims. Real or fake? You decide." />
<meta property="og:title" content="Fact or Fiction" />
<meta property="og:description" content="Bizarre claims. Real or fake? You decide." />
<meta property="og:url" content="https://sloppy.live/fact-or-fiction" />
<meta property="og:image" content="https://sloppy.live/screenshots/fact-or-fiction.jpg" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=Azeret+Mono:wght@300;500&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0c0b0e;
    --surface: #16141c;
    --border: #2a2636;
    --dim: #6b6580;
    --text: #ede8f5;
    --fact: #22d97e;
    --fiction: #f5395a;
    --gold: #f0c040;
    --accent: #9d6bff;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    min-height: 100vh;
    background: var(--bg);
    color: var(--text);
    font-family: 'Azeret Mono', monospace;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
    overflow-x: hidden;
  }
  body {
    background:
      radial-gradient(ellipse at 30% 0%, rgba(157,107,255,0.06), transparent 50%),
      radial-gradient(ellipse at 70% 100%, rgba(34,217,126,0.04), transparent 50%),
      var(--bg);
    display: flex;
    flex-direction: column;
    min-height: 100vh;
  }

  header {
    padding: 16px 20px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 26px;
    font-weight: 400;
    letter-spacing: 0.02em;
    background: linear-gradient(135deg, var(--accent), var(--fact));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  header a {
    color: var(--dim);
    font-size: 12px;
    text-decoration: none;
    letter-spacing: 0.08em;
  }
  header a:hover { color: var(--text); }

  /* Auth bar */
  .auth-bar {
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12px;
    color: var(--dim);
    min-height: 44px;
  }
  .auth-bar input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Azeret Mono', monospace;
    font-size: 13px;
    padding: 6px 12px;
    border-radius: 6px;
    outline: none;
    width: 240px;
    max-width: 50vw;
  }
  .auth-bar input:focus { border-color: var(--accent); }
  .auth-bar input::placeholder { color: var(--dim); }
  .auth-bar button {
    background: var(--accent);
    color: #fff;
    border: none;
    font-family: 'Azeret Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    padding: 7px 14px;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: opacity .15s;
  }
  .auth-bar button:hover { opacity: 0.85; }
  .auth-bar button:disabled { opacity: 0.4; cursor: default; }
  .auth-bar .auth-status {
    margin-left: auto;
    font-size: 11px;
    letter-spacing: 0.08em;
    color: var(--dim);
  }
  .auth-bar .auth-status .email-badge {
    color: var(--fact);
    font-weight: 500;
  }
  .auth-bar .sign-out-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--dim);
    padding: 5px 10px;
    font-size: 11px;
  }
  .auth-msg {
    font-size: 11px;
    padding: 2px 0;
    min-height: 16px;
  }
  .auth-msg.ok { color: var(--fact); }
  .auth-msg.err { color: var(--fiction); }

  /* Main content */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
  }

  /* Card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 36px 32px;
    max-width: 560px;
    width: 100%;
    text-align: center;
  }

  /* HUD */
  .hud {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 10px 20px;
    font-size: 12px;
    color: var(--dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .hud .v { color: var(--text); font-weight: 500; }
  .hud .v.streak { color: var(--gold); }

  /* Question */
  .q-number {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .q-category {
    font-size: 10px;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 8px;
    padding: 3px 10px;
    border: 1px solid rgba(157,107,255,0.3);
    border-radius: 20px;
    display: inline-block;
  }
  .q-text {
    font-family: 'Instrument Serif', serif;
    font-size: 24px;
    line-height: 1.4;
    color: var(--text);
    margin: 20px 0 28px;
  }

  /* Buttons */
  .btn-row {
    display: flex;
    gap: 14px;
    justify-content: center;
  }
  .btn-fact, .btn-fiction {
    font-family: 'Azeret Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    padding: 14px 32px;
    border: 2px solid;
    border-radius: 10px;
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: all .15s;
    min-width: 130px;
  }
  .btn-fact {
    background: transparent;
    border-color: var(--fact);
    color: var(--fact);
  }
  .btn-fact:hover { background: rgba(34,217,126,0.12); }
  .btn-fiction {
    background: transparent;
    border-color: var(--fiction);
    color: var(--fiction);
  }
  .btn-fiction:hover { background: rgba(245,57,90,0.12); }
  .btn-fact:disabled, .btn-fiction:disabled { opacity: 0.3; cursor: default; }

  /* Result flash */
  .result {
    margin-top: 20px;
    font-size: 13px;
    letter-spacing: 0.08em;
    min-height: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }
  .result .verdict {
    font-family: 'Instrument Serif', serif;
    font-size: 20px;
  }
  .result .verdict.correct { color: var(--fact); }
  .result .verdict.wrong { color: var(--fiction); }
  .result .explanation {
    color: var(--dim);
    font-size: 12px;
    line-height: 1.5;
    max-width: 440px;
  }

  /* Timer bar */
  .timer-bar {
    width: 100%;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 18px;
    overflow: hidden;
  }
  .timer-bar .fill {
    height: 100%;
    background: var(--accent);
    transition: width 0.1s linear;
    border-radius: 2px;
  }
  .timer-bar .fill.warn { background: var(--gold); }
  .timer-bar .fill.danger { background: var(--fiction); }

  /* Start / End screens */
  .screen-title {
    font-family: 'Instrument Serif', serif;
    font-size: 36px;
    color: var(--text);
    margin-bottom: 8px;
  }
  .screen-sub {
    color: var(--dim);
    font-size: 13px;
    line-height: 1.6;
    margin-bottom: 24px;
  }
  .start-btn {
    font-family: 'Azeret Mono', monospace;
    font-size: 14px;
    font-weight: 500;
    padding: 14px 36px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    transition: opacity .15s;
  }
  .start-btn:hover { opacity: 0.85; }

  /* Mode selector */
  .mode-row {
    display: flex;
    gap: 10px;
    justify-content: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .mode-btn {
    font-family: 'Azeret Mono', monospace;
    font-size: 11px;
    padding: 8px 16px;
    background: none;
    border: 1px solid var(--border);
    color: var(--dim);
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all .15s;
  }
  .mode-btn:hover { border-color: var(--accent); color: var(--text); }
  .mode-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(157,107,255,0.08); }

  /* Stats */
  .stats {
    display: flex;
    gap: 20px;
    justify-content: center;
    flex-wrap: wrap;
    margin: 18px 0;
  }
  .stat {
    text-align: center;
  }
  .stat .val {
    font-family: 'Instrument Serif', serif;
    font-size: 28px;
    color: var(--text);
  }
  .stat .label {
    font-size: 10px;
    color: var(--dim);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-top: 2px;
  }
  .stat .val.gold { color: var(--gold); }
  .stat .val.green { color: var(--fact); }

  /* Grade */
  .grade {
    font-family: 'Instrument Serif', serif;
    font-size: 48px;
    margin: 10px 0;
  }
  .grade.s { color: var(--gold); text-shadow: 0 0 20px rgba(240,192,64,0.4); }
  .grade.a { color: var(--fact); }
  .grade.b { color: var(--accent); }
  .grade.c { color: var(--dim); }
  .grade.d { color: var(--fiction); }

  /* Leaderboard */
  .lb { margin-top: 20px; width: 100%; }
  .lb-title {
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .lb-row {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    padding: 5px 8px;
    border-radius: 4px;
  }
  .lb-row:nth-child(even) { background: rgba(255,255,255,0.02); }
  .lb-row .rank { color: var(--dim); width: 24px; }
  .lb-row .lb-name { color: var(--text); flex: 1; text-align: left; margin-left: 6px; overflow: hidden; text-overflow: ellipsis; }
  .lb-row .lb-score { color: var(--gold); text-align: right; }
  .lb-row.gold .rank, .lb-row.gold .lb-name { color: #ffd700; }
  .lb-row.silver .rank, .lb-row.silver .lb-name { color: #c0c0c0; }
  .lb-row.bronze .rank, .lb-row.bronze .lb-name { color: #cd7f32; }

  /* Quiz Creator */
  .creator-toggle {
    font-family: 'Azeret Mono', monospace;
    font-size: 11px;
    background: none;
    border: 1px solid var(--border);
    color: var(--dim);
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 0.06em;
    margin-top: 16px;
    transition: all .15s;
  }
  .creator-toggle:hover { border-color: var(--accent); color: var(--text); }

  .creator {
    max-width: 560px;
    width: 100%;
    margin-top: 20px;
  }
  .creator h3 {
    font-family: 'Instrument Serif', serif;
    font-size: 22px;
    font-weight: 400;
    color: var(--text);
    margin-bottom: 14px;
  }
  .creator-form {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .creator input, .creator textarea, .creator select {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Azeret Mono', monospace;
    font-size: 13px;
    padding: 8px 12px;
    border-radius: 6px;
    outline: none;
    width: 100%;
  }
  .creator input:focus, .creator textarea:focus { border-color: var(--accent); }
  .creator input::placeholder, .creator textarea::placeholder { color: var(--dim); }
  .creator textarea { resize: vertical; min-height: 60px; }
  .creator-row {
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .creator-row label {
    font-size: 12px;
    color: var(--dim);
    white-space: nowrap;
    min-width: 70px;
  }
  .add-q-btn {
    font-family: 'Azeret Mono', monospace;
    font-size: 12px;
    background: rgba(157,107,255,0.1);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    letter-spacing: 0.06em;
    transition: all .15s;
  }
  .add-q-btn:hover { background: rgba(157,107,255,0.2); }
  .q-list {
    margin-top: 12px;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .q-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 12px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
  }
  .q-item .q-idx { color: var(--dim); min-width: 20px; }
  .q-item .q-preview { flex: 1; color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .q-item .q-answer-tag {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 3px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .q-item .q-answer-tag.fact { background: rgba(34,217,126,0.15); color: var(--fact); }
  .q-item .q-answer-tag.fiction { background: rgba(245,57,90,0.15); color: var(--fiction); }
  .q-item .q-del {
    background: none;
    border: none;
    color: var(--dim);
    cursor: pointer;
    font-size: 14px;
    padding: 2px 4px;
  }
  .q-item .q-del:hover { color: var(--fiction); }

  .share-box {
    margin-top: 14px;
    padding: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
  }
  .share-box .share-label {
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .share-url {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--fact);
    font-family: 'Azeret Mono', monospace;
    font-size: 11px;
    padding: 8px;
    border-radius: 4px;
    width: 100%;
    cursor: pointer;
    word-break: break-all;
  }
  .share-url:focus { outline: 1px solid var(--accent); }
  .copy-btn {
    font-family: 'Azeret Mono', monospace;
    font-size: 11px;
    background: var(--fact);
    color: var(--bg);
    border: none;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    margin-top: 8px;
    letter-spacing: 0.06em;
  }
  .copy-btn:hover { opacity: 0.85; }

  .custom-banner {
    background: rgba(157,107,255,0.08);
    border: 1px solid rgba(157,107,255,0.3);
    border-radius: 8px;
    padding: 10px 16px;
    margin-bottom: 16px;
    font-size: 12px;
    color: var(--accent);
    text-align: center;
  }
  .custom-banner strong { color: var(--text); }

  @media (max-width: 480px) {
    .card { padding: 24px 18px; }
    .q-text { font-size: 20px; }
    .btn-fact, .btn-fiction { padding: 12px 20px; font-size: 13px; min-width: 110px; }
    .auth-bar { flex-wrap: wrap; }
    .auth-bar input { width: 180px; }
  }
</style>
</head>
<body>
  <header>
    <h1>Fact or Fiction</h1>
</header>

  <div class="auth-bar" id="authBar">
    <input type="email" id="emailInput" placeholder="email for magic link..." />
    <button id="magicBtn">Send Link</button>
    <div class="auth-msg" id="authMsg"></div>
    <div class="auth-status" id="authStatus"></div>
  </div>

  <div class="hud" id="hud" style="display:none">
    <div>Q <span class="v" id="qNum">1</span>/<span class="v" id="qTotal">15</span></div>
    <div>score <span class="v" id="scoreNum">0</span></div>
    <div>streak <span class="v streak" id="streakNum">0</span></div>
  </div>

  <main>
    <div class="card" id="startScreen">
      <div class="screen-title">Fact or Fiction</div>
      <div class="screen-sub">
        Bizarre claims. Outrageous statements.<br/>
        Decide if each one is real or completely made up.
      </div>
      <div class="mode-row">
        <button class="mode-btn active" data-mode="classic">Classic (15)</button>
        <button class="mode-btn" data-mode="speed">Speed (15)</button>
        <button class="mode-btn" data-mode="endless">Endless</button>
      </div>
      <button class="start-btn" id="startBtn">Begin</button>
      <button class="creator-toggle" id="creatorToggle">+ Create Custom Quiz</button>
    </div>

    <div class="creator" id="creatorPanel" style="display:none">
      <div class="card">
        <h3>Build Your Quiz</h3>
        <div class="creator-form">
          <input type="text" id="quizTitle" placeholder="Quiz title (e.g. 'History Myths')" maxlength="60" />
          <textarea id="qClaim" placeholder="Write a claim... (e.g. 'The moon is made of cheese.')" maxlength="300"></textarea>
          <div class="creator-row">
            <label>Answer:</label>
            <select id="qAnswerSel">
              <option value="true">Fact (true)</option>
              <option value="false">Fiction (false)</option>
            </select>
          </div>
          <input type="text" id="qExplain" placeholder="Explanation (optional)" maxlength="200" />
          <input type="text" id="qCatInput" placeholder="Category (optional, e.g. 'science')" maxlength="30" />
          <button class="add-q-btn" id="addQBtn">+ Add Question</button>
        </div>
        <div class="q-list" id="qList"></div>
        <div class="share-box" id="shareBox" style="display:none">
          <div class="share-label">Share Link</div>
          <input type="text" class="share-url" id="shareUrl" readonly />
          <button class="copy-btn" id="copyBtn">Copy Link</button>
        </div>
      </div>
    </div>

    <div class="card" id="gameScreen" style="display:none">
      <div class="q-number" id="qLabel">Question 1 of 15</div>
      <div class="q-category" id="qCat">nature</div>
      <div class="q-text" id="qText"></div>
      <div class="btn-row">
        <button class="btn-fact" id="btnFact">Fact</button>
        <button class="btn-fiction" id="btnFiction">Fiction</button>
      </div>
      <div class="result" id="result"></div>
      <div class="timer-bar" id="timerBar" style="display:none">
        <div class="fill" id="timerFill"></div>
      </div>
    </div>

    <div class="card" id="endScreen" style="display:none">
      <div class="screen-title" id="endTitle">Results</div>
      <div class="grade" id="gradeEl"></div>
      <div class="stats" id="endStats"></div>
      <div class="screen-sub" id="endMsg"></div>
      <div class="lb" id="lbSection" style="display:none">
        <div class="lb-title">Top Scores</div>
        <div id="lbRows"></div>
      </div>
      <button class="start-btn" id="replayBtn" style="margin-top:16px">Play Again</button>
    </div>
  </main>

<script type="module">
  import { createBrowserClient } from "https://cdn.jsdelivr.net/npm/@supabase/ssr@0.7.0/+esm";

  const SUPABASE_URL = 'https://yjyxteqzhhmtrgcaekgz.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InlqeXh0ZXF6aGhtdHJnY2Fla2d6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTczNTg3NDIsImV4cCI6MjA3MjkzNDc0Mn0.G8SRde7IN2QFW1EnASM8IS32IUYR2eenCCjdDdioiBU';

  const getCookieDomain = () => {
    const h = window.location.hostname;
    if (h.includes('sloppy.live')) return '.sloppy.live';
    return h;
  };

  const supabase = createBrowserClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    cookieOptions: {
      name: 'sb-auth-token',
      domain: getCookieDomain(),
      path: '/',
      sameSite: 'lax',
    },
  });

  // === AUTH ===
  const emailInput = document.getElementById('emailInput');
  const magicBtn = document.getElementById('magicBtn');
  const authMsg = document.getElementById('authMsg');
  const authStatus = document.getElementById('authStatus');
  let currentUser = null;

  async function checkSession() {
    const { data } = await supabase.auth.getSession();
    if (data.session?.user) {
      setLoggedIn(data.session.user);
    } else {
      // Anonymous fallback
      const { data: anon } = await supabase.auth.signInAnonymously();
      if (anon?.session?.user) currentUser = anon.session.user;
    }
  }

  function setLoggedIn(user) {
    currentUser = user;
    const email = user.email;
    if (email) {
      emailInput.style.display = 'none';
      magicBtn.style.display = 'none';
      authMsg.textContent = '';
      authStatus.innerHTML = `<span class="email-badge">${email}</span> <button class="sign-out-btn" id="signOutBtn">sign out</button>`;
      document.getElementById('signOutBtn')?.addEventListener('click', async () => {
        await supabase.auth.signOut();
        currentUser = null;
        emailInput.style.display = '';
        magicBtn.style.display = '';
        authStatus.innerHTML = '';
        authMsg.textContent = '';
        // Re-auth anonymous
        const { data } = await supabase.auth.signInAnonymously();
        if (data?.session?.user) currentUser = data.session.user;
      });
    }
  }

  // Handle magic link callback (hash fragment from email)
  supabase.auth.onAuthStateChange((event, session) => {
    if (session?.user?.email) {
      setLoggedIn(session.user);
    }
  });

  magicBtn.addEventListener('click', async () => {
    const email = emailInput.value.trim();
    if (!email || !email.includes('@')) {
      authMsg.className = 'auth-msg err';
      authMsg.textContent = 'enter a valid email';
      return;
    }
    magicBtn.disabled = true;
    magicBtn.textContent = 'Sending...';
    const { error } = await supabase.auth.signInWithOtp({
      email,
      options: { emailRedirectTo: window.location.origin + window.location.pathname }
    });
    if (error) {
      authMsg.className = 'auth-msg err';
      authMsg.textContent = error.message;
    } else {
      authMsg.className = 'auth-msg ok';
      authMsg.textContent = 'check your inbox for the magic link!';
    }
    magicBtn.disabled = false;
    magicBtn.textContent = 'Send Link';
  });

  checkSession();

  // === QUESTIONS ===
  const QUESTIONS = [
    { claim: "Honey never spoils. Archaeologists found 3,000-year-old honey in Egyptian tombs that was still edible.", answer: true, category: "food", explain: "Honey's low moisture and acidic pH create an inhospitable environment for bacteria." },
    { claim: "The Eiffel Tower grows about 6 inches taller during summer due to thermal expansion of iron.", answer: true, category: "science", explain: "Metal expands when heated. The iron structure can grow up to 15 cm in hot weather." },
    { claim: "Octopuses have three hearts and blue blood.", answer: true, category: "nature", explain: "Two branchial hearts pump blood through gills; one systemic heart pumps it through the body. Copper-based hemocyanin makes it blue." },
    { claim: "A group of flamingos is called a 'flamboyance.'", answer: true, category: "nature", explain: "Yes — along with 'stand' and 'colony,' 'flamboyance' is an accepted collective noun." },
    { claim: "The shortest war in history lasted 38 minutes, between Britain and Zanzibar.", answer: true, category: "history", explain: "The Anglo-Zanzibar War of 1896 lasted between 38 and 45 minutes." },
    { claim: "Venus is the only planet that spins clockwise.", answer: false, category: "space", explain: "Both Venus AND Uranus have retrograde rotation. Venus spins clockwise; Uranus essentially rolls on its side." },
    { claim: "Bananas are radioactive due to their potassium content.", answer: true, category: "food", explain: "Bananas contain potassium-40, a radioactive isotope. You'd need to eat 10 million at once for radiation poisoning." },
    { claim: "Sharks are older than trees. They've existed for about 400 million years.", answer: true, category: "nature", explain: "Sharks appeared ~450 million years ago. Trees evolved around 350 million years ago." },
    { claim: "Napoleon was unusually short for his time.", answer: false, category: "history", explain: "At 5'7\", Napoleon was average or slightly above average height for a Frenchman in the early 1800s." },
    { claim: "Goldfish have a 3-second memory.", answer: false, category: "nature", explain: "Goldfish can remember things for months. They can learn tricks and navigate mazes." },
    { claim: "The Great Wall of China is visible from space with the naked eye.", answer: false, category: "history", explain: "Multiple astronauts have confirmed it's not visible from orbit without aid. It's too narrow." },
    { claim: "A jiffy is an actual unit of time equal to 1/100th of a second.", answer: true, category: "science", explain: "In computing, a jiffy is 10ms (1/100s). In physics, it's the time light takes to travel 1cm." },
    { claim: "Cleopatra lived closer in time to the Moon landing than to the building of the Great Pyramid.", answer: true, category: "history", explain: "Great Pyramid: ~2560 BC. Cleopatra: 69-30 BC. Moon landing: 1969 AD. She's ~2500 years from the pyramid but ~2000 from the Moon landing." },
    { claim: "The human body contains enough iron to make a 3-inch nail.", answer: true, category: "science", explain: "The average adult body contains about 3-4 grams of iron, enough for a small nail." },
    { claim: "Lightning never strikes the same place twice.", answer: false, category: "science", explain: "Tall structures like the Empire State Building get struck about 20-25 times per year." },
    { claim: "Cows have best friends and get stressed when separated from them.", answer: true, category: "nature", explain: "Research from Northampton University showed cows have preferred companions and show stress when apart." },
    { claim: "The inventor of the Pringles can is buried in one.", answer: true, category: "culture", explain: "Fredric Baur, who designed the iconic tube, had part of his ashes buried in a Pringles can in 2008." },
    { claim: "Humans swallow an average of 8 spiders per year in their sleep.", answer: false, category: "science", explain: "This is a complete myth. Sleeping humans repel spiders through vibrations, breathing, and heartbeats." },
    { claim: "Scotland's national animal is the unicorn.", answer: true, category: "culture", explain: "The unicorn has been a Scottish heraldic symbol since the 12th century." },
    { claim: "A strawberry is not actually a berry, but a banana is.", answer: true, category: "food", explain: "Botanically, berries develop from a single ovary. Bananas qualify; strawberries are 'accessory fruits.'" },
    { claim: "Oxford University is older than the Aztec Empire.", answer: true, category: "history", explain: "Teaching at Oxford began around 1096. The Aztec Empire was founded in 1428." },
    { claim: "Humans only use 10% of their brains.", answer: false, category: "science", explain: "Brain imaging shows we use virtually all parts of the brain, and most is active most of the time." },
    { claim: "A day on Venus is longer than a year on Venus.", answer: true, category: "space", explain: "Venus takes 243 Earth days to rotate once but only 225 Earth days to orbit the Sun." },
    { claim: "Wombat poop is cube-shaped.", answer: true, category: "nature", explain: "Wombats produce cube-shaped droppings due to the varying elasticity of their intestinal walls." },
    { claim: "The Sahara Desert is the largest desert on Earth.", answer: false, category: "geography", explain: "Antarctica is technically the largest desert — it receives less precipitation than the Sahara." },
    { claim: "Humans and bananas share about 60% of the same DNA.", answer: true, category: "science", explain: "Many fundamental cell processes are shared across life. We share ~60% of genes with bananas." },
    { claim: "The average person walks the equivalent of three times around the world in a lifetime.", answer: true, category: "science", explain: "~7,500 steps/day over 80 years ≈ 110,000 miles ≈ 3× Earth's circumference." },
    { claim: "Carrots were originally purple before being cultivated to be orange.", answer: true, category: "food", explain: "Dutch growers in the 17th century bred orange carrots, possibly honoring William of Orange." },
    { claim: "There are more stars in the universe than grains of sand on Earth.", answer: true, category: "space", explain: "Estimates: ~7.5×10¹⁸ grains of sand vs ~10²⁴ stars. Stars win by a factor of ~100,000." },
    { claim: "Bulls are enraged by the color red.", answer: false, category: "nature", explain: "Bulls are colorblind to red. They charge at the cape's movement, not its color." },
    { claim: "The inventor of the fire hydrant is unknown because the patent was destroyed in a fire.", answer: true, category: "history", explain: "The earliest US patent for a fire hydrant was reportedly lost in a Patent Office fire in 1836." },
    { claim: "Astronauts grow up to 2 inches taller in space.", answer: true, category: "space", explain: "Without gravity compressing the spine, the vertebral discs expand, adding 1-2 inches of height." },
    { claim: "Dolphins sleep with one eye open.", answer: true, category: "nature", explain: "Dolphins practice unihemispheric sleep — half the brain sleeps while the other stays alert." },
    { claim: "The Bermuda Triangle has a statistically higher rate of disappearances than other ocean regions.", answer: false, category: "geography", explain: "Lloyd's of London and the US Coast Guard have found no evidence of unusual disappearance rates." },
    { claim: "Hot water freezes faster than cold water under certain conditions.", answer: true, category: "science", explain: "The Mpemba effect is a real, documented phenomenon, though its exact mechanism is still debated." },
    { claim: "Mount Everest is the tallest mountain on Earth.", answer: false, category: "geography", explain: "Measured from base to summit, Mauna Kea in Hawaii is about 33,500 feet — taller than Everest's 29,032 feet above sea level." },
    { claim: "Sloths can hold their breath longer than dolphins.", answer: true, category: "nature", explain: "Sloths can slow their heart rate to hold breath for up to 40 minutes. Dolphins max out around 10 minutes." },
    { claim: "Russia has a larger surface area than Pluto.", answer: true, category: "geography", explain: "Russia: 17.1 million km². Pluto's surface area: 16.7 million km²." },
    { claim: "The smell of freshly cut grass is actually a plant distress signal.", answer: true, category: "nature", explain: "Plants release volatile organic compounds (green leaf volatiles) when damaged — a chemical SOS." },
    { claim: "Humans can distinguish over a trillion different smells.", answer: true, category: "science", explain: "A 2014 Rockefeller University study estimated humans can discriminate at least 1 trillion olfactory stimuli." },
    { claim: "The tongue is the strongest muscle in the human body.", answer: false, category: "science", explain: "The tongue is actually a group of muscles, not one muscle. The strongest single muscle is debated — masseter or gluteus maximus." },
    { claim: "Dead people can get goosebumps.", answer: true, category: "science", explain: "Muscles can contract after death due to chemical changes, causing the arrector pili muscles to create goosebumps." },
    { claim: "There's a species of jellyfish that is biologically immortal.", answer: true, category: "nature", explain: "Turritopsis dohrnii can revert to its juvenile polyp stage, theoretically living forever." },
    { claim: "The current American flag was designed by a 17-year-old for a school project.", answer: true, category: "history", explain: "Robert Heft designed the 50-star flag as a junior in high school in 1958. He got a B- until it was adopted." },
    { claim: "Sunflowers face each other on cloudy days because they lack sunlight.", answer: false, category: "nature", explain: "Young sunflowers track the sun (heliotropism), but mature sunflowers face east permanently. They don't face each other." },
    { claim: "A teaspoonful of neutron star would weigh about 6 billion tons.", answer: true, category: "space", explain: "Neutron stars are incredibly dense — about 10¹⁷ kg/m³." },
    { claim: "Butterflies taste with their feet.", answer: true, category: "nature", explain: "Butterflies have chemoreceptors on their feet that let them taste plants by standing on them." },
    { claim: "Albert Einstein failed mathematics as a student.", answer: false, category: "history", explain: "Einstein excelled at math. This myth may stem from a grading system difference where 6 was the best score." },
    { claim: "You eat more bacteria from kissing than from licking a toilet seat.", answer: true, category: "science", explain: "A 10-second kiss transfers ~80 million bacteria. Toilet seats are typically less bacteria-dense than mouths." },
    { claim: "Greenland sharks can live for over 400 years.", answer: true, category: "nature", explain: "Radiocarbon dating of eye lens tissue suggests they can live 300-500 years, making them the longest-lived vertebrates." },
  ];

  // === GAME STATE ===
  const state = {
    mode: 'classic', // classic, speed, endless
    questions: [],
    qIdx: 0,
    score: 0,
    streak: 0,
    bestStreak: 0,
    correct: 0,
    total: 0,
    timerRAF: null,
    timerStart: 0,
    timeLimit: 0,
    answered: false,
  };

  // DOM
  const startScreen = document.getElementById('startScreen');
  const gameScreen = document.getElementById('gameScreen');
  const endScreen = document.getElementById('endScreen');
  const hudEl = document.getElementById('hud');
  const qNumEl = document.getElementById('qNum');
  const qTotalEl = document.getElementById('qTotal');
  const scoreNumEl = document.getElementById('scoreNum');
  const streakNumEl = document.getElementById('streakNum');
  const qLabelEl = document.getElementById('qLabel');
  const qCatEl = document.getElementById('qCat');
  const qTextEl = document.getElementById('qText');
  const btnFact = document.getElementById('btnFact');
  const btnFiction = document.getElementById('btnFiction');
  const resultEl = document.getElementById('result');
  const timerBar = document.getElementById('timerBar');
  const timerFill = document.getElementById('timerFill');
  const gradeEl = document.getElementById('gradeEl');
  const endStatsEl = document.getElementById('endStats');
  const endMsgEl = document.getElementById('endMsg');
  const endTitleEl = document.getElementById('endTitle');

  // Mode buttons
  document.querySelectorAll('.mode-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.mode = btn.dataset.mode;
    });
  });

  function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  function startGame(customQs) {
    const pool = customQs || QUESTIONS;
    state.questions = shuffle(pool);
    if (!customQs && state.mode !== 'endless') state.questions = state.questions.slice(0, 15);
    state.qIdx = 0;
    state.score = 0;
    state.streak = 0;
    state.bestStreak = 0;
    state.correct = 0;
    state.total = 0;
    state.timeLimit = state.mode === 'speed' ? 8 : (state.mode === 'classic' ? 15 : 0);
    state.customQuiz = !!customQs;

    startScreen.style.display = 'none';
    endScreen.style.display = 'none';
    creatorPanel.style.display = 'none';
    gameScreen.style.display = '';
    hudEl.style.display = '';
    timerBar.style.display = state.timeLimit > 0 ? '' : 'none';

    qTotalEl.textContent = state.mode === 'endless' ? '∞' : state.questions.length;
    showQuestion();
  }

  function showQuestion() {
    if (state.qIdx >= state.questions.length) {
      if (state.mode === 'endless') {
        // Reshuffle and continue
        state.questions = shuffle(QUESTIONS);
        state.qIdx = 0;
      } else {
        endGame();
        return;
      }
    }

    const q = state.questions[state.qIdx];
    state.answered = false;
    qNumEl.textContent = state.total + 1;
    qLabelEl.textContent = `Question ${state.total + 1}${state.mode !== 'endless' ? ' of ' + state.questions.length : ''}`;
    qCatEl.textContent = q.category;
    qTextEl.textContent = q.claim;
    resultEl.innerHTML = '';
    btnFact.disabled = false;
    btnFiction.disabled = false;
    updateHud();

    if (state.timeLimit > 0) startTimer();
  }

  function startTimer() {
    stopTimer();
    state.timerStart = performance.now();
    timerFill.style.width = '100%';
    timerFill.className = 'fill';

    function tick() {
      const elapsed = (performance.now() - state.timerStart) / 1000;
      const pct = Math.max(0, 1 - elapsed / state.timeLimit) * 100;
      timerFill.style.width = pct + '%';
      if (pct < 20) timerFill.className = 'fill danger';
      else if (pct < 45) timerFill.className = 'fill warn';
      else timerFill.className = 'fill';

      if (elapsed >= state.timeLimit) {
        // Time's up = wrong
        handleAnswer(null);
        return;
      }
      state.timerRAF = requestAnimationFrame(tick);
    }
    tick();
  }

  function stopTimer() {
    if (state.timerRAF) { cancelAnimationFrame(state.timerRAF); state.timerRAF = null; }
  }

  function handleAnswer(userSaidFact) {
    if (state.answered) return;
    state.answered = true;
    stopTimer();
    btnFact.disabled = true;
    btnFiction.disabled = true;

    const q = state.questions[state.qIdx];
    const timedOut = userSaidFact === null;
    const isCorrect = !timedOut && ((userSaidFact && q.answer) || (!userSaidFact && !q.answer));

    state.total++;

    if (isCorrect) {
      state.correct++;
      state.streak++;
      if (state.streak > state.bestStreak) state.bestStreak = state.streak;
      const elapsed = state.timeLimit > 0 ? (performance.now() - state.timerStart) / 1000 : 0;
      const timeBonus = state.timeLimit > 0 ? Math.max(0, Math.floor((state.timeLimit - elapsed) * 5)) : 0;
      const streakBonus = Math.min(state.streak * 3, 30);
      state.score += 100 + timeBonus + streakBonus;

      resultEl.innerHTML = `
        <div class="verdict correct">Correct!</div>
        <div class="explanation">The answer was <strong style="color:${q.answer ? 'var(--fact)' : 'var(--fiction)'}">${q.answer ? 'FACT' : 'FICTION'}</strong>. ${q.explain}</div>
      `;
    } else {
      state.streak = 0;
      if (state.mode === 'endless') {
        // Endless mode: wrong = game over
        state.qIdx++;
        endGame();
        return;
      }
      resultEl.innerHTML = `
        <div class="verdict wrong">${timedOut ? "Time's up!" : 'Wrong!'}</div>
        <div class="explanation">The answer was <strong style="color:${q.answer ? 'var(--fact)' : 'var(--fiction)'}">${q.answer ? 'FACT' : 'FICTION'}</strong>. ${q.explain}</div>
      `;
    }

    updateHud();
    state.qIdx++;

    // Auto-advance after delay
    setTimeout(() => {
      if (state.qIdx < state.questions.length || state.mode === 'endless') {
        showQuestion();
      } else {
        endGame();
      }
    }, 2500);
  }

  function updateHud() {
    scoreNumEl.textContent = state.score;
    streakNumEl.textContent = state.streak;
  }

  function getGrade(pct) {
    if (pct >= 90) return { letter: 'S', cls: 's', title: 'Fact Master' };
    if (pct >= 75) return { letter: 'A', cls: 'a', title: 'Sharp Mind' };
    if (pct >= 60) return { letter: 'B', cls: 'b', title: 'Decent Detector' };
    if (pct >= 40) return { letter: 'C', cls: 'c', title: 'Gullible Gary' };
    return { letter: 'D', cls: 'd', title: 'Believed Everything' };
  }

  function endGame() {
    stopTimer();
    gameScreen.style.display = 'none';
    hudEl.style.display = 'none';
    endScreen.style.display = '';

    const pct = state.total > 0 ? Math.round((state.correct / state.total) * 100) : 0;
    const grade = getGrade(pct);

    if (state.mode === 'endless') {
      endTitleEl.textContent = 'Game Over';
    } else {
      endTitleEl.textContent = grade.title;
    }

    gradeEl.textContent = state.mode === 'endless' ? `${state.correct}` : grade.letter;
    gradeEl.className = 'grade ' + (state.mode === 'endless' ? 'green' : grade.cls);

    endStatsEl.innerHTML = `
      <div class="stat"><div class="val gold">${state.score}</div><div class="label">Score</div></div>
      <div class="stat"><div class="val">${state.correct}/${state.total}</div><div class="label">Correct</div></div>
      <div class="stat"><div class="val">${pct}%</div><div class="label">Accuracy</div></div>
      <div class="stat"><div class="val">${state.bestStreak}</div><div class="label">Best Streak</div></div>
    `;

    endMsgEl.textContent = state.mode === 'endless'
      ? `You survived ${state.correct} question${state.correct !== 1 ? 's' : ''} before getting one wrong.`
      : `${state.correct} out of ${state.total} correct.`;

    // Save to local leaderboard
    saveLB();
    renderLB();
  }

  // === LEADERBOARD (localStorage) ===
  function getLBKey() { return `fof_lb_${state.mode}`; }

  function loadLB() {
    try { return JSON.parse(localStorage.getItem(getLBKey())) || []; }
    catch { return []; }
  }

  function saveLB() {
    const name = currentUser?.email || 'anon';
    const lb = loadLB();
    lb.push({ name, score: state.score, correct: state.correct, total: state.total, date: Date.now() });
    lb.sort((a, b) => b.score - a.score);
    localStorage.setItem(getLBKey(), JSON.stringify(lb.slice(0, 20)));
  }

  function renderLB() {
    const lb = loadLB();
    const lbSection = document.getElementById('lbSection');
    const lbRows = document.getElementById('lbRows');
    if (lb.length === 0) { lbSection.style.display = 'none'; return; }
    lbSection.style.display = '';
    lbRows.innerHTML = lb.slice(0, 10).map((entry, i) => {
      const cls = i === 0 ? 'gold' : i === 1 ? 'silver' : i === 2 ? 'bronze' : '';
      const displayName = entry.name.length > 20 ? entry.name.slice(0, 17) + '...' : entry.name;
      return `<div class="lb-row ${cls}"><span class="rank">${i + 1}.</span><span class="lb-name">${displayName}</span><span class="lb-score">${entry.score}</span></div>`;
    }).join('');
  }

  // === KEYBOARD ===
  document.addEventListener('keydown', (e) => {
    if (gameScreen.style.display !== 'none' && !state.answered) {
      if (e.key === 'f' || e.key === 'F' || e.key === '1') handleAnswer(true);
      else if (e.key === 'n' || e.key === 'N' || e.key === '2') handleAnswer(false);
    }
    if (e.key === 'Enter') {
      if (startScreen.style.display !== 'none') {
        loadedCustom ? startGame(loadedCustom.questions) : startGame();
      } else if (endScreen.style.display !== 'none') {
        loadedCustom ? startGame(loadedCustom.questions) : startGame();
      }
    }
  });

  // === QUIZ CREATOR ===
  const creatorPanel = document.getElementById('creatorPanel');
  const creatorToggle = document.getElementById('creatorToggle');
  const quizTitleInput = document.getElementById('quizTitle');
  const qClaimInput = document.getElementById('qClaim');
  const qAnswerSel = document.getElementById('qAnswerSel');
  const qExplainInput = document.getElementById('qExplain');
  const qCatInput = document.getElementById('qCatInput');
  const addQBtn = document.getElementById('addQBtn');
  const qListEl = document.getElementById('qList');
  const shareBox = document.getElementById('shareBox');
  const shareUrlInput = document.getElementById('shareUrl');
  const copyBtn = document.getElementById('copyBtn');

  let customQuestions = [];

  creatorToggle.addEventListener('click', () => {
    const visible = creatorPanel.style.display !== 'none';
    creatorPanel.style.display = visible ? 'none' : '';
    creatorToggle.textContent = visible ? '+ Create Custom Quiz' : '− Hide Creator';
  });

  addQBtn.addEventListener('click', () => {
    const claim = qClaimInput.value.trim();
    if (!claim) return;
    if (customQuestions.length >= 50) return; // cap at 50

    customQuestions.push({
      claim,
      answer: qAnswerSel.value === 'true',
      category: qCatInput.value.trim() || 'custom',
      explain: qExplainInput.value.trim() || '',
    });

    qClaimInput.value = '';
    qExplainInput.value = '';
    renderQList();
    updateShareLink();
  });

  function renderQList() {
    qListEl.innerHTML = customQuestions.map((q, i) => `
      <div class="q-item">
        <span class="q-idx">${i + 1}.</span>
        <span class="q-preview">${escHtml(q.claim)}</span>
        <span class="q-answer-tag ${q.answer ? 'fact' : 'fiction'}">${q.answer ? 'fact' : 'fiction'}</span>
        <button class="q-del" data-idx="${i}">&times;</button>
      </div>
    `).join('');

    qListEl.querySelectorAll('.q-del').forEach(btn => {
      btn.addEventListener('click', () => {
        customQuestions.splice(parseInt(btn.dataset.idx), 1);
        renderQList();
        updateShareLink();
      });
    });
  }

  function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function updateShareLink() {
    if (customQuestions.length < 2) {
      shareBox.style.display = 'none';
      return;
    }
    shareBox.style.display = '';
    const data = {
      t: quizTitleInput.value.trim() || 'Custom Quiz',
      q: customQuestions.map(q => ({
        c: q.claim,
        a: q.answer ? 1 : 0,
        e: q.explain,
        k: q.category,
      })),
    };
    const json = JSON.stringify(data);
    const encoded = btoa(unescape(encodeURIComponent(json)));
    const url = window.location.origin + window.location.pathname + '?quiz=' + encoded;
    shareUrlInput.value = url;
  }

  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(shareUrlInput.value).then(() => {
      copyBtn.textContent = 'Copied!';
      setTimeout(() => copyBtn.textContent = 'Copy Link', 1500);
    });
  });

  // === LOAD CUSTOM QUIZ FROM URL ===
  let loadedCustom = null;

  function checkForCustomQuiz() {
    const params = new URLSearchParams(window.location.search);
    const quizData = params.get('quiz');
    if (!quizData) return;

    try {
      const json = decodeURIComponent(escape(atob(quizData)));
      const data = JSON.parse(json);
      if (!data.q || !Array.isArray(data.q) || data.q.length < 1) return;

      // Sanitize
      const title = String(data.t || 'Custom Quiz').slice(0, 60);
      const questions = data.q.slice(0, 50).map(q => ({
        claim: String(q.c || '').slice(0, 300),
        answer: !!q.a,
        explain: String(q.e || '').slice(0, 200),
        category: String(q.k || 'custom').slice(0, 30),
      })).filter(q => q.claim.length > 0);

      if (questions.length === 0) return;

      loadedCustom = { title, questions };

      // Show custom quiz banner on start screen
      const banner = document.createElement('div');
      banner.className = 'custom-banner';
      banner.innerHTML = `Playing custom quiz: <strong>${escHtml(title)}</strong> (${questions.length} questions)`;
      startScreen.querySelector('.screen-sub').after(banner);

      // Hide mode selector for custom quizzes — always plays all questions
      document.querySelector('.mode-row').style.display = 'none';
      creatorToggle.style.display = 'none';

    } catch (e) {
      console.warn('Invalid custom quiz data:', e);
    }
  }

  checkForCustomQuiz();

  // === EVENT LISTENERS ===
  document.getElementById('startBtn').addEventListener('click', () => {
    if (loadedCustom) {
      startGame(loadedCustom.questions);
    } else {
      startGame();
    }
  });
  document.getElementById('replayBtn').addEventListener('click', () => {
    endScreen.style.display = 'none';
    startScreen.style.display = '';
  });
  btnFact.addEventListener('click', () => handleAnswer(true));
  btnFiction.addEventListener('click', () => handleAnswer(false));
</script>
</body>
</html>
