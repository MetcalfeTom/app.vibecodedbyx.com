<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Neon Frog Climb</title>
<meta name="description" content="An anime-inspired frog stacking game. Drop neon frogs in a rainy synthwave city and balance the tower as it sways.">
<meta property="og:title" content="Neon Frog Climb">
<meta property="og:description" content="An anime-inspired frog stacking game. Drop neon frogs in a rainy synthwave city and balance the tower as it sways.">
<meta property="og:url" content="https://sloppy.live/neon-frog-climb">
<meta property="og:image" content="https://image.pollinations.ai/prompt/anime%20cyberpunk%20neon%20frogs%20stacking%20rainy%20tokyo%20synthwave%20pink%20cyan%20arcade%20vector?width=1200&height=630&nologo=true">
<meta property="og:type" content="website">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%90%B8">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Bungee+Inline&family=Press+Start+2P&family=IBM+Plex+Mono:wght@400;500&family=Cormorant+Garamond:ital,wght@1,400;1,500&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#08051c;
  --bg-2:#190a3a;
  --pink:#ff2e9c;
  --cyan:#00f0ff;
  --lime:#9aff5e;
  --violet:#b13eff;
  --gold:#ffd03e;
  --rose:#ff6a8a;
  --ink:#f4f0ff;
  --rule:rgba(255,255,255,0.14);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:'IBM Plex Mono',monospace;font-size:16px;-webkit-font-smoothing:antialiased}
html{font-size:100%}

body{
  background: linear-gradient(180deg, #1a0540 0%, #0a0420 60%, #04020e 100%);
}

.skip{position:absolute;left:-9999px;top:auto}
.skip:focus{left:1rem;top:1rem;background:var(--pink);color:var(--bg);padding:0.5rem;z-index:100}

#stage{
  position:fixed; inset:0;
  width:100%; height:100%;
  display:block;
  cursor: pointer;
  touch-action: none;
}

/* HUD */
.hud{
  position:fixed; top:0; left:0; right:0;
  z-index:5;
  pointer-events:none;
  padding: 0.85rem 1rem;
  display: grid;
  grid-template-columns: auto 1fr auto;
  gap: 1rem;
  align-items: start;
}

.hud-card{
  background: rgba(8,5,28,0.62);
  border:1px solid var(--rule);
  padding: 0.5rem 0.85rem;
  backdrop-filter: blur(6px);
  pointer-events: auto;
}
.hud-card .label{
  font-family:'IBM Plex Mono',monospace;
  font-size: 0.55rem; letter-spacing: 0.22em; text-transform: uppercase;
  color: rgba(244,240,255,0.55);
}
.hud-card .v{
  font-family:'Audiowide',sans-serif;
  font-size: 1.6rem;
  font-variant-numeric: tabular-nums;
  line-height: 1;
  margin-top: 0.25rem;
}
.hud-card .v.lime{ color: var(--lime); text-shadow: 0 0 12px rgba(154,255,94,0.6) }
.hud-card .v.pink{ color: var(--pink); text-shadow: 0 0 12px rgba(255,46,156,0.6) }
.hud-card .v.cyan{ color: var(--cyan); text-shadow: 0 0 12px rgba(0,240,255,0.6) }

.center-meter{
  text-align: center;
  pointer-events: auto;
}
.center-meter .label{
  font-family:'Press Start 2P', monospace;
  font-size: 0.55rem; letter-spacing: 0.18em; text-transform: uppercase;
  color: rgba(244,240,255,0.65);
}
.center-meter .bar{
  margin: 0.4rem auto 0;
  width: min(20rem, 60vw);
  height: 0.55rem;
  background: rgba(8,5,28,0.6);
  border:1px solid var(--rule);
  position: relative;
  overflow: hidden;
}
.center-meter .bar > i{
  position: absolute; left: 50%; top: 0; bottom: 0;
  width: 0.35rem;
  margin-left: -0.18rem;
  background: var(--lime);
  box-shadow: 0 0 12px var(--lime);
  transition: left 0.15s ease, background 0.15s ease, box-shadow 0.15s ease;
}
.center-meter .bar.warn > i{ background: var(--gold); box-shadow: 0 0 12px var(--gold) }
.center-meter .bar.danger > i{ background: var(--pink); box-shadow: 0 0 14px var(--pink) }
.center-meter .bar::before, .center-meter .bar::after{
  content:"";
  position: absolute; top: -2px; bottom: -2px;
  width: 1px;
  background: var(--rule);
}
.center-meter .bar::before{ left: 50% }

/* combo flash text */
.combo-flash{
  position: fixed;
  top: 38%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 6;
  pointer-events: none;
  font-family:'Bungee Inline', cursive;
  font-size: clamp(2.2rem, 7vw, 4.6rem);
  letter-spacing: 0.04em;
  color: #fff;
  text-shadow:
    0 0 14px var(--cyan),
    0 0 30px var(--cyan),
    4px 4px 0 var(--pink);
  opacity: 0;
}
.combo-flash.fire{ animation: comboFire 0.65s ease-out }
@keyframes comboFire{
  0%{ opacity: 0; transform: translate(-50%, -45%) scale(0.7) }
  35%{ opacity: 1; transform: translate(-50%, -50%) scale(1.1) }
  100%{ opacity: 0; transform: translate(-50%, -56%) scale(0.95) }
}

/* overlay for title + gameover */
.overlay{
  position: fixed; inset: 0;
  z-index: 20;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 1rem;
  background: radial-gradient(ellipse at center, rgba(8,5,28,0) 0%, rgba(8,5,28,0.85) 70%);
  transition: opacity 0.4s ease;
}
.overlay.gone{ opacity: 0; pointer-events: none }
.overlay h1{
  margin: 0 0 0.45rem;
  font-family:'Audiowide', sans-serif;
  font-size: clamp(2.4rem, 7vw, 5rem);
  letter-spacing: 0.04em;
  color: #fff;
  text-shadow:
    0 0 14px var(--pink),
    0 0 32px var(--pink),
    4px 4px 0 var(--violet);
}
.overlay h1 em{
  font-style: normal;
  color: var(--cyan);
  text-shadow:
    0 0 14px var(--cyan),
    0 0 32px var(--cyan),
    4px 4px 0 var(--violet);
}
.overlay .tag{
  font-family:'Cormorant Garamond', serif;
  font-style: italic;
  font-size: clamp(1rem, 2vw, 1.5rem);
  color: rgba(244,240,255,0.78);
  margin: 0 0 1.2rem;
  max-width: 36rem;
}
.overlay .keys{
  font-family:'Press Start 2P', monospace;
  font-size: 0.6rem; letter-spacing: 0.16em;
  color: rgba(244,240,255,0.55);
  display: flex; gap: 0.4rem; flex-wrap: wrap; justify-content: center;
  margin-bottom: 1.4rem;
}
.overlay .keys .k{ background: rgba(255,255,255,0.06); border:1px solid var(--rule); padding: 0.32rem 0.55rem }

.overlay .stats{
  display:flex; gap:0.6rem; flex-wrap:wrap; justify-content:center;
  margin-bottom: 1.2rem;
  font-family:'IBM Plex Mono', monospace;
  font-size: 0.7rem; letter-spacing: 0.14em; text-transform: uppercase;
  color: rgba(244,240,255,0.78);
}
.overlay .stats .pill{
  background: rgba(8,5,28,0.6);
  border: 1px solid var(--rule);
  padding: 0.4rem 0.8rem;
  display: flex; flex-direction: column; gap: 0.18rem;
}
.overlay .stats .pill .vv{
  font-family:'Audiowide', sans-serif;
  font-size: 1.4rem;
  color: var(--lime);
  text-shadow: 0 0 10px rgba(154,255,94,0.5);
}
.overlay .stats .pill .vv.cyan{ color: var(--cyan); text-shadow: 0 0 10px rgba(0,240,255,0.5) }
.overlay .stats .pill .vv.pink{ color: var(--pink); text-shadow: 0 0 10px rgba(255,46,156,0.5) }

button.primary{
  font-family:'Audiowide', sans-serif;
  font-size: 1.05rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  background: linear-gradient(180deg, var(--pink), #a01160);
  color: #fff;
  border: 1px solid var(--cyan);
  padding: 1rem 1.7rem;
  cursor: pointer;
  box-shadow:
    0 6px 0 #5a0e3a,
    0 8px 22px rgba(255,46,156,0.4),
    0 0 0 1px rgba(255,255,255,0.06) inset;
  transition: transform 0.08s ease;
}
button.primary:hover{ background: linear-gradient(180deg, #ff5dbc, var(--pink)) }
button.primary:active{ transform: translateY(2px); box-shadow: 0 4px 0 #5a0e3a }
button.primary:focus-visible{ outline: 3px solid var(--cyan); outline-offset: 3px }

@media (prefers-reduced-motion: reduce){
  .combo-flash.fire{ animation: none; opacity: 0 }
  .center-meter .bar > i{ transition: none }
}
</style>
</head>
<body>
<a href="#stage" class="skip">Skip to canvas</a>

<canvas id="stage" role="application" aria-label="Neon frog climb. Click or tap anywhere to drop the swinging frog onto the stack. Land it close to centered to keep the tower stable. The tower sways more with every off-center stack — when it tilts too far, it collapses. Press R to restart."></canvas>

<div class="hud">
  <div class="hud-card" role="status" aria-live="polite">
    <div class="label">Stack</div>
    <div class="v lime" id="heightEl">0</div>
  </div>
  <div class="center-meter">
    <div class="label" id="meterLabel">Balance</div>
    <div class="bar" id="balanceBar"><i id="balanceTick" style="left:50%"></i></div>
  </div>
  <div class="hud-card" role="status">
    <div class="label">Best</div>
    <div class="v cyan" id="bestEl">0</div>
  </div>
</div>

<div class="combo-flash" id="comboFlash"></div>

<div class="overlay" id="title">
  <h1>neon · <em>frog</em> climb</h1>
  <p class="tag">a tower of cute amphibians, raining pixels, a city that never sleeps. tap to drop the swinging frog. land it centered.</p>
  <div class="keys">
    <span class="k">CLICK / TAP drop</span>
    <span class="k">SPACE drop</span>
    <span class="k">R restart</span>
  </div>
  <button type="button" class="primary" id="startBtn">START</button>
</div>

<div class="overlay gone" id="gameover">
  <h1>tower · <em>fell</em></h1>
  <p class="tag" id="goSub">the frogs hit the wet pavement.</p>
  <div class="stats">
    <div class="pill"><span>Stack</span><span class="vv" id="goHeight">0</span></div>
    <div class="pill"><span>Best</span><span class="vv cyan" id="goBest">0</span></div>
    <div class="pill"><span>Perfects</span><span class="vv pink" id="goPerf">0</span></div>
  </div>
  <button type="button" class="primary" id="restartBtn">▶ AGAIN</button>
</div>

<script>
'use strict';

// ════════════════════════════════════════════════════════════════
//   NEON FROG CLIMB — anime stacker, rainy synthwave city
// ════════════════════════════════════════════════════════════════

const $ = (s) => document.querySelector(s);
const cvs = $('#stage');
const ctx = cvs.getContext('2d');
let W = 0, H = 0, DPR = 1;

function fit(){
  DPR = Math.min(2, window.devicePixelRatio || 1);
  W = window.innerWidth;
  H = window.innerHeight;
  cvs.width = Math.floor(W * DPR);
  cvs.height = Math.floor(H * DPR);
  cvs.style.width = W + 'px';
  cvs.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
fit();
window.addEventListener('resize', fit);

// ──────── audio ────────
let actx = null, audioOn = false;
function ac(){
  if (!actx){ try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch{ return null; } }
  if (actx.state === 'suspended') actx.resume();
  return actx;
}
function plop(pitch=400){
  if (!audioOn) return;
  const c = ac(); if (!c) return;
  const t = c.currentTime;
  const o = c.createOscillator(); o.type = 'sine';
  o.frequency.setValueAtTime(pitch, t);
  o.frequency.exponentialRampToValueAtTime(pitch * 0.5, t + 0.18);
  const g = c.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(0.12, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
  o.connect(g); g.connect(c.destination);
  o.start(t); o.stop(t + 0.24);
  // wet splash hint
  const buf = c.createBuffer(1, c.sampleRate * 0.08, c.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * (1 - i/d.length);
  const ns = c.createBufferSource(); ns.buffer = buf;
  const f = c.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 2200;
  const ng = c.createGain(); ng.gain.value = 0.04;
  ns.connect(f); f.connect(ng); ng.connect(c.destination);
  ns.start(t);
}
function perfectSfx(){
  // 3-note rising
  if (!audioOn) return;
  const c = ac(); if (!c) return;
  [880, 1108.7, 1318.5].forEach((f, i) => {
    setTimeout(() => {
      const t = c.currentTime;
      const o = c.createOscillator(); o.type = 'triangle'; o.frequency.value = f;
      const g = c.createGain();
      g.gain.setValueAtTime(0, t);
      g.gain.linearRampToValueAtTime(0.1, t + 0.005);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.18);
      o.connect(g); g.connect(c.destination);
      o.start(t); o.stop(t + 0.2);
    }, i * 60);
  });
}
function crashSfx(){
  if (!audioOn) return;
  const c = ac(); if (!c) return;
  const t = c.currentTime;
  // low boom
  const o = c.createOscillator(); o.type = 'sine';
  o.frequency.setValueAtTime(120, t);
  o.frequency.exponentialRampToValueAtTime(40, t + 0.7);
  const g = c.createGain();
  g.gain.setValueAtTime(0.2, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.8);
  o.connect(g); g.connect(c.destination);
  o.start(t); o.stop(t + 0.85);
  // crash noise
  const buf = c.createBuffer(1, c.sampleRate * 0.5, c.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/d.length, 1.5);
  const ns = c.createBufferSource(); ns.buffer = buf;
  const f = c.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 1400; f.Q.value = 1.4;
  const ng = c.createGain(); ng.gain.value = 0.1;
  ns.connect(f); f.connect(ng); ng.connect(c.destination);
  ns.start(t);
}
// gentle rain ambient — created once, played continuously while game runs
let rainNode = null;
function startRain(){
  if (rainNode) return;
  const c = ac(); if (!c) return;
  const buf = c.createBuffer(1, c.sampleRate * 2, c.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1);
  const ns = c.createBufferSource(); ns.buffer = buf; ns.loop = true;
  const f = c.createBiquadFilter(); f.type = 'highpass'; f.frequency.value = 1200; f.Q.value = 0.5;
  const f2 = c.createBiquadFilter(); f2.type = 'lowpass'; f2.frequency.value = 4500;
  const g = c.createGain(); g.gain.value = 0.025;
  ns.connect(f); f.connect(f2); f2.connect(g); g.connect(c.destination);
  ns.start();
  rainNode = { ns, g };
}

// ──────── city background ────────
const buildings = [];
function seedCity(){
  buildings.length = 0;
  // 3 parallax layers, more buildings on the back layer
  for (let layer = 0; layer < 3; layer++){
    const count = layer === 0 ? 18 : layer === 1 ? 14 : 10;
    for (let i = 0; i < count; i++){
      const x = i * (W / count) + (Math.random() - 0.5) * 60;
      const w = (W / count) * (0.7 + Math.random() * 0.5);
      const h = H * (layer === 0 ? 0.3 : layer === 1 ? 0.5 : 0.7) * (0.5 + Math.random() * 0.7);
      buildings.push({
        x, w, h, layer,
        // window grid
        winRows: Math.floor(h / 18),
        winCols: Math.max(2, Math.floor(w / 14)),
        // signage strip
        sign: layer === 1 && Math.random() < 0.45 ? pickSign() : null,
      });
    }
  }
}
function pickSign(){
  const colors = ['#ff2e9c', '#00f0ff', '#9aff5e', '#ffd03e', '#b13eff'];
  const glyphs = ['東京', 'NEON', '夜', '霓虹', 'GLOW', '街', '雨', '蛙', '電', '光'];
  return {
    color: colors[Math.floor(Math.random() * colors.length)],
    text: glyphs[Math.floor(Math.random() * glyphs.length)],
    size: 14 + Math.random() * 10,
  };
}
seedCity();
window.addEventListener('resize', seedCity);

let bgT = 0;
function drawCity(){
  // sky gradient
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#1a0540');
  sky.addColorStop(0.45, '#3a0a55');
  sky.addColorStop(0.85, '#0a0420');
  sky.addColorStop(1, '#04020e');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);
  // stars
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  for (let i = 0; i < 40; i++){
    const sx = (i * 191) % W;
    const sy = (i * 73) % (H * 0.4);
    const tw = 0.5 + Math.sin(bgT * 1.6 + i) * 0.4;
    ctx.globalAlpha = tw;
    ctx.fillRect(sx, sy, 1.2, 1.2);
  }
  ctx.globalAlpha = 1;
  // moon
  const mx = W * 0.78, my = H * 0.18;
  const mGrad = ctx.createRadialGradient(mx, my, 4, mx, my, 80);
  mGrad.addColorStop(0, 'rgba(255,210,160,0.8)');
  mGrad.addColorStop(0.3, 'rgba(255,160,200,0.18)');
  mGrad.addColorStop(1, 'rgba(255,80,140,0)');
  ctx.fillStyle = mGrad;
  ctx.fillRect(0, 0, W, H * 0.5);
  ctx.fillStyle = 'rgba(255,235,200,0.92)';
  ctx.beginPath(); ctx.arc(mx, my, 28, 0, Math.PI * 2); ctx.fill();

  // buildings, back to front
  for (const b of buildings){
    const yTop = H - H * (b.layer === 0 ? 0.25 : b.layer === 1 ? 0.4 : 0.6) - b.h * 0.2;
    const fillCol = b.layer === 0 ? '#1c0840' : b.layer === 1 ? '#2a0c5a' : '#3a1370';
    const yBase = H * 0.86;
    const drawY = yBase - b.h;
    ctx.fillStyle = fillCol;
    ctx.fillRect(b.x, drawY, b.w, b.h);
    // top accent line
    ctx.strokeStyle = b.layer === 2 ? 'rgba(0,240,255,0.18)' : 'rgba(255,46,156,0.20)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(b.x, drawY); ctx.lineTo(b.x + b.w, drawY); ctx.stroke();
    // windows
    const wRows = b.winRows;
    const wCols = b.winCols;
    const winW = b.w / wCols * 0.55;
    const winH = b.h / wRows * 0.45;
    const winSpaceX = b.w / wCols;
    const winSpaceY = b.h / wRows;
    for (let r = 0; r < wRows; r++){
      for (let c = 0; c < wCols; c++){
        const lit = ((r * 31 + c * 13 + b.x | 0) % 7) < 3;
        if (!lit) continue;
        const flicker = ((r + c + Math.floor(bgT * 0.7)) % 23) === 0 ? 0.4 : 1;
        ctx.fillStyle = `rgba(255,210,140,${0.55 * flicker})`;
        const wx = b.x + c * winSpaceX + winSpaceX * 0.22;
        const wy = drawY + r * winSpaceY + winSpaceY * 0.28;
        ctx.fillRect(wx, wy, winW, winH);
      }
    }
    // sign
    if (b.sign){
      ctx.save();
      ctx.shadowBlur = 14; ctx.shadowColor = b.sign.color;
      ctx.fillStyle = b.sign.color;
      ctx.font = `bold ${b.sign.size}px "Press Start 2P", monospace`;
      ctx.textAlign = 'left'; ctx.textBaseline = 'top';
      ctx.fillText(b.sign.text, b.x + 6, drawY + 8);
      ctx.restore();
    }
  }
  // wet pavement at the base
  const ground = ctx.createLinearGradient(0, H * 0.86, 0, H);
  ground.addColorStop(0, '#1a0840');
  ground.addColorStop(1, '#04020e');
  ctx.fillStyle = ground;
  ctx.fillRect(0, H * 0.86, W, H * 0.14);
  // pavement reflections (vertical streaks of neon)
  ctx.globalAlpha = 0.18;
  for (let i = 0; i < 16; i++){
    const px = i * (W / 16);
    ctx.fillStyle = i % 3 === 0 ? '#ff2e9c' : i % 3 === 1 ? '#00f0ff' : '#9aff5e';
    ctx.fillRect(px + 6, H * 0.86, 3, H * 0.14);
  }
  ctx.globalAlpha = 1;
  // crane at the top — anchor for the swinging frog
  const cx = W / 2;
  ctx.strokeStyle = 'rgba(244,240,255,0.5)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(cx - 80, 24); ctx.lineTo(cx + 80, 24);
  ctx.moveTo(cx - 80, 24); ctx.lineTo(cx - 100, 4);
  ctx.moveTo(cx + 80, 24); ctx.lineTo(cx + 100, 4);
  ctx.stroke();
  // little blinking light
  ctx.fillStyle = (Math.floor(bgT * 2) % 2) ? '#ff2e9c' : '#00f0ff';
  ctx.shadowBlur = 8; ctx.shadowColor = ctx.fillStyle;
  ctx.beginPath(); ctx.arc(cx, 8, 3, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
}

// ──────── rain ────────
const rainDrops = [];
const RAIN_COUNT = 80;
function seedRain(){
  rainDrops.length = 0;
  for (let i = 0; i < RAIN_COUNT; i++){
    rainDrops.push({
      x: Math.random() * W,
      y: Math.random() * H,
      vy: 700 + Math.random() * 400,
      len: 14 + Math.random() * 14,
      hue: Math.random() < 0.5 ? '#00f0ff' : '#b13eff',
    });
  }
}
seedRain();
window.addEventListener('resize', seedRain);

function tickRain(dt){
  for (const r of rainDrops){
    r.y += r.vy * dt;
    r.x += r.vy * dt * 0.12;     // slight wind shear
    if (r.y > H + 20){ r.y = -r.len; r.x = Math.random() * W; }
    if (r.x > W + 20) r.x -= W + 40;
  }
}
function drawRain(){
  for (const r of rainDrops){
    ctx.strokeStyle = r.hue;
    ctx.globalAlpha = 0.55;
    ctx.lineWidth = 1.2;
    ctx.shadowBlur = 4; ctx.shadowColor = r.hue;
    ctx.beginPath();
    ctx.moveTo(r.x, r.y);
    ctx.lineTo(r.x - 3, r.y + r.len);
    ctx.stroke();
  }
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
}

// ──────── frogs ────────
const FROG_PALETTES = [
  { body:'#9aff5e', belly:'#00f0ff', spot:'#5fa630', eye:'#fff', pupil:'#1a1a1a' },
  { body:'#ffb1d8', belly:'#fff1ad', spot:'#b13eff', eye:'#fff', pupil:'#1a1a1a' },
  { body:'#5fc6f0', belly:'#fff8e7', spot:'#1c5286', eye:'#fff', pupil:'#1a1a1a' },
  { body:'#ffd03e', belly:'#ffeaa3', spot:'#a07522', eye:'#fff', pupil:'#1a1a1a' },
  { body:'#ff5dbc', belly:'#fff', spot:'#7a1a4d', eye:'#fff', pupil:'#1a1a1a' },
];

function drawFrog(g, cx, cy, r, palette, mood='happy', squashY=1, blinkT=0){
  // r = body radius (visual scale), squashY = vertical squash (1 = natural)
  // shadow
  g.fillStyle = 'rgba(0,0,0,0.45)';
  g.beginPath(); g.ellipse(cx, cy + r * 0.85, r * 0.85, r * 0.18, 0, 0, Math.PI*2); g.fill();
  // body — fat oval
  const bodyW = r * 1.05;
  const bodyH = r * 0.95 * squashY;
  const bodyGrad = g.createRadialGradient(cx - r*0.3, cy - r*0.3, 1, cx, cy, r);
  bodyGrad.addColorStop(0, palette.body);
  bodyGrad.addColorStop(1, palette.spot);
  g.fillStyle = bodyGrad;
  g.shadowBlur = 14; g.shadowColor = palette.body;
  g.beginPath(); g.ellipse(cx, cy + r*0.05, bodyW, bodyH, 0, 0, Math.PI*2); g.fill();
  g.shadowBlur = 0;
  // belly patch (lighter)
  g.fillStyle = palette.belly;
  g.globalAlpha = 0.8;
  g.beginPath(); g.ellipse(cx, cy + r*0.32, r*0.7, r*0.4 * squashY, 0, 0, Math.PI*2); g.fill();
  g.globalAlpha = 1;
  // back spots (1-2)
  g.fillStyle = palette.spot;
  g.globalAlpha = 0.5;
  g.beginPath(); g.ellipse(cx - r*0.4, cy - r*0.05, r*0.18, r*0.14 * squashY, 0, 0, Math.PI*2); g.fill();
  g.beginPath(); g.ellipse(cx + r*0.45, cy + r*0.1, r*0.14, r*0.1 * squashY, 0, 0, Math.PI*2); g.fill();
  g.globalAlpha = 1;
  // eye stalks (cute big eyes on top of head)
  const eyeOffsetX = r * 0.5;
  const eyeY = cy - bodyH * 0.85;
  const eyeR = r * 0.35;
  // eye sclera
  g.fillStyle = palette.eye;
  g.beginPath(); g.arc(cx - eyeOffsetX, eyeY, eyeR, 0, Math.PI*2); g.fill();
  g.beginPath(); g.arc(cx + eyeOffsetX, eyeY, eyeR, 0, Math.PI*2); g.fill();
  // anime sparkle (cyan dot upper-right of each eye)
  g.fillStyle = '#00f0ff';
  g.shadowBlur = 6; g.shadowColor = '#00f0ff';
  g.beginPath(); g.arc(cx - eyeOffsetX + eyeR*0.35, eyeY - eyeR*0.4, eyeR*0.18, 0, Math.PI*2); g.fill();
  g.beginPath(); g.arc(cx + eyeOffsetX + eyeR*0.35, eyeY - eyeR*0.4, eyeR*0.18, 0, Math.PI*2); g.fill();
  g.shadowBlur = 0;
  // pupils (with blink)
  if (blinkT < 0.85){
    g.fillStyle = palette.pupil;
    g.beginPath(); g.ellipse(cx - eyeOffsetX, eyeY + eyeR*0.1, eyeR*0.45, eyeR*0.6, 0, 0, Math.PI*2); g.fill();
    g.beginPath(); g.ellipse(cx + eyeOffsetX, eyeY + eyeR*0.1, eyeR*0.45, eyeR*0.6, 0, 0, Math.PI*2); g.fill();
    // shine
    g.fillStyle = '#fff';
    g.beginPath(); g.arc(cx - eyeOffsetX + 2, eyeY + 1, eyeR*0.18, 0, Math.PI*2); g.fill();
    g.beginPath(); g.arc(cx + eyeOffsetX + 2, eyeY + 1, eyeR*0.18, 0, Math.PI*2); g.fill();
  } else {
    // blink — closed eye line
    g.strokeStyle = palette.pupil;
    g.lineWidth = 2;
    g.beginPath();
    g.moveTo(cx - eyeOffsetX - eyeR*0.6, eyeY);
    g.lineTo(cx - eyeOffsetX + eyeR*0.6, eyeY);
    g.moveTo(cx + eyeOffsetX - eyeR*0.6, eyeY);
    g.lineTo(cx + eyeOffsetX + eyeR*0.6, eyeY);
    g.stroke();
  }
  // mouth — small smile or open
  g.strokeStyle = palette.pupil;
  g.lineWidth = 1.5;
  g.beginPath();
  if (mood === 'wow'){
    g.arc(cx, cy + r*0.1, r*0.18, 0, Math.PI*2);
  } else {
    g.arc(cx, cy + r*0.05, r*0.32, 0.18 * Math.PI, 0.82 * Math.PI);
  }
  g.stroke();
  // cheek blushes (anime)
  g.fillStyle = 'rgba(255,90,140,0.35)';
  g.beginPath(); g.ellipse(cx - r*0.55, cy + r*0.15, r*0.13, r*0.07, 0, 0, Math.PI*2); g.fill();
  g.beginPath(); g.ellipse(cx + r*0.55, cy + r*0.15, r*0.13, r*0.07, 0, 0, Math.PI*2); g.fill();
}

// ──────── game state ────────
const game = {
  phase: 'title',     // 'title' | 'swinging' | 'falling' | 'settle' | 'collapse' | 'gameover'
  height: 0,
  best: 0,
  perfects: 0,
  combo: 0,
};
try { game.best = +localStorage.getItem('neon-frog-climb-best') || 0; } catch{}

// stack of frogs from the ground up
// each frog: { x: world x relative to base, r, palette, mood, squashY, blinkT }
const stack = [];
const swingFrog = {
  x: 0, y: 60,
  r: 30,
  swingPhase: 0,
  swingFreq: 1.6,                // half-cycles per second
  swingAmp: 200,                 // pixels
  palette: FROG_PALETTES[0],
  mood: 'happy',
  squashY: 1,
  blinkT: 0,
  alive: false,
};
const fallingFrog = {
  x: 0, y: 0,
  vx: 0, vy: 0,
  r: 30,
  rot: 0, rotV: 0,
  palette: FROG_PALETTES[0],
  alive: false,
  squashY: 1,
};

const wobble = { angle: 0, vAngle: 0, totalOffset: 0 };

// physics constants
const GRAV = 1700;
const STACK_BASE_Y = () => H * 0.84;          // top of pavement
const FROG_GAP = 6;                            // visual gap between stacked frogs
const COLLAPSE_OFFSET = 90;                    // total cumulative offset before tower topples
const COMBO_PERFECT = 16;                      // perfect-tolerance px

// ──────── game flow ────────
function newSwingFrog(){
  const palette = FROG_PALETTES[Math.floor(Math.random() * FROG_PALETTES.length)];
  swingFrog.palette = palette;
  swingFrog.r = 28 + Math.random() * 6;
  swingFrog.swingPhase = 0;
  swingFrog.swingFreq = 1.4 + Math.min(1.8, game.height * 0.055);   // gets faster over time
  swingFrog.swingAmp = Math.min(260, 180 + game.height * 4);         // wider as you climb
  swingFrog.mood = 'happy';
  swingFrog.squashY = 1;
  swingFrog.alive = true;
  game.phase = 'swinging';
}

function dropFrog(){
  if (game.phase !== 'swinging' || !swingFrog.alive) return;
  // freeze swing position into a falling frog
  fallingFrog.x = swingFrog.x;
  fallingFrog.y = swingFrog.y;
  fallingFrog.vx = 0;
  fallingFrog.vy = 0;
  fallingFrog.rot = 0;
  fallingFrog.rotV = (Math.random() - 0.5) * 0.6;
  fallingFrog.r = swingFrog.r;
  fallingFrog.palette = swingFrog.palette;
  fallingFrog.alive = true;
  swingFrog.alive = false;
  game.phase = 'falling';
}

function settleFrog(landY){
  // compute offset from previous-top frog
  const prevX = stack.length ? stack[stack.length - 1].x : 0;
  const offset = fallingFrog.x - prevX;
  const absOff = Math.abs(offset);
  const isPerfect = absOff < COMBO_PERFECT;
  if (isPerfect){
    game.perfects++;
    game.combo++;
    perfectSfx();
    flashCombo(game.combo > 1 ? `PERFECT × ${game.combo}` : 'PERFECT');
  } else {
    game.combo = 0;
    plop(380 + Math.random() * 80);
  }
  // accumulate wobble: total offset from base
  wobble.totalOffset += offset * 0.6;     // some forgiveness
  // small kick to wobble velocity from a hard landing
  wobble.vAngle += offset * 0.0009;
  // push frog onto stack
  stack.push({
    x: fallingFrog.x,
    r: fallingFrog.r,
    palette: fallingFrog.palette,
    mood: isPerfect ? 'wow' : 'happy',
    squashY: 0.7,
    blinkT: Math.random() * 6,
    perfect: isPerfect,
    landingFlash: 0.25,
  });
  game.height = stack.length;
  if (game.height > game.best){
    game.best = game.height;
    try { localStorage.setItem('neon-frog-climb-best', String(game.best)); } catch{}
  }
  fallingFrog.alive = false;
  // splash particles at landing
  spawnSplash(fallingFrog.x, landY, isPerfect);
  // collapse check
  if (Math.abs(wobble.totalOffset) > COLLAPSE_OFFSET){
    triggerCollapse();
    return;
  }
  game.phase = 'settle';
  setTimeout(() => {
    if (game.phase === 'settle'){
      newSwingFrog();
    }
  }, 240);
}

function triggerCollapse(){
  game.phase = 'collapse';
  crashSfx();
  // give wobble a hefty kick
  wobble.vAngle = Math.sign(wobble.totalOffset) * 0.014;
  // each frog gets converted into a falling debris piece
  setTimeout(showGameOver, 1400);
}
function showGameOver(){
  game.phase = 'gameover';
  $('#goHeight').textContent = game.height;
  $('#goBest').textContent = game.best;
  $('#goPerf').textContent = game.perfects;
  $('#goSub').textContent = game.height > 14
    ? 'a tall, brave amphibian column.'
    : game.height > 6
    ? 'the frogs hit the wet pavement.'
    : 'the city eats first-time stackers.';
  $('#gameover').classList.remove('gone');
}

// landing splash particles
const particles = [];
function spawnSplash(x, y, isPerfect){
  const n = isPerfect ? 22 : 12;
  const baseColor = isPerfect ? '#9aff5e' : '#00f0ff';
  for (let i = 0; i < n; i++){
    const a = (-Math.PI/2) + (Math.random() - 0.5) * Math.PI;
    const v = 80 + Math.random() * 220;
    particles.push({
      x, y, vx: Math.cos(a) * v, vy: Math.sin(a) * v,
      life: 0.6 + Math.random() * 0.3,
      color: isPerfect && Math.random() < 0.5 ? '#fff' : baseColor,
      size: 2 + Math.random() * 2,
    });
  }
}
function tickParticles(dt){
  for (let i = particles.length - 1; i >= 0; i--){
    const p = particles[i];
    p.life -= dt;
    if (p.life <= 0){ particles.splice(i, 1); continue; }
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 700 * dt;
    p.vx *= Math.pow(0.95, dt * 60);
  }
}
function drawParticles(){
  for (const p of particles){
    ctx.globalAlpha = Math.max(0, Math.min(1, p.life * 1.5));
    ctx.fillStyle = p.color;
    ctx.shadowBlur = 6; ctx.shadowColor = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
  }
  ctx.shadowBlur = 0;
  ctx.globalAlpha = 1;
}

// combo flash
function flashCombo(text){
  const el = $('#comboFlash');
  el.textContent = text;
  el.classList.remove('fire');
  void el.offsetWidth;
  el.classList.add('fire');
}

// ──────── tick ────────
let last = performance.now();
function tick(now){
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  bgT += dt;

  // swing frog
  if (game.phase === 'swinging'){
    swingFrog.swingPhase += swingFrog.swingFreq * dt;
    swingFrog.x = W / 2 + Math.sin(swingFrog.swingPhase) * swingFrog.swingAmp;
    swingFrog.y = 70 + Math.cos(swingFrog.swingPhase * 2) * 6;
    swingFrog.blinkT = (swingFrog.blinkT + dt) % 6;
    // pendulum line/rope visual happens in render
  }
  // falling frog
  if (game.phase === 'falling' && fallingFrog.alive){
    fallingFrog.vy += GRAV * dt;
    fallingFrog.y += fallingFrog.vy * dt;
    fallingFrog.rot += fallingFrog.rotV * dt;
    // landing position: stack top y
    const topY = stackTopY();
    if (fallingFrog.y + fallingFrog.r >= topY){
      fallingFrog.y = topY - fallingFrog.r;
      settleFrog(topY);
    }
  }
  // settling animation: squash relax
  for (const f of stack){
    if (f.squashY < 1){
      f.squashY = Math.min(1, f.squashY + dt * 4);
    }
    if (f.landingFlash > 0) f.landingFlash -= dt;
    f.blinkT += dt;
  }
  // wobble physics (spring): restore toward 0, damped
  if (game.phase !== 'collapse'){
    const target = wobble.totalOffset * 0.0015;     // visualization of cumulative offset
    const diff = target - wobble.angle;
    wobble.vAngle += diff * 8 * dt;
    wobble.vAngle *= Math.pow(0.92, dt * 60);
    wobble.angle += wobble.vAngle * dt;
  } else {
    // free-fall collapse: angle accelerates
    wobble.vAngle += Math.sign(wobble.totalOffset || 1) * 4 * dt;
    wobble.angle += wobble.vAngle * dt;
  }
  // particles
  tickParticles(dt);
  // rain
  tickRain(dt);

  render();
  updateHud();
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

function stackTopY(){
  let y = STACK_BASE_Y();
  for (const f of stack){ y -= f.r * 1.7 + FROG_GAP; }
  return y;
}

// ──────── render ────────
function render(){
  drawCity();
  drawRain();

  // tower draws — translate around base, rotate by wobble.angle
  ctx.save();
  const baseX = W / 2, baseY = STACK_BASE_Y();
  ctx.translate(baseX, baseY);
  ctx.rotate(wobble.angle);
  ctx.translate(-baseX, -baseY);
  // pedestal
  ctx.fillStyle = 'rgba(40,15,80,0.85)';
  ctx.fillRect(baseX - 90, baseY - 4, 180, 18);
  ctx.fillStyle = 'rgba(255,46,156,0.4)';
  ctx.fillRect(baseX - 90, baseY - 4, 180, 2);
  // stacked frogs from bottom up
  let y = baseY;
  for (let i = 0; i < stack.length; i++){
    const f = stack[i];
    y -= f.r * 0.85 * f.squashY + (i === 0 ? 0 : FROG_GAP);
    drawFrog(ctx, baseX + f.x, y, f.r, f.palette, f.mood, f.squashY, f.blinkT % 6);
    if (f.landingFlash > 0){
      ctx.strokeStyle = f.perfect ? '#9aff5e' : '#00f0ff';
      ctx.globalAlpha = f.landingFlash * 4;
      ctx.lineWidth = 2;
      ctx.shadowBlur = 12; ctx.shadowColor = ctx.strokeStyle;
      ctx.beginPath(); ctx.ellipse(baseX + f.x, y, f.r * 1.1, f.r * 0.6, 0, 0, Math.PI*2); ctx.stroke();
      ctx.shadowBlur = 0; ctx.globalAlpha = 1;
    }
    y -= f.r * 0.85 * f.squashY;
  }
  ctx.restore();

  // swinging frog — drawn outside the tilted stack so it doesn't tilt
  if (game.phase === 'swinging' && swingFrog.alive){
    // rope
    ctx.strokeStyle = 'rgba(244,240,255,0.35)';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(W / 2, 24);
    ctx.lineTo(swingFrog.x, swingFrog.y);
    ctx.stroke();
    drawFrog(ctx, swingFrog.x, swingFrog.y, swingFrog.r, swingFrog.palette, swingFrog.mood, 1, swingFrog.blinkT % 6);
  }
  // falling frog
  if (game.phase === 'falling' && fallingFrog.alive){
    ctx.save();
    ctx.translate(fallingFrog.x, fallingFrog.y);
    ctx.rotate(fallingFrog.rot);
    drawFrog(ctx, 0, 0, fallingFrog.r, fallingFrog.palette, 'wow', 1, 0);
    ctx.restore();
  }
  // particles
  drawParticles();
}

// ──────── HUD ────────
function updateHud(){
  $('#heightEl').textContent = String(game.height);
  $('#bestEl').textContent = String(game.best);
  // balance bar
  const t = Math.max(-1, Math.min(1, wobble.totalOffset / COLLAPSE_OFFSET));
  const left = (50 + t * 50);
  const tick = $('#balanceTick');
  tick.style.left = left.toFixed(1) + '%';
  const bar = $('#balanceBar');
  bar.classList.toggle('warn', Math.abs(t) > 0.5 && Math.abs(t) <= 0.8);
  bar.classList.toggle('danger', Math.abs(t) > 0.8);
  $('#meterLabel').textContent = Math.abs(t) > 0.8 ? 'TIPPING' : Math.abs(t) > 0.5 ? 'unsteady' : 'balance';
}

// ──────── input ────────
function inputDrop(){
  if (game.phase === 'swinging'){
    if (!audioOn){ audioOn = true; ac(); startRain(); }
    dropFrog();
  } else if (game.phase === 'gameover'){
    startGame();
  } else if (game.phase === 'title'){
    startGame();
  }
}
window.addEventListener('keydown', (e) => {
  if (e.code === 'Space'){ e.preventDefault(); inputDrop(); }
  else if (e.key === 'r' || e.key === 'R'){
    if (game.phase !== 'title') startGame();
  }
});
cvs.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  inputDrop();
});

function startGame(){
  $('#title').classList.add('gone');
  $('#gameover').classList.add('gone');
  if (!audioOn){ audioOn = true; ac(); startRain(); }
  stack.length = 0;
  particles.length = 0;
  game.height = 0;
  game.combo = 0;
  game.perfects = 0;
  wobble.angle = 0; wobble.vAngle = 0; wobble.totalOffset = 0;
  // seed first frog already placed at the base for visual continuity
  stack.push({
    x: 0, r: 32, palette: FROG_PALETTES[0],
    mood: 'happy', squashY: 1, blinkT: 0, perfect: false, landingFlash: 0,
  });
  game.height = 1;
  newSwingFrog();
}
$('#startBtn').addEventListener('click', startGame);
$('#restartBtn').addEventListener('click', startGame);
</script>
</body>
</html>
