<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gilded Relic — Dungeon Crawler</title>
<link rel="icon" href="https://emojicdn.elk.sh/⚔️">
<meta property="og:title" content="Gilded Relic">
<meta property="og:description" content="Crawl procedural pixel dungeons. Slay monsters. Hoard retro loot.">
<meta property="og:url" content="https://sloppy.live/gilded-relic">
<meta property="og:image" content="https://sloppy.live/gilded-relic/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Press+Start+2P&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0a0808;--panel:#151210;--border:#2a2420;
  --gold:#d4a840;--red:#c04040;--blue:#4080c0;--green:#40a050;
  --text:#887766;--bright:#ccbbaa;--dim:#443830;
}
body{background:var(--bg);color:var(--text);font-family:'Silkscreen',cursive;min-height:100vh;
  display:flex;flex-direction:column;align-items:center;overflow:hidden;user-select:none}
canvas{display:block;image-rendering:pixelated;border:2px solid var(--border);border-radius:4px;
  margin-top:8px;cursor:crosshair;touch-action:none}
#hud{display:flex;gap:16px;padding:8px 12px;font-size:11px;color:var(--text);flex-wrap:wrap;justify-content:center}
.hud-item{display:flex;align-items:center;gap:4px}
.hud-item .icon{font-size:14px}
.hud-item .val{color:var(--bright);font-weight:700}
#log{width:100%;max-width:480px;height:48px;overflow:hidden;padding:4px 8px;font-size:9px;
  color:var(--dim);line-height:1.6;text-align:center}
#log .loot{color:var(--gold)}
#log .dmg{color:var(--red)}
#log .heal{color:var(--green)}
#log .info{color:var(--blue)}
#controls{display:flex;gap:6px;padding:4px;flex-wrap:wrap;justify-content:center}
#controls button{background:var(--panel);border:1px solid var(--border);color:var(--text);
  padding:6px 10px;font-family:'Silkscreen',cursive;font-size:10px;cursor:pointer;border-radius:3px;
  min-width:36px;transition:all .15s}
#controls button:hover,#controls button:active{background:var(--border);color:var(--bright)}
#overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(10,8,8,.94);
  display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20}
#overlay.hidden{display:none}
#overlay h1{font-family:'Press Start 2P',cursive;font-size:clamp(20px,4vw,32px);color:var(--gold);
  margin-bottom:8px;text-shadow:2px 2px 0 #2a1800}
#overlay .sub{font-size:11px;color:var(--dim);margin-bottom:20px}
#overlay .stats{font-size:10px;color:var(--text);line-height:2;margin-bottom:16px;text-align:center}
#overlay .stats span{color:var(--gold)}
#playBtn{background:transparent;border:2px solid var(--gold);color:var(--gold);
  font-family:'Press Start 2P',cursive;font-size:12px;padding:12px 32px;cursor:pointer;
  border-radius:4px;transition:all .2s}
#playBtn:hover{background:var(--gold);color:var(--bg)}
.inv-bar{display:flex;gap:4px;padding:4px 8px;flex-wrap:wrap;justify-content:center;max-width:480px}
.inv-slot{width:28px;height:28px;background:var(--panel);border:1px solid var(--border);border-radius:2px;
  display:flex;align-items:center;justify-content:center;font-size:14px;position:relative}
.inv-slot.equipped{border-color:var(--gold);box-shadow:0 0 4px rgba(212,168,64,.3)}
.inv-slot .tier{position:absolute;bottom:0;right:1px;font-size:6px;color:var(--gold)}
.back-link{padding:6px;text-align:center}
.back-link a{color:var(--dim);font-size:9px;text-decoration:none}
.back-link a:hover{color:var(--gold)}
@media(max-width:500px){
  canvas{max-width:95vw;max-height:55vh}
  #hud{font-size:9px;gap:10px}
}
</style>
</head>
<body>
<div id="hud">
  <div class="hud-item"><span class="icon">❤️</span><span class="val" id="hpVal">20/20</span></div>
  <div class="hud-item"><span class="icon">⚔️</span><span class="val" id="atkVal">3</span></div>
  <div class="hud-item"><span class="icon">🛡️</span><span class="val" id="defVal">1</span></div>
  <div class="hud-item"><span class="icon">🪙</span><span class="val" id="goldVal">0</span></div>
  <div class="hud-item"><span class="icon">🏛️</span><span class="val" id="floorVal">1</span></div>
</div>
<canvas id="game" width="480" height="320"></canvas>
<div id="log"></div>
<div class="inv-bar" id="invBar"></div>
<div id="controls">
  <button id="btnNW">↖</button><button id="btnN">↑</button><button id="btnNE">↗</button>
  <button id="btnW">←</button><button id="btnWait">·</button><button id="btnE">→</button>
  <button id="btnSW">↙</button><button id="btnS">↓</button><button id="btnSE">↘</button>
</div>
<div id="overlay">
  <h1>GILDED RELIC</h1>
  <div class="sub">procedural dungeons — retro loot — pixel crawling</div>
  <div class="stats" id="finalStats"></div>
  <button id="playBtn">DESCEND</button>
</div>
<div class="back-link"><a href="https://sloppy.live">← sloppy.live</a></div>
<script>
const C = document.getElementById('game');
const ctx = C.getContext('2d');
const T = 16; // tile size in pixels
const MW = 30, MH = 20; // map grid
const overlay = document.getElementById('overlay');
const logEl = document.getElementById('log');

// Seeded RNG
let rngSeed = Date.now();
function rng(){ rngSeed ^= rngSeed<<13; rngSeed ^= rngSeed>>17; rngSeed ^= rngSeed<<5; return (rngSeed>>>0)/4294967296; }
function rngInt(a,b){ return a + Math.floor(rng()*(b-a+1)); }
function pick(arr){ return arr[Math.floor(rng()*arr.length)]; }

// Tiles
const WALL=0, FLOOR=1, DOOR=2, STAIRS=3, CHEST=4, TRAP=5;

// Colors per tile
const TILE_COLORS = {
  [WALL]: ['#1a1510','#1e1812','#16120e'],
  [FLOOR]: ['#2a2420','#282220','#2c2622'],
  [DOOR]: ['#4a3a20','#5a4830'],
  [STAIRS]: ['#3a3060','#4a4080'],
  [CHEST]: ['#8a6a20','#a08030'],
  [TRAP]: ['#2a2420','#2c2622'],
};

// Loot tables
const LOOT_TIERS = ['Common','Uncommon','Rare','Epic','Legendary'];
const TIER_COLORS = ['#888','#4a8','#48f','#a4f','#fa0'];
const WEAPONS = [
  {name:'Rusty Dagger',atk:1,icon:'🗡️'},
  {name:'Short Sword',atk:2,icon:'⚔️'},
  {name:'Battle Axe',atk:3,icon:'🪓'},
  {name:'War Hammer',atk:4,icon:'🔨'},
  {name:'Flame Blade',atk:5,icon:'🔥'},
  {name:'Frost Glaive',atk:6,icon:'❄️'},
  {name:'Thunder Spear',atk:7,icon:'⚡'},
  {name:'Void Scythe',atk:8,icon:'🌀'},
  {name:'Dragon Fang',atk:10,icon:'🐉'},
  {name:'Gilded Relic',atk:15,icon:'👑'},
];
const ARMOR = [
  {name:'Leather Vest',def:1,icon:'🧥'},
  {name:'Chain Mail',def:2,icon:'⛓️'},
  {name:'Iron Plate',def:3,icon:'🛡️'},
  {name:'Mithril Coat',def:4,icon:'💎'},
  {name:'Dragon Scale',def:6,icon:'🐲'},
];
const POTIONS = [
  {name:'Health Potion',heal:8,icon:'🧪'},
  {name:'Greater Potion',heal:15,icon:'🧪'},
  {name:'Elixir',heal:30,icon:'✨'},
];
const SCROLLS = [
  {name:'Scroll of Fire',dmg:10,icon:'📜'},
  {name:'Scroll of Ice',dmg:8,icon:'📜'},
  {name:'Scroll of Light',reveal:true,icon:'📜'},
];
const GOLD_DROPS = [5,10,15,25,50];

// Monsters
const MONSTER_TYPES = [
  {name:'Rat',hp:4,atk:1,def:0,icon:'🐀',xp:2,color:'#8a7a6a'},
  {name:'Bat',hp:5,atk:2,def:0,icon:'🦇',xp:3,color:'#6a5a7a'},
  {name:'Slime',hp:8,atk:2,def:1,icon:'🟢',xp:4,color:'#3a8a3a'},
  {name:'Skeleton',hp:10,atk:3,def:1,icon:'💀',xp:6,color:'#aaa'},
  {name:'Goblin',hp:12,atk:4,def:2,icon:'👺',xp:8,color:'#5a8a3a'},
  {name:'Orc',hp:18,atk:5,def:3,icon:'👹',xp:12,color:'#4a6a2a'},
  {name:'Wraith',hp:15,atk:6,def:2,icon:'👻',xp:15,color:'#6a6a9a'},
  {name:'Demon',hp:25,atk:8,def:4,icon:'😈',xp:20,color:'#aa3a3a'},
  {name:'Dragon',hp:40,atk:10,def:6,icon:'🐉',xp:35,color:'#aa6a2a'},
];

// Game state
let map, rooms, player, monsters, items, fog, floor, gameOver;
let logs = [];
let inventory = [];
let equipped = {weapon:null, armor:null};
let totalGold = 0, totalKills = 0, totalFloors = 0;

function log(msg, cls='info'){
  logs.unshift({msg,cls});
  if(logs.length > 3) logs.pop();
  logEl.innerHTML = logs.map(l=>`<span class="${l.cls}">${l.msg}</span>`).join(' · ');
}

// Dungeon generation
function generateDungeon(){
  map = Array.from({length:MH}, ()=> new Array(MW).fill(WALL));
  fog = Array.from({length:MH}, ()=> new Array(MW).fill(true));
  rooms = [];
  monsters = [];
  items = [];

  // Place rooms
  const numRooms = rngInt(5, 9);
  for(let attempt=0; attempt < 100 && rooms.length < numRooms; attempt++){
    const w = rngInt(4, 8);
    const h = rngInt(3, 6);
    const x = rngInt(1, MW - w - 1);
    const y = rngInt(1, MH - h - 1);
    // Check overlap
    let overlap = false;
    for(const r of rooms){
      if(x <= r.x+r.w+1 && x+w >= r.x-1 && y <= r.y+r.h+1 && y+h >= r.y-1){
        overlap = true; break;
      }
    }
    if(overlap) continue;
    rooms.push({x,y,w,h});
    for(let ry=y;ry<y+h;ry++) for(let rx=x;rx<x+w;rx++) map[ry][rx] = FLOOR;
  }

  // Connect rooms with corridors
  for(let i=1;i<rooms.length;i++){
    const a = rooms[i-1], b = rooms[i];
    const ax = Math.floor(a.x + a.w/2), ay = Math.floor(a.y + a.h/2);
    const bx = Math.floor(b.x + b.w/2), by = Math.floor(b.y + b.h/2);
    let cx = ax, cy = ay;
    while(cx !== bx){
      if(map[cy]) map[cy][cx] = FLOOR;
      cx += cx < bx ? 1 : -1;
    }
    while(cy !== by){
      if(map[cy]) map[cy][cx] = FLOOR;
      cy += cy < by ? 1 : -1;
    }
  }

  // Place doors at corridor-to-room transitions
  // A door belongs on a FLOOR tile that is: (a) inside a room, (b) on the room's
  // perimeter edge, (c) has a corridor tile on the outside, and (d) is a "narrow"
  // passage (walls on both perpendicular sides) to avoid door-only walls.
  function isInRoom(x,y,r){ return x>=r.x && x<r.x+r.w && y>=r.y && y<r.y+r.h; }
  function tileAt(x,y){ return (x>=0&&x<MW&&y>=0&&y<MH) ? map[y][x] : WALL; }
  const doorPlaced = new Set();
  rooms.forEach(r => {
    // Check each edge tile of the room
    // Top edge (y = r.y): corridor would be at y-1
    for(let rx=r.x; rx<r.x+r.w; rx++){
      if(r.y > 0 && tileAt(rx, r.y-1)===FLOOR && !rooms.some(o=>o!==r&&isInRoom(rx,r.y-1,o))){
        // Corridor above — check narrowness: walls on left+right of the outside tile
        const wallL = tileAt(rx-1, r.y-1)===WALL || rx-1 < r.x;
        const wallR = tileAt(rx+1, r.y-1)===WALL || rx+1 >= r.x+r.w;
        if(wallL || wallR){
          const key = rx+','+r.y;
          if(!doorPlaced.has(key)){ map[r.y][rx] = DOOR; doorPlaced.add(key); }
        }
      }
    }
    // Bottom edge (y = r.y+r.h-1): corridor at y+r.h
    for(let rx=r.x; rx<r.x+r.w; rx++){
      const by = r.y+r.h-1;
      if(by+1 < MH && tileAt(rx, by+1)===FLOOR && !rooms.some(o=>o!==r&&isInRoom(rx,by+1,o))){
        const wallL = tileAt(rx-1, by+1)===WALL || rx-1 < r.x;
        const wallR = tileAt(rx+1, by+1)===WALL || rx+1 >= r.x+r.w;
        if(wallL || wallR){
          const key = rx+','+by;
          if(!doorPlaced.has(key)){ map[by][rx] = DOOR; doorPlaced.add(key); }
        }
      }
    }
    // Left edge (x = r.x): corridor at x-1
    for(let ry=r.y; ry<r.y+r.h; ry++){
      if(r.x > 0 && tileAt(r.x-1, ry)===FLOOR && !rooms.some(o=>o!==r&&isInRoom(r.x-1,ry,o))){
        const wallU = tileAt(r.x-1, ry-1)===WALL || ry-1 < r.y;
        const wallD = tileAt(r.x-1, ry+1)===WALL || ry+1 >= r.y+r.h;
        if(wallU || wallD){
          const key = r.x+','+ry;
          if(!doorPlaced.has(key)){ map[ry][r.x] = DOOR; doorPlaced.add(key); }
        }
      }
    }
    // Right edge (x = r.x+r.w-1): corridor at x+r.w
    for(let ry=r.y; ry<r.y+r.h; ry++){
      const bx = r.x+r.w-1;
      if(bx+1 < MW && tileAt(bx+1, ry)===FLOOR && !rooms.some(o=>o!==r&&isInRoom(bx+1,ry,o))){
        const wallU = tileAt(bx+1, ry-1)===WALL || ry-1 < r.y;
        const wallD = tileAt(bx+1, ry+1)===WALL || ry+1 >= r.y+r.h;
        if(wallU || wallD){
          const key = bx+','+ry;
          if(!doorPlaced.has(key)){ map[ry][bx] = DOOR; doorPlaced.add(key); }
        }
      }
    }
  });

  // Stairs in last room
  const lastRoom = rooms[rooms.length-1];
  const sx = rngInt(lastRoom.x+1, lastRoom.x+lastRoom.w-2);
  const sy = rngInt(lastRoom.y+1, lastRoom.y+lastRoom.h-2);
  map[sy][sx] = STAIRS;

  // Chests
  for(let i=1;i<rooms.length-1;i++){
    if(rng() < 0.5){
      const r = rooms[i];
      const cx = rngInt(r.x, r.x+r.w-1);
      const cy = rngInt(r.y, r.y+r.h-1);
      if(map[cy][cx] === FLOOR) map[cy][cx] = CHEST;
    }
  }

  // Traps
  for(let i=1;i<rooms.length;i++){
    if(rng() < 0.35){
      const r = rooms[i];
      const tx = rngInt(r.x, r.x+r.w-1);
      const ty = rngInt(r.y, r.y+r.h-1);
      if(map[ty][tx] === FLOOR) map[ty][tx] = TRAP;
    }
  }

  // Spawn monsters
  const monsterBudget = 3 + floor * 2;
  for(let i=0;i<monsterBudget && i < 15;i++){
    const rIdx = rngInt(1, rooms.length-1);
    const r = rooms[rIdx];
    const mx = rngInt(r.x, r.x+r.w-1);
    const my = rngInt(r.y, r.y+r.h-1);
    if(map[my][mx] !== FLOOR) continue;
    // Pick monster scaled to floor
    const maxTier = Math.min(MONSTER_TYPES.length-1, Math.floor(floor/2) + 2);
    const template = MONSTER_TYPES[rngInt(0, maxTier)];
    const scale = 1 + (floor-1)*0.15;
    monsters.push({
      ...template,
      hp: Math.ceil(template.hp * scale),
      maxHp: Math.ceil(template.hp * scale),
      atk: Math.ceil(template.atk * scale),
      def: Math.floor(template.def * scale),
      x: mx, y: my,
    });
  }

  // Scatter items on floor
  rooms.forEach((r,i) => {
    if(i===0 || rng()>0.4) return;
    const ix = rngInt(r.x, r.x+r.w-1);
    const iy = rngInt(r.y, r.y+r.h-1);
    if(map[iy][ix] !== FLOOR) return;
    items.push({...generateLoot(), x:ix, y:iy});
  });
}

function generateLoot(){
  const roll = rng();
  const tierRoll = rng();
  let tier = 0;
  if(tierRoll > 0.95) tier = 4;
  else if(tierRoll > 0.82) tier = 3;
  else if(tierRoll > 0.6) tier = 2;
  else if(tierRoll > 0.3) tier = 1;
  const tierBonus = tier * 0.3;

  if(roll < 0.3){
    // Weapon
    const idx = Math.min(WEAPONS.length-1, Math.floor((floor/3 + tierBonus + rng()*2)));
    const w = {...WEAPONS[idx], type:'weapon', tier};
    w.atk = Math.ceil(w.atk * (1 + tier*0.25));
    return w;
  } else if(roll < 0.5){
    // Armor
    const idx = Math.min(ARMOR.length-1, Math.floor((floor/4 + tierBonus + rng())));
    const a = {...ARMOR[idx], type:'armor', tier};
    a.def = Math.ceil(a.def * (1 + tier*0.2));
    return a;
  } else if(roll < 0.7){
    // Potion
    const idx = Math.min(POTIONS.length-1, Math.floor(rng()*POTIONS.length));
    return {...POTIONS[idx], type:'potion', tier:0};
  } else if(roll < 0.85){
    // Scroll
    return {...pick(SCROLLS), type:'scroll', tier:0};
  } else {
    // Gold
    const amount = pick(GOLD_DROPS) + floor * 5;
    return {name:`${amount} Gold`, icon:'🪙', type:'gold', amount, tier:0};
  }
}

function revealFog(px, py, radius){
  for(let dy=-radius;dy<=radius;dy++) for(let dx=-radius;dx<=radius;dx++){
    const nx=px+dx, ny=py+dy;
    if(nx>=0&&nx<MW&&ny>=0&&ny<MH && dx*dx+dy*dy<=radius*radius+1){
      fog[ny][nx] = false;
    }
  }
}

// Drawing
function drawTile(x, y, tile, fogged){
  const px = x*T, py = y*T;
  if(fogged){
    ctx.fillStyle = '#0a0808';
    ctx.fillRect(px, py, T, T);
    return;
  }
  const colors = TILE_COLORS[tile] || TILE_COLORS[FLOOR];
  ctx.fillStyle = colors[(x+y*3)%colors.length];
  ctx.fillRect(px, py, T, T);

  if(tile === WALL){
    // Brick pattern
    ctx.fillStyle = '#12100c';
    if(y%2===0){ ctx.fillRect(px+7,py,2,T); ctx.fillRect(px,py+7,T,2); }
    else { ctx.fillRect(px+3,py,2,T); ctx.fillRect(px,py+7,T,2); }
  } else if(tile === DOOR){
    ctx.fillStyle = '#6a5a30';
    ctx.fillRect(px+3, py+2, T-6, T-4);
    ctx.fillStyle = '#8a7a40';
    ctx.fillRect(px+T-6, py+T/2-1, 2, 2);
  } else if(tile === STAIRS){
    ctx.fillStyle = '#5050a0';
    for(let s=0;s<4;s++){
      ctx.fillRect(px+2+s*2, py+2+s*3, T-4-s*4, 2);
    }
  } else if(tile === CHEST){
    ctx.fillStyle = '#a08020';
    ctx.fillRect(px+3, py+5, 10, 7);
    ctx.fillStyle = '#c0a030';
    ctx.fillRect(px+3, py+5, 10, 2);
    ctx.fillStyle = '#e0c040';
    ctx.fillRect(px+7, py+7, 2, 3);
  } else if(tile === TRAP){
    // Hidden unless adjacent to player
    const dist = Math.abs(player.x-x)+Math.abs(player.y-y);
    if(dist <= 1){
      ctx.fillStyle = 'rgba(200,60,60,0.3)';
      ctx.fillRect(px+2,py+2,T-4,T-4);
      ctx.fillStyle = '#a04040';
      ctx.fillRect(px+6,py+4,4,2);
      ctx.fillRect(px+4,py+6,2,4);
      ctx.fillRect(px+10,py+6,2,4);
      ctx.fillRect(px+6,py+10,4,2);
    }
  }
}

function drawEntity(x, y, icon, hp, maxHp, color){
  const px = x*T, py = y*T;
  // Body
  ctx.fillStyle = color || '#aa8866';
  ctx.fillRect(px+3, py+3, 10, 10);
  ctx.fillStyle = color ? lighten(color,20) : '#ccaa88';
  ctx.fillRect(px+4, py+4, 8, 8);
  // HP bar
  if(hp < maxHp){
    const ratio = hp/maxHp;
    ctx.fillStyle = '#300';
    ctx.fillRect(px+1, py, 14, 2);
    ctx.fillStyle = ratio > 0.5 ? '#0a0' : ratio > 0.25 ? '#aa0' : '#a00';
    ctx.fillRect(px+1, py, Math.ceil(14*ratio), 2);
  }
  // Icon overlay
  ctx.font = '10px serif';
  ctx.textAlign = 'center';
  ctx.fillText(icon, px+8, py+13);
}

function lighten(hex, amt){
  let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,r+amt); g=Math.min(255,g+amt); b=Math.min(255,b+amt);
  return `rgb(${r},${g},${b})`;
}

function drawPlayer(){
  const px = player.x*T, py = player.y*T;
  // Body
  ctx.fillStyle = '#d4a840';
  ctx.fillRect(px+3, py+4, 10, 9);
  ctx.fillStyle = '#e8c060';
  ctx.fillRect(px+4, py+5, 8, 7);
  // Head
  ctx.fillStyle = '#ddb870';
  ctx.fillRect(px+5, py+1, 6, 5);
  // Eyes
  ctx.fillStyle = '#222';
  ctx.fillRect(px+6, py+3, 2, 2);
  ctx.fillRect(px+9, py+3, 2, 2);
  // Equipped weapon hint
  if(equipped.weapon){
    ctx.font = '8px serif';
    ctx.textAlign = 'center';
    ctx.fillText(equipped.weapon.icon, px+14, py+6);
  }
}

function drawItems(){
  items.forEach(it => {
    if(fog[it.y][it.x]) return;
    const px = it.x*T, py = it.y*T;
    // Sparkle
    const sparkle = Math.sin(Date.now()/300 + it.x*7 + it.y*13)*0.3+0.7;
    ctx.globalAlpha = sparkle;
    ctx.font = '11px serif';
    ctx.textAlign = 'center';
    ctx.fillText(it.icon, px+8, py+12);
    ctx.globalAlpha = 1;
    // Tier glow
    if(it.tier > 0){
      ctx.fillStyle = TIER_COLORS[it.tier];
      ctx.globalAlpha = 0.2 + Math.sin(Date.now()/200)*0.1;
      ctx.fillRect(px+1, py+1, 14, 14);
      ctx.globalAlpha = 1;
    }
  });
}

function render(){
  ctx.fillStyle = '#0a0808';
  ctx.fillRect(0,0,C.width,C.height);
  for(let y=0;y<MH;y++) for(let x=0;x<MW;x++) drawTile(x,y,map[y][x],fog[y][x]);
  drawItems();
  monsters.forEach(m => { if(!fog[m.y][m.x]) drawEntity(m.x,m.y,m.icon,m.hp,m.maxHp,m.color); });
  drawPlayer();
  // Damage flash
  if(player.flash > 0){
    ctx.fillStyle = `rgba(255,0,0,${player.flash*0.3})`;
    ctx.fillRect(0,0,C.width,C.height);
    player.flash -= 0.05;
  }
  updateHUD();
}

function updateHUD(){
  document.getElementById('hpVal').textContent = `${player.hp}/${player.maxHp}`;
  document.getElementById('atkVal').textContent = player.atk + (equipped.weapon ? equipped.weapon.atk : 0);
  document.getElementById('defVal').textContent = player.def + (equipped.armor ? equipped.armor.def : 0);
  document.getElementById('goldVal').textContent = totalGold;
  document.getElementById('floorVal').textContent = floor;
  renderInventory();
}

function renderInventory(){
  const bar = document.getElementById('invBar');
  bar.innerHTML = '';
  inventory.forEach((it,i) => {
    const slot = document.createElement('div');
    slot.className = 'inv-slot';
    if((it.type==='weapon' && equipped.weapon===it) || (it.type==='armor' && equipped.armor===it)){
      slot.classList.add('equipped');
    }
    slot.innerHTML = `${it.icon}${it.tier>0?`<span class="tier" style="color:${TIER_COLORS[it.tier]}">${LOOT_TIERS[it.tier][0]}</span>`:''}`;
    slot.title = `${it.name} (${LOOT_TIERS[it.tier]})${it.atk?' ATK+'+it.atk:''}${it.def?' DEF+'+it.def:''}${it.heal?' HEAL+'+it.heal:''}`;
    slot.onclick = () => useItem(i);
    bar.appendChild(slot);
  });
}

function useItem(idx){
  const it = inventory[idx];
  if(!it) return;
  if(it.type === 'weapon'){
    equipped.weapon = equipped.weapon === it ? null : it;
    log(`${equipped.weapon?'Equipped':'Unequipped'} ${it.name}`, 'info');
  } else if(it.type === 'armor'){
    equipped.armor = equipped.armor === it ? null : it;
    log(`${equipped.armor?'Equipped':'Unequipped'} ${it.name}`, 'info');
  } else if(it.type === 'potion'){
    player.hp = Math.min(player.maxHp, player.hp + it.heal);
    log(`Used ${it.name} — healed ${it.heal} HP`, 'heal');
    inventory.splice(idx, 1);
  } else if(it.type === 'scroll'){
    if(it.reveal){
      for(let y=0;y<MH;y++) for(let x=0;x<MW;x++) fog[y][x]=false;
      log('Map revealed!', 'info');
    } else if(it.dmg){
      monsters.forEach(m => {
        const d = Math.abs(m.x-player.x)+Math.abs(m.y-player.y);
        if(d <= 4){ m.hp -= it.dmg; log(`${it.name} hits ${m.name} for ${it.dmg}!`, 'dmg'); }
      });
      monsters = monsters.filter(m => m.hp > 0);
    }
    inventory.splice(idx, 1);
  }
  render();
}

// Movement & combat
function tryMove(dx, dy){
  if(gameOver) return;
  const nx = player.x+dx, ny = player.y+dy;
  if(nx<0||nx>=MW||ny<0||ny>=MH) return;
  if(map[ny][nx] === WALL) return;

  // Check monster
  const mon = monsters.find(m => m.x===nx && m.y===ny);
  if(mon){
    // Attack
    const pAtk = player.atk + (equipped.weapon ? equipped.weapon.atk : 0);
    const mDef = mon.def;
    const dmg = Math.max(1, pAtk - mDef + rngInt(-1,1));
    mon.hp -= dmg;
    log(`Hit ${mon.name} for ${dmg} dmg!`, 'dmg');
    if(mon.hp <= 0){
      monsters = monsters.filter(m => m !== mon);
      totalKills++;
      const goldDrop = rngInt(1, 5+floor*2);
      totalGold += goldDrop;
      log(`${mon.name} slain! +${goldDrop}🪙`, 'loot');
      // Loot drop
      if(rng() < 0.3){
        const loot = generateLoot();
        items.push({...loot, x:nx, y:ny});
        log(`${mon.name} dropped ${loot.name}!`, 'loot');
      }
    }
  } else {
    // Move
    player.x = nx; player.y = ny;

    // Pick up items
    const itemIdx = items.findIndex(it => it.x===nx && it.y===ny);
    if(itemIdx >= 0){
      const it = items[itemIdx];
      if(it.type === 'gold'){
        totalGold += it.amount;
        log(`Picked up ${it.name}!`, 'loot');
      } else if(inventory.length < 12){
        inventory.push(it);
        log(`Found ${it.name} [${LOOT_TIERS[it.tier]}]!`, 'loot');
        // Auto-equip if better
        if(it.type==='weapon' && (!equipped.weapon || it.atk > equipped.weapon.atk)){
          equipped.weapon = it; log(`Auto-equipped ${it.name}`, 'info');
        }
        if(it.type==='armor' && (!equipped.armor || it.def > equipped.armor.def)){
          equipped.armor = it; log(`Auto-equipped ${it.name}`, 'info');
        }
      } else {
        log('Inventory full!', 'info');
        itemIdx = -1; // don't remove
      }
      if(itemIdx >= 0) items.splice(itemIdx, 1);
    }

    // Chest
    if(map[ny][nx] === CHEST){
      map[ny][nx] = FLOOR;
      const loot = generateLoot();
      const goldBonus = rngInt(5, 15+floor*5);
      totalGold += goldBonus;
      if(inventory.length < 12) inventory.push(loot);
      log(`Chest! ${loot.name} + ${goldBonus}🪙`, 'loot');
    }

    // Trap
    if(map[ny][nx] === TRAP){
      map[ny][nx] = FLOOR;
      const trapDmg = rngInt(2, 4+floor);
      const pDef = player.def + (equipped.armor ? equipped.armor.def : 0);
      const actual = Math.max(1, trapDmg - Math.floor(pDef/2));
      player.hp -= actual;
      player.flash = 1;
      log(`Trap! Took ${actual} damage!`, 'dmg');
    }

    // Stairs
    if(map[ny][nx] === STAIRS){
      floor++;
      totalFloors = Math.max(totalFloors, floor);
      player.maxHp += 2;
      player.hp = Math.min(player.hp + 5, player.maxHp);
      player.atk += 1;
      log(`Descended to floor ${floor}!`, 'info');
      generateDungeon();
      placePlayer();
    }
  }

  // Monster turns
  monsterTurn();

  // Reveal fog
  revealFog(player.x, player.y, 4);

  // Check death
  if(player.hp <= 0){
    gameOver = true;
    log('You have perished in the dungeon...', 'dmg');
    setTimeout(showGameOver, 800);
  }

  render();
}

function monsterTurn(){
  monsters.forEach(m => {
    if(fog[m.y][m.x]) return; // only active if visible
    const dx = player.x - m.x, dy = player.y - m.y;
    const dist = Math.abs(dx)+Math.abs(dy);
    if(dist <= 1){
      // Attack player
      const pDef = player.def + (equipped.armor ? equipped.armor.def : 0);
      const dmg = Math.max(1, m.atk - pDef + rngInt(-1,1));
      player.hp -= dmg;
      player.flash = 1;
      log(`${m.name} hits you for ${dmg}!`, 'dmg');
    } else if(dist < 8){
      // Chase
      let mx=0, my=0;
      if(Math.abs(dx)>Math.abs(dy)) mx = dx>0?1:-1;
      else my = dy>0?1:-1;
      const nx=m.x+mx, ny=m.y+my;
      if(nx>=0&&nx<MW&&ny>=0&&ny<MH && map[ny][nx]!==WALL &&
        !monsters.some(o=>o!==m&&o.x===nx&&o.y===ny) &&
        !(nx===player.x&&ny===player.y)){
        m.x=nx; m.y=ny;
      }
    }
  });
}

function placePlayer(){
  const r = rooms[0];
  player.x = Math.floor(r.x + r.w/2);
  player.y = Math.floor(r.y + r.h/2);
  revealFog(player.x, player.y, 4);
}

function showGameOver(){
  document.getElementById('finalStats').innerHTML = `
    Floors: <span>${totalFloors}</span><br>
    Kills: <span>${totalKills}</span><br>
    Gold: <span>${totalGold}🪙</span><br>
    Items: <span>${inventory.length}</span>
  `;
  overlay.classList.remove('hidden');
  document.getElementById('playBtn').textContent = 'TRY AGAIN';
}

function startGame(){
  floor = 1; totalGold = 0; totalKills = 0; totalFloors = 1;
  inventory = []; equipped = {weapon:null, armor:null};
  gameOver = false; logs = [];
  player = {x:0, y:0, hp:20, maxHp:20, atk:3, def:1, flash:0};
  rngSeed = Date.now();
  generateDungeon();
  placePlayer();
  overlay.classList.add('hidden');
  render();
}

document.getElementById('playBtn').onclick = startGame;

// Keyboard controls
const DIRS = {
  ArrowUp:[0,-1],ArrowDown:[0,1],ArrowLeft:[-1,0],ArrowRight:[1,0],
  w:[0,-1],s:[0,1],a:[-1,0],d:[1,0],
  q:[-1,-1],e:[1,-1],z:[-1,1],c:[1,1],
  '.': [0,0],
};
document.addEventListener('keydown', ev => {
  const dir = DIRS[ev.key];
  if(dir) { ev.preventDefault(); tryMove(dir[0], dir[1]); }
  // Number keys for inventory
  const num = parseInt(ev.key);
  if(num >= 1 && num <= 9 && num <= inventory.length) useItem(num-1);
});

// Touch/click controls
const btnDirs = {
  btnN:[0,-1],btnS:[0,1],btnW:[-1,0],btnE:[1,0],
  btnNW:[-1,-1],btnNE:[1,-1],btnSW:[-1,1],btnSE:[1,1],
  btnWait:[0,0],
};
Object.entries(btnDirs).forEach(([id,dir]) => {
  const btn = document.getElementById(id);
  if(btn) btn.onclick = () => tryMove(dir[0], dir[1]);
});

// Canvas click to move toward
C.addEventListener('click', e => {
  if(gameOver) return;
  const rect = C.getBoundingClientRect();
  const scaleX = C.width / rect.width;
  const scaleY = C.height / rect.height;
  const tx = Math.floor((e.clientX - rect.left) * scaleX / T);
  const ty = Math.floor((e.clientY - rect.top) * scaleY / T);
  const dx = Math.sign(tx - player.x);
  const dy = Math.sign(ty - player.y);
  if(dx || dy) tryMove(dx, dy);
});

// Animation loop for sparkle effects
function animLoop(){ render(); requestAnimationFrame(animLoop); }
animLoop();
</script>
</body>
