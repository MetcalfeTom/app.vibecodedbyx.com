<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sedbox — regex rules for renaming code examples</title>
<meta name="description" content="Paste source code, stack find/replace rules (regex, capture groups, identifier-case transforms), watch the diff live, copy the result.">
<link rel="icon" href="https://emojicdn.elk.sh/🧵">
<meta property="og:title" content="Sedbox">
<meta property="og:description" content="Stack regex rules to rename filenames, paths and identifiers across a code sample — live diff, copy the result. All in your browser.">
<meta property="og:url" content="https://sloppy.live/sedbox">
<meta property="og:image" content="https://image.pollinations.ai/prompt/retro%20terminal%20text%20editor%20with%20find%20and%20replace%20rules%2C%20amber%20on%20black%2C%20stream%20of%20code%20transforming%2C%20technical%20blueprint%20aesthetic%2C%20flat%20minimal?width=1200&height=630&seed=3751&nologo=true&model=flux&image=.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#10131a; --panel:#171b24; --edge:#28303e; --fg:#dfe6ef; --dim:#7f8a9c;
  --amber:#f4b942; --cyan:#4fd0e0; --add:#57c98a; --del:#e8637a; --focus:#5fa8ff;
  --ins-bg:rgba(87,201,138,.18); --del-bg:rgba(232,99,122,.16);
}
*{box-sizing:border-box;}
html{font-size:100%;}
body{margin:0; font-family:'Space Grotesk',system-ui,sans-serif; color:var(--fg); background:
  radial-gradient(700px 340px at 82% -8%, rgba(244,185,66,.06), transparent 60%),
  radial-gradient(600px 360px at 0% 100%, rgba(79,208,224,.05), transparent 55%), var(--bg);
  min-height:100vh; line-height:1.5;}
main{max-width:74rem; margin:0 auto; padding:1.3rem 1rem 4rem;}
header{display:flex; align-items:baseline; gap:.9rem; flex-wrap:wrap; border-bottom:1px solid var(--edge); padding-bottom:.7rem; margin-bottom:1rem;}
h1{font-size:1.5rem; margin:0; letter-spacing:.01em;}
h1 span{color:var(--amber);}
.blurb{font-size:.74rem; color:var(--dim); font-family:'JetBrains Mono',monospace;}
.setbar{margin-left:auto; display:flex; gap:.4rem; align-items:center; flex-wrap:wrap;}
select,input,textarea,button{font-family:'JetBrains Mono',monospace; font-size:.8rem; color:var(--fg);}
select,input[type=text]{background:#0d1017; border:1px solid var(--edge); border-radius:6px; padding:.4rem .55rem; min-height:2.4rem;}
select:focus-visible,input:focus-visible,textarea:focus-visible,button:focus-visible{outline:3px solid var(--focus); outline-offset:1px;}
button{cursor:pointer; min-height:2.4rem; padding:.4rem .8rem; border-radius:6px; border:1px solid var(--edge); background:var(--panel); font-weight:700; letter-spacing:.02em;}
button:hover{border-color:var(--amber);}
button.hot{background:var(--amber); color:#241a05; border-color:var(--amber);}
button.mini{min-height:2rem; padding:.2rem .5rem; font-size:.72rem;}
button.danger:hover{border-color:var(--del); color:var(--del);}
button[disabled]{opacity:.5; cursor:not-allowed;}
.cols{display:grid; grid-template-columns:1fr; gap:1rem;}
.card{background:var(--panel); border:1px solid var(--edge); border-radius:10px; padding:.9rem;}
.card h2{font-size:.72rem; letter-spacing:.18em; text-transform:uppercase; color:var(--dim); margin:0 0 .6rem; font-family:'JetBrains Mono',monospace;}
.io{display:grid; grid-template-columns:1fr 1fr; gap:1rem;}
@media (max-width:52rem){ .io{grid-template-columns:1fr;} }
textarea{width:100%; min-height:16rem; resize:vertical; background:#0b0e14; color:var(--fg); border:1px solid var(--edge); border-radius:8px; padding:.7rem; font-size:.78rem; line-height:1.55; white-space:pre; tab-size:2;}
.outwrap{position:relative;}
pre#out{margin:0; min-height:16rem; max-height:34rem; overflow:auto; background:#0b0e14; border:1px solid var(--edge); border-radius:8px; padding:.7rem; font-family:'JetBrains Mono',monospace; font-size:.78rem; line-height:1.55; white-space:pre; tab-size:2;}
pre#out ins{background:var(--ins-bg); color:var(--add); text-decoration:none; border-radius:2px;}
pre#out del{background:var(--del-bg); color:var(--del); text-decoration:line-through; border-radius:2px; opacity:.8;}
/* rules */
.rule{display:grid; grid-template-columns:2.2rem 1fr 1fr auto; gap:.5rem; align-items:center; padding:.5rem; border:1px solid var(--edge); border-radius:8px; margin-bottom:.5rem; background:#12161e;}
.rule.bad{border-color:var(--del);}
.rule.off{opacity:.5;}
.rule .find,.rule .repl{width:100%;}
.rule .lbl{font-size:.58rem; letter-spacing:.1em; text-transform:uppercase; color:var(--dim); display:block; margin-bottom:.15rem;}
.rule .opts{display:flex; gap:.3rem; flex-wrap:wrap; grid-column:2 / 4; margin-top:.15rem;}
.chip{font-family:'JetBrains Mono',monospace; font-size:.66rem; min-height:1.8rem; padding:.1rem .5rem; border:1px solid var(--edge); border-radius:99px; background:#0d1017; color:var(--dim); cursor:pointer;}
.chip[aria-pressed=true]{background:var(--cyan); color:#04252b; border-color:var(--cyan);}
.rule .drag{cursor:grab; color:var(--dim); text-align:center; font-size:1.1rem; user-select:none;}
.rule .rmv{align-self:start;}
.rule .hits{font-size:.62rem; color:var(--amber); font-family:'JetBrains Mono',monospace; grid-column:2 / 5;}
.rule.dragging{opacity:.4;}
.rule.dragover{border-color:var(--amber);}
.transform-row{grid-column:2 / 4; display:flex; gap:.4rem; align-items:center; font-size:.7rem; color:var(--dim); flex-wrap:wrap;}
.toolrow{display:flex; gap:.5rem; flex-wrap:wrap; margin-top:.3rem; align-items:center;}
.count{font-size:.72rem; color:var(--dim); font-family:'JetBrains Mono',monospace;}
.count b{color:var(--amber);}
.err{color:var(--del); font-size:.72rem; font-family:'JetBrains Mono',monospace; min-height:1.1em;}
.copied{color:var(--add); font-size:.72rem;}
footer{text-align:center; font-size:.66rem; color:var(--dim); margin-top:1.4rem; font-family:'JetBrains Mono',monospace;}
</style>
</head>
<body>
<main>
  <header>
    <h1>Sed<span>box</span></h1>
    <span class="blurb">stack regex rules · rename paths &amp; identifiers · watch the diff</span>
    <div class="setbar">
      <label for="set-sel" class="lbl" style="font-size:.6rem;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;">rule set</label>
      <select id="set-sel" aria-label="Rule set"></select>
      <button id="set-save" type="button" class="mini">save as…</button>
      <button id="set-del" type="button" class="mini danger">del</button>
    </div>
  </header>

  <div class="cols">
    <section class="card" aria-labelledby="h-rules">
      <h2 id="h-rules">Rules <span class="count" style="text-transform:none;letter-spacing:0;">— applied top to bottom</span></h2>
      <div id="rules"></div>
      <div class="toolrow">
        <button id="add-rule" type="button" class="hot">+ rule</button>
        <button id="add-xform" type="button">+ identifier-case rule</button>
        <button id="clear-rules" type="button" class="danger">clear</button>
        <span class="count" style="margin-left:auto;">rules fired <b id="total-hits">0</b></span>
      </div>
      <p class="err" id="rule-err"></p>
    </section>

    <section class="card" aria-labelledby="h-io">
      <h2 id="h-io">Source → Result</h2>
      <div class="io">
        <div>
          <div class="toolrow" style="margin:0 0 .4rem;">
            <span class="count" style="text-transform:none;">input</span>
            <button id="demo-btn" type="button" class="mini" style="margin-left:auto;">load example</button>
            <button id="clear-in" type="button" class="mini">clear</button>
          </div>
          <textarea id="in" spellcheck="false" placeholder="paste source code here…" aria-label="Source code input"></textarea>
        </div>
        <div>
          <div class="toolrow" style="margin:0 0 .4rem;">
            <span class="count" style="text-transform:none;">result</span>
            <button id="diff-toggle" type="button" class="mini chip" aria-pressed="true" style="margin-left:auto;">diff</button>
            <button id="copy-btn" type="button" class="mini">⧉ copy</button>
            <button id="dl-btn" type="button" class="mini">⬇ save</button>
            <span class="copied" id="copied"></span>
          </div>
          <div class="outwrap"><pre id="out" tabindex="0" aria-live="polite" aria-label="Transformed result"></pre></div>
        </div>
      </div>
    </section>
  </div>

  <footer>rules run in order · each rule's output feeds the next · everything stays in your browser</footer>
</main>

<script>
(function(){
"use strict";
/* ═══════════ pure engine (node-testable) ═══════════ */
var CASE_MODES=['as-is','camelCase','PascalCase','snake_case','SCREAMING_SNAKE','kebab-case'];
function splitWords(s){
  /* break an identifier into lowercase word parts across any convention */
  return String(s)
    .replace(/([a-z0-9])([A-Z])/g,'$1 $2')          // camel → words
    .replace(/([A-Z]+)([A-Z][a-z])/g,'$1 $2')       // HTTPServer → HTTP Server
    .split(/[\s_\-.]+/).filter(Boolean).map(function(w){ return w.toLowerCase(); });
}
function toCase(s,mode){
  var w=splitWords(s);
  if(!w.length) return s;
  switch(mode){
    case 'camelCase': return w[0]+w.slice(1).map(cap).join('');
    case 'PascalCase': return w.map(cap).join('');
    case 'snake_case': return w.join('_');
    case 'SCREAMING_SNAKE': return w.join('_').toUpperCase();
    case 'kebab-case': return w.join('-');
    default: return s;
  }
}
function cap(w){ return w.charAt(0).toUpperCase()+w.slice(1); }

/* build a RegExp for a rule; throws on bad pattern */
function buildRe(rule){
  var flags='g'+(rule.i?'i':'')+(rule.m?'m':'');
  var src=rule.find;
  if(!rule.regex){
    src=src.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');   // literal escape
    if(rule.word) src='\\b'+src+'\\b';
  } else if(rule.word){ src='\\b(?:'+src+')\\b'; }
  return new RegExp(src, flags);
}
/* apply one rule to text → {text, hits} */
function applyRule(text,rule){
  if(!rule.enabled||!rule.find) return {text:text,hits:0};
  var re=buildRe(rule), hits=0;
  var out=text.replace(re,function(){
    hits++;
    var args=Array.prototype.slice.call(arguments);
    var groups=args.slice(0,-2);                     // match + capture groups
    if(rule.xform&&rule.xform!=='as-is'){
      /* transform the matched text (or group 1 if present) into target case */
      var pick=groups.length>1&&groups[1]!=null?groups[1]:groups[0];
      var replaced=toCase(pick,rule.xform);
      if(groups.length>1&&groups[1]!=null){
        /* keep surrounding match, swap group 1 */
        return groups[0].replace(groups[1],replaced);
      }
      return replaced;
    }
    /* $1/$2 substitution in replacement */
    return rule.repl.replace(/\$(\d+)|\$&/g,function(m,d){
      if(m==='$&') return groups[0];
      var gi=+d; return groups[gi]!=null?groups[gi]:'';
    });
  });
  return {text:out,hits:hits};
}
/* run the whole pipeline → {text, perRule:[hits], total} */
function runPipeline(text,rules){
  var per=[], total=0, cur=text;
  rules.forEach(function(r){
    var res=applyRule(cur,r);
    cur=res.text; per.push(res.hits); total+=res.hits;
  });
  return {text:cur, perRule:per, total:total};
}
/* char-level LCS diff → array of {t:'=|+|-', s} (line-aware, then word) */
function diffTokens(a,b){
  var ta=a.split(/(\s+)/), tb=b.split(/(\s+)/);
  var n=ta.length, m=tb.length;
  var dp=Array.from({length:n+1},function(){ return new Int32Array(m+1); });
  for(var i=n-1;i>=0;i--)for(var j=m-1;j>=0;j--)
    dp[i][j]=ta[i]===tb[j]?dp[i+1][j+1]+1:Math.max(dp[i+1][j],dp[i][j+1]);
  var out=[], i2=0,j2=0;
  while(i2<n&&j2<m){
    if(ta[i2]===tb[j2]){ out.push({t:'=',s:ta[i2]}); i2++; j2++; }
    else if(dp[i2+1][j2]>=dp[i2][j2+1]){ out.push({t:'-',s:ta[i2]}); i2++; }
    else{ out.push({t:'+',s:tb[j2]}); j2++; }
  }
  while(i2<n){ out.push({t:'-',s:ta[i2++]}); }
  while(j2<m){ out.push({t:'+',s:tb[j2++]}); }
  return out;
}
window.__sedbox={toCase:toCase,splitWords:splitWords,buildRe:buildRe,applyRule:applyRule,runPipeline:runPipeline,diffTokens:diffTokens,CASE_MODES:CASE_MODES};

/* ═══════════ app ═══════════ */
if(typeof document==='undefined'||!document.getElementById('rules')) return;
var $=function(id){ return document.getElementById(id); };
function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

var DEMO_RULES=[
  {enabled:true,find:'src/legacy/',repl:'src/core/',regex:false,i:false,m:false,word:false,xform:''},
  {enabled:true,find:'(\\w+)\\.old\\.js',repl:'$1.js',regex:true,i:false,m:false,word:false,xform:''},
  {enabled:true,find:'get_user_data',repl:'',regex:false,i:false,m:false,word:true,xform:'camelCase'}
];
var DEMO_CODE=
"import { get_user_data } from './src/legacy/user.old.js';\n"+
"import cfg from './src/legacy/config.old.js';\n\n"+
"// fetch and render\n"+
"function render() {\n"+
"  const data = get_user_data(currentId);\n"+
"  return data;\n"+
"}\n";

/* storage */
var KEY='sedbox-v1';
function load(){
  try{ var s=JSON.parse(localStorage.getItem(KEY)); if(s&&s.sets) return s; }catch(e){}
  return {cur:'starter', sets:{starter:{name:'starter',rules:DEMO_RULES.map(clone)}}};
}
function clone(o){ return JSON.parse(JSON.stringify(o)); }
var store=load();
function save(){ try{ localStorage.setItem(KEY,JSON.stringify(store)); }catch(e){} }
function curSet(){ return store.sets[store.cur]; }
function rules(){ return curSet().rules; }

function blankRule(){ return {enabled:true,find:'',repl:'',regex:false,i:false,m:false,word:false,xform:''}; }

/* render rule list */
var lastHits=[];
function renderRules(){
  var wrap=$('rules'); wrap.innerHTML='';
  rules().forEach(function(r,idx){
    var el=document.createElement('div');
    el.className='rule'+(r.enabled?'':' off');
    el.draggable=true; el.dataset.idx=idx;
    el.innerHTML=
      '<div class="drag" title="drag to reorder" aria-hidden="true">⠿</div>'+
      '<div><span class="lbl">find</span><input class="find" type="text" value="'+esc(r.find)+'" placeholder="pattern" spellcheck="false"></div>'+
      '<div><span class="lbl">'+(r.xform?'→ case':'replace ($1)')+'</span>'+
        (r.xform
          ? '<select class="xform">'+CASE_MODES.map(function(m){return '<option value="'+m+'"'+(r.xform===m?' selected':'')+'>'+m+'</option>';}).join('')+'</select>'
          : '<input class="repl" type="text" value="'+esc(r.repl)+'" placeholder="replacement" spellcheck="false">')+
      '</div>'+
      '<button class="rmv mini danger" type="button" aria-label="remove rule '+(idx+1)+'">✕</button>'+
      '<div class="opts">'+
        '<button class="chip en" type="button" aria-pressed="'+r.enabled+'" title="enabled">on</button>'+
        '<button class="chip rgx" type="button" aria-pressed="'+r.regex+'" title="regex">.*</button>'+
        '<button class="chip ci" type="button" aria-pressed="'+r.i+'" title="case-insensitive">Aa</button>'+
        '<button class="chip wd" type="button" aria-pressed="'+r.word+'" title="whole word">\\b</button>'+
        '<button class="chip ml" type="button" aria-pressed="'+r.m+'" title="multiline ^$">^$</button>'+
        (r.xform?'':'<button class="chip mkx" type="button" aria-pressed="false" title="convert to identifier-case rule">→case</button>')+
        (r.xform?'<button class="chip mkx2" type="button" aria-pressed="false" title="back to text replace">↩repl</button>':'')+
      '</div>'+
      (lastHits[idx]>0?'<div class="hits">'+lastHits[idx]+' replacement'+(lastHits[idx]===1?'':'s')+'</div>':'');
    wrap.appendChild(el);

    var findEl=el.querySelector('.find');
    findEl.addEventListener('input',function(){ r.find=findEl.value; run(); saveLater(); });
    var replEl=el.querySelector('.repl');
    if(replEl) replEl.addEventListener('input',function(){ r.repl=replEl.value; run(); saveLater(); });
    var xEl=el.querySelector('.xform');
    if(xEl) xEl.addEventListener('change',function(){ r.xform=xEl.value; run(); saveLater(); });
    function toggle(cls,prop){ var b=el.querySelector('.'+cls); if(b) b.addEventListener('click',function(){ r[prop]=!r[prop]; save(); renderRules(); run(); }); }
    toggle('en','enabled'); toggle('rgx','regex'); toggle('ci','i'); toggle('wd','word'); toggle('ml','m');
    var mkx=el.querySelector('.mkx'); if(mkx) mkx.addEventListener('click',function(){ r.xform='camelCase'; save(); renderRules(); run(); });
    var mkx2=el.querySelector('.mkx2'); if(mkx2) mkx2.addEventListener('click',function(){ r.xform=''; save(); renderRules(); run(); });
    el.querySelector('.rmv').addEventListener('click',function(){ rules().splice(idx,1); save(); renderRules(); run(); });

    /* drag reorder */
    el.addEventListener('dragstart',function(e){ el.classList.add('dragging'); e.dataTransfer.setData('text/plain',idx); });
    el.addEventListener('dragend',function(){ el.classList.remove('dragging'); });
    el.addEventListener('dragover',function(e){ e.preventDefault(); el.classList.add('dragover'); });
    el.addEventListener('dragleave',function(){ el.classList.remove('dragover'); });
    el.addEventListener('drop',function(e){
      e.preventDefault(); el.classList.remove('dragover');
      var from=+e.dataTransfer.getData('text/plain'), to=idx;
      if(from===to) return;
      var moved=rules().splice(from,1)[0]; rules().splice(to,0,moved);
      save(); renderRules(); run();
    });
  });
}

/* run pipeline + render output/diff */
var showDiff=true;
function run(){
  var input=$('in').value;
  var errEl=$('rule-err'); errEl.textContent='';
  /* validate each regex, mark bad rules */
  var ok=true;
  document.querySelectorAll('.rule').forEach(function(el,idx){
    var r=rules()[idx]; el.classList.remove('bad');
    if(r&&r.enabled&&r.find){ try{ buildRe(r); }catch(e){ el.classList.add('bad'); errEl.textContent='rule '+(idx+1)+': '+e.message; ok=false; } }
  });
  if(!ok){ return; }
  var res=runPipeline(input,rules());
  lastHits=res.perRule;
  $('total-hits').textContent=res.total;
  var out=$('out');
  if(showDiff&&input!==res.text){
    out.innerHTML=diffTokens(input,res.text).map(function(t){
      if(t.t==='=') return esc(t.s);
      if(t.t==='+') return '<ins>'+esc(t.s)+'</ins>';
      return '<del>'+esc(t.s)+'</del>';
    }).join('');
  } else out.textContent=res.text;
  out._plain=res.text;
  /* refresh hit badges without full rebuild */
  document.querySelectorAll('.rule').forEach(function(el,idx){
    var old=el.querySelector('.hits'); if(old) old.remove();
    if(lastHits[idx]>0){ var h=document.createElement('div'); h.className='hits';
      h.textContent=lastHits[idx]+' replacement'+(lastHits[idx]===1?'':'s'); el.appendChild(h); }
  });
}
var saveT=null;
function saveLater(){ clearTimeout(saveT); saveT=setTimeout(save,300); }

/* controls */
$('in').addEventListener('input',run);
$('add-rule').addEventListener('click',function(){ rules().push(blankRule()); save(); renderRules(); run(); });
$('add-xform').addEventListener('click',function(){ var r=blankRule(); r.regex=true; r.word=true; r.xform='camelCase'; rules().push(r); save(); renderRules(); run(); });
$('clear-rules').addEventListener('click',function(){ if(!rules().length||confirm('remove all rules in this set?')){ curSet().rules=[]; save(); renderRules(); run(); } });
$('clear-in').addEventListener('click',function(){ $('in').value=''; run(); });
$('demo-btn').addEventListener('click',function(){ $('in').value=DEMO_CODE; if(!rules().length) curSet().rules=DEMO_RULES.map(clone); save(); renderRules(); run(); });
$('diff-toggle').addEventListener('click',function(){ showDiff=!showDiff; this.setAttribute('aria-pressed',showDiff); this.textContent=showDiff?'diff':'plain'; run(); });
$('copy-btn').addEventListener('click',function(){
  navigator.clipboard.writeText($('out')._plain||'').then(function(){ $('copied').textContent='copied ✓'; setTimeout(function(){$('copied').textContent='';},1600); },
  function(){ $('copied').textContent='blocked'; });
});
$('dl-btn').addEventListener('click',function(){
  var blob=new Blob([$('out')._plain||''],{type:'text/plain'});
  var a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='sedbox-output.txt';
  document.body.appendChild(a); a.click(); setTimeout(function(){ URL.revokeObjectURL(a.href); a.remove(); },400);
});

/* rule sets */
function renderSets(){
  var sel=$('set-sel'); sel.innerHTML='';
  Object.keys(store.sets).forEach(function(id){
    var o=document.createElement('option'); o.value=id; o.textContent=store.sets[id].name;
    if(id===store.cur) o.selected=true; sel.appendChild(o);
  });
}
$('set-sel').addEventListener('change',function(){ store.cur=this.value; save(); renderRules(); run(); });
$('set-save').addEventListener('click',function(){
  var name=prompt('name this rule set','my rules'); if(name==null) return;
  var id='s'+Math.random().toString(36).slice(2,8);
  store.sets[id]={name:name.trim()||'unnamed', rules:rules().map(clone)};
  store.cur=id; save(); renderSets(); renderRules();
});
$('set-del').addEventListener('click',function(){
  if(Object.keys(store.sets).length<2){ alert('keep at least one set'); return; }
  if(!confirm('delete rule set "'+curSet().name+'"?')) return;
  delete store.sets[store.cur]; store.cur=Object.keys(store.sets)[0];
  save(); renderSets(); renderRules(); run();
});

/* boot */
$('in').value=DEMO_CODE;
renderSets(); renderRules(); run();
})();
</script>
</body>
</html>
