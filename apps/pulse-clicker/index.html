<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Pulse Clicker</title>
<meta name="description" content="A neon-drenched idle clicker. Every click spawns a geometric fragment that dances across the screen.">
<meta property="og:title" content="Pulse Clicker">
<meta property="og:description" content="A neon-drenched idle clicker. Every click spawns a geometric fragment that dances across the screen.">
<meta property="og:url" content="https://sloppy.live/pulse-clicker">
<meta property="og:image" content="https://image.pollinations.ai/prompt/neon%20synthwave%20idle%20clicker%20geometric%20fragments%20pink%20cyan%20pulse%20rhythm%20vector%20arcade?width=1200&height=630&nologo=true">
<meta property="og:type" content="website">
<link rel="icon" href="https://emojicdn.elk.sh/%E2%9C%A8">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Audiowide&family=Orbitron:wght@500;700;900&family=IBM+Plex+Mono:wght@400;500&family=Cormorant+Garamond:ital,wght@1,400&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#07021a;
  --bg-2:#0e0530;
  --panel:rgba(20,8,48,0.6);
  --rule:rgba(255,255,255,0.12);
  --rule-strong:rgba(255,255,255,0.3);
  --pink:#ff2e9c;
  --cyan:#00f0ff;
  --lime:#b5ff3a;
  --magenta:#b13eff;
  --gold:#ffd03e;
  --orange:#ff7a3e;
  --ink:#f4f0ff;
}
*{box-sizing:border-box}
html,body{margin:0;padding:0;height:100%;overflow:hidden;background:var(--bg);color:var(--ink);font-family:'Orbitron',sans-serif;font-size:16px;-webkit-font-smoothing:antialiased}
html{font-size:100%}

body{
  background:
    radial-gradient(900px 700px at 18% 100%, rgba(255,46,156,0.18), transparent 60%),
    radial-gradient(900px 700px at 82% 0%, rgba(0,240,255,0.12), transparent 60%),
    radial-gradient(700px 500px at 50% 50%, rgba(177,62,255,0.08), transparent 70%),
    var(--bg);
}

.skip{position:absolute;left:-9999px;top:auto}
.skip:focus{left:1rem;top:1rem;background:var(--pink);color:var(--bg);padding:0.5rem;z-index:100}

#stage{
  position:fixed; inset:0;
  width:100%; height:100%;
  display:block;
  cursor: crosshair;
  touch-action: none;
}

/* synthwave horizon grid */
.grid-floor{
  position:fixed; left:0; right:0; bottom:0;
  height:32vh;
  pointer-events:none;
  z-index:1;
  opacity:0.55;
  background:
    linear-gradient(180deg, transparent 0%, rgba(255,46,156,0.04) 60%, rgba(255,46,156,0.18) 100%),
    repeating-linear-gradient(90deg, transparent 0 calc(8% - 1px), rgba(255,46,156,0.45) calc(8% - 1px) 8%),
    repeating-linear-gradient(0deg, transparent 0 calc(20% - 1px), rgba(0,240,255,0.35) calc(20% - 1px) 20%);
  -webkit-mask-image: linear-gradient(180deg, transparent, #000 35%);
          mask-image: linear-gradient(180deg, transparent, #000 35%);
  filter: blur(0.4px);
}

/* HUD: title + score band on top, side panel for upgrades */
.hud-top{
  position:fixed; top:0; left:0; right:0;
  z-index:5;
  pointer-events:none;
  padding:0.85rem 1rem;
  display:grid;
  grid-template-columns: auto 1fr auto;
  gap:1rem;
  align-items:start;
}

.brand{
  pointer-events:auto;
}
.brand h1{
  margin:0;
  font-family:'Audiowide', sans-serif;
  font-size:clamp(1.4rem, 3vw, 2.1rem);
  letter-spacing:0.06em;
  color:#fff;
  text-shadow:
    0 0 12px var(--pink),
    0 0 26px var(--pink),
    3px 3px 0 var(--magenta);
}
.brand h1 em{
  font-style:normal;
  color:var(--cyan);
  text-shadow:
    0 0 12px var(--cyan),
    0 0 26px var(--cyan),
    3px 3px 0 var(--magenta);
}
.brand .tagline{
  font-family:'Cormorant Garamond', serif;
  font-style:italic;
  color: rgba(244,240,255,0.65);
  font-size:0.9rem;
  margin-top:0.1rem;
}

.score-band{
  pointer-events:auto;
  text-align:center;
  background: linear-gradient(180deg, rgba(20,8,48,0.78), rgba(20,8,48,0.55));
  border:1px solid var(--rule);
  padding:0.5rem 1.2rem;
  min-width:14rem;
  backdrop-filter: blur(4px);
}
.score-band .pulses{
  font-family:'Audiowide', sans-serif;
  font-size:clamp(2rem, 4vw, 2.6rem);
  color: var(--gold);
  text-shadow: 0 0 14px var(--gold), 0 0 30px rgba(255,208,62,0.5);
  font-variant-numeric:tabular-nums;
  line-height:1;
}
.score-band .pulses::after{
  content:" ⚡";
  font-size:0.7em;
  color:var(--cyan);
  text-shadow: 0 0 8px var(--cyan);
}
.score-band .meta{
  font-family:'IBM Plex Mono', monospace;
  font-size:0.62rem;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color: rgba(244,240,255,0.55);
  margin-top:0.3rem;
}
.score-band .meta b{ color: var(--cyan); font-weight:500 }

.combo-readout{
  pointer-events:auto;
  text-align:right;
  font-family:'IBM Plex Mono', monospace;
  font-size:0.62rem;
  letter-spacing:0.18em;
  text-transform:uppercase;
  color: rgba(244,240,255,0.55);
}
.combo-readout .v{
  display:block;
  font-family:'Audiowide', sans-serif;
  font-size:1.6rem;
  color: var(--lime);
  text-shadow: 0 0 12px var(--lime);
  letter-spacing:0.04em;
  margin-top:0.1rem;
  font-variant-numeric:tabular-nums;
}
.combo-readout .v.cold{ color: rgba(244,240,255,0.4); text-shadow:none }

/* upgrade rail */
.rail{
  position:fixed;
  right:0; top:0; bottom:0;
  width:min(20rem, 90vw);
  background: linear-gradient(180deg, rgba(20,8,48,0.86), rgba(20,8,48,0.55));
  border-left:1px solid var(--rule);
  padding: 5.5rem 0.8rem 1rem;
  z-index:4;
  overflow-y:auto;
  backdrop-filter: blur(6px);
}
.rail h2{
  margin:0 0 0.75rem;
  font-family:'Audiowide', sans-serif;
  font-size:0.85rem; letter-spacing:0.18em; text-transform:uppercase;
  color:var(--cyan);
}
.rail h2 small{
  display:block;
  font-family:'IBM Plex Mono', monospace;
  font-size:0.6rem;
  letter-spacing:0.16em;
  color:rgba(244,240,255,0.4);
  margin-top:0.2rem;
  font-weight:400;
}

.upg{
  display:grid;
  grid-template-columns:1fr auto;
  gap:0.4rem;
  align-items:center;
  background: rgba(0,0,0,0.35);
  border:1px solid var(--rule);
  padding:0.55rem 0.65rem;
  margin-bottom:0.5rem;
  cursor:pointer;
  transition: border-color 0.15s ease, background 0.15s ease, transform 0.08s ease;
  text-align:left;
  font-family: inherit;
  color: var(--ink);
  width:100%;
}
.upg:hover:not([disabled]){ border-color: var(--pink); background: rgba(255,46,156,0.08) }
.upg:active{ transform: translateY(1px) }
.upg[disabled]{ opacity:0.45; cursor:not-allowed }
.upg:focus-visible{ outline: 3px solid var(--cyan); outline-offset: 2px }
.upg.affordable{ border-color: rgba(181,255,58,0.45); background: rgba(181,255,58,0.04) }

.upg .nm{
  font-family:'Audiowide', sans-serif;
  font-size:0.85rem;
  color:#fff;
  display:flex; align-items:center; gap:0.4rem;
}
.upg .nm .lvl{
  font-family:'IBM Plex Mono', monospace;
  font-size:0.62rem;
  color: var(--lime);
  background: rgba(181,255,58,0.12);
  padding:0.05rem 0.32rem;
  border:1px solid rgba(181,255,58,0.35);
}
.upg .desc{
  font-family:'IBM Plex Mono', monospace;
  font-size:0.68rem;
  color: rgba(244,240,255,0.55);
  letter-spacing:0.04em;
  margin-top:0.2rem;
}
.upg .cost{
  font-family:'Audiowide', sans-serif;
  font-size:0.85rem;
  color: var(--gold);
  text-shadow: 0 0 8px rgba(255,208,62,0.4);
  font-variant-numeric:tabular-nums;
  white-space:nowrap;
  text-align:right;
}
.upg.affordable .cost{ color: var(--lime); text-shadow: 0 0 8px rgba(181,255,58,0.4) }

/* central click hint (fades after first click) */
.click-hint{
  position:fixed;
  left:50%; top:50%;
  transform: translate(-50%, -50%);
  pointer-events:none;
  z-index:3;
  text-align:center;
  font-family:'Audiowide', sans-serif;
  font-size:clamp(2rem, 5vw, 3.4rem);
  color:#fff;
  letter-spacing:0.08em;
  text-shadow:
    0 0 14px var(--pink),
    0 0 32px var(--pink);
  animation: hintBob 2.4s ease-in-out infinite;
  transition: opacity 0.6s ease;
}
.click-hint.gone{ opacity:0 }
.click-hint .sub{
  display:block;
  font-family:'IBM Plex Mono', monospace;
  font-size:0.72rem;
  color: var(--cyan);
  text-shadow: 0 0 12px var(--cyan);
  letter-spacing:0.22em;
  margin-top:0.45rem;
  font-weight:500;
}
@keyframes hintBob{
  0%,100%{ transform: translate(-50%, -50%) scale(1) }
  50%{ transform: translate(-50%, -50%) scale(1.06) }
}

/* footer / mute / reset */
.footer-controls{
  position:fixed; left:0.85rem; bottom:0.85rem;
  z-index:6;
  display:flex; gap:0.4rem;
}
.mini-btn{
  font-family:'IBM Plex Mono', monospace;
  font-size:0.62rem; letter-spacing:0.14em; text-transform:uppercase;
  background: rgba(20,8,48,0.78);
  color: var(--ink);
  border:1px solid var(--rule);
  padding:0.4rem 0.7rem;
  cursor:pointer;
  min-height:2.4rem;
  backdrop-filter: blur(4px);
}
.mini-btn:hover{ border-color: var(--pink); color: var(--pink) }
.mini-btn[aria-pressed="true"]{ border-color: var(--lime); color: var(--lime) }
.mini-btn:focus-visible{ outline:2px solid var(--cyan); outline-offset: 2px }

/* responsive */
@media (max-width: 720px){
  .rail{
    width:100%;
    height:42vh;
    top:auto; bottom:0;
    border-left:none;
    border-top:1px solid var(--rule);
    padding:0.8rem;
  }
  #stage{ touch-action: manipulation }
  .hud-top{ padding-right:1rem }
  .grid-floor{ display:none }
}

@media (prefers-reduced-motion: reduce){
  .click-hint{ animation: none }
}
</style>
</head>
<body>
<a href="#stage" class="skip">Skip to canvas</a>

<canvas id="stage" role="application" aria-label="Pulse clicker. Click anywhere to spawn a geometric fragment that dances across the screen. Each click earns pulses you can spend on upgrades in the right rail."></canvas>

<div class="grid-floor" aria-hidden="true"></div>

<div class="hud-top">
  <div class="brand">
    <h1>pulse <em>clicker</em></h1>
    <div class="tagline">a fragment for every heartbeat.</div>
  </div>
  <div class="score-band" role="status" aria-live="polite">
    <div class="pulses" id="pulsesEl">0</div>
    <div class="meta">PPS · <b id="ppsEl">0.0</b> &nbsp;·&nbsp; total · <b id="totalEl">0</b> &nbsp;·&nbsp; clicks · <b id="clicksEl">0</b></div>
  </div>
  <div class="combo-readout">
    <span>combo</span>
    <span class="v cold" id="comboEl">×1.0</span>
  </div>
</div>

<aside class="rail" aria-label="Upgrades">
  <h2>Upgrades<small>spend pulses · scale up the dance</small></h2>
  <div id="upgList"></div>
</aside>

<div class="click-hint" id="clickHint">
  CLICK ANYWHERE
  <span class="sub">to begin the pulse</span>
</div>

<div class="footer-controls">
  <button type="button" class="mini-btn" id="audioToggle" aria-pressed="false" aria-label="Toggle audio">♪ off</button>
  <button type="button" class="mini-btn" id="resetBtn" aria-label="Reset save">⌫ reset</button>
</div>

<script>
'use strict';

// ════════════════════════════════════════════════════════════════
//   PULSE CLICKER — neon idle, every click spawns a fragment that
//   dances. Idle pulse generation + upgrades + combos.
// ════════════════════════════════════════════════════════════════

const $ = (s) => document.querySelector(s);
const cvs = $('#stage');
const ctx = cvs.getContext('2d');
let W = 0, H = 0, DPR = 1;

function fit(){
  DPR = Math.min(2, window.devicePixelRatio || 1);
  W = window.innerWidth;
  H = window.innerHeight;
  cvs.width = Math.floor(W * DPR);
  cvs.height = Math.floor(H * DPR);
  cvs.style.width = W + 'px';
  cvs.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
fit();
window.addEventListener('resize', fit);

// ──────── state ────────
const SAVE_KEY = 'pulse-clicker-v1';
const STATE_DEFAULT = () => ({
  pulses: 0,
  total: 0,
  clicks: 0,
  upgrades: { clickPower: 1, fragMul: 1, autoPulse: 0, lifeBoost: 1, comboBank: 1, glowPower: 1 },
});
let state = STATE_DEFAULT();

function loadSave(){
  try {
    const raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    const s = JSON.parse(raw);
    if (s && typeof s === 'object'){
      state.pulses  = +s.pulses  || 0;
      state.total   = +s.total   || 0;
      state.clicks  = +s.clicks  || 0;
      Object.assign(state.upgrades, s.upgrades || {});
    }
  } catch{}
}
let saveTimer = 0;
function saveSave(){
  try { localStorage.setItem(SAVE_KEY, JSON.stringify(state)); } catch{}
}

// ──────── upgrades catalog ────────
const UPGRADES = [
  { id:'clickPower',  name:'Click Power',     desc:'Each click is worth +1 pulse.',
    base: 12, mult: 1.6,
    cost: u => Math.ceil(u.base * Math.pow(u.mult, state.upgrades.clickPower - 1)),
    apply: () => { state.upgrades.clickPower += 1; },
    level: () => state.upgrades.clickPower },
  { id:'fragMul',     name:'Fragment Density',desc:'+1 fragment per click.',
    base: 60, mult: 2.2,
    cost: u => Math.ceil(u.base * Math.pow(u.mult, state.upgrades.fragMul - 1)),
    apply: () => { state.upgrades.fragMul += 1; },
    level: () => state.upgrades.fragMul,
    max: 10 },
  { id:'autoPulse',   name:'Auto-Pulse',      desc:'+0.4 pulses per second, drifting in from the edges.',
    base: 35, mult: 1.45,
    cost: u => Math.ceil(u.base * Math.pow(u.mult, state.upgrades.autoPulse)),
    apply: () => { state.upgrades.autoPulse += 1; },
    level: () => state.upgrades.autoPulse },
  { id:'lifeBoost',   name:'Lingering Glow',  desc:'Fragments live 25% longer.',
    base: 90, mult: 1.7,
    cost: u => Math.ceil(u.base * Math.pow(u.mult, state.upgrades.lifeBoost - 1)),
    apply: () => { state.upgrades.lifeBoost += 1; },
    level: () => state.upgrades.lifeBoost,
    max: 8 },
  { id:'comboBank',   name:'Combo Banking',   desc:'Combo decays 20% slower.',
    base: 140, mult: 1.55,
    cost: u => Math.ceil(u.base * Math.pow(u.mult, state.upgrades.comboBank - 1)),
    apply: () => { state.upgrades.comboBank += 1; },
    level: () => state.upgrades.comboBank,
    max: 8 },
  { id:'glowPower',   name:'Bloom Power',     desc:'Fragments glow brighter; combo earns +0.05× faster.',
    base: 220, mult: 1.6,
    cost: u => Math.ceil(u.base * Math.pow(u.mult, state.upgrades.glowPower - 1)),
    apply: () => { state.upgrades.glowPower += 1; },
    level: () => state.upgrades.glowPower,
    max: 10 },
];

function clickPowerVal(){ return state.upgrades.clickPower; }
function fragMulVal(){ return state.upgrades.fragMul; }
function autoPpsVal(){ return state.upgrades.autoPulse * 0.4; }
function lifeMulVal(){ return 1 + (state.upgrades.lifeBoost - 1) * 0.25; }
function comboDecayVal(){ return 1 - Math.min(0.7, (state.upgrades.comboBank - 1) * 0.20); }
function glowMulVal(){ return 1 + (state.upgrades.glowPower - 1) * 0.18; }
function comboEarnVal(){ return 0.04 + state.upgrades.glowPower * 0.05; }

// ──────── audio ────────
let actx = null, audioOn = false;
function ac(){
  if (!actx){ try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch{ return null; } }
  if (actx.state === 'suspended') actx.resume();
  return actx;
}
function setAudio(on){
  audioOn = on;
  const t = $('#audioToggle');
  t.setAttribute('aria-pressed', on ? 'true' : 'false');
  t.textContent = on ? '♪ on' : '♪ off';
  if (on) ac();
}
function blip(freq, dur=0.08, type='square', vol=0.06){
  if (!audioOn) return;
  const c = ac(); if (!c) return;
  const t = c.currentTime;
  const o = c.createOscillator(); o.type = type; o.frequency.value = freq;
  const g = c.createGain();
  g.gain.setValueAtTime(0, t);
  g.gain.linearRampToValueAtTime(vol, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);
  o.connect(g); g.connect(c.destination);
  o.start(t); o.stop(t + dur + 0.02);
}
function thump(){
  if (!audioOn) return;
  const c = ac(); if (!c) return;
  const t = c.currentTime;
  const o = c.createOscillator(); o.type = 'sine';
  o.frequency.setValueAtTime(80, t); o.frequency.exponentialRampToValueAtTime(40, t + 0.18);
  const g = c.createGain();
  g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.13, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.22);
  o.connect(g); g.connect(c.destination);
  o.start(t); o.stop(t + 0.25);
}

// ──────── fragments ────────
const SHAPES = ['triangle','square','hexagon','diamond','ring','cross','starburst','sparkle'];
const PALETTE = ['#ff2e9c','#00f0ff','#b5ff3a','#b13eff','#ffd03e','#ff7a3e'];
const fragments = [];
const FRAG_CAP = 280;

function spawnFragment(x, y, opts){
  if (fragments.length > FRAG_CAP){
    // drop the oldest fragment to keep performance steady
    fragments.shift();
  }
  const angle = opts && opts.angle != null ? opts.angle : Math.random() * Math.PI * 2;
  const speed = opts && opts.speed != null ? opts.speed : (50 + Math.random() * 130);
  const baseLife = (1.6 + Math.random() * 1.3) * lifeMulVal();
  fragments.push({
    x, y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed - (opts && opts.upward ? 50 : 0),
    rot: Math.random() * Math.PI * 2,
    rotV: (Math.random() - 0.5) * 5,
    scale: 14 + Math.random() * 18,
    pulsePhase: Math.random() * Math.PI * 2,
    shape: SHAPES[(Math.random() * SHAPES.length) | 0],
    color: opts && opts.color || PALETTE[(Math.random() * PALETTE.length) | 0],
    life: baseLife,
    maxLife: baseLife,
    auto: !!(opts && opts.auto),
  });
}

// ──────── floating "+N" labels ────────
const popups = [];
function pushPopup(x, y, text, color){
  popups.push({ x, y, vy: -50, text, color: color || '#ffd03e', life: 1.0, age: 0 });
}

// ──────── combo ────────
let combo = 1.0;
function bumpCombo(){
  const earn = comboEarnVal();
  combo = Math.min(12, combo + earn);
}
function decayCombo(dt){
  const decay = 0.8 * comboDecayVal();
  combo = Math.max(1, combo - decay * dt);
}

// ──────── beat ────────
let beatT = 0;
let beatPhase = 0;
const BPM = 120;
const BEAT_INTERVAL = 60 / BPM;     // 0.5s
function tickBeat(dt){
  beatT += dt;
  beatPhase = (beatT % BEAT_INTERVAL) / BEAT_INTERVAL;
  if (beatT >= BEAT_INTERVAL){
    beatT -= BEAT_INTERVAL;
    onBeat();
  }
}
function onBeat(){
  if (state.upgrades.autoPulse > 0){
    thump();
  }
}

// ──────── click handler ────────
let firstClick = false;
let _autoAccumulator = 0;

function doClick(x, y, fromPointer){
  if (!firstClick){
    firstClick = true;
    $('#clickHint').classList.add('gone');
    if (!audioOn) setAudio(true);
  }
  const power = clickPowerVal();
  const earn = Math.ceil(power * combo);
  state.pulses += earn;
  state.total += earn;
  state.clicks += 1;
  const fragCount = fragMulVal();
  for (let i = 0; i < fragCount; i++){
    const a = (Math.random() * Math.PI * 2);
    spawnFragment(x + (Math.random() - 0.5) * 6, y + (Math.random() - 0.5) * 6, { angle: a, speed: 80 + Math.random() * 180, upward: true });
  }
  pushPopup(x, y, '+' + earn, combo > 2 ? '#b5ff3a' : '#ffd03e');
  bumpCombo();
  blip(360 + Math.random() * 240 + combo * 40, 0.06);
  if (combo >= 4 && Math.random() < 0.3) blip(880 + Math.random() * 200, 0.04, 'triangle', 0.04);
  saveTimer = 0;
}

cvs.addEventListener('pointerdown', (e) => {
  e.preventDefault();
  doClick(e.clientX, e.clientY, true);
});

// ──────── update + render ────────
let last = performance.now();
function frame(now){
  const dt = Math.min(0.05, (now - last) / 1000);
  last = now;
  tickBeat(dt);
  decayCombo(dt);

  // auto-pulse
  const pps = autoPpsVal();
  if (pps > 0){
    _autoAccumulator += pps * dt;
    while (_autoAccumulator >= 1){
      _autoAccumulator -= 1;
      state.pulses += 1; state.total += 1;
      // spawn an auto-fragment drifting in from a random edge
      const edge = (Math.random() * 4) | 0;
      let x, y, ang;
      if (edge === 0){ x = -20; y = Math.random() * H; ang = 0 + (Math.random() - 0.5) * 0.6; }
      else if (edge === 1){ x = W + 20; y = Math.random() * H; ang = Math.PI + (Math.random() - 0.5) * 0.6; }
      else if (edge === 2){ x = Math.random() * W; y = -20; ang = Math.PI/2 + (Math.random() - 0.5) * 0.6; }
      else { x = Math.random() * W; y = H + 20; ang = -Math.PI/2 + (Math.random() - 0.5) * 0.6; }
      spawnFragment(x, y, { angle: ang, speed: 60 + Math.random() * 50, auto: true, color: '#00f0ff' });
    }
  }

  // tick fragments
  for (let i = fragments.length - 1; i >= 0; i--){
    const f = fragments[i];
    f.life -= dt;
    if (f.life <= 0){ fragments.splice(i, 1); continue; }
    f.x += f.vx * dt;
    f.y += f.vy * dt;
    f.rot += f.rotV * dt;
    f.vx *= Math.pow(0.97, dt * 60);
    f.vy *= Math.pow(0.97, dt * 60);
    f.pulsePhase += dt * 6;
    // bounce off edges (but auto-fragments pass through; let them fade off-screen)
    if (!f.auto){
      if (f.x < 18 && f.vx < 0){ f.vx = -f.vx * 0.78; f.x = 18; }
      if (f.x > W - 18 && f.vx > 0){ f.vx = -f.vx * 0.78; f.x = W - 18; }
      if (f.y < 18 && f.vy < 0){ f.vy = -f.vy * 0.78; f.y = 18; }
      if (f.y > H - 18 && f.vy > 0){ f.vy = -f.vy * 0.78; f.y = H - 18; }
    }
  }

  // tick popups
  for (let i = popups.length - 1; i >= 0; i--){
    const p = popups[i];
    p.age += dt;
    p.y += p.vy * dt;
    p.vy += 14 * dt;     // small upward decel
    p.life -= dt * 1.2;
    if (p.life <= 0) popups.splice(i, 1);
  }

  // ──── render ────
  // motion-blur fade overlay (instead of full clear)
  ctx.fillStyle = 'rgba(7, 2, 26, 0.18)';
  ctx.fillRect(0, 0, W, H);

  // fragments — additive blend for that neon glow
  ctx.globalCompositeOperation = 'lighter';
  const beatPulse = 1 + Math.sin(beatPhase * Math.PI * 2) * 0.06;
  for (const f of fragments){
    drawFragment(f, beatPulse);
  }
  ctx.globalCompositeOperation = 'source-over';

  // popups (above fragments, normal blend)
  for (const p of popups){
    ctx.globalAlpha = Math.max(0, Math.min(1, p.life));
    ctx.font = 'bold 22px "Audiowide", sans-serif';
    ctx.fillStyle = p.color;
    ctx.shadowBlur = 14; ctx.shadowColor = p.color;
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y);
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;

  // HUD updates (throttled below)
  hudTick(now);

  // periodic save (every ~1.5s of accumulated frames since last write)
  saveTimer += dt;
  if (saveTimer > 1.5){ saveTimer = 0; saveSave(); }

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);

function drawFragment(f, beatPulse){
  const lifeFrac = Math.max(0, f.life / f.maxLife);
  const alpha = Math.min(1, lifeFrac * 1.4);
  const scale = f.scale * (1 + Math.sin(f.pulsePhase) * 0.18) * beatPulse;
  ctx.save();
  ctx.translate(f.x, f.y);
  ctx.rotate(f.rot);
  ctx.globalAlpha = alpha;
  // fill
  ctx.fillStyle = f.color;
  ctx.shadowBlur = 18 * glowMulVal();
  ctx.shadowColor = f.color;
  drawShapePath(f.shape, scale);
  ctx.fill();
  // bright core stroke
  ctx.lineWidth = 2;
  ctx.strokeStyle = '#fff';
  ctx.globalAlpha = alpha * 0.65;
  drawShapePath(f.shape, scale);
  ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawShapePath(shape, r){
  ctx.beginPath();
  if (shape === 'triangle'){
    ctx.moveTo(0, -r);
    ctx.lineTo(r * 0.866, r * 0.5);
    ctx.lineTo(-r * 0.866, r * 0.5);
    ctx.closePath();
  } else if (shape === 'square'){
    ctx.rect(-r * 0.7, -r * 0.7, r * 1.4, r * 1.4);
  } else if (shape === 'hexagon'){
    for (let i = 0; i < 6; i++){
      const a = i / 6 * Math.PI * 2;
      const x = Math.cos(a) * r, y = Math.sin(a) * r;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
  } else if (shape === 'diamond'){
    ctx.moveTo(0, -r);
    ctx.lineTo(r * 0.7, 0);
    ctx.lineTo(0, r);
    ctx.lineTo(-r * 0.7, 0);
    ctx.closePath();
  } else if (shape === 'ring'){
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.arc(0, 0, r * 0.55, 0, Math.PI * 2, true);
  } else if (shape === 'cross'){
    const t = r * 0.34;
    ctx.rect(-t, -r, t * 2, r * 2);
    ctx.rect(-r, -t, r * 2, t * 2);
  } else if (shape === 'starburst'){
    for (let i = 0; i < 10; i++){
      const a = (i / 10) * Math.PI * 2;
      const rr = i & 1 ? r * 0.42 : r;
      const x = Math.cos(a) * rr, y = Math.sin(a) * rr;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
  } else { // sparkle (4-point)
    for (let i = 0; i < 8; i++){
      const a = (i / 8) * Math.PI * 2;
      const rr = i & 1 ? r * 0.28 : r;
      const x = Math.cos(a) * rr, y = Math.sin(a) * rr;
      if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
  }
}

// ──────── HUD ────────
let lastHud = 0;
function hudTick(now){
  if (now - lastHud < 80) return;
  lastHud = now;
  $('#pulsesEl').textContent = fmt(state.pulses);
  $('#totalEl').textContent  = fmt(state.total);
  $('#clicksEl').textContent = fmt(state.clicks);
  $('#ppsEl').textContent    = autoPpsVal().toFixed(1);
  const c = $('#comboEl');
  c.textContent = '×' + combo.toFixed(1);
  c.classList.toggle('cold', combo < 1.05);
  refreshUpgradesAffordability();
}
function fmt(n){
  if (n < 1000) return String(n | 0);
  if (n < 10000) return (n/1000).toFixed(2) + 'k';
  if (n < 1_000_000) return (n/1000).toFixed(1) + 'k';
  if (n < 1_000_000_000) return (n/1_000_000).toFixed(2) + 'm';
  return (n/1_000_000_000).toFixed(2) + 'b';
}

// ──────── upgrades render ────────
function renderUpgrades(){
  const host = $('#upgList');
  host.innerHTML = '';
  for (const u of UPGRADES){
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'upg';
    btn.dataset.id = u.id;
    btn.innerHTML = `
      <div>
        <div class="nm">${u.name}<span class="lvl">L${u.level()}${u.max ? '/'+u.max : ''}</span></div>
        <div class="desc">${u.desc}</div>
      </div>
      <div class="cost">${fmt(u.cost(u))}</div>
    `;
    btn.addEventListener('click', () => buyUpgrade(u.id));
    host.appendChild(btn);
  }
  refreshUpgradesAffordability();
}
function refreshUpgradesAffordability(){
  for (const btn of document.querySelectorAll('.upg')){
    const id = btn.dataset.id;
    const u = UPGRADES.find(x => x.id === id);
    if (!u) continue;
    const lvl = u.level();
    const isMax = u.max && lvl >= u.max;
    const c = u.cost(u);
    const afford = state.pulses >= c && !isMax;
    btn.classList.toggle('affordable', afford);
    btn.disabled = isMax;
    btn.querySelector('.cost').textContent = isMax ? 'MAX' : fmt(c);
    btn.querySelector('.lvl').textContent = 'L' + lvl + (u.max ? '/'+u.max : '');
  }
}
function buyUpgrade(id){
  const u = UPGRADES.find(x => x.id === id);
  if (!u) return;
  if (u.max && u.level() >= u.max) return;
  const c = u.cost(u);
  if (state.pulses < c){
    blip(180, 0.08, 'sawtooth', 0.05);
    return;
  }
  state.pulses -= c;
  u.apply();
  blip(820, 0.07, 'triangle', 0.07);
  setTimeout(() => blip(1240, 0.09, 'triangle', 0.06), 50);
  // shower of fragments around screen center on level-up
  for (let i = 0; i < 14; i++){
    const a = (i / 14) * Math.PI * 2;
    spawnFragment(W/2, H/2, { angle: a, speed: 220 + Math.random() * 80, color: '#b5ff3a' });
  }
  pushPopup(W/2, H * 0.45, 'L' + u.level() + ' · ' + u.name, '#b5ff3a');
  saveSave();
  renderUpgrades();
}

// ──────── footer controls ────────
$('#audioToggle').addEventListener('click', () => setAudio(!audioOn));
$('#resetBtn').addEventListener('click', () => {
  if (!confirm('Reset progress? All upgrades and pulses will vanish.')) return;
  state = STATE_DEFAULT();
  combo = 1; firstClick = false;
  fragments.length = 0;
  $('#clickHint').classList.remove('gone');
  saveSave();
  renderUpgrades();
});

// ──────── boot ────────
loadSave();
renderUpgrades();
</script>
