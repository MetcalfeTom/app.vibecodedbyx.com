<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Potion Shop Tycoon</title>
<link rel="icon" href="https://emojicdn.elk.sh/🧪">
<meta property="og:title" content="Potion Shop Tycoon">
<meta property="og:description" content="Brew magical potions and sell them to wizards, goblins, and dragons. Build your potion empire!">
<meta property="og:url" content="https://sloppy.live/potion-shop">
<meta property="og:image" content="https://sloppy.live/potion-shop/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Crimson+Pro:wght@300;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#12100a;--panel:#1a1610;--border:#2a2418;
  --text:#8a7a60;--bright:#d8c8a0;--gold:#e0b840;
  --potion1:#cc40a0;--potion2:#40b8e0;--potion3:#60d848;
  --potion4:#e06030;--potion5:#a060e0;
}
body{background:var(--bg);color:var(--text);font-family:'Crimson Pro',serif;
  min-height:100vh;display:flex;flex-direction:column;overflow-x:hidden;user-select:none}

#header{display:flex;justify-content:space-between;align-items:center;
  padding:10px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
#header .title{font-family:'Cinzel',serif;font-weight:700;font-size:clamp(14px,2.5vw,20px);
  color:var(--gold);letter-spacing:2px}
#header .stats{display:flex;gap:14px;font-size:13px;font-weight:500}
#header .stats span{color:var(--bright)}

#main{display:flex;flex:1;min-height:0;overflow:hidden}
@media(max-width:700px){#main{flex-direction:column}}

#shop-view{flex:1;display:flex;flex-direction:column;min-width:0;overflow-y:auto;
  padding:12px;gap:12px}
#brew-panel{flex-shrink:0}
#customers-panel{flex:1;min-height:120px}

#side-panel{width:clamp(220px,25vw,300px);background:var(--panel);
  border-left:1px solid var(--border);display:flex;flex-direction:column;
  overflow-y:auto;padding:12px;gap:10px;flex-shrink:0}
@media(max-width:700px){#side-panel{width:100%;border-left:none;border-top:1px solid var(--border);max-height:40vh}}

.section-title{font-family:'Cinzel',serif;font-weight:700;font-size:13px;
  color:var(--bright);letter-spacing:1px;margin-bottom:6px;
  border-bottom:1px solid var(--border);padding-bottom:4px}

/* Brewing */
#ingredients{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px}
.ingredient{padding:6px 10px;background:var(--bg);border:1px solid var(--border);
  border-radius:4px;cursor:pointer;font-size:12px;font-weight:500;transition:all .15s;
  display:flex;align-items:center;gap:4px}
.ingredient:hover{border-color:var(--gold);color:var(--bright)}
.ingredient.selected{border-color:var(--gold);background:rgba(224,184,64,0.08);color:var(--gold)}
.ingredient .cost{font-size:10px;color:var(--text);opacity:0.6}

#cauldron{position:relative;height:100px;background:var(--bg);border:1px solid var(--border);
  border-radius:8px;display:flex;align-items:center;justify-content:center;overflow:hidden;
  margin-bottom:8px}
#cauldron canvas{width:100%;height:100%;display:block}
#cauldron-slots{position:absolute;bottom:6px;display:flex;gap:4px}
.cauldron-slot{width:28px;height:28px;border-radius:50%;border:2px dashed rgba(200,184,144,0.2);
  display:flex;align-items:center;justify-content:center;font-size:14px;background:rgba(0,0,0,0.3)}
.cauldron-slot.filled{border-style:solid;border-color:var(--gold)}

#brew-btn{width:100%;padding:10px;background:var(--border);border:1px solid rgba(224,184,64,0.2);
  color:var(--bright);font-family:'Cinzel',serif;font-size:14px;font-weight:700;
  border-radius:4px;cursor:pointer;transition:all .2s;letter-spacing:1px}
#brew-btn:hover:not(:disabled){background:rgba(224,184,64,0.15);border-color:var(--gold);color:var(--gold)}
#brew-btn:disabled{opacity:0.3;cursor:default}

/* Inventory */
#inventory{display:flex;flex-direction:column;gap:4px}
.inv-potion{display:flex;align-items:center;gap:8px;padding:6px 8px;
  background:var(--bg);border:1px solid var(--border);border-radius:4px;
  font-size:12px;cursor:pointer;transition:all .15s}
.inv-potion:hover{border-color:var(--gold)}
.inv-potion .flask{font-size:18px}
.inv-potion .pname{flex:1;font-weight:500;color:var(--bright)}
.inv-potion .pcount{color:var(--text);font-size:11px}
.inv-potion .pprice{color:var(--gold);font-weight:600}

/* Customers */
#customer-queue{display:flex;gap:10px;flex-wrap:wrap;min-height:60px}
.customer{padding:10px;background:var(--bg);border:1px solid var(--border);border-radius:6px;
  width:140px;display:flex;flex-direction:column;align-items:center;gap:4px;
  transition:all .3s;position:relative;flex-shrink:0}
.customer.happy{border-color:var(--potion3);background:rgba(96,216,72,0.04)}
.customer.angry{border-color:#cc3030;background:rgba(204,48,48,0.04)}
.customer .face{font-size:32px}
.customer .cname{font-size:11px;font-weight:600;color:var(--bright)}
.customer .wants{font-size:10px;color:var(--text)}
.customer .timer-bar{width:100%;height:3px;border-radius:2px;background:var(--border);overflow:hidden}
.customer .timer-fill{height:100%;border-radius:2px;transition:width 0.3s}
.customer .offer{font-size:11px;color:var(--gold);font-weight:600}
.customer .sell-btn{padding:3px 10px;background:var(--border);border:1px solid rgba(224,184,64,0.2);
  color:var(--bright);font-size:10px;border-radius:3px;cursor:pointer;font-family:'Crimson Pro',serif;
  font-weight:600;margin-top:2px}
.customer .sell-btn:hover{border-color:var(--gold);color:var(--gold)}
.customer .sell-btn:disabled{opacity:0.3;cursor:default}

/* Upgrades */
.upgrade{display:flex;align-items:center;gap:8px;padding:6px 8px;
  background:var(--bg);border:1px solid var(--border);border-radius:4px;
  font-size:11px;cursor:pointer;transition:all .15s}
.upgrade:hover:not(.maxed){border-color:var(--gold)}
.upgrade.maxed{opacity:0.4;cursor:default}
.upgrade .uicon{font-size:18px}
.upgrade .uinfo{flex:1}
.upgrade .uname{font-weight:600;color:var(--bright);font-size:12px}
.upgrade .udesc{color:var(--text);font-size:10px}
.upgrade .ucost{color:var(--gold);font-weight:600;font-size:12px;white-space:nowrap}

#log{font-size:10px;color:var(--text);max-height:80px;overflow-y:auto;
  border-top:1px solid var(--border);padding-top:6px;margin-top:auto}
#log .entry{padding:1px 0;border-bottom:1px solid rgba(42,36,24,0.3)}
#log .gold-text{color:var(--gold)}

/* Recipe Book */
#recipe-book{display:flex;flex-direction:column;gap:3px;margin-bottom:6px}
#recipe-toggle{padding:6px 10px;background:var(--bg);border:1px solid var(--border);
  border-radius:4px;cursor:pointer;font-family:'Cinzel',serif;font-size:11px;
  font-weight:700;color:var(--text);letter-spacing:1px;transition:all .15s;text-align:center}
#recipe-toggle:hover{border-color:var(--gold);color:var(--bright)}
#recipe-list{display:none;flex-direction:column;gap:2px;max-height:200px;overflow-y:auto}
#recipe-list.open{display:flex}
.recipe-entry{display:flex;align-items:center;gap:6px;padding:4px 6px;
  background:var(--bg);border:1px solid var(--border);border-radius:3px;
  font-size:10px;cursor:pointer;transition:all .15s}
.recipe-entry:hover{border-color:var(--gold)}
.recipe-entry.locked{opacity:0.35}
.recipe-entry .remoji{font-size:14px}
.recipe-entry .rname{flex:1;color:var(--bright);font-weight:500}
.recipe-entry .ringr{color:var(--text);font-size:9px}
.recipe-entry .rprice{color:var(--gold);font-weight:600;font-size:10px}
.recipe-entry .rlock{color:#cc3030;font-size:9px}

/* Brew feedback */
#brew-feedback{font-size:11px;text-align:center;padding:4px;color:var(--gold);
  min-height:18px;transition:opacity .3s}

/* Shadow the Cat */
#shadow{position:fixed;z-index:999;pointer-events:none;font-size:28px;
  transition:none;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5));
  transform-origin:center bottom}
#shadow.sitting{animation:catSit 2s ease infinite}
#shadow.knocking{animation:catSwat 0.4s ease}
#shadow-name{position:absolute;bottom:-12px;left:50%;transform:translateX(-50%);
  font-family:'Cinzel',serif;font-size:7px;color:rgba(200,180,140,0.4);
  letter-spacing:1px;white-space:nowrap;opacity:0;transition:opacity 0.3s}
#shadow:hover ~ #shadow-name,
#shadow.sitting #shadow-name{opacity:1}
#shadow-thought{position:fixed;z-index:1000;pointer-events:none;
  background:rgba(26,22,16,0.95);border:1px solid var(--border);border-radius:8px;
  padding:4px 8px;font-size:10px;color:var(--text);font-style:italic;
  opacity:0;transition:opacity 0.3s;white-space:nowrap;
  font-family:'Crimson Pro',serif}
#shadow-thought.show{opacity:1}
#shadow-thought::after{content:'';position:absolute;bottom:-5px;left:12px;
  border:5px solid transparent;border-top-color:var(--border);border-bottom:0}
@keyframes catSit{0%,100%{transform:scaleX(1) translateY(0)}50%{transform:scaleX(1) translateY(-2px)}}
@keyframes catSwat{0%{transform:scaleX(1) rotate(0deg)}30%{transform:scaleX(1) rotate(-20deg)}
  60%{transform:scaleX(1) rotate(15deg)}100%{transform:scaleX(1) rotate(0deg)}}
#knock-splash{position:fixed;z-index:998;pointer-events:none;font-size:16px;
  opacity:0;transition:all 0.6s ease-out}
#knock-splash.splash{opacity:1;transform:translateY(-30px) scale(1.3)}

</style>
</head>
<body>
<div id="header">
  <div class="title">🧪 POTION SHOP</div>
  <div class="stats">
    <div>💰 <span id="gold">50</span>g</div>
    <div>⭐ <span id="rep">0</span> rep</div>
    <div>📅 Day <span id="day">1</span></div>
  </div>
</div>
<div id="main">
  <div id="shop-view">
    <div id="brew-panel">
      <div class="section-title">🔥 BREWING STATION</div>
      <div id="brew-feedback"></div>
      <div id="ingredients"></div>
      <div id="cauldron"><canvas id="cauldron-canvas"></canvas>
        <div id="cauldron-slots"></div>
      </div>
      <button id="brew-btn" disabled>BREW POTION</button>
    </div>
    <div id="customers-panel">
      <div class="section-title">🚪 CUSTOMERS</div>
      <div id="customer-queue"></div>
    </div>
  </div>
  <div id="side-panel">
    <div class="section-title">📦 INVENTORY</div>
    <div id="inventory"></div>
    <div class="section-title" style="margin-top:8px">📖 RECIPE BOOK</div>
    <div id="recipe-toggle" onclick="toggleRecipeBook()">Show Recipes ▾</div>
    <div id="recipe-list"></div>
    <div class="section-title" style="margin-top:8px">🔨 UPGRADES</div>
    <div id="upgrades"></div>
    <div id="log"></div>
      </div>
</div>

<div id="shadow">🐈‍⬛<span id="shadow-name">Shadow</span></div>
<div id="shadow-thought"></div>
<div id="knock-splash"></div>

<script>
// === DATA ===
const INGREDIENTS = [
  {id:'moonpetal',    name:'Moon Petal',     emoji:'🌸', cost:3,  color:'#e080c0'},
  {id:'dragontooth',  name:'Dragon Tooth',   emoji:'🦷', cost:5,  color:'#e0c040'},
  {id:'shadowmoss',   name:'Shadow Moss',    emoji:'🌿', cost:2,  color:'#408040'},
  {id:'starjelly',    name:'Star Jelly',     emoji:'⭐', cost:4,  color:'#a0a0ff'},
  {id:'firesalt',     name:'Fire Salt',      emoji:'🧂', cost:3,  color:'#e06030'},
  {id:'frostberry',   name:'Frost Berry',    emoji:'🫐', cost:4,  color:'#40a0e0'},
  {id:'voidessence',  name:'Void Essence',   emoji:'🌑', cost:8,  color:'#8040a0'},
  {id:'phoenix_ash',  name:'Phoenix Ash',    emoji:'🔥', cost:6,  color:'#e08020'},
];

const RECIPES = [
  {name:'Healing Tonic',     ingredients:['moonpetal','shadowmoss'],         color:'#cc40a0', emoji:'❤️‍🩹', basePrice:15, tier:1},
  {name:'Mana Elixir',       ingredients:['starjelly','frostberry'],         color:'#40b8e0', emoji:'💧',   basePrice:18, tier:1},
  {name:'Strength Brew',     ingredients:['dragontooth','firesalt'],         color:'#e06030', emoji:'💪',   basePrice:20, tier:1},
  {name:'Speed Serum',       ingredients:['shadowmoss','frostberry'],        color:'#60d848', emoji:'⚡',   basePrice:16, tier:1},
  {name:'Fire Resistance',   ingredients:['firesalt','frostberry'],          color:'#e09040', emoji:'🛡️',  basePrice:22, tier:2},
  {name:'Invisibility Draft', ingredients:['voidessence','shadowmoss'],      color:'#a060e0', emoji:'👻',   basePrice:35, tier:2},
  {name:'Dragon Vigor',      ingredients:['dragontooth','phoenix_ash'],      color:'#e04020', emoji:'🐉',   basePrice:40, tier:2},
  {name:'Moonlight Blessing',ingredients:['moonpetal','starjelly'],          color:'#d0b0ff', emoji:'🌙',   basePrice:25, tier:1},
  {name:'Void Walker',       ingredients:['voidessence','starjelly'],        color:'#6040c0', emoji:'🌀',   basePrice:45, tier:3},
  {name:'Phoenix Rebirth',   ingredients:['phoenix_ash','moonpetal'],        color:'#ff8040', emoji:'🔥',   basePrice:50, tier:3},
  {name:'Frostfire Elixir',  ingredients:['firesalt','frostberry','phoenix_ash'], color:'#80c0e0', emoji:'❄️', basePrice:55, tier:3},
  {name:'Ultimate Panacea',  ingredients:['moonpetal','dragontooth','voidessence'], color:'#ffd700', emoji:'✨', basePrice:80, tier:3},
];

const CREATURES = [
  {name:'Apprentice Wizard', emoji:'🧙', patience:20, priceRange:[0.8,1.2], prefTier:[1],   tip:0.1},
  {name:'Village Healer',    emoji:'👩‍⚕️', patience:25, priceRange:[0.9,1.1], prefTier:[1],   tip:0.15},
  {name:'Goblin Scout',      emoji:'👺', patience:12, priceRange:[0.6,0.9], prefTier:[1,2], tip:0},
  {name:'Elf Ranger',        emoji:'🧝', patience:18, priceRange:[1.0,1.4], prefTier:[1,2], tip:0.2},
  {name:'Dwarf Smith',       emoji:'⛏️', patience:22, priceRange:[0.9,1.3], prefTier:[1,2], tip:0.1},
  {name:'Knight Captain',    emoji:'🛡️', patience:15, priceRange:[1.1,1.5], prefTier:[2],   tip:0.15},
  {name:'Dragon Envoy',      emoji:'🐲', patience:10, priceRange:[1.5,2.5], prefTier:[2,3], tip:0.3},
  {name:'Shadow Thief',      emoji:'🥷', patience:8,  priceRange:[0.7,1.0], prefTier:[2,3], tip:0},
  {name:'Fairy Queen',       emoji:'🧚', patience:14, priceRange:[1.8,3.0], prefTier:[3],   tip:0.4},
  {name:'Demon Lord',        emoji:'😈', patience:6,  priceRange:[2.0,4.0], prefTier:[3],   tip:0.5},
];

const UPGRADES = [
  {id:'cauldron_size', name:'Bigger Cauldron',   desc:'Add +1 ingredient slot', icon:'🪣', costs:[50,120,300],    maxLvl:3, effect:'slots'},
  {id:'quality',       name:'Master Brewer',     desc:'Potions sell for +20% each', icon:'📜', costs:[80,200,500],   maxLvl:3, effect:'quality'},
  {id:'attract',       name:'Enchanted Sign',    desc:'Customers arrive faster', icon:'🪧', costs:[60,150,400],   maxLvl:3, effect:'attract'},
  {id:'haggle',        name:'Silver Tongue',     desc:'Better customer offers', icon:'🗣️', costs:[100,250,600],  maxLvl:3, effect:'haggle'},
  {id:'bulk_buy',      name:'Wholesale Deal',    desc:'Ingredients cost -20% each', icon:'📦', costs:[70,180,450],   maxLvl:3, effect:'discount'},
];

// === STATE ===
let gold = 50;
let reputation = 0;
let day = 1;
let potionInventory = {}; // name -> count
let selectedIngredients = [];
let customers = [];
let upgradeLevels = {};
let customerTimer = 0;
let dayTimer = 0;
const DAY_LENGTH = 60; // seconds
let maxSlots = 2;
let logs = [];

UPGRADES.forEach(u => upgradeLevels[u.id] = 0);

// === CAULDRON ANIMATION ===
const cc = document.getElementById('cauldron-canvas');
const cctx = cc.getContext('2d');
const bubbles = [];

function resizeCauldron(){
  const r = cc.parentElement.getBoundingClientRect();
  cc.width = r.width * 2;
  cc.height = r.height * 2;
}
resizeCauldron();
window.addEventListener('resize', resizeCauldron);

function drawCauldron(t){
  const w = cc.width, h = cc.height;
  cctx.fillStyle = '#0a0806';
  cctx.fillRect(0, 0, w, h);

  // Liquid
  const mixColor = getMixColor();
  const liquidH = h * 0.55;
  const liquidY = h - liquidH;
  const lGrad = cctx.createLinearGradient(0, liquidY, 0, h);
  lGrad.addColorStop(0, mixColor + '60');
  lGrad.addColorStop(0.5, mixColor + 'aa');
  lGrad.addColorStop(1, mixColor + 'dd');
  cctx.fillStyle = lGrad;

  // Wavy top
  cctx.beginPath();
  cctx.moveTo(0, h);
  cctx.lineTo(0, liquidY);
  for(let x = 0; x <= w; x += 8){
    const wave = Math.sin(x*0.02+t*3)*6 + Math.sin(x*0.04+t*2)*3;
    cctx.lineTo(x, liquidY + wave);
  }
  cctx.lineTo(w, h);
  cctx.closePath();
  cctx.fill();

  // Bubbles
  if(selectedIngredients.length > 0 && Math.random() < 0.15){
    bubbles.push({
      x: w*0.2 + Math.random()*w*0.6,
      y: h - 10,
      r: 3 + Math.random()*8,
      speed: 0.5 + Math.random()*1.5,
      alpha: 0.6,
    });
  }
  for(let i = bubbles.length-1; i >= 0; i--){
    const b = bubbles[i];
    b.y -= b.speed;
    b.x += Math.sin(t*4+i)*0.5;
    b.alpha -= 0.005;
    if(b.alpha <= 0 || b.y < 0){ bubbles.splice(i,1); continue; }
    cctx.beginPath();
    cctx.arc(b.x, b.y, b.r, 0, Math.PI*2);
    cctx.fillStyle = mixColor + Math.floor(b.alpha*80).toString(16).padStart(2,'0');
    cctx.fill();
    cctx.strokeStyle = mixColor + Math.floor(b.alpha*40).toString(16).padStart(2,'0');
    cctx.lineWidth = 0.5;
    cctx.stroke();
  }

  // Steam
  cctx.fillStyle = 'rgba(200,180,150,0.03)';
  for(let i = 0; i < 4; i++){
    const sx = w*0.3 + Math.sin(t*0.8+i*2)*w*0.2;
    const sy = liquidY - 20 - Math.sin(t*1.2+i)*15;
    cctx.beginPath();
    cctx.ellipse(sx, sy, 20+Math.sin(t+i)*8, 8, 0, 0, Math.PI*2);
    cctx.fill();
  }
}

function getMixColor(){
  if(selectedIngredients.length === 0) return '#333333';
  let r=0,g=0,b=0;
  for(const id of selectedIngredients){
    const ing = INGREDIENTS.find(i => i.id === id);
    if(!ing) continue;
    const c = hexToRgb(ing.color);
    r += c.r; g += c.g; b += c.b;
  }
  const n = selectedIngredients.length;
  return rgbToHex(Math.floor(r/n), Math.floor(g/n), Math.floor(b/n));
}

function hexToRgb(hex){
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}
function rgbToHex(r,g,b){
  return '#'+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
}

// === UI RENDERING ===
function renderIngredients(){
  const el = document.getElementById('ingredients');
  el.innerHTML = '';
  const discountMult = 1 - upgradeLevels.bulk_buy * 0.2;
  INGREDIENTS.forEach(ing => {
    const div = document.createElement('div');
    div.className = 'ingredient' + (selectedIngredients.includes(ing.id)?' selected':'');
    const cost = Math.ceil(ing.cost * discountMult);
    div.innerHTML = `${ing.emoji} ${ing.name} <span class="cost">${cost}g</span>`;
    div.onclick = () => toggleIngredient(ing.id);
    el.appendChild(div);
  });
}

function renderCauldronSlots(){
  const el = document.getElementById('cauldron-slots');
  el.innerHTML = '';
  for(let i = 0; i < maxSlots; i++){
    const div = document.createElement('div');
    div.className = 'cauldron-slot' + (selectedIngredients[i]?' filled':'');
    if(selectedIngredients[i]){
      const ing = INGREDIENTS.find(x => x.id === selectedIngredients[i]);
      div.textContent = ing ? ing.emoji : '';
    }
    el.appendChild(div);
  }
}

function renderInventory(){
  const el = document.getElementById('inventory');
  el.innerHTML = '';
  const qualityMult = 1 + upgradeLevels.quality * 0.2;
  for(const [name, count] of Object.entries(potionInventory)){
    if(count <= 0) continue;
    const recipe = RECIPES.find(r => r.name === name);
    if(!recipe) continue;
    const price = Math.floor(recipe.basePrice * qualityMult);
    const div = document.createElement('div');
    div.className = 'inv-potion';
    div.innerHTML = `<span class="flask">${recipe.emoji}</span>
      <span class="pname">${name}</span>
      <span class="pcount">×${count}</span>
      <span class="pprice">${price}g</span>`;
    el.appendChild(div);
  }
  if(Object.values(potionInventory).every(v => v <= 0)){
    el.innerHTML = '<div style="font-size:11px;color:var(--text);padding:8px;text-align:center">No potions yet. Brew some!</div>';
  }
}

function renderCustomers(){
  const el = document.getElementById('customer-queue');
  el.innerHTML = '';
  if(customers.length === 0){
    el.innerHTML = '<div style="font-size:12px;color:var(--text);padding:16px;text-align:center">No customers yet... they\'ll arrive soon.</div>';
    return;
  }
  const qualityMult = 1 + upgradeLevels.quality * 0.2;
  const haggleMult = 1 + upgradeLevels.haggle * 0.15;
  for(const c of customers){
    const div = document.createElement('div');
    div.className = 'customer' + (c.state==='happy'?' happy':'') + (c.state==='angry'?' angry':'');
    const pct = Math.max(0, c.patience / c.maxPatience * 100);
    const pColor = pct > 50 ? 'var(--potion3)' : pct > 20 ? 'var(--gold)' : '#cc3030';
    const offer = Math.floor(c.wantedRecipe.basePrice * c.priceMult * qualityMult * haggleMult);
    const hasPotion = (potionInventory[c.wantedRecipe.name]||0) > 0;
    div.innerHTML = `
      <div class="face">${c.creature.emoji}</div>
      <div class="cname">${c.creature.name}</div>
      <div class="wants">Wants: ${c.wantedRecipe.emoji} ${c.wantedRecipe.name}</div>
      <div class="offer">Offers ${offer}g</div>
      <div class="timer-bar"><div class="timer-fill" style="width:${pct}%;background:${pColor}"></div></div>
      <button class="sell-btn" ${hasPotion&&c.state==='waiting'?'':'disabled'} data-cid="${c.id}">SELL</button>
    `;
    el.appendChild(div);
  }
  // Attach sell handlers
  el.querySelectorAll('.sell-btn:not(:disabled)').forEach(btn => {
    btn.onclick = () => sellToCustomer(btn.dataset.cid);
  });
}

function renderUpgrades(){
  const el = document.getElementById('upgrades');
  el.innerHTML = '';
  for(const u of UPGRADES){
    const lvl = upgradeLevels[u.id];
    const maxed = lvl >= u.maxLvl;
    const cost = maxed ? '—' : u.costs[lvl] + 'g';
    const div = document.createElement('div');
    div.className = 'upgrade' + (maxed?' maxed':'');
    div.innerHTML = `<span class="uicon">${u.icon}</span>
      <div class="uinfo"><div class="uname">${u.name} ${'⬆'.repeat(lvl)}</div><div class="udesc">${u.desc}</div></div>
      <span class="ucost">${cost}</span>`;
    if(!maxed) div.onclick = () => buyUpgrade(u.id);
    el.appendChild(div);
  }
}

function addLog(text){
  logs.unshift(text);
  if(logs.length > 30) logs.pop();
  const el = document.getElementById('log');
  el.innerHTML = logs.map(l => `<div class="entry">${l}</div>`).join('');
}

function updateHeader(){
  document.getElementById('gold').textContent = gold;
  document.getElementById('rep').textContent = reputation;
  document.getElementById('day').textContent = day;
}

// === GAME LOGIC ===
function toggleIngredient(id){
  const idx = selectedIngredients.indexOf(id);
  if(idx !== -1){
    selectedIngredients.splice(idx, 1);
  } else if(selectedIngredients.length < maxSlots){
    selectedIngredients.push(id);
  }
  renderIngredients();
  renderCauldronSlots();
  updateBrewButton();
}

function updateBrewButton(){
  const recipe = findRecipe();
  const btn = document.getElementById('brew-btn');
  const fb = document.getElementById('brew-feedback');
  if(recipe && canAffordIngredients()){
    btn.disabled = false;
    btn.textContent = `BREW: ${recipe.emoji} ${recipe.name}`;
    fb.textContent = `Ready to brew ${recipe.name}!`;
    fb.style.color = 'var(--gold)';
  } else if(recipe && !canAffordIngredients()){
    btn.disabled = true;
    btn.textContent = `Can't afford ${recipe.name}`;
    fb.textContent = `Need more gold for ingredients`;
    fb.style.color = '#cc3030';
  } else if(selectedIngredients.length >= 2 && !recipe){
    btn.disabled = true;
    btn.textContent = 'Unknown recipe...';
    fb.textContent = 'No recipe matches — check the recipe book';
    fb.style.color = '#cc3030';
  } else if(selectedIngredients.length === 1){
    btn.disabled = true;
    btn.textContent = 'Add one more ingredient...';
    const partialMatches = RECIPES.filter(r => r.ingredients.includes(selectedIngredients[0]) && r.ingredients.length <= maxSlots);
    if(partialMatches.length > 0){
      fb.textContent = `Can make: ${partialMatches.map(r => r.emoji).join(' ')} — add another ingredient`;
      fb.style.color = 'var(--text)';
    } else {
      fb.textContent = '';
    }
  } else {
    btn.disabled = true;
    btn.textContent = 'Select ingredients to brew';
    fb.textContent = '';
  }
}

function findRecipe(){
  const sorted = [...selectedIngredients].sort();
  return RECIPES.find(r => {
    const rs = [...r.ingredients].sort();
    return rs.length === sorted.length && rs.every((v,i) => v === sorted[i]);
  });
}

function canAffordIngredients(){
  const discountMult = 1 - upgradeLevels.bulk_buy * 0.2;
  let total = 0;
  for(const id of selectedIngredients){
    const ing = INGREDIENTS.find(i => i.id === id);
    if(ing) total += Math.ceil(ing.cost * discountMult);
  }
  return gold >= total;
}

document.getElementById('brew-btn').onclick = () => {
  const recipe = findRecipe();
  if(!recipe || !canAffordIngredients()) return;
  // Pay
  const discountMult = 1 - upgradeLevels.bulk_buy * 0.2;
  let cost = 0;
  for(const id of selectedIngredients){
    const ing = INGREDIENTS.find(i => i.id === id);
    if(ing) cost += Math.ceil(ing.cost * discountMult);
  }
  gold -= cost;
  // Add to inventory
  potionInventory[recipe.name] = (potionInventory[recipe.name]||0) + 1;
  addLog(`Brewed ${recipe.emoji} <b>${recipe.name}</b> for <span class="gold-text">${cost}g</span>`);
  // Flash feedback
  const fb = document.getElementById('brew-feedback');
  fb.textContent = `✨ Brewed ${recipe.emoji} ${recipe.name}! ✨`;
  fb.style.color = 'var(--potion3)';
  // Flash cauldron
  const cauldron = document.getElementById('cauldron');
  cauldron.style.borderColor = recipe.color;
  cauldron.style.boxShadow = '0 0 20px ' + recipe.color + '40';
  setTimeout(() => {
    cauldron.style.borderColor = '';
    cauldron.style.boxShadow = '';
  }, 600);
  selectedIngredients = [];
  renderAll();
};

function sellToCustomer(cid){
  const c = customers.find(x => String(x.id) === String(cid));
  if(!c || c.state !== 'waiting') return;
  const name = c.wantedRecipe.name;
  if((potionInventory[name]||0) <= 0) return;
  potionInventory[name]--;
  const qualityMult = 1 + upgradeLevels.quality * 0.2;
  const haggleMult = 1 + upgradeLevels.haggle * 0.15;
  let payment = Math.floor(c.wantedRecipe.basePrice * c.priceMult * qualityMult * haggleMult);
  // Tip
  const tipChance = c.creature.tip;
  if(Math.random() < tipChance){
    const tip = Math.floor(payment * 0.3);
    payment += tip;
    addLog(`${c.creature.emoji} left a <span class="gold-text">${tip}g tip!</span>`);
  }
  gold += payment;
  reputation += c.wantedRecipe.tier;
  c.state = 'happy';
  addLog(`Sold ${c.wantedRecipe.emoji} to ${c.creature.emoji} for <span class="gold-text">${payment}g</span>`);
  setTimeout(() => {
    customers = customers.filter(x => String(x.id) !== String(cid));
    renderAll();
  }, 800);
  renderAll();
}

function buyUpgrade(id){
  const u = UPGRADES.find(x => x.id === id);
  const lvl = upgradeLevels[id];
  if(lvl >= u.maxLvl) return;
  const cost = u.costs[lvl];
  if(gold < cost) return;
  gold -= cost;
  upgradeLevels[id]++;
  if(u.effect === 'slots') maxSlots = 2 + upgradeLevels[id];
  addLog(`Upgraded ${u.icon} <b>${u.name}</b> to level ${upgradeLevels[id]}`);
  renderAll();
}

function spawnCustomer(){
  // Filter creatures by available potions + reputation
  const availTiers = reputation < 10 ? [1] : reputation < 30 ? [1,2] : [1,2,3];
  const possibleCreatures = CREATURES.filter(c =>
    c.prefTier.some(t => availTiers.includes(t))
  );
  const creature = possibleCreatures[Math.floor(Math.random()*possibleCreatures.length)];
  const possibleRecipes = RECIPES.filter(r =>
    creature.prefTier.includes(r.tier) && availTiers.includes(r.tier)
  );
  if(possibleRecipes.length === 0) return;
  const recipe = possibleRecipes[Math.floor(Math.random()*possibleRecipes.length)];
  const priceMult = creature.priceRange[0] + Math.random()*(creature.priceRange[1]-creature.priceRange[0]);

  customers.push({
    id: Date.now() + Math.random(),
    creature,
    wantedRecipe: recipe,
    priceMult,
    patience: creature.patience,
    maxPatience: creature.patience,
    state: 'waiting',
  });
}

let recipeBookOpen = false;
function toggleRecipeBook(){
  recipeBookOpen = !recipeBookOpen;
  const list = document.getElementById('recipe-list');
  const toggle = document.getElementById('recipe-toggle');
  list.classList.toggle('open', recipeBookOpen);
  toggle.textContent = recipeBookOpen ? 'Hide Recipes ▴' : 'Show Recipes ▾';
  if(recipeBookOpen) renderRecipeBook();
}

function renderRecipeBook(){
  const el = document.getElementById('recipe-list');
  el.innerHTML = '';
  const qualityMult = 1 + upgradeLevels.quality * 0.2;
  for(const r of RECIPES){
    const needsSlots = r.ingredients.length;
    const locked = needsSlots > maxSlots;
    const ingNames = r.ingredients.map(id => {
      const ing = INGREDIENTS.find(i => i.id === id);
      return ing ? ing.emoji : id;
    }).join(' + ');
    const price = Math.floor(r.basePrice * qualityMult);
    const div = document.createElement('div');
    div.className = 'recipe-entry' + (locked ? ' locked' : '');
    div.innerHTML = `<span class="remoji">${r.emoji}</span>
      <span class="rname">${r.name}</span>
      <span class="ringr">${ingNames}</span>
      ${locked ? '<span class="rlock">🔒'+needsSlots+' slots</span>' : '<span class="rprice">'+price+'g</span>'}`;
    if(!locked){
      div.onclick = () => {
        // Auto-select this recipe's ingredients
        selectedIngredients = [...r.ingredients];
        renderIngredients();
        renderCauldronSlots();
        updateBrewButton();
      };
    }
    el.appendChild(div);
  }
}

function renderAll(){
  renderIngredients();
  renderCauldronSlots();
  renderInventory();
  renderCustomers();
  renderUpgrades();
  updateBrewButton();
  updateHeader();
  if(recipeBookOpen) renderRecipeBook();
}

// === GAME LOOP ===
let lastTime = 0;
function tick(timestamp){
  const dt = Math.min(0.1, (timestamp - lastTime) / 1000);
  lastTime = timestamp;
  const t = timestamp * 0.001;

  drawCauldron(t);
  updateShadow(dt);

  // Customer spawning
  const attractMult = 1 + upgradeLevels.attract * 0.35;
  customerTimer += dt * attractMult;
  const spawnInterval = Math.max(3, 10 - reputation*0.05);
  if(customerTimer > spawnInterval && customers.length < 6){
    customerTimer = 0;
    spawnCustomer();
    renderCustomers();
  }

  // Customer patience decay
  let needsRender = false;
  for(const c of customers){
    if(c.state !== 'waiting') continue;
    c.patience -= dt;
    if(c.patience <= 0){
      c.state = 'angry';
      reputation = Math.max(0, reputation - 1);
      addLog(`${c.creature.emoji} ${c.creature.name} left angry! -1 rep`);
      needsRender = true;
      setTimeout(() => {
        customers = customers.filter(x => x.id !== c.id);
        renderAll();
      }, 1000);
    }
  }

  // Day timer
  dayTimer += dt;
  if(dayTimer >= DAY_LENGTH){
    dayTimer = 0;
    day++;
    addLog(`📅 <b>Day ${day}</b> begins. New customers approach...`);
    // Bonus customers on new day
    spawnCustomer();
    needsRender = true;
  }

  if(needsRender || Math.floor(timestamp/500) !== Math.floor((timestamp-16)/500)){
    renderCustomers();
    updateHeader();
  }

  requestAnimationFrame(tick);
}

// === SHADOW THE CAT ===
const shadowEl = document.getElementById('shadow');
const shadowThought = document.getElementById('shadow-thought');
const knockSplash = document.getElementById('knock-splash');
let shadowX = 100, shadowY = 100;
let shadowTargetX = 100, shadowTargetY = 100;
let shadowFacing = 1; // 1=right, -1=left
let shadowState = 'follow'; // follow, sitting, knocking
let shadowSitTimer = 0;
let shadowKnockTimer = 8 + Math.random()*15;
let shadowThoughtTimer = 0;
let shadowIdleTime = 0;
let mouseX = 100, mouseY = 100;

const CAT_THOUGHTS = [
  '*purrs contentedly*','*stares at nothing*','*tail swish*',
  '*judges your potions*','*yawns*','...mrrp?',
  '*kneads the counter*','*sniffs a vial*','*ear twitch*',
  '*plots mischief*','*blinks slowly*','*stretches*',
];
const KNOCK_QUIPS = [
  'Shadow knocked over a','Shadow swatted a','Shadow batted a',
  'Shadow casually pushed a','Shadow "accidentally" tipped a',
  'Shadow stared at you while pushing a',
];

document.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
document.addEventListener('touchmove', e => {
  if(e.touches[0]){ mouseX = e.touches[0].clientX; mouseY = e.touches[0].clientY; }
}, {passive:true});

function updateShadow(dt){
  shadowKnockTimer -= dt;
  shadowThoughtTimer -= dt;

  // Follow cursor with lazy cat lag
  const dx = mouseX - shadowX;
  const dy = mouseY - shadowY;
  const dist = Math.sqrt(dx*dx+dy*dy);

  if(dist > 80){
    // Cat follows when cursor is far
    shadowState = 'follow';
    shadowIdleTime = 0;
    shadowEl.classList.remove('sitting');
    const speed = Math.min(dist*0.04, 6);
    shadowX += (dx/dist)*speed;
    shadowY += (dy/dist)*speed;
    if(dx > 2) shadowFacing = 1;
    else if(dx < -2) shadowFacing = -1;
  } else {
    // Cat is close — idle
    shadowIdleTime += dt;
    if(shadowIdleTime > 3 && shadowState !== 'sitting'){
      shadowState = 'sitting';
      shadowEl.classList.add('sitting');
    }
    // Slight drift toward cursor
    shadowX += dx*0.01;
    shadowY += dy*0.01;
  }

  // Position cat (offset below and to the side of cursor)
  shadowEl.style.left = (shadowX - 14) + 'px';
  shadowEl.style.top = (shadowY + 8) + 'px';
  shadowEl.style.transform = `scaleX(${shadowFacing})`;

  // Thought bubble position
  shadowThought.style.left = (shadowX - 40) + 'px';
  shadowThought.style.top = (shadowY - 22) + 'px';

  // Random thoughts when sitting
  if(shadowState === 'sitting' && shadowThoughtTimer <= 0 && Math.random() < 0.01){
    showCatThought(CAT_THOUGHTS[Math.floor(Math.random()*CAT_THOUGHTS.length)]);
    shadowThoughtTimer = 6 + Math.random()*10;
  }

  // KNOCK OVER A POTION
  if(shadowKnockTimer <= 0){
    shadowKnockTimer = 15 + Math.random()*25;
    attemptKnock();
  }
}

function showCatThought(text){
  shadowThought.textContent = text;
  shadowThought.classList.add('show');
  setTimeout(() => shadowThought.classList.remove('show'), 2500);
}

function attemptKnock(){
  // Find a potion to knock over
  const available = Object.entries(potionInventory).filter(([n,c]) => c > 0);
  if(available.length === 0) return;

  const [potionName, count] = available[Math.floor(Math.random()*available.length)];
  const recipe = RECIPES.find(r => r.name === potionName);
  if(!recipe) return;

  // Knock it!
  potionInventory[potionName]--;
  shadowState = 'knocking';
  shadowEl.classList.remove('sitting');
  shadowEl.classList.add('knocking');

  // Splash effect at cat position
  knockSplash.textContent = recipe.emoji;
  knockSplash.style.left = shadowX + 'px';
  knockSplash.style.top = shadowY + 'px';
  knockSplash.style.opacity = '0';
  knockSplash.style.transform = 'translateY(0) scale(1)';
  knockSplash.classList.remove('splash');
  void knockSplash.offsetWidth; // reflow
  knockSplash.classList.add('splash');

  const quip = KNOCK_QUIPS[Math.floor(Math.random()*KNOCK_QUIPS.length)];
  addLog(`🐈‍⬛ ${quip} <b>${recipe.emoji} ${potionName}</b>!`);
  showCatThought('*innocent face*');

  setTimeout(() => {
    shadowEl.classList.remove('knocking');
    knockSplash.classList.remove('splash');
    knockSplash.style.opacity = '0';
    renderInventory();
  }, 600);

  renderInventory();
}

// === INIT ===
renderAll();
requestAnimationFrame(tick);
</script>
