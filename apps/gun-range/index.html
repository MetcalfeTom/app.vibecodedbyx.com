<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Gun Range</title>
<link rel="icon" href="https://emojicdn.elk.sh/🎯">
<meta property="og:title" content="Gun Range">
<meta property="og:description" content="Borderlands-style firing range. Switch manufacturers, swap elements, shred targets.">
<meta property="og:url" content="https://sloppy.live/gun-range/">
<meta property="og:image" content="https://sloppy.live/gun-range/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Teko:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0f;font-family:'Share Tech Mono',monospace;cursor:none}
canvas{display:block;position:fixed;inset:0;z-index:0}
#crosshair{position:fixed;pointer-events:none;z-index:50;width:24px;height:24px;transform:translate(-50%,-50%)}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(255,255,255,.7)}
#crosshair::before{width:2px;height:100%;left:50%;transform:translateX(-50%)}
#crosshair::after{width:100%;height:2px;top:50%;transform:translateY(-50%)}
#crosshair .dot{position:absolute;width:4px;height:4px;background:#ff2d2d;border-radius:50%;top:50%;left:50%;transform:translate(-50%,-50%)}
#hud{position:fixed;bottom:0;left:0;right:0;z-index:5;padding:10px;display:flex;justify-content:space-between;align-items:flex-end;pointer-events:none}
#weapon-info{pointer-events:none}
.w-name{font-family:'Teko',sans-serif;font-weight:700;font-size:1.6rem;letter-spacing:.05em;line-height:1}
.w-detail{font-size:.65rem;color:#888;margin-top:2px;letter-spacing:.1em}
#ammo-display{font-family:'Teko',sans-serif;font-weight:700;font-size:2.2rem;color:#fff;text-align:right;line-height:1}
#ammo-display .mag{color:#ffd700}
#ammo-display .reserve{color:#888;font-size:1.2rem}
#ammo-display .reload-text{color:#ff4444;font-size:.8rem;letter-spacing:.15em}
#controls{position:fixed;top:10px;left:10px;z-index:10;display:flex;flex-direction:column;gap:6px;pointer-events:all}
.ctrl-row{display:flex;gap:4px;flex-wrap:wrap}
.ctrl-btn{font-family:'Teko',sans-serif;font-weight:600;font-size:.85rem;padding:4px 10px;background:rgba(20,20,30,.85);border:1px solid #333;color:#aaa;cursor:pointer;letter-spacing:.1em;transition:all .15s;border-radius:2px;pointer-events:all}
.ctrl-btn:hover{border-color:#888;color:#fff}
.ctrl-btn.active{border-color:var(--ac,#ffd700);color:var(--ac,#ffd700);background:rgba(255,215,0,.08)}
.ctrl-label{font-size:.55rem;color:#555;letter-spacing:.15em;margin-bottom:2px;padding-left:2px}
#score-display{position:fixed;top:10px;right:10px;z-index:5;text-align:right}
#score-display .score{font-family:'Teko',sans-serif;font-weight:700;font-size:2rem;color:#ffd700;line-height:1}
#score-display .combo{font-size:.7rem;color:#ff851b;letter-spacing:.1em}
#score-display .hits{font-size:.6rem;color:#555;margin-top:2px}
.dmg-num{position:fixed;pointer-events:none;z-index:20;font-family:'Teko',sans-serif;font-weight:700;animation:dmgFloat 1s ease-out forwards}
@keyframes dmgFloat{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(.7)}}
.back-link{position:fixed;bottom:10px;left:50%;transform:translateX(-50%);z-index:20;color:rgba(255,255,255,.08);font-size:9px;text-decoration:none;font-family:'Share Tech Mono',monospace;pointer-events:all}
.back-link:hover{color:#ffd700}
</style>
</head>
<body>
<div id="crosshair"><div class="dot"></div></div>
<canvas id="cv"></canvas>

<div id="controls">
  <div class="ctrl-label">MANUFACTURER [1-4]</div>
  <div class="ctrl-row" id="mfr-btns"></div>
  <div class="ctrl-label">ELEMENT [Q-T]</div>
  <div class="ctrl-row" id="elem-btns"></div>
</div>

<div id="score-display">
  <div class="score" id="score">0</div>
  <div class="combo" id="combo"></div>
  <div class="hits" id="hits">0 / 0</div>
</div>

<div id="hud">
  <div id="weapon-info">
    <div class="w-name" id="w-name">DAHL BURST</div>
    <div class="w-detail" id="w-detail">3-ROUND BURST &middot; NONE</div>
  </div>
  <div id="ammo-display">
    <div><span class="mag" id="mag">36</span> <span class="reserve">/ 999</span></div>
    <div class="reload-text" id="reload-text"></div>
  </div>
</div>

<a class="back-link" href="https://sloppy.live">sloppy.live</a>

<script>
var CV=document.getElementById('cv');
var X=CV.getContext('2d');
var W,H;
function resize(){W=CV.width=window.innerWidth;H=CV.height=window.innerHeight;}
resize();window.addEventListener('resize',function(){resize();spawnTargets();});

var mx=W/2,my=H/2;
var crosshair=document.getElementById('crosshair');
document.addEventListener('mousemove',function(e){mx=e.clientX;my=e.clientY;crosshair.style.left=mx+'px';crosshair.style.top=my+'px';});

// --- MANUFACTURERS ---
var MFRS=[
  {name:'DAHL',color:'#4a7c2e',mode:'burst',burstCount:3,burstDelay:50,fireRate:120,dmgBase:35,magSize:36,reload:2.2,spread:2,desc:'3-ROUND BURST'},
  {name:'VLADOF',color:'#cc2222',mode:'auto',burstCount:1,burstDelay:0,fireRate:45,dmgBase:22,magSize:60,reload:2.8,spread:4,desc:'FULL AUTO'},
  {name:'TORGUE',color:'#ff8c00',mode:'semi',burstCount:1,burstDelay:0,fireRate:300,dmgBase:120,magSize:8,reload:3.5,spread:6,desc:'EXPLOSIVE SEMI-AUTO',explosive:true},
  {name:'MALIWAN',color:'#9b59b6',mode:'charge',burstCount:1,burstDelay:0,fireRate:180,dmgBase:80,magSize:20,reload:2.0,spread:1,desc:'CHARGE BEAM',chargeTime:400},
];
var curMfr=0;

// --- ELEMENTS ---
var ELEMS=[
  {name:'NONE',color:'#cccccc',key:'q'},
  {name:'FIRE',color:'#ff4500',key:'w',dot:true,dotColor:'#ff6622',particles:'fire'},
  {name:'SHOCK',color:'#00bfff',key:'e',chain:true,particles:'spark'},
  {name:'CORROSIVE',color:'#39ff14',key:'r',dot:true,dotColor:'#2ecc40',particles:'acid'},
  {name:'CRYO',color:'#88ccff',key:'t',slow:true,particles:'ice'},
];
var curElem=0;

// --- GUN STATE ---
var gun={mag:36,reserve:999,reloading:false,reloadTimer:0,
  fireTimer:0,burstQueue:0,burstTimer:0,
  charging:false,chargeTimer:0,chargeReady:false,
  recoilX:0,recoilY:0,muzzleFlash:0,shellEject:[]};

// --- TARGETS ---
var targets=[];
function spawnTargets(){
  targets=[];
  var cols=Math.max(3,Math.floor(W/200));
  var rows=3;
  for(var r=0;r<rows;r++){
    for(var c=0;c<cols;c++){
      var tx=W*0.15+c*((W*0.7)/(cols-1));
      var ty=H*0.2+r*(H*0.2);
      targets.push({
        x:tx,y:ty,r:22+Math.random()*10,
        hp:100,maxHp:100,
        respawnTimer:0,alive:true,
        dotTimer:0,dotDmg:0,dotColor:'',
        slowTimer:0,shakeX:0,shakeY:0,
        chainTarget:false
      });
    }
  }
}
spawnTargets();

// --- SCORING ---
var score=0,combo=0,comboTimer=0,totalShots=0,totalHits=0;

// --- PARTICLES ---
var particles=[];
var tracers=[];
var shells=[];

function spawnHitParticles(x,y,count,color){
  for(var i=0;i<count;i++){
    var a=Math.random()*Math.PI*2;var sp=50+Math.random()*150;
    particles.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0.3+Math.random()*0.4,maxLife:0.7,r:1+Math.random()*3,color:color});
  }
}

function spawnExplosion(x,y){
  for(var i=0;i<25;i++){
    var a=Math.random()*Math.PI*2;var sp=80+Math.random()*200;
    particles.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life:0.4+Math.random()*0.5,maxLife:0.9,r:3+Math.random()*5,
      color:Math.random()<0.5?'#ff8c00':'#ff4500'});
  }
  // Shockwave
  particles.push({x:x,y:y,vx:0,vy:0,life:0.3,maxLife:0.3,r:5,ring:true,ringR:0,color:'#ffd700'});
}

function spawnDmgNumber(x,y,dmg,color,crit){
  var el=document.createElement('div');
  el.className='dmg-num';
  el.textContent=(crit?'CRIT! ':'')+dmg;
  el.style.left=x+'px';el.style.top=y+'px';
  el.style.fontSize=crit?'2rem':'1.3rem';
  el.style.color=color;
  el.style.textShadow='0 0 8px '+color;
  document.body.appendChild(el);
  setTimeout(function(){el.remove();},1000);
}

function spawnTracer(x1,y1,x2,y2,color){
  tracers.push({x1:x1,y1:y1,x2:x2,y2:y2,life:0.08,color:color});
}

function spawnShell(){
  var sx=W*0.5+gun.recoilX*5,sy=H*0.85;
  shells.push({x:sx,y:sy,vx:30+Math.random()*40,vy:-80-Math.random()*60,rot:0,rotSpd:5+Math.random()*10,life:1.5});
}

// --- AUDIO (WebAudio) ---
var audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();}

function playShot(){
  if(!audioCtx)return;
  var mfr=MFRS[curMfr];
  var o=audioCtx.createOscillator();var g=audioCtx.createGain();
  var f=audioCtx.createBiquadFilter();
  o.type=mfr.explosive?'sawtooth':'square';
  o.frequency.value=mfr.explosive?80:200+Math.random()*100;
  o.frequency.exponentialRampToValueAtTime(mfr.explosive?30:50,audioCtx.currentTime+0.15);
  f.type='lowpass';f.frequency.value=mfr.explosive?400:2000;
  g.gain.value=0.15;g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+(mfr.explosive?0.25:0.1));
  o.connect(f);f.connect(g);g.connect(audioCtx.destination);
  o.start();o.stop(audioCtx.currentTime+(mfr.explosive?0.25:0.1));
  // Noise layer
  var bufLen=audioCtx.sampleRate*0.05;
  var buf=audioCtx.createBuffer(1,bufLen,audioCtx.sampleRate);
  var data=buf.getChannelData(0);
  for(var i=0;i<bufLen;i++)data[i]=(Math.random()*2-1)*0.3;
  var ns=audioCtx.createBufferSource();var ng=audioCtx.createGain();
  ns.buffer=buf;ng.gain.value=0.1;ng.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.08);
  ns.connect(ng);ng.connect(audioCtx.destination);ns.start();
}

function playCharge(){
  if(!audioCtx)return;
  var o=audioCtx.createOscillator();var g=audioCtx.createGain();
  o.type='sine';o.frequency.value=200;o.frequency.exponentialRampToValueAtTime(800,audioCtx.currentTime+0.35);
  g.gain.value=0.06;g.gain.linearRampToValueAtTime(0.12,audioCtx.currentTime+0.35);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.4);
  o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+0.4);
}

// --- FIRE LOGIC ---
var mouseDown=false;
document.addEventListener('mousedown',function(e){
  if(e.button!==0)return;
  initAudio();mouseDown=true;
  var mfr=MFRS[curMfr];
  if(mfr.mode==='semi'||mfr.mode==='burst') tryFire();
  if(mfr.mode==='charge'){gun.charging=true;gun.chargeTimer=0;gun.chargeReady=false;}
});
document.addEventListener('mouseup',function(){
  mouseDown=false;
  if(gun.charging&&gun.chargeReady) fireCharge();
  gun.charging=false;gun.chargeReady=false;
});
// Touch
CV.addEventListener('touchstart',function(e){e.preventDefault();initAudio();mouseDown=true;
  mx=e.touches[0].clientX;my=e.touches[0].clientY;
  crosshair.style.left=mx+'px';crosshair.style.top=my+'px';
  var mfr=MFRS[curMfr];
  if(mfr.mode==='semi'||mfr.mode==='burst')tryFire();
  if(mfr.mode==='charge'){gun.charging=true;gun.chargeTimer=0;gun.chargeReady=false;}
},{passive:false});
CV.addEventListener('touchmove',function(e){e.preventDefault();mx=e.touches[0].clientX;my=e.touches[0].clientY;
  crosshair.style.left=mx+'px';crosshair.style.top=my+'px';},{passive:false});
CV.addEventListener('touchend',function(){mouseDown=false;
  if(gun.charging&&gun.chargeReady)fireCharge();gun.charging=false;gun.chargeReady=false;});

function tryFire(){
  if(gun.reloading||gun.fireTimer>0)return;
  if(gun.mag<=0){startReload();return;}
  var mfr=MFRS[curMfr];
  if(mfr.mode==='burst'){gun.burstQueue=mfr.burstCount;gun.burstTimer=0;}
  else fireBullet();
  gun.fireTimer=mfr.fireRate;
}

function fireBullet(){
  if(gun.mag<=0){startReload();return;}
  gun.mag--;totalShots++;
  var mfr=MFRS[curMfr];var elem=ELEMS[curElem];
  var spread=mfr.spread*(1+gun.recoilY*0.3);
  var bx=mx+(Math.random()-.5)*spread*2;
  var by=my+(Math.random()-.5)*spread*2;
  gun.recoilY+=2+mfr.dmgBase*0.02;
  gun.muzzleFlash=0.06;
  playShot();
  spawnShell();
  // Tracer
  var originX=W/2,originY=H*0.9;
  spawnTracer(originX,originY,bx,by,elem.color);
  // Hit test
  var hit=false;
  for(var i=0;i<targets.length;i++){
    var t=targets[i];if(!t.alive)continue;
    var dx=bx-t.x,dy=by-t.y;
    if(Math.sqrt(dx*dx+dy*dy)<t.r){
      hit=true;totalHits++;
      var crit=Math.sqrt(dx*dx+dy*dy)<t.r*0.3;
      var dmg=Math.floor(mfr.dmgBase*(crit?2.5:1)*(0.9+Math.random()*0.2));
      if(elem.name!=='NONE')dmg=Math.floor(dmg*1.15);
      t.hp-=dmg;t.shakeX=(Math.random()-.5)*6;t.shakeY=(Math.random()-.5)*6;
      spawnHitParticles(bx,by,6,elem.color);
      spawnDmgNumber(bx,by-20,dmg,crit?'#ffd700':elem.color,crit);
      // Element effects
      if(elem.dot){t.dotTimer=2;t.dotDmg=Math.floor(mfr.dmgBase*0.2);t.dotColor=elem.dotColor;}
      if(elem.slow)t.slowTimer=3;
      if(elem.chain){t.chainTarget=true;}
      // Combo
      combo++;comboTimer=2;
      score+=dmg*(1+Math.floor(combo/5)*0.5);
      if(mfr.explosive)spawnExplosion(bx,by);
      if(t.hp<=0){
        t.alive=false;t.respawnTimer=2;
        spawnHitParticles(t.x,t.y,20,elem.color);
        score+=200+combo*20;
      }
      break;
    }
  }
  if(!hit)combo=0;
  updateHUD();
}

function fireCharge(){
  if(gun.mag<=0){startReload();return;}
  gun.mag-=2;if(gun.mag<0)gun.mag=0;totalShots++;
  var mfr=MFRS[curMfr];var elem=ELEMS[curElem];
  var bx=mx,by=my;
  gun.recoilY+=5;gun.muzzleFlash=0.12;
  playShot();
  var originX=W/2,originY=H*0.9;
  // Thick beam tracer
  tracers.push({x1:originX,y1:originY,x2:bx,y2:by,life:0.15,color:elem.name==='NONE'?mfr.color:elem.color,thick:true});
  // Hit all targets near beam path
  for(var i=0;i<targets.length;i++){
    var t=targets[i];if(!t.alive)continue;
    var dist=pointToLineDist(originX,originY,bx,by,t.x,t.y);
    if(dist<t.r+15){
      totalHits++;
      var dmg=Math.floor(mfr.dmgBase*1.5*(0.9+Math.random()*0.2));
      if(elem.name!=='NONE')dmg=Math.floor(dmg*1.25);
      t.hp-=dmg;t.shakeX=(Math.random()-.5)*8;t.shakeY=(Math.random()-.5)*8;
      spawnHitParticles(t.x,t.y,10,elem.color!=='#cccccc'?elem.color:mfr.color);
      spawnDmgNumber(t.x,t.y-20,dmg,elem.color,false);
      if(elem.dot){t.dotTimer=3;t.dotDmg=Math.floor(mfr.dmgBase*0.3);t.dotColor=elem.dotColor;}
      if(elem.slow)t.slowTimer=4;
      combo++;comboTimer=2;score+=dmg*(1+Math.floor(combo/5)*0.5);
      if(t.hp<=0){t.alive=false;t.respawnTimer=2;spawnHitParticles(t.x,t.y,20,mfr.color);score+=200+combo*20;}
    }
  }
  updateHUD();
}

function pointToLineDist(x1,y1,x2,y2,px,py){
  var dx=x2-x1,dy=y2-y1;var len2=dx*dx+dy*dy;
  if(len2===0)return Math.sqrt((px-x1)*(px-x1)+(py-y1)*(py-y1));
  var t=Math.max(0,Math.min(1,((px-x1)*dx+(py-y1)*dy)/len2));
  var projX=x1+t*dx,projY=y1+t*dy;
  return Math.sqrt((px-projX)*(px-projX)+(py-projY)*(py-projY));
}

function startReload(){
  if(gun.reloading)return;
  gun.reloading=true;gun.reloadTimer=MFRS[curMfr].reload;
  document.getElementById('reload-text').textContent='RELOADING...';
}

// --- KEYBOARD ---
document.addEventListener('keydown',function(e){
  if(e.key==='1')setMfr(0);if(e.key==='2')setMfr(1);if(e.key==='3')setMfr(2);if(e.key==='4')setMfr(3);
  if(e.key==='q'||e.key==='Q')setElem(0);if(e.key==='w'&&!mouseDown||e.key==='W'&&!mouseDown)setElem(1);
  if(e.key==='e'||e.key==='E')setElem(2);if(e.key==='r'&&!gun.reloading||e.key==='R'&&!gun.reloading)setElem(3);
  if(e.key==='t'||e.key==='T')setElem(4);
  if(e.key==='r'||e.key==='R')startReload();
});

function setMfr(idx){
  curMfr=idx;gun.mag=MFRS[idx].magSize;gun.reloading=false;gun.burstQueue=0;gun.charging=false;gun.chargeReady=false;
  updateButtons();updateHUD();
}
function setElem(idx){curElem=idx;updateButtons();updateHUD();}

// --- UI ---
function initButtons(){
  var mfrDiv=document.getElementById('mfr-btns');
  for(var i=0;i<MFRS.length;i++){
    var btn=document.createElement('button');btn.className='ctrl-btn';
    btn.textContent=(i+1)+' '+MFRS[i].name;
    btn.style.setProperty('--ac',MFRS[i].color);
    btn.setAttribute('data-idx',i);
    btn.addEventListener('click',function(){setMfr(parseInt(this.getAttribute('data-idx')));});
    mfrDiv.appendChild(btn);
  }
  var elemDiv=document.getElementById('elem-btns');
  for(var i=0;i<ELEMS.length;i++){
    var btn=document.createElement('button');btn.className='ctrl-btn';
    btn.textContent=ELEMS[i].key.toUpperCase()+' '+ELEMS[i].name;
    btn.style.setProperty('--ac',ELEMS[i].color);
    btn.setAttribute('data-idx',i);
    btn.addEventListener('click',function(){setElem(parseInt(this.getAttribute('data-idx')));});
    elemDiv.appendChild(btn);
  }
  updateButtons();
}

function updateButtons(){
  var mfrBtns=document.getElementById('mfr-btns').children;
  for(var i=0;i<mfrBtns.length;i++)mfrBtns[i].className='ctrl-btn'+(i===curMfr?' active':'');
  var elemBtns=document.getElementById('elem-btns').children;
  for(var i=0;i<elemBtns.length;i++)elemBtns[i].className='ctrl-btn'+(i===curElem?' active':'');
}

function updateHUD(){
  var mfr=MFRS[curMfr];var elem=ELEMS[curElem];
  document.getElementById('w-name').textContent=mfr.name;
  document.getElementById('w-name').style.color=mfr.color;
  document.getElementById('w-detail').textContent=mfr.desc+' \u00B7 '+elem.name;
  document.getElementById('w-detail').style.color=elem.color;
  document.getElementById('mag').textContent=gun.mag;
  document.getElementById('score').textContent=Math.floor(score);
  document.getElementById('combo').textContent=combo>1?combo+'x COMBO':'';
  document.getElementById('hits').textContent=totalHits+' / '+totalShots+(totalShots>0?' ('+Math.floor(totalHits/totalShots*100)+'%)':'');
}
initButtons();updateHUD();

// --- DRAWING ---
function drawRange(){
  // Background gradient
  var grd=X.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,'#0f0f18');grd.addColorStop(0.6,'#12121e');grd.addColorStop(1,'#0a0a12');
  X.fillStyle=grd;X.fillRect(0,0,W,H);
  // Floor grid
  X.strokeStyle='rgba(255,255,255,0.02)';X.lineWidth=1;
  for(var x=0;x<W;x+=60){X.beginPath();X.moveTo(x,H*0.5);X.lineTo(x,H);X.stroke();}
  for(var y=H*0.5;y<H;y+=40){X.beginPath();X.moveTo(0,y);X.lineTo(W,y);X.stroke();}
  // Range lanes
  X.strokeStyle='rgba(255,200,0,0.03)';X.lineWidth=2;
  var lanes=Math.max(3,Math.floor(W/200));
  for(var i=0;i<=lanes;i++){
    var lx=W*0.1+i*(W*0.8/lanes);
    X.beginPath();X.moveTo(lx,0);X.lineTo(lx,H*0.5);X.stroke();
  }
}

function drawTargets(now,dt){
  for(var i=0;i<targets.length;i++){
    var t=targets[i];
    if(!t.alive){
      t.respawnTimer-=dt;
      if(t.respawnTimer<=0){t.alive=true;t.hp=t.maxHp;t.dotTimer=0;t.slowTimer=0;}
      continue;
    }
    // DOT damage
    if(t.dotTimer>0){
      t.dotTimer-=dt;
      t.hp-=t.dotDmg*dt;
      if(Math.random()<0.3)spawnHitParticles(t.x+(Math.random()-.5)*t.r,t.y+(Math.random()-.5)*t.r,1,t.dotColor);
      if(t.hp<=0){t.alive=false;t.respawnTimer=2;spawnHitParticles(t.x,t.y,15,t.dotColor);score+=100;}
    }
    // Shake decay
    t.shakeX*=0.85;t.shakeY*=0.85;
    var tx=t.x+t.shakeX,ty=t.y+t.shakeY;
    // Slow visual
    var borderColor=t.slowTimer>0?'rgba(136,204,255,0.5)':'rgba(255,255,255,0.15)';
    // Target circle
    X.strokeStyle=borderColor;X.lineWidth=2;
    X.beginPath();X.arc(tx,ty,t.r,0,Math.PI*2);X.stroke();
    // HP fill
    var hpPct=Math.max(0,t.hp/t.maxHp);
    var hpColor=hpPct>0.5?'rgba(46,204,64,0.3)':hpPct>0.25?'rgba(255,200,0,0.3)':'rgba(255,50,50,0.4)';
    X.fillStyle=hpColor;
    X.beginPath();X.arc(tx,ty,t.r*hpPct,0,Math.PI*2);X.fill();
    // Rings
    X.strokeStyle='rgba(255,255,255,0.06)';X.lineWidth=1;
    X.beginPath();X.arc(tx,ty,t.r*0.3,0,Math.PI*2);X.stroke();
    X.beginPath();X.arc(tx,ty,t.r*0.6,0,Math.PI*2);X.stroke();
    // Center dot
    X.fillStyle='rgba(255,50,50,0.6)';X.beginPath();X.arc(tx,ty,3,0,Math.PI*2);X.fill();
    // DOT indicator
    if(t.dotTimer>0){
      X.strokeStyle=t.dotColor;X.lineWidth=2;X.setLineDash([3,3]);
      X.beginPath();X.arc(tx,ty,t.r+5,0,Math.PI*2*Math.min(1,t.dotTimer/2));X.stroke();
      X.setLineDash([]);
    }
    if(t.slowTimer>0)t.slowTimer-=dt;
  }
}

function drawTracers(dt){
  for(var i=tracers.length-1;i>=0;i--){
    var t=tracers[i];t.life-=dt;
    if(t.life<=0){tracers.splice(i,1);continue;}
    var a=t.life/(t.thick?0.15:0.08);
    X.strokeStyle=t.color;X.globalAlpha=a;X.lineWidth=t.thick?4:1.5;
    X.beginPath();X.moveTo(t.x1,t.y1);X.lineTo(t.x2,t.y2);X.stroke();
    if(t.thick){
      X.strokeStyle='rgba(255,255,255,'+a*0.5+')';X.lineWidth=1;
      X.beginPath();X.moveTo(t.x1,t.y1);X.lineTo(t.x2,t.y2);X.stroke();
    }
  }
  X.globalAlpha=1;
}

function drawParticles(dt){
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=200*dt;p.life-=dt;
    if(p.life<=0){particles.splice(i,1);continue;}
    var a=p.life/p.maxLife;
    if(p.ring){
      p.ringR+=300*dt;
      X.strokeStyle=p.color;X.globalAlpha=a;X.lineWidth=3*a;
      X.beginPath();X.arc(p.x,p.y,p.ringR,0,Math.PI*2);X.stroke();
    } else {
      X.fillStyle=p.color;X.globalAlpha=a;
      X.beginPath();X.arc(p.x,p.y,p.r*a,0,Math.PI*2);X.fill();
    }
  }
  X.globalAlpha=1;
}

function drawShells(dt){
  for(var i=shells.length-1;i>=0;i--){
    var s=shells[i];s.x+=s.vx*dt;s.y+=s.vy*dt;s.vy+=300*dt;s.rot+=s.rotSpd*dt;s.life-=dt;
    if(s.life<=0){shells.splice(i,1);continue;}
    X.save();X.translate(s.x,s.y);X.rotate(s.rot);
    X.fillStyle='#c8a832';X.fillRect(-2,-4,4,8);
    X.fillStyle='#e8c842';X.fillRect(-1.5,-4,3,3);
    X.restore();
  }
}

function drawMuzzleFlash(){
  if(gun.muzzleFlash<=0)return;
  var ox=W/2,oy=H*0.88;
  var r=20+gun.muzzleFlash*200;
  var elem=ELEMS[curElem];
  var color=elem.name==='NONE'?'#ffd700':elem.color;
  var grd=X.createRadialGradient(ox,oy,0,ox,oy,r);
  grd.addColorStop(0,'rgba(255,255,255,'+gun.muzzleFlash*5+')');
  grd.addColorStop(0.5,color.replace(')',','+gun.muzzleFlash*3+')').replace('#','rgba('));
  grd.addColorStop(1,'transparent');
  // Hacky color to rgba
  X.fillStyle='rgba(255,200,50,'+gun.muzzleFlash*4+')';
  X.beginPath();X.arc(ox,oy,r,0,Math.PI*2);X.fill();
}

function drawChargeIndicator(){
  if(!gun.charging)return;
  var mfr=MFRS[curMfr];
  var pct=Math.min(1,gun.chargeTimer/mfr.chargeTime);
  var elem=ELEMS[curElem];var color=elem.name==='NONE'?mfr.color:elem.color;
  // Ring around crosshair
  X.strokeStyle=color;X.lineWidth=3;X.globalAlpha=0.6;
  X.beginPath();X.arc(mx,my,18,-Math.PI/2,-Math.PI/2+pct*Math.PI*2);X.stroke();
  X.globalAlpha=1;
  if(pct>=1){
    X.strokeStyle='#fff';X.lineWidth=2;
    X.beginPath();X.arc(mx,my,22,0,Math.PI*2);X.stroke();
  }
}

// --- UPDATE ---
function update(dt){
  var mfr=MFRS[curMfr];
  // Fire timer
  if(gun.fireTimer>0)gun.fireTimer-=dt*1000;
  // Burst queue
  if(gun.burstQueue>0){
    gun.burstTimer-=dt*1000;
    if(gun.burstTimer<=0){gun.burstTimer=mfr.burstDelay;gun.burstQueue--;fireBullet();}
  }
  // Auto fire
  if(mouseDown&&mfr.mode==='auto'&&gun.fireTimer<=0&&!gun.reloading){
    fireBullet();gun.fireTimer=mfr.fireRate;
  }
  // Charge
  if(gun.charging){
    gun.chargeTimer+=dt*1000;
    if(gun.chargeTimer>=mfr.chargeTime&&!gun.chargeReady){gun.chargeReady=true;playCharge();}
  }
  // Reload
  if(gun.reloading){
    gun.reloadTimer-=dt;
    if(gun.reloadTimer<=0){gun.reloading=false;gun.mag=mfr.magSize;
      document.getElementById('reload-text').textContent='';updateHUD();}
  }
  // Recoil recovery
  gun.recoilX*=Math.pow(0.05,dt);
  gun.recoilY*=Math.pow(0.05,dt);
  gun.muzzleFlash*=Math.pow(0.001,dt);
  if(gun.muzzleFlash<0.001)gun.muzzleFlash=0;
  // Combo timer
  if(comboTimer>0){comboTimer-=dt;if(comboTimer<=0)combo=0;}
  // Chain lightning
  for(var i=0;i<targets.length;i++){
    var t=targets[i];
    if(t.chainTarget&&t.alive){
      t.chainTarget=false;
      // Find nearest other target
      var best=null,bestDist=150;
      for(var j=0;j<targets.length;j++){
        if(j===i||!targets[j].alive)continue;
        var dx=targets[j].x-t.x,dy=targets[j].y-t.y,d=Math.sqrt(dx*dx+dy*dy);
        if(d<bestDist){bestDist=d;best=targets[j];}
      }
      if(best){
        var chainDmg=Math.floor(MFRS[curMfr].dmgBase*0.5);
        best.hp-=chainDmg;best.shakeX=(Math.random()-.5)*4;best.shakeY=(Math.random()-.5)*4;
        tracers.push({x1:t.x,y1:t.y,x2:best.x,y2:best.y,life:0.12,color:'#00bfff'});
        spawnDmgNumber(best.x,best.y-20,chainDmg,'#00bfff',false);
        spawnHitParticles(best.x,best.y,4,'#00bfff');
        if(best.hp<=0){best.alive=false;best.respawnTimer=2;score+=100;}
      }
    }
  }
  updateHUD();
}

// --- MAIN LOOP ---
var lastTime=performance.now();
function loop(now){
  var dt=Math.min((now-lastTime)/1000,0.05);lastTime=now;
  update(dt);
  drawRange();
  drawTargets(now,dt);
  drawTracers(dt);
  drawParticles(dt);
  drawShells(dt);
  drawMuzzleFlash();
  drawChargeIndicator();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
</script>
</body>
