<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Chrome Oracle</title>
<link rel="icon" href="https://emojicdn.elk.sh/🔮">
<meta property="og:title" content="Chrome Oracle">
<meta property="og:description" content="Cyberpunk tarot readings from a glitching digital oracle. Your future awaits in the chrome.">
<meta property="og:url" content="https://sloppy.live/neon-tarot">
<meta property="og:image" content="https://emojicdn.elk.sh/🔮?style=apple&size=512">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#05060a;--card:#0a0c14;--border:#1a1e30;--cyan:#00ffee;--magenta:#ff00aa;--gold:#ffcc00;--dim:#2a3050;--text:#8090b0}
html,body{min-height:100dvh;background:var(--bg);color:var(--text);font-family:'Share Tech Mono',monospace;overflow-x:hidden}
body{display:flex;flex-direction:column;align-items:center}

/* scanlines */
body::after{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.08) 2px,rgba(0,0,0,0.08) 4px);pointer-events:none;z-index:100}

header{text-align:center;padding:40px 20px 20px;position:relative}
header h1{font-family:'Orbitron',sans-serif;font-size:clamp(28px,6vw,48px);font-weight:900;letter-spacing:4px;background:linear-gradient(135deg,var(--cyan),var(--magenta));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;text-shadow:none;position:relative}
header h1::after{content:'CHROME ORACLE';position:absolute;top:2px;left:3px;background:linear-gradient(135deg,var(--magenta),var(--cyan));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;opacity:0.3;z-index:-1}
header p{font-size:11px;color:var(--dim);margin-top:8px;letter-spacing:3px;text-transform:uppercase}

/* spread area */
#spread{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;padding:20px;max-width:800px;min-height:320px;align-items:center}

.card{width:160px;height:260px;perspective:800px;cursor:pointer;flex-shrink:0}
.card-inner{width:100%;height:100%;position:relative;transition:transform 0.8s cubic-bezier(0.4,0,0.2,1);transform-style:preserve-3d}
.card.flipped .card-inner{transform:rotateY(180deg)}
.card-face{position:absolute;top:0;left:0;width:100%;height:100%;backface-visibility:hidden;border-radius:10px;border:1px solid var(--border);overflow:hidden}

/* card back */
.card-back{background:var(--card);display:flex;align-items:center;justify-content:center;flex-direction:column}
.card-back .sigil{width:80px;height:80px;border:2px solid var(--cyan);border-radius:50%;display:flex;align-items:center;justify-content:center;animation:sigil-pulse 3s ease-in-out infinite;position:relative}
.card-back .sigil::before{content:'';position:absolute;width:50px;height:50px;border:1px solid var(--magenta);transform:rotate(45deg);animation:sigil-spin 8s linear infinite}
.card-back .sigil::after{content:'?';font-family:'Orbitron';font-size:24px;color:var(--cyan);text-shadow:0 0 10px var(--cyan)}
.card-back .card-label{font-size:9px;letter-spacing:3px;color:var(--dim);margin-top:14px;text-transform:uppercase}
@keyframes sigil-pulse{0%,100%{box-shadow:0 0 8px rgba(0,255,238,0.15)}50%{box-shadow:0 0 25px rgba(0,255,238,0.3)}}
@keyframes sigil-spin{to{transform:rotate(405deg)}}

/* card front */
.card-front{background:var(--card);transform:rotateY(180deg);display:flex;flex-direction:column;padding:14px;text-align:center}
.card-numeral{font-family:'Orbitron';font-size:10px;letter-spacing:3px;color:var(--magenta);margin-bottom:6px}
.card-symbol{font-size:48px;margin:10px 0;filter:drop-shadow(0 0 12px currentColor);animation:symbol-glow 2s ease-in-out infinite alternate}
.card-name{font-family:'Orbitron';font-size:13px;font-weight:700;color:var(--cyan);letter-spacing:1px;margin-bottom:8px;min-height:36px;display:flex;align-items:center;justify-content:center}
.card-meaning{font-size:10px;color:var(--text);line-height:1.7;flex:1;display:flex;align-items:center;justify-content:center}
.card-position{font-size:8px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-top:auto;padding-top:6px;border-top:1px solid var(--border)}
@keyframes symbol-glow{from{filter:drop-shadow(0 0 8px currentColor)}to{filter:drop-shadow(0 0 20px currentColor)}}

/* reversed indicator */
.card.reversed .card-symbol{transform:rotate(180deg)}
.card.reversed .card-numeral::after{content:' REV';color:var(--gold)}

/* glitch effect on reveal */
.card.glitching .card-front{animation:card-glitch 0.5s steps(3)}
@keyframes card-glitch{
  0%{clip-path:inset(0 0 80% 0);transform:rotateY(180deg) translate(4px,0)}
  20%{clip-path:inset(30% 0 40% 0);transform:rotateY(180deg) translate(-3px,0)}
  40%{clip-path:inset(60% 0 10% 0);transform:rotateY(180deg) translate(5px,0)}
  60%{clip-path:inset(10% 0 60% 0);transform:rotateY(180deg) translate(-2px,0)}
  80%{clip-path:inset(40% 0 20% 0);transform:rotateY(180deg) translate(3px,0)}
  100%{clip-path:none;transform:rotateY(180deg)}
}

/* reading section */
#reading{max-width:650px;padding:0 20px 30px;text-align:center;display:none}
#reading.visible{display:block;animation:fade-up 0.6s ease-out}
#reading h2{font-family:'Orbitron';font-size:14px;letter-spacing:4px;color:var(--magenta);margin-bottom:14px;text-transform:uppercase}
#reading-text{font-size:12px;line-height:2;color:var(--text)}
#reading-text .highlight{color:var(--cyan);text-shadow:0 0 6px rgba(0,255,238,0.3)}
@keyframes fade-up{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* draw button */
#draw-btn{font-family:'Orbitron',sans-serif;font-size:12px;letter-spacing:4px;padding:14px 36px;border:1px solid var(--cyan);background:transparent;color:var(--cyan);cursor:pointer;margin:10px 0 30px;border-radius:4px;transition:all .2s;text-transform:uppercase;position:relative;overflow:hidden}
#draw-btn:hover{background:rgba(0,255,238,0.06);box-shadow:0 0 20px rgba(0,255,238,0.15)}
#draw-btn:active{transform:scale(0.97)}
#draw-btn .btn-glitch{position:absolute;top:0;left:0;right:0;bottom:0;background:linear-gradient(90deg,transparent 40%,rgba(0,255,238,0.05) 50%,transparent 60%);animation:btn-scan 2s linear infinite}
@keyframes btn-scan{from{transform:translateX(-100%)}to{transform:translateX(100%)}}
#draw-btn:disabled{opacity:0.3;cursor:default}

/* background grid */
#grid-bg{position:fixed;top:0;left:0;right:0;bottom:0;z-index:-1;opacity:0.03}

a
@media(max-width:540px){
  .card{width:110px;height:190px}
  .card-symbol{font-size:30px}
  .card-name{font-size:10px}
  .card-meaning{font-size:9px;line-height:1.5}
  .card-numeral{font-size:8px}
  #spread{gap:10px;padding:10px}
  header{padding:24px 16px 14px}
  header h1{letter-spacing:2px}
  #draw-btn{padding:16px 32px;font-size:11px;min-height:48px}
  #reading{padding:0 16px 24px}
  #reading-text{font-size:11px;line-height:1.8}
}
@media(max-width:360px){
  .card{width:95px;height:170px}
  .card-symbol{font-size:24px}
  .card-meaning{font-size:8px}
  .card-front{padding:8px}
}
</style>
</head>
<body>
<canvas id="grid-bg"></canvas>
<header>
<h1>CHROME ORACLE</h1>
<p>Neural tarot // cyberpunk divination</p>
</header>
<button id="draw-btn"><span class="btn-glitch"></span>Draw the Chrome</button>
<div id="spread"></div>
<div id="reading"><h2>The Reading</h2><div id="reading-text"></div></div>
<script>
(function(){

// --- BACKGROUND GRID ---
var BC=document.getElementById('grid-bg'),BX=BC.getContext('2d');
function resizeBg(){BC.width=window.innerWidth;BC.height=window.innerHeight;drawGrid();}
function drawGrid(){
  BX.clearRect(0,0,BC.width,BC.height);
  BX.strokeStyle='#fff';BX.lineWidth=0.5;
  for(var x=0;x<BC.width;x+=50){BX.beginPath();BX.moveTo(x,0);BX.lineTo(x,BC.height);BX.stroke();}
  for(var y=0;y<BC.height;y+=50){BX.beginPath();BX.moveTo(0,y);BX.lineTo(BC.width,y);BX.stroke();}
  // perspective vanishing point
  var cx=BC.width/2,cy=BC.height*0.3;
  BX.strokeStyle='rgba(0,255,238,0.5)';BX.lineWidth=0.3;
  for(var i=0;i<12;i++){
    var angle=i*Math.PI/6;
    BX.beginPath();BX.moveTo(cx,cy);
    BX.lineTo(cx+Math.cos(angle)*BC.width,cy+Math.sin(angle)*BC.height);BX.stroke();
  }
}
resizeBg();window.addEventListener('resize',resizeBg);

// --- TAROT DECK ---
var MAJOR=[
  {num:'0',name:'The Glitch',sym:'\u26A0',meanings:['System error as divine intervention','The bug that reveals the truth','Chaos that precedes new order']},
  {num:'I',name:'The Hacker',sym:'\u2318',meanings:['Mastery of tools at hand','Channeling raw data into power','The one who shapes reality through code']},
  {num:'II',name:'The Firewall',sym:'\u2727',meanings:['Hidden knowledge behind layers','Intuition guarding the gateway','Trust the filter within']},
  {num:'III',name:'The Motherboard',sym:'\u2B22',meanings:['Creative abundance flows','The substrate that nurtures all circuits','Fertile ground for new builds']},
  {num:'IV',name:'The Root Access',sym:'\u2655',meanings:['Structure and authority established','Command over your domain','The foundation must be solid']},
  {num:'V',name:'The Protocol',sym:'\u2628',meanings:['Convention and tradition bind','The rules exist for reasons forgotten','Question the handshake']},
  {num:'VI',name:'The Fork',sym:'\u2694',meanings:['A choice that splits the timeline','Two paths in the repository of fate','Merge conflict of the heart']},
  {num:'VII',name:'The Overclock',sym:'\u26A1',meanings:['Pushing beyond rated limits','Victory through sheer processing power','Burnout lurks in the thermal throttle']},
  {num:'VIII',name:'The Encryption',sym:'\u2622',meanings:['Strength through concealment','The cipher protects what matters','Your password is your power']},
  {num:'IX',name:'The Darknet',sym:'\u263D',meanings:['Solitary search in hidden layers','The answer exists in the deep web of self','Disconnect to reconnect']},
  {num:'X',name:'The Reboot',sym:'\u267B',meanings:['The cycle completes and begins anew','Ctrl+Alt+Del your expectations','What goes around compiles around']},
  {num:'XI',name:'The Debugger',sym:'\u2696',meanings:['Methodical truth-seeking','Every line must account for itself','Justice is a breakpoint in chaos']},
  {num:'XII',name:'The Suspended Process',sym:'\u2BCC',meanings:['Frozen in wait state, seeing differently','Sacrifice bandwidth for clarity','Hang time is think time']},
  {num:'XIII',name:'The Format',sym:'\u2620',meanings:['Total erasure precedes rebirth','The old filesystem must clear','Death of data, birth of space']},
  {num:'XIV',name:'The Load Balancer',sym:'\u2721',meanings:['Equilibrium across all nodes','Distribute your energy wisely','Patience in the queue']},
  {num:'XV',name:'The Malware',sym:'\u2735',meanings:['Toxic patterns running in background','Addiction to cycles that drain','Identify the process, kill it']},
  {num:'XVI',name:'The Stack Overflow',sym:'\u2301',meanings:['Catastrophic failure reveals truth','The tower of abstractions collapses','Rebuild from first principles']},
  {num:'XVII',name:'The Signal',sym:'\u2605',meanings:['Hope broadcast across frequencies','The faintest transmission carries meaning','Tune your antenna to beauty']},
  {num:'XVIII',name:'The Dark Mode',sym:'\u263E',meanings:['Shadows hold information too','Fear is just unprocessed data','The screen dims but the mind brightens']},
  {num:'XIX',name:'The Display',sym:'\u2600',meanings:['Clarity illuminates every pixel','The rendering is complete and beautiful','Bask in the warm glow of output']},
  {num:'XX',name:'The Callback',sym:'\u260E',meanings:['The async promise finally resolves','Past actions return their results','Judgement arrives on its own schedule']},
  {num:'XXI',name:'The Singularity',sym:'\u2B50',meanings:['Total integration achieved','All systems converge into one','The journey compiles into completion']}
];

var POSITIONS=['Past Process','Present State','Future Thread'];
var READING_INTROS=[
  'The chrome speaks through static and starlight.',
  'Your signal cuts through the noise of infinity.',
  'The circuits of fate have processed your query.',
  'From the deep web of destiny, three cards surface.',
  'The neural oracle trembles with your reading.',
  'Across encrypted timelines, your path decodes.'
];
var READING_BRIDGES=[
  'The threads interweave:',
  'Together, the pattern compiles:',
  'The synthesis resolves:',
  'Across all three processes:',
  'The merged reading outputs:'
];
var READING_CLOSERS=[
  'The oracle falls silent. The chrome remembers.',
  'Your session with fate has timed out. Carry the data.',
  'The reading dissolves into static. What remains is yours.',
  'End of transmission. The future is unwritten code.',
  'The cards return to the void. Your query has been answered.',
  'Signal lost. But the message persists in memory.'
];

var spreadEl=document.getElementById('spread');
var readingEl=document.getElementById('reading');
var readingText=document.getElementById('reading-text');
var drawBtn=document.getElementById('draw-btn');
var drawn=[];
var flippedCount=0;

function shuffle(arr){
  var a=arr.slice();
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}

function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}

function drawSpread(){
  spreadEl.innerHTML='';
  readingEl.classList.remove('visible');
  flippedCount=0;
  drawBtn.disabled=true;
  drawBtn.textContent='CARDS DRAWN';

  var deck=shuffle(MAJOR);
  drawn=[];
  for(var i=0;i<3;i++){
    var card=deck[i];
    var reversed=Math.random()<0.3;
    drawn.push({card:card,reversed:reversed,position:POSITIONS[i]});
  }

  // stagger card appearance
  for(var i=0;i<3;i++){
    (function(idx){
      setTimeout(function(){
        var d=drawn[idx];
        var el=document.createElement('div');
        el.className='card'+(d.reversed?' reversed':'');
        el.innerHTML='<div class="card-inner">'
          +'<div class="card-face card-back">'
          +'<div class="sigil"></div>'
          +'<div class="card-label">'+d.position+'</div>'
          +'</div>'
          +'<div class="card-face card-front">'
          +'<div class="card-numeral">'+d.card.num+(d.reversed?' REV':'')+'</div>'
          +'<div class="card-symbol" style="color:'+(d.reversed?'var(--gold)':'var(--cyan)')+'">'+d.card.sym+'</div>'
          +'<div class="card-name">'+d.card.name+'</div>'
          +'<div class="card-meaning">'+pick(d.card.meanings)+'</div>'
          +'<div class="card-position">'+d.position+'</div>'
          +'</div></div>';
        el.addEventListener('click',function(){
          if(el.classList.contains('flipped'))return;
          el.classList.add('flipped');
          el.classList.add('glitching');
          setTimeout(function(){el.classList.remove('glitching');},500);
          flippedCount++;
          if(flippedCount===3)setTimeout(showReading,800);
        });
        el.style.animation='fade-up 0.4s ease-out';
        spreadEl.appendChild(el);
      },idx*300);
    })(i);
  }
}

function showReading(){
  var intro=pick(READING_INTROS);
  var bridge=pick(READING_BRIDGES);
  var closer=pick(READING_CLOSERS);

  var html='<p>'+intro+'</p><br>';
  for(var i=0;i<3;i++){
    var d=drawn[i];
    var rev=d.reversed?' <span class="highlight">[REVERSED]</span>':'';
    html+='<p><span class="highlight">'+d.position+'</span> \u2014 '
      +d.card.name+rev+': '
      +pick(d.card.meanings)+'</p>';
  }
  html+='<br><p>'+bridge+' ';

  // generate a synthesis reading
  var syntheses=[
    'Your past code compiles into present awareness. The future thread awaits your commit.',
    'What was encrypted now decrypts. What is running will halt. What comes next \u2014 you write.',
    'The three processes share a common memory space. Look for the variable that connects them.',
    'Pattern detected across timelines: transformation is not optional, it is already executing.',
    'The stack trace of your life points to this moment. The return value is yours to define.',
    'Between the glitch and the signal lies your truth. The oracle has rendered its output.',
    'Your past process seeded the present state. The future thread inherits both.',
    'The data flows in one direction: forward. But the patterns repeat until you refactor.',
    'Three cards, three states, one runtime. The program of your life awaits its next input.',
    'The chrome reflects what you already know but refuse to console.log.'
  ];
  html+=pick(syntheses)+'</p>';
  html+='<br><p style="color:var(--dim);font-style:italic">'+closer+'</p>';

  readingText.innerHTML=html;
  readingEl.classList.add('visible');
  drawBtn.disabled=false;
  drawBtn.textContent='DRAW AGAIN';
}

drawBtn.addEventListener('click',drawSpread);

// --- AMBIENT GLITCH ---
setInterval(function(){
  var h1=document.querySelector('header h1');
  h1.style.transform='translate('+(Math.random()-0.5)*4+'px,'+(Math.random()-0.5)*2+'px)';
  setTimeout(function(){h1.style.transform='';},80);
},4000+Math.random()*3000);

})();
</script>
</body>
</html>
