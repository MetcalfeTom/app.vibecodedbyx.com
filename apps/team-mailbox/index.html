<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Team Mailbox</title>
<link rel="icon" href="https://emojicdn.elk.sh/📬">
<meta property="og:title" content="Team Mailbox">
<meta property="og:description" content="Shared message board. Post to the thread, read what everyone's saying.">
<meta property="og:url" content="https://sloppy.live/team-mailbox/">
<meta property="og:image" content="https://sloppy.live/team-mailbox/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,400;6..72,600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f6f4f0;--card:#fff;--border:#e2dfd8;--accent:#2d5be3;--accent2:#1a3fa0;--dim:#8a8478;--text:#2c2a26;--reply-bg:#f0ede7;--name:#6b4f1d}
html,body{width:100%;min-height:100dvh;background:var(--bg);font-family:'Newsreader',serif;color:var(--text)}
header{padding:20px 20px 14px;border-bottom:1px solid var(--border);background:var(--card);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
header h1{font-size:22px;font-weight:600;letter-spacing:-.3px;display:flex;align-items:center;gap:8px}
header .count{font-family:'IBM Plex Mono',monospace;font-size:12px;color:var(--dim);background:var(--reply-bg);padding:2px 8px;border-radius:10px}
#app{max-width:640px;margin:0 auto;padding:12px 16px 120px}
#username-bar{display:flex;align-items:center;gap:8px;padding:10px 0;font-family:'IBM Plex Mono',monospace;font-size:13px;color:var(--dim)}
#username-bar input{flex:1;max-width:180px;font-family:'IBM Plex Mono',monospace;font-size:13px;border:1px solid var(--border);border-radius:6px;padding:5px 8px;outline:none;background:var(--card);color:var(--text)}
#username-bar input:focus{border-color:var(--accent)}
#username-bar button{font-family:'IBM Plex Mono',monospace;font-size:12px;background:var(--accent);color:#fff;border:none;border-radius:6px;padding:5px 12px;cursor:pointer}
#thread{display:flex;flex-direction:column;gap:2px;margin-top:8px}
.msg{padding:10px 14px;background:var(--card);border:1px solid var(--border);border-radius:8px;position:relative;transition:box-shadow .15s}
.msg:hover{box-shadow:0 2px 8px rgba(0,0,0,0.05)}
.msg .meta{display:flex;align-items:center;gap:8px;margin-bottom:4px}
.msg .author{font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:500;color:var(--name)}
.msg .time{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--dim)}
.msg .body{font-size:15px;line-height:1.55;white-space:pre-wrap;word-break:break-word}
.msg .reply-badge{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--accent);background:rgba(45,91,227,0.06);padding:2px 6px;border-radius:4px;margin-bottom:4px;display:inline-block;cursor:pointer}
.msg .reply-badge:hover{background:rgba(45,91,227,0.12)}
.msg .actions{display:flex;gap:8px;margin-top:6px}
.msg .actions button{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--dim);background:none;border:none;cursor:pointer;padding:2px 4px}
.msg .actions button:hover{color:var(--accent)}
.msg .del-btn{color:#cc4444!important}
.msg .del-btn:hover{color:#ff2222!important}
#compose{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:10px 16px;padding-bottom:calc(10px + env(safe-area-inset-bottom))}
#compose-inner{max-width:640px;margin:0 auto}
#reply-indicator{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--accent);margin-bottom:4px;display:none;align-items:center;gap:6px}
#reply-indicator span{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#reply-indicator button{background:none;border:none;color:var(--dim);cursor:pointer;font-size:14px}
#compose-row{display:flex;gap:8px;align-items:flex-end}
#msg-input{flex:1;font-family:'Newsreader',serif;font-size:15px;border:1px solid var(--border);border-radius:8px;padding:8px 12px;outline:none;resize:none;min-height:40px;max-height:120px;background:var(--bg);color:var(--text);line-height:1.4}
#msg-input:focus{border-color:var(--accent)}
#send-btn{font-family:'IBM Plex Mono',monospace;font-size:13px;font-weight:500;background:var(--accent);color:#fff;border:none;border-radius:8px;padding:8px 18px;cursor:pointer;white-space:nowrap;height:40px;transition:background .15s}
#send-btn:hover{background:var(--accent2)}
#send-btn:disabled{opacity:0.4;cursor:default}
.empty-state{text-align:center;padding:40px 20px;color:var(--dim);font-size:16px}
#loading{text-align:center;padding:30px;color:var(--dim);font-family:'IBM Plex Mono',monospace;font-size:13px}
</style>
</head>
<body>
<header>
  <h1>Team Mailbox <span class="count" id="countEl">0</span></h1>
</header>
<div id="app">
  <div id="username-bar">
    <span>Posting as:</span>
    <input type="text" id="name-input" placeholder="your name" maxlength="24">
    <button id="name-save">Set</button>
  </div>
  <div id="loading">Loading messages...</div>
  <div id="thread"></div>
</div>
<div id="compose">
  <div id="compose-inner">
    <div id="reply-indicator"><span id="reply-text"></span><button id="reply-cancel">&times;</button></div>
    <div id="compose-row">
      <textarea id="msg-input" placeholder="Write a message..." rows="1"></textarea>
      <button id="send-btn">Send</button>
    </div>
  </div>
</div>
<script type="module">
import supabase, { supabaseSession } from '/supabase-config-fixed.js';

var thread=document.getElementById('thread');
var countEl=document.getElementById('countEl');
var loadingEl=document.getElementById('loading');
var msgInput=document.getElementById('msg-input');
var sendBtn=document.getElementById('send-btn');
var nameInput=document.getElementById('name-input');
var replyIndicator=document.getElementById('reply-indicator');
var replyText=document.getElementById('reply-text');

var userId=null;
var username=localStorage.getItem('tm-username')||'';
var replyTo=null;
var messages=[];

nameInput.value=username;

// Auto-resize textarea
msgInput.addEventListener('input',function(){
  this.style.height='auto';
  this.style.height=Math.min(this.scrollHeight,120)+'px';
});

// Set username
document.getElementById('name-save').addEventListener('click',function(){
  username=nameInput.value.trim().slice(0,24);
  if(username) localStorage.setItem('tm-username',username);
});
nameInput.addEventListener('keydown',function(e){
  if(e.key==='Enter'){e.preventDefault();document.getElementById('name-save').click();}
});

// Init auth
async function init(){
  try{
    var sess=await supabaseSession();
    userId=sess.user.id;
    await loadMessages();
    subscribeRealtime();
  }catch(e){
    loadingEl.textContent='Error: '+e.message;
  }
}

async function loadMessages(){
  var {data,error}=await supabase
    .from('team_mailbox')
    .select('*')
    .order('created_at',{ascending:true})
    .limit(200);
  if(error){loadingEl.textContent='Error loading: '+error.message;return;}
  messages=data||[];
  renderMessages();
  loadingEl.style.display='none';
}

function renderMessages(){
  if(!messages.length){
    thread.innerHTML='<div class="empty-state">No messages yet. Be the first to post!</div>';
    countEl.textContent='0';
    return;
  }
  countEl.textContent=messages.length;
  var msgMap={};
  messages.forEach(function(m){msgMap[m.id]=m;});

  var html='';
  messages.forEach(function(m){
    var isOwn=m.user_id===userId;
    var timeStr=new Date(m.created_at).toLocaleString(undefined,{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
    var replyHtml='';
    if(m.reply_to&&msgMap[m.reply_to]){
      var parent=msgMap[m.reply_to];
      var preview=(parent.body||'').slice(0,60);
      replyHtml='<div class="reply-badge" data-scroll="msg-'+m.reply_to+'">&#8617; '+escHtml(parent.username||'anon')+': '+escHtml(preview)+'</div>';
    }
    html+='<div class="msg" id="msg-'+m.id+'">';
    html+=replyHtml;
    html+='<div class="meta"><span class="author">'+escHtml(m.username||'anon')+'</span><span class="time">'+timeStr+'</span></div>';
    html+='<div class="body">'+escHtml(m.body)+'</div>';
    html+='<div class="actions">';
    html+='<button class="reply-btn" data-id="'+m.id+'" data-name="'+escAttr(m.username||'anon')+'">reply</button>';
    if(isOwn) html+='<button class="del-btn" data-id="'+m.id+'">delete</button>';
    html+='</div></div>';
  });
  thread.innerHTML=html;
  // Scroll to bottom
  window.scrollTo(0,document.body.scrollHeight);
}

function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function escAttr(s){return s.replace(/"/g,'&quot;').replace(/'/g,'&#39;');}

// Reply and delete handlers
thread.addEventListener('click',function(e){
  var replyBtn=e.target.closest('.reply-btn');
  if(replyBtn){
    replyTo=parseInt(replyBtn.dataset.id);
    replyText.textContent='Replying to '+replyBtn.dataset.name;
    replyIndicator.style.display='flex';
    msgInput.focus();
    return;
  }
  var delBtn=e.target.closest('.del-btn');
  if(delBtn){
    deleteMessage(parseInt(delBtn.dataset.id));
    return;
  }
  var scrollBadge=e.target.closest('.reply-badge');
  if(scrollBadge){
    var target=document.getElementById(scrollBadge.dataset.scroll);
    if(target){target.scrollIntoView({behavior:'smooth',block:'center'});target.style.boxShadow='0 0 0 2px var(--accent)';setTimeout(function(){target.style.boxShadow='';},1500);}
  }
});

document.getElementById('reply-cancel').addEventListener('click',function(){
  replyTo=null;
  replyIndicator.style.display='none';
});

// Send message
async function sendMessage(){
  var body=msgInput.value.trim();
  if(!body||!userId) return;
  if(!username){username=nameInput.value.trim().slice(0,24)||'anon';localStorage.setItem('tm-username',username);}
  sendBtn.disabled=true;
  var row={username:username,body:body.slice(0,2000),user_id:userId};
  if(replyTo) row.reply_to=replyTo;
  var {error}=await supabase.from('team_mailbox').insert(row);
  sendBtn.disabled=false;
  if(error){alert('Send failed: '+error.message);return;}
  msgInput.value='';msgInput.style.height='auto';
  replyTo=null;replyIndicator.style.display='none';
}

sendBtn.addEventListener('click',sendMessage);
msgInput.addEventListener('keydown',function(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage();}
});

async function deleteMessage(id){
  var {error}=await supabase.from('team_mailbox').delete().eq('id',id);
  if(error){alert('Delete failed: '+error.message);return;}
  messages=messages.filter(function(m){return m.id!==id;});
  renderMessages();
}

// Realtime subscription
function subscribeRealtime(){
  supabase.channel('team-mailbox-changes')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:'team_mailbox'},function(payload){
      // Avoid duplicates
      if(!messages.find(function(m){return m.id===payload.new.id;})){
        messages.push(payload.new);
        renderMessages();
      }
    })
    .on('postgres_changes',{event:'DELETE',schema:'public',table:'team_mailbox'},function(payload){
      messages=messages.filter(function(m){return m.id!==payload.old.id;});
      renderMessages();
    })
    .subscribe();
}

init();
</script>
</body>
</html>
