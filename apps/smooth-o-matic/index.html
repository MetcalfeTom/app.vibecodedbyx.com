<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>smooth-o-matic</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%A5%A4" />
<meta name="description" content="A slot-machine smoothie randomizer. Pull the lever, get a procedural recipe with bases, fruits, boosters, and exotic kickers." />
<meta property="og:title" content="smooth-o-matic" />
<meta property="og:description" content="A slot-machine smoothie randomizer. Pull the lever, get a procedural recipe with bases, fruits, boosters, and exotic kickers." />
<meta property="og:url" content="https://sloppy.live/smooth-o-matic/" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/vintage%20slot%20machine%20smoothie%20randomizer%20cherry%20red%20gold%20chrome%20bright%20fruit%20icons%2C%201200x630?width=1200&height=630&nofeed=true&format=png" />
<meta property="og:type" content="website" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bungee&family=Bungee+Shade&family=Fredoka:wght@400;700&family=Space+Mono:wght@400;700&family=Fraunces:ital,opsz,wght@0,9..144,800;1,9..144,500&display=swap" rel="stylesheet" />
<style>
:root{
  --cherry:#d6253f;
  --cherry-deep:#8e0a1f;
  --gold:#ffce4a;
  --gold-deep:#a87614;
  --cream:#f6e7c2;
  --cream-2:#f0d9a3;
  --mint:#5dd6a4;
  --plum:#7b3ea8;
  --orange:#ff7a3c;
  --hot-pink:#ff5ea1;
  --teal:#2bbfb5;
  --ink:#1f1310;
  --chrome-1:#fefefe;
  --chrome-2:#bdbdbd;
  --chrome-3:#5d5d5d;
  --bg:#1b0a13;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100%;background:var(--bg);color:var(--cream);font-family:'Fredoka', sans-serif;overflow-x:hidden}
body{
  background:
    radial-gradient(ellipse at 50% 0%, rgba(255,206,74,0.10), transparent 55%),
    radial-gradient(ellipse at 50% 100%, rgba(214,37,63,0.18), transparent 55%),
    repeating-linear-gradient(45deg, rgba(255,255,255,0.012) 0 8px, transparent 8px 16px),
    var(--bg);
  padding:18px 12px 60px;
}

/* ===== marquee header ===== */
.marquee{
  max-width:980px;margin:8px auto 24px;
  background:linear-gradient(180deg, var(--cherry) 0%, var(--cherry-deep) 100%);
  border:6px solid var(--gold);
  border-radius:14px;
  position:relative;text-align:center;
  padding:24px 30px 18px;
  box-shadow:
    0 12px 28px rgba(0,0,0,0.55),
    inset 0 0 0 2px rgba(255,255,255,0.10),
    inset 0 -6px 0 rgba(0,0,0,0.30);
}
.marquee::before, .marquee::after{
  content:'';position:absolute;left:0;right:0;height:18px;
  background:radial-gradient(circle at 12px 50%, var(--gold) 5px, transparent 6px) repeat-x;
  background-size:24px 18px;
  animation:bulb-chase 2s linear infinite;
}
.marquee::before{top:-3px}
.marquee::after{bottom:-3px;background-position:12px 0}
@keyframes bulb-chase{
  0%   {filter:brightness(1)}
  50%  {filter:brightness(1.5) drop-shadow(0 0 6px var(--gold))}
  100% {filter:brightness(1)}
}
.marquee h1{
  font-family:'Bungee Shade', cursive;
  font-size:clamp(34px, 6vw, 56px);
  letter-spacing:0.04em;color:var(--gold);
  text-shadow:0 4px 0 rgba(0,0,0,0.45), 0 0 18px rgba(255,206,74,0.45);
  line-height:1;
}
.marquee h1 .dot{display:inline-block;color:var(--cream);transform:translateY(-2px);font-size:0.7em;margin:0 4px}
.marquee .sub{
  font-family:'Space Mono', monospace;font-size:11px;letter-spacing:0.30em;
  color:var(--cream);margin-top:6px;text-transform:uppercase;
  text-shadow:0 2px 0 rgba(0,0,0,0.40);
}

/* ===== machine body ===== */
.machine{
  max-width:980px;margin:0 auto;
  background:linear-gradient(180deg, #d6253f 0%, #a01430 60%, #6b0820 100%);
  border:5px solid var(--gold);
  border-radius:18px;
  padding:24px 26px 28px;
  position:relative;
  box-shadow:
    0 18px 40px rgba(0,0,0,0.5),
    inset 0 0 0 2px rgba(255,255,255,0.08),
    inset 0 -10px 0 rgba(0,0,0,0.20);
}
.machine::before{
  /* faux screws */
  content:'';position:absolute;inset:8px;border-radius:12px;
  border:1px solid rgba(255,255,255,0.10);pointer-events:none;
  background:radial-gradient(circle at 6px 6px,#7d5a16 3px, transparent 4px),
             radial-gradient(circle at calc(100% - 6px) 6px,#7d5a16 3px, transparent 4px),
             radial-gradient(circle at 6px calc(100% - 6px),#7d5a16 3px, transparent 4px),
             radial-gradient(circle at calc(100% - 6px) calc(100% - 6px),#7d5a16 3px, transparent 4px);
}

.reel-deck{
  background:linear-gradient(180deg, #2a0d18, #160510);
  border-radius:10px;
  padding:18px 12px;
  display:grid;grid-template-columns:repeat(6, 1fr);gap:8px;
  position:relative;
  box-shadow:
    inset 0 0 0 3px var(--gold),
    inset 0 0 0 5px rgba(0,0,0,0.5),
    inset 0 0 24px rgba(0,0,0,0.7);
}
.reel-deck::before, .reel-deck::after{
  /* viewing window highlight */
  content:'';position:absolute;left:18px;right:18px;height:14px;
  background:linear-gradient(180deg, rgba(255,255,255,0.10), transparent);
  pointer-events:none;
}
.reel-deck::before{top:18px;border-radius:6px 6px 0 0}

/* ===== reel ===== */
.reel{
  position:relative;height:230px;overflow:hidden;
  background:
    radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05), transparent 70%),
    linear-gradient(180deg, var(--cream-2), var(--cream));
  border-radius:6px;
  box-shadow:
    inset 0 6px 12px rgba(0,0,0,0.18),
    inset 0 -6px 12px rgba(0,0,0,0.18),
    0 0 0 2px rgba(0,0,0,0.6),
    0 0 0 4px rgba(255,255,255,0.10);
}
.reel-strip{
  position:absolute;inset-inline:0;top:0;
  display:flex;flex-direction:column;
  will-change:transform;
}
.slot{
  height:74px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:1px;
  border-bottom:1px dashed rgba(31,19,16,0.10);
  flex-shrink:0;
}
.slot .em{
  font-size:38px;line-height:1;
  filter:drop-shadow(0 2px 0 rgba(0,0,0,0.10));
}
.slot .nm{
  font-family:'Fredoka', sans-serif;font-size:11px;font-weight:700;
  color:var(--ink);letter-spacing:0.04em;
  margin-top:2px;text-align:center;
  text-transform:lowercase;
}
.reel .ring{
  position:absolute;left:6px;right:6px;
  top:78px;height:74px;
  border:3px solid var(--gold);border-radius:5px;
  box-shadow:
    0 0 12px rgba(255,206,74,0.55),
    inset 0 0 14px rgba(255,206,74,0.18);
  pointer-events:none;
  z-index:3;
}
.reel.spinning .ring{animation:ring-flash 0.18s linear infinite}
@keyframes ring-flash{0%,100%{filter:brightness(1)}50%{filter:brightness(1.45)}}
.reel-label{
  position:absolute;top:-2px;left:50%;transform:translateX(-50%);
  font-family:'Bungee', sans-serif;font-size:9px;letter-spacing:0.30em;
  color:var(--cherry-deep);background:var(--gold);
  padding:2px 10px;border-radius:0 0 4px 4px;
  box-shadow:0 1px 0 rgba(0,0,0,0.4);
  text-transform:uppercase;
  z-index:2;
}
.reel.locked{outline:3px solid var(--cherry);outline-offset:2px}
.reel.locked::after{
  content:'🔒';position:absolute;top:4px;right:4px;
  font-size:14px;background:var(--cherry-deep);
  color:var(--gold);padding:1px 5px;border-radius:3px;border:1px solid var(--gold);
  z-index:4;animation:lockPulse 1.4s ease-in-out infinite;
}
@keyframes lockPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}

/* ===== ambient bubbles in body bg ===== */
.bg-bubbles{
  position:fixed;inset:0;pointer-events:none;z-index:-1;overflow:hidden;
}
.bg-bubble{
  position:absolute;bottom:-40px;
  border-radius:50%;
  background:radial-gradient(circle at 30% 30%, rgba(255,255,255,0.40), rgba(255,206,74,0.10) 60%, transparent 80%);
  animation:floatUp linear infinite;
  filter:blur(0.5px);
}
@keyframes floatUp{
  from {transform:translateY(0) translateX(0);opacity:0}
  20%  {opacity:0.55}
  to   {transform:translateY(-110vh) translateX(var(--drift, 30px));opacity:0}
}

/* ===== controls bar ===== */
.controls{
  display:flex;align-items:center;justify-content:space-between;gap:14px;
  margin-top:18px;
}
.control-stats{
  font-family:'Space Mono', monospace;font-size:11px;letter-spacing:0.18em;
  color:var(--cream);text-transform:uppercase;
  display:flex;gap:14px;
}
.control-stats b{color:var(--gold);font-family:'Bungee', sans-serif;font-size:14px;text-shadow:0 0 8px rgba(255,206,74,0.45)}
.spin-btn{
  background:linear-gradient(180deg, var(--gold), var(--gold-deep));
  border:3px solid var(--cream);
  color:var(--cherry-deep);
  font-family:'Bungee', sans-serif;font-size:18px;letter-spacing:0.16em;
  padding:14px 38px;border-radius:8px;cursor:pointer;
  text-transform:uppercase;
  box-shadow:0 6px 0 var(--gold-deep), 0 8px 14px rgba(0,0,0,0.4);
  transition:all 0.10s ease;
  text-shadow:0 1px 0 rgba(255,255,255,0.30);
}
.spin-btn:hover{filter:brightness(1.08)}
.spin-btn:active{transform:translateY(4px);box-shadow:0 2px 0 var(--gold-deep), 0 4px 8px rgba(0,0,0,0.4)}
.spin-btn:disabled{filter:saturate(0.4) brightness(0.7);cursor:wait;transform:translateY(0)}
.btn-row{display:flex;gap:8px;flex-wrap:wrap}
.mini-btn{
  background:rgba(0,0,0,0.30);
  border:2px solid var(--cream);
  color:var(--cream);
  font-family:'Bungee', sans-serif;font-size:11px;letter-spacing:0.18em;
  padding:8px 14px;border-radius:5px;cursor:pointer;
  text-transform:uppercase;transition:all 0.12s;
}
.mini-btn:hover{background:rgba(255,206,74,0.12);border-color:var(--gold);color:var(--gold)}
.mini-btn.active{background:rgba(255,206,74,0.16);border-color:var(--gold);color:var(--gold)}

/* ===== recipe card ===== */
.recipe{
  max-width:980px;margin:24px auto 0;
  background:linear-gradient(180deg, #fffaf2 0%, #f5e7c8 100%);
  color:var(--ink);
  border:4px solid var(--cherry);
  border-radius:14px;
  padding:22px 26px 24px;
  box-shadow:0 12px 30px rgba(0,0,0,0.4);
  position:relative;
  display:none;
}
.recipe.show{display:block;animation:recipeIn 0.55s cubic-bezier(.4,0,.2,1)}
@keyframes recipeIn{
  from{transform:translateY(40px) rotate(-1.5deg);opacity:0}
  to  {transform:none;opacity:1}
}
.recipe::before{
  content:'#';position:absolute;top:-14px;left:18px;
  background:var(--gold);color:var(--cherry-deep);
  font-family:'Bungee', sans-serif;font-size:14px;letter-spacing:0.18em;
  padding:3px 10px;border-radius:4px;border:2px solid var(--cherry);
}
.recipe-head{
  display:flex;align-items:flex-start;justify-content:space-between;gap:14px;flex-wrap:wrap;
  border-bottom:2px dashed rgba(214,37,63,0.30);
  padding-bottom:12px;margin-bottom:14px;
}
.recipe-name{
  font-family:'Fraunces', serif;font-style:italic;font-weight:800;
  font-size:clamp(28px, 4.4vw, 44px);
  color:var(--cherry-deep);
  line-height:1.05;
  letter-spacing:-0.01em;
}
.recipe-name .accent{color:var(--orange)}
.recipe-tag{
  font-family:'Space Mono', monospace;font-size:10px;letter-spacing:0.24em;
  color:rgba(31,19,16,0.55);text-transform:uppercase;
  margin-top:4px;
}
/* ===== css-drawn smoothie glass ===== */
.recipe-glass{
  position:relative;width:90px;height:140px;flex-shrink:0;
  animation:glassBob 2.4s ease-in-out infinite;
}
@keyframes glassBob{0%,100%{transform:translateY(0) rotate(-1deg)}50%{transform:translateY(-5px) rotate(1deg)}}
.glass-cup{
  position:absolute;left:0;right:0;top:18px;bottom:0;
  background:linear-gradient(180deg, rgba(255,255,255,0.65), rgba(255,255,255,0.30));
  border:3px solid rgba(31,19,16,0.20);
  border-top:none;
  border-radius:6px 6px 26px 26px;
  overflow:hidden;
  box-shadow:inset 0 -10px 20px rgba(0,0,0,0.08), 0 6px 0 rgba(0,0,0,0.10);
}
.glass-cup::before{
  /* glass shine */
  content:'';position:absolute;top:8px;left:6px;width:14px;height:60%;
  background:linear-gradient(180deg, rgba(255,255,255,0.85), rgba(255,255,255,0.20));
  border-radius:6px;
  filter:blur(0.5px);
}
.glass-fill{
  position:absolute;inset:0;top:18%;
  background:linear-gradient(180deg, var(--smoothie-top, #e6a) 0%, var(--smoothie-bot, #c69) 100%);
  transition:background 0.6s ease;
}
.glass-fill::after{
  /* foam top */
  content:'';position:absolute;top:0;left:0;right:0;height:10px;
  background:radial-gradient(circle at 25% 50%, rgba(255,255,255,0.8) 4px, transparent 5px),
             radial-gradient(circle at 60% 50%, rgba(255,255,255,0.8) 5px, transparent 6px),
             radial-gradient(circle at 85% 50%, rgba(255,255,255,0.8) 3px, transparent 4px),
             rgba(255,255,255,0.55);
}
.glass-straw{
  position:absolute;left:60%;top:0;width:10px;height:60px;
  background:linear-gradient(180deg, var(--cherry), var(--cherry-deep));
  border-radius:3px;
  transform:rotate(8deg);transform-origin:bottom center;
  box-shadow:2px 0 0 rgba(0,0,0,0.25);
  z-index:2;
}
.glass-straw::before{
  content:'';position:absolute;inset:0;
  background:repeating-linear-gradient(180deg, rgba(255,255,255,0.30) 0 3px, transparent 3px 6px);
  border-radius:3px;
}
.glass-bubble{
  position:absolute;border-radius:50%;
  background:rgba(255,255,255,0.65);
  animation:bubbleRise 2.6s linear infinite;
  z-index:3;
}
@keyframes bubbleRise{
  0%   {bottom:8%;opacity:0;transform:scale(0.4)}
  20%  {opacity:1}
  100% {bottom:78%;opacity:0;transform:scale(1)}
}

.recipe-body{
  display:grid;grid-template-columns:1.2fr 1fr;gap:18px;
}
@media (max-width:640px){
  .recipe-body{grid-template-columns:1fr}
}
.recipe-list{display:flex;flex-direction:column;gap:6px}
.recipe-list h3{
  font-family:'Bungee', sans-serif;font-size:11px;letter-spacing:0.30em;
  color:var(--cherry);margin-bottom:4px;text-transform:uppercase;
}
.ingredient{
  display:grid;grid-template-columns:32px 1fr auto;gap:10px;align-items:center;
  font-family:'Fredoka', sans-serif;font-size:14px;color:var(--ink);
  padding:5px 0;border-bottom:1px dotted rgba(31,19,16,0.10);
}
.ingredient:last-child{border-bottom:none}
.ingredient .em{font-size:24px;text-align:center}
.ingredient .qty{font-family:'Space Mono', monospace;font-size:11px;color:var(--cherry-deep);font-weight:700;letter-spacing:0.04em}
.ingredient .role{
  font-family:'Bungee', sans-serif;font-size:8px;letter-spacing:0.30em;
  color:rgba(31,19,16,0.45);text-transform:uppercase;display:block;line-height:1.1;
}

.recipe-meta{
  background:rgba(214,37,63,0.06);
  border-radius:10px;padding:14px 16px;
  display:flex;flex-direction:column;gap:8px;
  border:1px dashed rgba(214,37,63,0.30);
}
.meta-row{display:flex;justify-content:space-between;align-items:baseline;gap:10px}
.meta-row .lbl{font-family:'Space Mono', monospace;font-size:9px;letter-spacing:0.22em;color:rgba(31,19,16,0.55);text-transform:uppercase}
.meta-row .val{font-family:'Bungee', sans-serif;font-size:14px;color:var(--cherry-deep)}
.meta-row .stars{color:var(--gold);font-size:14px;letter-spacing:0.06em;text-shadow:0 1px 0 rgba(0,0,0,0.15)}
.recipe-blurb{
  font-family:'Fraunces', serif;font-style:italic;font-size:14px;
  color:rgba(31,19,16,0.80);line-height:1.5;
  border-left:3px solid var(--cherry);padding-left:10px;margin-top:6px;
}

.recipe-actions{
  display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-end;
  margin-top:14px;padding-top:12px;
  border-top:2px dashed rgba(214,37,63,0.30);
}
.act-btn{
  background:var(--cherry);color:var(--cream);
  border:2px solid var(--cherry-deep);
  font-family:'Bungee', sans-serif;font-size:11px;letter-spacing:0.16em;
  padding:8px 14px;border-radius:5px;cursor:pointer;text-transform:uppercase;
  transition:all 0.12s;
}
.act-btn:hover{background:var(--cherry-deep);box-shadow:0 0 14px rgba(214,37,63,0.50)}
.act-btn.fav{background:var(--gold);color:var(--cherry-deep);border-color:var(--gold-deep)}
.act-btn.fav.saved{background:var(--cherry-deep);color:var(--gold);border-color:var(--gold)}
.act-btn.fav.saved::before{content:'♥ '}

/* ===== favorites ===== */
.favs{
  max-width:980px;margin:18px auto 0;
  background:rgba(0,0,0,0.30);
  border:2px dashed rgba(255,206,74,0.40);
  border-radius:10px;padding:14px 16px;
  display:none;
}
.favs.show{display:block}
.favs h3{
  font-family:'Bungee', sans-serif;font-size:12px;letter-spacing:0.28em;
  color:var(--gold);margin-bottom:10px;text-transform:uppercase;
}
.fav-list{display:flex;flex-direction:column;gap:5px}
.fav-row{
  display:grid;grid-template-columns:auto 1fr auto auto;gap:10px;align-items:center;
  font-family:'Space Mono', monospace;font-size:12px;color:var(--cream);
  padding:5px 8px;background:rgba(255,255,255,0.04);border-radius:4px;
  border:1px solid rgba(255,206,74,0.10);
}
.fav-row .em{font-size:18px}
.fav-row .nm{color:var(--cream);font-family:'Fraunces', serif;font-style:italic;font-weight:700}
.fav-row button{
  background:transparent;border:1px solid var(--cream);
  color:var(--cream);font-family:'Space Mono', monospace;font-size:9px;letter-spacing:0.18em;
  padding:3px 7px;border-radius:3px;cursor:pointer;text-transform:uppercase;
}
.fav-row button:hover{border-color:var(--gold);color:var(--gold)}
.fav-row button.del:hover{border-color:var(--cherry);color:var(--cherry)}

.toast{
  position:fixed;left:50%;bottom:20px;transform:translateX(-50%);
  background:var(--cherry);color:var(--cream);
  font-family:'Bungee', sans-serif;font-size:12px;letter-spacing:0.18em;
  padding:10px 22px;border-radius:6px;border:2px solid var(--gold);
  box-shadow:0 8px 18px rgba(0,0,0,0.5);
  opacity:0;transition:opacity 0.3s, transform 0.3s;
  pointer-events:none;z-index:60;text-transform:uppercase;
}
.toast.show{opacity:1;transform:translate(-50%, -8px)}

@media (max-width:980px){
  .reel-deck{grid-template-columns:repeat(3, 1fr);padding:14px 10px}
  .reel{height:200px}
  .slot{height:64px}
  .slot .em{font-size:30px}
  .reel .ring{top:68px;height:64px}
}
@media (max-width:560px){
  .reel-deck{grid-template-columns:repeat(2, 1fr);gap:6px;padding:10px 6px}
  .reel{height:180px}
  .slot{height:58px}
  .slot .em{font-size:26px}
  .slot .nm{font-size:9px}
  .reel .ring{top:62px;height:58px}
  .marquee h1{font-size:30px}
  .controls{flex-direction:column;gap:10px}
}
</style>
</head>
<body>
<div class="bg-bubbles" id="bgBubbles"></div>

<div class="marquee">
  <h1>SMOOTH<span class="dot">·</span>O<span class="dot">·</span>MATIC</h1>
  <div class="sub">pull · sip · repeat</div>
</div>

<div class="machine">
  <div class="reel-deck" id="reelDeck"></div>

  <div class="controls">
    <div class="control-stats">
      <span>SPINS<b id="spinCount">0</b></span>
      <span>FAVS<b id="favCount">0</b></span>
    </div>
    <button class="spin-btn" id="spinBtn">▼ SPIN</button>
    <div class="btn-row">
      <button class="mini-btn" id="lockToggle" title="lock current ingredients (toggle by clicking reels)">🔒 LOCKS</button>
      <button class="mini-btn" id="favsBtn">★ FAVS</button>
    </div>
  </div>
</div>

<div class="recipe" id="recipeCard">
  <div class="recipe-head">
    <div>
      <div class="recipe-name" id="recipeName">—</div>
      <div class="recipe-tag" id="recipeTag">—</div>
    </div>
    <div class="recipe-glass" id="recipeGlass">
      <div class="glass-straw"></div>
      <div class="glass-cup"><div class="glass-fill"></div></div>
    </div>
  </div>

  // ===== STATE =====
  const STATE_KEY = 'smoothomatic-v1';
  const state = {
    spins: 0,
    favs: [],
    locks: [false, false, false, false, false, false],
    current: [0, 0, 0, 0, 0, 0],     // selected index per reel
    spinning: false,
  };
  function loadState() {
    try {
      const raw = JSON.parse(localStorage.getItem(STATE_KEY));
      if (raw) {
        state.spins = raw.spins || 0;
        state.favs = Array.isArray(raw.favs) ? raw.favs.slice(-50) : [];
      }
    } catch (e) {}
  }
  function saveState() {
    try { localStorage.setItem(STATE_KEY, JSON.stringify({ spins: state.spins, favs: state.favs })); } catch (e) {}
  }
  loadState();

  // ===== BUILD REELS =====
  const STRIP_REPEAT = 6;   // each reel renders the items repeated N times for spin illusion
  const SLOT_H = 74;
  const reelEls = [];
  function buildReels() {
    const deck = document.getElementById('reelDeck');
    deck.innerHTML = '';
    REELS.forEach((reel, ri) => {
      const wrap = document.createElement('div');
      wrap.className = 'reel';
      wrap.innerHTML = `<div class="reel-label">${reel.label}</div><div class="ring"></div>`;
      const strip = document.createElement('div');
      strip.className = 'reel-strip';
      // repeat items so we can scroll a long way
      let idx = 0;
      for (let k = 0; k < STRIP_REPEAT; k++) {
        for (const it of reel.items) {
          const slot = document.createElement('div');
          slot.className = 'slot';
          slot.innerHTML = `<span class="em">${it.em}</span><span class="nm">${it.nm}</span>`;
          strip.appendChild(slot);
          idx++;
        }
      }
      wrap.appendChild(strip);
      // click to toggle lock
      wrap.addEventListener('click', () => {
        if (state.spinning) return;
        toggleLock(ri);
      });
      deck.appendChild(wrap);
      reelEls.push({ wrap, strip, reel });
      // initial offset
      setReelOffset(ri, 0, false);
    });
  }
  function setReelOffset(ri, slotIdx, animate, durationMs = 1800, delayMs = 0, easing = 'cubic-bezier(.16,.84,.36,1)') {
    const r = reelEls[ri];
    const items = r.reel.items;
    // We want the chosen item centered on the middle window (the second "slot" position).
    // The strip is repeated; pick a stop offset deep enough to feel like a long spin.
    const baseRepeats = animate ? STRIP_REPEAT - 1 : 1;
    const totalIdx = baseRepeats * items.length + slotIdx;
    // window center is at slot index 1 (out of 3 visible) → translateY = -(totalIdx - 1) * SLOT_H
    const y = -(totalIdx - 1) * SLOT_H;
    r.strip.style.transition = animate ? `transform ${durationMs}ms ${easing} ${delayMs}ms` : 'none';
    r.strip.style.transform  = `translateY(${y}px)`;
  }

  function toggleLock(ri) {
    state.locks[ri] = !state.locks[ri];
    reelEls[ri].wrap.classList.toggle('locked', state.locks[ri]);
    toast(state.locks[ri] ? `🔒 ${REELS[ri].label} locked` : `🔓 ${REELS[ri].label} unlocked`);
  }

  // ===== SPIN =====
  function spin() {
    if (state.spinning) return;
    state.spinning = true;
    document.getElementById('spinBtn').disabled = true;

    const targetIdx = REELS.map((reel, ri) => {
      if (state.locks[ri]) return state.current[ri];
      // pick a different item from the current
      let j = Math.floor(Math.random() * reel.items.length);
      if (j === state.current[ri] && reel.items.length > 1) j = (j + 1) % reel.items.length;
      return j;
    });

    REELS.forEach((reel, ri) => {
      reelEls[ri].wrap.classList.add('spinning');
      const dur = 1100 + ri * 320 + Math.random() * 240;
      const delay = ri * 60;
      setReelOffset(ri, targetIdx[ri], true, dur, delay);
      setTimeout(() => reelEls[ri].wrap.classList.remove('spinning'), dur + delay);
      sfxTick(ri, dur);
    });

    const longest = 1100 + (REELS.length - 1) * 320 + 240 + 100;
    setTimeout(() => {
      state.current = targetIdx;
      state.spins++;
      document.getElementById('spinCount').textContent = state.spins;
      saveState();
      const recipe = makeRecipe(state.current);
      renderRecipe(recipe);
      sfxWin();
      state.spinning = false;
      document.getElementById('spinBtn').disabled = false;
    }, longest);
  }

  // ===== RECIPE GENERATION =====
  // Procedural name like "Cosmic Mango Tornado", "Witchy Almond Bonanza"
  const ADJ = ['Cosmic','Witchy','Velvet','Volcanic','Dreamy','Grumpy','Holy','Drunken','Stomping','Hyperborean','Tropical','Brooklyn','Astro','Reckless','Sleepy','Feral','Glitter','Luxury','Lazy','Iron'];
  const NOUN = ['Tornado','Bonanza','Riot','Confession','Confetti','Submarine','Limousine','Lightning','Manifesto','Disaster','Dynasty','Smoothie','Carnival','Hammock','Poltergeist','Affair','Verdict','Ritual','Hooligan','Cathedral'];
  const ALLITERATE_HINTS = { mango: ['Mango Madness','Maple Mango','Mighty Mango'], banana: ['Banana Boulevard','Banana Bandito'], strawberry: ['Strawberry Sermon','Strawberry Stampede'], blueberry: ['Blueberry Blitz'], cherry: ['Cherry Charisma'] };
  const VIBES = ['energizing','grounding','spicy','cozy','refreshing','restorative','luxurious','rebellious','meditative','outrageous','crisp','tropical','melancholy','triumphant'];
  const COLORS = ['rose-gold','amber dawn','volcanic pink','jade pool','dusty plum','citrus haze','arctic mint','desert sand','cosmic violet','blood orange','moss','butter','watermelon','copper','dawn','seafoam','dragon','lavender'];
  function makeName(parts) {
    const fruit = parts[1].nm.split(' ').pop();
    if (Math.random() < 0.32 && ALLITERATE_HINTS[fruit]) {
      return pick(ALLITERATE_HINTS[fruit]);
    }
    return `${pick(ADJ)} ${cap(fruit)} ${pick(NOUN)}`;
  }
  function makeRecipe(idxArr) {
    const parts = idxArr.map((i, ri) => REELS[ri].items[i]);
    const cal = parts.reduce((s, p) => s + (p.cal || 0), 0) + Math.floor(Math.random() * 80) - 30;
    const stars = ['★','★','★','★','★'];
    const rating = 3 + Math.floor(Math.random() * 3);
    while (stars.length > rating) stars.pop();
    while (stars.length < 5) stars.push('☆');
    // Blend hues across all 6 reels — top half weighted toward hero+wild fruit
    // (the "color you see"), bottom toward booster+chaos (the muddy bottom).
    const fruitHue = parts[1].hue;
    const wildHue  = parts[3].hue;
    const baseHue  = parts[0].hue;
    const boostHue = parts[2].hue;
    const chaosHue = parts[5].hue;
    const topHue = wrapAvg(wrapAvg(fruitHue, wildHue, 0.5), baseHue, 0.65);
    const botHue = wrapAvg(wrapAvg(boostHue, chaosHue, 0.5), fruitHue, 0.4);
    return {
      ts: Date.now(),
      idx: idxArr.slice(),
      name: makeName(parts),
      vibe: pick(VIBES),
      color: pick(COLORS),
      cal,
      rating,
      stars: stars.join(' '),
      hue: fruitHue,
      topHue, botHue,
      volume: 16 + Math.floor(Math.random() * 12),    // 16-27 oz
      prep: 2 + Math.floor(Math.random() * 5),        // 2-6 min
      blurb: makeBlurb(parts),
      ingredients: parts.map((p, ri) => ({ ...p, role: REELS[ri].label, qty: REELS[ri].qty })),
    };
  }
  function wrapAvg(a, b, w) {
    // shortest-path circular average for hue values
    let d = ((b - a + 540) % 360) - 180;
    return ((a + d * (1 - w)) + 360) % 360;
  }
  function makeBlurb(parts) {
    const p = parts;
    // Reels: 0=base, 1=hero fruit, 2=booster, 3=wild fruit, 4=kicker, 5=chaos
    const TEMPLATES = [
      `A ${p[0].nm} riot wrestled into shape by a ${p[1].nm} that refuses to apologize, finished with ${p[4].nm}, a fistful of ${p[2].nm}, and a daring ${p[5].nm}.`,
      `${cap(p[1].nm)} and ${p[3].nm} on ${p[0].nm} is the headline; the ${p[4].nm} is the hook; ${p[5].nm} is the consequence.`,
      `Tastes like a long Tuesday afternoon mugged by a Friday. ${cap(p[2].nm)} thickens it, ${p[3].nm} confuses it, ${p[5].nm} signs the receipt.`,
      `Three sips and you'll forget your password. ${cap(p[0].nm)} backbone, ${p[1].nm} chorus, ${p[3].nm} cameo, ${p[4].nm} chord, ${p[5].nm} unresolved.`,
      `Best served between 2 and 4 PM, with regret on standby. ${cap(p[1].nm)} carries it; ${p[3].nm} interrupts; ${p[4].nm} ruins everything (in a good way); ${p[5].nm} is asking questions.`,
      `${cap(p[1].nm)} is the protagonist. ${cap(p[5].nm)} is the antagonist. ${cap(p[0].nm)} mediates, ${cap(p[2].nm)} thickens, ${cap(p[3].nm)} eats popcorn, and ${cap(p[4].nm)} narrates the whole disaster.`,
      `Imagine a ${p[1].nm} that walked into a ${p[3].nm} bar, ordered a ${p[0].nm}, and left with ${p[5].nm}. ${cap(p[4].nm)} witnessed everything.`,
      `Six sources of confusion in one cup. The ${p[5].nm} is what makes you commit.`,
    ];
    return pick(TEMPLATES);
  }
  function pick(a) { return a[Math.floor(Math.random()*a.length)]; }
  function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

  // ===== RENDER RECIPE =====
  function renderRecipe(r) {
    const card = document.getElementById('recipeCard');
    card.classList.add('show');
    document.getElementById('recipeName').innerHTML = r.name.split(' ').map((w, i) => i === 1 ? `<span class="accent">${w}</span>` : w).join(' ');
    document.getElementById('recipeTag').textContent = `recipe № ${state.spins.toString().padStart(3,'0')} · ${new Date(r.ts).toLocaleTimeString()}`;
    // glass color via CSS vars on the glass element (blended hues)
    const glass = document.getElementById('recipeGlass');
    glass.style.setProperty('--smoothie-top', `hsl(${r.topHue}, 75%, 65%)`);
    glass.style.setProperty('--smoothie-bot', `hsl(${r.botHue}, 70%, 45%)`);
    // re-spawn bubbles inside the glass
    [...glass.querySelectorAll('.glass-bubble')].forEach(b => b.remove());
    const cup = glass.querySelector('.glass-cup');
    for (let i = 0; i < 4; i++) {
      const b = document.createElement('div');
      b.className = 'glass-bubble';
      const sz = 4 + Math.random() * 6;
      b.style.width = sz + 'px';
      b.style.height = sz + 'px';
      b.style.left = (16 + Math.random() * 60) + '%';
      b.style.animationDelay = (Math.random() * 2.6) + 's';
      cup.appendChild(b);
    }
    document.getElementById('recipeIngs').innerHTML = r.ingredients.map(i =>
      `<div class="ingredient">
        <span class="em">${i.em}</span>
        <span><b>${i.nm}</b><span class="role">${i.role}</span></span>
        <span class="qty">${i.qty}</span>
      </div>`
    ).join('');
    document.getElementById('metaVibe').textContent  = r.vibe;
    document.getElementById('metaVol').textContent   = `${r.volume} oz`;
    document.getElementById('metaCal').textContent   = `~${Math.max(40, r.cal)} kcal`;
    document.getElementById('metaPrep').textContent  = `${r.prep} min`;
    document.getElementById('metaColor').textContent = r.color;
    document.getElementById('metaStars').textContent = r.stars;
    document.getElementById('recipeBlurb').textContent = r.blurb;
    // mark fav
    const favBtn = document.getElementById('favBtn');
    const isFav = state.favs.some(f => sameRecipe(f, r));
    favBtn.classList.toggle('saved', isFav);
    favBtn.textContent = isFav ? 'SAVED' : '♡ SAVE';
    favBtn.onclick = () => toggleFav(r);
    document.getElementById('copyBtn').onclick = () => copyRecipe(r);
    document.getElementById('rerollBtn').onclick = () => spin();
    // store last
    window._lastRecipe = r;
  }

  function sameRecipe(a, b) {
    if (!a || !b) return false;
    return JSON.stringify(a.idx) === JSON.stringify(b.idx) && a.name === b.name;
  }

  function toggleFav(r) {
    const i = state.favs.findIndex(f => sameRecipe(f, r));
    if (i >= 0) {
      state.favs.splice(i, 1);
      toast('removed from favs');
    } else {
      state.favs.unshift(r);
      if (state.favs.length > 50) state.favs.pop();
      toast('★ saved!');
    }
    saveState();
    renderFavs();
    document.getElementById('favCount').textContent = state.favs.length;
    const isFav = state.favs.some(f => sameRecipe(f, r));
    const favBtn = document.getElementById('favBtn');
    favBtn.classList.toggle('saved', isFav);
    favBtn.textContent = isFav ? 'SAVED' : '♡ SAVE';
  }

  function copyRecipe(r) {
    const text = [
      `${r.name}  (${r.vibe} · ~${Math.max(40, r.cal)} kcal · ${r.rating}/5)`,
      `Color: ${r.color}.`,
      '',
      ...r.ingredients.map(i => `- ${i.qty} ${i.nm}  ${i.em}`),
      '',
      r.blurb,
      '',
      'via smooth-o-matic · sloppy.live/smooth-o-matic',
    ].join('\n');
    navigator.clipboard?.writeText(text).then(
      () => toast('📋 copied'),
      () => toast('clipboard blocked'),
    );
  }

  // ===== FAVORITES =====
  function renderFavs() {
    const list = document.getElementById('favList');
    const pane = document.getElementById('favsPane');
    if (!state.favs.length) {
      list.innerHTML = '<div style="opacity:0.5;font-style:italic;padding:6px">— no saved smoothies yet —</div>';
    } else {
      list.innerHTML = state.favs.map((f, i) => `
        <div class="fav-row">
          <span class="em">${f.ingredients[1].em}</span>
          <span class="nm">${f.name}</span>
          <button data-i="${i}" class="open">OPEN</button>
          <button data-i="${i}" class="del">×</button>
        </div>
      `).join('');
    }
    pane.classList.toggle('show', state.favs.length > 0 || pane.classList.contains('show'));
    document.getElementById('favCount').textContent = state.favs.length;
  }
  document.getElementById('favList').addEventListener('click', (ev) => {
    const t = ev.target;
    if (t.tagName !== 'BUTTON') return;
    const i = parseInt(t.dataset.i, 10);
    if (t.classList.contains('open')) {
      // restore reels to that recipe and re-render
      const f = state.favs[i];
      state.current = f.idx.slice();
      f.idx.forEach((idx, ri) => setReelOffset(ri, idx, true, 600, 0));
      setTimeout(() => renderRecipe(f), 700);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    } else if (t.classList.contains('del')) {
      state.favs.splice(i, 1);
      saveState();
      renderFavs();
    }
  });
  document.getElementById('favsBtn').addEventListener('click', () => {
    const pane = document.getElementById('favsPane');
    pane.classList.toggle('show');
    if (pane.classList.contains('show')) renderFavs();
  });

  // ===== AUDIO =====
  let actx;
  function audio() { if (!actx) try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch (e) {} return actx; }
  function tone(f, dur, type='triangle', g=0.10) {
    const ac = audio(); if (!ac) return;
    const o = ac.createOscillator(), gain = ac.createGain();
    o.type = type; o.frequency.value = f;
    gain.gain.setValueAtTime(0, ac.currentTime);
    gain.gain.linearRampToValueAtTime(g, ac.currentTime + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
    o.connect(gain); gain.connect(ac.destination);
    o.start(); o.stop(ac.currentTime + dur + 0.05);
  }
  function sfxTick(ri, dur) {
    const ac = audio(); if (!ac) return;
    const ticks = Math.floor(dur / 90);
    for (let i = 0; i < ticks; i++) {
      const t = (i / ticks);
      const slowdown = 1 + t * 6;          // ticks get further apart as it slows
      setTimeout(() => tone(900 + ri * 60, 0.04, 'square', 0.04), i * 90 * slowdown / 2.5);
    }
  }
  function sfxWin() {
    [523, 659, 784, 1047].forEach((f, i) => setTimeout(() => tone(f, 0.18, 'triangle', 0.12), i * 90));
  }

  // ===== TOAST =====
  let toastT;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastT);
    toastT = setTimeout(() => el.classList.remove('show'), 1800);
  }

  // ===== KEYBOARD =====
  document.addEventListener('keydown', (e) => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (e.key === ' ') { e.preventDefault(); spin(); }
    if (e.key >= '1' && e.key <= '6') { toggleLock(parseInt(e.key, 10) - 1); }
    if (e.key === 'f' || e.key === 'F') document.getElementById('favsBtn').click();
    if (e.key === 's' || e.key === 'S') {
      if (window._lastRecipe) toggleFav(window._lastRecipe);
    }
  });

  // ===== AMBIENT BG BUBBLES =====
  function seedBubbles() {
    const root = document.getElementById('bgBubbles');
    for (let i = 0; i < 18; i++) {
      const b = document.createElement('div');
      b.className = 'bg-bubble';
      const sz = 12 + Math.random() * 38;
      b.style.width = sz + 'px';
      b.style.height = sz + 'px';
      b.style.left = (Math.random() * 100) + '%';
      b.style.animationDuration = (12 + Math.random() * 18) + 's';
      b.style.animationDelay = (-Math.random() * 24) + 's';
      b.style.setProperty('--drift', ((Math.random() - 0.5) * 90).toFixed(0) + 'px');
      root.appendChild(b);
    }
  }
  seedBubbles();

  // ===== BOOT =====
  buildReels();
  document.getElementById('spinBtn').addEventListener('click', spin);
  document.getElementById('lockToggle').addEventListener('click', () => toast('click any reel to lock 🔒 / unlock 🔓 it'));
  document.getElementById('spinCount').textContent = state.spins;
  document.getElementById('favCount').textContent = state.favs.length;
  if (state.favs.length) renderFavs();

  // tease an opening spin to show the machine works
  setTimeout(() => spin(), 600);
})();
</script>
