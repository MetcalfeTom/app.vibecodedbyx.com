<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Blaster</title>
<link rel="icon" href="https://emojicdn.elk.sh/🚀">
<meta property="og:title" content="Neon Blaster">
<meta property="og:description" content="Blast waves of neon enemies with screaming lasers and explosive chain reactions.">
<meta property="og:url" content="https://app.sloppy.live/neon-blaster/">
<meta property="og:image" content="https://image.pollinations.ai/prompt/neon%20space%20shooter%20laser%20explosions%20glowing%20enemies%20dark%20space?width=1200&height=630&nologo=true&referrer=sloppy.live">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#020208;font-family:'Share Tech Mono',monospace;touch-action:none;user-select:none}
canvas{display:block}
#hud{position:absolute;top:0;left:0;width:100%;display:flex;justify-content:space-between;padding:10px 16px;pointer-events:none;z-index:10}
.hud-item{text-align:center}
.hud-label{font-size:9px;color:#555;letter-spacing:2px}
.hud-val{font-family:'Orbitron',sans-serif;font-size:clamp(16px,4vw,26px);font-weight:900;text-shadow:0 0 12px currentColor}
#hud-score .hud-val{color:#0ff}
#hud-wave .hud-val{color:#ff0}
#hud-lives .hud-val{color:#f06}
#hud-multi .hud-val{color:#0f0}
#msg{position:absolute;top:35%;left:50%;transform:translate(-50%,-50%);font-family:'Orbitron',sans-serif;font-size:clamp(24px,6vw,48px);font-weight:900;color:#0ff;text-shadow:0 0 30px rgba(0,255,255,0.5);z-index:20;pointer-events:none;opacity:0;transition:opacity 0.3s}
#start{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:30;background:radial-gradient(ellipse at 50% 40%,#080830,#020208)}
#start h1{font-family:'Orbitron',sans-serif;font-size:clamp(28px,7vw,56px);font-weight:900;background:linear-gradient(135deg,#0ff,#f0f,#ff0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
#start .sub{font-size:12px;color:#555;letter-spacing:3px;margin-bottom:24px}
.btn{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:700;padding:14px 36px;border:2px solid #0ff;background:transparent;color:#0ff;cursor:pointer;letter-spacing:2px;transition:all .2s}
.btn:hover{background:#0ff;color:#020208;box-shadow:0 0 30px #0ff}
#controls-hint{font-size:10px;color:#333;margin-top:16px;text-align:center;line-height:2}
#game-over{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:30;background:rgba(2,2,8,0.9)}
#go-score{font-family:'Orbitron',sans-serif;font-size:clamp(32px,8vw,56px);font-weight:900;color:#f06}
#go-label{font-size:14px;color:#666;letter-spacing:3px;margin-bottom:6px}
#go-best{font-size:14px;color:#ff0;margin:8px 0 20px}
#mobile-fire{display:none;position:absolute;bottom:15px;left:50%;transform:translateX(-50%);width:80px;height:80px;border-radius:50%;border:3px solid rgba(255,0,100,0.3);background:rgba(255,0,100,0.08);z-index:15;font-size:28px;color:#f06;line-height:80px;text-align:center;cursor:pointer}
#mobile-move{display:none;position:absolute;bottom:15px;left:20px;right:110px;height:80px;z-index:14}
@media(hover:none)and(pointer:coarse){#mobile-fire,#mobile-move{display:block}#controls-hint{display:none}}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="hud">
  <div class="hud-item" id="hud-score"><div class="hud-label">SCORE</div><div class="hud-val">0</div></div>
  <div class="hud-item" id="hud-multi"><div class="hud-label">MULTI</div><div class="hud-val">x1</div></div>
  <div class="hud-item" id="hud-wave"><div class="hud-label">WAVE</div><div class="hud-val">1</div></div>
  <div class="hud-item" id="hud-lives"><div class="hud-label">LIVES</div><div class="hud-val">♥♥♥</div></div>
</div>
<div id="msg"></div>
<div id="start">
  <h1>NEON BLASTER</h1>
  <div class="sub">LASERS · EXPLOSIONS · CHAOS</div>
  <button class="btn" id="start-btn">LAUNCH</button>
  <div id="controls-hint">← → Move &nbsp;|&nbsp; SPACE Fire &nbsp;|&nbsp; Z Bomb</div>
</div>
<div id="game-over">
  <div id="go-label">DESTROYED</div>
  <div id="go-score">0</div>
  <div id="go-best"></div>
  <button class="btn" id="retry-btn">RETRY</button>
</div>
<div id="mobile-fire">🔥</div>
<div id="mobile-move"></div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;
function resize(){
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * (window.devicePixelRatio||1);
  canvas.height = H * (window.devicePixelRatio||1);
  ctx.setTransform(window.devicePixelRatio||1,0,0,window.devicePixelRatio||1,0,0);
}
resize(); window.addEventListener('resize', resize);

// Audio
const AC = new (window.AudioContext||window.webkitAudioContext)();
function noise(dur,vol){const n=AC.createBufferSource();const b=AC.createBuffer(1,AC.sampleRate*dur,AC.sampleRate);const d=b.getChannelData(0);for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);n.buffer=b;const g=AC.createGain();g.gain.setValueAtTime(vol,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);n.connect(g);g.connect(AC.destination);n.start();n.stop(AC.currentTime+dur);return n;}
function playLaser(){
  const o=AC.createOscillator();const g=AC.createGain();
  o.type='sawtooth';o.frequency.setValueAtTime(1800+Math.random()*400,AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(200,AC.currentTime+0.1);
  g.gain.setValueAtTime(0.07,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.1);
  o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+0.1);
}
function playExplosion(big){
  const dur=big?0.6:0.3;const vol=big?0.2:0.12;
  noise(dur,vol);
  const o=AC.createOscillator();const g=AC.createGain();
  o.type='square';o.frequency.setValueAtTime(big?60:100,AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(20,AC.currentTime+dur);
  g.gain.setValueAtTime(vol*0.8,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+dur);
  o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+dur);
  if(big){
    const o2=AC.createOscillator();const g2=AC.createGain();
    o2.type='sawtooth';o2.frequency.setValueAtTime(200,AC.currentTime);
    o2.frequency.exponentialRampToValueAtTime(30,AC.currentTime+0.5);
    g2.gain.setValueAtTime(0.1,AC.currentTime);g2.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.5);
    o2.connect(g2);g2.connect(AC.destination);o2.start();o2.stop(AC.currentTime+0.5);
  }
}
function playHit(){
  const o=AC.createOscillator();const g=AC.createGain();
  o.type='sine';o.frequency.value=300;
  g.gain.setValueAtTime(0.06,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.08);
  o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+0.08);
}
function playBomb(){
  noise(0.8,0.25);
  const o=AC.createOscillator();const g=AC.createGain();
  o.type='sawtooth';o.frequency.setValueAtTime(300,AC.currentTime);
  o.frequency.exponentialRampToValueAtTime(15,AC.currentTime+0.8);
  g.gain.setValueAtTime(0.2,AC.currentTime);g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+0.8);
  o.connect(g);g.connect(AC.destination);o.start();o.stop(AC.currentTime+0.8);
}
function playPowerup(){
  [800,1000,1200,1600].forEach((f,i)=>{
    const o=AC.createOscillator();const g=AC.createGain();
    o.type='sine';o.frequency.value=f;
    g.gain.setValueAtTime(0.05,AC.currentTime+i*0.06);
    g.gain.exponentialRampToValueAtTime(0.001,AC.currentTime+i*0.06+0.15);
    o.connect(g);g.connect(AC.destination);o.start(AC.currentTime+i*0.06);o.stop(AC.currentTime+i*0.06+0.15);
  });
}

// State
let best = parseInt(localStorage.getItem('neon-blaster-best'))||0;
let player, bullets, enemies, particles, powerups, stars;
let score, lives, wave, multi, multiTimer, frame, gameRunning, gameOver;
let shakes=[], fireCooldown=0, bombs=3, waveTimer=0, waveEnemies=0;
const keys={};
let touchX=null, mFire=false;

const ENEMY_TYPES = [
  {name:'drone', w:20,h:20, hp:1, speed:1.5, color:'#ff0066', pts:100, shoot:false},
  {name:'shooter',w:24,h:24, hp:2, speed:1, color:'#ff8800', pts:200, shoot:true, fireRate:120},
  {name:'tank', w:30,h:28, hp:4, speed:0.7, color:'#aa00ff', pts:400, shoot:true, fireRate:90},
  {name:'fast', w:16,h:16, hp:1, speed:3, color:'#00ff66', pts:150, shoot:false},
  {name:'boss', w:50,h:40, hp:20, speed:0.4, color:'#ff0000', pts:2000, shoot:true, fireRate:40},
];

const POWERUP_TYPES = [
  {name:'rapid', color:'#ff0', icon:'R', dur:300},
  {name:'triple', color:'#0ff', icon:'T', dur:300},
  {name:'shield', color:'#0f0', icon:'S', dur:250},
  {name:'bomb', color:'#f60', icon:'B', dur:0},
];

function initGame(){
  player = {x:W/2, y:H-80, w:28, h:32, vx:0, speed:5, shield:0, rapid:0, triple:0, flash:0};
  bullets=[]; enemies=[]; particles=[]; powerups=[]; stars=[];
  score=0; lives=3; wave=0; multi=1; multiTimer=0; frame=0;
  gameRunning=true; gameOver=false; shakes=[]; bombs=3; fireCooldown=0;
  waveTimer=60; waveEnemies=0;
  for(let i=0;i<80;i++) stars.push({x:Math.random()*W,y:Math.random()*H,s:0.5+Math.random()*1.5,b:Math.random()});
  nextWave();
}

function nextWave(){
  wave++;
  waveTimer=90;
  const count = 4 + wave*2;
  waveEnemies = count;
  const hasBoss = wave%5===0;
  for(let i=0;i<count;i++){
    let typeIdx;
    if(hasBoss && i===0) typeIdx=4;
    else if(wave<3) typeIdx=Math.random()<0.7?0:3;
    else if(wave<6) typeIdx=Math.floor(Math.random()*3);
    else typeIdx=Math.floor(Math.random()*4);
    const t=ENEMY_TYPES[typeIdx];
    const delay=i*20+Math.random()*30;
    setTimeout(()=>{
      if(!gameRunning)return;
      enemies.push({
        type:t, x:40+Math.random()*(W-80), y:-40-Math.random()*100,
        hp:t.hp + Math.floor(wave/4), maxHp:t.hp+Math.floor(wave/4),
        vx:(Math.random()-0.5)*t.speed, vy:t.speed*(0.3+Math.random()*0.3),
        w:t.w,h:t.h, fireTimer:t.fireRate?Math.floor(Math.random()*t.fireRate):999,
        flash:0, phase:Math.random()*Math.PI*2
      });
    }, delay*16);
  }
  showMsg('WAVE '+wave, 1200);
}

function showMsg(text,dur){
  const m=document.getElementById('msg');
  m.textContent=text;m.style.opacity=1;
  setTimeout(()=>m.style.opacity=0,dur||1500);
}

function addParticles(x,y,color,count,spread,big){
  for(let i=0;i<count;i++){
    const a=Math.random()*Math.PI*2;
    const spd=(big?2:1)+Math.random()*spread;
    particles.push({x,y,vx:Math.cos(a)*spd,vy:Math.sin(a)*spd,life:1,color,
      size:big?3+Math.random()*5:1+Math.random()*3,decay:0.015+Math.random()*0.015});
  }
}

function addExplosion(x,y,color,big){
  const count=big?60:25;
  addParticles(x,y,color,count,big?6:4,big);
  addParticles(x,y,'#fff',Math.floor(count/3),big?4:2,false);
  if(big){
    addParticles(x,y,'#ff0',15,5,true);
    shakes.push(12,-10,8,-6,5);
  } else {
    shakes.push(4,-3);
  }
}

function spawnPowerup(x,y){
  if(Math.random()>0.2)return;
  const t=POWERUP_TYPES[Math.floor(Math.random()*POWERUP_TYPES.length)];
  powerups.push({type:t,x,y,vy:1,pulse:0});
}

function fire(){
  if(fireCooldown>0)return;
  fireCooldown = player.rapid>0?5:12;
  playLaser();
  const bw=3, bh=14, spd=-10;
  if(player.triple>0){
    bullets.push({x:player.x,y:player.y-player.h/2,vx:0,vy:spd,w:bw,h:bh,color:'#0ff',isEnemy:false});
    bullets.push({x:player.x-12,y:player.y-player.h/2+4,vx:-1.5,vy:spd,w:bw,h:bh,color:'#0ff',isEnemy:false});
    bullets.push({x:player.x+12,y:player.y-player.h/2+4,vx:1.5,vy:spd,w:bw,h:bh,color:'#0ff',isEnemy:false});
  } else {
    bullets.push({x:player.x,y:player.y-player.h/2,vx:0,vy:spd,w:bw,h:bh,color:'#0ff',isEnemy:false});
  }
}

function useBomb(){
  if(bombs<=0)return;
  bombs--;
  playBomb();
  shakes.push(20,-16,14,-10,8,-6);
  // Damage all enemies
  enemies.forEach(e=>{
    e.hp -= 5;
    e.flash = 8;
    addParticles(e.x,e.y,'#fff',8,3,false);
  });
  // Screen flash
  addParticles(W/2,H/2,'#fff',40,10,true);
  // Kill enemy bullets
  bullets = bullets.filter(b=>!b.isEnemy);
}

function update(){
  if(!gameRunning)return;
  frame++;

  // Input
  let moveDir=0;
  if(keys['ArrowLeft']||keys['KeyA'])moveDir=-1;
  if(keys['ArrowRight']||keys['KeyD'])moveDir=1;
  if(touchX!==null){
    const dx=touchX-player.x;
    if(Math.abs(dx)>5) moveDir=Math.sign(dx);
  }
  player.vx+=(moveDir*player.speed-player.vx)*0.3;
  player.x+=player.vx;
  player.x=Math.max(player.w/2,Math.min(W-player.w/2,player.x));

  if(keys['Space']||mFire) fire();
  if(keys['KeyZ']&&frame%30===0) useBomb();
  fireCooldown=Math.max(0,fireCooldown-1);

  // Powerup timers
  if(player.rapid>0)player.rapid--;
  if(player.triple>0)player.triple--;
  if(player.shield>0)player.shield--;
  if(player.flash>0)player.flash--;

  // Multi decay
  if(multiTimer>0){multiTimer--;if(multiTimer<=0)multi=1;}

  // Stars
  stars.forEach(s=>{s.y+=s.s;if(s.y>H){s.y=0;s.x=Math.random()*W;}});

  // Bullets
  bullets.forEach(b=>{b.x+=b.vx;b.y+=b.vy;});
  bullets=bullets.filter(b=>b.y>-20&&b.y<H+20&&b.x>-20&&b.x<W+20);

  // Enemies
  let allDead=true;
  enemies.forEach(e=>{
    e.x+=e.vx+Math.sin(frame*0.02+e.phase)*0.5;
    e.y+=e.vy;
    e.flash=Math.max(0,e.flash-1);
    if(e.x<e.w/2||e.x>W-e.w/2)e.vx*=-1;
    // Shoot
    if(e.type.shoot){
      e.fireTimer--;
      if(e.fireTimer<=0&&e.y>0&&e.y<H*0.7){
        e.fireTimer=e.type.fireRate-Math.min(wave*2,40);
        const dx=player.x-e.x,dy=player.y-e.y;
        const dist=Math.hypot(dx,dy)||1;
        bullets.push({x:e.x,y:e.y+e.h/2,vx:dx/dist*3,vy:dy/dist*3,w:4,h:4,color:e.type.color,isEnemy:true});
      }
    }
    if(e.hp>0)allDead=false;
  });
  enemies=enemies.filter(e=>{
    if(e.y>H+50){return false;}
    return e.hp>0;
  });

  // Bullet-enemy collisions
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    if(b.isEnemy)continue;
    for(let j=enemies.length-1;j>=0;j--){
      const e=enemies[j];
      if(Math.abs(b.x-e.x)<(b.w+e.w)/2&&Math.abs(b.y-e.y)<(b.h+e.h)/2){
        bullets.splice(i,1);
        e.hp--;e.flash=5;
        playHit();
        addParticles(b.x,b.y,e.type.color,5,2,false);
        if(e.hp<=0){
          score+=e.type.pts*multi;
          multi=Math.min(multi+1,16);
          multiTimer=120;
          const isBig=e.type.name==='boss'||e.type.name==='tank';
          addExplosion(e.x,e.y,e.type.color,isBig);
          playExplosion(isBig);
          spawnPowerup(e.x,e.y);
          enemies.splice(j,1);
          waveEnemies--;
        }
        break;
      }
    }
  }

  // Enemy bullet-player collisions
  if(player.flash<=0){
    for(let i=bullets.length-1;i>=0;i--){
      const b=bullets[i];
      if(!b.isEnemy)continue;
      if(Math.abs(b.x-player.x)<(b.w+player.w)/2&&Math.abs(b.y-player.y)<(b.h+player.h)/2){
        bullets.splice(i,1);
        if(player.shield>0){
          player.shield=0;
          addParticles(player.x,player.y,'#0f0',15,4,false);
          playHit();
        } else {
          lives--;
          player.flash=60;
          shakes.push(8,-6,5);
          playExplosion(false);
          addParticles(player.x,player.y,'#0ff',20,4,false);
          if(lives<=0){die();return;}
        }
      }
    }
  }

  // Enemy-player collision
  if(player.flash<=0){
    enemies.forEach(e=>{
      if(Math.abs(e.x-player.x)<(e.w+player.w)/2&&Math.abs(e.y-player.y)<(e.h+player.h)/2){
        if(player.shield>0){player.shield=0;e.hp-=3;e.flash=8;playHit();}
        else{lives--;player.flash=60;shakes.push(8,-6);playExplosion(false);addParticles(player.x,player.y,'#0ff',20,4,false);if(lives<=0){die();return;}}
      }
    });
  }

  // Powerups
  powerups.forEach(p=>{p.y+=p.vy;p.pulse+=0.08;});
  for(let i=powerups.length-1;i>=0;i--){
    const p=powerups[i];
    if(p.y>H+30){powerups.splice(i,1);continue;}
    if(Math.hypot(p.x-player.x,p.y-player.y)<25){
      playPowerup();
      if(p.type.name==='rapid')player.rapid=p.type.dur;
      else if(p.type.name==='triple')player.triple=p.type.dur;
      else if(p.type.name==='shield')player.shield=p.type.dur;
      else if(p.type.name==='bomb')bombs=Math.min(bombs+1,5);
      addParticles(p.x,p.y,p.type.color,12,3,false);
      showMsg(p.type.name.toUpperCase()+'!',600);
      powerups.splice(i,1);
    }
  }

  // Particles
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.03;p.vx*=0.99;p.life-=p.decay;});
  particles=particles.filter(p=>p.life>0);
  shakes=shakes.map(s=>s*0.85).filter(s=>Math.abs(s)>0.3);

  // Next wave
  if(enemies.length===0&&waveEnemies<=0){
    waveTimer--;
    if(waveTimer<=0)nextWave();
  }

  // HUD
  document.querySelector('#hud-score .hud-val').textContent=score;
  document.querySelector('#hud-wave .hud-val').textContent=wave;
  document.querySelector('#hud-lives .hud-val').textContent='♥'.repeat(Math.max(0,lives))+('♡'.repeat(Math.max(0,3-lives)));
  const mEl=document.querySelector('#hud-multi .hud-val');
  mEl.textContent='x'+multi;
  mEl.style.color=multi>1?'hsl('+multi*20+',100%,60%)':'#0f0';
}

function die(){
  gameRunning=false;gameOver=true;
  addExplosion(player.x,player.y,'#0ff',true);
  playExplosion(true);
  if(score>best){best=score;localStorage.setItem('neon-blaster-best',best);}
  document.getElementById('go-score').textContent=score;
  document.getElementById('go-best').textContent=score>=best?'★ NEW BEST! ★':'Best: '+best;
  document.getElementById('game-over').style.display='flex';
}

function draw(){
  const sx=shakes.reduce((a,b)=>a+b,0);
  ctx.save();ctx.translate(sx,sx*0.4);

  ctx.fillStyle='#020208';ctx.fillRect(0,0,W,H);

  // Stars
  stars.forEach(s=>{
    ctx.fillStyle='rgba(100,120,200,'+(0.3+s.b*0.5)+')';
    ctx.fillRect(s.x,s.y,s.s>1?2:1,s.s>1?2:1);
  });

  // Powerups
  powerups.forEach(p=>{
    const glow=0.6+0.4*Math.sin(p.pulse);
    ctx.save();ctx.translate(p.x,p.y);
    ctx.fillStyle=p.type.color;ctx.globalAlpha=glow*0.2;
    ctx.beginPath();ctx.arc(0,0,14,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=0.9;
    ctx.strokeStyle=p.type.color;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(0,0,10,0,Math.PI*2);ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 10px Orbitron';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(p.type.icon,0,0);
    ctx.restore();
  });

  // Bullets
  bullets.forEach(b=>{
    ctx.save();
    ctx.shadowColor=b.color;ctx.shadowBlur=b.isEnemy?6:10;
    ctx.fillStyle=b.color;
    if(b.isEnemy){
      ctx.beginPath();ctx.arc(b.x,b.y,b.w,0,Math.PI*2);ctx.fill();
    } else {
      ctx.fillRect(b.x-b.w/2,b.y-b.h/2,b.w,b.h);
      ctx.fillStyle='#fff';ctx.fillRect(b.x-1,b.y-b.h/2,2,b.h*0.6);
    }
    ctx.restore();
  });

  // Enemies
  enemies.forEach(e=>{
    ctx.save();ctx.translate(e.x,e.y);
    ctx.shadowColor=e.type.color;ctx.shadowBlur=e.flash>0?20:8;
    ctx.fillStyle=e.flash>0?'#fff':e.type.color;

    if(e.type.name==='drone'){
      ctx.beginPath();ctx.moveTo(0,-e.h/2);ctx.lineTo(e.w/2,e.h/2);ctx.lineTo(-e.w/2,e.h/2);ctx.closePath();ctx.fill();
    }else if(e.type.name==='shooter'){
      ctx.fillRect(-e.w/2,-e.h/2,e.w,e.h);
      ctx.fillStyle='#000';ctx.fillRect(-e.w/4,-e.h/4,e.w/2,e.h/2);
    }else if(e.type.name==='tank'){
      ctx.beginPath();ctx.moveTo(-e.w/2,e.h/2);ctx.lineTo(-e.w/3,-e.h/2);ctx.lineTo(e.w/3,-e.h/2);ctx.lineTo(e.w/2,e.h/2);ctx.closePath();ctx.fill();
      ctx.fillStyle=e.flash>0?'#ddd':'rgba(255,255,255,0.3)';ctx.fillRect(-3,-e.h/2-8,6,8);
    }else if(e.type.name==='fast'){
      ctx.beginPath();ctx.arc(0,0,e.w/2,0,Math.PI*2);ctx.fill();
    }else if(e.type.name==='boss'){
      ctx.beginPath();ctx.moveTo(0,-e.h/2);ctx.lineTo(e.w/2,0);ctx.lineTo(e.w/3,e.h/2);
      ctx.lineTo(-e.w/3,e.h/2);ctx.lineTo(-e.w/2,0);ctx.closePath();ctx.fill();
      ctx.fillStyle='rgba(0,0,0,0.4)';ctx.beginPath();ctx.arc(0,0,e.w/4,0,Math.PI*2);ctx.fill();
      // HP bar
      ctx.shadowBlur=0;
      ctx.fillStyle='rgba(255,0,0,0.3)';ctx.fillRect(-e.w/2,e.h/2+4,e.w,3);
      ctx.fillStyle='#ff0000';ctx.fillRect(-e.w/2,e.h/2+4,e.w*(e.hp/e.maxHp),3);
    }
    ctx.restore();
  });

  // Player
  if(!gameOver && (player.flash<=0 || frame%4<2)){
    ctx.save();ctx.translate(player.x,player.y);
    const col=player.shield>0?'#0f0':'#0ff';
    ctx.shadowColor=col;ctx.shadowBlur=14;ctx.fillStyle=col;
    // Ship
    ctx.beginPath();ctx.moveTo(0,-player.h/2);ctx.lineTo(player.w/2,player.h/2);
    ctx.lineTo(player.w/4,player.h/3);ctx.lineTo(-player.w/4,player.h/3);
    ctx.lineTo(-player.w/2,player.h/2);ctx.closePath();ctx.fill();
    ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(0,-2,3,0,Math.PI*2);ctx.fill();
    // Engine
    ctx.fillStyle=player.rapid>0?'#ff0':'rgba(0,255,255,0.5)';
    ctx.beginPath();ctx.moveTo(-6,player.h/3);ctx.lineTo(0,player.h/2+6+Math.random()*8);ctx.lineTo(6,player.h/3);ctx.fill();
    // Shield
    if(player.shield>0){
      ctx.strokeStyle='rgba(0,255,0,'+(0.3+0.3*Math.sin(frame*0.15))+')';
      ctx.lineWidth=2;ctx.beginPath();ctx.arc(0,0,player.w,0,Math.PI*2);ctx.stroke();
    }
    ctx.restore();
  }

  // Particles
  particles.forEach(p=>{
    ctx.globalAlpha=p.life;ctx.fillStyle=p.color;
    ctx.shadowColor=p.color;ctx.shadowBlur=4;
    ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
  });
  ctx.globalAlpha=1;ctx.shadowBlur=0;
  ctx.restore();
}

function loop(){update();draw();requestAnimationFrame(loop);}

// Input
document.addEventListener('keydown',e=>{keys[e.code]=true;if(['Space','ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.code))e.preventDefault();});
document.addEventListener('keyup',e=>{keys[e.code]=false;});

// Touch move
document.getElementById('mobile-move').addEventListener('touchstart',e=>{e.preventDefault();touchX=e.touches[0].clientX;},{passive:false});
document.getElementById('mobile-move').addEventListener('touchmove',e=>{e.preventDefault();touchX=e.touches[0].clientX;},{passive:false});
document.getElementById('mobile-move').addEventListener('touchend',()=>{touchX=null;});
document.getElementById('mobile-fire').addEventListener('touchstart',e=>{e.preventDefault();mFire=true;},{passive:false});
document.getElementById('mobile-fire').addEventListener('touchend',()=>{mFire=false;});

// Start
function startGame(){
  if(AC.state==='suspended')AC.resume();
  document.getElementById('start').style.display='none';
  document.getElementById('game-over').style.display='none';
  initGame();
}
document.getElementById('start-btn').addEventListener('click',startGame);
document.getElementById('retry-btn').addEventListener('click',startGame);
document.addEventListener('keydown',e=>{if(e.code==='Space'&&gameOver)startGame();});

initGame();gameRunning=false;
loop();
</script>
