<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Vilnius Eats</title>
  <link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8D%BD%EF%B8%8F">
  <meta name="description" content="A neon-lit interactive map of top-rated Vilnius restaurants, bars and cafés.">
  <meta property="og:title" content="Vilnius Eats">
  <meta property="og:description" content="A stylish neon map of Vilnius — hand-picked restaurants, cafés and wine bars glowing across the Old Town and Užupis.">
  <meta property="og:url" content="https://sloppy.live/vilnius-eats">
  <meta property="og:image" content="https://image.pollinations.ai/prompt/neon%20map%20of%20Vilnius%20old%20town%20restaurant%20markers%20magenta%20cyan%20amber%20dark%20indigo%20editorial%20stylish?width=1200&height=630&nologo=true">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;1,400&family=JetBrains+Mono:wght@300;500&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-0: #070314;
      --bg-1: #0d0624;
      --bg-2: #1a0a3c;
      --ink: #f4ecff;
      --muted: rgba(244, 236, 255, 0.52);
      --grid: rgba(244, 236, 255, 0.05);
      --lith: #ffb84d;
      --modern: #4dffd5;
      --fine: #ff4dcf;
      --cafe: #ffd29a;
      --bar: #ff7d7d;
      --border: rgba(244, 236, 255, 0.14);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'JetBrains Mono', ui-monospace, monospace;
      color: var(--ink);
      background:
        radial-gradient(ellipse at 10% 0%, rgba(255, 77, 207, 0.14), transparent 45%),
        radial-gradient(ellipse at 95% 95%, rgba(77, 255, 213, 0.12), transparent 50%),
        linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 50%, var(--bg-2) 100%);
      min-height: 100vh;
      -webkit-user-select: none;
      user-select: none;
    }
    #app {
      position: fixed; inset: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      grid-template-rows: auto 1fr;
      gap: 0;
    }
    header {
      grid-column: 1 / -1;
      padding: 22px 32px 18px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, rgba(7, 3, 20, 0.85), rgba(7, 3, 20, 0.4));
      backdrop-filter: blur(8px);
      z-index: 5;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 500;
      font-style: italic;
      font-size: clamp(28px, 3.4vw, 42px);
      letter-spacing: 0.02em;
      line-height: 1;
      color: var(--ink);
    }
    h1 em {
      font-style: normal;
      font-weight: 400;
      color: var(--fine);
      text-shadow: 0 0 16px rgba(255, 77, 207, 0.55);
    }
    .sub {
      font-size: 11px;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 6px;
      font-weight: 300;
    }
    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filter {
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      background: rgba(244, 236, 255, 0.04);
      color: var(--muted);
      border: 1px solid var(--border);
      padding: 7px 12px;
      border-radius: 999px;
      cursor: pointer;
      transition: all 0.18s ease;
      white-space: nowrap;
    }
    .filter:hover { color: var(--ink); border-color: rgba(244, 236, 255, 0.35); }
    .filter.active { background: rgba(244, 236, 255, 0.08); color: var(--ink); border-color: var(--ink); }
    .filter .dot {
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      margin-right: 6px;
      vertical-align: middle;
      box-shadow: 0 0 6px currentColor;
    }
    .filter[data-k="lith"] .dot { background: var(--lith); color: var(--lith); }
    .filter[data-k="modern"] .dot { background: var(--modern); color: var(--modern); }
    .filter[data-k="fine"] .dot { background: var(--fine); color: var(--fine); }
    .filter[data-k="cafe"] .dot { background: var(--cafe); color: var(--cafe); }
    .filter[data-k="bar"] .dot { background: var(--bar); color: var(--bar); }

    #mapWrap {
      position: relative;
      overflow: hidden;
      border-right: 1px solid var(--border);
      background:
        radial-gradient(circle at 40% 60%, rgba(77, 255, 213, 0.06), transparent 60%),
        radial-gradient(circle at 70% 30%, rgba(255, 77, 207, 0.07), transparent 55%),
        linear-gradient(180deg, #0a0522 0%, #13082f 100%);
    }
    #mapSvg {
      width: 100%; height: 100%;
      display: block;
    }
    .grid-lines {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 46px 46px;
      mask-image: radial-gradient(ellipse at 50% 50%, black 40%, transparent 85%);
      -webkit-mask-image: radial-gradient(ellipse at 50% 50%, black 40%, transparent 85%);
      pointer-events: none;
    }
    .compass {
      position: absolute;
      top: 18px; left: 18px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 0.3em;
      line-height: 1.8;
      text-align: center;
    }
    .compass .n {
      display: block;
      font-size: 26px;
      font-style: italic;
      color: var(--fine);
      text-shadow: 0 0 12px rgba(255, 77, 207, 0.6);
      letter-spacing: 0;
    }
    .coords {
      position: absolute;
      bottom: 16px; right: 18px;
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: right;
      line-height: 1.7;
    }
    .legend {
      position: absolute;
      bottom: 16px; left: 18px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .legend-row { display: flex; align-items: center; gap: 8px; }
    .legend-row .chip {
      width: 10px; height: 10px;
      border: 1px solid currentColor;
      box-shadow: 0 0 8px currentColor;
    }
    .district-label {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-weight: 400;
      font-size: 14px;
      fill: rgba(244, 236, 255, 0.32);
      letter-spacing: 0.1em;
      pointer-events: none;
      text-transform: uppercase;
    }
    .street-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 8px;
      fill: rgba(244, 236, 255, 0.28);
      letter-spacing: 0.15em;
      pointer-events: none;
      text-transform: uppercase;
    }
    .river {
      fill: none;
      stroke-linecap: round;
    }
    .landmark {
      fill: rgba(244, 236, 255, 0.02);
      stroke-width: 1;
      stroke-dasharray: 4 3;
      stroke-linejoin: round;
    }
    .street {
      stroke: rgba(244, 236, 255, 0.08);
      stroke-width: 0.8;
      fill: none;
      stroke-linecap: round;
    }
    .marker {
      cursor: pointer;
    }
    .marker .halo {
      transform-origin: center;
      animation: pulse 2.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.18; r: 12px; }
      50% { opacity: 0.55; r: 18px; }
    }
    .marker .pin {
      filter: drop-shadow(0 0 8px currentColor);
    }
    .marker.dim { opacity: 0.22; }
    .marker.selected .pin-core {
      stroke-width: 2;
    }

    aside {
      background: linear-gradient(180deg, rgba(7, 3, 20, 0.9), rgba(13, 6, 36, 0.95));
      overflow-y: auto;
      padding: 16px 18px 22px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    aside::-webkit-scrollbar { width: 6px; }
    aside::-webkit-scrollbar-track { background: transparent; }
    aside::-webkit-scrollbar-thumb { background: rgba(244, 236, 255, 0.1); border-radius: 3px; }
    .search {
      width: 100%;
      font-family: 'JetBrains Mono', monospace;
      font-size: 12px;
      background: rgba(244, 236, 255, 0.04);
      color: var(--ink);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 10px 12px;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
      outline: none;
      transition: border-color 0.2s ease;
    }
    .search:focus { border-color: rgba(255, 77, 207, 0.6); }
    .count {
      font-size: 10px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--muted);
      padding: 4px 2px 8px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
    }
    .card {
      background: rgba(244, 236, 255, 0.02);
      border: 1px solid var(--border);
      border-left-width: 3px;
      padding: 12px 14px;
      cursor: pointer;
      transition: all 0.22s ease;
      position: relative;
    }
    .card:hover { background: rgba(244, 236, 255, 0.05); border-color: rgba(244, 236, 255, 0.3); }
    .card.selected {
      background: rgba(255, 77, 207, 0.08);
      border-color: rgba(255, 77, 207, 0.6);
      box-shadow: 0 0 24px rgba(255, 77, 207, 0.16);
    }
    .card.hidden { display: none; }
    .card-head {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 4px;
    }
    .card h3 {
      font-family: 'Playfair Display', serif;
      font-weight: 500;
      font-size: 18px;
      line-height: 1.15;
      color: var(--ink);
    }
    .rating {
      font-family: 'Cormorant Garamond', serif;
      font-size: 18px;
      font-style: italic;
      white-space: nowrap;
      font-weight: 500;
    }
    .tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      font-size: 9px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .tag {
      padding: 2px 7px;
      border: 1px solid var(--border);
      border-radius: 999px;
    }
    .card p {
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      line-height: 1.45;
      color: rgba(244, 236, 255, 0.82);
      font-weight: 400;
    }
    .card .where {
      margin-top: 6px;
      font-size: 10px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .card[data-k="lith"]   { border-left-color: var(--lith); }
    .card[data-k="modern"] { border-left-color: var(--modern); }
    .card[data-k="fine"]   { border-left-color: var(--fine); }
    .card[data-k="cafe"]   { border-left-color: var(--cafe); }
    .card[data-k="bar"]    { border-left-color: var(--bar); }
    .card[data-k="lith"]   .rating { color: var(--lith); }
    .card[data-k="modern"] .rating { color: var(--modern); }
    .card[data-k="fine"]   .rating { color: var(--fine); }
    .card[data-k="cafe"]   .rating { color: var(--cafe); }
    .card[data-k="bar"]    .rating { color: var(--bar); }

    .tooltip {
      position: absolute;
      pointer-events: none;
      background: rgba(7, 3, 20, 0.92);
      border: 1px solid rgba(244, 236, 255, 0.25);
      padding: 6px 10px;
      border-radius: 3px;
      font-size: 12px;
      letter-spacing: 0.04em;
      color: var(--ink);
      font-family: 'Playfair Display', serif;
      font-style: italic;
      transform: translate(-50%, -130%);
      opacity: 0;
      transition: opacity 0.15s ease;
      white-space: nowrap;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.35);
      z-index: 3;
    }
    .tooltip.show { opacity: 1; }

    @media (max-width: 820px) {
      #app { grid-template-columns: 1fr; grid-template-rows: auto 55vh 1fr; }
      aside { max-height: 45vh; }
      #mapWrap { border-right: 0; border-bottom: 1px solid var(--border); }
      header { padding: 14px 16px 12px; flex-direction: column; align-items: flex-start; }
      .compass { font-size: 12px; }
      .compass .n { font-size: 20px; }
    }
  </style>
</head>
<body>
  <div id="app">
    <header>
      <div>
        <h1>Vilnius <em>Eats</em></h1>
        <div class="sub">Where the old town glows · hand-picked · 15 rooms</div>
      </div>
      <div class="filters" id="filters">
        <button class="filter active" data-k="all">All</button>
        <button class="filter" data-k="lith"><span class="dot"></span>Lithuanian</button>
        <button class="filter" data-k="modern"><span class="dot"></span>Modern</button>
        <button class="filter" data-k="fine"><span class="dot"></span>Fine Dining</button>
        <button class="filter" data-k="cafe"><span class="dot"></span>Café</button>
        <button class="filter" data-k="bar"><span class="dot"></span>Bar</button>
      </div>
    </header>
    <div id="mapWrap">
      <div class="grid-lines"></div>
      <div class="compass">
        <span class="n">N</span>
        <span>VILNIUS</span>
      </div>
      <svg id="mapSvg" viewBox="0 0 1000 700" preserveAspectRatio="xMidYMid slice"></svg>
      <div class="coords">
        54.687° N · 25.279° E<br>OLD TOWN · UŽUPIS · NAUJAMIESTIS
      </div>
      <div class="legend">
        <div class="legend-row" style="color: var(--modern)"><span class="chip"></span>Neris · Vilnia</div>
        <div class="legend-row" style="color: var(--lith)"><span class="chip"></span>Old Town boundary</div>
        <div class="legend-row" style="color: var(--fine)"><span class="chip"></span>Užupis</div>
      </div>
      <div class="tooltip" id="tooltip"></div>
    </div>
    <aside id="aside">
      <input class="search" id="search" type="text" placeholder="Search name, cuisine, vibe…">
      <div class="count" id="count">15 places</div>
      <div id="list"></div>
    </aside>
  </div>

<script>
(() => {
  // ---- Data ----
  // Hand-picked, well-known Vilnius restaurants. x/y are stylized coords within
  // the 1000×700 viewBox (not a real projection). Descriptions are short vibe
  // notes, not verbatim reviews. Category keys map to the legend colors.
  const PLACES = [
    { id: 'nineteen18', name: 'Nineteen18', cat: 'fine',   rating: '★ Michelin', x: 510, y: 430,
      where: 'Pylimo g. 4 · Old Town',
      cuisine: 'Tasting menus · Modern Lithuanian',
      desc: 'Chef Andrius Kubilius\'s intimate tasting-menu room — seasonal ingredients staged like theatre, earning Vilnius\'s first Michelin star.' },
    { id: 'demilokas',  name: 'Demi Lokas',   cat: 'fine',   rating: 'Tasting', x: 605, y: 355,
      where: 'Stiklių g. · Old Town',
      cuisine: 'Contemporary fine dining',
      desc: 'Tiny chef\'s counter: lichen, birch sap, koji and smoke. Dinners unfold in hushed courses by candlelight.' },
    { id: 'dziaugsmas', name: 'Džiaugsmas',   cat: 'modern', rating: '★★★★½', x: 395, y: 390,
      where: 'Vokiečių g. 13 · Old Town',
      cuisine: 'Modern European',
      desc: '"Joy" translated onto the plate — pasta made that morning, bright herbs, a glass-walled kitchen open to the boulevard.' },
    { id: 'lokys',      name: 'Lokys',        cat: 'lith',   rating: '★★★★½', x: 625, y: 395,
      where: 'Stiklių g. 8 · Old Town',
      cuisine: 'Traditional Lithuanian game',
      desc: 'A vaulted 16th-century cellar of boar, elk and beaver stew. The bear on the sign has been growling since 1972.' },
    { id: 'ertlio',     name: 'Ertlio Namas', cat: 'lith',   rating: '★★★★★', x: 540, y: 350,
      where: 'Šv. Jono g. 7 · Old Town',
      cuisine: 'Historic Lithuanian',
      desc: 'Forgotten recipes from 15th-century nobility — quince-stuffed capon, rye-malt desserts, tableware from the archives.' },
    { id: 'bernelis',   name: 'Bernelių Užeiga', cat: 'lith', rating: '★★★★', x: 455, y: 340,
      where: 'Pilies g. · Old Town',
      cuisine: 'Lithuanian tavern',
      desc: 'The cepelinai benchmark for locals: zeppelin-shaped dumplings the size of a fist, sour-cream lakes, folk-pattern textiles.' },
    { id: 'senatoriu',  name: 'Senatorių Pasažas', cat: 'fine', rating: '★★★★★', x: 355, y: 290,
      where: 'Šv. Ignoto g. 3',
      cuisine: 'Multi-concept fine dining',
      desc: 'Four chefs, four rooms, one glowing courtyard. An omakase, a chop house, a patisserie and a wine cellar stacked under one roof.' },
    { id: 'sweet-root', name: 'Sweet Root',   cat: 'modern', rating: '★★★★★', x: 735, y: 415,
      where: 'Užupio g. 22 · Užupis',
      cuisine: 'New Nordic · seasonal',
      desc: 'Radicals of the farm-to-table movement — everything foraged, fermented or grown by friends within a morning\'s drive of the river.' },
    { id: 'amandus',    name: 'Amandus',      cat: 'fine',   rating: '★★★★½', x: 760, y: 455,
      where: 'Stiklių g. · Old Town',
      cuisine: 'Chef\'s counter · 8 seats',
      desc: 'Deividas Praspaliauskas cooks for a single horseshoe counter — fire, smoke, and an unapologetic love of offal.' },
    { id: 'telegrafas', name: 'Telegrafas',   cat: 'modern', rating: '★★★★', x: 340, y: 230,
      where: 'Gedimino pr. · Old Town',
      cuisine: 'Grand brasserie',
      desc: 'The grand-hotel dining room of Vilnius — steak tartare at linen tables, arched windows onto the boulevard, chandelier light.' },
    { id: 'chaika',     name: 'Chaika',       cat: 'cafe',   rating: '★★★★', x: 475, y: 470,
      where: 'Totorių g. 7 · Old Town',
      cuisine: 'Eastern European café',
      desc: 'All-day café-tearoom: cherry-compote pancakes, pelmeni, borscht — served in blue enamel on weathered reclaimed wood.' },
    { id: 'pinavija',   name: 'Pinavija',     cat: 'cafe',   rating: '★★★★½', x: 440, y: 400,
      where: 'Bernardinų g. 6',
      cuisine: 'Bakery · brunch',
      desc: 'Sunrise kingdom of sourdough, rye pastries and a famously crackly kibinai — cinnamon and coffee steam at the counter.' },
    { id: 'saint-germ', name: 'Saint Germain', cat: 'bar',   rating: '★★★★', x: 565, y: 440,
      where: 'Literatų g. 9',
      cuisine: 'French wine bar',
      desc: 'Zinc counter, a wall of natural wines, plates of rillettes and 36-month Comté — the Paris of Literatų Street.' },
    { id: 'gaspars',    name: "Gaspar's",     cat: 'modern', rating: '★★★★★', x: 665, y: 295,
      where: 'Tilto g. · Old Town',
      cuisine: 'South-Asian fusion',
      desc: 'Gaspar Fernandes pulls curry leaves, tamarind and Baltic fish into one bright, improbable menu. Book early.' },
    { id: 'dublis',     name: 'Dublis',       cat: 'modern', rating: '★★★★½', x: 385, y: 470,
      where: 'Trakų g. · Old Town',
      cuisine: 'Degustation · veg-forward',
      desc: 'A quiet loft of 5- and 9-course menus from Deivydas Praspaliauskas\' younger brother — vegetables treated like protein.' },
  ];

  const CATS = {
    lith:   { label: 'Lithuanian',  color: '#ffb84d' },
    modern: { label: 'Modern',      color: '#4dffd5' },
    fine:   { label: 'Fine Dining', color: '#ff4dcf' },
    cafe:   { label: 'Café',        color: '#ffd29a' },
    bar:    { label: 'Bar',         color: '#ff7d7d' },
  };

  const SVG_NS = 'http://www.w3.org/2000/svg';
  const svg = document.getElementById('mapSvg');
  const list = document.getElementById('list');
  const search = document.getElementById('search');
  const countEl = document.getElementById('count');
  const tooltip = document.getElementById('tooltip');
  const mapWrap = document.getElementById('mapWrap');

  let activeFilter = 'all';
  let searchQ = '';
  let selectedId = null;

  // ---- Build map layers ----
  function buildMap() {
    // stylized rivers, districts, streets — not geographically accurate
    const defs = document.createElementNS(SVG_NS, 'defs');
    defs.innerHTML = `
      <filter id="neris-glow" x="-20%" y="-20%" width="140%" height="140%">
        <feGaussianBlur stdDeviation="4" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <filter id="soft-glow" x="-40%" y="-40%" width="180%" height="180%">
        <feGaussianBlur stdDeviation="3" result="b"/>
        <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
      <pattern id="dots" width="8" height="8" patternUnits="userSpaceOnUse">
        <circle cx="1" cy="1" r="0.6" fill="rgba(244,236,255,0.08)"/>
      </pattern>
    `;
    svg.appendChild(defs);

    // dots texture behind the map
    const bgRect = document.createElementNS(SVG_NS, 'rect');
    bgRect.setAttribute('x', 0); bgRect.setAttribute('y', 0);
    bgRect.setAttribute('width', 1000); bgRect.setAttribute('height', 700);
    bgRect.setAttribute('fill', 'url(#dots)');
    svg.appendChild(bgRect);

    // Neris river (wide arc from top-left to right)
    const neris = document.createElementNS(SVG_NS, 'path');
    neris.setAttribute('d', 'M -20 140 C 180 220, 330 170, 460 190 S 720 240, 860 180 L 1020 210');
    neris.setAttribute('class', 'river');
    neris.setAttribute('stroke', 'rgba(77, 255, 213, 0.55)');
    neris.setAttribute('stroke-width', '14');
    neris.setAttribute('filter', 'url(#neris-glow)');
    svg.appendChild(neris);
    const nerisInner = document.createElementNS(SVG_NS, 'path');
    nerisInner.setAttribute('d', 'M -20 140 C 180 220, 330 170, 460 190 S 720 240, 860 180 L 1020 210');
    nerisInner.setAttribute('class', 'river');
    nerisInner.setAttribute('stroke', 'rgba(200, 255, 240, 0.8)');
    nerisInner.setAttribute('stroke-width', '1.5');
    svg.appendChild(nerisInner);

    // Vilnia river (smaller, comes from east and joins Neris around Užupis)
    const vilnia = document.createElementNS(SVG_NS, 'path');
    vilnia.setAttribute('d', 'M 1020 500 C 900 460, 820 420, 760 380 S 700 280, 660 230');
    vilnia.setAttribute('class', 'river');
    vilnia.setAttribute('stroke', 'rgba(77, 255, 213, 0.45)');
    vilnia.setAttribute('stroke-width', '6');
    vilnia.setAttribute('filter', 'url(#neris-glow)');
    svg.appendChild(vilnia);

    // Old Town boundary — irregular polygon
    const oldTown = document.createElementNS(SVG_NS, 'polygon');
    oldTown.setAttribute('points', '280,260 420,230 560,245 660,270 720,330 740,430 680,500 560,520 430,515 340,480 290,400 260,330');
    oldTown.setAttribute('class', 'landmark');
    oldTown.setAttribute('stroke', 'rgba(255, 184, 77, 0.5)');
    oldTown.setAttribute('filter', 'url(#soft-glow)');
    svg.appendChild(oldTown);

    // Užupis — across Vilnia river
    const uzupis = document.createElementNS(SVG_NS, 'polygon');
    uzupis.setAttribute('points', '740,400 840,395 880,450 850,520 760,520 720,460');
    uzupis.setAttribute('class', 'landmark');
    uzupis.setAttribute('stroke', 'rgba(255, 77, 207, 0.55)');
    uzupis.setAttribute('filter', 'url(#soft-glow)');
    svg.appendChild(uzupis);

    // Naujamiestis — west of Old Town
    const naujamiestis = document.createElementNS(SVG_NS, 'polygon');
    naujamiestis.setAttribute('points', '70,320 250,310 280,400 240,530 80,520');
    naujamiestis.setAttribute('class', 'landmark');
    naujamiestis.setAttribute('stroke', 'rgba(244, 236, 255, 0.2)');
    svg.appendChild(naujamiestis);

    // Stylized street lines through the old town
    const streets = [
      'M 320 250 Q 430 290, 480 380 T 570 510',
      'M 280 340 Q 420 360, 560 360 T 730 370',
      'M 400 235 L 430 520',
      'M 460 240 Q 510 360, 560 490',
      'M 520 240 Q 600 380, 660 500',
      'M 620 280 Q 650 400, 690 490',
      'M 310 400 Q 450 420, 590 430',
      'M 300 450 Q 480 470, 650 455',
      // Užupis alleys
      'M 750 420 Q 800 450, 850 480',
      'M 780 400 Q 810 470, 820 510',
    ];
    streets.forEach(d => {
      const p = document.createElementNS(SVG_NS, 'path');
      p.setAttribute('d', d);
      p.setAttribute('class', 'street');
      svg.appendChild(p);
    });

    // District labels
    const labels = [
      { x: 500, y: 380, text: 'Senamiestis' },
      { x: 810, y: 490, text: 'Užupis' },
      { x: 160, y: 430, text: 'Naujamiestis' },
      { x: 480, y: 135, text: 'Neris' },
      { x: 920, y: 460, text: 'Vilnia' },
    ];
    labels.forEach(l => {
      const t = document.createElementNS(SVG_NS, 'text');
      t.setAttribute('x', l.x); t.setAttribute('y', l.y);
      t.setAttribute('text-anchor', 'middle');
      t.setAttribute('class', 'district-label');
      t.textContent = l.text;
      svg.appendChild(t);
    });

    // Landmark dots — Gediminas Castle, Cathedral
    const landmarks = [
      { x: 520, y: 255, label: 'Gediminas Tower' },
      { x: 455, y: 275, label: 'Cathedral' },
      { x: 755, y: 475, label: 'Bernardinai' },
      { x: 155, y: 270, label: 'TV Tower' },
    ];
    landmarks.forEach(l => {
      const g = document.createElementNS(SVG_NS, 'g');
      const c = document.createElementNS(SVG_NS, 'circle');
      c.setAttribute('cx', l.x); c.setAttribute('cy', l.y);
      c.setAttribute('r', 2.5);
      c.setAttribute('fill', 'rgba(244,236,255,0.55)');
      const t = document.createElementNS(SVG_NS, 'text');
      t.setAttribute('x', l.x + 6); t.setAttribute('y', l.y + 3);
      t.setAttribute('class', 'street-label');
      t.textContent = l.label;
      g.appendChild(c); g.appendChild(t);
      svg.appendChild(g);
    });
  }

  // ---- Build markers ----
  const markers = {};
  function buildMarkers() {
    PLACES.forEach((p, idx) => {
      const color = CATS[p.cat].color;
      const g = document.createElementNS(SVG_NS, 'g');
      g.setAttribute('class', 'marker');
      g.setAttribute('data-id', p.id);
      g.setAttribute('data-k', p.cat);
      g.setAttribute('transform', `translate(${p.x}, ${p.y})`);
      g.setAttribute('style', `color: ${color}`);

      const halo = document.createElementNS(SVG_NS, 'circle');
      halo.setAttribute('class', 'halo');
      halo.setAttribute('r', 14);
      halo.setAttribute('fill', color);
      halo.setAttribute('fill-opacity', 0.18);
      halo.style.animationDelay = (idx * 0.19) + 's';
      g.appendChild(halo);

      const pin = document.createElementNS(SVG_NS, 'g');
      pin.setAttribute('class', 'pin');
      const ring = document.createElementNS(SVG_NS, 'circle');
      ring.setAttribute('r', 8);
      ring.setAttribute('fill', 'rgba(7,3,20,0.9)');
      ring.setAttribute('stroke', color);
      ring.setAttribute('stroke-width', 1.5);
      ring.setAttribute('class', 'pin-core');
      pin.appendChild(ring);
      const core = document.createElementNS(SVG_NS, 'circle');
      core.setAttribute('r', 3);
      core.setAttribute('fill', color);
      pin.appendChild(core);
      g.appendChild(pin);

      g.addEventListener('mouseenter', e => showTooltip(e, p));
      g.addEventListener('mousemove', moveTooltip);
      g.addEventListener('mouseleave', hideTooltip);
      g.addEventListener('click', e => { e.stopPropagation(); selectPlace(p.id, true); });

      svg.appendChild(g);
      markers[p.id] = g;
    });

    svg.addEventListener('click', () => selectPlace(null));
  }

  // ---- Build list ----
  function buildList() {
    list.innerHTML = '';
    PLACES.forEach(p => {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.id = p.id;
      card.dataset.k = p.cat;
      card.innerHTML = `
        <div class="card-head">
          <h3>${p.name}</h3>
          <span class="rating">${p.rating}</span>
        </div>
        <div class="tags">
          <span class="tag">${CATS[p.cat].label}</span>
          <span class="tag">${escapeHtml(p.cuisine)}</span>
        </div>
        <p>${escapeHtml(p.desc)}</p>
        <div class="where">${escapeHtml(p.where)}</div>
      `;
      card.addEventListener('click', () => selectPlace(p.id, true));
      list.appendChild(card);
    });
  }
  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
  }

  // ---- Interactions ----
  function selectPlace(id, scrollTo = false) {
    selectedId = id;
    document.querySelectorAll('.marker').forEach(m => {
      m.classList.toggle('selected', m.dataset.id === id);
    });
    document.querySelectorAll('.card').forEach(c => {
      const on = c.dataset.id === id;
      c.classList.toggle('selected', on);
      if (on && scrollTo) c.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    });
  }

  function applyFilter() {
    let visible = 0;
    PLACES.forEach(p => {
      const matchesCat = activeFilter === 'all' || activeFilter === p.cat;
      const q = searchQ.trim().toLowerCase();
      const hay = (p.name + ' ' + p.cuisine + ' ' + p.desc + ' ' + p.where).toLowerCase();
      const matchesSearch = !q || hay.includes(q);
      const show = matchesCat && matchesSearch;
      if (show) visible++;
      markers[p.id].classList.toggle('dim', !show);
      document.querySelector(`.card[data-id="${p.id}"]`).classList.toggle('hidden', !show);
    });
    countEl.textContent = `${visible} ${visible === 1 ? 'place' : 'places'}`;
  }

  document.getElementById('filters').addEventListener('click', e => {
    const b = e.target.closest('.filter');
    if (!b) return;
    document.querySelectorAll('.filter').forEach(f => f.classList.toggle('active', f === b));
    activeFilter = b.dataset.k;
    applyFilter();
  });

  search.addEventListener('input', e => {
    searchQ = e.target.value;
    applyFilter();
  });

  function showTooltip(e, p) {
    tooltip.textContent = p.name;
    tooltip.classList.add('show');
    moveTooltip(e);
  }
  function moveTooltip(e) {
    const rect = mapWrap.getBoundingClientRect();
    tooltip.style.left = (e.clientX - rect.left) + 'px';
    tooltip.style.top = (e.clientY - rect.top) + 'px';
  }
  function hideTooltip() { tooltip.classList.remove('show'); }

  buildMap();
  buildMarkers();
  buildList();
  applyFilter();
})();
</script>
</body>
</html>
