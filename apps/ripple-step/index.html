<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ripple Step</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%92%A7">
<meta name="description" content="A minimalist step sequencer. Each note drops a colored ripple on a digital pond.">
<meta property="og:title" content="Ripple Step">
<meta property="og:description" content="A step sequencer where every note drops a colored ripple.">
<meta property="og:url" content="https://sloppy.live/ripple-step">
<meta property="og:image" content="https://image.pollinations.ai/prompt/minimalist%20dark%20teal%20pond%20with%20concentric%20colorful%20ripples%20expanding%20on%20still%20water%20zen%20music%20visualizer?width=1200&height=630&nologo=true&model=flux">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300;9..144,500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a1820;
  --bg-deep:#04101a;
  --water:#0d2230;
  --water-light:#163949;
  --foam:#a8d8e2;
  --cream:#e8e0d0;
  --dim:#5a7480;
  --note-1:#f5d068;  /* pale yellow */
  --note-2:#f5926a;  /* peach */
  --note-3:#e84c7a;  /* coral */
  --note-4:#c47bff;  /* lavender */
  --note-5:#5ec2e8;  /* sky */
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:var(--bg-deep);color:var(--cream);font-family:'JetBrains Mono',monospace;overflow-x:hidden}
body{
  background:
    radial-gradient(ellipse at 50% 0%, var(--bg) 0%, var(--bg-deep) 70%),
    var(--bg-deep);
  min-height:100vh;
  padding:1.4rem 1rem 2rem;
  display:flex;flex-direction:column;align-items:center;
}
.wrap{width:100%;max-width:60rem;display:flex;flex-direction:column;gap:1rem;flex:1}

header{
  display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:0.6rem;
}
header h1{
  font-family:'Fraunces',serif;
  font-weight:300;
  font-style:italic;
  font-size:clamp(1.8rem, 4vw, 2.6rem);
  letter-spacing:-0.01em;
  color:var(--cream);
  line-height:1;
}
header h1 .dot{color:var(--note-3);font-style:normal}
header .crumb{
  font-family:'JetBrains Mono',monospace;
  font-size:0.7rem;letter-spacing:0.22em;color:var(--dim);text-transform:uppercase;
}

.pond-wrap{
  position:relative;
  background:var(--water);
  border-radius:18px;
  overflow:hidden;
  flex:1;min-height:18rem;
  box-shadow:
    inset 0 0 0 1px rgba(168,216,226,0.05),
    inset 0 6px 24px rgba(0,0,0,0.4),
    0 12px 40px rgba(0,0,0,0.4);
}
.pond-wrap::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:2;
  background:
    radial-gradient(ellipse at 30% 20%, rgba(168,216,226,0.06) 0%, transparent 50%),
    radial-gradient(ellipse at 70% 80%, rgba(94,194,232,0.04) 0%, transparent 60%);
}
canvas#pond{display:block;width:100%;height:100%;position:absolute;inset:0;cursor:crosshair}

.hint{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%);
  font-family:'Fraunces',serif;font-style:italic;font-weight:300;
  font-size:1.05rem;color:var(--foam);opacity:0.55;
  pointer-events:none;z-index:3;text-align:center;
  transition:opacity 0.4s ease;
}
.hint.hidden{opacity:0}

.controls{
  display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;
}
.btn{
  background:transparent;border:1px solid var(--dim);color:var(--cream);
  padding:0.55rem 1rem;font-family:'JetBrains Mono',monospace;font-size:0.78rem;
  letter-spacing:0.16em;text-transform:uppercase;cursor:pointer;
  min-height:2.75rem;
  border-radius:3px;transition:all 0.16s ease;
}
.btn:hover{border-color:var(--foam);color:var(--foam);background:rgba(168,216,226,0.04)}
.btn:focus-visible{outline:2px solid var(--note-3);outline-offset:2px}
.btn.primary{border-color:var(--note-3);color:var(--note-3)}
.btn.primary:hover{background:rgba(232,76,122,0.08);color:var(--cream)}
.btn[aria-pressed="true"]{background:var(--note-3);color:var(--bg-deep);border-color:var(--note-3)}
.slider-wrap{display:flex;align-items:center;gap:0.6rem;flex:1;min-width:12rem}
.slider-wrap label{font-size:0.7rem;letter-spacing:0.22em;color:var(--dim);text-transform:uppercase}
.slider-wrap .val{font-size:0.8rem;color:var(--cream);min-width:3rem}
input[type=range]{
  flex:1;height:2px;background:var(--dim);appearance:none;cursor:pointer;
  border-radius:1px;
}
input[type=range]::-webkit-slider-thumb{
  appearance:none;width:14px;height:14px;background:var(--note-3);
  border-radius:50%;cursor:pointer;box-shadow:0 0 8px rgba(232,76,122,0.6);
}
input[type=range]::-moz-range-thumb{
  width:14px;height:14px;background:var(--note-3);border:none;
  border-radius:50%;cursor:pointer;box-shadow:0 0 8px rgba(232,76,122,0.6);
}

.duration-pick{
  display:flex;gap:0.3rem;align-items:center;flex-wrap:wrap;
}
.duration-pick .lbl{
  font-family:'JetBrains Mono',monospace;font-size:0.66rem;letter-spacing:0.22em;
  color:var(--dim);text-transform:uppercase;margin-right:0.2rem;
}
.duration-pick .chip{
  background:transparent;border:1px solid var(--dim);color:var(--dim);
  padding:0.3rem 0.5rem;font-family:'JetBrains Mono',monospace;font-size:0.66rem;
  letter-spacing:0.05em;cursor:pointer;border-radius:3px;
  min-height:2.0rem;min-width:2.2rem;
  display:flex;align-items:center;justify-content:center;
}
.duration-pick .chip:hover{color:var(--cream);border-color:var(--foam)}
.duration-pick .chip[aria-pressed="true"]{
  background:var(--note-5);color:var(--bg-deep);border-color:var(--note-5);
  box-shadow:0 0 8px rgba(94,194,232,0.4);
}
/* formant preset row reuses .duration-pick layout */
.formant-pick .div-tick{
  font-family:'Fraunces',serif;font-style:italic;font-size:0.7rem;
  color:var(--dim);padding:0 0.1rem 0 0.3rem;
  letter-spacing:0.02em;
}
.formant-pick .chip.f-vowel[aria-pressed="true"]{
  background:var(--note-4);color:var(--bg-deep);border-color:var(--note-4);
  box-shadow:0 0 8px rgba(196,123,255,0.5);
}
.formant-pick .chip.f-cons[aria-pressed="true"]{
  background:var(--note-2);color:var(--bg-deep);border-color:var(--note-2);
  box-shadow:0 0 8px rgba(245,146,106,0.5);
}
.formant-pick .chip.f-none[aria-pressed="true"]{
  background:transparent;color:var(--cream);border-color:var(--foam);
  box-shadow:none;
}
.scale-pick{display:flex;gap:0.3rem}
.scale-pick .chip{
  background:transparent;border:1px solid var(--dim);color:var(--dim);
  padding:0.35rem 0.65rem;font-family:'JetBrains Mono',monospace;font-size:0.66rem;
  letter-spacing:0.18em;text-transform:uppercase;cursor:pointer;border-radius:3px;
  min-height:2.2rem;
}
.scale-pick .chip:hover{color:var(--cream);border-color:var(--foam)}
.scale-pick .chip[aria-pressed="true"]{background:var(--note-4);color:var(--bg-deep);border-color:var(--note-4)}

.sequencer{
  background:rgba(13,34,48,0.5);
  border-radius:12px;
  padding:0.7rem 0.8rem 0.6rem;
  display:flex;flex-direction:column;gap:0.5rem;
}
.section-bar{
  display:flex;align-items:center;justify-content:space-between;gap:0.6rem;
  padding:0 0.1rem 0.2rem;
  border-bottom:1px dashed rgba(168,216,226,0.15);
  flex-wrap:wrap;
}
.section-pills{display:flex;gap:0.3rem}
.section-pills .pill{
  background:transparent;border:1px solid var(--dim);
  font-family:'Fraunces',serif;font-style:italic;font-weight:500;font-size:0.92rem;
  color:var(--dim);
  padding:0.32rem 0.95rem;cursor:pointer;border-radius:18px;
  letter-spacing:0.01em;min-height:2.2rem;
  transition:all 0.16s ease;
  display:flex;align-items:center;gap:0.36rem;
}
.section-pills .pill:hover{color:var(--cream);border-color:var(--foam)}
.section-pills .pill .dot{
  width:0.5rem;height:0.5rem;border-radius:50%;background:var(--dim);
  display:inline-block;
}
.section-pills .pill.verse[aria-pressed="true"]{color:var(--note-1);border-color:var(--note-1);background:rgba(245,208,104,0.07)}
.section-pills .pill.verse[aria-pressed="true"] .dot{background:var(--note-1);box-shadow:0 0 6px var(--note-1)}
.section-pills .pill.chorus[aria-pressed="true"]{color:var(--note-3);border-color:var(--note-3);background:rgba(232,76,122,0.07)}
.section-pills .pill.chorus[aria-pressed="true"] .dot{background:var(--note-3);box-shadow:0 0 6px var(--note-3)}
.section-meta{
  font-family:'JetBrains Mono',monospace;font-size:0.66rem;
  color:var(--dim);letter-spacing:0.18em;text-transform:uppercase;
}
.section-meta .now{color:var(--cream)}

.bar-picker{
  display:grid;
  grid-template-columns:2.5rem repeat(8, 1fr);
  gap:0.22rem;
  align-items:stretch;
  padding-bottom:0.18rem;
}
.bar-picker::before{
  content:'BARS';
  display:flex;align-items:center;justify-content:flex-end;
  padding-right:0.4rem;
  font-family:'JetBrains Mono',monospace;font-size:0.6rem;letter-spacing:0.2em;color:var(--dim);
}
.bar-chip{
  background:transparent;border:1px solid var(--dim);
  color:var(--dim);
  font-family:'JetBrains Mono',monospace;font-size:0.72rem;letter-spacing:0.06em;
  cursor:pointer;border-radius:4px;
  min-height:2.1rem;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.14s ease;position:relative;
}
.bar-chip:hover{color:var(--cream);border-color:var(--foam)}
.bar-chip:focus-visible{outline:2px solid var(--note-3);outline-offset:1px}
.bar-chip[aria-pressed="true"]{
  color:var(--cream);border-color:var(--foam);
  background:rgba(168,216,226,0.08);
}
.bar-chip.playing::after{
  content:'';position:absolute;top:0.2rem;right:0.28rem;
  width:0.36rem;height:0.36rem;border-radius:50%;
  background:var(--note-5);box-shadow:0 0 6px var(--note-5);
}

.structure-bar{
  background:rgba(4,16,26,0.55);
  border-radius:8px;
  padding:0.55rem 0.7rem;
  display:flex;flex-direction:column;gap:0.34rem;
}
.structure-bar .head{
  display:flex;justify-content:space-between;align-items:baseline;
  font-family:'JetBrains Mono',monospace;font-size:0.66rem;
  color:var(--dim);letter-spacing:0.2em;text-transform:uppercase;
}
.structure-bar .head .hint{
  font-family:'Fraunces',serif;font-style:italic;text-transform:none;letter-spacing:0;
  font-size:0.74rem;color:var(--dim);
}
.structure-blocks{
  display:grid;
  grid-template-columns:repeat(8, 1fr);
  gap:0.3rem;
}
.block{
  background:transparent;
  border:1px solid var(--dim);
  border-radius:6px;
  min-height:2.4rem;
  cursor:pointer;
  font-family:'Fraunces',serif;font-style:italic;font-weight:500;
  font-size:1.0rem;
  color:var(--dim);
  display:flex;align-items:center;justify-content:center;
  letter-spacing:0;
  transition:all 0.16s ease;position:relative;
}
.block:hover{border-color:var(--foam);color:var(--foam)}
.block:focus-visible{outline:2px solid var(--note-3);outline-offset:1px}
.block.verse{color:var(--note-1);border-color:var(--note-1);background:rgba(245,208,104,0.06)}
.block.chorus{color:var(--note-3);border-color:var(--note-3);background:rgba(232,76,122,0.07)}
.block.rest{color:var(--dim);border-style:dashed}
.block.playing{
  box-shadow:0 0 0 2px var(--cream), 0 0 14px rgba(232,255,255,0.4);
  transform:translateY(-1px);
}
.block .idx{
  position:absolute;top:0.16rem;left:0.34rem;
  font-family:'JetBrains Mono',monospace;font-size:0.5rem;
  color:var(--dim);letter-spacing:0.08em;font-style:normal;font-weight:400;
}
.block .bar-mark{
  position:absolute;bottom:0.16rem;right:0.34rem;
  font-family:'JetBrains Mono',monospace;font-size:0.52rem;font-weight:500;
  color:var(--cream);letter-spacing:0.04em;font-style:normal;
  background:rgba(0,0,0,0.35);padding:0.04rem 0.24rem;border-radius:3px;
  line-height:1;
}
.row{
  display:grid;
  grid-template-columns:2.5rem repeat(16, 1fr);
  gap:0.22rem;
  align-items:stretch;
  position:relative;     /* containing block for absolutely-positioned .note-fill */
}
.row .lbl{
  display:flex;align-items:center;justify-content:flex-end;
  font-family:'Fraunces',serif;font-style:italic;font-weight:500;
  font-size:0.95rem;
  color:var(--dim);padding-right:0.4rem;
}
.row.r-1 .lbl{color:var(--note-1)}
.row.r-2 .lbl{color:var(--note-2)}
.row.r-3 .lbl{color:var(--note-3)}
.row.r-4 .lbl{color:var(--note-4)}
.row.r-5 .lbl{color:var(--note-5)}
.cell{
  aspect-ratio:1;
  background:rgba(168,216,226,0.04);
  border:1px solid rgba(168,216,226,0.08);
  border-radius:3px;
  cursor:pointer;
  transition:background 0.12s ease, transform 0.08s ease, box-shadow 0.18s ease;
  min-height:1.4rem;
  position:relative;
  z-index:1;
}
.cell:hover{background:rgba(168,216,226,0.10);z-index:3}
.cell:focus-visible{outline:2px solid var(--note-3);outline-offset:1px;z-index:3}
.cell.beat{background:rgba(168,216,226,0.08)}
.cell.head{background:rgba(168,216,226,0.22);border-color:rgba(168,216,226,0.55);z-index:3}
.note-fill{
  /* Absolutely positioned over the cells — left/width/top/height set by JS
     from measured cell rects so the fill always aligns to the actual
     pixel positions of the underlying grid cells. */
  position:absolute;
  background:var(--cell-color, var(--note-3));
  border:1px solid var(--cell-color, var(--note-3));
  border-radius:3px;
  box-shadow:0 0 8px var(--cell-color, var(--note-3));
  pointer-events:none;
  z-index:2;
  overflow:hidden;
}
.note-fill::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:rgba(255,255,255,0.7);
  border-radius:3px 0 0 3px;
}
.row.r-1 .note-fill{--cell-color:var(--note-1)}
.row.r-2 .note-fill{--cell-color:var(--note-2)}
.row.r-3 .note-fill{--cell-color:var(--note-3)}
.row.r-4 .note-fill{--cell-color:var(--note-4)}
.row.r-5 .note-fill{--cell-color:var(--note-5)}
.note-fill.playing{box-shadow:0 0 18px var(--cell-color), 0 0 6px white;filter:brightness(1.18)}

footer{
  margin-top:0.4rem;
  text-align:center;
  font-family:'Fraunces',serif;font-style:italic;font-weight:300;
  font-size:0.84rem;color:var(--dim);
}
footer .pulse{color:var(--note-5);animation:pulse 2.6s infinite ease-in-out}
@keyframes pulse{0%,100%{opacity:0.55}50%{opacity:1}}

@media (max-width:640px){
  body{padding:0.8rem 0.5rem 1.6rem}
  .pond-wrap{min-height:14rem}
  .controls{flex-direction:column;align-items:stretch}
  .slider-wrap{width:100%}
  .row{grid-template-columns:1.6rem repeat(16, 1fr);gap:0.14rem}
  .row .lbl{font-size:0.8rem;padding-right:0.2rem}
}
@media (prefers-reduced-motion: reduce){
  footer .pulse{animation:none}
  .cell{transition:none}
}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>ripple <span class="dot">·</span> step</h1>
    <span class="crumb">sequencer / digital pond</span>
  </header>

  <div class="pond-wrap">
    <canvas id="pond" role="img" aria-label="Digital pond. Active notes drop colored ripples that expand and fade across the water."></canvas>
    <div class="hint" id="hint">tap a cell · press space to play</div>
  </div>

  <div class="controls" role="group" aria-label="Playback controls">
    <button class="btn primary" id="playBtn" type="button" aria-pressed="false">▶ play</button>
    <button class="btn" id="clearBtn" type="button">clear</button>
    <button class="btn" id="seedBtn" type="button">seed</button>
    <div class="slider-wrap">
      <label for="bpm">tempo</label>
      <input type="range" id="bpm" min="60" max="160" value="96" step="1" aria-label="tempo bpm">
      <span class="val" id="bpmVal">96</span>
    </div>
    <div class="scale-pick" role="group" aria-label="Scale">
      <button class="chip" id="scalePent" type="button" aria-pressed="true">pent</button>
      <button class="chip" id="scaleHira" type="button" aria-pressed="false">hira</button>
      <button class="chip" id="scaleDor"  type="button" aria-pressed="false">dor</button>
    </div>
  </div>

  <div class="duration-pick" role="group" aria-label="Note duration">
    <span class="lbl">note</span>
    <button class="chip" type="button" data-dur="1/64" aria-pressed="false">1/64</button>
    <button class="chip" type="button" data-dur="1/32" aria-pressed="false">1/32</button>
    <button class="chip" type="button" data-dur="1/16" aria-pressed="false">1/16</button>
    <button class="chip" type="button" data-dur="1/8"  aria-pressed="true">1/8</button>
    <button class="chip" type="button" data-dur="1/4"  aria-pressed="false">1/4</button>
    <button class="chip" type="button" data-dur="1/2"  aria-pressed="false">1/2</button>
    <button class="chip" type="button" data-dur="1"    aria-pressed="false">1 bar</button>
  </div>

  <div class="duration-pick formant-pick" role="group" aria-label="Formant filter preset" id="formantPick">
    <span class="lbl">formant</span>
    <button class="chip f-none" type="button" data-formant="none" aria-pressed="true">none</button>
    <span class="div-tick" aria-hidden="true">vowels</span>
    <button class="chip f-vowel" type="button" data-formant="ah" aria-pressed="false">ah</button>
    <button class="chip f-vowel" type="button" data-formant="eh" aria-pressed="false">eh</button>
    <button class="chip f-vowel" type="button" data-formant="ee" aria-pressed="false">ee</button>
    <button class="chip f-vowel" type="button" data-formant="oh" aria-pressed="false">oh</button>
    <button class="chip f-vowel" type="button" data-formant="oo" aria-pressed="false">oo</button>
    <span class="div-tick" aria-hidden="true">cons</span>
    <button class="chip f-cons" type="button" data-formant="ss" aria-pressed="false">ss</button>
    <button class="chip f-cons" type="button" data-formant="sh" aria-pressed="false">sh</button>
    <button class="chip f-cons" type="button" data-formant="ff" aria-pressed="false">ff</button>
    <button class="chip f-cons" type="button" data-formant="mm" aria-pressed="false">mm</button>
  </div>

  <div class="sequencer" aria-label="Step grid 5 rows by 16 steps with verse and chorus sections">
    <div class="section-bar">
      <div class="section-pills" role="group" aria-label="Edit which section">
        <button class="pill verse" id="editVerse" type="button" aria-pressed="true">
          <span class="dot"></span> verse
        </button>
        <button class="pill chorus" id="editChorus" type="button" aria-pressed="false">
          <span class="dot"></span> chorus
        </button>
      </div>
      <div class="section-meta">editing <span class="now" id="editingNow">VERSE</span></div>
    </div>
    <div class="bar-picker" role="group" aria-label="Bar to edit within the 8-bar pattern" id="barPicker"></div>
    <div class="row r-1" data-row="0">
      <div class="lbl">A</div>
    </div>
    <div class="row r-2" data-row="1">
      <div class="lbl">G</div>
    </div>
    <div class="row r-3" data-row="2">
      <div class="lbl">E</div>
    </div>
    <div class="row r-4" data-row="3">
      <div class="lbl">D</div>
    </div>
    <div class="row r-5" data-row="4">
      <div class="lbl">C</div>
    </div>
  </div>

  <div class="structure-bar" aria-label="Song structure">
    <div class="head">
      <span>song structure · 8 bars per block</span>
      <span class="hint">click a block to cycle: verse → chorus → rest</span>
    </div>
    <div class="structure-blocks" id="structureBlocks" role="group" aria-label="Song structure blocks"></div>
  </div>

  <footer>
    a pond is just memory <span class="pulse">·</span> click the water to drop a stone
  </footer>
</div>

<script>
'use strict';

// ─────────────────────────────────────────────────────────────
// RIPPLE STEP — minimalist step sequencer with pond visualizer
// ─────────────────────────────────────────────────────────────
const STEPS_PER_BAR = 16;                      // visible cells per bar
const FINE_PER_CELL = 4;                       // 4 sub-slots per cell (1/64 resolution)
const FINE_PER_BAR  = STEPS_PER_BAR * FINE_PER_CELL;  // 64
const BARS = 8;
const FINE_TOTAL = FINE_PER_BAR * BARS;        // 512 fine slots per pattern
const ROWS = 5;
const ROW_LABELS = ['A', 'G', 'E', 'D', 'C'];
// pentatonic C major octaves arranged top→bottom A G E D C (high to low)
const SCALES = {
  pent: [880.00, 783.99, 659.25, 587.33, 523.25],  // A5 G5 E5 D5 C5
  hira: [659.25, 587.33, 554.37, 466.16, 440.00],  // hirajoshi-ish E5 D5 C#5 A#4 A4
  dor:  [880.00, 740.00, 659.25, 587.33, 523.25],  // dorian-ish
};
let SCALE = 'pent';
const NOTE_COLORS = ['#f5d068','#f5926a','#e84c7a','#c47bff','#5ec2e8'];

// ─────────────────────────────────────────────────────────────
// PATTERN STATE — two sections (verse / chorus) + song structure
// ─────────────────────────────────────────────────────────────
// Pattern cells store note objects `{ dur, formant }` when active, or 0
// when off. `dur` is in 1/64 fine-slot units (1 = a 1/64, 4 = a 1/16,
// 16 = a 1/4, 64 = a whole bar). `formant` is a preset key from FORMANTS
// (none/ah/eh/ee/oh/oo/ss/sh/ff/mm) and is applied per-voice when this
// note is triggered.
const patterns = {
  verse:  Array.from({length: ROWS}, () => Array(FINE_TOTAL).fill(0)),
  chorus: Array.from({length: ROWS}, () => Array(FINE_TOTAL).fill(0)),
};
// Note-cell accessors — keep call sites readable even though the
// underlying storage is `0 | {dur, formant}`.
function noteDur(cell){ return cell ? cell.dur : 0; }
function noteFormant(cell){ return cell ? (cell.formant || 'none') : 'none'; }
function makeNote(dur, formant){ return { dur, formant: formant || 'none' }; }
let editing = 'verse';                        // which section the grid currently shows
let editBar = 0;                              // 0..BARS-1 — which 16-step page of the
                                              // 128-step pattern the grid is currently editing
// 8-block song structure: each entry is 'verse' | 'chorus' | 'rest'
// Default: classic V V C V V C C C
const structure = ['verse','verse','chorus','verse','verse','chorus','chorus','chorus'];
let structureIdx = 0;                         // which block of the structure is playing
let playhead = -1;                            // 0..127 (full 8-bar position within the block)
let autoFollow = true;                        // grid auto-pages to follow the playhead's bar
let playing = false;
let bpm = 96;
let stepTime = (60 / bpm) / 16 * 1000;  // 1/64 fine slots = playback resolution
let lastStepAt = 0;
function curPattern(){ return patterns[editing]; }
function activeBlockKind(){ return structure[structureIdx]; }

// ─────────────────────────────────────────────────────────────
// CANVAS / POND
// ─────────────────────────────────────────────────────────────
const cv = document.getElementById('pond');
const ctx = cv.getContext('2d');
let W = 0, H = 0, DPR = 1;
function resize(){
  DPR = Math.min(2, window.devicePixelRatio || 1);
  const r = cv.getBoundingClientRect();
  W = r.width; H = r.height;
  cv.width = Math.round(W * DPR);
  cv.height = Math.round(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);

// ripples: each step spawns a ripple at a row-fixed Y + step-fixed X (deterministic)
// plus a tiny jitter for variety
const ripples = [];
function spawnRipple(row, step, color, fromUser){
  // X across the pond is anchored to step-within-a-bar (0..15), Y to row
  // index, with a small jitter so things don't look too gridlike. We use
  // the step-within-bar (visualStep) rather than the 0..127 block-global
  // position so the visual movement matches the visible grid.
  const visualStep = step % STEPS_PER_BAR;
  const x = fromUser ? fromUser.x : ((visualStep + 0.5) / STEPS_PER_BAR) * W + (Math.random() - 0.5) * 16;
  const y = fromUser ? fromUser.y : ((row + 0.5) / ROWS) * H * 0.86 + H * 0.07 + (Math.random() - 0.5) * 16;
  ripples.push({
    x, y,
    r: 6,
    maxR: 90 + Math.random() * 60,
    life: 0,
    max: 2.4 + Math.random() * 0.6,
    color,
    width: 2.2,
  });
  // tiny center splash
  ripples.push({
    x, y,
    r: 2,
    maxR: 22,
    life: 0,
    max: 0.7,
    color,
    width: 1,
  });
}

// ambient drifting motes — slow, very low-alpha sparkles for "alive water"
const motes = [];
for (let i = 0; i < 22; i++){
  motes.push({
    x: Math.random(), y: Math.random(),
    vx: (Math.random() - 0.5) * 0.005,
    vy: (Math.random() - 0.5) * 0.005,
    r: 0.5 + Math.random() * 1.2,
    phase: Math.random() * Math.PI * 2,
  });
}

let bgT = 0;
function tickPond(dt){
  bgT += dt;
  for (const r of ripples){
    r.life += dt;
    r.r = 6 + (r.life / r.max) * r.maxR;
  }
  // drop expired
  for (let i = ripples.length - 1; i >= 0; i--){
    if (ripples[i].life >= ripples[i].max) ripples.splice(i, 1);
  }
  for (const m of motes){
    m.x += m.vx * dt;
    m.y += m.vy * dt;
    if (m.x < 0) m.x = 1; else if (m.x > 1) m.x = 0;
    if (m.y < 0) m.y = 1; else if (m.y > 1) m.y = 0;
  }
}

function drawPond(){
  // base water — subtle dark gradient
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#163949');
  g.addColorStop(0.6, '#0d2230');
  g.addColorStop(1, '#0a1820');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // surface horizontal lines (very faint, suggesting calm water)
  ctx.strokeStyle = 'rgba(168,216,226,0.025)';
  ctx.lineWidth = 1;
  for (let y = 12; y < H; y += 26){
    ctx.beginPath();
    const wobble = Math.sin(bgT * 0.6 + y * 0.05) * 1.4;
    ctx.moveTo(0, y + wobble);
    ctx.lineTo(W, y - wobble);
    ctx.stroke();
  }

  // drifting motes
  for (const m of motes){
    const px = m.x * W;
    const py = m.y * H;
    const blink = 0.4 + Math.sin(bgT * 1.4 + m.phase) * 0.3;
    ctx.fillStyle = `rgba(168,216,226,${0.12 * blink})`;
    ctx.beginPath();
    ctx.arc(px, py, m.r, 0, Math.PI*2); ctx.fill();
  }

  // ripples (use lighter blend for glowy overlap)
  ctx.globalCompositeOperation = 'lighter';
  for (const r of ripples){
    const k = r.life / r.max;
    const alpha = (1 - k) * 0.85;
    // primary ring
    ctx.strokeStyle = hexA(r.color, alpha);
    ctx.lineWidth = r.width * (1 + k * 0.6);
    ctx.beginPath();
    ctx.arc(r.x, r.y, r.r, 0, Math.PI * 2);
    ctx.stroke();
    // second concentric thinner ring
    if (r.maxR > 30){
      ctx.strokeStyle = hexA(r.color, alpha * 0.45);
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.arc(r.x, r.y, r.r * 0.62, 0, Math.PI * 2);
      ctx.stroke();
    }
    // soft glow disc at center, fades fast
    if (r.life < 0.4){
      const gAlpha = (1 - r.life / 0.4) * 0.35;
      const grad = ctx.createRadialGradient(r.x, r.y, 1, r.x, r.y, 18);
      grad.addColorStop(0, hexA(r.color, gAlpha));
      grad.addColorStop(1, hexA(r.color, 0));
      ctx.fillStyle = grad;
      ctx.beginPath(); ctx.arc(r.x, r.y, 18, 0, Math.PI*2); ctx.fill();
    }
  }
  ctx.globalCompositeOperation = 'source-over';

  // subtle vignette to focus eye
  const vg = ctx.createRadialGradient(W*0.5, H*0.5, Math.min(W,H)*0.3, W*0.5, H*0.5, Math.max(W,H)*0.8);
  vg.addColorStop(0, 'rgba(0,0,0,0)');
  vg.addColorStop(1, 'rgba(0,0,0,0.35)');
  ctx.fillStyle = vg;
  ctx.fillRect(0, 0, W, H);

  // section badge — small italic label of currently-playing block + index
  if (playing){
    const kind = activeBlockKind();
    const color = (kind === 'chorus') ? '#e84c7a' : (kind === 'verse') ? '#f5d068' : '#5a7480';
    const label = (kind === 'rest') ? 'rest' : kind;
    ctx.font = 'italic 500 22px Fraunces, serif';
    ctx.textAlign = 'right';
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fillText(label, W - 14 + 1, 32 + 1);
    ctx.fillStyle = color;
    ctx.shadowColor = color; ctx.shadowBlur = 8;
    ctx.fillText(label, W - 14, 32);
    ctx.shadowBlur = 0;
    // block + bar within block (e.g. "block 3/8 · bar 5/8")
    const playBar = Math.max(0, Math.floor(playhead / FINE_PER_BAR));
    ctx.font = '500 11px "JetBrains Mono", monospace';
    ctx.fillStyle = 'rgba(168,216,226,0.6)';
    ctx.fillText('block ' + (structureIdx + 1) + '/' + structure.length + ' · bar ' + (playBar + 1) + '/' + BARS, W - 14, 48);
    ctx.textAlign = 'left';
  }
}

function hexA(hex, alpha){
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ─────────────────────────────────────────────────────────────
// AUDIO
// ─────────────────────────────────────────────────────────────
let actx = null, master = null, reverb = null, reverbGain = null, padGain = null;
// PER-NOTE formant: each triggered voice gets its own pair of in-line
// peaking-EQ filters set from the note's stored formant preset. The
// global `formantPreset` here is just the DEFAULT that gets stamped into
// freshly placed notes — it isn't an audio insert anymore.

// F1/F2 formant pairs (Hz) — classic IPA approximations; Q-values tuned
// for peaking filters (lower than bandpass so the boost is musical).
const FORMANTS = {
  none: { kind: 'none', label: '—' },
  ah:   { kind: 'vowel', f1: 730, f2: 1090, q1: 6,  q2: 6,  label: 'ah' },
  eh:   { kind: 'vowel', f1: 530, f2: 1840, q1: 6,  q2: 6,  label: 'eh' },
  ee:   { kind: 'vowel', f1: 270, f2: 2290, q1: 8,  q2: 7,  label: 'ee' },
  oh:   { kind: 'vowel', f1: 570, f2:  840, q1: 6,  q2: 6,  label: 'oh' },
  oo:   { kind: 'vowel', f1: 300, f2:  870, q1: 8,  q2: 7,  label: 'oo' },
  // consonants — emphasise noisier bands; with sawtooth voicing the high
  // partials of the saw provide the sibilance to colour
  ss:   { kind: 'cons',  f1: 5500, f2: 7500, q1: 4,  q2: 4,  label: 'ss' },
  sh:   { kind: 'cons',  f1: 2400, f2: 3500, q1: 4,  q2: 4,  label: 'sh' },
  ff:   { kind: 'cons',  f1: 1100, f2: 3800, q1: 3,  q2: 3,  label: 'ff' },
  mm:   { kind: 'cons',  f1: 280,  f2:  900, q1: 8,  q2: 5,  label: 'mm' },
};
const FORMANT_KEYS = ['none','ah','eh','ee','oh','oo','ss','sh','ff','mm'];
let formantPreset = 'none';

// Now just remembers the chip picker's selection. Notes carry their own
// formant; this is only the default stamped into the NEXT placed note.
function applyFormant(preset){
  if (FORMANTS[preset]) formantPreset = preset;
}

function ensureAudio(){
  if (actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
  master = actx.createGain();
  master.gain.value = 0.6;
  // simple convolver reverb with synthesised impulse
  reverb = actx.createConvolver();
  reverb.buffer = makeImpulse(2.4, 2.0);
  reverbGain = actx.createGain();
  reverbGain.gain.value = 0.45;

  master.connect(actx.destination);
  reverb.connect(reverbGain).connect(actx.destination);
  // ambient pad bus, very low
  startPad();
}

function makeImpulse(dur, decay){
  const len = Math.floor(actx.sampleRate * dur);
  const buf = actx.createBuffer(2, len, actx.sampleRate);
  for (let c = 0; c < 2; c++){
    const d = buf.getChannelData(c);
    for (let i = 0; i < len; i++){
      d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
    }
  }
  return buf;
}

// Ambient pad — created once by ensureAudio(). Its gain stays at zero
// until play() ramps it up, and stop() ramps it back down. The three
// oscillator voices run continuously (a single AudioContext-long pad
// is cheap), so toggling play does NOT create new oscillators and the
// drone cannot "restart" — only its master pad gain changes.
function startPad(){
  padGain = actx.createGain();
  padGain.gain.value = 0.0;
  padGain.connect(reverb);
  padGain.connect(master);
  const padFreqs = [130.81, 164.81, 196.00];
  for (const f of padFreqs){
    const o = actx.createOscillator(); o.type = 'sine';
    o.frequency.value = f;
    const og = actx.createGain(); og.gain.value = 0.4;
    const lfo = actx.createOscillator(); lfo.frequency.value = 0.08 + Math.random()*0.06; lfo.type='sine';
    const lfoGain = actx.createGain(); lfoGain.gain.value = 1.2;
    lfo.connect(lfoGain).connect(o.detune);
    o.connect(og).connect(padGain);
    lfo.start(); o.start();
  }
  // intentionally NO fade-in here. play() handles the fade.
}

function padFadeIn(){
  if (!actx || !padGain) return;
  const t = actx.currentTime;
  padGain.gain.cancelScheduledValues(t);
  padGain.gain.setValueAtTime(padGain.gain.value, t);
  padGain.gain.linearRampToValueAtTime(0.05, t + 1.6);
}
function padFadeOut(){
  if (!actx || !padGain) return;
  const t = actx.currentTime;
  padGain.gain.cancelScheduledValues(t);
  padGain.gain.setValueAtTime(padGain.gain.value, t);
  padGain.gain.linearRampToValueAtTime(0.0001, t + 0.8);
}

// Note duration in bar fractions — clicking 1/4 means each note rings out
// for one beat regardless of step interval. 1 = whole bar sustain.
const NOTE_DURATIONS = ['1/64', '1/32', '1/16', '1/8', '1/4', '1/2', '1'];
const DURATION_FRAC  = { '1/64':1/64, '1/32':1/32, '1/16':1/16, '1/8':1/8, '1/4':1/4, '1/2':1/2, '1':1 };
// Same durations expressed in 1/64 fine-slot units — pattern storage native.
const DURATION_FINE = { '1/64':1, '1/32':2, '1/16':4, '1/8':8, '1/4':16, '1/2':32, '1':64 };
let noteDuration = '1/8';

function noteDurMs(){
  const barMs = (60 / bpm) * 4 * 1000;
  return DURATION_FRAC[noteDuration] * barMs;
}

// One active voice per row at any moment. New trigger on the same row
// fast-fades the previous voice and disconnects it cleanly — fixes the
// "long note + fast retrigger = stacked drone that never releases" bug.
const activeVoices = Array(ROWS).fill(null);

function stopVoice(voice, t, fadeMs){
  if (!voice || voice.released) return;
  voice.released = true;
  const og = voice.gain;
  const release = (fadeMs == null ? 30 : fadeMs) / 1000;
  try {
    og.gain.cancelScheduledValues(t);
    og.gain.setValueAtTime(og.gain.value, t);
    og.gain.linearRampToValueAtTime(0.0001, t + release);
  } catch (e) {}
  const endT = t + release + 0.02;
  try { voice.o1.stop(endT); } catch (e) {}
  try { voice.o2.stop(endT); } catch (e) {}
  // After the oscillators stop, disconnect everything so no node lingers
  // in the graph holding gain values.
  setTimeout(() => {
    try { voice.o1.disconnect(); } catch (e) {}
    try { voice.o2.disconnect(); } catch (e) {}
    try { voice.lp.disconnect(); } catch (e) {}
    try { voice.gain.disconnect(); } catch (e) {}
    if (voice.peak1) try { voice.peak1.disconnect(); } catch (e) {}
    if (voice.peak2) try { voice.peak2.disconnect(); } catch (e) {}
  }, (release + 0.06) * 1000);
}

function playNote(row, freq, durationFine, formantKey){
  if (!actx) return;
  const t = actx.currentTime;
  // 1 fine slot = a 1/64 note = (60/bpm) / 16 seconds
  const fineSec = (60 / bpm) / 16;
  const durSec  = Math.max(0.04, (durationFine || 1) * fineSec);
  const release = Math.min(0.45, Math.max(0.04, durSec * 0.4));
  const attack  = Math.min(0.012, durSec * 0.2);
  const sustainEnd = t + Math.max(attack + 0.004, durSec - release);
  const endT = sustainEnd + release;

  if (activeVoices[row]){
    stopVoice(activeVoices[row], t, 18);
    activeVoices[row] = null;
  }

  // Resolve the per-note formant — defaults to 'none' if absent. When
  // a vowel/consonant preset is set, switch the main oscillator to
  // sawtooth so the peaking EQ has harmonic content to shape.
  const fmt = (formantKey && FORMANTS[formantKey]) ? FORMANTS[formantKey] : FORMANTS.none;
  const useRich = fmt.kind !== 'none';
  const o1 = actx.createOscillator();
  o1.type = useRich ? 'sawtooth' : 'sine';
  o1.frequency.value = freq;
  const o2 = actx.createOscillator(); o2.type = 'triangle'; o2.frequency.value = freq * 2.01;
  const og = actx.createGain();
  const peakGain = useRich ? 0.20 : 0.32;
  og.gain.setValueAtTime(0.0001, t);
  og.gain.linearRampToValueAtTime(peakGain, t + attack);
  og.gain.setValueAtTime(peakGain, sustainEnd);
  og.gain.linearRampToValueAtTime(0.0001, endT);

  const lp = actx.createBiquadFilter(); lp.type = 'lowpass';
  lp.frequency.value = 1800 + Math.min(2400, durSec * 1400);
  lp.Q.value = 1.4;

  // PER-NOTE FORMANT — two peaking filters in series, tuned from the
  // note's stored preset. At kind === 'none' both peaks are 0 dB
  // (transparent pass-through).
  const peak1 = actx.createBiquadFilter(); peak1.type = 'peaking';
  const peak2 = actx.createBiquadFilter(); peak2.type = 'peaking';
  if (fmt.kind === 'none'){
    peak1.gain.value = 0; peak2.gain.value = 0;
  } else {
    const peakDb = (fmt.kind === 'vowel') ? 18 : 14;
    peak1.frequency.value = fmt.f1; peak1.Q.value = fmt.q1; peak1.gain.value = peakDb;
    peak2.frequency.value = fmt.f2; peak2.Q.value = fmt.q2; peak2.gain.value = peakDb;
  }

  o1.connect(lp); o2.connect(lp);
  lp.connect(og);
  og.connect(peak1).connect(peak2);
  peak2.connect(master);
  peak2.connect(reverb);
  o1.start(t); o2.start(t);
  o1.stop(endT + 0.06); o2.stop(endT + 0.06);

  const voice = { o1, o2, gain: og, lp, peak1, peak2, released: false, endT };
  activeVoices[row] = voice;
  setTimeout(() => {
    if (activeVoices[row] === voice){ activeVoices[row] = null; }
    try { o1.disconnect(); } catch (e) {}
    try { o2.disconnect(); } catch (e) {}
    try { lp.disconnect(); } catch (e) {}
    try { og.disconnect(); } catch (e) {}
    try { peak1.disconnect(); } catch (e) {}
    try { peak2.disconnect(); } catch (e) {}
  }, (endT - t + 0.1) * 1000);
}

// Panic kill — stop every active voice immediately and make sure no
// oscillator can keep ringing past the panic. Wired to stop() and to a
// global keyboard panic in case anything ever wedges.
function allNotesOff(){
  if (!actx) return;
  const t = actx.currentTime;
  for (let r = 0; r < ROWS; r++){
    const v = activeVoices[r];
    if (v){
      stopVoice(v, t, 12);
      // belt-and-braces: also force-stop the oscillators in ~30ms so a
      // wedged scheduling state can't keep them running silently.
      try { v.o1.stop(t + 0.04); } catch (e) {}
      try { v.o2.stop(t + 0.04); } catch (e) {}
      activeVoices[r] = null;
    }
  }
}

// ─────────────────────────────────────────────────────────────
// SEQUENCER UI
// ─────────────────────────────────────────────────────────────
function buildGrid(){
  // The grid shows ONE bar (STEPS_PER_BAR cells) at a time. Each visible
  // cell internally subdivides into FINE_PER_CELL (=4) sub-slots so a
  // 1/64 note can be placed at any of 4 positions within the same cell.
  for (let r = 0; r < ROWS; r++){
    const rowEl = document.querySelector(`.row[data-row="${r}"]`);
    for (let s = 0; s < STEPS_PER_BAR; s++){
      const cell = document.createElement('button');
      cell.type = 'button';
      cell.className = 'cell' + (s % 4 === 0 ? ' beat' : '');
      cell.dataset.row = r;
      cell.dataset.cellIdx = s;          // 0..15 within the visible bar
      cell.setAttribute('aria-pressed', 'false');
      cell.addEventListener('click', (ev) => toggleCell(r, s, ev));
      rowEl.appendChild(cell);
    }
  }
}
buildGrid();
resize();

// translate (cell-within-visible-bar, sub-slot 0..3) into the absolute
// 0..511 fine-slot pattern index
function absFine(cellIdx, subSlot){
  return editBar * FINE_PER_BAR + cellIdx * FINE_PER_CELL + subSlot;
}
// helper: get the cell rect for click-position math
function getSubSlotFromEvent(ev){
  const cell = ev.currentTarget;
  const cellW = cell.clientWidth;
  if (cellW === 0) return 0;
  const sub = Math.floor(ev.offsetX / (cellW / FINE_PER_CELL));
  return Math.max(0, Math.min(FINE_PER_CELL - 1, sub));
}

function toggleCell(r, cellIdx, ev){
  const p = curPattern();
  const newDur = DURATION_FINE[noteDuration];

  let subSlot;
  if (newDur >= FINE_PER_CELL){
    subSlot = 0;
  } else if (newDur === 2){
    const clicked = getSubSlotFromEvent(ev);
    subSlot = clicked < 2 ? 0 : 2;
  } else {
    subSlot = getSubSlotFromEvent(ev);
  }
  const idx = absFine(cellIdx, subSlot);

  // Case 1: there's already a note exactly at this fine slot → remove it.
  if (p[r][idx]){
    p[r][idx] = 0;
    updateCell(r, cellIdx);
    refreshNoteFills(r);
    hideHint();
    return;
  }

  // Case 2A: sub-step durations (1/64 / 1/32) bypass the covering-note scan.
  if (newDur < FINE_PER_CELL){
    p[r][idx] = makeNote(newDur, formantPreset);
    updateCell(r, cellIdx);
    refreshNoteFills(r);
    hideHint();
    ensureAudio();
    if (actx && actx.state === 'suspended') actx.resume();
    const freq = SCALES[SCALE][r];
    playNote(r, freq, newDur, formantPreset);
    spawnRipple(r, cellIdx, NOTE_COLORS[r]);
    return;
  }

  // Case 2B: 1/16+ — scan back through fine slots for a covering note.
  const barStart = editBar * FINE_PER_BAR;
  for (let prev = idx - 1; prev >= barStart; prev--){
    const prevCell = p[r][prev];
    if (prevCell){
      if (prev + noteDur(prevCell) > idx){
        p[r][prev] = 0;
        refreshNoteFills(r);
        for (let cc = 0; cc < STEPS_PER_BAR; cc++) updateCell(r, cc);
        hideHint();
        return;
      }
      break;
    }
  }

  // Case 3: empty fine slot → activate
  p[r][idx] = makeNote(newDur, formantPreset);
  updateCell(r, cellIdx);
  refreshNoteFills(r);
  hideHint();
  ensureAudio();
  if (actx && actx.state === 'suspended') actx.resume();
  const freq = SCALES[SCALE][r];
  playNote(r, freq, newDur, formantPreset);
  spawnRipple(r, cellIdx, NOTE_COLORS[r]);
}

function updateCell(r, cellIdx){
  const cell = document.querySelector(`.cell[data-row="${r}"][data-cell-idx="${cellIdx}"]`);
  if (!cell) return;
  const p = curPattern();
  // Cell is "active" if any of its 4 sub-slots has a note starting in it.
  let on = false;
  for (let i = 0; i < FINE_PER_CELL; i++){
    if (p[r][absFine(cellIdx, i)]) { on = true; break; }
  }
  cell.setAttribute('aria-pressed', String(on));
  cell.setAttribute('aria-label', ROW_LABELS[r] + ' bar ' + (editBar + 1) + ' step ' + (cellIdx + 1));
}

function refreshNoteFills(row){
  // Wipe + rebuild fills for one row. Fills are absolutely positioned
  // from the LIVE pixel rects of the cells, with sub-slot precision
  // inside each cell so a 1/64 at sub-slot 2 of cell 5 renders as a
  // quarter-cell-wide slice anchored at the 50%-75% portion of cell 5.
  const rowEl = document.querySelector(`.row[data-row="${row}"]`);
  if (!rowEl) return;
  rowEl.querySelectorAll('.note-fill').forEach(n => n.remove());
  const rowRect = rowEl.getBoundingClientRect();
  if (rowRect.width === 0) return;  // not yet laid out

  const p = curPattern();
  const barStart = editBar * FINE_PER_BAR;
  for (let fine = 0; fine < FINE_PER_BAR; fine++){
    const cell = p[row][barStart + fine];
    if (!cell) continue;
    const dur = noteDur(cell);
    const startCellIdx = Math.floor(fine / FINE_PER_CELL);
    const startSub     = fine % FINE_PER_CELL;
    const startCell = rowEl.querySelector(`.cell[data-cell-idx="${startCellIdx}"]`);
    if (!startCell) continue;
    const startRect = startCell.getBoundingClientRect();
    const subW = startRect.width / FINE_PER_CELL;

    // End fine slot is fine + dur - 1, clamped to the bar's last slot
    const endFine = Math.min(fine + dur - 1, FINE_PER_BAR - 1);
    const endCellIdx = Math.floor(endFine / FINE_PER_CELL);
    const endSub     = endFine % FINE_PER_CELL;
    const endCell = rowEl.querySelector(`.cell[data-cell-idx="${endCellIdx}"]`);
    if (!endCell) continue;
    const endRect = endCell.getBoundingClientRect();
    const endSubW = endRect.width / FINE_PER_CELL;

    const leftPx  = (startRect.left + startSub * subW) - rowRect.left;
    const rightPx = (endRect.left + (endSub + 1) * endSubW) - rowRect.left;
    const widthPx = Math.max(2, rightPx - leftPx);
    const topPx = startRect.top - rowRect.top;
    const heightPx = startRect.height;

    const fill = document.createElement('div');
    fill.className = 'note-fill';
    fill.dataset.row = row;
    fill.dataset.fine = fine;
    fill.dataset.cellIdx = startCellIdx;
    fill.dataset.dur  = dur;
    fill.style.left   = leftPx + 'px';
    fill.style.top    = topPx + 'px';
    fill.style.width  = widthPx + 'px';
    fill.style.height = heightPx + 'px';
    fill.setAttribute('aria-hidden', 'true');
    rowEl.appendChild(fill);
  }
}

function refreshAllNoteFills(){
  for (let r = 0; r < ROWS; r++) refreshNoteFills(r);
}

// Reposition every fill when the layout could have changed
function reflowAllNoteFills(){
  // Use requestAnimationFrame so cell rects are settled before we measure
  requestAnimationFrame(() => refreshAllNoteFills());
}
window.addEventListener('resize', reflowAllNoteFills);

function repaintGridForSection(){
  for (let r = 0; r < ROWS; r++) for (let c = 0; c < STEPS_PER_BAR; c++){
    updateCell(r, c);
  }
  refreshAllNoteFills();
  refreshHead();
}

function refreshBarPicker(){
  document.querySelectorAll('.bar-chip').forEach((chip) => {
    const idx = parseInt(chip.dataset.bar, 10);
    chip.setAttribute('aria-pressed', String(idx === editBar));
    const playBar = Math.floor(playhead / FINE_PER_BAR);
    const sectionMatches = playing && activeBlockKind() === editing;
    chip.classList.toggle('playing', sectionMatches && idx === playBar);
  });
}

function setEditing(section){
  editing = section;
  document.getElementById('editVerse').setAttribute('aria-pressed', String(section === 'verse'));
  document.getElementById('editChorus').setAttribute('aria-pressed', String(section === 'chorus'));
  document.getElementById('editingNow').textContent = section.toUpperCase();
  repaintGridForSection();
  refreshBarPicker();
}

function setEditBar(b){
  editBar = Math.max(0, Math.min(BARS - 1, b));
  repaintGridForSection();
  refreshBarPicker();
  // Manual bar pick = user took control, disable auto-follow until next play()
  autoFollow = false;
}

function buildBarPicker(){
  const wrap = document.getElementById('barPicker');
  wrap.innerHTML = '';
  for (let i = 0; i < BARS; i++){
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'bar-chip';
    b.dataset.bar = i;
    b.setAttribute('aria-pressed', String(i === editBar));
    b.setAttribute('aria-label', 'Edit bar ' + (i + 1));
    b.textContent = String(i + 1);
    b.addEventListener('click', () => setEditBar(i));
    wrap.appendChild(b);
  }
}
buildBarPicker();

function refreshHead(){
  document.querySelectorAll('.cell.head').forEach(c => c.classList.remove('head'));
  document.querySelectorAll('.note-fill.playing').forEach(c => c.classList.remove('playing'));
  if (playhead < 0 || !playing) return;
  if (activeBlockKind() !== editing) return;
  const playBar = Math.floor(playhead / FINE_PER_BAR);
  if (playBar !== editBar) return;
  const fineInBar = playhead % FINE_PER_BAR;
  const cellIdx   = Math.floor(fineInBar / FINE_PER_CELL);
  for (let r = 0; r < ROWS; r++){
    const cell = document.querySelector(`.cell[data-row="${r}"][data-cell-idx="${cellIdx}"]`);
    if (cell) cell.classList.add('head');
    // light up any note-fill whose fine-slot matches the playhead
    const fill = document.querySelector(`.note-fill[data-row="${r}"][data-fine="${fineInBar}"]`);
    if (fill) fill.classList.add('playing');
  }
}

function clearAll(){
  const p = curPattern();
  for (let r = 0; r < ROWS; r++) for (let f = 0; f < FINE_TOTAL; f++){
    p[r][f] = 0;
  }
  repaintGridForSection();
}

function seedDemo(){
  // 1-bar building blocks — replicated and varied across all 8 bars
  const verseBarA = [
    [false, false, false, false, true, false, false, false, false, false, true, false, false, true, false, false],
    [false, true, false, false, false, false, true, false, false, true, false, false, false, false, false, true],
    [true, false, false, true, false, false, false, false, true, false, false, false, true, false, false, false],
    [false, false, true, false, false, true, false, false, false, false, false, true, false, false, true, false],
    [true, false, false, false, false, false, false, true, false, false, false, false, true, false, false, false],
  ];
  // verseBarB: slight variation — emptier "answer" phrase
  const verseBarB = [
    [false, false, false, false, false, false, true, false, false, false, false, false, true, false, false, false],
    [true, false, false, false, false, true, false, false, false, false, true, false, false, false, false, false],
    [false, false, true, false, false, false, false, false, false, true, false, false, false, false, false, true],
    [false, true, false, false, false, false, false, true, false, false, false, false, false, true, false, false],
    [false, false, false, true, false, false, false, false, true, false, false, false, false, false, true, false],
  ];
  const chorusBarA = [
    [true, false, false, true, true, false, false, true, true, false, false, true, true, false, false, true],
    [false, false, true, false, false, true, false, false, false, false, true, false, false, true, false, false],
    [true, false, true, false, true, false, true, false, true, false, true, false, true, false, true, false],
    [false, true, false, false, false, true, false, true, false, true, false, false, false, true, false, true],
    [true, false, false, false, true, false, false, false, true, false, false, false, true, false, false, false],
  ];
  // chorusBarB: tag/turnaround variation
  const chorusBarB = [
    [true, true, false, false, true, true, false, false, true, true, false, false, true, true, false, true],
    [false, false, true, true, false, false, true, true, false, false, true, true, false, false, true, true],
    [true, false, true, false, false, true, false, true, true, false, true, false, false, true, false, true],
    [false, true, false, true, true, false, true, false, false, true, false, true, true, false, true, false],
    [true, false, true, false, true, false, true, true, true, false, true, false, true, true, false, true],
  ];
  // verse layout across 8 bars: A A A B  A A A B  (a phrase + answer pair)
  const verseLayout  = [verseBarA, verseBarA, verseBarA, verseBarB, verseBarA, verseBarA, verseBarA, verseBarB];
  const chorusLayout = [chorusBarA, chorusBarA, chorusBarA, chorusBarB, chorusBarA, chorusBarA, chorusBarA, chorusBarB];
  // Convert the bool seed layouts into fine-slot durations. A bool true
  // at cell c becomes a 1/16 note (4 fine slots) placed at sub-slot 0 of
  // that cell. Showcase notes (1/4 + 1/2) get overlaid at cleanly-spaced
  // positions so their stretched fills don't collide with neighbours.
  const FINE_16 = FINE_PER_CELL;       // 4 = a 1/16 note
  // Seed assigns per-note formants so vowel coloration is visible on
  // boot: chorus row 0 (lead) gets 'ah', row 4 (bass) gets 'oo'.
  for (let bar = 0; bar < BARS; bar++){
    for (let r = 0; r < ROWS; r++) for (let c = 0; c < STEPS_PER_BAR; c++){
      const fineStart = bar * FINE_PER_BAR + c * FINE_PER_CELL;
      if (verseLayout[bar][r][c]){
        patterns.verse[r][fineStart] = makeNote(FINE_16, 'none');
      }
      if (chorusLayout[bar][r][c]){
        let fmt = 'none';
        if (r === 0) fmt = 'ah';
        else if (r === 4) fmt = 'oo';
        patterns.chorus[r][fineStart] = makeNote(FINE_16, fmt);
      }
    }
    const barStart = bar * FINE_PER_BAR;
    if (chorusLayout[bar][0][0]) patterns.chorus[0][barStart + 0]                    = makeNote(16, 'ah');
    if (chorusLayout[bar][0][8]) patterns.chorus[0][barStart + 8 * FINE_PER_CELL]    = makeNote(16, 'ah');
    if (chorusLayout[bar][4][0]) patterns.chorus[4][barStart + 0]                    = makeNote(32, 'oo');
  }
  // Sweep — any fine slot covered by a longer note's span gets zero'd
  // so visually adjacent fills don't overlap.
  for (const sect of ['verse', 'chorus']){
    for (let bar = 0; bar < BARS; bar++){
      for (let r = 0; r < ROWS; r++){
        const barStart = bar * FINE_PER_BAR;
        for (let f = 0; f < FINE_PER_BAR; f++){
          const cell = patterns[sect][r][barStart + f];
          const dur = noteDur(cell);
          if (dur > 1){
            for (let k = 1; k < dur && (f + k) < FINE_PER_BAR; k++){
              patterns[sect][r][barStart + f + k] = 0;
            }
          }
        }
      }
    }
  }
  repaintGridForSection();
  hideHint();
}

// ─────────────────────────────────────────────────────────────
// SEQUENCER LOOP
// ─────────────────────────────────────────────────────────────
function setBpm(v){
  bpm = v;
  stepTime = (60 / bpm) / 16 * 1000;
  document.getElementById('bpmVal').textContent = String(v);
}

function play(){
  ensureAudio();
  if (actx && actx.state === 'suspended') actx.resume();
  playing = true;
  playhead = -1;
  structureIdx = 0;
  autoFollow = true;     // re-engage auto-paging on every fresh play
  refreshStructure();
  refreshBarPicker();
  padFadeIn();           // ambient drone smoothly fades up, never restarts
  lastStepAt = performance.now() - stepTime;  // fire step 0 immediately
  playBtn.textContent = '■ stop';
  playBtn.setAttribute('aria-pressed', 'true');
  hideHint();
}
function stop(){
  playing = false;
  playhead = -1;
  allNotesOff();         // kill any hanging long-sustain voices
  padFadeOut();          // and silence the ambient drone
  refreshHead();
  refreshStructure();
  refreshBarPicker();
  playBtn.textContent = '▶ play';
  playBtn.setAttribute('aria-pressed', 'false');
}

function tickSequencer(now){
  if (!playing) return;
  if (now - lastStepAt >= stepTime){
    lastStepAt += stepTime;
    const prevBar = Math.max(0, Math.floor(playhead / FINE_PER_BAR));
    playhead += 1;
    // After all 512 fine slots (the full 8-bar pattern) finish, advance
    // to the next block in the song structure.
    if (playhead >= FINE_TOTAL){
      playhead = 0;
      structureIdx = (structureIdx + 1) % structure.length;
    }
    const newBar = Math.floor(playhead / FINE_PER_BAR);
    const crossedBar = newBar !== prevBar;
    if (crossedBar && playing && activeBlockKind() === editing && autoFollow){
      editBar = newBar;
      repaintGridForSection();
      refreshBarPicker();
    }
    if (crossedBar){
      refreshStructure();
      refreshBarPicker();
    }
    refreshHead();
    // trigger active notes at this fine slot from whichever section is current
    const kind = activeBlockKind();
    if (kind !== 'rest'){
      const p = patterns[kind];
      for (let r = 0; r < ROWS; r++){
        const cell = p[r][playhead];
        if (cell){
          const freq = SCALES[SCALE][r];
          playNote(r, freq, noteDur(cell), noteFormant(cell));
          // ripple x: anchor on the cell of the current fine slot so
          // visible ripple movement tracks the cell-level grid
          const visualCell = Math.floor((playhead % FINE_PER_BAR) / FINE_PER_CELL);
          spawnRipple(r, visualCell, NOTE_COLORS[r]);
        }
      }
    }
  }
}

// ─────────────────────────────────────────────────────────────
// MAIN LOOP
// ─────────────────────────────────────────────────────────────
let lastTs = 0;
function loop(ts){
  const now = ts;
  const dt = Math.min(0.1, (now - lastTs || 16) / 1000);
  lastTs = now;
  tickSequencer(now);
  tickPond(dt);
  drawPond();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ─────────────────────────────────────────────────────────────
// INPUT
// ─────────────────────────────────────────────────────────────
const playBtn = document.getElementById('playBtn');
const clearBtn = document.getElementById('clearBtn');
const seedBtn = document.getElementById('seedBtn');
const bpmInput = document.getElementById('bpm');
const bpmVal = document.getElementById('bpmVal');
const hintEl = document.getElementById('hint');

// section pills (verse / chorus)
document.getElementById('editVerse').addEventListener('click', () => setEditing('verse'));
document.getElementById('editChorus').addEventListener('click', () => setEditing('chorus'));

// song structure: 8 blocks, click to cycle verse → chorus → rest → verse
const STRUCTURE_LABEL = { verse:'V', chorus:'C', rest:'—' };
const STRUCTURE_NAME  = { verse:'verse', chorus:'chorus', rest:'rest' };
function cycleBlock(kind){
  return kind === 'verse' ? 'chorus' : kind === 'chorus' ? 'rest' : 'verse';
}
function buildStructureBar(){
  const wrap = document.getElementById('structureBlocks');
  wrap.innerHTML = '';
  for (let i = 0; i < structure.length; i++){
    const b = document.createElement('button');
    b.type = 'button';
    b.className = 'block ' + structure[i];
    b.setAttribute('aria-label', 'Block ' + (i+1) + ' · ' + STRUCTURE_NAME[structure[i]] + ' · click to cycle');
    b.innerHTML = '<span class="idx">' + (i+1) + '</span>' + STRUCTURE_LABEL[structure[i]];
    b.addEventListener('click', () => {
      structure[i] = cycleBlock(structure[i]);
      buildStructureBar();
      refreshHead();
    });
    wrap.appendChild(b);
  }
  refreshStructure();
}
function refreshStructure(){
  const blocks = document.querySelectorAll('.block');
  blocks.forEach((b, i) => {
    const isPlaying = playing && i === structureIdx;
    b.classList.toggle('playing', isPlaying);
    // append a tiny bar-of-8 counter to the active block ("3/8")
    const bar = b.querySelector('.bar-mark');
    if (isPlaying){
      const playBar = Math.floor(playhead / FINE_PER_BAR);
      const label = (Math.max(0, playBar) + 1) + '/' + BARS;
      if (!bar){
        const m = document.createElement('span');
        m.className = 'bar-mark';
        m.textContent = label;
        b.appendChild(m);
      } else {
        bar.textContent = label;
      }
    } else if (bar){
      bar.remove();
    }
  });
}
buildStructureBar();

playBtn.addEventListener('click', () => {
  if (playing) stop(); else play();
});
clearBtn.addEventListener('click', clearAll);
seedBtn.addEventListener('click', () => {
  seedDemo();
  if (!playing) play();
});
bpmInput.addEventListener('input', () => setBpm(parseInt(bpmInput.value, 10)));

// scale picker
const scalePent = document.getElementById('scalePent');
const scaleHira = document.getElementById('scaleHira');
const scaleDor  = document.getElementById('scaleDor');
function pickScale(name){
  SCALE = name;
  scalePent.setAttribute('aria-pressed', String(name === 'pent'));
  scaleHira.setAttribute('aria-pressed', String(name === 'hira'));
  scaleDor .setAttribute('aria-pressed', String(name === 'dor'));
}
scalePent.addEventListener('click', () => pickScale('pent'));
scaleHira.addEventListener('click', () => pickScale('hira'));
scaleDor .addEventListener('click', () => pickScale('dor'));

// note-duration chips
function setDuration(d){
  if (!DURATION_FRAC[d]) return;
  noteDuration = d;
  document.querySelectorAll('.duration-pick .chip').forEach((c) => {
    c.setAttribute('aria-pressed', String(c.dataset.dur === d));
  });
}
document.querySelectorAll('.duration-pick:not(.formant-pick) .chip').forEach((c) => {
  c.addEventListener('click', () => setDuration(c.dataset.dur));
});

// formant preset chips
function setFormant(p){
  if (!FORMANTS[p]) return;
  ensureAudio();
  if (actx && actx.state === 'suspended') actx.resume();
  document.querySelectorAll('.formant-pick .chip').forEach((c) => {
    c.setAttribute('aria-pressed', String(c.dataset.formant === p));
  });
  applyFormant(p);
}
document.querySelectorAll('.formant-pick .chip').forEach((c) => {
  c.addEventListener('click', () => setFormant(c.dataset.formant));
});

window.addEventListener('keydown', (ev) => {
  if (ev.target && ev.target.tagName === 'INPUT') return;
  if (ev.key === ' '){
    ev.preventDefault();
    if (playing) stop(); else play();
  } else if (ev.key === 'c' || ev.key === 'C'){
    clearAll();
  } else if (ev.key === 's' || ev.key === 'S'){
    seedDemo();
  } else if (ev.key === '1'){
    setEditing('verse');
  } else if (ev.key === '2'){
    setEditing('chorus');
  } else if (ev.key === 'Tab' && !ev.shiftKey){
    ev.preventDefault();
    setEditing(editing === 'verse' ? 'chorus' : 'verse');
  } else if (ev.key === '['){
    setEditBar(editBar - 1);
  } else if (ev.key === ']'){
    setEditBar(editBar + 1);
  } else if (ev.key === '-' || ev.key === '_'){
    // shorter duration
    const i = NOTE_DURATIONS.indexOf(noteDuration);
    if (i > 0) setDuration(NOTE_DURATIONS[i - 1]);
  } else if (ev.key === '=' || ev.key === '+'){
    // longer duration
    const i = NOTE_DURATIONS.indexOf(noteDuration);
    if (i < NOTE_DURATIONS.length - 1) setDuration(NOTE_DURATIONS[i + 1]);
  } else if (ev.key === '.'){
    // panic: kill all sound right now
    allNotesOff();
  } else if (ev.key === 'f' || ev.key === 'F'){
    // cycle through formant presets
    const i = FORMANT_KEYS.indexOf(formantPreset);
    setFormant(FORMANT_KEYS[(i + 1) % FORMANT_KEYS.length]);
  }
});

// click the pond to drop a free-form ripple (random color)
cv.addEventListener('pointerdown', (ev) => {
  ensureAudio();
  if (actx && actx.state === 'suspended') actx.resume();
  const rect = cv.getBoundingClientRect();
  const x = ev.clientX - rect.left;
  const y = ev.clientY - rect.top;
  // pick a note based on Y (top = higher pitch)
  const row = Math.min(ROWS - 1, Math.max(0, Math.floor((y / H) * ROWS)));
  const freq = SCALES[SCALE][row];
  const color = NOTE_COLORS[row];
  // pond-click uses the currently-selected duration setting for the preview
  playNote(row, freq, DURATION_FINE[noteDuration]);
  spawnRipple(row, 0, color, { x, y });
  hideHint();
});

function hideHint(){ hintEl.classList.add('hidden'); }

setBpm(96);
</script>
</body>
</html>
