<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Bubble Scream Sort</title>
<link rel="icon" href="https://emojicdn.elk.sh/😱">
<meta property="og:title" content="Bubble Scream Sort">
<meta property="og:description" content="Watch numbers scream in terror every time they get swapped. Sorting has never been this traumatic.">
<meta property="og:url" content="https://app.sloppy.live/bubble-scream/">
<meta property="og:image" content="https://image.pollinations.ai/prompt/cartoon%20numbers%20with%20screaming%20faces%20being%20sorted%20chaotic%20colorful%20dark%20background?width=1200&height=630&nologo=true&referrer=sloppy.live">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Creepster&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0812;font-family:'Silkscreen',monospace;color:#fff;user-select:none}
canvas{display:block;width:100%;height:100%}
#ui{position:absolute;top:0;left:0;width:100%;z-index:10;pointer-events:none}
#top-bar{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;flex-wrap:wrap;gap:8px}
h1{font-family:'Creepster',cursive;font-size:clamp(20px,5vw,36px);background:linear-gradient(135deg,#ff3366,#ff6600,#ffcc00);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#stats{font-size:11px;color:#888;display:flex;gap:16px}
#stats span{color:#ff6600}
#controls{position:absolute;bottom:20px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:10;flex-wrap:wrap;justify-content:center}
.btn{font-family:'Silkscreen',monospace;font-size:12px;padding:10px 18px;border:2px solid #ff3366;background:rgba(255,51,102,0.1);color:#ff3366;cursor:pointer;letter-spacing:1px;transition:all .2s;pointer-events:all}
.btn:hover{background:#ff3366;color:#0a0812}
.btn.active{background:#ff3366;color:#0a0812}
#speed-label{font-size:10px;color:#666;align-self:center;pointer-events:all}
#speed-slider{width:80px;pointer-events:all;accent-color:#ff3366}
#scream-log{position:absolute;top:50px;right:12px;width:clamp(140px,20vw,200px);z-index:10;pointer-events:none;display:flex;flex-direction:column;gap:4px}
.scream-msg{font-family:'Creepster',cursive;font-size:clamp(14px,2.5vw,20px);color:#ff3366;opacity:1;transition:opacity 0.5s;text-shadow:0 0 8px rgba(255,51,102,0.5);text-align:right;white-space:nowrap}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="top-bar">
    <h1>BUBBLE SCREAM SORT</h1>
    <div id="stats">Swaps: <span id="swap-count">0</span> | Comps: <span id="cmp-count">0</span> | Screams: <span id="scream-count">0</span></div>
  </div>
</div>
<div id="scream-log"></div>
<div id="controls">
  <button class="btn" id="btn-sort">SORT!</button>
  <button class="btn" id="btn-shuffle">SHUFFLE</button>
  <button class="btn" id="btn-size">SIZE: 30</button>
  <button class="btn" id="btn-chaos">CHAOS MODE</button>
  <label id="speed-label">Speed <input type="range" id="speed-slider" min="1" max="100" value="30"></label>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H, dpr;
function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  if (bars.length) syncBars();
}
resize();
window.addEventListener('resize', resize);

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

const screams = [
  'AAAGH!','NOOO!','WHY ME?!','HELP!','NOT AGAIN!',
  'OH GOD!','STOP IT!','EEEK!','WAAAH!','MERCY!',
  'I WAS FINE!','LEAVE ME!','MOMMY!','THE PAIN!','WHYYY?!',
  '*SCREAMS*','IT BURNS!','SO WRONG!','MAKE IT STOP!','NOOOO!',
  'CRUEL!','I HATE THIS!','UNFAIR!','SAVE ME!','TOO FAST!',
  'IM DIZZY!','PUT ME DOWN!','CHAOS!','AHHHH!','OH NO!'
];

function playScream(val) {
  const baseFreq = 200 + val * 15;
  const dur = 0.15 + Math.random() * 0.15;
  const o1 = audioCtx.createOscillator();
  const o2 = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o1.type = 'sawtooth'; o2.type = 'square';
  o1.frequency.setValueAtTime(baseFreq, audioCtx.currentTime);
  o1.frequency.exponentialRampToValueAtTime(baseFreq * (1.5 + Math.random()), audioCtx.currentTime + dur);
  o2.frequency.setValueAtTime(baseFreq * 1.01, audioCtx.currentTime);
  o2.frequency.exponentialRampToValueAtTime(baseFreq * 0.5, audioCtx.currentTime + dur);
  g.gain.setValueAtTime(0.06, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
  o1.connect(g); o2.connect(g); g.connect(audioCtx.destination);
  o1.start(); o2.start(); o1.stop(audioCtx.currentTime + dur); o2.stop(audioCtx.currentTime + dur);
}

function playSwapThud() {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'sine'; o.frequency.value = 60 + Math.random()*40;
  g.gain.setValueAtTime(0.08, audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
  o.connect(g); g.connect(audioCtx.destination);
  o.start(); o.stop(audioCtx.currentTime + 0.1);
}

function playDone() {
  [523,659,784,1047].forEach((f,i) => {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine'; o.frequency.value = f;
    g.gain.setValueAtTime(0.08, audioCtx.currentTime + i*0.12);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + i*0.12 + 0.3);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(audioCtx.currentTime + i*0.12); o.stop(audioCtx.currentTime + i*0.12 + 0.3);
  });
}

let arrSize = 30;
let arr = [];
let bars = [];
let sorting = false, sorted = false, chaosMode = false;
let swapCount = 0, cmpCount = 0, screamCount = 0;
let sortGen = null, speed = 30;
let particles = [], shakes = [], screamMessages = [];

function barColor(val) { return 'hsl(' + ((val / arrSize) * 300) + ', 85%, 55%)'; }

function initArray() {
  arr = []; bars = [];
  for (let i = 0; i < arrSize; i++) {
    arr.push(i + 1);
    bars.push({ val:i+1, x:0, targetX:0, y:0, shake:0, shakeY:0, scream:0, face:'neutral', color:barColor(i+1), flash:0, sorted:false });
  }
  shuffle();
  swapCount=0; cmpCount=0; screamCount=0;
  sorting=false; sorted=false; sortGen=null;
  updateStats();
}

function shuffle() {
  for (let i = arr.length-1; i > 0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [arr[i],arr[j]] = [arr[j],arr[i]];
  }
  syncBars();
  sorted = false;
  bars.forEach(b => { b.sorted=false; b.face='neutral'; });
}

function getBarW() { return Math.max(8, Math.min(50, (W*0.85)/arrSize - 2)); }
function getGap() { return Math.max(1, Math.min(4, (W*0.02)/arrSize)); }
function getBarH(val) { return (val/arrSize) * (H*0.55); }

function syncBars() {
  const barW = getBarW(), gap = getGap();
  const totalW = arrSize*barW + (arrSize-1)*gap;
  const startX = (W - totalW)/2;
  const newBars = arr.map((val, i) => {
    const old = bars.find(b => b.val === val) || {};
    return {
      val, x: old.x !== undefined ? old.x : startX + i*(barW+gap),
      targetX: startX + i*(barW+gap), y: old.y||0,
      shake: old.shake||0, shakeY: old.shakeY||0, scream: old.scream||0,
      face: old.face||'neutral', color: barColor(val),
      flash: old.flash||0, sorted: old.sorted||false
    };
  });
  bars = newBars;
}

function updateStats() {
  document.getElementById('swap-count').textContent = swapCount;
  document.getElementById('cmp-count').textContent = cmpCount;
  document.getElementById('scream-count').textContent = screamCount;
}

function addScreamMsg(text) {
  const el = document.createElement('div');
  el.className = 'scream-msg';
  el.textContent = text;
  const log = document.getElementById('scream-log');
  log.appendChild(el);
  screamMessages.push({ el, time: 60 });
  if (log.children.length > 6) { log.removeChild(log.children[0]); screamMessages.shift(); }
}

function addParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random()*Math.PI*2, spd = 1+Math.random()*4;
    particles.push({ x, y, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd-2, life:1, color, size:2+Math.random()*4 });
  }
}

function* bubbleSortGen() {
  const n = arr.length;
  for (let i = 0; i < n-1; i++) {
    let swapped = false;
    for (let j = 0; j < n-1-i; j++) {
      cmpCount++;
      bars[j].flash = 1;
      bars[j+1].flash = 1;
      yield { type:'compare', i:j, j:j+1 };

      if (arr[j] > arr[j+1]) {
        [arr[j], arr[j+1]] = [arr[j+1], arr[j]];
        swapCount++; screamCount += 2;

        const s1 = screams[Math.floor(Math.random()*screams.length)];
        addScreamMsg(s1);

        syncBars();
        bars[j].scream = 1; bars[j].face = 'scream'; bars[j].shake = 8+Math.random()*6; bars[j].shakeY = -8-Math.random()*10;
        bars[j+1].scream = 1; bars[j+1].face = 'scream'; bars[j+1].shake = 8+Math.random()*6; bars[j+1].shakeY = -8-Math.random()*10;

        playScream(arr[j]); playSwapThud();

        if (chaosMode) {
          shakes.push(3+Math.random()*4, -(2+Math.random()*3));
          const bw = getBarW(), groundY = H*0.85;
          addParticles(bars[j].targetX+bw/2, groundY-getBarH(arr[j]), bars[j].color, 6);
          addParticles(bars[j+1].targetX+bw/2, groundY-getBarH(arr[j+1]), bars[j+1].color, 6);
        }

        yield { type:'swap', i:j, j:j+1 };
        swapped = true;
      }
      updateStats();
    }
    bars[n-1-i].sorted = true;
    bars[n-1-i].face = 'happy';
    if (!swapped) break;
  }
  if (bars[0]) { bars[0].sorted = true; bars[0].face = 'happy'; }
  sorted = true; sorting = false;
  playDone();
  yield { type:'done' };
}

let stepTimer = 0;
function updateSort() {
  if (!sorting || !sortGen) return;
  stepTimer++;
  const delay = Math.max(1, 101 - speed);
  if (stepTimer < delay) return;
  stepTimer = 0;
  const result = sortGen.next();
  if (result.done) sorting = false;
}

function update() {
  updateSort();
  bars.forEach(b => {
    b.x += (b.targetX - b.x) * 0.2;
    b.shake *= 0.88; b.shakeY *= 0.85;
    if (Math.abs(b.shakeY) < 0.3) b.shakeY = 0;
    b.scream *= 0.95; b.flash *= 0.9;
    if (b.scream < 0.05 && !b.sorted && b.face === 'scream') b.face = 'worried';
  });
  for (let i = particles.length-1; i >= 0; i--) {
    const p = particles[i]; p.x += p.vx; p.y += p.vy; p.vy += 0.12; p.life -= 0.02;
    if (p.life <= 0) particles.splice(i, 1);
  }
  shakes = shakes.map(s => s*0.82).filter(s => Math.abs(s) > 0.3);
  screamMessages.forEach(m => { m.time--; if (m.time <= 15) m.el.style.opacity = m.time/15; if (m.time <= 0) m.el.remove(); });
  screamMessages = screamMessages.filter(m => m.time > 0);
}

function drawFace(x, y, w, face, screamIntensity) {
  const s = Math.min(w*0.8, 30);
  const cx = x + w/2, cy = y + s*0.6;
  ctx.save();
  if (face === 'scream') {
    ctx.translate((Math.random()-0.5)*screamIntensity*3, (Math.random()-0.5)*screamIntensity*2);
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(cx-s*0.2, cy-s*0.15, s*0.12, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+s*0.2, cy-s*0.15, s*0.12, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(cx-s*0.2, cy-s*0.15, s*0.05, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+s*0.2, cy-s*0.15, s*0.05, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.ellipse(cx, cy+s*0.15, s*0.15, s*0.22, 0, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.fillRect(cx-s*0.1, cy+s*0.02, s*0.06, s*0.06);
    ctx.fillRect(cx+s*0.04, cy+s*0.02, s*0.06, s*0.06);
    ctx.fillStyle = 'rgba(100,200,255,0.7)';
    ctx.beginPath(); ctx.arc(cx+s*0.35, cy-s*0.05, s*0.04, 0, Math.PI*2); ctx.fill();
  } else if (face === 'worried') {
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(cx-s*0.18, cy-s*0.1, s*0.08, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+s*0.18, cy-s*0.1, s*0.08, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(cx-s*0.18, cy-s*0.08, s*0.04, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+s*0.18, cy-s*0.08, s*0.04, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(cx-s*0.12, cy+s*0.18); ctx.quadraticCurveTo(cx, cy+s*0.1, cx+s*0.12, cy+s*0.18); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx-s*0.28,cy-s*0.25); ctx.lineTo(cx-s*0.08,cy-s*0.22); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(cx+s*0.28,cy-s*0.25); ctx.lineTo(cx+s*0.08,cy-s*0.22); ctx.stroke();
  } else if (face === 'happy') {
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(cx-s*0.18, cy-s*0.1, s*0.07, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+s*0.18, cy-s*0.1, s*0.07, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(cx-s*0.18, cy-s*0.1, s*0.03, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+s*0.18, cy-s*0.1, s*0.03, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(cx, cy+s*0.08, s*0.12, 0.1*Math.PI, 0.9*Math.PI); ctx.stroke();
  } else {
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(cx-s*0.15, cy-s*0.08, s*0.04, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(cx+s*0.15, cy-s*0.08, s*0.04, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle = '#000'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(cx-s*0.1, cy+s*0.15); ctx.lineTo(cx+s*0.1, cy+s*0.15); ctx.stroke();
  }
  ctx.restore();
}

function clamp(min, val, max) { return Math.max(min, Math.min(max, val)); }

function draw() {
  const sx = shakes.reduce((a,b)=>a+b, 0);
  ctx.save();
  ctx.translate(sx, sx*0.3);
  ctx.fillStyle = '#0a0812';
  ctx.fillRect(0, 0, W, H);

  if (chaosMode && sorting) {
    for (let i = 0; i < 5; i++) {
      ctx.fillStyle = 'rgba('+Math.floor(Math.random()*50)+',0,'+Math.floor(Math.random()*30)+',0.15)';
      ctx.fillRect(Math.random()*W, Math.random()*H, Math.random()*200, 2);
    }
  }

  const groundY = H * 0.85;
  ctx.strokeStyle = 'rgba(255,51,102,0.3)'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, groundY); ctx.lineTo(W, groundY); ctx.stroke();

  const barW = getBarW();
  bars.forEach(b => {
    const bH = getBarH(b.val);
    const bx = b.x + (Math.random()-0.5)*b.shake;
    const by = groundY - bH + b.shakeY;

    if (b.flash > 0.1) { ctx.shadowColor = '#fff'; ctx.shadowBlur = b.flash*15; }
    else if (b.sorted) { ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 8; }
    else { ctx.shadowColor = b.color; ctx.shadowBlur = b.scream > 0.1 ? b.scream*20 : 4; }

    const grad = ctx.createLinearGradient(bx, by, bx, groundY);
    if (b.sorted) { grad.addColorStop(0,'#00ff88'); grad.addColorStop(1,'#008844'); }
    else { grad.addColorStop(0, b.color); grad.addColorStop(0.7, b.color); grad.addColorStop(1,'rgba(0,0,0,0.5)'); }
    ctx.fillStyle = grad;

    const r = Math.min(4, barW/3);
    ctx.beginPath();
    ctx.moveTo(bx+r, by); ctx.lineTo(bx+barW-r, by);
    ctx.quadraticCurveTo(bx+barW, by, bx+barW, by+r);
    ctx.lineTo(bx+barW, groundY); ctx.lineTo(bx, groundY);
    ctx.lineTo(bx, by+r); ctx.quadraticCurveTo(bx, by, bx+r, by);
    ctx.closePath(); ctx.fill();
    ctx.shadowBlur = 0;

    if (b.flash > 0.1) { ctx.fillStyle = 'rgba(255,255,255,'+b.flash*0.3+')'; ctx.fill(); }
    if (barW >= 14) drawFace(bx, by, barW, b.face, b.scream);
    if (barW >= 14) {
      ctx.fillStyle = b.sorted ? '#00ff88' : '#888';
      ctx.font = Math.min(10, barW*0.5)+'px Silkscreen';
      ctx.textAlign = 'center';
      ctx.fillText(b.val, bx+barW/2, groundY+14);
    }
    if (b.scream > 0.2 && barW >= 18) {
      ctx.save(); ctx.globalAlpha = b.scream;
      ctx.fillStyle = '#ff3366';
      ctx.font = Math.min(14, barW*0.6)+'px Creepster';
      ctx.textAlign = 'center';
      ctx.fillText(screams[b.val % screams.length], bx+barW/2, by-8-b.scream*10);
      ctx.restore();
    }
  });

  particles.forEach(p => {
    ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
    ctx.shadowColor = p.color; ctx.shadowBlur = 4;
    ctx.fillRect(p.x-p.size/2, p.y-p.size/2, p.size, p.size);
  });
  ctx.globalAlpha = 1; ctx.shadowBlur = 0;

  if (sorted) {
    ctx.fillStyle = '#00ff88';
    ctx.font = clamp(24, W*0.05, 48)+'px Creepster';
    ctx.textAlign = 'center';
    ctx.shadowColor = '#00ff88'; ctx.shadowBlur = 20;
    ctx.fillText('SORTED! PEACE AT LAST!', W/2, H*0.15);
    ctx.shadowBlur = 0;
  }
  ctx.restore();
}

function loop() { update(); draw(); requestAnimationFrame(loop); }

document.getElementById('btn-sort').addEventListener('click', () => {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  if (sorting) return;
  if (sorted) { shuffle(); syncBars(); }
  sorting = true; sorted = false;
  swapCount=0; cmpCount=0; screamCount=0;
  bars.forEach(b => { b.sorted=false; b.face='worried'; });
  sortGen = bubbleSortGen();
});

document.getElementById('btn-shuffle').addEventListener('click', () => {
  if (sorting) return;
  shuffle(); syncBars(); sorted = false;
  swapCount=0; cmpCount=0; screamCount=0;
  bars.forEach(b => { b.face='neutral'; b.sorted=false; });
  updateStats();
});

const sizes = [15, 30, 50, 80];
let sizeIdx = 1;
document.getElementById('btn-size').addEventListener('click', () => {
  if (sorting) return;
  sizeIdx = (sizeIdx+1)%sizes.length;
  arrSize = sizes[sizeIdx];
  document.getElementById('btn-size').textContent = 'SIZE: '+arrSize;
  initArray();
});

document.getElementById('btn-chaos').addEventListener('click', () => {
  chaosMode = !chaosMode;
  document.getElementById('btn-chaos').classList.toggle('active', chaosMode);
});

document.getElementById('speed-slider').addEventListener('input', e => { speed = parseInt(e.target.value); });

initArray();
loop();
</script>
</body>
</html>
