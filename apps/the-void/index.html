<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>The Void — feed the black hole, born again as stars</title>
<meta name="description" content="Type into the void. Your words spiral into the black hole and emerge somewhere on the sky as stars.">
<meta property="og:title" content="The Void">
<meta property="og:description" content="Type into the void. Your words spiral into the black hole and emerge somewhere on the sky as stars.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://sloppy.live/the-void/">
<meta property="og:image" content="https://image.pollinations.ai/prompt/black%20hole%20with%20typed%20words%20spiraling%20into%20event%20horizon%20stretching%20redshifted%20stars%20being%20born%20across%20night%20sky%20deep%20violet%20cosmos%20centered?width=1200&height=630&model=flux&nologo=true&seed=70770">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%95%B3%EF%B8%8F">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400;1,500&family=Major+Mono+Display&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
  --void:#04020f; --jet:#0a061e;
  --paper:#f0e6ff;
  --pink:#ff80b8; --ember:#ffa55a; --violet:#b89bff;
  --cyan:#7adcff; --gold:#ffd770;
  --text: rgba(240,230,255,0.92);
  --dim:  rgba(240,230,255,0.55);
  --faint:rgba(240,230,255,0.30);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;overflow:hidden}
body{
  background:
    radial-gradient(60vmin 60vmin at 50% 50%, rgba(255,120,80,0.08), transparent 65%),
    radial-gradient(120vmin 120vmin at 50% 50%, rgba(100,60,160,0.12), transparent 70%),
    radial-gradient(140vmin 140vmin at 50% 50%, var(--jet) 0%, var(--void) 80%);
  color: var(--text);
  font-family:'Cormorant Garamond', serif;
}
canvas{ position:fixed; inset:0; width:100%; height:100%; display:block; }
#bg{ z-index:0; }
#stars{ z-index:1; }      /* born stars + background stars */
#hole{ z-index:2; }       /* accretion + horizon */
#words{ z-index:3; }      /* spiraling text */

.scanlines{
  position:fixed; inset:0; pointer-events:none; z-index:8;
  background: repeating-linear-gradient(0deg, rgba(0,0,0,0.16) 0 1px, transparent 1px 4px);
  mix-blend-mode: multiply;
}

/* corners */
.hud{
  position:fixed; top:1.2rem; left:1.2rem; z-index:9;
  pointer-events:none;
  display:flex; flex-direction:column; gap:.2rem;
}
.hud h1{
  margin:0; font-family:'Major Mono Display', monospace; font-weight:400;
  font-size: clamp(1.6rem, 4vw, 2.4rem); line-height:1;
  color: var(--paper); letter-spacing: .12em;
  text-shadow: 0 0 12px rgba(184,155,255,0.4), 0 0 32px rgba(122,220,255,0.2);
}
.hud .tag{
  font-family:'Cormorant Garamond', serif; font-style:italic;
  color: var(--dim); font-size: clamp(0.95rem, 1.6vw, 1.15rem);
}

.stats{
  position:fixed; top:1.2rem; right:1.2rem; z-index:9;
  pointer-events:none; text-align:right;
  font-family:'IBM Plex Mono', monospace; font-size:.7rem;
  letter-spacing:.22em; color: var(--dim); text-transform:uppercase;
}
.stats b{ color: var(--paper); font-weight:500; font-size:.95rem; }
.stats .pulse{
  display:inline-block; width:.45em; height:.45em; border-radius:50%;
  background: var(--ember); margin-right:.4em; vertical-align:middle;
  box-shadow: 0 0 8px var(--ember);
  animation: pulseDot 2.4s ease-in-out infinite;
}
@keyframes pulseDot { 0%, 100% { opacity: 1 } 50% { opacity: .35 } }

/* input bar */
.input-bar{
  position:fixed; left:50%; bottom:1.3rem; transform:translateX(-50%);
  z-index:10;
  width:min(92vw, 540px);
  background: rgba(15,8,35,0.5);
  backdrop-filter: blur(14px) saturate(140%);
  -webkit-backdrop-filter: blur(14px) saturate(140%);
  border:1px solid rgba(184,155,255,0.35);
  border-radius: 999px;
  padding: .5rem .6rem .5rem 1.1rem;
  display:flex; align-items:center; gap:.6rem;
  box-shadow:
    0 0 22px rgba(184,155,255,0.18),
    inset 0 0 0 1px rgba(255,255,255,0.04);
}
.input-bar input{
  flex:1; background:transparent; border:none; outline:none;
  font-family:'Cormorant Garamond', serif; font-style:italic; font-weight:400;
  font-size:1.1rem; color: var(--paper);
  caret-color: var(--pink);
  min-width: 0;
}
.input-bar input::placeholder{ color: rgba(240,230,255,0.45); }
.input-bar button{
  appearance:none; background: transparent;
  border:1px solid rgba(255,167,90,0.5);
  color: var(--ember);
  font-family:'IBM Plex Mono', monospace; font-size:.65rem;
  font-weight:500; letter-spacing:.25em; text-transform:uppercase;
  padding:.55rem .9rem; border-radius: 999px;
  cursor:pointer;
  min-height: 36px;
  transition: all .15s;
}
.input-bar button:hover, .input-bar button:focus-visible{
  border-color: var(--ember); color: #fff;
  background: rgba(255,165,90,0.16);
  box-shadow: 0 0 18px rgba(255,165,90,0.4);
  outline:none;
}
.input-bar button:focus-visible{ outline:2px solid var(--cyan); outline-offset:2px; }

/* hint */
.hint{
  position:fixed; left:50%; bottom:5.5rem; transform:translateX(-50%);
  z-index:9; pointer-events:none;
  font-family:'Cormorant Garamond', serif; font-style:italic;
  color: rgba(240,230,255,0.45);
  font-size: clamp(0.95rem, 1.8vw, 1.15rem);
  opacity:1; transition: opacity 1s 0.4s;
  text-align:center;
  text-shadow: 0 0 16px rgba(0,0,0,0.65);
}
.hint.gone{ opacity:0; }

/* tooltip for stars */
.star-tip{
  position:fixed; z-index:11; pointer-events:none;
  background: rgba(20,12,40,0.92);
  border: 1px solid rgba(184,155,255,0.45);
  color: var(--paper);
  padding: .5rem .7rem;
  font-family:'Cormorant Garamond', serif; font-style:italic;
  font-size: 1rem;
  max-width: 280px;
  border-radius: 6px 18px 6px 18px;
  opacity: 0; transition: opacity .12s;
  box-shadow: 0 0 22px rgba(184,155,255,0.3);
}
.star-tip.show{ opacity: 1; }
.star-tip .meta{
  display:block;
  font-family:'IBM Plex Mono', monospace; font-style:normal;
  font-size: .58rem; letter-spacing:.18em; text-transform:uppercase;
  color: var(--dim);
  margin-top: .2rem;
}

.audio-toggle{
  position:fixed; right:1.2rem; bottom:1.3rem; z-index:11;
  appearance:none; background:transparent;
  border:1px solid rgba(184,155,255,0.35);
  color: var(--dim);
  font-family:'IBM Plex Mono', monospace; font-size:.62rem;
  padding:.4rem .55rem; border-radius:6px;
  letter-spacing:.2em; text-transform:uppercase; cursor:pointer;
  min-height: 36px;
}
.audio-toggle:hover{ color: var(--paper); border-color: var(--paper); }

@media (max-width: 520px){
  .stats{ top:.8rem; right:.8rem; font-size:.6rem; }
  .hud{ top:.8rem; left:.8rem; }
  .input-bar{ bottom:.8rem; }
}
@media (prefers-reduced-motion: reduce){
  .stats .pulse{ animation: none; }
}
</style>
</head>
<body>
<canvas id="bg"    aria-hidden="true"></canvas>
<canvas id="stars" aria-label="Stars in the void"></canvas>
<canvas id="hole"  aria-hidden="true"></canvas>
<canvas id="words" aria-hidden="true"></canvas>

<div class="scanlines" aria-hidden="true"></div>

<header class="hud">
  <h1>THE VOID</h1>
  <div class="tag">type. let it fall in. wait for a star.</div>
</header>

<div class="stats" role="status" aria-live="polite">
  <span class="pulse" aria-hidden="true"></span><span id="state">accreting</span><br>
  <b id="count-msg">0</b> consumed · <b id="count-star">0</b> stars
</div>

<form class="input-bar" id="form" role="form" autocomplete="off">
  <input id="msg" name="msg" type="text" maxlength="120" placeholder="whisper into the void…" aria-label="Message to feed the void">
  <button type="submit" aria-label="Send message to the black hole">⤓ feed</button>
</form>

<div class="hint" id="hint">words fall toward the center · stars emerge somewhere</div>

<button class="audio-toggle" id="audio-btn" type="button" aria-pressed="false">♪ on</button>

<div class="star-tip" id="star-tip" role="tooltip"></div>

<script>
(function(){
  const $bg = document.getElementById('bg');
  const $stars = document.getElementById('stars');
  const $hole = document.getElementById('hole');
  const $words = document.getElementById('words');
  const ctxBg = $bg.getContext('2d');
  const ctxStars = $stars.getContext('2d');
  const ctxHole = $hole.getContext('2d');
  const ctxWords = $words.getContext('2d');

  let W = 0, H = 0, CX = 0, CY = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);
  function resize(){
    W = window.innerWidth; H = window.innerHeight;
    CX = W / 2; CY = H / 2;
    for (const [c, ctx] of [[$bg, ctxBg], [$stars, ctxStars], [$hole, ctxHole], [$words, ctxWords]]){
      c.width = Math.round(W * DPR);
      c.height = Math.round(H * DPR);
      ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    }
  }
  window.addEventListener('resize', resize);
  resize();

  // ---------- state ----------
  const STAR_KEY = 'the-void-stars-v1';
  let bornStars = [];
  try {
    bornStars = JSON.parse(localStorage.getItem(STAR_KEY) || '[]');
  } catch(_) { bornStars = []; }

  // pre-existing background stars (procedural, fixed seed)
  const BG_STARS = (() => {
    const rng = mulberry32(1729);
    const arr = [];
    for (let i = 0; i < 220; i++){
      arr.push({
        u: rng(), v: rng(),
        size: 0.4 + rng() * 1.4,
        twink: 0.4 + rng() * 0.6,
        phase: rng() * Math.PI * 2,
        speed: 0.5 + rng() * 1.2,
        hue: rng() < 0.7 ? 0 : (180 + rng() * 80),
      });
    }
    return arr;
  })();
  function mulberry32(seed){
    return function(){
      let t = seed += 0x6D2B79F5;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    };
  }

  // spiraling messages
  const messages = [];   // active spiraling messages
  let consumedCount = 0;

  // counters
  document.getElementById('count-msg').textContent = bornStars.length;       // initial bound to past plays
  document.getElementById('count-star').textContent = bornStars.length;
  consumedCount = bornStars.length;

  // ---------- audio ----------
  let muted = false;
  let audioCtx = null;
  let droneNodes = [];
  function ac(){ if (!audioCtx) { try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} } return audioCtx; }
  function startDrone(){
    const a = ac(); if (!a) return;
    if (droneNodes.length) return;
    // soft 4-voice subdrone with slow LFO filter sweep
    const master = a.createGain();
    master.gain.value = 0;
    master.connect(a.destination);
    master.gain.linearRampToValueAtTime(0.16, a.currentTime + 4);
    const lp = a.createBiquadFilter();
    lp.type = 'lowpass'; lp.frequency.value = 480; lp.Q.value = 0.7;
    lp.connect(master);
    const lfo = a.createOscillator();
    lfo.frequency.value = 0.06;
    const lfoG = a.createGain(); lfoG.gain.value = 220;
    lfo.connect(lfoG); lfoG.connect(lp.frequency);
    lfo.start();
    const freqs = [55, 82.4, 110, 164.8];
    for (const f of freqs){
      const o1 = a.createOscillator(); o1.type='sine'; o1.frequency.value = f;
      const o2 = a.createOscillator(); o2.type='triangle'; o2.frequency.value = f * 1.005;
      const g = a.createGain(); g.gain.value = 0.16;
      o1.connect(g); o2.connect(g); g.connect(lp);
      o1.start(); o2.start();
      droneNodes.push(o1, o2);
    }
    droneNodes.push(lfo, lfoG, lp, master);
  }
  function stopDrone(){
    if (!audioCtx) return;
    const a = audioCtx;
    for (const n of droneNodes){ try { n.disconnect && n.disconnect(); n.stop && n.stop(a.currentTime + 0.4); } catch(e){} }
    droneNodes = [];
  }
  function whoosh(){
    if (muted) return;
    const a = ac(); if (!a) return;
    const o = a.createOscillator(); o.type = 'sawtooth';
    const f = a.createBiquadFilter(); f.type = 'bandpass'; f.Q.value = 2;
    f.frequency.setValueAtTime(900, a.currentTime);
    f.frequency.exponentialRampToValueAtTime(180, a.currentTime + 2.4);
    const g = a.createGain();
    g.gain.setValueAtTime(0.0, a.currentTime);
    g.gain.linearRampToValueAtTime(0.18, a.currentTime + 0.05);
    g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 2.6);
    o.frequency.setValueAtTime(220, a.currentTime);
    o.frequency.exponentialRampToValueAtTime(40, a.currentTime + 2.4);
    o.connect(f); f.connect(g); g.connect(a.destination);
    o.start(); o.stop(a.currentTime + 2.7);
  }
  function chime(){
    if (muted) return;
    const a = ac(); if (!a) return;
    const base = 660 + Math.random() * 280;
    for (const mul of [1, 1.5, 2]){
      const o = a.createOscillator(); o.type='triangle'; o.frequency.value = base * mul;
      const g = a.createGain();
      g.gain.setValueAtTime(0, a.currentTime);
      g.gain.linearRampToValueAtTime(0.08 / mul, a.currentTime + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 1.4);
      o.connect(g); g.connect(a.destination);
      o.start(); o.stop(a.currentTime + 1.5);
    }
  }
  document.getElementById('audio-btn').addEventListener('click', () => {
    muted = !muted;
    document.getElementById('audio-btn').textContent = muted ? '♪ off' : '♪ on';
    document.getElementById('audio-btn').setAttribute('aria-pressed', String(muted));
    if (muted) stopDrone(); else startDrone();
  });

  // ---------- spiral message ----------
  // Each message starts at the edge, then spirals in via a logarithmic spiral.
  // Path: r(t) = r0 * exp(-k*t),  θ(t) = θ0 + ω*t
  // After r < horizonR, message is "crossed" → flash → a new star is born.
  function feedMessage(text){
    text = text.slice(0, 120).trim();
    if (!text) return;
    const ang = Math.random() * Math.PI * 2;
    const r0 = Math.max(W, H) * 0.42;
    const x = CX + Math.cos(ang) * r0;
    const y = CY + Math.sin(ang) * r0;
    messages.push({
      text,
      x, y,
      r: r0,
      theta: ang,
      omega: 1.7 + Math.random() * 1.0,
      k: 0.32 + Math.random() * 0.06,        // spiral inward rate
      t: 0,
      crossed: false,
      stretch: 1,
      hue: Math.random() < 0.5 ? 0 : 280,    // initial hue (white-ish or violet)
    });
    whoosh();
    document.getElementById('hint').classList.add('gone');
  }

  function bornStarFromMessage(text){
    // place far from center, in random direction (but bias toward upper half)
    const a = Math.random() * Math.PI * 2;
    const r = Math.min(W, H) * (0.30 + Math.random() * 0.45);
    const u = (CX + Math.cos(a) * r) / W;
    const v = (CY + Math.sin(a) * r) / H;
    const palette = ['#ffd770', '#7adcff', '#ff80b8', '#b89bff', '#92ffb0', '#ffe7c4'];
    const color = palette[Math.floor(Math.random() * palette.length)];
    const star = {
      text,
      u, v,
      color,
      size: 1.6 + Math.random() * 2.3,
      twink: 0.4 + Math.random() * 0.6,
      phase: Math.random() * Math.PI * 2,
      bornAt: Date.now(),
      fadeIn: 0,
    };
    bornStars.push(star);
    // Cap to 600 stars (oldest pushed out) so localStorage stays small.
    while (bornStars.length > 600) bornStars.shift();
    // Persist
    try { localStorage.setItem(STAR_KEY, JSON.stringify(bornStars.map(s => ({ text:s.text, u:s.u, v:s.v, color:s.color, size:s.size, twink:s.twink, phase:s.phase, bornAt:s.bornAt })))); } catch(e){}
    consumedCount++;
    document.getElementById('count-msg').textContent = consumedCount;
    document.getElementById('count-star').textContent = bornStars.length;
    chime();
  }

  // ---------- input ----------
  const $form = document.getElementById('form');
  const $msg = document.getElementById('msg');
  $form.addEventListener('submit', e => {
    e.preventDefault();
    const v = $msg.value;
    if (!v.trim()) return;
    feedMessage(v);
    $msg.value = '';
    if (!audioCtx) { ac(); if (!muted) startDrone(); }
  });

  // ---------- main loop ----------
  let lastT = performance.now();
  function loop(now){
    let dt = (now - lastT) / 1000;
    lastT = now;
    if (dt > 0.06) dt = 0.06;
    update(dt, now);
    render(dt, now);
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  const horizonR = () => Math.min(W, H) * 0.06;

  function update(dt, now){
    for (let i = messages.length - 1; i >= 0; i--){
      const m = messages[i];
      m.t += dt;
      // log-spiral
      m.r = Math.max(0, m.r * Math.exp(-m.k * dt));
      m.theta += m.omega * dt * (1 + (1 - m.r / (Math.max(W, H) * 0.42)) * 4); // speeds up as r→0
      m.x = CX + Math.cos(m.theta) * m.r;
      m.y = CY + Math.sin(m.theta) * m.r;
      // tangential stretch increases as r → horizon (spaghettification)
      const k = Math.max(0, 1 - m.r / (Math.max(W, H) * 0.30));
      m.stretch = 1 + k * 5;
      // redshift hue
      const t = Math.max(0, Math.min(1, k));
      m.hue = t < 0.5 ? lerp(0, 18, t * 2) : lerp(18, 0, (t - 0.5) * 2);   // shift toward orange then deep red
      m.bright = 1 - t * 0.6;
      // crossed?
      if (!m.crossed && m.r <= horizonR()){
        m.crossed = true;
        m.crossedAt = now;
        // Schedule a star birth after a brief pause
        setTimeout(() => bornStarFromMessage(m.text), 1200);
      }
      // remove after a short post-cross fade
      if (m.crossed && (now - m.crossedAt) > 260){
        messages.splice(i, 1);
      }
    }
    // fade-in for newly born stars
    for (const s of bornStars){
      if (s.fadeIn == null) s.fadeIn = 0;
      if (s.fadeIn < 1) s.fadeIn = Math.min(1, s.fadeIn + dt * 1.3);
    }
  }

  function render(dt, now){
    renderBg();
    renderStars(now);
    renderHole(now);
    renderWords(now);
  }

  function renderBg(){
    ctxBg.clearRect(0, 0, W, H);
    // outer rim faint highlight (already painted by body bg gradients)
  }

  function renderStars(now){
    ctxStars.clearRect(0, 0, W, H);
    // background twinkling stars
    for (const s of BG_STARS){
      const x = s.u * W, y = s.v * H;
      const a = 0.45 + 0.55 * Math.sin(now * 0.001 * s.speed + s.phase);
      ctxStars.fillStyle = s.hue ? `hsla(${s.hue}, 80%, 80%, ${a * s.twink})` : `rgba(240, 230, 255, ${a * s.twink})`;
      ctxStars.beginPath();
      ctxStars.arc(x, y, s.size, 0, Math.PI * 2);
      ctxStars.fill();
    }
    // born stars (brighter, glowing)
    for (const s of bornStars){
      const x = s.u * W, y = s.v * H;
      const tw = 0.65 + 0.35 * Math.sin(now * 0.0012 * (s.twink || 1) + (s.phase || 0));
      const alpha = (s.fadeIn != null ? s.fadeIn : 1) * tw;
      ctxStars.save();
      ctxStars.shadowColor = s.color || '#fff';
      ctxStars.shadowBlur = 14 + Math.sin(now * 0.002 + (s.phase || 0)) * 4;
      ctxStars.fillStyle = `rgba(255,255,255, ${alpha})`;
      ctxStars.beginPath();
      ctxStars.arc(x, y, s.size + 0.4, 0, Math.PI * 2);
      ctxStars.fill();
      ctxStars.shadowBlur = 0;
      // colored halo
      const g = ctxStars.createRadialGradient(x, y, 0, x, y, s.size * 5);
      g.addColorStop(0, s.color + 'cc');
      g.addColorStop(1, 'rgba(0,0,0,0)');
      ctxStars.globalAlpha = alpha * 0.35;
      ctxStars.fillStyle = g;
      ctxStars.beginPath();
      ctxStars.arc(x, y, s.size * 5, 0, Math.PI * 2);
      ctxStars.fill();
      ctxStars.globalAlpha = 1;
      ctxStars.restore();
    }
  }

  function renderHole(now){
    ctxHole.clearRect(0, 0, W, H);
    const hr = horizonR();
    // outer halo
    const halo = ctxHole.createRadialGradient(CX, CY, hr * 1.1, CX, CY, hr * 5);
    halo.addColorStop(0, 'rgba(184, 155, 255, 0.55)');
    halo.addColorStop(0.4, 'rgba(255, 165, 90, 0.18)');
    halo.addColorStop(1, 'rgba(0, 0, 0, 0)');
    ctxHole.fillStyle = halo;
    ctxHole.beginPath();
    ctxHole.arc(CX, CY, hr * 5, 0, Math.PI * 2);
    ctxHole.fill();

    // accretion disk — rotating sweep
    ctxHole.save();
    ctxHole.translate(CX, CY);
    ctxHole.rotate(now * 0.00018);
    const arc = ctxHole.createConicGradient(0, 0, 0);
    arc.addColorStop(0.00, 'rgba(255, 235, 170, 0.95)');
    arc.addColorStop(0.25, 'rgba(255, 130, 60, 0.55)');
    arc.addColorStop(0.5,  'rgba(120, 40, 200, 0.30)');
    arc.addColorStop(0.75, 'rgba(255, 130, 60, 0.55)');
    arc.addColorStop(1.00, 'rgba(255, 235, 170, 0.95)');
    ctxHole.fillStyle = arc;
    ctxHole.beginPath();
    ctxHole.arc(0, 0, hr * 2.6, 0, Math.PI * 2);
    ctxHole.arc(0, 0, hr * 1.06, 0, Math.PI * 2, true);
    ctxHole.fill();
    ctxHole.restore();

    // photon ring
    ctxHole.strokeStyle = 'rgba(255, 244, 200, 0.9)';
    ctxHole.lineWidth = 1.6;
    ctxHole.shadowColor = 'rgba(255, 244, 200, 0.9)';
    ctxHole.shadowBlur = 8;
    ctxHole.beginPath();
    ctxHole.arc(CX, CY, hr * 1.06, 0, Math.PI * 2);
    ctxHole.stroke();
    ctxHole.shadowBlur = 0;

    // event horizon (pitch black disc)
    ctxHole.fillStyle = '#000';
    ctxHole.beginPath();
    ctxHole.arc(CX, CY, hr, 0, Math.PI * 2);
    ctxHole.fill();
  }

  function renderWords(now){
    ctxWords.clearRect(0, 0, W, H);
    for (const m of messages){
      ctxWords.save();
      ctxWords.translate(m.x, m.y);
      // align text along radial direction (so stretch is tangential to the spiral)
      const ang = m.theta + Math.PI / 2;
      ctxWords.rotate(ang);
      const scaleX = m.stretch;
      const scaleY = 1 / Math.max(1, 1 + (m.stretch - 1) * 0.3);
      ctxWords.scale(scaleX, scaleY);
      const baseSize = Math.max(16, Math.min(36, 22 - m.r * 0.005));
      ctxWords.font = `italic ${baseSize}px 'Cormorant Garamond', serif`;
      ctxWords.textAlign = 'center';
      ctxWords.textBaseline = 'middle';
      const sat = m.crossed ? 0 : 70;
      const light = m.crossed ? 10 : (70 - (1 - m.bright) * 40);
      const a = m.crossed ? Math.max(0, 1 - (now - m.crossedAt) / 260) : 1;
      ctxWords.fillStyle = `hsla(${m.hue}, ${sat}%, ${light}%, ${a})`;
      ctxWords.shadowColor = `hsla(${m.hue}, ${sat}%, ${Math.min(85, light + 15)}%, ${a * 0.7})`;
      ctxWords.shadowBlur = 12 + (1 - m.bright) * 20;
      ctxWords.fillText(m.text, 0, 0);
      ctxWords.restore();
    }
  }

  function lerp(a, b, t){ return a + (b - a) * t; }

  // ---------- star tooltip ----------
  const $tip = document.getElementById('star-tip');
  $stars.addEventListener('pointermove', (e) => {
    const rect = $stars.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    let hit = null;
    let bestD2 = 18 * 18;
    for (const s of bornStars){
      const sx = s.u * W, sy = s.v * H;
      const d2 = (sx - x) * (sx - x) + (sy - y) * (sy - y);
      if (d2 < bestD2){ bestD2 = d2; hit = s; }
    }
    if (hit){
      const when = new Date(hit.bornAt || Date.now());
      const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
      const tag = `${when.getDate()} ${months[when.getMonth()]} ${when.getFullYear()} · ${String(when.getHours()).padStart(2,'0')}:${String(when.getMinutes()).padStart(2,'0')}`;
      $tip.innerHTML = `"${escapeHTML(hit.text)}"<span class="meta">born ${tag}</span>`;
      const pad = 16;
      $tip.classList.add('show');
      // position with bounds
      const tw = $tip.offsetWidth, th = $tip.offsetHeight;
      let tx = e.clientX + 14, ty = e.clientY - th - 12;
      if (tx + tw > window.innerWidth - pad) tx = e.clientX - tw - 14;
      if (ty < pad) ty = e.clientY + 18;
      $tip.style.left = tx + 'px';
      $tip.style.top  = ty + 'px';
    } else {
      $tip.classList.remove('show');
    }
  });
  $stars.addEventListener('pointerleave', () => $tip.classList.remove('show'));

  function escapeHTML(s){
    return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }

  // start drone after first interaction (autoplay rules)
  const startAudioOnce = () => {
    if (!muted){ ac(); startDrone(); }
    window.removeEventListener('pointerdown', startAudioOnce);
    window.removeEventListener('keydown', startAudioOnce);
  };
  window.addEventListener('pointerdown', startAudioOnce);
  window.addEventListener('keydown', startAudioOnce);

  // seed an initial whisper after a moment so the empty void isn't intimidating
  setTimeout(() => {
    if (messages.length === 0 && bornStars.length === 0){
      feedMessage('hello?');
    }
  }, 2400);
})();
</script>
</body>
