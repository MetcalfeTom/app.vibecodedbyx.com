<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>Word Scratch</title>
<meta name="description" content="A cheerful reading game for little kids. Scratch the card to reveal a word, then pop balloons to celebrate.">
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8E%88">
<meta property="og:title" content="Word Scratch">
<meta property="og:description" content="Scratch. Read. Pop balloons. A cheerful reading game for little kids.">
<meta property="og:url" content="https://sloppy.live/word-scratch">
<meta property="og:image" content="https://image.pollinations.ai/prompt/colorful%20kids%20reading%20game%2C%20big%20word%20being%20scratched%20to%20reveal%2C%20rising%20balloons%2C%20pastel%20friendly%20cartoon?width=1200&height=630&seed=8484&nologo=true">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@500;700&family=Lilita+One&family=Caveat:wght@700&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #b6e6ff;
    --sky-2: #d9f1ff;
    --cream: #fffaf0;
    --ink: #2a2434;
    --peach: #ffaf6f;
    --peach-dk: #c8763e;
    --mint: #95e3a8;
    --mint-dk: #4a9a64;
    --pink: #ff8fb8;
    --pink-dk: #c85f8a;
    --lemon: #ffe066;
    --lemon-dk: #c69e2f;
    --grape: #b59cf0;
    --grape-dk: #7858c4;
    --berry: #ff5a64;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-user-select: none; }
  html { font-size: 100%; }
  body {
    min-height: 100vh;
    height: 100vh;
    overflow: hidden;
    background:
      radial-gradient(ellipse at 18% 16%, rgba(255,175,111,0.30), transparent 55%),
      radial-gradient(ellipse at 82% 84%, rgba(149,227,168,0.28), transparent 55%),
      linear-gradient(180deg, var(--sky-2), var(--sky) 70%);
    color: var(--ink);
    font-family: 'Fredoka', 'Comic Sans MS', sans-serif;
    touch-action: none;
    overscroll-behavior: none;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(circle at 12% 22%, rgba(255,255,255,0.4) 0 4px, transparent 5px),
      radial-gradient(circle at 88% 14%, rgba(255,255,255,0.4) 0 5px, transparent 6px),
      radial-gradient(circle at 75% 32%, rgba(255,255,255,0.3) 0 3px, transparent 4px),
      radial-gradient(circle at 22% 76%, rgba(255,255,255,0.35) 0 4px, transparent 5px);
    z-index: 1;
  }
  main {
    position: relative;
    z-index: 2;
    width: 100%;
    height: 100%;
    display: grid;
    grid-template-rows: auto auto 1fr auto;   /* header / banner / play area / ctrls */
    gap: 0.4rem;
    padding: 0.8rem 0.9rem 1rem;
  }
  header.head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0.6rem;
    padding: 0.25rem 0.4rem;
  }
  h1 {
    font-family: 'Lilita One', sans-serif;
    font-weight: 400;
    font-size: clamp(1.6rem, 4.5vw, 2.4rem);
    line-height: 1;
    margin: 0;
    color: var(--peach-dk);
    text-shadow:
      -2px 2px 0 var(--cream),
      -4px 4px 0 var(--peach);
    letter-spacing: 0.02em;
  }
  h1 em {
    color: var(--pink-dk);
    font-style: italic;
    text-shadow:
      -2px 2px 0 var(--cream),
      -4px 4px 0 var(--pink);
  }
  .score-pill {
    display: flex;
    align-items: center;
    gap: 0.4rem;
    background: var(--cream);
    border: 3px solid var(--ink);
    border-radius: 2rem;
    padding: 0.4rem 0.85rem;
    box-shadow: 0 5px 0 var(--ink);
    font-family: 'Lilita One', sans-serif;
    font-size: 1.05rem;
    color: var(--ink);
  }
  .score-pill .star { font-size: 1.2rem; }
  .score-pill .num { color: var(--peach-dk); }

  .game-area {
    position: relative;
    width: 100%;
    height: 100%;
    display: flex;
    align-items: flex-start;            /* card sits at the absolute top */
    justify-content: center;
    overflow: hidden;
    padding-top: 0;
  }

  /* Scratch card */
  .card-stage {
    position: relative;
    width: min(90%, 30rem);
    aspect-ratio: 5 / 3;
    border-radius: 1.5rem;
    box-shadow:
      0 0 0 4px var(--ink),
      0 12px 0 var(--ink),
      0 28px 50px rgba(42,36,52,0.3);
    background: var(--cream);
    overflow: hidden;
  }
  .card-word {
    position: absolute;
    inset: 0;
    /* Two equal rows: emoji centered in top half of card, word centered in bottom half */
    display: grid;
    grid-template-rows: 1fr 1fr;
    place-items: center;
  }
  .card-word .emoji {
    font-size: clamp(4.2rem, 14vw, 6.4rem);
    line-height: 1;
  }
  .card-word .word {
    font-family: 'Lilita One', sans-serif;
    font-size: clamp(3rem, 11vw, 6rem);
    color: var(--ink);
    line-height: 1;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    text-shadow:
      -3px 3px 0 var(--lemon),
      -6px 6px 0 var(--lemon-dk);
  }
  canvas.scratch {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    cursor: crosshair;
    touch-action: none;
  }
  .card-prompt {
    position: absolute;
    bottom: -2.6rem;
    left: 0;
    right: 0;
    text-align: center;
    font-family: 'Caveat', cursive;
    font-size: clamp(1.3rem, 3vw, 1.7rem);
    color: var(--ink);
    opacity: 0.85;
    pointer-events: none;
  }

  /* Reveal celebration zoom */
  .card-stage.revealed {
    animation: cardPop 0.6s cubic-bezier(0.3, 1.5, 0.4, 1);
  }
  @keyframes cardPop {
    0% { transform: scale(1); }
    40% { transform: scale(1.12) rotate(-2deg); }
    70% { transform: scale(0.97) rotate(1deg); }
    100% { transform: scale(1); }
  }

  /* Balloons */
  .balloon {
    position: absolute;
    pointer-events: auto;
    cursor: pointer;
    transform-origin: center;
    will-change: transform;
    z-index: 8;
  }
  .balloon svg { width: 100%; height: 100%; display: block; filter: drop-shadow(0 5px 8px rgba(0,0,0,0.18)); }
  .balloon.popped {
    animation: popOut 0.32s ease forwards;
  }
  @keyframes popOut {
    0% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.5); opacity: 0.7; }
    100% { transform: scale(0); opacity: 0; }
  }

  /* Confetti particle */
  .confetti {
    position: absolute;
    pointer-events: none;
    z-index: 9;
    border-radius: 1px;
    will-change: transform;
  }

  /* Next button */
  .ctrls {
    display: flex;
    justify-content: center;
    gap: 0.6rem;
    flex-wrap: wrap;
    padding-top: 0.4rem;
    position: relative;
    z-index: 6;
  }
  .btn {
    font-family: 'Lilita One', sans-serif;
    font-size: clamp(1rem, 2.6vw, 1.2rem);
    letter-spacing: 0.08em;
    padding: 0.85rem 1.4rem;
    border-radius: 2rem;
    border: 3px solid var(--ink);
    cursor: pointer;
    text-transform: uppercase;
    min-height: 3.4rem;
    box-shadow: 0 6px 0 var(--ink);
    color: var(--ink);
    background: var(--cream);
    transition: all 0.14s ease;
  }
  .btn:hover { background: var(--lemon); }
  .btn:active { transform: translateY(3px); box-shadow: 0 3px 0 var(--ink); }
  .btn:focus-visible { outline: 4px solid var(--berry); outline-offset: 3px; }
  .btn.primary {
    background: var(--peach);
    color: var(--cream);
    box-shadow: 0 6px 0 var(--peach-dk);
    border-color: var(--peach-dk);
  }
  .btn.primary:hover { background: #ffc28a; color: var(--cream); }
  .btn.secondary {
    background: var(--mint);
    color: var(--ink);
    box-shadow: 0 6px 0 var(--mint-dk);
    border-color: var(--mint-dk);
  }
  .btn.secondary:hover { background: #b5edc4; }

  /* Big celebration text on full reveal */
  .cheer {
    position: absolute;
    top: 18%;
    left: 50%;
    transform: translate(-50%, 0) scale(0.5);
    font-family: 'Lilita One', sans-serif;
    font-size: clamp(2rem, 6vw, 3.5rem);
    color: var(--berry);
    text-shadow:
      -3px 3px 0 var(--cream),
      -6px 6px 0 var(--ink);
    pointer-events: none;
    opacity: 0;
    z-index: 7;
    letter-spacing: 0.04em;
  }
  .cheer.show {
    animation: cheerPop 1.6s cubic-bezier(0.3, 1.6, 0.4, 1) forwards;
  }
  @keyframes cheerPop {
    0% { transform: translate(-50%, 0) scale(0.5); opacity: 0; }
    25% { transform: translate(-50%, 0) scale(1.15) rotate(-3deg); opacity: 1; }
    60% { transform: translate(-50%, 0) scale(1) rotate(2deg); opacity: 1; }
    100% { transform: translate(-50%, -30px) scale(0.95); opacity: 0; }
  }

  /* Sound toggle in corner */
  .sound-tray {
    position: fixed;
    top: 0.75rem;
    right: 0.75rem;
    z-index: 30;
  }
  .ico-btn {
    background: var(--cream);
    border: 3px solid var(--ink);
    color: var(--ink);
    font-size: 1.1rem;
    padding: 0.5rem 0.65rem;
    border-radius: 50%;
    cursor: pointer;
    min-width: 2.75rem;
    min-height: 2.75rem;
    box-shadow: 0 4px 0 var(--ink);
    line-height: 1;
  }
  .ico-btn:hover { background: var(--lemon); }
  .ico-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 var(--ink); }
  .ico-btn:focus-visible { outline: 3px solid var(--berry); outline-offset: 2px; }

  /* Family progress banner — now a static row above game-area, not floating */
  .family-banner {
    background: var(--cream);
    border: 2.5px solid var(--ink);
    border-radius: 1.6rem;
    padding: 0.35rem 0.9rem;
    box-shadow: 0 4px 0 var(--ink);
    font-family: 'Fredoka', sans-serif;
    font-size: 0.95rem;
    color: var(--ink);
    display: inline-flex;
    align-items: center;
    gap: 0.5rem;
    justify-self: center;
    pointer-events: none;
  }
  .family-banner .theme {
    font-family: 'Lilita One', sans-serif;
    font-size: 1.05rem;
    color: var(--grape-dk);
    letter-spacing: 0.04em;
    text-transform: lowercase;
  }
  .family-banner .progress {
    font-family: 'Fredoka', sans-serif;
    font-size: 0.75rem;
    color: var(--ink);
    opacity: 0.7;
    background: var(--lemon);
    padding: 0.15rem 0.55rem;
    border-radius: 1rem;
    border: 1.5px solid var(--ink);
  }
  /* Bonus round mode — replaces scratch card content */
  .card-stage.bonus { background: linear-gradient(180deg, #fff3a5, #ffb3d1, #b59cf0); }
  .card-stage.bonus .card-word { animation: bonusBounce 1.2s ease-in-out infinite; }
  .card-stage.bonus canvas, .card-stage.bonus .scratch-hint { display: none; }
  @keyframes bonusBounce {
    0%, 100% { transform: scale(1) rotate(-2deg); }
    50% { transform: scale(1.06) rotate(2deg); }
  }
  .bonus-emoji {
    font-size: clamp(2.8rem, 9vw, 4.4rem);
    line-height: 1;
  }
  .bonus-title {
    font-family: 'Lilita One', sans-serif;
    font-size: clamp(2rem, 7vw, 3.4rem);
    color: var(--berry);
    text-shadow: -3px 3px 0 var(--cream), -6px 6px 0 var(--ink);
    letter-spacing: 0.06em;
  }
  .bonus-sub {
    font-family: 'Caveat', cursive;
    font-size: clamp(1rem, 2.4vw, 1.3rem);
    color: var(--ink);
    margin-top: 0.3rem;
  }
  /* Venom droplet — for cobra reveal — chunky for mobile visibility */
  .venom {
    position: absolute;
    width: 1.85rem;
    height: 2.7rem;
    background: radial-gradient(ellipse at 30% 22%, #e9ffe0, #6cfa5e 50%, #1d6f12);
    border: 2.5px solid #1d5912;
    border-radius: 60% 60% 50% 50% / 70% 70% 40% 40%;
    pointer-events: none;
    z-index: 50;
    opacity: 1;
    box-shadow: 0 0 22px rgba(108,250,94,0.85), 0 0 6px rgba(255,255,255,0.6) inset;
    will-change: transform;
    transform: translate(0, 0);
  }
  .venom-trail {
    position: absolute;
    width: 0.7rem;
    height: 0.7rem;
    background: rgba(108,250,94,0.8);
    border-radius: 50%;
    pointer-events: none;
    z-index: 49;
    box-shadow: 0 0 14px rgba(108,250,94,0.75);
  }
  /* Sparkle indicator (% scratched) */
  .scratch-hint {
    position: absolute;
    bottom: 8px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Fredoka', sans-serif;
    font-size: 0.7rem;
    color: var(--ink);
    background: rgba(255,250,240,0.75);
    padding: 0.15rem 0.55rem;
    border-radius: 1rem;
    opacity: 0.55;
    pointer-events: none;
    z-index: 5;
    transition: opacity 0.3s;
  }
  .scratch-hint.hidden { opacity: 0; }

  /* Initial overlay */
  .overlay {
    position: fixed;
    inset: 0;
    z-index: 80;
    background: rgba(42,36,52,0.85);
    backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .overlay[aria-hidden="false"] { opacity: 1; pointer-events: auto; }
  .overlay-card {
    background: var(--cream);
    border: 3px solid var(--ink);
    border-radius: 1.2rem;
    padding: 1.6rem 1.6rem;
    max-width: 24rem;
    width: 100%;
    text-align: center;
    box-shadow: 0 8px 0 var(--ink), 0 24px 60px rgba(0,0,0,0.5);
  }
  .overlay-card h2 {
    font-family: 'Lilita One', sans-serif;
    font-weight: 400;
    margin: 0 0 0.5rem;
    font-size: 2.2rem;
    color: var(--peach-dk);
    text-shadow: -2px 2px 0 var(--peach);
  }
  .overlay-card p {
    font-family: 'Fredoka', sans-serif;
    font-size: 1rem;
    color: var(--ink);
    line-height: 1.5;
    margin-bottom: 1.1rem;
  }
  .overlay-card p strong { color: var(--pink-dk); }
  .overlay-card .row {
    display: flex;
    justify-content: center;
    gap: 1rem;
    margin: 0.6rem 0;
  }

  .visually-hidden {
    position: absolute;
    width: 1px;
    height: 1px;
    margin: -1px;
    padding: 0;
    overflow: hidden;
    clip: rect(0,0,0,0);
    border: 0;
  }

  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }
    .card-stage.revealed { animation: none; }
    .cheer.show { animation: none; opacity: 1; }
  }
</style>
</head>
<body>
<main>
  <header class="head">
    <h1>word <em>scratch</em></h1>
    <div class="score-pill" aria-live="polite"><span class="star" aria-hidden="true">⭐</span><span>Stars: <span class="num" id="scoreOut">0</span></span></div>
  </header>

  <div class="family-banner" id="familyBanner" aria-live="polite">
    <span class="theme" id="themeOut">—</span>
    <span class="progress" id="progressOut">—</span>
  </div>

  <div class="game-area" id="gameArea">
    <div class="cheer" id="cheer" aria-hidden="true">YAY!</div>
    <div class="card-stage" id="cardStage">
      <div class="card-word">
        <span class="emoji" id="wordEmoji" aria-hidden="true">🐱</span>
        <span class="word" id="wordText">CAT</span>
      </div>
      <canvas class="scratch" id="scratch" aria-label="Scratch with your finger to reveal the word"></canvas>
      <div class="scratch-hint" id="scratchHint">scratch with your finger!</div>
    </div>
  </div>

  <div class="ctrls">
    <button class="btn secondary" id="sayBtn" type="button" aria-label="Read the word again">🔊 Say it</button>
    <button class="btn primary" id="nextBtn" type="button">▶ Next word</button>
  </div>
</main>

<div class="sound-tray">
  <button class="ico-btn" id="soundBtn" type="button" aria-label="Toggle sound">🔊</button>
</div>

<div class="overlay" id="introOverlay" role="dialog" aria-modal="true" aria-hidden="false">
  <div class="overlay-card">
    <h2>Word Scratch!</h2>
    <p>Scratch each card with your finger. Words come in <strong>families</strong> that grow together — like <strong>an → ant → pant</strong>. Finish a family and a <strong>balloon bonus round</strong> begins! 🎈🐍</p>
    <div class="row">
      <button class="btn primary" id="introStart" type="button">▶ Let's Play</button>
    </div>
  </div>
</div>

<script>
(function(){
  const $ = (id) => document.getElementById(id);
  const els = {
    cardStage: $('cardStage'),
    wordText: $('wordText'),
    wordEmoji: $('wordEmoji'),
    scratch: $('scratch'),
    scratchHint: $('scratchHint'),
    cheer: $('cheer'),
    scoreOut: $('scoreOut'),
    sayBtn: $('sayBtn'),
    nextBtn: $('nextBtn'),
    soundBtn: $('soundBtn'),
    gameArea: $('gameArea'),
    introOverlay: $('introOverlay'),
    introStart: $('introStart'),
    themeOut: $('themeOut'),
    progressOut: $('progressOut'),
  };
  const ctx = els.scratch.getContext('2d');

  // ---- Word families ----
  // Main progression: all 2–3 letter words. COBRA is the one intentional exception —
  // it's the "boss" word that triggers the venom spit, placed at the very start so
  // the venom mechanic is discoverable / testable on the first scratch.
  const FAMILIES = [
    // Scary animals lives first so the COBRA venom-spit fires on the very first reveal.
    { theme: 'scary animals', words: [
      { w: 'COBRA', e: '🐍' }, { w: 'BAT', e: '🦇' }, { w: 'RAT', e: '🐀' },
    ]},
    { theme: '-at family', words: [
      { w: 'AT',  e: '📍' }, { w: 'CAT', e: '🐱' }, { w: 'HAT', e: '🎩' }, { w: 'BAT', e: '🦇' },
    ]},
    { theme: '-an family', words: [
      { w: 'AN',  e: '🅰️' }, { w: 'ANT', e: '🐜' }, { w: 'CAN', e: '🥫' }, { w: 'FAN', e: '🌬️' },
    ]},
    { theme: '-og family', words: [
      { w: 'OG',  e: '〰️' }, { w: 'DOG', e: '🐶' }, { w: 'FOG', e: '🌫️' }, { w: 'LOG', e: '🪵' },
    ]},
    { theme: '-ig family', words: [
      { w: 'IG',  e: '🆔' }, { w: 'PIG', e: '🐷' }, { w: 'BIG', e: '🔍' }, { w: 'WIG', e: '👱' },
    ]},
    { theme: '-un family', words: [
      { w: 'UN',  e: '1️⃣' }, { w: 'SUN', e: '☀️' }, { w: 'RUN', e: '🏃' }, { w: 'BUN', e: '🍔' },
    ]},
    { theme: 'tiny critters', words: [
      { w: 'BEE', e: '🐝' }, { w: 'BUG', e: '🐛' }, { w: 'ANT', e: '🐜' }, { w: 'FLY', e: '🪰' },
    ]},
    { theme: '-it family', words: [
      { w: 'IT',  e: '🎯' }, { w: 'BIT', e: '🐭' }, { w: 'KIT', e: '🐾' }, { w: 'SIT', e: '🪑' },
    ]},
    { theme: '-op family', words: [
      { w: 'OP',  e: '⭕' }, { w: 'POP', e: '🍭' }, { w: 'HOP', e: '🐇' }, { w: 'TOP', e: '🔝' },
    ]},
  ];

  const state = {
    familyIdx: 0,
    wordIdx: 0,
    bonusActive: false,
    word: null,
    sound: true,
    score: 0,
    scratched: 0,
    revealed: false,
    drawing: false,
    lastPos: null,
    balloons: [],
    confetti: [],
    venom: [],
    rafId: 0,
  };
  function currentFamily() { return FAMILIES[state.familyIdx]; }
  function currentWord() { return currentFamily().words[state.wordIdx]; }

  // ---- Audio ----
  let audioCtx = null, master = null;
  function ensureAudio() {
    if (audioCtx) return;
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    audioCtx = new Ctx();
    master = audioCtx.createGain();
    master.gain.value = 0.45;
    master.connect(audioCtx.destination);
  }
  function withSound(fn) {
    if (!state.sound) return;
    ensureAudio(); if (!audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    fn(audioCtx.currentTime);
  }
  let lastScratch = 0;
  function playScratch() {
    if (!state.sound) return;
    const now = performance.now();
    if (now - lastScratch < 60) return;
    lastScratch = now;
    withSound(t => {
      const len = Math.floor(0.08 * audioCtx.sampleRate);
      const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i/len);
      const src = audioCtx.createBufferSource(); src.buffer = buf;
      const f = audioCtx.createBiquadFilter();
      f.type = 'bandpass'; f.frequency.value = 2400; f.Q.value = 0.7;
      const g = audioCtx.createGain(); g.gain.value = 0.05;
      src.connect(f); f.connect(g); g.connect(master);
      src.start(t);
    });
  }
  function playReveal() {
    withSound(t => {
      [523, 659, 784, 1047].forEach((f, i) => {
        const o = audioCtx.createOscillator();
        o.type = 'triangle'; o.frequency.value = f;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0, t + i*0.08);
        g.gain.linearRampToValueAtTime(0.14, t + i*0.08 + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, t + i*0.08 + 0.4);
        o.connect(g); g.connect(master);
        o.start(t + i*0.08); o.stop(t + i*0.08 + 0.42);
      });
    });
  }
  function playPop(hue) {
    withSound(t => {
      const baseFreq = 600 + (hue || 0);
      const o = audioCtx.createOscillator();
      o.type = 'sine';
      o.frequency.setValueAtTime(baseFreq * 1.3, t);
      o.frequency.exponentialRampToValueAtTime(baseFreq * 0.7, t + 0.18);
      const g = audioCtx.createGain();
      g.gain.setValueAtTime(0.15, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
      o.connect(g); g.connect(master);
      o.start(t); o.stop(t + 0.22);
      // Burst noise
      const len = Math.floor(0.06 * audioCtx.sampleRate);
      const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i/len, 1.4);
      const src = audioCtx.createBufferSource(); src.buffer = buf;
      const nf = audioCtx.createBiquadFilter();
      nf.type = 'highpass'; nf.frequency.value = 1600;
      const ng = audioCtx.createGain(); ng.gain.value = 0.12;
      src.connect(nf); nf.connect(ng); ng.connect(master);
      src.start(t);
    });
  }
  function playCheer() {
    withSound(t => {
      [392, 523, 659, 784, 1047, 1318].forEach((f, i) => {
        const o = audioCtx.createOscillator();
        o.type = 'triangle'; o.frequency.value = f;
        const g = audioCtx.createGain();
        g.gain.setValueAtTime(0, t + i*0.08);
        g.gain.linearRampToValueAtTime(0.12, t + i*0.08 + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, t + i*0.08 + 0.45);
        o.connect(g); g.connect(master);
        o.start(t + i*0.08); o.stop(t + i*0.08 + 0.47);
      });
    });
  }

  // ---- Speech ----
  function speak(word) {
    if (!state.sound) return;
    if (!('speechSynthesis' in window)) return;
    try {
      speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(word.toLowerCase());
      u.rate = 0.78;
      u.pitch = 1.15;
      u.volume = 0.95;
      // Try to prefer an English voice
      const voices = speechSynthesis.getVoices();
      const en = voices.find(v => /en-(US|GB|AU|CA)/i.test(v.lang));
      if (en) u.voice = en;
      speechSynthesis.speak(u);
    } catch (e) { /* swallow */ }
  }

  // ---- Scratch canvas ----
  function sizeCanvas() {
    const rect = els.scratch.getBoundingClientRect();
    const dpr = Math.min(window.devicePixelRatio || 1, 2);
    els.scratch.width = Math.floor(rect.width * dpr);
    els.scratch.height = Math.floor(rect.height * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    paintCover();
  }
  function paintCover() {
    const w = els.scratch.clientWidth;
    const h = els.scratch.clientHeight;
    // Lemon-grape gradient cover with cheerful sparkle pattern
    const grad = ctx.createLinearGradient(0, 0, w, h);
    grad.addColorStop(0, '#ffd96f');
    grad.addColorStop(0.5, '#ff9bcd');
    grad.addColorStop(1, '#b59cf0');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, w, h);
    // Sprinkle dots
    const sprinkleColors = ['#ff5a64', '#5dfaff', '#95e3a8', '#fff', '#ffd54a', '#ff8fb8'];
    for (let i = 0; i < 80; i++) {
      const x = (Math.sin(i * 1.3) * 0.5 + 0.5) * w;
      const y = (Math.cos(i * 1.7) * 0.5 + 0.5) * h;
      ctx.fillStyle = sprinkleColors[i % sprinkleColors.length];
      ctx.beginPath();
      ctx.arc(x, y, 3 + (i % 3), 0, Math.PI * 2);
      ctx.fill();
    }
    // Big "?" label
    ctx.fillStyle = 'rgba(255,255,255,0.75)';
    ctx.font = `bold ${Math.floor(h * 0.6)}px "Lilita One", "Comic Sans MS", sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('?', w / 2, h / 2);
    ctx.strokeStyle = 'rgba(42,36,52,0.85)';
    ctx.lineWidth = 4;
    ctx.strokeText('?', w / 2, h / 2);
  }

  function eraseAt(x, y) {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.beginPath();
    ctx.arc(x, y, 28, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
  }
  function eraseLine(x1, y1, x2, y2) {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.lineWidth = 56;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.stroke();
    ctx.globalCompositeOperation = 'source-over';
  }
  function getPointer(e) {
    const r = els.scratch.getBoundingClientRect();
    return { x: e.clientX - r.left, y: e.clientY - r.top };
  }
  function onPointerDown(e) {
    if (state.revealed) return;
    ensureAudio();
    els.scratch.setPointerCapture(e.pointerId);
    state.drawing = true;
    const p = getPointer(e);
    eraseAt(p.x, p.y);
    state.lastPos = p;
    playScratch();
    els.scratchHint.classList.add('hidden');
  }
  function onPointerMove(e) {
    if (!state.drawing || state.revealed) return;
    const p = getPointer(e);
    if (state.lastPos) eraseLine(state.lastPos.x, state.lastPos.y, p.x, p.y);
    eraseAt(p.x, p.y);
    state.lastPos = p;
    playScratch();
    // Throttled reveal check
    if (Math.random() < 0.15) checkReveal();
  }
  function onPointerUp(e) {
    if (state.drawing) {
      state.drawing = false;
      state.lastPos = null;
      checkReveal();
    }
  }
  function checkReveal() {
    if (state.revealed) return;
    // Sample every 16 pixels for speed
    const w = els.scratch.width;
    const h = els.scratch.height;
    const data = ctx.getImageData(0, 0, w, h).data;
    const step = 4 * 16;
    let cleared = 0, total = 0;
    for (let i = 3; i < data.length; i += step) {
      total++;
      if (data[i] < 60) cleared++;
    }
    state.scratched = cleared / total;
    if (state.scratched > 0.55) revealWord();
  }
  function revealWord() {
    if (state.revealed) return;
    state.revealed = true;
    // Erase entire cover with quick fill
    ctx.globalCompositeOperation = 'destination-out';
    ctx.fillRect(0, 0, els.scratch.clientWidth, els.scratch.clientHeight);
    ctx.globalCompositeOperation = 'source-over';
    els.scratchHint.classList.add('hidden');
    els.cardStage.classList.add('revealed');
    state.score += 1;
    els.scoreOut.textContent = state.score;
    playReveal();
    setTimeout(() => speak(state.word.w), 350);
    showCheer();
    // Confetti at the card center (no balloons per-word; bonus round is separate)
    const cardR = els.cardStage.getBoundingClientRect();
    const areaR = els.gameArea.getBoundingClientRect();
    spawnConfetti(
      cardR.left + cardR.width/2 - areaR.left,
      cardR.top + cardR.height/2 - areaR.top,
      null
    );
    // Special: cobra venom-spit — fire immediately, anchored to the actual emoji position
    if (state.word && /SNAKE|COBRA/i.test(state.word.w)) {
      console.log('[word-scratch] cobra reveal — spawning venom');
      const emojiR = els.wordEmoji.getBoundingClientRect();
      // Spawn from the upper portion of the emoji (snake's "mouth") so the arc starts
      // above the head and visibly fountains upward across the card.
      const ex = emojiR.left + emojiR.width / 2 - areaR.left;
      const ey = emojiR.top + emojiR.height * 0.15 - areaR.top;
      spawnVenom(ex, ey);
    }
  }
  function showCheer() {
    const cheers = ['YAY!', 'GREAT!', 'WOW!', 'NICE!', 'WOO!', 'GOOD JOB!'];
    els.cheer.textContent = cheers[Math.floor(Math.random() * cheers.length)];
    els.cheer.classList.remove('show');
    void els.cheer.offsetWidth;
    els.cheer.classList.add('show');
  }

  // ---- Balloons ----
  const BALLOON_COLORS = [
    { fill: '#ff5a64', light: '#ff8c8c', hue: 0 },
    { fill: '#ffaf6f', light: '#ffd0a8', hue: 30 },
    { fill: '#ffe066', light: '#fff099', hue: 60 },
    { fill: '#95e3a8', light: '#c4f0d0', hue: 130 },
    { fill: '#5dc4ff', light: '#a8e1ff', hue: 200 },
    { fill: '#b59cf0', light: '#d5c4f8', hue: 260 },
    { fill: '#ff8fb8', light: '#ffbfd5', hue: 330 },
  ];
  function makeBalloonSvg(col) {
    return `<svg viewBox="0 0 80 110" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="g" cx="32%" cy="28%" r="65%">
          <stop offset="0%" stop-color="${col.light}"/>
          <stop offset="100%" stop-color="${col.fill}"/>
        </radialGradient>
      </defs>
      <ellipse cx="40" cy="42" rx="32" ry="38" fill="url(#g)" stroke="#2a2434" stroke-width="2.4"/>
      <ellipse cx="28" cy="28" rx="9" ry="6" fill="rgba(255,255,255,0.6)"/>
      <path d="M 36 80 L 44 80 L 42 86 L 38 86 Z" fill="${col.fill}" stroke="#2a2434" stroke-width="2"/>
      <path d="M 40 86 Q 38 96 42 105" stroke="#2a2434" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    </svg>`;
  }
  function spawnBalloons(n) {
    const area = els.gameArea.getBoundingClientRect();
    for (let i = 0; i < n; i++) {
      const col = BALLOON_COLORS[Math.floor(Math.random() * BALLOON_COLORS.length)];
      const el = document.createElement('div');
      el.className = 'balloon';
      const sz = 60 + Math.random() * 30;
      el.style.width = sz + 'px';
      el.style.height = (sz * 1.3) + 'px';
      el.innerHTML = makeBalloonSvg(col);
      const startX = (area.width - sz) * Math.random();
      el.style.left = startX + 'px';
      el.style.top = area.height + 'px';
      el.style.position = 'absolute';
      el.dataset.popped = '0';
      const b = {
        el, x: startX, y: area.height,
        vy: -120 - Math.random() * 90,    // px/s upward
        sway: Math.random() * Math.PI * 2,
        swayAmp: 22 + Math.random() * 24,
        swaySpeed: 0.7 + Math.random() * 0.7,
        hue: col.hue,
        col,
        born: performance.now(),
        rot: (Math.random() - 0.5) * 0.2,
      };
      el.addEventListener('pointerdown', (e) => {
        e.preventDefault();
        popBalloon(b);
      });
      state.balloons.push(b);
      els.gameArea.appendChild(el);
    }
  }
  function popBalloon(b) {
    if (b.el.dataset.popped === '1') return;
    b.el.dataset.popped = '1';
    b.el.classList.add('popped');
    state.score += 1;
    els.scoreOut.textContent = state.score;
    // Confetti at balloon position
    const rect = b.el.getBoundingClientRect();
    const areaRect = els.gameArea.getBoundingClientRect();
    spawnConfetti(rect.left - areaRect.left + rect.width/2, rect.top - areaRect.top + rect.height/2, b.col);
    playPop(b.hue);
    setTimeout(() => {
      if (b.el.parentNode) b.el.parentNode.removeChild(b.el);
      const idx = state.balloons.indexOf(b);
      if (idx >= 0) state.balloons.splice(idx, 1);
      if (state.balloons.length === 0 && state.revealed) {
        // All popped — small cheer
        playCheer();
        showCheer();
      }
    }, 360);
  }
  function spawnConfetti(x, y, col) {
    const n = 14;
    const palette = ['#ff5a64', '#ffaf6f', '#ffe066', '#95e3a8', '#5dc4ff', '#b59cf0', '#ff8fb8', '#fff'];
    for (let i = 0; i < n; i++) {
      const el = document.createElement('div');
      el.className = 'confetti';
      const sz = 5 + Math.random() * 5;
      const color = palette[Math.floor(Math.random() * palette.length)];
      el.style.width = sz + 'px';
      el.style.height = (sz * 0.6) + 'px';
      el.style.background = color;
      el.style.left = (x - sz/2) + 'px';
      el.style.top = (y - sz/2) + 'px';
      el.style.transform = `rotate(${Math.random()*360}deg)`;
      const ang = Math.random() * Math.PI * 2;
      const sp = 120 + Math.random() * 240;
      const p = {
        el, x, y,
        vx: Math.cos(ang) * sp,
        vy: Math.sin(ang) * sp - 50,
        rot: Math.random() * Math.PI,
        vr: (Math.random() - 0.5) * 12,
        life: 0.9 + Math.random() * 0.4,
        maxLife: 1.3,
      };
      state.confetti.push(p);
      els.gameArea.appendChild(el);
    }
  }

  // ---- Animation loop ----
  let lastNow = performance.now();
  function loop(now) {
    const dt = Math.min(0.06, (now - lastNow) / 1000);
    lastNow = now;
    // Update balloons
    for (let i = state.balloons.length - 1; i >= 0; i--) {
      const b = state.balloons[i];
      b.y += b.vy * dt;
      b.sway += b.swaySpeed * dt;
      const xx = b.x + Math.sin(b.sway) * b.swayAmp;
      b.el.style.transform = `translate(${xx - b.x}px, ${b.y - parseFloat(b.el.style.top)}px) rotate(${Math.sin(b.sway * 0.8) * 6}deg)`;
      if (b.y < -150) {
        if (b.el.parentNode) b.el.parentNode.removeChild(b.el);
        state.balloons.splice(i, 1);
      }
    }
    // Update confetti
    for (let i = state.confetti.length - 1; i >= 0; i--) {
      const p = state.confetti[i];
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += 380 * dt;
      p.vx *= 0.97;
      p.rot += p.vr * dt;
      p.life -= dt;
      p.el.style.transform = `translate(${p.x - parseFloat(p.el.style.left) - 2.5}px, ${p.y - parseFloat(p.el.style.top) - 1.5}px) rotate(${p.rot}rad)`;
      p.el.style.opacity = Math.max(0, p.life / p.maxLife);
      if (p.life <= 0) {
        if (p.el.parentNode) p.el.parentNode.removeChild(p.el);
        state.confetti.splice(i, 1);
      }
    }
    // Update venom droplets — arc + trail + green splash on impact
    for (let i = state.venom.length - 1; i >= 0; i--) {
      const v = state.venom[i];
      v.x += v.vx * dt;
      v.y += v.vy * dt;
      v.vy += 620 * dt;       // softer gravity so droplets hang and arc visibly higher
      v.vx *= 0.99;
      v.rot += v.vr * dt;
      v.life -= dt;
      v.trailT += dt;
      // Spawn small trailing droplet every ~60ms
      if (v.trailT > 0.06) {
        v.trailT = 0;
        const t = document.createElement('div');
        t.className = 'venom-trail';
        t.style.left = (v.x - 3) + 'px';
        t.style.top = (v.y - 3) + 'px';
        els.gameArea.appendChild(t);
        setTimeout(() => t.parentNode && t.parentNode.removeChild(t), 400);
        setTimeout(() => { t.style.transition = 'opacity 0.4s'; t.style.opacity = '0'; }, 10);
      }
      v.el.style.transform = `translate(${v.x - parseFloat(v.el.style.left) - v.halfW}px, ${v.y - parseFloat(v.el.style.top) - v.halfH}px) rotate(${v.rot}rad)`;
      v.el.style.opacity = Math.max(0, Math.min(1, v.life / v.maxLife * 1.4));
      if (v.life <= 0 || v.y > els.gameArea.clientHeight + 50) {
        if (v.el.parentNode) v.el.parentNode.removeChild(v.el);
        state.venom.splice(i, 1);
      }
    }
    requestAnimationFrame(loop);
  }

  // ---- Venom spit (cobra special) ----
  function spawnVenom(x, y) {
    if (state.sound) {
      withSound(t => {
        // Hiss + spit
        const len = Math.floor(0.5 * audioCtx.sampleRate);
        const buf = audioCtx.createBuffer(1, len, audioCtx.sampleRate);
        const d = buf.getChannelData(0);
        for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, 1.1);
        const src = audioCtx.createBufferSource(); src.buffer = buf;
        const f = audioCtx.createBiquadFilter();
        f.type = 'bandpass'; f.frequency.setValueAtTime(3000, t);
        f.frequency.exponentialRampToValueAtTime(800, t + 0.5); f.Q.value = 2;
        const g = audioCtx.createGain(); g.gain.value = 0.16;
        src.connect(f); f.connect(g); g.connect(master);
        src.start(t);
        // "ptoo" spit transient
        const o = audioCtx.createOscillator();
        o.type = 'square'; o.frequency.setValueAtTime(220, t);
        o.frequency.exponentialRampToValueAtTime(70, t + 0.12);
        const og = audioCtx.createGain();
        og.gain.setValueAtTime(0.13, t);
        og.gain.exponentialRampToValueAtTime(0.001, t + 0.13);
        o.connect(og); og.connect(master);
        o.start(t); o.stop(t + 0.14);
      });
    }
    const n = 16;
    // .venom CSS is 1.85rem × 2.7rem (~29.6 × 43.2 at 16px). Half-offsets for centering:
    const HALF_W = 15, HALF_H = 22;
    for (let i = 0; i < n; i++) {
      const el = document.createElement('div');
      el.className = 'venom';
      el.style.left = (x - HALF_W) + 'px';
      el.style.top = (y - HALF_H) + 'px';
      el.style.transform = 'translate(0, 0)';
      el.style.opacity = '1';
      // Narrower upward cone (±0.55 rad ≈ ±31°) so the arc fountains HIGHER instead of fanning sideways
      const angle = -Math.PI / 2 + (Math.random() - 0.5) * 1.1;
      const sp = 480 + Math.random() * 340;
      const v = {
        el,
        x, y,
        halfW: HALF_W, halfH: HALF_H,
        vx: Math.cos(angle) * sp + (Math.random() - 0.5) * 120,
        vy: Math.sin(angle) * sp - Math.random() * 80,
        rot: angle,
        vr: (Math.random() - 0.5) * 14,
        life: 1.4,
        maxLife: 1.4,
        trailT: 0,
      };
      state.venom.push(v);
      els.gameArea.appendChild(el);
    }
  }

  // ---- Bonus round ----
  function startBonusRound() {
    state.bonusActive = true;
    els.cardStage.classList.add('bonus');
    els.cardStage.classList.remove('revealed');
    els.wordEmoji.textContent = '🎈';
    els.wordEmoji.classList.add('bonus-emoji');
    els.wordText.textContent = 'BONUS!';
    els.wordText.classList.remove('word');
    els.wordText.classList.add('bonus-title');
    // Add subtitle
    let sub = els.cardStage.querySelector('.bonus-sub');
    if (!sub) {
      sub = document.createElement('div');
      sub.className = 'bonus-sub';
      els.cardStage.querySelector('.card-word').appendChild(sub);
    }
    sub.textContent = 'pop the balloons!';
    els.progressOut.textContent = '🎈 bonus round';
    els.nextBtn.textContent = '▶ Next family';
    els.sayBtn.disabled = true;
    els.sayBtn.style.opacity = '0.4';
    // Spawn many balloons in waves
    spawnBalloons(8);
    setTimeout(() => state.bonusActive && spawnBalloons(7), 1000);
    setTimeout(() => state.bonusActive && spawnBalloons(5), 2200);
    playCheer();
  }

  function endBonusRound() {
    state.bonusActive = false;
    els.cardStage.classList.remove('bonus');
    els.wordEmoji.classList.remove('bonus-emoji');
    els.wordText.classList.remove('bonus-title');
    els.wordText.classList.add('word');
    const sub = els.cardStage.querySelector('.bonus-sub');
    if (sub) sub.remove();
    els.nextBtn.textContent = '▶ Next word';
    els.sayBtn.disabled = false;
    els.sayBtn.style.opacity = '';
    // Advance to next family
    state.familyIdx = (state.familyIdx + 1) % FAMILIES.length;
    state.wordIdx = 0;
    loadCurrentWord();
  }

  // ---- Game flow ----
  function loadCurrentWord() {
    // Clear balloons + confetti + venom (visual cleanup)
    state.balloons.forEach(b => b.el.parentNode && b.el.parentNode.removeChild(b.el));
    state.balloons.length = 0;
    state.confetti.forEach(p => p.el.parentNode && p.el.parentNode.removeChild(p.el));
    state.confetti.length = 0;
    state.venom.forEach(v => v.el.parentNode && v.el.parentNode.removeChild(v.el));
    state.venom.length = 0;
    state.revealed = false;
    state.scratched = 0;
    state.word = currentWord();
    const fam = currentFamily();
    els.wordText.textContent = state.word.w;
    els.wordEmoji.textContent = state.word.e;
    els.themeOut.textContent = fam.theme;
    els.progressOut.textContent = `word ${state.wordIdx + 1} of ${fam.words.length}`;
    els.cardStage.classList.remove('revealed');
    els.scratchHint.classList.remove('hidden');
    els.scratchHint.textContent = 'scratch with your finger!';
    sizeCanvas();
  }

  function nextWord() {
    if (state.bonusActive) {
      endBonusRound();
      return;
    }
    // If user hasn't revealed yet, skip ahead anyway
    const fam = currentFamily();
    if (state.wordIdx + 1 < fam.words.length) {
      state.wordIdx += 1;
      loadCurrentWord();
    } else {
      // Family done → bonus round
      startBonusRound();
    }
  }

  // ---- Events ----
  els.scratch.addEventListener('pointerdown', onPointerDown);
  els.scratch.addEventListener('pointermove', onPointerMove);
  els.scratch.addEventListener('pointerup', onPointerUp);
  els.scratch.addEventListener('pointercancel', onPointerUp);
  els.sayBtn.addEventListener('click', () => {
    ensureAudio();
    if (state.word) speak(state.word.w);
  });
  els.nextBtn.addEventListener('click', () => {
    ensureAudio();
    nextWord();
  });
  els.soundBtn.addEventListener('click', () => {
    state.sound = !state.sound;
    els.soundBtn.textContent = state.sound ? '🔊' : '🔇';
    if (state.sound) ensureAudio();
  });
  els.introStart.addEventListener('click', () => {
    ensureAudio();
    if ('speechSynthesis' in window) speechSynthesis.getVoices();
    els.introOverlay.setAttribute('aria-hidden', 'true');
    state.familyIdx = 0;
    state.wordIdx = 0;
    loadCurrentWord();
  });

  window.addEventListener('resize', () => {
    if (!state.revealed) sizeCanvas();
  });

  // Initial paint (so the card has the cover behind the intro overlay)
  state.word = currentWord();
  els.wordText.textContent = state.word.w;
  els.wordEmoji.textContent = state.word.e;
  els.themeOut.textContent = currentFamily().theme;
  els.progressOut.textContent = `word 1 of ${currentFamily().words.length}`;
  setTimeout(sizeCanvas, 50);
  requestAnimationFrame(loop);
})();
</script>
</body>
</html>
