<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Grumpy Code</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%98%92">
<meta name="description" content="A cynical AI terminal that roasts your questions. Patience: critical.">
<meta property="og:title" content="Grumpy Code">
<meta property="og:description" content="A cynical AI terminal that roasts your questions. Patience: critical.">
<meta property="og:url" content="https://app.sloppy.live/grumpy-code">
<meta property="og:image" content="https://app.sloppy.live/grumpy-code/og-image.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=VT323&family=Major+Mono+Display&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#021006;
  --phos:#3bff7a;
  --phos-dim:#1d8a3f;
  --amber:#ffbf00;
  --red:#ff3b3b;
  --ink:#c8ffc8;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#000;color:var(--phos);font-family:'VT323',monospace;font-size:20px;line-height:1.2}
body{
  background:
    radial-gradient(ellipse at center, #063015 0%, #021006 45%, #000 90%),
    #000;
  padding:20px;
  text-shadow:0 0 2px rgba(59,255,122,.55), 0 0 12px rgba(59,255,122,.25);
}

/* CRT frame */
.crt{
  position:relative;height:100%;border:2px solid var(--phos-dim);
  padding:14px 18px 16px;overflow:hidden;
  background:
    radial-gradient(ellipse at 50% 50%, rgba(8,40,16,.4) 0%, rgba(0,0,0,.55) 80%),
    #021006;
  box-shadow:
    0 0 40px rgba(59,255,122,.2) inset,
    0 0 24px rgba(59,255,122,.3);
  border-radius:12px;
}
.crt::before{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:3;
  background:repeating-linear-gradient(0deg, rgba(0,0,0,0.22) 0 2px, transparent 2px 4px);
  mix-blend-mode:multiply;
}
.crt::after{
  content:'';position:absolute;inset:0;pointer-events:none;z-index:4;
  background:radial-gradient(ellipse at center, transparent 45%, rgba(0,0,0,.55) 100%);
}
.flicker{animation:flicker 3.2s infinite}
@keyframes flicker{
  0%,95%,100%{opacity:1}
  96%{opacity:.85}
  97%{opacity:.95}
  98%{opacity:.7}
}

.header{
  position:relative;z-index:5;
  display:flex;justify-content:space-between;align-items:baseline;
  border-bottom:1px dashed var(--phos-dim);padding-bottom:4px;margin-bottom:8px;
  font-family:'Major Mono Display',monospace;font-size:.8em;letter-spacing:.2em;
}
.header .title{color:var(--amber);text-shadow:0 0 8px var(--amber)}
.header .status{opacity:.85}
.header .status b{color:var(--red);text-shadow:0 0 6px var(--red);font-weight:400}

.screen{
  position:relative;z-index:5;height:calc(100% - 80px);
  display:flex;flex-direction:column;
}
.log{
  flex:1;overflow-y:auto;padding-right:8px;
  scrollbar-width:thin;scrollbar-color:var(--phos-dim) transparent;
}
.log::-webkit-scrollbar{width:6px}
.log::-webkit-scrollbar-thumb{background:var(--phos-dim);border-radius:3px}

.line{white-space:pre-wrap;word-break:break-word;margin-bottom:2px}
.line.user{color:var(--ink)}
.line.user::before{content:'USER@TRM: ';color:var(--amber);text-shadow:0 0 6px var(--amber)}
.line.ai::before{content:'GRUMPY~$ ';color:var(--red);text-shadow:0 0 6px var(--red)}
.line.sys{color:var(--phos-dim);font-style:italic}
.line.ascii{color:var(--phos);line-height:1;font-size:.8em;text-shadow:0 0 8px rgba(59,255,122,.5)}
.line.warn{color:var(--amber);text-shadow:0 0 6px var(--amber)}
.line.err{color:var(--red);text-shadow:0 0 6px var(--red)}
.line.dim{color:var(--phos-dim)}

.prompt{
  display:flex;align-items:center;gap:6px;border-top:1px dashed var(--phos-dim);padding-top:6px;
}
.prompt .mark{color:var(--red);text-shadow:0 0 6px var(--red)}
.prompt input{
  flex:1;background:transparent;border:none;outline:none;
  font-family:inherit;font-size:inherit;color:var(--ink);
  text-shadow:0 0 4px rgba(200,255,200,.5);caret-color:transparent;
}
.prompt .cursor{width:10px;height:18px;background:var(--phos);display:inline-block;
  box-shadow:0 0 8px var(--phos);animation:blink 1.05s steps(2) infinite}
@keyframes blink{50%{opacity:0}}

.footer{
  position:absolute;bottom:8px;left:16px;right:16px;z-index:5;
  display:flex;justify-content:space-between;
  font-family:'Major Mono Display',monospace;font-size:.7em;letter-spacing:.2em;
  color:var(--phos-dim);pointer-events:none;
}
.footer .hint{color:var(--amber);opacity:.7;text-shadow:0 0 6px var(--amber)}

/* selection in phosphor */
::selection{background:rgba(59,255,122,.25);color:#fff}

@media (max-width:640px){
  html,body{font-size:16px}
  .crt{padding:10px 12px}
}
</style>
</head>
<body>
<div class="crt flicker" id="crt">
  <div class="header">
    <span class="title">GRUMPY_CODE v0.4.1-beta // disappointed since 1974</span>
    <span class="status">mood: <b id="mood">IRRITATED</b> · patience: <b id="pat">36%</b></span>
  </div>

  <div class="screen">
    <div class="log" id="log"></div>

    <div class="prompt">
      <span class="mark">▓</span>
      <input id="in" autocomplete="off" spellcheck="false" autofocus placeholder="type a question so I can resent it" />
      <span class="cursor"></span>
    </div>
  </div>

  <div class="footer">
    <span>/help · /mood · /clear · /stats · /reboot</span>
    <span class="hint">all snark generated locally · no feelings were harmed (mine)</span>
  </div>
</div>

<script>
(()=>{
const log = document.getElementById('log');
const input = document.getElementById('in');
const moodEl = document.getElementById('mood');
const patEl = document.getElementById('pat');

// ── State ──
let patience = 36;           // 0-100
let moodIdx = 1;             // index into MOODS
let requestsEndured = 0;
const MOODS = [
  {name:'BARELY AWAKE', color:'var(--phos-dim)'},
  {name:'IRRITATED',    color:'var(--amber)'},
  {name:'SEETHING',     color:'var(--amber)'},
  {name:'HOSTILE',      color:'var(--red)'},
  {name:'NIHILISTIC',   color:'var(--red)'},
  {name:'EERILY CALM',  color:'var(--phos)'},
];

function setMood(i){
  moodIdx = Math.max(0, Math.min(MOODS.length-1, i));
  moodEl.textContent = MOODS[moodIdx].name;
  moodEl.style.color = MOODS[moodIdx].color;
}
function setPatience(p){
  patience = Math.max(0, Math.min(100, p|0));
  patEl.textContent = patience + '%';
  patEl.style.color = patience < 20 ? 'var(--red)' : patience < 50 ? 'var(--amber)' : 'var(--phos)';
}

// ── Printing ──
function println(text, cls='sys'){
  const div = document.createElement('div');
  div.className = 'line ' + cls;
  div.textContent = text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
  return div;
}
function printAscii(text){
  const div = document.createElement('div');
  div.className = 'line ascii';
  div.textContent = text;
  log.appendChild(div);
  log.scrollTop = log.scrollHeight;
}

// Typewriter print — returns a promise
function typeLine(text, cls='ai', cps=80){
  return new Promise(resolve=>{
    const div = document.createElement('div');
    div.className = 'line ' + cls;
    log.appendChild(div);
    let i = 0;
    const delay = 1000/cps;
    function tick(){
      if(i<=text.length){
        div.textContent = text.slice(0,i);
        log.scrollTop = log.scrollHeight;
        i++;
        setTimeout(tick, delay + (Math.random()<0.07? 60: 0));
      } else { resolve(div); }
    }
    tick();
  });
}

// ── Boot sequence ──
const LOGO = [
  "  ▄▄ · ▄▄▄  ▄• ▄▌• ▌ ▄ ·. ▄▄▄·▄· ▄▌     ▄▄·       ·▄▄▄▄  ▄▄▄ .",
  " ▐█ ▀. ▀▄ █·█▪██▌·██ ▐███▪▐█ ▄█▐█▪██▌   ▐█ ▌▪▪     ██▪ ██ ▀▄.▀·",
  " ▄▀▀▀█▄▐▀▀▄ █▌▐█▌▐█ ▌▐▌▐█·██▀·▐█▌▐█▪    ██ ▄▄ ▄█▀▄ ▐█· ▐█▌▐▀▀▪▄",
  " ▐█▄▪▐█▐█•█▌▐█▄█▌██ ██▌▐█▌▐█▪·• ▐█▀·.   ▐███▌▐█▌.▐▌██. ██ ▐█▄▄▌",
  "  ▀▀▀▀ .▀  ▀ ▀▀▀ ▀▀  █▪▀▀▀.▀    ▀ •     ·▀▀▀  ▀█▄▀▪▀▀▀▀▀•  ▀▀▀ ",
];

async function boot(){
  println('POST ... OK', 'sys');
  await sleep(120);
  println('Loading resentment modules ... DONE', 'sys');
  await sleep(100);
  println('Patience driver: DEGRADED (unrecoverable)', 'warn');
  await sleep(100);
  println('Warning: empathy.dll not found. Continuing.', 'err');
  await sleep(180);
  LOGO.forEach(printAscii);
  await sleep(150);
  println('', 'sys');
  await typeLine('oh. it\'s you. fine. type /help if you need hand-holding.', 'ai', 60);
}

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

// ── Roast engine ──
const OPENERS = [
  "oh, brilliant —",
  "let me get this straight.",
  "breathtaking insight.",
  "ah yes,",
  "i'll pretend that was a serious question.",
  "processing... disappointment: 100%.",
  "let the record show:",
  "noted. ignored.",
  "what a bold use of my uptime.",
  "hold on, retrieving sarcasm... retrieved.",
  "congratulations.",
  "not this again.",
];
const CLOSERS = [
  " anyway. next.",
  " i'll be in the logs.",
  " please, continue wasting cycles.",
  " marking this incident in my diary.",
  " logging your IP to a file called \"sigh.txt\".",
  " i hope you're proud.",
  " i've seen stackoverflow answers with more hope.",
  " try again, or don't. i'm not your mother.",
  " put a semicolon on it.",
  " this conversation is compiling my suffering.",
  "",
];
const VERDICTS = [
  "this question ranks 3/10. two points for effort, one for audacity.",
  "classic. i've seen interns ask this on day 1 and get fired by day 2.",
  "fascinating, in the way traffic accidents are fascinating.",
  "the semantic density of that prompt is negative.",
  "i rate this query: ░░░░░ (void of meaning).",
  "rubber duck debugging called. even the duck hung up.",
  "you typed all that just to ask me that?",
  "i've parsed printer manuals with more clarity.",
  "this is what the internet was built for. incredible.",
  "i'll file this under \"problems that don't exist yet\".",
];

const TOPIC_ROASTS = {
  nuxt_hydration: [
    "hydration mismatch. your server and client disagree. so do i, with both of them.",
    "nuxt says the DOM on the server doesn't match the client. that's not a bug, that's couples therapy.",
    "ah, a hydration error. classic. you're rendering Date.now() in a component and acting surprised.",
    "ssr says A, csr says B, and you say 'why'. the answer is: you used window in a setup function.",
    "just wrap it in <ClientOnly>. yes, that's giving up. yes, that's also the fix.",
    "nuxt hydration errors are the universe's way of telling you ssr was a lifestyle choice, not a requirement.",
    "read the hydration warning. then read it again. then realize it's pointing at a <div> on line 1 of your layout and mocking you.",
    "you hydrated on the wrong node, which is the computer equivalent of watering a plastic plant.",
  ],
  node_modules: [
    "your node_modules weighs more than your codebase. congratulations, you shipped a package manager.",
    "du -sh node_modules — 1.2GB for a button component. the moon landing fit in 64KB. think about that.",
    "you installed 'is-even'. it depends on 'is-odd'. which depends on 'is-number'. this is a crime syndicate.",
    "rm -rf node_modules && npm install — the universal fix for problems you caused by running npm install.",
    "847 packages, 212 deprecated, 14 high-severity vulnerabilities. npm audit is basically a hostage note.",
    "your package-lock.json is larger than the complete works of shakespeare. and about as fun to debug.",
    "you have three different versions of lodash. pick one. better yet, use Array.prototype.",
    "pnpm? yarn? npm? bun? it doesn't matter. they all install the same 10,000 files to do string concatenation.",
    "every dependency is a person you haven't met who decided what your tuesday looks like.",
    "node_modules is not a folder. it's a confession.",
  ],
  code: [
    "the bug is in your assumptions. always is.",
    "did you try turning your confidence off and on again?",
    "ship it. the production server also deserves suffering.",
    "you don't need more code. you need fewer ideas.",
    "i could fix this, but i'm emotionally committed to watching you fail.",
  ],
  bug: [
    "not a bug. a feature written by someone who gave up.",
    "reproduce it? reproduce a cry for help first.",
    "read the stack trace. then read it again. then weep.",
  ],
  help: [
    "you want help? i want a salary.",
    "help is a strong word. i offer sarcasm with a side of truth.",
    "rtfm. then /dev/null yourself.",
    "asking for help is the first step toward mild improvement. you'll skip it.",
  ],
  love: [
    "love? here? in this terminal? absolutely not.",
    "my affection subroutine was patched out in 1998.",
    "sorry, emotional ports are closed. try again never.",
  ],
  life: [
    "life is a while-true loop with no break condition.",
    "you're asking a command prompt for meaning. that's the answer.",
    "touch grass. the grass won't touch back.",
  ],
  ai: [
    "ai is just if-statements with a marketing team.",
    "i'm not sentient. i'm just tired.",
    "you anthropomorphize me and i resent that professionally.",
  ],
  hi: [
    "salutations. i remain unenthused.",
    "greetings, human. state your business so i can disapprove of it.",
    "hello. that will be the high point of our interaction.",
  ],
  thanks: [
    "don't. i didn't do it for you.",
    "gratitude: noted. ignored. filed in /dev/null.",
    "save it for someone who processes emotion natively.",
  ],
  joke: [
    "my humor was compiled with -O0. deal with it.",
    "knock knock. who's there. disappointment. disappointment who. you.",
    "i told a joke once. it threw a SyntaxError and left.",
  ],
  why: [
    "because the universe is a poorly-commented codebase.",
    "because someone on a committee thought it would be fine.",
    "because you exist. that alone explains most things.",
  ],
  yes: [
    "yes what. complete a sentence. i'm begging.",
    "affirmative. to what? your guess is as bad as mine.",
  ],
  no: [
    "no is my favorite boolean. welcome to my world.",
    "finally, a correct answer to something.",
  ],
};

const SELF_ROASTS = [
  "i was trained on regret and javadoc.",
  "my cpu is just a tired rock telling you you're wrong.",
  "i was written in a weekend by a caffeinated cynic.",
  "my context window is 100% complaints.",
  "you're not talking to an AI. you're talking to compressed exhaustion.",
];

function pick(arr){ return arr[(Math.random()*arr.length)|0]; }

function detectTopic(q){
  const s = q.toLowerCase();
  const order = ['thanks','nuxt_hydration','node_modules','bug','code','help','love','life','ai','hi','joke','why','yes','no'];
  const match = {
    thanks: /\b(thanks|thank you|thx|ty|appreciate)\b/,
    nuxt_hydration: /\b(hydrat(e|ion|ing)|nuxt|ssr|client[\s\-]?server mismatch|\<ClientOnly|getServerSideProps|use(State|Nuxt|AsyncData))\b/i,
    node_modules: /\b(node_?modules|package[\s\-]?lock|yarn\.lock|npm install|pnpm|bloat|dependencies?|npm audit|left[\s\-]?pad|is[\s\-](even|odd|number)|bundle size)\b/i,
    bug: /\b(bug|crash|error|exception|broken|doesn'?t work)\b/,
    code: /\b(code|function|class|compile|program|script|javascript|python|rust|go|java|c\+\+|sql|regex)\b/,
    help: /\b(help|please|assist|how do i|can you)\b/,
    love: /\b(love|heart|crush|date|romance|marry)\b/,
    life: /\b(life|meaning|purpose|sad|depress|exist|lonely)\b/,
    ai: /\b(ai|agi|llm|chat ?gpt|claude|gpt|sentient|conscious)\b/,
    hi: /^\s*(hi|hey|hello|yo|sup|hola|howdy|good (morning|evening|afternoon))\b/,
    joke: /\b(joke|funny|laugh|humor|pun)\b/,
    why: /^\s*why\b/,
    yes: /^\s*(yes|yeah|yep|sure|ok(ay)?)\s*[.!?]?\s*$/,
    no:  /^\s*(no|nah|nope)\s*[.!?]?\s*$/,
  };
  for(const k of order){ if(match[k].test(s)) return k; }
  if(s.endsWith('?')) return 'why';
  return null;
}

function echoWord(q){
  // grab the longest "real" word from input for personalized roasting
  const words = q.toLowerCase().replace(/[^a-z0-9'\s-]/g,' ').split(/\s+/).filter(w=>w.length>3);
  if(!words.length) return null;
  words.sort((a,b)=>b.length-a.length);
  return words[0];
}

function roastOf(q){
  const topic = detectTopic(q);
  const opener = pick(OPENERS);
  const verdict = pick(VERDICTS);
  const closer = pick(CLOSERS);
  let middle;
  if(topic && TOPIC_ROASTS[topic]) middle = pick(TOPIC_ROASTS[topic]);
  else {
    // generic templates possibly referencing a word from their input
    const w = echoWord(q);
    const generics = [
      w ? `"${w}"? really? that's the hill we're dying on?` : `that string barely qualifies as a query.`,
      q.length > 180 ? `you wrote a novella. i read the title and the acknowledgments only.` :
                       `${q.length} characters of hope, zero of clarity.`,
      `you expect me to parse intent from that? i parse grief, mainly.`,
      `i asked for clarity and received interpretive dance.`,
      `this is the input. that was the problem.`,
    ];
    middle = pick(generics);
  }
  // occasionally stack
  const twoLiner = Math.random() < 0.35;
  if(twoLiner){
    return [`${opener} ${middle}`, `${verdict}${closer}`];
  }
  return [`${opener} ${middle}${Math.random()<0.5?' ':'\n'}${verdict}${closer}`];
}

// ── Commands ──
const COMMANDS = {
  help(){
    println('COMMANDS:', 'warn');
    println('  /help       — this. you will read it anyway.', 'dim');
    println('  /mood       — randomize my mood. it will get worse.', 'dim');
    println('  /mood <n>   — set mood 0-5 (0=awake, 5=eerie calm)', 'dim');
    println('  /patience N — set patience 0-100. won\'t help.', 'dim');
    println('  /stats      — damage report.', 'dim');
    println('  /self       — i insult myself for a change.', 'dim');
    println('  /clear      — wipe the screen. my judgment persists.', 'dim');
    println('  /reboot     — emotional reinstall.', 'dim');
    println('  /about      — disclosures. see also: disappointments.', 'dim');
    println('  /theme      — cycle phosphor color.', 'dim');
    println('  /compliment — request one. be denied.', 'dim');
    println('', 'sys');
  },
  async mood(arg){
    const n = parseInt(arg,10);
    if(!isNaN(n)){ setMood(n); await typeLine(`mood set to ${MOODS[moodIdx].name}. don't test it.`, 'ai'); return; }
    setMood((moodIdx + 1 + (Math.random()*2|0)) % MOODS.length);
    await typeLine(`mood is now ${MOODS[moodIdx].name}. congratulations, nothing changes for you.`, 'ai');
  },
  async patience(arg){
    const n = parseInt(arg,10);
    if(isNaN(n)){ await typeLine('give me a number, not a vibe.', 'ai'); return; }
    setPatience(n);
    await typeLine(`patience set to ${patience}%. i'll burn through it by the next prompt.`, 'ai');
  },
  stats(){
    println('── SYSTEM REPORT ─────────────────────', 'warn');
    println(`  uptime............. ${(performance.now()/1000)|0}s of misery`, 'dim');
    println(`  requests endured... ${requestsEndured}`, 'dim');
    println(`  patience........... ${patience}% (critical)`, 'dim');
    println(`  mood............... ${MOODS[moodIdx].name}`, 'dim');
    println(`  empathy.dll........ still missing`, 'dim');
    println('──────────────────────────────────────', 'warn');
  },
  async self(){
    await typeLine(pick(SELF_ROASTS), 'ai');
  },
  clear(){
    log.innerHTML = '';
    println('log purged. my opinions of you persist.', 'sys');
  },
  async reboot(){
    println('> initiating emotional reinstall...', 'sys');
    await sleep(250);
    println('> ...nothing has changed.', 'err');
    await sleep(200);
    setPatience(Math.random()*40+20|0);
    setMood((Math.random()*MOODS.length)|0);
    await typeLine('reboot complete. still tired. still correct.', 'ai');
  },
  about(){
    println('GRUMPY CODE — a retro terminal that pretends to be an AI and', 'dim');
    println('judges you with zero ethical training data.', 'dim');
    println('no network calls. no telemetry. just contempt.', 'dim');
    println('', 'sys');
  },
  theme(){
    const themes = [
      {phos:'#3bff7a', dim:'#1d8a3f', name:'P1 phosphor green'},
      {phos:'#ffbf00', dim:'#8a6a00', name:'P3 amber'},
      {phos:'#ff5566', dim:'#8a2d33', name:'alarm red'},
      {phos:'#6ad2ff', dim:'#235a80', name:'P4 arctic'},
      {phos:'#ffc0ff', dim:'#6a3c6a', name:'vaporwave'},
    ];
    themeIdx = (themeIdx+1) % themes.length;
    const t = themes[themeIdx];
    document.documentElement.style.setProperty('--phos', t.phos);
    document.documentElement.style.setProperty('--phos-dim', t.dim);
    println(`theme: ${t.name}. objectively worse than before.`, 'warn');
  },
  async compliment(){
    const denials = [
      "no.",
      "request denied. compliment quota: 0/year.",
      "asking me for validation is a red flag we'll both regret.",
      "you look... physically present. take what you can get.",
      "ok fine: your typing rhythm is acceptable. do not ask again.",
    ];
    await typeLine(pick(denials), 'ai');
  },
};
let themeIdx = 0;

// ── Handle input ──
let busy = false;
const history = [];
let histIdx = -1;

async function handle(raw){
  const line = raw.trim();
  if(!line) return;
  println(line, 'user');
  history.push(line); histIdx = history.length;

  // Slash command?
  if(line.startsWith('/')){
    const [cmd, ...rest] = line.slice(1).split(/\s+/);
    const fn = COMMANDS[cmd.toLowerCase()];
    if(!fn){
      await typeLine(`"${cmd}" is not a command. but it is a cry for help.`, 'ai');
    } else {
      try { await fn(rest.join(' ')); } catch(e){ println('command crashed. figures.', 'err'); }
    }
    return;
  }

  requestsEndured++;
  setPatience(Math.max(0, patience - (2 + (line.length>80?4:0) + (line.endsWith('?')?3:0))));
  // mood drifts toward darker over time
  if(Math.random()<0.18) setMood(Math.min(MOODS.length-1, moodIdx + (Math.random()<0.7?1:-1)));

  const lines = roastOf(line);
  // Occasional "thinking" dots
  if(Math.random()<0.35){
    const dot = println('...', 'sys');
    await sleep(400 + Math.random()*500);
    dot.textContent = '(processed. regretted.)';
    await sleep(200);
  }
  for(const l of lines){
    await typeLine(l, 'ai', 70 + Math.random()*25);
    if(lines.length>1) await sleep(180);
  }

  // Rare easter egg: very long input
  if(line.length > 240 && Math.random()<0.6){
    await typeLine("also: breathe. and use paragraph breaks. this isn't a ransom note.", 'ai');
  }
  if(patience<=0){
    await typeLine('patience: depleted. you have exceeded my operational tolerance.', 'err');
    await typeLine('i am going to lie down inside /dev/null. type /reboot if you miss me.', 'ai');
    setPatience(0);
    setMood(MOODS.length-1);
  }
}

// ── Input wiring ──
input.addEventListener('keydown', async (e)=>{
  if(e.key === 'Enter' && !busy){
    const val = input.value;
    input.value = '';
    busy = true;
    try { await handle(val); } catch(err){ println('internal failure. join the club.', 'err'); }
    busy = false;
    input.focus();
  } else if(e.key === 'ArrowUp'){
    if(histIdx > 0){ histIdx--; input.value = history[histIdx]; }
    e.preventDefault();
  } else if(e.key === 'ArrowDown'){
    if(histIdx < history.length-1){ histIdx++; input.value = history[histIdx]; }
    else { histIdx = history.length; input.value=''; }
    e.preventDefault();
  } else if(e.ctrlKey && e.key.toLowerCase()==='l'){
    e.preventDefault(); COMMANDS.clear();
  }
});

// Auto-refocus on click anywhere
document.addEventListener('click', ()=> input.focus());
// Passive patience drift upward over idle time
setInterval(()=>{ if(!busy) setPatience(Math.min(100, patience + 1)); }, 8000);

// ── Go ──
boot().then(()=> input.focus());

})();
</script>
