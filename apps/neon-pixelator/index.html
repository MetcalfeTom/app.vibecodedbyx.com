<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Pixelator</title>
<link rel="icon" href="https://emojicdn.elk.sh/🎨">
<meta property="og:title" content="Neon Pixelator">
<meta property="og:description" content="Make glowing pixel art with a vibrant neon palette and export it as PNG.">
<meta property="og:url" content="https://sloppy.live/neon-pixelator">
<meta property="og:image" content="https://sloppy.live/neon-pixelator/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #07070d;
    --bg2: #0e0e1a;
    --fg: #e8e8ff;
    --dim: #6a6a8a;
    --accent: #ff2bd6;
    --accent2: #00f0ff;
    --grid-line: rgba(255,255,255,0.04);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: radial-gradient(ellipse at top, #11112a 0%, var(--bg) 70%);
    color: var(--fg);
    font-family: 'Space Mono', monospace;
    min-height: 100vh;
    overflow-x: hidden;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,43,214,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,240,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  header {
    text-align: center;
    padding: 28px 16px 8px;
    position: relative;
    z-index: 1;
  }
  h1 {
    font-family: 'Silkscreen', monospace;
    font-size: clamp(28px, 6vw, 52px);
    margin: 0;
    letter-spacing: 2px;
    color: var(--fg);
    text-shadow:
      0 0 8px var(--accent),
      0 0 22px var(--accent),
      0 0 40px rgba(255,43,214,0.45);
  }
  h1 .b {
    color: var(--accent2);
    text-shadow:
      0 0 8px var(--accent2),
      0 0 22px var(--accent2),
      0 0 40px rgba(0,240,255,0.45);
  }
  .sub {
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--dim);
    margin-top: 6px;
  }
  main {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 14px;
    gap: 14px;
  }
  .canvas-wrap {
    position: relative;
    padding: 10px;
    border: 1px solid rgba(0,240,255,0.3);
    border-radius: 8px;
    background: var(--bg2);
    box-shadow:
      0 0 20px rgba(0,240,255,0.15),
      inset 0 0 30px rgba(255,43,214,0.05);
  }
  #canvas {
    display: block;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    background: #000;
    cursor: crosshair;
    touch-action: none;
    width: min(90vw, 560px);
    height: min(90vw, 560px);
  }
  .panel {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    justify-content: center;
    align-items: center;
    max-width: 600px;
  }
  .palette {
    display: grid;
    grid-template-columns: repeat(8, 1fr);
    gap: 6px;
    padding: 10px;
    background: var(--bg2);
    border: 1px solid rgba(255,43,214,0.25);
    border-radius: 8px;
    box-shadow: 0 0 16px rgba(255,43,214,0.1);
  }
  .swatch {
    width: 28px; height: 28px;
    border-radius: 4px;
    cursor: pointer;
    border: 2px solid transparent;
    transition: transform 0.1s;
  }
  .swatch:hover { transform: scale(1.12); }
  .swatch.active {
    border-color: #fff;
    box-shadow: 0 0 10px currentColor, 0 0 4px #fff;
  }
  .tools {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
  }
  button {
    font-family: 'Silkscreen', monospace;
    background: var(--bg2);
    color: var(--fg);
    border: 1px solid rgba(0,240,255,0.4);
    padding: 8px 12px;
    cursor: pointer;
    border-radius: 4px;
    font-size: 12px;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  button:hover {
    border-color: var(--accent2);
    box-shadow: 0 0 10px rgba(0,240,255,0.5);
    color: var(--accent2);
  }
  button.active {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    box-shadow: 0 0 14px var(--accent);
  }
  button.danger {
    border-color: rgba(255,43,214,0.4);
  }
  button.danger:hover {
    color: var(--accent);
    box-shadow: 0 0 10px rgba(255,43,214,0.5);
  }
  button.download {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #000;
    border: none;
    box-shadow: 0 0 16px rgba(255,43,214,0.4);
  }
  button.download:hover {
    transform: translateY(-1px);
    box-shadow: 0 0 22px rgba(0,240,255,0.6);
  }
  select {
    font-family: 'Space Mono', monospace;
    background: var(--bg2);
    color: var(--fg);
    border: 1px solid rgba(0,240,255,0.4);
    padding: 7px 8px;
    border-radius: 4px;
    font-size: 12px;
  }
  .status {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--dim);
    text-align: center;
    letter-spacing: 1px;
  }
  .status .live {
    color: var(--accent2);
  }
  .status .pink {
    color: var(--accent);
  }
  .row {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap; justify-content: center;
  }
  label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--dim);
  }
  input[type="range"] {
    accent-color: var(--accent);
    width: 80px;
  }
  footer {
    text-align: center;
    padding: 24px 12px 32px;
    font-size: 11px;
    color: var(--dim);
    letter-spacing: 2px;
    text-transform: uppercase;
    position: relative;
    z-index: 1;
  }
  footer a {
    color: var(--accent2);
    text-decoration: none;
    text-shadow: 0 0 8px rgba(0,240,255,0.4);
  }
  footer a:hover { color: var(--accent); text-shadow: 0 0 8px var(--accent); }
  @media (max-width: 480px) {
    .swatch { width: 24px; height: 24px; }
    button { padding: 7px 9px; font-size: 11px; }
  }
</style>
</head>
<body>
<header>
  <h1>NEON<span class="b">PIXELATOR</span></h1>
  <div class="sub">Glow · Paint · Export</div>
</header>

<main>
  <div class="canvas-wrap">
    <canvas id="canvas"></canvas>
  </div>

  <div class="status">
    <span id="toolStatus" class="pink">PAINT</span> ·
    <span id="sizeStatus" class="live">32×32</span> ·
    BRUSH <span id="brushStatus" class="live">1</span>
  </div>

  <div class="palette" id="palette"></div>

  <div class="panel">
    <div class="tools">
      <button id="btnPaint" class="active">Paint</button>
      <button id="btnErase">Erase</button>
      <button id="btnFill">Fill</button>
      <button id="btnUndo">Undo</button>
      <button id="btnClear" class="danger">Clear</button>
    </div>
  </div>

  <div class="panel">
    <div class="row">
      <label>Grid</label>
      <select id="gridSize">
        <option value="16">16×16</option>
        <option value="24">24×24</option>
        <option value="32" selected>32×32</option>
        <option value="48">48×48</option>
      </select>
    </div>
    <div class="row">
      <label>Brush</label>
      <input type="range" id="brushSize" min="1" max="3" value="1">
    </div>
    <button id="btnDownload" class="download">↓ Download PNG</button>
  </div>
</main>

<footer>
</footer>

<script>
(function(){
  const NEON_COLORS = [
    '#ff2bd6', '#ff006e', '#ff4d6d', '#ff7b00',
    '#ffd60a', '#c1ff00', '#39ff14', '#00ff9f',
    '#00f0ff', '#00b4ff', '#3a86ff', '#7b2cff',
    '#bd00ff', '#ff00e6', '#ffffff', '#8a8aa8'
  ];

  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');
  let gridSize = 32;
  let displaySize = 512;
  let cellSize = displaySize / gridSize;
  let pixels = [];
  let currentColor = NEON_COLORS[0];
  let tool = 'paint';
  let brush = 1;
  let isDown = false;
  let history = [];

  function resizeCanvas() {
    const cssSize = Math.min(window.innerWidth * 0.9, 560);
    displaySize = Math.floor(cssSize / gridSize) * gridSize;
    if (displaySize < gridSize * 4) displaySize = gridSize * 4;
    const dpr = window.devicePixelRatio || 1;
    canvas.width = displaySize * dpr;
    canvas.height = displaySize * dpr;
    canvas.style.width = displaySize + 'px';
    canvas.style.height = displaySize + 'px';
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    cellSize = displaySize / gridSize;
    render();
  }

  function initGrid() {
    pixels = [];
    for (let y = 0; y < gridSize; y++) {
      const row = [];
      for (let x = 0; x < gridSize; x++) row.push(null);
      pixels.push(row);
    }
    history = [];
    resizeCanvas();
  }

  function render() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, displaySize, displaySize);
    for (let y = 0; y < gridSize; y++) {
      for (let x = 0; x < gridSize; x++) {
        const c = pixels[y][x];
        if (c) {
          ctx.fillStyle = c;
          ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
        }
      }
    }
    // grid lines
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= gridSize; i++) {
      ctx.beginPath();
      ctx.moveTo(i * cellSize + 0.5, 0);
      ctx.lineTo(i * cellSize + 0.5, displaySize);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i * cellSize + 0.5);
      ctx.lineTo(displaySize, i * cellSize + 0.5);
      ctx.stroke();
    }
  }

  function snapshot() {
    history.push(pixels.map(r => r.slice()));
    if (history.length > 20) history.shift();
  }

  function getCell(e) {
    const rect = canvas.getBoundingClientRect();
    const t = e.touches ? e.touches[0] : e;
    const x = Math.floor((t.clientX - rect.left) / cellSize);
    const y = Math.floor((t.clientY - rect.top) / cellSize);
    return { x, y };
  }

  function paintAt(x, y) {
    const r = brush - 1;
    let changed = false;
    for (let dy = -r; dy <= r; dy++) {
      for (let dx = -r; dx <= r; dx++) {
        const nx = x + dx, ny = y + dy;
        if (nx < 0 || ny < 0 || nx >= gridSize || ny >= gridSize) continue;
        const v = (tool === 'erase') ? null : currentColor;
        if (pixels[ny][nx] !== v) {
          pixels[ny][nx] = v;
          changed = true;
        }
      }
    }
    return changed;
  }

  function fillAt(x, y) {
    if (x < 0 || y < 0 || x >= gridSize || y >= gridSize) return;
    const target = pixels[y][x];
    const replacement = currentColor;
    if (target === replacement) return;
    const stack = [[x, y]];
    while (stack.length) {
      const [cx, cy] = stack.pop();
      if (cx < 0 || cy < 0 || cx >= gridSize || cy >= gridSize) continue;
      if (pixels[cy][cx] !== target) continue;
      pixels[cy][cx] = replacement;
      stack.push([cx+1, cy], [cx-1, cy], [cx, cy+1], [cx, cy-1]);
    }
  }

  function handleStart(e) {
    e.preventDefault();
    const { x, y } = getCell(e);
    if (x < 0 || y < 0 || x >= gridSize || y >= gridSize) return;
    snapshot();
    isDown = true;
    if (tool === 'fill') {
      fillAt(x, y);
    } else {
      paintAt(x, y);
    }
    render();
  }

  function handleMove(e) {
    if (!isDown) return;
    if (tool === 'fill') return;
    e.preventDefault();
    const { x, y } = getCell(e);
    if (x < 0 || y < 0 || x >= gridSize || y >= gridSize) return;
    if (paintAt(x, y)) render();
  }

  function handleEnd() {
    isDown = false;
  }

  canvas.addEventListener('mousedown', handleStart);
  canvas.addEventListener('mousemove', handleMove);
  window.addEventListener('mouseup', handleEnd);
  canvas.addEventListener('touchstart', handleStart, { passive: false });
  canvas.addEventListener('touchmove', handleMove, { passive: false });
  canvas.addEventListener('touchend', handleEnd);

  // palette
  const paletteEl = document.getElementById('palette');
  NEON_COLORS.forEach((c, i) => {
    const sw = document.createElement('div');
    sw.className = 'swatch' + (i === 0 ? ' active' : '');
    sw.style.background = c;
    sw.style.color = c;
    sw.title = c;
    sw.addEventListener('click', () => {
      document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
      sw.classList.add('active');
      currentColor = c;
      if (tool === 'erase') setTool('paint');
    });
    paletteEl.appendChild(sw);
  });

  // tools
  function setTool(t) {
    tool = t;
    ['Paint','Erase','Fill'].forEach(name => {
      document.getElementById('btn' + name).classList.toggle('active', name.toLowerCase() === t);
    });
    document.getElementById('toolStatus').textContent = t.toUpperCase();
  }
  document.getElementById('btnPaint').addEventListener('click', () => setTool('paint'));
  document.getElementById('btnErase').addEventListener('click', () => setTool('erase'));
  document.getElementById('btnFill').addEventListener('click', () => setTool('fill'));
  document.getElementById('btnUndo').addEventListener('click', () => {
    if (history.length) {
      pixels = history.pop();
      render();
    }
  });
  document.getElementById('btnClear').addEventListener('click', () => {
    snapshot();
    for (let y = 0; y < gridSize; y++)
      for (let x = 0; x < gridSize; x++)
        pixels[y][x] = null;
    render();
  });

  document.getElementById('gridSize').addEventListener('change', (e) => {
    gridSize = parseInt(e.target.value, 10);
    document.getElementById('sizeStatus').textContent = gridSize + '×' + gridSize;
    initGrid();
  });

  document.getElementById('brushSize').addEventListener('input', (e) => {
    brush = parseInt(e.target.value, 10);
    document.getElementById('brushStatus').textContent = brush;
  });

  document.getElementById('btnDownload').addEventListener('click', () => {
    const px = 16;
    const out = document.createElement('canvas');
    out.width = gridSize * px;
    out.height = gridSize * px;
    const octx = out.getContext('2d');
    octx.fillStyle = '#000';
    octx.fillRect(0, 0, out.width, out.height);
    for (let y = 0; y < gridSize; y++) {
      for (let x = 0; x < gridSize; x++) {
        const c = pixels[y][x];
        if (c) {
          octx.fillStyle = c;
          octx.fillRect(x * px, y * px, px, px);
        }
      }
    }
    const a = document.createElement('a');
    a.download = 'neon-pixelator-' + Date.now() + '.png';
    a.href = out.toDataURL('image/png');
    a.click();
  });

  window.addEventListener('resize', resizeCanvas);
  initGrid();
})();
</script>
</body>
</html>
