<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Neon Slots</title>
<link rel="icon" href="https://emojicdn.elk.sh/🍒">
<meta property="og:title" content="Neon Slots">
<meta property="og:description" content="Pull the lever on a glowing neon fruit machine. Match symbols, win big.">
<meta property="og:url" content="https://sloppy.live/neon-slots">
<meta property="og:image" content="https://emojicdn.elk.sh/🎰?style=apple&size=512">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Bungee+Shade&family=DM+Mono:wght@300;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{min-height:100dvh;background:#06030e;font-family:'DM Mono',monospace;overflow-x:hidden}
body{display:flex;flex-direction:column;align-items:center;padding:16px 12px 70px}

h1{font-family:'Bungee Shade',cursive;font-size:clamp(1.6rem,5vw,2.8rem);color:#ff2080;text-shadow:0 0 30px rgba(255,32,128,0.35),0 0 60px rgba(255,32,128,0.1);letter-spacing:4px;text-align:center;margin-bottom:2px}
.sub{font-size:9px;color:rgba(255,100,180,0.2);letter-spacing:3px;margin-bottom:16px;text-align:center}

#credits-row{display:flex;align-items:center;gap:16px;margin-bottom:14px}
.stat{text-align:center}
.stat-label{font-size:9px;color:rgba(255,100,180,0.25);letter-spacing:2px}
.stat-val{font-size:1.4rem;font-weight:500;color:#ffcc00;text-shadow:0 0 12px rgba(255,200,0,0.3)}
#bet-val{color:#ff60a0}

#machine{
  background:linear-gradient(180deg,rgba(255,32,128,0.06) 0%,rgba(0,0,0,0.4) 100%);
  border:2px solid rgba(255,32,128,0.15);border-radius:16px;
  padding:20px 16px;max-width:400px;width:100%;
  box-shadow:0 0 40px rgba(255,32,128,0.06),inset 0 0 30px rgba(0,0,0,0.5);
}

#reels-frame{
  display:flex;gap:6px;justify-content:center;
  background:#000;border-radius:10px;padding:12px 8px;
  border:1px solid rgba(255,32,128,0.1);
  box-shadow:inset 0 0 20px rgba(0,0,0,0.8);
  margin-bottom:14px;overflow:hidden;
}

.reel{
  width:80px;height:100px;
  background:rgba(255,255,255,0.02);
  border-radius:6px;border:1px solid rgba(255,255,255,0.05);
  display:flex;align-items:center;justify-content:center;
  font-size:52px;line-height:1;
  position:relative;overflow:hidden;
  transition:border-color 0.3s,box-shadow 0.3s;
}
.reel.glow{
  border-color:var(--glow-clr,#ffcc00);
  box-shadow:0 0 20px var(--glow-clr,rgba(255,200,0,0.3)),inset 0 0 15px rgba(255,200,0,0.05);
}
.reel-inner{
  transition:transform 0.1s;
  will-change:transform;
}

#win-line{
  height:28px;display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:500;letter-spacing:2px;
  color:#ffcc00;text-shadow:0 0 15px rgba(255,200,0,0.4);
  margin-bottom:10px;opacity:0;transition:opacity 0.3s;
}
#win-line.show{opacity:1}

#controls{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
#controls button{
  font-family:'DM Mono',monospace;font-size:12px;font-weight:500;letter-spacing:2px;
  border:2px solid;border-radius:8px;padding:10px 22px;cursor:pointer;
  transition:all .15s;-webkit-tap-highlight-color:transparent;
  min-width:80px;
}
#spin-btn{border-color:#ff2080;background:rgba(255,32,128,0.1);color:#ff2080}
#spin-btn:hover{background:rgba(255,32,128,0.2)}
#spin-btn:active{transform:scale(0.96)}
#spin-btn:disabled{opacity:0.3;cursor:default;transform:none}
#bet-up,#bet-dn{border-color:rgba(255,100,180,0.2);background:transparent;color:rgba(255,100,180,0.4);padding:10px 14px}
#bet-up:hover,#bet-dn:hover{border-color:rgba(255,100,180,0.4);color:#ff80b0}
#max-btn{border-color:rgba(255,200,0,0.2);background:transparent;color:rgba(255,200,0,0.4);padding:10px 14px}
#max-btn:hover{border-color:rgba(255,200,0,0.4);color:#ffcc00}

#paytable-toggle{
  font-size:9px;color:rgba(255,100,180,0.2);cursor:pointer;margin-top:14px;
  text-align:center;letter-spacing:2px;
}
#paytable-toggle:hover{color:rgba(255,100,180,0.4)}
#paytable{
  display:none;margin-top:10px;max-width:400px;width:100%;
  background:rgba(255,32,128,0.03);border:1px solid rgba(255,32,128,0.08);
  border-radius:8px;padding:12px;font-size:11px;color:rgba(255,180,220,0.4);
  line-height:1.8;
}
#paytable .row{display:flex;justify-content:space-between}

a
@media(max-width:400px){
  .reel{width:65px;height:85px;font-size:42px}
  #machine{padding:14px 10px}
  #controls button{font-size:11px;padding:8px 14px}
}
</style>
</head>
<body>

<h1>NEON SLOTS</h1>
<div class="sub">FRUIT MACHINE</div>

<div id="credits-row">
  <div class="stat"><div class="stat-label">CREDITS</div><div class="stat-val" id="credits">100</div></div>
  <div class="stat"><div class="stat-label">BET</div><div class="stat-val" id="bet-val">5</div></div>
  <div class="stat"><div class="stat-label">WIN</div><div class="stat-val" id="last-win">0</div></div>
</div>

<div id="machine">
  <div id="reels-frame">
    <div class="reel" id="r0"><span class="reel-inner">🍒</span></div>
    <div class="reel" id="r1"><span class="reel-inner">🍋</span></div>
    <div class="reel" id="r2"><span class="reel-inner">🍊</span></div>
  </div>
  <div id="win-line"></div>
  <div id="controls">
    <button id="bet-dn">-</button>
    <button id="bet-up">+</button>
    <button id="spin-btn">SPIN</button>
    <button id="max-btn">MAX</button>
  </div>
</div>

<div id="paytable-toggle">PAYTABLE</div>
<div id="paytable">
  <div class="row"><span>💎💎💎</span><span>x50</span></div>
  <div class="row"><span>7️⃣7️⃣7️⃣</span><span>x30</span></div>
  <div class="row"><span>🍒🍒🍒</span><span>x15</span></div>
  <div class="row"><span>🍇🍇🍇</span><span>x12</span></div>
  <div class="row"><span>🍊🍊🍊</span><span>x10</span></div>
  <div class="row"><span>🍋🍋🍋</span><span>x8</span></div>
  <div class="row"><span>🍉🍉🍉</span><span>x6</span></div>
  <div class="row"><span>⭐⭐⭐</span><span>x20</span></div>
  <div class="row"><span>Any 2 match</span><span>x2</span></div>
</div>
<script>
(function(){

// --- AUDIO ---
var actx=null;
function ensureAudio(){
  if(!actx)actx=new(window.AudioContext||window.webkitAudioContext)();
  if(actx.state==='suspended')actx.resume();
  return actx;
}

function playTone(freq,dur,type,vol){
  var ctx=ensureAudio();var t=ctx.currentTime;
  var o=ctx.createOscillator();o.type=type||'square';
  o.frequency.setValueAtTime(freq,t);
  var g=ctx.createGain();g.gain.setValueAtTime((vol||0.1)*masterVol,t);
  g.gain.exponentialRampToValueAtTime(0.001,t+dur);
  o.connect(g);g.connect(ctx.destination);o.start(t);o.stop(t+dur);
}

function playReelTick(){playTone(800+Math.random()*200,0.03,'square',0.04)}

function playSpinStart(){
  playTone(200,0.15,'sawtooth',0.08);
  setTimeout(function(){playTone(300,0.1,'sawtooth',0.06)},80);
}

function playReelStop(idx){
  setTimeout(function(){
    playTone(400+idx*100,0.12,'triangle',0.1);
  },0);
}

function playWinSmall(){
  var notes=[523,659,784];
  notes.forEach(function(n,i){
    setTimeout(function(){playTone(n,0.15,'sine',0.12)},i*120);
  });
}

function playWinBig(){
  var notes=[523,659,784,1047,784,1047,1319];
  notes.forEach(function(n,i){
    setTimeout(function(){playTone(n,0.2,'sine',0.14)},i*100);
  });
  // Sparkle noise
  setTimeout(function(){
    var ctx=ensureAudio();var t=ctx.currentTime;
    for(var i=0;i<5;i++){
      var o=ctx.createOscillator();o.type='sine';
      o.frequency.setValueAtTime(2000+Math.random()*3000,t+i*0.08);
      var g=ctx.createGain();g.gain.setValueAtTime(0.06*masterVol,t+i*0.08);
      g.gain.exponentialRampToValueAtTime(0.001,t+i*0.08+0.1);
      o.connect(g);g.connect(ctx.destination);o.start(t+i*0.08);o.stop(t+i*0.08+0.1);
    }
  },600);
}

function playWinJackpot(){
  var notes=[523,659,784,1047,1319,1568,1047,1319,1568,2093];
  notes.forEach(function(n,i){
    setTimeout(function(){playTone(n,0.25,'sine',0.15)},i*90);
  });
  setTimeout(function(){
    var ctx=ensureAudio();var t=ctx.currentTime;
    for(var i=0;i<12;i++){
      var o=ctx.createOscillator();o.type='sine';
      o.frequency.setValueAtTime(1500+Math.random()*4000,t+i*0.06);
      var g=ctx.createGain();g.gain.setValueAtTime(0.08*masterVol,t+i*0.06);
      g.gain.exponentialRampToValueAtTime(0.001,t+i*0.06+0.15);
      o.connect(g);g.connect(ctx.destination);o.start(t+i*0.06);o.stop(t+i*0.06+0.15);
    }
  },800);
}

function playLose(){
  playTone(200,0.2,'triangle',0.05);
  setTimeout(function(){playTone(150,0.3,'triangle',0.04)},150);
}

var masterVol=0.8;

// --- SYMBOLS ---
var SYMBOLS=[
  {emoji:'🍒',name:'Cherry',weight:20,color:'#ff2040'},
  {emoji:'🍋',name:'Lemon',weight:20,color:'#ffdd00'},
  {emoji:'🍊',name:'Orange',weight:18,color:'#ff8020'},
  {emoji:'🍇',name:'Grape',weight:15,color:'#a040ff'},
  {emoji:'🍉',name:'Melon',weight:15,color:'#40ff60'},
  {emoji:'⭐',name:'Star',weight:6,color:'#ffee40'},
  {emoji:'7️⃣',name:'Seven',weight:4,color:'#ff4060'},
  {emoji:'💎',name:'Diamond',weight:2,color:'#40ddff'}
];

// Build weighted pool
var POOL=[];
SYMBOLS.forEach(function(s){for(var i=0;i<s.weight;i++)POOL.push(s)});

function randomSymbol(){return POOL[Math.floor(Math.random()*POOL.length)]}

// --- PAYOUTS ---
// Returns {multiplier, name} or null
function checkWin(s0,s1,s2){
  // Three of a kind
  if(s0.emoji===s1.emoji&&s1.emoji===s2.emoji){
    var mult=s0.emoji==='💎'?50:s0.emoji==='7️⃣'?30:s0.emoji==='⭐'?20:
             s0.emoji==='🍒'?15:s0.emoji==='🍇'?12:s0.emoji==='🍊'?10:
             s0.emoji==='🍋'?8:6;
    return{mult:mult,name:s0.name+' x3!'};
  }
  // Two of a kind
  if(s0.emoji===s1.emoji||s1.emoji===s2.emoji||s0.emoji===s2.emoji){
    return{mult:2,name:'Pair!'};
  }
  return null;
}

// --- GAME STATE ---
var credits=100;
var bet=5;
var spinning=false;
var reelEls=[document.getElementById('r0'),document.getElementById('r1'),document.getElementById('r2')];
var reelResults=[SYMBOLS[0],SYMBOLS[1],SYMBOLS[2]];

function updateUI(){
  document.getElementById('credits').textContent=credits;
  document.getElementById('bet-val').textContent=bet;
}

// --- SPIN ANIMATION ---
function spin(){
  if(spinning||credits<bet)return;
  ensureAudio();
  spinning=true;
  credits-=bet;
  document.getElementById('last-win').textContent='0';
  document.getElementById('win-line').classList.remove('show');
  document.getElementById('win-line').textContent='';
  reelEls.forEach(function(r){r.classList.remove('glow')});
  updateUI();
  document.getElementById('spin-btn').disabled=true;

  playSpinStart();

  // Pick results
  var results=[randomSymbol(),randomSymbol(),randomSymbol()];
  reelResults=results;

  // Animate each reel with staggered stop
  var TICKS=20;
  var STAGGER=8;

  reelEls.forEach(function(reel,idx){
    var tickCount=TICKS+idx*STAGGER;
    var tick=0;
    var inner=reel.querySelector('.reel-inner');

    var interval=setInterval(function(){
      tick++;
      var sym=randomSymbol();
      inner.textContent=sym.emoji;
      // Speed: fast then slow
      var remaining=tickCount-tick;
      if(remaining<=5){
        clearInterval(interval);
        // Final slow ticks
        var slowTick=0;
        var slowInterval=setInterval(function(){
          slowTick++;
          if(slowTick>=remaining){
            clearInterval(slowInterval);
            inner.textContent=results[idx].emoji;
            playReelStop(idx);
            // Check if all stopped
            if(idx===2){
              setTimeout(resolveWin,300);
            }
          }else{
            inner.textContent=randomSymbol().emoji;
            playReelTick();
          }
        },150+slowTick*40);
        return;
      }
      if(tick%3===0)playReelTick();
    },50);
  });
}

function resolveWin(){
  var r=reelResults;
  var win=checkWin(r[0],r[1],r[2]);

  if(win){
    var payout=bet*win.mult;
    credits+=payout;
    document.getElementById('last-win').textContent='+'+payout;
    document.getElementById('win-line').textContent=win.name+' +'+payout;
    document.getElementById('win-line').classList.add('show');

    // Glow matching reels
    var glowColor=r[0].color;
    if(win.mult>=10){
      // All three match
      reelEls.forEach(function(re){re.style.setProperty('--glow-clr',glowColor);re.classList.add('glow')});
      playWinJackpot();
    }else if(win.mult>=6){
      reelEls.forEach(function(re){re.style.setProperty('--glow-clr',glowColor);re.classList.add('glow')});
      playWinBig();
    }else{
      // Pair glow
      if(r[0].emoji===r[1].emoji){reelEls[0].classList.add('glow');reelEls[1].classList.add('glow');glowColor=r[0].color}
      else if(r[1].emoji===r[2].emoji){reelEls[1].classList.add('glow');reelEls[2].classList.add('glow');glowColor=r[1].color}
      else{reelEls[0].classList.add('glow');reelEls[2].classList.add('glow');glowColor=r[0].color}
      reelEls.forEach(function(re){if(re.classList.contains('glow'))re.style.setProperty('--glow-clr',glowColor)});
      playWinSmall();
    }
  }else{
    document.getElementById('win-line').textContent='';
    document.getElementById('win-line').classList.remove('show');
    playLose();
  }

  updateUI();
  spinning=false;
  document.getElementById('spin-btn').disabled=false;

  // Bankrupt? Free refill
  if(credits<=0){
    setTimeout(function(){
      credits=50;
      updateUI();
      document.getElementById('win-line').textContent='FREE 50 CREDITS!';
      document.getElementById('win-line').classList.add('show');
      playWinSmall();
    },800);
  }
}

// --- CONTROLS ---
document.getElementById('spin-btn').addEventListener('click',spin);
document.getElementById('spin-btn').addEventListener('touchstart',function(e){e.preventDefault();spin()});

document.getElementById('bet-up').addEventListener('click',function(){
  if(spinning)return;
  bet=Math.min(bet+5,Math.min(50,credits));
  updateUI();
});
document.getElementById('bet-dn').addEventListener('click',function(){
  if(spinning)return;
  bet=Math.max(bet-5,5);
  updateUI();
});
document.getElementById('max-btn').addEventListener('click',function(){
  if(spinning)return;
  bet=Math.min(50,credits);
  if(bet<5)bet=5;
  updateUI();
});

// Keyboard: space to spin
document.addEventListener('keydown',function(e){
  if(e.code==='Space'){e.preventDefault();spin()}
});

// Paytable toggle
document.getElementById('paytable-toggle').addEventListener('click',function(){
  var pt=document.getElementById('paytable');
  pt.style.display=pt.style.display==='block'?'none':'block';
});

updateUI();

})();
</script>
<script src="/sloppy-header/sloppy-bar.js"></script>
</body>
</html>
