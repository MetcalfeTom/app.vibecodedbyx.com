<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Pet</title>
<link rel="icon" href="https://emojicdn.elk.sh/📊">
<meta property="og:title" content="Data Pet">
<meta property="og:description" content="A digital pet that only eats CSV files and spreadsheet data. Feed it your data!">
<meta property="og:url" content="https://app.sloppy.live/data-pet/">
<meta property="og:image" content="https://app.sloppy.live/data-pet/og-image.png">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Instrument+Serif&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f1117;--surface:#161822;--border:#22263a;--accent:#5eead4;--pink:#f472b6;--yellow:#fbbf24;--dim:#4a5068;--text:#c8cfe0}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'Space Mono',monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center}
#app{width:100%;max-width:520px;padding:16px}
header{text-align:center;padding:16px 0 8px}
header h1{font-family:'Instrument Serif',serif;font-size:28px;color:var(--accent);font-weight:400}
header .sub{font-size:10px;color:var(--dim);letter-spacing:1px;margin-top:2px}
#pet-area{position:relative;width:100%;height:280px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin:12px 0;overflow:hidden}
canvas{display:block;width:100%;height:100%}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:8px 0}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}
.stat-card .label{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1px}
.stat-card .val{font-size:18px;font-weight:700;margin-top:2px}
.stat-card .val.hunger{color:var(--yellow)}
.stat-card .val.happy{color:var(--pink)}
.stat-card .val.level{color:var(--accent)}
.bar{height:4px;background:var(--bg);border-radius:2px;margin-top:4px;overflow:hidden}
.bar-fill{height:100%;border-radius:2px;transition:width .5s}
#feed-zone{border:2px dashed var(--border);border-radius:10px;padding:24px;text-align:center;margin:8px 0;transition:all .2s;cursor:pointer;position:relative}
#feed-zone.dragover{border-color:var(--accent);background:rgba(94,234,212,.05)}
#feed-zone .icon{font-size:28px;margin-bottom:6px}
#feed-zone .txt{font-size:11px;color:var(--dim);line-height:1.6}
#feed-zone .txt b{color:var(--text)}
#feed-zone input{position:absolute;inset:0;opacity:0;cursor:pointer}
#paste-area{margin:8px 0}
#paste-area textarea{width:100%;height:60px;background:var(--surface);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'Space Mono',monospace;font-size:10px;padding:8px;resize:none}
#paste-area textarea::placeholder{color:var(--dim)}
#paste-area button{margin-top:4px;background:var(--accent);color:var(--bg);border:none;padding:6px 16px;border-radius:4px;font-family:'Space Mono',monospace;font-size:11px;cursor:pointer}
#paste-area button:hover{filter:brightness(1.1)}
#feed-log{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:10px;max-height:150px;overflow-y:auto;font-size:10px;color:var(--dim);line-height:1.6}
#feed-log .entry{padding:2px 0;border-bottom:1px solid rgba(34,38,58,.5)}
#feed-log .entry:last-child{border:none}
#feed-log .entry b{color:var(--accent)}
#feed-log .entry .ts{color:#333}
.mood-bubble{position:absolute;background:rgba(0,0,0,.6);color:#fff;font-size:11px;padding:4px 10px;border-radius:12px;pointer-events:none;white-space:nowrap;transition:opacity .3s;z-index:5}
.back-link{font-size:9px;color:#222;text-decoration:none;margin-top:12px;display:block;text-align:center}
.back-link:hover{color:#444}
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Data Pet</h1>
    <div class="sub">FEED ME YOUR SPREADSHEETS</div>
  </header>

  <div id="pet-area">
    <canvas id="c"></canvas>
    <div class="mood-bubble" id="mood-bubble" style="opacity:0;top:10px;left:50%;transform:translateX(-50%)"></div>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="label">Hunger</div>
      <div class="val hunger" id="hunger-val">50</div>
      <div class="bar"><div class="bar-fill" id="hunger-bar" style="width:50%;background:var(--yellow)"></div></div>
    </div>
    <div class="stat-card">
      <div class="label">Happiness</div>
      <div class="val happy" id="happy-val">50</div>
      <div class="bar"><div class="bar-fill" id="happy-bar" style="width:50%;background:var(--pink)"></div></div>
    </div>
    <div class="stat-card">
      <div class="label">Level</div>
      <div class="val level" id="level-val">1</div>
      <div class="bar"><div class="bar-fill" id="xp-bar" style="width:0%;background:var(--accent)"></div></div>
    </div>
  </div>

  <div id="feed-zone">
    <div class="icon">📄</div>
    <div class="txt">Drop a <b>.csv</b> file here or <b>click to upload</b><br>Your pet craves structured data</div>
    <input type="file" accept=".csv,.tsv,.txt" id="file-input">
  </div>

  <div id="paste-area">
    <textarea id="paste-input" placeholder="Or paste CSV/tab data here: name,age,score&#10;alice,28,95&#10;bob,34,87"></textarea>
    <button id="paste-btn">Feed Pasted Data</button>
  </div>

  <div id="feed-log"><div class="entry" style="color:var(--dim)">No meals yet... your pet is hungry for data!</div></div>
</div>
<a href="https://sloppy.live" class="back-link" target="_blank">sloppy.live</a>

<script>
const CV=document.getElementById('c'),X=CV.getContext('2d');
let W,H;

function resize(){
  let r=CV.parentElement.getBoundingClientRect();
  let dpr=window.devicePixelRatio||1;
  W=r.width;H=r.height;
  CV.width=W*dpr;CV.height=H*dpr;
  CV.style.width=W+'px';CV.style.height=H+'px';
  X.setTransform(dpr,0,0,dpr,0,0);
}
resize();window.addEventListener('resize',resize);

// --- PET STATE ---
let pet={
  hunger:50,happiness:50,level:1,xp:0,xpNeeded:100,
  totalRows:0,totalCols:0,totalFeeds:0,
  eyeState:'normal',mouthState:'neutral',bodyBounce:0,
  chewing:0,hearts:[],floatingData:[],
  name:'Datum',evo:0 // 0=blob, 1=cube, 2=prism
};

const MOODS=[
  {min:80,text:['Mmm, delicious pivot tables!','More columns please!','Data is love!','*happy data noises*','I dream in CSV!']},
  {min:50,text:['Could use more rows...','Got any spreadsheets?','Feed me a dataset!','Acceptable data quality.']},
  {min:20,text:['So hungry for data...','Please... one CSV...','My buffers are empty...','*sad beep*']},
  {min:0,text:['STARVING! Need data NOW!','Error: food_not_found','Null pointer to happiness','*dying modem sounds*']}
];

let frame=0,moodTimer=0;

// --- PARSE CSV ---
function parseCSV(text){
  let lines=text.trim().split(/\r?\n/).filter(l=>l.trim());
  if(lines.length===0)return null;
  let delim=',';
  if(lines[0].split('\t').length>lines[0].split(',').length)delim='\t';
  let rows=lines.map(l=>{
    let cells=[];let cur='';let inQuote=false;
    for(let i=0;i<l.length;i++){
      let ch=l[i];
      if(ch==='"'){inQuote=!inQuote;}
      else if(ch===delim&&!inQuote){cells.push(cur.trim());cur='';}
      else cur+=ch;
    }
    cells.push(cur.trim());
    return cells;
  });
  let cols=rows[0]||[];
  let dataRows=rows.slice(1);
  // Stats
  let numCount=0,textCount=0,emptyCount=0;
  dataRows.forEach(r=>r.forEach(c=>{
    if(c==='')emptyCount++;
    else if(!isNaN(c))numCount++;
    else textCount++;
  }));
  return{
    headers:cols,rows:dataRows,
    rowCount:dataRows.length,colCount:cols.length,
    numCount,textCount,emptyCount,
    quality:Math.max(10,100-emptyCount*5-Math.max(0,(1-dataRows.length/10))*20)
  };
}

function feedPet(data){
  if(!data||data.rowCount===0){
    showMood('That\'s not data! I need rows and columns!');
    return;
  }
  let nutrition=Math.min(60,data.rowCount*2+data.colCount*3);
  let joy=Math.min(40,Math.floor(data.quality/3)+data.colCount*2);
  let xpGain=data.rowCount+data.colCount*2+Math.floor(data.numCount/2);

  pet.hunger=Math.min(100,pet.hunger+nutrition);
  pet.happiness=Math.min(100,pet.happiness+joy);
  pet.xp+=xpGain;
  pet.totalRows+=data.rowCount;
  pet.totalCols+=data.colCount;
  pet.totalFeeds++;
  pet.chewing=60;
  pet.eyeState='happy';
  setTimeout(()=>{pet.eyeState='normal';},2000);

  // Level up
  while(pet.xp>=pet.xpNeeded){
    pet.xp-=pet.xpNeeded;
    pet.level++;
    pet.xpNeeded=Math.floor(pet.xpNeeded*1.5);
    pet.evo=pet.level>=8?2:pet.level>=4?1:0;
    showMood('LEVEL UP! I\'m level '+pet.level+'!');
  }

  // Hearts
  for(let i=0;i<Math.min(6,Math.floor(nutrition/10));i++){
    pet.hearts.push({x:W/2+Math.random()*60-30,y:H/2,vy:-1-Math.random(),life:40+Math.random()*20});
  }

  // Floating data snippets
  data.headers.slice(0,5).forEach((h,i)=>{
    pet.floatingData.push({text:h,x:W/2+Math.random()*80-40,y:H/2+20,vy:-0.5-Math.random()*0.5,vx:(Math.random()-0.5)*0.8,life:50+i*10,alpha:1});
  });

  // Reaction based on quality
  let msgs=[];
  if(data.quality>80)msgs=['Exquisite dataset!','Chef\'s kiss data!','Perfectly normalized!'];
  else if(data.quality>50)msgs=['Tasty data!','Decent schema.','Crunchy numbers!'];
  else msgs=['Kinda stale data...','Too many nulls!','Needs more columns.'];
  if(data.numCount>data.textCount*2)msgs.push('Mmm, so numeric!');
  if(data.colCount>=5)msgs.push('Wide dataset! Yummy!');
  if(data.rowCount>=20)msgs.push('A full meal!');
  if(data.emptyCount>5)msgs.push('Ugh, null values...');
  showMood(msgs[Math.floor(Math.random()*msgs.length)]);

  // Log
  addLog(data);
  updateStats();
  save();
}

function addLog(data){
  let el=document.getElementById('feed-log');
  let d=new Date();
  let ts=d.getHours()+':'+(d.getMinutes()<10?'0':'')+d.getMinutes();
  let entry=document.createElement('div');
  entry.className='entry';
  entry.innerHTML='<span class="ts">['+ts+']</span> Fed <b>'+data.rowCount+' rows</b> x <b>'+data.colCount+' cols</b> — headers: '+data.headers.slice(0,4).join(', ')+(data.headers.length>4?' ...':'');
  if(el.firstChild&&el.firstChild.textContent.includes('No meals'))el.innerHTML='';
  el.insertBefore(entry,el.firstChild);
  if(el.children.length>20)el.removeChild(el.lastChild);
}

function showMood(text){
  let bubble=document.getElementById('mood-bubble');
  bubble.textContent=text;
  bubble.style.opacity='1';
  clearTimeout(moodTimer);
  moodTimer=setTimeout(()=>{bubble.style.opacity='0';},3000);
}

function updateStats(){
  document.getElementById('hunger-val').textContent=Math.round(pet.hunger);
  document.getElementById('happy-val').textContent=Math.round(pet.happiness);
  document.getElementById('level-val').textContent=pet.level;
  document.getElementById('hunger-bar').style.width=pet.hunger+'%';
  document.getElementById('happy-bar').style.width=pet.happiness+'%';
  document.getElementById('xp-bar').style.width=(pet.xp/pet.xpNeeded*100)+'%';
}

// --- RENDERING ---
function drawPet(){
  X.clearRect(0,0,W,H);
  frame++;

  // BG grid
  X.strokeStyle='rgba(94,234,212,.03)';X.lineWidth=0.5;
  for(let y=0;y<H;y+=20){X.beginPath();X.moveTo(0,y);X.lineTo(W,y);X.stroke();}
  for(let x=0;x<W;x+=20){X.beginPath();X.moveTo(x,0);X.lineTo(x,H);X.stroke();}

  let cx=W/2,cy=H/2+10;
  let bounce=Math.sin(frame*0.04)*3;
  let chewBounce=pet.chewing>0?Math.sin(frame*0.3)*4:0;
  cy+=bounce+chewBounce;
  if(pet.chewing>0)pet.chewing--;

  // Shadow
  X.fillStyle='rgba(0,0,0,.2)';
  X.beginPath();X.ellipse(cx,cy+55,35,8,0,0,Math.PI*2);X.fill();

  // Body glow
  let glowColor=pet.happiness>70?'rgba(94,234,212,.08)':pet.happiness>30?'rgba(244,114,182,.06)':'rgba(251,191,36,.06)';
  let grd=X.createRadialGradient(cx,cy,10,cx,cy,70);
  grd.addColorStop(0,glowColor);grd.addColorStop(1,'transparent');
  X.fillStyle=grd;X.fillRect(cx-80,cy-80,160,160);

  // Body
  X.save();X.translate(cx,cy);
  if(pet.evo===0){
    // Blob
    X.fillStyle='var(--accent)';
    X.fillStyle='#5eead4';
    X.beginPath();
    X.ellipse(0,0,35,30+Math.sin(frame*.05)*2,0,0,Math.PI*2);
    X.fill();
    X.fillStyle='rgba(255,255,255,.1)';
    X.beginPath();X.ellipse(-8,-8,12,8,-.3,0,Math.PI*2);X.fill();
  } else if(pet.evo===1){
    // Cube-ish
    X.fillStyle='#5eead4';
    let s=32;
    roundRectC(-s,-s,s*2,s*2,8);X.fill();
    X.fillStyle='rgba(255,255,255,.08)';
    roundRectC(-s,-s,s*2,s*1.2,8);X.fill();
    // Data lines on body
    X.strokeStyle='rgba(0,0,0,.1)';X.lineWidth=1;
    for(let i=-20;i<20;i+=8){X.beginPath();X.moveTo(-22,i);X.lineTo(22,i);X.stroke();}
  } else {
    // Crystal/prism
    X.fillStyle='#5eead4';
    X.beginPath();
    X.moveTo(0,-40);X.lineTo(35,10);X.lineTo(20,40);X.lineTo(-20,40);X.lineTo(-35,10);X.closePath();
    X.fill();
    X.fillStyle='rgba(255,255,255,.1)';
    X.beginPath();X.moveTo(0,-40);X.lineTo(35,10);X.lineTo(0,0);X.lineTo(-35,10);X.closePath();X.fill();
    // Data matrix effect
    X.fillStyle='rgba(0,0,0,.08)';X.font='6px Space Mono';
    for(let r=-25;r<30;r+=9){
      for(let c=-20;c<20;c+=12){
        X.fillText(Math.random()>.5?'01':'10',c,r);
      }
    }
  }

  // Eyes
  let eyeY=pet.evo===2?-15:-5;
  let eyeSpread=pet.evo===2?12:14;
  if(pet.eyeState==='happy'){
    // Happy arc eyes
    X.strokeStyle='#0f1117';X.lineWidth=2.5;
    X.beginPath();X.arc(-eyeSpread,eyeY,5,Math.PI,0);X.stroke();
    X.beginPath();X.arc(eyeSpread,eyeY,5,Math.PI,0);X.stroke();
  } else if(pet.hunger<20){
    // Sad eyes
    X.fillStyle='#0f1117';
    X.beginPath();X.arc(-eyeSpread,eyeY,4,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(eyeSpread,eyeY,4,0,Math.PI*2);X.fill();
    // Tear
    X.fillStyle='rgba(100,150,255,.5)';
    X.beginPath();X.arc(-eyeSpread,eyeY+8+Math.sin(frame*.1)*2,2,0,Math.PI*2);X.fill();
  } else {
    // Normal eyes
    X.fillStyle='#0f1117';
    X.beginPath();X.arc(-eyeSpread,eyeY,4.5,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(eyeSpread,eyeY,4.5,0,Math.PI*2);X.fill();
    // Pupils (look around slightly)
    let px=Math.sin(frame*.02)*1.5,py=Math.cos(frame*.03)*1;
    X.fillStyle='#5eead4';
    X.beginPath();X.arc(-eyeSpread+px,eyeY+py,2,0,Math.PI*2);X.fill();
    X.beginPath();X.arc(eyeSpread+px,eyeY+py,2,0,Math.PI*2);X.fill();
  }

  // Mouth
  let mouthY=pet.evo===2?5:10;
  if(pet.chewing>0){
    // Chewing
    let open=Math.abs(Math.sin(frame*.3))*6;
    X.fillStyle='#0f1117';
    X.beginPath();X.ellipse(0,mouthY,6,open,0,0,Math.PI*2);X.fill();
  } else if(pet.happiness>70){
    X.strokeStyle='#0f1117';X.lineWidth=2;
    X.beginPath();X.arc(0,mouthY-2,6,0.1*Math.PI,0.9*Math.PI);X.stroke();
  } else if(pet.happiness>30){
    X.strokeStyle='#0f1117';X.lineWidth=2;
    X.beginPath();X.moveTo(-5,mouthY);X.lineTo(5,mouthY);X.stroke();
  } else {
    X.strokeStyle='#0f1117';X.lineWidth=2;
    X.beginPath();X.arc(0,mouthY+5,6,1.1*Math.PI,1.9*Math.PI);X.stroke();
  }

  // Antenna/data receiver (evo 1+)
  if(pet.evo>=1){
    let ay=pet.evo===2?-40:-32;
    X.strokeStyle='#5eead4';X.lineWidth=1.5;
    X.beginPath();X.moveTo(0,ay);X.lineTo(0,ay-12);X.stroke();
    X.fillStyle=frame%30<15?'#f472b6':'#fbbf24';
    X.beginPath();X.arc(0,ay-14,3,0,Math.PI*2);X.fill();
  }

  X.restore();

  // Hearts
  pet.hearts=pet.hearts.filter(h=>{
    h.y+=h.vy;h.life--;
    let a=h.life/40;
    X.fillStyle=`rgba(244,114,182,${a})`;
    X.font='14px serif';X.textAlign='center';
    X.fillText('♥',h.x,h.y);
    return h.life>0;
  });

  // Floating data
  pet.floatingData=pet.floatingData.filter(d=>{
    d.y+=d.vy;d.x+=d.vx;d.life--;d.alpha=d.life/60;
    X.fillStyle=`rgba(94,234,212,${d.alpha})`;
    X.font='bold 10px Space Mono';X.textAlign='center';
    X.fillText(d.text,d.x,d.y);
    return d.life>0;
  });

  // Stats text
  X.fillStyle='rgba(255,255,255,.08)';
  X.font='9px Space Mono';X.textAlign='left';
  X.fillText('Total feeds: '+pet.totalFeeds,8,H-24);
  X.fillText('Rows eaten: '+pet.totalRows,8,H-12);
  X.textAlign='right';
  X.fillText('Cols digested: '+pet.totalCols,W-8,H-12);
  let evoName=pet.evo===0?'Blob':pet.evo===1?'Dataframe':'Crystal DB';
  X.fillText('Form: '+evoName,W-8,H-24);

  requestAnimationFrame(drawPet);
}

function roundRectC(x,y,w,h,r){
  X.beginPath();X.moveTo(x+r,y);X.arcTo(x+w,y,x+w,y+h,r);X.arcTo(x+w,y+h,x,y+h,r);
  X.arcTo(x,y+h,x,y,r);X.arcTo(x,y,x+w,y,r);X.closePath();
}

// --- DECAY ---
setInterval(()=>{
  pet.hunger=Math.max(0,pet.hunger-0.8);
  pet.happiness=Math.max(0,pet.happiness-0.4);
  if(pet.hunger<20)pet.happiness=Math.max(0,pet.happiness-0.3);
  updateStats();
  // Random idle mood
  if(Math.random()<0.02){
    let tier=MOODS.find(m=>pet.hunger>=m.min)||MOODS[3];
    showMood(tier.text[Math.floor(Math.random()*tier.text.length)]);
  }
  save();
},2000);

// --- FILE INPUT ---
let feedZone=document.getElementById('feed-zone');
let fileInput=document.getElementById('file-input');

feedZone.addEventListener('dragover',e=>{e.preventDefault();feedZone.classList.add('dragover');});
feedZone.addEventListener('dragleave',()=>{feedZone.classList.remove('dragover');});
feedZone.addEventListener('drop',e=>{
  e.preventDefault();feedZone.classList.remove('dragover');
  let file=e.dataTransfer.files[0];
  if(file)readFile(file);
});
fileInput.addEventListener('change',e=>{
  let file=e.target.files[0];
  if(file)readFile(file);
  fileInput.value='';
});

function readFile(file){
  if(file.size>5*1024*1024){showMood('Too big! I\'ll get a tummy ache!');return;}
  let reader=new FileReader();
  reader.onload=e=>{
    let text=e.target.result;
    let data=parseCSV(text);
    if(data)feedPet(data);
    else showMood('I can\'t eat that! Where are the columns?');
  };
  reader.readAsText(file);
}

// Paste
document.getElementById('paste-btn').addEventListener('click',()=>{
  let text=document.getElementById('paste-input').value.trim();
  if(!text){showMood('Paste some data first!');return;}
  let data=parseCSV(text);
  if(data)feedPet(data);
  else showMood('That doesn\'t look like data...');
  document.getElementById('paste-input').value='';
});

// --- SAVE/LOAD ---
function save(){
  localStorage.setItem('data-pet',JSON.stringify({
    hunger:pet.hunger,happiness:pet.happiness,level:pet.level,
    xp:pet.xp,xpNeeded:pet.xpNeeded,totalRows:pet.totalRows,
    totalCols:pet.totalCols,totalFeeds:pet.totalFeeds,evo:pet.evo,
    lastSave:Date.now()
  }));
}

function load(){
  let s=localStorage.getItem('data-pet');
  if(!s)return;
  try{
    let d=JSON.parse(s);
    pet.hunger=d.hunger||50;pet.happiness=d.happiness||50;
    pet.level=d.level||1;pet.xp=d.xp||0;pet.xpNeeded=d.xpNeeded||100;
    pet.totalRows=d.totalRows||0;pet.totalCols=d.totalCols||0;
    pet.totalFeeds=d.totalFeeds||0;pet.evo=d.evo||0;
    // Decay while away
    if(d.lastSave){
      let away=Math.floor((Date.now()-d.lastSave)/60000);
      pet.hunger=Math.max(0,pet.hunger-away*0.5);
      pet.happiness=Math.max(0,pet.happiness-away*0.3);
    }
    updateStats();
  }catch(e){}
}

load();
