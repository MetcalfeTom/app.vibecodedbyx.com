<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>App Votes</title>
<link rel="icon" href="https://emojicdn.elk.sh/🗳️">
<meta property="og:title" content="App Votes">
<meta property="og:description" content="Vote for your favorite sloppy.live apps. Top ranked by the community.">
<meta property="og:url" content="https://sloppy.live/app-votes">
<meta property="og:image" content="https://emojicdn.elk.sh/🗳️?style=apple&size=512">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif&family=DM+Mono:wght@300;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase-js.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html{background:#08060e}
body{min-height:100dvh;background:#08060e;font-family:'DM Mono',monospace;color:#c8c0d8}

header{text-align:center;padding:24px 16px 8px}
header h1{font-family:'Instrument Serif',serif;font-size:2.6rem;color:#e0c0ff;letter-spacing:2px;line-height:1.1}
header p{font-size:10px;color:rgba(200,180,255,0.25);letter-spacing:3px;margin-top:4px}

#tabs{display:flex;justify-content:center;gap:6px;padding:12px 16px;position:sticky;top:0;z-index:20;background:#08060e}
#tabs button{
  font-family:'DM Mono',monospace;font-size:11px;font-weight:500;letter-spacing:1px;
  border:1px solid rgba(200,160,255,0.15);background:rgba(200,160,255,0.04);color:rgba(200,160,255,0.4);
  padding:6px 16px;border-radius:20px;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;
}
#tabs button.active,#tabs button:hover{border-color:rgba(200,160,255,0.4);color:#d0a0ff;background:rgba(200,160,255,0.08)}

#search-row{padding:0 16px 8px;max-width:600px;margin:0 auto}
#search{
  width:100%;padding:8px 14px;border-radius:8px;
  background:rgba(200,160,255,0.04);border:1px solid rgba(200,160,255,0.1);
  color:#d0c0e8;font-family:'DM Mono',monospace;font-size:12px;outline:none;
}
#search::placeholder{color:rgba(200,160,255,0.2)}
#search:focus{border-color:rgba(200,160,255,0.3)}

#list{max-width:600px;margin:0 auto;padding:4px 16px 80px}

.app-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;border-radius:8px;
  border-bottom:1px solid rgba(200,160,255,0.04);
  transition:background .15s;
}
.app-row:hover{background:rgba(200,160,255,0.03)}

.rank{font-family:'Instrument Serif',serif;font-size:1.3rem;color:rgba(200,160,255,0.15);min-width:32px;text-align:right}
.rank.gold{color:#ffd740}
.rank.silver{color:#b0b8c8}
.rank.bronze{color:#cd7f32}

.app-info{flex:1;min-width:0}
.app-name{
  font-weight:500;font-size:13px;color:#d0b8f0;letter-spacing:0.5px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  cursor:pointer;
}
.app-name:hover{color:#e8d0ff;text-decoration:underline}
.vote-count{font-size:10px;color:rgba(200,160,255,0.25);margin-top:1px}

.vote-btn{
  display:flex;align-items:center;gap:4px;
  font-family:'DM Mono',monospace;font-size:11px;font-weight:500;
  border:1px solid rgba(200,160,255,0.15);background:transparent;color:rgba(200,160,255,0.35);
  padding:5px 12px;border-radius:6px;cursor:pointer;transition:all .15s;
  -webkit-tap-highlight-color:transparent;white-space:nowrap;
}
.vote-btn:hover{border-color:rgba(200,160,255,0.35);color:#c0a0e0}
.vote-btn.voted{border-color:#b060ff;color:#c080ff;background:rgba(180,80,255,0.1)}
.vote-btn .arrow{font-size:14px;line-height:1}

#status{text-align:center;padding:20px;font-size:11px;color:rgba(200,160,255,0.2)}

a
@media(max-width:440px){
  header h1{font-size:2rem}
  .app-row{padding:8px 8px;gap:8px}
  .rank{font-size:1.1rem;min-width:26px}
  .app-name{font-size:12px}
}
</style>
</head>
<body>

<header>
  <h1>App Votes</h1>
  <p>COMMUNITY RANKINGS</p>
</header>

<div id="tabs">
  <button class="active" data-tab="top">TOP VOTED</button>
  <button data-tab="new">NEWEST</button>
  <button data-tab="alpha">A-Z</button>
</div>

<div id="search-row">
  <input type="text" id="search" placeholder="search apps...">
</div>

<div id="list"></div>
<div id="status">loading...</div>
<script>
(function(){

// --- SUPABASE SETUP ---
var SUPA_URL='';
var SUPA_KEY='';
// extract from config script
var cfgScript=document.createElement('script');

// Inline the config values (read from supabase-config.js at build time isn't possible,
// so we load them from the known module)
(function extractConfig(){
  var x=new XMLHttpRequest();
  x.open('GET','/supabase-config.js',false);
  try{
    x.send();
    var txt=x.responseText||'';
    var um=txt.match(/SUPABASE_URL\s*=\s*['"]([^'"]+)/);
    var km=txt.match(/SUPABASE_ANON_KEY\s*=\s*['"]([^'"]+)/);
    if(um)SUPA_URL=um[1];
    if(km)SUPA_KEY=km[1];
  }catch(e){}
})();

var sb=null;
var currentUser=null;
if(SUPA_URL&&SUPA_KEY){
  sb=supabase.createClient(SUPA_URL,SUPA_KEY);
}

// --- APP LIST ---
// We'll fetch the directory listing to get all apps, but since we can't list dirs from frontend,
// we'll work with what the votes table has + a curated approach: fetch all votes grouped,
// then show them. For apps with no votes yet, we hardcode a reasonable set of popular apps.
// Actually we can fetch the app-directory if it exists, or we enumerate known apps.

// Fetch from /api or just use a static list approach: we'll fetch the sloppy.live homepage
// and parse app links. Simpler: just scan votes + show known good apps.

var ALL_APPS=[];
var voteCounts={}; // slug -> count
var userVotes={}; // slug -> true
var currentTab='top';

async function init(){
  // Auth
  if(sb){
    try{
      var{data}=await sb.auth.getSession();
      if(data.session){
        currentUser=data.session.user;
      }else{
        var{data:ad}=await sb.auth.signInAnonymously();
        if(ad.session)currentUser=ad.session.user;
      }
    }catch(e){}
  }

  // Fetch all apps from the app-directory page or homepage
  await loadAppList();

  // Fetch vote counts
  await loadVotes();

  // Fetch user's votes
  if(currentUser)await loadUserVotes();

  render();
  document.getElementById('status').textContent='';
}

async function loadAppList(){
  // Try fetching the main page and extracting app links
  try{
    var x=new XMLHttpRequest();
    x.open('GET','/',false);
    x.send();
    var html=x.responseText||'';
    // Extract href patterns like /app-name/ or href="app-name"
    var re=/href=["']\/([a-z0-9][a-z0-9\-]+)\/?["']/gi;
    var m,seen={};
    while((m=re.exec(html))!==null){
      var slug=m[1];
      if(slug&&slug!=='api'&&slug!=='sloppy-header'&&!seen[slug]){
        seen[slug]=true;
        ALL_APPS.push(slug);
      }
    }
  }catch(e){}

  // If that didn't work well, at least add some known popular apps
  var known=[
    'neon-aquarium','neon-tetris','neon-snake','neon-pong','neon-invaders','neon-asteroids',
    'sloppy-radio','sloppygram','sloppy-chat','karma-board','neon-pacman','neon-drums',
    'scream-board','neon-marble-racer','neon-lava','velocity-surge','gravity-flip',
    'space-invaders','icy-tower','zen-garden','pixel-nebula','lava-lamp','wiki-scout',
    'sloppy-factions','sloppy-feed','breakout-terminal','geometry-dash','neon-runner',
    'neon-dodge','neon-pinball','neon-tower','neon-serpent','solitaire','blackjack',
    'voxel-fps','dino-3d','sloppy-mario','dig-dug','bug-squish','rad-tac-toe',
    'neon-bonsai-garden','cyber-garden','terrarium','zen-terrarium','pixel-studio',
    'neon-sign','neon-tarot','neon-calc','neon-todo','neon-stopwatch',
    'data-pet','pixel-pet','pet-rock','cat-translator','chat-cat',
    'pass-forge','vibe-terminal','sloppy-linux','typewriter',
    'fire-pong','neon-duel','neon-blitz','sky-rush','lunar-descent',
    'cube-drift','concrete-racers','disco-bowl','gun-range','pirate-ship',
    'star-conquest','space-miner','gold-mine','sugar-dungeon','robo-lab'
  ];
  var seen2={};
  ALL_APPS.forEach(function(a){seen2[a]=true});
  known.forEach(function(a){if(!seen2[a]){ALL_APPS.push(a);seen2[a]=true}});

  // Also add any apps that have votes but aren't in our list
  // (will be handled after loadVotes)
}

async function loadVotes(){
  if(!sb)return;
  try{
    // Get vote counts grouped by app_slug
    var{data,error}=await sb.from('app_votes').select('app_slug,vote');
    if(error||!data)return;
    voteCounts={};
    data.forEach(function(row){
      var s=row.app_slug;
      if(!voteCounts[s])voteCounts[s]=0;
      voteCounts[s]+=(row.vote||1);
    });
    // Add any voted apps not in ALL_APPS
    var seen={};
    ALL_APPS.forEach(function(a){seen[a]=true});
    Object.keys(voteCounts).forEach(function(s){
      if(!seen[s]){ALL_APPS.push(s);seen[s]=true}
    });
  }catch(e){}
}

async function loadUserVotes(){
  if(!sb||!currentUser)return;
  try{
    var{data}=await sb.from('app_votes').select('app_slug').eq('user_id',currentUser.id);
    if(data){
      userVotes={};
      data.forEach(function(row){userVotes[row.app_slug]=true});
    }
  }catch(e){}
}

async function castVote(slug){
  if(!sb||!currentUser)return;
  if(userVotes[slug]){
    // Remove vote
    try{
      await sb.from('app_votes').delete().eq('user_id',currentUser.id).eq('app_slug',slug);
      delete userVotes[slug];
      voteCounts[slug]=(voteCounts[slug]||1)-1;
      if(voteCounts[slug]<=0)delete voteCounts[slug];
    }catch(e){}
  }else{
    // Cast vote
    try{
      var{error}=await sb.from('app_votes').insert({app_slug:slug,vote:1,user_id:currentUser.id});
      if(error){
        // Maybe unique constraint — try upsert
        await sb.from('app_votes').upsert({app_slug:slug,vote:1,user_id:currentUser.id},{onConflict:'user_id,app_slug'});
      }
      userVotes[slug]=true;
      voteCounts[slug]=(voteCounts[slug]||0)+1;
    }catch(e){}
  }
  render();
}

function formatSlug(slug){
  return slug.replace(/-/g,' ').replace(/\b\w/g,function(c){return c.toUpperCase()});
}

function getSorted(){
  var apps=ALL_APPS.slice();
  var query=(document.getElementById('search').value||'').toLowerCase().trim();
  if(query){
    apps=apps.filter(function(a){return a.indexOf(query)>=0||formatSlug(a).toLowerCase().indexOf(query)>=0});
  }
  if(currentTab==='top'){
    apps.sort(function(a,b){return(voteCounts[b]||0)-(voteCounts[a]||0)||a.localeCompare(b)});
  }else if(currentTab==='alpha'){
    apps.sort();
  }else if(currentTab==='new'){
    // Reverse of default order (newest added last in our list, so reverse)
    apps.reverse();
  }
  return apps;
}

function render(){
  var list=document.getElementById('list');
  var apps=getSorted();
  var html='';
  apps.forEach(function(slug,i){
    var count=voteCounts[slug]||0;
    var voted=!!userVotes[slug];
    var rankClass=currentTab==='top'?(i===0?'gold':i===1?'silver':i===2?'bronze':''):'';
    html+='<div class="app-row">';
    html+='<div class="rank '+rankClass+'">'+(i+1)+'</div>';
    html+='<div class="app-info">';
    html+='<div class="app-name" data-slug="'+slug+'">'+formatSlug(slug)+'</div>';
    html+='<div class="vote-count">'+count+' vote'+(count!==1?'s':'')+'</div>';
    html+='</div>';
    html+='<button class="vote-btn'+(voted?' voted':'')+'" data-slug="'+slug+'">';
    html+='<span class="arrow">'+(voted?'&#9650;':'&#9651;')+'</span>'+count;
    html+='</button>';
    html+='</div>';
  });
  if(apps.length===0)html='<div id="status">no apps found</div>';
  list.innerHTML=html;
}

// --- EVENT DELEGATION ---
document.getElementById('list').addEventListener('click',function(e){
  var btn=e.target.closest('.vote-btn');
  if(btn){
    var slug=btn.dataset.slug;
    if(slug)castVote(slug);
    return;
  }
  var name=e.target.closest('.app-name');
  if(name){
    var slug=name.dataset.slug;
    if(slug)window.open('/'+slug+'/','_blank');
  }
});

// Tabs
document.getElementById('tabs').addEventListener('click',function(e){
  var btn=e.target.closest('button');
  if(!btn)return;
  currentTab=btn.dataset.tab;
  document.querySelectorAll('#tabs button').forEach(function(b){b.classList.toggle('active',b===btn)});
  render();
});

// Search
document.getElementById('search').addEventListener('input',function(){render()});

init();

})();
</script>
<script src="/sloppy-header/sloppy-bar.js"></script>
</body>
</html>
