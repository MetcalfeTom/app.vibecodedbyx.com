<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cozy Campfire</title>
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%94%A5">
<meta name="description" content="A small interactive campfire with soft crackling and a warm lantern beside it. Click the fire to stoke it, the lantern to dim it.">
<meta property="og:title" content="Cozy Campfire">
<meta property="og:description" content="A small interactive campfire with soft crackling and a warm lantern beside it. Click the fire to stoke it, the lantern to dim it.">
<meta property="og:url" content="https://sloppy.live/cozy-campfire">
<meta property="og:image" content="https://image.pollinations.ai/prompt/cozy%20pixel%20campfire%20at%20night%20with%20vintage%20amber%20lantern%20on%20dark%20pine%20forest%20floor%20warm%20glow?width=1200&height=630&nologo=true&model=flux">
<meta property="og:type" content="website">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,500;1,400;1,500&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --night:#02060c;
  --teal:#061a26;
  --moon:#cfe4f3;
  --amber:#f5c453;
  --amber-deep:#c47a14;
  --ember:#ff6a22;
  --cream:#f3e8c8;
  --moss:#3a5a48;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{min-height:100vh;background:var(--night);color:var(--cream);font-family:'Fraunces',serif;overflow:hidden}
body{
  background:radial-gradient(ellipse at 50% 35%, #0a2030 0%, #02060c 70%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:0.8rem;
}
header{
  width:100%;max-width:60rem;
  display:flex;justify-content:space-between;align-items:baseline;
  margin-bottom:0.4rem;gap:0.6rem;flex-wrap:wrap;
}
h1{
  font-family:'Fraunces',serif;font-style:italic;font-weight:500;
  font-size:clamp(1.6rem, 4vw, 2.3rem);
  color:var(--amber);letter-spacing:-0.01em;
  text-shadow:0 0 14px rgba(245,196,83,0.4);
}
.tag{
  font-family:'JetBrains Mono',monospace;font-size:0.7rem;
  letter-spacing:0.22em;color:#7a8898;text-transform:uppercase;
}
.stage-wrap{
  position:relative;width:100%;max-width:60rem;aspect-ratio:16/9;
  background:#000;border:3px solid #0a1a26;border-radius:6px;
  box-shadow:
    inset 0 0 0 1px rgba(0,0,0,0.5),
    inset 0 0 80px rgba(0,0,0,0.7),
    0 12px 40px rgba(0,0,0,0.6);
  overflow:hidden;
}
canvas{display:block;width:100%;height:100%;cursor:pointer}
.hint{
  position:absolute;left:50%;bottom:0.8rem;transform:translateX(-50%);
  font-family:'Fraunces',serif;font-style:italic;
  font-size:0.94rem;color:var(--cream);
  text-shadow:0 0 8px rgba(0,0,0,0.7), 0 1px 2px rgba(0,0,0,0.6);
  pointer-events:none;opacity:0.85;
  background:rgba(0,0,0,0.25);padding:0.25rem 0.7rem;border-radius:14px;
}
footer{
  margin-top:0.6rem;
  font-family:'JetBrains Mono',monospace;font-size:0.66rem;
  letter-spacing:0.2em;color:#5a6a78;text-transform:uppercase;
}
@media (prefers-reduced-motion: reduce){
  body{background:#02060c}
}
</style>
</head>
<body>
<header>
  <h1>cozy campfire</h1>
  <span class="tag">click the fire · click the lantern</span>
</header>
<div class="stage-wrap">
  <canvas id="stage" width="960" height="540" role="application" aria-label="A small campfire and a glowing lantern in a dark forest clearing. Click the fire to stoke it, click the lantern to dim it."></canvas>
  <div class="hint" id="hint">sit a while</div>
</div>
<footer>06 · all sound synthesized in-browser</footer>

<script>
'use strict';

const cv = document.getElementById('stage');
const ctx = cv.getContext('2d');
const W = 960, H = 540;

// ── AUDIO — crackling fire bed + occasional pops ─────────────
let actx = null, master = null, crackleNode = null, crackleGain = null;
let lanternHum = null, lanternHumGain = null;
function ensureAudio(){
  if (actx) return;
  actx = new (window.AudioContext || window.webkitAudioContext)();
  master = actx.createGain(); master.gain.value = 0.7;
  master.connect(actx.destination);
  // Continuous noise bed → bandpass + lowpass → crackle base
  const noiseBuf = actx.createBuffer(1, actx.sampleRate * 2, actx.sampleRate);
  const data = noiseBuf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1);
  crackleNode = actx.createBufferSource();
  crackleNode.buffer = noiseBuf;
  crackleNode.loop = true;
  const bp = actx.createBiquadFilter();
  bp.type = 'bandpass'; bp.frequency.value = 950; bp.Q.value = 0.55;
  const lp = actx.createBiquadFilter();
  lp.type = 'lowpass'; lp.frequency.value = 2800;
  crackleGain = actx.createGain(); crackleGain.gain.value = 0;
  crackleNode.connect(bp).connect(lp).connect(crackleGain).connect(master);
  crackleNode.start();
  // Lantern hum — soft 60Hz sine, only when lantern is on
  lanternHum = actx.createOscillator();
  lanternHum.type = 'sine'; lanternHum.frequency.value = 62;
  lanternHumGain = actx.createGain(); lanternHumGain.gain.value = 0;
  lanternHum.connect(lanternHumGain).connect(master);
  lanternHum.start();
}
function fadeCrackle(level){
  if (!actx) return;
  const t = actx.currentTime;
  crackleGain.gain.cancelScheduledValues(t);
  crackleGain.gain.setValueAtTime(crackleGain.gain.value, t);
  crackleGain.gain.linearRampToValueAtTime(level, t + 0.4);
}
function fadeLantern(level){
  if (!actx) return;
  const t = actx.currentTime;
  lanternHumGain.gain.cancelScheduledValues(t);
  lanternHumGain.gain.setValueAtTime(lanternHumGain.gain.value, t);
  lanternHumGain.gain.linearRampToValueAtTime(level, t + 0.5);
}
// One-shot crackle pop — short bandpass-noise click
function sfxPop(intensity){
  if (!actx) return;
  const t = actx.currentTime;
  const len = 0.05 + Math.random() * 0.08;
  const nb = actx.createBuffer(1, Math.floor(actx.sampleRate * len), actx.sampleRate);
  const d = nb.getChannelData(0);
  for (let i = 0; i < d.length; i++){
    const k = i / d.length;
    d[i] = (Math.random() * 2 - 1) * Math.pow(1 - k, 1.4);
  }
  const ns = actx.createBufferSource(); ns.buffer = nb;
  const bp = actx.createBiquadFilter(); bp.type = 'bandpass';
  bp.frequency.value = 1200 + Math.random() * 1600; bp.Q.value = 4;
  const g = actx.createGain();
  g.gain.setValueAtTime(0.04 + 0.08 * intensity, t);
  g.gain.exponentialRampToValueAtTime(0.0001, t + len);
  ns.connect(bp).connect(g).connect(master);
  ns.start(t); ns.stop(t + len + 0.02);
}
function sfxLanternClick(on){
  if (!actx) return;
  const t = actx.currentTime;
  const o = actx.createOscillator(); o.type = 'square';
  o.frequency.setValueAtTime(on ? 240 : 320, t);
  o.frequency.exponentialRampToValueAtTime(on ? 360 : 180, t + 0.08);
  const g = actx.createGain(); g.gain.setValueAtTime(0.0001, t);
  g.gain.exponentialRampToValueAtTime(0.06, t + 0.005);
  g.gain.exponentialRampToValueAtTime(0.0001, t + 0.1);
  o.connect(g).connect(master); o.start(t); o.stop(t + 0.12);
}

// ── SCENE / STATE ────────────────────────────────────────────
const fire = {
  x: W * 0.42, y: H * 0.70,
  intensity: 0.8,      // 0..1; click to stoke up
  flameSeeds: Array.from({length: 18}, () => Math.random() * 1000),
  lastPop: 0,
};
const lantern = {
  x: W * 0.72, y: H * 0.62,   // base centre
  on: true,
  brightness: 1,      // smoothed toward `on` ? 1 : 0
  pulse: Math.random() * 6.28,
};
const sparks = [];
const smoke = [];
const stars = [];
for (let i = 0; i < 90; i++){
  stars.push({
    x: Math.random() * W,
    y: Math.random() * (H * 0.55),
    r: 0.4 + Math.random() * 1.2,
    twinkle: Math.random() * 6.28,
  });
}
const hintEl = document.getElementById('hint');
let hintHidden = false;
function hideHint(){
  if (hintHidden) return;
  hintHidden = true;
  hintEl.style.transition = 'opacity 0.8s';
  hintEl.style.opacity = '0';
}

// ── INTERACTION ──────────────────────────────────────────────
function cursorFromEvent(ev){
  const r = cv.getBoundingClientRect();
  return {
    x: (ev.clientX - r.left) / r.width * W,
    y: (ev.clientY - r.top)  / r.height * H,
  };
}
function distSq(ax, ay, bx, by){ const dx = ax - bx, dy = ay - by; return dx*dx + dy*dy; }

cv.addEventListener('click', (ev) => {
  ensureAudio();
  if (actx && actx.state === 'suspended') actx.resume();
  hideHint();
  const c = cursorFromEvent(ev);
  // Lantern hit? (a generous box around the lantern body)
  if (distSq(c.x, c.y, lantern.x, lantern.y - 38) < 50 * 50){
    lantern.on = !lantern.on;
    sfxLanternClick(lantern.on);
    fadeLantern(lantern.on ? 0.012 : 0);
    return;
  }
  // Fire hit? (within 80px of the pit centre)
  if (distSq(c.x, c.y, fire.x, fire.y) < 110 * 110){
    fire.intensity = Math.min(1.2, fire.intensity + 0.3);
    // burst of sparks + a couple of strong pops
    for (let i = 0; i < 18; i++) spawnSpark();
    sfxPop(0.9); setTimeout(() => sfxPop(0.7), 120);
  }
});

// ── PARTICLES ────────────────────────────────────────────────
function spawnSpark(){
  const ang = -Math.PI/2 + (Math.random() - 0.5) * 0.9;
  const sp  = 60 + Math.random() * 90;
  sparks.push({
    x: fire.x + (Math.random() - 0.5) * 24,
    y: fire.y - 4,
    vx: Math.cos(ang) * sp * 0.6 + (Math.random() - 0.5) * 30,
    vy: Math.sin(ang) * sp,
    life: 0, max: 0.9 + Math.random() * 0.6,
    r: 0.6 + Math.random() * 1.1,
    hue: 18 + Math.random() * 24,
  });
}
function spawnSmoke(){
  smoke.push({
    x: fire.x + (Math.random() - 0.5) * 18,
    y: fire.y - 16,
    vx: (Math.random() - 0.5) * 14,
    vy: -22 - Math.random() * 14,
    life: 0, max: 2.6 + Math.random() * 0.8,
    r: 8 + Math.random() * 6,
  });
}

let lastTs = 0;
function loop(ts){
  const dt = Math.min(0.05, (ts - lastTs || 16) / 1000);
  lastTs = ts;
  // Fire intensity decays a bit toward a baseline 0.55
  const baseline = 0.55;
  fire.intensity += (baseline - fire.intensity) * dt * 0.18;
  // Lantern brightness eases toward target
  const lanTarget = lantern.on ? 1 : 0;
  lantern.brightness += (lanTarget - lantern.brightness) * dt * 4;
  lantern.pulse += dt * (2 + lantern.brightness * 0.4);
  // Audio crackle level follows intensity
  fadeCrackle(0.04 + fire.intensity * 0.08);
  // Periodic crackle pops driven by intensity (~ 0.6–2 / sec)
  if (performance.now() - fire.lastPop > 1000 / (0.6 + fire.intensity * 1.6)){
    fire.lastPop = performance.now();
    if (actx) sfxPop(0.3 + fire.intensity * 0.5);
  }
  // Spawn ambient sparks + smoke
  if (Math.random() < dt * (2 + fire.intensity * 6)) spawnSpark();
  if (Math.random() < dt * (2 + fire.intensity * 2)) spawnSmoke();
  // Age sparks
  for (const s of sparks){
    s.life += dt;
    s.x += s.vx * dt;
    s.y += s.vy * dt;
    s.vy += 36 * dt;   // gravity-ish, but they cool/rise so light
    s.vx *= 0.99;
  }
  for (let i = sparks.length - 1; i >= 0; i--) if (sparks[i].life >= sparks[i].max) sparks.splice(i, 1);
  // Age smoke
  for (const s of smoke){
    s.life += dt;
    s.x += s.vx * dt;
    s.y += s.vy * dt;
    s.vy *= 0.985;
    s.r += 18 * dt;
  }
  for (let i = smoke.length - 1; i >= 0; i--) if (smoke[i].life >= smoke[i].max) smoke.splice(i, 1);
  render(ts);
  requestAnimationFrame(loop);
}

// ── RENDER ───────────────────────────────────────────────────
function render(ts){
  // sky/forest
  const sky = ctx.createLinearGradient(0, 0, 0, H);
  sky.addColorStop(0, '#02060c');
  sky.addColorStop(0.5, '#061a26');
  sky.addColorStop(0.78, '#0a2638');
  sky.addColorStop(1, '#040a10');
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, H);

  // stars (twinkling)
  for (const s of stars){
    s.twinkle += 0.02;
    const a = 0.4 + Math.sin(s.twinkle) * 0.35;
    ctx.fillStyle = 'rgba(207,228,243,' + a.toFixed(3) + ')';
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  }

  // forest silhouette — irregular conifer-ish shapes across horizon
  ctx.fillStyle = '#020a10';
  ctx.beginPath();
  ctx.moveTo(0, H * 0.62);
  let x = 0;
  while (x < W){
    const treeW = 30 + Math.sin(x * 0.13) * 18 + Math.random() * 6;
    const treeH = 40 + Math.sin(x * 0.07 + 1.2) * 30 + (Math.cos(x * 0.21) + 1) * 18;
    ctx.lineTo(x + treeW * 0.3, H * 0.62 - treeH * 0.5);
    ctx.lineTo(x + treeW * 0.6, H * 0.62 - treeH);
    ctx.lineTo(x + treeW * 0.9, H * 0.62 - treeH * 0.6);
    ctx.lineTo(x + treeW, H * 0.62 - 4);
    x += treeW;
  }
  ctx.lineTo(W, H);
  ctx.lineTo(0, H);
  ctx.closePath();
  ctx.fill();

  // ground
  const ground = ctx.createLinearGradient(0, H * 0.62, 0, H);
  ground.addColorStop(0, '#0e1820');
  ground.addColorStop(1, '#02060a');
  ctx.fillStyle = ground;
  ctx.fillRect(0, H * 0.62, W, H * 0.38);

  // Fire ground glow (warm halo cast on the dirt)
  drawGroundGlow(fire.x, fire.y + 14, 180 * fire.intensity, 'rgba(255,138,40,', 0.32);
  // Lantern ground glow
  if (lantern.brightness > 0.02){
    drawGroundGlow(lantern.x, lantern.y + 8, 140 * lantern.brightness, 'rgba(245,196,83,', 0.28);
  }

  // Stones around fire pit
  drawFirePitStones();
  // Logs in the fire pit (cross-stacked)
  drawLogs();

  // Flames (additive)
  ctx.globalCompositeOperation = 'lighter';
  drawFlames(ts / 1000);
  ctx.globalCompositeOperation = 'source-over';

  // Smoke (above flames)
  for (const s of smoke){
    const k = s.life / s.max;
    const a = (1 - k) * 0.35;
    const g = ctx.createRadialGradient(s.x, s.y, 0, s.x, s.y, s.r);
    g.addColorStop(0, 'rgba(180,170,160,' + a.toFixed(3) + ')');
    g.addColorStop(1, 'rgba(120,110,100,0)');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  }

  // Sparks (additive)
  ctx.globalCompositeOperation = 'lighter';
  for (const s of sparks){
    const k = s.life / s.max;
    const a = (1 - k);
    ctx.fillStyle = 'hsla(' + s.hue + ',95%,65%,' + a.toFixed(3) + ')';
    ctx.shadowColor = 'rgba(255,180,60,0.85)'; ctx.shadowBlur = 5;
    ctx.fillRect(s.x - s.r/2, s.y - s.r/2, s.r, s.r);
    ctx.shadowBlur = 0;
  }
  ctx.globalCompositeOperation = 'source-over';

  // Lantern
  drawLantern();

  // Vignette
  const vig = ctx.createRadialGradient(W/2, H*0.6, Math.min(W,H)*0.35, W/2, H*0.6, Math.max(W,H)*0.7);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);
}

function drawGroundGlow(cx, cy, r, base, alpha){
  const g = ctx.createRadialGradient(cx, cy, 8, cx, cy, r);
  g.addColorStop(0, base + alpha + ')');
  g.addColorStop(1, base + '0)');
  ctx.fillStyle = g;
  ctx.beginPath();
  ctx.ellipse(cx, cy, r, r * 0.45, 0, 0, Math.PI*2);
  ctx.fill();
}

function drawFirePitStones(){
  const positions = [
    [-58, 16, 22], [-32, 24, 24], [-2, 26, 20],
    [28, 24, 24], [56, 18, 22], [44, 6, 16],
    [-44, 4, 18], [-18, 30, 18], [12, 30, 18],
  ];
  for (const [dx, dy, r] of positions){
    const x = fire.x + dx, y = fire.y + dy;
    // stone body
    const g = ctx.createRadialGradient(x - r*0.3, y - r*0.4, r * 0.1, x, y, r);
    g.addColorStop(0, '#7a7682');
    g.addColorStop(0.6, '#4a4652');
    g.addColorStop(1, '#1a1820');
    ctx.fillStyle = g;
    ctx.beginPath(); ctx.ellipse(x, y, r, r * 0.78, 0, 0, Math.PI*2); ctx.fill();
    // warm rim light from the fire
    ctx.fillStyle = 'rgba(255,130,40,' + (0.18 + 0.2 * fire.intensity).toFixed(3) + ')';
    ctx.beginPath(); ctx.ellipse(x, y - 2, r * 0.7, r * 0.4, 0, Math.PI*0.85, Math.PI*0.15, true); ctx.fill();
  }
}

function drawLogs(){
  // 3 charred logs cross-stacked
  const logs = [
    { ang:  0.18, len: 95, w: 14 },
    { ang: -0.22, len: 88, w: 14 },
    { ang:  0.42, len: 78, w: 12 },
  ];
  for (const L of logs){
    ctx.save();
    ctx.translate(fire.x, fire.y + 4);
    ctx.rotate(L.ang);
    // body
    ctx.fillStyle = '#1a0e08';
    ctx.fillRect(-L.len/2, -L.w/2, L.len, L.w);
    // ember glow on top
    const g = ctx.createLinearGradient(0, -L.w/2, 0, L.w/2);
    g.addColorStop(0, 'rgba(255,100,30,' + (0.5 + 0.4 * fire.intensity).toFixed(3) + ')');
    g.addColorStop(0.4, 'rgba(255,150,40,' + (0.15 + 0.2 * fire.intensity).toFixed(3) + ')');
    g.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = g;
    ctx.fillRect(-L.len/2, -L.w/2, L.len, L.w);
    // wood grain ticks
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    for (let i = -L.len/2 + 6; i < L.len/2 - 4; i += 7){
      ctx.fillRect(i, -L.w/2 + 2, 1, L.w - 4);
    }
    // bright tips
    ctx.fillStyle = 'rgba(255,200,80,0.55)';
    ctx.fillRect(-L.len/2 - 2, -L.w/2, 3, L.w);
    ctx.fillRect(L.len/2 - 1, -L.w/2, 3, L.w);
    ctx.restore();
  }
}

function drawFlames(t){
  // multi-layer flame: outer red, middle orange, inner yellow tips
  const layers = [
    { color: 'rgba(255,70,30,', alpha: 0.55, r: 56, rise: 80 },
    { color: 'rgba(255,140,40,', alpha: 0.65, r: 42, rise: 100 },
    { color: 'rgba(255,210,80,', alpha: 0.7,  r: 28, rise: 120 },
    { color: 'rgba(255,250,200,', alpha: 0.55, r: 14, rise: 140 },
  ];
  for (const L of layers){
    for (let k = 0; k < 7; k++){
      const seed = fire.flameSeeds[k % fire.flameSeeds.length];
      const wob = Math.sin(t * 2.4 + seed) * 7 + Math.cos(t * 3.6 + seed * 1.7) * 5;
      const flicker = 0.7 + Math.sin(t * 9 + seed) * 0.2;
      const cx = fire.x + wob + (k - 3) * 6;
      const cy = fire.y - L.rise * fire.intensity * (0.6 + 0.4 * flicker);
      const ry = (L.r + 8) * fire.intensity * (0.8 + 0.2 * flicker);
      const rx = L.r * (0.55 + 0.35 * flicker);
      const g = ctx.createRadialGradient(cx, cy + ry*0.4, 4, cx, cy, ry);
      g.addColorStop(0, L.color + (L.alpha * fire.intensity).toFixed(3) + ')');
      g.addColorStop(1, L.color + '0)');
      ctx.fillStyle = g;
      ctx.beginPath();
      ctx.ellipse(cx, cy + ry * 0.2, rx, ry, 0, 0, Math.PI*2);
      ctx.fill();
    }
  }
}

function drawLantern(){
  const lx = lantern.x, ly = lantern.y;
  // standing on a small flat rock
  ctx.fillStyle = '#1a1a20';
  ctx.beginPath(); ctx.ellipse(lx, ly + 12, 30, 6, 0, 0, Math.PI*2); ctx.fill();

  // handle (loops above the cap)
  ctx.strokeStyle = '#0a0608'; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(lx - 12, ly - 60); ctx.quadraticCurveTo(lx, ly - 80, lx + 12, ly - 60); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(lx - 12, ly - 60); ctx.lineTo(lx - 12, ly - 52); ctx.moveTo(lx + 12, ly - 60); ctx.lineTo(lx + 12, ly - 52); ctx.stroke();

  // cap (top dome)
  ctx.fillStyle = '#2a1a10';
  ctx.beginPath();
  ctx.moveTo(lx - 18, ly - 52);
  ctx.lineTo(lx + 18, ly - 52);
  ctx.lineTo(lx + 12, ly - 60);
  ctx.lineTo(lx - 12, ly - 60);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#0a0608'; ctx.lineWidth = 1.5;
  ctx.stroke();

  // glass body — amber gradient when on, dim grey when off
  const bx = lx - 16, by = ly - 52, bw = 32, bh = 44;
  const on = lantern.brightness;
  const pulse = 0.92 + Math.sin(lantern.pulse * 3) * 0.08;
  const innerR = Math.max(8, 32 * pulse);
  ctx.save();
  ctx.beginPath();
  ctx.rect(bx, by, bw, bh);
  ctx.clip();
  // background — even when off the glass shows
  ctx.fillStyle = '#1a1410';
  ctx.fillRect(bx, by, bw, bh);
  // amber inner glow
  if (on > 0.02){
    const ig = ctx.createRadialGradient(lx, by + bh/2, 2, lx, by + bh/2, innerR);
    ig.addColorStop(0, 'rgba(255,232,160,' + (0.95 * on).toFixed(3) + ')');
    ig.addColorStop(0.4, 'rgba(245,196,83,' + (0.7 * on).toFixed(3) + ')');
    ig.addColorStop(1, 'rgba(196,122,20,' + (0.0).toFixed(3) + ')');
    ctx.fillStyle = ig;
    ctx.fillRect(bx, by, bw, bh);
    // wick stub
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.fillRect(lx - 1, by + bh*0.55 - 6, 2, 8);
  }
  ctx.restore();
  // glass frame
  ctx.strokeStyle = '#0a0608'; ctx.lineWidth = 2;
  ctx.strokeRect(bx, by, bw, bh);
  // cross brace
  ctx.beginPath();
  ctx.moveTo(bx, by + bh * 0.5); ctx.lineTo(bx + bw, by + bh * 0.5);
  ctx.moveTo(bx + bw * 0.5, by); ctx.lineTo(bx + bw * 0.5, by + bh);
  ctx.stroke();

  // base (foot)
  ctx.fillStyle = '#2a1a10';
  ctx.fillRect(lx - 20, ly - 8, 40, 6);
  ctx.fillStyle = '#1a0e08';
  ctx.fillRect(lx - 16, ly - 12, 32, 4);

  // soft glow halo when lit
  if (on > 0.02){
    ctx.globalCompositeOperation = 'lighter';
    const halo = ctx.createRadialGradient(lx, by + bh/2, 4, lx, by + bh/2, 130 * on);
    halo.addColorStop(0, 'rgba(245,196,83,' + (0.45 * on * pulse).toFixed(3) + ')');
    halo.addColorStop(1, 'rgba(245,196,83,0)');
    ctx.fillStyle = halo;
    ctx.beginPath(); ctx.arc(lx, by + bh/2, 130 * on, 0, Math.PI*2); ctx.fill();
    ctx.globalCompositeOperation = 'source-over';
  }
}

requestAnimationFrame(loop);
</script>
</body>
