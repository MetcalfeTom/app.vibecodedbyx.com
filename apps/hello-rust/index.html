<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>hello, rust</title>
<meta name="description" content="A minimal Rust hello-world. Typewriter compile, ferris-orange aesthetic." />
<meta property="og:title" content="hello, rust" />
<meta property="og:description" content="A minimal Rust hello-world. Typewriter compile, ferris-orange aesthetic." />
<meta property="og:url" content="https://sloppy.live/hello-rust" />
<meta property="og:image" content="https://image.pollinations.ai/prompt/minimal%20rust%20programming%20language%20ferris%20crab%20orange%20black%20terminal%20typewriter%20cargo%20build%20cyberpunk?width=1200&height=630&nologo=true" />
<link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%A6%80" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600&family=Major+Mono+Display&family=Newsreader:ital,wght@1,300&display=swap" rel="stylesheet" />
<style>
  :root{
    --bg:#0a0807;
    --panel:#13100e;
    --rust:#dea584;
    --rust-deep:#b07050;
    --rust-bright:#f5b994;
    --ink:#f3ece3;
    --dim:#7d6c5e;
    --green:#7eb86b;
    --line:rgba(222,165,132,0.12);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(900px 600px at 80% 10%, rgba(222,165,132,0.10), transparent 60%),
      radial-gradient(1100px 700px at 10% 90%, rgba(176,112,80,0.08), transparent 60%),
      var(--bg);
    color:var(--ink);
    font-family:'Fira Code', monospace;
    min-height:100vh;
    display:grid;
    place-items:center;
    padding:32px 18px;
  }
  .stage{
    width:min(720px, 100%);
    display:flex;
    flex-direction:column;
    gap:22px;
  }
  header{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    gap:16px;
    flex-wrap:wrap;
  }
  .brand{
    font-family:'Major Mono Display', monospace;
    font-size:clamp(28px, 5vw, 44px);
    color:var(--rust-bright);
    letter-spacing:0.04em;
  }
  .brand em{
    font-style:normal;
    color:var(--rust);
  }
  .tag{
    font-size:11px;
    letter-spacing:0.32em;
    text-transform:uppercase;
    color:var(--dim);
  }
  .editor{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:6px;
    overflow:hidden;
    box-shadow:0 30px 60px -30px rgba(0,0,0,0.7), inset 0 0 0 1px rgba(245,185,148,0.04);
  }
  .editor-bar{
    display:flex;
    align-items:center;
    gap:8px;
    padding:9px 14px;
    border-bottom:1px solid var(--line);
    font-size:11px;
    color:var(--dim);
    letter-spacing:0.18em;
    text-transform:uppercase;
  }
  .dot{
    width:10px;height:10px;border-radius:50%;
    background:var(--rust-deep);
    flex-shrink:0;
  }
  .dot:nth-child(2){background:#3a322c}
  .dot:nth-child(3){background:#3a322c}
  .file{margin-left:8px;font-family:'Fira Code', monospace}
  .code{
    padding:22px 24px;
    font-size:15px;
    line-height:1.7;
    white-space:pre;
    overflow-x:auto;
    min-height:200px;
  }
  .ln{
    display:inline-block;
    width:22px;
    color:var(--dim);
    user-select:none;
  }
  .kw{color:var(--rust)}
  .fn{color:var(--rust-bright)}
  .str{color:var(--green)}
  .punct{color:var(--ink)}
  .macro{color:#e0a060}
  .caret{
    display:inline-block;
    width:8px;
    height:18px;
    background:var(--rust-bright);
    vertical-align:-3px;
    margin-left:1px;
    animation:blink 1s steps(1) infinite;
  }
  @keyframes blink{50%{opacity:0}}
  .controls{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
  }
  button{
    background:transparent;
    border:1px solid var(--rust-deep);
    color:var(--rust-bright);
    font-family:'Fira Code', monospace;
    font-size:13px;
    padding:9px 16px;
    border-radius:4px;
    cursor:pointer;
    letter-spacing:0.06em;
    transition:all 0.18s;
  }
  button:hover{
    background:rgba(222,165,132,0.08);
    border-color:var(--rust-bright);
    transform:translateY(-1px);
  }
  button:disabled{
    opacity:0.4;
    cursor:not-allowed;
    transform:none;
  }
  .out{
    background:var(--panel);
    border:1px solid var(--line);
    border-radius:6px;
    padding:18px 24px;
    font-size:14px;
    color:var(--dim);
    min-height:84px;
    line-height:1.7;
  }
  .out .ok{color:var(--green)}
  .out .out-line{color:var(--rust-bright);font-size:18px;margin-top:6px}
  .crab{
    font-size:22px;
    margin-right:8px;
  }
  .footer{
    display:flex;
    justify-content:space-between;
    align-items:baseline;
    gap:14px;
    flex-wrap:wrap;
    color:var(--dim);
    font-size:11px;
    letter-spacing:0.2em;
    text-transform:uppercase;
  }
  .footer em{
    font-family:'Newsreader', serif;
    font-style:italic;
    text-transform:none;
    letter-spacing:0;
    font-size:14px;
    color:var(--rust);
  }
  @media (max-width:520px){
    .code{font-size:13px;padding:18px 16px}
    .out{padding:14px 16px}
  }
</style>
</head>
<body>
<div class="stage">
  <header>
    <div class="brand">hello,<em>·rust</em></div>
    <div class="tag">№ 01 · ferris dispatch</div>
  </header>
  <div class="editor">
    <div class="editor-bar">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      <span class="file">src/main.rs</span>
    </div>
    <div class="code" id="code"></div>
  </div>
  <div class="controls">
    <button id="run">cargo run</button>
    <button id="reset">reset</button>
  </div>
  <div class="out" id="out">
    <div>$ <span style="color:var(--ink)">cargo run</span></div>
    <div class="dim">// press cargo run to compile</div>
  </div>
  <div class="footer">
    <span>RUSTC 1.84 · STABLE</span>
    <em>borrow checked. heap free. greeting safe.</em>
  </div>
</div>

<script>
const SRC = [
  ['fn ', 'kw'], ['main', 'fn'], ['()', 'punct'], [' {', 'punct'], ['\n'],
  ['    ', 'punct'], ['println!', 'macro'], ['(', 'punct'],
  ['"Hello, world!"', 'str'], [')', 'punct'], [';', 'punct'], ['\n'],
  ['}', 'punct'],
];

const codeEl = document.getElementById('code');
const outEl = document.getElementById('out');
const runBtn = document.getElementById('run');
const resetBtn = document.getElementById('reset');

let typing = false;

function typewrite(){
  if(typing) return;
  typing = true;
  codeEl.innerHTML = '<span class="ln">1</span>';
  let i = 0, line = 1;
  const tick = () => {
    if(i >= SRC.length){
      codeEl.innerHTML += '<span class="caret"></span>';
      typing = false;
      return;
    }
    const [tok, cls] = SRC[i];
    if(tok === '\n'){
      line++;
      codeEl.innerHTML += '\n' + `<span class="ln">${line}</span>`;
    } else {
      codeEl.innerHTML += `<span class="${cls||'punct'}">${tok}</span>`;
    }
    i++;
    setTimeout(tick, 28 + Math.random()*40);
  };
  tick();
}

function compile(){
  outEl.innerHTML = `
    <div>$ <span style="color:var(--ink)">cargo run</span></div>
    <div style="color:var(--dim)">   Compiling hello v0.1.0 (/sloppy/hello)</div>
  `;
  setTimeout(() => {
    outEl.innerHTML += `<div style="color:var(--dim)">    Finished <span class="ok">dev</span> [unoptimized + debuginfo] target(s)</div>`;
  }, 360);
  setTimeout(() => {
    outEl.innerHTML += `<div style="color:var(--dim)">     Running \`target/debug/hello\`</div>`;
  }, 700);
  setTimeout(() => {
    outEl.innerHTML += `<div class="out-line"><span class="crab">🦀</span>Hello, world!</div>`;
  }, 1100);
}

runBtn.addEventListener('click', compile);
resetBtn.addEventListener('click', () => {
  outEl.innerHTML = `
    <div>$ <span style="color:var(--ink)">cargo run</span></div>
    <div style="color:var(--dim)">// press cargo run to compile</div>
  `;
  typewrite();
});

typewrite();
</script>
</body>
</html>
