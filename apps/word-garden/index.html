<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Word Garden</title>
  <link rel="icon" href="https://emojicdn.elk.sh/%F0%9F%8C%B8">
  <meta name="description" content="Type to grow neon flowers. Every unique word is a bloom. Go quiet too long and they crumble to grey dust.">
  <meta property="og:title" content="Word Garden">
  <meta property="og:description" content="A midnight meadow that blooms with your vocabulary. Keep typing or the neon petals fade to dust.">
  <meta property="og:url" content="https://sloppy.live/word-garden">
  <meta property="og:image" content="https://image.pollinations.ai/prompt/neon%20flowers%20midnight%20meadow%20dark%20indigo%20glowing%20petals%20magenta%20cyan%20violet%20surreal?width=1200&height=630&nologo=true">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=IBM+Plex+Mono:wght@300;500&family=DotGothic16&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-0: #050214;
      --bg-1: #0c0728;
      --bg-2: #13123a;
      --soil: #18110a;
      --ink: #eadfff;
      --muted: rgba(234, 223, 255, 0.55);
      --line: rgba(234, 223, 255, 0.14);
      --firefly: #ffe6a3;
      --accent: #ff79c6;
      --moss: #9aff9c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; }
    body {
      font-family: 'IBM Plex Mono', ui-monospace, monospace;
      color: var(--ink);
      background:
        radial-gradient(ellipse at 20% 0%, rgba(255, 121, 198, 0.14), transparent 50%),
        radial-gradient(ellipse at 80% 5%, rgba(154, 255, 156, 0.08), transparent 55%),
        linear-gradient(180deg, var(--bg-0) 0%, var(--bg-1) 55%, var(--bg-2) 100%);
      min-height: 100vh;
      -webkit-user-select: none;
      user-select: none;
    }
    #app { position: fixed; inset: 0; }
    canvas {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      display: block;
    }
    header {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 22px 36px 0;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 18px;
      z-index: 4;
      pointer-events: none;
    }
    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
      font-style: italic;
      font-size: clamp(32px, 4vw, 50px);
      line-height: 1;
      letter-spacing: -0.01em;
      color: var(--ink);
      text-shadow: 0 0 16px rgba(255, 121, 198, 0.35);
    }
    h1 em {
      font-style: normal;
      color: var(--accent);
      text-shadow: 0 0 22px rgba(255, 121, 198, 0.55);
    }
    .sub {
      font-size: 10px;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 6px;
      font-weight: 300;
    }
    .hud {
      display: flex;
      gap: 18px;
      pointer-events: auto;
    }
    .stat {
      min-width: 88px;
      padding: 10px 14px;
      border: 1px solid var(--line);
      border-radius: 2px;
      background: rgba(5, 2, 20, 0.55);
      backdrop-filter: blur(6px);
      display: flex;
      flex-direction: column;
      align-items: flex-end;
    }
    .stat .k {
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .stat .v {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 26px;
      line-height: 1.05;
      color: var(--ink);
      margin-top: 2px;
    }
    .stat.bloom .v { color: var(--accent); text-shadow: 0 0 14px rgba(255, 121, 198, 0.5); }
    .stat.green .v { color: var(--moss); text-shadow: 0 0 14px rgba(154, 255, 156, 0.45); }

    .input-wrap {
      position: absolute;
      bottom: 56%;
      left: 50%;
      transform: translate(-50%, 50%);
      z-index: 3;
      width: min(640px, 90vw);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 10px;
    }
    .prompt {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: clamp(18px, 2vw, 24px);
      color: var(--muted);
      letter-spacing: 0.02em;
      transition: opacity 0.7s ease;
    }
    .prompt.faded { opacity: 0; }
    #inputBox {
      width: 100%;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 500;
      font-size: clamp(30px, 5vw, 54px);
      color: var(--ink);
      background: transparent;
      border: none;
      border-bottom: 1px solid rgba(234, 223, 255, 0.2);
      outline: none;
      text-align: center;
      padding: 10px 8px 8px;
      caret-color: var(--accent);
      transition: border-color 0.4s ease;
      letter-spacing: 0.01em;
    }
    #inputBox::placeholder {
      color: rgba(234, 223, 255, 0.18);
      font-style: italic;
    }
    #inputBox:focus { border-color: rgba(255, 121, 198, 0.5); }
    .recent {
      font-size: 11px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      min-height: 1.4em;
      font-family: 'DotGothic16', monospace;
    }
    .recent .w {
      color: var(--ink);
      margin: 0 4px;
      text-shadow: 0 0 10px currentColor;
      display: inline-block;
    }
    .recent .w.dup { color: var(--moss); }
    .recent .w.new { color: var(--accent); }

    .silence-bar {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      width: min(520px, 80vw);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      z-index: 3;
      pointer-events: none;
      opacity: 0.72;
      transition: opacity 0.4s ease;
    }
    .silence-bar.hidden { opacity: 0; }
    .silence-label {
      font-family: 'DotGothic16', monospace;
      font-size: 10px;
      letter-spacing: 0.34em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .silence-track {
      width: 100%;
      height: 2px;
      background: rgba(234, 223, 255, 0.1);
      position: relative;
      overflow: hidden;
    }
    .silence-fill {
      position: absolute;
      top: 0; left: 0;
      height: 100%;
      background: linear-gradient(90deg, var(--moss), var(--accent), #7a7a7a);
      transition: width 0.25s linear;
      box-shadow: 0 0 10px currentColor;
    }

    .footer {
      position: absolute;
      bottom: 14px;
      right: 24px;
      font-size: 9px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      z-index: 4;
      text-align: right;
      pointer-events: auto;
    }
    .footer button {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--line);
      padding: 6px 10px;
      margin-left: 8px;
      font-family: inherit;
      font-size: inherit;
      letter-spacing: inherit;
      text-transform: inherit;
      cursor: pointer;
      border-radius: 2px;
      transition: all 0.2s ease;
    }
    .footer button:hover { color: var(--ink); border-color: var(--ink); }
    .footer button.on { color: var(--firefly); border-color: rgba(255, 230, 163, 0.5); }

    @media (max-width: 640px) {
      header { padding: 12px 16px 0; flex-direction: column; }
      .hud { flex-wrap: wrap; }
      .stat { min-width: 72px; padding: 8px 10px; }
      .stat .v { font-size: 20px; }
      .input-wrap { bottom: 58%; width: 92vw; }
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="garden"></canvas>
    <header>
      <div>
        <h1>Word <em>Garden</em></h1>
        <div class="sub">type to bloom · silence turns to dust</div>
      </div>
      <div class="hud">
        <div class="stat bloom"><span class="k">Blooms</span><span class="v" id="blooms">0</span></div>
        <div class="stat green"><span class="k">Unique</span><span class="v" id="unique">0</span></div>
        <div class="stat"><span class="k">Dusted</span><span class="v" id="dusted">0</span></div>
      </div>
    </header>
    <div class="input-wrap">
      <div class="prompt" id="prompt">plant a word.</div>
      <input id="inputBox" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="…"/>
      <div class="recent" id="recent"></div>
    </div>
    <div class="silence-bar hidden" id="silenceBar">
      <div class="silence-label" id="silenceLabel">listening…</div>
      <div class="silence-track"><div class="silence-fill" id="silenceFill" style="width: 0%"></div></div>
    </div>
    <div class="footer">
      <span id="modeLabel">night garden</span>
      <button id="audioBtn">♪ chime</button>
      <button id="clearBtn">↻ reseed</button>
    </div>
  </div>

<script>
(() => {
  const canvas = document.getElementById('garden');
  const ctx = canvas.getContext('2d');
  const input = document.getElementById('inputBox');
  const recentEl = document.getElementById('recent');
  const promptEl = document.getElementById('prompt');
  const bloomsEl = document.getElementById('blooms');
  const uniqueEl = document.getElementById('unique');
  const dustedEl = document.getElementById('dusted');
  const silenceBar = document.getElementById('silenceBar');
  const silenceFill = document.getElementById('silenceFill');
  const silenceLabel = document.getElementById('silenceLabel');
  const audioBtn = document.getElementById('audioBtn');
  const clearBtn = document.getElementById('clearBtn');

  let W = 0, H = 0, DPR = 1;
  function resize() {
    DPR = Math.min(2, window.devicePixelRatio || 1);
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  }
  window.addEventListener('resize', resize);
  resize();

  // ---- Hash & PRNG ----
  function fnv1a(s) {
    let h = 0x811c9dc5;
    for (let i = 0; i < s.length; i++) {
      h ^= s.charCodeAt(i);
      h = Math.imul(h, 0x01000193);
    }
    return h >>> 0;
  }
  function mulberry32(seed) {
    let t = seed >>> 0;
    return function () {
      t = (t + 0x6D2B79F5) | 0;
      let x = t;
      x = Math.imul(x ^ (x >>> 15), x | 1);
      x ^= x + Math.imul(x ^ (x >>> 7), x | 61);
      return ((x ^ (x >>> 14)) >>> 0) / 4294967296;
    };
  }

  // ---- Audio ----
  let ac = null, master = null, verb = null;
  let audioOn = false;
  function initAudio() {
    if (ac) return;
    ac = new (window.AudioContext || window.webkitAudioContext)();
    master = ac.createGain();
    master.gain.value = 0.45;
    master.connect(ac.destination);
    const sr = ac.sampleRate, len = Math.floor(sr * 2.4);
    const imp = ac.createBuffer(2, len, sr);
    for (let c = 0; c < 2; c++) {
      const d = imp.getChannelData(c);
      for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 3);
    }
    const conv = ac.createConvolver(); conv.buffer = imp;
    verb = ac.createGain(); verb.gain.value = 0.7;
    conv.connect(verb).connect(master);
    verb.__input = conv;
  }
  function toggleAudio() {
    initAudio();
    audioOn = !audioOn;
    audioBtn.classList.toggle('on', audioOn);
    master.gain.linearRampToValueAtTime(audioOn ? 0.5 : 0, ac.currentTime + 0.2);
  }
  audioBtn.addEventListener('click', toggleAudio);
  function bellAt(freq, vol = 0.15) {
    if (!audioOn || !ac) return;
    const now = ac.currentTime;
    const o = ac.createOscillator();
    o.type = 'sine'; o.frequency.value = freq;
    const g = ac.createGain();
    g.gain.setValueAtTime(0, now);
    g.gain.linearRampToValueAtTime(vol, now + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, now + 2.6);
    o.connect(g).connect(master);
    const send = ac.createGain(); send.gain.value = 0.8;
    g.connect(send).connect(verb.__input);
    o.start(now); o.stop(now + 2.7);
  }

  // ---- State ----
  const state = {
    flowers: [],
    dust: [],
    fireflies: [],
    ripples: [],
    words: new Map(), // word -> flower reference
    uniqueCount: 0,
    bloomCount: 0,
    dustedCount: 0,
    lastInputAt: performance.now() / 1000,
    recent: [], // {word, new, time}
    t: 0,
    wind: 0,
    groundY: 0,
  };

  // seed fireflies
  for (let i = 0; i < 32; i++) {
    state.fireflies.push({
      x: Math.random() * 2000, y: Math.random() * 600 + 80,
      vx: (Math.random() - 0.5) * 20, vy: (Math.random() - 0.5) * 14,
      phase: Math.random() * 6.28,
      a: 0.5 + Math.random() * 0.5,
    });
  }

  function computeGround() {
    state.groundY = H * 0.72;
  }

  // ---- Flower factory ----
  const PALETTE_HUES = [320, 285, 210, 195, 170, 55, 30, 10, 130]; // neon-ish hues

  function makeFlower(word, x) {
    const seed = fnv1a(word.toLowerCase());
    const rng = mulberry32(seed);
    const hue = PALETTE_HUES[Math.floor(rng() * PALETTE_HUES.length)] + (rng() - 0.5) * 20;
    const hue2 = (hue + 30 + rng() * 60) % 360;
    const petalCount = 5 + Math.floor(rng() * 8);
    const petalShape = rng() < 0.5 ? 'round' : 'point';
    const petalLen = 16 + rng() * 20 + Math.min(14, word.length * 1.2);
    const petalWidth = 7 + rng() * 8;
    const stemLen = 120 + rng() * 180;
    const centerR = 4 + rng() * 6;
    const leafCount = 1 + Math.floor(rng() * 3);
    const swayPhase = rng() * 6.28;
    const swayAmp = 0.3 + rng() * 0.5;
    const stemBend = (rng() - 0.5) * 0.5;
    const pollenCount = 4 + Math.floor(rng() * 5);
    return {
      word,
      seed,
      x,
      hue, hue2,
      petalCount, petalShape,
      petalLen, petalWidth,
      stemLen,
      centerR,
      leafCount,
      swayPhase, swayAmp, stemBend,
      pollenCount,
      grow: 0,       // 0 → 1 over growDur seconds
      growDur: 1.4 + rng() * 0.6,
      alive: 1,      // 1 alive, 0 fully dust
      saturation: 1, // lerps with silence
      age: 0,
      dusting: false,
      pulseBoost: 0,
      rng, // for later effects
      lastBoost: 0,
    };
  }

  function distributeX(idx, count) {
    // spread flowers across 92% of width
    const margin = W * 0.08;
    const avail = W - margin * 2;
    if (count <= 1) return W / 2;
    return margin + (avail * idx) / Math.max(1, count - 1);
  }

  function redistribute() {
    const alive = state.flowers.filter(f => !f.dusting);
    alive.forEach((f, i) => {
      f.targetX = distributeX(i, alive.length);
    });
  }

  function addFlower(word) {
    const fl = makeFlower(word, 0);
    fl.targetX = 0;
    state.flowers.push(fl);
    state.words.set(word, fl);
    state.uniqueCount++;
    state.bloomCount++;
    redistribute();
    // freq from hue
    const freq = 220 * Math.pow(2, ((fl.hue / 360) * 12) / 12);
    bellAt(freq, 0.14);
    return fl;
  }

  // ---- Input ----
  function processInput(v) {
    // detect words separated by whitespace/punct
    const tokens = v.match(/[a-zA-Z\u00C0-\u024F']+/g) || [];
    return tokens;
  }

  let lastTokens = [];
  let inputSeenFirst = false;
  input.addEventListener('input', e => {
    if (!inputSeenFirst) {
      inputSeenFirst = true;
      promptEl.classList.add('faded');
      setTimeout(() => promptEl.style.display = 'none', 800);
    }
    state.lastInputAt = performance.now() / 1000;
    const tokens = processInput(input.value);
    // heuristic: a word is "finalized" when input ends with a non-letter OR the token count grew
    const endsWithSep = /[^a-zA-Z\u00C0-\u024F']$/.test(input.value) && input.value.length > 0;
    const finalCount = endsWithSep ? tokens.length : Math.max(0, tokens.length - 1);
    if (finalCount > lastTokens.length) {
      for (let i = lastTokens.length; i < finalCount; i++) {
        submitWord(tokens[i]);
      }
      lastTokens = tokens.slice(0, finalCount);
    }
    // trim input once it gets long
    if (input.value.length > 80) {
      input.value = input.value.slice(-40);
      lastTokens = [];
    }
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const tokens = processInput(input.value);
      for (let i = lastTokens.length; i < tokens.length; i++) submitWord(tokens[i]);
      input.value = '';
      lastTokens = [];
      e.preventDefault();
    }
  });

  function submitWord(raw) {
    const word = raw.toLowerCase();
    if (!word) return;
    if (state.words.has(word)) {
      const f = state.words.get(word);
      f.pulseBoost = 1;
      f.saturation = 1;
      f.alive = 1;
      state.recent.unshift({ word, new: false, time: performance.now() / 1000 });
    } else {
      addFlower(word);
      state.recent.unshift({ word, new: true, time: performance.now() / 1000 });
    }
    // revive all alive flowers (typing breaks silence)
    for (const f of state.flowers) {
      if (!f.dusting) f.saturation = Math.min(1, f.saturation + 0.3);
    }
    state.recent = state.recent.slice(0, 6);
    updateRecent();
  }

  function updateRecent() {
    recentEl.innerHTML = state.recent
      .map(r => `<span class="w ${r.new ? 'new' : 'dup'}">${escapeHtml(r.word)}</span>`)
      .join('');
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
  }

  clearBtn.addEventListener('click', () => {
    // dust all at once
    for (const f of state.flowers) {
      if (!f.dusting) spawnDust(f, 1.5);
      f.dusting = true;
      f.alive = 0;
      f.saturation = 0;
    }
  });

  // ---- Dust ----
  function spawnDust(f, intensity = 1) {
    const baseY = state.groundY - f.stemLen * f.grow;
    const count = 18 + Math.floor(intensity * 24);
    for (let i = 0; i < count; i++) {
      state.dust.push({
        x: f.x + (Math.random() - 0.5) * f.petalLen,
        y: baseY + (Math.random() - 0.5) * f.petalLen,
        vx: (Math.random() - 0.5) * 10,
        vy: -6 - Math.random() * 14,
        life: 3 + Math.random() * 3,
        age: 0,
        size: 1.5 + Math.random() * 2.2,
        hue: f.hue,
        fadeStart: 0.3,
      });
    }
    state.dustedCount++;
  }

  // ---- Step ----
  function step(dt) {
    state.t += dt;
    state.wind = Math.sin(state.t * 0.4) * 0.5 + Math.sin(state.t * 1.1 + 1.3) * 0.15;

    const now = performance.now() / 1000;
    const silence = now - state.lastInputAt;
    const grace = 4;
    const fullDecay = 18;
    const silenceK = Math.min(1, Math.max(0, (silence - grace) / (fullDecay - grace)));

    // silence bar
    if (silence < grace) {
      silenceBar.classList.add('hidden');
    } else {
      silenceBar.classList.remove('hidden');
      silenceFill.style.width = (silenceK * 100) + 'px';
      silenceFill.style.width = (silenceK * 100) + '%';
      if (silenceK < 0.3) silenceLabel.textContent = 'the garden listens…';
      else if (silenceK < 0.7) silenceLabel.textContent = 'petals fading…';
      else if (silenceK < 0.99) silenceLabel.textContent = 'turning to dust…';
      else silenceLabel.textContent = 'silence.';
    }

    // flowers
    for (let i = state.flowers.length - 1; i >= 0; i--) {
      const f = state.flowers[i];
      f.age += dt;
      f.grow = Math.min(1, f.grow + dt / f.growDur);
      f.x += (f.targetX - f.x) * Math.min(1, dt * 3);

      // saturation decays with silence; typing resets it via submitWord
      const targetSat = 1 - silenceK;
      f.saturation += (targetSat - f.saturation) * Math.min(1, dt * 1.5);

      if (f.pulseBoost > 0) f.pulseBoost = Math.max(0, f.pulseBoost - dt * 1.1);

      // when saturation near zero and dust event not fired, dust it
      if (f.saturation < 0.05 && !f.dusting) {
        f.dusting = true;
        spawnDust(f, 1);
        // crumbling sound
        if (audioOn) bellAt(80 + Math.random() * 40, 0.06);
      }
      if (f.dusting) {
        f.alive = Math.max(0, f.alive - dt * 0.5);
        if (f.alive <= 0) {
          state.flowers.splice(i, 1);
          // keep in state.words map? Remove so re-typing regrows
          state.words.delete(f.word);
          redistribute();
        }
      }
    }

    // dust
    for (let i = state.dust.length - 1; i >= 0; i--) {
      const d = state.dust[i];
      d.age += dt;
      d.x += d.vx * dt + state.wind * 4 * dt;
      d.y += d.vy * dt;
      d.vy += 3 * dt; // gentle gravity
      d.vx *= Math.pow(0.4, dt);
      d.vy *= Math.pow(0.7, dt);
      if (d.age >= d.life) state.dust.splice(i, 1);
    }

    // fireflies wander in upper third
    for (const ff of state.fireflies) {
      ff.phase += dt * 2;
      ff.x += ff.vx * dt;
      ff.y += ff.vy * dt;
      ff.vx += (Math.random() - 0.5) * 6 * dt;
      ff.vy += (Math.random() - 0.5) * 5 * dt;
      ff.vx = Math.max(-30, Math.min(30, ff.vx));
      ff.vy = Math.max(-16, Math.min(16, ff.vy));
      if (ff.x < -20) ff.x = W + 20;
      if (ff.x > W + 20) ff.x = -20;
      if (ff.y < 40) ff.y = 40;
      if (ff.y > state.groundY - 40) ff.y = state.groundY - 40;
    }

    // hud
    bloomsEl.textContent = state.flowers.filter(f => !f.dusting).length;
    uniqueEl.textContent = state.words.size;
    dustedEl.textContent = state.dustedCount;
  }

  // ---- Draw ----
  function drawSky() {
    // soft horizon glow + moon
    const g = ctx.createRadialGradient(W * 0.5, state.groundY, 50, W * 0.5, state.groundY, W * 0.7);
    g.addColorStop(0, 'rgba(255, 121, 198, 0.07)');
    g.addColorStop(1, 'rgba(255, 121, 198, 0)');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);
    // moon
    const moonX = W * 0.85, moonY = H * 0.18, mr = 22;
    const mg = ctx.createRadialGradient(moonX, moonY, 0, moonX, moonY, mr * 3);
    mg.addColorStop(0, 'rgba(255, 236, 200, 0.9)');
    mg.addColorStop(0.3, 'rgba(255, 210, 170, 0.3)');
    mg.addColorStop(1, 'rgba(255, 210, 170, 0)');
    ctx.fillStyle = mg;
    ctx.beginPath();
    ctx.arc(moonX, moonY, mr * 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff1d6';
    ctx.beginPath();
    ctx.arc(moonX, moonY, mr * 0.8, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawStars() {
    for (let i = 0; i < 80; i++) {
      const x = (i * 163) % W;
      const y = ((i * 97) % Math.floor(state.groundY * 0.6));
      const tw = Math.sin(state.t * 1.3 + i) * 0.4 + 0.5;
      ctx.fillStyle = `rgba(255, 240, 220, ${0.25 * tw})`;
      ctx.fillRect(x, y, 1.2, 1.2);
    }
  }

  function drawGround() {
    const gy = state.groundY;
    const g = ctx.createLinearGradient(0, gy, 0, H);
    g.addColorStop(0, 'rgba(24, 17, 10, 1)');
    g.addColorStop(0.4, 'rgba(10, 6, 5, 0.9)');
    g.addColorStop(1, 'rgba(2, 1, 0, 1)');
    ctx.fillStyle = g;
    ctx.fillRect(0, gy, W, H - gy);
    // subtle grass tufts
    for (let i = 0; i < 40; i++) {
      const x = (i * 53 + Math.sin(state.t * 0.3 + i) * 8) % W;
      ctx.strokeStyle = 'rgba(120, 180, 140, 0.18)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.moveTo(x, gy);
      ctx.quadraticCurveTo(x + state.wind * 4, gy - 10, x + state.wind * 8, gy - 14);
      ctx.stroke();
    }
    // top edge soil rim
    ctx.strokeStyle = 'rgba(80, 50, 30, 0.6)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(0, gy + 0.5);
    ctx.lineTo(W, gy + 0.5);
    ctx.stroke();
  }

  function drawFireflies() {
    for (const ff of state.fireflies) {
      const glow = 0.4 + Math.sin(ff.phase) * 0.5;
      ctx.fillStyle = `rgba(255, 230, 163, ${ff.a * glow})`;
      ctx.shadowColor = '#ffe6a3';
      ctx.shadowBlur = 10;
      ctx.beginPath();
      ctx.arc(ff.x, ff.y, 1.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
  }

  function drawFlower(f) {
    const gy = state.groundY;
    const grow = easeOutCubic(f.grow);
    const alive = f.alive;
    if (alive <= 0) return;
    const s = f.saturation;

    const sway = Math.sin(state.t * 1.1 + f.swayPhase) * f.swayAmp + state.wind * 0.6;
    const topY = gy - f.stemLen * grow;
    const topX = f.x + sway * 18 * grow + f.stemBend * 40 * grow;

    // stem color: green when alive, grey when dusting
    const stemSat = Math.max(0.1, 0.5 * s + 0.5);
    const stemL = 30 + 15 * s;
    const stemHue = 130 - 30 * (1 - s);
    ctx.strokeStyle = `hsla(${stemHue}, ${stemSat * 60}%, ${stemL}%, ${0.7 + 0.2 * s})`;
    ctx.lineWidth = 2.5;
    ctx.shadowColor = `hsla(${stemHue}, 80%, 50%, ${0.4 * s})`;
    ctx.shadowBlur = 4 * s;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(f.x, gy);
    const mx = (f.x + topX) / 2 + sway * 10;
    const my = (gy + topY) / 2;
    ctx.quadraticCurveTo(mx, my, topX, topY);
    ctx.stroke();
    ctx.shadowBlur = 0;

    // leaves
    for (let i = 0; i < f.leafCount; i++) {
      const t = (i + 1) / (f.leafCount + 1);
      const lx = lerp(f.x, topX, t) + (i % 2 === 0 ? -1 : 1) * 2;
      const ly = lerp(gy, topY, t);
      const side = i % 2 === 0 ? 1 : -1;
      const leafSize = 10 + 4 * Math.sin(f.seed + i);
      ctx.save();
      ctx.translate(lx, ly);
      ctx.rotate(side * 0.9 + sway * 0.2);
      ctx.fillStyle = `hsla(${stemHue + 8}, ${stemSat * 55}%, ${stemL + 10}%, ${0.75 * (0.4 + 0.6 * s)})`;
      ctx.beginPath();
      ctx.ellipse(leafSize / 2, 0, leafSize, leafSize / 2.4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = `hsla(${stemHue + 8}, 50%, 30%, ${0.4 * s})`;
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      ctx.moveTo(0, 0); ctx.lineTo(leafSize, 0);
      ctx.stroke();
      ctx.restore();
    }

    // bloom
    const pulse = 1 + Math.sin(state.t * 2 + f.seed) * 0.04 + f.pulseBoost * 0.2;
    const sizeK = grow * pulse;
    const bloomX = topX, bloomY = topY;
    // petals
    ctx.save();
    ctx.translate(bloomX, bloomY);
    const baseHueLight = 60 + 15 * s;
    const baseAlpha = (0.6 + 0.35 * s) * alive;
    // glow
    const glowR = f.petalLen * 2.4 * sizeK;
    const gg = ctx.createRadialGradient(0, 0, 0, 0, 0, glowR);
    gg.addColorStop(0, `hsla(${f.hue}, ${80 * s + 10}%, ${55 + 15 * s}%, ${0.28 * alive})`);
    gg.addColorStop(1, `hsla(${f.hue}, 50%, 30%, 0)`);
    ctx.fillStyle = gg;
    ctx.beginPath();
    ctx.arc(0, 0, glowR, 0, Math.PI * 2);
    ctx.fill();

    for (let i = 0; i < f.petalCount; i++) {
      const a = (i / f.petalCount) * Math.PI * 2;
      const pw = f.petalWidth * sizeK;
      const pl = f.petalLen * sizeK;
      ctx.save();
      ctx.rotate(a + state.t * 0.05);
      ctx.translate(0, -pl * 0.3);
      const grad = ctx.createRadialGradient(0, -pl * 0.4, 0, 0, -pl * 0.4, pl);
      const sat = 40 + 50 * s;
      const light = 50 + 20 * s;
      grad.addColorStop(0, `hsla(${f.hue}, ${sat}%, ${light + 15}%, ${baseAlpha})`);
      grad.addColorStop(0.6, `hsla(${f.hue2}, ${sat}%, ${light}%, ${baseAlpha * 0.7})`);
      grad.addColorStop(1, `hsla(${f.hue}, ${sat}%, ${light - 15}%, 0)`);
      ctx.fillStyle = grad;
      ctx.beginPath();
      if (f.petalShape === 'round') {
        ctx.ellipse(0, -pl * 0.4, pw, pl * 0.8, 0, 0, Math.PI * 2);
      } else {
        // pointed tear drop
        ctx.moveTo(0, 0);
        ctx.quadraticCurveTo(pw, -pl * 0.3, 0, -pl);
        ctx.quadraticCurveTo(-pw, -pl * 0.3, 0, 0);
      }
      ctx.fill();
      ctx.strokeStyle = `hsla(${f.hue}, ${sat + 10}%, ${light + 25}%, ${baseAlpha * 0.5})`;
      ctx.lineWidth = 0.8;
      ctx.stroke();
      ctx.restore();
    }

    // center
    ctx.shadowColor = `hsla(${f.hue2}, 90%, 70%, ${0.7 * s})`;
    ctx.shadowBlur = 14 * s;
    ctx.fillStyle = `hsla(${f.hue2}, ${60 + 30 * s}%, ${60 + 10 * s}%, ${alive})`;
    ctx.beginPath();
    ctx.arc(0, 0, f.centerR * sizeK, 0, Math.PI * 2);
    ctx.fill();
    // speckle
    ctx.shadowBlur = 0;
    for (let i = 0; i < 6; i++) {
      const a = (i / 6) * Math.PI * 2;
      ctx.fillStyle = `hsla(${f.hue}, 90%, 80%, ${0.6 * alive * s})`;
      ctx.beginPath();
      ctx.arc(Math.cos(a) * f.centerR * 0.5, Math.sin(a) * f.centerR * 0.5, 1, 0, Math.PI * 2);
      ctx.fill();
    }

    // pollen dots drifting when healthy
    if (s > 0.4) {
      for (let i = 0; i < f.pollenCount; i++) {
        const p = (f.seed + i * 13 + state.t * 40) % 100;
        const px = Math.sin(p * 0.1) * 30;
        const py = -20 + ((p + i * 11) % 40) - 20;
        ctx.fillStyle = `hsla(${f.hue}, 90%, 80%, ${0.3 * s})`;
        ctx.beginPath();
        ctx.arc(px, py, 0.8, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    ctx.restore();

    // label under each bloom — the word, subtle
    ctx.font = '11px "DotGothic16", monospace';
    ctx.textAlign = 'center';
    ctx.fillStyle = `hsla(${f.hue}, ${40 + 40 * s}%, 70%, ${0.35 * alive + 0.2})`;
    ctx.fillText(f.word, bloomX, gy + 16);
  }

  function drawDust() {
    for (const d of state.dust) {
      const k = d.age / d.life;
      const a = (1 - k) * 0.7;
      const grey = k > 0.3 ? 1 : k / 0.3;
      const hue = d.hue;
      const sat = 60 * (1 - grey);
      const light = 50 + grey * 20;
      ctx.fillStyle = `hsla(${hue}, ${sat}%, ${light}%, ${a})`;
      ctx.beginPath();
      ctx.arc(d.x, d.y, d.size * (1 - k * 0.5), 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // ---- Loop ----
  function lerp(a, b, t) { return a + (b - a) * t; }
  function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

  let last = performance.now();
  function frame(now) {
    const dt = Math.min(0.05, (now - last) / 1000);
    last = now;
    computeGround();
    step(dt);
    ctx.clearRect(0, 0, W, H);
    drawStars();
    drawSky();
    drawFireflies();
    drawGround();
    const sorted = [...state.flowers].sort((a, b) => a.x - b.x);
    for (const f of sorted) drawFlower(f);
    drawDust();
    requestAnimationFrame(frame);
  }
  requestAnimationFrame(frame);

  // focus input
  setTimeout(() => { input.focus(); }, 300);
  document.body.addEventListener('click', e => {
    if (!e.target.closest('button') && !e.target.closest('input')) input.focus();
  });
})();
</script>
</body>
</html>
