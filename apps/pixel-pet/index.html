<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Pixel Pet</title>
<link rel="icon" href="https://emojicdn.elk.sh/🐣">
<meta property="og:title" content="Pixel Pet">
<meta property="og:description" content="Hatch a pixel creature. Feed it, watch it grow and change colors.">
<meta property="og:url" content="https://sloppy.live/pixel-pet">
<meta property="og:image" content="https://emojicdn.elk.sh/🐣?style=apple&size=512">
<link href="https://fonts.googleapis.com/css2?family=Silkscreen:wght@400;700&family=DotGothic16&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0d1117;--lcd:#1a2332;--frame:#2a1a3a;--text:#c8d0dc}
html,body{height:100dvh;overflow:hidden;background:var(--bg);font-family:'DotGothic16',monospace;color:var(--text)}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
#device{background:var(--frame);border-radius:24px;padding:20px 20px 16px;box-shadow:0 0 40px #4a1a6a33,inset 0 2px 4px #ffffff0a;position:relative}
#screen{background:var(--lcd);border-radius:12px;width:280px;height:280px;position:relative;overflow:hidden;image-rendering:pixelated;cursor:pointer}
canvas{width:100%;height:100%;display:block;image-rendering:pixelated}
#stats{display:flex;gap:16px;justify-content:center;margin-top:8px;font-family:'Silkscreen',monospace;font-size:11px}
.stat{text-align:center;opacity:0.8}
.stat span{display:block;font-size:16px;margin-bottom:2px}
#buttons{display:flex;gap:10px;justify-content:center;margin-top:10px}
.btn{font-family:'Silkscreen',monospace;font-size:12px;padding:8px 16px;border:none;border-radius:8px;cursor:pointer;transition:all 0.15s;color:var(--bg)}
.btn-feed{background:#44dd66}.btn-play{background:#44aaff}.btn-sleep{background:#aa88ff}
.btn:hover{transform:scale(1.05);filter:brightness(1.2)}
.btn:active{transform:scale(0.95)}
#name-row{font-family:'Silkscreen',monospace;font-size:14px;text-align:center;letter-spacing:1px}
#mood{font-size:11px;opacity:0.6;text-align:center;font-family:'DotGothic16',monospace}
#particles{position:absolute;inset:0;pointer-events:none}
#msg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-family:'Silkscreen',monospace;font-size:14px;pointer-events:none;opacity:0;transition:opacity 0.3s;text-shadow:0 0 8px currentColor}
</style>
</head>
<body>
<div id="name-row"></div>
<div id="device">
<div id="screen">
<canvas id="c"></canvas>
<div id="msg"></div>
</div>
<div id="stats">
<div class="stat"><span id="s-lvl">1</span>Level</div>
<div class="stat"><span id="s-food">5</span>Food</div>
<div class="stat"><span id="s-happy">5</span>Happy</div>
<div class="stat"><span id="s-age">0</span>Age</div>
</div>
<div id="buttons">
<button class="btn btn-feed" id="bFeed">Feed</button>
<button class="btn btn-play" id="bPlay">Play</button>
<button class="btn btn-sleep" id="bSleep">Sleep</button>
</div>
</div>
<div id="mood"></div>
<script>
(function(){
var C=document.getElementById('c'),X=C.getContext('2d');
var PX=8;C.width=280/PX;C.height=280/PX;
var W=C.width,H=C.height;
var KEY='pixel-pet-v2';
var pet={name:'',hue:0,food:5,happy:5,xp:0,level:1,age:0,lastTick:Date.now(),born:Date.now(),sleeping:false};
var msgEl=document.getElementById('msg');
var nameEl=document.getElementById('name-row');
var moodEl=document.getElementById('mood');
var floats=[];var bobT=0;var blinkT=0;var zzT=0;

var NAMES=['Bloop','Glim','Nyx','Pip','Zorp','Fizz','Mochi','Bub','Tek','Ori','Lux','Dot','Hex','Zap','Rune'];
var MOODS=['Ecstatic!','Happy','Content','Meh...','Hungry...','Sad...','Miserable!'];

function save(){try{localStorage.setItem(KEY,JSON.stringify(pet));}catch(e){}}
function load(){
  try{var d=localStorage.getItem(KEY);if(d){var p=JSON.parse(d);for(var k in p)pet[k]=p[k];return true;}}catch(e){}
  return false;
}

function init(){
  if(!load()){
    pet.name=NAMES[Math.floor(Math.random()*NAMES.length)];
    pet.hue=Math.floor(Math.random()*360);
    pet.born=Date.now();pet.lastTick=Date.now();
    save();
  }
  // process offline time
  var now=Date.now();
  var elapsed=Math.floor((now-pet.lastTick)/60000);
  if(elapsed>0){
    pet.age+=elapsed;
    pet.food=Math.max(0,pet.food-Math.floor(elapsed/5));
    pet.happy=Math.max(0,pet.happy-Math.floor(elapsed/8));
    pet.lastTick=now;
    save();
  }
  nameEl.textContent=pet.name;
  updateStats();
}

function updateStats(){
  document.getElementById('s-lvl').textContent=pet.level;
  document.getElementById('s-food').textContent=Math.round(pet.food);
  document.getElementById('s-happy').textContent=Math.round(pet.happy);
  document.getElementById('s-age').textContent=pet.age+'m';
  var avg=(pet.food+pet.happy)/2;
  var mi=avg>8?0:avg>6?1:avg>4?2:avg>3?3:avg>2?4:avg>1?5:6;
  moodEl.textContent=MOODS[mi];
}

function gainXp(amt){
  pet.xp+=amt;
  var need=pet.level*10;
  if(pet.xp>=need){
    pet.xp-=need;pet.level++;
    pet.hue=(pet.hue+35)%360;
    showMsg('LEVEL UP!','#ffcc00');
    for(var i=0;i<8;i++){
      floats.push({x:W/2+(Math.random()-0.5)*10,y:H/2,vy:-0.5-Math.random()*0.5,t:0,dur:1.5,
        ch:['*','+','!'][Math.floor(Math.random()*3)],color:'#ffcc00'});
    }
  }
  save();
}

function showMsg(txt,color){
  msgEl.textContent=txt;msgEl.style.color=color||'#fff';msgEl.style.opacity=1;
  clearTimeout(msgEl._t);msgEl._t=setTimeout(function(){msgEl.style.opacity=0;},1200);
}

function feed(){
  if(pet.sleeping){showMsg('Zzz..','#aa88ff');return;}
  if(pet.food>=10){showMsg('Full!','#88ff88');return;}
  pet.food=Math.min(10,pet.food+2);
  gainXp(2);
  showMsg('+Food','#44dd66');
  floats.push({x:W/2+3,y:H/2-2,vy:-0.4,t:0,dur:1.2,ch:'\u2665',color:'#44dd66'});
  updateStats();save();
}

function play(){
  if(pet.sleeping){showMsg('Zzz..','#aa88ff');return;}
  if(pet.happy>=10){showMsg('So happy!','#44aaff');return;}
  pet.happy=Math.min(10,pet.happy+2);
  pet.food=Math.max(0,pet.food-0.5);
  gainXp(3);
  showMsg('+Happy','#44aaff');
  floats.push({x:W/2-3,y:H/2-2,vy:-0.4,t:0,dur:1.2,ch:'\u2606',color:'#44aaff'});
  updateStats();save();
}

function sleep(){
  pet.sleeping=!pet.sleeping;
  if(pet.sleeping){showMsg('Goodnight','#aa88ff');}
  else{showMsg('Good morning!','#ffcc44');}
  save();
}

document.getElementById('bFeed').addEventListener('click',feed);
document.getElementById('bPlay').addEventListener('click',play);
document.getElementById('bSleep').addEventListener('click',sleep);
document.getElementById('screen').addEventListener('click',function(e){
  if(pet.sleeping)return;
  pet.happy=Math.min(10,pet.happy+0.3);
  pet.hue=(pet.hue+3)%360;
  floats.push({x:W/2+(Math.random()-0.5)*8,y:H/2,vy:-0.3-Math.random()*0.3,t:0,dur:1,
    ch:'\u2665',color:'hsl('+pet.hue+',80%,65%)'});
  save();updateStats();
});

// tick every 60s
setInterval(function(){
  pet.age++;
  pet.food=Math.max(0,pet.food-0.2);
  pet.happy=Math.max(0,pet.happy-0.15);
  if(pet.sleeping){pet.happy=Math.min(10,pet.happy+0.4);pet.food=Math.max(0,pet.food-0.1);}
  pet.lastTick=Date.now();
  save();updateStats();
},60000);

// draw pet pixel art
function hsl(h,s,l){
  X.fillStyle='hsl('+h+','+s+'%,'+l+'%)';
}

function drawPet(){
  var cx=Math.floor(W/2),cy=Math.floor(H/2)+1;
  var h=pet.hue;
  var size=Math.min(pet.level,6);
  var bob=Math.sin(bobT*2)*0.8;
  var by=Math.round(bob);
  var blink=blinkT<0.15;

  // body - grows with level
  var bw=3+Math.min(size,4);
  var bh=3+Math.min(size,3);
  var bx=cx-Math.floor(bw/2);
  var bodyY=cy-Math.floor(bh/2)+by;

  // shadow
  X.fillStyle='rgba(0,0,0,0.2)';
  for(var i=0;i<bw;i++)X.fillRect(bx+i,cy+Math.floor(bh/2)+1,1,1);

  // body
  hsl(h,70,45);
  for(var yy=0;yy<bh;yy++){
    for(var xx=0;xx<bw;xx++){
      // round corners
      if((yy===0||yy===bh-1)&&(xx===0||xx===bw-1))continue;
      X.fillRect(bx+xx,bodyY+yy,1,1);
    }
  }
  // highlight
  hsl(h,80,60);
  for(var xx=1;xx<bw-1;xx++)X.fillRect(bx+xx,bodyY+1,1,1);

  // eyes
  var ey=bodyY+Math.floor(bh*0.35);
  var elx=cx-1,erx=cx+1;
  if(pet.sleeping||blink){
    hsl(h,40,25);
    X.fillRect(elx,ey,1,1);X.fillRect(erx,ey,1,1);
  }else{
    X.fillStyle='#fff';
    X.fillRect(elx,ey,1,1);X.fillRect(erx,ey,1,1);
    X.fillStyle='#111';
    // pupil shifts slightly
    var ps=Math.sin(bobT*0.7)>0.5?1:0;
    if(ps){X.fillRect(elx,ey,1,1);}
  }

  // mouth
  var my=bodyY+Math.floor(bh*0.65);
  var avg=(pet.food+pet.happy)/2;
  hsl(h,40,25);
  if(avg>6){
    // smile
    X.fillRect(cx-1,my,1,1);X.fillRect(cx+1,my,1,1);
    X.fillRect(cx,my+1,1,1);
  }else if(avg>3){
    X.fillRect(cx-1,my,3,1);
  }else{
    // frown
    X.fillRect(cx,my,1,1);
    X.fillRect(cx-1,my+1,1,1);X.fillRect(cx+1,my+1,1,1);
  }

  // feet
  var fy=bodyY+bh;
  hsl(h,60,35);
  X.fillRect(cx-2,fy+by,1,1);X.fillRect(cx+2,fy+by,1,1);

  // antenna / ears at higher levels
  if(pet.level>=3){
    hsl((h+60)%360,70,55);
    X.fillRect(cx-1,bodyY-1,1,1);X.fillRect(cx+1,bodyY-1,1,1);
    if(pet.level>=5){
      hsl((h+120)%360,80,60);
      X.fillRect(cx-1,bodyY-2,1,1);X.fillRect(cx+1,bodyY-2,1,1);
    }
  }

  // sleeping zzz
  if(pet.sleeping){
    zzT+=0.02;
    var zi=Math.floor(zzT)%3;
    X.fillStyle='#aa88ff';
    var zx=cx+3,zy=bodyY-2;
    for(var z=0;z<=zi;z++){
      X.fillRect(zx+z*2,zy-z*2,1,1);
    }
  }

  // level crown at 8+
  if(pet.level>=8){
    X.fillStyle='#ffcc00';
    X.fillRect(cx-1,bodyY-2,3,1);
    X.fillRect(cx-2,bodyY-3,1,1);X.fillRect(cx,bodyY-3,1,1);X.fillRect(cx+2,bodyY-3,1,1);
  }
}

function draw(){
  X.fillStyle='#1a2332';X.fillRect(0,0,W,H);

  // subtle grid
  X.fillStyle='#1e2940';
  for(var y=0;y<H;y+=4){for(var x=0;x<W;x+=4){X.fillRect(x,y,1,1);}}

  drawPet();

  // floating particles
  for(var i=floats.length-1;i>=0;i--){
    var f=floats[i];
    f.t+=0.016;f.y+=f.vy;
    if(f.t>=f.dur){floats.splice(i,1);continue;}
    var alpha=1-f.t/f.dur;
    X.globalAlpha=alpha;X.fillStyle=f.color;
    X.font='6px Silkscreen';X.fillText(f.ch,Math.round(f.x),Math.round(f.y));
    X.globalAlpha=1;
  }

  // ground line
  X.fillStyle='#2a3348';
  for(var x=2;x<W-2;x++)X.fillRect(x,H-4,1,1);
}

function loop(){
  bobT+=0.016;
  blinkT-=0.016;
  if(blinkT<-3-Math.random()*2)blinkT=0.15;
  draw();
  requestAnimationFrame(loop);
}

init();loop();
})();
</script>
</body>
</html>
