<html lang="en">
<head>

<style>
  :root {
    --counter:#f7e8c4;
    --counter-2:#e7d4a3;
    --jug:#b8e6f0;
    --jug-rim:#7bc1d4;
    --banana:#f5d445;
    --banana-deep:#c79b1f;
    --strawberry:#e84a6c;
    --grape:#8b5fbf;
    --citrus:#f59140;
    --leaf:#5cb04e;
    --blade:#c8cdd3;
    --blade-shadow:#5e6671;
    --ink:#2a1f0e;
    --warn:#e74c3c;
    --ok:#3e9b4f;
  }
  * { box-sizing: border-box; }
  html, body { margin:0; padding:0; }
  html { font-size: 100%; }
  body {
    min-height: 100vh;
    font-family: 'Fredoka', system-ui, sans-serif;
    color: var(--ink);
    background:
      radial-gradient(circle at 20% 18%, rgba(255,235,180,0.45), transparent 55%),
      radial-gradient(circle at 80% 82%, rgba(255,165,90,0.20), transparent 60%),
      linear-gradient(180deg, var(--counter) 0%, var(--counter-2) 100%);
    overflow-x: hidden;
  }
  .skip { position:absolute; left:-1000px; }
  .skip:focus-visible {
    left: 0.5rem; top: 0.5rem;
    background: var(--ink); color: var(--counter);
    padding:0.5rem 0.8rem; z-index: 100;
    text-decoration:none;
  }
  main {
    max-width: 720px;
    margin: 0 auto;
    padding: 0.8rem 0.9rem 1.6rem 0.9rem;
  }
  header {
    text-align: center;
    padding: 0.4rem 0 0.5rem 0;
  }
  .eyebrow {
    font-family:'VT323', monospace;
    font-size: 1rem;
    letter-spacing: 0.32em;
    color: var(--strawberry);
    text-transform: uppercase;
  }
  h1 {
    font-family: 'Bungee', display;
    font-size: clamp(2.4rem, 9vw, 4.4rem);
    margin: 0;
    line-height: 0.95;
    color: var(--banana);
    text-shadow:
      3px 3px 0 var(--ink),
      6px 6px 0 var(--strawberry),
      9px 9px 0 rgba(0,0,0,0.18);
    transform: rotate(-2.4deg);
  }
  .tagline {
    font-family:'Fredoka', sans-serif;
    font-style: italic;
    font-size: 1rem;
    color: var(--ink);
    margin-top: 0.4rem;
    opacity: 0.78;
  }
  .hud-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 0.5rem;
    margin: 0.7rem 0 0.5rem 0;
  }
  .stat {
    background: #fff;
    border: 3px solid var(--ink);
    padding: 0.4rem 0.6rem;
    box-shadow: 4px 4px 0 var(--ink);
    border-radius: 14px;
    text-align: center;
  }
  .stat .lab {
    font-family:'VT323', monospace;
    font-size: 0.78rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink);
    opacity: 0.7;
  }
  .stat .val {
    font-family: 'Bungee', display;
    font-size: 1.3rem;
    line-height: 1;
    color: var(--ink);
  }
  .stat.score .val { color: var(--strawberry); }
  .stat.fruit .val { color: var(--leaf); }
  .stat.blender .val { color: var(--warn); font-family:'VT323', monospace; font-size: 1.5rem; }
  .arena-wrap {
    margin-top: 0.5rem;
    border: 4px solid var(--ink);
    background: #fff;
    box-shadow: 6px 6px 0 var(--ink);
    border-radius: 22px;
    overflow: hidden;
    position: relative;
  }
  canvas#stage {
    display: block;
    width: 100%;
    aspect-ratio: 3 / 4;
    image-rendering: auto;
  }
  .controls {
    margin-top: 0.7rem;
    display:flex; flex-wrap: wrap; gap: 0.5rem;
    justify-content: center;
  }
  .btn {
    cursor: pointer;
    font-family:'Fredoka', sans-serif;
    font-weight: 600;
    font-size: 0.95rem;
    background: #fff;
    color: var(--ink);
    border: 3px solid var(--ink);
    padding: 0.55rem 0.9rem;
    box-shadow: 3px 3px 0 var(--ink);
    border-radius: 12px;
    min-height: 2.75rem;
    transition: transform 80ms ease, box-shadow 80ms ease;
  }
  .btn:hover { transform: translate(-1px,-1px); box-shadow: 4px 4px 0 var(--ink); }
  .btn:active { transform: translate(2px,2px); box-shadow: 1px 1px 0 var(--ink); }
  .btn:focus-visible { outline: 3px solid var(--strawberry); outline-offset: 2px; }
  .hint {
    margin-top: 0.5rem;
    font-family: 'VT323', monospace;
    font-size: 1rem;
    text-align: center;
    color: var(--ink);
    opacity: 0.65;
  }
  .pad {
    display:none;
    position: fixed;
    bottom: 0.8rem;
    left: 0.8rem;
    right: 0.8rem;
    z-index: 12;
    justify-content: space-between;
    pointer-events: none;
  }
  @media (pointer: coarse), (max-width: 760px) {
    .pad { display: flex; }
  }
  .pad-btn {
    pointer-events: auto;
    width: 5.4rem;
    height: 5.4rem;
    background: rgba(255,255,255,0.92);
    border: 3px solid var(--ink);
    border-radius: 50%;
    box-shadow: 4px 4px 0 var(--ink);
    font-family: 'Bungee', display;
    font-size: 1.6rem;
    color: var(--ink);
    display:flex; align-items:center; justify-content:center;
    user-select: none;
    touch-action: manipulation;
  }
  .pad .pad-right { display:flex; gap: 0.6rem; }
  .overlay {
    position: absolute; inset: 0;
    background: rgba(0,0,0,0.78);
    display:flex; align-items:center; justify-content:center;
    text-align: center;
    padding: 1rem;
    z-index: 5;
  }
  .overlay[hidden] { display:none !important; }
  .overlay-inner {
    background: #fff;
    border: 4px solid var(--ink);
    border-radius: 18px;
    padding: 1.4rem 1.4rem;
    max-width: 22rem;
    box-shadow: 8px 8px 0 var(--ink);
  }
  .overlay-inner h2 {
    font-family: 'Bungee', display;
    font-size: 1.7rem;
    margin: 0 0 0.5rem 0;
  }
  .overlay-inner.win h2 { color: var(--ok); }
  .overlay-inner.lose h2 { color: var(--warn); }
  .overlay-inner .body {
    font-family:'Fredoka', sans-serif;
    font-size: 0.96rem;
    margin-bottom: 0.8rem;
  }
  .overlay-inner .stats {
    font-family: 'VT323', monospace;
    font-size: 1rem;
    color: var(--ink);
    opacity: 0.8;
    margin-bottom: 0.8rem;
  }
  @media (prefers-reduced-motion: reduce) {
    h1 { transform: none; }
  }
  @media (max-width: 520px) {
    .hud-row { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<a class="skip" href="#stage">skip to game</a>
<main>
  <header>
    <div class="eyebrow">★ FRUIT SALAD JAILBREAK ★</div>
    <h1>BANANA SLIP</h1>
    <div class="tagline">climb out of the blender before it pulses you into smoothie.</div>
  </header>

  <div class="hud-row" role="status" aria-live="polite">
    <div class="stat score"><div class="lab">SCORE</div><div class="val" id="hudScore">0</div></div>
    <div class="stat fruit"><div class="lab">SALAD</div><div class="val" id="hudFruit">0/8</div></div>
    <div class="stat hp"><div class="lab">HEARTS</div><div class="val" id="hudHp">♥♥♥</div></div>
    <div class="stat blender"><div class="lab">BLENDER</div><div class="val" id="hudBlender">IDLE 5.0</div></div>
  </div>

  <div class="arena-wrap">
    <canvas id="stage" role="application" aria-label="Banana Slip arena. Use Arrow or A and D to move, Space or W to jump. Hold direction toward a wall to slow your slide."></canvas>
    <div class="overlay" id="overlay" hidden>
      <div class="overlay-inner" id="overlayInner">
        <h2 id="ovTitle">·</h2>
        <div class="body" id="ovBody">·</div>
        <div class="stats" id="ovStats">·</div>
        <button class="btn" id="ovBtn" type="button">play</button>
      </div>
    </div>
  </div>

  <div class="controls">
    <button class="btn" id="muteBtn" type="button" aria-pressed="false">♪ on</button>
    <button class="btn" id="resetBtn" type="button">↺ restart</button>
  </div>
  <div class="hint">← → or A D to move · SPACE to jump · hold toward wall to slow your slide</div>
</main>

<div class="pad" aria-hidden="true">
  <button class="pad-btn" id="padLeft" type="button">◀</button>
  <div class="pad-right">
    <button class="pad-btn" id="padJump" type="button">⤒</button>
    <button class="pad-btn" id="padRight" type="button">▶</button>
  </div>
</div>

<script>
'use strict';

// ──────────────────────────────────────────────────────────────
// BANANA SLIP — sentient fruit salad escapes a kitchen blender.
// Side-view physics platformer set inside a glass blender jug.
// Slippery curved walls, rotating chrome blades, suction force,
// pulse mode that briefly amps everything to terror levels.
// Climb out the rim before HP runs out.
// ──────────────────────────────────────────────────────────────

const cv = document.getElementById('stage');
const ctx = cv.getContext('2d');
let W = 720, H = 960;
function resizeCanvas(){
  const r = cv.getBoundingClientRect();
  const dpr = Math.min(2, window.devicePixelRatio || 1);
  cv.width  = Math.round(r.width  * dpr);
  cv.height = Math.round(r.height * dpr);
  W = r.width; H = r.height;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resizeCanvas);

// ── JUG GEOMETRY ──────────────────────────────────────────────
const JUG_RATIO = { topMargin: 0.05, bottomMargin: 0.06, topHW: 0.36, bottomHW: 0.26 };
function jugTop(){    return H * JUG_RATIO.topMargin; }
function jugBottom(){ return H * (1 - JUG_RATIO.bottomMargin); }
function jugHeight(){ return jugBottom() - jugTop(); }
function centerX(){   return W / 2; }
// half-width of the inner jug at vertical y, with a slight bell shape
function halfWidth(y){
  const top = jugTop(), bot = jugBottom();
  const t = Math.max(0, Math.min(1, (y - top) / (bot - top)));
  const linear = (W * JUG_RATIO.topHW) + ((W * JUG_RATIO.bottomHW) - (W * JUG_RATIO.topHW)) * t;
  // belly: subtle outward bulge in middle
  const belly = Math.sin(t * Math.PI) * (W * 0.018);
  return linear + belly;
}
function leftWallX(y){  return centerX() - halfWidth(y); }
function rightWallX(y){ return centerX() + halfWidth(y); }
// approximate wall normal (points inward, toward jug center)
function wallNormal(side, y){
  const dy = 4;
  const dx = (halfWidth(y + dy) - halfWidth(y - dy)) / (2 * dy);
  // tangent direction: (1, dx) on right side; normal (inward) is perpendicular
  // right wall: outward = (cos α, -sin α)? simpler: flatten to small slope.
  if (side === 'left'){
    // wall goes from (cx - hw, y) outward. inward normal is (+1, -dx) normalized.
    const len = Math.hypot(1, -dx);
    return { nx: 1 / len, ny: -dx / len };
  } else {
    const len = Math.hypot(1, dx);
    return { nx: -1 / len, ny: -dx / len };
  }
}
function bladeY(){ return jugBottom() - H * 0.04; }
function bladeR(){ return Math.min(140, halfWidth(bladeY()) - 20); }

// ── STATE ─────────────────────────────────────────────────────
const state = {
  ended: false,
  endedWin: false,
  paused: false,
  muted: false,
  speed: 1,
  score: 0,
  collected: 0,
  totalFruit: 8,
  hp: 3,
  hpMax: 3,
  iframes: 0,
  player: null,
  fruits: [],
  particles: [],
  blades: { angle: 0, omega: 0, targetOmega: 0 },
  bladeShake: 0,
  pulseUntil: 0,
  pulseCount: 0,
  shake: 0,
  bg: { t: 0 },
  blender: {
    phase: 'IDLE',     // IDLE → WARMUP → ACTIVE → PULSE (alternates)
    timer: 5,
    nextPulseIn: 4 + Math.random() * 3,
    suction: 0,        // 0..1
  },
};

// ── PLAYER ────────────────────────────────────────────────────
function spawnPlayer(){
  const startY = jugBottom() - 70;
  state.player = {
    x: centerX(), y: startY,
    vx: 0, vy: 0,
    r: 22,
    grounded: false,
    onLeftWall: false,
    onRightWall: false,
    facing: 1,
    bobT: 0,
    coyote: 0,
    jumpBuffer: 0,
    blink: 0,
    color: '#f5d445',
  };
}

// ── FRUITS ────────────────────────────────────────────────────
const FRUIT_TYPES = [
  { key:'strawberry', color:'#e84a6c', accent:'#fff5b1', r:14, name:'strawberry' },
  { key:'grape',      color:'#8b5fbf', accent:'#c4a3e5', r:11, name:'grape' },
  { key:'orange',     color:'#f59140', accent:'#ffce8a', r:14, name:'orange' },
  { key:'kiwi',       color:'#5cb04e', accent:'#dffac0', r:13, name:'kiwi' },
  { key:'cherry',     color:'#c0354c', accent:'#ff8aa0', r:11, name:'cherry' },
];

function spawnInitialFruits(){
  state.fruits = [];
  for (let i = 0; i < state.totalFruit; i++){
    const def = FRUIT_TYPES[i % FRUIT_TYPES.length];
    // distribute through the jug at varying heights
    const y = jugTop() + 100 + (jugHeight() - 200) * (i / state.totalFruit) + (Math.random() * 50 - 25);
    const hw = halfWidth(y);
    const x = centerX() + (Math.random() * hw * 1.4) - hw * 0.7;
    state.fruits.push({
      def, x, y,
      vx: (Math.random() - 0.5) * 80,
      vy: (Math.random() - 0.5) * 60,
      collected: false,
      bobT: Math.random() * Math.PI * 2,
      r: def.r,
    });
  }
}

// ── INPUT ─────────────────────────────────────────────────────
const input = { left:false, right:false, jump:false, jumpPressed:false };
window.addEventListener('keydown', (ev) => {
  if (ev.repeat) return;
  if (ev.key === 'ArrowLeft' || ev.key === 'a' || ev.key === 'A')  { input.left = true; }
  if (ev.key === 'ArrowRight'|| ev.key === 'd' || ev.key === 'D')  { input.right = true; }
  if (ev.key === ' ' || ev.key === 'ArrowUp' || ev.key === 'w' || ev.key === 'W') {
    input.jump = true; input.jumpPressed = true;
    ev.preventDefault();
  }
  if (ev.key === 'r' || ev.key === 'R') reset();
  if (ev.key === 'm' || ev.key === 'M') toggleMute();
});
window.addEventListener('keyup', (ev) => {
  if (ev.key === 'ArrowLeft' || ev.key === 'a' || ev.key === 'A')  input.left = false;
  if (ev.key === 'ArrowRight'|| ev.key === 'd' || ev.key === 'D')  input.right = false;
  if (ev.key === ' ' || ev.key === 'ArrowUp' || ev.key === 'w' || ev.key === 'W') input.jump = false;
});

// touch pad
function bindPad(id, onDown, onUp){
  const el = document.getElementById(id);
  el.addEventListener('pointerdown', (e) => { e.preventDefault(); ensureAudio(); onDown(); });
  el.addEventListener('pointerup',   () => onUp());
  el.addEventListener('pointercancel', () => onUp());
  el.addEventListener('pointerleave',  () => onUp());
}
bindPad('padLeft',  () => { input.left = true; },  () => { input.left = false; });
bindPad('padRight', () => { input.right = true; }, () => { input.right = false; });
bindPad('padJump',  () => { input.jump = true; input.jumpPressed = true; },
                    () => { input.jump = false; });

// ── AUDIO ─────────────────────────────────────────────────────
let actx = null;
function ensureAudio(){
  if (state.muted) return null;
  if (!actx){
    try { actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){ actx = null; }
  }
  return actx;
}
function blip(freq, dur, type, vol){
  const a = ensureAudio(); if (!a) return;
  const o = a.createOscillator(), g = a.createGain();
  o.type = type || 'square';
  o.frequency.value = freq;
  g.gain.value = (vol == null ? 0.06 : vol);
  g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime + (dur || 0.1));
  o.connect(g).connect(a.destination); o.start(); o.stop(a.currentTime + (dur || 0.1) + 0.02);
}
function noiseBurst(dur, vol){
  const a = ensureAudio(); if (!a) return;
  const buf = a.createBuffer(1, Math.floor(a.sampleRate * dur), a.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * (1 - i/data.length);
  const src = a.createBufferSource(); src.buffer = buf;
  const g = a.createGain(); g.gain.value = vol == null ? 0.08 : vol;
  src.connect(g).connect(a.destination); src.start();
}
const sfx = {
  jump:   () => blip(420, 0.09, 'triangle', 0.05),
  collect:() => { blip(600, 0.05, 'triangle', 0.05); blip(900, 0.10, 'triangle', 0.04); },
  hurt:   () => { noiseBurst(0.18, 0.07); blip(150, 0.18, 'sawtooth', 0.05); },
  pulse:  () => { noiseBurst(0.6, 0.12); blip(70, 0.5, 'sawtooth', 0.06); },
  warmup: () => blip(200, 0.5, 'sawtooth', 0.05),
  win:    () => { for (const f of [523, 659, 784, 1047, 1319]) setTimeout(() => blip(f, 0.18, 'triangle', 0.07), (f - 523) * 0.6); },
  lose:   () => { noiseBurst(0.4, 0.08); for (const f of [330, 247, 196, 164]) blip(f, 0.5, 'sawtooth', 0.05); },
};

// ── PHYSICS ───────────────────────────────────────────────────
const GRAVITY = 1100;
const MOVE_ACCEL_GROUND = 800;
const MOVE_ACCEL_AIR = 320;
const MAX_SPEED = 240;
const SLIPPERY_FRICTION = 220;     // low: world is slippery
const WALL_SLIDE_DAMP = 0.55;       // vy multiplier when wall-grabbed
const JUMP_VY = -460;
const WALLJUMP_VY = -440;
const WALLJUMP_VX = 280;

function tickPlayer(dt){
  const p = state.player;
  if (!p) return;
  const blend = state.blender;
  // input acceleration
  const a = p.grounded ? MOVE_ACCEL_GROUND : MOVE_ACCEL_AIR;
  if (input.left)  { p.vx -= a * dt; p.facing = -1; }
  if (input.right) { p.vx += a * dt; p.facing =  1; }
  // friction (only when no input + grounded)
  if (!input.left && !input.right && p.grounded){
    const sign = Math.sign(p.vx);
    p.vx -= sign * Math.min(Math.abs(p.vx), SLIPPERY_FRICTION * dt);
  }
  // clamp horizontal speed
  if (Math.abs(p.vx) > MAX_SPEED) p.vx = Math.sign(p.vx) * MAX_SPEED;

  // gravity
  p.vy += GRAVITY * dt;

  // suction toward blade center when blender active
  if (blend.suction > 0){
    const sx = centerX();
    const sy = bladeY();
    const dx = sx - p.x, dy = sy - p.y;
    const dlen = Math.hypot(dx, dy) + 1;
    const force = 220 * blend.suction;
    p.vx += (dx / dlen) * force * dt;
    p.vy += (dy / dlen) * force * dt;
  }
  // pulse: huge instantaneous pull
  if (performance.now() < state.pulseUntil){
    const sx = centerX();
    const dx = sx - p.x;
    p.vx += Math.sign(dx) * 80 * dt;
    p.vy += 240 * dt;
  }

  // wall slide damping when grabbing
  if (p.onLeftWall && input.left && p.vy > 0)  p.vy *= Math.pow(WALL_SLIDE_DAMP, dt * 8);
  if (p.onRightWall && input.right && p.vy > 0) p.vy *= Math.pow(WALL_SLIDE_DAMP, dt * 8);

  // jump (with coyote + buffer)
  p.coyote = Math.max(0, p.coyote - dt);
  p.jumpBuffer = Math.max(0, p.jumpBuffer - dt);
  if (input.jumpPressed){ p.jumpBuffer = 0.12; input.jumpPressed = false; }
  if (p.jumpBuffer > 0){
    if (p.grounded || p.coyote > 0){
      p.vy = JUMP_VY;
      p.grounded = false; p.coyote = 0; p.jumpBuffer = 0;
      sfx.jump();
    } else if (p.onLeftWall){
      p.vy = WALLJUMP_VY; p.vx =  WALLJUMP_VX;
      p.onLeftWall = false; p.jumpBuffer = 0; sfx.jump();
    } else if (p.onRightWall){
      p.vy = WALLJUMP_VY; p.vx = -WALLJUMP_VX;
      p.onRightWall = false; p.jumpBuffer = 0; sfx.jump();
    }
  }

  // integrate
  p.x += p.vx * dt;
  p.y += p.vy * dt;

  // wall collision (left/right)
  p.onLeftWall = false;
  p.onRightWall = false;
  const lx = leftWallX(p.y);
  const rx = rightWallX(p.y);
  if (p.x - p.r < lx){
    p.x = lx + p.r;
    if (p.vx < 0) p.vx *= -0.18;
    p.onLeftWall = true;
  }
  if (p.x + p.r > rx){
    p.x = rx - p.r;
    if (p.vx > 0) p.vx *= -0.18;
    p.onRightWall = true;
  }
  // floor (jug bottom — actually a curve, but we use a flat line right above blades)
  const floorY = jugBottom() - 8;
  if (p.y + p.r > floorY){
    p.y = floorY - p.r;
    p.vy = 0;
    p.grounded = true;
    p.coyote = 0.12;
  } else {
    p.grounded = false;
  }
  // top win check
  if (p.y + p.r < jugTop() + 4){
    endRun(true);
    return;
  }

  // blade contact
  if (state.iframes <= 0){
    const dx = p.x - centerX();
    const dy = p.y - bladeY();
    const blR = bladeR();
    if (Math.abs(dy) < 28 && Math.abs(dx) < blR && state.blender.suction > 0){
      hurt(1, 'BLADES!');
    }
    // pulse death zone (any contact)
    if (performance.now() < state.pulseUntil){
      if (Math.abs(dy) < 60 && Math.abs(dx) < blR + 10){
        hurt(1, 'PULSED!');
      }
    }
  } else {
    state.iframes -= dt;
  }

  // bob
  p.bobT += dt * 6;
  p.blink -= dt;
  if (p.blink < -0.2 && Math.random() < 0.03) p.blink = 0.18;
}

function hurt(n, label){
  state.hp -= n;
  state.iframes = 1.2;
  state.shake = 14;
  sfx.hurt();
  // knockback away from blades
  const p = state.player;
  if (p){
    const dx = p.x - centerX();
    p.vx = Math.sign(dx || 1) * 320;
    p.vy = -300;
  }
  // floating text
  state.particles.push({
    kind:'text', x: p ? p.x : centerX(), y: p ? p.y - 30 : H/2,
    vx: 0, vy: -80, life: 0.9, max: 0.9, color: '#e74c3c', text: '-' + n + ' ' + label,
  });
  if (state.hp <= 0) endRun(false);
}

function tickFruits(dt){
  const p = state.player;
  for (const f of state.fruits){
    if (f.collected) continue;
    f.bobT += dt * 3;
    // gentle wandering
    f.vx *= Math.pow(0.985, dt * 60);
    f.vy *= Math.pow(0.985, dt * 60);
    if (Math.abs(f.vx) < 5)  f.vx += (Math.random() - 0.5) * 60 * dt;
    if (Math.abs(f.vy) < 5)  f.vy += (Math.random() - 0.5) * 60 * dt;
    // suction
    if (state.blender.suction > 0){
      const dx = centerX() - f.x, dy = bladeY() - f.y;
      const dl = Math.hypot(dx, dy) + 1;
      f.vx += (dx / dl) * 150 * state.blender.suction * dt;
      f.vy += (dy / dl) * 150 * state.blender.suction * dt;
    }
    f.x += f.vx * dt;
    f.y += f.vy * dt;
    // contain in jug
    const lx = leftWallX(f.y), rx = rightWallX(f.y);
    if (f.x - f.r < lx){ f.x = lx + f.r; f.vx = Math.abs(f.vx) * 0.6; }
    if (f.x + f.r > rx){ f.x = rx - f.r; f.vx = -Math.abs(f.vx) * 0.6; }
    if (f.y + f.r > jugBottom() - 14){ f.y = jugBottom() - 14 - f.r; f.vy = -Math.abs(f.vy) * 0.6; }
    if (f.y - f.r < jugTop() + 8){ f.y = jugTop() + 8 + f.r; f.vy = Math.abs(f.vy) * 0.6; }
    // blender pulse pulps fruit
    if (performance.now() < state.pulseUntil){
      const dx = f.x - centerX(), dy = f.y - bladeY();
      if (Math.abs(dy) < 80 && Math.abs(dx) < bladeR()){
        f.collected = true;     // marked, but doesn't count
        spawnPulpBurst(f.x, f.y, f.def.color);
        continue;
      }
    }
    // pickup
    if (p){
      const dx = p.x - f.x, dy = p.y - f.y;
      if (Math.hypot(dx, dy) < p.r + f.r - 2){
        f.collected = true;
        state.collected++;
        state.score += 25;
        sfx.collect();
        spawnPickupBurst(f.x, f.y, f.def.color);
      }
    }
  }
}

function spawnPickupBurst(x, y, color){
  for (let i = 0; i < 10; i++){
    const a = Math.random() * Math.PI * 2;
    const sp = 80 + Math.random() * 120;
    state.particles.push({
      kind:'spark', x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 60,
      life: 0.6 + Math.random() * 0.3, max: 0.9, color,
    });
  }
  state.particles.push({
    kind:'text', x, y: y - 18, vx: 0, vy: -80,
    life: 0.7, max: 0.7, color, text: '+25',
  });
}
function spawnPulpBurst(x, y, color){
  for (let i = 0; i < 18; i++){
    const a = Math.random() * Math.PI * 2;
    const sp = 100 + Math.random() * 200;
    state.particles.push({
      kind:'pulp', x, y, vx: Math.cos(a)*sp, vy: Math.sin(a)*sp - 40,
      life: 0.7, max: 0.7, color,
    });
  }
}

function tickParticles(dt){
  const out = [];
  for (const p of state.particles){
    p.life -= dt;
    if (p.life <= 0) continue;
    p.x += p.vx * dt; p.y += p.vy * dt;
    p.vy += 220 * dt;
    out.push(p);
  }
  state.particles = out;
}

function tickBlender(dt){
  const b = state.blender;
  b.timer -= dt;
  if (b.phase === 'IDLE'){
    state.blades.targetOmega = 0;
    b.suction = 0;
    if (b.timer <= 0){
      b.phase = 'WARMUP';
      b.timer = 5;
      sfx.warmup();
      flashToast('blender warming up...');
    }
  } else if (b.phase === 'WARMUP'){
    state.blades.targetOmega = 4;
    b.suction = 0.3;
    if (b.timer <= 0){
      b.phase = 'ACTIVE';
      b.timer = 1;
      flashToast('BLADES SPINNING!');
    }
  } else if (b.phase === 'ACTIVE'){
    state.blades.targetOmega = 12;
    b.suction = 0.55;
    b.nextPulseIn -= dt;
    if (b.nextPulseIn <= 0){
      // initiate pulse
      state.pulseUntil = performance.now() + 700;
      state.pulseCount++;
      state.shake = 22;
      sfx.pulse();
      flashToast('★ PULSE!');
      b.nextPulseIn = 5 + Math.random() * 4;
    }
  }
  // blade angular velocity ease toward target
  state.blades.omega += (state.blades.targetOmega - state.blades.omega) * Math.min(1, dt * 2);
  if (performance.now() < state.pulseUntil) state.blades.omega = 22;
  state.blades.angle += state.blades.omega * dt;
}

function flashToast(msg){
  state.particles.push({
    kind:'banner', x: centerX(), y: H * 0.18, vx:0, vy:0,
    life: 1.4, max: 1.4, color:'#fff', text: msg,
  });
}

// ── HUD ───────────────────────────────────────────────────────
const hudScore = document.getElementById('hudScore');
const hudFruit = document.getElementById('hudFruit');
const hudHp    = document.getElementById('hudHp');
const hudBlender = document.getElementById('hudBlender');

function refreshHud(){
  hudScore.textContent = state.score;
  hudFruit.textContent = state.collected + '/' + state.totalFruit;
  hudHp.textContent = '♥'.repeat(Math.max(0, state.hp)) + (state.hp < state.hpMax ? '·'.repeat(state.hpMax - state.hp) : '');
  const b = state.blender;
  if (performance.now() < state.pulseUntil) {
    hudBlender.textContent = 'PULSE!';
  } else if (b.phase === 'IDLE') {
    hudBlender.textContent = 'IDLE ' + b.timer.toFixed(1);
  } else if (b.phase === 'WARMUP') {
    hudBlender.textContent = 'WARM ' + b.timer.toFixed(1);
  } else {
    hudBlender.textContent = 'ON ' + b.nextPulseIn.toFixed(1);
  }
}

// ── RENDER ────────────────────────────────────────────────────
function render(){
  // shake
  ctx.save();
  if (state.shake > 0){
    const k = state.shake;
    ctx.translate((Math.random() - 0.5) * k, (Math.random() - 0.5) * k);
    state.shake *= 0.85;
    if (state.shake < 0.3) state.shake = 0;
  }
  // bg counter
  drawCounter();
  // jug back glass (rear)
  drawJugBack();
  // blades (behind player but in front of jug back)
  drawBlades();
  // fruits
  for (const f of state.fruits){
    if (!f.collected) drawFruit(f);
  }
  // player
  if (state.player) drawPlayer(state.player);
  // particles
  for (const p of state.particles) drawParticle(p);
  // jug front gloss + rim (in front)
  drawJugFront();
  // pulse vignette
  if (performance.now() < state.pulseUntil){
    const a = (state.pulseUntil - performance.now()) / 700;
    ctx.fillStyle = 'rgba(231,76,60,' + (0.18 + a * 0.18) + ')';
    ctx.fillRect(0, 0, W, H);
  }
  ctx.restore();
}

function drawCounter(){
  // tile pattern background
  ctx.fillStyle = '#f4e4ba';
  ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = 'rgba(180,140,80,0.10)';
  for (let y = 0; y < H; y += 30){
    for (let x = 0; x < W; x += 30){
      if (((x + y) / 30) % 2 === 0) ctx.fillRect(x, y, 30, 30);
    }
  }
  // soft horizon shadow
  const grad = ctx.createLinearGradient(0, H * 0.55, 0, H);
  grad.addColorStop(0, 'rgba(140,90,30,0)');
  grad.addColorStop(1, 'rgba(140,90,30,0.18)');
  ctx.fillStyle = grad; ctx.fillRect(0, H * 0.55, W, H * 0.45);
}

function jugPath(){
  const top = jugTop(), bot = jugBottom();
  const samples = 22;
  ctx.beginPath();
  // left side top → bottom
  for (let i = 0; i <= samples; i++){
    const t = i / samples;
    const y = top + (bot - top) * t;
    const x = leftWallX(y);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  // bottom curve
  for (let i = 0; i <= samples; i++){
    const t = i / samples;
    const y = bot;
    const x = leftWallX(bot) + (rightWallX(bot) - leftWallX(bot)) * t;
    ctx.lineTo(x, y);
  }
  // right side bottom → top
  for (let i = samples; i >= 0; i--){
    const t = i / samples;
    const y = top + (bot - top) * t;
    const x = rightWallX(y);
    ctx.lineTo(x, y);
  }
  ctx.closePath();
}

function drawJugBack(){
  // glass body
  jugPath();
  ctx.fillStyle = 'rgba(184,230,240,0.50)';
  ctx.fill();
  // inner shadow/depth
  const grad = ctx.createLinearGradient(0, jugTop(), 0, jugBottom());
  grad.addColorStop(0, 'rgba(255,255,255,0.20)');
  grad.addColorStop(1, 'rgba(40,80,100,0.18)');
  jugPath();
  ctx.fillStyle = grad; ctx.fill();
  // measurement ticks
  ctx.strokeStyle = 'rgba(40,80,100,0.45)';
  ctx.lineWidth = 1.5;
  ctx.font = '11px VT323, monospace';
  ctx.fillStyle = 'rgba(40,80,100,0.7)';
  for (let i = 1; i < 6; i++){
    const y = jugTop() + (jugHeight() - 80) * (i / 6);
    const lx = leftWallX(y);
    ctx.beginPath();
    ctx.moveTo(lx + 6, y); ctx.lineTo(lx + 22, y);
    ctx.stroke();
    ctx.fillText((6 - i) + 'C', lx + 28, y + 4);
  }
}

function drawJugFront(){
  // gloss highlight on the right
  ctx.save();
  jugPath();
  ctx.clip();
  const glossX = leftWallX(jugTop() + 100) + halfWidth(jugTop() + 100) * 0.55;
  const grad = ctx.createLinearGradient(glossX, jugTop(), glossX + 30, jugBottom());
  grad.addColorStop(0, 'rgba(255,255,255,0.45)');
  grad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(glossX, jugTop(), 30, jugHeight());
  ctx.restore();
  // rim
  ctx.strokeStyle = '#7bc1d4';
  ctx.lineWidth = 5;
  jugPath();
  ctx.stroke();
  // top "open" rim emphasized
  const lt = leftWallX(jugTop()), rt = rightWallX(jugTop());
  ctx.strokeStyle = '#3d8aa0';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.ellipse((lt + rt)/2, jugTop(), (rt - lt)/2, 8, 0, 0, Math.PI*2);
  ctx.stroke();
  // arrow telegraph for escape
  ctx.fillStyle = 'rgba(60,200,90,0.5)';
  ctx.font = 'bold 22px Bungee, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('↑ ESCAPE', centerX(), jugTop() - 8);
  ctx.textAlign = 'left';
}

function drawBlades(){
  const cx = centerX(), cy = bladeY();
  const r = bladeR();
  // hub housing
  ctx.fillStyle = '#5e6671';
  ctx.beginPath(); ctx.ellipse(cx, cy + 18, r * 1.2, 14, 0, 0, Math.PI*2); ctx.fill();
  // central shaft
  ctx.fillStyle = '#3a4049';
  ctx.beginPath(); ctx.arc(cx, cy, 14, 0, Math.PI*2); ctx.fill();
  // 4 blades rotating
  const ang = state.blades.angle;
  for (let i = 0; i < 4; i++){
    const a = ang + (i * Math.PI / 2);
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(a);
    // blade
    ctx.fillStyle = '#c8cdd3';
    ctx.beginPath();
    ctx.moveTo(0, -3);
    ctx.lineTo(r, -8);
    ctx.lineTo(r, 6);
    ctx.lineTo(0, 3);
    ctx.closePath();
    ctx.fill();
    // blade highlight
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.fillRect(8, -2, r - 12, 1.5);
    // edge
    ctx.strokeStyle = '#5e6671';
    ctx.lineWidth = 1;
    ctx.stroke();
    ctx.restore();
  }
  // motion blur ring when fast
  if (state.blades.omega > 8){
    ctx.strokeStyle = 'rgba(200,205,211,' + Math.min(0.5, state.blades.omega / 30) + ')';
    ctx.lineWidth = 4;
    ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI*2); ctx.stroke();
  }
  // top hub
  ctx.fillStyle = '#3a4049';
  ctx.beginPath(); ctx.arc(cx, cy, 7, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#c8cdd3';
  ctx.beginPath(); ctx.arc(cx, cy, 4, 0, Math.PI*2); ctx.fill();
}

function drawPlayer(p){
  ctx.save();
  ctx.translate(p.x, p.y);
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.20)';
  ctx.beginPath(); ctx.ellipse(0, 24, p.r * 0.9, 5, 0, 0, Math.PI*2); ctx.fill();
  // i-frame flash
  const flash = state.iframes > 0 && (Math.floor(state.iframes * 12) % 2 === 0);
  if (flash) ctx.globalAlpha = 0.6;
  // banana body — curved arc
  const bob = Math.sin(p.bobT) * 2;
  ctx.translate(0, bob);
  ctx.scale(p.facing, 1);
  // body
  ctx.fillStyle = '#f5d445';
  ctx.beginPath();
  ctx.moveTo(-18, 12);
  ctx.quadraticCurveTo(-22, -16, 4, -22);
  ctx.quadraticCurveTo(22, -8, 18, 14);
  ctx.quadraticCurveTo(0, 22, -18, 12);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#2a1f0e'; ctx.lineWidth = 2.5;
  ctx.stroke();
  // banana shading stripe
  ctx.fillStyle = 'rgba(199,155,31,0.4)';
  ctx.beginPath();
  ctx.moveTo(-12, 8);
  ctx.quadraticCurveTo(-14, -8, 6, -16);
  ctx.quadraticCurveTo(8, -12, -8, 6);
  ctx.closePath();
  ctx.fill();
  // tip
  ctx.fillStyle = '#5b3a14';
  ctx.beginPath(); ctx.arc(20, 12, 4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#3e9b4f'; // green stem
  ctx.beginPath(); ctx.arc(-2, -22, 4, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#2a1f0e'; ctx.lineWidth = 1.5;
  ctx.stroke();
  // eyes
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(-2, -8, 5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(8, -8, 5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#2a1f0e';
  if (p.blink > 0){
    ctx.fillRect(-6, -9, 8, 1.5);
    ctx.fillRect( 4, -9, 8, 1.5);
  } else {
    // pupils tracking horizontal velocity
    const px = Math.max(-2, Math.min(2, p.vx / 200));
    ctx.beginPath(); ctx.arc(-2 + px, -8, 2.2, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc( 8 + px, -8, 2.2, 0, Math.PI*2); ctx.fill();
  }
  // mouth — gritted/scared expression
  ctx.strokeStyle = '#2a1f0e'; ctx.lineWidth = 1.8;
  ctx.beginPath();
  if (state.blender.phase === 'IDLE'){
    // small smile
    ctx.arc(3, 0, 4, 0, Math.PI);
  } else if (performance.now() < state.pulseUntil){
    // open scream
    ctx.fillStyle = '#3a1a1a';
    ctx.beginPath(); ctx.ellipse(3, 2, 4, 3, 0, 0, Math.PI*2); ctx.fill();
  } else {
    // worried zigzag
    ctx.moveTo(-2, 1); ctx.lineTo(0, 3); ctx.lineTo(3, 1); ctx.lineTo(6, 3); ctx.lineTo(8, 1);
  }
  ctx.stroke();
  ctx.restore();
}

function drawFruit(f){
  ctx.save();
  ctx.translate(f.x, f.y + Math.sin(f.bobT) * 1.5);
  // shadow
  ctx.fillStyle = 'rgba(0,0,0,0.16)';
  ctx.beginPath(); ctx.ellipse(0, f.r + 4, f.r * 0.8, 3, 0, 0, Math.PI*2); ctx.fill();
  if (f.def.key === 'strawberry'){
    // body — heart-ish
    ctx.fillStyle = f.def.color;
    ctx.beginPath();
    ctx.moveTo(0, f.r);
    ctx.bezierCurveTo(f.r, 4, f.r, -f.r * 0.6, 0, -f.r * 0.4);
    ctx.bezierCurveTo(-f.r, -f.r * 0.6, -f.r, 4, 0, f.r);
    ctx.fill();
    // seeds
    ctx.fillStyle = '#ffe98a';
    for (let i = 0; i < 5; i++){
      ctx.beginPath();
      ctx.arc(Math.cos(i * 1.4) * 5, Math.sin(i * 1.4) * 4, 1.4, 0, Math.PI*2);
      ctx.fill();
    }
    // leafy top
    ctx.fillStyle = '#3e9b4f';
    ctx.beginPath();
    ctx.moveTo(-6, -f.r * 0.55);
    ctx.lineTo(0, -f.r * 0.95);
    ctx.lineTo(6, -f.r * 0.55);
    ctx.closePath();
    ctx.fill();
  } else if (f.def.key === 'grape'){
    ctx.fillStyle = f.def.color;
    ctx.beginPath(); ctx.arc(0, 0, f.r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = f.def.accent;
    ctx.beginPath(); ctx.arc(-3, -3, f.r * 0.4, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#3e9b4f';
    ctx.fillRect(-1, -f.r - 2, 2, 4);
  } else if (f.def.key === 'orange'){
    ctx.fillStyle = f.def.color;
    ctx.beginPath(); ctx.arc(0, 0, f.r, 0, Math.PI*2); ctx.fill();
    // segments
    ctx.strokeStyle = 'rgba(0,0,0,0.18)'; ctx.lineWidth = 0.8;
    for (let i = 0; i < 6; i++){
      ctx.beginPath();
      ctx.moveTo(0, 0);
      ctx.lineTo(Math.cos(i * Math.PI / 3) * f.r, Math.sin(i * Math.PI / 3) * f.r);
      ctx.stroke();
    }
    // pip
    ctx.fillStyle = '#5b3a14';
    ctx.beginPath(); ctx.arc(0, -f.r + 2, 1.5, 0, Math.PI*2); ctx.fill();
  } else if (f.def.key === 'kiwi'){
    ctx.fillStyle = '#a3c574';
    ctx.beginPath(); ctx.arc(0, 0, f.r, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = f.def.accent;
    ctx.beginPath(); ctx.arc(0, 0, f.r * 0.7, 0, Math.PI*2); ctx.fill();
    // seeds
    ctx.fillStyle = '#2a1f0e';
    for (let i = 0; i < 6; i++){
      ctx.beginPath();
      ctx.arc(Math.cos(i * Math.PI / 3) * f.r * 0.5, Math.sin(i * Math.PI / 3) * f.r * 0.5, 1.2, 0, Math.PI*2);
      ctx.fill();
    }
  } else if (f.def.key === 'cherry'){
    ctx.fillStyle = f.def.color;
    ctx.beginPath(); ctx.arc(-4, 4, f.r * 0.7, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(5, 4, f.r * 0.7, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = f.def.accent;
    ctx.beginPath(); ctx.arc(-6, 1, f.r * 0.2, 0, Math.PI*2); ctx.fill();
    // stems
    ctx.strokeStyle = '#3e9b4f'; ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-4, 0); ctx.quadraticCurveTo(0, -f.r - 2, 5, 0);
    ctx.stroke();
  }
  ctx.strokeStyle = 'rgba(0,0,0,0.45)'; ctx.lineWidth = 1.2;
  ctx.restore();
}

function drawParticle(p){
  if (p.kind === 'spark'){
    ctx.fillStyle = p.color;
    ctx.globalAlpha = Math.max(0, p.life / p.max);
    ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
    ctx.globalAlpha = 1;
  } else if (p.kind === 'pulp'){
    ctx.fillStyle = p.color;
    ctx.globalAlpha = Math.max(0, p.life / p.max);
    ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
    ctx.globalAlpha = 1;
  } else if (p.kind === 'text'){
    ctx.font = 'bold 16px Bungee, sans-serif';
    ctx.fillStyle = p.color;
    ctx.globalAlpha = Math.max(0, p.life / p.max);
    ctx.textAlign = 'center';
    ctx.fillText(p.text, p.x, p.y);
    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
  } else if (p.kind === 'banner'){
    ctx.font = 'bold 30px Bowlby One SC, sans-serif';
    ctx.fillStyle = '#fff';
    ctx.strokeStyle = '#2a1f0e';
    ctx.lineWidth = 5;
    ctx.textAlign = 'center';
    ctx.globalAlpha = Math.max(0, p.life / p.max);
    ctx.strokeText(p.text, p.x, p.y);
    ctx.fillText(p.text, p.x, p.y);
    ctx.textAlign = 'left';
    ctx.globalAlpha = 1;
  }
}

// ── END / RESET ───────────────────────────────────────────────
const overlay = document.getElementById('overlay');
const overlayInner = document.getElementById('overlayInner');
const ovTitle = document.getElementById('ovTitle');
const ovBody = document.getElementById('ovBody');
const ovStats = document.getElementById('ovStats');
const ovBtn = document.getElementById('ovBtn');

function endRun(win){
  if (state.ended) return;
  state.ended = true;
  state.endedWin = win;
  if (win){
    state.score += 500 + state.hp * 100;
    overlayInner.className = 'overlay-inner win';
    ovTitle.textContent = 'YOU MADE IT';
    ovBody.textContent = 'fruit salad cleared the rim. The kitchen is yours.';
    sfx.win();
  } else {
    overlayInner.className = 'overlay-inner lose';
    ovTitle.textContent = 'PULPED';
    ovBody.textContent = 'you became a smoothie. Quite tropical, actually.';
    sfx.lose();
  }
  ovStats.textContent = 'score ' + state.score + ' · salad ' + state.collected + '/' + state.totalFruit + ' · pulses survived ' + Math.max(0, state.pulseCount - (win ? 0 : 1));
  ovBtn.textContent = win ? 'play again' : 'try again';
  overlay.hidden = false;
}
ovBtn.addEventListener('click', () => { reset(); ensureAudio(); });

function reset(){
  state.ended = false;
  state.endedWin = false;
  state.score = 0;
  state.collected = 0;
  state.hp = state.hpMax;
  state.iframes = 0;
  state.pulseUntil = 0;
  state.pulseCount = 0;
  state.shake = 0;
  state.particles = [];
  state.blades = { angle: 0, omega: 0, targetOmega: 0 };
  state.blender = { phase: 'IDLE', timer: 5, nextPulseIn: 4 + Math.random() * 3, suction: 0 };
  spawnPlayer();
  spawnInitialFruits();
  overlay.hidden = true;
}

function toggleMute(){
  state.muted = !state.muted;
  document.getElementById('muteBtn').textContent = '♪ ' + (state.muted ? 'off' : 'on');
  document.getElementById('muteBtn').setAttribute('aria-pressed', String(state.muted));
}
document.getElementById('muteBtn').addEventListener('click', toggleMute);
document.getElementById('resetBtn').addEventListener('click', () => { reset(); ensureAudio(); });

// ── MAIN LOOP ─────────────────────────────────────────────────
let lastTs = 0;
function loop(ts){
  if (!lastTs) lastTs = ts;
  const dtMs = Math.min(60, ts - lastTs);
  const dt = dtMs / 1000;
  lastTs = ts;
  if (!state.ended){
    tickBlender(dt);
    tickPlayer(dt);
    tickFruits(dt);
    tickParticles(dt);
  }
  render();
  refreshHud();
  requestAnimationFrame(loop);
}

// ── BOOT ──────────────────────────────────────────────────────
resizeCanvas();
reset();
requestAnimationFrame(loop);
</script>
</body>
</html>
