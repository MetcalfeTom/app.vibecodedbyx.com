<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Phone Panel — a living status dashboard, Windows 11 style</title>
<meta name="description" content="Simulated battery, flaky Wi-Fi, a notification tray that fills up, and quick toggles for DND and vibration — all in acrylic Windows 11 style.">
<link rel="icon" href="https://emojicdn.elk.sh/🔋">
<meta property="og:title" content="Phone Panel">
<meta property="og:description" content="Simulated battery, flaky Wi-Fi, a notification tray that fills up, and quick toggles for DND and vibration — all in acrylic Windows 11 style.">
<meta property="og:url" content="https://sloppy.live/phone-panel">
<meta property="og:image" content="https://image.pollinations.ai/prompt/windows%2011%20style%20quick%20settings%20panel%20acrylic%20blur%20blue%20bloom%20wallpaper%20notification%20center%20clean%20ui?width=1200&height=630&seed=1111&nologo=true">
<style>
:root{
  --acc:#4cc2ff; --acc2:#0067c0;
  --panel:rgba(243,243,243,.78); --card:rgba(255,255,255,.62); --ink:#1b1b1b; --dim:#5c5c5c;
  --line:rgba(0,0,0,.09); --on:#0067c0; --focus:#0067c0;
}
html{font-size:100%;}
*{box-sizing:border-box;}
body{margin:0; min-height:100vh; color:var(--ink);
  /* Segoe stack is deliberate: the brief IS Windows 11 */
  font-family:'Segoe UI Variable','Segoe UI',system-ui,-apple-system,sans-serif;
  overflow-x:hidden;}
body::before{content:''; position:fixed; inset:0; z-index:-2;
  background:
    radial-gradient(ellipse 60% 50% at 25% 30%, rgba(76,194,255,.55), transparent 60%),
    radial-gradient(ellipse 50% 45% at 75% 60%, rgba(140,110,255,.45), transparent 60%),
    radial-gradient(ellipse 45% 40% at 55% 20%, rgba(255,150,190,.3), transparent 60%),
    linear-gradient(160deg,#0a2a52,#123a6b 50%,#0d2547);}
body.dark{--panel:rgba(32,32,32,.78); --card:rgba(44,44,44,.62); --ink:#f3f3f3; --dim:#a8a8a8; --line:rgba(255,255,255,.09);}
body.dnd-on::before{filter:saturate(.7) brightness(.85);}
main{min-height:100vh; display:flex; flex-direction:column; padding-bottom:4rem;}
header{text-align:center; padding:1.1rem 1rem .4rem; color:#fff; text-shadow:0 2px 12px rgba(0,20,50,.5);}
h1{font-weight:600; font-size:clamp(1.5rem,5vw,2.2rem); margin:0; letter-spacing:.01em;}
.sub{font-size:.8rem; opacity:.8; margin:.2rem 0 0; font-weight:400;}
#stage{flex:1; display:flex; flex-wrap:wrap; gap:1rem; align-items:flex-start; justify-content:center; padding:1rem;}
.fly{background:var(--panel); backdrop-filter:blur(24px) saturate(1.4); -webkit-backdrop-filter:blur(24px) saturate(1.4);
  border:1px solid var(--line); border-radius:12px; box-shadow:0 16px 44px rgba(0,10,30,.35);
  width:min(23rem,94vw); padding:1rem; color:var(--ink);}
.fly h2{font-size:.85rem; font-weight:600; margin:0 0 .7rem;}
/* quick settings */
#qs-grid{display:grid; grid-template-columns:repeat(3,1fr); gap:.55rem;}
.qs{border:1px solid var(--line); border-radius:8px; background:var(--card); color:var(--ink);
  min-height:3.6rem; font-size:.72rem; font-weight:600; cursor:pointer; display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:.25rem; padding:.4rem;
  font-family:inherit;}
.qs .ico{font-size:1.15rem;}
.qs[aria-pressed="true"]{background:var(--on); border-color:var(--on); color:#fff;}
.qs:focus-visible{outline:3px solid var(--focus); outline-offset:2px;}
.sliders{margin-top:.8rem; display:flex; flex-direction:column; gap:.55rem;}
.sliders label{display:flex; align-items:center; gap:.6rem; font-size:.78rem;}
.sliders input[type=range]{flex:1; accent-color:var(--acc2); min-height:2.2rem;}
#qs-foot{display:flex; justify-content:space-between; align-items:center; margin-top:.8rem; font-size:.75rem; color:var(--dim);}
#batt-line{display:flex; align-items:center; gap:.45rem;}
#batt-icon{width:1.7rem; height:.85rem; border:1.5px solid currentColor; border-radius:3px; position:relative; display:inline-block;}
#batt-icon::after{content:''; position:absolute; right:-4px; top:20%; width:3px; height:60%; background:currentColor; border-radius:1px;}
#batt-fill{position:absolute; left:1px; top:1px; bottom:1px; background:currentColor; border-radius:1px; max-width:calc(100% - 2px);}
/* notification center */
#nc-list{display:flex; flex-direction:column; gap:.5rem; max-height:21rem; overflow-y:auto;}
.notif{background:var(--card); border:1px solid var(--line); border-radius:8px; padding:.55rem .7rem;
  display:flex; gap:.6rem; align-items:flex-start;}
.notif .nico{font-size:1.15rem;}
.notif .nb{flex:1; min-width:0;}
.notif .nt{font-size:.78rem; font-weight:600;}
.notif .nx{font-size:.74rem; color:var(--dim); overflow:hidden; text-overflow:ellipsis;}
.notif .when{font-size:.62rem; color:var(--dim); white-space:nowrap;}
.notif button{border:none; background:transparent; color:var(--dim); cursor:pointer; font-size:.9rem; min-height:2.2rem; min-width:2.2rem; border-radius:6px; font-family:inherit;}
.notif button:hover{background:var(--line); color:var(--ink);}
#nc-head{display:flex; justify-content:space-between; align-items:center; margin-bottom:.6rem;}
#nc-clear{border:1px solid var(--line); background:var(--card); color:var(--ink); border-radius:6px;
  font-size:.7rem; font-weight:600; cursor:pointer; min-height:2.2rem; padding:.2rem .7rem; font-family:inherit;}
#nc-empty{color:var(--dim); font-size:.78rem; text-align:center; padding:1.2rem 0;}
/* taskbar */
#taskbar{position:fixed; left:0; right:0; bottom:0; height:3.2rem; z-index:20;
  background:var(--panel); backdrop-filter:blur(24px) saturate(1.4); -webkit-backdrop-filter:blur(24px) saturate(1.4);
  border-top:1px solid var(--line); display:flex; align-items:center; justify-content:flex-end; padding:0 .6rem; gap:.4rem;}
#tray{display:flex; align-items:center; gap:.6rem; border-radius:8px; padding:.3rem .7rem; cursor:pointer;
  border:1px solid transparent; background:transparent; color:var(--ink); font-family:inherit; font-size:.75rem; min-height:2.5rem;}
#tray:hover{background:var(--card); border-color:var(--line);}
#tray:focus-visible{outline:3px solid var(--focus); outline-offset:2px;}
#clockbox{text-align:right; font-size:.72rem; line-height:1.3;}
#wifi-glyph,#batt-glyph{font-size:.95rem;}
#nbadge{background:var(--acc2); color:#fff; font-size:.62rem; border-radius:99px; padding:.05rem .4rem; font-weight:600;}
/* banners */
#banners{position:fixed; right:.8rem; bottom:4rem; z-index:30; display:flex; flex-direction:column; gap:.5rem; width:min(21rem,90vw);}
.banner{background:var(--panel); backdrop-filter:blur(24px); border:1px solid var(--line); border-radius:10px;
  padding:.6rem .8rem; box-shadow:0 12px 34px rgba(0,10,30,.4); display:flex; gap:.6rem; align-items:flex-start;
  animation:bannerIn .28s cubic-bezier(.2,.9,.3,1);}
@keyframes bannerIn{from{transform:translateX(110%); opacity:0;} to{transform:none; opacity:1;}}
.banner.gone{opacity:0; transform:translateX(30%); transition:all .3s;}
footer{position:fixed; left:.8rem; bottom:4rem; z-index:5; font-size:.6rem; color:rgba(255,255,255,.65); text-shadow:0 1px 6px rgba(0,20,50,.6);}
#sr-status{position:absolute; left:-999rem;}
@media (prefers-reduced-motion:reduce){ *{animation:none!important; transition:none!important;} }
</style>
</head>
<body>
<main>
  <header>
    <h1>Phone Panel</h1>
    <p class="sub">a living status dashboard — the battery is really draining, the Wi-Fi really flakes</p>
  </header>
  <div id="stage">
    <!-- quick settings flyout -->
    <section class="fly" aria-label="Quick settings">
      <h2>Quick settings</h2>
      <div id="qs-grid">
        <button class="qs" id="t-wifi" type="button" aria-pressed="true"><span class="ico" aria-hidden="true">📶</span>Wi-Fi</button>
        <button class="qs" id="t-dnd" type="button" aria-pressed="false"><span class="ico" aria-hidden="true">🌙</span>Do not disturb</button>
        <button class="qs" id="t-vib" type="button" aria-pressed="true"><span class="ico" aria-hidden="true">📳</span>Vibration</button>
        <button class="qs" id="t-air" type="button" aria-pressed="false"><span class="ico" aria-hidden="true">✈️</span>Airplane</button>
        <button class="qs" id="t-saver" type="button" aria-pressed="false"><span class="ico" aria-hidden="true">🍃</span>Battery saver</button>
        <button class="qs" id="t-theme" type="button" aria-pressed="false"><span class="ico" aria-hidden="true">🌗</span>Dark mode</button>
      </div>
      <div class="sliders">
        <label>☀️ <input id="s-bright" type="range" min="10" max="100" value="80" aria-label="brightness"></label>
        <label>🔊 <input id="s-vol" type="range" min="0" max="100" value="55" aria-label="volume"></label>
      </div>
      <div id="qs-foot">
        <span id="batt-line" title="battery"><span id="batt-icon"><span id="batt-fill"></span></span><span id="batt-pct">100%</span><button id="t-charge" type="button" style="border:1px solid var(--line);background:var(--card);color:var(--ink);border-radius:6px;font-size:.68rem;min-height:2.2rem;padding:.15rem .55rem;cursor:pointer;font-family:inherit;" aria-pressed="false">🔌 plug in</button></span>
        <span id="net-line">📶 connected</span>
      </div>
    </section>
    <!-- notification center -->
    <section class="fly" aria-label="Notification center">
      <div id="nc-head">
        <h2 style="margin:0;">Notifications <span id="nbadge2"></span></h2>
        <button id="nc-clear" type="button">Clear all</button>
      </div>
      <div id="nc-list"></div>
      <p id="nc-empty">no notifications — a rare peace</p>
    </section>
  </div>
</main>
<div id="banners" aria-hidden="true"></div>
<div id="taskbar">
  <button id="tray" type="button" aria-label="system tray: network, battery, clock, notifications">
    <span id="wifi-glyph" aria-hidden="true">📶</span>
    <span id="batt-glyph" aria-hidden="true">🔋</span>
    <span id="clockbox"><span id="clock">--:--</span><br><span id="dateline">—</span></span>
    <span id="nbadge" hidden>0</span>
  </button>
</div>
<footer>every stat is simulated live · <span id="build-info">build <b>v1.0</b> · commit <code id="build-hash">cae58a545</code></span></footer>
<p id="sr-status" role="status" aria-live="polite"></p>
<script>
(function(){
'use strict';
function $(id){ return document.getElementById(id); }
function announce(t){ $('sr-status').textContent=t; }
var reduceMotion=false;
try{ reduceMotion=matchMedia('(prefers-reduced-motion: reduce)').matches; }catch(e){}

/* ═══ state ═══ */
var S={
  batt:100, charging:false, saver:false, brightness:80,
  wifi:true, air:false, signal:3, netState:'connected', reconnectT:0,
  dnd:false, vib:true, dark:false,
  notifs:[], warned20:false, warned10:false, nid:0
};
function loadPrefs(){
  try{
    var p=JSON.parse(localStorage.getItem('pp-prefs')||'{}');
    ['dnd','vib','dark','saver'].forEach(function(k){ if(typeof p[k]==='boolean') S[k]=p[k]; });
  }catch(e){}
}
function savePrefs(){
  try{ localStorage.setItem('pp-prefs',JSON.stringify({dnd:S.dnd,vib:S.vib,dark:S.dark,saver:S.saver})); }catch(e){}
}

/* ═══ notifications ═══ */
var POOL=[
 {ico:'💬', t:'Maria',        x:['are you seeing this app on the stream??','ok but the cape look was ART','call me when the bobbin thing is fixed']},
 {ico:'💬', t:'Groupchat 🧵', x:['petition to rename every app to thunderdome','who voted out granny?? monsters','5 new looks dropped, get in here']},
 {ico:'📅', t:'Calendar',     x:['Fitting at the atelier — 15 min','Runway rehearsal at 6','Return the pinking shears (overdue)']},
 {ico:'⚙️', t:'System',       x:['Update ready: Fabric Drivers 11.4','Storage almost full: 47 GB of selfies','Night light will turn on at sunset']},
 {ico:'🛒', t:'Delivery',     x:['Your bolt of woad-blue cloth is 2 stops away','Package delivered: 1× thimble (gold)','Your needles have shipped']},
 {ico:'⚡', t:'Thunderdome',  x:['Leo Baroque was eliminated — chat went wild','New season starting soon','Kilowatt defended the crown']}
];
function pushNotif(ico,t,x,sys){
  var n={id:++S.nid, ico:ico, t:t, x:x, at:new Date()};
  S.notifs.unshift(n);
  if(S.notifs.length>30) S.notifs.pop();
  renderTray();
  if(!S.dnd){
    banner(n);
    if(S.vib&&navigator.vibrate){ try{ navigator.vibrate(60); }catch(e){} }
    announce('notification from '+t+': '+x);
  }else{
    announce('notification silently added to the tray ('+t+')');
  }
  return n;
}
function randomNotif(){
  var p=POOL[Math.floor(Math.random()*POOL.length)];
  pushNotif(p.ico,p.t,p.x[Math.floor(Math.random()*p.x.length)]);
}
function banner(n){
  var box=$('banners');
  if(!box.appendChild) return;
  var b=document.createElement('div');
  b.className='banner';
  b.innerHTML='<span class="nico">'+n.ico+'</span><span class="nb"><span class="nt">'+n.t+'</span><br><span class="nx">'+n.x+'</span></span>';
  box.appendChild(b);
  setTimeout(function(){ b.className='banner gone'; setTimeout(function(){ try{ b.remove(); }catch(e){} },350); }, reduceMotion?2200:3600);
}
function fmtWhen(d){
  try{ var mins=Math.round((Date.now()-d.getTime())/60000);
    return mins<1?'now':mins+'m'; }catch(e){ return ''; }
}
function renderTray(){
  var list=$('nc-list'); if(!list) return;
  list.innerHTML='';
  S.notifs.forEach(function(n){
    var el=document.createElement('div');
    el.className='notif';
    el.innerHTML='<span class="nico" aria-hidden="true">'+n.ico+'</span><span class="nb"><span class="nt">'+n.t+'</span><br><span class="nx">'+n.x+'</span></span><span class="when">'+fmtWhen(n.at)+'</span>';
    var d=document.createElement('button');
    d.type='button'; d.textContent='✕'; d.setAttribute('aria-label','dismiss notification from '+n.t);
    d.addEventListener('click',function(){
      S.notifs=S.notifs.filter(function(m){ return m.id!==n.id; });
      renderTray();
    });
    el.appendChild(d);
    list.appendChild(el);
  });
  $('nc-empty').style.display=S.notifs.length?'none':'block';
  $('nbadge2').textContent=S.notifs.length?('· '+S.notifs.length):'';
  var badge=$('nbadge');
  badge.hidden=!S.notifs.length;
  badge.textContent=S.notifs.length;
}
$('nc-clear').addEventListener('click',function(){
  S.notifs=[]; renderTray(); announce('all notifications cleared');
});

/* ═══ battery ═══ */
function battTick(dt){
  if(S.charging){
    S.batt=Math.min(100,S.batt+dt*1.4);
    if(S.batt>=100){ S.batt=100; }
    S.warned20=S.batt>22?false:S.warned20;
    S.warned10=S.batt>12?false:S.warned10;
  }else{
    var drain=0.06*(0.6+S.brightness/100)*(S.saver?0.5:1);
    S.batt=Math.max(0,S.batt-dt*drain);
    if(S.batt<=20&&!S.warned20){ S.warned20=true; pushNotif('🪫','Battery','20% remaining — battery saver?',true); }
    if(S.batt<=10&&!S.warned10){ S.warned10=true; pushNotif('🪫','Battery','10%! find a charger, hero.',true); }
  }
  var pct=Math.round(S.batt);
  $('batt-pct').textContent=pct+'%'+(S.charging?' ⚡':'');
  $('batt-fill').style.width=Math.max(2,pct*0.96)+'%';
  $('batt-glyph').textContent=S.charging?'⚡':(pct>60?'🔋':pct>20?'🔋':'🪫');
  $('batt-line').style.color = pct<=20&&!S.charging ? '#c0392b' : '';
}
$('t-charge').addEventListener('click',function(){
  S.charging=!S.charging;
  this.textContent=S.charging?'⚡ charging':'🔌 plug in';
  this.setAttribute('aria-pressed',S.charging?'true':'false');
  announce(S.charging?'plugged in — charging':'unplugged');
});

/* ═══ network ═══ */
function netTick(dt){
  if(S.air||!S.wifi){
    S.netState='offline';
  }else if(S.netState==='reconnecting'){
    S.reconnectT-=dt;
    if(S.reconnectT<=0){ S.netState='connected'; S.signal=2+Math.floor(Math.random()*2);
      pushNotif('📶','Network','back online — signal restored',true); }
  }else{
    if(Math.random()<0.004){                                  /* the flake */
      S.netState='reconnecting'; S.reconnectT=4+Math.random()*5;
      pushNotif('📵','Network','connection lost — reconnecting…',true);
    }else if(Math.random()<0.06){
      S.signal=Math.max(1,Math.min(4,S.signal+(Math.random()<0.5?-1:1)));
    }
  }
  var bars=['▂','▂▄','▂▄▆','▂▄▆█'];
  var g = S.air?'✈️' : !S.wifi?'⌀' : S.netState==='reconnecting'?'…' : bars[S.signal-1];
  $('wifi-glyph').textContent=g;
  $('net-line').textContent = S.air?'✈️ airplane mode' : !S.wifi?'⌀ wi-fi off'
    : S.netState==='reconnecting'?'📵 reconnecting…' : '📶 connected · '+S.signal+' bars';
}

/* ═══ toggles ═══ */
function setToggle(id,on){ $(id).setAttribute('aria-pressed',on?'true':'false'); }
$('t-wifi').addEventListener('click',function(){
  if(S.air){ announce('turn off airplane mode first'); return; }
  S.wifi=!S.wifi; setToggle('t-wifi',S.wifi);
  announce('wi-fi '+(S.wifi?'on':'off'));
});
$('t-air').addEventListener('click',function(){
  S.air=!S.air; setToggle('t-air',S.air);
  if(S.air){ setToggle('t-wifi',false); } else { setToggle('t-wifi',S.wifi); }
  announce('airplane mode '+(S.air?'on — all radios down':'off'));
});
$('t-dnd').addEventListener('click',function(){
  S.dnd=!S.dnd; setToggle('t-dnd',S.dnd); savePrefs();
  document.body.classList.toggle('dnd-on',S.dnd);
  announce(S.dnd?'do not disturb on — notifications go quietly to the tray':'do not disturb off');
});
$('t-vib').addEventListener('click',function(){
  S.vib=!S.vib; setToggle('t-vib',S.vib); savePrefs();
  if(S.vib&&navigator.vibrate){ try{ navigator.vibrate([40,60,40]); }catch(e){} }
  announce('vibration '+(S.vib?'on':'off'));
});
$('t-saver').addEventListener('click',function(){
  S.saver=!S.saver; setToggle('t-saver',S.saver); savePrefs();
  announce('battery saver '+(S.saver?'on — drain halved':'off'));
});
$('t-theme').addEventListener('click',function(){
  S.dark=!S.dark; setToggle('t-theme',S.dark); savePrefs();
  document.body.classList.toggle('dark',S.dark);
  announce(S.dark?'dark mode':'light mode');
});
$('s-bright').addEventListener('input',function(){ S.brightness=parseInt(this.value,10)||80; });
$('tray').addEventListener('click',function(){
  window.scrollTo({top:0, behavior:reduceMotion?'auto':'smooth'});
  announce(S.notifs.length+' notifications. battery '+Math.round(S.batt)+' percent. '+$('net-line').textContent);
});

/* ═══ clock + main loop ═══ */
function clockTick(){
  var d=new Date();
  var hh=String(d.getHours()).padStart(2,'0'), mm=String(d.getMinutes()).padStart(2,'0');
  $('clock').textContent=hh+':'+mm;
  $('dateline').textContent=d.toLocaleDateString(undefined,{month:'short',day:'numeric'});
}
var lastNotifAt=0, elapsed=0;
setInterval(function(){
  elapsed+=1;
  battTick(1);
  netTick(1);
  clockTick();
  /* the world writes to you every so often */
  if(elapsed-lastNotifAt > 14+Math.random()*22){
    lastNotifAt=elapsed;
    randomNotif();
  }
},1000);

/* boot */
loadPrefs();
setToggle('t-dnd',S.dnd); setToggle('t-vib',S.vib); setToggle('t-saver',S.saver); setToggle('t-theme',S.dark);
document.body.classList.toggle('dark',S.dark);
document.body.classList.toggle('dnd-on',S.dnd);
clockTick(); battTick(0); netTick(0); renderTray();
setTimeout(function(){ pushNotif('👋','Phone Panel','welcome — everything here is alive. watch the battery.'); }, reduceMotion?300:1200);
announce('phone panel ready. quick settings on the left, notifications on the right, tray in the corner.');

window.__pp={ S:S, battTick:battTick, netTick:netTick, pushNotif:pushNotif, randomNotif:randomNotif,
  renderTray:renderTray, loadPrefs:loadPrefs, savePrefs:savePrefs };
})();
</script>
</body>
</html>
