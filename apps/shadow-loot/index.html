<!DOCTYPE html>
<html lang="ru" data-lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Тень-Добыча · паладин против тени</title>
<meta name="description" content="Descend the crypt as the last paladin. Loot the shadow-touched dead. Forge holy gear at the chapel. A short, moody Gothic RPG.">
<meta property="og:title" content="Shadow-Loot · Paladin vs Shadow">
<meta property="og:description" content="The last paladin descends the shadow-crypt. Loot the shadow-touched. Craft blessed steel. UnifrakturCook fonts, candlelight, regret.">
<meta property="og:image" content="https://image.pollinations.ai/prompt/Dark%20gothic%20crypt%20interior%20with%20candles%2C%20stone%20gargoyles%2C%20a%20rusted%20sword%2C%20velvet%20shadows%2C%20editorial%20moody%20deep%20charcoal%20and%20blood%20red?width=1200&height=630&model=flux&nologo=true&seed=666">
<meta property="og:url" content="https://sloppy.live/shadow-loot">
<meta property="og:type" content="website">
<link rel="icon" href="https://emojicdn.elk.sh/💀">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&family=Cormorant+Garamond:ital,wght@0,500;1,400&family=JetBrains+Mono:wght@400;500;700&family=PT+Serif+Caption:ital@0;1&family=PT+Serif:ital,wght@0,400;0,700;1,400;1,700&family=Marck+Script&display=swap" rel="stylesheet">
<style>
  :root{
    --void:     #0a0608;
    --stone-1:  #1a1414;
    --stone-2:  #2a1f1c;
    --stone-3:  #3a2f2a;
    --candle:   #f5c026;
    --candle-2: #d68c1a;
    --bone:     #e8dcc4;
    --bone-2:   #b8a888;
    --blood:    #9a1a1e;
    --blood-2:  #c43d33;
    --moon:     #b8c8e0;
    --ghost:    #88c0d0;
    --rust:     #c97746;
    --ink:      #2a1f1c;
    /* tier colors */
    --t-broken:    #6a5a4a;
    --t-common:    #b8a888;
    --t-fine:      #6cb7e8;
    --t-master:    #b870ff;
    --t-legend:    #f5c026;
    --t-cursed:    #9a1a1e;
  }
  *{ box-sizing: border-box; margin: 0; padding: 0; }
  html, body{ background: #000; color: var(--bone); height: 100vh; overflow: hidden; }
  /* Cyrillic font fallback: IM Fell English doesn't have Cyrillic glyphs, swap to PT Serif when in RU mode */
  [data-lang="ru"] body,
  [data-lang="ru"] .scene-desc,
  [data-lang="ru"] .item-tip .desc,
  [data-lang="ru"] .item-tip .affixes .aff,
  [data-lang="ru"] .recipe-row .info .flavor,
  [data-lang="ru"] .modal .sub,
  [data-lang="ru"] .skill-branch .skill-tier .nm,
  [data-lang="ru"] .skill-branch .skill-tier .ef {
    font-family: 'PT Serif', 'IM Fell English', 'Cormorant Garamond', serif;
  }
  [data-lang="ru"] .top h1,
  [data-lang="ru"] .modal h2,
  [data-lang="ru"] .item-tip .nm,
  [data-lang="ru"] .recipe-row .info .name,
  [data-lang="ru"] .skill-branch h3,
  [data-lang="ru"] .scene-title,
  [data-lang="ru"] .death-screen h2 {
    font-family: 'Marck Script', 'PT Serif Caption', 'UnifrakturCook', serif;
    letter-spacing: 0;
  }
  [data-lang="ru"] .btn,
  [data-lang="ru"] .equip-slot .nm,
  [data-lang="ru"] .inv-section h3,
  [data-lang="ru"] .scene-depth,
  [data-lang="ru"] .item-tip .tt,
  [data-lang="ru"] #btn-respawn {
    font-family: 'PT Serif Caption', 'IM Fell English SC', serif;
  }
  body{
    font-family: 'IM Fell English', 'Cormorant Garamond', serif;
    display: flex; flex-direction: column;
    background:
      radial-gradient(ellipse 50% 40% at 50% 20%, rgba(245,192,38,0.05), transparent 70%),
      radial-gradient(ellipse 40% 30% at 50% 90%, rgba(154,26,30,0.06), transparent 70%),
      var(--void);
    background-attachment: fixed;
  }
  /* Heavy paper grain overlay */
  body::before{
    content: '';
    position: fixed; inset: 0;
    background-image:
      repeating-linear-gradient(7deg, rgba(120,80,60,0.02) 0 1px, transparent 1px 4px),
      repeating-linear-gradient(97deg, rgba(120,80,60,0.02) 0 1px, transparent 1px 6px);
    pointer-events: none;
    z-index: 1;
    mix-blend-mode: screen;
  }
  /* Flickering candle vignette */
  body::after{
    content: '';
    position: fixed; inset: 0;
    background: radial-gradient(ellipse 80% 70% at 50% 50%, transparent 30%, rgba(0,0,0,0.55) 80%);
    pointer-events: none;
    z-index: 2;
    animation: flicker 4.2s ease-in-out infinite;
  }
  @keyframes flicker{
    0%, 100%{ opacity: 1; }
    20%, 60%{ opacity: 0.86; }
    40%, 80%{ opacity: 0.94; }
  }
  /* ── Top bar ────────────────────────────────────────── */
  .top{
    z-index: 5;
    background: linear-gradient(180deg, #1a1010 0%, #0a0608 100%);
    border-bottom: 2px solid #4a2a2a;
    padding: 10px 20px;
    display: grid;
    grid-template-columns: auto 1fr auto;
    align-items: center;
    gap: 18px;
    flex-wrap: wrap;
    box-shadow: 0 2px 0 #2a1818, 0 6px 16px rgba(0,0,0,0.7);
  }
  .top h1{
    font-family: 'UnifrakturCook', serif;
    font-size: clamp(24px, 3vw, 34px);
    color: var(--blood-2);
    line-height: 1;
    letter-spacing: 0.02em;
    text-shadow: 0 0 12px rgba(154,26,30,0.6), 2px 2px 0 #000;
  }
  .top h1 em{
    color: var(--bone);
    font-style: italic;
    font-family: 'IM Fell English', serif;
    font-size: 0.55em;
    font-weight: 400;
    margin-left: 8px;
    letter-spacing: 0.06em;
  }
  /* Language toggle pill */
  .lang-toggle{
    display: inline-flex;
    border: 1px solid var(--bone-2);
    background: rgba(0,0,0,0.5);
    font: 700 11px 'JetBrains Mono', monospace;
    letter-spacing: 0.1em;
    cursor: pointer;
    overflow: hidden;
    user-select: none;
    border-radius: 2px;
  }
  .lang-toggle button{
    background: transparent;
    border: 0; padding: 4px 10px;
    color: var(--bone-2);
    cursor: pointer;
    font: inherit;
  }
  .lang-toggle button.active{
    background: var(--candle);
    color: var(--ink);
    font-weight: 700;
  }
  .lang-toggle button:not(.active):hover{
    color: var(--bone);
    background: rgba(245,192,38,0.08);
  }
  .hp-block{
    display: flex; align-items: center; gap: 12px;
  }
  .hp-bar{
    flex: 1;
    height: 22px;
    background: rgba(0,0,0,0.65);
    border: 1px solid var(--blood);
    box-shadow: inset 0 0 12px rgba(154,26,30,0.4);
    position: relative;
    overflow: hidden;
    max-width: 360px;
  }
  .hp-fill{
    height: 100%;
    background: linear-gradient(90deg, var(--blood), var(--blood-2));
    transition: width 0.32s cubic-bezier(0.25,0.95,0.4,1);
    box-shadow: 0 0 16px var(--blood);
  }
  .hp-label{
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font: 700 13px 'JetBrains Mono', monospace;
    color: var(--bone);
    text-shadow: 1px 1px 0 #000;
    letter-spacing: 0.06em;
  }
  .stat-row{
    display: flex; gap: 14px;
    font-family: 'IM Fell English SC', serif;
    font-size: 13px;
    letter-spacing: 0.08em;
    color: var(--bone-2);
  }
  .stat-row b{
    color: var(--bone);
    font-family: 'UnifrakturCook', serif;
    font-size: 18px;
    margin-left: 4px;
    text-shadow: 0 0 6px rgba(245,192,38,0.3);
  }
  .stat-row .gold b{ color: var(--candle); }
  .stat-row .atk b{ color: var(--blood-2); }
  .stat-row .def b{ color: var(--ghost); }

  /* ── Main layout ───────────────────────────────────── */
  .main{
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 0;
    min-height: 0;
    overflow: hidden;
    z-index: 3;
  }
  /* ── Game canvas pane (platformer) ──────────────────── */
  .game-pane{
    position: relative;
    background: #050203;
    border-right: 2px solid #3a2424;
    overflow: hidden;
    display: flex;
    align-items: stretch;
    justify-content: stretch;
  }
  #game-canvas{
    flex: 1;
    width: 100%;
    height: 100%;
    display: block;
    image-rendering: pixelated;
    image-rendering: crisp-edges;
    cursor: crosshair;
    outline: none;
  }
  .floor-overlay{
    position: absolute;
    top: 16px; left: 50%;
    transform: translateX(-50%);
    font-family: 'UnifrakturCook', serif;
    font-size: clamp(22px, 3vw, 32px);
    color: var(--bone);
    text-shadow: 0 0 16px rgba(245,192,38,0.5), 2px 2px 0 #000;
    background: rgba(0,0,0,0.55);
    padding: 6px 22px;
    border: 1px solid var(--bone-2);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.5s;
    z-index: 4;
    text-align: center;
    max-width: 90%;
  }
  [data-lang="ru"] .floor-overlay{ font-family: 'Marck Script', 'PT Serif Caption', serif; }
  .floor-overlay.show{ opacity: 1; }
  .hint-bar{
    position: absolute;
    bottom: 12px; left: 50%;
    transform: translateX(-50%);
    font: 11px 'JetBrains Mono', monospace;
    color: var(--bone-2);
    background: rgba(0,0,0,0.6);
    padding: 6px 14px;
    border: 1px solid rgba(120,90,80,0.4);
    letter-spacing: 0.08em;
    pointer-events: none;
    z-index: 3;
    max-width: 92%;
    text-align: center;
  }
  .prompt-bar{
    position: absolute;
    bottom: 56px; left: 50%;
    transform: translateX(-50%);
    font: 600 14px 'IM Fell English SC', serif;
    color: var(--candle);
    background: rgba(0,0,0,0.72);
    padding: 6px 18px;
    border: 1px solid var(--candle);
    box-shadow: 0 0 16px rgba(245,192,38,0.32);
    letter-spacing: 0.1em;
    opacity: 0;
    transition: opacity 0.18s;
    pointer-events: none;
    z-index: 3;
    white-space: nowrap;
  }
  [data-lang="ru"] .prompt-bar{ font-family: 'PT Serif Caption', serif; }
  .prompt-bar.show{ opacity: 1; }
  .leave-btn{
    position: absolute;
    top: 12px; right: 12px;
    background: rgba(0,0,0,0.6);
    border: 1px solid var(--bone-2);
    color: var(--bone-2);
    padding: 6px 12px;
    font: 600 11px 'JetBrains Mono', monospace;
    letter-spacing: 0.1em;
    cursor: pointer;
    z-index: 4;
    text-transform: uppercase;
  }
  .leave-btn:hover{ background: var(--blood); color: #fff; border-color: var(--blood-2); }
  /* Mobile touch controls overlay on canvas */
  .touch-controls{
    position: absolute;
    bottom: 0; left: 0; right: 0;
    display: none;
    pointer-events: none;
    z-index: 4;
  }
  @media (pointer: coarse){ .touch-controls{ display: block; } }
  .touch-controls .pad{
    position: absolute;
    bottom: 22px;
    width: 64px; height: 64px;
    border: 2px solid rgba(232,220,196,0.4);
    border-radius: 50%;
    background: rgba(0,0,0,0.45);
    pointer-events: auto;
    display: flex; align-items: center; justify-content: center;
    color: var(--bone);
    font: 700 24px 'JetBrains Mono', monospace;
    user-select: none;
  }
  .touch-controls .pad:active{ background: rgba(245,192,38,0.25); }
  .touch-controls .pad.left{ left: 16px; }
  .touch-controls .pad.right{ left: 92px; }
  .touch-controls .pad.jump{ right: 92px; }
  .touch-controls .pad.attack{ right: 16px; }
  .touch-controls .pad.block{ right: 168px; }
  /* Left: scene + actions */
  .scene-pane{
    display: flex; flex-direction: column;
    background:
      radial-gradient(ellipse 60% 45% at 50% 35%, rgba(245,192,38,0.07), transparent 70%),
      linear-gradient(180deg, #14100e 0%, #080404 100%);
    overflow-y: auto;
    border-right: 2px solid #3a2424;
    padding: 24px;
    position: relative;
  }
  .scene-art{
    text-align: center;
    margin: 10px 0 16px;
    font-size: clamp(80px, 14vw, 140px);
    line-height: 1;
    filter: drop-shadow(0 4px 12px rgba(154,26,30,0.4)) drop-shadow(0 0 32px rgba(245,192,38,0.18));
    animation: artBreath 5s ease-in-out infinite;
  }
  @keyframes artBreath{
    0%, 100%{ transform: scale(1); }
    50%     { transform: scale(1.03); }
  }
  .scene-title{
    font-family: 'UnifrakturCook', serif;
    font-size: clamp(28px, 4vw, 38px);
    color: var(--bone);
    text-align: center;
    margin-bottom: 4px;
    line-height: 1.1;
    text-shadow: 0 2px 0 #000, 0 0 22px rgba(245,192,38,0.18);
  }
  .scene-depth{
    text-align: center;
    font: italic 12px 'IM Fell English', serif;
    color: var(--bone-2);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  .scene-desc{
    background:
      linear-gradient(180deg, rgba(232,220,196,0.04), transparent);
    border-top: 1px solid rgba(120,90,80,0.3);
    border-bottom: 1px solid rgba(120,90,80,0.3);
    padding: 16px 20px;
    font: italic 17px/1.55 'Cormorant Garamond', serif;
    color: var(--bone);
    max-width: 640px;
    margin: 0 auto 18px;
    text-align: center;
  }
  .scene-desc b{ font-style: normal; color: var(--candle); font-family: 'IM Fell English SC', serif; letter-spacing: 0.04em; }
  .scene-desc em{ color: var(--blood-2); font-style: italic; }
  /* Floor selector (5 dungeon floors) */
  .floor-list{
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
    gap: 8px;
    max-width: 640px;
    margin: 0 auto 18px;
  }
  .floor-btn{
    background: linear-gradient(180deg, #2a1818 0%, #14080c 100%);
    border: 1px solid rgba(120,90,80,0.45);
    color: var(--bone);
    padding: 8px 10px;
    font: 600 13px 'IM Fell English SC', serif;
    letter-spacing: 0.08em;
    cursor: pointer;
    text-align: center;
    display: flex; flex-direction: column;
    gap: 2px;
    transition: border-color 0.1s, transform 0.1s, background 0.1s;
  }
  [data-lang="ru"] .floor-btn{ font-family: 'PT Serif Caption', serif; }
  .floor-btn:hover:not([disabled]){ border-color: var(--candle); transform: translateY(-1px); background: linear-gradient(180deg, #3a2418 0%, #1a0e0a 100%); }
  .floor-btn.sel{ border-color: var(--candle); background: linear-gradient(180deg, #3a2818 0%, #1a0e08 100%); box-shadow: inset 0 0 0 1px rgba(245,192,38,0.32); }
  .floor-btn.locked{ opacity: 0.42; cursor: not-allowed; }
  .floor-btn.cleared{ border-color: var(--candle); color: var(--candle); }
  .floor-btn .ftheme{
    font: italic 11px 'Cormorant Garamond', serif;
    color: var(--bone-2);
    letter-spacing: 0.02em;
    text-transform: none;
  }
  [data-lang="ru"] .floor-btn .ftheme{ font-family: 'PT Serif', serif; font-style: italic; }
  .floor-btn.sel .ftheme{ color: var(--bone); }
  .log{
    max-width: 640px;
    margin: 0 auto 18px;
    font: italic 14px/1.55 'Cormorant Garamond', serif;
    color: var(--bone-2);
    text-align: center;
    min-height: 1.55em;
  }
  .log.bad{ color: var(--blood-2); }
  .log.good{ color: var(--candle); }
  /* Action buttons */
  .actions{
    display: flex; gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    max-width: 640px;
    margin: 0 auto;
  }
  .btn{
    background: linear-gradient(180deg, #3a2424 0%, #1a1010 100%);
    border: 2px solid var(--bone-2);
    color: var(--bone);
    padding: 10px 22px;
    font: 600 14px 'IM Fell English SC', serif;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 80ms;
    box-shadow: 0 3px 0 #0a0608, inset 0 1px 0 rgba(255,255,255,0.06);
    position: relative;
  }
  .btn:hover{
    background: linear-gradient(180deg, #4a3030 0%, #2a1818 100%);
    border-color: var(--candle);
    color: var(--candle);
    text-shadow: 0 0 8px rgba(245,192,38,0.4);
  }
  .btn:active{ transform: translateY(2px); box-shadow: 0 1px 0 #0a0608; }
  .btn:disabled{ opacity: 0.4; cursor: not-allowed; }
  .btn.danger{
    border-color: var(--blood-2);
    color: var(--blood-2);
  }
  .btn.danger:hover{ background: linear-gradient(180deg, #5a2020 0%, #2a0a0a 100%); border-color: #ff5a4a; color: #fff; }
  .btn.gold{
    border-color: var(--candle);
    color: var(--candle);
  }
  .btn.gold:hover{ background: linear-gradient(180deg, #4a3a10 0%, #1a1408 100%); }
  .btn.ghost{ opacity: 0.7; }

  /* ── Right: inventory + equipped ───────────────────── */
  .inv-pane{
    background:
      linear-gradient(180deg, #181210 0%, #0e0808 100%);
    overflow-y: auto;
    padding: 18px 16px;
    display: flex; flex-direction: column;
    gap: 14px;
  }
  .inv-section h3{
    font-family: 'UnifrakturCook', serif;
    font-size: 18px;
    color: var(--candle);
    margin-bottom: 6px;
    border-bottom: 1px solid rgba(245,192,38,0.25);
    padding-bottom: 4px;
    letter-spacing: 0.02em;
    text-shadow: 0 0 8px rgba(245,192,38,0.25);
  }
  .equipped-grid{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 6px;
    margin-bottom: 4px;
  }
  .equip-slot{
    background: rgba(40,30,28,0.6);
    border: 1px dashed rgba(184,168,136,0.4);
    padding: 8px 6px;
    text-align: center;
    min-height: 72px;
    display: flex; flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: background 80ms, border-color 80ms;
    border-radius: 2px;
  }
  .equip-slot:hover{ background: rgba(245,192,38,0.08); border-color: var(--candle); }
  .equip-slot.empty{ color: var(--bone-2); font-style: italic; }
  .equip-slot .em{ font-size: 32px; line-height: 1; }
  .equip-slot .nm{
    font: 9.5px 'IM Fell English SC', serif;
    letter-spacing: 0.04em;
    color: var(--bone);
    margin-top: 4px;
    text-align: center;
    line-height: 1.1;
  }
  .equip-slot .slot-label{
    font: 9px 'JetBrains Mono', monospace;
    color: var(--bone-2);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 2px;
    opacity: 0.55;
  }
  .inv-grid{
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 4px;
    max-height: 40vh;
    overflow-y: auto;
    padding: 2px;
  }
  .inv-cell{
    aspect-ratio: 1;
    background: rgba(40,30,28,0.4);
    border: 1px solid rgba(120,90,80,0.3);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer;
    position: relative;
    border-radius: 2px;
    transition: background 80ms, border-color 80ms;
  }
  .inv-cell:hover{ background: rgba(245,192,38,0.1); border-color: var(--candle); }
  .inv-cell .em{ font-size: 22px; line-height: 1; }
  .inv-cell .qty{
    position: absolute;
    bottom: 1px; right: 3px;
    font: 700 10px 'JetBrains Mono', monospace;
    color: var(--bone);
    text-shadow: 1px 1px 0 #000;
  }
  .inv-cell .tier-mark{
    position: absolute;
    top: 2px; left: 2px;
    width: 6px; height: 6px;
    border-radius: 50%;
  }
  .inv-cell.empty{ cursor: default; background: rgba(0,0,0,0.3); }
  .inv-cell.empty:hover{ background: rgba(0,0,0,0.3); border-color: rgba(120,90,80,0.3); }
  .inv-cell .affix-dots{
    position: absolute;
    bottom: 1px; left: 3px;
    font-size: 6px;
    line-height: 1;
    color: var(--candle);
    text-shadow: 0 0 4px var(--candle);
    letter-spacing: -1px;
  }
  .inv-cell.tier-cursed .affix-dots{ color: var(--t-cursed); text-shadow: 0 0 4px var(--t-cursed); }
  .inv-cell.tier-legend .affix-dots{ color: var(--t-legend); text-shadow: 0 0 5px var(--t-legend); }
  .inv-cell .equip-tag{
    position: absolute;
    top: 1px; right: 3px;
    font: 700 9px 'JetBrains Mono', monospace;
    color: var(--candle);
    text-shadow: 0 0 4px var(--candle);
  }
  .inv-cell.is-equipped{ border-color: var(--candle); box-shadow: inset 0 0 0 1px rgba(245,192,38,0.25); }

  /* Item tooltip */
  .item-tip{
    position: absolute;
    background: #0a0608;
    border: 1px solid var(--bone-2);
    padding: 10px 14px;
    width: 240px;
    z-index: 30;
    pointer-events: none;

    .scene-desc{ font-size: 15px; padding: 12px 14px; }

<script>
'use strict';

/* ═══ PIXEL ART ═══════════════════════════════════════ */
/* tiny grid-based pixel sprite renderer. each sprite is `rows` of strings
   where every char maps to a hex color via `p` (palette). ' ' and '.' = transparent.
   sprites are rendered ONCE to an offscreen canvas at boot and cached as data URLs;
   renderSpriteHTML returns an <img> tag with image-rendering: pixelated. */
const _spriteCache = {};
/* ── shared palette chars (palette lookup is per-sprite via p; these are conventions) ── */
const PX = {
  // outlines + greys
  k:'#0a0608', K:'#1a0e10', g:'#3a2f2c', G:'#5a4a45', w:'#b8a888', W:'#e8dcc4', l:'#f7eedb',
  // blood / cursed
  r:'#4a1014', R:'#9a1a1e', F:'#c43d33', f:'#e8634a',
  // gold / candle
  y:'#a06820', Y:'#d68c1a', L:'#f5c026', H:'#fff2b8',
  // sky / ghost / shadow
  b:'#1c2a3a', B:'#88c0d0', s:'#5a7090', S:'#a8c8e0',
  // purple / lich
  p:'#2c1a3c', P:'#7a4ac0', M:'#b870ff',
  // green / poison
  e:'#244026', E:'#5a8a4a', N:'#9adb6a',
  // brown / wood
  o:'#3a200a', O:'#6a3a14', U:'#a86a2a',
  // silver / steel
  q:'#404e60', Q:'#8898a8', V:'#cdd8e6',
  // teal / mithril
  m:'#246a8a', n:'#5fa8d8',
  // bone / skin
  c:'#d8c89a', x:'#9a7858',
  // pink / flesh
  i:'#a05050', I:'#d88090',
  // outlined transparent (visual placeholder)
  '.':null, ' ':null,
};
function pixelArtURL(spec){
  if (!spec || !spec.rows) return '';
  const w = spec.rows[0].length, h = spec.rows.length;
  const cv = document.createElement('canvas');
  cv.width = w; cv.height = h;
  const ctx = cv.getContext('2d');
  if (!ctx) return '';
  // optional bg
  if (spec.bg){ ctx.fillStyle = spec.bg; ctx.fillRect(0, 0, w, h); }
  for (let y = 0; y < h; y++){
    const row = spec.rows[y];
    for (let x = 0; x < row.length; x++){
      const ch = row[x];
      if (ch === ' ' || ch === '.') continue;
      const col = PX[ch];
      if (!col) continue;
      ctx.fillStyle = col;
      ctx.fillRect(x, y, 1, 1);
    }
  }
  return cv.toDataURL('image/png');
}
function renderSpriteHTML(spriteId, fallbackEmoji, size){
  size = size || 'sm';
  if (!spriteId || !SPRITES[spriteId]){
    return '<span class="sprite-emoji size-' + size + '">' + (fallbackEmoji || '') + '</span>';
  }
  let url = _spriteCache[spriteId];
  if (!url){
    url = pixelArtURL(SPRITES[spriteId]);
    _spriteCache[spriteId] = url;
  }
  if (!url) return '<span class="sprite-emoji size-' + size + '">' + (fallbackEmoji || '') + '</span>';
  return '<img class="px-sprite size-' + size + '" src="' + url + '" alt="" />';
}

/* ═══ SPRITE LIBRARY ══════════════════════════════════ */
/* hand-drawn 14×14 (sometimes 16×16) Gothic pixel sprites.
   characters reference the PX palette table above.
   palette per sprite is implicit (uses PX); k=outline, W=bone, R=blood, etc. */
const SPRITES = {
  // ─────────── MONSTERS ───────────
  mob_rat: { rows: [
    '..............',
    '...k.....k....',
    '..kRk...kRk...',
    '..kkk.kkkk....',
    '.kggggggggk...',
    'kgWGggggggk...',
    'kgGGgggggkk...',
    'kggggggggk....',
    '.kkgggkkk.....',
    '..kkkkk......k',
    '..k...kk....kk',
    '..k...k.kkkkk.',
    '..k...k.......',
    '..............',
  ]},
  mob_bat: { rows: [
    '..............',
    'k............k',
    'kk..........kk',
    'kKk.kkkkk..kKk',
    'kKKkkKKKKkkKKk',
    'kKKKKKKKKKKKKk',
    '.kKKKkkkKKKKk.',
    '..kKkRkkRkKkk.',
    '...kKKWKkKk...',
    '....kkKKKk....',
    '......kkk.....',
    '..............',
    '..............',
    '..............',
  ]},
  mob_skel: { rows: [
    '..............',
    '....kkkkk.....',
    '...kWWWWWk....',
    '...kWkWkWk....',
    '...kWkkkWk....',
    '...kWWWWWk....',
    '....kkkk......',
    '...kWWWk......',
    '..kkWWWkk.....',
    '.kWkWWWkWk....',
    'kWk.kkk.kWk...',
    'kk.k.k.k.kk...',
    '...k.k.k......',
    '...k.k.k......',
  ]},
  mob_ghoul: { rows: [
    '..............',
    '....kxxxk.....',
    '...kxxxxxk....',
    '...kxkkkxk....',
    '...kxFFFxk....',
    '....kxxxk.....',
    '....kkkkk.....',
    '...kEEEEEk....',
    '..kEEEexEEk...',
    '..kEexxxEEk...',
    '..kEEexxEEk...',
    '...kEEEEEk....',
    '...kkkkkkk....',
    '...k.k.k.k....',
  ]},
  mob_wraith: { rows: [
    '..............',
    '....kkkkk.....',
    '...ksbbbsk....',
    '..ksbBkBbsk...',
    '..ksbWkWbsk...',
    '..ksbbkbbsk...',
    '..ksbbbbbsk...',
    '..ksbbbbbsk...',
    '.ksbbsbsbbsk..',
    '.ksbsbbsbsbk..',
    'kssbsbbsbssk..',
    'ksbsbbsbsbsk..',
    '.ksssbsssss...',

function t(key, params){
  const dict = T[LANG] || T.ru;
  let s = dict[key];
  if (s == null) s = T.en[key] || key;
  if (params){
    for (const k in params){
      s = s.replace(new RegExp('\\{' + k + '\\}', 'g'), params[k]);
    }
  }
  return s;
}
function setLang(lang){
  if (lang !== 'ru' && lang !== 'en') return;
  LANG = lang;
  try{ localStorage.setItem(LANG_KEY, lang); }catch(_){}
  document.documentElement.setAttribute('lang', lang);
  document.documentElement.setAttribute('data-lang', lang);
  // refresh chrome that's set declaratively
  document.title = (lang === 'ru' ? 'Тень-Добыча · паладин против тени' : 'Shadow-Loot · paladin vs shadow');
  const tmain = document.getElementById('title-main'); if (tmain) tmain.textContent = t('title_main');
  const tsub  = document.getElementById('title-sub');  if (tsub)  tsub.textContent  = t('title_sub');
  const depthLbl = document.getElementById('stat-depth-label');
  if (depthLbl){
    // depth-label contains text + the <b id="stat-depth"> child — replace text but keep the <b>
    const b = document.getElementById('stat-depth');
    const cur = b ? b.textContent : '0';
    depthLbl.innerHTML = t('depth_label') + '<b id="stat-depth">' + cur + '</b>';
  }
  // tab the toggle buttons
  document.querySelectorAll('[data-lang-set]').forEach(b => {
    b.classList.toggle('active', b.dataset.langSet === lang);
  });
  // update sidebar headings
  const wornHead = document.querySelector('.inv-section h3');
  if (wornHead) wornHead.textContent = t('worn');
  const heads = document.querySelectorAll('.inv-section h3');
  if (heads[1]) heads[1].textContent = t('satchel');
  // death screen statics
  const dh = document.getElementById('death-h2'); if (dh) dh.textContent = t('death_h2');
  const dbtn = document.getElementById('btn-respawn'); if (dbtn) dbtn.textContent = t('death_btn');
  // dungeon chrome
  if (typeof updateLeaveBtnText === 'function') updateLeaveBtnText();
  if (typeof setHint === 'function') setHint();
  // re-render scene + inventory
  if (typeof renderScene === 'function') renderScene();
}
function nameFor(obj){
  if (!obj) return '';
  if (LANG === 'ru' && obj.nameRu) return obj.nameRu;
  return obj.name || '';
}
function loreFor(obj){
  if (!obj) return '';
  if (LANG === 'ru' && obj.loreRu) return obj.loreRu;
  return obj.lore || '';
}
function descFor(obj){
  if (!obj) return '';
  if (LANG === 'ru' && obj.descRu) return obj.descRu;
  return obj.desc || '';
}
function affixName(key){
  const a = AFFIXES[key]; if (!a) return key;
  if (LANG === 'ru' && a.nameRu) return a.nameRu;
  return a.name;
}
function tierName(tier){
  return t('tier_' + tier) || tier;
}
function slotName(slot){
  return t('slot_' + slot) || slot;
}

const SAVE_KEY = 'shadow-loot-v1';
const player = (function(){
  const def = {
    hp: 20, maxHp: 20, atk: 3, def: 1, gold: 0,
    depth: 0,
    deepest: 0,
    scene: 'chapel',
    inventory: [],
    equipped: { weapon:null, armor:null, trinket:null },
    enemy: null,
    log: '',
    eventsCleared: 0,
    skillPoints: 0,
    skills: { faith: 0, steel: 0, bulwark: 0 }, // tiers 0-3 each
    kills: 0,
    _nextUid: 1,
    floor: 1,
    cleared: {},
  };
  let loaded = null;
  try{
    const raw = localStorage.getItem(SAVE_KEY);
    if (raw) loaded = JSON.parse(raw);
  } catch(_){}
  if (loaded){
    Object.assign(def, loaded);
    if (typeof def._nextUid !== 'number') def._nextUid = 1;
    // ── migration: ensure every gear entry has uid + affixes; split stacks ──
    const fresh = [];
    for (const e of (def.inventory || [])){
      const item = ITEMS[e.id];
      if (!item) continue;
      const stackable = (item.slot === 'mat' || item.slot === 'cons');
      if (stackable){
        fresh.push({ id: e.id, qty: e.qty || 1, affixes: [] });
      } else {
        const qty = e.qty || 1;
        for (let i = 0; i < qty; i++){
          fresh.push({
            id: e.id, qty: 1,
            uid: (i === 0 && e.uid) ? e.uid : (def._nextUid++),
            affixes: (i === 0 && e.affixes) ? e.affixes : [],
          });
        }
      }
    }
    def.inventory = fresh;
    // migrate equipped slots: id-string → uid (find first matching entry)
    for (const slot of ['weapon','armor','trinket']){
      const v = def.equipped[slot];
      if (typeof v === 'string'){
        const entry = fresh.find(x => x.id === v && x.uid != null);
        def.equipped[slot] = entry ? entry.uid : null;
      } else if (typeof v === 'number'){
        // verify uid still exists
        if (!fresh.find(x => x.uid === v)) def.equipped[slot] = null;
      }
    }
    return def;
  }
  // ── fresh start: seed a starter loadout ──
  const seedDagger  = { id:'cracked_dagger', qty:1, uid: def._nextUid++, affixes: [] };
  const seedRobes   = { id:'tattered_robes', qty:1, uid: def._nextUid++, affixes: [] };
  def.inventory = [
    seedDagger,
    seedRobes,
    { id:'holy_water', qty:2, affixes: [] },
    { id:'garlic_bulb', qty:1, affixes: [] },
  ];
  def.equipped.weapon = seedDagger.uid;
  def.equipped.armor  = seedRobes.uid;
  return def;
})();
function save(){
  try{ localStorage.setItem(SAVE_KEY, JSON.stringify(player)); }catch(_){}
}
function nextUid(){
  if (typeof player._nextUid !== 'number') player._nextUid = 1;
  return player._nextUid++;
}
function addToInv(id, qty, affixes){
  qty = qty || 1;
  const item = ITEMS[id];
  if (!item) return null;
  const stackable = (item.slot === 'mat' || item.slot === 'cons');
  if (stackable){
    const existing = player.inventory.find(x => x.id === id && (!x.affixes || x.affixes.length === 0));
    if (existing){ existing.qty += qty; return existing; }
    const entry = { id, qty, affixes: [] };
    player.inventory.push(entry);
    return entry;
  }
  // non-stackable: every instance gets its own uid + rolled affixes
  let first = null;
  for (let i = 0; i < qty; i++){
    const a = (i === 0 && affixes) ? affixes : rollAffixes(id);
    const entry = { id, qty: 1, uid: nextUid(), affixes: a };
    player.inventory.push(entry);
    if (!first) first = entry;
  }
  return first;
}
function removeFromInv(id, qty){
  // legacy id-based remove — only for stackables (mats/cons)
  qty = qty || 1;
  const i = player.inventory.findIndex(x => x.id === id && (!x.affixes || x.affixes.length === 0));
  if (i < 0) return false;
  player.inventory[i].qty -= qty;
  if (player.inventory[i].qty <= 0) player.inventory.splice(i, 1);
  return true;
}
function hasInInv(id, qty){
  qty = qty || 1;
  // sum across all matching entries (gear stacks count too for recipe ingredients)
  let total = 0;
  for (const x of player.inventory){
    if (x.id === id) total += (x.qty || 1);
    if (total >= qty) return true;
  }
  return false;
}
function consumeIngredient(id, qty){
  // for forge recipes — eat 'qty' of id across any matching entries (prefer plain/no-affix first)
  qty = qty || 1;
  // sort entries: stackables first, then no-affix gear, then affixed gear (consume affixed last)
  const matches = [];
  player.inventory.forEach((e, idx) => {
    if (e.id !== id) return;
    const score = (e.affixes && e.affixes.length) ? 2 : ((ITEMS[e.id] && (ITEMS[e.id].slot === 'mat' || ITEMS[e.id].slot === 'cons')) ? 0 : 1);
    matches.push({ idx, e, score });
  });
  matches.sort((a, b) => a.score - b.score);
  for (const m of matches){
    if (qty <= 0) break;
    const take = Math.min(qty, m.e.qty);
    m.e.qty -= take;
    qty -= take;
    // if consuming an equipped gear instance, unequip it
    if (m.e.qty <= 0 && m.e.uid != null){
      for (const slot of ['weapon','armor','trinket']){
        if (player.equipped[slot] === m.e.uid) player.equipped[slot] = null;
      }
    }
  }
  // purge spent entries
  player.inventory = player.inventory.filter(x => x.qty > 0);
  return qty === 0;
}
function findEquipped(slot){
  const uid = player.equipped[slot];
  if (uid == null) return null;
  return player.inventory.find(x => x.uid === uid) || null;
}

/* ═══ STATS WITH EQUIPMENT + AFFIXES ═══════════════════ */
function effectiveAtk(){
  let v = player.atk;
  for (const slot of ['weapon','armor','trinket']){
    const e = findEquipped(slot); if (!e) continue;
    const it = ITEMS[e.id]; if (!it) continue;
    v += (it.atk || 0) + affixBonus(e, 'atk');
  }
  v += (player.skills.steel || 0); // +1 atk per Steel tier
  return Math.max(1, v);
}
function effectiveDef(){
  let v = player.def;
  for (const slot of ['weapon','armor','trinket']){
    const e = findEquipped(slot); if (!e) continue;
    const it = ITEMS[e.id]; if (!it) continue;
    v += (it.def || 0) + affixBonus(e, 'def');
  }
  v += (player.skills.bulwark || 0); // +1 def per Bulwark tier
  return Math.max(0, v);
}
function effectiveHpRegen(){
  let v = 0;
  for (const slot of ['weapon','armor','trinket']){
    const e = findEquipped(slot); if (!e) continue;
    const it = ITEMS[e.id]; if (!it) continue;
    v += affixBonus(e, 'hpRegen') + (it.curseHpRegen || 0);
  }
  if (player.skills.bulwark >= 3) v += 1; // Bulwark tier 3 passive regen
  return v;
}
function effectiveHealMul(){
  let v = 1;
  for (const slot of ['weapon','armor','trinket']){
    const e = findEquipped(slot); if (!e) continue;
    v += affixBonus(e, 'healMul');
  }
  if (player.skills.faith >= 3) v += 0.5; // Faith tier 3: +50% healing
  return v;
}
function effectiveLifesteal(){
  let v = 0;
  for (const slot of ['weapon','armor','trinket']){
    const e = findEquipped(slot); if (!e) continue;
    v += affixBonus(e, 'lifesteal');
  }
  return v;
}
function effectiveFireDmg(){
  let v = 0;
  for (const slot of ['weapon','armor','trinket']){
    const e = findEquipped(slot); if (!e) continue;
    v += affixBonus(e, 'fireDmg');
  }
  return v;
}
function effectiveMaxHp(){
  return 20 + (player.skills.faith || 0) * 5; // +5 max HP per Faith tier
}
function recomputeMaxHp(){
  player.maxHp = effectiveMaxHp();
  if (player.hp > player.maxHp) player.hp = player.maxHp;
}
function updateHud(){
  document.getElementById('hp-fill').style.width = Math.max(0, player.hp / player.maxHp * 100) + '%';
  document.getElementById('hp-label').textContent = Math.max(0, player.hp) + ' / ' + player.maxHp + ' HP';
  document.getElementById('stat-atk').textContent = effectiveAtk();
  document.getElementById('stat-def').textContent = effectiveDef();
  document.getElementById('stat-gold').textContent = player.gold;
  document.getElementById('stat-depth').textContent = player.depth;
}

const sceneEl = document.getElementById('scene');
function setLog(msg, kind){
  player.log = msg || '';
  const el = document.getElementById('log');
  if (el){
    el.className = 'log' + (kind ? ' ' + kind : '');
    el.innerHTML = player.log;
  }
}
function renderScene(){
  // hub vs dungeon routing
  const gp = document.getElementById('game-pane');
  if (player.scene === 'dungeon'){
    sceneEl.style.display = 'none';
    if (gp) gp.style.display = '';
    startDungeon(player.floor || 1);
  } else {
    if (gp) gp.style.display = 'none';
    sceneEl.style.display = '';
    stopDungeon();
    let html = renderChapel();
    sceneEl.innerHTML = html;
    bindSceneActions();
  }
  renderInventory();
  updateHud();
  setTimeout(() => setLog(player.log, player._logKind), 0);
}

function renderChapel(){
  const maxUnlocked = Math.min(5, Math.max(1, (player.deepest || 0) + 1));
  const sel = player.floor || 1;
  const floorBtns = [1,2,3,4,5].map(n => {
    const locked = n > maxUnlocked;
    const cleared = (player.cleared && player.cleared['f' + n]);
    return '<button class="floor-btn ' + (n === sel ? 'sel ' : '')
      + (locked ? 'locked' : '') + (cleared ? ' cleared' : '') + '" '
      + (locked ? 'disabled' : ('data-act="select" data-floor="' + n + '"'))
      + '>' + (LANG === 'ru' ? 'Этаж ' : 'Floor ') + n
      + (cleared ? ' ✓' : '') + (locked ? ' 🔒' : '')
      + '<span class="ftheme">' + (LANG === 'ru' ? FLOORS[n - 1].nameRu : FLOORS[n - 1].name) + '</span>'
      + '</button>';
  }).join('');
  return ''
    + '<div class="scene-art">' + renderSpriteHTML('scene_chapel', '⛪', 'lg') + '</div>'
    + '<div class="scene-title">' + t('chapel_title') + '</div>'
    + '<div class="scene-depth">' + t('chapel_subtitle') + '</div>'
    + '<div class="scene-desc">' + t('chapel_desc') + '</div>'
    + '<div class="floor-list">' + floorBtns + '</div>'
    + '<div class="log" id="log"></div>'
    + '<div class="actions">'
      + '<button class="btn danger" data-act="descend">'
        + (LANG === 'ru' ? '↓ Войти на этаж ' : '↓ Enter floor ') + sel + '</button>'
      + '<button class="btn gold" data-act="forge">' + t('forge_btn') + '</button>'
      + '<button class="btn" data-act="skills">' + t('skills_btn') + ' <span style="color:var(--candle);">(' + player.skillPoints + ' ' + t('sp_short') + ')</span></button>'
      + '<button class="btn" data-act="rest">' + t('rest_btn') + '</button>'
    + '</div>';
}

/* ═══ PLATFORMER ENGINE ═══════════════════════════════ */
const _imgCache = {}; // declared early — referenced by drawEnemy
const game = {
  active: false,
  floor: 1,
  tiles: [],       // solid rectangles { x, y, w, h }
  enemies: [],
  chests: [],
  shrines: [],
  door: null,
  particles: [],
  floats: [],      // floating damage numbers in canvas space
  cam: { x: 0, y: 0 },
  world: { w: 2200, h: 540 },
  player: null,
  input: { left:false, right:false, up:false, down:false, jump:false, block:false, attack:false, attackQ:false, mouseX:0, mouseY:0, useE:false, useEQ:false },
  cleared: false,
  shakeT: 0,
};
const GROUND_Y = 480;          // y of main floor (top of tiles)
const TILE_H = 60;             // floor thickness
const PLAYER_W = 28, PLAYER_H = 44;
const GRAVITY = 1800;
const JUMP_VY = -560;
const MOVE_SPEED = 240;
const PLAYER_REACH = 56;       // attack arc radius
const PLAYER_ATTACK_T = 0.28;  // seconds the swing is active
const PLAYER_ATTACK_COOLDOWN = 0.42;
const PLAYER_IFRAME = 0.55;    // seconds invulnerable after hit
let _lastFrameTs = 0;
let _rafId = 0;

function buildFloor(n){
  const f = FLOORS[n - 1];
  if (!f) return;
  game.floor = n;
  game.world.w = f.width;
  game.world.h = 540;
  game.cleared = false;
  // floor + 4-7 raised platforms
  game.tiles = [];
  game.tiles.push({ x: 0, y: GROUND_Y, w: f.width, h: TILE_H });
  // generate platforms semi-deterministic per floor
  const seed = n * 9931;
  const rng = mulberry32(seed);
  const platforms = 3 + Math.floor(rng() * 4) + n; // 4-9 platforms
  for (let i = 0; i < platforms; i++){
    const px = 220 + Math.floor((f.width - 440) * ((i + rng() * 0.4) / platforms));
    const py = GROUND_Y - 90 - Math.floor(rng() * 140);
    const pw = 90 + Math.floor(rng() * 120);
    game.tiles.push({ x: px, y: py, w: pw, h: 14 });
  }
  // ceiling: small stalactite arches at top (purely visual — not solid)
  // enemies
  game.enemies = f.enemies.map(e => {
    const m = MONSTERS[e.id]; if (!m) return null;
    const scale = (e.id === 'lich' || e.id === 'inquisitor' || e.id === 'knight') ? 2.2 : 1.7;
    const w = 32 * (m.boss ? 1.6 : 1) , h = 36 * (m.boss ? 1.6 : 1);
    return {
      id: e.id, mon: m,
      x: e.x, y: GROUND_Y - h,
      vx: 0, vy: 0, w, h,
      hp: m.hp, maxHp: m.hp,
      facing: -1,
      state: 'patrol', stateT: 0,
      home: e.x, patrolDir: (rng() < 0.5 ? -1 : 1), patrolRange: 80 + Math.floor(rng() * 80),
      attackCool: 0,
      hurtT: 0,
      onGround: false,
      isBoss: !!m.boss,
      scale,
    };
  }).filter(Boolean);
  // chests
  game.chests = (f.chests || []).map(c => ({ x: c.x, y: GROUND_Y - 28, opened: false }));
  // shrines
  game.shrines = (f.shrines || []).map(s => ({ x: s.x, y: GROUND_Y - 44, used: false }));
  // exit door at the far right (or at boss death for boss floor)
  game.door = { x: f.width - 80, y: GROUND_Y - 80, locked: !!f.boss };
  // player spawn
  game.player = {
    x: 80, y: GROUND_Y - PLAYER_H,
    vx: 0, vy: 0,
    w: PLAYER_W, h: PLAYER_H,
    facing: 1,
    onGround: false,
    coyote: 0, jumpBuf: 0,
    attackT: 0, attackCool: 0, attackDir: { x: 1, y: 0 },
    blocking: false,
    hitFlash: 0, ivulnT: 0,
    regenT: 0,
  };
  game.cam.x = 0;
  game.cam.y = 0;
  game.particles = [];
  game.floats = [];
}
function mulberry32(a){
  return function(){
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let z = Math.imul(a ^ a >>> 15, 1 | a);
    z = z + Math.imul(z ^ z >>> 7, 61 | z) ^ z;
    return ((z ^ z >>> 14) >>> 0) / 4294967296;
  };
}

function startDungeon(n){
  if (game.active && game.floor === n) return;
  game.active = true;
  buildFloor(n);
  showFloorBanner(n);
  const cv = document.getElementById('game-canvas');
  if (cv && cv.focus) cv.focus();
  fitCanvas();
  setHint();
  cancelAnimationFrame(_rafId);
  _lastFrameTs = performance.now();
  _rafId = requestAnimationFrame(gameLoop);
}
function stopDungeon(){
  game.active = false;
  cancelAnimationFrame(_rafId);
}
function showFloorBanner(n){
  const f = FLOORS[n - 1];
  const banner = document.getElementById('floor-banner');
  if (!banner || !f) return;
  banner.textContent = (LANG === 'ru' ? 'Этаж ' : 'Floor ') + n + ' — ' + (LANG === 'ru' ? f.nameRu : f.name);
  banner.classList.add('show');
  clearTimeout(banner._hideT);
  banner._hideT = setTimeout(() => banner.classList.remove('show'), 2400);
}
function setHint(){
  const hb = document.getElementById('hint-bar');
  if (!hb) return;
  hb.textContent = LANG === 'ru'
    ? 'A/D — ходьба · ПРОБЕЛ — прыжок · ЛКМ — удар · SHIFT — блок · E — взять'
    : 'A/D move · SPACE jump · LMB attack · SHIFT block · E interact';
}
function fitCanvas(){
  const cv = document.getElementById('game-canvas');
  if (!cv) return;
  const parent = cv.parentElement;
  if (!parent) return;
  const dpr = window.devicePixelRatio || 1;
  const w = parent.clientWidth || 800;
  const h = parent.clientHeight || 540;
  cv.width = Math.floor(w * dpr);
  cv.height = Math.floor(h * dpr);
  cv.style.width = w + 'px';
  cv.style.height = h + 'px';
  game._dpr = dpr;
  game._vw = w; game._vh = h;
}

/* ── Input ──────────────────────────────────────────── */
function bindInput(){
  const cv = document.getElementById('game-canvas');
  if (!cv || cv._bound) return;
  cv._bound = true;
  const handleKey = (e, down) => {
    const k = e.key.toLowerCase();
    let handled = false;
    if (k === 'a' || k === 'arrowleft')      { game.input.left = down; handled = true; }
    else if (k === 'd' || k === 'arrowright'){ game.input.right = down; handled = true; }
    else if (k === 'w' || k === 'arrowup')   { game.input.up = down; handled = true; }
    else if (k === 's' || k === 'arrowdown') { game.input.down = down; handled = true; }
    else if (k === ' '                      ){ if (down && !game.input.jump) game.input.jumpQ = true; game.input.jump = down; handled = true; }
    else if (k === 'shift'                  ){ game.input.block = down; handled = true; }
    else if (k === 'e'                      ){ if (down && !game.input.useE) game.input.useEQ = true; game.input.useE = down; handled = true; }
    if (handled) e.preventDefault();
  };
  window.addEventListener('keydown', e => { if (game.active) handleKey(e, true); });
  window.addEventListener('keyup',   e => { if (game.active) handleKey(e, false); });
  cv.addEventListener('mousedown', e => {
    if (!game.active) return;
    if (e.button === 0){ game.input.attackQ = true; game.input.attack = true; }
    e.preventDefault();
  });
  cv.addEventListener('mouseup', e => { if (e.button === 0) game.input.attack = false; });
  cv.addEventListener('mousemove', e => {
    const r = cv.getBoundingClientRect();
    game.input.mouseX = (e.clientX - r.left);
    game.input.mouseY = (e.clientY - r.top);
  });
  cv.addEventListener('contextmenu', e => e.preventDefault());
  cv.addEventListener('click', () => cv.focus && cv.focus());
  window.addEventListener('resize', fitCanvas);
  // touch controls
  document.querySelectorAll('[data-touch]').forEach(el => {
    const k = el.dataset.touch;
    const set = (down) => {
      if (k === 'left')  game.input.left  = down;
      if (k === 'right') game.input.right = down;
      if (k === 'jump') { if (down) game.input.jumpQ = true; game.input.jump = down; }
      if (k === 'block') game.input.block = down;
      if (k === 'attack'){ if (down) game.input.attackQ = true; game.input.attack = down; }
    };
    el.addEventListener('touchstart', e => { set(true); e.preventDefault(); }, { passive: false });
    el.addEventListener('touchend',   e => { set(false); e.preventDefault(); }, { passive: false });
    el.addEventListener('mousedown',  () => set(true));
    el.addEventListener('mouseup',    () => set(false));
  });
  // leave button
  const lb = document.getElementById('leave-btn');
  if (lb && !lb._bound){
    lb._bound = true;
    lb.addEventListener('click', () => {
      player.scene = 'chapel';
      renderScene();
    });
  }
  // update leave-btn label on language change (re-bound below via setLang)
}
function updateLeaveBtnText(){
  const lb = document.getElementById('leave-btn');
  if (lb) lb.textContent = (LANG === 'ru' ? '↑ В часовню' : '↑ To chapel');
}

/* ── Game loop ──────────────────────────────────────── */
function gameLoop(ts){
  if (!game.active){ return; }
  const dt = Math.min(0.033, (ts - _lastFrameTs) / 1000);
  _lastFrameTs = ts;
  updatePlayer(dt);
  updateEnemies(dt);
  updateFloats(dt);
  updateCam();
  render();
  // consume one-shot input flags after a frame
  game.input.jumpQ = false;
  game.input.attackQ = false;
  game.input.useEQ = false;
  _rafId = requestAnimationFrame(gameLoop);
}

/* ── Collision helpers ──────────────────────────────── */
function rectsOverlap(a, b){
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;
}
function moveAndCollide(ent, dt){
  // sweep X then Y against game.tiles
  let nx = ent.x + ent.vx * dt;
  const rectX = { x: nx, y: ent.y, w: ent.w, h: ent.h };
  for (const t of game.tiles){
    if (rectsOverlap(rectX, t)){
      if (ent.vx > 0)      nx = t.x - ent.w;
      else if (ent.vx < 0) nx = t.x + t.w;
      ent.vx = 0;
      rectX.x = nx;
    }
  }
  ent.x = nx;
  let ny = ent.y + ent.vy * dt;
  const rectY = { x: ent.x, y: ny, w: ent.w, h: ent.h };
  let landed = false;
  for (const t of game.tiles){
    if (rectsOverlap(rectY, t)){
      if (ent.vy > 0){ ny = t.y - ent.h; landed = true; }
      else if (ent.vy < 0) ny = t.y + t.h;
      ent.vy = 0;
      rectY.y = ny;
    }
  }
  ent.y = ny;
  ent.onGround = landed;
  // world bounds — left/right walls
  if (ent.x < 0) ent.x = 0;
  if (ent.x + ent.w > game.world.w) ent.x = game.world.w - ent.w;
}

/* ── Player update ──────────────────────────────────── */
function updatePlayer(dt){
  const p = game.player;
  if (!p) return;
  // regen tick (every 1s)
  p.regenT += dt;
  if (p.regenT >= 1){
    p.regenT -= 1;
    const r = effectiveHpRegen();
    if (r !== 0){
      player.hp = Math.min(player.maxHp, Math.max(0, player.hp + r));
      if (player.hp <= 0){ die(); return; }
      updateHud();
    }
  }
  // input → vx
  p.blocking = !!game.input.block && p.onGround && p.attackT <= 0;
  const moveScale = p.blocking ? 0.35 : 1;
  if (game.input.left)  { p.vx = -MOVE_SPEED * moveScale; p.facing = -1; }
  else if (game.input.right){ p.vx = MOVE_SPEED * moveScale; p.facing = 1; }
  else                       p.vx = 0;
  // jump buffer + coyote time
  p.coyote -= dt;
  p.jumpBuf -= dt;
  if (p.onGround) p.coyote = 0.12;
  if (game.input.jumpQ) p.jumpBuf = 0.12;
  if (p.jumpBuf > 0 && p.coyote > 0 && !p.blocking){
    p.vy = JUMP_VY;
    p.coyote = 0; p.jumpBuf = 0;
    spawnDust(p.x + p.w/2, p.y + p.h, '#b8a888', 6);
  }
  // gravity
  p.vy += GRAVITY * dt;
  if (p.vy > 1100) p.vy = 1100;
  // move
  moveAndCollide(p, dt);
  // fell off — clamp respawn
  if (p.y > game.world.h + 200){ damagePlayer(8, 0); p.x = 80; p.y = GROUND_Y - p.h; p.vy = 0; }
  // attack timing
  p.attackT -= dt;
  p.attackCool -= dt;
  p.ivulnT -= dt;
  p.hitFlash -= dt;
  if (game.input.attackQ && p.attackCool <= 0 && !p.blocking){
    p.attackT = PLAYER_ATTACK_T;
    p.attackCool = PLAYER_ATTACK_COOLDOWN;
    // attack direction: from player center toward mouse (canvas → world)
    const cx = p.x + p.w/2 - game.cam.x;
    const cy = p.y + p.h/2 - game.cam.y;
    let dx = game.input.mouseX - cx;
    let dy = game.input.mouseY - cy;
    const d = Math.hypot(dx, dy) || 1;
    p.attackDir.x = dx / d;
    p.attackDir.y = dy / d;
    if (Math.abs(p.attackDir.x) > 0.1) p.facing = p.attackDir.x > 0 ? 1 : -1;
    // resolve hits NOW (with arc check); also briefly during attackT for very-quick enemies
    resolvePlayerAttack();
  }
  // interactable proximity
  const prompt = document.getElementById('prompt-bar');
  let promptText = '';
  for (const c of game.chests){
    if (c.opened) continue;
    if (Math.abs(c.x - (p.x + p.w/2)) < 44){ promptText = LANG === 'ru' ? 'E — открыть сундук' : 'E — open chest'; if (game.input.useEQ) openChest(c); break; }
  }
  if (!promptText){
    for (const s of game.shrines){
      if (s.used) continue;
      if (Math.abs(s.x - (p.x + p.w/2)) < 44){ promptText = LANG === 'ru' ? 'E — помолиться у святыни' : 'E — pray at shrine'; if (game.input.useEQ) useShrine(s); break; }
    }
  }
  if (!promptText && game.door){
    if (Math.abs(game.door.x + 22 - (p.x + p.w/2)) < 44){
      if (game.door.locked) promptText = LANG === 'ru' ? '🔒 убей босса' : '🔒 defeat the boss';
      else { promptText = LANG === 'ru' ? 'E — следующий этаж' : 'E — next floor'; if (game.input.useEQ) exitFloor(); }
    }
  }
  if (prompt){
    if (promptText){ prompt.textContent = promptText; prompt.classList.add('show'); }
    else prompt.classList.remove('show');
  }
}
function resolvePlayerAttack(){
  const p = game.player;
  const ax = p.x + p.w/2 + p.attackDir.x * 18;
  const ay = p.y + p.h/2 + p.attackDir.y * 8;
  const reach = PLAYER_REACH;
  const baseAtk = effectiveAtk();
  const critChance = 0.12 + (player.skills.steel || 0) * 0.06;
  const fireDmg = effectiveFireDmg();
  const ls = effectiveLifesteal();
  let anyHit = false;
  for (const en of game.enemies){
    if (en.hp <= 0) continue;
    const ex = en.x + en.w/2, ey = en.y + en.h/2;
    const dist = Math.hypot(ex - ax, ey - ay);
    if (dist > reach + en.w/2) continue;
    // angle filter: enemy must be in the arc toward attackDir (within ±70°)
    const dx = ex - (p.x + p.w/2), dy = ey - (p.y + p.h/2);
    const dDot = (dx * p.attackDir.x + dy * p.attackDir.y) / (Math.hypot(dx, dy) || 1);
    if (dDot < 0.30 && dist > 30) continue;
    // damage
    const crit = Math.random() < critChance;
    let dmg = Math.max(1, baseAtk - (en.mon.def || 0) + Math.floor(Math.random() * 3) - 1);
    if (crit) dmg = Math.floor(dmg * 2);
    if (en.isBoss && player.skills.steel >= 3) dmg = Math.floor(dmg * 1.3);
    if (fireDmg > 0) dmg += fireDmg + (crit ? fireDmg : 0);
    en.hp -= dmg;
    en.vx += p.attackDir.x * 80;  // knockback
    en.hurtT = 0.18;
    spawnFloat(ex, ey - 18, (crit ? '!' : '') + '' + dmg, '#f5c026');
    if (fireDmg > 0) spawnFloat(ex + 12, ey - 30, '🔥+' + fireDmg, '#e8634a');
    spawnDust(ex, ey, '#9a1a1e', crit ? 12 : 6);
    anyHit = true;
    if (ls > 0 && player.hp < player.maxHp){
      const heal = Math.max(1, Math.ceil(dmg * ls));
      player.hp = Math.min(player.maxHp, player.hp + heal);
      spawnFloat(p.x + p.w/2, p.y - 8, '🩸+' + heal, '#9a1a1e');
      updateHud();
    }
    if (en.hp <= 0){ killEnemy(en); }
  }
  if (anyHit) shakeFor(0.08);
}
function killEnemy(en){
  // award gold + drops + sp (reuse defeatMonster-like logic but world-aware)
  const m = en.mon;
  const goldGain = m.gold[0] + Math.floor(Math.random() * (m.gold[1] - m.gold[0] + 1));
  player.gold += goldGain;
  const spGain = m.boss ? 3 : 1;
  player.skillPoints += spGain;
  player.kills = (player.kills || 0) + 1;
  spawnFloat(en.x + en.w/2, en.y - 32, '+' + goldGain + (LANG === 'ru' ? 'з' : 'g'), '#f5c026');
  // drop loot
  const dropCount = m.boss ? 4 : (1 + (Math.random() < 0.45 ? 1 : 0));
  for (let i = 0; i < dropCount; i++){
    const id = m.drops[Math.floor(Math.random() * m.drops.length)];
    addToInv(id);
    spawnFloat(en.x + en.w/2 + (i - dropCount/2) * 20, en.y - 50, ITEMS[id].em, '#e8dcc4');
  }
  spawnDust(en.x + en.w/2, en.y + en.h/2, en.isBoss ? '#9a1a1e' : '#b8a888', en.isBoss ? 30 : 14);
  if (m.boss){
    addToInv('moonstone', 3);
    addToInv('ghost_essence', 2);
    player.gold += 200;
    spawnFloat(en.x + en.w/2, en.y - 80, LANG === 'ru' ? 'ЛИЧ ПОВЕРЖЕН' : 'LICH SLAIN', '#f5c026');
    if (game.door) game.door.locked = false;
    game.cleared = true;
    shakeFor(0.4);
  }
  // mark this floor as cleared once exit reached
  // remove enemy
  game.enemies = game.enemies.filter(x => x !== en);
  save();
  updateHud();
  renderInventory();
}
function damagePlayer(dmg, fromX){
  const p = game.player; if (!p) return;
  if (p.ivulnT > 0) return;
  // block halves damage
  let final = dmg;
  if (p.blocking){
    final = Math.max(0, Math.ceil(dmg * 0.4));
    // chip-heal +1 if 0 net dmg
    if (final === 0){
      player.hp = Math.min(player.maxHp, player.hp + 1);
      spawnFloat(p.x + p.w/2, p.y - 10, LANG === 'ru' ? 'ПАРИ' : 'PARRY', '#88c0d0');
    }
  } else {
    // armor mitigation
    final = Math.max(1, dmg - Math.floor(effectiveDef() / 2));
  }
  if (final > 0){
    player.hp -= final;
    spawnFloat(p.x + p.w/2, p.y - 10, '-' + final, '#c43d33');
    p.hitFlash = 0.2;
    p.ivulnT = PLAYER_IFRAME;
    // knockback
    if (fromX !== undefined) p.vx = fromX < p.x ? 240 : -240;
    p.vy = Math.min(p.vy, -180);
    shakeFor(0.16);
    if (player.hp <= 0){ die(); return; }
  }
  updateHud();
}

/* ── Enemy update / AI ──────────────────────────────── */
function updateEnemies(dt){
  const p = game.player;
  for (const en of game.enemies){
    if (en.hp <= 0) continue;
    en.attackCool -= dt;
    en.hurtT -= dt;
    en.stateT += dt;
    // gravity always
    en.vy += GRAVITY * dt;
    if (en.vy > 1100) en.vy = 1100;
    const distToPlayer = Math.hypot((p.x + p.w/2) - (en.x + en.w/2), (p.y + p.h/2) - (en.y + en.h/2));
    const inSight = distToPlayer < (en.isBoss ? 460 : 280);
    // banshee ignores walls — flies (no gravity)
    if (en.id === 'banshee' || en.id === 'wraith' || en.id === 'bat'){
      en.vy = 0;
      // bobbing
      en.y = (GROUND_Y - 120) + Math.sin(game._t = (game._t || 0) + dt * 4) * 24;
    }
    if (inSight){
      en.state = 'chase';
      const dir = ((p.x + p.w/2) - (en.x + en.w/2)) >= 0 ? 1 : -1;
      en.facing = dir;
      const sp = (en.isBoss ? 50 : 70) + (en.mon.atk * 1.5);
      en.vx = dir * sp;
      // attack when close
      if (Math.abs((p.x + p.w/2) - (en.x + en.w/2)) < 42 && en.attackCool <= 0){
        en.attackCool = 1.0 + Math.random() * 0.4;
        // resolve hit
        const dmg = (en.mon.atk || 1) - (en.mon.ignoreDef ? 0 : 0);
        // ignoreDef enemies bypass block? no — block still gives partial reduction
        const baseDmg = en.mon.ignoreDef ? Math.max(1, dmg) : dmg;
        damagePlayer(baseDmg, en.x);
        // small enemy lunge
        en.vx = dir * 320;
      }
    } else {
      en.state = 'patrol';
      const reach = en.patrolRange;
      if (en.x < en.home - reach) en.patrolDir = 1;
      else if (en.x + en.w > en.home + reach) en.patrolDir = -1;
      en.vx = en.patrolDir * (28 + (en.mon.atk * 0.6));
      en.facing = en.patrolDir;
    }
    if (en.id !== 'banshee' && en.id !== 'wraith' && en.id !== 'bat'){
      moveAndCollide(en, dt);
    } else {
      // ghostly: move freely in X (no tile collision), but clamp to world
      en.x += en.vx * dt;
      if (en.x < 0) en.x = 0;
      if (en.x + en.w > game.world.w) en.x = game.world.w - en.w;
    }
  }
}

/* ── Chests / shrines / exit ────────────────────────── */
function openChest(c){
  c.opened = true;
  // 2-3 affixed gear items from fine/master/legend
  const tierOptions = ['fine','master','cursed'];
  const count = 2 + Math.floor(Math.random() * 2);
  const drops = [];
  for (let i = 0; i < count; i++){
    let ch = tierOptions[Math.floor(Math.random() * tierOptions.length)];
    if (Math.random() < 0.18 && game.floor >= 4) ch = 'legend';
    const pool = LOOT_POOLS[ch];
    const id = pool[Math.floor(Math.random() * pool.length)];
    addToInv(id);
    drops.push(ITEMS[id].em);
  }
  const g = 8 + Math.floor(Math.random() * (game.floor * 6 + 6));
  player.gold += g;
  spawnFloat(c.x, c.y - 20, '+' + g + (LANG === 'ru' ? 'з' : 'g'), '#f5c026');
  drops.forEach((em, i) => spawnFloat(c.x + (i - drops.length/2) * 22, c.y - 44 - i * 14, em, '#e8dcc4'));
  spawnDust(c.x, c.y, '#f5c026', 12);
  save();
  updateHud();
  renderInventory();
}
function useShrine(s){
  s.used = true;
  const healed = Math.min(player.maxHp, player.hp + Math.max(8, Math.floor(player.maxHp * 0.6))) - player.hp;
  player.hp += healed;
  spawnFloat(s.x, s.y - 20, '+' + healed, '#f5c026');
  spawnDust(s.x, s.y, '#fff2b8', 16);
  save();
  updateHud();
}
function exitFloor(){
  // mark floor cleared, advance deepest, return to chapel
  player.cleared = player.cleared || {};
  player.cleared['f' + game.floor] = true;
  if (game.floor > (player.deepest || 0)) player.deepest = game.floor;
  if (game.floor < 5) player.floor = game.floor + 1;
  player.scene = 'chapel';
  save();
  renderScene();
}

/* ── Particles + floats ─────────────────────────────── */
function spawnDust(x, y, color, n){
  for (let i = 0; i < (n || 6); i++){
    game.particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 240,
      vy: (Math.random() - 0.5) * 240 - 80,
      life: 0.5 + Math.random() * 0.4,
      age: 0,
      color,
    });
  }
}
function spawnFloat(x, y, text, color){
  game.floats.push({ x, y, text, color: color || '#fff', age: 0, life: 1.1 });
}
function updateFloats(dt){
  for (let i = game.floats.length - 1; i >= 0; i--){
    const f = game.floats[i];
    f.age += dt;
    f.y -= 32 * dt;
    if (f.age >= f.life) game.floats.splice(i, 1);
  }
  for (let i = game.particles.length - 1; i >= 0; i--){
    const p = game.particles[i];
    p.age += dt;
    p.vy += GRAVITY * dt * 0.5;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    if (p.age >= p.life) game.particles.splice(i, 1);
  }
}
function shakeFor(s){ game.shakeT = Math.max(game.shakeT, s); }

/* ── Camera ─────────────────────────────────────────── */
function updateCam(){
  const p = game.player; if (!p) return;
  const vw = game._vw || 800;
  const targetX = p.x + p.w/2 - vw * 0.42;
  // lerp toward target
  game.cam.x += (targetX - game.cam.x) * 0.12;
  if (game.cam.x < 0) game.cam.x = 0;
  if (game.cam.x > game.world.w - vw) game.cam.x = game.world.w - vw;
  game.cam.y = 0;
  if (game.shakeT > 0){
    game.shakeT -= 0.016;
    game.cam.x += (Math.random() - 0.5) * 5;
  }
}

/* ── Render ─────────────────────────────────────────── */
function render(){
  const cv = document.getElementById('game-canvas');
  if (!cv) return;
  const ctx = cv.getContext('2d');
  if (!ctx) return;
  const dpr = game._dpr || 1;
  const vw = game._vw || cv.width / dpr;
  const vh = game._vh || cv.height / dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  const f = FLOORS[game.floor - 1];
  // bg
  const grd = ctx.createLinearGradient(0, 0, 0, vh);
  grd.addColorStop(0, f.bg);
  grd.addColorStop(1, '#000');
  ctx.fillStyle = grd;
  ctx.fillRect(0, 0, vw, vh);
  // far-parallax arches (slowest)
  drawArches(ctx, vw, vh, f.accent, 0.18);
  // mid arches
  drawArches(ctx, vw, vh, f.accent, 0.42, 80);
  // tiles (camera-relative)
  ctx.save();
  ctx.translate(-game.cam.x, -game.cam.y);
  for (const t of game.tiles){
    drawTile(ctx, t, f);
  }
  // doors
  if (game.door){
    drawDoor(ctx, game.door, f);
  }
  // chests
  for (const c of game.chests){ drawChestSprite(ctx, c, f); }
  // shrines
  for (const s of game.shrines){ drawShrineSprite(ctx, s, f); }
  // enemies
  for (const en of game.enemies){ drawEnemy(ctx, en); }
  // player
  drawPlayer(ctx, game.player);
  // particles
  for (const p of game.particles){
    const al = 1 - p.age / p.life;
    ctx.fillStyle = p.color;
    ctx.globalAlpha = al;
    ctx.fillRect(p.x - 2, p.y - 2, 4, 4);
  }
  ctx.globalAlpha = 1;
  // floats
  ctx.font = '14px "JetBrains Mono", monospace';
  ctx.textAlign = 'center';
  for (const fl of game.floats){
    const al = 1 - (fl.age / fl.life);
    ctx.globalAlpha = al;
    ctx.fillStyle = '#000';
    ctx.fillText(fl.text, fl.x + 1, fl.y + 1);
    ctx.fillStyle = fl.color;
    ctx.fillText(fl.text, fl.x, fl.y);
  }
  ctx.globalAlpha = 1;
  ctx.restore();
  // foreground vignette
  ctx.fillStyle = 'rgba(0,0,0,0.0)';
  // health bar overlay (small) bottom-left
  drawCanvasHud(ctx, vw, vh);
}
function drawArches(ctx, vw, vh, color, alpha, off){
  off = off || 0;
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.fillStyle = color;
  const archW = 120 + off;
  const archH = 220;
  for (let i = -1; i < Math.ceil(vw / archW) + 2; i++){
    const x = i * archW + ((-game.cam.x * (alpha * 0.6)) % archW);
    const baseY = vh - 60 - archH;
    ctx.beginPath();
    ctx.moveTo(x, vh);
    ctx.lineTo(x, baseY + 40);
    ctx.quadraticCurveTo(x + archW/2, baseY - 30, x + archW, baseY + 40);
    ctx.lineTo(x + archW, vh);
    ctx.closePath();
    ctx.fill();
  }
  ctx.restore();
}
function drawTile(ctx, tile, f){
  ctx.fillStyle = '#15100c';
  ctx.fillRect(tile.x, tile.y, tile.w, tile.h);
  // top stripe
  ctx.fillStyle = f.accent;
  ctx.fillRect(tile.x, tile.y, tile.w, 3);
  // brick pattern on thick floor
  if (tile.h > 30){
    ctx.fillStyle = 'rgba(0,0,0,0.45)';
    const bw = 36, bh = 12;
    for (let y = tile.y + 6; y < tile.y + tile.h; y += bh){
      const offset = ((y - tile.y) / bh) % 2 ? bw/2 : 0;
      for (let x = tile.x + offset; x < tile.x + tile.w; x += bw){
        ctx.fillRect(x, y, bw - 2, 1);
        ctx.fillRect(x + bw/2, y + bh/2, 1, bh/2);
      }
    }
    // torch every 280 px
    for (let x = tile.x + 140; x < tile.x + tile.w; x += 280){
      drawTorch(ctx, x, tile.y - 64, f.torch);
    }
  }
}
function drawTorch(ctx, x, y, color){
  // bracket
  ctx.fillStyle = '#3a2418';
  ctx.fillRect(x - 3, y, 6, 18);
  // flame (flickers)
  const flick = 0.85 + Math.sin(performance.now() * 0.012 + x * 0.3) * 0.15;
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.ellipse(x, y - 4 * flick, 5, 8 * flick, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.globalAlpha = 0.5;
  ctx.beginPath();
  ctx.ellipse(x, y - 4 * flick, 2, 4 * flick, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
  // glow
  const grd = ctx.createRadialGradient(x, y - 6, 4, x, y - 6, 70);
  grd.addColorStop(0, 'rgba(245,192,38,0.35)');
  grd.addColorStop(1, 'rgba(245,192,38,0)');
  ctx.fillStyle = grd;
  ctx.fillRect(x - 70, y - 76, 140, 140);
}
function drawDoor(ctx, d, f){
  ctx.fillStyle = '#3a200a';
  ctx.fillRect(d.x, d.y, 44, 80);
  ctx.fillStyle = d.locked ? '#1a0e0a' : '#5a3a18';
  ctx.fillRect(d.x + 4, d.y + 4, 36, 72);
  ctx.fillStyle = '#f5c026';
  ctx.fillRect(d.x + 18, d.y + 38, 8, 12);
  if (!d.locked){
    // glow
    const grd = ctx.createRadialGradient(d.x + 22, d.y + 40, 6, d.x + 22, d.y + 40, 70);
    grd.addColorStop(0, 'rgba(245,192,38,0.45)');
    grd.addColorStop(1, 'rgba(245,192,38,0)');
    ctx.fillStyle = grd;
    ctx.fillRect(d.x - 48, d.y - 28, 140, 140);
  }
}
function drawChestSprite(ctx, c, f){
  if (c.opened){
    ctx.fillStyle = '#2a1810';
    ctx.fillRect(c.x - 16, c.y + 12, 32, 14);
  } else {
    ctx.fillStyle = '#5a3a18';
    ctx.fillRect(c.x - 16, c.y, 32, 26);
    ctx.fillStyle = '#3a200a';
    ctx.fillRect(c.x - 16, c.y, 32, 4);
    ctx.fillStyle = '#f5c026';
    ctx.fillRect(c.x - 2, c.y + 12, 4, 6);
  }
}
function drawShrineSprite(ctx, s, f){
  ctx.fillStyle = '#5a4a45';
  ctx.fillRect(s.x - 10, s.y, 20, 40);
  ctx.fillStyle = '#3a2f2c';
  ctx.fillRect(s.x - 12, s.y - 4, 24, 4);
  if (!s.used){
    drawTorch(ctx, s.x, s.y - 4, '#fff2b8');
  }
}
function drawEnemy(ctx, en){
  const sprite = SPRITES[en.mon.sp];
  const drawW = 32 * en.scale, drawH = 32 * en.scale;
  if (sprite){
    const url = _spriteCache[en.mon.sp] || (_spriteCache[en.mon.sp] = pixelArtURL(sprite));
    if (url){
      let img = _imgCache[en.mon.sp];
      if (!img){
        img = new Image();
        img.src = url;
        _imgCache[en.mon.sp] = img;
      }
      if (img.complete){
        ctx.save();
        // facing flip
        if (en.facing < 0){
          ctx.translate(en.x + en.w/2 + drawW/2, en.y + en.h/2 - drawH/2);
          ctx.scale(-1, 1);
          ctx.drawImage(img, 0, 0, drawW, drawH);
        } else {
          ctx.drawImage(img, en.x + en.w/2 - drawW/2, en.y + en.h/2 - drawH/2, drawW, drawH);
        }
        ctx.restore();
        if (en.hurtT > 0){
          ctx.globalAlpha = en.hurtT / 0.18 * 0.55;
          ctx.fillStyle = '#fff';
          ctx.fillRect(en.x + en.w/2 - drawW/2, en.y + en.h/2 - drawH/2, drawW, drawH);
          ctx.globalAlpha = 1;
        }
      }
    }
  }
  // HP bar
  if (en.hp < en.maxHp){
    const bw = Math.max(28, drawW * 0.7);
    const bx = en.x + en.w/2 - bw/2, by = en.y + en.h/2 - drawH/2 - 8;
    ctx.fillStyle = '#1a0e10';
    ctx.fillRect(bx, by, bw, 4);
    ctx.fillStyle = en.isBoss ? '#9a1a1e' : '#c43d33';
    ctx.fillRect(bx, by, bw * (en.hp / en.maxHp), 4);
  }
}
function drawPlayer(ctx, p){
  if (!p) return;
  const w = 36, h = 48;
  const x = p.x + p.w/2 - w/2;
  const y = p.y + p.h - h;
  // flash
  const flash = p.hitFlash > 0 && Math.floor(p.hitFlash * 30) % 2 === 0;
  // ── pixel paladin (procedural draw) ──
  ctx.save();
  // hooded cape behind
  ctx.fillStyle = '#5a1a1e';
  ctx.fillRect(x + 4, y + 14, w - 8, h - 20);
  // body armor
  ctx.fillStyle = flash ? '#fff' : '#8898a8';
  ctx.fillRect(x + 6, y + 16, w - 12, 22);
  ctx.fillStyle = flash ? '#fff' : '#cdd8e6';
  ctx.fillRect(x + 8, y + 18, w - 16, 2);
  // sun emblem on chest
  ctx.fillStyle = '#f5c026';
  ctx.fillRect(x + w/2 - 2, y + 24, 4, 4);
  // head
  ctx.fillStyle = flash ? '#fff' : '#d8c89a';
  ctx.fillRect(x + 12, y + 4, w - 24, 12);
  // helm (gold rim)
  ctx.fillStyle = '#f5c026';
  ctx.fillRect(x + 11, y + 2, w - 22, 3);
  // eye visor slit
  ctx.fillStyle = '#000';
  ctx.fillRect(x + 14, y + 9, w - 28, 2);
  // legs
  ctx.fillStyle = '#3a2418';
  ctx.fillRect(x + 8, y + 38, 8, 10);
  ctx.fillRect(x + w - 16, y + 38, 8, 10);
  // sword (always visible at side)
  if (p.attackT > 0){
    // swing arc
    const swing = 1 - (p.attackT / PLAYER_ATTACK_T);
    const angle = Math.atan2(p.attackDir.y, p.attackDir.x) + (p.facing >= 0 ? -0.6 + swing * 1.2 : 0.6 - swing * 1.2);
    const cx = p.x + p.w/2, cy = p.y + p.h/2;
    ctx.save();
    ctx.translate(cx, cy);
    ctx.rotate(angle);
    ctx.fillStyle = '#cdd8e6';
    ctx.fillRect(8, -2, 42, 4);
    ctx.fillStyle = '#f5c026';
    ctx.fillRect(6, -4, 4, 8);  // crossguard
    ctx.fillStyle = '#9a1a1e';
    ctx.fillRect(3, -3, 4, 6);  // pommel
    // tip glint
    ctx.fillStyle = '#fff';
    ctx.fillRect(48, -1, 2, 2);
    ctx.restore();
    // arc visual
    ctx.strokeStyle = 'rgba(245,192,38,' + (0.6 * (1 - swing)) + ')';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(cx, cy, PLAYER_REACH * 0.8, angle - 0.5, angle + 0.5);
    ctx.stroke();
  } else {
    // sheathed sword on back
    ctx.fillStyle = '#cdd8e6';
    ctx.fillRect(x + (p.facing > 0 ? w - 6 : 2), y + 8, 4, 22);
  }
  // shield when blocking
  if (p.blocking){
    const sx = p.x + p.w/2 + p.facing * 14;
    const sy = p.y + p.h/2;
    ctx.fillStyle = '#3a2418';
    ctx.fillRect(sx - 10, sy - 14, 20, 28);
    ctx.fillStyle = '#f5c026';
    ctx.fillRect(sx - 8, sy - 12, 16, 24);
    ctx.fillStyle = '#9a1a1e';
    ctx.fillRect(sx - 2, sy - 8, 4, 16);
    ctx.fillRect(sx - 8, sy - 2, 16, 4);
  }
  ctx.restore();
  // facing indicator at feet (small dot)
}
function drawCanvasHud(ctx, vw, vh){
  // floor label bottom-right
  ctx.font = '11px "JetBrains Mono", monospace';
  ctx.fillStyle = 'rgba(232,220,196,0.75)';
  ctx.textAlign = 'right';
  ctx.fillText((LANG === 'ru' ? 'Этаж ' : 'Floor ') + game.floor + '/5', vw - 12, vh - 12);
  // remaining enemies
  const live = game.enemies.filter(e => e.hp > 0).length;
  ctx.textAlign = 'left';
  ctx.fillText((LANG === 'ru' ? 'врагов: ' : 'enemies: ') + live, 12, vh - 12);
}

/* ═══ ACTIONS (chapel hub only now) ═══════════════════ */
function bindSceneActions(){
  sceneEl.querySelectorAll('[data-act]').forEach(b => {
    b.addEventListener('click', () => handleAction(b.dataset.act, b.dataset));
  });
}
function handleAction(act, data){
  if (act === 'descend'){
    const n = player.floor || 1;
    player.scene = 'dungeon';
    player.floor = Math.min(5, Math.max(1, n));
    save();
    renderScene();
    return;
  }
  if (act === 'select'){
    const n = parseInt(data.floor) || 1;
    player.floor = n;
    save();
    renderScene();
    return;
  }
  if (act === 'rest'){
    if (player.gold < 10){ setLog(t('log_no_coin'), 'bad'); renderScene(); return; }
    player.gold -= 10; player.hp = player.maxHp;
    setLog(t('log_rest_ok'), 'good');
    save(); renderScene(); return;
  }
  if (act === 'forge'){ openForge(); return; }
  if (act === 'skills'){ openSkills(); return; }
}
function defeatMonster(){ /* legacy turn-based stub; platformer uses killEnemy() instead */ }
function die(){
  // penalty: lose half gold, lose broken/common items (mats survive)
  const lostGold = Math.floor(player.gold / 2);
  player.gold -= lostGold;
  player.inventory = player.inventory.filter(it => {
    const item = ITEMS[it.id];
    if (!item) return false;
    if (item.tier === 'broken') return false;
    if (item.tier === 'common' && item.slot !== 'mat') return false;
    return true;
  });
  for (const slot of ['weapon','armor','trinket']){
    const uid = player.equipped[slot];
    if (uid != null && !player.inventory.find(it => it.uid === uid)) player.equipped[slot] = null;
  }
  player.hp = player.maxHp;
  player.scene = 'chapel';
  stopDungeon();
  const eps = T[LANG] && T[LANG].epitaphs ? T[LANG].epitaphs : T.en.epitaphs;
  document.getElementById('epitaph').textContent = eps[Math.floor(Math.random()*eps.length)];
  document.getElementById('death').classList.add('show');
  save();
}
document.getElementById('btn-respawn').addEventListener('click', () => {
  document.getElementById('death').classList.remove('show');
  player.scene = 'chapel';
  renderScene();
});

/* ═══ AFFIXES (hardcore loot rolls) ═══════════════════ */
/* every weapon/armor/trinket drop rolls 0-3 random affixes based on tier.
   each affix grants stat bonuses (atk/def/hpRegen/healMul) when equipped.
   cursed-tier items get a powerful bonus with a real downside. */
const AFFIXES = {
  // ── prefixes (Adjective + Noun) ──
  blessed:     { name:'Blessed',     nameRu:'Благословлённый', pre:true, atk:1, tags:['holy'] },

  consecrated: { name:'Consecrated', nameRu:'Посвящённый',     pre:true, def:2, tags:['holy','rare'] },

  sun_touched: { name:'Sun-touched', nameRu:'Солнцем-тронутый',pre:true, atk:1, hpRegen:1, tags:['holy','rare'] },
  vesper:      { name:'Vesper',      nameRu:'Вечерний',        pre:true, def:2, hpRegen:1, tags:['holy','rare'] },
  // ── suffixes ("X of Y") ──
  of_verbena:      { name:'of Saint Verbena',    nameRu:'Святой Вербены',     atk:2, tags:['holy','rare'] },
  of_sunburst:     { name:'of the Sunburst',     nameRu:'Солнечного сияния',  atk:1, def:1, tags:['holy'] },
  of_vigil:        { name:'of the Vigil',        nameRu:'Бдения',             def:2, tags:['holy'] },
  of_mercy:        { name:'of Mercy',            nameRu:'Милосердия',         hpRegen:1, tags:['holy'] },
  of_choir:        { name:'of the Choir',        nameRu:'Хора',               atk:1, def:1, tags:['holy'] },
  of_daybreak:     { name:'of Daybreak',         nameRu:'Рассвета',           atk:2, hpRegen:1, tags:['holy','rare'] },
  of_chalice:      { name:'of the Chalice',      nameRu:'Чаши',               healMul:0.25, tags:['holy','rare'] },
  of_reliquary:    { name:'of the Reliquary',    nameRu:'Реликвария',         def:3, tags:['holy','rare'] },
  of_saints_tongue:{ name:"of the Saint's Tongue", nameRu:'Языка святого',    atk:1, def:1, hpRegen:1, tags:['holy','rare'] },
  // ── rare exotics (lifesteal + holy fire) ──
  vampyric:        { name:'Vampyric',             nameRu:'Вампирский',        pre:true, lifesteal:0.25, tags:['holy','rare'] },
  bloodletting:    { name:'Bloodletting',         nameRu:'Кровопускающий',    pre:true, atk:1, lifesteal:0.15, tags:['holy','rare'] },
  wreathed:        { name:'Wreathed',             nameRu:'Увенчанный пламенем',pre:true, fireDmg:2, tags:['holy','rare'] },
  of_sunflame:     { name:'of the Sunflame',      nameRu:'Солнечного пламени', fireDmg:2, tags:['holy','rare'] },
